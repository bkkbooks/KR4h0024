front:
  text: 文質三
  hash: sha256:4be7c36191a5d07b4e7c1517d262514843a460c70a21c065f24dbcfc9bc3d8ee
body:
  text: 人文化成論吕温質文論李華文章論李徳裕經㫖五編年紀傳論皇甫湜卜世論孫郃春秋無賢臣論秦穆謚繆論皮日休太甲論陳越石讓國一吳季札論獨孤及人文化成論吕温易曰觀乎人文以化成天下能諷其言葢有之矣未有明其義者也嘗試論之夫一二相生大鈞造物百化交錯六氣節宣或隂闔而陽開或天經而地紀有聖作則實為人文若乃夫以剛克妻以柔立父慈而敎子孝而箴此室家之文也君以仁使臣臣以義事君予違汝弼獻可替否此朝廷之文也三公論道六卿分職九流異趣百揆同歸此官司之文也寛則人慢糾之以猛猛則人殘施之以寛寛以濟猛猛以濟寛此刑政之文也樂勝則流遏之以禮禮勝則離和之以樂與時消息因俗變通此敎化之文也文者葢言錯綜庶績藻繪人情如成文焉以致其理然則人文化成之義其在兹乎而近代諂䛕之臣特以時君不能則象乾坤祖述堯舜作化成天下之文乃以旂常冕服章句翰墨為人文也遂使君人者浩然忘本沛然自得盛威儀以求至理坐吟詠而待升平流蕩因循闇而未悟不其痛歟必以旂常冕服為人文則秦漢魏晉聲明文物禮縟五帝儀繁三王可曰煥乎其有文章矣何衰亂之多也必以章句翰墨為人文則陳後主隋煬帝雍容綺靡洋溢編簡可曰文思安安矣何滅亡之速也覈之以名義研之以情實既如彼較之以今古質之以成敗又如此傳不云乎經緯天地曰文禮不云乎文王以文治則文之時義大矣哉焉可以名數末流雕蟲小技厠雜其間乎質文論李華天地之道易簡易則易知簡則易従先王質文相變以濟天下易知易従莫尚乎質質弊則佐之以文文弊則復之以質不待其極而變之故上無従暴下無従亂記曰國奢則示之以儉國儉則示之以禮禮謂易知易従之禮非醻酢裼襲之煩也儉謂易知易従之儉非茅茨土簋之陋也葢達其誠信安其君親而已質則儉儉則固固則愚其行也豐肥天下愚極則無恩文則奢奢則不遜不遜則詐其行也痼瘠天下詐極則賊亂故曰不待其極而變之固而文之無害於訓人不遜而質之艱難於成俗若不化而過則愚之病淺於詐之病也無恩之病緩於賊亂之極也故曰莫尚乎奢也奢而後化之求固而不獲也利害遲速不其昭昭歟前王之禮世滋百家之言世益欲人専一而不為詐難乎哉吉凶之儀刑賞之級繁矣使生人無適従巧者弄而飾之拙者眩而失守誠偽無由明天下浸為陂池蕩為洪流雖神禹復生誰能救之夫君人者修徳以治天下不在智不在功必也質而有制制而不煩而已太康啟子禹孫當斯時有堯舜遺人親受禹之賜國為羿奪内則夏之六卿外則夏之四嶽而羿浞愚弄鬭爭内外黙然一以聴命至少康艱難而後復原是觀之則聖有謨訓何補哉漢髙除秦項煩苛至孝文𤣥黙仁儉斷獄㡬措及武帝修三代之法而天下荒耗則文不如質明矣漢氏雖歴産禄吳楚之亂而宗室異姓同力合心一舉而安且漢徳結於人心不如夏家諸吕吳楚之强倍於羿浞安漢至易而復夏至難何也周徳最深周公大聖親則管蔡為亂逺則徐奄並興夷多難復明辟兼虞夏商之典禮後王之法備矣太平之階厚矣至成王季年而後理唯康王垂拱囹圄虚空逮昭王南征不返因是陵夷則郁郁之盛何為哉周法六官備數四時盛祭車服盛飾至于下國方五十里卿大夫士之多軍帥之衆大聘小聘朝覲㑹同地狹人寡不堪覲謁大何得不亂小何得不亡記云周之人强仁窮賞罰故曰殷周之道不勝其弊考前後而論之夏衰失於質而無制周弱失於制而過煩故也愚以為將求致理始于學習經史左氏國語爾雅荀孟等家輔佐五經者也及藥石之方行於天下考試仕進者宜用之其餘百家之説䜟緯之書存而不用至於喪制之縟祭禮之繁不可備舉者宜省之考求簡易中於人心者以行之是可以淳風俗而不泥於坦明之路矣學者局於恒敎因循而不敢失於毫釐古人之説豈或盡善數骨肉之罪而褒叔向不忍聞之言而書昭伯敬龜筴之信而陳僂句使不仁之人萌芽賊心而仁義之士閉目掩巻何如哉其或曲書常言無裨世敎不習可也則煩凟日亡而易簡日用矣海内之廣億兆之多無聊於煩彌世曠久今以簡質易煩文而便之則晨命而夕周踰年而化成蹈五常享五福理必然也子言以約失之者鮮矣與其不遜也寧固傳曰以欲従人則可記曰大樂必易大禮必簡顔子曰無施勞經義可據也如是為政者得無以為惑乎文章論李徳裕魏文典論稱文以氣為主氣之清濁有體斯言盡之矣然氣不可以不貫不貫則雖有英詞麗藻如編珠綴玉不得為金璞之寶矣鼔氣以勢壯為美勢不可以不息不息則流蕩而忘返亦猶絲竹繁奏必有希聲窈眇聽之者恍聞如川流迅激必有洄洑逶迤觀之者不厭従兄翰嘗言文章如千兵萬馬風恬雨霽寂無人聲葢謂是也近世誥命惟蘇廷碩叙事之外自謂文章才實有餘用之不竭沈休文獨以音韻為切重輕為難語雖甚工㫖則未逺夫荆璧不能無瑕隋珠不能無纇文㫖髙妙豈以音韻為病哉此可以言規矩之内未可以言文外意也較其師友則魏文與王陳應劉討論之矣江南惟於五言為妙故休文長於音韻而謂靈均以來此袐未睹不亦誣人甚矣古人辭髙者葢以言妙而工適情不取於音韻曹植七哀詩有徊泥諧依四韻王粲詩有攀原安三韻班固漢書贊及當時詞賦多用協韻猗歟元勲佐漢舉信是也意盡而止成篇不拘於隻耦文選詩有五韻七韻十一韻十三韻二十韻者今之文自四韻六韻以至百韻無有隻者故篇無定曲詞寡累句譬諸音樂古辭如金石琴瑟尚於至音今文如絲竹鞞鼔迫於促節則知聲律之為弊也甚矣世有非文章者曰詞不出於風雅思不越於離騷摸冩古人何足貴也余曰譬諸日月雖終古常見而光景常新此所以為靈物也余嘗為文箴今載於此曰文之為物自然靈氣惚怳而來不思而至杼軸得之澹而無味琢刻藻繪彌不足貴如彼璞玉磨礱成器奢者為之錯以金翠美質既彫良寶斯棄此為文之大㫖也編年紀傳論皇甫湜論曰古史編年至漢史司馬遷始更其制而為紀傳相承至今無以移之歴代論者以遷為率私意蕩古法紀傳煩漫不如編年湜以為合聖人之經者以心不以迹得良史之體者在適不在同編年紀傳繫於時之所宜才之所長者耳何常之有夫是非與聖人同辨善惡得天下之中不虚美不隠惡則為紀為傳為編年是皆良史矣若論不足以析皇極辭不足以杜無窮雖為紀傳編年斯皆罪人且編年之作豈非以事繫日以日繫月以月繫時以時繫年者哉司馬氏作紀以項羽承秦以吕后接之亦以歴年不可中廢年不可闕故書也觀其作傳之意將以包該事迹參貫話言纎悉百代之務成就一家之説必新制度而馳才力焉又編年記事束於次第牽於混并必舉其大綱而簡於序事是以多闕載多逸文乃别為著録以備時之語言而盡事之本末故春秋之作則有尚書左傳之外又為國語可復省左史於右合外傳於内哉故合之則繁離之則異削之則闕子長病其然也於是革舊典開新程為紀為傳為表為志首尾其叙述表裏相發明庶為得中將垂不朽自漢至今代以更八年㡬歴千其間賢人摩肩史臣繼踵㩁今古之得失論述作之利病各耀聞見競誇才能改其規模殊其體統傳以相授奉而遵行而編年之史遂廢葢有以也唯荀氏為漢紀裴氏為宋畧强欲復古皆為編年然其善語嘉言細事詳説所遺多矣如覽正史方能備明則其宻漏得失章章於是矣今之作者茍能遵紀傳之體制同春秋之是非文敵遷固直如南董亦無上矣儻捨源而事流棄意而徴跡雖服仲尼之服手絶麟之筆等古人之章句署王正之月日謂之好古則可矣顧其書何如哉卜世論孫郃周成王定鼎於郟鄏卜世三十卜年七百夫帝王括囊宇宙位重憂崇天生利民非樂兆民之上故君民者遇夫聖則禪之不遇則以子繼之堯之於舜舜之於禹禹之於子是以周都天地之中欲便四方之㑹不恃山河務從徳化原其意也在乎利民豈異唐虞之道而反卜年卜世邪必也欲永其祚莫先徳義貽厥後世天人祐之豈非無窮也哉何三十七百年世之有若右其卜而左其徳俾乎厥後恃年世之永久必輕乎徳義若此之謀非君子之道也昔太戊懼烖而盛帝辛恃瑞而亡在此不在彼豈不知之而卜年卜世者乎春秋無賢臣論春秋列國周之諸侯受周之封分為五等五等之下臣為陪臣陪臣於諸侯君父也諸侯於周王亦君父也陪臣於周義猶大父也夫為子之道孝於父者必欲父孝於祖陪臣忠於諸侯者必欲諸侯忠於天子則忠孝兩全康乂天下今春秋陪臣張公室侵王室弱周以强諸侯是弱祖而强父佐諸侯而敵周是佐父而敵祖遺祖之怨成父之逆惡莫大焉言之於臣則非忠語之於子則非孝論之於道則傷義推之於情則辜恩遂使姬周削弱祀號而已桓文雖以為霸何能正之反有封禪請隧之僭管晏雖有其功何能諫之而有反坫毁孔之惡于時風敎大壞海内焚如天不能隂隲下民降大聖以為木鐸歴國七十餘説而不遇奔走齊魯宋衞之郊反若喪家之狗知不可訓慮後世不懼乃修春秋明向背其有甚者或夷之或狄之弑君三十六亡國五十二奔走失社稷者不可勝紀書曰帝乃震怒致今海内無一嘉祥俱有妖怪謂春秋亂世豈不如然于時人不堪命何邪無賢臣哉予為此論警衆士大夫多稱之遂聞鬷嘏鬷嘏徴而竒之或謂可刋金石訓乎今後既而喧傳則有難僕曰春秋豈乏賢者子謂之無激之邪鮮之邪奈乎孔門何曰孔門仕者鮮又家臣耳子不讀聖賢書乎易云屯其膏小貞吉大貞凶春秋之大夫小貞耳盍以大貞取之以王道取五霸猶罪人秦穆謚繆論皮日休聖人務安民不先置不仁以見其仁焉不先用不徳以見其徳焉茍如是是見危者已墜而欲援觀鬭者將死而方救噫其亦不仁矣以髙辛之仁化用一摯摯之不善天下之民捕堯以為君以唐堯之仁化用一鮌鮌之不績天下之民譟禹以為功夫如是摯之與鮌是髙辛唐堯誠用之非先置也推其誠而用之人民尚倍之如是况先置者邪當晉獻驪姬之亂後奚齊卓子之死餘重耳在翟夷吾居秦以秦穆之力制翟而安晉其能必矣夫重耳之賢也天下知之又其従者皆足以相人國趙衰頡舅犯之謂如先立之必能誅亂公子去暴大夫翼徳於成周宣化於汾晉而穆公乃取公子摯之言謂公子摯曰君若求置晉君以成名于天下則不如先置不仁者以猾其中也乃先置夷吾是為惠公公之入也背内外之賂謂許里克以分晉之田方百里㔻鄭肩蔡之田方七十里許公子摯河外列城五黄金三十鎰白玉珩六䨇誅本立之臣惠公二年春殺里克秋殺㔻鄭蒸先公之室謂惠公蒸於獻公夫人賈君是也故生民興誦謂輿人誦曰侯之不侯果喪其由死者無報謂惠公即位改葬恭世子而自死達於外也卒身獲于秦公以九月獲十月歸而子殺於晉謂十五年惠公卒懷公立秦乃召重耳於楚而納之晉人殺懷公於髙梁嗚呼致是也非晉人之罪秦人之罪也夫摯立八年不善而去鮌用三載弗績而誅况晉惠公之在位作宗廟之蠧蝎為社稷之稂莠一立十五年其為害也大矣今之學者以秦穆為繆尚疑其謚得斯文也可以諡繆為定太甲論陳越石殷甲不惠於天下其臣放之後能改過亦為臣之所立或曰社稷之臣必當如是淺於國者之為論也至若承湯之敎全殷之統立臣之節豈如是邪君上之不肖與賢智豈臣下之有不知邪擇其嗣當求賢而立之不知其非賢以為不明因而放之令其自新如日蝕不吐河清難俟中原之鹿將軼時乗之龍待駕於臣之業何如哉况乎體非金石而冒霧露如懷失國之詬以損其身則弑君之謗消無曰矣陳子曰臣之忠有幸而忠者也君之立有幸而立者也知殷之君臣皆幸而成者噫浞浞接踵羿羿比肩君可放乎哉其後新取於西魏成於東司馬氏之有天下其始也未嘗不伊不周其終也未嘗不羿不浞皆取伊周以為嗃矢也孟子曰無伊尹之心則簒也有㫖哉吳季札論獨孤及謹按季子三以吳國讓而春秋褒之余徴其前聞於舊史氏竊謂廢先君之命非孝附子臧之義非公執禮全節使國簒君弑非仁出能觀變入不討亂非智左丘明太史公書而無譏余有惑焉夫國之大經實在擇嗣王者慎徳之不建故以賢則廢年以義則廢卜以君命則廢禮是以太伯之奔勾吳也葢避季歴季歴以先王所屬故纂服嗣位而不私太伯知公器有歸亦斷髮文身而無怨及武王繼統受命作周不以配天之業讓伯邑考官天下也彼諸樊無季歴之賢王僚無武王之聖而季子為太伯之讓是徇名也豈曰至徳且使爭端興於上替禍機作於内室遂錯命於子光覆師於夫差陵夷不返二代而吳滅以季子之閎達博物慕義無窮向使當壽夢之眷命接餘昧之絶統必能光啟周道以霸荆蠻則大業用康多難不作闔閭安得謀於窟室専諸何所施其匕首嗚呼全身不顧其業専讓不奪其志所去者忠所存者節善自牧矣謂先君何與其觀變周樂慮危戚鍾曷若以蕭墻為心社稷是恤復命哭墓哀死事生孰與先釁而動治其未亂棄室以表義掛劍以明信孰與奉君父之命慰神祗之心則獨守純白不義于嗣是潔已而遺國也國之覆亡君實階禍且曰非我生亂其孰生之哉其孰生之哉唐文粹巻三十六欽定四庫全書唐文粹巻三十七宋姚
