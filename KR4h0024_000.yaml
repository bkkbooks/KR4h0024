front:
  text: 刻唐文粹序天之文粹于日星地之文粹于河嶽聖人之文粹于易詩書春秋禮樂是故唐虞之文堯舜為粹夏商周之文禹湯文武周公孔子為粹夫文之粹夲之天也粹乎文夲之聖也是文也道也夫本之天文之所從出也夲之聖文之所由作也文不出於天迹而已矣文不作于聖藝而已矣故離乎道不可以言文去夫文不可以言道文猶道也及其後秦亦有文焉誓之類是已漢亦有文焉詔之類是已唐亦有文焉誥之類是巳秦之文粹之者景宋漢之文粹之者班馬唐之文粹之者李杜韓栁世雖降而其體雖不古若然代以作者名家要之皆文也嗟夫天地之文道之昭也聖人之文昭夫道也若秦漢唐之文求昭乎道而道未易昭也于是始有擅文之名而以文為道者矣嗟夫業始專而其理始晦名始著而其道始微文之故豈其然哉然則文不可學乎讀易而求伏羲之畫讀書而求堯舜禹湯之典謨之訓誥讀詩與禮與樂而求文武周公之咏嘆之制作讀春秋而求孔子之茟削則文作而理著理著而道昭道昭而化成文不在茲乎于是衍之以先秦西漢廣之以東亰盛唐以逹其枝而導其流可以為文矣于戲日星朗朗河嶽郁郁六經炳炳志在斯文者豈不知從事也哉唐文粹集於宋姚鉉氏唐之人以文名者不獨李杜韓栁騷雅侁侁墳籍彬彬凡有古調皆粹於是矣竊惟鉉也豈以皆金也而純為粹皆玉也而潤為粹唐諸賢金聲琅琅玉光粲粲亦文矣雖不敢擬諸聖門其亦一代之黃鍾拊石也歟是集古有刻夲近亦雕闕婁江國子徐生焴有慨于是購淂古夲翻而鋟之􅎚􅎚成殊類古刻焴亦諸士子中之好古者重以御史中丞毛公之命是故述而序之嘉靖丁亥春二月二日天水胡纘宗世甫序重雕唐文粹序春秋記事也書之謨訓詩之風雅文也而事寓焉相為經緯表裏者也後丗諸史固春秋之法若漢文選唐文粹諸集則詩書之流云耳豈徒以其文一代理亂之故民風國俗之殊禮樂度數文物之賾蓋有史所不能備者是烏可少哉宋姚寶臣所集文粹百卷實本文苑英華十􅎥其一當時服其精確惜其所去取猶不盡出於吾所云者亦唯其文而巳然李唐三四百載之文獻在是矣夫子曰夏禮吾能言之𣏌不足徴也殷禮吾能言之宋不足徵也文獻不足故也欲言唐禮者舍是其何以徵之舊時刻本傳流漸少其存者亦多訛缺讀者病之豫得清溪倪公家藏本公記云脫落者四之一篁墩程編修為豫輔之蓋書于成化癸巳歲豫復手自校讐差完善可讀每自珍惜甲申仲冬以吏部侍郎致政歸過姑蘇太守胡侯世甫出示新本寫善鏤精豫驚喜得竒觀焉回視所藏燕石耳侯曰此太學生徐焴家刻也先生賜之一言引諸端茲集為重徐生亦來謁且堅請豫樂茲集之成也諾之徐生嗜古博藏其刻是集躬自監視一字一畫弗稱必更之同時又有刻文選者皆甫畢工吳下雅尚文事胡守循吏而能文章故人爭趨之舟過嚴陵瀨書此付徐生鑱諸木且以質諸胡侯嘉靖甲申冬十一月丙戌弋陽汪偉器之敘唐文粹序
