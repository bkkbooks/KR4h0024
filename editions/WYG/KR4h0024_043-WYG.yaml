body:
  text: 原道原性原毁原鬼原人已上並韓愈三原原化皮日休原親原仁牛僧孺五規出規處規戲規心規時規已上並元結二惡惡圓惡曲並元結原道韓愈博愛之謂仁行而宜之之謂義由是而之焉之謂道足乎已無待於外之謂徳仁與義為定名道與徳為虛位故道有君子有小人而徳有凶有吉老子之小仁義非毁之也其見者小也坐井而觀天曰天小者非天小也彼以煦煦為仁孑孑為義其小之也則宜其所謂道道其所道非吾所謂道也其所謂徳徳其所徳非吾所謂徳也凡吾所謂道徳云者合仁與義言之也天下之公言也老子之所謂道徳云者去仁與義言之也一人之私言也周道衰孔子沒火于秦黄老于漢佛于晉魏梁隋之間其言道徳仁義者不入于楊則入于墨不入于老則入于佛入于彼必出于此入者主之出者奴之入者附之出者汙之噫後之人其欲聞仁義道徳之説孰從而聽之老者曰孔子吾師之弟子也佛者曰孔子吾師之弟子也為孔子者習聞其説樂其誕而自小也亦曰吾師亦嘗師之云爾不唯舉之于其口而又筆之於其書噫後之人雖欲聞仁義道徳之説其孰從而求之甚矣人之好怪也不求其端不訊其未惟怪之欲聞古之為民者四今之為民者六古之教者處其一今之教者處其三農之家一而食粟之家六工之家一而用器之家六賈之家一而資焉之家六奈之何民不窮且盜也古之時人之害多矣有聖人者立然後教之以相生養之道為之君為之師驅其蟲蛇禽獸而處之中土寒然後為之衣飢然後為之食木處而顛土處而病也然後為之宫室為之工以贍其器用為之賈以通其有無為之醫藥以濟其夭死為之葬埋祭祀以長其恩愛為之禮以次其先後為之樂以宣其壹鬱為之政以率其怠勌為之刑以鋤其强梗相欺也為之符璽斗斛權衡以信之相奪也為之城郭甲兵以守之害至而為之備患生而為之防今其言曰聖人不死大盜不止剖斗折衡而民不爭嗚呼其亦不思而已矣如古之無聖人人之類滅久矣何也無羽毛鱗介以居寒熱也無爪牙以爭食也是故君者出令者也臣者行君之令而致之民者也民者出粟米絲麻作器皿通貨財以事其上者也君不出令則失其所以為君臣不能行君之令而致之民民不出粟米絲麻作器皿通貨財以事其上則誅今其法曰必棄而君臣去而父子禁而相生養之道以求其所謂清浄寂滅者嗚呼其幸而出於三代之後不見黜於禹湯文武周公孔子也其亦不幸而不得出於三代之前不見正於禹湯文武周公孔子也帝之與王其號雖殊其所以為聖一也夏葛而冬裘渇飲而飢食其事殊其所以為智一也今其言曰曷不為太古之無事是亦責冬之裘者曰曷不為葛之之易也責飢之食者曰曷不為飲之之易也傳曰古之欲明明徳於天下者先治其國欲治其國者先齊其家欲齊其家者先修其身欲修其身者先正其心欲正其心者先誠其意然則古之所謂正心而誠意者將以有為也今也欲治其心而外天下國家滅其天常子焉而不父其父臣焉而不君其君民焉而不事其事孔子之作春秋也諸侯用夷禮則夷之夷而進於中國則中國之經曰夷狄之有君不如諸夏之亡也詩曰戎狄是膺荆舒是懲今也舉夷狄之法而加之先王之教之上幾何其不胥而為夷也夫所謂先王之教者何也博愛之謂仁行而宜之之謂義由是而之焉之謂道足乎已無待於外之謂徳其文詩書易春秋其法禮樂刑政其民士農工賈其位君臣父子師友賓主昆弟夫婦其服絲麻其居宫室其食粟米蔬菓魚肉其為道易明而為教易行也是故以之為已則順而祥以之為人則愛而公以之為心則和而平以之為天下國家無所處而不當是故生則得其情死則盡其常郊焉而天神假廟焉而人鬼饗曰斯道也何道也曰斯吾所謂道也非向所謂老與佛之道也堯以是傳之舜舜以是傳之禹禹以是傳之湯湯以是傳之文武周公文武周公傳之孔子孔子傳之孟軻孟軻之死不得其傳焉荀與揚也擇焉而不精語焉而不詳由周公而上上而為君故其事行由周公而下下而為臣故其説長然則如之何其可也曰不塞不流不止不行人其人火其書廬其居明先王之道以道之鰥寡孤獨廢疾者有養也其亦庶乎其可也原性性也者與生俱生也情也者接於物而生也性之品有三而其所以為性者五情之品有三而其所以為情者七曰何也曰性之品有上中下三上焉者善焉而已矣中焉者可導而上下也下焉者惡焉而已矣其所以為性者五曰仁曰禮曰信曰義曰智上焉者之於五也主於一而行於四中焉者之於五也一不少有焉則少反焉其於四也混下焉者之於五也反於一而悖於四性之於情視其品情之品有上中下三其所以為情者七曰喜曰怒曰哀曰懼曰愛曰惡曰欲上焉者之於七也動而處中中焉者之於七也有所甚有所亡然而求合其中者也下焉者之於七也亡與甚直情而行者也情之於性視其品孟子之言性曰人之性善荀子之言性曰人之性惡揚子之言性曰人之性善惡混夫始善而進惡與始惡而進善與始也混而今也善惡分與皆舉其中而遺其上下者也得其一而失其二者也叔魚之生也其母視之知其必以賄死楊食我之生也叔向之母聞其號也知必滅其宗越椒之生也子文以為大戚知若敖氏之鬼不食也人之性果善乎后稷之生也其母無災其始匍匐也則岐歧然嶷嶷然文王之在母也母不憂既生也傅不勤既學也師不煩人之性果惡乎堯之朱舜之均文王之管蔡習非不善也而卒為姦瞽叟之舜鯀之禹習非不惡也而卒為聖人人之性善惡果混乎故曰三子之言性也舉其中而遺其上下者也得其一而遺其二者也曰然則性之上下者終不可移乎曰上之性就學而愈明下之性畏威而寡罪是故上者可教而下者可制也其品則孔子謂不移也曰今之言性者異於此何也曰今之言性者雜佛老而言也雜佛老而言者奚言而不異原毁古之君子其責已也重以周其待人也輕以約重以周故不怠輕以約故人樂為善聞古之人有舜者其為人也仁義人也求其所以為舜者責於己曰彼人也予人也彼能是而我乃不能是蚤夜以思去其不如舜者就其如舜者聞古之人有周公者其為人也多材多藝人也求其所以為周公者責於己曰彼人也予人也彼能是而我乃不能是蚤夜以思去其不如周公者就其如周公者舜大聖人也後世無及焉周公大聖人也後世無及焉是人也乃曰不如舜不如周公吾之病也是不亦責於己者重以周乎其於人也曰彼人也能有是是足為良人矣能善是是足為藝人矣取其一不責其二即其新不究其舊恐恐然惟懼其人之不得為善之利一善易修也一藝易能也其於人也乃曰能有是是亦足矣曰能善是是亦足矣不亦待於人者輕以約乎今之君子其責人也詳其待己也亷詳故人難於為善亷故自取也少已未有善曰我善是是亦足矣己未有能曰我能是是亦足矣外以欺於人内以欺於心未少有得而止矣是不亦待於己者已亷乎其於人也曰彼雖能是其人不足稱也彼雖善是其用不足稱也舉其一不計其十究其舊不圖其新恐恐然惟懼其人之有聞也是不亦責於人者已詳乎夫是之謂不以衆人待其身而以聖人望於人吾未見其尊己也雖然為是者有本有原怠與忌之謂也怠者不能修而忌者畏人修吾常試之矣常試語於衆曰某良士某良士其應者必其人之與也不然則其所疎逺不與同其利者也不然則其畏也不若是强者必怒於言懦者必怒於色矣又常語於衆曰某非良士某非良士其不應者必其人之與也不然則其所疎逺不與同其利者也不然則其畏也不若是强者必悦於言懦者必悦於色矣是故事修而謗興徳髙而毁來嗚呼士之處世而望名譽之光道徳之行難矣將有作於上者得吾説而存之其國家可幾於理也原鬼有嘯於梁從而燭之無見也斯鬼乎曰非也鬼無聲有立於堂從而視之無見也斯鬼乎曰非也鬼無形有觸吾躬從而執之無得也斯鬼乎曰非也鬼無聲與形安有氣曰鬼無聲也無形也無氣也果無鬼乎曰有形而無聲者物有之矣土石是也有聲而無形者物有之矣風霆是也有聲與形者物有之矣人獸是也無聲與形者物有之矣鬼神是也曰然則有怪而與民物接者何也曰是有二説漠然無形與聲者鬼之常也民有忤於天有違於民有爽於物逆於倫而感於氣於是乎鬼有托於形有憑於聲以應之而下殃禍焉皆民之為也其既也又反乎其常曰何謂物曰成於形與聲者土石風霆人獸是也反乎無聲與形者鬼神是也不能有形與聲不能無形與聲者物怪是也故其作而接於民也無恒故有動於民而為福亦有動於民而為禍亦有動於民而莫之為禍福適丁民之有是時也作原鬼原人形於上者謂之天形於下者謂之地命於其兩間者謂之人形於上日月星辰皆天也形於下草木山川皆地也命於其兩間夷狄禽獸皆人也曰然則吾謂禽獸曰人可乎曰非也指山而問焉曰山乎曰山可也山有草木禽獸皆舉之矣指山之一草而問焉曰山乎曰山則不可故天道亂而日月星辰不得其行地道亂而草木山川不得其平人道亂而夷狄禽獸不得其性天者日月星辰之主也地者草木山川之主也人者夷狄禽獸之主也主而暴之不得其為主之道矣是故聖人一視而同仁篤近而舉逺原化皮日休或曰聖人之化出於三皇成於五帝定於周孔其質也道徳仁義其文也詩書禮樂此萬代王者未有易是而能治者也至於東漢西域之教始流中國其民也舉族生敬盡産施濟子去其父夫亡其婦蚩蚩嚚嚚慕其風蹈其閫者若百川蕩滉不可止者何哉所謂聖人之化者不曰化民乎民今知化者惟西域氏而已矣有言聖人之化者則比戸以為嗤豈聖人之化不及西域氏之化邪何其戻也如是曰天未厭亂不世世生聖人其道者存乎言其教者在乎文有違其言悖其教者即戾矣古者楊墨塞路孟子辭而闢之廓如也故有周孔必有楊墨要在有孟子而已矣今西域之教嶽其基溟其源亂於楊墨也甚矣如是為士則孰有孟子哉千載之後獨有一昌黎先生露臂瞋視詬之於千百人内其言雖行其道不勝苟軒裳之士世世有昌黎先生則吾以為孟子矣譬如天下之民皆桀民也苟有一堯民處之一堯民之善豈能化天下桀民之惡哉則有心於道乃堯民矣嗚呼今之士率邪以御衆握亂以治天下其賢尚爾求不肖者反化之不曰難哉不曰難哉原親能嗣其親不曰子乎吾觀夫今之世誨其子者必檟肌篣骨傷愛毁性以為教嗚呼孟子所謂古者易子而教誠有㫖歟不能教其子者是亡其身者也不能得其親者是捨其族者也古者佞臣愛人之貴過乎其親必捨而事之公子開方是也愛人之權過乎其子必殺而狥之易牙是也自兹已降為夫强臣者將欲奪人之宗必殺己子王莽殺子宇是也噫教尚不可况其殺歟或曰均是親也均是害也則周公誅管蔡石碏殺石厚叔向僇叔魚漢文流淮南可乎曰均是親也賢則能嗣親凶則能覆族均是害也周公不誅則他人誅之石碏不殺則他人殺之叔向不僇則他人僇之漢文不流則他人流之已刑則及一人他刑則及其族此聖賢所以惜其族也刑也者仁在其中矣原仁牛僧孺救天下者皆曰仁得天下者皆曰利則可乎曰不可也不得已而有天下則曰仁得已而有者則曰利也善畏其利善決其仁皆聖也湯文王是也原意曰聖人眎生民以天下襁穉在焚溺無不挈者然則挈而授其家乎將遂挈而有之乎彼家無人而有之不得已而仁矣有人而有之則得已而利矣夏無人也謂無微子湯有以仁殷有人也文王畏其利前賢明湯意故無伯夷後聖明文王意故曰周之徳可謂至徳也已矣出規元結元子門人叔將出遊三年及還元子問之曰爾去我久矣何以異乎諾曰叔將始自山中至長安見權貴之盛心憤然切悔比年於空山窮谷與夫子甘飢寒愛水木而已不數月自王公大人卿相近臣之門無不至者及一年有向與歡宴過之可弔有始賀拜候已聞就誅豈不裂封疆土未識豈無印綬懐之未暖其客得禄位者隨死得金玉者皆孥參遊讌者或刑或免叔將之身如犬逃者五六似鼠藏者八九當其時環望天地如置在杯斗之中元子聞之歎曰叔將汝何思而為乎汝若思為社稷之臣則非正直不進非忠讜不言雖手足斧鉞口能出聲猶極忠言與氣偕絶汝若思為禄位之臣猶當避赫赫之路晦顯顯之機如下廏粟馬齒食而已汝忽然望權勢而徃自致身於刑禍之方得筋骨載肉而歸幸也大矣二三子以叔將為戒乎處規州舒吾問元子曰吾聞子多矣竟將何為對曰雲山幸不求吾是林泉又不責吾非熙然能自全順時而老可矣復安為哉舒吾曰元子其過誤乎其大矯也吾厭世人飾言以由道藏智以全璞退身以顯行設機以樹名吾子由之使我何信元子俛而謝之滕許大夫友元子聞不應舒吾之説乃曰嗟嗟元子少辭者邪何不曰使吾得所處但如山林不見吾是非吾將娭音稀而徃也以子為飾言藏智退身設機何不曰如此豈不多於盜權竊位䝉汙萬物富貴始及而刑禍促之者乎元子謝不及季川問曰兟兟兄之别稱義載爾雅終不復二論兟有意乎於戲季川吾有言則自是言達則人非吾安能使吾身之有是而令他人之有非至於聞聞也哉戱規元子友倚於雲丘之巔戲牧兒曰爾為牧􅁔當不責爾暴牧兒歌去乃暴他田田主鞭之啼而寃元子啼不止召其父而止之元子友真卿聞之書過於元子曰嗟嗟次山苟戲小兒俾陷鞭焉而䝉寃之彼牧兒望次山猶儓不敢干其主及苟戲乃或與次山猶仇讎斯豈慎徳也與吾聞君子不苟戲無似非如何惑一兒使不知所以䝉過此非苟戲似非之非者邪惡不必易此元子報真卿曰於戲吾獨立於空山之上戲歌牧兒得過幾不可免彼行於世上有愛憎相忌是非相反名利相奪禍福相從至於有䝉戮辱者焉得不因苟戲似非世兒惑之以及者乎真卿吾當以戲為規心規元子病遊世歸於商餘之中以酒自肆有醉歌夫公聞之􅀈音多元子之酒請歌之歌曰元子樂矣俾和者曰何樂亦然何樂亦然我曰我雲我山我林我泉又曰元子樂矣俾和者曰何樂然爾何樂然爾我曰我鼻我目我口我耳歌已矣夫公曰自樂山林可也自樂耳目何哉人誰無此元子引酒當夫公曰勸君此杯酒緩飲之聽我説子行於世間目不隨人視耳不隨人聽口不隨人語鼻不隨人氣其甚也則須封苞裹塞不爾有滅身亡家之禍傷汙毁辱之患生焉雖王公大人亦不能自主口鼻耳目夫公何思之不熟邪時規乾元己亥漫叟待詔在長安時中行公掌制在中書中書有醇酒時得一醉醉中叟誕曰願窮天下鳥獸蟲魚以充殺者之心願窮天下之醇酎美色以充欲者之心中行公聞之歎曰子何思不盡邪何不曰願得如九州之地者億萬分封君臣父子兄弟之爭國者使人民免賊虐殘酷者乎何不曰願得布帛錢貨珍寳之物溢於王者府藏滿將相權勢之家使人民免飢寒勞苦者乎叟聞公言退而書之授於學者用為時規惡圓元子家有乳母為圓轉之器以悦嬰兒嬰兒喜之母使為之聚孩孺助嬰兒之樂友人公植者聞有喜兒之器請見之及見之趨焚之責元子曰吾聞古之惡圓之士歌曰寧方為皁不圓為卿寧方為汙辱不圓為顯榮其甚者終身不仰視曰吾惡天圓或有喻之以天大無窮人不能極逺視四垂因謂之圓天不圓也對曰天縱不圓為人稱之我亦惡焉次山奈何任造圓轉之器恣令悦媚嬰兒小喜之長必好之教兒學圓且陷不義躬自戲圓又失方正嗟嗟次山入門愛嬰兒之樂圓出門當愛小人之趨圓吾安知次山異日不言圓行圓動圓靜圓以終身乎吾豈次山之友也元子召季川謂曰吾目嬰兒戲圓公植尚辱我言絶忽乎吾與汝圓以應物圓以趨時非圓不預非圓不為公植其操矛㦸刑我乎惡曲元子時與鄰里㑹曲全當時之歡以順長老之意歸泉上叔盈問曰向夫子曲全其歡道然也苟為爾乎元子曰叔盈視吾曲其心以循財利曲其行以希名位當過吾吾苟全一歡於鄰里無惡然可也東邑有全道之士聞元子對叔盈恐曰吾聞元次山約其門人曰無惡我之小曲真惛鄙惡辭也吾輩全直三十年未常曲氣以轉聲曲辭以達意曲步以便徃曲視以回目猶患於古人古人有惡曲者不曲臂以取物不曲膝以便坐見天下有曲於君曲於民曲於鬼神者往劫而死之今元次山苟曲言貌强全一歡以為不䙝其直慁哉若能苟曲於鄰里强全一歡豈不能苟曲於鄉縣以全言行能苟曲於鄉縣豈不能苟曲於邦國以彰名譽能苟曲於邦國豈不能苟曲於天下以揚徳義若言行名譽徳義偕顯豈有鍾鼎不入門權位不在已乎嗚呼曲為之小為大之漸曲為之也有何不可姦邪凶惡其㘥音由乎元子聞之頌曰吾以顔貌曲全一歡全直君子之惡我如此由有過於此者何以自免唐文粹巻四十三欽定四庫全書唐文粹巻四十四上宋姚鉉編
