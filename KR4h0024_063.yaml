body:
  text: 吳興姚鉉碑十五揔七首釋三碑隂記銘附舒州山谷寺三祖鏡智禪師碑獨孤及三祖大師碑隂記張彥遠六祖能禪師碑王維曹溪第六祖大鑒禪師第二碑劉禹錫佛衣銘潭州太溈山同慶寺大圓禪師碑鄭愚蘄州龍興寺故法現大師碑李適之舒州山谷寺覺寂塔隋故三祖鏡智禪師碑銘并序獨孤及按前志禪師號僧璨不知何許人出見於周隋間傳教於惠可大師摳衣鄴中得道於司空山謂身相非真故示有瘡疾謂法無我師故居不擇地以衆生病為病故所至必説法度人以一相不在內外中間故必言不以文字其教大略以寂照妙用攝羣品流注生滅觀四維上下不見法不見身不見心乃至心離名字身等空界法同夢幻無得無證然後謂之解脫禪師率是道也上膺付囑下拯昏疑大雲垂廕國土皆化謂南方教所未至我是以有羅浮之行其來不來也其去無去也既而以袈裟與法俱付悟者道存形謝遺骨此山今二百歲矣皇帝即位後五年歲次庚戍某剖符是州登禪師遺居周覽陳迹明徴故事其茶毗起塔之制實天寶景戍中别駕前河南少尹趙郡李公常經始之碑版之文隋內史侍郎河東薛公道衡唐相國刑部尚書贈太尉河南房公琯繼論撰之而尊道之典易名之禮則朝廷方以多故而未遑也長老比丘釋湛然誦經於靈塔之下與澗松俱老痛先師名氏未經邦國焉與禪衆寺大律師釋澄俊同寅叶恭亟以為請會是歲嵩丘大比丘釋惠融至自廣陵勝業寺大比丘釋開悟至自廬江俱纂我禪師後七葉之遺訓日相與歎塔之不命號之不崇懼象法之本根墜于地也願申無邊衆生之弘誓以杼罔極楊州牧御史大夫張公延賞以狀聞於是七年夏四月上霈然降興廢繼絶之詔册諡禪師曰鏡智塔曰覺寂以大德僧七人灑掃供養天書錫命暉煥崖谷衆庶踴躍謂大乘中興是曰大比丘衆議立石于塔東南隅紀心法興廢之所以然某以謂初中國之有佛教自漢孝明始也歷魏晉宋齊及梁武言第一義諦者不過布施持戒天下惑於報應而人未知禪世與道交相喪至菩提達摩大師始示人以諸佛心要人疑而未思惠可大師傳而持之人思而未修逮禪師三葉其風寖廣真如法味日漸月漬萬木之根莖枝葉悉沐我雨然後空王之密藏二祖之微言始行於世間浹於人心當時聞道於禪師者其淺者知有為法無非妄想深者見佛性於言下如燈之照物朝為凡夫夕為聖賢雙峯大師道信其人也其後信公以教傳弘忍忍傳惠能神秀秀公傳普寂寂公之門徒萬人升堂者六十有三得自在惠者一曰弘正正公之廊廡龍象又倍焉或化嵩洛或之荆吳自是心教之被於世也與六籍侔盛嗚戲微禪師吾其二乘矣後代何述焉庸詎知禪師之下生不為諸佛故現比丘身以救濁劫乎亦猶堯舜既往周公制禮仲尼述之遊夏弘之使高堂后蒼徐孟戴慶之徒可得而祖焉天以聖賢所振為木鐸其揆一也諸公以為司馬子長立夫子世家謝臨川撰惠逺法師碑銘今將令千載之後知先師之全身禪門之權輿王命之追崇在此山也則揚其風紀其時冝在法流某嘗味禪師之道也久故不讓其銘曰人之靜性與生偕植知誘於外染為妄識如浪斯鼓與風動息淫駭貪怒為刃為賊生死有涯緣起無極如來憫之為闢度門即妄了真以證覺源啓迪心印貽我後昆間生禪師俾以教尊二十八世迭付微言自摩訶迦葉以佛所付心法遞相傳至師子比丘凡二十五世自達摩大師至禪師又三世共二十八世也如如禪師膺期弘宣世溷法滅獨與道全周武下令滅佛法禪師隨可大師隱遁司空山十有三年童蒙來求我以意傳攝相歸性法身乃圓性身本空我為説焉如如禪師道既棄世將二十紀朝經乃屆皇明昭賁億兆膜拜凡今後學入佛境界於取非取誰縛誰解初禪師謂信公曰汝何求曰求解脫曰誰縛汝誰解汝曰不見縳者不見解者然則何求信公於是言下證解脫知見遂頂禮請益是日禪師授以祖師所傳袈裟也萬有千歲此法無壞三祖大師碑隂記張彥逺大曆初彥逺曽祖魏國公留守東都兼河南尹洛陽當孽火之後寺塔皆為丘墟迎致嵩山沙門澄沼修建大聖善寺沼行為禪宗德為帝師化滅詔諡大辨即東山第十祖也洎鎮於蜀皆有崇飾在淮南奏三祖大師諡號與塔額刺史獨孤君為之碑張從申書字夫稟儒道以理身理人奉釋氏以修心修性其揆一也會昌天子滅佛法塔與碑皆毀像雖毀而法不能滅是法也不在乎塔不在乎碑大中𥘉塔復置而碑未立咸通二年八月遂與沙門重議刋建舒州刺史河東張彥逺書于碑之隂六祖能禪師碑銘并序王維無有可捨是達有源無空可住是知空本離寂非動乘化用常在百法而無得周萬物而不殆鼓栧海師不知菩提之行散花天女能變聲聞之身則知法本不生因心起見見無可取法則常如世之至人有證於此得無漏不盡漏度有為非無為者其惟我曹溪禪師乎禪師俗姓盧氏某郡某縣人也名是虛假不生族姓之家法無中邊不居華夏之地善習表於兒戲利根發於童心不私其身臭味於耕桑之侣茍適其道羶行於蠻貊之鄉年若干事黃梅忍大師願竭其力即安於井臼素刳其心獲悟於稊稗每大師登座學衆盈庭中有三乘之根共聽一音之法禪師默然受教曽不起豫退省其私逈超無我其有猶懷渴鹿之想尚求飛鳥之迹香飯未消弊衣仍覆皆曰升堂入室測海窺天謂得黃帝之珠堪授法王之印大師心知獨得謙而不鳴天何言哉聖與仁豈敢子曰賜也吾與汝不如臨終遂密授以祖師袈裟謂之曰物忌獨賢人惡出已豫且死矣汝其行乎禪師遂懷寶迷邦銷聲異域衆生為淨土雜居止於編人世事是度門混農商於勞侣如此積十六載南海有印宗法師講涅槃經禪師聽於座下因問大義質以真乘既不能酬翻從請益乃歎曰化身菩薩在此色身肉眼凡夫願開惠眼遂領徒屬盡詣禪居奉為挂衣親自削髮於是大興法雨普灑客塵乃教人以忍曰忍者無生方得無我始於成初發心以為教首至於定無所入惠無所依大身過於十方本覺超於三世根塵不滅非色滅空行願無成即凡成聖舉足下足長在道場是心是情同歸性海商人告倦自息化城窮子無疑直開寶藏其有不植德本難入頓門妄繫空花之狂曽非惠日之咎常歎曰七寶布施等恆河沙億劫修行盡大地墨不如無為之運無礙之慈弘濟四生大庇三有既而道德遍覆名聲普聞泉館卉服之人去聖歷劫塗身穿耳之國航海窮年皆願拭目於龍象之姿忘身於鯨鯢之口駢立於戶外趺坐於牀前林是旃檀更無雜樹華惟薝蔔不嗅餘香皆以實歸多離妄執九重延想萬里馳誠思布髮以奉迎願又手而作禮則天太后孝和皇帝並勑書勸論徴赴京城禪師子牟之心敢忘鳳闕逺公之足不過虎溪固以此辭竟不奉詔遂送百衲袈裟及錢帛等供養天王厚禮獻玉衣於幻人女后宿因施金錢於化佛尚德貴物異代同符至某載月日忽謂門人曰吾將行矣俄而異香滿室白虹屬地飯食訖而敷坐沐浴畢而更衣彈指不留水流燈熖全身永謝薪盡火滅山崩川竭鳥哭猿啼諸人唱言人無眼目列郡慟哭世且空虛某月日遷神於曹溪安坐於某所擇吉祥之地不待靑烏變功德之林皆成白鶴嗚呼大師至性淳一天姿貞素百福成相衆妙會心經行宴息皆在正受談笑語言曽無戲論故能五天重迹百越稽首修蛇雄虺毒螫之氣銷跳殳彎弓猜悍之風變畋漁悉罷蠱鴆知非多絶羶腥效桑門之食悉棄罟網襲稻田之衣永惟浮圖之法實助皇王之化弟子曰神會遇師於晚景聞道於中年廣量出於凡心利智踰於宿學雖末後供樂最上乘先師所明有類獻珠之顧世人未識猶多抱玉之悲謂余知道以頌見託偈曰五藴本空六塵非有終生倒計不知正受蓮花承足楊枝生肘苟離身心孰為休咎至人達觀與佛齊功無心捨有何處依空不著三界徒勞八風以兹利智遂與宗通愍彼偏方不聞正法俯同惡類將興善業教忍斷嗔修慈捨獵世界一華祖宗六葉大開寶藏明示衣珠本源常在妄轍遂殊過動不動離俱不俱吾道如是道豈在吾道遍四生常依六趣有漏聖智無義章句六十二種一百八喻悉無所得應如是住大唐曹溪第六祖大鑒禪師第二碑并序劉禹錫元和十一年某月日詔書追褒曹溪第六祖能公諡曰大鑒實廣州牧馬揔以疏聞繇是可其奏尚道以尊名同歸善善不隔異教一字之褒華夷也懷得其所故也馬公敬其事具謹始以垂後遂咨于文雄今柳州刺史河東柳君為前碑後三年有僧道琳率其徒由曹溪來且曰願立第二碑學者志也惟如來滅後中五百歲而摩騰竺法蘭以經來華人始聞其言猶夫重昏之見䀛爽後五百歲而達摩以法來華人始傳其心猶夫昧旦之覩白日自達摩六傳至大鑒如貫意珠有先後而無同異世之言真宗者所謂頓門𥘉達摩與佛衣俱來得道傳付以為真印至大鑒置而不傳豈以是為筌蹄邪芻狗邪將人之莫已若而不若置之邪吾不得而知也按大鑒生新州三十出家四十七年而殁既殁百有六年諡始自蘄之東山從第五師得授記以師高宗使中貴人再徴不奉詔第以言為貢上敬行銘曰至人之生無有種類同人者形出人者智蠢蠢南裔降生傑異父乾母坤獨肖元氣一言頓悟不踐初地五師相承授以寶器宴坐曹溪世號南宗學徒爰來如水之東飲以妙藥差其瘖聾詔不能致許為法雄去佛日逺羣言積億著空執有各走其域我立真筌揭起南國無修而修無得而得能使學者還其天識如黑而迷仰見斗極得之自然竟不可傳口傳手付則礙于有留衣空堂得者天授佛衣銘并序吾既為僧琳撰曹溪第二碑且思所以辨六祖置衣不傳之旨作佛衣銘曰佛言不行佛衣乃爭忽近貴逺古今常情尼父之生土無一里夢奠之後履存千祀惟昔有梁如象之狂達磨救世來為醫王以言不痊因物乃遷如執符節行乎復關民不知官望車而畏俗不知佛得衣為貴壞色之衣道不在兹由之信道所以為寶六祖未彰其出也微既還狼荒憬俗蚩蚩不有信器衆生曷歸是開便門非止傳衣𥘉心有終傳豈無巳物必歸盡衣胡久恃先終知終用乃不窮我道無阿衣於何有其用巳陳孰非芻狗潭州大溈山同慶寺大圎禪師碑銘并序鄭愚天下之言道術者多矣各用所宗為是而五常教化人事之外於性命精神之際史氏以為道家之言故老嚴之類是也其書具存然至於蕩情纍外生死出於有無之間昭然獨得言象不可以擬議勝妙不可以意況則浮屠氏之言禪者庶幾乎盡也有口無所用其辨巧曆無所用其數愈得者愈失愈是者愈非我則我矣不知我者誰氏知則知矣不知知者何以無其無不能盡空其空不能了是者無所不是得者無所不得山林不必寂城市不必喧無春夏秋冬四時之行無得失是非去來之迹非盡無也冝於順也遇所即而安故不介於時當其處無必故不局於物其大旨如此其徒雖千百得者無一二近代言之者必有宗宗必有師師必有傳然非聰明瑰宏傑達之器不能得其傳當其傳是皆時之鴻厖偉絶之度也今長沙郡西北有山名大溈蟠林穹谷不知其變幾千百里為羆豹虎兕之封虺蜮蚺蟒之宅雖夷人射獵虞邇樵氓不敢從也師始僧號靈祐福州人笠首屩足背閩來遊菴於翳薈非食時不出栖栖風雨默坐而巳恬然晝夕物不能害非夫外生死忘憂患冥順天和者孰能與於是哉昔孔門殆庶之士以簞瓢樂陋巷夫子由稱詠之不足言人不堪其憂以其有生之厚也且生死於人得喪之大者也既無得於生必無得於死既無得於得必無得於失故於其間得失是非所不容措委化而巳其為道術天下之能事畢矣皆涉語是非之端辨之益惑無補於學者今不論也師既以兹為事其徒稍稍知其徙從之則與之結搆廬室與之代去隂黑以至於千有餘人自為飲食綱紀而於師言無所是非其有問者隨語而答不強所不能也數十年言佛者天下以為稱首武宗毀寺逐僧遂空其所師遽裹首為民惟恐出蚩蚩之輩有識者益貴重之矣後湖南觀察使故相國裴公休酷好佛事值宣宗釋武宗之禁固請迎而出之乘之以已輿親為其徒列又議重削其須髮師始不欲戲其徒曰爾以須髮為佛邪其徒愈強之不得巳又笑而從之復到其所居為同慶寺而歸之諸徒復來其事如初師皆幻視無所為意忽一二日笑報其徒示若有疾以大中七年正月九日終於同慶精廬年八十三僧臘五十五即窆於大溈之南阜其徒言將終之日水泉旱竭禽鳥號鳴草樹皆白雖有其事語且不經又非師所得之意故不書師始聞法於江西百丈懷海禪師諡曰大智其傳付宗系僧誄甚明此不復出師亡後十一年徒有以師之道上聞始詔加諡號及墳塔以盛其死豈達者所為邪噫人生萬類之最靈者而以神精為本自童孺至老白首始於飲食漸於功名利養是非嫉妬得失憂喜晝夜纏縳又其念慮未嘗時餉歷息煎熬形器起如冤讎行坐則思想􅢰卧則魂夢以耽沈之利欲役老朽之筋骸餐飯既耗齒髮已弊由拔白餌藥以從其事外以夸人內以欺巳曽不知息隂休影捐慮安神自求須臾之暇以至溘然而盡親交不啻行路利養悉歸他人愧負積於神明辱殆流於後嗣淫渝汗漫不能自止斯皆自心而發不可不制以道術道術之妙莫有及此佛經之説益以神性然其歸趣悉臻無有僧事千百不可梗概各言宗教自號矛楯故褐衣髠首未必皆是若豫者少抱幽憂之疾長多羇旅之役形凋氣乏嘗不逮人行年五十已極遲暮既無妻子之戀思近田閭之樂非敢強也恨不能也況洗心於是踰三十載適師之徒有審虔者以師之圖形自大溈來知豫學佛求為贊説觀其圖狀果前所謂鴻厖偉絶之度者也則報之曰師之形實無可贊心或可言心又無體自忘吾説審虔不信益欲贊之云云既與其贊則又曰吾從居大溈者尚多感師之開悟者不一相與伐石欲碑師之道於精廬之前欲其文辭近吾師之側謂豫又不得不為也豫笑不應後十來豫門益堅其説且思文字之空與碑之妄空妄既等則又何虞咸通六年歲在乙酉草創其事會豫有疾明年二月始訖其銘又因其説以自警觸故其立意不專以褒大溈之事云爾銘曰湖之南湘之西山大溈深無蹊虎巳嘯猿又啼雨槭槭風淒淒高入雲不可梯雖欲去誰與摧彼上人忘其身一宴坐千餘旬去無踈來無親夷積阻構嶙峋棟字成供養陳我不知徒自勤物之生孰無情識好惡知寵驚真物藏百慮呈隨婉轉任崢嶸雲糊天月不明金在礦火收罃我不知天地先無首尾功用全六度備萬行圎常自隨在畔邊要即用長目前非艱難不幽玄哀世徒苦馳驅覔作佛何其愚算海沙登迷廬眼喘喘心區區見得失繫榮枯棄知覺求形模近似逺易復難但無事心即安少思慮簡悲歡淨蕩蕩圓團團更無物不勞看聽他語被人謾生必死理之常榮必悴非改張造衆罪欺心王作少福須天堂善惡報正身當自結裹無人將心作惡口説空欺木石嚇盲聾牛阿房鬼五通專覷捕見西東禁定住陽朦朧與作為事不同最上乘有想基無結淨本無為人不見自心知動便是莫狐疑直下説沒文詞識此意見吾師大唐蘄州龍興寺故法現大禪師碑銘并序李適之古之聖人乘時迭用贊神道立人倫所以為理者也理之為極故受之以無為昔之真人歸根去羡探有物入無窮所以為久者也久幾乎息故受之以實際於是大雄有作大覺無邊常樂常住不生不滅鑒阿僧而示開闢傳法印而逾繩契映明月而小玄珠位輪王而卑五帝去聖日逺多門互出名數棼絲言説滋蔓粵有紹興法寶超詣真宗由密意而到淸涼域秉圎照而入空寂舍無聞無示非穿非鑿斷諸委曲直見本源其事業有如此者我大師其人也禪師諱法現弋陽人本名法顯避中宗廟諱於是改焉即雙峯忍禪師門人也俗姓宣氏出自周宣王盛於元魏代禪師儀表端嚴眉宇森秀人相具足梵音淸暢乘運而應數隨方而立表以濟南浮之人以嗣東山之業𥘉母在孕不喜葷辛及誕之後每以沙上戲為佛塔志學之歲逺方訪道年十有九爰就剃落始配住福田寺其後以選更隸龍興寺焉後因捧盂上堂逢一神僧顔赤如醉語師曰汝可名法顯因忽不見年滿受具遂以此名年二十五次因寺事差往鄱陽所憩之家皆同舊識或云宿昔夢師之來儀服宛如所見設供養者皆蒙誘掖闔門盡里同發菩提心爾時鄱陽大旱師為授戒二千餘人事畢天晶無雲其夜雨雪盈尺隨緣利物殊類齊感在舟則異鱗呈質使漁者收綸登陸則困鹿求哀而獵者束矢所過古寺廢塔雖獨而止猛獸惡龍山精水魅毒氣生煙火衆魔成軍陳坦若虛舟莫能惱害至永淳歲有三婆羅門寄金銀珠寶於師復置牀簣而歸西域其後有賊劫房惟此諸寶獨在出入三載主乃東來各以還之封緘如故母氏遣師預修巳墓寺前南嶺地為吉祥掘皆巨石不可開動巳經數日師意彌專忽有一人來詣掘所作禮既畢出一編書與師遂云為師穿墓觀其用壯逮非人功信宿掘成不知所在開其留書乃菩提逹磨之論也及築墳傳土每夕有猛獸踏迹如杵倐然墓成經一十八年母何氏壽八十有六既耆而艾無疾而終師廬於墳所遂經二載形體臞瘠僅能識者每有人濳獻牛乳其味凝厚衆疑有異後加驗問莫知所從嘗置碗佛前乃成舍利旬日之後碗中有聲沃而滌之金光浮出連珠成貫色有似榴者其後漸多至百餘粒他州造塔者皆來請之分與而去夫其異應不可思議乃菩提之示現者矣大易云神道設教然則至人無迹至化無名萬緣盡空一切不動此皆善靈扶護示相云為因感而來無幽不兆咸莫知其所以豈我師之意乎徒觀逺衆響臻羣疑景附惟分請益波回山積有迷有達或飢或渴禪師發以希聲之音現以隨緣之相如振風之過衆竅似膏雨而成百榖至有求明義學談説人天三論飲其辨才九部矜其理窟及乎對詢真賾不覺神醉大巫捨筏靡旗廢講焚疏因而退密專至攝心有初地弟子左相兼兵部尚書李適之往以先君佐蘄瞻言歸省因得禮尊儀於密座委弱質於專門持心苦體不捨晝夜尋遘私艱重集于蓼無怙何恃創巨舋窮負土墳傍泣血廬次大師哀其劬頓假以梯航引於煨燼之區拔於冤毒之海其後皇圖復禹重構維城神龍之中璽書再降授朝請大夫旋追赴京輦禪師遂敷宰官之義強弟子以行雖間闊積年而誨誘無逺屬有東信至自蘄春方承八年諱問具説最後功德恨不親聞付囑是用觸緒悲涼復次使者言師以開元八年六月初於本寺精舍結跏趺坐積十三日不更飲食無復煩惱因禪不解便入無餘春秋七十有八是日雲物變異香氣晦合池水自黑林鳥皆悲座前白蓮枯卷堂後列柏凋瘁四部雷動三界窪泣或絶于地或訴于天嗚呼慈父忍棄窮子一定巳來全軀不壞髮長膚軟紅爪丹脣經今二十年竟不敢遷閉近日薄加香漆四衆供養如生故知不盡之明與劫代而相弊應見之相豈堅林之可焚徒徴夢幻之言莫見去來之迹然則建之於常空有立之於不皎昧難可以智知孰能以識識住持強固永為宗極以適之心存遺偈力荷慈緣髣佛礦鑠依俙火傳摛其勿照之曜著以忘言之筌敢申頌玄德以昭播人天其詞曰皇矣能仁弘宣妙覺彼上人者是為禪族繼體前聖傳燈後學舟梁愛河掎拔情嶽肇允光相翻飛度門偈傳心極神授名尊霰零嚴戒盜入重昏窮魚脫泉困獸還魂獨絶人代蒸在林野魔屬不神善緑來假乳似麋獻編同圯下度無量人實無度者諸行圓滿庶類知歸往虛來實遇病為醫大雲澍雨惠日揚輝事復無事機反於機我於往昔天方荐瘥倣徉推極荼毒謂何孰承最上密受居多未究深海旋驚尺波變異濳感悲憂斷絶皆發大怖遍身見血深入靜思義開形閉當知恆住敢告非滅重校正唐文粹卷第六十三
