body:
  text: 與李諌議行方書孫樵樵嘗為日蝕書以為國家設諌官期換君心之非不以一咈其言而怠於諌即繼以死非其職邪執事居其官亦嘗有意於此乎開元之間豈特諌官而後言邪苟立天子廷者皆得開口奮舌爭於上前故自貞觀已還開元之政最為修明及林甫舞智以固權張詐以聾上於是束羣僚之口縛諌官之舌且以法中敢言者由是林甫之惡熾而勿復聞祿山之逆祕而勿復知天寳之政由此而荒矣今者下無林甫遏諌之權上有開元虚已之勞如此則叙立明庭者皆得道上是非不顧時忌矧執事官曰諌議哉執事則不能言避其官而逃其祿可也官秩優而位崇者少邪今年三月上嘗欲營治國門執事尚諌罷之今者詔營廢寺以復羣髠三年之間斤斧之聲不絶度其經費豈特國門之廣乎稽其所務豈特國門之急乎何執事在國門則知諌在佛寺則緘黙勇其細而怯其大豈諌大夫職邪樵以為大蠧生民者不過羣髠武皇帝發憤除之冀活疲甿今天下之民喘未及息國家復欲興既除之髠以重困之将何以致民於蕃富乎樵不知時態竊所憤勇故作奏書一通以明羣髠大蠧之由生民重困之原無路上聞輒以寓獻執事儻以樵書為不狂試入為上言其略荅孟郊論仕進書獨孤郁某還白天下病不言久矣吾子猥貺嘉言以篤鄙人之志是勗天下之心也幸何獨乎鄙人也利何獨乎是文邪夫言豈一端而已矣知惡而不言是使天下之為惡不思乎其懼也知善而不言是使天下之為善者不勸其慕也此二者天下之達道也僕嘗論之安敢不爭斯語直以阨䝉摧頽吾子之所聞見雖欲激昻以是非天下其誰一從僕之所云邪吾子知僕將宦遊訪僕曰是役也為身之役歟為人之役歟意甚善古人曰仕非為貧也又曰君子之仕行其義也僕雖不肖寜獨以衣服飲食犬馬聲色屋室使僕之屑屑歟僕将沈棄蹇連乎則撫循吾之軀何為也其将奮飛騰凌乎則君之建官行封豈私吾飢而寒也又曰親戚處乎大位力主人也足下之所謂親戚者曷若僕之有身邪足下所待僕之寜以曲私從義乎天下之君子固當有以自力也粤其果有茂異僕幸側聞其風曷敢不踴躍話道于彼不識況親戚之無間乎苟不能藉此第僕能貴富之且猶莫許而況又妄於他人邪又曰不待位而言之大道之言也信哉古人有庶人謗於道商旅議於市芻蕘者得進其狂妄焉足下念僕孱性而欲輔僕愚心共主公於天下是直諒多聞之益也其則何幸其将責僕以必聞以至公之道為市賈於天下也且何人哉昔張安世為大司馬車騎将軍錄尚書事嘗有所薦其人来謝安世大恨以舉賢進能豈有私邪謝絶之有郎功髙不調而自言安世應曰君之功髙明主所知人臣執事何短長而自言乎絶不許已而郎遷幕府長史郎辭去之官安世問以過失長史曰将為明主股肱而士無所進論者以為譏安世曰明主在上賢不肖較然臣下自修而已何知上而薦之其匿名跡逺權勢如此彼推揚賢哲乃公卿大夫四岳十二牧之職也而富平隂陽用不敢當如僕璅璅方困奈何以上官他人之任反以許乎人哉東野用心冀有以相照幸無以僣越之道深望於鄙人也某頓首與鄭駙馬書張説晩尋荘周書以天地為國道徳為身老室之户牖孔門之棖闑足可反覆孝慈胎育仁義而晉朝賢士乃祖尚浮虚弛廢禮樂其所遺失将詣真宗不愈逺也老稱歸根曰靜復命知常復命近於無有知常其有知見邪斯故反照爾孔云窮神知化徳之盛者神不可窮而窮之是神合於我化不可知而知之是化為我用唯此二義繄荘生亦不始盡言焉非滎陽之深於道者孰為輕導兹意也與濟法師書白居易月日弟子太原白居易白濟上人侍者昨者頂謁時不以愚䝉言及佛法或未了者許重討論今經典間未諭者其義有二欲面問荅恐彼此卒卒語言不盡故粗形於文字願詳覽之敬佇報章以開未悟所望所望佛以無上大慧觀一切衆生知其根性大小不等而以方便智説方便法故為闡提説十善法為小乗説四諦法為中乗説十二因縁法為大乗説六波羅密法皆對病根投以良藥此蓋方便敎中不易之典也何者若為小乗人説大乗法心則狂亂狐疑不信所謂無以大海内於牛跡也若為大乗人説小乗法是以穢食置於寳器所謂彼自無創勿傷之也故維摩經摠其義云為大醫王應病與藥又首楞嚴三昧經云不先思量而説何法隨其所應而為説法正是此義耳猶恐説法者不隨人之根性也故又法華經戒云若但讃佛乗衆生没在罪苦不能信是法破法不信故如此非獨慮説者不能救病亦懼聞者不信没入罪苦也則佛之付囑豈不丁寜邪何則法王經云若定根基為小乗人説小乗法為大乗人説大乗法為闡提人説闡提法是斷佛性是滅佛身是説法人當歴百千萬劫墮諸地獄縱佛出世猶未得出若生人中缺脣無舌獲如是報何以故衆生之性即是法性從本已来無有增减云何於中分别病藥又云於諸法中若説髙下即名邪説其口當破其舌當裂何以故一切衆生心垢同一垢心淨同一淨衆生若病應同一病衆生須藥應同一藥若説多法即名顛倒何以故為妄分别坼善惡法破一切法故隨機説法斷佛道故此又了然不壊之義也又金剛經云是法平等無有髙下是名阿耨多羅三藐三菩提又金剛三昧經云皆以一味道終不以小乗無有諸雜味猶如一雨潤據此後三經則與前三經義甚相戾也其故何哉若云依維摩詰謂冨樓那云先當入定觀此人心然後説法又云不觀人根不應説法夫以冨樓那之通慧又親奉如来為大弟子尚未能觀知人心況後五百歲末法中弟子豈盡能觀知人心而後説法乎設使觀知人心若彼發小乗心而為説大乗法可乎若未能觀彼心而率已意説又可既乎未能觀與黙然不説又可乎若云依義不依語則上六經之義互相違反其将孰依乎若云依了義經則三世諸佛一切善法皆從此六經出孰名為不了義經乎況諸經中與維摩法華首楞嚴之説同者非一也與法王金剛金剛三昧之説同者亦非一也不可徧舉故於二義中各舉三經此六經皆上人常所講讀者今故引以為問必有甚深之㫖焉今且有人忽問法於上人上人或能觀知其心或未能觀知其心将應病與藥而為説邪将同一病一藥而為説邪若應病藥是有髙下是有雜味即反法王等三經之義豈徒反其義又獲如上所説之罪報矣若同一病一藥為説必當説大乗大乗即佛乗也若讃佛乗且不隨應且不救病即反維摩等三經之義豈徒反其義又使衆生没在罪若矣六者皆如来説如来是真語實語不誑語不異語者今隨此則反彼順彼則逆此設有問者上人其将何法以對焉此其未喻者一也又五藴者色受想行識是也十二因縁者無明縁行行縁識識縁名名縁色色縁六入六入縁觸觸縁受受縁愛愛縁取取縁有有縁生生縁老死病苦憂悲苦惱是也夫五藴十二因縁蓋一法也蓋一義也略言之則為五詳言之則為十二雖名數多少或殊其於倫次轉遷合同條貫今五藴中則色受想行識相次而十二縁中則行識色入觸受想縁一則色在行前一則色次行後正序之既不類逆倫之又不同若謂佛次第而言則不應是此雜亂若謂佛偶然而説則不當名為因縁前後不論其義安在此其未諭者二也上人耆年大徳後學宗師就出家中又以説法而作佛事必能研精二義合而通之仍望指陳者於翰墨蓋欲藏於篋笥永永不忘也其餘疑義亦續啟問居易頓首與崔連州論石鍾乳事書栁宗元某白前所以致石鍾乳非良聞子敬所餌與此類又聞子敬時憤悶動作宜以為未得其粹美而為麤鑛燥悍所中懼傷子敬醇懿仍習謬誤故勤以為告也再獲書辭辱徴引地理證驗過數百言以為土之所出乃良無不可者是将不然夫言土之出者固多良而少不可不謂其咸無不可也草木之生也依於土然即其類也而有居山之隂陽或近水或附石其本性移焉又況鍾乳産於石石之精麤踈密尋尺特異而穴土之上下其土之薄厚石之髙下不可知則依而産者固不一性然由其精密而出者則油然而清炯然而耀其竅滑以夷其肌㢘以㣲食之使人榮華温柔其氣宣流生胃通腸夀善康寜心平意舒其樂愉愉由其麤踈而下者則奔突結澁乍大乍細色如枯骨或類死灰淹顇不發叢齒積纇重濁頑樸食之使人偃蹇抑鬱泄火生風㦸喉癢肺幽悶不聰心煩喜怒肝舉氣剛不能和平故君子慎焉取其色之美而不必惟土之信以求至精凡為此也幸子敬餌之近不至於是故可止禦也必若土之出無不可者則東南之竹箭雖旁岐揉曲皆可以貫犀革北山之木雖離竒液瞞空中立枯者皆可以梁百尺之觀航千仞之淵冀之北土馬之所生凡其大耳短脰拘攣踠跌薄蹄而曳者皆可以勝百鈞馳千里雍之塊璞皆可以備砥礪徐之糞壤皆可以封大社荆之茅皆可以縮酒九江之龜皆可以卜泗濵之石皆可以擊考若是而不大謬者少矣其在人也則魯之晨飲其羊開轂而輠輪者皆可以為師盧之沽名者皆可以為大毉西子之里惡而臏者皆可以當侯王山西之冒没輕儳沓貪而忍者皆可以鑿凶門制閫外山東之稚騃樸鄙力農桑㗖棗栗者皆可以謀謨於廟堂之上若是則反倫悖道甚矣何以異於是物哉是故經中言丹砂者類芙蓉而有光言當歸者似馬尾蠶首言人參者似人形黄芩似腐腸附子八角甘遂赤膚之類不可悉數若果土宜乃善則云生某所不當云某者良也又經注云始興為上次乃廣連則不必服正為始興也今再三為言者惟欲得其精英以固子敬之夀非以知藥石角技能也若以服餌不必利已姑務勝人而誇辯博素不望此於子敬其不然明矣故畢其説某白唐文粹卷八十三欽定四庫全書唐文粹巻八十四宋姚鉉編書六揔一十一首
