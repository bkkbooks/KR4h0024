  - {type: variant, offset: 12853, length: 0, content: '', WYG: 問秦人謡古之奇時興楊賁聞砧有感吕温野田行于鵠贈馮宿李觀偶然作二首吕温及第後答潼闗主人朝饑賈㠀九日酬顧少府髙適感物十六觀玉篇陳子昻素絲陸龜蒙李都尉古劒白居易廢琴廢瑟詞張籍説劒元稹春桂問答二首王績養鷙詞劉禹錫對菊賈島直鉤吟盧仝競渡元稹見牧牛人擔青草張説道州觀野火吕温諭寶二首元稹春感八送春曲三首劉禹錫衡州春早二首吕温尋人偶題邵真題花樹楊衡惜花陸龜䝉秋感六秋日耿緯秋夕懐逺孟郊蟋蟀詩羅隱秋思司空圖在郡秋懐二首張九齡感遇詩三十八首陳子昻微月生西海幽陽始化昇圓光正東滿隂魄已朝凝太極生天地三元更廢興至精諒斯在三五誰能徴蘭若生春夏芊蔚何青青幽獨空林色朱蕤冒紫莖遲遟白日晩嫋嫋秋風生嵗華盡摇落芳意竟何成蒼蒼丁零塞今古緬荒途亭堠何摧兀暴骨無全軀黄沙漠南起白日隱西隅漢甲三十萬曽以事匈奴但見沙場死誰憐塞上孤樂羊為魏將食子殉軍功骨肉且相薄他人安得忠吾聞山中相乃屬放麑翁孤獸猶不忍况以奉君終市人矜巧智於道若童蒙傾奪相夸侈不知身所終曷見𤣥真子觀世玉壺中杳然遺天地乘化入無窮吾觀龍變化乃知至陽精石林何冥宻幽洞無留行古之得仙道信與元化并𤣥感非象識誰能測淪冥世人拘目見酣酒笑丹經崐崘有瑶樹安得采其英白日每不歸青陽時暮矣茫茫吾何思林卧觀無始衆芳委時晦鶗鴂悲鳴耳鴻荒古已頽誰識巢居子吾觀崐崘化日月淪洞冥精魄相交構天壤以羅生仲尼推太極老聃貴窈冥西方金仙子崇議乃無明空色皆寂滅業縁定何成名教信紛籍死生俱未停聖人祕元命懼世亂其真如何嵩公輩詼譎誤時人先天誠為美階亂禍誰因長城備胡冦嬴禍發其親赤精既迷漢子年何救秦云去桃李花多言死如麻深居觀羣動悱然爭朶頤讒説相啖食利害紛㘈㘈便便夸毗子榮耀更相持務光讓天}
