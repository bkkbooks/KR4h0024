body:
  text: 記已揔一十首浮圖九撫州寶應寺律藏院戒壇記顔真卿孤山永福寺石壁法華經記元稹福州南澗寺上方石像記歐陽詹畫西方㡧記白居易黄石巖禪院記劉軻沃州山禪院記白居易塑像記段成式信州南巖草衣禪師宴坐記權徳輿鸚鵡舍利塔記韋臯災沴一泗州大水記吕周任撫州寶應寺律藏院戒壇記顔真卿如來以身口意三業難調伏也浄尸羅以息其内行住坐卧四威儀攝善心也明布薩以昭其外故曰波羅提木义是汝之師則憍陳如之善來迦葉波之尚法諸聲聞三歸約衆十四年以八敬度尼羯磨相承其致一也至漢靈帝建寧元年有北天竺五桑門支法領等始於長安譯出四分戒本兼羯磨與大僧受戒至曹魏有天竺十尼自逺而來為尼受具後秦姚萇𢎞始十一年有梵僧佛陀邪舍譯出四分律本而闗内先行僧秖江南盛行十誦至元魏法聦律師始闡四分之宗聦傳道覆覆傳惠光光傳雲暉願願傳理隱樂洪雲雲傳遵遵傳智首首傳道宣宣傳洪法勵滿意意傳法成成傳大亮道賔亮亮傳雲一賔岸超恵澄澄傳恵欽皆口相授受臻于壼奥欽俗姓徐洪州建昌人葢漢孺子之後也二十二尋師于臨川楮山後五嵗削髮𨽻于高安龍岡寺遂受戒有唐義浄則譯經上足曰洪州之靈傑其乗宣羯磨者曰兩京滌法鋭欽智度沖深神用高爽行無權實身絶開遮闡律藏而日月光明騁辯才而龍象蹴踏江嶺之外凛然風生開元末北遊京充福先大徳常誦大湼槃經而講之兼明俱舍論維摩金剛經每登講座其下日有二三千人由是名動輦轂屬禄山作亂杖錫南歸居于西山洪井雙嶺之間慕高僧觀顯之遺蹤於寺北剏置蘭若山泉之美頗極幽絶欽雖堅持律儀而志在𢎞濟好讀周易左傳下筆成章著律儀輔演十巻嘗撰本州龍興寺戒壇碑頗見稱於作者三年真卿忝刺撫州東南四里有宋侍中臨川内史謝靈運翻大湼槃經古臺階扃儼然軒構摧圯有高行頭陀僧智清者首事修葺安居住持明年秋七月真卿績秩将滿有觀察使尚書御史大夫趙國魏公願以我皇帝降誕之辰奏為寶應寺仍請山林高行僧三七人冬十月二十三日聖恩允許於是鼎新輪奐其興也㪍焉乃請止觀大師法源法泉襄陽乗覺清源善𢎞羅浮圓覺佛跡十喻餘杭惠逹洎當州海通海岸等同住董修以資景福僉以為學徒雖増毗尼未立明年三月乃請欽登壇而董振鐸焉仍俾龍岡道幹天台法裔招提智融白馬法𦙍衡岳正覺同徳義盈香城藏選龍興蔵志開元明徹等同秉法事於是逺近駿奔道場側塞聖像放光而龍王不雨者四旬僧尼等三百五十七人而文士正議大夫前衛尉少卿張延臯脱俗歸真其名曰壊綱為稱首焉又欽此年已來為受具者凡一萬餘人江嶺湖海之間幅員千里餘像法於變皆欽敎道之力焉臨川在嶺隅未嘗𢎞律於是二衆三百餘人謂法裔敷演而依止之後有上都資聖寺高徳曰還本律主偉兹能辦深嗟嘆而賛美之謂於寺東南置普通無礙禪院院内立鎮國觀音道場請善𢎞居之以開悟心要雲一上足曰智融精持本事如㑹尊衆乃命智光等於普通道場東置律蔵院朔立戒壇以行欽公之來儀且施肇紀之不朽經營未幾壇殿鬱興肅乎渡海浮囊分毫羅刹之請嚴身瓔珞照耀摩尼之光則入佛位而披伽棃者名香普熏神足無極其可勝紀而無絶乎有唐大歴辛亥嵗春三月行撫州刺史魯郡開國公顔真卿書而志之孤山永福寺石壁法華經記元稹按沙門釋恵皎自状其事云永福寺一名孤山寺在杭州錢塘湖心孤山上石壁法華經在寺之中始以元和十二年嚴休復為刺史時恵皎萌厥心卒以長慶四年白居易為刺史時成厥亊上下其石六尺有五寸短長其石五十七尺有六寸座周於下葢周於石砌周於堂凡買工鑿經六萬九千有二百五十錢十經之數經既訖又立石為二碑其一碑凡輸錢於經者由十而上皆得名於碑其輸之貴者有若杭州刺史嚴休復中書舍人杭州刺史白居易刑部郎中湖州刺史崔𤣥亮刑部郎中睦州刺史韋文恪處州刺史韋行立衢州刺史張聿御史中丞蘇州刺史李諒御史大夫越州刺史元稹右司郎中處州刺史陳岵九刺史之外搢紳之由杭者若宣慰使庫部郎中知制誥賈餗以降鮮不輸於經石之刻必以輸錢先後為次第不以貴賤老幼多少為後先其一碑僧之徒思得名聲人聞其事以自廣余以長慶二年相先帝無狀譴於同州明年徙於㑹稽路於杭杭民竟相觀睹白怪問之皆曰非觀宰相葢欲觀曩所聞之元白耳由是僧之徒誤以余為名聲人相與日夜攻刺史白乞余文余觀僧之徒所以經於石文於碑葢欲為不朽且欲自大其本術今夫碑既文經既石而又九諸侯相率貢錢於所事由近而言亦可謂來異宗而成不朽矣由逺而言即不知幾萬嵗而外地與天相軋隂與陽相盪火與風相射名與形相滅則四海九州皆大空中一微塵耳又安知其朽不朽哉然而羊叔子識枯樹中舊環張僧繇世為畫師歴陽之􅂔至今為城郭苟一吐而異世卒不可化鍜之中學數息則易成此又性與一物相遊而終不能兩相忘矣又安知夫六萬九千之文刻石永永因衆姓合成獨不能為千萬劫含蔵之不朽耶由是思之則僧之徒得計矣至於佛書妙奥僧當為余言余不當為僧言况斯文止紀於刻石故不及講貫其義云長慶四年四月十一日浙江東道都團練觀察處置等使通議大夫使持節都督越州諸軍事守刺史兼御史大夫上柱國賜紫金魚袋元稹記福州南澗寺上方石像記歐陽詹萬物闐闐各由襲㳂無襲無㳂而忽以然苟非妖怪實為珍慶斯石像者其珍慶歟始孕靈韞質兆眹未見則峨峨巨石巖峭山立鎮郡城之前阜壓蓮宫之上界海若鞭而莫動天將泐而終固皇唐天寶八年五月六日清晝忽騰雲旁涌驟雨來集驚飈環駭匉訇杳冥䧺䧺者雷騞然中震逆火噴野大聲殷空岑嶺躨跜潭洞簸蕩須臾風雨散雷雲收激劈輪囷斬焉中闢南委地以梯落北干霄而碣樹不上不下不西不東亭亭厥心隱隱真像三十二相具八十種好備列侍環衞品覺有序莊嚴供養文物咸秩融然慈靣儼矣儀形似倚雪山而授法如開月殿以趺坐異矣哉不曰博聞乎未聆於既徃不曰多智乎罔測其所來且物之堅莫堅於石况髙厚廣袤又羣石之傑一朝𤓰剖中有雕琢其為造石之初致有相以外封乎其為有石之後入無間以内攻乎噫不可以人事徴試請以神化察巍巍釋氏發揮道精其身既傾其神不生等二儀以通變齊四大而有力教於時有所頽靡人於教有所忸怩則為不可思議以煦以吹故示此無跡之跡難然之然俾知其我存存入我之門經曰千百億化身葢隨感而應兹身者則千百億之一焉昔諸佛報現皆托於有命有命則有生有生則有滅曷若因其不朽之物憑乎不動之基形既長存法亦隨是與夫為童兒而出世假長者以來化𤣥𤣥之徼則雖一永永之利則不侔可以禮足而悔罪寄影以安樂予則求福不回者焚香跪仰或從釋子之後故為巉巉之餘仞聊書其所由來貞元六年七月十五日記畫西方㡧記白居易我本師釋迦如來説言從是西方過十萬億佛土有世界號極樂以無八苦四惡道故也其國號净土以無三毒五濁業故也其佛號阿彌陀以夀無量願無量功徳相好光明無量故也諦觀此娑婆世界微塵衆生無賢愚無貴賤無幼艾有起心歸佛者舉手合掌必先向西方有怖厄苦惱者開口發聲必先念阿彌陀佛又範金合土刻石織文乃至印水聚沙童子戲者莫不率以阿彌陀佛為上首不知其然而然由是而觀是彼如來有大誓願於此衆生衆生有大因縁於彼國土明矣不然者南北東方過去見在未來佛多矣何獨如是哉何獨如是哉唐中大夫太子少傅上柱國馮翊縣開國侯賜紫金魚袋白居易當衰暮之嵗中風痺之疾乃捨俸錢三萬命工人杜敬宗按阿彌陀無量夀二經畫西方世界一部髙九尺廣丈有三尺彌陀尊佛坐中央觀音勢至二大士侍左右天人瞻仰眷屬圍繞樓臺伎樂水樹花鳥七寶嚴飾五彩彰施爛爛煌煌功徳成就弟子居易焚香稽首跪於佛前起慈悲心發𢎞誓願願此功徳迴施一切衆生一切衆生有如我老者如我病者皆願離苦得樂斷惡修善不越南部便覩西方白毫大光應念來感青蓮上品隨願往生從見在身盡未來際常得親近而共養也欲重明此願而偈讃云極樂世界清淨土無諸惡道及衆苦願如老身病苦者同歸無量夀佛所黄石巖禪院記劉軻古老有言曰太極之氣積成山岳洩為川瀆然則匡阜之境其大者乎庚辰嵗山客劉軻采拾怪異自麓至頂却下半里餘次于黄石巖巖中有棲禪子不知其幾臘乃賾其輕重頗見其宅心之地乃問其住年但手指松桂云毫髮我植今環人臂烏飛兎走吾復何齒矧卯戌之昏旦霜炎之凍炙生落之榮顇去留之㳂泝雖云云自彼而於我蔑如也於戲向非巖房峭絶僧行孤峙則人境兩失固其宜也復何言哉觀夫煙雲雜乎履舄嵐靄生於襟䄂羣形浩擾併入眸子每至煙雨初霽山光澄練泠泠仙語如在耳右况又聳凌競上冥冥焉知不能與洪崖接􅃑浮邱連駕盈縮造化吐納顥氣紀慚容於厚面逺喧卑之臊穢乎不得而然者葢鈎也餌也名為利鈎利為名餌吞鈎食餌手足羈鎻彼焉得跳躍於此乎夫禪子脱去桎梏四支宣展動與雲無心静將石何機物我一致端邪徑塞僕所謂非斯人不能住斯境也禪師宜春人俗姓劉名常進人以師久住遂以其姓易其巖名云沃州山禪院記白居易沃州山在剡縣南三十里禪院在沃州山之陽天姥岑之隂南對天台而華頂赤城列焉北對四明而金庭石鼔介焉西北有支遁嶺而養馬坡放鶴峯次焉東南有石橋谿谿出天台石橋因名焉其餘卑巖小泉如子孫之從父祖者不可勝數東南山水越為首剡為面沃州天姥為眉目夫有非常之境然後有非常之人棲焉晉宋以來因山洞開厥初有羅漢僧西天竺人白道猷居焉次有髙僧竺法濳支道林居焉次又有乾興淵攴遁開威藴崇實光識斐蔵濟度逞印凡十八僧居焉髙士名人有戴逵王洽劉恢許𤣥度殷融郄超孫綽桓彦表王敬仁何次道王文度謝長霞袁彦伯王䝉衛玠謝萬石蔡叔子王羲之凡十八人或逰焉或止焉故道猷詩云連峯數千里修竹帯平津茅茨隱不見雞鳴知有人謝靈運詩云暝投剡中宿明登天姥岑髙髙入雲霓還期安可尋葢人與山相得於一時也自齊至唐兹山寖荒靈境寂寥罕有人遊故辭人朱放詩云月在沃州山上人歸剡縣江邉劉長卿詩云何人住沃州此皆愛而不到者也大和二年春有頭陀僧白寂然來遊兹山見道猷支竺遺跡泉石盡在依依然如歸故鄉戀不能去時浙東廉使元相國聞之始為卜築次廉使陸中丞知之助其繕完三年而禪院成五年而佛事立正殿若干間齋堂若干間僧舎若干間夏擸之僧嵗不暇八九十安居遊觀之外日與寂然討論心要振起禪風白黒之徒附而化者甚衆嗟乎支竺歿而佛聲寢靈山廢而法不作後數百嵗而寂然繼之豈非時有待而化之有縁邪六年夏寂然遣門徒僧常贄自剡抵洛持書與圗詣從叔樂天乞為禪院記云昔道猷肇開兹山後寂然嗣興兹山今樂天又垂文兹山異乎哉沃州山與白氏其世有縁乎塑像記段成式在世間攘巨㓂必思袵金浴鐡强矯䧺毅者雖空門亦忿怒鏖撲為法大防也據内典下天處蘇迷盧之半為忉利尉候北方毗沙門統藥义衆所治水精宫城䕶世其住處曰紛陀利曰質多羅曰七林曰摩偷曰如意等下壓象跡當歡喜之地上接蜂歌雜莊嚴之境常憍尸迦將破怨敵聖者奮勇健臂出甲胄林獨揭勝幢不頓一㦸􅚢迦婁而垂翅捘修羅而束手猶怒折蓮柄狂搜藕絲葢多聞位居初地離十二失故經云毗沙門得方便救䕶之門昔縛喝伽藍北虜感夢而懴悔近于闐聚落西羌覩相而來降其威神營衛肹蠁靈應事無虗譯世不絶書相傳北方天王與瞻部有縁謂西域瞿薩國本天王棲神之處也廬陵龍興寺西北隅先有設色遺像武宗五年毁廢至大中初重建寺其處為僧乾立所居乾每讇囈不安旬日方悟遽徙他室昉誓造北方變梁朝謂雕塑像亦為變也請押衙熊輅為導首輅遂與執白籌者郭宣熊師佐等縱叟閭伍為説第一施結増上縁獲零憏貨貝共二十萬輅厚自捐徹周嵗功就乃多聞儀形巖毅如生眉結雲聚目稜電擊猛焰彗肩蚑蜂搶軒金塗錯落而憐亂形彩陸離而芒角得工巧明矣其或䕫魖蠱􅱭􅓊是不翅擊三屍磔五冡也及素天女主藏神凡四四事堂内三壁寫載部落雷公拗怒闕留惡覷吁可畏也吉之人香火徼福林篿乞靈福既據我靈詎乏主噫予曽閱正法念經説摩䤈陀山六齋日四天於此㑹計閻浮提善業豈容不歸敬與輅為學性端介敏辯王公多伏之復晤禪那宗要得揔持契訣常持北方真言大中三年病且死忽夢天王操㦸卓地有泉迸射搏之及面因驚覺汗洽而愈十二年洪州狂賊盗兵殺吏尋定州差輅上府至新塗夢天王支槊張目曰世塗若此爾欲何徃即宿留數日賊毛鶴果膾肝飲頭尤恣殘酷其踐較著如是十三年秋予閒居漢上輅為交趾使入京請予紀釋氏事以上事請予明張北方故實焉信州南巖草衣禪師宴坐記權徳輿信州南巖有清淨宴坐之地而禪師在焉師所由來莫得而詳初州人析薪者遇之于野中其形塊然與草木俱咨於州長乃延就兹地三十年矣州人不知其所然也遂以草衣號焉足不蹈地口不嘗味日無晝夜時無寒暑寂黙之境一繩床而已萬有囂然此身不動其内則以三世五藴皆從妄作然後以無有法諦觀十二因縁於正智中得真常真我方寸之地湛然虗無身及智慧二俱清淨㣲言軟語有時而聞渉其境之逺近隨其根之上下如雨潤萬物風行空中履其門閾皆獲趣入若非斡𤣥機於無際窮實相之源底則四時攻於外百疾生於内矣古所謂遺物離人而立於獨者禪師得之嗚呼世人感物以遊心心遷於物則利害生焉吉凶形焉牽攣鞿𤨏蕩而不復至人則返静於動復性於情夭夀仁鄙之殊由此作也斯葢世諦之一説耳於禪師之道其猶稊稗邪建中二年予吏役道于上饒時左司郎崔公出為郡佐探禪師之味也熟為予詳言之拂拭纓塵攜手接足洗我以善得於儀形且以為楞嚴之妙㫖毗耶之宻用皆在是矣又焉知此地之宴坐不為他方之説法乎故粗書聞見以志於石鸚鵡舎利塔記韋臯元精以五氣授萬類雖鱗介毛羽必有感清闕純粹者矣或炳曜離火或禀竒蒼精皆應乎人文以奉若時政則有革彼禽類習乎能言了空相於不念留真骨於已斃殆非元聖示現感於人心同夫異縁用一真化前嵗有獻鸚鵡鳥者曰此鳥聲容可觀音中華夏有河東裴氏者志樂金僊之道聞西方有珍禽羣嬉和鳴演暢法音以此鳥名載梵經智殊常類意佛身所化常狎而敬之始告以六齋之禁比及辰後非時之食終夕不視固可以矯激流俗端嚴梵倫或教以持佛名號者曰當由有念以至無念則仰首奮翼若承善聽其後或俾之念佛則黙然而不答或謂之不念即唱言阿彌陀歴試如一曽無爽異余謂其以有念為縁生以無念為真際縁生不答以為縁起也真際雖言言本空也每虗室戒曙發和雅音穆如笙竽静鼓天風下上其音念念相續聞之者莫不洗然而嘉善矣於戲主有辰乎縁其盡乎以今年七月悴爾不懌已日而甚馴養者知将盡乃鳴磬告曰将西歸乎為爾撃磬爾其存念每一撃磬一稱彌陀佛洎十撃磬而十念成歛翼委足不震不仆奄然而絶按釋典十念成往生西方又云得佛恵者歿有舎利知其説者固不隔殊類哉遂命火以闍維之法焚之餘燼之末果有舎利十餘粒炯爾耀目瑩然在掌識者驚視聞者駭聼咸曰茍可以誘迷利世安徃而非菩薩之化歟時有髙僧恵觀常詣三學山巡禮聖跡聞説此身涕淚悲泣請以舎利於靈山用陶甓建塔旌異也余謂此禽存而由道歿而有徴古之所以通聖賢階至化者女蝸蛇軀以嗣帝中衍鳥身而建侯紀乎册書其誰曰語怪而况此鳥有𢎞於道流聖證昭昭胡可黙已是用不愧直書于辭貞元十九年八月十四日記泗州大水記吕周任春秋左氏傳曰天反時為妖地反物為災其於水也反利為害矣在唐堯時包山陵而浩滔天在漢武時浮齧桑而浸鉅野皆震蕩上心昏墊下人其故何哉天其或者警休明而表忠誠也皇唐貞元八年嵗在壬申夏六月上帝作孽罰兹東土浩淼長瀾周亘千里請究其本而言之是時山泐桐栢發谼歕湧下注淮瀆平湍七丈浮夀逾濠下連滄波東風駕海潮上不落雨水相逆濺濤倒流矗縮迴薄衝壅淮泗積隂驟雨河瀉瓴建不捨晝夜至於旬浹乾坤合怒雲雷為屯以水濟水吞洲漂防走不及竄飛不及翔連甍為河宫噍類如魚鼈事出慮外孰能圗之開府儀同三司檢校右散騎常侍兼御史大夫泗州刺史武當郡王張公以其始至也聚邑老以訪故搴薪楗石以御之其漸盛也運心術以馭事維舟編桴以載之遂連舳促櫓歛邑之惸嫠老弱州之庫藏圗籍官府之器先寘于逺墅軍資甲楯士女馬牛遽遷於水次将健丁壯遏水之不可者任便而自安逮數日而計行矣洪波汗漫不測涯涘驚飈鼓濤舟不得不覆巨浪崩山城不得不圯崇邱如島稍稍而沒夏屋如查汎汎相繼天迴地轉混茫其中公獨與左右十數人䌫舟於郡城西南隅女牆濕堵之上以向衝波之來不亦危哉公之左右失色同辭請移公曰伾天子守土臣也茍有難而違之若君命何且南山隔淮幾五六里吾能往矣况是别境離局姦也雖死不為公於是使部内十驛遷於虹城西鄙而南傍南而東四百里達維揚之路俾星郵無壅又東北直渡經下邳五百里至於徐州通亷察之問又移淮南城将令斷扁舟往來立標樹信以虞冦盜之變公每端拱對水而訴曰伾奉聖主明詔司牧此州以觀萬姓河公何為不仁降此大沴伾之罪也厲聲正色阽危不撓歴冄旬而水定又冄旬而水抽自水始至及水始耗已六時矣又一時而復流郊境之内無平不陂郛郭之間無岸不谷尺椽片瓦蕩然無所有可異者惟公之露寢與内寢巋然存焉豈不可浮而往葢不可顚而壊乎斯則神仰公之仁先庶物而遺已神賞公之忠臨大難而守節神髙公之義動適權以成務故保其聼政養安之所旌公之善也昔邵伯之理也人愛甘棠而勿翦方兹神靈扶持不亦逺乎公乃捨車而徒棄輴而泥弔亡恤存綏復軍郡逺軫聖慮詔左庻子姚公弔而賑之至於修府署建城池詔有司計功而賞緍立鄽市造井屋公申勸料程以貰以貸纔逾年而城邑復常矣其於縮板為垣樹桺為麗端衢四逹廨宇雙峙即公之新意也天災流行何代無之逢昏即盛遇賢即退故劉昆返風而火滅王尊臨河而水止葢忠誠之至也公嘗領羸兵守孤城以百當萬俾國家全山東之地名載青史公即國之長城也今以一葦之航絓於危堞之上以當漲海之勢城頽而一塊不傾水止而所濟獲全公即國之貞臣也固知明主之委任於公也皆感而通焉周任不敏學於舊史氏借古以諭公未或同年矣謹述而紀之唐文粹巻七十六欽定四庫全書唐文粹巻七十七宋姚鉉編記庚錄志附總一十七首讌㑹五
