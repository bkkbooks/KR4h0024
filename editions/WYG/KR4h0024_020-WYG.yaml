body:
  text: 頌丙雅附總八首神武四大唐中興頌元結鳳翔岀師紀聖功頌楊炎大唐河西平胡頌平淮西雅附栁崇元時政一聖政紀頌來鵠豐年一徳勝頌歐陽詹祥應一嵗星居心頌權徳輿髙世一伯夷頌韓愈大唐中興頌并序元結天寳十四年安禄山陷洛陽明年陷長安天子幸蜀太子即位於靈武明年皇帝移軍鳳翔其年復兩京上皇還京師於戲前代帝王有威徳大業者必見于歌頌若令歌頌大業刻之金石非老於文學其誰宜為頌曰噫嘻前朝孽臣姦驕為昏為妖邉將騁兵毒亂國經羣生失寧大駕南巡百僚竄身奉賊稱臣天將昌唐繄睨我皇匹馬北方獨立一呼千麾萬旟戎卒前驅我師其東儲皇撫戎蕩攘羣兇復服指期曽不踰時有國無之事有至難宗廟再安二聖重歡地闢天開蠲除妖災瑞慶大來兇徒逆儔涵濡天休死生堪羞功勞位尊忠烈名存澤流子孫盛徳之興山髙日昇萬福是膺能令大君聲容沄沄不在斯文湘江東西中直浯溪石崖天齊可磨可鐫刋此頌焉何千萬年鳳翔出師紀聖功頌并序楊炎舜有兩階之舞周有孟津之㑹皇帝有岐陽之蒐徳莫勤乎安國勛莫配乎立極利萬物莫近乎去暴盖受天元符與人請命冥契相合億兆有歸以唱則感神鬼之心以征則去雲雷之難維唐七葉姦臣犬吠於二京皇帝龍鳴於河北觀兵雍上建都發號以朝萬國心嚮天地志通幽昧淳精四達大造𤣥成於是巢山駕海之羣狼纛鳥章之君不期而趨于闕下者四十有三萬元帥廣平王俶太尉光弼司徒子儀等稽首言曰臣聞天啓聖以俟時聖感時而赴難非神功不能當大運非𤣥徳不能合人心故軒轅之道也伏蚩尤宗周之仁也稱襁負陛下之徳大瑞於人和人和而動天天與和合氣百姓因之以獨化四夷因之以子來王師徳之以貞勝意者河洛徯怨後東征之期人靈駿奔望西狩之禮天子方齊寳輅講金匱之書翌日霓旌武賁大車之輪黄鉞靈鼉彤弓太阿荆韓楚魏之廣七閩五獠之長金鼔百萬車徒九合大陣于東郊皇帝建白麾以誓于軍曰維髙祖歆于上天四宗重光照臨下土百有五十祀至于聖皇總武之干戈備文之法象蕞爾逆虜敢迷天紀盜我符璽黷我威靈使四海之内兵革縱横肝腦塗裂旻蒼降鑒錫命於予俾纉夏已墜之功寛堯未刑之族於戲今匪玉帛山河是愛惟蒼生灾害是憂匪天命威力是憑惟人心忠義是保咨爾張目成天羅植髮成干櫓布和成將帥厲氣成風雲若作進退爾惟旗鼓若斷首尾爾惟常蛇若戮鯨鯢爾惟干將若拯沈溺爾惟巨艦夏有一旅之衆周有十人之謩志定金石信非盟誓爾其念哉是時天威動六合兵氣連太白乾坤為之坱軋河嶽為之震蕩彼狐鳴鑿齒之徒不崇朝而聲反於謳歌形歸於蹈舞者㡬過半矣故鄠社之師以形勝灞上之兇以威逐桃林之陣以竒破河洛之孽以氣摧帝乃開天牢迴豹尾陵顥氣鎻欃槍應龍秉鉞𤣥女侍坐乃考夏氏配天之義備漢皇建武之興雲髦玉輅山動地踊降自西雍幸于京師萬姓前導百靈為衛布徳澤望陵寢悲黍稷之將秀覽城闕之為墟以雷雨洗川澤以皇風清怨怒以大賞議勤勞以成功告宗廟以詳明去龍昧以恵政哀困窮清蹕而奉聖皇稱觴以朝前殿於是東國耆老長安士庶排御輅於天庭動千門呼萬嵗煙雲下遶林藪山迴神靈頌於堂精魄感於廟王侯慶於國父子洽於家鍾石反於懸罍俎陳於席華戎踊躍喜氣磅礴日退三舍天聲萬里神謀不得窺其奥天道不能後其時斯一㑹之畧也然後動變化為鑪假仁義為途陶氣象鑿耳目與神合司契以道浸澆醨全犀象之形斷珠玉之脛然後以景星燭夜廿露清氣昇閬風對天老捨鴻名以還太素乗大厯而統人紀俾不思而降不祭而歆以元和感生淳古於是宰臣聚而言曰主上以神武清難至徳遂人崇勛絶瑞光照萬古闢開日月于今六年百姓豈忘力於帝乎人臣盍謝生於天乎請相與鑿石於誓師之場告成於得衆之地斯王道之盛典臣炎稽首敢獻頌曰天命帝兮蕩妖昏交風雨兮㑹秦門惟聖徳兮漫海外五單于兮勇士㑹俗鳥獸兮家雲島越浮山泛青草徴羽騎兮列天營啓金縢兮賜長纓日為車兮雷為鼓醢鯨鯢兮掃煙雨開明堂兮饗文祖帝為皇兮后為母歌雲臺兮冊玉府篆穹石兮駕終古大唐河西平胡聖徳頌并序維唐至徳二年春正月武威郡胡洎九蕃夷落内伺師旅之間外合狼豕之兇據金城害州伯蛇變交㦸之下炎焚大澤之中二月乙丑皇帝以五命之服詔太僕崔偁總中權専上將誓軍前之士郤城下之盟又命内常侍劉日新振鼓鐸之音䕶羌戎之長林竦蝟合㑹于東郊粤庚午髙牙大斾鐵馬長鍛歕以清笳陣以雲蛇列于四衝蓬頭執㦸鼓以靈鼉進于逵路趫悍獷猤虎裘蝯臂北陵于土門之隊銄車雲梯强弩堅楯齊傳于西烽之亭於是引熊虎之師杖龍蛇之劍矛㦸四起烟塵火色金鼓一振天地徘徊血亂𤣥黄聲囂瓦屋是風雲皆入陣彼草木盡為兵日月垂照於窮鄉皇靈赫臨於天外名王貴馬大玉文貝素女錦衣百金之産萬并之資皆委于入貢之府市于有地之宫是時也千人踊萬人賀美太階之符見頌偃伯之議興特進金城大守李葛頃洎五邑長史軍正大夫等言曰盖聞王命先天以奉時賢臣合統以偕運靡乗乎帝籙不能撥亂罔應乎間氣不得遭逢故大人之作必先靖難以摧兇取暴為治國以任賢使能為建功磅礴乎茅茨之下葳㽔乎𤣥古之上斯軒轅得之以勝蚩尤大夏得之以勝有扈西伯得之去􅇻伐崇太宗得之奄有遼海上皇得之克平巨猾陛下得之再清宇宙掃蕩氛蠥允若大唐之新命復髙祖之天下臣等恭惟六聖騰光百有五十祀周賁海㝢鋪敷菌蠢丹穴之賮孤竹之君金罽括羽委命下吏陛下建大號纉鴻業歸勛祖禰昭事聖皇是必天錫忠良佐成命器二臣所應皇運之統伏崇羽之兇太康西人永永來裔願篆石誌美以為頌云詔虎臣兮殪天狐載火旗兮耀昆吾霽塵壘兮被戎都獻平淮西雅并表栁宗元臣某言臣負罪竄伏違尚書牋表奏十有四年聖恩寛宥命守遐壤懐印曳紱有社有人云云伏惟睿聖文武皇帝陛下天造神斷克清大憝金鼓一動萬方畢臣太平之功中興之徳推校千古無所與讓臣伏自忖度有方剛之力不得備戎行致死命况今已無事思報國恩獨惟文章伏見周宣王時稱中興其道彰大于後罕及然徴於詩大小雅其選徒出狩則車攻吉日命官分土則嵩髙韓奕蒸人南征北伐則六月采芑平淮夷則江漢常武鏗鍧炳燿盪人耳目故宣王之形容與其輔佐由今望之若神人然此無他以雅故也臣伏見陛下自即位已來平夏州夷劍南取江東定河北今又發自天衷克翦淮右而大雅不作臣誠不佞然不勝憤踊伏以朝多文臣不敢盡專數事謹撰平淮夷雅二篇雖不及尹吉甫召穆公等庶施諸後代有以佐唐之光明謹昧死再拜以獻平淮夷雅二篇皇武命丞相度董師集大功也皇耆音其其武于溵于淮既徒既車環蔡其來狡衆昬嚚甚毒于酲狂奔呌呶以扞大刑皇咨于度惟汝一徳曠誅四紀其徯汝克錫汝斧鉞其往視師師是蔡人以宥以釐度拜稽首廟于元龜既類既禡于社是宜金節煌煌錫鍎彫戈犀甲熊斾成命是荷度拜稽首出次于東天子餞之罍斚是崇鼎臑俎胾五獻百籩凡百卿士班以周旋既涉于滻乃翼乃前孰圖厥猷其佐多賢宛宛周道于山于川逺揚邇昭陟降連連我斾我旗子道于陌訓于羣帥拳勇來格公曰徐之無恃頟頟式和爾容惟義之宅進次于郾彼昬卒狂裒兇鞠頑鋒蝟斧螗赤子匐匐厥父是亢怒其萌芽以悖太陽王旅渾渾是佚是怙既獲敵帥若飢得餔蔡兇伊窘悉起來聚右擣其虛靡愆厥慮載闢載祓承相是臨弛其武刑諭我徳心其危既安有長如林曽是讙譊化為謳吟皇曰來歸汝復相予爵之成國胙以夏墟度拜稽首天子聖神度拜稽首皇祐下人淮夷既平震是朔南宜廟宜郊以告徳音歸牛休馬豐稼于野我武唯皇永保無疆皇武十有一章章八句方城命愬守也卒入蔡得其大醜以平淮右方城臨臨王卒峙之匪徼匪競皇有正命皇命于愬往舒余仁踣彼艱頑柔恵是馴愬拜即命于皇之訓既礪既攻以後厥刃王師嶷嶷熊羆是式銜勇韜力日思奮殛宼昬以狂敢蹈愬疆士獲厥心大袒髙驤長㦸酋矛粲其緩章右翦左屠聿禽其良其良既宥告以父母恩柔于肌卒貢爾有維彼攸恃乃偵乃誘維彼攸宅乃發乃守其恃爰獲我功我多隂諜厥圖以究爾訛雨雪洋洋大風來加于燠其寒于邇其遐汝隂之茫懸瓠之峨是拔是震大殲厥家狡虜既縻輸于國都示之市人即社行誅乃諭乃止蔡有厚喜完其室家仰父俯子汝水沄沄既清而瀰蔡人行歌我步逶遲蔡人歌矣蔡風和矣孰類蔡初胡甈爾居式慕以康為愿有餘是究是咨皇徳既舒皇曰咨愬裕乃父功昔我文祖惟西平是庸内誨于家外刑于邦孰是蔡人而不率從蔡人率止惟西平有子西平有子惟我有臣疇允大邦俾恵我人于廟告功以顯萬方方城十章章八句聖政紀頌并序來鵠穆宗皇帝臨大朝與羣臣言奏政事羣臣退而宰臣奏曰陛下問及平政事此三皇五帝之所徽美也陛下不問及史臣此三皇五帝之所弭已也徽美者將有乎聞也弭已者將有乎亡也以聞之而又亡之則陛下徒有宵衣旰食之名規天條地之績與羣臣言後若飈然拂冠過冕湮時銷日無得用於後譬如十夫樹楊一夫拔之無得以成其大也政事羣臣得陛下日問之是十夫樹楊也史官執筆為陛下日逺之是一夫拔楊也使後之人訝聖朝空晨虚夕閒殿曠廷無君臣咨謀洋溢之言乏社稷安危强讜之説是不亦逺史臣致不載其事如拔去其楊將弭己之謂乎臣伏念貞觀永徽之代百官之有耳目但聴視天子而已故言事者安論紓詞無疑權慮勢史官執筆于階之下天子側旒于殿之上奏者發誠于廷之中是以正衙一開則臣誠前而啓之帝旒近而鎮之史筆隨而絡之由是君臣謀國圗政之事喻機都要之言詫業發神豐編照物偕籍于堯典差光于天陽至今見太宗文徳若三皇五帝之所徽美也自永徽之後宰執不正窺伺是忌針棘前後阻越對敭狼噬虎飡持膏衒肉盖以言多為已曽不致君内荏失中畏使人聴乃奏史官與百僚俱退然後宰臣請事由是君有問而宰臣知之史官不得與於聞君有舉而宰臣謀之史官不得記其事次第周行檢錄制誥與冗吏同工而己臣嘗涕泣以歎豈有以一已之細一性之忌於黍晷圭景之間苟嗜急須迴天遮上使聖緒神緒有嘉敭善諷罔得聞於千萬年枉有謂明朝空晨虚夕閒殿曠廷無君臣咨謀洋溢之言乏社稷安危强讜之説若今踵而承之則不唯臣有障聰蔽睿之刺抑陛下雖有三皇五帝之所徽美而若逺史臣則三皇五帝之所弭已也抑又有一夫拔楊之謂歟臣請史官執筆當羣臣奏事隨日撰録號為聖政紀臣立朝荷禄幸甚穆宗皇帝動扆頷旒憮然歎曰吁朕罔敢粉名厥後乃罔知厥後然聖人存簡䇿者亦非以粉名也盖存乎大國之典鴻祖之業我國有典我祖有業業在于典典在于史曷厥史不書是尸余于祖涸業于典也朕纉承聖緒恭惟恪思將念厥政未嘗不離安廢酣馳荒鶩逺是以每與宰臣言如簇天下一巡省每見宰臣退而展天下盡聞知豈圗臣蓄猾謀公無同事欲弄尾舌先衞巖穴隔斥史臣占佞明后致懿摉嘉訪不存堯典之書善諷名猷莫出清廟之什史臣負我不舉其官宰輔盡忠厥聞有此由是詔史職執史筆立于廷之下録君臣臚句之必行載剛毅進退之敢議題其篇目曰聖政紀也至上之即位三年有鄉校小臣來鵠居山澤間常私心重惜史臣以其史臣者是當國之鏡千億代之睂目也因窺穆宗實録得解憤釋嫉於立史官為聖政紀者追而頌出其事以鑒今之廷列故拜獻其頌曰三皇不書五帝不紀有聖有神風銷日已何教何師生來死止無典無法頑肩奡比三皇實作五帝實治成天造地不昬不圯言得非排文得聖齒表表如見者莫若乎史是知朴繩休結正簡斯若君誥臣箴觚編毫絡前書後經規善鑒惡國之大章如何寝略嗚呼貞觀多什永徽多俞廷日發論殿日發謨牙孽不作鳥䑕其除論出不盖謀行不紆楹然史臣蛇然史裾瞠瞠而視逶逶而婁翹筆當面决防納汚不梏爾智不席我愚執言直注史文直敷故得粲粲朝典落落廷謇聖牘既多堯風不淺頒編坦軸君出臣顯若儼見旒若俯見冕蕪閒殿曠廷無尸安素晏三皇不亡五帝不翦太宗得之史焉斯展暨乎後相圗身天子専問我獨以言史不得近立明見嫌倚相在擯秉筆如今隨班不進班退史歸惘然疇依奏問莫覩嘉謀固稀取彼誥命祿為國肥烱哉時皇言必及章徳室五帝道奥三皇如何翊臣嚵肉嗜􅎺觜距磨快楅衡物長控截僚位占䕶陽光垣私藩已逺近庾唐俾徳音嘉訪黙縮暗亡咽典噤法盖聖籠昌曷以致此史文不張後必非笑將來否臧謂乎殿空扆逸朝懵廷荒不知姦蔽文失汪洋有貞觀業有永徽綱亦匿匪見亦寢匪彰頼有後臣知言不佞伊尹直心太甲須聖事既可書史何不命乃具前欺大陳不敬曰逐史之喻請以物並且十夫樹楊一夫欲競栽既未牢摒豈能盛帝業以哉逐史似摒穆宗憮然若疚若醟何昔臣斯隠我祖正不傳親問不寫密諍孰示來朝以光神政由是天呼震岌徴奔召急史提筆來叱廷而入端耳抗目不撝不挹獬豸側頭螭虯擺濨握管絶怡當殿而立君也盡問臣也倒誠磊磊其事鏜鏜其聲大何不顯細何不明語未絶緒史已錄成錄成謂何書政紀名伊紀清芬可昭典墳古師鳥官昔聖官雲方之我后録里書分録有君法書有君文君法君文在聖政紀云殿無閒時廷無曠日雲諏波訪倦編刓筆君劬臣勞上討下述惟勤惟明在聖政紀出至徳何比至教焉如孰窺孰則外夷内儲謂君有道乎臣有謨歟有道有謨在聖政紀書一體列秩同力翼戴柝楅去枚絶防無礙國章可披唐文可愛善咨不偷嘉論不盖不偷不盖在聖政紀載諒夫摠斯不朽可懸魏闕愚得是言非訕非伐實謂毉臣渾沌開君日月妖物雰死天文光發惟我之有頌兮奚斯躍而董狐蹷徳勝頌二章并序歐陽詹唐貞元六年嵗在庚午隂陽家流曰嵗在午人馬食土人之所食也糓馬之所食也草今言食土明嵗蕪嘉糓而野無青草則運數于兹合凶災之大者於是天尋舊步地轉恒軸交紏迴薄將有結于常沴自春二月至于夏五月或赫日杲杲或密雲溶溶為燋灼為霖霪似不日而至皇帝宿布大和人神鳥獸魚鼈咸若騰歡心揚喜雲欣欣熙熙休氣中積浹磅礴浮蒼蒼潜相戛磨力强者勝九陽搆旱而莫展六隂作潦而不就氛祲靄為慶雲烈景曒為祥光油油薰薰宛復如春塊不破而雨足條無聲而風暢日者生氣欲凝淑氣猶競彼雖罔得為禍此亦未能為福徘徊相持時澤不降五稼含萌而待藝百芳蓄頴以思坼至是土膏融甘液宣若决渟泉如開涌烟豐本増岐芄芄緜緜無磽塉與良沃獲一十於百千䞉蔬雲矗以委圃餘糧嶽峙而栖畆夫體病不能害心心平必能制體古人曰人者天地之心也既和且平則天地之病又焉得成歟况奔走游泳之物曰靈曰祗之類皆吁歈怡逸於其中乎宜其燎乾元之宿􅐄愈坤元之常疾以至於交泰如斯之盛邪古先帝王至聖則堯至仁則湯有黎甿以稱理厯水旱而莫禦豈不以道未全洽而徳尚涼哉皇帝非徒能禦之又易之為大慶殊祥其於道徳可謂充塞洋溢光今而邁古矣元元嗚咽歌聖代者動天殷地以夜繼晝而其詞未宏輒為頌二章用貽于康衢庶事明而聲暢流乎無窮而以徳勝目篇頌曰嵗在午天災於常昔人食土今我飫梁匪徒我飫梁鰥寡干箱盛矣乎我皇之徳變眚為祥休哉徳兮嵗在午天災斯屬昔馬食土今牛饜菽匪徒牛饜菽大豕梁肉盛矣乎吾皇之徳轉禍為福休哉徳兮嵗星居心頌權徳輿皇矣上帝降鑒下人后王承之制作禮文人用明徳家尚孝仁人無癘疵俗以阜蕃敷佑四方發為天祥重華煌煌乃居明堂下煦仁澤上為祥光回復感通天人攸同乃法五事乃建大中君君臣臣徳輝昭融保祐命之自天無窮微臣頌歌敢備唐風伯夷頌韓愈士之特立獨行適於義而已不顧人之是非皆豪傑之士信道篤而自知明者也一家非之力行而不惑者鮮矣若至于一國一州非之力行而不惑者盖天下一人而已矣若至於舉世非之而不惑者則千五百年乃一人而已耳若伯夷者窮天地亘萬世而不顧者也昭乎日月不足以為明崒乎泰山不足以為髙巍乎天地不足以為容當殷之亡周之興微子賢也抱祭器而去之武王周公聖也率天下之賢士從天下之諸侯而攻之未嘗有非之者也彼伯夷叔齊乃獨以為不可殷旣滅矣天下宗周彼二子乃獨恥食其粟餓死而不顧由是而言夫豈有求而為哉信道篤而自知明也今世之為士者一凡人譽之則自以為有餘一凡人沮之則自以為不足夫彼獨非聖人自是如此夫聖人乃萬世之標準也余故曰若伯夷者特立獨行窮天地亘萬古而不顧者也雖然微二子亂臣賊子接跡于後世矣唐文粹巻二十欽定四庫全書唐文粹巻二十一宋姚鉉編
