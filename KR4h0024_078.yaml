body:
  text: 吳興姚鉉纂箴誡銘揔四十一首箴二十五大寶箴張藴古丹扆箴六首并序李徳裕瑞箴孫朴兵箴梁肅太倉箴李商隱獄箴張說縣令箴古之竒縣令箴元結五箴并序韓愈動靜二箴皮日休口箴姚元崇視聽箴沈顔自箴元結行已箴李翺暗室箴歐陽詹誡八三誡并序柳宗元冰壷誡姚元崇執秤誡韓愈執鏡誡守誡敵誡柳宗元銘八幾銘權徳輿門銘盧仝二銘并序羅衮我智而拒諌矜已聞之夏后據饋頻起亦有魏帝牽𥚑不止安彼反側如春陽秋露巍巍蕩蕩恢漢高大度撫兹庶事如屨薄臨深戰戰慄慄用周文小心詩之不識不知書之無偏無黨一彼此於􅎍臆捐好惡於心想衆棄而後加刑衆恱而後行賞弱其强而治其亂伸其屈而直其枉故曰如衡如石不定物以限物之懸者輕重自見如水如鏡不示物以情物之鑒者妍蚩自生勿渾渾而濁勿皎皎而淸勿汶汶而聞勿察察而明雖冕旒蔽目而視於未形雖黈纊塞耳而聽於無聲縱心乎湛然之域遊神於至道之精知之者應洪纎而效響酌之者隨深淺而皆盈故曰天之經地之寧王之貞四時不言而代序萬物無言而化成豈知帝力而天下和平吾王撥亂戡以智力民懼其威未懷其德我皇撫運扇以淳風民懷其始未保其終爰述金鏡窮神盡聖使人以心應言以行包括治體抑揚詞令天下爲公一人有慶開羅起祝援琴命詩一日二日念兹在兹惟人所召自天祐之諍臣司直敢告前疑丹扆箴六首并序李德𥙿臣聞詩云心乎愛矣遐不謂矣此古之賢人所以篤於事君者也夫跡踈而言親者危地逺而意忠者忤然臣竊念拔自先聖偏荷寵光若不愛君以忠則是上負靈鑒臣頃事先朝屬多隂沴甞著大明賦以諷頗蒙先朝嘉納臣今日盡節明主亦由是心昔張敞之守逺郡梅福之在遐徼尚竭誠盡親不避尤悔况臣甞學舊史頗知箴諷雖在踈逺猶思獻替謹稽首上丹扆六箴具列於後仰塵睿覽伏積兢惶宵衣箴先王聽政昧爽以俟雞鳴旣盈日出而視伯禹大聖寸隂爲貴光武至仁反支不忌無俾姜后獨去簪珥彤管記言克念前志正服箴聖人作服法象可觀雖在宴游尚不懷安汲黯莊色能正不冠楊阜慨然亦譏縹紈四時所御各有其官非此勿服惟辟所難罷獻箴漢文罷獻詔還騄駬鑾輅徐驅焉用千里厥後令王亦能恭巳翟裘旣焚筒布則毀道德爲麗慈儉爲美不過天道斯爲至理納誨箴惟后納誨以求厥中從善如流乃能成功漢驁沈酒舉白浮鍾魏叡侈伏凌霄作宫忠雖不忤而善亦從以視爲瑱是謂塞聦辨邪箴居上處深在察微萌雖有䜛慝不能蔽明漢之孝昭叡過周成上書知詐照姦得情燕蓋旣折王猷洽平百代之後乃流淑聲防微箴天子之孝敬遵王度安必思危乃無遺慮亂臣猖蹶非可遽數玄服莫辨觸瑟始仆栢谷微行豺豕塞路覩貌獻飱斯可戒懼手詔荅曰上雖不能盡用德裕之言而特命翰林學士韋處厚殷勤草詔還荅亦可謂奬善納忠至矣卿文雅大臣方隅重寄表率諸部肅淸全吳化洽行春風澄坐嘯眷言善政想歎在懷卿之宗門累著聲績冠内庭者兩代襲侯伯者六朝果能激愛君之誠喻詩人之㫖在逺而不忘忠告諷上而常深慮微愽我以端躬約余以循禮三復規諌累夕稱嗟致之座隅用比韋弦之益銘諸心腑何啻藥石之功卿旣巳投誠朕每懷開諫苟有過舉無忘密陳山川旣遐眷矚何巳必當勉巳以副深誠瑞箴孫朴國之將興妖不足慿國之將亡瑞不足良四靈之長莫極於龍夏德將衰曷降雌雄桑榖生朝殷道復昌麟岀豈妖孔氏云亡周公相周越裳獻雉安漢相漢越裳復至白魚躍舟鸑鷟鳴𡵨殷人聚喜周人聚悲素靈夜哭五星聚緯秦謂之妖漢謂之瑞彼瑞此妖顚倒如是妖至而防瑞至而狂恃物滅德未或不亡我作此箴敢獻哲王兵箴梁肅皇道無名帝治有征故效天殺作爲五兵曰王及霸功濟天下威實助德伐乃除禍逐鹿于原戰龍在野大寶臲卼非兵孰可動如決河靜逾滅火蒼蒼萬姓懸命在我所行者師所統者德功本乎義不本乎力順之曰聖逆之曰賊成敗存亡鮮不是則衆不足恃勝不足保武王一戎奄有九有紂之百克其卒無後故長民者無曰我强莫予敢亢尋邑百萬覆乎昆陽無曰我大莫予敢制陳吳攘袂嬴氏大潰武不可翫翫則必窮兵不可廢廢則終凶故曰天下雖平忘兵則危不教民戰且謂棄之齊桓矜衆九國以離徐偃仁義本邦亦隳傳美止戈易稱以律古之睿智神武不殺治亂之機繫於杪忽壯直且順孰云我遏旅臣斯箴敢告執鉞太倉箴李商隱險哉太倉險若太行彼懸車束馬爲陟高岡此禍胎怨府起自斗量無小無大不可不防澄波萬頃不廢汪汪火烈人畏不廢剛腸曷若寛猛處于中央泉穀之地勿言容易貪夫徇財有死無二衘黠馬銜不得不利下或䛕我過人之聦是人甘言將欲相聾下或誇我秋毫必睹是人甘言將欲相瞽長如欲戰莫捨强弩長如獲禽莫忘縳虎衆人之言有訛有眞如彼五味有甘有辛口自甞取無信他人天生五色有白有黑目自别取無爲人惑而況乎九門崇崇近在牆東天視天聽惟明惟聦問龠合斗斛何以用銅取寒暑暴露不改其容亦象君子介然居中終日戰慄猶懼或失銜用何利鍜之以清虎用何縳挼之以明弩用何射發之以誠俾後來居上無由以生有餘不足無由以爭心爲凖槩何憂乎不直不平各敬爾職一廼心力倉中水外人馬勿食陶母反魚以之歎息豈無他粟豈無他芻薏苡似珠不可不虞倉中役夫千逕萬途桀黠爲炭眭盱爲鑪應事成象無有定模縁私指使愼勿以呼賔朋姻婭或來讌話倉中酒醴愼勿以貰海翁無機鷗故不飛海翁易慮鷗乃飛去是以聖人從微至著不遺忠恕借借貸貣此門先塞須防蒼蠅變白作黑嗚呼孰慮孰圖昔在漢家倉令淳于致令少女上訴無辜䧟身至是不亦悲乎敢告君子身可殺道不可渝獄箴張說官有決曹掌兹法獄匪惟議罪亦以防欲所貴仁恕非矜窘束吏苟吹毛人安措足古之爲主是戒是勗茫茫率土蠢蠢羣生賢愚中雜眞僞相傾若魚之駭如鳥之驚不能無犯宜持以平或大或小時重時輕無以快志期乎得情孰曰非重國之政令孰曰非輕人之性命虐則招咎寛則納慶冝愼冝恤可畏可敬爲獄則固爲牢則幽晨嚴管鑰夜密更籌寂寂圎土纍纍繫囚求食揺尾見吏垂頭自昔立名此爲非所逼隘狹室欹傾漏宇冬有祁寒夏多隆暑焉可失入焉可妄處勿謂無妨勿謂無傷匹婦含怨三年亢陽匹夫結憤六月飛霜可以安危可以興亡敢告司憲無輕國章縣令箴古之竒咨爾多士各司厥官政不欲猛刑不欲寛寛則人慢猛則人殘寛則不濟猛則不安小惡無爲㳙流成池片言可用毫末將拱禍旣有胎德豈無種鏡不自照秖能鑑物人不自知從諫勿咈慾不可縱貨不可黷黷貨生災慾縱禍速勿輕小人蜂蠆有毒勿輕小道大車可覆勿謂剛可長長剛者亡無謂柔可履履柔者恥剛強有時柔弱有宜時宜克念願在深思不恕而明不如不明不通而清不如不清無爲惡行無逆善名保此中道無成不成過客箴士兾申同聲如山之重如水之清如石之堅如松之貞如劒之利如鏡之明如弦之直如秤之平縣令箴元結古今所貴有工之官當其選授何甞不難爲其動靜是人禍福爲其嘘噏作人寒燠煩則人怨猛則人懼勿以賞罰因其喜怒太寛則慢豈能行令太簡則踈難與爲政旣明且斷直焉無情清而且惠果然必行或曰開由上官事不自我辭讓而去有何不可誰欲字人贈君此箴豈獨書紳可以銘心五箴并序韓愈人患不知其過旣知之不能改無勇也予生三十有八年髪之短者日益白齒之揺者日益脫聦明不及於前時道德日負於初心其不至於君子而卒爲小人也昭昭矣作五箴以訟其惡云游箴于少之時將求多能蚤夜以孜孜于今之時旣飽而嬉蚤夜以無爲嗚呼予乎其無知乎君子之棄而小人之歸乎言箴不知言之人烏可與言知言之人黙焉而其意巳傳幕中之辯人反以汝爲叛臺中之評人反以汝爲傾汝不懲邪而呶呶以害其生邪行箴行與義乖言與法違後雖無害汝可以悔行也無邪言也無頗死而不死汝悔而何宜悔而休汝惡曷廖宜休而悔汝善安在悔不可止悔不可爲思而思得汝則弗思好惡箴無悖而好不觀其道無悖而惡不詳其故前之所好今見其尤從也爲比捨也爲讎前之所惡今見其臧從也爲愧捨也爲狂維讎維比維狂維愧於身不祥於徳不義不義不祥維惡之大幾如是爲而不顚沛齒之尙少庸有不思今其老矣不愼胡爲知名箴内不足者急於人知沛焉有餘厥聞四馳今日告汝知名之法勿病無聞病其曄曄昔者子路惟恐有聞赫然子載德譽愈尊矜汝文章負汝言語乘人不能掩以自取汝非其父汝非其師不請而教誰云不欺欺以賈憎掩以媒怨汝曽不寤以及於難小人在辱亦克知悔及其旣寜終莫能戒旣出汝心又銘汝前汝如不顧辱則宜然動箴皮日休動生於欲行生於爲欲則不妄爲則不疑吾道未喪于何不之勿生季世有爵必危勿居亂國有禄必尸住無市怨去無取嗤跡無露顯名無求知聲無取猜譽無致疑坦道如砥履過蒺藜四海如家去劇縶維日愼一日念兹在兹靜箴冥冥黙黙惟道之域處不違仁居無悖德勿欺孩孺衣冠失則勿慢皁隷語言成隙深山雖樂犲狼爾殛深林雖安虺蜴爾螫居不必野惟性之寂止不必廣惟心之適勿傲乎名要乎聘帛勿矯乎節取乎禄食躬雖以安若敵鋒鏑味雖以甘若含冰蘖成吾高風惟靜之力口箴姚元崇君子欲訥吉人寡辭利口作戒長舌爲詩斯言不善千里違之勿謂可復駟馬難追惟靜惟黙澄神之極去甚去㤗居物之外多言多失多事多害聲繁則淫音希則大室本無暗垣亦有耳何言者天成蹊者李似不能言爲世所尊言不出口冠時之首無掉爾舌以速爾咎無易爾言亦孔之醜敬之愼之可大可乆敬之伊何三命而走愼之伊何三緘其口勗哉夫子行矣勉旃書之屋壁以代韋弦視聽箴沈顔人一其視而不一其明故目有時盲人一其聽而不一其聦故耳有時聾蓋目之盲由物亂其睛耳之聾由聲惑其聦且玉者咸知其玉也石者咸知其石也碔砆亂焉宫者咸知其宫也商者咸知其商也而鄭衛惑焉夫人者孰欲棄眞而取僞背正而歸邪諒視不詳而聽不審耳俾視不詳而聽不審者豈不以碔砆鄭衛之故乎吁天下之大萬物之衆其亂目惑耳者非特碔砆鄭衛而已則知非聖賢其不惑於視聽者稀矣自箴元結有時士教元子顯身之道曰干時不爭無以顯榮與世不佞終身自病君欲求權須曲須圓君欲求位須姦須媚不能此爲窮賤勿辭元子對曰不能此爲乃吾之心反君此言作我自箴與時仁讓人不汝上處世淸介人不汝害汝若全德必忠必直汝若全行必方必正終身如此可謂君子行已箴李翺人之愛我我度于義義則爲朋否則爲利人之惡我我思其由過寧不改否又何仇仇實生怨利實害德我如不思乃䧟于惑内省不足愧形于顔中心無他曷畏多言唯咎在躬若市于戮慢謔自他匪汝之辱昔者君子惟禮是持自小及大曷莫從斯苟逺于此其何不爲事之在人昧者亦知遷焉及巳則莫之思造次不戒禍焉可期書之在側以作我師暗室箴歐陽詹夫行以檢身非以爲人無淫無佚其處宜一孜孜碩人㝠㝠暗室罔縱爾神罔輕爾質逺兹小惡念彼元吉勿謂傍帷上蓋天鑒無外勿謂後掩前扃神在無形天不長慝神實正直神怒天誅未始有極昔者趙盾假寐矜莊天迴厥害鋤倪巳亡又有符堅竊爲制度神敗其類蒼蠅以呼天窺神窺人無不知神忿天忿身無所隱澗松抱節幽蘭以薰歲寒不變無人亦芬草木猶爾人其曷云戒愼乎其所不見恐懼乎其所不聞先師有言敢告夫君三戒并序柳宗元吾恒惡世之人不知推巳之本而乗物以逞或依世以干非其類岀技以怒强竊時以肆暴然卒迨于禍有客談麋驢䑕三物似其事作三戒臨江之麋臨江之人畋得麋麑畜之入門羣犬垂涎揚尾皆來其人怒怚之自是日抱就犬者習示之使勿動稍使與之戲積乆犬皆如人意麋麑稍大忘已之麋也以爲犬良我友抵觸偃仆益狎犬畏主人與之俯仰甚善然時啖其舌三年麋出門見犬在道甚衆走欲以爲戲外犬見而喜且怒共殺食之狼藉道上麋至死終不悟黔之驢黔無驢有好事者舩載以入至則無可用放之山下虎見之尨然大物也以爲神蔽林間窺之稍出近之憖憖然莫相知他日驢一鳴虎大駭逺遁以爲且噬已也甚恐然往來視之覺無異能者益習其聲又近出前後終不敢搏稍近益狎蕩倚衝冒驢不勝怒蹄之虎因喜計之曰技止此耳跳踉大口闞斷其喉盡其肉乃去噫形之尨也類有德聲之宏也類有能向不出其技虎雖猛疑畏卒不敢取今若是焉悲夫永某氏之鼠永有某氏者畏日拘忌特甚以爲巳生歲直子䑕子神也因愛䑕不畜貓大禁僮勿擊䑕倉廪庖厨悉以恣䑕不問由是䑕相告皆來某氏飽食而無禍某氏室無完器椸無完衣飲食大率䑕之餘也晝纍纍與人並行夜則竊齧鬪暴聲萬狀不可以寢終不厭數歲某氏徙居他州後人來居䑕爲態如故其人曰是隂類惡物也盗暴尤甚且何以至是乎哉假五六貓闔門撤瓦灌穴購僮羅捕之殺鼠如丘棄之隱處臰數月乃巳嗚呼彼以其飽食無禍爲可恒哉冰壷誡并序姚元崇冰壷者清絜之至也君子對之不忘乎淸夫洞澈無瑕澄空見底當官明白者有類是乎故内懷冰清外涵玉潤此君子冰壷之德也玉本無瑕冰亦至絜方圓相映表裏皆澈喻彼貞廉能守其節凡今之人就列稱臣當官以割剥爲務在上以財賄爲親豈異夫象之有齒以焚其身魚之貪餌必曝其鱗故君子讓榮不憂辭滿爲珍以備其德以全其眞與其濁富寧比清貧吳隱酌泉龐㳟致水席皮洗幘緼袍空裏雖清畏人知而所知逺矣嗟爾在位禄厚官尊固當聳廉勤之節塞貪競之門冰壷是對炯戒猶存以此清白遺其子孫執秤誡并序秤者衡衡天下之平也君子執之以平其心夫衡在天以齊七政在人以均萬物稱物平施爲政以公毫釐不差輕重必得是執秤衡之理也聖人爲衡四方取則志守公平體兼正直用於天官銓綜斯得行於里閈紛競以息故南西以對左右以持秤物低仰不差毫釐使錙銖不惑輕重無疑智不能矯愚不能欺存信去詐以公滅私無偏無黨君子似之法者天下公器官者庶人之師其身旣正不令而行在下無恐唯上之平故曰上之所仰人皆其向我之所教人皆其效心苟至公人將大同心能執一政乃無失嗟爾多士欽哉勉旃庶以觀則同夫佩弦執鏡誡并序執鏡取其明也夫内涵虚心外分朗鑒物不可以匿詐體無得以逃形是以野鹿窺而慙山雞對而舞故君子是繪是畫置之座隅蓋將照姦回之心絶險詖之路也詩曰我心匪鑒不可以茹亦其理焉秦樓明鏡鑒有餘暉色自凝曉光能洞微飾以鞶組匣以珠璣龍遶池卧烏臨月飛傍入四鄰中延萬象濟物攸愽利人斯廣握在帝心則宇宙融朗懸諸詮目則翹楚瞻仰且明不匿瑕君子是嘉不疲屢照君子是效嗟爾在職爲代作則刑不可濫政不可賊凡今之人鮮務爲德紛綸謟媚汩没忠直當須如鏡之明斷可以平如鏡之絜斷可以決敢告後來無忝前哲守戒韓愈詩曰大邦維翰書曰以藩王室諸侯之於天子不惟守土地奉職貢而已固將有以翰藩之也今人有宅於山者知猛獸之爲害則必髙其柴援而外施䧟穽以待之宅於都者知穿窬之爲盗則必峻其垣墻而内固扄鐍以防之此野人鄙夫之所及非有過人之智而後能也今之通都大邑介於倔强之間而不知爲之備噫亦惑矣野人鄙夫能之而王公大人反不能焉豈材力有所不足歟蓋以爲不足爲耳天下之禍莫大於不足爲材力不足者次之不足爲者敵至而不知材力不足者先事而思則其於禍也有間矣彼之倔强者帶甲荷戈不知其多少其緜地則千里與我壤地相錯無有丘陵江河洞庭孟門之關其間又自知其不得與天下齒朝夕舉踵引頸兾天下之有事以乗吾之便此其暴於猛獸穿窬也甚矣嗚呼胡知而不爲之備乎哉賁育之不戒童子之不抗魯雞之不期蜀雞之不支今夫鹿之於豹非不巍然大矣然而卒爲之禽者爪牙之材不同猛怯之資殊也曰然則如何而備之曰在得人敵戒柳宗元皆知敵之仇而不知爲益之尤皆知敵之害而不知爲利之大秦有六國兢兢以强六國旣除􅑲􅑲乃亡晉敗楚鄢范文爲患厲之不啚舉國造怨孟孫惡臧孟死臧恤藥石去矣吾亡無日智能知之猶卒以危矧今之人曽不是思敵存而懼敵去而舞廢備自盈秖益爲瘉敵存滅禍敵去召過有能知此道大名播懲病克壽矜莊死暴縱欲不戒匪愚伊耄我作戒詩思者無咎幾銘權德輿大和熈熈酌而用之旁魄變化皆生乎幾上合乾道萬物隂騭下爲人紀百工咸秩游泳虚無合體渾區乃卷乃舒與羣有俱沖用爲工方寸爲爐周行不殆造物何侔一以制動寡以理衆或行其道或藏其用盤桓利貞得時大行爕賛財成粲然文明舒亘八極藏之無形山川出雲元氣㝠㝠故曰知幾其神孔父周文去聖逺矣時無其人見幾而作造形斯悟蘧生可卷顔子殆庶物知至至節宣好惡無愆五事無汨百度靜之如淵運之如環得喪糺纆相望其閒不見其眹莫知其然審而用之吾道常全門銘盧仝貪殘姦􅿅狡佞訐愎身之八殺背惠恃巳狎不肖妬賢才命之四孽有是有此余敢辭無是無此余之師一日不見余心思思其人懼其人其交其難敢告于門二銘并序羅衮黃帝作巾几之法孔甲有盤盂之戒太公陳觴鏡之銘所以昭成敗而防遺闕也衮不敢追跡聖賢輒取枕杖二物而爲之銘亦古之賤士不忘君臣之分也枕銘或枕或欹有安有危勿邪其思杖銘身之疲杖以扶之國之危賢以圖之櫛銘盧仝人之有髪兮旦且思理有身兮有心兮胡不如是藏劒銘潘存實曽得劔匣而不持或怪之乃荅曰直不可媚善不可害仁不可暴苟好是則利不在鋒鋩矣遂爲銘曰龍入泉星上天雄雄神器蓄在人間於戲動不仁靜不德雖百鍊之鋼於愛身也奚力座右銘白居易崔子玉座右銘予竊慕之雖未能盡行常書屋壁然其間似有未盡者因續爲座右銘勿慕貴與富勿憂賤與貧自問道何如貴賤安足云聞毀勿慼慼聞譽勿欣欣自顧行何如毀譽安足論無以意傲物以逺辱於人無以色求事以自重其身遊與邪分歧居與正爲鄰於中有取捨此外無踈親修外以及内靜養和與眞養内不遺外動率義與仁千里始足下高山起微塵吾道亦如此行之貴日新不敢規他人聊自書諸紳終身且自朂身没貽後昆後昆苟反是非我之子孫猩猩銘并序裴炎酈元長水經注云武平封谿縣有獸曰猩猩猨形人靣顔容端正學人語若與交言聞者無不欷歔其肉食之窮年無厭可以辟糓淮南子曰猩猩知徃而不知來謂知人家徃事及祖父名位阮汧云曽使封谿見邑人云猩猩在山谷行常有數百爲羣里人以酒并糟設於路側又愛著屐里人織草爲屐更相連結猩猩見酒及屐知里人設張則知張者祖先姓字及呼名罵云奴欲張我捨爾而去復自再三相謂曰試共嘗酒及飲其味逮乎醉因取屐而著之乃爲人之所擒皆獲輙無遺者遂置檻中隨其所欲而飲之將烹里人索其肥者乃自推托泣而遣之左太冲吳都賦曰猩猩啼而就烹里人以餉封谿令曰何物曰猩猩惟與酒兼之以屐可以就擒爾西國胡人取其血染毳罽色鮮不黯或曰或刺其血問之爾與我㡬許猩猩曰二升果足其數若加之鞭捶問之則隨所加而得至於一斗弗如此未肯頓輸張薦孝廉好古之士於笥中出此圖相示賔客客覽之曰悲哉此獸何其愚也有僧去塵在座謂諸賔客曰彼獸獸也夫何足云竊見人而似之曽無悟矣四座引而問之曰夫財色名利溺人也曷若猩猩好酒乎爵賞禄位羇人也曷若猩猩愛屐乎饕餮致禍飾辭覬免者曷若猩猩推肥乎藴利生孽死而無悔者曷若猩猩含血乎子奚獨悲此諸賔矍然改容而歎曰大哉高人之言也豈趨世利汨没名務者之所聞乎敬篆斯言以爲座右銘其銘曰爾形惟猨爾靣惟人言不忝靣智不踰身淮隂佐漢李斯相秦曷若箕山以全吾眞重校正唐文粹卷第七十八
