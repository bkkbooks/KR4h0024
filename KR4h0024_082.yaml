body:
  text: 吳興姚鉉纂書四揔一十首論史荅孟判官論宇文生評史官書柳冕與馬植書劉軻論史上蕭至忠書劉子玄與陳叔達重借隋紀書王績荅王績書陳叔達荅韓愈論史官書桞宗元荅皇甫湜書李翺與韓愈致叚太尉逸事書栁宗元與史館韓愈郎中書元稹荅元稹侍御書韓愈荅孟判官論宇文生評史官書柳冕昨暮辱問兼示所寄宇文生書憂深思逺推仲尼之道見天地之心甚善來書之意逺者大者斯盡善矣其愚之所諭者輒備聞見以獻左右字文生云仲尼因舊史修春秋所記不過二百四十二年今子長乃軼孔氏而修數千年荒絶之書助以黃老寓託之說仲尼之所二子長之所一仲尼之所難子長之所易美則美矣愚以爲未盡昔大雅喪然後頌聲寢王澤竭然後詩不作諸侯放恣處士横議孔子懼作春秋以一王法於是記言事以爲襃貶盡聞見以爲實辭舉凡例以爲異同此夫子之所見也故書之所聞異同此夫子之所聞也故書之所傳聞異同此夫子之所傳聞也故書之非此三者夫子不書此聖人之志也非當十二公之事聖人以爲易過十二公之事聖人以爲難明矣六經之作聖人所以明天道正人倫助治亂苟非大者君子不學苟非逺者君子不言學大則君子之德崇言逺則君子之業廣故仲尼歎曰大哉堯之爲君也惟天爲大惟堯則之巍巍乎其有成功也煥乎其有文章也又曰周監於二代郁郁乎文哉吾從周於是敘書即起堯典稱樂即美韶武論詩即首周南修春秋則繩以文武之道然後樂正雅頌各得其所至于幽厲桓莊逶迤陵頽斯不足徴也故曰夏禮吾能言之杞不足徴也殷禮吾能言之宋不足徴也足則吾能徴之矣是以三千之徒無道桓文之事者豈不教尊而後道高師聖而後功倍者也曽子曰尊其所聞則高明矣行其所知則光大矣又來書罪子長自序云夫子没五百年而史記作非聖人而修聖人之名者素王之篡臣也美則美矣愚以爲未盡昔周公制禮五百年而夫子修春秋夫子没五百年而子長修史記遷雖不得聖人之道而繼聖人之志不得聖人之才而得聖人之旨自以爲命丗而生亦信然也且遷之没巳千載矣遷之史未有繼之者謂之命丗不亦宜乎噫遷承滅學之後修廢起滯以論天人之際以通古今之變而徴遷叙事廣其所聞是軒轅之道不滅矣推而廣之亦非罪也且遷之過在不本於儒教以一王法使楊朱墨子得非聖人此儒之罪也不在於叙逺古示將來也足下豈不謂然乎夫聖人之於春秋所以教人善惡也修經以志之書法以勸之立例以明之恐人之不至也恐人之不學也茍不以其道示人則聖人不復修春秋矣不以其法教人則後丗不復師聖人矣故夫求聖人之道在求聖人之心求聖人之心在書聖人之法法者凡例襃貶是也而遷捨之春秋尚古而遷變古由不本於經也以遷之雄才奮史筆不虚美不隱惡守凡例而書之則與左氏並驅爭先矣苟知聖人之法則知春秋之可興知春秋之可興則君子乎哉宇文生近之矣昔者仲尼門人得其門者然後見宗廟之美升其堂者然後見稚頌之聲入其室者然後見道德之奥雖道有汚隆性有深淺然當其所得莫不有聖人之道故言而爲經動而爲教者學也不學而至者無焉故曰不登高山不知天之大也不臨深谿不知地之廣也不遊聖人之門不知道德之富也今大雅旣隱賢人隨之茍非君子孰能知道宇文生居於今之世行於古之道君子以爲難前志之所遺此子之所得君子以爲難爲僕謝之夫言大道者不可以小說應黃鍾者不可以末音師聖人者不可以無法三者知之斯爲難文之爲難斯又難之僕智不足而彊言之頓首與馬植書劉軻始存之不以予古拙不責予以今人之態能遺其鈆黃外飾直索予心於古人之心在今之行古者然雖無以應君子幸存之不友予以面予何人敢不以心友於存之邪且古人相知在此今愚忌存之固有未予知者矧與相面者其能異於行路之人哉固無也有恨羣居時口未能言及此還罷又不相處雖素尚蓄積竟未得露一毫於方寸之地毎一相見何甞不嗛嗛於内若飲者實滿於腹思一吐而未果者存之謂予是言似乎哉以爲似則予不得不吐於存之矣先此二十年予方去兒童心將事四方志若學山者以一簣不止望嵚崟干上誓不以丘陵其心而盡乎中道也志且未決適遭天譴重罹凶咎日月之下獨有形影存之以予此時宜如何心哉茍將盡餘息以鴻同大化或有論予者相曉以古道且曰若身未立於時若名未揚於人若且死獨不畏聖人之經戒俾立身揚名之意邪蹶然而恐震駭且乆曰微夫子吾幾得罪於聖人矣噫聖人之言天戒也天戒何可違乎歷數歲自洙泗渡于淮達于江過洞庭三苗踰郴亦南㳂湞江浮滄溟抵羅浮始得師于壽春楊生楊生以傳書爲道者也始則三代聖王死而其道盡留於春秋春秋之道某以不下牀而求之求之必謀吾無傳不失其指毎問一卷講一經說一傳疑周公孔子左丘明公羊高榖梁赤若迴環在座似假生之口以達其心也邇來數年精力刻竭希金口木舌將以卒其業雖未能無愧於古人然於聖人之道非不孜孜也旣而曰以是爲駕說之儒曷若爲行道之儒邪貯之於心有經實施之於事有古道猶不愈於堆案滿架矻矻於筆硯間邪徒念旣往者未及孔門之宫墻自謂與回牛相上下傳經意者家家自以爲商偃執史筆者人人自以爲遷固此愚所以憤悱思欲以聖人之爲市南宜僚以解其紛以衡石輕重俾將來者知聖代有譙周焉此某所以蓄其心者元和初方下羅浮越梅嶺泛贛江浮彭蟸又抵於匡廬匡廬有隱士茅君腹笥古今史且能言其工拙贅蠧語經之文聖人之語歷歷如指掌予又從而明之者若出井置之於泰山之上其爲見非不弘矣長恨司馬子長謂挈諸聖賢者豈不然乎哉脫漸子長之言予之厄窮其身將淬磨其心亦天也是天有意我獨無恙何也夫然亦何必瞽吾目然后國語刖吾足然后兵法抵宫刑然后史記邪予是以自忘其愚瞽故有三傳指要十五卷漢書右史十卷黃中通理三卷翼孟三卷隋監一卷三禪五革一卷每撰一書何甞不覃精濳思綿絡指統或有鼓吹於大君之前曰眞良史矣且曰上古之人不能昭明矣某其如何有知予者相期不啻於今人存之信然乎哉此古人所以許一死以謝知已誠難事也如不難亦何爲必以古人期於今人待邪又自史記班漢巳來秉史筆者予盡知其人矣言東漢有若陳宗尹敏伏無忌邊韶崔實馬日磾蔡邕盧植司馬彪華嶠范曄袁宏言國志有若衛顗繆襲應璩王沈傳玄茅曜薛塋華覆陳壽言晉洛京史有若陸機束晳王詮詮子隱言江左史有若鄧粲孫盛王韶之檀道鸞何法盛臧榮緒言宋史有若何承天裴松之蘇寳圭沈約裴子野言齊史有若江文通吳均言梁史有若周興嗣鮑行卿何之元劉璠言陳史有若顧野王傅宰陸瓊姚察察子思廉言十六國史有若崔鴻言魏史有若鄧淵崔浩浩弟覽高允張偉劉橫李彪邢巒温子昇魏收言北齊史有若祖孝徴陸元規湯休之杜臺卿崔子發李德林林子百藥言後周史有若柳虬牛弘令狐德棻岑文本言隋書有若王師邵王胄顔師古孔穎達于志寧李延壽言皇家受命有若温大雅魏鄭公房梁公長孫趙公許敬宗劉胤之楊仁卿顧胤牛鳯及劉子玄朱敬則徐堅吳兢次而修者亦近在耳目於戲自東觀至武德巳來其閒作者遺草有未行於時及修撰未旣者如聞並藏於史閣固非外學者可得究諸予雖無聞良史至於實録品藻増損詳略亦各有新意豈無班馬之文質董史之遺直者邪蓋有之矣我未之見也常欲以春秋條貫刪𥙷冗闕掇拾衆美成一家之盡善有若採葑菲者無以下體衣狐裘者無以羔袖言不多乎哉以爲多則存之視予力志何如耳昔阮嗣宗嗜酒當時以爲歩兵挍尉雖非其任貴且快意今予之嗜書有甚於嗣宗之嗜酒且虚其腹若行哺而實者存之宜如何處予哉傳不云乎心志旣通名譽不聞其足下何遺邪此存之所宜動心也脫禄不及厚孤弱名不及善知友匡廬之下猶有田一成耕牛兩具僮僕爲相雜書萬卷亦足以養高頤神誠知非丈夫矣所立固不失谷口鄭子眞耳敢布諸足下其圖之某再拜論史上蕭至忠書劉子玄僕自䇿名仕伍待罪朝列三爲史臣再入東觀竟不能勒成國典貽彼後來者何哉靜言思之其不可有五故也何者古之國史皆出一家如魯漢之丘明子長晉齊之董狐南史咸能立言不朽藏諸名山未聞藉於衆功方云絶筆惟後漢東觀大集羣懦而著述無主條章靡立由是伯度訝其不實公理以爲可焚張蔡二子糺之於當代傳范兩家嗤之於後葉今史司取士有倍東京人自以爲荀袁家自稱爲政駿毎欲記一事載一言皆閣筆相視含毫不斷故首白可期而汗青無日其不可一也前漢郡國計書先上太史副上丞相後漢公卿所撰始集公府乃上蘭臺由是史官所修載事爲傳爰自近古此道不行史臣編録惟自詢探而左右二史闕注起居衣冠百家罕通行狀求風俗於州郡視聽匪詳討㳂革於臺閣簿籍難見雖使尼父再出猶且成於管窺況僕限以中才安能遂其博物其不可二也昔董狐之書法也以示於朝南史之書弒也執蕳以往而近代史局皆通籍禁門幽居九重欲人不見尋其義者蓋由杜彼顔面防諸請謁故也然今館中作者多士如林皆願長喙無聞䶦舌儻有五始初成一字加貶言未絶口而朝野具知筆未涵毫而搢紳咸見夫孫盛實録取嫉權門王韶直書見讎貴族人之情也能無畏乎其不可三也古者刋定一史纂成一家體統各殊指歸咸别夫尚書之教以䟽通知逺爲主春秋之義以懲惡勸善爲先史記則退處士而進姦雄漢書則抑忠臣而飾主闕斯並曩賢得失之例良史是非之准作者言之詳矣頃史官注記多取稟監修楊令公法春秋則云必須直辭宗尚書則曰宜多隱惡十羊九牧其意難行一國三公適從焉在其不可四也竊以史置監修雖無古式尋其名號可得而言夫言監者蓋揔領之義耳如創紀編年則年有斷限草傳叙事則事有豐約或可略而不略或應書而不書此失刋削之務也屬辭比事勞逸宜均揮鈆奮墨勤墮須等某袠某篇付之此職某紀某傳歸之彼官此銓配之理也斯並宜明立科條審定區域儻人思自勉則書可立成今監之者旣不指授修之者又無遵奉用使爭學苟且務相推避坐變炎涼徒延歳月其不可五也凡此不可其流實多一言以蔽三隅自反而時談物議焉得笑僕編次無聞者哉比者伏見明公毎汲汲於勸誘勤勤於課績或云墳籍事重努力用心或云歲序巳淹何時輟手竊以綱維不舉而督課徒勤雖威以刺骨之刑朂以懸金之賞終不得也論語曰陳力就列不能者止僕所以昔者布懷知已歷詆群公屢辭載筆之官願罷記言之職者正爲此耳當今朝號得人國稱多士蓬山之下良直差肩芸閣之中英竒接武僕旣功虧刻鶴筆未獲麟徒殫太官之膳虚索長安之米乞以本職還其舊居多謝簡書請避賢路惟明公足下哀而許之與陳叔達重借隋紀書王績乆承所撰隋紀繕寫咸畢前舍弟及家人往並有書借咸不見付豈連城之珍俟楚文而乃進崩山之操待鍾期而後發應以左貂右蟬榮冠東省掌壷負璽望重南宫朝夕丹墀揖讓増價往來青瑣歩頓生光豐屋華榱顧蓬蒿而徙眷鳴鍾列鼎想藜藿而移交不與驕期遂忘曩時之好耳僕遭逢明聖棲遲丘壑幸恱堯舜之風得全箕穎之操雖心期所託吾道遥存而出處離異儀形難接所以願慿鱗羽宛若承顔望觀述作欣然得意足下裁成國典襃貶人倫欲使明鏡一時覆車千祀故當貽諸好事豈擬唯傳子孫方復固其緘縢嚴其扄鐍天下之望豈如是乎僕亡兄芮城甞典著局大業之末欲撰隋書俄逢喪亂未及終畢僕竊不自揆思卒餘功收撮漂零尚存數帙兆自開皇之始迄于大業之𥘉咸亡兄黜竄之遺迹也大業之後言事闕然僕雖欲繼成無可慿採以此尤思見足下之所作也還使請致無再三王績白荅王績書陳叔達賢弟千牛及家人典琴至頻辱芳翰索下官所撰隋紀雖承厚眷懣然自失誠恐持郄克之質入邯戰之墟奏曹鄶之音歷莖英之肆所以遟迴簡牘伏念旬時輒揆短懷仰違前命今奉來札誨責逾深旣以驕鄙相訶又以緘縢致誚欲加之罪其無辭乎正當要使必致耳了不知賢兄芮城有隋書之作足下旣圖繼就須有考尋謹依高㫖繕録馳送然僕雖不佞頗聞君子之論矣甞以謂爲國以禮君舉必書故左史記言右史記事言者申立德立功之意也事者敘立德立功之迹也所以明勸沮所以别是非自非可以關社稷之安危渉天人之興廢古之君子何甞取諸襃貶之作有由然也自微言泯絶大義乖墜三代之敎亂於甲兵六經之術滅於煨燼君人者尚空名以夸六合史官者貴虚飾以佞一時下及馬遷爰建班固咸有述作庶幾聖賢其於斟酌典謨表章微絶曽不能觸其藩籬者也魏晉之際夫何足云中原版蕩史道息矣然國於天地與有立焉苟能宅郊禋建社稷樹師長撫黎元雖復五裂山河三分躔次規模典式豈徒然哉是賢兄文中子知其若此也恐後之筆削陷於繫碎宏綱正典暗而不宣乃興元經以定眞統蓋獲麟之事夫何足以知之叔達亡國之餘幸賴前烈有隋之末濫尸貴郡因霑善誘頗識大方至若梁魏周齊之閒耳目耆舊所接風流人物名實可知衣冠道義謳謡尚在頃者皇建其極君子道亨慿藉時來妄叨近侍廟堂多暇典墳自娱覽後魏周齊之紀傳考下官之所聞見曽不喜怒隨意曲直任情敘致浮雜襃貶阿黨述時望者以爵禄爲榮談陳國紀者以狙譎爲能事至於密㑹王道濳濟生人旣昧於知音咸寢而不記貪救寫其祖父冠冕胤嗣婚姻以爲譜牒之證耳豈不痛哉風俗之壞一至於此雖人倫王化備列元經而恢談碩議或不可捨是以薛記室及賢兄芮城常悲魏周之史各著春秋近更研覽眞良史焉古人云過高唐者學王豹之謳遊睢渙者學藻繪之功竊惟隋氏之王三十六年成敗否泰目所親覩誠懼後之作者復習向時之弊焉故聊因掌壷之暇著隨紀二十卷騁辭流離則媿於心矣書事簡要則甞有志焉孔子曰我欲載之空言不如附之於行事儻近是乎謹恃疇眷以塵清覽當積兼金以購黜竄耳又恐足下紀傳之作須備異聞今更附王胄大業起居注往荅韓愈論史官書柳宗元正月二十一日宗元頓首十八丈退之侍者前獲書言史事云具與劉秀才書及今乃見書藁私心甚不喜與退之往年言史事甚大謬若書中言退之不宜一日在館下安有探宰相意以爲茍以史榮一韓退之邪若果爾退之豈宜虚受宰相榮已而冒居館下近密地食奉養役使掌固利𥿄筆爲私書取以供子弟費古之志於道者不宜若是且退之以爲紀録者有刑禍避不肯就尤非也史以名襃貶猶且恐懼不敢爲設使退之爲御史中丞大夫其褒貶成敗人愈益顯其宜恐懼尤大也則尤將揚揚入臺府美食安坐行呼唱於朝廷而巳邪在御史猶爾設使退之爲宰相生殺出入升黜天下士其敵益衆則又揚揚入政事堂美食安坐行呼唱於内廷外衢而巳邪又何以異不爲史而榮其號利其禄也又言不有人禍則有天刑若以罪夫前古之爲史者然亦甚惑凡居其位思直其道道茍直雖死不可迴也如迴之莫若亟去其位孔子之困於魯衛陳宋蔡齊楚者其時暗諸侯不能以也其不遇而死不以作春秋故也當其時雖不作春秋孔子猶不遇而死也若周公史佚雖紀言書事猶遇且顯也又不得以春秋爲孔子累范曄悖亂雖不爲史其族亦赤司馬遷觸天子喜怒班固不檢下崔浩沽其直以鬪暴虜皆非中道左丘明以疾盲出於不幸子夏不爲史亦盲不可以是爲戒其餘皆不出此是退之冝守中道不忘其直無以他事自恐退之之恐唯在不直不得中道刑禍非所恐也凡言二百年文武士多有誠如此者今退之曰我一人也何能明則同職者又所云若是後來繼今者又所云若是人人皆曰我一人則卒誰能紀傳之邪如退之但以所聞知孜孜不敢怠則同職者後來繼今者亦各以所聞知孜孜不敢怠則庶幾不墜使卒有明也不然徒信人口語毎每異辭日以滋乆則所云磊磊軒天地者決不沈没且亂雜無可考非有志者所忍恣也果有志豈當待人督責迫蹙然後爲官守邪又凡鬼神事眇茫荒惑無可准明者所不道退之之智而猶懼於此今學如退之辭如退之好言論如退之慷慨自謂正直行行焉如退之猶所云若是則唐之史述其卒無可託乎明天子賢宰相得史才如此而又不果甚可痛哉退之宜更思可爲速爲果卒以爲恐懼不敢則一日可引去又何以云行且謀也今人當爲而不爲又誘館中他人及後生者此大惑巳不勉已而欲勉人難矣哉荅皇甫湜書李翺辱書覽所寄文章辭高理直歡恱無量有足發予者自别足下來僕口不曽言文非不好也言無所益衆亦未信秪足以招謗忤物於道無明故不言也僕到越中得一官三年矣材能甚薄澤不𬒳物月費官錢自度終無𥙷累求罷去尚未得以爲愧僕性不解謟佞復不能曲事權貴以故不得齒于士林而足下亦抱屈在外故略有所說凡古賢聖得位於時道行天下皆不著書以其事業存於制度足以自見故也其著書者蓋道德充積阨摧於時身卑處下澤不能潤物恥灰泯而燼滅又無聖人爲之發明故假空言是非一代以傳無窮而自光耀于後或往往有著書者僕近寫得唐書史官才薄言辭鄙淺不足以發揚高祖太宗烈聖明德使後之觀者文采不及周漢之書僕以爲西漢十一帝髙祖起布衣定天下豁達大度東漢所不及其餘惟文宣二帝爲優自惠景已下亦不皆明於東漢明章兩帝而前漢事迹灼然傳在人口者以司馬遷班固敘述高簡之工故學者恱而習焉其讀之詳也足下讀范曄漢書陳壽三國志王隱晉書生熟何如左丘明司馬遷班固書之温習哉故温習者事跡彰而罕讀者事跡晦讀之踈數在辭之高下理必然也唐有天下聖明繼於周漢而史官敘事曽不如范曄陳壽所爲況足擬望左丘明司馬遷班固之文哉僕所以爲恥當兹得于時者雖負作者之材其道旣能𬒳物則不肯著書矣僕竊不自度無位於朝幸有餘暇而辭句足以稱讃明盛紀一代功臣賢士行跡灼然可傳於後代自以爲能不滅者不敢爲讓故欲筆削國史成不刋之書用仲尼襃貶之心取天下公是公非以爲本羣黨之所謂是者僕未必以爲是羣黨之所謂非者僕未必以爲非使僕書成而傳則富貴而功德不著者未必聲明於後貧賤而道德全者未必不炟赫於無窮韓退之所謂誅姦䛕於旣死發濳德之幽光是翺心也僕文彩雖不足以希左丘明司馬子長足下視僕敘高愍女揚烈婦豈盡出班孟堅蔡伯喈之下邪仲尼有言不有博奕者乎爲之猶賢乎巳僕所爲雖無益於人比之博奕猶爲勝也足下以爲何如哉古之賢聖當仁不讓於師仲尼則曰文王旣没文不在兹乎又曰予欲無言天何言哉孟軻則曰予之不遇魯侯天也臧氏之子安能使子不遇哉司馬遷則曰成一家之言藏諸名山以俟後聖人君子僕之不讓亦非大過也幸無怪與韓愈致叚太尉逸事書柳宗元退之館下前有書進退之力史事奉荅誠中吾病若疑不得實未即藉者誠是也退之平生不以不信見遇竊自冠好遊邊上問古老卒吏得叚太尉事最詳今所趨走州刺史崔公時賜言事又具得太尉實跡叅校備具太尉大節古固無有然人以爲偶一奮遂名無窮今大不然太尉自有難在軍中其處心未甞虧仄其莅事無一不可紀㑹在下名未達以故不聞非直以一時取笏爲諒也太史遷死退之復以史道在職冝不茍過日時昔與退之期爲史志甚壯今孤囚廢錮連遭瘴癘羸頓朝夕就死無能爲也弟不能竟其業若太尉者冝使勿墜太史遷言荆軻徴夏無且言大將軍徴蘇建言留侯徴畫容貌今孤囚賤辱雖不及無且建等然比畫工傳容貌尚差勝春秋傳所謂傳信傳著雖孔子亦猶是也竊自以爲信且著其逸事有狀不宣宗元頓首與史館韓愈郎中書元稹郎中退之足下某與前衰州文學掾甄逢遊善逢故刑部貟外郎濟之子天寶中隱于衛之青巗山採訪使苗公等五人皆以狀薦凡十徴不起末以左拾遺就拜之適禄山朝奏京城懇於上前求爲賔介玄宗可其奏禄山還至衛遣太守鄭遵意詣山中致命輟行信宿以俟之甄生慮不得免乃僞瘖其音復隱青巗踰年而禄山叛即日遣僞節度使蔡希德緘刀逼召且曰或不可彊斬首來徇旣而甄生禁閉無言延頸承刃氣和色定若甘心然希德義而捨之禄山亦終不能致慶緒繼逆虜而囚之東都安國觀代宗復洛甄生卧匡牀詣元帥府至則號撲自治代宗爲之動色遂命傳置長安肅宗高其行因授館於三司治所令從賊官囚慙拜之受汚者莫不俯伏仰歎時恨不即死於其地且夫辯所從於居易之時堅直操於利仁之丗而猶𥚹淺選耎者之所不爲蓋怫人之心難而害巳之避深也況乎天下亂矣王澤竭矣死忠者不必顯從亂者不必誅而曰眷眷本朝甘心白刃難矣哉是以治平則爲公爲卿爲鴛爲鷺丗變則爲蛇爲豕爲獍爲鴞者十常八九焉若甄生冕弁不加其身禄食不進其口於天寶末蓋青巗一男子耳及亂則延頸承刃分死不回曰不以不顯而廢忠不以不誅而從亂叅合古今之士蓋萬一焉某嘗讀注記闕而未書謹備所聞蓋欲執事者編此義烈以永永於來丗耳子逢始生之歳顔太保崔太傅皆爲歌詩以美賢者有後且序甄生之本末及逢旣長耕先人舊田於襄之宜城讀書爲文不詣州里歳饉則力穡節用以給足於親族歳穰則施餘於其鄰里鄉黨之不能自持者前後斥家財眞安而樂之者謹詳足下所論載校之史法若濟者固當得附書今逢又能行身幸於方州大臣以標目其先人事載之天下耳目徹之天子追爵其父第四品赫然驚人逢與其父俱當得書矣濟逢父子自吾人發春秋美君子樂道人之善夫茍能樂道人之善則天下皆去惡爲善善人得其所其功實大足下與濟父子俱冝牽聮得書足下勉逢令終始其躬而足下年尚彊嗣德有繼將大書特書屢書不一書而巳也愈旣承命又執筆以俟愈再拜重校正唐文粹卷第八十二
