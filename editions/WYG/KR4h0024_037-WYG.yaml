  text: 鉉編
  hash: sha256:7bbf6589c1370d76cda4d0216a0d947939e0da39d5486060d257d0515cbf99d7
body:
  text: 論丁總一十一首兵刑四守在四夷論牛僧孺守論杜牧戰論斷刑論柳宗元臨御四機權論二首機上權下馮用之王言論李徳裕英傑論諫諍一忠諫論李徳裕嬖惑二近倖論李徳裕寱論元結守在四夷論牛僧孺傳曰古者天子守在四夷葢言能令四夷不侵咸自守境洎周漢迄隋多不知守身但欲四夷自守殊不知四夷自守國内皆成四夷也因著論以明之何者夫守之大㫖以防攻也善防其攻者莫若防其敗善防其敗者莫若防其亡夫四夷不守境不過於畧地侵城是有敗無亡也若王者之貴如天如地茍落一星伐一樹不足損天地之光耀葢帝王之權能殺人能生人能達人能窮人能貧人能富人一國之人思之必伺君好而贊之雖似親之其實攻之王者守大道淪非道是則不見敗而有亡也况四夷之攻至難者有四國人之攻至易者亦有四四夷之攻以白刃國人之攻以巧言四夷之攻以鼔鼙國人之攻以祕隠四夷之攻以兵相害國人之攻以矯相親四夷之攻以兵相侵國人之攻以矯相益故觀白刃則懼而思守也聆巧言則悦而思受也聴鼓鼙則警而思備也遇祕隠則懵而思述也逢相害則恚而思讎也見相親則惑而思近也值相侵則忿而思報也得相益則喜而思隣也攻邊則人人思守也攻身則人人思受也抑人情之常非所鑽鑿而異也且王者之守有六失守之不固則非道攻之守之不貞則色攻之守之不約則聲攻之守之不廉則聚斂攻之守之不儉則奢侈攻之守之不正則邪佞攻之守之不仁則征伐攻之夏捨淑徳而嬖妹喜是色攻而亡也商捨徳音而耽愔愔是聲攻而亡也周厲捨廉節而悦榮夷公是聚斂攻而亡也秦皇捨節儉而起阿房是奢侈攻而亡也漢靈捨正直而用刑臣是佞倖攻而亡也隋煬捨慈仁而事遼東是征伐攻而亡也自三王百代無四夷之攻而亡者皆以守身不謹為嗜慾所攻故也雖得四夷自守復何益哉或云幽王自以為犬戎所滅僧孺以為幽王自以守道不固頻舉偽烽嗷嗷天下空於杼軸加以褒姒色攻諸侯不信而敗非獨由於四夷也至於晉十六國稽其本則禍生於惠帝也賈后以色攻賈謐以佞攻致令八王並興生人減半然後戎夷乗間敢有窺覦可謂四夷先起於内不由四夷不守於外也故有徳者先守其身而後四夷無徳者不先守身但令四夷自守曽不防戎狄在其國中故攻秦之胡者二世也豈必東夷南蠻西戎北狄哉沈尹戍雖舉守四夷之言而不書守身之道是載華而略實非垂範之㫖也敢因文字以附簡編之闕守論并序杜牧往年兩河盜起屠囚大臣刼戮二干石國家不議誅迺束兵自守反修大厯貞元故事而行姑息之政是使逆輩益横終唱患禍故作守論焉厥今天下何如哉干戈朽鈇鉞鈍含𢎞混貸煦育逆孽殆為故常而執事大人曽不歴算周思以為宿謀方且嵬岸抑揚自以為廣大繁昌莫已若也嗚呼其不知乎其俟蹇頓顛傾而後為之支計乎且天下幾里列郡㡬所而自河以北蟠城數百金堅蔓織角奔為㓂伺吾人之顦顇天時之不利則將與其朋伍羅絡郡國將駭亂吾民於掌股之上耳今者及吾之壯不圖擒取而乃偷處恬逸第第相付以為後世子孫背脅疽根此復何也今之議者咸曰夫倔强之徒吾以良將勁兵為銜策髙位美爵充飽其腸安而不撓外而不拘亦猶豢擾虎狼而不拂其心則忿氣不萌此大厯貞元所以守邦也亦何必疾戰焚煎吾民然後以為快也愚曰大厯貞元之間適以此為禍也當是之時有城數十千百卒夫則朝廷待之貸以法故於是乎闊視大言自樹一家破制削法角為尊奢天子養威而不問有司守恬而不呵王侯通爵越録受之覲聘不來机杖扶之逆息虜嗣皇子嬪之裝縁彩飾無不備之是以地益廣兵益强僭擬益甚侈心益昌於是土田名器分劃大盡而賊夫貪心未及畔岸遂有淫名越號或帝或王盟詛自立恬淡不畏走兵四略以飽其志者也是以趙魏燕齊卓起大倡梁蔡吳蜀躡而和之其餘混澒軒囂欲相效者往往而是運遭孝武宵旰不忘前英後傑夕思朝議故能大者誅鋤小者惠來不然周秦之郊㡬為犯獵哉大抵生人油然多欲欲而不得則怒怒則爭亂隨之是以教笞於家刑罰於國征伐於天下此所以裁其欲而塞其爭也大厯貞元之間盡反此道提區區之有而塞無涯之爭是以首尾指支㡬不能相運掉也今者不知此非而反用以為經愚見為盜者非止於河北而已嗚呼大厯貞元守邦之術永戒之哉戰論并序兵非脆也榖非殚也而戰必挫北是曰不循其道也故作戰論焉河北視天下猶珠璣也天下視河北猶四支也珠璣茍無豈不活身四支苟去吾不知其為人何以言之夫河北者俗儉風渾淫巧不生樸毅堅强果於戰耕名城堅壘峉音額嶭音列相貫髙山大河盤互交鎻加以土息徤馬便於馳敵是以出則勝處則饒不窺天下之産自可封殖亦猶大農之家不待珠璣然後以為富也天下無河北則不可河北既虜則精甲鋭卒利刀良弓徤馬無有也卒蔟忽反然夷狄驚四邊摩封疆出表裏吾何以禦之是天下一支兵去矣河東盟津滑臺大梁彭城東平盡宿厚兵以塞虜衝是六郡之師嚴飾䕶疆不可他使是天下二支兵去矣六郡之師厥數三億低首仰給横拱不為則㳂淮已北循河之南東盡海西叩洛經數千里赤地盡取纔能應費是天下三支財去矣咸陽西北戎夷大屯嚇呼膻臊徹于帝居周秦單師不能排闢於是盡剷吳越荆楚之饒以啖兵戍是天下四支財去矣乃使吾用度不周徴徭不常無以膏齊民無以接四夷禮樂刑政不暇修治品式條章不能備具是天下四支盡解頭腹兀然而已焉有人解四支其自以能久為安乎今者誠能治其五敗則一戰可定四支可生夫天下無事之時殿寄大臣偷處榮逸為家治具戰士離落兵甲鈍敝車馬刓弱而未嘗為之簡帖整飾天下雜然盜發則疾敺疾戰此宿敗之師也何為而不北乎是不蒐練之過者其敗一也夫百人荷戈仰食縣官則挾千夫之名大將小禆操其餘贏以虜壯為幸以師老為娛是執兵者常少麋食者常多築壘未乾公囊已虚此不責實料食之過其敗二也夫戰輒小勝則張皇其功奔走獻狀以邀上賞或一日再賜一月累封凱還未歌書品已崇爵命極矣田宮廣矣金繒溢矣子孫官矣焉肯搜竒外死勤於戎矣此賞厚之過其敗三也夫多喪兵士顛翻大都則跳身而來刺邦而去迴視刀鋸菜色甚安一嵗末更旋已立於壇墀之上矣此輕罰之過其敗四也夫大將將兵柄不得専恩臣詰責第來揮之至如堂然將陣殷然將鼔一則曰必為偃月一則曰必為魚麗三軍萬夫環旋翔佯恍駭之間虜騎乗之遂取吾之鼓旗此不専任責成之過其敗五也元和時天子急太平嚴約以律下常圑兵數十萬以誅蔡天下乾耗四嵗然後能取此葢五敗不去也長慶初盜據子孫悉來走命是内地無事天子寛禁厚恩與人休息未㡬而燕趙甚亂引師起將五敗益甚登壇注意之臣死竄且不暇復焉能加威於反虜哉今者誠欲調持干戈灑掃垢汙以為萬世安而乃踵前非踵前非是不可為也古之政有不善士傳言庶人謗發是論者亦且將書於謗木傳于士大夫非偶言而已㫁刑論柳宗元余既為斷刑論或者以釋刑復於余其辭云云余不得已為之言焉夫聖人之為賞罰者非他所以懲勸者也賞務速而後有勸罰務速而後有懲必曰賞以春夏刑以秋冬而謂之至理者偽也使秋為善必俟春夏而後賞則為善者必怠春為不善者必俟秋冬而後罰則為不善者必懈為善者怠為不善者懈是敺天下之人而入於罪又緩而慢之以滋其懈怠此刑之所以不措也必使為善者不越月踰時而得其賞則人勇而有勸焉為不善者不越月踰時而得其罰則人懼而有懲焉為善者曰以有勸為不善者日以有懲是敺天下之人而従善逺罪也敺天下之人而従善逺罪是刑所以措而化所以成也或者務言天而不言人是惑于道者也胡不謀之人心以熟吾道吾道之盡而人化矣是蒼蒼者焉能與吾事而暇知之哉果以為天時之可得順大和之可得致則全吾道而得之矣全吾道而不得者非所謂大和也是亦必無而已矣又何必枉吾之道曲順其時以諂是物哉吾固知順時之得天不如順人順道之得天也何也使犯死者自春而窮其辭欲不死不可得貫三木加連鎻而致之獄更大暑數月痒不得搔痺不得摇痛不得摩飢不得時而食渴不得時而飲目不得瞑支不得舒怨號之聲聞於里人如是而大和之不傷天時之不逆是亦必無而已矣彼其所宜得者死而已也又若是焉何哉或者乃以雪霜者天之經也雷霆者天之權也非常之罪不時可以殺人之權也當刑者必順時而殺人之經也是不然夫雷霆雪霜者特一氣耳非有心於物者也聖人有心於物者也春夏之有雷霆也或發而震破巨石裂大木木石豈為非常罪也哉秋冬之有霜雪也舉草木而殘之草木豈有非常罪也哉彼豈有懲於物也哉彼無所懲則效之者惑也果以為仁必知經智必知權是又未盡於經權之道也何也經也者常也權也者達經者也皆仁智之事也離之滋惑矣經非權則泥權非經則悖是二者强名也曰當斯之盡矣當也者大中之道也離而為名大中之器用也知經而不知權不知經者也知權而不知經不知權者也偏知而謂之智不智者也偏守而謂之仁不仁者也知經者不以異物害吾道知權者不以常人怫吾慮合之於一而不疑者信于道而已矣且古之所以言天者葢以愚蚩蚩者耳非為聰明睿智者設也或者之未達不思之甚也機論上馮用之機者機也經緯天下織綜人事而已矣機者微也發之至微用之至廣大人行之則合於道細人竊之則階於亂合道所以濟世階亂所以滅身濟世機之利者也滅身機之害者也知利而不知害雖去其害害必悦之知害而不知利雖就其利利必違之知利而知害知去而知就其惟聖人乎文王武王知機之君也箕子周公知機之臣也夫三才設位而機行乎其中矣得之者昌失之者亡善用則集乎百祥昧用則來乎百殃故天之一發龍蛇為之起陸人之一發天地為之反覆范蠡善用也勾踐以之克霸無極昧用也楚國於焉殄瘁至哉斯術也莫不以合義為本趣時為用茍悖於義則悦隨者寡未逢於時則虚其事稽其取與離合之際可謂神矣雖離婁之目不可視烏獲之力不可制南金之利不可斷迅雷之聲不可及夫神器至重也堯不與子而禪於舜葢取聖之機也舜不讓丹朱而復禪禹葢取時之機也兄弟至親周公離於管蔡取賢之機也秦越之疏嬴氏合於由余取霸之機也設令堯與丹朱而棄舜億兆之心竟歸於虞則不謂之聖帝矣舜忘大義而顧小節不承堯而禪禹則不謂之明君矣周公暱管蔡而不戮必墜文武之業則不謂之賢臣矣秦伯鄙由余而不用必失四方之士則不謂之霸主矣天下雖聞之而不可知雖見之而不可測善為國者如偃師焉民如幻也欲之動欲之静機在於我豈當不悦乎善為君者猶造父焉人猶馬也欲之東欲之西策在於我豈有能違乎經曰不獨親其親則天下皆親不獨子其子則天下皆子富哉是機也我以天下為親為子天下孰不以我為親為子乎是故災害不生禍亂不作此聖人之㫖也則知欲安者必先安於人欲利者必先利於人能安人而人不安之能利人而人不利之者未之有也漢祖入闗不行殺戮善安人也秦室寶貨悉分士卒善利人也卒收天下之心享天下之福此聖人之作也項籍反是而亡不亦宜乎善為臣者不厚於身而厚於君不潤於室而潤於國厚於君忠也潤於國公也既忠且公君其薄之哉民其怨之哉禄位其去之哉雖不厚於身而身自厚矣不潤於室而室自潤矣此君子之為也酇侯處位而舉淮隂厚君者也入秦不取金璧而取圖籍潤國者也故能位冠三傑聲流萬古韓信忌剋酈生殛逐田横欲有功而自厚貪賞而自潤終貽伊慼雲夢生擒夫域中至大之謂道天下至賾之謂機有道無機守死而一身獨善有機無道好謀而彞倫攸斁伯夷叔齊守死也豈謂億兆塗炭俟周武哉李斯趙髙好謀也豈知刑政酷毒失民心哉機道相須盡善盡美然而發機之要實資于時故進而得時亦機也退而得時亦機也取而得時亦機也捨而得時亦機也語而得時亦機也黙而得時亦機也進得其時則有利伊尹于湯是也退得其時則無悶二疎辭禄是也取得其時則必獲甘羅陟相是也捨得其時則元吉泰伯去吳是也語得其時則見信傅説是也黙得其時則保身微子是也故進不相時則凶􅄯錯所以見誅也退不相時則禍白起所以伏劍也取不相時則招吝許伐鄭也捨不相時則有悔虞棄虢也語不相時則殆辱薛冶諫其君也黙不相時則受謗子家従其賊也所以失之毫釐差之千里故君子得其機則仇讐變為腹心况其恩者乎失其機則親眤反為勍敵况其疎者乎齊桓用讎能盡管仲之謀九合諸侯一匡天下衞懿好鶴失於臣下之望國之有難士卒不戰夫如是則一得一失易於反掌一興一亡疾如旋踵為國家者可不務乎或曰老氏云以智治國國之賊不以智治國國之福然則智非機耶機非智耶答曰機者生於智者也智者隨其性者也大人君子得其逺者大者為而不有功成不居使天下熈熈然若登春臺如享太牢不知帝力故為國之福非謂其無慮無思兀兀然如草木鳥獸而能治國者也細人曲士得其小者近者嗜欲繫焉矜伐在焉是非生焉爭鬭興焉故為國之賊聖人慮百世之後善人少而不善人多垂此𤣥言葢抑揚之㫖也且聖人不仁以百姓為芻狗不仁之仁豈非機耶國不用機以克永世匪我攸聞夫茫茫六經萬機之圃昭昭前史萬機之鑑仲尼云知㡬其神乎有㫖哉有㫖哉權論下大哉鼔天下之動成天下之務反於常而致治違於道而合利非權其孰能與於此乎夫權者適一時之變非悠久之用然則適變於一時利在於悠久者也聖人知道徳有不可為之時禮義有不可施之時刑名有不可威之時由是濟之以權也其或不可為而為則禮義如畫餅充饑矣不可施而施則禮樂如説河濟渴矣不可威而威則刑名如治絲而棼矣豈惟乖理適足資亂故用權之際道徳可棄禮義可置刑名可弛及乎發號施令如風偃草衆知嚮方莫敢不服與夫道徳禮義刑名之功又何異哉雖曰棄之置之弛之葢殊途而同歸也故權者國家之利器也輜重可離而權不可失兵食可去而權不可無迅雷發則羣物驚大風起則萬彚振嚴霜冽則衆木落遲日升則百卉秀孰為此者曰天地也天地尚或用之而况於人乎夫休祥不見則中庸之君不能力行而濟於聖咎徴不作則殘暴之主不能革心而至於道福其善君子所以知勸禍其淫小人所以知戒夫天之徳至仁也地之道無私也至仁則不傷於物何乃行肅殺之令乎葢秋不殺則春無以生矣無私則不黨於人何乃垂災沴之變乎葢惡不癉則善無以彰矣一弛一張天道乃長一懲一勸天道乃逺觀天之道執天之行盡矣是以君子則而象之體而行之故當不合用而用不合棄而棄不合賞而賞不合誅而誅者皆従權而制宜也聖人以神道設敎俾民日用而不知權之時義大矣哉髙宗知傳説之賢欲委之代天取於皂隸之徒儀於百辟之上慮羣情弗協事難以濟故稱夢得賢相乃刻像而求之商之中興賴善權之主也文王知太公之賢欲擢居輔弼搜於屠釣之間致於三公之上庶士靡靡恐未遵従故稱天遺我師乃出畋而獲之周之永年賴善權之君也此二君苟懼設詐之損徳固執信而循常則傅巗虚老而莫伸渭濱没齒而不用棟梁斯壞其何以興夫權之大端在於利害而已矣利萬而害一害之何傷害百而利十利之必亡苟害於事雖鄙俚之議君子懼之苟利於後雖先王興敎達人抗行也子雖至親西伯食其肉不然則死於羑里也父雖至尊沛公索其羮不然則臣於項籍也西伯非不慈蓋子已死不食則已身亦斃沛公非不孝葢其父為虜奔赴則己身亦降又何益乎能捨無益之慈孝成莫大之基業大人之權變不可得而聞也夫是非未明向背未定成敗未測取與未决當此之時行權之時也故權可以明是非定向背測成敗决取與穰苴布衣見景公景公委之以兵柄斬一寵臣三軍畏懾克成其功也孫武被褐謁吳王吳王試以敎戰戮三嬖妾衆女整齊卒顯其能也易曰巽以行權巽風也風行也無不可動之物無不可往之所權之用無不可治之時無不可成之事昔晉文公見天王于河陽譎則譎矣而夾輔之勲垂於史冊鬻拳諫楚子以兵刃悖則悖矣而盡忠之節著于春秋夫事有先奪而後與先順而後取太甲不治伊尹放之俟其改過而反其政公子先謀亂伍胥避之乃進専諸以成其志然後盡事君之節雪殺父之寃不其偉歟夫乾坤之道易簡也而猶窮則變變則通通則能久故王公設權以固其國知變以馭其民善馭者視人如嬰孩悟之誘之莫不胥悦不善馭者以民為規矩謂方圓定矣不能苟合善權變者如奕棊焉或取或捨或進或退無固無必皆任其勢也捨非資敵葢捨小而取大退非怯彼葢進損而退益孔子曰可與共學未可與適道可與適道未可與立可與立未可與權得非權之難耶觀其相魯君於夾谷挫齊鋭于罇俎當是時齊侯强而不强魯國弱而不弱聖人之智不亦多乎夫獸廢爪牙則充羣獸之腸矣禽鎩羽翮則供衆禽之羞矣人失權變則為英雄之資矣三十輻之車制之者柅萬乗之國統之者權五賊在心神至聰而莫測三盜既興物雖衆而皆覩至㢤始離而終合始逆而終順始非而終是始失而終得權之㫖也或曰機之與權同乎異乎對曰異也設於事先之謂機應於事變之謂權機之先設猶張羅待鳥來則獲矣權之應變猶荷戈禦獸審其勢也知機而不知權者得於預謀失於臨事知權而不知機者巧於臨事拙於預謀知機而知權者帝霸之君也王佐之臣也自五帝既降捨機權而能治天下者未之有也王言論李徳裕夫帝王與羣臣言不在援引古今以飾雄辯惟在簡而當理雄辯不足以服姦臣之心惟能塞諍臣之口昔田蚡請考功地益宅武帝曰遂取武庫衞將軍言郭解家貧又曰布衣權至使將軍知此其家不貧殷仲文言音樂好之自解宋祖曰吾只恐解此謂簡而當理足使姦臣奪心邪人破膽矣余歴事六朝弼諧二主文宗辭皆文雅而未嘗騁辨武宗言必簡要而不為文飾皆得君人之量能盡臣下之辭豈惟王言如是人臣亦當然也其有辯若波濤辭多枝葉文經意而飾詐矯聖言以蔽聰此乃姦人之雄遊説之士焉得謂之獻替哉為人臣者當戒於斯慎於斯必不獲罪於天矣英傑論帝王之任英傑皆須御之以氣結之以恩然後可使也若不以英氣折之而寵以姑息則驕不可任若不以恩愛結之而肅以禮貌則怨不為用駕御之術惟漢祖盡之黥布歸漢句絶髙祖方踞牀洗而召布入見布大怒悔來欲自殺出就􅃕張音帳飲食従官如漢主居布又喜過望武帝踞厠見衞青以大將軍之貴而隸人蓄之此不得不絶大漠而盪獫狁也蜀先主與關張二將同卧起而稠人廣坐侍立終日皆用此道故能成功夫御英傑使猛將與見道徳之人接方正之士事不同也不可以繁禮飾貌浮詞足言宜乎洞開胷懐令見肝肺氣懾其勇恩結其心雖踞洗召之不為薄矣禄山夷狄之譎詐者也非將門英豪草萊竒傑其戰鬬之氣擊刺之材去闗張逺矣天寶末受専征之任託不御之權入朝賜宴坐内殿西序雞障之下非其所據果蓄異圖幽陵厲階至今為挭葢恩甚驕盈以至於此儻以徒隸蓄之豈有斯恨忠諫論人君拒諫有二一曰生於愛名二曰不能去欲雖桀紂桓靈之君未能忘名自知為惡多矣畏天下人知之將謂諫己則惡不可掩故不欲人之諫也如晉獻非驪姬寐不安齊桓非易牙食不美必不能去之亦不欲人諫也人臣忠諫亦有二欲道行於君可使身安國理者其辭婉欲名髙後世不顧身危國亂者其辭訐考叔啟大隧以成莊公之孝倉唐獻大雁以復文侯之愛留侯封雍齒以安羣臣招四皓以定惠帝此所謂婉也諫大夫言婢不為主白馬令言帝欲不諦劉李二人名不便故書其官激主之怒自有其名望其聴従固不可得此所謂訐也漢元帝欲御樓舩薛廣徳當乗輿諫曰臣自刎頸血汚車輪陛下不入廟矣張猛曰乗舩危就橋安聖主不乗危元帝曰曉人不當如是耶則知諫者之道在扵婉矣唯英主必能従諫何者自知功徳及生人者大矣雖有小惡不諱人言如漢髙械繫蕭相國及聞王衞尉之言曰我不過為桀紂主而相國為賢相此所謂不諱也近世名臣王石泉居相時以子為眉州司士天后嘗問曰君在相位子何逺乎對曰廬陵是陛下愛子今猶在逺臣之子焉敢相近有以見君子之心亦倉唐之比也近倖論自古中主以降皆安於近習逺於忠良其主非不知君子可親小人可去而不可改者其弊有二一曰性相近二曰嗜慾深桓靈之主與小人氣合如水之走下火之就燥皆自然而親結不可解也侯覽張讓所以得蔽君也元成二后皆有所嗜吹簫撾鼔之娛微眇沈湎之樂非倖臣無以承意非近習無以供歡石顯張敞所以得蠧政也惟人君少欲英明者則能反是如文帝雖有鄧通趙談所信者賈誼張釋之袁盎此所謂少欲也武帝雖有韓嫣李延年而所貴者公孫𢎞倪寛卜式此所謂英明也故君聴不惑政無頗纇近則開元初内有姜皎崔滌以極宫中之樂外有姚盧蘇宋以修天下之政得元成之欲享舜禹之名六合晏然千古莫及其故何也倖臣不得干政事也後代能知漢之文武及開元致理之要雖有倖臣亦何害於理哉寱論音義睡語也元結元子天寶中曽預燕於諫議大夫之座酒盡而無以續之大夫歎曰諫議散冗者貧無以繼酒嗟哉元子醉中議之曰大夫頗能用一謀令大夫尊重如侍中威權等司隸何若大夫問謀對曰得寱婢一人在人主左右以寱言先諷則可請有所説大夫不聞古有邰侯侯家得寱婢寐則寱言言則侯輒鞭之如是一嵗婢寱如故侯無如婢何有夷奴每厭勞辱寐則假寱其言似不怨主而若忠信侯聞問之則曰素有寱病寐中寱言非所知也引寱婢自辨辭説云云侯疑學婢鞭之不止髠之鉗之奴寱愈甚奴於是重窺侯意先事寱説説侯之過警以禍福侯又無如奴何客有知侯禍機因寱奴之先扣侯門諫侯以改過免禍侯納客為上賓復其奴命之曰寱良氏子孫世在于邰大夫誠能學奴效婢假寱言以規諫人主俾悔過追悞與天下如新大夫見尊重威權何止侍中司隸大夫乃嘆曰嗚呼吾謂今之士君子曽不如邰侯夷奴耶唐文粹巻三十七欽定四庫全書唐文粹巻三十八宋姚鉉編論戊總一十首前賢四夷齊四皓優劣論蘇頲三不欺先後論吕温三名臣論李翰三賢論李華失策四漢斬丁公論皮日休袁盎以周勃為功臣論李徳裕張辟疆論􅏯錯論李觀降將一李陵論白居易佞臣一張禹論李徳裕夷齊四皓優劣論省試蘇頲
