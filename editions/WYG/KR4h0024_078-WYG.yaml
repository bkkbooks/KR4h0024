seq: 78
front:
  text: 我智而拒諫矜已聞之夏后據饋頻起亦有魏帝牽裾不止安彼反側如春陽秋露巍巍蕩蕩恢漢髙大度撫兹庶事如履薄臨深戰戰慄慄用周文小心詩之不識不知書之無偏無黨一彼此於胷臆捐好惡於心想衆棄而後加刑衆悦而後行賞弱其强而治其亂伸其屈而直其枉故曰如衡如石不定物以限物之懸者輕重自見如水如鏡不示物以情物之鑒者妍蚩自生勿渾渾而濁勿皎皎而清勿汶汶而闇勿察察而明雖冕旒蔽目而視於未形雖黈纊塞耳而聽於無聲縱心乎湛然之域逰神於至道之精扣之者應洪纎而效響酌之者隨深淺而皆盈故曰天之經地之寜王之貞四時不言而代序萬物無言而化成豈知帝力而天下和平吾王撥亂戡以智力民懼其威未懐其徳我皇撫運扇以淳風民懐其始未保其終爰述金鏡窮神盡聖使人以心應言以行包括治體抑揚詞令天下為公一人有慶開羅起祝援琴命詩一日二日念兹在兹惟人所召自天祐之諍臣司直敢告前疑
