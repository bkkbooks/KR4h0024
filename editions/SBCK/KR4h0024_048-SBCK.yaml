  text: 重校正唐文粹卷第四十八
  hash: sha256:d7fa6d1f122a7dd8647639055a22bdc7b773238a733d201f954ba90ef05f82d4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0024_SBCK_048-1a}
body:
  text: 吳興姚鉉纂古文庚揔一十五首符命一貞符栁宗元論兵二罪言杜牧原十六衛折微十二帝王所尚問李翺漢武山呼羅隱子高之讓􅀩叟遺意詰風陳黯登華㫖沈顔窮逹志程晏禹書上劉蛻禹書下斷非聖人事李商隱讓非賢人事知道房千里貞符栁宗元􅀒罪臣宗元惶恐言臣貶所量移流人吳武陵爲臣言董仲舒對三代受命之符誠然非邪臣曰非也何獨仲舒耳自司馬相如劉向楊雄班彪彪子固皆㳂襲嗤嗤推古瑞物以配受命其言􅀋􅁋巫瞽史誑亂後代不足以知聖人立極之本顯至德揚大功甚失厥趣臣爲尚書郎時甞著貞符言唐家正德受命於生人之意累積厚乆冝享年無極之義本末閎闊㑹貶逐中輟不克究備武陵即扣頭邀臣此大事不冝以辱故休缺使聖王之典不立無以抑詭􅀋拔正道表覈萬代臣不勝奮激即具爲書念終泯没蠻夷不聞于時獨不爲也茍一明大道施于人代臣死無所憾是用自決臣宗元稽首拜手以聞曰孰稱古􅀄朴􅀩空侗而無爭厥流以訛越乃奮擊􅃲怒震動專肆爲􅁋威曰是不知道唯人之􅀄揔揔而生林林而羣霜雪風􅀨雷雹暴其外於是乃知架巢空穴挽草木取皮革飢渴牝牡之欲敺其内於是乃知噬禽獸咀果榖合偶而居交焉而爭際焉而􅃲力大者搏齒利者齧爪剛者決羣衆者軋兵良者殺披披藉藉草野塗血然後強有力者出而治之往往爲曹於險阻號令起而君臣什伍之法立德紹者嗣道怠者奪於是有聖人焉曰黃帝造其兵車交貫乎其内一統􅀋齊制量然猶大公之道不克建於是有聖人焉曰堯置州牧四嶽持而綱之立有德有功有才有能者參而維之運臂率􅃌屈伸把握莫不統率堯年老舉聖人而禪焉大公乃克建由是觀之厥􅀄罔不極亂而後稍可爲世也以非德不樹故仲尼敘書於堯曰克明俊德於舜曰濬哲文明於禹曰文命祗承于帝於湯曰克寛克仁彰信兆民於武王曰有道曽孫稽揆典誓貞哉惟兹德實受命之符以奠永祀後之妖􅁋嚚昬好怪之徒乃始陳大電大虹玄鳥巨跡白狼白魚流火之烏以爲符斯皆詭譎闊誕甚可羞也而莫知本于厥貞漢用大度克懷于有氓登能庸賢濯痍煦寒以瘳以熈兹其爲符也而其臣妾乃下取虺蛇上引天光推􅀋號休用夸誣于無知之氓増以騶虞神鼎脅􅇌縱踊俾東之泰山石閭作大號謂之封禪皆尚書所無有莽述承效卒奮驁逆其後有賢帝曰光武克綏天下復承舊物猶崇赤伏以玷厥德魏晉而下尨亂鈎裂厥符不貞􅀖用不靖亦罔克乆駮乎無以譏爲也積大亂至于隋氏環四海以爲鼎跨九垠以爲鑪爨以毒燎煽以虐焰其人沸涌灼爛號呼勝蹈莫有救止於是大聖乃起丕降霖􅀨濬滌蕩沃蒸爲淸氣踈爲泠風人乃漻然休然相晞以生相持以成相彌以寧㭬斮屠剔膏流節離之禍不作而人乃克完平舒愉尸其肌膚以達于夷途焚㭊抵掎奔走轉徙之害不起而人乃克鳩􅀋集族歌舞恱懌用祗于元德徒奮祖呼犒迎義旅讙動六合至于麾下大盜豪據阻命遏德義威殄戮咸墜厥緒無劉于虐人乃並受休嘉去隋氏克歸于唐躑躅謳歌灝灝和寧帝庸威慄惟人之爲敬奠厥賦積藏于下是謂豐國鄕爲義廩歛發謹飭歲丁大浸人以有年簡于厥刑不殘而懲是謂嚴威小厲而友大生而孥愷悌祗敬用底于理凡其所欲不謁而獲凡其所惡不祈而息四夷稽服不作兵革不竭貨力丕揚于後嗣用垂于帝式十聖濟厥理孝仁平寛惟祖之則澤乆而逾深仁増而益高人之戴唐永永無窮是故受命不于天于其人休符不于祥于其仁惟人之仁匪祥于天匪祥于天兹惟貞符哉未有䘮仁而乆者也未有恃祥而壽者也商之王以桑榖昌以雉雊大宋之君以法星壽鄭以龍衰魯以麟弱白雉亡漢黃犀死莽惡在其爲符也不勝唐德之代光紹明濬深鴻厖大保人斯無彊冝薦于廟郊文之雅詩祗告于德之休帝曰諶哉乃黜休祥之奏究貞符之奥思德之所未大求仁之所未備以極于􅀖理以敬于人事其詩曰於穆敬德􅀺人皇之惟貞厥符浩浩將之仁函于膚刃莫畢屠澤熯于爨沸炎以澣殄厥凶德乃敺乃夷懿其休風是煦是吹父子熈熈相寧以嬉賦徹而藏厚我糗糧刑輕以清俾我靡傷貽我子孫百代是康十聖嗣于理仁后之子子思孝父易患于巳拱之戴之神其祐爾載揚于雅承天之嘏天之誠神冥鑒于仁神之曷依冝仁之歸濮㳂于北祝栗于南幅貟西東祗一乃心祝唐之紀後天罔墜祝皇之壽與地咸乆曷從祝之心誠篤之户協人同道以告之俾億萬年不震不危我代之延永永毗之仁増以崇曷不爾思有號于天僉曰嗚呼咨爾皇靈無替厥符罪言杜牧國家大事某不當言實言之有罪故以云生人常病兵兵祖於山東㣧於天下不得山東兵不可死山東之地禹畫九土一曰兾州舜以其分太大離爲幽州爲并州程其水土與河南等常重十一二故其人沈􅋧多材力重許可能辛苦自魏晉巳下㣧浮羨􅁋工機纎雜意態百出俗益卑弊人益脆弱唯山東敦五種本兵矢他不能蕩而自􅀂也復産徤馬下者日馳二百里所以兵常當天下兾州以其恃強不循理兾其必破弱雖巳破兾其復強大也并州力足以并吞也幽州隂慘殺也故聖人因其風俗以爲之名黃帝時􅃖尤爲兵階阪泉今嬀川縣自後帝王多居其地豈尚其俗都之邪自周劣齊霸不一丗晉大常傭役諸侯至秦萃銳三晉經六世乃能得韓遂折天下脊復得趙因拾取諸國秦末韓信聮齊有之故蒯通知漢楚輕重在信光武始於上谷成於鄗魏武舉官渡三分天下有其二晉亂胡作至宋武號爲英雄得蜀得􅀜中盡得河南地十分天下有八然不能使一人渡河以窺胡至于高齊荒蕩宇文取得隋文因以滅陳五百年間天下乃一家隋文非宋武敵也是宋不得山東隋得山東故隋爲王宋爲霸由此言之山東三者不得不可爲王霸者不得不可爲霸猾賊得之是以致天下不安國家天寶末燕盜徐起出入成臯函潼閒􅀂渉無人地郭李輩常以兵五十萬不能過鄴自爾一百餘城天下力盡不得尺寸人望之􅀂迴鶻吐蕃義無有敢窺者國家因之畦河修障戍塞其術蹊齊魯梁蔡􅀍其風流因亦爲冦以裏拓表以表撐裏混澒廻轉顚倒橫斜未甞五年間不戰生人日頓委四夷日昌熾天子因之幸陜幸漢中焦焦然七十餘年矣嗚呼運遭孝武澣衣一肉不畋不樂自卑冗中拔取將相凡十三年乃能盡得河南山西地洗削更革罔不順適唯山東不服亦再攻之皆不利以返豈天使生人未至於帖泰邪豈其人謀未至邪何其艱哉何其艱哉今日天子聖明超出古昔志於理平􅀂欲悉使生人無事其要在先去兵不得山東兵不可去是兵殺人無有巳也今者上䇿莫如自治何者當貞元時山東有燕趙魏叛河南有齊蔡叛梁徐陳汝白馬津盟津襄鄧安黃壽春皆戍厚兵凡此十餘所􅂊足自護治所實不輟一人以他使遂使我力解勢弛熟視不􅁤者無可奈何階此蜀亦叛吳亦叛其他未叛者皆迎時上下不可保信自元和初至今二十九年間得蜀得吳得蔡得齊凡收郡縣二百餘城所未能得唯山東百城耳土地人戸財物甲兵校之往年豈不綽綽乎亦足自以爲治也法令制度品式條章果自治乎賢才奸惡捜選置捨果自治乎障戍鎮守干戈車馬果自治乎井閭阡陌倉廩財賦果自治乎如不果自治是助虜爲虐環土三千里植根七十年復有天下隂爲之助則安可以取故曰上䇿莫如自治中䇿莫如取魏魏於山東最重於河南亦最重何者魏在山東以其能遮趙也旣不可越魏以取趙固不可越趙以取燕是燕趙常取重於魏魏常操燕趙之性命也故魏在山東最重黎陽距白馬津三十里新鄕距盟津一百五十里􅀺陽新郷並屬衛州陴壘相望朝駕暮戰是二津虜能潰一則馳入成臯不數日閒故魏於河南間亦最重今者願以近事明之元和中纂天下兵誅蔡誅齊頓之五年無山東憂者以能得魏也田弘正􅀽降昨日誅滄頓之三年無山東憂者亦以能得魏也史憲誠來降長慶􅀄誅趙一日五諸侯兵四出潰解以失魏也田布死昨日誅趙一日罷如長慶時亦以失魏也李聽敗故河南山東之輕重常懸在魏明白可知也非魏強大能致如此地形使然也故曰取魏爲中䇿最下䇿爲浪戰不計地勢不審攻守是也兵多粟多敺人使戰者便於守兵少粟少人不􅇌自戰者便於戰故我常失於戰虜常困於守山東之人叛且三五丗矣今之後生所見言語舉止無非叛也以爲事理正當如此沈酣入骨髓無以爲非者􅃌示順向詆侵族臠語曰叛去酋酋起矣至於有圍急食盡餤屍以戰以此爲俗豈可與決一勝一􅀒哉自十餘年來凡三􅀵趙食盡且下堯山敗郗尚書趙復振下愽敗社良趙復振館陶敗李聽趙復振故不計地勢不審攻守爲浪戰最下䇿也原十六衛國家始踵隋制開十六衛將軍緫三十貟屬官緫一百二十八貟署守分部夾峙禁省厥初歷今未始替削然自今觀之設官言無謂者其十六衛乎本原事跡其實天下之大命也始自貞觀中旣武遂文内以十六衛畜養武臣襃公鄂公之徒並爲諸衛將軍外開折衝果毅府五百七十四以儲兵伍或有不幸方二三千里爲冦土數十百萬人爲冦兵蠻夷戎狄踐踏四作此時戎臣當提兵居外至如天下平一暴㪍消削單車一符將命四走莫不信順此時戎臣當提兵居内當其居内也官爲將軍綬有朱紫章有金銀千百􅀐趍奉朝謁第觀車馬歌兒舞女念功賞勞出於曲賜所部之兵散舎諸府上府不越一千二百人五百七十四府凡有四十万人三時耕稼襏襫耒一時治武􅀐劒兵矢禆衛以課父兄相言不得業他籍藏將府伍散田畒力解勢破人人自愛雖有􅃖尤爲師雅亦不可使爲亂耳及其當居外也縁部之兵被檄乃來受命於朝不見妻子斧􅃏在前爵賞在後以首爭首以力搏力飄暴交捽豈暇異略雖有􅃖尤爲師雅亦無能爲叛也自貞觀至于開元末百三十年閒戎臣兵伍未始逆􅆲此聖人所能柄統輕重制障表裏聖筭神術也至于開元末愚儒奏章曰天下文勝矣請罷府兵詔曰可武夫奏章曰天下力強矣請􅅮四夷詔曰可於是府兵内剷邊兵外作戎臣兵伍湍奔矢往内無一人矣起遼走蜀繚絡萬里事五強冦奚契丹吐蕃雲南大石國十餘年中亡百萬人尾大中乾成燕偏重去聲而天下掀然根萌燼燃七聖旰食求欲除之且不能也由此觀之戎臣兵伍豈可一日使出落鈐鍵哉然爲國者不能無也居外則叛韓燕七國近者禄山僕固是也居内則􅆲卓莽曹馬巳下是也使外不叛内不篡兵不離伍無自焚之患將保頸領無烹狗之論古今巳還法術最長其置府立衛乎近代巳來於其將也弊復爲甚也人囂曰廷詔命將矣名出視之率市兒輩蓋多賂金王􅀒􅀝幽隂折劵交貨所能也絶不識父兄禮義之教復無慷􅁣感槩之氣百城千里一朝得之其強傑愎㪍者則撓削法制不使縛已斬族忠良不使違已力壹勢便罔不爲寇其隂泥去聲巧狡者亦能家筭口斂委於邪倖由􅀸市公去郡得都四履所治􅃌爲别館或一夫不幸而壽則戛割生人略帀天下是以天下毎毎兵亂涌溢齊人乾耗鄕黨風俗􅁋窳衰薄敎化恩澤擁抑不下召來災殄被及牛馬嗟乎自愚而知之人其盡知之乎且武者任誅如天時有秋文者任治如天時有春是天不能倒春秋是豪傑不能揔文武是此輩受􅃏誅暴乎曰於是乎在某人行敎乎曰於是乎在欲禍蠧不作者未之有也伏惟文皇帝十六衛之􅈲誰復而原其實天下之大命也故作原十六衛帝王所尚問李翶夏尚忠殷尚敬周尚文何也帝王之道非尚忠也非尚敬與文也因時之變以承其弊而巳矣救野莫如敬救􅀑莫如文救僿莫如忠循環終始迭相爲救如火蔓而燒也人知其勝之于水矣勝于水者土也水之潰遏其流者則必大爲之防矣故夏之政忠湯之政敬武王之政尚文各適其宜也如武王居禹之時則尚忠矣湯居武王之時則尚文矣禹與湯交地而居則夏先敬而殷尚乎忠矣故適時之宜而補其不得者三王也使黃帝堯舜居三王之天下則亦必爲禹湯武王之所爲矣繇是觀之五帝之與夏商周一道也􅀂救殷之􅀑不以文而曰我必以夏之忠而化之是猶適于南而北轅其到也無日矣孔子聖人之大者也􅀂孔子王天下而傳周其救文之弊也亦必尚乎夏道矣是文與忠敬皆非帝王之所尚也乃帝王之所以合變而行權者也因時之變以承其弊者也不可休而作爲之者也漢武山呼羅隱人之性未有生而侈縱者茍非其正則人能壊之事能壞之物能壊之唯貴賤則殊及其壊一也前後左右之䛕佞者人壊之也窮游極觀者事壞之也發於感寤者物壊之也是三者有一於是則爲國之大蠧孝武承富庶之後聽左右之􅀃窮游觀之靡乃東封焉蓋所以祈其身而不祈其歲時也由是萬歲之聲發於感寤然後踰遼越海勞師弊俗以至於百姓困窮者東山萬歲之聲也以一山之聲猶􅀂是況千口萬舌乎是以東封之呼不得以爲祥而爲英主之不幸子高之讓有挈其大而舉其高以授人者彼則曰隘矣哉挈而舉者曰以吾所得之廣大曽不􅀂彼人之心又安可以施於彼乎於是退而悸慄不敢以所得爲有伯成子高讓禹者非所以小黃屋之尊也夫安九州之大據兆人之上身得意遂動適在我鮮有不以荒怠自放者子高且欲狹禹之心而謹其取也故讓之厥後有卑宫菲食之政􅀩􅅱遺意上帝旣剖混沌氏以支節爲山嶽以腸胃爲江河一旦慮其掀然而興則下無生􅀋矣於是孕銅鐡於山澤滓魚鹽於江河俾後人攻取之且將以苦混沌之靈而致其必不起也嗚呼混沌氏則不起而人力殫焉詰鳳陳黯嘗得楊雄云君子在治􅀂鳳在亂􅀂鳳謂隱見之得宜也將欲伸之以爲鑒迨覽其劇秦美新則有異乎是句絶雄仕漢遇新室之亂旣不能去之又懼禍及乃爲斯文以媚而取容嗚呼鳳故􅀂是邪果􅀂是則鳳遇繒繳而徊翔无間邪君子之仕也所以行道道之不行也則可以明其節彼莽之不臣雄時在列冝以君臣之義興亡之理匡救之以行其道茍畏其威愛其死則可拔簪高謝以明其節詎有茍祿貪生徇非飾詐廣引秦過以喻惡則是稔其􅆲逆也與古之持顚危死名節者背而馳也嚮者所著􅀂鳳之􅀃得不爲誣鳳也哉雞常禽也暁晦而不迷其􅃸鳳靈鳥也理亂而不知其時邪噫言之不思有如是邪或曰古人臨危制變亦權道也雄知莽之不可匡也故矯爲其辭姑務脫禍是亦權也何過之深歟曰不然夫權者聖人有焉所以不失其道未見捨其道而從其權昔仲尼仕魯以季􅁊子荒齊樂知其不可匡也乃去之曽不聞矯爲其辭以求庸於魯雖仲尼日月其德人之不侔然楊雄亦慕仲尼之敎者以著書立言爲事得自易哉夫立言者豈不欲人之從敎邪且巳不能信人況求信於人乎語曰君子先言而後從之斯言可欺也哉登華􅈲沈顔甞讀李肇國史􅀘云韓文公登華嶽之巔顧視其險絶恐慄度不可下乃發狂慟哭而欲縋遺書爲訣且譏好竒之過也如是沈子曰吁是不諭文公之􅈲邪夫仲尼之悲麟悲不在麟也墨翟之泣絲泣不在絲也且阮籍縱車於途途窮輙慟豈始慮不至邪蓋假事諷時致意於此爾前賢後賢道豈相逺文公憤趣榮貪位之者􅀂陟懸崖險不能止俾至身危踣蹶然後歎不知稅駕之所焉可及矣悲夫文公之㫖微沈子幾晦乎窮達志程晏君子寧小窮而大達小人寧小達而大窮小者人之役大者人之道也孟子論帝王之道於諸侯諸侯不志我言則去之豈不以小窮而大達歟衛鞅論帝王之道於秦伯秦伯寐於是鞅乃易之以霸強之術而茍容之豈不謂小達而大窮歟君子不患乎無才患乎不知窮達之理也孟子大達逺盜蹊而遵正路者也衛鞅大窮捨正路而趨盜蹊者也秦不知蹊以問鞅鞅􅃌之趨盜蹊而強去也我知盜之蹊而返然之曷􅀂遵正路而逺盜蹊哉禹書上劉蛻以功不就而受誅則可謂勤民而死乎曰不然然則夏之郊也奚不尋其先安得以鮌配曰以功不就則可謂勤民而死也以誅其身則可謂勤其家也不怨君誅而尋父功鮌當誅也傳曰不以家事辭王事旣其家爲天下故報其勤家於夏郊而巳矣有鮌之誅而不廢其功禹爲其子也不得以天下而擇其功者禹爲之事􅀑神也微禹之爲子先人之罪將不食矣故其子之功由勤父嗣也然則夏郊冝矣於是君誅其怠也而子不怨其家祭其勤也民神弗畔蓋禹以天下不逮事其父而致孝乎􅀑神云禹書下治天下之野見之於夏功而未見於先夏功者乆矣夫八年之間生聚非不壊也委積非不耗也帝憂則民愁樂則民喜故以憂樂隱顯而助之帝能治其心故禹後雖以身先天下而不以一身􅀒天下之土石以其得治丗之心易使也嗚呼必不得和心之人而爲可以智治則豈羽山之下忍不以智獻其父者歟天下見濡手足之禹則不見土階之上以憂樂者也故曰心治乎人也功治乎水也其可獨禹云乎斷非聖人事李商隱堯去子舜亦去子周公去弟後丗人以爲能斷此絶不知聖人事者斷之爲義疑而後定者也聖人所行無疑又安用斷聖人持天下以道民不得知聖人理天下以仁義民不得知害去其身未仁也害去其家未仁也害去其國亦未仁也害去其天下亦未仁也害去其後丗然後仁也宜而行之謂之義子不肖去子弟不順去弟家國天下後世皆􅀩利去害矣不去則反冝然而爲之堯舜周公未甞疑又安用斷故曰斷非聖人事讓非賢人事丗以爲能讓其國能讓其天下者爲賢此絶不知賢人事者能讓其國能讓其天下是不苟取者耳湯故時非無臣也然其卒佐湯有陞陑之役鳴條之戰竟何人哉非伊尹不可也武故時非無臣也然其卒佐武有牧野之誓白旗之懸果何人哉非太公望不可也苟伊尹之讓汝鳩仲虺太公望之讓太顚閎天則商周之命其集乎故伊尹之醜夏復歸太公望之發揚蹈厲當此時雖百汝鳩百仲虺伊尹不讓也百太顚百閎天太公望亦不讓也故曰讓非賢人事知道房千里丗所以爲逹者貴爵富禄威刑不勝其用珠玉不勝其計耳熟聲口飫味目厭色斯所爲常情之大欲也丗之所以窮者秩不足以庇身禄不足以充用侮不能威辱不能刑聲色不足於耳目滋味不甘於口舌斯所謂常情之大不欲也然而聖人汲汲於禄仕者豈不爲是邪曰非也聖人爲人者也􅁪人爲已者也聖人􅀒其資得其地逢其時有其禄然後因其基流其德澤猶水之居高者決而漑之其浸必廣聖人之所以爲榮者導人於仁誼然後使萬千年載其烈光爲巍巍之德功以浹於生人者也􅁪人之爲已者期於厚禄貴位位以私尊禄以私富益尊而愈驕益富而愈汰以􅁋快一日之欲􅂊放肆於氣未絶之閒者也聖人有其時有其位行其道以及於人無其時無其位奉其道以自飾故聖人進不爲榮退不爲戚而常得其道􅁪人幸其時竊其位竭人以自足無其時失其位任其愚以自困故􅁪人進以爲已榮退以爲巳辱而常天其道孔子曰鳳鳥不至河不出圖吾巳矣夫孔子歎行已之道足以致是而時王不用已之道道無所施非歎其身食不方丈衣不文繡也􅁪人之所悲不達者率曰吾妻不能羅􅃭吾兒不得肉食耳豈甞少及於外物哉聖人以德澤流於人雖九命崇錫不以爲厚以其所償果當外其身而公於天下非巳幸也􅁪人無毫毛以禆於人茍幸得禄仕即逸豫以自怡以竊取偷得爲大􅃛其所得幸也孔顔聖賢也豈甞聞伐樹瓢飮以爲已辱哉􅁎旦亦聖人也豈甞聞受封攝理以爲已幸哉是知聖人之樂也内而􅁪人之樂也外内故常有餘外故常不足有餘故推於人不足故取於人有道之人麤裘索帶而人不鄙之者取其内而不取其外也􅀂然者富貴者文飾於外也彼之所以仁誼者質充於内也西子不華嫫女錦縠是不能易其美惡後之君子窮於時者當思􅀒其内而自篤無以其外而諂人達於時者當思勉其内以自飾無以其外而驕人茍如是庶幾乎知道矣重校正唐文粹卷第四十八
