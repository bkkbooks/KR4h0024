canonical_identifier: bkk:krp/KR4h0024/WYG/v1/juan/40
seq: 40
front:
  text: 周公舊章猶當擇其可否宣尼彛則尚或補其闕漏况鄭氏臆説淳于謏聞匪異守株何殊膠柱愚謂不出墉雉邇接宫闥實允事宜諒無所惑但當上遵天㫖祗奉徳音作皇代之明堂永貽範於來葉區區碎議皆可略而不論悠悠常談不足循其軌轍謹議
  hash: sha256:03e2c0d7e3a5f9dc93c1b9ef6c702d79c15f8756e99dc20e9b04761c627a744f
body:
  text: 大享議馮宗臣等竊聞明堂之建其所從來逺矣天垂象聖人則之蒿柱茅簷之規上圓下方之制考之大數不踰三七之間定之方中必居丙巳之地者豈非得房心布政之所當太微上帝之宫乎故仰恊俯從正名定位人神不雜各司其序則嘉應響至保合太和焉漢氏承秦經籍道息旁求堙墜詳據難明孝武初議立明堂於長安城南遭竇太后不好儒術事乃中廢孝成之代又欲立於城南議其制度莫之能决至孝平元始四年始創造於南郊以申嚴配光武中興元年立於國城之南自魏晉迄於梁朝雖規制或殊而所居之地恒取丙巳者斯蓋百王不易之道也髙祖天皇大帝纂承平之運崇朴素之風四夷來賔九有咸乂永徽三年詔禮官學士議明堂制度羣儒紛競各執異端乆之不决因而遂止何也非謂材不足力不堪也將以周孔既遥禮經且紊事不師古或爽天心以用作程神不孚祐者也則天太后摠禁闈之政藉軒臺之威屬皇室中圯之期躡和熹從權之制以為乾元大殿承慶小寢當正陽已午之地實先聖聽斷之宫表順端闈儲精營室爰從朝饗未始臨御乃起工徒挽令摧覆既毁之後雷聲隠然衆庶聞之或以為神靈感動之象也於是増土木之麗因府庫之饒南街北闕建天樞大儀之制乾元遺趾興重閣層樓之業煙熖蔽日梁柱排雲人斯告勞天實貽誡煨燼甫邇遽加修復況乎地殊丙巳未荅靈心跡匪膺期乃申嚴配事昧彛典神不昭格此其不可者一也又明堂之制木不鏤土不文今體式乖宜違經紊禮雕鐫所及窮侈極麗此其不可者二也髙明爽塏事資虔敬密邇宫掖何以祈天人神雜擾不可放物此其不可者三也況兩京上都萬方取則而天子闕當陽之位聽政居便殿之中職司其憂豈容沉黙當須審巧歴之計擇繁省之宜不便者量事改修可因者隨宜適用削彼明堂之號克復乾元之名則當宁無偏人識其舊矣明堂告朔議王方慶明堂天子布政之宫也謹按糓梁傳云閏者附月之餘日天子不以告朔左氏傳云閏月不告朔非禮也閏以正時時以作事事以厚生生人之道於是乎在矣不告閏朔棄時政也臣據此文則天子閏月亦告朔矣以此寧有他月而廢其禮乎先儒舊説天子行事一年十八度入明堂矣大享不問卜一入也每月告朔十二入也四時迎氣四入也廵狩之年一入也今禮官議惟歲首一入耳與先儒既異在臣不敢同宋朝何承天纂集其文以為禮論雖加編次事則闕如梁代崔靈恩撰三禮義宗但捃摭前儒因循故事而己隋煬帝命學士撰江都集禮秖抄撮舊禮更無異文貞觀顯慶禮及祠令不言告朔者蓋為歴代不傳所以其文遂闕各有由結不足依據今禮官引為明證在臣誠實有疑三朝行禮樂制議杜佑晉司律中郎將陳頎云昔杜夔傳舊雅樂四曲一曰鹿鳴二曰騶虞三曰伐檀四曰文王皆古聲辭太和中左延年改夔騶虞伐檀文王三曲更作聲節其名雖存而聲實異惟夔鹿鳴今不改易也魏代正朝大㑹太尉奉羣后行禮東廂雅常作者也後有三篇第一曰於赫篇詠武帝聲律與古鹿鳴同第二曰巍巍篇詠文帝用左延年所改騶虞聲第三曰洋洋篇詠明帝亦用左延年所改文王聲第四復用鹿鳴之聲重用而除古伐檀及晉初食舉亦用鹿鳴按左傳穆叔如晉晉侯享之工歌鹿鳴之二三拜鹿鳴所以嘉寡君也敢不拜嘉毛詩云鹿鳴燕羣臣嘉賔也既飲食之又實其幣帛筐篚以將其厚意然後忠臣嘉賔得盡其心也詩傳並無行禮及叔孫通所制漢儀復無别行禮事荀氏云魏氏行禮食舉冄取周詩鹿鳴又以宴嘉賔無取於朝考之舊聞未知所應筍朂乃除鹿鳴舊歌更作行禮詩四篇先陳三朝朝祭之義食舉歌詩十二篇元肇羣后奉璧趨歩拜起莫非行禮豈容别設一樂謂之行禮邪荀譏鹿鳴之失似悮昔謬還制四篇復襲前軌三朝上夀有樂議禮記但有獻酬無上夀文惟詩雅云冄拜稽首天子萬夀豳風云為此春酒以介眉夀雖非灼然明文要是髣髴其實古者詩工皆歌之故可得而言也漢興叔孫通定禮儀七年長樂宫成諸侯朝禮畢復置酒侍坐殿上皆伏尊卑以次起上夀漢故事上夀四㑹曲注言但有鐘鼓無有歌詩魏初作四㑹有琴筑但無詩雅樂郭瓊云明帝青龍二年以長笛食舉第十二古置酒曲代四㑹又易古詩名曰羽觴行用為上夀曲施用最在前鹿鳴巳下十二曲名食舉樂而四㑹之曲遂廢漢故事鄧吳及瓊等食舉之曲舉時増損張華上雅樂詩表云魏上夀食舉時及漢代所施用其文句長短不齊皆未合於古雅漢故事則云上夀四曲華亦言有歌辭㑹其注當是闕文晉代歌詩傅𤣥述具存徹食宜有樂議周官云王大食三侑皆合鐘鼓漢蔡邕云王者食舉以樂今但有食舉樂食畢則無樂按膳夫職以樂侑食禮記云客出以雍徹以振羽論語云三家者以雍徹子曰相維辟公天子穆穆奚取於三家之堂如此徹食應有樂不容同用食舉也朝服乘車議劉子𤣥伏以古者爰自大夫已上皆乘車而以馬為騑服魏己降迄乎隋代朝士又駕牛車歴代經史具有其事不可一二而言也至如李廣北征解鞍憩息馬援南伐據鞍顧盻斯則鞍馬之設行於軍旅戎服所乗貴於便習者也按江左官至尚書郎而輒輕乗馬則為御史所彈又顔延之罷官後好騎馬出入閭里當代稱其放誕此則專車慿軾可服朝衣單馬御鞍宜從褻服求之近古灼然之明驗也自皇家撫運㳂革隨時至如陵廟巡謁王公冊命則盛服冠履乗彼輅車其士庻有衣冠親迎者亦時以服箱充馭在於他事無復乗車貴賤所行通用鞍馬而己臣伏見比者鑾輿出幸法駕首途左右侍臣皆以朝服乗馬夫冠履而出只可配車而行今乗車既停而官履不易可謂惟知其一而未知其二也何者襃衣慱帶革履髙冠本非馬上所施自是車中之服必也韈而昇鐙跣以乗鞍非唯不師古道亦自取驚今俗求諸折中進退無凖且長裾廣䄂䄡如翼如鳴珮紆組鏘鏘奕奕馳驟於風塵之内出入於旌棨之間儻馬有驚逸人從顚墜遂使屬車之右遺履不収清道之傍絓驂相續固以受􅅓行路有損威儀今議者皆以秘閣有梁武帝南郊圖多有衣冠乘馬者此則近代故事不得謂無其文臣按此圖是後人所為非當時所撰且觀民間有古今圖畫者多矣如張僧繇畫羣公祖二疏而兵士有著芒屩者閻立本畫昭君入匈奴而婦人有著帷㡌者夫芒屩出於水鄉非京華所有帷㡌創於隋代非漢宫所作議者豈可徴此二畫以為故實者乎由斯而言則梁氏南郊之圖義同於此又傳稱政宜因俗禮貴縁情殷輅周冕規模不一秦冠漢佩用捨無恒況我國家道軼百王功髙萬古事有不便理資變通其乘馬衣冠竊謂宜從省廢臣懐此異議其來自乆日不暇給未及抑揚今屬殿下親從齒胄將臨國學凡有衣冠乗馬皆憚此行所以輒進狂言用申鄙見謹議公卿巳下冕服議楊炯古者太昊庖羲氏仰以觀象俯以察法造書契而文籍生次有黄帝軒轅氏長而敦敏成而聰明垂衣裳而天下理其後數遷五徳君非一姓體國經野建邦設都文質所以冄而復正朔所以三而改夫改正朔者謂夏后氏建寅殷人建丑周人建子至於以日繫月以月繫時以時繫年此則三王相襲之道也夫易服色者謂夏后氏尚黒殷人尚白周人尚赤至於山龍華蟲宗彛藻火粉米黼黻此又百代可知之道今蘇知機表奏請立節文改章服奉付禮官學士詳定是非者謹按虞書曰予欲觀古人之象日月星晨山龍華蟲作繪宗彛藻火粉米黼黻絺繡由此言之則其所從來者尚矣夫日月星辰者象聖王光照下土也山者布散雲物象聖王澤霑下人也龍者變化無方象聖王應時布教也華蟲者雉也雉身被五彩象聖王體兼文明也宗彛者虎也虎以剛猛制物象聖王神武定亂也藻者逐水上下象聖王隨代而應也火者陶冶烹餁象聖王至徳日新也粉米者人恃以生象聖王為物之賴也黼能斷割象聖王臨事能决也黻者兩己相背象君臣可否相濟也逮周氏乃以日月星辰為旌旗之飾又登龍於山登火於宗彛於是乎制衮冕以祀先王也九章者法陽數也以龍為首章衮者卷也龍徳神異應變濳見表聖王深識逺知巻舒神化也又制鷩冕以祭先公也鷩者雉也有耿介之志表公賢才能守耿介之節也又制毳冕以祭四望也四望者岳瀆之神也虎蜼者山林所生明其象也又制絺冕以祭社稷也社稷者土穀之神也粉米由之而成象其功也又制𤣥冕以祭羣小祀也百神異形難可遍擬但取黻之相背昭異名也夫以周公之多才也故治定制禮功成作樂夫以孔宣之将聖也故行夏之時服周之冕先王之法服乃此之自出矣天下之服能事又於是乎異矣今表狀請制大明冕十二章乗輿服之者謹按日月星辰者己施於旌旗矣龍山火米者又不踰於古矣而云麟鳳有四靈之名𤣥龜有負圖之應雲有紀官之號水有盛徳之祥此盖别表休徴終是無踰比象然則皇王受命天地興符仰觀則璧合珠連俯察則銀黄玉紫盡南宫之粉壁不足冩其形狀罄東觀之鈆黄無以紀其名實固不可畢陳於法服也雲也者從龍之氣也水也者藻之自生也又不假别為章目此盖不經之甚也又鸞冕八章三公服之者也鸞者太平之瑞也非三公之徳也鷹鸇者鷙鳥也適可以辨刑曹之職也熊羆者猛獸也適可以旌武臣之力也又稱藻為水草而無法象引張衡賦云帶倒茄於藻井被紅葩之狎獵謂為蓮華取其文彩者夫茄者蓮也藻者餙也盖以蓮餙井非謂藻為蓮若以蓮代藻變古從今既不知草木之名亦未達文章之意此又不經之甚也又毳冕六章三品服之者按此王者祀四望服之名也今三品乃得同王之毳冕而三公不得同王之衮名豈惟顚倒衣裳抑亦自相矛楯此又不經之甚也又黼冕四章五品服之者考之於古則無其名驗之於今則非章首此又不經之甚也國家以斷鼇錬石之功今上以緯地經天之徳漢稱文景周曰成康講八代之樂蒐三王之禮文物既行矣尊卑又明矣天下巳和平矣萬國巳咸寧矣誠請順考古道率由舊章弗詢之謀勿庸無稽之言弗聽若夫禮惟從俗則命為制令為詔乃秦皇之故事猶可以適於今矣若夫義取隨時則出稱警入稱蹕乃漢國之舊儀猶可以行於代矣亦何取於變周公之軌物改宣尼之法度者哉謹議請禁私鑄錢議劉秩臣伏奉今月二十一日勑欲不禁鑄錢更令百寮詳議可否者夫錢之興其來尚矣將以平輕重而權本末齊桓得其術而國以覇周景失其道而人用弊考諸載籍國之興衰實繫於是陛下思變古以濟今欲反經以合道而不即改作詢之芻蕘臣雖蠢愚敢不薦其聞見古者以珠玉為上幣黄金為中幣刀布為下幣夫三幣握之則非有補於煖也捨之則非有損於飽也先王以守財物以御人事而平天下也是以命之曰衡衡者使物一髙一下不得有常故與之在君奪之在君貧之在君富之在君是以人戴君如日月親君如父母用此術也是謂人主之權今之錢即古之下幣也陛下若捨之任人則上無以御下下無以事上其不可一也夫物賤則傷農錢輕則傷賈故善為國者觀物之貴賤錢之輕重夫物重則錢輕錢輕由乎物多多則作法収之使少少則重重則作法布之使輕輕重之本必由乎是奈何而假於人其不可二也夫鑄錢不雜以鈆鐡則無利雜以鈆鐡則惡惡則不重禁之不足以懲息且方今塞其私鑄之路人猶冐死以犯之況啓其源而欲人之從令乎是設䧟穽而誘之入其不可三也夫許人鑄錢無利則人不鑄有利則人去南畝者衆去南畝者衆則草不墾草不墾又隣於寒餒其不可四也夫人富溢則不可以賞勸貧餒則不可以威禁故法令不行人之不理皆由貧富之不齊也若許其鑄錢則貧者必不能為臣恐貧者彌貧而服役於富室富室乘之而益恣昔漢文之時吳濞諸侯也富埒天子鄧通大夫也財侔王者此皆鑄錢之所致也必欲許其私鑄是與人利權而捨其柄其不可五也陛下必以錢重而傷本工費而利寡則臣願言其失以効愚計夫錢重者猶人日滋於前而爐不加於舊又公錢重與銅之價頗等故盗鑄者破重錢以為輕錢錢輕禁寛則行錢重禁嚴則止止則棄矣此錢之所以少也夫鑄錢用不贍者在乎銅貴銅貴在於采用者衆夫銅以為兵則不如鐡以為器則不如漆禁之無害陛下何不禁於人禁於人則銅無所用銅無所用則銅益賤賤則錢之用給矣夫銅不布下則盗鑄者無因而鑄無因而鑄則公錢不破人不犯死刑錢又曰増必復利矣是一舉而四美兼也惟陛下熟察之復讎議韓愈右伏奉今月五日勑復讎據禮經則義不同天徴法令則殺人者死禮法二事皆王教之端有此異同必資論辨宜令都省集議聞奏者朝議郎行尚書職方貟外郎上騎都尉韓愈議曰子復父讎見於春秋見於禮記又見於周官又見諸信史不可勝數未有非而罪之者也最宜詳於律而律無其條非闕文也盖以為不許復讎則傷孝子之心而乖先王之訓許復讎則人將倚法專殺無以禁止其端矣夫律雖本於聖人然執而行之者有司也經之所明者制有司者也丁寧其義於經而深没其文於律者其意特使法吏一斷於法而經術之士得引經而議也周官曰凡殺人而義者令勿讎讎之則死義者宜也明殺人而不得其宜者子得復讎也此百姓之相讎者也公羊傳曰父不受誅子復讎可也不受誅者罪不當誅也誅者上施於下之辭非百姓之相殺也又周官曰凡報仇讐者書於士殺之無罪言將復讎必先言於官則無罪也今陛下垂意典章思立定制惜有司之守憐孝子之心示不自專訪議羣下臣愚以為復讎之名雖同而其事各異或百姓相讎如周官所稱可議於今者或為官吏所誅如公羊所稱不可議於今者又周官所稱將復讎先告於士則無罪者若孤稚羸弱抱微志而伺敵人之便恐不能自言於官未可以為斷於今也然則殺之與赦不可一例宜定其制曰凡復父讎者事發具其事申尚書省尚書省集議奏聞酌其宜而處之則經律無失其㫖矣謹議駮復讎議桞宗元臣伏見天后時有同州下邽人徐君先者父為縣吏趙師韞所殺卒能手刃父讎束身歸罪當時諌臣陳子昻建議誅之而旌其閭且請編之於令永為國典臣竊獨過之臣聞禮之大本盖以防亂也若曰無為賊虐凡為子者殺無赦刑之大本亦以防亂也若曰無為賊虐凡為理者殺無赦其本則合其用則異旌與誅莫得而並焉誅其可旌兹謂濫黷刑甚矣旌其可誅兹謂僭壊禮甚矣果以是示於天下傳於後代趨義者不知所以嚮違害者不知所以立以是為典可乎蓋聖人之制窮理以定賞罰本情以正襃貶統於一而已矣嚮使刺讞其誠偽考正其曲直原始而求其端則刑禮之用判然離矣何者若君先之父不陷於公罪師韞之誅獨以其私怨奮其吏氣虐於非辜州牧不知罪刑官不知問上下蒙冐籲號不聞而君先能以戴天為大恥枕戈為得禮處心積慮以衝讎人之胸介然自克死而無憾是守禮而行義也執事者宜有慙色将謝之不暇而又何誅焉其或君先之父不免於罪師韞之誅不愆於法是非死於吏也是死於法也法其可讎乎讎天子之法而戕奉法之吏是悖鷔凌上也執而誅之所以正邦典而又何旌焉且其議曰人必有子子必有親親親相讎其亂誰救是惑於禮也甚矣禮之所謂讎者盖以寃抑沉痛而號無告者非謂抵罪觸法陷於大戮而曰彼殺之我乃殺之不議曲直暴寡脅弱而已其非經背聖不亦甚哉周禮調人掌司萬人之讎凡殺人而義者令勿讎讎之則死有反殺者邦國交讎之又安得親親相讎也春秋公羊傳曰父不受誅子復讎可也父受誅子復讎此推刄之道復讐不除害今若取此以斷兩下相殺則合於禮矣且夫不忘讐孝也不愛死義也君先能不越於禮服孝死義是必達禮而聞道者也夫達禮聞道之人豈其以王法敵讐者哉而議者反以為戮黷刑壊禮其不可為典明矣請下臣議附於法令如有斷斯獄者不宜以前議從事謹議唐文粹巻四十欽定四庫全書唐文粹巻
