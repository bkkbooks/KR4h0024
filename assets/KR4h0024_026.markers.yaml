  - {type: variant, offset: 0, length: 3893, content: 重校正唐文粹卷第二十六之上呉興姚鉉纂表奏書䟽乙揔九首政事三諌太宗不詰難臣寮上言書并荅詔劉洎論時政書柳澤諌太宗勤政改過書岑文本傳導一敎本書元稹崇儒五請修太學書李觀請置詩學愽士書李行脩請孟子爲學科書皮日休請韓文公配饗書論貢士書舒元輿請太宗不詰難臣寮上言書并荅詔劉洎臣聞帝主之與凡庶聖哲之與賢愚上下相懸擬倫斯絶若乃以至愚而對至聖以極卑而對極尊徒思自强不可得也陛下降恩㫖假慈顔凝旒以聽其言虚襟以納其說猶恐羣下未敢對揚況動神聦縱天辯飾辭以扸其理援古以排其議欲令凡庶何階應荅臣聞皇天以無言爲貴聖人以不言爲徳老君稱大辯若訥莊生稱至道無文此皆不欲煩也是以齊矦讀書輪扁竊笑漢皇慕古長孺陳詞此亦不欲勞也且多記則損心多言則損氣心氣内損形神外勞𥘉雖不覺後必爲累須爲社稷自愛豈爲性好自傷乎竊以今日升平皆陛下力行所至欲令長乆匪由辯愽但當忘彼愛憎愼兹取捨毎事敦朴無非至公若貞觀之𥘉則可矣至如秦政强辯失人心於自矜魏文宏才虧衆望於虛說此才辯之累較然可知矣伏願略兹雄辯浩然養氣簡彼緗圖淡焉怡目固萬壽於南嶽齊百姓於東戸則皇恩斯畢天下幸甚荅詔非慮無以臨下非言無以述慮比有談論遂致煩多輕物驕人恐由兹道形神心氣非此爲勞今聞讜言虚懷以改論時政書柳澤頃者因韋氏險詖姦臣同惡賞罰紊㢮綱紀紛綸政以賄成宫因寵進言正者獲戾行殊者見疑海内寒心實將莫救賴神祇祐德宗廟降靈天討有罪人用不保陛下叡謀神聖勇智聦明安宗社於巳危拯黎庶於將溺今尨眉鮐背歡忻踊躍望聖朝之撫輯聽聖朝之德音今陛下蠲煩省傜法明德舉萬邦愷樂室家胥慶臣又聞危者安其位者也亡者保其存者也亂者有其理者也伏惟陛下安不忘危存不忘亡理不忘亂則克享天心國家長保也詩曰靡不有𥘉鮮克有終伏惟陛下愼厥終惟其𥘉非禮勿視非禮勿聽非禮勿言非禮勿動書曰惟德罔小萬邦惟慶惟不德罔大墜厥宗甚可畏也甚可懼也伏惟陛下愼之哉夫驕奢起於親貴綱紀亂於寵倖願陛下禁之於親貴則天下風隨矣制之於寵倖則天下法明矣詩曰刑于寡妻至于兄弟以御于家邦若親貴爲之而不禁寵倖橈之而見從是政之不恒令之不一則姦詐斯起暴亂生焉雖嚴刑制戮而法不行矣縱陛下親之愛之莫若安之福之寵禄之過罪之漸也非安之也驕奢之淫危之本也非福之也前事不忘後之師也伏願陛下精求俊哲朝夕納誨縱有逆于耳謬于心者無速之以罰姑籌之以道省于厥躬雖木樸忌諱恕之以直用開諌諍之路也或有順於耳便於身者無急之以賞當求諸非道稽之典訓其不叶於德必寘之以法用杜側媚之行也有羞淫巧於陛下者遽黜之則淫巧息矣有進忠讜於陛下者遽賞之則忠讜進矣臣又聞生於富者驕生於貴者慠石碏曰臣聞愛子敎之以義方不納於邪驕奢淫佚所自邪也書曰罔滛於逸罔遊於樂穆王有命曰實賴前後左右有位之士繩愆糺謬格其非心今儲宫肇建王府初啓至於寮友必惟妙擇今驕奢之後流遁未變慢遊之樂餘風或存夫小人弄臣易合於意竒伎淫巧多適於心狎於非德兹爲奢怠書曰愼簡乃僚無以巧言令色其惟吉士僕臣正厥后克正僕臣䛕厥后自聖伏願采温良愽聞之士恭儉忠鯁之人任以東宫及諸王府仍請東宫量署拾遺𥙷闕之職令朝夕講論出入侍從授以訓誥交修不逮臣又聞馳騁畋獵令人發狂名敎之中自有樂地承前貴戚鮮克由禮或打毬擊鼓比周伎術或飛鷹奔犬盤遊藪澤此甚爲不道非進德修業之本也書曰内作色荒外作禽荒又曰無若丹朱傲慢遊是好朋淫于家用殄厥代伏惟陛下誕降謨訓敦勸學業示之以好惡陳之以成敗以義制事以禮制心圖之於未萌慮之於未有則福禄長享與國並休矣臣又聞富不與驕期而驕自至驕不與罪期而罪自至罪不與死期而死自至信矣斯語明哉至誡頃者韋庶人樂安公主武延秀等可謂貴矣可謂寵矣權侔人主威震天下然怙侈滅德神怒人棄豈不謂愛之太極富之太多不節之以禮不防之以法終轉吉爲凶變福爲禍千人所指無病自死不其然歟書曰殷鑒不逺在彼夏王今陛下何勸豈非皇祖謀訓之則也今陛下何懲豈非孝和寵任之甚也禮曰愛而知其惡憎而知其善可不愼哉夫寵愛之心則不能免去其太甚閑之禮節適則可矣今諸王公主駙馬亦陛下之親愛也驕狂之道在於厥初鑒誡之義其則不逺使觀過務善居寵思危庶夙夜惟寅聿修厥德經曰在上不驕高而不危所以長守貴也制節謹度滿而不溢所以長守富也富貴不離其身然後能保其社稷書曰制官刑警于有位敢有恒舞于宫酣歌于室時謂巫風敢有徇于貨色桓于遊畋時謂滛風敢有侮聖言逆忠直逺耆德比頑童時謂亂風惟兹三風十愆卿士有一于身家必喪邦君有一于身國必亡甚可畏也甚可懼也伏惟陛下必察而明之必信而勸之有奢僭驕怠者削其禄封樸素脩業者錫以車服以朂其心使奉其命無使乆而忽之無使逺而墜之臣聞知之非艱行之惟艱又曰常厥德保厥位厥德匪常九有以亡㐲惟陛下愼之哉前車之覆實惟明證先王之誡可以終吉若陛下奉伊尹之訓崇傅說之命不作無益不啓私門刑不差賞不濫則惟德是輔惟人之懷天禄永終景福是集儻陛下忽精一之德開恩倖之門爵賞有差刑罰無當則忠臣正士亦當復談矣諌太宗勤政改過書岑文本臣聞創撥亂之業其功旣難守巳成之位其道不易故居安思危所以定其業也有始有卒所以保其位也今雖億兆乂安方隅寧謐旣承喪亂之後又接凋弊之餘戸口減損尚多田疇墾闢尚少覆燾之恩著矣而瘡痍未復德敎之風被矣而資産屢空是以古人譬之種樹年祀綿逺則枝葉扶踈若種之日淺根本未固雖壅之以黒墳䁔之以春日一人揺之必致枯槁今之百姓頗類於此常加含養則日就滋息蹔有征役則隨之凋耗凋耗旣甚則人不聊生人不聊生則怨氣充塞怨氣充塞則離叛之心生矣故帝舜曰可愛非君可畏非民孔安國曰人以君爲命故可愛君失道則人叛之故可畏仲尼曰君猶舟也人猶水也水所以載舟亦所以覆舟是以古之哲王雖休勿休日愼一日者良爲此也伏惟陛下覽古今之事察安危之機上以社稷爲重下以億兆在念明選舉愼賞罰進賢才退不肖聞過旣改從諌如流爲善在於不疑出令期於必信頥神養性省畋遊之娯去奢從儉減工役之費務靜方内而不求闢土載櫜弓矢而無忘武備凡此數者雖爲國之恒道陛下之所常行臣之愚心惟願陛下思之而不倦行之而不怠則至道之美與三五比崇億載之祚隨天地長乆雖使桑榖爲妖龍蛇作孽雉雊於鼎耳石言於晉地猶當轉禍爲福變咎爲祥況水雨之患隂陽恒理豈可謂之天譴而繫聖心哉臣聞古人有言農夫勞而君子養焉愚者言而智者擇焉輒陳狂瞽伏待斧鉞論敎本書元稹某年日月臣稹再拜獻書皇帝陛下臣伏見陛下降明詔脩廢學増冑子選司成大哉堯之爲君伯夷典禮夔敎胄子之深㫖也然而事有萬萬於此者臣敢昧死而言之臣聞諸賈生曰三代之君仁且乆者敎之然也誠哉是言且夫周成王人之中也近管蔡則䜛入親周召則義聞豈可謂夫明哉然而克終於道者得不謂教之然邪始其爲太子也未生胎敎旣生保敎太公爲之師周公爲之傳召公爲之保伯禽唐叔與之游禮樂詩書爲之翫目不得閱淫艶妖誘之色耳不得聞優笑陵亂之聲口不得習操斷擊搏之書居不得近容隂順邪之黨游不得恣追禽戮獸之樂翫不得愛遐異僻絶之珍凡此數者非謂備之於前而不爲也亦將不得見之矣及其長而爲君也血氣旣定游習旣成雖有放心快巳之事日陳於前固不能奪巳成之習巳定之心矣則彼忠直道徳之言固吾之所習聞也陳之者有以論焉回佞庸違之說固吾之所積懼也諂之者有以辯也人情之莫不欲耀其所能而黨其所近苟將得志則必快其所藴矣物之性亦然是以魚得水而游馬逸駕而走鳥得風而翔火得薪而熾此皆物之快其所藴也今夫成王所藴道德也所近聖賢也是以舉其近則周公左而召公右伯禽魯而太公齊快其藴則興禮樂而朝諸侯措刑罰而美敎化之至也可不謂信然哉及夫秦則不然滅先王之學曰將以愚天下黜師保之位曰將以明君臣胡亥之生也詩書不得聞聖賢不得近彼趙高者詐宦之戮人也而傳之以殘忍戕賊之術且曰恣睢天下以爲貴莫見其靣以爲尊是以天下之人未盡愚而胡亥固巳不能分獸畜矣趙高之威懾天下而胡亥固巳自幽於深宫矣彼李斯者秦之寵丞相也困讒冤死無所自明而況於踈逺之臣庶乎若然則秦之亡有以致之也漢高承之以兵革漢文守之以廉謹卒不能蘇復大訓是以景武昭宣天質甚美纔可免禍亂哀平之閒則不能虞篡弑矣然而惠帝廢易之際猶賴羽翼以勝其邪心是後有國之君議敎化者莫不以興廉舉孝設學崇儒爲意曽不知敎化之不行自貴者始略其貴者敎其賤者無乃鄰於倒置乎洎我太宗文皇帝之在藩邸以至於爲太子也選知道德者十八人與之游習即位之後雖宴遊飲食之間十八人者實在其中上失無不言下情無不達不四三年而名高盛古豈一日二日而致是乎游習之漸也貞觀已還師傳之官皆宰相兼領其餘官寮選亦甚重馬周以位高恨不得爲司議郎此其驗也文皇之後漸踈賤之至母后臨朝翦棄王族當中睿二聖勞勤之際雖有骨鯁敢言之士旣不得在調護保安之職終不能措扶衛之一詞而令匠胡安金藏剖腹以明之豈不大哀哉兵興巳來兹弊尤甚師資保傅之官非疾廢眊聵不任事者爲之即休戎罷帥不知書者處之至於友諭賛議之徒踈冗散賤之甚者搢紳恥之夫以匹士之愛其子者猶求明哲慈惠之師以敎之直諒多聞之友以輔之豈天下之元子而可以疾廢眊瞶不知書者爲之師踈冗散賤不適用者爲之友乎此何反上古之甚也近制宫寮之外往往以沈滯僻老之儒充直講侍讀之選而又踈棄斥逺之越月踰時不得召見彼又安能傳成道德而保養其躬哉臣以爲積此弊者豈不以皇天眷祐祚我唐德以舜生舜以堯繼堯傳陛下十一聖矣莫不生而神明長而仁聖以是爲屑屑習儀者故不之省耳臣獨以爲於列聖之謀則可也計無窮之業傳後嗣則不可脫或萬代之後若有周成王之中才而又生深宫優笑之閒無周召保助之敎將不能知喜怒哀樂之所自矣況稼穡之艱難乎今陛下以上聖之姿肇臨海内是天下人人傾耳注心之日也特願陛下思成王訓導之功念文皇游習之漸選重師保愼簡宫寮皆用博厚弘深之儒而又練達機務者更進迭見日就月將因令皇太子聚諸生定齒胄講業之儀行問道嚴師之禮至德要道以成之撤膳記過以警之血氣未定則輟禽邑之娛以就學聖質旣備則資游習以弘德此所謂一人元良萬方以貞之化也豈其修廢學選司成而足倫匹其盛哉而又俾則百王莫不㓜同師長同術識君道之素定知天倫之自然然後選用賢良樹爲藩屏出則有晉鄭魯衛之盛入則有東牟朱虚之强蓋所謂宗子維城犬牙盤石之勢也又豈與夫魏晉巳降因賤其兄弟而自翦其本枝者同年而語乎微, WYG: ''}
