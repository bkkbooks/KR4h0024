body:
  text: 項籍碑銘并序李觀鋪周秦之顛亡粲乎簡册吁可駭也惟秦失在暴惟周失在弱上慢下黷政無紀網若然者神靈不得不哀丗教不得不張且天地不可以無主故帝必誕眷命不可以坐得故有心者經綸於是漢祖起於豐沛公起於會稽陳吳之徒自稱乎假王其餘揭竿而呼爭先刺秦者如林如藪于時亂浩浩兵憧憧風從虎雲從龍三靈昏而四海空公乃杖撥亂之劒希當丗之功浮江而西有壯士八千枹鼓于舟中吁嗟乎無人維禦乎羣凶所以謀大業拯萬靈而爭雌雄者獨漢祖與公遂號百勝之師趣纍卵之危活趙歇擒王離十壁愕眙一麾靡餘然後飄鋭氣聳利鋒扼秦關怒漢先因語曰捐約則違人固信則自違惡取乎乃軍鴻門屠咸陽鼎峙于神州幅裂于四方始退與漢祖東西而王天下是知量不足謀不長矣然雖兵衆於漢戰捷於漢其後則有靈壁之敗太公虜滎陽之圍紀信焚廣武之守傷其胸長陵之役撓其師與漢祖龍虎相逐干戈合離五年之後勝敗乃知是知兵之不可窮物之不可終天地否而開雲雷屯而通故有三將潰圍孤軍曷歸良馬在御美人在帷楚歌夜聞哀泣垂綏遂飲帳中申令麾下鏡分美人颷舉良馬曉漫漫雲茫茫失道於隂陵問津於烏江其猶魚遭網而遊鳥嬰羅而翔終不免矣尚能合從亡之人御追逃之兵旗鼓指掌鵝鸛丘陵足罔不蹶首胡不橫然始解馬於舟子結纓於死地痛矣夫何自慷慨斯焉之甚邪而曰天實亡我非戰之罪何執而不窹哉公實勇而無謀剛而無親忌而信讒暴而殘人是以人得蹈其資兵得害其身真自亡也豈天亡乎使公勇而能謀關中可據矣剛而能親諸將不攜矣明以察讒竒計得施矣恕而愛人百姓樂推矣若然則舉天下如轉圜何漢氏與二臣能計之哉至如謀於漢者昔其臣也公實棄之兵於漢者亦其將也公不庸之故曰得人者昌失人者亡噫從始而言之蓋天理有素乎故生項以靜難生漢以牧人靜難者授勇牧人者授仁不然何鴻門阽而復持成臯跳而復振入關而緩來王楚而驟歸者哉釋名曰碑悲也觀嘗尋楚漢春秋見公帳中之歌而詠之輒泫然而悲爰刻石為文多不究其終始銘曰姬孱而絶嬴虐而滅九陽鬱結九州卼臲必生聖哲以起滅絶維漢自豐維楚自東偕伐寇戎反相戰攻戰攻不罷洎乎垓下彼衆我寡龍死于野諸葛武侯廟碑銘並序尚馳漢代之季天下不得不三分蓋有由矣曹氏挾王室之威重孫氏藉父兄之餘業劉氏獨不階尺土開國於亡命行旅之間天贊一武侯即鼎足之勢均也公諱亮字孔明身長八尺嘗躬耕壠畒好為梁甫吟雖經綸之材隱括未用而寥廓之志舉措輒形既先主扶世奠民渴明智用謀之佐致三顧見咨當代之畫公於是輕重中夏揣摩全吳定王業於胸心決神機於掌握由是身為先主所起計為先主所用自北徂南周爰執事夷險平亂靡所不之卒使劉氏以岷峨之地為己封梁益之人為己蓄曹操不敢以兵強驟進孫權不敢以境闊妄動彼相之力焉屬先主創業未半中道而殁遺詔邦家之事大録于公敕後主事公如事父至於職為臣行令如君其名近嫌也位為君事臣如父其形近猜也不然豈周公賦鴟梟之詩成王啓金縢之誥此雖大小有異託付不殊竟能上不生疑心下不興流言茍非誠信結於人格於神移於物則莫能至是公復揔戎仗律無歲不征將繼舊邦之業用復先君之命所以南擒孟獲而不殺志在綏戎狄矣西拔𡵨山而不賀志在吞河洛矣役木牛流馬濟人之力巳紓矣制陳圖兵法敵國之軍可玩矣故得三關不封二邦喪氣大勳未集行師而殞戎夷野祠氓庶巷祭遺愛所使豈求而得之噫國之將亡本必先顚且以蜀之連山峻極其險不為公死而平沃土冨饒其利不為公死而薄甲兵士卒其衆不為公死而滅府藏穀帛其冨不為公死而貧及鄧艾揚聲於前鍾會躡迹於後減蜀三十萬戶如撓羊羣劉禪竟不免面縛壘門身為降虜天事歟人事歟天事逺吾不知之矣以人事而論使武侯常存殷若二敵國勝於本朝百萬之師北向爭衡司馬懿復惕息而不敢戰足明中原非曹丕所有也舉其大略真命丗之雄未可以身許小國之君延霸王之佐因曰才有所詣不建前賢向令伊吕並丗而生殷周易地而處則太甲不放桐宫而四海咸理諸侯不誓孟津而天下大定但為天不假年志盡莫就生居於後功績在其下耳然非先主之識武侯或不能輔成於王業使百代令君用人必由此道欲使社稷不振賢智逃於藪澤其可得邪公死之日遺令葬漢中宅軍前祭法曰法施於民以死勤事以勞定國則祀之至令官書廟食成不刋之典一山之內每有風行草動狀帶威神若歲大旱邦人禱之能為雲為雨是謂存與沒人皆福利生死古今一也死而不朽反貴於生銘曰漢室大壞掃地無依人心各動天命未歸角力爭負有翼者飛突兀卧龍吟嘯待時一論丗事超拜軍師魚水相得生死以之仗順收兵行權略地氣蓋全吳胸吞大魏國政成三人臣莫二乃建社稷興王之器既得武侯臲卼魏都敵國末滅謀臣巳殂大本去矣不降得乎荒墳四頽拱木皆枯尚餘精爽能禁樵蘇人生異代仰止山隅蜀丞相諸葛武侯祠堂碑銘并序裴度度嘗讀舊史詳求往哲或秉事君之節無開國之才得立身之道無治人之術四者備矣兼而行之則蜀丞相諸葛公其人也公本系在簡䇿大名蓋天地不復以云當漢祚衰陵人心競逐取威定霸者求賢如不及藏器在身者擇主而後動公是時也躬耕南陽自比管樂我未從虎時稱卧龍詩曰潛雖伏矣亦孔之照荆州平心與元直神交洎乎三顧而許以驅馳一言而定其機勢於是翼扶劉氏纘承舊服結吳抗魏擁蜀稱漢刑政達於荒外道化行乎域中誰謂阻深殷為強國誰為遳脆勵為徑兵則知地無常形人無常性自我而作若金在鎔故九州之地魏有其七我無其一由僻陋而啓雄圖出封疆以延大敵財用足而不曰浚我以生干戈動而不曰殘人以逞其底定南方也不以力制而取其心服震懾諸夏也不敢角其勝負而止候其存亡法加於人也雖從死而無怨德及於人也雖奕葉而見思此所謂精義入神自誠而明者矣若其人存其政舉則四海可平五服可傾而陳壽之評未極其能事崔浩之説又詰其成功此皆以變詐之略論節制之師以進取之方語化成之道不其謬歟夫委棄荆州不能遂有三郡此乃務增德以吞宇宙不黷武以爭尋常及出斜谷據武公分兵屯田謀久駐之計與敵對壘待可勝之期雜乎居人如適虛邑彼則喪氣我方養威若天假之年則繼大漢之祀成先主之志不難矣且權傾一國聲震八紘上下無異辭始終無愧色茍非運膺五百道冠生知曷以臻於此乎故玄德知人之明者倚仗曰魚之有水仲達姦人之雄者嗟稱曰天下竒才度每迹其行事度其逺心願奮短札以排羣議而文字蚩鄙志願未果元和三年冬十月聖上以西南奧區寇亂餘孽罷氓未息汚俗未淸輟我股肱為之父母乃詔相國臨淮公由秉鈞之重承推轂之寄戎軒乃降藩服乃理將明帝道陬落綏懷漙暢仁風閭閻滋殖府中無留事宇下無棄才人知嚮方我有餘地則諸葛公在昔之治與相國當今之政異代而同塵矣度謬以庸薄獲參管記隨旌旄而爰止望祠宇而修謁有儀可象以赫厥靈雖徽烈不忘而碑表未立古者或拳拳一善或師長一城尚流斯文以示來裔況如在之歎終古不紀其可闕乎乃刻貞石庶此都之人存必拜之感云爾銘曰昔在先主思啓疆宇擾攘靡依英雄無輔爰得武侯先定蜀土道德城池禮義干櫓煦物如春化人如神勞而不怨用之有倫柔服蠻落鋪敷渭濵攝迹畏威雜居懷仁中原旰食不測不克以待可勝允臻其極天未悔禍公命不果漢祚其亡將星中墮反旗鳴鼓猶走司馬死而可作當小天下尚父作周阿衡佐商兼齊管晏揔漢蕭張易代而生易地而理遭遇豐約亦皆然矣嗚呼竒謀奮發美志夭遏吁嗟嚴立咸受謫罰聞之痛之或泣或絶甘棠勿翦駢邑斯奪繇是而言殊途共轍本於忠恕孰不感恱茍非誠慤徒云固結古柏森森遺廟沈沈不殄禋祀以迄于今靡不駿奔若有照臨蜀國之風蜀人之心錦江清波玉壘峻岑入海際天知公德音諸葛武侯廟記吕溫天厭漢德俾絶其紐羣生墜塗四海飛水武侯命丗實念皇極魏姦吳輕未獲心膂南陽堅卧待時而起三顧雖晚羣雄粗定必也篲掃是資鼎立變化消息謀成掌中龍戰玄黃再得雲雨於是右揭如天之府左提用武之國因山分力與水合勢蟠亘萬里張為龍形亦欲首吞咸鎬尾束河洛翼乎中夏飛于天衢然後魚驅勾吳東入晏海大勳未集天奪其魄至誠無忘炳在日月烈氣不散長為風雷英雄痛心六百年矣於戲以武侯之才知巳託國土雖狹國以勤儉富民雖寡兵以節制強魏武既沒晉宣非敵而戎車荐駕不復中原或竒謀非長則斬將覆軍無虛舉矣或餽糧不繼則築室反耕有成算矣嘗試念之頗賾其原夫民無歸德以為歸撫則思虐則忘其思也不可使忘其忘也不可使思當漢道方休哀平無罪王莽乃欲慿戚寵造符命脅之以威動之以神使人忘漢終不可得也及高光舊德與丗衰逺桓靈流毒在人骨髓武侯乃欲開季丗振絶緒論之不以本臨之不以忠使人思漢亦不可得也向使武侯奉先主之命告天下曰我之舉也匪私劉宗惟活元元曹氏利汝乎吾事之曹氏害汝乎吾除之俾虐魏逼從之民聳誠感動然後經武觀舋長驅義聲咸洛不足完矣奈何當至公之運而強人以私此猶力爭彼未心服勤而靡獲不亦冝哉乃知務開濟之業者未能審時定勢而大順人心而克觀厥成吾不信也惜其才有餘而見未至𫐠于遺廟以俟通識唐貞元十四年七月二十五日東平吕溫記刻武侯碑隂孫樵赤帝子火熾四百年天厭其熱洎獻燼矣武侯獨憤激不顧妝死灰於蜀欲噓而再燃之艱乎為力哉是以國稱用武歧雍間地不尺闊抑非智不周天意炳炳也夫以武侯之賢寧靡籌其不可邪蓋激備隆中以天下託不欲曲肱安榖終兒女子手將驅馳死備志邪由是核武侯之所為殆庶幾矣然跨西南一隅與吳魏抗國提卒數萬綽綽乎去留無我技者是亦善為兵矣史壽以為短於應變真抑武侯哉俾武侯不早入蜀地曹之君臣將奔走固圉之不暇鍾鄧寧能越巖懸兵決勝指取邪是井絡之野與武侯存亡俱矣天殱武侯其不愛劉愈明白矣其薑維何力焉曩蟠南陽時人不與仲毅伍洎受社稷寄擅刑賞柄曽心不愧畏人不疑黷何意氣明信之卓卓也武侯死殆五百載訖今梁漢之民歌道遺烈廟而祭者如在其愛於民如此而久也獨謂武侯之治比於燕奭彼屠齊城合諸侯在下矣重校正唐文粹卷第五十五之上重校正唐文粹卷第五十五之下吳興姚鉉纂碑七墓銘附揔四首妃主唐和麗妃神道碑張説唐鄎國長公主神道碑唐岐陽公主墓志銘附杜牧唐東光縣主神道碑李華唐和麗妃神道碑銘并序張説舊史云軒轅帝宫次星具黃龍之體郊媒神祀次妃成玄鳥之命非聖也莫能法天非天也莫能感聖則有相乎坤而母乎震齊乎古而合乎天迹雖祕絶猶可測而言焉麗妃趙氏天水人也麗者以華美為貴妃者以配合為尊易云日月麗天傳稱星辰合度麗加妃號自我為初原夫八駿覲周肇有封姓三軍霸晉乃蕃卿族設寶符而開國曵珠履而承家果驗成宣之後不乏文忠之慶堯門昭殿何代無人暨乎紫氣上通瑶臺獨立楚宫選美納良袂於神雲漢掖求才進團扇於明月故坐而論教則比位三司動而具贍則儀刑六列者矣先將軍以恩澤授職太夫人以有禮封鄭流車躍馬豈無甲觀之親湫宅間門不有椒房之勢探風揆化憂國如家故聖人有以尚其德也躬親繭館義形熊檻退席以愛禮樛木以廣恩望古難臻之地必為常踐之域故聖人有以嘉其志也懸象告沴經時寢疾在蒙𬒳之辰答還輦之問生可捐於浮假心獨係於玄真神往上清願承恩而入道形歸下土期去禮而薄葬慈顔同氣奚敢為言皇上閔而許之咨嗟不巳開元十四年春秋三十有四七月十四日薨於春華殿殯於龍興觀之精屋示以出家從道例也命河南尹監護河南令副焉喪葬務約成遺語也二十六日窆於故都之後邙山之陽孺慕承華悽涼薄室列薤歌於東路回容衛於北山夀堂一閉兮凡聖等人代同悲兮修短間月帔雲衣禭以神仙之服上方陶簋旋於造化之初此皆聖主之曲成賢妃之本志何必雲陽山下别起通靈之臺未央宫中虛立致神之帳若夫易名之典考行是存帝諡曰和禮之貴也氣之和者生萬物聲之和者孕八音魂而有知感聖恩乎有詔史臣恭銘內職事出彤管辭無華飾寫樂池之永傷寄瑶山之罔極銘曰帝妃佐后實掌隂教八月選才千金聘貌禮獻絲繭詩修浣濯婦政可尊嬪風胥效皎皎漢女為皇降靈娥娥邦媛順道之經結以印綬華光後庭帶之弓韣朗潤前星退述濳運夙承嘉漿謙苦中京﨑嶇上黨金鏡開目明珠耀掌心方樂於時泰魂奄悲於化往紫雲衣兮霓裳送美人兮北邙白壤宫兮青松苑去君恩兮日逺秋風急兮霜天草木黃兮野田滅香容於空槨留畫像於甘泉春秋以麗和之二字獨褒美於千年鄎國長公主神道碑銘并序張説臣聞堯有娥英承九族之敦序舜有宵燭動百里之光耀大聖之後天必縱之積善之家神所慶矣豈惟上帝之女雲漢為靈平王之孫肅雍其德連華前志世有其人皇唐鄎國長公主者睿宗之第七女也母曰崔國妃搆纍聖而成門合濟美而為室藴乾坤之純粹演日月之清明神媛誕靈常言所絶免懷之歲天奪聖善不食三日哀比成人文母流胎教之慈曽子得生知之孝由是宫闈延矚邦國逺聞及乎玉笄耀首油駢在馭錫之美地邑以荆山求之令族嬪于薛氏爾其居玩圖史動修法度服其浣濯恭儉之教興鼓其琴瑟敬讓之風𬒳其行已也安親惠下之謂仁敬宗好合之謂義降貴接卑之謂禮恕情周物之謂智推心而行罔不該備其理家也侍膳饔餗之均和主饋醴􅋳之品齊絲竹五音之徽靡纂組九華之縟麗經目所涉莫不精詣每至三元上賀五日中參進對詳華折旋舒婉故以式瞻貴里儀範通門如千花之泛惠風百卉之涵膏露窈窕之儀克舉蕃衍之福大來有男子四女子五謡碧生階芝蘭滿室也習禮明詩日漸庭闈之訓銀章女綬地連恩澤之侯自先朝徹扆之辰迄今公主成笄之日外降過制內疾餘哀手寫金字梵經三部躬繡綵線弗二鋪貝葉真偈現心相於銀鈎蓮華妙容呈意生於玉指孝思惟則道逺乎哉開元繼明推恩由巳進封鄎國長公主食邑一千二百戶田賦廣而彌儉禮秩尊而益恭其後君子晨歌夫人晝哭未亡為稱生意盡矣撫視遺孤將守柏舟之誓志期剃落永從奈苑之遊朝制斷恩改降鄭氏陵谷可移隋和之德不昧寒暑有遷松筠之性如一均養七子庥廕二宗汾隂之室忘亡滎陽之黨相慶既而善福虛應寢疾彌留盡國醫之伎逺方畢至供御府之藥中使相望命之必至不可枝也堂邑山林忽焉瘁色平陽歌舞適足愁人開元十三年二月庚午薨於河南縣之修業里春秋三十有七震悼紫庭哀傷朱邸傾家若墜舉國同悲有詔光祿卿孟溫禮監護喪葬京兆尹能延休副焉窀穸之禮一如涼國公主故事夏四月恩旨陪葬於橋陵不祔不從古之道也皇上念同氣之致美感閲川之永謝恨棣華之半缺悲瑶草之先化乃命國史昭銘懿迹降恩禮於雲露寫哀辭於金石水非湘渚還起帝子之祠山是洛陽即封天妹之冡銘曰帝系白雲仙源紫氣漲家成國承天作貴赫赫聖祖曰文曰武皇皇睿宗一變萬邦挺生淑媛慈和孝恭清臚如神蛾眉無雙邸第立官湯沐建封爰及笄總禮施環佩鳴鳯獻祥乘龍擇對帝唐降女天乙歸妹珠玉過庭蘋蘩正內蛟門早閴龍湖忽上無地何載無天何仰金澱書經華絲繡像欲報之德昊天罔極孰是言歸良人永違銀爐煙斷羅幕霜飛懇願毁形託身壞衣不諒人只改嬪他士稟命曰從從人曰順息媯繩楚懷嬴霸晉反經合權與道同韻燠休二室均歡等潤四海謐清九族和平萬物向榮衆雛未成心戀盛明形隨落英祖載鼎城歸穸咸京挽歌揚聲鹵薄凶行哀哀聖情惻惻同生橋山片石千秋令名唐故𡵨陽公主墓志銘杜牧憲宗皇帝即位八年出嫡女册封𡵨陽公主下嫁于今工部尚書判度支杜公琮始憲宗時宰相權德輿有壻獨孤郁為翰林學士帝愛其材因命宰相曰我嫡女既笄可嫁德輿得壻獨孤我豈不得邪可求其比後丞相吉甫進言曰前所奉詔臣謹搜其人因名我烈祖司徒岐公曰有孫兒琮年始弱冠德行文學秀朗嚴整臣嘗為司徒吏熟其家事官族世婚習尚守治臣一皆忖度疑琮可以奉詔帝即召尚書見與語大恱受殿中少監服章金紫以元和八年某月日主下嫁于杜氏上御正殿禮畢由西朝堂出節幡鼓鐸儀物畢備引就昌化里賜第上御延喜樓駐止主輪尚書及賔侍酒食金帛奏內樂降嬪御送行賜第堂有四廡繢椽藻櫨丹白其壁派龍首水為沼主外族因請願以尚父汾陽王大通里亭沼為主别館當其時隆貴顯榮莫與為比主實憲宗皇帝嫡女穆宗皇帝母妹敬宗皇帝今天子親姑尚父汾陽王子儀外曽孫太皇太后始以正妃事憲宗以太后太皇太后愛養三朝凡四十年德厚慈恕化充六宫主以一女之愛降于杜氏建事舅姑杜氏大族其他宜為婦禮者不翅數十人主卑委怡順奉上撫下終日惕惕屏息拜起一同家人禮度二十餘年人未嘗以絲髮間指為貴驕始與尚書合謀曰上所賜及婢奴卒不肯窮屈奏請納之上嘉歎許可因錫其直悉自市寒賤可制指者自是閉門落然不聞人聲尚書讀書考今古治亂主職婦事承奉夫族時歲獻饋吉凶􅉠助必親自經手池塞館陊闢毬場種樹不數年搢紳間雜然稱尚書有賢婦尚書旋出為灃州刺史主後尚書行郡縣聞主且至殺牛羊大為數百人供具主至從不二十人六七婢乘驢闒茸約所至不得肉食驛吏立門外舁飯食以返不數日間聞于京師衆譁説以為異事尚書在灃州三年主始入後出中間不識刺史廳屏尚書治澧州考治行為天下第一後為大司徒京兆尹鳯翔節度使朝廷屈指比數以為凡有中外重難非尚書不可主賢益彰雖至宫闈貴號亦加尊敬姑涼國太夫人寢疾比喪及葬主奉養蚤夜不解帶親自嘗藥粥飯不經心手一不以進既而哭泣哀號感動他人尚書後為忠武軍節度使所治許州創為節度府五十年南迫於蔡蔡屋室卑􅋻主居無正堂處東支屋恬然六年許軍強雄且撑劇寇自始多用武臣治各出已部曲家人疵政弛法習為循常有司用比邊障逺地擲置不問民亦甘心尚書再治之老民相率兩走闕下遮丞相馬叩頭乞留請樹生祠及詔追去攀緣攜扶哭於道路尚書治外主治內尚書所至必稱崱崱為名公偉人主實有內助焉穆宗以太皇太后敬主尤為親信俯首益卑車服侍使愈自貶抑覲謁溫凊外口不言他事訖穆宗朝人不以親貴稱當貞元時德宗行姑息之政王武俊王士真張孝忠子聮為國壻憲宗初寵于頔來朝以其子配以長女皆挾恩佩勢聚少俠狗馬為事日截馳道縱擊平人豪取民物官不敢問戚里相尚不以為窮弱自主降于尚書壁絶外之初怒中笑後皆敬畏纍聖亦指示主德以誡警之至于今以主尚書顯重於中外戚里亦皆自檢斂隨短長為善於是舊俗滅不復有尚書自許奉急追詔主有疾小愈強不肯留曰去朝興慶宫縱死於道吾無恨以開成二年十一月某日薨於汝州長橋驛享年若于上廢朝三日其年十二月某日主喪至京師比及葬兩宫弔問相繼於道開成三年某月日上御正殿詔丞相嗣復攝中書令正衙宣册諡曰莊淑大長公主某年某月日祔葬于萬年縣洪原鄉少陵原尚書先塋禮也生男二人長曰輔九年十歲次曰楊十始二歲女二人某於尚書為從父弟以實銘銘曰章武皇帝唐中興主刑于正妃教及嫡女婉婉帝子下嫁時賢影逐響答隨順纏綿杜氏大族枝蔓蟬聮上有舅姑高堂儼然螭綬龜章玉佩金軒飬色恱意侍後承前人不我貴我敬我虔始終盡禮大小周旋餘二十年誰興間言貴不召驕富不期侈是此四者倐相首尾自古名士或泥於此孰謂帝子超脫擺棄婦職是勤夫言是指地荒館陊屏外不履淑德柔風天下傾耳冝乎夀考歸女婚子不錫全祉孰提神紀幽石有志顯筆有史流于千祀唐故東光縣主神道碑銘并序李華先朝宗室之望曰紀王太宗第十子也惟帝族母師曰東光縣主紀王第三女也自天降祐生有令德年八歲王不豫循環左右不食纍日王撫首諭焉為之進膳縣主察起居未復憂色如初動於神祇王疾用間周文樂正之養不過焉至若天人之秀元氣之純積於中文於外其容可知也孝以奉親慈以臨下尊師傅服浣濯其德可知也禮傳為簮珥詩書為佩玉原心而顧身體訓而成教其言可知也降尊而處下推泰而從約詣繡繪之妙適飲膳之和其功可知也年十八受封邑王擇聞喜公以妻之聞喜有王佐之材委會蕃邸縣主以皇孫之貴和鳴侯家隂德莫違輝動邦教養先姑如寧膝下奉君子如見大賔以徽柔睦娣姒以莊敬端幼賤鵲巢之化存焉太后臨朝諸武專政魯衛之國翦焉丘墟紀王流竄巴濮薨於道路縣主承訊崩心嘔血每一發聲飛鳥哀鳴草木無色外除之後衣裳無純綵杯圈無甘食耳不聽聲首不加飾自朝廷達於宇內罔不哀之太后復辟中宗出震日升暘谷天下文明雷破羣隂品物咸遂以王懿親盛德詔有司備禮物陪葬昭陵聞喜公時為孝義令詔書至河縣主聞之嘔血而絶絶而復蘇告諸子曰家國再造冤酷獲申為我謝中外親親下見先王瞑目無恨言未畢而薨春秋五十有四時神龍元年二月二十二日有司以聞中宗震悼召聞喜公問公悉以對上歔欷久之殿省垂泣六宫悽愴乃下詔褒美史官撰德弔祭賵贈禮過其備矣深於春秋者歎曰孝之至不忘其親忠之至乃心王室自古賢士大夫莫能備舉惟縣主有焉紀王之陷非罪也泣血以終哀中宗之撫興運也則感深而殞絶忠孝兩極首其人倫使百代之下聞其風者有以勸焉其為不匱逺矣嗚呼天輔善人冝其有後男十人女十人四子至大夫曰遇曰遘曰邁邁仁則踐修孝惟明發少子德位兼盛曰逈今河南尹兼東都留守上柱國祿益厚而慕益深不遠劬勞之報故也銜涕投簡而命下吏敬銘三章式表幽宅其文曰肅雍王門天帝之孫因心則孝懷盛敬尊配美良士如賔禮存泣血終身豈惟霜露慶集家國魂清冡墓夀絶哀歡事髙緗素天作邙山萬化攸歸地閉金印泉深衮衣國風悽愴􅊮管無輝重校正唐文粹卷第五十五之下嘉靖甲申歲太學生姑蘇徐焴文明刻于家孰
