front:
  text: 揔七首
  hash: sha256:e91c228042afbf4ac46fd4db84d2de1d8903cfbd07fc4818d5ad90b900935bbc
body:
  text: 奏尊號一奉天論徽號狀第二首赦宥一論赦書狀舉官一請許臺省長官舉薦屬吏狀府庫一請不置瓊林大盈二庫狀内人一初收城論詔渾瑊取裹頭内人等狀無濫賞二駕幸梁州在路論百姓進瓜果請賜帛不與官二狀已上並陸贄論尊號狀第二首右兾寧奉宣聖㫖卿所商量加尊號事雖則理體甚切然時運必須小有改變亦不可執滯不信卿冝為朕更審思量應亦無妨者臣聞徳合天者謂之皇徳合地者謂之帝徳合人者謂之王父天母地以養人理物各得其冝者謂之天子是皆至尊之殊號極美之大名雖欲變更無踰於此故伏羲神農黄帝堯舜自生人以來君徳之最神聖者也天下尊之美之亦已至矣而其指以為號者或曰皇或曰帝唯目一字且猶不兼禹湯繼興莫匪大聖尚自菲薄降號為王嬴秦徳衰於殷周而名竊於羲皥兼皇與帝始揔稱之流及後代昏僻之君乃有聖劉天元之號是知人主輕重不在自稱崇其號無補於徽猷損其名不傷於徳美然而損之有謙光稽古之善崇之獲矜能納謟之譏得失不侔居然不辨况今時運迍否事屬艱難尤宜懼思以自貶抑必也俯稽術數須有變更與其増美稱而失人心不若黜舊號以祗天戒天時人事理必相符人既好謙天亦助順陛下誠能斷自宸鑒煥發徳音引咎降名深示刻責惟謙與順一舉而二美從之外可以收物情内可以應𤣥運上可以齊徳於夐古下可以垂法於無窮興廢典矯舊失至明也損虚飾收美利大智也前聖之所以永保鴻名常為稱首者逹於兹義而已矣陛下何恡而不革之反欲加冗號以受實患哉𤣥元之徳經曰王侯自謂孤寡不榖以賤為本也周襄王遭亂出居於鄭告於諸侯曰不榖不徳鄙在鄭汜春秋禮之以其能降名也漢光武詔令上書書不得言聖史策稱之以其能損已也臣顧以賤微獲承訪議伊尹恥其君不如堯舜臣亦耻之是以誠發於中不復防慮忌諱赦其愚而鑑其理唯明主行焉謹奏論赦書狀右隠朝奉宣聖㫖并以中書所撰赦書示臣令臣審㸔可否如有須改張處及事宜不盡並條奏來者臣謹如詔㫖詳省再三猶懼所見不周兼與諸學士等叅考得失僉以為綱條粗舉文理亦通事多循常辭不失舊用於平昔頗亦可行施之當今則恐未稱何則履非常之危者不可以常道安解非常之紛者不可以常語諭自陛下嗣承大寳志一中區窮用甲兵竭取財賦甿庶未達於暫勞之意而怨咨已深昊穹不假以悔禍之期而患難繼起復以刑謫太峻禁防傷嚴上下不親情志多壅乃至變生都輦盗據宫闈九廟鞠䧟於匪人六師出次於郊邑奔逼憂危言之痛心自古禍亂所鐘罕有若此之暴今重圍雖解逋冦尚存裂土假王者四兇滔天濳帝者二豎又有顧瞻懐貳叛渙黨姦其流實繁不可悉數皇輿未復國炳未歸勞者未獲休功者未獲賞困窮者未暇恤滯抑者未克申將欲紓多難而收羣心唯在赦令誠言而已安危所屬其可忽諸動人以言所感已淺言又不切人誰肯懐昔成湯遇災禱於桑野躬自髠剔以為犧牲古人所謂割髪宜及膚翦瓜宜侵體良以誠不至者物不感損不極者益不臻今兹徳音亦類於是悔過之意不得不深引咎之辭不得不盡招延不可以不廣潤澤不可以不𢎞宣暢鬱堙不可不洞開襟抱洗刷疵垢不可不盪去瘢痕使天下之廓然一變若披重昏而覩朗曜人人得其所欲則何有不從者乎應須改革事條謹具别狀同進除此之外尚有所虞竊以知過非難改過為難言善非難行善為難假使赦文至精止於知過言善猶願聖慮更思所難易曰聖人感人心而天下和平夫感者誠發於心而形之於事事或未諭故宣之以言言必顧心心必副事三者符同不相越踰本於至誠乃可求感事或未致不如勿言一虧其誠終莫能信伏願陛下先斷厥志乃施於辭度其可行而宣之其不可而措之無苟其言以重其悔言克誠而人心必感人心既感而天下必平事何可不詳亦何可不務罄輸衷懇伏聽聖裁謹進請許臺省長官舉薦屬吏狀今月日顧少連延英對廽奉密㫖卿先奏令臺省長官各舉薦吏近聞外議云諸司所舉皆有情故兼受賄賂不得實才此法甚非穏便已後除改卿宜自揀擇不得信任諸司者臣以闇劣謬當大任果遭官謗上貽聖憂過䝉恩私曲降慈誨感戴循省寢興不寧縁是密㫖特宣不敢對衆陳謝祗禀成命所宜必行恭惟聖規又合無隠苟有未逹安敢勿言雖知塵情固不可已夫理道之急在於得人而知人之難聖哲所病聽其言則未保其行求其行則或遺其才校勞考則巧偽繁興而直方之人罕進徇聲華則趨競彌長而沈退之士莫升自必素與交親備詳本末探其志行閲其器能然後守道藏用者可得而知沽名飾貎者不容其偽故孔子曰視其所以觀其所由察其所安人焉廋哉夫欲觀視而察之非一朝一夕之所能也是以前代有鄉閭舉薦之法長吏辟署之制所以明歴試廣旁求敦行能息馳騖也昔周以伯冏為太僕命之曰慎簡乃寮罔以巧言令色便辟側媚其惟吉士是則古之王朝俱命其大官大官得自簡寮屬之明騐也漢朝務求多士其選不惟公府辟召而已又有父任兄任皆得為郎選入之初雜居三署臺官闕即用補之是則古之郎官皆以任選此其明騐也魏晉已後暨於國初探擇庶官多由選部惟髙位重職考庶官之有成者請而命焉故晉代山濤為吏部尚書中外員品多所咨授宋朝以蔡廓為吏部尚書廓先使人謂宰相徐羡之曰若得行吏部之職則拜不然則否羡之荅云黄散已下悉以委之廓猶憤恚以為失職遂不之官是則黄門散騎侍郎皆由吏部選授不必朝廷列位盡合簡在台司此其明騐也國朝之制庶官五品已上制敕命之六品以下則並㫖授制敕所命者盖吏部銓材署職除拜之也㫖授者盖吏部銓材署職然後上言詔㫖但畫聞以從之而不可否者也開元中吏部注擬選人奏置循資格自起居遺補及御史等官猶並列於選曹銓綜之例著在格令至今不刋未聞常叅之官悉委宰臣揀擇此又近事之明騐也其後舊典失序倖臣専朝捨僉議而重已權廢公舉而行私恵是使周行庶品苟不出時宰之意者則進莫致焉任衆之道益微進善之途漸隘近者每須任使常苦乏人臨事選求動淹旬朔始務應用難盡當才豈不以薦舉凌遲人物衰少居常則求精太過有急則備位不充欲令庶績咸熈固亦難矣臣實駑頑一無所堪猥䝉任使待罪宰相雖懐竊位之懼且乏知人之明自揣庸虚終難上報唯知廣求才之路使賢者各以彚征啓至公之門令職司皆得自達臣當謹守法度考課百官奉揚聰明信賞必罰庶乎人無滯用朝不乏才以此為酬恩之資以此為致理之具爰初授命即以上陳求賢審官粗立朝制凡是百司之長兼副貳等官及兩省供奉之職并因察舉勞效須加奨任者並宰臣叙議以聞其餘臺省屬僚請委長官擇選指陳才實以狀上言一經薦揚終身保任各於除書之内具標舉授之由示衆以公明彰得失得賢則進考増柣失實則奪俸贖金亟得則褒升亟失則黜免非止搜揚下位亦可閲試大官前志所謂達觀其所舉即此義也自䝉允許即以宣行南宫舉人纔至十數或非臺省舊吏則是使府佐僚累經薦延多歴事任議其資望既不愧於班行考其行能又未聞其闕敗而議者遽以謄口上煩聖聦道之難行亦可知矣陛下勤求理道務徇物情因為舉薦非宜復委宰臣簡擇其為崇任輔弼慱探輿詞可謂聖徳之盛者也然於委任責成之道聽言考實之方閑邪存誠猶恐有闕所謂委任責成者特立其事先擇其人既得其人慎謀其始既得其始詳慮其終始終之間事必前定有疑則勿果於用既用則不復有疑待終其謀乃考其事事愆於素者革其弊而黜其人事叶於初者賞其人而成其美使受賞者無所與讓見黜者莫得為辭夫如是則若無其人孰敢當任責成無為而致理之道也所謂聽言廣納𢎞接下之規明目達聦廣濟人之道欲知事之得失不可不聽之於言欲辨言之真虚不可不考之於實言事之得者勿即謂是必原其所得之由言事之失者勿即謂非必窮其所失之理稱人之善者必詳徴行善之跡論人之惡者必公辨為惡之端凡聽其言皆責其實既得其實又察以情既盡其情復稽於衆衆議情實必參相得然後信其説奨其誠如或矯誣亦寘明罰夫如是則言者不壅聽者不勞無浮妄亂教之談無隂邪傷善之説無輕信見欺之失無潛搆不辨之寃此古聖王聽言考實不出戸而知天下之方也陛下既納臣言而用之旋聞横議而止之於臣謀不責成横議不考實此乃謀失者得以辭其罪議曲者得以肆其誣率是以行觸類而長固無必定之計亦無必實之言計不定則理道難成言不實則小人得志國家所病恒必由之昔齊桓公將啓覇圖問管仲以害覇之事管仲對曰得賢不能任害覇也任賢不能固害覇也固而不能終害覇也與賢人謀事而與小人議之害霸也所謂小人者不必悉懐險詖敗覆邦家盖以其意性險邪趣尚狹㹱以沮議為出衆以自異為不羣趨近利而昧逺圗效小信而傷大道故論語曰言必信行必果硜硜然小人也夫以能信於言能果於行唯以硜硜淺近不克𢎞通宣尼猶謂其小人管仲尚憂其害覇况又有言行難保而恣其非心者乎此皆任不責成言不考實之弊也聖㫖以為外議云諸司所舉皆有情故兼受賄賂不得實才者臣請陛下當使所言之人悉陳所犯之狀其人受賄其舉有情陛下然後以事質於臣臣復以事考於舉主若便首伏則據罪施刑如或有辭則付法閲實謬舉者必行其罰誣善者亦反其辜自然憲典克明邪慝不作懲一阻百理之善經何必貸其姦贓不加辨詰私其公議不出主名使無辜見疑有罪獲縱枉直同貫人何頼焉聖㫖又以官長舉人法非穏便令臣並自揀擇不可信任諸司者伏以宰輔常制不過數人人之所知固有限極必不能徧諳諸士備閲羣才若令悉命羣官理須展轉詢訪是則變公舉為私薦易明敭以暗投儻如議者之言所舉多有親故舉於君上且未絶私薦於宰臣豈肯無詐失人之弊必又甚焉所以承前命宜罕有不渉私謗雖則秉鈞不一或有行情亦有私訪所親轉為所賣其弊非逺聖鑒明知今又將徇浮言専任宰臣除吏宰臣不徧諳識踵前須訪於人若訪於親朋則是悔其覆車不易前轍之失也若訪於朝列則是求其私薦必不如公舉之愈也二者利害惟陛下更詳擇焉恐不如復委長官慎簡寮屬所簡既少所求亦精得賢有鑒識之名失實當暗謬之責人之常性莫不愛身况於臺省長官皆是當朝髙選孰肯徇私妄動以傷名取責者乎所謂臺省長官即僕射尚書左右丞侍郎及御史大夫中丞是也陛下比擇輔相多亦不出具中今之宰相則徃日臺省長官也今之臺省長官乃將來之宰臣也但是職名暫異固非行舉頓殊豈有為長官時則不能舉一二屬吏居宰臣位則可委擇千百具寮物議悠悠其惑斯甚聖人制事必度物宜無求備於一人無責人以不逮尊者領其要卑者任其詳是以人主擇輔臣輔臣擇庶官庶官擇佐寮所任愈崇故所擇愈少所試漸下故所舉漸輕進不失倫選不失類以類則深知實行有倫則杜絶徼求將務求人無易於是故選自卑逺始昇於朝者各委長吏任舉之則下無遺賢矣寘於周行既任以事者於是宰臣叙進之則朝無曠職矣才徳兼茂歴試不渝者然後人主倚任之則海内無遺士矣夫求才貴廣考課貴精求廣在於各舉所知長吏之薦擇是也考精在於按名責實宰臣之叙進是也求不廣則下位罕進下位罕進則用常乏人用常乏人則懼曠庶官懼曠庶官則苟取備員是以考課之法不暇精也考不精則能否無别能否無别則砥礪漸衰砥礪漸衰則職業不舉職業不舉則品格寖微是以賢能之功不克彰也皆失於不廣求人之道而務選士之精不思考課之行而望得人之美是以望得彌失務精益麤塞源浚流未見其可臣欲詳徴舊説伏恐聽覽為煩粗舉一端以明其理徃者則天太后踐祚臨朝欲收人心尤務㧞擢𢎞委任之意開汲引之門進用不疑求訪無倦非但人得薦士亦得自舉其才所薦必行所舉輙試其於選士之道豈不傷容易哉然而課責既嚴進退皆速不肖者旋黜才能者驟升是以當代謂知人之明累朝頼多士之用此乃近於求才貴廣考課貴精之效也陛下誕膺寳歴思致理平雖好賢之心有踰前哲而得人之盛未逮徃時盖由鑒賞獨任於聖聦搜擇頗難於公舉但啓詳延之路罕施練覈之方逺使先進者漸益凋訛後來者不相接續施一令則謗沮互起用一人則瘡痏立成此乃失於選才太精制法不一之患也則天舉用之法傷易而得人陛下慎簡之規太精而失士是知雖易於舉用而不易於苟容則所易者適足廣得人之資不為害也不精於法制而務精於選才則所精者適足梗進賢之途不為利也人之才行自昔罕全苟有所長必有所短若録長補短則天下無不用之人責短捨長則天下無不棄之士加以情有憎愛趣有異同假使聖如伊周賢如楊墨求諸物議孰免譏嫌昔子貢問於孔子曰鄉人皆好之如何子曰未可也鄉人皆惡之如何子曰未可也不如鄉人之善者好之其不善者惡之盖以君子小人意必相反其在小人之惡君子亦如君子之惡小人將察其情在審其聽聽君子則小人道廢聽小人則君子道消今陛下慎選宰臣必以為重於庶品精擇長吏必以為愈於未流及至宰臣獻規長吏薦士陛下則但納横議不稽始謀是乃任以重者輕其言待以輕者重其事且又不辨所毁之虛實不校所議之短長人之多言一至于是將使人無所措其手足豈獨選任之道失其端而已乎臣之公言固非為已所惜者致理之道所感者見遇之恩輙因陳謝布露以聞惟陛下幸察之謹奏請不置瓊林大盈二庫狀右臣聞作法於涼其弊猶貪作法於貪弊將安救示人以義其患猶私示人以私患必難弭故聖人之立教也賤貨而尊讓逺利而尚亷天子不問有無諸侯不言多少百乘之室不畜聚歛之臣夫豈能忘其欲賄之心哉誠懼賄之生人心而開禍端傷風教而亂邦家爾是以務鳩歛而厚其帑櫝之積者匹夫之富也務散發而收其兆庶之心者天子之富也天子所作與天地同生之長之而不恃其為成之敗之而不私其有付物以道混然忘情取不為貪散不為廢以言乎體則慱大以言乎術則精微亦何必撓廢公方崇聚私貨降至尊而代有司之守辱萬乗以效匹夫之藏虧法失人誘姦聚怨以斯制事豈不過哉今瓊林大盈自古悉無其制傳諸耆舊之説皆云創自開元貴臣貪權飾巧求媚乃言郡邑貢賦所用盍各區分賦税當委之有司以給經用貢獻宜歸於天子以奉私求𤣥宗悦之新是二庫蕩心侈欲萌蔕於兹迨乎失邦終以餌冦禮曰貨悖而入者亦悖而出豈其明效歟陛下嗣位之初務遵理道敦行約儉斥逺貪饕雖内庫舊藏未歸太府而諸方曲獻不入禁闈清風肅然海内丕變議者咸謂漢文郤馬晉武焚裘之事復見於當今矣近以冦逆亂常鑾輿外幸既屬憂危之運宜増儆勵之誠臣昨奉使軍營出由行殿忽覩右廊之下牓列二庫之名矍然自驚不識所以何則天衢尚梗師旅方殷瘡痛呻吟之聲噢咻未息辛勤守戰之效當賚未行而諸道貢珍遽私别庫萬目所視孰能忘懐竊揣軍情或生觖望試詢候館之吏兼採道路之言果如所虞積憾已甚或忿形謗讟或醜肆謳謡頗含思亂之情亦有悔忠之意是知甿俗昏鄙識昧髙卑不可以尊極臨而可以誠義感頃者六師初降百物無儲外扞兇徒内防危堞晝夜不息迨將五旬凍餒交侵死傷相枕畢命同力竟夷大艱良以陛下不厚其身不私其欲絶甘以同卒伍輟食以㗖功勞無猛制而人不攜懐所感也無厚賞而人不怨悉所無也今者攻圍已解衣食已豐而謡讟方興軍情稍沮豈不以勇夫恒性嗜貨矜功其患難既與之同憂而好樂不與之同利苟異恬黙能無怨咨此理之常固不足怪記曰財散則民聚豈其殷鑑歟衆怒難任蓄怨終洩其患豈徒人散而已亦將慮有搆姦鼔亂干紀而強取者焉夫國家作事以公共為心者人必樂而從之以私奉為心者人必咈而叛之故燕昭築金臺天下稱其賢殷紂作玉杯百代傳其惡盖為人與為已殊也周文之囿百里時患其尚小齊宣之囿四十里時病其太大盖同利與專利異也辨察兹里洒濯其心奉三無私以一有衆人或不率於是用刑然則宣其利而禁其私天子所恃以理天下之具也捨此不務而壅利行私欲人無貪不可得已今兹二庫珍幣所歸不領度支是行私也不給經費非宣利也物情離怨不亦宜乎智者因危而建安明者矯失而成得以陛下天資英聖儻加之見善必遷是將化蓄怨為銜恩反過差為至當促殄遺孽永垂鴻名易如轉規指顧可致然事有未可知者但在陛下能行與否爾能則安否則危能則成徳否則失道此乃必定之理也願陛下慎之惜之陛下誠能近想重圍之殷憂追戒平居之専欲器用取給不在過豐衣食所安必以分下凡在二庫貨賄盡令出賜有功坦然布懐與衆同欲是後納貢必歸有司每獲珍華先給軍賞瑰異纎麗一無上供推赤心於其腹中降殊恩於其望外將卒慕陛下以必信之賞人思建功兆庶悦陛下改過之誠孰不歸徳如此則亂必靖賊必平徐駕六龍旋復都邑興行墜典揔緝棼綱乘輿有舊儀郡國有恒賦天子之貴豈當憂貧是乃散其小儲而成其大儲也損其小寳而固其大寳也舉一事而衆美具行之又何疑焉恡小失多亷賈不處溺近迷逺中人所非况乎大聖應機固當不俟終日不勝管窺願效之至謹陳冐以聞謹奏初收城論詔渾瑊取裹頭内人等狀右徳亮承㫖所録散失内人名字令臣撰詔書與渾瑊遣於奉天尋訪以得為限仍量與資裝速送赴行在者頃以理道乖錯禍亂荐鍾陛下思咎懼災憂人罪已屢降大號誓將更變天下之人垂涕相賀懲憤釋怨煦仁戴明畢力同心共平多難止土崩於絶岸收版蕩於横流殄寇清都不失舊物實由陛下至誠動於天地深悔感於人神故得百靈降康兆庶歸徳苟不如此自古何嘗有擲棄宫闕失守宗祧繼逆於赴難之師再遷於䝉塵之日不踰半嵗而復興大業者乎今渠魁始平法駕將返近自畿甸逺周寰瀛再役疲瘵之甿重傷殘廢之卒皆忍死扶病傾耳竦肩願聞徳聲翹望聖澤陛下固當感上天悔禍之眷荷列祖垂裕之休念將士鋒刄之殃愍黎元塗炭之酷以致寇為戒以居上為危以務理為憂以復言為急損之又損尚懼汰侈之易滋艱之惟艱猶患戒慎之難久謀始盡善克終已稀始而不謀終則何有夫以内人為號盖是中壼末流天子之尊富有宫掖如此等輩寔繁有徒但恐傷多豈憂乏使翦除元惡曽未浹辰奔賀徃來道路如織何必自虧君徳首訪婦人又令資裝送赴行在萬目閲視衆口流傳恐非所以荅慶賴之心副惟新之望也夫事有先後義有重輕重者宜務之於先輕者宜措之於後故武王克殷有未及下車而為之者有下車而為之者盖美其不失先後之宜也自翠華播越萬姓靡依清廟震驚三時乏祀當今所務莫大於斯誠宜速遣大臣馳傳先徃奉迎神主修整郊壇展禋享之儀申告謝之意然後弔恤死義慰犒有功綏緝黎蒸優問耆耋安定反側寛宥脅從宣暢鬰堙褒奨忠直官失職之士復廢業之人是皆宜先不可後也至如崇飾服器繕緝殿臺掄耳目之娯選巾櫛之侍是皆宜後不可先也宜後而先則為君之道喪宜先而後則理國之義差古之興王必慎於此陛下將務興復又可不慎乎且散失内人已經數月既當離變之之際必為將卒所私其人若稍有知必當自來陳獻其人若甚無識求之適使憂虞自因冦亂喪亡頗有大於此者一聞搜索懐懼必多餘孼尚繁羣情未一因而善撫猶恐危疑若又懼之于何不有昔人所以捨絶纓而飲盗馬者豈必忘其情愛邪盖知君之大體然也以小妨大明者不為天下固多美人何必獨在於此易曰危者安其位者也亂者有其理者也故君子安不忘危治不忘亂是以身安而國家可保也春秋傳曰或多難以固其國或無難以喪其邦誠以處危則思安之情切遭亂則求理之志深切於思安深於求理國之固也不亦宜乎及夫居安而矯恃理而怠驕則縱肆其奢欲怠則厭惡於忠言奢欲日行忠言日梗國之喪也不亦宜乎昔衛獻出奔久而復國大夫迎於境者執其手而與之言迎於門者頷之而已言其驕怠之易生也齊桓將圗覇功管仲戒之以禮無忘於在莒懼其情志之易變也今臣亦願陛下企思危固國如不及懲忘亂喪國如探湯以在莒為書紳之規以衰衛為覆車之鑑則徳為帝範理致時雍與夫貪逸欲而踐禍機其利害亦云逺矣所令撰賜渾瑊詔未敢承㫖伏候聖裁謹奏駕幸梁州在路論百姓進瓜果請賜帛不與官第一狀右欽溆奉宣聖㫖自發洋州以來累路百姓進獻果子胡瓜等雖甚微細且有此心今擬各與散試官卿宜商量得否者伏以爵位者天下公噐而國之大柄也唯功勲才徳所宜處之非此二途不在賞典恒宜慎惜理不可輕苟輕用之是壊其公噐而失其大柄也噐壊則人將不重柄失則國無所持起端雖微流弊必大沿路所獻瓜果盖是野人微情有之不足光聖猷無之不足虧至化量必錢帛為賜足彰行幸之恩因饋酬官恐非令典謹奏第二狀右欽溆齎中書所與進瓜果人擬官狀示臣仍奉宣聖㫖朕所到處欲得人心喜歡試官虚名無損於事宰臣已下商量進擬與亦無妨臣愚以為信賞必罰覇王之資輕罰䙝刑衰亂之漸信賞任功無不報必罰在罪無不懲非功而獲爵則爵輕非罪而肆刑則刑䙝爵賞刑罰國之大綱一綱或棼萬目皆㢮雖有善理末如之何天寶季年嬖倖傾國爵以情授賞以寵加天下蕩然紀綱始紊逆羯乘釁遂亂中原防戍歳増䇿勲日廣財賦不足以供賜而職官之賞興焉職員不足以容功而散試之號行焉青朱雜沓於胥徒金紫普施於輿皁薰蕕無辨涇渭不分二紀于兹莫之能整當今之病方在爵輕設法貴之猶恐不重若又自棄將何勸人聖㫖以為試官虚名無損於是臣伏恐陛下思之未熟偶有是言儻或謂之信然臣竊以為過矣失立國之道惟義與權誘人之方惟名與利名近虛而於教為重利近實而於徳為輕凡所以裁是非立法制者則存乎其義至於叅虚實揣輕重並行而不傷迭用而不悖因衆之欲度時之宜消息盈虚使人不倦者則存乎權専實利而不濟之以虚名則耗匱而物力不給専虚名而不副之以實利則誕漫而人情不趨故國家之制賞典錫貨財賦秩廪所以彰實也差品則異章服所以飾虛也居上者必明其義逹其變相須以為表裏使人日用而不知則為國家之權得矣謹按命秩之載于甲令者有職事官焉有散官焉有勲官焉有爵號焉雖同其類而分其流有四然其掌務而受俸者唯繋於職事之一官以序才能以位賢徳此所謂施實利而寓之虚名者也其勲散爵號無有所繋大抵止於服色資䕃而已以馭崇貴以甄功勞此謂假虛名以佐實利者也虛實交相養故人不凟賞輕重互相制故國不廢權今之員外試官頗同勲散爵號雖則授無費禄受不占員然突銛鋒排患難者則以是賞之竭筋力展勤勞者又是以酬之其為用也可謂重矣今或捧瓜一噐挈果一盛亦授試官以酬所獻則彼突銛鋒而竭筋力者必相謂曰吾以忘軀命而獲官此以進瓜果而獲官是乃國家以吾之軀命同於瓜果矣視人如草木誰復為用哉且員外試官無俸禄之資無管攝之柄無見敬之貴無免役之優唯假空名以籠浮俗俗所以若存若亡而未甚厭棄者徒以上之所惜爾今陛下若又輕用之以為無損於事人悟斯㫖復何賴焉後之立功曷用為賞陛下若欲賞之以職事則官員有限而勲閥無窮固不勝其用矣陛下欲賞之以貨財則人力已殚而帑藏皆匱固不充其費矣既未有實利以敦勸乂不重虚名而濫施人無藉焉何以為國且植𤓰樹果多是野人貪者所資惟在衣食假以冗號亦奚用為必欲使之歡欣不如厚賞錢帛人不失利國不失權各得所宜兩全其寶何為不可固傷大猷願留睿思少賜詳度唐文粹巻二十九欽定四庫全書唐文粹卷三十上宋姚鉉編
