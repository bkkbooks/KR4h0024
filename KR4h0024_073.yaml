body:
  text: 吳興姚鉉纂記丙𫐠附㧾一十二首府署鄆州刺史廳壁記馬揔湖州刺史廳壁記顧况吉州刺史廳壁記皇甫湜道州刺史廳壁記元結道州刺史廳後記吕溫濠州刺史劉公善政述附盧子駿池州重建大廳記竇潏淮南節度行軍司馬廳壁記李翰徐濠泗三州節度掌書記廳壁記韓愈江州司馬廳壁記白居易吉州廬陵縣令廳壁記皇甫湜同州韓城縣西尉廳壁記歐陽詹鄆州刺史廳壁記馬揔唐受天修命用古道理仁覆德載與二侔大弘煦丕冒與三並曜繼明嗣睿萬葉其始于十一聖聖謨熙載千祀其初于十四歲歲二月丁巳平巨寇復齊魯地三月巳丑乃命臣揔授節分閫撫安餘衆且理于鄆而觀察曹濮故荷皇澤來濯汙俗人既沭浴咸以潔清物無夭傷各遂性命不化化不楙楙感聖德也豈待守臣施諸政術而革訛止謬乎于以見周公太公之遺風仲尼之禮教有所不泯者焉何以言之先是元凶事猶未順惟此邦衆尚或率從及顯逆謀多不為用其所寵任皆亡命之徒與皂隸耳故義聲一呼厥衆咸應乃知斯人可與為順不可與為逆此其明驗歟夫州郡廳事之有壁記雖非古制而行之巳久其所紀者不唯備遷授書名氏將以彰善識惡而勸戒存焉其土風物冝前政往績不俟咨耆訪耋搜籍索圖一升斯堂皆可辨諭原兹邦域其來逺矣曰太昊之墟曰魯之須句曰漢之東平曰今之鄆州其地一也武德中為㧾管府亦為都督府而蔣曹戴濮兖五州隸焉貞觀初廢府復為州八年始自鄆城移於是就高爽也自逆帥攘據罔率訓典改易升降名稱溷淆蓋無取焉今以平寇之𥘉魏博田公奉詔權兼勾當則位同正抆冝書為首亦春秋始魯隱公賢之也其國初巳來刺史名氏及遷改之次既遭蔑棄難以究詳訪諸史官異日備于東壁時聖曆元和紀號己亥直歲十二月巳卯檢校禮部尚書兼鄆州刺史御史大夫馬揔記湖州刺史廳壁記顧況江表大郡吳興為一夏屬楊州秦屬會稽漢屬吳郡吳為吳興郡其野星紀其藪具區其貢橘柚纎縞茶紵其英靈所誕山澤所過舟車所會物土所産雄於楚越雖臨淄之冨不若也其冠簮之盛漢晉巳來敵天下三分之一其刺史沿革不同或稱太守或稱內史或稱都督他州或否如魯史晉乘侯牧一也其鴻名大德在晉則顧府君祕祕子衆陸玩陸納謝安謝萬王羲之坦之獻之在宋則謝莊張永褚彥回在齊則王僧虔在梁則栁惲張謖在陳則吳明徹在隋則李德林國朝則周擇從令聞也顔魯公忠烈也袁給事高讜正也劉貟外全白文翰也洎于頔大夫作塘貯水溉田三千頃今使君辭也唐景皇帝七代之孫先公尚書先公大夫奕葉之勳有功於民公實嗣之孔悝銘鼎天下重器天王褒拔于公襄陽節度李公陟當道觀察統諸道鹽鐡轉運二牧既陟惟公盤桓鴻鵠不飛飛即摩漢其逋者復其危者安其憂者泰所謂善緝於是拓郛耰萊就便除害政之餘力作消暑樓於南端復亭署於白蘋洲聿興廢土光明敞豁湧出溪谷其舊記吏部李侍郎紓撰其圖經竟陵陸鴻漸撰使君命況揔兩家之説俶落晉宋訖于我唐凡一百九十七人及歷代良二千石儀形略也鋪張屋壁設作存歡竦神告民春秋不朽之義也貞元十有五年十二月哉生魄華陽山顧況述吉州刺史廳壁記皇甫湜自江而南吉為富州民朋吏嚚分土艱政蓋以近歲適兹不幸紹繼無狀大官以降為者羞薄而不省務子弟以資授者侵欲而不顧法州遂瘡痍御史中丞張公歷刺縉雲尋陽用淸白端正之治詔書寵褒賜以金紫移蒞于吉下車之初視簿書簿書棼如絲視胥吏胥吏沸如麋召詰其官皆眊然如酲登進其民皆􅒒然而疲公噫眙良久於是大新其典為之開之以修省簡便鍵之以勤強練密凡事從宜處約以躬率之省費一倍法防既周銖兩之姦無所容墨俗斯息單民得職威令神行惠利川流未及再期庶富而教至於無事百姓扶老提稚載路而歌曰昔吏􅑲􅑲今更簷簷公能馭之雄亦為銛跖亦為廉始紲而若終優以恬昔民嗷嗷今民咍咍公能撫之鰥寡有怡流亡既來徭稅先具汚茨盡開嚮覆官倉倉無斗糧公來幾時積粟埋梁嚮閲官庫庫無尺繒公來幾時山積層層瑞露溶溶降味公松瑞蓮猗猗合蒂公池公有異政神之祚之民歌路陲兾聞京師天子明聖恩光逺而於是掾吏將卒趨伏固請願書于公堂之北壁夫堂壁有記本以志善悛惡名氏遷次末也矧東西之舊則備今用絶編以首能為政垂為後式道州刺史廳壁記元結天下太平方千里之內生植齒類刺史能存亡休戚之天下兵興方千里之內能保黎庶能攘患難在刺史耳凡刺史若無文武才略若不清廉肅下若不明惠公直則一州生類皆受其害於戲自至此州見井邑丘墟生民幾盡試問其故不覺涕下前政刺史或有貪猥惛弱不分是非但以衣服飮食為事數年之間蒼生蒙以私欲侵奪兼之公家驅迫非姦惡疆富殆無存者問之耆老前後刺史能恤養貧弱專守法令有徐公履道李公廙而巳遍問諸公善或不及徐李二公惡有不堪説者故為此記與刺史作戒自置州巳來諸公改授遵絀年月則舊記存焉道州刺史廳後記吕溫壁記非古也若冠綬命秩之差則有格令在山川風物之辨則有圖牒在所以為之記者豈不欲述理道列賢不肖以訓于後庶中人巳上得化其心焉代之作者率異於是或誇學名數或務攻為文居官而自記者則媚巳不居其官而代人記者則媚人春秋之旨蓋委地矣賢二千石河南元結字次山自作道州刺史廳記既彰善而不黨亦指惡而不誣直舉胸臆用為鑒戒昭昭吏師長在屋壁後之貪虐放肆以生人為戲者獨不愧於心乎豫自幼時讀古循吏傳慕其為人以為士大夫立名於代無以高此前年冬由尚書刑部郎中出為此州雖履劇自課而未能逮其意也往刺史有許子良者輒移元次山記於北牖下而以其文代之後亦有時號君子之清者蒞此孰視焉而莫之改豈是其難乎豫也魯安知乎他即命圬而書之俾復其舊且為後記以廣次山之志云濠州刺史劉公善政述盧子駿客有自濠梁來者途訊之曰濠梁之政何如客曰今刺史彭城劉公始受命至徐方與廉使約曰詔條節度團練兵鎮巡內州者悉以隸州今濠州未如詔條請如詔條廉使多稱軍須卒迫徴科若千不如期以軍法從事皆兩稅勑額外也自今請非詔勑不徴廉使曰諾濠州每年率供武寧軍將士糧一十萬石斗取耗一升送廉使州自取一升給他費吏因緣而姦盜則三倍矣自今請準倉部式外不入廉使曰諾劉公至止堅守不渝由是州無他門賦無橫斂人一知教熙熙然如登春臺矣濠在戰國時為楚地天文記今在牛斗分野楚俗好巫而信鬼死者其親戚不敢穿斸事葬相傳立小屋號曰殯宫焉雖在城郭而為之有土木隳蠹棺櫬巋然者有棺櫬分圻骸骨縱橫者不獨庶人而士大夫之家有焉劉公惻然曰非禮也吾忍不導之邪下令曰某月有限限畢其家不闕地葬者笞二十鰥寡􅑏獨力不任者絶嗣無主傍無近親者刺史以俸錢為營之訖事人無犯令野無殯宫焉盧子曰異乎哉劉公今日能以禮導邦人且夫葬者藏也欲人之不得見也奈何宿昔濠之人不藏其父子昆弟邪又曰生事之以禮死葬之以禮奈何宿昔濠之人不以禮葬其父子昆弟邪又曰延陵季子葬其子仲尼觀之曰其坎深不至於泉其斂以時服奈何宿昔濠之人喪其父子昆弟不葬子於土中邪又曰魂氣歸于天形魄歸于地奈何宿昔濠之人不歸其父子昆弟之形于地邪劉公教生者以禮示之日月信也恤死者以仁除其暴露義也合此而智以成之難乎哉余耳得客之言不浹旬適至濠上自覩其事秉筆者不載余懼夫識者譏焉劉公治郡嘉績長美詳舉則繁也亦取大遺小之義耳其書以備太史氏采録焉池州重建大廳壁記竇潏氓巢虐池之二年潏自平原郡得此郡其始至也無屋宇城壁之事無市井人物之類瓦骼凹亞相甃雜視一之月檢訪鄉籍二之月完聚瘡痍三四月後病者起亡者歸瓦者投骼者掩明年春夏熟冬熟其歸者起者有風雨之備而江盜未息天租無寄故郡人有廨宇城壁之請既城壁焉則人得以避寇既廨署焉則物得以營帑鼓角器械廳堂詹廡自濠塹周于四隅其間合建置者一無所闕木端鐡橫分别出入於戲自永泰至乾符戊戌歲是城也以李僕射為祖自乾符至于中和癸卯歲是城也潏不敢讓勞其基趾始末存韓刺史裴晉公語中鑾輿幸蜀之四年冬是年王師始克宫闕記淮南節度行軍司馬廳壁記李翰司馬蓋玄武之官號周官大司馬掌王之六軍將皆命卿諸侯大國三軍次國二軍小國一軍將亦命卿軍有司馬見于古矣周衰惟晉秉禮尊主屢因大搜以正三軍鄢鞍之役韓厥為司馬雞澤之會魏絳為司馬絳將新軍張老代之蓋今之行軍司馬出於周制矣秦罷侯鑠天下之兵列郡不復有軍軍司馬繇此廢矣漢制將軍不常置四夷背誕則命將征之趙充國以軍司馬從二師班超以軍司馬從寶固討虜皆其職也自魏至周南北分王建置不同時方戰爭衆軍恆設凡將軍杖節鎮仍開府者以將軍開府居刺史者皆有其官隨將廢置隋開皇混一天下省罷衆軍司馬之官不專武事廢為州吏貟矣國家修唐虞大同之化庭周漢不賔之俗邊雖有防示不久設軍出於內謂之將鎮於外謂之使佐其職者謂之行軍司馬行軍司馬之職弼戎政掌武事居常習搜狩之禮有役申戰陳之法凡軍之攻戰之備列于器械者辨其賢良凡軍之材食之用頒于卒乘者均其賜豫合其軍書契之要比其軍符籍之伍賞罰得議號令得聞三軍以之聲氣行之哉雖主武蓋文之職也舊制朱衣銅印墨綬開元故事多選臺郎為之淮南節度行軍司馬尚書戶部郎中兼侍御史王公以經邦緯俗之才佐淮夷方面之寄敦詩閲禮之學當節府大賢之舉政協乎邦要慮通乎事微奉中權之旗鼓戒羣帥之鐃鐲師律既和軍容丕肅淮南之府有功宣王室身佩侯印將門良家藩國貴種以禮綏之則恭淮南之衆有吳楚鋭士燕韓徑卒竒材劒客援臂虬鬚以恩撫之則順淮南之地隄封千里徴令百役稅以足食賦以足兵以寬征之則安淮南之衝南走閩越北通幽朔關梁不閉朝聘相望以歡交之則固自韋公統戎旅王公翼戎行威加於大則將不驕惠及於細則卒不惰減役輕斂則人不困待賔省禮則境不危堂堂然混一體以為力雄雄然鼓衆心以為氣封疆之外隱如敵國封疆之內不知有軍古人云懸勢於上而下自定置器於平而物自安者蓋用是也兹所謂銷患於未形制危於未萌伐謀之功大於積甲山齊攻心之術強於虎賁百萬彼善師不陳未戰先勝却軍於談笑之際折衝於樽爼之間今古一時也夫舉善人以行其教大則四海服小則邦國寧舜舉臯陶蠻夷率職帝王之事也秦任百里奚巴戎致貢諸侯之舉也國僑為政乃子皮之功晉侯勤王信魏絳之力任賢用善合契同德盛府有焉翰獲庇於有禮之俗遂安於無虞之境書績示後豈待命乎楊州本大都督府親王居中長史理人有府號而無兵甲至德初羯胡難作始以長史為節度而有行軍司馬古者敬其事則命以始乃自𥘉置列之于壁云大曆五祀夏五月丁丑記徐泗濠三州節度掌書記廳石記韓愈書記之任亦難矣元戎揔齊三軍之事統理所部之氓以鎮定邦國贊天子施教化而又外以與賔客四鄰交其朝覲聘問慰薦祭祀祈祝之文與所部之政下三軍之號令升黜凡文辭之事皆出書記非閎辨通敏兼人之才莫冝居之然皆元戎自辟然後命於天子茍其帥之不文則其所辟或不當亦其理宜也南陽公自御史大夫豪壽廬三州觀察使授節移鎮徐州歷十二年而掌記者凡三人其一人曰髙陽許孟容入仕于王朝今為尚書禮部郎中其一人曰京兆杜兼今為尚書禮部貟外郎觀察判官其一人曰隴西李博自前鄉貢進士授祕書省校書郎方為之南陽公文章稱天下其所辟實所謂閎辨通敏兼人之材者也後之人苟未知南陽公之文章吾請觀於三君子苟未知三君子之文章吾請觀於南陽公可知矣蔚乎其相扶炳乎其相輝志同而氣合魚川伏而鳥雲飛也愈樂是賔主之相得也故請刻石以紀而陷置于壁間來者得以觀覽焉江州司馬廳記白居易自武德巳來庶官以便冝制事大攝小重侵輕郡守之職㧾於諸侯帥郡佐之職移於部從事故自五大都督府至于上中下郡司馬之事盡去唯貟與俸在凡內外文武官左遷右移者第居之凡執役事上與給事於省寺軍府者遙署之凡仕久資髙耄昏軟弱不任事而時不忍棄者實蒞之蒞之者進不課其能退不殿其不能才不才一也若有人蓄器貯用急於兼濟者居之雖一日不樂若有人養志忘名安於獨善者處之雖終身無悶官不官繫乎時也適不適在乎人也江州左匡盧右江湖土髙氣淸冨有佳境刺史守土臣不可逺觀遊羣吏執事官不敢自暇佚惟司馬綽綽可從容於山水詩酒間由是郡南樓山北樓水湓亭百花亭風篁石巖瀑布廬宫源潭洞東西二林寺泉石松雪司馬盡有之矣茍有志於吏隱者捨此官何求焉按唐典上州司馬秩五品歲廪數百石月俸六七萬官足以庇身食足以給家州民康非司馬功郡政壞非司馬罪無言責無事憂噫為國謀則尸素之尤蠧者為身謀則祿仕之優穩者余佐是郡行四年矣其心休休如一日二日何哉識時知命而巳又安知後之司馬不有與吾同志者乎因書所得以告來者時元和十三年七月八日題記吉州廬陵縣令廳壁記皇甫湜在易之爻二與四同功其善不同二多譽四多懼四之多懼以近君也今州之近縣當刺史理所其難為與支縣相百冝矣哉盧陵戶餘二萬有地三百餘里駢山貫江扼嶺之衝材竹鐡石之贍殖苞篚韗緝之冨聚土沃多稼散粒荆楊故官人率以貪敗令日兩趨州衙退祗承録判將校事之紛錯率相關臨煩言易生凡事難專故愈不理近年百姓創罷徴賦發斷其人益訛與處險易以亡匿尤輕犯禁夫以不專之理理益訛之俗承積弊之餘雖使冉季復將不能也今清河張君儇為之理適得良二千石俾顓其政而展其材居未再稔最於一郡張恂恂以奉上煦煦以字民剸繁決劇以通敏彈豪紏黠以沈斷清白之操較然絶類便安之謡流而逺聞冝舉其卓卓以敦沮勸縣之故習令將之邑佐發斂盛粻也緡具車航千里迎拜君以讓郤之單航赴官則吏皆廉縣之故習令始至取宫羡物益備器用團鄉次役以供芻粟君以法喻之一切禁絶則民知恥布其大信推以至誠促嚴吏家慰懋民戶故秋夏之稅先期而集宥過以容不逮奬能以勸不修為魁而萃頑者取一以警百故政刑之簡期月而治以俸錢葬枯而恩浹以家飲救渴而澤周萼合兄弟之析居者而民以養􅍪復老弱之流庸者而強以實和氣潛通連歲大穰廷內間間似密與蒲余既堙厄斥置於此始來而弘農楊君敬之具為余話君美談既接益久得實其聞乃刻山石鑱廳壁盛之以觀永久同州韓城縣西尉廳壁記歐陽詹説文曰尉畏也亦慰也主也故字從尸示寸寸者寸量禮度以敬上示者示陳教令以諭下尸者典職司以居位敬上所謂畏諭下所謂慰居位所謂主全兹三者以涖王爵則仕義周是以古之人嘉用尉字為官號陶唐有太尉周有軍尉秦亦有太尉東南尉洎漢則復命縣掾曰尉是以名至于我唐無或易所命善也我唐極天啓宇窮地闢土列縣出于五千分為七等第一曰赤次赤曰畿次畿曰望次望曰緊次緊曰上次上曰中次中曰下赤縣僅二十萬年為之最畿縣僅于百渭南為之最望縣出于百鄭縣為之最緊出于百夏陽為之最上縣僅三百韓城為之最上之最次于緊之最非最之緊無與焉緊之最次于望之最非最之望無與焉望之最次于畿之最非最之畿無與焉畿之最次于赤之最非最之赤無與焉最之縣長於餘縣如麟鳯五靈之長於羣靈也數長不數類則韓城之稱與萬年渭南鄭縣夏陽并自緊而上簿尉皆再命三命巳往而授資歷至之而至也上縣而下則自解褐授韓城既上縣之最簿尉解褐之貴者唯三貟伺其闕非年年之有或一貟之闕天下皆知之曰某人某人授韓城尉是其人則頌非其人則誹雖一命之官其人尚也如此則主司愼擇才地精美縣亦有六曹尉二人一判功戶倉其署曰東廳一判兵法士其署曰西廳兹廳兵法士之廳也根之州則司兵司法司士盡在形之國即兵部刑部工部盡在兵主武法主刑工主士今武未大成務尚繁刑未大措獄尚生工與人興無時休州縣司或雙曹六人分其職國則部屬寮八九十人分其職一人理六十人之理雖小大有異而揆緒不殊其緒不殊其官官不易能至於易者則人無敢易之人無敢易之則國必重之國重之則踐洪鈞大柄所由乎此也貞元十五年春余友人榮陽鄭伯義授焉鄭自上纍葉聲名為天下聞鄭以明經登科又三舉進士屈於命辭學亦流輩推內行第一其受命之年五月余詣焉十月又詣焉見東廳有記西廳無記因請書示本廳姓氏序于左其或先于鄭芳馨猶存者亦得之至于鄭皆繫若譜土壤廣狹物産有無尉非得主不敢僣序十月十五日記重校正唐文粹卷第七十三
