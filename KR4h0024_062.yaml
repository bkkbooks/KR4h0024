body:
  text: 吴興姚鉉纂碑十四揔八首釋二上都大安國寺大達法師玄祕塔碑裴休大唐興善寺大廣智不空三藏碑嚴郢澧州藥山故惟儼大師碑唐伸衡州般若寺觀音大師碑張正甫越州開元寺故律和尚塔碑梁肅衡山大明寺律和尚塔碑栁宗元撫州景雲寺律和尚塔碑白居易廬山東林寺律大德熈怡大師碑許堯佐唐故左街僧録内供奉三教談論引駕大德安國寺上座賜紫大達法師玄祕塔碑銘并序裴休玄祕塔者大法師端甫靈骨之所歸也於戲爲丈夫者在家則張仁義禮樂輔天子以扶世導俗出家則運慈悲定慧佐如來以闡教利生捨此無以爲丈夫也背此無以爲達道也和尚其出家之雄乎天水趙氏世爲秦人初母張夫人夢梵僧謂曰當生貴子即出囊中舎利使吞之及誕所夢僧白晝入其室摩其頂曰必當大弘法教言訖而滅旣成人高顙深目大頥方口長六尺五寸其音如鐘夫將欲荷如來之菩提鑿生靈之耳目固必有殊祥竒表歟始十歲依崇福寺道悟禪師爲沙彌十七正度爲比丘隷安國寺具威儀於西明寺照律師稟持犯於崇福寺昇律師傳唯識大義於安國寺素法師通涅槃大㫖於福林寺峑法師復夢梵僧以舎利滿琉璃器使吞之且曰三藏大教盡貯汝腹矣自是經律論無敵於天下囊括川注逢原委㑹滔滔然莫能濟其畔岸矣夫將欲伐株杌於情田雨甘露於法種者固必有勇智宏辯歟無何謁文殊於淸涼衆聖皆現演大經於太原傾都畢㑹德宗皇帝聞其名徴之一見大恱常出入禁中與儒道議論賜紫方袍歲時錫施異於他等復詔侍皇太子於東朝順宗皇帝深仰其風親之若昆弟相與卧起恩禮特隆憲宗皇帝數幸其寺待之若賔友常承顧問注納偏厚而和尚符彩超邁詞理響捷迎合上㫖皆契眞乗雖造次應對未甞不以闡揚爲務繇是天子益知佛爲大聖人其教有大不思議事當是時朝廷方削平區夏縛吳斡蜀潴蔡蕩鄆而天子端拱無事詔和尚率緇屬迎眞骨於靈山開法場於祕殿爲人請福親奉香燈旣而刑不殘兵不黷赤子無愁聲蒼海無驚浪蓋叅用眞宗以毗大政之明效也夫將欲顯大不思議之道輔大有爲之君固必有冥符玄契歟掌内殿法儀録左街僧事以摽表淨衆者凡一十年講涅槃唯識經論位處當仁傳授宗主以開誘道俗者凡一百六十座運三宻於瑜伽契無生於悉地日持諸部十餘萬遍指淨土爲息肩之地嚴金經爲報法之恩前後供施數十百萬悉以崇飾殿宇窮極雕繪而方丈匡牀靜慮自得貴臣盛族皆所依慕豪俠工賈莫不瞻嚮薦金寶以致誠仰端嚴而禮足日有千數不可殫書而和尚即衆生以觀佛離四相以修善心下如地坦無丘陵王公輿臺皆以誠接議者以爲成就常不輕行者唯和尚而巳夫將欲駕横海之大航拯迷途於彼岸者固必有竒功妙道歟以開成元年六月一日西向右脅而滅當暑而尊容若生竟夕而異香猶鬱其年七月六日遷於長樂之南原遺命荼毗得舎利三百餘粒方熾而神光月皎旣燼而靈骨珠圎賜謚大達塔曰玄祕俗壽六十七僧臘四十八門弟子比丘比丘尼約千餘輩或講論玄言或紀綱大寺修禪秉律分作人師五十其徒皆爲達者於戲和尚果出家之雄乎不然何至德殊祥如此其盛也承襲弟子義均自政正言等克荷先業䖍守遺風大懼徽猷有時堙没而今閤門使劉公法縁最深道契彌固亦以爲請願播淸塵休甞遊其藩備其事隨善讃歎蓋無愧辭銘曰賢劫千佛第四能仁哀我生靈出經破塵教網高張孰辯孰分有大法師如從親聞經律論藏戒定慧學深淺同源先後相覺異宗偏義孰正孰駮有大法師爲作霜雹趣眞則滯渉俗則流象狂猿輕鈎檻莫收柅制刀斷尚生瘡疣有大法師絶念而遊巨唐啓運大雄垂教千載冥符三乗迭耀寵重恩顧顯闡讃導有大法師逢時感召空門正闢法宇方開崢嶸棟梁一旦而摧水月鏡像無心去來徒令後學瞻仰徘徊大唐興善寺大廣智不空三藏碑銘并序嚴郢和尚諱不空西域人也氏族不聞於中夏故不書玄宗燭知至道特見高仰迄肅宗代宗三朝皆爲灌頂國師以玄言德祥開右至尊代宗𥘉以特進大鴻臚襃表之及示疾不起又就卧内加開府儀同三司蕭國公皆牢讓不允特賜法号曰大廣智三藏大曆九年夏六月癸未滅度於京師大興善寺代宗爲之廢朝三日贈司空追謚大辯正廣智三藏和尚茶毗之時詔遣中謁者齎祝文祖祭申如在之敬睿詞深切嘉薦令芳禮冠羣倫舉無與比明年九月詔以舎利起塔于舊居寺院和尚性聦朗愽觀前佛法萬要指緇門獨立邈盪盪其無雙稽夫眞言字義之憲度灌頂升壇之軌迹即時成佛之速應聲儲祉之妙天麗且彌地普而深固非末學所能詳也敢不槩見序其大歸昔金剛薩埵親於毗盧遮那佛前受瑜伽最上乗義後數百歲傳於龍猛菩薩龍猛又數百歲傳於龍智阿闍梨龍智傳金剛智阿闍梨金剛智東來傳於和尚和尚又西遊天竺師子等國詣龍智阿闍梨揚攉十八㑹法法化相承自毗盧遮那如來至於和尚凡六葉矣每齋戒留中導迎善氣登禮皆荅福應較然温樹不言莫可記巳西域隘巷狂象奔突以慈眼視之不旋踵而象伏不起南海半渡天吳鼓駭以定力對之未移晷而海靜無浪其生也母氏有毫光照燭之瑞其殁也精舎有池水竭涸之異凢僧夏五十享年七十自成童至于晚暮常飾供具坐道場浴蘭焚香入佛知見五十餘年晨夜寒暑未曽須臾有傾欹懈倦之色過人絶逺乃如是者後學升堂誦說有法者非一而沙門惠朗受次補之記得傳燈之㫖繼明佛日紹六爲七至矣哉於戲法子永懷梁木將絶本行託余勒崇昔承微言今見几杖光容眇漠壇宇淸愴纂書昭銘小子何讓銘曰嗚呼大士起我三宗道爲帝師秩爲儀同昔在廣成軒后順風歲逾三千復有蕭公瑜伽上乗眞語密契六葉授受傳燈相繼述者牒之爛然有第陸伏狂象水息天吳慈心制暴慧力降愚寂然感通其可測乎兩楹夢奠雙樹變色司空寵終辯正旌德天使祖祭宸衷悽惻詔起寶塔舊庭之隅下藏舎利上飾浮屠跡殊生滅法離有無刋石爲偈傳之大都澧州藥山故惟儼大師碑銘并序唐伸上嗣位明年澧陽郡藥山釋氏大師以十二月六日終於修心之所後八歲門人持先師之行西來京師告于崇敬寺大德求所以發揮先師之耿光垂於不朽崇敬寺大德於余爲從母兄也甞叅徑山得其心要自興善寛敬示滅之後四方從道之人將質疑傳妙罔不詣崇敬者甞謂伸曰吾道之明於藥山猶爾教之闡于洙泗智炬雖滅法雷猶響豈可使明徳不照至行湮没矣惟大師生南康信豐縣自爲兒童時未甞處羣子戲弄之中往往獨坐如思如念年十七即南度大庾抵潮之西山得惠照禪師乃落髪服緇執禮以事大曆八年受具於衡嶽希琛律師釋禮矩儀動如宿習一朝乃言曰大丈夫當離法自靜焉能屑屑事細行於衣巾邪是時南嶽有遷江西有寂中嶽有洪皆悟心契乃知大圭之質豈俟磨礱照乗之珍難晦符彩自是寂以大乗法聞四方學徒至於指心傳要衆所不能達者師必黙識懸解不違如愚居寂之室垂二十年寂曰爾之所得可謂浹於心術布於四體欲益而無所益欲知而無所知渾然天和合於大無吾無有以教矣佛法以開示羣盲爲大功度滅衆惡爲大德爾當以功德普濟迷途冝作梯航無乆滯此由是陟羅浮渉淸涼歷三峽遊九江貞元𥘉因憩藥山喟然歎曰吾生寄世若萍蓬耳又何效其飄轉邪旣披榛結菴纔庇跌座郷人知者因賫擕飲饌奔走而往師曰吾無德於人吾何以勞人乎哉並謝而不受郷人跪曰願聞日費之具曰米一升足矣自是常以山𬞞數本佐食一食訖就座轉法華華嚴涅槃經晝夜若一始終如是者殆三十年矣游方求益之徒知教之在此後數歲而僧徒葺居禪室接棟鱗差其衆不可勝數至於沃煩正覆導源成流有以見寂公先知之明矣忽一旦謂其徒曰乗郵而行及暮而息未有乆行而不息者吾至所詣矣吾將有以息矣靈源自淸混之者相能滅諸相是無二色窮本絶外爾其悉之語畢隱几而化春秋八十四僧臘六十夏後二十日入室弟子沖虚等遷座建塔于禪居之東遵本教也始師常以大練布爲衣以竹器爲蹻自薙其髪自具其食雖門人百數童侍甚廣未甞易其力珍羞百品鮮果駢羅未甞易其食冬裘重燠暑服輕踈未甞易其衣華室淨深香榻嚴絜未甞易其處麋鹿環繞猛獸伏前未甞易其觀貴賤迭來頂謁牀下未甞易其禮非夫聲萬有契眞空離攀縁於病本性淸淨乎物表焉能遺形骸忘嗜慾乆而如一者邪其他碩臣重官歸依修禮於師之道未有及其門閫者故不列之於篇銘曰一物在中觸境而揺我示其元不境不跳西方聖人實言道要道要旣得何言惟妙我源自濟我眞自靈大包萬有細出無形曹溪所傳徒藏於密身世俱空曽何有物自見曰明是爲至精出没在我誰曰死生刻之琬琰立此巖岫作碑者伸期於不朽衡州般若寺觀音大師碑銘并序張正甫天寶三載觀音大師終于衡嶽山春秋六十八僧臘四十八元和十八年故大弟子道一之門人曰惟寛懷暉感塵劫遽遷塔樹巳拱懼絶故老之口將貽後學之憂丕若貽謀思揚祖德乃列景行託於廢文彊名無跡以慰乎罔極之恩曰自騰蘭之演教于中土也殆將千歲達磨傳心至六葉也分爲二宗不階初入頓入佛惠曹溪教㫖於是乎傳弘而信之觀音其人也大師諱懷讓京兆杜氏其先因家安康即爲郡人髫年駿發聦悟絶衆羣言所涉一覽無遺居常而未或好弄在醜而不可䙝近甞嘿觀止水因而顧影形儀顒若宛在鏡中三反厥像如初沛焉而心乎獝得還歩未輟聞於空中曰佛法津梁俟子而大旣應付囑爾盍勉之乃深割愛緑亟從剃落以荆土律藏之微密也大士智京在焉攝衣從之旣進而儀法峻整冠於等輩以嵩嶽龍之泉海也長安長老在焉稽首咨之旣授記而身心自在超出塵垢厭離文字思㑹宗元周法界以冥搜指曹溪而遐舉能大師方弘法施學者如歸渉其藩閫者十一二焉躋其室堂者又十一焉師以後學弱齡分於末席虚中而若無所受善閉而惟恐有聞能公異焉置之座右㑹一音吹萬有衍方寸彌大千同焉而支暢異焉而合同授祕印目爲宗師乃陟武當窮棲十霜朅來衡嶽終焉是託惟般若聖㮣有觀音道場宴居斯宇因以爲號或微言析理辯士順風而杜其口或杖屨將撰山靈借留而現於夢逺自梁益近從荆呉雲趨景附風動川至靈山勝㑹今古一時至矣哉未始聞也一公見性同德弘教鐘陵鬱爲名家再揚木鐸而施及寛暉繼傳心燈共鎭國土乃追琢琬琰揭于故山楊其耿光以示來劫其受法弟子亦序列于左式明我教之有開焉銘曰不疾而速平平南宗窮行其教嶽嶽讓公秀發之英激于童齒出塵之像光於止水乃趨律㑹儀範孔脩乃探密藏先覺同求曹溪實歸般若觀妙體是宗極湛乎反照一從委順六紀於兹教跡未衰靈峯巋而一公丕承峻其廊廡寛暉繼起重規疊矩乃掃塵塔乃植豐碑率是教者兹焉有歸越州開元寺律和尚塔碑銘并序梁肅釋氏先律師諱曇一字曇㣧報年八十僧夏六十一以大曆六年十二月七日滅度于越州開元寺遷座起塔于秦望山之陽制縗㑹葬者以千百數大師本南陽張氏曽祖隋太常恒始家㑹稽之山隂大師誕鍾粹氣聦悟夙發㓜學五經因探禹穴至雲門寺遂依沙門諒公出家景龍中制度㝷受具戒天縱辯慧益之以軌儀翕然巳爲人望矣開元初西遊長安觀音亮律師見而竒之授以毗尼之學又依崇聖寺檀子法師學俱舎唯識從即度沙門善無畏受菩薩戒探道覩奥出類㧞萃朞月之間名動京師大師崖岸峻峙機神坦邁體識詳雅應用虚明得三藏之隱賾究諸宗之源底加以素解玄儒旁揔曆緯長老聞風而恱服公卿下榻以賔禮由是與少保兖國陸公象先賀賔客知章李北海邕徐中書安貞禇諌議庭誨及涇縣令萬齊融爲儒釋之遊莫逆之友其導世皆先之以文行弘之以戒定入蘭室而馨香自發臨水鏡而毫髪必鑒不知其所由然矣開元二十六年復歸㑹稽謂人曰三世佛法戒爲根本本之不修道逺乎哉故設教以尸羅爲主取鄴郡律䟽合終南事鈔括其異同詳發正義學徒頼焉大凢北際河朔南越荆閩四分之宗自我而盛烈炬之破昏黒羣流之赴淵澤適來之時行化也如彼有爲而生乗化而息草木濳潤慈雲無心適去之時處順也如此人世遷轉道存運在瞻望不見寂寥空山哀哉銘曰越水漫漫崇山廻合大師化滅式建靈塔𬗟慕上士誕修淨法有威有儀不穿不雜德溥化洽雲從海納勒銘垂後千萬億劫衡山大明寺律和尚塔碑銘并序柳宗元儒以禮立仁義無之則壊佛以律持定惠去之則喪是以離禮於仁義者不可與言儒異律於定惠者不可與言佛達是道者唯大明師師姓歐陽氏號曰惠聞唐開元二十一年始生天寳十一載始爲浮啚大暦十一年始登壇爲大律師貞元十三年十一月十日卒元和九年正月其弟子懷信道嵩尼無染等命高道僧靈嶼爲行狀列其行事願刋之兹碑宗元今掇其大者言曰師先因官世家潭州爲大族有勲烈爵位今不言大浮啚也凢浮啚之道衰其徒必小律而去經大明恐焉於是從峻洎偘以究戒律而大法以立又從秀洎昱以通經教而奥義以修由是二道出入隱顯後學以不惑來求以有得廣德二年始立大明寺于衡山詔選居寺僧二十一人師爲之首乾元三年又命衡山立毗尼藏詔選講律僧七人師應其數凡其衣服器用動有師法言語行止皆爲物軌執巾􅓢奉杖屨爲侍者數百翦毛髪被教戒爲學者數萬得衆若獨居尊若卑晦而光介而大灝灝焉無以加也其塔在祝融峯西趾下碑在塔東詞曰儒以禮行覺以律興一歸眞源無大小乗大明之律是定是惠丕窮經教爲法出世化人無量垂𥙿無際詔尊碩德威儀有繼道遍大洲徽音勿替祝融西麓洞庭南裔金石刻辭彌億千歲唐撫州景雲寺故律大德上弘和尚石塔碑銘并序白居易元和十一年春廬山東林寺僧道深懷縱如建冲契宗一至柔辯諸智則智明雲臯太易等凡二十輩與白黒衆千餘人俱實持故景雲大德弘公行狀一通贄錢十萬來詣潯陽請司馬白居易作先師碑㑹有故不果十二年夏作石墳成復來請㑹有病不果十三年冬作石塔成又來請始從之旣而僧反山衆反聚落錢反寺府翌日而文就明年而碑立其詞云我聞竺乾古先生出世法法要有三曰戒定惠戒生定定生惠惠生八萬四千法門是三者迭爲用若次第言則定爲惠因戒爲定根根植則苗茂因樹則果滿無因求滿猶夢果也無根求茂猶揠苗也雖佛以一切種智攝三界必先用戒菩薩以六波羅蜜化四生不能捨律律之用可思量不可思量如來十弟子中稱優波離善持律波離滅有南山大師得之南山滅有景雲大師得之師諱上弘姓饒氏曾祖君雅祖公恱父知恭臨川南城人童而有知故生十五歲發出家心始從舅氏剃落壯而有立故生二十五歳立菩提願從南岳大圎大師具戒樂其所由生故大暦中不去父母之邦請隷于夲州景雲寺修道德應無所住故貞元𥘉離我所徙居洪州龍興寺說法親近善知識故與匡山法眞天台靈𥙿荆門法裔曁興果神湊建昌惠進等五長老交遊佛法屬王臣故與姜相國公輔顔太師眞卿暨本道廉使楊君慿韋君丹四君子友善提振禁戒故講四分律而從善逺罪者無其數隨順化縁故坐甘露壇而誓衆主盟者二十年荷擔大事故前後登方等施尸羅者十有八㑹救拔羣生故娑婆男女由我得度者萬五千五百七十二人示生無常故元和十年十月巳亥遷化于東林精舎示滅有所故是月丙寅歸全于南岡石墳住世七十七歲安居六十五夏自生至滅隨跡示教行止語黙無非佛事夫施於人也愽則反諸已也厚故門人郷人報如不及繇是藝松成林琢石爲塔塔有碑碑有銘銘曰佛滅度後薝蔔香衰醍醐味醨誰反是香誰復是味景雲大師景雲之生一匡苾蒭中興毗尼景雲之滅衆將安仰法將疇依昔景雲來行道者隨踐跡者歸今景雲去升堂者思入室者悲鑪峯之西虎溪之南石塔巍巍有紀事者以眞實詞書于塔碑廬山東林寺律大德熈怡大師碑銘并序許堯佐大師諱熈怡姓曹氏桂陽人也舊勲前烈垂休積慶史氏詳之矣夫眞如不逺其要在乎無垢妙理不深其要在乎見性本於眞實暢於虚空俾聆芳咀潤孜孜請益則大師之教也大師體識深靜風度端敏受具戒於南嶽修律儀於東林常跌坐一室而四方學者差肩繼踵發此柔軟納其歸依嘉言玉振微文冰釋故崇德雅美臨壇持法垂五十年甞以至德𥘉隷東林寺居舎利塔院數逾二紀而信心長者懷甘奉贄紛然並進監厨守藏不遑祗受旣而悉歸精舎頒於衆僧大師率門人布衣糲食而巳故推巳以見相因相而歸空搜閱精微鑚研㫖要常苦背悶而針石不能及也故中夜累歎有神人撫背殊形駭物斯須乃去自兹窮討經論切磋心要加以律儀端靜受持動至感通之應固難盡書至於山鹿歸仁林鳥效祉大師之室不足駭也大曆五年躋五老峯望彭蠡臨瀑布乃構凌雲精室爲經行之地旁引泉竇以滌塵垢近躡松壑以求淸涼丹崖雲岫勢若屏牖然趨風望景攀危輦重翼如而至者難以數計積十餘年乃止大林精廬杖屨衣巾屏居一室行住生卧無非道場乃淬法刃燃惠炬俾夫恂恂圍繞者割其縳導其迷洗然而自得也貞元中歸東林戒壇院以爲吾道已成吾教巳行十二年丙子歳秋七月二十七日召門弟子曰吾隨化還須臾寂滅僧臘五十報齡七十一州閭赴弔道路銜悲宗師旣没法教疇依蓮沼蕪涸禪林凋折以其年八月十四日遷座于香谷原從人欲也大師精貫六藝旁達百氏甞與故太師魯國公顔眞卿故丞相天水趙公憬故鄭滑節度兼御史大夫范陽盧公羣今吏部侍郎弘農楊公於陵爲叅禪之侣幽鍵洞發玄言兩得門人法粲道鏡道寧道深道琛道建利辯等並三明繼軌四禪紹迹縁起皆泯空有兩詮卜商傳闕里之教龍樹演迦維之法其㫖一也咸以夙承甘露願勒貞珉銘曰演暢微妙經行道揚昭昭大師啓迪無方孰云虚空不可思量載滌縁念永淸水地異物幽賛靈烏效瑞景行如存追思不墜白月在水澄虚則明至人臨池無垢則淸信而不渝沖而不盈宛彼堂廡空留法象門人紹德禪燈繼相式播芳塵以慰瞻仰重校正唐文粹卷第六十二
