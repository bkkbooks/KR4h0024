body:
  text: 悲剡谿古藤文舒元輿剡谿上緜四五百里多古藤株枿逼土雖春入土脉他植發活獨古藤氣候不覺絶盡生意予以為本乎地者春到必動此藤亦本地地方春且有死色遂問谿上人有道者云谿中多紙工刀斧斬伐無時擘剥皮肌以給其業噫藤雖植物者温而榮寒而枯養而生殘而死亦將似有命於天地間今為紙工斬伐不得發生是天地氣力為人中傷致一物疾癘之若此異日過數十百郡洎東雒西雍歴見書文者皆以剡紙相夸予寤曩見剡藤之死職止由此此過固不在紙工且今九牧士人自專言能見文章户牖者其數與麻竹相多聽其語其自安重皆不啻握驪龍珠雖苟有曉寤者其倫甚寡不勝衆者亦皆歛手無語勝衆者果自謂天之文章歸我遂輕傲聖人道使周南召南風骨折入於抑揚皇華中言偃卜子夏文學陷入於淫靡放蕩中比肩握管動盈數千百人數千百人筆下動行數千萬言不知其為謬誤日日以縱自然殘藤命易甚桑枲波波頽沓未見止息如此則綺文妄言軰誰非書剡紙者耶紙工嗜利曉夜斬藤以鬻之雖舉天下為剡谿猶不足以給况一剡谿者耶以此恐後之日不復有藤生於剡矣大抵人間費用苟得著其理則不枉之道在則暴耗之過莫由横及於物物之資人亦有其時時其斬伐不為夭閼予謂今之錯為闕文者皆夭閼剡谿藤之流也藤生有涯而錯為文者無涯無涯之損物不直於剡藤而已予所以取剡藤以寄其悲弔韓弇没胡中文李觀維唐貞元元年匈奴上款乞盟天子以其言誠乃命上將往墠隂山而聽其誓言監察御史韓君載筆而隨焉我上將仗九廟之信而首盟其間以戎人心為心戎乗我不虞而有詭謀我計無素成而姧以宿盟故勇者死奔者追而韓君為之擒矣嗚呼有備無患軍志也戎人安所暴其詐千慮一失聖人也韓君是以為之虜天其或者將用驚我非福戎也韓君為之擒其繫命歟五年於兹生死不尋謂之生豈復還期謂之死永永湮沈或曰死矣曽是切商弦之心絶國浩浩窮西極濱羌戎居之環視齗齗流沙無波隂山無春邊草不緑塞鴻不賔秦有長城漢有遺人死者虜鬼生者虜臣哀哀韓君生死窮辛鬼能靈人能語君生其所君死其所今兩寂然心繇中阻君初奉役意氣西道白珪之貺唾掌可保激魯陽之勇歎典屬之老乃即於事不能畫竒從軍之籌君固職之可疑不疑固用阽危羌戎髬髵坐刃我師倉卒闇曶血殷朔陲實死者痛非擒者悲夾谷之㑹不聞仲尼秦中九月黄葉始下長風西來烈烈飄瓦望君申弔亦懼來者已乎一魂時也命也哀二良文白居易丞相隴西公出鎮于汴州軍司馬御史大夫陸長源實左右之二年而軍用寧司空南陽公作藩于徐州軍副使祠部員外郎鄭通誠實先後之十年而民用康暨十五年春隴西薨浹辰而師亂大夫以直道及禍十六年夏南陽薨翌日而難作員外以危行遇害惜乎大夫民之望也員外國之良也咸克絜于身儉于家勤于邦又申之以言行文學智謀政事故其歴要官參劇務如刀劒發硎割而無滯如鐘磬在懸動而有聲識者以為異時登天下股肱耳目之任必能修徳秉哲紹復隴西南陽之事業以藩輔王家嗚呼善人宜將鍾奕葉之慶而不免及身之祸天乎報施之眹何其昧歟昔詩人有黄鳥之章以哀三良不得其死今斯文亦以哀二良命其篇云伊大化之無形兮浩浩而茫茫中有禍牙兮若機之張梁之亂兮陸受其毒徐之難兮鄭罹其殃惟善人兮邦之紀綱邦之瘁兮正人先亡謂天之惡下民兮胡為乎生此忠良謂天之愛下民兮胡為乎生此犲狼我欲階冥冥問蒼蒼蒼蒼之不可問兮俾我心之䀌傷悲夫而今而後吾知夫天難忱而命靡常耶奠相國令狐公文李商隠戊午歳丁未朔乙亥晦弟子玉谿李商隠叩頭哭奠故相國贈司空彭陽公嗚呼昔夢飛塵從公車輪今夢山阿送公哀歌古有從死今無奈何天平之年大刀長㦸將軍樽旁一人衣白十年忽然蜩宣甲化人譽公憐人譛公罵公髙如天愚卑如地脱蟺如蛇如氣之易愚調京下公病梁山絶崖飛梁山行一千莫奏天子䥴辭墓門臨絶丁寧託爾而存公此去耶禁其禁反不時歸鳳棲原上新舊衮衣公先人亦贈司空有泉者路有夜者臺昔之去者宜其在哉聖有夫子亷有伯夷浮魂沈魄公其與之故山峩峩玉谿在中送公而歸一世蒿蓬嗚呼祭韓侍郎文李翺嗚呼孔子云逺楊朱恣行孟軻拒之乃壊于成戎風混華異學魁横兄常辨之孔道昭明建武以還文卑質䘮氣萎體敗剽剥不讓儷花鬬葉顛倒相上及兄之為思動鬼神撥去其華得其本根開合怪駭驅濤涌雲包劉越嬴並武同殷六經之風絶而復新學者有歸大變于文兄之仕宦罔辭于難疏奏輒斥去而復遷昇黜不改正言亟聞貞元十二兄作汴州我㳺自徐始得兄交視我無能待予以友講文析道為益之厚二十九年不知其久兄以疾休我病卧室三來視我笑語窮日何荒不耕㑹之以一人心樂生皆惡言凶兄之在病則齊其終順化以盡靡惑于中欲别千萬意如不窮臨䘮大號決裂肝胸老􅆅言壽死而不亡兄名之垂星斗之光我譔兄行下干太常聲殫天地誰云不長䘮車來東我刺廬江君命有嚴不見兄䘮遣使奠斚百酸攪腸音容若在曷日而亡嗚呼哀哉嗚呼哀哉祭獨孤常州文崔祐甫維大歴十二年嵗次月日外從祖舅朝散大夫權知中書舍人賜紫金魚袋崔祐甫遣表妷前鄧州南陽縣尉李綜以清酌之奠祭于從外孫甥常州獨孤使君至之之靈往矣至之此時何時空原拱木荆榛狐貍林風月露以之増悲子之往也髙格逺量秀氣茂姿亡兮何若有兮誰對豈流蘇寓馬從之已爾嗚呼哀哉王事適我政事一埤益我在籠而不能求其釋獨有懐君之淚臨秋風而自滴平生相期聊復一叙一以豁胸中之憤氣二以簡明靈而晤語吾與至之思𢎞道義自家刑國張維舉墜吾與至之思孰交好平居琢磨遇死赴蹈吾與至之思邁純徳言為士凖動有時則吾與至之思全髙節風雨如晦嘐嘐不輟吾與至之思闡斯文不俾臯契獨暮華勛吾與至之談空覈𤣥夢蝶喻筏去之蕭然吾與至之期諸晚嵗偃卧山樊同披薜荔舉其大較良難名數念我交情千枝萬縷霜風掃葉或散或聚萬化紛然同歸野土向之所務孰云其主嗚呼哀哉爛然澄酤平昔共歡如何此奠取象於觀我思此飫子必吾劇目想道周暫留徒御所可懐者徐生之絮祀吕衡州化光文栁宗元維元和六年嵗次辛卯八月癸亥朔友人守永州司馬員外置同正員栁宗元謹遣書吏同曹家人襄兒奉清酌庶羞之奠敬祭于吕八兄化光之靈嗚呼天乎君子何厲天實仇之生人何罪天實讐之聰明正直行為君子天則必速其死道徳仁義志存生人天則必夭其身吾固知蒼蒼之無信漠漠之無神今於化光之殁悲逾深而毒逾甚故復呼天以云云天乎痛哉堯舜之道至大以簡仲尼之文至幽以黙千載紛爭或失或得倬乎吾兄獨取其直貫乎化始與道咸極推而下之法度不忒旁而肆之中和允塞道大藝備斯為全徳而官止刺一州年不逾五十佐王之志没而不立豈非循正直以召災好仁義以速咎者邪宗元幼雖好學未聞其道洎乎獲友君子乃知適於中庸削去邪雜顯陳真正為道不謬兄實使然嗚呼積乎中不必施于外裕乎古不必諧於今二事相勘從古至今至於化光最為太甚理行第一尚非所長文章過人畧而不有夙志所蓄巍然可知貪愚皆貴險狠皆老則化光之天厄反不榮歟所慟者志不得行功不得施蚩蚩之甿不被化光之徳庸庸之俗不知化光之心斯言一出内若焚裂海内甚廣知者㡬人自友朋凋䘮志業殆絶唯望化光伸其宏畧震耀昌大興行於時使斯人徒知我所立今復往矣吾道息矣雖其存者志亦死矣臨江大哭萬事已矣窮天之學貫古之識一朝去此終復何適嗚呼化光今何為乎止乎行乎昧乎明乎豈蕩而為大空與化無窮乎將結而為光耀以助臨照乎豈為雨為露以澤下土乎將為雷為霆以泄怨怒乎豈為鳳為麟為景星為卿雲以寓其神乎將為金為錫為珪為璧以棲其魄乎豈復為賢人以續其志乎將奮為神明以遂其義乎不然是昭昭者其得已乎其不得已乎抑有知乎其無知乎彼且有知其可使吾知之乎幽明茫然一慟膓斷嗚呼化光庶㡬聽之尚饗為常州獨孤使君祭李員外文梁肅大歴九年五月日朝散大夫守常州刺史賜紫金魚袋獨孤某謹以清酌之奠祭於故尚書吏部郎趙郡李遐叔三兄之靈嗚呼疇昔之年接兄討論倚伏之數或尋其源嘗謂仁人百禄滋蕃如何於兄斯道莫存嗚呼哀哉惟兄孝友仁恕髙明寛裕何徳之茂何才之富粹氣積中暢於四支發為斯文郁郁輝輝自五百年風雅凌遲假手于兄鬱為宗師乃登憲闈直以舉之乃列諫臣闕則補之𤣥宗季年戎狄内侮兄方就養劫在犲虎氣霧濛濛薄汙我躬雷雨作解逺身于東帝曰孝哉可移於忠名居右掖跡踐南宫丘明為耻𤣥晏方病清漳閒卧樂道推命哀于大賢不嚮大年人之不幸天亦何言在昔賈生見惡絳灌王佐之用不展於漢我之方行遭世紛亂時運屯塞古今一貫嗚呼哀哉某以䝉蔽夙承眷惠義均伯仲合若符契愽約乎文章之間優游乎性命之際謂得攜手相期卒嵗天其䘮予兄則先逝嗚呼哀哉曩自朝列出持使節十年離别一旦存没吳楚迢遞江山阻越不及歸賵仍乖執紼寢門一哀魂斷心絶恭承嘉命來牧于常繐帳斯在哀何可忘鞠然二孤訢彼穹蒼孰謂遐叔與天茫茫魂兮歸來臨此一觴嗚呼哀哉祭栁子厚文韓愈維年月韓愈謹以清酌庶羞之奠祭于亡友栁子厚之靈嗟嗟子厚而至然耶自古莫不然我又何嗟人之生世如夢一覺其間利害竟亦何校當其夢時有樂有悲及其既覺豈足追維凡物之生不願為材犧樽青黄乃木之災子之中棄天脱􅑓羈玉珮瓊琚大放厥辭富貴無能磨滅誰紀子之自著表表愈偉不善為斵血指汗顔巧匠旁觀縮手袖間子之文章而不用世乃令吾徒掌帝之制子之視人自以無前一斥不復羣飛刺天嗟嗟子厚今有今亡臨絶之音一何琅琅徧告諸友以寄厥子不鄙謂余亦託以死凡今之交觀世厚薄余豈可保能承子託非我知子子實命我猶有鬼神弗敢遺墮念子永歸無復來期設祭棺前矢心以辭嗚呼哀哉尚饗祭栁栁州文皇甫湜嗚呼栁州秀氣孤稟弱冠游學聲華藉甚肆意文章秋濤瑞錦吹迴蟲濫王風凜凜連牧甲科驟閲班品青衿搢紳屬目歛衽公卿之禄若在倉廩至駿難馭太白易慘華鐘始撞一頓聲寢梧山恨望桂水愁飲鬱鬱羣議悠悠積稔竟奄荒瘴遂絶羈枕嗚呼栁州命實在天賢不必貴夀不必賢雖聖與神無如命何自古以然相視咨嗟歸葬秦原即路江臯聲容蔑然相嘆増勞惟有令名日逺日髙式薦誠辭以佐羞醪尚饗祭亡友故楊州功曹蕭公文李華乾元三年二月十日孤子李華以清酌之奠致祭于亡友故揚州功曹蘭陵蕭公之靈於乎茂挺平生相知情體如一嵗月之别俄成古今天乎喪予此痛何極華釁罰深重艱棘所鍾殊方永慕觸目號裂孤窮易感況哭故人以足下才惟挺生名蓋天下道孤命屈淪阨終身避亂全絜忠也冐危遷祔孝也有王佐之才先師之訓而殁於道路何負於天天乎痛哉華疇昔之嵗幸忝周旋足下不棄愚劣一言契合古稱管鮑今則蕭李有過必規無文不講知名當世實頼吾人循環往復何日忘此而況泣血千里羈旅相依聞此一哀心骨皆斷痛之至者言不能宣是欲寄辭秖益填塞茂挺茂挺君其降靈尚饗歐陽生哀辭韓愈歐陽詹世居閩越自詹已上皆為閩越官至州佐縣令者累累有焉閩越地肥衍有山泉禽魚之樂雖有長材秀民通文書吏事與上國齒者未嘗肯出仕今上初故宰相常衮為福建諸州觀察使治其地衮以文辭進有名於時又作大官臨莅其民鄉縣小民有能誦書作文辭者衮親與之為主客之禮觀遊宴饗必召與之時未㡬皆化翕然詹于時獨秀出衮加敬愛諸生皆推服閩越之人舉進士繇詹始建中貞元間余就食江南未接人事往往聞詹名閭巷間詹之稱於江南也久貞元三年余始至京師舉進士聞詹名尤甚八年春遂與詹文辭同考試登第始相識自後詹歸閩中余或在京師他處不見詹久者唯詹歸閩中為然其他時與詹離率不歴嵗移時則必合合必兩忘其所趨久然後去故余與詹相知為深詹事父母盡孝道仁於妻子於朋友義以誠氣醇以方容貎嶷嶷然其燕私善謔以世其文章切深喜往復善自道讀其書知其於慈孝最隆也十五年冬余以徐州從事朝正于京師詹為國子監四門助教將率其徒伏闕下舉余為愽士㑹監有獄不果上觀其心有益於余將忘其身之賤而為之也嗚呼詹今其死矣詹閩越人也父母老矣捨朝夕之養以來京師其心將以有得於是而歸為父母榮也雖其父母之心亦皆然詹在側雖無離憂其志不樂也詹在京師雖有離憂其志樂也若詹者所謂以志養志者歟詹雖未得位其名聲流於人人其徳行信於友朋雖詹與其父母皆可無憾也詹之事業文章李翺既為之傳故作哀辭以舒余哀以傳於後以遺其父母而解其悲哀以卒詹志云求仕與友兮逺違其鄉父母之命兮子奉以行友則既獲兮禄實不豐以志為養兮何有牛羊事實既修兮名譽又光父母欣欣兮常若在傍命雖云短兮其存者長終要必死兮願不永傷友朋視疾兮藥物甚良飲食孔時兮所欲無妨壽命不齊兮人道之常在側與逺兮非有不同山川阻深兮魂魄流行祀祭則及兮勿謂不通哭泣無益兮抑哀自强推生知死兮以慰孝誠嗚呼哀哉兮是亦難忘題哀辭後愈性不喜書自為此文惟自書兩通其一通遺清河崔羣羣與余皆歐陽生友也哀生之不得位而死哭之過時而悲其一通今書以遺彭城劉君伉君喜古文以吾所為合於古詣吾廬而來請者八九至而其色不怨志益堅凡愈之為此文蓋哀歐陽生之不顯榮於前又懼其泯滅於後也今劉君之請未必知歐陽生其志在古文耳雖然愈之為古文豈獨取其句讀不類於今者耶思古人而不得見學古道則欲兼通其辭通其辭者本志乎古道者也古之道不苟譽毁於人劉君好其辭則其知歐陽生也無惑焉唐文粹巻三十三下欽定四庫全書唐文粹巻三十四宋姚鉉編論甲總一十三首
