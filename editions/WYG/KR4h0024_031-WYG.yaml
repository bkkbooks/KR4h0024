  text: 三十一
  hash: sha256:df93f417c1deeee2056c628bef9b7adf9f4e9d7ab33fff32a0a42d676e919b1a
body:
  text: 宋姚鉉編文甲揔一十三首帝王踐祚四唐高宗神堯皇帝受禪告南郊文唐𤣥宗明皇帝受禪告南郊文唐册𤣥宗明皇帝文賈曽唐册肅宗宣皇帝文賈至封禪二唐髙宗天皇大帝封禪文唐𤣥宗明皇帝封禪文祝夀一唐徳宗神武皇帝降誕日獻祝夀文侯喜告謝一唐徳宗神武皇帝平朱泚後告謝昊天上帝文陸贄徽號二唐武宗昭肅皇帝㑹昌二年上尊號玉册文李徳裕唐武宗昭肅皇帝㑹昌五年上尊號玉册文肆赦一唐徳宗神武皇帝奉天改年大赦文陸贄戒勵一唐穆宗文惠皇帝戒勵風俗徳音文元稹恕死一唐徳宗神武皇帝賜李納田悦王武俊鐵劵文陸贄唐髙祖神堯皇帝受禪告南郊文維有隋義寜二年五月乙巳朔二十日甲子皇帝臣某敢昭告于昊天上帝伏以生人以來樹之司牧眷命所曯謂之大寳歴數弗在㒺或偷安故舜禹至公揖讓而興虞夏湯武兼濟干戈以定殷周事乃殊途功成一致後之創業咸取則焉臣恭承家慶世禄降及曰祖曰考累功累徳賜履參墟建侯唐社地居戚里門號公宫丕緒隆基足為榮矣但有隋爽徳屬饜大業饑饉師旅民胥怨咨謫見咎徴昭干𤣥鑒備聞卑聼所不忍言臣恭守晉陽馳心魏闕被首濡足拯溺救焚大舉義兵式寧區宇徴要荒之辮髮輯兆庶之離心誓以捐軀救兹人命指陳䘮亂期之乂安有功繼世無希九五惟身與子竭誠盡力率先鋒鏑誓以無貳載䝉𢎞誘克濟艱難電掃風驅廓清天邑傳檄而定岷峨拱手而平闗隴西戎即敘東夷底定非啓非賛孰能兹速尊位世嫡翊奉宗隋勠力輔政無虧臣節值鼎祚云革天禄告移謳謌獄訟聿來唐邸人符神瑞輻凑㣲躬逺近宅心華夷請命少帝知期運已去大命有適遜位而禪若隋之初讓徳不嗣羣臣逼請今六宗乏祀七政未齊罪有所歸恐當天譴請因吉日設壇告類祗畏上帝惠兹下民翼子謀孫罔敢愆徳則小則大無惑無違對越鴻休伏深慙懼謹遣太尉某用薦告之禮瑞冊蒼璧香萁明粢嘉蔬禋祀于皇皇后帝明靈降享仍改義寧二年為武徳元年大赦天下唐𤣥宗明皇帝受禪告南郊文皇帝臣某敢以𤣥牡昭告于皇皇上帝上皇厭理萬機凝情太古釋兹重負與道優游宇宙不可以無君宗社不可以無主恭惟歴數猥當虛薄懼忝帝位固辭不免遂膺大禮以馭下人敬擇元日告類上帝惟神敷祐四海永綏天極唐冊𤣥宗明皇帝文賈曽朕以寡昧䖍奉鴻休本殊王季之賢早逹延州之節昔者聖厯已讓皇嗣之尊暨至神龍終辭大弟之授豈惟衣冠所覩抑以兆庶咸知頃屬國歩未夷時艱主㓜大業有綴旒之懼寶位深墜地之憂議廹公卿遂司契象日慎一日以至于今一紀之勞勤亦至矣萬邦之俗化漸行矣将成夙願脫屣寰區昔堯之禪舜惟能是與舜以命禹匪私其親神器之重允歸公授皇太子某有大功于天地定阽危于社稷温文既習聖敬日躋委之監撫已移年歳時政益明庶功惟序朕之知子庶不負時歴數在躬宜陟元后可令即皇帝位有司擇日授冊朕方比跡洪古希風太皇神與化遊思與道合無為無事豈不美歟王公百寮宜識朕意唐册肅宗宣皇帝文賈至維天寳十五載嵗次丙申月戊子朔二十一日戊申太上皇若曰咨爾元子某惟天為大惟人君則之順乃徳故舜禹揖讓而履皇極咈乃道故丹朱商均不能保鴻業是以啓有恵廸而夏嗣焉隋有亂紀而唐受焉五聖之御㝢皆以勤儉兢業日慎一日故能享祚長久垂慶無窮洎于六葉恭位四海厭于勤倦緬慕汾陽将保静頤神思我烈祖𤣥元之道是用命爾元子當位嗣統於戲爾有忠孝之誠極于君父爾有友愛之義信于兄弟爾有仁恕之行通乎神明爾有勘難之才彰于兆庶予懋乃懿徳嘉乃神武天之歴數在爾躬汝惟推誠禍亂将兾爾永清汝惟從諫宗社将兾爾復寜佞言惟疵直言惟師任賢弗貳去邪勿疑民非后孰治后非賢罔與守邦欽哉慎乃有位無忝我祖宗之丕烈矣唐髙宗天皇大帝封禪文嗣天子臣某敢昭告于昊天上帝有隋運屬顛危數窮否塞生靈塗炭鼎祚淪亡髙祖仗黄鉞而救黎元錫𤣥圭而拯沉溺太宗功宏鍊石定區宇於再麾業壯㫁鼇飲滄海而一息臣忝奉餘緒恭承積慶遂得崐山寢燎炎海澄波雖乃業茂宗祧斯實䧏靈穹昊今謹告成東嶽歸功上𤣥大寳克隆鴻基永固凝薰萬姓陶化八紘唐𤣥宗明皇帝封㤗山玊牒文有唐嗣天子臣某敢昭告于昊天上帝天啓李氏運興上徳髙祖太宗受命立基髙宗升中六合殷盛中宗紹復繼體不定上帝眷祐錫臣忠武底綏内難推戴聖父恭承大寳十有三年欽若天意四海宴然封祀岱嶽謝成于天子孫百禄蒼生受福唐徳宗神武皇帝誕節獻夀文侯喜維孟夏十四日天䧏皇帝之辰羣臣感覆燾之恩朝明庭而獻萬夀者外盡四海罔有不至時臣亦幸在京師無因緣以陪進竊自思念其感恩受賜與羣臣無異徒以其身之卑賤至願莫伸如瘖者欲言躄者欲趨乃作降誕日獻夀文一篇恭置于康荘之衢其辭曰未有人云則有彼天千變萬化兮道無常全髙明運轉兮與人下馬聖人法象兮則相永年自我自度兮祗畏乾乾天受降福兮與人下焉臣今敢獻夀如天博厚配天兮其誰則地含容光大兮無與二山澤藏寳兮富有無既聖人體順兮不愛其利自我自誠兮其他至地至地不測兮生物咸遂臣今敢獻冨如地日出輝輝兮風来薰薰甘露霡霂兮卿雲氛氲民曰五星兮生乎今辰愛我則君何以慶兮無稱其恩榮華富貴兮子子孫孫臣敢獻福兮如所聞唐徳宗神武皇帝平朱泚後告謝昊夫上帝祝冊文陸贄維貞元元年云云嗣天子臣敢昭告于昊天上帝顧惟寡昧不克明道丕膺眷命俾作神主常恐獲戾上帝横災下民兢兢業業夙夜祗畏居位五祀徳馨蔑聞皇靈不歆是用大儆殷憂播蕩踰歴三時誠懼烈祖之耿光墜而不耀側身思咎庶補将來上帝顧懐誘衷悔禍勦兇慝之凌暴雪神人之憤耻舊物不改臣心載新兹乃九廟遺休兆人介福以臣之責其何觧焉間屬冦虞乆稽告謝今近郊甫定長至在辰謹以玉帛犧牲粢盛庶品異慿禋燎式薦至誠太祖景皇帝配神作主尚饗唐武宗昭肅皇帝㑹昌二年上尊號玉冊文李徳裕維會昌二年歳次壬戌四月乙丑朔十四日戊寅攝太尉光禄大夫守司空兼門下侍郎同中書門下平章事臣徳裕銀青光禄大夫守尚書左僕射兼中書侍郎同中書門下平章事臣珙銀青光禄大夫守中書侍郎同中書門下平章事臣李紳及文武百官金紫光禄大夫檢校司徒兼太子太保臣僧儒等六千五百七十四人言臣聞羲皇首太古之號成湯顯神武之稱我髙祖皇王是憲尊名若古貽厥丕訓為孝孫之法豈不善始善述哉矧乃巨唐受命繼體承業理運将至大君以興昊穹所以開至聖也曩者明兩未定帝華不協捨𦙍傳聖深惟至公先后所以昭天命也亦猶堯發于唐侯文興於代邸神明之祚不其難哉伏惟皇帝陛下清明傳鬯光耿四海𤣥徳真隣天休大賚日角見表氣志如神爰初定命正心理物如辰居其極而天下無邪矣由是昭徳塞違尊賢逺佞禹不自滿成不自康㒺盤于田不邇于色自閨壺以施王敎由家道而刑國風去比周覈名實擥權綱擇聖徳修舊典協誠質扢嘉壇欵太一進正臣以端治表禮故老以求讜言逺無蔽獄近無留命祈𤣥祖而膏雨降祀靈岳而嘉榖登省刑罰而蓬㪍消發倉廪而螽螟息去嵗龍旂承祀大輅親郊捧玉瓉而一獻光靈來格振金石而六變魄寳昭臨然猶古訓是學緝熙于道天文炳煥雲漢其章温恭敬遜承太任之敎和樂愷悌洽戚藩之心徳風偃于羣黎威霆動乎絶域又以敬養不逮于長樂昭配未升于禰宫每懐嗣徽蒸蒸而慕所以奉若慈訓對若兩儀因心立制永錫其敎寛底劉之罪興惻隐之仁廻霜収電為之反禾及單于慕義景付朔邉耀徳戢兵謙臨是受至於備文物展國容莫不先甲而布甘澤丁辰而廓隂翳和景晏温卿靄絪緼斯所謂神祗之心應矣天人之際交矣於是服冕之士戴鶡之倫暨藩衞邦伯黄髪鮐背不謀而進曰陛下𤣥黙天睟輝光日新大矣孝熙四極爰臻誠宜玉版温潤鏤鴻明之徳神寳焜燿薦萬斯之年丕惟大典不可辭也陛下猶謙退固拒至于三四羣臣不已乃曰俞哉夫徧覆包含之謂仁極深研幾之謂聖憲度著明之謂文蠻夷震懾之謂武感而遂通之謂神無思不服之謂孝臣等不勝大願謹奉玉寳上尊號曰仁聖文武至神大孝皇帝伏惟陛下乾徤不息謙尊而光樂戒其耽禽戒其荒夀乃侔於殷宗俗乃厚于成康貽燕後昆受福無疆臣徳裕等誠歡誠躍頓首謹言唐武宗昭肅皇帝會昌五年上尊號玊冊文李徳裕維會昌五年嵗次乙丑正月己酉朔一日己酉光禄大夫守太尉兼門下侍郎同中書門下平章事臣徳裕光禄大夫守尚書左僕射兼門下侍郎同中書門下平章事臣悰朝議大夫檢校尚書右僕射兼中書門下平章事臣李讓夷朝議大夫守中書侍郎兼户部尚書同中書門下平章事臣崔鉉及文武百官太中大夫太常卿臣孫簡等六千二百二人言臣聞在昔周宣獫狁内侵四牡薄伐以定王國則詩人大其功暨于漢宣北夷乖亂呼韓慕義郅支逺遁則簡策著其羙惟此二代稱為中興間者開成之末星孛如雲螟飛蔽天先帝感之黎人懼焉乃受至聖遺大投艱迄兹成功厥有冥數伏惟仁聖文武至神大孝皇帝表應龍翼粹含乾剛神全而正氣凝宇定而天光發智燭千里動必察㣲心鏡萬機物來斯應于是五材用四維張建中和之極綴前聖之綱重樞機修法制刑御家之理無出壼之言銷讒邪逺巧佞斥背公之黨退好徑之人内嚴體貌增堂陛之峻外絶締交去輔車之勢古所謂受命於天惟舜獨也已又曰一心定而萬物服唯陛下得之曩者北狄矜功耗蠧中國種類磐牙根柢封殖異術胏附縞衣如荼挾邪作蠱侵滛守内倒懸不觧百有餘年旣而龍祠堙滅㩗國款塞質帝女戚海疆有狼顧平城之心鯨吞咸洛之志爰命梟将搴旗刈旋兵鏖穹廬火烈荆榛颺􅄢幙碎轒䡝六羸遯逃貴女生還剗滅妖迹劉除醜類故名王結髮冠帶入臣堅昆稽首鞮譯來獻而又姦臣放命二紀陸梁據太山之固下窺洛邑通故綘之道旁睨近闗樹其遺孽以竊兵柄議者僉曰精甲十萬積糓十年泉魚不察湯網冝懸陛下䧺㫁霆聲羣疑氷釋揚清風而掃雲鼓迅雷以破山任馮異則拔天井而震上黨仗呉漢則發突騎而傾邯鄲壺闗失險山東奪魄屬有戍邉叛将竊發參墟人心摇蕩異議放肆陛下臨朝而言曰二冦獲罪于天予所不捨未三旬而定晉陽纔朞年而滅潞子不以金購狶将多䧏不勞師克粤首馳報非至德感物孰能臻于此乎由是台宰百辟藩屏将帥上言曰成伐東夷而肅慎来賀景翦七國而王室乃安莫不始於武功終致刑措将以禋上帝薦祖宗宜受鴻名以荅𤣥貺陛下猶謙遜而五讓之勤勤罔已乃屈已以俞之雲漢為章所以昭法度也神明其徳所以成教化也魏巍乎有功帝堯之則也勤于大道𤣥祖之訓也臣等不勝大願謹奉玉册玉寳上尊號曰仁聖文武章天成功神徳明道大孝皇帝伏帷陛下不有其名以保其成不徳其功以戒其盈享殷宗之福致周道之平熙我王度永振金聲臣徳裕等誠歡誠躍頓首頓首謹言唐徳宗神武皇帝奉天改年大赦陸贄門下致理興化必在推誠忘已濟人不恡改過朕嗣服丕構居臨萬邦失守宗祧越在草莽不念率徳誠莫追於旣徃永言思咎期有復于将來明徴厥初以示天下惟我烈祖邁徳庇人致俗化于和平拯生靈于塗炭重熙積慶垂二百年伊爾卿尹庶官洎億兆之衆代受亭育以迄于今功存千人澤及于後肆予小子獲纉鴻業懼徳不嗣罔敢怠荒然以長於深宫之中暗于經國之務積習易溺居安忘危不知稼穡之艱難不察征伐之勞苦澤靡下究情不上通事既擁隔人情疑阻猶昧省已遂使興戎徴師四方轉運千里賦車籍馬逺近搔然行齎居送衆庻勞止或一日屡交鋒刃或連年不觧申胄祝奠乏主家室靡依死生流離怨氣凝結力役不息田菜多荒暴命峻于誅求疲甿空干杼軸轉至溝壑離去鄉閭邑里丘墟人煙㫁絶天譴於上而朕不寤人愁于下而朕不知馴致亂階變興都邑賊臣乗釁肆逆滔天曽莫愧畏敢行凌逼萬品失序九廟震驚上辱於祖宗下負于黎庶痛心靦貌罪實在余永言愧悼若墜淵谷賴夫天地降祐人神叶謀将相竭誠𤓰牙宣力屏除大盗載張皇維将𢎞永圖必希新命朕晨興夕惕唯念前非乃者公卿百寮累抗章䟽擬以徽號加于朕躬固辭不獲俯遂輿論昨因循省良用矍然體隂陽不測之謂神與天地合徳之謂聖顧惟淺昧非所宜當文者所以化成武者所以定亂今化之不被亂是用興豈可更徇羣情苟應虛美重予不徳祗益懐慙自今已後中外所以書奏不得更稱聖神文武之號夫人情不常繫于時化大道既隐亂獄滋豐朕既不能𢎞徳導人又不能一法齊衆苟設宻網以罪非辜為之父母實增愧悼今上元統歴獻歳發生冝革紀年之號式敷在宥之澤與人更始用荅天休可大赧天下改建中五年為興元元年自正月一日昧爽已前大辟罪已下罪無輕重咸赦除之李希烈田恱王武俊李納等有以忠勞任膺将相有以勲舊繼守藩維朕撫馭乖方信誠靡著致令疑懼不自保安兵興累年海内搔擾皆由上失其道下罹其災朕實不君人則何罪屈已宏物予何愛焉庶懐引慝之誠以洽好生之徳其李希烈田恱王武俊李納及所管將士官吏等一切並與洗滌各復爵位待之如初仍即遣使分道宣諭朱滔雖與賊泚連坐路逺未必同謀朕方推至誠務欲𢎞貸如能効順亦與惟新其河南河北諸軍兵馬並宜各于夲道自固封疆勿相侵軼朱泚大為不道棄義蔑恩反易天常盗竊名器暴犯陵寝所不忍言獲罪祖宗朕不敢赦其應被朱泚脅從将士官吏百姓及諸色人等有遭其扇誘有迫以兇威苟能自新理可矜宥但官軍未到京城已前能去逆效順及散歸本道者並從赦例原免一切不問天下左䧏官即與量移近處已量移者更與量移流人配隸及藩鎮効力幷縁罪犯與諸使驅使兼别敇於諸州縣安置及得罪人家口未許歸者一切放還應先有痕累禁錮反逆縁坐承前恩赦所不該者並冝洗雪亡官失爵放歸勿齒者量加収叙人之行義或未必兼搆大厦者方集于羣材建竒功者不限于常撿苟在適用則無棄人况黜免之徒沈鬱頗乆朝過夕用勿拘常例諸軍諸道赴奉天及進収京城将士等或百戰摧敵或萬里勤王扞固金城驅除大憝赴危難者其節著復社稷者其業崇我圖爾功特加彛典錫名疇賦永永無窮宜並賜名奉天定難功臣身有過犯遞減罪三等子孫有過犯遞减罪二等當户應有差科使役一切蠲免其功臣已後雖衰老疾患不任軍旅當分糧賜並宜全給身死之後十年仍回給家口其有食實封者子孫相繼代代無絶其餘叙録及功賞條件待收京日並准去年十月七日十一月十四日敇處分諸道諸軍将士等乆勤扞禦累著功勲方鎮克寕惟爾之力其應在行營者並超三資與官仍賜勲五轉不離鎮者依資與官賜勲三轉其累加勲爵許回授周親内外文武官三品已上賜爵一級四品已下各加一階仍並賜勲兩轉見危致命先哲攸貴掩骼埋胔禮經所先雖効用而或殊在惻隐而何間諸道兵士有死王事者各委所在州縣急遞送歸本管官為葬祭其有因戰陣殺戮及擒獲伏辜暴骨原野者並委所在逐近便收葬應縁流貶及犯罪未𦵏者並許其家各據本官品以禮収𦵏自頃軍旅所給賦役繁興吏因為姦人不堪命咨嗟怨苦道路無聊汔可小康與之休息其墊陌及税間架竹木茶漆𣙜鐵等諸色名目悉宜停罷京畿之内屬此冦戎攻劫焚燒靡有寧室王師仰給人以重勞特宜减放今年夏税之半朕以兇醜犯闕遽用干征爰度近郊息駕兹邑供儲克辦師旅攸寕式當褒旌以志吾過其奉天冝升為赤縣百姓並給復五年尚徳者敎化之所先求賢者邦家之大本永言兹道夢想增懐而澆薄之風趨競不息幽棲之士寂寞無聞盖誠所未孚故求之不至天下有隠居行義才徳髙逺晦蹤丘園不求聞逹者委所在長吏具名聞奏當備禮邀致諸色人中有賢良方正直言極諫及博通墳典逹於教化幷識洞韜畧堪任将帥者委常叅官及所在長吏聞薦天下孤老鰥寡惸獨不能自活者幷委州縣長吏量事優䘏其有年九十已上者刺史縣令就門存問義夫節婦孝子順孫旌表門閭終身勿事大兵之後内外耗竭貶食省用冝自朕躬朕當節乘輿之服御絶宫室之華飭率已師儉為天下先諸貢獻自非供宗廟軍國之用一切並停應内外官有冗貟及百司不急之資委中書門下即商議條件停减奏聞布澤行賞抑惟舊章今以餘孽未平帑藏空竭有乖慶賜深愧于懐赦書有所未該者所司類例條件聞奏唐穆宗文恵皇帝戒勵風俗徳音文元稹敇朕聞昔者卿大夫相與譲于朝士庶人相與譲于齒周成王刑措不用漢文帝耻言人過眞理古也朕甚慕焉中代以還争端斯起掩抑其言則專蔽誘掖其説則欺誣自非責實循名不能彰善癉惡故孝宣必有敢告乃下光武不以詭辭遽行語稱訕上之非律有匿名之禁皆所以防三至之毁重兩造之明是以爵人于朝則皆勸刑人于市則皆懼罪有歸而賞有事也末俗偷巧内荏外剛卿大夫無進思盡忠之誠多退有後言之謗士庶人無切磋琢磨之益多銷鑠浸潤之讒進則諛言謟􅀢以相求退則羣居狎處以相識留中不出之請益發其隂私公論不容之詞實生於朋黨擢一官則曰恩皆自我黜一職則曰事出他門比周之跡已彰尚矜介特由徑之蹤盡露自謂貞方居省寺者不能以勤恪莅官而曰務求簡易提紀綱者不能以凖繩檢下而曰宻奏風聞獻章䟽者更相是非備顧問者互有憎愛苟非秦鏡照膽堯羊觸邪時君聼之安可不惑參㫁一謬俗化益訛禍發齒牙言生枝葉率是道也朕甚憫焉我國家貞觀開元同符三代風俗歸厚禮讓並行兵興已來人散乆矣姑欲導之以徳不欲驅之以刑然而信或未孚理有未至曽無耻格益用彫刓小則綜覈之權見侵于下軰大則機宻之重旁撓于薄徒尚念因而化之亦既去其尤者而宰臣等懼其寖染未克澄清備引祖宗之書願垂戒勵之詔遂申教告頗用殷勤各當自省厥躬與我同􅔄于道凡百多士宜體朕懐唐徳宗神武皇帝賜李納田悦王武俊鐵劵文陸贄維興元元年嵗次甲子正月癸酉朔二日甲戌皇帝咨爾具官某嗚呼君者所以撫人失於所撫則叛下者所以奉上乖于所奉則刑各當其理徳用不擾各違其分亂于是生朕徳薄化淺昧於君道罔知省已姑務𤯝人是以徴師徂征連歳靡息惟爾以誠志之不逹反仄于厥衷阻衆興戎結舋拒守豈非上失其所撫而下失于所奉歟書曰萬方有罪罪在朕躬我實不徳兆民非咎俾廢其生業離其室家陷于困窮死於戰陣老病失養孤惸靡依怨結蒼旻感傷和氣朕為人父母得不愧于心哉晨興以思夕惕以悼粤自嗣位迄今六年天將悔禍朕方覺悟爾亦知之衆心厭亂思以保安叶於朕懐若膺符契非天地合徳人神合謀將茂育羣生則何以臻此朕是用上順天意俯従人心滌爾疵瑕復爾爵位坦然靡阻君臣如初功載鼎彞名藏王府子孫代代為國勲臣河山帶礪傳祚無絶朕方布大信承天子人若食其言何以享國於戲其祇若明命用保無疆之休唐文粹巻三十一欽定四庫全書唐文粹巻三十二宋姚鉉編文乙總一十三首帝王
