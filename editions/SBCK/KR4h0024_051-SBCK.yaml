body:
  text: 吳興姚鉉纂碑二記碑隂文附揔九首聖帝一虞帝廟碑張謂先聖六處州孔子廟碑韓愈河中府文宣王廟碑常仲孺衮州曲阜縣宣聖廟碑李邕扶風縣文宣王廟記附程浩書處州韓吏部孔子廟碑隂附杜牧謁夫子廟文附李觀大儒二文中子碑皮日休文中子碑司空圖虞帝廟碑銘并序張謂堯有天下七十載將遜于位乆難其人伯支許由全其節而固讓羲仲龢叔審其才而固辭帝德合於天天命歸於帝帝盡善也我其試哉由是賔于四門納于百揆星辰合度雷雨不迷堯之二女􅁵降於内堯之九男服勤於外受昭華之玉允洽人神泥封祀之金大報天地五臣皆進明賞也四族咸黜明刑也先質后文敦俗也貴德尚齒􅄖賢也于斯之時君明於上人化於下山川􅀑神亦莫不寧鳥獸魚鼈衆乎咸􅀂無爲而治其聖也歟夫以萬乗之尊一人之貴多見軼其軌度少能窒其嗜欲瑶臺瓊室堯舜則茅茨土階矣玉食寶衣堯舜則藜羮皮裘矣歷代多嬪御堯舜顧禮經娶一姓矣自古好征伐堯舜舞干戚懷四夷矣百姓樂堯舜未甞不樂百姓憂堯舜未甞不憂曆數之來人以位授我謳歌之去我以位授人其來也嬰於樊籠其去也脫於桎梏形神非吾有天地之委和子孫非吾有天地之委蛻此其所以禪代也近日曹丕父子世爲漢賊當鼎易之時發荒唐之論高視前古大夸羣雄猥以漢魏之間輒同堯舜之際此河伯不知於海􅀂盜跖自方於仲尼也古人云堯以義終舜以勤死稽諸祀典永爲世敎游夏之徒豈誣也哉稱堯見囚小儒之虚誕爲禹所放曲士之穿鑿攻乎異端斯害也巳九疑北麓三湘南澨帝之遺廟存焉地僻易蕪徒生荆􅁄水深難渉誰薦蘋蘩先聖不祀後賢之過攝邵陽令前監察御史宇文宣大樹風敎小康􅀺元相岡巒移棟宇前豁林莽得爽塏之地焉下指城隅見祈禱之人焉如或宣室言徴閟宫靈降娥英近侍稷契旁趨則歌南風覲東后朝衆聖㑹羣臣則知湯武不敢升堂自愧于廊廡之下高光不敢及戸退慙于閫閾之外成康文景帝所譏焉謂也無孔氏之祖述有顔子之希慕作頌於淸芬勒文於玄石其銘曰系自顓頊家于勾芒大口竒表重瞳異相俗變山中風移河上其器不窳其人皆讓二年成邑三年成都惟彼陶唐禪于有虞域中交㤗天下昭蘇彩鳯聽樂黃龍負圖其德難名元功不宰脫屣城闕遺形江海陵廟有依山川無改象耕未輟鳥耘猶在託此巖阿神心􅀂何蒸甞昔少俎豆今多百越迢遥九疑嵯峨湘雲古色楚水新波庭羅松桂森􅀂容衛檐度風飈宛如簫韶􅀺庶以寧隂陽以調慿兹聖靈祚我皇朝處州孔子廟碑韓愈自天子至郡邑守長通得祀而徧天下者惟社稷與孔子焉然而社􅀕土稷祭榖勾龍與棄乃其佐享非其專主又其位所不屋而壇豈如孔子用王者禮巍然當座以門人爲配自天子而下北面拜跪薦祭進退誠敬禮如親弟子者矧勾龍棄以功孔子以德固自有次第哉自古多有以功德得其位者不得常祀勾龍棄孔子皆不得位而得常祀然其祀事皆不如孔子之盛所謂生人巳來未有如孔子者其賢過於堯舜逺者此其效歟郡邑皆有孔子廟或不能修事雖設博士弟子或役於有司名存實亡失其所業獨處州刺史鄴侯李繁至官能以爲先旣新作孔子廟又令工改顔回至子夏十人像其餘六十子及後大儒公羊高左丘明孟軻荀況伏生毛公韓生董生高堂生楊雄鄭玄等數十人皆圖之壁選博士弟子必皆其人又爲置講堂敎之行禮肄習其中置本錢廪米令可繼處以守廟成躬率吏及博士弟子入學行釋菜禮耆老歎嗟其子弟皆興於學鄴侯尚文其於古記無不貫達故其爲政知所先後可歌也已乃作詩曰惟此廟學鄴侯所作厥􅀄􅋻下神不以宇先師所處亦窘寒暑乃新斯宮神降其獻講讀有常不誡用勸揭揭元哲有師之尊羣聖嚴嚴大法以存像圗孔肖咸在斯堂以瞻以儀俾不或忘後之君子無廢成美􅅣詞碑石以賛攸始河中府新修文宣王廟碑常仲孺立於水成於氣以位天地勇於震奮於乙是生萬物天地之大萬物之多􅀂無聖人誰與凖繩故能範而不過􅀋而不遺者也然則乗時設敎必生大聖以首之庖羲氏甄才煥文君人子天神農以之首於皇而體至道也軒轅氏推筴命官度方順紀顓頊奉之首於帝而法玄德也夏后氏奠山通川因地制賦殷湯繼之首於王而明大化也理亂相資質文代變洎有周而衰焉平桓以還鴻流蕩然非聖人之述易羲農之道消矣非聖人之辯問軒轅之帝衰矣非聖人之刪書夏殷之王微矣非聖人之作春秋周室卑而諸侯僣矣故夫子彰皇繫帝叙王尊周首於儒而開大敎也是知前聖之遺風將絶夫子不得不生中古之彝訓將興夫子不得不作故禮云百代以俟聖人而不惑也有天下者遵其易簡遡其元命可以致於淸靜遵其廣大弘其覆載可以致於雍熈遵其禮讓蹈其夷曠可以致於和平茍或失常滔滔􅁋源德滋非而霸功作矣代易於上敎尊於下運否於旣往位崇於將來形於國而達於家萬樂和而百禮成郁郁洋洋與日月而終矣巨唐敎本六經德懷三古拯大道於旣溺復醇源於巳醨追謚文宣顯用王禮太學之制形于四方貞元五年秋仲上丁元帥司空侍中咸寧王渾公有獻于先師退而言曰斯廟也左廛右署前軍後府晨暮之間諠闐四起非肅雍致敬之地爰命略址于城得南端安焉出其食之中財任閑人之餘力屬役如素十旬而成祠庭有閑薦設有嚴衅落之禮行饗獻之儀具是則賈之􅅝薄師之閱習吏之譏訶寂寥于兹矣噫我公以身柱國竭力戴君齊心孔門稟奉如在易曰化而裁之黙而成之公􅂔和隂陽德㑹幾義又曰其靜也專其動也直公志尚純一行必中正語曰文武之道未墜於地公有全社稷之勲合經緯之用又曰學之無倦行之以忠公有遵理化之勤及人民之信古訓是式新廟弈弈尊異顯赫舉集其門也至哉小子明朝退飛幕府獲祐歎息徘徊敢揚頌聲其辭曰昭昭五星玄文之經浩浩五行元氣之形維上紀下災昬祥明聖人居中百化適成五星九玄醇朴不曜降及堯舜存乎典誥文王旣没孔子乃紹質文異時日月代照肇自開闢澒洞無跡考于六籍窮古盡昔微禹之功水土共融微儒之風華夷濛濛大聖同德垂訓作則山川九州禮樂萬國羲軒之道夫子明之百王纉焉仰而營之夫子之敎巨唐興之皇帝奉焉式而弘之皇帝之化藩翰揚之司空行焉敬而將之肅肅新祠煌煌盛儀祀享不失弦誦以時儒風載揚天地同期兖州曲阜縣宣聖廟碑銘并序李邕甞觀元化隂藏上帝玄造雖道逺不際而運行有符􅀭攉大抵宣考神用逮人統之可復補天秩之將頽其揆一也昔􅃖尤怙賊厥弟驕兵巨力朋徒合緒連禍則皇帝興聖重出羣龍推下濟以君人儆勤略以戡亂逮至橫流方割包山其咨轉死爲魚鱻食不粒則堯禹並跡振拔隱憂導百川康四國粤若殷禮缺周德微宋公用鄫楚子問鼎則夫子卓立粲然成章闢􅀖家之正門播今昔之彞憲此天所以不言而成化聖所以有開而必先其若是者乎故夫子之道消息乎兩儀夫子之德經營乎三代豈徒小􅀃蓋有異聞夫亭之者莫如天藉之者莫如地敎之者莫如夫子且沐其亭而不識其道則不如勿生荷其藉而不由其德則不如勿運故曰消息乎兩儀者也夫博之者莫如文約之者莫如禮行之者莫如夫子且㑹其文而不揚其業則不如勿傳經其禮而不啓其敎則不如勿學上代有以焯序中代有以宗師後代有以丕訓故曰經營乎三代者也噫唐虞之美不必至是賛而大者進聖君也夏桀之惡不必至是擠而毀者激庸君也伊尹之忠不必至是演而數者勉誠節也趙盾之逆不必至是抑而書者誅賊臣也至􅀂論慈廣孝輔仁寵義職此之由於是君臣之位序父子之道明朋友之事興夫婦之倫得雖朗日開覺膏雨潤黷和風淸扇安足喻哉借如九皇繼統而政醇七聖同年而道合雖事業廣運而理齊一時未有薄遊大夫僻居下國德敎旣往言滿方來廟食列􅀖不假手於後續君長萬葉必歸心於素王􅀂此之盛是以騰跨百辟􅀌絶一人曷成名而可稱蓋取興而爲大者也我國家儒敎浹宇文思啓天伸吏曹以追尊建禮官而崇祀侯襃聖於人爵尸奠享於國庠是用大起學流錫􅀋孝行敦恱施於万國光覆彌於胤宗三十五代孫嗣襃聖侯璲芝字藏暉洎族賢元亨等或專門碩儒罔墜于緒或餘波明哲載揚厥聲乃相與合謀曰夫墟墓之地禮曰自哀聽訟之樹詩曰勿翦一則遇事遺愛一則感物允懷矧乎大聖烈風吾祖鴻美故國封井舊居川岳歟宜其悚神馳魄膝行膜拜陳齋祭奠嚴祠樹繚垣以設防刋豐碑以爲表兖州牧京兆韋君珪王國周親人才懿德明啓風俗休有政敎長史河南源晉賔字光國賢操􅀌興淸節特逺納人以禮成俗於師司馬天水狄光字子亮相門開祥雅道踵武聞義必立從事可行録事叅軍東海徐仲連功曹成陽蓋寡疑倉曹大原王道淳弘農楊萬石戸曹愽陵崔少連兵曹范陽張􅀶望法曹安定皇甫佺東海徐光彦工曹滎陽鄭璋叅軍扶風竇光訓及曲阜縣令鴈門田思昭主簿吳興施文蔚清河晏弘楷等宦緒通德儒林秀士升堂覩奥遊聖欽風僉同演成乃共經始其銘曰元天隂騭大明虚鏡神不利􅁋物將與正凡曰投艱在此逢聖吞沙荐虐軒黄底定襄陵兆災夏禹文命周道失序夫子􅀿聘刋詩述史盛禮張樂雅頌穆淸訓詞昭灼片言一字勸善懲惡誘進後人啓明先覺六順㪍興四敎皆作茂功濟古至道維來首出列聖席卷羣才大名震耀廣學天開蒸甞帀宇頌聲窮垓帝念居室以光壽宫建侯于嗣環封厥中孫謀不泯祖德斯崇乃刋聖烈用廣休風扶風縣文宣王廟記程浩天地吾知至廣也以其無所不覆載日月吾知至明也以其無所不照臨江海吾知至大也以其無所不容納料廣以寸管測景以尺圭航大以一葦廣不能逃其數明不能私其質大不能亡其險偉哉夫子後天地而生知天地之始先天地而没知天地之終非日非月光之所及者逺不江不海潤之所浸者􅀶三代禮樂吾知其損益百王憲章吾知其消息君臣以位父子以親家國以肥􅀑神以享道未可詮其有物釋未可證於無生一以貫之我先師夫子夫子聖人也帝之聖者曰堯王之聖者曰禹師之聖者曰夫子堯之德有時而息禹之功有時而窮夫子之道乆而彌芳逺而彌光用之者昌捨之者亡昔否於周今泰於唐不然者何被衮而裳垂旒而王者哉扶風古縣也在京之西環渭之北望標􅀜輔之首雄壓劇秦之大有尉曰􅀽弁者學吞漢臺賢􅀒伊鼎文則變雅行乃矩物其爲政也剛以斷其理身也柔而立迴大君之淸問動賢相之精選夤奉詔㫖廓新祠宇廟閭岑立宫牆鳥趾睟先師於兩楹羅亞聖於十哲砌蘭有主院柏分行徂庭自肅入室加敬陳牲牢而如在閒籩豆而無筭天下大軍之後也時弊而没禮域中小康之前也俗媮而迷歸尚儒以戢兵設義而銷戰使人從善逺惡而不自知大哉􅀽氏之子其用心也至矣邑宰李公才思練達政心和理風聲樹於丕變甿頌樂而不支縣丞主簿尉等琅瑘王畿黍稷公器覽容色窺相公之明鏡整鬐鬛趣相公之龍門雲霄坐馳鳴躍可俟浩自帝郷薄遊鳯翔入境而醉聞佳政告歸而飱味尤績前尉許贄起予能事春秋之徒如何勿書時大曆二年某月日記書處州韓吏部孔子廟碑隂杜牧天不生夫子於中國中國當何如曰不夷狄如也荀卿祖夫子李斯事荀卿一日宰天下盡誘夫子之徒與書坑而焚之曰徒能亂人不􅀂刑名獄吏治世之賢也彼商鞅者能耕能戰能行其法基秦爲强曰彼仁義蝨官也可以置之置之言不用也自董仲舒劉向皆言司馬遷良史也而遷以儒分之爲九曰愽而寡要勞而無功不如道家者流也自有天地巳來人無有不死者海上迂怪之士特出言曰黃帝錬丹沙爲黃金以餌之晝日乗龍上天誠得其藥可如黃帝以燕昭王之賢破强齊幾於霸秦始皇漢武帝之雄材滅六强僻四夷盡非凡主也皆甘其􅀃耗天下􅂢骨肉而不辭至死而不悟莫尊於天地莫嚴於宗廟社稷梁武帝起爲梁國者以筍脯麫牲爲薦祀之禮曰佛之敎性不可殺以天子尊捨身爲其奴散髪布地親命其徒踐之有天地日月爲之主隂陽􅀑神爲之佐夫子巍然統而辯之復引堯舜禹湯文武周公爲之助則其徒不爲劣其治不爲僻彼四君二臣不爲無知一旦不信背而之他仍族滅之儻不主夫子紛紜􅁳昧百家􅃲起是已所是非已所非天下隨其時而宗之誰敢非之縱有非之者欲何所依據而爲其辭是楊墨駢愼巳降百家之徒廟貌而血食十年一變法百年一改敎橫斜高下不知止泊彼夷狄者爲夷狄之俗一定而不易若不生夫子是知其必不夷狄如也韓吏部夫子廟碑曰天下通祀惟社稷與夫子社稷壇而不屋取異代爲配未若夫子巍然當座用王者禮以門人爲配自天子至于庶人親北面師之夫子以德社稷以功固有次第哉因引孟子曰生人巳來未有如夫子者也自古稱夫子者多矣稱夫子之德莫如孟子稱夫子之尊莫如韓吏部故書其碑隂云謁夫子廟文李觀世載儒訓者隴西李氏子觀正詞爲絜執絜爲奠恪以上􅁊撥之十有三祀孟秋之月朔修冕帶問廟而入再拜兩柱之下乃退伏而稱曰於皇夫子之道之德與天地周施與日月合明乃聖乃神炳乎典謨惟王者得之以事神使民庶人得之以不失其死生諸侯得之以事天子卿大夫得之以保禄位怨災不及其身四時得之而序行天下得之而大同然則天地神人之事昭乎夫子之道之德也至矣何小子之所􅀼歎焉斯歎也其惟來學乎其惟乞靈乎曰某不敢然也且夫禮樂浹於明夫子之善道也斯可謂以學矣􅀑神瞰於幽夫子之明靈也斯可謂以敬矣孰敢捨道而來學黷敬而乞靈者乎於是再拜而起徊翔而觀章施足徴像設無諠我廟爼豆我王衣冠夫子得之亦無愧言七十之徒亦公亦侯外如君臣内實討論烝烝小子思得其門夫子聖人天錫元精其未生也􅀂超然神遊與兩氣俱存其旣生也遇三季之㑹飄颻湮淪弦歌之音拊而不和仁義之圖卷而靡陳及相魯而有喜色去宋而曰􅁊魋其如予何聖人之窮乃有如是邪噫俾夫子生於堯之代堯必後舜而先夫子生於舜之代舜則必先夫子而後禹聖人得時化可知也如舜禹生於夫子之年則不過守於田畒之中安有夫子之敎垂於無窮􅀂今日之澶漫者乎惟夫子生實陪臣没乃王爵有聖德也惟紂生實殷辟死曰獨夫有逆德也惟爵謚在德惟德有聖有逆惟聖逆在人不在於尊嗚呼夫子聖人之極歟鳯鳥不至無其時也秦人燒書文之衰也帝唐爵王德之興也惟夫子之德洎唐之德永而能安古而更新降康下民夐有烈光訖無閒然小子忡忡慄慄拜奠而出匪作匪述文中子碑皮日休天不能言隂騭于民民不可縱是生聖賢聖賢之道句德與命符是爲堯舜性與命乖是爲孔顔噫仲尼之化也不及於一國而􅀍于天下不治於一時而霈及萬世非刪詩書定禮樂賛易道脩春秋者乎故孟子疊踵孔聖而賛其道夐出于世而可繼孟氏者復何人哉文中子王氏諱通字仲淹生於陳隋之世以亂世不仕退于汾晉序述六經敷爲中􅀃以行敎于門人夫仲尼刪詩書定禮樂賛易道脩春秋先生則有禮論二十五篇續詩三百六十篇元經三十一篇易賛七十篇孟子之門人有高第弟子公孫丑萬章焉先生則有薛收李靖魏徴李勣杜如晦房玄齡孟子之門人鬱鬱于亂世先生之門人赫赫于盛時較其道與孔孟豈徒然哉設先生生于孔聖之世余恐不在游夏之亞也況七十子歟惜乎德與命乖不及覩吾唐受命而殁茍唐得而用之貞觀之治不在於房杜褚魏矣後先生二百五十歲生曰皮子嗜先生道業先生文讀文中子後序尚闕于賛述想先生封隧所在而爲銘云大道不明天地淪精俟聖暢敎乃出先生百氏黜迹六藝騰英道符眞宰用失阿衡先生門人爲唐之禎差肩哲相接武名卿未踰一紀致我太平先生之功莫之與京文中子碑司空圖道制治之大器也儒守其器者耳故聖哲之生受任於天不可斵之以就其時仲尼不用於戰國致其道於孟荀而傳焉得於漢成四百之祚五胡繼亂極於周齊天其或者生文中于以致聖人之用得衆賢而廓之以俟我唐亦天命也故房衛數公皆爲其徒恢文武之道以濟貞觀治平之盛今三百年矣冝其碑聖魁之柄授必有施臣底之績濟亦厥時子惟善守賦而不私克輸於我貞休之基重校正唐文粹卷第五十一
