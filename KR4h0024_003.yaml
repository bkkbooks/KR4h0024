  text: 重校正唐文粹卷第三
  hash: sha256:e8f945d35eafa7b2ab48ae3911e13d385fe8925e4b7dba7079edeff5ea541898
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0024_SBCK_003-1a}
body:
  text: 吳興姚鉉纂古賦丙揔三首進三大禮賦表杜甫朝獻太清宫賦朝享太廟賦有事于南郊賦天寶十三載進三大禮賦表杜甫臣甫言臣生長陛下淳樸之俗行四十載矣與麋鹿同羣而處浪跡於陛下豐草長林實自弱冠之年矣豈九州牧伯不歲貢豪俊於外豈陛下明詔不仄席思賢於中哉臣之愚頑靜無所取以此知分沈埋盛時不敢依違不敢激訐以漁樵之樂自遣而巳頃者賣藥都市寄食友朋竊慕堯翁擊壤之謳適遇國家郊廟之禮不覺手足蹈舞形于篇章漱吮甘液游泳和氣聲韻􅎊廣卷軸斯存抑亦古詩之流希乎述者之意然辭理野質終不足以拂天聽之崇高配史籍以永乆恐倐先狗馬遺恨九原謹稽首投延恩匭獻納上表進明主朝獻太清宮朝享太廟有事於南郊等三賦以聞臣甫誠惶誠恐頓首頓首謹言朝獻太清宫賦冬十有一月天子旣納處士之議承漢繼周革弊用古勒崇揚休明年孟陬將攄大禮以相籍越彞倫而莫儔歷良辰而戒吉分祀事而孔修營室主夫宗廟乗輿備乎冕裘甲子王以昧爽春寒薄而清浮虚閶闔逗蚩尤張猛馬岀騰蚪捎熒惑墯汀火反旄頭風伯扶道雷公挾輈通天台之雙闕警溟漲之十洲浩劫礨砢萬山颼飀欻臻于長樂之舎嵬入乎崑崙之丘太一奉引庖犧在右堯歩舜趣禹馳湯驟鬱閟宫之嵂崒坼元氣以經構斷紫雲而竦牆撫流沙而承霤紛隳珠而䧟碧㸌波錦而浪繡森青冥而欲雨赩光烱而初晝於是翠㽔俄的藻藉舒就祝融擲火以焚香溪女捧盤而盥漱羣有司之望幸辨名物之難究瓊漿自間於粢盛羽客先來於介胄爍聖祖之儲祉敬雲孫而及此詔軒轅使合符勑王喬以視履積昭感於嗣續匪正辭於祝史若盻蠁之有慿肅風飈而乍起揚流蘇於浮柱金英霏而披靡擬雜佩於曽巓芝蓋欹以颯纚中漎漎以廻復外蕭蕭而未巳上穆然注道爲身覺天傾耳陳僭號於五代復戰國於千祀曰嗚呼昔蒼生纒孟德之禍爲仲達所愚鑿齒其俗窫窳其孤赤烏高飛不肯止其屋黃龍哮吼不肯負其圖伊神器臬兀而小人呴喻曆紀大破瘡痍未蘇尚攫拏於吳蜀又顚躓於羯胡縱羣雄之發憤誰一統於亨衢在拓跋與宇文豈風塵之不殊比聦瘣及堅特渾貔豹而齊驅愁隂鬼嘯落日梟呼各擁兵甲俱稱國都且耕且戰何有何無惟累聖之徽典恭淑愼以允緝兹火土之相生非符䜟之備及煬帝終暴叔寶𥘉襲編簡尚新義旗爰入旣清國難方覩家給竊以爲數子自誣敢貞乎五行攸執而觀者潛晤或喜至於泣矧鱗介以之鳴簴昆蚑以之振蟄感而遂通罔不具集仡神光而􅛦闞羅詭異以戢孴地軸傾而融曵洞宫儼以嶷岌九天之雲下垂四海之水皆立鳯鳥威遲而不去鯨魚屈矯以相吸掃太始之含靈卷殊形而可挹則有虹蜺爲鈎帶者入自於東揭莽蒼履崆峒素髪漠漠至精濃濃條㢮張於巨細覬披冩於心胷蓋脩竿無隙而仄席巳容裂手中之黑簿睨堂下之金鍾得非擬斯人於壽域明返樸於玄蹤忽翳日而翻萬象卻浮空而留六龍咸讋跖而壯兹應終蒼黃而昧所從上猶色若不足處之彌恭天師張道陵等洎左玄君者前千二百官吏謁而進曰今王巨唐帝之苗裔坤之紀綱土配君服宫尊臣商數起得統特立中央且大樂在懸黃鐘冠八音之首太昊斯啓青陸獻千春之祥曠哉勤力耳目冝乎大帶斧裳故風后孔甲充其佐山稽𡵨伯翼其傍至於易制取法兄以朝登五帝夕宿三皇信周武之多幸存漢祖之自強且近朝之濫吹仍改卜乎祠堂𥘉降素車終勤恤其後有客白馬固漂淪不忘伊庶人得議寔邦家之光臣道陵等試本之於青簡探之於縹囊列聖有差夫子聞斯於老氏好問自乆宰我同科於季康敢撥亂返正乃此其所長萬神開八駿㢠旗掩月車畜雷騫七曜燭九垓能事頴脫清光大來或曰今太平之人莫不優游以自得況是蹴魏踏晉批周抉隋之後與乎更始者哉朝享太廟賦𥘉高祖太宗之櫛風沭雨勞身焦思用黃鉞白旗者五年而天下始一歷三朝而戮力今庶績之大備上方采尨俗之謡稽正統之類蓋王者盛事臣聞之於里曰昔武德巳前黔黎蕭條無復生意遭鯨鯢之蕩汨荒歲月而沸渭衮服紛紛朝廷多門者仍亘乎晉魏臣竊以自赤精之衰歇曠千歲而無眞人及黃圖之經綸息五行而歸厚地則知至數不可以乆缺凡材不可以長寄故高下相形而尊卑各異惟神斷繫之於是本先帝取之以義壬辰旣格于道祖乗輿即以是日致齋于九室所以昭達孝之誠所以明經天之質具禮有素六官咸秩大輅每岀或黎元不知豐年則多而筐宫甚實旣而太尉叅乗司僕扈蹕望重闉以肅恭順法駕之徐疾公卿淳古士卒精一黕宗廟之愈深抵職司之所密宿翠華於外戸曙黃屋於通術氣凄凄於前旒光靡靡於嘉栗階有賔阼帳有甲乙升降之際見玉柱生芝擊拊之𥘉覺鈞天合律簨簴仡以碣磍干戚宛而婆娑鞉鼓塤箎爲之主鍾磬竽瑟以之和雲門咸池取之至空桑孤竹貴之多八音循通旣比乎旭日升而氣埃滅萬舞陵亂又似乎春風壯而江海波鳥不敢飛而玄甲􅝧嵺以岳峙象不敢去而鳴佩剡爚以星羅巳而上乾豆以登謌美休成之旣享璧玉儲精以稠疊門欄洞豁而森爽黒帝歸寒而激昻蒼靈戒曉而來往熈事莽而充塞羣心麌以振蕩桐花未吐孫枝之鸞鳳相鮮雲氣何多宫井之蛟龍亂上若夫生弘佐命之道死配貴神之列則殷劉房魏之勲是可以中摩伊吕上冠䕫卨代天之工爲人之傑丹青滿地松竹高節自唐興巳來若此時哲皆朝有數四名垂卓絶向不遇返正撥亂之主君臣父子之别弈葉文武之雄注意生靈之切雖前輩之温良寛大豪俊果決曽何以措其筋力與韜鈐載其刀筆與喉舌使祭則與食則血若斯之盛而巳爾乃直于主索于祊警幽全之物散純道之精蓋我后常用惟時克貞膋以蕭合酌以茅明嘏以慈告祝以孝成故天意張皇不敢殘其瑞神姦妥怗不敢秘其精而撫絶軌享鴻名者矣于以奏永安于以奏王夏福禳禳於絳闕芳霏霏於玉斚舜祠宗廟以玉斚也沛枯骨而破聾肓施殀胎而逮鰥寡園陵動色躍在藻之泉魚弓劒皆鳴汗鑄金之風馬霜露堪吸禎祥可把曽宫歔欷隂事儼雅薄清輝於鼎湖之上靜餘響於蒼梧之下窅然漠漠惕然兢兢紛益所慕若不自勝瞰牙旗而獨立吟翠駮而未乗五老侍祠而精駭千官逖聽而思凝於是二丞相進曰陛下應道而作惟天與能澆訛散淳朴登尚猶日愼業業孝思烝烝恐一物之失所懼先王之咎徴如此之勤恤匪懈是百姓何以報夫元首在臣等何以充其股肱且如周宣之敎親不暇孝武之淫祀相仍諸侯敢於迫脅方士奮其威稜一則以微言勸内一則以輕舉虚馮又非陛下恢廓緒業其瑣細亦曷足稱丞相退上跼天蹐地授綏登車伊澒洞槍櫐先出爲儲胥本枝根株乎萬代睿想經緯乎六虚甲午方有事於綵壇紺席宿夫行所如初有事于南郊賦蓋主上兆於南郊聿懷多福者舊矣今兹練時日就陽位之美又所以厚祖考通神明而巳職在宗伯首崇禋祀先是春官修頌祗之書獻祭天之紀令泰龜而不昧俟萬事之將履掌次閱氊邸之則封人考㙺宫之旨司門轉致乎牲牢之繫小胥專達乎懸位之使二之日朝廟之禮旣畢天子蒼然視於無形澹然若有所聽又齋心於宿設將旰食而匪寧旌門坡陀以前騖彀騎反覆以相經頓曽城之軋軋軼萬戸之熒熒馳道端而如砥浴日上而如萍製翠毛於華蓋之角彗黃屋於勾陳之星神仙戍削以落羽魍魎幽憂以固扄戰岐慄華擺渭掉涇地回回而風淅淅天泱泱而氣青甲胄乗陵轉迅雷於荆門巫峽玉帛清逈霽夕雨於瀟湘洞庭於是乗輿霈然乃作翳夫鸞鳳將至以冲融寥廓不可乎彌度聲明通乎純粹溟涬爲之垠堮駟蒼螭而蜿蜒若無骨以柔順奔烏攫而􅉳蟉徒有勢於殺縛朱輪竟野而杳冥金鋑成隂以結絡吹堪輿以軒輊槍寒暑以前卻中營密擁乎太陽宸眷眇臨乎長薄熊羆弭耳以相舐虎豹高跳以虚攫上方將降帷宫之綝縭屏玉車犬以蠼略人門行馬以拱乎合沓之場皮弁大裘始進於穹崇之幕衝牙鏗鏘以將集周衛轇轕而咸若月窟黑而扶桑寒田燭稠而曉星落肅定位以告絜藹嚴上而清超雲菡蓞以張蓋春葳㽔以建杓簪𥚑斐斐樽爼蕭蕭方面曲折周旋寂寥必本於天王宫與夜明相射動而之地山林與川谷俱標於是乎官有御事有職所以敬鬼神所以勤稼穡所以報本反始所以度長立極玄酒明水之上越席䟽布之則必取先於稻秫麴蘖之勤必取著於紛純文繡之飾雖三牲八簋豐備以相㳂而蒼璧黃琮實歸乎正色先王之丕業繼起信可以永其昭配羣望之徧祭在斯示有以明其翼戴由是播其聲音以陳列從乎節奏以進退韶夏頀武采之於訓謨鍾石陶匏具之於梗槩變萬形於動植聽宫徴於砰礚英華發外非因乎簨簴之高和順積中不在乎雷鼔之大旣而臠骨胿罥柴燎窟塊騞擘砉赫葩斜晦潰電纒風升雪颯星碎拂勿侹濙眇溟蓯淬聖慮岑寂玄黃増霈蒼生顒昻毛髮清籟雷公河伯或􅛖騃以脩聳霜女江妃乍紛綸而晻曖執紱秉翟朱干玉戚鼓瑟吹笙金支翠旌神光倐歛祀事虚明於是涾乎渙汗紆餘乎經營浸朱崖而灑朔漠洶晹谷而濡若英耆艾涕而童子儛叢棘坼而狴牢傾是率土之濵覃酺醵以涵泳非奉郊之縣獨宴慰以縱横玄澤淡泞乎無極殷薦綢繆乎至精稽古之時屢應符而合契聖人有作不逆寡而雄成爾乃孤卿侯伯羣儒三老儼而絶皮軒趨帳殿稽首曰臣聞燧人氏巳往法度難知文質未變太昊氏繼天而王根啓閉於厥𥘉以木傳子攄終始而可見洎虞夏殷周兹煥炳而葱蒨秦失之於狼貪蠶食漢綴之以蛇斷龍戰中莽茫茫夫何從聖蓄縮曽不下眷伏惟道祖視生靈之磔裂醜害馬之蹄囓呵五精之息肩考正氣之無轍協夫貽孫以降仗之造命更挈累聖昭洗中祚觸蹶氣慘黷乎暗夜之妖勢廻薄乎龍蛇之孽伏惟陛下勃然憤激之際天關不敢旅拒鬼神爲之嗚咽高衢騰塵長劒吼血尊卑配宇縣刷挿紫極之將頽拾清芬於巳缺鑪以之仁義鍜以之賢哲聮祖宗之耿光卷夷狄之彯撇蓋九五之後人人自以遭唐虞四十年來家家自以爲稷卨王綱近古而不軌天聽貞觀以高揭蠢爾差僭粲然優劣冝其課密於空積忽微刋定於興廢繼絶而後覩數統從首八音六律而惟新日起筭外一字千金而不滅上曰吁昊天有成命惟五聖以受我其夙夜匪遑寔用素樸以守于嗟乎麟鳳胡爲乎郊藪豈上帝之降鑒及兹玄元之垂𥙿于後夫聖以百年爲鶉􅑹道以萬物爲芻狗今何以茫茫臨乎八極眇眇託乎羣后端䇿拂龜於周漢之餘緩歩闊視於魏晉之首斯上古成法蓋其人巳朽不足道也於是天子黙然而徐思終將固之又固之意不在抑殊方之貢亦不必廣無用之祠金馬碧雞非理人之術珊瑚翡翠此一物何疑奉郊廟以爲寶増怵惕以孜孜況大庭氏之時六龍飛御之歸重校正唐文粹卷第三
