body:
  text: 表奏書疏甲總一十三首表尊號二請上尊號表韓愈賀册尊號表肆赦一為桂州王珙中丞賀赦表令狐楚政事一奉天論延訪朝臣表陸贄獻事五為陳王卿進續尚書表蕭潁士進渾儀表張説為東平薛太守進王氏瑞詩表髙適進張巡中丞傳表李翰為并州長史張仁亶進丸鼎銘表吳少微配祭一論郊祭合設皇地祗表賈曽教化一請行禮樂化導三事表裴耀卿請削爵一抑損外戚一為敬暉等論武氏宜削去王爵表岑羲請抑損外戚權寵并乞佐外郡表武平一請上尊號表臣某言臣得所管國子太學廣文四門及書算律等七館學生沈周封等六百人狀稱身雖賤微然皆以選擇得備學生讀六藝之文脩先王之道粗有知識皆由上恩今天子整齊乾坤出入神聖經營乎無為之業㳺息乎混元之宫不謀於廷不戰於野坐收兾部旋定幽都析木天街星宿清潤北嶽醫閭神鬼受職地彌天區界軼海外舜之十有二州周之七百餘國章亥所步禹契所書四面輻湊各脩貢職西戎之首北虜之渠怚威愧徳失據狼狽收其種落逃遁逺去來獻羊馬千里不絶功既如此徳又如彼爰初嗣位首去姦孽隨所顧指應時清寧哀天下之鰥寡釋四海之鬱結左右前後其非俊良小大之材咸盡其用無所誅詰一和以仁由是五糓嵗登百瑞時見六府三事惟序惟歌昔者媧皇殺黑龍以濟冀州堯誅九嬰以定下土血兵刓刃僅就厥功以方吾君一何逺也堯之在位七十餘載戒飭咨嗟以致平治孔子之聖自云三年有成今自嗣位已來嵗有餘耳臻此功徳其何捷哉置郵傳命未足以諭以非常之功襲尋常之號以冠古之美屈守文之名臣子之誠闕而不奏天號人稱不滿事實斯亦縉紳先生之過也謂臣官居師長不言謂何考其所陳中於義理天人合願不謀而同非臣之愚所敢隠蔽輙冒死以聞伏乞天恩特允誠志令公卿大夫得竭思慮取正於經以定大號有司備禮擇日以頒天下幸甚天下幸甚賀册尊號表臣某言伏聞宰相公卿百官及闗輔百姓耆耋等以陛下功崇徳鉅天成地平宜加號於殊常以昭示於來載陳請懇至于再于三陛下仰稽乾符俯順人志乃以新秋首序令月吉辰發揚鴻休膺受顯册天人合慶日月揚光環海之間含生之類誠歡誠喜頓首頓首臣聞體仁以長人之謂元發而中節之謂和無所不通之謂聖妙而無方之謂神經緯天地之謂文戡定禍亂之謂武先天不違之謂法天道濟天下之謂應道伏惟元和聖文神武法天應道皇帝陛下子育億兆視之如傷可謂體仁以長人矣喜怒以類刑賞不差可謂發而中節矣明照無私幽隠畢達可謂無所不通矣發號出令雲行雨施可謂妙算無方矣三光順軌草木遂長可謂經緯天地矣除剗寇盜㝢縣清夷可謂戡定禍亂矣風雨以時祥瑞輻湊可謂先天而天弗違矣國内無饑寒四夷皆朝貢可謂道濟天下矣衆美備具名實相當赫赫巍巍超今冠古方當議明堂辟雍之事撰泰山梁父之儀摉三代之逸禮補百王之漏典時乗六龍肆覲東后微臣幸生聖代觸犯刑章假息海隅死亡無日瞻望宸極心魂飛揚有永棄之悲無自新之望曽不得與鳥獸率舞蠻夷縱觀茹痛銜酸且愧且恥無任感恩戀闕懇廹彷徨之至謹奉表陳賀以聞為桂州王珙中丞賀赦表令狐楚臣某言伏奉十一月十日制書南郊大禮畢大赦天下者湛恩厖鴻大號渙汗際天接地孰不慶幸臣某中謝臣聞禘嘗之禮所以仁祖禰也郊社之義所以尊天地也五帝之前蕢桴土鼓致其敬敬有餘矣而禮不足三王已降金罍玉斚備其儀儀有餘矣而敬不聞秦之増封也覬望神仙漢之郊丘也穰除災害雖無文而咸秩終有廢而莫舉猶可以編在方册垂其鴻名豈若國家參文質于六經之中陛下酌損益於百代之後順昊天之成命得黎人之懽心九糓有年四方無事然後因吉土迎長日咸池屢奏太簇登歌萬靈識周旋之位百神知饗獻之節雲散而柴燔髙達風清而蕭薌逺聞信大報之無私亦𤣥鑒之不昧臣當時集軍將官吏僧道百姓等丁寧宣示訖惟天之意莫遺於微細如日之輝不隔於幽逺頑豔知感鬼神懐柔何者刑莫大於成獄陛下捨之罪無輕重恩莫深於延賞陛下推之澤及存殁行道求志敢於直言者既許以親覽觸綸罣網屏在逺方者又移之近郊減來嵗之新租昭其儉也棄比年之逋債𢎞諸仁也念勲臣而樹勲者益勸尊有徳而不徳者知慙賜羸老有粟帛之優禮神祗無牲幣之愛此所謂幽室盡曉枯條徧春雷雨作而蟄蟲昭蘇風雲行而籠鳥飛舞率土臣妾不勝大慶况臣蒙被恩澤獲齒生類㑹守逺郡阻窺盛禮徘徊天外目與心斷無任抃躍之至謹遣突將王清朝等奉表陳賀以聞奉天論延訪朝臣表陸贄臣某言賊泚逋誅尚穴宫禁陛下思戀宗廟痛傷黎元仁孝交感至於憤激猥以急務下詢微臣臣雖鄙儒尊慕行義荷陛下知已之遇感陛下思理之誠愚衷所懐承問輙發不以淺深自揆不以喜怒上虞誠缺於周防承順之親是亦忠於陛下一至之分也前奉詔問尋具上陳請延羣臣稍與親接廣咨訪之路開諫諍之門通壅鬱之情𢎞採拔之道自獻荅奏迨兹彌旬不聞施行不賜詶詰未審宸㫖以為如何如昧於忖量但務竭盡恐由辭理蹇拙不能暢達事情慺慺血誠復願披瀝頻煩黷冒豈不慙惶盖犬馬感恩思效之心睠睠而不能自止者也臣聞立國之本在乎得衆得衆之要在乎見情故仲尼以為人情者聖王之田理道所由生也是則時之否泰事之損益萬化所繫必因人情情有通塞故否泰生情有厚薄故損益生通天下之情者莫智於聖人盡聖人之心者莫測於易象其列卦也乾下坤上乃為泰乾上坤下則曰否其取象也損上益下則曰益損下益上乃為損乾為天為君坤為地為臣天在下而地處上於位乖矣而反謂之泰者上下交故也君在上而臣處下於義順也而反謂之否者上下不交故也氣不交則庶物不育情不交則萬邦不和天氣下降地氣上騰然後嵗功成君澤下流臣誠上達然後理道立損益之義亦由是焉上約已而裕於人人必悦而奉上矣其不謂之益乎上蔑人而肆於已人必怨而叛上矣其不謂之損乎然則上下交而泰不交而否自損者人益自益者人損情之得失豈容易哉故喻君為舟喻人為水言水能載舟亦能覆舟也舟即君道水即人情舟順水之道乃浮違則殁君得人之情乃固失則危是以古先聖王居人之上也必以其心從天下之心而不敢以天下之人從其欲乃至兢兢業業一日萬㡬夫㡬者事之微也以聖人之徳天子之尊且猶慎事之微乃至一日萬慮豈不以居上接下懼失其情歟書曰人心唯危道心唯微微則萬㡬之慮不得不精也危則覆舟之誡不可不畏也夫揆物以意宣意以言言或是非莫若考於有跡跡或成敗奠若驗於已行自昔王業盛衰君道得失史册盡在粲然可徴與衆同欲靡不興違衆自用靡不廢從善納諫靡不固逺賢恥過靡不危故詩書稱堯之徳則曰稽于衆捨已從人數舜之功則曰明四目達四聰言務同欲也序禹之所由興則曰益賛于禹禹拜昌言述湯之所以王則曰用人惟已改過不吝言能納諫也歌文王作周則曰濟濟多士文王以寧美武王克殷則曰亂臣十人同心同徳言皆從善也堯舜禹湯文武此六君子天下之盛王也莫不從諫而輔徳詢衆以成功是則徳益盛而慮益微功愈髙而意愈下及代之衰也則道亦反焉故書曰紂有億兆夷人離心離徳言違衆也詩曰汝炰烋于中國斂怨以為徳不明爾徳時無背無側爾徳不明以無陪無卿又曰雖無老成人尚有典刑曽是莫聴大命以傾言逺賢也書曰謂人莫已若者亡詩曰惟彼不順自獨俾臧自有肺腸俾民卒狂言自用也前史數桀紂之惡曰智足以拒諫言足以飾非言恥過也考得失於已行之跡鑑盛衰於已驗之符孰失道而不衰孰得理而不盛相應以類響影不差敢不則而象之敬而畏之乎自秦漢暨于周隋其間將厯千載代興者非一姓繼覆者非一君雖所遇殊時所為異跡然失衆必敗得衆必成與堯舜禹湯同務者必興與桀紂幽厲同趣者必覆多同於善則功倍多同於惡則禍甚善惡同類端如貫珠成敗象行明若觀火此厯代之元龜也尚恐議者曰時異事殊臣請復為陛下粗舉近效之尤革者以辨焉太宗文皇帝以天縱之才有神器之重武定禍亂文致太平威行如雷霆明照侔日月英略施於百勝聖功被於九歌固非庶品之所度量常情之所鑚仰然猶競競畏慎懼失人心每戒臣下獻規恒以危亡為慮夙興聴理日旰亡勞公卿迭進廷奏庶務評議得失與衆共之下無滯情上無私斷退朝之暇與接侍臣咨訪謀猷詢求過闕或論往古成敗或問人間事情每言及暗主亂朝則省懼自戒言及賢君理代則企竦思齊言及稼穡艱難則上下相匡務遵勤儉言及閭閻疾苦則君臣同慮議息征徭懋徳懲違觸類滋長尚恐過言謬舉既往難追每召宰輔平章必遣諫官俱入小有頗失隨即箴規得一善必遽命甄昇聴一諫必明加襃錫故得時無闕事人論輸誠又引文學之流更直宿於内署或講求典禮或諷誦詩書每至夜分情忘厭倦伏以太宗之徳美貞觀之理安且猶務得人心其勤若此是則人之於理道可一日不接乎髙宗初年亦親聴納故當時翕然歸美以為有貞觀之風兼頼遺澤在人先範垂裕幸無改作俗以阜康數十年間天下無事承平之業滋久倦怠之意頗彰燕居益深接下彌簡前哲之耿光寖逺中官之威柄潜移卒有嗣聖臨朝天授革命豈不以經邦之道闕疇咨於大猷宴安之懐溺偏信於近狎馴致禍變㡬將傾危雖亂匪自他然其失一也弊俗一靡餘風遂流訖神龍景雲之間皆嬖倖亂朝忠義不達𤣥宗躬定大難手振宏綱開懐納忠克已從諫尊用舊老廣採羣才大臣不敢壅下情私服不敢干公議朝清道泰垂三十年謂化已成謂安可保耳目之娛漸廣憂勤之志稍衰侈心一萌邪道並進貪權竊柄者則曰徳如堯舜矣焉用勞神承意趣利者則曰時已太平矣胡不為樂有深謀逺慮者謂之迂誕驚衆有讜言切議者謂之誹謗邀名至尊收視於穆清上宰養威於廊廟諫曹以頌義為奉職法吏以識㫖為當官司府以厚斂為公忠權門以多賂為問望外寵持竊國之勢内寵擅迴天之淫禍機熾然燄燄滋甚舉天下如居積薪之上人人懼焚而朝廷相蒙曽莫之省日務逰宴方謂有無疆之休大盜一興至今為梗豈不以忽於戒備逸於居安憚忠鯁之怫心甘諛詐之從欲漸清不聞其失以至於大失乎肅宗懲致寇之由藴撥亂之略虚受廣納同符乎太宗招延詢謀輟食廢寢洞啓城府推心與人豁披胷襟忘已應物故得來蘇之望允塞配天之業勃興先皇帝繼守恭勤而益之以和惠惠則有感和則有親雖時經艱屯而衆不離析理尚寛大務因循而重改作然於紫宸聴朝常限三人奏事時亦宣諭徳令課責侍臣或賞其盡規或含以容黙性本仁恕事多𢎞讓諫雖未從且不深忤情苟有阻終獲上通故君臣相安而人亦小息陛下英姿逸辨邁絶人倫武略雄圗牢籠物表憤積習以妨理任削平而在躬以明威照臨以嚴法制斷流弊自乆浚恒太深逺者驚疑而阻命逃死之亂作近者畏懾而偷容避罪之熊生君臣意􅆾上下情隔君將務理而下防誅夷臣將納忠又上慮欺誕故睿誠不布於羣物物情不達於睿聰臣於往年曽任御史獲奉朝謁僅欲半年陛下嚴邃髙居未嘗降㫖臨問羣臣跼蹐趨退亦不列事奏陳軒墀之間且未相論宇宙之廣何由自通雖復列對使臣别廷宰輔既殊師錫且異公言未行者則戒以樞密勿論已行者又謂之遂事不諫漸生拘礙動涉猜嫌由是人各隠情以言為諱至於變故將起億兆同憂獨陛下恬然不知方謂太平可致陛下以今日之所覩驗往時之所聞孰真孰虚何得何失則事之通塞備詳之矣人之情偽盡知之矣列聖升降之效厯厯如彼當今理亂之由昭昭如此未有不興於得衆殆於失人裕於僉諧蔽於偏信濟美因乎納諫虧徳由乎自賢善始本乎憂勤失人萌乎安汰今陛下將欲悔禍徼福去危從安若不循太宗創業之規襲肅宗中興之理鑑天寳致亂之所以懲今者遷幸之所因則何以孚聖懐揚令聞新逺邇之聴歸反側之心乎前承徳音訪及庸鄙敢縁斯義輙以獻聞自爾以來反覆千慮愚智有分信非可移至今拳拳猶滯所見不勝愚誠懇款謹復布露以聞臣惶怖死罪謹言為陳正卿進續尚書表蕭潁士臣某言林莽介賤幼而强學竊聞諸大易之説曰觀乎天文以際時變觀乎人文以化成天下察乎變者立徳以貞其彖成乎化者立言以賛其功故太極列三階五緯於上聖人著三墳五典於下至哉文乎天人合應名數指歸之大統也今之言文字者始於大昊徵訓典者本於唐堯振頽綱者孰若漢朝興盛言者莫如聖代是則太昊朕之軒轅章之唐堯祖之虞舜述之漢髙作之光武維之祖宗開之陛下固之臣愚以為太昊至於我髙祖太宗軒轅至於我開元聖文神武皇帝陛下稱廣運者四代繼成功者四君咸宜昭布睿典光熙徳政矣然則伏羲創文籍黄帝立史官太古淳奥權輿朴略至陶唐氏而後大備故孔子美之曰堯之為君也煥乎其有文章由是叙帝王之書首唐虞之典於堯則曰欽明文思於舜則曰誕敷文徳文之時義大矣哉夏商已後徳弗及舜仲尼雜目其書不為典言未能察變成化比唐虞之際也何則夏之興也泣辜殊於至理殷之興也慙徳乖於雅樂周之興也謂武微於盡善其不為帝典宜矣凌夷僣亂以暨暴秦剗亂墳籍瞽龍兆庶王者之風殄矣生人之道窮矣天之未䘮斯文也帝道復興於漢家數百年間而憲章具舉夫其推步律厯帝堯分命之典也増修封禪帝舜時巡之義也約三章之法以正咎繇之刑班四時之舞以纉后夔之樂臣竊觀三代之作貽範垂訓體國綏人雖載祀延長徳澤深逺皆因循轍迹故弗易其事孔子曰殷因於夏禮周因於殷禮所損益可知也未有鍾七雄交戰之末繼六籍焚如之後帝典缺而更張淳風醨而再洽若大漢者也且義帝之䘮三軍縞服異夫湯武放弑其君矣諸吕之亂浹辰底定異夫羿浞之驟移其祚矣中興之盛華戎率服異夫吳楚之僣竊其名矣夫如是有漢之美固可以比肩唐后千載一時之運歟曹馬已還曽何足擬四分五裂朝成暮敗其間雖晉平吳蜀隋舉梁陳混并未㡬危亡荐及法令不足以禁齊人聲明不足以垂後裔其於帝道疎矣又况乎南遷淮海北起獯戎者邪兹又二朝之不若也臣聞乾道運行否終則泰上帝有以輔文明之哲后表光宅之休期必將乗喪亂之極繼驅馳之運故有周之未禮樂崩壊連横合縱俱非正朔則秦氏略定而漢代以興在晉之亡㝢縣崩析南吳北虜各擅名號隋氏削平而聖朝以作此天意也不然何秦隋二葉而亡也如彼唐漢一家之盛也若此於赫盛唐正百王之闕思文陛下光三聖之嗣啟運應期之符弔人伐罪之義制禮作樂之本郊天禪地之位萬庾三登之穰河清海晏之瑞舞七旬而殊俗格歌六律而薰風至故以騰子姒而絶景挹媯祁而髙議矣又何東晉後魏梁陳周齊之足道哉誠宜詔史臣敷帝載炳唐虞之故實黜商周之遺制矣漢氏已略之於前皇唐復曠之於後臣實惜焉知而不述臣子之罪也臣實愚淺竊不自揆敢縁聖朝稽古之道陛下文思之徳耕牧解暇輙復若書討尋載籍于兹一紀今謹上續尚書一部凡若干篇巻始有漢二典次我唐二典以續夫前書堯虞之典也其餘文景明章之後魏晉宋齊已還南訖有陳北起元魏厯周隋洎夫髙氏以至聖朝總一十二代詔䇿章疏頌歌符檄忠臣之正議武士之權謀類而刋之次以年代以續夫夏商秦魯之篇也臣聞古者右史記事左史記言舉其大畧前書之議備矣孔聖沒而微言絶暴秦興而挾書罪雖戰國遺筞舊章駮亂於縱横漢臣著記新體互約於表志其道未者其文雜其才淺者其意煩豈聖人存易簡之㫖盡芟夷之義也昔文宣脩五帝之書究三王之季臣性非天縱學異人師禀生何幸親逢聖代此皆文武聖皇之遺㫖臣愚曷足以知之何者臣嘗伏讀貞觀實録昔太宗因聴政之暇觀覽尚書謂侍臣曰朕每庶希唐虞亦思公等齊肩稷􅆻又曰令數百年外讀我國史豈獨窺兩漢哉臣故知有漢之功業與我唐之代理俱可以繼夫唐虞之盛也伏惟陛下𤣥徳昭升至仁廣被乃二十一年正月制曰各勵精一心共興𤣥化俾蒼生登於仁夀天下還於淳樸愚臣緬述太宗之㫖伏惟陛下之詔固宜取類於三代之間也勒成帝典不亦宜乎陛下睿思雄飛宸章間發質文一變風雅大興臣聞水之細者江海假其深材之短者棟梁資其峻陛下必謂臣所著小有可觀賜以召見闕庭一垂試問臣採摭之外亦以學文縱不能光揚盛美猶庶乎細水短材之益則聖人之含容大矣微臣之誠願畢矣進渾儀表張説臣聞迎日授時莫先乎厯象先天成務必歸於製作伏惟開元神武皇帝陛下建中立極緯武經文至徳難名神功莫測於是定厯成嵗立象考天紹唐堯欽若之典遵虞舜璿玉之義上皇能事於斯備矣臣書院先奉勅造渾儀以測七曜盈縮去年六月造畢進奏又奉恩㫖更立渾儀臣等准勅今左衛率府長史梁令瓉檢校創造於是博考傳記舊有張衡陸績王蕃錢樂之等並造斯器雖渾體有象而不能運行事非經久旋亦毁廢臣今按據典故鑄銅為儀圎以象天使得俯察上具列宿赤道周天度數注水激輪令其自運一日一夜天轉一周又别立二周輪絡在天外綴以日月令得運行每轉一匝日行一度月行十三度十九分度之七凡二十九轉有餘而日月㑹三百六十五轉而行匝仍置水櫃以為地平令儀半在地上半在地下晦明朔望不差毫髮又立二木人於地平之上前置鐘鼓以侯辰刻每一刻則自然擊鼓每一辰則自然撞鐘皆於櫃中各施輪軸鈎鍵交錯闗鎻相持轉運雖周而遲速各異周而復始循環不息隂陽不能逃其數度分不能隠其時究天地之斡運極乾坤之變化斯皆上禀聖謨旁獲神助臣等愚思非所能及望録付史館宣示百寮使知告成之功迥超前古無任勤懇之至謹隨表上進以聞為東平薛太守進王氏瑞詩表髙適臣某言符瑞之興實由王政歌詩之作本自國風伏見范陽盧某母瑯琊王氏性合希夷體於静黙精微道本馳騖𤣥闗旁通天地之心預紀休徵之盛去景龍二載撰天寳迴紋詩凡八百一十二字循環有數若寒暑之遞遷應變無窮謂隂陽之莫測誡其子曰吾没之後爾密記之當逢大道之朝必遇非常之主則真圗之製便可上言君親之義不違犬馬之誠斯在臣早識其子常與臣言星霜屢移書奏仍闕以嵗月滋久㫖趣幽微沈吟耳目之前倐忽禎祥之後伏惟皇帝陛下乗道御極乃聖興化叅日月之並明體乾坤而同徳梯航萬里争飲淳和之風臣妾四夷盡歸仁夀之域令陛下務於道道可盡乎法於天天實長久是知與道齊運比天同休無疆之徵乃在兹矣則天授之美其可替乎章句粲然所謂沒而不朽者也臣某誠惶誠恐頓首頓首昔漢幸甘泉且昧神君之語周窮轍跡徒稱王母之謡豈若迥出名言髙懸響像應皇王之丕命運官商於景福且夫靈芝嘉禾以草木之瑞者黄龍丹雀以禽獸之瑞者猶能揚光帝載標榜頌聲方之真圗彼未為得特望編之史筞列在樂章則陛下先於天而聴於人也臣才術淺劣謬忝藩條曽微涓塵以荅萬一恒馳北極每切子牟之戀遥奉南山願效封人之祝云云進張巡中丞傳表李翰臣聞聖主襃死難之士育死事之孤或親推轜車或追建封邑厚死有以慰生撫存有以荅亡然後君臣之義貫以生死激勸之道著於存亡君所以不遺於臣臣所以不背其君君恩臣節於是乎立伏見故御史中丞贈揚州大都督張巡生於昌時少習儒訓屬禄山搆亂凶虐滔天挺身下位忠勇奮發率烏合之衆當漁陽之鋒賊時竊據洛陽控引幽朔驅其猛鋭吞噬河南巡前守雍丘潰其心腹及魯炅十萬之師棄甲於宛葉哥舒以天下之衆敗績於潼闗兩官出居萬國波蕩賊遂僣盜神器鴟峙兩京南臨漢江西逼雍岐羣師遷延而不進列郡望風而出奔而巡獨守孤城不為之卻賊乃撓出巡後議圗江淮巡退軍睢陽扼其咽領前後拒守自春徂冬大戰數十小戰數百以少擊衆以弱制强出竒無窮制勝如神殺其兇醜凡九十餘萬賊所以不敢越睢陽而取江淮江淮所以保全者巡之力也城孤糧盡外救不至猶奮羸起病摧鋒陷堅俾三軍之士噉膚而食知死不叛及城陷見執終無撓詞顧叱兇徒精貫白日雖古之忠烈何以加焉伏以光天文武大聖孝皇帝陛下聰明文思睿哲神武提一旅之衆復配天之業賞功襃節大賚羣臣遂贈揚州官及其子此誠陛下發徳音之美也而議者或罪巡以食人愚巡以守死臣切痛之今臣敢取十倫以議巡過以塞衆口惟聖聰鑒焉臣聞人禀教以立身刑原情而定罪故事有虧教則人道不列刑有非罪則王法不加忠者臣之教恕者法之情今巡握節而死非虧教也析骸而㸑非本情也春秋之義以功覆過咎繇之典容過宥刑故大易之義遏惡揚善為國之體録用棄瑕今衆議巡罪是廢君臣之教絀忠義之節不以功掩過不以刑恕情善遏惡揚録瑕棄用非所以奬人倫明勸戒也且逆冦背徳人鬼所讎朝廷衣冠沐恩累代大臣將相從逆比肩而巡朝廷不登坐宴不與不偕一伍之衆不假一節之權感肅義旅奮身死節此巡之忠大矣賊勢憑陵連兵百萬巡以數千之衆横而制之若無巡則無睢陽無睢陽則無江淮賊若因江淮之資兵彌廣財彌積根結盤據西向以拒王師雖終於殲夷而曠日持久國家以六師震其西巡以堅壘扼其東故陜鄢一戰而羣兇北走王師因之而勢勝聲勢纔接而城陷此天意使巡保江淮以待陛下之師師至而巡死也此巡之功大矣古者列國諸侯或相侵伐猶有分災救患之義况諸將同受國恩奉辭伐罪乎巡所以固守者非惟懐獨克之志亦以恃諸軍之救敕不至而食盡食既盡而及人乖其本圗非其素志則巡之情可求矣設使巡守城之初已有食人之計損數百之衆以全天下臣猶曰功過相掩况非其素志乎在周典之三宥其一曰宥過失故語巡之忠則可以敦世教議巡之功則可以繫中興原巡之情則可以宥過失昔夫子制春秋明襃貶齊桓將封禪略而不書晉文公召王河陽書而諱之盖以匡戴之功大可以掩僣禪之過也今巡蒼黄之罪輕於僣禪興復之功重於匡戴罪疑惟輕功疑惟重聖人之訓昭然可徵臣故謂巡者足可以為訓矣臣又聞罰不及嗣賞延于世此三代所以直道而行今巡子亞夫雖受一官不免饑寒之患江淮既巡所保户口充完臣謂宜封以百戸俾食其子臣又聞强死為厲逰魂為變有所歸往則不為災巡既身受支離將士等骸骼不掩臣謂宜於睢陽城北擇一髙原招魂葬送巡并將士大作一墓而葬使九泉之魂猶思效命三軍之衆有以輕生既感幽明且無寃厲亦國家志過旌善垂誡百世之義也臣少與巡逰巡之平生臣所知悉今巡死大難不覩休明惟期令名是其榮禄若不時紀録日月寖悠或掩而不傳或傳而不實而巡生死不遇誠可悲焉臣敢採所聞得其親覩撰傳一巻昧死獻上伏惟陛下大明在上廣運臨下仁遐之徳洽于艱難有善必紀無微不録儻以臣所撰編列史官雖退死丘壑骨而不朽臣翰誠惶誠恐頓首頓首死罪死罪為并州長史張仁亶進九鼎銘表吳少微臣聞鼎者夏后氏作羣牧貢金逺方圗物備諸山澤以禦魑魅厥後嗣徳昏亂鼎遷于商夏之寳也杞不足徵殷既有之又患失之周徳休明神寳不墜百代可繼伏惟陛下光大而當之若乃崇貴之器金玉之鼎鎔首山發睢上列太廟序明堂克明靈命以奉上帝非愚臣所敢議臣聞禮之興也始諸飲食故先王之制曰舉九鼎葢筠藥淳熬滫瀡膏餌御九州之美順四時之和臣所以征繕北金敢貢新鼎夫有器必有銘臣竊見九州攸同迺述九號夫永昌天中所以基皇周也長安及岐所以紀靈瑞也武興建都所以光帝閈也禮曰觀禪云云所以美升中也少陽載青所以冀儲徳也東原底平所以廣封植也江都淮海所以肆朝宗也江陵作鎮所以制荆蠻也成都奥區所以遏珍貢也夫此九者誠不足揄衍鴻休昭振方統庶覩者美其所稱知有由作微臣朽老不達有慙歌頌塵八命之寵章負中軍之重任匪躬厥獻伏表流汗其九鼎銘謹敢列上謹遣某官某奉鼎以聞臣某云云論郊祭合設皇地祗表賈曽臣詳據典禮謂宜天地合祭謹按禮記祭法曰有虞氏禘黄帝而郊嚳夏后氏禘黄帝而郊鮌傳曰大合禘然則郊之與廟俱有禘祭禘廟則祖宗之主俱合於太祖之廟禘郊則地祗羣望俱合於圎丘以始祖配享皆有事而太祭異於常祀之義禮大傳曰不王不禘故知王者受命必行禘禮虞書曰正月元日舜格于文祖肆類于上帝禋于六宗望秩于山川徧于羣神此則受命而行禘禮者也言格于文祖則餘廟之享可知矣言類于上帝則地祗之合可知矣且山川之祀皆屬于地羣望尚徧况地祗乎周官以六律六吕五聲大合樂以致神祗以和邦國以諧萬人又云凡六樂者六變而致象物及天神此則禘郊合天神地祗人鬼祭之樂也三輔故事漢祭圜丘儀上帝位正南面后土位亦南面而少東又東觀漢記云光武即位為壇於鄗之陽祭告天地採用元始故事二年正月於洛陽城南依鄗為圓壇天地位其上南向西上按兩漢時自有后土及北郊祀而此已於圎丘設地位明是禘祭之儀又春秋説云王者一嵗七祭天地合食於四孟别於分至此復天地自常有同祭之義王肅曰孔子云兆圜丘於南郊又云祭天而地配此亦郊祀合祭之明説唯鄭康成不論禘當合祭而分昊天上帝為二神専憑緯文事匪經見又其注大傳不王不禘義則云正嵗之正祭感帝之精以其祖配注周官大司樂圎丘義則引大傳五禘以為冬至祭遞相矛盾未足可依伏惟陛下膺籙居尊繼文在厯自臨宸極未親郊祭今之南郊正當禘禮固宜合祀天地咸秩百神荅受命之符彰致敬之道豈可不崇盛禮同彼常郊使地祗無位未從禘享合請備設皇地祗并從祀等座則禮得稽古義合縁情然郊丘之祀國之大事或失其宜精禋將闕臣術不通經識慙博古徒以昔謬禮職今忝諫曹正議是司敢不陳上儻事有可採惟斷之聖慮也請行禮樂化導三事表裴耀卿三者禮樂化道也州牧縣宰所守者宣揚禮樂典書經籍所教者返古還朴上奉君親下安鄉族若皆氣和浹洽自然化理清平由此言之不在刑法聖朝制禮作樂雖行之自久而外州逺俗俗習未知徒聞禮樂之名不知禮樂之實竊見鄉飲酒禮頒於天下比來唯有貢舉之日略用其儀閭里之間未通其事臣在州日率當州所管縣一一與百姓勸導行禮奏樂歌至白華華黍由庚等章言孝子養親及羣物遂性之義或有泣者則知人心有感不可盡誣但臣州久絶雅聲不識古樂伏計太常具有樂器大樂久備和聲伏望令天下三五十大州簡有性識於太常調習雅聲仍請笙竽琴瑟之類各三兩事令比州轉次造習每年各備禮儀准令式行禮稍加勸奬以示風俗又以州縣之學本以勸人祿在其中聞於學也今計天下州縣所置學生不減五六萬人及諸色并國子每年薦舉擢第過百人已上雖有司明試務在擇才而學校衰微居然可驗州縣補學生之日皆不願為逺郡送鄉貢之時多有不願來集恐成頽弊不可因循伏望詳擇其宜微加勸革為敬暉等論武氏宜削去王爵表岑羲臣暉等言臣聞神器者天下之至公必歸乎有徳皇極者域中之大寳必順乎天命厯考前古詳觀帝業皆不並興莫不更王故三皇氏沒而五帝氏興夏殷氏衰而周漢氏作何則帝王之厯數必應乎五行水盛則火衰木衰則金盛天地之運也必合乎四時春往則夏來暑退則寒集則知五行之數帝王不可違違之則宗社不安生人不理四時之序天地不能變變之則霜露不均水旱交錯自有隋失御海内崩離天厯之重歸于唐室萬方樂業荷撥亂之功三聖重光布生成之徳可謂有功於四海有徳於蒸人自𢎞道遏密生靈降禍百姓哀號如䘮考妣則天皇帝臨御帝圗明目達聰躬親庶績則有讒邪凶孽誣惑叡徳搆害宗枝誅夷殆盡英蕃賢戚百不存一餘類在者投竄荒裔酷虐人神感傷天地忠臣義士實所痛心自天授之際僣稱改革武家子姪咸樹封建十餘年間實亦榮極時唐室藩屏豈得並封故知事有昇降時使然也今則天皇帝厭倦萬務神器大寳重歸陛下百姓謳歌欣復唐業上至卿士下及蒼生黄髮之倫童兒之輩莫不歡欣舞忭如見父母豈不以唐家恩徳感幽祇之心陛下仁明順天下之望今皇業重構聖祚中興神祗之道有助於先徳矣黎人之誠無負於陛下矣臣又聞之業不兩盛事不兩大故天無二日土無二王前聖之格言先哲之明誡自皇明反正天命維新武家諸王封建依舊生者既加茅土死者仍追賦邑萬姓失望卿士寒心何則開闢已來罕有斯理帝主之道實無此法陛下縱欲開恩以行私恵豈可違五行運厯乎乖四時寒暑乎又海内衆情朝廷竊議謂武氏諸王身計亦危適將有損何處之未得其所居之實恐不安陛下雖欲寵之翻乃陷之不遵古典故也且唐厯有歸周命已去爵重則難保祿薄則易全乂則天皇帝親政之時武氏諸王亦分外職今並居京輦不降舊封天下之心竊將不可陛下縱欲敦崇外戚曲流恩貸奈宗廟社稷之計何奈卿士黎人之議何伏願陛下為社稷之逺圗割私情之小愛内崇經邦之要外順遐邇之心豈不固宗社之本允人靈之願則陛下巍巍之業貫三光而洞九泉親親之義上有倫而下有序臣等特承榮寵思竭丹赤既為唐臣實為唐計伏乞聖慈俯垂矜納焉請抑損外戚權寵并乞佐外郡表武平一臣平一言臣縁脩起居注太史監每季有牒臣伏見從去嵗已來屢有災異熒惑入羽林太白再經天太陽虧月犯大角臣伏按舊史文志咸非休吉之感或為咎徵之兆臣聞災不妄生變不虚設象見於上人應於下其理昭彰有如影響陛下嗣膺鴻業夤畏上𤣥故皇天不言以災𤯝譴誡詩曰敬天之怒不敢驅馳又曰惟此文王小心翼翼昭事上帝聿懐多福臣伏見陛下孝愛因心敦崇戚族澤濡后氏恩洽外家位以慈周榮因恵假臣當宗親階越三等家有數侯既忝國姻復叨枝屬朱輪華轂金牓瑶簮過東漢之梁鄧邁西京之許史光輝焜煌古今所絶誠陛下睦於親寵降於慈貸臣未息機謀深近囂黷恩彌崇而議彌積位愈厚而釁逾擁臣又聞月滿必虧日盈則蝕春秋有交謝之理星律有輪環之次時不再來榮難久藉昔永淳之後藩維搆孽王室多難先聖考運從權時居寳厯臣諸房等地惟宗子爵列扞城竊祿疏封屢迴星紀今皇明復辟聖政惟新自合恭守園廬遥承雨露庇影椒房之未階親槐里之餘今乃再假寵靈驟貽奬渥姻從日茂爵封如初但見昇崇無聞損降髙班厚位遂超涯極以此或陰氣僣陽乾文告變且頃年以來河洛汎溢東都西京俱有水􅕙盖以陰氣太盛所致昔王家驕貴梅福上書竇氏專權丁鴻進諫臣伏思古來太妃之始自吕霍上官閻董之氏皆以恩寵過深驕盈僣溢一朝損覆竟無噍類易曰不逺而復又曰鼎折足覆公餗伏願思抑損之冝運長逺之策或令安車就第使剖符臨州逺之以機權錫之以閑逸上恭乾乾之惕下全親親之道則肅彰國圗殷鑒後葉臣釁招酷罰待斃苫壤聖心不棄窮穢備官史冊哀緒莫申餘隂無㡬精魂屢竭昭恤未流如將有補明時不矜荒殆伏乞假名外郡遂禮私庭冀存識爽少訓靦胃臣瞻光視漏豈復支久既因災𤯝誠兼宗國俯揆殘骸退深荒越唐文粹巻二十五欽定四庫全書唐文粹巻二十六上宋姚鉉編表奏書䟽乙揔九首政事三請太宗不詰難臣寮上言書并答詔劉洎論時政書栁澤諫太宗勤政改過岑文本傳導一敎本書元積崇儒五請修太學書李觀請置詩學博士書李行脩請孟子為學科書皮日休請韓文公配饗書論貢士書舒元輿請太宗不詰難臣寮上言書并答詔劉洎臣聞帝主之與凡庶聖哲之與賢愚上下相懸擬倫斯絶若乃以至愚而對至聖以極卑而對極尊徒思自强不可得也陛下䧏恩㫖假慈顔凝旒以聽其言虚襟以納其說猶恐羣下未敢對揚況動神聰縱天辯飾辭以扸其理援古以排其議欲令凡庶何階應荅臣聞皇天以無言為貴聖人以不言為徳老君稱大辯若訥莊生稱至道無文此皆不欲煩也是以齊侯讀書輪扁竊笑漢皇慕古長孺陳詞此亦不欲勞也且多記則損心多言則損氣心氣内損形神外勞初雖不覺後必爲累湏為社稷自愛豈為性好自傷乎竊以今日升平皆陛下力行所至欲令長乆匪由辯慱但當忘彼愛憎愼兹取捨毎事敦朴無非至公若貞觀之初則可矣至如秦政强辯失人心於自矜魏文宏才虧衆望於虛說此才辯之累較然可知矣伏願略兹雄辯浩然飬氣簡彼緗圖淡焉怡目固萬夀於南嶽齊百姓於東户則皇恩斯畢天下幸甚答詔非慮無以臨下非言無以述慮比有談論遂致煩多輕物驕人恐由兹道形神心氣非此為勞今聞讜言虚懐以改論時政書桞澤頃者因韋氏險詖姦臣同惡賞罰紊㢮綱紀紛綸政以賄成官因寵進言正者獲戾行殊者見疑海内寒心實将莫救頼神祗祐徳宗廟降靈天討有罪人用不保陛下叡謀神聖勇智聰明安宗社於已危拯黎庶於将溺今龎眉鮐背歡忻踊躍望聖朝之撫輯聽聖朝之徳音今陛下蠲煩省傜法明徳舉萬邦愷樂家室胥慶臣又聞危者安其位者也亡者保其存者也亂者有其治者也伏惟陛下安不忘危存不忘亡治不忘亂則克享天心國家長保也詩曰靡不有初鮮克有終伏惟陛下慎厥終惟其初非禮勿視非禮勿聼非禮勿言非禮勿動書曰惟徳㒺小萬邦惟慶惟不徳㒺大墜厥宗甚可畏也甚可懼也伏惟陛下慎之哉夫驕奢起於親貴綱紀亂於寵倖願陛下禁之於親貴則天下風随矣制之於寵倖則天下法明矣詩曰刑于寡妻至于兄弟以御于家邦若親貴為之而不禁寵倖撓之而見從是政之不恒令之不一則姦詐斯起暴亂生焉雖嚴刑制戮而法不行矣縱陛下親之愛之莫若安之福之寵禄之過罪之漸也非安之也驕奢之滛危之本也非福之也前事不忘後之師也伏願陞下精求俊哲朝夕納誨縱有逆于耳謬于心者無速之以罰姑籌之以道省于厥躬雖木樸千忌諱願恕之以直用開諫諍之路也或有順于耳便于身者無急之以賞當求諸非道稽之典訓其不叶於徳必寘之以法用杜側媚之行也有羞滛巧於陛下者遽黜之則淫巧息矣有進忠讜於陛下者遽賞之則忠讜進矣臣又聞生於富者驕生於貴者傲石碏曰臣聞愛子敎之以義方不納於邪驕奢滛佚所自邪也書曰㒺滛於逸罔遊於樂穆王有命曰實頼前後左右有位之士繩愆糾謬格其非心今儲官肇建王府初啓至於寮友必惟妙擇今驕奢之後流遁未變慢逰之樂餘風或存夫小人弄臣易合於意竒伎滛巧多適於心狎於非徳兹為奢怠書曰愼簡乃僚無以巧言令色其惟吉士僕臣正厥后克正僕臣諛厥后自聖伏願采温良博聞之士恭儉忠鯁之人任以東宫及諸王府仍請東宫量署拾遺補闕之職令朝夕講論出入侍從授以訓誥交修不逮臣又聞馳騁畋獵令人發狂名教之中自有樂地承前貴戚鮮克由禮或打毬擊鼓比周伎術或飛鷹奔犬盤逰藪澤此甚為不道非進徳修業之本也書曰内作色荒外作禽荒又曰無若丹朱傲惟慢遊是好朋滛于家用殄厥世伏惟陛下誕降謨訓敦勸學業示之以好惡陳之以成敗以義制事以禮制心圖之於未萌慮之於未有則福禄長享與國並休矣臣又聞富不與驕期而驕自至驕不與罪期而罪自至罪不與死期而死自至信矣斯語明哉至誡頃者韋庶人安樂公主武延秀等可謂貴矣可謂寵矣權侔人主威震天下然怙侈滅徳神怒人棄豈不謂愛之太極富之太多不節之以禮不防之以法終轉吉為㐫變福為禍諺曰千人所指無病自死不其然歟書曰殷鑒不逺在彼夏王今陛下何勸豈非皇祖謀訓之則也今陛下何懲豈非中宗寵任之甚也禮曰愛而知其惡憎而知善可不慎哉夫寵愛之心人則不免去其太甚閑之禮節適則可矣今諸王公駙馬亦陛下之親愛也矯枉之道在於厥初鑒誡之義其則不逺使觀過務善居寵思危庶夙夜惟寅聿修厥徳經曰在上不驕髙而不危所以長守貴也制節謹度滿而不溢所以長守富也富貴不離其身然後能保其社稷書曰制官刑警于有位敢有恒舞于宫酣歌于室時謂巫風敢有狥于貨色恒于遊畋時謂滛風敢有侮聖言逆忠直逺耆徳比頑童時謂亂風惟兹三風十愆卿士有一于身家必䘮邦君有一于身國必亡甚可畏也甚可懼也伏惟陛下必察而明之必信而勸之有奢僭驕怠者削其禄封樸素修業者錫以車服以朂其心使奉其命無使乆而忽之無使逺而墜之臣聞知之非艱行之惟艱又曰常厥徳保厥位厥徳匪常九有以亡伏惟陛下慎之哉前車之覆實惟明證先王之誡可以終吉若陛下奉伊尹之訓崇傳説之命不作無益不啓私門刑不差賞不濫則惟徳是輔惟人之懐天禄永終景福是集儻陛下忽精一之徳開恩倖之門爵賞有差刑罰無當則忠臣正士亦當不復談矣諫太宗勤政改過書岑文本臣聞創撥亂之業其功既難守已成之位其道不易故居安思危所以定其業也有始有卒所以保其位也今雖億兆乂安方隅寜謐既承䘮亂之後又接凋弊之餘户口減損尚多田疇墾闢尚少覆燾之恩著矣而瘡痍未復徳敎之風被矣而資産屢空是以古人譬之種樹年祀綿逺則枝葉扶踈若種之日淺根本未固雖壅之以黒墳暖以以春日一人摇之必致枯槁今之百姓頗類於此常加含飬則日就滋息蹔有征役則随之凋耗凋耗既甚則人不聊生人不聊生則怨氣充塞怨氣充塞則離叛之心生矣故帝舜曰可愛非君可畏非民孔安國曰人以君為命故可愛君失道則人叛之故可畏仲尼曰君猶舟也人猶水也水所以載舟亦所以覆舟是以古之哲王雖休勿休日愼一日者良為此也伏惟陛下覽古今之事察安危之機上以社稷為重下以億兆在念明選舉慎賞罰進賢才退不肖聞過即改從諫如流為善在於不疑出令期於必信頥神飬性省畋逰之娯去奢從儉减工役之費務静方内而不求闢土載櫜弓矢而無忘武備凡此數者雖為國之恒道陛下之所常行臣之愚心惟願陛下思之而不倦行之而不怠則至道之美與三五比崇億載之祚随天地長乆雖使桑榖為妖龍蛇作孽雉雊於鼎耳石言於晉地猶當轉禍為福變咎為祥况水雨之患隂陽恒理豈可謂之天譴而繫聖心哉臣聞古人有言農夫勞而君子飬焉愚者言而智者擇焉輙陳狂瞽伏待斧鉞論敎本書元稹某年日月臣稹再拜獻書皇帝陛下臣伏見陛下降明詔脩廢學増胄子選司成大哉堯之為君伯夷典禮䕫教胄子之深㫖也然而事有萬萬於此者敢昧死而言之臣聞諸賈生曰三代之君仁且久者教之然也誠哉是言且夫周成王人之中也近管蔡則讒入親周召則義聞豈可謂夫明哉然而克終於道者得不謂教之然邪始其為太子也未生胎教既生保敎太公為之師周公為之傳召公為之保伯禽唐叔與之游禮樂詩書為之翫目不得閲滛艶妖誘之色耳不得聞優笑陵亂之聲口不得習操斷擊搏之書居不得近容隂順邪之黨游不得恣追禽戮獸之樂翫不得愛遐異僻絶之珍凡此數者非謂備之於前而不為也亦将不得見之矣及其長而為君也血氣既定游習既成雖有放心快己之事日陳於前固不得奪已成之習已定之心矣則彼忠直道徳之言固吾之所習聞也陳之者有以論焉回佞庸違之說固吾之所積懼也諂之者有以辯焉人情之莫不欲耀其所能而黨其所近苟将得志則必快其所藴矣物之性亦然是以魚得水而游馬逸駕而走鳥得風而翔火得薪而熾此皆物之快其所藴也今夫成王所藴道徳也所近聖賢也是以舉其近則周公左而召公右伯禽魯而太公齊快其藴則興禮樂而朝諸候措刑罰而美敎化之至也可不謂信然哉及夫秦則不然滅先王之學曰将以愚天下黜師保之位曰将以明君臣胡亥之生也詩書不得聞聖賢不得近彼趙髙者詐宦之戮人也而傅之以殘忍戕賊之術且曰恣睢天下以為貴莫見其面以為尊是以天下之人未盡愚而亥固已不能分獸畜矣趙高之威懾天下而胡亥固已自幽於深宫矣彼李斯者秦之寵丞相也困讒寃死無所自明而况於踈逺之臣庶乎若然則秦之亡有以致之也漢髙承之以兵革漢文守之以亷謹卒不能蘓復大訓是以景武昭宣天質甚羙纔可免禍亂哀平之間則不能虞篡弑矣然而惠帝廢易之際猶頼羽翼以勝其邪心是後有國之君議敎化者莫不以興㢘舉孝設學從儒為意曾不知敎化之不行自貴者始略其貴者敎其賤者無乃鄰于倒置乎洎我太宗文皇帝之在藩邸以至于為太子也選知道徳者十八人與之游習即位之後雖燕游飲食之間十八人者實在其中上失無不言下情無不逹不四三年而名髙盛古豈一日二日而致是乎游習之漸也貞觀已還師傅之官皆宰相兼領其餘官寮選亦甚重馬周以位髙恨不得為司議郎此其騐也文皇之後漸踈賤之至母后臨朝翦棄王族當中睿二聖勞勤之際雖有骨鯁敢言之士既不得在調䕶保安之職終不能措扶衞之一詞而令匠胡安金藏剖腹以明之豈不大哀哉兵興以來兹弊尤甚師資保傅之官非疾廢眊瞶不任事者為之即休戎罷帥不知書者䖏之至於友諭賛議之徒踈冗散賤之甚者搢紳恥之夫以匹士之愛其子者猶求明哲慈惠之師以敎之直諒多聞之友以輔之豈天下之元子而可以疾廢眊瞶不知書者為之師踈冗散賤不適用者為之友乎此何反上古之甚也近制官僚之外往往以沈滯僻老之儒充直講侍讀之選而又踈棄斥逺之越月踰時不得召見彼又安能傅成道徳而保飬其躬哉臣以為積此弊者豈不以皇天眷祐祚我唐徳以舜生舜以堯繼堯傳陛下十一聖矣莫不生而神明長而仁聖以是為屑屑習儀者故不之省耳臣獨以為於列聖之謀則可也計無窮之業傳後嗣則不可脱或萬代之後若有周成王之中才而又生深宫優笑之間無周召保助之敎将不能知喜怒哀樂之所自矣況稼穡之艱難乎今陛下以上聖之姿肇臨海内是天下人人傾耳注心之日也特願陛下思成王訓導之功念文皇㳺習之漸選重師保慎簡宫寮皆用博厚𢎞深之儒而又練逹機務者更進送見日就月将因令皇太子聚諸生定齒胄講業之儀行問道嚴師之禮至徳要道以成之撤膳記過以警之血氣未定則輟禽色之娛以就學聖質既備則資㳺習以𢎞徳此所謂一人元良萬方以貞之化也豈其修廢學選司成而足倫匹其盛哉而又俾則百王莫不㓜同師長同術識君道之素定知天倫之自然然後選用賢良樹為藩屏出則有晉鄭魯衞之盛人則有東牟朱虛之强蓋所謂宗子維城犬牙盤石之勢也又豈與夫魏晉已䧏因賤其兄弟而自翦其本枝者同年而語乎㣲臣竊思為陛下建永永無窮之長筭輙敢冐昧死誅而言之臣稹謹言請修太學書李觀草莾賤臣某再拜上言臣伏思太學之為道也厥惟大哉實所徳宇於國家敎源於萬方辨齊於人倫親親而尊尊誠宜嵗勅崇􅃊日致肅祗工度木不俟于榱桷崩朝命官取偁乎師氏當然後可以陳四代之禮禮興無窮之風開素王之堂削青衿之篇人􅅷㢘隅俗捐諍端天下之仁人相則焉是以徳由此澤敎由此流若水之潤下浲涌植物利不浩哉今覩斯壊甚不然乎在昔學有六舘居類其業生有三千盛侔於古近秊禍難寖用耗息陛下君臨宿弊尚在執事之臣顧為不急升當學之徒罔敢上逹積微成慝超稔歴紀賤臣極言誠合要道具六舘之目其曰國子太學四門書律筭等今存者三亡者三亡者職由厥司存者恐不逮修輿人有棄本之議羣生有将壓之虞至有愽士助敎鋤犂其中播五稼于
