body:
  text: 吳興姚鉉纂碑十七揔十首釋六復東林寺碑崔黯唐鄂州永興縣重巖寺碑舒元輿大雲寺禪院碑李雍宣州新興寺碑盧肇蘇州重玄寺法華院石壁經之碑白居易唐天下放生池碑表开抵答附顔真卿道四唐茅山寶歷崇元聖祖院碑賈餗連州靜福山廖先生碑蔣防京師至德觀法主孟法師碑岑文本唐升玄劉先生碑馮宿復東林寺碑銘并序崔黯佛之心以空化執智化也以福利化欲仁化也以緣業化妄術化也以地獄化愚劫化也故中下之人聞其説利而畏之所謂救溺以手救火以水其於生人恩亦弘矣然用其法不用其心以至於甚則失其道蠹於物失其道者迷其徒蠧於物者覆其宗皆非佛之以手以水之意也為國者取其有益於人去其蠧物之病則通矣唐有天下一十四帝見其甚理而汰之而持事之臣不以歸元返夲以結人心其道甚桀幾為一致今天子取其益生人稍復其教通而流之以濟中下於是江州奉例詔余時為刺史前訪兹地松門千樹風先熏天蜩嘒響湍鳴松有泠然可别愛而不翦利以時往時廢寺皆隸戶部頻牒所賣至是即喜而復之民物之困不可橫賦得舊僧正言問能復東林乎曰能即斷其髮佳而勉之又命言擇其徒得二十九以隸其下皆心生力完臂股相用言則隨才賦事分命告復所至響應下虔江之木鳩食訪工陶土冶鐵匠成於心授規於手日而不笠雨而不屐㸑飪煮湯優犒執藝若殿若廂若門之三若闕之左右為塔若講若食若客之館若庫為樓若厨激飛泉而注於鬵鉹之間若梁霓於武若亭臨於白蓮若僧之房若聖之室若突躆勝若郤居幽竒可不尋雅不出位則為間三百一十三為架一千八百七十六為楹為梁為棟為桷為牖為闔為屋之事數為級磚為蓋瓦凡役工合六十五萬三百二十八絪緼端明嚴若有主大中六年二月十四日言命以圖及其備録訪余為其刻石之文且曰自逺公至今若干歲而傳法之地滅矣賴君復之君宜主書其事余則曰復之者上也主其事而書之於言公不詞余嘗觀晉史見惠逺之事及得其書其辨若注其言若鋒足以見其當時取今之所謂逺師者也吾聞嶺南之山峻而不山嶺北之山山而不秀而廬山為山山與秀兩有之五老窺湖懸泉墜天粳香藥靈鳥間獸善煙嵐之中恍有絳節白鶴使人觀之而不能回眸也且金陵六代代促時薄臣以功危主以疑慘潯陽為四方之中有江山之美惠逺豈非得計於此心視於時風邪然鷙者搏羶襲者拘素前入不暇自歎者多則逺師固為賢矣是山也以逺師更淸逺師也以是山更名賜佛之法如以曹溪以天台為號者不可一二故寺以山山以逺三相挾而為天下具美矣今言師愍佛之法推逺之心修廢之勤任其事不宰其功讓功於義明義明曰余何能言之績也讓功於建省建省曰某何能言之力也讓功於鏡暘以緡物元諫以衆材淸持以播殖景仁以化施皆曰某何能言之方也非言不顯義非義不顯言推與讓至於是而不宏大敏固始終一致者未之有也移之於邦國之理何故不成哉銘曰萬竅怒號羣波猛起刑戮不加仁義莫止有得佛心則滅諸熾惠以性生性以悟理山增惠臺鑑闢妄軌根深則定葉茂則死可用理人不獨養巳峨峨匡峯矯矯惠子梁以崇山津以江水不騫不竭吾道曷巳上復其道吾以塞詔惟師之言勤以克肖四五年來休功再紹推能與類類以言妙不曰良能孰臻此要山川不改舊物復新誠汝其徒誕將又淪唐鄂州永興縣重巖寺碑銘并序舒元輿官寺有九而鴻臚其一取其賔而往來也臚者傳也傳異方之賔禮儀與其語言也寺也者府署之别號也古者開其府署其官將以禮待異域賔客之地竺乾之教蓋西土絶徼者也自漢氏夢有人如金色之降其流來東吾之鴻臚待西賔一支特異於三方厥後斯來委於吾土吾人仰之如神明焉伏之如風草焉至有思覿厥貌若盻然如見者則取其書按其云云之文鎔金琢玉刻木扶土運毫合色而強擬其形容構厦而貯之猶波之委於瀆瀆之注於溟晝夜何曽知停息之時其如是非官寺之一而能容焉故釋寺之作由官也其非九而能拘也其制度非臺門旅樹而能節也故十族之鄉百家之閭必有浮圖為其粉黛國朝沿近古而有加焉亦容雜夷而來者有摩尼焉大秦焉秋神焉合天下三夷寺不足當吾釋寺一小邑之數也其所以知西人之教能蹴踏中土而內視諸夷也及其繁也學徒如林金貝如山故文昌宫祠擘局而司之東西都命貴人分衢而使之商其略猶天文隸於河漢而莫之極也非名無以别之乃隨事而出焉有見天地符祥而稱之者有取山川秀絶而號之者語其額而名可知也重嵓之作蓋山川秀絶之地統江夏之求興寶應元年秋七月自天有命而升於文昌宫之春官藉考其地有重嵓峽焉故命寺乞此名以大曆十三年遷縣於長慶鄉寺亦與遷貞元八年縣又遷之長樂深口寺亦隨動今之地直縣之坎三百六十步有邑人葉望者心存於金色人不待布金而出其地以奉之輪廣二百畒右肘於熊耳左腋於覆盆連岡伏其背深湖朝其嚮相土有擁抱之勝盡在其上有僧曰謙曰諷手開榛蕪亶而立困竟遺其恨於後焉長慶三年春三月上座僧良鑒沙門器有公識為其徒所推乃執柄結搆主廢興為巳任寺以利堅沙門與都維那道援志力是俱物無橫議邑俗之倫以貨來資者如官司驅焉至明年春二月星一周而新功成樹宇之為殿者其間五扶土而為像者其形七帳之飾寶者如殿間焉乃鑿門而三張翼而廊殿隂有北方挂金革天神之宫東北有禪氏七代祖沙門棲心之室也凡二十四曲突而能庖築堂而會食拓庭而寬植木而隂湖山參差金碧相錯捨舟車而極其心相者冝化成焉嗚呼域外之教而入於域中如此而大邪人謂沙門之無才吾不信也良鑒既以力之辛勤而就亦欲其事流之於異時乃買武昌石琢磨為碑自永興録其狀訴授於余因托其狀而書之復紀以銘銘曰重嵓重嵓無峽無友釋宮斯闈上矗星斗虹霓梁棟日月戶牖金相凝凝煙水奔走雷飈箭雨溟𪷟不朽磔然之石附地之厚刻其成功垂耀于後大雲寺禪院碑銘并序李雍天也地也攝生之謂玄造日也月也容光之謂神功然亭育之仁可斡終滅昭明之力未焯昏霾故熱惱積薪劫燒難鑠驚波巨海沃焦自淵獨有導師空王禪那宴寂一念首安住之域加行證無為之階密教內修莊嚴外度雙引相應並照兩忘然後生無生淨名不去照無照了義能覺爇菩提之炬則枳棘滌除楫般若之航則橫流既濟湛四禮於中道超三有以上征精舍攸隮度門斯盛其此之謂矣粵有寺之艮背山之前臨有確師禪房者武德八年邦守蕭公諱顗護法之所建也周目環郭澄心際海亦既一味實無衆生夫慿其高宅其勝曽近俗諦或乘法流且水出於冰凡作於聖雖曰醜地猶是道場矧乃妙有孤標寶相靈變入我室觀我形者哉施及貞觀歲有等觀禪師繼前心承後問分之則别位二事合之則同列大空坐於斯竟於斯嗚戲四益風驅百為火滅棟宇崩落象設傾低先天中有慧藏禪師聞之斯行居而不住妙齡強植徑節老成被甲律儀下帷經藏方丈之室時歷十年簞瓢之餐日常一食信為法本悟實如宗簡珠圓明紅蓮淸淨剃髮結落亡境受除生起了於身緣覺被於物是以興補舊塔建置尊容彌陀當其陽菩薩侍其側四大海水慧眼啓明五須彌山毫相崇絶有若稽義托實沿名討因都極樂之大郊壽無量之景命借如昔者稱贊觀厥音聲克濟斯艱乃復于逺則有階地超越自在神通發弘願心得大勢用皆所以濡火宅軔劒輪投地者結業坐開入影者昔趣以息粵若殫財竭力刻桷雕題積三四年模造化意寶殿蔚以雲構金山煥其日臨豈徒然哉夫壯麗者將以重威神儀形者將以攝歸止或離性解脫或見作隨緣藥草寓其根莖雲雷感其方類即説非説若通不通惟三獸之渡河庶一子之來學禪師以為默則絶教言則牽文茍心事於化人豈迹留於捨法會議斫石僉允圓功雍來守是邦偶聞兹事依僧依佛何日忘之在家出家惟其常矣頃者下檄湖海申明捕殺鱗羽咸若災疫以寧救蟻雖尚於沙彌涸魚每憂於釋種祁寒則怨童子何知率三省於短懷寄一塵於寶地别駕弘農楊公守堅字越石本枝鼎貴胄㣧嶽靈直道守公智印觀法司馬琅邪王公元朂字固禮髙闈襲吉皇士令名資位升聞妙意融朗盛矣美矣左之右之時新羅通禪師五力上乘一門深入利行攝俗德氷浮天贊而演成恭而有述其詞曰覆燾之獎始生終滅昭回之明內昏外徹隂入不斷心起難折靈海欲深洪爐火熱倬彼大師超然正覺亡境息想示法流渥絶生死岸破煩惱殼度門光啓住地玄邈傳燈三葉分座一義象設儀形莊嚴地位有為不染無相能離茍曰法乘莫非種智古者豐石抗之髙山紀事標社銘勳列班廣兹妙有運彼玄關則百伊昔粵吾無間宣州新興寺碑銘并序盧肇至哉邃古巳來天之永錫正命者其惟帝唐乎聖祖神宗光啓土宇垂億萬祀克承休嘉莫不以禮樂先兆人以慈儉後天下仁居惠往營魄離者而其施猶存揭淺厲深心迹泯者而厥功亦在夫常善救人常善救物非至德誰能普行之故鬼神受祉黎元樂康寶祚延洪率由此道也於是表大覺為靈根與羣生共有叩真空而不壞惟聖者獨知非崇天金輪氏之教則焉得窮理盡性齊萬法於物我哉是以沈善惡乎澆妄之泉擢枝莖乎植性之囿常令學者崇飾精廬顯有堂皇亦如庠序郡國分理必付元臣將俾羣生罔不開悟且夫斯干秩秩止在周邦靈宫彤彤唯居魯國曷有列剎映乎霄皓飛甍麗乎陽光瞻彼玉毫儼然金地翬軒雕耽岫聳雲攢遍于州都若斯之美歟若夫宣城新興寺者會昌四年既毀大中二祀故相國太尉裴公之所立也公諱休字公美河東聞喜人代濟文德洎公彌大擢進士甲科登直言制首未三十由拾遺遷殿內鴻名偉望迭處淸雄入奉絲綸出省風俗拜春宫則齊驅驥騄視民部則克阜生齒至於調入王府貨出水衡洎陟台司亦勞厥事凡三拜廉察五授節旄孫先生有愧知兵山巨源當慙視吏揆路既長乎百辟荆門復平乎水土公降由辛未歸以甲申為唐碩臣作佛大士光珉顯竹此不復書所至之邦必興修淨行大中二年拜宣城嘗與名緇會難有設疑以試公者曰三界虛妄羣生顚倒何有修行能解纏縳孰為智慧何化凡愚胡為乎公之區區徒自橈耳公曰嘻珠玉在櫝啓之則見其珍聖賢有門行之則踐其閾分塗而往唯善惡焉善惡如東西耳趣之不巳則至其所至焉在乎推心於不染馭馬於無途如是三界信真實羣生非顚倒但學者不能窒欲壞貪遺名去利弗捨有漏而思往無為耳然捨之自我取不由人非用智惠解彼纏縳如此則了無一物以橈吾真也他日門人有謂公曰敢問三界之言未立人不知修行不見因果畏隂隲者不為之多介景福者不為之少理亂增損繫乎其時洎斯教也行乎諸華愚人畏罪損其惡賢者望福增其善增之不巳則至今當盡善矣損之不巳亦至今冝無惡矣何昏迷暴虐無減於秦漢之前福慧聰明不增於魏晉之後歸之者殊塗輻湊立之者萬法雲興稽諸天不見其文求諸古莫有其法號為太聖作天人師是宜使吾人盡升覺路不宜使蚩蚩庶類由古迄今若斯之迷者也設使像法至今未行將盡墮惡道為鬼為蜮乎夫法未始有今而有之希聖之徒可存而知之也其由之之固庸非溺乎公笑謂之曰大昭肇啓法不濟備聖人繼出代天為工結繩畫卦質文滋改一聖立一法生天道人事顯若符契夫燧人氏之未為火也則天無火星人無火食龜無火兆物無火災必矣少昊氏之未理金也則天無金星人無金用龜無金兆物無金災必矣及聖人攻木出火鍛石取金於是乎精芒主宰騰變上下則知世法時事隨聖人也考精神之源窮性命之表作大方便護于羣生羣生受之而不知蓋猶天道運行物以生茂皆謂自已孰知其然也於是問者廓然自得佛味武宗時毀寺而宣之新興故有崇基廣厦文甓雕甍鞠為土梗唯喬柯灌木森聳澗壑祥煙翠靄交覆巖麓耳及宣宗詔許立寺宣之四人相鼓以萬清先立之于宣郛公獨不許遂命苾芻上首元敬謂之曰吾聞之新興寺大歷初有禪師巨偉南宗之上士也與北宗昭禪師論大慧網明實相際於此始作北山道場後有浩禪師作草堂于道場西北其傍有藻律師居之律師去世門人立塔院貞元中巨偉之門人靈翹始請於太守合三院而為寺彼皆智慧傑出親啓山林今之立寺無以易此也議定郡東故有妙覺寺寺毀而杉檜多大十圍一旦有二龍鬪谷中拔大樹三十二視之皆殿宇之材也公歎曰將立寺而龍拔巨樹天其有意平遂用之於是霜斤沐楹玉砂瑩礎上下其響音中桑林不期年而雲攢四榮風搖寶鐸蟉拏六扇月照金鋪勝絶一源繚牆百雉繕修多羅為攝受置無盡藏為莊嚴􅌄窱幽邃輪奐博敞蓋江南之首出也初奉詔隸僧三十人今其存者太半構殿立門有軒有廡則律師元敬法華道延首其事編經立藏不遺句偈則維摩從省禪門貞會著其功善集檀施備修房廊學于三時旁窺六義則金剛淸越服其勤而法華遂言涅槃明則洎法林超愛皆以禪學為宗律師道隨宜春人幼植淨行得泥丸妙旨直以披文相質之事造余于新安余既許之道隨復言繼二十人者皆善修持能遺物纍則有應玄友恭道幽仁寶懷賁從儉惟恭文眆師回師宗思靜常政文暢弘暢契蒙景先法進惟勤志弘玄操與前輩又為二十人矣而太尉所立有殿內千佛有地藏院有上方石盆院又以俸錢入膏腴之墅為地藏香火定中之謀始于太尉太尉作之門人述之有作有述誰曰不然乃為銘曰奕奕新興敬亭南麓巨構崇基崢嶸曄煜伊昔既廢神愁鬼毒洎將再榮天人合福赩有逴龍其怒則觸助作棟楹拔此巨木雨運風移勝川跨陸神怪戮力老幼同心蚨翼飛貨龍鱗布金揭立赫奕化成嶔崟玉礎方丈花臺百尋日明香剎雲生寶林太尉裴公聳其學者弘以戒光甘露披灑示厥有為取彼難捨必有精靈扶持大厦小儒刻石有慙史野永言歌之庶近風雅蘇州重玄寺法華院石壁經之碑白居易碑在石壁東次石壁在廣德法華院西南隅院在重玄寺西若干步寺在蘇州城北若干里以華言唐文譯刻釋氏經典自經品衆佛號以降字加金焉夫開士悟入諸佛知見以了義度無邊以圓教垂無窮莫尊於妙法蓮華經凡六萬九千五百五言證無生忍造不二門住不可思議解脫莫極於維摩詰經凡二萬七千九十二言攝四生九類入無餘涅槃實無得度者莫先於金剛般若波羅蜜經凡五千二百八十七言壞罪集福淨一切惡道莫急於佛頂尊勝陀羅尼經凡三千二十言應念順願願生極樂土莫疾於阿彌陀經凡一千八百言用正見觀真相莫出於觀音普賢菩薩法行經凡六千九百九十言詮自性認本覺莫深於實相法密經凡三千一百五言空法塵依佛智莫過於般若波羅蜜多心經凡二百五十八言是八種經具十二部合一十一萬六千八百五十七言三乘之要旨萬佛之祕藏盡矣是石壁積四重髙三尋長十有五丈厚尺有咫有石蓮敷覆其上下有石神固護其前後火水不能燒漂風日不能搖消所謂施無上法盡未來際者也唐長慶二年冬作大和三年春成律德沙門淸晃矢厥謀淸海繼厥志門弟子南容成之道則終之寺僧契元捨藝而書之郡守居易施詞而讃之讃曰佛涅槃後世界空虛惟是經典與衆生俱設有人書貝葉上藏檀龕中非堅非久如蠟印空假使人刺血為墨剝膚為𥿄即壞即滅如筆畫水噫畫水不若文石印蠟不若字金其功不朽其義甚深故吾謂石經功德契如來付囑之心有唐天下放生池碑銘并序顔真卿皇唐七葉我乾元大聖光天文武孝感皇帝陛下以至聖之姿屬艱虞之運無少康一旅之衆當祿山強暴之𥘉乾鞏勞謙勵精為理推誠而萬方胥恱克巳而天下歸仁恩信侔於四時英威達于八表功庸格天地孝感通神明故得回紇奚霫契丹大食盾蠻之屬扶服萬里決命而爭先朔方河東平盧河西隴右安西黔中嶺南河南之師鳩五年椎鋒而效死摧元惡如拉朽舉兩京若拾遺慶緒遁逃巳蒙赤族之戮思明跧伏行就沸鼎之誅拯巳墜之皇綱據再安之宗社迎上皇於西蜀申子道於中京一日三朝大明天子之孝問安視膳不改家人之禮蒸蒸然翼翼然真帝皇之上儀誥誓所不及巳歷選內禪生人以來振古及隋未有如我皇帝者也而猶嫗煦萬類勤勞四生乃以乾元二年太歲巳亥春三月巳丑端命左驍衛右郎將史元琮中使張廷玉奉明詔布德音始于洋州之興道洎山南劒南黔中荆南嶺南江西浙江西諸道訖于升州之江寧秦淮太平橋臨江帶郭上下五里各置放生池凡八十一所蓋所以宣皇明而廣慈愛也易不云乎信及豚魚書不云乎洎鳥獸魚鱉咸若古之聰明睿智神武而不殺者非陛下而誰昔殷湯克仁猶存一面之網漢武垂惠才致銜珠之答雖流水救涸寶勝稱名蓋事止於當時尚介祉於終古豈我今日動者植者水居陸居舉天下以為池罄域中而蒙福乘陀羅尼加持之力竭煩惱海生死之津揆之前古曽何髣佛微臣職忝方面生丁盛美受恩􅐛深無以上報謹緣臯陶奚斯歌虞頌魯之義述天下放生池碑銘一章雖不足雍容明聖萬分之一亦臣之精懇也敢刻金石著其詞曰明明皇帝臨下有赫至德光天乾元啓賾緯武戡亂經文御曆孝感神明義形金石仁覆華夏恩加蠻貊道冠巍巍威深虩虩遘兹多難克廣丕績慶緒致誅思明僻易人道助順天道惡逆撲滅之期匪朝伊夕乘此寶祚永康宗祏業盛君親功崇列辟交禪之際粲然明白回映來今孤髙往䇿去殺流惠好生立辟率土之濵臨江是宅遂其生性庇爾鱗翮環海為池周天布澤致兹忠厚罔弗怡懌動植依仁飛沈受獲流水長者從稱往昔寶勝如來疇庸允格德力無競慈悲孔碩相時傳聞尚賴弘益矧在遭遇其忘敷錫真卿勒銘敢告凡百乞御書題天下放生池碑額表臣真卿言臣聞帝王之德莫大於生成臣子之心敢忘於讃述臣去年冬任升州刺史日屬左驍衛左郎將史元琮中使張廷玉等奉宣恩命於天下州縣臨江帶郭處各置放生池始于洋州興道迄于升州江寧秦淮太平橋凡八十一所恩霑動植澤及昆蟲發自皇心遍于天下歷選列辟未之前聞海隅蒼生孰不欣喜臣時不揆愚昧輒𫐠天下放生池碑銘一章又以俸錢於當州採石兼力拙自書蓋欲使天下元元知陛下有好生之德因令微臣獲廣昔賢善頌之義遂絹寫一本附史元琮奉進兼乞御書題額以光揚不朽緣前書點畫稍細恐不堪經久臣今謹據石擘窠大書一本隨表奏進庶以竭臣下慺慺之誠特乞聖恩俯遂前請則天下幸甚豈唯愚臣昔秦始皇暴虐之君李斯邪諂之臣猶刻金石垂於後代魏文帝外禪之主鍾繇偏方之佐亦於繁昌立表頌德況陛下以巍巍功業而無紀述則臣竊恥之謹昧死以聞伏增戰越臣真卿誠恐頓首頓首死罪謹言御書批答勑朕以中孚及物亭育為心凡在覆載之中畢登仁壽之域四靈是畜一氣同和江漢為池魚鱉咸若卿愼徽盛典潤色大猷能以懿文用刋樂石體含飛動韻合鏗鏘成不朽之立言紀好生之上德唱而必和自古有之情發于中豫嘉乃意所請依奏大唐寶曆崇元聖祖院碑銘并序賈餗唐寶曆二年歲直景午浙右連帥御史大夫贊皇公新建聖祖院于大茅峯下崇元觀之前上直夫華陽洞之南門集羣仙之靈慶資聖壽於萬億本其經始實感周先生出應昌運為唐廣成薦瑞表祥式旌不朽於是恩錫院額號曰寶曆崇元聖祖院玄門之盛輝動嵓谷時唐興二百有九載天子以神聖文武惟新景命德合乎五千文之玄訓明繼乎十二聖之丕業以淸靜源理化以仁壽域生靈陶之以大和躋之於至順故自臨馭大寶則申詔百辟旁延萬邦推誠備禮徴訪至道寤寐孜孜如恐不及夫明天子勤求干上必賢方伯感致于下君臣一德而道德可興乃其年秋七月公以天子之命齋戒虔懇果得周先生曰息元實元精之全德大道之宗師也先生葆真抱一涵光吹萬天下聆其風者久矣而遐襟曠迹冥寄希夷顯晦自我人莫能識夫玄珠非詬可索至道惟精誠是致故纍聖之所不能起而一朝感契洪化蒸然來思且謂公曰昔廣成對理身之問鴻蒙啓心養之説二者皇王之大本也今某亦將以斯道上報吾君公於是澄心清神思所以慶皇休而贊景福遂與先生圖議選置玄宇相彼形勝莫靈此峯昔梁朝福鄉太子置道館二其古壇廢井遺趾猶在乃鏟荒夷險鬱起層構散俸錢以資其費擇幹吏以董其役翬飛矢直不日而成像設崇嚴殿宇沈邃神仙儀衛左右森列并按舊史氏得仲尼問禮關尹請著書之像咸備于前蓋將會通仙而肅百靈以永為國家齋醮之勝選也況三茅精氣二許馨烈古來得道於是者代有其人考傳驗圖若可攀揖而繚垣之內有流泉嘉木滋飾幽潤地靈境秀觸類增益懋此成績與山無窮永惟聖祖育德乎太極之前顯靈於未形之表當是時也合散消息莫可名象明而為日月動而為風雷播育而不測運行而不殆君得之豕韋以挈天地臣得之傳説以相武丁吾何為哉道本一貫及夫神化挺生含章炳靈象帝之先資我強名將寄言以顯玄樞錫羡以興皇業猶龍既見萬物方覩是宜夫垂休儲祉長發其祥億萬斯慶集于寶曆此崇元新院所以得時而啓也初公以上方崇嚮道德計天下有道之士可以當是大選者惟周先生一人而巳故其招致之忠盡訪求之精實則先生不得不出而公之誠節不得不伸既而聖淸感愜萬國瞻賀其逢迎之優異禮貌之嚴顯自古尊師重道之盛無以加也則真宗玄極至道之精不得不洞契乎上心播宣於理術俾風流澤浸廣𬒳八區嗚呼此先生所以出而不疑亦所以示天下之可不致如巳者當吾君之至理適吾道之可言千載一期起乃時耳矧公以濟代全才合乎休明樹風南藩績最天下前歲興建儒學而天降膏露顯于廟庭俗變風移遂至於道今之輝崇真館闡奉玄化上感睿旨下孚元元仁聲順氣流溢四境推是為政大而伸之則致君經國之用可見矣又況封部之內融汰之下遍識玄元之教俱為崴􅕲之人顧難乎哉餗謬列屬城獲詳事實又嘗以春秋屬詞為學故承命奮筆直而不文其銘曰聖運光啓山川效靈黃帝為君起乃廣成崆洞至言今復行兮明明天子以道致理方伯虔誠先生戾止纍聖莫致今兹起兮玄感既宣化流溥天公拜稽首天子萬年何以薦神御玄元兮閟宇崇崇聖祖尊容神而明之神應豐融華陽仙洞大茅峯兮金榜瑶壇仙術真官羽節凌風珠佩珊珊是醮是齋百福延兮名崇天錫境古地久下薦臣忠上資聖壽靈山萬歲績不朽兮連州靜福山廖先生碑銘并序蔣防沖先生名也淸虛先生字也本郡主簿西曹祭酒湘東王國常侍先生官也靜福山先生家也於戲先生之名玉堂金簡之名矣先生之官詞林學府之官矣先生之家紅霞丹景之家矣至若鶴骨松貌泉渟谷虛寓形人間天地無纍與夫扶桑公陶隱居張天師遙為師友矣以梁大通三年家此山光大二年去此山春秋九十七門人邑子無以知其蹤但徘徊醮壇泣對香火而巳長慶末余自尚書司封郎中知制誥翰林學士得罪出守臨汀尋改此郡揖先生至道登先生舊山捫蘿撥雲瞻仰不足稽首巖戶強為之銘曰玄都丈人大道之師靜福先生從而學之仙書無文仙語無詞以心傳心天地不知猛虎我策長蛇我持放情逍遙今古為誰華表白鶴千年一歸不知先生此會何時瞻望雲路人間後期京師至德觀法主孟法師碑銘并序岑文本觀夫太陽始旦指崦嵫其若馳巨川分流起潡澥而不息是以至人無巳先天地而御六氣列仙神化隘宇宙而遺萬物與夫齊魯搢紳束名教於俄景漢魏豪傑徇榮利於窮塗何異乎蜉蝣生於崇朝爭長於龜鶴秋毫出於末兆計大於昆閬者哉若乃岱山龍駕傳神丹之祕訣秦都鳳祠流洞簫之妙響用能延頽年於昧谷振朽骨於玄廬白玉之簡祈西王而可值靑雲之衣師東陵而易襲豈非度世之寶術登遐之妙道焉法師俗姓孟氏諱靜素江夏安陸人也其先徙里成仁繼迹於孔墨冬笋表德齊聲於曾閔是以貽則當世錫類後昆軒冕之盛既富於天爵賢明之質獨表於仙才固以軼仲弓之奕葉邁陽元之餘慶者矣法師稟兩儀之靈和體五常之休德崇蘭散馥掩蕭艾於芳春朗月揚暉蕩雲霧於淸夜盈尺之寶出鄢郢而連城徑寸之珍入大梁而照乘豈惟楊號異才馳聲益部曹稱孝行播美上虞而巳哉幼而慕道超然拔俗志在芝桂譬芻豢於粳粃心繫煙霞方綺羅於桎梏既而𥘉笄云畢逮吉有興懿戚託繼世之援慈親割相離之情千金甫陳百兩將戒法師凌霜之操必守節於玄冬匪石之誠誓捐生於白刃素概難奪嘉禮遽寢乃脫屣通德之門絶景集靈之館虔修經戒長甘𬞞菲漱元氣於亭午思輕舉於中夜若夫金簡玉字之餘論玄化道樞之妙旨三皇內文九鼎丹法莫不究其條貫猶登山而小魯踐其戶庭若披雲而見日允所謂天挺才明人宗模楷者巳隋髙祖文皇帝聞風而恱徴赴京師亦既來儀居于至德之觀公卿虛巳士女翹心於是高視神州廣開衆妙懸明鏡於講肆陳鴻鍾於靈壇著籙之侣升堂者比迹問道之客及門者成羣雖列星之仰天津衆山之宗地軸未足以喻也我髙祖以大聖締基功踰覆載皇上以欽明纂曆道冠犧農崇三淸以緯民懷九仙而濟俗天地交泰中外和平法師維持科戒弘宣經典時歷夷險懷趙璧而無玷年殊盛衰鼓吳濤而不竭迹均有待心叶無為循大小於天倪既齊椿菌忘壽夭於物化寧辨彭殤而靈氣有感仙骨夙著金液方授駕白龍而不反玉棺遽掩望靑鳥之來翔以貞觀十二年七月十二日遺形而化春秋九十有七顔色如生舉體柔弱斯蓋仙經所謂尸解者也冕旒惜道門之梁壞搢紳悼人師之云亡固以恩侔撤樂悲踰輟相有勑賜以膊禮資給葬事並加隆焉弟子陳光等義結在三名髙入室對衣履而增絶瞻風雲而永慕思欲寄銘讃以敘思勒琬琰以紀德俾夫成銀之室神變久而若存遺履之地靈迹垂於不朽其詞曰西秦簫響東陵聖迹霞舉玉京雲開金液飛廉先路句芒奉璧形表丹靑聲流金石玄風誰纂允屬賢明翟衣絶志鶴御依情栖心大道投迹長生三山可陟九轉方成靈化人間髙翔羽服白霓擁蓋靑虯夾轂丹竈留煙仙壇餘竹貽則終古永播蘭菊大唐升玄劉先生碑銘并序馮宿維皇王能自得師以臻至理維道德克輔於代且非常名天啓聖唐運興我李於赫肇祖實惟玄元髙宗振其風於前明皇張其教於後十有三葉天子曰敬宗文武大聖廣孝皇帝弘淸靜之旨以浸天下闡無為之宗以凝海內寶曆二祀秋八月甲子躬法服御內殿北面執弟子之禮受道于升玄先生大矣哉斯所以貫三才寵八極澤及中外仁加動植播中和贊恭默昌聖緒垂帝則而巳翌日下明詔加先生之號檢校光祿少卿自內道場送歸于玄真之觀居命兩街之緇黃前馬夾路以引以翼萬衆榮觀以為崆洞之請瑶池之宴曽莫我若先生姓劉氏諱緃政生於河南緱氏家世奉道彰于前朝而先生超然韙如角立秀出志學之歲辭親就師視冠冕若桎梏顧聲名猶涕唾夫其洞達懸解知來藏往體於虛而觀其妙守其朴而反於機由是採氣于三淸吸精于兩曜和光于萬有委蛻于重玄始事河內張君通玄次師中嶽邢君歸一二君之傳授真筌祕訣色授神與而上至于東晉楊君凡十四世其實若關鍵之固鈎鎖之密莫得而窺至是而悉歸我焉冝其當玄門之尊以師道自處先生棲于王屋不啻一紀其後受請遷居都下又承詔至于京師化隨躬行名出心隱故傳法紫宸之後竟遂東還今上端穆淸之居𬗟汾水之想將召舊德而咨要道吾師知之私於門人韓貞漼曰吾將解去先告之期蓋大和四年某月林鍾其日癸亥其春秋七十有八也嗚呼蘭薰膏明以自迫鶴駕霓旌而難駐貞漼與東夏弟子若干人及關中弟子葉守中等若干人以為吾師之不可舉援者真氣粹容至如章施紀述追琢琰琬使將來鑽之仰之而不怠冝在乎文慿文以導心因心以成志謂宿嘗奉几杖熟遊牆藩俾為銘而揭焉且慰夫餐霞遁俗者之懷煌煌二都各樹其一其辭曰內天外人葆和嗇神道之宗兮乘飊駕欻無象有物玄之功兮我后敬皇灼其耿光慕崆洞兮吾師升玄法於自然繫喬松兮洪惟武文懿此正真紹先風兮金關玉堂靈符寶章闢中宫兮出自幽谷賔于黃屋翊九重兮開陽闔隂忘形守心沃宸聰兮出日入月騰凌滅沒靡不通兮脫俗遁代并包覆載皆可容兮控鶴轡龍倘佯髙空躡前蹤兮捐巧棄智潔誠去偽順至公兮戴君奉親後已先人福乃鍾兮洛都應召京邑承詔隨西東兮泊然泉渟油然雲行恣所從兮從之在勤道將自親滋益恭兮為而不殆績用斯倍吉以逢兮法施經流通明達幽播無窮兮功滿行圓解形默然示有終兮谷神不死蟬蛻而巳何哀恫兮鳩血誠而圖石刻者伊貞漼與守中兮重校正唐文粹卷第六十五嘉靖甲申歲太學生姑蘇徐焴文明刻于家孰
