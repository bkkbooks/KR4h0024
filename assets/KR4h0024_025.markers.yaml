  - {type: variant, offset: 10767, length: 0, content: '', WYG: 書李觀請置詩學博士書李行脩請孟子為學科書皮日休請韓文公配饗書論貢士書舒元輿請太宗不詰難臣寮上言書并答詔劉洎臣聞帝主之與凡庶聖哲之與賢愚上下相懸擬倫斯絶若乃以至愚而對至聖以極卑而對極尊徒思自强不可得也陛下䧏恩㫖假慈顔凝旒以聽其言虚襟以納其說猶恐羣下未敢對揚況動神聰縱天辯飾辭以扸其理援古以排其議欲令凡庶何階應荅臣聞皇天以無言為貴聖人以不言為徳老君稱大辯若訥莊}
