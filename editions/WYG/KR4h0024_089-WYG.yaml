body:
  text: 書十一揔一十三首激發八上崔相公書吳武陵再荅張僕射書栁冕上韋右丞書劉軻與田將軍書獨孤郁移陸司勲沔書歐陽秬與李渤拾遺書盧坦移成均博士書皮日休與孺顔上人書沈亞之哀嗚三列國附上李門下書栁宗元上吏部裴侍郎書駱賔王代荀卿與楚相春申君書附軻劉忿恚二與吏部孫貟外書陳章甫上安州裴長史書李白上崔相公書呉武陵月日謹白書相公閣下昔者獲侍坐於東掖竊聞餘論吾之行已畧無遺事獨未能舉賢士大夫於朝為恨耳武陵誠愚不覺竊抃以為明哲之達必將與人同然猶恨爾時相公未得行其志今者鎔鑄生人鼓簧羣物九牧之士傾耳而聽拭目而視以為舉善黜惡大堯之功相公亦塞其望乎昔者管夷吾致隰朋甯戚東郭牙賓胥無王子成於桓公分職其務且曰欲理國者則五子存焉如將霸王則夷吾在焉蓋不欲專其能也先相國居位旬朔而所舉者亦數十百人今不知相公所舉阿誰所黜阿誰自秋徂春非特旬朔豈天地無其人邪將相公有所待邪或則曰明主春秋鼎盛方有所好升平之畫未可為也此又常人之論無足徴者夫人君病無所好苟有所好何為不可假若主好畋獵則正人其無畋獵者乎主好宴遊正人其無蹙鞠拔河者乎因好而致事將濳化或以謌謡進或以烹餁來相公詎謂不然乎今兩河餘㓂條貫未得北虜倨慢西戎猖蹶三關可收五城可理河壖可田運漕可罷相公豈獨遺此而優游廊廟更以歲月取賢相之位然後旄鉞而出鎭乎生人可憐勲業可惜伏惟相公越羣士之好臆姑為躊躇天下幸甚始從北來得邊隅之事謹條别狀輕瀆嚴重武陵再拜再答張僕射書柳冕辱還答知朝廷之事事無小大難易一切言之言之輙從從乃中變故吾子言有進退之心誤矣夫言之不入諫而怒之國之患也言之輙從從而中變是可諫也又何患乎故下之說上患其志不固不患無時謀合於天即天為之時謀合於人即人為之時天且不違况於人乎伊尹負鼎俎五說于湯其道乃行天為之時也商鞅以彊國三說孝公其功乃立人為之時也譬如為山累土過於九仞然後功就苟待天時功不成矣愚公者志欲移山必能移山故天地之心與人不逺人能感天在於心耳昔犬戎滅周申甫復之無知亂齊管仲霸之晉室中絶王導興之太平干紀姚宋挫之彼謀之如神即用之如神故賢人君子匡救時運有其才必有其志有其言必有其事事至而退君子不為今一言未行其志乃衰是無志也故君子白刃可蹈也鼎鑊可赴也其志不可奪也今有其位有其時一不動再言之再不動三四言之即天地可動况於人乎天地氣合即君臣氣合又何患乎冕白上韋右丞書劉軻右丞閣下某切伏下風有年矣布衣儒冠讀書耕田焦勞形神求古人道不為不多其閲今之事極耳目之聞見亦以半古之道叅乎其心者也行之於古既如彼踵之於今又如此固不必揲乎蓍灼乎龜而卜筮行乎其中矣小生敢欲首天下之忠激敢言之士輙試貢心中事以當閣下閣下知一士之進退關天下之去就今天下白屋之士有角立秀出者或能以黄老言或能以儒術言或能以刑法言思願吐一竒設一䇿使司化源者開目而見四方之事閣下知天下亦有人乎有是人無其時與無是人同有其言而不行其所以言與無言同此所以理代寡而升平之運不可得而至也古之大臣不惟諫君人亦諫君亦諫故曰惟尹躬暨湯咸有一德此所以開聖聽而達天視也昔貞觀初天下注心於房魏而太宗果為堯舜開元中天下注心於姚宋𤣥宗幾如太宗今閣下之車轍馬跡相去俯無尺寸天下之注心於閣下聚手而指以為提持大柄在閣下掌握中耳閣下知人意叅於天意邪先天而天弗違則自古之相天下者其道不同及其成功一也昔漢孝惠時有若曹丞相以黄老施化而天下清淨孝武時有若公孫𢎞以儒術御世而天下亦治孝宣時有若魏邴者以刑法撿下實號中興閣下必欲為黄老而館舍下有膠西蓋公邪必欲為儒術而門下有平津之客邪必欲為刑法而與言者有温舒于公邪此三者在閣下所嗜而行之耳夫横一木而棟明堂者其力固多然其下有柱柱下有石石下有土積三物而棟力成焉故太𤣥曰崔嵬不崩羣土疆此明上下節級有扶持之道也今人之望閣下挺一身而棟天下必矣抑不知棟下之柱者誰乎柱下之石土者誰乎此小生汲汲於私心誠在此也某每病此來之欲為丞相者馴致其道積人之望使必曰某公必為宰相白麻未及下而門已扄鐍其此豈謂導萬物之情狀達一人之聦明邪且一人之耳待宰相而聦之一人之目待宰相而明之宰相之耳目亦資天下之士且曰是何賢於我其言亦何補焉此榖梁子所謂上暗下聾也某甞試論之天下之形聲雖離婁師曠故不能周視遍聽矧閉目掩耳而欲達天下之視聽不亦難哉故曰耳目在天下聦明在宰相故堯所以寄耳目於舜禹時謂聦明文思之后焉脱不以天下為聦明某不知其然此亦閣下之所醜聞也故某所徴前事而言之意者實欲閣下踐其地使今之談者曰房魏道在吾君必為太宗矣區區下情輒以此貢心焉伏惟宥其愚而捨其所持意恩幸某恐懼再拜與田將軍書獨孤郁天子賞將軍之勲自禆校領十萬軍率給麾幢節符佩黄金印者數四廟祖于京開東第駟門號公侯家子弟姻族以將軍故皆為好官將軍之勲名可謂盛矣美矣然某聞古人曰成功不久難處且物禁太盛昔者周公以至聖之德致太平之功以成王㓜少不忍而去召公有不恱色何者勢逼不能無嫌故也夫以聖處猶難况非聖哉故范蠡畱侯知其然去之而逺害昔者李斯為秦破山東從擒諸侯尊秦為天子秦皇以為丞相任事秦廷之貴惟斯耳斯知盛滿不行卒為秦擒韓信為漢誅趙魏破齊楚尊漢為天子漢裂土封王于荆漢將之貴惟信耳信不知降挹一旦蜚言被疑卒受吕氏之誅彼二子可謂巧於為人拙於為身故二子始有周吕勲卒受參夷誅何則由務進而不知退故今上封足下為公為王為十萬戸侯傳子襲孫居為䕫為龍出為桓為文且令召公無不恱色足下豈不賢於周公哉夫今之遊宦者辛勤數千萬言得一官俸不過三二萬數從僕不過一二人滿當罷戀戀不欲去豈非顧其利邪况夫遭時變即據千里土權殺生柄不覺炎燠更變歌童侍兒俳優不離前為樂萬方以娯情惟恐其不歡無纎憂能鑚其胷豈不願畱之邪顧其勢不可是以去故堯讓天下而長有天下孫叔敖不悔去者三願將軍無受呉張𤣥之說納馬援鄒陽之䇿思畱侯陶朱之舉悟韓信李斯之惑立竇融河西之績覽郭馬李高數賢之事稽叔敖三去之美昔蔡澤之說范雎也引鞅起踵以繫奪其位睢受說而歸相讓澤非不知澤情而受市也蓋審理必然今某來非縱横時豈澤之徒歟既非奪位而來又豈欲騁口衒世直以惜賢人之業耳惟將軍無猜焉移陸司勲沔書歐陽秬月日歐陽秬移書郎中閣下夫百女蕩一女貞蕩者紛然為貞者笑脫使貞者始貞而後蕩奈百人之笑一人邪嗚呼一之笑百百者有比恥於人而已百之笑一一者舉目無比其如恥何伏惟閣下少垂聽覽秬在閩中時聞閣下之名十年矣及來京師又逾一紀甞期閣下不出則若南陽劉子驥㑹稽謝慶緒出則如蜀孔明殷傳說不然亦如賈誼朱雲之徒庶幾於直道也今皇帝起閣下為郎閣下俁俁而來秬謂斯來也享數年有見必言有聞必論日復一日僅三百日矣豈九牧之民皆治矣無有術邪四夷之患皆平矣無有䇿邪天下之無賢者不可舉邪天下之無倖者不可黜邪天下之無贓者不可劾邪天下之無寃者不可雪邪天下之無屈者不可伸邪天下之無驕者不可誡邪既無所聞又無所見則樂堯舜之道讀周孔之書劉驎之謝敷斯人也閣下亦斯人也豈徒鼔動以朝廊飡而退是何前倨而後恭若彼始貞而後蕩如此且一之笑百雖有比也正今百人之反笑矣閣下欲何比焉夫名利之心不可巻正直之心亦不可轉秬謂閣下今之為不及昔時不為明矣且逢萌不掛冠孰有萌邪孫楚不漱石孰有楚邪閣下始心為直苟在為郎國家有明經進士史傳諸科孰不郎也後達者雖在閣下之左先達者果在閣下之右秬所謂為郎不若不為蓋悲閣下身未死而名已滅雖然尚有可復之計何者閣下有所見勿惜其位而言有所聞勿顧其身而論論或不行言或不用則乞骸歸去斯謂可復之計也已矣呉越暖景山川如繡鱸鱠蒓羮放歌長嘯夫如是永為陸司勲庶幾乎不朽伏惟念之秬再拜與李渤拾遺書盧坦八月三日坦頓首奉書拾遺公足下包濟世之資抗出塵之跡德全道備雲卧谷飲遺名而聲飛晦耀而光發天子所聞風下詔命作諫臣朝野聳瞻煙蘿動色足下懷寳樂山竟未為蒼生起實一代之孤風千年之曠躅不可得而累也坦器凡材薄猥踐班榮鎭守宣池路出瀍洛眺嵩峯之峻極仰景行之彌高吟想徽猷寤寐飢渴幸甚幸甚坦雖未獲拜面而舍弟甞師習於左右矣飽聞足下之高義竊承足下詠堯舜之言志周孔之道以致君惠人為意非特熊經鳥伸長往而不返者也甚善甚善然則孔氏之道不隘小官不榮大位於是宰中都而魯國化作相而天下服世衰運微其道中阻猶且歴國應聘窮塞而後止今天下歡康異衰周之代也萬方一統非列國之時也而足下猶獨超然高舉不答天子之命豈孔氏之徒歟愚竊惑焉大凡今之人奔分寸之禄走絲毫之利如羣蟻之附腥膻聚蛾之投爝火取不為醜貪不避死得以為榮失以為辱不由道以進退不量能以授受如此者多有識知病足下豈不欲矯棄流俗獨為君子哉誠志士之端操賢人之大業也敢不愛慕之乎或聞足下又以蒲輪𤣥纁郡府之禮不到遂徘徊山門未果輕去難進之道三揖為冝在足下俟駕而行斯可矣餘復何可道哉少許茶果謹具别紙公程迫速不獲拜詣馳誠而已不具盧坦白移成均博士書皮日休夫居位而愧道者上則荒其業下則偷其言業而可荒文弊也言而可偷訓薄也故聖人懼是寖移其化上自天子下至子男必立庠以化之設序以教之猶歉然不足士有業髙訓深必詘禮以延之越爵以貴之俾庠聲序音玲瓏於珩珮鏘訇於金石此聖人之至治也今國家立成均之業其禮盛於周其品廣於漢其詘禮越爵又甚於前世而未免乎愧道者何哉夫聖人之為文也為經約乎史賛易近乎象詩書止乎刪禮樂止乎定春秋止乎修然六籍儀形乎千萬世百王更命迭號莫不由是大也其幽幽於鬼神其妙妙於𤣥造後之人苟不得行胡郎反決句釋者猶萬物但被𤣥造之化者邪故萬物但化而已不知𤣥造之源也夫六藝之於人又何異於是故詩得毛公書得伏生易得田何禮得二戴周官得鄭康成摫其微言鈲其大義幽者明於日月奥者廓於天地然則今之講習之功與決釋之功不啻半矣其文得不弊乎其訓得不薄乎嗚呼西域氏之教其徒日以講習決釋其法為事吾之視太學又足為西域氏之羞矣足下出文閫生學世業精前古言高當今洸洸乎洋洋乎為諸生之蓍龜作後來之綿蕝得不思居其位者不愧其道處於職者不墮其業乎否則罹大易負乗之譏招詩人伐檀之刺矣奚不日誡其屬月勵其徒年持六籍日決百氏俾諸生於聖典也洞知大曉猶駕車者必知康莊操舟者必知河海既若是矣執其業者精者進而墮者退公者得而私者失非惟大發於儒風抑亦不苟於禄位足下之道被於太學也其利可知矣果行是說則太華之石峨峨於成均之門者吾知不頌於他人矣足下聽之無忽日休再拜與孺顔上人書沈亞之上人足下辱書指問將望於僕人謂有解達可以為梯進之級必慮過意幸聽畢説昔之有善鍜者火五金而别器一日化百狀而智用不極然常薄産自窘弟子相率而笑之曰夫子之於業工矣然而市售之冨不能當陶之饒何也對曰夫陶者淺勞而薄利與俗相用彼朝市而夕壞壞失其用復從而市之無虚日故能饒且吾之業搜矩而軸模及其成功與世終始彼匹居之人又安能罄其室而市吾之工哉故當飢亞之悞學為黄金鍛且已困矣上人無乃襲飢於此哉非敢自重誠以陷其所從耳幸熟慮焉亞之頓首上李門下書柳宗元某聞人有行三途之艱墜千仞之下者仰望於道號以求出過之者日千百人皆去而不顧能哀而顧之者不過攀木俯首深矉太息良乆而去耳卒無可奈何然其人猶望而未止也俄而有若烏獲者持長綆千尋徐而過焉其力足為也其器足施也號而不顧顧而曰不能則其人知必死於大壑矣何也是時不可遇而幸遇焉而又不迨乎已然後知命之窮勢之極其卒呼憤自斃不復望於上矣某曩者以齒少心銳徑行髙歩不知道塗之艱以陷大阨窮躓殞墜廢為孤囚日號而望者十四年矣其不顧而深矉太息者俱不足望焉然仰首伸吭張目而視曰庶幾乎其有異俗之心非常之力當路而垂仁者邪今乃閣下仁義正直入居相位某實切撫心自度以為獲其所望故敢致其辭以聲其哀若又捨而不顧則知埋沉踣斃無復振矣伏惟閣下動心焉某之得罪之由致謗之自以閣下之明其知之矣繁言蔓辭秪益為瀆伏惟閣下念墜者之至窮錫烏獲之餘力舒千尋之綆拯千仞之艱致其不可遇之遇以卒成其幸庶號而望者得畢其誠無使呼憤自斃殁有餘恨則士之死於門下者冝無先焉生死通塞在此一舉無任戰汗隕越之至上吏部裴侍郎書駱賓王四月一日武功縣主簿駱賓王謹再拜奉書吏部侍郎裴公執事易曰書不盡言言不盡意然則義在乎象非書無以達其微辭隱乎情非言無以筌其㫖僕誠鄙人也頗覽前事每讀書見高堂九仞曽参有北向之悲積粟萬鍾季路有南逰之歎未甞不廢書輟巻流涕沾衣何者情蓄於衷事符則感形潛於内迹應斯通是用布腹心瀝肝膽庶大雅含𢎞之量矜小人悃欵之誠惟君侯察焉賓王一藝罕稱十年不調進寡金張之援退無毛薛之遊亦何甞獻䇿干時高談王霸􅃷才揚已歴詆公卿不汲汲於䇿名不戚戚於卑位蓋養親之故也豈謀身之道哉不圖君侯忽垂過聽禮以弓招之恩任以書記之事擬人則多慙阮瑀入幕則高謝郗超昔聶政荆軻刺客之流也田光豫讓烈士之分也咸以世利相傾意氣相許尚且捐軀燕趙甘死齊韓今君侯無求於下官見接以國士當陪麾後殿奉節前驅賈餘勇以求榮效輕生而報施所以逡巡於成命躊躇於從事者徒以夙遭不造㓜丁閔㓙老母在堂常嬰羸恙藜糗無甘㫖之膳松檟闕遷厝之資撫躬存亡何心天地故寢食夢想噬指之戀徒深歲時蒸甞崩心之痛罔極若僕者固名教中一罪人耳何面目以奉三軍之事乎況屬天倫之喪奄踰七月違膝下之養忽至三年而㓙服之制將終哀痛之情未洩興言永慕舉目増傷夫怨於衷者哀聲可以應木石感於情者至性可以通神明故徐元直指心以求辭李令伯陳情以窮訴上以棄興王之佐命下以全奉親之篤誠而蜀主不以為非晉君待之逾厚此二人者豈貪貧賤惡榮華厭萬乗之交甘匹夫之辱也蓋有不得已之者哉儻有乾没為心脂韋成性捨慈親之色養許明公以驅馳内忘顧復之私外存傅㑹之眷薄骨肉厚榮寵苟背恩以自效則君侯何以處之且義士期乎貞夫忠臣出乎孝子既不能推心以奉母亦焉能死節以事人假物議之無嫌實吾斯之未信也流沙一去絶塞千里子迷入塞之魂母切倚廬之望就令歡以卒歲仰南薰之不貲而更憂能傷人迫西山而何幾君侯情深錫類道切天經明恕待人慈心應物儻矜犬馬之微願憫烏鳥之私情寛其負恩遂其終養則窮魂有望老母知歸賓王死罪再拜代荀卿與楚相春申君書劉軻前蘭陵令臣況謹奉書於相國春申君足下前者不識事機冠宋章襲儒衣以亷軸駕羸駑應聘於諸侯始入秦見秦應侯㑹侯方以六國㗖其君且曰吾方角虎以鬬又何儒為故去秦之趙㑹孝成王喜兵法方築壇拜孫臏欲磨牙而西臣以湯武之兵鉗其口於前趙王亦不少孫臏而多臣臣以是去趙之齊㑹宣王方沽賢市名達諸侯閒人聚稷下若鄒子田軿淳于髠皆號客卿故臣得翺翔於諸子間自威王至襄王三為祭酒號為老師然憫諸生少年皆不登闕里不浴沂水各掉寸舌得紆朱垂組自以為高絜莫我若也臣以乳兒輩畜之何虞其蝎蠆之為毒也由是讒言塞路臣之肉幾為齊人所食伏念相君與平原孟甞信陵齊名故游談者謂從成則楚王衡成則秦帝以相君之相楚故也不然楚何以得是名以是去齊歸相君相君果不以臣孱固俾臣為蘭陵令臣始下車方弦琴調軫欲蘭陵之人心和且富既富且教必使三年有成然後報政於相君此臣效相君者希以是不意稷下之謗又起於左右俾臣之醜聲直聞於執事執事果亦疑棄臣如脱故屣臣之去蘭陵豈不知相君之棄臣邪臣尚念古者交絶不出惡聲臣慰楚而怨相君也哉頃相君徒欲人之賢已曽不如楚國前事臣不逺引三代洎春秋今雖戰國亦不敢以他事白直道今楚國盛衰之尤者兾相君擇焉自重黎為火正光融天下鬻熊有巋德教西伯弟子洎蚡冒熊繹蓽路藍縷以啓荆蠻歴武文成始臣妾江漢至莊王始與中國爭伯此數君皆郢之祖宗而代亦稱臣之術五尺童子羞稱五伯臣又何必獨為相君道哉然楚君但成莊而已矣自莊而下楚亟不競平王嗣位耳目倒置伍奢以諫死費無極以讒用亡太子走昭王汚楚宫鞭郢墓豈不以一讒而至乎爾下及懷王知左徒屈原忠賢始能付以楚政當諸侯盛以遊説交鬬猶以楚為有人無何為上官靳尚所短王怒疎屈平平既疎秦果為張儀計陷楚之商於地儀計行秦果欺楚是以有藍田之役丹徒之敗懷王囚不出咸陽亡不越魏境客死而屍歸至今為楚痛豈不曰疎屈平親靳尚而至于爾人亦謂令尹子蘭不得皭然無非已不能疾讒又從而惜之俾屈生溺離騷為之作襄王以前事歴目切骨雖有宋玉唐勒景差輩子弟賦風弔屈而已又何能免王於矢石哉今相君自左徒為令尹封以號春申君楚於相君設不能引伍奢屈平以輔政復不能拒無極靳尚之口弭臣臣見泗上諸侯不北轅不來矣夫如是漢水雖深不為楚塹方城雖高不為楚險相君雖賢欲捨楚而安之也今有李園者世以諛媚薦寵喜以隂計中上根結枝布寖為難拔相君若不以此時去之則王之左右前後不靳尚則無極詎獨臣之不再用也前月相君聘至跪書受命且曰若惡若仇若善若師眞宰相之心脫李園何至費靳方試何害臣之不再罷蘭陵也哉敢輙盡布諸執事而無遂子蘭之非況之望也楚國之幸也與吏部孫貟外書陳章甫某叩頭伏地上書吏部貟外孫公階戺伏惟拔英苖而佐明主奉盛德而居要路亦光天衢樹桃李之秋也僕非敢隱籍名實昨聞戸部撿報似有叅差嗚呼雖有周孔之才無所施也矧兹虚陋能勿非乎但僕一卧嵩丘二十餘載既不能學許由巢父務光伯成終至青雲髙謝堯禹而乃棄藜杖脫草衣薦頌雲壇陪科岳牧此已孤負芝桂損辱高風矣若縁籍有誤䝉􅃑而歸亦何面目垂見巢由舊丘光成隱路耳公言泉百氏腹笥九經前古取人應所多見至如傅說無姓殷后致鹽梅之地屠羊隱名楚王延三旌之位未聞徴籍也范睢折脅於魏改名為張禄先生秦用之為相張良報讎變名姓而亡漢祖因之實取天下何必考名也是知善牧賢者不以小瑕棄大美今若以籍名有誤便廢其人僕恐蔽賢之議在有司矣夫籍者所以編戸口計租稅耳本防羣小不約賢路若人有大才不可以籍棄苟亡其德雖籍何為謹案周禮鄉大夫職曰國中自七十以及六十皆征之其捨者為賢也貴也服公事也注捨謂若今復除其計耳所以優賢能也三歲則考其德行道藝羣吏獻賢能之書于王王再拜而受之登于天府鄭司農云若舉孝亷茂才由此觀之乃舉賢之餘事爾比來天下此道都喪無論賢貴冝被籍書所以風俗不淳賢能不勸由此故也公為官擇才務恊於治典進賢輔政何拘於版圖且古之招賢降蒲輪束帛卑辭厚禮猶恐不來今乃坐徴籍書務在駮放此所謂嫉賢也若將古不足法謂時無賢才經邦致治非籍勿用於是㒒也鞭骨自悔裹足而亡雖分國如錙銖終不敢望於臣仕也上安州裴長史書李白白言天不言而四時行地不言而百物生白人焉非天地安得不言而知乎敢剖心折肝論舉身之事便當談笑以明其心而粗陳其萬一悒怏憤懣惟君侯察焉白家本金陵世為右姓遭沮渠䝉遜之難奔流咸秦因官寓家少長江漢五歲誦六甲十歲觀百家軒轅以來頗得聞矣常横經籍詩書制作不倦迄于今三十春矣以為士生則桑弧篷矢射于四方故知大丈夫必有四方之志乃仗劒去國辭親逺遊南窮蒼梧東渉溟海見鄉人相如大誇雲夢之事云楚有七澤遂來觀焉而許相公家見招妻以孫女便憩跡于此至移三霜焉曩昔東遊維陽不逾一年散金三十餘萬有落魄公子悉皆濟之此則是白之輕財好施也又昔與蜀中友人呉指南同遊於楚指南死於洞庭之上白禫服動哭若喪天倫炎月伏屍泣盡而繼之以血行路聞者悉皆傷心猛虎前臨堅守不動遂權殯於湖側便之金陵數年來觀筋肉尚在白雪泣持刃躬申洗削裹骨徒步負之而趨寢興攜持無輟身手遂丐貸營葬於鄂城之東故鄉路逺魂魄無主禮以遷窆式昭朋情此則是白存交重義也又昔與逸人東巗子隱於岷山之陽白巢居數年不跡城市養竒禽千計呼皆就掌取食了無驚猜廣漢太守聞而異之詣廬親覩因舉二人以有道並不起此則白養高忘機不屈之跡也又前禮部尚書蘇公出為益州長史白於路中投刺待以布衣之禮因謂郡寮曰此子天才英麗下筆不休雖風力未成且見專車之骨若廣之以學可以相如比肩也四海明識具知此談前此郡督馬公朝野豪彦一見盡禮許為竒才因謂長史李京之曰諸人之文猶山無煙霞春無草樹李白之文清雄奔放名章俊語駱驛閒起光明洞徹何以盡陳儻其賢賢也白有可尚夫唐虞之際於斯為盛有婦人焉九人而已是知才難不可多得白野人也頗工於文惟君侯顧之無按劒也伏惟君侯貴而且賢鷹揚虎視齒若編貝膚如凝脂昭昭乎若玉山上行朗然映人而髙義重諾名飛天京四方諸侯聞風暗許倚劒慷慨氣干虹蜺月費千金日宴羣客出躍駿馬入羅紅顔所在之處賓客成市故時人歌曰賓客何喧喧日夜裴公門願得裴公之一言不須驅馬埒華軒白不知君侯何以得此聲於天壤之間豈不由重諾好賢謙以下士得也而晩節改操棲情翰林天才超然度越作者屈佐鄖國時惟清哉稜威雄雄下慴羣物白竊慕髙義已經十年雲山間之造謁無路今也運㑹得趨末塵承顔接辭八九度矣常欲一雪心跡﨑嶇未便何圖謗言忽生衆口攅毁將恐投杼下客震於嚴威然自明無辜何憂悔吝孔子曰畏天命畏大人畏聖人之言過此三者鬼神不害若使事得其實罪當其身則將浴蘭沐芳自屏於烹鮮之地惟君侯死生不然投山竄海轉死溝壑豈能明目張膽託書自陳邪昔王東海問犯夜者曰何所從來答曰從師受學不覺日晩王曰吾豈可鞭撻甯越以立威名想君侯通人必不爾也願君侯惠以大遇洞開心顔終乎前恩再辱英眄白必能使精誠動天長虹貫日直度易水不以為寒若赫然振威加以大怒不許門下逐之長途白即膝行於前再拜而去西入秦海一觀國風永辭君侯黄鵠舉矣何王公大人之門不可以彈長劒乎唐文粹巻八十九欽定四庫全書唐文粹巻九十宋姚鉉編
