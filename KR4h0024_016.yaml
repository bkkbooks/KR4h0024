  text: 重校正唐文粹卷第十六之上
  hash: sha256:fd0dc8cad660149de2b1ee14623c8097708cc6593a8e69dec64eca44bfcc988e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0024_SBCK_016-1a}
body:
  text: 吳興姚鉉纂詩壬揔七十四首古調歌篇五知巳九仰荅韋司業垂訪五首蕭頴士愽平鄭太守自廬山見訪郤之武陵立馬贈別李白攜新文詣張籍韓愈途中成賈㠀喜陳懿老自宛陵至示予新製三十餘篇朱晝延康吟賈㠀交友四審交孟郊荅友問白居易北極贈李觀韓愈與馬異結交盧仝規誨四示孟郊孟浩然自誡司空圖誡貪釋子蘭杏園即席上同年曹鄴紀贈五讀張曲江詩集釋皎然上河陽李大夫孟效奉贈張荆州王昌齡詠德上韋撿察歐陽詹贈崔從事鄖孟郊散逸七漁父歌李頎紫谿翁歌陸龜蒙秋醉歌張爲襄陽歌李白散人歌陸龜蒙貽張旭李頎春日醉起言志李白俠少二戯作花卿歌杜甫秦宫詩李賀登覽十五望廬山瀑布二首李白望山賈㠀登金陵鳯凰臺李白登黃鶴樓崔顥登嶺望許鼎過華隂王昌齡早霽南樓張說奉和早霽南樓趙冬曦奉陪登南樓尹􅐂春遊南亭韋應物廬山謡寄盧侍郎虛舟李白登南岳事畢謁司馬道士張九齡奉使登終南山王灣終南山望餘雪作祖詠勝槩二十八桃源行劉禹錫桃源行王維和登㑹稽山孫逖洪州祈雨是日輒應賦詩張九齡寄贈宋十一田逰巖敬荅田徵君宋之問龍門八詠劉長卿宣城淸溪二首李白入崖口五渡寄李適宋之問荅宋十一見贈李適和崖口五渡徐彦伯𥘉至崖口宋之問山中作顧況輞口遇雨憶終南山裴迪荅裴迪王維出靑門徃終南山下別業薛據夜歸鹿門歌孟浩然春泛若耶綦母濳荆山獨徃姚係歸四眀胡幽貞尋西山隱者不遇丘爲仰荅韋司業垂訪五首蕭頴士􅊯􅊯食苹鹿常飲淸泠川但恱豐草美寧知牢饌鮮主人有幽意將以充林泉罘網幸免傷蒙君復羈牽高堂列衆賔廣坐鳴清弦俯仰轉驚惕徘徊獨憂煎𬗟懷雲巗路欲往無由縁物各有所好違之傷自然神龜在南國𬗟邈湘川隂遊止蓮葉上歲時嘉樹林毒蟲且不近斤斧何由尋錯落負竒文熒煌燿丹金江山萬里餘淮海阻且深獨保貞素質不爲寒暑侵一逢盛明代應見通靈心晉代有儒臣當年冨辭藻立言寄靑史將以賛王道遼落𬗟歲時辛勤歷江㠀且言風波倦探渉豈爲寶不遇庾征西云誰展懷抱士貧乏知巳安得成所好彭陽昔游說願謁南郢都王果尚未達況從夷節謨豈知晉叔譽無罪嬰囚拘臨難俟觧紛獨知祁大夫舉讎且不棄何必論親踈夫子覺者也其能遺我乎關西一公子年貌獨靑春被褐來上京翳然聲未振中郎何爲者倒屣驚座賔詞賦豈不佳盛名亦相因爲君奏此曲此曲多苦辛千載不可誣孰言今無人愽平鄭太守自廬山千里相尋入江夏北市門見訪郤之武陵立馬贈別李白大梁貴公子氣蓋蒼梧雲若無三千客誰道信陵君救趙復存魏英威天下聞邯鄲能屈節愽訪從毛薛夷門得隠淪而與矦生親仍要皷刀者乃是袖鎚人好士不盡心何能保其身多君重然諾意氣遥相託五馬入市門金鞍照城郭都忘虎竹貴且與荷衣樂去去桃花源何時見歸軒相思終無極腸斷朗陵猿攜新文詣張籍韓愈途中成賈㠀袖有新成詩欲見張韓老靑竹未生翼一歩萬里道仰望靑冥天雲雪壓我腦失却終南山惆悵滿懷抱安得西北風身願變蓬草地祇聞此語突出驚我倒喜陳懿老自宛陵至示予新製三十餘篇朱晝一別一千日一日十二憶苦心無閑時今夕見玉色玉色復何異紅明含群德有文如星宿飛入我胷臆憂愁方破懷懽喜重補塞使我心皃全且非黃金力將攀下風手願假僊鸞翼予欲訪詩人孟郊故寄誠於章句延康吟賈㠀寄居延壽里爲與延康隣不愛延康里愛此里中人人非十年故人非九族親人有不杇語得之烟山春審交孟郊種樹須擇地惡土變木根結交若失人中道生謗言君子芳桂性春濃寒更繁小人槿花心朝在夕不存莫躡冬冰堅中有潛浪翻唯當金石交可與賢達論荅友問白居易大圭廉不割利劒用不缺當其斬馬時良玉不如鐡置鐡在洪鑪鐡銷易如雪良玉同其中三日燒不熱君疑才與德詠此知優劣北極贈李觀韓愈北極有羇羽南溟有沉鱗川源浩浩隔影響兩無因風雲一朝㑹變化成一身誰言道理逺感激疾如神我年二十五求友昧其人哀歌西京市乃與夫子親所向苟同趣賢愚豈異倫方爲金石姿萬世無緇磷無爲兒女態憔悴悲賤貧與馬異結交盧仝天地日月如等閑盧仝四十無往還唯有一片心脾骨巉巗摧崒硉兀鬱律刀劒爲鋒鍔平地放著髙如崑崙山天不容地不受日月不敢偷照耀伏羲畫八卦鑿破天心胷女媧伏羲妹恐天怒擣鍊五色石引日月之針五星之縷把天𥙷𥙷了三日不肯歸壻家走向日中故老鵶月裏栽桂養蝦蟇天公發怒化龍蛇此龍此蛇得死病神農合藥救死命天怪神農黨龍蛇罰神農爲牛頭令載元氣車不知藥中有毒藥藥殺元氣天不覺爾來天地不神聖日月之光無定正不知元氣元不死忽聞空中喚馬異馬異若不是祥瑞空中敢道不容易昨日仝不同異自異是謂大同而小異今日仝自同異不異是謂同不往兮異不至直當中兮動天地白玉璞裏斵出相思心黃金鑛裏鑄出相思淚忽聞空中崩崖倒谷聲絶勝明珠千萬斛買得西施南威一雙婢此婢嬌饒惱殺人凝脂爲膚翡翠裙唯解畫眉朱點唇自從獲得君𫾣金摐玉凌浮雲却返顧一雙婢子何足云平生結交苦少人憶君眼前如見君靑雲欲開白日没天眼不見此竒骨縱横竒又竒千歲萬歲枯松枝半折半殘壓山谷盤根蹙節成蛟螭忽雷霹靂卒風暴雨撼不動欲動不動千變萬化揔是鱗皴皮此竒怪物不可欺盧仝見馬異文章酌得馬異心中事風姿骨木恰如此是不是寄一字示孟郊孟浩然蔓草蔽極野蘭枝結孤根衆音何其繁伯牙獨不喧當時高深意舉世無能分鍾期一見知山水千秋聞爾其保靜節薄俗徒云云自誡司空圖我祖銘座右嘉謀詒厥孫勤此苟不怠令名日可存媒衒士所恥慈儉道所尊松柏豈不茂桃李亦自繁衆人皆察察而我獨昏昏取訓於老氏大辯欲訥言誡貪釋子蘭多求待心足未足旋傾覆眀知貪者心求榮不求辱杏園即席上同年曹鄴岐路不在天十年行不至一旦公道開靑雲在平地枕上數聲鼓衡門巳如市白日探得珠不待驪龍睡忩忩出九衢僮僕顔色異故衣未及換尚有去年淚晴陽照花影落絮浮野翠對酒時忽驚猶疑夢中事自憐孤飛鳥得接鸞鳯翅永懷共濟心莫起胡越意讀張曲江詩集釋皎然相公乃天啓人文佐生成立程正頽靡繹思何縱橫春杼弄緗綺陽林敷玉英飄然飛動姿邈矣高簡情後輩驚失歩前脩敢爭衡始欣耳目逺再使幾慮淸體正力巳全理精識何妙昔年歌陽春徒推郢中調今朝聽鸞鳯豈獨蘇門嘯帝命鎭雄州詩流據上游才兼荆衡秀氣助瀟湘秋逸蕩子山匹經竒文暢儔沉吟未終卷變態紛難數耀耳代明璫襲衣比芳杜愔愔聞玉聲寤寐在靈府上河陽李大夫孟郊上將秉神略至兵無血威三軍向嚴冬一撫勝重衣寒劒奪衆景夜星失長暉蒼鷹獨立時惡鳥不敢飛武牢鏁天關河橋紐地機大軍奚與安守此稱者稀貧士少顔色貴門多輕肥試登山嶽高始見草木微山嶽恩旣廣草木心皆歸奉贈張荆州王昌齡祝融之峯紫雲銜翠如何其雪嶄嵒邑西有路縁石壁我欲從之卧穹嵌魚有心兮脫網罟江無人兮鳴楓杉王君飛鳥仍未去蘇躭宅中意遥緘詠德上韋撿察即韋相公之弟也歐陽詹少華類太華太室似少室亞相與丞相亦復無異質亭如月臨水肅若松照日輝影互光澄隂森兩葱鬱連枝鸞鳯下同氣龜龍出併力革夷心通籌整師律英豪願迴席蠻貊皆屈膝中外佇分途寰瀛待淸謐贈崔從事鄖孟郊古人留淸風千載遥贈君破松見貞心裂竹㸔直文殘月色不改高賢德常新家懷詩書冨宅抱草木貧安排一蹄泉未化千尺鱗含意永不語釣璜幽水濵漁父歌李頎白頭何老人蓑笠蔽其身避世常不仕釣魚淸江濵浦沙眀濯足山月靜垂綸寓宿湍與瀬行歌秋復春持竿湘岸竹爇火蘆洲薪渌水飯香稻靑荷包紫鱗於中還自樂所欲全吾眞而笑獨醒者臨流多苦辛紫谿翁歌并序陸龜蒙紫谿翁過甫里先生舉酒相屬醉而歌曰一丘之木其栖深也屋吾容不辱一谿之石其居平也席吾勞以息一竇之泉其音淸也弦吾方在懸得乎人得乎天吾不知所以然而然先生弁而賡之曰采江之魚兮朝船有鱸采江之𬞞兮暮筐有蒲左圖且書右瑟與壷壽歟夭歟貴歟賤歟歌闋而去秋醉歌張爲金風颯巳起還是招漁翁攜酒天姥岑自彈嶧陽桐脫却登山屐赤脚翹靑笻泉聲掃殘暑猿臂攀長松翠微泛樽緑苔蘚分煙紅造化處術内相對數壷空醉眠嶺上草不覺夜露濃一夢到天暁始覺一醉中皎然夢中路直到瀛洲東初平把我臂相與騎白龍三留對上帝上樓十二重上帝賜我酒送我𫾣金鐘寳閣香斂苒琪樹寒玲瓏動葉如笙篁音律相怡融珍重此一醉百骸出天地長如此夢魂永謝名與利襄陽歌李白落日欲没峴山西倒著接籬花下迷襄陽小兒齊拍手攔街爭唱白銅堤傍人借問笑何事笑殺山公醉似泥鸕鷀杓鸚鵡盃百年三萬六千日一日須傾三百杯遥㸔漢水鴨頭緑恰似蒲萄初醱醅此江若變作春酒壘麴便築糟丘臺金鞍駿馬換小妾笑坐金鞍歌落梅車傍側挂一壷酒鳯笙龍管行相催咸陽市上嘆黃犬何如月下傾金罍君不見晉朝羊公一片石龜龍剥落生莓苔淚亦不能爲之墮心亦不能爲之哀清風朗月不用一錢買玉山自倒非人推舒州杓力士鐺李白與爾同死生襄王雲雨今安在江水東流蝯夜聲散人歌陸龜蒙江湖散人天骨竒短髪搔來蓬半垂手促孤篁曳寒繭口誦太古滄浪詞詞云太古萬萬古民性甚壄音野無風期夜棲正與禽獸雜獨自構架縱橫枝因而稱曰有巢氏民共敬貴如君師當時只效烏鵲輩豈是有意陳尊卑無端後聖穿鑿破一派前導千流隨多方惱亂元氣死日使父子生姦欺聖人事業轉消耗尚有漁者存熈熙風波不獨因一士凡百器用皆能施罛䟽扈腐鱸鱖脫止失撿馭無䜛疵人間所謂好男子我見婦女留須眉奴顔娨膝眞乞丐反以正直爲狂癡所以頭欲散不散弁峩巍所以腰欲散不散佩陸離行散任之適坐散從傾欹語散空谷應笑散春容披衣散單複便食散酸鹹冝書散混眞草酒散甘醇醨屋散勢斜直樹散行參差客散忘簪屨禽散空籠池外物一以散中心散何疑不共諸矦分邑里不與天子專隍陴靜則守桑柘亂則逃妻兒金鑣納帶未甞識白刃殺我窮生爲或聞蕃將負恩澤號令鐡馬如風馳大君年小丞相少當軸自請都旌旗神鋒悉出羽林仗繪畫日月蟠龍螭太宗基業甚牢固小醜背叛當殱夷禁軍近自肅宗署抑遏輔國爭雄雌必然大叚翦兇逆須召勁勇扶軍麾四方賊壘猶占地死者暴骨生寒飢歸來輒擬荷鋤笠詬吏巳責租錢遲興師十萬一日費不啻千金何以支秪今利口且箕歛何暇俛首哀惸婺矛牙均荒𥙷敗豈無術布在方䇿撑頽隵冰霜襦袴易反掌白靣諸郎殊不知江湖散人悲古道悠悠幸寄羲皇傲官家未議活蒼生拜賜江湖散人號貽張旭李頎張公性嗜酒豁達無所營皓首窮草隷時稱太湖精露頂㩀胡牀長呌三五聲興來洒素壁揮筆如流星下舎風簫條寒草滿户庭問家何所有生事如浮萍左手持蟹螫右手執丹經瞪目視霄漢不知醉與醒諸賔且方坐旭日臨東城荷葉裏江魚白甌貯香粳微禄心不泄放神於八紘時人不識者即是安期生春日醉起言志李白處世若大夢胡爲勞其生所以終日醉頽然卧前楹覺來盻庭前一爲花間鳴借問此何時春風語流鸎感之欲嘆息對酒還自傾浩歌待明月曲盡巳忘情戲作花卿歌杜甫成都猛將有花卿學語小兒知姓名用如快鶻風火生見賊唯多身始輕緜州副使著柘黃我卿掃除即日平子章髑髏血糢糊手提擲還崔大夫李矦重有此節度人道我卿絶世無旣稱絶世無天子何不喚取守京都秦宫詩并序李賀秦宫漢將軍梁冀之嬖奴也秦宫得寵内舎故以驕名大譟於人予撫舊而作辭似與憑子都之事相爲對望又欲二其昔有之詩越羅夾衫迎春風玉刻麒麟腰帶紅樓頭曲宴仙人語帳底吹笙煙霧濃人間酒暖春茫茫花枝入簾白日長飛䆫複道傳籌飲午夜朦朧膩燭黃秃襟小袖調鸚鵡紫繡麻遐踏虓虎斫桂燒金待曉筵白鹿淸蘇夜來煑桐英永巷騎主馬内屋珍屏生色畫開門爛用水衡錢卷起黃河向身㵼皇天厄運猶曽裂秦宫一生花裏活鸞箆奪得不還人醉卧氍毹滿堂月望廬山瀑布泉二首李白西登香爐峰南見瀑布水挂流三百丈噴壑數千里歘如飛電來隱若白虹起初驚河漢落半灑雲天裏仰觀勢轉雄壯哉造化功海風吹不斷江月照還空空中亂潨射左右洗靑壁飛珠散輕霞流沬沸穹石而我遊名山對之心益閑且諧宿所好永願辭人間日照香鑪生紫煙遥看瀑布挂長川飛流直下三千尺疑是銀河落九天望山賈㠀南山三十里不見踰一旬冒雨時立望望之如朋親虬龍一掬波洗蕩千萬春日日雨不斷愁殺望山人天事不可長勁風來如奔隂滛一巳掃浩翠冩國門長安百萬家家家張屏新誰家最好山我願爲其隣登金陵鳯凰臺李白鳯凰臺上鳯凰遊鳯去臺空江自流吳時花草埋幽徑晉國衣冠成古丘三山半落靑天外二水中分白鷺洲揔爲浮雲能蔽日長安不見使人愁登黃鶴樓崔顥昔人巳乗白雲去此地空餘黃鶴樓黃鶴一去不復返白雲千載空悠悠晴川歷歷漢陽樹春草靑靑鸚鵡洲日暮郷關何處是煙波江上使人愁登嶺望許鼎淼淼三江水悠悠五嶺關鴈飛猶不度人去若爲還過華隂王昌齡雲起太華山雲山互明滅東峯始含景了了見松雪羇人感幽棲窅映轉竒絶欣然忘所疲永望吟不輟信宿百餘里出關玩新月何意乍瞑瞑遇物遂遷別人生屢如此何以肆愉恱早霽南樓張說山水佳新霽南樓玩初旭夜來枝半紅雨後洲全緑四運相終始萬形紛代續適臨靑草湖再變黃鸎曲地穴穿東武江流下西蜀歌聞枉渚邅舞見長沙促心逺居無陋神和生自足白髪悲上春知常謝先欲奉和早霽南樓趙冬曦閑曙躋南樓凭軒四遐曯物華蕩暄氣春景媚晴旭川霽湘山孤林芳楚郊縟列巖重疊翠逺岸逶迤緑風帆摩天垠漁􅖼散灣曲鴻歸鶴舞送猿呌鸎斷續羣動皆熈熈噫予獨羈束常欽才子義忌鵩傷踡跼雅尚騷人文懷沙何迫促未知二賢意去矣從所欲奉陪登南樓尹􅐂君子毎垂眷江山共流眄水逺林外眀巖近霧中見終日西北望何䖏是京縣屢登高春臺徒使涙如霰春遊南亭韋應物川眀氣巳變巖寒雪尚擁南亭草心緑春塘泉脉動景煦聽禽響雨餘看柳重逍遥池館華益愧專城寵廬山謡寄盧侍御虚舟李白我本楚狂人鳯歌笑孔丘手持緑玉杖朝別黃鶴樓五岳尋仙不辭逺一生好入名山遊廬山秀岀南斗傍屏風九疊雲錦張影落明湖靑黛光金闕前𨳩二峯長銀河倒㵼三石梁香爐瀑布遥相望迴崖沓嶂凌蒼蒼翠影紅霞映朝日鳥飛不到吳天長登高壯觀天地間大江茫茫去不還黃雲萬里動風色白波九道流雪山好爲廬山謡興因廬山發閑窺石鏡清我心謝公行處蒼苔没早服還丹無世情琴心三疊道初成遥見仙人綵雲裏手把芙蓉朝玉京先期汗漫九垓上願接盧敖遊太清登南岳事畢謁司馬道士張九齡將命祈靈岳迴䇿詣眞士絶跡尋一徑異香聞數里分庭八桂樹肅容兩童子入室希把袖登牀願啓齒誘我棄智詠迨茲長生理吸精反自然錬藥求不死斯言眇霄漢顧予嬰紛滓相去九牛毛慙嘆荷知巳奉使登終南山王灣常愛南山遊因而盡原隰數朝至林嶺百仞登嵬岌石壯馬徑窮苔色歩縁入物竒春狀改氣逺天香集虛洞䇿杖鳴低雲拂衣濕倚巖見廬舎人户欣拜揖問性矜勤勞示心敎澄習玉英時共飲芝草爲余拾境絶人不行潭深鳥空立一乗從此受九轉兼是給辭處若輕飛憇來唯吐吸閑襟超巳勝迴路倐而及煙色松上深水流山下急漸平逢車騎向睌睨城邑峯在野趣繁塵飄宦情緝辛苦乆爲吏勞生何妄執日暮懷此山悠然賦斯什終南山望餘雪作祖詠終南隂嶺秀積雪浮雲端林表明霽色城中増暮寒桃源行劉禹錫漁舟何招招浮在武陵水拖綸擲餌信流去誤入花源行數里淸源㝷盡花緜緜踏花覔徑至洞前洞門蒼暗煙霧生暗行數歩逢虛眀俗人毛骨驚仙子爭來致詞何至此須臾皆破冰雪顔笑言委曲問世間因嗟隱身來種玉不知人世如風燭筵羞石髓勸客飱燈熱松脂留客宿雞聲犬聲遥相聞暁光葱蘢開五雲漁人振衣起岀户滿庭無路花紛紛翻然恐失郷縣處一息不肯桃源往桃源滿溪水似鏡塵心如垢洗不去仙家一出尋無蹤至今流水山重重桃源行時年十九王維漁舟逐水愛山春兩岸桃花夾古津坐㸔紅樹不知逺行盡清溪忽值人山口潛行始隈隩山開曠望旋平陸遥㸔一處攅雲樹近入千家散花竹樵客初傳漢姓名居人未改秦衣服居人共住武陵源還從物外起田園月眀松下房櫳靜日出雲中雞犬喧驚聞俗客爭來集競引還家問都邑平明閭巷掃花開薄暮漁樵乗水入初因避地去人間及至成仙去不還峽裏誰知有人事世中遥望空雲山不疑雲境難聞見塵心未盡思郷縣岀洞無論隔山水辭家終擬長遊衍自謂經過舊不迷安知峯壑今來變常時只記入山深靑溪幾度到雲林春來遍是桃花水不辨仙源何處尋和登㑹稽山孫逖稽山碧湖上勢入東溟盡煙景畫淸眀九峯爭隱嶙望中厭朱紱俗内採玄牝野老聽鳴騶山童擁行軫仙花寒未落古蔓柔堪引竹澗入霜多松崖向天近雲從海人去日就江村隕能賦丘甞聞和歌參不敏冥搜信沖漠多士期摽凖願奉濯纓心長謡反招隠