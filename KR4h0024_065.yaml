body:
  text: 吴興姚鉉纂碑十七揔十首釋六復東林寺碑崔黯唐鄂州永興縣重巖寺碑舒元輿大雲寺禪院碑李邕宣州新興寺碑盧肇蘇州重玄寺法華院石壁經之碑白居易唐天下放生池碑表开抵荅附顔真卿道四唐茅山寶歷崇元聖祖院碑賈餗連州靜福山廖先生碑蔣防京師至德觀法主孟法師碑岑文本唐昇玄劉先生碑馮宿復東林寺碑銘并序崔黯佛之心以空化執智化也以福利化欲仁化也以縁業化妄術化也以地獄化愚刧化也故中下之人聞其說利而畏之所謂救溺以手救火以水其於生人恩亦弘矣然用其法不用其心以至於甚則失其道蠹於物失其道者迷其徒蠧於物者覆其宗皆非佛之以手以水之意也爲國者取其有益於人去其蠧物之病則通矣唐有天下一十四帝見其甚理而汰之而持事之臣不以歸元返夲以結人心其道甚桀幾爲一致今天子取其益生人稍復其教通而流之以濟中下於是江州奉例詔余時爲刺史前訪兹地松門千樹風先熏天蜩嘒響湍鳴松有泠然可别愛而不翦利以時往時廢寺皆隷戸部頻牒所賣至是即喜而復之民物之困不可横賦得舊僧正言問能復東林乎曰能即斷其髮佳而勉之又命言擇其徒得二十九以隷其下皆心生力完臂股相用言則隨才賦事分命告復所至響應下䖍江之木鳩食訪工陶土冶鐵匠成於心授規於手日而不笠雨而不屐㸑餁煑湯優犒執藝若殿若廂若門之三若闕之左右爲塔若講若食若客之館若庫爲樓若厨激飛泉而注於鬵鉹之間若梁蜺於武若亭臨於白蓮若僧之房若聖之室若突躆勝若郤居幽竒可不尋雅不出位則爲間三百一十三爲架一千八百七十六爲楹爲梁爲棟爲桷爲牖爲闔爲屋之事數爲級塼爲蓋瓦凡役工合六十五萬三百二十八絪緼端明嚴若有主大中六年二月十四日言命以圖及其備録訪余爲其刻石之文且曰自逺公至今若干歲而傳法之地滅矣頼君復之君宜主書其事余則曰復之者上也主其事而書之於言公不詞余甞觀晉史見惠逺之事及得其書其辯若注其言若鋒足以見其當時取今之所謂逺師者也吾聞嶺南之山峻而不山嶺北之山山而不秀而廬山爲山山與秀兩有之五老窺湖懸泉墜天秔香藥靈鳥閑獸善煙嵐之中怳有絳節白鶴使人觀之而不能逥眸也且金陵六代代促時薄臣以功危主以疑慘潯陽爲四方之中有江山之美惠逺豈非得計於此心視於時風邪然鷙者搏羶襲者拘素前入不暇自歎者多則逺師固爲賢矣是山也以逺師更淸逺師也以是山更名賜佛之法如以曹溪以天台爲號者不可一二故寺以山山以逺三相挾而爲天下具美矣今言師愍佛之法推逺之心修廢之勤任其事不宰其功讓功於義明義明曰余何能言之績也讓功於建省建省曰某何能言之力也讓功於鏡暘以緡物元諫以衆材淸持以播殖景仁以化施皆曰某何能言之方也非言不顯義非義不顯言推與讓至於是而不宏大敏固始終一致者未之有也移之於邦國之理何故不成哉銘曰萬竅怒號羣波猛起刑戮不加仁義莫止有得佛心則滅諸熾惠以性生性以悟理山増惠臺鑑闢妄軌根深則定葉茂則死可用理人不獨養巳峨峨匡峯矯矯惠子梁以崇山津以江水不騫不竭吾道曷巳上復其道吾以塞詔惟師之言勤以克肖四五年來休功再紹推能與類類以言妙不曰良能孰臻此要山川不改舊物復新誠汝其徒誕將又淪唐鄂州永興縣重巖寺碑銘并序舒元輿官寺有九而鴻臚其一取其賔而往來也臚者傳也傳異方之賔禮儀與其語言也寺也者府署之别號也古者開其府署其官將以禮待異域賔客之地竺乾之教蓋西土絶徼者也自漢氏夢有人如金色之降其流來東吾之鴻臚待西賔一支特異於三方厥後斯來委於吾土吾人仰之如神明焉伏之如風草焉至有思覿厥貌若盻然如見者則取其書按其云云之文鎔金琢玉刻木扶土運毫合色而彊擬其形容構厦而貯之猶波之委於瀆瀆之注於溟晝夜何曽知停息之時其如是非官寺之一而能容焉故釋寺之作由官也其非九而能拘也其制度非臺門旅樹而能節也故十族之郷百家之閭必有浮圖爲其粉黛國朝㳂近古而有加焉亦容雜夷而來者有摩尼焉大秦焉秋神焉合天下三夷寺不足當吾釋寺一小邑之數也其所以知西人之教能蹴踏中土而内視諸夷也及其繁也學徒如林金貝如山故文昌宫祠擘局而司之東西都命貴人分衢而使之商其略猶天文隷於河漢而莫之極也非名無以别之乃隨事而出焉有見天地符祥而稱之者有取山川秀絶而號之者語其額而名可知也重嵓之作蓋山川秀絶之地統江夏之求興寶應元年秋七月自天有命而升於文昌宫之春官藉考其地有重嵓峽焉故命寺乞此名以大曆十三年遷縣於長慶郷寺亦與遷貞元八年縣又遷之長樂深口寺亦隨動今之地直縣之坎三百六十歩有邑人葉望者心存於金色人不待布金而出其地以奉之輪廣二百畒右肘於熊耳左腋於覆盆連岡伏其背深湖朝其嚮相土有擁抱之勝盡在其上有僧曰謙曰諷手開榛蕪亶而立困竟遺其恨於後焉長慶三年春三月上座僧良鑒沙門器有公識爲其徒所推乃執柄結搆主廢興爲巳任寺以利堅沙門與都維那道援志力是俱物無横議邑俗之倫以貨來資者如官司驅焉至明年春二月星一周而新功成樹宇之爲殿者其間五扶土而爲像者其形七帳之飾寶者如殿間焉乃鑿門而三張翼而廊殿隂有北方挂金革天神之宫東北有禪氏七代祖沙門棲心之室也凡二十四曲突而能庖築堂而㑹食拓庭而寛植木而隂湖山叅差金碧相錯捨舟車而極其心相者冝化成焉嗚呼域外之教而入於域中如此而大邪人謂沙門之無才吾不信也良鑒旣以力之辛勤而就亦欲其事流之於異時乃買武昌石琢磨爲碑自永興録其狀訴授於余因摭其狀而書之復紀以銘銘曰重嵓重嵓無峽無友釋宮斯闈上矗星斗虹霓梁棟日月戸牖金相凝凝煙水奔走雷飈箭雨溟𪷟不朽磔然之石附地之厚刻其成功垂耀于後大雲寺禪院碑銘并序李邕天也地也攝生之謂玄造日也月也容光之謂神功然亭育之仁可斡終滅昭明之力未焯昬霾故熱惱積薪劫燒難鑠驚波巨海沃焦自淵獨有導師空王禪那宴寂一念首安住之域加行證無爲之階密教内修莊嚴外度雙引相應並照兩忘然後生無生淨名不去照無照了義能覺爇菩提之炬則枳棘滌除楫般若之航則横流旣濟湛四禮於中道超三有以上征精舎攸隮度門斯盛其此之謂矣粤有寺之艮背山之前臨有確師禪房者武德八年邦守蕭公諱顗護法之所建也周目環郭澄心際海亦旣一味實無衆生夫慿其高宅其勝曽近俗諦或乗法流且水出於冰凡作於聖雖曰醜地猶是道塲矧乃妙有孤標寶相靈變入我室觀我形者哉施及貞觀歲有等觀禪師繼前心承後問分之則别位二事合之則同列大空坐於斯竟於斯嗚戲四益風驅百爲火滅棟宇崩落象設傾低先天中有慧藏禪師聞之斯行居而不住妙齡彊植勁節老成被甲律儀下帷經藏方丈之室時歷十年簞瓢之飡日常一食信爲法本悟實如宗簡珠圓明紅蓮淸淨剃髪結落亡境受除生起了於身縁覺被於物是以興補舊塔建置尊容彌陀當其陽菩薩侍其側四大海水慧眼啓明五須彌山毫相崇絶有若稽義摭實㳂名討因都極樂之大郊壽無量之景命借如昔者稱賛觀厥音聲克濟斯艱乃復于逺則有階地超越自在神通發弘願心得大勢用皆所以濡火宅軔劒輪投地者結業坐開入影者昔趣以息粤若殫財竭力刻桷雕題積三四年模造化意寶殿蔚以雲構金山煥其日臨豈徒然哉夫壯麗者將以重威神儀形者將以攝歸止或離性解脫或見作隨縁藥草寓其根莖雲雷感其方類即說非說若通不通惟三獸之渡河庶一子之來學禪師以爲黙則絶教言則牽文茍心事於化人豈迹留於捨法㑹議斵石僉允圓功邕來守是邦偶聞兹事依僧依佛何日忘之在家出家惟其常矣頃者下檄湖海申明捕殺鱗羽咸若災疫以寧救蟻雖尚於沙彌涸魚毎憂於釋種祁寒則怨童子何知率三省於短懷寄一塵於寶地别駕弘農楊公守堅字越石本枝鼎貴胄㣧岳靈直道守公智印觀法司馬琅邪王公元朂字固禮髙闈襲吉皇士令名資位升聞妙意融朗盛矣美矣左之右之時新羅通禪師五力上乗一門深入利行攝俗德氷浮天賛而演成恭而有述其詞曰覆燾之獎始生終滅昭囬之明内昬外徹隂入不斷心起難折靈海慾深洪鑪火熱倬彼大師超然正覺亡境息想示法流渥絶生死岸破煩惱殻度門光啓住地玄邈傳燈三葉分座一義象設儀形莊嚴地位有爲不染無相能離茍曰法乗莫非種智古者豐石抗之髙山紀事標社銘勲列班廣兹妙有運彼玄關則百伊昔粤吾無間宣州新興寺碑銘并序盧肇至哉䆳古巳來天之永錫正命者其惟帝唐乎聖祖神宗光啓土宇垂億萬祀克承休嘉莫不以禮樂先兆人以慈儉後天下仁居惠往營魄離者而其施猶存揭淺厲深心迹泯者而厥功亦在夫常善救人常善救物非至徳誰能普行之故鬼神受祉黎元樂康寳祚延洪率由此道也於是表大覺爲靈根與羣生共有叩眞空而不壞惟聖者獨知非崇天金輪氏之教則焉得窮理盡性齊萬法於物我哉是以沈善惡乎澆妄之泉擢枝莖乎植性之囿常令學者崇飾精廬顯有堂皇亦如庠序郡國分理必付元臣將俾羣生罔不開悟且夫斯干秩秩止在周邦靈宫彤彤唯居魯國曷有列刹映乎霄顥飛甍麗乎陽光瞻彼玉毫儼然金地翬軒鵰眈岫聳雲攅徧于州都若斯之美歟若夫宣城新興寺者㑹昌四年旣毀大中二祀故相國太尉裴公之所立也公諱休字公美河東聞喜人代濟文德洎公彌大擢進士甲科登直言制首未三十由拾遺遷殿内鴻名偉望迭處淸雄入奉絲綸出省風俗拜春宫則齊驅驥騄視民部則克阜生齒至於調入王府貨出水衡洎陟台司亦勞厥事凡三拜廉察五授節旄孫先生有愧知兵山巨源當慙視吏揆路旣長乎百辟荆門復平乎水土公降由辛未歸以甲申爲唐碩臣作佛大士光珉顯竹此不復書所至之邦必興修淨行大中二年拜宣城甞與名緇㑹難有設疑以試公者曰三界虚妄羣生顚倒何有修行能解纏縳孰爲智慧何化凡愚胡爲乎公之區區徒自橈耳公曰嘻珠玉在櫝啓之則見其珍聖賢有門行之則踐其閾分塗而往唯善惡焉善惡如東西耳趣之不巳則至其所至焉在乎推心於不染馭馬於無途如是三界信眞實羣生非顚倒但學者不能窒慾壊貪遺名去利弗捨有漏而思往無爲耳然捨之自我取不由人非用智惠解彼纏縳如此則了無一物以橈吾眞也他日門人有謂公曰敢問三界之言未立人不知修行不見因果畏隂隲者不爲之多介景福者不爲之少理亂増損繫乎其時洎斯教也行乎諸華愚人畏罪損其惡賢者望福増其善増之不巳則至今當盡善矣損之不巳亦至今冝無惡矣何昬迷暴虐無減於秦漢之前福慧聦明不増於魏晉之後歸之者殊塗輻湊立之者萬法雲興稽諸天不見其文求諸古莫有其法號爲太聖作天人師是宜使吾人盡升覺路不宜使蚩蚩庶類由古迄今若斯之迷者也設使像法至今未行將盡墮惡道爲鬼爲蜮乎夫法未始有今而有之希聖之徒可存而知之也其由之之固庸非溺乎公笑謂之曰大昭肇啓法不濟備聖人繼出代天爲工結繩畫卦質文滋改一聖立一法生天道人事顯若符契夫燧人氏之未爲火也則天無火星人無火食龜無火兆物無火災必矣少昊氏之未理金也則天無金星人無金用龜無金兆物無金災必矣及聖人攻木出火鍛石取金於是乎精芒主宰騰變上下則知世法時事隨聖人也考精神之源窮性命之表作大方便護于羣生羣生受之而不知蓋猶天道運行物以生茂皆謂自已孰知其然也於是問者廓然自得佛味武宗時毀寺而宣之新興故有崇基廣厦文甓雕甍鞠爲土梗唯喬柯灌木森聳澗壑祥煙翠靄交覆巖麓耳及宣宗詔許立寺宣之四人相鼓以萬清先立之于宣郛公獨不許遂命苾蒭上首元敬謂之曰吾聞之新興寺大歷初有禪師巨偉南宗之上士也與北宗昭禪師論大慧網明實相際於此始作北山道塲後有浩禪師作草堂于道塲西北其傍有藻律師居之律師去世門人立塔院貞元中巨偉之門人靈翹始請於太守合三院而爲寺彼皆智慧傑出親啓山林今之立寺無以易此也議定郡東故有妙覺寺寺毀而杉檜多大十圍一旦有二龍鬪谷中拔大樹三十二視之皆殿宇之材也公歎曰將立寺而龍拔巨樹天其有意平遂用之於是霜斤沐楹玉砂瑩礎上下其響音中桑林不朞年而雲攅四榮風摇寶鐸蟉拏六扇月照金鋪勝絶一源繚牆百雉繕修多羅爲攝受置無盡藏爲莊嚴􅌄窱幽邃輪奐博敞蓋江南之首出也初奉詔隷僧三十人今其存者太半構殿立門有軒有廡則律師元敬法華道延首其事編經立藏不遺句偈則維摩從省禪門貞㑹著其功善集檀施備修房廊學于三時旁窺六義則金剛淸越服其勤而法華遂言涅槃明則洎法林超愛皆以禪學爲宗律師道隨宜春人㓜植淨行得泥丸妙旨直以披文相質之事造余于新安余旣許之道隨復言繼二十人者皆善修持能遺物累則有應玄友恭道幽仁寶懷賁從儉惟恭文眆師迴師宗思靜常政文暢弘暢契蒙景先法進惟勤志弘玄操與前輩又爲二十人矣而太尉所立有殿内千佛有地藏院有上方石盆院又以俸錢入膏腴之墅爲地藏香火定中之謀始于太尉太尉作之門人述之有作有述誰曰不然乃爲銘曰弈弈新興敬亭南麓鉅構崇基崢嶸曄煜伊昔旣廢神愁鬼毒洎將再榮天人合福赩有逴龍其怒則觸助作棟楹拔此巨木雨運風移勝川跨陸神怪戮力老㓜同心蚨翼飛貨龍鱗布金揭立赫弈化成嶔崟玉礎方丈花臺百尋日明香刹雲生寶林太尉裴公聳其學者弘以戒光甘露披灑示厥有爲取彼難捨必有精靈扶持大厦小儒刻石有慙史野永言歌之庻近風雅蘇州重玄寺法華院石壁經之碑白居易碑在石壁東次石壁在廣德法華院西南隅院在重玄寺西若干歩寺在蘇州城北若干里以華言唐文譯刻釋氏經典自經品衆佛號以降字加金焉夫開士悟入諸佛知見以了義度無邊以圓教垂無窮莫尊於妙法蓮華經凡六萬九千五百五言證無生忍造不二門住不可思議解脫莫極於維摩詰經凡二萬七千九十二言攝四生九類入無餘涅槃實無得度者莫先於金剛般若波羅蜜經凡五千二百八十七言壞罪集福淨一切惡道莫急於佛頂尊勝陀羅尼經凡三千二十言應念順願願生極樂土莫疾於阿彌陀經凡一千八百言用正見觀眞相莫出於觀音普賢菩薩法行經凡六千九百九十言詮自性認本覺莫深於實相法宻經凡三千一百五言空法塵依佛智莫過於般若波羅蜜多心經凡二百五十八言是八種經具十二部合一十一萬六千八百五十七言三乗之要㫖萬佛之祕藏盡矣是石壁積四重髙三㝷長十有五丈厚尺有咫有石蓮敷覆其上下有石神固護其前後火水不能燒漂風日不能揺消所謂施無上法盡未來際者也唐長慶二年冬作大和三年春成律德沙門淸晃矢厥謀淸海繼厥志門弟子南容成之道則終之寺僧契元捨藝而書之郡守居易施詞而讃之讃曰佛涅槃後世界空虚惟是經典與衆生俱設有人書貝葉上藏檀龕中非堅非乆如蠟印空假使人刺血爲墨剥膚爲𥿄即壊即滅如筆畫水噫畫水不若文石印蠟不若字金其功不朽其義甚深故吾謂石經功德契如來付囑之心有唐天下放生池碑銘并序顔眞卿皇唐七葉我乾元大聖光天文武孝感皇帝陛下以至聖之姿屬艱虞之運無少康一旅之衆當禄山强暴之𥘉乾鞏勞謙勵精爲理推誠而萬方胥恱克巳而天下歸仁恩信侔於四時英威達于八表功庸格天地孝感通神明故得迴紇奚霫契丹大食盾蠻之屬扶服萬里決命而爭先朔方河東平盧河西隴右安西黔中嶺南河南之師鳩五年椎鋒而效死摧元惡如拉朽舉兩京若拾遺慶緒遁逃巳蒙赤族之戮思明跧伏行就沸鼎之誅拯巳墜之皇綱據再安之宗社迎上皇於西蜀申子道於中京一日三朝大明天子之孝問安視膳不改家人之禮蒸蒸然翼翼然眞帝皇之上儀誥誓所不及巳歷選内禪生人以來振古及隋未有如我皇帝者也而猶嫗煦萬類勤勞四生乃以乾元二年太歲巳亥春三月巳丑端命左驍衛右郎將史元琮中使張廷玉奉明詔布德音始于洋州之興道洎山南劒南黔中荆南嶺南江西浙江西諸道訖于昇州之江寧秦淮太平橋臨江帶郭上下五里各置放生池凡八十一所蓋所以宣皇明而廣慈愛也易不云乎信及豚魚書不云乎洎鳥獸魚鼈咸若古之聦明睿智神武而不殺者非陛下而誰昔殷湯克仁猶存一面之網漢武垂惠纔致銜珠之荅雖流水救涸寶勝稱名蓋事止於當時尚介祉於終古豈我今日動者植者水居陸居舉天下以爲池罄域中而蒙福乗陀羅尼加持之力竭煩惱海生死之津揆之前古曽何髣髴㣲臣職忝方面生丁盛美受恩􅐛深無以上報謹縁臯陶奚斯歌虞頌魯之義述天下放生池碑銘一章雖不足雍容明聖萬分之一亦臣之精懇也敢刻金石著其詞曰明明皇帝臨下有赫至德光天乾元啓賾緯武戡亂經文御曆孝感神明義形金石仁覆華夏恩加蠻貊道冠巍巍威深虩虩遘兹多難克廣丕績慶緒致誅思明僻易人道助順天道惡逆撲滅之期匪朝伊夕乗此寳祚永康宗祏業盛君親功崇列辟交禪之際粲然明白迴映來今孤髙往䇿去殺流惠好生立辟率土之濵臨江是宅遂其生性庇爾鱗翮環海爲池周天布澤致兹忠厚罔弗怡懌動植依仁飛沈受獲流水長者從稱往昔寳勝如來疇庸允格德力無競慈悲孔碩相時傳聞尚賴弘益矧在遭遇其忘敷錫眞卿勒銘敢告凡百乞御書題天下放生池碑額表臣眞卿言臣聞帝王之德莫大於生成臣子之心敢忘於讃述臣去年冬任昇州刺史日屬左驍衛左郎將史元琮中使張廷玉等奉宣恩命於天下州縣臨江帶郭處各置放生池始于洋州興道迄于昇州江寧秦淮太平橋凡八十一所恩霑動植澤及昆蟲發自皇心徧于天下歷選列辟未之前聞海隅蒼生孰不欣喜臣時不揆愚昧輙𫐠天下放生池碑銘一章又以俸錢於當州採石兼力拙自書蓋欲使天下元元知陛下有好生之德因令微臣獲廣昔賢善頌之義遂絹冩一本附史元琮奉進兼乞御書題額以光揚不朽縁前書點畫稍細恐不堪經乆臣今謹據石擘窠大書一本隨表奏進庶以竭臣下慺慺之誠特乞聖恩俯遂前請則天下幸甚豈唯愚臣昔秦始皇暴虐之君李斯邪謟之臣猶刻金石垂於後代魏文帝外禪之主鍾繇偏方之佐亦於繁昌立表頌德況陛下以巍巍功業而無紀述則臣竊恥之謹昧死以聞伏増戰越臣眞卿誠恐頓首頓首死罪謹言御書批荅勑朕以中孚及物亭育爲心凡在覆載之中畢登仁壽之域四靈是畜一氣同和江漢爲池魚鼈咸若卿愼徽盛典潤色大猷能以懿文用刋樂石體含飛動韻合鏗鏘成不朽之立言紀好生之上德唱而必和自古有之情發于中予嘉乃意所請依奏大唐寶曆崇元聖祖院碑銘并序賈餗唐寳曆二年歳直景午浙右連帥御史大夫賛皇公新建聖祖院于大茅峯下崇元觀之前上直夫華陽洞之南門集羣仙之靈慶資聖壽於萬億本其經始實感周先生出應昌運爲唐廣成薦瑞表祥式旌不朽於是恩錫院額號曰寶曆崇元聖祖院玄門之盛輝動嵓谷時唐興二百有九載天子以神聖文武惟新景命德合乎五千文之玄訓明繼乎十二聖之丕業以淸静源理化以仁壽域生靈陶之以大和躋之於至順故自臨馭大寶則申詔百辟旁延萬邦推誠備禮徴訪至道寤寐孜孜如恐不及夫明天子勤求干上必賢方伯感致于下君臣一德而道德可興乃其年秋七月公以天子之命齋戒䖍懇果得周先生曰息元實元精之全德大道之宗師也先生葆眞抱一涵光吹萬天下聆其風者乆矣而遐襟曠迹冥寄希夷顯晦自我人莫能識夫玄珠非詬可索至道惟精誠是致故累聖之所不能起而一朝感契洪化蒸然來思且謂公曰昔廣成對理身之問鴻䝉啓心養之說二者皇王之大本也今某亦將以斯道上報吾君公於是澄心清神思所以慶皇休而賛景福遂與先生圖議選置玄宇相彼形勝莫靈此峯昔梁朝福郷太子置道館二其古壇廢井遺趾猶在乃鏟荒夷險鬱起層構散俸錢以資其費擇幹吏以董其役翬飛矢直不日而成像設崇嚴殿宇沈邃神仙儀衛左右森列并按舊史氏得仲尼問禮關尹請著書之像咸備于前蓋將㑹通仙而肅百靈以永爲國家齋醮之勝選也況三茅精氣二許馨烈古來得道於是者代有其人考傳驗圖若可攀揖而繚垣之内有流泉嘉木滋飾幽潤地靈境秀觸類増益懋此成績與山無窮永惟聖祖育德乎太極之前顯靈於未形之表當是時也合散消息莫可名象明而爲日月動而爲風雷播育而不測運行而不殆君得之豕韋以挈天地臣得之傳說以相武丁吾何爲哉道本一貫及夫神化挺生含章炳靈象帝之先資我彊名將寄言以顯玄樞錫羡以興皇業猶龍既見萬物方覩是宜夫垂休儲祉長發其祥億萬斯慶集于寳曆此崇元新院所以得時而啓也初公以上方崇嚮道德計天下有道之士可以當是大選者惟周先生一人而巳故其招致之忠盡訪求之精實則先生不得不出而公之誠節不得不伸旣而聖淸感愜萬國瞻賀其逢迎之優異禮貌之嚴顯自古尊師重道之盛無以加也則眞宗玄極至道之精不得不洞契乎上心播宣於理術俾風流澤浸廣𬒳八區嗚呼此先生所以出而不疑亦所以示天下之可不致如巳者當吾君之至理適吾道之可言千載一期起乃時耳矧公以濟代全才合乎休明樹風南藩績最天下前歲興建儒學而天降膏露顯于廟庭俗變風移遂至於道今之輝崇眞館闡奉玄化上感睿旨下孚元元仁聲順氣流溢四境推是爲政大而伸之則致君經國之用可見矣又況封部之内融汰之下徧識玄元之教俱爲㟪􅕲之人顧難乎哉餗謬列屬城獲詳事實又甞以春秋屬詞爲學故承命奮筆直而不文其銘曰聖運光啓山川效靈黃帝爲君起乃廣成崆峒至言今復行兮明明天子以道致理方伯䖍誠先生戾止累聖莫致今兹起兮玄感旣宣化流溥天公拜稽首天子萬年何以薦神御玄元兮閟宇崇崇聖祖尊容神而明之神應豐融華陽仙洞大茅峯兮金牓瑶壇仙術眞官羽節凌風珠佩珊珊是醮是齋百福延兮名崇天錫境古地乆下薦臣忠上資聖壽靈山萬歲績不朽兮連州靜福山廖先生碑銘并序蔣防沖先生名也淸虚先生字也本郡主簿西曹祭酒湘東王國常侍先生官也靜福山先生家也於戲先生之名玉堂金簡之名矣先生之官詞林學府之官矣先生之家紅霞丹景之家矣至若鶴骨松貌泉渟谷虚寓形人間天地無累與夫扶桑公陶隱居張天師遥爲師友矣以梁大通三年家此山光大二年去此山春秋九十七門人邑子無以知其蹤但徘徊醮壇泣對香火而巳長慶末余自尚書司封郎中知制誥翰林學士得罪出守臨汀㝷改此郡揖先生至道登先生舊山捫蘿撥雲瞻仰不足稽首巖戸强爲之銘曰玄都丈人大道之師靜福先生從而學之仙書無文仙語無詞以心傳心天地不知猛虎我筞長蛇我持放情逍遥今古爲誰華表白鶴千年一歸不知先生此㑹何時瞻望雲路人間後期京師至德觀法主孟法師碑銘并序岑文本觀夫太陽始旦指崦嵫其若馳巨川分流起潡澥而不息是以至人無巳先天地而御六氣列仙神化隘宇宙而遺萬物與夫齊魯搢紳束名教於俄景漢魏豪傑徇榮利於窮塗何異乎蜉蝣生於崇朝爭長於龜鶴秋毫出於末兆計大於崐閬者哉若廼岱山龍駕傳神丹之祕訣秦都鳳祠流洞簫之妙響用能延頽年於昧谷振朽骨於玄廬白玉之簡祈西王而可值靑雲之衣師東陵而易襲豈非度世之寳術登遐之妙道焉法師俗姓孟氏諱靜素江夏安陸人也其先徙里成仁繼跡於孔墨冬笋表德齊聲於曾閔是以貽則當世錫類後昆軒冕之盛旣富於天爵賢明之質獨表於仙才固以軼仲弓之弈葉邁陽元之餘慶者矣法師稟兩儀之靈和體五常之休德崇蘭散馥掩蕭艾於芳春朗月揚暉蕩雲霧於淸夜盈尺之寶出鄢郢而連城徑寸之珍入大梁而照乗豈惟楊號異才馳聲益部曹稱孝行播美上虞而巳哉㓜而慕道超然拔俗志在芝桂譬芻豢於糠粃心繫煙霞方綺羅於桎梏旣而𥘉笄云畢迨吉有興懿戚託繼世之援慈親割相離之情千金甫陳百兩將戒法師凌霜之操必守節於玄冬匪石之誠誓捐生於白刃素槪難奪嘉禮遽寢乃脫屣通德之門絶景集靈之館䖍修經戒長甘𬞞菲漱元氣於亭午思輕舉於中夜若夫金簡玉字之餘論玄化道樞之妙旨三皇内文九鼎丹法莫不究其條貫猶登山而小魯踐其戸庭若披雲而見日允所謂天挺才明人宗模楷者巳隋髙祖文皇帝聞風而恱徴赴京師亦旣來儀居于至德之觀公卿虚巳士女翹心於是高視神州廣開衆妙懸明鏡於講肆陳鴻鍾於靈壇著籙之侣升堂者比迹問道之客及門者成羣雖列星之仰天津衆山之宗地軸未足以喻也我髙祖以大聖締基功踰覆載皇上以欽明纂曆道冠犧農崇三淸以緯民懷九仙而濟俗天地交㤗中外和平法師維持科戒弘宣經典時歷夷險懷趙璧而無玷年殊盛衰鼓吳濤而不竭跡均有待心叶無爲循大小於天倪旣齊椿菌忘壽夭於物化寧辨彭殤而靈氣有感仙骨夙著金液方授駕白龍而不反玉棺遽掩望靑鳥之來翔以貞觀十二年七月十二日遺形而化春秋九十有七顔色如生舉體柔弱斯蓋仙經所謂尸解者也冕旒惜道門之梁壞搢紳悼人師之云亡固以恩侔撤樂悲踰輟相有勑賜以膊禮資給塟事並加隆焉弟子陳光等義結在三名髙入室對衣履而增絶瞻風雲而永慕思欲寄銘讃以叙思勒琬琰以紀德俾夫成銀之室神變乆而若存遺履之地靈蹟垂於不朽其詞曰西秦簫響東陵聖迹霞舉玉京雲開金液飛廉先路句芒奉璧形表丹靑聲流金石玄風誰纂允屬賢明翟衣絶志鶴御依情栖心大道投蹟長生三山可陟九轉方成靈化人間髙翔羽服白蜺擁蓋靑虯夾轂丹竈留煙仙壇餘竹貽則終古永播蘭菊大唐昇玄劉先生碑銘并序馮宿維皇王能自得師以臻至理維道德克輔於代且非常名天啓聖唐運興我李於赫肇祖實惟玄元髙宗振其風於前明皇張其教於後十有三葉天子曰敬宗文武大聖廣孝皇帝弘淸靜之㫖以浸天下闡無爲之宗以凝海内寶曆二祀秋八月甲子躬法服御内殿北面執弟子之禮受道于昇玄先生大矣哉斯所以貫三才寵八極澤及中外仁加動植播中和賛恭黙昌聖緒垂帝則而巳翌日下明詔加先生之號檢校光禄少卿自内道塲送歸于玄眞之觀居命兩街之緇黃前馬夾路以引以翼萬衆榮觀以爲崆峒之請瑶池之宴曽莫我若先生姓劉氏諱緃政生於河南緱氏家世奉道彰于前朝而先生超然韙如角立秀出志學之歲辭親就師視冠冕若桎梏顧聲名猶涕唾夫其洞達懸解知來藏往體於虚而觀其妙守其樸而反於機由是採氣于三淸吸精于兩曜和光于萬有委蛻于重玄始事河内張君通玄次師中岳邢君歸一二君之傳授眞筌秘訣色授神與而上至于東晉楊君凡十四世其實若關鍵之固鈎鎻之密莫得而窺至是而悉歸我焉冝其當玄門之尊以師道自處先生棲于王屋不啻一紀其後受請遷居都下又承詔至于京師化隨躬行名出心隱故傳法紫宸之後竟遂東還今上端穆淸之居𬗟汾水之想將召舊德而咨要道吾師知之私於門人韓貞漼曰吾將解去先告之期蓋大和四年某月林鍾其日癸亥其春秋七十有八也嗚呼蘭薰膏明以自迫鶴駕霓旌而難駐貞漼與東夏弟子若干人及關中弟子葉守中等若干人以爲吾師之不可舉援者眞氣粹容至如章施紀述追琢琰琬使將來鑚之仰之而不怠冝在乎文慿文以導心因心以成志謂宿甞奉几杖熟遊牆藩俾爲銘而揭焉且慰夫飡霞遁俗者之懷煌煌二都各樹其一其辭曰内天外人葆和嗇神道之宗兮乗飊駕欻無象有物玄之功兮我后敬皇灼其耿光慕崆峒兮吾師昇玄法於自然繫喬松兮洪惟武文懿此正眞紹先風兮金關玉堂靈符寳章闢中宫兮出自幽谷賔于黃屋翊九重兮開陽闔隂忘形守心沃宸聦兮出日入月騰凌滅没靡不通兮脫俗遁代并包覆載皆可容兮控鶴轡龍倘佯髙空躡前蹤兮捐巧棄智絜誠去僞順至公兮戴君奉親後已先人福乃鍾兮洛都應召京邑承詔隨西東兮泊然泉渟油然雲行恣所從兮從之在勤道將自親滋益恭兮爲而不殆績用斯倍吉以逢兮法施經流通明達幽播無窮兮功滿行圓解形黙然示有終兮谷神不死蟬蛻而巳何哀恫兮鳩血誠而圖石刻者伊貞漼與守中兮重校正唐文粹卷第六十五嘉靖甲申歲太學生姑蘇徐焴文明刻于家塾
