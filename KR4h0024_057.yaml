  text: 重校正唐文粹卷第五十七
  hash: sha256:d6ee66a6cb5007ba5724208eb60688890059b4c2ce79a4bfcbb7e460a0258855
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0024_SBCK_057-1a}
body:
  text: 吳興姚鉉纂碑九揔七首使相三唐太尉中書令西平王李晟神道碑斐度唐檢校司徒中書令咸寧郡王渾瑊神道碑權德奧唐司徒中書令許國公韓弘神道碑韓愈節制四唐四鎮北庭行營節度使扶風郡王馬璘神道碑常衮唐贈司空范陽大都督忠烈公李楷洛神道碑楊炎唐贈梁州都督隴右節度大使郭知運神道碑張説唐邠寧節度使史孝章神道碑劉禹錫唐太尉中書令西平王李公神道碑銘并序斐度惟天錫成命於我唐保兹國祚生此人傑則西平王李公其是乎不然何覆暴如風振稿葉戴君若鼇冠靈山橫流之中一匡而定公諱晟字良器其先隴西人後徙京兆曽祖嵩皇珉州刺史祖思恭皇洮州刺史贈幽州大都督考欽皇左金吾衛大將軍隴右節度經略副使贈太子太保代有名迹雄于西土公幼好學學不為巳及讀吕張孫吳之書慨然有經邦濟物之志未弱冠遊秦涼間元侯宿將見者咸器異之乾元𥘉嘗客武都值酋豪以缺守遘亂殺掠平人公與所從十數騎馳而射之殪其為魁者餘黨遂遁冦所虜獲積如丘山公一無所取椎牛釃酒享士而去邦人感服具狀以聞特拜左清道率飾以金紫將朝京師自獻方略屬裔夷紛擾有土急賢河隴將帥相繼表用歷二府右職所至常以才謀為其委重纍遷至光祿太常卿階爵在第一品涇原四鎮北庭節度都知兵馬使懸識虜態周知地形應變不窮有奪有待驥驟庭而莫展雲出岫而斯飛代宗徴以左金吾衛將軍為神策兵馬使屬羌蠻犯蜀朝廷濟師命公督禁旅絶棧道而往救焉公銜枚過險出賊不意連下堅壁遂誅首惡還授檢校太子賔客且復舊職建中二年田恱以魏叛德宗極意致討悉起徂征以公為神䇿先鋒都知兵馬使加御史中丞與河東河南等道諸軍合擊公濟河而行能以衆正及破洹水陳解臨洺圍轢魏屬城抵燕通邑其摧鋒衄鋭皆先羣帥而置力焉遙拜左散騎常侍兼御史大夫厥功未成聞賊泚肆逆皇居失守西嚮慟哭載馳載驅行及代北授檢校工部尚書充神䇿行營節度公提孤軍慕散卒拊循訓勵以逹行在值懷光中叛大駕再遷加檢校右僕射餘如故尋轉左僕射同平章事兼京兆尹神䇿軍京畿鄜坊節度觀察使管內及商華等州副元帥公固守渭城決平秦壘調食制用先發我私捐甘攻苦皆目我始每一言一誓聲淚俱發勇夫義士感而使之蔑不濟矣時自雍而東延于汝洛震於河汴所在征鎮亂掠相從公介巨盜之間使聲援斷絶立成師之法致號令嚴肅搜捕十旬指揮一舉乘墉壑而通軌道磔梟獍以清宫禁俾九市三條無輟肆之驚無秋毫之犯羽書速告鑾輅爰歸廓氛祲為祥光攄憂憤為喜氣詩曰允矣君子展也大成斯之謂歟考古視今論功稱忠者多矣若至危而安至難而易卓犖跨邁如公莫儔拜司徒兼中書令俄以凶孽未寧邊防猶警𡵨下任重乃以本官兼鳳翔尹鳯翔隴右節度觀察使及四鎮北庭涇原等州副元帥改封西平郡王加食邑實封至一千五百戶公名懾戎王政和藩部始至而生植少安而訓齊逮四載賦輿十倍其𥘉會課入輔拜太尉中樞如故人或謂公勳望巳高寵渥巳極冝從溶頥養稍稍遜避公曰不然人臣外則盡心若止偷榮孰為且哲故每承帷幄之問則言咈無隱理奪不回大指以東夏可平西陲可復或已行而事終不顯或未用而身遽不遺以貞元九年八月四日薨于位春秋六十七德宗撫几哭於别次自都巳逹關畿無士庶無老幼皆發哀相弔則曩時安人戢兵之德可謂浹於元元之骨髓矣册贈太師賻賵加等以其年十二月十六日葬于高陵縣奉正原鄭國夫人杜氏祔焉自捐寢至安宅皆上所辦護中貴反覆萬情所奉如不及焉嗚呼以公之靜難扶傾不言所利雖存殁極位始終殊禮而天意若曰其福享未至故迤延於後有子曰願故檢校司空河中節度等使贈司徒五列雄鎮三為上公曰聰故光祿寺主簿曰揔故太子中允贈兵部郎中曰遜左神武大將軍贈洪州都督曰恕故光祿卿贈右散騎常侍曰慿故右威衛大將軍曰憲檢校左散騎常侍嶺南觀察等使進因貴胄達以善政曰訴故檢校左僕射同中書門下平章事贈太尉克廣前修仍執醜虜曰懿故渭南尉曰聽檢校司徒義成軍節度使統戎按俗是以似之曰惎右羽林將軍曰殷嵐州刺史並地勢吏用兼而有焉粵大和元年秋七月聽拜疏上言以公之徽烈則御製碑文於渭川矣以公之風度則詔命圖形於雲臺矣唯大其丘巃鬱彼松檟望有祁山之象拜無峴首之碑將刋貞石式表幽隧乃命臣度稱伐言詩其詞曰建中季年大盜忽焉皇輿避狄狩於梁川顧謂太師汝才汝略將威致討必殄冦虐太師泣奉捐軀誓衆度其成城可以利用赫矣鋪敦傳於墻垣手搏足踦如衝如援一鼓而破一麾而奔掃清宮闈刷蕩妖昏我師蒞止我令行矣都人不知已事方喜飛章告慶飭駕言旋鴻烈耀古歡聲動天車服之錫河山之誓九命而俯一心若厲俾侯於𡵨阜安邊陲藩政既成衮職攸冝嶽降帝賚矢言詭詞我后嘉猷我躬何為道直氣和勞謙終吉福履所綏未至萬一上天不惠厚穸遄歸垂𥙿流光用延恩暉翼子肥家將壇台席繼立竒功代傳休績聽與伯仲永懷高蹤請于朝廷表是丘封帝曰孝哉胡可不從宣我祖之丕業繄爾父之嘉庸乃詔作銘以觀億齡唐故朔方河中晉絳邠寧慶等州兵馬副元帥河中絳邠節度營田觀察處置等使元從奉天定難功臣開府儀同三司檢校司徒兼中書令河中尹上柱國咸寧郡王贈太師忠武渾公神道碑銘并序權德輿天地欣合以生百嘉其成歲功也則有震耀肅殺之助焉君臣保乂以熙百志其講武功也則有經綸翼戴之輔焉龍蛇起蟄山澤通氣與運相值有開必先斯太師所以宣力四代稽謨七德輝耀威靈勤身濯行霆征風行乃緝熙于光明故雕戈淑旗以嚴師律黃旒玄衮以正台曜湛露彤弓以覺報宴納書追命以榮恤禮蕃錫始終如公之功公諱瑊字某其先夏姒之後為淳維漢劉之代為渾邪或強為國或分以姓貞觀中開置州壤就加官師曽祖元慶皇豹韜衛將軍靈丘縣開國伯祖文壽皇太子僕贈尚書左僕射考釋之皇開府儀同三司太常卿兼御史中丞寧朔郡王贈司空惟靈丘紹先公之職居次卿之重僕射以積厚克家寧朔以偉才雄邊貴仕崇勳乃列芧社流光追逺是加密印回復介祉間生元臣功昭于前人德合于大君建中癸亥翠華西狩公以大司馬艱貞翼從部勒戎車揣摩殺機勤勞行內為上心膂登壇授律誓命交感如漢拜淮隂侯故事而又加焉乃進左揆遂參大政揔賦輿而為之師長恢王略而以之北代凶黨盡銃壁于武亭公以事巨師老則傷威重正合竒勝在於疾力奮寡擊衆鼓行無前殱夷潰溺如建瓴水中堅席勝又復於咸陽長轂啓行既門于延秋會西平王以東諸侯之師清宫獻捷公乃抑其賈勇須彼成功窒士心之剋伐息兵火之氣𦦨然後窮追斬級冦孽以平備法從於清蹕捧大明於黃道告廟薦功登拜上台撫封尹正復與虜會時北平王出大鹵收絳臺而公巳總成師下左輔於是輯忠力揚竒鋒復離宫拔堅壘衡陳壓境傳于蒲津金鼓之聲氣相合山河之表裏皆復渠魁授首師帥協附安流以濟方軌而前士不罹傷工不易肆殄冦正刑四方咸和論道進律乃年水土秉誼靖人以修班制休嘉賁于草木利澤逮于鰥寡言為軍志動為吏師貞元景子政成一紀進掌邦教遂居右弼十五年冬寢疾十二月辛未薨于理所享年六十四皇上悼歎不視朝五日册贈太師賻禭弔祠有司備物大僚襄事明年二月甲申葬我太師于萬年縣洪固原太常迹其功德奏諡曰忠武禮也𥘉公年十一以將門子仕于邊部未弱冠五遷至左驍衛將軍始從朔方之師戰黑山次從隴右之師摧石堡又嘗西出臨洮奪昆夷之善地而為之壁壘北絶大漠破獫狁之堅甲而焚其廬帳又從汾陽王臨淮王討反虜于山東攻贊皇北取真定射其特將李立節貫千左肩斃之又五遷至大常卿皆以功次其間開地于河曲以靜九蕃宣威于陜西乃定三川凡王師之所以剋獲都邑元老之所以發揚蹈厲公必居其先偏而當其勍劇故以御史中丞為靈州左司馬以御史大夫為邠州刺史以工部尚書為單于大都護專征上郡榆林之地入為左金吾衛大將軍又以戶部尚書奉普王出車之重自時厥後投艱感槩能納大忠以恤大事理蒲十六年再陟公台以司空兼侍中以司徒兼中書令大凡歷官二十八次真食千八百室居節制者五副元帥者四材力絶人始封樓煩方內洽平乃進咸寧凡汾陽王九伐之勳公皆左右四履之地公皆踐歷憫册師禮法諡尊名公皆如之所不至者壽而巳矣惟公厚性寬中智謀深靜秉義類以賦明命植端誠以糾王慝講功述職逺意長利執德之柄蹈禮之輿致其用以格天啓其心以沃聖協建皇極為宗工元龜雅好左氏春秋班氏史得考父之恭范宣之讓驃衛之功略黃韓之教化又嘗慕太史自敘著作行巳一篇詞不矜大而事皆明備有子五人曰殿中少監錬太子中允鎬太子司議郎巨櫟陽尉鋼雲陽尉鐬著位于兩宫以奉朝請試吏于縣內以修事任食德而才稟訓而忠皆以純孝致其哀敬令弟輔國大將軍右領軍衛將軍武當郡王玘與諸孤等推蒸彞景鍾之義因識表以聞有詔詞臣刻石傳信乃採其贊書侯表作神道銘銘曰北戴斗極隂方尚武玄金朱􅙲錫命都府太師間代感會雲雨四征庇人九合尊主昔未成童則能肆勤卓行深入致果忘身弱冠摧鋒環列南軍中興之後書社䇿勳援枹兩河轉戰三秦靈翔郇邠所居必聞出統藩衛入司徼巡時丁厄難節冠群倫逋誅煽宿狂穢宫闕西平鞠旅公亦授鉞既臨延秋如火烈烈休士退舍時惟不伐祲沴濛濛蒲津未通北平釋位公實撫封胥命長春克成厥功開壁勞軍靡有不同以律則臧在和而克時惟太師有嚴有翼乃敷仁澤乃布條職時惟太師有功有德三公二府是獎是陟禭印易名以尊以飾材官介士鹵簿悽惻大隧鮮原中南之北萬邦作憲永代是式追琢馨香與唐無極唐司徒兼侍中中書令許國公贈太尉韓公神道碑銘并序韓愈韓姬姓以國氏其先有自潁川徙陽夏者其地於今為陳之太康太康之韓其稱蓋久然自公始大著公諱弘公之父曰海為人魁偉沈塞以武勇遊仕許汴之間寡言自可不與人校衆推之為長者官至遊擊將軍贈太師娶鄉邑劉氏女生公是為齊國夫人夫人之兄曰司徒玄佐有功建中貞元之間為宣武軍帥有汴宋亳潁四州之地兵士十萬人公少依舅氏讀書習騎射事親孝謹侃侃自將不縱為子弟華靡遨放事出入敬恭軍中皆目之嘗一抵京師就明經試退曰此不足發名成業復去從舅氏學將兵數百人悉識其材鄙怯智勇指付必堪其事司徒竒之士卒屬心諸老將自以為不及司徒卒去為宋南城將比六七歲汴軍連亂不定貞元十五年劉逸淮死軍中皆曰此軍司徒所樹必擇其骨肉為士卒所慕賴者付之今見在人莫如韓甥且其功最大而材又俊即柄授之而請命於天子天子以為然遂自大理評事拜工部尚書代逸淮為宣武軍節度使悉有舅氏司徒之兵與地衆果大恱便之當此時陳許帥曲環死吳少誠反自將圍許求援於逸淮啖之以陳歸汴使數輩在館公悉驅出斬之選卒三千會諸軍擊少誠許下少誠失勢以走河南無事公曰自吾舅殁五亂於汴者吾苗薅而髮櫛之幾盡然不揃刈不足令震駴命劉鍔以其卒三百人待命于門數之以數與於亂自以為功并斬之以徇血流波道自是訖公之朝京師二十一年莫敢有歡呶呌號千城郭者李師古作言起事屯兵于曹以嚇滑帥且告假道公使謂曰汝能越吾界而為盜邪有以相待無為空言滑帥告急公使謂曰吾在此公無恐或告曰剪棘夷道兵且至矣請備之公曰兵來不除道也不為應師古詐窮變索遷延旋軍少誠以牛皮鞋材遺師古師古以鹽資少誠濳過公界覺皆留輸之庫曰此於法不得以私相餽田弘正之開魏博李師道使來告曰我代與田氏約相保援今弘正非其族又首變兩河事亦公之所約我將與成德合軍討之敢告公謂其使曰我不知利害止知奉詔行事耳若兵北過河我即東以兵取曹師道懼不敢動弘正以濟誅吳元濟也命公都統諸軍曰無自行以遏北冦公請使子公武以兵萬三千人會討蔡下歸財與糧以濟諸軍卒摛蔡姦於是以公為侍中而以公武為鄜坊丹延節度使師道之誅公以兵東下進圍考城克之遂進迫曹曹冦乞降鄆部既平公曰吾無事於此其朝京師天子曰大臣不可以暑行其秋之待公曰君為仁臣為恭可矣遂行既至獻馬三千匹錦紈綺纈三萬金銀器千而汴之庫廄錢以貫數者尚餘百萬絹亦合百餘萬匹馬七千匹糧三百萬斛兵械多至不可數初公有汴承五亂之後掠賞之餘且斂且給恆無宿儲至是公私充塞至於露積不垣册拜司徒兼中書令進見上殿拜跪給扶贊元經體不治細微天子敬之元和十五年今天子即位公為冡宰又除河中節度使在鎮三年以疾乞歸復拜司徒中書令病不能朝以長慶二年十二月三日薨於永崇里第年八十罷朝三日贈太尉賜之布粟其葬物有司官給之京兆尹監護明年七月某日葬于萬年縣少陵原京城東南三十里楚國夫人翟氏祔子男二人長曰肅元某官次曰公武某官肅元早死公之將薨公武暴病先卒公哀傷之月餘遂薨無子以公武子孫紹宗為主後汴之南則蔡北則鄆二冦患公居其間為巳不利卑身佞辭求與公好薦女請昏日月既至卒不可得則飛謀釣謗以間染我公先事後情壞其機牙姦不得發王誅以成最功定次孰與高下公子公武與公一時俱授弓鉞處藩為將強土相望公武以母憂去鎮公母弟充自金吾代將渭北公以司徒中書令治蒲于時弟充自鄭滑節度平宣武之亂以司空居汴自唐以來莫與為比公之為治嚴不為煩止除害本不多教條與人必信吏得其職賦入無所漏失人安樂之所在以富公與人有軫域不為戲狎人得一笑語重於金帛之賜其罪殺人不發聲色問法何如不自為輕重故無敢犯者其銘曰在貞元丗汴兵五猘將得其人衆乃一愒其人為誰韓姓許公磔其梟狼養以雨風桑榖奮張厥壤大豐貞元元孫命正我宇公為臣宗處得地所河流兩壖盜連為羣雄唱雌和首尾一身公居其間為帝督姦察其嚬呻與其睨眴左顧失視右顧而跽蔡先鄆鉏三年而墟稿乾四呼終莫敢濡常山幽都孰倍孰扶天施不留其討不逋許公預焉其賚何如悠悠四方既廣既長無有外事朝廷之治許公來朝車馬干戈相乎將乎威儀之多將則是矣相則三公釋師十萬歸居廟堂上之宅憂公讓太宰養安蒲坂萬邦絶等有弟有子提兵守藩一時三侯人莫敢叛生莫與榮殁莫與令刻文此碑以鴻厥慶故四鎮北庭行營節度使扶風郡王贈司徒馬公神道碑銘并序常衮皇帝使常侍以故征西扶風郡王臣璘功行之録詔門下侍郎平章事臣衮曰古諸侯大夫計功稱伐書于太常勒之彞器德勳高故其文懿事業實故其言逺有國之大經也納忠於王室豈褒紀之禮闕歟冝文其頌聲以昭示承休于豐碑焉臣謹桉司勳之戎籍史官之年表而敘之云聖上稽黃虞之道以武功文德統御天下赫赫明明罔不率俾唯犬戎自擅冦于我西土而猶懷以威德久而浸驕時乃大稽命將考之令典惟三年夏六月庶邦百辟洎侯王列將咸會于明廷乃大誥于爾在位有能典我西師僉曰璘哉是用詔以鷹揚之命於夏有鸞旗雕戈之賜公拜手稽首不敢辭難遂帥師朝那弭節涇流恢耀武威以臨于戎狄既至乃以戎服立于軍門之外奉敡天子之威命而訓于將軍列校六正五吏三軍之大夫曰惟昔盛明必有憂難其在殷高宗也有鬼方之征其在周文祖也有昆夷之患秦以安定北地戎狄內侮漢以金城隴西氐羌入冦故遣率以守衛中國修戰而高尚武力國家道德盛於殷周甲兵富於秦漢亦有邊患尚勞睿謀則疆臣之罪也將何以塞責誓將上奉神武之算下慿戎士之力鼓行而前殄殱群慝詞情抗厲風雲動色於是軍舉法以誓之令簡而一衆畏而服雖嚄唶老將聞而竦然乃周覽其山川以備其戰守有若犀兕其威貙犴其勇屹立而不動者持重之將統焉禦于水硤之衝蒙輪超乘縵胡突鬢耽盻而橫奮者雄毅之將董焉捍于瓦亭之隂輕軒飛翰闐闐桓桓隸於射聲校尉以出松谷百夫之特萬人之敵屬於車師後部以殿銅城火渠門之旗舒於大回川雷密須之鼓殷於都廬山周之以木樵校聮布之以簡石渠答部勒既定天地肅然遂使魁健氣索猛􅋧魂駭卻略引去不敢近塞故八年之間再冦而巳此皆親稟睿略協用武經前後獻功悉如宸旨方將大復流沙逺收故地奪我良將罔卒西事以大曆十一年月日薨于戎府春秋五十六天子廢朝而歎曰安得雄邊威敵之臣如扶風乎遣中命以迎喪顧近侍而流涕其至第也百官會弔其遣奠也五校啓行賵以車馬唅有貝玉所以褒大勳也𥘉公自二庭統甲士三千赴鳯翔行在遂陳滅胡之䇿先皇帝竒之曰吾無憂於東方也遂戰青渠陳灃水收二陜復三川衛南以百騎破五千河陽以一旅摧十萬史朝義悉師自將大戰邙山國家以天下徑兵夾攻未動公獨率所部不陳而馳偃旗先登闞如虓虎鬪酣披靡橫貫而出回戈奮擊虜陳始破交突數合轟然大潰時副元帥太尉光弼壯之曰吾用兵三十年未見以少擊衆雄捷之若此每有征伐大計悉咨訪焉斯亦群帥之傑既而移軍右輔疾援河西固已離之心存將棄之地及聞僕固懷恩之變即日旋師萬類千群延蔓山谷輕行轉鬪虜殺而歸屇于𡵨都冦巳四合公乃持滿外嚮坌入懸門未及解甲背城出戰戎師北走數騎前追眥血橫灑朱殷金甲楇戟而墜應弦而倒者數千萬人可謂三軍之絶也至於理鄭國撫潁封化郇邠寧上郡勤於藩職惠於長人勞徠流庸贍恤孤老縑綜綿纊工於織紝入而有制故大東之刺不作禾麻菽麥業於播藝用之有節故自北之化可懷此又列郡之率化也公字某扶風人也自秦漢至於國朝公卿大將軍通侯二千石踵武王室休有烈光曽祖昭朝散大夫新豐縣令祖正會右威衛將軍扶風郡公贈光祿卿父晟左司禦率府兵曹參軍贈太子少保忠孝在門文武繼代宦婚之盛士族有輝惟公勳胄華茂雄姿高爽少有四方之志以才氣自任擺落凡格不嬰細微故弋獵畋漁嘯吒川澤年二十讀伏波傳至大丈夫當於邊野以馬革裹尸而還慨然而歎曰豈使吾祖勳業墜于地乎由是愾憤邊戎徘徊孤劒遂西至絶域以竒功纍授禆將歷金吾將軍殿中監太保御史中丞遷御史大夫領北庭行軍使邠州刺史加工部尚書節制涇原以鄭潁二州隸之尋拜右僕射知省事階至儀同進封異姓副軍以降略而不書以英明之識遇聖明之運故得竭其智謀極其任遇抗大節以激危難攄洪仁以庇傷殘公之理軍也以穰苴兵法孫子十三篇先以正合終以竒勝間廓深邃應變無端與之安與之危故可合不可離同其敗同其成故樂死不樂生至于木􅎆濟河登山拔幟解鞍而卧鞭馬而馳兼之有餘亦不差異嘗以家財二百萬贍三軍與其散已食於行伍陳賜金於廊廡何相去之逺哉公之事君也奉之以實納之以忠造膝前籌詞禮明順檢身無過恭謹畏愼祿賜所加則受小辭大任使所及則履險讓夷以忠材而親重有絳侯之遇也以簡質而倚愛有吳漢之信也所謂國之神將朝之藎臣終慶於家永於福祚鍾石享於祖考帶礪傳於子孫冝哉嗣子旰等重族之盛隸業承家哀哀執喪痛結天壤萬家葬地能誡昔賢十里丘封亦非遺志獲承君命欽率朝經請諡嘉名謂之合禮銘曰峩峩雍城積高氣靈氣主金行良將乃生琅琅司徒雄略縱橫耽耽其視震震厥聲四方靜難二紀操兵𥘉奮厥武車師戎府鐵馬蛇矛大黃白羽天山瀚海噴薄風雨驍騎三千披荊謁主從我撫軍擊胡滅虜回戈涼野解敵𡵨下烈烈英風橫飛西土遂佩珩璜分雄棨戟寵臨方鎮乃蔚乃赫洪稜遐振虜氣外折惠化滂流人心內結昆夷先零白斾至涇受算宸扆朱旗撫征密隂前塞義渠故城丘巒陵谷逺近相屬澶漫傾合紆餘回復野戰高秋金羈馳逐左揮右射虎捷神速畨渠愕視百姓推伏國于扶風祚爾嘉庸位長庶寮鴈行三公王用蕃錫我有鼓鍾叔父昆弟燕私雍雍功成身殁寵厚厥終周漢二宣皆有勞臣北征西討出車轔轔今我司徒實同厥勳勳在王室光昭後昆唐贈范陽大都督忠烈公李公神道碑銘并序楊炎秦霸也張祿去魏漢興也淮隂離楚龍鳴風雨之會蛇變泥蟠之中逶迤感通精氣相合斯冥契也豈人力也皇唐贈司空范陽大都督李公諱楷其本出於隴西八代祖節後魏鴈門太守燕齊之亂族沒鮮卑東遷號良將之家北部入大人之種其生渤碣其居戴斗海塞回抱興公之氣天星下直為國之祥英氣混茫熊據龍驤望其形得山河之狀覩其鋭見金鼓之威神明為徒義勇為器久視中以驍騎歲入于遼西臨太原南震燕趙雲火照于河上天兵宿于北門朝廷憂之有命招諭合以信誓際于天人話言感寤撫劒歎息是歲以控弦之士七百騎垂櫜入塞解甲來朝以其本枝復賜李氏授玉鈴衛將軍左奉宸內供奉圖形雲閣之中置酒蓬萊之上君臣相賀羽衛生光君子曰井谷不可以遊龜龍蟻垤不可以戴松柏漢於是始靖虜於是始憂是後殪靺鞨干鴨緑之野覆株胡于榆閛之外北出障塞懷其王庭南救河源復其死地石壑之役以一旅定三軍泠陪之師以虛聲破精徑東封之歲外將天軍河湟未寧西護監牧雲麾鐵騎山動地踴右據清海北登狼山冰泮則會師風高則出塞皇威振于四海王化敷於無外故得大命三錫天馬輅驂定國難者兩朝拖侯服者四紀會兵車者百勝出帳下者千人國有事未嘗不勤勞無私可謂知禮於戲天道曖昧胡星未殞以營平之年不終大用以伏波之病再出窮荒天寶元年五月二十日自河源薨于懷逺縣之師次春秋六十七贈營府都督明年詔葬干富平縣壇山原維公智之大竇神之異門心和體剛慮逺精徹思乎耳目之外行乎變化之中震呼戎獯嘯吒風雲貔虎之悍以禮成百萬之強以謀勝故鮮卑因之以疲中國天后取之以空大漠於中宗開朔方之地四百里於睿宗食佐命之邑三千戶於玄宗則主禁衛吞諸戎東西南北動罔不剋禦戎安邊凡十命焉祚于後也元子太尉中書令東都河南江淮等道副元帥臨海郡王光弼少子太保御史大夫渭北鄜坊等州節度使武威郡王光進負河圖以列四星遇英主而當三傑肅宗之功復區宇更為桓文今上之道訓華夷並為召畢乾元中天子以公炳德丕赫積仁流慶大福再成沒而不朽乃命太常追考功績諡曰忠烈贈司空范陽大都督夫人贈號韓國夫人於是建廟堂命宗紀室有山龍之服樂有鍾石之和昭宣令圖是有銘篆銘曰茫茫上象降精于北是生純臣其在異國矯矯府君蔚其英靈蛇蟠斗極鵬化南溟來于本邦會此天庭風驅虎旅晝食狼星綿綿塞草天隔華夏北距隂山野無胡馬殊勳大績玉劒玄社天摧武庫海折崑崙在昔遺慶惟魯臧孫曰聖在天勤于至道既命太尉又崇太保一門四龍二作元老赫赫元老氣含清真白髮重冠高堂有親帝命韓國祚于夫人亦詔薊丘下寵明神彼丘之榛此石之磷悠悠令德萬古清塵隴右節度大使贈涼州都督郭公神道碑銘并序張説四序平分清秋之氣徑五方異俗崆洞之人武故隴上多豪山西出將其有雲龍感召星象特生金鼓登壇隱如敵國麾幢指塞自比長城得之於太原公矣公諱知運字逢時其先太原著姓今則晉昌人也本乎文王之弟是為虢叔虢或云郭因而氏焉自燕昭尊隗以築宫漢祖封亭以列國其侯于陽曲宅彼太原舊矣亭之玄孫友從太原徙隴西昭帝分隴西置西平郭氏又為郡之右族友之昆孫武威太守憲憲之猶子散騎常侍芝俱有名迹見於魏晉則晉昌諸宗散騎之後也爾乃一門連譽時人號曰三儒四海齊名天下謂之八凱光祿派分於馮翊廷尉丗茂於潁川孝則天錫釡金忠則帝章冕服仁則猛獸不害信則童兒不欺豈直介休見有道之碑洛陽聞立德之傳而已曽祖欽瓜州大黃府統軍上柱國祖才朝議郎瓜州常樂縣令上柱國父師朝散大夫上柱國贈伊州刺史磧鹵之地戎馬生郊業戰鬪而弘勳仕州縣而為達啓莫京之繇福不在於其身積無聲之善慶必流於後嗣公太白之精雷泉之靈膺家之禎為國而生身長七尺力能扛鼎猿臂虎口虬鬢鶚瞵射穿七扎劒敵萬人子卿路逢遙識將軍之相唐舉一見足辨封侯之骨解褐以善戰授昭武校尉秦州三度府左果毅以敗狄北庭加遊擊將軍沙州龍勒府折衝兼右金吾郎將浣海軍副使以軍界破虜即授其州刺史進當軍經略使朝廷以未愜前除且有後命遷本位中郎將仍舊為州軍使默啜之冦北庭也公奔命解圍軍聲大震加雲麾將軍右武衛將軍封介休縣開國公食邑二千戶開元二年吐蕃入隴右掠埛牧公兵以竒勝冦不復蹤積甲山齊而有餘收馬谷量而未盡歸功廟算朝議多之拜羽林將軍持節隴右諸州節度大使兼鄯州都督河源軍使鎮西陲信國之藩屏坐北落亦王之爪牙故人奉期門而出寄分閫於是料敵無備間其師老潛軍一舉大俘九曲鎖甲文劒𤏡馬犛牛既獻戎捷遂頒朝賜乃兼鴻臚卿攝御史中丞封太原郡開國公加前食邑三千戶執憲揔軍典屬乘障增爵益邑遇厚恩深俄而六州羣胡相率大叛命公統隴右之騎濟河曲之師鋒鏑爭先玉石俱碎拜左武衛大將軍授一子官金銀器百事雜綵千段班師臨洮遘兹虐疾嗟乎胸奴未滅宿志不申生也有涯死而猶視開元九年十月二十二日薨於軍舍春秋五十有五蕃夷邊鎮血面摧心悲慘風雲號慟山谷豈非良將視人如子人亦視猶父乎皇帝憫焉詔贈涼州都督米粟五百石錦帛五百段命都水使者張景佚備物護葬遵朝典也惟公氣猛而性和量寬而精鋭沈謀可以掩蓍蔡雄斷可以奪鬼神故常糟粕韜鈐芻狗風角然其樹恩結信立威用武炟赫如風濤震蕩如雷雨戰必克攻必取每有奏謁帝特稱歎孝文之得魏尚虜不足憂太祖之見郭嘉知成吾事前後錫錦衣寶帶文馬素女爛其盈門長鳴在廏感知已之主陳必死之力皇情西顧則九羌舋鼓詔書北伐則六狄焚旗上成聖君之玄鑒下效武臣之素節其竟也如此夫為人子立廟致敬祖考來格不亦孝乎為人臣恢疆禦侮以勞定國不亦忠乎若然者歸義方於先人揚令名於後代可也嗣子英傑起復定逺將軍左領軍衛翊府中郎將假紫服金章河西節度副大使英奇朝散大夫前尚輦奉御英協遊擊將軍前京兆府勵行府右果毅都尉英彥朝議郎前左衛胄曹參軍等咸善居喪而過哀或從王事而奪禮則知辛賢父子繼位將軍祭彤弟兄望參師律去本不戀達也而新是謀權也嘉此武功創其宅兆以十年七月葬我太原公夫人燉煌索氏祔焉禮也皇上念功以惜逝厚終以遇存有詔詞人為其碑志介士送葬即封征虜之墳單于入朝當祭度遼之墓銘曰恍恍將軍雄略冠羣平西征北震戎懾獯亭障卧鼓屯田饋軍仗此白刃致彼青雲郭侯宴喜既多受祉玄牡黻衣清廟蠲祀鼎食金奏炮鱉膾鯉既來不庭有嚴天子流沙博望羽林飛騎河北回兵臨洮舊址手握金節魂沈玉帳千里送喪三軍悽愴詔葬禮崇恩碑義豐生為神將死為鬼雄身丗一滅榮華萬空祁連之墓長旌武功唐故邠寧慶等州節度觀察處置使朝散大夫檢校戶部尚書兼御史大夫賜紫金魚袋贈右僕射史公神道碑劉禹錫僕射名孝章字得仁本北方之強世雄朔野其後因仕中國遂為靈武建康人曾祖道德贈右散騎常侍封懷澤郡王祖周洛銀青光祿大夫檢校太常卿兼御史中丞北海郡王贈太子太保考憲成早以武勇絶人積功至魏博節度使終于河中晉絳慈隰等州節度觀察使檢校司徒兼侍中河中尹贈太保其薨也大臣中書令晉國公裴氏為之碑其名益顯公即侍中之元子母曰兾國夫人李氏幼而聰寤父母賢而加愛焉及長好學遷善秀出儕輩鄴下諸兒號為書生元和中太尉訴為魏帥下令掄材出轅門取大將家翹秀者為子弟軍列于諸校之上公獨昌言願效文職太尉深竒之遂假魏州大都督府參軍長慶二年常山衆叛害其帥沂國公田司徒于帳下沂公發迹于魏人猶懷之詔命其子布以尚書授鉞統魏兵問罪于北疆且報家禍布既啓行士氣不振渙然內潰獨與冗從之旅偃旗而歸百憤攻中卒自引決先侍中時為中軍都知兵馬使兼御史中丞全師在野開然推戴之請為假侯以鎮定中貴人飛駒上聞穆宗夜召翰林學士草詔書以真侯命之實有魏土從衆而合權也是歲公自攝官轉本府士曹參軍兼監察御史賜朱衣銀印推恩以及子也一旦跪于父母前進苦言曰臣竊惟大河之北地雄兵精而天下賢士心侮之曰河朔間視猶夷狄何也蓋有土者多乘兵機際會非以義取今臣家父侯母封化為貴門君恩至矣非折節礪行彰信于朝廷無以弭識者之譏寤明君之意節著於外福延於家乘時蹈機不可旋踵言訖泣下數行父俞母贊天性交感三心既叶萬衆濳化天子聞而嘉之曰彼真有子乃授檢校太子左諭德兼侍御史充節度副使纍遷至散騎常侍兼御史大夫賜金印紫綬二軍之政事如命卿弛張損益所以參決濳革故態人知嚮方大和二年滄景節度使李全略卒其子同捷竊據故地詔下以文告弗革遂用大刑先侍中表請率先諸侯使元子以督戰制曰可公承君父之命乃捐其軀一舉而下平原壓滄壘由是加工部尚書及王師凱旋上表願一識承明廬詔允遂赴闕下得覿便殿上曰嚮吾始征滄州議者皆曰彼魏之姻也慮隂為冦謀吾發使數輩以偵之其還也僉曰爾父瀝𣢾于賔筵爾母抗詞于簾下願絶姻以立效其經始啓發出于爾心今滄海砥平䇿勳之日冝貴爾三族命爾父為侍中遷鎮于近地加爾禮部尚書析相衛澶三州為鎮以居之俾爾一門大榮以誇天下公拜稽首謝父遷讓已爵禮無違者翌日詔見于明庭人咸曰史氏之寵光古無有也牙旗碧幢方指東道侍中以帳下生變聞泰極而否當歌而哭迎柩于路仰天長號因葬于洛陽之邙山兾國夫人袝焉寢苫枕塊以所仇同天為大酷未幾詔舉金革之義起為右金吾將軍纍表陳乞有司以違命督之輿疾即路間歲擢授鄜坊丹延等州節度觀察處置等使居四年遷鎮于滑一歲入為右領軍衛大將軍旋改右金吾大將軍又授鉞于邠土孟秋至治所首冬遘疾拜章入覲不克展和鸞鞗革之儀薨于靖恭里之私第享齡三十九當開成三年十月二十日上聞而悼之不視朝一日贈尚書右㒒射明年二月歸葬于洛都夫人琅瑘王氏祔焉繼室深澤縣君博陵崔氏有一子曰渙生七年而孤僕射之喪自復魄至葬當門戶備祭祀建碑表皆縣君之能且命其家老具事功來請婺矛牙不恤家而憂幼嗣不知其先人之官業乞辭以傳于後也君子以為知禮謹書之銘曰斗極之下崆洞播氣終于侍中孔武且貴奉上致命冝昌後嗣㒒射承之良弓不墜耳煩鉦鼓心恱文字虎穴之中生此騏驥大和紀元滄景不虔子弄父兵跳踉海壖有鄰隂交蝟起雞連詔下薄伐良隅騷然時惟侍中實統魏師蓄鋭未發衆心危疑㒒射為子陳謀盡詞興言涕零有感尊慈絶姻效節精貫神祗滄波底寧王命褒之乃遷元侯來鎮近畿乃祚元子别建旌麾一門四節輝耀當時倐忽變生魏郊紛披喬木雖大盲風不知干雲之臺烈缺焚之哀哀孝嗣丁此大酷迎護幃輤葬于東洛訴天觸地血染縗服禮有金革詔書敦促不遂枕戈驟膺推轂雕隂白馬暨于邠谷雖榮三鎮不荷百祿綺紈之間圭組纍纍如彼晨葩日中而萎有妻名家有子稚齒行號執禮歸室蒿里洛水之陽修邙之趾尊卑穆敬幽顯同理舊松新柏亦象橋梓刻石紀功垂于萬祀重校正唐文粹卷第五十七
