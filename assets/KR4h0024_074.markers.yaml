  - {type: variant, offset: 6269, length: 0, content: '', WYG: 泉州二公亭記歐陽詹勝屋曰亭優為之名也古者創棟宇纔禦風雨從時適體未盡其要則夏寢冬室春臺秋户寒暑酷受不能自減及中古乃有樓觀臺榭異於平居所以便春夏而陶堙鬱也樓則重構功用倍也觀亦再成勤勞厚也臺煩版築榭加欄檻暢耳目逹神氣就則就矣量其材力實猶有蠧近代襲古増妙者更作為亭亭也者籍之於人則與樓觀臺榭同制之於人則與樓觀臺榭殊無重構再成之糜費加版築欄檻之可處事約而用博賢人君子多建之皆選諸勝境今年暮春月邦牧安定席公别駕置同正員天水姜公念兹邦川逼溟渤山連蒼梧炎氛時迴濕雲多來又日臨胃次斗建辰位和氣將徂畏景方至月令云可以升山陵可以居髙明葢謂是月况地理畢埤而不擇爽塏以蕩夫汚廅乎因問風俗相原隰郭東里所共得竒阜髙不至崇卑不至夷形勢廣袤四隅若一含之以澄湖萬頃揖之以危峯千嶺㸃圓水之心當奔崖之前如鏡之}
