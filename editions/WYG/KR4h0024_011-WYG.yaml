body:
  text: 楚騷體十一九諷并系述皮日休反招䰟并序悼賈并序效古詩三十五江有楓一篇蕭穎士菊榮五章有竹一篇蟬鳴五章宋華涼雨一篇蕭頴士虞獲子鹿一篇韋應物上古之什補亡訓傳十三章顧況倬彼我系一首王勃元和聖徳詩一首韓愈鄆州溪堂詩一首漢隄詩一首盧肇有所恨二章歐陽詹河之水二章韓愈九諷系述并序皮日休在昔屈平既放作離騷經正詭俗而為九歌辨窮愁而為九章是後詞人摭而為之皆所以嗜其麗詞撢其逸藻者也至若宋玉之九辨王褒之九懐劉向之九歎王逸之九思其為清怨素豔幽快古秀皆得芝蘭之芬芳鸞鳳之毛羽也然自原己降繼而作者皆相去數百祀足知其文難述其辭罕繼者矣大凡有文人不擇難易皆出於毫端者乃大作者也揚雄之文丘軻乎而有廣騷也梁竦之辭班馬乎而有悼騷也又不知王逸奚罪其文不以二家之述為離騷之兩派也昔者聖賢不偶命必著書以見志況斯文之怨抑歟噫吾之道不為不明吾之命未為不偶而見志於斯文者吾懼來世任臣之君因謗而去賢持禄之士以猜而逺徳故復嗣數賢之作以九為數命之曰九諷焉嗚呼百世之下復有修離騷章句者乎則吾之文未過不為乎廣騷悼騷也粤勾亶之薄俗兮其風狡而且苦吾欲以直道揠其邪心兮皆騁容而莫顧前誨行兮後止高諭仰兮下俯咸為吾之儇為愚兮並以吾之霾為傴羌靈脩之乃吾知兮先職我而為輔奈其臣之狺狺兮乃不知吾之所撫吾欲以明喆之性辨君臣之分兮定文物之數吾欲以正訐之道兮進忠賢而退姦豎吾欲以醇醲之化兮反當今而為往古吾欲以忖度之志兮定觚圓而反規矩念儓覈之在位兮若梟羊之當路内灼怛以為儔兮復何知其所愬乃指天而鬱悠兮将天奪乎國祜永惄惄以何言兮将求知於吾祖右正俗有肪兮㸃而謂之不挈有泉兮壅而謂之不決有茝兮轥而謂之不芳有軸兮􅀈而謂之不轍聲咺許逺切唏以無音兮氣鬱悒而空咽既惄惄以増懼兮又謾謾漫而不訣誣彭祖以為孺兮譎殤子以為耋夥衆人之難信兮撏夸者之不悦佞為痝兮何去姦為疣兮莫劀音刮讟為轡兮莫御謗為玉兮何切彘既䑋而必烹兮木方㚇子公切兮必折心􅀈􅀈而似車兮思緜緜而如瓞手欲動兮似拲足将行兮如絏既不辨其顔跖兮遂一貫於堯桀吾哀生之不遲兮奚至死而惙惙念帝座之不爣他朗切兮故交光於巻舌既何路以自辨兮遂没齒而癆刺右遇謗靳尚之言兮美如㜲子蘭之氣兮醲於酲既怒􅗻音緜以相向兮遂裹足而南征面㥾㥾以奚色兮心􅀈􅀈以何情耳方聰兮忽睽目正視兮忽盲日當午兮便昃天方晝兮不明欲泣兮有血将啼兮失聲望靈脩兮似失出國門兮若驚軔識怨兮亦緩駟知愁兮復鳴既徜徉兮夏水復眷戀兮南荆嗟余夙秉於大訓兮涵清骨之忠貞既貿貿者之莫予容兮向重蒼而自盟既惏路南切仁以憑義兮遂鈲信而摫規誠将真宰之不仁兮胡為役余以此生彼鷽斯之蟊賊兮固不能容乎鶬鶊彼茨菉之叢穢兮固不能讓乎杜蘅己矣乎國無人兮莫我留将訴帝于玉京右見逐荷為裯丁牛切兮芰為襬碑荃為䘿居勿切兮薜為褘弭吾棹兮灃之浦駐吾楫兮湘之湄悲莫悲兮新去國怨莫怨兮新相思幽篁蕭兮静晚清漪澹兮去遲湘君欲出兮風水急帝子不來兮煙雨微芷既老兮白葯於角切日将暮兮紅萎朝浮乎鶻蹏啼夕叫乎羈雌攭禮漾漾兮不止㶇黄悠悠兮何之日出没兮北渚雲依俙兮九疑既無人以辯余兮又何心而怨咨退不解其㤞􅭛上音鐸下音悸兮進不知其忸怩寒蜩怨而無聲兮古木悽其寡枝嗟吾􅅎之不反兮千秋萬嵗湘中馳右悲遊慨天道之不明兮何獨生此大佞若䝟烏八切貐之能冠兮當一國而持柄見亂臣之反詐兮信其主以不競轍己覆而又遵兮仡五迄切将翻而不整不思心腹之疾兮又玩膏肓之病竟客死於咸陽兮終不作毒王之幸既養䖘火胡切以遺患兮遂倒釬音犴而授柄将諛臣以肆禍兮豈上天之付命粤吾大以為不可兮彼以災而為慶儻靈脩之􅅎有知兮刷吾恥於下瞑右憫邪有美一人兮端憂千喑䕃萬惄兮曾不得以少休腸結多以莫迴兮淚啼極而不流王孫何處兮碧草極目公子不來兮清湘滿樓汀邊月色兮曉復曉浦上蘆花兮秋復秋天泬寥以似淬兮峰巉崪以如抽篔簹颯兮雨岸杜若死兮霜洲遺余程兮澧之側整余陌兮湘之幽望女嬃兮秭歸夢懐宋玉兮荆門愁欲向天以號咷兮寸晷不可以少留又不知吾魄之所處兮永寞寞以悠悠右端憂山之巔兮水之涘桂為祠兮蘭為祀執玉桴兮扣雷鼓奠金􅡸兮滴浮蟻薦瓊芳兮望暮雲獻椒醑兮拜寒水祝肹蠁以怪談兮巫妖冶而魅醉波閃倐兮湘君竹蕭疎兮帝子日将暮兮河伯秋正深兮山鬼神之化兮何方人之艱兮至此胡不化其邪而為正兮胡不反其戾而為義胡不轉其亡而為興兮胡不易其亂而為治但血食於下國兮罪不少裨於有位吾将乗青螭而駕白虯兮謁帝而訴神之累請天弧發鏃兮天掊行箠神速悔尤兮俾吾靈脩而易志右紀祀粤吾秉志兮絜於瑾瑜芬其徳而芳其道兮榮於蘼蕪将興國以見罪兮擬佐王而蒙辜彼羣小之茸茸兮如慕臭之蚍蜉以大鵬為雀兮以康瓠為㼶以衮衣為褋兮以黎邱為墟以鄭姬為醜兮以子産為愚以鮑焦為貪兮以孔聖為誣吾将奮鱗於大空兮奚獨慕此江湖吾将發榮於蟠桃兮奚獨守此蒿蔞吾将蕩其魄兮驂風軔與軋車謁帝於冥冥之天兮秉其生殺之樞将飄飄以高逝兮亦何必懐此佞邪之故都右捨慕堯死兮舜滅禹殄兮湯絶似玉兮将沈如金兮永没行以仁兮止以義生以貞兮死以絜念余曽不足以􅌃聖閫兮亦慕兹而自悦湘浦兮煙深沅江兮風切顧影兮自憐撫躬兮永訣鬼慘兮神悲雨泣兮泉咽竟汨没以奫淪兮永幽憂而怫鬱湘之山兮未盡湘之流兮不竭千秋兮愁雲萬古兮明月靈均之寃兮孰能銷其氣靈均之愁兮孰能釋其結來者之自鑒兮無致位於牙孽右絜死反招魂并序屈原作大招魂或曰景差作疑不能明宋玉作招魂皮子以為忠放不如守介而死奚招魂為故作反招魂一篇以辨之辭曰承溟涬之命兮付余才而輔君君既不得乎志兮余飄飄而播遷余将蕩大空而就滅兮君又招余俾復身余詣帝以請訣兮帝俾巫陽以筮云巫陽語余以不可歸兮故作詞以招君乃下招曰君兮歸來故都慎不可留些其君雄虺兮其民封狐些食民之肝鬲以為其肉兮摘民之髮膚以為其衣些朝刀鋸而暮鼎鑊兮上暧昧而下墨眉呆癡些君兮歸來故都慎不可留些余昔為比干之魂兮干僇而余去些未聞干貪生以自招兮余竟潔其所處些君兮歸來故都慎不可留些余昔為伍胥之魂兮胥僇而余逝些未聞胥貪位以惜生兮執屬鏤而不滯些君兮歸來故都慎不可留些余昔為𢎞演之魂兮演自殘而余行些余未聞演惜命以不死兮俾其義而益明些君兮歸來故都慎不可留些帝命余以輔君兮亦以君之忠介些今以忠而見聞兮尚盤桓而有待些将自富貴而入羇旅兮其志乃悔些将戀骨肉而惜家族兮何不自裁些梟食母而獍食父兮見禽獸之為生些茍􅓇殘者眉夀兮實梟獍而同名些君乎慎勿懐故都之戀歸來乎余為君存千古忠烈之榮枯些悼賈并序余嘗讀賈誼新書見其經濟之道大矣哉真命世王佐之才也自漢氏革嬴高祖得於矢石不暇延儒人及為天子制缺度弛處華而夷是時獨有叔孫生能定朝儀其制未悉唯生草其書欲以制屈諸侯推定正朔調革輿服通流貨幣天不祐漢絳灌興謗竟枉其道出傅湘沅生自以不得志哀屈平之放逐及渡湘沈文以弔之故其辭曰瞝摛九州而相君兮何必懐此故都噫余釋生之意矣當戰國時屈平不用於荆則有齊趙秦魏矣何不捨荆而相他國乎余謂平雖遭靳尚子蘭之䜛不忍捨同姓之邦為他國之相宜矣然則生之見棄又甚於平當漢時捨文帝則諸侯矣如適諸侯則新書之文抑諸侯而尊天子也捨諸侯則胡越矣如適胡越則新書之文滅胡越而崇中夏也是以其心切其憤深其詞隠而麗其藻傷而雅余悲生哀平之見棄又生不能自明其道嗚呼聖賢之文與道也求知與用茍不在於一時而在於百世之後者乎其生之哀平歟余之悲生歟吾之道也廢與用幸未可知但不知百世之後得其文而存之者復何人也咸通癸未中南浮至沅湘復沈文以悼之其辭曰粤炎緒之嫣緜兮其國度之未彰天錫生以命理兮冀其道之益光偉吳公之知賢兮道其名於文皇既􅚳刃敐軫以召之兮遂位之於上庠愍耄儒之憃愚兮對天問之不臧既羣儒之讓俊兮馳其譽之煌煌嗟大漢之丕緒兮虯其賢于汙潢上下溷而不分兮議制削於驕王殺僇棼而不制兮斷捽胡與寇攘羌虜坌以侵華兮曽不能以抑强餌其嗜之延延兮寔三代之計良念五徳之更承兮論尵結而不綱乃秉臆以興説兮數用五而色尚黄又諸侯以開國兮輸其租於咸陽曽不得以撫民兮俾其君兮何忘請紆􅀈以乗印兮各馳化於所疆上既悦而欲大用兮遭絳灌與東陽道既擯兮何明乃出傅於沅湘浮沅波之翕洫兮或漾棹以夷猶望靈均之没所兮顮頻其心之怊怊尺遙臨汨羅之浩漾兮想懐沙之幽憂森樛蘿以蓊鬱兮時迸狖以相號霧雨暗乎北渚􅘿䗤毒乎芳洲景黯沮以不明兮若天悼乎離騷香依依兮杜若韻淒淒兮篻簩山隠隠以掃空兮煙微微而淡秋羌吾不知所感兮淚懭恨以横流當抱􅀈於渺藩兮曽無足以少休既菼薍以傷思兮又鵂鶹以動愁嗚呼哀哉世既不平頷吾道以為非兮吾復何依蘋蘭憔悴兮稂莠繁滋麟鳳匿迹兮梟獍騰威哲匠罷斧兮拙者構之離婁閉目兮瞽者揚眉子都蒙􅃑兮敦洽騁姿嗚呼哀哉亦先生之尤也􅇇丑吏其世之不可兮何不解而去位又垂萬世之名兮取捨在此奚自取謗於童羖兮乃􅍀然而為累葢伊尹三就五就之心兮冀其民之可治奈惽惽以不悟兮又被之以非議幸一人之再覺兮答受釐之奥義既孱王以墮駕兮乃寃慟而已矣訊曰君不明兮莫我知幽都寂兮和涕歸文懸日月兮俟後聖用之大故忽兮其何足悲江有楓一篇十章并序蕭頴士江有楓思陸鄭二友吳㑹舊遊且疾䜛也君宦于尹府以直方不偶見偪䜛佞惟古之賢者有避色避言之義矯然去之二室之間有槭樹焉與江南楓形胥類憩於其下而作是詩以貽夫二三子焉江有楓其葉蒙蒙我友自東于以遊從山有槭其葉漠漠我友徂北于以休息想彼槭矣亦類其楓矧伊懐人而忘于東東可遊矣㑹之邱矣于山于水于廟于寺于亭于里君子遊焉于以宴喜其樂亹亹粤東可居彼吳之墟有田有庭有朋有書有蓴有魚君子居焉惟以宴醑其樂徐徐我朋在矣彼陸之子彼陸之子淹也如松如杞淑問不已我友于征彼鄭之子彼鄭之子愕也如琇如英徳音孔明我思震澤菱芡幕幕寤寐如覿我思剡谿杉篠萋萋寤寐無迷有鳥有鳥粤鷗與鷺浮湍戲渚皓然絜素忘其猜妬彼何人斯曾足傷懼此懼維何懼寘于羅彼驕者子䜛言孔多我聞先師體命委和公伯之愬則如予何悵然山河惟以嘯歌其憂也哉菊榮一篇五章并序菊榮酬贈離且申志也乆寓大邑賢宰宋侯惠而好予賦鳴蟬以貺别有懐相規備厥卒章于以報焉采采者菊芬其榮斯紫英黄萼照灼丹墀愷悌君子佩服攸宜王國是維大君是毗宋即太尉文貞公之子也貽爾子孫百禄萃之采采者菊于邑之城舊根新莖布葉垂英彼美淑人應家之禎有弦既鳴我政則平宜爾棟崇必復其慶采采者菊于邦之府隂槐翳栁邇楹近宇彼勞者子喧卑是處慨其莫知藴結誰語企彼高人色斯遐舉采采者菊于賓之館既低其枝又弱其幹有匪君子是焉披翫良辰㫖酒宴飲無算愴其仳别終焉永歎歲方宴矣霜露殘促誰其榮斯有英者菊豈微春華懿此貞色人之侮我混于薪棘詩人有言好是正直有竹一篇七章并序有竹懿李新後閤而讌親友也有竹斯竿于閤之前君子秉心惟其貞堅兮有竿斯竹于閤之側君子秉操惟其正直兮彼蔚者竹蕭其森矣有開者閤宛其深矣迥簷幽砌如翼如齒冬之宵霰雪斯瀌我有金鑪熺其以歊夏之日炎景斯鬱我有珍簟淒其以栗彼紛者務休其豫矣有㫖者酒歡其且矣友僚萃止跗蕚載韡彼美公之姓兮那歟應積慶兮期予惟去之柄兮蟬鳴一篇五章并序宋華蟬鳴感秋興送将歸也僻守外邑而蘭陵子相過詰朝言歸賦詩見志以申贈焉蟬其鳴矣于彼疎桐庇影容跡何往不容嘒嘒其長求託于風未見君子我心忡忡既見君子樂且有融彼蟬鳴矣于林之表含風飲露以樂吾道有懐載遷伊誰云保未見君子我心悄悄既見君子披豁予抱蟬鳴蟬鳴幽暢乎而肅肅爾庭逺近涼颸言赴髙栁叢篁間之思而不見如渴如飢亦既覯止我心則夷蟬鳴伊何時運未與匪歎秋徂怨斯路阻願言莫從鬱悒誰語君子至止慰我延佇何斯違斯倐邇遐舉歲之秋深蟬其夕吟披衣軒除蕭蕭風林我友來斯言告離衿何以叙懐臨水鳴琴何以贈言委順浮沈涼雨一章并序蕭穎士涼雨志楊侯樂賓僚也習習涼雨泠泠浮飈君子樂胥于其賓僚有女斯夭式歌且謠歡言終宵惟以招邀于胥樂兮虞獲子鹿一篇并序韋應物虞獲子鹿憫園鹿也遭虞之機張見畜於人不得遂其天性焉虞獲子鹿畜之城陬園有美草池有清流但見蹷蹷亦聞呦呦誰知其思巖谷之游上古之什補亡訓傳十三章顧況上古慜農也遐哉上古生棄與柱勾龍氏主乃有甫田惟彼甫田有萬斯年開利之源無乃塞源一㕓亦官百㕓亦官嗇夫孔艱浸兮暵兮田有螽兮惟馨祀是患豈止餧與寒嗇夫咨咨䅎盛苗衰耕之耰之襏襫鋤犁手胼足胝水之蛭螾吮喋我肌我姑自思胡不奮飛東人利百西人利百有匪我心胡為不易河水活活萬人逐未俾爾之愉悦兮上古一章左車憑險也震為雷兄長之左東方之師也憑險不巳君子憂心而作是詩左車有慶萬人猶病曷可去之于黨孔盛敏爾之生胡為波迸左車有赫萬人毒螫曷可去之于黨孔碩敏爾之生胡為草戚左車二章築城刺臨戎也寺人臨戎以墓塼為城壁築城登登于以作固咨爾寺兮發郊外冢墓死而無知猶或不可若其有知惟上帝是愬築城奕奕于以固敵咨爾寺兮發郊外冢甓死而無知猶或不可若其有知惟上帝是謫築城二章持斧啓戎士也戎士伐松柏為蒸薪孝子徘徊而作是詩持斧持斧無翦我松柏兮持斧一章十月之郊造公室也君子居公室當思布徳行化焉十月之郊羣木肇生陽潜地中舒達勾萌曀其蔚兮不可以遊息乃熂蒺藜乃夷荆棘乃繇彼曲直匠氏度思登斧以時澤梁蓁蓁無或夭枝有巨根蔕生混茫際呼吸羣籟萬人揮斤坎坎有厲陸遷水濟百力殫弊審方面勢姑愽其製作為公室公室既成禦燥濕風日棟之斯厚榱之斯密如翼于飛如鱗櫛比繚以周墉墄以崇階俯而望之矗與雲齊䃤砆碔砆藻井旋題丹素之燝兮椒桂之馥兮髙閣髙閣珠綴結絡金鋪爛若不集于鳥雀繪事告畢賓筵秩秩乃命㫖酒琴瑟琴瑟在堂莫不静謐周環掩闢仰不漏日冬日嚴凝言納其陽和風載昇夏日鬱蒸言用于隂涼風颯興有匪君子自賢不己乃夢乗舟乃夢乗車夢人占之更爽其居炎炎則移皎皎則虧木實之繁兮明年息枝爰處若思胡寧不爾思十月之郊一章燕于巢審日辰也燕不以甲乙銜泥燕燕于巢綴葺維戊甲兮乙兮不宜有謬飛龍在天雲掩于斗曷日于雨乃曰庚午彼日之差亦孔斯醜昔在羲和湎淫不修我筮我龜莫我告繇𦙍迺征之彛倫九疇君子授律是禡是禷三五不備罔克攸遂惠此蒸人毋廢爾事爾莫我從維來者是冀燕于巢一章蘇方諷商胡舶舟運蘇方歲發扶南林邑至齊國立盡蘇方之赤在胡之舶其利乃愽我土曠兮我居閴兮我衣不白兮朱紫爛兮傳瑞􅁮兮相唐虞之維百兮蘇方一章陵霜之華傷不實也陵霜之華我心憂嗟隂之勝矣而陽不加坱軋陶鈞乃帝乃神乃舒乃屯烈烈嚴秋熈熈陽春職生有倫今華發非其辰辰屬東方之仁遐想三五黄帝登雲堯年百餘二儀分位六氣不渝二景如璧五星如珠陵霜之華兮何不妄敷陵霜之華一章囝哀閩也囝音蹇閩俗呼子為囝父為郎罷囝生閩方閩吏得之乃絶其陽為臧為獲致金滿屋為髠為鉗如視草木天道無知我罹其毒神道無知彼受其福郎罷别囝吾悔生汝及汝既生人勸不舉不從人言果獲是苦囝别郎罷心摧血下隔地絶天及至黄泉不得在郎罷前囝一章我行自東不遑居也我行自東山海其空旅棘有叢我行自西壘與雲齊雨雪淒淒我行自南烈火滿林日中無禽霧雨淫淫我行自北燭龍寡色何枉不直我憂京京何道不行兮我行自東一章採蠟怨奢也荒巖之間有以纊蒙其身腰藤造險及有羣蜂肆毒哀呼不應則上捨藤而下沈壑採採者蠟于泉谷兮煌煌中堂烈華燭兮新歌善舞弦柱促兮荒巖之人自取其毒兮採蠟一章倬彼我系一首王勃兄勵序倬彼我系舎弟虢州㕘軍勃所作也傷迫乎家貧道未成而受禄不得如古之君子四十强而仕也故本其情性源其事業因陳先人之迹以議出處致天爵之艱難也倬彼我系出自有周分疆錫社派别枝流居衛仕宋匡嬴相劉迺武迺文或公或侯晉厯崩坼衣冠擾弊粤自太原播徂江澨禮喪賢隠時屯道閉王室如燬生人多殪伊我有器思逢其主自東旋西擇木開宇田彼河曲家乎汾浦天未厭亂吾将誰輔伊我祖徳思濟九埏不常厥所于兹五遷欲及時也天豈願焉其位雖屈其言則傳爰述帝制大蒐王道曰天曰人是祖是考禮樂咸若詩書具草貽厥孫謀永為家寶伊余小子信慙明哲彼網有條彼車有轍思屏人事克終前烈于嗟代網卒余來絏來絏伊何謂余曰仕我瞻先達三十方起夫豈不懐高山仰止願言毓徳啜菽飲水有鳥反哺其聲嗷嗷言念舊徳憂心忉忉今我不養歲月其滔僶俛從役豈敢告勞從役伊何薄求卑位告勞伊何來㕘卿事名存實爽負信愆義静言遐思中心是愧元和聖徳詩一首并序韓愈臣愈頓首再拜言曰臣伏見皇帝陛下即位以來誅流姦臣朝廷清明無有欺蔽外斬楊惠琳劉闢以收夏蜀東定青徐積年之叛海内怖駭不敢違越郊天告廟神靈歡喜風雨明晦無不從順太平之期適當今日臣蒙被恩澤日與羣臣序立紫宸殿下親望穆穆之光而其職業又在以經籍教導國子誠宜率先作歌詩以稱道盛徳不可以詞語淺薄不足以自效為解輒依古作四言元和聖徳詩一篇凡千有二十四字指事實録具載明天子文武神聖以警動百姓耳目傳示無極其詩曰皇帝即阼物無違拒曰暘而暘曰雨而雨維是元年有盜在夏欲覆其州以踵近武皇帝曰嘻豈不在我負鄙為艱縱則不可出師征之其衆十旅軍其城下告以福禍腹敗枝披不敢保聚擲首陴外降幡夜豎疆外之險莫過蜀土韋臯去鎮劉闢守後血人于牙不肯吐口開庫啗士曰隨所取汝張汝弓汝伐汝鼓汝為表書求我帥汝事始上聞在列咸怒皇帝曰然嗟逺士女茍附而安則且付與讀命于庭出節少府朝發京師夕至其部闢喜謂黨汝振而伍蜀可全有此不當受萬牛臠肉萬甕行酒以錦纒股以紅帕首有恇其兇有餌其誘其出穰穰隊以萬數遂刼東川遂據城阻皇帝曰嗟其又可許爰命崇文分卒禁禦有安其驅無暴我野曰行三十徐壁其右闢黨聚謀鹿頭是守崇文奉詔進退規矩戰不貪殺擒不濫數四方節度整兵頓馬上章乞討俟命起坐皇帝曰嘻無汝煩苦荆并洎梁在國門戸出師三千各選爾醜四軍齊作殷其如阜或㧞其角或脱其距長驅洋洋無有齟齬八月壬午闢棄城走載妻與妾包裹稚乳是曰崇文入處其宇分散逐捕搜原剔藪闢窮見窘無地自處俯視大江不見洲渚遂自顛倒若杵投臼取之江中枷脰械手婦女纍纍啼哭拜叩來獻闕下以告廟社周示城市咸使觀覩解脱攣索夾以砧斧婉婉弱子赤立傴僂牽頭曳足先斷腰膂次及其徒體骸撐拄末乃取闢駭汗如寫揮刀紛紜争刌膾脯優賞将吏㭊珪綴組帛堆其家粟塞其庾哀憐陣殁廩給孤寡贈官封墓周帀宏溥經戰伐地寛免租簿施令酬功急疾如火天地中間莫不順序幽恒青魏東盡海浦南至徐蔡區外雜虜怛威赦徳踧踖蹈舞掉棄兵革私習簋簠來請來覲十百其耦皇帝曰吁伯父叔舅各安爾位訓厥甿畮正月元日初見宗祖躬執百禮登降拜俯薦于新宫視瞻梁梠戚見容色淚落入俎侍祠之臣助我惻楚乃以上辛於郊用牡除于國南鱗筍毛簴廬幕周施開揭磊砢獸盾騰挐圓壇帖妥天兵四羅旂常婀娜駕龍十二魚魚雅雅霄昇于丘奠璧獻斝衆樂驚作轟豗融冶紫焰嘘呵高靈下墮羣星從坐錯落侈哆日君月妃煥赫婐姽瀆鬼濛鴻嶽祗嶪峩飫沃羶薌産祥降嘏鳳凰應奏舒翼自拊赤鱗黄龍逶陀結糾卿士庶人黄童白叟踊躍歡呀失喜噎歐乾清坤夷境落褰舉帝車迴來日正當午幸丹鳳門大赦天下滌濯剗磢磨滅瑕垢續功臣嗣拔賢任耇孩養無告仁滂施厚皇帝神聖通達今古聽聰視明一似堯禹生知法式動得理所天錫皇帝為天下主并包畜養無異細鉅億載萬年敢有違者皇帝勤儉盥濯陶瓦斥遣浮華好此綈紵勅戒四方侈則有咎天錫皇帝多麥與黍無召水旱耗于雀䑕億載萬年有富無窶皇帝正直别白善否擅命而狂既翦既去盡逐羣姦靡有遺侣天錫皇帝厖臣碩輔愽問遐觀以置左右億載萬年無敢予侮皇帝大孝慈祥悌友怡怡愉愉奉太皇后浹于族親濡及九有天錫皇帝與天齊夀登兹太平無怠永乆億載萬年為父為母愽士臣愈職是訓詁作為歌詩以配吉甫鄆州谿堂詩一章并序憲宗之十四年始定東平三分其地以華州刺史禮部尚書兼御史大夫扶風馬公為鄆曹濮節度觀察等使鎮其地既一年褒其軍號曰天平軍上即位之二年召公入且将用之以彼之人安於公也復歸之鎮上之三年公為政於鄆曹濮也適四年矣治成制定衆志大固惡絶於心仁形於色竭心力以供國家之職于時沂密始分而殘其帥其後幽鎮魏不悦于政相扇繼變復歸於舊徐亦乗勢逐帥自署同於三方惟鄆也截然中居四鄰望之若防之制水恃以無恐然而皆曰鄆為虜巢且六十年将强卒武曹濮於鄆州大而近軍所根柢皆驕以易怨而公承死亡之後掇拾之餘剥膚椎髓公私埽地赤立新舊不相保持萬目睽睽公於此時能安以治之其功為大若幽鎮魏徐之亂不扇而變此功反小何也公之始至衆未熟化以武則忿而憾以恩則横而肆一以為赤子一以為龍蛇憊心罷精磨以嵗月然後致之難也及教之行衆皆戴公為親父母夫叛父母從仇讎非人之情故曰易於是天子以為尚書右僕射扶風郡開國伯以襃嘉之公亦樂衆之和知人之悦而侈上之賜也於是為堂於其居之西北隅號曰谿堂以饗士大夫通上下之志既饗其從事陳曽謂其衆言公之畜此邦其勤不亦至乎此邦之人纍公之化惟所令之不亦順乎上勤下順遂濟登兹不亦休乎昔者人謂斯何今者人謂斯何雖然斯堂之作意其有謂而喑無詩歌是不考引公徳而接邦人於道也乃使來請其詩曰帝奠九壥有葉有年有荒不條河岱之間及我憲考一収正之視邦選侯以公來尸公來尸之人始未信公不飲食以訓以徇孰飢無食孰呻孰歎孰寃不問不得分願孰為邦蠡節根之螟羊很狼貪以口覆城吹之喣之摩手拊之􅀈之石之膊而磔之凡公四封既富以强謂公吾父孰違公令可以師征不寧守邦公作谿堂播播流水淺有蒲蓮深有蒹葦公以賔燕其鼓駭駭公燕谿堂賔校醉飽流有跳魚岸有集鳥既歌以舞其鼓考考公在谿堂公御琴瑟公暨賔賛稽經諏律施用不差人用不屈谿有薲苽有龜有魚公在中流右詩左書無我斁遺此邦是庥漢隄詩盧肇隂沴姦陽來暴於襄洎入大郛波端若鋩觸厚摧髙不知其防駭潰顛委萬室皆毁竈登蛟鼉堂集鱣鮪惟恩若讎母不能子洪潰既涸閈閎其虛以隳我堵以剝我廬酸傷顧望若踐丘墟帝曰念嗟朕日南顧流災降慝天曷台怒滔滔襄郊捽我嬰孺於惟餘甿飢傷喘呼斯為淫痍孰往膏傳惟汝元寮僉舉明哲我公用諧苴茅杖節來視襄人噢咻提挈不日不月咍乎抃恱乃泳故隄䧟於沙泥缺落坳圯由東訖西公曰嗚呼漢之有隄實命襄人不力乃力則及乃身具鍤與畚漢隄其新帝廩有粟帝府有緡爾成爾隄必錫爾勤襄人怡怡聽命襄滸背囊肩杵奔走蹈舞分之卒伍令以麾鼓尋尺既度日月可數登登嶪嶪周旋上下披峴斵楚飛石輓土舉築殷雷駭汗霏雨疲癃鰥獨奮有筋膂呀吁來助提筐負筥不勞其勞雜沓笑語咸曰盧公來賜我生斯隄既成蜿蜿而平確爾山固屹如雲横漢流雖狂堅不可蝕代千年億與天無極惟公之隄昔在人心既築既成横之於南萌渚不峻此門不深今復在兹於漢之隂斯隄已崇兹民獲祐齯童相慶室以完富貽於襄人願保厥夀繄公之功赫焉如晝捍此巨災碎若京阜天子賜之百姓載之族孫作詩昭示厥後河之水二章韓愈河之水去悠悠我不如水東流我有孤姪在海陬三年不見兮使我生憂日復日夜復夜三年不見汝使我鬢髪未老而先化河之水悠悠去我不如水東注我有孤姪在海浦三年不見兮使我心苦采蕨于山緡魚于泉我徂京師不其還唐文粹巻十一欽定四庫全書唐丈粹巻十二宋姚鉉編
