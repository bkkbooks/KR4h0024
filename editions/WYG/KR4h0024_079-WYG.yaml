  text: 七十九
  hash: sha256:5c5fd9aa65ad550171b52444e54e5170c2882f9e157993bdfea3e7df6b5b7794
body:
  text: 宋姚鉉編書一總八首論政上姚令公書張九齡荅張九齡書姚元崇謝杜相公論房杜二相書栁冕上宰相書陸長源賀崔相國書權徳輿論事於宰相書李翺上崔相公書劉軻再上崔相公書上姚令公書張九齡年月日左拾遺張九齡奏記紫㣲令梁公閣下公登廟堂運天下者久之矣人之情偽事之得失所更多矣非曲學之説小子之慮所能損益亦已明矣然而意有不盡未可息區區之懐或以見容亦猶用九九之術以此道也忍棄之乎今君侯秉天下之鈞為聖朝之佐大見信用渴目太平千載一時胡可遇也而君侯既遇非常之主已踐難得之機加以明若鏡中運如掌上有形必察無往不臻朝暮羲軒之時何云伊吕而已際㑹易失功業垂成而舉朝之衆傾心前弊未盡往往擬議愚用惜焉何者任人當才為政大體與之共理無出此途而果乏用才非無知人之鑒其所以失溺在縁情之舉夫見勢則附俗人之所能也與不妄受志士之所難也君侯察其茍附及不輕受就而厚之因而用之則禽息之首為知己而必碎豫讓之身感國士而能漆至於合如市道亷公之門客虚盈勢比雀羅廷尉之交情貴賤初則許之以死殉體面俱柔終乃背之而飽飛身名已遂小人恒態不可不察自君侯職相國之重持用人之權而淺中弱植之徒已延頸企踵而至諂親戚以求譽媚賔客以取容情結笑言談生羽翼萬事至廣千變難知其間豈不有才所失在於無恥君侯或棄其所短收其所長人且不知深㫖之若斯便謂盡私於此輩其有議者則曰不識宰相無以得遷不因交逰無以求售明主在上君侯為相安得此言由出其口所以為君侯至惜且人可誠感難可户説為君侯之計謝媒介之徒即雖有所長一皆阻抑專謀選衆之舉息彼訕上之失禍生有胎亦不可忽嗚呼古人有言禦寒莫若重裘止謗莫如自修修之至極何謗不息勿曰無害其禍将大夫長才廣度珠潜璧匿無先容以求達雖後時而自安今豈無之何近何逺但問於其類人焉廋哉雖不識之有何不可是知女不私人可以為婦矣士不茍進可以為臣矣此君侯之度内耳安用小人之説為固知山藏海納言之無咎下情上通氣用和洽是以不敢黙而已巳也願無以人故而廢其言以傷君侯之明此至願也幸甚幸甚荅張九齡書姚元崇忽辱牋翰喜慰攸集退惟自省慙懼亦深實智力之所不逮也宜朝廷之所見責也僕本凡近之材素非經濟之具叨承過聽謬膺朝委自少及長從㣲至著惟以直道為業匪以曲路期通歴官三朝年逾一紀凡所稱薦罕避嫌疑實有祁奚之舉非無許允之對則天之世已被流言行之有恒久而自辯近䝉奨擢倍勵駑庸毎以推賢進士為務欲使公卿大夫稱職豈楊橋之或用及解狐之可為而悠悠之徒未足矜察嗷嗷之口欲以中傷上恃天聰俯仗神道既不得奉身而退但知信心而前然顧無隠慝亦死為明矣猥惟不敏敬承厥休特當座銘永為身寳元崇頓首謝杜相公論房杜二相書栁冕冕再拜上書相公閣下昨得蒋起居書伏承相公以冕論房杜二相書幷荅江西刑政論共四本以付史館冕惕然自失懼辱相公之厚意遂取舊本刪改數處愧無運斤之妙徒有傷手之責謹隨状獻上退而自慙去年又續奉相公手疏以國家承文弊之後房杜為相不能反之於質誠如髙論又以文章承徐庾之弊不能反之於古愚以為不然故追而論之以獻左右且今之文章與古之文章立意異矣何則古之作者因治亂而感哀樂因哀樂而為詠歌因詠歌而成比興故大雅作則王道盛矣小雅作則王道缺矣雅變風則王道衰矣詩不作則王澤竭矣至於屈宋哀而以思流而不反皆亡國之音也至於西漢揚馬已降置其盛明之代而習亡國之音所失豈不大哉然而武帝聞子虚之賦歎曰嗟乎朕不得與此人同時故武帝好神仙相如為大人賦以諷上讀之飄飄然反有凌雲之志子雲非之曰諷則諷矣吾恐不免於勸也子雲知之不能行之於是風雅之文變為形似比興之體變為飛動禮義之情變為物色詩之六義盡矣何則屈宋唱之兩漢扇之魏晉江左隨波而不反矣故蕭曹雖賢不能變淫麗之體二荀雖盛不能變聲色之詞房杜雖明不能變齊梁之弊是則風俗好尚繫在時王不在人臣明矣故文章之道不根教化别是一技耳當時君子恥為文人語曰徳成而上藝成而下文章技藝之流也故夫子末之是以四楊荀陳以徳行經術名震海内門生受業皆一時英俊而文章之士不得行束脩之禮非夫兩漢近古由有三代之風乎惜也繫士風而不本于王化至若荀孟賈生明先王之道盡天人之際意不在文而文自隨之此真君子之文也然荀孟之學困於儒墨賈生之才廢於絳灌道可以濟天下而莫能行之文可以變風雅而不能振之是天下皆惑不可以一人正之今風俗移人久矣文雅不振甚矣茍以此罪之即蕭曹輩皆罪人也豈獨房杜乎相公如變其文即先變其俗文章風俗其弊一也變之之術在􅙗其心使人日用而不自知也伏惟尊經術卑文士經術尊則教化美教化美則文章盛文章盛則王道興此二者在聖君行之而已冕再拜上宰相書陸長源月日太中大夫守汝州刺史兼御史中丞本州防禦使陸長源謹奉書相公閤下相公以命世之略應佐時之器發文苑之鴻猷繼台庭之盛業聖上傾心以待相公之啓沃天下側耳以待相公之政理豈得與房杜異日而不與蘇宋同年哉某比在朝廷接君子之步武聽哲人之語言區區之誠願盡於此今上聰明英武自漢魏已來賢君哲后未有如今上者自臨極已來宰相未有如房杜蘇宋者何偶聖之有期而得賢之無路蓋有此也夫誡人之失亦由端其躬而後求影之直故宰相者導生人之本稽政化之源正辭以固之平氣以待之物有其官官得其人則提綱而網目張振領而毛裘舉至如移制度評軍國事闗社稷者斯在宸衷猶望宰相自古況今獻可替否其餘朝廷之常典羣司之闕務弛張由於下筆指顧在於一言使政歸常典理革前弊和氣浹於下清風穆於上自然宰輔之事行弼諧之義暢何必捨其易而攻其難犯龍鱗之不測蹈虎尾而莫顧哉其宰相之寄也在於用賢賢不濫而人自理次於秉政政不撓而國自安用賢者除改是也秉政者賞罰是也其用賢也絶黨與捨憎嫌使韋弦各施輪轅適用頃者之用人也聲利以撓其心愛惡而昏其識以枉為直破觚為圎除改出於門庭賞罰隨其情欲求道行事舉其可得乎且尚書六司天下之理本兵部無戎帳户部無版圗虞水不管山川金倉不司錢榖光祿不供酒衛尉不供幕秘書不校勘著作不修撰官曹虚設祿俸枉請計考者假而為資養聲者藉而為地一隅如是諸司悉然欲求網目張裘毛舉其可得乎此宰相之職也且棟傾者正之則屋無壓焉之懼疾甚者攻之則人無祲沴之患正傾在於良匠攻疾在於良醫故政化失諫臣得抗䟽以論之敗累興憲官得持法而繩之諌臣須謇謇匪躬之士憲官須孜孜嫉惡之人今悉求温潤美秀沈黙𢎞寛者為之蓋北轅適楚圎鑿方枘欲求扶傾愈疾其可得乎貞元初兵戈初解蝗旱為災邑多逃亡人士殍餒至使官厨有闕國用增艱王制曰國無九年之蓄曰不足無六年之蓄曰急無三年之蓄曰國非其國也三年耕必有一年之食九年耕必有三年之食以三十年之通雖有凶旱水溢民無菜色然後天子之食日舉以樂今歲豐年稔榖賤傷農誠宜出價以歛糴實太倉之儲豈可慢易於豐賤之日危急於凶荒之際比年國家和糴殆不得人文帳空存倉廩不實是由賞罰之典曠姦濫之吏來此亦宰相擇人之過也其之州户口減一萬兵數無二千夏率供秋秋率供夏儻四氣或爽一歲無年實恐投姦有虞為累非淺況率土州縣其事略同古人云旱則資舟雖在豐稔之時須為凶險之備此亦宰相之職也蝗旱之時聖上憂畿縣彫瘵親擇臺省十人出為畿令其後京畿稍理皆擢以大郡則聖上旌賢賞功之意也頃來度支勑符皆云刺史縣令以户口減殿一人賦歛增最一人與者騫騰於廊廟嫌者沈淪於草莽欲求其為惡者懼為善者勸其可得乎此宰相之職也況今北虜和親縻費轉甚西戎作梗邊鄙未安所望求方邵之才選廿傅之将聫營朔裔復河外之城振旅湟中收隴右之地且田單匹夫也敗樂毅乗勝之師謝艾書生也破麻秋勁鋭之卒豈有其時而無其人哉在用與不用耳此亦宰相之職也太宗得房杜貞觀之政成𤣥宗得蘇宋開元之業泰今相公居廟堂之上當台衮之任與房杜蘇宋列於青史寜肯昵親愛行肺腑踵覆車之轍哉某齒髪向衰志力猶在遇賢相逢明時亦願一豁平生少展㣲分不然者老於泉石亦求仁而得仁某再拜賀崔相國書權徳輿伏惟大方全徳自中發外蘊為志氣播為事業然則阜庶生物操持化權結於衆心為日固久且大賢之出處天下之否泰也故詔下之日人人相應又早歲獲覩皇極綜論𤣥徳志孤雲賦凄風詩伏讀累日備見精慮之所至言理亂者多推世運於必然殊不知弛張變化存乎其人而已自古哲賢之徒或志尚不展鬱堙當世長歎痛哭於是乎作伏惟以常所感槩申於盛明使三辰光潤萬方軌道實在指顧豈逃彀中且以西漢公輔言之蕭曹以清静熙帝載良平以謨明賛王業至宣帝時則魏相通故事邴吉知大體斯皆章章可言者也洎夫張蒼之律厯孫𢎞之文章韋賢之好學平當之有恥然亦號為賢相抑又次焉至若匡張孔馬服儒衣冠被阿諛之譏不勝其任最下則陶青劉舍莊翟趙周之徒皆齪齪備位故身名偕泯夫此數子者豈不粗知君臣之道古今之變哉病於無所發明保持祿位而已有時無功可不謂大哀乎又古人有立徳立功立言之訓顧惟多幸獲覽炳然之文又備承餘論有以見大君子遣辭發慮𢎞裕溥博者矣惟徳與功實在今日洒天下之耳目復萬物於全性在丈人踐而行之守而終之而已不宣某再拜論事於宰相書李翺凡居上位之人皆勇於進而懦於退但見已道之行不見已道之塞日度一日以至於黜退奄至而終不能先自為謀者前後皆是也閤下居位三年矣其所合於人情者不少其所乖於物議者亦已多矣姦邪登用而不知知而不能去栁泌為刺史䟽而不止韓潮州直諌貶責諍而不得道路之人咸曰焉用彼相矣閤下尚自恕以為猶可以輔政太平雖枉尺猶能直尋較吾所得者不啻補其所失何足遽自為去就也切怪閤下能容忍亦已甚矣昨日來髙枕不寐靜為閤下思之豈有宰相上三䟽而止一邪人而終不信閤下天資畏慎又不能顯辯其事忍恥署勅内愧私歎又將自恕曰吾道尚行吾言尚信我果為賢相矣我若引退則誰能輔太平邪是又不可之甚也當貞觀之初房杜為相以為非房杜則不可也開元之初姚宋為相以為非姚宋則不可也房杜姚宋之不為相亦以久矣中書未嘗無宰相然則果何必於房杜姚宋況道不行雖臯陶伊尹将何為也房杜姚宋誠賢也若道不行言不信其心所為賢者終不敢不進其心所為邪者終不敢不薦而許敬宗李義府同列用事言信道行又自度智力必不足以排之矣則将自引而止乎将坐而待黜退乎尚自恕茍安於位乎以閤下之明度之當可知矣凡慮已事則不明斷他人事則明已私而他人公勇易斷也承閤下厚知受奨擢者不少能受閤下徳而獻盡言者未必多人幸䝉以國士見目十五年餘矣但欲自竭其分耳聽與怪在閤下裁之而已上崔相公書劉軻當今帝堯在上䕫龍為相犬戎新逐三晉四戰之地無梟鶵狼子是宜徼福者爭歸賀於相國某獨不敢以是心同衆人之唯唯思有以一跪吐而未果者誠以相門尊髙非布衣可以私謁其或闗衡石輕重非先書導誠素則無以為也然而潜是心不為身有所祈輸誠於相公得不以常常之心憐其持意邪陸生有言曰天下安注意相今屬兇孽新夷泰階初平天下之懸懸其心復魏文貞房梁公姚梁公宋開府致太宗𤣥宗故事若啼嬰兒待哺塞是望者獨相公是以聞相公以是為心即房宋不死二宗之道盡得施於上矣語不云乎雖有鎡基不如乗時自用武以来至於今日不謂無時得其時而不乗之以貞觀開元治平之勢則勢之過如發矢耳此所以為相公惜是時之難再也且天下欲上如二宗待相公而肖之耳今相公豈不待天下之士而坐為房宋者也又非有其時無其人人與時偕有矣豈可厚誣多士謂無一可與言房宋故事者邪昔宓不齊邑不方百里師五老而友二十八人齊桓公為諸侯盟主有坐友三人諌臣五人舉過者三十人周公相成王躬吐握之勞所執贄於窮閭隘巷者七十人彼一聖二賢挈下戴上非獨責成其心而天下之人故至于今稱為聖賢況當相公首築太平之基焉知夫有心者不磨勇養氣待相公呼而出之耳今云云論者見犬戎退邊不數十里便謂邊無可虞虜無能為見趙魏之地死一帥易一将便謂天下無事廟堂可以髙枕此豈知相公第欲因前之無事不欲為巍巍蕩蕩之績乎抑其聞宰相之事必以天下為言以衡石言之豈不資天下錙銖輕重為平凖者邪以鼎實言之豈不資天下水陸飛走為滋味者邪若軻者雖有生之㣲豈不資衡鼎之一物乎伏念自知書来恥不為章句小説桎梏聲病之學敢希趾遐蹤切慕左邱明揚子雲司馬子長班孟堅之為書故北居廬山亦常有述作幸當相公調元厚生之次不使一物不遂其性一夫不獲其心是宜天下褐衣之徒孤立藝進之秋也謹獻所嘗著隋監一巻右史十巻伏希樞務之暇賜一覽讀恩幸恩幸軻恐懼再拜再上崔相公書劉軻謹再拜相公閤下先獻書三日軻将出通化門其心遲遲然若虚其腹如未猒其食者且曰今嗣聖重光相公登庸天下裹誠蓄志之士将不逺千里願獻計於相府者固多矣適㑹其時得觀光輦下云欲出東門歸江湖業為儒生閲天下利病茍無一詞聞天下善否将何以見江漢之士故退於逆旅思有以效誠於相公者伏念挈缾負薪之言古人不遺相公其遺邪某自惟輟耕窮書或得侍坐於搢紳長者洎屬文駕説之士毎議及國朝相府間事言貞觀則房魏言開元則姚宋自貞觀數十歲至開元中間豈無房魏之相邪自開元數十歲至于今中間豈無姚宋之相邪何説者局於四而不至於五六邪豈無繼之者力不足而追不及邪将力足追及而曰非大有為之時而不能為之者邪某嘗試言之矣夫北轅適楚南轅適晉是不可到日暮途逺是豈力不足進不及邪不繇其道故也然則非説者不屈指五六而局於四也古天子以天下事歸於相府相府以天下事為己任故伊尹自負以天下之重周公亦潜心在於伊尹耳故曰周公兼三王以施四事夫周公之潜心於伊尹而不愧乎伊尹獨伊尹恥其君不及堯舜故其心愧恥夫其存心直下千歲無人嗣續惟梁公鄭公髙視千載之上始潜心於伊尹且亦惟恐太宗不及堯舜故徳諡以經緯天地曰宗為不祧之廟至姚公宋公又潜心於房魏亦惟恐𤣥宗不及太宗故致時雍復貞觀治平之風焉某請梗槩姚宋舊事而言之諸説以姚之為相也先有司罷冗職修舊法百官各盡其才又奏請無赦宥無數遷吏無任功臣以政於是上責成於下下權歸於上上下交而天下泰矣故曰姚善應變所以成天下之務宋之為相也以彌綸為己任亦以筆硯專隨故曰宋善守文所以持天下之正繇是四十年間威振四海教加百姓政歸有司綺繻羅紈之家請謁不行而戚里束手矣故生於開元天寳之間自幼迨强仕女有家男有室耳不聞鉦鼔目不識兵革故𤣥宗無為恭事𤣥黙而已矣今上新嗣大位相公新揭大柄必欲盡天下善美以調和鼎味冀所以沃天心而福衆庶也某知相公固亦潜心於姚宋亦恐聖君不及𤣥宗焉夫姚宋潜心於房魏而已無愧於房魏今相公已潜心於姚宋詎得有愧於姚宋邪天惟無愧實在應變成務守文持正踐其跡必至其所至俾後人之談者自四公而加相國焉相公必以是為心某知相公未得髙枕於廟堂之上者有四矣孔子曰不患寡而患不均今縁邊八鎮之士聞六軍之人坐以受賜莫不開口以待哺将欲賈餘勇以壮邊勢惟恐不厚於六軍之賜矣此亦賞過乎功者不得不搖心也非所謂至賞不費賞明而敎行者也某切謂相公未得髙枕於廟堂之上一也聖上自儲副即祚蓋三代不刋之事雖巷兒街童知其必然彼貪天之功者以為房閭永巷北宫貞伯子之能事必隂教是謀出一時之策畫寵以懐黄垂組不謂無恩矣脱或天光獨私恩無與對使權量天下輕重以專備顧問雖賢如史游納忠勤心恐必漸𢎞恭之勢矣古之賢聖遏禍於未芽芽而滋之根著而不可㧞矣某謂相公未得髙枕於廟堂之上二也昔西京初留侯譏髙祖表用蕭曹故人東漢初鄧禹戒光武以功臣專任貞觀初太宗自秦府登極有上封事者請以秦府舊兵追入宿衛太宗曰朕方以天下為家惟才行是取何新舊為夫以一家國為言誰能無私必以天下為言孰非王人而以家國之私於天下也范曄云舉徳則功不必厚奉勞則人或匪賢必處非其地非所以優貸而見惜其功也故姚宋所以無任功臣以政其在兹乎以是門開一與長閉此某切謂相公未得髙枕於廟堂之上三也日者有自邊兵来曰凡事閱於日而可寘於口非鑿空架虚事游談者也且國家所以禦戎狄為邊垣者朔方為大夫朔方去戎虜不數百里而近使胡塵不至於亭障者實以邠涇之鎮虜不敢東顧自燕盗已来惟朔方多軍功内以遏不軌外以拓胡虜故朔方之於朝廷雖手足之扞頭目不足過也比者姦囘秉政司計者析秋毫以刻肌骨非紅粟腐帛不及於邊兵無櫬甲之服以赤肉冒流矢者駢門皆是統率者雖章連十上帝閽九重留中莫聞至有抽刃垂頸祝觴禱死貴為節制猶無憀若是矧責由卒𨽻尚安能固其生與戎狄攻鬬邪今釣怨者既逐新恩已大洽相公必深惟前弊思有以矯之之術以廟筭决勝授成䇿於邊将者古人以天下諭一身以四邊同支體以中國視心腹支體有疾心腹安得無憂乎善言邊兵者以河隴不如燕薊燕薊不如朔方朔方軍之地連險小雜虜俗習騎射繫軍者非其父兄則其子弟故所以無對於諸軍矣今之存者皆諸軍遷徙或叛孽殘冦之餘逺鄉里别妻子執戈卧甲坐不遑暖胡塵一起連頭應召必無美利以啗其欲必無爵賞以磨其勇以之防塞可謂連雞矣此某謂相公未得髙枕於廟堂之上四也古之相天下者獨勞一身役一心範天地而俾無遺事於天下也蓋存乎任使而已矣傳曰使智者慮義者行仁者守又曰使智者佐仁者此舜所以穆四門而貞元首者也某所以首多士之伍進希相公必首而納之然後開平津之閤待白屋之士且問曰計安在知致理致君之策駢肩出於門下矣若然者吾君不愧於二宗相公不愧於四公何有力足以追而曰非其時而不為之者邪此小生汲汲於私心誠在乎此切欲使後之秉史筆者直書蕭相國故事亦以無愧辭於史官焉某不勝區區之志唐突尊重伏惟矜其意而宥其罪某恐懼再拜唐文粹巻七十九欽定四庫全書唐文粹巻八十宋姚鉉編書啓二緫一十首
