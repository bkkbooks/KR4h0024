body:
  text: 吳興姚鉉纂古賦丁揔五首符寶一受命寶賦梁肅象緯一渾天賦楊炯閱武二大獵賦李白斐將軍舞劒賦喬覃誓師一濟河焚舟賦高邁受命寶賦并序梁肅受命寶在昔曰傳國璽自秦始皇有焉蓋取夫一世二世傳於無窮故有傳國之號歷兩漢至于陳隋隋焬帝之遇禍也宇文化及盜之而西竇建德滅化及取焉易稱物不可以終否武德中太宗一戎衣而天下大定是器也與璽同歸國家用之以受命所承更名大寶而多歷年所自前代觀之受天明命則不求而得􅆫賊劫遷則得之而失蓋神物之所在非徒然也抑又聞之鼎之輕重與璽之去留莫不視德之上下位之安危若恃寶命在已而慆心堙耳漸至危殆以􅀒扆之尊􅀍竊鈇之言當此時也此片玉耳復何爲哉竊讀史氏感興亡之器忿徼覬之􅀋於是作受命寶賦若形制之小大厚薄則未始詳也故不備焉其辭曰物之貴􅀆惟玉之英翕二氣以成形涵百寶之純精卞氏得之獻而後明當秦趙之抗衡挺高價於連城伊玩好之所資微神器之鴻名及夫秦始稱皇削平六王爲龍爲光追􅅣其章其文曰受命于天旣壽永昌其始也謂世有哲王傳國寶之無疆何逆天以􅁀物不及期以降殃惟隂騭之運行終有授而不常隨素車之白馬歸赤精於路傍逮夫漢業中微后族專命禄去公室世移威柄實沙麓之遺瘵成巨君之􅆲害雖擲地以慷􅁣終莫救夫顚沛俄漸臺之傾移歷更始與赤眉咸庸懦而不居卒亂長而禍滋洎四七之龍驤爲火主以得之遂祀漢以配天延二百之炎輝茍非其人寶命不歸悼􅁊靈之不嗣置天下於阽危旣而赤伏道喪黃星兆發雲雷遘迍朝社播越去乗輿而漂蕩入眢井以蕪没披草萊以拯之寔功存乎武烈何典午之傾潰劉石盜以自尊旣江表之卜年遂歸明以去昏五世推移或亡或存失由道䘮隋之并吞始􅀒險以爭雄俄銜璧而來奔惟大業之離阻由君昏而黷武犲狼呀以當路郊廟毀而失主望夷之釁旣發斯器淪於醜虜昊天有命眷我高祖騫飛汾晉震疊􅀜輔雲行雨施雷動飈舉聖人旣作萬物斯覩于時也充德扇結東周卼臲帝謂文皇陳師往伐如火烈烈如風發發牛口先撥虎牢則達致四海於升平混車書以同轍惟神器之有在終告歸于魏闕考乎先王之統世也以文經天以武緯地觀象備物從冝制器播而用之爲天下利故曰大德曰生大寶曰位位之升降惟道所至先王審其所以故爲大於細爲難於易然後本不揺而末不墜安危之體鑒此而巳若夫符命之所加曆數之所歸莫不天人合發區宇樂推休祥煥然靈命顯思是以有守有失動而恱隨茍貪功而􅆫禮莫不速禍而召危此玉也公路執持衆叛而親離趙高引佩殿壞而身糜惟前􅁤之昭昭孰可幸捷以取之荅曰吾皇有命如天有日傳寶在我昏庸自佚則陸渾無問鼎之事歷代無奉璽之術茍思慮於廢興朝不旣而患失於戲天發禍機聖人定之天生神物聖人用之康哉皇哉大人造之子孫百代永言保之渾天賦并序楊烱顯慶五年烱時年十一待制弘文館上元三年始以應制舉􅀘校書郎朝夕靈臺之下備見銅渾之象㝷返􅀄服卧病丘園二十年而從宦斯亦拙之效也代之言天體者未知渾蓋孰是代之言天命者以爲禍福由人故作渾天賦以辨之其辭曰有爲宣夜之學者喟然而言曰旁望萬里之黃山而皆青翠俯察千仞之深谷而皆黟黒蒼蒼在上非其正色逺而望之無所至極日月載於元氣所以或中而或􅉴星辰浮於大空所以有行而有息故知天常安而不動地極深而不測可以爲觀象之準繩可以作談天之楷式有稱周髀之術者囅然而􅀏曰陽動而隂靜天㢠而地游天如􅀝蓋地若浮舟出於夘入於酉而生晝夜交於奎合於角而有春秋天則西北旣傾而三光北轉地則東南不足而萬穴東流比於圎首前臨胷者後不能覆背方於執炬南稱明者北可以言幽此天與而不取惡煌煌而更求太史公有晬其容乃盱衡而告曰楚旣失之齊亦未爲得也言宣夜者星辰不可以闊狹有常言蓋天者漏刻不可以春秋各半周三徑一逺近乖於辰極東井南箕曲直殊於河漢明入於地葛稚川所以有辭候應於天􅁊君山由其發難假蘇秦之不死旣莫知其爲說儻隸首之重生亦不能成其筭也二客甞聞渾天之事歟請爲左右揚攉而陳之原夫杳杳冥冥天地之精混混沌沌隂陽之本何太虚之無礙偉造化之多端南溟玉室之宫爰皇是宅西極金臺之鎮上帝攸安地則方如棊局天則圎如彈丸天之運也一北而物生一南而物死地之平也影長而多暑影短而多寒太隂當日之衝也成其薄蝕衆星傳月之光也因其波瀾乾坤闔闢天地成矣動靜有常隂陽行矣方以􅀋聚物以羣分吉凶生矣在天成象在地成形變化見矣部之以三門張之以八紀其周天也三百六十五度其去地也九萬一千餘里日居而月諸天行而地止載之以氣乗之以水生之育之長之畜之亭之毒之蓋之覆之天聦明也聖人得之天垂象也聖人則之其道也不言而信其神也不怒而威驗之以衡軸考之以樞機三十五官有羣生之繫命一十二次當下土之封畿中衡外衡毎不召而自至黃道赤道亦殊塗而同歸表裏見伏聖人於是乎發揮分至啓閉聖人於是乎範圍可以窮理而盡性可以極深而研幾天有北斗杓擕龍角魁枕參首天有北辰衆星環拱大帝威神尊之以耀魄配之以勾陳有四輔之上相有三公之近臣華蓋巖巖俯臨於帝座離宫弈弈旁絶於天津列長垣之百堵啓閶闔之重闉文昌拜於大將大理囚於貴人太階乎而君臣穆招遥指而天下春東宫則析木之津壽星之野箕爲傲客房爲駟馬天王對於攝提皇極臨於宦者左角右角兩耀之所巡行隂間陽間五星之所次舎後宫掌於燕息太子承於家社宗人宗正内外惇叙於􅀖家市樓市垣貨殖畢陳於天下北宫則靈􅀛潛匿螣蛇伏藏􅉚􅀲宛然而獨處織女終朝而七襄登漸臺而顧歩御輦道而倘佯聞雷霆之隱隱聽枹鼓之硠硠南斗主爵禄東璧主文章須女主布幣牽牛主􅀜梁羽林之軍所以除􅁀亂壘壁之陣所以備非常西宮則天潢咸池五車三柱奎爲封豕參爲白虎胃爲天倉婁爲衆聚髦頭之北宰割其胡虜天畢之隂蓄􅂥其雷􅀨大陵積尸之肅殺參旗九斿之部伍樵蘇之地岀入於苑園萬億之資塡積於倉􅁃南宫則黃龍賦象朱鳥成形五帝之座三光之庭傷成於􅃏誅成於鑕禍成於井德成於衡執法者廷尉之列大臣之象少微者儲君之位處士之星天狐直而狼顧軍市曉而雞鳴三川之交鶉火通其耀七澤之國翼軫寓其精南河北河象闕於是乎増峻左轄右轄邊荒於是乎自寧乃有金之散氣水之精液法渭水之橫橋像昆池之刻石歲時占其水旱滄溟應其朝夕織婦之室漢家之使可㝷飲牛之津海上之人易覿日也者衆陽之長人君之尊天雞曉唱靈烏晝踆扶桑臨於大海若木照於崑崙太平太象所以司其出入南至北至所以節其寒温龍山銜燭不能議其光景夸父棄䇿無以方其駿奔月也者羣隂之紀上天之使異姓之王后妃之事方諸對而明水浹重暈市而邊風駛纔盈蚌蛤則虜􅀐先侵適􅃲麒麟則暗虎潛值五星者木爲重華火爲熒惑鎭居戊巳斯爲土德太白主西辰星主北俯察人事仰觀天則比參右肩之黃如奎大星之黑五材所以致用七政於焉不忒同舎而有四方分天而利中國赤角犯我城黃角天之爭五星同色天下偃兵趨前舎爲盈退後舎爲縮盈則侯王不寧縮則軍旅不復或向而或背或遲而或速金火犯之而甚憂歳鎭居之而有福觀衆星之部署歷七耀而驅馳定天下之文所以通其變見天下之􅄨所以象其冝然後播之以風􅀨威之以霜霰或吐霧而蒸雲或擊雷而鞭電一旬而太平感膚寸而天下徧白日爲之晝昏􅁪星爲之不見爾乃重明合璧五緯連珠青氣夜朗黃雲旦扶握天鏡受河圖若曰賜之以福此明王聖帝之休符至如怪雲祅氛冬雷夏雪日暉長虹星流伏鼈隂有餘而地動陽不足而天裂若曰懼之以災此昏主亂君之妖蠥昔者顓頊之命重􅀺司天而司地陶唐之分仲叔宅西而宅東其後宋有子韋鄭有禆竈魏有石氏齊有甘公唐都之推星王朔之􅃸氣周文之視日吳範之占風有以見天地之情狀識隂陽之變通詩云謂天蓋高語云惟天爲大至高而無上至大而無外四時行焉萬物生焉羣臣莫尊於上帝法象莫大於皇天靈心不測神理難筌日何爲􅀆右轉天何爲􅀆左旋盤古何神􅀆立天地巨靈何聖􅀆造山川螟何細􅀆師曠清耳而不聞離朱拭目而無見鵬何壯􅀆􅅮扶揺而翔九萬運海水而擊三千􅀛與蛇􅀆異其短長之質椿與􅌲􅀆殊其大小之年鐘何鳴􅀆應霜氣劒何伏􅀆動星􅄤列子何方􅀆御風而有侍師門何術􅀆驗火而登仙魯陽揮戈􅀆轉於西日陶侃折翼􅀆登乎上玄女何􅁈􅀆化精衛帝何恥􅀆爲杜䳌爭疆理者有零陵之石聞弦歌者有蓋山之泉若怪神之不語夫何述於此篇以天乙之武也焦土而爛石以唐堯之德也襄陵而懷山以顔回之賢也貧居於陋巷以孔丘之聖也情希乎執鞭馮唐入於郎署也兩君而未識楊雄在於天禄也三代而不遷􅁊譚思周於圖䜟也忽焉不樂張衡術窮於夫地也退而歸田我無爲而人自化吾不知其所以然大獵賦并序李白臣以爲賦者古詩之流辭欲壯麗義歸博逺不然何以光讃盛美感天動神而相如子雲競誇辭賦歷代以爲文雄莫敢詆訐臣謂語其大略竊或􅄶其用心子虚所言楚國不過千里夢澤居其太半而齊徒吞若八九三農及禽獸無息肩之地非諸侯禁􅁋述職之義也上林云左蒼梧右西極考其實地周袤纔經數百長楊夸胡設網爲周阹放麋鹿其中以􅅮攫充樂羽獵於靈臺之囿圍經百里而開殿門當時以爲窮壯極麗逮今觀之何齷齪之甚也但王者以四海爲家萬姓爲子則天下之山林禽獸豈與衆庶異之而臣以爲不能以大道匡君示物周博平文論􅁐囿之小竊爲微臣之不取也今聖朝園池遐荒殫窮六合以孟冬十月大獵於秦亦將耀威講武掃天蕩野豈􅁋荒侈靡非三驅之意邪臣白作頌折􅂨厥美其辭曰粤若皇唐之契天地而襲氣母􅀆粲五葉之葳㽔惟開元廓海㝢而運斗極􅀆揔六聖之光熈誕金德之淳精􅀆漱玉露之華滋文章森乎七曜􅀆制作參乎兩儀括衆妙而爲師明無幽而不燭􅀆澤胡逺而不施慕往昔之三驅兮順生殺於四時若乃嚴冬慘切寒氣􅏮洌不周來風玄冥掌雪木脫葉草解節土囊煙隂火井冰閉是月也天子處乎玄堂之中飡八水􅀆休百工考王制􅀆遵國風樂農人之閑􅂩􅀆因校獵而講戎乃使神兵出於九闕天仗羅於四野徴水衡與林虞辨土物之衆寡千􅀐飈掃萬乗雷奔梢扶桑而拂火雲􅀆刮月窟而搜塞門赫壯觀於今古嶪揺蕩於乾坤此其大略也而内以中華爲天心外以窮髮爲海口豁咽喉以洞開吞荒裔以盡取大章按歩以來往夸父振䇿而奔走足跡乎日月之所通囊括乎隂陽之所有君王於是撞鴻鐘發鑾音岀鳳闕開宸􅁭駕玉輅之飛龍歷神州之層岑遊五柞􅀆瞰三危挾細栁􅀆過上林櫕高牙以緫緫􅀆駐華蓋之森森於是擢􅀝天之劒彎落月之弓崑崙叱􅀆可倒宇宙噫􅀆増雄河漢爲之卻流川嶽爲之生風羽旄揚􅀆九天絳獵火烻􅀆千山紅乃召􅃖尤之徒叢長㦸羅廣澤呵雨師走風伯稜威耀乎雷霆烜爀振於蠻貊陋梁鄒之體制鄙靈囿之規格而南以衡霍作􅁭北以代􅁪作祛夾東海而爲塹􅀆拖西溟而流渠麾九州之珍禽􅀆廻千羣以坌入聮八荒之竒獸􅀆屯萬族而來居雲羅高張天網密布罝罘緜原峭格掩路蠛蠓過而猶礙蟭螟飛而不度彼層霄與翳榛罕翔鳥與伏兎促營合技彌巒􅀍岡金戈森行洗晴野之寒霜虹旗電掣卷長空之飛雪吳驂走練宛馬蹀血縈衆山之聮緜隔逺水之明滅使五丁摧鋒一夫抜木下塹高頽深平險谷擺椿栝開林叢喤喤呷呷盡奔突於場中而田強古治之儔烏獲中黃之黨越崢嶸獵莽蒼喑呼哮􅗏風旋電往脫文豹之皮抵玄熊之掌批狻手猱挾三挈兩旣徒搏以角力又揮鋒而爭先行甝號以鶚晲􅀆氣赫火而歊烟拳封猯肘巨狿梟羊應叱以鼈踣䝟貐亡精而墮巓或碎腦以析脊或歕髓而飛涎窮遐荒蕩淵藪扼土伯殪天狗脫角犀頂抜牙象口掃封狐於千里捩雄虺之九首咋騰蛇而仰吞拖奔兕而卻走君王於是峩通天靡星旃奔雷車揮電鞭觀壯士之效獲顧三軍而欣然曰夫何神讋􅀑慄之駭人也又命建􅇪鼔勵武卒雖躪轢之巳多猶拗怒而未歇集赤羽􅀆照日張烏號􅀆滿月戎車轞轞以陸離彀􅀐煌煌而􅁬發鷹犬之所騰捷飛走之所蹉蹶攫麏麚之咆哮蹂豺貉以挂格膏鋒染鍔塡巖掩窟觀殊材與逸羣尚揮霍以出没則有白飛駮窮竒貙䝡牙若錯劒鬛如叢竿口吞殳鋋目極槍櫓碎琅弧彏玉弩射猛彘透奔虎金鏃一發旁疊四五雖鑿齒磨牙而致伉誰謂南山白額之足覩揔八校搜四隅馳專諸走都盧趫喬林撇絶壁抄獑猢攬貃囚鼯鼬於峻崖頓􅩸貜於穹石養由發箭竒肱飛車巧括更羸妙兼蒱且墜鸀鳿於青雲落鴻鴈於紫虚梢鶬鴰漂鸕􅖥殫地廬空神居斬飛鵬於日域摧大鳯於天墟龍伯釣其靈鼇任公獲其巨魚窮造化之譎詭何神怪之有餘所以噴血流川飛毛灑雪乍若乎高天􅀨獸上墜於大荒又似乎積禽爲山下崩於林穴陽烏沮色於旭日隂兎䘮精於明月思騰裝上獵於太清所恨穹昊之路絶而忽也莫不海晏天空萬方來同雖秦皇與漢武􅀆復何足以爭雄俄而君王茫然改容愀若有失居安思危防險誡逸斯馳騁以狂發非至理之弘術且夫君以端拱爲尊玄妙爲寶􅁀殄天物是謂不道乃命去三面之網示六合之仁巳殺者待其犯命未傷者全其天眞雖翦毛而不獻豈割鮮以染輪解鳳皇與鸑鷟􅀆旋騶虞與麒麟獲天寶於陳倉載非熊於渭濵於是享獵徒封勞苦軒行庖􅀐酌酤韜兵戈火網􅅈然後登九霄之臺宴八紘之圃開日月之扄闢生靈之戸聖人作而萬物覩覽蒐敖與狩岐何宣城之足數哂穆王之荒誕歌白雲於西母曷若飽人以淡泊之味醉時以淳和之觴鼔之以雷霆舞之以隂陽虞乎神明狃於道德張無外以爲􅆯􅅣大朴以爲杙頓天網以掩之獵賢俊以御極若此之狩罔有不克使天人宴安草木蕃殖六官斥其珠玉百姓樂於耕織寢鄭衛之聲卻靡曼之色天老掌圖風后侍側是三階砥平而皇猷允塞豈比夫子虚上林長楊羽獵計麋鹿之多少誇苑囿之大小者哉方將延榮光於後昆軼玄風於􅃉古擁嘉瑞臻元符登封於泰山􅂐德於社首豈不與乎七十二帝同條而共貫哉君王於是廻蜺旄返鑾輿訪廣成於至道問大傀之幽居使罔象掇玄珠於赤水天下不知其所如也裴將軍舞劒賦并序喬潭元和秋九月羽林裴公獻戎捷于京師上御花蕚樓大置酒酒酣詔將軍舞劒爲天下之壯觀遂賦之其辭曰將軍以幽燕勁卒耀武窮髮俘海夷虜山羯左執律右秉􅃏振旅闐闐獻功于魏闕上享之則鍾以捍簴鼔以靈鼉千妓度舞萬人高歌秦雲動色渭水躍波有肉如山有酒如河君臣樂飮而一醉夷夏薫薫而載和帝謂將軍抜劒起舞以張皇師旅以炟赫戎虜節八音而行八風奮兩階之干羽公於是乎貝胄朱綅而正色虎裘錦裼而攘臂抗稜威飄銳氣陸離于武備婆娑乎文事合桑林之容以盡其意照蓮花之彩以宣其利翕然鷹揚翼爾龍驤鋒隨指顧鍔應徊翔取諸身而聳躍上其手以激昻縱橫耀穎左右交相觀乎此劒之躍也乍雄飛俄虎吼揺轆轤射牛斗空中悍慄不下將乆欻風落而􅀨來果愜心而應手爾其凌厲清淳絢練夐絶青天􅀆可􅀝白雲􅀆可決覩二龍之追飛見七星之明滅雜朱干之逸勢應金奏之繁節至乃天輪宛轉貫索㢠環光沖融􅀆其外氣混合􅀆其間若勇雲濤如飛雪山萬夫爲之􅀨汗八佾爲之慙顔及乎度曲將終發機尤捷或連翩而七縱或瞬息而三接風生􅀆蒨斾䄡䄡電走􅀆彤庭曄曄隂冥變見靈怪離獵將􅀑神之無所遁逃豈蠻夷之不足震懾嗟夫藺子之迭躍其人未雄仲由之自衛其武未功曷若將軍爲百夫之特寶劒有千金之飭奮紫髯之游刃發帝庭之光色所以象大君之功亦以宣忠臣之力或歌曰洸洸武臣耀雄劒􅀆清邊塵威逺夷􅀆率來賔焉用輕􅅂之妓女長袖之才人天子穆然詔伶官斥鄭衛選色者使覘乎軍容教舞者使觀乎兵勢變激楚之結風爲發揚之蹈厲僉謂將軍之劒舞古未之至濟河焚舟賦高邁昔孟明之載戰載北也空山肉塡平地血流匹馬􅃗輪蕩然不收社稷包羞朝廷隱憂用兵至此不死何求誠以弃瑕之恩未報拜賜之言虚設砥名勵節易地改轍兾桑榆之未晚得雌雄之一決乃復揔元戎申薄伐四馬雲屯長劒電掣咆哮􅀆前􅆛後虎威稜􅀆左霜右雪火千旗而四面風動雷萬鼔而一道地裂小長平之瓦解凌不周之柱折朝岀乎咸秦夕濟乎孟津其氣益振其屈欲伸於是指河中之舟示軍中之人曰吾與君子誓雪前恥􅀒則入黃泉之下勝則入青雲之裏吹嘘而霜露變叱咤而風塵弭雖無此舟誰無此舟爾否則骸骨爲異鄕之土䰟􅅎爲鄰國之􅀑雖有此舟誰有此舟矣乃命焚之夫其火與木相守水與火相煎烘大川焮長壖龍吼乎沸潭魚喁乎湯泉舳艫化而爲炭檝棹颺而爲烟水聲與軍聲合旁括于地火氣與兵氣􅃲上衝于天是以天爲我赫怒焉地爲我震嶪焉林木爲我枯死焉山陵爲我崩騫焉千里而高鳥不過四遐而猛獸莫前況於人乎況於國乎於是晉君臣聞之心攅百箭背􅀒芒刺形神無主手足若墜曰秦師德之修誠之至天將啓吾將避閉城郭而不出潛鋒鋩以自備以五廟苟存爲幸以萬人苟免爲智豈敢護其山河而虞其土地于時晉實之主反爲客秦實之客反爲主不戰而勝不攻而取掠地於大河之北封屍於崤陵之下旣而􅀑雪前恥人解厚顔四顧清野橫行而旋譟聲破晉山喜氣塞秦􅀜曹沬復魯之勲自居其下范蠡平吳之力莫厠其間此役也見孟明之臨事暫否終泰圖之大也見子桑之舉人遺麤得精鑒之明也見秦伯之用賢責功捨過道之在也臣事君不必自致籍主司之公君使臣不必自得籍主司之忠由是觀秦伯之有子桑猶耳目之在躬以其視視一國之明以其聽聽一國之聦自可以翊天子還淳風名與三五比崇身與二八爭功成強秦覇西戎不亦宜乎明明我后渴賢固乆懸無私之鏡以照六合􅀝無私之衡以秤九有掇竒拾異葑菲盡取若一人近忠貞含文章悔巳往之無成謀大來於此行出蜀郡題橋以見志入函􅀜弃繻以示誠寧作焚舟而死不爲弃甲而生投君於子桑自比於孟明君謂如之何言之不可巳頌之曰㭊薪如之何匪斧不克事君如之何匪媒不得是知焚舟之役非孟明之力乃子桑之力地重校正唐文粹卷第四
