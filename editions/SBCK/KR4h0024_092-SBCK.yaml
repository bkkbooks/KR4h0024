  text: 重校正唐文粹卷第九十二
  hash: sha256:3aa7d53ccb814eab31df3fc9cdcd46de9b0fea96a485cda92708a88c8add699e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0024_SBCK_092-1a}
body:
  text: 吳興姚鉉纂序乙揔一十三首集序唐御史大夫李栖筠文集序權德輿唐刑部尚書致仕白居易文集序元稹唐贈禮部尚書孝公崔􅃆文集序李華唐吏部侍郎昌􅀺先生韓愈文集序李漢唐尚書刑部侍郎文公孫逖文集序顔眞􅀸唐比部郎中崔元翰文集序權德輿唐左􅀘闕皇甫冉詩集序獨孤及唐左􅀘闕李翰前集序梁肅唐左􅀘闕梁肅文集序崔㳟唐司封貟外郎李華中集序獨􅀌及唐禮部貟外郎栁宗元文集序劉禹錫唐右拾遺陳子昻文集序盧藏用唐衡州刺史吕温文集序劉禹錫唐御史大夫贈司徒賛皇文獻公李栖筠文集序權德輿辰象文于天山川文于地肖形最靈經緯敎化鼔天下之動通萬物之宜而人文作焉三才備焉命代大君子所以序九功正五事精義入神英華發外著之話言施之憲章文明之盛與天地準賛皇文獻公以文行正直祗事代宗中行山立乃協于初未弱冠隱于汲郡共城山下營道抗志不苟合於時族子華名知於人甞謂公曰叔父上鄰伊周旁合管樂聲動律外氣橫人間感激西上舉秀才第一陟降中外間􅀜代故宣力匪躬勤于王家出涖方國入居清近由給事黃門官小司空剖符毗陵陟明于吳廉問風行四方表率拜御史大夫不仁者遠武皇炳然審天工之可付公亦曉然知理道之可必一德交感推心合符執熱以待濯臨摰而不淑豈斯人未得􅀩公之功化邪何造物者之戾也始與計偕投小宗伯書至内外掃除之際自爲墓誌其間嚮三十年周旋官業斯文相爲用大凡出於詩之無邪易之貞厲春秋之襃貶且以閎奓鉅􅄛爲曼辭麗句可喜非法故言公之文簡實而粹精朗拔而章明書誌二篇感槩自敘英華特逹君子之道有􅀄有終至􅀂嘉園綺弛張出處於秦漢之間著四先生碑美蕭文終邴承相之倫或退或讓作五君詠病有司詩賦取士非化成之道著貢舉議其他下屬城敎條則辭語温潤言公事上奏則切劘端正觸􅀋而長皆文約旨明昭昭然足以激衰薄而申矩度如崑丘玄圃積玉相照景山鄧林凡木不植覽公遺編者髣髴風采知公之道焉烏虖以韓安國之忠厚多大略漢武以爲國器壺遂深中篤行將亦􅀝以爲相董仲舒言天人之際有王佐之才而皆不至彼當時齷齪備位者相廷無虚日又況竒衺忮害崇黨蔽善公于斯時道未大光然其謨猷獻替過於當國流風遺書暴于天下神之聽之景福于趙公纂承門訓弘大名器三命樞機爲唐夔龍君子然後謂流澤貽慶之言也信德輿先公與公天寶中修詞射䇿爲同門生並時筮仕于魏貝之地聲猷志氣相視莫逆伏思羈屑展敬無容猥以踈愚承趙公至惠忝聲舉之舊無忘代親翊唐虞之朝甞陪宰政捧門中集録屑涕見授辭不獲命謹直書以冠于篇白氏長慶集序元稹白氏長慶集者太原人白居易之所作居易字樂天始言試指之無二字能不誤具樂天與予書始旣言讀書勤敏與他兒異五六歲識聲韻十五志詩賦二十七舉進士貞元末進士尚馳競不尚文就中六籍尤擯落禮部侍郎高郢始用經藝爲進退樂天一舉擢上第明年拔萃甲科由是性習相近逺求玄珠斬白蛇劒等賦及百道判新進士競相傳於京師矣㑹憲宗皇帝無召天下士樂天對詔稱旨又登甲科末幾入翰林掌制誥比比上書言得失因爲賀􅀨詩秦中吟等數十章指言天下事時人比之風騷焉子始與樂天同校祕書前後多以詩章相贈荅㑹予譴􅁺江陵樂天猶在翰林􅀉予百韻律詩及雜體前後數十首是後各佐江通復相詶􅀉巴蜀江楚間洎長安中少年遞相倣效競作新詞自謂爲元和詩而樂天秦中吟賀􅀨諷諭閑適等篇時人罕能知者然而二十年間禁省觀寺郵􅃸牆壁之上無不書王公妾婦牛童馬走之口無不道至於繕寫摸勒衒賣於市井或持之以交酒茗者處處皆是揚越間多作書摸勒樂天及予􅄂詩賣於市肆也其甚者有至於盜􅀼名姓苟求自售雜亂間厠無可奈何予甞於平水市中鏡湖傍草市名見村校諸童競習歌詩召而問之皆對曰先生敎我樂天微之詩固亦不知予之爲微之也又雞林賈人求市頗切自云本國宰相毎以百金換一篇其甚僞者宰相輙能辨别之自篇章以來未有如是流傳之廣者長慶四年樂天自杭州刺史以右庶子詔還予時刺部㑹稽因得盡徴其文手自排纉成五十卷凡二千一百九十一首前輩多以前集中集爲名予以爲國家改元長慶於是因號曰白氏長慶集大凡人之文各有所長樂天之長可以爲多矣夫以諷諭之詩長於激閑適之詩長於遣感傷之詩長於切五字律詩百言而上長於贍五字七字百言而下長於情賦賛箴戒之􅀋長於當碑記敘事制詔長於實啓奏表狀長於直書檄詞䇿剖判長於盡揔而言之不亦多乎哉至於樂天之官秩景行與予之交分淺深非敘文之要也故不書長慶四年冬十二月十日微之序尚書崔孝公文集序李華文章本乎作者而哀樂繫乎時本乎作者六經之志也繫乎時者樂文武而哀幽厲也立身揚名有國有家化人成俗安危存亡於是乎觀之宣干志者曰言飾而成之曰文有德之文信無德之文詐臯陶之歌史克之頌信也子朝之告宰嚭之詞詐也而士君子恥之夫子之文章偃商傳焉偃商殁而孔伋孟軻作蓋六經之遺也屈平宋玉哀而傷靡而不遠六經之道遯矣論及後丗力足者不能知之知之者力或不足則文義寖以微矣文顧行行顧文此其與於古歟帝唐文行臣太子賔客贈禮部尚書博陵孝公崔氏諱􅃆字􅀂沖安平公愷之少子也丗爲德表門爲上族振發純英滋漸名訓大包淑和高厲遐清行先乎孝藝􅁉乎文資孝可以股肱王室揆文可以弼成􅀖敎進士登第舉賢良方正對䇿第一召見拜校書郎歷陸渾主簿朝廷以公直躬正詞擢左􅀘闕以公嫉邪忿佞除殿中侍御史文端武淑遷起居舎人學該典禮拜尚書祠部貟外郎議事惟允遷給事中立言成訓改中書舎人辭乞就養授虞部郎中節高天下升御史中丞剛亦不吐降著作郎道冠儒林遷祕書少監動爲人範除左庶子冝均大政拜中書侍郎望尊地逼出爲魏州刺史人惟求舊入爲左散􅀐常侍貳東宫居守集賢院學士祕書監太子賔客兼懷州刺史罷州復職副守薨于位時開元二十四年冬仲月旬有七日春秋六十七贈禮部尚書海内冠帶涕哀宗師公爲御史糾輸誠之罔持國屬之罪爲給事中拒貴倖怙恩之詔削大臣忤旨之刑爲中丞數發太倉減上林禽鳥之給以賑艱食陜東之人仆而復起宦官犯法執以按劾權寵屏息朝章大行權貢舉時得陸尚書景融來楊州瑱宋上黨遥宋兵部鼎等僉爲國器在中書詔命之岀上考天時下從人心異於斯者必替其否在魏州屬􅀨水敗稼乃弛禁便人先行後聞活者萬計公自爲常侍賔客􅁪任介正德播天下而不容於朝置之散地竟孤其道時乎初公與元兄御史渾齊名弱冠遊京師搢紳儒學之士皆曰崔氏伯仲必至台司旣而御史君天没公終于副守則向之所屬適爲人慟哉公之侍疾也孝逹于神祇居憂也哀貫乎天地喪期有數而茹毒終身慈不貸姦貞亦肆直道勝而齊物德全而及人博厚崇高篤實有耀儔於古烈蓋魯衛之君子歟在魏州車駕東廵􅀜外諸侯公爲上第由是分掌選署仕進之族知勸焉親交鄰里饑者待公而炊寒者待公而裘蒸甞之奠待公而後具故禄廩深厚家未嘗足開元中天下富穰車服過制公菲飲食卑宫室濯衣澣冠俾人瞻我而化其不化者亦慙乎心矣見天下之善如不及從而佐之見天下之不善如探湯從而誨之則卒蹈於中庸翻然於不迪巳過半矣中朝議政或疑羣謀未允公援六經伸百氏覆於時事事舉其中天下莫不諷誦焉文集經亂罹多散逸今其存者二十九卷長子成甫進士擢第校書郎陜縣尉知名當時不幸早丗嗣子祐甫論譔先志一卷爲第三十傳祖禰之美合於禮經見公文章知公行事則人倫之敘治亂之源三閣行乎天下反魏晉之浮誕合立言於丗敎其於道也至乎哉祐甫純孝而文直清而和希公門者謂公存焉明發不寐泣次遺文以華北州鄰壤婚姻之舊甞趨公門備閱家編祐甫代華爲校書郎華以是味公之道也熟詞則不敏有古之直焉唐吏部侍郎昌􅀺先生韓愈文集序李漢文者貫道之器也不深於斯道有至焉者不也易繇爻象春秋書事詩詠歌書禮剔其僞皆深矣乎秦漢巳前其氣渾然迨乎司馬遷相如董生楊雄劉向之徒尤所謂傑然者也至後漢曹魏氣象萎薾司馬氏巳來規範蕩悉謂易巳下爲古文剽掠􅆫􅀼爲工耳文與道蓁塞固然莫知也先生生於大曆戊申㓜􅀌隨兄播遷韶嶺兄卒鞠於嫂氏辛勤來歸自知讀書爲文日記數千百言比壯經書通念曉析酷排釋氏諸史百子皆搜抉無隱汗瀾卓踔奫泫澄深詭然而蛟龍翔蔚然而虎鳳躍鏘然而韶鈞發日光玉絜周情孔思千態萬貌卒澤於道德仁義炳如也洞視萬古愍惻當丗遂大拯頽風敎人自爲時人始而驚中而􅀏且排先生志益堅其終人亦翕然而隨嗚呼先生於文摧䧟廓清之功比於武事可謂雄偉不賞者矣長慶四年冬先生殁門人隴西李漢辱知最厚且親遂􅀵拾遺文無所失墜得賦四古詩二百五聮句十一律詩一百七十三􅄂著六十四書啓序八十六哀辭祭文三十八碑誌七十六筆硯鱷魚文三表狀四十七揔七百并目録合爲四十一卷目爲昌􅀺先生集傳於代又有注論語十卷傳學者順宗實録五卷列於史書不在集中先生諱愈字退之官至吏部侍郎餘在國史本傳唐尚書刑部侍郎贈尚書右㒒射孫逖文公集序顔眞􅀸古之爲文者所以導逹心志發揮性靈本乎詠歌終乎雅頌帝容作而君臣動色王澤竭而風化不行政之興衰實繋于此然而文勝質則繡其鞶恱而血流漂杵質勝文則野於禮樂而木訥不華歷代相因莫能適中故詩人之賦麗以則詞人之賦麗以􅁋此其效也漢魏巳還雅道微缺梁陳斯降宫體聿興旣馳騁於末流遂受嗤於後學是以沈隱侯之論謝康樂也乃云靈均巳來此未及覩盧黃門之序陳拾遺也而云道䘮五百歲而得陳君􅀂激昻頽波雖無害於過正搉其中論不亦傷於厚誣何則雅鄭在人理亂由俗桑間濮上胡爲乎綿古之時正始皇風奚獨乎凡今之代蓋不然矣其或斌斌彪炳郁郁相宣膺期運以挺生奄寰瀛而首出者其惟僕射孫公乎公諱逖河南鞏人其先自樂安武水寓于渉而從焉父嘉之以詞學登科官至宋州司馬公風裁徴明天才傑出學窮百氏不好非聖之書文統三變特深稽古之道故逸氣上濟而高情四逹羗索隱乎渾元之始表獨立於常均之外不其盛歟年數歲即好屬文十五時相國齊公崔日用試土火鑪賦公雅思遒麗援翰立成齊公駭之約以忘年之契邇後遂有大名故其試言也年未弱冠而三擅甲科吏部侍郎王丘試竹簾賦降階約拜以殊禮待之相國燕公張說覽其䇿而心醉其序事也則伯樂川記及諸碑誌皆卓立千古傳於域中其爲詩也必有逸韻佳對冠絶當時布在人口其詞言也則宰相張九齡欲􅀝摭疵瑕沈吟乆之不能易一字公之除庶子也苑咸草詔曰西掖掌綸朝推無對議者以爲知言凡斯夥多庸可悉數故燕國深賞公才俾與張九齡許景先韋述同遊門庭命子均垍施伯仲之禮江夏李邕自陳州入計繕寫某集賫以詣公託知巳之分其爲先逹所重也如此公又雅有清鑒典考功時精覈進士雖權要不能逼所􅅄擢者二十七人數年間宏詞判等入甲者一十六人授校書者九人其餘咸著名當丗巳而多至顯官明年典舉亦如之故言弟者必稱孫公而巳夫然信可謂人文之宗師國風之哲匠者矣公凡所著詩歌賦序䇿問賛碑志表䟽制誥不可勝紀遭二朝之亂多有散落子宿絳成等夙奉過庭之訓咸以文章知名同時臺省乃編次公文集爲二十卷列之于左庶乎好事者傳寫諷誦以垂乎無窮亦何必藏名山而納石室也金紫光禄大夫檢校刑部尚書上柱國魯郡開國公顔眞􅀸昔觀光乎天府實荷公之􅅄擢見命爲序豈究端倪時則永泰元年仲秋之月至􅀂丗系閥閱蓋存諸别􅀓此不復云唐尚書比部郎中博陵崔元翰文集序權德輿易賁之􅂏曰觀乎人文以化成天下故闕里之四敎門人之四科未有遺文者荀況孟軻修道著書本於仁義經術之枝派也迨夫騷人怨思之作游士從衡之論刺譏捭闔文憲陵夷至漢廷賈誼劉向班固楊雄司馬遷相如之倫鬱然復興有古風烈然則文之用也橫三才之中經紀事物章明統􅀋不可巳也殷之說命周之命君陳君牙楚射父之訓辭鄭東里之潤色天子諸侯名命之文也張老之輪奐史克之駉馭吉甫之清風伯喈之無愧賢士大夫頌述之文也至􅀂夫子紀延陵墓叔向寓子産書董仲舒射䇿言天人相與之際阮元瑜書記翩翩之任觸􅀋滋多非文不彰後之人力不足者詞或侈靡理或厎伏文之難能也如是博陵崔君元翰東漢濟北相長岑之後也曽祖某濟州刺史祖某鳯閣舎人考某以經明歷衛州汲縣尉虢州湖城縣主簿親没遂不復仕探古先微言著尚書洪範周易忘象及三國春秋幽觀之書門人諸儒易其名曰貞文孝父君紹文宗雕龍之慶究貞文法義之學㓗廉清方敦直莊明博見強志不取合於俗黙而好深湛之思舒而爲彬蔚之文師遵六籍磅礴二漢不爲物遷不爲波流初間􅀜隱約於河朔之間年殆知天命甫與計偕至京師洎博學宏詞直言極諌凡三登甲科名動天下初自典校祕書連辟汧公北平王司徒府管奏記之職歷太常寺協律郎大理評事錫以命服登朝爲太常博士禮部貟外郎貞元七年春轉職方貟外郎知制誥八年冬罷爲比部郎中十一年夏寢疾不起其壽四百甲子其文􅀂干篇閎茂博厚菁華縝密足以希前古而聳後學紀循吏而述政事則房栢鄕碣孫信州頌敘守臣勲烈則􅀺陽城碑劉幽州神道碑表宗工賢人兆域則李太師梁郎中誌文撰門中德善則貞文孝父誌碣二銘攄志氣以申感槩則與李都統及二從事書詮桑門心法則大覺禪師碑推人情以陳聖德則請復尊號表陳理道則有制䇿藻􅃳王度則有詔誥嚮所敘詩書說命駉頌而下君皆索其粹精故能度越倫􅀋有盛名於代其他詩賦賛論銘誄序記等今爲三十卷如黃鍾玉磬琮璧琬琰奏於懸間列在西序其章者雖漢廷諸公不能加也無溢言曼辭以爲夸大無讇􅀏柔色以資孟晉勁直而不能屈已清剛而不能容物介特寡徒晚逹中廢斯亦命之所賦也德輿昔歲獲與君遊於江湖間又接武侍從登文石之陛常所論著備探簡編君之孤某旣除䘮泣捧遺文見咨序引故如其篇第直書以冠之云唐左􅀘闕安定皇甫冉文集序獨􅀌及五言詩之源生於國風廣於離騷著於李蘇盛於曹劉其所自遠矣當漢魏間雖巳朴散爲器作者猶質有餘而文不足以今揆昔則有朱弦踈越大羮遺味之歎歷千餘歲至沈詹事宋貟外始財成六吕彰施五色使言之而中倫歌之而成聲縁情綺靡之功至是乃備雖去雅􅐛遠其麗有過於古者亦猶路鼗出於土鼓􅂐籕生於鳥跡也沈宋旣殁而崔司勲顥王右丞維復崛起於開元天寶之間得其門而入者當代不過數人補闕其人也補闕諱冉字茂政玄晏先生之後樂平縣令价之孫潭州長史顗之子十歲能文十五而老成右丞相曲江張公深所歎異伯父祕書少監彬尤器之自是令問休暢舉進士第一歷無錫尉左金吾兵曹今相國太原公之推轂河南也辟爲書記大暦二載遷左拾遺轉左􅀘闕奉使江表因省家至丹陽朝廷三署郎位以待君之復不幸短命年方五十四而殁嗚呼惜哉君忠恕廉恪居官可紀孝友恭譲自内形外言必依仁交不苟合得䘮喜愠罕見於容故覩君述作知君所尚以景命不永斯文未臻其極也蓋存於遺札者凢三百有五十篇其詩大略以古之比興就今之聲律涵詠風騷憲章顔謝至􅀂麗曲感動逸思奔發則天機獨得非師資所􅅄毎舞雩詠歸或金谷文㑹曲水修禊南浦愴别新聲秀句輒加於常時一等才鍾於情故也君母弟曽字孝常與君同稟學詩之訓君有誨誘之助焉旣而麗藻競爽盛名相亞同乎聲者方之景陽孟陽孝常旣除䘮懼遺製之墜于地也以某與茂政前後爲諌官故銜痛編集以論譔見託遂著其始終以冠于篇唐左􅀘闕李翰前集序梁肅文之作上所以發􅀭道德正性命之紀次所以裁成典禮厚人倫之義又所以貽顯義􅀋立天下之中三代之後其流派别炎漢制度以霸王道雜之故其文亦二賈生馬遷劉向班固其文博厚岀於王風者也枚叔相如楊雄張衡其文雄富出於霸􅂗者也其後作者理勝則文薄文勝則理消理消則言愈繁斯亂矣文薄則意愈巧斯弱矣故文本於道失道則博之以氣不足則飾之以辭蓋道能兼氣氣能兼辭辭不當則文斯敗矣唐有天下幾二百載而文章三變初則廣漢陳子昻以風雅革浮侈次則燕國張公說以宏茂廣波瀾天寶以還則李貟外蕭功曹賈常侍獨􅀌常州比肩而作故其道益熾􅀂乃辭源辯博馳騖古今之際高歩天地之間則有左􅀘闕李君君名翰趙郡賛皇人也天姿朗秀率性聦逹博渉經籍其文尤工故作敘治亂則明白坦蕩􅄛餘條暢端如貫珠之可觀也陳道義則游泳性情探微豁冥渙乎春冰之將泮也廣勸戒則得失相維吉凶相追焯乎元􅀛之在前也頌功美則温直顯融協于文中穆如清風之中人也議者又謂君之才􅀂崇山岀雲神禹導河觸石而彌六合隨山而注巨壑蓋無物足以道其氣而閱其行者也丗所謂文章之雄捨君其誰歟弱冠進士登科解􅄄衛縣尉其後以書記再叅淮南節度軍謀累遷大理司直天子聞其才召拜左􅀘闕俄加翰林學士君之處丗用捨􅀜乎才進退牽乎時始居筮仕值蔽善者當路故屈於下位天寶末房公琯韋少師陟薦公充史官諌司之任當國者不聽乃巳中歲多難時方用武故委於外藩及夫宣室而揮宸翰也方用人文以飾王度則因疾罷免嘻昔君子賢人運與事并得信其志者寡其用矣其餘屬雅道䘮缺黃鍾毀棄􅀂孟子轗軻士安多病亦何可勝論惟斯文足以振當世餘烈足以遺後嗣此之謂不朽君旣退歸居于河南之陽翟家愈貧而禄不及志愈邁而文益壯暇日以甞所述作三十卷目爲前集命予序之君與予實有伯喈仲宣之義故書于篇唐右􅀘闕梁肅文集序崔恭敘曰皇甫士安志好閑放不榮軒冕導情適志作高士傳賛記遺韻風猷尚在而公早從釋氏義理生知結意爲文志在於此言談語􅀏常所切劘心在一乗故敘釋氏最爲精博與皇甫士安之所素尚亦相放焉則今天台大師元浩之門弟子也摳衣捧席與余同焉故能知其景行􅀵其製作編成二十軸以爲儒林之綱紀云􅀂夫明是非探得失乃作西伯稱王議宗道德矣功成作磻溪銘四皓賛釣臺碑圯橋碑絜當丗激清風作先賢賛獨孤常州集序觀講論語序美藝文善章句作李􅀘闕集序隱士李君遺文序備敎化彰諷詠作中書侍郎贈太子太傅李公集序開國公包君集序揔名實樹遺風作常州獨􅀌公遺愛頌太常􅀸常山郡開國公崔公神道碑惡戎醜思康濟作兵箴敘宗系思祖德作述初賦病流濫恱故居作過舊園賦明大道宗有德作受命寶賦其餘言志導情記㑹敘别揔存諸集録歸根復命一以貫之作心印銘住一乗明法體作三如來畫賛知法要識權實作天台山禪林寺碑逹敎源周境智作荆溪大師碑大敎之所由佛日之未忘蓋盡於此矣􅀂以神道設教化源旁濟作泗州開元寺僧伽和尚塔銘言僧事齊律儀作過海和尚碑銘幽公碑銘釋氏制作無以抗敵大法將㓕人鮮知之唱和之者或寡矣故公之文章粹美深逺無人能到此事可以俟於知音不可與薄俗者同丗而論也余之仰止未盡其善蓋釋氏之鼓吹歟諸佛之影嚮歟余所不者道其窮歟常懷不言之歎杳冥之恨爾後之人識逹希夷意通響象知我之言之不怍耳􅀂以敘人倫正襃貶則人皆知之非獨情至而稱其製作也大約公之習尚敦古風閱傳記硜硜然以此導引於人以爲其常米鹽細碎未甞挂口故鮮通人事亦賢者之一病也夫子所謂君子多乎哉不多也故無適時之用任使之勤余故以皇甫士安比之􅀂管夷吾諸葛亮留心濟丗自謂棟梁則非公之所尚也所謂善古而不善今知賢而不知俗故論賛碑頌能言賢者之事不能言小人之稱享年􅀂干以某年月日終于長安某里朝廷尚德故以公爲太子侍讀國尚實録故以公爲史館修撰發誥令敷王猷故以公爲翰林學士三職齊署則公之處朝廷不爲不逹矣年過四十士林歸崇比夫顔子黃叔度不爲不壽矣其碌碌者老於郎署白首人丗又何􅀘哉於逹者不可以夭壽之歎而病於促數焉公遺孤殁後而生今巳成立則友明之知臧孫之後存於此也趙郡李華中集序獨􅀌及志非言不形言非文不彰是三者相爲用亦猶渉川者假舟檝而後濟自典謨缺雅頌寢王道陵夷文敎下衰故作者往往先文字後比興其風流蕩而不返乃至有飾其詞而遺其意者則潤色愈工其實愈䘮及其大壊也儷偶章句使枝對葉比以八病四聲爲梏拲守之如奉法令聞臯陶史克之作則呷然􅀏之天下雷同風馳雲趨文不足言言不足志亦猶木蘭爲舟翠羽爲檝翫之於陸而無渉川之用痛乎流俗之感人也乆矣帝唐以文德敷乂于下民被王風俗稍丕變至天后時陳子昻以雅易鄭學者􅐛而嚮方天寶中公與蘭陵蕭茂挺長樂賈㓜幾勃焉復起用三代文章律度當丗公之作本乎王道大抵以五經爲泉源杼情性以託諷然後有歌詠美敎化獻箴諌然後有賦頌懸權衡以辯天下公是非然後有論議至􅀂記敘編録銘鼎刻石之作必採其行事以正襃貶非夫子之旨不書故風雅之指歸刑政之根本忠孝之大倫皆見於詞然後中古之風復形於今于時文士馳騖飈扇波委二十年閒學者稍厭抑􅀭黃華而窺咸韶之音者什五六識者謂之文章中興公實啓之公名華字遐叔趙郡人安邑令府君第三子質直而和純固而明曠遠而有節中行而能斷孝敬忠廉根於天機執親之䘮哀逹神明其任職􅁵務外􅀂坦蕩而内持正性謙而不犯見義乃勇舉善惟懼不及務去惡如復讎與朋友交然諾著於天下其偉詞麗則和氣之餘也學博而識有餘才多而體愈迅毎述作則筆端風生聽者耳駭開元二十三年舉進士天寶二年舉博學宏詞皆爲科首由南和尉擢祕書省校書郎八年歷伊闕尉當斯時唐興百三十餘年天下一家朝廷尚文夫羿工乎中微拙於使人無巳譽公才與時并故不近名而名彰時輩歸望如鱗羽之於虬鸞也十一年拜監察御史㑹權臣􅀼政柄貪搰當路公入司方書岀按二千石持斧所嚮列郡爲肅爲姦黨所嫉不容於御史府除右􅀘闕禄山之難方命圯族者蔽天聦明勇者不得奮明者不得謀公危行正詞獻納以誠累陳誅兇渠完封疆之䇿閽犬迎吠故書留不下時繼太夫人在鄴初潼􅀜敗書聞或勸公走蜀詣行在所公曰奈方寸何間行問安否然後輦安輿而逃謀未果爲盜所獲二京旣復坐謫杭州司功太夫人棄敬養公自傷悼以事君故踐危亂而不能安親旣受汙非其疾而貽親之憂及隨牒願終養而遭天不弔由是銜罔極之痛者三故雖除䘮抱終身之戚焉謂志巳厭息陳力之願焉因屏居江淮閒省躬遺名誓心自絶無何詔授左􅀘闕又加尚書司封貟外郎璽書連徴公􅀸已下傾首延佇至止之日將以司言處公公曰焉有隳節辱志者可以荷君之寵乎遂移疾請吿故相國梁公峴之領選江南也表爲從事加檢校吏部郎明年遇風痺徙家于山陽疾痼貧甚課子弟力農圃贍衣服雅好修無生法以冥寂思慮視爵禄形骸與遺土同惟吳楚之士君子譔家傳修墓版及郡邑頌賢守宰功德者靡不齎貨幣越江湖求文於公得請者以爲子孫榮公遇勝日時復綴録以應其求過是而往不復著書素所著者多散落人間自志學至校書郎以前八卷并舜山公主誌文竇將軍神道碑崔河南生祠碑禮部李侍郎碑安定三孝論哀舊遊詩韓㓜深避亂詩序祭王端貟外沈起居興宗裴貟外騰文别元亘詩并楊􅀐曹集序王常山碑並因亂失之名存而篇亡自監察御史以後迄至于今所述者公長男羔字宗敘編而集之斷自監察御史巳前十卷號爲前集其後二十卷頌賦詩歌碑表序論誌記讃祭文凡一百四十四篇爲中集其中陳王業則無疆頌議丗道則原卜論質文論主文而譎諌則言毉含元殿賦敦禮敎則哀節婦賦二孝讃與外孫女二孩書表賢逹盛德則元魯山碣房太尉德銘崖賔客集序德先生誄權著作墓表李夫人傳靈夫人頌一生死之間杼其交情則祭蕭功曹劉評事張博士文吟詠情性逹於事變則詠古詩辨􅀸大夫族姓則盧監神道碑思舊則三賢論自敘則别相里造范倫序詮佛敎心要而㑹其異同則南泉眞禪師左溪朗禪師碑其餘雖比興萬變而未始不根於道德故覽公之文知公之質不俟覿容貌聽詞氣而後覩其行􅀂使束帶立於史臣之位且備獻替足以􅃳色王度正一代之訓典天而病之國不幸也然遐叔身甚病而心甚壯文益贍而才不竭則前路逸氣詎可度矣他日繼於此而作者當爲後集及常遊公之藩也乆故錄其述作之所以然著于篇唐尚書禮部貟外郎柳宗元文集序劉禹錫八音與政通而文章與時高下三代之文至戰國而病渉秦漢復起漢之文至列國而病唐興復起夫政庬而士裂三光五岳之氣分扶問切大音不完故必混一而後大振􅀄貞元中上方嚮文章昭回之光下飾萬物天下文士爭執所長與時而奮粲焉如繁星麗天而芒射寒色正人望而敬者五行而巳河東栁子厚斯人望而敬者歟子厚始以童子有竒名於貞元􅀄至九年爲名進士十有九年爲材御史二十有一年以文章稱首入尚書爲禮部貟外郎是歲以踈雋少檢獲訕出牧邵州又謫佐永州居十年詔書徴不用遂爲栁州刺史五歲不得召病且革留書抵其友中山劉禹錫曰我不幸卒以謫死以遺草累故人禹錫執書以泣因編次爲四十五通行於丗子厚之䘮昌􅀺韓退之誌其墓且以書來弔曰哀哉􅀂人之不淑吾常評其文雄深雅徤似司馬子長崔蔡不足多也安定皇甫湜於文章少所推讓亦以退之言爲然凡子厚名氏與仕與年曁行巳之大方有退之之誌􅀂祭文在今附于第一通之末云唐右拾遺陳子昻文集序盧藏用昔孔宣父以天縱之才自衛返魯乃刪詩定禮述易道而修春秋數千百年文章粲然可觀也孔子殁二百歲而騷人作於是怨麗浮侈之法行焉漢興二百年賈􅁩馬遷爲之傑憲章禮樂有老成之風長􅀸子雲之儔瑰詭萬變亦竒特之士也惜其王公大人之言溺於流辭而不顯其後班張崔蔡曹劉潘陸隨波而作雖大雅不足其遺風餘烈尚有典刑宋齊之末蓋顦顇矣逶迤陵頽流靡忘返至于徐􅁃天之將䘮斯文也後進之士􅀂上官儀者繼踵而生於是風雅之道掃地盡矣易曰物不可以終否故受之以泰道䘮五百歲而得陳君君諱子昻字伯玉蜀人也崛起江漢虎視函夏卓立千古橫制頽波天下翕然質文一變非夫岷峨之精巫廬之靈則何以生此故其諌諍之辭則爲政之先也昭夷之碣則議論之當也國殤之文則大雅之怨也徐君之議則刑禮之中也至於感激頓挫微顯闡幽庶幾見變化之朕以接乎天人之際者則感遇之篇存焉官其逸足駸駸方將搏扶揺而淩太清獵遺風而薄嵩岱吾見其進未見其止惜乎湮厄當丗道不遇時委骨巴山年志俱天故其文未極也嗚呼聦明精粹而淪剥貪叨桀驁以顯榮天乎天乎吾始未知天焉昔甞與余有忘形之契四海之内一人而巳良友殁矣天其䘮余今採其遺文可存者編而次之凢十卷恨不逢作者不得列於詩人之什悲夫故粗論文變而爲之序至於王霸之才卓犖之行則存之别傳以繼於終篇云唐衡州刺史吕温文集序劉禹錫五行秀氣得之居多者爲雋人其色㶑灩於顔間其聲發而爲文章天之所與有物來相彼由學而致者如工人染夏以視羽畎有生死之殊矣初貞元中天子之文章煥乎垂光慶霄在上萬物五色天下人文爲氣所召其生乃蕃靈芝萐莆與百果齊坼然煌煌翹翹岀乎其􅀋終爲偉人者幾希矣東平吕和叔實生是時而絶人甚遠始以文學振三川三川守以爲貢士之冠名都西馳速如羽翼長安中諸生咸避其鋒兩科連中鋩刃愈岀德宗聞其名自集賢殿校書郎擢爲左拾遺明年犬戎請和上問能使絕域者君以竒表有專對材膺選轉殿内史錫之銀章還拜尚書戸部貟外郎轉司封遷刑部郎中兼侍御史副治書之職㑹中執法左遷縁坐道州刺史以政聞改衡州年四十而殁後十年其子安衡泣奉遺草來謁咨予伸之成一家言凡二百篇和叔名温别字化光祖考皆以文學至大官蚤聞詩禮於先侍郎又師吳郡李質通春秋從安定梁肅學文章勇於藝能咸有所祖年益壯志益大遂撥生文字與雋賢交重氣槩覈名實欽然以致君及物爲大欲毎與其徒講疑考要皇玉富強之際臣子忠孝之道岀入上下百千年間詆訶角逐疊發連中得一善輒盱衡撃節揚􅃑頓足信容得色舞于眉端以爲案是言循是理合乎心而氣將之昭然􅀂揭日月而行孰能閼其勢而爭天光者乎嗚呼言可信而時異道甚長而命窄精氣爲物其有所歸乎古之爲書者先立言而後體物賈生之書道過哉而荀􅀸亦後其賦和叔年少遇君而卒以謫似賈生能明王道似荀􅀸故予先後視二書斷自人文化成論至諸葛武侯廟記爲上篇他咸有爲而爲之始學左氏書故其文微爲富豔夫羿之􅀜􅃓惟巴虬九日乃能盡其彀而廻注鷃爵亦要中於㝷常之閒非羿之手􅃓有能有不能所遇然而然也後之逹解者推而廣之知予之素交不相索於文字之内而巳重校正唐文粹卷第九十二
