body:
  text: 吳興姚鉉纂古賦辛揔七首古器三霜鍾賦喬潭欹器賦李德􅁉砥石賦劉禹錫物景二晩晴賦杜牧秋聲賦劉禹錫決疑二問大鈞賦劉禹錫何􅁲賦霜鍾賦并序喬潭南陽豐山有九鍾焉霜降則鳴潭叨遇逹奚公擢甲科然則南陽即公隱居之舊地爲此賦以廣知音焉豐山之峯巉嵒積翠之石森爽冒寒之松上無飛鳥下無人蹤何杳杳以靜謐有天然之古鍾兩欒神資九乳靈化寧失制於侈揜豈遺音於窕摦每虚氣以自得常􅀫懸以警下動於耳而藏於心必髙秋之涼夜於是泬寥􅀆日暮而天晶蕭瑟􅀆霜落而風清爽氣無眹潛來滿盈跳然復出鏗爾有聲信不擊而不考能大鳴而小鳴始則含糊擁鬱旋復充詘若往若還徘徊其間爾其舒肆奔放長欒逺暢乍浮空以紆餘更觸物而瀏亮入林肅肅在水湯湯泛濫小瀬聮緜踈篁夜鶴怨􅀆彌苦寒猨悲􅀆更長餘韻舂容随風悠揚繞於洞庭浮於瀟湘梧楸紛以離披蒹葭䬃其蒼蒼及夫夜以艾􅀆彌靜山無人􅀆月冷􅀄蕭蕭以自淒復琅琅而虚警其動愈出其來甚徐合於元化遊於太虚轉逺而盡誰知所如聊獨坐於傾聽惘若失乎躊躇聽不及想以存其餘方其寒氣曉集鏘然應急發越林巒周流井邑前聲未盡後韻相及羇臣之空館屢來思婦之髙樓逺入無不倀然驚夢歔欷掩泣夫鍾之應霜也應以無心士之知巳也貴知其音不鼓而鳴者其聲逺不言而信者其分深故自然之聲無假於煩手持達之分不資於􅅬口吾欲徴華鍾喻良友懷音淵黙藏器虚受可以適南陽待清霜之一扣系曰風籟起乎喧長薄霜鍾鳴􅀆動哀壑合大塊􅀆聲無作雖有聞􅀆常寂寞欹器賦并序李德􅁉癸丑歳余時在中樞丞相路公見遺欹器贈以古人之物永懷君子之心甞欲報以辭賦屬力小任重朝夕盡瘁固未睱於體物今者公巳殁世余有放逐忽覩兹器悽然懷舊因追爲此賦置公之靈筵昔周道旣平旣安且寜赫赫公旦配德阿衡謂難守者成難持者盈始作兹器告于神明至仲尼憲文武之道思周公之德入太廟而觀器見遺法而歎息且曰月滿而虧日盈則􅉴彼天道之常然欲久盛而焉得乃沃水於器俯察要終挹彼注兹授之若冲虚則臲􅷷似君子之困蒙中則端平如君子之中庸滿則傾跌霆流電發器如隄隤水若河決非神鼎之自盈異衢樽之不竭蓋欲表人道之隆替明百事之有節然兹器也不以中而自藏不以跌而自傷其過也如彼薄蝕其更也浸彼輝光得其道者居則念於豐蔀動乃思於謙受顔旣復而不逺惠屢黜而何咎知任重之力及悟物盈之難久雖神道之無形常􅃤然於前後昔與君子同秉國鈞公得之爲賢相余失之爲放臣覩遺物而猶在懷舊好而悲辛思欲克巳以復禮永報徳於仁人砥石賦并序劉禹錫南方氣泄而雨􅁋地慝而傷物媪神噫濕渝色壞味雖金之堅亦失􅁪性始余有佩刀甚良至是澁不可㧞剖其室乃岀遡陽眇眩傅刃蒙脊鱗然如痏痂如黑子如青蠅之惡銳氣中錮猶人􅀍病然客有聞焉裒密石以遺予沃之草􅃾雜以鳥膏切劘下上直質焯見躊躇四顧逌爾謝客微子之貽幾喪吾寳客曰吾聞諸梅福曰爵禄者天下之砥石也髙皇帝所以礪世磨鈍有見耶余退感其言作砥石賦我有利金􅀆以利爲佩遭土卑而慝作雄鋩爲之潛晦如景昏而蝕旣􅀆與肌􅃮而爲癘顧秋蓬之不可刜􅀆尚可遊乎髖髀之外利物蒙蔽材人惆悵俾百汰之至精蟠一檢而多恙豈害氣之獨然􅀆將久不試而然彼屠者之刀􅀆獵者之鋋不灌不淬􅀆糅錯銜鈆日鼔月揮􅀆刲􅃾擊鮮皖㸌爟以耀芒蓊淫夷而騰羶豈不以渉暑而蒙沴􅀆鼎用之而成妍有客自東遺余越砥圭形石質蒼色膩理剗其鱗皴滑以滫瀡如衣澣垢如鼎出否霧盡披天萍開見水拭寒熖以破眥擊清音而振耳故態復還寶心再起旣賦形而終用一蒙垢焉何耻感利鈍之有時􅀆􅀉雄心於瞪視嗟乎石以砥焉化鈍爲利法以砥焉化愚爲智武王得之商俗以厚髙帝得之傑材奔走得旣有自失豈無因漢氏巳還三光景分隨道闊狹用之得人五百餘年唐風始振懸乎天砥以礱兆民橎生在天成器在君天爲物君君爲人天安有執礪世之具而患乎無賢歟晚晴賦并序杜牧秋日晚晴樊川子目于郊園見大者小者有狀􅀋者故書賦云雨晴秋容新沐􅀆忻遶園而細履靣平池之清空􅀆紫閣青橫逺來照水如髙堂之上見羅幕􅀆垂乎鏡裏木勢黨伍􅀆行者如迎偃者如醉髙者如逹低者如􅉥松數十株切切交峙如冠劒大臣國有急難庭立而議竹林外裹􅀆十萬丈夫甲刃摐摐密陣而環待豈􅀒軍令之不敢􅅝􅀆何意氣之嚴毅復引舟于深灣忽八九之紅芰姹然如婦歛然如女墮蘂黦顔似見放棄白鷺潛來􅀆邈風標之公子窺此美人􅀆如慕恱其容媚雜花差於岸側􅀆絳緑黃紫格頑色賤􅀆或妾或婢閒草甚多叢者束􅀆靡者杳􅀆仰風獵日如立如􅀏􅀆千千萬萬之容􅀆不可得而狀也若予者則謂何如倒冠落珮􅀆與世闊踈敖敖休休􅀆真徇其愚而隱居者乎秋聲賦并序劉禹錫相國中山公賦秋聲以屬天官太常伯唱和俱絶皆得時道行之餘興猶動光隂之歎況伊鬱老病者乎吟之斐然以􅀉孤憤碧天如水􅀆窅窅悠悠百􅆉迎暮􅀆萬葉吟秋欲辭林而蕭䬃潛命侣以啁啾送將歸􅀆臨水非吾土􅀆登樓晚枝多露蟬之思夕草起寒螿之愁至若松竹含韻梧楸早脫驚綺䟽之晩吹墜碧砌之涼月念塞外之征行顧閨中之騷屑夜蛩鳴􅀆機杼促朔鴈呌􅀆音書絶逺杵續􅀆何泠泠虚室靜􅀆空切切如吟如嘯非竹非􅁝合自然之宫徴動終歳之別離廢井苔合荒園露滋草蒼蒼􅀆人寂寂樹槭槭􅀆􅆉伊伊則有安石風流巨源多可平六符而佐主施九品而自我猶復感隂􅆉之鳴軒歎涼葉之初墮異宋玉之悲傷覺潘郎之么麽嗟乎􅂹伏􅇫而巳老鷹在鞲而有情聆朔風而心動盻天籟而神驚力將痑􅀆足受紲猶奮迅于秋聲問大鈞賦并序始余失臺郎爲刺史又貶州司馬俟罪朗州三見閏月人咸曰數異人間之景光中有威神巾金甲而煒煌命之使前􅀆其音琅琅曰吾大化之一工也居上臨下無其不平汝今有辭吾一以聽播形肖貌生􅀋積億橐籥圈匡鎔錬消息我之司智初不爾嗇不守以愚覆爲汝賊旣賦汝形輔之聦明盍求世師資適攸宜胡然抗心遐想前烈􅀝梯青􅁳舉足斯跌韜爾智斧無爲自伐鑿竅太繁天和乃􅂥利逕前誘多逢覆徹名賜内煎外火非􅀬今哀汝窮將厚汝愚剔去剛徤納之柔濡塞前竅之傷痍􅀆招太和而興居貰以待人􅀆急以自拘道存􅃉奥無示四隅􅁤物之勢不作􅀆見傷之機自無汝不善用吾焉嗇乎且夫貞而騰氣者膴膴徤而垂精者昊昊我居其中猶輪是􅌃以不息爲體以日新爲道倮鱗蜚走灌莽苞皁乃牙乃甲乃殈乃剖陽榮隂悴生濡死藁各乗氣化不以意造賦大運􅀆無有淑惡彼多方􅀆自生醜好爾奚不德余以驟壯姑尤我以速老耶觀汝百爲又或不然赤子哇哇急其能言亦旣名物幾時蹁蹮春耕其丘投種之日釋耒而歎何時實粟望所未至謂余舒舒欲其乆留謂我瞥如我一子二誰之曲歟彼蒹葭之蒼蒼􅀆霜霰苦而中堅松竹之皸皴索籜􅀆不若榯筍之可憐納材葦而構明堂固容消而力完楊且之晢􅀆不可以常然當錫爾以老成蒼眉皓髯山立時行去敵氣與矝色􅀆噤危言以端誠俾人望之侮黷不生爾之所得孰與壯多不善處老問余而何授受而迴􅕋􅕋形開嚮之威神孰爲來哉乃􅃍衣促盥端慮滌想委珮仾簪特簿叩顙而言曰楚臣天問不詶今臣遇幸一獻三售始厚以愚終期以壽忘上問之罪濯巳然之咎心増故術腸飽新授馳神清玄拜手稽首何卜賦余旣幻惑力命之說􅀆身乆放而愈疑心回穴其莫曉􅀆將取質夫東􅀛楚人俗巫而好術􅀆叟有鬻􅁲而來思乃招而訊之曰嘻人莫不塞有時而通伊我􅀆乆而愈窮人莫不病有時而間伊我􅀆乆而滋蔓吾聞人肖五行動止有則四時轉續變於所極一歳之旱人斯具舟三月之熱人斯具裘極必反焉其猶合符子首圎而足方予腹隂而背陽胡形象之有肖而變化之殊常經曰剥極則賁居賁而未甞剥者其誰否極受㤗居否而未甞㤗者又其誰鸖胡不截鳬胡不禆䕫何罰而踸踔蚿何功而扶持紛紜恣睢交作舛馳似與似奪似信似欺孰主張之問于子􅀛􅁲者曰招我以粗問我以微有天下之是非有仁人之是非在此爲美􅀆在彼爲􅃖或昔而成或今而虧君問曷由主張其時時乎時乎去不可邀來不可逃淹􅀆孰捨操堇之毒豕苓雞首之賤毛各於其時而伯音霸其曹屠龍之伎非曰不偉時無所用莫若履狶作踊之工非曰可珍時有所用貴于斵輪絡首縻足􅀆􅂹不能跬前無所阻􅀆跛鼈千里同渉于川其時在風㳂者之吉沂者之凶同蓻于野其時在澤伊穜之利乃穋之厄故曰是耶非耶主者時耶諒淑惡之同出􅀆顧所丁之若何夫如是得非我美失非我耻其去曷思其來曷期姑蹈常而俟之夫何􅁲爲言訖執􅀛而起予退而作何􅁲賦於是􅌃道之心一而俟時之志堅内視羣疑猶氷釋然重校正唐文粹卷第八
