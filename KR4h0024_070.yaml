front:
  text: 重校正唐文粹卷第七十
  hash: sha256:bb852b48e07a7f1c0ba17bafceb3a0bf3b731e3c62d4b22dec8709719d801ebf
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0024_SBCK_070-1a}
body:
  text: 吳興姚鉉纂銘戊版文誄表附揔七首命婦二唐息國夫人墓志銘韓愈唐河南元府君夫人墓志銘白居易賢母一陶母墳版文附舒元輿隱居四東武山陳居士墓銘陳子昻居士陳公墓志銘德先生誄附李華廣陵陳先生墓表附吕溫唐息國夫人墓志銘并序韓愈貞元十五年靈州節度使御史大夫李公諱欒守邊有勞詔曰欒妻何氏可封息國夫人元和二年李公入為戶部尚書薨夫人遂專家政公之男三人女二人而何氏出者二男一女夫人教養嫁娶如一雖門內親戚不覺有纎毫薄厚御僮僕使治居第生産皆有條序居卑尊間無不順適命服在躬承祀孔時年若干元和七年甲子日南至以病卒明年八月庚寅葬河南河陽夫人曽祖某綏州刺史祖某潞州别駕父某晉州録事參軍二男戡左威衛倉曹參軍成左清道率府録事參軍女子嫁興元參軍鄭博古將葬戡與成以其事乞銘於其鄰韓愈愈乃為銘曰男主外事治不為易施于其家難甚吏治又況公侯族大而貴夫人是專厥聲惟懿昔在貞元有錫自天啓封備服以疇時勳婉婉夫人有藉宫門克承其後以嫁以婚隨葬東土在河之陽遙望公墳而不同藏唐河南元府君夫人滎陽鄭氏墓志銘并序白居易有唐元和元年九月十六日故中散大夫尚書比部郎中舒王府長史河南元府君諱寬夫人滎陽縣太君鄭氏年六十寢疾殁于萬年縣靖安里私第越明年二月十五日權祔于咸陽縣奉賢鄉洪瀆原從先姑之塋也夫人曾祖諱逺思官至鄭州刺史贈太常卿王父諱朝散大夫易州司馬父諱濟睦州刺史夫人即睦州次女也其出范陽盧氏外祖諱平子京兆府涇陽令夫人有四子二女長曰泝蔡州汝陽縣尉次曰秬京兆府萬年縣尉次曰積同州韓城縣尉次曰稹河南府河南縣尉長女適吳郡陸翰翰為監察御史次女為比丘尼名真一二女不幸皆先夫人殁府君之為比部也夫人始封滎陽縣君從夫貴也稹之為拾遺也夫人進封滎陽縣太君從子貴也天下有五甲姓滎陽鄭氏居其一鄭之勳德官爵有國史在鄭之源派婚媾有家牒在比部府君丗祿官政文行有故京兆尹鄭雲逵之志在今所敘者但書夫人之事而尼初夫人為女時事父母以孝聞友兄姊睦弟妹以悌聞發自生知不由師訓其淑性有如此者夫人為婦時元氏世食貧然以豐潔家祀傳為詒燕之訓夫人每及時祭則終夜不寐煎和滌濯必躬親之雖隆暑沍寒之時而服勤親饋面無怠色其誠敬有如此者元氏鄭氏皆大族合而姻表滋多凡中外吉凶之禮有疑議者皆質於夫人夫人從而酌之靡不中禮其明達有如此者夫人為母時府君既殁積與稹方齠齓家貧無師以授業夫人親執詩書誨而不倦四五年間二子皆以通經入仕稹既第判入等授祕書省校書郎屬今天子始踐祚䇿三科以拔天下賢俊中第者凡十八人而稹冠其首焉由校書郎拜左拾遺不數月讜言直聲動于朝廷以是出為河南尉長女既適陸氏陸氏有舅姑姻族於是以順奉上以惠逮下二紀而殁婦道不衰內外六姻仰為儀範非夫人恂恂孜孜善誘所至則曷能使子達於邦女冝其家哉其教誨有如此者既而諸子雖迭仕祿利甚薄每至月給食時給衣皆始自孤弱者次及踈賤者由是衣無常主厨無異膳親者恱踈者來故傭保乳母之類有凍餒垂白不忍去元氏之門者而況臧獲輩乎其仁愛有如此者自夫人母其家殆二十五年專用訓誡除去鞭撲常以正顔色訓諸女諸婦諸女諸婦其心戰兢如履干冰常以正詞氣誡諸子諸孫諸子諸孫其心愧恥若撻于市由是納下於少過致家於大和婢㒒終歲不聞忿爭童孺成人不識檟楚閨門之內熙熙然如太古時人也其慈訓有如此者噫昔􅃮室緹縈之徒烈女也及為婦則無聞伯宗梁鴻之妻哲婦也及為母則無聞文伯孟氏之親賢母也為女為婦時亦無聞今夫人女美如此婦德又如此母儀又如此三者具美可以冠古今矣嗚呼惟夫人之道移於他則何用而不臧乎若引而伸之可以肥一國焉則關睢鵲巢之化斯不逺矣若推而廣之可以肥天下焉則薑嫄文母之風斯不逺矣豈止於訓四子以聖善化一家於仁厚者哉居易不佞辱於夫人之幼子稹為執友故聆夫人美最熟稹泣血孺慕哀動他人託為撰述書于墓石斯古孝子顯父母之志也嗚呼斯文作豈直若是而巳哉亦欲百代之下聞夫人之風覩夫人之墓使悍妻和嚚母慈不遜之女順云爾銘曰元和歲丁亥春咸陽道渭水濵云誰之墓鄭氏夫人陶母墳版文并序舒元輿常母之道恩勝威威不勝而常子之性偏以驕出由此也偏氣襲正正氣敗績故往往恩過驕過而閨門間有觸命抵教磨去法用者相半古孟氏母警戒若此乃首以兼教軻三變而至於道去千年而陶之母亦以兼教侃侃還至於道慈容嚴嚴離立相望中央寂寥希吾或稀太歲在卯豫帆彭蠡見謝靈運詩石壁壁東南行百步許有高墳嵯峨墳前有碑書迹照湖小子蹶起疾眩視之則陶母之字存及落帆上陸修式恪禮以為父母教子大倫不逃義方然父之教主於兼之言恩威不偏勝偏失者或骨髓間有秦吳之謬故州吁石厚變為賊敵非父子邪且母之教偏在慈夫以兼教猶有嚮者之謬以偏教而無嚮者之謬或鮮矣英英哲母煦然化成成之中而能驅其子歸其有極是以陶家肥而晉家亦肥鴻聲芬馥撲染他類肯使專司晨索家之疵到吾聽乎嗚呼賢母之風可以卓往赫來為千萬年光墳版不書豈斯意邪徘徊聳慕龔成斯文詞曰彭蠡之濵峨峨高墳有晉陶君哲太夫人前瞻千年卜孟為鄰後千萬年卜誰為鄰西江悠悠東潮滔滔彭蠡有竭斯墳更高梓州射洪縣武東山陳居士之墓銘并序陳子昻君諱嗣字弘嗣其先陳國人也漢末淪喪八代祖自汝南仕蜀為尚書令其後蜀為晉所滅子孫避晉不仕居涪南武東山與唐胡白趙五姓置立新城郡部制二縣而四姓宗之世為郡長蕭齊之末有太平者兄弟三人為郡豪傑梁武帝受禪網羅英豪拜太平為新城郡守尋加本州别駕弟太樂太蒙蒙為黎州長史護督南梁二郡太守太樂為本州司馬即君之高祖父也生曾祖方慶好道不樂為仕得墨子五行祕書隱于武東山生烈祖湯仕為郡主簿遇梁季喪亂避丗不仕生皇考逈逈早卒君即逈之第二子也少孤而有純德恭已飾行一日三省家丗本以清白崇德逮君之孤素業空矣君有仁兄養母以孝君克順至行同勤苦節夏不避暑冬不避寒蒸蒸服事行年四十有五入則孝出則悌謹而信泛愛衆而親仁無餘力也以是不優於道逮親終殁春秋巳高從事不可以養矣乃輟干祿之學修養生之道山壑高居農野永歲雅聞漢有王丹者放居不仕家纍千金以自奉田稼勤者載酒從之鄉里承化以相懲沮乃歎曰彼王丹者是為政也奚其為為政也由是始考林澤闢良田習仙書務農政天道時變地道化成丘陵淵藪星歲雲物靡不用心原田莓莓黍稷漠漠汶陽之稼如雲矣春也載華歲聿其秋白露時降百榖收熟君嘗乘肩輿省農時饋田畯刑以肅墮恱以勞勤若孫吳之用兵􅋧鳥之摶擊也卓彼甫田歲取十千倉廩實崇禮節恤惸寡賑窮乏九族以親之鄉黨以歡之君十餘年家纍千金矣其鄰里有偷衣食帶刀劒椎埋胠篋之類鬪雞走狗之豪莫不靡下風馴素節曰里有仁焉吾何從之也遂頓浮窳之節肅恭儉之規修孝悌飾廉恥將欲效君子之素業也君時年巳耳順素無經丗之情林園遺老玄默忘歲遂保先君武東山之故居行不由徑非公事未嘗至於州縣也昔襄陽有龐德公谷口鄭子真東海王霸西山蜀才皆避人養德退耕求志軒冕不可得而羈憂患不可得而纍逮于我君作者五人矣於戲古者至人不利苟得不務近貴量腹而食度身而衣非其道萬鍾不足豐也非其榮五鼎不足飪也躬勤耕稼植其杖而耘不答子路之問者其豈我君之徒歟綿綿羅網冥冥高鴻躍躍竹竿穆穆幽龍其與禍敗之遼絶如胡越哉然則兩龔不免於蘭焚三老不免於薇歎其近貴利邪夫上無憂悔下無飢寒合道以制嗜欲達命以順生死仁以愛身智以養德俾爾耆而艾俾爾昌而熾君子保之以永壽考非我君乎享年八十有五太歲壬辰五月十三日考終厥命臨終誡曰啓豫手啓豫足我聞古人言珠玉而瘞之暴骸於中原古者不封不樹後代聖人易之以棺椁吾不違聖人具棺椁而巳斂以常服墳無丘壠吾將庶幾以奉先人清業也有子某等皆能祗奉遺訓聿從先志長壽二年龍集癸巳某月某朔日玄月載踰卜兆時吉始啓殯昭告奉遷於舊塋武東山之陽禮也鄉里會葬者千餘人皆涕泣號慕悲純德之不見咸曰君子殁矣人何以名陵壑不朽匪惟頌聲小子不敏請述鄉人之教其詞曰肅肅我祖國始於陳中裔淪喪泊此江濵山川隆鬱鼎氣氛氲挺生君子於鑠元真惟孝肅悌惟人善鄰樂我耕稼忘我搢紳茫茫田藪歲也其春農人肅事君子稿勤孰為夫子植杖而耘弋者何慕鴻冥高雲楚狂懼丗夷叔求仁良時終矣不考于身我異於是非隱非淪撫化隨運安排屈伸天年既沒長夜何辰聖達不免宇宙同塵桐棺三寸豈我窶貧自古有死吾從聖人嗟爾百代子子孫孫驕奢自咎天道無親思我松柏恭儉是遵我府君有周居士文林郎陳公墓志文并序公諱元敬字某其先陳國人也五丗祖太樂梁大同中為新城郡司馬生高祖方慶方慶好道得墨子五行祕書白虎七變隱於郡武東山生曽祖湯湯為郡主簿湯生祖通通早卒生皇考辨為郡豪傑公河目海口欽頤虎顔性英雄而志尚玄默羣書祕學無所不覽年弱冠早為州閭所服耆長童幼見之若大賔二十二鄉貢明經擢第拜文林郎屬憂艱不仕潛道育德穆其清風邦人馴致如衆鳥之從鳯也時有決訟不取州郡之命而信公之言四方豪俊望風景附朝廷聞名或以為西南大豪不知深慈恭懿敬讓以得也州將縣長時或為議青龍癸未唐歷之微公乃山棲絶榖放息人事餌雲母以怡其神居十八年玄圖大象無所不達嘗宴坐謂其嗣子子昂曰吾幽觀太運賢聖生有萌芽時發乃茂不可以智力圖也氣同萬里而合不同造膝而悖古之合者百無一焉嗚呼昔堯與舜合禹得之四百餘年湯與伊尹合五百年文王與太公合天下順之四百年幽厲版蕩天紀亂賢聖不相逢也老𥅆仲尼淪溺溷丗不能自昌彌四百餘年戰國如縻至於赤龍赤龍之興四百年天紀復亂胡夷奔突賢聖淪亡至於今四百年矣天意其將周復乎於戲吾老矣汝其志之太歲己亥享年七十有四七月七日巳未隱化于私宫孤子子昂愚昧鞠然在疚不知所從乃祗馴聖人卜宅之義是歲十月巳酉遂開拭舊塋奉寧神於此山石仙谷之中岡也銘曰賢者避地邈其往兮鳯兮鳯兮誰能象兮嗚呼我君懷寶不試孰知其深廣兮悠悠白雲自怡養兮大運不齊聖賢同兮南山四君遭漢天子固亦啇丘之遺壤兮德先生誄并序李華或問曰德先生者奚氏余曰南陽張姓有略其名維之其字也或曰與古誰倫可簉七十子乎余曰七十子或賢或恆人方於賢原思宓不齊比也或曰大哉余曰七十子親聖人之道者也維之追聖人之道者七十子得聖人疆畛之際維之聖人衣冠之潤向使獲親聖人則鱗差耕雍也或曰何咎而瞽余曰聖賢皆時春秋之亂冉耕惡疾左丘明卜商皆瞽聖如夫子失司寇飢於陳蔡忠如萇弘謀尊王室而戮死君子道消故仁賢窮維之鄰道昌黎韓拯亦以德聞與維之同病不幸二子不以病為僉不喪中明者也或曰夫如是得無誄之余誄之曰神胡病後之人而奪先生噫嘻哀夫人德甫余將疇兄廣陵陳先生墓表吕溫有唐貞晦先生廣陵郡棠邑鄉陳君曰融無字享年七十有二遊不出鄉考終厥命嗚呼至哉良玉雖白不受采醴泉自甘非有和貞色縝密丹青無自入也靈味天成麴蘖無所資也故先生長而不學大朴不適乎輪轅至音不諧乎宫商曲直渾成巧匠莫能材也清濁一致伶倫莫能器也故先生老而不仕地虛而踐則有迹器踈而扣則成聲我踐惟實迹不可得而見也我扣惟密聲不可得而聞也故先生沒而不稱若夫為養克孝居喪致毀事亡如存朋友孜孜兄弟怡怡於鄉恂恂與物熙熙天性人道其盡于兹何必讀書然後為學知命是達怡神為榮樂天忘憂自寵不驚貴我以道此非祿乎何必入官然後為仕我有信順自天蓋高亦既知矣謂神蓋幽亦既聞矣何必俗聲然後為名大哉先生行不學之道據不仕之貴負不稱之名達人觀焉斯亦極矣豫貞元初寓居是邑言歸京國道出其鄉始見一鄉之人父義子孝長惠幼敬見乎詞氣發乎顔色不聞忿爭之聲不見傲慢之容雍雍穆穆甚足異也因揣之而歎曰芳蘭所生其草皆香美玊所積其山有光此鄉之人豈必盡仁其必有賢者生於是矣遂停車纍日周訪故老果曰吾里嘗有陳融孝慈仁信不學不仕鄉人見也皆自欲遷善逺罪亦不知其所以然今也則亡清風猶在豫於是慨然痛先生以純德至行沈落光耀官闕軾廬之禮士無表墓之文知而不書我執其咎乃披典校德諡曰貞晦先生窮徴其實建石于路用告將來之有識者云爾貞元五年秋八月東平吕溫述重校正唐文粹卷第七十嘉靖甲申歲太學生姑蘇徐焴文明刻于家孰
