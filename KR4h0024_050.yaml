body:
  text: 呉興姚鉉纂碑一揔六首嶽瀆祠廟后土神祠碑玄宗御製張説辭西嶽太華山碑玄宗御製張詵辭北嶽恒山碑張嘉貞南海神廟碑韓愈黃陵廟碑燕支山神寧齊公祠堂碑楊炎后土神祠碑銘并序玄宗御製張說辭古之王者皆受天命禮樂有權神祇是主郊兆所設雖定於厥居精靈所感則通乎變化大匠歸正旁行不流惟創制者爲能之亦安在守文而巳睢上祠者本魏地鄈丘之舊而漢家后土之宫汾水合河梁山對麓地形堆阜天然詭異隆崛岉而特起怱盤紆而斗絶景象相傳肸蠁如在有物不可以終否有典不可以遂廢故推而行之歲在癸亥始有事于兹焉在昔后王時邁省方柴燎告至幽隱胥洎大舜則五載一巡武帝則三歲一祭今時代丕變人神禮煩朕就爲損益折以法度一紀再駕亦無闕焉二十年冬勒兵逾萬騎旌旗亘千里校獵上黨至干太原赫威戎於朔陲沛展義於南夏肆覲羣后道有以大備懷柔百神文無而咸秩先是有司宿設恪敬乃事巳未師頓于齋宫庚申親祀于后祇聖考在天侑而作主何禮不舉靡神不徧往者漢氏之祠也牲以養牛五歲絸栗無所責其誠籍以采席六重藁秸不得尚其質事與古反義不經見朕因其地而不因其儀取其得而不取其失凡牲幣法物之事歌舞接神之類咨故實於方澤不遂過於元鼎此皆公卿大夫鴻生鉅儒獻其方聞匡於不逮朕何有也且王者事天明事地察示其本敎以孝柰何郊丘之禮猶獨以祈榖爲名者邪於戲享于至誠錫以繁祉黃雲蓋於神鼎絳光燭於靈壇自昔巳然乃今復見斯固隂精有所寓寶氣爲不誣雖寂寥而不動亦動之而斯應顧朕之不德靈感何從賴累聖儲祉福流所致乃眚災肆赦與物更始大賚天下有慶兆人山川鬼神鳥獸魚鼈莫不允若莫不咸寧此所以仰覆載報生殖資元元盡翼翼豈與夫封禪有牒專在求遷祕祝有辭密於移過而巳銘曰至哉坤元萬物資生王者母事德合天明義有大報用恊永貞茫茫九土思索其精因天事天因地事地彼汾之曲高睢傑異景象遺光壇場舊位寂寥千祀精靈長閟誣神不祥復古維祺文所無者秩而祭之矧曰后土昔載明祠何必因隂乃爲我師意多漢武跡在橫汾風流可接簫鼔如聞壽宫創制神鼎勒勲古往今來豈無斯文西嶽太華山碑銘并序玄宗御製張說辭天有四序星辰辨其分地有五方山嶽鎭其域隂陽交暢則品物形矣精氣相射則神祇著矣西嶽太華山者當少隂用事萬物生華故曰華山踞中土西偏當七宫正位是稱西嶽披圖以察削成而四方信焉立表以筭其高五千仞明焉石壁磔堅而雄竦衆山奔走而傾附其氣肅其勢威其行配金其辰直酉前對華陽之國後壓華隂之郡左抱桃林之塞右産藍田之玉諒少昊之下都即蓐收之别館也軒帝遊焉以㑹衆神虞舜柴焉以覲羣后爰自夏氏迄于隋室朝廷五姓載歷三千祀典相因舊章未改壇場廟宇何代不修一禱三祠無歲而缺所以報生殖事靈神不有怠也故亦祥休明災淫慝未甞爽也皇天眷祐馨我烈祖奄有萬方逮乎六葉郊天地望山川精意必達墜典咸甄亦命州將四時告䖍加視王秩進號金天若是何者抑有由焉予小子之生也歲景戍月仲秋膺少昊之盛德恊太華之本命故常寤寐靈嶽肸蠁神交玉帛未陳幽賛必先意而啓椒醑雖薄景福果應期而集玄感昭賽可一二而道邪記云下有方士眞人金鼎石室上有明星玉女仙草瑶池茅龍一去毛女千祀前代帝王多所僥覬朕學犠文之道故非斯人之徒憂在至道之不弘不憂富貴之無永患在蒼生之不理不患年壽之若流以功施四海爲長生以業傳百代爲不死焉羡置集靈之宮虚望非福立存仙之殿勞思輕學者哉於戲維嶽配天上弼予志予欲大康兆人嶽翼予欲定禮樂諧神人嶽聽予思其維嶽降神生此多士無俾申甫專美于嵩語酌古訓心通神境善而不荅誠而不應未之有也嶽其念哉十有一載孟冬之月歩自京邑幸于洛師停鑾廟下清眺仙掌雲拂石牀霓裳可接風過松嶺仙駕如聞乆勤報德之願未暇封崇之禮遟迴刻石梗槩銘山萬姓瞻予言可復也銘曰巉巉大華柱天直上靑崖白谷仰見靈掌雄峯峻削菡萏森爽是曰靈嶽衆山之長白帝西下黃河北來隂陽孕育精氣徘徊偶聖呈瑞逢昏降災玉池神挹石室僊開海絶瀛洲天遥玄圃偉哉此鎭崢嶸中土鬼神乍遊風雲忽聚高標爀日半壁飛雨自古王者巡方必至龍駕帝服封天禪地南靣㑹神西后在位待予治國安人然後徐思其事北嶽恒山碑銘并序張嘉貞有國者殷薦于天地望秩山川故災汵不生矣有家者嚴禋于鬼神克諧禮樂故休祐斯應矣由是上下交泰幽明相恊五精同朗辰爲水其味鹹五鎭俱淸恒爲冬其音羽大哉兹嶽殊於衆山嵩華乃跼於近甸衡岱不踰於方域孰與夫包括綿長經綸中外外夷有四昴宿主胡則延袤以限之中郡有五寶符在代則高襄以臨之其頂也上扶乾門黒帝之宫觀其足也下捺坤軸玄神之都府豈止劈兾魏截幽燕拒洪河撑大海澒洞合沓半天下之襟帶嵯峨巉巖一宇内之標格者也故知惟土有精惟山有靈窅窅冥冥其道至平其德至貞氲氲馨馨目之不覩夫形耳之不聞夫聲隂陽不測夫奥所以存像設建祠庭矣稽彼上古洎乎中運五載巡狩百神懐柔皇王令典以之恊祚歷數昌期以之交泰粤自嬴漢爰逮周隋匪脩匪䖍或僭或侈不勤於省者其政缺非美而封者其事訛於戲黷祭虚陳昭靈罔荅更張禮秩固待雍熈粤若我唐正百王頽敎龔惟我后揚五聖丕烈人神允洽動植和暢乃籍北鎭柴南壇碑西嶽泥東岱是用告厥功祗其祠也故穰穰多福獲於彼顒顒衆心徯於此而今獫狁不熾巳方餘辰邊隅於是乎靜雨雪其滂乃屢盈尺稼穡於是乎豐豐歲已成惟君能事斯北巡之禮胥詠其蘇雖黝輅纁旂未由冬覲而圎珪方璧每自天來或事舉必祈福行宜賽則有公卿而奉告命也或四時薦熟三獻酌洗則有侯牧而奉新章也非夫昭信雄直豈有享於明代哉是以河朔人風潔誠而禱𧖟榖者多矣春秋孟冬首三之日尤劇蘋藻自羞若從官歛樵蘇不禁孰敢私伐蓋威靈感通以致爾與其淫淊而求者異乎夫道莫先乎眞政莫先乎淳參造化以變萬物莫先乎神資皇王以富四海莫先乎人護神莫先乎君公正人莫先乎師長景寅歲乃命菲才謬兼軍郡欽若明詔持兵導俗無敢懈怠名山大川著乎典式靡不加敬於昭神寢于嶽之陽伊嶽致神惟神主嶽高柯古榦幽蔚隂翳俯仰瞻對精魄肅慕慄然何爲故以嗟歎嗟歎之不足於是詠歌歌以發言言以章德事可追於風雅詞無隱乎聞見神而聽之頌斯作曰五宿熒煌風政休咎上經乎乾綱我君順之祚乃乆兮五宗盤薄隂化成敗下彰乎坤絡我君欽之福乃介兮天平地成神道助貞人事以寧兮皇極帝力神道助直人事以息兮禎祥日新旣祠旣禋國力斯春兮風雨時若是耕是穫家勤於作兮至神通兮昭冥恊和至道黙兮勤敡頌歌大恒如礪明德惟峩南海神廟碑文韓愈海於天地間爲物最鉅自三代聖王莫不祀事考於傳記而南海神次最貴在北東西三神河伯之上號爲祝融天寶中天子以爲古爵莫貴於公侯故海嶽之祀犠幣之數放而依之所以致崇極於大神今王亦爵也而禮海嶽尚循公侯之事虚王儀而不用非致崇極之意也由是冊尊南海神爲廣利王祝號祭式與次俱升因其故廟易而新之在今廣州治之東南海道八十里扶胥之口黃木之灣常以立夏氣至命廣州刺史行事祠下事訖驛聞而刺史常節度五嶺諸軍仍觀察其郡邑於南方事無不統地大以逺故常選用重人旣貴而富且不習海事又當祝時海常多大風將徃皆憂慼旣進觀顧怖悸故常以疾爲解而委事於其副其來巳乆故明宫齋廬上雨旁風無所蓋障牲酒瘠酸取其臨時水陸之品狼籍籩豆薦祼興俯不中儀式吏滋不恭神不顧享盲風怪雨發作無節人蒙其害元和十二年始詔用前尚書右丞國子祭酒魯國孔公爲廣州刺史兼御史大夫以殿南服公正直方嚴中心樂易祗愼所職治人以明事神以誠内外殫盡不爲表襮至州之明年將夏祝冊自京師至吏以時告公乃齋祓視冊誓羣有司曰冊有皇帝名乃上所自署其文曰嗣天子某謹遣某官敬祭其㳟且嚴如是敢有不承明日吾將宿廟下以供晨事明日吏以風雨白不聽於是州府文武吏士凡百數交謁更諌皆揖而退公遂陞舟風雨少弛櫂夫奏功雲隂解駮日光穿漏波伏不興省牲之夕載暘載隂將事之夜天地開除月星明穊五鼓旣作牽牛正中公乃盛服執笏以入即事文武賔屬俯首聽位各執其職牲肥酒香樽爵靜潔降登有數神其醉飽海之百靈祕怪恍惚蜿蜿蜒蜒來慕飲食闔廟旋艫祥颷送颿旗纛旄麾飛揚晻藹鐃鼓嘲轟高管噭譟武夫奮棹工師唱和穹龜長魚踊躍後先乾端坤倪軒豁呈露祀之之歲風災熄滅人厭魚蟹五榖胥熟明年祀歸又廣廟宫而大之治其庭壇改作東西兩序齋庖之房百用具修明年其時公又固往不懈益䖍歲仍大和耊艾歌詠始公之至盡除他名之稅衣食於官之可去者四方之使不以資交以身爲帥燕享有時賞與以節公藏私畜上下與足於是免于屬州負逋之緡錢十有八萬未八萬二千斛賦金之州耗金一歲八百困不能償皆以丐之加四面守長之俸誅其尤無良不聽令者由是皆自重愼法之士之落南不能歸者與流徙之胄百二十八族用其才良而廩其無告者其女子可嫁者與之錢財令無失所時刑德並流方地數千里不識盜賊山行海宿不擇處所事神治人可謂備至矣咸願刻廟石以著厥美而繫以詩乃作詩曰南海隂墟祝融之宅即祀于旁帝命南伯吏惰不躬正自令公明用享錫祐我家邦惟明天子惟愼厥使我公在官神人致喜海嶺之陬旣足旣濡胡不均弘俾執事樞公行勿遟公無遽歸匪我私公神人具依黃陵廟碑韓愈湘旁有廟曰黃陵自前古立以祠堯之二女舜二妃者庭有碑斷裂分散在地其文剥缺考圖記言漢荆州牧劉表景升之立題曰湘夫人碑今驗其文乃晉太康元年又題其額曰虞舜二妃之碑非景升立者秦愽士對始皇帝云湘君者堯之二女舜妃者也劉向鄭玄亦皆以二妃爲湘君而離騷九歌旣有湘君又有湘夫人王逸之解以爲湘君者自其水神而謂湘夫人乃二妃也從舜南征三苗不返道死沅湘之間山海經云洞庭之山帝之二女居之郭璞疑二女者帝舜之后不當降小君爲其夫人因以二女爲天帝之女以余考之璞與王逸俱失也堯之長女娥皇爲舜正妃故曰君其二女英自宜降曰夫人也故楚辭謂娥皇爲君謂女英爲帝子各以其盛者推言之也禮有小君君母明其正自得稱君也書曰舜陟方乃死孔安國謂舜升道南方以死或又曰舜死葬蒼梧二妃從之不及溺死沅湘之間余謂竹書記年帝王之後皆曰陟陟升也謂升天也書曰殷禮陟配天言以道終其德恊天也書紀舜之没云陟者與竹書周書同文也其下言方乃死者所以釋陟爲死也地之勢東南下如言舜南巡而死冝言下方不得言陟方也以死謂舜死葬蒼梧於時二妃從之不及而溺死者皆不可信也二妃旣曰以謀語舜脫舜之厄成舜之聖堯死而舜有天下爲天子二妃之力冝常爲神食民之祭今之渡湖江者莫敢不進禮廟下元和十四年春余以言事得罪黜爲潮州刺史兹地於漢實南海之掲揚癘毒所聚懼不得脫死過廟而禱之其冬移袁州刺史明年九月拜國子祭酒使以私錢十萬抵嶽州願易廟之圯墉腐瓦於刺史王堪長慶元年刺史張愉自京師往與愉故善因謂曰丐我一碑石載二妃廟事且令後世知有子名愉曰諾旣至州報曰碑謹具篆其事俾刻之大唐燕支山神寧濟公祠堂碑楊炎西北之巨鎭曰燕支本匈奴王庭昔漢武納渾邪開右地置武威張掖而山界二郡之間連峯委㑹雲蔚黛起積高之勢四向千里陽崖有栝栢之材備簳革隂壑有堅剛之璞化五兵維人氣雄其畜多馬虜得之以制隂國主天街周以之興秦以之霸漢得之以斷右臂郤南牧西距于海北經于河自外而望上也雄雄乎一氣旁廕朔鹵前衝塞門與積石來朝崐崘相負洎陟蒼蒼臨峻極則形變六合空同大荒靑冥在混元之中絶壁揭宇宙之外舊史云封祀之山八中國之外三自夏缺秩奠漢攘疆土于時更而王者莫能配天其意者將纉禹之業以俟聖人乎維唐之三十載賁玄化之紀息金革之墟蠢蠢蒸然萃于聖澤於是左丹穴右崆峒古所未賔咸頓首於路門之外天子登神宫勒金板將復義于羣嶽告成于旻蒼議云此山天合氣以正秋方地與神而主戎國俾蚪螭者爲師爲旅貔虎者爲妾爲臣不在於巨靈乎其封禪爲寧濟公錫之鞶帶備厥禮物詔邦牧太子少保哥舒公卜吉日築靈祠于高麓之陽毎歲盛秋以笙鏞之器錡釜之品率封内以望之索羣神以會之旄頭弩牙金鼓七校車徒十萬從饗于廟庭大閱于山所以因天界以崇聖功垂地險以恢逺略也觀夫叢巖懸抱煙雨屑窣宫庭晃其角暮林石古而幽隂神其居之可以禱安靜矣拊空桑變鍾石神其聽之可以感和樂矣大玉通帛熊蹯桂漿粲其傾筐采物煌煌神其歆之可以祚有年矣維石巖巖日月不老維靈是與生此熊羆神其薦之可以奉吾君矣於戲陳信克享正祠幽感宜乎有祈而降有祭而歆龍也無風雨之愆敵也無氣焰之作此神之職又何羞焉而作頌曰揭靈山兮天地界勢奔突兮風雲駭峯蹲龍兮入天門氣變蛇兮煙嵐昏祐自天兮得終古備華蟲兮駕朱虎重校正唐文粹卷第五十嘉靖甲申歲太學生姑穌徐焴文明刻于家塾
