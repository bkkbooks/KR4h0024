  - {type: variant, offset: 0, length: 158, content: 重校正唐文粹卷第七十八吳興姚鉉纂箴誡銘揔四十一首箴二十五大寶箴張藴古丹扆箴六首并序李徳裕瑞箴孫朴兵箴梁肅太倉箴李商隱獄箴張說縣令箴古之竒縣令箴元結五箴并序韓愈動靜二箴皮日休口箴姚元崇視聽箴沈顔自箴元結行已箴李翺暗室箴歐陽詹誡八三誡并序柳宗元冰壷誡姚元崇執秤誡韓愈執鏡誡守誡敵誡柳宗元銘八幾銘權徳輿門銘盧仝二銘并序羅衮, WYG: ''}
