seq: 15
front:
  text: 送李觀韓愈别兼獻張徐州孟郊
  hash: sha256:37ba66ccc07136e51c84f802423a77abfded397f6f4c63bc007088fb4abffc0b
body:
  text: 送狄宗亨王昌齡送孟浩然之廣陵李白送客陳子昻送唐次武元衡送皇甫湜赴舉馬異送張宗原姚合送綦母濳落第還鄉王維送暨道士還玉清李頎淇上别趙仙舟王維送沈秀才下第東歸賈島崔九弟欲徃南山王維同前裴迪贈别沈四逸人髙適留别王維翟興宗送豆盧策歸别墅孟郊送桞淳入闗四皓詩李白白髮四老人昻藏南山側偃卧松雲間𠖇翳不可識雲窗拂青靄石壁横翠色龍虎方戰爭於焉自休息秦人失金鏡漢祖昇紫極隂虹濁太陽前星遂淪匿一行佐明聖欻起生羽翼功成身不居舒巻在胷臆窅㝠合元化茫昧信難測飛聲塞天衢萬古仰遺跡頴陽東谿懷古崔曙靈谿氛霧歇皎鏡清心顔空色不映水秋聲多在山世人久踈曠萬物皆自閑白鷺寒更浴孤雲暗未還昔時讓王者此地閉𤣥闗無以躡髙歩凄凉林壑間登郭隗臺皇甫松燕相謀在茲積金黄巍巍上者欲何顔使我千載悲歸沛縣道中晚泊留侯城劉長卿訪古此城下子房安在㢤白雲去不返危堞空崔巍伊昔楚漢時頗聞經濟才運籌風塵下能使天地開蔓草日己積長松日己摧功名滿青史祠廟唯蒼苔百里暮程逺孤舟川上迴進帆東風便轉岸前山來楚州澹相引沙鷗閒不猜扣舩從此去延首仍徘徊鴻門醼王轂寰海沸兮爭戰苦風雲愁兮㑹龍虎四百年漢欲開基項莊一劒何虛舞殊不知人心去暴秦天意歸真主項王足底踏漢土席上相看渾未悟古泉驛於陵仲子宅也張說昔聞陵仲子守義辭三公身賃妻織屨樂亦在其中豈無窮賤苦羞與傾巧同長白臨河上於陵入濟東我今行至此感歎石泉空嚴子陵釣臺下作權德輿絶頂聳蒼翠清湍石磷磷先生晦其中天子不得臣心靈棲顥元纓冕猶緇塵不樂禁中卧却歸江上春濳驅東漢風日使薄者醇焉用佐天下持此報故人則知大賢心不獨私其身弛張有深致耕釣陶天真奈何清風後擾擾論屈伸交情同市道利欲相紛綸我行訪遺臺仰古懷逸民矰繳鴻鵠逺雪霜松桂新江流去不窮山色凌秋旻人世自今古清輝照無垠吳中懷古劉駕勾踐飲膽日吳王酒滿盃笙歌入海雲聲自姑蘇來西施舞初罷侍兒整金篦衆女不敢妬自比泉下泥越皷聲騰騰吳王隔黄池難將甬東地更學㑹稽棲故絳行杜頠君不見銅鞮觀數里城池已蕪漫君不見祈虒宫㡬重臺榭亦微濛介馬兵車全盛時歌童舞女妖艷姿一代繁華皆共絶九原唯望塚纍纍郢城懷古李百藥客心悲暮序登墉瞰平陸林澤窅芊綿山川鬱重複王公資設險名都距江隩方城次北門溟海窮南服長策挫吳豕雄圗競周鹿大蒐雲夢掩壯觀章華築南風忽不競西師日侵蹙運圯屬驅馳時屯恣敲扑莫救夷陵火無復秦庭哭鄢郢遂邱墟風塵俄慘黷狐兎時遊踐霜露日霑沐釣渚故地平神臺層宇覆陣雲埋夏首窮隂慘荒谷悵矣洲壑遷悲㢤年祀倐雖異三春望終傷千里目題西施浣紗石胡幽貞一朝入紫宫萬古遺芳塵至今溪邊花不敢嬌青春鄴城懷古孟雲卿朝發淇水南將尋北燕路魏家舊城闕寥落無人住伊昔天地屯曹公獨中據羣臣將北面白日忽西暮三臺竟寂寥萬世難長固雄豪安在㢤衰草霑霜露崔巍長河北尚想應劉墓古樹藏龍蛇荒茅伏狐兎永懷故池館數子連章句逸興驅山河雄辭變雲霧我行覩遺跡精爽如相遇斗酒將酹君悲風白楊樹三君詠并序髙適開元中適游於魏郡北有故太師鄭公舊館里中有故尚書郭公遺業邑外又有故太守狄公生祠焉覩物増懷遂為三君詠魏鄭公徴鄭公經綸日隋氏風塵昏濟代取髙位逢時敢直言道光先帝業義激舊君恩寂寞卧龍處英靈千載魂郭代公元振代公實英邁津涯浩難識權兵抗矯徴仗節歸有德縱横負才智顧盻安社稷流落勿重陳懷㢤為悽惻狄梁公仁傑梁公乃貞固勲烈垂竹帛昌言太后朝濳運儲皇策待賢開相府共里登方伯至今青雲人猶是門下客七愛詩并序皮日休皮子之志常以真純自許每謂立大化者必有真相以房杜為真相焉定大亂者必有真將以李太尉為真將焉傲大君者必有真隠以盧徴君為真隠焉鎮澆俗者必有真吏以元魯山為真吏焉負逸氣者必有真放以李翰林為真放焉為名臣者必有真才以白太傅為真才焉嗚呼吾之道時耶行其事也在乎愛忠矣不時耶行其事也亦在乎愛忠矣茍有心歌詠者豈徒然㢤房杜二相國吾愛房與杜貧賤共聨歩脫身抛亂世策杖歸真主縱横握中算左右天下務骯髒無敵才磊落不世遇美矣名公卿魁然真宰輔黄閣三十年清風一萬古巨業照國史大勲鎮王府遂使後世民至今受陶鑄粤吾少有志敢躡前賢路茍得同其時願為執鞭豎李太尉晟吾愛李太尉崛起定中原驍勇十萬兵四􅆕圍國門一戰收三畿一叱散妖氛乗輿既反正兇豎爭亡魂巍巍柱天功蕩蕩蓋世勲仁於曹孟德勇過霍將軍丹劵入帑藏青史傳子孫所謂大丈夫動合驚乾坤所謂聖天子難得忠貞臣下以契魚水上以合風雲百世必一亂千年方一人吾雖翰墨子氣槩敢不羣願以太平頌題向甘泉春盧徴君鴻吾愛盧徴君髙卧嵩山裏百辟未一顧三徴方暫起坦腹對宰相岸幘揖天子建禮門前吟金鑾殿裏醉天下皆哺糟徴君獨絜己天下皆樂聞徴君獨洗耳天下皆懷羞徴君獨多耻銀黄不妨懸赤紱不妨被而於心抱中獨作羲皇地籃轝一云返泥詔褒不己再看緱山雲重酌嵩陽水放曠書裏終逍遥醉中死吾謂伊與周不若徴君貴吾謂巢與許不若徴君義髙名無階級逸迹絶涯涘萬世唐書中逸名不可比粤吾慕真隠彊以骨肉累如教不為名敢有徴君志元魯山吾愛元紫芝清介如伯夷輦母逺之官宰邑無㸃疵三年魯山民豐稔不暫饑三年魯山吏清慎各自持只飲魯山泉只採魯山薇一室氷蘗苦四逺聲光飛退歸舊隠來斗酒入茅茨雞黍匪家畜琴罇常自怡盡日一菜食窮年一布衣清似匣中鏡直如琴上絲世無用賢人青山生白髭既卧黔婁衾空立陳寔碑吾無魯山道空有魯山辭所恨不相識援毫空涕垂李翰林吾愛李太白身是酒星魄口吐天上文跡作人間客磥砢千丈林澄澈萬尋碧醉中草樂府十幅筆一息召見承明廬天子親賜食醉曽吐御床傲㡬觸天澤權臣妬逸才心如斗筲窄失恩出内署海岳甘自適刺謁戴接䍦赴宴着穀屐諸侯百歩迎明君九天憶竟遭腐脅疾醉魄歸八極大鵬不可籠大椿不可摘蓬壺不可見姑射不可識五岳為辭鋒四溟作胷臆惜㢤千萬年此俊不可得白太傅吾愛白樂天逸才生自然誰謂詞翰器乃是經濟賢欻從浮豔詩作得典誥篇立身百行足為文六藝全清望逸内署直聲驚諌垣所刺必有思所臨必有傳忘形任詩酒寄傲遍林泉所望握文柄所希持化權何期遇訾毁中道多左遷天下皆汲汲樂天獨怡然天下皆悶悶樂天獨捨旃髙吟辭兩掖清嘯罷三川處世似孤鶴遺榮同蛻蟬仕若不得志可為龜鏡焉陽城驛元稹商有陽城驛名同陽道州陽公没已久感我淚交流昔公孝父母行與曽閔儔既孤善兄弟兄弟和且柔一夕不相見若懷三歲憂遂誓不婚娶没齒同衾裯妹夫死他縣遺骨無人收公令季弟徃公與仲弟留相别竟不得三人同逺遊共負他鄉骨歸來藏故邱棲遲居下邑邑人無茍偷里中競長短來問劣與優官刑一朝耻公短終身羞公亦不遺布人自不盗牛問公何德爾忠信先自修發言當道理不顧黨與讎聲香漸翕習冠盖若雲浮少者從公學老者從公㳺往來相告報縣尹與君侯名落公卿口湧如波薦舟天子得聞之書下再三求書中願一見不異旱地蚪何以持為聘束帛藉琳球何以持為御駟馬駕安輈公方伯夷操事殷不事周我實唐士庶食唐之田疇我聞天子意安敢專自由來為諌大夫朝夕侍冕旒希夷惇薄俗密勿獻良籌神醫不言術人瘼曽暗瘳月請諌官俸諸弟相對謀皆曰親戚外酒散目前愁公云不有爾安得此嘉猷施餘盡酤酒客來相獻酬日旰不謀食春深仍弊裘人心良慼慼我樂獨油油真元歲云暮朝有曲如鈎風波勢奔蹙日月光綢繆齒牙屬為猾禾黍暗生蟊豈無司言者肉食吞其喉豈無司搏者利柄扼其韝鼻復勢氣塞不可辨薫蕕公雖未顯諌惴惴如患瘤飛章八九上皆若珠暗投炎炎日將熾積燎無人抽公乃率其屬決諌同報讎延英殿門外扣閣仍叩頭且曰事不止臣諌誓不休上知不可遏命以美語酬降官司成署俾之為贅疣姦心不快活擊刺礪戈矛終為道州去天道意悠悠遂令不言者反以言為訧喉舌坐成木鷹鸇化為鳩避權如避虎冠豸如冠猴平生附我者詩人稱好逑私來一執手恐若墜諸溝送我不出户决我不迴眸唯有太學生各具糧與糇咸言公去矣我亦去荒陬公與諸生别歩歩駐行騶有生不可訣行行過閩甌為師得如此得為賢者不道州聞公來皷舞歌且謳昔公居夏邑狎人如狎鷗况自為刺史豈復援皷桴滋彰一時罷教化天下遒炎瘴不得老英華忽己秋有鳥哭楊震無兒悲鄧攸唯餘門弟子列樹松與楸今來過此驛若弔汨羅洲祠曹諱羊祜此驛何不侔我願避公諱名為避賢郵此名有深意蔽賢天所尤吾聞𤣥元教日月𠖇九幽幽隂蔽翳者永為幽翳囚奉同徐侍郎五雲谿新亭重陽宴集作獨孤及萬峯蒼翠色雙谿清淺流已符東山趣況值江南秋白露天地肅黄花門舘幽山公惜美景肯為芳罇留五馬照池塘繁絃催獻酬風前孟嘉帽乗興李膺舟騁望傲千古當歌遺四愁豈令永和人獨擅山隂遊髙軒過李賀華裾織翠青如葱金環壓轡摇玲瓏馬蹄隠耳聲隆隆入門下馬氣如虹云是東京才子文章鉅公二十八㝛羅心胷元精烱烱貫當中殿前作賦聲摩空筆補造化天無功厖眉書客感秋蓬誰知死草生華風我今垂翅附𠖇鴻他日不羞虵作龍郡中與諸文士讌集韋應物兵衛森畫㦸宴寢凝清香海上風雨至逍遥池閣涼煩痾正消散嘉賓復滿堂自慙居處崇未覩斯民康理㑹是非遣性達形迹忘鮮肥屬時禁蔬果幸見嘗俯飲一盃酒仰聆金玉章神歡體自輕意欲凌風翔吳中盛文史羣彦今汪洋方知大藩地豈曰財賦疆淮南秋夜呈周偘李嶷天淨河漢髙夜閒砧杵發清秋急如此離恨應難歇風亂池上螢露光竹門月與君共遊處勿作他鄉别夜飲東亭宋之問春水鳴大壑皓月吐層岑岑壑景色佳慰我逺遊心闇芳足幽氣驚棲多衆音髙興南山曲長謡横素琴讌客詞張籍上客不用顧金羈主人有酒君莫違請君㸔取園中花地上漸多枝上稀山頭樹緑不見石谿水無風應更碧人人齊醉起舞時誰覺翻衣與倒幘明朝花盡人已去此地獨來空遶樹過賈六蘇晉主人病且閒客來情彌適一酌復一笑不知日將夕昨來屬歡遊於今盡成昔努力持所趣空名定何益送渾將軍出塞髙適將軍族貴兵且强漢家已是渾邪王子孫相承在朝野至今部曲燕支下控絃盡用隂山兒臨陣常騎大宛馬銀鞍玉勒繡鍪弧毎逐嫖姚破骨都李廣由來先將士衛青未肯學孫吳傳有沙埸十萬騎昨日邊庭羽書至城頭畫角三四聲匣裏寶刀晝夜鳴意氣能甘萬里去辛勤動作一年行黄雲白草無前後朝望旌旗夕刁斗塞下應多俠少年闗西不見春楊栁從軍但問所從誰擊劒酣歌當此時逺别無輕繞朝策平戎早寄仲宣詩送郭大夫再使吐蕃張說犬戎廢東獻漢使馳西極長策間酋渠猜阻自夷殛容髮徂邊歲旌裘弊海色五年一見家妻子不相識武庫兵猶動金方事未息逺圗俟才智苦節輸筋力脱刀贈分手書帶加飡食知君萬里侯立功在異域送張舍人之江東李白張翰江東去正值秋風時天晴一鴈逺海闊孤帆遲白日行欲暮滄波杳難期吳洲如見月千里幸相思吳興送梁補闕歸朝賦得荻花朱長文栁家汀洲孟冬月雲寒水清荻花發一枝特贈朝天人願比蓬萊殿前雪送周愿判官歸嶺南姚係早蟬望秋鳴夜琴怨離聲眇然多異感值子江山行由來重義人感激事縱横徃復念遐阻淹留慕平生晨奔九衢餞暮始萬里程山驛風月樹海門烟霞城易綃泉源近拾翠沙溆明蘭蕙一為贈貧交空復情送韓愈從軍孟郊志士感恩起變衣非變性親賓改舊觀僮僕生新敬坐作羣書吟行為孤劒詠始知出處心不失平生正淒淒天地秋凛凛軍馬令驛塵時一飛物色極四浄王師既不戰廟略盡無競王粲有所依元瑜初應命一章諭檄明百萬心氣定今朝旗鼓前笑别大夫盛送王昌齡赴江寧岑參對酒寂不語悵然悲送君明時不得用白首徒攻文澤國從一官滄波㡬千里羣心滿天闕獨去過淮水舊家富春渚常憶卧江樓自聞君欲行頻夢南徐州窮巷獨閉門寒燈静深屋北風吹微雪抱被肯同㝛君今到京口正值桃花時舟中饒孤興湖上多新詩濳虯且深蟠黄鶴舉未晚惜君青雲氣努力加飱飯送李十一尉臨谿常建泠泠花下琴君唱渡江吟天際一帆影預懸離别心以言神僊尉因致瑶華音迴軫撫商調越谿澄碧林奉送韋起居老舅百日假滿歸嵩陽舊居權德輿威鳯翔紫氛孤雲出寥天竒彩與幽姿縹緲皆自然嘗聞陶唐氏亦有巢許全以茲聳風俗豈必效羇牽大君遂羣方左史蹈前賢振衣去朝市賜告歸林泉滑和固難久循性得所便有名皆畏途無事乃真筌舊壑窮杳窱新潭漾淪漣巖花落又開山月缺復圎輕策逗蘿逕幅巾凌翠烟機閒魚鳥狎體和芝术鮮四皓本避難二疏猶待年况今寰海清復此鬢髮𤣥顧慙纓上塵未絶區中縁齊竽終自退心寄嵩峯巔送從叔簡孟郊長安離别道宛在東城隅寒草根未死愁人心已枯促促水上影遥遥天際途生隨昏曉中皆被日月驅北驥繞山岳南帆指江湖髙蹤一超忽千里在須㬰感别從叔簡再東歸去年車馬道髙槐結浮隂下有名利人一人千萬心黄鶴共逺語滄溟無近潯苦苦靜退姿泠泠思歸吟菱唱忽生聽芸書迴望深清風散言笑餘花綴衣襟獨恨魚鳥别一飛將一沈送弟郢東歸爾去東南夜我無西北夢誰言貧别易貧别愁更重曉色奪明月征人逐羣動春風楚濤髙旅榜將誰共盧十五竹亭送姪偁歸山楊衡落葉寒擁壁清霜夜霑石正是憶山時復送歸山客殷勤一樽酒曉月當窻白送李觀韓愈别兼獻張徐州孟郊富别愁在顔貧别愁銷骨懶磨舊銅鏡畏見新白髮古樹春無花子規啼有血離絃不堪聽一聽三四絶世途非一險俗慮各千結有客步大方驅車獨迷轍故人韓與李逸翰雙皎潔哀哉摧折歸贈詞縦横設徐方國號在元戎天下傑禰生投刺遊王粲吟詩謁髙情無遺照朗抱開曉月有土不埋寃有讎皆為雪願為直草木永向君地列願為古琴瑟永向君地發欲識丈夫志曽將孤劒說送狄宗亨王昌齡秋在水清山暮蟬洛陽樹色鳴臯烟送君歸去愁不盡又惜空度涼風天送孟浩然之廣陵李白故人西辭黄鶴樓烟花三月下揚州孤帆逺影碧山盡唯見長江天際流送客陳子昻故人洞庭去楊栁春風生相送河洲晩蒼茫别思盈白蘋已堪把緑芷復含榮江南多桂樹歸客贈生平送唐次武元衡都門去馬嘶灞水東流淺青槐驛路長白日離亭晩望望烟景微草色行人逺送皇甫湜赴舉馬異馬蹄聲特特去入天子國借問去是誰秀才皇甫湜含吐一腹文八音兼五色主文有崔李郁郁為朝德青銅鏡必明朱絲繩必直稱意太平年願子長相憶送張宗原姚合東門送客道春色如死灰一客失意行十客顔色低住者既無家去者又非歸愁窮一成疾百藥不可治子賢我且愚命分不合齊誰開蹇躓門日日同遊栖子行何所之切切食與衣誰能買仁義令子無寒飢野田不生草四向生路歧士人甚商賈終日須東西鴻雁春北去秋風復南飛勉君向前路無失相見期送綦毋􅅗落第還鄉王維聖代無隠者英靈盡來歸遂令東山客不作顧采薇既至君門逺孰云吾道非江淮度寒食京兆縫春衣置酒長亭送同心與我違行當浮桂棹未幾拂荆扉逺樹帶行客孤村當落暉吾謀適不用勿謂知音稀送暨道士還玉清李頎仙官有名籍度世吳江濱大道本無我青春長與君中州俄已到至理得而聞明主降黄屋時人看白雲空山何窈窕三秀日氛氳遂此留書客超遙烟駕分淇上别趙仙舟王維相逢方一笑相送還成泣祖席己傷離荒城復愁入天寒逺山靜日暮長江急解纜君已遙望君空佇立送沈秀才下第東歸賈島曲言惡者誰恱耳如彈絲直言好者誰刺耳如長錐沈生才俊秀心腸無邪欺君子忌茍合擇交如求師毁出嫉夫口騰入禮部闈下第子不恥遺才人恥之東歸家堂逺掉轡時參差浙雲近吳見汴栁接楚垂明年春光别迴首不復疑崔九弟欲往南山王維城隅一分手幾日還相見山中有桂花莫待花如霰崔九欲往南山馬上口號與别裴迪歸山深淺去須盡邱壑美莫學武陵人蹔遊桃源裏留别崔興宗駐馬欲分襟清寒御溝上前山景氣佳獨往還惆悵贈别沈四逸人髙適沈侯未可測其況信浮沈十載常獨坐幾人知此心乗舟蹈滄海買劍投黄金世務不足煩有田西山岑我行遇知已遂得開清襟何意閫閾間沛然江海深疾風掃秋樹濮上多鳴砧耿耿罇酒前聫雁飛愁隂平生重離别感激對孤琴送豆盧策歸别墅孟郊短松鶴未巢髙石雲始棲君為蕭灑去性與雲鶴齊力買奇險地手開清淺溪身披薜蘿襟山陟莓苔梯一巻冰雪文避俗常自攜送栁淳入闗青山輾為塵白日無閒人自古推髙車争利西入秦王門與侯門待富不待貧空齎一束書獨去誰相親唐文粹巻十五上欽定四庫全書唐文粹巻十五下宋姚鉉編詩辛揔六十六首古調歌篇四行役二十歧路鮑溶秋入關賈馳晨裝行歐陽詹蜀道後期張說蜀中將歸留辭韋相公歐陽詹襄陽路逢寒食張說巡邊在河北作奉和左司員外先赴長安逢立春日贈韋侍郎等諸公孫逖初發太原至途中寄太原所思歐陽詹西還至散關荅喬補闕陳子昻剡溪行却寄新别者朱倣早發龍且館舟中寄東海李司倉鄭司戸獨孤及曉發賀知章月夜江行權徳輿江行四首江行栁中庸懐寄二十七新都南亭别郭大元振盧崇道寄侍御従舅權德輿秋莫山中寄李益端公鮑溶寄趙七侍御因叙疇年之素寄懐於篇李華偶題安州浮雲寺樓寄湖州張郎中杜牧魏州従事寄耿拾遺姚合洪州客舍寄栁博士芳薛業岳州張史君與王都督别詩二首因遙申和韋嗣立留别袁丞王昌齡舟中懐閻士和釋皎然秋山寄陳讜言王昌齡海上寄蕭五獨孤及懐鄭洎孟遲杼山禪居寄贈東溪吳處士釋皎然寄廬山隠者楊衡春夢岑參贈逺陸龜䝉河梁别馬戴有所思盧仝寄逺李白寄逺賈島怨情李白生别離白居易别離陸龜蒙離怨張籍春愁韓琮和贈逺獨孤及失意九傷歌行張籍遷謫江表久未歸竇參失志夜坐思歸楚江孟郊失意歸吳寄劉侍郎荅李昌期楊洵美莫相疑行杜甫王夫子白居易孟先生詩韓愈徐十八晦落第歐陽詹疾病三温泉莊卧病寄楊七炯宋之問夏中詶于逖畢燿問病見贈獨孤及秋園卧疾呈暉上人陳子昻傷悼七荅宋主簿兼貽平昔遊舊盧藏用對酒憶賀監三首李白哭𤣥英方干先生孫郃吊王將軍墓常建國殤孟郊歧路鮑溶北風送微寒徒侣勤逺程憂人席不暖殘月馬上明飄飄歧路間長見日初生重嶂曉色淺踈猿寒啼清人間多歧路常恐終身行迴見四方人車輪無留聲空谷亦堪隠下田非懶耕古人有遺訓飽食非親榮我生禮義鄉少小見太平聖賢猶羈旅况復非其名秋入關賈馳河上微風來關頭樹初濕今朝關城吏又見孤客入上國誰與期西來徒自急晨裝行歐陽詹村店月西入山枝􅀈鵊聲永裝徹夜席束囊事晨征寂寂人尚眠悠悠天未明豈無偃息心所務前有程蜀道後期張說客心争日月來往預期程秋風不相待先至洛陽城蜀中將歸留辭韋相公歐陽詹寧體即雲構方前恒玉食貧居豈及此要欲懐歸憶在夢闗山逺如流嵗華逼明晨首鄉路迢遞孤飛翼襄陽路逢寒食張說去年寒食洞庭波今年寒食襄陽路不辭著處尋山水祇畏還家落春暮巡邊在河北作去年六月西河西今年六月北河北沙塲磧路何為爾重氣輕生知許國人生在世能幾時壯年征戰髮如絲㑹待安邊報明主作頌封山也未遲奉和左司員外自洛使入京中路先赴長安逢立春日贈韋侍郎等諸公孫逖拜郎登省闥奉使馳車乗遙瞻使者星便是南宫應臺妙時放言皇華德彌稱二陜聴風謠三秦望形勝此中睽友益是日多詩興寒盡嵗隂催春歸物華證忽覩雲間數雁迴更逢山上花正開河邊淑氣迎芳草林下輕風待落梅秋憲府中髙唱入春卿署裏和聲來共言東閤招賢地自有西征謝傅才初發太原途中寄太原所思歐陽詹鷗鳥覺漸逺迴頭長路塵髙城已不見況復城中人去意自未甘居情諒猶辛五原東北晉千里西南秦一履不出門一車無停輪流萍與繫匏早晩期相親西還至散關荅喬補闕陳子昻葳㽔蒼梧鳳嘹唳白露蟬羽翰本非匹結交何獨全昔君事胡馬余得奉戎旃攜手同沙塞關河緬幽燕芳歲幾陽止白日屢徂遷功業雲臺薄平生玉佩捐歎此南歸日猶聞北戍邊代水不可陟巴江亦潺湲攬衣度函谷銜涕望秦川蜀門自兹始雲山方浩然剡溪行却寄新别者朱倣潺湲寒谿上自此成離别迴首望歸人移舟逢暮雪頻行識草樹漸老傷年髮唯有白雲心為向東山月早發龍且館舟中寄東海李司倉鄭司户獨孤及沙禽相呼曙色分漁浦鳴桹十里聞正當秋風度楚水況值逺道傷離羣津頭却望後湖岸别處已隔東山雲亭艫目送北歸翼惜無瑤華持寄君曉發賀知章故鄉杳無際江臯聞曙鐘始見沙上鳥猶埋雲外峯月夜江行權德輿扣舷不能寐浩露清衣襟彌傷孤舟夜逺結萬里心幽興惜遙草素懐寄鳴琴三奏月初上寂寥寒江深江行四首曉曉風摇五兩殘月映石壁稍稍曙光開片帆在空碧書孤舟漾暖景獨鶴下秋空安流日正晝浄渌天無風晩古樹夕陽盡空江暮靄收寂寞扣舷坐獨生千里愁夜猿聲到枕上愁夢紛難理寂寂深夜寒清霜落秋水江行栁中庸繁隂乍隠洲落葉初飛浦蕭蕭楚客帆暮入寒江雨新都南亭别郭大元振盧崇道竹徑女蘿蹊蓮洲文石隄静深人俗斷尋玩往還迷碧潭秀初月素林驚夕棲褰幌納鳥侣罷琴聽猿啼佳辰改宿昔勝寄坐睽攜長懐賞心愛如玉復如珪寄侍御従舅初免職歸東山權德輿靡靡南軒蕙迎風轉芬滋落落幽澗松百尺無附枝世物自多故達人心不羈偶陳幕中畫未負林間期感恩従慰薦循性難縶維野鶴無俗質孤雲多異姿清泠松露泫照灼巖花遲終當稅塵駕來就東山嬉秋暮山中寄李益端公鮑溶舊事與日逺酒花仍舊香前年繡衣客此節過此堂侍臣不自髙笑解繡衣裳眠雲有餘態入鳥不亂行我恐雲嵐色損君鞍馬光君言此何言今日皆異鄉明日非今日下山道路長一従下山去天地再炎涼此期果難得夢君馬𤣥黄寄趙七侍御自餘干谿行經弋陽至上饒山川幽麗思與雲卿同遊邈不可得因叙疇年之素寄懐於篇李華搖槳曙江流江晴山復重心愜賞未足川迴失前峰凌灘出極浦曠若天地通君陽青嵯峨開坼混元中九潭魚龍窟仙成羽人宫隂奥潛鬼物精光動煙空𤣥猿啼深靘千定反楚越謂竹樹深者為靘白鷴戲葱蒙飛湍鳴金石激溜鼓雷風雨濯萬木鮮霞照千山濃草閒長餘緑花浄落幽紅渚煙見晨釣山月聞夜舂覆谿窈窕波涵石洶溶溶丹邱忽聚散素壁相奔衝白日破昏靄靈山出其東勢排昊蒼上氣壓吳越雄迴頭望雲卿此恨發吾衷昔日蕭邵遊四人纔成童華與趙七侍御驊故蕭十功曹穎士故邵十六軫未冠遊太學皆苦貧共弊同年三人登科相次典校邵後三人及第也屬詞慕孔門入仕希上公緯卿陷非罪折我昆吾鋒邵字緯卿以寃横貶卒南中茂挺獨先覺拔身渡京虹斯人謝明代百代墜鵷鴻蕭天寶末知亂棄官往江東殯𦵏先人逝于江南世故墜横流與君哀路窮逆胡陷兩京華與趙受辱賊中相顧無死節蒙恩逐殊封華貶杭州司功趙貶泉州晉江尉天波洗其瑕朱衣備朝容華承恩累遷尚書郎趙拜補闕御史一别凡十年豈期復相従餘生得攜手遺此兩孱翁羣遷失鸎羽後凋惜長松衰旅難重别悽悽滿心胷遇勝悲獨遊貪奇悵孤逢禽尚彼何人胡為束樊籠吾師度門教投弁躡遐蹤題安州浮雲寺樓寄湖州張郎中杜牧去夏疎雨餘同倚朱欄語當時樓下水今日到何處恨如春草多事與孤鴻去楚岸栁何窮别愁紛若絮魏州従事寄耿拾遺姚合少在兵馬間長還繫戎職雞飛不得逺豈要生羽翼三年城中遊與君最相識應知我衷腸不茍念衣食主人樹勲名欲滅天下賊愚雖乏智謀願陳一夫力人生須氣健飢凍縛不得睡當一席寛覺乃千里窄古人不懼死所懼死無益至交不可合一合難離拆君嘗相勸勉苦語毒胷臆百年心知聞誰限河南北洪州客舍寄栁博士芳薛業去年燕巢主人屋今年花發路傍枝年年為客不到舍舊國存亡那得知胡塵一起天下亂何處春風無别離予昔忝省閣與岳州張使君潭州王都督同官聨事後承朝譴各自東西張公與王都督别詩二首情頗殷切予覽以歎因遙申和云韋嗣立茂先王佐才作牧楚江隈登樓正欲賦復遇仲宣來黄鵠飛將逺雕龍文為開寧知昔聨事聽曲有餘哀昔時陪二賢纓冕㑹神仙一去馳江海相逢共播遷無因千里駕忽覩四愁篇覽諷歎何已歎終徒愴然留别武陵袁丞王昌齡皇恩蹔遷謫待罪逢知已従此武陵谿孤舟二十里桃花遺古岸金澗流春水誰識馬將軍忠貞抱生死舟行懐閻士和釋皎然二月湖南春草遍横山渡口花如霰相思一日在孤舟空見歸雲三兩片秋山寄陳讜言王昌齡巖間寒事早衆山木己黄北風何蕭蕭兹夕露為霜感激不能寐中宵時慨慷黄蟲初悲鳴𤣥鳥去我梁獨卧時易晩離羣情更傷思君若不及鴻雁今南翔海上寄蕭五獨孤及朔風剪塞草寒露日夜結行行届瀛壖歸思生暮節驛樓見萬里延首望遼碣逺海入大荒平蕪際窮髮舊國在夢想故人且胡越契濶阻風期荏苒成雨别海西望京口兩地各天末索居動經秋載笑知曷月日窮南望盡唯見飛鳥滅音塵未易得何以慰飢渴懐鄭洎孟遲風蘭舞幽香雨葉墮寒滴美人來不來前山看向夕杼山禪居寄東谿吳處士釋皎然青雲何潤澤下有賢人隠路入菱湖深跡與黄鶴近野風吹白芷山月搖清軫詩祖吳叔庠到君才不盡身當青山秀詩曰家住青山下青山有吳均故宅後改為吳均山文體多郢聲澄徹湘水碧泬寥楚天清時人格不同至今罕知名昔賢敦師友此道獨君行既得廬霍趣乃髙雷逺情别時春風多掃盡雪山雪為君中夜起孤坐石上月悠然遺塵想邈矣達性說故人不在兹幽桂惜未結㝛吉祥寺寄廬山隠者楊衡風鳴雲外鐘鶴㝛千年松相思杳不見月出山重重春夢岑參洞房昨夜春風起遙憶美人湘江水枕上片時春夢中行盡江南數千里贈逺陸龜䝉茱萸匣中鏡欲照心還懶本是細腰人别來羅帶緩従君出門後不奏雲和管妾思冷如簧時時望君暖心期夢中見路永魂夢短怨坐泣西風秋窻月華滿河梁别馬戴河梁送别者行哭半非親此地足征戰胡天多殺人金罍照離席寶瑟凝殘春有所思盧仝當時我醉美人家美人顔色嬌如花今日美人棄我去青樓珠箔天之涯娟娟常娥月三五二八盈又缺翠眉蟬鬢生别離一望一見心斷絶心斷絶幾千里夢中醉卧巫山雲覺來淚滴湘江水湘江兩岸花木深美人不見愁人心含愁更奏緑綺琴調髙絃絶無知音美人兮美人不知為暮雨兮為朝雲相思一夜梅花發忽到窻前疑是君寄逺李白美人在時花滿堂美人去後空餘牀牀中繡被巻不寢至今三載聞餘香香亦竟不滅人亦竟不來相思黄葉落白雪濕青苔寄逺賈島别腸多鬱紆豈能肥肌膚始知相結密不及相結疎踈别恨應少密離恨難袪門前南流水中有北飛魚魚飛向北海可以寄逺書不惜寄逺書故人今在無况此數尺身阻彼萬里途自非日月光難以知子軀怨情李白新人如花雖可寵故人似玉由來重花性飄揚不自持玉心皎潔終不移故人昔新今尚故還見新人有故時請看陳后黄金屋寂寂珠簾生網絲生别離白居易食蘖不易食梅難蘗能苦兮梅能酸未如生别之為難苦在心兮酸在肝晨雞載鳴殘月沒征馬重嘶行人出迴看骨肉哭一聲梅酸蘗苦甘如蜜黄河水白黄雲秋行人河邉相對愁天寒野曠何處宿棠梨葉戰風颼颼生離别憂從中来無斷絶憂積心勞血氣衰未年三十生白髪别離陸龜䝉丈夫非無淚不灑離别間仗劍對樽酒恥為游子顔蝮蛇一螫手壯士疾解腕所志在功名離别何足歎雜怨張籍切切重切切秋風桂枝折人當少年嫁我常少年别念君非征行年年長逺途妾身甘獨殁髙堂有舅姑山川豈遥逺行人自不返春愁韓琮金烏長飛玉兔走青鬢長青古無有秦蛾十六語如絃未解貪花惜楊栁吴魚嶺雁無消息水盻蘭情别来久勸君年少莫遊春暖風遲日濃如酒和贈逺獨孤及憶得去年春風至中庭桃李暎璅窻美人挾瑟對芳樹玉顔亭亭與花雙今年新花如舊時去年美人不在兹借問離居恨深淺秖應獨有庭花知傷歌行張籍黄門詔下促收捕京兆尹繫御史府出門無復部曲隨親戚相逢不容語辭成謫尉南海州受命不得須臾留身著青衫騎惡馬東門之東無送者郵夫防吏急喧驅往往驚墮馬蹄下長安里中荒大宅東門己除十二㦸髙堂舞榭鏁管弦美人遙望西南天遷謫江表久未歸竇參一自經放逐徘徊無所従便為出山雲不隨飛去龍名豈不欲保歸豈不欲早茍無三月資難適千里道離心與羈思終日常草草人生年幾齊憂苦則先老誰能假羽翼使我暢懐抱失志夜坐思歸楚江孟郊夜學曉未休苦吟神鬼愁如何不自閒心與身為讎死辱片時痛生辱長年羞青桂無直枝碧江思舊遊失意歸吳寄劉侍郎自念西上身忽隨東歸風長安日下影又落江湖中離婁豈不明子野豈不聰至寶非眼别至音非耳通因緘俗外辭逺寄髙天鴻荅李昌期楊洵美三山載羣仙峩峩鹹浪中霞衣翦不得此路安可従我生亦何事出門如飛蓬白日又黄昏所悲瑤草空蟲聲故鄉夢枕上禾黍風吾道如未喪天運何時通莫相疑行杜甫男兒生無所成頭皓白牙齒欲落真可惜憶獻三賦蓬萊宫自怪一日聲烜赫集賢學士如堵牆觀我落筆中書堂往時文彩動人主今日飢寒趨路傍晩將末契託年少當面輸心背面笑寄謝悠悠世上兒莫爭好惡莫相疑王夫子白居易王夫子送君為一尉東南三千五百里道途雖逺位雖卑月俸猶堪活妻子男兒口讀古人書束帶歛手來従仕近將徇禄給一家逺則行道佐時理行道佐時須待命委身下位無為恥命茍未來且求食官無髙卑及逺邇男子上既未能濟天下下又不至飢寒死吾觀九品至一品其間氣味都相似紫綬朱衣青布衫顔色不同而已矣王夫子别有一事欲勸君遇酒逢花且歡喜孟先生詩韓愈孟生江海士古貌又古心嘗讀古人書謂言古猶今作詩三百首窅然咸池音騎驢到京國欲知薰風琴豈識天子居九重鬱沈沈一門百夫守無籍不可尋晶光蕩相射旗㦸翩以森遷延乍郤走驚怪靡自任舉頭看白日泣涕下沾襟朅來遊公卿莫肯低華簮諒非軒冕族應對多差參萍蓬風波急桑榆日月侵奈何従進士此路轉嶇嶔異質忌處羣孤芳難寄林誰憐松桂性競愛桃李隂朝悲辭樹葉夕感歸巢禽顧我多慷慨窮簷時見臨清宵静相對髮白恥苦吟採蘭赴幽念𦕈然望東南秦吳修且阻兩地無數金我論徐方牧好古天下欽竹實鳳所食德馨神所歆求觀衆邱小必上泰山岑求觀衆流細必泛滄溟深子其聽我言可以當所箴既獲則思返無為久滯滛卞和試三獻期子在秋碪徐十八晦落第歐陽詹嘉榖不夏熟大器當晩成徐生異凡鳥安得非時鳴汲汲有攸為驅驅無本情懿哉蒼梧鳳終見排雲征溫泉莊卧病寄楊七炯宋之問多病卧兹嶺寥寥倦幽獨賴有嵩邱山髙枕長在目兹山棲靈異朝夜翳雲族是日濛雨晴返景入巖谷羃羃縁澗草菁菁山下木此意方無窮環顧悵林麓伊洛何悠漫洲源信重複夏餘鳥獸蕃秋末禾黍熟秉願守樊圃歸閒欣藝牧惜無載酒人徒把涼泉掬夏中詶于逖畢燿問病見贈獨孤及救物智所昧學仙願未従行藏兩乖角蹭蹬風波中淪跡未攄念卧痾非養蒙閉闗涉兩旬羈思浩無窮鸑鷟何處來雙舞下碧空離别隔雲雨惠然此相逢把手賀疾間舉杯欣酒濃新詩見久要清論激深衷髙館舒夏簟開門延微風火雲赫嵳峩日暮千萬峰遙指故山笑相看撫號鐘聲和由心親事感知氣同出處未易料且歌緩愁容願君崇明德嵗暮如青松秋園卧疾呈暉上人陳子昻幽寂曠日遙林園轉清密疲痾澹無豫獨坐泛瑤瑟懐挾萬古情憂虞百年疾緜緜多滯念忽忽每如失緬想赤松遊髙尋紫庭逸勞恡始都喪幽人遂貞吉圖書紛滿牀山水藹盈室宿昔心所尚平生自兹畢願言誰見知梵筵有同術八月髙秋晩涼風正蕭瑟宋侯鳴臯夢趙六予未及報而陳子云亡今追為此詩荅宋主簿兼貽平昔舊遊盧藏用暮川罕停波朝雲無留色故人琴與詩可存不可識識心尚可親琴詩非故人鳴臯初夢趙蜀國己悲陳感化傷淪滅魂交昔未申冥期失幽報兹理復今晨前嗟成後泣己矣將何及舊感與新悲虛懐疇昔時趙侯鴻寶氣獨負青雲姿羣有含妙識衆象懸清機雄談盡物變精義解人頤在隂既獨善幽躍目為疑踠彼千里足傷哉一尉欺陳生富清理卓犖兼文史思縟巫山雲調逸岷江水鏗鏘哀忠義感激懐知已負劍登薊門孤遊入燕市浩歌去京國歸守西山趾幽居探元化立言見千祀埋没經濟情良圖竟云已坐憶平生遊十載懐嵩邱題書滿古壁採藥遍巖幽子微化金鼎僊笙不可求榮哉宋與陸名宦美中州存亡一睽阻歧路方悠悠自余事山海及兹人世改傳聞當世榮皆是古人名無復平原賦空餘隣笛聲泣對西州使悲訪北邙塋新墳蔓宿草舊闕毁殘銘為君成此曲因言寄友生黙語無窮事凋傷共此情對酒憶賀監二首并序李白太子賓客賀監於長安一見呼予為謫仙人因解金龜換酒為樂没後對酒悵然有懐而作是詩四明有狂客風流賀季真長安一相見呼我謫仙人昔好杯中物今為松下塵金龜換酒處却憶淚沾巾狂客歸四明山隂道士迎勅賜鏡湖水為君臺沼榮人亡餘故宅空有荷花生念此杳如夢悽然傷我情重憶一首欲向江東去定將誰舉杯稽山無賀老却棹酒船迴哭𤣥英方干先生孫郃斗牛文星落知是先生死湖上聞哭聲門前見彈指官無一寸禄名傳千萬里死著紙衣裳生誰念朱紫我心痛其語淚落不能巳猶喜韋補闕揚名獻天子弔王將軍基常建嫖姚北伐時深入强千里戰餘落日黄軍敗鼔聲死常聞漢飛將可奪單于壘今與山鬼隣殘兵哭遼水國殤孟郊徒言人最靈白刃亂縦横誰言當春死不及羣草生堯舜宰乾坤器農不器兵秦漢盜山岳鑄殺不鑄耕天地莫生金生金人起争
