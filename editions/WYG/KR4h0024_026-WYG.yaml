body:
  text: 請置詩學博士書李行脩元和三年六月一日鄉貢進士臣李行脩謹昧死惶恐再拜獻書闕下臣覆視漢初經籍起口傳璧匿煥然明備其所由者修廢官立太學朝夕講貫以究聖意歳時程課以嚴師道使之然也迨乎桓靈之世遂使扶持元極匡飭頽俗傳委裘以終大運其儒術已試之明效歟近學無專門經無師授以音定字以䟽釋經是能使生徒由之中才不能使天下由之致理明矣大率五經皆然臣獨以詩學上聞趨所急也伏惟陛下赦其愚瞽埀恩聼察夫詩者發人之藴故謂之風手舞足蹈之音作用之光祖宗垂風聲勞歌怨誹之音作用之察吏理審敎化是以四海雖大羣生雖廣猶民人之和氣息乎踵逹乎顱流乎手足猶草木之豐澤漸乎根窮乎杪被乎枝葉上下無滯氣内外無遁情如此則詩得其任風得其性也昔殷周相承俱有聖治道洽于下下無怏心王化盛告成功於神明徳澤衰反變化於禮素其辭主文譎諫而不訐其教温柔敦厚而不愚仲尼接於其時謂王者宜以陶冶風俗臣下宜以洗濯疑謬道濟于下吾若之何乃採其詩合三百五篇善者全而用不善者全而去非如春秋諸經或革或因相錯而成也若其禮樂征伐天地隂陽有度假於辭可見喜怒哀樂譏刺諷諭無方非其志莫傳志士躬當治亂之時氣有惨舒之變臻於極而後動積于中而後形故言之成文歌之成聲有一不至則非全矣是以聖人以全動物物莫能固未施敬于人而人敬未施哀於人而人哀頑者以之開明躁者以之舒静道源於是絶而莫嗣獨有楚屈原頗得詩人之風介於子蘭靳尚之間終以放死故其道不竟洎秦姍笑三代燔燒經籍世儒坑死於是後學軋于相語喑呃相授以及漢興雜全經者七十年師口說者四三軰漢武篤好經術立於學官雖章句大修而比興未喻時揚雄司馬相如由是選耎觀望将迎忌諱勸百諷一推波助瀾文雖有餘不足稱也然以本學寖盛時因災異屢啓直聲初或不究終得其助故自殷已降有天下者莫長焉厥後君臣道薄詩道陵夷藴義感慨之士至曰吾何從乎上之追屈原不足以全性命下之跡相如不足以匡過失故居常則欝怏其胷襟嚄唶其齒牙代莫通其源臣伏思之以為詩敎未隆於時風雅未洽於下敎未隆則士不勸風未洽則言多缺故聞者卒愕而愠者多暗投而卻也自十聖紹業盈二百載經術益試周旋百度吏事反為縁餙霸道無所舛駮及陛下又登禮巖穴發掦仄伏宸心讜議猶天地相宣儒風昌言與日月横騖以辭讓次征伐而不暴以誠明推敎化而不浮如此則詩學何為鬱然積於空虛不用之地乎書殘於古今論失于齊魯漢有毛萇鄭康成師道可觀逮聖朝劉迅者説詩三千言近代言詩者尚之伏惟陛下詔公卿諸儒講其異同綜其指要列四始之元本窮六藝之粹精不使講以多物而無譁蔽之一言而得其言極者為師法傳經而行其毛鄭不安者亦随而刋正選立博士弟子貟如漢朝故事然後命瞽史納于聰明命司成敎之世子是謂端本由朝庭被于民里由京師施之逺方是謂垂化復采詩之官以察風俗是謂兼聼優登才之選以勵生徒是謂興古四者既備大化自流則動天地感鬼神徳豚魚甘堇荼來異俗懐鬼方皆在一致推而廣之神而化之無難矣㣲臣不知時變溺於師言謹詣光順門昧死以聞伏待刑辟請孟子為學科書皮日休聖人之道不過乎經經之䧏者不過乎史史之䧏者不過乎子子不異乎道者孟子也捨是子者必戾乎經史又率于子者則聖人之盗也夫孟子之文粲若經傳天惜其道不燼于秦自漢氏得之常置博士以專其學故其文繼乎六藝光乎百氏真聖人之㣲㫖也若然者何其道曄曄於前其書汲汲於後得非道拘乎正文極乎奥有好邪者憚正而不舉嗜淺者鄙奥而無稱邪蓋仲尼愛文王嗜昌歜以取味後之人将愛仲尼者其嗜在乎孟子矣嗚呼古之士以湯武為逆取者其不讀孟子乎以楊墨為逹智者其不讀孟子乎由是觀之孟子功利於人亦不輕矣今有司除茂才眀經外其次有熟荘周列子書者亦登於科其誘善也雖深而懸科也未正夫荘列之文荒唐之文也讀之可以為方外之士習之可以為鴻荒之民有能汲汲以救時補教為志哉伏請命有司去荘列之書以孟子為主有能精通其義者其科選視明經苟若是也不謝漢之博士矣既遂如之儒道不行聖化無補則可刑其言者請韓文公配饗書於戲聖人之道不過乎求用用於生前則一時可知也用於死後則百世可知也故孔子之封賞自漢至随其爵不過乎公矦至于吾唐乃策王號七十子之爵命自漢至隨或卿大夫至于吾唐乃封公矦曾參之孝道動天地感鬼神自漢至隨不過乎諸子至于吾唐乃旌入十哲噫天地久否忽泰則平日月乆昏忽開則明雷霆乆息忽震則驚雲霧乆鬱忽廓則清仲尼之道否於周秦而昏於漢魏息於晉宋而鬱於陳隨遇于吾唐萬世之憤一朝而釋儻死者可作其志可知也今有人身行聖人道口吐聖人言行如顔閔文若游夏死不得配食於夫子之側愚又不知尊先聖之道也夫孟子荀卿翼傳孔道以至于文中子文中子之末降及貞觀開元其傳者醨其繼者淺或引刑名以為文或援從横以為理或作詞賦以為雅文中之道曠百祀而得室授者唯昌黎文公之文蹴楊墨於不毛之地蹂釋老於無人之境故得孔道巍然而自正夫今之文人千百士之作釋其巻觀其詞無不俾造化補時政繄公之力也公之文曰僕自度若世無孔子僕不當在弟子之列以日休度之設使公生孔子之世公未必不在四科焉國家以二十賢者若左丘明卜子夏公羊高榖梁赤伏勝高堂生戴勝毛公孔安國劉向范寗杜子春馬融盧植鄭康成服子慎何休王肅王輔嗣杜元凱代用其書垂于國胄並配饗於孔聖廟堂者其為典禮也大矣美矣苟以代用其書不能以釋聖人之辭箋聖人之義哉况有身行其道口傳其文吾唐以來一人而已反不得在二十一賢之列則未聞乎典禮為備伏請命有司定其配饗之位則自兹已後天下以文化未必不由夫是也上論貢士書舒元輿草茅臣某昧死奏書皇帝陛下聖德修三代之教盡善矣唯貢士一門闕然不修臣竊以為有司過矣臣為童子時學讀書見禮經有鄉舉里選必得其人而貢於上上然後以弓旌束帛招之臣年十五既通經無何心中有文竅開則又學之徧觀羣籍見古人有片善可稱必聞於天子有司天子有司亦修禮待之不茍臣既學文於古聖人言皆信之謂𤨏質待問上國必見上國禮無幾前年臣年二十三學文成立為州縣察臣臣得備下土貢士之數到闕下月餘待命有司始見貢院懸版様立束縛檢約之目勘磨狀書劇責與吏胥等倫臣幸狀書備不被駮放得引到尚書試試之日見八百人盡手攜脂燭水炭洎朝晡餐器或荷於肩或提於席為吏胥縱慢聲大呼其名氏試者突入棘圍重重乃分坐廡下寒餘雪飛單席在地嗚呼唐虞闢門三代貢士未有此慢昜者也臣見今之天下貢士既如此有司待之又如此乃益大不信古聖人言及覩今之甲賦律詩皆是偷拆經誥侮聖人之言者乃知非聖人之徒也臣伏見國朝開進士一門苟有登升者皆資之為宰相公侯卿大夫則此門固不輕矣凡將為公侯卿相者非賢人君子不可有司坐舉子於寒廡冷地是比僕𨽻已下非所以見徴賢之意也施棘圍以截遮是疑之以賊姦徒黨非所以示忠直之節也試甲賦律詩是待之以雕蟲微藝非所以觀人文化成之道也有司之不知其為弊若此臣恐賢人君子逺去不肖汚辱為陛下用且指近陳之今四方貢珠玉金銀有司則以篋篚皮幣承之貢賢才俊乂有司以單席冷地承之是彰陛下輕賢才而重金玉也賢才恥之臣亦恥之臣又見每歲禮部格下天下未有不言察訪行實無頗邪然後上貢苟不如格抵罪舉主臣初見之竊獨心賀謂三代之風必作於今日矣及格既下而法不下是以歲有無藝朋黨譁然扇突不可絶此又惡用格為徒亂人耳又於格中程之人數每歲多者固不出三十少或不滿二十此又非天子納士之心也何以言之今日月出没皆為陛下内地自漸海流沙朔南周環綿億萬千里其間異氣所鍾生英豪俊彦固不少矣若陛下明詔必以禮舉之忽一歲之内有百數元凱楊馬之才德者來之則有司必曰吾格取二十而黜八十是為求賢邪遺賢邪若有司以僕𨽻待之忽一歲之内負才德來者無十數軰則有司必曰吾㧞二十是繆收其半徒足滿人數是為取才邪取合格邪其不可先定人數亦昭昭矣向之數事臣乆為陛下疾有司不供職使聖朝取士首科委就地矣臣寒微若此出言不足以定貢士之得失然百慮之中或幾一得之臣竊欲陛下詔有司按三代故事明修格文使天下入貢者皆茂行實不拘人數其不茂行實法與之隨此為澄源源既澄則來者皆向方矣俾有司加嚴禮待之舉六義試之試之時免自擔荷廊廡之下特設茵榻陳爐火脂燭設朝晡飯饌則前日之病庶幾其有瘳矣人人知天子重賢奬士之道勝氣􅀢漫如此士之立身無不由正以成之者為士身正公卿正公卿正未有天下不治者天下治而陛下求不垂拱以高揖羲軒不可得也茍不如此則士之求名無不由邪以成者為士名邪未有公卿不邪者公卿邪未有天下而治者天下不治而陛下欲不役聖慮而憂黔首不可得也臣雖至愚以此觀之知貢士之道所繫尤重是以願輸寫血誠以正此門陛下無以臣迹在貢士中疑臣自謂臣雖不敏竊窺太常一第不為難得何以明之若使臣為今日貢士之體事便僻巧佞馳騖關鍵固臣之力非不能也恥不為也故互以頑才干有司得之固無忝不得則納履而去蹤跡巢由以樂陛下熈熈之化何徃而無泉石之快哉伏惟陛下留神獨聼天下之幸也於臣何幸死罪死罪唐文粹巻二十六上欽定四庫全書唐文粹巻二十六下宋姚鉉編表奏書疏丙摠八首書奏大葬二諫山陵厚葬書虞世南諫靈駕入京書陳子昻廟號一駮義宗廟號書韋凑進貢一論進奉書皇甫湜佛寺三諫造章敬寺書髙郢再上諫書復佛寺奏孫樵邉事一請罷兵戍姚州書張柬之諫山陵厚𦵏書虞世南臣聞古之聖帝明王所以薄𦵏者非不欲崇髙光飾珍寳具物以厚其親然審而言之高墳厚隴珍物畢備此適所以為親之累非曰孝也是以深思逺慮安於菲薄以為長乆萬代之計割其常情以定之耳昔漢成帝造延昌二陵制度甚厚功費甚多諫大夫劉向上書其言深切皆合事理其略曰孝文居㶚陵悽愴悲懷顧謂羣臣曰嗟乎以北山石為椁用紵絮斮陳漆其間豈可動哉張釋之進曰使其中有可欲雖錮南山猶有隙使其中無可欲雖無石椁又何慼焉夫死者無終極而國家有廢興釋之所言無窮計也孝文寤焉遂以薄𦵏又漢氏之法人君在位三分天下貢賦以一分入山陵武帝厯年長乆比𦵏陵中不復容物霍光暗於大體奢侈過度其後至更始之敗赤眉賊入長安破茂陵取物猶不能盡無故聚歛百姓為盗之用甚無謂也魏文帝於首陽東為壽陵作終制其略曰昔堯𦵏壽陵因山為體無封無樹無立寢殿園邑為棺椁足以藏骨為衣衾足以朽肉吾營此不食之地欲使易代之後不知其處無藏金銀銅鐵一以瓦器自古及今未有不亡之國無不掘之墓喪亂以來漢氏諸陵無不發掘至及燒取玉樞金縷骸骨并盡豈不重痛哉若違詔妄有變改吾為戮屍於地下死而重死不忠不孝使魂而有知將不福汝以為永制藏之宗廟魏文此制可謂逹於事矣向使陛下德止如秦漢之君臣則緘口而已不敢有言伏見聖德高逺堯舜猶所不逮而俯與秦漢之君同為奢泰捨堯舜殷周之節儉此臣所以尤感慼也今為丘隴如此其内雖不藏珍寳亦無益也萬代之後但見高墳火墓豈謂無金玉也臣之愚計以為漢文㶚陵既因山勢雖不起墳自然高廣今之所卜地勢即平不可不起宜依白虎通所陳周制為三仞之墳其方中制度事事減少事畢之日刻石於陵側明丘封大小高下之式明器所須皆以瓦木合於禮文一不得用金銀銅鐡使萬代子孫並皆遵奉一通藏之宗廟豈不美乎且臣下除服用三十六日已依㶚陵今為墳隴又以長陵為法非所宜也伏願陛下深覽古今為長乆之慮臣之赤心唯願萬歲之後神道常安陛下孝名揚於無窮耳書奏不報世南又上疏曰漢家即位之初便營陵墓近者十餘歳逺者五十年方始成就今以數月之間而造數十年之事其於人力亦以勞矣又漢家大郡都五十萬户即日人衆未及徃時而工役與之一等此臣所以致疑也諫靈駕入京書陳子昻梓州射洪縣草莽愚臣子昻謹頓首冐死獻書闕下臣聞明王不惡切直之言以納忠烈士不憚死亡之誅以極諫故有非常之䇿者必待非常之時得非常之時者必待非常之主然後危言正色抗議直辭赴湯鑊而不迴至誅夷而無悔豈徒欲詭世誇俗厭生樂死者哉實以為殺身之害小存國之利大故審計定議而甘心焉况乎得非常之時遇非常之主言必獲用死亦何驚千載之跡將不朽於今日矣伏惟大行皇帝遺天下棄羣臣萬國震驚百姓屠裂陛下以徇齊之聖承宗廟之重天下之望喁喁如也莫不冀蒙聖化以保餘年太平之主將復在於兹日矣况皇太后又以文母之賢恊軒宫之耀軍國大事遺詔決之唐虞之際於斯盛矣臣伏見詔書梓宫將遷西京鑾輿亦欲陪幸計非上策智者失圖廟堂未聞有骨鯁之謨朝廷多見有順從之議愚臣竊惑以為過矣伏自思之生靈日沐皇風磨頂至踵莫非亭育不能厯丹鳳抵躍龍北面玉階東望金屋抗音而正諫者聖王之罪人也所以不顧萬死乞見一言願蒙聼覽甘就鼎鑊伏惟陛下察之臣聞秦據咸陽之時漢都長安之日山河為固天下服矣然猶北假胡宛之利南資巴蜀之饒自渭入河轉關東之粟踰沙絶漠致山西之寳然後能削平天下憚厭諸侯長轡利䇿横制宇宙今則不然燕代迫匈奴之侵巴隴嬰吐蕃之患西蜀疲老千里羸糧北國丁男十五乗塞歲月奔命其弊不堪秦之首尾今為闕矣即所餘者獨三輔之間耳頃遭荒饉人被荐饑自河已西莫非赤地循隴以北罕逢青草莫不父兄轉徒妻子流離委家喪業膏原潤莽此朝廷之所備知也賴以宗廟神靈皇天悔禍去歲薄稔前秋稍登使羸餓之餘得保性命天下幸甚可謂厚矣然則流人未返田野尚蕪白骨縱横阡陌無主至於蓄積猶可哀傷陛下不料其難貴從先意遂欲長驅大駕按節秦京千乗萬騎何方取給况山陵初制穿復未央士不工匠必資徒役今欲率疲弊之衆興數萬之軍徴發近畿鞭撲羸老鑿山採石驅以就功春作無時秋成絶望凋瘵遺噍再罹艱苦儻不堪弊必有逋逃子來之頌將何以速之此亦宗廟之大機不可不審圖也况國無兼歲之儲家鮮匝時之蓄一旬不雨猶可深憂忽加水旱人何以濟陛下不深察始終獨違羣議臣恐三輔之弊不止如前日矣且天子以四海為家聖人包六合為宇厯觀逺古以至于今何甞不以三王為仁五帝為聖故雖周公制作夫子著名莫不祖述堯舜憲章文武為百王之鴻烈作千載之貞規然而舜死陟方𦵏蒼梧而不返禹㑹羣后沒稽山而永終豈其愛蠻夷之鄉而鄙中國哉實將欲示聖人無外也故能使墳籍以為美談帝王以為懿範况我巍巍大聖轢帝登皇日月所臨莫不率俾何獨秦豐之地可置山陵河洛之都不堪園寢陛下豈可不察之愚臣竊為陛下惜也且景山崇麗秀冠羣岑南對嵩邱西望汝海居祝融之故地連太昊之遺墟帝王圖迹縱横左右園林之美復何加焉陛下曽未察之謂其不可愚臣鄙見良足尚矣况瀍澗之中天地交㑹北有太行之險南有宛葉之饒東壓江淮食湖海之利西馳崤澠據關河之寳以聖明之主養純粹之人天下和平恭已正南靣而已陛下不思瀍洛之壯觀關隴之荒蕪遂欲棄太山之安履焦原之險忘神器之大寳徇曽閔之小節愚臣闇昩以為甚也陛下何不覽諍臣之䇿採行路之謡諮謨太后平章宰輔恊蒼生之望知有所安天下豈不幸甚昔者平王遷周光武都洛山陵寢廟不在東京宗社墳塋並居西土然而春秋美為始王漢書載為代祖豈其不願孝哉何聖賢褒貶於斯濫矣實以時有不可事有必然葢欲遺小存大去禍存福聖人所以為貴也夫小不忍則亂大謀仲尼之至誠伏惟陛下察之若以臣愚不用朝議遂行臣恐關隴之憂未時休息臣又聞太原蓄巨萬之倉洛口積天下之粟國家之寳斯為大矣今欲捨而不顧皆以長驅使有識震驚天下失望儻鼠竊狗盗萬一不圖西入陜州之郊東犯武牢之鎮盗敖倉一抔之粟陛下何不預遏之此天下之至機不可不深懼也雖則盗未旋踵誅刑以及滅其九族焚其妻子泣辜雖恨將何及焉故曰先謀後事者逸先事後謀者失國之利器不可以示人斯言不徒云也願陛下念之臣西蜀野人本在林藪幸屬交泰得逰王國故知不在其位者不謀其政亦欲退身岩谷滅迹朝廷竊感婁敬委輅不非其議圖漢策於萬全取鴻名於千古臣何獨怯而不及之哉所以敢觸龍鱗死而無恨庶萬有一中或垂察焉臣子昻誠惶誠恐頓首駮義宗廟號書韋凑臣聞王者制禮是曰規模規模之興實資師古之道必也正名惟名與實故當相副其在宗廟禮之大者豈可失哉禮祖有功而宗有德祖宗之廟百代不毁故殷太甲為太宗太戊曰中宗武丁曰高宗周則文王為太宗武王為中宗漢則文帝為太宗武帝為代宗其後代有稱宗者以方制海内德澤可宗列於昭穆期於不毁稱宗之義不亦大乎伏惟孝敬皇帝位止東宫未甞南靣聖道誠冠於儲副德教不被於寰􅌡立廟稱宗恐非合禮况别起祀典何義稱宗而廟號義宗稱之萬代以臣庸識竊謂不可陛下率循典禮以闡大猷儻致此失或虧盡善豈不惜哉望更詳議務合於禮經論進奉書皇甫湜臣聞一人莫非王臣尺土莫非王有山川林藪之所産殖雨露春秋之所成就莫非王財誠宜推至公示無外今國家既有公府又為私藏使州郡貢賦之外進奉相及恐非以天下為家示天下無私之道也且任土之貢生産有常履畝之收等籍既定人識所出吏難為奸進奉既無度程莫知紀極恣横徴發因縁贓私驅陛下赤子措之不存之地侈君之嗜慾惑君之聦明實大奸之門大罪之竇也臣雖熟知陛下上聖之姿深仁之理凡内藏之實以充讌賜非務積藏如四逺未知何如百姓受弊何如後嗣平中之主由此而傷儉德萌侈心何雖漢有少府水衡筦㩁山澤之利終不若領之大農也且地之財無盡王之用不㑹何必固之内府以開濫關邪伏望陛下罷内府歸之公藏約别進合之古制徴歛有常財用無虧絶奸之根源除政之粃蠧全大體興太和天下大幸伏見正月十一日赦書陛下深念疲民懇責貪吏徃之隨使貢來一皆罷之此實白日之明曽雲之澤也凡諸州府必有羡餘不歸之王廷必沒于私室伏請毎使當罷必上其數而謹其收水旱之不虞疾疫之不期以振罷羸以代蠲免軍旅之事工役之用以給其費以供其須居常之歲閉藏送待無敢㪚洩而干刑司如是則大賴於人大伸於用矣諫造章敬寺書高郢八月二十五日草莽臣前鄉貢進士高郢昧死再拜稽首獻書闕下從諫如流者君之明也有犯無隠者臣之忠也君明臣忠國之利也當陛下至明之化納練之日臣敢愛其死以隠其忠乎臣伏見奉為先太后造章敬寺陛下大孝因心與天罔極蒸蒸之思惟舜其難至德要道無以加也然臣伏見以畢力追孝誠有所益妨時勦人亦有所損先太后聖德不必以一寺増輝國家永圖無寜以百姓為本捨人就寺何福之為以臣愚蒙不知其所昔魯莊公丹桓公廟楹而刻其桷可謂孝乎然而春秋書之為非禮漢惠帝及孝景孝宣令郡國諸侯立髙祖及太宗髙宗代宗之廟當時創制不據禮經至元帝時與愽士議郎斟酌古禮一朝而罷之豈元帝不敬宗廟乃王者示人以軌物也夫廊廟者宗社之所在神靈之所憑猶不可無故而飾之越禮而立之况此寺非宗社所安神靈所宅而殫萬人之力以邀二梵之報其不可以明矣間者昆吾孔熾薦食生人今猶不悛偷居宇下百姓凛凛無日不愓遣將攘郤無尺寸之功隴外壤地委之犲狼太宗文武皇帝封殖萬有傳之陛下一夫不獲尺土見侵告成之時猶恐有闕况甚於一夫尺土者乎用武已來十三年矣傷者不救死者不收繕乗補卒至今未已夫興師十萬日費千金則十有三年百萬之衆資糧屨履取足於人人之困竭胡可勝紀勞疲宛轉十不存二父子兄弟相視無聊延頸嗷嗷以俟王命此皆陛下宜伸勤恤之恩降痛哀之詔縱未暇分㪚榖帛以贍鰥寡猶當務省侈費以懊休之奈何戎虜未平侵地未復金革未戢疲人未撫太倉無終歲之儲大農有㩁酟之弊陛下忍以此時興力哉自八月以來時雨􅄽候禾稼少損菽麥失時黔首狼顧憂在艱食歲若不給將何以救無寺猶可無人其可乎臣竊料此寺數年方成土木之勞工用之費不虛府庫將焉取給府庫既竭則又誅求儻窮匱不堪鼠竊之盗起戎狄乗間狗吠之驚急得不為陛下深憂乎臣聞聖人受命於天以人為主茍功濟于天天人同和其功大矣自然上則宗廟受其福下則子孫賴其慶故孝經云德教加於百姓刑于四海葢天子之孝也又云明王事父孝故事天明事母孝故事地察又云周公郊祀后稷以配天宗祀文王於明堂以配上帝是以四海之内各以其職來祭詩曰無念爾祖聿脩厥德又曰既受帝祉施于孫子是知王者之孝在於承順天地嚴配宗考敬慎德教以臨兆人俾四海諸侯歡心助祭延福流祚永永無窮耳未聞崇建梵宫彫琢金玉之為孝也且佛本無相不可以有相求道本無為不可以有為得陛下豈馳心於有為之境而邀福於有相之功哉臣竊為陛下之不取也臣聞夏禹卑宫室而盡力乎溝洫人到于今稱之梁武窮土木而致飾乎寺宇人無德而稱焉陛下若節用愛人當與夏后齊駕何必勞人動衆而踵梁武之遺風乎制造初興役費尚淺人貴量力不貴必成事貴相時不貴必遂陛下若迴一人之慮從萬姓之心必是陛下聖德孝思格于天地湛恩霈澤濟乎生靈生靈效誠天地幽賛千福萬禄先后受之豈與一寺較其功徳乎陛下以臣言渉於誑妄伏請令公卿列士庭議可否得其中則天下幸甚臣郢不勝愚忠懇直之至謹投招諫匭以聞再上諫書高郢九月十二日草莽臣前鄉貢進士高郢昧死再拜稽首獻書闕下臣聞聖主聞直言之道者豈好其犯顔忤㫖乎誠欲因天下之心以慮則無不得因天下之目以視則無不見也忠臣不避誹謗之誅者豈貪其死諌之名乎誠以君所行有否焉不隠忍偷生以負於時也臣伏見奉為先太后造章敬寺陛下奉先思孝興福除禍而羣黎百姓不知聖情議者皆以為蕃戎未殄兵革暴露國用不贍元元匱竭曽未小康又興此寺雖睿思罔極而人力有限也臣聞衆心成城衆口鑠金則輿人之誦不可輕也故書曰罔咈百姓以従已之欲易曰聖人感人心而天下和平詩曰愷悌君子神所勞矣此言王者將有為也將有行也必稽于衆而順于人則自然之福不求而自至未然之禍不除而自絶矣臣愚考之於古則詩書與易如此聽之於今則百姓之議如彼拳拳之極不敢不言昨八月二十五日奏書闕下事寢無報不知天門深逺愚不得上達歟聖意所㫁臣言不足聽受歟伏躬待罪旬八日矣臣聞神人無功聖人無名神人無功者不為有功之功聖人無名者不為可名之名也不為有功之功故功莫大焉不為可名之名故名莫厚焉臣又聞古之明王積善以致福不費財以求福修徳以消禍不勞人以禳禍陛下之作此寺也臣竊惑之若以為功乎則天覆地載隂施陽化未曽有為也若以為名乎則至徳要道以順天下未曽有待也若以致福乎則通于神明光于四海不在於費財也若以禳禍乎則方務厥徳罔有天災不在於勞人也今興造急促人徒竭作土木並起日計萬工書不遑食夜不遑息力不逮者隨以杖笞愁痛之聲盈於道路以此望福臣恐不然陛下戡定多難以安宗社勵精思理日昃不暇内不邇聲色外不樂遊畋務行寛仁以幸天下聖人之徳廣大悉被太平之風將可見矣而興動此役固違羣情迴正道於内心求微助於外物徇左右之過計傷皇王之大猷臣竊為陛下惜之臣是以敢昧死至于再諫伏惟陛下留神省察臣不勝愚懇切直之至復佛寺奏孫樵賤臣樵上言臣以為殘蠧於民者羣髠最大且十口之家謂中户也男力而耕女力而織雖乗樂歲其衣食僅自給也楝宇僅自完也若羣髠者所飽必稻梁所衣必緜縠居則邃宇出則肥馬是則中户不十不足以活一髠武皇帝元年籍天下羣髠凡十七萬夫以十家給一髠是編户一百七十萬困於羣髠矣武皇帝一旦髪天下羣髠悉歸平民是時一百七十萬家之心咸知生地陛下自即位已來詔營廢寺以復羣髠自元年正月洎今年五月斤斧之聲不絶天下而工未以訖聞陛下即復之不休臣恐數年之間天下十七萬髠如故矣臣以為武皇帝即不能除羣髠陛下尚宜勉思而去之以蘇疲甿况將興於己廢乎請以開元之事明之開元之間大駕還自東封從以干官之衆六軍之事三日留於陳留民猶有餘力今陛下即能東封道次給一食則民力殫矣何開元之民力有餘而陛下之民力不足邪開元之間率户出兵率若干户共出若干兵籍而為伍春夏縱之家以力耕稼秋冬叢之將以戒武事如此則兵未始廢於農農未甞奪於兵故開元之民力有餘也今天下常兵不下百萬皆衣食於平民歲度其費率中户五僅能活一兵如此則編户不五百萬不足以給之故陛下之民力不足也今陛下以力不足之民而欲重困於羣髠將何以踵開元太平事邪貞觀已還開元户口最為殷繁不能逾九百萬即今有問於户部其能如開元乎借如陛下以五百萬給天下之兵今又欲以百七十萬給於羣髠是七百萬無羡賦矣即今户口不下於開元其餘止二百萬而國家萬故畢出其間陛下孰與其足也即其鹽鐡不可除而㩁筦加算矣天下之民得不重困乎日者陛下甞欲營國東門諫大夫諍於前言未及終陛下非徒輟其工而又賜帛以優之今所復寺宇豈特國門之急乎聚徒嘯工豈特國門之役乎寜諫大夫不以言而陛下不以聼乎陛下則不能復廢之臣願陛下已復之髠止而勿復加已營之寺止而勿復修庶幾天下之民尚可活也今天下最不可去者兵也臣尚為陛下日夜思去兵之術究開元太平之事冀異日為陛下言之况去無用之髠也臣樵昧死以言請罷兵戍姚州書張柬之姚州古者哀牢之舊國絶域荒外山髙水深自生人以來洎於後代不與中國交通前漢唐䝉開夜郎滇笮而哀牢不附至光武季年始請内屬漢置永昌郡以統理之乃收其鹽布氊罽之税以利中土其國西通大秦南通交趾竒珍異寳進貢歲時不闕劉備據有巴蜀常以甲兵不充及備死諸葛亮五月渡瀘收其金銀鹽布以益軍儲使張伯歧選其勁卒勇兵以增武備故蜀志稱自亮南征而國以富饒甲兵充足由此言之則前代置郡其利頗深今鹽布之税不供珍竒之貢不入戈㦸之用不實於戎行寳貨之資不輸於大國而空竭府庫驅率平人受役蠻夷肝腦塗地臣竊為國家惜之漢以得利既多歴慱南山渉蘭倉水更置慱南哀牢二縣蜀人愁怨行者作歌曰歴慱南越蘭津渡蘭倉為他人葢譏漢貪珍竒鹽布之利而為蠻夷之所馳役也漢獲其利人且怨歌今減耗國儲費用日廣而使陛下之赤子身膏野草骸骨不歸老母㓜子哀號望祭於千里之外於國家無絲髪之利在百姓受終身之酷臣竊為國家痛之徃者諸葛亮破南中使其渠率自相統領不置漢官亦不留兵鎮守人問其故亮言置官留兵有三不易大意以置官夷漢雜居猜嫌必起留兵運糧為患更重忽若反叛勞費更多但粗設綱紀自然乆定臣竊以亮之此䇿妙得羈縻蠻夷之術今姚府所置之官既無安邊靜㓂之心又無葛亮且縱且擒之技唯知詭謀狡算恣情割剥貪饕刧略積以為常扇動酋渠遺成朋黨折支諂笑取媚蠻夷拜跪趨伏無復慙耻提挈子弟嘯引兇愚聚㑹蒲慱一擲累萬劒南逋逃中原亡命有二千餘户見散在彼州專以掠奪為業姚州本龍朔中武陵縣主簿石子仁奏置之後長史李孝讓辛文協並為羣蠻所殺前朝遣郎將趙武貴討擊貴及蜀兵應時破敗噍類無遺又使將軍李義㧾等徃征郎將劉惠基在陣戰死其州遂廢臣竊以諸葛亮稱置官留兵有三不易其言乃驗至垂拱四年蠻郎將王善寳昆州刺史㸑乾福又請置州奏言所課税自出姚府管内更不勞擾蜀中及置州後録事叅軍李陵為蠻所殺延載中司馬成琛奏請於瀘南置鎮七所遣蜀兵防守自此蜀中搔擾于今不息且姚府㧾管五十七州巨猾遊客不可勝數國家設官分職以化俗防姦無恥無厭狼籍至此今不問夷夏負罪並深見道路刧殺不能禁止臣恐一朝驚擾為禍轉大伏乞省罷姚州使𨽻嶲府歲時朝覲同之蕃國瀘南諸鎮亦皆悉廢於瀘北置關百姓自非奉使入蕃不許交通來徃增嶲府兵選擇清良宰牧以統理之臣愚將為穏便唐文粹巻二十六下欽定四庫全書唐文粹巻二十七宋姚鉉編
