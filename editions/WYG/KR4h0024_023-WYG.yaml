body:
  text: 帝王一唐武宗皇帝真容賛李徳裕將相功臣四凌煙閣二十二勲臣賛吕温三賢賛司空圗自題寫真賛裴度張荆州畫賛吕温庶官一右丞徐公寫真賛獨孤及唐武宗皇帝真容賛并序李徳裕仁聖文武至神大孝皇帝御極之五載氣應天和徳感人心朝廷四方咸一於正風雨時若螽螟嵗息銷蓬孛為休氣驅戎狄為懐人北荒堅昆重譯而至厥有窘代憑阻弄兵陸梁韋顧既代夙沙自縛武功既成休徳昭明自古未聞百王莫致之事皆葳㽔於圗諜矣皇上以為大禹叙九疇敬五事豈不曰貌恭則莊視明則正予欲作繢傳照審其儀形且夫聖人潜心於天以通神明先定其神而萬物理矣昔之訪具茨期姑射在此而已况乎廣成之戒抱一𤣥元之去多欲予所貴道良為是矣豈眩夫係風之言竒彼淖水之術從偓佺之所珍遺堯舜之令名哉於是圗經素寫良金擬鑑形於止水若凝視於清鏡五彩既彰穆穆煌煌居列仙之館近𤣥祖之光盖以昭燕翼之謀顯丕承之徳矣臣聞古之至聖必有竒相是以黄熊之瑞應於龍體赤精之符協於圗表頎然而長文王所以王天下也體貌多竒漢髙所以威四海也然則繢事之微極於惟肖至於天光睟清日華明潤非可圗也庶髣髴焉末臣奉詔敢颺言曰唐運中興天授大君軒耀其武堯煥其文北伐獫狁漠朔無氛西伏堅昆稽首稱臣祲生壺闗盜起河汾沈機先物雄斷解紛克定羣慝竟全大勲八表既寧萬機益勤爰命采繢載模天真崐閬仙岑峻極秋旻蓬瀛白日光照清晨涵育如天尊嚴若神輝赫絪緼為龍為雲聖作物覩禎祥以臻宣光乃孕虞熙載甄致建中和金聲玉振太階既平廟器乃陳化下以徳持盈以仁四瀆宗海衆星拱辰億萬斯年藻朗日新凌煙閣勲臣賛二十二首并序吕温我二后受成命撫興運乾坤軸撼乾樞鼓元氣而雷域中騰百川而雨天下雷收雨霽如再開闢蕩焉與太極同功貞觀十七年太宗以功成治定秉為而不有之道讓徳于祖考推勞于羣臣念匡濟於艱難感風雲於疇昔思所以攄之無窮乃詔有司擬其形容圗畫於凌煙閣者二十有四人盖象乎二十四氣之佐天昭勲徳也昔者舜以五臣致理周以十亂反正髙祖以三傑作漢光武以二十八將中興若夫錯綜勲賢牢籠今古雄四代而髙視者其惟聖唐乎至若唐莒公劉渝公之倫探元符建帝圗首戴神堯舉晉陽而活天下此則大禹之拯溺也魏鄭公以致君為已任諫若不及謇謇左右秉心宣猷此則咎繇之颺言也虞永興紏合羣儒旁求百代明備王禮克諧帝樂使我大國煥乎其有文章此則夷夔之制作也長孫趙公舉大義除二兇安宗廟定社稷以振我丕赫無疆之休此則周公之匡救也英衛受天勇智雄武佐聖鼓行海内麾定四方此則太公之鷹揚也房杜𤣥機朗識並運帷幄神發響效謨成天功此則蕭何之指蹤也子房之决勝也尉遲秦程剛毅木訥氣鎮三軍力崩大敵匹馬孤劍為王前驅此則吳漢之樸忠賈復之雄勇也其餘皆榱棟殊材黼黻異制儔諸古烈罔有慙徳皇王之際於斯為盛其始也文為經武為緯智斯作忠斯述其末也大不偪小不遏退者全來者達控而縱之使自用之推而引之使自盡之不設籠檻以觀遼廓之致不頓韁鎻以極權竒之變執一徳而衆力展懸大信而羣情竭髙祖聚之以義太宗用之以道髙宗終之以仁傳聖萬代享其功利此非盛歟昔陸機袁宏為晉人而歌功於漢魏作者猶或稱之况乎逰聖代觀國光目睨凌煙而頌聲不作某不揣賤劣有斐然之志輙盡所蓄各為讃一章上以見王業之艱難中以明聖賢之相須次以朗前哲之光韻未以聳後人之誠節侯君集張亮負勲跋扈自陷大逆敢沒其名用彰天刑使伐勞懐貳者懼春秋之義異姓為後故以河間元王為賛首云河間元王孝恭太極構天本由一氣大人創業資我族類堂堂河間仁勇是經遹駿有聲為唐宗英暴隋天亡羣盜猖狂我伐用張時為哲王武有烈光為爪翼肺腸經綸八方自南徂東晏海澄江平蕭銑輔公祐使父兄帝天下化家為邦用竭爾力寵臻其極言不伐色不徳以遜以黙柔嘉惟則佐髙祖建大勣如周旦奭與太宗守大成如漢間平宜君宜王盤石無疆房梁公𤣥齡梁公先覺龍臥待君長彗流光掃天布新義師雷興公躍其鱗杖策千里來謁帝閽婉婉梁公實懿實聰實光實融羽義翼忠若鸞若鴻大風動地儒服從容静運胷中弛張折衝左右太宗夷屯廓蒙定髙祖功功告武成翊開太平我雖忘勞時靡有争網羅遺賢推轂羣英玉不韜輝蘭無沈馨飛鴻出冥振鷺在庭濟濟多士太宗以寧公無事矣闕衮有補惟仲山甫經營四方方叔召虎大邦鈞軸至則委汝閑居台輔撝黙自處亦莫敢余侮髙朗令終嗚呼梁公杜萊公如晦穆穆萊公竒姿粹靈藴元和氣為大國楨乗時恢能唐室大開故人相攜公與房梁公同有匡濟之志也直上太階更為隂陽迭作日月佐明四海賛育萬物王度是欽如玉如金徳音愔愔萬有千古永稱房杜如周申甫魏鄭公徵堂堂魏公崇節大志喬榦直聳摩天自致遭風雲時得霸王器一言委質有死無二撫我則后各盡其志嘗事李密隠太子沈浮變通龍戰既息皇建其極俾補衮職其繩則直諤諤嶷嶷危言正色保太宗徳弼違替否日月不蝕黜漢霸雜行周王道人或有言秉徳不撓與封徳彛庭諍禮興樂崇徳合道豐保合太和昭明有融起四年中復三代風言出化成神哉厥功尹躬佐商有恥于湯公以其志匡飾聖唐為唐宗臣致唐無疆永式萬邦長孫趙公無忌趙國之先發祥朔土乃祖乃父受天之祜為天下毋有子而賢為唐宣輔聖賢同氣千載一覩丕顯趙公允文允武克忠克仁實有大勲髙祖受命太宗歸尊翼翼乾乾恪居于藩羣孽亂嗣争窺神器鴻業將墜公揭大義一匡天地人到于今家受其賜帝將傳聖爰有顧命汝忠汝誠莫與汝京與我聖子守唐太平公相髙宗有太宗遺風刑措財豐八荒來同和氣大融妖星襲月禍起中宫公將正之以王帝躬武氏謀位公以力争力屈羣邪誠阻天聰黜非其尤令問無窮唐莒公儉嵗寒陰凝冰雪皚皚有鳥擇木先陽春來誰歟莒公王佐之材間運未開登潜龍臺代萬姓請命與天為媒扶龍而興振起雲雷權輿帝圗經始唐基始覆一簣勃焉巍巍易失者時難知惟㡬知㡬其神莒公元勲劉渝公政㑹河出崐崘來潤中夏連山合沓横擁其派巨靈勃然手擘太華決流東注功並造化粤我聖唐將舉晉陽帝命是將往拯溺于四方亦既載斾亦既秉鉞强兇當路王威髙君雅拒不得發渝公慷慨感義激節用竒制變大事立决雷奮霆越天衢八達則莫我敢遏如巨靈破山河勢始豁赫矣渝公與神齊烈跡如仙掌炯炯不滅李衛公靖有隋之末羣盜熾爇帝怒震發五星從太白煥照參野將有聖人兵定天下金精下射猛毅感激李公矯矯從此奮跡躍于中原王者則獲壯士不死初公不利於我帝欲戮之壯其言而免壯士公自稱唐威載赫帝曰汝傑致天之罰手付金鉞俾往式遏不庭則殺如飇發發如火烈烈摧枯爍雪應鼓如截逺若荆巫險若江湖强若匈奴莫不率從莫不震恭車書混同氛祲蕩空衞侯之功功則維何威明恵和筞勇駕智長驅仁義仁義曠蕩帝王之將萬古曷瞻鐵山巉巉詔築墳闕象鐵山積石山李英公勣横流莫極大亂無象英公傑出應運為將與楚楚霸與漢漢王天時人事隨我所向長蛇縱蠚王充東據河洛婪婪封豕建徳來濟同惡號吼連聲如雷如霆萬里震驚時維英公諒我太宗斬豕以鉞取蛇于穴羣穢殄滅乃定九鼎乃開明堂庵有大邦金甲同光告成于王太宗獻㨗于髙祖與勣俱擐金甲為上下將皇業用昌帝命英公北伐獫狁雷鼓殷殷旄頭㡬殞掃雲黒山布唐陽春五原草緑不見南牧島夷未庭天子親征其鋒維英莫拒莫抗是震是蕩破東海浪天下既和解鞍投戈袞服委他華髮皤皤終始三朝無玷可磨劉夔公𢎞基夔公峥嶸金虎之精應時而生與運俱行總帝元戎震唐天聲瞋目張膽前無金城别建龍節中分虎旅啓行萬里乗氣一鼓劍揮雷霆斾卷風雨先馳咸陽鎮定天府天府既定唐集大命入揚王庭出權兵柄薄伐獫狁朔風不競徂征島夷東海如鏡義始忠卒元勲之盛長孫邳公順徳泰山未明雷鬱幽崖日觀赫開舒為丹霞昔我太宗賢傑潜屯帝出于震爛其盈門邳公炳焉實耀其間功參造物謀協先天執殳前驅捧轂南轅以勞以舊佐命之元虞永興公世南英英永興華徳素行以文富國以道佐命天下既定為唐儒宗東觀石渠始生古風乗精繹思假道書圃驅馳百代出入三古問羲黄心聴堯舜語歸來帝側獻可替否帝告永興與鴻碩之倫闡六籍三墳建樂章禮文先師是宗於廓辟雍辟雍沈沈天子所臨或弦或歌講古述今其從八千纓弁森森獩貃羌髳或詠徳音羽林孤兒亦垂青襟洋洋聲教無逺不洎日月所照皆成文字鬱開古始掃蕩澆季實我羣儒成太宗之志英英永興宜曰文懿尉遲鄂公敬徳侁侁鄂公百鍊龍泉沈翳未宣氣衝斗間佩非其人初事宋金剛躍入大川神武獲焉提之上天天地之内指麾無前熊威虎力隠若敵國剛毅木訥安劉必勃武徳之屯手拔禍根掃除氛昬捧出日月耀于天門功成名遂髙謝戎事烈烈猛志化為和氣深地髙堂頤性保命屑瓊飲露静奏清商商為臣勵事君鄂公之志之仁貞觀後公不交人事常鍊氣服食奏清商樂以自奉蕭宋公瑀隋氏不君忠賢莫用桐生朝陽有集惟鳳捨彼頽厦鬱為新棟路車𤣥衮開國有宋武徳之暮羣孽内蠧巍巍宋公聳節髙步不吐不茹不來不去屹屹中立為天一柱從容而言社稷遂安持誠秉忠光輔二君激濁揚清欲人如身道至廣莫我敢羣境至大不容纖塵雪山倚空冰壑照人耿介絶倫為唐貞臣張郯公公謹有倬郯公仡仡而貞侁侁而仁實太宗信臣有宗守藩内難未夷圗之則安捨之則危帝臨安危機以懼以疑以蓍為先知是筮是咨郯公嶷然排闥折蓍抗憤正詞用人事定天意身為元龜不知不識順義之則以定社稷郯公之力公之云亡帝念其勤若痛在身天懐發中哭不避辰君臣之間夐古未聞屈突蔣公通五運相推土火革期隋化為唐忠臣不知猶驅義徒奮拒王師指心誓天摩頸待時人歸有徳四海皆叛春日滿川流冰未泮亡家徇國方寸不亂力屈勢窮排空落翰東南慟哭聲盡魂斷仗忠就擒萬國瞻漢帝曰爾通古之烈士孝於其親誰不欲子俾侯于蔣授以師紀感恩不死宣力如彼佐唐扶隋名教之美髙申公士廉維嶽降神佐唐生申忠貞自天孝友如春徳為邦基仁厚人倫肅肅雍雍真王者臣慶因歸妹光延天配文懿皇后公之同出也㛰媾之中雲龍潜㑹建公南海廓我無外諒我撥亂弼文開泰遏彼庸蜀荐鍾澆季文翁之化若掃于地申公攸徂有教無類父子兄弟望風相媿勃興儒雅大復禮義西南頌聲到今不墜名登元勲理冠羣吏全材大器於鑠厥懿殷鄖公開山温温殷公初若懦夫銅印試吏襃衣為儒大風驅雲忽與之俱遭逢真宰參造化謨天地既闢厥功有赫從王龔行佐帝光宅逺展驥足髙揮鳳翮以永終譽垂于竹帛秦胡公叔寳洛汭之役龍戰未決我師與王世充陣于九曲秦公應變臨陣電拔鋭氣盡來我盈彼竭成敗反掌存亡庵忽虎來風壯鼇轉山沒遂作心膂爰從討伐崩圍陷陣火迸冰裂翕如鶚聲縱若鯨突功成國定萬古壯骨程盧公知節盧公倬然動軼㡬先轉禍為福與秦胡公降于九曲攀龍上天繽翻鵬翼積風乃聳桓桓將軍大敵則勇雷崩山谷貔虎頓伏飇倒溟波鯨鯢蹉􅋸見危而進當死不讓干城三朝身老氣壯段襃公志𤣥襃公虎臣先運而臻謁帝太原許唐與身擁劍駕氣騰風躍雲積忠累仁光有厥勲建旄北伐細栁宵屯風謐霜凝嚴扃達晨天子之使駐車軍門軍屯肅章乃外壁門以夜不納制使安衆秉威此真將軍侁侁桓桓克壯有聞許譙公紹羣動相食血流中原譙公夷陵豺虎為鄰列境連城火炎煙昏皎其一邦如玉不焚三光忽開萬象皆新誰有天下平生故人公與髙祖有舊引忠歸誠豹變蠖伸金石之契移為君臣奕奕煌煌為龍為光元戎啟行大斾央央式遏大江奄征南方恩斯勤斯兩不可忘三賢賛并序司空圗隋大業間房公季公魏公同師文中子嘗謂其徒曰𤣥齡也志而密靖也恵而斷徵也直而遂俾其遭時致力必濟謨庸厥後果然宜有賛激云三賢志同夙尚儒風以植公忠出遇太宗諷議從容謀厥羣雄君勞臣惕荒夷阻闢百千年社稷自題寫真賛裴度爾才不長爾貌不揚胡為將胡為相一㸃靈臺丹青莫狀張荆州畫賛并序吕温中書令始興文獻公有唐鯁亮之臣也開元二十二年𤣥宗春秋髙矣謂太平自致頗易天下綜覈稍怠推納浸廣若君子小人摩肩于朝直聲遂寢邪氣始勝中興之業衰焉公於是以生人為身社稷自任抗危言而無所避秉大節而不可奪小必諫大必諍攀帝檻厯天階犯雷霆之威不霽不止日月㡬蝕卻為分明虎而冠之不敢猛視羣賢倚頼天下仰望凛凛乎千載之望矣不虞天將啓幽薊之禍俾姦臣乗衅以速致戎詐成讒勝聖不能保褫我公衮置于侯服身雖逺而諫愈切道既塞而誠彌堅憂而不怨終老南國於戲功業見乎變而其變有二在否則通在泰則窮開元初天子新出艱難久憤荒政樂與羣下勵精致理於是乎有否極之變姚宋坐而乗之舉為時要動中上急天光照身宇宙在手勢若舟楫相得當洪流而鼓迅風崇朝千里不足怪也開元末天子倦于勤而安其安髙視穆清霈然大滿於是乎有泰極之變荆州起而扶之舉為時害動咈上欲日與讒黨抗行于交㦸之中勢若微陽戰隂衝密雲而吐丹氣欻耀而滅又何難乎所痛者逢一時事一聖踐其跡執其柄而有可有不可有成有不成况乎差池草茅沈落光耀者復何言哉復何言哉曹谿沙門靈徹雖脱離世務而猶好正直攜其圗像因以示余覩而感之仍作賛曰唐有棟臣往矣其邈世傳遺像以覺後學徳容恢異天骨峻擢波澄東溟日照泰嶽具瞻崇崇起敬起忠貌與神㑹凛然生風氣藴逆鱗色形匪躬當時曲直如在胷中鯤鱗初脱激海以化羊角中頽摩天而下無喜無愠亦如斯畫鳴呼為臣儆爾夙夜尚書右丞徐公寫真圗賛并序獨孤及侍御史韓公至清以學藝書畫之美聞于天下辛丑嵗三月以王事靡盬館于豫章與前尚書右丞徐公同舍於恵明寺之浄室嘗以暇日裂素灑翰畫徐公之貌陳於公之座隅而美目方口和氣秀骨毫釐無差若分形於鏡入自外者或欲擎跽揖讓俯僂拜謁不知其畫也衆君子嗟歎之不足則言以讃其美某亦繼唱于後哲匠運思天姿是具假之筆精實以神遇居然成象豁若披霧瞻仰神鋒如窺武庫婉婉髙識昻昻獨步絶頂孤松空波白鷺不犯之色匪躬之故孰知其化亦在毫素唐文粹巻二十三欽定四庫全書唐文粹巻二十四宋姚鉉編
