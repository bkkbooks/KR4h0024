body:
  text: 吳興姚鉉纂書五揔一十一首論選舉五與權德輿書栁冕荅柳福州書權德輿上宣州高大夫書杜牧上禮部權侍郎書獨􅀌郁荅獨􅀌秀才書權德輿論諌諍二與人論諌書杜牧與李諌議行方書孫樵論仕進一荅孟郊論仕進書獨􅀌郁論虚无一與鄭駙馬書張􅀃論法乗一與濟法師書白居易論服餌一與崔連州論石鍾乳事書栁宗元與權德輿書柳冕冕白昔仲􅃓問爲政子曰先有司有司之政在於舉士是以三代尚德尊其敎化故其人賢西漢尚儒明其理亂故其人智後漢尚章句師其傳習故其人守名節魏晉尚氏族故其人矜代隋氏尙吏道貴其官位故其人寡廉恥唐承隋法不改其理此天所以待聖主正之何者進士以詩賦取人不先理道明經以墨義考試不本儒意選人以書判殿最不尊人物故吏道之理天下天下奔競而無廉恥者以教之者末也閣下豈不謂然乎自頃有司試明經奏請毎經問義十道五道全冩䟽五道全冩注其有明聖人之道盡六經之意而不能誦䟽與注一切棄之恐清識之士無由而進腐生豎子比肩登第不亦失乎閣下因從容啓明主稍革其弊奏爲二等其有明六經之義合先王之道者以爲上等其精於誦注者與下等不亦善乎且明六經之義合先王之道君子之儒敎之本也明六經之注與六經之䟽小人之儒敎之末也今者先章句之學後君子之儒以求清識之士不亦難乎是以天下至大士人至衆而人物殄瘁廉恥不興者亦在取士之道未盡其術也誠能革其弊尊其本舉君子之儒先於履行者俾之入仕即清識君子也俾之立朝即王公大人也一年得一二十人十年得一二百人三十年得五六百人即海内人物不亦盛乎昔唐虞之盛也十六族而巳周之興也十亂而巳漢之王也三傑而巳太宗之聖也十八學士而巳豈多乎哉今海内人物顒然思理推而廣之以風天下即天下之士靡然而至矣是則由於有司以化天下之士得無廉恥乎冕頓首荅柳福州書權德輿來問見愛殷懃甚厚䟽以先師對仲弓有司之􅀃又曰由於有司以風天下誠哉大君子之言理道也今之取士在於禮部吏部按資格以擬官奏郎官以考别失權衡重輕之本無乃甚乎至於禮部求才猶似爲仁由巳然亦㳂於時風豈能自振甞讀劉秩祭酒上䟽云太學設官職在造士士不知方時無賢才臣之罪也毎讀至此心常慕之當時置於國庠似在散地而方以乏賢内訟􅁣然上奏此君子之心也君子之言也況以蒙劣辱當儀曹爲時求人豈敢容易然再歲計偕多有親故故進士初牓有之帖落有之筞落有之及第亦有之不以私害公不以名廢實不敢自愛不訪於人兩漢設科本於射筞故公孫弘董仲舒之倫痛言理道近者祖習綺靡過於雕蟲俗謂之甲賦律詩儷偶對屬況十數年間至大官右職敎化所繫其􅀂是乎是以二年巳來叅考對筞不訪名物不徴隱奥求通理而巳求辨惑而巳習常而力不足者則不能迴復於此故或得其人庶他時有通識懿文可以持重不遷者而不盡在於齪齪科第也明經問義有幸中所記者則書不停綴令釋通其意則牆面木偶遂列上第末如之何頃者叅五其問令書釋意義則於䟽注之中茍剛撮旨要有數句而通者昧其理而未盡有數􅁓而黜者雖未盡善庶稍得之至於來問明六經之義合先王之道而不在於注䟽者雖令學究一經之科毎歲一人猶慮其不能至也且明經者仕進之多數也注䟽者猶可以質驗也不者儻有司率情下上其才旣失其末又不得其本則蕩然矣無乃然乎古人云勉彊行道則德日起而大有功中庸有困而行之勉彊而行之鄙雖不敏敢忘勉之之道邪大凡常情爲近習所勝没没於聞見汲汲於進取茍避患安時俾躬處休以至老死自爲得計豈復有揣摩古今風俗整齊教化根本原始要終長轡逺馭如閣下吐論之􅀂是者邪此鄙人所以喟然三復而不知其巳也來問又言三代兩漢至近古所不同豈古化夐逺之不可復邪復因縁漸靡而操執者不之思邪鄙人頑固謹俟餘論因自發舒慙怍無量德輿再拜上宣州高大夫書杜牧某頓首再拜自去歲前五年執事者上言云科第之選冝與寒士凡爲子弟議不可進熟於上耳固於上心上持下執堅如金石爲子弟者魚濳䑕遁無入仕路某􅀼惑之科第之設聖祖神宗所以選賢才也豈計子弟與寒士也古之急於士者取盜取讎取於夷狄豈計其所由來況國家設取士之科而使子弟不得由之􅀂以科第之徒浮華輕薄不可任以爲治則國朝自房梁公巳降有大功立大節率多科第人也􅀂以子弟生於膏梁不知理道不可與美名不令得美仕則自堯巳降聖人賢人率多子弟凡此數者進退取捨無所依據某所以憤懣而不曉也堯天子子也禹公子也文王諸侯孫與子也武王文王子也周公文王之子武王之弟也夫子天子裔孫宋公六代大夫子也春秋時列國有其社稷各數百年其良臣多出公族及卿大夫子孫也魯之季友季文子叔孫穆子叔孫昭子孟獻子皆出於三􅁊也臧文仲武仲出於公子彄柳下惠出於公子無駭諸侯之子稱公子公子之子稱公孫公孫之子稱公族以王父字爲氏展禽是也宋之良臣多出於戴􅁪武莊之族也舉其尤者華元子罕向戍是也衛之良臣亦公族及卿大夫之裔也舉其尤者公子荆公叔發公子朝皆公族也子鮮公子也史狗史魚􅇞武子卿大夫之裔也齊之晏嬰晏􅁊子子也曹之子臧公子也吳之季扎王子也鄭之良臣皆公孫公族也舉其尤者子封子良子罕子展子皮子産子張子太叔是也楚之良臣子囊子西子期皆王子也子庚王孫也其卿大夫之裔􅃲氏生令尹子文後有􅃲辛􅃲巢􅃲懷昭王返國皆有大功蔿氏生蔿賈孫叔敖蔿艾也薳啓彊薳子慿薳掩薳罷屈氏生屈蕩屈到屈建子木六國時有昭奚恤公族也屈原諸屈後也皆其祖先於武王文王時基楚國爲霸者用其子孫其社稷垂九百餘年至於晉國最爲彊其賢臣尤多有趙氏魏氏韓氏狐氏中行氏范氏荀氏羊舌氏欒氏郤氏祁氏其先皆武公獻公文公勤勞臣也用其子弟召諸侯而盟之者僅三百年在六國齊之孟甞趙之平原魏之信陵皆王子王孫也齊復有司馬穰苴亦王族也其在漢魏巳下至於國朝公族之子弟卿大夫之胄裔書於史氏爲偉人者不可勝數不可殫論聖賢才能於子弟中復何如也言科第浮華輕薄不可任用則國朝房梁公玄齡進士也相太宗凡二十一年爲唐宗臣比之伊吕周召者郝公處俊亦進士也爲宰相時高宗欲遜位與武后處俊曰天下者高祖太宗之天下非陛下之有但可傳之子孫不可私以與后高宗因止來濟上官儀李玄義皆進士也後爲宰相濟助長孫太尉禇河南共摧武后者後突屈入塞免胄戰死儀革廢武后召玄義助處俊言不可以位與武后婁侍中師德亦進士也吐蕃彊盛爲監察御史以紅抹額應猛士詔躬衣皮袴率士屯田積榖八百萬石二十四年西征兵不乏食薦狄公爲相取中宗於房陵立爲太子漢陽王張公東之亦進士也年八十爲相􅇌致四王手提社稷上還中宗郭代公元振亦進士也鎮涼州僅十五年北卻突厥西走吐蕃制地一萬里握兵三十萬武氏惕息不敢移唐社稷魏公知古亦進士也爲宰相廢太平公主謀以佐玄宗及卒也宋開府哭之曰叔向古之遺直子産古之遺愛兼而有者其魏公乎姚梁公元崇登第下筆成章舉首佐玄宗起中興業凡三十年天下幾無一人之獄宋開府璟亦進士也與姚唱和致開元太平者劉幽求登制筞科與玄宗徒歩誅韋氏立睿宗者蘇氏父子皆進士也大許公爲相於武后朝酷吏中不失其正於中宗朝誅反賊鄭普思於韋后黨中小許公佐玄宗朝號爲蘇宋張燕公􅀃登制筞科排張易之兄弟賛睿宗請玄宗監國竟誅太平公主招置文學士開内學舘玄宗好書尚古封中泰山祀后土因燕公也張曲江九齡亦進士也排李林甫牛仙客罵張守珪不斬安禄山謫老南服年未七十張巡亦進士也凡三入判等以兵九千守睢陽城凡周歲拒賊十三萬兵出天寳雜記使賊不能東進尺寸以全江淮元和中宰相河東司徒兼中書令裴公皆進士也裴公仍再得宏辭制筞科當貞元時河北叛齊蔡亦叛階此蜀亦叛吳亦叛他未叛者皆高下其目熟視朝廷希嚮彊弱而施其所爲司空始相憲宗廢權倖之機牙令不得張􅀵歛百職歸於有司命節度使出朝廷不由兵士始自撫州余􅀽相爲滑州滑州凡三月無帥三軍無事憲宗始信之自此不用貞元故事以行軍副使大將軍爲節度使拔取沈滯各還其官開州取唐舎人爲職方郎中知制誥饒州取李趙公爲考功郎中知制誥在貞元中皆十餘年遷逐其他似謫者亦皆當叙用也然後西取蜀東取吳天下仰首始見白日裴公撫安魏博使田氏盡歸六州元和中翦蔡劇賊於洛師脇下招來常山質其二子以累其心取十三城使不得與齊交手爲冦因誅師道河南盡平當是時天下幾至於太平凡此十九公皆國家與之存亡安危治亂者也不知科第之選復何如也至於智效一官忠立一節德行文學不可悉數董生云春秋之義變古則譏之傅􅀃命高宗曰鑑于先王成憲其以永無愆故殷道復興鴻鴈矣宣王能復先王之道西漢魏相佐漢宣帝爲中興但能奉行漢家故事姚梁佐玄宗亦以務舉貞觀之法制耳自古及今未有背本棄古而能致治者昨獲覽三郎秀才新文凡十篇數日在手讀之不倦其旨意所尚皆本仁義而歸忠信加以辭彩道茂皎無塵土況有誠明長厚之譽於千人中儻使前五六年得進士第今可以出入諌官御史􅂇明天子爲治矣古人云三月不仕則相弔安有凡五六年來選取進士施設網罟如防盗賊言子弟者噎啞抑鬱思一解布衣與下士齒厥路無由於古未前聞也某因覽三􅀰文章不􅁴發憤略言大槩干觸尊重無任惶懼某再拜上禮部權侍郎書獨􅀌郁貞元十三年八月日獨􅀌郁謹上書千舎人三兄閣下郁以母舊遂獲謁見敘古大賢之遇郁也亦不以常交言之眷意甚露郁􅃈􅃈鬱堙二年無聞摧頽折羽而不喜者非失意之謂非尤人之謂蓋將因事自罪而不喜也借如豫章生於擁腫小木之中樵蘇見之亦以嗟矣一有不嗟則必自與擁腫者亦不多逺也珠璣雜於礫石之中童子弄之亦以驚矣一有不驚則必自與礫石者亦不多逺也鏌鎁卧於鈆鈍之中下工覩之固亦知矣一有不知則必自與鈆鈍者亦不多逺也毛嬙後於宿瘤而行有目者覩之固即分矣一有不分則必自與宿瘤亦不多逺也苟與乎擁腫礫石鈆鈍宿瘤輩果殊異則不能移凡眼所擇況逃乎良工巧冶有識者之目哉今禮部侍郎之目固亦國之良工巧冶有識者之目也於中再擇再不中是眞巳爲擁腫礫石鈆鈍宿瘤矣何止與斯不逺哉此所以因事自罪而不喜也或諭之曰今子之道尚光子之所以不振者晦過也子之道豐蔀也子且有崪天之材而隱植之有照乗之珍而密櫝之有切玉之利而謹橈之有傾都之􅃩而深帷之雖使離婁左執光而右拭眥迫而索之固亦不能知矣子何不移植露光披鋒示貌使識者覩之而駭之彼之所誨固亦郁所不能焉巳必不材也不寶也不利也不妺也且遍過於有識者之目是自揚其短也巳必材也必寶也必利也必姝也雖小示其光鋒榦貌於一人驚我亦巳多矣所不驚者是子四事果不足異於族凡也郁病直拙獨大賢於郁分殊尚不能以亟況悠悠者歟郁常行乎時輩之間多酌其言語善者鄙者自減盈消息其旨稍有可驚不敢不於許言者言之今之後學者或嘆曰吁後來惡乎所歸哉此且非冝長者所當聞也亦非冝長者所不當聞也今朝廷先達病在不能公也或能公而不能爲力也覽其文則賛美稱嗟無不至也其閒善惡輕重進退則心以别矣此其所以爲公也鮮有知其必善而風皷之不啻􅀂自口出此其所以爲公不能甚力致遑遑之倫其下才者亦曰今夫在位者其無公歟其無公歟有一善未甞肯稱也意曰非我事也又慮與之談者不與我符愛也是使諸子竊􅀼然自以無聞爲不辱遂相與擇捷趨邪紛屯於主司之跡親者苟能致譽則不詰其所以致譽者之賢不肖而曹趨之矣此實今之躁進苟得之風也在朝廷大賢主而名之驅而正之於其善者扶之揺之善而未具者決之導之使四方學士知嚮方焉何如其曰非我事也􅀂使一人曰非我事也十人曰非我事也舉朝廷皆曰非我事也苟非我事則無所不非我事無所不非我事則天地之間無乃以寂寥乎昔孔子飭詩書禮樂以化齊弟子而至天下使孔子亦曰非我事也則今者安盡聞夫七十子之賢詩書禮樂之盛七十子亦曰非我事也又孰爲播孔子之聖如此其大乎今文亦如是朝廷先達亦如是後之達者亦如是等不相播則人文禮義知巳復往之道不幾乎息矣郁不肖辱承大賢心深矣非又敢以假喻自薦意欲以大賢擇衆賢而使七十子之徒亦方孔子於大賢也何如荅􅀌獨秀才書權德輿損四日書問兼示新文閎博峻異有立言致逺之旨其於惠愛纎悉重厚甚善甚善以吾子才志與年三者皆富以嘉聲自振􅀂建瓴決水大冶良工必有不期至而至者況以日新又日新之盛哉夫豫章珠璣鏌鎁毛嬙終不慮隱之櫝之橈之帷之之爲患而擁腫礫石鈆鈍􅀫瘤之排蔽但發有疾徐耳來問云一人驚之亦多矣豈與族凡校邪此誠得之又云先達病不能公或公而病其無力今夫滔滔者或辨之不至而苟善待之及揚聲延譽則鉗口結舌大凡舉丗之病也如鄙夫者直力不足耳亦懼招倈奔走爲津爲歧至有􅀼所愛者則寡矣又奚能廢是也從古未達者之望達者何甞不如是邪先師七十子所儗豈敢當也三復戁然無言喻懷其他慕重續俟㑹話德輿頓首與人論諌書杜牧某踈愚怠墮不識機括獨好讀書讀之多矣毎見君臣治亂之間興亡諌諍之道遐想其人䑛筆和墨則兾人君一悟而至于治平不悟則烹身滅族唯此二者不思中道自秦漢巳來凡千百輩不可悉數然怒諌而激亂生禍者累累皆是納諌而悔過行道者不能百一何者皆以辭語迂險指射醜惡致使然也夫迂險之言近於誕妄指射醜惡足以激怒夫以誕妄之􅀃激怒之辭以卑凌尊以下干上是以諌殺人者殺人愈多諌畋獵者畋獵愈甚諌治宫山廻語親倖曰叩頭者之言安足信哉漢文帝亦謂張釋之曰卑之無甚高論令可行也今人平居無事友朋骨􅁏切磋規誨之閒尚冝旁引曲釋亹亹繹繹使其樂去其不善而樂行其善況今君臣尊卑之間欲因激切之言而望道行事治者乎故禮稱五諌而直諌爲下前數月見報上披閣下諌䟽錫以幣帛僻左且逺莫知其故近於遊客處一睹閣下諌草明白辯婉出入有據吾君聖明冝爲動心數日在手味之不足且抃且慰三者交并不能自止吾君聞諌旣且行之仍復寵錫誘能諌者斯乃堯舜禹湯文武之心也聞於逺地冝爲吾君抃也閣下以忠考文章立於朝廷勇於諌而且深於其道果能輔吾君而光丗德某承閣下之厚愛兾於異時資閣下之知以進尺寸能不爲閣下之喜復自喜也吾君今日披一䟽而行之明日聞一言而用之賢才忠良之士森列朝廷是以奮起志慮各盡所懷則文祖武宗之業窮天地日出月入皆可掃洒以復厥初某縱不得效用但於一官一局筐篋簿書之閒活妻子而老身命焉作爲歌詩稱道仁聖天子之所爲治則爲有餘能不自慰故獲閣下之一䟽抃喜慰三者交并眞不虚也冝如此也無因面讃其事書􅁓言誠不覺繁多某再拜與李諌議行方書孫樵樵甞爲日蝕書以爲國家設諌官期換君心之非不以一咈其言而怠於諌即繼以死非其職邪執事居其官亦甞有意於此乎開元之間豈特諌官而後言邪苟立天子廷者皆得開口奮舌爭於上前故自貞觀巳還開元之政最爲脩明及林甫舞智以固權張詐以聾上於是束羣僚之口縳諌官之舌且以法中敢言者由是林甫之惡熾而勿復聞禄山之逆祕而勿復知天寶之政由此而荒矣今者下無林甫遏諌之權上有開元虚巳之勞如此則敘立明庭者皆得道上是非不顧時忌矧執事官曰諌議哉執事則不能言避其官而逃其禄可也官秩優而位崇者少邪今年三月上甞欲營治國門執事尚諌罷之今者詔營廢寺以復羣髠三年之間斤斧之聲不絶度其經費豈特國門之廣乎稽其所務豈特國門之急乎何執事在國門則知諌在佛寺則緘黙勇其細而怯其大豈諌大夫職邪憔以爲大蠹生民者不過羣髠武皇帝發憤除之兾活疲甿今天下之民喘未及息國家復欲興旣除之髠以重困之將何以致民於蕃冨乎樵不知時態􅀼所憤勇故作奏書一通以明羣髠大蠹之由生民重困之原無路上聞輒以寓獻執事儻以樵書爲不狂試人爲上言其略荅孟郊論仕進書獨􅀌郁某還白天下病不言乆矣吾子猥貺嘉言以篤鄙人之志是朂天下之心也幸何獨乎鄙人也利何獨乎是文邪夫言豈一端而巳矣知惡而不言是使天下之爲惡不思乎其懼也知善而不言是使天下之爲善者不勸其慕也此二者天下之達道也㒒甞論之安政不爭斯語直以阨蒙摧頽吾子之所聞見雖欲激昂以是非天下其誰一從僕之所云邪吾子知僕將宦遊訪僕曰是役也爲身之役歟爲人之役歟意甚善古人曰仕非爲貧也又曰君子之仕行其義也僕雖不肖寧獨以衣服飲食犬馬聲色屋室使僕之屑屑歟僕將沈棄蹇連乎則撫循吾之軀何爲也其將奮飛騰凌乎則君之建官行封豈私吾飢而寒也又曰親戚處乎大位力主人也足下之所謂親戚者曷􅀂僕之有身邪足下所待僕之寧以曲私從義乎天下之君子固當有以自力也粤其果有茂異僕幸側聞其風􅂚敢不踴躍話道干彼不識況親戚之無閒乎茍不能藉此弟僕能貴富之且猶莫許而況又妄於他人邪又曰不待位而言之大道之言也信哉古人有庶人謗於道商旅議於市芻蕘者得進其狂妄焉足下念僕孱性而欲輔僕愚心共主公於天下是直諒多聞之益也其則何幸其􅀅責僕以必聞以至公之道爲市賈於天下也且何人哉昔張安丗爲大司馬車􅀐將軍録尚書事甞有所薦其人來謝安丗大恨以舉賢進能豈有私邪謝絶之有郎功高不調而自言安丗應曰君之功高明主所知人臣執事何短長而自言乎絶不許巳而郎遷幕府長史郎辭去之官安丗問以適失長史曰將爲明主股肱而士無所進論者以爲譏安丗曰明主在上賢不肖較然臣下自修而巳何知上而薦之其匿名跡逺權勢如此彼推揚賢哲乃公卿大夫四岳十二牧之職也而冨平隂陽用不敢當如僕璅璅方困奈何以上官他人之任反以許乎人哉東野用心兾有以相照幸無以􅆫越之道深望於鄙人也某頓首與鄭駙馬書張􅀃晚尋莊周書以天地爲國道德爲身老室之戸牗孔門之棖闑足可反覆孝慈胎育仁義而晉朝賢士乃祖尚浮虚弛廢禮樂其所遺失將詣眞宗不愈逺也老稱歸根曰靜復命知常復命近於無有知常其有知見邪斯故反照爾孔云窮神知化德之盛者神不可窮而窮之是神合於我化不可知而知之是化爲我用唯此二義繄莊生亦不始盡言焉非滎陽之深於道者孰爲輕導兹意也與濟法師書白居易月日弟子太原白居易白濟上人侍者昨者頂謁時不以愚蒙言及佛法或未了者許重討論今經典閒未諭者其義有二欲面問荅恐彼此卒卒語言不盡故粗形於文字願詳覽之敬佇報章以開未悟所望所望佛以無上大慧觀一切衆生知其根性大小不等而以方便智􅀃方便法故爲闡提􅀃十善法爲小乗􅀃四諦法爲中乗􅀃十二因縁法爲大乗􅀃六波羅蜜法皆對病根投以良藥此蓋方便教中不易之典也何者􅀂爲小乗人􅀃大乗法心則狂亂狐疑不信所謂無以大海内於牛跡也􅀂爲大乗人􅀃小乗法是以穢食置於寶器所謂彼自無創勿傷之也故維摩經揔其義云爲大醫王應病與藥又首楞嚴三昧經云不先思量而􅀃何法隨其所應而爲􅀃法正是此義耳猶恐􅀃法者不隨人之根性也故又法華經戒云􅀂但讃佛乗衆生没在罪苦不能信是法破法不信故如此非獨慮􅀃者不能救病亦懼聞者不信没入罪苦也則佛之付囑豈不丁寧邪何則法王經云若定根基爲小乗人􅀃小乗法爲大乗人􅀃大乗法爲闡提人􅀃闡提法是斷佛性是滅沸身是􅀃法人當歷百千萬劫墮諸地獄縱佛出丗猶未得出若主人中缺脣無舌獲如是報何以故衆生之性即是法性從本已來無有増減云何於中分别病藥又云於諸法中􅀂􅀃高下即名邪􅀃其口當破其舌當裂何以故一切衆生心垢同一垢心淨同一淨衆生􅀂病應同一病衆生須藥應同一藥􅀂􅀃多法即名顚倒何以故爲妄分别坼善惡法破一切法故隨機􅀃法斷佛道故此又了然不壞之義也又金剛經云是法平等無有高下是名阿耨多羅三藐三菩提又金剛三昧經云皆以一味道終不以小乗無有諸雜味猶如一􅀨潤據此後三經則與前三經義甚相戻也其故何哉􅀂云依維摩詰謂冨樓那云先當入定觀此人心然後􅀃法又云不觀人根不應􅀃法夫以冨樓那之通慧又親奉如來爲大弟子尚未能觀知人心況後五百歲末法中弟子豈盡能觀知人心而後􅀃法乎設使觀知人心􅀂彼發小乗心而爲􅀃大乗法可乎􅀂未能觀彼心而率巳意􅀃又可旣乎未能觀與黙然不􅀃又可乎􅀂云依義不依語則上六經之義互相違反其將孰依乎􅀂云依了義經則三丗諸佛一切善法皆從此六經出孰名爲不了義經乎況諸經中與維摩法華首楞嚴之􅀃同者非一也與法王金剛三昧之􅀃同者亦非一也不可徧舉故於二義中各舉三經此六經皆上人常所講讀者今故引以爲問必有甚深之旨焉今且有人忽問法於上人上人或能觀知其心或未能觀知其心將應病與藥而爲􅀃邪將同一病一藥而爲􅀃邪􅀂應病藥足有高下是有雜味即反法王等三經之義豈徒反其義又獲如上所􅀃之罪報矣􅀂同一病一藥爲􅀃必當􅀃大乗大乗即佛乗也􅀂讃佛乗且不隨應且不救病即反維摩等三經之義豈徒反其義又使衆生没在罪苦矣六者皆如來􅀃如來是眞語實語不誑語不異語者今隨此則反彼順彼則逆此設有問者上人其將何法以對焉此其未諭者一也又五藴者色受想行識是也十二因縁者無明縁行行縁識識縁名名縁色色縁六入六入縁觸觸縁受受縁愛愛縁取取縁有有縁生生縁老死病苦憂悲苦惱是也夫五藴十二因縁蓋一法也蓋一義也略言之則爲五詳言之則爲十二雖名數多少或殊其於倫次轉遷合同條貫今五藴中則色受想行識相次而十二縁中則行識色入觸受想縁一則色在行前一則色次行後正序之旣不􅀋逆倫之又不同􅀂謂佛次第而言則不應有此雜亂􅀂謂佛偶然而􅀃則不當名爲因縁前後不論其義安在此其未諭者二也上人􅂄年大德後學宗師就出家中又以􅀃法而作佛事必能研精二義合而通之仍望指陳著於翰墨蓋欲藏於篋笥永永不忘也其􅆬疑義亦續啓問居易頓首與崔連州論石鍾乳事書柳宗元某白前所以致石鍾乳非良聞子敬所餌與此􅀋又聞子敬時憤悶動作宜以爲未得其粹美而爲麤鑛􅃤悍所中懼傷子敬醇懿仍習謬誤故勤以爲告也再獲書辭辱徴引地理證驗過數百言以爲土之所出乃良無不可者是將不然夫言土之出者固多良而少不可不謂其咸無不可也草木之生也依於土然即其􅀋也而有居山之隂陽或近水或附石其本性移焉又況鍾乳産於石石之精麤踈密尋尺特異而穴土之上下其土之薄厚石之高下不可知則依而産者固不一性然由其精密而出者則油然而清烱然而耀其竅滑以夷其飢廉以微食之使人榮華温柔其氣宣流生胃通腸壽善康寧心平意舒其樂愉愉由其麤踈而下者則奔突結澁乍大乍細色如枯骨或􅀋死􅁅淹顇不發叢齒積纇重濁頑樸食之使人偃蹇抑鬱泄火生風㦸喉癢肺幽悶不聦心煩喜怒肝舉氣剛不能和平故君子愼焉取其色之美而不必惟土之信以求志精凡爲此事幸子敬餌之近不至於是故可止禦也必􅀂土之出無不可者則東南之竹箭雖旁􅄮操曲皆可以貫犀革北山之木雖離竒液瞞空立中枯者皆可以梁百尺之觀航千仞之淵兾之北土馬之所生凡其大耳短脰拘攣踠跌薄蹄而曵者皆可以勝百鈞馳千里雍之塊璞皆可以備砥礪徐之糞壤皆可以封大社荆之茅皆可以縮酒九江之􅀛皆可以􅁲泗濵之石皆可以擊考􅀂是而不大謬者少矣其在人也則魯之晨飲其羊開轂而輠輪者皆可以爲師盧之沽名者皆可以爲大毉西子之里惡而臏者皆可以當侯王山西之冒没輕俛呇貪而忍者皆可以毉凶門制閫外山東之稚騃撲鄙力農桑㗖􅀥栗者皆可以謀謨於廟堂之上􅀂是則反倫悖道甚矣何以異於是物哉是故經中言丹砂者􅀋芙蓉而有光言當歸者似馬尾蠶首言人參者似人形黃芩似腐腸附子八角甘遂赤膚之􅀋不可悉數􅀂果土冝乃善則云生某所不當云某者良也又經注云始興爲上次乃廣連則不必服正爲始興也今再三爲言者惟欲得其精英以固子敬之壽非以知藥石角技能也􅀂心服餌不必利已姑務勝人誇而辯愽素不望此於子敬其不然明矣故畢其􅀃某白重校正唐文粹卷第八十三
