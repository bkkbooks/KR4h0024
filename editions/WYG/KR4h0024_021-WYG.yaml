body:
  text: 頌丁政徳總一十首古賢宰一虙子賤碑頌賈至良牧三廣州都督嶺南按察五府經畧使宋公遺愛碑頌張説京兆尹張公徳政碑頌王維唐衞尉卿洪州都督張公遺愛碑頌崔祐甫興利三復練塘碑頌李華髙陵令劉公遺愛碑頌劉禹錫蘇州嘉興屯田紀績碑頌李翰靈跡一唐天台山新桐柏觀碑頌崔尚髙道一唐中嶽體𤣥先生潘尊師碑頌陳子昻宗理一長明燈髙邁虙子賤碑頌賈至清静致理中庸之徳至髙明柔克簡易之體大繹微㫖而徴遺論何先生道蔚其葳㽔者也先生宣慈在躬精義入神徳順乎天性根於仁殷其如雷暧然如春始受業於仲尼終委質於魯君爾乃周道凌遲王風哀思夷狄竊於位號干戈亂於原野則我魯國無齊晉之强定哀非桓文之主三卿有僣虐之政先生處此亂邦從之理邑平心氣而全耳目晏然躋富夀之域焉自非知微知彰變化無窮孰能臻此觀夫為政之大體元之要恤孤哀喪舉事問弔訓之以悌加之以孝備五更而悟君賢三老而禀教然後燕居以佚其體張樂以和其人夜漁不戒而信欺史不威而息是以宣尼惜君之理小子期問君之政暇何其逺哉向使移於有國之君則陶唐之理也施於有政之臣則二南之化也昔舜左禹而右臯陶不下席而天下理周公殽膳在御不解懸而四夷伏小大則異其揆則同天寳初至始以校書郎尉于單父想先王行事徴其頌聲而古碑殘缺苔篆磨滅使立志之士何以揖其遺風焉嗚呼其道存而其事往其人亡而其政息哀哉遂作頌曰鳴琴湯湯虙子之堂清静無為邑人以康澆風化淳霸俗致王誰謂陽鱎革而為魴皤皤黄髮或師或友芃芃麥苗不稂不莠齊師己卻魯俗斯阜諫或剖心伊人引肘穆穆伊人希聖之才堯舜既往孰為來哉從時巻舒與道徘徊㳺泳孔門取容定哀泱泱千古顯顯令徳聲隨攸牧恵與順息人亡政弊道播神黙寂寥夜川惆悵舊國荒祠尚掃苔篆將磷尋風聆韻想見其人年代邈殊精誠闇親再表貞石頌聲惟新廣州都督嶺南按察五府經略使宋公遺愛碑頌張説維唐御天下九十有八載蒼生賁乎海隅𤣥澤漫乎荒外天子念窮鄉之僻陋徼道之脩阻吏或不率不馴人或不康不若乃命舊相廣平公宋璟鎮兹裔壤式是南州篤五管之政教總三軍之旗鼓幅員萬里馴致九譯詔書下日靡然順風曷由臻斯威名之先路也公曩時執白簡登𤨏闥推誠謇諤不私形骸忤英主之龍鱗蹹奸臣之虎尾挫二張之鋭則聲怛寰域折三思之角則氣盖風雲由是極有四星維帝之輔地有五嶽維天之柱其出宰也君之股肱其出守也人之父母至於此邦之長人也飲食有節衣服有常清心而庶務簡正色而羣下一瑟兮僴兮赫兮咺兮固以不怒而威不言而信雖有文身鑿齒被髮儋耳衣卉麪木巢山館水種落異俗而化齊言語不通而心喻矣其率人版築教人陶瓦室皆斁葬晝逰則華風可觀家撤茅茨夜作而災火不發棟宇之利也自今始祖國之舶車海琛雲萃物無二價路有遺金殊裔胥易其迴途逺人咸内我邉郡交易之坦也有如此故能言之士舉為美談盖微子去殷以後王者襄公伐楚將得諸侯尚書東漢之雅望黄門北齊之令徳宋氏世名公其濟美詩所謂無念爾祖聿脩厥徳廣平有焉若夫往者屈也來者伸也往來相召而哀樂繼之鴻飛遵渚於汝信處龍章衮衣以我公歸鬱陶乎人思嗟歎之不足廣府司馬譚瓌畨禺耆老某乙等相與刻石傳徽斯文予春秋之徒也豈將苟其辭哉雅敬宋公王臣之重次嘉譚子賛徳之義遥感耆舊去思之勤越裳變風知周公之才之美吉甫作頌見申伯平藩于宣觀政將來惡可廢也頌曰降王宰兮逺國靈歌北户兮舞南溟酌七徳兮考六經政畫一兮言不再草木育兮魚鼈寧變蓬屋兮改籬牆魚鱗瓦兮鳥翼堂洞日華兮皎夜光火莫炖兮風莫颺事有近兮恵無疆崑崙寳兮西海財㡬萬里兮嵗一來舟如鳥兮貨為臺市無欺兮路無盜旅忘家兮扃夜開越井岡兮石門道金鼔愁兮旌斾好來何暮兮去何早犦牛牲兮菌雞卜神降福兮公夀考京兆尹張公徳政碑頒并序王維雲從龍風從虎氣應也聖人作賢人輔徳同也君臣同徳天也通氣以康九有以遂萬類惟皇御極二十載光格四表至于海隅日出越小大邦蠻貊師長罔不欽于成憲以承天休然天子猶日省三接列辟日聴萬方輿頌懼人有未化賢有未登故敭仄陋兼乎十等選宗室及乎九族任事以觀材積時以觀行乃得我賢京兆焉夫京兆號為難理清浄病於不給刀筆拘於守文或以輭弱廢或以殘賊劾把宿負淺為丈夫用鉤距盖非長者我則異於是大道難名大理無法閉闗於任數巧算不能知堅壁於晝一善取不能下摧宿豪如薙草無慍色視大權如厯塊無傲容百司之吏總一徳以咸服五方之人雜異教而同理受命之始先聲已振黠吏惡少聞風族行及乎鳴騶詣府登堂坐定縣尹掾吏以次上謁守正之人其氣髙含章之人其詞大見容色而聞號令小人感而君子泰日者擽陽男子閭里為豪借客報仇聚人為盜或白日手刃或黄塵袖鎚政寛則以身先諸偷操急則以事中長吏貳過不已萬計自脱公命吏縛之立死鈴下於是人入闇室若遇大賔焉前年不登人顇太甚野無遺糠路有委骨天子不忍征於不粒賦於無衣六軍從衞以臨東諸侯息闗中也帝曰咨天其降威人罔畏罪台恐㓂盜乃邑矧曰蕩析離居惟爾克濟撫兹西土公拜稽首思塞休命布慈恵之政不以利淫震雷霆之威其或宥過饔人減雙雞之膳圉人省五馬之秣淘不獻服圬不塓棺自身已往振廪同食雖人烟不動道殣相望不思濫以苟生咸守教以就死是不可能也先是王公或専南山之利司農涸昆明之池收赤岸澤將為田以便官至是悉奏罷之舟漁衡麓之守廢蒲荷新蒸之産入自郊徂邑室有魚飱斬隂伐陽市多山禾人得以贍惟涇有防比嵗多决近縣疲於力役他山遺於度材公命刮朽壤填巨石辮大木去編菅其始告勞乃終有慶匠石日減功萬蔵史日省錢億晨始學耒女始安織於是鮐背黄髮之耆曰我有田疇鍾秉其畆我有子弟顔閔其行鄉黨以睦惸失其獨道路有禮汰無與争酒先養老賄不問吏既無吠狗亦無奸人臨年餘資竊蒙恵化其曷以臻兹君子曰此天子至公内舉不避親錫汝明尹張公之力也夫公於國為外戚於帝為外弟重組累印珥香貂者七葉奉車駙馬乗朱輪者十人勝衣則綺襦紈袴通籍則玉墀青瑣動則兩驂如舞坐則五鼎成列文軒楚製素女趙舞而公儼兮其若容淡兮其無味心在四教語稱七徳目視六籍口誦九歌懐君子令徳之忠保詩人錫類之孝悌有過於共被慈有踰於含食惡衣以居公服不敢降也屈體下士王綱不敢替也協二姓之好以正人倫傍無嬖御分一人之憂以審王政下多英傑若夫皇帝敬問之詔御札自書天王命賜之衣上宫所製勤勞則中使接武計議則走馬來朝豈惟衆臣重其經術為吏雜以儒雅而已且公之徳升聞于天非一朝一夕之漸也亦以稱職於累官著聲於所在其丞秘書也闕文遺簡多在大家深為子孫之蔵密有緘縢之固公不憚權貴或抵或誘盡歸天閣官書備焉其牧郢人也人有不若徳戮之不為暴人有不保居撫之不為諂存者考其事壯其食以畜之行者緝其宫藝其樹以待之此邦之人既優他邦之人又至焉未盈一嵗遂増萬户其守汾也仍嵗大旱郡祠介推雖屢舞僊僊而靈應未若公命束藴取火伐樹寘薪釃酒而祝曰有功於人祀為明神無徳而祿禍亦覆餗自絳已來人實祀子純犧大璧不敢愛必以薦也童兒季女不敢黷必以敬也神既靡荅人將安仰若亭午而雨則樹其鷺羽執此騂毛不然者火燎將至焮天鑠地靈衣且為煨燼豐屋將為茂草爾其圗之言未畢而雲興拜未起而雨降周於闔境不入他郡雖封疆咫尺而彼竭我盈嘻若記能事載盛徳渭川之竹不足簡終南之木不足軸夫訓人至於禮儀曰徳安人免於阽危曰功徳者上賞於上下頌於下長老孜孜願刋于石以予學於舊史來即我謀且維與人編户與人為伍與人出入與人言語知風俗之淳弊識政化之原本屬詞媿文書事盖實詞曰五代相韓七葉侍漢及我聖朝亦生邦翰大道無形貞蠱以幹含章不耀在割能斷情偽萬端吾道一貫帝選賢尹無以易張金印紫綬京兆之章佩我鳴玉冠我兩梁天子休命拜首以將寛而愛人立滅暴强明明天子哀此南畆將息西入遂覲東后我教我訓我鎮我守茫茫三秦則罔餬口守死以義徇生不苟王曰外弟視人不佻何以寵之手書以詔何以問之賜衣而朝俾人華胥致君帝堯刻石作頌永世彌昭唐衞尉卿洪州都督張公遺愛碑頌并序崔祐甫今天子終諒闇易月之期不言既言之日詢于師保輔弼之臣曰將以國之明燭震下士俾兆人康又有道哉四臣曰莫如擇賢而司牧之雖欲不理不可得也上曰用賢何先四臣曰莫先於幽逺蠻貊之邦為急也即日命王人遽以制書就拜衞尉卿兼洪州都督張公為御史中丞廣州刺史嶺南節度經略觀察等使既踰月而遽屆于洪洪之耆老􅄔惸商販漁釣百類千品周聲奪魄于野于廛咸曰寧取我裳而裂之寧取我廪而焚之父也天只胡為奪我之君中丞受命而南舟不及汎馬不及秣國人懐慕之罔極曰清塵逺矣君不顧矣鬱陶之思何用哉盍用於揚名頌徳乎故吏兵曹㕘軍張擢法曹㕘軍豫章縣令鄭鋒建昌縣令盧惟瑾新呉縣令鄥賁州人東冶府果毅劉容耆夀喻乾相等討論之衆僉曰允於心曰自昔為政者知清之可以長人也而清者稀豈不欲清欲牽之也欲之所行不亷不儉為之舟輿也清之不立肆奢崇貨為之鑚鑿也於是撤其帷帳薦蓐之具便於身悦於目者二百餘物歸之有司減其俸錢稍食月㡬十萬實於軍府此皆前政之所督觀而封已者我則推而逺之於是公儀之義申平仲之規見矣二之日謀於衆曰昔曹㕘去齊以獄市為寄以為擾於獄者輕重人之命煩於市者耗斁人之生苟鞭笞桁楊之無度侵牟肆奪之不改是國家以章綬印璽毒蒼生也豈致理哉於是平百貨之貴賤議刑罰之等差使其貪不下殘忿不私逞韓子求環而不可使人袒背而無傷夫然噬嗑之象成行葦之恩溥矣三之日謀於野曰不稼不穡民天安仰載馳載驅王命所急吾觀是邦農野未闢傳置未修豈不以使役無期供億失序儻野有餓殍賔不如歸亦諸侯之恥也於是減承城吏卒㡬三千歸之隴畆而擊柝之守無闕焉賦豪墆財數百萬賙于館餼而含糗之徒不知也其卒也不公之吏留以為厮其財也不法之臣受以潤屋我皆用之於愛人活國也於是阜藩之望崇多大之儀備矣從政三日州人愛之如父母承之如松柏夫婦耕織之暇無他懼惟懼公速遷其餘煦嫗孕育發於中而形於言損其身而益於物可以激穨俗慰窮甿者豈勝道哉祐甫山東鄙人不好佞飾凡所聞見務存實録故採拾而書之公名休字祥幽州范陽縣人有晉司空茂先之逺裔也曽祖汲易州長史祖選幽州固安縣丞考價贈齊州司馬公起家石亭别將自是為縣令軍司馬州長史各一入為天子友儲君臣雖假以寵名而跡實戎索受命為范陽節度安禄山判官祿山以大權大寵外示忠而内謀逆太上皇推赤心而勿疑敢有間之者死蹈虎尾犯龍鱗公密言其戎狄豺狼不可厭也當是時也視鼎鑊如歸焉神之聴之是與正直周旋鋒鏑之下出入宼讎之間而能終保元吉漸干貴仕進退存亡而不失其正其惟張公乎又牧豪舒潤三州而及此昔張黄門庭珪牧此州甚得人譽張丞相九齡次之逮府君又有裕焉故邦人有三張之目頌者美盛徳之形容非魯僖公仲山甫不之獲今兹頌曰昔為豫章故有循良黄門之善于今不忘爰及丞相亦有烈光我君戾止是為三張立廉寳儉無怨無傷郵亭之下賔旅其康四封之内望嵗千箱自春徂夏兮人相慶慶未畢兮聞後命朱轓玉節兮向蕃禺彼願􅂒兮我望孤君乎君乎若嵗大旱其誰見濡潤州丹陽縣復練塘頌并序李華大蜡之祭辭曰土反其宅水歸其壑先王因流下而導之故曰九川滌源因迆匯而瀦之故曰九澤既陂以疏天地之氣以利元元之用崇伯汨五行而殛羽山臺駘章大澤而封汾川洪範首之春秋載之地有廣狹事無今古大江鉅區惟潤州其藪曰練湖幅員四十里菰蒲菱芡之多龜魚鼈蜃之生厭飫江淮膏潤數州其傍大族强家泄流為田專利上腴畆收倍鍾富劇淫衍自丹陽延陵金壇環地三百里數合五萬室旱則懸耜水則具舟人罹其害九十餘祀凡經上司紛紜與奪八十一斷嗚呼曲能掩直强者以得之老幼怨痛沈聲無告永泰元年王師大翦西戎西戎既駾矣生人舒息詔公卿選賢良先除二千石以江南經用所資首任能者是嵗十一月二十三日拜前常州刺史京兆韋公損為潤州聲如飇馳先詔而至吏人畏伏男女相賀即日上無貪刻下無寃憤公素知截湖閏壤災甚螟蝥臨事風生指期以復羣謗雷動山鎮恬然中明獨裁文之以禮乃白本道觀察使兼御史中丞韋公元浦中丞撫掌愜心如公之謀且曰興利除害待其人而後行非常之政敢歸叔父公乃申戒縣吏卒徒闢之人不俟召呼而從役畚鍤盖野浚臯成蹊増理故塘繚而合之廣湖為八十里像月之規儔金之固水復其所如鯨噀射洶洶隠地雷聞泉中先程三日若海之彌望灝灝如吞吐日月沈沈如韞蓄風雨所潤者逺原隰皆春耕者飽憂者泰於是疏為斗門既殺其溢又支其澤沃塉均品河渠通流商悦奠價人勇輸賦遐邇受利豈惟此州每嵗萌隂乗陽二氣相薄大雨時行羣潦奔流水勢所入盈而無傷龍見方雩稼蒙其渥時前相國彭城公劉尚書晏統東方諸侯平其貢税聞而悦之白三事以聞詔書褒異焉彭城公宣命至江南捧詔授公公率元僚掾史令丞已下至于耆艾西向拜手忻戴皇明人心上感天降嘉澤如有神祗昭恊厥至公正直而和専静而斷嫉惡宥過恵人察奸純鈞精堅百鍊不耗伐冰之貴降從士禮詩云靖恭爾位好是正直宜其享福也吏人入賀公拱而謝之曰尚書劉公觀察韋公奉行王澤也鄙何力之有焉丹陽令杜孟寅秉公之清白延陵令李令從如公之愛人金壇令胡玘禀公之成規及丹陽耆夀周孝瓌百姓湯源等拜首而請曰兑為澤兑悦也水歸於澤而澤悦於人百年浸塞而公啓之臣哉隣哉克諧帝休永代是式三縣無災若不碣而刻之則王命不揚於厥後後之人無以倚負也華嘗學古見訪為頌曰望沄沄兮視冥冥鳥閒魚樂葭菼生膏腴利倍起訟争斯人怨抑痛無聲韋公正直動神靈百年㳺淀為漻清飢者飫兮病者寧詔書光寵恩霈榮劃然眊矒復皎明追琢刻頌揚棻馨髙陵令劉君遺愛碑頌并序劉禹錫縣内之大夫鮮有遺愛在其去者盖邑居多豪政出權道非有卓然異績結于人心浹于骨髓安能久而愈思大和四年髙陵人李仕清等六十三人具前令劉君之徳詣縣請以金石刻縣令以狀申于府府以狀考于明法吏吏上言謹按寳應詔書凡以政績將立碑者具所紀之文上尚書考功有司考其詞宜有紀者乃奏明年八月庚午詔曰可令書其章明有以結人心者揚揭于道周云涇水東行注渠釃而為三以沃闗中故秦人常得善嵗按水部式決洩有時畎澮有度居上㳺者不得擁泉而顓其腴每嵗少尹一人行視之以誅不式兵興已還寖失根本涇陽人果擁而顓之公取金流浸源為畦私開四竇澤不及下涇田獨肥他邑為枯地力既移地征如初人或赴訴泣迎尹馬而占涇之腴皆權倖家勢足以破理訴者覆得罪繇是咋舌不敢言吞寃銜忍家視孫子長慶三年髙陵令劉君勵精吏治視人之瘼如熛疽在身不忘決去乃循故事考式文暨前後詔條又以新意請更水道入于我里請杜私竇使無棄流請遵田令使無越制别白纖悉列上便宜掾吏依違不決居二嵗距寳厯元年端士鄭覃為京兆秋九月始具以聞事下丞相御史御史屬元谷實司察視持詔書詣渠上書得利病還奏青規中上以谷奉使有狀乃俾太常撰曰京兆下其符縣主簿談孺直實董之冬十月百衆雲奔憤與喜并口謠手運不屑鼛皮揆功什七八而涇陽人以竒計賂術士上言白渠下髙祖故墅在焉子孫當恭敬不宜以畚鍤近阡陌上聞命京兆立止絶君馳詣府控告具發其以賂致前事又謁丞相請以顙血汚車茵丞相彭原公斂容謝曰明府真愛人陛下視元元無所悋第未周知情偽耳即入言上前翌日果有詔許訖役仲冬新渠成涉季冬二日新堰成駛流渾渾如脈宣氣蒿荒漚冒迎耜釋怨開塞分寸皆如詔條有秋之期投鍤前定孺直告已事君率其寮躬勞倈之烝徒讙呼奪襏而舞咸曰吞恨六十年明府雪之奸犯豪卒孰施為嗚呼成功之難也如是請名渠曰劉公堰曰彭城按股引而東千七百步其廣四尋而深半之兩涯夾植杞栁萬本下垂根以作固上生材以備用仍嵗旱沴而渠下田獨有秋渠成之明年涇陽三原二邑中又擁其衝為七堰以析水勢使下流不厚君詣京兆索言之府命從事蘇持至水濱盡撤不當擁者由是邑人享其長利生子以劉名之君諱仁師字某彭城人武徳名臣刑部尚書徳威之五代孫大厯中詩人商之猶子少好文學亦以籌畫于東諸侯遂㕘幕府厯尹劇縣皆以能事見陟率不時而遷既有績于髙陵轉昭應令俄兼檢校水曹外郎充渠堰副使錫朱衣銀章計相愛其能表為檢校屯田郎中兼侍御史斡池鹽于蒲錫紫衣金章嵗餘以課就加中執法理人為循吏理財為能臣一出于清白故也先是髙陵蒙被恵風而惜其捨去發于胷懐播為聲詩今采其㫖而變其詞志于石文曰噫涇水之逶迆溉我公兮及我私水無心兮人多僻錮上㳺兮乾我澤時逢理兮官得材墨綬移兮劉君來能愛人兮恤其隠心既公兮言既盡縣申府兮府聞天積憤刷兮沈痾痊劃新渠兮百畆流行龍蛇兮止膏油遵水式兮復田制無荒區兮有良嵗嗟劉君兮去翺翔遺我福兮牽我腸紀成功兮鐫美石永信詞兮昭懿績蘇州嘉興屯田紀績頌并序李翰禹平九土溝洫之功大棄粒蒸人稼穡之務重自古有國家未嘗不率由斯道底慎其業故登平足以厚生殖禍難足以定凶災未有易此而能理者自羯戎亂常天步多艱兵連不解十有四年因之以飢饉重之夭札死者曝露亡者惰逰編版之户三耗其二歸耕之人百無其一將多於官吏卒衆於農人古者八家為鄰一家從軍七家從之猶曰興師十萬内外騷動不得操農桑者七十萬家今乃以一夫家食一伍一餘子衣一卒師將不立人將不堪此聖上所以旰食宵興求古今令典可以濟斯難者莫出乎屯田廣徳初乃命相國元公昌其謨分命諸道節度觀察都團練使統其事擇封内閒田荒壤人所不耕者為其屯求天下良才善政以食為首者掌其務屯有都知羣士為之都知有治即邑為之官府官府既建史胥備設田有官官有徒野有夫夫有任上下相維如郡縣吉凶相恤如鄉黨有誅賞之政馭其衆有教令之法頒于時此其所以為屯也雖天子命之股肱賛之至於宣上命齊下力經地域制地事辨土宜均土法簡穡器修稼政陳三壤之種而敬其始考九農之要而成其終則都知之職專達其事焉詎可以非其人哉浙西觀察都團練使御史中丞兼吳郡守賛皇公上國大賢憂公如家慎擇厥官以對明命浙西有三屯嘉禾為之大乃以大理評事朱自勉主之且揚州在九州之地最廣全呉在揚州之域最大嘉禾在全呉之壤最腴故嘉禾一穰江淮為之康嘉禾一歉江淮為之儉公首選於衆獨當其任有寛簡恵和之徳知艱難勤儉之事政達乎本智通乎時仁愛足以結下機權足以成務嘉禾大田二十七屯廣輪曲折千有餘里公畫為封疆屬於海濬其畎澮達于州求遂氏治野之法修稻人稼澤之政芟以殄草剔以除木風以布種土以附根頒其法也冬耕春種夏耘秋穫朝巡夕課日考旬㑹趨其時也勤者勞之惰者朂之合耦助之移田救之宣其力也下稽功事達之于上上制禄食復之于下叙其勞也至若義感於内誠動於中徇國忘家恤人猶已野次露宿簞食瓢漿盡内體之勤趨一時之役大寒栗烈而猶執鼖鼓盛暑赫㬢而不傳車盖如登髙去梯與之死生投醪均味忘其飢渇然後知仁義之政必見於耕穫井田之法可施於甲兵夫如是人將竭其力地將盡其利天將與其時自賛皇為郡無凶年自朱公為屯無下嵗元年冬收入若干斛數與浙西六州租税埒朝嘉厥庸授廷尉評公又稽氣授時如前代法有白雀集于髙豐屯廪盖大穰之徵也屯官某乙等聚而稱曰初公為屯人有二懼焉邑人懼其暴屯人懼其擾今溝封大牙而不相侵疆場日履而人不知方舟而上以饋師旅此功及於國也登量而入以寛征税此徳加於人也古者智效一官政修一鄉猶歌之詠之手之足之況朱公之績如此其大者乎遂相與斵琬琰表阡陌南陽太守豈專刻石之功桐鄉嗇夫終踐大農之位其辭曰茫茫九區陽九躔災丘荒札瘥田卒汚萊天步未移連師滿野不耕不穫仰食于下嗷嗷遺人餬口饋軍帝曰予憂爰立其屯且戰且耕古之善經辟師肅祇王命是聴嘉禾之田際海茫茫取彼榛荒畫為封疆宋公莅之展器授方田事既飭黎人則康我屯之稼如雲漠漠夫位棊布溝封綺錯朱公履之勸耨趨穫稂莠不生螟蝥不作嵗登億計征寛税薄息我蒸人遂其耕鑿我屯之庾如京如坻嘉量是登方舟是維賛皇獻之達于京師飽我六軍肅將天威畎距于溝溝達于川故道既堙變將為田朱公濬之執用以先浩浩其流乃與湖連上則有塗中亦有舩旱則溉之水則泄焉曰雨曰霽以溝為天俾我公私永無飢年公田翼翼私田薿薿不侵其畔不犯其穡我倉既盈爾廪維億屯人熙熙邑人怡怡不擾其務不干其時我無爾暴爾無我欺我有官屬朱公訓之我有徒位朱公恤之我有衆役朱公卒之我有徵功朱公序之起於田中印綬纍纍何以况之福禄如茨何以久之刻篆于碑唐天台山新桐柏觀之頌并序崔尚天台也桐柏也代謂之天台真謂之桐柏此兩者同體而異名同契乎𤣥道無不在夫如是亦奚必是桐柏邪非桐柏邪因斯而談則無是是無非非矣而稽古者言之桐柏山髙萬八千文周旋八百里其山八重四面如一中有洞天號金庭宫即中右弼王子晉之所處也是之謂不死之福鄉養真之靈境故立觀有初强名桐柏焉耳古觀荒廢則已久矣故老相傳云昔葛僊公始居此地而後有道之士往往因之壇址五六厥迹猶在洎乎我唐有司馬練師居焉景雲中天子布命於下新作桐柏觀盖以光昭我𤣥元之丕烈保綏我國家之永祉者也夫其髙居八重之一俯臨千仞之餘背隂嚮陽審曲面勢東西數百步南北亦如之連山峩峩四野皆碧茂樹鬱鬱四時恒青大巖之前横嶺之上雙峯如闕中天豁開長澗南瀉諸泉合漱一道瀑布百丈懸流望之雪飛聴之風起石梁翠屏可倚也琪樹珠條可攀也仙花靈草春秋互發幽鳥清猨晨暮合響信足賞也始豐南走雲嶂間起剡川北通煙岑相接東則亞入滄海不逺蓬萊西則浩然長山無復人境總括奥祕鬱為秀絶包元氣以混成鎮厚地而安静非夫神與仙宅仙得神營其孰能致斯哉故初構天尊之堂晝日有雲五色浮靄其上三升投龍之所時有異雲氣入堂復出者三書之者記祥也然后為虚室以鑿户起層臺而累土經之殖殖成之翼翼綴日月以為光籠雲霞以為色花散金地香通𤣥極真侣好道是逰斯息微我練師孰能興之練師名承禎一名子微號曰天台白雲河内温人晉宣帝弟太常馗之後祖晟仕隋為親侍大都督父仁最唐興為朝散大夫襄州長史名賢之家弈代清徳慶靈之地生此仙才以為服冕乗軒者寵患吾身也擊鐘陳鼎者味爽人口也遂乃捐公侯之業學神仙之事科籙教戒博綜無所遺窈冥夷希微妙詎可識無思無為不飲不食仰之彌峻巍乎其若山挹之彌深湛乎其若海夫其通才練識贍學多聞翰墨之工文章之美皆忘其所能也練師藴廣成之徳睿宗繼黄軒之明齋心虛求將倚國政侃侃然不可得而動也我皇孝思維則以道理國協帝堯之用心寵許由之髙志故得放曠而處逍遥而逰聞練師之名者足以激厲風俗睹練師之容者足以脱落氛埃以慈為寳以善救物神以知來智以蔵往允所謂名登仙格迹在人寰奥不可測已夫道生乎無名行乎有情分而作三才播而作萬物故為天下母脩之者昌背之者亡故為天下貴况絶學無憂長生久視也哉道之行也必有階也行道之階非山莫可故有為焉有象焉瞻於斯仰於斯若舍是居教將奚依損之又損之以至於無為𤣥門既崇不名厥功朝請大夫使持節台州諸軍事守台州刺史上柱國賈公名長源有道化人有徳養物嘗謂别駕蔡欽宗等曰且道以含徳徳以致美美而不頌後代何觀乃相與立石紀頌以奮至道之光其辭曰邈彼天台嵯峨崔嵬下臨滄海遥望蓬萊漫若天合呀如地開烟雲路通真仙時來顧我練師于彼瓊臺練師練師道入𤣥微噏日安坐凌霄欲飛興廢靈觀練師攸賛道無不為美哉輪奐窈窈茫茫通天降祥保我皇唐如山是常唐故中嶽體𤣥先生潘尊師碑頌并序陳子昻尊師業尚沖密勤毖幽深理心事天所保唯嗇絶聖棄智不耀其光故真感冥期珍圗祕學性與天道不可得而聞也若乃崇標曠迹遐情逺意志摩青雲蓬視紫闥髙宗每降鑾輦親詣精廬尊師身不下堂接手而已每歎曰大丈夫業於道不能投身霄嶺滅景雲林而疲痾此山以煩世主吾之過乎遂欲東求蓬萊孤舟入海屬天皇敦篤斯道祈款逾深躊躇山隅絶䇿未往既而金革有命鑣轡道區於戱昔姑射有神人堯輕天下崆峒有至道軒屈順風𤣥真髙蹤萬古同徳何其盛哉尊師有弟子十人並仙階之秀然鸞姿鳳骨眇愛雲松者唯潁川韓法昭河内司馬子微皆禀訓瑤庭密受瓊室專太清之業遺下仙之儔谷汲芝耕服勤於我盖厯嵗紀也始尊師受籙於茅山昇𤣥王君王君受道於華陽隠居陶公陶公至子微二百嵗矣而𤣥標仙骨雅似華陽夫偕真蹈冥鍊景逰化者其心必有類乎昭等永惟尊師靈迹洞業髙深邁古而棄世往矣其若之何乃斵石幽山勒頌𤣥徳其辭曰觀元化兮求古之列仙得瑤圗與金鼎信元符之自然神與道而惟一天與人兮相連苟精守以専密必駕景而凌煙丹丘不死兮羨門子黄宫度世兮吾體𤣥體𤣥之至徳兮洵淑美沖心養和寳元始初學茅山濟江水乃入華陽洞天裏道逢真人兮昇𤣥子授以寳書青台㫖令守崧山玉女峯雲棲窮林今五紀聖人以萬機為貴而我以天下為累聖人以大寳為尊而我以天下為煩是以冥居於㟪􅤅寄遺迹於軒轅有唐髙宗兮天子之光好道樂仙兮思彼雲鄉千旌萬騎兮翠鳳凰遨逰汝海兮箕山陽朝拜白茅夕紫房齋心絜意緬相望祈問玉真及玉皇何以得之受天昌黄庭中人在子身窈窈冥冥精甚真去汝驕氣與淫神勤能思之道相親遂解形而遺世乗白雲而上賓弟子不知其所往乃刻石以思真長明燈頌并序髙邁離婁之目處闇室或不能覩燈處之皎如也澄公之掌在𤣥夜或不能照燈在之了如也故大雄氏以方便力救黒暗界籍其光誘其人佛所以有然燈名法所以有傳燈義大抵長明燈是其藴乎夫日主晝太陽之精中則畏昃則沒我長明燈不沒月主夜太隂之精滿則虧虧則盡我長明燈不盡日月尚爾况小光小明哉要自積苦為海舉足見溺積邪為山舉手見礙竟不髣髴之或髣髴之不克成就之言之可為長歎我邑中有俊傑主此然燈精進成就於寳融寺經蔵院且夫蘭炷爇火吾見其盛未見其微也鐵盆盛膏吾見其増未見其減也一籠而四時長花滿室而終嵗不夜人見之者一作禮眼蒙利再作禮心蒙爽心眼自相照了内外由是洞徹然則終日見燈未嘗見燈終日不見燈未嘗不見燈夫達觀者乃如是也意者不獨於此直上照一天二天乃至三十三天無門不闢恒沙善人由兹而入直下照一地二地乃至一十八地有獄皆開多劫罪人由兹而出若然者四維上下虚空可思量不可不思量邪我長明燈實相功徳亦復如是邁三數年内願銘頌之間迫賤事未構斯文一朝染目疾朦朧而不自審從何得也遂夢神人語邁曰子於長明燈其有負乎邁應聲而寤寤而起起而作頌明日目愈頌曰見外燈長明見内燈長明萬惡自光中滅萬善自光中生不見一燈百千萬億燈乃至於無窮不見一人百千萬億人歸之於大同空則是色色即是空弟子作頌允執厥中唐文粹卷二十一欽定四庫全書唐文粹卷
