body:
  text: 古文乙摠四篇復性書三篇李翺平賦書一篇復性書上篇李翺人之所以為聖人者性也人之所以惑其性者情也喜怒哀懼愛惡欲七者皆情所為也情既昏性斯匿矣非性之過也七者循環而交來故性不能充也水之渾也其流不清火之煙也其光不明非水火清明之過沙不渾流斯清矣煙不鬱光斯明矣情不作性斯充矣性者天之命也聖人得之不惑者也聖人者豈其無情邪聖人者寂然不動不往而到不言而神不耀而光制作㕘乎天地變化合乎隂陽雖有情也未嘗有情也然則百姓者豈其無性邪百姓之性與聖人之性弗差也雖然情之所昏交相攻未始有窮故雖終身而不自覩其性焉火之潜于山石林木之中非不火也江河淮濟之未流而泉于山非不水也石弗㪣木不磨則不能燒其山林而燥萬物泉之源弗疏則弗能為江為河為濟為淮東匯大壑浩浩湯湯為弗測之深情之動靜弗息則弗能復其性而燭天地為不極之明是故誠者聖人之性也寂然不動廣大清明照乎天地感而遂通天下之故行止語言無不處於極也復其性者賢人循之而不已者也不已則能歸其源矣聖人知人之性皆喜可以循之其不息而至於聖也故制禮以節之作樂以和之安於仁樂之本也動而中禮之本也故在車則聞和鸞之聲行步則聞佩玉之音無故不廢琴瑟視聽言行循禮法而動所以教人忘嗜欲而歸性命之道也道者至誠而不息也至誠而不息則虛虛而不息則明明而不息則照天地而無遺非他也此盡性命之道也哀哉人人可以及於此莫之止而不為也不亦惑邪昔者聖人以傳于顔子顔子得之拳拳不失不逺而復其心三月不違仁子曰回也其庶乎屢空其所以未到於聖人者一間耳非力不能也短命而死故也其餘升堂者蓋皆傳也一氣之所春一雨之所膏其得之者各有淺深不必均也子路之死也石乞盂黶以戈擊之㫁纓子路曰君子死冠不免結纓而死由非好勇而無懼也其心寂然不動故也曽子之死也曰吾何求焉吾得正而斃焉斯已矣此正性命之言也子思仲尼之孫得其祖之道述中庸四十七篇以傳于孟軻孟軻曰我四十不動心軻之門人達者公孫丑萬章之徒蓋傳之矣遭秦焚書中庸之弗焚者一篇存焉於是此道廢缺其教授者惟節文章句威儀擊劒之術相師焉性命之源則吾弗能傳矣道之極于剥也必復吾豈復之時邪吾自六嵗讀書但為詞句之學志于道者四年矣與人言之未嘗有是我者也南觀濤江入于越而吳郡陸㕘存焉與之言之陸㕘曰子之言尼父之心也東方有聖人焉不出乎此也南方有聖人焉亦不出乎此也唯子行之不息而已矣嗚呼性命之書雖存學者莫能明是故皆入於莊列老釋不知者謂夫子之徒不足以窮性命於道信之者皆是也有問于我我以吾之所知傳焉遂書于書以開誠明之源而决絶廢棄不揚之道幾可以傳于時命曰復性書以治乎心以傳乎人於戲夫子復生不廢吾言矣復性書中篇或問曰人之昏也久矣將復其性者必有漸也敢問其方曰弗慮弗思情則不生情既不生乃為正思正思者無慮無思也易曰天下何思何慮又曰閑邪存其誠詩曰思無邪曰已矣乎曰未也此齋戒其心者也猶未離於靜焉有靜必動有動必靜動静不息是乃情也易曰吉凶悔吝生乎動者也焉能復其性邪曰如之何曰方靜之時知心無思者是齋戒也知本無有思動静皆離寂然不動者是至誠也中庸曰誠則明矣易曰天下之動貞夫一者也問曰不慮不思之時物格于外情應于内如之何而可止也以情止情其可乎曰情者性之邪也知其為邪本無其心寂然不已邪思自息惟性明照邪何所生如以情止情是乃大情也情之相止其有已乎易曰顔氏之子其殆庶幾乎有不善未嘗不知知之未嘗復行也易曰不逺復無祇悔元吉問曰本無有思動静皆離然則聲之來也其不聞乎物之形也其不見乎曰不覩不閒是非人也視聽昭昭而不起於見聞者斯可矣無不知也無弗為也其心寂然光照天地是誠之明也大學曰致知在格物易曰無思也無為也寂然不動感而遂通天下之故非天下之至神其孰能與於此曰敢問致知在格物何謂也曰物者萬物也格者來至也物至之時其心昭昭然辨焉而不應於物者是致知也是知之至也知至故意誠意誠故心正心正故身修身修而家齊家齊而國理國理而天下平此所以能㕘天地者也易曰與天地相似故不違智周乎萬物而道濟天下故不過旁行而不流樂天知命故不憂安土敦乎仁故能愛範圍天地之化而不過曲成萬物而不遺通乎晝夜之道而知故神無方而易無體一隂一陽之謂道此之謂也曰生為我說中庸曰不出乎前矣曰我未明也敢問何謂天命之謂性曰人生而靜天之性也性者天之命也率性之謂道曰何謂也曰率循也循其源而反其性者道也道也者至誠也至誠天之道也誠者定也不動也循道之謂教曰何謂也曰教也者人之道也擇善而固執之者也循是道而歸其本者明也教也者則可以教天下矣顔子其人也道也者不可須臾離也可離非道也說者曰其心不可須臾動焉故也動則逺矣非道矣變化無方未始離於不動故也是故君子戒慎乎其所不覩恐懼乎其所弗聞莫見乎隠莫顯乎微故君子慎其獨也說者曰不覩之覩見莫大焉不聞之聞聞莫甚焉其心不動是不覩之覩弗聞之聞也其復之不逺矣故慎其獨慎其獨者守其中也問曰昔之注解中庸者與生之言皆不同何也曰彼以事解我以心通者也曰彼亦通於心乎曰吾不知也曰如生之言修之一日則可以至於聖乎曰十年擾之一日止之而求至焉是孟子所謂以一杯水而救一車薪之火也甚哉止而不息必誠誠而不息必明明與誠終嵗不違則能終身矣造次必於是顛沛必於是則可以希於至矣故中庸曰至誠無息不息則久久則徵徵則悠逺悠逺則博厚博厚則髙明博厚所以載物也髙明所以覆物也悠久所以成物也博厚配地髙明配天悠久無疆如此者不見而彰不動而變無為而成天地之道可一言而盡也問曰凡人性猶聖人性歟曰桀紂之性猶堯舜之性也其所以不覩其性者嗜欲好惡之所昏也非性之罪也曰為不善者非性邪曰非也乃情所為也情有善而不善性無善而不善焉孟子曰人無有不善水無有不下夫水搏而躍之可使過顙激而行之可使在山是豈水之性哉其所以導引之者然也人之性皆善其不善亦猶是也問曰堯舜豈不有情邪曰聖人至誠而已矣堯舜之舉十六相非喜也流四凶非惡也中於節而已矣其所以皆中節者設教于天下故也易曰知變化之道者其知神之所為乎中庸曰喜怒哀樂之未發謂之中發而皆中節謂之和中也者天下之大本也和也者天下之達道也致中和而天地位焉萬物育焉易曰惟深也故能通天下之志惟幾也故能成天下之務惟神也故不疾而速不行而至聖人之謂也問曰人之性猶聖人之性嗜欲愛惡之心何因而生也曰情者妄也邪也曰邪與妄則無所因矣妄情滅息本性清明周流六虛所以謂之能復其性也易曰乾道變化各正性命語曰朝聞道夕死可矣能正性命故也問曰情之所昏性即滅也何以謂之猶聖人之性也曰水之性清激而渾之者泥沙也方其渾也清性豈遂無有邪久而不動泥沙自沈清明之性鑒于天地非自外來也故其渾也性本弗失及其復也性亦不生人之性亦猶水也問曰人之性本皆善而邪情昏焉敢問聖人之情將復為嗜欲所渾乎曰不復渾矣情本邪也妄也邪妄無因人不能復聖人既復其性矣知情之為邪邪既為明所覺矣覺則無邪邪何由生也伊尹曰天之道以先知覺後知先覺覺後覺者也予天民之先覺者也予將以此道覺此民也非予覺之而誰也如將復為嗜欲所渾是尚不自覺者也而況能覺後人乎曰敢問死何所之邪曰聖人之所不明書于策者也易曰原始反終故知死生之說精氣為物游魂為變是故知鬼神之情狀斯盡之矣子曰未知生焉知死然則原其始反其終則可以盡其生之道生之道既盡則死之說不學而自通矣此非所急也子修之不息其自知之吾不可以章章然言且書矣復性書下篇晝而作夕而休者凡人也作乎非作者也與物皆作休乎非休者也與物皆休吾則不類於凡人晝無所作夕無所休作非吾作也作有物休非吾休也休有物作邪休邪二者離而不存予之所存者終不亡且離矣人之不力於道也昏不思也天地之間萬物生焉人之於萬物一物也其所以異於鳥獸蟲魚者豈非道徳之性全乎哉受一氣而成形一為物而一為人得之甚難也生乎世又非深長之年也以非深長之年行甚難得之身而不専専於大道肆其心之所為其所以自異於禽獸蟲魚者亡幾矣昏而不思其昏也終不明矣吾之生二十有九年矣思十九年時如朝日也思九年時亦如朝日也人之受命其長者不過七十八十年九十百年者則稀矣當百年之時而眂乎九十年時也與吾此日之思于前也逺近其能大相懸邪其又能逺於朝日之時邪然則人之生也雖享百年若雷電之驚相激也若風之飄而旋也可知矣況千百人而無一及百年之年者哉故吾之終日志於道徳猶懼未及也彼肆其心之所為者獨何人邪平賦書一篇并序孔子曰道千乗之國敬事而信節用而愛人使民以時孟子曰欲輕之於堯舜之道大貉小貉也欲重之於堯舜之道大桀小桀也是以什一之道公私皆足人既富然後可以服教化反淳朴古之聖賢未有不善於為政理人而能光于後代者也故善政者莫大於理人理人者莫大于既富之又教之凡人之情莫不欲富足而惡貧窮四民之苦者莫甚於農人麥粟布帛農人之所生也嵗大豐農人猶不能足衣食如有水旱之災則農人先受其害有若曰百姓不足君孰與足夫如是百姓之視其長上如仇讎安既不得享其利危又焉肯盡其力自古之所以危亡未有不由此者也人皆知重斂之可以得財而不知輕斂之得財愈多何也重斂則人貧人貧則流者不歸而天下之人不來由是土地雖大有荒而不耕雖耕之而地力有所遺人日益困財日益匱是謂棄天之時遺地之利竭人之財如此者雖欲為社稷之臣建不朽之功誅暴逆而威四夷徒有其心豈可得邪故輕斂則人樂其生樂其生則居者不流而流者日來居者不流流者日來則土地無荒桑柘日繁盡力耕之地無餘利人日益富兵日益强四鄰之人歸之如父母雖欲驅而去之其可得邪是以與之安而居則富而可教與之危而守則人皆自固孟軻所謂率其子弟攻其父母自有生民以來未有能濟者也嗚呼仁義之道章章然如大道焉人莫不知之然皆不能行何也見之有所未盡而又有嗜欲以害之其自任太多而任人太寡是以有土地者無代無之雖莫不知之然而未有一人能行之而功及於後代者由此道也秦滅古法墮井田而夏殷周之道廢相承滋乆不可卒復翺是以取可行於當時者為平賦書而什一之法存焉庶幾乎有能行之者云爾凡為天下者眂千里之都為千里之都者眂百里之州為百里之州者起於一畝之田五尺謂之步古者六尺為步古之尺小為兹時之尺四尺八寸則方一寸為古之方一步餘三百步六寸二分五釐一百有四十步謂之畝古者步百畝與此時不同従俗之數則易行也一畝為古之田三畝三百六十步謂之里古者畝百為夫夫三為屋屋三為井井之田九夫三屋方三百步為一里也方一里之田九夫頃異名也方一里之田五百有四十畝畝百為頃五頃四十畝也古之里雖小其畝又加小所以古之方一里為田九頃兹時方一里為田五頃四十畝為古之田一十六頃有二十畝也十里之田五萬有四千畝五百四十頃也為古之田一千六百二十頃也百里之州五十有四億畝五萬四十頃也為古之田一十六萬二十頃也千里之都五千有四百億畝五百四十萬頃也為古之田一千六百二十萬頃也方里之内以畝為屋室徑路牛豚之所息葱韮菜蔬之所生植里之家給焉古者方一里為井為田九百畝農夫八家各受田百畝公田八十畝八家同養公田公事畢然後理私事詩曰雨我公田遂及我私餘田二十畝餘為閭井屋室兹時里既加大一畝之田為古之田三畝則十畝之田為古之田三十畝校其多少亦相若矣凡百畝之州為十里者百州縣城郭之所建通川大途之所更丘墓鄉井之所聚甽遂溝澮之所渠大計不過十里者三十有六有田一十九億四萬有四千畝一萬九千四百四十頃也百里之家給焉千里亦如之髙山大川則椁其中長綴短而重之一畝之田以强并弱水旱之不時雖不能盡地力者嵗嵗不下粟一石公索其十之一凡百里之州有田五十四億畝以一十九億四萬有四千畝為之州縣城郭通川大途甽遂溝澮丘墓鄉井屋室徑路牛豚之所息葱韮菜蔬之所生植餘田三十四億五萬有六千畝三萬四千五百六十頃也畝率十畝粟一石為粟三十四萬五千有六百石以貢于天子以給州縣凡執事者之禄以供賓客以輸四方以禦水旱之災皆足于是矣其田間樹之以桑凡樹桑百人之所沐者謂之功桑太寡則乏于帛桑太多則暴于田是故十畝之田植桑五功一功之蠶取不宜嵗度之雖不能盡其功者功不下一匹帛公索其百之十凡百里之州有田五十有四億畝以一十九億四萬有四千畝為之州縣城郭通川大塗甽遂溝澮丘墓鄉井屋室徑路牛豚之所息葱韮菜蔬之所生植餘田三十四億五萬有六千畝麥之田大計三分當其一其土卑不可以植桑餘田二十三億有四千畝樹桑凡一百一十五萬有二千功率十取一匹帛為帛一十一萬五千有二百匹以貢于天子以給州縣凡執事者之禄以供賓客以輸四方以禦水旱之災皆足于是矣鰥寡孤獨有不人疾者公與之粟帛能自給者弗征其田桑凡十里之鄉為之公囷焉鄉之所入于公者嵗十舍其一于公囷十嵗得粟三千四百五十有六石十里之鄉多人者不足千六百家鄉之家保公囷使勿偷饑嵗并入不足于食量家之口多寡出囷與之而勸之蠶以須麥之升焉及其大豐鄉之正告鄉之人歸公所與之當戒必精勿濡以内于公囷窮人不能歸者與之勿徵于書則嵗雖大饑百姓不困于食不死于溝洫不流而入于他矣人既富樂其生重犯法而易為善教其父母使之慈教其子弟使之孝教其鄉黨使之敬讓羸老者得其安幼弱者得其養鰥寡孤獨有不人疾者皆樂其居屋室相鄰煙火相接于百里之内與之居則樂而有禮與之守則人皆固其業雖强暴之兵不敢凌自百里之内推而布之千里自千里而被于四海其孰能當之是故善為政者百姓各自保而親其君其君雖欲危亡弗可得也其在詩曰迨天之未隂雨徹彼桑土綢繆牖戸今女下民或敢予侮此之謂也唐文粹巻四十四上欽定四庫全書唐文粹巻四十四下宋姚鉉編古文丙揔六十七篇鹿門隐書六十篇皮日休古漁父四篇劉蛻時議三篇元結鹿門隐書六十篇并序皮日休醉士隐於鹿門不醉則游不游則息息於道思其所未至息於文慙其所未周故復草隠書焉嗚呼古聖王能旌山夫谷民之善者意在斯乎或曰仲尼修春秋紀災異近乎怪言虎賁之勇近乎力行衰國之政近乎亂立神祭之禮近乎神將聖人之道多岐而難通奚有不語之義也曰夫山鳴鬼哭天裂地坼怪甚也聖人謂一君之暴災延天地故諱耳然後世之君猶有窮凶以召災極暴以市異者矣夫桀紂之君握鉤伸鐵撫梁易柱手格熊羆走及虎兕力甚也聖人隠而不言懼尚力而虐物貪勇以喪生然後世之君猶有喜角觝而忘政受拔拒而過賢者寒浞竊室子頑通母亂甚也聖人隠而不言懼來世之君為蛇豕民為淫蜮然後世之君猶有易内以亂國通室以亂邦者夏啟畜乘龍周穆讌瑶池神甚也聖人隱而不言懼來世之君以幻化致其物以左道成其樂後世之君猶有黷封禪以求生恣祠祀以祈欲者嗚呼聖人發一言為當世師行一行為來世軌豈容易而傳哉當仲尼之時苟語怪力亂神也吾恐後世之君怪者不在於妖祥而在於政教也力者不在於角觝而在於侵凌也亂者不在於衽席而在於天下也神者不在於機鬼而在於宗廟也若然者其道也豈多岐哉民性多暴聖人導之以其仁民性多逆聖人導之以其義民性多縱聖人導之以其禮民性多愚聖人導之以其智民性多妄聖人導之以其信若然者聖人導之於天下賢人導之於國衆人導之於家後之人反導為取反取為奪故取天下以仁得天下而不仁矣取國以義得國而不義矣取名位以禮得名位而不禮矣取權勢以智得權勢而不智矣取朋友以信得朋友而不信矣堯舜導而得也非取也得之仁殷周取而得也得之亦仁吾謂自巨君孟德已後行仁義禮智信者皆奪而得者也悲夫文學之於人也譬乎藥善服有濟不善濟反為害或曰聖人見一善必汲汲慕之夫丹朱商均雖曰不肖豈便毒於豺虎哉何其嗣之逺也且善足以保身不足以保天下噫丹朱商均苟非堯舜之子一身且不自保况天下哉毁人者自毁之譽人者自譽之夫毁人者人亦毁之不曰自毁乎譽人者人亦譽之不曰自譽乎或曰神農牛首蜚仲鳥身信乎哉曰非形也象也夫梟羊䝟貐尚猶類人況聖賢也哉或曰夏禹為黄熊信乎哉曰非也感也夫簡狄吞鳥卵而生契姜嫄履大迹而産稷是也當禹之母夢熊而生耳不然者禹誠是熊吾以聖人為罔象也或曰孟子云予何人也舜何人也是聖人皆可修而至乎曰聖人者天也非修而至者也夫知道然後能修能修然後能聖且堯為唐侯二十而以德盛舜為鰥民二十以孝聞焉在乎修哉后稷之戲必以藝殖焉仲尼之戲必以爼豆焉在乎修哉盖修而至者顔子也孟軻也若聖人者天資也非修而至也窮山人盡行也大江人盡涉也然而不幸者有遇虎兕之暴蛟龍之患者矣豈以是而止哉夫途有遇是患而死者繼其踵者惟恐其行之不速也今之士為名與勢苟刑禍及流竄至是監刀鋸者必名人司流竄者必勢士繼其踵者惟恐其位之不速也嗚呼名與勢然也吾患其内虎兕乎蛟龍乎是天不為人幸也非人也其或披林逐虎兕入水嬰蛟龍遇其患也是人不為天幸也非天也若是以遇禍則終身所為心之駔儈焉君子不為其所不為小人為其所不為可以威而不威可以殺而不殺難也絜者不觀其窮觀其富也慎者不觀其危觀其勢也苟當窮能絜當危能慎戒也非真也古之官人也以天下為己累故已憂之今之官人也以己為天下累故人憂之今道有赤子將為牛馬所踐見之者無問賢不肖必惕惕然皆欲驅牛馬以活之也至夫國有弱君室有色婦有欲謀其國欲其室者惟恨其君與夫不罹赤子之禍也噫是復何心哉孟子曰伯夷隘栁下惠不㳟伊尹五就湯五就桀皮子採亷於伯夷亷於天下不為隘矣擇和於下惠和於天下不為不恭矣取志於伊尹志於天下不為大矣天有造化聖人以教化禆之地有生育聖人以養育禆之四時有信聖人以誠信禆之兩曜有明聖人以文明禆之噫禆於天地者何獨聖人雖禽獸昆蟲雲物亦不能自順其化麟鳳禆於祥瑞也蛟龍禆於潤澤也昆蟲禆於地氣也雲物禆於天候也而况於聖人乎況於鬼神乎故紆大君之組綬食生人之膏血苟不仁而位是不禆於禄食也況能禆於天地乎吾乃知是禽獸昆蟲雲物不竊於天地之覆燾也舟之有仡五勃反動舟貌猶人之有道也仡不安也舟之行匪仡不進是不安而安也人之行也猶舟之有仡匪道不行是不行而行也夫秦失仡於項項遺仡於漢是聖人之道不安其所安小人之道安其所不安也伊尹之道一介不以與人一介不以取諸人吾得志弗為也與之以道取之以道天下可也況一介哉伊尹之道近乎執吾去執而取亷者也伯夷不事非君不治非民治則進亂則退吾得志弗為也不仕非君孰行其道不治非民孰急天下以非君乎湯不當事桀文王不當事紂也以非民乎桀民不赴殷紂士不歸周矣故伯夷之道過乎高吾去高而取介者也栁下惠何事非君何使非民與惡人言雖袒裼裸䄇於我側爾焉能浼我哉吾得志弗為也夫蚍蜉豈過人而有禮哉民之下者亦若是而已栁下惠之道過乎溷吾去溷而取辨者也於戲黄巻之内聖賢者皆在焉慕而不及愛而不可必鬱鬱於厲夫至乎是者為心乎為身乎心則勞身則憊嗚呼道果不在於自用古之奢也吾不奢古之儉也吾不儉適管晏之中或可矣噫古之奢也僭今之奢也濫古之儉也性今之儉也名學而廢者不若不學而廢者學而廢者恃學而有驕驕必辱不學而廢者愧已而自卑卑則全勇多於人謂之暴才多於德謂之妖小善亂德小才耗道以有善而不進以有才而不修孔門之徒恥也古之隱也忘在其中今之隱也爵在其中吏不與奸罔期而奸罔自至賈豎不與不仁期而不仁自至嗚呼吏非被重刑不知奸罔之喪己賈豎非遭極禍不知不仁之害躬也夫易化而善者齊民也唯吏與賈豎難哉人之肆其志者其如後患何聖人能與人道不能與人志嗚呼才望顯於時者殆哉一君子愛之百小人妬之一愛固不勝於百妬其為進也難不以堯舜之心為君者具君也不以周公伊尹之心為臣者具臣也造父善御不能御駑駘公輸善匠不能匠散木吾知夫不教之民也豈易御而易匠者哉陽貨者仲尼之駑駘也互鄉者仲尼之散木也或曰子之道有以邁千人子之貌固不足加於衆噫何哉曰亦何異哉伊臯亦人耳孔顔亦人耳不思而立言不知而定交吾其憚也知道而不行知賢而不舉甚乎穿窬也夫盜也者不能盡一室也不行道足以喪身不舉賢足以亡國金貝珠璣非能言而利物者也至夫有國者寳之甚乎賢惜之過乎聖如失道而有亂國且輸人況夫金貝珠璣哉聖人行道而守法賢人行法而守道衆人侮道而貨法古之決獄得民情也哀今之決獄得民情也喜哀之者哀其化之不行喜之者喜其賞之必至周公為天子下白屋之士今觀於一命之士接白屋之人斯禮遂亡悲夫幸君之急而見懲糺巳之讎而為直因躬不好者而為亷因人不樂者以為正大人不由也聖人之道猶坦途諸子之道獨斜逕坦途無不之也斜逕亦無不之也然適坦途者有津梁斜逕者苦荆棘三王之世民知生而不知化五帝之世民知化而不知德毁人者失其直譽人者失其實近於鄉原之人哉憚勢而交人勢劣而交道息希利而友人利薄而友道退明君善全臣者不狎哲士善全友者不暱或曰我善治苑囿我善視禽獸我善用兵我善聚賦古之所謂賊民今之所謂臣虸蚄能害稼不能害人奸邪善害人害稼者有時而稔是不害也雖有祝鮀之佞宋朝之美其害人也可勝道哉或問君子之道何如則可以常行矣曰去四蔽用四正則可以常行矣曰何以言之見賢不能親聞義不能伏當亂不能正當利不能節此之謂四蔽道不正不言禮不正不行文不正不脩人不正不見此之謂四正鵷鸞不常見君子慕焉鸎鳩常見小人捕焉噫君子之出處亦猶夫鵷鸞而巳矣不位而尊者曰道不貨而富者曰文噫吾將謂得時乎尊而驕者不為矣吾將謂失時乎冨而安者吾為矣或曰將處乎世何如則可以免乎謗曰去六邪用四尊則可矣曰何以言曰諌未深而謗君交未至而責友居未安而罪國家不儉而罪嵗道不高而凌貴志不定而羡富此之謂六邪也自尊其道堯舜不得而卑也自尊其親天下不得而詘也自尊其己孩孺不得而娯也自尊其志刀鋸不得而威也此之謂四尊也愛雖至而不讎巳危而不濟勢方盛而知足利正中而識已豈小人之能哉以儉而獲罪猶逺乎奢以退而遇謗尚愈乎進弓箕之家生子而捨乎弓箕陶旊之家生子而捨乎陶旊噫吾之道猶弓箕乎陶旊乎自漢至今民産半入乎公者其唯桑𢎞羊孔僅乎衞青霍去病乎設遇聖天子吾知乎桑孔不過乎賈豎衞霍不過乎士伍古之殺人也怒今之殺人也笑古之用賢也為國今之用賢也為家古之酗醟也為酒今之酗醟也為人古之置吏也將以逐盜今之置吏也將以為盜或曰楊墨有道乎曰意錢格簺皆有道也何啻乎楊墨哉吾知夫今之人嗜楊墨之道者其一夫之族耳古漁父四篇有後序劉蛻叟行山逐禽而逢虞人虞人反以罟而獵叟叟欺虞人以事鬼神而得逸他日叟之子壯圍山而讎獵吾父者曰今日凡在山澤殺無赦虞人亡於大澤虞之父教之以漁漁利厚於罟末之年富於澤上及聞叟將殺其子於帝側帝教之以漁天下天下之利厚於陶稼末之年富於九州漁者常以此自笑而聞於士師士師以法執之漁者對曰始臣學漁不學笑天下而天下入臣笑舜聞之亦曰始朕學事叟不學受天下禪而天下禪朕海冥之後漁者啼而奔帝辛曰始風㣲水上魚聚臣舟臣垂之十鉤魚方眡臣鉤未及吞而雷驚臣舟夫雷不發而震盍戮於爕理者辛應曰爾不得魚市不闕魚亦殷人得魚耳夫多漁而垂之十鉤魚必争而且畏後其餌然而猶相與眡其鉤豈非君其餌薄乎何戮之有㣲子自旁聞之亦曰殷餌薄矣臣不受戮殷民驚矣抱祭器而入周暮有二舟還而争一舟於中流空舟中者恃其無傷舟中也則盛鬭以薄兩舟果與俱覆明日訟於王王以其罪均也平於二漁既而空舟者歸告其子曰吾勝矣覆彼所載載魚者歸亦告其鄰曰吾勝矣其鄰笑曰罪均而子獨覆所載孰謂勝乎有置魚於葦間仰見鳴鳶集其上乃冠木於器旁以懼之明日澤西漁者乃刻材澤畔前日置魚者目眡而去而三年不敢漁其妻笑曰始偽以紿一器之魚學偽得盜一澤之利篇後序㑹昌甲子嵗余於西塞巖下見版洗而得漁父書七篇尚多古文然其三篇甚怪妄淺近類詞賦今皆捨之其四篇余特為之箋正其文字然前二篇文有高致後二篇則託寓鄙狎以其頗有譏動余亦存之然不知其年代故謂之古漁父時議三篇并表元結臣結言自以昏庸無堪逸浪江海陛下忽降公詔逺徴愚臣陛下豈不以凶逆未除盜賊屢起百姓勞苦力用不足將社稷大計與天下圖之者乎荒野賤臣始見軒陛又拘限忌諱不能悉下情以上聞則陛下安用煩勞車乘招禮賢異臣實不能當君子之羞受小人之辱故編輿皁之説為三篇命曰時議敢以上聞抵冐天威謹伏待罪臣結頓首謹上時議上篇時之議者或相問曰往年逸亂之兵東窮江海南極淮漢西抵秦塞北盡幽都今趙衞之疆悉為盜有凶勇之徒攻四方者㡬百餘萬如屯守三京從衞魁帥者不計當時之兵可謂強矣當時人心已不固矣天子獨以數騎僅至靈武引聚餘弱憑凌強冦頓軍岐陽師及渭西曾不踰時竟能摧堅銳復兩京逃降逆類悉収河南州縣今河北隴險奸逆尚餘今山谷江湖稍多亡命今所在盗賊屢犯州縣今天下百姓或轉徙流亡今臨敵將士多喜奔散今賢士君子不求任使天子往在靈武至於鳳翔無今日兵革而能勝敵無今日禁制而無亡命無今日威令而盜賊不起無今日財用而百姓不亡無今日封賞而將士不散無今日朝廷而人思任使何哉豈天子能以弱制強不能以強制弱豈天子能以危求安而忍以未安忘危時之議者或相對曰此非難言甚易言矣天子往年悲恨陵廟為凶逆傷汙怨憤上皇忽南幸巴蜀哀傷宗戚多見誅害驚惶聖躬動息無所是以勤勞不辭親撫士卒與人權位信而不疑渇聞忠直過則善改如此所謂以弱制強以危求安今天子重城深宫燕私而居冕旒清晨纓佩而朝太官具味當時而食太常修樂和聲而聴車國機務叅詳而進萬姓疾苦時或不聞而廐有良馬宫有美女輿服禮物日月以備休符佳瑞相繼而有朝廷歌頌盛德大業四方貢賦尤異品物公族姻戚喜賀帝㤙諧臣戲官怡愉天顔而文武大臣至於公卿庶官皆權位爵賞名實之外似巳過望此所以不能以強濟弱忍以未安忘危若天子能視今日之安如靈武之危事無大小皆若靈武何㓂盜強弱可言當天下曰無事矣時議中篇時之議曰或相謂曰吾聞道路云云說士人共自謀曰昔我奉天子拒凶逆勝敵則家國兩存不勝則家國兩亡所以生死决戰是非極諫今吾屬名位巳重貨財己足爵賞己厚勤勞已極天下若安吾何苦哉天下若不安吾屬外無仇讎相害内無窮賤相迫何苦更當鋒刃以近死乎何苦更忤人主以近禍乎又聞曰嗚呼吾州里有忠義之者仁信之者方直之者今或有病父老母孤兒寡妻如身能存者皆力役乞丐凍餒不足况於死者父母妻子人誰哀之又聞曰今天下殘破蒼生危急受賦役者多寡弱貧獨流亡死生悲憂道路盖亦極矣天下若安我等豈能隴畝以自處若不安我不復以忠義仁信方直死矣縱有盗於我者安則隨之人且如此其然何故時之議者相對曰今國家非欲其然盖失於太明太信而然耳夫太明則見其内情將藏内情則罔惑生焉罔上惑下能令必信信可必矣故太信焉太信之中至姦元惡卓然而存如此使朝廷遂亡公直天下遂失忠信蒼生遂益宛怨如公直亡矣忠信失矣寃怨生矣豈天子大臣之所喜乎將欲冶之能無端由吾屬議於野者又何所及時議下篇時之議者或相問曰今天子思安蒼生思滅姦逆思致太平方力圖之非不勤勞今四年矣而説者異之何哉時之議者或相對曰如天子所思如説者所異天子大臣非不知之凡有制詔皆常言及言雖殷勤事皆不行前後再三頗類諸戲今或有仁恤之令憂勤之詔人皆族立黨語指而議之其由何哉以言而不行之故也天子不知其然以為言雖不行足堪沮勸嗚呼沮勸之道在明審均當而必行也必不行矣有言何為自太古已來致理興化未有言之不行而能至矣若天子能追行已言之令必行將來之法且免天下無端雜徭且除天下隨時弊法且去天下拘忌煩令必任天下賢異君子屏斥天下凡邪小人然後推仁信威令與之不惑此則帝王常道何為不及唐文粹巻四十四下欽定四庫全書唐文粹巻
