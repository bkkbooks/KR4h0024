  - {type: variant, offset: 7558, length: 0, content: '', WYG: 欽定四庫全書唐文粹巻八十三宋姚鉉編書五總一十一首論選舉五與權徳輿書栁冕荅栁福州書權徳輿上宣州髙大夫書杜牧上禮部權侍郎書獨孤郁荅獨孤秀才書權徳輿論諌諍二與人論諫書杜牧與李諌議行方書孫樵論仕進一荅孟郊論仕進書獨孤郁論虚无一與鄭駙馬書張説論法乗一與濟法師書白居易論服餌一與崔連州論石鍾乳事書栁宗元與權徳輿書栁冕冕白昔仲弓問為政子曰先有司有司之政在於舉士是以三代尚徳尊其敎化故其人賢西漢尚儒明其理亂故其人智後漢尚章句師其傳習故其人守名節魏晉尚氏族故其人矜伐隋氏尚吏道貴其官位故其人寡亷恥唐承隋法不改其理此天所以待聖主正之何者進士以詩賦取人不先理道明經以墨義考試不本儒意選人以書判殿最不尊人物故吏道之理天下天下奔競而無廉恥者以教之者未也閣下豈不謂然乎自頃有司試明經奏請毎經問義十道五道全冩疏五道全冩注其有明聖人之道盡六經之意而不能誦䟽與注一切棄之恐清識之士無由而進腐生豎子比肩登第不亦失乎閣下因從容啓明主稍革其弊奏為二等其有明六經之義合先王之道者以為上等其有精於誦注者與精於誦疏者以為次等不登此二枓者以為下等不亦善乎且明六經之義合先王之道君子之儒敎之本也明六經之注與六經之疏小人之儒敎之末也今者先章句之學後君子之儒以求清識之士不亦難乎是以天下至大仕人至衆而人物殄瘁亷恥不興者亦在取士之道未盡其術也誠能革其弊尊其本舉君子之儒先於履行者俾之入仕即清識君子也俾之立朝即王公大人也一年得一二十人十年得一二百人三十年得五六百人即海内人物不亦盛乎昔唐虞之盛也十六族而已周之興也十亂而已漢之王也三傑而已太宗之聖也十八學士而已豈多乎哉今海内人物顒然思理推而廣之以風天下即天下之士靡然而至矣是則由於有司以化天下之士得無亷恥乎冕頓首荅栁福州書權徳輿来問見愛殷懃甚厚䟽以先師對仲弓有司之説又曰由於有司以風天下誠哉大君子之言理道也今之取士在於禮部吏部按資格以擬官奏郎官以考别失權衡重輕之本無乃甚乎至於禮部求才猶似為仁由已然亦沿於時風豈能自振嘗讀劉秩祭酒上疏云太學設官職在造士士不知方時無賢才臣之罪也毎讀至此心常慕之當時置於國庠似在散地而方以乏賢内訟慨然上奏此君子之心也君子之言也況以䝉劣辱當儀曹為時求人豈敢容易然再歲計偕多有親故故進士初牓有之帖落有之策落有之及第亦有之不以私害公不以名廢實不敢自愛不訪於人兩漢設科本於射筞故公孫𢎞董仲舒之倫痛言理道近者祖習綺靡過於雕蟲俗謂之甲賦律詩儷偶對屬况十數年間至大官右職敎化所繫其若是乎是以二年已来叅考對策不訪名物不徴隠奥求通理而已求辨惑而已習常而力不足者則不能迴復於此故或得其人庶他時有通識懿文可以持重不遷者而不盡在於齪齪科第也明經問義有幸中所記者則書不停綴令釋通其意則牆面木偶遂列上第末如之何頃者叅伍其問令書釋意義則於䟽注之中苟刪撮㫖要有數句而通者昧其理而未盡有數紙而黜者雖未盡善庶稍得之至於来問明六經之義合先王之道而不在於注疏者雖令學究一經之科毎歲一人猶慮其不能至也且明經者仕進之多數也注䟽者猶可以質驗也不者儻有司率情下上其手既失其末又不得其本則蕩然矣無乃然乎古人云勉彊行道則徳日起而大有功中庸有困而行之勉彊而行之鄙雖不敏敢忘勉之之道邪大凡常情為近習所勝役役於聞見汲汲於進取苟避患安時俾躬處休以至老死自為得計豈復有揣摩古今風俗整齊教化根本原始要終長轡逺馭如閣下吐論之若是者邪此鄙人所以喟然三復而不知其已也来問又言三代兩漢至近古所尚不同豈古化夐逺之不可復邪復因縁漸靡而操執者不之思邪鄙人頑固謹俟餘論因自發舒慙怍無量徳輿再拜上宣州髙大夫書杜牧某頓首再拜自去歲前五年執事者上言云科第之選宜與寒士凡為子弟議不可進熟於上耳固於上心上持下執堅如金石為子弟者魚潜䑕遁無入仕路某竊惑之科第之設聖祖神宗所以選賢才也豈計子弟與寒士也古之急於士者取盜取讎取於夷狄豈計其所由来況國家設取士之科而使子弟不得由之若以科第之徒浮華輕薄不可任以為治則國朝自房梁公已降有大功立大節率多科第人也若以子弟生於膏粱不知理道不可與美名不令得美仕則自堯已降聖人賢人率多子弟凡此數者進退取捨無所依據某所以憤懣而不曉也堯天子子也禹公子也文王諸侯孫與子也武王文王子也周公文王之子武王之弟也夫子天子裔孫宋公六代大夫子也春秋時列國有其社稷各數百年其良臣多出公族及卿大夫子孫也魯之季友季文子叔孫穆子叔孫昭子孟獻子皆出於三桓也臧文仲武仲出於公子彄栁下惠出於公子無駭諸侯之子稱公子公子之子稱公孫公孫之子稱公族以王父字為氏展禽是也宋之良臣多出於戴桓武荘之族也舉其尤者華元子罕向戍是也衛之良臣亦公族及卿大夫之裔也舉其尤者公子荆公叔發公子朝皆公族也子鮮公子也史狗史魚寗武子卿大夫之裔也齊之晏嬰晏桓子子也曹之子臧公子也呉之季札王子也鄭之良臣皆公孫公族也舉其尤者子封子良子罕子展子皮子産子張子太叔是也楚之良臣子囊子西子期皆王子也子庚王孫也其卿大夫之裔鬬氏生令尹子文後有鬬辛鬬巢鬬懐昭王返國皆有大功蒍氏生蒍賈孫叔敖蒍艾也薳啓彊薳子憑薳俺薳罷屈氏生屈蕩屈到屈建子木六國時有昭奚恤公族也屈原諸屈後也皆其祖先於武王文王時基楚國為霸者用其子孫其社稷垂九百餘年至於晉國最為彊其賢臣尤多有趙氏魏氏韓氏狐氏中行氏范氏荀氏羊舌氏欒氏郤氏祁氏其先皆武公獻公文公勤勞臣也用其子弟召諸侯而盟之者僅三百年在六國齊之孟嘗趙之平原魏之信陵皆王子王孫也齊復有司馬穰苴亦王族也其在漢魏已下至於國朝公族之子弟卿大夫之胄裔書於史氏為偉人者不可勝數不可殫論聖賢才能於子弟中復何如也言科第浮華輕薄不可任用則國朝房梁公𤣥齡進士也相太宗凡二十一年為唐宗臣比之伊吕周召者郝公處俊亦進士也為宰相時髙宗欲遜位與武后處俊曰天下者髙祖太宗之天下非陛下之有但可傳之子孫不可私以與后髙宗因止来濟上官儀李𤣥義皆進士也後為宰相濟助長孫太尉褚河南共摧武后者後突屈入塞免胄戰死儀草廢武后詔𤣥義助處俊言不可以位與武后婁侍中師徳亦進士也吐蕃彊盛為監察御史以紅抹額應猛士詔躬衣皮袴率士屯田積榖八百萬石二十四年西征兵不乏食薦狄公為相取中宗於房陵立為太子漢陽王張公東之亦進士也年八十為相敺致四王手提社稷上還中宗郭代公元振亦進士也鎮涼州僅十五年北郤突厥西走吐蕃制地一萬里握兵三十萬闕惕息不敢移唐社稷魏公知古亦進士也為宰相廢太平公主謀以佐𤣥宗及卒也宋開府哭之曰叔向古之遺直子産古之遺愛兼而有者其魏公乎姚梁公元崇登第下筆成章舉首佐𤣥宗起中興業凡三十年天下幾無一人之獄宋開府璟亦進士也與姚唱和致開元太平者劉幽求登制筞科與𤣥宗徒步誅韋氏立睿宗者蘇氏父子皆進士也大許公為相於武后朝酷吏中不失其正於中宗朝誅反賊鄭普思於韋后黨中小許公佐𤣥宗朝號為蘇宋張燕公説登制筞科排張易之兄弟賛睿宗請𤣥宗監國竟誅太平公主招置文學士開内學館𤣥宗好書尚古封中泰山祀后土因燕公也張曲江九齡亦進士也排李林甫牛仙客罵張守珪不斬安祿山謫老南服年未七十張巡亦進士也凡三入判等以兵九千守睢陽城凡周歲拒賊十三萬兵出天寳雜記使賊不能東進尺寸以全江淮元和中宰相河東司徒兼中書令裴公皆進士也裴公仍再得宏辭制筞科當貞元時河北背叛齊蔡亦叛階此蜀亦叛吴亦叛他未叛者皆髙下其目熟視朝廷希嚮彊弱而施其所為司空始相憲宗廢權倖之機牙令不得張收歛百職歸於有司命節度使出於朝廷不由兵士始自撫州除袁相為滑州滑州凡三月無帥三軍無事憲宗始信之自此不用貞元故事以行軍副使大将軍為節度使拔取沈滯各還其官開州取唐舍人為職方郎中知制誥饒州取李趙公為考功郎中知制誥在貞元中皆十餘年遷逐其他似謫者亦皆當叙用也然後西取蜀東取吴天下仰首始見白日裴公撫安魏博使田氏盡歸六州元和中翦蔡劇賊於洛師脇下招来常山質其二子以累其心取十三城使不得與齊交手為㓂因誅師道河南盡平當是時天下幾至於太平凡此十九公皆國家與之存亡安危治亂者也不知科第之選復何如也至於智效一官忠立一節徳行文學不可悉數董生云春秋之義變古則譏之傅説命髙宗曰監于先生成憲其以永無愆故殷道復興鴻鴈美周宣王能復先王之道西漢魏相佐漢宣帝為中興但能奉行漢家故事姚梁佐𤣥宗亦以務舉貞觀之法制耳自古及今未有背本棄古而能致治者昨獲覽三郎秀才新文凡十篇數日在手讀之不倦其㫖意所尚皆本仁義而歸忠信加以辭彩遒茂皎無塵土況有誠明長厚之譽於千人中儻使前五六年得進士第今可以出入諌官御史助明天子為治矣古人云三月不仕則相弔安有凡五六年来選取進士施設網罟如防盜賊言子弟者噎啞抑鬱思一解布衣與下士齒厥路無由於古未前聞也某因覽三郎文章不覺發憤略言大槩干觸尊重無任惶懼某再拜上禮部權侍郎書獨孤郁貞元十三年八月日獨孤郁謹上書于舍人三兄閣下郁以世舊遂獲謁叙故人大賢之遇郁也亦不以常交言之眷意甚露郁𤨏𤨏鬱堙二年無聞摧頽折羽而不喜者非失意之謂非尤人之謂蓋将因事自罪而不喜也借如豫章生於擁腫小木之中樵蘇見之亦以嗟矣一有不嗟則必自與擁腫者亦不多逺也珠璣雜於礫石之中童子弄之亦以驚矣一有不驚則必自與礫石者亦不多逺也鏌鎁卧於鈆鈍之中下工覩之固亦知矣一有不知則必自與鈆鈍者亦不多逺也毛嬙後於宿瘤而行有目者覩之固即分矣一有不分則必自與宿瘤亦不多逺也苟與乎擁腫礫石鈆鈍宿瘤輩果殊異則不能移凡眼所擇況逃乎良工巧冶有識者之目哉今禮部侍郎之目固亦國之良工巧冶有識者之目也於中再擇再不中是直已為擁腫礫石鈆鈍宿瘤矣何止與斯不逺哉此所以因事自罪而不喜也或諭之曰今之道尚光子之所以不振者晦過也子之道豐蔀也子且有崪天之材而隠植之有照乗之珍而宻櫝之有切玉之利而謹襓之有傾都之豔而深帷之雖使離婁左執光而右拭眥迫而索之固亦不能知矣子何不移植露光披鋒示貌使識者覩而駭之彼之所誨固亦郁所不能焉已必不材也不寳也不利也不姝也且遍過於有識者之目是自揚其短也已必材也必寳也必利也必姝也雖小示其光鋒榦貌於一人驚我亦已多矣所不驚者是子四事果不足異於族凡也郁病直拙獨大賢於郁分殊尚不能以亟況悠悠者歟郁常行乎時輩之間多酌其言語善者鄙者自減盈消息其㫖稍有可驚不敢不於許言者言之今之後學者或嘆曰吁後来惡乎所歸哉此且非宜長者所當聞也亦非宜長者所不當聞也今朝廷先達病在不能公也或能公而不能為力也覽其文則賛美稱嗟無不至也其間善惡輕重進退則心以别矣此其所以為公也鮮有知其必善而風皷之不啻若自口出此其所以為公不能甚力致遑遑之倫其下才者亦曰今夫在位者其無公歟其無公歟有一善未嘗肯稱也意曰非我事也又慮與之談者不與我符愛也是使諸子竊竊然自以無聞為不辱遂相與擇㨗趨邪紛屯於主司之跡親者苟能致譽則不詰其所以致譽之賢不肖而曹趨之矣此實今之躁進苟得之風也在朝廷大賢主而名之驅而正之於其善者扶之摇之善而未具者决之導之使四方學士知嚮方焉何如其曰非我事也若使一人曰非我事也十人曰非我事也舉朝廷皆曰非我事也苟非我事則無所不非我事無所不非我事則天地之間無乃以寂寥乎昔孔子飭詩書禮樂以化齊弟子而至天下使孔子亦曰非我事也則今者安盡聞夫七十子之賢詩書禮樂之盛七十子亦曰非我事也又孰為播孔子之聖如此其大乎今文亦如是朝廷先達亦如是後之達者亦如是等不相播則人文禮義知已復往之道不幾乎息矣郁不肖辱承大賢之心深矣非又敢以假喻自薦意欲以大賢擇衆賢而使七十子之徒亦方孔子於大賢也何如荅獨孤秀才書權徳輿損四日書問兼示新文閎博峻異有立言致逺之㫖其於惠愛纎悉重厚甚善甚善以吾子才志與年三者皆富以嘉聲自振若建瓴決水大冶良工必有不期至而至者況以日新又日新之盛哉夫豫章珠璣鏌鎁毛嬙終不慮隠之櫝之襓之帷之之為患而為擁腫礫石鈆鈍宿瘤之排蔽但發有疾徐耳来問云一人驚之亦多矣豈與族凡校邪此誠得之又云先達病不能公或公而病其無力今夫滔滔者或辨之不至而苟善待之及揚聲延譽則鉗口結舌大凡舉世之病也如鄙夫者直力不足耳亦懼招徕奔走為津為岐至有竊所愛者則寡矣又奚能廢是也從古未達者之望達者何嘗不如是邪先師七十子所擬豈敢當也三復戁然無言喻懐其他慕重續俟㑹話徳輿頓首與人論諌書杜牧某疎愚怠惰不識機括獨好讀書讀之多矣毎見君臣治亂之間興亡諌諍之道遐想其人䑛筆和墨則冀人君一悟而至于治平不悟則烹身滅族唯此二者不思中道自秦漢以来凡千百輩不可悉數然怒諌而激亂生禍者累累皆是納諌而悔過行道者不能百一何者皆以辭語迂險指射醜惡致使然也夫迂險之言近於誕妄指射醜惡足以激怒夫以誕妄之説激怒之辭以卑凌尊以下干上是以諌殺人者殺人愈多諌畋獵者畋獵愈甚諌治宫室者宮室愈崇諌任小人者小人愈寵觀其㫖意且欲與諌者一鬬是非一決怒氣耳不論其他是以毎於本事之上尤増飾之今有兩人道未相信甲謂乙曰汝好食某物慎勿食果更食之必死乙必曰我食之久矣汝為我死必倍食之甲若謂乙曰汝好食某物第一少食苟多食必生病乙必因而謝之減食何者迂險之言則欲反之循常之説則必信之此乃常人之情世多然也是以因諌而生亂者累累皆是也漢成帝欲御樓船過渭水御史大夫薛廣徳諫曰宜從橋陛下不聴臣自刎以血汚車輪陛下不廟矣不得入廟祠也上不説張猛曰臣聞主聖臣直乗船危就橋安聖主不乗危御史大夫言可聴上曰曉人不當如是邪謂諫諍之言當如猛之詳善乃從橋近者寳厯中敬宗皇帝欲幸驪山時諌者至多上意不决拾遺張權輿伏紫宸殿下叩頭諌曰昔周幽王幸驪山為犬戎所殺秦始皇𦵏驪山國亡𤣥宗皇帝宫驪山而禄山亂先皇帝幸驪山而享年不長帝曰驪山若此之凶邪我宜一往以驗彼言後數日自驪山迴}
