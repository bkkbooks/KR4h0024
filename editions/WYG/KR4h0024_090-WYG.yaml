body:
  text: 書十二命附緫九首切磋五别令狐拾遺書李商隠荅崔立之書韓愈重與陸賔虞書劉軻與陶進士書李商隠荅侯髙第二書李翺規誨三寄從弟正辭書李翺與外孫崔氏二孩書李華寄諸弟砥石命附元輿舒諭一諭江陵耆老書劉蛻别令狐綯拾遺書李商隠予直足下行日已定昨幸得少展寫足下去後憮然不怡今早垂致葛衣書辭委曲惻惻無已自昔非有故舊援拔卒然於稠人中相望見其表得所以類君子者一日相從百年見肺肝爾來足下仕益逹僕困不動固不能有常合而有常離足下觀人與物共此天地耳錯行襍居蟄蟄哉不幸天能恣物之生而不能與物慨然量其欲牙齒者恨不得翅羽角者又恨不得牙齒此意人與物略同耳有所趨故不能無爭有所爭故不能不於同中而有異耳足下觀此世其同異如何哉兒冠出門父翁不知其枉正女笄上車夫人不保其貞汚此於親親不能無異勢也親者尚爾則不親者惡望其無隙哉故近世交道幾喪欲盡足下與僕於天獨何禀當此世生而不同此世每一㑹面一分㪚至於慨然相執手嚬然相慼決然相泣者豈於此世有他事哉惜此世之人率不能如吾所樂而又甚懼吾之徒孑立寡處而與此世者蹄尾紛然蛆吾之白擯置譏誹襲出不意使後日有希吾者且懲吾困而不能堅其守乃捨吾而之他耳足下知與此世者居常給於其黨何語哉必曰吾惡市道嗚呼此輩眞手搔鼻皻而喉噦人之灼痕為癩者市道何肯如此輩邪今一大賈坐滯貨中人人徃須之甲得若干曰其贏若干丙曰吾索之乙得若干曰其贏若干戊曰吾索之既與之則欲其蕃不願其亡失口舌拜父母出妻子伏臘相見有贄男女嫁娶有問不幸喪死有致饋葬有臨送弔是何長者大人哉他日甲乙俱入之不欺則又愈得其所欲矣囘環出入如此是終身欲其蕃不願其亡失口舌拜父母益嚴出妻子益敬伏臘相見贄益厚男女嫁娶問益豐不幸喪死饋贈臨送弔哭情益悲是又何長者大人哉唯是於信誓有大欺漫然後罵而絶之擊而逐之訖身而勿與通也故一市人率少於大賈而不信者此豈可與此世交者等邪今日赤肝腦相憐明日衆相唾辱皆自其時之與勢耳時之不在勢之移去雖百仁義我百忠信我我尚不顧矣豈不顧已而又唾之足下果為市道何如哉今人娶婦入門母姑必祝之曰善相冝則祝曰蕃息後曰生女子貯之幽房密寢四鄰不得識兄弟以時見欲其好不顧性命即一日可嫁去是冝擇何如男子屬之邪今山東大姓家非能違摘天性而不如此至其羔鶩在門有不問賢不肖健病而但論財貨恣求取為亊當其為女子時誰不恨及為母婦則亦然彼父子男女天性豈有大於此者邪今尚如此况他舍外人燕生越飬而相望相救抵死不相販賣哉細而繹之眞令人不愛此世而欲狂走逺颺耳果不知足下與僕之守是邪非邪首陽之二百豈蘄盟津之八百吾又何悔焉千百年下生人之權不在富貴而在直筆者得有此人足下與僕當有所用意其他復何云云但當誓不羞市道而又不為忘其素恨之母婦耳商隠再拜荅崔立之書韓愈斯立足下僕見險不能止動不得時顚頓狼狽失其所操持困不知變以至辱於再三君子小人之所憫笑天下之所背而馳者也足下猶復以為可教貶損道徳乃至手筆以問之扳援古昔辭義髙逺且進且勸足下之於故舊之道得矣雖僕亦固望於吾子不敢望於他人者耳然尚有似不相曉者非故欲發余乎不然何子不以丈夫期我也故不能黙黙輙復自明僕始年十六七時未知人事讀聖人之書以為人之仕者皆為人耳非有利乎已也及年二十時苦家貧衣食不足謀於所親然後知仕之不惟為人耳及來京師見有舉進士者人多貴之僕誠樂之就求其術或出禮部所試詩賦䇿等以相示僕以為可無學而能因詣州縣求舉有司好惡出於其心四舉而後有成亦未即得仕聞吏部有以愽學宏辭選者人尤謂之才且得羙仕就求其術或出所試文章亦禮部之類私怪其故猶樂其名因又詣州府求舉凡二試於吏部一既得之而又黜於中書雖不得仕人或謂之能焉退自取所試讀之迺類於俳優者之辭顔忸怩而心不寧者數月既已為之則欲有成書所謂恥過作非者也因復求舉亦無幸焉乃復自疑以為所試與得之者不同其程度及得觀之余亦無甚愧焉夫所謂愽學者豈今之所謂者乎夫所謂宏辭者豈今之所謂者乎設使古之豪傑之士若屈原孟軻司馬遷相如揚雄之徒進於是選必知其懐慙乃不自進而已耳設使與夫今之善進者競於䝉昧之中僕固知其辱焉然彼五子者且使生於今之世其道雖不顯於天下其自負如何哉肯與夫斗筲者決得失於一夫之目而為之憂樂哉故凡僕之汲汲於進者其小得蓋欲以具裘葛飬窮孤其大得蓋欲以同吾之樂於人耳其他可否自計已熟誠不待人而後知今足下乃復比之獻玉者以為必俟工人之剖然后知於天下雖兩刖足不以為疾且無使勍者再尅誠足下相勉之意厚也然仕進者豈舍此而無門哉足下謂我必待是而後進者非尤相悉之辭也僕之玉固未甞獻而足固未甞刖足下無為我戚戚也方今天下風俗尚有未及於古者邊境尚有被甲執兵者主上不得怡而宰相以為憂僕雖不賢亦且潜究其得失致之乎吾相薦之乎吾君上希卿大夫之位下猶取一障而乗之若都不可得猶將耕于寛閒之野釣於寂寞之濵求國家之遺事考賢人哲士之終始作唐之一經垂之於無窮誅姦諛於既死發潜徳之幽光二者将必有一可足下以為僕之玉凡幾獻而足凡幾刖也又所謂勍者果誰哉再剋之刑信如何也士固信於知已微足下無以發吾之狂言愈再拜重與陸賔虞書劉軻别韶卿已逾時雖遊處讌賞不接然予心未甞一日去韶卿也且京洛相去八百里足以絶韶卿車轍馬跡矧又自洛南而東渉淮浮江㳂洄數千里安得不悒悒西望邪比予在輦下五六年始不知韶卿及知韶卿兩心始親而形骸已相逺苟未能忘情忍不酸鼻出涕為吾友之思邪前陸掾來得韶卿書知韶卿欲屈道以從人求京兆解送知韶卿道在與否固不在首解於京兆也愚甞謂與遊者道韶卿膚未雞髪未鶴然其心甚老脫一旦脅肩低眉與諸子爭甲乙於縣官豈愚所謂甚老者邪韶卿曽不是思也愚所謂首出者謂四科首顔閔三十世家首太伯七十列傳首伯夷其為首出豈不多邪韶卿不首於是而欲首於何哉僕又聞京兆等試試官知與否脫有知韶卿人聞烏有不心躬嘿禮靈冠統以待之邪夫然亦何害小伸於知已耳不然則東國絀臣西山餓夫微仲尼何傷為展季伯夷矣韶卿獨不見既得者邪豈盡為顔子太伯伯夷然幸韶卿熟思之無以予不食太牢為不知味者也前月中兩寄狀計必有一逹者過重陽當決策東去計韶卿無以予身逺而不予思也勉矣自愛䇿名春官後當㑹我於真山與陶進士書李商隠去一月多故不常在故屢辱吾子之至皆不覩昨又垂示東岡記等數篇不惟其辭彩奥大不冝為冗慢無勢者所窺見且又厚紙謹字如貢大諸侯卿士及前逹有文章積學者何其禮甚厚而所與之甚下邪始僕小時得劉氏六說讀之常得其語曰是非繫於褒貶不繫於賞罰禮樂繫於有道不繫於有司宻記之盖甞於春秋法度聖人綱紀久羡懐藏不敢薄賤聨綴比次手書口詠非惟求以為已而已亦祈以為後來隨行者之所師禀已而被鄉曲所薦入來京師又亦思前輩逹者固已有是人矣有則吾將依之繫鞵出門寂寞徃返其間數年卒無所得私怪之而比有相親者曰子之書冝貢于某氏某氏可以為子之依歸矣即走徃貢之出其書乃復有置之而不暇讀者又有黙而視之不暇朗讀者又有始朗讀而中有失字壊句不見本義者進不敢問退不能解黙黙已已不復咨歎故自大和七年後雖尚應舉除吉㓙書及人慿倩作牋啓銘表之外不復作文文尚不復作况復能學人行巻邪時獨令狐補闕最相厚歲嵗為寫出舊文納貢院既得引試㑹故人夏口主舉人時素重令狐賢明一日見之於朝揖曰八郎之友誰最善綯直進曰李商隠者三道而退亦不為薦託之辭故夏口與及第然此時實於文章懈退不復細意經營述作乃命合為夏口門人之一數耳爾後兩應科目者又以應舉時與一裴生者善復與其挽拽不得已而入耳前年乃為吏部上之中書歸自驚笑又復懊恨周李二學士以大法加我夫所謂慱學宏辭者豈容易哉天地之災變盡觧矣人事之興廢盡究矣皇王之道盡識矣聖賢之文盡知矣而又下及蟲豸草木鬼神精魅一物已上莫不開㑹此其可以當愽學宏辭者邪恐猶未也設他日或朝廷或持權衡大臣宰相問一事詰一物小若毛甲而時脫有盡不能知者則號愽學宏辭者當其罪矣私自恐懼憂若囚械後幸有中書長者曰此人不堪抺去之乃大快樂曰此後不能知東西左右亦不畏矣去年入南場作判比於江淮選人正得不憂長名放耳尋復啓與曹主求尉於虢實以太夫人年髙樂近地有山水者而又其家窮弟妹細累喜得賤薪菜處相飬活耳始至官以活獄不合人意輙退去將遂脱衣置笏永夷農牧㑹今太守憐之催去復任逕使不為升斗汲汲疲瘁低儽耳然至於文字章句愈怗息不敢驚張常自呪願得時人曰此物不識字此物不知書是我生獲忠肅之諡也而吾子反殷勤如此者豈不知邪豈有意邪不知則可有意則已虛矣然所以拳拳而不能忘者正以徃年愛華山之為山而有三得始其卑者朝髙者復得其揭然無附著而又得其近而能逺思欲窮搜極討灑豁襟抱始以徃來畨畨不遂其願閒者得李生於華郵為我指引巗谷列視生植僅得其半又得謝生於雲䑓觀暮留止宿旦相與去愈復記熟後又得吾子於邑中至其所不至者於華之山無恨矣三人力邪今李生已得第而又為老貴人從事雲䑓生亦顯然有聞於諸公間吾子之文粲然成就如是我不負華之山而華之山亦將不負吾子之三人矣以是思得聚㑹話既徃探歴之勝至於切磋善惡分擘進趨僕此世固不待學奴婢下人指誓神佛而後已耳吾子何所用意邪明日東去既不得面寓書惘惘九月三日𢎞農尉李某頓首荅侯髙第二書李翺足下復書來㑹與一二友生飲酒甚樂故不果以時報三讀足下書感歎不能休非足下之愛我甚且欲吾身在而吾道光明也則何能開難出之辭如此之無憂乎前書所以不受足下之說而復闢之者將以明吾道也吾之道非一家之道是古聖人所由之道者也吾之道塞則君子之道消矣吾之道明則堯舜禹湯文王孔子之道未絶於地矣前書若與足下混然同辭是宫商之一其聲音也道何由而明哉吾故拒足下之辭知足下必將憤予而復其辭也足下再三教我適時以行道所謂時也者乃仁義之時乎將沉浮之時乎苟仁且義則吾之道何所屈焉爾如順沈浮之時則是乗流望風而髙下焉苟如此雖足下之見我且不識矣况天下乎不修吾道而取容焉其志亦不遐矣故君子非仁與義則無所為也如有一朝之患古君子則不患也吾之道學孔子者也盖孔子畏於匡圍於蒲伐樹於桓魋逐於魯絶糧於陳蔡之師夫孔子豈不知屈伸之道邪賢不肖在我者也貴與富貧與賤道之行否則有命焉君子正已而須之爾雖人不能取其容焉故孔子謂子路子貢曰詩云匪兕匪虎率彼曠野吾道非邪吾何為於此子路對曰意者吾未仁且智也而人之不信也與子曰有是乎使仁者而必信安有伯夷叔齊使智者而必行安有王子比干子貢對曰夫子之道至大故天下莫能容盍少貶夫子之道子曰良農能稼而不能為穡良工能巧而不能為順君子能修其道綱而紀之統而理之而不能為容爾不修爾道而求為容賜而志不逺矣謂顔回如謂由也賜也顔淵對曰夫子之道至大故天下莫能容雖然夫子推而行之不容何病不容然後見君子夫道之不修也是吾醜也道既已大修而不用是有國者之醜也不容何病不容然後見君子孔子盖歎之也以孔子其門人三千其聖徳如彼之至也而知孔子者獨顔回爾其他皆學焉而不能至也然則僕之道天下人安能信而行邪足下之言曰西伯孔子何等人也皆以柔氣汚辭同用明夷也以避禍患斯人豈浮世邪人乎夫西伯聖人也羑里之拘僅不免焉孔子聖人之大者也其屈厄如前所陳惡在其能取容於世乎故曰危行言遜所以逺害也其道則爾其能逺之與否而必容焉則吾不敢知也非吾獨爾孔子亦不知也僕之道窮則樂仁義而安之者也如用焉則推而傳之於天下者也何獨天下哉將後世之人大有得於吾之功者爾天之生我也亦必有意矣將欲愚生民之視聽乎則吾將病而死尚何能伸其道也如欲生民有所聞乎則吾何敢辭也然則吾道之行與否皆運也吾不能自知也天下人安能害於我哉足下又曰吾子夷齊之道也如僕向者所陳亦足以免矣故不復有所説若韓孟與吾子之於我親故知我者也苟異口同辭皆如足下所說是僕於天下衆多之人而未有一知已也安能合於吾心乎吾非不信子之云者也信子則於吾道不光矣欲黙黙則道無所傳云爾子之道子冝自行之者也勿以誨我寄從弟正辭書李翺知汝京兆府取解不得如其所懷念勿在意凡人之窮達所遇亦各有時爾何獨至於賢丈夫而反無時哉此非吾徒之所憂也其所憂者何畏吾之道未能到於古之人爾其心既自以為到且無謬則吾何徃而不得所樂何必與夫時俗之人同得失憂喜而動於心乎借如用汝之所知分為十焉用其學聖人之道而和其心使餘者以與時世進退於俯仰如可求也則不啻富且貴矣如非吾力也雖盡用其十秪益勞其心爾安能有所得乎汝勿信人號文章為一藝夫所謂一藝者乃時世所好之文或有盛名於近代者是也其能到古人者則仁義之辭也惡得以一藝而名之哉仲尼孟軻殁千餘年矣吾不及見其人吾能知其聖且賢者以吾讀其辭而得之者也後來者不可期安知其讀吾辭也而不知吾心之所存乎亦未可誣也夫性於仁義者未見其無文也有文而能到者吾未見其不力於仁義也由仁義而後文者性也由文而後仁義者習也由誠明之必相依爾貴與富在外者也吾不能知其有無也非吾求而能至者也吾何愛而屑屑於其間哉仁義與文章生乎内者也吾知其有也而能求而充之者也何懼而不為哉汝雖性過於人然而未能浩浩於心吾故書其所懐以張汝且以樂言吾道之云爾與外孫崔氏二孩書李華八月十五日翁告崔氏之子兩孩省吾出身入仕行四十年晩有汝母已飬汝二人矣吾逮事裴氏鄭氏崔氏諸姑于氏堂姑皆賢明淑哲為内外師範意欲與汝言之裴氏始恩慈見吾一善未甞不流涕祝吾成立見吾伯仲書題誨責踈略話及舊事云無此例吾伯仲書題比今日中外書題其間踈密不啻百十也吾小時猶省長㓜每日兩時櫛盥起居尊行三時侍食飲食訖然後敢食猶責不如禮今者諸子日出髙眠爭覽盤器何曽有此儀可為歎息世教如此何得不亂婦人亦要讀書解文字知今古情狀事父母舅姑然可無咎詩序云哀窈窕思賢才而無傷善之心焉是闗睢之義也易曰主中饋無攸遂婦人但當主酒食待賔客而已其餘無自專之禮詩云將翺將翔佩玉瓊琚此奉舅姑助祭祀之儀也又曰將翺將翔弋鳬與㕍此主酒食待賔客之儀也禮經所載汝其記之又婦人將嫁三月敎於公宫祖廟既毁教於宗室嫁則廟見不見廟者不得為婦今此禮凌夷人從苟且婦人尊於文夫羣隂制於太陽世教淪替一至於此可為墮淚汝等當學讀詩禮論語孝經此最為要也吾小時南市㡌行見貂㡌多帷㡌少當時舊人已歎風俗中年至西京市㡌行乃無帷㡌貂㡌亦無男子衫袖䝉鼻婦人領巾覆頭向有帷㡌羃離必為瓦石所及此乃婦人為丈夫之象丈夫為婦人之飾顚之倒之莫甚於此觸類而長不可勝言舉其一端告及汝耳勿謂㓜小不遵訓誡所見所聞頽風敗俗故申明舊事不能一一也阿馬來説汝誦得數十篇詩賦麗麗已能承順十五姊顔色十七伯極鍾念吾旅病乍聞甚慰意凡人不患尊行不慈訓患身不能承順耳汝承十五姊仁慈十七伯訓誘又質性柔順當不扶自直吾所告者括羽汝耳不次翁告崔氏二子省貽諸弟砥石命舒元輿昔嵗吾行吳江上得亭長所貽劒心知其不莾鹵匣藏愛重未曽䙝視今年秋在秦無何發開見慘翳積蝕僅成死鐵意慙身將利器而使其不光明之若此常緘求淬磨之心於胷中數月後因過岐山下得片石如渌水色長不滿尺闊厚半之試以手磨理甚膩文甚宻吾意其異石遂攜入城問於切磋工工以為可為砥吾遂取劔發之初數日浮埃薄落未見快意意工者相紿復就問之工曰此石至細故不能速利堅鐡但積漸發之未一月當見眞貎歸如其言果覩變化蒼慘剥落若青蛇退鱗光勁一水泳涵星斗持之切金錢三十枚皆無聲而斷愈始得之利數十百倍吾因歎以為金剛首五材及為工人鑄為器復得首出利物以剛質鋩利苟蹔不砥礪尚與鐡無以異况質柔鋩鈍而又不能砥礪當化為糞土耳又安得與死鐡倫齒邪以此益知人之生於代苟不病盲聾喑啞則五常之性全性全則豺狼燕雀亦云異矣而或公然忘棄礪名砥行之道反用狂言放情為事䝉䝉外埃積成垢惡日不覺寤以至於戕正性賊天理生前為造化剰物殁復與灰土俱委此豈不為辜負日月之光景邪吾常覩汝輩趣嚮爾誠全得天性者况夙能承順嚴訓皆解甘心服食古聖人道知其必非彫􅆙道義自埋於偷薄之倫者然吾自干名在京城兎魄已十九晦矣知爾輩懼旨甘不繼困於薪粟日丐於他人之門吾聞此益悲此身使爾輩承順供飬至此亦益憂爾輩為窮窶而斯須忘其節為苟得眩惑而容易狥於人為投刺牽役而造次惰其業日夜憶念心力全耗且欲書此為戒又慮爾輩年未甚長成不深諭解今㑹鄂騎歸去遂寘石於書函中乃筆用砥之功以寓徃意欲爾輩定持剛質晝夜淬礪使塵埃不得間髪而入為吾守固窮之節慎臨財之苟積習肄之業上不貽庭闈憂次不貽手足病下不貽心意媿欲三者不貽秖在爾砥之而已不關他人若砥之否也則嚮之所謂切金涵星之用又甚瑣屑安足以諭之然吾固欲爾輩常置砥於左右造次顚沛必於是思之亦古人韋弦銘座之義也因書為砥石命以欲爾輩兼刻辭於其側曰劍之鍔砥之而光人之名砥之而揚砥乎砥乎為吾之師乎仲兮季兮無墜吾命乎諭江陵耆老書劉蛻太原王生甞移耆老書以江陵故楚也子胥親逐其君臣夷其墳墓且楚人之所宜怨也而江陵反為之廟世饗其讎謂耆老而忘其君父也吾以為不然楚人之性慓悍大能復其仇讎其後自懐王入武關楚人怨秦不忘干戈况其人之性能忘胥之所以破其國家而事之乎且令江陵之人牽牛羊而祀其廟者將祈年糓而獲凶荒禱疾病而得死亡者乎如厚其餼而虐其報則江陵知胥之不可祠而不祠矣若果祈年榖而得豐穰禱疾病而獲康彊有其餼而尋其報則破人之國而居其土辱人之君而受其饗遇一食而自忘楚人之殺父兄則胥自為無勇也何獨江陵之人而忘襲讎乎吾以為其廟申包胥之廟也包胥有復楚之功年代寖逺楚人以子胥甞封諸申故不謂包胥耳不然則子胥何為饗人之食而江陵何為事讎人之神乎耆老得書速易其版曰申胥之廟無使人神皆愧耳唐文粹巻九十欽定四庫全書唐文粹巻
