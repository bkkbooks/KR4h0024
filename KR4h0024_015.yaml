front:
  text: 重校正唐文粹卷第十五之上
  hash: sha256:82d04bde2b921c5fb1124519a845283be13380dd863d119be5bf650ff8cdf33e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0024_SBCK_015-1a}
body:
  text: 吳興姚鉉纂詩庚揔五十九首古調歌篇三懷古十二四皓詩李白頴陽東溪懷古崔曙登郭隗臺皇甫松歸沛縣道中晚泊留侯城劉長卿鴻門宴王轂古泉驛張説嚴陵釣臺下作權德輿吳中懷古劉駕故絳行杜頠郢城懷古李百藥題西施浣紗石胡幽真鄴城懷古孟雲卿懷賢十三君詠三首髙適七愛詩六首皮日休陽城驛元稹送李觀韓愈別兼獻張徐州孟郊送狄宗亨王昌齡送孟浩然之廣陵李白送客陳子昻送唐次武元衡送皇甫湜赴舉馬異送張宗原姚合送綦毋濳落第還鄉王維送暨道士還玊清李頎淇上別趙仙舟王維送沈秀才下第東歸賈島崔九第欲往南山王維同前裴迪贈別沈四逸人高適留別王維翟興宗送豆盧䇿歸別墅孟郊送柳淳入關四皓詩李白白髮四老人昻藏南山側偃卧松雪間冥翳不可識雲窗拂靑靄石壁橫翠色龍虎方戰爭於焉自休息秦人失金鏡漢祖升紫極隂虹濁太陽前星遂淪匿一行佐明聖歘起生羽翼功成身不居舒卷在胸臆窅冥合元化茫昧信難測飛聲塞天衢萬古仰遺迹頴陽東溪懷古崔曙靈溪氛霧歇皎鏡清心顔空色不映水秋聲多在山世人久踈曠萬物皆自間白鷺寒更浴孤雲晴未還昔時讓王者此地閉玄關無以躡髙步凄涼林壑間登郭隗臺皇甫松燕相謀在兹積金黃巍巍上者欲何顔使我千載悲歸沛縣道中晚泊留侯城劉長卿訪古此城下子房安在哉白雲去不返危堞空崔巍伊昔楚漢時頗聞經濟才運籌風塵下能使天地開蔓草日巳積長松日巳摧功名滿靑史祠廟唯蒼苔百里暮程逺孤舟川上回進帆東風便轉岸前山來楚州淡相引沙鷗間不猜扣船從此去延首仍徘徊鴻門宴王轂寰海沸兮爭戰苦風雲愁兮會龍虎四百年漢欲開基項莊一劒何虛舞殊不知人心去暴秦天意歸真主項王足底踏漢土席上相看渾未悟古泉驛於陵仲子宅也張説昔聞陵仲子守義辭三公身賃妻織屨樂亦在其中豈無窮賤苦羞與傾巧同長白臨河上於陵入濟東我今行至此感歎石泉空嚴子陵釣臺下作權德輿絶頂聳蒼翠清湍石磷磷先生晦其中天子不得臣心靈棲皓元纓冕猶緇塵不樂禁中卧却歸江上春潛驅東漢風日使薄者醇焉用佐天下持此報故人則知大賢心不獨私其身弛張有深致耕釣陶天真奈何清風後擾擾論屈伸交情同市道利欲相紛綸我行訪遺臺仰古懷逸民矰繳鴻鵠逺雪霜松桂新江流去不窮山色凌秋旻人世自今古清輝照無垠吳中懷古劉駕勾踐飲膽日吳王酒滿杯笙歌入海雲聲自姑蘇來西施舞𥘉罷侍兒整金箆衆女不敢妬自比泉下泥越鼓聲騰騰吳王隔黃池難將甬東地更學會稽棲故絳行杜頠君不見銅鞮觀數里城池巳蕪漫君不見祈禠宫幾重臺榭亦微濛介馬兵車全盛時歌童舞女妖艷姿一代繁華皆共絶九原唯望塜纍纍郢城懷古李百藥客心悲莫序登墉瞰平陸林澤窅芊綿山川鬱重復王公資設險名都距江隩方城疑北門溟海窮南服長䇿挫吳豕雄圖競周鹿大搜雲夢崦壯觀章華築人世更不競西師日侵蹙運圯屬驅馳時屯恣𫾣撲莫救夷陵火無復秦庭哭鄢郢遂丘墟風塵俄慘黷狐兔時遊踐霜露日霑沐釣渚故地平神臺層字覆陳雲埋夏首窮隂慘荒谷悵矣洲壑遷悲哉年祀倐雖異三春望終傷千里目題西施浣紗石胡幽貞一朝入紫宫萬古遺芳塵至今溪邉花不敢嬌青春鄴城懷古孟雲卿朝發淇水南將尋北燕路魏家舊城闕寥落無人住伊昔天地屯曹公獨中據羣臣將北面白日忽西暮三臺竟寂寥萬世難長固雄豪安在哉衰草霑霜露崔巍長河北尚見應劉墓古樹藏龍蛇荒茅伏狐兔永懷故池館數子連章句逸興驅山河雄辭變雲霧我行覩遺迹精爽如相遇斗酒將酹君悲風白楊樹三君詠并序髙適開元中適遊於魏郡北有故太師鄭公舊館里中有故尚書郭公遺業邑外又有故太守狄公生祠焉覩物增懷遂為三君詠魏鄭公徴鄭公經綸日隋氏風塵昏濟代取髙位逢時敢直言道光先帝業義激舊君恩寂寞卧龍處英靈千載魂郭代公元振代公實英邁津涯浩難識權兵抗矯徴仗節歸有德縱橫負大智顧盻安社稷流落勿重陳懷哉為悽惻狄梁公仁傑梁公乃貞固勳烈垂竹帛昌言太后朝濳運儲皇䇿待賢開相府共里登方伯至今青雲人猶是門下客七愛詩并序皮日休皮子之志常以真純自許每謂立大化者必有真相以房杜為真相焉定大亂者必有真將以李太尉為真將焉傲大君者必有真隱以盧徵君為真隱焉鎮澆俗者必有真吏以元魯山為真吏焉負逸氣者必有真放以李翰林為真放焉為名臣者必有真才以白太傅為真才焉嗚呼吾之道時耶行其事也在乎愛忠矣不時耶行其事也亦在乎愛忠矣茍有心歌詠者豈徒然哉房杜二相國吾愛房與杜貧賤共聮步脫身拋亂世䇿杖歸真主縱橫握中算左右天下務䯈髒無敵才磊落不世遇美矣名公卿魁然真宰輔黃閣三十年清風一萬古巨業照國史大勳鎮王府遂使後世民至今受陶鑄粵吾少有志敢躡前賢路茍得同其時願為執鞭豎李太尉晟吾愛李太尉崛起定中原驍雄十萬兵四靣圍國門一戰收三畿一叱散妖氛乘輿既反正凶豎爭亡魂巍巍柱天功蕩蕩蓋世勳仁於曹孟德勇過霍將軍丹劵入帑藏靑史傳子孫所謂大丈夫動合驚乾坤所謂聖天子難得忠貞臣下以契魚水上以合風雲百世必一亂千年方一人吾雖翰墨子氣槩敢不羣願以太平頌題向甘泉春盧徴君鴻吾愛盧徵君髙卧嵩山裏百辟未一顧三徵方暫起坦腹對宰相岸幘揖天子建禮門前吟金鑾殿裏醉天下皆哺糟徴君獨潔巳天下皆樂聞徵君獨洗耳天下皆懷羞徵君獨多耻銀黃不妨懸赤紱不妨𬒳而於心抱中獨作羲皇地籃輿一云返泥詔褒不巳再看緱山雲重酌嵩陽水放曠書裏終逍遙醉中死吾謂伊與周不若徴君貴吾謂巢與許不若徴君義髙名無階級逸迹絶涯涘万世唐書中逸名不可比粵吾慕真隱疆以骨肉纍如教不為名敢有徴君志元魯山吾愛元紫芝清介如伯夷輦毋遠之官宰邑無點疪三年魯山民豐稔不暫飢三年魯山吏淸愼各自持只飲魯山泉只採魯山薇一室氷蘗苦四逺聲光飛退歸舊隱來斗酒入茅茨雞黍匪家畜琴樽常自怡盡日一菜食窮年一布衣清似匣中鏡直如琴上絲世無用賢人青山生白髭既卧黔婁衾空立陳實碑吾無魯山道空有魯山辭所恨不相識援毫空涕垂李翰林吾愛李太白身是酒星魄口吐天上文迹作人間客磊砢千丈林澄徹萬尋碧醉中草樂府十幅筆一息召見承明廬天子親賜食醉曽吐御床傲幾觸天澤權臣妬逸才心如斗筲窄失恩出內署海嶽甘自適刺謁戴接籬赴宴著穀屐諸矦百步迎明君九天憶竟遭腐脅疾醉魄歸八極大鵬不可籠大椿不可摘蓬壷不可見姑射不可識五嶽為辭鋒四溟作胸臆惜哉千萬年此俊不可得白太傅吾愛白樂天逸才生自然誰為詞翰器乃是經濟賢欻從浮豔詩作得典誥篇立身百行足為文六藝全清望逸內署直聲驚諌垣所刺必有思所臨必有傳忘形任詩酒寄傲遍林泉所望握文柄所希持化權何期遇訾毀中道多左遷天下皆汲汲樂天獨怡然天下皆悶悶樂天獨捨旃髙吟辭兩掖清嘯罷三川處世似孤鶴遺榮同蛻蟬仕若不得志可為龜鏡焉陽城驛元稹商有陽城驛名同陽道州陽公沒巳久感我淚交流昔公孝父毋行與曽閔儔既孤善兄弟凡弟和且柔一夕不相見若懷三嵗憂遂是不婚娶沒齒同衾裯妹夫死他縣遺骨無人收公令季弟往公與仲弟留相別竟不得三人同逺遊共負他鄉骨歸來藏故丘棲遲居下邑邑人無苟偷里中競長短來問劣與優官刑一朝耻公短終身羞公亦不遺布人自不盜牛問公何德爾忠信先自修發言當道理不顧黨與讎聲香漸翕習冠蓋若雲浮少者從公學老者從公遊往來相告報縣尹與君矦名落公卿口湧如波薦舟天子得聞之書下再三求書中願一見不異旱地蚪何以持為御駟馬駕安輈公方伯夷操事殷不事周我實唐士庶食唐之田疇我聞天子意安敢專自由來為諌大夫朝夕侍冕旒希夷惇薄俗密勿獻良籌神醫不言術人瘼曾暗瘳月請諌官俸諸弟相對謀皆曰親戚外酒散目前愁公云不有爾安得此嘉猷施餘盡酤酒客來相獻酬日旰不謀食春深仍弊裘人心良戚戚我樂獨油油真元歲云暮朝有曲如鈎風波勢奔蹙日月光綢繆齒牙屬為猾禾黍暗生蝥豈無司言者肉食吞其喉豈無司標者利柄扼其韝鼻復勢氣塞不可辨薰蕕公雖未顯諌惴惴如患瘤飛章八九上皆若珠暗投炎炎日將熾積燎無人抽公乃率其屬決諌同報讎延英殿門外扣閣仍叩頭且曰事不止臣諌誓不休上知不可遏命以美語酬降官司成署俾之為贅疣姦心不快活擊刺礪戈矛終為道州去天道意悠悠遂令不言者反以言為訅喉舌坐成木膺鸇化為鳩避權如避虎冠豸如冠猴平生附我者詩人稱好逑私來一執手恐若墜諸溝送我不出户決我不回眸唯有太學生各具糧與糇咸言公去矣我亦去荒陬公與諸生別步步駐行騶有生不可訣行行遇閩甌為師得如此得為賢者不道州聞公來鼓舞歌且謳昔公居夏邑狎人如狎鶠況自為刺史豈復援鼓桴滋彰一時罷教化天下遒炎瘴不得老英華忽巳愁有鳥哭楊震無兒悲鄧攸唯餘門弟子列樹松與楸今來過此驛若弔汨羅洲祠曹諱羊祜此釋何不侔我願避公諱名為避賢郵此名有深意蔽賢天所尤吾聞玄元教日月冥九幽幽隂蔽翳者永為幽翳囚奉同徐侍郎五雲溪新亭重陽宴集作獨孤及萬峯蒼翠色雙溪清淺流巳符東山趣況值江南秋白露天地肅黃花門館幽山公惜美景肯為芳樽留五馬照池塘繁絃催獻酬風前孟嘉帽乘興李膺舟騁望傲千古當歌遺四愁豈令永和人獨擅山隂遊高軒過李賀華𥚑織翠靑如蔥金環壓轡搖玲瓏馬蹄隱耳聲隆隆入門下馬氣如虹云是東京才子文章巨公二十八宿羅心胸元精昭昭貫當中殿前作賦聲摩空筆補造化天無功厖眉書客感秋蓬誰知死草生華風我今垂翅附冥鴻他日不羞蛇作龍郡中與諸文士宴集韋應物兵衛森畫戟宴寢凝清香海上風雨至逍遙池閣涼煩痾正消散嘉賔復滿堂自慙居處崇未覩斯民康理會是非遣性達形迹忘鮮肥屬時禁𬞞果幸見嘗俯飲一杯酒仰聆金玉章神歡體自輕意欲淩風翔吳中盛文史羣彥今汪洋方知大藩地豈曰才賦疆淮南秋夜呈周侃李疑天淨河漢髙夜間砧杵發清秋急如此離恨應難歇風亂池上螢露光竹門月與君共遊處勿作他鄉別夜飲東亭宋之問春水鳴大壑皓月吐層岑岑壑景色佳慰我逺遊心暗芳足幽氣驚棲多衆音髙興南山曲長謡橫素琴宴客詞張籍上客不用顧金羈主人有酒君莫違請君看取園中花地上漸多枝上稀山頭樹緑不見石溪水無風應更碧人人齊醉起舞時誰覺翻衣與倒幘明朝花盡人巳去此地獨來空繞樹過賈六蘇晉主人病且間客來情彌適一酌復一笑不知日將夕昨來屬歡遊於今盡成昔努力持所趣空名定何益送渾將軍出塞髙適將軍族貴兵且強漢家巳是渾邪王子孫相承在朝野至今部曲燕支下控絃盡用隂山兒臨陳常騎大宛馬銀鞍王勒繡鍪狐每逐嫖姚破骨都李廣由來先將士衛青未肯學孫吳傳有沙埸十萬騎昨日邊庭羽書至城頭畫角三四聲匣裏寶刀晝夜鳴意氣能甘萬里去辛勤動作一年行黃雲白草無前後朝望旌旗夕刁斗塞下應多俠少年關西不見春楊柳從軍但問所從誰擊劒酣歌當此時逺別無輕繞朝䇿平戎早寄仲宣詩送郭大夫再使吐蕃張説犬戎廢東獻漢使馳西極長䇿間酋渠猜阻自夷殛容髮徂邊歲旌裘弊海色五年一見家妻子不相識武庫兵猶動金方事未息逺圖俟才智苦節輸筋力脫刀贈分手書帶加餐食知君萬里矦立㓛在異域送張舍人之江東李白張翰江東去正值秋風時天晴一鴈逺海闊孤帆遲白日行欲莫滄波杳難期吳洲如見月千里幸相思吳興送梁輔闕歸朝賦得荻花朱長文柳家汀洲孟冬月雲寒水清荻花發一枝特贈朝天人願比蓬萊殿前雪送周願判官歸嶺南姚係早蟬望秋鳴夜琴怨離聲眇然多異感值子江山行由來重義人感激事縱橫往復念遐阻淹留慕平生晨奔九衢餞莫始萬里程山驛風月樹海門煙霞城易綃泉源近拾翠沙溆明蘭蕙一為贈貧交空復情送韓愈從軍孟郊志士感恩起變衣非變性親賔改舊觀僮僕生新敬坐作羣書吟行為孤劒詠始知出處心不失平生正淒淒天地秋凛凛軍馬令驛塵時一飛物色極四淨王師既不戰廟略盡無競王粲有所依元瑜初應命一章諭檄明百萬心氣定今朝旗鼓前笑別大夫盛送王昌齡赴江寧岑參對酒寂不語悵然悲送君明時不得用白首徒攻文國澤從一官滄波幾千里群心滿天闕獨去過淮水舊家冨春渚常憶卧江樓自聞君欲行頻夢南徐州窮巷獨閉門寒燈靜深屋北風吹微雪抱被肯同宿君今到京口正值桃花時舟中饒孤興湖上多新詩潛蚪且深蟠黃鶴舉未晚惜君靑雲氣努力加飱飯送李十一尉臨溪常建泠泠花下琴君唱渡江吟天際一帆影預懸離別心以言神仙尉因致瑤華音回軫撫商調越溪澄碧林奉送韋起居老舅百日假滿歸嵩陽舊居權德輿威鳯翔紫氛孤雲出寥天竒彩與幽姿縹眇皆自然嘗聞陶唐氏亦有巢許全以茲聳風俗豈必效羇牽大君遂群方左史蹈前賢振衣去朝市賜告歸林泉滑和固難久循性得所便有名皆畏途無事乃真筌舊壑窮杳窱新潭漾淪漣巖花落又開山月缺復圎輕䇿逗蘿徑幅巾凌翠煙機間魚鳥狎體和芝术鮮四皓本避難二踈猶待年況今寰海淸復此鬢髮玄顧慙纓上塵未絶區中緣齊竽終自退心寄嵩峯巔送從叔簡孟郊長安離別道宛在東城隅寒草根未死愁人心巳枯促促水上影遙遙天際途生隨昏曉中皆被日月驅北驥繞山嶽南帆指江湖高蹤一超忽千里在須臾感別從叔簡再東歸去年車馬道高槐結浮隂下有名利人一人千萬心黃鶴共逺語滄溟無近潯苦苦靜退姿泠泠思歸吟菱唱忽生聽藝書回望深淸風散言笑餘花綴衣襟獨恨魚鳥別一飛將一沉送弟郢東歸爾去東南夜我無西北夢誰言貧別易貧別愁更重曉色奪明月征人逐群動春風楚濤髙旅榜將誰共盧十五竹亭送姪稱歸山楊衡落葉寒擁壁淸霜夜霑石正是憶山時復送歸山客殷勤一樽酒曉月當窗白送李觀韓愈別兼獻張徐州孟郊冨別愁在顔貧別愁銷骨懶磨舊銅鏡畏見新白髮古樹春無花子規啼有血離絃不堪聽一聽三四絶世途非一險俗慮各千結有客步大方驅車獨迷轍故人韓與李逸翰雙皎潔哀哉摧折歸贈詞縱橫設徐方國號在元戎天下傑禰生投刺遊王粲吟詩謁高情無遺照朗枹開曉月有土不埋冤有讎皆為雪願為直草木永向君地列願為古琴瑟永向君地發欲識丈夫心曽將孤劒説送狄宗亨王昌齡秋在水清山暮蟬洛陽樹色鳴臯煙送君歸去愁不盡又惜空度涼風天送孟浩然之廣陵李白故人西辭黃鶴樓煙花三月下楊州孤帆逺影碧山盡唯見長江天際流送客陳子昻故人洞庭去楊柳春風生相送河洲晚蒼茫別思盈白蘋巳堪把緑芷復含榮江南多桂樹歸客贈生平送唐次武元衡都門去馬嘶灞水東流淺靑槐驛路長白日離亭晚望望煙景微草色行人逺送皇甫湜赴舉馬異馬蹄聲特特去入天子國借問去是誰秀才皇甫湜含吐一腹文八音兼五色主文有崔李郁郁為朝德靑銅鏡必明朱絲繩必直稱意太平年願子長相憶送張宗原姚合東門送客道春色如死灰一客失意行十客顔色低住者既無家去者又非歸愁窮一成疾百藥不可治子賢我且愚命分不合齊誰開蹇躓門日日同遊栖子行何所之切切食與衣誰能買仁義令子無寒飢野田不生草四向生路歧士人甚商賈終日須東西鴻鴈春北去秋風復南飛勉君向前路無失相見期送綦毋濳落第還鄉王維聖代無隱者英靈盡來歸遂令東山客不作顧采薇既至君門逺孰云吾道非江淮度寒食京兆縫春衣置酒長亭送同心與我違行當浮桂棹未幾拂荆扉逺樹帶行客孤村當落暉吾謀適不用勿謂知音稀送暨道士還玉淸李頎仙官有名籍度世吳江濵大道本無我青春長與君中州俄巳到至理得而聞明主降黃屋時人看白雲空山何窈窕三秀日氛氲遂此留書客超遙煙駕分淇上別趙仙舟王維相逢方一笑相送還成泣祖席巳傷離荒城復愁入天寒逺山靜日莫長江急解纜君巳遙望君空佇立送沈秀才下第東歸賈島曲言惡者誰恱耳如彈絲直言好者誰刺耳如長錐沈生才俊秀心腸無邪欺君子忌茍合擇交如求師毀出嫉夫口騰入禮部闈下第若子耻遺才人耻之東歸家堂逺掉轡時參差浙雲近吳見汴柳接楚垂明年春光別回首不復疑崔九弟欲往南山王維城隅一分手幾日還相見山中有桂花莫待花如霰和裴迪歸山深淺去須盡丘壑美莫學武陵人暫遊桃源裏留別崔興宗駐馬欲去襟清寒御溝上前山景氣佳獨往還惆悵贈別沈四逸人髙適沈侯未可測其況信浮沉十載常獨坐幾人知此心乘舟蹈滄海買劒投黃金世務不足煩有田西山岑我行遇知巳遂得開清襟何意閫閾間沛然江海深疾風掃秋樹濮上多鳴砧耿耿樽酒前聮鴈飛愁隂平生重離別感激對孤吟送豆盧䇿歸別墅孟郊短松鶴未巢高石雲始棲君為蕭灑去性與雲鶴齊力買竒險地手開淸淺溪身披薜蘿襟山陟莓苔梯一卷冰雪文避俗常自攜送柳淳入關靑山輾為塵白日無間人自古推髙車爭利西入秦王門與矦