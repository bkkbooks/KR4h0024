body:
  text: 碑十六釋四碑隂記附㧾九首荆州玉泉寺大通禪師碑張說潤州鶴林寺故徑山大師碑李華牛頭山第一祖融大師新塔記附禹錫劉章敬寺百巖禪師碑權徳輿漳州三平大師碑王諷揚州華林寺大悲禪師碑賈餗洪州開元寺石門道一禪師塔碑權徳輿無姓和尚碑栁宗元碑陰記附荆州玉泉寺大通禪師碑銘并序張說夫緫四大者成乎身矣立萬始者主乎心矣身是虛哉即身見空始同妙用心非實也觀心若幻乃等真如名數入焉妙本乖言說出焉真宗隠故如來有意傳要道力持至徳萬劫而遥付法印一念而頓授佛身誰其𢎞之實大通禪師其人也禪師尊稱大通諱神秀本姓李陳留尉氏人也心洞九漏懸觧先覺身長八尺秀眉大耳應王伯之象合聖賢之度少為諸生遊問江表老莊𤣥㫖書易大義三乘經論四分律儀說通訓詁音㕘吳晉爛乎如襲孔翠玲然如振金玉既而獨鑒潛發多聞旁施逮知天命之年自拔人聞之世企聞蘄州有忍禪師禪門之法𦙍也自菩提達磨天竺東來以法傳惠可惠可傳僧璨僧璨傳道信道信傳𢎞忍繼明重跡相承五光乃不逺遐阻飜飛謁詣虚受與沃心並懸㑹髙悟與真乘同轍盡捐妄識湛見本心住寂滅境行無是處有師而成即燃燈佛所無依而說是空王法門服勤六年不捨晝夜大師歎曰東山之法盡在秀矣命之洗足引之並坐於是涕辭而去退藏於密儀鳳中始􅝗玉泉名在僧録寺東七里地坦山雄目之曰此正楞伽孤峯度門蘭若蔭松藉草吾將老焉雲從龍風從虎大道出賢人覩岐陽之地就去成都華陰之山學來如市未云多也後進得以拂三有超四禪升堂七十味道三千不是過也爾其開法大略則惠念以息想極力以攝心其入也品均凡聖其到也行無前後趣定之前萬緣盡閑發慧之後一切皆如特奉楞伽遞為心要過此以徃未之或知乆視年中禪師春秋高矣詔請而來趺坐覲君肩輿上殿屈萬乘而稽首灑九重而宴居傳聖道者不北面有盛徳者無臣禮遂推為兩京法主三帝國師仰佛日之再中慶優曇之一現然處都邑婉其秘㫖每帝王分座后妃臨席鵷鷺四帀龍象三繞時熾炭待礦故對黙而心降時診飢投味故告約而義領一雨溥霑於衆縁萬籟各吹於本分非夫安住無畏應變無方者孰能至爾乎聖敬日崇朝恩代積當陽初㑹之所置寺曰度門尉氏先人之宅置寺曰報恩軾閭名鄉表徳非儗局厭喧輦長懷虛壑累乞還山既聴中駐乆矣衰憊無他患苦魄散神全形遺力謝神龍二年二月二十八日夜中顧命趺坐泊如化滅禪師武徳八年􅡧酉受具於天宫至是年丙午復終於此寺蓋僧臘八十矣生於隋末百有餘嵗未嘗自言故人莫審其數也三界火心四部冰背榱崩梁壞雷動雨泣凡諸寳身生是金口故其喪也如執親焉詔使弔客侯王歸賵三月二日册謚大通展飾終之義禮也時厥五日假安闕塞緩及𦵏之期懷也宸駕臨訣至午橋王公悲送至伊水羽儀陳設至山龕仲秋既望還詔乃下帝諾先許冥遂宿心太常卿皷吹導引城門郎䕶監喪葬是日天子出龍門泫金櫳登高停蹕目盡迴輿自伊及江扶道哀候幡花百輦香雲千里維十月哉生魄明即舊居後岡安神起塔國錢嚴飾賜逾百萬巨鍾是先帝所鑄羣經是後皇所錫金牓御題華幡内造塔寺尊重逺稱標絶初禪師形觧東洛相見南荆白霧積晦於禪山素蓮寄生於玉樹則雙林變色泗水逆流至人違代同符異感百日卒哭也在龍華寺設大㑹八千人度二千人二祥練縞也咸就西明道場數如前㑹萬迴菩薩乞施後宫寳衣盈箱珍價敵國親舉寵費侑供巡香其廣福博因存没如此日月逾邁榮落相推於戲法子永戀宗極痛慈舟之遽失恨涌塔之遲開石城之歎也不孤廬山之碑焉可作竊比夫子貢之論夫子也生於天地不知天地之髙厚飲於江海不知江海之廣深强名無跡以慰其心銘曰額珠内隠匪指莫效心鏡外塵匪磨莫照海藏安靜風識牽樂不入度門孰探法要倬哉禪伯獨立天下功收密詣觧郤名假誦無所得觧亦都捨月影空如現於悟者無量善衆為父為師露清熱惱光射昬疑冀將住世萬壽無期奈何過隙一朝去之嗟我門人憂心斷續進憶瞻仰退思付囑盡不離定空非滅覺念兹在兹敢告無學潤州鶴林寺故徑山大師碑銘并序李華道行無跡妙極無象謂體性空而本源清淨謂諸見滅而覺照圎明我天人師示第一義師無可說之法義為不二之門其定也風輪駐機其慧也日宫開照其用也春泉利物三者備體誰後誰先入無量而不動開法華而踴出湛兮以有無觀聴而莫測寥兮以逺近思惟而不窮智得皆空為真實際大悲恒寂遍撫羣迷月入百川之中佛帀千花之上修而證者𤣥同妙有應而起者旁作化身先大師適來此土化身歟適去他方補處歟不可得而知也自如來現滅四魔横恣人天無怙寄命崩崖勝大敵者那羅延身消大毒者伽陀妙藥拔陷扶墜而生大師大師延陵馬氏諱𤣥素字道清崇髙紹興於法外經緒不繫於人間慈母方娠厭患葷肉長至之日誕彌仁尊生有異祥乳育安靜既齓稽首父母求歸法門即日獲請出依精舍如意年中剃度􅈻江寧長壽寺既進具已戒光還照定水澄源鵝王之不受泥塵香象之頓除羈鎖未之比也身長七尺體無凡骨眉毫際臉口若方丹目不顧睇聲侔扣玊入南牛頭山事威大師撞鍾大鳴入海同味迦葉以頭陀第一大師亦斗藪塵勞聞一知十未嘗請益觀法無本觀心不生喻金剛之最堅比師子之無畏圎月照海高深盡明慧風吹雲宇宙皆淨威大師摩頂謂曰東南正法待汝興行命於别位開導來學於是騶虞馴擾表仁之至也衆禽獻果明化之均也接足有繞百千人俱大師悉以菩薩呼之教習大乗戒妄調伏自性還源無漸而可隨無頓而可入摩尼照物一切如之吾常黙然無法可說或有信願雙極懇求心要於我渇仰施汝醍醐問禪定邪吾無修問智慧邪吾無得道惟心證不在言通懷帝釋輪終為世論自淨而已無求色聲既悟者小無㣲塵大無三界當悟者内珠雖隠猶作來因藥草萬殊根莖等潤貌和言寡飢至飽歸或有聞尊稱而遷善見色身而獨得我無爾念道溥慈圎食不問醎酸口不言寒暑身同池水飽蚊蚋之飢渇道離人我順衆生之徃來貴賤寃親是法平等故饋甘味而不辭同於糗糒奉上服而不拒齊於弊褐俾夫家有道侣府無爭人開元中本寺僧法密請至京口潤州刺史韋銑灑掃鶴林兹焉供養有屠者恣忍積骸如山聞大師尊名來仰真範忽自感悟懴悔求哀大師受之又白言和尚大悲當應我供大師納衣跏趺未嘗出戸公侯稽首不為動摇至是如其懇乞忻然降詣夫盜隠其罪虎慈其子仁與不仁皆同佛性不生不滅無去無來今濁流一澄清水立現諸佛所度我亦度之天寳中揚州僧希𤣥密請至廣陵便風馳帆白光引棹楚人相慶佛日渡江梁宋齊魯傾都來㑹津塞途盈人無立位觧衣投施積若丘陵皆委於所在行無住捨禮部尚書李憕時為揚州牧齋心跪謁為衆唱首望慈月者誰不清涼傳百億明燈照四維上下塵沙之數皆趨佛乘二州以貪法之心移牒逾月均吾喜捨成汝堅牢無非道場還至本處天寳十一載十一月十一日中夜坐滅嗚呼菩提位中六十一夏父母之生八十五年赴哀位者可思量否至有浮江而奠望寺而哭十里花雨四天香雲幡幢蓋網光蔽日月以其月二十一日四衆等號捧全身建塔于黄鶴山西原像法也州伯邑宰執喪師之禮率申哀慕江湖震悼曩於寺内移居髙松互偃湼槃之夕椅桐雙枯虎狼哀號聲破山谷人祗㦧慟天地晦冥及發引登原風雨如掃慈烏覆野靈鶴徊翔有情無情徳至皆感初達摩祖師傳法三世至信大師信門人達者融大師居牛頭山得自然智慧大師就而證之且曰七佛教戒諸三昧門語有差别義無差别羣生根器各各不同惟最上乘攝而歸一涼風既至百實皆成汝能揔持吾亦隨喜由是無上覺路分為此宗融大師講法則金蓮冬敷頓錫而靈泉湧溢東夷西域得神足者赴㑹聴焉融授巖大師巖授方大師方授持大師持授威大師凡七世矣真乘妙縁靈祥嘉應僉具傳録布於人世門人法鏡吳中上首是也門人法欽徑山長老是也觀音普門文殊佛性惟二菩薩重光道源門人法勵法海親奉㣲言感延霜露繕崇龕座開構軒楹時惟海公求報師訓廬孔氏之墓起淨明之塔世異人同泫然長慕僧端等蔭旃檀樹皆得身香菩薩戒弟子故吏部侍郎齊澣故刑部尚書張均故江東採訪使潤州刺史劉日正故廣州都督梁昇卿故採訪使潤州刺史徐嶠故採訪使常州刺史劉同昇故潤州刺史韋昭理故給事中韓賞故御史中丞李丹故涇陽令萬齊融禮部員外郎崔令欽道流人望莫盛於此弟子嘗聞道於徑山猶樂正子春之於夫子也洗心瞻仰天漢彌高鏡公門人悟甚深者大理評事楊詣過去聖賢諸功徳藏志之所至無不聞知魯史從告況乎傳信其文曰濁金清鏡在爾銷鍊磨之瑩之功至乃見膏漬炷然光明外遍陽升律應草木皆變啟迪瘖瞽惟吾大師息言成教捨法興悲辰極不動風波自移境由心寂道與人隨杳然𤣥黙湛入無餘性本無垢云何淨除身心宴寂大拯淪胥内光無盡萬境同如甘露正味瑠璃妙器遍施大千無同無異度未度者化周縁備道樹忽枯湼槃時至我無生滅隨世因縁吉祥殿上應化諸天寂寂靈塔滔滔逝川恒沙刼壞智月常圎牛頭山第一祖融大師新塔記劉禹錫初摩訶迦葉授佛心印得其人而傳之至師子比丘凢二十五葉而達摩得焉東來中華華人奉之為第一祖又三傳至雙峯信公雙峯廣其道而岐之一為東山宗能秀寂其後也一為牛頭宗巖持威鶴林徑山其後也分慈氏之一支為如來之别子咸有祖稱粲然貫珠大師號法融姓韋氏延陵人少為儒博極羣書既而歎曰此仁誼言耳吾志求出世間法遂入句曲依僧晁改逢掖而緇之徙居是山宴坐石室以惠力感通故旱麓泉涌以神功示現故皓雪蓮生巨蛇摧伏羣鹿聴法貞觀中雙峯過江望牛頭頓錫曰此山有道氣宜有得之者乃來果與大師相遇性合神授至于無言同躋智地密付真印掲立江左名聞九圍學徒百千如水歸海由其門而為天人師者皆脉分焉顯慶二年報身示滅道在後覺神依故山戒香不絶龕座未飾夫豈不思乎葢神其㝠數必有所待大和三年潤州牧浙江西道觀察使檢校禮部尚書趙郡李公在鎮三閏百為大備尚理信古儒𤣥交修始下令禁桑門販佛以眩人者而干真實相深達焉嘗謂大師像設冝從本教言自我啟因自我成乃召主吏籍我月入得緡錢二十萬俾秣陵令如符經營之三月甲子新塔成事嚴而工人盡藝誠逹而山神來䕶願力既從衆心歸重造白龍像大㑹諸天聲香之藴如見如聞即相生敬幽明同感尚書欲傳信于後逺命愚志之夫上士觧空而離相中士著空而嫉有不因相何以視覺不由有何以悟無彼逹真諦而得中道者當知為而不有賢乎以不修為無為也唐故章敬寺百巖禪師碑銘并序權徳輿禪宗長老百巗大師之師曰大寂禪師傳佛語心法始自達磨至于惠能能化行于南服流于天下大抵以五藴九識十八界皆空猶鏡之明也雖萬象畢呈而光性無累心之虛也雖三際不住而覺觀湛然得於此者即凡成聖不然則一塵瞥起六入膠固循環回復於生死之中風濤火輪迷忘不息授受脗合大師得之一言宗通深入無礙師諱懷暉姓謝氏東晉流寓今為泉州人孩提秀發博究書術一旦慨然曰我之祖先今安在邪四肢百體視聴動使孰使之然邪漼然雨泣改服緇褐志在楞伽行在曹溪得圎明清淨之本去妄想因緣之習百八句義照其身心心離文字化無方所於是抵清涼下幽都登徂來入太行所至之邦䝉被法味止于太行百巖寺門人因以百巖號焉元和三年有詔徴至京師宴座于章敬寺毎嵗召入麟徳殿講論後以疾固辭十年十二月恬然示滅其年六十其夏三十五弟子智朗志操等以眀年正月起塔于灞陵原凡一燈所傳一雨所潤入法界者不可勝書著法師資傳一編自雞足山大迦葉而下至于能秀論次詳實或問心要者答曰心本清淨而無境者也非遣境以㑹心非去垢以取淨神妙獨立不與物俱能悟斯者不為習氣生死幻藴之所累也故薦紳先生知道入理者多遊焉嘗試言之以中庸之自誠而明以盡萬物之性以大易之寂然不動感而遂通則方袍襃衣其極致一也嚮使師與孔聖同時其顔生閔損之列歟釋尊在代其大惠綱明之倫歟至若從師受具之次第宰官大臣之尊信誕生入滅之感異今皆不書某三十年前常聞道於大寂聿來京下時欵師言頃因哀傷似獲悟入則知煩惱不逮菩提雖聚散於此生期㑹歸於彼岸銘曰西方之教南宗之妙與日並照百巖得之為代導師熲若琉璃結火燔性愛流溺正癡冥奔命即心是佛即色是空師之通兮無去無來無縛無觧師之化兮掲兹靈塔丹素周帀示塵劫兮漳州三平大師碑銘并序王諷得菩提一乘嗣達磨正統誌其修證俾人知方則有大師法名義中俗姓楊氏為高陵人因父仕閩生於福唐縣年十四宋州律師𤣥用剃髪二十七具戒先修三摩鉢提後修奢摩他禪那大師幻悟法印不汩幻機日損薰結𤣥超冥觀先依百巖懷暉大師厯奉西堂百丈石䂮後依大顛大師寳厯初到漳州州有三平山因芟薙住持敞為招提學人不逺荒服請法者常有三百餘人示以俗諦勉其如幻觧脫示以真空顯非秘密度門虚徃實歸皆恱義味知性無量於無量中以習氣所拘推為性分知智無異於無異中以隨生所繫推為業智以此演教證可知也大師一日疾背疽閉戸七日不通問洎出疽已潰矣無何門人以母喪聞又閉戸七日不食飲武宗皇帝簡併佛刹冠帶僧徒大師止於三平深巗至宣宗皇帝稍復佛法有巡禮僧常肇惟建等二十人刺史故太子鄭少師薰俾蕆其事旬嵗内寺宇一新因舊額標曰開元於戱知物不終完成之以禆教知像不盡法約之以表㣲晦其用而不知其方本乎跡而不知其常咸通十三年十一月六日宴坐示滅享年九十二僧臘六十五諷自吏部侍郎以旁累謫守漳浦至止二日訪之但和容瞪目乆而無言徴其意備得行止事實相見無間然也問曰周易經厯三聖皆合天㫖神道注之者以至虚而善應則以道為稱以不思而𤣥覽則以神為名達理者也經云隠而顯不言而喻不疾而速不行而至後之通儒有何疑也異日又訪之適有刑獄因語及師曰孝之至也無所不善有其跡乃匹夫之令節法之至也莫得而私一其政則國之彞典其於適道適權又如此言訖頷之不復更言今亡矣夫彊擬諸形容因為銘曰觀跡知證語黙明焉觀證知教權實形焉體用如一曷以言宣太素浩然吾師亦然觀其定容見其正性不閱外塵朗然内淨智圎則神理通則聖師能得之隨順無競吾之行止師何以知得性之分識時之機達心大師邈不可追揚州華林寺大悲禪師碑銘并序賈餗有天地而萬物生焉形氣推遷行識相縁一受其形萬化而未始有極沙界塵劫驅迷走妄浩乎若汩諸巨海而無垠也倀乎若囚諸闇室而無曉也四蛇六賊攻其内熱燄燋芽寓其質而昧者舉世猶竊竊然以彊力敏智可大取所欲攘螳臂而戰蝸角其不勝也則憂悲恐懼日以交馳曽未知夫牽於名而溺於惑者以形質之相雖天地秋毫細大殊耳其有限一也其必盡一也以壽觀天雖萬齡一瞬修促異耳其有限一也其必盡亦一也况大不及天地而逺不至萬齡者又惡足以擬議哉此西方之聖人所以懸覺照於無極也自大迦葉親承心印二十九世傳菩提達磨始來中土代襲為祖𣲖别為宗故第六祖曹溪惠能始與荆州神秀分南北之號曹溪既没其嗣法者神㑹懷讓又析為二宗初師子比丘以遭罹大難恐異端之學起故傳袈裟以為信迨曹溪凡十世而其間増上慢者徇名迷實至決性命以圗之故每授受之際如避仇敵及曹溪將老神㑹曰衣所以傳信也信茍在法衣何有焉他日請秘于師之塔廟以熄心競傳衣繇是遂絶師嗣法於神㑹大師者也上距大迦葉三十六代皆以真空妙有覺性佛心黙傳密付印可懸觧行之謂般若到之謂湼槃得之者變凡聖猶反掌失之者淪生死於浩劫不以心得不著佛求知佛性之在我亦無我而可證洞然與虛空為體無起無滅包大千而不礙窮萬古而不老而神通自在顯晦無跡陶冶萬有未時生心然後為得也其教之大略如此師諱靈坦代宗皇帝錫號曰大悲姓武氏葢則天太后之族孫也父宣官至洛陽令師生而神雋七嵗舉童子及第年二十厯太子通事舍人逸羣髙歩脫落羈束雖在軒冕之中泊如也及隨父至洛陽聞荷澤寺有神㑹大師即决然蟬蛻萬縁誓宄心法父知其志不可奪亦壯而許之凡操篲服勤於師之門庭者八九年而𤣥闗秘鑰罔不洞觧一且密承屬付莫有知者後十五日而荷澤被遷於弋陽臨行謂門人曰吾大法弗墜矣遂東西南北夫亦何恒時天寳十二載也師既佩真玦遊無定所以為非博通不足以圎證故閱大藏於廬江浮查寺非廣問不足以具足故㕘了義於上都忠禪師繇是名稱高逺天下瞻企將東吾道固請出闗天子降錫名之詔以顯其徳時大厯八年也既周流江表四十餘載或山而栖或邑而遊鏡懸於空萬象俱納蚩蚩横目所至成市癡愛貪欲榛荒心路以大無畏廓而闢之元和三年故丞相趙公之為揚州始虚州之華林精舍以邀止焉初師之東遊也以世道交喪其日固乆將息言向晦與物相遺恍惚之間若有以傳燈之契來授者且印指於頭曰以是為信厥後每將演導則指跡如丹若乃制毒龍於金山柔猛虎於定山在江陰則神龜靈蛇之感現在江都則山鬼城神之慴伏皆顯仁藏用以示慈力斯衆目之所覩故略不盡書而惑者以為怪迂之說不可為訓是未聞菩薩大士遊乎不思議觧脫者無心於物而物自交應者乎住華林九年年一百有八厯僧夏八十有八以元和十一年秋九月八日返真於其寺明年建塔於州之西原門人遍於天下荷其教者惟上都西明寺全證證以自達摩以來皆有論譔而師之樂石未刻謂余能盡知其道寳厯元年駐錫於毗陵持其教宗與師之行事願得文而建諸塔廟余因採其昭昭可述者載於碑時丞相太原公揔戎淮南之三年也其銘曰茫茫萬有兮生死同纒業風振海兮識浪滔天覺者云誰兮有西方之大仙慈悲廣大兮妙力無邉八萬度門兮異𣲖同源文字言說兮罔非蹄筌惟心法皎皎兮如月斯懸惟大迦葉兮首得而傳代代繩繩兮燈不絶然迄于荷澤兮師又嗣焉法存形謝兮諸祖其然門人思慕兮塔彼西原將祈不朽兮余可無言洪州開元寺石門道一禪師塔碑銘并序權徳輿鍾陵之西曰海昏海昏南鄙有石門山禪宗大師馬氏塔廟之所在也門弟子以徳輿嘗游大師之藩俾文言而掲之曰三如來身以大慈為之本六波羅密以般若為之鍵非上徳宿殖者惡乎至哉大師諱道一代居徳陽生有異表㓜無兒戱嶷如山立湛如川渟舌廣長以覆凖足文理而成字全徳法器自天授之嘗以為九流六學不足經慮局然理世之具豈資出世之方唯度門正覺為上智宅心之域耳初落髪於資中進具於巴西後聞衡嶽有讓禪師者傳教於曹溪六祖真心超詣是謂頓門跂履造請一言懸觧始類顔子如愚以知十俄比淨名黙然於不二以法惟無住化亦隨方嘗禪誦於撫之西裏山又南至于䖍之龔公山攫搏者馴悍戾者仁瞻其儀相自用丕變刺史今河南尹裴公久於禀奉多所信嚮用此定惠發其明誠大厯中尚書路冀公之為連帥也舟車旁午請居理所貞元元年成紀李公以侍極司憲臨長是邦勤䕶法之誠承最後之說大抵去三以就一捨權以趣實示不遷不染之性無差别次第之門嘗曰佛不逺人即心而證法無所攝觸境皆如豈在多岐以泥學者故夸父喫㖃求之愈踈而金剛醍醐正在方寸於是觧其結發其覆如利刃之破罥索甘露之洒稠林隨其義味快得善利者可勝道㢤化縁既周趺坐報盡時貞元四年二月庚辰春秋八十夏臘六十前此以石門清曠之境為宴黙終焉之地忽謂入室弟子曰吾至二月當還爾其識之及是委化如合符節當夾鍾發生之候協拘尸薪火之期緇素幼艾失聲望路瀇涸流而法雨滂灑及山門而天香紛靄交感之際昧者不知沙門惠海智藏鎬英志賢智通道悟懷暉惟寛智廣崇泰惠雲等體服其勞心通其教以為吾師真性湛然與虛空俱唯是體魄化為舍利則西方之故事傳焉不可已也乃率籲其徒從荼毗之法珠圎玉絜煜燿盈升建兹嚴事衆所瞻仰至七年而功用成竭誠信故緩也徳輿徃因稽首粗獲擊䝉雖飛鳥在空莫知近逺而法雲覆物已被清凉今兹銘表之事敢拒衆多之請銘曰達磨心法南為曹溪頓門巍巍振拔沈泥禪師𢎞之俾民不迷九江西部為一都㑹亦既戾止𤣥津横霈慈哀攝護為大法礪五濁六觸翳然相䝉直心道塲决之則通隨器受益各見其功真性無方妙道不竭顧兹夢幻亦有生滅㣲言密用煥炳昭晰過去諸佛有修多羅心能悟之在一刹那何以寘哀兹窣堵波無姓和尚碑銘并序栁宗元維某年月日嶽州大和尚終于聖安寺凡為僧若干年年若干有名無姓世莫能知其閭里宗族所設施者有問焉而告曰吾姓性也其源無初其胄無終承于釋師以系道本吾無姓邪法劒云者我名也實且不有名惡乎存吾有名邪性海吾鄉也法界吾宇也戒為之墉惠為之户以守則固以居則安吾閭里不具乎度門道品其數無極菩薩大士其衆無涯吾與之戚而不吾異也吾宗族不大乎其若可聞者如此而止讀法華金剛般若經數逾千萬或譏以有為曰吾未嘗作嗚呼佛道逾逺異端競起唯天台大師為得其說和尚紹承本統以順中道凡受教者不失其宗生物流動趣向混亂唯極樂正路為得其歸和尚勤求端慤以成志願凡聽信者不惑其道或譏以有迹曰吾未嘗行始居房州龍興寺中徙居是州作道塲於楞伽北峯不越閫者五十祀和尚凡所嚴事皆世髙德始出家事而依者曰卓然師居南陽立山塟嶽州就受戒者曰道頴師居荆州弟子之首曰懷逺師居長沙安國寺為南嶽戒法嵗來侍師㑹其終遂以某月日𦵏於卓然師塔東若干歩銘曰道本於一離為異門以性為姓乃歸其根無名而名師教是尊假以示物非吾所存大鄉不居大族不親淵懿内朗冲虚外仁聖有遺言是究是勤惟動惟黙逝如浮雲交久益微世罕究陳爰有大智出其真門師以顯示俾民惟新情動生變物由堙淪爰授樂國參于化源師以誘導俾民不昏道用不作神行無迹晦明俱如生死偕寂法付後學施之無斁𦵏従我師無忘真宅薦是昭銘刻兹𤣥石碑隂記無姓和尚既居是山曰凡吾之求非在外也吾不動矣𢎞農楊公炎自道州以宰相徵過焉以為宜居京師强以行不可將以聞曰願間嵗乃往明年楊去相位竄謫南海上終如其志趙郡李萼辨博人也為岳州盛氣欲屈其道聞一言服為弟子河東裴藏之舉族受教京兆尹𢎞農楊公以其隠地為道塲和州刺史張惟儉買西峯廣其居凡以貨利委堂下者不可選紀受之亦無言將終命其大弟子懐逺授以道妙終不告其姓或曰周人也信州刺史李某為之傳長沙謝楚為行狀博陵崔行儉為性守一篇凡以文辭道和尚功德者不可悉數𢎞農公自餘杭命以行狀來懷逺師自長沙以傳來使余為碑既書其辭又假其隂以記唐文粹巻六十四欽定四庫全書唐文粹巻六十五宋姚