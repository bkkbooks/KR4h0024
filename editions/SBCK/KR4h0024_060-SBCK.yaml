body:
  text: 吳興姚鉉纂碑十二揔八首家廟唐西川節度副大使中書令南康郡王韋公先廟碑權德輿唐丞相司空燕國公先廟碑唐丞相贈太子太師崔公廟碑韓雲卿唐淮南節度使李公先廟碑白居易唐宣武軍節度副大使令狐公先廟碑劉禹錫唐興元節度使王公先廟碑唐魏博節度使沂國公田公先廟碑韓愈唐河陽軍節度使烏公先廟碑唐故光禄大夫檢校太尉兼中書令成都尹劔南西川節度副大使知節度事兼管内支度營田觀察處置統押近界諸蠻夷西山八國雲南安撫等使上柱國南康郡王贈太師韋公先廟碑銘并序權德輿萬物本乎天人本乎祖乃立宗廟以安神明德厚流光追養繼孝順而下之曰義等而上之曰仁國家稽合禮文損益前載崇功貴仕得祠四室於王制酌諸侯二昭二穆之義於祭統見君子盡志盡物之誠惟太尉中書令南康郡王懿文經武保合昌運左右德宗格于皇天始恢隴坻之旅終化岷峨之俗貴爲上公位極元台克肆忠力乃圖孝享作新廟干京師大安里古者揚其功烈銘于祭器近古以魯鍾衛鼎追􅅣先德不􅀂鏤文字於麗牲之碑之爲詳也乃謹而書之云公姓韋氏京兆杜陵人自扶陽重侯用經明至宰相後裔蕃昌德與位偕積十六葉至六代祖範字元禮以字行於代仕周爲車􅀐大􅀅軍入隋爲沂州刺史啓土郿城易名曰莊實生孝恪雅有文憲武德初由侍御史爲洛州别駕生司農府君諱機爲第一室端誠正志休有厥聲專對岀彊艱貞復命著西征記以獻太宗嘉之剖符澶州修起儒術三典卿曹陟降屯夷操持貴倖不避彊禦繕理宫室得其時制史氏書之爲唐名臣以夫人隴西郡君辛氏配司農生坊州府君諱餘慶爲第二室清和修絜履道不回歷右驍衛兵曹叅軍以至二千石以夫人武功蘇氏配坊州生贈太子少保府君諱嶽爲第三室方嚴貞幹政事修明在武后時以直忤㫖由太原令移佐睢陽岀入四紀績宣中外歷殿中監剖符八州盧海潮虢眉徐衛陜所至之􅀖有威有懷凢再追命以夫人扶風郡夫人竇氏配少保生贈太子太師府君諱賁爲第四室盛德循行含章自牧歷藍田尉淑聲流聞上纂崇厚下貽風訓凡三追命以夫人涼國太夫人叚氏配噫嘻自扶陽至郿城積丕烈於前史自考廟至顯考廟流熾昌於後葉列於禘嘗儲厥義方故南康郡王苞五常貞四教秉靈傑出含道中立初誓偏師建竒功扞大患立大節以儒衣法冠授律鑿門佩亞相之印綬修元侯之節制就加宗工入掌金吾撫征全蜀命賜備厚由地官轉天官􅂙緫端右平章宰政進中書令加司徒太尉鏚鉞秬鬯旂鑾琱戈有嚴有翼乃蔚乃赫忠厚博大以阜俗信廉仁勇以成師南蠻納邸西羗解辮象胥譯戎捷樂府陳夷歌守正持重推誠畢力開地通道者九千餘里生聚教訓者二十一年天文紀功刻在金石曁德宗棄天下太上居諒闇危言急病體國忘身毅然君子之道卓爾大臣之節永貞元年秋七月考終命于理所䇿贈太師有司奏謚曰忠武公自廟成距今凡八年矣以公天子守臣安危注意不得視滌濯承吉觸而元兄國子司業聿實奉朝請薦其常事孝友而才稱於士林初公之仲兄曰暈屯田貟外郎贈鄧州刺史叔氏曰肇太子左庶子兼御史大夫贈左散􅀐常侍咸以器望而延襃錫公之夫人贈魏國夫人張氏其祖禰與外王父皆秉國鈞爲天下華􅃾嗣子工部貟外郎行立銜恤無怙齊䘮中禮大凡四廟之支旁尊羣從烜爀昭融不可勝書至若質明光近沭浴盛服虛中以理嘉薦匪懈而無違心太橲沈齊馨香條鬯旣思其志意􅀂聞乎容聲洞洞乎屬屬乎有以見舉十倫而備百順昔素王之以戰則克以祭則受福其斯之謂乎司業悼手足之凋落感春秋以悽愴永懷明發俾篆斯文銘曰新廟有恤静深奕奕孝孫匪懈玄衮赤舄洪閥章章乃侯乃王漢􅁛扶陽唐有南康二十三葉沛然蕃昌四室崇崇斯焉享甞烈烈南康温良能斷謀猷樽爼文武楨榦汧岐之西祲沴銷散井絡之下天文昭煥撫封全歸冥寞德輝聿脩孝享家法無違以昭以穆以嗣以續和氣婉容苾芬烹熟子孫小大罔不祗肅神之聽之報以介福唐金紫光禄大夫守司空同中書門下平章事充太微宫使上柱國燕國公于公先廟碑銘并序權德輿國朝之制二品已上祠四廟三公品第一雖有始封亦不敢逾焉元和五年相國司空燕國公立新廟於京師蘭陵里司空公以文武偉才肆勤納忠外貞師律入作公相以平乎水土以調乎隂陽深惟祖禰尊尊之義昭穆親親之道乃圖廟食以永代德公姓于氏河南人七代祖謹後魏柱國大􅀅軍周太傅三老燕國文公六代祖寔周文左輔隋贈司空燕國安公五代祖象賢驃􅀐大􅀅軍㑹昌定公惟三葉有大勲力于北朝乞言而爲惇史體國以全至公四代祖益州郫縣令諱德威夫人京兆韋氏曽祖緜州顯武縣令諱玄範夫人北海唐氏王父贈刑部尚書諱汪夫人北海王氏烈考贈司空諱夐夫人邠國太夫人京兆韋氏凡宗廟之數郫縣爲初室顯武爲二室尚書爲三室司空爲親室其配各以夫人氏交神明之道也惟郫縣顯武遵道服儒廉退潔修且曰邴曼容陳仲弓吾之師也故仕不過六百石而以理效聞尚書沈冥善閉含道特立以處士燕居至于没身凡三追命至大司寇先司空廣大而靜黙㳟儉而好禮合二雅循四教推明理古之學貶絶非聖之書恬智交養􅀛頥不惑起家益州東陽主簿四徙官至寧州眞寧縣令又再轉至泗州司馬禄至卑而仁及物道未泰而志不懾公卿大夫之間尊有道而踈利權天寶末宰執擅朝惡其剛介不附已故官止郡佐而慶延身後朝興加恩亦三追命曰密州刺史吏部尚書以至于論道焉長子頗專良有士行終洋州司戸叅軍家子䪹貞幹強敏程功賦職歷戸部侍郎以公事貶泉州司戸贈楚州刺史㓜子頃吏理清明仕至長安縣尉司空公即第三子也英朗閎逹剛方博厚才可以扞大患學可以析羣疑彌綸中朝則尚書郎京邑廷尉皆有懿績惠綏外服則湖蘇虢陜二千石察廉克宣功化繇山南東道節度使平章事入覲居中䇿拜顯尊紹文公安公之爵地展盡志盡物之誠敬悽愴怵惕精明吉蠲詩云春秋匪懈享祀不忒司空當之矣又曰以妥以侑以介景福先公冝之矣又狀先公之行其大略曰孔宣父應聘歷國因而老于洙泗我先君宦學於天寶之年而操之者甫忠謂林甫國忠先君於無窮乎又曰小子不敏不通先君之大道不識先君之大行不肖之罪也􅀋是者千餘言其太史公自序之風可以論譔酌之祭器德輿外王母公之從母也故其門中風訓􅀗周知之忝備重任在公下列公以廟銘見授頓伏上聞尊嚴咫尺實奉靣命其傳信不敢曼辭銘曰燕文三老弼魏佐周安公定公亦播厥猷郫縣顯武一同丕矩尚書司空三命追崇義訓忠敎公台焜燿乃封故地乃建新廟新廟是冝羶薌告祠齊明盛服乃順乃時卑靜以正如親聽命求福不囬孝孫之慶刻銘斯碑以代承夷唐丞相贈太子太師崔公廟碑銘并序韓雲􅀸戊申歲六月尚書左僕射趙國公圎薨天子罷朝三日䘮禮贈賻加異常數詔贈太子太師謚曰某嗣子某遵荷先訓敦率舊禮五月而葬二十五月而祥始立廟洛邑曰考廟王考廟皆二丈有七從四尋衡八尋二戸立楹外垂四阿圬塓彩繪施以丹雘齋室爨室庭垣稱之連族氏纁躅清顯銘其德太師崔氏河東武城人也係于齊著于漢荷先少師之純孝温重稟受元和緯文經武爲國梁柱賊臣禄山憑犯河華玄宗順動南遊蜀漢公爲居守有扶掖再造之勲函洛阻絶人惟蠆毒肅宗振旅朔陲殱靜禍亂公爲宰衡有翊賛戡復之謀山越之難淮泗之疑􅌗勲盛業疇爲公比禮曰以勞定國則祀之能禦大災則祀之能捍大患則祀之是冝廟食以銘于鼎以某月之某日寢廟旣成庭除旣平備器㓗服儉而中禮先饗七日致齋具物水草陸産醴酪牲牷之備外盡物也色温行宛身屈意愉懼不及内盡志也禮卒奠撤齋莊之色如存焉歎息之音如聞焉君子曰吾觀崔氏之享有以知禘甞之義焉古者諸侯立五廟有鼎與樂有國之制侯伯有爵而無土廟有鼎祭樂不克立五廟而立三廟不銘于鼎而銘于碑其銘曰顯顯太師天孕鴻才恢張碩勲輝輝衡台惟昔姦兇飫息犯順當時無虞區宇駭震玄宗南巡功著巴岷肅宗戡復勲揚䇿牘銷殄氛祲宣明日月於惟大師誰􅀅比烈唐淮南節度使檢校尚書右僕射趙郡李公家廟碑銘梁柱賊臣禄山憑犯河華玄宗順動南遊蜀漢公爲居守有扶掖再造之勲函洛阻絶人惟蠆毒肅宗振旅朔陲殱靜禍亂公爲宰衡有翊賛戡復之謀山越之難淮泗之疑􅌗勲盛業疇爲公比禮曰以勞定國則祀之能禦大災則祀之能捍大患則祀之是冝廟食以銘于鼎以某月之某日寢廟旣成庭除旣平備器㓗服儉而中禮先饗七日致齋具物水草陸産醴酪牲牷之備外盡物也色温行宛身屈意愉懼不及内盡志也禮卒奠撤齋莊之色如存焉歎息之音如聞焉君子曰吾觀崔氏之享有以知禘甞之義焉古者諸侯立五廟有鼎與樂有國之制侯伯有爵而無土廟有鼎祭樂不克立五廟而立三廟不銘于鼎而銘于碑其銘曰顯顯太師天孕鴻才恢張碩勲輝輝衡台惟昔姦兇飫息犯順當時無虞區宇駭震玄宗南巡功著巴岷肅宗戡復勲揚䇿牘銷殄氛祲宣明日月於惟大師誰􅀅比烈唐淮南節度使檢校尚書右僕射趙郡李公家廟碑銘并序白居易王建侯侯建廟廟有器器有銘所以論譔先德明著後代或書干鼎或文于碑古今之通制也維開成某年某月某日宣武軍節度使檢校尚書右僕射汴州刺史上柱國賜紫金魚袋趙郡李公齋沭祗慄拜章上言請立先廟以奉常祀於是得請于天子承式于有司是歲某月某日經始于東都明年某月某日有事干新廟外盡其物内盡其志三獻百順神格禮成其友居易以李氏宗祖丗家名爵與僕射志行官業書于麗牲之碑謹按家略九代祖善權後魏譙郡守八代祖延觀徐梁二州刺史七代祖續某郡太守六代祖顯逹隋頴州刺史五代祖遷皇朝冝穀二州别駕贈德州刺史高祖孝􅀸右散騎常侍贈鄧州刺史曽祖府君諱敬玄緫章儀鳯間歷吏部侍郎同中書門下三品中書令弘文館大學士監修國史封趙國公謚曰文憲才智職業載在國史今祭于第一室以妣薊國夫人范陽盧氏配焉王父府君諱守一屬世難家故不求聞逹避榮樂道與時浮沈終成都府郫縣令祭于第二室以妣榮陽夫人鄭氏配焉先考府君諱晤歷金壇烏程晉陵三縣令府君爲人篤於家行飾以吏事動有常度居無惰容所蒞之邑有善政辭滿之日多遺愛不登貴位其命矣夫今祭于第三室以先妣上谷夫人范陽盧氏配焉府君累贈至尚書右僕射夫人累贈至上谷郡太夫人前後凢三追命六告第渥澤疊洽自葉流根從子貴也郫縣臮晉陵府君咸善積于躬道屈於位儲祉流慶而僕射生焉僕射名紳字公垂六歲丁晉陵府君憂孺慕號踊如成人禮九歲終制孝養上谷太夫人年雖㓜承順無違家雖貧甘旨無闕侍親之疾冠帯不解者三載餘可知也執親之䘮水􅄴不入口者五日餘可知也先是祖妣考妣晉陵府君前娶夫人斐氏無子早䘮洎叔父兄妹之殯咸未歸祔各處一方公在斬縗中親護九䘮匍匐萬里及期䘮事禮無闕違至誠感神有靈烏瑞芝之應事動鄕里名聞公􅀸言孝友者以爲表率憲宗嗣統三年李錡盜據京口公寓居無錫㑹擢第東歸錡聞公名署軄引用初詢以謀畫結舌不對次強以章檄絕筆不書誘之以厚利不從迫之以􅁋刑不動􅀅僇辱者數四就幽囚者七旬誠貫神明有死無二言名節者以爲準程朝廷嘉之拜右拾遺歲餘穆宗知公忠孝文行召入翰林特授司封貟外郎知制誥遷中書舎人承顔造􅂰知無不言獻替啓沃如石投水俄拜御史中丞戸部待郎旣而望屬台衡朝當晏駕時移世變遂出􅁺高要佐潯陽旋爲滁壽二州刺史大凡公之爲政也應用無方所居必化卧理二郡以去害爲先故有盜奔獸伏之感廉察浙右以分憂爲切故有䘏鄰活殍之惠尹正河洛以革弊爲急故有摘姦抉蠧之威文宗知公全才以汴難理乃授鈇鉞俾鎭綏之􅀄宣武師人驕強恨悍狃亂徼利積習生常公旣下車盡知情僞刑賞信惠合以爲用一年而下懲勸二年而下畏服三年而下恥格肅然丕變薰然大和撫之五年人俗歸厚至於捍大患禦大災卻飛蝗遏暴水致歲於豐稔免人於墊溺噫微公之力汴之民其爲殣乎其爲魚乎殊績尤課不可具舉天下征鎭淮海爲大非公作帥不足以長東諸侯制加銀青光禄大夫楊州長史淮南諸道節度觀察等使餘如故詔下之日岀次于外軍門不擊柝里巷無吠犬從容五日按節而東百姓三軍挈壺漿捧簟醪遮道攀餞者動以萬輩皆嗚咽流涕如嬰兒之别慈母焉噫􅀂非袴􅃭之惠及其㓜稚雞豚之養及其老艾推赤心置人腹中者則安能化暴戾之俗一至於此乎西人泣送東人歌迎梁楚千里風交化移膏􅀨景星所至􅀩福于時開成㑹昌之際上方致理公未登庸顒顒蒼生環望而巳盛矣哉大丈夫生於世也以忠貞奉乎君以義利惠乎人以黻冕貴乎身以宗廟顯乎親以孝敬交乎神冝其荷百禄輔一德爲有唐之宗臣者歟君子謂李氏之廟也休哉公之祭也順哉然曰有孫如此有子如此可謂孝也故其碑銘云祭祀從貴爵土有祑諸侯之廟一宫三室皇皇西室皇祖中書孝孫追逺昭穆有初顯顯中室王父郫令順孫祗享盡孝盡敬肅肅東室先考晉陵嗣子奉薦孝思蒸蒸嗣子其誰僕射公垂公垂翼翼齋嚴諒直爲子爲臣有典有則載膺休命載踐右職以孝肥家以忠肥國乃授侯伯纛鉞旂㦸乃饗祖禰姓牢黍稷家聲振耀國典襃飾六命徽章三世血食光大遺訓顯揚先德子孫承之垂􅁉無極唐宣武軍節度副大使檢校禮部尚書令狐公先廟碑銘并序劉禹錫今上元年七月十三日汴州刺史宣武軍節度副大使知節度事汴宋亳等州觀察處置使銀青光禄大夫檢校禮部尚書兼御史大夫上柱國彭陽縣開國伯令狐公西嚮拜章上言守臣楚􅀩􅀍恩澤列爲元侯得立家廟以奉常祀制書下其奏于有司於是善相考祥得地于京師通濟里居無何新廟成公以守藩故申命季弟監察御史定􅁲牲練日越八月丁亥祔饗三室塪墉以尚幽設幄以迎精禮無尤違神用寧謚第一室秦州上邽縣尉諱濬以妣太原王氏配第二室緜州昌化縣令贈吏部尚書諱崇亮以贈太原郡夫人河東柳氏配第三室太原府功曹􅂙軍贈司空諱承簡以妣贈魏國太夫人冨春孫氏配明年十月公由浚郊以介圭入覲眞拜戸部尚書進爵爲魯侯旣辭戎旃得以列侯謁三廟是歲南至上不視朝又得以時展祭先期致齋栗然以敬旣齋盡志歆然永思奉其百順陳以具物始躋而䖍恭終獻而汍瀾旣卒事顧麗牲之石冝有刋紀乃俾家老授其諜于所知云令狐􅀳邑也􅀳大夫魏顆以輔氏之功始封焉其易名文國語所謂令狐文子是也其先周文王之昭畢公高之裔畢萬爲晉􅀸始封于魏自萬至顆蓋四丗其後三十七丗藍田侯蚪仕拓魏爲燉煌郡太守子孫因家遂占數爲郡人藍田之孫熈在隋爲納言惟上邽府君納言之玄孫道克肖而位不至惟尚書府君西州之右族光未耀而德巳基惟司空府君志爲君子儒以經學居上第調􅀘安陽縣主簿歷平正縣尉汾州司法恭軍陜州大都督兵曹終于太原府首􅁺始以顓經進旣仕旁通百家愛穀梁子清而婉左丘明國語辯而工司馬遷史記文而不華咸手筆朱墨究其微旨愷悌以肥家信􅁩以急人德充齒耋獨享天爵故休祐集于身後徽章流乎佳城凡以子貴承澤降命書告第者始贈尚書祠部郎中再贈禮部尚書三加右僕射四進太保五爲上公先太夫人亦四從封􅁡印纍纍􅀖族聳慕生三子皆才彭陽爲嗣次子從端實肅給令爲檢校膳部郎中􅂙河東軍事季子前所謂爲監察御史今主柱下方書温敏而有文綽綽然眞令兄弟惟彭陽公以辭筆取科名翰飛叅侍從由博士主尚書牋奏典内外書命遂登樞衡言文章者以爲冠擁節揔戎率身和衆留惠于盟津變風于浚都言方略者以爲能夫浚師嚄唶難治乗釁􅀼發寖成習俗莅止五載飮和革心車馬來朝人皆隕涕問公還期觴必祝之留爲常伯旋命居守汴人聞公之東近而愈懐翹翹瞿瞿咸西其首言遺愛者可紀焉貴而率禮老而能慕怵惕乎霜露齋莊乎廟祧睦其季仲施及鄉黨言孝悌者歸厚焉勒銘于碑以代彜鼎文曰巳孤之孝莫如備物顯顯新廟四阿三室時惟仲月􅁲用柔日醆醴苾芬牲牷肥腯籩甒在堂蕭膋在庭孝孫蒸蒸恭若奉􅄹低簮委紳薦爼登鉶肹蠁交感流涕縁纓禮以備儀誠以致美祖考來格錫之休祉工祝告訖退循軒戺乃授風人作詩以紀猗歟彭陽之寵光佐憲皇西省東臺迭爲侍郎國之大柄咨爾平章敬宗凝旒俾鎭雍丘入爲地官今守東周彭陽之忠厚冝介福以壽東郊旣􅁵可復朝右緜緜其胄糸于周舊由我顯起必昌其後大和紀元作廟之首刻碑廟門龍集巳酉唐興元節度使王公先廟碑銘并序唐制五等有爵服而無山川登于三軍得立四廟備物崇祀以交神明敬先報本以輔孝治有國之令典也惟長慶三年前相國王公始卜廟于西京崇業里公時鎭劒南東川上章曰臣涯官秩印綬品俱第三請如式以奉宗廟制可是歲仲冬申命長男孟堅祔其主于三室明年公入爲御史大夫復以十一月躬行蒸祭間歲公岀梁州就拜司空禮崇異數廟加祀室大和二年増新室旣成祔顯考尊位告饗由禮觀之者以爲世程第一室上儀同幽州别駕府君諱元政以妣愽陵崔氏配第二室湖州安吉縣令贈尚書刑部貟外郞府君諱實以妣贈扶風縣太君馬氏配第三室朝散大夫青州司馬贈戸部侍郎府君諱祚以妣贈武威郡太夫人賈氏配第四室曰温州刺史贈太尉府君諱冕以妣贈魯國太夫人愽陵崔氏配初周王太子􅀳遇浮丘化爲神仙時人號曰王家其後遂以命氏顯于秦者曰翦三丗􅀅秦師子孫分居晉代間東漢有徴君霸霸孫甲亦號徴君徙居祁縣爲著姓故至干今爲太原人自漢渉魏益以熾昌凡十葉至後魏度支尚書廣陽侯冏廣陽有二子神念神感神念南奔梁神感北仕齊惟儀同府君廣陽侯五代孫也唐興于太原實從義旗佐成王業故有開府儀同之寵惟刑部府君以功臣子理二邑不躋貴仕故有錫羡後大之祥惟戸部府君㓜孤以孝聞于郷曲未冠以文售于有司由前進士􅀘延州臨安縣主簿㑹詔徴賢良䇿在甲科授瀛州饒陽尉歲滿遷渭南天后在神都而東畿差重遂由渭南轉河陽適建萬象神宫甸内吏分董其役因上書切諌繇是名益聞開元初以大理司直馳駋車聮讞太獄閩禺朔漠至止決平早以欒􅁄傷生晚成劇恙樂就夷曠故不至大官惟太尉府君生于治平時以文學自奮年十有五賁然從秋賦明年春昇名于司徒又一年玄宗御層樓發德音懸文辭政術科以置旄士府君䇿最高授太常寺太祝未幾復以能通道德南華沖虛三眞經進􅉦厔尉天寶中歷右拾遺左􅀘闕禮部司馬二貟外郎屬幽陵亂華遣兵南服因佐閩粤改檢校比部郎中行軍司馬時中原甫寧江南爲吉地二千石多用名德乃以府君牧温州朝廷虚公􅀸以侯高第及聞永嘉人輟春罷社薦紳閒以丕淑相弔焉雖位􅀒于道而邁德垂矩後之人得以纉承丕揚之其儲休啓祐有自云爾生三子皆聦明絕人長曰沼以神童仕至檢校禮部郎中次曰㓗以竒文仕至國子司業今代郡公實季子也早在文仕射䇿連中咸丗其家貞元中德宗聞其名自藍田縣召入禁中視草厥後三典書命再􅂙内庭憲宗器之付以國柄翊賛有道雖䇿免常居大寮今年自梁州請覲上思用舊臣爲羽儀遂領太常其公府如故以一心事六君顯官重務靡不揚歷且夫起諸生至三公而心愈卑道益廣出授黃鉞以臨諸侯入服華章以謁家廟追崇極大位血食備多室享全榮而奉昭薦嗚呼公侯之孝歟冝書廟器以視喬公之三鼎其辭曰閟宇神庭􅃉清而嚴上公之儀四室眈眈犠以㓗牲粢以大糦交神尚敬合魂尚氣子姪宗工駿奔奉事副笄侈􅃑儼恪居次孝孫兢兢執爵而升以祼以濯以伏以興水陸具來羶薌畢登列于圜方其氣増増乃礿乃甞敬而追逺二昭二穆孝以尊本瞻瞻几幄蹜蹜堂閫禮成起慕涕落玄衮濡露踐霜誰無永懷不如逹者哀與榮偕逢時􅁬庸誰不得位不如仁人以道爲貴惟公之逹兮名以顯親惟公之仁兮德以澡身六朝之清臣一代之全人冝其丗家翼翼振振罔不肅祗于廟門魏博節度觀察使沂國公田公先廟碑銘并序韓愈元和八年十一月壬子上命丞相元衡丞相吉甫丞相絳召太史尚書比部郎中韓愈至政事堂傳詔曰田弘正始有廟京師朕惟弘正先祖父厥心靡不嚮帝室訖不得施乃以敎付厥子維弘正銜訓事耐朝夕不怠以能迎天之休顯有丕功維父子繼忠孝予維寵嘉之是以命汝愈銘欽哉惟時臣愈承命悸恐明日詣東上閤門拜䟽辭謝不報退伏念昔者魯僖公能遵其祖伯禽之烈周天子實命其史臣克作爲駉駜泮閟之詩使聲于其廟以假魯靈今天子嘉田侯服父訓不違用康靜我國家蓋寵銘之所以休寧田氏之祖考而臣適執筆太史奉明命其可以辭謹按魏博節度使銀青光禄大夫檢校工部尚書魏州大都督府長史御史大夫沂國公田弘正北平盧龍人故爲魏博諸􅀅忠孝畏慎田季安卒其子㓜弱用故事代父人吏不附迎弘正於其家使領軍事弘正籍其軍之衆與六州之人還之朝廷悉除河北故事比諸州故得用爲帥巳而復贈其父故滄州刺史兵部尚書母夫人鄭氏梁國太夫人得立廟祭三代曽祖都水使者府君祭􅀄室祖安東司馬贈襄州刺史府君祭二室兵部府君祭東室其銘曰唐繼古帝海外臣制狎于太寧燕盜以驚羣黨相維河北失平號登元和大聖載營風揮日舒咸順指令嶪嶪魏土嬰兒戲兵吏伐愁毒莫保腰頸人曰田侯其德可􅀝叫譟奔趨乗門請起田侯攝事奉我天門束縛弓戈考校度程堤疆籍戸來復􅀖經帝欽良臣曰維錫予嗟我六州始復故􅀄告慶于宗以降命書旌節有韜豹尾神旗橐兠㦸纛以長魏師田侯稽首臣愚不肖逮兹有成祖考之教帝曰俞哉維汝忠孝予思乃父追秩夏􅀸媲德振賢梁國是榮田侯作廟相方視祉見于蓍􅀛祖考咸喜曁暨田侯兩有文武訖其外庸可作承輔咨汝田侯勿亟勿遟覲嚮式時祖考之思唐河陽軍節度使烏公先廟碑銘并序元和五年天子以盧從史始立議用師于􅁪乃隂與宼連夸謾兇驕岀不遜言其執巳來其四月中貴人承璀即誘而縛之其下皆甲以岀操兵趨譁牙門都􅀅烏公重胤當軍門叱曰天子有命從有賞敢違者斬於是士皆斂兵還營卒致從史京師壬辰詔用烏公爲銀青光禄大夫河陽軍節度使兼御史大夫封張掖郡􅄏國公居三年河陽稱治詔贈其父工部尚書且曰以其廟享即以其年營廟于京師崇化里軍佐􅀼議曰先公旣位常伯而先夫人無加命號名差卑於配不宜語聞詔贈先夫人劉氏沛國太夫人八年八月廟成三室同宇祀自左領軍衛而下作主于第乙巳升于廟烏氏著於春秋譜于丗本列於姓苑在莒者存在齊有餘枝鳴皆爲大夫秦有獲爲大官其後世之江南者家鄱陽處北者家張掖或入夷狄爲君長唐􅀄察爲左武衛大􅀅軍實張掖人其子曰令望爲左領軍衛大􅀅軍孫曰􅀩爲中郎􅀅是生贈尚書諱承洽字某烏氏自莒齊秦大夫以來皆以才力顯及武德巳來始以武功爲名􅀅家􅄏元中尚書管平盧先鋒軍屬破奚契丹從戰捺禄走可突干渤海上至馬都山吏民逃徙失業尚書領所部兵塞其道壍厚累石緜四百里深高皆三丈寇不得進民還其居歲罷運錢三千萬餘黒水室韋以騎五千來屬麾下􅁁威益張其後與耿仁智謀說史思明降思明復叛尚書與兄承恩謀殺之事發族夷尚書獨走免李光弼以聞詔拜冠軍􅀅軍守右威衛􅀅軍檢校殿中監封昌化郡王石嶺軍使積粟勵兵出入耕戰以疾去職貞元十一年二月丁巳薨于華隂告平里年􅀂干即葬於其地二子大夫爲長季曰重元爲某官銘曰烏氏在唐有家於初左武左領二祖紹居中郎少卑屬干尚書不償其勞乃相大夫授我戎節制有疆墟備禮登壇以有宗廟作廟天都以致其孝右祖左孫奚饗其報云誰無子其有無孫光對無羞乃惟有人昔命平盧爲艱爲瘁大夫承之危不棄義四方其平士有迨息來覲來齋以饋黍稷重校正唐文粹卷第六十嘉靖甲申歲太學生姑蘇徐焴文明刻于家塾
