  - {type: variant, offset: 7726, length: 0, content: '', WYG: 欽定四庫全書唐文粹巻四十宋姚鉉編議乙摠一十三首明堂五明堂議孔穎逹同前議魏徵同前議顔師古大享議馮宗明堂告朔議王慶雅樂三三朝行禮樂制議杜佑三朝上夀有樂議徹食宜有樂議車服二朝服乘車議劉子𤣥公卿已下冕服議楊炯刑辟三請禁私鑄錢議劉秩復讐議韓愈駮復讐議柳宗元明堂議孔穎達臣伏尋前勑依禮部尚書劉伯莊等議以為從崐崘道上層祭天又尋後勑云為左右閣道登樓設祭臣檢六藝羣書百家諸史皆未聞臺觀重樓之上而有堂名孝經云宗祀文王於明堂不云明樓明觀其宜一也又明堂法天聖王示儉或有翦蒿為柱葺茅作蓋雖復古今興制不可恒然猶依大典徴於朴素是以席惟稾鞂器上陶匏用絸栗以貴誠服大裘以訓儉今若飛樓架逈綺閣凌雲考古之文實堪疑慮按郊祀志漢武明堂之制四面無壁上覆以茅祀五帝於上座祀后土於下防臣以上座正謂臺上下防惟是臺下即云無四壁未審伯莊如何上層祭神下有五室且漢武所為多用方士之説違經背正不可師祖又盧寛等議云上層祭天下堂布政欲使人神位别事不相干臣以古者敬重大事與接神相似以朝覲祭祀皆在廟堂豈有樓上祭祖樓下視朝閣道昇樓路便窄隘乗輦相儀接神不敬歩往則勞曵聖躬侍衛在傍百司供奉求之典誥全無此理臣非敢固執愚見以求巳長伏以國之大典不可不慎乞以臣言下羣臣詳議同前議魏徴明堂之作其所由來逺矣爰自軒唐逮乎秦漢有損有益或異或同記述參差莫能詳究今稽諸詁訓㕘以舊圖其上圓下方複廟重屋百慮一致異軫同歸洎當塗膺籙未遑斯禮典午聿興無所取則裴頠以諸儒持論異端螽起是非舛互靡所適從遂乃以人廢言止為一殿宋齊即仍其舊梁陳遵而不改雖嚴配有所祭享不匱求之典則道實未𢎞何者夏禹哲王致美於祭服周公大孝備物於宗祀聖人之教夫豈徒哉然則身處卑宫神居重屋斯豈苟求壮麗崇餙華侈固亦致之尊親之道因髙事大之義求其逺趣非無深㫖盖以神本虚𤣥無聲無臭視之不見聽之不聞既杳冥而莫測故廣袤之度罔知夫孝因心生禮縁情立心不可極故備物以表其誠情無以盡故餙宫以致其敬宣尼美意其在兹乎自五帝迄今代有損益宫室制度每越舊章重屋規模獨虧前典文祖過土階之險世室踰卑宫之陋配天致極理必未安伏惟陛下以上聖之英靈承皇天之眷命一六合而光宅得萬國之懽心九譯之貢既陳明堂之位仍闕永言殷薦誠感自中臣等親奉徳音令㕘大議思竭塵露微增山海凡聖人有作義重隨時萬物斯覩事資通變若據葵邕之説則至理失於文繁若依裴頠所為則大體又傷於質略求之情理未允厥中今之所議非無用捨請為五室重屋上圓下方既體有則象又事多故實下室備布政之居上堂為祭天之所人神不雜禮亦宜之其髙下廣袤之規几筵尺丈之制則並隨時立法因事制宜自我而作何必師古廓千載之疑議為百王之懿範不使㤗山之下惟聞黄帝之法汶水之上獨稱漢武之圖則通乎神明庶幾可俟子來經始成之不日謹議同前議顔師古明堂之制爰自古昔求之簡牘全文莫覩肇起黄帝降及有虞彌歴夏殷迄于周代各立名號别創規摹衆説舛駮互執所見巨儒碩學莫有詳通斐然成章不知裁斷究其指要實布政之宫也徒以戰國縱衡典籍廢棄暴秦酷烈經禮湮亡今之所存傳記雜説用為凖的實亦蕪昧然周書之叙明堂紀其四面則有應門雉門據此一塗固是王者之常居耳其青陽總章𤣥堂太廟及左个右个與四時之次相同則路寢之義足為明證又文王居明堂篇載帶以弓韣禮于髙禖九門磔攘以禦疾疫置梁除道以利農夫令國為猶以合三族凡此等事皆合月令之文觀其所為皆在路寢者也戴禮云昔周公朝諸侯於明堂之位天子負斧扆南嚮而立明堂者明諸侯之尊卑也周官又云周人明堂度九尺之筵東西九筵堂一筵據其制度即大寢也尸子亦曰黄帝曰合宫有虞氏曰總章殷曰陽館周曰明堂斯皆路寢之徴知非别處大戴所説初有近郊之言復稱文王之廟進退無據自為矛盾原夫負扆受朝常居出令既在臯庫之内亦何云於郊野哉孝經傳云在國之陽又無里數漢武有懐創造詢於搢紳言論紛然終無定據乃立於汶水之上而宗祀焉明其不拘逺近亦無方面孝成之代表行城南雖有其文厥功靡立平帝元始四年大議營創孔牢等乃以為明堂辟雍太學其實一也而有三名金裒等又稱經傳無文不能分别同異中興之後蔡邕作論復云明堂太廟一物二名鄭𤣥則云在國之陽三里之外淳于澄又云三里之外七里之内丙巳之地穎容釋例亦云明堂太廟凡有八名其體一也苟立同異竟為巧説並出自胷懐曽無師祖審夫功成作樂治定制禮草創從宜質文遞變旌旗冠冕今古不同律度權衡前後不一隨時之義斷可知矣聖上大啓崇基光膺寳運功髙開闢之後徳邁䆳古之初鳳紀龍官譬畎澮於溟渤隨山練石慙培塿於方壺大樂與天地同和豈奏曩時之韶夏大禮與天地同節寧踵前代之膠庠天縱多能睿哲𤣥覽總五行之秀氣抱六藝之菁華秩宗茂典皆取必於宸極共工妙術咸禀訓於深衷隠顯無遺洪纎必應百神受職萬物斯覩將建明堂爰降絲綸規矩之度乆巳蓄於聖懐逺近之宜實不惑於僉議假使}
