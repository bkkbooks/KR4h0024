後五行掌空白七葉後一字三行玉王九行什顧校十作仆行係系墻罽檀羅十三行征徑八葉前九行徙死卷第六十一葉前十二行節度使無使後一字行夷無此十三字行洛洺二葉前十二行含合三葉後三行文大四葉後十一行曰無此字皆無此六葉前十字一行注斐裴十三行誠諴後十一行恨很七葉前四行簟簞九葉後二行拜無此十葉前字五行太大十行員無此字卷第六十一一葉前六行梁肅上有並字在後十心印銘下行朝無此字卷第六十二一葉前四行釋二無此二葉後二字十三行善喜九葉後三行跌趺十葉前七行憬宋本避諱作下同卷第六十三一葉前五行鏡宋本避諱缺八末筆下同行太大二葉前四行曰日六葉十四行嚴顧校作莊七葉前六行代顧校八葉前作伐十三行字宇九葉後七行迨殆十葉前五行詢顧校作詣前八行遘顧校後四作遇行竟宋本避諱缺末筆下同卷第六十四一葉前四行釋四無此七二字行牛頭下有二葉前山字十行賑廟校後八作診行櫳櫬五葉前三行慧信六葉前六行曲空白後十四行至一字七葉前一行寓今爲泉州人孩提秀發博究書術一旦寓作亂無今後五爲等十五字行潁顧校八葉前作熲一二行虛往實歸皆悅義味知性無量於無量中以習氣所無此二十字七行藏蕆十葉後十四行龔下有十一葉前去字五六行法無所攝觸境皆如豈在多歧以泥學者無此十六字喫㖃顧校作十四詬行性空白十二一字葉後十四行儉儉卷第六十五一葉前四行釋下有九道字行道四無此後八二字行先光三葉前二行語說言也無此十一二字行而來者有摩尼焉大秦焉秋神焉合天下三夷無此十後八八字行相土有顧校無此三字上顧校四葉前作土三行宜疑十二行昭照五葉前十四行氷水後四行葉乘九行邃途六葉後五行惠顧校十葉作慧前五行迴迥後四行絹顧校十二葉作繕五行淸顧校後七作情行古顧校十三葉前作占十一行末未十五葉後十一行明冥卷第六十六二葉後十行畫晝三葉後四行牒諜四葉後一行春舂四行返反九行谿蹊五葉後七行旋見顧校作十二從皃行山岀萬山上有十四有字行氤氤六葉前九行仰顧校十四作抑行主王七葉前十二行坑八葉前五行北地十三行蕩簜後八行刃顧校九作刀行不稔顧校作九葉前千稔四行兾異卷第六十七一葉後二行公翁十行穎潁二葉前十行其事歟無此後一三字行卼􅑶二行明夷于顧校作十一昭夷子行有又三葉前十四行此也上有四葉前如字三行凾顧校作亟後三四行殫驅驅空白十四三字行節空白五葉前一字一行像空白二一字行人空白一字三行北顧校後六作此行其體妙空白二字顧校作鍾乎鍾其幾無其九字行令得令德六葉後十二行德得七葉後三行熣燦顧校作八葉前㸌穫禾火十一行鐵顧校後三作行勑河北道推勾租庸兼復囚使判官無此十四字三四空白約十字行河東無此二五字行並顧校九葉前作茲九行座顧校十葉前作崖七行不如意顧校作十一葉十如意前四行貞宋本避諱缺末筆下同卷第六十八一葉前十一行奇章公下有牛後十公二字二行里顧校二葉後作理八行慮虜四葉前六行尢顧校十一作先行令今五葉後一行政顧校六葉後作征五行和知七葉後一行讓宋本避諱缺末後二筆下同行敬宋字避諱缺九葉後末筆下同八行擣顧校十葉前作搏十一行在顧校作左十一葉後二行獨燭三行揭顧校十二葉作楬前六行永顧校十五葉前作宋十二行附祔卷第六十九二葉後八行宴間大三葉後閒一行韓顧校五葉後作諱二行楊陽八葉前四行其後以博學宏詞授集賢殿正字無此十十三三行行直足後三行親在堂顧校重九葉前親字一行章顧校前七作意行涿可八行終始始後四終行瑞端十葉前一行推惟前八行里理十二葉前五行大易書八易行於心顧校作十無心二行魯山今顧校作十三葉魯山令前四行無身顧校作元身卷第七十一葉前十行東武顧校作十四武東行可無此三葉前字十一行於顧校四葉後作與九行時降時字十二空白行胠空白六葉前一字九行太大十四行天紀絕後六七行南山四君遭漢天子固亦商丘之遺壤兮無此十六字卷第七十一一葉後十一行志智二葉前二行受授五葉後八行蔭下有所襟切六葉後三字小注五行走顧校作八葉後我九行子顧校十四作予行京兆韋長文不另行與上文連接九每人空半字或一字葉前九行假遐卷第七十二二葉後十一行忿分十三行涶唾十四行省院省四葉前牓八行行刑五葉前四行授顧校六作受行俊顧校六葉前作畯十二行光顧校七葉後作先八行丙景九行藉籍八葉後六行顧校九葉前作榎八行充克後十三行感顧校作惑卷第七十三二葉後七行王襃下空白三葉後一字十一行疆彊五葉前九行美事七葉後四行觀覽覽八葉前觀十一行盧廬九葉後八行今無此字卷第七十四一葉前三行丁書附空此後五三字行萬石二字十一空白行晏宴二葉前七行映差空白八二字行極樞十一行鬱空白三葉後一字三行屢屨五葉前七行洌冽六葉前一行蔽八葉前三行可何八行鉂缺十行子其子一後七其行餘送十行某其十一行洪君曾是洪若十葉前曾君三行旋放後五行樂落倉箴前空十三一行行波陂八葉後十三行然上有十一葉若字後八行桓宋本避諱缺末筆十三葉前十一行問之上有後六而字行爾形惟猨銘辭上空二格每句空二字卷第七十九二葉後七行閣下二字三葉前旁書十四行士土六葉前一行未夫後十二行勇空白八一字葉後七行經諱經十葉前緯十一行一空白半字卷第八十二葉前五行腹空白三葉前一字十三行禎雙行寫御名二五葉前字後一行同十三行一空白十二半字葉前一行死曰空白二二字行某空白九一字行㳂空白後八一字行輦軍十五葉前十二行孑子卷第八十一二葉前十四行睢夸眭三葉後夸十四行官宮五葉後十一行准準六葉前六行誥告後一行研妍卷第八十二一葉後六行聞也故書之所傳聞異同此夫子之所無此十四葉五字前十三行華覆華五葉後覈四行傳博下六葉後同十一行穎潁八葉後一行志至二行不宜無宜十字行以行九葉後一行勉人勉他十一葉人前八行濟之子濟無下濟字十行太守鄭下空兩格遵導山中無中十一字行甄生甄十四逢行安國觀後四國行仁人後十行闕而無闕十二葉前字十一行瘖喑卷第八十三三葉前七行勉彊彊五葉後勉三行注余除九葉後八行故自貞宋本存半九字不可知行羣僚羣下空十一葉白一字後二行侍者此二字十三葉側書前二行觸觸觸受三觸受行愛愛緣無此十一三字行啓咨後十一行樸璞十四葉前六行盧廬十三行則不必服無則服後一二字行不然無不字卷第八十四二葉後四行喪祝六葉後十一行擬礙七葉前三行不可可後十不二行據劇八葉前七行讚鑚九行與相十與行相扶扶口卷第八十五五葉前八行大小小七葉前大七行原園九葉前二行充允十葉後十三行閒齒髪尙壯閒作聞十一葉前尙作甚四五行芻蕪塵三字空白卷第八十六六葉後一行有文上有七葉前固字十二行傳傅前十三行仍敍仍九葉後叔三行亟拜亟問承拜承問卷第八十七二葉後十一行廓廊三葉後八行垢宋本避諱五葉前作下同八行闕門也能無此二字九行制製後九行十行勸適遺之屈聳適遺之辱則如無勸無聳也無此十六葉後七字六行熟孰七葉前十三行富貴無貴後四字五行上之無此二字八葉前八行揆幸後六行其無此八字行亦不卷第八十八三葉前十四行戸七葉後五行未徵夫九葉前貞三行祇抵十一行許十葉後十行艴然色然卷第八十九二葉前九行五九七葉後三行行下有八葉前道字十一行自於十葉後十行忂衢卷第九十五葉前十二行夏口無口八葉後字一行而能吾十葉後能四行劒之鍔不另行與上文連接十三行疆彊卷第九十一一葉後一行文集序無文字三葉前下同五行子予五葉前六行搽茶後四行隨空白一十一字行敍空白七葉後一字五行服伏九葉後六行夢得空白十一葉二字後二行刃刀卷第九十二二葉後十三行無召册五葉後召十一行十一九卷第九十三一葉前六行詩序詩集後二序行唐容州題前有後五葉後序二字十行未顧校六作末葉前八行史吏十葉前十行注上聲空白十三葉一格後四行愚觀無愚後五字行詩人詩上空十三一格行不未十四葉前三行君子之顧校無之字卷第九十四一葉前六行琴一無此後六二字行而減空白十三二字行秋交蝕空白二葉後三字四行釐空白三葉前一字一行梧空白二一字行疆空白十一字行傷性無傷六葉後字一行􅥬翫卷第九十五一葉前五行珂軻五葉前一行二子季字兼七葉後二格七行孔子者不重孔九子二字葉後十三十四行挈而導之懼邪小之逆陷也無此十十一葉一字前九行祠卷第九十六一葉後十二行紘絺巾二葉前二行敝敞五行牢字下七同行湖潮三葉前五行余餘六行則惟後七行雲雪四葉後二行上天垂光此詩五葉前另行十二行時特中士後十行十二七十四行能詩無詩六葉前字三行綴其綴其下四行解能九行益切無切字劉侯無侯九行字十行益忌之劉與侯皆已賦十餘韻彌明應之如響皆穎脫含譏諷無此二十四字思竭不能續無此十一五字行世人下有能十二岀二字行岀書十三行書無此字不已無不後三字行不解不能解何書無此四三字行座坐六行日已上下有出七驚二字行到門無此二字覓無有也覓之無八有見矣行間無此十字行巧妙十一行足安十二行安足似若十三行凍東十四行閉間植値七葉前三行此在十一行注並彌明所作並是彌後五明作也行桂摶八葉前四行咸謂或後五行奇靡其於無此十四四字行注太眞兄太沖以去歲登科無此九葉前十字一行京有前六行余餘前七行者無此前十字四行忛帆後十二行所之十葉前四行盤之中此歌另行沿湘後九行羅泳永羅十一葉後七行湘川狺狺此詩十二葉前另行十二行丈夫子無子十四字行雞山小十三葉雞後三行三二後六行娥蛾卷第九十七一葉後十一行疇醻二葉前九行聞焉聞三葉前者八行于乎十四行選善誓遷善四葉前七行岀於出其環其環後九於行荒尋尋五葉前荒五行耳無此前八字行激徼十二行悵帳後十三行而放爲六葉前放十一行七九後三行㙯藝六行若苦七葉後十四行神形九葉前七行然焉八行鏡境後四行過不飮過至不飮者五行去者無此七二字行痞痁卷第九十八一葉後三行徹澈九行暴空白二葉前一字二行壺閫後三行才材十行聞問三葉前十三行離騷騷後八離行蒼滄四葉前九行姿恣後六行迓顧校十作訊四行東都顧校不重五葉後東都二字十三行舩顧校空六葉前白一字六行以樂無此八葉前二字十二行以娛顧校作後八有娛行書則九葉前書十行序顧校空後十白一字二行漫汗汗十漫一葉後一行周遊遊三周行浮屠顧校作五浮圖行從顧校八作徒行江河河九江行之也無之十二葉字前七行以比下有九於字行麟鳳鳳麟猶由朝冠無此二字卷第九十九一葉前七行讀韓愈所作毛穎傳下有十一附字行女婦二葉後七行都郭三葉前七行嘗常十行摹謨後七行來始始四葉前來四行若是無是後字十四行其無此五葉前字十行造迨後四行太史公曰不另行與六葉前上文連接十二行贊曰不另行與十三上文連接行盻眄後十行在存七葉前一行偘傷不重二偘字行小邑下有四也字行相與上有十二途字行贊曰不另行與上九葉前文連接下同三行嘔歐後二行四七十葉前九行帥率十一葉前十一行天本十二行故其重一十故字四行天本後一行不抑上有四吾字行疎密密五疎行哉矣九行不得下有日字十一行傳其事上有故字也無此字後十四行州人無此十二葉二字前一行大駭無大前七字行吾妻不重吾十二妻二字行則廁卷第一百一葉前十二行齊魯二生下有程驤二葉前劉叉四字十三行城成三葉後六行搏摶後十四行搏顧校四葉後作摶八行聚叢五葉前二行注所爲無所六葉前字六行不大亂顧校不字空白後三一字行裂裳衣瘡顧校作裂十二衣裹瘡行如加七葉前十二行卦封九葉前三行䏧顧校作陊後序一葉前十行殿中另提行昌言此二字小字江校宋本卷末有校正銜名十四行今附錄於左臨安府今重行開雕唐文粹壹部計貳拾策已委官校正訖紹興九年正月日右文林郞臨安府觀察推官林㦂左承直郎寧海軍節度推官周公才右承直郞臨安府觀察判官蘇彥忠監雕左從事郞浙西安撫司准備差遣劉嶸重校左從事郞臨安府府學教授陳之淵重校右承奉郎特添差簽書寧海軍節度判官㕔公事王遜左承事郎添差臨安府府學教授周孚先重校右朝散大夫簽書寧海軍節度判官㕔公事梁宏祖左宣義郞通判臨安軍府事朱敦儒右朝散大夫通判臨安軍府事王榕右朝議大夫充徽猷閣待制知臨安軍府事兩浙西路安撫使馬步軍都總管張澄是書初板用烏程蔣氏密韵樓藏元覆宋小字本影印板頗漫漶讀者病焉後收得明嘉靖徐焴刻本淸朗悅目汪序云徐生嗜古博藏其刻是集躬自監視一字一畫弗稱必更之其精審可知此本先經吳縣江鐵君據黃氏士禮居所藏宋紹興翻雕北宋本校錄至極精細戊辰夏五本館又假得罟里瞿氏所藏徐本爲顧千里用孫古雲家殘宋本校過者闕卷十六至十九之上又五十九至六十二又七十三至九十七取對江校又增岀若干字滄海遺珠彌足珍貴因成校勘記一卷以江校宋本爲主凡不注何本者均江校宋本也顧氏校宋則注顧校作某以醒眉目惟江顧二氏校本悉照宋本勾勒行款毎卷總目如古賦等均在第一行卷第幾下並附注總幾首等字子目如聖德失道等均在題上頂格側行小字注與徐刊款式不同舉例于此不錄入校記此外江顧二家僅校正字畫無關宏旨者亦從其略迻錄旣畢爰誌數語於後己巳仲春閩縣林志烜識
