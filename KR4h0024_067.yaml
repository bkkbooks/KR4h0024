body:
  text: 吳興姚鉉纂銘乙碣頌附揔一十五首高道二昭夷子趙氏碣頌陳子昻東明張先生銘柳宗元忠孝二文貞公笏銘孫樵孝門銘柳宗元暴虐二佷石銘皇甫湜銘秦坑司空圖浮圖四洪州大雲寺鍾銘獨孤及鹿泉本願寺鍾銘化成寺大鍾銘李白溫州仙巖寺銘司空圖橋梁二石橋銘張嘉貞石橋銘張或宅一丹崖公宅銘元結井一井銘柳宗元冡一文冡銘劉蛻昭夷子趙氏碣頌并序陳子昻昭夷諱元字貞固汲人也本居河間為大儒至祖掞尤博雅明道隋徴八學士與同郡劉焯俱至京師補黎陽郡長始居汲焉有二子禮輿禮轅輿官至臨穎縣丞轅為校書郎並著名當代昭夷即禮輿之季子也元精沖懿有英雄之姿學不常師志在遐逺年二十七褐衣遊洛陽天下名流翕然宗仰羣蒙以初筮求我昭夷以玄轂發機故蓬居窮巷軒冕結轍時世議迫厄不容其高乃屈身泥蟠求祿下位為幽州冝祿縣尉到職逾歲默然無言唯採藥彈琴詠堯舜而巳州將郡守穆然承風君之道標浩如也因巡田入隴山見烏支丹穴密有濳遁之意蒼龍丙申歲在大梁遭命不造發痟疾而卒年三十九嗚呼哀哉天下士友聞之知與不知莫不為之垂涕蓋傷其有濟世之量而無長世之年夫上德道全器無不順中庸以降才則好偏有張也之莊無展也之道好由也之勇𬗟回也之仁侈宰豫之言遺淡臺之行務端木之智忘寧武之愚或正而不竒或達而過雜君獨五味足六氣和通衆賢之不兼暢羣才之大適雖不至於道其殆庶幾乎故時無間言物飽其義吾常論人事有十君得其九一不至者命矣夫於戲名聞天下而不達於堂上智周萬物而不適乎一人其時歟其事歟君同人雲居沙門釋法成嵩山道士河內司馬子微終南山人范陽盧藏用御史中丞巨鹿魏元忠監察御史吳郡陸餘慶秦州長史平昌孟詵雍州司功太原王適洛州參軍西河宋之問安定主簿博陵崔璩咸痛君中夭鼎飪不實百代祀德故老或云以為名者德之表諡者行之迹君囊括世道位屯時艱困乎臲卼光景不矅乃共稽騭舊行考諡定名問于元蓍象曰明夷于昭夷昔歎曰才位不兼大運有數嘗哀時命而作頌云諸公以豫從君之遊最久故秉翰參議其頌曰天道宏運兮物各有時匪時不生匪運不成昔者元精汨潏陽九滔災大人感生堯禹恢能隂陽既和玄帝傳家五百數終桀鷔暴邪子乙提運水火革明匪賢不昌尹乃阿衡六百運徂受始淫狂西伯考元曆在聖昌匪雄不決匪謀不臧薑牙皓眉實逢其良投劒指麾奄有八荒周有天下七百餘年太公之後不聞大賢豈無仲尼負道周旋無勢一挈無土一㕓然則大運之所來時哉時哉隘業隘運巨功巨德苟非其時草木為伍昭夷作頌云示有嘗著汲人嚜記言變化之事且曰請爾靈龜永宴息乎浩𥘉東明張先生銘并序柳宗元東明先生張氏曰因嘗有以文薦於天子天子策試甚高以為長安尉一年投去印綬願為黃老術詔許之居東明觀三十餘年受畢法道行峻異得衆真祕書訣籙聚經籍圖史侔於麟閣以弟回降秩封州先生曰吾老矣支體不可解也遂從以去明年回之子襲死哭之慟遂病既亟以命回曰吾生天寶訖貞元巳酉歲十月今死于汝之手盈吾志矣京師吾生也畢原先人之歸也必以返葬乃自為志而卒明年正月某日葬如其言子某等為碑以志于墓辭曰匪祿而康匪爵而榮漠焉以虛充焉以盈言而不為華光而不為榮名介潔而周流道包涵而清寧幽觀其形與化相冥寂寞以成其道是以勿嬰世皆狂狂奔利死名我獨浩浩端一以生或曰先生友悌以遁慈幼以死若不能忘情者何也吾曰道去友邪去慈邪從容以求其得之邪蕩莽狠幸道之非邪且夫虧恩壞禮枯稿憔悴隳聖圖壽離中就異欻然與神鬼為偶頑然以木石為類空侗而不實窮老而無死先生之道固知異夫此也乃書千石以紀文貞公笏銘并序孫樵大中六年詔出文貞公笏歸其孫丞相謨孫樵請銘其笏曰靈豸薦角比干獻骨合以憤烈在公為笏怒虎可唾笏不可挫太華可裂笏不可折柱天不庂指日不蝕標儀條臆起梗開直噫諌舌切切上磨帝缺不逆不怫笏則公笏緊拱折列諍舌不發膠榮領餗下偷上愎非公之節孰為公笏壽州安豐縣孝門銘并壽州刺史表柳宗元懿厥孝思兹惟淑靈稟承粹和篤守天經泣侍嬴疾默禱隱冥引刃自嚮殘肌敗形羞膳奉進憂勞孝誠惟時高高曽不是聽創巨痛仍號于穹旻捧土濡涕頓首成墳陷膺腐眥寒暑在廬草木悴死鳥獸踟蹰殊類異族亦相其哀肇有二位孝道爰興克修厥猷載籍是登在帝有虞以孝蒸蒸仲尼述經以教于曽惟昔魯侯見命夷宫亦有考叔悟莊稱純顯顯李氏實與之倫哀嗟道路涕慕里鄰邦伯章奏稽首殷勤上動帝心旁達明神神錫祕祉三秀靈泉帝命荐嘉亦表其門統合上下交贊天人建此碑號億齡揚芬壽州刺史臣承思言九月丁亥安豐縣令臣某上所部編戶氓李興父被惡疾歲月就函興自刃股肉假託饋獻其父老病巳不能啖啜經宿而死興號呼撫臆口鼻垂血捧土就墳霑漬涕洟遂於墳左作小廬蒙以苫茨伏匿其中扶服頓踊晝夜哭訴孝誠幽達神為見異廬上産紫芝白芝二本各長一寸廬中醴泉涌出竒形瑞狀應驗圖記此皆陛下孝理神化隂中其心而克致斯事謹桉興匹庶賤陋循習淺下性非文字所導生與耒耨為業而能鍾彼醇孝超出古烈天意神道猶錫瑞物以表殊異伏惟陛下有唐堯如天如神之德冝加旌褒合于上下請表其里閭刻石明白宣延風美觀示後祀永永無極臣昧死上請佷石銘皇甫湜佷石蒼蒼驪山之傍鑱朴礲瘢嶷然四方昔秦皇帝謀之不臧七十萬人兹焉惶惶發石此山言礎於墳若有慿依屹住中逵淫刑蹙迫人力無施故老相傳以佷名之自昔太古不封不樹有葛於溝有薪於野後聖有作緣情不忍為之棺槨其在唐虞則維􅑆木噫嘻暴秦虐用其人墳而象山下錮三泉窮珍揔竒力瘁財殫驅驅而前如刈草菅天毒其哀神憤其凶謫戍一呼九州風從白挺荆棘指麾崤潼險阻不闔干戈倒鋒尸露于劫燧燔于童逢顆無依不十年中禹葬會稽不改其行聖德洋洋厥響久長至于漢劉釋之而言中如可欲猶隙南山矧私其身以盡其人刻詞佷石炯戒千春銘秦坑司空圖秦術戻儒厥民斯酷秦儒既坑厥祀隨覆天復儒讎儒祀而家秦坑儒邪儒坑秦邪洪州大雲寺鍾銘獨孤及參變化孕律吕和神人莫疾於聲故天地以雷震萬物聖人以樂節八風佛土以鍾警六時天造聖作同符異貫自真乘開設其輪三轉像教不墜而法鼓之制存􅊮􅊮蓮宫于江之濵萬井在其前善惡興乎人將欲誕敷我法音啓迪我善根我是以作萬鈞之鍾大其器所以昭其度也侯誰尸之長者杜海洎北方上士精法觀釋法鸞與比丘衆百三十有五人實果其願將辦所作于時火官金工循厥戒令範隂陽九六之數以合造化均薄厚侈弇之齊以諧淸濁聚精會神鳩工於其間弘誓既逺昏疑皆破故衆心如城施者成市大悲之感與萬靈接祝融回祿髣佛交應越五月辛丑新鍾成於是此邦民大和會膜拜縱觀川塞衢隘億兆諦聽鯨魚乃發訇然如扶搖號而萬竅怒霹靂作而崇山破在坑滿坑在谷滿谷金界岌峇若震若蕩既而拗怒散渙與回飇俱激度越大千周流六虛經于嚴城入于𣑽宫徘徊乎霜天凌厲乎淸夜千門徹萬戶警魚龍皆奮蟲豸不蟄於是聆其音者貪騃遷善聾盲知方識浪安流地獄淸涼吒王解形刀輪摧藏嚴乎心者聞聲以知受觀受以悟法若露淸耳根鏡照身業彼金鼓聲氣木鐸徇路整衆孚號方斯陋矣蓋聖人弘道以觀善因善以建法作法器以為天下利利者教之果法者教之因善者教之宗我鍾乃懸是訓是崇世界有極大音無窮鹿泉本願寺銅鍾銘八音之列數者金為長金聲之動物者鍾為大相彼創制本乎無心隨輕重之所考遇洪纎而必應其體妙乎其幾神乎故帝庭用之以和樂𣑽宇作之而助道其有旨哉伊夲願道場昔鬼土所卜即輪王建塔之地有隋氏因而緝焉皇唐統天增壯厥構雖臺殿有赫而鍾簴未雄曰都維那某等顯允令得鬱為紀綱洞三學之奧府張二嚴之巨翼以為是聲聞則有以敷衆美不則無以遍十方乃同寅叶恭唱議改作我心匪石彼應如雲緇流輔仁而或勤或懋清信委施而為岡為陵於是乎逺貿精金博召艮冶鳧氏宰陶人翼鎔範修林朴植火正叱吒以啓號風師閲怒而陳力巨扇咆哮洪爐赫曦焮奪清夜光連紫微旁通竇以決注下濳成於數圍察夫隂未凝陽為烈爙爆泉沸氣憤雲泄既旬而後實既堅而後發轉於隧漸於堂混乎其輪圎洞然而博暢仙獸勒於下驪龍踏於上蓄精誠含寥亮乃神工之既濟而寶器之大壯也且夫作有度而體有經侈奄均厚薄中則不播不石不鬱不柞雖鴻音未揚識者已知其妙矣故緇衆咸躍善願克充而縣之衣冠里之髦彥聚捨珍玩翕營層臺峻嶒百常沆瀣一色然後插雲柱倚天梯駢轆轤綰修索攢㔣力以下拔軋豐容而上升雄以筍鱗顚以交扛猛以簴權作以離立大器斯屬洪椎乃鏗威音潼溶而一吼虓響岌嶪乎三界上極有頂下彌空輪飛行天仙海陸神識莫不警革塵滯褰開冥蒙滌曠劫之瑕滅長夜之苦使浩福濳潤冥機坐融其諸佛神通之用乎不然者千鈞之聲一杵之播則曷以臻於是矣允釐僧務本三勢而克終式遏劒輪後四爰而長擊故初起細而促漸登鍠以舒既鋭而入微又增而復壯於是壯也乃而畢為若是者何皆皇覺啓導抑揚之深思也實欲普其念周乎仁張皇慈音引曵悲韻使萬物咸若六時登聞不惕不惶以安以樂或謂霆鬪雷裂山傾河泄靈祗殱走猛毅僵蹶皆恐怖殺傷之事我大雄氏慈制又悲乎然哉若乃顒顒聖賢翼翼龍象以之懴薩以之引宣微妙其心精進厥德有秩有序不差不忒住持我像教洋溢我玄風洞達我幽明清寧我邦國神之不可以已其在兹乎皇唐十有八年春仲月八日是鍾也既成即其秋孟月上弦兹臺也復構他方聖衆咸飛來而讃揚地中菩薩咸踊出而瞻仰於是陳巨會以落之張𣑽樂以考之煌煌乎休哉越寶庭之能事畢矣而宏範莫紀又八稔於斯河南史凛然文林之秀也尉于右邑攝兹銅章惠化一清於灌壇希聲重美於洪器命我昭述式副羣心之望焉而主簿弘農楊量新尉楊光朝等並高斡才敏力懋於道勉奉天秩允恭仁祠輔營樂石贊就厥美雖默者果得不言乎銘曰靈鍾上空儀法天體道內虛含至圎雄威蓄育時乃宣震擊鏗鍠流大千十萬調御及聖賢應我真聲開𣑽筵一切苦輪悲熾然開我真聲咸息肩虛空有盡福無邊神用廣大莫與先化成寺大鍾銘并序李白噫天以震雷鼓羣動佛以鴻鍾警大夢而能發揮沈濳開覺茫蠢則鍾之取象其義博哉夫揚音大千所以清真心警俗慮協響廣樂所以達元氣彰天聲銘勳皇宫所以旌豐功昭茂德莫不配美金鼎增輝寶坊仍事作制豈徒然也粵有唐宣城郡當塗縣化城寺大鍾者量函千鈞聲盈萬壑蓋邑宰李公之所創也公名有則系玄元之英㽔茂列聖之天枝生于公族貴而秀出少藴才略壯而有成而西逾流沙立功絶域帝疇乎厥庸始學古從政歷宰潔白聲聞于天天書褒榮輝之簡牘稽首三復子孫其天寶之初鳴琴此邦不言而理日計之無近功歲計之有大利物不知化濳臻小康神明其道越不可尚方入于禪關覩天宫崢嶸聞鍾聲瑣屑乃謂諸龍象曰曷不建大法鼓樹之層臺使羣聾六時有所歸仰不亦美乎於是發一言以先覺舉百里而咸應秋毫不挫人多子來銅崇朝而山積工不日而雲會乃採鳧氏撰鴻鍾火天地之爐扇隂陽之炭回祿奮怒蜚亷震驚金精轉涾以融熠銅液星熒而熣燦光噴日道氣蔽天維紅雲點於太淸紫煙矗於遙海炟爀宇宙功侔鬼神瑩而察之吁可駭也爾其龍質炳發虎形躨跜縻金索以上絙懸寶樓而迭擊傍振萬壑高聞九天聲動山以隱隱響奔電而闐闐赦湯鑊於幽途息劒輪於苦海景福肹蠁𬒳于人天非李公好謀而成弘濟羣物又孰能興於此乎丞尉等並衣冠之龜龍人物之摽凖大雅君子同僚盡心聞善賈勇贊成厥美寺主升朝間心古容英骨秀氣灑落毫素謙柔笑言海受水而皆納鏡無形而不燭直道妙用乃如是言然常虛懷忘情潔已利物是人行空寂不動見如來有若上座靈隱都維那則舒名僧曰暉藴虛常因調護賢哉六開士普聞八萬法深入禪惠精修律儀將博我以文章求我以述作功德大海酌而難名遂與六曹豪吏姑熟賢老乃緇乃黃鳧趨𣑽庭請揚宰君之鴻美白昔忝侍從備于詞臣恭承德音敢闕清風之誦其詞曰雄雄鴻鍾砰隱天雷鼓霆擊警大千含號炟爀聲無邊摧懾魑魅招靈仙旁極六道下九泉劒輪輟苦期息肩湯鑊猛火停熾然愷悌賢宰人父母興功利物信可久傳芳金鍾永不朽溫州仙巖寺銘司空圖巖之巔森戟鑱天中宅靈仙瀑之作風斡洞壑地洶山鑿越之裔甌之隅人逸而腴某其帥某其牧寺圯而復石橋銘并序張嘉貞趙郡洨河石橋隋匠李春之迹也製造竒特人不知其所以為試觀乎用石之妙楞平砧鬪方版促郁縬穹隆崇豁然無楹吁可怪也又詳乎又插駢坒磨礱緻密甃百象一仍糊灰璺腰鐵鐵蹙兩涯嵌四穴蓋以殺怒水之蕩突雖懷山而固護焉非夫深智逺慮莫能創是其欄檻華柱鎚斫龍獸之狀蟠繞拏踞眭盱翕欻若飛若動又足畏乎夫通濟利涉三才一致故辰象昭回天江臨乎析木鬼神幽助海石到乎扶桑亦有停杯渡河羽毛填塞引弓擊水鱗甲攢會者徒聞于耳不覯于目目所覯者工所難者比於是者莫之與京勑河北道推勾租庸兼復囚使判官衛州司功參軍河東柳渙繼為銘曰於繹工妙沖訊靈若架海維河浮黿役鵲伊制或微並模蓋略析堅合異超涯截壑支堂勿動觀龍是躍信梁而竒在啓為博北走燕蒯南馳溫洛騑騑壯轅殷殷雷薄攜斧拖繡騫􅍡視鶴藝入侔天財豐頌閣斫輪見嗟錯石惟作並固良球人斯瞿䁨石橋銘并序張彧閹茂歲我御史大夫李公晟奉詔㧾禁戎三萬北定河朔冬十月師癸趙郡郡南石橋者天下之雄勝乃揆厥迹度厥功皆合于自然包我造化僕散客也狀而銘曰洨水伊何諸州互湊秋霖夏潦奔突延袤杼材蕆制朴斫紛糅斡地泉開盤根玉甃虹舒電拖虎步雲搆截險橫包乘流逈透坱軋匠造琳琅蔟簉敞作洞門呀為石竇賖莫算盈一紀方就力將岸爭勢與空鬪吞齊跨趙警夜防晝月挂虛㙴星羅伏獸謂之鈐鍵撮我宇宙謂之關梁扼我戎寇郡國襟帶河山領袖經途者安逸軌者覆東南一尉西北一候萬里書傳三邊檄奏郵亭控引事物殷冨夕發蒯壖朝趨禁霤質含氷碧文耀藻繡花影全芳苔痕半舊天啓大壯神功罕究勒銘巨橋敢告豪右丹崖翁宅銘并序元結零陵瀧下三十里得丹崖翁宅丹崖俗曰赤石國有唐節者曽為瀧水令去官家于座下自稱丹崖翁丹崖湘中水石之異者翁湘中得道之逸者愛其水石為之作銘銘曰瀧水未盡瀧水猶峻忽見淵洄丹崖千仞磳磳丹崖其下誰家門前斷船籬上釣車不知幾峯為其四墉竹幽石磴飛泉戶中怪石臨淵硯硯綺競石巔何得石巔翁獨醉眠吾欲與翁東西茅宇飲啄終老翁亦恱許世俗常事阻人心情徘徊巖下遂刻此銘井銘并序柳宗元始州之人各以罌甈負江水莫克井飲崖岸峻厚旱則水益逺人陟膝大艱雨多則塗滑而顚恆惟咨嗟怨惑訛言終不能就元和十一年三月朔命為并城北隍上未晦果寒食冽而多泉邑人以灌其土堅垍其利悠久其相者浮圖談康諸軍事牙將米景鑿者蔣晏凡用罰布六千三百役傭三十六大甎千七百其深八尋有二尺銘曰盈以其神來不窮惠我後之人噫疇肯似于政其來日新梓州兜率寺文冡銘并序劉蛻文塜者長沙劉蛻復愚為文不忍棄其草聚而封之也蛻愚而不鋭於用百工之技天不工蛻也而獨文蛻焉故飲食不忘於文晦冥不忘於文悲戚怨憤疾病嬉遊羣居行役未嘗不以文為懷也適當無事而天下將以文為號文明代生殖明晦皆效文用故日月星辰文乎旗常昆蟲鳥獸文乎彝器徐方之土文於侯社夏翟如秦兆惟曰不吉卜於水不成乎河洛兆則亦惟日不吉卜於木而悶悶土協吉纍纍為冡則汲之兆乎峭峭為壁則魯之兆乎且其占曰土之文為山河為華英將不崩不竭為滋味而傳乎結為丘陵為其設險乎融為川瀆率其朝宗乎華為百榖以潔祭祀之粢盛乎不然使其速腐為墟壤生芻藁以食牛羊乎化塗泥為陶甄以作器乎將塊為五色而茅社分封乎流於樂為土鼓為􅒘桴以泄其和聲乎夷為都邑以興宫廟乎坎為汙池以澤生殖乎祀為壇竈乎窽為井墓乎吾皆不得而知也當既不為吾用唯速化為百工之用愼無朽為芝菌以怪人自媚愼無堅為金鐵以作貨起爭愼無潏為醴泉以味乎諂口愼無禱為城社以狐鼠慿妖愼無聳為良材以雕斫傷性愼無萌為蘭茞以佩服見藝嗚呼介而為石使之能言舒而為蚓使之飲泉既而他年遊魂之未返者亦命巫師而弔三招之號曰在几閣而來歸兮掩為塵垢在耳目而來歸兮奄視汝醜在口吻而來歸兮譽不汝久噫筆絶之年而麟見祟文其無祟乎唅非珠玉斂無裙襦後世詩禮之儒無驚吾之幽墟其冡也在莽蒼之野大塊之丘時有唐大中丁卯而戊辰之季秋銘曰文乎文乎有鬼神乎風水惟貞將利其子孫乎重校正唐文粹卷第六十七
