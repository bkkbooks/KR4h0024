body:
  text: 記甲到難附總十二首古跡二宋武受命壇記張謂風后八陣圖記獨孤及陵廟四女媧陵記喬潭改修吳延陵季子廟記蕭定晉東萊太守劉將軍廟記許籌縉雲縣城隍神記李陽冰水石巖宂五曲江池記歐陽詹太湖石記白居易至邱西小石潭記栁宗元乳宂記到難附䕫周外物一醉鄉記王績宋武受命壇記張謂昔在王癸不道帝辛失德天命將改人心已去聖哲拯之厯數歸焉商湯所以革夏周武所以伐殷也至於太甲初放成王未長國步猶梗時屯尚虞忠賢處之名節存焉伊尹所以反正周公所以復嗣也元興之際義熈之間晉主中庸幸無桀紂之罪劉公大畧遂有伊周之勲當其驅駕英雄芟夷僭偽南摧勁楚北破强燕電掃秦雍風清巴蜀三方為我有四海為己任誠能秉汾陽之志息漢隂之機牽率何劉同為翊戴指撝徐傅共致雍熈則元皇建業之都至今享殷周之祚劉后豫章之地至今為齊魯之國而近希曹馬遠棄桓文禍徒及於兩朝福未盈於三載八葉傳其世嗣六君不以夀終漢氏寛仁𦙍緒成大族劉公殘暴子孫無遺種天之報施其明徴乎則知握元符升大寳禮義得之者難絶智力得之者易亡使成如宋齊無足稱者况敗如莽卓豈勝道哉後之人運屬陵夷業崇經濟周爰故地殷鑒在兹唐永泰元年二月二十五日建風后八陣圖記獨孤及物不終靜必受之以動當純坤用事隂疑於陽則飛龍戰大朴已散聖盜並起故戎馬生乃有力吞八荒爭截九有大者天柱折地維絶小者作慝盧山負阻中冀上帝慿怒下民是恤乃眷武德黄帝受命之始順殺氣以作兵法文昌以命將於是乎征不服討不庭其誰佐命曰元老風后盖戎行之不修則師律用爽隂謀之不作則凶器何恃故天命聖者以廣戰術俾懸衡於未然察變於倚數握機制勝作為陣圖夫八宫之位正則數不􅄽神不忒故八其陣所以定位也衡抗於外軸布於内風雲附其四維所以備物也虎張翼以進蛇向敵而蟠飛龍翔鳥上下其勢以致用也至若疑兵以固其餘地游軍以按其後列門具將發然後合戰弛張則二廣迭舉掎角則四竒皆出必使陷堅陣拔深壘若星馳天旋雷動山破魏之鶴列鄭之魚麗周武之熊羆昆陽之虎豹出匪以律我異於是既而圖成罇爼帝用經畧北逐獯鬻南平蚩尤戡黎於阪泉省方於崆峒底定萬國旁羅七耀鼎成龍至去而上僊於是遺風㝠㝠時亡而圖存焉於戲聖迹長往神機未昧酌其流者猶足以决勝三軍禦侮萬里故項籍得之以霸西楚黥布得之奄有九江漢孝武得之攘匈奴服甌越東收獩貊西拓大夏然則聖圖幽贊未始有涯天寳中客有為韜鈐者得其遺制於黄帝書之外篇裂素而圖之勝敗之朕在我股掌天地之心見於毫末議欲獻諸䇿府用廣武事㑹天子以不戰為師無為為寳則是圖也興於多難廢於升平堙淪不書盛德其没乃旌諸圖側以為三皇之故事六藝之餘伎云女媧陵記喬潭登黄龍古塞望洪河中流巋然獨存大浸不溺者媧皇陵也夫巨靈擘太華蹠首陽導河而東以洩憤怒雖有重邱大阜險狹之口罔不漱之為黄壤汨之於旋波不可復振奔崩而下矣女媧氏已然之後豁爾之衡天險束阨風濤鼓作乃能中乾外禦特立萬年其慿神可知也水無盈縮之度陵有高卑之常霖潦漲之兩涘没矣於是乎不為之小而就其深旱暵滲之孤嶼出矣於是乎不為之大而就其淺非夫巨靈壯趾以固本河伯高肩以承隅胡然動靜如因其時升降不失其則羅浮二岳以風雨合離蓬萊五山以波潮上下不復故道遂違常流甚相遠矣君子曰夫能屠黑龍涸九州况乎一水之上而自為謀夫能㫁鼇足立四極况乎數仞之高而自為力神人之易昧者難知密邇山谷森羅物象莽莽蘆渚寧非止水之餘嶃嶃石林猶有補天之色摇演空曲精靈若存且夫上無積草表以孤樹常感風氣纎條悲鳴若㝠應肹蠁鼓簧而吹笙由是憧憧往來無不加敬山有梅栗闗吏羞焉水有菱芡舟人奠焉冢之木無或斬焉陵之土無或抔焉是則馨香已陳而樵蘇自禁矣故聖人取薄𦵏去厚送驪山之銀海魚燈虎邱之金精龍劒錮之其内散之其間適為大盗之守未足藏身之固彼橋山帝邱九嶷㑹稽皆因山而墳未聞其赭者余謂媧皇受命在火火以示水谷不為陵開門負固日用其力不然其隙地豈必封崇乎是故觀而志之為城冡後記改修吳延陵季子廟記蕭定有呉之興也泰伯讓以得之有呉之衰也季子讓以失之為讓之情同而興衰之體異何哉泰伯之讓讓以賢也故周有天下而呉建國焉季子之讓賢以讓也當周德之衰而呉喪邦焉或曰非所讓而讓之使宗祀泯絶而不血食豈曰能賢斯可謂知存而不知亡者矣夫治亂時也興亡運也故至至而不可卻終終而不可留黄河既濁阿膠無以正其色鹽池斯鹹弊箄不能匡其味與夫當濁亂之世召力勝之戎讓與爭孰賢乎易曰知㡬其神則季子之見可謂知㡬矣季子之明可謂知進退存亡而不失其正矣至於聽樂辨列國之興亡審賢知世數之存没挂劒示不言之信避國保無欲之貞故有吳之祀寂寥而延陵之饗如在𤣥風可想至德興歎美之辭哲人其萎表墓著嗚呼之篆向㣲德仁兩至則夫子不復歎焉詳其精義被物鈎深致遠之㫖烏可究其津涯而窺其牆仞哉是知讓之為德在於生靈不獨其子孫明矣國有祀典人懷永思定忝列藩條欽崇懿範于以加敬嚴乎閟宫别閨壼之内外正衆神之序位舊以泰伯之廟在於蘇臺而制季子之祠像設東面非由典禮諒無取焉必也正名於是乎在祈報獻奠贄幣宜列於軒廂春秋禮薦爼豆當陳於正寢俾觀像者識賢人之遺風可律審度者知經德之禮秩無差末學陋辭不足頌其休烈寒來暑往敢用同於紀年時大唐大厯十四年嵗在己未八月戊戌朔二十七日甲子記晉東萊太守劉將軍廟記許籌將軍晉永嘉初守萊種德藝政萊人恩之既殁諸劉將西扶𦵏洛萊人曰我萊不降數萬家將軍子視我我父母戴之將軍於諸劉天戚也於我人戚也天之戚也寡而邈人之戚也衆而邇安有捨邇衆而歸邈寡哉敢以數萬家之命請於諸劉遂之於是散捧封工趨持樹本既墳于此饗用春秋禱災徼祐餘靈影響大中十一年四月癸巳太守辛公肱去太守姚公琯未臨籌以當道觀察支使奏承空闕到郡之三日軍吏䟽拜厯祠羣望即日將軍祠在郡署之東端簡肅入乃見廟寢卑狹畫像凋暗既違有德豈謂祭恭乃命押衙兼修造使李公霸度木戒工新此殿搆想像塑繪居月而成心非貿福者將使有德者垂昆無窮無德者警改操行萊人受裕當稔于兹大中十一年五月二十三日記縉雲縣城隍神記李陽冰城隍神祀典無之吳越有之風俗水旱疾疫必禱焉有唐乾元二年秋七月不雨八月既望縉雲縣令李陽冰躬祈於神與神約曰五日不雨將焚其廟及期大雨合境告足具官與耆耋羣吏乃自西谷遷廟於山巔以答神休曲江池記歐陽詹水不注川者在藪澤則曰陂曰湖在苑囿則為池為沼苑之沼囿之池力墾而成則多天然而有則寡兹池者其天然歟循原北峙迴岡旁轉圓環四帀中成坎窞窙窌港洞生泉噏源東西三里而遥南北三里而近當天邑别卜繚垣未繞乃空山之濼曠野之湫然黄河作其左壍清渭為其後洫襃斜右走太一前横崇山濬川鈎結蟠䕶不南不北湛然中渟西北有地平坦彌望五六十里而無窪坳紫盖凝而不散黄旗鬱以常在實陶鈞之至造化之上沙汰一氣之辰財成六合之日既以磽确外為寰宇敞無垠堮以居億兆又選英精内為區域束以襟帶用宅君長若人斯生支體具矣有心以繫其神焉若堂斯考廊廡設矣有室以處其尊焉彼如紫盖黄旗之氣盖陶鈞造化者用宅君長英精之所邪夫物苟相表裏製必同象泄夫外則廓以靈海導夫内則融乎此湫厯代帝王未得而有豈降巢室土之後聫綿千百之代建卜都邑不欲合夫天意而居乎將天意尚同根深蔕固可與終畢者而命處乎故涸於有隋比我皇唐之存孕詔其季主營之以須焉揆北辰以正方度南端而制極墉隍劃趾勾陳定位地迴帝室湫成厥池既由我署纔成伊去真主巍巍龍蟠虎據爰自中而軌物取諸象以正名字曰曲江儀形也觀夫妙用在人豐功及物則總天府之津液䟽皇居之墊隘潢汙入其洞澈銷涎漦以下澄汗廅隨其佳氣蕩鬱攸而上滅萬户無重膇之患千門就爽塏之致其流惡含和厚生蠲疾有如此者皎皛如練清明若空俯睇冲融得渭北之飛鴈斜窺澹泞見終南之片石珍木周疪竒花中縟重樓天矯以縈映危榭巉巖以輝燭芬芳䕃潛滉瀁電烻凝煙吐靄泛羽游鱗斐郁郁以閑麗謐徽徽而清肅其涵虚抱景氣象澄鮮有如此者皇皇后辟振振都人遇良辰於令月就妙賞乎勝趣九重繡轂翼六龍而畢降干門錦帳同五侯以偕至泛菊則因高乎㫁岸袚褉則就絜乎芳沚戲舟載酒或在中流清芬入襟沈昏以滌寒光眩目貞白以生絲竹駢羅緹綺交錯五色結章於下地八音成文于上空砰􅗟沸渭神仙奏鈞天於赤水黤藹敷俞天人曳雲霓於𤣥都其洗慮延歡俾人怡懌有如此者至若嬉游以節宴賞有經則纎埃不動㣲波以寧熒熒渟渟瑞見祥形其或滛湎以情泛覽無斁則飄風暴振洪濤噴射崩騰駱驛妖生禍覿其棲神育靈興善懲惡有如此者基幸因受遣觀光上國身不佞而自棄日無名以多暇詢竒覽物得之於斯矚太始之𤣥造訪前聞於碩老天生地成之理識之於性情物儀人事之端徴之於耳目夫流惡含和厚生蠲疾則去隂之慝輔陽之德也涵虛抱景氣象澄鮮則藻飾神州芳榮帝宇也洗慮延歡俾人怡恱則致民樂土而安其志也棲神育靈興善懲惡則俗知所勸而重其教也號惟天邑非可謬創一山一水拳石草樹皆有所謂兹池者其有謂之雄焉意我皇唐須有此地以居之有此地須有此池以毗之佑不仁之亭毒贊無言之化育至矣哉以其廣狹而方於大則小矣以其淵洞而諭夫深則淺矣而有功如彼有德若此代之君子盖有知之而不述令民無得而稱焉輒粗陳其㫖刋諸岸石庶元元荷日用之力也貞元五年嵗在己巳夏五月十有五日記太湖石記白居易古之達人皆有所嗜𤣥晏先生嗜書嵇中散嗜琴靖節先生嗜酒今丞相竒章公嗜石石無文無聲無臭無味與三物不同而公嗜之何也衆皆怪之走獨知之昔故友李生名鈞有云苟適吾意其用則多誠哉是言適意而已公之所嗜可知之矣公以司徒保釐河雒治家無珍産奉身無長物惟東城置一第南郭營一墅精葺宫宇慎擇賓客性不苟合居常寡徒游息之時與石為伍石有族聚太湖為甲羅浮天竺之徒次焉今公之所嗜者甲也先是公之僚吏多鎮守江湖知公之心惟石是好乃鈎深致遠獻瑰納竒四五年間纍纍而至公於此物獨不亷讓東第南墅列而置之富哉石乎厥狀非一有盤拗秀出如靈邱鮮雲者有端儼挺立如真官神人者有縝潤削成如珪瓚者有亷稜銳劌如劒㦸者又有如虬如鳯若跧若動將翔將踴如鬼如獸若行若驟將攫將鬬風烈雨晦之夕洞穴開􅥾若欱雲歕雷嶷嶷然有可望而畏之者煙霽景麗之旦巖㟧霮䨴若拂嵐撲黛靄靄然有可狎而翫之者昏曉之交名狀不可撮要而言則三山五岳百洞千壑覼縷蔟縮盡在其中百仞一拳千里一瞬坐而得之此所以為公適意之用也與公迫觀熟察相顧而言豈造物者有意於其間乎將胚渾凝結偶然成功乎然而自一成不變已來不知㡬千萬年或委海隅或淪湖底高者僅數仞重者殆千鈞一旦不鞭而來無脛而至爭竒騁怪為公眼中之物公又待之如賓友親之如賢哲重之如寳玉愛之如兒孫不知精意有所召邪將尤物有所歸邪孰不為而來邪必有以也石有大小其數四等以甲乙丙丁品之每品有上中下各刻于石隂曰牛氏石甲之上丙之中乙之下噫是石也百千載後散在天壤之内轉徙隠見誰復知之欲使將來與我同好者覩斯石覽斯文知公之嗜石之自㑹昌三年五月丁丑記至小邱西小石潭記栁宗元從小邱西行百二十步隔篁竹聞水聲如鳴佩環心樂之伐竹取道下見小潭水尤清洌泉石以為底近岸巻石底以出為􅀈為嶼為嵁為巖青樹翠蔓䝉絡摇綴參差披拂潭中魚可百許頭皆若空游無所依日光下徹影布石上恬然不動俶爾遠逝往來翕忽似與游者相樂潭西南而望斗折蛇行明滅可見其岸勢犬牙差互不可知其源坐潭上四面竹樹環合寂寥無人淒神寒骨悄愴幽邃以其境過清不可乆居乃記之而去同游者吳武陵襲古余弟宗𤣥𨽻而從者崔氏二小生曰恕已曰奉壹乳穴記石鍾乳餌之最良者也楚越之山多産焉于連于韶者獨名於世連之人告盡焉者五載矣以貢則買諸他部今刺史崔公至逾月穴人來以乳復告邦人恱是祥也雜然謡曰甿之熈熈崔公之來公化所徹土石䝉烈以為不信起視乳宂宂人笑之曰是惡知所謂祥邪嚮吾以刺史之貪戾嗜利徒吾役而不吾貨也吾是以病而紿焉今吾刺史令明而志絜先頼而後力欺誣屏息信順休洽吾以是誠告焉且夫乳穴必在深山窮林冰雪之所儲犲虎之所廬由而入者觸昏霧扞龍蛇束火以知其物縻繩以志其返其勤若是出又不得吾直吾用是安得不以盡告今令而乃誠吾告故也何祥之為士聞之曰謡者之祥也乃其所謂怪者也笑者之非祥也乃其所謂真祥者也君子之祥也以政不以怪誠乎物而信乎道人樂用命熈熈然以效其力斯其為政也而獨非祥也歟到難周䕫天子握乾符之六嵗末秩臣羽皇客于南裔水浮溟波陸上青山或時晝短宿在林壑繇是嵐溪煙嶠之勝得湞陽之石室焉兩崖巻束勢合如屋孱顔百間開待朝旭峭然嵐壁宛矣倦躅羽容霓色霏遶瑶局加以上戴霄峯中流晴溪碧瀾之下寸寸秋色若夫崆峒見月於半夜翠竇有雲於朝日乳枝凝㫁而磬落松籟踈風而瑟續不書其竒可知矣於戲斯室斯溪也與夐古同出野夫樵子無日不到冠劒百族代誰知之使靈室煙霞寂漠無主龜山挹玉堂之㑹瑶池宴王母之觴彼何人邪秋九月有釋氏子智捷聞於聚落持律第一探得是室亟言於上谷侯君侯君名著字伯昭德門之裔也宰於湞陽蠏筐范綏之政行焉事歸條貫官有餘日初與三四賓客游焉既昇于室皆踞盤石注目峭絶壑形渠渠忽驚呀豁危起騰立背倚青壁乆而不寧掬谿飲水稍稍神定噫乎古之王文考何平叔不值斯室也向使值之必為之賦廣言磅礴洞蕩垂文雄傑則靈光景福不得獨豪矣大凡人間跼束難有閒日瞻彼石室嗣子之到者誰邪上谷交親同辭舊山者京兆韋君長文時為南都曹掾手持密轄杳在蓮府緬昔泉石俱為逸人張琴寫古以彈操語黙不歌而飲酒簪纓軒冕浮雲也今日煙霞林壑思同甚難故礱室琢壁顧余以到難命篇上以俟羣仙之降次將遲京兆之游些京兆韋長文上谷侯著河南史傑清河崔存慶存範蘭陵蕭及上谷侯從直清河張君奭張甫釋澄雅智捷明則成文後一月琢石又一月儒釋侣十四人同游立之醉鄉記王績醉之鄉去中國不知其㡬千里也其土曠然無涯無邱陵阪險其氣和平一揆無晦明寒暑其俗大同無邑居聚落其人甚精無愛憎喜怒吸風飲露不食五糓其寢于于其行徐徐與鳥獸魚鼈雜處不知有舟車器械之用昔者黄帝氏嘗獲游其都歸而杳然喪其天下以為結繩之政已薄矣降及堯舜作為千鍾百壺之獻因姑射神人以假道盖至其邉鄙終身太平禹湯立法禮繁樂雜數十代與醉鄉隔其臣羲和棄甲子而逃兾臻其鄉失路而道天故天下遂不寧至乎未孫桀紂怒而昇其糟邱階級千仞南向而望卒不見醉鄉武王得志于世乃命公旦立酒人氏之職典司五齊拓土七千里僅與醉鄉達焉三十年刑措不用下逮幽厲迄乎秦漢中國喪亂遂與醉鄉絶而臣下之愛道者往往竊至焉阮嗣宗陶淵明等十數人並游于醉鄉没身不返死𦵏其壤中國以為酒仙云嗟乎醉鄉氏之俗豈古華胥氏之國乎何其淳寂也如是余將游焉故為之記唐文粹巻七十一欽定四庫全書唐文粹巻七十二宋姚鉉編記乙總一十一首府署中書政事堂記李華御史臺新造中書院記舒元輿御史大夫壁記李華御史中丞壁記東都留臺石柱記趙􅁮吏部貟外郎南曹㕔壁記權德輿監祭使壁記栁宗元祕書郎壁記權德輿四門助教壁記栁宗元國學新修五經壁記劉禹錫問國庠記舒元輿中書政事堂記李華政事堂者自武德巳來常於門下省議事謂之政事堂故長孫無忌起復授司空房𤣥齡授左僕射魏徴授太子太保皆知門下省事至高宗光宅元年裴炎自侍中除中書令執宰相筆乃移政事堂於中書省記曰政事堂者君不可以枉道於天反道於地覆道於社稷無道於黎元此堂得以議之臣不可悖道於君逆道於人黷道於貨亂道於刑尅一方之命變王者之制此堂得以移之兵不可以擅誅權不可以擅施貨不可以擅蓄王澤不可以擅奪君恩不可以擅間私讎不可以擅報公爵不可以擅私此堂得以誅之事不可以輕入重罪不可以生入死法不可以剥害於人財不可以擅加於賦情不可以委之於倖亂不可以啟之於萌伐紊不賞削紊不封聞荒不救見饉不驚逆諌自賢違道傷古此堂得以殺之故曰廟堂之上鐏爼之前有兵有刑有挺有刃有斧鉞有鴆毒有夷族有破家登此堂者得以行之故伊尹放太甲之不嗣周公逐管蔡之不義霍光廢昌邑之亂狄公正廬陵之位自君弱臣強之後宰相主生殺之柄天子掩九重之耳燮理化為權衡論道變為機紐傾身禍敗不可勝数列國有傳青史有名可以為終身之誡無罪記云御史臺新造中書院記舒元輿王者執生殺之柄造天下使百度順而已矣其或不順與順而不得其度者皆屬於御史府府之動靜為朝廷紀綱之職與百司絶類盖百司坐其署但専局而已矣入於朝與啟事於丞相府亦不出乎其位是以朝罷而各復其司以無事於朝堂與中書也若御史臺每朝㑹其長總領屬官謁於天子道路誰何之聲達于禁扉至含元殿西廡使朱衣從官傳呼促百官就班遲曉文武臣僚列於兩觀之下使監察御史二人立於東西朝堂甎道以監之雞人報㸃監者押百官由通乾觀象入宣政門及班于殿庭則左右巡使二人分押於鍾鼓樓下若兩班就食於廊下則又分殿中侍御史一人為之使以莅之内謁者承㫖喚仗入東西閣門峨冠曳組者皆趨而進分監察御史二人立於紫宸屏下以監其出入爐煙起天子負斧扆聴政自螭首龍池南屬於文武班則侍御史一人盡得専彈舉不如法者由是吾府之屬得入殿内其職益繁其風益峻故大臣由公相已下皆屏氣竊息注萬目於吾曹吾曹坐南臺則綜覈天下之法立内朝則約䋲千官之失百司有滯疑之事皆就我而質故乘輿所在下馬成府釐朝廷之綱目與坐臺之判决者相半是以御史府故事於中書之南常有理所先時惟中丞得専寓於尚舍一院若雜事與左右巡使則寓於西省小胥之廡下遇大朝㑹時吾屬皆來則分憩於雜事巡使之地既寓於小胥則我實客也每亡事而去則主人必坌而入諠譁狼籍其態萬變向之霜稜盡為涕涶矣豈吾君以天下綱紀屬之於我之意邪上元二年侍御史劉孺之作直㕔記初拜儀云謝宰相訖向南入直省院候端長又入中書儀云到直省院入門揖端公訖各就房嗚呼以御史之重而前時作者之記恬然以直省院為記君子未嘗有非之者神羊之神何其翳而不光邪聖唐太和三年己酉嵗天子擢尚書吏部郎中河南宇文公為御史中丞詔下之日不仁者相弔御史府新例知雜事一人中丞得以選於廷臣河南公既拜之日上言請尚書司勲郎中瑯琊王君以自輔識者曰河南琅琊同心異質之人也心苟同雖堅金可㫁於御史乎何有他日雜事果以寓直省院為歎迺議於中丞中丞深樂之即時啓於中丞曰此前日之闕也中丞能為之豈直栢署之光乎實羽儀吾府之多也皆佐其意事得聞於上上曰良有是乎俞其請如響即詔度支出錢百萬以資焉乃於政事堂直阡之南選地以作之中書之南實天下㑹計之地不容咫尺之隙非雄重清切之司於此豈容足乎我是以得規制為之焉舊中丞院在西與西院相絶遂以其地易大京兆院合為三院東西四十六步南北四十步由東為首其一為中丞其二為雜事其三為左右巡使若中丞升為大夫改官不改院若三院畢朝集臺院附於雜事殿察附於巡使其名總號為御史臺中書南院院門北闢以取其嚮朝廷也其制自中書南廊加南北為軒入院門分東西廂為拜揖折旋之地内外皆有廡蟠迴詰曲矚之盈盈然梁棟甚宏柱石甚偉椽欒楶梲麗而不華門窗户牖華而不侈名木修篁竒葩秀實若升緑雲若編青簫以至于几桉筆硯簾幌茵榻果籩茗器皆新作也從官胥士役夫走馬勾稽桉牘飲食休息之地皆得其所若百官之請事羣吏之參謁入吾門將抵伺於屏者見吾軒堂堦闥之嚴固不俟戒而自肅為此者何尊天子也吾府為天子耳目宸居堂陛未有耳目聰明堂陛峻正而天子不尊也天子尊未有姦臣賊子而不滅也姦臣賊子盡滅矣可以自朝廷至于海隅蕩蕩然何所不理哉吾之作豈是志小者近者之心邪謹按高宗天皇大帝作大明宫將二百年矣當時有司經度曽不是思將以待我而作我之所以作盖前補二百年之遺事後貽千萬年之不朽搢紳觀者命為御史北臺聞者謂之知言君子曰移中丞雜事今之心於大柄天下豈有遺事哉某備于寮屬得聞君子之論且承公命其記於是乎書乃題中丞雜事洎三院至主簿官封名氏於其後以為一時之盛事大和四年嵗次庚戌八月十六日丁巳記御史大夫壁記李華君以文明照臨百官官糾其邪職在邦憲由京師而端下國王化所繫不惟威行御史大夫其任也用捨决於天心得失震於人聽舉直措枉果而不撓則公卿屏氣道路生風率其屬以正于朝瞻我衣冠不仁者遠苟異於是為君子羞政之雄雌與德輕重故名公在位天下仰頼焉秦官有御史大夫在漢為三公職副丞相丞相闕則大夫遷或名司空或名舊號史足徴也議大政必下丞相御史其廷署古曰府近曰臺其衣冠章綬品秩所視載於甲令聖朝臣唐虞高尚之賢内周漢不賓之俗登人於五福薦樂於九歌帝德廣運而瑞草生天威震動而神羊至故柱石骨鯁之老更拜焉距義寧至先天登宰相者十二人以本官參政事者十三人故相任者四人藉威聲以稜徼外按戎律者八人官或改稱大司憲臺或分為左右肅政罷置不恒從其宜也開元天寳中刑措不用元元休息由是務簡益重地清彌尊在難其人多舉勲德至宰輔者四人宰輔兼者一人故相任者一人兼節度者九人異姓封王者二人尊號加孝德之明年樂成公自尚書左丞兼文部遷崇德也昭融禮經嗣續文雅張仲孝友山甫將明風度可以師長人倫動靜可以訓齊天下喬岳鎮定嘉量平均心為百行之宗體備四時之氣雅有之曰文武吉甫萬邦為憲樂成有焉至若教行於無訟之前慮辨於未萌之始未萌而慮則求煩不獲無訟而教則何用不臧寛細瑕為大體復故事為新政小人畏法君子夷心無隠情於國家無愧辭於神道堂堂乎大雅之素也初聽壁列先政之名記而不叙公以為艱難之選將俟後人謂華嘗備屬僚或知故闕之恩至屬辭之藝寡無以允副非常之待所報者直質而少文天寳十四載六月十五日記御史中丞壁記皇帝授天明命垂五十年大道成俗黎民於變百官設而無事三辟存而不論振古未然也猶以為成嵗資于降霜律人本於持憲憲司之拜尤覈名實王猷其遠乎夫察風俗平寃滯踣邪佞延俊賢云誰司之職惟御史御史亞長曰中丞貳大夫以領其屬士丏為伯游之佐司馬乃令尹之偏古之制也漢儀大夫副丞相以備其闕參維國綱鮮臨府事故中丞専焉意者殄凶人之豪挾君子之道各行其志無所牽束行止與大臣絶位指顧則周行振聳政體宜之晉宋元魏以還無御史大夫由是中丞威望愈尊禮有加等如火烈烈如霜肅殺不可犯也屬時清無獄朝尚寛政行葦忠厚王化根源周室仁及草木而愷悌流乎頌聲漢文好黄老而公卿恥言人過舉盛德則儀形著矣焉用察察缺缺以恟生人哉欲以此道行於軍旅故東西幕府皆兼大夫餘軍多假憲司之號聖皇之志也天寳中君臣於道德之間又新其化以尚書左丞張公為大夫太府少卿庾公為中丞天下翕然名教知勸大夫睦中丞也羽翮得清風之助中丞奉大夫也律吕本黄鍾之宫耆儒碩老罕云遇此盛矣公中和備體沈潛經德易直且武温文而清遵王路以整多方由夫身而貞百度此外盡餘事也古之制記者先諸德而後諸事至若命官之始省復之代名號冠緌之差禄秩位貟之數辭尚體要况皆知之今不書省文也華昧學淺藝承命維裕羣言之首非所克堪然故史也勉以酬德天寳十四載九月十日記東都留臺石柱記趙􅁮天垂象聖人則之故星有執法職有持憲皆鐡冠繡衣直指不阿俾在位者肅如也日者天子在鎬庶官分守於是乎有留臺所以上至中司鶚峙都邑夫洛陽有明堂辟雍太倉武庫郊廟百祀邦
