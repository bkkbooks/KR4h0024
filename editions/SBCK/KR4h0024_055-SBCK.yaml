front:
  text: 逺琬琰不刻豈前脩博達者爲􅀖之意乎貞義女者溧陽黃山里史氏之女也以家溧陽史闕書之歲三十不移其志清英絜白事母純孝手柔荑而不􅀛身激漂以自業當楚平王時王虐忠助䜛苛虐厥政芟於尚斬於奢血流于朝赤族伍氏怨毒於人何其深哉子胥始東奔勾呉月渉星遁或七日不火傷弓于飛逼迫於昭關匍匐於瀬渚捨車而徒告窮此女目色以臆授之壷􅄴全人自沈形與口滅卓絶千古聲凌浮雲激節必報之讎雪誠無疑之地難乎哉借如曹娥濳波理貫於孝道聶姊殞肆槩動於天倫魯姑棄子以卻三軍之衆漂母進飯没受千金之恩方之於此彼或異爾卒使伍君開張闔閭傾蕩鄢郢呉師鞭屍於楚國申胥泣血於秦庭我亡爾存亦各壯志張英風於古今雪大憤於天地微此女之力雖云爲忠孝之士亦焉能咆哮炟爀施於後世也望其溺所愴然低迴而不能去每風號呉天月苦荆水響象如在精魂可悲惜其投金有泉而刻石無主哀哉邑宰滎陽鄭公名晏家康成之學丗子産之才琴清心閑百里大化有􅀂主簿扶風竇嘉賔縣尉廣平宋陟丹陽李濟南郡陳然淸河張昭皆有卿才霸略同事相協􅃡紀英淑勒銘道周雖陵頽海竭文或不死其辭曰粲粲貞女􅀌生寒門上無所天下報母恩春風三十花落無言乃如之人激漂清源碧流素手縈彼潺湲求思不可秉節而存伍胥東奔乞食於此女分壷􅄴滅口而死聲動列國義形壯士入郢鞭屍還吳雪恥投金瀬沚報德稱美明明千秋如月在水
