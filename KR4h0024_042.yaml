body:
  text: 吳興姚鉉纂議丁揔一十二首歷代是非七西伯受命稱王議梁肅魯議髙郢漢髙祖僞游議髙參貓䑕議崔祐甫酷吏傳議權徳輿世祖封不義侯議後漢賊臣董卓廟議髙適喪制五定服制議魏徴令狐德棻等駮行三年之服議張柬之服母齊衰三年議田再思改葬服議韓愈廣喪朋友議崔祐甫西伯受命稱王議梁肅太史公曰詩人道西伯以受命之年稱王而斷虞芮之訟遂追王太王王季改正朔易服色十年而崩或謂大雅序文王受命作周泰誓序十有一年武王伐殷妄徴二經以實其說予以爲反經非聖不可以訓莫此爲甚焉甞試言之夫無聖人無作作則爲萬代法仲尼美文王之德曰三分天下有其二以服事殷又曰内文明而外柔順以蒙大難文王以之未有南面稱王而謂之服事易姓創制而謂之柔順仲尼稱武王之烈曰湯武革命又曰武王末受命未有父受之而子復革命父爲天子云未受當武王之㑹盟津也告諸侯曰汝未知天命未可以誓師也曰惟九年大統未集予小子其承厥志孰有王者出征復俟天命天統旣改而復云未集禮大傳稱牧之野旣事而退遂柴于上帝追王太王王季文王改正朔殊徽號若虞芮之歲稱王則不應復云追王王制旣行則不應復云改物是皆反經者也夫大者天地其次君臣聖人知定位之不可易也故制爲上下之禮財成天地之道使各當其分而不相間若億兆之去留天命之與奪則存乎其時聖人順而行之故謳謌所歸而舜禹揖讓桀紂惡盈則湯武放伐所謂後天而奉天時不得巳而爲之者也若殷道未絶紂凶未極而遂稱王以令天下則不可謂至德也巳此其非聖者也予以爲大雅作周之義蓋取夫積德累仁爲海内所歸往武王因之遂成大業非所謂革命易姓爲作周也泰誓紀年蓋武王周公追考前文陳王業之盛自虞芮始故斷爲受命之歲仲尼憲章文武故因而叙之曰十有一年武王伐殷非所謂自稱玉而爲之數也文王旣殁經義斯在如曰不然以俟君子魯議高郢周公居攝七年致政而殁成王康王追思其德命魯侯代之祀以天子禮樂魯君得乗大輅建太常外祭郊社内祭甞禘虞夏商周之服器與官兼而用之以廣魯於天下郢竊謂自天子至于庻人尊卑貴賤待禮而别豐者不可殺殺者不可豐成康過賜非禮也魯君受賜亦非禮也何則郢聞有位而後行典禮仲尼不臣門人非君也季札不嗣吳爵非長也周公不王而以禮樂王者是以非禮誣周公也設欲誣周公以非禮魯謂昊天上帝亦可誣乎奈何使魯人郊昔孔子憤歎於衰周而欲求禮於魯及覩其僭乃言曰魯之郊禘非禮也周公其衰乎魯用天子禮樂者本以郊上帝旣非聲明文物之不當用可知矣又恐來者以杞宋用王禮爲從因言𣏌之郊也禹也宋之郊也契也是天子之事守也𣏌宋二王後得守先祖禮樂魯何守而用之邪猶懼其未能又言曰天子祭天地諸侯祭社稷祝嘏莫敢易其常古是謂大嘏此乃申言名位不同禮亦異數之定分也夫子之言昭昭如掲日月而學者或以爲事更聖人未聞可否難措辭於魯議者於謙黙之道則可矣於發揮之義恐未盡也詩曰爾之教矣人胥效矣魯侯用王禮其臣亦用侯之禮故季氏舞八佾旅泰山設公廟歌雍徹嗟乎禮之不早辯也如此古者父爲天子諸侯子爲士祭禮從子不得從其父晉應武王之穆得用備物享武王乎若享非禮之襃是周公不得爲聖也知其不享是成康秪以王者禮樂餒周公于魯矣安在其廣乎且周公之績孰與伊尹佐商成康之明孰與太戊崇異伊尹不過號爲保衡至于沃丁太戊亦不加以王禮或謂周公叔父也於伊尹而爲親故尊而異之夫太伯太王之元子三以天下讓於王季王季得之以傳祚於文武故孔子曰泰伯其可謂至德也巳矣及武王克紂追太王王季文王而不追王㤗伯豈武王忘泰伯之德而不親乎蓋以等威之禮名分之别爲萬代之凖不爲一人私也夫人情無常以禮爲常以禮從情動則有悖且如王者祖有功而宗有德祖宗之廟代代不毀大凡繼體之君皆欲祖宗其父至于功德未著不敢妄加廟稱者情非不欲限禮而巳矣故禮之行於宗廟父子不得遂其私而況成康又得以天地之公器大典獨私於周公乎周公有大勳于周土田附庸以益之則可秬鬯圭瓉以賜之則可若天子禮樂成康所悖以爲尊也胡可以假人成康雖欲尊於周公伯禽其忍受之以出僭其君入䧟其父乎若周公躬制禮樂墳土未乾而子孫不克負荷亂王者之度孔子稱其衰不亦宜乎漢髙祖僞游議高參或曰漢高帝僞游雲夢以擒韓信果哉其智足稱也予以謂髙祖不思弘逺之規而務一時之計於是乎失政刑矣夫聖人貴正不貴幸與律不與臧昔者明王五載一巡狩合諸侯各朝于方嶽大明黜陟故無德者削地有功者進律漢氏君臨萬國示人以偷僞遊之名不可以訓且當此之時韓信未有逆節一朝繫信而生諸侯之疑天下皆疑則所利者少而所失者多昔崇伯之方命圯族共工之靜言庸違帝堯以則哲之明而未有去者蓋以其行僞象恭且有四嶽之舉故也向使堯惡四凶之行拒四嶽之舉不待試用加之誅放天下必以爲戮不辜矣夫刑一人使天下知其罪則服賞一人使天下知其賢則勸若賞而不勸刑而不服則堯所不爲也漢祖不能斟酌古典卒用陳平之言執信而歸干京師一二年間韓王信反馬邑趙相貫髙謀柏人陳狶反代地彭越黥布盧綰悉以叛換豈非服勸用刑之失歟傳曰君人執信臣人執忠古之盟主恥襲侵之事況光有天下者乎於戲悠悠千載變詐萌生使天子不復言巡狩諸侯不敢議朝覲大者自嫌强盛小者懼於囚執是恩信不流于下而忠孝不達于上王者之澤寖以陵遟自雲夢始矣貓䑕議崔祐甫臣聞天生萬物剛柔有性聖人因之垂範作則禮記郊特牲篇曰迎貓爲食田䑕也然則貓之食䑕載在禮經以其除害利人雖微必録今此貓對䑕不食仁則仁矣無乃失於性乎䑕之爲物晝伏夜動詩人賦之曰相䑕有體人而無禮又曰碩䑕碩䑕無食我黍其序曰食而畏人若大䑕也臣旋觀之雖云動物異於麋鹿麏兔彼皆以時殺獲爲國之用貓受人養育職旣不脩亦何異於法吏不勤觸邪疆吏不勤扞敵又按禮部式具列三瑞無貓不食䑕之目以兹稱慶臣所未詳伏以國家化洽治平天符荐至紛綸雜沓史不絶書今兹貓䑕則若以劉向五行傳論之恐須申命憲司察聽貪吏誡諸邊候無失徼巡貓能致功䑕不爲害酷吏傳議權德輿詩美仲山甫曰剛亦不吐柔亦不茹故體備徤順是謂全德不然則直已循性能秉一方事舉於中皆理道也得柔之道者爲循吏失剛之理者爲酷吏司馬氏脩史記始作二傳以誡世爾而後以郅都爲酷吏傳首愚有惑焉都之爲中郎將上欲搏野彘活賈姬從容奏議引宗廟太后之重其爲濟南守誅豪猾首惡道不拾遺其爲中尉宗室貴臣歛手反目爲鴈門守匈奴不敢近邊至爲偶人像之騎射莫能中然其勇敢氣節根於公廉不發私書不受請寄具此數者爲漢名臣入居命卿出揔郡守堅剛忠純終始若一坐臨江之嫌當太后之怒身死漢廷首足異處有以見漢氏之不綱王澤之弛絶也蓋在史氏發而明之以旌事君以勵使臣俾百代之下有所懲勸子長旣首冠酷吏班氏又因而從之善善惡惡之義於此缺矣夫椎埋沈命舞文巧詆之徒目爲等夷雜列篇次至其述賛雖云引是非爭大體又何補焉噫洪範之沈濳大易之直方皆臣道也都雖未蹈之斯近之矣不隱忠以避死不枉道以涖官無處父之華異申棖之欲所至之邦必以稱職聞其古之剛而無虐怒而中節者歟剛似酷弱似仁在辨之不惑而巳天下似是而非失之多矣豈獨是哉開卷之際怳然有感且以司馬氏班氏皆良史也猶不能辨故斐然成文世祖封不義侯議先師曰惟器與名不可以假人又曰必也正名乎又曰惟則定國於戲有國者可不務乎當東漢世祖之𥘉天命再集冝於此時貞百度正三綱纂脩德教允荅天意時彭寵以南陽舊恩位列上將有舉漁陽之功饋邯鄲之忠竟以讒謗獲罪反側怨望遂攻朱浮於薊自稱燕王其時師旅孔熾元元苦甚時君冝以息人紓難爲心則當録念功用昭洗瑕穢次則布之威懷革其非心必不得巳則仗大順以討之出師以征之明君君臣臣之義此三者皆不能用或用之而不能盡及夫蒼頭子密有便室之逆運其狙忍時伺卧寢遂使命懸僕隷蒼卒授首及詣闕也封爲不義侯愚以爲伯通之叛命子密之戕君同歸于亂罪不相蔽冝各致於法昭示王度反乃爵於五等又以不義爲名且舉以不義莫可侯也而此侯漢爵爲不足勸春秋齊豹盗三叛人名之義無乃異於是乎其欒布之哭彭越孔車之葬主父使於東漢議罪罪孰甚焉況四方甫定傷痍未復不稽古訓以喜怒爲刑賞使天下陪臺厮養各幸其君之亂而徼侯印授諸侯危疑之勢鼓臣下叛換之源棄名器而汨彞訓且以憲令爲戲時風浩浩蕩而不復至使桓靈不道山陽脅奪本其所以自庸詎知非封不義之效歟後漢賊臣董卓廟議高適昔漢祚凌夷桓靈棄德宦官用事國歩多艱宗社有綴旒之危宰臣非𥙷衮之具董卓地兼形勝手握兵鈐顚而不扶禍則先唱興晉陽之甲君側未除入洛陽之宫臣節如掃至乃發掘園寢逼辱妃嬪太后之崩豈稱天命弘農之廢孰謂人心敢諷朝廷以自尊貴大肆剽虜以極誅求焚燒都邑馳突放横衣冠凍餒倚死牆壁之間兆庶困窮生塗草莽之上於是天地憤怒鬼神號哭而山東義旗攘𬒮爭起連州跨郡皆以誅卓爲名故兵挫於孫堅氣奪於袁紹僭擬輿服黨助奸邪驅蹙東人脅帝西幸淫刑以逞有湯鑊之甚要之縻爛刳剔異端乃謂漢鼎可移郿塢方盛殊不知禍盈惡稔未或不亡故神賛允誠天假布手母妻屠戮種族無留懸首燃臍遺臭萬代骨肉灰燼不其快哉今狄道之人不慙卓之不臣而務其爲鬼苟斯鬼足尚則漢莽可得而神晉敦可得而廟桓玄父子可享於江郷爾朱弟兄可祠於朔上嗟乎仁賢之魄寂寞於丘陵義烈之魂沈埋於泉壤何馨香之氣而用於暴悖之鬼哉適竊奉吹嘘庇身戎幕毎承餘論飽識公忠之言不逺下風盡知仁義之夲昨忝高㑹敬受德音今具賊臣之事悉以條上謹按尚書王者望祑天地之神祗諸侯祭境内之山川亂臣不言淫祀無取則董卓之廟義當焚毀定服制議魏徴令狐德棻同議臣聞禮所以決嫌疑别同異明是非者也非從天降非從地出人情而巳矣夫親族有九服術有六隨恩以薄厚稱情以立文然舅之與姨雖爲同氣論情度義先後實殊何則舅爲母之本族姨乃外成他族求之母族姨不在焉考之經文舅誠爲重故周王念齊每稱舅甥之國秦伯懷晉實切渭陽之詩在舅服止一時爲姨居喪五月循名喪實逐末棄本蓋古人之情或有未達所冝損益寔在兹乎記曰兄弟之子猶子蓋引而進之也嫂叔不服蓋推而逺之也禮繼父同居則爲之周未甞同居則不服爲從母之夫舅之妻二夫人相爲服或曰同㸑緦然則繼父之徒並非骨肉服重由乎同爨恩輕在乎異居故知制服雖繼於名亦縁恩之厚薄者也或有長年之嫂遇孩童之叔劬勞鞠養情若所生分飢共寒契闊偕老譬同居之繼父方他人之同爨情義之深淺寜可同日而言哉在其生也愛之同於骨肉及其死則曰推而逺之求之本源深所未喻若推而逺之爲是則不可生而共居生而共居爲是則不可死同行路重其生而輕其死厚其始而薄其終稱情立文其義安在且事嫂見稱載籍非一鄭仲虞則恩禮甚篤顔弘都則端肅致感馬援則其見必冠孔伋則哭之爲位此並躬踐敎義仁深孝友察其所行之㫖豈非先覺者歟但于時上無哲王禮非下之所議遂使深情鬱乎千載至理藏於萬古其來乆矣豈不惜哉今屬欽明在辰聖人有作五禮詳洽一物無遺猶且永念愼終凝神遐想以爲尊卑之叙雖焕乎大備喪紀之制或情禮未周爰命袟宗更詳考正臣等奉遵明㫖觸類旁求採摭羣經討論傳記變薄俗於旣徃垂篤義於將來信六籍所不能超百王而獨得者也諸儒所守互有異同詳求厥中申明聖㫖謹按曾祖父母舊服齋衰三月請加爲齊衰五月適子婦舊服大功請加爲周年衆子婦舊服小功今請與兄弟子婦同爲大功九月嫂叔舊無服今請服小功五月報其弟妻及父兄亦小功五月舅服緦麻請與從母同服小功謹議駮行三年之服議張柬之夫三年之喪二十五月不刋之典也謹按春秋魯僖公三十三年十二月乙巳公薨文公二年冬公子遂如齊納幣左傳曰禮也杜元凱注云僖公喪終此年十一月納幣在十二月士婚禮納采納徵皆有玄纁束帛諸侯則謂之納幣蓋公爲太子巳行婚禮故傳稱禮也公羊傳曰納幣不書此何以書譏喪娶在三年之内何以譏三年之内不啚婚何休注云僖公以十二月薨至此冬未滿二十五月納采問名納吉皆在三年之内故書何休以公十二月薨至此冬十二月纔二十四月非二十五月是未滿三年而圗婚也按經書十二月乙巳公薨杜以長曆推乙巳是十一月十二日非十二月經書十二月是經誤文公元年四月葬我君僖公傳曰緩也諸侯五月而葬若是十二月薨即是五月不得言緩明知是十一月薨故注僖公喪終此年至十二月而滿二十五月故丘明傳曰禮也據此推歩杜之考校豈公羊之所能逮況丘明親受經於仲尼乎且二傳何杜所爭惟爭一月不爭一年二十五月除喪由來無别此則春秋三年之喪二十五月之明驗也尙書伊訓云成湯旣没太甲元年惟元祀十有二月伊尹祀于先王奉嗣王祗見厥祖孔安國注云湯以元年十一月崩據此則二年十一月小祥三年十一月大祥故太甲篇中云惟三祀十有二月朔伊尹以冕服奉嗣王歸于亳是十一月大祥訖十二月朔日加王冕服服吉而歸亳也是孔言湯元年十一月之明證顧命云四月哉生魄王不懌是四月十六日也翌日乙丑王崩是十七日也丁卯命作冊度是十九日也越七日癸酉伯相命士須材是四月二十五日也則成王崩至康王麻冕黼裳中間有十月康王方始見廟則知湯崩在十一月淹停至殮訖方始十二月祗見其祖顧命見廟訖諸侯岀廟門俟伊訓言祗見厥祖侯甸群后咸在則崩及見廟殷周之禮並同此周因於殷禮損益可知也不得元年以前别有一年此尚書三年之喪二十五月之明驗也禮記三年問云三年之喪二十五月而畢哀痛未盡思慕未忘然而服以是斷之者豈不送死有巳復生有節又喪服四制云變而從冝故大祥鼓素琴告人以終又閒傳云朞而小祥食菜果又朞而大祥有醯醬中月而􅎭食酒肉又喪服小記云再朞之喪三年也九月七月之喪三時也五月之喪二時也三月之喪一時也此禮記三年之喪二十五月之明驗也儀礼士虞禮云朞而大祥中月而禫是月也吉祭此禮周公所制則儀禮三年之喪二十五月之明驗也此四驗者並禮經正文或周公所制或仲尼所述吾子豈得以禮記戴聖所脩輒欲排毀漢初髙堂生傳禮旣未周備宣帝時少傅后倉因淹中孔壁所得五十六篇著曲臺記以授弟子戴德戴聖慶溥三人合以正經及孫卿所述並相符㑹列於學官年代巳乆今無端搆造異論旣無依據深可歎息其二十五月先儒考校唯鄭康成注儀禮中月而􅎭以中月閒見自死至禫凡二十七月又解禫云禫言澹澹然平安之意今皆二十七月後復常從鄭議也踰月入禫禫旣復常則二十五月爲免喪矣二十五月二十七月其議本同竊以子之於父母喪也有終身之痛創巨者日乆痛深者愈遟豈徒歲月而巳乎故練而慨然者蓋悲慕之懷未盡而擗踊之情巳歇祥而廓然者蓋哀傷之痛巳除而孤藐之念更起此皆情之所致豈外飾哉故記曰三年之喪義同過隙先王立其中制以成文理是以祥則縞帶素紕􅎭則無所不佩今吾子將徇情棄禮實爲乖僻夫去縗麻之服襲錦縠之衣行道之人皆不忍也直爲節之以禮無可奈何故由也不能過制爲姊服鯉也不能過朞哭其母夫豈不懐懼名教逼巳也至若孔鄭何杜之徒並命代挺生範模來裔宫牆積仞未易可窺但鑚仰不休必當漸入勝境詎勞終年矻矻虚肆莠言所有掎摭先儒願且以時消息服母齊衰三年議田再思乾尊坤卑天一地二隂陽之位分矣夫婦之道配焉至若死喪之威降殺之等禮經五服之制齊斬有殊考妣三年之喪貴賤無隔以報免懷之慈酬罔極之恩稽之上古喪期無數曁乎中葉方有歲年禮記云五帝殊時不相㳂樂三王異代不相襲禮白虎通云質文再而變正朔三而復自周公制禮之後孔父刋經巳來爰殊厭降之儀以標服紀之節重輕從俗斟酌隨時故知禮不從天而降不由地而出也在人消息爲適時之中耳春秋諸國魯最知禮以周公之後孔子之邦也晉韓起來聘言周禮盡在魯矣齊仲孫來盟言魯猶秉周禮子張問高宗諒隂三年不言不聽其子服出母子游爲同母異父昆弟之服大功子夏謂合從齊衰之制此等並四科之數十哲之人高歩孔門親承聖訓及遇喪事猶此致疑即明自古巳來昇降不一者也三年之制說者紛然鄭玄以爲二十七月王肅以爲二十五月又改葬之服鄭云服緦三月王云訖葬而除又繼母岀嫁鄭云皆服王云從子繼育乃爲之服又無服之殤鄭云子生一月哭之一日王云以哭之日易服之月鄭王祖經宗傳各有異同荀摯采古求遺互爲損益方知去聖漸逺殘缺彌多故曰㑹禮之家名爲聚議寧有定哉而父在爲母三年行之巳逾四紀岀自高宗大帝之代不從則天皇后之朝大帝御極之辰中宗獻書之日往時叅議將可施行編之於格服之巳乆前王所是䟽而爲律後王所是著而爲令何必乖先帝之㫖阻人子之情虧仁孝之心背德義之本有何妨於彞倫而欲服之周年與伯叔母齊焉與姊妹同焉夫三年之喪如白駒之過隙君子喪親有終身之憂何況再周乎夫禮者體也履也示之以迹孝者畜也養也因之以心小人不恥不仁不畏不義服之有制使愚人跋及衣之以衰使見之摧痛以此防人人猶有朝死夕忘者以此制人人猶有釋服從吉者方今漸歸古朴須敦孝義抑賢引愚理資寧戚食稻衣錦所不忍聞若以庶事朝儀一依周禮則古之見君也公卿大夫贄羔鴈珪璧今何故不依乎周之用刑也則墨劓宫刖今何故不行也周則侯甸男衛朝聘有數今何故不行也周則不五十不仕七十不入朝今何故不依乎周則井邑兵甸以立征稅今何故不行乎周則分土五等父死子及今何故不行乎周則冠冕衣裘乗車而戰今何故不行乎周則三老五更膠序養老今何故不行乎諸如此例不可勝述何獨孝思之事愛一年之服於其母乎可爲痛心可爲慟哭者詩云哀哀父母生我劬勞禮記云父之親子也親賢而下不能母之親子也賢而親之無能則憐之阮嗣宗晉代之英才方外之高士以爲母重於父據齊斬升數麄細巳降何忍服之節制減至於周豈後代之盡慙於枯骨循古未必是依今未必非也又同爨服緦禮經明義嫂叔逺别同諸路人引而進之觸類而長猶子咸衣苴葈季父不服緦麻推逺之情有餘睦親之義未足又母之昆弟情切渭陽翟輔論舅之冤寗氏宅甥之相我之岀也義亦殷矣不同從母之尊遂降小功之服依諸古禮有爽俗情今貶舅而宗姨是陋今而榮古此並太宗之制也行之百年矣輒爲刋復實用有疑改葬服議韓愈經曰改葬緦春秋榖梁傳亦曰改葬之禮緦舉下緬也此皆謂子之於父母其他則皆無服何以識其必然經次五等之服小功之下然後著改葬之制更無輕重之差以此知惟記其最親者其他無服則不記也若主人當服斬衰其餘親各服其服則經亦言之不當惟云緦也傳稱舉下緬者緬猶逺也下服之最輕者也以其逺故其服輕也江熈曰禮天子諸侯易服而葬以爲交於神明者不可以純凶況其緬者乎是故改葬之禮其服惟輕以此而言則亦明矣衛司徒文子改葬其叔父問服於子思子思曰禮父母改葬緦旣葬而除之不忍無服送至親也非父母無服無服則弔服而加麻此又其著者也文子又曰喪服旣除然後乃葬則其服何服子思曰三年之喪未葬服不變除何有焉然則改葬與未葬者有異矣古者諸侯五月而葬大夫三月而葬士踰月無故未有過時而不葬者也過時而不葬謂之不能葬春秋譏之若有故而未葬雖出三年子之服不變此孝子之所以著其情先王之所以必其時之道也雖有其文未有著其人者以知其至少也改葬者爲山崩水涌毀其墓及葬而禮不備者若文王之葬王季以水囓其墓魯隱公之葬惠公以有宋師太子少葬有闕之類是也喪有進而無退有易以輕服無加以重服殯於堂則謂之殯瘞於野謂之葬近代巳來事與古異或游或仕在千里之外或子㓜妻稚不能自還甚者拘以隂陽畏忌遂葬於其山及其反葬也逺者或至數十年近者亦出三年其吉服而從於事也乆矣又安可取未葬不變服之例而反爲之重服歟在喪當葬猶冝易以輕服況旣逺而反純㓙以葬乎若果重服是所謂未可除而除不當重而更重也或曰喪與其易也寧戚惟重服不亦可乎曰不然易之與戚則易固不如戚矣雖然未若合禮之爲懿也儉之與奢則儉固愈於奢矣雖然未若合禮之爲懿也過猶不及其此類之謂乎或曰經稱改葬緦而不著其月數則以三月而後除也子思之對文子則曰旣葬而除之今冝如何曰自啓殯至于旣葬而三月則除之未三月則服以終三月也曰妻爲夫何如曰如子無弔服而加麻何如曰今之弔服猶古之弔服也廣喪朋友議崔祐甫殿中侍御史安定皇甫政字公理故尚書左丞之子文行兼茂不忝前烈雅度精誠其儔蓋寡祐甫昔年甞爲左丞使介而公理又余之族甥故狎焉大曆七年余寓滁而公理寓楚適有來訊示余以所著喪朋友議余美其重禮義有古之遺範瞻望德門軌躅每替亦感思者之所慰幸也公理又諗余曰政自從事於文舅氏未甞以一言見誨豈所望哉盍示今議之利病猗歟公理年未四十班在赤墀簪筆持簡爲王近臣頃又佐㢘問董淮海之部名遂矣權厚矣固當緩歩濶視光車美服爲貴爲達而巳矣乃不遺我謏狹不略我衰憊念噬膚之戚收門吏之舊周爰諮詢以師道見待吾亦何有但美子之求益不倦雖一勺而進可以浸天壞一拳之多可以鎭方域況其渺瀰旣廣嶄崒巳峻増之廓之於成名乎必矣皇甫氏有子哉因覽斯議忽憶永泰中於穆鄂州寧㑹客席與故湖南觀察韋大夫之晉同宴適值有發逺書者知鄭郴州炅之龐歙州濬或以疾而殁或遇戕於盗韋氏出涕沲若而言曰二刺史之晉之交友也於是歛匕箸離筵席因歸於所次而哭三日人來弔之者韋則盡哀長號不徒慼容而巳又間歲祐甫佐江南西道連帥魏尚書時屬幕中之叅佐有加官者聚合藥餌卜日爲宴㝠前行人至知團練副使考功邢郎中宇捐館於荆南邢與魏郷國接近且邢郎中則諸魏之出於尚書爲内外昆弟適受朝命爲尚書倅僕感杜蕢規平公之事將入言於府主請罷宴若不可則請徹樂卒事而同列之士惡我者嗤鄙之詞充牣於聽謂我樵夫農叟之智也好我者頻慼而相誨曰愼無以方枘施圎鑿自取辱焉諄諄然如不能僕懦夫也因是而自誨及其宴也太庖具酒車傾鄭衛之女列於賔席之末俳優侏儒設於公堂之下晝日不足繼之以燭使夫膳夫歘來酌曰曠飲斯必當見輿曵之無筭又焉得終其詞哉使我不言適其宜也今者追想韋湖南猶孔門之訓其他則吾不知因縱言之以報公理示之議當矣又何以規議旣成客或謂祐甫曰韋湖南魏江西二觀察頗甞知其風味公直簡諒則魏先之飾情强仁韋之志也今吾子之論無乃剥魏而附韋乎且子魏之上介也論議不隱恐非春秋内魯故宋之義盍辯焉祐甫應之曰噫寧以他規我是論也吾復之熟之有日矣韋湖南之晉飾情强仁誠如來議禮不云乎先王制禮賢者俯而就之不肖者企而及之子張曰先王制禮不敢不至焉韋氏之喪朋友縱不由衷亦與夫二者之義合矣吾雖欲不與其可得哉至於故府公魏尚書公直簡諒清身敬職郡人戴於下朝聽滿於上狼藉甚盛豈造次之所盡哉但於邢副使之喪若忍悲而就宴可謂哀樂失其節乃左氏傳所載樂祁告人曰君與叔孫其皆死乎及子招樂憂謂也者情不至焉率而爲宴則禮經所謂直情而徑行者戎狄之道也吾雖欲勿議又不可得也且吾之所論者因皇甫公理所著喪朋友議故縱言及之非敢定二觀察之襃貶湖南吾取節焉而巳矣來議又以吾甞爲魏公使介今兹著論異於春秋隱魯故宋者兹又近而非中也僕射雖不腆中臺之劇曹郎且兼柱下史有名於著定矣受命爲尚書介彌縫潤色之職事安可見責以敬故君之祀嗚呼晉悼公魏絳之君也絳戮悼公之弟韓厥趙宣之所任也厥僕宣子之僕及其終也悼公謝魏絳曰無重寡人之過宣子曰可賀我矣而絳厥無罪焉豈當不懷重公平世論議之與刑罰當豈異哉子何見過深也嗚呼天下有至公有至當知賢而舉用之至公也臨事而平處之至當也各守其分復何尤哉自漢徐孺子於故舉主之䘮徒歩千里而行一祭厚則厚矣其於傳繼非可也歷代莫之非也近日張荆州九齡又刻石而美之於是後來之受舉爲參佐者報恩之分往往過當或撓我王憲捨其親戚之罪負舉其不令子孫以竊名位背公死黨兹或近之時論從而與之通人又不救遂往而不返徐生徐生得非失中之履霜也常積憤懣因而書之重校正唐文粹卷第四十二
