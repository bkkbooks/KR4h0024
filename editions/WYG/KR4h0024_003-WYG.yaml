body:
  text: 古賦丙摠三首進三大禮賦表杜甫朝獻太清宫賦朝享太廟賦有事于南郊賦天寶十三載進三大禮賦表杜甫臣甫言臣生長陛下淳樸之俗行四十載矣與麋鹿同羣而處浪跡於陛下豐草長林實自弱冠之年矣豈九州牧伯不嵗貢豪俊於外豈陛下明詔不側席思賢於中哉臣之愚頑靜無所取以此知分沈埋盛時不敢依違不敢激訐以漁樵之樂自遣而已頃者賣藥都市寄食友朋竊慕堯翁擊壤之謳適遇國家郊廟之禮不覺手足蹈舞形于篇章漱吮甘液游泳和氣聲韻寖廣巻軸斯存抑亦古詩之流希乎述者之意然辭理野質終不足以拂天聽之崇髙配史籍以永乆恐倏先狗馬遺恨九原謹稽首投延恩匭獻納上表進明主朝獻太清宫朝享太廟有事於南郊等三賦以聞臣甫誠惶誠恐頓首頓首謹言朝獻太清宫賦冬十有一月天子既納處士之議承漢􅁇周革弊用古勒崇揚休明年孟陬將攄大禮以相籍越彞倫而莫儔歴良辰而戒吉分祀事而孔修營室主夫宗廟乗輿備乎冕裘甲子王以昧爽春寒薄而清浮虚閶闔逗蚩尤張猛馬出騰虯捎熒惑墯汀火反旄頭風伯扶道雷公挾輈通天台之雙闕警溟漲之十洲浩劫礨砢萬山颼飀欻臻于長樂之舍嵬入乎崑崙之邱太一奉引庖犧在右堯步舜趨禹馳湯驟鬱閟宫之嵂崒坼元氣以經構㫁紫雲而竦牆撫流沙而承霤紛墮珠而陷碧㸌波錦而浪繡森青冥而欲雨赩光烱而初晝於是翠蕤俄的藻藉舒就祝融擲火以焚香溪女捧盤而盥漱羣有司之望幸辨名物之難究瓊漿自間於粢盛羽客先來於介胄爍聖祖之儲祉敬雲孫而及此詔軒轅使合符勑王喬以視履積昭感於嗣續匪正辭於祝史若肸蠁之有憑肅風飈而乍起揚流蘇於浮柱金英霏而披靡擬雜佩於曽巔芝蓋欹以颯纚中漎漎以迴復外蕭蕭而未已上穆然注道為身覺天傾耳陳僣號於五代復戰國於千祀曰嗚呼昔蒼生纒孟徳之禍為仲達所愚鑿齒其俗窫窳其孤赤烏髙飛不肯止其屋黄龍哮吼不肯負其圖伊神器臬兀而小人呴喻厯紀大破瘡痍未蘇尚攫拏於吳蜀又顛躓於羯胡縱羣雄之發憤誰一統於亨衢在拓跋與宇文豈風塵之不殊比聰瘣及堅特渾􅆛豹而齊驅愁隂鬼嘯落日梟呼各擁兵甲俱穪國都且耕且戰何有何無惟累聖之徽典恭淑慎以允緝兹火土之相生非符䜟之備及煬帝終暴叔寶初襲編簡尚新義旗爰入既清國難方覩家給竊以為數子自誣敢貞乎五行攸執而觀者潛晤或喜至於泣矧鱗介以之鳴簴昆蚑以之振蟄感而遂通罔不具集仡神光而􅛦閜羅詭異以戢孴地軸傾而融曳洞宫儼以嶷岌九天之雲下垂四海之水皆立鳯鳥威遲而不去鯨魚屈矯以相吸掃大始之含靈巻殊形而可挹則有虹蜺為鈎帶者入自於東掲莽蒼履崆峒素髪漠漠至精濃濃條㢮張於巨細覬披冩於心胷蓋脩竿無隟而仄席已容裂手中之黒簿睨堂下之金鍾得非擬斯人於夀域明返樸於𤣥蹤忽翳日而翻萬象却浮空而留六龍咸讋跖而壯兹應終蒼黄而昧所従上猶色若不足處之彌恭天師張道陵等洎左𤣥君者前千二百官吏謁而進曰今王巨唐帝之苗裔坤之紀綱土配君服宫尊臣商數起得統特立中央且大樂在懸黄鐘冠八音之首太昊斯啟青陸獻千春之祥曠哉勤力耳目宜乎大帶斧裳故風后孔甲充其佐山稽岐伯翼其傍至於易制取法足以朝登五帝夕宿三皇信周武之多幸存漢祖之自强且近朝之濫吹仍改卜乎祠堂初降素車終勤恤其後有客白馬固漂淪不忘伊庶人得議寔邦家之光臣道陵等試本之於青簡探之於縹囊列聖有差夫子聞斯於老氏好問自乆宰我同科於季康敢撥亂返正乃此其所長萬神開八駿迴旗掩月車畜雷騫七曜燭九垓能事穎脫清光大來或曰今太平之人莫不優游以自得況是蹴魏踏晉批周抉隋之後與乎更始者哉朝享太廟賦初高祖太宗之櫛風沐雨勞身焦思用黄鉞白旄者五年而天下始一歴三朝而戮力今庶績之大備上方采龎俗之謡㮷正統之類蓋王者盛事臣聞之於里曰昔武徳已前黔黎蕭條無復生意遭鯨鯢之蕩汨荒嵗月而沸渭衮服紛紛朝廷多閏者仍亘乎晉魏臣竊以自赤精之衰歇曠千嵗而無真人及黄圖之經綸息五行而歸厚地則知至數不可以乆缺凡材不可以長寄故髙下相形而尊卑各異惟神㫁繫之於是本先帝取之以義壬辰既格于道祖乗輿即以是日致齋于九室所以昭達孝之誠所以明經天之質具禮有素六官咸秩大輅每出或黎元不知豐年則多而筐筥甚實既而太尉㕘乗司僕扈蹕望重闉以肅恭順法駕之徐疾公卿淳古士卒精一黕宗廟之愈深抵職司之所密宿翠華於外户曙黄屋於通術氣凄凄於前旒光靡靡於嘉栗階有賓阼帳有甲乙升降之際見玉柱生芝擊拊之初覺鈞天合律簨簴仡以碣磍千戚宛而婆娑鞉鼔塤箎為之主鐘磬竽瑟以之和雲門咸池取之至空桑孤竹貴之多八音循通既比乎旭日升而氛埃滅萬舞陵亂又似乎春風壯而江海波鳥不敢飛而𤣥甲􅝧嵺以岳峙象不敢去而鳴佩剡爚以星羅已而上乾豆以登謌美休成之既享璧玉儲精以稠疊門欄洞豁而森爽黒帝歸寒而激昻蒼靈戒曉而來往熙事莽而充塞羣心麌以振蕩桐花未吐孫枝之鸞鳯相鮮雲氣何多宫井之蛟龍亂上若夫生𢎞佐命之道死配貴神之列則殷劉房魏之勲是可以中摩伊吕上冠夔卨代天之工為人之傑丹青滿地松竹髙節自唐興已來若此時哲皆朝有數四名垂卓絶向不遇返正撥亂之主君臣父子之别奕葉文武之雄注意生靈之切雖前輩之温良寛大豪俊果決曽何以措其筋力與韜鈐載其刀筆與喉舌使祭則與食則血若斯之盛而已爾乃直于主索于祊警幽全之物散純道之精蓋我后常用惟時克真膋以蕭合酌以茅明嘏以慈告祝以孝成故天意張皇不敢殘其瑞神姦妥帖不敢秘其精而撫絶軌享鴻名者矣于以奏永安于以奏王夏福禳禳於絳闕芳霏霏於玉斚舜祠宗廟以玉斚也沛枯骨而破聾盲施殀胎而逮鰥寡園陵動色躍在藻之泉魚弓劒皆鳴汗鑄金之風馬霜露堪吸禎祥可把曾宫歔欷隂事儼雅薄清輝於鼎湖之上静餘響於蒼梧之野窅然漠漠惕然兢兢紛益所慕若不自勝瞰牙旗而獨立吟翠駮而未乗五老侍祠而精駭千官逖聽而思凝於是二丞相進曰陛下應道而作惟天與能澆訛散淳朴登尚猶日慎業業孝思烝烝恐一物之失所懼先王之咎徵如此之勤恤匪懈是百姓何以報夫元首在臣等何以充其股肱且如周宣之教親不暇孝武之淫祀相仍諸侯敢於迫脅方士奮其威棱一則以微言勸内一則以輕舉虚馮又非陛下恢廓緒業其瑣細亦曷足稱丞相退上跼天蹐地授綏登車伊澒洞槍櫐先出為儲胥本枝根株乎萬代睿想經緯乎六虚甲午方有事於綵壇紺席宿夫行所如初有事于南郊賦蓋主上兆於南郊聿懐多福者舊矣今兹練時日就陽位之美又所以厚祖考通神明而已職在宗伯首崇禋祀先是春官修頌祗之書獻祭天之紀令泰龜而不昧俟萬乗之將履掌次閱氊邸之則封人考壝宫之㫖司門轉致乎牲牢之繫小胥専達乎懸位之使二之日朝廟之禮既畢天子蒼然視於無形澹然若有所聽又齋心於宿設將旰食而匪寧旌門坡陀以前騖彀騎反覆以相經頓曾城之軋軋軼萬户之熒熒馳道端而如砥浴日上而如萍製翠毛於華蓋之角彗黄屋於勾陳之星神仙戍削以落羽魍魎幽憂以固扃戰岐慄華擺渭掉涇地回回而風淅淅天泱泱而氣清清甲胄乗陵轉迅雷於荆門巫峽玉帛清迥霽夕雨於瀟湘洞庭於是乗輿霈然乃作翳夫鸞鳯將至以冲融􅋁廓不可乎彌度聲明通乎純粹溟涬為之垠堮駟蒼螭而蜿蜒若無骨以柔順奔烏獲之黝蟉徒有勢於殺縛朱輪竟野而杳冥金鍛成隂以結絡吹堪輿以軒輊槍寒暑以前却中營密擁乎太陽宸眷𦕈臨乎長薄熊羆弭耳以相䑛虎豹髙跳以虚攫上方將降帷宫之綝縭屏玉􅋴以蠼略人門行馬以拱乎合沓之場皮弁大裘始進於穹崇之幕衝牙鏗鏘以將集周衛轇轕而咸若月窟黒而扶桑寒田燭稠而曉星落肅定位以告絜藹嚴上而清超雲菡萏以張蓋春葳蕤以建杓簮裾斐斐樽俎蕭蕭方面曲折周旋寂􅋁必本於天王宫與夜明相射動而之地山林與川谷俱標於是乎官有御事有職所以敬鬼神所以勤稼穡所以報本反始所以度長立極𤣥酒明水之上越席疏布之則必取先於稻林麴蘖之勤必取著於紛純丈繡之飾雖三牲八簋豐備以相沼而蒼璧黄琮實歸乎正色先王之丕業􅁇起信可以永其昭配羣望之徧祭在斯示有以明其翼戴由是播其聲音以陳列従乎節奏以進退韶夏護武采之於訓謨鍾石陶匏具之於梗槩變萬形於動植聽宫徴於砰礚英華發外非因乎簨簴之髙和順積中不在乎雷鼓之大既而臠骨胿􅇢柴燎窟塊騞璧砉赫葩斜晦潰電纒風升雪颯星碎拂勿侹濙𦕈溟蓯淬聖慮岑寂𤣥黄増霈蒼生顒昻毛髪清籟雷公河伯或􅛖騃以脩聳霜女江妃乍紛綸而晻曖執紱秉翟朱干玉戚鼔瑟吹笙金支翠旌神光倏斂祀事虚明於是涾乎渙汗紆餘乎經營浸朱崖而灑朔漠洶暘谷而濡若英耆艾涕而童子儛叢棘折而狴牢傾是率土之濱覃酺醵以涵泳非奉郊之縣獨宴慰以縱横𤣥澤淡泞乎無極殷薦綢繆乎至精稽古之時屢應符而合契聖人有作不逆寡而雄成爾乃孤卿侯伯羣儒三老儼而絶皮軒趨帳殿稽首曰臣聞燧人氏已往法度難知文質未變太昊氏􅁇天而王根啟閉於厥初以木傳子攄終始而可見洎虞夏殷周兹煥炳而葱蒨秦失之於狼貪蠶食漢綴之以蛇㫁龍戰中莽茫茫夫何従聖蓄縮曽不下眷伏惟道祖視生靈之磔裂醜害馬之蹄囓呵五精之息肩考正氣之無轍協夫貽孫以降使之造命更挈累聖昭洗中祚觸蹶氣􅃤黷乎脂夜之妖勢迴薄乎龍蛇之孽伏惟陛下勃然憤激之際天闗不敢旅拒鬼神為之嗚咽髙衢騰塵長劒吼血尊卑配宇縣刷揷紫極之將頽拾清芬於已缺鑪之以仁義鍜之以賢哲聨祖宗之耿光巻夷狄之彯撇蓋九五之後人人自以遭唐虞四十年來家家自以為稷卨王綱近古而不軌天聽貞觀以髙掲蠢爾差僣粲然優劣宜其課密於空積忽微刋定於興廢􅁇絶而後覩數統従首八音六律而惟新日起筭外一字千金而不滅上曰吁昊天有成命惟五聖以受我其夙夜匪遑寔用素樸以守于嗟乎麟鳯胡為乎郊藪豈上帝之降鑒及兹𤣥元之垂裕于後夫聖以百年為鶉􅑹道以萬物為芻狗今何以茫茫臨乎八極眇眇註乎羣后端䇿拂龜於周漢之餘緩步闊視於魏晉之首斯上古成法蓋其人已朽不足道也於是天子黙然而徐思終將固之又固之意不在抑殊方之貢亦不必廣無用之祠金馬碧雞非理人之術珊瑚翡翠此一物何疑奉郊廟以為寶増怵惕以孜孜況大庭氏之時六龍飛御之歸唐文粹巻三欽定四庫全書唐文粹巻四宋姚鉉編
