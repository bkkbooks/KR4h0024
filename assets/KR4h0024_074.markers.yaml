  - {type: variant, offset: 3283, length: 1, content: 強, WYG: 至越活筵走奏􅖩彚呼去族譟雖黄度展和不能不憮而斁嚮之歴舉四美悉估而倍之不足贖矣予春至逮秋偶步池北得小亭之直上居然最勝因命植棟鬬梁出城屋之脊周方數間小亭如初而中與諸樓相差}
  - {type: variant, offset: 3285, length: 2, content: 􅌤𬗟, WYG: 自為一地其上則朗出髙際平與空等嚮所謂越譟者不復遊慮則其四美不俟説而聞不假到而見非聞非見其然也始聞始見其嚮之未必然也且聞且見而今之所以然也嚮既舉槩今不可黙夫北望條風清暑之流皆偏擅攸戡莫全厥美或能伸左臂或睇右目或獨全正面揔而有諸則我無許斯又不聞不見而以其然為然矣郡以谿山著名而谿小負則叠嶂之命為宜至於欄干蹋道沙子門户等咸有曲㫖成於新致舉之則縷將煩於槩故抑之而中地亦晦而不彰咸通十二年十二月辛亥宣州刺史獨孤霖書李白酒樓記沈光有唐咸通辛巳嵗正月壬午吳興沈光過任城題李白酒樓夫觸强者靦緬}
