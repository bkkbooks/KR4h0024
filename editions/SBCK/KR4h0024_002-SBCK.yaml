front:
  text: 重校正唐文粹卷第二
  hash: sha256:0d88904aad5aa7f015f728b7ff55cc7b50c8399f9e865ce6e7ee95cc73056fb8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0024_SBCK_002-1a}
body:
  text: 吳興姚鉉纂古賦乙揔二首京都西都賦李􅁃東都賦西都賦并表李􅁃臣伏見漢諸儒若班固張衡者皆賦都邑盛稱漢隆當王道昇平火德丕赫數子歌詠發著後代今自隋室遷都而我宅焉廣狹榮陋與漢殊狀言時則有六姓千齡之變言地則非秦基周室之故冝乎稱漢於彼述我於此臣幸生聖時天下休樂雖未及固衡之位敢效臯陶奚斯庶幾之誠謹冐死再拜獻兩都賦凡若干言以詘夸漢者昭聞我十四聖之制度請付史氏賦曰洛汭先生客于上京問里人以秦漢咸陽故事里人曰先生不習乎哉秦趾薪矣漢址蕪矣西去一舎鞠爲墟矣代逺時移作新都矣先生曰賔者不識藐然沈懵歲亡而日逺願聞古而知今爲我源說恭承玉音里人曰昔者帝兆唐居命隋先基乃假隋權是開中原旣權二年爲唐遷都周榛秦莽平無枿餘文驅煬迎平于侑傳若天使項氏死勞而授漢休也唐開禪壇新都之門闢殿軋宫以朝諸侯時則有若房魏作弼英鄂執律南陽故人河間帝室戎衣旣稅瑞氣洋溢讙聲傳於億兆煬燎致乎太一乃㑹漢酺發周賚謐萬􅁼渟四海遂開國以報功差子男之五等然後構閣圖形榮號凌煙指河帶以山礪書天子之搢紳其制度也擁乾休正坤儀平兩曜據北辰斥咸陽而㑹龍首右社稷而左宗廟宣達周衢址以十二棊張府寺局以百吏環以文昌二十四署六部提統按星分度儼憲臺而四列肅隂宫於北戸建倍貟下揔維綱於御史端國儀朝實周察乎左右其内則有太極承端通址含元日岀東榮月沈西軒􅀝九峻之下麓涵太液之清瀾龍道􅀟迴鳳門五開煙籠凝碧風靜蓬萊東則左閤當辰延英眈耽宣徽洞逹温室隅南接以重離緜乎少陽是爲二宫複道􅃉廊西則月華重啓銀臺内向中書在焉密用宰相宦者别省延縁右藏建子亭於屏外設蘭錡於廡下天子端朝明庭九賔發少府之冕旒陳奉常之官勲肅勾陳以辟護翼雉扇而對分雞人乃下鶴鳴先聞千官就日萬品趨雲漏遲遲而東轉風習習而南薰外則國子招徒䟽舘開軒左立太學前惇廣文膳豐中厨就敎九年稽以博士緫之成均秘書典籍品命校郎橫閣三重闡正鈆黃若六藝之條貫百氏之縱横交錯發論禮形而樂聲太傅在前少傅在後載言載筆出納謨誥鵷動鸞飛振玉鎗金殷廟羞瑚璉之器楚材慙􅂎梓之林巳而爕和隂陽經緯天地採摭軒昊牢籠虞夏闢孔子之學堂敷一代之風雅此王者之文教也親兵百萬制以神䇿紫身豹首金􅆎火額獵霞張斾剥犀綴革奮目如虎眦振髯而蝟磔柔六鈞貫七扎對天仗以司戈分玉墀而執㦸别有陳旌賜􅃏閫外四十依榆􅀜以作鎭拒栁營而開壁逐虜則岀塞飛塵伐叛則救陽作澤此王者之武威也唐禮旣行三代同風徴叔孫之春官命伯夷之秩宗則有封禪巡狩謁天拜祖明堂辟雍王者之事有司勿失有朝廷之位班爵之序器服車馬以節文武不􅆫不濫羣臣之事有司以告下有内族外姻以殺以隆五禮各殊陳􅁻儀凶一室是形天下大同百姓之事有司以教故以内則敬以外則嚴以家則肥以國則昌􅀸士翼翼公侯皇皇在野熈熈在朝蹌蹌夫如是夸周而正魯胡可殫詳洎乎樂之設也以德配樂陳器以作革木匏竹簨簴磬鎛命官二署諧以協律以奏廟貌祖考來格以陳宫庭簫韶九成鳯凰來儀以布天下手之舞之足之蹈之及乎御胤衣集舞童或獻凱作名以宣帝功或布字綴行以達皇風此禮經之所未紀䕫戞之所不同刑期無刑以辟止辟三章寘漢祖之德肆赦緩穆王之法於是天子御端門詔天下渙汗發澤與民更始建金雞於仗内聳脩竿而揭起其下則稅三􅀜解銀鐺追共工徙驩兠昭舜弦浹堯年臺收白簡吏閣丹筆揔秋官之計料不踰乎三十斥匡衡之失論罪温舒之不足司刑無􅀑哭之庭大理有烏巢之獄又若薦祖建宫玄元之庭霞披雲冠飄飄太清天子將有事也歲豆時籩夏簋殷鉶傳金爐之御煙開甲帳之琳琅此王者之示孝也對里連街帝宅王家青門列檻棠棣分華勤政外名花蕚中題屹雲中而佩鳯杳天外而舒蜺於是天子設席千羞百醴家人齒筵愉愉濟濟此王者之示悌也盛則長隄砥平錯則纓弁繁夥佩印分魚九叅六佐肅威儀於行蓋􅃌戒途於前馬待漏未開朝􅀐沓街雞鳴朱邸火度青槐先導擘雲後車奮雷遞以嚴聲不生微埃人寒勿慄統以京尹臨人殺柄罔敢不謹豪家戚里金張許史走􅀐如龍行車若水拉枯請命曽不仰視配前王與後趙固異代而殊擬其地勢也􅀒秦章臺􅀝漢甘泉帶涇渭之冨流挾終南之壽山指重城之二華拓外門於兩􅀜玄素交川灞滻在焉斷虹偃蹇而亘梁拖輪走驟而蹄奔度萬國以向朝趨魏闕之通門赤縣統劇停阡帝鄕長安萬年乾封明堂藍田左掎鄠杜前張分坼連乎馮翊畫郊接乎􅄮陽排吳山而抵蜀亘五谷而通商天子穆清環衛陳兵將軍之號三蕃六營至乃辨曉警昏主在金吾鼓列六條外傳通衢備以嚴兵羅以周廬禁動人息用戒不虞其中則御水分溝昆明下流在野決漑入宫環洲菰織蒲紉芡䞇菱羞渚戲玄鷁沙眠白鷗其逺也深有蛟澤派作龍湫涘接河漢波通女牛其近也方塘含春曲沼澄秋戸閉煙浦家藏畫舟爾乃農家東作厥土黃壤樹以桑柘翳薈乎南􅅿以秔以稌以􅁰以稷以輸太倉天子之儲土厚地中温寒以冝門多杖老室有蕃兒承化發謡帝力不知則有程鄭之家白闥朱軿推基峻砌待駟高門木秀茸葩紅舒緑繁挺碩果於華林育豐􅂼於中園珠箔晝晴金釭夜明羅繡巾㡚鼔瑟吹笙譁族陳賔以樂乎太平貨隧分􅌀物次駢連中署肆帥夕咽朝昏越璞楚琛蜀賄巴賨裁綺張繡紋軸蕉筒聲教之所被車書之所通交錯雜沓斯焉㑹同黃宅緇廬金篆玉扃以張帝居用壯天廷千形萬聲不可多名天子奉堯舜之道勤后稷之功當仲夏而獻繭立中和而視農然後黼黻時備粢盛告豐其接下情也則堯鼔不懸晉木不列鎔金作䡄四門是揭人靡迷􅀖士無諱訐示􅀵材而問眚上諌行而寛逹當其萬國貢珍四夷納賮賦用舟通財因輦進地官計國度支立吝百姓旣足斯焉充牣復若天府萬品以備供職登饌則光禄獻厨命駕則太僕承軾其樂人也啓九重開三殿齒羣官於次坐徴公族於内宴于以訓恭儉于以示慈惠戲族咸在百弄迭改眎仙童之霓裳覩壯夫之角觝御階晝隂帝座春深􅌭紛宦闥窈窕嬪林旣受賜於逮昏盡拜帛而懷金與衆之樂一日於此先生獨不習乎其四郊也或有乗時之舊址亡國之遺蹤天子迎四氣盡然改容曰是足以懷傷於耳目作戒於心胷昔秦政肆刑秦民共傾楚澤大呼分隳列城徒罷驪山役休上林秦址旣遷鴻門至今此東郊之事也隋􅁐廣袤罝籠南山占地萬頃不爲人間齊門失耕禽游獸閑代謝物移繚垣不完此南郊之事也空水悠悠文王作周傳艱子孫衰平遂遷乃睠鎬都武王宅居國失赧死豐鎬皆蕪此西郊之事也漢設五畤以主淫祀欒誑徐誣將求永乆天子親拜太牢􅁰牡事亡地存爲天下􅀏此北郊之事也故因迎春則鑒秦敗知恃刑不如恃德也因迎夏則鑒隋怠知獵獸不如獵賢也因迎秋則鑒周勤知祖基作艱傳萬年也因迎冬則鑒漢誤知去􅁋即正獲天祚也四鑒以陳澤于生人四德巳懋格于上下故我髙祖一呼大定安都居正傳今皇帝一十四聖是知禪國也禪都也非得隋之命是得天之命東都賦先生曰冨哉言乎堯舜之事吾知之矣然天地旁魄奥區不一九衢六陌亦稱河洛始乎周卜今自隋革進十八里作唐東宅成者居者余得其故用悉聞見丕我王度子不識乎顚煬奮華中原毒痡順天應人文皇赫圖王充不來建德相依阻我東人不蘇義旗髙祖西安文皇武千一挂戎衣我人保完彭城獻級東功乃立則創業之事不獨于西也高祖至于后朝匪伊是居於焉逍遥明帝文同出震開宫恩波爾鄕􅂥源于東則太平之事不獨于鎬也若乃周洛爲池帶漕爲沼洞八門之㑹要控二梁之夭矯在隋之始移劃前規之隘侈舊制之陋指半舎而新布乃集工而戒就重城不居萬盜齊構訖大業於義寧廓皇家而遜授旣而天踵以正地産以實禎祥以紀嘉名不一表賢則河水變清瑞聖則洛圖屢岀帝功旣成封禪禮行顯祖光宗勒岱而祈嵩我甸我郊三聖之靈壇在焉赤縣神州與京比儔逕東山之貢賦扼􅀜外之諸侯直齊梁而駕路引淮汴而通舟太行枕甸發址崇垓覃懷鎭封上干昭回鑿門導伊兩阜屏開育仁頥智堂隅庭隈爾其左掖通東右掖洞西籠故地之銅駞抱舊里之玉雞御溝接派苑樹通堤抗鳯樓於内庭矗端門於天街上陽别宫丹粉多狀鴛瓦鱗翠虹梁疊壯橫延百堵高量十丈出地標圖臨流寫障霄􅀝霞連屹屹言言翼大和而聳觀側賔曜而䟽軒若蓬萊之眞侣瀛洲之列仙鸞駕鶴車往來于中天嚴城曉啓千門萬戸建衛對營開扄接牖翠華在鎬分官以守監署惟三􅀸曹止九臺閣高閌支馭東方乃俾二官别持憲綱赫若夏日澟如秋霜威動乎甌閩之國風行乎燕薊之鄉郊圻作國屯兵孟津千里無煙萬夫狺狺實兼武牢以食濟温唯是咽喉屬于將軍禮樂所流厥惟舊周追魯俗而爲鄰化殷頑而作柔異材挺擢多士優游原膴膴而耕溺水濺濺而洗由士得天爵孝稱行原身行大節里有旌門以繼前脩以垂後昆榮一時之史籍聳當代之人倫兄友弟恭位皆崇榮石記標衢棣蕚爲名螭首􅀛趺嶷峙􅀟形指兩馮而遠邁對二陸而遐征至若里巷之新名閭閻之近革或區區於傳說或􅃈􅃈於典􅁽非儆戒於將來何侈言之敢作且二誥尚存始􅁲惟艱四姓所都季年乃遷或得于聞或得于傳幸子勿譁試爲子發乎齒牙里人曰諾先生曰郟鄏之地中居帝域賢相聖營􅀛符墨食成王定鼎以休􅁎德三十承孫八百祚年祖功寖微衰平乃遷幽用婦烽諸侯疾怨夷元敬朔太史不頒百派分波爭涸其源汜水而鄭陽翟而韓晉盟河陽秦戍新安一旅之兵一雷之土嬴氏乗之不享文武此周之失都也南陽眞人復運漢基舊􅀖惟新上稱康時光武而釀明醴和醨沖質不長􅁊靈自縱后戚立權内官分弄四星耀斗百桷摧棟陽弱隂強劉輕曹重此後漢之失都也魏丕徙許促齡四十強臣執柄三嗣徒立政由寗氏王髠莫奮瓦解土崩炎居奐遜此魏之失都也晉始三丗亂興永嘉蕭牆構兵沈閼稱戈浩浩逆流天下墊波八王旣分五馬南奔左衽之裘乃來中原此西晉之失都也故權在諸侯則􅁎氏平權在内后則漢室傾權在強臣則魏狃權在親戚則晉走是四者各以其故權興勢移都隨鼎去從古如斯謂之何如丗治則都丗亂則墟時清則優偃政弊則戚居勿謂往代試言前載開元太平海波不驚乃駕神都東人誇榮時則轔轔其車殷殷其徒行者不賫衣食委衢冠冕之大綺羅之婦百室連歌千筵接舞高樓大觀陳賔宴侣金堂玉戸絲鳴管語我道如堯我稅如貉貧􅁃而稻賤笥而裼比屋相視恥衣空帛開塲分賜不列麰麥同􅁤同文晝呼夜讙父懌子愉去徑即盤旣兆旣億動動植植無聲之樂薰然不息稽成康之周隆考文景之漢休攉代繫時不爲彼優我俗旣饒我人旣驕安不思危逸而忘勞故天寶之季漁陽兵起逆旗南指我無堅壘帀甸鼙動衝天羯腥門開麗景殿據武成殺人如刈焚廬若薙蜀駕先移胤師後誓傷四年之委燼奮二將以建勲天落妖彗風摧陣雲及夫掃臺榭之􅁅收京野之骨徴郡國之版在驗地官之籍列太平之人巳十無七八至德復興六紀于兹七聖儲休平雍補夷故含識之士女植髮之童兒皆能痛其䘮亂而期我康時今四方之事叟不知也惟洛泱泱濵盈萬室惟城職職市鄽軿集比年大有稍藏以實都人嬉賀有􅀏無慄咸曰將睹乎貞觀之風開元之日鄕里之人思萬乗之威儀幸物阜而時和指康衢而引領作望幸之賡歌歌曰曉雲行􅀆西風慶揺裔􅀆龍在中望雲光􅀆拜千百西澤霈􅀆均東澤里人曰誠哉是言前年日南至天子謁太清宫太廟郊天祀地旣畢事執謙端珽謂公􅀸大夫曰予在人上歷祀三四年􅂖比登未及于冨人庶稍蕃未臻于壽動殖小遂猶有枯天日月所至猶照叛土戎狄雖貢西地猶虜今行大禮得不愧望于天而獻羞于祖是尚以聖政爲憂未意於行幸也先生曰大哉爲君用是言也治是事也則千里如郊萬里如圻在西而東均處内而外肥吾歸息鄕里之謡安堯舜之時將齊驅於壽域何近喜而逺悲則知鑒四姓之覆轍嗣重葉之休烈用是言也理是事也即所都者在東在西可也重校正唐文粹卷第二
