  - {type: variant, offset: 5474, length: 0, content: '', WYG: 之羽文於旌旄登龍於章升玊於藻百工婦人彫礱涂涷以供宗廟祭祀之文豈獨蛻也生知效用不及時文㢤然而意常獲助於天而不獲助於人故其雖窮無憾也當勤意之時不敢啑不敢咳不敢唾不敢跂倚耆欲躁競忘之於心其祗祗畏畏如臨上帝故有粲如星光如貝氣如蛟宫之水又有黯如屯雲如久陰如枯腐熬燥之色則有如春陽如華川逶逶迤迤則有如海運如震怒動蕩怪異夫十為文不滿不如意少如意則豈非天助乎常欲使天下聞之而必行觀之而必蹈散之茫洋以為道演之浸淫以及物然後為農文之使風雨以時兵文之使戎虜以順文於野文於市使其所隠之士以出口者使之言材者使之用然而自振者無力終知者甚稀豈非不獲人助乎嗚呼十五年矣實得二千一百八十紙有塗者乙者有注揩者有覆背者有朱墨圍者於是以周易筮之遇復震下坤上之同人離下乾上筮者曰鳴于地中殷殷隆隆七日而復復來而天下昭融乎他日更召龜而合将聴襲吉卜於火}
