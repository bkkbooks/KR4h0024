body:
  text: 吳興姚鉉纂碑十六釋四碑隂記附揔九首荆州玉泉寺大通禪師碑張說潤州鶴林寺故徑山大師碑李華牛頭第一祖融大師新塔記附劉禹錫章敬寺百巗禪師碑權德與漳州三平大師碑王諷楊州華林寺大悲禪師碑賈餗洪州開元寺石門道一禪師塔碑權德輿無姓和尚碑柳宗元碑隂記附荆州玉泉寺大通禪師碑銘并序張說譔夫揔四大者成乎身矣立萬始者主乎心矣身是虚哉即身見空始同妙用心非實也觀心若幻乃等眞如名數入焉妙本乖言說出焉眞宗隱故如來有意傳要道力持至德萬劫而遥付法印一念而頓授佛身誰其弘之實大通禪師其人也禪師尊稱大通諱神秀本姓李陳留尉氏人也心洞九漏懸解先覺身長八尺秀眉大耳應王伯之象合聖賢之度少爲諸生遊問江表老莊玄旨書易大義三乗經論四分律儀說通訓詁音叅吳晉爛乎如襲孔翠玲然如振金玉旣而獨鑒濳發多聞旁施逮知天命之年自拔人間之世企聞蘄州有忍禪師禪門之法胤也自菩提達磨天竺東來以法傳惠可惠可傳僧璨僧璨傳道信道信傳弘忍繼明重跡相承五光乃不逺遐阻飜飛謁詣虚受與沃心懸㑹髙悟與眞乗同轍繣指忘識湛見本心住寂滅境行無是處有師而成即燃燈佛所無依而說是空王法門服勤六年不捨晝夜大師歎曰東山之法盡在秀矣命之洗足引之並坐於是涕辭而去退藏於密儀鳳中始隷玉泉名在僧録寺東七里地坦山雄目之曰此正楞伽孤峯度門蘭若䕃松藉草吾將老焉雲從龍風從虎大道出賢人覩𡵨陽之地就去成都華隂之山學來如市未云多也後進得以拂三有超四禪升堂七十味道三千不是過也爾其開法大略則惠念以息想極力以攝心其入也品均凡聖其到也行無前後趣定之前萬縁盡閉發慧之後一切皆如特奉楞伽遞爲心要過此以往未之或知乆視年中禪師春秋髙矣詔請而來趺坐覲君肩輿上殿屈萬乗而稽首灑九重而宴居傳聖道者不北面有盛德者無臣禮遂推爲兩京法主三帝國師仰佛日之再中慶優曇之一現然處都邑婉其祕旨每帝王分座后妃臨席鵷鷺四帀龍象三繞時熾炭待礦故對黙而心降時賑飢投味故告約而義領一雨溥霑於衆縁萬籟各吹於本分非夫安住無畏應變無方者孰能至爾乎聖敬日崇朝恩代積當陽初㑹之所置寺曰度門尉氏先人之宅置寺曰報恩軾閭名郷表德非儗局猒諠輦長懷虚壑累乞還山旣聽中駐乆矣衰憊無他患苦魄散神全形遺力謝神龍二年二月二十八日夜中顧命趺坐汨如化滅禪師武德八年乙酉受具於天宫至是年丙午復終於此寺蓋僧臘八十矣生於隋末百有餘歲未甞自言故人莫審其數也三界火心四部冰背榱崩梁壞雷動雨泣凡諸寶身生是金口故其喪也如執親焉詔使弔哀侯王歸賵三月二日冊謚大通展飾終之義禮也時厥五日假安闕塞緩及葬之期懷也宸駕臨訣至午橋王公悲送至伊水羽儀陳設至山龕仲秋旣望還詔乃下帝諾先許冥遂宿心太常卿鼓吹導引城門郎護監喪葬是日天子出龍門泫金攏登高停蹕目盡迴輿自伊及江扶道哀候幡花百輦香雲千里維十月哉生魄明即舊居後岡安神起塔國錢嚴飾賜逾百萬巨鍾是先帝所鑄羣經是後皇所錫金牓御題華幡内造塔寺尊重逺稱標絶𥘉禪師形解東洛相見南荆白霧積晦於禪山素蓮寄生於坐樹則雙林變色泗水逆流至人違代同符異感百日卒哭也在龍華寺設大㑹八千人度二七入二祥練縞也咸就西明道場數如前㑹萬迴菩薩乞施後宮寶衣盈箱珍價敵國親舉寵費侑供巡香其廣福慱因存没如此日月逾邁榮落相推於戲法子永戀宗極痛慈舟之遽失恨涌塔之遟開石城之歎也不孤廬山之碑焉可作竊比夫子貢之論夫子也生於天地不知天地之髙厚飲於江海不知江海之廣深強名無跡以慰其心銘曰額珠内隱匪指莫效心鏡外塵匪磨莫照海藏安靜風識牽樂不入度門孰探法要倬哉禪伯獨立天下功收密詣解郤名假詣無所得解亦都捨月影空如現於悟者無量善衆爲父爲師露清熱惱光射昬疑兾將住世萬壽無期奈何過隙一朝去之嗟我門人憂心斷續進憶瞻仰退思付囑盡不離定空非滅覺念兹在兹敢告無學潤州鶴林寺故徑山大師碑銘并序李華道行無跡妙極無象謂體性空而夲源淸淨謂諸見滅而覺照圎明我天人師示第一義師無可說之法義爲不二之門其定也風輪駐機其惠也日宫開照其用也春泉利物三者備體誰後誰先入無量而不動開法華而踴出湛兮以有無觀聽而莫測寥兮以逺近思惟而不窮智得皆空爲眞實際大悲恒寂遍撫羣迷月入百川之中佛帀千花之上修而證者玄同妙有應而起者旁作化身先大師適來此土化身歟適去他方補處歟不可得而知也自如來現滅四魔横恣人天無怙寄命崩崖勝大敵者那羅延身消大毒者伽陀妙藥抜䧟扶墜而生大師大師延陵馬氏諱玄素字道淸崇髙紹興於法外徑緒不繫於人間慈母方娠厭患葷肉長至之日誕彌仁尊生有異祥乳育安靜旣齓稽首父母求歸法門即日獲請出依精舎如意年中剃度隸江寧長壽寺旣進具已戒光還照定水澄源鵝王之不受泥塵香象之頓除羇鎻未之比也身長七尺體無凡骨眉毫際臉口若方丹目不顧睇聲侔扣玉入南牛頭山事威大師撞鍾大鳴入海同味迦葉以頭陀第一大師亦斗藪塵勞聞一知十未甞請益觀法無本觀心不生喻金剛之最堅比師子之無畏圓月照海高深盡明惠風吹雲宇宙皆淨威大師摩頂謂曰東南正法待汝興行命於别位開導來學於是騶虞馴擾表仁之至也衆禽獻果明化之均也接足右繞百千人俱大師悉以菩薩呼之教習大乗戒妄調伏目性還源無漸而可隨無頓而可入摩尼照物一切如之吾常黙然無法可說或有信願雙極懇求心要於我渴仰施汝醍醐問禪定邪吾無修問智慧邪吾無得道惟心證不在言通懷帝釋輪終爲世論自淨而巳無求色聲旣悟者小無微塵大無三界當悟者内珠雖隱猶作來因藥草萬殊根莖等潤貌和言寡飢至飽歸或有聞尊稱而遷善見色身而獨得我無爾念道溥慈圓食不問醎酸口不言寒暑身同池水飽蚊蚋之飢渴道離人我順衆生之徃來貴賤冤親是法平等故饋甘味而不辭同於糗糒奉上服而不拒齊於弊褐俾夫家有道侶府無爭人開元中本寺僧法密請至京口潤州刺史韋銑灑掃鶴林兹焉供養有屠者恣忍積骸如山聞大師尊名來仰眞範忽自感悟懴悔求哀大師受之又白言和尚大悲當應我供大師納衣跏趺未甞出戸公侯稽首不爲動摇至是如其懇乞忻然降詣夫盗隱其罪虎慈其子仁與不仁皆同佛性不生不滅無去無來今濁流一澄淸水立現諸佛所度我亦度之天寶中楊州僧希玄密請至廣陵便風馳帆白光引棹楚人相慶佛日渡江梁宋齊魯傾都來㑹津塞途盈人無立位解衣投施積若丘陵皆委於所在行無住捨禮部尚書李憕時爲楊州牧齋心跪謁爲衆唱首望慈月者誰不淸涼傳百億明燈照四維上下塵沙之數皆趨佛乗二州以貪法之心移牒逾月均吾喜捨成汝堅牢無非道塲還至本處天寶十一載十一月十一日中夜坐滅嗚呼菩提位中六十一夏父母之生八十五年赴哀位者可思量否至有浮江而奠望寺而哭十里花雨四天香雲幡幢蓋網光蔽日月以其月二十一日四衆等號捧全身建塔于黄鶴山西原像法也州伯邑宰執喪師之禮率申哀慕江湖震悼曩於寺内移居髙松互偃涅槃之夕椅桐雙枯虎狼哀號聲破山谷人祇㦧慟天地晦冥及發引登原風雨如掃慈烏覆野靈鶴徊翔有情無情德至皆感初達摩祖師傳法三世至信大師信門人達者融大師居牛頭山得自然智慧大師就而證之且曰七佛教戒諸三昧門語有差别義無差别羣生根器各各不同惟最上乗攝而歸一涼風旣至百實皆成汝能揔持吾亦隨喜由是無上覺路分爲此宗融大師講法則金蓮冬敷頓錫而靈泉湧溢東夷西域得神足者赴㑹聽焉融授巖大師巖授方大師方授持大師持授威大師凡七世矣眞乗妙縁靈祥嘉應僉具傳録布於人世門人法鏡吳中上首是也門人法欽徑山長老是也觀音普門文殊佛性惟二菩薩重光道源門人法勵法海親奉㣲言感延霜露繕崇龕座開構軒楹時惟海公求報師訓廬孔氏之墓起淨明之塔世異人同泫然長慕僧端等䕃旃檀樹皆得身香菩薩戒弟子故吏部侍郎齊澣故刑部尚書張均故江東採訪使潤州刺史劉曰正故廣州都督梁昇卿故採訪使潤州刺史徐嶠故採訪使常州刺史劉同昇故潤州刺史韋昭理故給事中韓賞故御史中丞李丹故涇陽令萬齊融禮部員外郎崔令欽道流人望莫盛於此弟子甞聞道於徑山猶樂正子春之於夫子也洗心瞻仰天漢彌高鏡公門人悟甚深者大理評事楊詣過去聖賢諸功德藏志之所至無不聞知魯史從告況乎傳信其文曰濁金淸鏡在爾銷錬磨之瑩之功至乃見膏漬炷然光明外遍陽升律應草木皆變啓迪瘖瞽惟吾大師息言成教捨法興悲辰極不動風波自移境由心寂道與人隨杳然玄黙湛入無餘性本非垢云何淨除身心宴寂大拯淪胥内光無盡萬境同如甘露正味瑠璃妙器遍施大千無同無異度未度者化周縁備道樹忽枯涅槃時至我無生滅隨世因縁吉祥殿上應化諸天寂寂靈塔滔滔逝川怛沙劫壞智月常圓牛頭山第一祖融太師新塔記劉禹錫𥘉摩訶迦葉授佛心印得其人而傳之至師子比丘凡二十五葉而達摩得焉東來中華華人奉之爲第一祖又三傳至雙峯信公雙峯廣其道而歧之一爲東山宗能秀寂其後也一爲牛頭宗巖持威鶴林徑山其後也分慈氏之一支爲如來之别子咸有祖稱粲然貫珠大師號法融姓韋氏延陵人少爲儒愽極羣書旣而歎曰此仁誼言耳吾志求出世間法遂入句曲依僧晁改逢掖而緇之徙居是山宴坐石室以惠力感通故旱麓泉涌以神功示現故皓雪蓮生巨蛇摧伏羣鹿聽法貞觀中雙峯過江望牛頭頓錫曰此山有道氣冝有得之者乃來果與大師相遇性合神授至于無言同躋智地密付眞印揭立江左名聞九圍學徒百千如水歸海由其門而爲天人師者皆脉分焉顯慶二年報身示滅道在後覺神依故山戒香不絶龕座未飾夫豈不思乎蓋神其冥數必有所待大和三年潤州牧浙江西道觀察使檢校禮部尚書趙郡李公在鎭三閏百爲大備尚理信古儒玄交修始下令禁桑門販佛以眩人者而于眞實相深達焉甞謂大師像設冝從本教言自我啓因自我成乃召主吏藉我月入得緍錢二十萬俾秣陵令如符經營之三月甲子新塔成事嚴而工人盡藝誠達而山神來護願力旣從衆心歸重造白龍像大㑹諸天聲香之藴如見如聞即相生敬幽明同感尚書欲傳信于後逺命愚志之夫上士解空而離相中士著空而嫉有不因相何以視覺不由有何以悟無彼達眞諦而得中道者當知爲而不有賢乎以不修爲無爲也唐故章敬寺百巗禪師碑銘并序權德輿禪宗長老百巗大師之師曰大寂禪師傳佛語心法始自達磨至于惠能能化行于南服流干天下大抵以五藴九識十八界皆空猶鏡之明也雖萬象畢呈而光性無累心之虚也雖三際不住而覺觀湛然得於此者即凡成聖不然則一塵瞥起六入膠固循環囬復於生死之中風濤火輪迷忘不息授受䐇合大師得之一言宗通深入無礙師諱懷暉姓謝氏東晉流寓今爲泉州人孩提秀發博究書術一旦慨然曰我之祖先今安在邪四肢百體視聽動使孰使之然邪漼然雨泣誓服緇褐志在楞伽行在曹溪得圓明淸淨之本去妄想因縁之習百八句義照其身心心離文字化無方所於是抵淸涼下幽都登徂來入太行所至之邦蒙被法味止于太行百巗寺門人因以百巗號焉元和三年有詔徴至京師宴座于章敬寺毎歲召入麟德殿講論後以疾固辭十年十二月恬然示滅其年六十其夏三十五弟子智朗志操等以明年正月起塔于灞陵原凡一燈所傳一雨所潤入法界者不可勝書著法師資傳一編自雞足山大迦葉而下至于能秀論次詳實或問心要者荅曰心本淸淨而無境者也非遣境以㑹心非去垢以取淨神妙獨立不與物俱能悟斯者不爲習氣生死幻藴之所累也故薦紳先生知道入理者多游焉甞試言之以中庸之自誠而明以盡萬物之性以大易之寂然不動感而遂通則方袍襃衣其極致一也嚮使師與孔聖同時其顔生閔損之列歟釋尊在代其大惠綱明之倫歟至若從師受具之次第宰官大臣之尊信誕生入滅之感異今皆不書某三十年前常聞道於大寂聿來京下時款師言頃因哀傷似獲悟入則知煩惱不逮菩提雖聚散於此生期㑹歸於彼岸銘曰西方之教南宗之妙與日並照百巗得之爲代導師潁若瑠璃結火燔性愛流溺正癡冥奔命即心是佛即色是空師之通兮無去無來無縳無解師之化兮揭兹靈塔丹素周帀示塵劫兮漳州三平大師碑銘并序王諷得菩提一乗嗣逹磨正統誌其修證俾人知方則有大師法名義中俗姓楊氏爲高陵人因父仕閩生於福唐縣年十四宋州律師玄用剃髪二十七具戒先修三摩鉢提後修奢摩他禪那大師幻悟法印不汨幻機日損薫結玄超冥觀先依百巗懷暉大師歷奉西堂百丈石䂮後依大顚大師寶曆初到漳州州有三平山因芟薙住持敞爲招提學人不逺荒服請法者常有三百餘人示以俗諦勉其如幻解脫示以眞空顯非祕密度門虚往實歸皆恱義味知性無量於無量中以習氣所拘推爲性分知智無異於無異中以隨生所繫推爲業智以此演教證可知也大師一日疾背疽閉戸七日不通問洎出疽巳潰矣無何門人以母喪聞又閉戸七日不食飲武宗皇帝簡併佛刹冠帶僧徒大師止於三平深巗至宣宗皇帝稍復佛法有巡禮僧常肇惟建等二十人刺史故太子鄭少師薫俾藏其事旬歲内寺宇一新因舊額標曰開元於戲知物不終完成之以裨教知像不盡法約之以表微晦其用而不知其方本乎跡而不知其常咸通十三年十一月六日宴坐示滅享年九十二僧臘六十五諷自吏部侍郎以旁累謫守漳浦至止二日訪之但和容瞪目乆而無言徴其意備得行止事實相見無間然也問曰周易經歷三聖皆合天旨神道注之者以至虚而善應則以道爲稱以不思而玄覽則以神爲名逹理者也經云隱而顯不言而喻不疾而速不行而至後之通儒有何疑也異日又訪之適有刑獄因語及師曰孝之至也無所不善有其跡乃匹夫之令節法之至也莫得而私一其政則國之彛典其於適道適權又如此言訖頷之不復更言今亡矣夫彊擬諸形容因爲銘曰觀跡知證語黙明焉觀證知教權實形焉體用如一曷以言宣太素浩然吾師亦然觀其定容見其正性不閱外塵朗然内淨智圓則神理通則聖師能得之隨順無競吾之行止師何以知得性之分識時之機逹心大師邈不可追楊州華林寺大悲禪師碑銘并序賈餗有天地而萬物生焉形氣推遷行識相縁一受其形萬化而未始有極沙界塵劫驅迷走妄浩乎若汨諸巨海而無垠也倀乎若囚諸闇室而無曉也四蛇六賊攻其内熱燄燋芽寓其質而昧者舉世猶竊竊然以彊力敏智可大取所欲攘螳臂而戰蝸角其不勝也則憂悲恐懼日以交馳曽未知夫牽於名而溺於惑者以形質之相雖天地秋毫細大殊耳其有限一也以壽觀天雖萬齡一瞬脩促異耳其有限一也其必盡一也况大不及天地而逺不至萬齡者又惡足以擬議哉此西方之聖人所以懸覺照於無極也自大迦葉親承心印二十九世傳菩提逹磨始來中土代襲爲祖派别爲宗故第六祖曹溪惠能始與荆州神秀分南北之號曹溪旣没其嗣法者神㑹懷讓又析爲二宗初師子比丘以遭罹大難恐異端之學起故傳袈裟以爲信迨曹溪凡十世而其間増上慢者徇名迷實至決性命以圖之故每授受之際如避仇敵反曹溪將老神㑹曰衣所以傳信也信苟在法衣何有焉他日請祕于師之塔廟以熄心競傳衣繇是遂絶師嗣法於神㑹大師者也上距大迦葉三十六代皆以眞空妙有覺性佛心黙傳宻付印可懸解行之謂般若到之謂涅槃得之者變凡聖猶反掌失之者淪生死於浩劫不以心得不著佛求知佛性之在我亦無我而可證洞然與虚空爲體無起無滅包大千而不礙窮萬古而不老而神通自在顯晦無跡陶冶萬有未時生心然後爲得也其教之大略如此師諱靈坦代宗皇帝錫號曰大悲姓武氏蓋則天太后之族孫也父宣官至洛陽令師生而神雋七歲舉童子及第年二十歷太子通事舎人逸羣髙歩脫落羈束雖在軒冕之中泊如也及隨父至洛陽聞荷澤寺有神㑹大師即決然蟬蛻萬縁誓究心法父知其志不可奪亦壯而許之凡操篲服勤於師之門庭者八九年而玄關祕鑰罔不洞解一旦密承屬付莫有知者後十五日而荷澤被遷於弋陽臨行謂門人曰吾大法弗墜矣遂東西南北夫亦何恒時天寶十二載也師旣佩眞玦遊無定所以爲非博通不足以圎證故閱大藏於廬江浮查寺非廣問不足以具足故叅了義於上都忠禪師繇是名稱髙逺天下瞻企將東吾道固請出關天子降錫名之詔以顯其德時大曆八年也旣周流江表四十餘載或山而栖或邑而遊鏡懸於空萬象俱納蚩蚩横目所至成市癡愛貪欲榛荒心路以大無畏廓而闢之元和三年故丞相趙公之爲楊州始虚州之華林精舎以邀止焉初師之東遊也以世道交喪其日固乆將息言向晦與物相遺恍惚之間若有以傳燈之契來授者且印指於頭曰以是爲信厥後每將演導則指跡如丹若乃制毒龍於金山柔猛虎於定山在江隂則神龜靈蛇之感現在江都則山鬼城神之懼伏皆顯仁藏用以示慈力斯衆目之所覩故略不盡書而惑者以爲怪迂之說不可爲訓是未聞菩薩大士遊乎不思議解脫者無心於物而物自交應者乎住華林九年年一百有八歷僧夏八十有八以元和十一年秋九月八日返眞於其寺明年建塔於州之西原門人遍于天下荷其教者惟上都西明寺全證證以自達摩以來皆有論譔而師之樂石未刻謂余能盡知其道寳曆元年駐錫于毗陵持其教宗與師之行事願得文而建諸塔廟余因採其昭昭可述者載于碑時丞相太原公揔戎淮南之三年也其銘曰茫茫萬有兮生死同纏業風振海兮識浪滔天覺者云誰兮有西方之大仙慈悲廣大兮妙力無邊八萬度門兮異派同源文字言說兮罔非蹄筌惟心法皎皎兮如月斯懸惟大迦葉兮首得而傳代代繩繩兮燈不絶然迄于荷澤兮師又嗣焉法存形謝兮諸祖其然門人思慕兮塔彼西原將祈不朽兮余可無言洪州開元寺石門道一禪師塔碑銘并序權德輿鍾陵之西曰海昏海昏南鄙有石門山禪宗大師馬氏塔廟之所在也門弟子以德輿甞游大師之藩俾文言而揭之曰三如來身以大慈爲之夲六波羅蜜以般若爲之鍵非上德宿殖者惡乎至哉大師諱道一代居德陽生有異表幼無兒戲嶷如山立湛如川渟舌廣長以覆凖足文理而成字全德法器自天授之甞以爲九流六學不足經慮局然理世之具豈資出世之方唯度門正覺爲上智宅心之域耳初落髪於資中進具於巴西後聞衡嶽有讓禪師者傳教於曹溪六祖眞心超詣是謂頓門跂履造請一言懸解始類顔子如愚以知十俄比淨名黙然於不二以法惟無住化亦隨方甞禪誦於撫之西裏山又南至于䖍之龔公山攫搏者馴悍戾者仁瞻其儀相自用丕變刺史今河南尹裴公乆於稟奉多所信嚮用此定惠發其明誠大曆中尚書路兾公之爲連帥也舟車旁午請居理所貞元元年成紀李公以侍極司憲臨長是邦勤護法之誠承最後之說大抵去三以就一捨權以趣實示不遷不染之性無差别次第之門甞曰佛不逺人即心而證法無所攝觸境皆如豈在多歧以泥學者故夸父喫㖃求之愈踈而金剛醍醐正在方寸於是解其結發其覆如利刃之破罥索甘露之洒稠林隨其義味快得善利者可勝道哉化縁旣周趺坐報盡時貞元四年二月庚辰春秋八十夏臘六十前此以石門淸曠之境爲宴黙終焉之地忽謂入室弟子曰吾至二月當還爾其識之及是委化如合符節當夾鍾發生之候恊拘尸薪火之期緇素㓜艾失聲望路瀇涸流而法雨滂灑及山門而天香紛靄交感之際昧者不知沙門惠海智藏鎬英志賢智通道悟懐暉惟寛智廣崇泰惠雲等體服其勞心通其教以爲吾師眞性湛然與虚空俱唯是體魄化爲舎利則西方之故事傳焉不可巳也乃率籲其徒從茶毗之法珠圓玉絜煜燿盈升建兹嚴事衆所瞻仰至七年而功用成竭誠信故緩也德輿往因稽首粗獲擊蒙雖飛鳥在空莫知近逺而法雲覆物巳𬒳淸涼今兹銘表之事敢拒衆多之請銘曰達磨心法南爲曹溪頓門巍巍振拔沈泥禪師弘之俾民不迷九江西部爲一都㑹亦旣戾止玄津横霈慈哀攝護爲大法礪五濁六觸翳然相䝉直心道塲決之則通隨器受益各見其功眞性無方妙道不竭顧兹夢幻亦有生滅微言密用煥炳昭晣過去諸佛有脩多羅心能悟之在一刹那何以寘哀兹窣堵波無姓和尚碑銘并序柳宗元維某年月日嶽州大和尚終于聖安寺凡爲僧若干年年若干有名無姓世莫能知其閭里宗族所設施者有問焉而告曰吾姓性也其源無初其胄無終承于釋師以系道夲吾無姓邪法劒云者我名也實且不有名惡乎存吾有名邪性海吾郷也法界吾宇也戒爲之墉惠爲之戸以守則固以居則安吾閭里不具乎度門道品其數無極菩薩大士其衆無涯吾與之戚而不吾異也吾宗族不大乎其若可聞者如此而止讀法華金剛般若經數逾千萬或譏以有爲曰吾未甞作嗚呼佛道逾逺異端競起唯天台大師爲得其說和尙紹承本統以順中道凡受教者不失其宗生物流動趣向混亂唯極樂正路爲得其歸和尚勤求端慤以成志願凡聽信者不惑其道或譏以有迹曰吾未甞行始居房州龍興寺中徙居是州作道塲于楞伽北峯不越閫者五十祀和尚凡所嚴事皆世髙德始出家事而依者曰卓然師居南陽立山葬嶽州就受戒者曰道穎師居荆州弟子之首曰懷逺師居長沙安國寺爲南嶽戒法歲來侍師㑹其終遂以某月日葬于卓然師塔東若干歩銘曰道本於一離爲異門以性爲姓乃歸其根無名而名師教是尊假以示物非吾所存大郷不居大族不親淵懿内朗冲虚外仁聖有道和尚功德者不可悉數弘農公自餘杭命以行狀來懷逺師自長沙以傳來使余爲碑旣書其辭又假其隂以記重校正唐文粹卷第六十四
