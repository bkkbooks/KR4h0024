  - {type: line-break, offset: 4557, content: '', id: KR4h0024_SBCK_054-9a01}
  - {type: variant, offset: 4557, length: 0, content: '', WYG: 導以義利推以信誠方舩繼至百貨錯出邕部絶徼裔人自擅誘掖招來以威以懷朱崖黎民保險三代種落盤牙數犯吏禁公麾偏師一舉而平獷俗率化原人得軄其登左轄也紀律修明清萬事之本其理分陜也惠緩浹洽𢎞二南之化必宿其業而修其方崇庸大績其昭昭如是而又博極書術詳觀古今謀王體斷國論其言有章聽者皆竦作為通典以究理道上下數千百年間損益討論而折衷之佐王之業盡在是矣公之先在漢則建平敬侯有立宣之功在晉則當陽成侯決平呉之䇿忠力雋賢􅐛明而昌以至曾祖諱行敏皇銀青光禄大夫荆益二大都督府長史南陽郡公王父諱慤尚書右司員外郎麗正殿學士烈考諱希望歴鴻臚卿御史中丞再為􅁪州刺史代鄯二州都督西河郡太守襄陽縣男贈尚書左僕射推南陽公德化茂于列藩惟右司文雅重於中臺惟僕射有文武器任克揚風績其督鄯州摠節制留府數與虜􅀈奮其威謀奪鹽泉吞河曲城便地置新軍剖符惠人理行第一}
