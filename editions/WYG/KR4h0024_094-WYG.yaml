seq: 94
front:
  text: 天地二
  hash: sha256:3412c1dabb4699432d79c2f2cd244d37a9837db5d719a16c440a3652f757ba1b
body:
  text: 大衍厯序張説地誌圖序吕温修養一琴一導引圖序梁肅觀石山人彈琴序博奕二骰子選格序房千里序棊栁宗元鳥獸三師子賛序張九齡鷹鶻圖賛序八駿圖序李觀果實一荔枝圖序白居易大衍厯序張説特進集賢院學士修國史上柱國燕國公臣説言厯者先王以明時授人敬天育物者也辰極恒居斗運不息晦朔相推而變月寒暑往來而成嵗日月右進周天之度啟星辰左旋正時之氣合積餘分而致閏配甲子而設蔀鳳鳥為司疇人受職分分而加之者百鈞必過毫毫而減之者千里必差何則古法存而其人異也不見大聖孰能起之伏惟開元神武皇帝陛下欽崇天道眘徽月令受命再新改制創厯十有三祀詔沙門一行上本軒頊夏殷周魯五王一侯之遺式下集太初至於麟徳二十三家之衆義比其異同課其疎宻或前疑而後定或始㑹而終乖振古未探之象必發揮於神算大鈞不測之氣盡覼縷於天聰迺更審晷度之短長覆星間之廣狹繩九道之朓肭糾五精之進退參大衍天地之數綜八卦六爻之序一轍於文王也覈春秋交蝕之辰研九疇五紀之奥同文於孔子也杼軸萬象優柔四載奏章朝竟一行夕落臣説奉詔金門成書冊府先有理厯陳景善算趙昇首尾㕘𤣥之言接承轉籌之意因而緝合編次勒成一部名曰開元大衍厯經七章一卷長執厯一卷古今厯書二十四巻畧例奏章一巻凡五十二巻所以貫三才周萬物窮數術先鬼神稱制曰者即聖人顧訪之㫖標謹按者是厯家進對之詞非軒后至聖不啟履端之業非容成詣極不就歸餘之經據其圖也七政之天心不逺守其術也千嵗之日月可知盖中黄之寳符大紫之神器者也謹以十六年八月端午赤光照室之夜皇雄成紀之辰當一元之出符獻萬夀之新厯伏望藏之書殿録於紀言掌之太史頒於司厯制曰可地誌圖序吕温廣陵李該博達之士也學無不通尤好地理患其書多門歴世寖廣文詞浩蕩學者疲老由是以獨見之明法先聖之制黜諸子之傳記述仲尼之職方㑹源流考同異務該暢從體要綽然勒成一家之説猶懼其奥未足以昭啟後生乃裂素為方儀據書而畫隨方面以區别擬形容之訓解命之曰地志圖觀其粉散百川黛凝羣山元氣剖判成乎筆端任土之毛有生之類大鈞變化不出其意然後列以城郭羅于陬落内自五侯九伯外洎要荒蠻陌禹跡之所窮漢驛之所通五色相宣萬邦錯峙毫釐之差而下正乎封畧方寸之界而上當乎分野乾象坤勢炳焉可觀與夫聚米擬其端倪畫地陳乎梗槩果不可同年而語其詳畧也每虚室燕居薄帷晴褰普天之下盡在屋壁户納四海窻籠八極名山大川隨顧奔走殊方絶域舉意而到髙視華裔坐横古今觀帝王之疆理見宇宙之寥廓出遐入幽曽不崇朝與夫役形神於嵗月窮轍跡於區外又不可並軌而論勞逸也且夫刪百代之弊綜羣言之首繁而不亂疎而不漏才識以潤之丹青以炳之使嗜學之徒未披文而見義不由户而覩奥斯訓導之明也窮地而述舉世而載事極鴻纎理通皦昧混一家之文軌張大國之襟帶覈人物之虚實總山川之要㑹表皇威之有截明王道之無外斯乃功用之大也見蒼梧塗山則思舜禹䘏民之艱覩窮荒大漠則悟秦漢勞師之弊覽齊疆晉壤則想桓文勤王之霸觀洞庭荆門則知苗蜀恃險之敗王者於是明乎得失諸侯於是鑒乎興替斯又懲勸之逺也然則本之所以廣學流申之足以賛鴻業垂之可以示後世豈徒由近觀逺以智自樂為室中之一物哉而時無知音道不虚行舉地成圖聞天無路此志士儒林所以為之頽息也某乆從君逰辱命序述庶明作者之意俾好事君子知其所以然導引圖序梁肅氣之貫萬物也盛矣本乎天者資之以生本乎地者資之以成古之善為道者知氣之在人不利則鬱鬱則傷性伐其命而不可援也於是乎張而翕之導而引之熊經鳥伸吐故納新使流於六藏暢於四支浹於肌膚之㑹固其筋骸之束然後百病不生耳目聰明可以保神可以盡年和之至也故岐伯得之為軒轅師廣成子得之千二百嵗而身不衰彭祖得之上及有虞下及五霸後學得之隠名山而逰人間夀考者不可詳而計矣原其所出皆以岐伯為祖有浮山隠居朱少陽者得其術於黄帝外書又加以元化五禽之説乃志其善者演而圖之被以章目凡三篇究其所由盖乆視之門户樞之善喻者也少陽年涉期頤神氣轉壮每至虚空之中自試此法或屈或伸或盤或旋或迴互翕闢終日不倦每振寂郵肯綮之際必砉然響然用力甚㣲而合於桑林之儛此又技之甚尤異者也暇日以所述示予予喜而序之以寘篇首俾博覽者以知還年之一路道者之雅戲云觀石山人彈琴序天寳中言雅樂者稱馬氏琴石侯嘗得其門而入矣故其曲髙其聲全余嘗觀其操縵味夫節奏和而不流淡而不厭凜其感人而忘夫佚志已而謂余曰鄙夫徒能彈之而至和樂獨善其身足使情反乎性吾聞其語矣未辨其方也敢問何為而臻哉古之聰明睿智其能為乎余愀然曰善乎夫子之問是道也吾嘗聞諸師矣夫人生無其節則亂故聖人道之天和作樂以救之於是乎有五弦之琴以暢五音以協五行以宣五常以紀五事後世聖人以為五弦備其本而未行其變變而裁之莫先乎文武之用於是究夫剛柔復益其弦者非他也文武之道也亦猶八卦既立復因而重之然後既可以動天地而鼓萬物盡變化而感鬼神格聖人之能事反百慮於一致此琴之以為貴也故虞帝以之乃歌南風禹湯以之而作夏頀周文武以之萬邦協和卜代三十成康以之刑措不用仲尼以之見文王之象而樂正雅頌各得其所若琴道不行則君子之道消而王澤不下故殷紂失之而棄河海幽厲失之而周道中絶晉悼失之師曠一彈而國大旱琴之興廢與理亂相並夫備殷薦以配祖考蕭相庶幾神降則不可廢於郊廟矣若夫和平其志氣暢達於動用使邪物不接則不可廢於律度矣故自有國有家下逮於庶人莫不尤重焉君子所居於是有左琴右書士無故不徹盖謂是也周穆載雲和空桑龍門之琴禹貢嶧陽之桐以為之歴代善琴之士與幽蘭白雪之號則吾子其自知已夫何言哉問曰若何所云則今之為琴者多矣君子之風何其未扇歟對曰琴樂之雅者也雅者正也正者謂能宣正其聲而行正道今夫鄭衛之移人乆矣其人或正則其位未大其位未大故正聲永被君子風薄不其然乎夫雅樂之所貴者豈取清商流徵不失度曲而已彼各有所起也言畢石君善之俾予紀其辭遂號為序云骰子選格序房千里古之叙班位列爵禄非獨以治萬民總百事且用以别白賢不肖堯為君舜為相其下有共鯀焉成王為君周公為相其下有管蔡焉舜周公之貴非幸也宜也共鯀管蔡之殛放非不幸也宜也故賢者宜進之雖已貴益其禄厚其爵不為幸不肖者宜退之雖已賤奪其廩削其秩不為歉由是人用自勵遷善去惡强奮自篤後代衰㣲升於上者不必賢沈於下者不必愚得不必功失不必過賢者知其善不足恃恥比肩而趨故賢未嘗進不肖者知其惡不果棄惟奮臂而逞故不肖未嘗退有賢者退人雖心知之卒無奈何且曰非人也命也有不肖者進人雖心知之又益無可奈何亦曰非人也命也以是善不勸而惡不悛率曰賦諸命而已矣果如是聖人所謂仁誼忠信者何足道哉姑徵其有命無命爾悲夫斯後代之不可復古豈不自是也開成三年春予自海上北徙舟行次洞庭之陽有風甚急繋船野浦下三日遇二三子號進士者以穴骼雙雙為戲更投局上以數多少為進身職官之差數豐貴而約賤卒局坐客有為尉掾而止者有貴為相臣将臣者有連得美名而後不振者有始甚㣲而欻升於上位者大凡得失酷似前所謂不繫賢不肖但卜其偶不偶耳達人以生死為勞息萬物為一馬果如是吾今之貴者安知其不果賤哉彼真為貴者乃數年之榮耳吾今貴者亦數刻之樂耳雖乆促稍異其歸於偶也同列禦冦叙穆天子夢逰事近者沈拾遺述枕中事彼皆異類㣲物且猶竊爵位以加人或一瞬為數十嵗吾果斯人也又安知數刻之樂果不及數年之榮邪因條所置進身職官遷黜之目為選格序序棊栁宗元房生直温與余二弟逰皆好學余病其確也思所以休息之者得木局隆其中而規焉其下方以直置棊二十有四貴者半賤者半貴曰上賤曰下咸自第一至十二下者二乃敵一用硃墨以别焉房由是取二毫如其第書之既而抵戲者二人則視其賤者而賤之貴者而貴之其使之擊觸也必先賤者不得已而使貴者則皆慄焉惛焉亦鮮克以中其獲也得朱焉則若有餘得墨焉則若不足余諦睨之以思其始則皆類也房子一書之而輕重若是適近其手而先焉非能擇其善而朱之否而墨之也然而上焉而上下焉而下貴焉而貴賤焉而賤其易彼而敬此遂以逺焉然則若世之所以貴賤人者有異房之貴賤兹棊者歟無亦近而先之耳其有果能擇其善否者歟其敬而易者亦從而動心矣其得於貴者有不氣揚而志蕩者歟其得於賤者有不貌慢而心肆者歟其所謂貴者有敢輕而使之擊觸者歟其所謂賤者有敢避其使之擊觸者歟彼朱而墨者相去千萬且不啻有敢以二敵其一者歟余墨者徒也觀其始與末有似棊者故序師子賛序張九齡夫徳之所感者深物之所懷者逺中國有聖占候而自來四夷不王征伐而難致故絶域有來貢沒羽諸侯有不入苞茅舉其大凡不在遐邇頃有至自南海厥繇西極獻其方物而師子在焉爾雅所謂狻猊如虥貓食虎豹今之所見信然絶猛者也其天骨雄詭材力傑異得金精之剛為毛羣之特仡立不動而九牛相去耽視且瞋則百獸皆伏所以肉視犀象孩撫熊羆其餘瑣細不置牙齒我天子示柔逺之義國無不庭有狠猛之威物無難制故其受羈絏伏閑皁馴而為用鋒莫可當然吾君所存義不謂此盖蠻夷君長嵗時貢獻或殊琛絶賮實於内府或異獸奇禽擾於外囿皆其覲禮若中國之贄幣所不辭讓明異方之臣妾此則非有利之之心充耳目之翫好以為懷之之道示天地之含容不其然歟固無得而稱也義異大犬豈勞召公之訓美同赤豹何闕韓侯之詩凡我侍臣咸為之賛鷹鶻圖賛序張九齡鳥之鷙者曰鷹曰鶻鷹也名揚於尚父義見於詩鶻也迹隠於古人史闕其載豈昔之多識物亦有遺将今而嘉生材無不出為所呼之變與所記不同者邪然於羽族之中絶有豪傑之表氣感剛悍體侔銛鋒顧視之間煒如也夫授以勁翮意不羣飛資其利嘴義在鮮食生有自然之權用無可抑之勢古之言武士法吏齊名比義者以其嚴若郅都飛若李廣委質於所事報功於所飬不憚摧翼以虧勇不立垂枝以屈節是鳥也向之擬議不亦宜乎夫鸞與鳳将感於仁所不及也雞與鶴猶較其徳彼何有焉況其餘雖飛雖鳴凡者怪者肉非登爼才非下鞲威力不敵羣噪無益然後知二禽之為用衆鳥之絶倫者也故君子韙其然工人圖其状以象武備以彰才美雖未極其天姿有以見其風骨矣昔支遁嘗養名馬自云重其神駿斯圖也非彼人之徒歟八駿圗序李觀予嘗聞有周穆王八駿之説乃今獲覽厥圖雄凌趫騰彪虎文螭之流與今馬髙絶懸異矣其名盜驪蜚黄騕褭白羲之屬也視矯首則若排雲視舉足則若乗風有待馭之状有矜羣之姿若日月之所不足至若天地之所不足周軒軒然嶷嶷然言其真也實星降之精思其發也猶神扶其魄軾者如仙御者如夢将變化何别哉世説周穆王駕八駿日㑹王母於瑶池從羣仙而逰按山海經去中國三萬里乃非虚説也而不知其所從得之厥神是生為之用歟何古書無其匹歟圖之首有褚公遂良題云秦漢傳之降於梁隋至余皇唐不泯厥跡卓爾昭然奇哉信乎苟今考之於古則人大笑矣求之於時則曠世矣由是知物有同者不必良有異者不必否或慮觀之者昧故為序以表焉荔枝圖序白居易荔枝生巴峽間樹形團團如幃蓋葉如桂冬青花如橘春榮實如丹夏熟朶如蒲萄核如枇杷殻如紅繒膜如紫綃瓤肉瑩白如氷雪漿液甘酸如醴酪大畧如彼其實過之若離本枝一日而色變二日而香變三日而味變四五日外色香味盡去矣元和十五年夏南賔守樂天命工史圖而書之盖為不識者與識而不及一二三日者云唐文粹卷九十四欽定四庫全書唐文粹卷九十五宋姚鉉編序戊總一十四首著撰十
