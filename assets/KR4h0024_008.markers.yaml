  - {type: variant, offset: 2036, length: 0, content: '', WYG: 之極理當遷焉因作謫九年賦以自廣是歲臘月詔追明年自闕下重領連山郡印綬咸曰美惡周必復第行無恤歲杪其復乎居五年不得調歲二月有事于社前一日致齋孤居慮靜滯念欻起伊人理之不可以曉也将質諸神乎謹貢誠馳精敢問大鈞其夕有遇寤而次第其辭以為賦圓方相涵兮浩其無垠窅㝠翕闢兮三辰以騰振孰主張是兮有工其神迎隨不見兮强名之曰大鈞欹以臨下兮巍乎雄尊天為獨陽髙不可問工居其中與人差近身執其權心平其運循名想像或可以訊曰嘻䝉之未生其猶泥爾落乎埏埴唯鈞所指忽然為人為幸大矣工賦其形七情與俱嗇智不授卑去聲之以愚坦坦之衢萬人所趨䝉一布武化為畏途人或譽平聲之百説徒虛人或排之半言有餘物壯則老乃唯其常否終則傾亦不可長老先期而驟至兮否踰數而叵量雖一夫不獲兮亦大化之攸病謹薦誠上問兮俛伏以聴是夕寐熟夢遊乎無何之鄉抗陛級乎重宵兮}
