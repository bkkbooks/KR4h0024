body:
  text: 吳興姚鉉纂議丙揔十二首諡議十一唐丞相太保贈太師苗晉卿諡議獨孤及唐丞相諡文貞楊綰諡議梁肅唐丞相江陵尹御史大夫吕諲諡議獨孤及駮議吕諲嚴郢重議吕諲獨孤及唐丞相贈司空李揆諡議權德輿唐隴右節度經略大使郭知運諡議獨孤及駮議郭知運崔厦重議郭知運獨孤及唐御史中丞盧奕諡議唐常州刺史獨孤及諡議權德輿古諸矦世子諡議一晉諡恭世子議白居易唐丞相故太保贈太師苗晉卿諡議獨孤及太師稟天純懿為唐股肱兩朝當國庶績惟允論道賦政送往事居叶恭秉彞動罔違德惠和以懋其事明哲以保其身昔嘗懸衡九流剖竹四郡刀尺之下無滯用𥜗袴之內無貧人洛陽居守東夏輯睦天寶之年二京為戎皇輿西狩億兆左袵太師踐危機不易心處橫潰不忘國奮身拔迹於豺狼之口道不汗而節不奪忠之大者至德乾元中天下多故皇綱未張肅宗修漢宣故事用刑名繩下而太師以曹參為師持淸靜守職勵翼王度將順事典人亦寧一厥猷茂焉能知人能官人愼選乃僚言刈其楚至有拔羣萃而取公器不五六年比肩衮職者光映册府當代榮之漢史稱胡廣與故吏陳蕃並為三司太師有焉夫九德咸事寬為之首百工惟時哲則能惠冝其享天眉壽為國元老古者生以行觀其志沒以諡易其名字之美惡視行之大小後代或三字以表德貞惠文子是也或二字以彰善鄼文終侯留文成侯是也蓋其迹大名盛則禮優諡崇太師德冠搢紳位侔周召將加誄諡之制冝以鄼留為準謹按大戴禮體和居中曰懿文賢有成曰獻稽千載之令典合二名以配德請諡曰懿獻謹議唐丞相諡文貞楊綰諡議代太常答蘇端駮議梁肅議曰有國之典存以位敘其德沒以諡易其名名之小大視德之美惡蓋書其著而略其微要其終而明其義故曰諡以尊名節以一惠恥名之浮於行也楊文貞體淳素之質協時中之德爰自下列至于宰司秉心不渝動必由道與夫立功立事開物濟衆不同日語矣而淸儉厲俗明哲保身曰文與貞在我惟允秉公議者其誰曰不然今奉符謂公與元載交遊嘗為載薦引載之咎惡悉歸於公斯乃昧於觀行定諡之義且非君子成人之美也請區而評之昔荀爽為董卓所舉致位三公及卓斁亂漢政可謂甚矣而漢史曾不以卓之過纍於慈明晏子陳氏俱事齊侯陳志邪而晏志正春秋亦不以陳之惡延於平仲是知道不必合事不必同則載之於公其事可見況當載秉鈞而公不參大政載以時望慕我我則靜而守中因踈為簡適見淸節文有發載之惡皆漏泄致辭患自掇也庸可救乎及夫載覆其餗公膺大任任職月淺屢以疾辭位且不安安可以啓悟而責之乎昔季文子三尹無食粟之馬衣帛之妾君子以為忠楊公以大名厚位出入三朝無宅一區無馬一駟志於清白交不諂瀆可不謂貞乎掌訓誥秉銓衡處成均二宗伯潤色王度無替厥美加以敏而好學見善如不及可不謂文乎謹按諡法貞之例有三清白守節曰貞大憲克就曰貞憂國忘死曰貞文之義有六經緯天地曰文道德慱聞曰文愍人接禮曰文不恥下問曰文慈惠愛人曰文修德來逺曰文名既不備事亦殊貫又安可以二王三恪私廟家祭之闕併貴於一名哉若具美果在一名則士文伯孔文子且無經緯天地之文孟武伯寧武子又非克定禍亂之武若以廢禮不稱其名臧孫辰縱逆祀不得諡文管夷吾臺門反坫不得諡敬是知議名之道取其所長則捨其所短志大行則遺其小節使善惡決於一字褒貶垂於將來蓋先王制諡之方也若綜核名實形於公論冝也取坦然明白彰於遐邇者今或乘人之意肆誣謗之辭所謂抉瑕刺骨之説非正議也且聖人無全能才不必備以鄭公徴立言正色恥君不如堯舜其節大矣而昧於知人許公瓌固執條詔廷沮邪計其志明矣終不能守故春秋為賢者諱過傳稱不以一眚掩大德語曰無求備於一人蓋二公所以為文貞也若曰百行所歸九德咸事如周公之文宣然後擬議則千古莫嗣而諡典絶矣安在一二蘇魏足為定制乎謹上參典禮近考故事楊公之名請如前議云爾唐丞相故江陵尹御史大夫吕諲諡議獨孤及吕諲任職從政聰敏肅給能以才智潤飾吏道至德中與三司同鞫大獄獨引律文附會經義而平反之當時卒用中典諲參其論在台司齪齪雖無匪躬之能然平章法度守而勿失其為荆州一年有成號令明具賦斂均一物有制而事有倫大抵以威信為主戮陳希昻按申太芝之姦而三楚之人恱服厥功茂焉自至德巳來荷推轂受賑之寄處方面者數十輩而將不驕卒不墮政修人和如諲者蓋鮮矣豈不以人散久矣而兵未戢挹濁流者難俟淸整棼絲者難為工諲當此時能以慈惠易其疾苦且訓其三軍如臂使指闔境無拔葵啖棗之盜而楚人到于今猶歌詠之其識略必有過人者雖勿褒之其可乎按諡法威德克就曰肅禁暴威也愛人德也考禮議名而擬諸其形容請諡曰肅謹議駮議吕諲嚴郢伏以故相國江陵尹兼御史大夫贈吏部尚書吕公諲昔事先朝纍當大任至德之𥘉天步艱難公首披荆榛扈蹕靈武忘軀進忠一日三接先朝察匪躬之節納沃心之議爰立作相弼諧神人其嘉謀嘉猷獻可替否之迹入則造膝出則詭辭溫樹不言難可得而知也至有爛焉明白欲蓋而彰者請區而載之乾元收復之際兩都衣冠多繫於三司詔獄御史中丞崔良器議事失入時宰苗太師崔趙公等雖廷諍之然未堅決公有犯無隱引經正辭上是其言刑為之省所全活者蓋數百人明主收霜電之威聖朝行寬大之典者繄公之力也古者進賢受上賞書不云乎咎繇曰都在知人公踐台衡專以推賢任人為務故相國房公琯故吏部侍郎韋公陟入登右職皆公之由今相國黃門侍郎杜公之蒞江陵也公薦在方靣之任今相國中書侍郎元公之在度支也公咨以幕府之政曽未數歲而二相接武於上台天地交泰聖賢相得庶績咸熙五典克從者資公之舉善也則子皮之舉子産鮑叔之舉管仲蕭何之舉曹參武侯之舉蔣琬方之前人我有餘地其在荆南也戢兵和衆令行禁止理績為天下最雖古之羊杜無得而踰今太常議荆南之政詳矣而曰在台司齪齪無匪躬之能者乃抉瑕掩瑜之論非中適之言也國家故事宰臣之諡皆有二字以彰善旌德焉夫以呂公文能無害武能禁暴貞則幹事忠則利人盛烈弘規不可備舉傳敘八元之德曰忠肅恭懿若以美諡擬於形容請諡吕公曰忠肅謹議重議呂諲獨孤及博士獨孤及議曰吕諲任宰相日淺當時會肅宗躬親萬務庶政羣臣畏威奉職而巳雖有謨謀於巖廊之上莫由有知之者其荆門之政為仁由巳略見於事其恩惠被於物風謡存乎人故人得而稱之議名之際敢不闕其所疑而録其尤者著者有司之職也其閲實訟獄在未執政之前前議之詳矣敢辱再告至若推進名賢使登大任既同溫室之樹且行狀所不載孔子曰君子於其所不知蓋闕如也故不書今奉符令必用二字且以忠配肅謹按舊儀凡殁者之故吏得以行狀請諡於尚書省而考行定諡則有司存廷辨可否冝在衆議今駮議撰諡異同之説並故吏專之伏恐亂庖人尸祝之分違公器不私之誡且非唐虞師錫僉曰之道昔周道衰孔子作春秋以繩當代而亂臣賊子懼諡法亦春秋之微旨也在懲惡勸善不在哀榮在議美惡不在字多文王伐崇周公殺三監誅淮夷晉重耳一戰而霸諸矦武功盛矣而皆諡曰文以兾缺之恪德臨事寧俞之忠於其國隨會之納諌不忘其師言身不夫其友其文德豈不優乎而並諡曰武固知書法者必稱其大而略其細故言文不言武言武不言文三代巳下朴散禮壞乃有二字之諡二字諡非古也其源生於衰周施及戰國之君漢興蕭何張良霍去病霍光俱以文武大略佐漢時致太平其事業不一謂一名不足以紀其善於是乎有文終文成景桓宣成之諡雖瀆禮甚矣然猶褒不失人唐興參用周漢之制謂魏徴以王道佐時近文直言極諫愛君而忘身近貞二德並優廢一莫可故曰文貞公謂蕭瑀端直鯁亮近貞性多猜二近𥚹言𥚹則失其謇正稱貞則遺其吝狹非一言所能名故曰貞褊公其餘舉凡推類大抵準此皆有為之也若迹無殊途事歸一貫則直以一字目之故杜如晦諡成封德彝諡明王圭諡懿陳叔逹諡忠溫彥慱諡恭岑文本諡憲韋巨源諡昭唐休璟諡忠魏知古諡忠崔日用諡昭其流不可悉數此並當時赫赫以功名居宰相位者諡不過一字不聞其子孫佐吏有以字少稱屈者由此言之二字不必為褒一字不必為貶若褒貶果在字數則是堯舜禹湯文武成康不如周威烈王靜愼王也齊桓晉文不如趙武靈魏安釐秦莊襄楚考烈也杜如晦王圭巳下或成或明或懿或憲不如蕭瑀之貞褊也歷考古訓及貞觀以來制度似皆不然今奉所議云國家故事宰相必以二字諡未知所出何品式請具諲當以為按據若忠者臣事君之常道苟靖恭于位誰則非忠非有炳然之異則不以為諡如議獄緩死任賢舉善德之美者然肅者威德克就之名足以表之矣月令曰孟秋天地始肅詩曰曷不肅雍又肅肅王命仲山甫將之肅嚴也敬也忠之屬也天地不肅則歲不成宗廟不肅則禮不立軍族不肅則人不服肅之時義大矣哉以諲之從政也威能間邪德可濟衆故以肅易名而忠在其中矣亦猶隨會寧俞之不稱文豈必因而重之然後為美魏晉巳來以賈詡之籌算賈逵之忠壯張既之政能程昱之智勇顧雍之密重王渾之器量劉惔之鑒裁庾翼之志略彼八君子者方之東平冝無慙德死之日並諡曰肅當代不以為貶何嘗徴一字二字為之升降乎謹上稽前典下據甲令參之禮經而究其行事請依前諡曰肅謹議唐丞相贈司空李揆諡議權德輿將仕郎守太常博士臣權德輿議曰李揆端莊粹溫潔廉淑愼用文章術學資適逢時奮其英華以取貴達如良庖投刃無復肯綮歷諌曹左史司王言二春官以至于平章大政在帝左右必以文誼藩身奉法遵職官曹無粃政姻族無幸人束帶山立敷陳前志檢然而溫有碩儒大臣之度或起或廢其道甚夷昔觀射父能作訓辭以行事於諸侯左史倚相能道訓典以敘百物揆實有之建中中西戎乞盟以舊齒宿望將命殊俗結華夷之信董衣裳之會巳事回車歲當興元匪躬靡盬至河池而殁追錫司空恩禮有加按諡法曰率事以信曰恭不懈于位曰恭揆果行求已致位台司歷官陟降十有八次周旋敬愼以揚職業不曰率事以信乎及逾懸車之年奉絶域之使受詔即路視險若夷貞厲盡瘁復於左轂不曰不懈于位乎昔韋玄成翟方進以經明為漢相而皆諡曰恭述揆所履節以一惠勤官死事炳然昭明有司易名請以恭諡故左武衛大將軍持節隴右節度經略大使兼鴻臚卿御史中丞贈涼州都督太原郡開國公郭知運諡議獨孤及郭知運驍勇有謀善於用兵起行間為唐上將當時唐興百餘載矣天下充富太倉有二十年之蓄玄宗循漢武故事方鋭意拓土知運適與時會遂扶乘天威奮其材力敢與虜確故能破默啜可汗以靖北庭敗吐蕃誅康待賔隴底以西烽火為息慰薦麾下吏士任必以材往往超倫績用茂著王君奐以果勇代處分閫之寄牛仙客出將入相以清幹信謹稱斯又奬拔之明也當時議者謂知運與郭虔瓘王晙薛訥並為中興名將至今隴上將士思之或有起祠宇於故城遺壘尸而祝之者上元中肅宗加太公望以武成王之號知運列於配食之位則其勳伐事業冝有以美稱易其名者謹按諡法服叛懷逺曰威易曰厥孚威如繫辭曰弧矢之利以威天下虞書曰董之用威傳曰非威非懷何以示德則威者聖人所以佐仁義以齊天下者也施於名號可以表將帥之德請諡知運曰威謹議駮議郭知運崔厦左司貟外郎崔厦議曰郭知運承恩詔葬向五十年今請易名竊恐非禮謹按禮記云禮時為大又曰過時不為禮也昔衛公叔文子卒將葬其子或請諡於君曰日月有時將葬矣請易其名者蓋時不可踰也節度既名不浮行數紀之前門生故吏巳合謀諡今乃申請竊將有為而作節度嗣子英又頃屬多故屢制方隅朝廷立勳位表端揆附從者竊不中禮會無妄之求況節度當開元𥘉賵贈特加碑志逾等皆出恩命追悼之過亦巳當矣今又鹵莽外於典章追送往之闕遺啓將來之冒昧況今裂土者接畛專征者百輩若率而行之誰曰無請不惟有司疲於簡牘抑恐名器等於草芥雖曰曲全竊將不可又禮經云巳孤暴貴不為父作諡若節度合諡而不以其時則嗣子廢先君之德若不合諡而苟遂其志則先君因嗣子而見尊以僕射而言恐貽越禮之讓以國家而言又殊旌善之體請下太常重議重議郭知運獨孤及博士獨孤及議曰禮時為大順次之將次葬易名時也古有闕禮追逺請諡順也假如諸矦五月而葬魯惠公之薨也有宋師至隱公元年十月巳改葬不以踰時廢禮又公叔戍請諡適當葬前謹按禮經曾不言巳葬則不可追諡況帝王殊塗不相沿襲新禮則死必有諡不云日月有時今請易名者五家無非葬後苗太師一年矣吕諲四年矣盧奕五年矣顔杲卿八年矣並荷褒寵無異同之論獨知運以其子不幸遂以過時見抑苟必以巳葬未葬為節則八年與五十年其緩一也而與奪殊制無乃不可乎議云巳孤暴貴不為父作諡此謂其父無位而子居大官不當以已之貴加榮於父也禮不云乎父為士子為大夫葬以士耳若知運者處方面之寄位列九卿茂勳崇名與衛霍侔飾終之禮冝加於他將一等豈待因依嗣子然後作諡今之專征者雖逢風雲化為侯王其祖父爵位與知運齒者鮮矣奈何懼名器等於草芥以是殺禮竊謂近誣乾元以來纍有詔追贈百官祖父內外文武具僚之先悉蒙恩錫或音徽久沐或墓木巳拱受大名貴位於九原者以萬數未嘗以殁代逺近為限夫贈諡一也贈者一時之寵諡者不刋之令今以歲久而廢易名是王澤浹於天下而獨隔於一人也當開元二年吐蕃以舉國之師入五原塞擊柝之聲聞於秦雍知運與郭虔瓘討平之以張王室當時微知運則汧隴之西左袵是懼今朝廷方將命將帥以征不服討不庭冝褒之以勸握兵者安可以葬久而廢大典況夫諡法者蓋考其言行事業之邪正必以字褒貶之使生者聞美諡而慕覩惡諡而懼不待賞罰而賢不肖皆勸是一字之諡賢於三千之刑本非為殁者之子孫以為哀榮寵贈之具假令知運無子且未嘗立勳苟位至上將則諡不可廢豈以其子之存亡為請諡之可否竊稽載籍徴諸舊章易名之禮請如前謹議唐故御史中丞盧奕諡議獨孤及盧奕剛毅而忠直方而淸勵精吏事所居可紀天寶十四載洛陽覆沒于時東都人士狼狽鹿駭猛虎磨牙而爭其肉居位者皆欲保性命而完妻子或先䇿高足爭脫羿彀或不恥苟活甘飲盜泉奕獨正身守位義不去以死全節誓不辱勢窘力屈以朝服就執西向而辭然後受害雖古烈士方之者鮮矣或曰洛陽之存亡操兵者實任其咎非執法吏所能抗師將奔去之可也委身冦讎以死誰懟某以為不然勇者禦而忠者守必社稷是衛則死生以之危而去之是智免也於忠何有蓋荀息殺身於晉不食其言也仲由結纓於衛不避其難也石丐勤其官而水死守位而忘軀也伯姬待保姆而火死先禮而後身也彼四人者死之日皆於事無輔夫豈愛死而賈禍也以為死輕於義故蹈義而捐生古人書之使事君者勸然則祿山之亂大於里丕孔悝廉察之任切於玄冥之官分命所繫不啻保姆逆黨兵威烈於水火于斯時也能與執干戈者同其勠力挽之不來推之不去豈不以師可虧義不可苟身可殺節不可奪故全其特操于白刃之下孰與懷安偷生者同其風哉謹按諡法圖國忘死曰貞秉德遵業曰烈奕執憲戎馬之間志藩王室可謂圖國矣國危不能拯而繼之以死可謂忘死矣歷官十一任言必正事必果而淸節不撓去之若始至可謂秉德矣先黃門以直道佐時奕嗣之以忠純可謂遵業矣請諡曰貞烈謹議唐故常州刺史獨孤及諡議權德輿將仕郎守太常博士權德輿議曰獨孤及剛方直淸根於性術其修身蒞官確乎處中立言遣辭有古風格辨論裁正昭德塞違濬波瀾而去流蕩得菁華而無枝葉其摳衣入室之徒皆足以掌贊書而秉方册則及之為文可徴矣其為博士時有上議景皇帝不冝為太祖者詔下庶官及舉夏殷周漢之故事尊祖配天之大旨以為景皇帝始封於唐天所命也於是定議為一代典法新平長公主之子裴敖尚永淸公主欲以他宗主婚及相禮上陳不可竟得以裴僕射遵慶為主當時稱之定吕諲盧奕郭知運之諡用禮文憲度得褒貶之正凡所往復詞旨堅明其理舒州屬歲飢旱鄰郡庸亡什四巳上而舒人生聚恱安不知凶年優詔褒異就賜金紫其初在濠其後在常皆因俗為理人用愛戴雖不得居公卿長帥之任然其奉常議論三郡績用亦足以列於文苑附於循吏按諡法曰博文多能曰憲薦可替否曰憲及酌三王四代之典訓作為文章以輔教化是為博聞位參中外必以稱職聞是為多能定宗廟之饗為薦可正婚姻之至為替否有司稽美行而易其名者請諡及曰憲謹諡晉諡恭世子議白居易晉侯以驪姬之惑殺太子申生或謂申生得殺身成仁之道是以晉人諡為恭世子載在方册古今以為然居易獨以為不然大凡恭之義有三以孝保身子之恭以正承命臣之恭以道守嗣君之恭若棄嗣於非禮不可謂道受命於非義不可謂正殺身以非罪不可謂孝三者率非恭也申生有焉而諡曰恭不知其可若垂之來代以為訓戒居易懼後之臣子有失大義守小節者將奔走之將欲商攉敢徴義類在昔虞舜父頑母嚚舜既克諧瞽亦允若申生父之昏姬之惡誠冝率子道以幾諫感君心至誠雖申生之孝不侔於舜而獻公之頑亦不逮於瞽盍以蒸蒸之乂俾不格於姦乎故咎之始形則齋栗祗戴而為虞舜可也若不能及禍之將兆則讓位去國為吳太伯可也若又不能及難之既作則全身逺害為公子重耳可也三失無一得於是乎致身於不義不祗陷父於不德不慈負罪被名以至於死臣子之道不其惑歟夫以堯之聖書美曰允恭舜之孝書美曰溫恭今以申生之失道亦謂曰恭庸可稱乎周之衰也楚子以霸王之器奄有荆蠻光啓土宇赫赫楚國由之而興諡之為恭猶曰薄德今申生徇其死不顧其義輕其身不啚其君俾死之後弒三君奚齊卓子懷公殺十有五臣荀息里克丕鄭祁舉共華賈華叔堅騅顓纍虎持宫山祁慶鄭狐突瑕生郤芮實啓禍先大亂晉國則楚恭之得也如彼申生之失也如此異德同諡無乃不可乎左氏修魯史受經於仲尼蓋仲尼之志丘明從而明之無善惡無小大莫不微婉而發揮焉至於申生之死也之諡也略而無譏何其謬哉何以核諸且仲尼修春秋明則有凡例幽則有微旨其有君不君臣不臣父不父子不子者率書名以貶之故書曰晉侯殺其太子申生不言晉人而書晉侯且名太子者蓋明晉侯不道且罪申生陷君父於不義也以微旨考之則仲尼之明貶可知矣以凡例推之則左氏之闕文可知矣嗚呼先王之制諡豈容易哉蓋善惡始終必褒貶於一字所以彰明往者而勸沮來者故君子於其諡無所苟而巳矣繇是而言則恭世子之諡不亦誣乎不亦誣乎重校正唐文粹卷第四十一
