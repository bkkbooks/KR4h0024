front:
  text: 重校正唐文粹卷第八十一
  hash: sha256:8565e24af2ef4363350a4258f1a5677f1a337b4095513c0404fdbab7a4479cce
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0024_SBCK_081-1a}
body:
  text: 吳興姚鉉纂書三揔七首論易一與劉禹錫論易書柳宗元論禮二荅王績書杜之松重荅杜君書王績論國語二與吕道州温論非國語書柳宗元荅呉武陵論非國語書論制詔一荅楊湖南書權德輿論書一上李大夫論古篆書李陽氷與劉禹錫論易書柳宗元見與董生論周易九六義取老而變以爲畢中和承一行僧得此說異孔穎達䟽以爲新竒彼董子畢子何庸末於學而遽云云也都不知一行僧承韓氏孔氏說而果以爲新竒不亦可笑矣哉韓氏注乾之䇿二百一十有六曰乾一爻三十有六䇿則是取其過揲四分而九也坤之䇿一百四十有四曰坤一爻二十四策則是取其過揲四分而六也孔穎達等作正義論云九六有二義其一者曰陽得兼隂隂不得兼陽其二者曰老陽數九也老隂數六也二者皆變周易以變者占鄭玄注易亦稱以變者占故云九六也所以老陽九老隂六者九過揲得老陽六過揲得老隂此具在正義乾篇中周簡子之說亦若此而又詳備何畢子董子之不視其書而妄以口承之也君子之學將有以異也必先究窮其書究窮而不得焉乃可以立正也今二子尚未能讀韓氏注孔氏正義是見其道聽而塗說者又何能知所謂易者哉足下取二家言觀之也則見畢子董子庸末於學而遽云云也足下所爲書非元凱兼三易者則諾若易者則諾若曰孰與穎達著此說乃穎達也非一行僧畢子董子能有異說者也無乃即其謬而承之者歟觀足下出入筮數考校左氏今之世罕有如足下求易之悉也然務先窮昔人書有不可者而後革之則大善謹之勿遽宗元白荅王績書杜之松辱書知不降顧歎恨何已僕幸恃故情庻迴高躅豈意康成道重不許太守稱官老萊家居羞與諸侯爲友延佇不獲如何如何竒跡獨全幸甚幸甚敬想結廬人境植杖山阿林壑地之所豐煙霞性之所適䕃丹桂藉白茅濁酒一杯清琴數弄誠足樂也此眞高士何謂狂生僕慿藉國恩濫尸貴部官守有限就學無因延頸下風我勞何極前因行縣實欲祗尋誠恐燉煌孝廉守琴書而不出酒泉太守列鐘鼔而空還所以遟迴遂攬轡也僕雖不敏頗識前言道旣知尊榮何足恃豈不能正平公之坐敬養亥唐屈文侯之膝㳟師子夏雖齊桓德薄五行無疑睢夸故人一來何損蒙借家禮今見披尋微而精簡而備誠經傳之典略閨庭之要訓也其喪禮新義頗有所疑謹用條問具如别帖想荒宴之餘爲銓釋也遲更知聞杜之松白重荅杜君書王績月日佐吏楊方至奉報書兼枉帖垂問家禮喪服新義五道度情振理探幽洞微誠非野人所敢酬析但先人遺㫖頗曽㳟習雖困於荒宴猶憶於異聞謹因還使條申如左夫三年之喪情禮之極有正有義因事之作也正服之縗三升而已至於義服加其半焉豈非義有離合之理情無遷奪之法然親尊罔極冠綬可均切至或殊縗如其半微以見志有何怪焉至如父爲嫡子獨施斬服蓋以所承者重情寄者特非惟親親且尊尊也至於庶子巳不承尊雖有長子無預祖禰不爲服斬義亦可知但古之君臣有國有家相承繼體血祀長存大宗小宗較然有别繼祖繼禰由兹可推故曰天子不絶國諸侯不絶家貴人之宗也故别子爲祖父繼之爲大宗此百代不遷之宗也巳父爲禰兄繼之爲小宗此四代則遷之宗承百代之重且得不爲其長子斬乎爲四宗之祖亦得不爲其長子斬乎唯繼禰之弟無預祖禰庶子之義施此而已自秦漢巳來家國道廢雖有其禮將安所行逮乎晉末中原大亂骨肉至親尚不相保祖禰之序知何以明故僕先君獻公因事起義欲使無逆於古且令可行於今以爲今之封爵頗存古號雖無其實而尚有其名故以始受封者猶古之諸侯諸侯之庶子即古之别子也别子之庻子即古之小宗也雖國破家亡朝遷市變譜牒存録宗次可推咸可一依古體行之私室至如冗冗耕者悠悠黔首族姓猶不能自辨何暇及於宗庶之事乎此古之先王所以不下禮於庶人也有何不可而乃疑乎至若夫妻之道誠爲義合而家道之睦斯爲首焉故傳曰妻至親也一體之名均於天性故妻之於夫也其服曰斬蓋移於父母之重焉夫之於妻也朞而有杖則踰於兄弟之功焉前賢往達曽無異議故曰妻者齊也一齊而不易如至失禮而出違妻之道終喪而嫁棄婦之義也違道棄義又何述焉苟全道義則天親也天親之服有何義乎列之正服斯爲當矣此先君獻公探記傳之旨明後來之失敦人倫之源睦伉儷之道也夫何痛哉明公又云君臣夫妻俱以義合而妻爲正服臣爲義服則君臣之際不如夫婦之情乎斯不然矣何者夫禮有以情作者父子夫婦之類是也有以義作者君臣之類是也情義之極俱終于斯此其無升降明矣但禮之爲用縁情以至理因内以及外情者人之深心愚智之所共也孰有愚者而忘其妻子乎理者人之大節凡聖之所異也孰有凡主而忘其臣妾焉故情者正也此妻子所以荷深心而執夫父以正服也理者義也此臣妾所以存大節而申君主以義服也故夫正義之作殊情而共禮也孰謂君臣之義而謝夫婦之情乎孰謂夫婦之情而厚君臣之義乎古之君子甞度情以處斷義而行矣義可奪情衛石碏不能存其子情不害義官之竒得以其族行故曰情義殊也情義均也故情義之服有正焉有義焉正義之禮無厚焉無薄焉此妻爲正服所以無害於君臣臣爲義服所以不傷於夫婦有倫有要夫何稽疑至如三殤之服禮有明文鄭與王杜各申本見由兹紛雜後莫能定然詳諸記義王杜爲長某昔在隋末甞見諸賢講論此矣近者家兄御史亦編諸賢之論繼諸對問今録此篇附往幸詳之也至如衆子服朞其妻小功兄弟之子猶子也其服亦朞先儒以爲其妻亦小功惟王肅以爲喪服之例旁尊皆執明公以爲重於子妻之服失禮之差此則袁凖之義也夫禮雖縁情亦爲義屈故從無服而有服者亦何嫌乎兄弟之子妻越已子之妻乎故曰兄弟之子猶子也蓋引而致之故不嫌於與己同服矣旁尊不敢以壓降蓋避正尊而自執也故不嫌於越已子之妻矣輕陳末學豈能詳究又於楊方奉口處分借王儉禮論門庭所蓄先無此書往於處士程融處曽見此本觀其制作動多自任周孔規模十不存一恐不足以塵大雅君子之視聽也尋問儻獲當遣祗送王績曰與吕道州温論非國語書柳宗元四月三日宗元白化光足下近世之言理道者衆矣率由大中而出者咸無焉其言本儒術則迂迴茫洋而不知其適其或切於事則苛峭刻覈不能從容卒泥乎大道甚者好怪而妄言推天引神以爲靈竒恍惚若化而終不可逐故道不明於天下而學者之至少也吾自得友君子而後知中庸之門戸階室漸染砥礪幾乎道眞然而常欲立言垂文則恐而不敢今動作悖謬以爲僇於世身編夷人名列囚籍以道之窮也而施乎事者無日故乃挽引彊爲小書以志乎中之所得焉甞讀國語病其文勝而言庬好怪以反倫其道舛逆而學者以其文也咸嗜閲焉伏膺呻吟者至比六經則溺其文必信其實是聖人之道翳也余勇不自制以當後世之訕怒輒乃黜其不臧究世之謬凡爲六十七篇命之曰非國語旣就累日怏怏然不喜以道之難明而習俗之不可變也如其知我者果誰歟凡今之及道者果可知也已後之來者則吾未之見其可忽邪故思欲盡其瑕纇以别白中正度成吾書者非化光而誰輒令往一通惟少留視役慮以卒相之也往時致用作孟子評有韋辭者告余曰吾以致用書示路子路子曰善則善矣然昔人爲書者豈若是摭前人邪韋子賢斯言也余曰致用之志以明道也非以摭孟子蓋求諸中而表乎世焉耳今吾爲是書非左氏尤甚若二子者固世之好言者也而猶岀乎是言況不及者滋衆則余之望乎世也愈狹矣卒如之何苟不悖於聖道而有以啓明者之慮則猶是罪余者曰雖累百世滋不憾而恧焉於化光何如哉激乎中必厲乎外想不思而得也某再拜荅吳武陵論非國語書濮陽吳君足下僕之爲文乆矣然心少之不務也以爲是特博奕之雄耳故在長安時不以是取名譽意欲施之事實以輔時及物爲道自爲罪人捨恐懼則閑無事故聊復爲之然而輔時及物之道不可陳於今則宜垂于後言而不文則泥然則文者固不可少也拘囚已來無所發明蒙覆幽獨㑹足下至然後有助我之道一觀其文心朗目舒烱若深井之下仰視白日之正中也足下以超軼如此之才毎以師道命僕僕滋不敢僕毎爲一書足下必大光耀以明之固又非僕之所安處也若非國語之說僕病之乆甞難言於丗俗今因其閑也而書之恒恐後世之知言者用是詬病狐疑猶豫伏而不出者累月方示足下乃以爲當僕然後敢自是也吕道州善言道亦若吾子之言意者斯文殆可取乎夫爲一書務富文采不顧事實而益之以誣怪張之以闊誕以炳然誘後生而終之以僻是猶用文錦覆陷穽也不明而岀之則顚者衆矣僕故爲之標表以告夫遊乎中道者焉僕無聞而甚陋又在黜辱居泥塗若螾蛭然雖鳴其音聲誰爲聽之賴丗之知言者爲准其不知言而罪我者吾不有也僕又安敢期如漢時列官以立學故爲天下笑邪是足下之愛我厚故言之也前一通如來言以汚篋牘此在明聖人之道微足下僕又何託焉宗元頓首荅楊湖南書權德輿使至蒙惠寄制集序發函煥然盈耳溢目弘麗博厚坦夷章明如黃鍾大玉慶霄天籟竒采正聲鏗鏘照燭眞可謂作者之表方駕古人欣歡駭悚詠歎無斁甚盛甚盛但根本不稱奬飾非宜以此爲雄文至鑒之累如何如何書命者古先哲王之所以發德音而賦百職也在易曰后以施命誥四方書曰誕告萬方詩曰訏謨定命逺猶辰告故君陳君牙畢命囧命之作皆直而文簡而誠含章而不流漢廷亦云文章爾雅訓辭深厚其重如是而鄙人忝焉使盛聖之文明不登於典謨訓誥罪在菲薄其敢逃責於多士邪昔顔氏之子有不善未甞不知知之未甞復行雖竊知之之道而職命所拘不能不俟終日而勇退日踐復行之過至于九年暴于四方爲所觀笑此所以慙愧於古人也亦思人生世間當志於逺者大者豈數數然損精耗神攘竊文字而猶力不足意不逮雖三益直諒之道乆廢獨不愧於心乎昨休沐之餘愚子呈閱且以有大朝中外之授受士友遷除之歲時遂不計研蚩相從以類初不敢以制集自命但全其文而已因其猥多分列卷第又靦然以序引奉煩者誠以承眷之深而心仰雄伯使夜光冠於魚目永爲子孫秘藏非敢效太沖三都而求玄晏發之之道也及覽鴻麗之作無非逸言追思内訟已無所及使鄙人渉弊帚自見之患陷作者於玉巵無當之嫌一不敏而相交喪何可言也伏以門中忠節敘述周詳因小生之無似楊先德於不朽伏讀感咽何階仰酬結於肺肝没齒無極又德音宥密皆出自中禁而西掖所掌止於命官今序中所言霈王澤燭幽滯振刑典申肅殺揄揚弘大務極其言則虚美之中又爲虚美所兾盡去過談方敢受賜耳故吏部李貟外三丈寓書於柳秘書求爲後集序此賢達所不能忘懷也但侈言失實如楚越之相遼異時見譏於通人則復爲累亦輒爲閣下良規非止於自謀也左曹許公範二紀已來過於賞愛鄙人毎以逐臰况之今又遇閣下此作素多昧理忽復自疑幸無泥於眷私而滅裂公是是所望載之再拜上李大夫論古篆書李陽冰陽冰志在古篆殆三十年見前人遺跡美即美矣惜其未有點畫但偏傍模刻而已緬想聖達立制造書之意乃復仰觀俯察六合之際焉於天地山川得方圎流峙之形於日月星辰得經緯昭回之度於雲霞草木得霏布滋蔓之容於衣冠文物得揖讓周旋之體於鬢眉口鼻得喜怒慘舒之分於蟲魚禽獸得屈伸飛動之理於骨角齒牙得擺拉咀嚼之勢隨手萬變任心所成可謂通三才之氣象備萬物之情狀者矣常痛孔壁遺又汲冡舊簡年代浸逺謬誤滋多蔡中郎以豐同豊李丞相將束爲宋魚魯一惑涇渭同流學者相承靡所遷復毎一念至未甞不廢食雪泣攬筆長歎焉天將未喪斯文也故小子得篆籕之宗旨皇唐聖運建兹八葉天生尅復之主人樂惟新之令以淳古爲務以文明爲理欽若典謨疇兹故實誠願刻石作篆備書六經立於明堂爲不刋之典號曰大唐石經使百代之後無所損益仰明朝之洪烈法高代之盛事死無恨矣陽冰年垂五十去國萬里家無宿舂之儲出無代歩之乗仰望紫極逺於丹霄若溘先犬馬此志不就必將負於聖朝是長埋於古學矣大夫銜命北闕撫寧南方苟利國家專之可也伏望處分令題簡牘及到主人寒天已暮闇燭之下應命書之霜深筆冷未窮體勢儻歸奏之日一使聞天非小人之已務是大夫之功業可否之事伏惟去就之陽冰再拜重校正唐文粹卷第八十一
