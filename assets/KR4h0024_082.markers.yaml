  - {type: variant, offset: 7374, length: 0, content: '', WYG: 排患難於朋友者數四由是以義聞襄之守狀為文學始就羈於吏職某聞風旣乆因與之遊逢每寃其父之名不在於史將欲抱所寃詣京師告訴司史氏蓋行有日矣以愚料之甄生僕短馬疲言約行孤將不為驕閽之所排則權力者遲疑以臨之固無自而入矣因曉甄生以無自入之勢且告以執其事者辱與某游願得所寃之狀告甄生厚相信待由是輟行旣而自思滓賤之中猶願貢所聞於執事得非愚且僭也然誚笑之暇幸垂察焉不宣某再拜答元稹侍御書韓愈九月五日愈頓首微之足下前歲辱書論甄逢父濟識安禄山必反即詐為瘖棄去禄山反有名號又逼致之濟死執不起卒不汚禄山父子事又論逢知讀書刻身立行勤已取足不干州縣斥其餘以救人之急足下繇是與之交欲令逢父子名跡存諸史氏足下以抗直喜立事斥不得立朝失所不自悔喜事益堅微之乎子}
