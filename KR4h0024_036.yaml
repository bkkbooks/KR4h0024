body:
  text: 吳興姚鉉纂論丙揔九首文質三人文化成論呂温質文論李華文章論李德𥙿經旨五編年紀傳論皇甫湜卜世論孫郃春秋無賢臣論秦穆謚謬論皮日休太甲論陳越石讓國一吳季札論獨孤及人文化成論吕温易曰觀乎人文以化成天下能諷其言蓋有之矣未有明其義者也甞試論之夫一二相生大鈞造物百化交錯六氣節宣或隂闔而陽開或天經而地紀有聖作則實爲人文若乃夫以剛克妻以柔立父慈而教子孝而箴此室家之文也君以仁使臣臣以義事君予違汝弼獻可替否此朝廷之文也三公論道六卿分職九流異趣百揆同歸此官司之文也寛則人慢糾之以猛猛則人殘施之以寛寛以濟猛猛以濟寛此刑政之文也樂勝則流遏之以禮禮勝則離和之以樂與時消息因俗變通此教化之文也文者蓋言錯綜庶績藻繪人情如成文焉以致其理然則人文化成之義其在兹乎而近代謟䛕之臣將以時君不能則象乾坤祖述堯舜作化成天下之文乃以旂常冕服章句翰墨爲人文也遂使君人者浩然忘夲沛然自得盛威儀以求至理坐吟詠而待升平流蕩因循闇而未悟不其痛歟必以旂常冕服爲人文則秦漢魏晉聲明文物禮縟五帝儀繁三王可曰煥乎其有文章矣何衰亂之多也必以章句翰墨爲人文則陳後主隋煬帝雍容綺靡洋溢編簡可曰文思安安矣何滅亡之速也覈之以名義研之以情實旣如彼較之以今古質之以成敗又如此傳不云乎經緯天地曰文禮不云乎文王以文治則文之時義大矣哉焉可以名數末流雕蟲小伎厠雜其間乎質文論李華天地之道易簡易則易知簡則易從先王質文相變以濟天下易知易從莫尚乎質質弊則佐之以文文弊則復之以質不待其極而變之故上無從亂記曰國奢則示之以儉國儉則示之以禮禮謂易知易從之禮非醻酢禓襲之煩也儉謂易知易從之儉非茅茨土簋之陋也蓋達其誠信安其君親而巳質則儉儉則固固則愚其行也豐肥天下愚極則無恩文則奢奢則不遜不遜則詐其行也痼瘠天下詐極則賊亂故曰不待其極而變之固而文之無害於訓人不遜而質之艱難於成俗若不化而過則愚之病淺於詐之病也無恩之病緩於賊亂之極也故曰莫尚乎奢也奢而後化之求固而不獲也利害遟速不其昭昭歟前王之禮世滋百家之言世益欲人專而不爲誠難乎哉吉凶之儀刑賞之級繁矣使生人無適從巧者弄而飾之拙者眩而失守誠僞無由明天下浸爲陂池蕩爲洪流雖神禹復生誰能救之夫君人者修德以治天下不在智不在功必也質而有制制而不煩而巳太康啓子禹孫當斯時有堯舜遺人親受禹之賜國爲羿奪内則夏之六卿外則夏之四嶽而羿浞愚弄鬪爭内外黙然一以聽命至少康艱難而後復原是觀之則聖有謀訓何補哉漢髙除秦項煩苛至孝文玄黙仁儉斷獄幾措及武帝修三代之法而天下荒耗則文不如質明矣漢氏雖歷産禄吳楚之亂而宗室異姓同力合心一舉而安且漢德結於人心不如夏家諸吕吳楚之强倍於羿浞安漢至易而復夏至難何也周德最深周公大聖親則管蔡爲亂逺則徐奄並興夷多難復明辟兼虞夏商之典禮後王之法備矣太平之階厚矣至成王季年而後理唯康王垂拱囹圄虚空逮昭王南征不返因是陵夷則郁郁之盛何爲哉周法六官備數四時盛祭車服盛飾至於下國方五十里卿大夫士之多軍帥之衆大聘小聘朝覲㑹同地狹人寡不堪覲謁大何得不亂小何得不亡記云周之人强仁窮賞罰故曰殷周之道不勝其弊考前後而論之夏衰失於質而無制周弱失於制而過煩故也愚以爲將求致理始於學習經史左氏國語爾雅荀孟等家輔佐五經者也及藥石之方行於天下考試仕進者冝用之其餘百家說䜟緯之書存而不用至於喪制之縟祭禮之繁不可備舉者以省之考求簡易中於人心者以行之是可以淳風俗而不泥於坦明之路矣學者局於恒教因循而不敢失於毫釐古人之說豈或盡善數骨肉之罪而襃叔向不忍聞之言而書昭伯敬龜筴之信而陳僂句使不仁之人萌芽賊心而仁義之士閉目掩卷何如哉其或曲書常言無禆世教不習可也則煩潰日亡而易簡日用矣海内之廣億兆之多無聊於煩彌世曠乆今以簡質易煩文而便之則晨命而夕周踰年而化成蹈五常享五福理必然也子言以約失之者鮮矣與其不遜也寧固傳曰以欲從人則可記曰大樂必易大禮必簡顔子曰無施勞經義可據也如是爲政者得無以爲惑乎文章論李德𥙿魏文典論稱文以氣爲主氣之淸濁有體斯言盡之矣然氣不可以不貫不貫則雖有英詞麗藻如編珠綴玉不得爲金璞之寳矣鼔氣以勢壯爲美勢不可以不息不息則流宕而忘返亦猶絲竹繁奏必有希聲窈眇聽之者恱聞如川流迅激必有洄洑逶迤觀之者不厭從兄翰甞言文章如千兵萬馬風恬雨霽寂無人聲蓋謂是也近世誥命惟蘇廷碩叙事之外自謂文章才實有餘用之不竭沈休文獨以音韻爲切重輕爲難語雖甚工㫖則未逺夫荆璧不能無瑕隋珠不能無纇文旨髙妙豈以音韻爲病哉此可以言規矩之内未可以言文外意也較其師友則魏文與王陳應劉討論之矣江南惟於五言爲妙故休文長於音韻而謂靈均以來此祕未覩不亦誣人甚矣古人辭髙者蓋以言妙而工適情不取於音韻曹植七哀詩有徊泥諎依四韻王粲詩有舉原安三韻班固漢書賛及當時詞賦多用恊韻猗歟元勳佐漢舉信是也意盡而止成篇不拘於隻耦文選詩有五韻七韻十一韻十三韻二十韻者今之文自四韻六韻以至百韻無有隻者故篇無足曲詞寡累句譬諸音樂古辭如金石琴瑟尚於至音今又如絲竹鞞鼔迫於促節即知聲律之爲弊也甚矣世有非文章者曰詞不出於風雅思不越於離騷摸寫古人何足貴也余曰譬諸日月雖終古常見而光景常新此所以爲靈物也余甞爲文箴而載於此曰文之爲物自然靈氣愡怳而來不思而至杼軸得之澹而無味琢刻藻繪彌不足貴如彼璞玉磨礱成器奢者爲之錯以金翠美質旣彫良寶斯棄此爲文之大旨也編年紀傳論皇甫湜論曰古史編年至漢史司馬遷始更其制而爲紀傳相承至今無以移之歷代論者以遷爲率私意蕩古法紀傳煩漫不如編年湜以爲合聖人之經者以心不以跡得良史之體者在適不在同編年紀傳繫於時之所冝才之所長者耳何常之有夫是非與聖人同辨善惡得天下之中不虚美不隱惡則爲紀爲傳爲編年是皆良史矣若論不足以析皇極辭不足以杜無窮雖爲紀傳編年斯皆罪人且編年之作豈非以事繫日以日繫月以月繫時以時繫年者哉司馬氏作紀以項羽承秦以吕后接之亦以歷年不可中廢年不可闕故書也觀其作傳之意將以包該事迹叅貫話言纎悉百代之務成就一家之說必新制度而馳才力焉又編年記事束於次第牽於混并必舉其大綱而簡於序事是以多闕載多逸文乃别爲著録以備書之語言而盡事之夲末故春秋之作則有尚書左傳之外又爲國語可復省左史於右合外傳於内哉故合之則繁離之則異削之則闕子長病其然也於是草舊典開新程爲紀爲傳爲表爲志首尾其叙述表裏相發明庶爲得中將以不朽自漢至今代以更八年幾歷千其間賢人摩肩史臣繼踵搉今古之得失論述作之利病各耀聞見競誇才能改其規模殊其體統傳以相授奉而道行而福年之史遂廢蓋有以也唯荀氏爲漢紀裴氏爲宋略强欲復古皆爲編年然其善語嘉言細事詳說所遺多矣如覽正史方能備明則其密漏得失章章於是矣今之作者苟能遵紀傳之體制同春秋之是非文敵遷固直如南董亦無上矣儻捨源而事流棄意而徴跡雖服仲尼之服手絶麟之筆等古人之章句署王正之月日謂之好古則可矣顧其書何如哉卜世論孫郃周成王定鼎于郟鄏卜世三十卜年七百夫帝王括囊宇宙位重憂崇天生利民非樂兆民之上故君民者遇夫聖則禪之不遇則以子繼之堯之於舜舜之於禹禹之於子是以周都天地之中欲便四方之㑹不恃山河務從德化原其意也在乎利民豈異唐虞之道而反卜年卜世邪必也欲永其祚莫先德義貽厥後世天人祐之豈非無窮也哉何三十七百年世之有若右其卜而左其德俾乎厥後恃年世之永乆必輕乎德義若此之謀非君子之道也昔太戊懼烖而盛帝辛恃瑞而亡在此不在彼豈不知之而卜年卜世者乎春秋無賢臣論春秋列國周之諸矦受周之封分爲五等五等之下臣爲陪臣陪臣於諸矦君父也諸矦於周王亦君父也陪臣於周義猶大父也夫爲子之道孝於父者必欲父孝於祖陪臣忠於諸矦者必欲諸矦忠於天子則忠孝兩全康乂天下今春秋陪臣張公室侵王室弱周以强諸矦是弱祖而强父佐諸矦而敵周是佐父而敵祖遺祖之怨成父之逆惡莫大焉言之於臣則非忠語之於子則非孝論之於道則傷義推之於情則辜恩遂使姬周削弱祀號而巳桓文雖以爲霸何能正之反有封禪請隧之僭管晏雖有其功何能諫之而有反玷毀孔之惡于時風教大壞海内焚如天不能隂騭下民降大聖以爲木鐸歷國七十餘說而不遇奔走齊魯宋衛之郊反若喪家之狗知不可訓慮後世不懼乃修春秋明向背其有甚者或夷之或狄之弑君三十六亡國五十二奔走失社稷者不可勝紀書曰帝乃震怒致令海内無一嘉祥但有妖怪謂春秋亂世豈不如然于時人不堪命何邪無賢臣哉予爲此論警衆士大夫多稱之遂聞唆口鬲嘏唆口鬲嘏徴而竒之或謂可刋金石訓乎今後旣而喧傳則有難僕曰春秋豈乏賢者子謂之無激之邪鮮之邪奈乎孔門何曰孔門仕者鮮又家臣耳子不讀聖賢書乎易云屯其膏小貞吉大貞凶春秋之大夫小貞耳盍以大貞取之以王道取五霸猶罪人秦穆謚繆論皮日休聖人務安民不先置不仁以見其仁焉不先用不德以見其德焉茍如是是見危者巳墜而欲援觀鬪者將死而方救噫其亦不仁矣以髙辛之仁化用一摯摯之不善天下之民捕堯以爲君以唐堯之仁化用一鮌鮌之不績天下之民譟禹以爲功夫如是摯之與鮌是髙辛唐堯誠用之非先置也推其誠而用之人民尚倍之如是况先置者邪當晉獻驪姬之亂後奚齊卓子之死餘重耳在翟夷吾居秦以秦穆之力制翟而安晉其能必矣夫重耳之賢也天下知之又其從者皆足以相人國趙衰顚頡舅犯之謂如先立之必能誅亂公子去暴大夫翼德於成周宣化於汾晉而穆公乃取公子摯之言謂父子摯曰君若求置晉君以成名於天下則不如先置不仁者以猾亦中矣乃先置夷吾是爲惠公公之入也背内外之賂謂許里克以汾晉之田方百里平鄭貟蔡之田方七十里許公子摯河外列城五黄金三十鎰白玉珩六雙誅本立之臣惠公二年春殺里克秋殺􅊭鄭蒸先父之室謂惠公蒸於獻公夫人賈君是也故生民興誦謂輿人誦曰侯之不侯果喪其由死者無報謂惠公即位改葬恭世子而臰死達干外也卒身獲于秦公以九月獲十月歸而子殺于晉謂十五年惠公卒懷公立秦乃召重耳於楚而納之晋人殺懷公於髙梁嗚呼致是也非晉人之罪秦人之罪也夫摯立八年不善而去鮌用三載弗績而誅况晉惠公之在位作宗廟之蠹蝎爲社稷之稂莠一立十五年其爲害也大矣今之學者以秦穆爲繆尚疑其謚得斯文也可以謚􅓎爲定太甲論陳越石殷甲不惠于天下其臣放之後能改過亦爲臣之所立或曰社稷之臣必當如是淺於國者之爲論也至若承湯之教全殷之統立臣之節豈如是邪君上之不肖與賢智豈臣下之有不知邪擇其嗣當求賢而立之不知其非賢以爲不明因而放之令其自新如日蝕不吐河淸難俟中原之鹿將軼時乗之龍待駕於臣之業何如哉况乎體非金石而冒霧露如懷失國之詬以損其身則弑君之謗消無日矣陳子曰臣之忠有幸而忠者也君之立有幸而立者也知殷之君臣皆幸而成者噫浞浞接踵羿羿比肩君可放乎哉其後新取於西魏成於東司馬氏之有天下其始也未甞不伊不周其終也未甞不羿不浞皆取伊周以爲嗃矢也孟子曰無伊尹之心則簒也有㫖哉吳季扎論獨孤及謹按季子三以吳國讓而春秋襃之余徴其前聞於舊史氏竊謂廢先君之命非孝附子臧之義非公執禮全節使國簒君弑非仁出能觀變入不討亂非智左丘明太史公書而無譏余有惑焉夫國之大經實在擇嗣王者愼德之不建故以賢則廢年以義則廢卜以君命則廢禮是以太伯之奔勾吳也蓋避季歷季歷以先王所屬故纂服嗣位而不私太伯知公器有歸亦斷髪文身而無怨及武王繼統受命作周不以配天之業讓伯邑考官天下也彼諸樊無季歷之賢王僚無武王之聖而季子爲太伯之讓是徇名也豈曰至德且使爭端興於上替禍機作於内室遂錯命於子光覆師於夫差陵夷不返二代而吳滅以季子之閎達博物慕義無窮向使當壽夢之眷命接餘昧之絶統必能光啓周道以霸荆蠻則大業用康多難不作闔閭安得謀於窟室專諸何所施其七首嗚呼全身不顧其業專讓不奪其志所去者忠所存者節善自牧矣謂先君何與其觀變周樂慮危戚鍾曷若以蕭墻爲心社稷是恤復命哭墓哀死事生孰與先釁而動治其未亂棄室以表義挂劒以明信孰與奉君父之命慰神祗之心則獨守純白不義于嗣是潔巳而遺國也國之覆亡君實階禍且曰非我生亂其孰生之哉其孰生之哉重校正唐文粹卷第三十六
