body:
  text: 吳興姚鉉纂碑八揔四首宰輔唐中書令梁國公姚崇神道碑張説唐丞相尚書左僕射王播神道碑李宗閔唐丞相太子少師牛僧孺神道碑李珏唐丞相中書侍郎齊抗神道碑權德輿玄宗御書故中書令梁國公姚文貞公神道碑銘并序張説敘曰八柱承天高明之位定四時成歲亭育之功存畫為九州禹也堯享鴻名播時百榖棄也舜稱至德由此言之知人則哲非賢罔乂致君堯舜何代無人有唐元宰曰梁文貞公者位為帝之四輔才為國之六翮言為代之軌物行為人之師表蓋維嶽降神應時間出者也公諱崇字元之姚姓有虞之後逺自吳興近徙于陜今家洛陽焉烈考長沙文獻公樹勳王室建旟嶲府公紈綺而孤克廣前業激昻成學榮問日流武庫則矛戟森然文房則禮樂盡在弱冠輔孝敬挽郎又制舉高弟歷佐濮鄭並有聲華入為司刑丞天授之祭獄吏峻密公持法無頗全活者衆進夏官貟外郎郎中侍郎朝廷曰能遂掌軍國遷鳯閣侍郎監修國史兼相王府長史始則天人讓王承置醴之顧終以飛龍利見延參乘之恩自時厥後恆當大任凡三處兵部尚書三入中書令一為禮部尚書左庶子又肅政大夫揔靈武軍兵馬又司僕卿知隴右監牧出典亳宋常越許申徐潞楊同十郡景雲𥘉以藩邸舊僚封梁國公食賦百室公性仁恕行簡易虛懷泛愛而涇渭不雜真率徑盡而應變無窮常推是心以御於物故所蒞必氓庶風偃驁很化從言不勵而教成政不威而事理去思覩頌來暮聞歌既登邦政卒乘輯睦及在宗伯神人允諧今之中書是為理本謀事兼於百揆論道揔於三台公執國之鈞金玉王度大渾順序休徵來臻懋德格天名遂身遜拜開府儀同三司崇其秩逸其志也𥘉太夫人在堂公受職西掖頗限扃禁求侍晨昏優詔既許尋令還職公固請以泣制曰家有令弟足慰母心國有諌臣安可暫闕其後剖符江表敦諭起復衰麻外墨欒棘內毀變禮中權通識所貴神龍之首預聞興復疇其井賦纍讓而停夫以革故鼎新大來小往得喪而不形於色進退而不失其正者鮮矣君子曰忠不忘親仁也哀不違事義也讓功辭邑禮也濟代全名智也仁以長人義以和下禮以安上智以周身宜其光輔四帝軒冕三紀池臺琴築優遊暮齒傳爵土於祚胤保祿位於終始矣享年七十有一開元九年九月寢疾薨于東都慈惠里皇上悼焉國人慕焉撫牀輟春曽未云比制贈楊州大都督諡曰文貞禮也十年二月葬於萬安山之南原在疾也王人賜膳御醫視藥于薨也中使弔臨羽儀哀送君臣之義厚莫重焉子異子奕思綴遺美以置罔極有詔掌文之官敘事盛德之老銘功將以寵宗臣揚英烈帝乃灑恩仙翰鏤澤豐玫日月臨照於佳城煙雲變態於神道寶其文字别為羣玉之山禁其樵蘇即表三司之墓銘曰源深自虞派别從吳避地魯陜居家洛都神明逺契嶽瀆冥符翊聖斯偶生賢不孤仁將勇濟孝與忠俱學刃攢植文鋒迅驅才安早位即騁長途惟實惟有若虛若無再三軍國一二訏謨戎柄尤重王綸最樞兼司任切久政榮殊黼藻彌煥丹青靡渝以寬容物以鑒分區外或形放中恆禮拘針雖誡口諍亦忘軀但覩渾璞誰詳瑾瑜伊臯尺寸管樂錙銖名正身遂言誠願孚方辭漢祿更辱齊組既積而散窮歡盡娛川歸東極日去西晡上惻旒扆旁悲路衢藍田美玉荔浦明珠載廣休慶爰弘典謨豐碑乃立盛業其鋪帝念頻軫仙毫特紆鐫金刻石鳯篆龍圖七耀光動三泉澤濡欽能敘事理􅓹詞敷求舊銘實慙殫恧蕪𬗟思雲霧尚想江湖有道之德其何以踰延陵之墓空此嗚呼存殁終始遐哉邈乎唐故丞相尚書左僕射贈太尉太原王公神道碑銘并序李宗閔上即位五年丞相左僕射太原王公以癸未發疾其明日遂薨於位天子震悼慜惻遽命內謁者詣其室索其所以飮食寢作之端既詳其無他狀遂賻布帛菽粟率用峻等既又不塞痛軫之意加內府之絹千匹以錫之為之罷朝三日命兵部侍郎一人持節駕駟簫鼓出自正殿直抵柩前册公為太尉葬有日官給祕器及就途遣王人亟臨視之命羽葆旗常輅車之飾皆及墓俟其返虞鼓聲四節於里第而還示不與常制也其子鎮以宗閔晚陪公於相位之末稍窺公之行請銘其烈以垂于後且不冝拒遂鋪其犖犖所能言者於金石云公諱播字明揚太原人周靈王太子晉之後以歷世為王因而受氏高祖滿汾洲長史生太父璡嘉州司馬紿事中司馬生升咸陽縣令太子少師少師生恕楊府倉曹參軍尚書左僕射公僕射元子也忠敬而本仁寬明而有制內顯而敏外肅而和貞元十年舉進士第是歲䇿賢良以直言校書於集賢殿其言平戎經國之術粲然可舉調尉盩屋斷嶽首出御史中丞李汶愛之奏為監察御史按雲陽源咸季以贓免用疑文不冝調而調因謁於臺遂捕劾之追姦咠窮律旨奏流咸季刑曹部罷所居官給事中以省詔非是奪俸緣而坐罪者甚衆自是風聲不可遏矣為侍御史時京兆尹李實文皇所委能禍福卿士凡其榮衰繫所附背舉朝迎避其鋒公在途而實來揖公移文詆之其詞可羞實遂奏公為三原令求其不足於禮以持之公至尹署洎羣吏之館還其邑敬府之禮無不具實既出其算反加畏焉縣之編於戶者多中貴人前令率不能自為其政弛張牽之公悉召所謂貴人者入坐當其拜曰敬桑梓冝如是也邑人大駭從其所指為長安令朝廷方恩于頔而以帝女嫁其子民有與于氏蒼頭同盜人馬者前令捕民而縱其蒼頭公始至縣即立取其奴而與民均其法知御史雜事京師飢穀起價京西諸侯相率閉粟公移之簡書徵秦晉泛舟之説西鎮惴惴收去條令粟流于秦元和四年為御史中丞歲中知京兆尹六年為刑部侍郎充鹽鐵轉運使上言流人會赦而歸獨配囚為隔遂無還者請率以七歲為竟至今用之尋加禮部尚書益以御史大夫又以戶部尚書節度西蜀長慶𥘉覲穆宗言中外之事遂留為刑部尚書復斡鹽鐵冬拜中書侍郎平章事仍其職匡維激發始以進賢為急上方有意河朔以財賦始出於方土二年公用相印為淮南節度使以其職隨之四年言事者謂鹽運之設其留京師用制方土加檢校司空去其使未幾上念公成法又以使屬公加司徒今上踐祚急詔徵公至即拜左僕射同中書門下平章事仍其使尋兼太清宫使纍進爵至太原郡開國公食邑二千戶進階至金紫光祿大夫年七十二而薨公入官三十二政逮事六帝出統楚蜀之師入極台宰之尊前後三揔鹽鐵既去又復幾二十年天之所覆地之所載寧有獨私於公邪必有以當其然也一署吏苟不犯無能奪其任者歲時奏課至于策大史胥次遷亦如之故人用安其為善莫有欺公者雖逺至海裔若揔轡笞捶窮年不死一吏貶一職而羣務自濟凡朝廷平淮取鄆屠汴下滄澋干戈不息者五十六年饋餉資費隨兵緩急而立辦沛然若神給其間溝琵琶導潁河以漕輕舟師人坐受其飽疏三門挽沈石以濟巨艫關中遂亡其飢薦皇甫鎛之強敏而鎛反短公於上公猶不知上謂其長者論景忠信鎬制逗撓之將期必抵於罪時服其敢為深涉徐境導齟齬而為忠槩人曰真宰相器也榷征之外有雜緡率貢內帑號為羡進貞元中歲不過十二萬緡及公歲貢百萬緡凡國有大征伐不慮其費之有無洎丞相晉公專征討之事兵食之給悉出於公從容以贊其成及滄澋平公有叶力之助自御史中丞京兆尹揔賦秉政未嘗書笏為記善於啓奏天子不能自守其喜怒公以專志持務密匡於上行已寡徒不喜伐露由是數帝任遇多𬒳恩澤權利去留如在諸已人多意公能詭合於時及公再持相印與晉國洎一二公同輔於上趨嚮甚直雅符於道茍所舉公是公必扶之即非是公遂默默不和由是上知公重厚而同列亦聳待之乃見公之所為與嚮之不知者期公蓋甚戾也公既屈於名而伸於冨貴豈非盛德君子神明之所祐邪故夫人清河崔氏給事中鋭之女嗣子式祕書丞砥服名教不以丞相子自居其身次曰冰始授京兆府參軍事器度宏逺公之仲弟曰炎季曰起與公三人俱用文學奮於江左西遊長安七中甲乙時議偉之公殁不幾日而起以戶部尚書司國之計門闥之士咸來哭賀羣吏之執籍繁夥一如公之時其亦於世難求也其從事故相國程公異今荆州相國假公文昌其他分居中外羅諸臺閣者不啻三十人銘曰歲在大和惟帝聖神圖任舊臣乃相太原惟是太原福祥其奔再持化權樞揆聮聮兩統劇藩楚淮蜀坤始自元和公秉貨泉憲穆敬文頃兹聖君四帝財征去公孰親惟煮惟鑄惟範惟聚東掃北殄上之所怒帶甲百萬餱食為巨俾公尸之不勞而具變通以時物無滯阻綱條一施莫越其規遇衆以仁中控其機信行恩馳罔有詐欺公之惟揚漕務其將公之留庭職與公并首尾貫聮幾二十年相符使符隨其興徂公之敏智顯爵自至不緣其外姑直其裏始承其風畏公之邃及與之同泳公之易仁人之迹殁而乃熾揭於兹碑不仆不倚唐丞相太子少師贈太尉牛公神道碑銘并序李珏天球河圖有國之大寶麒麟鳳凰王者之嘉瑞方於賢彥即又次焉天祐我唐才傑間出輔時興化代有其人公諱僧孺字思黯隴西狄道人本子姓漢有牛崇為隴西主簿因家焉代為西州豪族八代祖弘仕隋為吏部尚書封竒章公佐佑文帝有重名於時高祖鳯中宗時為春官侍郎掌國史曽祖休克集州刺史贈給事中祖父紹太常博士贈太尉父幼聞華州鄭縣尉贈太保公七歲而孤依倚外族周氏嶽嶽卓卓有老成之風以喪禮自處未嘗戲弄年十五知先竒章公城南有隋室賜田數頃書千卷乃辭親隸習孜孜矻矻不捨蚤夜自四五年業成舉進士軒然有聲時韋崖州作相網羅賢雋知公名願與交公袖文往謁一見如舊由是公卿籍甚名動京師得上第聮以賢良方正舉又冠甲科䇿中盛言時事無有隱避持權者深忌之出為伊闕尉名府賢侯羔鴈繼至封章屢薦每為中執事所沮皆不滿秩從潞帥郗士美簡授管記三奏不得請竟除河南尉會有次對大僚因言事解於上前遷監察御史丁太夫人憂服闋除本官轉殿中公以文高氣直纍歲堙屈問望所屬推美於臺閣間入省拜禮部外郎時孟尚書簡有重望以地官二卿兼領綱憲薦公知雜轉都官貟外兼侍御史免憲職授考功貟外郎集賢學士穆宗即位宰相稱其能遷庫部郎中掌書命召對與語上德之靣賜五品服未幾遷中丞每對延英必移時盡言天下事有武將李直臣為宿州刺史豪奪聚斂以貨數百萬復結權貴公按之為有力者排幾不勝竟以詞堅理直上意回直臣乃得罪由是上以清直知又靣賜金紫拜戶部侍郎時望充塞中書令韓弘以財投分公拒而不受上因他事知之愈賢公遂作相持重顧大體不言細事嘗謂同列諸相曰致理之本流品為先彞倫攸敘蓋謂此也每惜名器力與同列爭方鎮以不廉聞者輒奏貶以賄賂求進者必阻之先是李司徒逢吉與杜循州元穎同作相穆宗寢疾議建儲二與公不協後元穎出鎮井絡逢吉銜之思有釋憾於政事堂謂公曰西川前有廢立謀上熟知之來日延英發其事公不知愼勿沮議公曰王導有言吾雖不殺伯仁伯仁由我而死正近此耳又安得不言哉逢吉喑鳴而止敬宗年少嗣位公雅善敷奏每言一事必本末陳之上甚倚愛同列挾中助力赫赫嫉公之賢公亦思避其鋒三上疏求外任上以武昌善地建節幢兼相印以授之既至問人所病害咸言鄂土踈薄歲一修城役工誅茅人用咨怨公默許心計埏泥範磚未及三年盡換舊制崇墉堅壁人到于今賴之文宗嗣位二年公入覲詔復相位上雅知公名一見恨得之晚會宋相申錫以廉介聞巨姦鄭注挾北軍勢卜射取財貨富侔於國忌宋之直隂畫詭計誣與藩邸通因內臣而上其變造作似是動皆符會上驚聞激怒下法吏議其罪諌官伏閣爭不得公入侍密啓上意乃寬止於郡佐公實有力今李崖州鎮劔南西川上言西蕃别屯以維州降帶甲之士甚鋭其地要害得之足以壯邊部徐圗河湟此其漸也上疑不決下南宫議百執事皆是西川奏公獨曰國家近與昆夷歃血四鎮晏然今若自虧大信犬戎恃衆見詰渝盟彼直我曲未可量也上曰丞相之言是詔還維州𥘉德𥙿承籍地勢自負機術公介特素不與之交及是大不平遂成宿憾公與李尚書宗閔同輔政出入殿省進退有度上偏目公曰卿才類霍光異日可屬大事公懼滿辭位再陳封章寵加端寮出鎮淮海不改相印再登將壇楊州當江淮之衝習偷薄之俗公以清淨簡易化人移風俾及五年臻干至理倉廩實禮義行刑措政成脫屣歸洛優詔屢降雅志不回拜檢校司空東都留守文宗將有大制置大除授必降中使假於他方入皇城宣密旨獻可替否如在君前其信重也如此俄以左僕射徴王人就賜官告特明異禮公感恩雖厚退身愈堅一對而歸不詣相第亦有中阻未諧人情又加相印出為漢南節度使制出上悔之欲追成命公固辭上曰且不與卿周歲别出都門特賜清廟器六事皆範金飾玉如古時製宣曰以卿精忠用以貺别寵待之禮當時無儔公到襄州均井稅薄地征人用胥恱咸歌來暮武宗𥘉纘極聽信未一行險者乘時而起凶德參會倒置天下事清賢名輩多𬒳斥逐惟公位高德重最難搖撼臲卼齟齬幾至二年屬大水壞居人廬舍公以實上聞仇家得以逞志舉兩漢故事坐災異册免降授太子太保俄又改太傅再臨東郊劉從諫死劉稹自擅以昭義軍阻命天兵誅討五年方剋上喜甚素忌公者媒蘖煆錬誣公與從諌交上怒下詔旬日三貶公至循州長史鑿空指鹿四海之士咸冤之公推運逹命恬然如得好官時踰嶺越險二年在海上無所苦今上即位大明善惡三遷至少保轉少師牽復高位分司東洛池臺琴酒逍遙自娛賢士大夫尚其軌躅未半歲遘疾薨於東都城南之别墅自嬰疾至于捐館談笑語言宴居自若口占理命纎悉無遺上聞為之軫悼聮日不視政公卿相弔正人雪涕册贈太尉遣大寮弔祭公端明簡重忠厚誠慤平居私室如對大賔不喜釋老唯宗儒教早與韓吏部皇甫郎中為文章友其名相上下晚與白少傅劉尚書為詩酒侶其韻無高卑前後作鎮皆佩相印辟署多名人難於進而勇於退儉必中禮貴而不奢知命達理保和居易三領大鎮接護軍以禮貌不至交歡再入中書待樞使以公平不容請託有恩必報有讎不校韋崖州於公恩也嫁二女歸名士薦長子登周行李崖州於公讎也恤竄謫之窮途厚供待於逆旅其厚德歟亦難能也夫人同郡辛氏贈僕射祕之女賢明懿淑稱於族姻有子五人曰蔚曰叢能嗣其業皆擢進士弟蔚監察御史叢使府協律曰奉倩洛陽尉二人未知名公以大中戊辰歲十月二十九日薨以大中已巳歲五月十九日葬小子不佞早栖門牆考選第叨殊等之科開賔筵忝入幕之吏國士相遇筆札見知周旋款眷垂三十載刋石表德分也難辭公歷官三十一政作相一十九年逮事六宗光輔四帝承主恩必由直道解相印實無罪名自少及長不失色於人佐時理家無悖入之貨持身不撓履道甚夷嘗病在高位者不知止足終日抗論剋期拜章竟不及年俾孤美志銘曰公之生兮稟星辰公之才兮渾而真公之性兮威且仁公之文兮班馬鄰公之藝兮遊夏均公之儉兮自我身公之簡兮無雜賔公之真兮肅人倫公之愼兮質鬼神公為相兮平如鈞公為邦兮政如春公不幸兮罹數屯公無辜兮介于循天開日明兮堯舜為君舉直措枉兮幽冤必伸牽復高資兮言旋洛濵逍遙琴築兮無異隱淪屈指懸車兮歡然十旬素懷未遂兮美疹來臻悲纒冕旒兮哀動搢紳寵贈加等兮冠于台臣有司職喪兮歸葬咸秦觀者歎息兮國人酸辛袁安慶餘兮令嗣兟兟陳實道廣兮門生振振乃纘徽猷兮刻于貞珉碑生金字兮名德長新齊成公神道碑銘并序權德輿有唐文學政事之君子曰相國齊成公諱抗字遐舉清方粹溫潔矩秉彞明誠盡性切劘化育之道精義入神旁魄天人之際以忠事君以病乞身乃去台宰乃儕商皓然後撤琴瑟啓手足殁齒無違德以從先大夫於九原易名曰成不亦冝乎公某郡人自太公表東海桓公匡天下為國為家或哲或仁烈祖贈太師府君諱浣歷給事中中書舍人吏部侍郎止於平陽太守出入陟降中行山立至今言開元名臣者稱公有遺愛焉實生先公贈國子祭酒府君諱翧履道貞厲仕至左龍武軍倉曹積厚於上流光於下其位不充故大受於成公公既齓而孤哀過成人屬幽陵橫潰中夏如燬奉太夫人安輿違難於越得子州支伯之故地而偕隱焉誅草茅以順居息恱山水以資仁智方茂天爵用觀靈龜嘉招重問奔走以狎至虛巳弘道從容而翔集吳郡張相君鎰方以仁義理濠上得君為榮及進律于洪成師干𡵨纍為命介若驂有勒建中中戎王請大和會以休寧西方右扶風綿亘汧隴地當甌脫且有成命正其經界公實佐權登壇涖盟得其情數與之約結克就衣裳之會用銷邊鄙之警自解巾三遷至殿中侍御史俄屬涇旅竊發羣凶肆毒天子展義於甸內主公死難於理所百舍奔問至于行宫拜侍御史有詔以蕭黃門復布凱澤于東夏命公為工部貟外郎以贊焉復命轉倉部郎中李懷光阻命于蒲連兵未解關中飢旱經費不足轉粟饋軍濟時之囏患求才急病命使以專逹遷兵部郎中兼御史中丞以董其任俄拜諌義大夫當軸者不相容坐婚親細故出為處州刺史先是山越冦攘蕩覆城市公乃卜勢勝之爽塏因習俗之便安三時不害百堵皆作朝典陟明拜蘇州刺史吳實劇部大田多稼浮淫冒沒吏禁或弛占著名數戶版不均公乃閲其生齒書其比要強家大猾不得蓋藏介特單輕與之紓息巳日乃孚厥猷茂焉遷潭州刺史御史中丞湖南觀察使以嚮時二郡之理而弘大之其仁可知也左曹理本徵為給事中周郊寄重擢為河南尹盜有宋瞿曇者白晝椎剽為羣倫囊橐三川病之幾三十年公法令嚴具網羅張設濳捕魁宿使無遺類指顧之間擒擲如神乃作祕書章明文雅修舊以起廢乃作太常統和神人節事以辨志便蕃大僚其道乃光德宗皇帝方以堯舜氏聰明之道馭天下用賢人充相位拜中書侍郎同中書門下平章事熙九功之歌質百官之成損益文憲化裁形器精微以折中密靜而不伐或事隱於造膝或言行於沃心𥘉天官氏每歲表他曹郎二人閲多士試言第其甲乙春官氏俾考功郎中選考秀之親故者而進退之公以冡宰小宗伯為官人取士之本蓋天子有司之重至於避小嫌亂舊章適滋旁歧孰謂扄鐍蹇蹇坦坦之道豈如是邪然後闢康莊作衡尺遵公是之路去自便之私天下之人謂之理道尋有詔修國史昔孔父無位以空文為一王法公當盛明之代用宰司揔直筆其於褒貶勸懼明焉勤慮盡瘁積成寢恙纍章乞告改太子賔客遭罹不淑贈戶部尚書時貞元甲申歲夏四月春秋六十有五夫人河南獨孤氏某官某之女賢明蚤天繼夫人蘭陵蕭氏某官某之女仁順有禮法嗣子餗銜恤毀瘠侍公裳帷以某月日祔于東都某原喪祭哀敬君子以為有後惟公深而通肅而寬出處動靜必以中正敬用五事暢於四支資性儼恪尤長鑒裁在歧也薦齊忠公映佐蕭也薦盧恭公邁皆至宰相其他推轂薦士為漢廷臣成天下重名碩望者不可勝書凡所論著皆研幾析理弘雅夷逺洪州文宣王廟碑張蕭盧三相國碑志本聖人教化之賾推大政謨明之道固其性術講貫而發舒乎斯文文集二十卷中倫體要盡在是矣公薨五年餗調為洛陽尉永惟先烈未刻豐碑以德輿夙承湖海之舊中忝掖垣之屬他日舉代靡形話言獲於遺編實見隂德顧兹無似有玷知人濡涕含毫以表幽宅銘曰昔在營丘大風泱泱有倬平陽令聲章章不踐宰政慶貽子姓倉曹含光大學追命厥生中書秉哲居正鵬起扶搖鸞翔慶霄乃登紫微以瑞淸朝吉凶糾纆寒暑結轖其生有涯其用未極夀堂冥寞宰樹森植揭兹馨香終古是式重校正唐文粹卷第五十六
