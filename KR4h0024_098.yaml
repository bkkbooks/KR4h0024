body:
  text: 吳興姚鉉纂序辛揔二十五首餞別餞張尚書赴朔方序賈曽送桂州邢中丞序蕭昕送裴中丞赴黔中序權德輿餞副大使移軍廣陵序李白送建安郡守之任序盛均送陳郎將歸衡嶽序李白送幽州李端公序韓愈送崔羣序柳宗元送權十一序李白送區册序韓愈送張承祖之東都序李白送王塤秀才序韓愈送王棨序陳黯送符載歸蜀省覲序崔群送族叔楊行元下第歸廣陵序歐陽詹送族弟旭下第東歸序蕭頴士送從姪專遊廬山序李白送薛處士序杜牧別中嶽二三真人序陳子昻餞十七翁二十四翁尋桃源序李白送靈徹上人歸沃州序權德輿送林公歸衡嶽序李白送浮屠文暢師序韓愈送簡師序皇甫湜送玄上人歸天竺寺序權德輿餞張尚書赴朔方序賈曾王者大司馬制軍詰禁封國正朔惠綏蠻貊刑齊猾夏其儀尚矣天子道穆三象功清六合截海來威窮荒揆教將以靜流服度藩畿削惲凌暴昭蘇寡弱乃命元宰兵部尚書燕公專節朔方授律羣帥涉河之外距關之西公皆統之重分閫也公智以開物精以造微文為一變之英武有萬人之敵歷登庶尹王猷載寧三宅台衡帝采惟亮雖坐堂足以制勝而勤國忘其定居閹茂次年仲臯貞閠拜手東洛馳軺北闕備官而行成旅以從是日也景風司至星火殷宵伯趙鳴而戒隂爽鳩習而揚武賦可以升髙逺望詩可以出宿餞行有詔具寮爰開祖宴且申後命寵以蕃錫天章賦別御札題箋副衣勉挾纊之誠兼壷喻投醪之旨筐篚以將其貺筆硯以表其文前載未書今册斯覩侍中安陽公以仁體國中書令河東公以德熙朝燮贊功成訏謀景睱慕采薇之興悵伐木之朋詢彼之師卜兹郊候鼎門右轉岐路旁分當闕塞之斷山接華林之髙樹幕人宿設重帟雲平太官饔舉百羞霞錯四夏六胤之變朱于皇羽之容雷殷川原電烻林薄朝傾多士巷無居人接蓋隂衢揚袂風野羽觴遞進列座酣而不譁清鐃間發將士激而逾厲視日知其吉氣吹律驗其商聲則巳景列穹都風騰沙漠西域輕郅支之使東胡息冒頓之虞顧夫南仲于征吉甫薄伐不其逺也若木還照前茅啓行聽闐闐之去鼓目悠悠之轉斾歌事者每懷靡及念離者跋豫望之成志在心發言同唱自天子有式敘清風請編出車之什以繼蒸人之雅夏日送桂州刺史邢中丞赴任序蕭昕桂林巨鎮臨川荒服居五嶺之表控兩越之郊俗比華風化同內地然而洞居寨止人好阻兵有殊貨重裝吏無廉政選其任者實難其才故郡久曠官朝思稱職以腹心之寄輟爪牙之雄俾其澄清行獨坐之事俾其式遏揔防禦之權惟帝知人佇報尤政五月維夏畏途萬里溽暑方起火雲始生履蒼梧瘴癘之郊涉沅湘風濤之壯衆恱是舉而傷此行公陳力滅私飲氷徇節以忠則九折之塗可叱以信則三江之水可航聚糧戒徒肅裝候傳無酒酤我緩仳離之憂徵文寵別慰行邁之思僕以渭陽之故而首序云奉送裴二十一兄閣老中丞赴黔中序權德輿裴兄居諌大夫五年休聞籍甚其於匪躬據古切劘獻替掖垣衆君子徒見其拜章伏閣而莫知其所言者然則發舒純誠弘大聰明以貢於穆清者可勝道哉每漢庭大僚與六官二職之缺羣情屬目俟其授受久矣壬子詔書有黔巫長帥之拜秩於清憲褒以命服周行諸公以為一方之幸且惜其去而未喻也及夫別殿前席沃心交感重藩符之所付慮安集之不稱凡所以輟近臣惠逺人之旨纎悉備厚上許周月之代兄求三歲之理又以見首公急病而忘其僻逺淹恤然後諸公知惜別為細而感恩為大在此行矣自牂牁通夜郎置吏以示綏懷以安剽輕失其理則蕭然愁擾得其和則歡然感恱方略招徠繫於官師以兄之慈惠直信粹清廉白為仁由己不改其度使大化淳流在明誠洞開推人情以賦政便習俗而不擾彼四封之內如熱待濯如水走下史臣操簡以傳循吏使者急宣以將徵命雖欲復三歲之言其可得乎未間則褰赤帷飲醇酒晏晏言笑中無町畦雖鬱蒸霧雨之候無自而入矣大丈夫被薦紳彯華纓弘宣職業無有逺邇則嚮之玉堂清禁論思侍從與今之龍節前導金龜映組皆所以事君也豈有中外之異耶祖軷霑醉宣言相勉在加餐寓書而巳至若山川風物與離騷瞻望之嘆皆備於詩人所賦故兹不書餞副大使李藏用移軍廣陵序李白夫功未足以蓋世威不可以震主必挾此者持之安歸所以彭越醢於前韓信誅於後况權位不及於此者虛生危疑而潛包禍心小拒王命是以謀臣將啖以節鉞誘而烹之亦由借鴻濤於奔鯨鱠生人於哮虎呼吸江海橫流百川左縈右拂卜有餘郡國計未及誰當其鋒我副使李公勇冠三軍衆無一旅橫倚天之劒揮駐日之戈吟嘯四顧熊羆兩集蒙輪扛鼎之士杖干將而星羅上可以決天雲下可以絶地維翕振虎旅赫張王師退如山立進若電逝轉戰百勝僵尸盈川水膏於蒼溟陸血於原野一掃瓦解洗清全吳可謂萬里長城橫斷楚塞不絶五嶺之北盡餌於修蛇勢盤地蹙不可圖也而功大用小天髙路逺社稷雖定於劉章封侯未施於李廣使慷慨之士長吁青雲且移軍廣陵恭揖後命組練照雪樓船乘風簫鼓沸而三山動旌旗揚而九天轉良牧出祖列將登筵歌酣易水之風氣振武安之瓦海日夜色雲帆中流席闌賦詩以壯三軍之事白也筆巳老矣序何能為送建安郡守之任序盛均大禹分九州之産生物各有其處獨人之善惡無區別之地是聖人知民心牽於所化也夫理有風而化有本國者風帝王之理邦者本牧守之化二漢以還風化相蕩貪波勃漲人不棲身故有得一郡若豪虎之暴豚羊焉猛既有餘化冝不善也有唐洗叔世之弊惟牧守不新其規實乃知風化之本未可移去然則祿食者佐國不務其理為邦不敞其化愚不知夫祿食之道也惟閩嶠拔一臂西指則建安在焉其郡襟山而束水其人猱黠而易隨等閩之支屬特稀聞善化者得非地深法蠧會斂無時猾吏坐姿姦欺黎庶日為葷蠆哉皇帝逺懷疲俗樂有嘉政使君前刺三郡雅稱善化今兹東授必能伸病俗以抒重寄矣將期後賀得以序行春於南浦與諸公送陳郎將歸衡嶽序李白仲尼旅人文王明夷苟非其時賢聖低眉況僕之不肖者而遷逐枯稿固其宜耶朝心不開暮髮盡白登髙送逺使人增愁陳郎將義風凛然英思逸發來下專城之榻去邀才子之詩動清興於中流泛素波而徑去諸公仰望不及連章祖之序慙起豫輒冠名賢之首作者嗤我乃為撫掌之資乎送幽州李端公序韓愈元年今相國李公為吏部員外郎愈嘗與借朝道語幽州司徒公之賢曰某前年𬒳詔告禮幽州入其地迓勞之使里至每進益恭及郊司徒公紅襪首鞾袴握刀左右雜佩弓韔服矢插房俯立迎道左某禮辭曰公天子之宰禮不可如是及府又以其服即事某又曰公三公不可以將服承命卒不得辭上堂即客階即坐必東嚮愈曰國家失太平於今六十年夫十日十二子相配數窮六十其將復平平必自幽州始亂之所出也今天子之大聖司徒公勤於禮庶幾帥先河南北之將來覲奉職如開元時乎李公曰然今李公既朝夕左右必數數為上言元年之言殆合矣端公歲時來壽其親東都東都之士大夫莫不拜千門其為人佐甚忠意欲司徒公功名流千萬歲請以愈言為使歸之獻送崔羣序柳宗元貞松産於巖嶺髙直聳秀條暢碩茂粹然立於千仞之表和氣之發也稟和氣之至者必合以正性於是有貞心徑質用固其本禦攘氷霜以貫歲寒故君子儀之清河崔敦詩有柔儒溫文之道以和其氣近仁復禮物義歸厚其有稟者歟有雅厚質方之誠以正其性慤論忠告交道甚直其有合者歟是故日章之聲振於京師常與隴西李杓直南陽韓安平洎余為交杓直敦柔深明沖曠坦夷慕崔君之和安平厲莊端毅髙朗振邁恱崔君之正余以剛柔不常造次爽冝求正於韓襲和於李就崔君而考其中焉忘言相親默與道合今將寧覲東周振䇿于邁且餞於野或命為之序余於崔君有通家之舊外黨之親然吾不以是合之崔君以文學登於儀曹揚于王庭甲俊造之選首讎校之任然吾不以是視之於其序也故載之其末云金陵與諸賢送權十一序李白斯髙柄秦嬴世不二三傑伏草與漢並出莽夷未暉耿鄧乃起自古英逹未必盡用於當年去就之理在大運爾我君六葉繼聖熙于玄風垂拱穆然紫極天人其一哉所以青雲豪士散在商釣四座明哲皆清朝旅人吾希風廣成蕩漾浮世素受寶訣為三十六帝之外臣即四明逸老賀知章呼余為謫仙人蓋實録耳而嘗採姹女於江華收河車於清溪與天水權昭夷服勤爐火之業久矣之子也沖恬淵靜才翰駿發白每一篇一札皆昭夷之所操吁捨我而南若折羽翼時歲律寒色天風枯聲雲帆涉漢冏若絶雷舉目四顧霜天崢嶸銜杯敘離而羣子賦詩以出餞酒仙翁李白辭送區册序韓愈陽山天下之窮處也陸有丘陵之險虎豹之虞江流悍急橫波之石廉利侔劒戟舟船上下失勢破碎淪溺者往往有之縣郭無居民官無丞尉夾江荒茅篁竹之間小吏十餘家皆鳥言夷面始至言説不相通畫地為字然後可以告以出租賦奉期約是以賔客遊從之士無所為而至愈待罪於斯且半歲有區生者誓言相好自南海拏舟而來升自賔階儀觀甚偉坐與之語文義卓然莊周云逃空虛者聞人足音跫然而喜矣况如斯人者豈易得哉入吾室聞詩書仁義之説欣然喜若有志於其間也與之翳嘉林坐石磯投竿而漁陶然以樂若能遺外聲利而不厭貧賤也歲之𥘉告歸拜其親酒壷既傾序以識別暮春於江夏送張承祖之東都序李白吁咄哉僕書室坐愁亦巳久矣每思欲遐登蓬萊極目四海手弄白日頂摩青穹揮斥幽憤不可得也而金骨未變王顔以緇何嘗不捫松傷心撫鶴歎息誤學書劒薄遊人間紫禁九重碧山萬里有才無命甘於後時劉表不用於禰衡暫來江夏賀循喜逢於張翰且樂船中遇達人張侯大雅君子統泛舟之役在清川之湄談玄賦詩連興數月醉盡花柳賞窮江山王命有程告以于邁煙景之色慘為愁容繫飛帆於半天泛渌水於遙海欲去不去更開芳樽樂雖寰中趣逸天外平生酣暢未若此時至於清談浩歌雄筆麗藻笑飲醁酒醉揮素琴余實不愧於古人也揚袂逺別何時歸來想洛陽之秋風鱠伊魚以相待詩可贈逺無乃闕乎送王塤秀才序韓愈吾嘗以為孔子之道大而能博門弟子不能遍觀而盡識也故學焉而皆得其性之所近其後離散分處諸侯之國又各以其所能授弟子源逺而末益分蓋子夏之學其後有田子方子方之後流而為莊周故周之書喜稱子方之為人荀卿之書語聖人必曰孔子子弓子弓之事業不傳惟太史公書弟子傳有姓名字曰馯臂子弓子弓受易於商瞿孟軻師子思子思之學蓋出曽子自孔子殁羣弟子莫不有書獨孟軻氏之傳得其宗故吾少而樂觀焉太原王塤示豫所為文好舉孟子之所道者與之言信説孟子而屢贊其文辭夫沿河而下苟不止雖有疾遲必至於海如不得其道也雖疾不止終莫幸而至焉故學者必慎其所道道於楊墨老莊佛之學而欲之聖人之道者猶航斷港絶潢以望至於海也故求觀聖人之道者必自孟子始今塤之所由既幾於知道如又得其船與楫知沿而不止嗚呼其可量也哉送王棨序陳黯黯去歲自褒中還輦下輔文出新試相示其間有江南春賦篇末云今日併為天下春無江南兮江北某即賀其登選於時矣何者以輔文家於江南其詞意有是句非前眹耶今春果擢上第夏六月告歸省于閩命序送行某辭以未第言不為時重輔文曰吾所知者惟道與義豈以巳第未第為重輕哉愚繇是不得讓鱗羣之衆也必聖其龍羽族之多也必瑞其鳯鳯非四翼龍非二首所以異於鱗羽者惟其稀出耳嚮使日百時千盈川溢陸則蛇虺鳩雀無非龍鳯矣其誰曰聖且瑞哉進士科由漢迄唐為擢賢之首也寰瀛之大億兆之衆歲貢其籍者數才于千有司升其名者復止于三十其不為貴而且稀乎輔文早歲業儒而深於詞賦其體物諷調與相如楊雄之流異代而同工也故角於文陳而聲光振起今之中選是榮其歸想寧慶之晨為鄉里改觀孰不謂人之龍鳯乎懿哉輔文是行也足以自重送廬嶽處士符載歸蜀覲省序崔羣旄頭光明垂三十載不習爼豆化為侯王者十有八九焉由是隱逸憔悴羔鴈不行蒼山沈沈側陋不顯建中初有峨嵋客符君發六籍棹三湘深入匡廬絶迹半紀學窺顔子之門閾文紹陳君之骨鯁逸慕嚴光之垂釣志效管寧之不欺結廬熙熙人不知其然也頃豫奉命江西三年往復彭蠡未嘗不詠湖月潄天倪造符君雲扃宿五老峯下動更晦朔不理還棹偶丹霄至人白鶴羽客搴靈芝跪天壇相顧永息乎蓬瀛豈復又縈於塵網覩君超淡愴興舊遊雖笑語飲食如常終忽忽若居大夢君家在岷蜀展愛髙堂將聖賢典籍充人子幣帛斯所以激衰俗扇清風方伯地君不以厚禮遲吾子豫未之信秋九月楚人歌採蘭以送之送族叔楊行元下第歸廣陵序歐陽詹族叔行元既射䇿與主司不合春二月將歸淮南所寓羣公設祖方獻未酬族叔悄然有不暢之色羣公亦愕爾而阻歡小子侍觴奉而前曰歸好事春美時酒樂物叔於三者加同人將之而有未恱豈禮闈失意之為乎昆吾産金荆山産玉自民役巧鎔琢蓋多惟干將和璞有大聞非百錬則其良可用歟非三獻而其寶可真歟苟良苟真不即成不即售適以精其研稔其實如叔也亦何稽於一邂逅哉若昔之人作必行動必中則是蘇秦無履穿之嘆寧戚無石爛之歌孫弘無十上之勤商鞅無再干之勞也知泰而不知否知易而不知難是夫人也非所以待乎叔也叔如之何叔欣然見卞氏又來之路平歸心納春景安酒意四座以協千鍾以娛既醉升車秋為到期送族弟旭帖經下第東歸序蕭頴士吾族旭也洵美有聲夫蒸蒸者行之能翼翼者體之敬工文足以摽絶唱深識足以剖羣疑兼而備焉實為難者意其倍積風之力駭絶電之姿從東道以載馳去南溟而一息此其分也翳明代擇人冝乎盡能使輪轅當曲直之適鑿枘靡圎方之嘆則宏綱舉而浮議息矣以吾弟不羇之才逢聖君如渴之日而徴求章句見遺甲乙是猶籠鸑鷟絆騰黃望遼廓權竒其可得也吾聞諸君子非無位之患惟立身實難今爾有是才居是屈能卷舒其道喜愠不形又其沖融坦蕩莫可得而窺也不然書未十獻歲未二毛道非擺闔交無薦寵而雄雖先進歎甚後時何哉論者以為人之望也仲春二月東京千里之子往矣薄言旋歸賦詩而寵別者皆上國之選莫不銜憤屑涕抗詞悲歌吾乃知道術親而然諾重也况乎西遷而五陵是宅南渡而二曹其昌居宋有摯疇之姻在周為魯衛之國曽是共祖不待馮商之言已為路人未處陶生之嘆今也于邁如何勿思詩不云乎凡今之人莫如兄弟不廢急難之謂也秋於敬亭送從姪專遊廬山序李白余小時大人令誦子虛賦私心慕之及長南遊雲夢覽七澤之壯觀酒隱安陸蹉跎十年初嘉興季父謫長沙西還時余拜見預飲林下專乃稚子嬉遊在傍今來有成鬱負秀氣吾衰久矣見爾慰心申悲道舊破啼為笑方告我逺涉西登香爐長山橫蹙九江却轉瀑布天落半與銀河爭流騰虹奔電潨射萬壑此宇宙之竒詭也其上有方湖石井不可得而窺焉羡君此行撫鶴長嘯恨丹液未就白龍來遲使秦人著鞭先往桃花之水孤負夙願慙未歸於名山終期後來携手五嶽情以送逺詩寧闕乎送薛處士序杜牧處士之名何哉濳山隱市皆處士也在山也且非頑如木石也在市也亦非愚如市人也蓋有大智不得大用故羞恥不出寧肯與市人木石為伍也國有大智之人不能大用是國病也故處士之名自負也謗國也非大君子其孰能當之薛君之處士蓋自負也果能窺測堯舜孔子之道使指制有方弛張不窮則上之命一日來子之廬子之身一日立上之朝使我輩居則來問學仕則來問政千辨萬索滔滔而得若如此則善苟未至是而遽名曰處士雖吾子自負其不為矯歟某敢用此贈行別中嶽二三真人序陳子昻夫愛名山歌長往世有之矣若夫放身霄嶺宴景雲林卑俗不可得而聞時士不可得而見則吾欲髙視終古一笑昔人嵩山有二仙自浮丘公王子晉上朝玉帝遺迹金壇鳯笙悠悠千載無響吾每以是臨霞永慨撫膺增歎常謂煙駕不逢羽人長往去囂世走青雲登玉女之峯窺石人之廟見司馬子微馮太和霓裳眇然冥壑獨立真朋羽會金漿玉液則有楊仙公玄默洞天賈上士幽棲牝谷玉笙吹鳯瑶裝駐鶴方且迷軒轅之駕期漫汙之遊吾亦何人躬接兹賞實欲執青節從白霓陪飲崑崙之庭觀化玄元之府宿心遂矣冥骨甘矣豈知瓊都命淺金籙道微攀倒景而迷途顧中峯而失路塵縈俗纍復汨吾和仙人真侶永幽靈契翳青芝而延佇遙會何期折丹桂而徘徊逺心空絶紫煙去黃庭極仰寥廓而無光視寰區而寡色悠悠何往白頭名利之交咄咄誰嗟玄運盛衰之感則如楊朱歧路墨子素絲尚平辭家而不歸鮑焦抱木而枯死可以慟可以悲古人之心吾今得之矣奉餞十七翁二十四翁尋桃源序李白昔祖龍滅古道嚴威刑煎熬生人若墜大火三墳五典散為寒灰築長城起阿房并諸侯殺豪俊自謂功髙羲皇國可萬世思欲凌雲氣求仙人登封泰山風雨暴作雖五松受職草木有知而萬象乖度禮刑將弛則綺皓不得不遁於南山魯連不得不蹈於東海桃源之避丗者可謂超升先覺夫指鹿之儔連頸而同死非吾黨之謂乎二翁耽老氏之言繼少卿之作文以述大雅道以通至精卷舒天地之心脫落神仙之境武陵遺迹可得而窺焉問津利往水引漁者花藏仙溪春風不知從來落英何許流出石洞來入晨光盡開有良田名池竹果森列三十六洞別為一天邪今扁舟而行笑謝人丗阡陌未改古人依然白雲何時而來歸靑山一去而誰往諸公賦桃源以美之送靈徹上人廬山回歸沃洲序歡德輿昔廬山逺公鍾山約公皆以文章廣心地用贊後學俾學者乘理以詣因言而悟得非玄津之一派乎吳興長老晝公掇六義之清英首冠方外入其空者有沃洲徹上人上人心冥空無而迹寄文字故語甚夷易如不出常境而諸生思慮終不可至其變也如風松迭韻氷玉相扣層峯千仞下有金碧􅋏鄙夫之目𥘉不敢視三復則淡然天和晦於其中故覩其容覽其詞知其心不待境靜而靜況會稽山水自古勝絶東晉逸民多遁丗於此夏五月上人自爐峯言旋復于是邦豫知夫拂方𫀆坐輕舟泝沿鏡中靜得佳句然後罙入空寂萬慮洗然則嚮之境物又其稊稗也鄙人方景行企尚之不暇惡敢以離羣為歎哉江夏送林公遊衡嶽序李白江南之仙山黃鶴之爽氣偶得英粹後生俊人林公世為豪家此土之秀落髮歸道專精律儀白月在天朗然獨出既灑落於彩翰亦諷誦於金口間雲無心與化偕往欲將振五樓之金䇿浮三湘之碧波乘杯泝流考室名嶽瞰憩冥壑凌臨諸天登祝融之峯巒望長沙之煙火遙謝舊國誓遺歸蹤百千開士稀有此者余所以嘆其峻節揚其清波龍象先輦回眸拭視比夫汨泥沙者相去九牛之一毛昔智者安禪於台山逺公託志於廬嶽髙標勝槩斯亦嚮慕哉紫霞搖心青楓夾岸目斷川上送君此行羣公臨流賦詩以贈送浮屠文暢師序韓愈人固有儒名而墨行者問其名則是校其行則非可以與之遊乎如有墨名而儒行者問其名則非校其行則是可以與之遊乎楊子雲稱在門墻則揮之在夷狄則進之吾取以為法焉浮屠師文暢喜文章其周遊天下凡有行必請於搢紳先生以求詠歌其所志貞元十九年春將行東南柳君宗元為之請解其裝得所送敘詩纍百餘篇非至篤好其何能致多如是耶惜其無以聖人之道告者而徒舉浮屠之説贈焉夫文暢浮屠也如欲聞浮屠之説當自就其師而問之何故謁吾從而來請也彼見吾君臣父子之懿文物事為之盛其心有慕焉拘其法而未能入故樂聞其説而請之如吾徒者冝當告之以二帝三王之道日月星辰之行天地之所以著鬼神之所以幽人物之所以蕃江河之所以流而語之不當又為浮屠之説而瀆告之也民之初生固若禽獸夷狄然聖人者立然後知宫居而粒食親親而尊尊生者養而死者藏是故道莫大乎仁義教莫大乎禮樂刑政施之於天下萬物得其冝措之於其躬體安而氣平堯以是傳之舜舜以是傳之禹禹以是傳之湯湯以是傳之文武文武以是傳之周公孔子書之於册中國之人世守之今浮屠者孰為而孰傳之耶夫鳥俯而啄仰而四顧夫獸深居而簡出懼物之為巳害也猶且不脫焉弱之肉強之食今吾與文暢安居而暇食優遊以生死與禽獸異者寧可不知其所自耶夫不知者非其人之罪也知而不為者惑也恱乎故不能即乎新者弱也知而不以告者不仁也告而不以實者不信也余既重柳請又嘉浮屠能喜文詞於是乎言送簡師序皇甫湜鳯羽而麟毛鳥與獸也經傳以比聖人豈非以其心不以其形者耶師雖佛名而儒其行雖夷狄其衣服而仁義其心雖未齒於士與麟鳯類矣不猶愈於冠朝冠服朝服或溺於淫怪之説以斁彞倫者耶嗚呼師吾獨賢也刑部侍郎昌黎韓愈既貶于潮浮屠之徒歡快以抃師獨憤起訪豫求敘行以資適潮不顧蛇山鰐水萬里之險毒若將朝得進拜而夕死可者嗚呼悲吾絆不得侣師以馳送玄上人歸天竺寺序權德輿度門之教根於空寂因修以取證階有以及無不踐精深之習而悟虛無之理者未之有也未得為得則其病歟僕久味斯法思與言者既而得玄禪師師早誦大乘經各數萬言晚得觀門之學今則色空如一哀樂不入矣桑門之患為外見所雜既得之患為內見所縛今玄公翛然於二見之間不內不外冥夫至妙身戒心惠合於無倪且以勾吳有山水之絶境天竺又經行之淨界振錫而往其心浩然蓋隨緣生興觸物成化而不為外塵所引也幅巾男子權德輿稽首重校正唐文粹卷第九十八
