  text: 四十六
  hash: sha256:e859af5bee7363df391385c7c30b3790dc3197466287aecc32099df200ea1f5a
body:
  text: 宋姚鉉編古文戊揔二十四首讀四讀荀韓愈讀墨子讀鬼谷子來鵠讀司馬法皮日休辯九諱辯韓愈辯文獨孤郁辯謀陳黯辯害羅隱時辯沈顔三子言性辯杜牧象耕鳥耘辯陸龜䝉太畢仙掌辯王涯廬江四辯盧潘解十一進學解韓愈仲尼不厯聘解盛均文之章解韋籌獲麟解韓愈國之興亡解李華象刑解沈顔工器解程晏人旱解盛均歸解書彭陽公碑隂朱閲命解李翺叛解李甘讀荀韓愈始吾讀孟軻書然後知孔子之道尊聖人之道易行王易王霸易霸也以為孔子之徒沒尊聖人者孟氏而已晚得揚雄書益尊信孟氏因雄書而孟氏益尊則雄者亦聖人之徒歟聖人之道不傳於世周之衰好事者各以其説干時君紛紛籍籍相亂六經與百家之説錯雜然老師大儒猶在火於秦黄老於漢其存而醇者孟軻氏而己耳揚雄氏而已耳及得荀氏書於是又知有荀氏者也考其辭時若不醇粹要其歸與孔子異者鮮矣抑猶在軻雄之間乎孔子刪詩書筆削春秋合於道者著之離於道者去之故詩書春秋無疵予欲削荀氏之不合者附於聖人之籍亦孔子之志歟孟氏醇乎醇者也荀與揚大醇而小疵讀墨子儒譏墨以尚同兼愛上賢明鬼而孔子畏大人居是邦不非其大夫之賢者春秋譏專臣不尚同哉孔子泛愛親仁以博施濟衆為聖不兼愛哉孔子賢賢以四科進襃弟子疾沒世而名不稱不上賢哉孔子祭如在譏祭如不祭者曰我祭則受福不明鬼哉儒墨同是堯舜同非桀紂同修身正心以治天下國家奚不相恱如是哉予以謂辯生於末學各務售其師之説非二師之道本然也孔子必用墨子墨子必用孔子不相用不足為孔墨讀鬼谷子來鵠聖人神疲力盡以行道開禮展樂以告人欲天下不忘乎温良忠慤敬讓之心也後之明王又增以設學校立廟祀籩豆時修衣冕屢製其天下之書則牆袠整整林軸麗麗斯可謂教道之備者也如是猶有不率其勸不由乎道者所以聖人憂其窳墮乃曰三年不為禮禮必壞三年不為樂樂必崩何訓之示之之至而訓之示之之難也鬼谷子者鬼谷先生之書也六國時所作其教人容動色理氣意之間以詭紿激訐恌固呼哩離合揣測反覆憸滑之術悉備於章㫖余讀之知六國之時得術是書者惟秦儀而巳亦盗禄入國之秘經然自六經已降至於漸醨之後其中有數篇者乃今之粉兒乳子亦可與秦儀齒也至於捭合飛箝捭合飛箝皆篇名實時之常態是知漸醨之後不讀鬼谷之書者其行事皆得自然符契也嗚呼聖人之道設禮樂詩書之多學校廟祀之盛孜孜矻矻則何易壞易崩入人之心難邪鬼谷之書三巻而已代不家有則何自然符合奥妙契人心之易邪使天下用聖人之道學温良恭慤敬讓之心得如自然符契鬼谷之書者則吾見聖人無恨矣抑余瞑目放已陶陶入太古風是不可得也昔蒼頡文字鬼為之哭不知鬼谷作是書鬼何為邪吾今不覺毛磔膽寒者是疑今之復有鬼谷新書而懷之者則吾不知其備讀司馬法皮日休古之取天下也以民心今之取天下也以民命唐虞尚仁天下之民從而帝之不曰取天下以民心者乎漢魏尚權驅赤子於利刃之下争寸土於百戰之内由士為諸侯由諸侯為天子非兵不能威非戰不能服不曰取天下以命者乎乎由是編之謂術謂太公六韜也術愈精而殺人愈多法益工而害物益甚嗚呼其亦不仁矣蚩蚩之類不敢惜死者上懼乎刑次貪乎賞民之於君猶子也何異乎父欲殺其子先紿以威後㗖以利哉孟子曰我善為陳我善為戰大罪也使後之士有是者雖不得土吾以為猶土焉諱辯韓愈愈與進士李賀書勸賀舉進士賀舉進士有與賀争名者毁之曰賀父名晉肅賀不舉進士為是勸之舉者為非聴者不察也和而倡之同然一辭皇甫湜曰若不明白子與賀且得罪愈曰然律曰二名不偏諱釋之者曰謂若言徴不言在言在不言徴是也律曰不諱嫌名釋之者曰謂若禹與雨丘與蓲與丘同音烏蓲草名之類是也今賀父名晉肅賀舉進士為犯二名律乎為犯嫌名律乎父名晉而子不得舉進士若父名仁則子不得為人乎夫諱始於何時作法制以教天下者非周公孔子歟周公作詩不諱周公日克昌厥後又日駿發爾斯孔子不偏諱二名孔子曰宋不足徴也又曰某在斯春秋不譏不諱嫌名衞桓公名㓂康王釗之孫實為昭王曾參之父名晳曾子不諱昔曾子曰昔者吾友又日裼裘而弔周之時有騏期漢之時有杜度此其子冝如何諱將諱其嫌遂諱其姓乎將不諱其嫌者乎漢諱武帝名徹為通不聞又諱車轍之轍為某字也諱吕后名雉為野雞不聞又諱治天下之治為某字也今上章及詔不聞諱滸勢秉饑也惟宦官宫妾乃不敢言諭及機以為觸犯以諭為近代宗廟諱以機為近𤣥宗廟諱士君子立言行事冝何所法守也今考之於經質之於律稽之以國家之典賀舉進士為可為不可邪凡事父母得如曾參可以無譏矣作人得如周公孔子亦可以止矣今世之士不務行曾參周公孔子之行而諱親之名則務勝於曾參周公孔子亦見其惑也夫周公孔子曾參卒不可勝勝周公孔子曾參乃比於宦官宫妾則是宦官宫妾之孝於其親賢於周公孔子曾參者邪辯文獨孤郁或曰文所以指陳是非有以多為貴也其要在乎彩飾其字而慎其所為體也又曰文章乃一藝耳是皆不知上流之文而文之所由作也夫天之文位乎上地之文位乎下人之文位乎中不可得而增損者自然之文也故伏犧作八卦以象天地窮極終始萬化無有差忒故易與天地準此聖人之文至也但合其德而三才之道盡後聖有作不能使之為五或七而九洎曲折者是其文之至也文字既生治亂既形仲尼作春秋以繩萬世而襃貶在一字是亦文之至者乎然則易卦之一畫春秋之一字豈所謂崇飾之道而尚多之意邪夫文者考言之具也可以革則不足以畢天地矣故聖人當使將來無得以筆削果可以包舉其義雖一畫一字其可已矣病不能然而曰必以彩飾之能援引之冨為作文之秘急是何言之末歟夫天豈有意於文彩邪而日月星辰不可踰地豈有意於文彩邪而山川丘陵不可如八卦春秋豈有意於文彩邪而極與天地侔其何故得以不可越自然也夫自然者不得不然之謂也不得不然又何體之慎邪夫天地八卦春秋惟止於此者也吾得定其所云其不至於此者惟吾何學焉吾安能以天下之心也是則其心卓然絶於俗者其文不求而至也無得子為教茍於聖達之門無所入則雖劬勞憔悴於黼黻其何數哉是故在心曰志宣於口曰言垂於書曰文其實一也若聖與賢則其書文皆教化之至言也徒見其纎靡而無根者多紿曰文與藝嗚呼辯謀陳黯覆載之中胸有心者有其謀然其謀則必為已而鮮為人也故有孜孜汲汲力於謀者得之則逸身豐家不得則嫉時怨命噫此真澆風薄俗者之心也豈古聖賢之心乎大古聖賢未始無謀而不求利於身也不求利於身而利自及也何以明之堯舜有大寳之位不傳於子而傳於他人是為天下之謀得其君也大禹疏鑿横流過其門而不顧啼嬰是為天下之人謀出其溺也后稷勤耕播殖百穀是為天下之人謀粒其食也其謀信何如哉古今語帝王者必首於堯舜論功德者無出於禹稷風馨億齡不復磨滅其利身又如何哉近世之謀則不然小者不過於謀衣食大者不過於謀禄位督之利天下者或未見謀嗚呼持是心而希其道侔於古人是猶欲越山海而捨梯航其進也無由矣雖今聖人在上賢人在位其謀靡為不然恐蚩蚩者日用而不知也故因文以辯之且欲賢不肖皆公其心茍賢不肖皆公其心則三古之風日可復矣辯害羅隱虎豹之為害也則焚山不顧野人之菽粟蛟蜃之為害也則絶流不顧漁人之鈎網其所全者大所去者小也順大道而行者救天下者也盡規矩而進者全禮義也也權濟天下而君臣立上下正然後禮義在焉力不能濟於用而君臣上下之不正雖抱空器奚所施設是以佐盟津之師焚山絶流者也扣馬而諫計菽粟而顧鈎網者也於戲時辯沈顔論者以五帝不迨於三皇時變也三代不迨於五帝時變也五伯不迨於三代時變也孰曰時其在君乎在臣乎在民乎沈子曰在君不在臣在臣不在民在民不在君臣古若羲若軒若陶若虞時在君也若殷武丁若周武王若齊桓公若晉文公時在臣也若夏之桀殷之辛周之赧秦之二世時在民也故時在君則為皇為帝時在臣則為王為霸時在民則為禽為虜為禍矣夫君德日勤時在於君君德不申時在於民愚故曰在君不在臣在臣不在民在民不在君臣吁唯明君而能知時之所在乎三子言性辯杜牧孟子言人性善荀子言人性惡揚子言人性善惡混曰喜曰哀曰懼曰惡曰欲曰愛曰怒夫七者情也情出於性也夫七情中愛惡二者生而自能是二者性之根惡之端也乳兒見乳必拏求不得即啼是愛與怒與兒俱生也夫豈知其五者焉既壯而五者隨而生焉或有或亡或厚成薄至於愛怒曾不須㬰與乳兒相離而至於壯也君子之性愛怒淡然不出於道中人可以上下者有愛拘於禮有怒懼於法世有禮法其有踰者不敢恣其情世無禮法亦隨而熾焉至於小人雖有禮法而不能制愛則求之不得即怒怒則亂故曰愛惡者性之本惡之端與乳兒俱生相隨而至於壯也凡言情性之善者多引舜禹言不善者多引丹朱商均夫舜禹二君子生人已來如二君子者凡有㡬人不可引以為喻丹朱商均為堯舜子夫生於堯舜之世被其化皆為善人況生於其室親為父子蒸不能潤灼不能熱是其惡與堯舜之善等耳天止一日月耳言光明者豈可引以為喻人之品類可與上下者衆可與上下之性愛怒居多愛怒者惡之端也荀言人之性惡比於二子荀得多矣象耕鳥耘辯陸龜䝉世謂舜之在下也田於歴山象為之耕鳥為之耘聖德感召也如是余曰斯異術也何聖德歟孔子叙書於舜曰濬哲文明聖德止於是而足矣何感召之云云乎然象耕鳥耘之說吾得於農家請試辯之吾觀耕者行端而徐起墢欲深獸之形魁者無出於象行必端履必深法其端深故曰象耕耘者去莠舉手務疾而畏晚鳥之啄食務疾而畏奪法其疾畏故曰鳥耘試禹之績大成而後薦之於天其為端且深非得於象耕乎去四凶恐害於政其為疾且畏非得於鳥耘乎不然則雷澤之漁河濱之陶一無感召何也豈聖德有時而不德邪孟子曰堯舜與人同耳而好事者張以就其怪非聖人之意也吾病其書之異端敺之使合於道人其從我乎雖不從吾亦不能變其説太華仙掌辯王涯西嶽太華華之首峰有五崖比壑破巖而列自下逺而望之偶為掌形舊俗土記之傳者皆曰昔河自積石出而西流既越龍門遂弭南馳者千數百里折波左旋將走東溟連山塞之壅不得去有巨靈於此力擘而剖其中跖而北者為首陽絶而南者為太華河自此洩茫洋下馳故其掌迹猶存巨靈之跡也余聞惑之乃往觀曰誕哉此説乎夫所謂神者非人也其動無聲其行無跡若形而無象若氣而無色拔山剖澤而不見其作鼔風奔水而不見其力視不可察名不能及故推而謂之神茍有聲可聞有形可見非神之所為則皆人力之能及也烏有神之作力而有人跡乎且夫髙天厚地聳山流川者神之所為也所言開山導河亦神也神之所以神者有作而無悖一成而不易烏有始塞而復達之始連而復絶之始不知終是不為神矣且此靈之運為何古乎在太初開闢之始乎為陶唐洪水懷山襄陵之際乎以為開闢之始也冝當胚渾之先天地未位禹象茫然尚無定歸當止一河之壅抑而一靈與其道借有其事自為而著悠悠乎年代之𦕈沒其誰也克傳以為陶唐洪水之際乎則禹奠百川冝在禹貢乃曰導河積石至於龍門南至於華隂東至於底柱皆禹功之所致以達於海豈天地大異之若此典記不以為文哉天設四凟冝有以通不當始遏其流滯撓其和氣及其汨亂而後理也且山谷之作此形何則不有嵲屼相薄高深相敵乃有銳而出者為虎牙偶而背者為熊耳角而巘者為牛首冠而峭者為雞頭必以形之類形而必加説則雞牛熊虎之象其亦有作乎余嘗覽張乎子賦西京至巨靈高掌厥跡猶存之辭以為該聞精達常以是惑使不語怪神之旨何所述明暨覩其形而咨之果謬悠而無據也將假文神事以飾其辭歟為思而有闕歟因辯其由而述之以告山下廬江四辯盧璠凡作事必法古名地者必求其古地而不古失其地矣秦一天下破國為郡名地者唯求於禹貢與山海經故始皇二十六年以揚州之地為九江鄣郡㑹稽九江㑹稽出禹貢鄣出山海經按海内南經云三天子鄣山在閩西注云在歙縣東浙江出焉海内東經云廬江出三天子都入江彭澤西注云即彭蠡也今彭澤縣西是也經又曰一名天子鄣江南之鄣由此名也廬江在彭蠡西涯因廬江以立名項羽封英布為九江王盡有揚州之地漢高改九江曰淮南即封布為淮南王十一年布誅立皇子長為淮南王孝文八年長死徙封長子安為淮南王賜為廬江王勃為衡山王應劭曰廬江故廬子國也考尋載籍古無廬國之名是劭以盧江為廬戎之地也按左氏傳盧戎亦曰廬在宣城西山中劭誤以中廬之廬為廬江之廬後人因迷而不悟按漢書諸侯王年表北界淮瀕略廬衡為淮南顔注云廬衡二山名也衡即今霍山按東漢地理志建武十年省六安國以縣屬廬江郡郡十四城有舒潯陽襄安郡南有九江東合為大江大江之南與彭澤相接既得潯陽潯陽有廬山廬山因江而名古矣廬江之地包江南北而有之周景武廬山記云匡裕周威王時生而神靈居於山上世稱廬君則是裕因山為號不因裕為廬而名山為西域法者曰惠逺作廬山記不知所始乃曰匡裕出殷周之際結廬山上因名山曰廬其謬甚矣按豫章舊志裕父與番陽令呉芮佐漢定天下而亡漢封裕於潯陽武帝南巡封裕為明公是山不因裕而名愈明矣余故曰事必法古名地者必求於古廬江自山海經所謂出三天子都者是也今山在彭蠡之上亡其所謂廬江者時移事古名與地改故也又按經云浙江出三天子都在其東地理志云浙江出黟縣南率山東入海率則歙今浙江是也今率山在歙州南建延而西曰浙嶺浙水實出其隂又西走音奏彭澤凡三百里并水出三陽者皆西流匯於彭蠡廬江逺乎哉是必一水也又按今潯陽在江州大江之南古潯陽在大江之北名地為國者豈限江之南北哉求於古而已矣廬江之國自山海經而名者為是右辯廬江同食館不知名於何時咸謂自廬以往振廪同食因以為名按左氏􅁊十三年傳楚屈瑕伐羅羅與廬戎兩軍之杜注云盧亦為盧廬戎南蠻也文十六年經楚人秦人巴人滅庸注云庸今上庸也今房州上庸即其地傳云魯人出師自廬以往振廪同食注云廬今襄陽中廬縣也振發廪倉也同食上下無異饌也次於勾澨勾澨楚西境也使廬戢梨侵庸戢梨廬大夫也又按漢書地理志當陽之中廬在襄陽縣南今猶有次廬村顔注云隋室諱忠故改為次又按楚莊王時都郢即今之江陵由郢而伐西北密邇之庸安有發東北數千里之廪上下同食哉此非廬江之廬明矣噫夫命名者不詳國地之本末俾後世地因名而生惑余今以廬江所治故六地也六與蓼皆滅於楚巳滅而臧孫辰嘆曰臯陶庭堅不祀忽諸德之不建民之無援哀哉足以為後代鑑因更是館名曰建德右改同食館名漢書淮南王殺開章葬之肥陵肥陵肥水之上也在壽春應劭六夏水出父城東南至此與肥合故曰合肥今按肥水出雞鳴山北流二十里所分而為二其一東南流經合肥縣南又東南入巢湖其一西北流二百里出壽春西投去聲於淮二水皆曰肥余按爾雅歸異出同流肥言所出同而所歸異也是山也高不過百尋所出唯一水分流而已其源寳同而所流實異也故皆曰肥今二州圖記皆不見夏水與父城惡睹其謂夏與肥合者乎合於一源分而為肥合亦同也故曰合肥而云夏與肥合者亦應氏之失也右辯合肥按圖記今冶父山在廬江東北即左氏所謂莫敖縊於荒谷羣帥囚於冶父茲山是也余按杜注及地理志荆州記皆云冶父城在荆州荒谷西北小城即冶父城莫敖縊於荒谷羣帥囚於冶父是也廬非廬戎之地同食異振廪之所安得復有冶父哉後人妄加之明矣矧囚於城豈囚於山乎余按今冶父山實有鐡冶乃作教告縣名曰冶山不疑右辯冶父山進學解韓愈國子先生晨入太學招諸生立館下誨之曰業精於勤荒於嬉行成於思毁於隨方今聖賢相逢治具畢張拔去凶邪登崇俊良占去聲小善者率以録名一藝者無不庸􅐡巴蒲反羅剔抉刮垢磨光葢有幸而獲選孰云多而不揚諸生患業不能精無患有司之不明行患不能成無患有司之不公言未既有笑於列者曰先生欺予哉弟子事先生於茲有時矣先生口不絶吟於六藝之文手不停披於百家之編記事者必提其要纂言者必鉤其𤣥貪多務得細大不捐焚膏油以繼晷􅁪矻矻以窮年先生之於業可謂勤矣觝排異端攘斥佛老𥙷苴子予反鏬漏張皇幽渺尋墜緒之茫茫獨旁搜而逺紹障百川而東之廻狂瀾於既倒先生之於儒可謂有勞矣沈浸醲郁含英咀華作為文章其書滿家上規姚姒渾渾亡涯周誥殷盤佶屈聱牙春秋謹嚴在氏浮誇易竒而法詩正而葩下逮莊騷太史所録子雲相如同工異曲先生之於文可謂閎其中而肆其外矣少始知學勇於敢為長通於方左右具宜先生之於為人可謂成矣然而公不見信於人私不見助於友跋前疐後動輙得咎暫為御史遂􅇡南夷三年博士冗不見治平聲命與􅄷謀取敗㡬時冬暖而兒號寒年登而妻啼飢頭童齒豁竟死何禆不知慮此而反教人為先生曰吁子來前夫大木為杗音亡細木為桷欂櫨侏儒椳烏囘反闑扂丁玷反楔先列反各得其施以成室屋者匠氏之功也玉札丹砂赤箭青芝牛溲馬勃敗鼓之皮俱収竝蓄待用無遺者醫師之良也登明選公雜進巧拙紆餘為妍卓犖為傑校短量長惟器是適者宰相之方也昔者孟軻好辯孔道以明轍環天下卒老於行荀卿守正大論以興逃䜛於楚廢死蘭陵是二儒者吐辭為經舉足為法絶類離倫優入聖域其遇於世何如也今先生學雖勤而不繇其統言雖多而不要平其中文雖竒而不濟於用行雖修而不顯於衆猶且月費俸錢嵗靡平廪粟子不知耕婦不知織乗馬從徒安坐而食踵常途之役役窺陳篇以盗竊然而聖主不加誅宰臣不見斥茲非其幸歟動而得謗名亦隨之投閒置散乃分之冝若夫商財賄之有亡計班資之崇􅯿音卑忘已量之所稱去指前人之瑕疵是所謂詰匠氏之不以杙為楹而訾醫師之不以昌陽引年欲進其狶苓也仲尼不歴聘解盛均學者多稱仲尼歴聘不遇吾謂仲尼觀禮行道不歴聘不遇吾謂仲尼觀禮也夫二國交驩曰聘以臣使於君亦曰聘男輸財於女國駕帛於士皆曰聘故無財與無君國之命一不聘也當德蝕衰周道徂七國盖仲尼傷禮樂不起是以學韶於齊求師於周將欲鑄義以鏡國張仁以羅俗使明笥為宗資也且去魯適衞盖辭在於仕矣自宋之鄭殆非臣矣絶糧於陳蔡亦無財矣官至司冦果不為士安謂聘哉吾聞夫子觀夏道則之杞觀殷道則之宋較是而言雖他國可知也安謂厯聘哉文之章解韋籌垂日月所以為天也光盛而形物於地備禮樂所以成人也言成而著訓於簡非是而光者燭龍爟火亦光矣非是而言者狂童詖子亦言矣故定曰天文曰人文自文而之於地之於簡者章也然而文在帝則簡在史是以堯文思章於典舜文明亦章於典文王性堯舜之文也文治於西伯章於詩易仲尼性堯舜文王之文而弗帝弗伯也盛章於禮樂經記囘性仲尼之文也文不及章偃商學仲尼文而之於人也故樂章武城民而經章魏國居伋性其祖者也參士南反以學而章於中庸軻性伋者也勤於道而章於七篇由偃至軻無有禮樂者乎是畢由人文而章者也未見不由而章者也人視影於地者仰而見爝火而不見日月必曰非天文之章也視辭章於簡者乆而見狂濫而不見禮樂則不曰非人文之章也浸有不文而自章諸國卿已降易曰觀乎人文以化成天下使章不自人文也天下孰觀而孰化獲麟解韓愈麟之為靈昭昭也詠於詩書於春秋雜出於傳記百家之書雖婦人小子皆知其為祥也然麟之為物不畜於家不􅁪有於天下其為形也不類非若馬牛犬豕豺狼麋鹿之狀然則雖有麟不可知其為麟也角者吾知其為牛鬛者吾知其為馬犬豕豺狼麋鹿吾知其為犬豕豺狼麋鹿惟麟也不可知不可知則其謂之不祥也亦冝雖然麟之出必有聖人在乎位麟為聖人出也聖人者必知麟麟之果不為不祥也又曰麟之所以為麟者以德不以形若麟之出不待聖人則其謂之不祥也亦冝國之興亡解李華為國者同於理身身或不和則藥石之針炙之若夫扶疾而不攻疾病則斃扶之者屍也齊隋之亡也以貞於終始為惑苟而無耻為明慢於事職為高賢見義不為為長者繩違用法則附強而潰弱也議於得失則異寡而同衆也尚學希古謂之誕趣便中時謂之工觀其燥濕而輕重之候其成敗而襃貶之肉食之尊以滋味糊口忍危亡而僥禄利自是而下則曰上司猶如之我於國何有設能憤發則逆為備豫動開束闑氣沮志衰亦從以化倖於生者炎炎而四合死於正者求援而無繼麒麟悲鳴鳳鳥垂翅鴟鼔害翼犬呀毒喙則蛇鴆虎狼之徒其可向邪嗟呼心腹支體一也為病者萬焉雖有岐緩而不請岐緩視之而不救噫齊隋不亡得哉反是而理則王道易易也象刑解沈顔舜禹之代象刑而人不敢犯言象刑者以赭以墨染其衣冠異其服色凡為三等及秦法苛虐方用肉刑鋸鑿箠扑楚毒畢至而人犯愈多俗益不治其故何也非徒上古淳朴人易為化亦由聖智𤣥逺深得其理故也夫法過峻則犯者多犯者多則刑者衆刑者衆則民無恥民無恥則雖曰劓之刖之笞之扑之而不為畏也何以知其然邪夫九人冠而一人髽則髽者慕而冠者勝九人髽而一人冠則冠者慕而髽者勝民不知冠之髽之為勝但見衆而為慕矣今免者多而刑者少人尚慕其多矣及刑者多而免者少焉以少為勝乎故曰法過峻則犯者多犯者多則刑者衆刑者衆則民無恥民無恥則雖曰劓之刖之笞之扑之而不為畏也凡民之心知恣其所為而不知戒其所失今辱而笞之不足以為法也何者盖笞絶則罪釋痛止則恥滅恥滅則復為其非矣故不足以為法也虞舜染其衣冠異其服色是罪終身不釋恥畢世不滅豈特已以為恥也人之見之者皆以為恥也皆以為戒也愚故曰非徒上古淳朴人易為化亦由聖智𤣥邈深得其理故也人旱解盛均涒灘嵗越垠曠旱塞諸陽遷市不雨祈山川庶神又不雨觴土龍舞巫覡愈不雨或言邦有術人能捕退龍而譟之昔嵗嘗然農剰其澤及召術人至而旱色如故太守怒亟命擒之術人遁去矣其遺囊有書一幅目曰人旱旱有三曰天旱國旱人旱曷為天旱蹇陽肆凶下土祗慎雖六七嵗黎人不飢曷為國旱君道熾災德涸仁枯貪風暴氣蒸為時癘曷為人旱邦燬其政吏賊其行千里人心燥不為隂夫天旱求諸仁仁洽而時豐國旱求諸德德潤而澤流人旱求諸政政清而俗阜今貨遊於上刑黷於下百姓焦愁結成恨暑所謂人旱者也邦守不清其政而逮龍貨雨是猶乘攆適海豢羊望翼於何可兾乎太守得書增怒是嵗自正月不雨至於五月明年殍死者數千人而太守亦以財禍工器解程晏匠刀者不必自用割匠弓者不必自用射善為器而已善割者不必善匠刀善射者不必善匠弓善用人之器而已庖丁豈自鍜而後操之耶由基豈自斵而後射之邪然則匠刀者不嫉庖丁之解匠弓者不嫉由基之中業已之為器而懼刃之不利弦之不勁也我器既利既勁稱彼之用是器得其所又何嫉哉蕭張為漢之器既利既勁矣不嫉漢祖之能刃我而解羽弦我而中羽天下是業已之為器也反是者所謂已匠刃不欲人之善割已匠弓不欲人之善射然則器安適乎范增之器也既利既勁矣鴻門之言不用羽非善射善割者終不能用其器也是器豈嫉人也哉痛器之失其所也是言也不足為儒者道用警乎貪民嫉上之臣也歸解書彭陽公碑隂朱閱古者以死為歸也然則豈死者皆得歸哉故有兇肆之徒壓溺而斃貪暴之輩刑戮以亡謂之不得其死不得其死是不得所歸也父母全而生之子全而歸之不虧其身不辱其親是得所歸矣所歸者猶有數品焉有跛躄而歸者有困窮而歸者有憂鞠而歸者有暇豫而歸者有榮顯而歸者有欣喜而歸者佞媚於生前而得其死者跛躄而歸也愚鄙於生前而得其死者困窮而歸也彊暴於生前而得其死者憂鞠而歸也三者皆茀其歸路也正直於生前得其死者暇豫而歸也敏達於生前得其死者榮顯而歸也仁惠於生前得其死者欣喜而歸也三者皆坦其歸路也嗚呼公昔有遺德於生前矣而今之歸也豈有跛躄困窮憂鞠之苦而無暇豫榮顯忻喜之逸哉公歸之道光矣予感公之知獨來弔作歸解或曰子不識彭陽公而云知豈誣也哉曰公尹洛禮陳商為鄆薦蔡京莅京辟李商隱予偶不識公耳公之知予如春潦之奔壑夏雲之得龍秋弧之發矢冬鑪之納火勢豈後於三子哉是則公亦知予者也何必識然後知乃曰之知也在道之相望爾昔殷湯與周公不相識孔子與周公不相識孟軻與孔子不相識楊雄與孟軻不相識韓愈與楊雄不相識果不相知哉伊尹與夏桀相識比干與殷紂相識果相知哉今天下大國之侯小國之伯予常識之矣目且相視言亦相交豈得為余知也哉予感歎碑下歸解於是書之命解李翺或曰貴與富在我而已以知求則得之不求則不得也何命之為或曰不然求之有不得而不求有得之者皆命也人事何為二子出或問曰二者之言其孰是也對曰是皆䧟人於不善之言也以智而求之者盗耕人之田者也皆以為命者弗耕而望収者也吾無取焉爾循其方由其道雖禄之千乘之冨舉而立諸卿大夫之上受而不辭非曰貪也私於已者寡而利於天下者多故不辭也何命之有焉如取之不循其道雖一飯之細也猶不可受况冨貴之大耶非亷也利於人者鮮而賊於道者多故弗為也何智之有焉然則君子之術其亦可知也叛解李甘或曰申􅁪何讎而叛解曰盗賊富豪讎乎且惏其財而強索之若寃其主也申習盜􅁪習賊差乎解曰害財曰盜以盜害人曰賊天下有士家之有紵粟也天下有相家之有子弟也申慿葉縣非盜歟􅁪驚宰相非賊歟或曰有盗一金費十金而可捕為之乎有賊一夫殺十夫而可磔行之乎今三年兵之非十金而捕如費何萬人死之非十夫而磔如殺何解曰以金為輕而不捕則窮人家家謀盜矣冨人家家遇盜矣以一夫為寡而不磔測壯夫人人為賊矣懦夫人人被賊矣是故盡天下之盜者三年為蚤也勝天下之賊者萬人為少也或曰吾聞寡夫重閉盍鍵乎解曰天雨垣敗盗賊乘之門之閉耶曰以彼習叛之功也贖而吏之何如解曰盜賊欲巧吏不欲擾如贖倡而為妻也為倡且淫為妻且禁乎唐文粹巻四十六欽定四庫全書唐文粹巻四十七宋姚鉉偏古文已
