  text: 重校正唐文粹卷第二十四
  hash: sha256:f0385ea7391a93dc4042ea52ab1ed8dbbb0718835e3cb1b01222d2b0562dde77
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0024_SBCK_024-1a}
body:
  text: 呉興姚鉉纂賛乙揔二十八首孝子一二孝賛李華古賢四四皓賛梁肅商山四皓畵圖賛韋渠年四皓後賛李華四公子賛潘存實名臣一鳳閣王侍郎傳論賛李翰浮啚十一三如來賛梁肅西方淨土變相賛李白藍田法池寺二法堂賛張說誌公畵賛李白達磨和尚法門義賛釋皎然天台和尚法門義賛能秀二祖賛誌公賛唐大通和尚法門義賛唐鶴林和尚法門義賛李居士賛李白圖畵六龍馬圖賛柳宗元騶虞畵賛白居易貘屏賛畵鵰賛怪松圖賛陸龜蒙金鄕薛少府㕔畵鶴賛李白鷙鳥一雙白鷹賛蘇頲絶藝一裴昊將軍射虎圖賛李翰雅樂二霹靂琴賛柳宗元琴賛李白橋梁一蒲津橋賛張說二孝賛并序李華靈武二孝曰侯知道程俱羅目不覩朝廷之容耳不聞韶夏之聲足不登齊魯之境所見戎馬旃裘參於夷狄而能生養以孝没奉以哀穿壙起墳出於身力鄕人助之者哭而反之廬於冡次號泣無節侯氏七年矣程氏三年矣根於天性陶我孝理其至乎哉埃垢積首草生髪閒毎大漠晨空連山夜寂人煙四絶虎豹與鄰擁墳椎膺聲氣咽塞下入九泉上徹九天背爛心杇皮枯節攣草木先秋而凋落景氣不時而凝閉殊鳥異獸助之悲號萬物有極此哀無窮大哉二子能以孝終始乎語曰孝如曽參不忍離其親生旣不忍殁忍離之哉二子之孝過於曽氏矣昔吳起忍與毋盟陳湯忍匿父喪起謀復楚霸而戮死湯功釋漢恥而囚廢神道昭昭若何無報九州之衆誰非人子踐霜露者聞風永懷士有感一諾一顧猶或與之死生嘉一草一木猶或爲之歌詠而況百行之宗終天之慼乎華奉使朔陲欲親往弔焉屬河凌絶渡願言不果慿軾隔川寄聲二孝同爲賛一章敢旌善人以附惇史其文曰厥𥘉生人有君有親孝於親者爲子忠於君者爲臣兆自天命降成人倫背死不義忘生不仁愚及知就爲之禮文禮文不能節其哀繄道德之元純至哉侯氏創鉅病殷手足胼胝成此高墳𬞞果爲奠茅蒲爲􅌲其奉也敬其生也貧大漠黃沙空山白雲柏庭旣夕松路未晨宼戎接境犲狼成羣夜黒颷動如臨鬼神哭無常聲迴徹蒼旻風雨漂揺支體鱗皴色慘莪蒿聲酸棘薪苴斬三年爾獨終身邑子程生其哀也均顧後絶配瞻前無鄰冬十一月河冰塞津吾將弔之其路無因寄誠斯文揮涕河濵四皓賛并序梁肅道可佐皇而隘於帝治是以崆峒箕山之長揖於軒堯也德冝輔王而偶生霸丗則四皓之所以晦明於漢氏也噫周道絶而王澤涸秦短世而漢雜興六合披攘兵不睱戢則四公軒軒然鴻飛于冥時也天下大寶一人攸繫苟蔑嫡崇庶則亂是用長而公僂僂然俯定儲后權也處則以時出則以權時以全巳之道權以安天下之器得非知幾者歟易謂知幾其神乎四公體之故曰時合道合時塞道塞生非其時與道消息四公之謂歟賛曰秦失其鹿豪傑並逐鸞鳯何依白雲深谷英英南山采采紫芝漢以劒起吾誰與歸栖心化元澹泊無爲禮物雖至先生黙而惟彼貞石確不可轉儲皇不安我德用顯大君是驚惠位是寧四公屈身天下和平弋者何思鴻飛冥冥商山四皓畵圖賛并序韋渠牟故人淸河房茂長刺商山成簡靜之化曰隱居之類也畵兹圖以貺予𬗟乎沉吟想似之不足故爲文以懿之詞曰煥煥煌煌爲珪爲璋孰光乎不耀之光幽幽深深爲山爲林孰繫乎不繫之心足知乎虚室生白玄門不關流水去住淸風往還豈比夫稷契在世巢由在山一物有累兩心不閑者哉閑之謂何簪裾薛蘿本不干我豈云其他熈熈忻忻與時爲春匡漢避秦惟兹四人于德之鄰不孤其身于磵之濵不迷其津繪事旣素孰知其故想像儀形念兹丹靑曄曄紫芝深谷逶迤俛仰今古空林住時鳯豈無德鸞皆有羣出處語黙商山白雲四皓後賛李華時濁代危賢人去之商洛深山鸞鳯濳飛漢以霸興皇王道衰玉帛雖至先生不歸吾非固然可動而起痝眉皓髪來護太子至尊動容奪嫡心巳四賢暫屈天下定矣返駕商山白雲千里四公子賛并序潘存實四君當齊楚趙魏之盛門客三千人聞者孰不慕之有未達則孰不曰一朝富且貴必然嗚呼自四君殁千載之閒豈無貴於四君者豈無富於四君者而然者其誰旣富貴則曰彼四子徒沽名爾三千之人何爲哉悲夫人之貴也爲身四君之貴也爲人富貴皆知可及也而富貴之心與貧賤之心不相負者愚則未見其及也賛曰四人爲身萬二千人爲耳目四人爲梁萬二千人爲榱桷有危可平有死可生豈彼威慿寔惟義爭嗟乎人之家或財不自與心不自是妻不睦夫父不慈子而況乎萬二千士懿哉恨目不覩此鳳閣王侍郎傳論賛并序李翰論曰王氏之先蓋岀於有周自后稷公劉迨乎大玉王季以至文武成康累聖重光以成王業故能卜世三十卜年七百天所命也下及靈王厥德雖衰而天命未改有太子晉者登仙干伊洛之間其後代子孫遂稱爲王氏考其綿系不亦逺乎旣而姬氏運窮戰國蜂起有錯爲魏將翦爲秦將咸以武功翊扶霸業宏謀逺略二國賴焉自秦至漢有吉有駿爲漢代名賢白漢至晉有覽有祥爲晉室公輔時徐州刺史呂䖍檄祥爲别駕䖍有佩刀工者相之以爲三公之器䖍謂祥曰苟非其人刀或爲害卿有公輔之量故以相與祥固辭不獲而後受之祥在魏爲司空太尉封睢陵侯晉武帝踐祚拜太保爵爲公年八十餘賜凡杖不朝爲國元老祥臨薨以佩刀授其弟覽曰汝後必興足稱此刀覽拜光禄大夫封即丘子門施行馬覽生撫軍長史裁裁生丞相始興文獻公導匡輔中興遷都建業元帝倚以宰衡之任而王氏盛於江左矣其正緒也則恱洽珣珉以弘雅淸亮重於時其傍枝也則渾戎衍經以曠達夷坦高於物若乃器宇崇邈風鑒昭朗則宋侍中左光禄大夫開府儀同三司特進豫寧文侯其人也忠肅恭懿宣慈惠和則宋侍中金紫光禄大夫開府豫寧忠敏侯其人也開物成務緯地經天則齊中書監尚書令太尉南昌文獻公其人也廉正澄絜恬虚簡潤則梁侍中金紫光禄大夫中書令南昌安侯其人也美幹英姿通機敏藝則梁侍中金紫光禄大夫五兵尙書南昌章侯其人也愽學高才鴻筆麗藻則周内史太子太保驃騎將軍開府儀同三司司空司徒石泉康公其人也有典有則如珪如璋則隋安都郡大守石泉侯其人也道韻淸穆德徽光劭則太子舎人荆王府司馬皇朝贈魏州刺史其人也其餘枝分葉散岳峙川流孝範忠規仁聲義烈女嬪帝子男尚王姬公侯保輔之尊令僕卿尹之貴紐龜鳴玉紫蓋朱軒赫奕蟬聮􅌭紛菴藹市朝亟改而無替舟壑驟遷而不易衣冠禮樂百代傳之而比肩人物風流四海望之而延頸豈不美哉雖復魯三桓之子孫鄭七穆之宗族晉之欒范齊之國高張氏之七葉貂蟬楊家之四世台衮石奮石慶恭睿重規胡質胡威淸廉疊軌父子儒學桓榮與桓郁相承兄弟文章陸機與陸雲齊舉未足以延兹家範麗我門輝所謂積善之家必有餘慶盛德必有百世之祀者也善乎郭景純之言淮水絶王氏滅此非其效歟石泉公承積德之基挺舉和之氣髫齓之歲便能竭力以事親其性純篤率由而至精神朗晤特異常童好學讀書略無懈倦常研味經史雖寢食有所不遑纔及成童已爲愽達朋侣推薦束髪而就列焉歷仕州郡咸以材能底績旣以賢良文學舉又以夙行公方進遂乃昇臺府拜卿僕三典名嶽一佐神州始學之今得而行之以明察禦姦豪以慈和撫孤弱以謹靖成公務以清白杜私求珠玉非所寶脂膏不能潤故能所廣者紀不令而行千里應其言百姓歸其德所謂愷悌君子人之父母者也及其翔鳳池執螭劒岀納王命弼諧帝猷理在將順怡然而奉㫖事當進色偘然而犯鱗常欲興禮制樂簡刑寛政獎儒術抑吏道正風俗厚人倫乃籧瑗之忠誠史魚之端操孟公綽之不欲季文子之無私羊興祖之衣帷葛袍公孫弘之食帷粟飯陳寵之奏藁咸削孔光之温樹不言我之行事立名殆出於數公之右矣由是特爲上所親倚常以忠賢許之其好古愽雅述作無倦遊心於千載之表騁思於九流之域雖堆桉盈机積訟充庭汗簡懷鈆晷刻無捨所莅之職由中及外或考其事或相厥土愽採前志旁求故實輒加撰録無或闕遺至以祖德家聲前言往行追述編紀動成部帙有忠孝之道焉有禮義之規焉有經邦之則焉有正家之訓焉固可以詒厥孫謀播乎長世者也易曰君子體仁足以長人嘉㑹足以合禮利物足以和義貞固足以幹事又曰君子進德脩業忠信所以進德也脩辭立其誠所以居業也又曰君子學以聚之問以辨之寛以居之仁以行之詩曰瑟兮僩兮赫兮烜兮有斐君子終不可諼兮道盛德至善人所不能忘也又曰樂只君子邦家之基又曰嘉樂君子顯顯令德冝民冝人受禄于天若石泉公者可謂備君子之德矣其爲聖朝輔佐受天之禄也宜哉賛曰仙緒山賔靈液流津積德累仁生賢淸神孝以事親忠以爲臣履道正身秉國之鈞君子哉若人上德哉若人三如來畵像賛并序梁肅法王之身有三曰法曰報曰應報身從無邊功德生應身依無邊衆生生法身從如如無有生分别說三其極一貫原夫大道之體離一切相是其本也積大德施大惠合大道成大身是其報也出入十界隨所利見如水月鏡是其應也自因至果故不得不有其報病一切病故不得不行其應應亦名也報亦名也名乎哉其實相之賔乎經云觀身實相觀佛亦然甞試思之以爲衆生蓋反佛者也是三相在佛爲三德在凡爲三障一者生死生死即空寂空寂即法身也二者煩惱煩惱即智慧智慧即報身也三者結業結業即解脫解脫即應身也三德成於悟三障成於迷迷而不復也遂自絶於佛乗哀哉予甞齋心命工裂素作繪聖德之形容可舉目而見見而後思思而後知至知至之路蓋由是矣瞻仰之不足遂爲之賛庶觀者有以三如來不在心外不可以有無心取大哉法體體如虛空不始不終不垢不淨不邊不中是謂湼槃是謂法身諸佛性海是无上正眞右賛毗盧遮那佛妙哉報體體法而大由清淨功德色無礙德色無礙成實智慧範圍法界盡未來際右賛盧舎那佛神造化功萬化无方休有烈光以百億色身播百億國土啓權顯實或黙或語示我寂滅雙林之下右賛釋迦牟尼佛三聖一身本无有異恒沙諸佛其道一致衆生唯妄竟妄斯至懸象著明用鑒心地右揔賛金銀泥畵西方淨土變相賛并序李白我聞金方之西日没之所去中華十萬億刹有極樂世界焉彼國之佛身長六十萬億恒沙由旬眉閒白毫向右宛轉如五須彌山目光淸白若四大海水端坐說法湛然常存沼明金沙岸列珍樹欄楯彌覆羅網周張車瑠璃爲樓殿之飾玻璃馬腦耀階砌之榮皆諸佛所證無虚言者金銀泥畵西方淨土變相蓋馮翊郡太夫人奉爲亡夫湖州刺史韋公之所建也夫人藴冰玉之淸敷聖善之訓伉儷義大希拯拔於幽塗父子恩深用薰脩於景福誓捨珍物購求名工圖金創瑞繪銀設像八功德水波動靑蓮之池七寶香花光映黃金之地淸風所拂如生五音百千妙樂咸疑動作若巳發願及未發願若巳當生及未當生精念七日必生其國功德罔極酌而難名賛曰向西日没處遥瞻大悲顔目淨碧海水身光紫金山勤念必往生是故稱極樂珠網珍寶樹天花散香閣圖畵了在眼願託彼道場以此功德海冥祐爲舟梁八十一劫罪如風掃輕霜諦觀無量壽長放玉毫光藍田法池寺二法堂賛并序張說法池西三歸院二法堂兹寺長老初上禪師所造也禪師俗姓彭名知至性篤孝執親之喪七日不食微言密行志道探玄究易老莊太一之㫖善正書擅鍾王品格其點畫宛秀毫縷必見如折槁荷磨文石䈥理灑颯固非人力之所致也中朝名士山藪高尚法流開勝逺近募焉及晩年專意於禪頌生平藝業脫若遺塵矣常歎曰帝王父母許我出家雨露生成恩惟一揆依如來敎創是功德萬一乎獻福二宫濳祐七祖將與一切咸登道場於是三歸堂以長安元年辛丑子月望日癸未立善法堂以開元元年癸丑丑月望日戊辰建禪師母弟仁琬弟子沙門啓疑及沙彌令哲左右斯業實有力焉而作賛曰三歸堂賛敬告諸佛子一心淸淨觀欲求正眞道當從信根入是佛虚空相是法微妙光定慧不相離是僧和合義人空法亦空二空亦復空住心三空寶是名三歸處善法堂賛至哉𥘉上人建立善法堂彩翠三世佛莊嚴淸淨眼能運無礙心普入於一切見若不染色知若不取識是名眞實見亦名解脫知佛觀離生滅諸法等如是誌公畫賛李白水中之月了不可取虚空其心寥廓無主錦幪鳥爪獨行絶侣刀齊尺梁扇迷陳語丹靑聖容去住無所六賛釋皎然達磨和尚法門義賛我師西來傳乎眞訣大輪當路小乗亡轍冥冥世人𥘉見日月權跡有歸光雲不滅天台和尚法門義賛我立三觀即假而眞如何果外强欲明因萬象之性空江月輪以此江月還名法身能秀二祖賛二公之心如月如日四方無雲當空而出三乗同軌萬法斯一南北分宗工言之失誌公賛大動之地我安其中高景無氛靈鶴在空出生死泥隨物有終𠢐形駭俗借繢開蒙常攜刀尺精意誰通唐大通和尚法門義賛觀淨之筌斯言不住四色蓮花白花爲喻應知離相或未圎通吾師惠心雲開天空唐鶴林和尚法門義賛眞見之體知而不知性猶無主禪何有支我本圎寂湛而不移聿來化人慈力所爲李居士李白至人之心如鏡中影揮斤萬變動不離靜彼質我斤揮風是騁了物無二皆爲匠郢吾族賢老名喧寫眞貌圖粉繢生爲垢塵從白得衰與天爲鄰儼然不語長存此身龍馬圖賛并序柳宗元始吾聞明皇帝在位靈昌郡得異馬于河而莫知其形好事者涿人盧遵以其圖來示余其狀龍鱗虺尾拳髦環目肉鬣馬之靈怪有是邪居帝閑幾二十年從封禪郊籍鳴和鑾者數十事遇亂帝西幸至咸陽西入渭水化龍泳去不知所終且其來也宜于時其去也存其神是全德也旣覩其形不可以不賛靈和粹異孕至神兮倮尾童鬣䟽紫鱗兮巍然特岀瑞聖人兮理平和樂百禮陳兮鳴鑾在御大路遵兮世尨道悖還吾眞兮哀鳴延首渭水濱弓沛焉濳泳旋奫淪兮淵居海遊靈無鄰兮出處孔時類至仁兮嗟爾衆類孰是倫兮進昏死亂阽厥身兮匪馬之慕吾誰親兮賛之斯圖宜世珍兮騶虞畫賛并序白居易騶虞仁瑞之獸也其所感所食曁形狀質文孫氏瑞應圖具載其事元和元年夏有以騶虞圖贈予者予愛其外猛而威内仁而信又嗟曠代不覿引筆讃之詞曰孟山有獸仁心毛質不踐生芻不食生物有道則見非時不岀三季巳還退藏於密我聞其名徴之於書不識其形得之於圖白質黒文猊首虎軀是邪非邪孰知之乎巳矣夫已矣夫前不見其往者後不見其來者于嗟乎騶虞貘屏賛并序白居易貘者象鼻犀目牛尾虎足生南方山谷中寢其皮辟温圖其形辟邪予舊病頭風毎寢息常以小屏衛其首適遇畵工偶令寫之按山海經此獸食鐡與銅不食他物因有所感遂爲賛曰邈哉竒獸生于南國其名曰貘非鐡不食昔在上古人心忠質征伐敎令自天子岀劒戟省用銅鐡羡溢貘當是時飽食終日三代以降王法不一鑠鐡爲兵範銅爲佛佛像日益兵刃日滋何山不剗何谷不隳銖銅寸鐡罔有孑遺悲哉彼貘無乃餒而嗚呼匪貘之悲惟時之悲畵鵰賛并序白居易壽安令白昊予宗兄也得丹靑之妙傳寫之要毛羣羽族尤是所長長慶元年以畵鵰貺予予愛之因題賛云􅋧禽之英黒鵰丁丁鉤綴八爪劒挿六翎想入心匠寫從筆精不卵不鶵一日而成軒然將飛戞然欲鳴毛動骨活神來著形始知造物不必窅冥但獲天機則與化爭韓幹之馬籍籍知名薛稷之鶴翩翩有聲研工覈能較眞鬪靈豈無他人不知我兄怪松圖賛并序陸龜蒙有道人自天台來示余怪松圖披之甚駭人目根盤于巖穴之内輪囷逼側而上身大數圍而高不四五尺礧碋然蹙縮然榦不睱枝枝不睱葉有若龍攣虎跛壯士囚縳之狀道人曰是何物怪如是耶子能辯之乎余曰草木之生安有怪耶苟肥瘠得於中寒暑均於外不爲物所凌折未有不挺而茂者也矧松栢乎今不幸出於巖穴之内脞脆者則䃘然其牙伏死其下矣何自奮之能爲是松也雖稚氣初拆而正性不辱及其壯也力與石鬪乗陽之威悲已之軋拔而將升卒不勝其壓擁勇鬱遏坌憤激訐然後大醜彰於形質天下指之爲怪木吁豈異人乎哉天之賦才之盛者蚤不得用於世則伏而不舒薰蒸沉酣日進其道權擠勢奪卒不勝其阨號呼呶拏發越赴訴然後大竒出於文彩天下之指爲怪民嗚呼木病而後怪不怪不能圖其眞文病而後竒不竒不能駭於俗非始不幸而終幸者邪道人曰然爲我賛之賛曰松生䕃隘巖獄穴械病乎不快卒以爲怪擁腫支離神羞鬼疑道人嗟咨筆傳其竒或怪其形或竒于辭自爲怪魁是以賛之金鄕薛少府㕔畵鶴賛李白高堂閑軒兮雖聽訟而不擾圖蓬山之竒禽想瀛洲之縹緲紫頂煙赩丹眸星皎昂然佇眙霍若驚矯形留座隅勢岀天表謂長鳴於風宵終寂立於霜曉凝翫益古俯察逾妍舞疑傾市聽似聞弦儻感至精以神變或可弄景以浮煙雙白鷹賛并序蘇頲開元乙卯歲東夷君長白肅眘扶餘而貢白鷹一雙其一重三斤有四兩其一重三斤有二兩皆皓如練色斑若綵章積雪全映飛花碎點所謂金氣之英瑶光之精高髻偉臆長距秀頸奮發而銳堅剛則厲摩天絶海雷繫飈逝觀其行時令順秋殺指麾應捷顧眄餘雄當落鵬之賞蔑仇鷂之敵實稀代之尤也皇上祗膺聖圖欽若王道方寶賢重穀尊儒食艾後宫撤綺繡前殿焚珠玉與王侯卿士朝夕論思異無所貴輕衛公之好鶴竒無所珍同漢皇之卻馬畋豈矜於馳騁獵以存乎蒐狩未甞合圍掩羣載羽灑血乃强不攫而猛不噬矣然以萬方入貢懷其來也三年重譯嘉其至也故仁爲之心有仁則勇威爲之力有威則重況此鳥猛過於衆重倍於凡禮於君則勸忠祭於祖則立敬壯其體則用武綷其翼則成文彼寵而服之鶡也能果榮而戴之蟬也能絜矧乎職命司㓂師惟尚文聞箴刺姦擇善爲吏蓋選士之是式匪從禽之足云此謂備於圖而儆在位也微臣奉制敢稱賛曰鷹之大者精明竦峻勁而橫絶雄則逺振錦文素綵珠聮玉潤往乃奮威將軍所徇鷹之次者勇銳光芒截海而至乗風載揚絡以紅點文其綵章下鞲必中惟吏之良裴昊將軍射虎圖賛并序李翰世稱裴將軍射虎而不及見駕部郎中兼侍御史滎陽鄭公愽物好古旌能尚藝于裴氏子得其先人射虎圖傳以示予壯哉古今之未有倫也夫弧矢之用所以服猛除暴而威戎狄故士生則以蓬矢射四方君立則以五侯選諸侯五侯之正皆飾以熊虎猛獸之皮象而射之也昭除暴不若也周官曰張五侯則逺國屬射而中之威不庭也昭昭乎除暴威逺之義蓋射之大端若殺不加有罪威不及不庭雖有百中之功而無一發之矢彀弓鳥下拾矢猨號工則工矣是射之末節開元中山戎㓂邊玄宗命將軍守北平州且充龍苑軍使以捍薊之北門公甞率偏軍橫絶漠策匹馬陷重圍揺轆轤而百萬洞開驅橐駞而沙場一掃聲振北狄氣慴東胡稜威大矣而北平連山廣野地實多虎擇肉於人如有飛翼荐食邊鄙甚於戎夷羣老憂而請焉公於是屏車徒去矛鎩曰賈予餘勇挺身以餌之眈眈甝虓烈烈騰逝當其威怒也百獸以伏萬夫莫亢而公馳單騎彀白羽挑之使來翼之而迴從容返視咫尺旋翫心即其度手張其機左射右拂縈之疊四中皆没羽倒必應弦毛紛血灑腋洞心穿或叱之而弭伏或箠之而郤走將威有所勝氣有所全精專於中志正於内故能以一人之力戰羣虎之命使鋸牙鉤爪戢而莫措雷聲電視消而不揚猛摧於柔衆怯於獨其爲易也若獵狐兔聮鶖鶬雖有矯牙冠羣亦垂頭榻尾應鏑而斃如此者凡三十有一矣其餘竄匿不敢復出大漠之南千里罷扃鳥獸咸若山川以寧胡人服藝畏威不敢南牧願充麾下者五百餘人兹所謂剛猛除暴而戎夷格昔漢飛將軍亦爲北平守擊胡有困辱之事射虎有騰傷之患其與將軍神勇非爲侔矣鄭公旣寫其圖俾予賛之詞曰憬彼山戎噬我封略有羣者虎載肆騰搏邊甿懔懔若崩厥角將軍出塞屏黜車騎進馬前當挺身以餌威有所服精有所聚氣全以雄力果而取震驚矍矍虎反如䑕威武桓桓人反如虎勁弓雷霹長矢電激中口穿匈貫心洞腋視如空皮劃若破的應發連斃紛紜枕藉據鞍遥叱揮箠逆擊閉目沈冥喪精擗易三軍駭呼萬靈動魄海波爲騰塞草皆赤卞莊俟鬪方聞兩獲漢將如飛幾爲所扼將軍神勇冠世超昔號猨未工飲羽非敵弧矢之設以威四方羣虎旣夷狄人來降收闥罷扃山川以寧至今北荒猶畏其靈霹靂琴賛并序柳宗元霹靂琴者零陵湘水西震餘枯桐之爲也姑枯桐生石上說者言蛟龍伏其竅一夕暴震火之焚至旦乃巳其餘硿然倒卧道上震旁之民稍柴薪之超道人聞取以爲三琴琴莫良于桐桐之良莫良于生石上石上之枯又加良焉火之餘又加良焉震之于火爲異是琴也旣良而異合爲二美天下將不可載焉微道人天下之美幾喪余作賛辭識其超之石以著其事又益以序而爲它傳辭曰惟湘之涯惟石之危龍伏之靈震焚之竒旣良而異爰合其美超實爲之賛者柳子琴賛李白嶧陽孤桐石聳天骨根老氷泉葉苦霜月斵爲緑綺徽聲粲發秋風入松萬古竒絶蒲津橋賛張說易曰利渉大川濟乎難也詩曰造舟爲梁通乎險也域中有四瀆黃河居其長河上有三橋蒲津是其一隔秦稱塞臨晉名關關西之要衝河東之輻湊必由是也其舊制橫絙百丈連艦千艘辮脩笮以維之繫圍木以距之亦云固矣然毎冬氷未合春沍初解流凘崢嶸塞川而下如礎如臼如堆如阜或摐或掍或磨或切綆斷航破無歲不有雖殘渭南之竹仆隴坻之松敗輒更之罄不供費津吏成罪縣徒告勞以爲常矣開元十有二載皇帝聞之曰嘻我其慮哉乃思索其極敷祐于下通其變使人不倦相其冝授彼有司俾鐡伐竹取堅易脆圖其始而可乆紓其終而就逸無疆惟休亦無疆惟恤於是大匠蕆事百工獻藝賦晉國之一鼓法周官之六齊飛廉煽炭祝融理爐是錬是烹亦錯亦鍜結而爲連鎻鎔而爲伏牛偶立於兩岸襟束於中潬鎻以持航牛以縶纜亦將厭水物奠浮梁又䟽其舟閒畫其鷁首必使奔凘不突積凌不隘新法旣成永代作則原夫天意有四㫖焉濟人仁也利物義也順事禮也圖逺智也仁以平心義以和氣禮以成政智以節財心平則應諧百神矣氣和則感生萬物矣政成則乂文之經矣財節則豐武之德矣故天將儲其禎地將阜其用人將盈其力聖皇之道乾乾翼翼觀藝而無窮詠功而無極重校正唐文粹卷第二十四
