body:
  text: 吳興姚鉉纂記戊揔八首興利二宣州南陵縣大農陂記韋瓘鹽池記梁肅􅁲勝三東山記張說司徒岐國公杜城郊居記權德輿君陽遯叟山居記陸希聲館舎一廬州同食館記陳鴻橋梁一汾河義橋記崔祐甫井一義井記邵眞宣州南陵縣大農陂記韋瓘宣部支邑十城而南陵處劇蓋由庶民􅅝豪物産多狀山川􅃲錯風俗詭浮故理束則民潰政放則民怠俱不得其極自非肅廉和敏措動守中則莫至良能況功利及物邪皇帝四年今地官侍郎盧公觀察宣部精心厚下重難邑長乃以寧國令順陽范君假南陵印爲大夫於是肅以撿姦廉以約身和以納民敏以應物物不夭落民得沐泰盧公甞曰時或爽候雲龍遁逃膏澤翔枯物不遂液吾人其瘁乎下令邑中有能修復陂塘積水防患者終懋厥功先時縣有廢陂曰大農積歲不理荒梗幽扈丘隰遁形空規殘狀非鄕黨之壽耋不可疑識輿人飛語他邑病能訾訾囂囂波翻風合范君獨判於心不畏騰口曰利於人也使吾獲戾而罹悔眞吾心也且黔愚皆苦於始作而泰於成功況吾君侯明吾天子聖尚何懼哉乃召鄕老里正尹而計之具畚挶列綆鍤筥礫礱堅披材輦壤日必廵丈周察􅀔便仁以撫馴恱以附來法以督姦勤以勸勞於是雲動雷斤斬莽闢蕪撥腐曝淤培高徹卑不知形疲不憚苦骨不殘民力不費金刀潛軼化工事於農􅂩三旬而畢不戮一人其始也驅江波六十里活活下來闢荒梗數萬畒汪汪虚明疊石構嶺縱三百歩龍蟠虎􅃲横殺衝波泄流引洫臂發三港支分脉散澤入大田厥功旣成乃風􅀨暴􅃲洄復換晨虺虺沸㑹似聞搆作及乎雨斬雲除則沙洲突岀力捍嶺下􅀂自開闢之初信爲神物所相雖使江河合災驚濤懷山大浸崩驅暴猛來敵亦不能軼峻防而侵厚趾斯乃天賛其功豈非仁深於物乎其或火雲􅋹天旱魃爲虐歊蒸癉怒蛟龍逭誅而翠㶑揺岸澄瀾洗月溶溶浩浩獨落天光順勢導流猶潤百里則貫畦浮塍平歲之漑千頃豈爲多哉其細也孕鱗甲之族育鳧鴈之羣羅生菰蒲蔓合菱藻漁父舟人浩歌揚檝厚生之物永永不極斯功也可以灼當世而芳千古矣昔者西門豹治鄴召公治上蔡而史氏書美顯白良能以其因水茂功利澤及物者也則大農傑跡功符天作可以論古對能豈有愧平范君尋遷御史後三年吏民益慕而願表尤功今連率范公以文行德器挺爲時賢爰領宣部仁義明舉其下聳善常推至公邑人三請於公乃曰他人有善惟恐不聞況伯氏功利如是吾豈詭故哉乃從之邑長李君乆以材能弘張其化吏民甚安之追論大農盛績因民之心以成其善志亦春秋之事也鄕將石定録事丁宗耆壽戴誠佐史章佾或叅其議或督其事洎百姓朱綸李縱田丘程㣧等􅀂干人咸請予爲記云鹽池記梁肅黃河自崑崙山東會溟漲九折廻互鹽泉各一儒者書以爲海目則郇瑕氏之地瀆流其長觀乎北浴陵阜南瀕山麓湛湛煙碧浩無春冬蒸騰雲霓出入日月亦云廣矣雖吞噏坰隧代増淳鹵而利倍農穡有殷家􅀖貿惟從山湧不加海交兩都之軌逹延萬賈之資貨是人不厭也當武后聖政務述省方鳴鑾載臨流潦旋敗洎皇明道􅀤澤漸殊垠天之旣啓鹽乃旋復非夫蟠蚪神應坤次靈孕亦曷能旌昏明籌􅀒勝矣帝􅀁冝念賁然來思分天牧以涖擇藩佐而貳賢能鮮墜于事則胤字通閈閎扼拓磯之左隅鄰大邑之東部崇府庫歲望乎儲蓄樞管鍵夕俟乎閉藏兹乃慮終於始也􅀖貴康食戒之克勤人非忘勞道在恱使大命日下廵功歲移廣岸砥平而可礪脩畦綺分以如織是時也春光奪炎氣興洪溝浚白波騰或滀或汨以泙以漰狀雲􅂥而􅀨駭或花明而雪凝京坻藴崇豆區嘉量􅈻戸徴筭鹽人掲書民無不供先薄稅以從賦君孰與足逮􅀺庶而必分固非擅權利貴貨易土登陸而雷軿流日驟水而雲艫擊星律有變給用無絶傳曰山澤林鹽國之寶也兹其是焉􅀂周物揆情易人推􅀋施之求報大道之玄德也明則啓祚聖人之知變也降人納汚明君之藏垢也羮餗調膳賢人之入用也包四美而世濟資百工而國貞將以樹善永年非石無以紀垂裕裔胃非文無以揚則我􅀳寶逹于萬方也東山記張說兵部尚書同中書門下三品修文館大學士韋公體含眞靜思叶幽曠雖翊亮廊廟而􅃡懷林藪東山之曲有别業焉嵐氣入野榛煙岀俗石潭竹岸松齋藥畹虹泉電射雲本虚吟惚恍疑夢間關忘術兹所謂丘壑夔龍衣冠巢許幸温泉之歲也皇上聞而賞之廼命掌舎設帟金吾劃次太官載酒奉常抱樂停輿輦於青靄佇翬榆於紫氛百神朝于谷口千官飲乎池上緹􅀐環山朱斾熖野縱觀空巷途歌傳壑是日即席拜公逍遥公名其居曰清虚原幽棲谷景移樂極天子賦詩王后帝女宫嬪􅀖媛歌焉和焉以寵德也加以中宫敦序謂我諸兄引内子於重幄見兒童於行殿家人之禮優棠棣之詩作於是實其筐筥下以昭忠信之獻賁其束帛上以示慈惠之思朝野歡并君臣義洽夫飛翠華歷茨嶺至道之王也紆紫綬期赤松素履之輔也千載一時難乎此遇故兩曜合舎衆星聚德雅道光華高風允塞寒谷煦景竅崖潤色猗歟盛事振古未有篆之玄石貽代厥後司徒歧國公杜城郊居記權德輿司徒歧國公以盛德相三朝以大中敷五敎帝載叶龢太階齊平旣致用於方内亦宅心於事外神京善地啓夏南出凡十有六里而仁智之居在焉縈廻巖巘左右勝勢徑術逶迤於木抄臺亭􅑬嵼於山腹下崇岡冒青蒼歩履平夷以至于堂皇四敞賔榻中容宴豆孤齋閑館幽槩隨之乃開洞穴以導泉脉其流泠泠或決或渟激而杯行瀑爲玉聲初蒙於山下終匯於池際白波淪漣繚以方塘輕艫緩棹㳂洄上下見煙霞澄霽之狀魚鳥飛沈之適濯于潺湲風于碧鮮紅葩火然素英雪翻芊緜葱蒨杳窱廻合含虚籟以四逹遡清輝而交映故其休沭燕息盍􅆪投轄則有鳴佩拖紳宗工儁人金閨玉堂之賔淑姿脩態㢠風遏雲之藝流光含睇中飲􅀏抃交歡擊節不知公相之貴適其適故也易坤之􅀃曰君子以厚德載物詩曰愷悌君子求福不回惟公以德受福故光明昌大毎温室宴見一人尊禮而不名故其代天工斷國論卓爾以冠羣后曁天暇日之戾止於斯也則暢天理棲顥氣翛然以遺萬物其無方歟其不器歟昔子房赤松之遊且非代教安石東山之賞僻在下國豈􅀂公密賛化育内諧恬曠如春之仁如樂之和以君臣之交感兼動靜之極摰從古巳還無公比焉公之華宗自漢建乎侯徙杜陵三守本封幾乎千祀故城南墟里多以杜爲名逮今郊居不忘厥􅀄又以見積厚流澤此焉回復且公之心無町畦壽􅀂岡陵昭融炟赫未始有極德輿謬陪衆君子升公之堂嘉招盛集靡間弦晦以衆美之不可以不紀也承命遽書刻于巖石云君陽遁叟山居記陸希聲遁叟以斯世方亂遺榮于朝築室陽羡之南而遁跡焉地當君山之陽東谿之上古謂之湖洑渚遁叟旣以名自命又名其山曰頤山谿曰蒙谿將以頥養􅀩昧也在易頥之象􅩢艮爲山山下有震震爲雷爲龍頥山之下東走震澤震雷魚龍之所萃毓有頥象焉蒙之象􅦰亦艮爲山山下有坎坎爲水爲險頥山之下泉流于險而逹于大谿有􅀩象焉一旦遁叟觴谿山之神於庭酌而飲頥山曰吾之所以命夫山之爲頤者勗子以養也子其養雲􅀨以潤物養霧露以生物養風霆以長物養雪霜以肅物養巨材以充棟宇養小材以爲蒸薪養茅管以爲茨籍養竹箭以爲器用養百果以充口腹養百藥以蠲札瘥養昆蟲使咸樂其生養鳥獸使各遂其性噫無或養妖雲悖􅀨以傷良稼養苦霧􅁋露以澤惡植養疾風迅霆以摧槁朽養慘霜虐雪以殺根荄養擁腫之朴不爲榦材養鈎􅁄之蘖不中樵爨養蔓延之藟以困條柯養蟠梗之根以固膏土養弗食之實以蕃庶生養雜毒之藥以中函氣養蟒虺蜂蜴以護巢窟養豺狼梟獍以害羣􅀋維山有神子其飲之無虧爾名而窽爾實又酌而飲􅀩谿曰吾所以命夫谿之爲蒙者勗子以決也子其決於夷壤以發其源決於塞埴以通其流決於􅃾畒以施其潤決於涸澤以溥其惠決於廣陂使介鱗蕃育決於巨浸使虯龍變化噫無或決於險阻以資其悍激決於林藪以縱其墊溺決於舄鹵以嗇其施決於池籞以專其利決於甽竇使黽蟹爲菑決於沮洳使鼃黽得志維谿有神子其飲之無䘮爾名而浮爾實於是酌而自飲之吾之所以命是山也必將有所飬也命是谿也亦將有所決也吾將養吾志於道而不希於世飬吾行於德而不眩於俗養吾浩然之氣以合自然之英飬吾誠明之意以入清明之頥又將決吾心於仁義使不違決吾志於中正使不過決吾身於天命使不憂決吾跡於遁世使無悶如此而已遂與山谿揖讓竭吾歡而罷弁且歌曰山乎谿乎吾之心乎醒乎醉乎吾與汝叅乎廬州同食館記陳鴻合肥郡城南門東上曰同食舘梁柱朽蠧軒戸欹傾斷枅委階椽落棟折風􅀨雪霜賔不可宿太守陽平路君刺郡之明年冬十月歲向熟民且閑陶瓦于原代木于山磨舊礎築新墉廼豐賔堂廼峩前軒怒桷虯虯層櫨牙牙中回洞深高簷騰掀階閒容揖讓楹閒容賔盤柱閒容樂工屏閒容將吏左右爲寢室更衣之所朱戸素壁㓗而不華東西廂􅃨廊直澍又西開下閤作饔舎廐屋宏大中敞作南門容旌旗駟馬北上作丁字亭亭北列朱檻面城墉其下淤溝開導通水因古岸植竹樹爲風月宴遊地東南自會稽朱方宣城楊州西逹蔡汝陸行抵京師江淮牧守三臺郎吏出入多遊郡道是館成大賔小賔皆有次舎開元中江淮間人走崤函合肥壽春爲中路大曆末蔡人爲賊是道中廢元和中蔡州平二京路復出于廬西江自白沙􅀲歩至于大梁斗門堰埭鹽鐵稅緡諸侯㰌利駢指于河故衣冠啇旅率皆直蔡會洛道路不茀賔至授館亦諸侯之事路君以家行文學知於朋友以端方沈黙官御史府以詳明典故爲尚書郎以通知政術爲合肥郡太守質平訛心風俗丕變民知敬道吏不敢欺先時郡米數萬石輸楊州軸轤相繼出巢湖入大江歲爲風波沈溺者半廼於湖東北岸槖臯里作廥廪三十九間州東二邑人米輸於此由申港出新婦江至白沙人不勞水無害復他邑館舎次于同食無私利人人皆樂成昔左丘明傳經因事書事鴻因蔡州道及諸侯之稅因同食館及路君之政亦春秋之旨傳曰自廬已往賑廪同食大和三年太歳己酉正月壬午朔二十日辛丑記汾河義橋記崔祐甫絳人有成橋于稷山縣南汾河水上入境稱曰孝子詢之三十䘮父母五十由纕麻故其鄕黨捨氏不名貴之也􅀄兹縣有具舟之役鄰邑有官修之梁自太原西河上黨平陽至于絳逹于雍繇卒迫程賈人射利濟舟爲捷渡口如肆孝子川上喟然歎曰夫來者如斯其可勝記欲速不逹式在兹乎見義不爲非勇也臨難不濟非義也廼願棄家乞諸他郡枯槁籃縷日􅁪歲積自阿關而東陶唐儉風食貨艱難閭里􅄶小率令逺驟馳邇饋飴耆耋喻美於編戸丁男捨耒而攻木義聲感也汾流湯湯河滸牽射隤沙徙岸呀呷轉騰畚築於激射之旁根柱於沸渭之下是慮是圖功就其十八九矣其年秋七月天作􅁋􅀨湍悍襄陵噫大水不仁前功蕩矣邑老鄉人涕泗弔之曰力竭於子天不恤是而已矣顧而不應且有後圖徵詩人之嘉謀叅作者之逺慮曵索辮蔑縶舟戾航白露下而謀始止於凌澌杜春冰解而興功止於水潦降一嘆不可奪志三年其有成功廣可方軌平可轉轂去其飾成無丹雘取其固勢異虹蜺僉義於孝子之功也故曰義橋昔周王以懿戚封建吳札美盛德遺人西臨孟津北對姑射山河風土其肯徒然所以義表顓門功烈鄰境難其一善矧乃兼之由是縣人志之于石義井記邵眞義以發􅂨形外昭施物也井以下汲上導彰濟人也河間公鑿井於城垣之次陽門通莊之右偏署曰義正哉導之深源經之善利庇彼􅃉宇達于交衢鐡其瓶以永不羸石其甃以給無泥飛輪周散泄竇前注泙而平之隨用不私主發生以流潤當赫曦以伏炎在摇落而激清抵凝沍而不閉環四序以其惠俾憧憧者知飲濯所向焉薎燠暍之虞濟煩乏之艱昏懵者得以濤盪瘵痗者由之蠲愈滌汰氛坌沃洒蒸灼淡然下攻與地配乆化􅅝闇爲閑敝鄰􅆊宫之清淨修廊對開連樓鬱峙嘯貞侣以宴息速嘉客以盥漱指心而授應日而就彼豐福吉禄繁祉崇慶欲不萃於河間之門得乎故北寺司刑上􅀸也西臺專席中丞也戎府佐政司馬也叅貳外閫顯榮當朝騫騫青冥前視萬里鑿井爲濟川之漸斲輪爲秉軸之兆可轉眄而待矣公才蔚量碩質貞氣淳名膺王府心拂塵累料物以經逺恤人以遂誠廻俸節財蕆事彰義將獻祉于大君貢休于元戎歸壽于高堂三事體大公之弘誓乃戒司翰者書實刋記掲于井外大曆六年三月記重校正唐文粹卷第七十五嘉靖甲申歳太學生姑蘇徐焴文明刻于家塾
