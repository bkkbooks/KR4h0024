悲東國麋鹿泣姑蘇誰見鴟夷子扁舟去五湖聖人去已乆公道緬良難蚩蚩夸毗子堯禹以為謾驕榮貴工巧勢利遞相干燕王尊樂毅分國願同歡魯連讓齊爵遺組去邯鄲伊人信往矣感激為誰歎幽居觀大運悠悠念羣生終古代興没豪聖莫能爭三季淪周赦七雄滅秦嬴復聞赤精子提劒入咸京炎光既無象晉魯復縱横堯禹道已昧昬虐勢方行豈無當世雄天道與胡兵咄咄安可言時醉而未醒仲尼溺東魯伯陽遁西溟大運自古來旅人胡歎哉逶迤世已乆骨鯁道斯窮豈無感激者時俗頹此風灌園何其鄙世道不相容皎皎於陵子嗟嗟張長公聖人不利已憂濟在元元黄屋非堯意瑶臺安可論吾聞西方化清淨道彌敦奈何窮金玉雕刻以為尊雲構山林盡瑶圖珠翠頰鬼功尚未可人力安能存夸愚適增累矜智道逾昬𤣥天幽且黙羣議曷嗤嗤聖人教猶在世運乆陵遟一繩將何繫憂醉不能持去去行采芝勿為塵所欺蜻蛉遊天下與世本無患飛飛未能止黄雀來相干穰侯富秦寵金石比交歡出入咸陽裏諸侯莫敢言寧知山東客激怒秦王肝布衣取丞相千載為辛酸微霜知嵗晏斧柯始青青况乃金天夕浩露霑羣英登山望宇宙白日已西溟雲海方蕩潏孤鱗安得寧翡翠巢南海雄雌珠樹林何如美人意驕愛比黄金殺身炎州裏委羽玉堂隂旖旎光首飾葳蕤爛錦衾豈不在遐逺虞羅忽見尋多材信為累歎息此珍禽挈瓶者誰子妖服當青春三五明月滿盈盈不自珍髙堂委金玉微縷懸干鈞如何負公鼎被奪笑時入𤣥蟬號白露兹嵗已蹉􅋸羣物從大化孤英將奈何瑶臺有青鳥逺食玉山禾崐崘見𤣥鳯豈復虞雲羅荒哉穆天子好與白雲期宫女多怨曠層城閉蛾眉日耽瑶池樂豈傷桃李時青苔空萎絶白髪生羅帷朝發宜都渚浩然思故鄉故鄉不可見但見巫山陽巫山彩雲没髙丘正微茫佇立望已乆涕淚霑衣裳豈兹越鄉感憶昔楚襄王朝雲無處所荆國亦淪亡昔日章華宴荆王樂荒滛霓旌翠羽蓋射兕雲夢林朅來髙唐觀悵望雲陽岑雄圖今何在黄雀空哀吟丁亥嵗云暮西山事甲兵贏糧匝卭道荷㦸爭羌城嚴冬隂風勁窮岫油雲生昬黷無晝夜羽檄復相驚拳跼競萬仞崩危逺九冥藉藉峯壑裏哀哀冰雪行聖人御宇宙聞道太階平肉食發何失蔾藿緬縱横可惜瑶臺樹灼灼佳人姿碧華映朱實攀折青春時豈不盛光寵榮君白玉墀但恨紅芳歇凋傷感所思朅來豪遊子勢利禍之門如何蘭膏歎感激自生寃衆趨明所避時棄道猶存雲淵既已失羅網與誰論箕山有髙節湘水有清源唯應白鷗鳥可為洗心言索居獨幾日炎夏忽然衰陽彩皆隂翳親友盡暌違登山望不見涕泣乆漣洏宿夢感顔色若與白雲期世中驕豪子驅逐正蚩蚩蜀山與楚水擕手在何時金鼎合神丹世人將見欺飛飛騎羊子胡乃在蛾眉變化固幽類芳菲能幾時疲痾苦淪世憂痗日侵淄眷然顧幽褐白雲空涕洟朔風吹海樹蕭條邊已秋亭上誰家子哀哀明月樓自言幽燕客結髪事逺遊赤丸殺公吏白刃報私讎避仇至海上被役此邊州故鄉三千里遼水復悠悠每憤胡兵入常為漢國羞何知七十戰白首未封侯本為貴公子平生實愛才感時思報國拔劒起蒿萊西馳丁零塞北上單于臺登山見千里懐古心悠哉誰言未忘禍磨没成塵埃浩然坐何暮吾蜀有峨眉念與楚狂子悠悠白雲期時哉悲不㑹涕泣乆漣洏夢登綏山穴南采巫江芝探元觀羣化遺世從雲螭婉孌時永矣感悟不見之朝入雲中郡北望單于臺胡秦何宻邇沙朔氣雄哉藉藉天驕子猖狂已復來塞垣無名將亭堠空崔嵬咄嗟吾何歎邊人塗草萊仲尼探元化幽鴻順陽和大運自盈縮春秋遞來過盲飈忽號怒萬物相紛劘溟海皆震蕩孤鳯其如何感遇七首張九齡蘭葉春葳蕤桂華秋皎絜欣欣此生意自爾為佳節誰知林棲者聞風坐相悦草木有本心何求美人折幽林歸獨卧滯慮洗孤清持此謝髙鳥因之傳逺情日夕懐空意人誰感至精飛沉理自隔何所慰吾誠魚遊樂深池鳥棲欲髙枝嗟爾蜉蝣羽薨薨亦何為有生豈不化所感奚若斯神理日微滅吾心安得知浩歎楊朱子徒然泣路岐孤鴻海上來池潢不相顧側見䨇翠鳥巢在三珠樹矯矯珍木巔得無金丸懼美服患人指髙明逼神惡今我遊冥冥弋者何所慕吳越數千里夢寐今夕見形骸非我親衾枕即鄉縣化蝶猶不識川魚安可羡海上有仙山歸期覺神變抱影吟中夜誰聞此歎息美人適異方庭樹銜幽色白雲愁不見滄海飛無翼鳯凰一朝來竹花此可食漢上有游女求思安可得袖中有書札欲寄雙飛翼冥冥獨不見耿耿徒緘憶紫蘭秀空蹊皓露奪幽色馨香嵗欲晩感歎情何極白雲在南山日暮長太息感遇權徳輿殘雨倦欹枕病中時序分秋蟲與秋葉一夜隔窻聞虛室對摇落晤言無與羣冥心試觀化世故如絲棼但看鳶戾天豈見山出雲下俚徒繫節朱絃祕南薰椅梧秀朝陽上有威鳯文終待九成奏來儀瑞吾君效陳拾遺子昻感遇二首司空圖髙燕飛何捷啄害恣羣鶵人豈玩其暴華軒容爾居强欺自天稟剛吐信吾徒乃知不平者矯世道終孤陽和含煦潤卉木競紛華當為衆所悦私已汝可誇北里祕穠豔東園鎻名花豪奪乃常理笑君徒咄嗟古意二首擬梓州陳拾遺孫郃屈子生楚國七雄知其材介絜世不容跡合藏蒿萊道廢固命也瓢飲亦賢哉何事𦵏江魚空使後人哀魏禮段干木秦王乃止戈小國有其人大國奈之何賢哲信為美兵甲豈云多君子戰必勝斯言聞孟軻詠史十一首李華日照崐崘上羽人披羽衣乘龍駕雲霧欲往心無違此山在西北乃是神仙國靈氣皆自然求之不可得何為漢武帝精意徧羣山靡費巨萬計宫車終不還蒼蒼茂陵樹足以戒人間天生忠與義本以佐雍熙何意李司􅝗而當昬亂時古墳襄城野斜徑横秋陂况不禁樵採茅莎無孑遺髙標尚可仰精爽今何之一忤中常侍銜冤誰見知常觀黨錮傳撫巻不勝悲文侯耽鄭衛一聽一忘飱白雪燕姬舞朱絃趙女彈淫聲流不返惂蕩日無端獻嵗受朝時鳴鐘醼百官兩牀陳管磬九奏殊未䦨對此唯恐卧更能整衣冠漢皇脩雅樂乘輿臨太學三老與五更天王親割牲一人調風俗萬國和且平單于驟款塞武庫欲銷兵文物此朝盛君臣何穆清至今壝壇下如聞簫韶聲蜀主相諸葛功髙名亦尊馳驅十萬衆怒目瞰中原曹伯任公孫國亡身不存社宫乆蕪没白鴈猶飛翻勿言君臣合可以濟黎元為蜀諒不易如曹難復論秦滅漢帝興南山有遺老危冠揖萬乘幸得厭征討當君逐鹿時臣等已枯槁寧知市朝變但覺泉石好髙卧三十年相看成四皓帝言翁甚善見顧何不早咸稱太子仁重義亦尊道側聞驪姬事申生不自保蹔出商山雲朅來趨灑掃東宫成羽翼楚舞傷懐抱後代無其人戾園滿秋草六國韓最弱末年尤畏秦鄭生為韓計且欲疲秦人利物可分社原情堪滅身咸陽古城下萬頃稻苗新昻藏獬豸獸出自太平年亂代乃濳伏縱人為禍愆常聞斷馬劒每壯朱雲賢身死名不滅塞風吹墓田精靈如有在幽憤滿松烟沂水春可涉泮宫映楊葉麗色異人間珊珊摇珮環展禽􅁪獨處深巷生禾黍城上飛春雲城中暗春雨適來鳴珮者復是誰家女泥沾珠綴履雨濕翠毛簪電影開蓮臉雷聲飛蕙心自言沂水曲采蘋兼采菉歸逕雖可尋天隂光景促憐君真且獨願許君家宿徒勞惜衾枕子不顧雙蛾豔質誠可重滛風如禮何周王惑褒姒城闕成陂沲巢許在嵩潁陶唐不得臣九州尚洗耳一命安能親緜邈數千祀丘中誰隱淪朝遊公卿府夕是山林人蒲帛楊仄陋薜蘿為搢紳九重念入夢三事思降神且設庭中燎寧窺泉下鱗漢時征百越楊僕將樓舩幕府功未立江湖已騷然島夷非敢亂政暴地仍偏得罪因懐璧防身輒控弦三軍求裂土萬里詎聞天魏闕心猶在旗門首已懸如何得良吏一為制方圓詠史一首髙適尚有綈袍贈應憐范叔寒不知天下士猶作布衣看詠史二首釋皎然田氏門下客馮公衆中賤一朝市義還百代名獨擅始知下客不可輕能使主人功業成借問髙車與珠履何如貧賤一書生獨負髙世姿冥冥寄浮俗卞子去不歸何人識荆玉鬻舂意不淺汚跡身豈辱鸞鎩樂迍邅蚪蟠甘窘束五噫譎且正可以見心曲詠史二首劉禹錫驃騎非無勢少卿終不去世道劇頽波我心如砥柱賈生明王道衛綰工車戲同遇漢文時何人居髙位詠史四首盧照鄰昔有平林男姓朱名阿游直髪上衝冠壯氣横三秋願得斬馬劒先斷佞臣頭天子玉檻折將軍丹血流捐生不肯拜視死其若休歸來教故里蒙童逺相求弟子數百人散在十二州三公不敢吏五鹿何能酬名與日月懸義與天壤儔何必疲執㦸區區在封侯偉哉曠達士知命固不憂季生昔未達身辱功不成髠鉗為臺􅝗灌園變姓名幸逢滕將軍兼遇曹丘生漢祖廣招納一朝拜公卿百金孰云重一諾良匪輕廷議斬樊噲羣公寂無聲處身孤且直遭時坦而平丈夫當如此唯唯何足榮大漢昔云季小人道遂振玉帛委閽尹斧鑕嬰搢紳邈哉郭先生巻舒得其真雍容謝朝廷談笑奬人倫在晦不絶俗處亂不為親諸侯不得友天子不得臣冲情甄墮甑重價折角巾悠悠天下士相送洛橋津誰知仙舟上寂寂無四鄰公業負奇志交結盡才雄良田四百頃所食常不充一為侍御史慷慨説何公何公何為敗吾謀適不同仲頴恣殘忍廢誠良在躬死人如亂麻天子如轉蓬干戈及黄屋荆棘生紫宫鄭生運其謀將以清國戎時來命不遂脱身歸山東凛凛千載下穆然懐清風讀李斯傳曹鄴欺暗常不然欺明當自戮難將一人手掩得天下目出闗作魏徴中原初逐鹿投筆事戎軒縱横計不就慷慨志猶存杖䇿謁天子驅馬出闗門清纓繫南越慿軾下東蕃鬱紆陟髙岫出没望平原古木吟寒鳥空山啼夜猨既傷千里目還驚乆逝魂豈不憚艱險深懐國士恩季布無二諾侯嬴重一言人生感意氣功名誰復論隴右途中遭非語員半千趙有兩毛遂魯聞二曽參慈母猶且惑况在行路心冠冕無醜士賄賂成知巳名利我所無清濁誰見理敝服空逢春緩帶不著身出遊非懐璧何憂乎忌人正須自保愛振衣出世塵
