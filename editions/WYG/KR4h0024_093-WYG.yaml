body:
  text: 唐著作佐郎顧況文集序皇甫湜唐太常寺協律郎李賀歌詩序杜牧唐四門助教歐陽詹文集序李貽孫唐太子校書李觀文集序陸希聲唐揚州功曹蕭頴士文集序李華唐崔公山池後集序李翰唐東臯子集序吕才刪東臯子集序陸淳唐中嶽宗元先生吳筠尊師文集序權徳輿唐釋靈澈上人文集序劉禹錫篋中集序元結唐容州經畧使元結文編後序李商隠樊川文集後序裴延翰毗陵集後序梁肅題栁栁州集後司空圖唐大理評事楊君文集後序栁宗元注愍征賦後述司空圖唐故著作佐郎顧況集序皇甫湜吳中山泉氣状英淑怪麗太湖異石洞庭朱實華亭清唳與虎丘天竺諸佛寺鈎綿秀絶君出其中間翕輕清以為性結泠汰以為質喣鮮榮以為詞偏於逸歌長句駿發踔厲往往若穿天心出月脇意外驚人語非尋常所能及最為快也李白杜甫已死非君将誰與哉君字逋翁諱況以文入仕其為人類其詞章嘗從韓晉公於江南為判官驟成其磊落以績入佐著作不能慕順為衆所排為江南郡丞累嵗脱縻無復北意起屋於茅山意飄然若将續古三仙以九十夀卒湜以童子見君揚州孝感寺君披黄衫白絹􅀈頭眸子瞭然烱烱清立望之真白圭振鷺也既接歡然以我為揚雄孟軻顧恨不及見三十年於兹矣知音之厚曷常忘諸去年從丞相涼公襄陽有曰顧非熊生者在門訊之即君之子也出君之詩集二十巻泣請予發之涼公適移蒞宣武軍余装歸洛陽諾而未副今又稔矣生来速文乃題其集之首為序唐太常寺奉禮郎李賀歌詩集序杜牧太和五年十月中半夜時舎外有疾呼傳緘書者某曰必有異亟取火来及發之果集賢學士沈公子明書一通曰我亡友李賀元和中義愛甚厚日夕相與起居飲食賀且死嘗授我平生所著歌詩雜為四編凡若干首數年來東西南北良為已失去今夕醉解不復得寐即閲理篋帙忽得賀詩前所授我者思理往事凡與賀話言嬉遊一處所一物候一日夕一觴一飯顯顯焉無有忘棄者不覺出涕賀復無家室子弟得以給養䘏問常恨想其人詠其言止矣子厚於我與我為賀集序盡道其所來由亦少解我意某其夕不果以書道不可明日就公謝且曰世謂賀才絶出前讓居數日某深惟公曰公於詩為深妙奇博且復盡知賀之得失短長今實叙賀不讓必不能當君意如何復就謝極道所不敢叙賀公曰子固若是是當慢我某因不敢辭勉為賀叙然其甚慙唐皇諸孫賀字長吉元和中韓吏部亦頗道其歌詩雲烟綿聮不足為其態也水之迢迢不足為其情也春之盎盎不足為其和也秋之明潔不足為其格也風檣陣馬不足為其勇也瓦棺篆鼎不足為其古也時花美女不足為其色也荒國陊殿梗莽丘隴不足為其恨怨悲愁也鯨呿鼇擲牛鬼蛇神不足為其虚荒誕幻也盖騷之苗裔理雖不及辭或過之騷有感怨刺懟言及君臣理亂時有以激發人意乃賀所為無得有是賀能探尋前事所以深歎恨今古未嘗經道者如金銅仙人辭漢歌補梁庾肩吾宫體謡求取情状離絶逺去筆墨畦逕間亦殊不能知之賀生二十七年死矣世皆曰使賀且未死少加以理奴僕命騷可也賀死後凡十五年京兆杜某為其序唐故四門助教歐陽詹文集序李貽孫歐陽君生於閩之里幼為兒孩時即不與衆童親狎行止多自處年十許嵗里中無愛者每見江濵山畔有片景可採心獨娛之常執巻一編忘歸於其間逮風月清暉或暮而尚留窅不能釋不自知所由盖其性所多也未甚識文字隨人而問章句忽有一言契於心移日自得長吟髙嘯不知其止也父母不識其志每常謂里人曰此男子未知其㫖何如要恐不為汨沒之餓氓也未知為吉邪凶邪鄉人有覽事多而熟於聞見者皆賀之曰若此家寳也奈何慮之過歟自此遂日知書服聖人之教慕愷悌之化達君臣父子之節忠孝之際惟恐不及操筆屬詞其言秀而多思率人所未言者君道之甚易由是振發於鄉里之間建中貞元時文詞崛興遂大振耀甌閩之鄉不聞有他人也㑹故相常衮來為福之觀察使有文章髙名又性頗嗜誘進後生推㧞於寒素中惟恐不及至之日比君為芝英每有一作屢加賞進遊娛燕饗必召同席君加以謙儒動不踰節常公之知又日深矣君之聲漸騰於江淮且達於京師矣時人謂常公能識真尋而陸相贄知貢舉搜羅天下文章得士之盛前無其倫故君名在牓中常與君同道而相上下者有韓侍郎愈李校書觀洎君並數百嵗傑出人到於今伏之君之文周詳切於情故叙事重複宜其掌代文柄以變風雅一命而卒天其絶乎君於貽孫言舊故之分於外氏為一家矣故其屬文之内多為予伯舅所著者有南陽孝子傳有韓城縣尉㕔壁記有與鄭居方書皆可徵於集故予沖幼之嵗也拜君於外家之門太和中予為福建團練副使日其子價自南安抵福州進君之舊文共十編首尾凡若干首泣拜請序予以諾其命矣而詞竟未就價㣲有文又早死大中六年予又為觀察使令訪其裔因獲其孫曰澥不可使歐陽氏之文遂絶其所傳也為題其序亦以卒後嗣之願云唐太子校書李觀文集序陸希聲貞元中天子以文化天下天下翕然興於文文之尤髙者李元賔觀韓退之愈始元賔舉進士其文稱居退之之右及元賔死退之之文日益髙今之言文章元賔反出退之之下論者以元賔早世其文未極退之窮老不休故能卒擅其名予以為不然要之所得不同不可以相上下者文以理為本而辭質在所尚元賔尚於辭故辭勝其理退之尚於質故理勝其辭退之雖窮老不休終不能為元賔之辭假使元賔後退之之死亦不能及退之之質此所以不相見也夫文興於唐虞而隆於周漢自明帝後文體寖弱以至於魏晉宋齊梁隋嫣然華媚無復筋骨唐興猶襲隋故態至天后朝陳伯玉始復古制當世髙之雖博雅典實猶未能全去諧靡至退之乃大革流弊落落有老成之風而元賔則不古不今卓然自作一體激揚發越若絲竹中有金石聲每篇得意處如健馬在御蹀蹀不能止其所長如此得不謂之雄文哉自廣明䘮亂天下文集畧盡予得元賔文於漢上惜其恐復磨滅因條次為三編論其意以冠於首大順元年十月日給事中陸希聲序唐揚州功曹蕭頴士文集序李華開元天寳間詞人以徳行著於時者曰河南元君徳秀趙郡李華為碣以文學著於時者曰蘭陵蕭頴士字茂挺梁國鄱陽忠烈王之後曽祖某官大父某官考諱某莒縣丞咸有位不至尊君七嵗能誦數經背碑覆局十嵗以文章知名十五譽滿天下十九進士擢第歴金壇尉桂州㕘軍秘書正字河南㕘軍辭官避地江左永王修書請君遁逃不與相見淮南連帥表君為揚州功曹相國諸道租庸使第五琦請君為介君以先世寄殞嵩濮因之遷祔終事至汝南而沒春秋若干嗚呼天下儒林為之憔悴君為金壇尉也㑹官不成為揚州㕘軍也丁家艱去官為正字親故請君著書未終篇御史府以君為慢官離局奏謫罷職為河南㕘軍僚屬多嫉君才名上司以吏事責君君拂衣渡江遇天下有故其髙節深識皎皎如此君謂六經之後有屈原宋玉文甚雄壮而不能經厥後有賈誼文詞詳正近於理體枚乗司馬相如亦瓌麗才士然而不近風雅揚雄用意頗深班彪識理張衡宏曠曹植豐贍王粲超逸嵇康標舉此外皆金相玉質所尚或殊不能備舉左思詩賦有雅頌遺風干寳著論近乎王化根源此外皆夐絶無聞近日陳拾遺文體最正以此而言見君述作君以文章制度為己任時人咸以此許之不幸沒於旅次有文十卷行於世其篇目雖存章句遺逸古所謂有其義而無其辭者也是後之為文者取以為法焉今海内至廣人民至衆求君之比不可復得難乎哉君有子一人曰存為蘇州常熟縣主簿雅有家風知名於世以華平生最深見託為序力疾直書云爾崔公山池後集序李翰崔公吏於華葉再黄矣士之才也天髙其興益之以小山焉山臨清池峭絶孤踊岑無一仞波無一勺而洲嶼縈帶巒崖盤鬱則巫廬衡霍不出於庭間矣若其琴幌朝開書堂晩清緑筠森疎下見松雪登蕙蘭之徑調瓊瑶之章則雍雍詠歌盡在丹壁又與一二文士以吟以賦謂之後集焉東臯子集序吕才君姓王氏諱績字無功太原祁人也髙祖晉穆公自南歸北始家河汾焉歴宋魏迄於周隋六世冠冕國史家牒詳焉君性好學博聞强記與李播陳永吕才為莫逆之交隂陽厯數之術無不洞曉大業末應孝悌亷絜舉射髙第除秘書正字君性簡放飲酒至數斗不醉常云恨不逢劉伶與閉户轟飲因著醉鄉記及五斗先生傳以類酒徳頌云雅善鼓琴加減舊弄作山水操為知音者所賞髙情勝氣獨步當時及為正字端簮理笏非其好也以疾罷乞署外職除揚州六合縣丞君篤於酒徳頗妨職務時天下亂藩部法嚴屢被勘劾君歎曰羅網髙懸去将安所遂出所授俸錢積於縣城門前託以風疾輕舟夜遁隋季版蕩客逰河北去還龍門武徳中詔徵以前揚州六合縣丞待詔門下省時省官例日給良醖三升君第七弟靜為武皇千牛謂曰待詔可樂否君曰吾待詔禄俸殊為蕭瑟但良醖三升差可戀爾待詔江國公君之故人也聞之曰三升良醖未足以絆王先生判曰給王待詔一斗時人號為斗酒學士貞觀初以足疾罷歸欲定長往之計而困於貧貞觀中以家貧赴選時太樂有府史焦革家善醖酒冠絶當時君苦求為太樂丞選司以非士職不授君再三請曰此中有深意且士庶清濁天下所安不聞荘周避漆園老􅅨恥柱下卒授焉數月而焦革死妻袁氏時送美酒嵗餘袁又死君歎曰天迺不令吾飽美酒遂挂冠歸田自是太樂丞為清流君後追述焦革酒經一卷其術精悉兼採杜康儀狄以來善為酒人為酒譜一卷太史令李淳風見而悦之曰王君可謂酒家之南董君歴職皆以好酒鄉里或咍之因著無心子以喻志河汾中先有渚田十數頃稱良沃鄰渚又有隠士仲長子光服食養性君重其貞素顧與相近遂結廬河渚縱意琴酒慶弔禮絶十有餘年河渚東南隅有連沙磐石地頗顯敞君於其側遂為杜康立廟嵗時致祭以焦革配焉貞觀中京兆杜松之清河崔公善繼為本州刺史皆請與君相見君曰奈何悉欲坐召嚴君平竟不見崔杜髙君調趣卒不敢屈但嵗時贈以美酒鹿脯詩書徃來不絶君又葛巾聮牛躬耕東臯每著書自稱東臯子晩嵗醉飲無節鄉人或諫止之則笑曰汝輩不解理正當然或乗牛駕驢出入郊郭止宿酒店動經嵗月往往題詠作詩好事者録之諷詠並傳於代貞觀十八年終於家時年若干臨終自剋死日遺令薄𦵏兼預自為墓誌所著詩賦並多散逸鳩訪未畢且緝成五巻又著㑹心髙士傳五巻酒譜二巻及注老子並别成一家不列於集云刪東臯子集序陸淳淳聞於師曰秉仁義立好惡方之内者也等是非遺物我方之外者也㝠内而逰外聖人也聖人吾不得見之矣方内者時有焉其惟方外之徒莫得而測也豈踐跡之道易忘言之理難邪将羣於人而内自得邪何乃荘叟之後緜歴千祀幾於是道者余得之王君焉心與物㝠徳不外蕩隨變而適即分而安忘所拘而迹不害教遺其累而道不絶俗故有陶公之去職言不怨時有阮氏之放情行不迕物曠哉淵乎真可謂樂天之君子者矣生於隋季人莫之知故其遺文髙跡不顯余每覽其集想見其人恨不同時得為忘形之友故祛彼有為之詞全其懸解之志庶乎死而可作無愧異代之知音爾其祖宗之由出處之行前序備矣此不復云唐中嶽宗元先生吳尊師集序權徳輿道之於物無不由也無不貫也而況本於𤣥覽發為至言言而藴道三辰之麗天百嘉之麗地平夷章大恬淡温粹飄飄然軼八紘而泝三古與造物者為徒其不至者遣言則華涉理則泥雖辯麗可嘉采真之士不與也宗元先生吳君其知言者歟先生諱筠字貞節華隂人生十五年篤志於道與同術者隠於南陽倚帝山閎覽古先遐蹈物表芝耕雲卧聲利不入天寳初𤣥纁鶴書徵至京師用希夷啟沃脗合𤣥聖請度為道士宅於嵩丘乃就馮尊師齊整受正一之法初梁貞白陶君以此道授昇𤣥王君自王君至先生凡五代矣皆以隂功救物為王者師十三年召入大同殿尋又詔居翰林𤣥宗在宥天下順風祈嚮乃獻𤣥綱三篇優詔嘉納志在遐舉累章乞還以禽魚自況藪澤為樂得請未幾盜泉汗于三川羽衣虚舟泛然東下棲匡廬登㑹稽浮淛河息天柱隠機埋照順吾靈龜有時放言以暢天理且以園公歌詠於紫芝𢎞景怡悦於白雲故屬詞之中尤工比興觀其自古王化與詩大雅吟步虚詞逰仙雜感之作或遐想理古以哀世道或磅礴萬象用㝠環樞稽性命之紀達人事之變大率以嗇神挫鋭為本至於奇彩逸響琅琅然若戛雲璈而凌側景崑閬松喬森然在目追近古㳺方外而言六義者先生實主盟焉至若總論谷神之妙則有𤣥綱哀蓬心蒿目之逺於道也則有神仙可學論疏瀹澡雪使無落吾事則有洗心賦巖棲賦修胷中之誠而休乎天均則有心目論契形神頌其他抗章寓書賛美序别非道不言言而可行泊然以㣲妙卓爾而昭曠合為四百五十篇博大真人之言盡在是矣大厯十三嵗嵗直鶉首止於宣城道觀焚香返真於虚室之中門弟子邵兾𤣥者率籲其徒寧神於天柱西麓從其命也太原王顔常悦先生之風採道也熟自先生化去三嵗顔為御史中丞類斯遺文為三十篇拜章上獻藏在秘府兾𤣥者偏得先生之道如槁木止水刳心遺形自先生化去二十五嵗以其文編請傳永乆其有逍遥卓詭之論猶不列於此至若挺神奇袪鬼怪告鍊蜕之地合肹蠁之符皆備於刻金石者之説今徒采獲斯文以序崖畧且俾後學知道者必知言云唐釋靈澈上人文集序劉禹錫釋子工為詩尚矣休上人賦别怨約法師哭范尚書咸為當時才士之所傾歎厥後比比有之上人生於㑹稽本湯氏子聰察嗜學不肯為凡夫因辭父兄出家號靈澈字源澄雖授經論一心好篇章從越客嚴維學為詩遂籍籍有聞維卒乃抵吳興與長老詩僧皎然㳺講益至皎然以書薦于詞人包侍郎佶包得之大喜又以書致于李侍郎紓是時以文章風韻主盟于世者包李以是上人之名由二公而颺如雲得風柯少葉張以文章接才子以禪理悦髙人風儀甚雅談笑多味貞元中西逰京師名振輦下緇流嫉之造飛語激動中貴人侵誣得罪徙汀州入㑹稽歸東越時吳楚間諸侯多賔禮招迓之元和十一年終於宣州開元寺七十有一門人遷之建塔於越之山隂天柱峯之陲從本教也初上人在吳興居柯山與晝公為侣皎然字晝時以字行時予方以兩髦執筆硯陪其吟詠皆曰孺子可教後相遇於京洛與交許之契焉上人歿後十七年予為吳郡其門人秀峯捧先師之文來乞辭以志且曰師嘗在吳賦僅二千首今刪取三百篇勒為十巻自大厯至元和凡五十年間接詞客文人訓唱别為十卷今也思行乎昭世求一言羽翼之因為許曰世之言詩僧多出江左靈一導其源䕶國襲之清江揚其波法振㳂之如么弦孤韻瞥入人耳非大樂之音獨吳興晝公服備衆體晝公後澈公承之至如芙蓉園新寺詩云經來白馬寺僧到赤烏年謫汀州云青蠅為弔客黄犬寄家書可謂入作者閫域豈獨雄於詩僧間邪篋中集序元結元結作篋中集或問曰公所集之詩何以訂之對曰風雅不興幾及千嵗溺於時者世無人哉嗚呼有名位不顯年夀不終獨無知音不見稱頌死而已矣誰云無之近世作者更相㳂襲拘限聲病喜尚形似且以流易為辭不知䘮於雅正然哉彼則指詠時物㑹諧絲竹與歌兒舞女生汙惑之聲於私室可矣若令方直之士大雅君子而誦之則未見其可矣吳興沈千運獨挺於流俗之中强攘於己溺之後窮老不惑五十餘年凡所為文皆與時異故朋友後生稍見師效能似類者有五六人於戲自沈公及二三子皆以正直而無禄位皆以忠信而乆貧賤皆以仁讓而至䘮亡異於是者顯榮當世誰為辯士吾欲問之天下兵興於今六嵗人皆務武斯焉誰嗣已長逝者遺文散失方阻絶者不見近作盡篋中所有總編次之命曰篋中集且欲傳之親故兾其不亡於今凡七人詩二十二首時乾元三年也唐容州經畧使元結文集後序李商隠次山有文編有詩集有元子三書皆自為之序次山見譽於弱夫蘇氏始有名見取於公浚陽公始得進士第見憎於第五琦元載故其将兵不得授作官不至達母老不得盡其養母喪不得終其哀間二十年其文危苦激切悲憂酸傷於性命之際自占心經已下若干篇是句外曽孫遼東李惲辭收得之聚為元文後編次山之作其緜逺長大以自然為祖元氣為根變化移易之太虚無状大賁無色寒暑攸出鬼神有職南斗北斗東龍西虎方嚮物色欻何從生啞鍾復鳴黄雉變雄山相朝捧水信潮汐若大壓然不覺其興若大醉然不覺其醒其疾怒急擊快利勁果出行萬里不見其敵髙歌酣顔入飲於朝㫁章摘句如娠始生狼子豽孫競於跳走剪餘斬殘程露血脉其詳緩柔潤壓抑趨儒如以一國買人一笑如以萬世換人一朝重屋深宫但見其脊牽繂長河不知其載死而更生夜而更明衣裳鐘石雅在宫藏其正聴嚴毅不滓不濁如坐正人照彼佞者子從其翁婦從其姑豎麾為門懸木為牙張葢乗車屹不敢入将刑㫁死帝不得赦其碎細分擘切截纎顆如墜地碎若大咽上聲餘鋸取朽蠹櫟蟒出毒刺眼楚去聲齒不見可視顧顛踣錯雜汙瀦損傷如在危處如出夢中其總㫖㑹源條綱正目若國大治若年大熟君君堯舜人人羲皇上之視下不知有尊下之望上不知有簒辮頭鑿齒扶服臣僕融風彩露飄零委落耋老者在童齔者蕃邪人佞夫指之觸之薰薰熙熙不識其故吁不得盡其極也而論者徒曰次山不師孔氏為非嗚呼孔氏於道徳仁義外有何物百千萬年聖賢相隨於塗中耳次山之書曰三皇用真而恥聖五帝用聖而恥明三王用明而恥察嗟嗟此書可以無書孔氏固聖矣次山安在其必師之邪樊川文集後序裴延翰長安南下杜樊鄉酈元長注水經實樊川也延翰外曽祖司徒岐公之别墅在焉上五年冬仲舅自吳興守拜考功郎中知制誥盡吳興俸錢創治其墅出中書直亟召昵宻往逰其地一旦談啁酒酣顧延翰曰司馬遷云自古富貴其名磨滅者不可勝紀我適稚走於此得官受俸再治完具俄及老為樊上翁既不自期富貴要有數百首文章異日爾為我序號樊川集如此則顧樊川一禽魚一草木無恨矣庶千百年未隨此磨滅矣明年遷中書舎人始少得恙盡收文章閲千百紙焚擲纔屬留者十二三延翰自撮髪讀書學文率承導誘伏念初出仕入朝三直太史筆比四出守其間逾二十年凡有撰制大手短章塗藁醉墨碩夥纎屑雖適僻阻不逺數千里必獲寫示以是在延翰乆藏蓄者甲乙籖目比校焚外十多七八得詩賦傳録論辨碑誌序記書啟表制離為二十編合四百五十首題曰樊川文集嗚呼雖當一時戲感之言孰見魄兆而果驗白邪嘻文章與政通而風俗以文移在三代之道以文與忠敬隨之是為理其與運髙下探古作者之論以屈原宋玉賈誼司馬遷相如揚雄劉向班固為世魁傑然騷人之辭怨刺憤懟雖援及君臣教化而不能霑洽時論相如子雲瓌麗詭譎諷多要寡羡漫無歸不見治亂賈馬劉班乗時君之善否直豁己臆奮然以拯世扶物為任纂緒造端必不空言言之所及則君臣禮樂教化賞罰無不包焉竊觀仲舅之文髙騁夐厲旁紹曲摭絜簡渾圓勁出横貫滌濯滓窳支立欹倚呵磨皸瘃如火煦焉爬梳痛痒如水洗焉其抉剔挫偃敢㫁果行若誓牧野前無有敵其正視嚴聴前衡後鑾如整冠裳祇謁宗廟其聒蟄爆聾發慄若大吕勁鳴洪鍾横撞撐裂噎喑戛切韶頀其砭熨嫉惡堤障初終若濡槁於未焚膏癰於未穿栽培教化翻正治亂變醨養瘠堯醲舜薰斯有意趨賈馬劉班之藩牆者邪其文有罪言者原十六衛者戰守二論者與時宰論用兵論江賊二書者上獵秦漢魏晉南北二朝逮貞觀至長慶數千百年兵農刑政措置當否皆能採取前事凡人未嘗經度者若繩裁刀解粉畫線織布在眼見耳聞哉其譎往事則阿房宫賦刺當代則感懷詩有國欲亡則得一賢人決遂不亡者則張保臯傳尚古兵柄本出儒術不專任武力者則注孫子而為其序襃勸賢傑表揭職業則贈荘淑大長公主及故奇章公汝南公墓誌標白歴代取士得才率由公族子弟為多則與髙大夫書諫諍之體非訐醜惡與主鬬激則論諫書若一縣宰因行徳教不施刑罰能舉古風則謝守黄州表一存一亡適見交分則祭李處州文訓勵官業告束君命擬古典謨以寓誅賞則司帝之誥其餘述喻賛誡興諷愁傷易格異状機鍵雜發雖緜逺窮幽膿腴魁礨筆酣興健窕眇碎細包詩人之軌憲整揚馬之牙陣聳曹劉之骨氣掇顔謝之物色然未始不撥斸治本縆幅道義鈎深於經史觝禦於理化也故文中子曰言文而不及理王道何從而興乎嘻所謂文章與政通風俗以文移果於是以卜盛時理具踔三代而䕃萬古若躋太華臨溟渤但觀乎積髙而杳深不知其磅礴澶漫所為逺大者也近代或序其文非有名與位則文學宗老小子既就其集寤寐思慮反覆不翅逾年苟墜承顧付與之言雖晦顯兩不相解在他人無短其状者然以髙有天幽有神隂有宰物者可自誣抵以甘罰殛故總其條目强自作序至於裁判風雅宰制典刑標翊時濟物之才編志業名位之實則恭俟叔父中書公於前序毗陵集後序梁肅有唐文宗常州刺史獨孤公既薨門下客安定梁肅以公茂徳映乎當世美化加乎百姓若發揚秀氣磅礴古訓則在乎斯文文之盛不可以莫之紀也於是綴其遺草三百篇為二十卷以示後嗣乃繋其辭曰夫大者天道其次人文在昔聖王以之經緯百度臣下以之弼成五教徳又下衰則怨刺形於歌詠諷議彰乎史冊故道徳仁義非文不明禮樂刑政非文不立文之興廢視世之治亂文之髙下視才之厚薄帝唐接前代澆醨之後承文章顛墜之運王風下扇作者迭起不及百年文體反正洎公為之則又操道徳為根本總禮樂為冠帶以易之精義詩之雅訓春秋之襃貶屬之於詞故其文寛而簡直而婉辨而不華博厚而髙明論人無虚美比事為實録天下凜然復覩兩漢之遺風善乎中書舎人崔公祐甫之言也曰常州之文以立憲戒世襃賢遏惡為用故議論最長其或列於碑頌流於歌詠峻如嵩華浩如江河若賛堯舜禹湯之命為誥為典為謨為訓人皆許之而不吾試論道之位宜而不陟誠哉公諱及字至之秘書監府君第四子道與之粹天付之徳聰明博達剛毅正直中行獨復動靜可則仁厚積為大本文藝成乎餘力其立言必忠孝大倫王霸大畧權正大義古今大體文中雖波騰雷動起伏萬變而殊流㑹歸同致於道故於賦逺游頌嘯臺見公放懷大觀超邁流俗於仙掌函谷二銘延陵論八陣圖記見公識探神化智合權道於議郊祀配天之禮吕諲盧奕之謚見公闡明典訓綜覈名實若夫述聖道揚儒風則陳留郡文宣王廟碑福州新學碑美成功旌善人則張平原頌李常侍姚尚書嚴庶子韋給事韋頴叔墓誌鄭氏孝行記李睢陽楊懷州碑纂世徳貽後昆則先秘監靈表陳黄老之義於是有對冊文演釋氏之奥於是有鏡智禪師碑論文變損益於是有李遐叔集序稱物状之美而暢其情性於是有琅邪谿述杼乆要於存沒之間則祭賈尚書相里侍郎元郎中李庶子文其叙一事紀一物皆足以追蹤往烈裁正狂簡噫天其以述作之柄授夫子乎不然則吾黨安得遭遇乎斯文也初公視肅以友肅仰公猶師每申之話言必先道徳而後文學且曰後世雖有作者六籍其不可及已荀孟朴而少文屈宋華而無根有以取正其賈生史遷班孟堅云爾吾子可共與學當視諸斯文肅承其言大發䝉惑今則已矣知我其誰哉遂銜涕為叙俾來者有以觀夫子之志若立身行道終始出處皆載易名之状故不備之此篇題栁栁州集後司空圖金之精麤攷其聲皆可辨也豈清於磬而渾於鍾哉然則作者為文為詩才格亦可見豈當善於彼而不善於此邪愚觀文人之為詩詩人之為文始皆繋其所尚既專則搜研愈至故能衒其工於不朽亦有力巨而鬬者所持之器各異而皆能濟勝以為勍敵也愚嘗覽韓吏部歌詩累百首其驅駕氣勢若掀雷扶電撑扶於天地之垠物状其變不得鼔舞而狥其呼吸也其次皇甫祠部文集外所作亦為遒逸非無意於深宻盖或未遑耳今於華下方得栁詩味其探搜之致亦深逺矣俾其窮而克夀抗精極思則固非瑣瑣者輕可擬議其優劣又嘗覩杜子美祭太尉房公文李太白佛寺碑賛宏㧞清厲乃其歌詩也張曲江五言沈鬱亦其文筆也豈相傷哉噫後之學者褊淺片詞隻句不能自辨己側目相詆訾矣痛哉因題栁集之末庶俾後之詮評者罔惑偏説以蓋其全工唐大理評事楊君文集後序栁宗元賛曰文之用辭令襃貶導揚諷諭而已雖其言鄙野足以備於用然而闕其文彩固不足以竦動時聴夸示後學立言而朽君子之不由也故作者抱其根源而必由是假道焉作於聖故曰經述於才故曰文文有二道辭令襃貶本乎著述者也導揚諷諭本乎比興者也著述者流盖述於書之謨訓易之象繋春秋之筆削其要在於髙壮廣厚詞正而理備謂宜藏於簡冊也比興者流盖出乎虞夏之詠歌殷周之雅頌其要在於麗則清越言暢意美謂宜流於謡誦也兹二者考其㫖義乖離不合故秉筆之士恒偏勝獨得而罕有兼者故有能而專美命之曰藝成雖古文雅之盛世不能並肩而生唐興已來稱是選而不怍者梓潼陳拾遺其後燕文貞以著述之餘攻比興而莫能極張曲江以比興之隙窮著述而不克備其餘各探一隅相與背馳於道者其去彌逺文之難兼斯甚矣若楊君者少以篇什著聲於時其炳燿尤異之辭諷誦於文人滿盈於江湖達於京師晩節徧悟文體尤䆳序述學富識逺才涌未已其雄傑老成之風與時増加既獲是不數年而夭其季年所作尤善其為鄂州新城頌諸葛武侯傳論餞送梓潼陳衆甫汝南周愿河東裴秦武都何義府泰山羊士諤隴西李練凡六序廬山禪居記辭李常侍啟逺逰賦七夕詩皆人文之選已用是陪陳君之後其可謂具體者歟嗚呼公既悟文而疾既即功而廢廢不逾年大病及之卒不得窮其工竟其才遺文未克流於世休聲未克充於時凡我從事於文者所宜追惜而悼慕也某以通家修好幼獲省謁故得奉公元兄論次篇目遂述其制作之所詣以繋其後注愍征賦後述司空圖武宣之間籍顯地者雖無如梁韓數公以雅實自任而能振㧞後進然士大夫宴逰之倦猶或時道文學以佽助執事者而盧君尚以讒擯致憤於累千百言亦猶虎之餌毒蛟之飲鏃其作也雖震丘林鼓溟漲不能快其咆怒之氣且科爵之設是多得於彼而少䘮於此侈其虚而歉其實彼或充然自喜而又以拱黙相持曽不知日月沒於晷刻之間蠅翔而螢腐耳然則著明幸於棄黜而能以愍征爭勍於千載之下吾知後之作者有嘔血不能逮之者矣其所得何如於彼哉且上至聖哲下至豪特之士得於文學者多矣豈以一靈運之狂而可沮辱天下之奇偉哉況面牆而悸謬者何翅於此邪愚前述雖已恣道其遒壮悽豔矣而終不能研其方外之致以是擲筆狂叫寄之他生又嘗著濯纓引以雪詞人之憤其㫖亦屬於盧君且凡稟精爽之氣是或有智謀超出羣輩一旦憤抑肆其筆舌亦猶武人逞怨於鋒刃也俾其無所控告驅於讎敵必貽國家之患矣然則據權而蔽善者得不常以此危慮哉唐文粹巻九十三欽定四庫全書唐文粹卷九十四宋姚鉉編序丁總一十首
