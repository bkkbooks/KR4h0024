  - {type: variant, offset: 4647, length: 0, content: '', WYG: 初正人降居上黨天下往兮黄龍晝見攀天而上九五象兮帝遊于野紫雲之下求必在兮帝寢于堂變龍有光觀者駭兮天迹人謡木連蓍立總神異兮空鍾化宂縞鹿赤魚何詭異兮上天無聲託類附形覺悟人兮聖皇齋栗在得戒失昭事神兮皤皤潞老樂我王道愛舊宫兮赫赫頌功與天比崇攄無窮兮龍池聖徳頌并序張九齡臣聞昔者𤣥徳升聞皇天眷命元聖有作上帝何言而必見意於休徴忘象於幽賛惟兹降鑒若曰專精道周萬物者其魄尤功濟生人者其祥大粤若古始肇有君臣巢燧之前寂寥無紀書契之後炳煥可觀若乃鬼神雎盱品彚紛錯性命未正吉凶不定而太昊氏將通其徳則河為之出圖人食未粒鳥獸是茹時不耕稼器無耒耜而神農氏將教其本則天為之雨粟蚩尤不道炎帝不制銅鐵鑄兵豺狼横厲而軒轅氏將禁其暴則天為之降𤣥女洪水方割下民昬摯堯徳莫能弭厥災舜功不能除其害而夏后氏將}
