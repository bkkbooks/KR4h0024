  - {type: variant, offset: 8671, length: 0, content: '', WYG: 欽定四庫全書唐文粹巻七十八宋姚鉉編箴誡銘總四十一首箴二十五大寳箴張蘊古丹扆箴六首并序裕李徳瑞箴孫朴兵箴梁肅太倉箴李商隠獄箴張説縣令箴古之竒縣令箴元結五箴并序韓愈動靜二箴皮日休口箴姚元崇視聽箴沈顔自箴元結行已箴李翺暗室箴歐陽詹誡八二誡并序元栁宗冰壺誡姚元崇執秤誡執鏡誡守誡韓愈敵誡栁宗元銘八幾銘權徳輿門銘盧仝二銘并序羅衮櫛銘盧仝藏劍銘潘存實座右銘白居易猩猩銘裴炎大寳箴張蘊古今来古往俯察仰觀惟辟作福惟君實難主普天之下處王公之上任土貢其所求具寮陳其所倡是故恐懼之心日弛邪僻之情轉放豈知事起乎所忽禍生乎無妄固以聖人受命拯溺亨屯歸罪於已因心於民大明無私照至公無私親故以一人治天下不以天下奉一人禮以禁其奢樂以防其佚左言而右事出警而入蹕四時調其慘舒三光同其得失故身為之度而聲為之律勿謂無知居髙聽卑勿謂何害積小就大樂不可極樂極生哀欲不可縱縱欲成災壮九重於内所居不過容膝彼昏不知瑶其臺而瓊其室羅八珍於前所食不過適口唯狂罔念丘其糟而池其酒勿内荒於色勿外荒於禽勿貴難得貨勿聽亡國音内荒伐人性外荒蕩人心難得之貨侈亡國之音淫勿謂我尊而傲賢慢士勿謂}
