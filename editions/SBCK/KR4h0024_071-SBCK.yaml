body:
  text: 吳興姚鉉纂記甲到難附揔一十二首古跡二宋武受命壇記張謂風后八陣圖記獨􅀌及陵廟四女媧陵記喬潭改修吳延陵季子廟記蕭定􅀳東萊太守劉將軍廟記許籌縉雲縣城隍神記李陽冰水石巖穴五曲江池記歐陽詹太湖石記白居易至丘西小石潭記栁宗元乳穴記到難附周䕫外物一醉鄕記王績宋武受命壇記張謂昔在王癸不道帝辛失德天命將改人心巳去聖哲拯之曆數歸焉商湯所以革夏周武所以伐殷也至於太甲􅀄放成王未長國歩猶梗時屯尚虞忠賢處之名節存焉伊尹所以反正周公所以復嗣也元興之際義熈之間􅀳主中庸幸無桀紂之罪劉公大略遂有伊周之勲當其驅駕英雄芟夷僣僞南摧勁楚北破強燕電掃秦雍風清巴蜀三方爲我有四海爲巳任誠能秉汾陽之志息漢隂之機牽率何劉同爲翊戴􅃌撝徐傅共致雍熈則元皇建業之都至今享殷周之祚劉后豫章之地至今爲齊晉之國而近希曹馬遠棄􅁊文禍徒及於兩朝福未盈於三載八葉傳其世嗣六君不以壽終漢氏寛仁胤緒成大族劉公殘暴子孫無遺種天之報施其明徴乎則知握元符升大寶禮義得之者難絶志力得之者易亡使成如宋齊無足稱者況敗如莽卓豈勝道哉後之人運屬陵夷業崇經濟周爰故地殷鑒在兹唐永泰元年二月二十五日建風后八陣圖記獨􅀌及物不終靜必受之以動當純坤用事隂疑於陽則飛龍戰大朴巳散聖盜並起故戎馬生乃有力吞八荒爭截九有大者天柱折地維􅅸小者作慝盧山􅀒阻中冀上帝慿怒下民是恤乃眷武德黃帝受之始順殺氣以作兵法文昌以命將於是乎征不服討不庭其誰佐命曰元老風后蓋戎行之不修則師律用爽隂謀之不作則凶器何恃故天命聖者以廣戰術俾懸衡於未然察變於􅀝數握機制勝作爲陣圖夫八宫之位正則數不􅗅神不忒故八其陣所以定位也衡抗於外軸布於内風雲附其四維所以備物也虎張翼以進蛇向敵而蟠飛龍翔鳥上下其勢以致用也至􅀂疑兵以固其餘地游軍以按其後列門具將發然後合戰弛張則二廣迭譽掎角則四竒皆出必使陷堅陣拔深壘􅀂星馳天旋雷動山破魏之鶴列鄭之魚麗周成之熊羆昆陽之虎豹出匪以律我異於是旣而圖成鐏爼帝用經略北逐獯鬻南平􅃖尤戡􅀺於阪泉省方於崆峒底定萬國旁羅七耀鼎戊龍至去而上僊於是遺風冥冥時亡而圖存焉於戲聖迹長往神機未昧酌其流者猶足以決勝三軍禦侮萬里故項籍得之以覇西楚黥布得之奄有九江漢孝武得之攘匈奴服甌越東􅀵獩㹮西拓大夏然則聖圖幽賛未始有涯天寶中客有爲韜鈐者得其遺制於黃帝書之外篇裂素而圖之勝敗之朕在我股掌天地之心見於毫末議欲獻諸䇿府用廣武事㑹天子以不戰爲師無爲爲寶則是圖也興於多難廢於升平堙淪不書盛德其没乃旌諸圖側以爲三皇之故事六藝之餘伎云女媧陵記喬潭登黃龍古塞望洪河中流巋然獨存大浸不溺者媧皇陵也夫巨靈擘太華蹠首陽導河而東以洩憤怒雖有重丘大阜險狹之口罔不漱之爲黃壤汨之於旋波不可復振奔崩而下矣女媧氏巳然之後豁爾之衝天險束阨風濤鼔作乃能中乾外禦特立萬年其慿神可知也水無盈縮之度陵有高卑之常霖潦漲之兩涘没矣於是乎不爲之小而就其深旱暵滲之􅀌嶼出矣於是乎不爲之大而就其淺非夫巨靈壯趾以固本河伯高肩以承隅胡然動靜如因其時升降不失其則羅浮二岳以風􅀨合離蓬萊五山以波潮上下不復故道遂違常流甚相逺矣君子曰夫能屠黒龍涸九州況乎一水之上而自爲謀夫能斷鼇足立四極況乎數仞之高而自爲力神人之易昧者難知密邇山谷森羅物象莽莽蘆渚寧非止水之餘嶃嶃石林猶有􅀘天之色揺演空曲精靈􅀂存且夫上無積草表以􅀌樹常感風氣纎條悲鳴􅀂冥應肹蠁鼔簧而吹笙由是憧憧往來無不加敬山有梅栗􅀜吏羞焉水有菱芡舟人奠焉冢之木無或斬焉陵之土無或抔焉是則馨香巳陳而樵蘇自禁矣故聖人取薄葬去厚送驪山之銀海魚燈虎丘之金精龍劒錮之其内散之其間適爲大盜之守未足藏身之固彼橋山帝丘九嶷㑹稽皆因山而墳未聞其諸者余謂媧皇受命在火火以示水谷不爲陵開門􅀒固日用其力不然其􅂩地豈必封崇乎是故觀而志之爲城冡後記改修吳延陵季子廟記蕭定有吳之興也泰伯讓以得之有吳之衰也季子讓以失之爲讓之情同而興衰之體異何哉泰伯之讓讓以賢也故周有天下而吳建國焉季子之讓賢以讓也當周德之衰而吳䘮􅀖焉或曰非所讓而讓之使宗祀泯絶而不血食豈曰能賢斯可謂知存而不知亡者矣夫治亂時也興亡運也故至至而不可卻終終而不可留黃河旣濁阿膠無以正其色鹽池斯鹹弊箄不能匡其味與夫當濁亂之世召力勝之戎讓與爭孰賢乎易曰知幾其神則季子之見可謂知幾矣季子之明可謂知進退存亡而不失其正矣至於聽樂辨列國之興亡審賢知世數之存没挂劒示不言之信避國保無欲之貞故有吳之祀寂寥而延陵之饗如在玄風可想至德興歎美之辭哲人其萎表墓著嗚呼之篆向徴德仁兩至則夫子不復歎焉詳其精義􅀍物鈎深致逺之􅈲烏可究其津涯而窺其牆仞哉是知讓之爲德在於生靈不獨其子孫明矣國有祀典人懷永思定沗列藩條欽崇懿範于以加敬嚴乎閟宫别閨壼之内外正衆神之序位舊以泰伯之廟在於蘇臺而制季子之祠像設東面非由典禮諒無取焉必也正名於是乎在祈報獻奠贄幣宜列於軒廂春秋禮薦爼豆當陳於正寢俾觀像者識賢人之遺風可律審度者知經徳之禮秩無差末學陋辭不足頌其休烈寒來暑往敢用同於紀年時大唐大曆十四年歲在巳未八月戊戌朔二十七日甲子記􅀳東萊太守劉將軍廟記許籌將軍􅀳永嘉􅀄守萊種德藝政萊人恩之旣殁諸劉將西扶葬洛萊人曰我萊不降數萬家將軍子視我我父母戴之將軍於諸劉天戚也於我人戚也天之戚也寡而邈人之戚也衆而邇安有捨邇衆而歸邈寡哉敢以數萬家之命請於諸劉遂之於是散捧封土趨持樹本旣墳于此饗用春秋檮災徼祐餘靈影響大中十一年四月癸巳太守辛公肱去太守姚公琯未臨籌以當道觀察支使奏承空闕到郡之三日軍吏䟽拜歷祠羣望即日將軍祠在郡署之東端簡肅入乃見廟寢卑狹畫像凋暗旣違有德豈謂祭恭乃命押衙兼修造使李公覇度木戒工新此殿搆想像塑繪居月而成心非貿福者將使有德者垂昆無窮無德者警改操行萊人受􅁉當稔于兹大中十一年五月二十三日記縉雲縣城隍神記李陽冰城隍神祀典無之吳越有之風俗水旱疾疫必禱焉有唐乾元二年秋七月不􅀨八月旣望縉雲縣令李陽冰躬祈於神與神約曰五日不􅀨將焚其廟及期大􅀨合境告足具官與耆耋羣吏乃自西谷遷廟於山巓以荅神休曲江池記歐陽詹水不注川者在藪澤則曰陂曰湖在苑囿則爲池爲沼苑之沼囿之池力墾而成則多天然而有則寡兹池者其天然歟循源北峙迴岡旁轉圎環四帀中成坎窞窙􅐎港洞生泉噏源東西三里而遥南北三里而近當天邑别􅁲繚垣未繞乃空山之濼曠野之湫然黃河作其左壍清渭爲其後洫襃斜右走太一前横崇山濬川鈎結蟠護不南不北湛然中渟西北有地平坦彌望五六十里而無窪􅉾紫蓋凝而不散黃旗鬱以常在實陶鈞之至造化之工沙汰一氣之辰財成六合之日旣以磽确外爲寰宇敞無垠堮以居億兆又選英精内爲區域束以􅁭帶用宅君長􅀂人斯生支體具矣有心以繫其神焉􅀂堂斯考廊廡設矣有室以處其尊焉彼如紫蓋黃旗之氣蓋陶鈞造化者用宅君長英精之所邪夫物茍相表裏製必同象泄夫外則廓以靈海導夫内則融乎此湫歷代帝王未得而有豈降巢室土之後聮綿千百之代建卜都邑不欲合夫天意而居乎將天意尚同根深蔕固可與終畢者而命處乎故涸於有隋比我皇唐之存孕詔其季主營之以須焉揆北辰以正方度南端而制極墉隍劃趾勾陳定位地迴帝室湫成厥池旣由我署纔成伊去眞主巍巍龍蟠虎據爰自中而䡄物取諸象以正名字曰曲江儀形也觀夫妙用在人豐功及物則揔天府之津液䟽皇居之墊隘潢汙入其洞澈銷延漦以下澄汗廅隨其佳氣蕩鬱攸而上滅萬戸無重膇之患千門就爽塏之致其流惡含和厚生蠲疾有如此者皎皛如練淸明􅀂空俯睇沖融得渭北之飛鴈斜窺澹泞見終南之片石珍木周庇竒花中縟重樓天矯以縈映危榭巉巖以輝燭芬芳䕃潛滉瀁電烻凝煙吐靄泛羽游鱗斐郁郁以閑麗謚徽徽而清肅其涵虚抱景氣象澄鮮有如此者皇皇后辟振振都人遇良辰於令月就妙賞乎勝趣九重繡轂翼六龍而畢降千門錦帳同五侯以偕至泛菊則因高乎斷岸祓禊則就絜乎芳沚戲舟載酒或在中流清芬入􅁭沈昏以滌寒光眩目貞白以生絲竹駢羅緹綺交錯五色結章於下地八音成文于上空砰輷沸渭神仙奏鈞天於赤水黤藹敷俞天人曵雲霓於玄都其洗慮延歡俾人怡懌有如此者至􅀂嬉游以節宴賞有經則纎埃不動微波以寧熒熒淳渟瑞見祥形其或􅁋􅊺以情泛覽無斁則飄風暴振洪濤噴射崩騰駱驛妖生禍覿其棲神育靈興善懲惡有如此者某幸因受遣觀光上國身不佞而自棄日無名以多暇詢竒覽物得之於斯矚太始之玄造訪前聞於碩老天生地成之理識之於性情物儀人事之端徴之於耳目夫流惡含和厚生蠲疾則去隂之匿輔陽之德也涵虚抱景氣象澄鮮則藻飾神州芳榮帝宇也洗慮延歡俾人怡恱則致民樂土而安其志也樓神育靈興善懲惡則俗知所勸而重其敎也號惟天邑非可謬創一山一水拳石草樹皆有所謂兹池者其有謂之雄焉意我皇唐須有此地以居之有此地須有此池以毗之佑不仁之亭毒賛無言之化育至矣哉以其廣狹而方於大則小矣以其淵洞而諭夫深則淺矣而有功如彼有德􅀂此代之君子蓋有知之而不述令民無得而稱焉輒粗陳其旨刋諸岸石庶元元荷日用之力也貞元五年歲在巳巳夏五月十有五日記太湖石記白居易古之逹人皆有所嗜玄晏先生嗜書嵇中散嗜琴靖節先生嗜酒今丞相竒章公嗜石石無文無聲無臭無味與三物不同而公嗜之何也衆皆怪之走獨知之昔故友李生名約有云茍適吾意其用則多誠哉是言適意而巳公之所嗜可知之矣公以司徒保􅁵河雒治家無珍産奉身無長物惟東城置一第南郭營一墅精葺宫宇愼擇賔客性不茍合居常寡徒游息之時與石爲伍石有族聚太湖爲甲羅浮天笁之徒次焉今公之所嗜者甲也先是公之僚吏多鎭守江湖知公之心惟石是好乃鈎深致逺獻瑰納竒四五年間纍纍而至公於此物獨不廉讓東第南墅列而置之富哉石乎厥狀非一有盤拗秀出如靈丘鮮雲者有端儼挺立如眞官神人者有縝潤削成如珪瓉者有廉稜銳劌如劒㦸者又有如虬如鳳􅀂跧􅀂動將翔將踴如􅀑如獸􅀂行􅀂驟將攫將􅃲風烈􅀨晦之夕洞穴開􅥾􅀂欲雲歕雷嶷嶷然有可望而畏之者煙霽景麗之旦巖㟧霮䨴􅀂拂嵐撲黛靄靄然有可狎而翫之者昏曉之交名狀不可撮要而言則三山五岳百洞千壑覼縷蔟縮盡在其中百仞一拳千里一瞬坐而得之此所以爲公適意之用也與公迫觀熟察相顧而言豈造物者有意於其間乎將胚渾凝結偶然成功乎然而自一成不變巳來不知幾千萬年或委海隅或淪湖底高者僅數仞重者殆千鈞一旦不鞭而來無脛而至爭竒騁怪爲公眼中之物公又待之如賔友親之如賢哲重之如寶玉愛之如兒孫不知精意有所召邪將尤物有所歸邪孰不爲而來邪必有以也石有大小其數四等以甲乙丙丁品之每品有上中下各刻于石隂曰牛氏石甲之上丙之中乙之下噫是石也百千載後散在天壤之内轉徙隱見誰復知之欲使將來與我同好者覩斯石覽斯文知公之嗜石之自㑹昌三年五月丁丑記至小丘西小石潭記栁宗元從小丘西行百二十歩隔篁竹聞水聲如鳴佩環心樂之伐竹取道下見小潭水尤清洌泉石以爲底近岸卷石底以出爲壇爲嶼爲嵁爲巖青樹翠蔓􅀩絡揺綴參差披拂潭中魚可百許頭皆􅀂空游無所依日光下徹影布石上恬然不動俶爾逺逝往來翕忽似與游者相樂潭西南而望斗折蛇行明滅可見其岸勢犬牙差互不可知其源坐潭上四面竹樹環合寂寥無人淒神寒骨悄愴幽􅃉以其境過清不可乆居乃記之而去同游者吳武陵㰍古余弟宗玄􅈻而從者崔氏二小生曰恕已曰奉壹乳穴記石鍾乳餌之最良者也楚越之山多産焉于連于韶者獨名於世連之人告盡焉者五載矣以貢則買諸他部今刺史崔公至逾月穴人來以乳復告􅀖人恱是祥也雜然謡曰甿之熈熈崔公之來公化所徹土石􅀩烈以爲不信起視乳穴穴人􅀏之曰是惡知所謂祥邪嚮吾以刺史之貪戻嗜利徒吾役而不吾貨也吾是以病而紿焉今吾刺史令明而志絜先頼而後力欺誣屏息信順休洽吾以是誠告焉且夫乳穴必在深山窮林冰雪之所儲犲虎之所廬由而入者觸昏霧扞龍蛇束火以知其物縻繩以志其返其勤􅀂是出又不得吾直吾用是安得不以盡告今令而乃誠吾告故也何祥之爲士聞之曰謡者之祥也乃其所謂怪者也􅀏者之非祥也乃其所謂眞祥者也君子之祥也以政不以怪誠乎物而信乎道人樂用命熈熈然以效其力斯其爲政也而獨非祥也歟到難周夔天子握乾符之六歲末秩臣羽皇客于南裔水浮溟波陸上青山或時書短宿在林壑繇是嵐溪煙嶠之勝得湞陽之石室焉兩崖卷束勢合如屋孱顔百閒開待朝旭峭然嵐壁宛矣倦躅羽容霓色霏遶瑶局加以上戴霄峯中流晴溪碧瀾之下寸寸秋色􅀂夫崆峒見月於半夜翠竇有雲於朝日乳枝凝斷而磬落松􅄜踈風而瑟續不書其竒可知矣於戲斯室斯溪也與夐古同出野夫樵子無日不到冠劒百族代誰知之使靈室煙霞寂漠無主􅀛山挹玉堂之㑹瑶池宴王母之觴彼何人邪秋九月有釋氏子智捷聞於聚落持律第一探得是室亟言於上谷侯君侯君名著字伯昭德門之裔也宰於湞陽蠏筐范綏之政行焉事歸條貫官有餘日􅀄與三四賔客游焉旣昇于室皆踞盤石注目峭絶壑形渠渠忽驚呀豁危起騰立背􅀝青壁乆而不寧掬谿飮水稍稍神定噫乎古之王文考何平叔不值斯室也向使值之必爲之賦廣言磅礴洞蕩垂文雄傑則靈先景福不得獨豪矣大凡人間跼束難有閑日曕彼石室嗣子之到者誰邪上谷交親同辭舊山者京兆韋君長文時爲南都曹􅁺手持密轄杳在蓮府緬昔泉石俱爲逸人張琴寫古以彈操語黙不歌而飮酒􅆪纓軒冕浮雲也今日煙霞林壑思同甚難故礱室􅅣壁顧余以到難命篇上以俟羣仙之降次將遟京兆之游些京兆韋長文上谷侯著河南史傑清河崔存慶存範蘭陵蕭及上谷侯從直清河張君奭張甫釋澄雅智捷明則成文後一月􅅣石又一月儒釋佀十四人同游立之醉鄕記王績醉之鄕去中國不知其幾千里也其土曠然無涯無丘陵阪險其氣和平一揆無晦明寒暑其俗大同無邑居聚落其人甚精無愛憎喜怒吸風飮露不食五榖其寢千于其行徐徐與鳥獸魚鼈雜處不知有舟車器械之用昔者黃帝氏甞獲游其都歸而杳然喪其天下以爲結繩之政巳薄矣降及堯舜作爲千鍾百壺之獻因姑射神人以假道蓋至其邊鄙終身太平禹湯立法禮繁樂雜數十代與醉郷隔其臣義和弃甲子而逃兾臻其鄕失路而道夭故天下遂不寧至乎末孫桀紂怒而昇其糟丘階級千仞南向而望卒不見醉鄕武王得志于世乃命公旦立酒人氏之職典司五齊拓土七千里僅與醉鄕達焉三十年刑措不用下逮幽厲迄乎秦漢中國䘮亂遂與醉鄕絶而臣下之愛道者往往竊至焉阮嗣宗陶淵明等十數人並游于醉郷没身不返死葬其壤中國以爲酒仙云嗟乎醉鄕氏之俗豈古華胥氏之國乎何其淳寂也如是余將游焉故爲之記重校正唐文粹卷第七十一
