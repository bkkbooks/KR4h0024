front:
  text: 三時視辟雍於農效堂室岋嶫磊砢属聮終朝之兩流潦行渟旣夕之天列宿上羅羣生寂寥攸處貿遷而陛下不以問學官不以聞執政之臣不以思所謂徳宇将摧敎源将乾先聖之道将不堪猶火之炎上燄燄至焚其為不利也豈不畏哉日者聖朝以武夷時屯有風牧建帝庸今者聖朝以文象天經有皋衡宣皇猷實曰四三六五之君子間無足以聞之然事不為加理人不為加安嵗貢之夫不能應請問晏罷之瘽音勤無以悞𤣥機天下有倒懸之悲諸侯有安忍之懐執柄之臣深惟無從但勞心於無庸全身於因循是了不知長國之之術在乎養士養士之方在乎隆學學廢則士亡士亡則國虛國虛則下危下危則禮義銷禮義銷則狂可姦聖賊可凌徳逶迤不知其終今觀執事之臣之心必以修大學為害時而他害者千之飬士者為費財而他費者萬之殊不知此費無費而他費為費也此害無害而他害為害也諺所謂溜之細穿石綆之細斷榦斯言損益有漸非聦喆靡察也今乃不明徴於儒書欽若於權輿繼統於易俗恢業於絶風而望海内俊傑靡然踵武於雲龍之庭不知其可也禮稱虞夏殷周天下之盛王以其有庇民之原祚國之仁且太學之興本於有虞逹於三王踰至於漢魏以降特盛於我太宗文皇帝重聖遵之無以增洊發於先皇而及於聖朝此乃古帝王慜醇醨亂萌故用敎於人百代奉之以𢎞長國家廣之以存濟元元陛下不宜忽之而已今四君徳以相髙八聖幽而不炤風聲隨而凋落焉夫四君之民古猶易制陛下之民猾且難矣易制之民古猶或建之難制之民得不重愼乎昔春秋書太室壊傳曰書不恭也臣今懼聖朝之史書太學廢使萬代之嗣無法矣今聖朝聚國中之兵守塞下之疉殫織婦之機悉農夫之儲豈期惡民而賤物誠社稷之謀也假一旦農夫死織婦病兵壘充郊粟帛不輸陛下此時其暇念學乎則禮義之心不素蓄於人亦難以復天下之龢矣且四方之學是太學之枝葉天子之敎是諸侯之本未有本之顛也而枝葉之存天子之亡而諸侯之興夫為國者亦猶治一身京師人之心四方人之體諸侯體之四支心平則體之患易除體平則四支之患無不可除今不嗇神於心體而竭訾於四支時變于外氣虚於中則為不起之人矣伏惟陛下察施張之㑹觀損益之圖減無用之府崇有裕之原廢闕修而百度明庠序昌而百行榮經邦於悠久熙載於登閎顧夫周營靈臺魯修泮官於陛下萬分之一焉伏惟遽令職司不至於不可持天下幸甚
