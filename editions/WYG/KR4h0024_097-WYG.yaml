body:
  text: 錫宴三丞相少傅拜職天子作三傑之詩以命宴序蘇晋季春下旬詔宴薛王山池序張説集賢殿書院奉勅送學士張説上賜宴序張九齡讌集十五泉州席史君讌秀才於東湖亭序歐陽詹暮春太師左右丞相諸公於韋公逍遥谷讌集序王維蕭尚書拜命路尚書就林亭讌集序潘炎讌集韋庶子宅序顧況蓬池褉飲序蕭穎士兩省遺補讌韋司户南亭序王維江陵陸侍御宅讌集觀張員外畫松石序符載魯山令胃讌寮吏序歐陽詹始得西山讌遊序栁宗元清明日南皮泛舟序蕭頴士夏日諸從弟登汝州龍興閣序李白春日讌諸從弟桃園序遊雲門序梁肅序飲栁宗元序白舒元與丞相少傅拜職天子作三傑之詩以命宴序蘇晉惟聖寳賢以齊皇極有若左丞相燕國公右丞相廣平公太子少傅安陽侯皆生人碩德皇國元老道著廊廟績宣華戎由是懋其成功錫以元吉咨日於朔擇時於秋俾對命王庭受職公府見羣屬揖庶寮禮官辨章掌舎陳次工備佾饔獻蒸六卿拜下以成儀三事自天而來賀秩秩賓序暉暉旅疇玉緯垂文南風和雅頌之變金漿降醴雲天光飫酌之宜宰德貴和盡莊敬具瞻之範羣情囘洽預周旋宴語之懽方將一心天工戮力帝載寢黒山之柝苞青海之戈雲雨賢才水火菽粟日詠魚藻嵗陳由庚頤殷趙之年留魯陽之景爰命在宴乃賡載歌季春下旬詔宴薛王山池序張説有生之性萬殊無方之盛一節陽和而動植暢春滿而臯壤悦后皇所以發時令布新慶二南邁周召之風百辟形金石之詠者也碧流日暖南山雪殘首獻之浹辰暮春之提日帝京形勝借上林而入遊戚里池臺就倄竹而開宴泉賙御府味給天厨仙倡宥樂中貴督酒太平佳事前史未書大矣哉一德日新九功惟叙運璿樞而均四氣握金鏡而靜萬方堯舜湯文不違顔於咫尺䕫龍伊吕共接手於朝廷不可見而見焉不可聞而聞焉豈深思勝殘去殺累百年之至仁推厯按圖啟千齡之昌運河清難得人代幾何擊壤之懽良有以也此則青門上路朱邸平臺城烟屢起而泊山野風時來而過水春将悵别愛落花之灑途夏如欣㑹玩峯雲之映沼爾其列筵授几分曹設幕艇送江鳬舩迎海鶴魚龍九劍曼延揮霍鸞鳳鳴簫鼔作申錫開於百甕慈心出於三爵炮炙熏林塘醪醴厭邱壑抃急管於無筭醉湛恩以取樂羣公賦詩俾僕題序長卿痟渇覺含毫之轉遲子雲壯夫見雕蟲之都廢敢憚鄙詞之訥澁恐貽盛集之蕪穢云爾集賢殿書院奉勑送學士張説上賜讌序張九齡集賢殿者本集仙殿也上惟睿作聖而猶垂意好學用相必本於經術圖王亦始於師臣及乎鴻生碩儒博聞多識之士自開元肇建以迄於今大用徴集煥乎廣内而聽政餘暇式讌在兹忠臣嘉賓得盡心之所聰明文思有光被之德故下以道親上亦懽甚即於御座爰發德音以為候彼神人事雖千載傳於方士言固不經遂改為集賢去華務實且有後命增其學秩是以集賢之庭更為論思之室矣中書令燕國公外弼庶績以奉沃心之謀内講六經以成潤色之業故得出入華殿師長翰林惟帝用臧固天所賴拜命之日荷寵有加降聖酒之罍頒御厨之膳食以樂侑人思德飽時則有侍中安陽公等承恩預焉學士右散騎常侍東海公等攝職在焉或稷卨大賢淵雲諸彦文王多士周室以寧武帝得人漢家為盛而髙視前古獨不在於今乎咸可賦詩以光鴻烈泉州席史君宴邑中赴舉秀才於東湖亭序歐陽詹貢士有宴我牧席公新禮也貞元癸酉嵗邑有秀士八人公將薦之於闕下古者相覿相祖有享有宴享以昭恭儉宴以示慈惠二典為用鮮或克兼諸侯升俊造於天子遣之日惟行鄉飲酒之禮則享禮也胾肉𤣥酒莫飲莫食公念肉不使食則仁不下浹酒不使飲則懽不上交方欲激邦俗於流醨致王人於德行而賢者仁未伊浹才者歡未我交其若蚩蚩何秋七月與八人者鄉飲之禮既修乃加之以宴餚移已膳醴出家醖求絲桐匏竹以将之選華軒勝景以光之後一日遂有東湖亭之㑹公削桑梓之禮執賓主之儀揖讓升堂雍容就筵樂遍作而情性不流爵無筭而儀形有肅鏘鏘焉濟濟焉於是老㓜來窺盡室盈岐非其親懿則其閭里皆内頌而選善焉於戲行其教不必耳提而口授移其風不必門扇而户吹公斯宴則風移教行其間矣真盡心竭誠奉主化民之宰也烟景未暮酒德俱飽有逡巡避位而言曰夫詩者有以美盛德之形容君侯因片善附小能迴一邑之心成一邑之行昭吾人恭儉於嘉享示吾人慈惠於清宴迴人心成人行周孔之才也昭恭儉示慈惠管晏之賢也不有歌詠其如六義何是日人有甘棠頖宫之什客有天水姜閲河東裴㕘和潁川陳詡邑人濟陽蔡沼佐贊盛事亦獻雅章小子公之甿幸鼓㣲聲先八人者鳴捧豆伺徹時在公之側覩衆君子之作遂作卜商之後書其㫖暮春太師左右丞相諸公於韋公逍遥谷讌集序王維山有姑射人盖方外海有蓬瀛地非宇下逍遥谷天都近者王官有之不廢大倫存乎小隠跡崆峒而身拖朱紱朝承明而暮宿青靄故可尚也先天之君俾人在宥歡心格于上帝喜氣降為陽春時則有若太子太師徐國公左丞相始興公少師宜陽公少保崔公特進鄧公吏部尚書武都公禮部尚書杜公賓客王公黼衣方領垂鐺珥筆詔有不名命無下拜熙天上者坐而論道掌邦典者官司其方相與察天地之和人神之泰聽於朝則雅頌矣問於野則賡歌矣乃曰猗哉至理之代也吾徒可以酒合讌樂考擊鐘鼓退於彤庭撰辰擇地右班劒驂六騶畫輪載轂羽幢先路以詣夫逍遥谷焉神臯藉其綠草驪山啓於朱户渭之美竹魯之嘉樹雲出於棟水環其室㶚陵下連乎葉地新豐半入於家林館層巔檻側逕師古節儉惟新丹堊巖谷先曙羲和不能信其時芳卉後春句芒不能一其令桃逕窈窕蘅臯超忽驂御延佇於叢薄珮玉昇降於蒼翠於是外僕告次獸人獻鮮罇以大罍烹用五鼎木器擁腫即天姿以為飾沼毛蘋蘩在山羞而可薦伶人在位曼姬始縠齊瑟慷慨於右座趙舞徘徊於白雲衮冕松風珠翠烟露日在䝉汜羣山夕嵐猶且濯纓清歌據梧髙詠與松喬為伍是羲皇上人且三代之後而其君帝舜九服之内而其俗華胥上客則冠冕巢由主人則兄弟元凱合是四美同乎一時廢而不書罪在司禮竊思楚傅常詣茅堂之居仰謝右軍忽序蘭亭之事盖不獲命豈曰能賢蕭尚書拜命路尚書就林亭宴集序潘炎文昌貴臣新受厥服再拜稽首對揚休命逶迤而退則展慶賀之禮下舍之閑則懷宴語之好所以昵僚友宣寵光敵者易親懽焉而至是以蕭公膺納言之職路公徴賀遷之㑹泊冢宰司寇作者三人國老如塤箎之和陽春属星烏之序欣榮相合辰當美景形制所選地從主人窮土木之幽荒尋柏亭之竒構賓主有禮㫖酒以柔之清言以發之庖盈而不侈筵肆而不雜狎而不黷酣而不流有太平君子之光是可乆賢人之德風調日暖烟靄無隂松茂草滋泉石通氣鶯出幽而初囀花含愁而将歸外物獻美中懷有融髙興格干丹霄餘恩垂乎清晝四座相顧請予所尊悦題賦詩無忘盛集集韋庶子宅序顧況昔雒下鄴中蘭亭峴首文雅之盛風流之事盖一方耳今席有芳樽庭有嘉木飲酒賦詩皆大國聖朝羣龍振鷺握蘭佩玉者也在古其有陋乎在今其有榮乎終讌一夕寄懐千載是時也暮春駘蕩孟夏恢台之交耳蓬池褉飲序蕭頴士褉逸禮也鄭風有之盖取諸勾萌發達陽景敷煦握芳蘭臨清川乗和蠲絜用儌介祉厥義存矣晉氏中朝始㕘燕胥之樂江右宋齊又間以文詠風流遂逺鬱為盛集焉若夫華林曲水萬乗之降也蘭亭激湍専城之踐也而方伯之懽未始前聞以俟乎今辰粤天寶乙未暮春三月河南連帥領陳留守李公以政成務簡方國多暇率府郡佐吏二三賓客悵飲於蓬池備祓除之禮也梁有蓬池上矣前迄溵穎右滙郛邑渺瀰淪漣盪日澄天舟楫是臨泛波景從其左則遥原縈屬崇岡傑竦嘉卉異芳雜樹連青即為臺亭登眺斯在爾乃郡曹頒鏹以給費縣吏領徒而倄頓先夕以定議詰朝而集事是日方牧乃擁車徒曳旌旃夘出乎北牖辰濟乎南川匪疾匪閑翼翼闐闐以税駕於東焉然後降春流颺綵舟羽觴芳羞緩舞清謳援青蘋駭紫鱗迴環中汀􅃡望南津飫於已酣於未歌樂只賦既醉坐闌而靡怠日入而未闋陶陶乎有以表勝境佳辰之具美名公好事之厚意下客不敏聞於前載曰夫德洽禮成則詠歌繫之梁故魏也詩皆賦詩志焉洛陽鄭少府與兩省遺補讌韋司户南亭序王維惟帝克辟惟股肱克左右庶績允釐有司多暇舉無違德孰獻其可雖列侍丹陛而罕伏青蒲攄懷致館㶚陵南望曲江左轉登一級而鄠社如近盡三休而天地始大凝氣向晦蒼蒼寒木式與汝歌多酌我酒墨客既序親當獸炭膳夫交馳屢奏鮮食夫含德之厚與時皆化拂衣而放則野人於小隠之中束帶而朝則君子於大夫之後何軌轍一境是非外物哉且騎有羈勒徒有次舍可以永日可以繼夜客非詩人之徒歟奚其嘿矣江陵陸侍御宅讌集觀張員外畫松石序符載六虛有精純美粹之氣其注人也為太和為聰明為英才為絶藝自肇有生人至於吾儕不得則已得之必騰凌夐絶獨立今古用雖小大其神一貫尚書祠部郎張藻字文通丹青之下抱不世絶儔之妙則天地之秀鍾聚於張之一端也耶初公盛名赫然居長安中好事者卿相大臣既迫精誠乃持權衡尺度之跡輸在貴室他人不得誣妄而覩者也居無何謫官為武陵郡司馬官閒無事從容大府士君子由是往往獲其寶焉荆州從事監察御史陸澧字深源洎令弟曰㶚曰潤曰淮皆以文行穎耀當世故含藻藴竒之士多遊其門焉秋七月深源陳讌宇下華軒沉沉樽爼靜嘉庭篁霽景踈爽可愛公天縱之思歘有所詣暴請霜素願撝竒蹤主人奮裾嗚呼相和是時座客聲聞士凡二十四人在其左右皆岑立注視而觀之員外居中箕坐鼓氣神機始發其駭人也若流電激空驚飈戾天搉挫斡掣撝霍瞥列毫飛黒噴捽掌如裂離合惝恍忽生怪状及其終也則松鱗皴石巉巖水湛湛雲窈眇投筆而起為之四顧若雷雨之澄霽見萬物之情性觀夫張公之藝非畫也真道也當其有事已知夫遺去機巧意㝠𤣥化而物在靈府不在耳目故得於心應於手孤姿絶狀觸毫而出氣交沖漠與神為徒若忖短長於隘度筭妍蚩於陋目凝觚䑛墨依違良乆乃繪物之贅疣也寧置於齒牙間哉於戲由基之弧矢造父之車馬内史之筆札員外之松石使其術可授雖執鞭之賤吾亦師之如不可求從吾所學則知夫道精藝極當得之於𤣥悟不得之於糟粕衆君子以為是事也是㑹也雖蘭亭金谷不能尚此或闕歌頌取羞前人命鄙夫首敘諸公得揮其宏思耳魯山令李胄三月三日宴僚吏序歐陽詹三月三日有酒食出於野曰褉飲古俗也有唐今上御宇之九年年定三節一以二月一日曰中和取九月九日曰重陽次取此日之褉飲賜羣臣大宴登髙臨川與時所宜洎四方有土之君亦得自晏其僚屬貞元十二年季春月既魄一日則其日也臨汝魯山令趙郡李胄恭國令宴於縣南滍濱先宴曰夫宴者古所以示慈惠而期合懽者也國家錫以斯宴者情亦古情焉況食在充腸不在充目酒在成禮不在溺神歌發其所和自舞發其所自樂窮八珍竭干鍾彊發揚課絲竹則有勞有逸豈合歡之意歟於是首設一席肉一肩酒一壺命自天子命為佐者次一席酒肉亦如之命自己命以為吏者次一席酒肉亦如之命鄉閭許以耆年有徳者肉既飽酒既醉因化育之宿洽有歌謡者進有蹈舞者作皆誠乎中章乎形容婆娑慷慨與習而為者不類然後漁者請以其舟農者請以其器圃者請以其畜弋者請以其鮮啐濁甞漉浮泛漪瀾風恬日和川晴野媚以熙以恬萬心一之至義之門大順之家父兄子弟一族一堂之中不能過也非仁德淳化其孰能至於是耶旅遊之子實窺盛事兹宴也雖溥於天下百里不同風雨恐他邑之景物此辰不得似公之邑也一方不同教化恐他邑之懽樂此辰不得似公之邑也故叙之始得西山讌遊序栁宗元自余為僇人居是州恒惴慄其隙也則施施而行漫漫而遊日與其徒上髙山入深林窮迴溪幽泉怪石無處不到到則披草而坐傾壺而醉醉則更相枕以卧意有所極夢亦同趣覺而起起而歸以為凡是州之山有異態者皆我有也而未始知西山之怪特今年九月二十八日因坐法華西亭望西山始指異之遂命僕人過湘江縁冉溪斫榛莾焚茅茨窮山之髙而止攀援而登箕踞而遨則凡數州之土壤皆在袵席之下其髙下之勢呀然窪然若垤若穴尺寸千里攅蹙累積莫得遯隠萦青繚白外與天際四望如一然後知是山之特出不與培塿為類悠悠乎将灝氣以俱而莫得其涯洋洋乎與造物為遊而不知其所窮引觴滿酌頽然就醉不知日之入蒼然暮色自逺而至至無所見而猶不欲歸心凝神釋與萬化㝠合然後知吾嚮之未始遊遊於是乎始故為之序以志是嵗元和四年也清明日南皮泛舟序蕭穎士昔建安中魏文為王太子與朋友諸彦有南皮之遊颺鳴葭浮甘𤓰清泉奫淪千古一色此城隅託勝之舊也由小而方大則貴賤之懽可齊以今而喻古則風流之事不易矧乃日清明時升平甿庶阜海濱之利謳吟動齊右之曲亦明代一方之樂也邑宰東海徐君洎英僚二三皆人傑秀出吏能髙視郊驛繼當時之懽豪梁重莊叟之興相與矯翠帟騰清波紅粧屢舞綠醑徐進管絲迎風以響亮士女環岸而攅雜可以娛聖澤表人和也層城景移碧潭隂起蕩暄妍之氣色縱魚鳥之游泳其思夫闗塞崇崒昆池清泠闗河千里帝京不見斯興情之極致也爰命墨客紀他鄉之勝事云爾夏日諸從弟登汝州龍興閣序李白夫槿榮芳園蟬嘯珍木盖紀乎南火之月也可以處臺榭居髙明吾之友于順此意也遂卜精勝得乎龍興留寶馬於門外步金梯於閣上漸出軒户遐瞻雲天晴山翠逺而四合暮江碧流而一色屈指鄉路還疑夢中開襟危欄宛若空外嗚呼屈宋長逝無堪與言起予者誰得我二季當揮爾鳳藻飛乎鸞觴與白雲老兄俱莫負古人也春夜宴諸從弟桃園序夫天地者萬物之逆旅光隂者百代之過客而浮生若夢為歡幾何古人秉燭夜遊良有以也況陽春召我以烟景大塊假我以文章㑹桃花之芳園序天倫之樂事羣季俊秀皆為惠連吾人詠歌獨慚康樂幽賞未已髙談轉清開瓊筵以坐花飛羽觴而醉月不有佳作何伸雅懷如詩不成罰依金谷酒數遊雲門序梁肅上德以汗漫為友無江海而閒其次則仁智相從山水為樂故合志同方賢者有柴桑之隠遊道同趣吾徒有雲門之㑹其造適一也先㑹一日沙門釋去諠命我友相與探玉笥上㑹稽然後泝若耶過鳳林而南意欲脫人世之羈鞅窮林泉之遐奥於是捨舟清瀾反筞閑原逓杳靄而厯嶇􅀈入深翠以泛迴環遂至雲門觀其羣山疊翠秦望拔起五峰巉巉列壑沈沈上靡碧落旁湧金界其下則百泉㑹流蓄為澄潭涵虛鏡徹鳴瀨玉漱泠泠之聲與地籟唱和不待笙磬而五音迭作眺聽不足則凝思宴息怳然疑諸天樓觀列在咫步庭衢之中别有日月既而動步真境靜聆法音合漆園一指之諭詣淨名無住之本萬里如洗百骸坐空視松喬為弱䘮輕世界於棗葉盖道由境深理自外奨故也昔之逺公紀廬山謝客題石門道流勝賞今古一貫曷可不賦貽雲山羞乃各為詩以誌斯㑹同乎道者有隴西李公受髙陽齊霞舉約㑹未至亦請同賦此篇用廣夫游衍之致云序飲栁宗元買小丘一日鋤理二日洗滌遂置酒溪上嚮之為記所謂牛馬之飲者離坐其背實觴而流之接取以飲乃置監史而令曰當飲者舉籌之十寸者三逆而投之能不洄於洑不止於坻不沈於底者過不飲而洄而沈而止者飲如籌之數既或投之則旋眩滑汨若舞若躍速者遲者去者住者衆皆據石注視懽抃以助其勢突然而逝乃得無事於是或一飲或再飲客有婁生啚南者其投之也一洄一止一沈獨三飲衆乃大笑懽甚余病痞不可飲酒至是醉焉遂損益其令以窮日夜而不知歸吾聞昔之飲酒者有揖讓酬酢百拜以為禮者有呌號屢舞如沸如羮以為極者有裸裎袒裼以為達者有資金石絲竹之樂以為和者有促數糺逖以為宻者今則舉異是焉故捨百拜而禮無呌號而極不袒裼而達非金石而和去糺逖而宻簡而同肆而恭衎衎而從容於以合山水之樂成君子之心宜作序飲以貽後人序白舒元與今年子月月望長安重雪終日玉花攪空舞下散地予與友生喜之因自所居南行百許步登崇岡上青龍寺門門髙出絶寰埃宜寫目放抱今之日盡得雪境惟長安多髙我不與並日既夕為寺僧道深所留遂引入堂中初夜有皓影入室室中人咸謂雪光射來復開門偶立見沍雲駮盡太虛真氣如帳碧玉有月一輪其大如盤色如銀凝照東方輾碧玉上征不見轍迹至乙夜帖懸天心予喜方雪而望舒復至乃與友生出大門恣視直前終南開千疊屛風張其一方東原接去與藍巖驪巒羣瓊含光北朝天宫宫中有崇闕洪觀如甃珪疊璐出空横虛此時定身周目謂六合八極作我虛室峩峩帝城白玉之京覺我五藏出濯清光中俗埃落地塗然寒膠瑩然鮮著徹入骨肉衆骸躍舉若生羽翎與神仙人遊雲天汗漫之上沖然而不知其足猶蹋寺地身猶求世名二三子相視亦不知嚮之從何而來今之從何而遁不諱言不譆聲復根還始認得真性非天借靜象安能輔吾浩然之氣若是耶且冬之時凝沍有之矣若求其上月下雪中零清霜如今夕或寡某以其寡不易㑹而三者俱白故序之耳唐文粹卷九十七欽定四庫全書唐文