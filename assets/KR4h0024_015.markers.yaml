  - {type: variant, offset: 7674, length: 0, content: '', WYG: 與雲卿同遊邈不可得因叙疇年之素寄懐於篇李華搖槳曙江流江晴山復重心愜賞未足川迴失前峰凌灘出極浦曠若天地通君陽青嵯峨開坼混元中九潭魚龍窟仙成羽人宫隂奥潛鬼物精光動煙空𤣥猿啼深靘千定反楚越謂竹樹深者為靘白鷴戲葱蒙飛湍鳴金石激溜鼓雷風雨濯萬木鮮霞照千山濃草閒長餘緑花浄落幽紅渚煙見晨釣山月聞夜舂覆谿窈窕波涵石洶溶溶丹邱忽聚散素壁相奔衝白日破昏靄靈山出其東勢排昊蒼上氣壓吳越雄迴頭望雲卿此恨發吾衷昔日蕭邵遊四人纔成童華與趙七侍御驊故蕭十功曹穎士故邵十六軫未冠遊太學皆苦貧共弊同年三人登科相次典校邵後三人及第也屬詞慕孔門入仕希上公緯卿陷非罪折我昆吾鋒邵字緯卿以寃横貶卒南中茂挺獨先覺拔身渡京虹斯人謝明代百代墜鵷鴻蕭天寶末知亂棄官往江東殯𦵏先人逝于江南世故墜横流與君哀路窮逆胡陷兩京華與趙受辱賊中相顧無死節蒙恩逐殊封華貶杭州司功趙貶泉州晉江尉天波洗其瑕朱衣備朝容華承恩累}
