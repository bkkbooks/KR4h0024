front:
  text: 逺琬琰不刻豈前修博達者為邦之意乎貞義女者溧陽黄山里史氏之女也以家溧陽史闕書之嵗三十不移其志清英㓗白事母純孝手柔荑而不龜身激漂以自業當楚平王時王虐忠助讒苛虐厥政芟於尚斬於奢血流於朝赤族伍氏怨毒於人何其深哉子胥始東奔勾吴月涉星遁或七日不火傷弓于飛逼迫於昭闗匍匐於瀬渚捨車而徒告窮此女目色以臆授之壺漿全人自沈形與口滅卓絶千古聲凌浮雲激節必報之讐雪誠無疑之地難乎哉借如曹娥潛波理貫於孝道聶姊殞肆槩動於天倫魯姑棄子以郤三軍之衆漂母進飯没受千金之恩方之於此彼或異爾卒使伍君開張闔閭傾蕩鄢郢吴師鞭屍於楚國申胥泣血於秦庭我亡爾存亦各壯志張英風於古今雪大憤於天地㣲此女之力雖云為忠孝之士亦焉能咆哮烜爀施於後世也望其溺所愴然低迴而不能去毎風號吳天月苦荆水響象如在精魂可悲惜其投金有泉而刻石無主哀哉邑宰滎陽鄭公名晏家康成之學世子産之才琴清心閒百里大化有若主簿扶風竇嘉賓縣尉廣平宋陟丹陽李濟南郡陳然清河張昭皆有卿才霸略同事相協緬紀英淑勒銘道周雖陵頽海竭文或不死其辭曰粲粲貞女孤生寒門上無所天下報母恩春風三十花落無言乃如之人激漂清源碧流素手縈彼潺湲求思不可秉節而存伍胥東奔乞食於此女分壺漿滅口而死聲動列國義形壯士入郢鞭屍還吳雪恥投金瀬沚報徳稱美明明千秋如月在水
