body:
  text: 古賦乙摠二首京都西都賦李庾東都賦西都賦并表李庾臣伏見漢諸儒若班固張衡者皆賦都邑盛稱漢隆當王道昇平火徳丕赫數子歌咏發著後代今自隋室遷都而我宅焉廣狹榮陋與漢殊狀言時則有六姓千齡之變言地則非秦基周室之故宜乎稱漢於彼述我於此臣幸生聖時天下休樂雖未及固衡之位敢效臯陶奚斯庶㡬之誠謹冒死再拜獻兩都賦凡若干言以詘夷漢者昭聞我十四聖之制度請付史氏賦曰洛汭先生客于上京問里人以秦漢咸陽故事里人曰先生不習乎哉秦址薪矣漢址蕪矣西去一舍鞠為墟矣代逺時移作新都矣先生曰賓者不識藐然沈懵嵗亡而日逺願聞古而知今為我源説恭承玉音里人曰昔者帝兆唐居命隋先基乃假隋權是開中原既權二年為唐遷都周榛秦莽平蕪枿餘文驅煬迎卒于侑傳若天使項氏死勞而授漢休也唐開禪壇新都之門闢殿乾宫以朝諸侯時則有若房魏作弼英鄂執律南陽故人河間帝室戎衣既税瑞氣洋溢讙聲傳于億兆煬燎致乎太一乃㑹漢酺發周賚謐萬類渟四海遂開國以報功差子男之五等然後構閣圖形榮號凌烟指河帶以山礪書天子之搢紳其制度也擁乾休正坤儀平兩曜據北辰斥咸陽而㑹龍首右社稷而左宗廟宣達周衢址以十二棊張府寺局以百吏環以文昌二十四署六部提統按星分度儼憲臺而西列肅隂宫於北戸建倍員於前王摠維綱于御史端國儀朝實周察乎左右其内則有太極承端通址含元日出東榮月沈西軒倚九嵕之下麓涵太液之清瀾龍道雙迴鳯門五開烟籠凝碧風静蓬莱東則左閣當辰延英耽耽宣徽洞達温室隅南接以重離綿乎少陽是為二宫複道􅃉廊西則月華重啟銀臺内向中書在焉密用宰相宦者别省延縁右藏建子亭於屏外設蘭錡于廡下天子端朝明庭九賓發少府之冕旒陳奉常之官勲肅勾陳以辟䕶翼雉扇而對分雞人乃下鶴鳴先聞千官就日萬品趨雲漏遲遲而東轉風習習而南薰外則國子招徒疏館開軒左立太學前惇廣文膳豐中厨就教九年稽以博士總之成均秘書典籍品命校郎横閣三重闡正鈆黄若六藝之條貫百氏之縱横交錯發論禮形而樂聲太傅在前少傅在後載言載筆出納謨誥鵷動鸞飛振玉鎗金殷廟羞瑚璉之器楚材慙杞梓之林已而爕和隂陽經緯天地採摭軒昊牢籠虞夏闢孔子之學堂敷一代之風雅此王者之文教也親兵百萬制以神䇿紫身豹首金腰火額獵霞張斾剥犀綴革奮目如虎眦振髯而蝟磔柔六鈞貫七札對天仗以司戈分玉墀而執㦸别有陳旌賜鉞閫外四七依榆闗以作鎮拒栁營而開壁逐虜則出塞飛塵伐叛則救陽作澤此王者之武威也唐禮既行三代同風徴叔孫之春官命伯夷之秩宗則有封禪巡狩謁天拜祖明堂辟雍王者之事有司勿失次有朝廷之位班爵之序器服車馬以節文武不僭不濫羣臣之事有司以告下有内族外姻以殺以隆五禮各殊陳吉儀凶一室是形天下大同百姓之事有司以教故以内則敬以外則嚴以家則肥以國則昌卿士翼翼公侯皇皇在野熙熈在朝蹌蹌夫如是夸周而正魯胡可殫詳洎乎樂之設也以徳配樂陳器以作革木匏竹簨􅒶磬鎛命官二署諧以協律以奏廟貌祖考来格以陳宫庭簫韶九成鳯凰来儀以布天下手之舞之足之蹈之及乎御𦙍衣集舞童或獻凱作名以宣帝功或布字綴行以達皇風此禮經之所未紀夔戛之所不同刑期無刑辟以止辟三章寘漢祖之徳肆赦緩穆王之法於是天子御端門詔天下渙汗發澤與民更始建金雞於仗内聳修竿而掲起其下則税三闗觧銀鐺追共工徙驩兠煦舜弦浹堯年臺收白簡吏閣丹筆摠秋官之計料不踰乎三十斥匡衡之失論罪温舒之不足司刑無鬼哭之庭大理有烏巢之獄又若薦祖建宫𤣥元之庭霞帔雲冠飄飄太清天子將有事也嵗豆時籩夏簋殷鉶傳金爐之御烟開甲帳之琳琅此王者之示孝也對里連街帝宅王家青門列檻棠棣分華勤政外名花蕚中題屹雲中而佩鳯杳天外而舒蜺於是天子設席千羞百醴家人齒筵愉愉濟濟此王者之示悌也盛則長隄砥平錯則纓弁繁夥佩印分魚九參六佐肅威儀於行盖指戒途於前馬待漏未開朝騎沓街雞鳴朱邸火度青槐先導擘雲後車奮雷逓以嚴聲不生微埃人寒勿慄統以京尹臨人柄殺罔敢不謹豪家戚里金張許史走騎如龍行車若水拉枯請命曽不仰視配前王與後趙固異代而殊擬其地勢也負秦章臺倚漢甘泉帶涇渭之富流挾終南之夀山指重城之二華拓外門於兩闗𤣥素交川灞滻在焉􅍘虹偃蹇而亘梁施輪走驟而蹄奔度萬國以向朝趨魏闕之通門赤縣統劇停阡帝鄉長安萬年乾封明堂監田左掎鄠杜前張分坼連平馮翊畫郊接乎岐陽排吳山而抵蜀亘氐谷而通商天子穆清環衛陳兵將軍之號三蕃六營至乃辨曉警昏主在金吾鼓列六條外傳通衢備以嚴兵羅以周廬禁動息人用戒不虞其中則御水分溝昆明下流在野決溉入宫環洲菰織蒲紉芰贄菱羞渚戯𤣥鷁沙眠白鷗其逺也深有蛟潭沠作龍湫涘接河漢波通女牛其近也方塘含春曲沼澄秋戸閉烟浦家藏畫舟爾乃農家東作厥土黄壤樹以桑柘翳薈乎南畝以秔以稌以黍以稷以輸太倉天子之儲土厚地中温寒以宜門多杖老室有蕃兒承化發謡帝力不知則有程鄭之家白闥朱軒崇基峻砌待駟髙門木秀茸葩紅舒緑繁挺碩果於華林育豐蔬於中園珠箔晝晴金釭夜明羅繡巾㡚鼓瑟吹笙譁族陳賓以樂乎太平貨隧分􅌀物次駢連中署肆帥夕咽朝昏越璞楚琛蜀賄巴賨裁綺張繡紋軸蕉筒聲教之所被車書之所通交錯雜沓斯焉㑹同黄宅緇廬金篆玉扃以張帝居用壮天廷千形萬聲不可多名天子奉堯舜之道勤后稷之功當仲夏而獻繭立中和而視農然後黼黻時備粢盛告豐其接下情也則堯鼓不懸晉木不列鎔金作軌四門是掲人靡迷邦士無諱訐示收材而問眚上諫行而寃達當其萬國貢珍四夷納賮賦用舟通財因輦進地官計國度支主吝百姓既足斯焉充牣復若天府萬品以備供職登饌則光禄獻厨命駕則太僕承軾其樂人也大啟九門重開三殿齒羣官於次坐徴公族於内宴于以訓恭儉于以示慈恵戲族咸在百弄迭改眎仙童之霓裳覩壯夫之角觝御階晝隂帝座春深繽紛宫闥窈窕嬪林既受賜於逮昏盡拜帛而懐金與衆之樂一日于此先生獨不習乎其四郊也或有乗時之舊址亡國之遺蹤天子迎四氣衋然改容曰是足以懐傷於耳目作戒於心胸昔秦政肆刑秦民共傾楚澤大呼分隳列城徒罷驪山役休上林秦址既遷鴻門至今此東郊之事也隋苑廣袤罝籠南山占地萬頃不為人間齊門失耕禽㳺獸閑代謝物移繚垣不完此南郊之事也豐水悠悠文王作周傳艱子孫衰平遂遷乃睠鎬都武王宅居國失赧死豐鎬皆蕪此西郊之事也漢設五畤以主淫祀欒誑徐誣將求永乆天子親拜太牢黍牡事亡地存為天下笑此北郊之事也故因迎春則鑒秦敗知恃刑不如恃徳也因迎夏則鑒隋怠知獵獸不如獵賢也因迎秋則鑒周勤知祖基作艱傳萬年也因迎冬則鑒漢誤知去滛即正獲天祚也四鑒以陳澤于生人四徳以懋格于上下故我髙祖一呼大定安都居正傳今皇帝一十四聖是知禪國也禪都也非得隋之命是得天之命東都賦先生曰富哉言乎堯舜之事吾知之矣然天地旁魄奥區不一九衢六陌亦稱河洛始乎周卜今自隋革進八百里作唐東宅成者居者余得其故用悉聞見丕我王度子不識乎顛煬奮華中原毒痡順天應人文皇赫圖王充不來建徳相依阻我東人不蘇義旗髙祖西安文皇舞干一挂戎衣我人保完彭城獻級東功乃立則創業之事不獨于西也髙祖至天后朝匪伊是居於焉逍遥明帝大同出震開宫恩波爾鄉洩源于東則太平之事不獨于鎬也若乃周洛為池帶漕為沼洞八門之㑹要控二梁之夭矯在隋之始移劃前規之隘侈舊制之陋指半舍而新布乃集工而戒就重城不居萬盜齊構訖大業於義寧廓皇家而遜授既而天踵以正地産以實禎祥以紀嘉名不一表賢則河水變清瑞聖則洛圖屢出帝功既成封禪禮行顯祖光宗勒岱而祈嵩我甸我郊三聖之靈壇在焉赤縣神州與京比儔逕東山之貢賦扼闗外之諸侯直齊梁而駕輅引淮汴而通舟太行枕甸發址崇垓覃懐鎮封上干昭回鑿門導伊兩阜屏開育仁頥智堂隅庭隈爾其左掖通東右掖洞西籠故地之銅駞抱舊里之玉雞御溝接沠苑樹通堤抗鳯樓於内庭矗端門於天街上陽别宫丹粉多状鴛瓦鱗翠虹梁疊壯横延百堵髙量十丈出地標圖臨流冩障霄倚霞連屹屹言言翼太和而聳觀側賓曜而疏軒若蓬莱之真侣瀛洲之列仙鸞駕鶴車往來于中天嚴城曉啟千門萬戸建衛對營開扃接牖翠華在鎬分官以守監署惟三卿曺止九臺閣髙閌支馭東方乃俾二官别持憲綱赫若夏日凛如秋霜威動乎甌閩之國風行乎燕薊之鄉郊坼作國屯兵孟津千里無烟萬夫狺狺實兼武牢以食濟温惟是咽喉屬于将軍禮樂所流厥惟舊周追魯俗而為隣化殷頑而作柔異材挺擢多士優游原膴膴而耕溺水濺濺而洗由士得天爵孝稱行原身行大節里有旌門以繼前修以垂後昆榮一時之史籍聳當代之人倫兄友弟恭位皆崇榮石記標衢棣蕚為名螭首龜趺嶷峙雙形指兩馮而逺邁對二陸而遐征至若里巷之新名閭閻之近革或區區於傳説或瑣瑣於典冊非儆戒於將来何侈言之敢作且二誥尚存始卜惟艱四姓所都季年乃遷或得于聞或得于傳幸子勿譁試為子發乎齒牙里人曰諾先生曰郟鄏之地中居帝域賢相聖營龜符墨食成王定鼎以休姬徳三十承孫八百祚年祖功寖微衰平乃遷幽用婦烽諸侯疾怨夷元敬朔太史不頒百沠分波争涸其源汜水而鄭陽翟而韓晉盟河陽秦戍新安一旅之兵一雷之土嬴氏乗之不享文武此周之失都也南陽真人復運漢基舊邦惟新上稱康時光武而釀明醴和醨沖質不長桓靈自縱后戚立權内官分弄四星輝斗百桷摧棟陽弱隂强劉輕曺重此後漢之失都也魏丕徙許促齡四十強臣執柄三嗣徒立政由寗氏王髦莫奮瓦解土崩炎居奐遜此魏之失都也晉始三世亂興永嘉蕭牆搆兵沈閼稱戈浩浩逆流天下墊波八王既分五馬南奔左衽之裘乃来中原此西晉之失都也故權在諸侯則姬氏平權在内后則漢室傾權在强臣則魏狃權在親戚則晉走是四者各以其故權與勢移都隨鼎去從古如斯謂之何如世治則都世亂則墟時清則優偃政弊則戚居勿謂往代試言前載開元太平海波不驚乃駕神都東人誇榮時則轔轔其車殷殷其徒行者不賫衣食委衢冠冕之夫綺羅之婦百室連歌千筵接舞髙樓大觀陳賓宴侣金堂玉戸絲鳴管語我道如堯我税如貉貧庾而稻賤笥而裼比屋相視恥衣空帛開塲分賜不列麰麥同軌同文晝呼夜讙父懌子愉去徑即盤既兆既億動動植植無聲之樂薰然不息稽成康之周隆考文景之漢休攉代繫時不為彼優我俗既饒我人既驕安不思危逸而忘勞故天寳之季漁陽兵起逆旗南指我無堅壘匝甸鼙動衝天羯腥門開麗景殿據武成殺人如刈焚廬若薙蜀駕先移𦙍師後誓傷四年之委燼奮二將以建勲天落妖彗風摧陣雲及夫掃臺榭之灰收京野之骨徵郡國之版在驗地官之籍列太平之人已十無七八至徳復興六紀于兹七聖儲休平癰補痍故含識之士女植髪之童兒皆能痛其䘮亂而期我康時今四方之事叟不知也惟洛泱泱濱盈萬室惟城職職市鄽軿集比年大有稍蔵以實都人嬉賀有笑無慄咸曰将睹乎貞觀之風開元之日鄉里之人思萬乗之威儀幸物阜而時和指康衢而引領作望幸之賡歌歌曰曉雲行兮西風慶摇裔兮龍在中望雲光兮拜千百西澤霈兮均東澤里人曰誠哉是言前年日南至天子謁太清宫太廟郊天祀地既畢事執謙端珽謂公卿大夫曰予在人上厯祀三四年榖比登未及于富人庶稍蕃未臻于夀動殖小遂猶有枯夭日月所至猶照叛土戎狄雖貢西地猶虜今行大禮得不愧望于天而獻羞于祖是尚以聖政為憂未意於行幸也先生曰大哉為君用是言也理是事也則千里如郊萬里如圻在西而東均處内而外肥吾歸息鄉里之謡安堯舜之時将齊驅於夀域何近喜而逺悲則知鑒四姓之覆轍嗣重葉之休烈用是言也理是事也即所都者在東在西可也唐文粹巻二欽定四庫全書唐文粹巻三宋姚鉉編
