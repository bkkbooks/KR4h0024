body:
  text: 呉興姚鉉纂銘丙銘隂附揔九首宰輔七唐丞相逍遥公韋公墓誌銘張說唐丞相太尉房公德銘李華唐丞相太尉房公德銘之隂柳宗元唐丞相故太保贈太師韓國公苗公墓誌銘李華唐丞相太保致仕岐國公杜公墓誌銘權德輿唐丞相魏國公賈公墓誌銘唐丞相太子少師竒章公墓誌銘杜牧節制二唐盧龍節度副大使檢校司徒兼中書令彭城郡王劉公墓誌銘權德輿唐武昌軍節度使元公墓誌銘白居易唐丞相逍遥公韋公墓誌銘并序唐故中書令逍遥公韋氏諱嗣立字延構京兆杜陵人也受渾元之正性挺生人之秀傑門爲孝悌之府世處台衡之地士林之高標宗臣之首出者也生於秦之淸水長於鄭之成臯聦明先覺博古兼覽究蓬山之百氏綜闕里之六藝文而不華實而不滯原夫志在於易行在於禮守橐籥之沖虚播未弦之愷悌事有則而言有度神無方而用無體其與人也温艮善誘仁恕多容俾夫頑蔽開晢愎􅋧優從君子進道小人革慮聞者願來見者忘去若膏澤之浸陽和之感萬物不知其化矣及夫覆簣登朝濫觴宰邑聖朝知其周慎忠肅簡易循良是以綢繆兩禁重疊千里迄踐宰衡終厥有成凡化二邑里七郡三入中書再統兵部選兵吏各兩冬典樞密共五載光弼四主歷政三十有餘其間累有謗及官因左退日月蝕而更明隨和幽而不昧爾其爲邦設敎遵德閑邪身勤心苦誠感物化禮讓興於私室刑罰廢於公家衡鏡高懸文武矯首才無我失善若已有風流名敎作法垂後訏謨皇極功格天地茫茫蠢蠢旣生旣遂四夷來王五靈皆至然而外榮中素迹邇心遐杳然朱戸之若喪邈然赤松之可接西宴驪山之谷東息龍池之野擇逍遥而建號列土宇而開社即明主封立帝之謀表高臣之志也公考侍中爲國元輔公兄承慶當代齊名咸以令德繼和金鼎扶陽二相陳氏三君復追美矣侍中前夫人崔氏生黃門而即世後夫人王氏生公而偏愛公克諧以孝因心則友啓均養之德成無間之言天下之人比之祥覽惟公德行言語文學政事四者實揔而兼之事親養志而能爭居喪過哀而顧禮此又善中之善者也善人天之經也國之寶也道將興廢木鐸之用有時命或推移蒼生之望恒在春秋六十遘疾陳郡還醫洛師開元七年九月二日薨于歸德里有詔贈兵部尚書謚曰某禮也明年某月葬於某地有子孚恒濟史儡然在疚靡所寘哀以某忝縉雲之舊寮沐清風之餘論入難名之閫域窺妙德之形容見託銘誌庻傳精爽至於歷官次序平居事業當見郡府遺愛之碑國史名臣之傳故不存焉銘曰峩峩仁公抱孝含忠文獻則足高明有融翻飛王佐穆我清風道濟明時心樂幽地薜衣華衮坦然一致逍遥啓封帶礪傳祀生涯共盡振古其常人秉三德天歸百祥臧孫有後公業不亡唐丞相太尉房公德銘李華玄宗季年逆將持兵天錫房公言正其傾羣兇害直事乃不行慮起幽陵連覆二京帝慈蒸人避狄西蜀爰命監撫理兵北朔登賢爲輔讓子以續公賷冊書亦捧瑞玊聖人神聖天地咸若子孝臣忠元元踊躍命帥中軍謀殱羿浞人或有言志屈道行公曰不可屈則佞生柄不在公象昬曀明退師儲宫出守函谷入爲尙書正色諤諤又刺汾澮遽臨彭濮何負而東何負而西公受挫抑邦人悽悽帝懷明德俾我不迷徴拜秋官僉曰休哉薨殂閬中國瘁人哀喬嶽隕躓輔星昬霾天子洟涕迎崇上台巖巖岱宗瞻其峻極赫赫房公尊其盛德昔撫冝春列邦是式建銘江濵以慰南國唐丞相太尉房公德銘之隂柳宗元天子之三公稱公王者之後稱公諸侯之入爲王卿士亦曰公有土封其臣稱之曰公尊其道而師之稱曰公楚之僭凡爲縣者皆曰公古之人通謂年之長老曰公故言三公若周公召公王者之後若宋公爲王卿士若衛武公虢文公鄭桓公其臣稱之則列國皆然師之尊若太公楚爲縣者若葉公白公年之長老若毛公申公涪公而大臣罕能以姓配公者雖僅有之然不能著也唐之大臣以姓配公最著者曰房公公相玄宗有勞于蜀人咸服其節相肅宗作訓于𡵨人咸尊其道惟正直慈愛以成於德用是進退所居而事理辨所去而人哀號理逺人逺人不勝其懷爲文士趙郡李華銘公之德亂不克立今刺史太原王涯嘉公之道猶在乎人人不忘公之道爲之刻石且曰州之南有亭曰需宴亭公之爲也人之思也乃增飾棟宇即而立焉州人大恱咸㑹隕涕言曰昔公以周召之德微子之仁有土封以爲卿士道爲三公德爲國師年爲元老甞爲縣縣懷其化至于州州濡其澤凡我子孫罔不戴纂盛德之詞文而不刻更刺史數十莫克興起乃率歸於王公公甞以機密匡天子于禁中承公之道刺於我邦由公之理又能尊公之德起遺文以昭前烈則其入爲卿士三公也孰曰不冝吾懼其去我也遽願書于銘之隂用永表于邦之良政唐丞相故太保贈太師韓國公苗公墓誌銘并序李華永泰元年四月戊子唐舊相太保韓國公薨天子輟朝羣臣出次五月壬午贈太師七月丙子詔使中謁者莅祭京兆少尹護喪龍旗輤車鹵簿哀導加于一等園塋封樹碑版垂後盛于當朝葬我韓國公夫人名本於宏才非此運不揚元勲出於忠烈非死之中登日月九天之上乾坤閉而復闢鈞軸折而再駕故肅宗皇帝於行在見公曰欲求良弼其在兹乎公諱晉卿字元輔上黨壼關人祖襲夔贈太子太師父殆庶贈禮部尚書公成童好學弱冠工文二登甲科三入高等始自郡邑臺省之任終乎廊廟台輔之器至如牧四郡使四道在人爲政之絶跡於公能事之常格故不足敘天寶之末胡羯亂常公身在陷穽心圖遼廓謁至尊於幕殿議大計於轅門天子壯之拜爲左相公于時與兵部尚書汾陽郡王經略大業翊賛中興公撫於内汾陽營於外克二京復九廟尊先帝返上皇公之功也乾元二年元兇授首陳希烈等四十八人議在殊死公抗䟽上論以四方猶虞罪當寛宥三司質定其事不行於戲慶緒之誅也不用公議使有思明之難朝議之減復行公計果今天下大安仁人之言不可巳巳上元二年玄宗升遐詔公攝政肅宗違代令公當國道合君臣時契雲龍於二主功高宇宙德鍾社稷於一身夫平計之勃安之揔有平勃之勲伊攝之霍立之再當伊霍之任人臣貴極今古罕儔公晚嬰衰疾屬辭樞務遂得特紆聖眷俯降臣禮赤墀之下杖䇿來朝宣室之中肩輿入見此則明主上德而屈體忠臣感恩而忘形君臣之閒斯爲盛矣無何有詔冊授太保軍國大務仍咨訪焉公至和爲心太素爲體以虚舟應物世累不能干其神以公器濟時江海不能開其慮故軒裳鍾鼎於我如浮雲大位遐年在生爲逆旅享年七十有七歷任二十有四順如也夫人韓國夫人博陵崔氏詩書之門金玉其度先公而殁今則祔焉嗣子發丕堅粲垂向吕稷望咸等並强學懿文保家繼代忠足以勵行孝足以揚名敘德立銘願昭先烈掌文之客敢忘大猷其詞曰有唐宗臣爲國元老清明淳粹全德體道磊落臣節深沈廟謨智能逃難忠則忘軀幽薊弄兵咸秦振蕩舉族南棄拔身北嚮一見先皇其言甚壯指麾籌畫爰立作相天地反正蒼生之望伊昔南狩衣冠下從三司獻議萬乗將同諌書一出天下稱公二聖登遐萬方是荷聖皇在闇務輟宸坐稱政臨朝非公不可彼蒼不仁殱我鼎臣天歸說夢嶽降申神嵯峨碑版突兀封樹嗚呼相國韓公之墓唐丞相金紫光禄大夫守太保致仕贈太傅𡵨國公杜公墓誌銘并序權德輿有唐元老太保岐公諱佑字君卿年七十八以得謝之歲歲十一月辛未啓手足京師安仁里皇帝恤然不視朝三日冊贈太傅弔祠加恩明年夏四月乙酉返眞宅于少陵原大墓公之先自漢建平侯晉當陽侯而下忠賢閒出積厚昌大以至曽王父行敏皇銀靑光禄大夫荆益二州大都督府長史南陽郡公王父慤皇中散大夫尚書右司貟外郎詳定學士父希望皇銀靑光禄大夫鴻臚卿恒州刺史西河郡太守飾終三加至尚書左僕射公揔中龢之粹靈蹈明哲之大方體仁以長人厚德以載物器周代資材爲國華程功積事博達弘𥙿在玄宗朝以門子筮仕解巾有聲在肅宗朝以郡掾廷吏賢侯交辟俄以臺郎御史二千石事代宗以六軄之貳十聮之重兵符相印事德宗初自度支郎歲中拜小司徒時當艱急政有均節持權者排陷改蘇饒二州刺史以亞丞相顓政南方入居左轄出典侯服旋委節旄貞師淮海凡居鎭十五年歷禮刑二尚書乃進左揆爕和大政拜章來朝兼理公台綢繆樞極在帝左右順宗諒闇公攝冡宰因山復土專護其任進掌五教乃平九賦永貞内禪公奉典䇿今上繼明眞授司徒備物采飾襃優章灼推致四時之和茂明萬物之冝初公來朝之明年年及懸車抗章告老三上不允厥後詔公毎旬一朝訪決重務以公年與德耆尊禮不名後再歲天子憫煩公以官軄之事思遂堅請禮優師臣大雅稱方叔元老且非宰政東漢之胡公中庸不理藩服曷若公都將相之重兼文武之全三代論道兩朝揔巳搢紳瞻仰者凡六十年致位就第極其榮號隆其五福闇然得之在臨川有愷悌之化涖南海有威懷之略自淮而南興事任力三邦之人類有聲詩炳如嵩華刻在金石公旣當安危注意之重一人倚賴急宣密啓多所交感嘉保太平承寧諸侯或惡其煩言或導其善氣損怨服義日用不知至有執介圭朝象魏冠功臣之表近天子之光爲時龜龍公所樞柅喜士容物羣而不黨理遣情恕犯而不校一言定交死生以之趨人之急唯恐不及不徼福不乞靈物怪氣燄不接於心術誠明坦蕩自得於天理中正之外無自入焉國門南出杜陵故地畎清流䟽灌叢觴斚引滿金絲合奏時賢儁人結轍在門極謝安之林墅異陸賈之裝櫜鄕耋時㑹鷗鳥不驚又以見公放懷推仁無不逮也至若閱天下之義理究先生之法志著通典二百篇誕章閎議錯綜古今經代立言之㫖備焉凡推轂之士繇幕廷而奮迅者近於百輩將相六軄左右曹臺以至列藩二千石不可勝書夫人安定郡梁氏蘇州常熟縣令㓜睦之女也專柔淑愼動有儀矩先於公殁幾三十年矣嗣子司農少卿師損與其弟昭應縣令式方駕部貟外郎從郁等皆以材能孝謹爲卿大夫元士推擇之際以吏資廕庥之下咸有淑聲儼然摧剥相眩無怙誠信哀敬實加於人以德輿甞沗府辟晚聮台座毎荷同升之義盍陳無愧之辭直書德輝以鏤幽礎銘曰君子之用可以大受斤斤𡵨公祗事三后謨明盛時其道甚夷乃將乃相乃公乃師六府龢平五福叢滋齊之温良商之慈愛推本性術發舒光大宣力中外勤勞翼戴懸車乞身知進知退歲在大梁月生一陽以佚以息忽乎茫茫廞襚納書禮優職襄和氣在上昭明發揚少陵鬱鬱蓍蔡恊吉宰木號風虞泉落日于嗟𡵨公居此玄室唐故金紫光禄大夫檢校司空兼尚書左僕射同中書門下平章事上柱國魏國公贈太傳賈公墓誌銘并序權德輿德宗皇帝享國二十有七年注意於將相之臣惟魏國賈公諱耽字敦詩始則四握兵符保釐節制終乃再踐師長爕和樞極文武致用實寧斯人景鍾書伐金鼎和味咸有一德用平太階奉綴衣之詔公始感疾先復土之期公乃捐館屬太上皇重公耆碩進加司空今皇帝憫公徽懿追命太傅春秋七十六佩相印一十三年前史稱賈生通達國體其孫嘉好學世其家其曽孫捐之建議深切漢元帝爲之罷朱崖郡皆其先古之有議論風節者也曽王父逺則皇長河尉生王父知義沁源主簿贈揚州大都督都督生烈考琰之燕居不仕贈尚書左僕射皆代德安貞延䊮于後公忠正仁恕極深研幾究今古於百氏窮地域於九譯乾元初寰海未靜褐衣危言始尉太平連辟大府三入御史府再爲尚書郎亞尹北都剖符西河嘉猷循行所涖居最大曆十四年冬十月繇大鴻臚貞師于梁恊力羣帥平夷江漢靑綬大封恒然光明進叅六職節制襄峴載㑹兵車撫征淮右徴詣行宫眞拜冬官明年以三后之任分正洛師加地進律察廉唐鄧復揔賦輿鎭于靈昌政成八稔愷悌淸靜於是膺審象之寄賛格天之業中外授受勤勞王家易坤之說曰地道也臣道也惟公有博載之量露生庻物書洪範之說曰强弗友剛克爕友柔克惟公推寛信之誠弼亮時化故其撫封也不尚禁厲不施皦察扶導善氣折銷未萌使貪者讓躁者靜四鄰敬之如神明闔境愛之如父母其作相也當先皇帝洪覆隂騭財成造化宗工儁老但以忠厚承淸光故公之揚休德煇涵泳無際藹然和平之運恬然易簡之道至若匪躬詭詞勞謙不伐者亦何可勝言坦夷而周宻廣大而絜靜聳善虚已求天下之才博聞强識通天下之志斯可及巳所著梁懷王傅碑先君子碑陳祖德以自況載家聲於可乆體要閎達邁乎羣倫撰海内華夷圖及論次地理之書凡五十有五編貢在中禁傳於域内言方志者以公名家被病更時屏絶毉術且曰吾以忠信爲丘禱死生爲天理一氣聚散斯焉順之美檟壽堂自爲終制憒然委化以啓手足推從古知命之士所難能焉夫人武功蘇氏駕部郎中守中之曽孫處士珣之女有柔儀淑行殁於中年二十有五年矣嗣子疇太常寺恊律即早夭次子疄太子司議郎少子㽥京兆府叅軍事馴行孝謹號咷毁瘠奉二尊堂帷合于九原刻兹樂石以永終古銘曰麟之儀儀鳯之師師有倬魏公發輝清時外揔方國掃除螟螣入居公台左右皇極於學無不通於士無不容穆如龢風叩若華鐘偉材閎議信以發志中行循性其道易易始於淸明紀號永貞維陽月之朔日兮返智氣於冥冥下旬逮半兮祖載于庭神歸古原兮閟此音形前直國門兮旁邇梁傅不忘本兮公之素笳簫啓路歸此壤樹嗚呼有唐元老兮魏公之墓唐丞相故太子少師竒章郡開國公贈太尉牛公墓誌銘并序杜牧唐佐四帝十九年宰相牛公諱某字某八代祖弘以德行儒學相隋氏封竒章郡公贈文安侯文安後四世諱鳯及仕唐爲中書門下侍郎監修國史於公爲高祖文安後五世集州刺史贈給事中諱休克於公爲曽祖集州生太常博士贈太尉紹太尉生華州鄭縣尉贈太保諱㓜聞太保生公孤始七歲長安南下杜樊郷東文安有隋氏賜田數頃書千卷尚存公年十五依以爲學不出一室數年業就名聲入都中故丞相韋公執誼以聦明氣勢急於襃拔如柳宗元劉禹錫輩以文學秀少皆在門下韋公亟命柳劉於樊郷訪公曰願一得相見公乗驢至門韋公曰是矣東京李元禮爲後進師隋竒章公仁德禄位二者包而有之公登進士上第元和四年應賢良直諌制數强臣不奉法憂天子熾於武功詔下第一授伊闕尉以直被毁周歲凡十府奏取不下伊闕滿歲郄公士美以昭義軍書記辟凡三上請詔除河南尉拜監察御史丁母夫人憂制終復拜監察御史轉殿中侍御史遷禮部貟外郎都官貟外郎兼侍御史知雜事改考功貟外郎集賢殿學士庫部郎中知制誥賜五品命服半歲遷御史中丞宿州刺史李直臣以贓數萬敗穆宗得偏辭於中稱直臣冤且言有才宰相言恪不用公以具獄奏上曰直臣有才可惜公曰彼不才者無飽食以足妻子安足慮本設法令所以縛束有才者禄山朱沘是才過人而亂天下上因可奏曰善賜章服金紫遷戸部侍郎掌財賦事上益親重欲相之㑹中書令韓弘男公武謀曰大人守大梁二十年齊蔡誅後始來朝今不以財援中外設有飛一辭者誰與保白公武賷弘書獻公錢千萬公笑曰此何名爲公亟持去明年弘公武繼卒主藏奴與吏訟於御史府上憐弘大臣父子併死稚孫將家事走中使至第盡取財簿自閱視凡中外主權多納弘貨獨朱勾細字曰某年月日送戸部牛侍郎錢千萬不納上大喜以指曆簿遍視旁側曰果然吾不謬知人言訖再拜殿上皆再拜呼萬歲尋以本官平章事明年正位中書侍郎加銀靑三品兼集賢大學士監修國史敬宗即位與武士畋宴無時徴天下道士言長生事公亟諌曰陛下不讀玄元皇帝五千言以淸靜養生彼道士皆庸人徒誇欺虚荒豈足師法未一歲請退不許連四月日間以疾辭乃以鄂岳六州建節號武昌軍命公爲禮部尚書平章事爲節度使公始至問民尤苦皆曰城土踈惡歲輸簾竹爲苫具奸吏旁縁主爲侵取費與稅等歲乆前後政欲畫計䇿訖無所施公即除去冗長用公私錢陶塼甃城凡五年乃就明年文宗即位加吏部尚書明年急徴拜兵部尚書平章事重拜中書侍郎弘文館大學士鄭注怨宋丞相申錫造言挾漳王爲大逆狀跡牢密上怒必殺公曰人臣不過宰相今申錫已宰相假使如所謀豈復欲過宰相有他圖乎臣爲中丞愛申錫忠良奏爲御史申錫心臣敢以死保之上意解由是宋不死大和六年西戎再遣大臣䞇寶王來朝禮倍前時盡罷東嚮守兵用明臣附李太尉德𥙿時殿劒南西川上言維州降今若使生羗三千人燒十三橋擣戎腹心可洗乆恥是韋臯二十年至死恨不能致事下尚書省百官聚議皆如劒南奏公獨曰西戎四面各萬里來責曰何事失信養馬蔚茹川在平凉郡西上平涼坂萬騎綴回中怒氣直辭不三日至咸陽橋西南逺數千里雖百維州此時安可用棄誠信有利無害匹夫不忍爲況天子以誠信見責於夷狄且有太患上曰然遂罷維州議大和六年檢校右僕射平章事淮南節度使經六年至開成二年連上章請休官詔益不許公曰臣惟退罷可以行心夏五月以兵付監軍使拜䟽訖就道除檢校司空留守東都明年拜左僕射上恐公不起詔曰朕比有疾良巳思一面敘公不得巳至闕下一拜謝閉門不出明年檢校司空平章事襄州節度使出都門賜黃彝樽龍杓凡六品名出周禮詔曰精金古器用以比況君子非無意也襄州七年饒假軍人入賦不一公至據地籍免貧弱四千萬均入豪彊皆曰甘心不出一怨言明年武宗即位就加司徒㑹昌元年秋七月漢水溢堤入郭自漢陽王張東之一百五十歲後水爲最大李太尉德𥙿挾維州事曰修利不至罷爲太子少師未幾檢校司徒兼太子少保明年以檢校官兼太子太傳留守東都劉稹以上黨叛誅死時李太尉專柄五年多逐賢士天下恨怨以公德全畏之言於武宗曰上黨軋在京控山東劉從諌父死擅之十年後來朝加宰相縱去不留之致稹叛竭天下力乃能取此皆公與李宗閔爲宰相時事從諌以大和六年十二月十七日拜闕下實以其月十九日節度淮南明年正月從諌以宰相東還河南少尹吕述公惡其爲人述與李太尉書言稹破報至公出聲歎恨上見述書復聞前縱從諌去疊二怒不一叅校自十月至十二月公凡三貶至循州貟外長史天下人爲公挼手咤罵公走萬里瘴海上二年恬泰若一無事今天子即位移衡州汝州長史遷太子少保少師凡四年復位大中二年十月二十七日薨于東都城南别墅年六十九天子恫傷不朝兩日冊贈太尉天下善人執手相弔哭公忠厚仁恕莊重敬愼未甞以此八者自勉而終身益篤爲宰相急於銓品凡名清官不忍持一資以假非其人以道德謨於天子毎指古義爲據有言機利克迫必鈲㓢使之摧破三大邦去苛碎條約除大患其輕巧吏欲賊公愛惡希嚮所爲渾然終不能見故所至必大治衣冠單窮出俸錢嫁其子女月與衣資送其死喪凡數百家李太尉志必殺公後南謫過汝州公厚供具哀其窮爲解說海上與中州少以異勉安之不出一言及於前事鎭武昌時軍容使仇士良爲監軍使公律以禮敬暑甚大合軍宴拱手至暮一不揺扇益自儉克平居非公事不出内屏周三歲語言舉止率有常度仇軍容開成末首議立武宗權力震天下毎言至公必合手加顙曰淸德可服人但過恡官財與人無一毫恩分耳不肯引譽不敢怨毁淡居其中公始自河南薦郷貢仕爲郎官考吏部科目選三開幕府中丞宰相外凡取六十餘人上至將相次布臺閣皆當時名士每暇日讌語寮吏必言古人脩身行事旁誘曲指微警教之不以已所長人所不及裁量高下以生重輕後進歸之承望聲光得一言許可必自矜重夫人辛氏以公封張掖郡贈僕射祕之長女士林稱爲婦師凡三十年前公八年殁五男六女長曰蔚監察御史次曰叢浙南府協律郎皆以文行登進士第不藉公勢次曰奉蒨河南府洛陽尉二人皆稚齒長女嫁戸部郎中上黨苗愔次女嫁河中節度副使檢校郎中范陽張洙次女嫁河南府戸曹集賢校理常山張希復次女嫁前進士鄧淑次女未笄一人始數歲以某年月日葬少陵南某郷某山里銘曰道旣訛衰必有以扶厥公之生以隆其洿幽以獨明暵以雨濡以敎其徒以佐天子滅絶霸駮如有樞柅標揭峙倚巍乎二紀臣宗德老鉅傑魁礨孰爲忌畏譖去南海不校不辨牽復顯大百行渾圎隣於及年以歸其全故幽州盧龍軍節度副大使知節度事管内支度營田觀察處置押奚契丹兩畨經略盧龍軍等使開府儀同三司檢校司徒兼中書令幽州大都督府長史上柱國彭城郡王贈太師劉公墓誌銘并序權德輿析木之下幽陵碣石融結絪緼誕靈熊渾乃生元臣以翼大君惟彭城郡王宣力三代撫封四紀在德宗朝纂服舊勞以亞丞相得顓征伐冬官夏卿再踐六職乃列台宰乃居師長在順宗朝論道進律就加司空又拜司徒今皇帝聦明齊聖襃厚功德權侍中中書令綢繆樞衡臨長諸侯玄衮赤舄崇其物采九命二伯極其名器勲猷備其賛書始終焯於代家五年秋七月寢疾薨于莫州之廨舍享年五十四冬十月歸全涿州良郷縣之某原追錫太師不視朝三日命諌議大夫弔祠法賻廷尉卿持節禮冊又詔宰臣德輿銘干壽堂所以加恩報勞始終滲漏之澤也公姓劉氏諱濟字濟之蜀昭烈皇帝二十一代孫曽祖弘逺皇檢校司衛卿臨洮軍使襲彭城郡公贈永州刺史祖貢皇特進左金吾衛大將軍贈揚州大都督父怦皇幽州盧龍節度觀察等使御史大夫贈司徒㳟公公承是覆露生而𡵨嶷深而通直而和弘毅忠肅端明温重固巳藴絶人之姿挺希代之器始以門子橫經游京師有司擢上第叅幽州軍事轉兵曹掾歷范陽令考績皆爲府中最興元初以太子家令爲莫州刺史以御史中丞爲行軍司馬凡吏理之慰薦輿師之拊養如良庖之無晵肯翳良農之無滅裂司徒即代有詔奪情節哀順變講信修睦先公之封畛盡在長帥之威惠畢舉比歲大旱蝝蝗爲災絜齋𬞞菲黙以心禱甘雨祁祁嘉生莓莓因其豐登示以班制古諸侯之令典靡不具焉貞元初烏桓誘北方之戎幸吾阻飢大聳邊鄙公先計後戰陳兵于郊乃遣單車使者誘掖教告繇是諸戎皆爲公用朝不庭方厥猷茂焉明年鮮卑墨乙之犯古漁陽其後啜刺㓂右北平公分命左右軍異道並出然後以中堅衝擊士不離傷師不留行深入其阻抵青都山下捕斬首虜以萬級獲橐駞馬牛羊無萬數十九年林胡率諸部雜種侵淫于澶薊之北公親統革車㑹九國室韋之師以討焉飲馬灤河之上揚旌冷陘之北戎王棄其國遯去公署南部落刺史爲王而還登山斵石著北伐銘以見志自太行巳東懷和四鄰或歸其天倫或復其地理警急則解其顚没居常則納諸矩度兵興巳來氣俗相因或以夸敗度或以美没禮比屋之人被縵胡而揮孟勞不知書術公乃修先師祠堂選㓜壯孝悌之倫春秋二仲行釋菜郷飲酒之禮生徒爼豆若在洙泗和門眈耽公署沈沈自從事掾史迨紀綱之僕庠序有倫采章不紊接士必下以詞氣推賢而容其出處隴西李益樂安任公叔皆以賔筵薦延至郎吏二千石近臣良守此又烈丈夫大君子曠度犖犖之爲也其於勤身𥙿物生聚教訓祁寒則頒之絮帛大歉則賑其倉廩一方之人蒙被惠和嘉祥交於動植孝順浹於州壤美化周行無不及焉去年冬王師問罪於常山公率先蹈厲累上功捷引義慷慨賦詩以獻詔宰司序引百執事屬和以美大之師次瀛州旣圍樂壽又遣支兵急攻安平三旬未下武怒益奮命其子緫以騎士八千先登公親鼓之士皆殊死戰亭午而拔誅屠無噍類蓋所以宣威制勝於可必也天子賜以寶劒金甲彤弓盧矢方董諸侯之師將覆其巢俄感厲氣隱机口占署緫軍司馬曰無以吾故而稽天誅悉召戲下以須王命俄而下霈然之詔宥罪班師加公寵渥巳至大病遺章悃款不及家事天下之人偉其忠勞緫以君命起於倚廬之中委重戎事由御史大夫爲工部尚書凡軍師之節制封部之廉察盡如㳟公太師之命焉茹荼雪泣祗服丕矩以國僑之遺愛知公業之不亡生極榮號没有愍冊揚名以繼志善訓以克家君臣父子之道斯爲至矣褒大臣所以尊王命懿武事所以恢天聲敢攄馨香以識㝠寞銘曰帝在法宫推心懋功洸洸彭城秉義納忠幽都朔易賜履來宅便藩渥命焜燿嘉績北戎病燕從古以然懷倈蕩定勇略昭宣爕和之重公作霖雨師律之嚴公爲齊斧廓開䘲沴振奮威武保大定功庇人尊主郄縠敦恱乃主成師善經義府公實似之北伐刻銘西征賦詩播於工歌列在鼎彞壯猷未極大暮如斯華首童牙辛酸涕洟義方紹續君命吉禄孝在無改恩延必復叅差輅葆澶漫陵谷勒石下泉幽玄昭燭唐故武昌軍節度觀察處置等使正議大夫檢校戸部尚書鄂州刺史兼御史大夫賜紫金魚袋贈尚書右僕射河南元公墓誌銘并序白居易公諱積字微之河南人六代祖巖隋兵部尚書封平昌公五代祖弘隋北平太守高祖義端魏州刺史曽祖廷景𡵨州叅軍祖悱南頓縣丞贈兵部貟外郎考諱寛比部郎中舒王府長史贈尚書右僕射妣滎陽鄭氏追封陳留郡太夫人公即僕射府君之第四子後魏昭成皇帝十五代孫也公受天地粹靈生而𡵨然孩而嶷然九歲能屬文十五明經及第二十四調判入四等署祕省校書二十八應制䇿入三等拜左拾遺即日獻教本書數月間上封事六七憲宗召對言及時政執政者疑忌出公爲河南尉丁陳留太夫人憂哀毀過禮杖而能起服除之明日授監察御史使于蜀按任敬仲獄得情又劾奏東川帥違詔條過籍稅又奏平塗山甫等八十八家寃事名動三川三川人慕之其後多以公姓字名其子朝廷病東諸侯不奉法東御史府不治事命公分臺而董之時有河南尉離扄從軍職尹不能止監察使死其柩乗傳入郵郵吏不敢詰内園司械繫人踰年臺府不得知飛龍使匿趙氏亡命奴爲養子主不敢言浙右帥封杖決安吉今至死子不敢愬凡此數十事或奏或劾或移歲餘皆舉正之内外權寵臣無奈何或不快意㑹河南尹有不如法事公引故事奏而攝之甚急先是不快者乗其便相噪嗷坐公專達作威黜爲江陵士曹掾居四年徙通州司馬又四年移虢州長史長慶初穆宗嗣位舊聞公名以膳部貟外郎徴用旣至轉祠部郎中賜緋魚袋知制誥制誥王言也近代相㳂多失於巧俗自公下筆一變至於雅三變至於典謨時謂得人上嘉之數召與語知其有輔弼才擢授中書舍人賜金魚袋翰林學士丞㫖尋拜工部侍郎旋守本官同中書門下平章事公旣得位方將行已志荅君知無何有憸人以飛語搆同位詔下按驗無狀上知其誣全大體與同位兩罷之出爲同州刺史始至急吏緩民省事節用歲收羡財千萬以𥙷租其餘因弊制事贍上利下者甚多二年改御史大夫浙東觀察使將去同同之耆㓜鰥獨泣戀如别慈父母遮道不可遏送詔使道呵麾鞭有見血者路闢而後得行先是明州歲進海物其淡蚶非禮之味尤速壞課其程日馳數百里公至越未下車趨奏罷自越抵京師郵夫獲息肩者萬計道路歌舞之明年辨沃瘠察貧富均勞逸以定稅籍越人便之無流庸無逋賦又明年命吏課七郡人冬築陂塘春貯雨水夏漑旱苗農人賴之無餓殍在越八載政成課高上知之就加禮部尚書降璽書慰諭以示旌寵又以尚書左丞徴還旋改戸部尚書鄂岳節度使在鄂三載其政如越大和五年七月二十二日遇暴疾一日薨于位春秋五十三上聞之軫悼不視朝贈尚書右僕射加􅉠贈焉前夫人京兆韋氏懿淑有聞無禄早世生一女曰保子適校書郎韋絢今夫人河東裴氏賢明知禮有輔佐君子之勞封河東郡君生三女曰小迎未笄道衛道扶齠齓一子曰道護三歲仲兄司農少卿積姪御史臺主簿某等銜哀襄事裴夫人韋氏長女洎諸孤㓜等號護廧翣以六年七月十二日附葬於咸陽縣奉賢郷洪瀆原從先宅兆公著文一百卷題爲元氏長慶集又集古今刑政之書三百卷名類集並行於代公凡爲文無不臻極尤工詩在翰林時穆宗前後索詩數百篇命左右諷詠宫中呼爲元才子自六宫兩都八方至南蠻東夷國皆寫傳之每一章一句出無脛而走疾於珠玉又觀其述作編纂之㫖豈止於文章刀筆哉實有心在於安人治國致君堯舜致身伊臯耳抑天不與邪將人不幸邪予甞悲公始以直躬律人勤而行之則坎壈而不偶謫瘴郷凡十年髮班白而來歸次以權道濟世變而通之又齟齬而不安居相位僅三月席不暖而罷去通介進退卒不獲心是以法理之用止於舉一職不布於庶官仁義之澤止於惠一方不周於四海故公之心不足也逢時與不逢時同得位與不得位同富貴與浮雲同何者時行而道未行身遇而心不遇也執友居易獨知其心以泣濡翰直書銘于墓曰嗚呼微之年過知命不謂之天位兼將相不謂之少然未康吾民未盡吾道在公之心則爲不了惜哉惜哉道廣而俗隘時矣夫心長而運短命矣夫嗚呼微之巳矣夫重校正唐文猝卷第六十八
