body:
  text: 呉興姚鉉纂碑三揔五首嶽瀆祠廟嵩山啓母廟碑崔融少室山少姨廟碑楊臼三城韓公廟碑李華柳州羅池廟碑韓愈野廟文陸􅀛䝉嵩山啓母廟碑并序崔融臣聞天地生成其法自然之謂道隂陽鼔舞其功不測之謂神然則物或􅀋感事因通變乾棟傾而三光北馳坤輿缺而百川東瀉河淪越雋有郡邑之爲魚水陷歷陽有吏人之化鼈訪遺蹤於女峽風􅀨蕭條徴往事於姑泉弦歌響亮盈虛靡定合散焉常不知誰子旣老氏之多懵忽然爲人寧賈生之足辯仰觀俯察裁識幽明之故原始反終未窮死生之􅀃得於道而失於道義有必然出於幾而入於幾理無或廢知變化者其知神之所爲乎臣謹按啓母廟者蓋夏后啓之母也漢避景帝諱改啓之字曰開厥後相傳或爲開母而顧野王輿地志盧元明嵩高記並不尋避諱之㫖以爲陽翟婦人事不經見諒無所取粤􅀂玉斗琁璣李母之居鄰北極金臺石室王母之宅在西山氣爲母則羣物以萌月爲母則容光必照坤爲母則上下交泰后爲母則􅀖家有成故華胥履跡而雄氏孕女登感神而炎運作星流華渚而白帝生月貫幽房而黒精降明明有夏穆穆塗山子娶於度土之辰女婚於台桑之地捜竒帝紀識異歸藏束生發蒙而有迷韓子稱賢而不朽漢臣之筆墨泉海陳其令名秦相之一字千金敘其嘉應士歌南國徒間􅃸禹之詞石破北方終見生余之兆則郭璞所謂陽城西啓母石李彤所謂嵩山南啓母祠隨巢之􅀃有徴鴻烈之言無爽者矣昔者鸞川之上母變空桑豚水之濵男生破竹美人之虹名螮蝀仙婦之月作蟾蜍精衛銜木而償􅁈女尸化草而成嬪山崩蜀道臺􅃸婦而無歸石立武昌亭望夫而不及論乎誕載羣下莫尊於帝王語乎遷易凡百無聞於感致美矣哉不可得而稱也大唐革去故鼎取新與運而生繼天而作握乾元而造物海内知春闢混沌而爲家域中無外天皇膺曆數順謳歌金匱王板服皇王之能事衢室廟堂承祖宗之茂烈垂衣裳而作元后端拱北辰負黼扆而朝諸侯嚮明南面周􅀖赫赫其道洽於成康漢室巍巍其化鍾於文景東漸西被逺安邇肅海三年而無波雲連月而不散天瑞降地符昇靈鳯五文歲時來􅁐囿神龍八卦昏旦游池沼禮云乎哉無取於周旋揖讓樂之謂也必在於移風易俗司禄益富家國於是乎有餘司命益年臣人於是乎不夭明王三懼未甞遺戒愼之心天子四鄰莫能展弼諧之用家安其業但聽於鄰雞人得其和遂同於野鹿表䜟記奏河圖四十六事之著明曷云尚也登太山禪梁甫七十二封之可識何以加乎且夫窮聖神備道德滋萌元氣開闢太􅀄斯乃天皇氏之所以應乎天也依土地明神靈駕六羽而上騰度九州而下濟斯乃人皇氏之所以順乎人也造書契敎畋漁合五緯而節四時登九天而􅀋萬物斯乃犠皇氏之所以制人法也務播殖該變通甞藥以救兆人聚貨而交天下斯乃農皇氏之所以興人利也振䕫鼓載龍旗天則玄女授符帝則黃神降斗斯乃軒轅氏之所以除人害也均度量正都邑揔秋令於金天分瑞官於鳯紀斯乃帝昊氏之所以爲人極也絜祭祀義􅀑神履時以象天養財以任地斯乃帝頊氏之所以爲人敎也秋乗馬春乗龍順三辰而天道平建五正而人事理斯乃帝辛氏之所以爲人政也明如日晦如隂人無識其名帝何力於我斯乃帝堯氏之所以昭君德也聞一善舉八才帝唱動而爛星雲天歌發而蹌鳥獸斯乃帝舜氏之所以章后功也夫三統者道之大五行者生之宗三皇法之而列五帝則之而序道以三興德以五立非天下之至聖孰能兼於此乎而猶雖休勿休損之又損下明詔發德音尊天而重人省方而巡狩舉星畢曵雲梢召風伯以淸塵命山靈而護野馳洛邑鶩襄城天迴而地游雲合而霧沓周穆王來遊太室先徴夏啓之居漢武帝有事嵩丘即訪娰開之石徒觀其丹靑歳古霜露年侵聖情有睠興言改葺其山則古文之外方其地則新邑之中土銘壇邐迤斜分玉女之臺碑闕相望近對石人之廟金草生而五色貝樹長而三花紫雲合沓於溪澗白霧氛氲於巖嶺考之易林信惟神明所伏求之遁甲固以威靈肅然夫其命有司乗務􅂩因高背下察隱嶙之餘基審日觀星揆摧殘之落構周官置臬郢匠揮斤異態神行全模化造紅葩奪日飛累榭於山間綺綴衝風架迴廊於木末仙人在棟神女臨䆫周施玳􅈘之椽徧覆琉璃之瓦赤玉爲階甃黃金作門闕山如白岸樹似靑溪羞蕰藻於前庭藉生芻於後徑蘭香夾水居然洗沭之資竹帚臨風自隔囂塵之境夢臺雲􅀨宋玉對而先驚楚壁山川屈原書而幾倦壽宫幨􅀆不擾象設安􅀆逾肅霜羅曵曵雲錦披披鴛鴦褥􅀆翡翠幬白羽扇􅀆靑絲履垂玉鸞之佩􅀂往而􅀂還戴金雀之􅁫不長而不短其居䖏也曖曖昧昧隂閉陽開其被服也煌煌熒熒霞駮雲蔚鼎俎則麟胎鳯􅆑烝蕙燃蓂餌膳則木蜜金膏玉漿瓊酒當是時也合五嶽訊九魁選太隂命玄闕馮夷鳴鼔女媧淸歌左蒼龍􅃓吹箎右白虎􅀆縆瑟金眞拂座玉女焚香肅肅習習天媛來風􅀨雰雰霏霏神􅁎下霜雪孔雀飛而儀鳯舞弄玉邀歡軿車合而羅綺陳智瓊陪宴麻姑服道變海水而來遊織婦希風塡河津而下謁洛妃綽約江妃緜眇玄女以明同爲珠素女以穨雲作髻九天眞母八極夫人畢集於兹矣靑霞衣􅀆翠雲裘靈連蜷􅀆旣留車迴風􅀆馬飛電視倐忽􅀆無見昔者濟隂山下降堯母之精靈湘川水曲􅅏舜妃之響像壝壇或在徒聞分福之名棟宇不修誰辨安歌之處豈知夫三仙福地百姓尊祠挾王者之都畿當聖人之順動犠牲玉帛可以洽氣和神㓜婦外孫可以披文相質䖍奉綸㫖式陳壯觀雖周人作詩自得后妃之美而魏臣獻賦終慙神女之工敢作銘曰九州地險五嶽天中蛟龍洞穴日月仙宫蓄􅂥雲霧震蕩雷風笙歌近接鍾鼓遥通其一昔在嬀帝洪泉未塞昬墊下人汎濫中國於鑠大禹顯允天德龍畫旁分螺書徧刻其二佩文北海省土南方還從碣石更下台桑予娶有禮我都攸昌八年不顧四載惟荒其三宛委旣登轘轅佇鑿家室誤往熊羆方作天道幽祕生涯紏錯其化則遷其靈是託其四宓妃之館仙女之臺物􅀋通感精魂去來巫山廟立漢水祠開壝壇歲古棟宇年摧其五皇矣大唐麗哉神聖膺圖受籙體元居正赫赫高祖天有成命明明太宗於兹爲盛其六重光累洽下武嗣文􅀒扆而化垂衣以君三靈盻蠁六氣氤氲魚鼈咸􅀂雞犬相聞其七重譯請命殊鄰稟朔化及中孚風移大朴天秩百禮人和萬樂汾水可遊峴山何邈其八隨巢舊􅀃夏啓遺居盛德不泯嘉聲在諸周王轉蹕漢帝迴輿聿懷降鑒其祀如初其九虞衡掌木班垂葺宇虹亘梅梁龍盤桂柱草積庭院水周堂廡石室置儔軒宫爲輔性珠簾洞卷玉座含淸金翠玓瓅羅縠輕明儀形􅀂動侍衛疑生依俙有物惝怳無聲其十一帝子湘川天孫漢曲翩緜縹緲躊躇躑躅神女弄珠靈妃啓玉倐來忽往星繁電燭其十二壯矣麗矣神之聽之聦明是屬景福無欺夫人立館㓜婦鐫辭巍巍皇室萬萬餘基其十三少室山少姨廟碑銘并序楊烱臣聞崑閬西北之天門也則五帝處其陽陸三皇居其正地太山東南之日觀也則秦皇刻其石銘漢帝探其玉䇿故知建都邑正方位畫崇墉刳濬洫必慿天地之險然後四海爲家擁神休尊明號恊時月同量衡必致山川之祠然後羣神受職少室山者山嶽之神秀也慿河圖而括地用遁甲而開山發揮宇宙之精噴薄隂陽之氣壁立而千仞削成而四方北臨􅁪碣猶如聚米南望荆衡􅂊同覆簣共工觸皇天之八柱未足擬議龍伯釣溟海之三山無階響像考於含神紐白玉猶存驗於山海經黃花不落其名有序則太室西偏其位可知則嵩高佐命若乃乾坤之所合雷􅀨之所交仰􅄤七星之野俯鎭三河之曲朝市臨於域中樞機正於天下六合交㑹於是乎有天帝之下都九州名山於是乎有靈仙之窟宅臣謹按少姨廟者則漢書地理志崇高少室之廟也其神爲婦人像者則故老相傳云啓母塗山之妹也昔者生於石紐水土所以致其功娶于塗山室家所以成其德后宗之位象南宫之一星外戚之班比西京之列傳惟幾不測其道無方騁神變而揮霍降精靈而肹蠁亦猶蔣侯三妹青溪之軌跡可尋虞帝二妃湘水之波瀾未歇何止祠稱丁婦廟號滕姑少女宅於西宫夫人館於南嶽山臨白岸空聞石室之靈浦對青崖獨有金臺之異􅀂斯而巳矣時更魏晉數歷周隋四望於是莫修八神以之無主炎涼代序寧觀爼豆之容霜露霑衣非復弦歌之地國家乗天造之草昧屬人謀之與能奄有大寶遂登神器天地水火之無象則女媧氏補之於是乎鍊其五石東西南北之失位則神農氏立之於是乎甄其四海天皇貴與天乎合德富與地乎侔貲窮變化之理盡神明之數伏犧畫卦唯觀鳥獸之文皇帝垂衣蓋取乾坤之象利兼於成器功周於備物瑶臺美化闡邦國之風猷銀牓嘉聲茂君親之典禮稱才子者八族則叔獻季貍有亂臣者十人則太顚閎夭􅀂夫圓丘方澤所以饗天神地祇複廟重櫩所以序文昭武穆命秩宗之位分太宰之宫考虞夏之質文定殷周之損益其大禮有如此者高陽有飛龍之樂始㑹八風帝舜有儀鳯之音初調九奏后䕫典其敎制氏辨其聲鍾磬竽瑟致其和尊卑長㓜成其序其廣樂有如此者太微營室明堂布政之宫白獸蒼龍象魏懸書之法下應猶草王言如絲北辰而拱衆星南面而朝天下其爲政有如此者紏萬人者施以八刑詰四方者戒之三典畫衣不犯載酒無寃免禽獸於網羅納寰瀛於軌物其恤刑有如此者周人之養國老始闢西膠漢氏之召諸生初開太學辟廱所以行其禮泮宫所以班其政童子三尺羞稱霸后之臣冠者六人唯述明王之道其文德有如此者涼風至司馬於是乎陳兵太白高將軍於是乎冝戰乗斗杓而誓旅出星門而杖􅃏莊周稱天子之劒舉之按之吕望言聖人之兵如風如􅀨其武功有如此者稽其殷令有文犀利劒之效珍考其周書有赭白乗黃之騁力東漸西􅀍􅀯馳北走盧敖之窮觀六合不出於城隍陶侃之飛入八門未遊於宫室其疆理有如此者察璿璣而孚大運天迴地游吹玉律而部人時陽動隂靜煙雲蕭索而合彩日月淑清而啓旦豈直鳯巢阿閣入軒后之圖書魚躍中舟稱武王之事業其休徴有如此者然則囊括混沌發揮生靈大庭不足使驂乗驪連不足使扶轂可以㑹玉帛可以荅靈祇行聖人之大孝旣郊祀而宗祀昭帝王之盛節亦因天而事天猶復下聽輿人旁求故實以爲唐堯五載無聞太室之儀殷帝八遷未􅁲王城之地是用陳圭置臬建周后之兩都詔蹕鳴鑾巡漢皇之中嶽熒惑先列招揺在上隱天而動地欱野而歕山旌旗則日月運行鐘鼔則雷風相薄道伊闕捷轘轅怡然長望邈乎周覽壯靈山之雲􅀨仍求載祀之經對閑寢之丘墟思秩無文之禮於是降天渙命司存因其舊跡葺其新廟詳費務議工徒下隴蜀之名材致荆藍之寶玉易者言乎恱使民忘其勞詩者歌乎于來成之不日東西轇轕南北崢嶸繡栭兮雲楣光照耀兮奪目桂棟􅀆蘭橑氣氛氲􅀆襲人皎日登於約䟽奔星下於閨闥珠簾玳匣上高閣而三休金柱銀楹岀長廊而中宿窮山海之瓌寶盡人神之壯麗豈止河庭貝闕俯瞰馮夷之都洛水瑶壇旁臨虙妃之館爾其巖嶂重複岡巒左右靑霞起而照天白霧生而帀地餘基隱嶙仍知萬歳之亭古木摧殘尚辨三花之樹明公舊祀棟宇岧嶤仙女層臺風煙爛漫軒轅之訪大隗先求牧馬之童太一之徴少君直下乗龍之使夫峻極也天帝因而㑹昌夫降神也景福由其興作於是乎昭之以明德聽之以和聲可以羞澗溪沼沚之毛可以奠潢汙行潦之水聦明正直惟􅀑神而有知玉帛犠性實陳信而無媿日之吉靈之來蜺爲旌􅀆翠爲蓋雷爲車􅀆電爲䇿鼔之以南箕風嫋嫋而先路􅃳之以西畢􅀨􅁳􅁳而灑道其始至也􅀂海靜山空曈曈曨曨照白日於扶桑之東其少進也􅀂移星轉漢粲粲爛爛吐明月於瀛洲之半佩珠璣而玓瓅襲羅縠而飄颻建晨嬰之寶冠踐逺遊之文履命儔􅀆嘯侣徙􅀝􅀆徘徊羣仙畢集衆靈咸至有西華之紫妃有中黃之素女華山之上明星逺燭陽臺之下暮􅀨濳通或瓊室以飛霞或銀臺而薦樂天孫忽降蹔停支石之機神女相歡即起投壷之電左侍右衛則甲申之瓊石乙巳之蘭蕭妍倡妙妓則慿恱之清歌幽靈之鼓瑟樂章旣闋禮容斯備迴風􅀆雲旗入不言􅀆出不辭荷衣􅀆蕙帶倐而來􅀆忽而逝惟神享德降百福而無疆惟嶽配天視三公而有典昔者夏后氏之乗四方仍開宛委之圖周穆王之御八龍猶紀舂山之石況乎上照下漏天平地成人主宅中旁羅於宇縣山靈顯位密邇於神州豈使命德不傳頌聲無紀由是三天降䇿有南霍之叔儲八丈鐫銘有西王之服道魏國鍾繇之字唯勒歳年晉家張載之文遂承明詔其詞曰上帝有命皇天無親樹之元后以牧蒸人光宅六合懷柔百神德成郊祀禮備宗禋其一軒稱配永崐㠊帝出堯號則天汾陽詔蹕觀人設敎恊時同律有感必通無文咸秩其二皇家啓聖受命于天上錬五石旁䟽九川開階運斗宅海乗乾王母益地周公􅁲年其三天子建德重規疊矩聖敬日躋宗文祖武範圍三極和平萬㝢率由舊章粤􅀂乩古其四琁宫夜敞銀牓朝開德象隂月聲符震雷山河翼戴星緯鹽梅能事畢矣乾元大哉其五化定制禮功成作樂日月旂常夏殷正朔德澤天外文明地角氣白星黃風揺露濁其六兩京畿甸五載巡遊驅馳太一部列􅃖尤將見大隗爰尋許由迴鸞躑躅寓目周流其七鬱鬱靈鎭巖巖積石直上五千去天三百帝休非逺眞經可覿石室徘徊瓊膏滴瀝其八山惟地德神即隂靈瑶􅁎逐􅀨玉女隨星隂陽不測􅁰稷非馨倐忽年代荒蕪廟庭其九旁求祀典載垂天渙始詔林衡俄成壯觀紫梲星錯丹梁霞煥似對青溪如遊白岸其十文貍赤豹電䇿雷車隱隱中道訇訇太虚遂停龍駕永託神居天迴地上霧歇雲除其十一衆靈睒易羣仙容與衡嶽夫人漢濵游女洛川解佩天河弄杼顧慕招􅂝􅌭紛儔侣同氣同聲爰􅀏爰語其十二于以採蘋南澗之濵于以採藻于彼行潦日吉􅀆辰良浴蘭湯􅀆沐芳揚枹􅀆拊鼔奠桂酒􅀆椒漿神其萃止降福穰穰其十三韓公廟碑銘并序李華唐之元老有大庇於生人曰韓公公盡力大朝位尊將相三城立廟軍帥乞靈則祠之天寶季歳華奉使朔方展敬祠下式瞻風采像與神合沈沈如生嗚呼生以功爲臣殁以靈爲神神乎冝奉公揔戎疆外懸衡審政拒隴循河緜亘萬里堅城雄防扜蔽三輔介胄之士垂十萬人瞻我麾節以爲進退先是突厥犯塞乗勝入朔方游􅀐至安定守軍不到經略失守虜乃驅監牧之騋牝退存廬帳進圍聚邑鳴弓躍馬規復漠南邊人揺心元聖軫念節將更至咸以爲請搢紳獻議則以和親爲便中宗未之許也􅀄以公耋老且重煩之及􅁲師於太宫之庭惟公之吉至尊親臨前殿授以兵符公承命徂征北蕃逆駭記所謂君子有其時有其命公得其二而伸其一者也公忠貫神明慮幾造化鎭以長䇿潰其姦謀一麾偏師屠名王復喪馬奪壍拂雲維而城之並河之阿列築三鎭將精士銳談􅀏就役匈奴莫敢南視雷􅂘而遁老㓜望公以相震怖不然則乗冰轉􅃲無日無之旣而據河山翫其動靜納行旅歸之袵席慿墉而望匹馬單兵不匿形影虜由是械手足而刳腹心朝廷無草􅀼之虞天下滅征役之半矣詩云文武吉甫萬􅀖爲憲又曰方叔元老克壯其猷公之謂也帳下之厮尚有存者曰公號令素嚴人無違禁自將吏􅀐卒咸有旗表節不常出出則賞罰隨之賞無非功罰無非罪上流而下競心行而事從謀全功成由此術也三城旣就刋木標櫓記之種落刻其降年後皆如之豈挺生上將之􅀛䇿也竒鑒先物之然也夫鳥獸草木出其倫輩猶或利害慿焉況殊績功勲終始天地翼輔先聖寵綏元元有茅社之尊符節之重後奉者果一勝遂一謀庸非明神幽賛之效雅有吉甫薄伐至于太原王命南仲城彼朔方傳稱齊桓伐戎攘狄以其病燕滅衛魏絳和戎狄合諸侯從古及今以爲大功其餘秦恬漢靑之倫􅂊丘垤耳尚或筮頌颺之簡䇿貴之況忠武卓異屨履今昔而詠歌無之非古也􅀼感趙孟懷隨武之德寤寐永歎奉銘神宫其文曰赫爾韓公司武有經受命北伐渠魁就刑敢或不順鼔行風霆崇岱壓􅆑滄波灌螢沈泉雷動機發􅁳􅁳功奮三城人謡億齡謀出先後構危於寧張天之威恢廟之靈北狄頓顙山戎來庭萬里寢柝縁河罷扄趨拜故祠德謝惟馨翔野何有羣山靑靑感激遺風徘徊涕零吾誰與歸式薦斯銘柳州羅池廟碑銘并序韓愈羅池廟者故刺史柳侯廟也柳爲州不鄙夷其民動以禮法三年民各自矜奮曰兹土雖逺京師吾等亦天氓今天幸惠仁侯􅀂不化服我則非人於是老少相教語莫違侯命凡有所爲於其郷閭及於其家皆曰吾侯聞之得無不可於意否莫不忖度而後從事凡期令之民勸趨之無有後先必以其時於是民業有經公無􅀒租流逋四歸樂生興讓宅有新屋渉有新舩池園絜修猪牛羊鴨肥大蕃息子嚴父詔婦順夫教嫁娶葬送各有條法出相弟長入相慈孝先時貧民以男女相質乆不得贖盡没爲隸我侯之至按國之故以傭除本悉奪歸之大修孔子廟城郭道巷皆治使端正樹以名木而民旣皆恱喜甞與郡將魏忠謝寧歐陽翼飲酒驛亭謂曰吾棄於時而􅀉於此與君等好也明年吾將死死而爲神後三年爲廟祀我及期而死三年孟秋辛卯侯降于州之後堂歐陽翼等見而拜之其夕夢翼而告之曰館我於羅池其日景辰廟成大祭過客李儀醉酒慢侮堂上得疾扶出廟門即死明年春魏忠歐陽翼使謝寧來京師請書其事于石余謂柳侯生能澤其民死能驚動禍福之以食其土可謂靈也巳作迎享送神詩遺柳氏俾歌以祀焉而并刻之柳侯河東人諱宗元字子厚賢而有文章甞位於朝光顯矣巳而擯不用其詞曰荔子丹􅀆蕉黃雜肴􅂼􅀆進侯堂侯之舩􅀆兩旗度中流􅀆風泊之待侯不來􅀆不知我悲侯乗駒􅀆入廟慰我民􅀆不嚬以􅀏鵝之山􅀆柳之水桂樹團團􅀆白石齒齒侯朝出游􅀆暮來歸春與猿吟􅀆秋與鶴飛北方之人􅀆爲侯是非千秋萬歳􅀆侯無我違福我􅀆壽我驅厲􅀑􅀆山之左下無苦濕􅀆高無乾秔稌充羡􅀆蛇蛟結蟠我民報事􅀆無怠其始自今􅀆欽于世世野廟碑陸􅀛蒙碑者悲也古者懸而窆用木後人書之以表其功德因􅅏之不忍去碑之名由是而得自秦漢以降生而有功德政事者亦碑之而又易之以石失其稱矣余之碑野廟也非有政事功德可紀直悲夫甿竭其力以奉無名之土木而巳矣甌粤間好事􅀑山椒水濵多􅁋祀其廟貌有雄而毅黝而碩者則曰將軍有温而愿哲而少者則曰某郎有媪烏老切而尊嚴者則曰姥有容而豔者則曰姑其居處則敞之以庭堂峻之以陛級左右老木攅植森拱蘿蔦翳于上鴟鴞室其閒車馬徒隸叢雜怪狀農作之甿怖之大者推牛次者擊豕小不下犬雞魚菽之薦牲酒之奠缺於家可也缺於神不可也一朝懈怠禍亦隨作耋孺畜牧慓慓然疾病死喪甿不曰適丁其時邪而自惑其生悉歸之於神雖然􅀂以古言之則戾以今言之則庶乎神之不足過也何者豈不以生能禦大災捍大患其死也則血食於生人無名之土木不當禦與災捍患者爲比是戾於古也明矣今之雄毅而碩者有之温愿而少者有之升階級坐堂筵耳弦匏口梁肉載車馬擁徒隸者皆是也解民之懸淸民之暍未甞貯于􅅐中民之當奉者一日懈怠則發悍吏肆􅁋刑􅇌之以就事校神之禍福孰爲輕重哉平居無事指爲賢良一旦有大夫之憂當報國之日則回撓脆怯顛躓􅇡踣乞爲囚虜之不暇此乃纓弁言語之土木爾又何責其眞土木邪故曰以今言之則庶乎神之不足過也旣而爲詩以誌其末土木其形􅀼吾民之酒牲固無以名土木其智􅀼吾君之禄位如何可議禄位頎頎酒牲甚微神之饗也孰云其非視吾之碑知斯文之孔悲重校正唐文粹卷第五十二
