body:
  text: 古賦辛總七首古器三霜鍾賦喬潭欹器賦李徳裕砥石賦劉禹錫物景二晚晴賦杜牧秋聲賦劉禹錫決疑二問大鈞賦劉禹錫何卜賦霜鍾賦并序喬潭南陽豐山有九鍾焉霜降則鳴潭叨遇達奚公擢甲科然則南陽即公隱居之舊地為此賦以廣知音焉豐山之峯巉嵒積翠之石森爽冒寒之松上無飛鳥下無人蹤何杳杳以靜謐有天然之古鍾兩欒神資九乳靈化寧失制於侈弇豈遺音於窕槬每虛氣以自得常宿懸以警下動於耳而藏於心必髙秋之凉夜於是泬寥兮日暮而天晶蕭瑟兮霜落而風清爽氣無眹潛來滿盈跳然復出鏗爾有聲信不擊而不考能大鳴而小鳴始則含糊擁鬱旋復充詘若往若還徘徊其間爾其舒肆奔放長欒遠暢乍浮空以紆餘更觸物而瀏亮入林蕭蕭在水湯湯泛濫小瀨聮綿疎篁夜鶴怨兮彌苦寒猨悲兮更長餘韻舂容隨風悠揚繞於洞庭浮於瀟湘梧楸紛以離披蒹葭䬃其蒼蒼及夫夜以艾兮彌靜山無人兮月冷初肅肅以自凄復琅琅而虛警其動愈出其來甚徐合於元化遊於太虚轉遠而盡誰知所如聊獨立以傾聴惘若失乎躊躇聴不及想以存其餘方其寒氣曉集鏘然應急發越林巒周流井邑前聲未盡後韻相及羇臣之空館屢來思婦之髙樓徧入無不倀然驚夢戱欷掩泣夫鍾之應霜也應以無心士之知己也貴知其音不鼔而鳴者其聲遠不言而信者其分深故自然之聲無假於煩手特達之分不資於滕口吾欲徴華鍾喻良友懷音淵黙藏器虚受可以適南陽待清霜之一扣系曰風籟起兮喧長薄霜鍾鳴兮動哀壑合大塊兮聲無作雖有聞兮常寂寞欹器賦并序李德裕癸丑歲余時在中樞丞相路公見遺欹器贈以古人之物永懷君子之心嘗欲報以辭賦屬力小任重朝夕盡瘁固未暇於體物今者公已殁世余又放逐忽覩兹器悽然懷舊因追為此賦置公之靈筵昔周道砥平既安且寧赫赫公旦配德阿衡謂難守者成難持者盈始作兹器告于神明至仲尼憲文武之道思周公之德入太廟而觀器見遺法而歎息且曰月滿而虧日盈則昃彼天道之常然欲久盛而焉得乃沃水於器俯察要終挹彼注兹授之若沖虚則臲卼似君子之困䝉中則端平如君子之中庸滿則傾跌霆流電發器如隄隤水若河決非神鼎之自盈異衢樽之不竭蓋欲表人道之隆替明百事之有節然兹器也不以中而自藏不以跌而自傷其過也如彼薄蝕其更也浸彼輝光得其道者居則念於豐蔀動乃思於謙受顔既復而不逺惠屢黜而何咎知任重之力及悟物盈之難久雖神道之無形常慘然於前後昔與君子同秉國鈞公得之為賢相余失之為放臣覩遺物而猶在懷舊好而悲辛欲克己以復禮永報徳於仁人砥石賦并序劉禹錫南方氣泄而雨滛地慝而傷物媪神噫濕渝色壞味雖金之堅亦失恒性始余有佩刀甚良至是澁不可拔剖其室乃出遡陽眇眡傳刃䝉脊鱗然如痏痂如黑子如青蠅之惡鋭氣中錮猶人被病然客有聞焉裒密石以遺予沃之草映雜以鳥膏切劘下上直質焯見躊躇四顧逌爾謝客微子之貽幾喪吾寶客曰吾聞諸梅福曰爵禄者天下之砥石也髙皇帝所以礪世磨鈍有是耶余退感其言作砥石賦我有利金兮以利為佩遭土卑而慝作雄鋩為之潛晦如景昏而蝕既兮與肌漆而為癘顧秋蓬之不可刜兮尚可遊乎髖髀之外利物䝉蔽材人惆悵俾百汰之至精蟠一檢而多恙豈害氣之獨然兮将久不試而然彼屠者之刀兮獵者之鋋不灌不淬兮糅錯銜鈆日鼓月揮兮刲腴擊鮮睨熣􅜱以耀芒蓊淫夷而騰羶豈不以涉暑而䝉沴兮鼎用之而成妍有客自東遺余越砥圭形石質蒼色膩理剗其鱗皴滑以滫瀡如衣澣垢如鼎出否霧盡披天萍開見水拭寒焰以破眥擊清音而振耳故態復還寶心再起既賦形而終用一䝉垢焉何恥感利鈍之有時兮寄雄心於瞪視嗟乎石以砥焉化鈍為利法以砥焉化愚為智武王得之商俗以厚髙帝得之傑材奔走得既有自失豈無因漢氏已還三光景分隨道闊狹用之得人五百餘年唐風始振懸乎天砥以礱兆民播生在天成器在君天為人君君為人天安有執礪世之具而患乎無賢歟晚晴賦并序杜牧秋日晚晴樊川子目于郊園見大者小者有狀類者故書賦云雨晴秋容新沐兮忻遶園而細履面平地之清空兮紫閣青横逺來照水如髙堂之上見羅幕兮垂乎鏡裏木勢黨伍兮行者如迎偃者如醉髙者如達低者如跂松數十株切切交峙如冠劒大臣國有急難庭立而議竹林外裹兮十萬丈夫甲刃摐摐密陣而環侍豈負軍令之不敢囂兮何意氣之嚴毅復引舟于深灣忽八九之紅芰姹然如婦斂然如女墮蘂黦顔似見放棄白鷺潛來兮邈風標之公子窺此美人兮如慕悦其容媚雜花差於岸側兮絳緑黄紫格頑色賤兮或妾或婢閒草甚多叢者束兮靡者杳兮仰風獵日如立如笑兮千千萬萬之容兮不可得而状也若予者則謂何如倒冠落珮兮與世闊踈敖敖休休兮真狥其愚而隠居者乎秋聲賦并序劉禹錫相國中山公賦秋聲以屬天官太常伯唱和俱絶皆得時道行之餘興猶動光陰之歎況伊鬱老病者乎吟之斐然以寄孤憤碧天如水兮窅窅悠悠百蟲迎暮兮萬葉吟秋欲辭林而蕭䬃潛命侣以啁啾送将歸兮臨水非吾土兮登樓晚枝多露蟬之思夕草起寒螿之愁至若松竹含韻梧楸早脱驚綺疏之晚吹墜碧砌之涼月念塞外之征行顧閨中之騷屑夜蛩鳴兮機杼促朔鴈叫兮音書絶逺杵續兮何泠泠虛室靜兮空切切如吟如嘯非竹非絲合自然之宫徵動終歲之别離廢井苔合荒園露滋草蒼蒼兮人寂寂樹槭槭兮蟲伊伊則有安石風流巨源多可平六符而佐主施九品而自我猶復感陰蟲之鳴軒歎涼葉之初墮異宋玉之悲傷覺潘郎之么麽嗟乎驥伏櫪而已老鷹在鞲而有情聆朔風而心動盼天籟而神驚力将痑兮足受紲猶奮迅于秋聲問大鈞賦并序劉禹錫始余失臺郎為刺史又貶州司馬俟罪朗州三見閏月人咸曰數之極理當遷焉因作謫九年賦以自廣是歲臘月詔追明年自闕下重領連山郡印綬咸曰美惡周必復第行無恤歲杪其復乎居五年不得調歲二月有事于社前一日致齋孤居慮靜滯念欻起伊人理之不可以曉也将質諸神乎謹貢誠馳精敢問大鈞其夕有遇寤而次第其辭以為賦圓方相涵兮浩其無垠窅㝠翕闢兮三辰以騰振孰主張是兮有工其神迎隨不見兮强名之曰大鈞欹以臨下兮巍乎雄尊天為獨陽髙不可問工居其中與人差近身執其權心平其運循名想像或可以訊曰嘻䝉之未生其猶泥爾落乎埏埴唯鈞所指忽然為人為幸大矣工賦其形七情與俱嗇智不授卑去聲之以愚坦坦之衢萬人所趨䝉一布武化為畏途人或譽平聲之百説徒虛人或排之半言有餘物壯則老乃唯其常否終則傾亦不可長老先期而驟至兮否踰數而叵量雖一夫不獲兮亦大化之攸病謹薦誠上問兮俛伏以聴是夕寐熟夢遊乎無何之鄉抗陛級乎重宵兮異人間之景光中有威神巾金甲而煒煌命之使前兮其音琅琅曰吾大化之一工也居上臨下無其不平汝今有辭吾一以聴播形肖貌生類積億橐籥圈匡鎔鍊消息我之司智初不爾嗇不守以愚覆為汝賊既賦汝形輔之聰明盍求世師資適攸宜胡然抗心遐想前烈倚梯青冥舉足斯跌韜爾智斧無為自伐鑿竅太繁天和乃洩利逕前誘多逢覆轍名腸内煎外火非熱今哀汝窮将厚汝愚剔去剛健納之柔濡塞前竅之傷痍兮招太和而興居貰以待人兮急以自拘道存邃奥無示四隅軌物之勢不作兮見傷之機自無汝不善用吾焉嗇乎且夫貞而騰氣者膴膴健而垂精者昊昊我居其中猶輪是蹈以不息為體以日新為道倮鱗蜚走灌莽苞皁乃牙乃甲乃殈乃剖陽榮陰悴生濡死藁各乗氣化不以意造賦大運兮無有淑惡彼多方兮自生醜好爾奚不德余以驟壯姑尤我以速老耶觀汝百為又或不然赤子哇哇急其能言亦既名物幾時蹁躚春耕其邱投種之日釋耒而歎何時實粟望所未至謂余舒舒欲其久留謂我瞥如我一子二誰之曲歟彼蒹葭之蒼蒼兮霜霰苦而中堅松竹之皸皴索籜兮不若榯筍之可憐納材葦而構明堂固容消而力完楊且之晳兮不可以常然當錫爾以老成蒼眉皓髯山立時行去敵氣與矜色兮噤危言以端誠俾人望之侮黷不生爾之所得孰與壯多不善處老問余而何授受而迴蘧蘧形開嚮之威神孰為來哉乃遽衣促盥端慮滌想委珮低簪持簿叩顙而言曰楚臣天問不詶今臣遇幸一獻三售始厚以愚終期以壽忘上問之罪濯已然之咎心增故術腸飽新授馳神清𤣥拜手稽首何卜賦劉禹錫余既幻惑力命之説兮身久放而愈疑心回穴其莫曉兮将取質夫東龜楚人俗巫而好術兮叟有鬻卜而來思乃招而訊之曰嘻人莫不塞有時而通伊我兮久而愈窮人莫不病有時而間伊我兮久而滋蔓吾聞人肖五行動止有則四時轉續變於所極一歲之旱人斯具舟三月之熱人斯具裘極必反焉其猶合符子首圓而足方予腹陰而背陽胡形象之有肖而變化之殊常經曰剥極則賁居賁而未嘗剥者其誰否極受泰居否而未嘗泰者又其誰鶴胡不截鳬胡不禆䕫何罰而踸踔蚿何功而扶持紛紜恣睢交作舛馳似與似奪似信似欺孰主張之問于子龜卜者曰招我以粗問我以微有天下之是非有仁人之是非在此為美兮在彼為蚩或昔而成或今而虧君問曷由主張其時時乎時乎去不可邀來不可逃淹兮孰捨操堇之毒豕苓雞首之賤毛各於其時而伯音霸其曹屠龍之伎非曰不偉時無所用莫若履狶作俑之工非曰可珍時有所用貴于斵輪絡首縻足兮驥不能跬前無所阻兮跛鼈千里同涉于川其時在風㳂者之吉泝者之凶同蓺于野其時在澤伊穜之利乃穋之厄故曰是耶非耶主耶時耶諒淑惡之同出兮顧所丁之若何夫如是得非我美失非我恥其去曷思其來曷期姑蹈常而俟之夫何卜為言訖執龜而起予退而作何卜賦於是蹈道之心一而俟時之志堅内視羣疑猶氷釋然唐文粹巻八欽定四庫全書唐文粹巻九宋姚鉉編
