front:
  text: 重校正唐文粹卷第五十八
  hash: sha256:efa989bb14341d3f2a824dcc4961b660bcb018b69ef9b1781d371f49cfcc254d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0024_SBCK_058-1a}
body:
  text: 吳興姚鉉纂碑十揔七首庶官四唐刑部尚書致仕白居易神道碑李商隱唐吏部侍郎奚陟神道碑劉禹錫唐左拾遺翰林學士李白新墓碑范傅正唐吏部郎中高都公楊仲宣碑席豫牧守三唐常州刺史獨孤及神道碑崔祐甫唐饒州刺史吳丹神道碑白居易唐和州刺史張擇神道碑唐刑部尚書致仕贈尚書右僕射太原白公墓碑銘并序李商隱公以致仕刑部尚書年七十五會昌六年八月薨東都贈右僕射十一月遂葬龍門子景受大中三年自潁陽尉典治集賢御書侍大夫人弘農郡君楊氏來京師胖胖兢兢奉公之遺畏不克既乃件右功丗以命其客取文刻碑文曰公字樂天諱居易前進士避祖諱選書判拔萃注祕省校書元年對憲宗詔䇿語切不得為諫官補盩厔尉明年試進士取故蕭遂州浣為第一事畢怗集賢校理月中詔由右銀臺門入翰林院試文五篇明日以所試制加段佑兵部尚書領涇州遂為學士右拾遺滿將擬官請掾京兆以助供養授戶曹時上愛兵襄陽荆州入疏獻物在約束外公密詆二帥且曰非善良後雖與宰相不猒入聲禍其後禮官竟以多殺不辜諡于頔為厲李師古襲父事逆務作項領以謾儕曹上錢六百萬贖文貞故第以與魏氏公又言文貞第正堂用太宗殿材魏氏歲臘鋪席祭其先人今雖窮後當有賢即朝廷覆一瓦魏氏有分彼安肯入賊所贖第邪上由是賜錢直劵以居其孫在職三年每宴見多前笏留上輦是否意詔湔剔抉摩望及少年見天下無一事五年會憂掩坎廬墓七年以左贊善大夫箸吉武相遇盜殊絶賊棄刀天街日比午長安中盡知公以次𥿄為疏言元衡死狀不得報即貶江州移忠州刺史穆宗用為司門貟外四月知制誥加秩主客真守中書舍人敘緋受旨起田孝公代恆陽孝公行贈錢五百萬拒不內燕趙相殺不巳公又上疏列言河朔畔岸復不報又貶杭州既至築提扞江分殺水孔道用肥見田發故鄴侯泌五井渟儲甘清以變飮食循錢塘上下民迎濤祠神伴侣歌舞徙右庶子出蘇州授祕書監換服色遷刑部侍郎乞官分司得太子賔客除河南尹復為舊官進階開國九年除同州不上改太子少傅申百日假又二嵗得所薨官白氏由楚入秦秦自不直社郵事封子仲太原以有其後祖某鞏縣令考季庚襄州别駕贈太保一女妻談氏始公生七月能展書指之無二字橫縱不誤既長與弟行簡俱有名故李刑部建庾左丞敬休友最善居家以戶小飮薄酒朔望晦輒不肉食携鄧同韋楚白服遊人間姓名過海流入雞林日南有文字國為中書舍人三日如建中詔書上鄭公覃自代後為相稱質直文宗時文貞公果有孫起使下數歲至諫議大夫賢可任為今上御史中丞他日景受嘗跪曰大人居翰林六同列五且為相獨白氏亡有公笑曰汝少以待其曽祖弟今右㒒射平章事敏中果相天子復憲宗所欲得開七關句絶城守四州以集巨伐仲冬南至備宰相儀物擎跪齋栗給事寡嫂永寧里中有兄弟家指嚮健慕以信公知人集七十五卷元相為序系曰公之世先用談説聞肅代代優布蹤河南隂德未校公有弟昆本跋不搖乃果敷舒匪骼匪臑噫烏介反其醇腴干鄉洎邦取用不窮天子見之層陛玉堂徵徵其中上汰唐禹帝為輦留續緒襞縷歲終當遷戶曹是取曄白其華皭不痕緇上聲用從棄遣至道天子疇誰與伍率中道上納筆懾麾綽三郡理既去刑部倐東其居大尹河南翦其暴逋君有三輔臣有田畒臣衰君強謝不堪守翎翊伸伸君子之文不僭不怒惟君子武君子既貞兩有其矩孰永􅍏家曽祖之弟坤柄巽繩以就大計匪哲則知亦有教詔益褒其收揠莠而導刻詩於碑以報百世公老於東遂葬其地傷子辭弘農楊氏豫有令子儉衣削食以紀先功志刋貞石彼蒼不遺俾善莫隆今子建立痛冤無窮唐尚書吏部侍郎贈司空奚公神道碑銘并序劉禹錫嗚呼有唐清臣尚書吏部侍郎奚公貞元十五年十月甲子薨于位詔贈禮部尚書太常考行諡曰某是歲臘月丁酉葬于萬安縣之某原後三十有四年子為諸侯為大夫門戶有煒於是門下生琢石紀德揭于新阡云公諱陟字殷衡其先在夏為車正以功封于薛下古以降為譙郡人或因仕適楚復之秦今為京兆人隋唐之祭再丗以明經為博士家有賜書曾祖簡亦以文學為太子司議郎大父乾釋仕至光州刺史烈考諱某有道而尚晦終徐州司功參軍贈和州刺史由子貴也天以大運生萬物而以正氣鍾賢人至和來宅其德乃具公實有焉幼而擢陵苕之秀長而成清廟之器羣倫月旦咸以第一及從鄉賦洎升名太常果居上第明年詔郡國徵賢良設四科以盡材公居文詞清麗之目授弘文館校書郎時德宗新即位聲烜虜庭西戎畏威底貢內附詔諫議大夫崔河圖持節即虜帳以報之使臣欲盛其賔寮以自大遂默表公為介授大理評事除書到門公方為人子不敢許以逺稱病弗果行歸寧壽春飬志盡敬丞相楊炎勇于用才擢公為左拾遺奉安輿而西未幾再集荼蓼居從後喪將闋是歲建中四年京師急變黃屋順動狩于巴梁公徒行間道以歸王所既中月而詔授起居郎充翰林學士創巨愈遲病不拜職改太子司議郎從大駕回入尚書為司金元士且參推管之務有頃持愍册宣恩于蘇門將行錫銀朱干青蒲上復命稱旨轉吏部貟外郎是曹在南官為眉目在選士為司命公執直筆閲簿書紛拿盤錯一瞬而剖時文昌缺左右丞都曹差重遂轉左司郎中尋遷中書舍人執事者繫公識精以斟酌大政非獨用文飾也會江淮間民𬒳水禍上愍焉特命公宣撫之許以便宜及物赤車所至如東風變枯條其利疾復奏咸可轉刑部侍郎時主計臣延齡以險刻貴幸而與京兆尹相惡以危事中之坐譴已又逮繫其吏峻繩之事下司寇主奏議者欲文致而甘心焉公侃然持平挫彼嶽嶽君子聞之善其知道不私刑曹既清以餘刃兼領選事居一年授權知吏部侍郎又一年即真是秩言能審官者本朝有裴馬盧李四君子物論以公嫓焉時得疾發癕有國醫方直禁中上促遣如弟且飭之曰某賢臣也悉術以治之及有司以不起聞震悼加等娶琅瑘王氏石泉公之曽孫友壻皆一時彥士長子某蚤不祿第二子敬則歷太僕少卿今為濮州刺史兼御史中丞賜金紫以連最就加貴秩俾視九卿第三子敬玄以詞藝似續登文科歷左補闕今為尚書刑部郎中第四子炅舉進士最小子咸砥礪纂修冝為名公家子其邁德垂𥙿之光乎公少以名器自任及顯逹急於推賢視其所舉則在西省薦權丞相由右掖掌訓辭在中銓表楊僕射由地曹綜吏部二公後為天下偉人凡執文章權衡以揣量多士一入中禁考䇿詞三在天官第章句披沙剖璞由我而顯者落落然居多推是風鑒移于大冶則鎔範之內無非祥金嗟乎天不遐其福而孤民望使由庚之什不作於貞元中惜也初公既終詔贈大宗伯後以第三子在郎位𬒳霈澤再追褒至司空故昔之葬儀用常伯而今之碑用三公云銘曰仁麟智龍為瑞一辰未若君子瑞于人倫惟唐德宗道類漢宣督責繩下風稜言言公丁斯時籍在雋賢從難表節執羈而還帝曰汝器黃流瑟然可為大僚左右化源乃飾王度乃馳輶軒既執刑柄亦操吏權陽和熙熙貯在顔間守法持正嶷如秋山火不侵玉幸臣畏伏鳯鳴祥煙梟噪低跧帝方倚用天不假年公寐無寤其名愈逺門人逹者赤舄玄衮公居甚卑其德愈尊兩子朝服駢驅朱輪佳城何在胄貴之里螭首龜趺德輝是紀嗚呼後人下拜于此唐左拾遺翰林學士李公新墓碑銘并序范傳正騏驥筋力成意在萬里外歷塊一蹶斃於空谷唯餘駿骨價重千金大鵬羽翼張勢欲摩穹昊天風不來海波不起塌翅别島空留大名人亦有之故左拾遺翰林學士李公之謂矣公名白字太白其先隴西成紀人絶嗣之家難求譜牒公之孫女搜於箱篋中得公之亡子伯禽手疏十數行𥿄壞字缺不能詳備約而計之涼武昭王九代孫也隋末多難一房𬒳竄于碎葉流離散落隱易姓名故自國朝巳來編於屬籍神龍初潛還廣漢因僑為郡人父客以逋其邑遂以客為名高卧雲林不求祿仕公之生也先府君指天枝以復姓先夫人夢長庚而告祥名之與字咸所取象受五行之剛氣叔夜心高挺三蜀之雄才相如文逸瓌竒宏廓拔俗無類少以俠自任而門多長者車常欲一鳴驚人一飛沖天彼漸陸遷喬皆不能也由是慷慨自負不拘常調器度弘大聲聞于天天寶初召見於金鑾殿玄宗明皇帝降輦步迎如見園綺論當世務草答蕃書辨如懸河筆不停綴玄宗嘉之以寶牀方丈賜食於前御手和羮德音褒美褐衣恩遇前無比儔遂直翰林專掌密命將處司言之任多陪侍從之遊他日泛白蓮池公不在宴皇歡既洽召公作序時公巳𬒳酒於翰苑中仍命高將軍扶以登舟優寵如是既而上疏請還舊山玄宗甚愛其才或慮乘醉出入省中不能不言溫室樹恐掇後患惜而遂之公以為千鈞之弩一發不中則當摧撞折牙而永息機用安能俲碌碌者蘇而復上哉脫屣軒冕釋羈韁鎖因肆情性大放宇宙間飲酒非嗜其酣樂取其昏以富作詩非事於文律取其吟以適好神仙非慕其輕舉將不可求之事求之欲好壯心遣餘年也在長安時祕書監賀知章號公為謫仙人吟公烏棲曲云此詩可以哭鬼神矣時人又以公及賀監汝陽王崔宗之裴周南等八人為酒中八仙朝列賦謫仙歌百餘首俄屬戎馬生郊逺身海上往來於斗牛之分優遊沒身偶乘扁舟一日千里或遇勝境終年不移時長江逺山一泉一石無往而不自得也晚歲渡牛渚磯至姑熟恱謝家靑山有終焉之志盤桓利居竟卒於此其生也聖朝之高士其往也當塗之旅人代宗之初搜羅俊逸拜公左拾遺制下於彤庭禮降於玄壤生不及祿殁而稱官嗚呼命歟傳正生唐代甲子相懸常於先大夫文字中見與公有潯陽夜宴詩則知與公有通家之舊早於人間得公遺篇逸句吟詠在口無何叨蒙恩獎廉問宣池按圖得公之墳墓在當塗邑因令禁樵採備灑掃訪公之子孫欲申慰薦凡三四年乃獲孫女二人一為陳雲之室一乃劉勸之妻皆編戶氓也因召至郡庭相見與語衣服村落形容朴野而進退間都應對詳諦且祖德如在儒風宛然問其所以則曰父伯禽以貞元八年不祿而卒有兄一人出遊一十二年不知所在父存無官父殁為民有兄不相保為天下之窮人無桑以自蠶非不知機杼無田以自力非不知稼穡況婦人不任布裙糲食何所仰給儷于農夫救死而巳久不敢聞于縣官懼辱祖考鄉閭逼迫忍恥來告言訖淚下余亦對之泫然因云先祖志在青山遺言宅兆頃屬多故殯於龍山東麓地近而非本意墳高三尺日益摧圯力且不及知如之何聞之憫然將遂其請因當塗令諸葛縱會計在州得諭其事縱亦好事者學為歌詩樂聞其語便道還縣躬相地形卜新宅于青山之陽以元和十二年正月二十二日遷神于此遂公之志也西去舊墳六里南抵驛路三百步北倚謝公山即青山也天寶十二載勑改名焉因告二女將改適於士族皆曰夫妻之道命也亦分也在孤窮既失身於下俚仗威力乃求援於他門生縱偷安死何面目見大父於地下欲敗其類所不忍聞余亦嘉之不奪其志復井稅免徭役而巳今士大夫之葬必志於墓有勳庸道德之家兼樹碑于道余才術貧虛不能雨致令作新墓銘輒刋二石一置于泉扃一表于通路亦峴首漢川之義也庶芳聲之不泯焉文集二十卷或得之於時之文士或得之於宗族編緝斷簡以行于代銘曰嵩嶽降神是生輔臣蓬萊譴真斯為逸人晉有七賢唐稱八仙應彼星象唯公一焉晦以麴蘖暢於文篇萬象奔走乎筆端萬慮泯滅乎樽前卧必酒甕行惟酒船吟風詠月席地幕天但貴乎適其所適不知夫所以然而然至今尚疑其醉在千日寧審乎夀終百年謝家山兮李公墓異代詩流同此路舊墳卑􅋻風雨侵新宅爽塏松柏林故鄉萬里且無嗣二女從民永於此猗歟琢石為二碑一藏幽隧一臨𡵨岸深谷高變化時一存一毀名不虧唐故朝請大夫吏部郎中上柱國高都公楊府君碑銘并序席豫夫靈鎮三峯倚京師而西峙榮河一曲抱華隂而東注故川嶽氣交雲雨時出感降才傑紛綸元勳冠丗為強家宅兹沃土者其惟弘農楊氏焉曰我伯㣧厥自唐叔關中相府乘朱輪者十人洛下儒門登衮職者四代慶靈不隕以生我高都公公諱仲宣字蔓後漢太尉震之二十代孫也自高祖至于大父並名播海內迹存朝端舊史前碑其詳之矣烈考皇孫刑部尚書魏國忠公元琰屬姦臣擅命明辟應期功濟中興安劉氏者周勃禮優歸老論叔向者祁奚出處全身忠貞盡節公即尚書府君之第三子也粵在幼齡夙有至性事魏公莒國夫人以孝聞宗族推稱州閭籍甚清真邁俗秀楚不羣氣和可親色厲難犯言必合禮動不違仁集七略之書名高漢閣作三都之賦價重洛城未弱冠以通經為修文生授右千牛光朝選也秩滿補太廟丞以親纍出為蘄州司戶參軍屬先尚書辭滿告歸公罷官就飬潁曲别業地連嵩高丘中有華孝子潔白之興川上有水漁父滄浪之歌溫清獲申隱淪兼遂橫為酷吏王朂所誣陷貶授嶲州臺登縣尉劒南節度使益府長史韋抗奏公為管記飛書之急倚馬立成尋有詔停官歸侍俄丁尚書府君憂鞠凶而降哀毀骨立殆不勝喪取全於禮服闋從常調吏部侍郎魏奉古早以文伯期於王佐乃授河南府河陽縣尉尋應藻思清華舉今上親試對䇿甲科除蒲州司法參軍丁莒國夫人憂杖而後起公居魏公之喪也服闋不仕為叔父瑶所敦逼不獲巳而應命其年糊名考判公居上等乃擢拜監察御史獬豸之角𥘉見觸邪雞棲之車還聞嫉惡坐剛直出為汾州孝義縣令前宰無良下氓失業稼穡之地半為荒疇桑榆之人多在逋藪公曉喻歸本流亡盡復既富而教厥土有年故得雉馴郊田鸞降庭樹刺史蕭恕乃圖畫其像郵傳以聞天恩疇庸璽書褒美乃除華州下邽縣令辭疾罷職求歸養間無何除河南鞏縣令所歷為政有逾於前尋遷禮部貟外郎歷左司貟外郎春官之屬以和神人左轄之佐以正綱紀乃轉吏部貟外郎九品之曹一臺之劇有簿書以旌淑慝擇刀筆以決否臧於是乎以公滅私秉心匪石剖疑析滯揮翰如流選部以清繄公是賴尋遷本司郎中乃統胥徒是稱小選峻以風檢請託不行絶其關梁僥幸自息若乃見理之速持事之堅雖有賁育之勇金張之勢曽無恐懼不可動搖不陟台階奄先泉壤悲夫以元和二十九年七月五日構疾終于萬年永寧里之私第春秋四十有九以其年十月十七日歸葬于閿鄉牧馬原禮也惟公自家刑國曰仁與義厚利者常流之所重公以先人邑入盡分諸孤善交者衆人之所艱公以結下朋逰曽無凡客士有險詖比鄰不通人或急艱傾家以濟素懷儉約雅好真如不服綺紈不食葷血雖粉闈有閌朱紱斯皇不易貴賤之心能全始終之節嗟乎譽高千載道屈一時漢之崔駰官終邑宰魏之管輅位止府丞天乎與才而人乎無命自古所歎豈獨高都而巳府公所著文集十卷盛行於代嗣子輪行太常寺奉禮郎次子轅轍轔輯等永惟過庭之訓式遵卜宅之禮靈轜戒道哀挽及關靈掌東拓地惟鄉縣拱樹西靡心存帝京銘曰河之靈華之精人之傑國之禛年不永位未亨閉泉路兮冥寞空歲隂兮崢嶸唐故常州刺史獨孤公神道碑銘并序崔祐甫昔劉向稱賈誼言三代與秦亂之意其論甚美逹於國體雖古之伊吕未能逺過又稱董仲舒有王佐之材雖伊吕亡以加管晏之屬殆不及也於戲二君以偉才當盛漢之崇而位止於下國二千石祐甫聞於先君僕射曰主恩非臣下之所圖天命豈生人之所制有唐碩量深識之士曰獨孤常州諱及字至之河南洛陽人皇朝左千牛元慶之曾孫蔡州長史思滕之孫殿中侍御史贈祕書監通理之第四子仕而遭時鵠立於朝建旟東夏三著嘉績嗚呼痛乎奄忽捐館其時也大曆十二年夏四月二十九日其地也常州之路寢其壽也五十三年中朝名公素見知者後進之士聞義嚮風者洎濠舒常三州之百姓莫不填膺流眥不宴不相浹辰彌月厚而惜之者往往失聲出涕沱若公有子朗郁等未齓厥兄檢校水部貟外郎兼侍御史汜方佐浙河東帥聞喪來奔半旬而至惋毒之甚如不欲生既受吏人賔客之弔乃忍死謀事以六月六日引使君之柩去常州歸洛陽其年歲次丁巳十月朔七日葬我使君于河南府夀安縣某原先祕監之塋以夫人博陵縣君崔氏祔焉禮也水部曰天之降災害于我家仲叔季盡矣吾將老矣吾弟常州之子未立今不刻石表墓則常州之令名何以傳於後乃託我故人敘而銘之常州稟元和以生幼有成人之量祕監府君親授以孝經常州一覽成誦祕監問曰汝志於何句對曰立身行道揚名於後丗是志也自是遍覽五經觀其大義不為章句學成童丁祕監憂勺飮不入口者纍日先夫人同郡長孫氏諭以不可滅性之義由是微進饘粥杖而後起免喪加於人一等鄉族稱其孝焉長孫夫人高行明識訓導甚至常州漸教成器卓然有立著延陵論君子謂其評議之精在古人右天寶末以洞曉玄經對䇿上第超拜華隂縣尉著古函谷關仙掌二銘格高理精當代詞人無不畏服俄屬中原兵亂避地于越丁太夫人憂毀瘠過禮既外除江淮都統使戶部尚書李峘奏為掌書記授左金吾衛兵曹參軍軍旅之事非其所好未幾返初服今上即位下詔收俊茂舉滯淹政之大者以公為左拾遺凡所諌諍直而不訐婉而不撓屬藁訓詞不傳于外遷太常博士時新平大長公主之子裴防尚永清公主初以太子少傅裴遵慶為婚主將行五禮公實相焉中使口宣詔旨易之大長主後夫薑慶初常州曰婚姻之禮王化之階以異姓之人主之不可甚矣某不奉詔中書令汾陽王時為五禮使從焉又百官薨卒定諡之際綜核名實皆居其當嚴河南郢酬答吕荆州諲諡議博而正當時韙之遷尚書禮部貟外郎受詔考第吏部選人詞翰旌别淑慝朝野稱正上方大恤黎庶精選牧守以公為濠州刺史平其徭賦恤其冤弱課磧聞上加朝散大夫遷舒州刺史舒境瀕江傍山羣盜所聚或蟠結林藪或趑趄城寺公惠以柔之武以讋之釋矛服耒盡為良俗其他如在濠之政居一年璽書勞問就加尚書司封郎中錫以金章紫綬屬江南旱歉比境之人流庸甚衆公忠心以撫舒獨完安天子聞而休之擢拜常州刺史常州當全吳之中據名城沃土兵興之後中華翦覆吳中州府此焉稱大故朝之選牧恆屬意焉公宣中和平易之教務振人育德之體百姓蒙化遷善不知所以安而安吏不忍欺路不拾遺餘糧棲畝膏露降之公平生聞人之善必揄揚之氣盡與之不啻若身得之後進有才而業未就者教誨誘掖之惟日不足公之文章大抵以立憲誡丗褒賢遏惡為用故論議最長其或列于碣頌流于詠歌峻如嵩華盛如江河清如秋風過物邈不可逮公有集二十卷行於代若夫贊堯舜禹湯之命為誥為典為謨為訓人皆許之而不吾試論道之位冝而不陟前是公之仲兄季弟伯姊三年之間繼殁執天倫之喪如茶如􅖋竟以無祿天何不仁然則賈與董名位不盡其才吾先君之歎主恩天命斯見矣其銘曰常州之孝行為大蒸蒸翼翼以敬以愛友于兄弟如捧如戴常州之義篤于友用之有常行之可久扶危拯溺爾身我手常州之才施于政撫柔三部以仁為柄龔遂國嶠十古迭映常州之文究其本質取其正豔從其損在星之緯在衣之衮常州之年止中身去昭昭之盛丗與萬鬼而為鄰白馬江上青鳥洛濱鶺鴒在原嗟爾元昆縗袵霑血長號訴冤纂述遺美謂余不諼我覯之子將二十年相投藥石胡疹不痊譬我於池子為之泉譬我於桐子為之弦榮不獨遂難不隻全如何淑明摧馥碎堅廞衣楚挽徘徊墓田望之不見赴之無緣狸首班如女手拳如天如天如泣涕漣如故饒州刺史吳府君神道碑銘并序白居易汩市朝溺妻子非逹也囚山林擯血屬非逹也若有人與羣動處一代間彼為彼我為我不自潔不自汚不巢許不伊吕水其心雲其身浮沈消息無往而不自得者其逹人乎吾友吳君嘗從事於斯矣君諱丹字真存太子通事舍人覽之曾孫睦州司馬庶之孫太子宫門郎贈工部尚書詮之長子以進士第入官歷正字協律郎大理評事監察殿中侍御史太子舍人水部庫部貟外郎都官駕部郎中諌議大夫大理少鄉饒州刺史歷職義成軍節度判官浙西道節度判官潼關防禦判官鎮州宣慰副使匭函使階至中大夫勳至上柱國賜紫金魚袋君讀書數干卷著文數萬言寶歷元年六月某日薨于饒州官次其年十一月某日葬于常州晉陵縣仁和鄉北原從志也君生四五歲弄泥沙時所作戲輒象道家法事八九歲弄筆硯時所出言輒類詩家篇章不自知其然蓋宿習儒玄之業明矣弱冠喜道書奉真籙每專氣入靖不粒食者纍歲皓氣充而丹田澤飄然有出世心既壯在家為長屬有三幼第八稚姪嗷嗷栗栗不忍見其飢寒慨然有干祿意乃曰肥遁不可以立訓吾將業儒以馳名名競不可以怡神吾將體玄以育德凍餒不可以安道吾將強學以徇祿祿位不可以多取吾將知足而守中繇是去江湖來京師求名得名求祿得祿身榮家給之外無長物無越思素琴在右黃庭在左淡乎自處與天和終始履仕塗二十七年享夀命八十二歲無室家纍無子孫憂屈伸寵辱委順而巳未嘗一日戚戚其心顔以至于歸全反真故豫所謂逹人之徒歟信矣仲弟湖州長史某以豫辱與其兄遊既為同門生又為同舍郎周知初終託為碑記噫先生之道吾能引古以明之銘曰漢中大夫東方曼蒨夏侯湛高之作廟貌贊唐中大夫真存先生白樂天知之作神道銘嗚呼二大夫異代而同塗其皆逹者乎唐故通議大夫和州刺史吳郡張公神道碑銘并序張之為著姓尚矣自漢太傅良侍中肱晉司空華丞相嘉以降勳賢軒冕歷代不乏肱避地渡江始居于吳故其子孫稱吳郡人嘉以孝悌聞干郡故其所居號孝張里嘉之曾孫𥙿在宋為司徒即公五代祖也司徒之孫儔在隋為吳郡都督即公曽王父也台州臨海令諱鵾即公之大父也袁州司馬諱孝績即公皇考也或以人物著或以婚閥稱迄今為江南右族公諱擇字無擇未冠丁袁州府君憂廬于墓晝號而夜泣者三年有靈芝醴泉出焉既冠好學能屬文從鄉賦登明經第既第應制舉中精通經史科輔弘文館校書郎調左金吾録事換杭州録事參軍在杭州前後詰偽制補吏者三十八人駮假年侍老者二十人舉而正之人伏其明會劉幽求來為刺史舉課上聞詔授絳州録事參軍絳之郡丞有主壻者怙寵侮法豪奪人利公數其罪露章奏之章下丞相姚元崇竒之致書褒美尋改太原府功曹參軍給事中張昶為江淮安撫使表公正直奏署部從事吏部尚書陸象先為河東按察使狀公清白奏授懷州獲嘉以不茹柔不吐剛得罪繇是左遷鄂州司馬移深州司馬轉號州長史時上方思理詔求二千石之良者時宰以公塞詔擢拜和州刺史公之在郡奉詔條恤人隱而巳不知其他無何水潦害農公請蠲榖籍之損者什七八時李知柔為本道採訪使素不快公之剛直密疏誣奏以附下為名遂貶蘇州别駕老幼攀位而遮道者數百人信宿方得去移曹州别駕嵗餘謝病歸老于家天寶十三年正月二十一日終于東都利仁里私第其年二月十二日葬于河南府伊闕縣中李原享年八十三噫公生天地間八十有三年可謂壽矣其間當明皇馭天下四十有五年可謂時矣有其才得其壽逢其時然職不過陪臣秩僅至郡守凡所貯畜􅓹而不舒嗚呼其命也夫公之文學常為賀知章賈彥璿許之公之諒直常為李雍張庭圭稱之公之政事又為劉姚張陸推之夫以八君子之力援之而不足以一知柔之力排之而有餘厄窮不振以至沒齒嗚呼其命也夫古人云道不虛行又云其後必有逹者故公之子大理評事諴以節行聞于時公之孫戶部侍郎平叔以才以先于國報施之道信昭昭矣不在其身則在子孫相去幾何哉長慶二年某月某日平叔奉祖德揭而碑之居易據家狀序而銘之其詞云有木有木碩大而長破為桷杙不作棟梁有驥有驥規行矩步辱在短轅不駕大輅嗚呼噫嘻公亦如之將時不我遇而我不遇時勿謂巳矣天錫多祉既賢其子以濟其美又才其孫以大其門苟無先德孰啓後昆重校正唐文粹卷第五十八
