front:
  text: 重校正唐文粹卷第九
  hash: sha256:62115daf63df80d6fb55210de31d4c776eaa84f8307cefcb3dc871c101707b3a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0024_SBCK_009-1a}
body:
  text: 吳興姚鉉纂古賦壬總十首脩身一動静交相養賦白居易哀樂愁思八懷忠賦歐陽詹泛渭賦白居易望賦劉禹錫惜餘春賦李白江上愁心賦張說別知賦韓愈愛而不見賦蕭頴士傷徃賦劉禹錫夢一夢渴賦何諷動静交相養賦并序白居易居易常見今之立身從事者有失於動有失於靜斯由動静俱不得其時與理也因述其所以然用自儆導命曰動靜交相養賦云天地有常道萬物有常性道不可以終靜濟之以動性不可以終動濟之以靜養之則兩全而交利不養之則兩傷而交病故聖人取諸震以發身受以復而知命所以莊生曰智養恬易曰蒙養正者也吾觀天文其中有程日明則月晦日晦則月明明晦交養晝夜乃成吾觀歳功其中有信陽進則隂退陽退則隂進進退交養寒暑乃順且躁者本於靜也斯則躁爲民靜爲君以民養君敎化之根則動養靜之道斯存且有者生於無也斯則無爲母有爲子以母養子生成之理則靜養動之義明矣所以動之爲用在氣爲春在鳥爲飛在舟爲楫在弩爲機不有動也靜將疇依所以靜之爲用在蟲爲蟄在水爲止在門爲楗在輪爲柅不有靜也動奚資始則知動􅀆靜所伏靜􅀆動所􅀝吾何以知交養之然哉以此有以見人之生於世出䖏相濟必有時而行非匏􅀲不可以長繫人之善其身枉直相循必有時而屈故尺蠖不可以長伸嗟夫今之人知動之可以成功不知非其時動亦爲凶知靜之可以立德不知非其理靜亦爲賊大矣哉動靜之際聖人其難之先之則過時後之則不及時交養之間不容毫􅁵故老氏觀妙顔子知幾噫非二君子吾誰與歸懷忠賦并序歐陽詹丙寅歳因受譴季冬之月次于殷墟歷􅀜龍逢墓焉昔聆其風未甞不迴膓霣涕覩夫塋壟心又増傷遂寫憤于言爲賦以弔先生以忠諌致命故以懷忠命篇云天生彼辛􅀆用殱覆于夏家欲悠悠而罔極毒浩浩而無涯無辜殞身肆市朝之若莽有道併命委炮烙以如麻伊先生之諤諤爲酷烈之所加甞披圖於徃載每廢卷於興嗟蕭條舊邑莽蒼空陂陷陵成坎古木無枝或人曰此其墓也又一倍以増悲嗚呼麟非騰噬之儔詎虎狼之共穴鳯實仁靈之􅀋豈鷹鸇之同列惟玉石之明分亦薰蕕之自別是以謇謇心競昻昻面折彼炎炎之原燎信撲撲而不滅寜歸死以申懷不貪生而結舌痛矣哉古人有言輔仁者天福善者神胡爲是日功不如人使典章之不信俾忠義之空勤律中大吕日臨蒙谷風颼颼於衰草煙茫茫乎平陸思悽悽而填臆涙􅁋􅁋以盈目義則非其知友親故逺夫骨肉節臨危而不撓行於艱而彌篤惟其有之是以傷之而慟哭泛渭賦并序白居易右丞相高公之掌貢舉也予以鄉貢進士舉及第左丞相鄭公之領選部也予以書判拔萃登科十九年天子並命二公對掌鈞軸朝野無事人物甚安明年春予爲校書郎始徙家秦中卜居渭上上樂時和歳稔萬物得其宜下樂名遂官閑一身得其所旣美二公佐清靜之理又荷二公垂特達之遇發於嗟嘆流於詠歌于時泛舟于渭因爲泛渭賦以導其意辭曰亭亭華山下有人跂􅀆望􅀆愛彼三峯之白雲泛泛渭水上有舟㳂􅀆泝􅀆愛此百里之清流以我爲太平之人􅀆得於斯而優游又感陽春之氣熈熈􅀆樂天和而不憂曰予生之幸􅀆時哉時哉當皇唐受命之九葉􅀆夷與華而無氛埃及皇帝纉位之二紀􅀆命髙與鄭爲鹽梅二賢􅀆爰立四門􅀆大開凡讀儒書與履儒行者率充賦而四來雖片藝而必􅀵􅀆故不弃予之小才感再遇於知已心慙怍以徘徊登予名於太常署予職於蘭臺臺有蘭􅀆閣有芸芳菲菲􅀆可襲備一官而無事又不維而不縶家去省􅀆百里每三旬而一入川有渭􅀆山有華澹悠悠其可賞目白雲􅀆漱清流且或偃而或仰門去渭􅀆百歩常一日而三徃夜分􅀆扣舷天無雲􅀆水無煙遟遟􅀆明月波淡灔􅀆棹寅縁日暮􅀆舟泊草萋萋􅀆沙漠漠習習􅀆春風岸柳動􅀆渚花落發浩歌以長引舉濁醪而緩酌春冉冉􅀆其將盡予何爲平不樂鳥樂􅀆雲際鳴嚶嚶􅀆飛裔裔魚樂􅀆泉底鬐撥撥􅀆尾潎潎我樂􅀆聖代心融融􅀆神泄泄伊萬物各得其樂者由聖賢之相契賢致聖於無爲聖致時於旣濟凝爲和􅀆聚五福發爲春􅀆銷六沴不我後􅀆不我先適當我􅀆生之世彼鱗蟲與羽族咸和樂而不知惠我爲人􅀆最靈所以愧賢相而荷聖帝樂乎樂乎泛于渭􅀆詠而歸聊逍遥以卒歳望賦劉禹錫邈不語􅀆臨風境自外􅀆感從中明晦轉續􅀆八極鴻蒙上下交氣􅀆羣生異容發􅀌照于寸眸騖遐情乎太空物乗化􅀆多象人遇時􅀆不同嗟乎有目者必騁望以盡意當望者必縁情而感時有待者瞿瞿忘懷者熈熈慮深者瞠然若喪樂極者沖然無違外徙􅀝其如一中紏紛􅀆若斯望如何其望最樂晞慶霄􅀆遡阿閣如雲􅀆天顔咫尺如草􅀆臣心踴躍扇交翟􅀆葳㽔旗升龍􅀆蠖略日轉黃道天開碧落凝瑞景於庭樹掬非煙於殿幕望如何其望且懽登灞岸􅀆見長安紛擾擾􅀆紅塵合鬱葱葱􅀆佳氣盤池象漢􅀆昭回城依斗􅀆䦨干避御史之騘馬逐倖臣之金丸望如何其望彼好宗萬靈􅀆越四隩漢帝仙臺􅀆秦皇海嶠霓衣踴于河上馬跡窮乎越徼紫氣度關而斐斖神光屬天而照耀睆眷眷以馳精聳專專而觀妙望如何其望有形視蠢蠢􅀆窮􅁳􅁳楚塞氛惡􅀆蕭關燧明暈籠􅀌月角奮長庚沙多似雪磧有疑城煙雲非女子之氣草木盡王者之兵審曵柴之虚警破來􅀐之先聲信有得于風鳥示無言于斾旌望如何其望且慕恩意隔􅀆年光騖雕輦巳辭􅀆金屋何處長信草生􅀆長門日暮傒翠華之儻來仰玄天以自訴況復湘水無還漳河空注淚染枝葉香餘紈素風蕭蕭􅀆北渚波煙漠漠􅀆西陵樹夫不歸􅀆江上石子可見􅀆秦原墓拍琴翻朔塞之音挾瑟指邯鄲之路望如何其望最傷佩環玦􅀆思帝鄉龍門不見􅀆雲霧蒼蒼喬木何許􅀆山髙水長春之氣􅀆恱萬族獨含嚬􅀆千里目秋之景􅀆懸清光偏結憤􅀆九回腸羡環拱于白榆惜馳暉于落棠諒衝斗􅀆誰見伊戴盆􅀆何望平聲豈止蘇武在胡管寜浮海送飛鴻之滅没附隂火之光彩鶴頸長引烏頭未改恨巳極􅀆平原空起何時􅀆東山在永望如何傷懷孔多降將有依風之感宫人成憶月之歌歌曰張衡側身愁思乆王粲登樓日迴首不作渭濵垂釣臣羞爲洛陽拜塵友惜餘春賦李白天之何爲令北斗而知春􅀆迴指於東方水蕩􅃞􅀆碧色蘭葳蕤􅀆紅芳試登髙而望逺極雲海之微茫䰟一去􅀆欲斷涙流頰􅀆成行吟青楓而詠滄浪懷洞庭􅀆悲瀟湘何餘心之縹緲􅀆與春風而飄揚飄揚􅀆無限念佳期􅀆莫展平原萋􅀆綺色愛芳草􅀆如翦惜餘春之將闌每爲恨而不淺漢之曲􅀆江之潭把瑶草􅀆思何堪想遊女於峴北愁帝子於湘南恨無極􅀆心氲氲目眇眇􅀆憂紛紛披衞情於淇水結楚夢於陽雲春每歸􅀆花開花已䦨􅀆春改嘆長河之流春送馳波於東海春不留􅀆時已失老衰颯而情逾在恨不得挂長繩於青天繫西飛之白日若有人􅀆情相親去南國􅀆徃西秦見遊絲之橫路網春輝以留人沉吟􅀆哀歌躑躅􅀆傷別送行子之將逺㸔征鴻之稍滅醉愁心於垂楊隨柔條以紏結望夫君􅀆興咨嗟橫涕涙􅀆怨春華遥􅀉影於明月送夫君於天涯江上愁心賦張說江上之峻山􅀆鬱﨑嶬儀而不極雲爲􅄘􅀆煙爲色歘變態􅀆心不識江上之深林􅀆杳􅁳蒙而不巳鳥爲花􅀆猿爲子紛盪瀁􅀆言莫擬夏雲隂􅀆若山秋水平􅀆若天冬沙飛􅀆淅淅春草靡􅀆芊芊感四節之黙運知萬化之潛遷伴衆鳥􅀆寒渚望􅀌帆􅀆日邉雖欲貫愁膓於巧筆紡離夢於哀絃是心也非模放之所逮將有言􅀆是然將無言􅀆是然別知賦韓愈予取友於天下將歳行之兩周下何深之不即上何髙之不求紛擾擾其旣多或喜能而好修寧安顯而獨􅁉顧阨窮而共愁帷知心而難得斯一旦而爲收歳癸未而遷逐侣䖝虵於海陬遇夫人之來使闢公館而羅羞索微言於亂志發􅀌􅀏於羣憂物何深而不考理何隱而不抽始參差以異序卒爛漫而同流何此懽之不可恃遂駕馬而廻輈山嗷嗷其相軋樹蓊蓊其相樛雨浪浪其不止雲浩浩其常浮知來者之不可以數哀去此而無由􅀝郭郛而掩涕空盡日以遟留愛而不見賦蕭頴士嗟乎或愛之而不見者有矣何必周秦異代夷夏殊􅁤阻嚴城之九重限方舟之一水茍時事之多怨故人遐而室邇􅀜山起於足下堂上逺乎千里聳專專之目成遽時逝而復止詩人所以思婉孌而搔首賦城隅之有俟吁不得其巳也惟夙昔之良㑹夢佳期於北方欵渤海之三山吸流霞之景光含芳辭以貺予云好惠之不忘顧服義之永日陪遊嬉於帝郷廣莫忽其飄怒鯨波洶而騰張俄驚魂以輟寐間窮髮之茫茫將揭厲以復從駃風濤之匪量顧投軀以靡吝撫遺體以兢惶晨切切以悽愴夕屏營以彷徨追前懽之俯邇歎此恨之悠長於是􅀵神返慮澄澹靜黙冥然就寢兀若無識兾良宵之復遇希舊遊之可即徒有顧􅀆且未克憂沉深􅀆萃胷臆風􅀆雨􅀆何極傷徃賦并序劉禹錫人之所以取貴於蜚走者情也而誕者以遣情爲智豈至言耶予受室九年而鰥痛若人之夭閼弗遂也作賦以傷之兾夫覽者有以増伉儷之重云歎獨處之邑邑􅀆憤伊人之我遺情可殺而猶毒境當懽而復悲人或朝嘆而暮息夫何越月而逾時太極運乎三辰轉寒暑而下馳有歸于無􅀆盛復于衰猶昧爽之必暮又安得而怨咨我今怨夫若人􅀆曾旭旦而潛暉飄零日及之蕚倐忽蜉蝣之衣川走下而不還露迎陽而易晞恩巳甚􅀆難絶見無期􅀆永思我行其野農民桑者舉桉來饁亦在林下我觀于途裨販之夫同荷均挈荆􅁫布􅃭羽毛之蕃鱗介之微和鳴灌叢􅀟泳漣漪薨薨者蟲蠢蠢伊豸遊空穴深兩兩相比何動􅀋之萬殊必雄雌而與俱物莫失儷以􅀌處我方踽踽而焉如我復虚室目淒涼􅀆心伊鬱心伊鬱􅀆將語誰坐匡牀􅀆撫嬰兒何所丐沐􅀆何從仰飴襦袴在身􅀆昔圍差跌鞶囊附臂􅀆餘馥葳蕤誠天性之潛感顧童心􅀆如疑嘵然有難繼之慕漠然減好弄之姿指遺袿􅀆能認愬空帷􅀆欲歸我入寢宫痛人亡􅀆物改其容寶瑟僵􅀆絃柱絶瑶臺傾􅀆鏡奩空寒爐委􅁅虚幌多風􅂩駟晨轉牎蟾夜通歩揺昏􅀆網粘翡翠芳褥掩􅀆塵化蛩蛩閱刀尺之餘澤見巾箱之故封翫服儼􅀆猶具繁華謝􅀆焉從想翩翻於是非求僁窣與􅁳蒙信竒術之可致嗟此生􅀆不逢徒注視以寂聽恍神疲而目窮還抱影以獨出紛百哀而攻中系曰龍門風霜苦別鶴哀鳴夜銜羽呉江波浪深雌劒一去無遺音悲之來􅀆憤予心洶如行波洊浸􅁋悵縁情而莫極思執禮以自箴巳焉哉苒苒生死悠悠古今乗彼一氣􅀆聚散相㝷或鼓而興或罷而沉以無涯之情愛悼不駐之光隂諒自迷其有分徒終怨於匪忱彼蒙莊􅀆何人予獨累嘆而長吟夢渇賦何諷不􅀫食以晨飲困鍾盂以沉寢永春晝而髙扄墮幅巾而横枕及乎酒適􅂨膓神遊異方煙生喉舌惝然如狂爰瞰甃以窺汲諒不任於呼吸俄據河而俯瀆乃器舟而杯斛倒魚鼈之窟宅見蛟龍之委伏猶胃膓之不浹資宴飲而未足由是奔九江走五湖手不睱於斡運心不息於躊躇見波漸竭而百川如綫岸益髙而底淤將枯腹慊爾而未􅁴肺燥然而不濡㝷至大溟茫然連清豈爾浩瀚而吾量不盈斟酌未幾倐見涯涘百靈稽首乞留濡漑吾腹未充豈汝爲意俄傾竭於浩􅄅奄滴瀝而無漬瑶宮貝闕盡列平地三山赤城可以歩至鯤鯨噞喁相喣以呬大鵬驚攫巨鼇愕眙四顧燥涸悒然興情此情何竒非吾所知恨滄海之可罄不足充吾之所思周遭有截塊然墆㙞水府萬族咸呼帝闕帝且不聞吾欲未竭方將㝷蟻垤期耿恭問姜毋以何在訪舒姑而欲從辨夸父於渭上弔相如於臨卭萬計巳盡六腑如燼䆫日斜照飛蚊遶􅁂旣驚旣覺可嘆可􅀏飲不盡器枯膓巳療搘頥沉吟其意逾深以吾此日之一夢見自古不足者之心重校正唐文粹卷第九
