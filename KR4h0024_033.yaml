body:
  text: 吳興姚鉉纂文丙揔九首弔古三許由先生廟酹文柳識弔夷齊文書師曠廟文袁皓雷霆一上天鼓文程浩軍政一祭纛文獨孤及畏途一招北客文祛癘一送窮文叚成式責檄二責龜文王岳靈檄曲江水伯文樊鑄許先生頴陽祠庭獻酹文柳識壬辰歳夏四月客有自洛東遊至先生遺廟而穎永古風舊山巋然追懷古蹤慕羙至道以時酒敬酹于靈旣酌旣拜獻乎言曰天清旣能乆地靜不能朽先生清淨天地全性出於肧渾入於鴻蒙雲遊鳥還蓊鬱和風當時帝道巳半滋章欲深大樸散於人未散於山林乃有巢父杳冥同心堯齎公器退然見推遇聖相感不得不知耳雖濯於清流道終播於無爲所謂春膏時蒸朽葉自滋先生含德唐堯發之潁陽之仁德日大天下之禄利日卑且聖王所重者名器至人所重者感通推以大名義同譲終廉能感俗道自爲功任應㑹之偶然生垂後之清風人登雲嶺多憶箕潁猗歟先生山水齊名兹焉遺廟萬古芬馨弔夷齊文洪河之東兮首陽穹崇側聞孤竹二子昔也餒在其中偕隱胡爲得仁而死青苔古木蒼雲秋水魂兮來何依兮去何止掇澗溪之毛薦精誠而巳𥘉先生鴻逸中州鸞伏西山顧薇蕨之離離歌唐虞之不還謂易暴兮又武謂墨縗兮胡顔一吒兮忘飢若有誚兮干巖之關豈不以冠弊在於上履新處於下且曰一人之正位孰知三聖之純嘏讓周之意不其然乎是以知先生所恤者偏矣當昔夷羊在牧殷綱解結乾道息坤維絶鯨吞噬兮鬼孽王奮厥武天意若曰覆昏暴資濬哲於是三老歸而八百㑹一戎衣而九有截況乎旗錫黃鳥珪命赤烏俾荷鉅橋之施俾申羑里之辜故能山立雨集電掃風驅及下車也五刃不礪於武庫九駿伏轅於文途雖二士不食而兆人其蘇旣而溥天周土率土周人于嗟先生逃將奚臻萬姓歸飾兮獨鬱乎方寸六合莽蕩兮終跼乎一身雖忤時而過周終臣心而惻殷所以不食其食求仁得仁然非一端事各其志若旁通以阜厥躬應物以濟其利則焉有貞節之規各親之事靈乎靈乎雖非與道而保生乃朂爲臣之不二書師曠廟文袁皓吟篁怨桐天其聲乎鏘石鏗金天其文乎擊革鳴絲天其暢乎匏土之韻天其和乎天有至音寄斯八物先生不生斯音鬱鬱先生旣生斯音在律嗚呼先生之耳時可求也先生之心不可得也天全樂乎先生之無神乎愚固狂而不可攄先生之有神乎愚堅誠而乞其圖先生之耳有神乎化爲天下之耳先生之心有神乎化爲天下之心者可以舒於今然後家家知舜琴上天鼓文程浩雷車闐闐六合喧吼驟風雨於南極族星雲於北斗遑俄選蹙東海以波蕩擺太山而瓜剖玉石至堅切如泥濘松栢至勁粉爲枯朽鼉皮擊考而魑魅晱暘龍領觗觸而鯨鯢奔走陶鑄造化之鑪而鴻毛萬像幹運乾坤之柄而嬰孩羣有由是言則九鼎瑣細三山培塿鼒鼐可以指揮蓬萊可以背負殊不測離蒼天之近逺當懼驚魂在玄雲之幾重徒勞矯首及夫白日兩歇長虹霽後列缺緩轡玄冥假手蓄殘怒之未洩聞餘音之良乆而小子之繆學敢獻疑於座右今若爲善惡之宰主操賞罰之休咎胡不扶持顔閔之羶行夭閼跖蹻之首夀罪一亂臣懲天下之凶醜旌一孝行激天下之悌友法髙懸於堯典形不試於周后何必霹靂濳之龍養育吠堯之狗祭纛文獨孤及天地不仁神明無親惟正是與若響之荅敢有象㳟滔天搆亹稱亂國有明罰神其捨諸賊臣劉展假寵多難敢包狼心竊發蠆毒將敷虐于我上下神祇使東溟揚波羣動昏墊皇帝震怒按劒授鉞命我上將底天之伐於是有虎牙鷹揚之臣蛇矛犀渠之羣橫行而東我伐用張月羽雲旗以先啓行方將歷潯陽下南陵收京口掃建業斮梟獍以釁鼓封鯨鯢于京觀俾萬里浪破三象霧廓今以令月吉日整駕即路是用徼福于爾有神惟神降衷尚弼予志敢告無靡旗無絓驂無汰輈無僨車命五將護野萬靈並轂令天地氛祲望風掃除魑魅魍魎罔不率㑭莫我敢遏爲神祇羞尚饗招北客文蜀之先曰𧖟叢兮縱其目以稱王當周室凌頽兮亂無紀綱洎乎杜宇從天而降鼈靈泝江而上相禪而帝據有南國之九世蜀夲南夷人也皆左其袵而椎其髻及通乎秦也始於惠王之代五牛琢而秦女至一蛇死而力士斃二江雙注羣山四蔽其地卑溼其風脞脆蠻貊雜處滇僰爲隣地偏而兩儀不正寒薄而四氣不均花葉再榮秋冬如春暮夜多雨朝旦多雲陽景罕開隂氣恒昏以暑以溼爲瘵爲癘氣浥蟄以中人吾知重膇之疾兮將嬰爾身蜀之不可徃北客歸去來兮其東則有大江澐澐下絶地垠百谷相吞岀於荆門突怒吼劃附于太白渤潏硼砰㑹于滄溟跳噴浩森上濺飛鳥蹙縮盤渦下旋黿鼉三峽兩璧亂峯如㦸岈屹崪􅐓洞劃坼高干天霓雲外水積晝日無光其下黒窄瞿塘無底淺處萬尺啼猿哀哀膓斷過客復有千歳老蛟能變其身好飲人血化爲婦人衒服靚粧遊干水濵五月之間白帝之下洪濤塞峽不見灔澦翻天蹙地霆吼雷怒亦有行舟突然而去人未及顧櫂未及舉瞥見陽臺不辨雲雨千里一歇日未移午須臾黒風暴起拔樹震山石走砂飛波騰浪翻舟子失據摧檣折竿漩入九泉没而不還支體糜散蕩入石間水族呀呀拔刺爭餐蜀之東不可徃北客歸去來兮其西則有髙山萬重峻極屬天西有崑崙其峯相連日月廻環閡于山巓巒崖盤嶔天璧夐絶陽和不入隂氣固閉千年増氷萬古積雪谿寒地坼谷凍石裂夏月草枯春天木折蒼煙凝兮黒霧結人墮指兮馬傷骨江水噴激廻盤紆縈棧璧縁雲釣連相撑繩梁嶫虛傍沓杳冥下不見底空聞波聲過者矍然亡魂䘮精復引一索其名爲笮人懸半空度彼絶壑或如鳥兮或如玃倐徃還來幸不落或有豪猪千羣努鬛射人寒熊孔碩登樹自擲見人則擘巨麋如牛脩角如劒餓虎爭肉吼怒闞闞復有髙崖墜石兮聲若雷之軯轟上𫾣下礚似火迸兮滿山流星磵溪忽兮倒流林岸爲之頽傾碎騰狖與過鳥駭木魅兮山精飛石壓人兮不可行西有犬戎與此山通形貌類人言語不同氊廬隆穹毳裘蒙茸啜酪啖肉持搶挾弓依草及泉務戰與功其聲如犬其聚如蜂中國之人兮或流落於其中豈只掘䑕茹雪以取活終當鈹其足而纍其胸泣漢月於西海思故鄉於北風蜀之西不可徃北客歸去來兮其南則有卭笮之關天設險艱少有平地連延長山橫亘廬江隔閡百蠻吁彼漢原上當漏天靡日不雨四時霶然其人如魚爰處其泉終年霖霪時復日出㹞㹞諸犬向天吠日人皆濕寢偏死腰疾復有陽山之路毒瘴下凝白日無光其氣瞢瞢暑雨下濕黃茅上蒸南方之人兮不敢過豈止走獸踣兮飛鳥墮吾不知造化兮何知此方些蜀之南不可以徃北客歸去來兮其北則有劒山巉巉天鑿之門二璧谽谺髙岸嶙峋上拄南斗傍鎭于坤下有長道北逹于秦秦地神州中有聖人左右伊皐能致我君雙闕峩峩上覆慶雲千官鏘鏘朝于紫宸玉樓鳳凰金殿麒麟布徳垂澤搜賢修文皇化欣欣煦然而春蜀之北不可以往北客歸去來兮送窮文㱼成式子大中八年作留窮辭詞人謂子辭反之勝也至十三年客漢上復作送窮祝是年正之晦童稚戲爲送窮舡判筒而槽比籜而閭細枲纒幅楮飾木偶家督𬒳酒請禳窮將酹地歌舞窮子謂曰予送非嚵歷慼循隂索隙膋葷餅直脰涎瀝者非寒哭蔟憐敗衣網身惡覻牆間冷嘯淒辛者非嚇去覡嗾巫欺癡嬈衰燼數楮泉擾狎狐狸者噫有才歉升窄朘膓􅎪喀㡬童其筆燥心汗滴以是而殁者去些有議古酌今左凌右浸麓垤酒涔短淺不禁以是而殁者去些責龜文王岳靈萬物之貴者人也人惟秀介蟲之智者龜也龜惟神隱括無形神之謂也窮通有極秀之謂也况天之與人其道甚逺不有以也将何逺焉則吉凶之祥假子以告變化之象因子以明欲愛謀稽疑必先弊昆命冝蠲割誘慕展布心腹子無欺於人人有望於子成天下之亹亹豈不率道與何諸吕弄權昭大横於漢帝帝辛毒痡匪告繇於周武揆惡之輕重也吕之惡不浮于辛量徳之休明也昌之徳靡及於發子二其行誰不解體矣夫義禮之輿也信身之幹也何陳氏之母不疾而稱疾魯孫之臣卜僭而告義喪於禮失其徒寔繁吾不殫悉考夫演卦繇者蓍也蓍之靈而不加子之長定妍蚩者鏡也鏡之明不如子之知銘乎竹帛萬代不泯奚起矛楯俾吾反惑於古人孰謂子原天地之美逹五行之理徒使䟽淪澡雪仰止蒙求曾莫之校何異乎曹丘生愚拒季布善盻已虞國僑哉必以剥桂刻漆非材木所願拔鶡裂冠非禽鳥所欲當濳伏奫灣違禍罾罟九江錫命其可得乎豈不免氓之蚩蚩熒惑於耳目也檄曲江水伯文天寳三載群公之故也樊鑄主張於地之血脉者豈不曰水伯乎爾自獸爲身面爲人控牽兩龍窟宅百谷億有祀矣故斁倫於元氣之液弄權於坤輿之竅所云老而不死是謂之賊伊我謂爾有是夫何者三載二月春服旣成冠者五六人才子六七人皆簸揚文精開闔武庫游嬉春晝㳂洄江干興飛壯心舞曳齒胄皆貸白龜之徳不負赤鯉之本爾何爲隂發暴殄濳生毒痡簣禍堦於沙岸垣死府於花島如數子者皆載垂堂之誡爾始若懸流三十仞跳沬四十里固應尊而不親舋豈相及爾岸不崪屼流不唐突設人所倚之福䧟爾孔易之誘俾水衒貫堅之功舫聲之如蜩螗捫空呼天迄死不救倐恣化魚之惡誰下拜牛之惠溺我國寳豈明時弃珠之泉沈彼綵舩實去夜藏舟之壑與夫覩右山四耳之獸夢頴川一角之人置于大江未匹斯甚使掲竿求父之子投牋請弟之兄奏箜篌傷妻之夫厲波濤徇壻之婦罹其凶害不忍荼毒並告無辜于上下神祗行哭失至於爾安乎爾今肆行賊虐者豈不謂性與習成乎何哉曩者溺孫興公於後湖之中淪炎帝女於東海之上化鼈於黃氏之母爲魚於歷陽之郡爾應恃以舊捷蔓其後圖殊不知事不欲數數斯辱矣惡貫巳滿天命誅之然今歷視爾自昔爲過之所或天涯或地􅯀起於侯甸之外且非輦轂之下豈比今日俯九門臨四逹使哀聲悲響上及聦聽爾誰欺欺天乎然曲江者南峙仙閣北距靈宫足可效赤水産黄帝之珠胡爲殱蒼生竊司命之契況之人也皆編中華俗游無何鄊所兾猛火烈山而莫焚大浸稽天而不溺旣遇爾省括捨之中縱使飯術解漂之餌山經不沈之木豈可免爾之圖乎玆中江自首創至于今時數千里子更代易主㠀流波秏纔可接腋於井蛙詎持頤於海鼈爾之所處豈不狹隘乎人之所賞豈有舳艫乎逮天寳載我皇恢土德以博之竇澤流以濬之積潤下之波瀾用濟川之舟檝豈不謂幸於爾也爾何滿以致溢凶以自斃使彼都人士自此之後懼爾同失神之海惡爾甚探手之湯匪徒歇爾盛事過自掇也雖悔可追然靈莫尊於君人時莫美於陽春君固愛人種徳乗春宥罪省囹圄去桎梏爾奚得恃宅無聞括守有曲襲不辜於止獄之候繫餘殃於積慶之家僕謂數子呌天曹訴地府黜爾主職在於斯須不然僕見欲上書於承明廬徴菑近速周處擊劒長逐擘波深搜爾居遁逃則焦僥東請長臂者灑漉之又於雄棠北使長股者慿踐之不然邀離朱以視之命宋定以縛之然後調馬梅扇獸炭是烹是醘以報東門爾儻若混空隱形和水匿象則使牛曵蛇尾絶其本根縱逢山見彘毛終難必復矣僕亦冝念五六日至于旬時恐爾有詞曰予不誡視成不令而行故矢在弦上垂而未發儻能易轍僕則旣徃不咎若爲刻舟爾則何辭以對徐察爾變惟審圖之重校正唐文粹卷第三十三之上重校正唐文粹卷第三十三之下呉興姚鉉纂文丁揔一十五首傷悼題哀辭後附弔古戰塲文李華弔國殤文張說弔九江驛碑材文歐陽詹悲剡溪古藤文舒元輿弔韓弇没胡中文李觀哀二良文白居易奠相國令狐公文李商隱祭韓侍郎文李翺祭獨孤常州文崔祐甫祀呂衡州化光文柳宗元爲常州獨孤使君祭李員外文梁肅祭柳子厚文韓愈祭柳柳州文皇甫湜祭亡友故楊州功曹蕭公文李華歐陽生哀辭韓愈弔古戰場文李華浩浩乎平沙無垠夐不見人河水縈帶群山糾紛黯兮慘悴風悲日曛蓬斷草枯澟若霜晨鳥非不下獸挺亡群亭長告余曰此古戰塲也常覆三軍徃徃鬼哭天隂則聞傷心哉秦歟漢歟將近代歟吾聞夫齊魏傜戍荆韓召募萬里奔走連年暴露沙草晨牧河氷夜渡地闊天長不知歸路寄身鋒刃腷臆誰訢秦漢而還多事四夷中州耗斁無世無之古稱戎夏不抗王師文教失宣武臣用竒竒兵有異於仁義王道迂闊而莫爲嗚呼噫嘻吾想夫北風振漠胡兵伺便主將驕敵期門受戰野豎旄旗川廻組練法重心駭威尊命賤利鏃穿骨驚沙入面主客相搏山川震眩聲折江河勢崩雷電至若窮隂凝閉凛洌海隅積雪没脛堅氷在鬚鷙鳥休巢征馬踟蹰繒纊無温墮指裂膚當此苦寒天假強胡慿凌殺氣以相剪屠徑截輜重横攻士卒都尉新降將軍復没屍塡巨港之岸血滿長城之窟無貴無賤同爲枯骨可勝言哉鼓衰兮力盡矢竭兮弦絶白刃交兮寳刀折兩軍蹙兮生死决降矣哉終身夷狄戰矣哉暴骨沙礫鳥無聲兮山寂寂夜正長兮風淅淅魂魄結兮天沉沉鬼神聚兮雲羃羃日光寒兮草短月色苦兮霜白傷心慘目有如是耶吾聞之牧用趙卒大破林胡開地千里遁逃匈奴漢傾天下財殫力痡任人而巳其在多乎周逐獫狁北至大原旣城朔方全師而還飲至䇿勲知樂且閑穆穆棣棣君臣之間秦起長城竟海爲關荼毒生人萬里朱殷漢繫匈奴雖得隂山枕骸徧野功不𥙷患蒼蒼蒸民誰無父母提携捧負畏其不夀誰無兄弟如足如手誰無夫婦如賔如友生也何恩殺之何咎其存其没家莫聞知人或有言將信將疑姢姢心目寢寐見之布奠傾觴哭望天涯天地爲愁草木悽悲弔祭不至精魂無依必有凶年人其流離嗚呼噫嘻時耶命耶從古如斯爲之柰何守在四夷弔國殤文張說北伐兮東胡邈遼陽兮孤竹徧師兮覆衆在崇山兮峽谷露芃芃兮蔓草風蓁蓁兮拱木見馬血兮夜燃聞殤魂兮雨哭君王按金鼓而氣憤撫珠鈴而淚滋横萬里兮抽恨弔群山而冩悲懟凶將湖湖東有山蛟奔螭引直到湖心頓址之處則茂林峭石勢瓌氣勝非徃時所睇而神祠曰祖將軍廟在焉公覿其詭秀與碑材叶即日以酒脯奠其祖神岀錢五萬造亭曰祖亭南香爐峯北潯陽城九江爲庭千艘歷階亭旣就公製亭之文手勒斯碑而立之公文爲天下最書爲天下最斯亭之地亦天下最庶資三善加以斯碑之竒相持萬古而採異留名之致一得也後典州吏於州之九江驛有脩坏之勞狀其末績乃取斯碑剗公之述寘巳之述今爲九江驛之碑焉子旅逰江州稅于玆驛祠部貟外郎鄭恕同之鄭與州將嚴士良共爲予說而俱以相示嗚呼先賤後貴世之常也先貴後賤人之傷也以祖亭方九江驛則蘭室鮑肆矣以魯公之文方今之文則牢醴糟糠矣以魯公之札翰方今之札翰則錦綉枲麻矣以魯公之用方令之用則諸夏夷狄矣痛哉斯碑岀祖亭入九江驛失魯公之文得人之文削魯公之札翰題人之札翰亡魯公之用就人之用是去蘭室而居鮑肆捨牢醴而食糟糠脫錦綉而服枲麻黜諸夏而即夷狄可悲之甚者况我質天成必將可名魯公所以卜擇敬愼如彼而常人無良黷辱如此與夫有道而黥無罪而刖投四裔禦魑魅何以别也石不能言豈其無冤故弔之情違乃傷理怫乃冤人實有之物亦應然嗚呼子碑冤可予知隂騭子材豈曰無意必有以殊方頒以異與顔表勝以殊則明從吏居卑以異奚旌子産旣授子不終致悠悠彼蒼何嗟及矣美玉抵禽高冠藉足有類子碑先榮後辱繼世生哲詎無賢兮將覿于斯將悼于斯庶滌所黷而復攸冝屹屹子碑如神如祗人得以專天造何爲其不然矣其不然矣悲剡谿古藤文舒元輿剡谿上緜四五百里多古藤株枿逼土雖春入土脉他植發活獨古藤氣候不覺絶盡生意予以爲本乎地者春到必動此藤亦本於地春春且死色遂問谿上人有道者云谿中多𥿄工刀斧斬伐無時擘剥皮肌以給其業噫藤雖植物者温而榮寒而枯養而生殘而死亦將似有命於天地間今爲紙工斬伐不得發生是天地氣力爲人中傷致一物疾癘之若此異日過數十百郡洎東雒西雍歷見書文者皆以剡紙相夸予寤曩見剡藤之死職止由此此過固不在紙工且今九牧士人自專言能見文章戸牖者其數與麻竹相多聽其語其自安重皆不啻握驪龍珠雖苟有曉寤者其倫甚寡不勝衆者亦皆斂手無語勝衆者果自謂天之文章歸我遂輕傲聖人道使周南召南風骨折入於抑揚皇華中言偃卜子夏文學䧟入於淫靡放蕩中比肩握管動盈數千百人數千百人筆下動行數千萬言不知其爲謬誤日日以縱自然殘藤命易其桑葉波波頽沓未見止息如此則綺文妄言輩誰非書剡紙者耶紙工嗜利暁夜斬藤以鬻之雖舉天下爲剡谿猶不足以給况一剡谿者耶以此恐後之日不復有藤生於剡矣大抵人間費用苟得著其理則不枉之道在則暴耗之過莫由横及扵物物之資人亦有其時時其斬伐不爲夭閼予謂今之錯爲之文者皆夭閼剡谿蕂之流也藤生有涯而錯爲文者無涯無涯之損物不直於剡藤而巳予所以取剡藤以寄其悲弔韓弇没胡中文李觀維唐貞元元年匈奴上𣢾乞盟天子以其言誠乃命上將徃墠隂山而聽其誓言監察御史韓君載筆而隨焉我上將仗九廟之信而首盟其間以戎人心爲心戎乗我不虞而有詭謀我計無素成而姧以宿萌故勇者死奔者追而韓君爲之擒矣嗚呼有備無患軍志也戎人安所暴其詐千慮一失聖人也韓君是以爲之虜天其或者將用警我非福戎也韓君爲之擒其繫命歟五年於兹生死不㝷謂之生豈復還期謂之死永永湮沉或曰死矣曾是切商弦之心絶國浩浩窮西極濵強胡居之大視齗齗流沙無波隂山無春邊草不緑塞鴻不賔秦有長城漢有遺人死者虜鬼生者虜臣哀哀韓君生死窮辛鬼能靈人能語君生其所君死其所今兩寂然心繇中阻君𥘉奉役意氣西道白珪之貺唾掌可保激魯陽之勇歎典屬之老乃郎於事不能畫竒從軍之籌君固職之可疑不疑固用阽危羗戎髬髵坐刃我師倉卒闇曶血殷朔陲實死者痛非摛者悲夾谷之㑹不聞仲尼秦中九月黃葉始下長風西來烈烈飄瓦望君申弔亦懼來者巳乎一魂時也命也哀二良文白居易丞相隴西公出鎮于汴州軍司馬御史大夫陸長源實左右之二年而軍用寜司空南陽公作藩于徐州軍副使祠部貟外郎鄭通誠實先後之十年而民用康曁十五年春隴西薨浹辰而師亂大夫以直道及禍十六年夏南陽薨翌日而難作貟外以危行遇害惜乎大夫人之望也貟外國之良也咸克絜于身儉于家勤于邦又申之以言行文學智謀政事故其歷要官叅劇務如刀劒發硎割而無滯如鍾磬在懸動而有聲識者以爲異時登天子股肱耳目之任必能脩德秉哲紹復隴西南陽之事業以藩輔王家嗚呼善人冝將鍾奕葉之慶而不免及身之禍天乎報施之眹何其眛歟昔詩人有黃鳥之章以哀三良不得其死今斯文亦以哀二良命其篇云伊大化之無形兮浩浩而茫茫中有禍兮若機之張梁之亂兮陸受其毒徐之難兮鄭罹其殃惟善人兮邦之紀綱邦之瘁兮正人先亡謂天之惡下民兮胡爲乎生此忠良謂天之愛下民兮胡爲乎生此犲狼我欲階冥冥問蒼蒼蒼蒼之不可問兮俾我心之衋傷悲夫而今而後吾知夫天難忱而命靡常耶奠相國令狐公文李商隠戊午歳丁未朔乙亥晦弟子玉谿李商隱叩頭哭奠故相國贈司空彭陽公嗚呼昔夢飛塵從公車輪今夢山阿送公哀歌古有從死今無柰何天平之年大刀長㦸將軍樽旁一人衣白十年忽然蜩宣甲化人譽公憐人譛公罵公高如天愚卑如地脫蟺如蛇如氣之易愚調京下公病梁山絶崖飛梁山行一千草奏天子鐫辭墓門臨絶丁寕託爾而存公此去耶禁其禁反不時歸鳯棲原上新舊衮衣公先人亦贈司空有泉者路有夜者臺昔之去者冝其在哉聖有夫子廉有伯夷浮魂沉魄公其與之故山峩峩玉谿在中送公而歸一世蒿蓬嗚呼祭韓侍郎文李翶嗚呼孔氏云逺楊朱恣行孟軻拒之乃壞于成戎風混華異學魁横兄常辨之孔道昭明建武以還文卑質䘮氣萎體敗剽剥不讓儷花鬪葉顚倒相上及兄之爲思動鬼神撥去其華得其本根關合怪駭驅濤涌雲包劉越嬴並武同殷六經之風絶而復新學者有歸大變于文兄之仕宦罔辭干難䟽奏輙斥去而復遷昇黜不改正言亟聞貞元十二兄作汴州我游自徐始得兄交視我無能待乎以友講文析道爲益之厚二十九年不知其乆兄以疾休我病卧室三來視我笑語窮日何荒不耕㑹之以一人心樂生皆惡言凶兄之在病則齊其終順化以盡靡惑千中欲别千萬意如不窮臨䘮大號決裂肝胸老聃言壽死而不亡兄名之垂星斗之光我譔兄行下于太常聲殫天地誰云不長䘮車來東我刺廬江君命有嚴不見兄喪遣使奠斚百酸攪腸音容若在曷日而忘嗚呼哀哉嗚呼哀哉祭獨孤常州文崔祐甫維大暦十二年歳次月日外從祖舅朝散大夫權知中書舍人賜紫金魚袋崔祐甫遣表妷前鄧州南陽縣尉李綜以清酌之奠祭于從外孫甥常州獨孤使君至之之靈徃矣至之此時何時空原拱木荆榛狐貍林風月露以之増悲子之徃也髙格逺量秀氣茂姿亡兮何若有兮誰對豈流蘇寓馬從之巳而嗚呼哀哉王事適我政事一埤益我在籠而不能求其釋獨有懷君之淚臨秋風而自滴平生相期聊復一叙一以豁胷中之憤氣二以簡明靈而晤語吾與至之思弘道義自家刑國張維舉墜吾與至之思敦交好平居琢磨遇死赴蹈吾與至之思邁純德言爲士准動有時則吾與至之思全髙節風雨如晦嘐嘐不輟吾與至之思闡斯文不俾臯契獨謩華勛吾與至之談空覈玄夢蝶喻筏去之蕭然吾與至之期諸晚歳偃卧山樊同披薜荔舉其大較良難名數念我交情千枝萬縷霜風掃葉或散或聚萬化紛然同歸野土向之所務孰云其主嗚呼哀哉爛然澄酤平昔共歡如何此奠取象於觀我思此飫子必吾劇目想道周暫留徒御所可懷者徐生之絮祀呂衡州化光文柳宗元維元和六年歲次辛卯八月癸亥朔友人守永州司馬貟外置同正貟柳宗元謹遣書吏同曹家人襄兒奉清酌庶羞之奠敬祭于呂八化光之靈嗚呼天乎君子何厲天實仇之生人何罪天實讎之聦明正直行爲君子天則必速其死道德仁義志存生人天則必夭其身吾固知蒼蒼之無信漠漠之無神今於化光之殁悲逾深而毒逾甚故復呼天以云云天乎痛哉堯舜之道至大以簡仲尼之文至幽以黙千載紛爭或失或得倬乎吾兄獨取其直貫乎化始與道咸極推而下之法度不忒旁而肆之中和允塞道大藝備斯爲全德而官止刺一州年不逾五十佐王之志没而不立豈非循正直以召災好仁義以速咎者邪宗元㓜雖好學未聞其道洎乎獲友君子乃知適於中庸削去邪雜顯陳眞正爲道不謬兄實使然嗚呼積乎中不必施於外𥙿乎古不必諧於今二事相勘從古至少於化最爲太甚履行第一尚非所長文章過人略而不有夙志所蓄巍然可知貪愚皆貴險佷皆老則化光之夭厄反不榮歟所慟者志不得行功不得施蚩蚩之甿不𬒳化光之德庸庸之俗不知化光之心斯言一出内若焚裂海内甚廣知者幾人自友朋凋喪志業殆絶唯望化光伸其宏略震耀昌大興行於時使斯人徒知我所立今復往矣吾道息矣雖其存者志亦死矣臨江大哭萬事巳矣窮天之學貫古之識一朝去此終復何適嗚呼化光今何爲乎止乎行乎昧乎明乎豈蕩而爲大空與化無窮乎將結而爲光耀以助臨照乎豈爲雨爲露以澤下土乎將爲雷爲霆以泄怨怒乎豈爲鳯爲麟爲景星爲卿雲以寓其神乎將爲金爲錫爲珪爲璧以棲其魄乎豈復爲賢人以續其志乎將奮爲神明以遂其義乎不然是昭昭者其得巳乎其不得巳乎抑有知乎其無知乎彼且有知其可使吾知之乎幽明茫然一慟長絶嗚呼化光庶幾聽之尚饗爲常州獨孤使君祭李貟外文梁肅大曆九年五月日朝散大夫守常州刺史賜紫金魚袋獨孤某謹以清酌之奠祭干故尚書吏部郎趙郡李遐叔三兄之靈嗚呼疇昔之年接兄討論倚伏之數或㝷其源甞謂仁人百禄滋蕃如何於兄斯莫存焉嗚呼哀哉惟兄孝友仁恕髙名寛𥙿何德之茂何才之冨粹氣積中暢於四支發爲斯文郁郁有輝自五百年風雅凌遲假手干兄鬱爲宗師乃登憲闈直以舉之乃列諌臣闕則補之玄宗季年戎狄内侮兄方就養劫在犲虎氣霧𪷟𪷟薄汙我躬雷雨作解逺身于東帝曰孝哉可務於中名居右掖亦踐南宮丘明爲耻玄晏方病清漳閑卧樂道推命哀于大賢不嚮大年人之不幸天亦何言在昔賈生見惡絳灌王佐之用不展於漢我之方行遭世紛亂時運屯塞古今一貫嗚呼哀哉某以蒙蔽夙承眷惠義均伯仲合若符契慱約乎文章之事優游乎性命之際謂得携手相期卒歳天其喪予兄則先逝嗚呼哀哉曩自朝列出持使節十年離别一旦存没吳楚迢遞江山阻越不及歸贈仍乖執紼寢門一哀魂斷心絶恭承嘉命來牧干常繐帳斯在哀何可忘鞠然二孤訴彼穹蒼孰謂遐叔與天茫茫魂兮歸兮臨此一觴嗚呼哀哉祭柳子厚文韓愈維年月韓愈謹以清酌庶羞之奠祭干亡友柳子厚之靈嗟嗟子厚而至然耶自古莫不然我又何嗟人之生世如夢一覺其間利害竟亦何校當其夢時有樂有悲及其旣覺豈足追惟凡物之生不願爲材犧樽青黃乃木之災子之中棄天脫馵覊玉珮瓊琚大放厥辭冨貴無能磨滅誰紀子之自著表表愈偉不善爲斵血指汗顔巧匠旁觀縮手袖間子之文章而不用世乃令吾徒掌帝之制子之視人自以無前一斥不復群飛刺天嗟嗟子厚今有今亡臨絶之音一何琅琅徧告諸友以寄厥子不鄙謂余亦託以死凡今之交觀勢厚薄余豈可保能承子託非我知子子實命我由有鬼神弗敢遺墯念子永歸無復來期設祭棺前矢心以辭嗚呼哀哉尚饗祭柳柳州文皇甫湜嗚呼柳州秀氣孤禀弱冠游學聲華籍甚肆意文章秋濤瑞錦吹迥蟲濫王風凛凛連收甲科驟閱班品青衿搢紳屬目歛衽公卿之禄若在倉廪至駿難馭太白易慘華鍾始橦一頓聲寢梧山恨望桂水愁飲鬱鬱群議悠悠積稔竟奄荒瘴遂絕羇枕嗚呼柳州命實在天賢不必貴壽不必賢雖聖與神無如命何自古以然相視咨嗟歸葬秦原即路江臯聲容蔑然相嘆増勞惟有令名日逺日髙式薦誠辭以佐羞醪尚饗祭亡友故楊州功曹蕭公文李華乾元三年二月十日孤子李華云云茂挺平生相知情體如一歳月之别俄成古今天乎䘮予此痛何極華釁罰深重艱棘所鍾殊方永慕觸目號裂孤窮易感況哭故人以足下才惟挺生名蓋天下道孤命屈淪阨終身避亂全絜忠也冒危遷祔孝也有王佐之才先師之訓而殁於道路何負於天天乎痛哉華疇昔之歳幸忝周旋足下不棄愚劣一言契合古稱管鮑今則蕭李有過必規無文不講知名當世實頼吾人循環徃復何日忘此而況泣血千里羈旅相依聞此一哀心骨皆斷痛之至者言不能宣是欲寄辭秖益塡塞茂挺茂挺君其降靈尚饗歐陽生哀辭韓愈歐陽詹世居閩越自詹巳上皆爲閩越官至州佐縣令者累累有焉閩越地肥衍有山泉禽魚之樂雖有長材秀民通文書吏事與上國齒者未甞肯出仕今上初故宰相常衮爲福建諸州觀察使治其地衮以文辭進有名於時又作大官臨莅其民鄉縣小民有能誦書作文辭者衮親與之爲客主之禮觀遊宴饗必召與之時未幾皆化翕然詹于時獨秀出衮加敬愛諸生皆推服閩越之人舉進士繇詹始建中貞元間余就食江南未接人事徃徃聞詹名閭巷間詹之稱於江南也乆貞元三年余始至京師舉進士聞詹名尤甚八年春遂與詹文辭同考試登第始相識自後詹歸閩中余或在京師他處不見詹乆者唯詹歸閩中時爲然其他時與詹離率不歷歳移時則必合合必兩忘其所趨乆然後去故余與詹相知爲深詹事父母盡孝道仁於妻子於朋友義以誠氣醇以方容貌嶷嶷然其燕私善謔以和其文章切深喜徃復善自道讀其書知其於慈孝最隆也十五年冬余以徐州從事朝正于京師詹爲國子監四門助教將率其徒伏闕下舉余爲愽士㑹監有獄不果上觀其心有益於余將忘其身之賤而爲之也嗚呼詹今其死矣詹閩越人也父母老矣捨朝夕之養以來京師其心將以有得於是而歸爲父母榮也雖其父母之心亦皆然詹在側雖無離憂其志不樂也詹在京師雖有離憂其志樂也若詹者所謂以忠養志者歟詹雖未得位其名聲流於人人其德行信於友朋雖詹與其父母皆可無憾也詹之事業文章李翶旣爲之傳故作哀辭以舒余哀以傳于後以遺其父母而解其悲哀以卒詹志云求仕與友兮逺違其鄕父母之命兮子奉以行友則旣獲兮禄實不豐以志爲養兮何有牛羊事實旣脩兮名譽又光父母欣欣兮常若在傍命雖云短兮其存者長終要必死兮願不永傷友朋視疾兮藥物甚良飲食孔時兮所欲無妨壽命不齊兮人道之常在側與逺兮非有不同山川阻深兮魂魄流行祀祭則及兮勿謂不通哭泣無益兮抑哀自強推生知死兮以慰孝誠嗚呼哀哉兮是亦難忘題哀辭後愈性不喜書自爲此文唯自書兩通其一通遺清河崔群群與余皆生友也哀生之不得位而死哭之過時而悲其一通今書以遺彭城劉君伉君喜古文以吾所爲合於古詣吾廬而來請者八九至而其色不怨益堅凡愈之爲此文盖哀歐陽生之不顯榮於前又懼若泯滅於後也今劉君之請未必知歐陽生其志在古文耳雖然愈之爲古文豈獨取其句讀不類於今者耶思古人而不得見學古道則欲兼通其辭通其辭者本志乎古者也古之道不茍譽毀於人劉君好其辭則其知歐陽生也無惑焉重校正唐文粹卷第三十三之下
