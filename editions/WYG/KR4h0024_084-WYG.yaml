  text: 論文上
  hash: sha256:fa32d91a0a8f723c1f6312173b8dcb020ad1d04b7b675c9ce4eba9a742237a69
body:
  text: 與滑州盧大夫論文書桞冕與徐給事論文書荅荆州裴尚書論文書荅徐州張尚書論文武書與于襄陽書韓愈寄李翺書裴度叙詩寄樂天書元稹荅楊中丞論文書桞冕荅衢州鄭使君論文書荅莊充書杜牧與賈秀才書孫樵與滑州盧大夫論文書栁冕頓首别後九年年已老大平生好文老亦興盡日為外事所撓有筆語兩大巻或不得已而為之或有為而為之既為頗近敎化謹録呈上望覽訖一笑夫文生於情情生於哀樂哀樂生於治亂故君子感哀樂而為文章以知治亂之本屈宋以降則感哀樂而亡雅正魏晉以還則感聲色而亡風敎宋齊以下則感物色而亡興致敎化興亡則君子之風盡故淫麗形似之文皆亡國哀思之音也自夫子至梁陳三變以至衰弱嗟乎闗雎興而周道盛王澤竭而詩不作作則王道興矣天其或者肇往時之亂為聖唐之治興三代之文者乎老夫雖知之不能文之縱文之不能至之況已衰矣安能皷作者之氣盡先王之敎在吾子復而行者皷而生之冕頓首與徐給事論文書文章本於教化形於治亂繫於國風故在君子之心為志形君子之言為文論君子之道為敎易云觀乎人文以化成天下此君子之文也自屈宋已降為文者本於哀豔務於恢誕亡於比興失古義矣雖揚馬形似曹劉骨氣潘陸藻麗文多用寡則是一技君子不為也昔武帝好神仙而相如為大人賦以諷帝覽之飄然有凌雲之氣故揚雄病之曰諷則諷矣吾恐不免於勸也蓋文有餘而質不足則流才有餘而雅不足則蕩流蕩不返使人有淫麗之心此文之病也雄雖知之不能行之行之者推荀孟賈生董仲舒而已僕自下車為外事所感感而應之爲文不覺成巻意雖復古而不逮古則不足以議古人之文噫古人之文不可及之矣得見古人之心在於文乎苟無文又不得見古人之心故未能亡言亦志之所之也荅荆南裴尚書論文書猥辱來問曠然獨見以為齒髮漸衰人情所惜也親愛逺道人情不忘也大哉君子之言有以見天地之心夫天生人人生情聖與賢在有情之内乆矣苟忘情於仁義是殆於學也忘情於骨月是殆於恩也忘情於朋友是殆於義也此聖人盡知於斯立教於斯今之儒者苟持異論以為聖人無情誤也故無情者聖人見天地之心知性命之本守窮達之分故得以忘情明仁義之道斯須忘之斯爲過矣骨月之恩斯須忘之斯爲亂矣朋友之義斯須忘之斯為薄矣此三者發於情而為禮由於禮而為敎故夫禮者教人之情而已丈人志於道故來書盡於道是合於情盡於禮至矣昔顔囘死夫子曰天喪予子路死夫子曰天喪予是聖人不忘情也乆矣丈人豈不謂然乎如冕者雖不得與君子同道實與君子同心相顧老大重以離别況在萬里邈無前期斯得忘情乎古人云一日不見如三秋兮況十年乎前所寄拙文不為文以言之蓋有謂而為之昔堯舜殁雅頌作雅頌寢夫子作未有不因於教化為文章以成國風是以君子之儒學而為道言而為經行而為教聲而為律和而為音如日月麗乎天無不照也如草木麗乎地無不章也如聖人麗乎文無不明也故在心為志發言為詩謂之文兼三才而名之曰儒儒之用文之謂也言而不能文君子恥之及王澤竭而詩不作騷人起而淫麗興文與教分而為二以揚馬之才則不知教化以荀陳之道則不知文章以孔門之教評之非君子之儒也夫君子之儒必有其道有其道必有其文道不及文則徳勝文不知道則氣衰文多道寡斯為藝矣語曰文質彬彬然後君子兼之者斯為美矣昔游夏之文章與夫子之道通流列於四科之末此藝成而下也苟言無文斯不足徴小子志雖復古力不足也言雖近道辭則不文雖欲拯其將墜末由也已丈人儒之君子曲垂見褒反以自愧冕再拜荅徐州張尚書論文武書辱前月十二日書問文章之道將帥之事朋友之義有君子之道三甚善甚善夫文章者本於教化發於情性本於教化堯舜之道也發於情性聖人之言也自成康殁頌聲寢騷人作淫麗興文與教分為二不足者彊而為文則不知君子之道知君子之道者則恥為文文而知道二者兼難兼之者大君子之事上之堯舜周孔也次之游夏荀孟也下之賈生董仲舒也夫日月之麗仰之愈明金石之音聴之彌清故聖人感之而文章生焉教化成焉哀樂形焉逮徳下衰文章教化掃地盡矣噫聖人之道猶聖人之文也學其道不知其文君子恥之學其文不知其教君子亦恥之老夫従君子乆矣雖欲學之未能文之不足以當君子之襃然詠乎堯舜之道舞乎沂泗之風庶乎與同也將帥三軍之師萬人之命子實為之矣今國家之患患在師老足下之患患在勢分且天下大勢也善為將者乗天下之勢苟變化在人則用之如神彼勢合者驅而盟之使其擾従桓文是也勢分者力以傾之使其削弱申商是也則遇非常之時不可以尋常之事邀萬代之勲明矣今足下據億丈之城仗大順之衆有桓文之志苟不修其軍政合其大勢制其死命則不足以輟東顧之憂故老夫前書開陳古義以激壯心而猥辱逺示以為聴道路之説甚不然也傳曰諸侯有相滅亡者桓公不能救則桓公恥之今子為大將實制東夏為不義而彊力不能制者春秋亦恥之國不冨而昌兵不教而彊敵不謀而亡是管仲無功於齊商君無能於秦子房無謀於漢矣蓋求天下之智盡天下之才成天下之務此將帥之本也較短長定曲直乃匹夫之為爾古者自天子至於庶人未有不須友以相成者僕雖老矣辱君子之遊同君子之道見君子之榮三十年矣子之善猶僕之善也得不相成乎且百年之壽人誰及之嵗月有窮天地有終惟立徳立言立功斯為不朽彼聖賢救世死而後已氣有所感也故天下有樂賢人樂之天下有憂賢人憂之樂毅所以徇弱燕之急復彊齊之讎韓信所以感推食之恩申戰勝之感意氣所感天地相合況於人乎天方授子子實為將得不憂之乎噫徳與言僕無望矣立功立事在吾子為之璧可求也時不可再也是以古人惜時之過已昔者仲尼以大聖之徳不免為旅人之身斯無時也賈生以希世之才而無佐命之勲斯無位也今足下遇非常之主統桓文之師時與位泰矣苟功成於身則義動天下使天下之人受其賜不亦休哉既書慨然心馳旗鼓之下某頓首上于襄陽書韓愈伏蒙示文武順聖樂詞天保樂詩讀蔡琰胡笳詩詞移族従并與京兆書自幕府至鄧之北境凡五百餘里自庚子至甲辰凡五日手披目視口詠其言心惟其義且恐且懼忽若有亡不知鞍馬之勤道途之逺也夫澗谷之水深不過咫尺邱垤之山髙不踰尋丈人狎而翫之及至臨泰山之懸崖窺巨海之驚瀾莫不戰悼憚慄眩惑而自失所觀變於前所守易於内亦其理冝也閣下負超卓之竒材蓄雄剛之俊徳渾然天成無有畔岸而又貴窮乎公相威動乎樞極天子之毗諸侯之師故其文章言語與事相侔燀赫若雷霆浩汗若河漢正聲諧韶濩勁氣沮金石豐而不餘一言約而不失一辭其事信其理切孔子之言曰有徳者必有言信乎其有徳且有言也揚子雲曰商書灝灝爾周書噩噩爾信乎其能灝灝而且噩噩也昔者齊君行而失道管子請釋老馬隨之樊遲請學稼孔子使問之老農夫馬之智不賢於夷吾農之能不聖於尼父然則且云爾者聖賢之能多農馬之知専故也今愈雖愚且賤其從事於文實且乆則其贊王公之能而稱大君子之美不為僭越也伏惟詳察愈恐懼再拜寄李翺書裴度前者唐生至自滑猥辱致書札兼獲所貺新作十二篇度俗流也不盡窺見若愍女碑烈婦傳可以激揚烈教義煥於史氏鍾銘謂以功伐名於器非爲銘與弟正辭書謂文非一藝斯皆可謂救文之失廣文之用也甚善甚善然僕之知弟也未知其他直以弟敏於學而至於文就六經而正焉故每遇名輩稱弟不容於口自謂彌乆益無愧詞竊料弟亦以直諒見待不以恱媚相容故不唯嗟挹亦欲商度其萬一耳若弟擯落今古脫遺經籍斯則如獻白豕何足採取若猶有祖述則願陳其梗槩以相叅會耳愚謂三五之代上埀拱而無為下不知其帝力其漸被於天地萬物不可得而傳也夏殷之際聖賢相遇其文在於盛徳大業又鮮可得而傳也厥後周公遭變仲尼不當世其文遺於册府故可得而傳也是作周孔之文也荀孟之文左右周孔之文也理身理家理國理天下一日失之敗亂至矣騷人之文發憤之文也雅多自賢頗有狂態相如子雲之文譎諫之文也自為一家不是正氣賈誼之文化成之文也鋪陳帝王之道昭昭在目司馬遷之文財成之文也馳騁數千載若有餘力董仲舒劉向之文通儒之文也發明經術究極天人其餘擅美一時流譽千載者多矣不足為弟道焉然皆不詭其詞而詞自麗不異其理而理自新若夫典謨訓誥文言繫辭國風雅頌經聖人之筆削者則又至易也至直也雖大彌天地細入無間而竒言怪語未之或有意隨文而可見事隨意而可行此所謂文可文非常文也其可文而文之何常之有俾後之作者有所裁准而請問於弟謂之何哉謂之不可非僕敢言謂之可也則大學之道在明明徳在止至善矣能止乎若遂過之猶不及也觀弟近日制作大㫖常以時世之文多偶對儷句屬綴風雲羈束聲韻為文之病甚矣故以雄詞逺致一以矯之則是以文字為意也且文者聖人假之以達其心逹則已理窮則已非故髙之下之詳之略之也愚欲去彼取此則安步而不可及平居而不可諭又何必逺闗經術然後騁其材力哉昔人有見小人之違道者恥與之同形貌共衣服遂思倒置眉目反易冠帶以異也不知其倒之反之非也雖失於小亦異於君子矣故文之異在氣格之髙下思致之深淺不在磔裂章句隳廢聲韻也人之異在風神之清濁心志之通塞不在於倒置眉目反易冠帶也庶幾髙明少納庸妄若以為未幸不以苦言見革其惑惟僕心慮荒散百事罷息然意之所在敢隠於故人邪昌黎韓愈僕識之舊矣中心愛之不覺驚賞然其人信美材也近或聞諸儕類云恃其絶足往往奔放不以文立制而以文為戲可矣乎可矣乎今之作者不及則已及之者當大為防焉爾弟索居多年勞想深至窮隂凝沍動息何如入奉晨昏之歡出叅帷幄之畫固多適耳昨弟來欲度及時干進度昔嵗取名不敢自髙今孤煢若此遊宦謂何是不復能従故人之所朂耳但寘力田園苟過朝夕而已然待春氣微和農事未動或筞蹇謁賢大夫兼與弟道舊未爾間猶希尺牘珍重珍重力書無餘従表兄裴度奉簡叙詩寄樂天書元稹九嵗學賦詩長者往往驚其可教年十五六粗識聲病時貞元十年已後徳宗皇帝春秋髙理務用人最不欲文法吏生天下罪過外門節將動十餘年不許朝覲死於其地不易者十八九而又將豪卒愎之處因喪負衆橫相賊殺告變駱驛使者迭窺旋以狀聞天子曰某色將某能遏亂亂衆寧附願為其帥名為衆情其實逼詐因而可之者又十八九前置介倅因縁交授者亦十四五由是諸侯敢自為㫖意有羅列兒孫以自固者有開導蠻夷以自重者省寺符篆固於几閣甚者擬㫖詔視一境如一室刑殺其下不啻僕畜厚加剥奪名為進奉其實貢入之數百一焉京城之中亭第邸店以曲巷斷侯甸之内水陸腴沃以鄉里計其餘奴婢資財生生之備稱是朝廷大臣以謹慎不言為朴雅以時進見者不過一二親信直臣議士往往抑塞禁省之間時或繕完隤墜豪家大帥乗聲相扇延及老佛土木妖熾習俗不怪上不欲令有司備宫闥中小碎須求往往持幣帛以易餅餌吏縁其端剽奪百貨勢不可禁僕時孩騃不慣聞見獨於書傳中初習理亂萌漸心體悸震若不可活思欲發之乆矣適有人以陳子昻感遇詩相示吟翫激烈即日為寄思𤣥子詩二十首故鄭京兆於僕為外諸翁深賜憐奬因以所賦呈獻京兆翁深相駭異祕書少監王表在座顧謂表曰使此兒五十不死其志義何如哉惜吾輩不見其成就因召諸子訓責泣下僕亦竊不自得由是勇於為文又乆之得杜甫詩數百首愛其浩蕩津涯處處皆到始病沈宋之不存寄興而訝子昻之未暇旁備矣不數年與詩人楊巨源友善日課為詩性復僻嬾人事常有閑則有作識足下時有詩數百篇矣習慣性靈遂成病敝每公私感憤道義激揚朋友切磨古今成敗日月遷逝光景惨舒山川勝勢風雲氣色當花對酒樂罷哀餘通滯屈伸悲歡合散至於疾恙其身悼懐昔遊凡所對遇異於常者則欲賦詩又不幸年三十二時有罪譴棄今三十七矣五六年間是丈夫心力壯時常在閒處無所役用性不近道未能淡然忘懷又復嬾於他欲全盛之氣注射語言雜糅精麤遂成多大然亦未甞繕寫適值河東李明府景儉在江陵時僻好僕詩章謂為能觧欲得盡取觀覽僕因撰成巻軸其中有㫖意可觀而詞近往古者為古諷意亦可觀而流在樂府者為樂諷詞雖近古而止於吟寫性情者為古詞體實樂流而止於摸象物色者為新題樂府聲勢㳂順屬對穏切者為律詩仍以七言五言為兩體其中有稍存寄興與諷為流者為律諷不幸少有伉儷之悲撫存感往成數十詩取潘子悼亡為題又有以干教化者近昵婦人暈澹眉目綰約頭鬢衣服廣修之度及匹配色澤尤據怪豔因為豔詩百餘首詞有今古又兩體自十六時至是元和七年矣有詩八百首色類相従共成十體几二十巻自笑冗亂亦不復置之於行李昨來京師偶在筐篋及通行盡置足下僅亦有説僕聞上士立徳其次立事不遇立言凡人急位其次急利下急食僕天與不厚既乏全然之徳命與不偶未遭可為之事性與不恵復無垂範之言兀兀狂癡行近四十徼名取位不過於第八品而冒憲已六七年授通之初有習通之熟者曰通之地濕墊卑褊人事稀少近嵗荒凶死亡過半邑無吏市無貨百姓草木刺史以下計粒而食大有虎豹蛇虺之患小有蟆蚋浮塵蛛蜘蛒蜂之類皆能鑚齧肌膚使人瘡痏夏多隂霪秋為痢瘧地無醫巫藥石萬里病者百死一生之慮何僕之命不厚也如此智不足也又如此其所詣之憂險也又如此則安能保持萬全與足下必復京輦以須他日立言立事之驗邪但恐一旦與急食者相扶而終使足下受天下友不如已之誚是用悉所為文留穢箱笥比夫格奕樗塞之戲猶曰愈於飽食僕所為不又愈於格奕樗塞之戲乎昨行巴南道中又有詩五十一首文書中得七年已後所為向二百篇繁亂冗雜不復置之執事前所為寄思𤣥子者小嵗云爲文不能自足其意貴其起予之始且志京兆翁見遇之由今亦寫為古諷之一移諸左右僕少時授吹嘘之術於鄭先生病嬾不就今在閒處思欲怡神保和以求其内異日亦不復費詞於無用之文矣省視之煩庶亦已於是乎荅楊中丞論文書桞冕來書論文盡養才之道增作者之氣推而行之可以復聖人之教見天地之心甚善嗟乎天地養才而萬物生焉聖人養才而文章生焉風俗養才而志氣生焉故才多而養之可以皷天下之氣天下之氣生則君子之風盛古者陳詩以觀民風君子之風仁義是也小人之風邪佞是也風生於文文生於質天地之性也止於經聖人之道也感於心哀樂之音也故觀乎志而知國風逮徳下衰風雅不作形似豔麗之文興而雅頌比興之義廢豔麗而工君子恥之此文之病也嗟乎天下之才少乆矣文意之氣衰甚矣風俗之不養才病矣才少而氣衰使然也故當世君子學其道習其弊不知其病也所以其才日盡其氣益衰其教不興故其人日野如病者之氣従壯得衰從衰得老從老得死沉綿而去終身不悟非良醫孰能知之夫君子學文所以行道足下兄弟今之才子官雖不薄道則未行亦有才者之病君子患不知之既知之則病不能無病故無病則氣生氣生則才勇才勇則文壯文壯然後可以皷天下之動此養才之道也在足下他日行之如老夫之文不近於道老夫之氣已至於衰老夫之心不復能勇三者無矣又安得見古人之文論君子之道近先王之教斯不能必矣冕白荅衢州鄭使君論文書専使至辱書并歸拙文如見君子所襃過當無徳以當之幸甚門人云夫子之文章可得而聞也夫子之言性與天道不可得而聞也即聖人道可企而及之者文也不可企而及之者性也蓋言教化發乎性情繫乎國風者謂之道故君子之文必有其道道有深淺故文有崇替時有好尚故俗有雅鄭雅之與鄭出乎心而成風昔游夏之文日月之麗也然而列於四科之末藝成而下也苟文不足則人無取焉故言而不能文非君子之儒也文而不知道亦非君子之儒也逮徳下衰其文漸替惜乎王公大人之言而溺於淫麗怪誕之説非文之罪也為文者之過也夫善為文者發而為聲皷而為氣直則氣雄精則氣生使五彩並用而氣行於其中故虎豹之文蔚而騰光氣也日月之文麗而成章精也精與氣天地感而變化生焉聖人感而仁義行焉不善為文者反此故變風變雅作矣六藝之不興教化之不明此文之弊也噫文之無窮而人之才有限苟力不足者彊而爲文則蹶彊而爲氣則竭彊而爲智則拙故言之彌多而去之彌逺逺之便已道則中廢又君子所恥也則不足見君子之道與君子之心心有所感文不可已理有至精詞不可逮則不足當君子之襃敬叔頓首荅莊充書杜牧某白莊先輩足下凡為文以意爲主以氣為輔以辭彩章句為之兵衛未有主彊盛而輔不飄逸者兵衛不華赫而莊整者四者髙下圓折步驟隨主所指如鳥隨鳳魚隨龍師衆隨湯武騰天潜泉橫裂天下無不如意苟意不先立止以文彩辭句繞前捧後是辭愈多而理愈亂如入闤闠紛紛然莫知其誰暮散而已是以意全勝者辭愈朴而文愈髙意不勝者辭愈華而文愈鄙是意能遣辭辭不能成意大抵為文之㫖如此觀足下所為文百餘篇實先意氣而後辭句慕古而尚仁義者苟為文不已資以學問則古作者不為難到今以某無可取欲命以為序承當厚意惕息不安復觀自古序其文者皆後世宗師其人而為之詩書春秋左氏已降百家之説皆是也古者其身不遇於世寄志於言求言遇於後世也自兩漢已來冨貴者千百自今觀之聲勢光明孰若馬遷相如賈誼劉向揚雄之徒斯人也豈求知於當世哉故親見揚子雲著書欲取覆醬瓿雄當其時亦未甞自有誇目況今與足下並生今世欲序足下未已之文此固不可也苟有志古人不難到勉之而已某再拜與賈秀才書孫樵主藪足下曩者樵耳足下聲憤足下售於時何晩及目足下五通五十篇則足下困于上亦宜矣物之精華天地所秘惜故䝉金以砂錮玉以璞珊瑚之叢必茂重溟夜光之珍必頷驪龍抉而不知已積而不知止不窮則禍天地讐也文章亦然所取者亷其得必多所取者深其身必窮六經作孔子削迹不粒矣孟子述子思坎軻齊魯矣馬遷以史記禍班固以西漢禍揚雄以法言太𤣥窮元結以浯谿碣窮陳拾遺以感遇詩窮王勃以宣尼廟碑窮玉川子以月蝕詩窮杜甫李白王江寧皆相望於窮者也天地其無意乎今足下立言必竒摭意必深抉精剔華期到聖人以此賈於時釣榮邀富猶欲疾其驅而方其輪若曰爵禄不動於心窮逹與時上下成一家書自期不朽則樵之所敢知也嗚呼孤進患心不苦及其苦知者何人古人抱玉而泣捧足下文能不濡睫懼足下自得也淺且疑其道不固因歸五通不得無言唐文粹巻八十四欽定四庫全書唐文粹巻八十五宋姚鉉編書七啓附總一十一首
