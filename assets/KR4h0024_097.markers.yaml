  - {type: variant, offset: 5285, length: 0, content: '', WYG: 買小丘一日鋤理二日洗滌遂置酒溪上嚮之為記所謂牛馬之飲者離坐其背實觴而流之接取以飲乃置監史而令曰當飲者舉籌之十寸者三逆而投之能不洄於洑不止於坻不沈於底者過不飲而洄而沈而止者飲如籌之數既或投之則旋眩滑汨若舞若躍速者遲者去者住者衆皆據石注視懽抃以助其勢突然而逝乃得無事於是或一飲或再飲客有婁生啚南者其投之也一洄一止一沈獨三飲衆乃大笑懽甚余病痞不可飲酒至是醉焉遂損益其令以窮日夜而不知歸吾聞昔之飲酒者有揖讓酬酢百拜以為禮者有呌號屢舞如沸如羮以為極者有裸裎袒裼以為達者有資金石絲竹之樂以為和者有促數糺逖以為宻者今則舉異是焉故捨百拜而禮無呌號而極不袒裼而達非金石而和去糺逖而宻簡而同肆而恭衎衎而從容於以合山水之樂成君子之心宜作序飲以貽後人序白舒元與}
