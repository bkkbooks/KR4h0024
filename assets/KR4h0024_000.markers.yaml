  - {type: variant, offset: 0, length: 429, content: 刻唐文粹序天之文粹于日星地之文粹于河嶽聖人之文粹于易詩書春秋禮樂是故唐虞之文堯舜為粹夏商周之文禹湯文武周公孔子為粹夫文之粹夲之天也粹乎文夲之聖也是文也道也夫本之天文之所従出也夲之聖文之所由作也文不出於天跡而已矣文不作扵聖藝而已矣故離乎道不可以言文去夫文不可以言道文猶道也及其後秦亦有文焉誓之類是已漢亦有文焉詔之類是已唐亦有文焉誥之類是巳秦之文粹之者景宋漢之文粹之者班馬唐之文粹之者李杜韓栁世雖降而其體雖不古若然代㠯作者名家要之皆文也嗟夫天地之文道之昭也聖人之文昭夫道也若秦漢唐之文求昭乎道而道未易昭也扵是始有擅文之名而以文為道者矣嗟夫業始專而其理始晦名始著而其道始微文之故豈其然㢤然則文不可學乎讀易而求伏羲之畫讀書而求堯舜禹湯之典謨之訓誥讀詩與禮與樂而求文武周公之咏嘆之制作讀春秋而求孔子之茟削則文作而理著理著而道昭道昭而化成文不在茲乎扵是衍之以先秦西漢廣之以東亰盛唐以逹其枝而導其流可以為文矣扵戲日星朗朗河嶽郁郁六經炳炳志在斯文者豈不知従事也㢤唐文粹集於宋, WYG: ''}
