  text: 論史
  hash: sha256:c1a1d8391de00b13b14b1d0bb1311cd200e015cb70c0f6748a4e745e6b2790b0
body:
  text: 答孟判官論宇文生評史官書柳冕與馬植書劉軻論史上蕭至忠書劉子𤣥與陳叔逹重借隋紀書王績答王績書陳叔逹答韓愈論史官書柳宗元答皇甫湜書李翺與韓愈致段太尉逸事書柳宗元與史館韓愈郎中書元稹答元稹侍御書韓愈答孟判官論宇文生評史官書柳冕昨暮辱問兼示所寄宇文生書憂深思逺推仲尼之道見天地之心甚善來書之意逺者大者斯盡善矣其愚之所諭者輒備聞見以獻左右宇文生云仲尼因舊史修春秋所記不過二百四十二年今子長乃軼孔氏而修數千年荒絶之書助以黄老寓託之說仲尼之所二子長之所一仲尼之所難子長之所易美則美矣愚以為未盡昔大雅喪然後頌聲寢王澤竭然後詩不作諸侯放恣處士横議孔子懼作春秋以一王法於是記言事以為褒貶盡聞見以為實辭舉凡例以為異同此夫子之所見也故書之所聞異同此夫子之所聞也故書之所傳聞異同此夫子之所傳聞也故書之非此三者夫子不書此聖人之志也非當十二公之事聖人以為易過十二公之事聖人以為難明矣六經之作聖人所以明天道正人倫助治亂苟非大者君子不學苟非逺者君子不言學大則君子之徳崇言逺則君子之業廣故仲尼歎曰大哉堯之為君也惟天為大惟堯則之巍巍乎其有成功也煥乎其有文章也又曰周監於二代郁郁乎文哉吾從周於是叙書即起堯典稱樂即美韶武論詩即首周南修春秋則繩以文武之道然後樂正雅頌各得其所至於幽厲桓莊逶迤陵頽斯不足徴也故曰夏禮吾能言之杞不足徴也殷禮吾能言之宋不足徴也足則吾能徴之矣是以三千之徒無道桓文之事者豈不教尊而後道高師聖而後功倍者也曾子曰尊其所聞則高明矣行其所知則光大矣又來書罪子長自序云夫子没五百年而史記作非聖人而修聖人之名者素王之篡臣也美則美矣愚以為未盡昔周公制禮五百年而夫子修春秋夫子没五百年而子長修史記遷雖不得聖人之道而繼聖人之志不得聖人之才而得聖人之㫖自以為命世而生亦信然也且遷之没已千載矣遷之史未有繼之者謂之命世不亦宜乎噫遷承滅學之後修廢起滯以論天人之際以通古今之變而微遷叙事廣其所聞是軒轅之道幾滅矣推而廣之亦非罪也且遷之過在不本於儒教以一王法使楊朱墨子得非聖人此遷之罪也不在於叙逺古示將來也足下豈不謂然乎夫聖人之於春秋所以教人善惡也修經以志之書法以勸之立例以明之恐人之不至也恐人之不學也苟不以其道示人則聖人不復修春秋矣不以其法教人則後世不復師聖人矣故夫求聖人之道在求聖人之心求聖人之心在書聖人之法法者凡例褒貶是也而遷捨之春秋尚古而遷變古由不本於經也以遷之雄才奮史筆不虗美不隠惡守凡例而書之則與左氏並驅爭先矣苟知聖人之法則知春秋之可興知春秋之可興則君子乎哉宇文生近之矣昔者仲尼門人得其門者然後見宗廟之美升其堂者然後見雅頌之聲入其室者然後見道徳之奥雖道有汚隆性有深淺然當其所得莫不有聖人之道故言而為經動而為教者學也不學而至者無焉故曰不登高山不知天之大也不臨深谿不知地之廣也不遊聖人之門不知道徳之富也今大雅旣隠賢人隨之苟非君子孰能知道宇文生居於今之世行於古之道君子以為難前志之所遺此子之所得君子以為難為僕謝之夫言大道者不可以小說應黄鍾者不可以末音師聖人者不可以無法三者知之斯為難文之為難斯又難之僕智不足而彊言之頓首與馬植書劉軻始存之不以予古拙不責予以今人之態能遺其鈆黄外飾直索予心於古人之心在今之行古者然雖無以應君子幸存之不友予以面予何人敢不以心友於存之邪且古人相知在此今愚忌存之固有未予知者矧與相面者其能異於行路之人哉固無也有恨羣居時口未能言及此還罷又不相處雖素尚蓄積竟未得露一毫於方寸之地每一相見何嘗不嗛嗛於内若飲者實滿於腹思一吐而未果者存之謂予是言似乎哉以為似則予不得不吐於存之矣先此二十年予方去兒童心將事四方志若學山者以一簣不止望嶔崟於上誓不以邱陵其心而盡乎中道也志且未決適遭天譴重罹凶咎日月之下獨有形影存之以予此時宜如何心哉苟將盡餘息以鴻同大化或有論予者相曉以古道且曰若身未立於時若名未揚於人若且死獨不畏聖人之經戒俾立身揚名之意邪蹶然而恐震駭且乆曰微夫子吾幾得罪於聖人矣噫聖人之言天戒也天戒何可違乎歴數歲自洙泗渡於淮逹於江過洞庭三苖踰郴而南㳂湞江浮滄溟抵羅浮始得師於壽春楊生楊生以傳書為道者也始則三代聖王死而其道盡留於春秋春秋之道某以不下牀而求之求之必謀吾所傳不失其指每問一巻講一經說一傳疑周公孔子左邱明公羊高榖梁赤若迴環在座似假生之口以逹其心也邇來數年精力刻竭希金口木舌將以卒其業雖未能無愧於古人然於聖人之道非不孜孜也旣而曰以是為駕說之儒曷若為行道之儒邪貯之於心有經實施之於事有古道猶不愈於堆案滿架矻矻於筆硯間邪徒念旣往者未及孔門之宫墻自謂與回牛相上下傳經意者家家自以為商偃執史筆者人人自以為遷固此愚所以憤悱思欲以聖人之為市南宜僚以解其紛以衡石輕重俾將來者知聖代有譙周焉此某所以蓄其心者元和初方下羅浮越梅嶺泛贛江浮彭蠡又抵於匡廬匡廬有隠士茅君腹笥古今史且能言其工拙贅蠧語經之文聖人之語歴歴如指掌予又從而明之者若出井置之於泰山之上其為見非不𢎞矣長恨司馬子長謂挈諸聖賢者豈不然乎哉脱漸子長之言予之厄窮其身將淬磨其心亦天也是天有意我獨無恙何也夫然亦何必瞽吾目然后國語刖吾足然后兵法抵宫刑然后史記邪予是以自忘其愚瞽故有三傳指要十五巻漢書右史十卷黄中通理三巻翼孟三巻隋監一巻三禪五革一巻每撰一書何嘗不覃精濳思綿絡指統或有鼓吹於大君之前曰眞良史矣且曰上古之人不能昭明矣某其如何有知予者相期不啻於今人存之信然乎哉此古人所以許一死以謝知已誠難事也如不難亦何為必以古人期於今人待邪又自史記班漢已來秉史筆者予盡知其人矣言東漢有若陳宗尹敏伏無忌邉韶崔實馬日磾蔡邕盧植司馬彪華嶠范曄袁宏言國志有若衛顗繆襲應璩王沈傅𤣥茅曜薛塋華覆陳壽言晉洛京史有若陸機束晳王詮詮子隠言江左史有若鄧粲孫盛王韶之檀道鸞何法盛臧榮緒言宋史有若何承天裴松之蘇寳圭沈約裴子野言齊史有若江文通吳均言梁史有若周興嗣鮑行卿何之元劉璠言陳史有若顧野王傅宰陸瓊姚察察子思廉言十六國史有若崔鴻言魏史有若鄧淵崔浩浩弟覽高允張偉劉横李彪邢巒温子昇魏收言北齊史有若祖孝徴陸元規湯休之杜臺卿崔子發李德林林子百藥言後周史有若柳虬牛𢎞令狐德棻岑文本言隋書有若王師邵王胄顔師古孔頴逹于志寧李延壽言皇家受命有若温大雅魏鄭公房梁公長孫趙公許敬宗劉𦙍之楊仁卿顧𦙍牛鳯及劉子𤣥朱敬則徐堅吳兢次而修者亦近在耳目於戲自東觀至武德已來其間作者遺草有未行於時及修撰未旣者如聞並藏於史閣固非外學者可得究諸予雖無聞良史至於實録品藻增損詳略亦各有新意豈無班馬之文質董史之遺直者邪蓋有之矣我未之見也常欲以春秋條貫刪補冗闕掇拾衆美成一家之盡善有若採葑菲者無以下體衣狐裘者無以羔袖言不多乎哉以為多則存之視予力志何如耳昔阮嗣宗嗜酒當時以為步兵校尉雖非其任貴且快意今予之嗜書有甚於嗣宗之嗜酒且虗其腹若行哺而實者存之宜如何處予哉傳不云乎心志旣通名譽不聞其足下何遺邪此存之所宜動心也脱禄不及厚孤弱名不及善知友匡廬之下猶有田一成耕牛兩具僮僕為相雜書萬巻亦足以養高頥神誠知非丈夫矣所立固不失谷口鄭子眞耳敢布諸足下其圖之某再拜論史上蕭至忠書劉子𤣥僕自䇿名仕伍待罪朝列三為史臣再入東觀竟不能勒成國典貽彼後來者何哉靜言思之其不可有五故也何者古之國史皆出一家如魯漢之邱明子長晉齊之董狐南史咸能立言不朽藏諸名山未聞藉於衆功方云絶筆惟後漢東觀大集羣儒而著述無主條章靡立由是伯度訝其不實公理以為可焚張蔡二子糺之於當代傅范兩家嗤之於後葉今史司取士有倍東京人自以為荀袁家自稱為政駿每欲記一事載一言皆閤筆相視含毫不㫁故首白可期而汗青無日其不可一也前漢郡國計書先上太史副上丞相後漢公卿所撰始集公府乃上蘭臺由是史官所修載事為傳爰自近古此道不行史臣編録惟自詢探而左右二史闕注起居衣冠百家罕通行狀求風俗於州郡視聴匪詳討沿革於臺閣簿籍難見雖使尼父再出猶且成於管窺况僕限以中才安能遂其博物其不可二也昔董狐之書法也以示於朝南史之書弑也執簡以往而近代史局皆通籍禁門幽居九重欲人不見尋其義者蓋由杜彼顔面防諸請謁故也然今館中作者多士如林皆願長喙無聞䶦舌儻有五始初成一字加貶言未絶口而朝野具知筆未涵毫而搢紳咸見夫孫盛實録取嫉權門王韶直書見讎貴族人之情也能無畏乎其不可三也古者刋定一史纂成一家體統各殊指歸咸别夫尚書之教以䟽通知逺為主春秋之義以懲惡勸善為先史記則退處士而進姦雄漢書則抑忠臣而飾主闕斯並曩賢得失之例良史是非之准作者言之詳矣頃史官注記多取稟監修楊令公法春秋則云必須直辭宗尚書則曰宜多隠惡十羊九牧其意難行一國三公適從焉在其不可四也竊以史置監修雖無古式尋其名號可得而言夫言監者蓋揔領之義耳如創紀編年則年有斷限革傳叙事則事有豐約或可略而不略或應書而不書此失刋削之務也屬辭比事勞逸宜均揮鈆奮墨勤惰須等某袠某篇付之此職某紀某傳歸之彼官此銓配之理也斯並宜明立科條審定區域儻人思自勉則書可立成今監之者旣不指授修之者又無遵奉用使爭學苟且務相推避坐變炎涼徒延歲月其不可五也凡此不可其流實多一言以蔽三隅自反而時談物議焉得笑僕編次無聞者哉比者伏見明公每汲汲於勸誘勤勤於課績或云墳籍事重努力用心或云歲序已淹何時輟手竊以綱維不舉而督課徒勤雖威以刺骨之刑朂以懸金之賞終不得也論語曰陳力就列不能者止僕所以昔者布懐知己厯詆羣公屢辭載筆之官願罷記言之職者正為此耳當今朝號得人國稱多士蓬山之下良直差肩芸閣之中英竒接武僕旣功虧刻鶴筆未獲麟徒殫太官之膳虛索長安之米乞以本職還其舊居多謝簡書請避賢路惟明公足下哀而許之與陳叔逹重借隋紀書王績乆承所撰隋紀繕寫咸畢前舍弟及家人往並有書借咸不見付豈連城之珍俟楚文而乃進崩山之操待鍾期而後發應以左貂右蟬榮冠東省掌壺負璽望重南宫朝夕丹墀揖讓增價往來青𤨏步頓生光豐屋華榱顧蓬蒿而徙眷鳴鍾列鼎想藜藿而移交不與驕期遂忘曩時之好耳僕遭逢眀聖棲遲邱壑幸悦堯舜之風得全箕潁之操雖心期所託吾道遥存而出處離異儀形難接所以願慿鱗羽宛若承顔望觀述作欣然得意足下裁成國典褒貶人倫欲使明鏡一時覆車千祀故當貽諸好事豈擬唯傳子孫方復固其緘縢嚴其扃鐍天下之望豈如是乎僕亡兄芮城甞典著局大業之末欲撰隋書俄逢喪亂未及終畢僕竊不自揆思卒餘功收撮漂零尚存數帙兆自開皇之始迄於大業之初咸亡兄㸃竄之遺迹也大業之後言事闕然僕雖欲繼成無可慿採以此尤思見足下之所作也還使請致無再三王績白答王績書陳叔逹賢弟千牛及家人典琴至頻辱芳翰索下官所撰隋紀雖承厚眷懣然自失誠恐持郄克之質入邯鄲之墟奏曹鄶之音歴莖英之肆所以遲迴簡牘伏念旬時輒揆短懐仰違前命今奉來札誨責逾深旣以驕鄙相訶又以緘縢致誚欲加之罪其無辭乎正當要使必致耳了不知賢兄芮城有隋書之作足下旣圖繼就須有考尋謹依高㫖繕録馳送然僕雖不佞頗聞君子之論矣嘗以謂為國以禮君舉必書故左史記言右史記事言者申立德立功之意也事者叙立徳立功之迹也所以明勸沮所以别是非自非可以關社稷之安危涉天人之興廢古之君子何嘗取諸褒貶之作有由然也自㣲言泯絶大義乖墜三代之教亂於甲兵六經之術㓕於煨燼君人者尚空名以夸六合史官者貴虗飾以佞一時下及馬遷爰逮班固咸有述作庶幾聖賢其於斟酌典謨表章微絶曾不能觸其藩籬者也魏晉之際夫何足云中原版蕩史道息矣然國於天地與有立焉苟能宅郊禋建社稷樹師長撫黎元雖復五裂山河三分躔次規模典式豈徒然哉是賢兄文中子知其若此也恐後之筆削陷於繁碎宏綱正典暗而不宣乃興元經以定眞統蓋獲麟之事夫何足以知之叔逹亡國之餘幸頼前烈有隋之末濫尸貴郡因霑善誘頗識大方至若梁魏周齊之間耳目耆舊所接風流人物名實可知衣冠道義謳謡尚在頃者皇建其極君子道亨慿藉時來妄叨近侍廟堂多暇典墳自娛覽後魏周齊之紀傳考下官之所聞見曾不喜怒隨意曲直任情叙致浮雜褒貶阿黨述時望者以爵祿為榮談陳國紀者以狙譎為能事至於密㑹王道濳濟生人旣昧於知音咸寢而不記貪救寫其祖父冠冕𦙍嗣婚姻以為譜牒之證耳豈不痛哉風俗之壞一至於此雖人倫王化備列元經而恢談碩議或不可捨是以薛記室及賢兄芮城常悲魏周之史各著春秋近更研覽眞良史焉古人云過高唐者學王豹之謳遊睢渙者學藻繪之功竊惟隋氏之王三十六年成敗否泰目所親覩誠懼後之作者復習向時之弊焉故聊因掌壺之暇著隋紀二十巻騁辭流離則媿於心矣書事簡要則嘗有志焉孔子曰我欲載之空言不如附之於行事儻近是乎謹恃疇眷以塵清覽當積兼金以購㸃竄耳又恐足下紀傳之作須備異聞今更附王胄大業起居注往答韓愈論史官書柳宗元正月二十一日宗元頓首十八丈退之侍者前獲書言史事云具與劉秀才書及今乃見書藁私心甚不喜與退之往年言史事甚大謬若書中言退之不宜一日在館下安有探宰相意以為苟以史榮一韓退之邪若果爾退之豈宜虗受宰相榮已而冒居館下近密地食奉養役使掌故利紙筆為私書取以供子弟費古之志於道者不宜若是且退之以為紀録者有刑禍避不肯就尤非也史以名為褒貶猶且恐懼不敢為設使退之為御史中丞大夫其褒貶成敗人愈益顯其宜恐懼尤大也則又將揚揚入臺府美食安坐行呼唱於朝廷而已邪在御史猶爾設使退之為宰相生殺出入升黜天下士其敵益衆則又將揚揚入政事堂美食安坐行呼唱於内廷外衢而已邪何以異不為史而榮其號利其禄者也又言不有人禍則有天刑若以罪夫前古之為史者然亦甚惑凡居其位思直其道道苟直雖死不可回也如回之莫若亟去其位孔子之困於魯衛陳宋蔡齊楚者其時暗諸侯不能以也其不遇而死不以作春秋故也當其時雖不作春秋孔子猶不遇而死也若周公史佚雖紀言書事猶遇且顯也又不得以春秋為孔子累范􅁮悖亂雖不為史其族亦赤司馬遷觸天子喜怒班固不檢下崔浩沽其直以鬬暴虜皆非中道左邱明以疾盲出於不幸子夏不為史亦盲不可以是為戒其餘皆不出此是退之宜守中道不忘其直無以他事自恐退之之恐唯在不直不得中道刑禍非所恐也凡言二百年文武士多有誠如此者今退之曰我一人也何能明則同職者又所云若是後來繼今者又所云若是人人皆曰我一人則卒誰能紀傳之邪如退之但以所聞知孜孜不敢怠則同職者後來繼今者亦各以所聞知孜孜不敢怠則庶幾不墜使卒有明也不然徒信人口語每每異辭日以滋乆則所云磊磊軒天地者未必不沉没且亂雜無可考非有志者所忍恣也果有志豈當待人督責迫蹙然後為官守邪又凡鬼神事眇茫荒惑無可準明者所不道退之之智而猶懼於此今學如退之辭如退之好言論如退之慷慨自謂正直行行焉如退之猶所云若是則唐之史述其卒無可託乎明天子賢宰相得史才如此而又不果甚可痛哉退之宜更思可為速為果卒以為恐懼不敢則一日可引去又何以云行且謀也今當為而不為又誘館中他人及後生者此大惑已不勉已而欲勉人難矣哉答皇甫湜書李翺辱書覽所寄文章辭高理直歡悅無量有足發予者自别足下來僕口不曾言文非不好也言無所益衆亦未信秖足以招謗忤物於道無明故不言也僕到越中得一官三年矣材能甚薄澤不被物月費官錢自度終無補累求罷去尚未得以為愧僕性不解諂佞復不能曲事權貴以故不得齒於士林而足下亦抱屈在外故略有所說凡古賢聖得位於時道行天下皆不著書以其事業存於制度足以自見故也其著書者蓋道德充積阨摧於時身卑處下澤不能潤物恥灰泯而燼滅又無聖人為之發明故假空言是非一代以傳無窮而自光耀於後或往往有著書者僕近冩得唐書史官才薄言辭鄙淺不足以發揚高祖太宗烈聖明德使後之觀者文采不及周漢之書僕以為西漢十一帝高祖起布衣定天下豁逹大度東漢所不及其餘惟文宣二帝為優自惠景已下亦不皆明於東漢明章兩帝而前漢事迹灼然傳在人口者以司馬遷班固叙述高簡之工故學者悅而習焉其讀之詳也足下讀范曄漢書陳壽三國志王隠晉書生熟何如左邱明司馬遷班固書之温習哉故温習者事跡彰而罕讀者事跡晦讀之踈數在辭之高下理必然也唐有天下聖明繼於周漢而史官叙事曾不如范􅁮陳壽所為況足擬望左邱明司馬遷班固之文哉僕所以為恥當兹得於時者雖負作者之材其道旣能被物則不肯著書矣僕竊不自度無位於朝幸有餘暇而辭句足以稱讃明盛紀一代功臣賢士行跡灼然可傳於後代自以為能不滅者不敢為讓故欲筆削國史成不刋之書用仲尼褒貶之心取天下公是公非以為本羣黨之所謂是者僕未必以為是羣黨之所謂非者僕未必以為非使僕書成而傳則富貴而功德不著者未必聲明於後貧賤而道德全者未必不烜赫於無窮韓退之所謂誅姦諛於旣死發潛德之幽光是翺心也僕文彩雖不足以希左邱明司馬子長足下視僕叙高愍女揚烈婦豈盡出班孟堅蔡伯喈之下邪仲尼有言不有博奕者乎為之猶賢乎已僕所為雖無益於人比之博奕猶為勝也足下以為何如哉古之賢聖當仁不讓於師仲尼則曰文王旣没文不在兹乎又曰予欲無言天何言哉孟軻則曰予之不遇魯侯天也臧氏之子安能使予不遇哉司馬遷則曰成一家之言藏諸名山以俟後聖人君子僕之不讓亦非大過也幸無怪與韓愈致段太尉逸事書柳宗元退之館下前有書進退之力史事奉答誠中吾病若疑不得實未即藉者誠是也退之平生不以不信見遇竊自冠好遊邊上問故老卒吏得段太尉事最詳今所趨走州刺史崔公時賜言事又具得太尉實跡叅校備具太尉大節古固無有然人以為偶一奮遂名無窮今大不然太尉自有難在軍中其處心未嘗虧側其蒞事無一不可紀㑹在下名未逹以故不聞非直以一時取笏為諒也太史遷死退之復以史道在職冝不苟過日時昔與退之期為史志甚壯今孤囚廢錮連遭瘴癘羸頓朝夕就死無能為也苐不能竟其業若太尉者冝使勿墜太史遷言荆軻徴夏無且言大將軍徴蘇建言留侯徴畫容貌今孤囚賤辱雖不及無且建等然比畫工傳容貌尚差勝春秋傳所謂傳信傳著雖孔子亦猶是也竊自以為信且著其逸事有狀不宣宗元頓首與史館韓愈郎中書元稹郎中退之足下某與前襄州文學掾甄逢遊善逢故刑部員外郎濟之子天寳中隠於衛之青巗山採訪使苖公等五人皆以狀薦凡十徴不起末以左拾遺就拜之適禄山朝奏京城懇於上前求為賔介𤣥宗可其奏禄山還至衛遣太守鄭遵意詣山中致命輟行信宿以俟之甄生慮不得免乃偽瘖其音復隠青巗踰年而禄山叛即日遣偽節度使蔡希德緘刀逼召且曰或不可彊斬首來徇旣而甄生禁閉無言延頸承刃氣和色定若甘心然希德義而捨之禄山亦終不能致慶緒繼逆虜而囚之東都安國觀代宗復洛甄生臥匡牀詣元帥府至則號撲自治代宗為之動色遂命傳置長安肅宗高其行因授館於三司治所令從賊官囚慙拜之受汚者莫不俯伏仰歎時恨不即死於其地且夫辯所從於居易之時堅直操於利仁之世而猶褊淺選耎者之所不為蓋拂人之心難而害已之避深也況乎天下亂矣王澤竭矣死忠者不必顯從亂者不必誅而曰眷眷本朝甘心白刃難矣哉是以治平則為公為卿為鴛為鷺世變則為蛇為豕為獍為鴞者十常八九焉若甄生冕弁不加其身禄食不進其口於天寳末蓋青巗一男子耳及亂則延頸承刃分死不回曰不以不顯而廢忠不以不誅而從亂叅合古今之士蓋萬一焉某嘗讀注記闕而未書謹備所聞蓋欲執事者編此義烈以永永於來世耳子逢始生之歲顔太保崔太傅皆為歌詩以美賢者有後且序甄生之本末及逢旣長耕先人舊田於襄之宜城讀書為文不詣州里歲饉則力穡節用以給足於親族歲穰則施餘於其鄰里鄉黨之不能自持者前後斥家財排患難於朋友者數四由是以義聞襄之守狀為文學始就羈於吏職某聞風旣乆因與之遊逢每寃其父之名不在於史將欲抱所寃詣京師告訴司史氏蓋行有日矣以愚料之甄生僕短馬疲言約行孤將不為驕閽之所排則權力者遲疑以臨之固無自而入矣因曉甄生以無自入之勢且告以執其事者辱與某游願得所寃之狀告甄生厚相信待由是輟行旣而自思滓賤之中猶願貢所聞於執事得非愚且僭也然誚笑之暇幸垂察焉不宣某再拜答元稹侍御書韓愈九月五日愈頓首微之足下前歲辱書論甄逢父濟識安禄山必反即詐為瘖棄去禄山反有名號又逼致之濟死執不起卒不汚禄山父子事又論逢知讀書刻身立行勤已取足不干州縣斥其餘以救人之急足下繇是與之交欲令逢父子名跡存諸史氏足下以抗直喜立事斥不得立朝失所不自悔喜事益堅微之乎子眞安而樂之者謹詳足下所論載校之史法若濟者固當得附書今逢又能行身幸於方州大臣以標白其先人事載之天下耳目徹之天子追爵其父第四品赫然驚人逢與其父俱當得書矣濟逢父子自吾人發春秋美君子樂道人之善夫苟能樂道人之善則天下皆去惡為善善人得其所其功實大足下與濟父子俱冝牽聨得書足下勉逢令終始其躬而足下年尚彊嗣德有繼將大書特書屢書不一書而已也愈旣承命又執筆以俟愈再拜唐文粹巻八十二欽定四庫全書唐文粹巻八十三宋姚鉉編書五總一十一首論選舉五與權徳輿書栁冕荅栁福州書權徳輿上宣州髙大夫書杜牧上禮部權侍郎書獨孤郁荅獨孤秀才書權徳輿論諌諍二與人論諫書杜牧與李諌議行方書孫樵論仕進一荅孟郊論仕進書獨孤郁論虚无一與鄭駙馬書張説論法乗一與濟法師書白居易論服餌一與崔連州論石鍾乳事書栁宗元與權徳輿書栁冕冕白昔仲弓問為政子曰先有司有司之政在於舉士是以三代尚徳尊其敎化故其人賢西漢尚儒明其理亂故其人智後漢尚章句師其傳習故其人守名節魏晉尚氏族故其人矜伐隋氏尚吏道貴其官位故其人寡亷恥唐承隋法不改其理此天所以待聖主正之何者進士以詩賦取人不先理道明經以墨義考試不本儒意選人以書判殿最不尊人物故吏道之理天下天下奔競而無廉恥者以教之者未也閣下豈不謂然乎自頃有司試明經奏請毎經問義十道五道全冩疏五道全冩注其有明聖人之道盡六經之意而不能誦䟽與注一切棄之恐清識之士無由而進腐生豎子比肩登第不亦失乎閣下因從容啓明主稍革其弊奏為二等其有明六經之義合先王之道者以為上等其有精於誦注者與精於誦疏者以為次等不登此二枓者以為下等不亦善乎且明六經之義合先王之道君子之儒敎之本也明六經之注與六經之疏小人之儒敎之末也今者先章句之學後君子之儒以求清識之士不亦難乎是以天下至大仕人至衆而人物殄瘁亷恥不興者亦在取士之道未盡其術也誠能革其弊尊其本舉君子之儒先於履行者俾之入仕即清識君子也俾之立朝即王公大人也一年得一二十人十年得一二百人三十年得五六百人即海内人物不亦盛乎昔唐虞之盛也十六族而已周之興也十亂而已漢之王也三傑而已太宗之聖也十八學士而已豈多乎哉今海内人物顒然思理推而廣之以風天下即天下之士靡然而至矣是則由於有司以化天下之士得無亷恥乎冕頓首荅栁福州書權徳輿来問見愛殷懃甚厚䟽以先師對仲弓有司之説又曰由於有司以風天下誠哉大君子之言理道也今之取士在於禮部吏部按資格以擬官奏郎官以考别失權衡重輕之本無乃甚乎至於禮部求才猶似為仁由已然亦沿於時風豈能自振嘗讀劉秩祭酒上疏云太學設官職在造士士不知方時無賢才臣之罪也毎讀至此心常慕之當時置於國庠似在散地而方以乏賢内訟慨然上奏此君子之心也君子之言也況以䝉劣辱當儀曹為時求人豈敢容易然再歲計偕多有親故故進士初牓有之帖落有之策落有之及第亦有之不以私害公不以名廢實不敢自愛不訪於人兩漢設科本於射筞故公孫𢎞董仲舒之倫痛言理道近者祖習綺靡過於雕蟲俗謂之甲賦律詩儷偶對屬况十數年間至大官右職敎化所繫其若是乎是以二年已来叅考對策不訪名物不徴隠奥求通理而已求辨惑而已習常而力不足者則不能迴復於此故或得其人庶他時有通識懿文可以持重不遷者而不盡在於齪齪科第也明經問義有幸中所記者則書不停綴令釋通其意則牆面木偶遂列上第末如之何頃者叅伍其問令書釋意義則於䟽注之中苟刪撮㫖要有數句而通者昧其理而未盡有數紙而黜者雖未盡善庶稍得之至於来問明六經之義合先王之道而不在於注疏者雖令學究一經之科毎歲一人猶慮其不能至也且明經者仕進之多數也注䟽者猶可以質驗也不者儻有司率情下上其手既失其末又不得其本則蕩然矣無乃然乎古人云勉彊行道則徳日起而大有功中庸有困而行之勉彊而行之鄙雖不敏敢忘勉之之道邪大凡常情為近習所勝役役於聞見汲汲於進取苟避患安時俾躬處休以至老死自為得計豈復有揣摩古今風俗整齊教化根本原始要終長轡逺馭如閣下吐論之若是者邪此鄙人所以喟然三復而不知其已也来問又言三代兩漢至近古所尚不同豈古化夐逺之不可復邪復因縁漸靡而操執者不之思邪鄙人頑固謹俟餘論因自發舒慙怍無量徳輿再拜上宣州髙大夫書杜牧某頓首再拜自去歲前五年執事者上言云科第之選宜與寒士凡為子弟議不可進熟於上耳固於上心上持下執堅如金石為子弟者魚潜䑕遁無入仕路某竊惑之科第之設聖祖神宗所以選賢才也豈計子弟與寒士也古之急於士者取盜取讎取於夷狄豈計其所由来況國家設取士之科而使子弟不得由之若以科第之徒浮華輕薄不可任以為治則國朝自房梁公已降有大功立大節率多科第人也若以子弟生於膏粱不知理道不可與美名不令得美仕則自堯已降聖人賢人率多子弟凡此數者進退取捨無所依據某所以憤懣而不曉也堯天子子也禹公子也文王諸侯孫與子也武王文王子也周公文王之子武王之弟也夫子天子裔孫宋公六代大夫子也春秋時列國有其社稷各數百年其良臣多出公族及卿大夫子孫也魯之季友季文子叔孫穆子叔孫昭子孟獻子皆出於三桓也臧文仲武仲出於公子彄栁下惠出於公子無駭諸侯之子稱公子公子之子稱公孫公孫之子稱公族以王父字為氏展禽是也宋之良臣多出於戴桓武荘之族也舉其尤者華元子罕向戍是也衛之良臣亦公族及卿大夫之裔也舉其尤者公子荆公叔發公子朝皆公族也子鮮公子也史狗史魚寗武子卿大夫之裔也齊之晏嬰晏桓子子也曹之子臧公子也呉之季札王子也鄭之良臣皆公孫公族也舉其尤者子封子良子罕子展子皮子産子張子太叔是也楚之良臣子囊子西子期皆王子也子庚王孫也其卿大夫之裔鬬氏生令尹子文後有鬬辛鬬巢鬬懐昭王返國皆有大功蒍氏生蒍賈孫叔敖蒍艾也薳啓彊薳子憑薳俺薳罷屈氏生屈蕩屈到屈建子木六國時有昭奚恤公族也屈原諸屈後也皆其祖先於武王文王時基楚國為霸者用其子孫其社稷垂九百餘年至於晉國最為彊其賢臣尤多有趙氏魏氏韓氏狐氏中行氏范氏荀氏羊舌氏欒氏郤氏祁氏其先皆武公獻公文公勤勞臣也用其子弟召諸侯而盟之者僅三百年在六國齊之孟嘗趙之平原魏之信陵皆王子王孫也齊復有司馬穰苴亦王族也其在漢魏已下至於國朝公族之子弟卿大夫之胄裔書於史氏為偉人者不可勝數不可殫論聖賢才能於子弟中復何如也言科第浮華輕薄不可任用則國朝房梁公𤣥齡進士也相太宗凡二十一年為唐宗臣比之伊吕周召者郝公處俊亦進士也為宰相時髙宗欲遜位與武后處俊曰天下者髙祖太宗之天下非陛下之有但可傳之子孫不可私以與后髙宗因止来濟上官儀李𤣥義皆進士也後為宰相濟助長孫太尉褚河南共摧武后者後突屈入塞免胄戰死儀草廢武后詔𤣥義助處俊言不可以位與武后婁侍中師徳亦進士也吐蕃彊盛為監察御史以紅抹額應猛士詔躬衣皮袴率士屯田積榖八百萬石二十四年西征兵不乏食薦狄公為相取中宗於房陵立為太子漢陽王張公東之亦進士也年八十為相敺致四王手提社稷上還中宗郭代公元振亦進士也鎮涼州僅十五年北郤突厥西走吐蕃制地一萬里握兵三十萬闕惕息不敢移唐社稷魏公知古亦進士也為宰相廢太平公主謀以佐𤣥宗及卒也宋開府哭之曰叔向古之遺直子産古之遺愛兼而有者其魏公乎姚梁公元崇登第下筆成章舉首佐𤣥宗起中興業凡三十年天下幾無一人之獄宋開府璟亦進士也與姚唱和致開元太平者劉幽求登制筞科與𤣥宗徒步誅韋氏立睿宗者蘇氏父子皆進士也大許公為相於武后朝酷吏中不失其正於中宗朝誅反賊鄭普思於韋后黨中小許公佐𤣥宗朝號為蘇宋張燕公説登制筞科排張易之兄弟賛睿宗請𤣥宗監國竟誅太平公主招置文學士開内學館𤣥宗好書尚古封中泰山祀后土因燕公也張曲江九齡亦進士也排李林甫牛仙客罵張守珪不斬安祿山謫老南服年未七十張巡亦進士也凡三入判等以兵九千守睢陽城凡周歲拒賊十三萬兵出天寳雜記使賊不能東進尺寸以全江淮元和中宰相河東司徒兼中書令裴公皆進士也裴公仍再得宏辭制筞科當貞元時河北背叛齊蔡亦叛階此蜀亦叛吴亦叛他未叛者皆髙下其目熟視朝廷希嚮彊弱而施其所為司空始相憲宗廢權倖之機牙令不得張收歛百職歸於有司命節度使出於朝廷不由兵士始自撫州除袁相為滑州滑州凡三月無帥三軍無事憲宗始信之自此不用貞元故事以行軍副使大将軍為節度使拔取沈滯各還其官開州取唐舍人為職方郎中知制誥饒州取李趙公為考功郎中知制誥在貞元中皆十餘年遷逐其他似謫者亦皆當叙用也然後西取蜀東取吴天下仰首始見白日裴公撫安魏博使田氏盡歸六州元和中翦蔡劇賊於洛師脇下招来常山質其二子以累其心取十三城使不得與齊交手為㓂因誅師道河南盡平當是時天下幾至於太平凡此十九公皆國家與之存亡安危治亂者也不知科第之選復何如也至於智效一官忠立一節徳行文學不可悉數董生云春秋之義變古則譏之傅説命髙宗曰監于先生成憲其以永無愆故殷道復興鴻鴈美周宣王能復先王之道西漢魏相佐漢宣帝為中興但能奉行漢家故事姚梁佐𤣥宗亦以務舉貞觀之法制耳自古及今未有背本棄古而能致治者昨獲覽三郎秀才新文凡十篇數日在手讀之不倦其㫖意所尚皆本仁義而歸忠信加以辭彩遒茂皎無塵土況有誠明長厚之譽於千人中儻使前五六年得進士第今可以出入諌官御史助明天子為治矣古人云三月不仕則相弔安有凡五六年来選取進士施設網罟如防盜賊言子弟者噎啞抑鬱思一解布衣與下士齒厥路無由於古未前聞也某因覽三郎文章不覺發憤略言大槩干觸尊重無任惶懼某再拜上禮部權侍郎書獨孤郁貞元十三年八月日獨孤郁謹上書于舍人三兄閣下郁以世舊遂獲謁叙故人大賢之遇郁也亦不以常交言之眷意甚露郁𤨏𤨏鬱堙二年無聞摧頽折羽而不喜者非失意之謂非尤人之謂蓋将因事自罪而不喜也借如豫章生於擁腫小木之中樵蘇見之亦以嗟矣一有不嗟則必自與擁腫者亦不多逺也珠璣雜於礫石之中童子弄之亦以驚矣一有不驚則必自與礫石者亦不多逺也鏌鎁卧於鈆鈍之中下工覩之固亦知矣一有不知則必自與鈆鈍者亦不多逺也毛嬙後於宿瘤而行有目者覩之固即分矣一有不分則必自與宿瘤亦不多逺也苟與乎擁腫礫石鈆鈍宿瘤輩果殊異則不能移凡眼所擇況逃乎良工巧冶有識者之目哉今禮部侍郎之目固亦國之良工巧冶有識者之目也於中再擇再不中是直已為擁腫礫石鈆鈍宿瘤矣何止與斯不逺哉此所以因事自罪而不喜也或諭之曰今之道尚光子之所以不振者晦過也子之道豐蔀也子且有崪天之材而隠植之有照乗之珍而宻櫝之有切玉之利而謹襓之有傾都之豔而深帷之雖使離婁左執光而右拭眥迫而索之固亦不能知矣子何不移植露光披鋒示貌使識者覩而駭之彼之所誨固亦郁所不能焉已必不材也不寳也不利也不姝也且遍過於有識者之目是自揚其短也已必材也必寳也必利也必姝也雖小示其光鋒榦貌於一人驚我亦已多矣所不驚者是子四事果不足異於族凡也郁病直拙獨大賢於郁分殊尚不能以亟況悠悠者歟郁常行乎時輩之間多酌其言語善者鄙者自減盈消息其㫖稍有可驚不敢不於許言者言之今之後學者或嘆曰吁後来惡乎所歸哉此且非宜長者所當聞也亦非宜長者所不當聞也今朝廷先達病在不能公也或能公而不能為力也覽其文則賛美稱嗟無不至也其間善惡輕重進退則心以别矣此其所以為公也鮮有知其必善而風皷之不啻若自口出此其所以為公不能甚力致遑遑之倫其下才者亦曰今夫在位者其無公歟其無公歟有一善未嘗肯稱也意曰非我事也又慮與之談者不與我符愛也是使諸子竊竊然自以無聞為不辱遂相與擇㨗趨邪紛屯於主司之跡親者苟能致譽則不詰其所以致譽之賢不肖而曹趨之矣此實今之躁進苟得之風也在朝廷大賢主而名之驅而正之於其善者扶之摇之善而未具者决之導之使四方學士知嚮方焉何如其曰非我事也若使一人曰非我事也十人曰非我事也舉朝廷皆曰非我事也苟非我事則無所不非我事無所不非我事則天地之間無乃以寂寥乎昔孔子飭詩書禮樂以化齊弟子而至天下使孔子亦曰非我事也則今者安盡聞夫七十子之賢詩書禮樂之盛七十子亦曰非我事也又孰為播孔子之聖如此其大乎今文亦如是朝廷先達亦如是後之達者亦如是等不相播則人文禮義知已復往之道不幾乎息矣郁不肖辱承大賢之心深矣非又敢以假喻自薦意欲以大賢擇衆賢而使七十子之徒亦方孔子於大賢也何如荅獨孤秀才書權徳輿損四日書問兼示新文閎博峻異有立言致逺之㫖其於惠愛纎悉重厚甚善甚善以吾子才志與年三者皆富以嘉聲自振若建瓴決水大冶良工必有不期至而至者況以日新又日新之盛哉夫豫章珠璣鏌鎁毛嬙終不慮隠之櫝之襓之帷之之為患而為擁腫礫石鈆鈍宿瘤之排蔽但發有疾徐耳来問云一人驚之亦多矣豈與族凡校邪此誠得之又云先達病不能公或公而病其無力今夫滔滔者或辨之不至而苟善待之及揚聲延譽則鉗口結舌大凡舉世之病也如鄙夫者直力不足耳亦懼招徕奔走為津為岐至有竊所愛者則寡矣又奚能廢是也從古未達者之望達者何嘗不如是邪先師七十子所擬豈敢當也三復戁然無言喻懐其他慕重續俟㑹話徳輿頓首與人論諌書杜牧某疎愚怠惰不識機括獨好讀書讀之多矣毎見君臣治亂之間興亡諌諍之道遐想其人䑛筆和墨則冀人君一悟而至于治平不悟則烹身滅族唯此二者不思中道自秦漢以来凡千百輩不可悉數然怒諌而激亂生禍者累累皆是納諌而悔過行道者不能百一何者皆以辭語迂險指射醜惡致使然也夫迂險之言近於誕妄指射醜惡足以激怒夫以誕妄之説激怒之辭以卑凌尊以下干上是以諌殺人者殺人愈多諌畋獵者畋獵愈甚諌治宫室者宮室愈崇諌任小人者小人愈寵觀其㫖意且欲與諌者一鬬是非一決怒氣耳不論其他是以毎於本事之上尤増飾之今有兩人道未相信甲謂乙曰汝好食某物慎勿食果更食之必死乙必曰我食之久矣汝為我死必倍食之甲若謂乙曰汝好食某物第一少食苟多食必生病乙必因而謝之減食何者迂險之言則欲反之循常之説則必信之此乃常人之情世多然也是以因諌而生亂者累累皆是也漢成帝欲御樓船過渭水御史大夫薛廣徳諫曰宜從橋陛下不聴臣自刎以血汚車輪陛下不廟矣不得入廟祠也上不説張猛曰臣聞主聖臣直乗船危就橋安聖主不乗危御史大夫言可聴上曰曉人不當如是邪謂諫諍之言當如猛之詳善乃從橋近者寳厯中敬宗皇帝欲幸驪山時諌者至多上意不决拾遺張權輿伏紫宸殿下叩頭諌曰昔周幽王幸驪山為犬戎所殺秦始皇𦵏驪山國亡𤣥宗皇帝宫驪山而禄山亂先皇帝幸驪山而享年不長帝曰驪山若此之凶邪我宜一往以驗彼言後數日自驪山迴
