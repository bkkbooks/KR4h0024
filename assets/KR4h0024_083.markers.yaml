  - {type: variant, offset: 0, length: 4857, content: 重校正唐文粹卷第八十三吳興姚鉉纂書五揔一十一首論選舉五與權德輿書栁冕荅柳福州書權德輿上宣州高大夫書杜牧上禮部權侍郎書獨孤郁荅獨孤秀才書權德輿論諌諍二與人論諌書杜牧與李諌議行方書孫樵論仕進一荅孟郊論仕進書獨孤郁論虚无一與鄭駙馬書張說論法乗一與濟法師書白居易論服餌一與崔連州論石鍾乳事書栁宗元與權德輿書柳冕冕白昔仲弓問爲政子曰先有司有司之政在於舉士是以三代尚德尊其敎化故其人賢西漢尚儒明其理亂故其人智後漢尚章句師其傳習故其人守名節魏晉尚氏族故其人矜代隋氏尙吏道貴其官位故其人寡廉恥唐承隋法不改其理此天所以待聖主正之何者進士以詩賦取人不先理道明經以墨義考試不本儒意選人以書判殿最不尊人物故吏道之理天下天下奔競而無廉恥者以教之者末也閣下豈不謂然乎自頃有司試明經奏請毎經問義十道五道全冩䟽五道全冩注其有明聖人之道盡六經之意而不能誦䟽與注一切棄之恐清識之士無由而進腐生豎子比肩登第不亦失乎閣下因從容啓明主稍革其弊奏爲二等其有明六經之義合先王之道者以爲上等其精於誦注者與下等不亦善乎且明六經之義合先王之道君子之儒敎之本也明六經之注與六經之䟽小人之儒敎之末也今者先章句之學後君子之儒以求清識之士不亦難乎是以天下至大士人至衆而人物殄瘁廉恥不興者亦在取士之道未盡其術也誠能革其弊尊其本舉君子之儒先於履行者俾之入仕即清識君子也俾之立朝即王公大人也一年得一二十人十年得一二百人三十年得五六百人即海内人物不亦盛乎昔唐虞之盛也十六族而巳周之興也十亂而巳漢之王也三傑而巳太宗之聖也十八學士而巳豈多乎哉今海内人物顒然思理推而廣之以風天下即天下之士靡然而至矣是則由於有司以化天下之士得無廉恥乎冕頓首荅柳福州書權德輿來問見愛殷懃甚厚䟽以先師對仲弓有司之說又曰由於有司以風天下誠哉大君子之言理道也今之取士在於禮部吏部按資格以擬官奏郎官以考别失權衡重輕之本無乃甚乎至於禮部求才猶似爲仁由巳然亦㳂於時風豈能自振甞讀劉秩祭酒上䟽云太學設官職在造士士不知方時無賢才臣之罪也毎讀至此心常慕之當時置於國庠似在散地而方以乏賢内訟慨然上奏此君子之心也君子之言也況以蒙劣辱當儀曹爲時求人豈敢容易然再歲計偕多有親故故進士初牓有之帖落有之筞落有之及第亦有之不以私害公不以名廢實不敢自愛不訪於人兩漢設科本於射筞故公孫弘董仲舒之倫痛言理道近者祖習綺靡過於雕蟲俗謂之甲賦律詩儷偶對屬況十數年間至大官右職敎化所繫其若是乎是以二年巳來叅考對筞不訪名物不徴隱奥求通理而巳求辨惑而巳習常而力不足者則不能迴復於此故或得其人庶他時有通識懿文可以持重不遷者而不盡在於齪齪科第也明經問義有幸中所記者則書不停綴令釋通其意則牆面木偶遂列上第末如之何頃者叅五其問令書釋意義則於䟽注之中茍剛撮旨要有數句而通者昧其理而未盡有數𥿄而黜者雖未盡善庶稍得之至於來問明六經之義合先王之道而不在於注䟽者雖令學究一經之科毎歲一人猶慮其不能至也且明經者仕進之多數也注䟽者猶可以質驗也不者儻有司率情下上其才旣失其末又不得其本則蕩然矣無乃然乎古人云勉彊行道則德日起而大有功中庸有困而行之勉彊而行之鄙雖不敏敢忘勉之之道邪大凡常情爲近習所勝没没於聞見汲汲於進取茍避患安時俾躬處休以至老死自爲得計豈復有揣摩古今風俗整齊教化根本原始要終長轡逺馭如閣下吐論之若是者邪此鄙人所以喟然三復而不知其巳也來問又言三代兩漢至近古所不同豈古化夐逺之不可復邪復因縁漸靡而操執者不之思邪鄙人頑固謹俟餘論因自發舒慙怍無量德輿再拜上宣州高大夫書杜牧某頓首再拜自去歲前五年執事者上言云科第之選冝與寒士凡爲子弟議不可進熟於上耳固於上心上持下執堅如金石爲子弟者魚濳䑕遁無入仕路某竊惑之科第之設聖祖神宗所以選賢才也豈計子弟與寒士也古之急於士者取盜取讎取於夷狄豈計其所由來況國家設取士之科而使子弟不得由之若以科第之徒浮華輕薄不可任以爲治則國朝自房梁公巳降有大功立大節率多科第人也若以子弟生於膏梁不知理道不可與美名不令得美仕則自堯巳降聖人賢人率多子弟凡此數者進退取捨無所依據某所以憤懣而不曉也堯天子子也禹公子也文王諸侯孫與子也武王文王子也周公文王之子武王之弟也夫子天子裔孫宋公六代大夫子也春秋時列國有其社稷各數百年其良臣多出公族及卿大夫子孫也魯之季友季文子叔孫穆子叔孫昭子孟獻子皆出於三桓也臧文仲武仲出於公子彄柳下惠出於公子無駭諸侯之子稱公子公子之子稱公孫公孫之子稱公族以王父字爲氏展禽是也宋之良臣多出於戴恒武莊之族也舉其尤者華元子罕向戍是也衛之良臣亦公族及卿大夫之裔也舉其尤者公子荆公叔發公子朝皆公族也子鮮公子也史狗史魚寗武子卿大夫之裔也齊之晏嬰晏桓子子也曹之子臧公子也吳之季扎王子也鄭之良臣皆公孫公族也舉其尤者子封子良子罕子展子皮子産子張子太叔是也楚之良臣子囊子西子期皆王子也子庚王孫也其卿大夫之裔鬪氏生令尹子文後有鬪辛鬪巢鬪懷昭王返國皆有大功蔿氏生蔿賈孫叔敖蔿艾也薳啓彊薳子慿薳掩薳罷屈氏生屈蕩屈到屈建子木六國時有昭奚恤公族也屈原諸屈後也皆其祖先於武王文王時基楚國爲霸者用其子孫其社稷垂九百餘年至於晉國最爲彊其賢臣尤多有趙氏魏氏韓氏狐氏中行氏范氏荀氏羊舌氏欒氏郤氏祁氏其先皆武公獻公文公勤勞臣也用其子弟召諸侯而盟之者僅三百年在六國齊之孟甞趙之平原魏之信陵皆王子王孫也齊復有司馬穰苴亦王族也其在漢魏巳下至於國朝公族之子弟卿大夫之胄裔書於史氏爲偉人者不可勝數不可殫論聖賢才能於子弟中復何如也言科第浮華輕薄不可任用則國朝房梁公玄齡進士也相太宗凡二十一年爲唐宗臣比之伊吕周召者郝公處俊亦進士也爲宰相時高宗欲遜位與武后處俊曰天下者高祖太宗之天下非陛下之有但可傳之子孫不可私以與后高宗因止來濟上官儀李玄義皆進士也後爲宰相濟助長孫太尉禇河南共摧武后者後突屈入塞免胄戰死儀革廢武后召玄義助處俊言不可以位與武后婁侍中師德亦進士也吐蕃彊盛爲監察御史以紅抹額應猛士詔躬衣皮袴率士屯田積榖八百萬石二十四年西征兵不乏食薦狄公爲相取中宗於房陵立爲太子漢陽王張公東之亦進士也年八十爲相敺致四王手提社稷上還中宗郭代公元振亦進士也鎮涼州僅十五年北卻突厥西走吐蕃制地一萬里握兵三十萬武氏惕息不敢移唐社稷魏公知古亦進士也爲宰相廢太平公主謀以佐玄宗及卒也宋開府哭之曰叔向古之遺直子産古之遺愛兼而有者其魏公乎姚梁公元崇登第下筆成章舉首佐玄宗起中興業凡三十年天下幾無一人之獄宋開府璟亦進士也與姚唱和致開元太平者劉幽求登制筞科與玄宗徒歩誅韋氏立睿宗者蘇氏父子皆進士也大許公爲相於武后朝酷吏中不失其正於中宗朝誅反賊鄭普思於韋后黨中小許公佐玄宗朝號爲蘇宋張燕公說登制筞科排張易之兄弟賛睿宗請玄宗監國竟誅太平公主招置文學士開内學舘玄宗好書尚古封中泰山祀后土因燕公也張曲江九齡亦進士也排李林甫牛仙客罵張守珪不斬安禄山謫老南服年未七十張巡亦進士也凡三入判等以兵九千守睢陽城凡周歲拒賊十三萬兵出天寳雜記使賊不能東進尺寸以全江淮元和中宰相河東司徒兼中書令裴公皆進士也裴公仍再得宏辭制筞科當貞元時河北叛齊蔡亦叛階此蜀亦叛吳亦叛他未叛者皆高下其目熟視朝廷希嚮彊弱而施其所爲司空始相憲宗廢權倖之機牙令不得張收歛百職歸於有司命節度使出朝廷不由兵士始自撫州余袁相爲滑州滑州凡三月無帥三軍無事憲宗始信之自此不用貞元故事以行軍副使大將軍爲節度使拔取沈滯各還其官開州取唐舎人爲職方郎中知制誥饒州取李趙公爲考功郎中知制誥在貞元中皆十餘年遷逐其他似謫者亦皆當叙用也然後西取蜀東取吳天下仰首始見白日裴公撫安魏博使田氏盡歸六州元和中翦蔡劇賊於洛師脇下招來常山質其二子以累其心取十三城使不得與齊交手爲冦因誅師道河南盡平當是時天下幾至於太平凡此十九公皆國家與之存亡安危治亂者也不知科第之選復何如也至於智效一官忠立一節德行文學不可悉數董生云春秋之義變古則譏之傅說命高宗曰鑑于先王成憲其以永無愆故殷道復興鴻鴈矣宣王能復先王之道西漢魏相佐漢宣帝爲中興但能奉行漢家故事姚梁佐玄宗亦以務舉貞觀之法制耳自古及今未有背本棄古而能致治者昨獲覽三郎秀才新文凡十篇數日在手讀之不倦其旨意所尚皆本仁義而歸忠信加以辭彩道茂皎無塵土況有誠明長厚之譽於千人中儻使前五六年得進士第今可以出入諌官御史助明天子爲治矣古人云三月不仕則相弔安有凡五六年來選取進士施設網罟如防盗賊言子弟者噎啞抑鬱思一解布衣與下士齒厥路無由於古未前聞也某因覽三郎文章不覺發憤略言大槩干觸尊重無任惶懼某再拜上禮部權侍郎書獨孤郁貞元十三年八月日獨孤郁謹上書千舎人三兄閣下郁以母舊遂獲謁見敘古大賢之遇郁也亦不以常交言之眷意甚露郁瑣瑣鬱堙二年無聞摧頽折羽而不喜者非失意之謂非尤人之謂蓋將因事自罪而不喜也借如豫章生於擁腫小木之中樵蘇見之亦以嗟矣一有不嗟則必自與擁腫者亦不多逺也珠璣雜於礫石之中童子弄之亦以驚矣一有不驚則必自與礫石者亦不多逺也鏌鎁卧於鈆鈍之中下工覩之固亦知矣一有不知則必自與鈆鈍者亦不多逺也毛嬙後於宿瘤而行有目者覩之固即分矣一有不分則必自與宿瘤亦不多逺也苟與乎擁腫礫石鈆鈍宿瘤輩果殊異則不能移凡眼所擇況逃乎良工巧冶有識者之目哉今禮部侍郎之目固亦國之良工巧冶有識者之目也於中再擇再不中是眞巳爲擁腫礫石鈆鈍宿瘤矣何止與斯不逺哉此所以因事自罪而不喜也或諭之曰今子之道尚光子之所以不振者晦過也子之道豐蔀也子且有崪天之材而隱植之有照乗之珍而密櫝之有切玉之利而謹橈之有傾都之豔而深帷之雖使離婁左執光而右拭眥迫而索之固亦不能知矣子何不移植露光披鋒示貌使識者覩之而駭之彼之所誨固亦郁所不能焉巳必不材也不寶也不利也不妺也且遍過於有識者之目是自揚其短也巳必材也必寶也必利也必姝也雖小示其光鋒榦貌於一人驚我亦巳多矣所不驚者是子四事果不足異於族凡也郁病直拙獨大賢於郁分殊尚不能以亟況悠悠者歟郁常行乎時輩之間多酌其言語善者鄙者自減盈消息其旨稍有可驚不敢不於許言者言之今之後學者或嘆曰吁後來惡乎所歸哉此且非冝長者所當聞也亦非冝長者所不當聞也今朝廷先達病在不能公也或能公而不能爲力也覽其文則賛美稱嗟無不至也其閒善惡輕重進退則心以别矣此其所以爲公也鮮有知其必善而風皷之不啻若自口出此其所以爲公不能甚力致遑遑之倫其下才者亦曰今夫在位者其無公歟其無公歟有一善未甞肯稱也意曰非我事也又慮與之談者不與我符愛也是使諸子竊竊然自以無聞爲不辱遂相與擇捷趨邪紛屯於主司之跡親者苟能致譽則不詰其所以致譽者之賢不肖而曹趨之矣此實今之躁進苟得之風也在朝廷大賢主而名之驅而正之於其善者扶之揺之善而未具者決之導之使四方學士知嚮方焉何如其曰非我事也若使一人曰非我事也十人曰非我事也舉朝廷皆曰非我事也苟非我事則無所不非我事無所不非我事則天地之間無乃以寂寥乎昔孔子飭詩書禮樂以化齊弟子而至天下使孔子亦曰非我事也則今者安盡聞夫七十子之賢詩書禮樂之盛七十子亦曰非我事也又孰爲播孔子之聖如此其大乎今文亦如是朝廷先達亦如是後之達者亦如是等不相播則人文禮義知巳復往之道不幾乎息矣郁不肖辱承大賢心深矣非又敢以假喻自薦意欲以大賢擇衆賢而使七十子之徒亦方孔子於大賢也何如荅孤獨秀才書權德輿損四日書問兼示新文閎博峻異有立言致逺之旨其於惠愛纎悉重厚甚善甚善以吾子才志與年三者皆富以嘉聲自振若建瓴決水大冶良工必有不期至而至者況以日新又日新之盛哉夫豫章珠璣鏌鎁毛嬙終不慮隱之櫝之橈之帷之之爲患而擁腫礫石鈆鈍宿瘤之排蔽但發有疾徐耳來問云一人驚之亦多矣豈與族凡校邪此誠得之又云先達病不能公或公而病其無力今夫滔滔者或辨之不至而苟善待之及揚聲延譽則鉗口結舌大凡舉丗之病也如鄙夫者直力不足耳亦懼招倈奔走爲津爲歧至有竊所愛者則寡矣又奚能廢是也從古未達者之望達者何甞不如是邪先師七十子所儗豈敢當也三復戁然無言喻懷其他慕重續俟㑹話德輿頓首與人論諌書杜牧某踈愚怠墮不識機括獨好讀書讀之多矣毎見君臣治亂之間興亡諌諍之道遐想其人䑛筆和墨則兾人君一悟而至于治平不悟則烹身滅族唯此二者不思中道自秦漢巳來凡千百輩不可悉數然怒諌而激亂生禍者累累皆是納諌而悔過行道者不能百一何者皆以辭語迂險指射醜惡致使然也夫迂險之言近於誕妄指射醜惡足以激怒夫以誕妄之說激怒之辭以卑凌尊以下干上是以諌殺人者殺人愈多諌畋獵者畋獵愈甚諌治宫山廻, WYG: ''}
