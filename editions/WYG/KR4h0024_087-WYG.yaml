body:
  text: 上宰相三書韓愈正月二十七日前鄉貢進士韓愈謹伏光範門下再拜獻書相公閣下詩之序曰菁菁者莪樂育材也君子能長育人材則天下喜樂之矣其詩曰菁菁者莪在彼中阿既見君子樂且有儀説者曰菁菁者盛也莪㣲草也阿大陵也言君子之長育人材若大陵之長育㣲草能使之菁菁然盛也既見君子樂且有儀云者天下美之之辭也其三章曰既見君子錫我百朋説者曰多之之辭也言君子既長育人才又當爵命以賜之厚禄以寵貴之云爾其卒章曰汎汎楊舟載沉載浮既見君子我心則休説者曰載者載也沉浮者物也言君子之於人才無所不取若舟之於物浮沉皆載之云爾既見君子我心則休云者言若此則天下之心美之也君子之於人也既長育之又當爵命寵貴之而於其才無所遺焉孟子曰君子有三樂王天下不與存焉其一曰樂得天下之英才而教育之此皆聖人賢士之所極言至論古今之所宜法者也然則孰能教育天下之才將非吾君與吾相乎幸今天下無事小大之官各守其職錢榖甲兵之問不至於廟堂論道經邦之暇捨此宜無大者焉今有人生二十八年矣名不著於農工商賈之版其業則讀書著文歌頌堯舜之道雞鳴而起孜孜焉亦不為利其所讀皆聖人之書楊墨釋老之學無所入於其心其所著皆約六經之㫖而成文抑邪與正辨時俗之所惑居窮約亦時有感激怨懟竒怪之辭以求知於天下亦不悖於教化妖滛諛佞譸張之説無所出於其中四舉於禮部乃一得三選於吏部卒無成九品之位其可望一畝之宅其可懐遑遑乎四海無所歸恤恤乎飢不得食寒不得衣濱於死而益固得其所者争笑之忽將棄其舊而新是圖求老農老圃而為師悼本志之變化中夜涕泗交頥雖不足當詩人孟子之謂抑長育之使成才其亦可矣教育之使成才其亦可矣抑乂聞古之君子相其君也一夫不獲其所若已推而内之溝中今有人生七年而學聖人之道以修其身積二十年不得已一朝而毁之是亦不獲其所矣伏念今有仁人在上位若不徃告之而遂行是果於自棄而不以古之君子之道待吾相也其可乎寧徃告焉若不得志則命也其亦行矣洪範曰凡厥庶民有猷有為有守汝則念之弗協于極弗罹于咎皇則受之而康而色曰予攸好德汝則錫之福是皆與善之辭也抑又聞古之人有自進者而君子不逆之矣曰予攸好德汝則錫之福之謂也抑又聞上之設官制禄必求其人而授之者非茍慕其才而富貴其身也蓋將用其能理不能用其明理不明者耳下之修已立誠必求其位而居之者非茍役於利而榮於名也蓋將推已之所餘以濟其不足者耳然則上之於求人下之於求位交相求而一其致焉耳茍以是而為心則上之道不必難其下下之道不必難其上可舉而舉焉不必讓於其自舉也可進而進焉不必亷於其自進也抑又聞之上之化下得其道其勸賞不必徧加乎天下而天下從焉因人之所欲為而遂推之之謂矣今天下不由吏部而仕進者幾希矣主上感傷山林之士有遺逸者屢詔内外之臣旁求儒士于四海而其至者蓋闕焉豈其無人乎哉亦見國家之不以非常之道禮之而不來耳彼之處隐就閒者亦人耳其耳目鼻口之所欲其心之所樂其體之所安豈有異於人乎哉今所以惡衣食窮體膚麋鹿之與處猨狖之與居固自以其身不能與時俗順俯仰故甘心自絶而不悔焉而方聞國家之仕進者必舉於州縣然後升於禮部吏部試之以繡繢雕琢之文考之以聲勢之逆順章句之長短中其程式者然後得從下士之列雖有化俗之方安邊之畫不繇是而稍進萬不有一得焉彼惟恐入山之不深入林之不密其影響昧昧唯恐聞於人也今若聞有以書進宰相而求仕者而宰相不辱焉而薦之於天子而爵命之而布其書於四方枯槁沉溺魁閎寛通之士必且洋洋焉動其心峩峩焉纓其冠于于焉而來矣此所謂勸賞不必徧加乎天下而天下從焉者也因人之所欲為而遂推之之謂者也伏惟覽詩書孟子之所指念育才錫福之所以考古之君子相其君之道而忘自進自舉之罪思設官制禄之故以誘致山林逸遺之士庶天下之行道知所歸焉小子不敢自揆其常所著文輒採其可者若干首録在異巻辱賜觀焉干黷尊嚴伏地待罪愈再拜後十九日復上書二月十六日前鄉貢進士韓愈謹再拜言相公閣下上書及所著文後待命凡十有九日不得命恐懼不敢遁逃不知所為迺復敢自納於不測之誅以求畢其説而請命於左右愈聞之蹈水火者之求免於人也不惟其父兄子弟之慈愛然後呼而望之也將有介於其側者雖其所憎惡茍不至乎欲其死者則將大其聲疾呼而望其仁人之救也彼介於其側者聞其聲而見其事不惟其父兄子弟之慈愛然後徃而全之也雖有所憎惡茍不至乎欲其死者則將狂奔盡氣濡手足燋毛髪救之而不辭也若是者何哉其勢誠急而其情誠可悲也愈之强學力行有年矣其愚不惟道之險夷行且不息以蹈於窮餓之水火其旣危且亟矣大其聲而疾呼矣閣下其亦聞而見之矣其將徃而全之歟抑將安而不救之歟有來言於閣下者曰有觀溺於水而􅅡於火者有可救之道而終莫之救也閣下且以為仁人乎哉不然若愈者亦君子之所宜動心者也或謂愈曰子言則然矣宰相則知子矣如時不可何愈竊謂之不知言者誠其才能不足當吾相之舉耳若所謂時者固在上位者為之耳非天之所為也前五六年時宰相薦聞尚有自布衣蒙抽擢者與今豈異時哉且今節度觀察使及防禦營田諸小使等尚得自舉判官無間於已仕未仕者况在宰相吾君所尊敬者而曰不可乎古之進人者或取於盜或舉於管庫今布衣雖賤猶足以方於此情隘辭蹙不知所裁亦惟少垂憐察焉愈再拜後二十九日復上書三月十六日前鄉貢進士韓愈謹再拜言相公閣下愈聞周公之為輔相其急於見賢也方一食三吐其哺方一沐三握其髪當是時天下之賢才皆已舉用奸邪讒佞欺負之徒皆已除去四海皆已無虞九夷八蠻之在荒服之外者皆已賔貢天災時變昆蟲草木之妖皆已銷息天下之所謂禮樂刑政教化之具皆已修理風俗皆已敦厚動植之物風雨霜露之所霑被者皆已得宜休徴嘉瑞麟鳯龜龍之屬皆已備至而周公以聖人之才慿叔父之親其所輔理承化之功又盡章章如是其所求進見之士豈復有賢於周公者哉不惟不賢於周公而已豈復有賢於時百執事者哉豈復有所計議能補於周公之化者哉然而周公求之如此其急惟恐耳目有所不聞見思慮有所未及以負成王託周公之意以不得於天下之心如周公之心設使其時輔理承化之功未盡章章如是而非聖人之才而無叔父之親則將不暇食與沐矣豈特吐哺握髪為勤而止哉惟其如是故于今頌成王之德而稱周公之功不衰今閣下為輔相亦近耳天下之賢才豈盡舉用奸邪讒佞欺負之徒豈盡除去四海豈盡無虞九夷八蠻之在荒服之外者豈盡賔貢天災時變昆蟲草木之妖豈盡銷息天下之所謂禮樂刑政教化之具豈盡修理風俗豈盡敦厚動植之物風雨霜露之所霑被者豈盡得宜休徴嘉瑞麟鳯龜龍之屬豈盡備至其所求進見之士雖不足以希望盛德至比於百執事豈盡出其下哉其所稱説豈盡無所補哉今雖不能如周公吐哺握髪亦宜引而進之察其所以而去就之不宜黙黙而已也愈之待命四十餘日矣書再上而志不得通足三及門而閽人辭焉惟其昬愚不知逃遁故復有周公之説焉閣下其亦察之古之士三月不仕則相弔故出疆必載質然所以重於自進者以其於周不可則去之於魯於魯不可則去之於齊於齊不可則去之宋之鄭之秦之楚也今天下一君四海一國捨平此則夷狄矣去父母之邦矣故士之行道者不得於朝則山林而已矣山林者士之所獨善自養而不憂天下者之所能安也如有憂天下之心則不能矣故愈每自進而不知愧焉書亟上足數及門而不知止焉寧獨如此而已惴惴焉惟恐不得出大賢之門下是懼亦惟少垂察焉黷冒威尊惶恐無已愈再拜唐文粹巻八十七欽定四庫全書唐文粹巻八十八宋姚鉉編
