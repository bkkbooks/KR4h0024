front:
  text: 古調歌篇七
  hash: sha256:1b7ecc8aea77bba6c37472408ca35b84d135919402564913a67d7471ad2ace4f
body:
  text: 寺觀十一始除尚書郎别善福精舍韋應物寄閻防劉眘虛題鶴林寺薛據題破山寺後禪院常建琅邪山寺韋應物簡寂觀西澗瀑布下作五老峯贈隱者姚係石門墨山有禪堂道觀天下絶境張説題思禪寺獨孤及仙遊寺有龍潭穴弄玉祠李華遊棲霞寺顧况廟杜四四皓廟元稹魚山神女歌詞二首王維古杜元稹邊塞三虜患張陵代北州老翁答張謂遼西崔顥畫圖六王處士草堂壁畫衡霍諸山劉長卿題劉相公三湘圖郎士元觀于舍人壁畫山水王季友題遐上人古松歌朱灣畫竹歌白居易觀李湊所畫羙人障子劉長卿古器物五石鼔歌韓愈古劒歌郭元振磨鏡篇劉禹錫贈友人古鏡朱晝圑扇歌劉禹錫樂器七彈琴劉希戩江上琴興常建聽蜀僧彈琴李白奉和張舍人閣中直夜思聞雅琴因書事吕温聽彈風入松贈楊補闕王昌齡金陵聽韓侍御吹笛李白武昌老人説笛歌劉禹錫草木十一題老張松樹宋之問古栢行杜甫修竹篇陳子昻種竹元稹竹徑偶作權徳輿露青竹鞭歌顧况暑日題道邊樹王轂井上桐陸龜蒙石上籐岑參兎絲元稹春草謡顧况禽鳥昆蟲十王兵馬使二角鷹杜甫觀放白鷹李白飛鳶操劉禹錫百舌吟鸚鵡詞蘇郁鴛鴦篇陳子昻子規啼韋應物鶗鴂吟劉禹錫春蟬元稹江上蛟子韋楚老道路二戯題闗門岑參門前路陸龜䝉始除尚書郎别善福精舍韋應物簡略非世器委身同草木道遥精舍君飲水自為足累日曾一櫛對書常懶讀社臘會髙年山水恣遊曯明世方選士中朝懸羙祿除書忽到門冠帶便拘束愧忝郎署迹謬䝉君子録俯仰垂華纓飄飄翔輕轂行將親愛别戀此西澗曲逺峯照夕川夏雨生衆緑迅風飄野路迥首不遑宿明晨下烟闕白雲在幽谷寄閻防時在終南山豐徳寺讀書劉眘虛青瞑南山色君與緇錫隣深路入古寺落花随暮春紛紛對寂寞往往落衣巾松色空照水輕聲時有人晚心復南望山逺情獨親應以脩徃業亦唯此立身深林度空夜烟月資清真莫嘆文明日彌年從隠淪題鶴林寺薛據道門隠形聲向背臨法橋松覆山殿冷花藏溪路遥珊珊寶幡挂燄燄明燈燒遲日半空谷春風連上朝少慿水木興暫忝身心調願謝携手客兹山禪侣饒題破山寺後禪院常建清晨入古寺初日照髙林竹徑通幽處禪房花木深山光悦鳥性潭影空人心萬籟此都寂但餘鍾磬音琅邪山寺受命恤人隠兹遊久未忘鳴騶響幽澗前旌耀崇崗青冥臺砌寒緑縟草木香填壑隮花界疊石構雲房經制隨巖轉繚繞豈定方新泉洩隂壁髙蘿蔭緑塘攀林一棲心飲水得清涼還歸坐郡閣但見山蒼蒼簡寂觀西澗瀑布下作淙流絶壁㪚虚烟翠澗深巖際松風起飄飄灑塵襟窺蘿玩猿鳥解組傲園林茶菓邀真侣觴酌洽同心曠嵗懐兹賞春行始重尋聊將横吹笛一冩山水音五老峯太明觀贈隠者姚係雲觀此山北與君携手稀林端涉横水洞口入斜暉乍覺鸞鶴邇忽為烟霧飛故人清和客黙會琴心㣲丹術幸可授青龍當未歸悠悠平生意此日復相會石門墨山二山相連有禪堂道觀天下絶境張説菌輪江上山近在華容縣常陟巴丘首天晴遥可見佳遊屢前諾芳月愆幽眷及此符守移懽言臨道便既携賞心客復有送行掾竹徑入隂窅松崖上空舊草共林一色雲與峯萬變探窺石門斷縁越沙澗轉兩山勢争雄峯巘相顧盻藥妙靈仙寳境華巖壑選清都西淵絶金地東敞宴池果接園畦風烟邇臺殿髙尋去石頂曠覽天宇徧千山紛滿目百川豁對面騎來雲風迎人去鳥聲戀長揖桃源士舉世同企羨題思禪寺上方溪口聞法鼓停撓登翠屏攀雲到金界合掌開禪扃􅉱律衆山抱空濛花雨零老僧指香樓云是不死亭眇眇千越路茫茫春草青逺山噴百谷繚繞馳東溟目極想何在境照心亦冥騞然諸根空破結如破瓶下視三界狹但聞五濁腥山中有良藥吾欲隳天形仙遊寺有龍潭宂弄玉祠捨事入樵逕雲水深谷口萬壑移晦明干峯轉前後嶷然龍潭上右勢若奔走開圻秋天光崩騰夏雷吼靈溪自兹去紆直互紛闕聴聲静復喧望色無更有冥冥翠㣲下髙殿映杉栁滴滴洞宂中懸泉響相扣昔時秦王女羽化年代久日暮松風來簫聲生左右早窺神仙籙願結芝术友安得羡門方青囊繫吾肘遊棲霞寺顧况棲霞山中子規鳥口邉血出啼不了山僧後夜初入定聞似不聞山月曉四皓廟元稹巢由昔避世堯舜不得臣伊吕雖急病湯武乃可君四賢胡為者千載名氛氲顯晦有遺跡前後疑不倫秦政虐天下黷武窮生民諸侯戰心死壯士眉亦顰張良韓儒子椎碎屬車輪遂令英雄意日夜思報秦先生相將去不復嬰世塵雲巻在孤岫龍潜為小鱗秦王轉無道諌者鼎鑊新茅焦脱衣諫先生無一言趙髙殺二世先生如不聞劉項取天下先生遊白雲海内八年戰先生全一身漢業日已定先生名亦振不得為濟世宜哉為隠淪如何一朝起屈作儲貳賔安存孝恵帝摧顇戚夫人捨大以謀細虬盤而蠖伸恵皇竟不嗣吕氏禍有因雖懐安劉志未若周與陳皆落子房術先生道何屯出處貴明白故吾今有云魚山神女歌詞二首王維迎神坎坎擊鼓魚山之下吹洞簫望極浦女巫進紛屢舞陳瑤席湛清酤風淒淒兮夜雨神之來兮不來使我心兮苦復苦送神紛進拜兮堂前目眷眷兮瓊筵來不語兮意不傳作暮雨兮愁空山悲急管思繁絃靈之駕兮儼欲旋倐雲收兮雨歇山青青兮水潺潺古社元稹古社基阯在人散社不神唯有空心樹妖狐藏魅人狐惑意顛倒臊腥不復聞丘墳變城郭花草仍荆榛良田千萬頃占作天荒田主人議芟斫怪見不敢前那言空山燒夜隨風馬奔飛聲鼓鼙震髙熖旗幟飜逡巡荆棘盡狐兎無子孫狐死魅人醒烟消壇墠存繞壇舊田地給授有等倫農收村落盛社樹新圑圓社公千萬嵗永保村中民虜患張陵今日漢家探使回蟻疊胡兵來未歇春風渭水不敢流總作六軍心上血代北州老翁答張謂負薪老翁住北州北望鄉闗生客愁自言老翁有三子兩人已向黄沙死如今小男新長成明年聞道更徴兵定知此别必零落不及相隨同死生盡將田宅借鄰伍且復伶俜去鄉土在生本求多子孫及有誰知更辛苦近傳天子尊武臣强兵直欲静胡塵安邊自合有長䇿何必流離中國人遼西崔顥燕郊芳嵗晚殘雪凍邊城四月春草合遼陽春水生胡人正牧馬漢將日徴兵露重寶刀濕沙虛金鼓鳴寒衣著已盡春服與誰成寄語洛陽使為傳邊塞情王處士草堂壁畫衡霍諸山劉長卿愛此衡霍近卷簾如何攀能令堂上客見盡湘南山青翠千萬狀飛來方丈間歸雲無處滅去鳥何時還勝事日相對主人常獨閑清隂滿四壁佳氣生重闗頗與宿心㑹看看慰愁煩題劉相公三湘圖郎士元昔别醉衡霍邇來憶南州今朝平津邸兼得瀟湘遊稍辨荆門樹依然芳杜州微明三巴峽咫尺萬里流飛鳥不知倦逺帆生暮愁涔陽指天末北渚空悠悠枕上見漁父座中常狎鷗誰言魏闕下自有東山幽觀于舍人壁畫山水王季友野人宿在人家少朝見此山謂山曉半壁仍棲嶺上雲開簾放出湖中鳥獨坐長松是阿誰再三招手起來遲于公大笑向予説小弟丹青能爾為題遐上人院壁畫古松歌朱灣石上盤古根謂言天生朽安知草木性變在畫師手隂深方丈間真趣幽且閒木文離披勢搓捽中裂空心火燒出掃成三寸五寸枝便作千年萬年物莓苔濃淡意不同一半死皮藏蠧蟲風霜未必來到此氣色杳似寒山中孤標可翫不可取能使支公道塲古畫竹歌并序白居易恊律郎蕭悦善畫竹舉世無倫蕭亦甚自秘重有終嵗求其一竿一枝而不得者知予好事忽冩一十五竿惠然見投予厚其意髙其藝無以答貺作歌以報之凡一百八十六言歌曰植物之中竹難冩古今雖畫無似者蕭郎下筆獨逼真丹青已來唯一人人畫竹身尾擁腫蕭畫莖瘦節節竦人畫竹稍死羸垂蕭畫枝活葉葉動不根而生從意生不筍而成由筆成野塘水邊碕岸側森森兩叢十五莖嬋娟不失筠粉態蕭索盡得風烟清舉頭忽見不似畫低耳静聽疑有聲西叢七莖勁而健省向天笁寺前石上見束叢八莖踈且寒憶曽湘妃廟裏雨中看幽姿逺思少人别與君相顧空長嘆蕭郎蕭郎老可惜手戰眼昏頭雪色自言便是絶筆時從今此竹猶難得觀李湊畫美人障子劉長卿愛爾含天姿丹青有殊智無間已得象象外更生意西子不可見千秋無重還空憐浣紗態猶在含毫間一笑豈易得雙蛾如有情牎風不舉袖但覺羅衣輕華堂翠幕春風來内閣金屏曙色開此中一見亂人目只疑行到雲陽臺石鼓歌韓愈張生手持石鼓文勸我試作石鼓歌少陵無人謫仙死才薄將柰石鼓何周綱陵遲四海沸宣王憤起揮天戈大開明堂受朝賀諸侯劒珮鳴相磨蒐于岐陽騁雄俊萬里禽獸皆遮蘿䥴功勒成告萬世鑿石作鼓隳嵯峨從臣才藝咸第一揀選撰刻留山阿雨淋日炙野火燎鬼物守護煩撝訶公從何處得紙本毫髪盡備無差訛詞嚴義宻讀難晚字體不類𨽻與蝌年深豈免有畫缺快劒斫斷生蛟鼉鸞翔鳯翥衆仙下珊瑚碧樹交枝柯金繩鐵索鎻紐壯古鼎躍水騰龍梭陋儒編詩不收入二雅褊迫無委蛇孔子西行不到秦掎摭星宿遺羲娥嗟予好古生苦晚對此涕淚生滂沱憶昔初䝉博士徴其年始改稱元和故人從軍在右輔為我闕度掘臼科濯冠沐浴告祭酒如此至寶存豈多氈包席裹可立致十鼓秖載數駱駞薦諸太湖比郜鼎光價豈止百倍過聖恩若許留大學諸生講解得切磋觀經鴻都尚填咽坐見舉國來奔波剜苔剔蘚露節角安置妥帖平不頗大厦深簷與盖覆經歴乆逺期無他中朝大官老於事闕肯感激徒媕娿牧童敲火牛礪角誰復著手為摩挲日消月爍就埋没六年西顧空吟哦羲之俗書趂姿媚數紙尚可慱白鵝繼周八代爭戰罷無人收拾理則那方今太平日無事柄任儒術崇丘軻安能以此上論列願借辯口如懸河石鼓之歌止於此嗚呼吾意甚蹉跎古劒歌郭元振君不見昆吾鐵冶飛炎烟紅光紫氣俱赫然良工鍛鍊凡幾年鑄得寶劒名龍泉龍泉顔色如霜雪良工咨嗟歎奇絶琉璃玉匣吐蓮花錯鏤金環生明月正逢天下無風塵幸得周防君子身精光黯黯青􅉬色文章片片緑龜鱗非直結交遊俠子亦曽親近英雄人何言中路遭棄捐零落飄淪古獄邊雖復沉埋無所用猶能夜夜氣衝天磨鏡篇劉禹錫流塵翳明鏡嵗乆看如漆門前負局生為我一磨拂萍開緑池滿暈盡金波溢白日照空心圓光走幽室山神袄氣沮野魅真形出却思未磨時瓦礫來唐突贈友人古鏡朱晝我有古時鏡初自壤陵得蛟龍猶泥蟠魑魅幸月蝕磨乆見菱闕青於監水色贈君將照心無使心受惑圑扇歌劉禹錫圑扇復圑扇奉君清暑殿秋風入庭樹從此不相見上有乗鸞女蒼蒼網蟲遍明月入懐袖别是機中練彈琴劉希戩碧山本岑寂素琴何清幽彈為風入松崖谷颯以秋庭鶴舞白雪泉魚躍洪流余欲娛世人明月難暗投感嘆未終曲涙下不可收嗚呼鍾子期零落歸山丘死而若有知魂兮從我遊江上琴興常建江上調玉琴一絃清一心泠泠七絃遍萬木澄幽隂能使江月白又令江水深始知梧桐枝可以徽黄金聽蜀僧濬彈琴李白蜀僧抱緑綺西下峨眉峯為我一揮手如聽萬壑松客心洗流水餘響入霜鍾不覺碧山暮秋雲暗幾重奉和張舍人閣中直夜思聞雅琴因書事吕温迢遞天上直寂寞丘中琴憶爾山水韻起予仁智心凝情在正始超踈滌煩襟涼生子夜後月照禁垣深逺風藹蘭氣微露清桐隂方襲緇衣慶永奉南薰吟聽彈風入松贈楊補闕王昌齡商風入我絃夜竹深有露絃悲與林寂清景不可度寥落幽居心飀颼青松樹松風吹草白溪水寒日暮聲意去復還九變待一顧空山多雨雪獨立君始悟金陵聽韓侍御吹笛李白韓公吹玉笛倜儻流英音風吹繞種山萬壑皆龍吟王子停鳯管師襄掩瑶琴餘響渡江去天涯安可尋武昌老人説笛歌劉禹錫武昌老人七十餘手把庾令相聞書自言年少學吹笛早事曹王曽賞激往年征鎮戍蘄州楚山蕭蕭笛竹秋當時買林恣搜索典却身上鳥貂裘古苔蒼蒼封老節石上孤生飽風雪商聲五音隨指發水中龍應行雲絶曽將黄鶴樓上吹一聲占盡秋江月如今老去興猶遲音韻髙低耳不知氣力已無心尚在時時一曲夢中吹題老張松樹宋之聞嵗晚東巖下周顧何悽惻日落西山隂衆草起寒色中有喬松樹使我長嘆息百尺無寸枝一生自孤直古栢行杜甫孔明廟前有老栢柯如青銅根如石霜皮溜雨四十圍黛色叅天二千尺君臣已與時際㑹樹木猶為人愛惜雲來氣接巫峽長月出寒通雪山白憶昨路遶錦亭東先主武侯同閟宫崔嵬枝榦郊原古窈窕丹青户牖空落落盤踞雖得地冥冥孤髙多烈風扶持自是神明力正直元因造化功大厦如傾要梁棟萬牛迥首丘山重不露文章世已驚未辭翦伐誰能送苦心豈免容螻蟻香葉曽經宿鸞鳯志人幽士莫怨嗟古來才大難為用與東方左史脩竹篇并序陳子昻東方公足下文章道弊五百年矣漢魏風骨晉宋莫傳然而文獻有可徴者僕嘗暇時觀齊梁間詩彩麗競繁而興寄都絶每以永嘆竊思古人常恐逶迤頽靡風雅不作以耿耿也一昨於解三處見明公詠孤桐篇骨氣端翔音情頓挫光映朗練有金石聲遂用洗心飾視發揮幽鬱不圖正始之音復覩於兹可使建安作者相視而笑解君云張茂先何敬祖東方生與其比肩僕亦以為知言也故感嘆雅製作脩竹詩一篇當有知音以傳示之龍種生南岳孤翠鬱亭亭峯頂上崇崒烟雨下微冥夜聞鼯鼠呌晝䀨泉壑聲春風正淡蕩白露已清泠哀響激金奏宻色滋玉英嵗寒霜雪苦含彩獨青青豈不厭凝冽羞比春木榮春木有盈歇此節無凋零始願比金石終古保堅貞不意伶倫子吹之學鳯鳴遂偶雲龢瑟張樂奏天庭妙嵒方千變簫韶亦九成信蒙雕斵羡常願事僊靈驅馳翠虯駕伊鬱紫鸞笙結交嬴臺女吟弄昇天行携手登白日逺遊戱赤城低昻𤣥鶴舞斷續彩雲生永隨衆仙去三山遊玉京種竹并序元稹昔樂天贈余詩云無波古井水有節秋竹竿余秋來種竹㕔下因而有懐聊書十韻昔公憐我直比之秋竹竿秋來苦相憶種竹㕔前看失地顔色改傷根枝葉殘清風猶淅淅髙節空圑團鳴蟬聒暮景跳蛙築幽欄塵土復晝夜梢雲良獨難丹丘信云逺安得臨仙壇㳂瘴冬草緑何人驚嵗寒可憐亭亭榦一一青琅玕孤鳯竟不至坐傷時節閑竹逕偶作權徳輿退朝此休沐閉户無塵氛支䇿入幽逕清風隨此君琴觴恣偃傲蘭蕙相葐蒀幽賞方自適林西烟景曛露青竹鞭歌顧况鮮于仲通正當年章仇兼瓊在蜀川約束蜀兒採馬鞭蜀兒採鞭不敢眠横截斜飛飛鳥邊繩橋夜上層崖巔頭揷白雲跨飛泉採得馬鞭長且堅浮漚丁子珠聮聮灰煑蠟指光爛然章仇兼瓊持上天上天雨露何其偏飛龍閑廐馬數千朝飲吳江夕秣燕紅塵撲轡汗濕韉師子麒麟聊比肩曲江昆明洗刷牽四蹄踏浪頭枿天蛟龍稽顙河伯䖍拓羯胡鶵脚手鮮陳閎韓幹丹青妍欲貌未貌眼欲穿金鞍玉勒錦連乾騎入桃花楊栁烟十二樓中奏管絃樓中美人奪神仙爭愛大家把此鞭祿山入闗闗破年忽見楊川北邸前秖有人還千一錢亭亭筆直無皴節磨將形相一條鐵市頭格是無人别江海錢臣不拘絏垂鞘挂影西窻缺稚子覔衣闕仰宂家僮拾薪幾抝折玉潤猶霑玉壘雪碧解似染萇𢎞血蜀帝祠邊子規咽相如橋上文君絶往年䇿馬降至尊七盤九折横劒門穆王八駿超崑崙安用冉冉孤生根聖人不貴難得貨金玉珊瑚誰買恩暑日題道邊樹王轂火輪迸焰燒長空浮埃撲面愁濛濛羸僮走馬喘不進忽逢碧樹含清風清風留我移時住滿地濃隂懶前去却嘆人無及物功不似圑圑道邊樹井上桐陸龜蒙美人傷别離汲井常待曉愁因轆轤轉驚起雙棲鳥獨立傍銀牀碧桐風嫋嫋石上藤岑參石上生孤藤弱蔓依石長不逢髙枝引未得凌空上何處堪託身為君長萬丈兎絲元稹人生莫依倚依倚事不成君看絲絲蔓依倚榛與荆荆榛易蒙宻百鳥撩亂鳴下有孤兎宂奔走亦縱横樵童斫將去柔蔓與之并翳薈生可耻束縛死無名桂樹月中出珊瑚石上生俊鶻渡海食應龍昇天行靈物本特達不復相纒縈纒縈竟何者荆棘與飛莖春草謡顧况春草不解行隨人上東城正月二月色綿綿千里萬里傷人情王兵馬使二角鷹杜甫悲臺蕭䬃石巃嵸哀闕機枒浩呼洶中有萬里之長江迥風陷日孤光動角鷹翻倒壯士臂將軍玉帳軒勇氣二鷹猛腦絛徐墜目如愁胡視天地杉雞竹兎不自惜溪虎野羊俱闢易鞲主鋒稜十二翻將軍勇鋭與之敵將軍樹勲起安西崑崙虞泉入馬蹄白羽曽肉三狻猊敢決豈不與之齊荆南芮公得將軍亦如角鷹下翔雲惡鳥飛飛啄金屋安得爾輩開其羣驅逐六合梟鸞分觀放白鷹李白八月邊風髙胡鷹白錦毛孤飛一片雪百里見秋毫飛鳶操劉禹錫鳶飛沓沓青雲裏鳶鳴蕭蕭風四起旗尾飄揚勢漸髙箭頭砉劃聲相似長空悠悠霽日懸六翮不動凝飛烟游鵾翔鴈出其下慶雲清景相迥旋忽聞饑鳥噪相聚瞥下雲中爭腐鼠騰音礪吻相喧呼仰天大嚇疑鵷鶵畏人避犬投髙處俛啄無聲猶屢顧青鳥自愛玉山禾仙禽徒貴華亭露樸樕危巢向暮時陪鰓飽腹蹲枮枝遊童挾彈一麾肘臆碎羽分人不悲天生衆禽各有類威鳯文章在仁義鷹隼儀形螻蟻心雖能淚天何足貴百舌吟曉星寥落春雲低初聞百舌間闗啼花枝滿空迷處所摇動繁英墜紅雨笙篁百囀音韻多黄鸝吞聲燕無語東方朝日遲遲升迎風弄影如自矜散聲不盡又飛去何許相逢緑楊路緜蠻宛轉似娛人一心百舌何紛紜􅋳顔俠少停歌聽墮珥妖姬和睡聞可憐光景何時盡誰能低迥避鷹隼廷尉張羅自不闗潘郎挾彈無情損天生羽族爾何徴舌端萬變乘春暉南方朱鳥一朝見索漠無言蒿下飛鸚鵡詞蘇郁莫把金籠閉鸚鵡箇箇分明解人語忽然更向君前語三十六宫愁幾許鴛鴦篇陳子昻飛飛鴛鴦鳥舉翼相蔽虧俱來渌潭裏共向白雲涯音容相眷戀羽翮兩逶迤蘋萍戱春渚霜霰遶寒池浦沙連岸淨汀樹拂潭垂年年此遊翫嵗嵗來追隨鳯凰起丹穴獨向梧桐枝鴻鴈來紫塞空憶稻粱肥烏啼倦永夕鶴鳴傷别離豈若此雙禽飛膰不異林刷尾清江浦交頸紫山岑文章負奇色和鳴多好音聞有鴛鴦綺復有鴛鴦衾持為美人贈朂此故交心子規啼韋應物髙林滴露夏夜清南山子規啼一聲鄰家孀婦抱兒泣我獨展轉何為情鶗鴂吟劉禹錫朝陽有鳴鳯不聞千萬祀鶗鴂催衆芳畏聞先入耳秋風白露晞從是爾啼時如何上春日唧唧滿庭飛春蟬元稹我自東歸日厭苦春鳩聲作詩憐化工不遣春蟬生及來商山道山深氣不平春秋兩相似蟲豸百種鳴風松不成韻蜩螗沸如羮豈無朝陽鳯羞與微物爭安得天上雨奔渾河漢傾蕩滌反時氣然後好晴明江上蚊子韋楚老摇狹翅亞紅腹江邊夜起如雲哭請問貪婪一㸃心腐肉填腹幾多足越女如花住江曲寒娥夜夜凝雙緑任君撩亂錦窻中十幅輕綃圍夜玉戱題闗門岑參來亦一布衣去亦一布衣羞見闗城吏還從舊路歸門前路陸龜蒙門前向城路一直復一曲曲去日中還直行日暮宿何必日中還曲塗荆棘間唐文粹巻十七上欽定四庫全書唐文粹巻十七下宋姚鉉編詩十二總五十六首古調歌篇八月明河四月生句劉猛把酒問月李白月蝕詩盧仝明河篇宋之問風雨露雪六賀雨詩白居易洛陽清明日雨霽李正封詠露山雪釋皎然秋風引劉禹錫竹牕聞風寄苖發司空曙李益江海泉水十觀海獨孤及西陵口觀海薛據題玉潭獨孤及及第後過楊子江施肩吾責漢水詞李善夷迎潮送潮詞二首陸龜蒙引泉詩賦得三峽流泉歌李季蘭明冰篇冨嘉謨宫禁七殿前曲王昌齡西施篇王維三閣詞四首劉禹錫霓裳羽衣曲李肱神仙二十九遊仙詩十六首道士吳筠上元夫人詩李白王子喬宋之問玉真仙人詞李白夢太白峯西常建苦篁調笑引李賀少室山韋鍊師昇仙歌皇甫冉宿青牛谷梁鍊師仙居楊衡𤣥都壇歌杜甫寄全椒山中道士韋應物洗心道士司馬退之齋心王昌齡寄菖蒲張籍金璫玉佩歌顧況月生句劉猛月生十五前日望光彩圓月滿十五後日畏光彩瘦不見野花色一樽成暗酒匣中苔背銅光短不遍空不惜補明月慙無此良工把酒問月故人賈淳令余問之李白青天有月來幾時我今停盃一問之人攀明月不可得月行却與人相隨皎如飛鏡臨丹闕緑烟滅盡清輝發但見宵從海上來寧知曉向雲間沒白兎搗藥秋復春姮娥孤棲誰與鄰今人不見古時月今月曽經照古人古人今人若流水共看明月皆如此唯願當歌對酒時月光長照金樽裏月蝕詩盧仝新天子即位五年嵗次庚寅斗柄揷子律調黄鍾森森萬木夜殭立寒氣贔屓頑無風爛銀盤從海底出出來照我草屋東天色紺滑凝不流氷光交貫寒曈曨初疑白蓮花浮出龍王宫八月十五夜比並不可雙此時怪事發有物吞食來輪中輪如壯士斧斫壊桂似雪山風拉摧百練鏡照見膽平地埋寒灰火龍珠飛出腦却入蚌蛤胎搥環破璧眼看盡當天一搭如煤炲磨蹤滅跡須臾間便似萬古不可開不料至神物有此大狼狽星如撒沙出爭頭事光大奴婢炷燈看揜鳥感切菼如玳瑁今夜吐燄如長虹孔隙千道射户外玉川子涕泗下中庭獨自行念此日月者太隂太陽精皇天要識物日月乃化生走天汲汲勞四體與天作眼行光明此眼不自保天公行道何由行吾見隂陽家有説望日蝕月月光滅朔月掩日日光缺兩眼不相攻此説吾不容又孔子師老子云五色令人目盲吾恐天似人好色則䘮明幸且非春時萬物不嬌榮青山破瓦色渌水氷崢嶸花枯無女艶鳥死沉歌聲頑冬何所好偏使一目盲又聞古老説蝕月蝦蟇精徑圓千里入汝腹如此癡騃阿誰生可從海窟來便解縁清冥恐是眶睫閒揞寒所化成黄帝有二目帝舜重瞳明二帝懸四目四海生光輝吾不遇二帝滉漭不可知何故瞳子闕坐使蟲豸欺長嗟白兎搗靈藥恰似有意防姦非藥成滿闕不中度委任白兎夫何為憶昔堯為天十日燒九州金礫水銀流玉熠丹砂燋六合烘為窰堯心増百憂天見堯心憂勃然發怒决洪流立擬沃殺九日妖天髙日走沃不及但見萬國赤子戢戢生魚頭此時九御導九日爭持節幡麾幢旒駕車六九五十四頭蛟螭虯掣電九火輈汝若蝕開齟齬輪御轡執索相爬鉤推蕩轟渴入汝喉紅鱗燄鳥燒口快翎鬛倒側聲醆鄒撑膓拄腹礧礧如山丘自可飽死更不偷不獨填饑坑亦解堯心憂恨汝時當食埋頭㩎腦不肯食不當食張唇哆觜食不休食天之眼養逆命安得上帝請汝劉嗚呼人養虎被虎齧天媚蟇被蟇瞎乃知恩非類一一自作孽吾見患眼人必索良工訣想天不異人愛眼固應一安得常娥氏來習扁鵲術手操舂喉戈去此睛上物初既猶朦朧既乆如抹漆但恐功業成便此不吐出玉川子又涕泗下心禱再拜額榻沙土中地上蟣虱臣仝告訴帝天皇臣心有鐵一寸可刳妖蟇癡膓皇天不為臣立梯磴臣血肉身無由飛上天揚天光封詞付與小心風颰排閶闔入紫宫宻邇玉几前劈拆奏上臣仝頑愚胷敢死横干天甚長東方蒼龍角揷㦸尾捭風雷心開明堂統領三百六十鱗蟲坐治東方宫月蝕不救援安用東方龍南方火鳥赤潑血項長尾短飛䟦刺頭戴弁冠髙達枿月蝕鳥宫十二度鳥為居停主人不覺察貪向何人家行赤口毒舌毒蟲頭上喫却月不啄殺虛貶鬼眼赤䆕音抉䆷鳥罪不可雪西方攫虎立掎掎音几斧為牙鑿為齒偷犧牲食封豕大蟇一臠固當軟羙見似不見是何道理爪牙根天不念天天若准擬錯准擬北方寒龜被蛇縛藏頭入殻如入獄蛇筋束緊束破殻寒龜夏鼈一種味且當臛其肉一底板没信處唯堪支牀脚不中鑚灼與天下卜嵗星主福徳官爵奉東秦忍使黔婁生覆尸無衣巾天失眼不弔嵗星胡其仁熒惑矍鑠公執法大不中月明無罪過不糾蝕月蟲年年十月朝太微支盧謫罰何災凶土星與土性相背反養福徳生禍害到人頭上死破敗今夜月蝕安可㑹太白真將軍怒激鋒鋩生􅁪州陣斬酈定進項骨脆甚春蔓菁天唯兩眼失一眼將軍何處行天兵辰星任廷尉天律自主持人命在盆底固應樂見天肓時天若不肯信試喚臯陶鬼一問而今三台文章宫作上天紀綱環天二十八宿磊落尚書郎整頓排五行劒握他人將一四太陽側一四天市旁操斧代大匠兩手不怕傷弧矢引滿反射人天狼呀啄明煌煌癡牛與騃女不肯勤農桑徒勞含滛思旦夕遥相望蚩尤簸旗弄旬始搥天鼓鳴璫琅枉矢龍蛇行眉目森森張天狗下䑛地血流何滂滂譎險萬萬黨構架何可當眛目舋成就害我光明王請留北斗一星相比極指揮萬國懸中央此外盡拂除沙磧如山岡贖我父母光當時􅁪星没殞雨如抨漿似天㑹事發叱喝誅姦狂何故中道廢自遺今日殃善善又惡惡郭公所以亡願天神聖心無信他人忠玉川子詞訖風色𦂳格格近月墨暗邊有似動劒㦸須臾癡蟇精兩吻自決坼初露半个璧漸吐滿輪魄衆星盡原赦一蟇獨誅磔腹肚忽脱落依舊挂穹碧光彩未蘇來慘淡一片白奈何萬里光受此吞吐厄再得見天眼感荷天地力或問玉川子孔子修春秋二百四十年月蝕盡不收今子咄咄詞頗合孔意不玉川子笑答或請聽逗遛孔子父母魯諱魯不諱周書外書大惡故月蝕不見收余命唐天口食唐土唐禮過三唐樂過五小猶不説大不可數災沴無有小大瘉安引衰周研覈可否日分晝月分夜辨寒暑一主刑一主徳政乃舉孰謂人面上一月偏可去願天完兩目照下萬方土更不瞽萬萬古明河篇宋之問八月涼風天氣晶萬里無雲河漢明昬見南樓清且淺曉落西山縱復横洛陽城闕天中起長河夜夜千門裏複道連􅀈共蔽虧畫堂瓊户特相宜雲母帳前初汎濫水精簾外轉逶迤倬彼昭回如練白復出東城接南陌南陌征人去不歸誰家今夜擣寒衣鴛鴦機上踈螢度烏鵲橋邊一鴈飛鴈飛螢度愁難歇坐見明河漸微没已能舒巻任浮雲不惜光輝讓流月明河可望不可親願得乘槎一問津更將織女支機石還訪成都賣卜人賀雨詩白居易皇帝嗣寶歴元和三年冬自冬及春莫不雨旱爞爞上心念下民懼嵗成災凶遂下罪已詔殷勤告萬邦帝曰予一人繼天承祖宗憂勤不遑寧夙夜心忡忡元年誅劉闢一舉靖巴卭二年戮李錡不戰安江東顧惟眇眇徳遽有巍巍功或者天降沴無乃儆予躬上思答天戒下思致時雍莫如率其身慈和與儉恭乃命罷進獻乃命賑饑窮宥死降五刑責已寛三農宫女出宣徽廐馬減飛龍庶政靡不舉皆出自宸衷奔騰道路人傴僂田野翁懽呼相告報感泣涕霑胷順人人心悦先天天意從詔下纔七日和氣生沖融凝為油油雲散作習習風晝夜三日雨淒淒復濛濛萬心春熙熙百糓青芃芃人變愁為喜嵗易儉為豐乃知王者心憂樂與衆同皇天及后土所感無不通冠珮何鏘鏘將相及王公蹈舞呼萬嵗列賀明庭中小臣誠愚陋職忝金鑾宫稽首再三拜一言獻天聰君以明為聖臣以直為忠敢賀有其始亦願有其終洛陽清明日雨霽李正封曉日清明天夜來嵩少雨千門尚烟火九陌無塵土酒醁河橋春漏閑宫殿午遊人戀芳草半犯嚴城鼓詠露霏霏靈液重雲表無聲落霑樹急𤣥蟬灑池淒皓鶴流塵清逺陌飛月澄髙閣宵潤玉堂簾曙寒金井索佳人比珠淚坐感紅綃薄山雪釋皎然夕陽在西峯疊翠縈殘雪狂風巻絮迥驚猿攀玉折何意山中人誤報山花發秋風引劉禹錫何處秋風至蕭蕭送鴈羣今朝入庭樹孤客最先聞竹窻聞風寄苖發司空曙李益微風驚暮坐臨牗思悠哉開門復動竹疑是故人來時滴枝上露稍霑堦下苔幸當一入幌為拂緑琴埃觀海獨孤及北登渤海島迥首秦東門誰尸造物功鑿此天池源澒洞吞百谷周流無四垠廓然混茫際望見天地根白日自中吐扶桑如可捫迢遥蓬萊峯想像金臺存秦帝昔經此登臨異飛翻揚旌百神㑹望日羣山奔徐福竟何成羡門徒空言唯見石橋足千年潮水痕西陵口觀海薛據浙江漫湯湯近海勢彌廣在昔胚混凝融為百川長地形失端倪天色潛滉瀁東南際萬里極目逺無象山影乍浮沉潮波忽往來孤帆或不見棹歌猶響像日暮長風起客心空振蕩浦口霞未收潭心月初上林嶼幾邅迥亭臯時偃仰嵗晏訪蓬瀛真遊非外奬題玉潭獨孤及碧玉徒强名冰壺雞比徳唯當寂照心可並􅔿淪色及第後過楊子江施肩吾憶昔將貢年抱愁此江邊魚龍互閃爍黒浪髙於天今日步春草復來經此道江神也世情為我風色好責漢水辭并序李善夷春秋僖公四年齊桓公合諸侯之師盟于召陵責楚之苞茅不入問昭王南征而不復楚子使屈完對曰貢之不入寡君之罪也敢不供給昭王南征之不復君其問諸水濱按昭王南征至漢舟人膠其舟王遂溺死杜預曰當時漢水未屬楚杜之注其為謬哉且楚實殷之始封楚苦縣瀬鄉在漢水東北六百餘里則漢水於西周之際豈未屬楚乎又詩云撻彼殷武奮伐荆楚深入其阻裒荆之旅鄭𤣥注云深入方城之阻也方城今在漢水北三百里豈昭王時未屬楚乎屈完以齊桓所問之大不敢他對但請自問於水濵之人言我不之知也漢實屬楚乆矣夫山林川澤天子祀之必有其典楚人膠其舩而禍其君神不能福神之罪也余過漢見其波濤滉瀁而責其水詞曰漢之廣兮風波四起雖有風波不如蹄涔之水蹄涔之水不為下國而傾天子漢之深兮其隄莫量雖云莫量不如行潦之汪行潦之汪不為下國而溺天王漢之美者曰魴吾雖饑不食其魴恐汚吾之饑膓迎潮送潮詞二首并序陸龜蒙余耕稼所在松江南旁田廬門外有溝通浦淑而朝夕之潮至矣天弗雨則軋而留之用以滌濯灌溉及物之功甚鉅其羸壯遲速繫望晦盈虛也用之則順而進捨之則黙以退有類乎君子之道翫而感之作迎潮送潮詞二首聊寄聲於騷人之末江霜嚴兮楓葉丹潮聲髙兮墟落寒鷗巢卑兮漁箔短逺岸没兮光爛爛潮之徳兮無際既充其大兮又充其細宻幽人兮款柴門寂寞流連兮依稀舊痕濡餘澤槁兮潮之恩不尸其功兮歸于混元右迎潮潮西來兮又東下日梁中流兮紅灑灑汀葭蒼兮水蓼枯風騷牢兮愁烟孤大幾望兮微將翳晦搜瀛溶兮斂然而退愛長波兮數數一幅巾兮無纓可濯帆生塵兮棹有衣悵潮之還兮吾猶未歸右送潮引泉詩睦州龍興觀老君院作上嗣位六載吾宗刺桐川余來拜旌㦸詔下之明年是時春三月繞郭花蟬聮嵐盤百萬髻上揷黄金鈿授以道士館置榻于東偏滿院聲碧樹空堂形老仙本性樂凝淡及來更虛𤣥焚香禮真像盥手披靈編新安山角角烏龍獨巉然嵨􅀈除非浄晴日不見蒼崖巔上有拏雲峯下有噴壑泉泉分數十𣲖落處皆崢潺寒聲入爛醉䀨破西窻眠支笻起獨尋秖在墻東邊呼僮具畚鍤立鑿莓苔穿灇漴一派墮練帶横斜牽亂石抛落落寒流響濺濺狂怒七里瀨縮到踈楹前跳光潑半散湧沬飛㳬圓勢束三峽挂㵼危孤磴懸曽聞瑶池溜亦灌朱草田鳧伯弄翠蘂鸞鶵無丹烟凌風捩桂拖隔霧馳犀舩况當𤣥元家嘗著道徳篇上善可比水斯文叅五千精靈若在此肯惡微波傳不擬爭滴瀝還應㑹淪漣出門後飛箭合勢浮青天必有學真子鹿冠秋鶴顔如能輔余志日使䟽其源賦得三峽流泉歌李季蘭妾家本住巫山雲巫山流水常自聞玉琴奏出轉寥夐直似當時夢中聽三峽迢迢幾千里一時流入幽闈裏巨石崩崖指下生飛波逺浪絃中起初疑噴怒含雷風復似嗚咽流不通迥湍曲瀬意將盡時復滴瀝平沙中憶昔阮公為此曲能使仲容聽不足一彈既畢還一彈願比流泉鎮相續明冰篇富嘉謨北陸蒼茫河海凝南山䦨干晝夜冰素彩峩峩明月升深山窮谷不自見安知採斵備嘉薦隂房固沍掩寒扇陽春二月朝始暾春光潭沲度千門明冰時出御至尊彤庭赫赫九儀備􅆎玉煌煌千宫事明冰畢嵗周在位憶昔沙朔寒風漲崑崙長河冰始壯漫汙崚嶒積亭障邕邕鳴鴈江上來禁苑池臺冰復開摇春涵緑映樓臺豳歌七月王風始明氷藏用昭物軌四時不􅑯千萬祀殿前曲王昌齡貴人糚梳殿前催香風吹入殿後來仗引笙歌大宛馬白蓮花發照池臺西施篇王維豔色天下重西施寜乆微朝為越溪女暮作吳宫妃賤日豈殊衆貴來方悟稀邀人傅香粉不自著羅衣君寵益嬌態君憐無是非當時浣紗伴莫得同車歸寄謝鄰家子效顰安可希三閣詞吳音四首劉禹錫貴人三閣上日晏未梳頭不應有根事嬌甚却成愁珠箔曲瓊鈎子細見楊州北兵那得渡浪語聲悠悠沉香帖閣柱金縷畫門楣迥首降幡下已見黍離離三人出眢井一身登檻車朱門謾臨水不得見鱸魚霓裳羽衣曲李肱開元太平日萬國賀豐嵗梨園厭舊曲玉座流新製鳯管遞參差霞衣競摇曵宴罷水殿空輦餘春草細蓬壺事已乆仙樂功無替詎肯聽遺音聖明知善繼遊仙十六首道士吳筠啓冊觀往載摇懐考今情終古已寂寂舉世何營營悟彼衆仙妙超然含至精凝神契沖𤣥化服凌太清心同宇宙廣體合雲霞輕翔風吹羽蓋慶霄拂霓旌龍駕朝紫微後天保令名豈如寰中士軒冕矜蹔榮鸞鳯棲瑶林鵰鶚集平楚飲啄本殊好翺翔終異所吾方遺諠囂立節慕髙舉解兹區中戀結彼霄外侣誰謂天路遐感通自無阻愍俗從遷謝尋仙去淪没三元有真人與我生道骨凌晨吸丹景入夜飲黄月百闗彌調暢方寸益清越棲神合虛無洞覽周恍惚不覺隨玉皇焚香詣金闕西龜初定籙東華已校名三官無遺譴七祖昇雲軿體妙塵累隔心微𤣥化并一朝出天地億載猶童嬰使我齊浩劫蕭蕭宴玉清怡神在靈府皎皎含清澄仙經不吾欺輕舉信有徴疇昔希道念而今果天矜豈非隂功者乃致白日昇焉用過洞府吾其越朱陵髙真誠寥邈道合不我遺孰謂姑射逺神人可同嬉結駕從之遊飄飄出天垂不理人自化神凝物無疵因知至精感足以和四時八海廣無際三山髙不極金臺羅中天羽客恣遊息霞液朝可飲虹芝晩甚食嘯歌自忘心騰舉寧假翼保夀同三光安能幾千億將過太帝宫蹔詣扶桑處真童已相迓為我清宿霧滄海寧洪濤羲和止奔馭五雲結層閣八景動飛輿青霞正可挹丹砂時一遇留我宴玉堂歸軒不令遽欲趨洞陽界試覽丹極表赤帝躍火龍炎官控朱鳥導我昇絳府長驅出天杪陽靈赫重暉四達何皎皎為爾流飄風羣生遂無夭予因詣金母飛蓋超西極遂入素中天停輪太濛側若華拂流影不使白日匿傾曦復亭午六合無暝色道化隨感遷此理誰能測九龍何琬琬載我昇雲綱臨睨懐舊國風塵混蒼茫依依逺人寰去去邇帝鄉上超星辰紀下視日月光倐已過太微天居煥煌煌停驂太儀側整服金闕前肅肅承上帝鏘鏘㑹羣仙鴻鑪發靈香廣廡張鈞天玉醴洽中座霞膏充四筵良期無終極俛仰移億年峻朗妙門闢澄微真覽通瓊林九霞上金閣三天中飛虯躍慶雲翔鶴摶靈風鬱彼玉京㑹仙期六合同予昇至陽源欲憇明霞館飄飄瓊輪舉曄曄金景散結虛成萬有髙妙咸可翫玉山鬱嵯峨琅海杳無岸蹔賞過千椿遐齡誰復筭招擕紫陽友合宴玉清臺排景羽衣振浮空雲駕來靈旛七曜動瓊障九光開鳯舞龍璈奏虯軒殊未迥髙昇紫極上宴此𤣥都岑玉蘂散奇香瓊珂流雅音靈風生太漠習習吹人襟體混希微廣神凝空洞