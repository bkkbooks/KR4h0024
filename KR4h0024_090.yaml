  text: 重校正唐文粹卷第九十
  hash: sha256:510095ec6424a448ca8c823a87416dd3501e2aa52d52196238b9759e4d502c25
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0024_SBCK_090-1a}
body:
  text: 吳興姚鉉纂書十二命附總九首切磋五别令狐拾遺書李商隱答崔立之書韓愈重與陸賔虞書劉軻與陶進士書李商隱答侯高第二書李翺規誨三寄從弟正辭書李翺與外孫崔氏二孩書李華寄諸弟砥石命附舒元輿諭一諭江陵耆老書劉蛻别令狐綯捨遺書李商隱子直足下行日巳定昨幸得少展寫足下去後憮然不怡今早垂致葛衣書辭委曲惻惻無巳自昔非有故舊援拔卒然於稠人中相望見其表得所以類君子者一日相從百年見肺肝爾來足下仕益達僕困不動固不能有常合而有常離足下觀人與物共此天地耳錯行雜居蟄蟄哉不幸天能恣物之生而不能與物慨然量其欲牙齒者恨不得翅羽角者又恨不得牙齒此意人與物略同耳有所趨故不能無爭有所爭故不能不於同中而有各異耳足下觀此丗其同異如何哉兒冠出門父翁不知其枉正女笄上車夫人不保其貞汚此於親親不能無異勢也親者尚爾則不親者惡望其無隙哉故近丗交道幾喪欲盡足下與僕於天獨何稟當此丗生而不同此丗每一會面一分散至於慨然相執手嚬然相戚決然相泣者豈於此丗有他事哉惜此丗之人率不能如吾之所樂而又甚懼吾之徒孑立寡處而與此丗者蹄尾紛然蛆吾之白擯置譏誹襲出不意使後日有希吾者且懲吾困而不能堅其守乃捨吾而之他耳足下知與此丗者居常紿於其黨何語哉必曰吾惡市道嗚呼此輩真手搔鼻皻而喉噦人之灼痕為癩者市道何肯如此輩邪今一大賈坐墆貨中人人往須之甲得若干曰其贏若干丙曰吾索之乙得若干曰其贏若干戊曰吾索之既與之則欲其蕃不願其亡失口舌拜父母出妻子伏臘相見有贄男女嫁娶有問不幸喪死有致饋葬有臨送弔是何長者大人哉他日甲乙俱入之不欺則又愈得其所欲矣回環出入如此是終身欲其蕃不願其亡失口舌拜父母益嚴出妻子益敬伏臘相見贄益厚男女嫁娶問益豐不幸喪死饋贈臨送弔哭情益悲是又何長者大人哉唯是於信誓有大欺漫然後罵而絶之擊而逐之訖身而勿與通也故一市人率少於大賈而不信者此豈可與此丗交者等邪今日赤肝腦相憐明日衆相唾辱皆自其時之與勢耳時之不在勢之移去雖百仁義我百忠信我我尚不顧矣豈不顧巳而又唾之足下果為市道何如哉今人娶婦入門母姑必祝之曰善相冝則祝曰蕃息後曰生女子貯之幽房密寢四鄰不得識兄弟以時見欲其好不顧性命即一日可嫁去是冝擇何如男子屬之邪今山東大姓家非能違摘天性而不如此至其羔鶩在門有不問賢不肖健病而但論財貨恣求取為事當其為女子時誰不恨及為母婦則亦然彼父子男女天性豈有大於此者邪今尚如此況他舍外人燕生越養而相望相救抵死不相販賣哉細而繹之真令人不愛此丗而欲狂走遠揚耳果不知足下與僕之守是邪非邪首陽之二百豈蘄盟津之八百吾又何悔焉千百年下生人之權不在冨貴而在直筆者得有此人足下與僕當有所用意其他復何云云但當誓不羞市道而又不為忘其素恨之母婦耳商隱再拜答崔立之書韓愈斯立足下僕見險不能止動不得時顚頓狼狽失其所操持困不知變以至辱於再三君子小人之所憫笑天下之所背而馳者也足下猶復以為可教貶損道德乃至手筆以問之扳援古昔辭義髙遠且觀足下之於故舊之道得矣雖僕亦固望於吾子不敢望於他人者耳然尚有似不相曉者非故欲發余乎不然何子不以丈夫期我也故不能默默輒復自明僕始年十六七時未知人事讀聖人之書以為人之仕者皆為人耳非有利乎已也及年二十時苦家貧衣食不足謀於所親然後知仕之不惟為人耳及來京師見有舉進士者人多貴之僕誠樂之就求其術或出禮部所試詩賦䇿等以相示僕以為可無學而能因詣州縣求舉有司好惡出於其心四舉而後有成亦未即得仕聞吏部有以博學宏辭選者人尤謂之才且得美仕就求其術或出所試文章亦禮部之類私怪其故猶樂其名因又詣州府求舉凡二試於吏部一既得之而又黜於中書雖不得仕人或謂之能焉退自取所試讀之乃類於俳優者之辭顔忸怩而心不寧者數月既巳為之則欲有成書所謂恥過作非者也因復求舉亦無幸焉乃復自疑以為所試與得之者不同其程度及得觀之余亦無甚愧焉夫所謂博學者豈今之所謂者乎夫所謂宏辭者豈今之所謂者乎設使古之豪傑之士若屈原孟軻司馬遷相如楊雄之徒進於是選必知其懷慙乃不自進而巳耳設使與夫今之善進者競於蒙昧之中僕固知其辱焉然彼五子者且使生於今之丗其道雖不顯於天下其自負如何哉肯與夫斗筲者決得失於一夫之目而為之憂樂哉故凡僕之汲汲於進者其小得蓋欲以具裘葛養窮孤其大得蓋欲以同吾之所樂於人耳其他可否自計巳熟誠不待人而後知今足下乃復比之獻玉者以為必俟工人之剖然后知於天下雖兩刖足不以為疾且無使勍者再尅誠足下相勉之意厚也然仕進者豈舍此而無門哉足下謂我必待是而後進者非尤相悉之辭也僕之玉固未嘗獻而足固未嘗刖足下無為我戚戚也方今天下風俗尚有未及於古者邊境尚有被甲執兵者主上不得怡而宰相以為憂僕雖不賢亦且濳究其得失致之乎吾相薦之乎吾君上希卿大夫之位下猶取一障而乘之若都不可得猶將耕於寬間之野釣於寂寞之濵求國家之遺事考賢人哲士之終始作唐之一經垂之於無窮誅姦諛於既死發潛德之幽光二者將必有一可足下以為僕之玉凡幾獻而足凡幾刖也又所謂勍者果誰哉再剋之刑信如何也士固信於知巳微足下無以發吾之狂言愈再拜重與陸賔虞書劉軻别韶卿巳逾時雖遊處宴賞不接然豫心未嘗一日去韶卿也且京洛相去八百里足以絶韶卿車轍馬迹矧又自洛南而東涉淮浮江沿洄數千里安得不悒悒西望邪比豫在輦下五六年始不知韶卿及知韶卿兩心始親而形骸巳相遠茍未能忘情忍不酸鼻出涕為吾友之思邪前陸掾來得韶卿書知韶卿欲屈道以從人求京兆解送知韶卿道在與否固不在首解於京兆也愚嘗謂與遊者道韶卿膚未雞髮未鶴然其心甚老脫一旦脅肩低眉與諸子爭甲乙於縣官豈愚所謂甚老者邪韶卿曾不是思也愚所謂首出者謂四科首顔閔三十丗家首太伯七十列傳首伯夷其為首出豈不多邪韶卿不首於是而欲首於何哉僕又聞京兆等試試官知與否脫有知韶卿人聞烏有不心躬默禮靈冠統以待之邪夫然亦何害小伸於知巳耳不然則東國絀臣西山餓夫微仲尼何傷為展季伯夷矣韶卿獨不見既得者邪豈盡為顔子太伯伯夷然幸韶卿熟思之無以豫不食太牢為不知味者也前月中兩寄狀計必有一達者過重陽當決䇿東去計韶卿無以豫身遠而不豫思也勉矣自愛䇿名春官後當會我於真山與陶進士書李商隱去一月多故不常在故屢辱吾子之至皆不覩昨又垂示東岡記等數篇不惟其辭彩奧大不冝為冗慢無勢者所窺見且又厚𥿄謹字如貢大諸侯卿士及前達有文章積學者何其禮甚厚而所與之甚下邪始僕小時得劉氏六説讀之常得其語曰是非繫於褒貶不繫於賞罰禮樂繫於有道不繫於有司密記之蓋嘗於春秋法度聖人綱紀久羡懷藏不敢薄賤聮綴比次手書口詠非惟求以為已而巳亦祈以為後來隨行者之所師稟巳而被鄉曲所薦入來京師又亦思前輩逹者固巳有是人矣有則吾將依之繫鞋出門寂寞往返其間數年卒無所得私怪之而比有相親者曰子之書冝貢于某氏某氏可以為子之依歸矣即走往貢之出其書乃復有置之而不暇讀者又有默而視之不暇朗讀者又有始朗讀而中有失字壞句不見本義者進不敢問退不能解默默巳巳不復咨歎故自大和七年後雖尚應舉除吉凶書及人慿倩作箋啓銘表之外不復作文文尚不復作況復能學人行卷邪時獨令狐輔闕最相厚歲歲為寫出舊文納貢院既得引試會故人夏口主舉人時素重令狐賢明一日見之于朝揖曰八郎之友誰最善綯直進曰李商隱者三道而退亦不為薦託之辭故夏口與及第然此時實於文章懈退不復細意經營述作乃命合為夏口門人之一數耳爾後兩應科目者又以應舉時與一裴生者善復與其挽拽不得巳而入耳前年乃為吏部上之中書歸自驚笑又復懊恨周李二學士以大法加我夫所謂博學宏辭者豈容易哉天地之災變盡解矣人事之興廢盡究矣皇王之道盡識矣聖賢之文盡知矣而又下及蟲豸草木鬼神精魅一物巳上莫不開會此其可以當博學宏辭者邪恐猶未也設他日或朝廷或持權衡大臣宰相問一事詰一物小若毛甲而時脫有盡不能知者則號博學宏辭者當其罪矣私自恐懼憂若囚械後幸有中書長者曰此人不堪抹去之乃大快樂曰此後不能知東西左右亦不畏矣去年入南場作判比於江淮選人正得不憂長名放耳尋復啓與曹主求尉于虢實以太夫人年高樂近地有山水者而又其家窮弟妹細纍喜得賤薪菜處相養活耳始至官以活獄不合人意輒退去將遂脫衣置笏永夷農牧會今太守憐之催去復任徑使不為升斗汲汲疲瘁低儽耳然至於文字章句愈怗息不敢驚張常自呪願得時人曰此物不識字此物不知書是我生獲忠肅之諡也而吾子反殷勤如此者豈不知邪豈有意邪不知則可有意則巳虛矣然所以拳拳而不能忘者正以往年愛華山之為山而有三得始其卑者朝高者復得其揭然無附著而又得其近而能遠思欲窮搜極討灑豁襟抱始以往來畨畨不遂其願間者得李生於華郵為我指引巗谷列視生植僅得其半又得謝生於雲臺觀暮留止宿旦相與去愈復記熟後又得吾子于邑中至其所不至者於華之山無恨矣三人力邪今李生巳得第而又為老貴人從事雲臺生亦顯然有聞於諸公間吾子之文粲然成就如是我不負華之山而華之山亦將不負吾子之三人矣以是思得聚會話既往探歷之勝至於切磋善惡分擘進趨僕此丗固不待學奴婢下人指誓神佛而後巳耳吾子何所用意邪明日東去既不得面寓書惘惘九月三日弘農尉李某頓首答侯高第二書李翺足下復書來會與一二友生飲酒甚樂故不果以時報三讀足下書感歎不能休非足下之愛我甚且欲吾身在而吾道光明也則何能開難出之辭如此之無憂乎前書所以不受足下之説而復闢之者將以明吾道也吾之道非一家之道是古聖人所由之道者也吾之道塞則君子之道消矣吾之道明則堯舜禹湯文王孔子之道未絶於地矣前書若與足下混然同辭是宫商之一其聲音也道何由而明哉吾故拒足下之辭知足下必將憤豫而復其辭也足下再三教我適時以行道所謂時也者乃仁義之時乎將沈浮之時乎苟仁且義則吾之道何所屈焉爾如順沈浮之時則是乘流望風而高下焉茍如此雖足下之見我且不識矣況天下乎不修吾道而取容焉其志亦不遐矣故君子非仁與義則無所為也如有一朝之患古君子則不患也吾之道學孔子者也蓋孔子畏于匡圍于蒲伐樹於桓魋逐於魯絶糧于陳蔡之師夫孔子豈不知屈伸之道邪賢不肖在我者也貴與冨貧與賤道之行否則有命焉君子正已而須之爾雖人不能取其容焉故孔子謂子路子貢曰詩云匪兕匪虎率彼曠野吾道非邪吾何為于此子路對曰意者吾未仁且智也而人之不信也與子曰有是乎使仁者而必信安有伯夷叔齊使智者必行安有王子比干子貢對曰夫子之道至大故天下莫能容盍少眨夫子之道子曰良農能稼而不能為穡良工能巧而不能為順君子能修其道綱而紀之統而理之而不能為容爾不修爾道而求為容賜而志不遠矣謂顔回如謂由也賜也顔淵對曰夫子之道至大故天下莫能容雖然夫子推而行之不容何病不容然後見君子夫道之不修也是吾醜也道既巳大修而不用是有國者之醜也不容何病不容然後見君子孔子蓋歎之也以孔子其門人三千其聖德如彼之至也而知孔子者獨顔回爾其他皆學焉而不能到也然則僕之道天下人安能信而行邪足下之言曰西伯孔子何等人也皆以柔氣汙辭同用明夷也以避禍患斯人豈浮丗邪人乎夫西伯聖人也薑里之拘僅不免焉孔子聖人之大者也其屈厄如前所陳惡在其能取容於丗乎故曰危行言遜所以遠害也其道則爾其能遠之與否而必容焉則吾不敢知也非吾獨爾孔子亦不知也僕之道窮則仁義而安之者也如用焉則推而傳之于天下者也何獨天下哉將後丗之人大有得於吾之功者爾天之生我也亦必有意矣將欲愚生民之視聽乎則吾將病而死尚何能伸其道也如欲生民有所聞乎則吾何敢辭也然則吾道之行與否皆運也吾不能自知也天下人安能害於我哉足下又曰吾子夷齊之道也如僕向者所陳亦足以免矣故不復有所説若韓孟與吾子之於我親故知我者也茍異口同辭皆如足下所説是僕於天下衆多之人而未有一知巳也安能合於吾心乎吾非不信子云云者也信子則於吾道不光矣欲默默則道無所傳云爾子之道子冝自行之者也勿以誨我寄從弟正辭書李翺知汝京兆府取解不得如其所懷念勿在意凡人之窮達所遇亦各有時爾何獨至于賢丈夫而反無時哉此非吾徒之所憂也其所憂者何畏吾之道未能到于古之人爾其心既自以為到且無謬則吾何往而不得所樂何必與夫時俗之人同得失憂喜而動於心乎借如用汝之所知分為十焉用其學聖人之道而和其心使餘者以與時世進退於俯仰如可求也則不啻富且貴矣如非吾力也雖盡用其十秖益勞其心爾安能有所得乎汝勿信人號文章為一藝夫所謂一藝者乃時丗所好之文或有盛名於近代者是也其能到古人者則仁義之辭也惡得以一藝而名之哉仲尼孟軻殁千餘年矣吾不及見其人吾能知其聖且賢者以吾讀其辭而得之者也後來者不可期安知其讀吾辭也而不知吾心之所存乎亦未可誣也夫性於仁義者未見其無文也有文而能到者吾未見其不力于仁義也由仁義而後文者性也由文而後仁義者習也由誠明之必相依爾貴與冨在外者也吾不能知其有無也非吾求而能至者也吾何愛而屑屑於其間哉仁義與文章生乎內者也吾知其有也而能求而充之者也何懼而不為哉汝雖性過於人然而未能浩浩於心吾故書其所懷以張汝且以樂言吾道之云爾與外孫崔氏二孩書李華八月十五日翁告崔氏之子兩孩省吾出身入仕行四十年晚有汝母巳養汝二人矣吾逮事裴氏鄭氏崔氏諸姑于氏堂姑皆賢明淑哲為內外師範意欲與汝言之裴氏始恩慈見吾一善未嘗不流涕祝吾成立見吾伯仲書題誨責踈略話及舊事云無此例吾伯仲書題比今日中外書題其間踈密不啻百十也吾小時猶省長幼每日兩時櫛盥起居尊行三時侍食飲食訖然後敢食猶責不如禮今者諸子日出高眠爭覽盤器何曾有此儀可為歎息丗教如此何得不亂婦人亦要讀書解文字知今古情狀事父母舅姑然可無咎詩序云哀窈窕思賢才而無傷善之心焉是關睢之義也易曰主中饋無攸遂婦人但當主酒食待賔客而巳其餘無自專之禮詩云將翺將翔佩玉瓊琚此奉舅姑助祭祀之儀也又曰將翺將翔弋鳧與鴈此主酒食待賔客之儀也禮經所載汝其記之又婦人將嫁三月教於公宫祖廟既毀教於宗室嫁則廟見不見廟者不得為婦今此禮凌夷人從茍且婦人尊於丈夫羣隂制於太陽丗教淪替一至于此可為墮淚汝等當學讀詩禮論語孝經此最為要也吾小時南市帽行見貂帽多帷帽少當時舊人巳歎風俗中年至西京市帽行乃無帷帽貂帽亦無男子衫袖蒙鼻婦人領巾覆頭向有帷帽羃離必為瓦石所及此乃婦人為丈夫之象丈夫為婦人之飾顚之倒之莫甚于此觸類而長不可勝言舉其一端告及汝耳勿謂幼小不遵訓誡所見所聞頽風敗俗故申明舊事不能一一也阿馬來説汝誦得數十篇詩賦麗麗巳能承順十五姊顔色十七伯極鍾念吾旅病乍聞甚慰意凡人不患尊行不慈訓患身不能承順耳汝承十五姊仁慈十七伯訓誘又質性柔順當不扶自直吾所告者括羽汝耳不次翁告崔氏二子省貽諸弟砥石命舒元輿昔歲吾行吳江上得亭長所貽劒心知其不莽鹵匣藏愛重未曽褻視今年秋在秦無何發開見慘翳積蝕僅成死鐡意慙身將利器而使其不光明之若此常緘求淬磨之心於胸中數月後因過歧山下得片石如渌水色長不滿尺闊厚半之試以手磨理甚膩文甚密吾意其異石遂攜入城問於切磋工工以為可為砥吾遂取劒發之初數日浮埃薄落未見快意意工者相紿復就問之工曰此石至細故不能速利堅鐡但積漸發之未一月當見真貌歸如其言果覩變化蒼慘剝落若青蛇退鱗光徑一水泳涵星斗持之切金錢三十枚皆無聲而斷愈始得之利數十百倍吾因歎以為金剛首五材及為工人鑄為器復得首出利物以剛質鋩利茍暫不砥礪尚與鐡無以異況質柔鋩鈍而又不能砥礪當化為糞土耳又安得與死鐡倫齒邪以此益知人之生於代茍不病盲聾音啞則五常之性全性全則豺狼燕雀亦云異矣而或公然忘棄礪名砥行之道反用狂言放情為事蒙蒙外埃積成垢惡日不覺寤以至於戕正性賊天理生前為造化剩物殁復與灰土俱委此豈不為辜負日月之光景邪吾常覩汝輩趣嚮爾誠全得天性者況夙能承順嚴訓皆解甘心服食古聖人道知其必非雕缺道義自埋於偷薄之倫者然吾自干名在京城兔魄巳十九晦矣知爾輩懼旨甘不繼困於薪粟日丐於他人之門吾聞此益悲此身使爾輩承順供養至此亦益憂爾輩為窮寠而斯須忘其節為茍得眩惑而容易徇於人為投刺牽役而造次惰其業日夜憶念心力全耗且欲書此為戒又慮爾輩年未甚長成不深諭解今會鄂騎歸去遂置石於書函中乃筆用砥之功以寓往意欲爾輩定持剛質晝夜淬礪使塵埃不得間髮而入為吾守固窮之節愼臨財之茍積習隸之業上不貽庭闈憂次不貽手足病下不貽心意愧欲三者不貽秖在爾砥之而巳不關他人若砥之否也則嚮之所謂切金涵星之用又甚瑣屑安足以諭之然吾固欲爾輩常置砥於左右造次顚沛必於是思之亦古人韋弦銘座之義也因書為砥石命以欲爾輩兼刻辭於其側曰劒之鍔砥之而光人之名砥之而揚砥乎砥乎為吾之師乎仲兮季兮無墜吾命乎諭江陵耆老書劉蛻太原王生嘗移耆老書以江陵故楚也子胥親逐其君臣夷其墳墓且楚人之所冝怨也而江陵反為之廟丗饗其讎謂耆老而忘其君父也吾以為不然楚人之性僄悍大能復其仇讎其後自懷王入武關楚人怨秦不忘干戈況其人之性能忘胥之能破其國家而事之乎且令江陵之人牽牛羊而祀其廟者將祈年榖而獲凶荒禱疾病而得死亡者乎如厚其餼而虐其報則江陵知胥之不可祠而不祠矣若果祈年榖而得豐穰禱疾病而獲康疆有餼而尋其報則破人之國而居其土辱人之君而受其饗遇一食而自忘楚人之殺父兄則胥自為無勇也何獨江陵之人而忘習讎乎吾以為其廟申包胥之廟也包胥有復楚之功年代􅐛逺楚人以子胥嘗封諸申故不謂包胥耳不然則子胥何為饗人之食而江陵何為事讎人之神乎耆老得書速易其版曰申胥之廟無使人神皆愧耳重校唐文粹卷第九十嘉靖甲申歲太學生姑蘇徐焴文明刻于家孰
