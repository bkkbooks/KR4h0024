front:
  text: 題傳後二
  hash: sha256:3ead4ea1d1f3af292abb0c757ddfd6b13eb45d7286665cae136ca067d8ce269b
body:
  text: 題叔孫通傳後皮日休題東漢傳後司空圖假物讀傳附四毛穎傳韓愈讀韓愈所作毛穎傳栁宗元下邳侯革華傳韓愈容成侯傳司空圖忠烈三李紳傳沈亞之楊烈婦傳李翺竇烈女傳司空圖隠逸二江湖散人傳陸龜䝉負苓者傳王績竒才一李賀小傳李商隠雜伎二梓人傳栁宗元郭槖駝傳妖惑一李赤傳栁宗元題叔孫通傳後皮日休古之所謂禮不相襲樂不相㳂者何哉非乎彼聖人此聖人也此不相襲者角其功利之深淺爾不相㳂者明文武之優劣爾故三王迭作五帝更制夏殷文武遞述其禮昭昭然若兩曜争朗百川注瀆者矣然由周公刋之仲尼正之以周公之才之美謂後世無其人乎乃有仲尼仲尼之後迄今望其道如顔閔文如㳺夏者鮮矣况聖人哉是後之制禮作樂冝取周書孔策為標準也漢氏受命禮壊文毁時無聖人苟措其儀立其禮不㳂襲於聖制者妄也夫國之大祭不過乎郊祀宗廟也漢之既命其郊止於五畤之祀者禮不曰兆五帝之郊者乎止於昭靈之園者禮不曰天子七廟者乎而叔孫生不為之正郊祀立宗廟去秦畤之非制議昭靈之非禮汲汲於朝會之儀俾漢天子為髙祖其身不得郊見饗不及七廟臆生其制吻刋厥式非不標準於聖人乎將以漢新去水火方弭兵械難為改作乎將不明壇墠之位禘祫之儀者乎若然者湯伐桀周伐紂其制可知也鳴呼不明於古制樂通於時變君子不由也其叔孫生之謂也題東漢傳後司空圖儒衣而漢弁也人望而畏之是威其德也必有操戈待之者矣君子救時也亦必相時度力以致其用不可則静而鎮之以道訓服苟厲鋒氣果於擊搏道不能化力不能制是將濟時重困故元禮之徒終致鉤黨之禍至於張儉又不能引決區區之身雖殘壊天下何裨於吾道哉陳太丘之容衆郭有道之誘人其意未嘗沮物而彼亦不厚其毒利害可見矣且猛摯不革其暴麟不足以為仁也惡鳥不息其鳴鳳不足以為瑞也况彼二三子甘逞於權豪呶呶以至大亂惟據正而能屈已者庶可與權毛穎傳韓愈毛穎者中山人也其先明眎佐禹治東方土養萬方有功因封於夘地死為十二神嘗曰吾子孫神明之後不可與物同當吐而生已而果然明眎八世孫䨲世傳當殷時居中山得神仙之術能匿光使物竊姮娥騎蟾蜍入月其後代遂隠不仕云居東郭者曰㕙狡而善走與韓盧争能盧不及盧怒與宋鵲謀而殺之醢其肉秦始皇時䝉將軍恬南伐楚次中山將大獵以懼楚召左庶長與軍尉以連山筮之得天與人文之兆筮者賀曰今日之獲不角不牙衣褐之徒缺口而長鬚八竅而趺居獨取其髦簡牘是資天下其同書秦其遂兼諸侯乎遂獵圍毛氏之族拔其豪載頴而歸獻俘于章臺宫聚其族而加束縛焉秦皇帝使恬賜之湯沐而封諸管城號管城子日見親寵任事穎為人强記而便敏自結繩之代以及秦事無不纂録陰陽卜筮占相醫方族氏山經地志字書圖畫九流百家天人之書及浮圖老子外國之説皆所詳悉又通於當代之務官府簿書市井貨錢注記惟上所使自秦皇帝及太子扶蘇胡亥丞相斯中車府令髙下及國人無不愛重又善随人意正直邪曲巧拙一随其人雖後見廢棄終黙不洩惟不喜武士然見請亦時往累拜中書令與上益狎上嘗呼為中書君上親决事以衡石自程雖宫人不得立左右獨穎與執燭者嘗侍上休方罷穎與絳人陳𤣥𢎞農陶泓及㑹稽褚先生友善相推致其出處必偕上召頴三人者不待詔輙俱往上未嘗怪焉後因進見上將有任使拂拭之因免冠謝上見其髪秃又所摹畫不能稱上意上嘻笑曰中書君老而秃不任吾用吾嘗謂君中書君今不中書耶對曰臣所謂盡心者焉因不復召歸封邑終于管城其子孫甚多散處中國夷狄皆冒管氏惟居中山者能繼父祖業太史公曰毛氏有兩族其一姬姓文王之子封於毛所謂魯衛毛􅅨者也戰國時有毛公毛遂獨中山之族不知其本所出子孫最蕃昌春秋之成見絶於孔子而非其罪及蒙將軍拔中山之毫始皇封之管城世遂有名而姬姓之毛無聞穎始以俘見幸任使秦之滅諸侯穎亦有功賞不詶勞以老見疎秦真少恩哉讀韓愈所作毛穎傳栁宗元自吾居夷不與中州人通書有來南者時言韓愈為毛穎傳不能舉其辭而獨大笑以為怪而吾久不克見楊子誨之來始持其書索而讀之若捕龍虵搏虎豹急與之角而力不敢暇信韓子之怪於文也世之摸擬竄竊取青嫓白肥皮厚肉柔筋脆骨而以為辭者之讀之也其大笑固宜且世人笑之也不以其俳乎且俳又非聖人之所棄者詩曰善戲謔兮不為虐兮太史公書有滑稽列傳皆取乎有益於世者也故學者終日討論荅問呻吟習復應對進退掬溜播灑則罷憊而廢亂故有息焉㳺焉之説不學操縵不能安絃有所拘者有所縱也太羮𤣥酒體節之薦味之至者而又設以竒異小蟲水草櫨棃橘柚苦醎酸辛雖蜇吻裂鼻縮舌澀齒而咸有篤好之者文王之菖蒲葅屈到之芰曾晳之羊棗然後盡天下之竒味以足於口獨文異乎韓子之為也亦將施焉而不為虐歟息焉㳺焉而有所縱歟盡六藝之竒味以足於口歟而不若是則韓之詞若壅大川焉其必決而放諸陸不可以不陳也且凡古今是非六藝百家大細穿穴用而不遺者毛穎之功也韓子窮古書好斯文嘉穎之能盡其意故奮而為之傳以發其鬱積而學者得之勵其有益於世歟是其言也固與異世者語而貪常嗜瑣者猶呫呫然動其喙彼亦勞甚矣乎下邳侯革華傳韓愈下邳侯革華者其先隴西人也三十六代祖守犍為黄帝時以力召拜大司農以其闢土有功又知稼穡之艱難遷輕車都尉子孫相繼至周武王時徙居桃林冠冕遂絶其後人思其濟世之才因復其位而加任使焉華父犨生五年襲先祖爵禄仕至上輕車都尉華母世居長樂有乳哺之恩越王勾踐時嘗侍宴姑蘇臺詩所謂有覺徳行者也犨因引重至太行山力不任事遂死於轅下上嗟悼命大宰申屠公執刀而解之其支𣲖分離散其他處華長子也上念其父劬勞而死於王事封華為下邳侯詔將作大匠治之華為性堅勁屈强難以直禦匠以其膏潤之然後去其豪族而加裁割焉㑹太原人金十奴與新鄭人斛斯生相逢薦華於五木大夫是後稍稍得成其名上嘉之遂釋褐賜墨綬華嘗曰吾辛勤久今方成名得處上左右足矣及獻之果然華為人善能履道别威儀進止趨蹌一随人意上將駕出逰畋獵馳騁毬擊射御及禮神祭祀交賔接賢未嘗不召華偕往伏事上久之因病忽開口論議泄露宻㫖上繇是疎之詔將作大匠治之又命其友金十奴等補過之尋獻於上上雖納有泥塗賤處方召使之餘並不得預焉頃之上見其顔色顦顇又衰憊失度上咨嗟曰下邳侯老而憊不任吾事今棄子于市不復召子矣華無息其繼者族人焉贊曰革氏之先本出皮姓軒轅時蒼頡觀鳥跡制文字以其始於皮而至於華故從革焉漢書功臣表有煮棗侯革末者即其後也初華本自胡而來趙武靈王時見重是後子孫盛于中國容成侯傳司空圖容成侯金炯者本蜀郡嚴道人附山而居同族中多見搜採其先因秦時調發詣尚方輸作世苦之乃誡子孫易其服色必以清厲自進後徙居上洛會郡中盧生范生皆傳修鍊之術委質相資因砥磨以致用上聞而器之召見嘉其鑒局且謂毫髪無隠屢顧之厯試臺閣號為明達挾奸邪以事上者見之膽慄輒自披露至於婦人女子媚惑之態亦不能掩也其察察如此是雖造物無私圓方不礙然疵陋者終惡忌積毁於上以為背面不相副炯亦自病於狹中不能以塵垢混其跡也竟被擯斥後亟有月蝕之變時宫中漏下數刻上臨軒念其規益復召俾其道所以然者扣之響應不疲上異焉命以容成侯奉朝請而宗人派别於廣陵者炫飾求售陷為輕薄于權戚中或撫然自喜則狎玩不厭至或被以組繡葢便其俯仰取容雖穿鼻服役亦無恥耳既稍進炯又鄙其為人廼復以讒廢歸老于家太史公曰炯之逺祖當軒轅時以化服以祝融氏得薦於上能强記天象地形草木蟲介萬殊之状皆視諸掌握葢其術亦規摹於洪範耳物怪遇之莫不惴息自廢後益親幸上晨興必先至則與冠冕者偕進號為夀光先生不名也子孫稍下衰然流寓太原者始尚𤣥亦以精鍊見重觀炯雖任用兢兢惟恐失墜不善晦匿果為邪醜所嫉幾不能免􅀈大雅君子既明且哲以保其身難矣哉李紳傳沈亞之李紳者本趙人徙家吳中元和元年節度使宗臣錡在吳紳以進士及第還過謁錡錡舍之與宴逰晝夜錡能其才留執書記明年錡以驕聞有詔召稱疾不欲行賔客莫敢言紳為言不入不得去會留後使王澹専職為錡具行錡蓄怒始發於澹陰教士食之初士卒當勞賜者皆會府中受賜與中貴人臨視次至中軍士得賜者俱不散齊呼曰澹逆可食既盡即執中貴人脅曰爾寧遂衆欲寧飽衆腹曰請所欲曰為我衆書報天子幸得復錡位貴人懼偽諾之召書記以疏紳聞之亡入錡内匿衆索不得及中貴人至促錡行錡益怒急召紳授紙筆令操書上牘紳坐錡前佯惴怖戰管摇紙下札皆不能字輒塗去累數十行又如是幾盡紙錡怒罵曰是何敢如是汝欲下從而先人耶對曰紳不敢惡生直以少養長儒家未嘗聞金革鳴今暴及此且不知精神在所誠得死生畏苦前倖耳錡復制以兵刃令易紙復然傍一人為錡言曰聞有許侍御縱者尤能軍中書紳不足與等請召縱縱至錡鋭意自舉授詞操書無不可錡意遂幽紳於潤之外獄兵散乃出縱竟逆死贊曰李錡之賊江東也其抗節者有李雲李紳雲則山中劉騰為書以大之蹟未及稱且紳職錡肘腋下舉動顧盻有一不誠則支體立盡衆手而紳亦不顧而曉然自效如此可謂臨大節而不可奪者耶楊烈婦傳李翺建中四年李希烈陷汴州既又將盜陳州分其兵數千人抵項城縣葢將掠其玉帛俘纍其男女以會于陳州縣令李偘不知所為其妻楊氏曰君縣令也冦至當守力不足死焉職也君如逃則誰守偘曰兵與財皆無將若何楊氏曰如不守縣為賊所得矣倉廩皆其積也府庫皆其財也百姓皆其戰士也國家何有奪賊之財而食其食重賞以合死士其必濟於是召胥吏百姓於庭楊氏言曰縣令誠主也雖然歲滿罷去非若吏人百姓然吏人百姓邑人也墳墓在焉冝相與致死以守其節忍失其貞而為賊之人耶衆皆泣許之乃徇曰以瓦石中賊者與之千金以刀矢兵刃之物中賊者與之萬錢得數百人偘率之以乗城楊氏親為之㸑以食之無長少必周而均偘使與賊言曰項城父老義不為賊矣皆悉力守死得吾城不足以威不如亟去徒失利無為也賊皆笑有蜚箭集于偘偘傷而歸楊氏責之曰君不在則人誰肯固矣與其死于城不猶愈于家乎偘遂忍之復登陴項城小邑無長㦸勁弩髙城深溝之固賊氣吞焉率其徒將從超城而下有以弱弓射者中其帥堕馬死其帥希烈之婿也賊失勢相與散走項城之人無傷焉刺史上偘之功詔遷絳州太平縣令楊氏至兹猶存婦人女子之奉父母舅姑盡恭順和於娣姒於卑㓜有慈愛而能不失其貞者則賢矣辯行陣明攻守勇烈之道此固公卿大臣之所難厥自兵興朝廷注意寵旌守禦之臣慿堅城深池之險儲蓄山積貨財自若冠胄服甲弓矢而馳者不知幾人其勇不能戰其智不能守其忠不能以死棄其城而走者有矣彼何人哉若楊氏者婦人也孔子曰仁者必有勇楊氏當之矣贊曰凡人之情皆謂後來者不及於古之賢者自古亦稀獨後代耶及其有之與古人不殊也若髙愍女楊烈婦者雖古烈女其何加焉予懼其行事堙滅而不傳故皆序之將告于史官竇烈婦傳司空圖河南竇氏朝邑令畢某之妻也四年秋同民叛其帥李瑭瑭走蒲令挈其孥竄望仙里既夕盜作乃仇家也猝令壊其首志必死之令妻蔽捍泣且拜益急乃持其袂重傷猶不置令竊視竟得逃匿而免里人列狀於府賚之酒帛毉亦馳乗而至幾死者數矣逮踰月方克偕全愚寓居渭濵得備聞於里中梁生生言操史牘者苟當和平紀王庭琛瑞之美誠幸矣然傑異之操化導宗族里閭俾男必為貞夫女必為烈婦是有國有家皆賴之豈徒炫於視聴哉愚以為知言乃著其事贊曰蓄千金之貲雖云憂患尚有不安其室者况蹈危觸難何以相保哉且婦人女子扣盎足以駭之而白刃之下獨不顧死以免其夫是果能一於所從而不悔者也豈化漸之有所自也吾知為臣為妾者必繼有其人免貽史氏之愧矣江湖散人傳陸龜蒙散人者散誕之人也心散意散形散神散既無羈限為時之怪民束於禮樂者外之曰此散人也散人不知恥從而稱之人或笑曰彼病子之散而目之子反以為其號何也散人曰天地大者也在太虚中一物耳勞乎覆載勞乎運行差之晷度寒暑錯亂望斯須之散其可得耶水土之散稽有用乎水之散為雨為露為霜雪水之局為潴洳為潢為汚土之散封之可崇宂之可深生可以藝死可以入土之局塤不可以為埞甓不可以為盂得非散能通變化局不能耶退若不散守名之筌進若不散執時之權筌可守耶權可執耶遂為散歌散傳以志其散負苓者傳王績昔者文中子講道於白牛之溪弟子捧書北面環堂成列講罷程生退省于松下語及周易薛収嘆曰不及伏羲氏乎何詞之多也俄而有負苓者皤皤然委擔而息曰吾子何歎也薛生曰叟何為者而徵吾嘆負苓者曰夫麗朱者丹附墨者黑葢漸而得之也今吾子所服者道而猶有嘆是六府五藏不能無受也吾是以問薛生曰收聞之師易者道之藴也伏羲畫卦而文王繫之不逮省文矣以為文王病也吾是以嘆負苓者曰文王焉病伏羲氏病甚者也昔者伏羲氏之未畫卦也三才其不立乎四序其不行乎百物其不生乎萬象其不森乎何營營乎而費畫也自伏羲氏洩道之宻漏神之幾分張太和磔裂元氣使天下之智者詭道逆出曰我善言象而識物情陰陽相磨逺近相取作為剛柔同異之説以駭人志於是知者不知而大朴散矣則伏羲氏始兆亂者安得羸嘆而嗟文王負其苓而行追而問之居與姓名不荅文中子聞之曰隠者也李賀小傳李商隠京兆杜牧為李長吉集序状長吉之竒甚盡世傳之長吉姊嫁王氏者語長吉之事尤備長吉細瘦通眉長指爪能苦吟疾書最先為昌黎韓愈所知所與㳺者王叅元楊敬之權璩崔植為宻每旦日出與諸公㳺未嘗得題然後為詩如他人思量牽合以及程限為意恒從小奚奴騎距驢背一古破錦囊遇有所得即書投囊中及暮歸太夫人使婢受囊出之見所書多輒曰是兒要當嘔出心始已耳上燈與食長吉從婢取書妍墨疊紙足成之投他囊中非大醉及弔喪日率如此過亦不復省王楊輩時復來探取冩去長吉往往獨騎往還京雒所至或時有著随棄之故沈子明家所餘四巻而已長吉将死時忽晝見一緋衣人駕赤虯持一版書若太古篆或霹靂石文者云當召長吉長吉了不能讀歘下榻叩頭言阿㜷長吉學語時呼太夫人云老且病賀不願去緋衣人笑曰帝成白玉樓立召君為記天上差樂不苦也長吉獨泣邉人盡見之少之長吉氣絶常所居窓中㪍㪍有煙氣聞行車嘒管之聲太夫人急止人哭待之如炊五斗黍許時長吉竟死王氏姊非能造作謂長吉者實所見如此嗚呼天蒼蒼而髙也上果有帝耶帝果有苑囿宫室觀閣之玩耶苟信然則天之髙邈帝之尊嚴亦宜有人物文彩愈此世者何獨番番於長吉而使其不夀耶噫又豈世所謂才而竒者不獨地上少耶天上亦不多耶長吉生二十七年位不過奉禮太常中當時人亦多排擯毁斥之又豈才而竒者帝獨重之而人反不重耶又豈人見㑹勝帝耶梓人傳栁宗元裴封叔之第在光德里有梓人款其門願傭隙宇而處焉所職尋引規矩繩墨家不居磨斵之器問其能曰吾善度材視棟宇之制髙深圓方短長之宜吾指使而羣工役焉捨我衆莫能就一宇故食於官府吾受禄三倍作於私家吾収其直太半焉他日入其室其牀闕足而不能理曰将求他工余甚笑之謂其無能而貪禄嗜貨者其後京兆尹将飾署余往過焉委羣材會衆工咸執斧斤刀鋸皆環立嚮之梓人左持引右執杖而中處焉量棟宇之任視木之能舉揮其杖曰斧彼執斧者奔而右顧而指曰鋸彼執鋸者趨而左俄而斤者斵刀者削皆視其色俟其言莫敢自斷其不勝任者怒而退之亦莫敢愠焉畫宮於堵盈尺而曲盡其制計其毫釐而搆大厦無進退焉既成書於上棟曰某月某月某日某建則其姓字也凡執用之工不在列余圜視大駭然後知其術之工大矣繼而嘆曰彼将舍其手藝専其心智而能知體要者歟吾聞勞心者役人勞力者役於人彼其勞心者歟能者用而智者謀彼其智者歟是足為佐天子相天下法矣物莫近乎此也彼為天下者本於人其執役者為徒􅝗為鄉師里胥其上為下士又其上為中士為上士又其上為大夫為卿為公離而為六職判而為百役外薄四海有方伯連帥郡有守邑有宰皆有佐政其下有力者胥吏又其下皆有嗇夫版尹以就役焉猶衆工之各有執伎以食力也彼佐天子相天下者舉而加焉指而使焉調其紀綱而盈縮焉齊其法制而整頓焉猶梓人之有規矩繩墨以定制也擇天下之士使稱其職居天下之人使安其業視都知野視野知國視國知天下其逺近細大可以據其圖而究焉猶梓人畫宫於堵而績于成也能者進而由之使無所徳不能者退而休之亦莫敢愠不􅃷能不矜名不親小勞不侵衆官日與天下之英才論其大經猶梓人之善運衆工而不伐藝也夫然後相道得而萬國理矣相道既得萬國既理天下舉首而望曰相之功也後之人循跡而慕曰彼相之才也士或談殷周之理者曰伊傅周召其百執事之勞勤而不得紀焉猶梓人自名其功而執用者不列也大哉相乎通是道者所謂相而已矣其不知體要者反此以恪勤為公以簿書為尊􅃷能矜名親小勞侵衆官竊取六職百役之事听听於府庭而遺其大者逺者焉所謂不通是道者也猶梓人而不知繩墨之曲直規矩之圓方尋引之短長姑奪衆工之斧斤刀鋸以佐其藝又不能備其工以至敗績用而無所成也不亦謬歟或曰彼主為室者倘或發其私智牽制梓人之慮奪其其世守而道謀是用雖不能成功豈其罪邪亦在任之而已余曰不然夫繩墨誠陳規矩誠設髙者不可抑而下也狹者不可張而廣也由我則固不由我則圯彼将樂去固而就圯也則巻其術黙其智悠爾而去不屈吾道是誠良梓人耳其或嗜其貨利忍而不能捨也喪其制量屈而不能守也棟橈屋壊則曰非我罪也可乎哉可乎哉余謂梓人之道類於相故書而藏之梓人葢古之審曲面勢者今謂之都料匠云余所遇者楊氏潛其名郭橐駞傳郭橐駞不知始自何名病僂癃然伏行有類槖駞者故鄉人號之駞駞聞之曰甚善名我固當因捨其名亦自謂槖駞云其鄉曰豐樂鄉在長安西駞業種樹凡長安豪家富人為觀㳺及賣果者皆争迎取養視駞所種樹或移徙無不活且碩茂蚤實以蕃他植者雖窺伺傚慕莫能加也有問之對曰槖駞非能使木夀且孳也以能順木之天以致其性焉爾凡植木之性其本欲舒其培欲平其土欲故其築欲宻既然已勿動勿慮去不復顧其蒔也若子其置也若棄則其天者全而其性得矣故吾不害其長而已非有能碩茂之也不抑耗其實而已非有能蚤而蕃之也他植者則不然根拳而土易其培之也若不過焉則不及苟有能反是者則又愛之太恩憂之太勤旦視而暮撫已去而復顧甚者爪其膚以驗其生枯摇其本以觀其疎宻而木之性日以離矣雖曰愛之其實害之雖曰憂之其實讎之故不我若也吾又何能為哉問者曰以子之道移之官理可乎駞曰我知種樹而已理非吾業也然吾居鄉見長人者好煩其令若甚憐焉而卒以禍旦暮吏來而呼曰官命促爾耕朂爾植督爾穫蚤繰而緒蚤織而縷字而㓜孩遂而雞豚鳴鼔而聚之擊木而召之吾小人具飱饔以勞吏且不得暇又何以蕃吾生安吾性耶故病且怠若是則與吾業者其亦有類乎問者喜曰不亦善夫吾問養樹而得養人術傳其事以為官戒也李赤傳李赤江湖浪人也常曰吾善為歌詩詩類李白故自號曰李赤逰宣州州人館之其友與俱逰者有姻焉間累日乃從之館赤方與婦人言其友戲之赤曰是媒我也吾将娶乎是友大駭曰足下妻固無恙太夫人在堂安得有是豈狂易病惑耶取絳雪餌之赤不肯服有間婦人至又與赤言即取巾經其脰赤兩手助之舌盡出其友號而救之婦人解其巾走去赤怒其友曰汝無道吾将從吾妻汝何為者赤乃就牖間為書輾而圓封之又為書博而封之訖如厠乆其友從之見赤軒厠抱甕詭笑而側視勢且下入乃倒曳得之又大怒曰吾已升堂面吾妻吾妻之容世固無有堂之飾宏大富麗椒蘭之氣油然而起顧視汝之世猶溷厠也而吾妻之居與帝居鈞天清都無以異若何苦余至此哉然後其友知赤之所遭乃厠鬼也聚僕謀曰亟去是厠遂行宿三十里夜赤又如厠乆從之且復入矣持出洗其汚衆環之以至旦去抵他縣縣之吏方宴赤拜揖跪起無異者酒行友未及言飲已而顧赤則已去矣走從之赤入厠舉其牀扞門門堅不可入其友叫且言之衆發牆以入赤之面陷不潔者半矣又出洗之縣之吏更召巫師善呪術者守赤赤自若也夜半守者怠皆睡及覺更呼而求之見其足於厠外赤死乆矣猶得尸歸其家取其所封書讀之盖與其母妻訣其言詞猶人也栁先生曰李赤之傳不誣矣是其病心而為是耶抑固有厠鬼也赤之名聞江湖間其始為士無以異於人也一惑於怪而所為若是乃反以世為溷溷為帝居清都其屬意明白今世皆知笑赤之惑也及至是非取與向背决不為赤者幾何人耶反修而身無以欲利好惡遷其神而不返則幸耳又何暇赤之笑哉唐文粹巻九十九欽定四庫全書唐文粹巻一百宋姚鉉編
