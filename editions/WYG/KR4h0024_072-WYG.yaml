seq: 72
front:
  text: 畿百役有不如法得舉劾之至若密網峻威㣲文深詆衆所嚴憚愈於市師盖由臨之者専也奉之者一也専則權有獨㫁一則政無多門前達以之立名於此暨皇運中興與人休息雖風移代變煩簡則殊而舉直措枉典刑猶在殿中侍御史河東薛公朝之望也復修舊職澟然生風秦官漢儀斯不替矣乃篆石題記使人不遺聊紀於近庶昭厥德始自乾元嵗掌留務者次而書之以垂于後大厯八年月日記
  hash: sha256:44e2d50cf1a1ba7657e7c4cfc92a475d927b850e80426e160100b4dc1115258b
  markers:
  - {type: page-break, offset: 135, content: '', id: KR4h0024_WYG_072-11b, image: WYG1344/WYG1344-0135d.png}
body:
  text: 吏部貟外郎南曹㕔壁記權德輿漢朝尚書郎辨章制度主文書起草之任東漢方冠以名曹用諸曹功超卓者轉遷選部魏晉已還其任寖劇國家紀律昭明官循其方凢薦紳之倫未命為大夫者滿嵗皆調於轂下啓事賦禄必先有司初上元中天官趙郡李敬𤣥號為稱職以覆視官簿差次裁成端本肇末得不重煩乃請外郎一人顓南曹之任其後或詔同曹郎分主之或詔他曹郎權居之皆難其才而慎其舉也大抵膺是命者必屬耳目焉以其公於能否之間不可遏也以事之委㑹吏之竒衺因縁詭故中若市道居之者通則闊畧守或刻深苟成績於是則翰飛不暇登二掖贊六職得之夷易疾若傳置太原王仲舒字𢎞中温毅亷直清方敦實風槩姿材邁乎羣倫貞元十年冬繇諸侯部從事賢良對策厯左右諫列儀曹考功郎十八年實受斯命類能故也於是用賢明忠恕循理官業程品具舉尤違自絶然後以之質於冡宰小宰罷遣者不讟受禄者不誣恢恢然投其虛而鋩刃不頓君子以𢎞中之道為折中矣昔春秋書士縠曰堪其事也魯語曰署所以朝夕䖍君命也今因官署而舉事任春秋邱明之志也至若龍朔咸亨改復之說此皆不書監祭使壁記栁宗元禮檀弓曰祭禮與其敬不足而禮有餘也不若禮不足而敬有餘也是必禮與敬皆足而後祭之義行焉唐開元禮凡大祠若干中祠若干咸以御史監祠祠官有不如儀者以聞其刻印移書則曰監祭使寳應中尤異其禮更號祠祭使俄復其初又凡制供祠之吏雖當齋戒得以决罰由是禮與敬無不足者聖人之於祭祀非必神之也盖亦附之教焉事於天地者示有尊也不肅則無以教敬事於宗廟者示廣孝也不肅則無以教愛事於有功烈者示報德也不肅則無以勸善凡肅之道自法制始奉法守制由御史出者也故將有事焉則祠部上其日吏部上其官奉制書以來告然後頒于有司以謹百事太常修其禮光禄合其物百工之役先一日咸至于祠而考閱焉御史㑹公卿有司執簡而臨之故其粢盛牲牢酒醴菜果之饌必實于庖厨鍾鼓笙竽琴瑟戞擊之樂簨簴綴兆之數必具于庭内樽彞罍洗爼豆醆斚之器必絜于壇堂之上奉奠之士贊禮之童樂工舞師洎執役而衛者咸引數其實設箠朴于堂下以修官刑而羣吏莫敢不備物羅奏牘于几上以嚴天憲而衆官莫敢不盡誠而祭之日先昇立于西階之上以待卒事其禮之周旋樂之節奏必周知之退而視其燔燎瘞埋終之以敬也居常則飭四方祀貢之物以時登于王府服器之修具祠宇之繕理牛羊毛滌之節三官御廪之實畢傋而聽命焉舊以監察御史長居是職貞元十九年十二月御史多闕予班在三人之下進而領焉明年中山劉禹錫始復舊制由禮與敬以臨其人而官事益理制令有不宜于時者必復于上革而正之於是始為記求簿書得為是職者若干為書記秘書郎壁記權德輿按六典秘書郎四人從六品上分掌四部書以甲乙丙丁為之目昔漢武帝聚天下文籍於庫内謂之中秘書魏晉之際秘書與中書或分或合故云職近日月宜居三臺之上丞郎之任與南宫相亞厯代辨論與時輕重國初思漢廷延閣之制薄江左貴游之選始以岑江陵虞永興褚河南迭為之厥後彬彬多文學之士然則先王之法志官師之訓典九流百氏如貫珠然學與仕皆優而還相為用者其在兹乎今年春滎陽鄭君具瞻自涇陽尉承詔授任鄭君質重而有敏行坦夷而含明識且今中書相君之令弟也方以結綬滿嵗調於選部言吏資者積三遷而後至今超居之有以見擇賢審官與怡怡綽綽之道為盡美矣在晉鄭黙領中外三閣始刪煩文而朱紫不雜開元初君之王考潁川府君叔祖刑部府君皆繇禮官博士繼登其任諸父諸兄或解巾以司讎校或决科而登館殿含章筮仕多在於斯猶桓公武公之代為卿士盖善於其職而宜之義也謂鄙人嘗學舊史能知書府官業之所繇是俾編次郎位彰施屋壁時貞元庚辰嵗秋七月記四門助教壁記栁宗元周人置虞庠于四郊以養國老教胄子祭統曰天子設四學盖其制也易傳太初篇曰天子旦入東學晝入南學夕入西學暮入北學蔡邕引之以定明堂之位焉大戴禮保傅篇曰帝入東學以貴仁入南學以貴德入西學以貴義入北學以尊爵賈生述之以明太子之教焉故曰為大教之官而四學具焉參明堂之政原大教之極其建置之道𢎞也後魏太和中立學于四門置助教二十人隋氏始𨽻于國子而降置五人皇朝始合于太學又省至三人貟位彌簡其官尤難非有儒之通者不列也四門學之制掌國之上士中士下士凢三等侯伯子男凢四等其子孫之為胄子者及庶士庶人之子為俊士者使執其業而居其次就師儒之官而考正焉助教之職佐博士以掌鼓篋榎楚之政分其人而教育之其有通經力學者必於嵗之杪升於禮部聽簡試焉課生徒之進退必酌于中道非博雅莊敬之流固不得臨於是故有去而升于朝者賀秘書由是為博士為散騎由是為左拾遺舊制與拾遺為八品清官故必以名實者居於其位貞元中王化既成經籍少聞有司命太學之官頗以為易専名譽好文章者咸恥為學官至是河東栁立始以前進士求署兹職天水武儒衡閩中歐陽詹又繼之是嵗四門助教凢三人皆文士京師以為異余與立同祖於方輿公與武公同升於禮部與歐陽生同志於文四門助教署未嘗紀前人名氏余故為之記而由夫三子者始乎爾國學新修五經壁記劉禹錫初大厯中名儒張㕘為國子司業始詳定五經書于論堂東西廂之壁辨齊魯之音取其宜考古今之文取其正繇是諸生之師心曲學偏聽臆說咸束而歸于大同掲掲高懸積六十載崩剥汚衊泯然不鮮今天子尚文章尊典籍于苑囿不加尺椽而成均以治國學上言遽賜千萬時祭酒皥實尸之博士公肅實佐之國庠重嚴過者必軾遂以羨贏再新壁書懲前土塗不克以夀乃折堅木負墉而比之其製如版牘而高廣其平如粉澤而絜滑背施隂闗使衆如一附離之際無迹而尋堂皇靚深兩屋相照申命國子能通法書者分章揆日懸其業而繕冩焉筆削既成讎校既精白黑彬班瞭然飛動以䝉來求煥若星辰以敬來趨肅如神明以疑來質决若蓍蔡由京師而風天下覃及九譯咸知宗師非止服縫掖者鑽仰而已于是學官陳師正等暨生徒凡四百二十有八人請金石刻且歌曰我有學宇既傾而成之我有壁經既昧而明之孰規模之孰發揮之祭酒維齊博士維韋俾我學徒弦詠以時切切祁祁不遨不嬉庶乎遒人來采我詩時余為禮部郎凡瞽宗之事得以開决故書之以移史官宜附于文志問國庠記舒元輿先王建太學法以教國胄子欲敺人歸義府也故設官區掌嚴大其事明公侯卿大夫必由是而出某既求善藝於闕下謂今之太學猶古之太學將欲觀焉自以為下土小儒未嘗覩天子庠序欲往時先三日齋沐而後行行及門下脫盖下車循牆而趨請於謁者曰吾欲觀禮於太學將每事問之於子可乎謁者許諾遂前導之初過於朱門門闔沈沈問曰此魯聖人之宫也遂拜之次至于西有高門門中有厦屋問之曰此論堂也予懼其鴻學方諭不敢入導者曰此無人乃虛堂爾予感之遂入見庭廣數畆盡墾為圃矣心益惑復問導者曰此老圃不宅子安得欺我邪導者曰此積年無儒論故庭化為廢地乆為官於此者圃之非圃所宅也循廊升堂堂中無机榻有苔草没地予立其上悽慘滿眼大不稱嚮之意復為導者引又至一門問之曰此國子館也入其門其庭其堂如入論堂俄又厯至三館門問之曰廣文也太學也四門也入其門其庭其堂如國子其生徒去聖人之奥如堂館之蕪嗟乎詩書禮樂國之洪源也濬其源天下可以光潤窒其源天下為之顦顇故唐堯知其如此亦先命廷臣典三禮教胄子誕敷文德於天下天下之屋皆可封及夏殷時其孟也則必濬之其季也則皆自窒之自窒之時天下之屋皆可誅至周室有文武周公㪍興而作復唐虞之道行七八百年而付仲尼承之孜孜日夜席不敢煖祖述之憲章之發於鄒魯張於洙泗上摩躪三光下垂之無窮其徒有入室者升堂者及門者散滿天下雖丁周季而天下姦臣賊子猶解曰周孔之教不敢妄動以此則文之教豈可須臾弛邪至嬴政犯之窒其源源未絶而已自絶於天下矣漢初纔息干戈復濬其源而後生公孫𢎞倪寛卜式之徒並出維持戰爭之漢二百年間無所失墜皆周公仲尼之力也國家用干戈取天下其道正於漢氏及闢儒宫立素王祠設學官命生徒崇盛館宇固亦不下漢氏然自冦生幽陵軍旅之事始勝爼豆故太學之道不得不衰涼今皇帝傳大寳七祀生獻呉濞蜀禪於郊廟梟夏逆首殛潞姦師㧞魏世家此用兩階之舞可謂至矣今溟澥無波兵器可以䝉之虎皮矣乃大修周公仲尼之道之時也而太學且猶衰涼之若此豈非有司之不供職邪羣公卿士之不留意邪不然何使巍巍國庠寂寞不聞回也賜也說釋道義之聲雖館宇雲合鞠為荒圃可謂大國虛設以自欺也愚甚不取且懼周公仲尼之道没墜於泉遂記其所荒之大畧以喻有司唐文粹巻七十二欽定四庫全書唐文粹巻
