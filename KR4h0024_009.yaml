  text: 重校正唐文粹卷第九
  hash: sha256:62115daf63df80d6fb55210de31d4c776eaa84f8307cefcb3dc871c101707b3a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0024_SBCK_009-1a}
body:
  text: 吳興姚鉉纂古賦壬總十首修身一動靜交相養賦白居易哀樂愁思八懷忠賦歐陽詹泛渭賦白居易望賦劉禹錫惜餘春賦李白江上愁心賦張説別知賦韓愈愛而不見賦蕭頴士傷往賦劉禹錫夢一夢渴賦何諷動靜交相養賦并序白居易居易常見今之立身從事者有失於動有失於靜斯由動靜俱不得其時與理也因述其所以然用自警導命曰動靜交相養賦云天地有常道萬物有常性道不可以終靜濟之以動性不可以終動濟之以靜養之則兩全而交利不養之則兩傷而交病故聖人取諸震以發身受以復而知命所以莊生曰智養恬易曰蒙養正者也吾觀天文其中有程日明則月晦日晦則月明明晦交養晝夜乃成吾觀歲功其中有信陽進則隂退陽退則隂進進退交養寒暑乃順且躁者本於靜也斯則躁為民靜為君以民養君教化之根則動養靜之道斯存且有者生於無也斯則無為母有為子以母養子生成之理則靜養動之義明矣所以動之為用在氣為春在鳥為飛在舟為楫在弩為機不有動也靜將疇依所以靜之為用在蟲為蟄在水為止在門為楗在輪為柅不有靜也動奚資始則知動兮靜所伏靜兮動所倚吾何以知交養之然哉以此有以見人之生於世出處相濟必有時而行非匏瓜不可以長繫人之善其身枉直相循必有時而屈故尺蠖不可以長伸嗟夫今之人知動之可以成功不知非其時動亦為凶知靜之可以立德不知非其理靜亦為賊大矣哉動靜之際聖人其難之先之則過時後之則不及時交養之間不容毫釐故老氏觀妙顔子知幾噫非二君子吾誰與歸懷忠賦并序歐陽詹丙寅歲因受譴季冬之月次于殷墟歷關龍逢墓焉昔聆其風未嘗不回腸霣涕覩夫塋壟心又增傷遂寫憤于言為賦以弔先生以忠諌致命故以懷忠命篇云天生彼辛兮用殱覆于夏家欲悠悠而罔極毒浩浩而無涯無辜殞身肆市朝之若莽有道併命委炮烙以如麻伊先生之諤諤為酷烈之所加嘗披圖於往載每廢卷於興嗟蕭條舊邑莽蒼空陂陷陵成坎古木無枝或人曰此其墓也又一倍以增悲嗚呼麟非騰噬之儔詎虎狼之共穴鳯實仁靈之類豈鷹鸇之同列惟玉石之明分亦薰蕕之自別是以謇謇心競昻昻面折彼炎炎之原燎信撲撲而不滅寧歸死以申懷不貪生而結舌痛矣哉古人有言輔仁者天福善者神胡為是日功不如人使典章之不信俾忠義之空勤律中大吕日臨蒙谷風颼颼於衰草煙茫茫乎平陸思悽悽而填臆淚淫淫以盈目義則非其知友親故逺夫骨肉節臨危而不撓行於艱而彌篤惟其有之是以傷之而慟哭泛渭賦并序白居易右丞相高公之掌貢舉也豫以鄉貢進士舉及第左丞相鄭公之領選部也豫以書判拔萃登科十九年天子並命二公對掌鈞軸朝野無事人物甚安明年春豫為校書郎始徙家秦中卜居渭上上樂時和歲稔萬物得其宜下樂名遂官間一身得其所既美二公佐清靜之理又荷二公垂特達之遇發於嗟嘆流於詠歌于時泛舟于渭因為泛渭賦以導其意辭曰亭亭華山下有人跂兮望兮愛彼三峯之白雲泛泛渭水上有舟沿兮泝兮愛此百里之清流以我為太平之人兮得於斯而優遊又感陽春之氣熙熙兮樂天和而不憂曰豫生之幸兮時哉時哉當皇唐受命之九葉兮夷與華而無氛埃及皇帝纘位之二紀兮命髙與鄭為鹽梅二賢兮爰立四門兮大開凡讀儒書與履儒行者率充賦而四來雖片藝而必收兮故不棄豫之小才感再遇於知已心慙怍以徘徊登豫名於太常署豫職於蘭臺臺有蘭兮閣有藝芳菲菲兮可襲備一官而無事又不維而不縶家去省兮百里每三旬而一入川有渭兮山有華淡悠悠其可賞目白雲兮漱清流且或偃而或仰門去渭兮百步常一日而三往夜分兮扣舷天無雲兮水無煙遲遲兮明月波淡灔兮棹寅緣日暮兮舟泊草萋萋兮沙漠漠習習兮春風岸柳動兮渚花落發浩歌以長引舉濁醪而緩酌春冉冉兮其將盡豫何為平不樂鳥樂兮雲際鳴嚶嚶兮飛裔裔魚樂兮泉底鬐撥撥兮尾潎潎我樂兮聖代心融融兮神泄泄伊萬物各得其樂者由聖賢之相契賢致聖於無為聖致時於既濟凝為和兮聚五福發為春兮銷六沴不我後兮不我先適當我兮生之世彼鱗蟲與羽族咸和樂而不知惠我為人兮最靈所以愧賢相而荷聖帝樂乎樂乎泛于渭兮詠而歸聊逍遙以卒歲望賦劉禹錫邈不語兮臨風境自外兮感從中明晦轉續兮八極鴻蒙上下交氣兮羣生異容發孤照于寸眸騖遐情乎太空物乘化兮多象人遇時兮不同嗟乎有目者必騁望以盡意當望者必緣情而感時有待者瞿瞿忘懷者熙熙慮深者瞪然若喪樂極者沖然無違外徙倚其如一中紏紛兮若斯望如何其望最樂晞慶霄兮遡阿閣如雲兮天顔咫尺如草兮臣心踴躍扇交翟兮葳㽔旗升龍兮蠖略日轉黃道天開碧落凝瑞景於庭樹掬非煙於殿幕望如何其望且歡登灞岸兮見長安紛擾擾兮紅塵合鬱蔥蔥兮佳氣盤池象漢兮昭回城依斗兮闌干避御史之驄馬逐幸臣之金丸望如何其望彼好宗萬靈兮越四隩漢帝仙臺兮秦皇海嶠霓衣踴于河上馬迹窮乎越徼紫氣度關而斐斖神光屬天而照耀睆眷眷以馳精聳專專而觀妙望如何其望有形視蠢蠢兮窮冥冥楚塞氛惡兮蕭關燧明暈籠孤月角奮長庚沙多似雪磧有疑城煙雲非女子之氣草木盡王者之兵審曵柴之虛警破來騎之先聲信有得于風鳥示無言于斾旌望如何其望且慕恩意隔兮年光騖雕輦巳辭兮金屋何處長信草生兮長門日暮傒翠華之儻來仰玄天以自訴況復湘水無還漳河空注淚染枝葉香餘紈素風蕭蕭兮北渚波煙漠漠兮西陵樹夫不歸兮江上石子可見兮秦原墓拍琴翻朔塞之音挾瑟指邯鄲之路望如何其望最傷佩環玦兮思帝鄉龍門不見兮雲霧蒼蒼喬木何許兮山髙水長春之氣兮恱萬族獨含嚬兮千里目秋之景兮懸清光偏結憤兮九回腸羡環拱于白榆惜馳暉于落棠諒衝斗兮誰見伊戴盆兮何望平聲豈止蘇武在胡管寧浮海送飛鴻之滅沒附隂火之光彩鶴頸長引烏頭未改恨巳極兮平原空起何時兮東山在永望如何傷懷孔多降將有依風之感宫人成憶月之歌歌曰張衡側身愁思久王粲登樓日回首不作渭濵垂釣臣羞為洛陽拜塵友惜餘春賦李白天之何為令北斗而知春兮回指於東方水蕩漾兮碧色蘭葳蕤兮紅芳試登髙而望逺極雲海之微茫魂一去兮欲斷淚流頰兮成行吟青楓而詠滄浪懷洞庭兮悲瀟湘何餘心之縹眇兮與春風而飄揚飄揚兮無限念佳期兮莫展平原萋兮綺色愛芳草兮如翦惜餘春之將闌每為恨而不淺漢之曲兮江之潭把瑶草兮思何堪想遊女於峴北愁帝子於湘南恨無極兮心氲氲目眇眇兮憂紛紛披衛情於淇水結楚夢於陽雲春每歸兮花開花已闌兮春改嘆長河之流春送馳波於東海春不留兮時已失老衰颯而情逾在恨不得挂長繩於青天繫西飛之白日若有人兮情相親去南國兮往西秦見遊絲之橫路網春輝以留人沉吟兮哀歌躑躅兮傷別送行子之將逺看征鴻之稍滅醉愁心於垂楊隨柔條以紏結望夫君兮興咨嗟橫涕淚兮怨春華遙寄影於明月送夫君於天涯江上愁心賦張説江上之峻山兮鬱﨑嶬儀而不極雲為峯兮煙為色歘變態兮心不識江上之深林兮杳冥蒙而不巳鳥為花兮猿為子紛蕩漾兮言莫擬夏雲隂兮若山秋水平兮若天冬沙飛兮淅淅春草靡兮芊芊感四節之默運知萬化之潛遷伴衆鳥兮寒渚望孤帆兮日邉雖欲貫愁腸於巧筆紡離夢於哀絃是心也非模放之所逮將有言兮是然將無言兮是然別知賦韓愈豫取友於天下將歲行之兩周下何深之不即上何髙之不求紛擾擾其既多或喜能而好修寧安顯而獨𥙿顧厄窮而共愁帷知心而難得斯一旦而為收歲癸未而遷逐侣蟲蛇於海陬遇夫人之來使闢公館而羅羞索微言於亂志發孤笑於羣憂物何深而不考理何隱而不抽始參差以異序卒爛漫而同流何此歡之不可恃遂駕馬而回輈山嗷嗷其相軋樹蓊蓊其相樛雨浪浪其不止雲浩浩其常浮知來者之不可以數哀去此而無由倚郭郛而掩涕空盡日以遲留愛而不見賦蕭頴士嗟乎或愛之而不見者有矣何必周秦異代夷夏殊軌阻嚴城之九重限方舟之一水茍時事之多怨故人遐而室邇關山起於足下堂上逺乎千里聳專專之目成遽時逝而復止詩人所以思婉孌而搔首賦城隅之有俟吁不得其巳也惟夙昔之良會夢佳期於北方欵渤海之三山吸流霞之景光含芳辭以貺豫云好惠之不忘顧服義之永日陪遊嬉於帝鄉廣莫忽其飄怒鯨波洶而騰張俄驚魂以輟寐間窮髮之茫茫將揭厲以復從駃風濤之匪量顧投軀以靡吝撫遺體以兢惶晨切切以悽愴夕屏營以倣徨追前歡之俯邇歎此恨之悠長於是收神返慮澄淡靜默冥然就寢兀若無識兾良宵之復遇希舊遊之可即徒有顧兮且未克憂沉深兮萃胸臆風兮雨兮何極傷往賦并序劉禹錫人之所以取貴於蜚走者情也而誕者以遣情為智豈至言耶豫受室九年而鰥痛若人之夭閼弗遂也作賦以傷之兾夫覽者有以增伉儷之重云歎獨處之邑邑兮憤伊人之我遺情可殺而猶毒境當歡而復悲人或朝嘆而暮息夫何越月而逾時太極運乎三辰轉寒暑而下馳有歸于無兮盛復于衰猶昧爽之必暮又安得而怨咨我今怨夫若人兮曾旭旦而潛暉飄零日及之蕚倐忽蜉蝣之衣川走下而不還露迎陽而易晞恩巳甚兮難絶見無期兮永思我行其野農民桑者舉桉來饁亦在林下我觀于途裨販之夫同荷均挈荆叉布𥜗羽毛之蕃鱗介之微和鳴灌叢雙泳漣漪薨薨者蟲蠢蠢伊豸遊空穴深兩兩相比何動類之萬殊必雄雌而與俱物莫失儷以孤處我方踽踽而焉如我復虛室目淒涼兮心伊鬱心伊鬱兮將語誰坐匡牀兮撫嬰兒何所丐沐兮何從仰飴襦袴在身兮昔圍差跌鞶囊附臂兮餘馥葳蕤誠天性之潛感顧童心兮如疑嘵然有難繼之慕漠然減好弄之姿指遺袿兮能認訴空帷兮欲歸我入寢宫痛人亡兮物改其容寶瑟僵兮絃柱絶瑶臺傾兮鏡奩空寒爐委灰虛幌多風隙駟晨轉窗蟾夜通步搖昏兮網粘翡翠芳褥掩兮塵化蛩蛩閲刀尺之餘澤見巾箱之故封玩服儼兮猶具繁華謝兮焉從想翩翻於是非求僁窣與冥蒙信竒術之可致嗟此生兮不逢徒注視以寂聽恍神疲而目窮還抱影以獨出紛百哀而攻中系曰龍門風霜苦別鶴哀鳴夜銜羽吳江波浪深雌劒一去無遺音悲之來兮憤豫心洶如行波洊浸淫悵緣情而莫極思執禮以自針巳焉哉苒苒生死悠悠古今乘彼一氣兮聚散相尋或鼓而興或罷而沉以無涯之情愛悼不駐之光隂諒自迷其有分徒終怨於匪忱彼蒙莊兮何人豫獨纍嘆而長吟夢渴賦何諷不宿食以晨飲困鍾盂以沉寢永春晝而髙扄墮幅巾而橫枕及乎酒適衷腸神遊異方煙生喉舌惝然如狂爰瞰甃以窺汲諒不任於呼吸俄據河而俯瀆乃器舟而杯斛倒魚鱉之窟宅見蛟龍之委伏猶胃腸之不浹資宴飲而未足由是奔九江走五湖手不睱於斡運心不息於躊躇見波漸竭而百川如線岸益髙而底淤將枯腹慊爾而未覺肺燥然而不濡尋至大溟茫然連清豈爾浩瀚而吾量不盈斟酌未幾倐見涯涘百靈稽首乞留濡溉吾腹未充豈汝為意俄傾竭於浩渺奄滴瀝而無漬瑶宮貝闕盡列平地三山赤城可以步至鯤鯨噞喁相喣以呬大鵬驚攫巨鼇愕眙四顧燥涸悒然興情此情何竒非吾所知恨滄海之可罄不足充吾之所思周遭有截塊然墆㙞水府萬族咸呼帝闕帝且不聞吾欲未竭方將尋蟻垤期耿恭問薑毋以何在訪舒姑而欲從辨夸父於渭上弔相如於臨卭萬計巳盡六腑如燼窗日斜照飛蚊繞鬢既驚既覺可嘆可笑飲不盡器枯腸巳療搘頥沉吟其意逾深以吾此日之一夢見自古不足者之心重校正唐文粹卷第九
