  text: 重校正唐文粹卷第九十四
  hash: sha256:87bff44b8789f200bcc6e1cd2c467b15f5e144ccd630616b89e767c3e124c8cf
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0024_SBCK_094-1a}
body:
  text: 吳興姚鉉纂序丁揔一十首天地二大衍曆序張説地志圖序吕溫修養一琴一導引圖序梁肅觀石山人彈琴序博奕二骰子選格序房千里序棊栁宗元鳥獸三師子贊序張九齡鷹鶻圖贊序八駿圖序李觀果實一荔枝圖序白居易大衍曆序張説特進集賢院學士修國史上柱國燕國公臣説言曆者先王以明時授人敬天育物者也辰極恆居斗運不息晦朔相推而變月寒暑往來而成歲日月右進周天之度啓星辰左旋正時之氣合積餘分而致閏配甲子而設蔀鳯鳥為司疇人受職分分而加之者百鈞必過毫毫而減之者千里必差何則古法存而其人異也不見大聖孰能起之伏惟開元神武皇帝陛下欽崇天道眘徽月令受命再新改制創曆十有三祀詔沙門一行上本軒頊夏殷周魯五王一侯之遺式下集太𥘉至于麟德二十三家之衆義比其異同課其踈密或前疑而後定或始會而終乖振古未探之象必發揮於神算大鈞不測之氣盡覼縷於天聰乃更審晷度之短長覆星間之廣狹繩九道之朓肭紏五精之進退參大衍天地之數綜八卦六爻之序一轍於文王也核春秋交蝕之辰研九疇五紀之奧同文於孔子也杼軸萬象優柔四載奏草朝竟一公夕落臣説奉詔金門成書册府先有理曆陳景善算趙升首尾參玄之言接承轉籌之意因而緝含編次勒成一部名曰開元大衍曆經七章一卷長執曆一卷古今曆書二十四卷略例奏章一卷凡五十二卷所以貫三才周萬物窮數術先鬼神稱制曰者即聖人顧訪之旨標謹按者是曆家進對之詞非軒后至聖不啓履端之業非容成詣極不就歸餘之經據其圖也七政之天心不逺守其術也千歲之日月可知蓋中黃之寶符太紫之神器者也謹以十六年八月端午赤光照室之夜皇雄成紀之辰當一元之出符獻萬壽之新曆伏望藏之書殿録於紀言掌之太史頒於日曆制曰可地志圖序吕溫廣陵李該博逹之士也學無不通尤好地理患其書多門歷丗􅐛廣文詞浩蕩學者疲老由是以獨見之明法先聖之制黜諸子之傳記述仲尼之職方會源流考同異務該暢從體要綽然勒成一家之説猶懼其奧未足以昭啓後生乃裂素為方儀據書而畫隨方面以區别擬形容之訓解命之曰地制圖觀其粉散百川黛凝羣山元氣剖判成乎筆端任土之毛有生之類大鈞變化不出其意然後列以城郭羅于陬落內自五侯九伯外洎要荒蠻貊禹迹之所窮漢驛之所通五色相宣萬邦錯峙毫釐之差而下正乎封略方寸之界而上當乎分野乾象坤勢炳焉可觀與夫聚米擬其端倪畫地陳乎梗槩固不可同年而語其詳略也每虛室燕居薄帷晴褰普天之下盡在屋壁戶納四海窗籠八極名山大川隨顧奔走殊方絶域舉意而到高視華裔坐橫古今觀帝王之疆理見宇宙之寥廓出遐入幽曽不崇朝與夫役形神於歲月窮轍迹於區外又不可並軌而論勞逸也且夫刪百代之弊綜羣言之首繁而不亂踈而不漏才識以潤之丹青以炳之使嗜學之徒未披文而見義不由戶而覩奧斯訓導之明也窮地而述舉丗而載事極鴻纎理通皎昧混一家之文軌張大國之襟帶核人物之虛實揔山川之要會表皇威之有截明王道之無外斯乃功用之大也見蒼梧塗山則思舜禹恤民之艱覩窮荒大漠則悟秦漢勞師之弊覽齊疆晉壤則想桓文勤王之霸觀洞庭荆門則知苗蜀恃險之敗王者於是明乎得失諸侯於是鑒乎興替斯又懲勸之遠也然則本之所以廣學流申之足以贊鴻業垂之可以示後丗豈徒由近觀遠以智自樂為室中之一物哉而時無知音道不虛行舉地成圖聞天無路此志士儒林所以為之頽息也某久從君遊辱命序述庶明作者之意俾好事君子知其所以然導引圖序梁肅氣之貫萬物也盛矣本乎天者資之以生本乎地者資之以成古之善為道者知氣之在人不利則鬱鬱則傷性伐其命而不可援也於是乎張而翕之導而引之熊經鳥伸吐故納新使流於六藏暢於四支浹於肌膚之會固其筋骸之束然後百病不生耳目聰明可以保神可以盡年和之至也故岐伯得之為軒轅師廣成子得之干二百歲而身不衰彭祖得之上及有虞下及五霸後學得之隱名山而遊人間壽考者不可詳而計矣原其所出皆以岐伯為祖有浮山隱居朱少陽者得其術於黃帝外書又加以元化五禽之説乃志其善者演而圖之𬒳以章目凡三篇究其所由蓋久視之門戶樞之善喻者也少陽年涉期頥神氣轉壯每至虛空之中自試此法或屈或伸或盤或旋或回互翕闢終日不倦每振寂郵肯綮之際必砉然響然用力甚微而合於桑林之儛此又技之甚尤異者也暇日以所述示豫豫喜而序之以置篇首俾博覽者以知還年之一路道者之雅戲云觀石山人彈琴序天寶中言雅樂者稱馬氏琴石侯嘗得其門而入矣故其曲高其聲全余常觀其操縵味夫節奏和而不流淡而不厭凜其感人而忘夫佚志巳而謂余曰鄙夫徒能彈之而至和樂獨善其身足使情反乎性吾聞其語矣未辨其方也敢問何為而臻哉古之聰明睿智其能為乎余愀然曰善乎夫子之問是道也吾嘗聞諸師矣夫人生無其節則亂故聖人道之天和作樂以救之於是乎有五弦之琴以暢五音以協五行以宣五常以紀五事後丗聖人以為五弦備其本而未行其變變而裁之莫先乎文武之用於是究夫剛柔復益其弦者非他也文武之道也亦猶八卦既列復因而重之然後既可以動天地而鼓萬物盡變化而感鬼神格聖人之能事反百慮於一致此琴之以為貴也故虞帝以之乃歌南風禹湯以之而作夏頀周文武以之萬邦協和卜代三十成康以之刑措不用仲尼以之見文王之象而樂正雅頌各得其所若琴道不行則君子之道消而王澤不下故殷紂失之而棄河海幽厲失之而周道中絶晉悼失之師曠一彈而國大旱琴之興廢與理亂相並夫備殷薦以配祖考蕭相庶幾神降則不可廢於郊廟矣若夫和平其志氣暢逹於動用使邪物不接則不可廢於律度矣故自有國有家下逮于庶人莫不尤重焉君子所居於是有左琴右書士無故不徹蓋謂是也周穆載雲和空桑龍門之琴禹貢嶧陽之桐以為之歷代善琴之士與幽蘭白雪之號則吾子其自知巳夫何言哉問曰若何所云則今之為琴者多矣君子之風何其未扇歟對曰琴樂之雅者也雅者正也正者謂能宣正其聲而行正道今夫鄭衛之移人久矣其人或正則其位未大其位未大故正聲永𬒳君子風薄不其然乎夫雅樂之所貴者豈取清商流徴不失度曲而巳彼各有所起也言畢石君善之俾豫紀其辭遂號為序云骰子選格序房千里古之敘班位列爵祿其所以治萬民揔百事且用以别白賢不肖堯為君舜為相其下有共鮌焉成王為君周公為相其下有管蔡焉舜周公之貴非幸也冝也共鮌管蔡之殛放非不幸也冝也故賢者冝進之雖巳貴益其祿厚其爵不為幸不肖者冝退之雖巳賤奪其廩削其秩不為歉由是人用自勵遷善去惡強奮自篤後代衰微升于上者不必賢沈於下者不必愚得不必功失不必過賢者知其善不足恃恥比肩而趨故賢未嘗進不肖者知其惡不果棄惟奮臂而逞故不肖未嘗退有賢者退人雖心知之卒無奈何且曰非人也命也有不肖者進人雖心知之又益無可奈何亦曰非人也命也以是善不勸而惡不悛率曰賦諸命而巳矣果如是聖人所謂仁誼忠信者何足道哉姑徴其有命無命爾悲夫斯後代之不可復古豈不由是也開成三年春豫自海上北徙舟行次洞庭之陽有風甚急繫船野浦下三日遇二三子號進士者以穴骼雙雙為戲更投局上以數多少為進身職官之差數豐貴而約賤卒局座客有為尉掾而止者有貴為相臣將臣者有連得美名而後不振者有始甚微而欻升于上位者大凡得失酷似前所謂不繫賢不肖但卜其偶不偶耳逹人以生死為勞息萬物為一馬果如是吾今之貴者安知其不果賤哉彼真為貴者乃數年之榮耳吾今貴者亦數刻之樂耳雖久促稍異其歸於偶也同列禦寇敘穆天子夢遊事近者沈拾遺述枕中事彼皆異類微物且猶竊爵位以加人或一瞬為數十歲吾果斯人也又安知數刻之樂果不及數年之榮邪因條所置進身職官遷黜之目為選格序序棊栁宗元房生直溫與余二第遊皆好學余病其確也思所以休息之者得木局隆其中而規焉其下方以直置棊二十有四貴者半賤者半貴曰上賤曰下咸自第一至十二下者二乃敵一用朱墨以别焉房由是取二毫如其第書之既而抵戲者二人則視其賤者而賤之貴者而貴之其使之擊觸也必先賤者不得巳而使貴者則皆栗焉惛焉亦鮮克以中其獲也得朱焉則若有餘得墨焉則若不足余諦睨之以思其始則皆類也房子一書之而輕重若是適近其手而先焉非能擇其善而朱之否而墨之也然而上焉而上下焉而下貴焉而貴賤焉而賤其易彼而敬此遂以逺焉然則若丗之所以貴賤人者有異房之貴賤於兹棊者歟無亦近而先之耳其有果能擇其善否者歟其敬而異者亦從而動心矣其得於貴者有不氣揚而志蕩者歟其得於賤者有不貌慢而心肆者歟其所謂貴者有敢輕而使之擊觸者歟其所謂賤者有敢避其使之擊觸者歟彼朱而墨者相去千萬且不啻有敢以二敵其一者歟余墨者徒也觀其始與末有似棊者故敘師子贊序張九齡夫德之所感者深物之所懷者遠中國有聖占候而自來四夷不玉征伐而難致故絶域有來貢沒羽諸侯有不入苞茅舉其大凡不在遐邇頃有至自南海厥繇西極獻其方物而師子在焉爾雅所謂狻猊如虥貓食虎豹今之所見信然絶猛者也其天骨雄詭材力傑異得金精之剛為毛羣之特仡立不動而九牛相去耽視且瞋則百獸皆伏所以肉視犀象孩撫熊羆其餘瑣細不置牙齒我天子示柔遠之義國無不庭有眼猛之威物無難制故其受羈絏伏間皂馴而為用鋒莫可當然吾君所存義不謂此蓋蠻夷君長歲時貢獻或殊琛絶賮實於內府或異獸竒禽擾於外囿皆其覲禮若中國之贄幣所不辭讓明異方之臣妾此則非有利之之心充耳目之􅥬好以為懷之之道示天地之含容不其然歟固無得而稱也義異大犬豈勞召公之訓美同赤豹何闕韓侯之詩凡我侍臣咸為之贊鷹鶻圖贊序張九齡鳥之􅋧者曰鷹曰鶻鷹也名揚於尚父義見于詩鶻也迹隱於古人史闕其載豈昔之多識物亦有遺將今而嘉生材無不出為所呼之變與所記不同者邪然於羽族之中絶有豪傑之表氣感剛悍體侔銛鋒顧視之間煒如也夫授以徑翮意不羣飛資其利觜義在鮮食生有自然之權用無可抑之勢古之言武士法吏齊名比義者以其嚴若郅都飛若李廣委質於所事報功於所養不憚摧翼以虧勇不立垂枝以屈節是鳥也向之擬議不亦宜乎夫鸞與鳯將感於仁所不及也雞與鶴猶較其德彼何有焉況其餘雖飛雖鳴凡者怪者肉非登俎才非下韝威力不敵羣噪無益然後知二禽之為用衆鳥之絶倫者也故君子韙其然工人圖其狀以象武備以彰才美雖未極其天姿有以見其風骨矣昔支遁嘗養名馬自云重其神駿斯圖也非彼人之徒歟八駿圖序李觀豫嘗聞有周穆王八駿之説乃今獲覽厥圖雄凌趫騰彪虎文螭之流與今馬高絶懸異矣其名盜驪蜚黃騕裊白羲之屬也視矯首則若排雲視舉足則若乘風有待馭之狀有矜羣之姿若日月之所不足至若天地之所不足周軒軒然嶷嶷然言其真也實星降之精思其發也猶神扶其魄軾者如仙御者如夢將變化何别哉丗説周穆王駕八駿日會王母於瑶池從羣仙而遊按山海經去中國三萬里乃非虛説也而不知其所從得之厥神是生為之用歟何古書無其匹歟圖之首有禇公遂良題云秦漢傳之降于梁隋至余皇唐不泯厥迹卓爾昭然竒哉信乎茍今考之於古則人大笑矣求之於時則曠丗矣由是知物有同者不必良有異者不必否或慮觀之者昧故為序以表焉荔枝圖序白居易荔枝生巴峽間樹形團團如帷蓋葉如桂冬青華如橘春榮實如丹夏熟朵知蒲萄核如枇杷殼如紅繒膜如紫綃瓤肉瑩白如冰雪漿液甘酸如醴酪大略如彼其實過之若離本枝一日而色變二日而香變三日而味變四五日外色香味盡去矣元和十五年夏南賔守樂天命工吏圖而書之蓋為不識者與識而不及一二三日者云重校正唐文粹卷第九十四
