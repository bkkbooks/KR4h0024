body:
  text: 古調甲摠一百四十六首古今樂章一百三十六首琴操一十首古樂章補樂歌十篇元結補九夏歌系文九篇皮日休今樂章冬至日祀昊天圓丘樂章八首魏徵等作開元樂章十九首張説𤣥宗開元十三年封泰山祀天樂章十三首正月上辛祈穀於南郊樂章三首禇亮季秋享上帝於明堂樂章一首祀五方上帝于五郊樂章二十首魏徵等作祀朝日樂章三首貞觀中祀夕月樂章三首貞觀中睿宗太極元年登黄地祗於方丘樂章十一首盧從愿等作𤣥宗開元十三年禪社首山祭地祗樂章八首賀知章登太社樂章三首魏徵等作享龍池樂章十首姚崇等作享太廟樂章六首郭子儀等作儀坤廟樂章九首徐彦伯等作琴操十首韓愈補樂歌十篇并序元結自伏羲氏至於殷室凡十代樂歌有其名亡其辭考之傳記其義或存焉嗚呼樂聲自太古始百世之後盡亡古音嗚呼樂歌自太古始百世之後遂亡古辭今國家追復純古列祀往帝嵗時薦享則必作樂而無雲門咸池韶夏之聲故探其名義以補之誠不足全化金石反正宮羽而或存之猶􅡧􅡧冥冥有純古之聲豈幾乎司樂君子導和焉爾凡十篇二十章各引其義以序之命曰補樂歌網罟伏羲氏之樂歌也其義葢稱伏羲能易人取禽獸之勞吾人苦兮水深深網罟設兮水不深吾人苦兮山幽幽網罟設兮山不幽右網罟二章章四句豐年神農之樂歌也其義葢稱神農教人種植之功猗太帝兮其智如神分草實兮濟我生人猗太帝兮其功如天均四時兮成我豐年右豐年二章章四句雲門軒轅氏之樂歌也其義葢言雲之出潤益萬物如帝之徳無所不施𤣥雲溶溶兮垂雨濛濛類我聖澤兮涵濡不窮黄雲漠漠兮含暎逾光邈我聖徳兮溥被無方右雲門二章章四句九淵少昊氏之樂歌也其義葢稱少昊之徳淵然深逺聖徳至深兮奫奫如淵生類娭娭兮孰知其然娭許其反右九淵一章章四句五莖顓頊氏之樂歌也其義葢稱顓頊得五徳之根莖植植萬物兮脩脩根莖五徳涵柔兮渢渢房戎反而生其生如何兮秞秞以周反天下皆自我君兮化成右五莖一章章七句六英髙辛氏之樂歌也其義葢稱帝嚳能總六合之英華我有金石兮擊拊淙淙與汝歌舞兮上帝之風由六合兮英華渢渢我有絲竹兮韻和泠泠與汝歌舞兮上帝之聲由六合兮根柢嬴嬴右六英二章章六句咸池陶唐氏之樂歌也其義葢稱堯徳至大無不備全元化油油兮孰知其然至徳汨汨姑没反兮順之以先元化浘浘音尾兮孰知其然至道泱泱兮由之以全右咸池二章章四句大韶有虞氏之樂歌也其義葢稱帝舜能紹先聖之徳森森羣象兮日見生成欲聞朕初兮𤣥封冥冥洋洋至化兮日見深柔欲聞涵濩兮大淵油油右大韶二章章四句大夏有夏氏之樂歌也其義葢稱禹治水其功能大中國茫茫下土兮乃生九州山有長岑兮川有深流茫茫下土兮乃均四方國有民人兮野有封疆茫茫下土兮乃歌萬年上有茂功兮下戴仁天右大夏三章章四句大護有殷氏之樂歌也其義葢稱湯救天下護然得所萬姓苦兮怨且哭不有聖人兮誰護育聖人生兮天下和萬物熈熈兮舞且歌右大護二章章四句補九夏歌系文九篇并序皮日休周禮鐘師掌金奏九樂事以鐘鼓奏九夏按鄭康成注云夏者大也樂之大者歌有九也九夏者皆詩篇銘頌之類也此歌之大者載在乎樂章樂崩亦從而亡是以頌不能具也嗚呼吾觀之魯頌其古也亦以久矣九夏亡者吾能頌乎夫大樂既去至音不嗣頌於古不足以補亡頌於今不足以入用庸何頌乎頌之亡者俾千古之下鄭衛之内窈窈冥冥不獨有大巻音拳黄帝樂名之音者乎王夏之歌者王出入之所奏也爣爣皎日歘麗于天厥明御舒如王出焉爣爣皎日欻入于地厥晦惟貞如王入焉出有龍旂入有珩珮勿驅勿馳惟慎惟戒出有嘉謀入有内則繄彼臣庶欽王之式王夏四章章四句肆夏之歌者尸出入之所奏也愔愔清廟儀儀衮服我尸出矣迎神之穀杳杳隂竹坎坎路鼓我尸入矣得神之祜肆夏二章章四句昭夏之歌者牲出入之所奏也有鬱其鬯有儼其彞九變未作全乘來之既醑既酢爰􅉧音𦙍小鼓爰舞象物既降全乘之去昭夏二章章四句納夏之歌者四方賓客來之所奏也麟之儀儀不縶不維樂徳而至如賓之嬉鳳之愉愉不篝不笯樂徳而至如賓之娛自筐及筥我有牢醑自筐及篚我有貨幣我牢不愆我貨不匱碩碩其才有樂而止納夏四章章四句章夏之歌者臣有功之所奏也王有虎臣錫之鈇鉞征彼不憓一撲而滅王有虎臣錫之圭瓚征彼不享一烘而泮王有掌封遉音偵爾疆理王有掌客饋爾饔餼何以樂之金石九奏何以賜之龍旂九旒去聲章夏四章章四句齊夏之歌者夫人祭之所奏也􅌑􅌑衡笄翬翬褕翟自内而祭為君之則齊夏一章章四句族夏之歌者族人酌之所奏也洪源誰孕疏為江河大塊孰埏播為山阿厥流浩漾厥勢嵯峨今君之酌慰我實多族夏二章章四句祴夏之歌者賓出之所奏也禮酒既酌嘉賓既厚牘為之奏禮酒既竭嘉賓既悦應為之節禮酒既罄嘉賓既酲雅為之行牘應雅三樂器也賓醉而出奏祴夏以此三器築地為之行節也祴夏三章章三句驁夏之歌者公出入之所奏也桓桓其珪衮衮其衣出作二伯天子是毗桓桓其珪衮衮其服入作三孤國人是福驁夏二章章四句冬至日祀昊天圓丘樂章八首魏徵禇亮虞世南等作降神用豫和上靈睠命膺㑹昌盛徳殷薦叶辰良景福降兮聖徳逺𤣥化穆兮天厯長皇帝行用太和穆穆我后道應千齡登三處大得一居貞禮惟崇徳樂以和聲百神仰止天下文明登歌奠玉帛用肅和闓陽播氣甄曜垂明有赫圓宰深仁曲成日麗蒼璧煙開紫營聿遵䖍享式降鴻禎迎俎用雍和欽惟大帝載仰皇穹始命田燭爰啓郊宮雲門駭聴雷鼓鳴空神其介祀景祚斯融酌獻飲福用夀和八音斯奏三獻畢陳寶祚惟永光輝日新送文舞出迎武舞入用舒和疊璧凝影皇壇路編珠流彩帝郊前己奏皇鍾歌大呂還符寶厯祚昌年武舞作用凱安昔在炎運終中華亂無象酆郊赤烏見邙山黑雲上大賚下周車禁暴開殷網幽明同叶賛鼎祚齊天壤送神用豫和歌奏畢兮禮獻終六龍馭兮神将昇明徳感兮非黍稷降福簡兮祚休徵開元樂章十九首張説迎神永和之樂三章肅九室諧八音歌皇慕動神心禮宿設樂妙尋聲明備祼奠臨律迓氣音入𤣥依玉几御黼筵聆愾息僾周旋九韶遍百福傳信工祝永頌聲來祖考聽和平相百辟貢九瀛神休委帝孝成皇帝行太和之樂一章時文聖后清廟肅雍致誠勤薦在貌思恭玉節肆夏金鏘五鐘繩繩雲步穆穆天容酌瓉登歌肅和之樂一章天子孝享工歌溥将躬祼鬱鬯乃爇膋薌臭以達隂聲以求陽奉時蒸嘗永代不忘迎俎雍和之樂二章在滌嘉豢麗碑敬牲角握之牡色純之騂火傳陽燧水溉隂精太公胖俎傅説和羮齋戒豐潔俎豆有馨亦有和羮既戒既平鼓鐘管馨肅唱和鳴皇皇后祖賚我思成酌獻用文舞一章聖謨九徳真言五千慶集昌胄符開帝先髙文仗鉞克配彼天三宗握鏡六合煥然帝其承祀率禮罔愆圖書霧出日月清懸舞形徳類詠諗功傳黄龍蜿蜒綵雲蹁蹮五行氣順八佾風宣介此百福於皇萬年宣皇帝室光大之舞一章肅肅藝祖滔滔濬源有雄玉劒作鎮金門文王餘緒后稷謀孫肇禋九廟四海來尊光皇帝室長發之舞一章具禮崇徳備樂承風魏推憧主周贈司空不行而至無成有終神興王業天歸帝功景皇帝室大政之舞一章於赫元命權輿帝文天齊八柱地半三分宗廟觀徳笙鏞樂勲封唐之兆成天下君元皇帝室大成之舞一章帝舞季歴襲聖生昌后歌有蟜胎炎孕皇天地合徳日月齊光肅雍孝享祚我萬方髙祖神堯皇帝室大明之舞一章赤精亂德四海困窮黄旗舉義三靈㑹同旱望春雨雲披大風溥天來祭髙祖之功太宗文武聖皇帝室崇徳之舞一章皇合一徳朝宗百神削平天下大拯生民上帝配食單于入臣戎歌陣舞􅁮􅁮蒸蒸高宗天皇大帝室鈞天之舞一章髙皇邁道端拱無為化懐獯鬻兵戢句驪禮尊封禪樂盛來儀合位媧后同稱伏羲中宗孝和皇帝室太和之舞一章退居江水鬱起丹陵禮物還舊朝典中興龍圖友及駿命恭膺鳴球香瓉大糦是承睿宗大聖真皇帝室景雲之舞一章景雲霏爛告我帝符噫帝沖徳與天為徒笙鏞遙逺俎豆虛無春秋孝獻因復此都皇帝受福酒胙福和之樂一章備禮用樂崇親致尊誠通慈降敬徹愛存獻懐稱夀啐感承恩皇帝孝徳子孫千億大包天域長亘不極送文舞迎武舞一章六鐘翕恊六變成八佾倘佯八風生樂九韶兮人神感美七徳兮天地清亞終獻武舞凱安之樂四章瑟彼瑤爵亞維上公室如屏氣門不容躬禮殷其本樂執其中聖皇所慕天地幽通禮帀三獻樂變九成降循軒陛仰欷皇情福與仁合徳因孝明百年神畏四海風行總總干戚填填鼓鐘奮揚増氣坐作為容離若鷙鳥合如戰龍萬方觀德肅肅雍雍烈祖順三靈文宗威四海黄鉞誅羣盜朱旗掃多罪戢兵天下安約法人心改大哉干羽意長見風雲在撤豆登歌一章止笙磬撤豆籩廓無響窅入𤣥主在室神在天情餘慕禮罔愆嘉黍稷屢豐年送神一章眇嘉樂援靈爽感若來思如往休氣息迴風上返寂寞還惚恍懐虛駕結空想𤣥宗開元十三年封泰山祀天樂章一十二首降神用豫和六變夾鐘宫之一欵泰壇柴泰清受天命報天成竦皇心薦樂聲志上達歆下迎夾鐘宫之二億上帝臨下庭騎日月陪列星嘉祝信大糦馨澹神心醉皇靈夾鐘宫之三相百辟貢八荒九歌叙萬舞翔肅振振鏘皇皇帝欣欣福穰穰黄鍾宮之四髙在上道光明物資始徳難名承眷命牧蒼生寰宇謐太階平太簇徵之五天道無親至誠與鄰山川遍禮宮徵惟新玉帛非盛聰明㑹真正斯一徳通乎百神姑洗羽之六饗帝饗親維孝維聖緝熈懿德敷揚成命華夷志同笙鏞禮盛明靈降止感此誠敬迎送皇帝用太和孝敬中發和容外彰騰華照㝢如昇太陽真璧就奠文靈垂光禮樂具舉濟濟洋洋登歌奠玉帛用肅和羽調奠祖配天承天享帝百靈咸秩四海來祭植我蒼璧布我𤣥製華日徘徊神靈容裔迎俎入用雍和俎豆有馝潔粢豐盛亦有和羮既戒既平鼓鐘管磬肅唱和鳴皇皇后祖賚我思成酌獻用夀和蒸蒸我后享獻惟寅躬酌鬱鬯跪奠明神孝莫孝乎配上帝於親敬莫敬乎教天下為臣皇帝飲福酒用夀和皇祖嚴配享皇天皇降嘏天子萬年送文舞出迎武舞入用舒和商調六鐘翕恊六變成八佾倘佯八風生樂九韶兮人神感美七徳兮天地清送神用豫和夾鐘宫調禮樂終禋燎上懐靈惠結皇想歸風疾迴天爽百福來衆神往正月上辛祈榖於南郊樂章三首禇亮登歌奠玉帛用肅和履艮斯繩居中體正龍運垂祉昭符啓聖式事嚴禋聿懐嘉慶惟帝永錫時皇休命迎俎用雍和殷薦乗春太壇臨曙八簋盈和六瑚登御嘉稷匪歆徳馨斯飫祝嘏無易靈心有豫送文舞出迎武舞入用舒和玉帛犧牲申敬享金絲戚羽盛音容庶俾億齡提景福長欣萬㝢洽時邕季秋享上帝於明堂樂章一首送文舞出迎武舞入用舒和御扆合宫承寶厯席圓重館奉明靈偃武修文九圍泰沈烽静柝八荒寧祀五方上帝于五郊樂章二十首魏徵禇亮虞世南等作祀黄帝降神用宫音黄中正位含章居貞既彰六律兼和五聲畢陳萬舞乃薦斯牲神其下降永祚休平登歌奠玉帛用肅和眇眇方輿蒼蒼圓葢至哉樞紐宅中圖大氣調四序風和萬籟祚我明徳時雍道泰迎俎用雍和金縣夕肆玉俎朝陳饗薦黄道芬流紫辰迺誠迺敬載享載禋崇祀斯在惟皇是賓送文舞出迎武舞入用舒和御徵乗宫出郊甸安歌率舞遞将迎自有雲門符帝賞猶持雷鼓答天成祀青帝降神用角音鶴雲旦起鳥星昏集候啓新風陽開初蟄至徳可饗行潦斯把錫以無疆蒸人乃粒登歌奠玉帛用肅和𤣥鳥司春蒼龍登嵗節物變栁光風轉蕙瑤席降神朱絃享帝誠備祝嘏禮殫珪幣迎俎用雍和大樂希音至誠簡禮文物斯建聲名濟濟六變有成三登無體迺眷豐潔恩覃愷悌送文舞出迎武舞入用舒和笙歌籥舞屬年韶鷺鼓鳬鐘展時豫調露初迎綺春節承雲遽踐蒼宵馭祀赤帝降神用徵音青陽告謝朱明戒序咸長是祈敬陳椒醑愽碩斯薦笙鏞備舉庶盡肅恭非馨稷黍登歌奠玉帛用肅和離位克明火中宵見峯雲暮起景風神扇木槿初榮含桃可薦芬馥百品鏘洋三變迎俎用雍和昭昭丹陸弈弈炎方禮陳牲幣樂備箎簧瓊羞溢俎玉齊浮觴恭惟正直歆此馨香送文舞出迎武舞入用舒和千里温風飄絳羽十枚炎景勝朱干陳觴薦俎歌三獻拊石摐金㑹七盤祀白帝降神用商音白藏應節天高氣清嵗功既阜庶類收成萬方静謐九土和平馨香是薦受胙聰明登歌奠玉帛用肅和金行在節素靈居正氣肅霜嚴林凋草勁豺祭隼擊潦收川鏡九榖巳登千箱流詠迎俎用雍和律應酉成氣躔南呂珪幣咸列笙竽備舉苾苾蘭羞芬芬桂醑式資宴貺用調霜序送文舞出迎武舞入用舒和璿儀氣爽驚緹籥玉吕灰飛含素商鳴鞞奏管芳羞薦㑹武安歌葆眊揚祀黑帝降神用羽音嚴冬季月星迴風厲享祀報功方祈來嵗登歌奠玉帛用肅和律周玉琯星囘金度次極陽烏紀窮隂兔火林霰雪湯泉凝沍八蜡已登三農息務迎俎用雍和陽月斯紀應鐘在候載潔牲牷爰登俎豆既高既逺無聲無臭静言格思惟神保祐送文舞出迎武舞入用舒和執籥持羽初終曲朱干玉戚姑分行七徳九功咸己暢明神降福具穰穰祀朝日樂章三首貞觀中作登歌奠玉帛用肅和惟聖格天惟明饗日帝郊肆類王宫戒吉珪奠春舒鐘歌曉溢禮云克備斯文有秩迎神用雍和晨儀式薦明祀惟光神物爰止靈暉載陽𤣥端肅事紫幄興祥福履攸假於昭令王送文舞出迎武舞入用舒和崇牙樹羽延調露旋宫扣律掩承雲誕敷懿徳昭神武載集豐功表睿文祀夕月樂章三首貞觀中作登歌奠玉帛用舒和測妙為神通微曰聖坎祀貽則郊禋展敬璧薦登光金歌動映以載嘉徳以流曽慶迎俎用雍和朏晨爭舉天宗禮闢夜典涼秋隂明湛夕有齊斯㫖有牲斯碩穆穆其暉穰穰是積送文舞出迎武舞入用舒和合吹八風金奏動分容萬舞玉鞘驚辭昭茂典光前烈夕曜成功表舊明𤣥宗開元十一年祭皇地祇於汾隂樂章十一首林鐘宫韓思復大樂和暢殷薦明神一降通感八變必臻有求斯應無徳不親降靈醉止休徵萬人太簇角盧從愿坤元載物陽樂發生播殖資始品彚咸亨列俎棊布方壇砥平神歆禋祀后徳惟明姑洗徵劉晃大君出震有事郊禋齋戒既肅馨香畢陳樂和禮備候暖風春恭惟降福實賴明神南吕羽韓休於穆濬哲維清緝熈肅事昭配永言孝思滌濯静嘉馨香在兹神之聽之用受福釐皇帝行用太和黄鍾宫王晙於穆聖皇六葉重光太原刻頌后土疏場寶鼎呈符歊雲孕祥禮樂備矣降福穰穰登歌奠玉帛用肅和㽔賓均之夹鍾羽崔𤣥暐聿脩嚴配展事禋宗祥符寶鼎禮備黄琮祝辭以信明徳惟聰介兹景福永永無窮迎俎用雍和黄鍾均之南吕羽賈曾蠲我餴饎潔我膋薌有豆孔碩為羞既臧至誠無昧精意惟芳神其醉止欣欣樂康酌獻飲福用夀和黄鍾宫蘇頲禮物斯具樂章乃陳誰其作主皇考聖真對越在天聖明佐神窅然汾上厚澤如春送文舞出迎武舞入用舒和太蔟宫何鸞樂奏云闋禮章載䖍禋宗于地昭假于天惟馨薦矣既醉歆焉神之降福永永萬年武舞用凱安黄鍾均之林鍾徵蔣挺維嵗之吉維辰之良聖君紱冕肅事壇埸大禮己備大樂斯張神其醉止降福無疆送神用順和源光裕方丘既膳嘉饗載謐齋敬畢誠陶匏貴質秀簠豐薦芳俎盈實永永福流其昇如日𤣥宗開元十三年禪社首山祭地祗樂章八首賀知章迎神用順和至哉含柔徳萬物資以生恒順稱厚載流謙通變盈聖心事能察層廟陳厥誠黄祗僾如在泰折俟咸亨皇帝行用太和肅我成命於昭黄祗裘冕而祀陟降在斯五音克備八變聿施緝熈肆靖厥心匪離登歌奠玉帛用肅和黄祗是祗我其夙夜寅畏誠潔匪遑寧舎禮以琮玉薦厥茅藉念兹降康胡寧克暇迎俎用雍和夙夜宥密不敢寧宴五齊既陳八音在縣粢盛以潔房俎斯薦明徳惟馨尚兹克徧皇帝酌獻用夀和惟以明發有懐載殷樂盈而返禮順其禋立清以獻薦欲是親於穆不己裒對斯臻皇帝飲福用福和穆穆天子告成岱宗大裘如濡執珽有顒樂以平志禮以和容上帝臨我云胡肅邕皇帝還宫用太和昭昭有唐天卑萬國列祖應命四宗順則申錫無疆宗我同徳曾孫繼緒享神配極送神用靈具醉代順和源乾躍靈具醉杳熈熈靈将往眇禗禗顧明徳吐正辭爛遺光流禎祺登太社樂章三首魏徵禇亮虞世南等作登歌奠玉帛用肅和后土凝徳神功叶契九域底平兩儀交際戊期應序隂墉展幣靈車少留俯歆樽桂迎俎用雍和美報崇本嚴恭展事受露流壇承風啓地潔粢登俎醇犧入饋介福逺流羣生畢遂送文舞出迎武舞入用舒和神道發生敷九稼隂陽乗仁暢八埏緯武經文陶景化登祥薦祉啓豐年享龍池樂章十首第一章姚崇恭聞帝里生靈祉應報明君鼎業新既叶翠泉光寶命還符白水出真人當時舜海潜龍躍此日堯河帶馬巡獨有前池一小鴈叨承舊惠入天津第二章蔡孚帝宅王家大道邊神馬潜龍涌聖泉昔日昔時經此地㸔來㸔去漸成川歌臺舞榭宜正月栁岸梅洲勝往年莫疑波上春雲少祇為龍飛直上天第三章沈佺期龍池躍龍龍己飛龍徳先天天不違池開天漢分黄道龍向天門入紫微邸第樓臺多氣色君王鳬鴈有光輝為報寰中百川水來朝上地莫東歸第四章盧懐慎代邸東南龍躍泉清漪碧浪逺浮天樓臺影就波中出日月光疑鏡裏懸鴈沼迴流成舜海龜書薦祉應堯年大川既濟慙為楫報徳空思奉細涓第五章姜皎龍池初出此龍山常經此地謁龍顔日日芙蓉生夏水年年楊栁變春灣堯壇寶匣餘煙霧舜海漁舟尚往還願以飄颻五雲影從來從去九天間第六章崔日用龍興白水漢興符聖主時乗運斗樞岸上䒠茸五花樹波中的皪千金珠操環昔聞迎夏啓發匣先來瑞有虞風色雲光隨隠見赤雲神化象江湖第七章蘇頲西京鳳邸躍龍泉佳氣休光鍾在天軒后霧圓今己得秦王水劒昔當傳恩魚不似昆明釣瑞鶴長如太液仙願侍巡遊同舊里更聞蕭鼓濟樓船第八章李乂星分邑里固人居水洊源流萬頃餘魏國君王秤象處晉家藩邸化龍初青蒲似騁遊梁馬緑藻疑游宴鎬魚自有神靈滋液地年年雲物史官書第九章姜晞靈沼縈廻邸第前浴日涵春寫曙天始見龍臺昇鳳闕應如霄漢起神泉石匱渚傍還啓聖桃李初生更有仙欲化帝圖從此受正同河變一千年第十章裴璀乾坤啟聖吐龍泉泉水年年勝一年始看魚躍方成海即覩龍飛利在天洲渚遥將銀漢接樓臺直與紫微連休氣榮光常不散懸知此地是神仙享太廟樂章六首𤣥宗皇帝室廣運之舞郭子儀於赫皇祖昭明有融惟文之徳惟武之功河海静謐車書混同䖍恭孝饗穆穆𤣥風肅宗皇帝室惟新之舞劉晏漢祚惟永神功中興風驅氛祲天覆黎烝三光再朗庶績其凝重熙累葉景命是膺代宗皇帝室保大之舞郭子儀於穆文考聖神昭彰肅勻羣慝含光逺方萬物茂遂九夷賓王愔愔雲韶徳音不忘徳宗皇帝室文明之舞鄭餘慶開邸除暴時邁勛尊三元告命四極駿奔金枝翠葉煇燭瑶琨象徳億載貽慶湯孫順宗皇帝室大順之舞鄭絪於穆時文受天明命允恭𤣥黙化成理定出震嗣徳應乾傳聖猗歟緝熙千億流慶憲宗皇帝室象徳之舞段文昌肅肅清廟登顯至徳澤周八荒兵定四極生物咸遂羣盜滅息明聖欽承子孫千億坤儀廟樂章九首迎神用永和林鍾宫徐彦伯猗若清廟肅肅熒熒國薦嚴祀坤興淑靈有几在室有樂在庭臨兹孝享百禄惟寧皇帝行用太和黄鍾宫丘恱孝哉我后沖乎迺聖道映重華徳輝文命慕深視篋情殷撫鏡萬國移風兆人承慶酌獻登歌用肅和中吕均之太蔟張齊賢褾圭既濯鬱鬯既陳畫羃雲舉黄流土醇儀充獻酌禮盛衆禋地察惟孝愉焉饗親迎俎用雍和林鍾宫薛稷陽靈配徳隂魄昭升堯壇鳯下漢室龍興俔天作對前旒是凝化行南國道盛西陵造舟集灌無徳而稱我粢既㓗我醴既澄隂陽靈廟光靈若憑徳馨惟饗孝思蒸蒸昭成皇后室酌用坤貞乾道既亨坤元以貞肅雍攸在輔佐斯成外睦九族内光一庭克生睿哲祈我休明欽若徽範悠哉淑靈建兹清宫于彼上京縮茅以獻㓗秬惟馨實受其福期乎億齡飲福酒用夀和黄鍾宫徐堅於穆清廟肅雍嚴祀合福受釐介以繁祉送文舞出迎武舞入用舒和胡雄送文迎武遞參差一始一終光聖儀四海生人歌有慶千齡孝享肅無虧撤俎用雍和㽔賓均之夾鍾貟半千孝享云畢維撒有章雲感𤣥羽風悽素商瞻望神座祇戀匪遑禮終樂闋肅雍鏘鏘送神林鍾商祝欽明閟宫實實清廟微微降格無象馨香有依式昭纂慶方融嗣徽明禋是享神保聿歸琴操十首將歸操韓愈秋之水兮其色幽幽我將濟兮不得其由渉其淺兮石齧我足乗其深兮龍入我舟我濟而悔兮將安歸尤歸乎歸乎無與石鬭兮無應龍求猗蘭操蘭之猗猗揚揚其香不採而佩於蘭何傷今天之旋其曷為然我行四方以日以年雪霜貿貿薺麥之茂子如不傷我不爾覯薺麥之茂薺麥之有君子之傷君子之守龜山操龜之氣兮不能為雨龜之枿兮不中梁柱龜之大兮秖以奄魯知將隳兮哀莫予伍周公有鬼兮嗟予歸輔越裳操雨之施物以孳我何意於彼為自周之先其艱其勤以有疆宇私我後人我祖在上四方在下厥臨孔威敢戲以侮孰荒于門孰治于田四海既均越裳是臣拘幽操目窈窈兮其凝其盲耳肅肅兮聽不聞聲朝不日出兮夜不見月與星有知無知兮為死為生嗚呼臣罪當誅兮天王聖明岐山操我家于􅃎自我先公伊我承序敢有不同今狄之人將土我疆民為我戰誰使死傷彼岐有岨我往獨處爾莫余追無思我悲履霜操父兮兒寒母兮兒飢兒罪當笞逐兒何為兒在中野以宿以處四無人聲誰與兒語兒寒何衣兒飢何食兒行于野履霜以足母生衆兒有母憐之獨無母憐兒寧不悲雉朝飛操雉之飛于朝日羣雌孤雄意氣横出當東而西當啄而飛隨飛隨喙羣雌粥粥嗟我雖人曽不如彼雉雞生身七十年無一妾與妃别鵠操雄鵠銜枝來雌鵠啄泥歸巢成不生子大義當乖離江漢水之大鵠身鳥之微更無相逢日且可繞樹相隨飛殘形操有獸維貍兮我夢得之其身孔明兮而頭不知吉凶何為兮覺坐而思巫咸上天兮識者其誰唐文粹巻十欽定四庫全書唐文粹巻十一宋姚鉉編古調乙總四十六首
