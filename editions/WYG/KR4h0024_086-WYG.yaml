front:
  text: 薦賢四
  hash: sha256:5de6400e79cf94ef2dd3290aaa486bb12cbe6bc611c1ae8aabfecea212b92aa4
body:
  text: 上宰相薦皇甫湜書韋處厚薦所知於徐州張僕射書李翺薦齊孝若書令狐楚薦樊衡書崔顥師資七與李勃書田𢎞正與叚校理書劉巖夫荅人求文章栁宗元上韓吏部書林簡言與常州獨孤使君書崔元翰荅韋中立書栁宗元復杜温夫書上宰相薦皇甫湜書韋處厚相公閣下伏以燕國張公説登翊聖明底寧泰階推心旁求虛已下納房太尉由布衣振起於門下張曲江自蓬户發揮於嶺底而繼播休名襲佩相印克懋勲德不忝揄揚後之朝望因以興勸不多二公而推燕國者以雜居羣倫齊齒下輩崇搆棟榦則杪忽方輕琢飾珪璋則蒙昧未耀器用既光持之於耳目之前垂後而无配名節兼大用之於身世之後希古而絶倫夫豈推策考歩之為乎藏徃知來之兆乎蓋合以尺牘片言申以考跡定貎靈異五行之鍾粹也文章心靈之造形也著誠居業本隐以之顯觀心擇術自麤以之㣲以是而求則坐決萬方之内立斷百代之下其術既定其道甚明竊見前進士皇甫湜年三十二學窮古訓詞秀人文脱落章句簡斥枝葉㳺百氏而旁覽折之以歸正囊六義以疾馳諷之以合雅苟堅其持操不恐於囂囂之訕脩其踐立不誘於藉藉之譽孟軻黜楊墨之心揚雄尊孔顔之志形乎既立果於將然至於用心合論操毫注簡排百氏之雜説判九流之紛蕩摘其舛駁趨于夷途徴㑹理軸遣訓詞波無不蹈正超常曲暢精㫖置之石渠必有劉向之刋正羣言列之東觀必有孟堅之勒成漢史施之奏議必有賈誼之兼對諸生天既委明于斯人苟回險其道未得按輪而驅則必混翼乎天池飱精於沆瀣秉矰繳者從而道之固无及矣儻得逰門下信其才能相公得狥公之名有摭竒之實後進幸甚舍人驂御賤役也猶能達掃門之事禰衡雕蟲薄技也猶能遇非常之薦今某辱奉恩顧實百於舍人之儔皇甫湜藴積才志固百於正平之量處厚百舍人之勢不能達百正平之心方切恃私於門舘明者觀之其恥非一也懼愚瞽不盡謹繕其書論賦合八首用卜可否輕瀆嚴威下情不任戰懼之至薦所知於徐州張僕射書李翺翺再拜齊桓公不疑於其臣管夷吾信而覇天下攘戎翟匡周室亡國存荆楚服諸侯莫不至焉豎刁易牙信而齊國亂身死不𦵏五公子争立兄弟相及者數世桓公之信於其臣一道也所信者賢則德格於天地功及于後世不得其人則不得其死其知人不易也豈惟霸者為然雖聖人亦不能免焉帝堯之時賢不肖人皆立于朝堯能知舜於是乎驩兠放共工流殛鯀竄三苖舉禹稷臯陶二十有二人加諸上位故堯崩三載四海遏密八音後世之人皆謂之帝堯焉向使堯不能知舜而遂尊驩兠共工之黨於朝禹稷臯陶之下二十有二人不能用則堯將不得為齊桓公爾豈復得曰大哉堯之為君乎惟天為大惟堯則之蕩蕩乎民無能名焉者哉春秋曰夏滅項孰㓕之蓋齊滅之曷不言齊滅之為桓諱也春秋為賢者諱此滅人之國何賢爾君子之惡惡也嫉始善善也樂終桓公嘗有繼絶存亡之功故君子為之諱繼絶存亡賢者之事也管夷吾用所以能繼絶世存亡國焉耳豎刁易牙用則不能也向使桓公始不用管夷吾末有豎刁易牙争權不𦵏而亂齊國則幽厲之諸侯也始用賢而終身諱其惡君子樂用賢也如此始不用賢以及其終而幸後世之掩其過也則㣲矣然則居上位流德澤於百姓者何所勞乎勞於擇賢得其人加諸上使天下皆化之焉而已矣今天子之大臣有土地千里孰有如執亊好賢不倦者乎葢得其人亦多矣其所可求而不可取者則有人焉隴西李觀竒士也伏聞孰事知其賢將用之未及而觀病死昌黎韓愈得古文之遺風明理亂根本之所由伏聞執事又知其賢將用之未及而愈為宣武軍節度使之所留觀愈皆豪傑之士也如此人不時出觀自古天下亦有數百年無如其人者焉執事皆得而知之皆不得而用之翺實為執亊惜焉豈惟翺一人而已後之讀前載者亦必多為執事惜之矣兹有平昌孟郊貞士也伏聞執事舊知之郊為五言詩自前漢李都尉蘇屬國及建安諸子南朝二謝郊能兼其體而有之李觀薦郊於梁肅補闕書曰郊之五言詩其有髙處在古無上其有平處下顧兩謝韓愈送郊詩曰作詩三百首杳然咸池音彼二子皆知言者也豈欺天下之人哉郊窮餓不得安養其親周天下無所遇作詩曰食薺腸亦苦强歌聲無歡出門即有礙誰謂天地寛其窮也甚矣凡賢人竒士自以所負不苟合于世是以雖見之難得而知也見而不能知其賢如勿見而已矣知其賢而不能用如勿知其賢而已矣用而不能盡其才如勿用而已矣盡其才而容讒人之所間者如勿盡其才而已矣故見賢而能知知而能用用而能盡其才而不容讒人之所間者天下一人而已矣兹有二人焉偕來其一人賢士也其一人常常人也待之禮貎不加崇也則賢者行而常常之人日來矣況其待常常之人禮貎加厚則善人何求而來哉孔子曰吾未見好德如好色者聖人不好色而好德者也雖好色而不如好德者次也德與色均好之又其次也雖好德而不如好色者下也最甚不好德而好色者窮矣有人告曰某所有女國色也天下之人必將極其力而求之無所愛矣有人告曰某所有人國士也天下之人則不能一徃而先焉是豈非不好德而好色者乎賢者則宜有以别於天下之人矣孔子述易定禮樂刪詩叙書作春秋聖人也奮乎百世之上其所化之者非其道則夷狄人也而孔子之廟存焉雖賢者亦不能日徃拜之以其益於人寡矣故無益於人雖孔子之廟尚不能朝夕而事焉况天下之人乎有待於人而不能禮善人良士則不如無待也嗚呼人之降年不可與期郊將為他人之所得而大有立功於世與其短命而死皆不可知也二者卒有一於郊之身他日為執事惜之不可既矣執事終不得而用之矣雖恨之亦無奈何矣翺窮賤人也直辭無讓非所宜至于此者也為道之存焉耳不直則不足以伸道也非好多言者也翺再拜薦齊孝若書令狐楚某官至辱垂下問令公舉一人可管記之任者愚以為軍中之書記節度之喉舌指事立言而上達思中天心發號出令以下行期悦人意諒非容易而可專據竊見前進士髙陽齊孝若字考叔年二十四學必專授文皆雅正詞賦甚精章表殊健踈眉目美風姿外若坦蕩中甚畏慎執事儻引在幕下列於賔佐使其馳一檄飛一書必能應馬上之急求言腹中之所欲夫掇芳刈楚不棄幽逺况孝若相門子弟射策甲科家居君侯之化下且數年矣不勞重幣而獲至寳甚善甚善雄都大府多士如林最所知者實斯人也請為閣下記其若此惟用與捨髙明裁之薦樊衡書崔顥夫相州者先王之舊都西山雄崇足是秀異竊見縣人樊衡年三十神爽清晤才能絶倫雖白面書生有雄膽大略深識可以軌時俗長策可以安塞裔藏用守道實有歲年今國家封山勒崇希代罕遇含育之類莫不踊躍况詔徴隐逸州貢茂異衡之際㑹千載一時君侯復躬自執玊陪鑾日觀此州名藩必有所舉當是舉者非衡而誰伏願不棄賢才賜以甄奬得奔大禮升聞天朝衡因此時策名樹績報國榮家令當代之士知出君侯之門矣顥不勝區區敢聞左右俯伏階墀用增戰汗與李勃書田𢎞正𢎞正珍重執事之心積二十餘年竟不獲自道於執事者徒懇懇終日常恐空老而無所師誠固内不自安矣自前年朝謁得展拜執事於道路之間時苦牽事復略不得伸前時所畜之思彌有不足於心矣執事以古今仁義發為懲惡勸善之心豈惟當世士君子所賴抑亦姬公孔子之心待執事而明白之矣每覽前後史策紀其所為古之賢者有出無愧矣𢎞正近奉制書去魏就鎮自念寵榮已極能無憂惕之甚哉且自二㓂亂常已來六十餘載矣河北之地教化之所不行冀趙魏常山又河北之尤者日月積習遂為匪人誠可悲矣寢食常念之以為負經濟不羇之才者執事可以將朝廷之化移獷俗之心矣𢎞正庸虛輒不自意思君子降重為邑人啓茅塞之心仰執事坐師氏之筵使鄙夫修擁篲之禮則向之羞姑可掩矣不審執事當俯而就之乎復恥而不就乎今輒虛上倅之位矣君子光臨古人有功成不居退得所詣者鄙人咏之乆矣儻終不拒至誠之情幸甚與段校理書劉巖夫人藏其心不可測度也摇舌於口誰不言仁誼哉清濁相渾真偽難辨今雖有提其肺腸以呈衆某必笑而不諒此亦不足怪也蓋偽者繁而真者寡况慿區區文字而能取信於人邪所以某藴蓄斯乆不敢輕奮抑為此也今幸因執事稍垂盻睞以不倫衆輩故得肆陳其愚惟賜詳之某七歲受教誨始學箕裘迄今十六不見成熟性本慵惰强之惟艱不能勠力盡瘁服勤先聖然常謂男子生而懸弧示有事於四方固不得與兒女曹並列依違以沒世每欲奮廓埃壒破開濤浪聳翼雲漢垂名竹帛謂舒腕可取耳殊不知世道隘局九重阻深不可也又欲藏器弛用洗滌他腸昧旦調㫖甘入夜吟編簡索聖賢意探情性源白雲霏空虚舟汎波塵機不張語黙自任湜湜然得全其愚為唐一閒人而家世清風祗承嚴訓不可也又欲掉長舌於公卿閒蘧蒢戚施以媚於人拱立下流阿㫖從衆善者曰善不善者亦曰善巧言如流俾躬處休而愚僻已慣矯之惟病不可也三者之惑心不可屈志不可諧岐路難期歲月易老踐履之道倀然自迷執事濯纓清流敏古多識試與指其要路將鞭蹇以趨之某再拜荅人求文章書栁宗元古今號文章為難足下知其所以難乎非謂比興之不足恢拓之不逺鑚礪之不工頗纇之不除也得之為難知之愈難爾儻或得其髙朗探其深賾雖有蕪累則為日月之蝕也大珪之瑕也曷足傷其明黜其寳哉且自孔子以來兹道大闢家修人勵刓精竭慮者㡬千年矣其間耗費簡札役用心神者其可數乎登文章之籙波及後代越不過數十人耳其餘誰不欲争裂綺繡互攀日月髙居於萬物之中雄視於百代之下率皆縱臾而不克躑躅而不進力蹙勢窮吞志而沒故曰得之為難嗟乎道之顯晦幸不幸繋焉談之辯訥升降繋焉鑒之頗平好惡繋焉交之廣狹屈伸繋焉則彼卓然自得以奮其間者合乎否乎是未可知也而又榮古陋今者比肩疊迹大抵生而不遇死則垂聲者衆焉揚雄沒而法言大興馬遷生而史記未振彼之二子且猶若是况乎未甚聞著者哉有文不傳於後祀聲遂絶於天下者矣故曰知之愈難而為文之士亦多漁獵前作戕賊文史抉其意抽其華置齒牙閒遇事蠭起金聲玊耀誑聾瞽之人徼一時之聲雖終淪棄其奪朱亂雅為害已甚是其所以難也閒聞足下欲觀僕文章退發囊笥編其蕪穢心悸氣動交於胷中未知孰勝故乆滯而不徃也今徃僕所著賦頌碑碣文記議論書序之文凡四十八首合為一通想令治書蒼頭吟諷之也擊轅拊缶必有所擇顧鑒視何如耳還以一字示褒貶焉上韓吏部書林簡言人有儒其業與孟軻同代而生不遂師於軻不得聞乎道閣下豈不謂之惜乎又有與揚雄同代而生不遂師於雄不得聞乎道閣下豈不謂之惜哉有習於琴者問其所習必曰吾師於某某所傳師曠之道也習於弧者問其所習必曰吾師於某某所傳濯孺子之道也脱二人未至於古然亦無敢是非者以所傳有據故也儻曰吾自能非授受於人也必知其音俚音也其能庸能也嗚呼聖人之道與琴弧之道相逺矣而琴弧尚能自習之如此况聖人之道乎去夫子千有餘載孟軻揚雄死今得聖人之㫖能傳説聖人之道閣下耳今人睎閣下之門孟軻揚雄之門也小子幸儒其業與閣下同代而生閣下無限其門俾小子不得聞其道為異代惜焉與常州獨孤使君書崔元翰日月崔元翰再拜上書郎中使君閣下天之文以日月星辰地之文以百穀草木生於天地而肖天地聖賢又得其靈和粹美故皆含章垂文用能裁成庶物化成天下而治平之主必以文德致時雍其承輔之臣亦以文事助王政而唐堯虞舜禹湯文武之代則憲章法度禮樂存焉臯陶伯益伊傅周召之倫則誥命謨訓歌頌傳焉其後衛武召穆吉甫仍叔咸作之詩並列于雅孔聖無大位由修春秋述詩易反諸正而寄之治而素臣丘明㳺夏之徒又述而贊之推是而言為天子大臣明王道斷國論不通乎文學者則陋矣士君子立於世升於朝而不繇乎文行者則僻矣然患後世之文放蕩於浮虛舛馳於怪迂其道遂隐謂宜得明哲之師長表正其根源然後教化淳矣閣下紹三代之文章播六學之典訓㣲言髙論正詞雅㫖温純深潤溥博𢎞麗道德仁義粲然昭昭可得而本學者風馳雲委日就月將庶幾於正若元翰者徒以先人之緒業不敢有二事不遷於他物而其顓蒙樸騃難以為工抗精勞力未有可採獨喜閣下雖處貴位而有仲尼誨人不倦之美亦欲以素所論撰貢之閣下然而未有暇也不意流於朋友露其嗤鄙而乃盛見稱歎俯加招納顧惟狂簡何以克堪今謹别貢五篇庶垂觀察儻復褒其一字有踰拱璧之利假以一言若垂華衮之榮不宣元翰載拜荅韋中立書栁宗元宗元白辱書云欲相師僕道不篤業甚淺近環顧其中未見可師者雖嘗好言論為文章甚不自是也不意吾子自京都來蠻夷間乃幸見取僕自卜固無取假令有取亦不敢為人師為衆人師尚不敢况敢為吾子師乎孟子稱人之患在好為人師由魏晉已下人益不事師今之世不聞有師有輒譁笑之以為狂人獨韓愈奮不顧流俗犯笑侮收召後學作師説因抗顔而為師世果羣怪聚罵指目牽引而増為言詞愈以是得狂名居長安炊不暇熟又挈挈而東西如是數矣屈子賦曰邑犬羣吠吠所怪也僕徃聞庸蜀之南恒雨少日日出則犬吠子以為過言前六七年僕來南二年冬幸大雪踰嶺被南越中數州之犬皆蒼黄吠噬狂走者累日至無雪乃已然後始信前所聞者今韓愈既自以為蜀之日吾子又欲使吾為越之雪不亦病乎非獨見病亦以病吾子然雪與日豈有過哉顧吠者犬耳度今天下不吠者幾人而誰敢衒怪於羣目以召閙取怒乎僕自謫過以來益少志慮居南中九年增脚氣病漸不喜閙豈可使呶呶者早夜沸吾耳搔吾心則固僵仆煩憒愈不可過矣平居望外遭齒舌不少不獨欠為人之師耳抑又聞之古者重冠禮將以貴成人之道是聖人所尤用心者也數百年來人不復行近有孫昌𦙍者獨發憤行之既成禮明日造朝到外廷薦笏言於卿士某子冠畢應之者咸憮然京兆尹鄭叔則怫然曳笏郤立曰何預我邪廷中皆大笑天下不以非鄭尹而快孫子何哉獨為所不為也今之命師者大類此吾子行厚而辭深凡所作皆恢恢然有古人形貎雖僕敢為師亦何所增加也假以僕年先吾子聞道著書之日不後誠欲徃來言所聞則僕固願悉陳中所得者吾子茍自擇之取某事去某事則可矣若定是非以教吾子僕才不足而又畏前所陳者其為不敢也決矣吾子前所欲見吾文悉以陳之非以耀明於子聊欲觀子氣色誠好惡如何也今書來言者皆太過吾子誠非佞譽誣諛之徒直見愛甚故然耳始吾㓜且少為文章以辭為工及長乃知文者以明道是固不為炳炳琅琅務采色􅃷聲音而為能也凡吾所陳皆自謂近道而不知道之果近乎逺乎吾子好道而可吾文或者其於道不逺矣故吾每為文章未嘗敢以輕心掉之懼其剽而不留也未嘗敢以怠心易之懼其弛而不嚴也未嘗敢以昬氣出之懼其昧沒而雜也未嘗敢以矜氣作之懼其偃蹇而驕也抑之欲其奥揚之欲其明疏之欲其通亷之欲其節激而發之欲其清固而存之欲其重此吾所以羽翼夫道也本之書以求其質本之詩以求其恒本之禮以求其宜本之春秋以求其斷本之易以求其動此吾所以取道之原也叅之穀梁氏以厲其氣叅之荀孟以暢其支叅之莊老以肆其端叅之國語以博其趣叅之離騷以致其幽叅之太史以著其絜此吾所以旁推交通而以為之文也凡若此者果是邪果非邪有取乎抑無取乎吾子幸觀焉擇焉有餘以告焉茍亟來以廣是道子不有得焉則我得矣又何以師云爾哉取其實而去其名無招越蜀吠怪而為外廷所笑則幸矣復杜温夫書栁宗元宗元白兩月來三辱生書書皆逾千言意若相望以不對荅引譽者然僕誠過矣而生與吾文又十巻噫亦多矣文多而書頻吾不對荅引譽宜可自反而來徴不背相見亟拜亟問其得終無辭乎凡生十卷之文吾已略觀之矣吾性騃滯多所未甚諭安敢懸斷是且非邪書抵吾必曰周孔周孔安可當也儗人必於其倫生以直躬見抵宜無所諛今道而不幸乃曰周孔吾豈得無駭怪且疑生悖亂浮誕無所取幅尺以故愈不對荅來栁州見一刺史即周孔之今而去我道連而謁於潮之二邦又得二周孔去之京師京師顯人為文辭立聲名以千數又宜得周孔千百何吾生胷中擾擾焉多周孔哉吾雖少為文不能自彫斵引筆行墨快意纍纍意盡便止亦何所師法立言狀物未嘗求過人亦不能明辨生之才致但見生之用助字不當律令惟以此奉荅所謂乎歟邪哉夫者疑辭也矣爾焉也者决辭也今生則一之宜考前聞人所使用與吾言類且兾慎思之則一益也庚桑子言藿蠋鵠卵者吾取焉道連而謁於潮其卒可化乎然世之求知音者一遇其人或為十數文即務徃京師急日月犯風雨走謁門户以冀茍得今生年非甚少而自荆來栁自栁將道連而謁於潮途逺而深矣則其志果有異乎又狀貎嶷然類丈夫視端形直心無岐徑其質氣誠可也獨要謹充之爾謹充之則非吾獨能生宜勿怨亟之二邦以取法時思吾言非固拒生者孟子曰余不屑其教誨也者是亦教誨之而已矣某白唐文粹巻八十六欽定四庫全書唐文粹巻八十七宋姚鉉編書九㧾六首自薦上張燕公書房琯止裴度相公書元稹上鄭相公書歐陽詹上宰相三書韓愈上張燕公書房琯竊惟當今主英臣誠海平天清干相國者更言朝廷之遺闕黔黎之艱阻妄矣琯直以有詞不自明徴積心無與消散此亦一夫不獲願就相門陳之或議相門重深賤士罕及進言不少非人則廢退而復念止于旬時若借人為容則恥殊特達欲持情徑徃則懼致忽遺思所以自竒圖左右見異僭用舊禮獻此琬珪冀贄列得啓其書書窮思見其人矣至有輕好行怪易為犯德琯非敢如此也願左右明之琯嘗聞既徃布衣之士亦賤者也而一人下之三公崇之將欲分其賢愚而係其理亂琯自料必不能有損益於盛朝徒亦形似英哲之蹤辱累珪璋之德希左右以公選琯因以私進所私者則敢終而言之琯㓜為先相國棄委翳於蓁蕪之下因物遂遷與農者莫辨不忍窘厄然後以菑獲為懐將祗若遺謀乃發前言筐篋有相公述作焉有先君鑒誡焉約之立言依以扶信若赴古道則適若逢今人則乖或謂之非或謂之是求我哲匠繋此困蒙顧此身在下流無聞上士未足為先君之嗣不可見先君之友况有貴賤之異為之隔闊乎深惟達音者希恐不可再得忽不知相國之富貴如此琯之貧賤又如此期相國乃曰人以道義求我我不當以貴賤隔之借如宣父有相國之貴寧拒㳺夏之徒歟夫其此心千載一用豈琯也當之又見禮經有難進易退者戒貪也起人來學者勸道也琯趣仁者而乆未行何乎衣惟素褐乘非車馬閽人斥之馭者排之長衢髙門驟拜左右則近於論訴豈聞道之士乎故獻玉貢書以先其意或垂善誘使得登其門假以温和之顔賜其清閒之宴大觀宗廟旁見百官上諮為人之紀綱次及作文之利害然後陳百一之誡諷南山之詩醉德冩誠俯而告退琯之願也未敢忘也若其取於是日許時入奉一歲之内得再厠法曹舍人聞詩禮焉人子畢矣豈有恨哉至如笥有衣裳天有秩序聖君在上何人不欲如琯今日未敢生心儻見露之時為左右所器亦願起自燕國門下令衆人别意瞻矚也貪竭鄙志不覺多言妨塵宴私憂危失措儻左右垂無窮之惠降不測之禮錫數字之荅加一介之使則相國保下士之譽小人獲見知之榮光照㣲軀價傳多士輒餙瑣貎以俟軒車上裴度相公書元稹通州司馬元稹謹再拜獻書相公閣下日者相公之掾洛也稹獲陪侍道途不以庸妄諮及章啓則竊聞閣下以文皇勅起居郎書居安思危四字於笏為至戒今陛下當晉武平吳之後閣下即東征而還安孰甚焉思豈可廢况今四邸並開掃門之賔競至碣石餘沴束身之欵未堅則推食握髪之意可遽移於髙枕擊鐘之逸矣且得人則理之談實老生之常語至於切近猶飢者欲食不可惡熟俗而不言也若稹之未學淺見又安敢引喻古昔於閣下獨憶得近日故裴兵部之納人也甄辨精浄號為名流及其為相也搆置羣材使梁棟榱桷咸適其用人頗隘之至於激濁揚清亦無所愛恡是以禀政不累月閣下自外寮為起居郎韋相自巴州知制誥張河南自邕幕為御史李西川自饒州為雜端密勿津梁之地半得其人如故韋纁如稹等㧞於疑礙置於朝行者又十數然後排異已之巨敵引腹心之至交當時一二年間幾至於奸無蹊隧而正有根本矣及山東沴作上以兵事諮之則對以禁暴息人之外不能有以佐震耀是以樽俎之謀不專於廊廟蓋亷善精㣲之士素熟於心胷而汎駕乗桴之材未嘗量校於左右也比於閣下今日之雄材大略為短矣然而即世之後雖無李嚴廖立之思而十年之内備將相號名卿者多其引㧞嗚呼子皮叔牙之功斯不細矣日者閣下方事淮蔡獨當鑪鎚内藴深謀外排羣議始以追韓信㧞吕蒙為急務固非叔孫通薦儒之日也今殊勲既建至化方行亦當念魏鄭公守成之難而三復文皇帝思危之詔乎以愚揆之欲人不怨莫若遷授之有常欲人之竭誠莫若救拯於焚溺何謂有常而不怨以省言之由後行為前行以臺言之自察院轉殿院茍不如是則怨矣茍能如是何怨哉何謂救拯而竭誠稹又不敢移之他人借如小生之庸且昧也固不及班行之中輩又敢自讓於郎吏之末者邪向使元和中一年為拾遺二年為補闕不三四年為貟外又三四年為正郎則宰物者雖朝許之以綸誥暮許之以專席厚則厚矣遽責有隳肝瀝膽同厮養之用力亦難哉及夫為計不良困於溝瀆者十年矣茍有舒其胼攣置之趨走者又不敢愛氣力恡心髓於和扁也是猶龜鼉之有水鳥獸之有林何嘗愧於水木茍或縶而籠之鎻而檻之其或放之投之者則必啁噍顧慕以報人報其免於難也今天下病溝瀆困籠檻思閣下藥之養之投之放之者豈特小生而已哉且曩時之窒閣下及小生者豈不以閣下䟽有居安思危之字為抵忌對上以河南掾尉非貶官為説乎向非裴兵部一二明之則稹終老於貧賤固其宜也儻閣下猶二三年遲迴於外任則少陽邀望之際固未得奉惶惶之命以周知其巢穴當元濟討除之始又安能定已成之冊於上前排未立之疑於衆口哉今天下能不有萬一於閣下之才略而由跼足帖脅私自憐其志力哉况當今陛下在宥四海與人更始特降含垢棄瑕之書且授隨材任能之柄於閣下閣下若不能蕩滌痕累洞開嫌疑棄仇如振塵愛士如救餒使恃才薄行者自贖於煩辱以能見忌者騁力於通衢上以副聖君咸與惟新之德次以廣閣下好善救人之道使千百年外謂閣下與裴兵部為交相短長亦足為賢相矣未盡善也且夫當陛下肇臨宇宙之初與得天乆照之後愈光明矣安有裴兵部㧞羣材於前則盡行閣下㧞羣材於後則盡廢以閣下沐浴恩波之始與徽猷克壯之秋愈汪洋矣又安有救裴寰之罪换禹錫之官則盡易振天下之窮滯行渙汗之條目則盡難稹雖至愚未敢然也稹自十年遭罹多故每欲發書故舊尚不敢盡陳其情豈不知干宰相有不測之罪邪熟自忖之與其瘴死蠻夷自題不遇之牓比夫塵穢尊重伏俟危言之刑無異也聊因所善緘獻鄙誠翹企刑書不敢逃讓不宣稹頓首上鄭相公書歐陽詹將仕郎守國子監四門助教歐陽詹謹齊沐緘書再拜遣𨽻子弟獻於相公中衢之車下庶及乎閣下當今主上聖哲輔相賢明可行已行可止已止其或未行未止非不知也非不念也未可行而未可止也其愚蒙欲陳所知則在知之之後念之之内矣亦何敢言今斯有言自言而已人有百行修萬事精内扣濳鳴外聼无聲非不願用而人不用非不願旌而人不旌雖和平之代至老至死者相公以為有之乎某將十有十百有百千有千也何以若知自近之耳某嘗讀論語得孔子曰古之學者為已今之學者為人傷時之學者不由所學矜所學也某不敏傷切如之况禀羔羊鴻雁之性未資訓導而敬順和合乎教者十或四五絜身畏人負拙自守始以孝悌忠信約禮從儀人生合爾博聞逰藝行義修辭人生固然殊不以有為而為也幸屬昭代以此官人敬趨條目遂希銓擇五試於禮部方售鄉貢進士四試於吏部始授四門館助教某兩應博學宏詞不售一平選被駮又平選始授四門助教也夫人百行庶幾萬事留心不仕則已仕則冀就髙衢逺途展其素蓄垂名于後代播美於當時匪徒利斗粟希片帛救寒暑給朝夕也所以利斗粟希片帛者不能無之其將百行庶幾萬事留心之流有所分别某非斯人之徒歟其慕彼人之徒歟企夫髙衢逺途也噫以四門助教限四考格以五選十年方易一官也自兹循資歴級然得太學助教其考選年數又如四門若如之則二十年矣自茲循資歴級然得國子助教其考選年數又如太學若如之則三十年矣三十年間未離助教之官人
