body:
  text: 吳興姚鉉纂銘甲揔一十首名迹十塗山銘柳宗元仙掌銘獨孤及古函谷關銘虎牢關銘賈至棧道銘歐陽詹仙都山銘張鷺磻溪銘梁肅胥山銘盧元輔天門山銘李白湞陽東嶺洞谷銘元傑塗山銘并序柳宗元維夏后氏建大功定大位立大政勤勞萬邦和寧四極威懷九有儀刑後王當乎洪流方割災𬒳下土自壷口而導百川大功建焉虞帝耄期順承天曆自南河而受四海大位定焉萬國既同宣省風教自塗山而會諸侯大政立焉功莫崇乎禦大災乃錫玄圭以承帝命位莫崇乎執大象乃輯五瑞以建皇極政莫先乎齊大統乃朝玉帛以混經制是所以承唐虞之後垂子孫之丕業立商周之前樹帝王之洪範者也嗚呼天地之道尚德而右功帝王之政崇德而賞功故堯舜至德而位不及嗣湯武大功而祚延于世有夏德配於二聖而唐虞讓功焉功冠於三代而商周讓德焉冝乎立極垂統貽于後裔當位作聖著為世準則塗山者功之所由定德之所由濟政之所由立有天下者冝取於此追惟大號既發華蓋既狩方嶽列位奔走來同山川守臣莫敢遑寧羽旄四合衣裳咸會虔恭就列俯僂聽命然後示之以禮樂和氣周洽申之以德刑天威振耀制立謨訓冝在長久厥後啓征有扈而夏德始衰羿距太康而帝業不守皇祖之訓不由也人亡政墜卒就陵替向使繼代守文之君又能紹其功德修其政統卑官室惡衣服拜昌言平均賦入制定朝會則諸侯常至而天命不去矣兹山之會安得獨光於後歟是以周穆遐追遺法復會於是山聲垂天下亦紹前軌用此道也故余為之銘庶後代朝諸侯制天下者仰則於此其辭曰惟禹體道功厚德茂會朝侯衛統一憲度省方宣教化制殊類咸會壇位承奉儀矩禮具樂備德容既孚乃舉明刑以弼聖謨則戮防風遺骨專車克威克明疇敢以渝宣昭黎獻底定寰區傳祚後胤丕承帝圖塗山巖巖界彼東國惟禹之德配天無極即山刋碑貽後作則仙掌銘并序獨孤及隂陽開闔元氣變化泄為百川凝為崇山山川之作與天地並疑有真宰而未知尸其功者有若巨靈贔屓攘臂其間左排首陽右拓太華絶地軸使中裂拆山脊為兩道然後導河而東俾無有害留此巨迹于峯之巔後代揭厲於玄蹤者聆其風而駭之或謂詼詭不經存而不議及以為學者揔其一域則惑於餘方曽不知創宇宙作萬象月而日之星而辰之使輪轉環繞箭馳風疾可駭於俗有甚於此者徒觀其隂騭無眹未嘗駭焉而巨靈特以有迹駭世世果惑矣天地有官隂陽有藏煆錬六氣作為萬形形有不遂其性氣有不達於物則造物者取元精之和合而散之財而成之如埏埴爐鍾之為瓶為缶為鈎為棘規者矩者大者細者然則黃河華嶽之在六合猶陶冶之有瓶缶鈎棘也於其自然蓋萬化之一工也天機冥動而聖功啓元精密感而外物應故有無迹之迹介于石焉可以見神行無方妙用不測彼管窺者方循迹而求之揣其所至於巨細之境則道斯逺矣夫以手執大象力持化權指撝太極蹴踏皓氣立于無間行乎無窮則據長河如措杯擘太華若破塊不足駭也世人方以禹鑿龍門而導西河為神祇可不謂大哀乎峩峩靈掌纎指如畫隱轔磅礴上揮太淸逺而視之如欲捫靑天而掬皓露攀扶桑而捧白日不去不來若飛若動非至神曷以生此唐興百三十有八載余尉于華隂華人以為紀山弇嵫勒之罘頌嶧山銘燕然舊典也玄聖巨迹豈帝者巡省伐國之不若歟其古之闕文以俟知言歟仰之嘆之斐然琢石為志其詞曰天作高山設險西方至精未分川壅而傷帝命巨靈經啓地脈乃眷斯顧高掌逺跖砉如剖竹騞若裂帛川開山破天動地坼黃河太華自此而闢神返虛極迹挂石壁迹豈我名神非我靈變化翕忽希夷杳冥道本不生化亦無形天何言哉山川以寧斷鼇補天世未覩焉夸娥愚公莫知其蹤屹彼靈掌懸諸巃嵸介二大都亭亭高聳霞赩煙噴雲抱花捧百神依慿萬峯朝拱長於上古以閲羣動下視衆山蜉蝣蠛蠓彼邦人士永揖遺烈瞻之在前如揭日月三川有竭此掌不滅古函谷關銘并序王者建邦經野觀象立極於是有重門擊柝以待暴客故封略土宇守在關塞山川丘陵為之城池天作崤函俾屏京室崇山回合連岡叢倚長河屈盤萬里來束崖奔嶺蹙谷抱溪鬪崫起重險為秦東門截函夏於閫閾鎖天府於戶牖外厄八州之咽喉故百二形焉內權六合之奧區故霸王出焉當其中原鹿駭戰國蝟起嬴氏建瓴山東擇肉宇內持戟百萬連衡此關是時也開門而九國師遁振䇿而二周鼎入奄有大寶遂吞中區洎江返秦璧天祐漢祚高皇帝提劒而起以遏亂略斬白帝紲降王舉漢中平咸陽廓金城以建都活萬姓以三章取威定功此焉是保粵若詢事國牒聆風仙籙則真氣靈蹤起乎其中柱史一去流沙萬里留玉函於舊宅傳寶圖於本枝豈上帝乃脊興王是感不然何錫羡開國如此其大歲在大火余適下陽停驂塞門慿覽舊國襟帶如故世道不留秦餘空山漢遺茂草恐復舟失於壑岸化為谷萬載之後昧者不知乃刻頌此石以示來裔其辭曰天地雷雨英雄交爭設險守國作藩于京姓易時移山空塞平千秋陵谷想見精靈仙駕長往雄圖杳冥于以志之勒銘巖扄虎牢開銘并序賈至天地定位山川據其極王侯設險虎牢擁其要振之以五嶽維嵩崒焉迫之以四瀆洪河突焉冝其咽喉九州閫域中夏贊經綸之攻拒郤攙搶之凌暴若乃金火代變山河分裂脅從力爭義散約解時漢祖守之以臨山東坐清三齊強楚躑躅而不進隋氏失馭中原版蕩封豕荐食龍戰玄黃時則太宗據之以拒河朔克擒醜夏偽鄭袒縳而請命於戲自周室微弱虎狼并吞盛衰千祀正閠更王而政和民安一統長久漢氏昭於前載我唐光於兹日其創業之王戡定功業咸在斯地意者天開險固為霸王之器乎聖作功業知窅冥之意乎不然何玄期時事影響之若此也又聞諸鄭志曰制巖邑也􅉑叔死焉而唐漢紹興得非山靈河神正直是輔乃知不獨恃險而顚沛者在於涼德歟天寶七載至自宋都西經洛陽歇鞍登兹懷古欽望鑒山河之壯麗想威靈而咫尺慨然有懷敢獻頌曰邈矣維嵩峻極于天磅礴崔嵬北臨洪川嶽瀆會險蹙坼封泉實開虎牢作固伊瀍維兹虎牢天設巨防攻在坤下拒在離旁昏恃以滅聖慿而王崢嶸豁呀孟門相向伊昔漢祖戡秦統周勍敵相及此焉淹留終夷海春遂復洪溝乘舋而東奄有九州隋氏敗績黎人艱阻帝命太宗陳師鞠旅鐡騎僔僔雲旗容與擒夏克鄭在此一舉日月永清昆蟲得所歲在戊子西經登兹祇聖肅然憫亡悽其虢叔返道復隍懾師項氏烹苛莫能守之險易同途成敗異時德不在鼎王孫布詞三苗不循魏武忸怩逆失順獲古今同期申鑒勒銘庶警將來棧道銘并序歐陽詹秦之坤蜀之艮連高夾深九州之險也隂溪窮谷萬仞直下奔崖峭壁千里無土亘隔呀絶巉巉冥冥麋鹿無溪猿猱相望三代而往蹄足莫之能越秦雖有心蜀雖有情五萬年間敻不相接且秦之與蜀也人一其性物同所宜嗜欲無餘門教化無餘源可貿遷可親昵擘坼地脈睽離物理豈造化之意乎天實凝淸而成地實凝濁而形當其凝也如鎔金下鑄騰雲上浮空隙有所不開回翔有所不合澄結既定竅缺生乎其中西南有漏天天之竅缺也于斯有兹地地之竅缺也天地也者將以上覆下燾含蓄萬靈可通必使而通者也茍有可通而未通則賢代其工而通之故有為舟以濟川為梯以踰山惟兹地有川不可以舟涉有山不可以梯及粵有智慮以全玄造立巨衡而舉追氏縋懸纑以下梓人猿垂絶冥鳥傍危岑鑿積石以全力梁半空於未用斜根玉壘旁綴靑泥截斷岸以虹矯繞翠屏而龍踠堅徑膠固雲橫砥平揔庸蜀之通途統𡵨雍之康莊都邑之能步山川之無脛若水決防如鴻嚮陽南之北之踵武湯湯躋峩峩以自若臨蒼蒼而不懼繇是贄幣以遙達人神以會同稽禮樂之短長量威力之汙隆可王者王可公者公而相吹以風或曰受琢之石長存可構之材無窮易刓代蠧斯道也未始有終嗚呼為上懷來在乎德為下昭德在乎義德義之如今日則或人之言有孚其反之則石雖存恐不為琢材雖多恐不為構想夫往昔有時而有有時而無是用惕惕天下蚩蚩知聖賢創物之意之人寡明德義固物之道之人稀敢陳兩端之要銘諸斯道之左庶主德義者存今日之所履踵武湯湯者荷古人之攸作銘曰天覆地燾本亦同設大象難全或漏或缺損多益寡聖賢代工彼雖有缺與無缺同惟北曰秦維南則蜀地缺其間坤維不續斗起斷岸屹為兩區秦人路絶蜀火煙孤天實不通賢斯有造鑽堅剡徑無蹊以道若川匪舟若陸非車緣危轉虛步驟交如構雖在功存亦由德項怫劉怒旋見以踣隋落我營自顚而植地非革勢材不易林踣植之致惠怨之心勿謂斯道不恆勿謂斯道可久禮不以禮可有而無恭不以恭可無而有創之之意如彼固之之理若兹彼知不易兹而易知勒銘道左其同我思仙都山銘張鷺仙都有山山出萬山直上千尋入煙霞深圎如笋抽髙突雲隂摽表下國權輿象帝日歟月歟萬有千歲東西大鎮川澤四衛造化無言莫知往制晴嵐依依宿霧洞開髣佛有像神仙下來皓氣氤氲靈鳥環回永殊塵雜不鼓纎埃絶頂霄崿澄湖在上人罕戾止孰窺其狀日燭雲披風飄液飛如雨雨空微灑霑衣谷來松音潭影曙暉往往鶴唳不知所歸唐垂百年玄宗體元響應萬歲聲聞上天帝祚明德祠堂在焉永懷軒后功成此地丹竈猶存龍升萬里事列方志道高靑史無復仙容空流溪水百越之內此山為大恍若壷中疑生象外直而不倚高而不殆古往今來獨立滄海磻溪銘并序梁肅隂陽和而萬物生聖賢合而天下平和者時也合者運也在昔堯舜合禹仰洪水而天下平者四百年湯合伊尹革桀驁而天下平者六百年文武合太公一戎衣而天下平者八百年與夫風雨寒暑五行四時佐天生物一也天之數不可以不變時則有懷山襄陵浩浩滔天之災君之運不可以不極時則有作威殺戮毒痛四海之變變則通時則有四載之庸極則反時則有放伐之功於戲惟尚父鍾其運而遇其主躡其機而作其合者歟于後伯陽不顯仲尼旅人其不合者歟故曰君子得其時則大行不得其時則龍蟠也嘉尚父之動靜不失其時作磻溪銘曰至人無心與道出處處則土木出則雷雨惟殷道絶粵有尚父爰宅于幽盤桓草莽天地闔闢隂陽運行明極而昏昏極而明遇主水濵謨泰八紘牧野桓桓一麾而平惟彼日月得天而光惟彼聖賢得時而彰獨夫昏迷我乃豹藏文武作周我乃鷹揚故曰大道無體大人無方運用變通至虛而常作銘磻溪今古芒茫胥山銘并序盧元輔元和十年冬十月朝散大夫使持節杭州諸軍事杭州刺史上柱國盧元輔視事三歲塵天子書上畏羣靈下慙蒸人乃啓忠祠銘而序曰維唐敷祀典于天下廢淫置明資父事君罔有不舉寢廟既設我命厥新有周行人伍公字子胥陪吳之職得死直言國人求忠者之尸禱水星之舍將瞰鴟革遂臨浙江千五百年廟貌不改漢史遷曰胥山今云靑山者繆也吁善父為孝記曰父讎不與共戴天諌君為忠經曰諸侯有諍臣不失國當枕于宋鄭絶楚出疆在平為未宦臣在奢為既壯子坎壈伏節乞師於吳軍鼓丁寧五戰至郢先哲王建邦啓土著以話言戴后惟人人虐惟后成湯用為大義孔子立為大經子胥修為大仇騷人賦為大怨咸令在上慢惡不生則前戈鞭墓非倒行也後戈走昭非逆施也夫差既王宰嚭受賂二十年內越恁又顚太伯廟血將乾闔閭劒光且失公朝焉宴焉入則諌焉孰謂矢毒孰謂刀寒雖言屢出口而車甲巳困於齊矣蟹稻已奪於歲矣屬鏤之賜竟及其身鴟夷盛尸投于水濵憤悱鼓怒配濤作神其神迄今一日再至來也海鴟羣飛陽侯夾從聲逺而近聲近而逺奮于吳怫于越夕于楚乃退於是仲秋闕望杭人以旗鼓迓之笳簫和之百城聚覩大耀威靈卷沙墨裂地灰截若岸坼成坑迎潮氏格之如吕梁丈人為靈戈威矛瀲浪百重渚塞不先跳檣揭舷再飯之間絶其音聲蕩漭千里洪波砥平有滑有腯有鹹有腥遙實乎下庭山海梯航雞林扶桑交臂于卯階金狄在戶雷鼓在堂魏樽漢豆六代笙簧可謂奉天爵之馨香獲人神之盛禮佐皇震怒驅叱大邪萬里永清人觀斗氣銘曰武王鉞紂子胥鞭平為人為父十死一生矯矯伍貟執弓挾矢杖其寶劒以謁吳子稽首楚罪皆中紂理蒸報子妻殱鉏直士赫赫王閭實聽竒謨錫之金鼓以號以誅黃旗大舉右廣皆朱戮墓非赭瞻昭乃烏後王嗣立執書不泣顚越言潤宰嚭讒輯步光欲飛姑蘇待執吾則切諌抉眼不入投于河上自統波濤晝夜兩至懷沙類騷洗滌南北簸蕩東西夷蠻卉服罔敢不來雖非命祀不讓瀆齊帝帝王王代代明明表我忠哉天門山銘李白梁山博望關扄楚濵夾據洪流實為吳津兩坐錯落如鯨張鱗惟海有若惟川有神牛渚怪物目圍車輪光射島嶼氣凌星辰卷沙揚濤溺馬殺人國泰呈瑞時訛返珍開則九江納錫閉則五嶽飛塵天隂之地無德匪親湞陽果業寺開東嶺洞谷銘并序元傑隂陽精氣結為山嶽者則為勝為異為奧為閟故萬嶺交峙而嵩華辨其方羣嶽斆靈而瀛壷拔其類是知仙居靈宅其必有黨乎鳴絃之北趾果業之東阜高不百仞廣才千畝層巖石室幽谷靈洞殊境異觀秀絶竒偉雖瀑流之下爐峯懸磴之躋丹嶠路逺莫覿余不知其倫擬焉按寺記云昔有方士于是山鋉金變形羽服登仙故石座丹竈至今存焉觀其東嶺削成石瑩如玉岡巒峭竦巖壁重復捫藟而升如造雲根縹眇嬋姢似霞衣可攀真氣勝而塵纍捐五蓋破而淸機間蕩然放懷如羽翼之巳生赤城之可接噫境變志遷若符契之協從也下臨長川澄波吐瀾煙霞夕收飛鳥不喧杳渺逶迤流注無間西直巨壑連嶂如屏林靄朝翠巖光晝淸篠簜藏輝杉松下冥虛廓寂寥涵風有聲緣嶺未極劃開洞門黛容崢嶸詭狀輪囷疑伏龍怪鎮含煙雲又有古木倒傍絶壁盤根網結挂絡空碧崩崖傍傾猿徑下庂羽人幽會此焉瑶席搏翠壁而直上軋﨑嶇於紫氛雙巖屹以中斷奔屏蹙而成室涵孕精爽澄凝氣源信列仙之攸居豈塵俗之所止哉嗚呼鶴駕一去鳯簫響絶荆榛蔽路危磴敗滅迹留人境而舉世莫知地聮精剎而羣遊莫至吁可怪乎其晦藏也元和丙申歲秋八月余以膠鬲之困寓居精舍再從兄昭肅時假兹邑政便於人務簡多睱與當寺僧知捷日探道源捷亦好古叨竒之士也因語故實𬗟思羽客之玄風以為靈迹神蹤精誠必復乃操刃持畚履險通幽梯絶棧而歷巉巖排蒙籠而登杳藹時更不稔而神居祕躅粲然皆睹嗟乎芝田玄圃豈逺乎哉天之與人氣通則合客有顧咨而諗豫者或應之曰天之運否泰相濟故善利稱德有下民昏墊人之道行藏有數故棘津蓬纍時惟鷹揚靈物必通道在斯著不然何荒阻千祀勃焉而興歟乃為銘曰鑿石通道兮援木枝仰攀洞口兮踐欹危奔龍伏虎兮勢狀竒林攢峯倚兮蟠雲螭下臨隂谷兮神以栗嵌巖巖兮洞無極老松蕭瑟兮生逺風興雲霈霈兮煙霧黑懸巖排空兮色噴黛堅根網絡兮層霄外披霓解帶兮羽翼生下眺遙江兮入靑靄世道紛綸兮何足謂朝為榮華兮夕憔悴不如幽谷兮閲仙經兾接浮丘兮整煙轡我窺丹竈兮坐山腹衆峯參差兮隱雲族鑿仙嶺兮望瑤臺朝霞照海兮銱綺開信赤松之所升降王喬之所往來道或用晦兮靈物斯濳殷道未昌兮説築傅巖紛豫感此兮勒銘雲根山既不杇兮與名長存重校正唐文粹卷第六十六
