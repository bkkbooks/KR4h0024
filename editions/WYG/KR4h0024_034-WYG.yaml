front:
  text: 天三
  hash: sha256:6d48febdff6f43a836cd55be043e00accfeb10e7ef73df8abb2f072b8de065ce
body:
  text: 天論上劉禹鍚天論中天論下帝王三荀悦論髙祖武宣論李徳裕漢昭論漢元論封禪一漢武封禪論林簡言封建三封建論栁宗元五等論朱敬則漢祖吕后五等論李翰興亡二兩漢辨亡論權徳輿三國論李徳裕正統一東晉元魏正閏論皇甫湜天論上劉禹錫世之言天者二道焉拘於昭昭者則曰天與人實影響禍必以罪降福必以善來窮阨而呼必可聞隠痛而祈必可荅如有物的然以宰者故隂隲之説勝焉泥於冥冥者則曰天與人實刺異霆震于畜木未嘗在罪春滋乎堇荼未嘗擇善跖蹻焉而遂孔顔焉而厄是茫乎無有宰者故自然之説勝焉余之友河東解人栁子厚作天説以折韓退之言文信美矣蓋有激而云非所以盡天人之際故余作天論以極其辯云大凡入形氣者皆有能有不能天有形之大者也人動物之尤者也天之能人固不能也人之能天亦有所不能也故余曰天與人交相勝耳其説曰天之道在生植其用在彊弱人之道在法制其用在是非陽而阜生隂而肅殺水火傷物木堅金利壯而武徤老而耗眊氣雄相君力雄相長天之能也陽而藝樹隂而揫斂防害用濡禁焚用光斬材窽堅液礦硎芸義制强訐禮分長幼右賢尚功建極閑邪人之能也人能勝乎天者法也法大行則是非為公天下之人蹈道必賞違之必罰當其賞雖三旌之貴萬鍾之禄處之咸曰宜何也為善而然也當其罰雖族屬之夷刀鋸之慘處之咸曰宜何也為惡而然也故其人曰天何預乃人事耶惟告䖍報本肆類授時之禮曰天而已矣福兮可以善取禍兮可以惡召奚預乎天耶法小弛則是非駮賞不必盡善罸不必盡惡或賢而尊顯時以不肖叅焉或過而僇辱時以不辜叅焉故其人曰彼宜然而信然理也彼不當然而固然豈理耶天也福或可以詐取而禍或可以苟免人道駮故天命之説亦駮焉法大弛則是非易位賞常在佞而罰常在直議不足以制其强刑不足以勝其非人之能勝天之具盡喪而名徒存彼昧者方挈挈然提無實之名欲抗乎言天者斯數窮矣故曰天之所能者生萬物也人之所能者治萬物也法大行則其人曰天何預人耶我蹈道而已法大弛則其人曰道竟何為耶任天而已法小弛則天人之論駮焉今人以一已之窮通而欲質天之有無惑矣余曰天常執其所能以臨乎下非有禎乎治亂云爾人常執其所能以仰乎天非有預乎寒暑云爾生乎治者人道明咸知其所自故徳與怨不歸乎天生乎亂者人道昧不可知故由人者舉歸乎天非天預乎人云爾天論中或曰予之言天與人交相勝其理微庸使户曉盍取諸譬焉劉子曰若知旅乎夫旅者羣適乎莽蒼求休乎茂木飲乎水泉必强有力者先焉否則雖聖且賢莫能競也斯非天勝乎羣次乎邑郛求䕃于華榱飽乎餼牢必聖且賢者先焉否則强有力莫能競也斯非人勝乎苟道乎虞芮雖莽蒼猶郛邑然苟由乎匡宋雖郛邑猶莽蒼然是一日之途天與人交相勝矣吾固曰是非存焉雖在野人理勝也是非亡焉雖在邦天理勝也然則天非務勝乎人者也何哉人不宰則歸乎天也人誠務勝乎天者也何哉天無私故人可務乎勝也吾於一日之途而明乎天人取諸近也已問者曰若是言之則天之不相去乎人也信矣古之人曷引天為荅曰若知操舟乎夫舟行乎濰淄伊洛者疾徐存乎人次舍存乎人風之怒號不能皷為濤也流之泝洄不能峭為魁也適有迅而安亦人也適有覆而膠亦人也舟中之人未嘗有言天者何哉理明故也彼行乎江河淮海者疾徐不可得而知也次舍不可得而必也鳴條為風可以沃日車蓋之雲可以見怪恬然濟亦天也黯然沈亦天也阽危而僅有亦天也舟中之人未嘗有言天者何哉理昧故也問者曰吾見其駢焉而濟者風水等耳而有沈有不沈非天曷司歟荅曰水與舟二物也夫物之合并必有數存乎其間焉數存然後勢行乎其間焉一以沈一以濟適當其數適乗其勢耳彼勢之附乎物而生猶影響也本乎徐者其勢緩故人得以曉也本乎疾者其勢遽故難得以曉也江海之覆也猶伊淄之覆也勢有疾故有不曉耳問者曰子之言數存而勢生非天也天果狹于勢耶荅曰天形常圓而色常青周迴可以度得晝夜可以表候非數之存乎常髙而不卑常動而不已非勢之乗乎今夫蒼蒼然者一受其形于髙大而不能自還于卑小乗其氣于動用而不能自休于俄頃又惡能逃乎數而越乎勢耶吾固曰萬物之所以為無窮者交相勝而已矣還相用而已矣天與人萬物之元者爾問者曰天果以有形而不能逃乎數彼無形者子安所寓其數耶荅曰若所謂無形者非空乎空者形之希微者也為體也不妨乎物而為用也常資乎有必依于物而後形焉今為室廬而髙厚之形藏乎内也為器用規矩之形起乎内者也音之作也有大小而響不能踰表之立也有曲直而影不能踰非空之數歟夫目之視非能有光也必因乎日月火燄而後光存焉所謂晦而幽者目有所不能燭耳彼狸猩犬䑕之目庸謂晦而幽耶吾故曰以目而視得形之相者以智而視得形之微者也焉有天地之内有無形者耶古所謂無形蓋無常形耳必因物而後見耳焉能逃乎數耶天論下或曰古之言天之厯象有宣夜渾天周髀之書言天之髙逺卓詭有鄒子今之言有自乎答曰吾非斯人之徒也大凡入乎數者由小而推大必合由人而推天亦合以理揆之萬物一貫也今夫人之有頭目耳鼻齒毛頥口百骸之粹美者也然而其本在乎腎膓心腑天之有三光懸寓萬象之神明者也然而其本在乎山川五行濁為清母重為輕始兩位既儀還相為庸嘘為雨露噫為雷風乗氣而生羣分彚從植類曰生案書傳海隅蒼生謂草木動類曰蟲倮蟲之長為智最大能執人理與天交勝用天之利立人之紀紀綱或壞復歸其始堯舜之書首曰稽古不曰稽天幽厲之詩首曰上帝不言人事在舜之庭元凱舉焉曰舜用之不曰天授在商中宗襲亂而興心知説賢乃曰帝賚堯民之餘難以神誣商俗已譌五禾反引天而敺由是而言天預人乎荀悦論髙祖武宣論李徳裕荀悦論畧曰髙祖天下初定庶事草創文帝躬行𤣥黙遂至升平而古典未備制度多闕武帝内修文學外耀武威而不盡其術不克其終宣帝任法審刑採覈名實而不用儒術理化不成厯數三代以及元帝曰崇尚儒學從諫如流引班固贊賓禮故老優游亮直又曰貢薛韋匡迭為宰相其㫖以為専用儒術莫盛於此班固荀悦皆文雅之士以元帝好儒徴用儒生故以兹為美而深罪石顯痛心泣血稱詩人投畀豺虎嫉之甚也異乎余之所聞矣任恭顯始於宣帝當宣帝之世石顯豈能隳其大業哉則知惡不在於顯矣蕭望之周堪皆廊廟之器有師傳之恩石顯所忌廢而不用朋龍上書遂致于理其後劉向禁錮張猛自殺豈得謂之優游亮直乎賈捐之京房雖不終其身亦皆英特雋才道術竒士於元帝可謂忠矣亦因譖而死惑於讒邪則不斷疑於髦雋則用法亦不得謂之優游矣貢薛雖能忠諫止于諷諭恭儉未嘗禦姦觸邪矣韋匡從容守位未曽犯顔干色矣所以得乗時而進久安其位昔桀紂殺一龍逢比干而天下之惡歸焉桀紂以拒諫自殺其悖已甚元帝以信讒而殺抑又甚焉王業既衰至成哀陵替纔三世而王莽簒奪宣帝稱亂吾家者太子也知子莫若父信哉是言漢昭論人君之徳莫大於至明至明以照姦則百邪不能蔽矣漢昭帝是也年十四而知燕王書詐後有譖霍光者上輒怒曰敢譖毁者坐之周成王有慙徳矣髙祖文景俱不如也成王聞管蔡流言覩召公不悦遂使周公狼跋而東鴟鴞之詩作矣漢髙聞陳平去魏背楚欲捨腹心臣漢文惑季布使酒難近罷歸肱股郡疑賈生擅權紛亂復疎賢士景帝信讒誅鼂錯兵解遂戮三公所謂執狐疑之心來讒賊之口向使昭帝得伊吕之佐則成康不足侔矣惜哉霍光不學無術未稱其徳然輕徭薄賦與人休息匈奴和親百姓充實議鹽鐵而罷㩁酤亦信任忠臣之效也纔弱冠而殂功徳未盡可以痛矣漢元論漢元帝習武帝游宴後庭又隆好音樂與𢎞恭石顯圖議帷幄之中進退天下之士史臣贊曰優游不斷漢宣之業衰焉余以班固之言未盡其僻此蓋懦而不才權移所嬖非不斷也夫帝王者天也天以剛徤為氣粹精為體氣剛而明則三光不昏體粹而精則四氣不亂剛也者不息之謂也故權衡獨運嵗時不忒粹也者不雜之謂也故􅆾氣消散隂陽不謬若運動不在於權軸鎔鑄不由於大冶蕩蕩上帝復何為哉書曰天聰明自我民聰明又曰天視自我民視天聼自我民聼豈堯舜之時上下皆公讒説不行人與其聰明哉豈幽厲之君上下盡邪讒言相蔽人不與其聰明哉元帝自稱淫亂之君各賢其臣令皆覺悟天下安得危亡之君元帝當自以恭顯為賢而任之不疑也漢武封襌論林簡言仲尼以季氏旅於泰山為僭漢武封泰山非僭歟抑聞無其位無其徳為事僭也有其位無其徳為事亦僭也又聞封泰山報成功也斯皆徳稱乎位者為之若伏羲神農者也若軒轅顓頊者也若堯舜禹湯者也漢武封禪奚慕哉秦乎伏羲乎堯舜乎秦封禪二代而秦滅固不可慕也若以伏羲堯舜為心亦宜訪伏羲堯舜之道歟以所行之道侔之乎不侔之乎彼茅茨不翦而木不呈材豈曰侔哉彼舞干兩階而黷武窮邊豈曰侔哉彼用夔典樂而李延年進豈曰侔哉彼設謗木而捕人誹者死豈曰侔哉凡所舉雖厮養之人亦知不侔矣在漢武計宜罷去不侔行其侔者已行之則卿大夫行之卿大夫行之則國人行之夫如是雖不封禪而伏羲堯舜之徳之美自至矣奈何不遵此道取司馬相如腴佞遺草内欺於方寸外欺於千古矯名竊徳冐烟雲躡凌競封泰山禪梁父好商辛夏癸之好迹伏羲堯舜之迹季氏之僭安可逃乎昔齊桓公議封禪管夷吾用他辭以罷之以其無帝王位故也無徳與無位相去㡬何儻漢朝有人如管夷吾應用三脊茅以藉口不使其君與季氏等封建論栁宗元天地果無初乎吾不得而知之也生人果有初乎吾不得而知之也然則孰為近曰有初為近孰明之由封建而明之也彼封建者更古聖王堯舜禹湯文武而莫能去之蓋非不欲去之也勢不可也勢之來其生人之初乎不初無以有封建封建非聖人之意也彼其初與萬物偕生草木榛榛鹿豕狉狉人不能搏噬而且無毛羽莫克自奉自衞荀卿有言必將假物以為用者也夫假物者必爭爭而不已必就其能斷曲直者而聴命焉其智而明者所伏必衆告之以直而不改必痛之而後畏由是君長刑政生焉故近者聚而為羣羣之分其争必大而後有兵有刑徳又大者衆羣之長又就而聴命焉以安其屬於是有諸侯之列則其争又有大者焉徳又大者諸侯之列又就而聴命焉以安其封於是有方伯連率之類則其争又有大者焉徳又大者方伯連率之類又就而聴命焉以安其入然後天下㑹于一是故有里胥而後有縣大夫有縣大夫而後有諸侯有諸侯而後有方伯連率有方伯連率而後有天子自天子至于里胥其徳在人者死必求其嗣而奉之故封建非聖人意也勢也夫堯舜禹湯之事逺矣及有周而甚詳周有天下裂土田而𤓰分之設五等邦羣后布濩星羅四周于天下輪運而輻集合為朝覲㑹同離為守臣扞城然而降于夷王害禮傷尊下堂而迎覲者厯于宣王挾中興復古之徳雄南征北伐之威率不能定魯侯之嗣凌夷迄于幽厲王室東徙而自列為諸侯厥後問鼎之輕重者有之射王中肩者有之伐凡伯誅萇𢎞者有之天下乖盭音戾無君君之心余以為周之喪久矣徒建空名於公侯之上耳得非諸侯之盛强末大不掉之咎歟遂判為十二合為七國威分于陪臣之邦國殄于後封之秦則周之敗端其在乎此矣秦有天下裂都㑹而為之郡邑廢侯衞而為之守宰據天下之雄圖都六合之上游攝制四海運于掌握之内此其所以為得也不數載而天下大壊有由矣亟役萬人暴其威刑竭其貨賄負鋤謫戍之徒圜視而合從大呼而成羣時則有叛人而無叛吏人怨于下而吏畏于上天下相合殺守刼令而並起咎在人怨非郡邑之制失也漢有天下矯秦之枉徇周之制剖海内而立宗子封功臣數年之間奔命扶傷之不暇困平城病流矢凌遲不救者三代後乃謀臣獻畫而離削自守矣然而封建之始郡邑居半時則有叛國而無叛郡秦制之得亦已明矣繼漢而帝者雖百代可知也唐興制州邑立守宰此其所以為宜也然猶桀猾時起虐害方域者失不在于州而在于兵時則有叛將而無叛州州縣之設固不可革也或者曰封建者必私其土子其人適其俗修其理施化易也守宰者苟其心思遷其秩而已何能理乎余又非之周之事跡斷可見矣列侯驕盈黷貨事戎大凡亂國多理國寡侯伯不得變其政天子不得變其君私土予人者百不有一失在于制不在于政周事然也秦之事迹亦斷可見矣有聖人之制而不委郡邑是矣有理人之臣而不使守宰是矣郡邑不得正其制守宰不得定其理酷刑苦役而萬人側目失在于政不在于制秦事然也漢興天子之政行於郡不行於國制其守宰不制其侯王侯王雖亂不可變也國人雖病不可除也及夫大逆不道然然揜捕而遷之勒兵而夷之耳大逆未彰奸利浚財怙勢作威大刻于民者無如之何及夫郡邑可謂理且安矣何以言之且漢知孟舒于田叔得魏尚于馮唐聞黄霸之明審覩汲黯之簡靖拜之可也復其位可也卧而委之以輯一方可也有罪得以黜有能得以奬朝拜而不道夕斥之矣夕受而不法朝斥之矣假使漢室盡城邑而侯王之縱令其亂人戚之而已孟舒魏尚之術莫得而施黄霸汲黯之化莫得而行明譴而導之拜受而退已違矣下令而削之締交約從之謀周于同列則相顧裂眺勃然而起幸而不起則削其半削其半民猶瘁矣曷若舉而移之以全其人乎漢事然也今國家盡制郡邑連置守宰其不可變也固矣善制兵謹擇守則理平矣或者又曰夏商周漢封建而延秦郡邑而促尤非所謂知理者也魏之承漢也封爵猶建晉之承魏也因循不革而二姓凌替不聞延祚今矯而變之垂二百祀大業彌固何繫于諸侯哉或者又以為商周聖王也而不革其制固不當復議也是大不然夫商周之不革者是不得已也蓋以諸侯歸商者三千焉資以黜夏湯不得而廢歸周者八百焉資以勝商武王不得而易徇之以為安仍之以為俗湯武之所不得已也夫不得已非公之大者也私其力于已也私其衞于子孫也秦之所以革之者其為制公之大者也其情私也私其一已之威也私其盡臣畜于我也然而公天下之端自秦始夫天下之道理安斯得人者也使賢者居上而不肖者居下而後可以理安今夫封建者繼世而理繼世而理者上果賢乎下果不肖乎則生人之理亂未可知也將欲利其社稷以一其人之視聴則又有世大夫世食禄邑以盡其封畧聖賢生于其時亦無以立于天下封建者為之也豈聖人之制使至于是乎吾固曰非聖人之意也勢也五等論朱敬則昔秦廢五等崔寔仲長統王朗曹冏等皆以為秦之失余竊異之誠通其志云蓋明王之理天下也先之以博愛本之以仁義張四維尊五美懸禮樂于庭宇置軌範於中衢然後决𤣥波使横流揚薰風以髙扇浮愷悌之甘澤浸曠蕩之膏腴正理革其淫邪淳風柔其骨髓使天下之人心醉而神足其於忠義也立則見其叅於前其於進趨也皎若章程之在目禮經所及等日月之難踰聲教所行雖風雨之不輟聖人知俗之漸化也王道之已行也於是體國經野庸功勲親分山裂河設盤石之固内守外禦有維城之基連結徧於城中膠葛盡於封内雖道昏時喪澤竭政塞鄭伯逐王申侯殺主魯不供物宋不城周吳徴百牢楚問九鼎小白之一匡天下重耳之一戰諸侯無君之迹顯然簒奪之謀中寢者直以周禮尚存簡書不隕故曰不敢失墜天威在顔自春秋之後禮義漸頽風俗塵昏愧恥心盡疾走先得者為上奪攘知命者為能加以八世専齊三家分晉子貢之亂五國蘇秦之鬬七雄苛刻薄興經籍道息莫不長詐術貴攻戰萬姓皆戴爪牙無人不屬觜距所以商鞅欺故友李斯囚舊交孫臏喪足于龐涓張儀得志於陳軫一旅之衆便欲稱王再戰之雄争來奉帝先王㑹盟之禮昔時樽俎之容三代之風掃地盡矣況始皇削乎區宇殊非至公李斯之作股肱罕循大道人無見徳唯虐是聞當此時也主猜于上人駭于下父不能保之于子君不能得之于臣欲使始皇分土姦雄建侯薄俗若喻晉鄭之可依便借賊兵而資盜糧寄龍魚而助風雨不可行也是以秦鑒周徳之緜深懼已圖之不逺罷侯置守髙下在心天下制在一人百姓不聞二主直是不得行其世封非薄功臣而賤骨肉也髙皇帝揭日月之明懷天地之量算財不足以分賞論功不足以受封邑皆百城土有千里人殷國富地廣兵强五十年間七國同反賈誼憂其國大鼂錯請削其地若言由大而反也不若召陵之師踐土之衆也若言有材而起也劉濞非王霸之材田禄無先管之畧也且齊晉以逆禮為慙吳楚以犯上非媿釁由教起其所由來逺矣自此之後雜霸又衰中興不能改物創圖黄初不能深謀逺慮􅃡乎漢魏之際尋其經緯之初未有積德重光澤及萬物觀其教偷薄于秦風察其人犲狼于漢日故魏太祖曰若使無孤天下㡬人稱帝㡬人稱主明竊號議者觸目皆是欲以此時開賜履之祚垂萬代之封必有通車三川以闚周室介馬汾隰而逐翼侯王司徒屢請于當時曹元首又勤于宗室皆不知時也漢祖吕后五等論李翰或稱漢祖建五等封異姓其計得乎髙后立四王非劉氏其事順乎嘗試論之曰夫思治惡亂體國之常理去危就安宅生之大域然而制業圖逺隨化㑹機是非較于毫釐得失差于興滅可不謂然乎揆夫髙祖造漢殷鑒亡秦宗族無尺寸之封子弟立虚空之地故衆枝莫助而孤根易拔封建之心肇於此矣又謂大業可以力取神􅄊推於命歸思得包四海以獨富舉百郡以從欲而外誘異端内疑成計及見羣心交阻偶語間興適悟天下不可獨理専欲不能蓋衆分利推恩乃先封雍齒然後將士斂手不懷反覆豪俊息慮知難搖動五等之制於是行焉既而鸞輅龍旂皆王室昭穆黼衣朱黻即功臣子孫君利世祚人安定主上敦子愛之情下結體信之志羣后固犬牙之勢匹夫絶烏合之舉此所以為計之是也何創五等之議不遵三代之典境土踰溢隄防漏下權敵上都制方偶國過當啟陵僭之端怙强連交争之兆賈􅁩痛其將亂鼂錯憂其必危卒使諸侯失節朝廷忿忌此所以為計之非也且夫中興之主不讓肇基之勲成務之臣有髙佐命之力故禮樂大備取惟新之格言琴瑟不調除仍舊之弊法觀乎孝惠既崩髙后稱制侯王諸吕何不可哉當若早置禄産之位宜序親疎之節小其國以圖全薄其勢以逺害而陳平周勃亦分茅錫土將相之後誓同山河舅甥之國穆若唇齒預閉覬覦之心不踐嫌猜之路克復明辟决自我躬髙謝壽陵無負先帝安有齊兵之觀變代邸之危疑哉此所以為計之得也神害久盈物無兩大以吕氏之盛跨漢朝之權専禁兵以候疑秉大政以速謗趦趄異姓蓄姦候隙刺促大臣側目相視自投機穽實履憂虞此所以為計之失也嗚呼物有益之而損損之而益凡人臨事多惑視徃則明向使髙祖吕后觀既往之勢析當時之疑㫁必然之策杜未萌之禍則惠文之間無劉吕之難哀平之未有晉鄭是依況復周陳諸家休戚連漢黎獻思徳謳歌未改雖天命興廢孰能明之然人謨協宻必無悔矣兩漢辨亡論權徳輿言兩漢所以亡者皆曰莽卓予以為莽卓簒逆汗神器以亂齊民自賈夷滅天下耳目顯然聞知静徴厥初則亡西京者張禹亡東京者胡廣皆以假道儒術得伸其邪心徼一時大名致位公輔辭氣所發損益繫之而多方善柔保位持禄或陷時君以滋厲階或附兇沴以結禍胎故其蕩覆之機簒奪之兆皆指導馴致之雖年祀相逺猶手授頥指之然也其為賊害豈直莽卓之比乎禹以經術為帝師身備漢相特見尊信當主臣之重極儒者之貴永始元延之間天地之災屢見言事者皆譏切王氏専政時成帝亦悔懼天變而未有以决駕至禹第辟左右以問之須其一言以為律度為禹計者亦宜陳大易堅氷之誡誦小雅十月之刺乗其嚮納痛言得失反以罕言命不語怪為辭致成帝不疑之心授王氏寖盛之勢上下恬然晻忽亡國儻帝慮不至是猶當開陳切劘靣列廷辨矧當就第宴閒之際虚懷放决之時方且視小男於牀下官子壻於近郡欵然用家人匹婦為心以身圖安不恤國患致使羣盜弄權迭執魁柄禍稔毒流至于新都不可遏也斯可憤也逮至東都順桓之間國統三絶胡廣以巨儒柄用位極上台初梁冀席外戚之重貪戾當國既鴆質帝議立嗣君公卿大臣皆以清河王䔉年長有徳屬最尊親可以靖人亦既定策冀乃憚其明哲且不利長君私于蠡吾獨異羣議為廣計者亦當中立如石介然不回率趙誠之徒同李杜所守然後與三事百工正辭于朝雖冀之暴恣豈能一旦盡誅漢廷羣公耶反徇一息之安首鼠畏懦竟使清河徙廢蠡吾為梗邦家陵夷漢道日蹙結黨錮之獄成閹寺之禍禍亂循環以至董卓赫赫漢室化為當塗蓋棟橈鼎折之所由來久矣彼梅福以孤逺上疏張綱以卑秩埋輪獨何人哉而不是思也噫嘻就利違害榮通醜窮大凡有生之常性也暨乎手持政柄體國存亡則謹之于初决之于始以導善氣以遏亂源若禍胎既萌則死而後已白刃可蹈鴻毛斯輕奈何禹廣以宴安之時則務小忠立細行數數然獻吉筮于露蓍沮立后于探籌及夫安危之際邦家之大則甘心結舌隂拱觀變豈止然也方又熾熖熖以燎原決湯湯以襄陵投天下于烟煨擠萬人于昏墊百代之下無所指名雖史贊粗言而不究論本末且出不越境書殺君之惡言偽而辯有兩觀之誅若當春秋之時明禹廣之罪作誡來世可勝紀乎向使西京抑損王氏尊君卑臣則庶乎無哀平之壞東京登庸清河主明臣忠則庶乎無靈獻之亂大漢之祚未易知也或以國之興亡皆有隂隲之數非人謀能亢則但取瞽聾者而相之立土木偶而尊之被以章組列於廊廟斯可矣何堯舜之或咨或吁殷周之或夢或卜憂勤日昃之若是然後為理耶予因肄古史且嗜春秋襃貶之學心所憤激故辯其所以然三國論李徳裕魏吳蜀三分天下而亡有先後非形勢有輕重積仁義有厚薄察其政柄所歸則亡之先後可知也蜀政在於黄皓皓隸人也内不能修武侯之舊典外不能制姜維之黷武紀綱日壞君子不服所以先亡也魏自明帝之後政歸仲達齊王以降惟守空宫亡之奄速繫于昭昭之志將移神器之重須服天下之心未立大功亦不敢取所以蜀滅而魏亡也孫皓雖驕奢極欲殘虐用刑而自専殺生之柄不牽帷牆之制運盡天亡而後夷滅由是而知人君不可一日失其柄也如神龍之脱深泉震雷之無煙氣威靈既露人得制之蔣濟覩魏文帝與夏侯尚詔曰作福作威為亡國之言所謂柄者威福是也豈可假于臣下哉後代覩三國之事可不戒懼焉東晉元魏正閏論皇甫湜論曰王者受命于天作主于人必大一統明所授所以正天下之位一天下之心舜傳之堯禹傳之舜以徳禪者也桀放于湯受殺於武以時合者也秦滅二周兼六國以力成者也漢革秦社稷以義取者也故自堯以降或以徳或以時或以力或以義承授如貫終始可明雖殊厥跡皆得其正以及魏取于漢晉得于魏史策既載彰明可知百王既通行萬代無異辭矣惠帝無道羣胡亂華晉之南遷實曰元帝與夫祖乙之圯耿盤庚之徙亳厲王之居彘平王之避戎其事同其義一矣而拓跋氏種實匈奴來自幽代襲有先王之桑梓自為中國之位號謂之滅邪晉實未改謂之禪邪已無所傳而往之著書者有帝元今之為録者皆閏晉可謂去之逺矣或曰元之所據中國也對曰所以為中國者以禮義也所以為夷狄者無禮義也豈繫于地哉杞用夷禮杞即夷矣子居九夷夷不陋矣沐紂之化商士為頑人矣因戎之遷伊川為陸渾矣非繫於地也晉之南渡人物攸歸禮樂咸在風流善政史實存焉魏氏恣其强暴虐此中夏斬伐之地雞犬無餘驅士女為肉籬委之戕殺指衣冠為芻狗逞其屠刈種落繁熾厯年滋多此而帝之則天下之士有蹈海而死天下之人有登山而餓忍食其粟而立于朝哉至于孝文始用夏變夷而易姓更法將無及矣且授受無所謂之何哉又曰周繼元隋繼周國家之興實繼隋氏子謂是何對曰晉為宋宋為齊齊為梁江陵之滅則為周矣陳氏自樹而奪無容於言况隋兼江南一天下而授之于我故推而上我受之隋隋得之周周取之梁推梁而上以至于堯舜得天統矣則陳姦于南元閏于北其不昭昭乎其不昭昭乎唐文粹巻三十四欽定四庫全書唐文粹巻三十五宋姚鉉編
