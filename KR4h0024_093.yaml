body:
  text: 吳興姚鉉纂序丙揔一十七首集序唐著作佐郎顧況文集序皇甫湜唐太常寺協律郎李賀歌詩序杜牧唐四門助敎歐陽詹文集序李貽孫唐太子校書李觀文集序陸希聲唐楊州功曹蕭頴士文集序李華唐崔公山池後集序李翰唐東臯子集序吕才刪東臯子集序陸淳唐中嶽宗元先生吳筠尊師文集序權德輿唐釋靈澈上人文集序劉禹錫篋中集序元結唐容州經略使元結文編後序李啇隱樊川文集後序裴廷翰毗陵集後序梁肅題栁栁州集後司空圖唐大理評事楊君文集後序栁宗元注愍征賦後述司空圖唐故著作佐郎顧況集序皇甫湜吳中山泉氣狀英淑怪麗太湖異石洞庭朱實華亭清唳與虎丘天竺諸佛寺鈎綿秀絶君岀其中間翕輕清以爲性結泠汰以爲質喣鮮榮以爲詞偏於逸歌長句駿發踔厲往往若穿天心岀月脇意外驚人語非㝷常所能及最爲快也李白杜甫已死非君將誰與哉君字逋翁諱況以文入仕其爲人類其詞章甞從韓晉公於江南爲判官驟成其磊落績入佐著作不能慕顧爲衆排爲江南郡丞累歲脫縻無復北意起屋於茅山意飄然若將續古三仙以壽卒湜以童子見君楊州孝感寺君披黃衫白絹鞳頭眸子瞭然烱烱清立望之眞白圭振鷺也旣接歡然以我爲楊雄孟軻顧恨不及見三十年於兹矣知音之厚曷甞忘諸去年從丞相涼公襄陽有曰顧非熊生者在門訊之即君之子也岀君之詩集二十卷泣余發之涼公適移􅊩宣武軍余裝歸洛陽諾而未副今又稔矣生來速文乃題其集之首爲序唐太常寺奉禮郎李賀歌詩集序杜牧大和五年十月中半夜時舎外有疾呼傳緘書者某曰必有異亟取火來及發之果集賢學士沈公子明書一通曰我亡友李賀元和中義愛甚厚日夕相與起居飲食賀且死甞授我平生所著歌詩雜爲四編凡若干首數年來東西南北良爲巳失去今夕醉解不復得寐即閱理篋帙忽得賀詩前所授我者思理往事凡與賀話言嬉遊一處所一物候一日夕一觴一飯顯顯焉無有忘棄者不覺岀涕賀復無家室子弟得以給養䘏問常恨想其人詠其言止矣子厚於我與我爲賀集序盡道其所來由亦少解我意某其夕不果以書道不可明日就公謝且曰丗爲賀才絶岀前讓居數日某深惟公曰公於詩爲深妙竒博且復盡知賀之得失短長今實敘賀不讓必不能當君意如何復就謝極道所不敢敘賀公曰子固若是是當慢我某因不敢辭勉爲賀敘然其甚慙皇諸孫賀字長吉元和中韓吏部亦頗道其歌詩雲煙綿聮不足爲其態也水之迢迢不足爲其情也春之盎盎不足爲其和也秋之明絜不足爲其格也風檣陣馬不足爲其勇也瓦棺篆鼎不足爲其古也時花美女不足爲其色也荒國陊殿梗莽丘隴不足爲其恨怨悲愁也鯨呿鼇擲牛鬼蛇神不足爲其虚荒誕幻也蓋騷之苗裔理雖不及辭或過之騷有感怨刺懟言及君臣理亂時有以激發人意乃賀所爲無得有是賀能探㝷前事所以深歎恨今古未甞經道者如金銅仙人辭漢歌補梁庾肩吾宫體謡求取情狀離絶遠去筆墨畦逕間亦殊不能知之賀生二十七年死矣丗皆曰使賀且未死少加以理奴僕命騷可也賀死後凡十五年京兆杜某爲其序唐故四門助敎歐陽詹文集序李貽孫歐陽君生于閩之里㓜爲兒孩時即不與衆童親狎行止多自處年十許歲里中無愛者毎見江濵山畔有片景可採心獨娛之常執卷一編忘歸於其間逮風月清暉或暮而尚留窅不能釋不自知所由蓋其性所多也未甚識文字隨人而問章句忽有一言契於心移日自得長吟高嘯不知其止也父母不識其志毎常謂里人曰此男子未知其旨何如要恐不爲汩没之餓氓也未知爲吉邪凶邪鄕人有覽事多而熟於聞見者皆賀之曰若此家寶也柰何慮之過歟自此遂日知書服聖人之敎慕愷悌之化逹君臣父子之節忠孝之際唯恐不及操筆屬詞其言秀而多思率人所未言者君道之甚易由是振發於鄕里之間建中貞元時文詞崛興遂大振耀歐閩之鄕不聞有他人也㑹故相常衮來爲福之觀察使有文章高名又性頗嗜誘進後生推抜於寒素中唯恐不及至之日比君爲芝英毎有一作屢加賞進遊娛燕饗必召同席君加以謙儒動不踰節常公之知又日深矣君之聲漸騰於江淮且逹於京師矣時人謂常公能識眞㝷而陸相䞇知貢舉捜羅天下文章得士之盛前無其倫故君名在牓中常與君同道而相上下者有韓侍郎愈李校書觀洎君並數百歲傑出人到于今伏之君之文周詳切於情故叙事重複冝其掌代文柄以變風雅一命而卒天其絶乎君於貽孫言舊故之分於外氏爲一家矣故其屬文之内多爲予伯舅所著者有南陽孝子傳有韓城縣尉㕔壁記有與鄭居方書皆可徴於集故予沖㓜之歲也拜君於外家之門太和中予爲福建團練副使日其子價自南安抵福州進君之舊文共十編首尾凡若于首泣拜請序予以諾其命矣而詞竟未就價微有文又早死大中六年予又爲觀察使令訪其裔因獲其孫曰澥不可使歐陽氏之文遂絕其所傳也爲題其序亦以卒後嗣之願云唐太子校書李觀文集序陸希聲貞元中天子以文化天下天下翕然興於文文之尤高者李元賔觀韓退之愈始元賔舉進士其文稱居退之之右及元賔死退之之文日益高今之言文章元賔反出退之之下論者以元賔早丗其文未極退之窮老不休故能卒擅其名予以爲不然要之所得不同不可以相上下者文以理爲本而辭質在所尚元賔尚於辭故辭勝其理退之尚於質故理勝其辭退之雖窮老不休終不能爲元賔之辭假使元賔後退之之死亦不能及退之之質此所以不相見也夫文興於唐虞而隆於周漢自明帝後文體􅐛弱以至於魏晉宋齊梁隋嫣然華媚無復筋骨唐興猶襲隋故態至天后朝陳伯玉始復古制當丗高之雖博雅典實猶未能全去諧靡至退之乃大革流弊落落有老成之風而元賔則不古不今卓然自作一體激揚發越若絲竹中有金石聲毎篇得意處如徤馬在御蹀蹀不能止其所長如此得不謂之雄文哉自廣明䘮亂天下文集略盡予得元賔文於漢上惜其恐復磨滅因條次爲三編論其意以冠於首大順元年十月日給事中陸希聲序唐楊州功曹蕭穎士文集序李華開元天寶間詞人以德行著於時者曰河南元君德秀趙郡李華爲碣以文學著於時者曰蘭陵蕭穎士字茂挺梁國鄱陽忠烈王之後曽祖某官大父某官考諱某莒縣丞咸有位不至尊君七歲能誦數經背碑覆局十歲以文章知名十五譽滿天下十九進士櫂第歷金壇尉桂州叅軍祕書正字河南叅軍辭官避地江左永王修書請君遁逃不與相見淮南連帥表君爲楊州功曹相國諸道租庸使第五琦請君爲介君以先丗寄殞嵩濮因之遷祔終事至汝南而没嗚呼春秋若干天下儒林爲之憔悴君爲金壇尉也㑹官不成爲楊州叅軍也丁家難去官爲正字親故請君著書未終篇御史府以君爲慢官離局奏謫罷職爲河南叅軍僚屬多嫉君才名上司以吏事責君君拂衣渡江遇天下有故其高節深識皎皎如此君謂六經之後有屈原宋玉文甚雄壯而不能經厥後有賈誼文詞詳正近於理體枚乗司馬相如亦瓌麗才士然而不近風雅楊雄用意頗深班彪識理張衡宏曠曹植豐贍王粲超逸嵇康標舉此外皆金相玉質所尚或殊不能備舉左思詩賦有雅頌遺風于寶著論近乎王化根源此外皆敻絶無聞近日陳拾遺文體最正以此而言見君述作君以文章制度爲巳任時人咸以此許之不幸没於旅次有文十卷行於丗其篇目雖存章句遺逸古所謂有其義而無其辭者也是後之爲文者取以爲法焉今海内至廣人民至衆求君之比不可復得難乎哉君有子一人曰存爲蘇州常熟縣主簿雅有家風知名於丗以華平生最深見託爲序力疾直書云爾崔公山池後集序李翰崔公吏於華葉再黃矣士之才也天高其興益之以小山焉山臨清池峭絶孤踊岑無一仞波無一勺而洲嶼縈帶巒崖盤鬱則巫廬衡霍不出於庭間矣若其琴幌朝開書堂晩清緑筠森踈下見松雪登蕙蘭之徑諷瓊瑶之章則雍雍詠歌盡在丹壁又與一二文士以吟以賦謂之後集焉東臯子集序吕才君姓王氏諱勣字無功太原祁人也高祖晉穆公自南歸北始家河汾焉歷宋魏迄于周隋六丗冠冕國史家牒詳焉君性好學博聞強記與李播陳永吕才爲莫逆之交隂陽曆數之術無不洞曉大業未應孝悌廉絜舉射高第除秘書正字君性簡放飲酒至數斗不醉常云恨不逢劉伶與閉戸轟飲因著醉鄕記及五斗先生傳以類酒德頌云雅善鼔琴加減舊弄作山水操爲知音者所賞高情勝氣獨歩當時及爲正字端簮理笏非其好也以疾罷乞署外職除揚州六合縣丞君篤於酒德頗妨職務時天下亂藩部法嚴屢𬒳勘劾君歎曰羅網高懸去將安所遂岀所受俸錢積於縣城門前託以風疾輕舟夜遁隋季版蕩客遊河北去還龍門武德中詔徴以前楊州六合縣丞待詔門下省時省官例日給良醖三升君第七弟靜爲武皇千牛謂曰待詔可樂否君曰吾待詔禄俸殊爲蕭瑟但良醖三升差可戀爾待詔江國公君之故人也聞之曰三升良醖未足以絆王先生判日給王待詔一斗時人號爲斗酒學士貞觀𥘉以足疾罷歸欲定長往之計而困於貧貞觀中以家貧赴選時太樂有府史焦革家善醖酒冠絶當時君苦求爲太樂丞選司以非士職不授君再三請曰此中有深意且士庶清濁天下所安不聞莊周避漆園老𣆀恥柱下卒授焉數月而焦革死妻袁氏時送美酒歲餘袁又死君歎曰天廼不令吾飽美酒遂挂冠歸田自是太樂丞爲清流君後追述焦革酒經一卷其術精悉兼採杜康儀狄巳來善爲酒人爲酒譜一卷太史令李淳風見而恱之曰王君可謂酒家之南薰君歷職皆以好酒鄕里或咍之因著無心子以喻志河汾中先有渚田十數頃稱良沃鄰渚又有隱士仲長子光服食養性君重其貞素顧與相近遂結廬河渚縱意琴酒慶弔禮絶十有餘年河渚東南隅有連沙磐石地頗顯敞君於其側遂爲杜康立廟歲時致祭以焦革配焉貞觀中京兆杜松之清河崔公善繼爲本州刺史皆請與君相見君曰奈何悉欲坐召嚴君平竟不見崔杜高君調趣卒不敢屈但歲時贈以美酒鹿脯詩書往來不絕君又葛巾聮牛躬耕東臯毎著書自稱東臯子晩歲醉飲無節鄕人或諌止之則笑曰汝輩不解理正當然或乗牛駕驢出入郊郭止宿酒店動經歲月往往題詠作詩好事者録之諷詠並傳於代貞觀十八年終于家時年若干臨終自剋死日遺命薄葬兼預自爲墓誌所著詩賦並多散逸鳩訪未畢且緝成五卷又著㑹心高士傳五卷酒譜二卷及注老子並别成一家不列於集云刪東臯子集序陸淳淳聞於師曰秉仁義立好惡方之内者也等是非遺物我方之外者也冥内而遊外聖人也聖人吾不得見之矣方内者時有焉其惟方外之徒莫得而測也豈踐跡之道易忘言之理難邪將羣於人而内自得邪何乃莊叟之後緜歷千祀幾於是道者余得之王君焉心與物冥德不外蕩隨變而適即分而安忘所拘而迹不害敎遺其累而道不絶俗故有陶公之去職言不怨時有阮氏之放情行不迕物曠哉淵乎眞可謂樂天之君子者矣生於隋季人莫之知故其遺文高跡不顯余毎覽其集想見其人恨不同時得爲忘形之友故祛彼有爲之詞全其懸解之志庶乎死而可作無愧異代之知音爾其祖宗之由岀處之行前序備矣此不復云唐中嶽宗元先生吳尊師集序權德輿道之於物無不由也無不貫也而況本於玄覽發爲至言言而藴道三辰之麗天百嘉之麗地平夷章大恬淡温粹飄飄然軼八紘而泝三古與造物者爲徒其不至者遣言則華渉理則泥雖辯麗可嘉采眞之士不與也宗元先生吳君其知言者歟先生諱筠字貞節華隂人生十五年篤志於道與同術者隱于南陽倚帝山閎覽古先遐蹈物表芝耕雲臥聲利不入天寶初玄纁鶴書徴至京師用希夷啓沃脗合玄聖請度爲道士宅於嵩丘乃就馮尊師齊整受正一之法𥘉梁貞白陶君以此道授昇玄王君自王君至先生凡五代矣皆以隂功救物爲王者師十三年召入大同殿㝷又詔居翰林玄宗在宥天下順風祈嚮乃獻玄綱三篇優詔嘉納志在遐舉累章乞還以禽魚自況藪澤爲樂得請未幾盜泉汙于三川羽衣虚舟泛然東下棲匡廬登㑹稽浮淛河息天柱隱机埋照順吾靈龜有時放言以暢天理且以園公歌詠於紫芝弘景怡恱於白雲故屬詞之中尤工比興觀其自古王化與詩大雅吟歩虚詞遊仙雜感之作或遐想理古以哀丗道或磅礴萬象用㝠環樞稽性命之紀逹人事之變大率以嗇神挫銳爲本至於竒彩逸響琅琅然若戞雲璈而凌側景崑閬松喬森然在目追近古游方外而言六義者先生實主盟焉至若揔論谷神之妙則有玄綱哀蓬心蒿目之遠於道也則有神仙可學論䟽卄瀹澡雪使無落吾事則有洗心賦巖棲賦修胷中之誠而休乎天均則有心目論契形神頌其他抗章寓書賛美序别非道不言言而可行泊然以微妙卓爾而昭曠合爲四百五十篇博大眞人之言盡在是矣大曆十三歲歲直鶉首止于宣城道觀焚香返眞於虚室之中門弟子邵兾玄者率籲其徒寧神于天柱西麓從其命也太原王顔常恱先生之風採道也熟自先生化去三歲顔爲御史中丞類斯遺文爲三十編拜章上獻藏在祕府兾玄者偏得先生之道如槁木止水刳心遺形自先生化去二十五歲以其文編請傳永乆其有逍遥卓詭之論猶不列於此至若挺神竒祛鬼怪告錬蛻之地合肸蠁之符皆備於刻金石者之說今徒采獲斯文以序崖略且俾後學知道者必知言云唐釋靈澈上人文集序劉禹錫釋子工爲詩尚矣休上人賦别怨約法師哭范尚書咸爲當時才士之所傾歎厥後比比有之上人生於㑹稽本湯氏子聦察嗜學不肯爲凡夫因辭父兄岀家號靈澈字源澄雖受經論一心好篇章從越客維學爲詩遂籍籍有聞維卒乃抵吳興與長老詩僧皎然游講益至皎然以書薦于詞人包侍郎佶包得之大喜又以書致于李侍郎紓是時以文章風韻主盟于丗者包李以是上人之名由二公而颺如雲得風柯少葉張以文章接才子以禪理恱高人風儀甚雅談笑多味貞元中西游京師名振輦下緇流嫉之造飛語激動中貴人侵誣得罪徙汀州入㑹稽歸東越時吳楚間諸侯多賔禮招迓之元和十一年終于宣州開元寺七十有一門人遷之建塔于越之山隂天柱峯之陲從本敎也初上人在吳興居柯山與晝公爲侣皎然字畫時以字行時予方以兩髦執筆硯陪其吟詠皆曰孺子可敎後相遇于京洛與支許之契焉上人殁後十七年予爲吳郡其門人秀峯撽先師之文來乞辭以志且曰師甞在吳賦僅二千首今刪取三百篇勒爲十卷自大曆至元和凢五十年間接詞客文人詶唱别爲十卷今也思行乎昭世求一言羽翼之因爲許曰丗之言詩僧多出江右靈一導其源護國襲之清江揚其波法振㳂之如么弦孤韻瞥入人耳非大樂之音獨吳興晝公服備衆體晝公後澈公承之至如芙蓉園新寺詩云經來白馬寺僧到赤烏年謫汀州云青蠅爲弔客黃犬寄家書可謂入作者閫域豈獨雄於詩僧閒邪篋中集序元結元結作篋中集或問曰公所集之詩何以訂之對曰風雅不興幾及千歲溺於時者丗無人哉嗚呼有名位不顯年壽不將獨無知音不見稱頌死而巳矣誰云無之近丗作者更相㳂襲拘限聲病喜尚形似且以流易爲辭不知䘮於雅正然哉彼則指詠時物㑹諧絲竹與歌兒舞女生汙惑之聲於私室可矣若令方直之士大雅若子而誦之則未見其可矣吳興沈千運獨挺於流俗之中強攘於巳溺之後窮老不惑五十餘年凡所爲文皆與時異故朋友後生稍見師效能似類者有五六人於戲自沈公及二三子皆以正直而無禄位皆以忠信而乆貧賤皆以仁讓而至喪亡異於是者顯榮當丗誰爲辯士吾欲問之天下兵興於今六歲人皆務武斯焉誰嗣巳長逝者遺文散失方阻絕者不見近作盡篋中所有揔編次之命曰篋中集且欲傳之親故兾其不亡於今凡七人詩二十二首時乾元三年也唐容州經略使元結文集後序李商隱次山有文編有詩集有元子三書皆自爲之序次山見譽於公弱夫蘇氏始有名見取於公浚楊公始得進士第見憎於第五琦元載故其將兵不得授作官不至逹母老不得盡其養母䘮不得終其哀間二十年其文危苦激切悲憂酸傷於性命之際自占心經巳下若干篇是旬外曽孫遼東李惲辭收得之聚爲元文後編次山之作其緜遠長大以自然爲祖元氣爲根變化移易之太虚無狀大賁無色寒暑攸出鬼神有職南斗北斗東龍西虎方嚮物色欻何從生啞鍾復鳴黃雉變雄山相朝捧水信潮汐若大壓然不覺其興若大醉然不覺其醒其疾怒急撃快利勁果岀行萬里不見其敵高歌酣顔入飲于朝斷章適句如娠始生狼子豽孫競于跳走翦餘斬殘程露血脉其詳緩柔潤壓抑趨儒如以一國賈人一笑如以萬丗換人一朝重屋深宫但見其脊牽繂長河不知其載死而更生夜而更明衣裳鐘石雅在宫藏其正聽嚴毅不滓不濁如坐正人照彼佞者子從其翁婦從其姑豎麾爲門懸木爲牙張蓋乗車屹不敢入將刑斷死帝不得赦其碎細分擘切截纎顆如墜地碎若大咽上聲餘鋸取朽蠹櫟蟒岀毒刺眼楚去齒不見可視顧顚踣錯雜汙瀦傷損如在危處如岀夢中其揔旨㑹源條綱正目若國大治若年大熟君君堯舜人人羲皇上之視下不知有尊下之望上不知有篡辮頭鑿齒扶服臣僕融風彩露飄零委落耋老者在童齓者蕃邪人佞夫指之觸之薰薰熈熈不識其故吁不得盡其極也而論者徒曰次山不師孔氏爲非嗚呼孔氏於道德仁義外有何物百千萬年聖賢相隨於塗中耳次山之書曰三皇用眞而恥聖五帝用聖而恥明三王用明而恥察嗟嗟此書可以無書孔氏固聖矣次山安在其必師之邪樊川文集後序裴延翰長安南下杜樊鄕酈元長注水經實樊川也延翰外曽祖司徒歧公之别墅在焉上五年冬仲舅自吳興守拜考功郎中知制誥盡吳興俸錢創治其墅出中書直亟召昵密往遊其地一旦談啁酒酣顧延翰曰司馬遷云自古富貴其名磨滅者不可勝紀我適稚走於此得官受俸再治完具俄及老爲樊上翁旣不自期富貴要有數百首文章異日爾爲我序號樊川集如此則顧樊川一禽魚一草木無恨矣庶千百年未隨此磨㓕矣明年遷中書舎人始少得恙盡搜文章閱千百𥿄焚擲纔屬留者十二三延翰自撮髮讀書學文率承導誘伏念𥘉岀仕入朝三直太史筆比四岀守其閒逾二十年凢有撰制大手短章塗藁醉墨碩夥纎屑雖適僻阻不遠數千里苾獲寫示以是在延翰乆藏蓄者甲乙籖目比校焚外十多七八得詩賦傳録論辨碑誌序記書啓表制離爲二十編合四百五十首題曰樊川文集嗚呼雖當一時戲感之言孰見魄兆而果驗白邪嘻文章與政通而風俗以文移在三代之道以文與忠敬隨之是爲理具與運高下探古作者之論以屈原宋玉賈誼司馬遷相如楊雄劉向班固爲丗魁傑然騷人之辭怨刺憤懟雖援及君臣敎化而不能霑洽時論相如子雲瓌麗詭譎諷多要寡羡漫無歸不見治亂賈馬劉班乗時若君之善否直豁巳臆奮然以拯丗扶物爲任纂緒造端必不空言言之所及則君臣禮樂敎化賞罰無不包焉竊觀仲舅之文高騁夐厲旁紹曲摭絜簡渾圓勁出橫貫滌濯滓窳支立欹倚呵磨皸瘃如火煦焉􅐡梳痛痒如水洗焉其抉剔挫偃敢斷果行若誓牧野前無有敵其正視嚴聽前衡後鑾如整冠裳祗謁宗廟其聒蟄爆聾發慄若大吕勁鳴洪鍾橫撞撑裂噎喑戞切韶頀其砭熨嫉惡堤障初終若濡槁於未焚膏癰於未穿栽培敎化翻正治亂變醨養瘠堯醲舜薰斯有意趨賈馬劉班之藩牆者邪其文有罪言者原十六衛者戰守二論者與時宰論用兵論江賊二書者上獵奏漢魏晉南北二朝逮貞觀至長慶數千百年兵農刑政措置當否皆能採取前事凢人未嘗經度者若繩裁刀解粉畫線織布在眼見耳聞哉其譎往事則阿房宫賦刺當代則感懷詩有國欲亡則得一賢人決遂不亡者則張保罪傳尚古兵柄本岀儒術不專任武力者則注孫子而爲其序襃勒賢傑表揭職業則贈莊淑大長公主及故竒章公汝南公墓誌標白歷代取士得才率由公族子第爲多則與高大夫書諌諍之體非許醜惡與主鬪激則論諌書若一縣宰因行德敎不施刑罰能舉古風則謝守黃州表一存一亡適見交分則祭李處州文訓勵官業告束君命擬古典謨以寓誅賞則司帝之誥其餘述喻讃誡興諷愁傷易格異狀機鍵雜發雖緜遠窮幽膿膄魁礨筆酣興徤窕眇碎細包詩人之軌憲整楊馬之牙陣聳曹劉之骨氣掇顔謝之物色然未始不撥斸治本縆幅道義鈎深於經史觝禦於理化也故文中子曰言文而不及理王道何從而興乎嘻所謂文章與政通風俗以文移果於是以卜盛時理具踔三代而䕃萬古若躋太華臨溟渤但觀乎積高而沓深不知其磅礴澶漫所爲逺大者也近代或序其文非有名與位則文學宗老小子旣就其集寤寐思慮反覆不翅逾年茍墜承顧付與之言雖晦顯兩不相解在他人無知其狀者然以高有天幽有神隂有宰物者可自誣抵以甘罰殛故揔其條目強自後序至於裁判風雅宰制典刑標翊時濟物之才編志業名位之實則㳟俟叔父中書公於前序毗陵集後序梁肅有唐文宗常州刺史獨孤公旣薨門下客安定梁肅以公茂德映乎當丗美化加乎百姓若發揚秀氣磅礴古訓則在乎斯文文之盛不可以莫之紀也於是綴其遺草三百篇爲二十卷以示後嗣乃繋其辭曰夫大者天道其次人文在昔聖王以之經緯百度臣下以之弼成五敎德又下衰則怨刺形於歌詠諷議彰乎史冊故道德仁義非文不明禮樂刑政非文不立文之興廢視丗之治亂文之高下視才之厚薄帝唐接前代澆醨之後承文章顛墜之運王風下扇作者迭起不及百年文體反正洎公之爲則又操道德爲根本緫禮樂爲冠帶以易之精義詩之雅訓春秋之襃貶屬之於詞故其文寛而簡直而婉辯而不華博厚而高明論人無虚美比事爲實録天下􅏮然復覩兩漢之遺風善乎中書舎人崔公祐甫之言也曰常州之文以立憲戒丗襃賢遏惡爲用故議論最長其或列於碑頌流於歌詠峻如嵩華浩如江河若賛堯舜禹湯之命爲誥爲典爲謨爲訓人皆許之而不吾試論道之位冝不陟哉公諱及字至之祕書監府君第四子道與之粹天付之德聦明慱逹剛毅正直中行獨復動靜可則仁厚積爲大本文藝成平餘力其體文中雖波騰雷動起伏萬變而殊流㑹歸同致于道故於賦逺游頌嘯臺見公放懷大觀超邁流俗於仙掌函谷二銘延陵論八陣圖記見公識探神化理合權道於議郊祀配天之禮吕諲盧奕之謚見公闡明典訓綜覈名實若夫述聖道揚儒風則陳留郡文宣王廟碑福州新學碑美成功旌善人則張平原頌李常侍姚尚書嚴庶子韋給事韋頴叔墓誌鄭氏孝行記李睢陽楊懷州碑纂丗德貽後昆則先祕監靈表陳黃老之義於是有對冊文演釋氏之奥於是有鏡智禪師碑論文變損益於是有李遐叔集序稱物狀之美而暢其情性於是有琅邪谿述其敘一事紀一物皆足以追蹤往烈裁正彺簡噫天其以迷作之柄授夫子乎不然則吾黨安得遭遇乎斯文也𥘉公視肅以友肅仰公猶師毎申之話言必先道德而後文學且曰後丗雖有作者六籍其不可及巳荀孟朴而少文屈宋華而無根有以取正其賈生史遷班孟堅云爾吾子可共與學當視諸斯文肅承其言大發蒙惑今則巳矣知我其誰哉遂銜涕爲敘俾來者有以觀夫子之志若立身行道終始出處皆載易名之狀故不備之此篇題柳柳州集後司空圖金之精麤攷其聲皆可辨也豈清於磬而渾於鍾哉然則作者爲文爲詩才格亦可見豈當善於彼而不善於此邪愚觀文人之爲詩詩人之爲文始皆繋其所尚旣專則搜研愈至故能衒其工於不朽亦猶力巨而鬪者所持之器各異而皆能濟勝以爲勍敵也愚甞覽韓吏部歌詩累百首其驅駕氣勢若掀雷抉電撑抉於天地之垠物狀其變不得鼓舞而徇其呼吸也其次皇甫祠部文集外所作亦爲遒逸非無意於深密蓋或未遑耳今於華下方得柳詩味其探搜之致亦深遠矣俾其窮而克壽抗精極思則固非瑣瑣者輕可擬議其優劣又甞覩杜子美祭太尉房公文李太白佛寺碑賛宏抜清厲乃其歌詩也張曲江五言沈鬱亦其文筆也豈相傷哉噫後之學者𥚹淺片詞隻句不能自辨已側目相詆訾矣痛哉因題柳集之末庶俾後之詮評者㒺惑偏說以蓋其全工唐大理評事楊君文集後序柳宗元賛曰文之用辭令襃貶導揚諷諭而已雖其言鄙野足以備於用然而闕其文彩固不足以竦動時聽夸示後學立而朽君子之不由也故作者抱其根源而必由是假道焉作於聖故曰經述於才故曰文文有二道辭令襃貶本乎著述者流蓋述於書之謨訓易之象繋春秋之筆削其要在於高壯廣厚詞正而理備謂冝藏於簡冊也比興者流蓋出乎虞夏之詠歌殷周之雅頌其要在於麗則清越言暢意美謂冝流於謡誦也兹二者考其旨義乖離不合故秉筆之士恒偏勝獨得而罕有兼者故有能而專美命之曰藝成雖古文雅之盛丗不能並肩而生唐興巳來稱是選而不怍者梓潼陳拾遺其後燕文貞以著述之餘攻比興而莫能極張曲江以比興之隙窮著述而不克備其餘各探一隅相與皆馳於道者其去彌遠文之難兼斯甚矣若楊君者少以篇什著聲於時其炳燿尤異之辭諷誦於文人滿盈於江湖逹於京師晩節徧悟文體尤䆳序述學富識遠才涌未巳其雄傑老成之風與時增加旣獲是不數年而大其季年所作尤善其爲鄂州新城頌諸葛武侯傳論餞送梓潼陳衆甫汝南周愿河東裴秦武都何義府泰山羊士諤隴西李練凢六序廬山禪居記辭李常侍啓遠遊賦七夕詩皆人文之選巳用陪陳君之後其可謂具體者歟嗚呼公旣悟文而疾旣即功而廢廢不逾年大病及之卒不得窮其工竟其才遺文未克流於丗休聲未克充於時凢我從事於文者所宜追惜而悼慕也某以通家修好㓜獲省謁故得奉公元兄論次篇目遂述其制作之所詣以繋其後注愍征賦後述司空圖武宣之間籍顯地者雖無如梁韓數公以雅實自任而能振抜後進然士大夫宴遊之倦猶或時道文學以佽助執事者而盧君尚以讒擯致憤於累千百言亦猶虎之餌毒蛟之飲鏃其作也雖震丘林鼓溟漲不能快其咆怒之氣且科爵之設是多得於彼而少䘮於此侈其虚而歉其實彼或充然自喜而又以拱黙相持曽不知日月没於晷刻之間蠅翔而螢腐耳然則著明幸於弃黜而能以愍征爭勍於千載之下吾知後之作者有歐血不能逮之者矣其所得何如於彼哉且上至聖哲下至豪特之士得於文學者多矣豈以一靈運之狂而可沮辱天下之竒偉哉況靣牆而悸謬者何翅於此邪愚前述雖巳恣道其遒壯悽豔矣而終不能研其才外之致以是擲筆狂叫寄之他生又甞著濯纓引以雪詞人之憤其旨亦屬於盧君且凡稟精爽之氣是或有智謀超出羣輩一旦憤抑肆其筆舌亦猶武人逞怨於鋒刃也俾其無所控告驅於讎敵必貽國家之患矣然則據權而蔽善者得不常以此危慮哉重校正唐文粹第九十三
