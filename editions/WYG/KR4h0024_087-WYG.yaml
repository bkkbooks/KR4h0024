seq: 87
front:
  text: 壽百歲七十者稀某今四十有加矣更三十年於此是一生不覩髙衢逺途矣况先三十年孰知存亡哉其或素蓄當在重泉之下矣忖已方人所以知百行修萬事精内叩濳鳴外聼无聲非不願用而人不用非不願旌而人不旌雖和平之代至老至死者十有十百有百千有千也嗚呼今之髙懸爵禄廣設名位實待乎德行與乎能事也德行也者孝悌也忠信也不可於公堂斯須而得試也須漸乎父母昆弟之言㳂乎州閭鄉曲之譽某逺人也父母昆弟在萬里之外州閭鄉曲在三江之南孝悌之言无由漸朝廷之耳忠信之譽莫得通闕下之聞也能事也者秉持也應奉也不可虛處無任而得呈也須形乎政令裁制之庸著乎役藝使才之致某冗官也政令裁製一月兩衙之謂役藝使才二奠陪行而已秉持之庸不可形考課之目應奉之致是亦絶著選能之見也縱有顔閔之德㳺夏之學宰我之政夫子之文章止於是也但父母昆弟自相知州里鄉曲自相許於海隅嶺徼其奈拳拳之身何夫大田斯穫而有遺秉則滯穂也萬秉稀一萬穗稀一某豈遂當其一乎且天地也命之翅必與之羽翮副其巨細使得飛也命之足必與之蹄蹠稱其短長使得行也若命之翅而不與之羽翮與之而巨細不相副飛則墜若命之足而不與之蹄蹠與之而短長不相稱行必顛命適遺之墜與適遺之顛則如無命無與也其庸愚不知造物之㫖者視之則不之怪其明賢深探理源者其謂天地何且邦國也勸人以德行用錫之爵禄必契其分量使得行道也聳人以能事用錫之名位必權其輕重使得榮身也若勸以德行而不錫之爵禄錫之而分量不相契道則屈聳以能事而不錫之名位錫之而輕重不相權身則辱勸適遺之屈聳適遺之辱則如無勸無聳也其庸愚不知政化之㫖者視之則不之怪其明賢深探理體者其謂邦國何某代居閩至于吳則絶同鄉之人矣自吳至于楚則絶同方之人矣過宋由鄭踰周到秦朝無一命之親路無迴眸之舊猶孤根寄不食之田也人人耘耨所不及家家漑灌所不霑其灌乃條枚成乃華實者上天至仁之膏澤厚地无私之陽春乎相公為上天之霖雨佐厚地之發生也何以處某焉夫舉善不遺於㣲陋用能必盡其材器真宰相之任也自唐及虞有其人自夏及商有其人自周及秦有其人自漢而降无代无之洎國朝歴歴可數也相公能以某為手下濫觴乎似善斯升真善以至似能斯㧞真能以來古人行此天下歸仁也相公行之哉行之哉今則猶古算度途逺倉皇造次某惶恐再拜
