body:
  text: 吳興姚鉉纂書七啓附揔一十一首論文下與陸傪書李翶答李生二書皇甫湜復友生論文書陸龜蒙答開元寺僧書李翶與李生論詩書司空圖與王駕評詩書答進士王載言書李翶上楊相公啓劉太真上知巳文章啓杜牧上令狐相公詩啓元稹與陸傪書李翺李觀之文章如此官止於太子校書郎年止於二十九雖有各於時俗其率深知其至者果誰哉信乎天地鬼神之無情於善人而不罰罪也甚矣為善者將安所歸乎翺書其人贈于兄贈于兄蓋思君子之知我也與李觀平生不得往來及其死也則見其文嘗歎使李觀若永年則不逺於楊子雲矣書巳之文次忽然若觀之文亦見於君也故書苦雨賦綴於前當下筆時復得詠其文則觀也雖不永年亦不甚逺於楊子雲矣書苦雨之辭既又思我友韓愈非兹丗之文古之文也非兹丗之人古之人也其詞與其意適則孟軻既沒亦不見有過於斯者當下筆時如他人疾書之寫誦之不是過也其詞乃能如此當書一章曰獲麟詞其他亦可以類知也窮愁不能無述適有書寄弟正辭及其終亦自覺不甚下尋常之所為者亦以贈焉亦惟讀觀愈之詞兾一詳焉翺再拜答李生二書皇甫湜辱書適曛黑使者立復不果一二承來意之厚傳曰言及而不言失人粗書其愚為足下答幸察來書所謂今之工文或先於竒怪者顧其文工與否耳夫意新則異於常異於常則怪矣詞高則出於衆出於衆則竒矣虎豹之文不得不炳於犬羊鸞鳯之音不得不鏘於烏鵲金玉之光不得不炫於瓦石非有意先之也乃自然也必崔嵬然後為嶽必滔天然後為海明堂之棟必撓雲霓驪龍之珠必固深泉足下以少年氣盛固當以出拔為意學文之𥘉且未自盡其才何遽稱力不能哉圖王不成其弊猶可以霸其僅自見也將不勝弊矣孔子譏其身不能者幸勉而思進之也來書所謂浮豔聲病之文恥不為者雖誠可恥但慮足下方今不爾且不能自信其言也何者足下舉進士舉進士者有司高張科格每歲聚者試之其所取乃足下所不為者也工欲善其事必先利其器足下方伐柯而捨其斧可乎哉恥之不當求也求而恥之惑也今吾子求之矣是徒涉而恥濡足也寧能自信其言哉來書所謂汲汲於立法寧人者乃在位者之事聖人得勢所施為也非詩賦之任也功既成澤既流詠歌紀述光揚之作作焉聖人不得勢方以文詞行於後今吾子始學未仕而急其事亦太早計矣凡來書所謂數者似言之未稱思之或過其餘則皆善矣既承嘉惠敢自踈怠聊復所為俟見方盡湜再拜第二書湜白生之書辭甚多志氣甚橫流論説文章不可謂無意若㒒愚且困乃生詞竸於此固非冝雖然惡言無從不可不卒勿吝夫謂之竒則非正矣然亦無傷於正也謂之竒即非常矣非常者謂不如常者謂不如常乃出常也無傷於正而出於常雖尚之亦可也此統論竒之體耳未以文言之失也夫文者非也言之華者也其用在通理而巳固不務竒然亦無傷於竒也使文竒而理正是尤難也生意便其易者乎夫言亦不可通理矣而以文為貴者非他文則逺無文即不逺也以非常之文通至正之理是所以不朽也生何嫉之深邪夫繪事後素既謂之文豈茍簡而巳哉聖人之文其難及也作春秋遊夏之徒不能措一辭吾何敢擬議之哉秦漢巳來至今文學之盛莫如屈原宋玉李斯司馬遷相如揚雄之徒其文皆竒其傳皆逺生書文亦善矣比之數子似猶未勝何必心之高乎傳曰言之不出恥躬之不逮也生自視何如哉書之文不竒易之文可為竒矣豈礙理傷聖乎如龍戰干野其血玄黃見豕負塗載鬼一車突如其來如焚如死如棄如此何等語也生輕宋玉而稱仲尼班馬相如為文學按司馬遷傳屈原曰雖與日月爭光可矣生當見之乎若相如之徒即祖習不暇者也豈生稱誤邪將識分有所至極邪將彼之所立卓爾非強為所庶幾遂讎嫉之邪其何傷於日月乎生笑紫貝闕兮珠宫此與詩之金玉其相何異天下人有金玉為之質者乎披薜荔兮帶女蘿此與贈之以芍藥何異文章不當如此説也豈謂怒三四而喜四三識出之白而性入之異乎生云虎豹之文非竒夫長本非長短形之則長矣虎豹之形於犬羊故不得不竒也他皆倣此生云自然者非性不知天下何物非自然乎生又云物與文學不相侔此喻也凡喻必以非類豈可以彈喻單乎是不根者也生稱以知難而退為謙夫無難而退謙也知難而退冝也非謙也豈可見黃門而稱貞哉生以一詩一賦為非文章抑不知一之少便非文章邪直詩賦不是文章邪如詩賦非文章三百篇可燒矣如少非文章湯之盤銘是何物也孔子曰先行其言既為甲賦矣不得稱不作聲病文也孔子云必也正名乎生既不以一第為事不當以進士冠姓名也夫煥乎郁郁乎之文謂制度非止文詞也前者捧卷軸而來又以浮豔聲病為説似商量文詞當與制度之文異日言也近風教偷薄進士尤甚乃至有一謙三十年之説爭為虛張以相高自謾詩未有劉長卿一句巳呼阮籍為老兵矣筆語未有駱賔王一字巳罵宋玉為罪人矣書字未識偏傍高談稷契讀書未知句度下視服鄭此時之大病所當嫉者生美才勿似之也傳曰惟善人能受善言孔子曰君子無所爭必也射乎問於湜者多矣以生之有心也聊有復不能盡不宣湜再拜復友生論文書陸龜蒙辱示近年作者論文書二篇使㒒是非得失於其間僕雖極頑冥亦惴息汗下見詃訶之甚難招禍患之甚易也況㒒少不攻文章止讀古聖人書誦其言思行其道而未得也每涵咀義味獨坐日昊案上有一杯䔧羮如五鼎七牢饋於左右加之以撞金石萬羽籥也未嘗干有司對問希品第未嘗歷王公丐貸飾車馬故無用文處江湖間不過美泉石則記之聳節槩則傳之觸離會則序之值巾罍則銘之簡散上聲淡誕無所諱避又安知文之是歟非歟生過聽德我太甚茍默默不應非朋友切切偲偲之義也故扶病把筆一二論之曰我自小讀六經孟軻楊雄之書頗有熟者求文之指趣規矩無出於此及子史則曰子近經經語古而微史近書書語直而淺所言子近經近何經近書書則記言之史也史近春秋春秋則記事之史也六籍中獨詩書易象與魯春秋經聖人之手耳禮樂二記雖載聖人之法近出二戴未能通一純實故時有齟齬不安者蓋漢代諸儒爭撰而獻之求購金耳記言記事參錯前後曰經曰史未可定其體也案經解則悉謂之經區而別之則詩易為經書與春秋實史耳學者不當混而言之且經解之篇句名出於戴聖耳王輔嗣因之以易為經杜元凱因之以春秋為經孔子曰學詩乎學禮乎易之為書也原始要終知我以春秋罪我以春秋未嘗稱經稱經非是聖人旨也蓋出於周公諡法經緯天地曰文故也有經書必有緯書聖人既作經亦當作緯譬猶織也經而不緯可成幅乎緯者且非聖人之書則經亦後人名之耳非聖人之旨明矣苟以六籍謂之經習而稱之可也指司馬遷班固之書謂之史何不思之甚乎六籍之內有經有史何必下及子長孟堅然後謂之史乎孔子曰吾猶及史之闕文也曰質勝文則野文勝質則史又曰董狐古之良史也此則筆之曲直體之是非聖人悉論而辨之矣豈須班馬而後言史哉以詩易為經以春秋為史足矣無待於外也謂經語古而皆微則易曰履霜堅冰至初筮告再三瀆瀆則不告苦節不可貞之類果純古而微乎謂史語直而淺則春秋書考仲子之宫初獻六羽及齊師戰于乾時我師敗績辛巳有事于太廟仲遂卒于陲壬午猶繹萬入去籥之類果純直而淺乎經不純微史不純淺又可見也言文之不可立喻則曰春秋不當言無使滋蔓又云春秋舉軍旅會盟豈非敘事邪引左氏傳語徴左氏敘事悉謂之春秋可乎春秋大典也舉凡例而褒貶之非周公之法所及者酌在夫子之心故遊夏不能措一辭若區區於敘事則魯國之史官耳孰謂之春秋哉前所自謂讀六經頗有熟者求文之指趣規矩不出於此妄矣又一篇曰某文也某辭也文既與辭異是文優而辭劣耳易之繫辭曰齊小大者存乎卦辨吉凶者存乎辭故卦有大小辭有險易又曰觀其彖辭則思過半矣易之辭非文邪書載帝庸作歌臯陶乃賡載歌又歌五子之歌皆辭也書之辭非文邪屬辭比事春秋教也春秋之辭非文邪禮有朝聘之辭娶夫人之辭樂有登歌薦辭禮樂之辭非文邪法言曰往者楊墨塞路孟子辭而闢之廓如也孟軻之辭非文邪太玄之辭也沈以窮乎下浮以際乎上楊雄之辭非文邪是知文者辭之揔辭者文之用天之將喪斯文也天之未喪斯文也不當稱辭吉人之辭寡躁人之辭多不當稱文文辭一也但所適有冝耳何異塗云之哉又曰聲病之辭非文也夫聲成文謂之音五音克諧然後中律度故舜典曰詩言志歌永言聲依永律和聲聲之不和病也去其病則和和則動天地感鬼神反不得謂之文乎猶繪事組繡中有精耳大凡解人之説不敢避墉援膚爪而自矜於堂奧心府也要在引學者當知之事以明之而巳矣師道不行後生多泥於所習有陷而溺者力能援之可也如其不同請觀近而後罰答開元寺僧書李翶前日見命作開元寺鐘銘云欲籍㒒之辭庶幾不朽而傳於後丗誠足下相知之心無不到也雖然翶學聖人之心焉則不敢讓乎知聖人之道者也當見命時意亦思之熟矣吾之銘是鐘也吾將明聖人之道焉則於釋氏無益也吾將順釋氏之教而述焉則紿乎下人甚矣何貴乎吾之先覺也吾之辭必傳於後後有聖人如仲尼者之讀吾辭也則將大責於吾矣吾畏聖人也夫銘古多有焉湯之盤銘其辭云云衛孔悝之鼎銘其辭云云秦始皇帝之嶧山銘其辭云云於盤則曰盤銘於鼎則曰鼎銘於山則曰山銘盤之辭可遷之於鼎鼎之辭可移之於山山之辭可書之於碑惟之所紀爾及蔡雍黃鉞銘以紀功於黃鉞之上爾或盤或鼎或嶧山或黃鉞其意與言皆同非如髙唐上林長楊為之作賦云爾近代之文士則不然為銘為碑大抵詠其形容有異於古人之所為其作鐘銘則必詠其形與其音聲與其財用之多少鎔鑄之勤勞爾非為勒功德誡勸於器也推此類而極觀之某不知君子之文也亦甚矣然其所為文亦皆有盛名於時天下人咸謂之善焉吾不知吾所獨知其能賢於他人之皆不知乎天下人咸以不知者云善則吾之獨知又何能云善乎雖然吾亦須吾心以須聖人爾阿俗從時則吾不忍為也故久未承教為其所懷也如前所云足下欲吾之必銘是鐘也當順吾心與吾道則足下之銘必傳於後代矣如欲從俗之所云則天下屬辭之士願為之者甚衆矣何籍於李翺之辭哉幸思之也日中時過淮而南書以通意且為别與李生論詩書司空圖文之難而詩之難尤難古今之喻多矣而愚以為辨於味而后可以言詩也江嶺之南凡是資於適口者若醯非不酸也止於酸而巳若鹺非不醎也止於醎而巳華之人所以充飢而遽輟者知其醎酸之外醇美者有所乏耳彼江嶺之人習之而不辨也冝哉詩貫六義則諷諭抑揚渟蓄淵雅皆在其間矣然直致所得以格自竒前輩諸集亦不專工於此矧其下者邪王右丞章蘇州澄淡精緻格在其中豈妨於道舉哉賈閬仙誠有警句視其全篇意思殊餒大抵附寒澀方可置才亦為體之不備也矧其下者哉噫近而不浮逺而不盡然后可以言韻外之致耳愚幼嘗自負既久而愈覺缺然然得於早春則有草嫩侵沙長冰輕著雨消又人家寒食月花影午時天上句云隔谷見雞犬山苗接楚田又雨微吟足思花落夢無憀得山中則有坡暖冬生筍松涼夏健人又川明虹照雨樹密鳥衝人得於江南則有戎鼓和潮暗船燈照島幽又曲塘春盡雨方響夜深船又夜短猿悲減風和鵲喜靈得於塞下則有馬色經寒慘雕聲帶晚飢得於喪亂則有驊騮思故第鸚鵡失佳人又鯨鯢入海涸魑魅棘林高得於道宫則有棊聲花院閉憣影石壇幽得於夏景則有地涼清鶴夢林靜肅僧儀得於佛寺則有松日明金像苔龕響木魚又解吟僧亦俗愛舞鶴終卑得於郊原則有逺坡春旱滲猶有水禽飛上句緑樹連村暗黃花入麥稀於樂府則有晚妝留拜月春睡更生香得於寂寥則有孤螢出荒池落葉穿破屋得於愜適則有客來當意愜花發遇歌成雖庶幾不濵於淺涸亦未廢作者之譏訶也七言云逃難人多分隙地放生鹿大出寒林又得劒乍如添健㒒亡書久似憶良朋又孤嶼池痕春漲滿小欄花韻午晴初又五更惆悵回孤枕猶自殘燈照落花上句云故國春歸未有涯小欄髙檻别人家又殷勤元日日欹午又明年上句甲子今重數生涯只自憐皆不拘於一槩也蓋絶句之作本於詣極此外千變萬狀不知所以神而自神也豈容易哉今足下之詩時輩固有難色儻復以全美為上即知味外旨矣勉旃某再拜與王駕評詩書足下末伎之工雖蒙譽於賢哲未足自信必俟推於其類而后神躍而色揚今之贄藝者反是若即醫而靳其病也唯恐彼之善察藥之我攻耳以為率人以謾莫能自振痛哉且工之尤者莫若伎於文章其能不死於詩者比他伎尤寡豈可容易校量哉國初主上好文雅風流特盛沈宋始興之後傑出於江寧宏肆於李杜極矣右丞蘇州趨味澄敻若清沅之貫達大曆十數公抑又其次焉力勍而氣孱乃都市豪估耳劉公夢得楊巨源亦各有勝會閬仙無可劉得仁輩時得佳致亦足滌煩厥後所聞逾𥚹淺矣然河汾蟠鬱之氣冝繼有人今王生者寓居其間沈漬益久五言所得長於思與境偕乃詩家之所尚者則前所謂必推於其類豈止神躍色揚哉經亂索居得其所録尚纍百篇其勤亦至矣吾適又自編一鳴集且云撑霆裂月劼作者之肝脾亦當吾言之無怍也答進士王載言書李翶翶頓首足下不以翺卑賤無所可乃陳詞屈慮先我以書且曰余之藝及心不能棄于時將求知者問誰則可皆告曰李君乎告足下者過也足下因而信之又過也果若來陳雖道備德具且猶不足辱厚命況如翶者多病少學其能以此堪足下所望博大而深閎者邪雖然意盛不可以不答故敢略陳其所聞蓋行巳莫如恭自貴莫如厚接衆莫如弘用心莫如直進德莫如勇受益莫如擇友好學莫如改過此聞之於師者也相人之術有三迫之以利而審其邪正設之以事而察其厚薄問之以謀而觀其智與不材賢不肖分矣此聞之於友者也列天地立君臣親父子别夫婦明長幼浹朋友六經之旨也浩乎若江海髙乎若丘山赫乎若日火包乎若天地掇章稱咏津潤怪麗六經之詞也創意造言皆不相師故其讀春秋也如未嘗有詩其讀詩也如未嘗有易其讀易也如未嘗有書其讀屈原莊周也如未嘗有六經故義深則意逺意逺則理辨理辨則氣厚氣厚則詞盛詞盛則文工如山有恆華焉如瀆有濟淮河江焉其同者出源到海也其曲直淺深其色黃白不必均也如百品之雜焉其同者飽於腸也其味鹹酸苦辛不必均也因學而知者也此創意之大歸也天下之語文章有六説焉其尚異者則曰文章辭句竒險而巳其好理者則曰文章敘意苟通而巳其溺於時者則曰文章必當對其病於是者則曰文章不對其愛難者則曰文章冝深不當易其變易者則曰文章冝通不當難此皆情有所偏滯而不流未識文章之所生也義不主於理言不在於教勸而詞句怪麗者有之矣劇秦美新王褒僮約是也其理往往有是者而辭章不能工有之矣劉氏人物志王氏中説俗傳太公家教是也古之人能極於工而已不知其辭之對與否易與難也詩曰憂心悄悄愠干羣小此非對也又曰遘憫既多受侮不少此非不對也書曰朕疾讒説殄行震驚朕師詩曰苑彼柔桑其下侯甸將采其劉瘼此下人此非易也書曰充恭克讓光𬒳四表格于上下詩曰十畒之間兮桑者間間兮與子旋兮此非難也學者不知其方而稱説云云如前所陳者非吾之所敢聞也六經之後百家之言興老聃列禦冦莊周田穰苴孫武屈原宋玉孟軻吳起商鞅墨翟荀況韓非李斯賈誼枚乘司馬遷相如劉向楊雄皆足以自成一家之文學者之所歸也故義雖深理雖當辭不上者不成為文且不能傳也文理義三者兼并乃能獨立乎一時而不泯滅於後代能必傳也仲尼曰言之無文行之不逺子貢曰文猶質也質猶文也虎豹之鞹猶犬羊之鞹此之謂也陸機曰怵他人之我先韓退之曰唯陳言之務去假令述笑哂之狀曰莞爾則論語言之矣曰啞啞則易言之矣曰粲然則榖梁子言之矣曰攸爾則班固言之矣曰囅然則左思言之矣吾復言之與前文何以異也此造言之大歸也吾所以不協於時而學古文者恱古人之行愛古人之道也故學其言不可以不行其行行其行不可以不重其道重其道不可以不知其禮古之人相接有等重其義列於經傳皆可詳別如師之於門人則名之於朋友則字而不名稱之於師雖朋友亦名之子曰吾與回言又曰參乎吾道一以貫之又曰若由也不得其死然是師之名門人驗也夫子於鄭兄事子産於齊兄事晏平仲傳曰子謂子産有君子之道四焉又曰晏平仲善與人交子夏言遊過也子張曰子夏云何曽子曰堂堂乎張也是朋友字而不名驗也子貢曰賜也何敢望回又曰師與商也孰賢子遊曰有淡臺滅明者行不由徑是稱於師雖朋友亦名驗也孟子曰天下之達尊三曰德爵年惡得有一而慢其二足下之書曰韋君詞楊君濳足下之德與二君未知前後也而足下齒幼而位卑而皆名之傳曰吾見其與先生並行也竊懼足下不思乃陷于此韋踐之與翺書亟敘足下之善故敢盡詞以復足下之厚意計必不以為犯李翺頓首上楊相公啓劉太真太真啓前者曲蒙處分今獻所學舊文伏念早年僻居江介泛窺經典莫究宗源天寶中常遇故揚州功曹蘭陵蕭君語及文學許相師授而家貧丗亂不克終之其後從役外府所用寡細雖抱宿心無因警發雖欲奔前賢之墻宇揖作者之風度涉隅角而輒滯望端倪而自失常有一言適至理一章逸遺恨竊懷恥愧不覺淹久以深稽命之罪寧負厚顔之愧謹上近所記録三十餘章及復內省慙惶汗流伏惟相公秉人文以作相敷天縱之盛美發六籍以立言極三才之奧義協贊一德化成羣有懸衡而制其輕重操繩而審其曲直小人既無學術又無材用形神低悴年鬢頽老又念頃日曽霑引問擊蒙而恆失所對庸劣而竟無上輔今復以此昧塵明鑒相公假為之納其瑕穢小人不亦自重其嫌斥乎向使強仕之間獲趨門館荷深仁於哲匠被君子之善誘雖其頑魯或有庶幾之道焉今過五十巳加其四學之巳困力又不足遇伯樂而反惡於長鳴視姫薑而自退其陋質抑小人之命也不敢多言謹啓上知已文謹啓杜牧某啓某少小好為文章伏以侍郎文師也是敢謹貢七篇以為視聽之汚伏以元和功德凡人盡當歌詠紀敘之故作燕將録往年弔伐之道未甚得所故作罪言自艱難以來卒伍傭役輩多據兵為天子諸侯故作原十六衛諸侯或恃功不識古道以至于反側叛亂故作與劉司徒書處士之名即古之巢白伊吕輩近者往往自名之故作送薛處士序寶曆大起宫室廣聲色故作阿房宫賦有廬終南山下嘗有耕田著書志故作望故園賦雖未能深窺古人得與揖讓笑言亦或的的分其狀貌矣貞元四年來在大君子門下恭承指顧約束於政理簿書間永不執卷上都有舊第唯書萬卷終南山下有舊廬頗有水樹當以耒耜筆硯間齒髮尚壯間兾有成立他日捧持一遊門下為拜謁之先或希一獎今者所獻但有輕黷尊嚴之罪亦何所取伏希少假誅責生死幸甚上令狐相公詩啓元稹某啓某初不好文徒以仕無他歧強由科試及有罪譴棄之後自以為廢滯潦倒不復以文字有聞於人矣曾不知好事者抉摘芻蕪塵穢尊重竊承相公直於廊廟間道某詩句昨又面奉教約今獻舊文戰汗悚懼慙忝無地某始自御史府謫官於外十餘年矣間誕無事遂用力於詩章日益月滋有詩千餘首其間感物寓意可備朦瞽之風達者有之詞直氣粗罪戾是懼固不敢陳露於人惟杯酒光景間屢為小碎篇章以自吟暢然以為律體卑下格力不揚茍無姿態則陷流俗常欲得思深語近韻律調新屬對無差而風情自逺然而病未能也江湖間多有新進小生不知天下文有宗主妄相倣斆而又從而失之遂至支離𥚹淺之詞皆目為元和詩體某又與同門生白居易友善居易雅能為詩就中愛驅駕文字窮極聲韻或為千言或為五百言律詩以相投寄小生自審不能有以過之往往戲排舊韻别創新詞名為次韻蓋欲以難相挑耳江湖間為詩者或相倣斆或力不足則至於顛倒語言重復首尾韻同意等不異於篇亦目為元和詩體而司文者考變雅之由往往歸咎於某嘗以為雕蟲小事不足自明聞相公記憶纍旬巳來實懼糞土之牆庇於大廈使不復摧壞永為板築者之誤輒敢繕寫古體詩歌一百首一百韻至兩韻律詩又一百首合為五卷奉啓跪陳或希搆厦之餘一賜觀覽知小生於章句中􅟝櫨榱桷之材盡曾量度則十餘年之邅回不為無所用心耳詞旨瑣劣冒黷尊嚴伏俟刑書不敢逃讓死罪死罪重校正唐文粹卷第八十五嘉靖甲申歲太學生姑蘇徐焴文明刻于家孰
