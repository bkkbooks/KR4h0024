  - {type: variant, offset: 0, length: 4779, content: 重校正唐文粹卷第三十三之上吳興姚鉉纂文丙揔九首弔古三許由先生廟酹文柳識弔夷齊文書師曠廟文袁皓雷霆一上天鼓文程浩軍政一祭纛文獨孤及畏途一招北客文祛癘一送窮文叚成式責檄二責龜文王岳靈檄曲江水伯文樊鑄許先生頴陽祠庭獻酹文柳識壬辰歳夏四月客有自洛東遊至先生遺廟而穎永古風舊山巋然追懷古蹤慕羙至道以時酒敬酹于靈旣酌旣拜獻乎言曰天清旣能乆地靜不能朽先生清淨天地全性出於肧渾入於鴻蒙雲遊鳥還蓊鬱和風當時帝道巳半滋章欲深大樸散於人未散於山林乃有巢父杳冥同心堯齎公器退然見推遇聖相感不得不知耳雖濯於清流道終播於無爲所謂春膏時蒸朽葉自滋先生含德唐堯發之潁陽之仁德日大天下之禄利日卑且聖王所重者名器至人所重者感通推以大名義同譲終廉能感俗道自爲功任應㑹之偶然生垂後之清風人登雲嶺多憶箕潁猗歟先生山水齊名兹焉遺廟萬古芬馨弔夷齊文洪河之東兮首陽穹崇側聞孤竹二子昔也餒在其中偕隱胡爲得仁而死青苔古木蒼雲秋水魂兮來何依兮去何止掇澗溪之毛薦精誠而巳𥘉先生鴻逸中州鸞伏西山顧薇蕨之離離歌唐虞之不還謂易暴兮又武謂墨縗兮胡顔一吒兮忘飢若有誚兮干巖之關豈不以冠弊在於上履新處於下且曰一人之正位孰知三聖之純嘏讓周之意不其然乎是以知先生所恤者偏矣當昔夷羊在牧殷綱解結乾道息坤維絶鯨吞噬兮鬼孽王奮厥武天意若曰覆昏暴資濬哲於是三老歸而八百㑹一戎衣而九有截況乎旗錫黃鳥珪命赤烏俾荷鉅橋之施俾申羑里之辜故能山立雨集電掃風驅及下車也五刃不礪於武庫九駿伏轅於文途雖二士不食而兆人其蘇旣而溥天周土率土周人于嗟先生逃將奚臻萬姓歸飾兮獨鬱乎方寸六合莽蕩兮終跼乎一身雖忤時而過周終臣心而惻殷所以不食其食求仁得仁然非一端事各其志若旁通以阜厥躬應物以濟其利則焉有貞節之規各親之事靈乎靈乎雖非與道而保生乃朂爲臣之不二書師曠廟文袁皓吟篁怨桐天其聲乎鏘石鏗金天其文乎擊革鳴絲天其暢乎匏土之韻天其和乎天有至音寄斯八物先生不生斯音鬱鬱先生旣生斯音在律嗚呼先生之耳時可求也先生之心不可得也天全樂乎先生之無神乎愚固狂而不可攄先生之有神乎愚堅誠而乞其圖先生之耳有神乎化爲天下之耳先生之心有神乎化爲天下之心者可以舒於今然後家家知舜琴上天鼓文程浩雷車闐闐六合喧吼驟風雨於南極族星雲於北斗遑俄選蹙東海以波蕩擺太山而瓜剖玉石至堅切如泥濘松栢至勁粉爲枯朽鼉皮擊考而魑魅晱暘龍領觗觸而鯨鯢奔走陶鑄造化之鑪而鴻毛萬像幹運乾坤之柄而嬰孩羣有由是言則九鼎瑣細三山培塿鼒鼐可以指揮蓬萊可以背負殊不測離蒼天之近逺當懼驚魂在玄雲之幾重徒勞矯首及夫白日兩歇長虹霽後列缺緩轡玄冥假手蓄殘怒之未洩聞餘音之良乆而小子之繆學敢獻疑於座右今若爲善惡之宰主操賞罰之休咎胡不扶持顔閔之羶行夭閼跖蹻之首夀罪一亂臣懲天下之凶醜旌一孝行激天下之悌友法髙懸於堯典形不試於周后何必霹靂濳之龍養育吠堯之狗祭纛文獨孤及天地不仁神明無親惟正是與若響之荅敢有象㳟滔天搆亹稱亂國有明罰神其捨諸賊臣劉展假寵多難敢包狼心竊發蠆毒將敷虐于我上下神祇使東溟揚波羣動昏墊皇帝震怒按劒授鉞命我上將底天之伐於是有虎牙鷹揚之臣蛇矛犀渠之羣橫行而東我伐用張月羽雲旗以先啓行方將歷潯陽下南陵收京口掃建業斮梟獍以釁鼓封鯨鯢于京觀俾萬里浪破三象霧廓今以令月吉日整駕即路是用徼福于爾有神惟神降衷尚弼予志敢告無靡旗無絓驂無汰輈無僨車命五將護野萬靈並轂令天地氛祲望風掃除魑魅魍魎罔不率㑭莫我敢遏爲神祇羞尚饗招北客文蜀之先曰𧖟叢兮縱其目以稱王當周室凌頽兮亂無紀綱洎乎杜宇從天而降鼈靈泝江而上相禪而帝據有南國之九世蜀夲南夷人也皆左其袵而椎其髻及通乎秦也始於惠王之代五牛琢而秦女至一蛇死而力士斃二江雙注羣山四蔽其地卑溼其風脞脆蠻貊雜處滇僰爲隣地偏而兩儀不正寒薄而四氣不均花葉再榮秋冬如春暮夜多雨朝旦多雲陽景罕開隂氣恒昏以暑以溼爲瘵爲癘氣浥蟄以中人吾知重膇之疾兮將嬰爾身蜀之不可徃北客歸去來兮其東則有大江澐澐下絶地垠百谷相吞岀於荆門突怒吼劃附于太白渤潏硼砰㑹于滄溟跳噴浩森上濺飛鳥蹙縮盤渦下旋黿鼉三峽兩璧亂峯如㦸岈屹崪􅐓洞劃坼高干天霓雲外水積晝日無光其下黒窄瞿塘無底淺處萬尺啼猿哀哀膓斷過客復有千歳老蛟能變其身好飲人血化爲婦人衒服靚粧遊干水濵五月之間白帝之下洪濤塞峽不見灔澦翻天蹙地霆吼雷怒亦有行舟突然而去人未及顧櫂未及舉瞥見陽臺不辨雲雨千里一歇日未移午須臾黒風暴起拔樹震山石走砂飛波騰浪翻舟子失據摧檣折竿漩入九泉没而不還支體糜散蕩入石間水族呀呀拔刺爭餐蜀之東不可徃北客歸去來兮其西則有髙山萬重峻極屬天西有崑崙其峯相連日月廻環閡于山巓巒崖盤嶔天璧夐絶陽和不入隂氣固閉千年増氷萬古積雪谿寒地坼谷凍石裂夏月草枯春天木折蒼煙凝兮黒霧結人墮指兮馬傷骨江水噴激廻盤紆縈棧璧縁雲釣連相撑繩梁嶫虛傍沓杳冥下不見底空聞波聲過者矍然亡魂䘮精復引一索其名爲笮人懸半空度彼絶壑或如鳥兮或如玃倐徃還來幸不落或有豪猪千羣努鬛射人寒熊孔碩登樹自擲見人則擘巨麋如牛脩角如劒餓虎爭肉吼怒闞闞復有髙崖墜石兮聲若雷之軯轟上𫾣下礚似火迸兮滿山流星磵溪忽兮倒流林岸爲之頽傾碎騰狖與過鳥駭木魅兮山精飛石壓人兮不可行西有犬戎與此山通形貌類人言語不同氊廬隆穹毳裘蒙茸啜酪啖肉持搶挾弓依草及泉務戰與功其聲如犬其聚如蜂中國之人兮或流落於其中豈只掘䑕茹雪以取活終當鈹其足而纍其胸泣漢月於西海思故鄉於北風蜀之西不可徃北客歸去來兮其南則有卭笮之關天設險艱少有平地連延長山橫亘廬江隔閡百蠻吁彼漢原上當漏天靡日不雨四時霶然其人如魚爰處其泉終年霖霪時復日出㹞㹞諸犬向天吠日人皆濕寢偏死腰疾復有陽山之路毒瘴下凝白日無光其氣瞢瞢暑雨下濕黃茅上蒸南方之人兮不敢過豈止走獸踣兮飛鳥墮吾不知造化兮何知此方些蜀之南不可以徃北客歸去來兮其北則有劒山巉巉天鑿之門二璧谽谺髙岸嶙峋上拄南斗傍鎭于坤下有長道北逹于秦秦地神州中有聖人左右伊皐能致我君雙闕峩峩上覆慶雲千官鏘鏘朝于紫宸玉樓鳳凰金殿麒麟布徳垂澤搜賢修文皇化欣欣煦然而春蜀之北不可以往北客歸去來兮送窮文㱼成式子大中八年作留窮辭詞人謂子辭反之勝也至十三年客漢上復作送窮祝是年正之晦童稚戲爲送窮舡判筒而槽比籜而閭細枲纒幅楮飾木偶家督𬒳酒請禳窮將酹地歌舞窮子謂曰予送非嚵歷慼循隂索隙膋葷餅直脰涎瀝者非寒哭蔟憐敗衣網身惡覻牆間冷嘯淒辛者非嚇去覡嗾巫欺癡嬈衰燼數楮泉擾狎狐狸者噫有才歉升窄朘膓􅎪喀㡬童其筆燥心汗滴以是而殁者去些有議古酌今左凌右浸麓垤酒涔短淺不禁以是而殁者去些責龜文王岳靈萬物之貴者人也人惟秀介蟲之智者龜也龜惟神隱括無形神之謂也窮通有極秀之謂也况天之與人其道甚逺不有以也将何逺焉則吉凶之祥假子以告變化之象因子以明欲愛謀稽疑必先弊昆命冝蠲割誘慕展布心腹子無欺於人人有望於子成天下之亹亹豈不率道與何諸吕弄權昭大横於漢帝帝辛毒痡匪告繇於周武揆惡之輕重也吕之惡不浮于辛量徳之休明也昌之徳靡及於發子二其行誰不解體矣夫義禮之輿也信身之幹也何陳氏之母不疾而稱疾魯孫之臣卜僭而告義喪於禮失其徒寔繁吾不殫悉考夫演卦繇者蓍也蓍之靈而不加子之長定妍蚩者鏡也鏡之明不如子之知銘乎竹帛萬代不泯奚起矛楯俾吾反惑於古人孰謂子原天地之美逹五行之理徒使䟽淪澡雪仰止蒙求曾莫之校何異乎曹丘生愚拒季布善盻已虞國僑哉必以剥桂刻漆非材木所願拔鶡裂冠非禽鳥所欲當濳伏奫灣違禍罾罟九江錫命其可得乎豈不免氓之蚩蚩熒惑於耳目也檄曲江水伯文天寳三載群公之故也樊鑄主張於地之血脉者豈不曰水伯乎爾自獸爲身面爲人控牽兩龍窟宅百谷億有祀矣故斁倫於元氣之液弄權於坤輿之竅所云老而不死是謂之賊伊我謂爾有是夫何者三載二月春服旣成冠者五六人才子六七人皆簸揚文精開闔武庫游嬉春晝㳂洄江干興飛壯心舞曳齒胄皆貸白龜之徳不負赤鯉之本爾何爲隂發暴殄濳生毒痡簣禍堦於沙岸垣死府於花島如數子者皆載垂堂之誡爾始若懸流三十仞跳沬四十里固應尊而不親舋豈相及爾岸不崪屼流不唐突設人所倚之福䧟爾孔易之誘俾水衒貫堅之功舫聲之如蜩螗捫空呼天迄死不救倐恣化魚之惡誰下拜牛之惠溺我國寳豈明時弃珠之泉沈彼綵舩實去夜藏舟之壑與夫覩右山四耳之獸夢頴川一角之人置于大江未匹斯甚使掲竿求父之子投牋請弟之兄奏箜篌傷妻之夫厲波濤徇壻之婦罹其凶害不忍荼毒並告無辜于上下神祗行哭失至於爾安乎爾今肆行賊虐者豈不謂性與習成乎何哉曩者溺孫興公於後湖之中淪炎帝女於東海之上化鼈於黃氏之母爲魚於歷陽之郡爾應恃以舊捷蔓其後圖殊不知事不欲數數斯辱矣惡貫巳滿天命誅之然今歷視爾自昔爲過之所或天涯或地􅯀起於侯甸之外且非輦轂之下豈比今日俯九門臨四逹使哀聲悲響上及聦聽爾誰欺欺天乎然曲江者南峙仙閣北距靈宫足可效赤水産黄帝之珠胡爲殱蒼生竊司命之契況之人也皆編中華俗游無何鄊所兾猛火烈山而莫焚大浸稽天而不溺旣遇爾省括捨之中縱使飯術解漂之餌山經不沈之木豈可免爾之圖乎玆中江自首創至于今時數千里子更代易主㠀流波秏纔可接腋於井蛙詎持頤於海鼈爾之所處豈不狹隘乎人之所賞豈有舳艫乎逮天寳載我皇恢土德以博之竇澤流以濬之積潤下之波瀾用濟川之舟檝豈不謂幸於爾也爾何滿以致溢凶以自斃使彼都人士自此之後懼爾同失神之海惡爾甚探手之湯匪徒歇爾盛事過自掇也雖悔可追然靈莫尊於君人時莫美於陽春君固愛人種徳乗春宥罪省囹圄去桎梏爾奚得恃宅無聞括守有曲襲不辜於止獄之候繫餘殃於積慶之家僕謂數子呌天曹訴地府黜爾主職在於斯須不然僕見欲上書於承明廬徴菑近速周處擊劒長逐擘波深搜爾居遁逃則焦僥東請長臂者灑漉之又於雄棠北使長股者慿踐之不然邀離朱以視之命宋定以縛之然後調馬梅扇獸炭是烹是醘以報東門爾儻若混空隱形和水匿象則使牛曵蛇尾絶其本根縱逢山見彘毛終難必復矣僕亦冝念五六日至于旬時恐爾有詞曰予不誡視成不令而行故矢在弦上垂而未發儻能易轍僕則旣徃不咎若爲刻舟爾則何辭以對徐察爾變惟審圖之重校正唐文粹卷第三十三之上重校正唐文粹卷第三十三之下呉興姚鉉纂文丁揔一十五首傷悼題哀辭後附弔古戰塲文李華弔國殤文張說弔九江驛碑材文歐陽詹悲剡溪古藤文舒元輿弔韓弇没胡中文李觀哀二良文白居易奠相國令狐公文李商隱祭韓侍郎文李翺祭獨孤常州文崔祐甫祀呂衡州化光文柳宗元爲常州獨孤使君祭李員外文梁肅祭柳子厚文韓愈祭柳柳州文皇甫湜祭亡友故楊州功曹蕭公文李華歐陽生哀辭韓愈弔古戰場文李華浩浩乎平沙無垠夐不見人河水縈帶群山糾紛黯兮慘悴風悲日曛蓬斷草枯澟若霜晨鳥非不下獸挺亡群亭長告余曰此古戰塲也常覆三軍徃徃鬼哭天隂則聞傷心哉秦歟漢歟將近代歟吾聞夫齊魏傜戍荆韓召募萬里奔走連年暴露沙草晨牧河氷夜渡地闊天長不知歸路寄身鋒刃腷臆誰訢秦漢而還多事四夷中州耗斁無世無之古稱戎夏不抗王師文教失宣武臣用竒竒兵有異於仁義王道迂闊而莫爲嗚呼噫嘻吾想夫北風振漠胡兵伺便主將驕敵期門受戰野豎旄旗川廻組練法重心駭威尊命賤利鏃穿骨驚沙入面主客相搏山川震眩聲折江河勢崩雷電至若窮隂凝閉凛洌海隅積雪没脛堅氷在鬚鷙鳥休巢征馬踟蹰繒纊無温墮指裂膚當此苦寒天假強胡慿凌殺氣以相剪屠徑截輜重横攻士卒都尉新降將軍復没屍塡巨港之岸血滿長城之窟無貴無賤同爲枯骨可勝言哉鼓衰兮力盡矢竭兮弦絶白刃交兮寳刀折兩軍蹙兮生死决降矣哉終身夷狄戰矣哉暴骨沙礫鳥無聲兮山寂寂夜正長兮風淅淅魂魄結兮天沉沉鬼神聚兮雲羃羃日光寒兮草短月色苦兮霜白傷心慘目有如是耶吾聞之牧用趙卒大破林胡開地千里遁逃匈奴漢傾天下財殫力痡任人而巳其在多乎周逐獫狁北至大原旣城朔方全師而還飲至䇿勲知樂且閑穆穆棣棣君臣之間秦起長城竟海爲關荼毒生人萬里朱殷漢繫匈奴雖得隂山枕骸徧野功不𥙷患蒼蒼蒸民誰無父母提携捧負畏其不夀誰無兄弟如足如手誰無夫婦如賔如友生也何恩殺之何咎其存其没家莫聞知人或有言將信將疑姢姢心目寢寐見之布奠傾觴哭望天涯天地爲愁草木悽悲弔祭不至精魂無依必有凶年人其流離嗚呼噫嘻時耶命耶從古如斯爲之柰何守在四夷弔國殤文張說北伐兮東胡邈遼陽兮孤竹徧師兮覆衆在崇山兮峽谷露芃芃兮蔓草風蓁蓁兮拱木見馬血兮夜燃聞殤魂兮雨哭君王按金鼓而氣憤撫珠鈴而淚滋横萬里兮抽恨弔群山而冩悲懟凶將, WYG: ''}
