body:
  text: 吳興姚鉉纂碑十一揔四首紀功三受降城碑吕温平淮碑韓雲卿平淮西碑段文昌幽州紀聖功碑李徳𥙿三受降城碑銘并序吕温夏后氏遏洪水驅龍蛇能禦大菑以活黔首周文王城朔方逐獫狁能捍大患以安中區若非高岸峻防重門撃析雖有盛德曷觀成功然則持璿璣而弛張萬象昊穹之妙用扼勝勢以擒縱八極王者之宏圖道雖無外權則有備變化消息存乎其人三受降城皇唐之勝勢者也昔秦不量力北築長城右扼臨洮左馳碣石生人盡去不足乗障兩漢之後頽爲荒丘退居河滸歷代莫進矯亡秦之弊則可矣盡中國之利則未然唐興因循未暇經啓有拂雲祠者在河之北地形雄坦控扼樞㑹虜伏其下以窺域中禱神觀兵然後入寇甲不及擐突如其來鯨一躍而吞舟虎數歩而擇肉塞草落而邊甿懼河氷堅而羽檄走爰自受命至于中興國無寧歲景龍二年黙啜強暴瀆鄰構怨掃境西伐漢南空虛朔方大揔營韓國公張仁愿躡機而謀請築三城奪據其地跨大河以北嚮制胡馬之南牧中宗詔許横議不撓時唐休璟建議非之於是留及瓜之戍斬姦命之卒六旬雷動三城岳立以拂雲祠爲中城東西相去各四百里過朝那而北闢斥候迭望幾二千所損費億計減兵萬人分形以據同力而守東極于海西窮于天納隂山於寸眸拳大漠於一掌驚塵飛而𤇺火燿孤鴈起而刁斗鳴渉河而南門用晏閑韓公猶以爲未也方将建大斾提金鼓馳神笇鞠虎旅看旄頭明滅與太白進退小則責琛賮受厥角定保塞一隅之安大則倒狼居竭瀚海空苦塞萬里之野大略方運元勲不集天其未使我唐無北顧之憂乎厥後賢愚迭任工拙異勢剛者黷武柔者敗律城隳險固寇得凌軼或驅馬飲河而去或控弦劇壘而旋吾知韓公不瞑目於地下矣今天子誔敷文德茂育羣生戢兵和親七狄右袵然而軍志有受降如敵大易有安不忘危崇墉言言其可㢮柝亦冝鎭以元老授之廟勝伸述舊職而恢遺功外勤撫綏内謹經略使其來不敢仰視去不敢反顧永讋猛氣無生禍心聳威馴恩禽息荒外安固萬代術何加焉敢勒銘城隅庶復隍而光烈不昧銘曰韓侯受命志在朔易北方之強制以全䇿亘漢橫塞掲兹雄壁如三鬪龍躍出大澤並分襟帯各閉風雷俯視隂山仰看昭回一夫登陴萬里洞開日晏秋盡纎塵不來時惟韓侯方運神妙觀釁則動乃誅乃弔廓乎窮荒盡日所照天乎未賛不䇿清廟我聖耀德罷扃北門優而柔之用息元元曷若完守推亡固存于襄于夷永𥙿後昆平淮碑并序韓雲卿惟唐上元辛丑歲叛臣劉展竊地弄兵悖撓天常肆虐黎人淮泗而南施于閩越人殘令絶職貢不修先皇帝命我特進試鴻臚卿兼御史中丞田神功統盧龍勁卒控弦引鏑萬有餘騎涉淮浮江梟懸魁逆布宣德澤返斾河南吳楚之人父子相歡戚屬相賀土壤耕闢年榖豐登舳艫若飛歲月相屬朝廷甄收顯寵荐及出領方面入秉端揆錫圭分社有土爲王牧守逺近耆耋農桑工賈飲惠懷德皆願銘石江滸播垂休烈其辭曰昔在上元中夏猶虞姦兇矯攘鯨毒楚吳帝命信都偏師萬人鐵騎騰凌風行雲奔頓旗偃節敦諭威德兇慝不悛揺蠆恃毒桓桓信都奮髯提戈援桴軍門氣淩山河地祇號風江靈鼓波上殞髦頭下除巴蛇通地之經導天之和人胥已安積十餘年田野豐穰轉漕如川伊昔有周召虎方叔降及嬴秦翦起繼躅履險成功孰與爲足天子是咨南人是懷享國兾都銘功海門陵谷可遷碩德長存平淮西碑叚文昌夫五兵之設本以助文德而成教化故聖人不專任之其有桀驁暴邪干紀作孽道德不服則兵以威之文告不諭則兵以靜之在禁暴除害而巳自黃帝堯舜不能無誅至湯武受命武功􅐛盛其本之以仁義行之以弔伐惟帝與王率由兹道於戲創業之君勞而後定守文之主安而忘戰故三代之衰功在五伯未有中葉之後再安生靈前古所無歸于聖代我唐運之興也高祖太宗以仁義之兵除暴隋之亂戎功祖武百代丕承玄宗甞亦内翦姦邪外清夷狄所以繼文之代協帝之明旣而禍起於微亂生於理由是髖髀之衆結固於兩河斤斧不用緜歷于五紀肅宗親翦大憝且務生育德宗順宗觀于天象察于人事以理運未至沴氣猶凝運啓昇平以俟後聖惟我后握樞出震端扆向明考上玄之心思祖宗之意掃滌區宇光啓帝圖不以萬乗爲尊四海爲富遵大禹櫛風之志有光武乙夜之勤以爲景擒七國而漢氏安成翦三監而周化洽焉有患難未去而德敎可興日者惠琳恃近狄之固劉闢慿坤維之險李錡保長江之衝從史資太行之阻四兇相扇繼爲亂常三數年間盡膏鉄鑕太尉茂昭以中山之地盡室來朝司空弘正以全魏之邦舉宗向闕義風所激莫不歸心況彭城從折簡之召横海展執珪之覲向談虞虢之存亡議輔車之形勢莫不刳心斷臂繼踵爲忠旣而麟見於巴賨之間河清於鄘衛之際固同本之貺昭聖祚之符廓清寰海兆於此矣而長淮右地連山四起控扼呉楚密邇轘轅有上帝濯龍之池同兾方多馬之國戈鋋雪照駔駿雲屯二姓三兇慿阻作孽歲在甲午呉少誠積禍而斃餘殃聚於逆嗣氛祲淮濆我后方弔人省冤墾災除穢猶命使者持節往申寵賻以柔服之義示含弘之仁元濟劫衆拒境滔天肆逆剽葉縣燒舞陽侵襄城伊洛之間騷然震恐乃詢廷議咸願假以墨絰授以兵符天子淵黙以思霆馳以斷獨發宸慮不詢衆謀漢宣從屯田之議晉武決平吳之計至聖不惑羣疑自消於是㑹鳧藻之師得鷹揚之帥以中軍帥李光顔往者平朔邊靜庸蜀雙矛電激孤劒飈馳亦由馮異之揔軍鋒子顔之将突騎才氣雄武可掃攙搶揔魏博河陽郃陽凡三軍自臨潁而前以河陽軍帥烏重㣧當從史内詘邪謀外阻兵勢精誠奮發獨應王師故得虜魏豹於軍中縛吕布於麾下識慮中正可革梟音益以汝海之地揔朔方義成陜虢劔南西川鳳翔延州寧慶凡七軍由襄陽而進宣武帥韓弘請以子公武領精卒一萬三千時集洄曲欒書作帥鍼爲戎右充國討虜印統支軍是能從帥之命成父之志又以夀春守李文通夙精戎韜累習軍旅明於守備可保金湯揔宣武淮南宣歙浙西徐泗凡五軍阨固始之險以鄂岳都團練使李道古以先曹王臯有任城之武昔征兇渠甞取安陸授以戎柄嗣其家聲乗五關之隘以唐鄧隨帥李愬温敏能斷靜深有謀昔趙孟慕成季之勲復能霸晉亞夫紹絳侯之武亦克擒吳想其英徽必有以嗣山南東道荆南凡兩軍自文成而東乃命御史中丞裴度布挾纊之恩奉如絲之命以諭羣帥以撫輿師且以古之㑹兵必謀元帥令歸於一勢不欲分命宣武軍帥韓弘爲諸道行營都統假陸遜之鉞拜韓信之壇指蹤畫竒正之機發號申嚴凝之令然後有司馬之法節制之師而寒暑再罹賊巢未下又命内掌樞密之臣梁守謙肅将天威盡護諸将懸白日於千里推赤心於萬人由是甘寧奮升城之勇君文勵擊堰之志焚上蔡以翦其翼拔郾城以扼其吭以軒后攻蚩尤之亂殷宗伐鬼方之罪周公誅淮夷之叛雖以聖討逆皆三年後定百辟之議且謂乆勞将決其機以安海内復命丞相裴度持淮蔡之節撫将帥之臣分鄧禹之麾斾盛竇憲之幕府四牡業業于藩于宣先是光顔重胤公武戎旅同心壘垣齊列長蛇之勢首尾相從發胡騎之雄紛紜縱擊逐餘孽如鳥雀獵殘宼似狐狸干矛杖行次于洄曲丞相之來也羣帥之志氣逾厲統制之號令益明勢如雷霆功在漏刻賊乃悉其精騎以備洄曲之師唐隋帥李愬新揔傷痍之軍稍厲奔北之氣城孤援絶地逼勢危而能養貔虎之威未嘗矍視屈􅋧鳥之勢不使怒形是以收文成柵而降吳秀琳下興橋而擒李祐祐果敢多略衆以留之或謂蓄患不利吾軍愬誠明在躬秉信不撓爰命釋縛授之親兵祐感槩之心出於萬死縱橫之計果效六竒粤十月旣望隂凝雪飛天地盡閉愬乃遣其将史旻仇良輔留鎭文城備其侵軼命李祐領突騎三千以爲鄕導自領中軍三千與監軍使李誠義繼進又遣其将田進誠領馬歩三千以殿其後郊雲晦冥寒可墮指一夕卷斾凌晨破關鋪敦淮濆仍執醜虜雖魏軍得田疇爲導潜岀盧龍鄧艾得田章旣登長驅緜竹用制竒勝與古爲儔四紀逋誅一朝蕩定攄宗廟之宿憤致黎庶之乂安周漢以還莫斯爲盛帝命䇿勲進弘爲侍中光顏重胤並爲司空愬爲左僕射帥山南東道公武加散騎常侍節制鄜坊丹延道古進御史大夫文通加散騎常侍王師獲金爵之賞環境蒙優復之恩掩骼埋胔除瑕宥罪躋羣生於壽域還比戸於可封東西南北無思不服丞相旋請來朝後加金紫光禄大夫封晉國公乃眷淮濆蒸人生殖俾擇循吏撫其疾傷以宣慰副使刑部侍郎馬揔領淮蔡之任天子議功雲臺追美将帥俾刻金石以揚休勲而百辟僉謀羣帥克讓推義士之志敢貪天功徴賢臣之言實在君德於是搢紳之士曁侯服之臣上獻鴻名式昭徽䇿然後光輝千古聲明百蠻詔命掌文之臣文昌勒銘淮浦庶乎閱周雅者美宣王之中興觀劔銘者戒蜀川之恃險銘曰天有肅殺萬物以成雷風爲令霜霰爲刑君有武節四海以寧陳之原野阻以甲兵在昔聖王格寧邦國武以禁暴刑以助德牧除害馬農去蟊蠈苟非戎功孰靜羣慝明明我后神筭精微九重獨運千里不違宵衣旰食再安中㝢始翦朔漠旋梟蜀虜丹徒鏦濞白門縛布服兹肆罪豈勞一旋淮夷怙亂四十餘年長蛇未翦寰宇騒然逮于孽童逆志滔天懷柔匪及告諭罔悛帝念生人乃申薄伐飛将鷹揚前鋒電發齋壇命信靈旗指越我武惟揚妖氣未滅集于洄曲決戰摧兇豹略臨晉維留沓中桓桓攘帥應變無窮浮罌暗渡束馬潜攻合以長圍絕其飛走布德滅妖升城獲醜商不改肆農安其畒洄曲殘兵投戈束手帝嘉羣帥賞不踰時畫社啓封珪組陸離洎于蠻貊服我英威刻之金石作戒淮夷幽州紀聖功碑銘并序李德𥙿幽州盧龍軍帥檢校左僕射張公仲武往年修獻捷之禮今歲有銘勲之請二者君子韙之豈不以諸侯有四夷之功獻其戎捷春秋舊典也宗周納肅愼之貢銘於楛矢天子令德也斯可以爲元侯表可以爲後代法聖上嘉其動而中禮乃命宰臣採其元功傳於惇史臣德𥙿敢颺言曰夫兵者所以除暴害也愛人則惡其爲害禁暴則惡其爲亂雖叡智不殺化之以神至德允懷招之以禮然書有猾夏之戒傳有循刑之訓虞舜四罪乃成大功文王一怒以至無侮非德敎之助歟仁聖文武章天成功神德明道大孝皇帝熈我文典煥乎光明極象外之微臻於至道鼓天下之動致於中和慮必鉤深退而藏密故能神幾獨照成未兆之謀烕光逺震制不覊之虜當其時也烽燧迭警羽書狎至人心大揺羣師沮氣皇帝以軒后之烕神漢高之大略光武之雄斷魏祖之機權合而用之以定王業此議臣所以不敢望於清光也倬哉天地應而品物生君臣應而功業成故龍躍而雲從鶴鳴而子和方叔伐獫狁蠻荆來威安逺擊車師西域震服冝有良将殿于朔邊張公禮恱戰器書成傳癖張仲孝友子孺塞淵流落不耦光景未耀明主雅聞竒志持印而拜尉軍遥推赤心築擅而命元帥拔自雄武授之薊門果能精誠奮發䇿慮偪臆千里獻籌一心憂國則知龍顔善将任人傑而不疑日角好謀歎敵國而強意廻鶻者本北狄之裔也或曰獯狁或曰山戎五帝所不能臣三王所不能制前史載之悉矣曁薛延陀之敗也酋帥吐迷度率衆𣢾塞太宗幸靈武納降立廻鶻部落置瀚海都督因我封殖遂雄北方代宗之戡内難也葉護以射鵰之士親扈戎旌亦由羗髳率師以翼周北貊梟騎以助漢旣滅大憝乃疇厥功特拜葉護司空歲贈繒二萬匹厥後飾宗女以配之立宫室以居之其在京師也滛祠雲構甲第棊布棟宇輪奂衣冠縞素交利者風偃挾邪者景附其翎侯貴種則被我文繢帯我金犀恱和音厭珍膳蝎蠧上國百有餘年旣而桀驁無親天命不祐僣侈極欲神道惡盈本國荐饑畜産耗半黠戞斯因利乗便遂焚龍庭墟落蕭條隂燐青熒今之烏介可汗亡逃失國竊號沙漠非我䇿命自爲假王其來也羡漫隂山睥睨高闕玄塞之下氛霧蔽天質貴主以前驅依大國而求援或丐我米糒救其饑人或邀我甲兵復其故地外雖柔服内有桀心因行人致辭徵呼韓故事願居光禄塞急保受降城其下有二部曰赤心宰相那頡啜持勒赤心者天性忿鷙戎馬尤盛初與名王嗢没斯首謀内附俄而負力怙氣潜圖厲階爲嗢没斯所招誘以俱竭可汗戮於帳下其衆大潰東逼漁陽上乃賜公璽書授以方略公以室韋悍亟之兵近我邊鄙俾其偵邏且禦内侵尋以徵役不供爲虜所敗由是介馬數萬連亘幽陵伏精甲於松樠布穹廬於磧鹵散若飛鳥止如長雲火燎于原不可嚮邇公激義氣以虹貫發精誠而石開竒計兵權密授髦雋乃命介弟仲至與禆将游奉寰玉如清左敵萬李君慶張自榮高守素李志操率鋭兵三萬建斾而前介胄雪照戈矛林植命以義殉壯由師直聲隆隆而未洩欲逐逐而不食戢以聽命嚴而有威公曰險道傾仄且馳且射胡兵所以無敵也致之平原勒以方陣我師可以逞志也於是據以莽平環以武剛首尾蛇伸左右翼張輕騎旣合竒鋒横騖如摧枯株如搏畜兎攝讋者弗取陸梁者皆什虜侯王貴人計以千數然後盡羅服聽悉數係纍谷靜山空靡有孑遺橐駞駃騠風澤而散旃墻罽幕布野畢收馬牛幾至於谷量虜血殆同於川決徑路寶刀祭天金人竒貨珍器不可殫論乃命從事李周瞳馳傳上奏又命牙門将國從玘繼獻戎俘皇帝受而勞之羣臣畢賀昔長平七征驃騎六舉竇憲合氏羗之衆陳湯檻城郭之兵或生靈減耗士馬痡傷邀功救罪矯命專征然猶告類上帝薦功清廟顧視二漢不其恧歟以公威動蠻貊功在漏刻因命公爲東面招撫迴鶻使先是奚契丹皆有虜使監護其國責以歲遺且爲漢謀自迴鶻嘯聚靡不鴟張公命禆将石公緒等諭意兩部戮迴鶻八百人雖介子討罪於龜兹班超行誅於鄯善未足儔也迴鶻又遣宣門将軍等四十七人詭辭結歡潛伺邊隙公密賂其下盡得隂謀且欲馳入五原大敺雜虜公逗留其使緩彼師期竟得人病馬瘏縮衂而退挫鋭解紛繄公善計今烏介自絶皇澤莫敢近邊并丁令以圖安依康居而求活盡徙餘種屈意黒車寄託逺遁流離饑凍黒車亦倚其威重迫脅諸戎造謀籍兵解仇交質自謂約賫深入漢将取而未期渡幕輕留王師往而非利公以壯猷逺御長計覊縻不媮避慊之便終盡致敵之術将時動而得儁豈歲數而勝微矧乎明主杖将帥爲爪牙視戎狄爲䑕彘方獵猛敵不翫細娛非周宣無以成召虎之勲非漢宣無以聽營平之計朂哉上将光我中興公前後受降三萬人特勒二人可汗姉一人都督外宰相四人其他侯王騎将不可備載王襃以日逐歸德稱爲人瑞班固以稽落蕩寇大振天聲孰若天子神武百蠻震慴乗其蹙困臨以兵鋒刈單于之旗納休屠之附非萬里之伐無三年之勤巍乎成功輝焯後代冝刻金石以揚鴻休銘曰大和之𥘉赤氣宵興開成之末彤雲暮凝異鳥南來胡滅之徴北夷颷掃厥國土崩逼迫遷徙震我邊鄙長蛇去穴奔鯨失水上都薊門近連千里曾不畏天猶爲驕子丐我邊榖邀我王師假我一城建彼幡旗歸計強漢郅支嫚辭狼顧朔野伏莽見羸鴈門之北羗戎雜處濈濈羣羊茫茫大鹵縱其梟騎驚我牧圉暴若犲狼疾如風雨皇赫斯怒羽檄徴兵謀而泉黙斷乃雷聲沈機變化動若神明沙漠之北虜無隱情漁陽突騎燕歌壯氣赳赳元戎耽耽虎視金鼓誓衆干旄蔽地爰命其弟屬之大事翩翩飛将董我三軍稟兄之制代師之勤威略火烈胡馬星分戈廻白日劒薄浮雲天街之北旄頭巳落絶轡之野蚩尤未縛俾我元侯恢弘逺略取彼單于係之徽索隂山寢蜂亭徼櫜弓萬里昆夷九譯而通蠻夷旣同天子之功儒臣篆美刋石垂鴻重校正唐文粹卷第五十九
