梯空慙阮家子今朝共遊者得性閑未歸已到仙人家莫驚鷗鳥飛水深嚴公釣松挂巢父衣雲氣轉幽寂谿流無是非名理未足羡腥臊詎所稀自惟負貞意何歳當食薇寒食陸渾別業宋之問洛陽城裏花如雪陸渾山中今始發旦別河橋楊柳風夕卧伊川桃李月伊川桃李正芳新寒食山中酒復春野老不知堯舜力酣歌一曲太平人題東谿公幽居李白杜陵賢人淸且廉東谿卜築歲將淹宅近靑山同謝眺門垂碧柳似陶潛好鳥迎春歌後院飛花送酒舞前簷客到但知留一醉盤中只有水精鹽宿裴有書齋李觀卧君山䆫下山鳥與我言淸風何颼飀松柏中夜䌓乆遊失歸趣宿此似故園林煙橫近郊谿月落古原稚子不待暁花間岀柴門詶暉上人夏日林泉見贈陳子昻聞道白雲居窈窕靑蓮宇巖前萬丈流樹石千年古林卧對軒䆫山隂滿庭户方釋塵中事從君襲蘭杜贈宣州元處士杜牧陵陽北郭隠身世兩忘者蓬蒿三畝居寛於一天下鐏酒對不酌黙與玄相話人生自不足愛嘆遭逢寡東谿玩月王昌齡月從斷山口遥吐柴門端萬木紛空霽流隂中夜攅光連虛象白氣與風露寒谷靜秋泉響巖深青靄殘澄淸入幽夢影破抱空巒怳忽琴䆫裏松谿暁思難太白東谿張老舎即事寄弟姪等岑參渭上秋雨過北風暮騷騷天晴諸山岀太白峯最高主人東谿老兩耳生長毫逺近知百歲子孫皆二毛中庭井欄上一架獼猴桃石泉飯香秔酒瓮開新糟愛兹田中趣始悟世上勞我行有勝事書此寄爾曹長安秋夕戎昱八月更漏長愁人起常早閉門寂無事滿地生秋草昨宵西䆫夢先入荆門道逺客歸去來在家貧亦好貽池陽谷口元賛善李端入谷逢君來秋泉巳難渉林間人獨坐月下山相接重露濕蒼苔明燈照黃葉故交一不見素髪何稠疊宿裴氏山莊王昌齡蒼蒼竹林暮吾亦知所投靜坐山齋月淸谿聞逺流西峯下微雨向晩白雲收遂解塵中組終南春可遊山中作沈千運棲隱別無事所願早離塵不辭城邑遊禮樂拘束人邇來歸山林庶事皆吾身何者爲形骸誰是智與仁寂寞了閑事然後知天眞咳唾驚榮華迂俯相屈伸如何巢與由天子不得臣入山寄城中故人王維中歲頗好道晩家南山垂興來毎獨往勝事空自知行到水窮處坐㸔雲起時偶然值林叟談笑無迴期獨遊王昌齡林卧情毎閑獨遊景常晏時從灞陵下垂釣往南澗手攜雙白魚目送千里鴈悟彼飛有適知此罹憂患放之淸泠泉因得省踈慢永惟靑岑客迴首白雲間神超物無違豈繫名與宦過張邯鄲莊姚合客行長似病煩熱攻四肢到君讀書堂忽若逢良醫堂前水交流堂下樹交枝雨門延風涼洗我昏濁肌與子還往熟行坐恣所冝時時相獻酬文字當酒巵野飯具藜藿永日亦不飢苟餐非其所鱠炙爲蒺藜時清士人閑耕者唯文詞豈獨郷里薦當取四海知宿王昌齡隱居常建青溪深不測隱處唯孤雲松際露微月清光猶爲君茅亭宿花鳥藥院滋苔絞余亦謝時去西山鸞鶴羣訪陸羽處士釋皎然太湖東西路吳王古山前所思不可見歸鴈自翩翩何山賞春茗何處弄清泉莫是滄浪子悠悠一釣舩𥘉春王績前旦岀園遊林華都未有今朝下堂望池冰開巳乆雪避南軒梅風催北庭柳遥呼竈前妾却報機中婦年光恰恰來滿甕營春酒南充謝郡客遊灃州留贈宇文中丞暢當僕本濩落人辱當州郡使量力頗及早謝歸今即巳蕭蕭若凌虚衿帶頓銷靡車服率然來涔陽作遊子鬱鬱寡開顔黙黙獨行李忽逢平生友一笑方在此秋情寧風日楚思浩雲水爲語弋林者冝冥鴻逺矣村居沈亞之無樹巢宿鳥無酒共客醉月上蟬韻残梧桐隂繞地獨出村舎門吟劇微風起蕭蕭蘆荻叢呌嘯如山鬼應縁我憔悴爲我哭秋思贈劉藍田王維籬間犬迎吠岀屋候荆扉歲晏輸井稅山村人夜歸晚田始家熟餘布成我衣詎肯無公事煩君問是非退居孟郊退身何食可敗力不得閑種稻耕白水負薪斫青山衆聽喜巴唱獨醒愁楚顔日暮靜歸時幽幽叩松關渭川田家王維斜光照墟落深巷牛羊歸野老念牧童倚杖候荆扉雉雊麥苗秀蠶眠桑葉稀田夫荷鋤至相見語依依羡此良閑逸悵然歌式微秦中吟十首并序白居易貞元元和之際予在長安聞見之間有足悲者因直歌其事命爲秦中吟議婚天下無正聲恱耳即爲娱人間無正色恱目即爲姝聲色非相逺貧冨則有殊貧爲時所棄冨爲時所趨紅樓冨家女金縷繡羅𥜗見人不斂手嬌癡二八𥘉母兄未開口巳嫁不須臾緑䆫貧家女寂寞二十餘荆釵不直錢衣上無眞珠幾回人欲娉臨日又踟蹰主人㑹良媒置酒滿玉壷四座且勿飲聽我歌兩途冨家女易嫁嫁早輕其夫貧家女難嫁嫁晚孝於姑聞君欲娶婦娶婦意何如重賦厚地植桑麻所要濟生民生民理布帛所求活一身身外充征賦上以奉君親國家定兩稅本意在憂人厥𥘉防其淫明勑内外臣稅外加一物皆以枉法論奈何歲月乆貪吏得因循役我以求寵斂索無冬春織絹未成疋繰絲未盈斤里胥迫我納不許暫逡巡歲暮天地閉隂風生破村夜深煙火滅霰雪落紛紛㓜者形不蔽老者體無温悲喘與寒氣併入鼻頭辛昨日輸殘稅因窺官庫門繒帛如山積絲絮似雲屯号爲羡餘物隨日獻至尊奪我身上暖買爾眼前恩進入瓊林庫歲乆化爲塵傷宅誰家起甲第朱門大道邊豐屋中櫛比高墉外迴環纍纍六七堂棟宇相勾連一堂費百萬鬱鬱起青煙洞房温且清寒暑不能千高堂虚且逈坐卧見南山繞廊紫藤架夾砌紅藥欄攀枝摘櫻桃帶花移牡丹主人此中坐十載爲大官厨有臭敗肉庫有朽貫錢誰能將我語問爾骨肉間豈無貧賤者忍不救飢寒如何奉一身直欲保千年不見馬家宅今作奉誠園傷友陋巷孤寒士岀門苦栖栖雖云志氣在豈免顔色低平生同門友通籍在金閨曩昔膠􅃮契爾來雲雨睽正逢下朝歸軒騎五門西是時天乆隂三日雨淒淒蹇驢避路立肥馬當風嘶迴頭忘相識占道上沙堤昔年洛陽社貧賤相提攜今日長安道對靣隔雲泥近日多如此非君獨慘悽死生不變者唯聞任與黎任公逹黎逢不致仕七十而致仕禮法有眀文何乃貪榮者斯言如不聞可憐八九十齒墮雙眸昏朝露貪名利夕陽憂子孫挂冠顧翠緌懸車惜朱輪金章腰不勝傴僂入公門誰不愛冨貴誰不戀君恩年高須告老名遂合退身少時共嗤誚晩歲多因循賢哉漢二踈彼獨是何人寂寞東門路無人繼去塵立碑勲德旣下衰文章亦陵夷但見山中石刻作路傍碑銘勲悉太公叙德皆仲尼復以多爲貴千言直萬貲爲文彼何人想見下筆時但欲愚者恱不思賢者嗤豈獨賢者嗤仍傳後代疑古石蒼苔字安知是愧辭我聞望江縣麴令撫惸婺矛牙麴令名信陸在官有仁政名不聞京師身殁欲歸葬百姓遮路岐攀轅不得去留葬此江湄至今道其名男女涕皆垂無人立碑碣唯有邑人知輕肥意氣驕滿路鞍馬光照塵借問何爲者人稱是内臣朱紱皆大夫紫綬或將軍誇赴軍中晏走馬去如雲罇罍溢九醖水陸羅八珍果擘洞庭橘鱠切天池鱗食飽色自若酒酣氣益振是歲江南旱衢州人食人五弦淸歌且罷唱紅袂亦停舞趙叟抱五弦宛轉當胸撫大聲粗音麤若散颯颯風和雨小聲細欲絶切切鬼神語又如鵲報喜轉作啼猿苦十指無定音顚倒宫徵羽坐客聞此聲形神若無主行客聞此聲駐足不能舉嗟嗟俗人耳好今不好古所以北䆫琴日日生塵土歌舞秦城歲云暮大雪滿皇州雪中朝退者朱紫盡公矦貴有風雲興冨無飢寒憂所營唯第宅所務在追遊朱輪車馬客紅燭歌舞樓懽酣促密坐醉暖脫重裘秋官爲主人廷尉居上頭日中一爲樂夜半不能休豈知閿郷獄中有凍死囚買花帝城春欲暮諠諠車馬度共道牡丹時相隨買花去貴賤無常價酬直㸔花數灼灼十朶紅戔戔五束素上張幙屋庇旁織笆籬護水灑復泥封移來色如故家家習爲俗人人迷不悟有一田舎翁偶來買花處低頭獨長嘆此嘆無人諭一叢深色花十户中人賦憫農二首李紳春種一粒粟秋收萬顆子四海無閑田農夫猶餓死鋤禾日當午汗滴禾下土誰知盤中飱粒粒皆辛苦石壕吏杜甫莫投石壕村有吏夜捉人老翁踰墻走老婦出門㸔吏呼一何怒婦啼一何苦聽婦前致詞三男鄴城戍一男附書至二男新戰死在者且偷生死者長巳矣室中更無人所有乳下孫有孫母未去出更無完裙老嫗力雖衰請從吏夜歸急應河陽役猶得備晨炊夜乆語聲絶如聞泣幽咽天明登前途獨與老翁別辛苦吟于濆壠上扶犁兒手種腹長飢䆫下擲梭女手織身無衣我願燕趙姝化爲嫫毋姿一笑不直錢自然家國肥田家詞元稹牛㕰㕰許角反田确确旱塊𫾣牛啼趵趵音剥種得官倉珠顆穀六十年來兵簇簇月月倉糧車轆轆一日官軍收海服驅牛駕車食牛肉歸來收得牛兩角重鑄鍬犁作斤斸姑春婦擔輸促促輸官不足歸賣屋農死有兒牛有犢不遣官軍糧不足傷田家聶夷中二月賣新絲五月糶秋穀醫得眼前瘡剜却心頭肉我願君王心化作光明燭不照綺羅筵偏照逃亡屋采玉行韋應物官府徵白丁言采藍溪玉絶嶺夜無人深榛雨中宿獨婦餉糧還哀哀舎南哭茶山作袁高禹貢通逺俗所圖在安人后王失其本職吏不敢陳亦有姦佞者因兹欲求伸動生千金費日使萬姓貧我來顧渚源得與茶事親甿輟耕農米採採實苦辛一夫且當役盡室皆同臻捫葛上欹壁蓬頭入荒榛終朝不盈掬手足皆皴鱗悲嗟遍空山草木爲不春隂嶺芽未吐使者牒巳頻心爭造化力先走挺塵均選納無晝夜擣聲昏繼晨衆工何枯槁俯視彌傷神皇帝尚巡狩東郊路多堙周迴遶天涯所獻逾艱勤況減兵革困量兹固疲民未知供御餘誰合分此珍顧省忝邦守又慙復因循茫茫滄海間丹憤何由申野老歌張籍老翁家貧在山住耕種山田三四畝苗踈稅多不得食輸入官倉化爲土歲暮鋤犁傍空室呼兒登山收橡食西江賈客珠百斛舩中養犬長食肉野行姚合客行野田間比屋皆閉户借問屋中人盡去作商賈官家不稅商稅農服作苦居人競東西道路侵壠畝採玉上山巓探珠入水府邊兵索衣食此物同泥土古來一人耕三人食猶飢如今千萬家無一把鋤犁我倉常空虚我田生蒺䔧上天不雨粟何由活蒸黎重校正唐文粹卷第十六下
