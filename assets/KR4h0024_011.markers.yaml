  - {type: variant, offset: 7722, length: 509, content: 上元年秋漢水大溢齧襄隄以入旣沈漢郛遂滅峴趾棟榱且流壓溺無筭襄之城僅以門免三日水去陷爲大塗餘民棲于楚山號不敢下餒躓相挽其能全者什六七上大憂曰襄惟東南實脰荆海苦氣不息吾躬曷瘳今天下降下之下災于有漢庭垣盡潴胔骼在淖有嬰墜井母實號之今襄臣盡墜吾號尚及哉咨乃卿士疇能振之以易吾亂咸以地官范陽公舊理南粤㠀夷率化甘子民心俾踐于襄必克底乂上俞以往公旣至省漢之溺由舊防之不固㡬五十載又詢之漢水之不犯襄郛惟是甚災旣魚士庶災或能嗣孰以遏之慕民新漢之隄食敵其功資三其食因故隄之址廣倍之高再倍之距襄之郊繚半百里明年春隄成公具以䟽上大歡復襄之疲民一祀賑榖十萬斛民旣保寧謳歌怡愉旣而舒蘇不知曩之災也昔狄敗衞侯于熒澤齊桓公帥諸矦城縁陵以居之而衛國忘亡君子是以稱桓公之德今公之爲是隄也襄有衛人之思焉而況宣天子之慈以生厥民曷齊桓之尚哉噫五材之生沴也必極干物物之旣極天必資明哲以蘇之理之常也古之人有力保一邑勇禦一㓂謂之有功尚以金石載之況捍大災救大患其美若是豈得無稱焉是宜以聲詩播之登于樂府惟漢亦有瓠子之歌是可類之謹按正考甫作商詩公子奚斯命太史克請于周作魯詩皆其國之公族也肇於公爲族孫幸力於文所不冝黙惟峴之碑曰羊公惟隄之詩曰盧公是古今之相光昭也其誰曰不然詩曰, WYG: ''}
