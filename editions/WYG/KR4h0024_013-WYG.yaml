front:
  text: 詩丁揔六十六首
  hash: sha256:5076c1472e767ce6633fb5cfdcc71e70c813fd9ed5f19599076bfbc8c97b5fd9
body:
  text: 樂府辭下神仙十二歩虛詞十首道士吳筠歩虛詞髙駢夢上天元稹俠少十七結客少年塲盧照隣邯鄲少年行鄭錫邯鄲少年行髙適少年子李白少年行二首王維少年詞李百藥少年行張籍少年行崔國輔俠客行元稹俠客行李白刺年少李賀古遊俠呈軍中諸將崔顥青樓曲王昌齡劒客賈島壯士吟孟遲結韈子李白行樂十三楚宫行張籍上之回李白陽春歌皷吹入朝曲白紵詞三首冬白紵元稹相逢行李白古樂府權德輿朝來曲王昌齡將進酒李白將進酒李賀追悼一李夫人白居易愁苦六古别離李端古别離孟郊遊子吟李益遊子吟孟郊苦熱行王轂苦寒行孟郊鳥獸花卉十三八駿圗白居易天馬歌李白紫騮馬騘馬行杜甫猛虎行李白猛虎行李賀白虎行烏棲曲李白烏夜啼艾如張李賀野田黄雀行李白採蓮曲張籍採蓮曲李白古城道路四石城鄭谷沙路曲李賀沙堤行呈裴相公張籍洛陽陌李白歩虛詞十首道士呉筠衆仙仰靈範肅駕朝神宗金景相照曜逶迤昇太空七𤣥已髙飛火鍊生珠宫餘慶逮天壤平和王道融八威清遊氣十絶舞祥風使我躋陽源其來自隂功逍遥太霞上真鑒靡不通逸轡登紫清乗光邁奔電閬風隔三天俯視猶可見玉闥摽敞朗瓊林鬱葱蒨自非挺金骨焉得諧夙願真朋何森森合景恣遊宴良㑹忘淹留千齡纔一眄三宫發明景朗照同鬱儀紛然馳飈欻上采空清蕤令我洞金色後天耀瓊姿心恊太虛靜寥寥竟何思𤣥中有至樂淡泊終無為但與正真友飄颻散遨嬉禀化凝正氣鍊形為真仙忘心符元宗返本恊自然帝一集絳宫流光出丹𤣥元英與桃君朗詠長生篇六府煥明霞百闗羅紫煙飈車渉寥廓靡靡乗景遷不覺雲路逺斯須遊萬天扶桑誕初景羽蓋凌晨霞倐欻造西域嬉遊金母家碧津湛洪源灼爍敷荷花煌煌青琳宫璨璨列玉華真氣溢絳府自然思無邪俯矜區中士夭濁良可嗟瓊臺劫萬仞孤暎大羅表常有三素雲凝光自飛繞羽童泛明霞升降何縹緲鸞鳯吹雅音栖翔絳林摽玉虛無晝夜靈景何皎皎一覩太上京方知衆天小灼灼青華林靈風振瓊柯三光無冬春一氣清且和迴首邇結靈傾眸親曜羅豁落制六天流鈴威百魔緜緜慶不極誰謂椿齡多髙情無侈靡遇物生華光至樂無簫歌金玉音琅琅或登明真臺宴此羽景堂杳靄結寶雲霏微散靈香天人誠遐曠歡泰不可量爰從太微上肆覲虛皇尊騰我八景輿威遲入天門既登玉宸庭肅肅仰紫軒敢問龍漢末如何闢乾坤恰然輟雲璈告我希夷言幸聞至精理方見造化源二氣播萬有化機無停輪而我操其端乃能出陶鈞寥寥大漠上所遇皆清真澄瑩含元和氣同自相親絳樹結丹實紫霞流碧津以茲保童嬰永用超形神歩虛詞髙騈青溪道士人不識上天下天鶴一隻洞門深鎻碧牎寒滴露研朱㸃周易夢上天元稹夢上髙髙天髙髙蒼蒼髙不極下視五嶽塊纍纍仰天依舊蒼蒼色蹋雲聳身身更上攀天下天攀未得西瞻若木兎輪低東望蟠桃海波黒日月之光不到此非暗非明煙塞塞天悠地逺身跨風下無階梯上無力來時畏有他人上截斷龍胡斬鵬翼茫茫漫漫方自悲哭向青雲慆音叨素臆哭聲厭咽旁人惡喚起驚悲淚飄露千慚萬謝喚厭人向使無君終不寤結客少年塲虜照鄰長安重遊俠洛陽富才雄玉劒浮雲騎金鞭明月弓鬭雞過渭北走馬向闗東孫賓遥見待郭解暗相通不受千金爵誰論萬里功將軍下天上虜騎人雲中烽火夜似月兵氣曉成虹横行徇知己負羽逺征戎龍旌昬朔霧鳥陣巻寒風追奔瀚海咽戰罷隂山空歸來謝天子何如馬上翁邯鄲少年行鄭錫霞鞍金口騮豹袖紫貂裘家住叢臺下門前漳水流喚人呈楚舞借客試吳鉤見説秦兵至甘心赴國讎邯鄲少年行髙適邯鄲城西遊俠子自言生長邯鄲裏千場縱博家仍富數處報讎身不死宅中歌笑日紛紛門外車馬長如雲未知肝膽向誰是令人却憶平原君君不見今人交態薄黄金用盡還疎索以茲感歎辭舊遊更於時事無所求且與少年飲美酒徃來射獵西山頭少年子李白青雲少年子挾彈章臺左鞍馬四邊開突如流星過金丸落飛鳥夜入瓊樓卧夷齊是何人獨守西山餓少年行二首王維新豐美酒斗十千咸陽遊俠多少年相逢意氣為君飲繫馬髙樓垂栁邊漢家君臣歡宴終髙議雲臺論戰功天子臨軒賜侯印將軍佩出明光宫少年詞李百藥始酌文君酒新吹弄玉簫少年不歡樂何以盡芳朝千金笑裏面一搦掌中腰掛冠豈憚㝛迎拜不勝嬌寄語少年子無辭歸路遥少年行張籍少年從出獵長楊禁中新拜羽林郎獨到輦前射雙虎君王手賜黄金璫日月鬭雞都市裏贏得寶刀重刻字百里報讎夜出城平明還在倡樓醉遥聞虜到平陵下不待詔書行上馬斬得名王獻桂宫封侯起第一日中不為六郡良家子百戰始取邊城功少年行崔國輔遺却珊瑚鞭白馬驕不行章臺折楊栁春日路傍情俠客行元稹俠客不怕死怕在事不成事成不肯藏姓名我非竊賊誰夜行白日堂堂殺袁盎九衢草草人面青此客此心歸海鯨海鯨露背横滄溟海波分作兩處生分海減海力俠客有謀人莫測三尺鐵虵延二國俠客行李白趙家縵胡纓吳鉤霜雪明銀鞍照白馬颯沓如流星十歩殺一人千里不留行事了拂衣去深藏身與名閒過信陵飲脫劒膝上横將炙啖朱亥持觴勸侯嬴三盃吐然諾五嶽倒為輕眼花耳熱後意氣素蜺生救趙揮金鎚邯鄲先震驚千秋二壯士烜赫大梁城縱死俠骨香不慚世上英誰能書閣下白首太𤣥經刺年少李賀青騘馬肥金鞍光龍腦入縷羅衣香美人狎坐飛瓊觴貧人喚云天上郎别起髙樓連碧篠絲曳紅鱗出深沼有時半醉百花前背把金丸落飛鳥自説生來未為客一身羙妾過三百豈知斸地種田家官稅頻催没人識長金積玉誇豪毅毎揖閒人多意氣生來不讀半行書秖把黄金買身貴少年安得長少年海波尚變為桑田枯榮逓傳急如箭天公豈肯為君偏莫道韶華鎮長在白頭面皺専相待古遊俠呈軍中諸將崔顥少年負膽氣好勇復知㡬杖劒出門去孤城逢合圍殺人遼水上走馬漁陽歸錯落金鎻甲蒙茸貂䑕衣還家行且獵弓矢速如飛地迴鷹犬疾草深狐兎肥腰間帶兩綬轉眼生光輝顧謂今日戰何如隨建威青樓曲王昌齡白馬金鞍從武皇旌旗十萬㝛長楊樓頭小婦鳴筝坐遥見飛塵入建章馳道楊花滿御溝紅粧縵綰上青樓金章紫綬千餘騎夫壻朝迴初拜侯劒客賈島十年磨一劒霜刃未曽試今日把似君誰有不平事壯士吟孟遲壯士何曽悲悲即無迴期如何易水上未歌先淚垂結襪子李白燕南壯士吳門豪筑中置鈆魚隠刀感君恩重許君命太山一擲輕鴻毛楚宫行張籍章華宫中九月時桂花半落紅橘垂江頭騎火照輦道君王夜從雲夢歸霓旌鳯蓋到雙闕臺上重重歌吹發千門萬户開相當燭籠左右列成行下輦更衣入洞房洞房侍女盡焚香玉階羅幕微有霜齊言此夕樂未央玉酒湛湛盈華觴絲竹次第鳴中堂巴姬起舞向君王迴身垂手結明璫願君千年萬年壽朝出射麋夜飲酒上之回李白三十六離宫樓臺與天通閣道歩行月美人愁煙空恩踈寵不及桃李傷春風淫樂意何極金輿向回中萬乗出黄道千旗揚彩虹前軍細栁北後騎甘泉東豈問渭川老寧邀襄野童秋暮瑶池宴歸來樂未窮陽春歌長安白日照春空緑楊結煙垂裊風披香殿前花始紅流芳發出繡户中繡户中相經過飛燕皇后輕身舞紫宫夫人絶世歌聖君三萬六千日歲歲年年柰樂何鼓吹入朝曲金陵控海浦渌水帶呉京鐃歌列騎吹颯沓引公卿搥鍾速嚴糚伐鼓啟重城天子憑玉几劒履若雲行日出照萬户簪裾爛明星朝罷沐浴閒遨遊閬風亭濟濟雙闕下歡娛樂恩榮白紵詞三首揚清歌發皓齒北方佳人東鄰子且吟白紵停緑水長袖拂面為君起寒雲夜巻霜海空胡風吹天飄塞鴻玉顔滿堂樂未終館娃日落歌吹濛月寒江清夜沉沉美人一笑千黄金垂羅舞縠揚哀音郢中白雪且莫吟子夜吳歌動君心動君心冀君賞願作天池雙鴛鴦一朝飛去青雲上吳刀剪綵縫舞衣明粧麗服奪春輝揚眉轉袖若雪飛傾城獨立世所稀激楚結風醉忘歸髙堂月落燭己微玉釵挂纓君莫違冬白紵元稹吳宫夜長宫漏􅍁簾幕四垂燈焰暖西施自舞王自管雪紵翻翻鶴翎散上聲促節牽繁舞腰軟舞腰軟王罷飲蓋覆西施鳯花錦身作牀臂為枕朝珮摐摐王晏寢醒來閤門報無事子胥死後言為諱近王之臣諭王意共笑越王窮惴惴夜夜抱冰寒不睡相逢行李白朝騎五花馬謁帝出銀臺秀色誰家子雲車珠箔開金鞭遥指㸃玉勒近遲回交轂相借問疑從天上來蹙入青綺門當歌共銜盃銜盃映歌扇似月雲中見相見不得親不如不相見相見情己深未語可知心胡為守空閨孤眠愁錦衾錦衾與羅帷纒綿㑹有時春風正澹蕩暮雨來何遲後因三青鳥更報長相思光景不待人須㬰髪成絲當年失行樂老去徒傷悲持此道宻意毋令曠佳期古樂府權德輿光風澹蕩百花吐樓上朝朝學歌舞身年二八壻侍中幼妹承恩兄尚主緑窻珠箔繡鴛鴦侍婢先焚百和香鸎啼日出不知曙寂寂羅幃春夢長朝來曲王昌齡日昃鳴珂動花連繡户春盤龍玉臺鏡唯待畫眉人將進酒李白君不見黄河之水天上來奔流到海不復迴君不見高堂明鏡悲白髪朝如青絲暮如雪人生得意須盡歡莫使金樽空對月天生我材必有用千金散盡還復來烹羔宰牛且為樂㑹須一飲三百盃岑夫子丹邱生與君歌一曲請君為我聽鍾鼎玉帛不足貴但願長醉不願醒古來賢達皆寂寞惟有飲者留其名陳王昔時宴平樂斗酒十千恣歡謔主人何為言少錢且須沽酒對君酌五花馬千金裘呼兒將出換美酒與爾同銷萬古愁將進酒李賀瑠璃鍾琥珀濃小槽酒滴真珠紅烹龍炮鳯玉脂泣羅幃翠幕圍春風吹龍笛擊鼉鼔皓齒歌細腰舞况是青春日將暮桃花亂落如紅雨勸君終日酩酊醉酒不到劉伶墳上土李夫人白居易漢武帝初䘮李夫人夫人病時不肯别死後留得生前恩君恩不盡念未已甘泉殿裏令冩真丹青畫出竟何益不言不笑愁殺人又令方士合靈藥玉釡煎煉金爐焚九華帳深夜悄悄反魂香降夫人魂夫人之魂在何許香煙引到焚香處既來何苦不須臾縹緲悠揚還滅去去何速兮來何遲是耶非耶兩不知翠蛾髣髴平生貎不似昭陽寢疾時魂之不來君心苦魂之來兮君亦悲背燈隔帳不得語安用暫來還見違傷心不獨漢武帝自古及今皆若斯君不見穆王三日哭重璧臺前傷盛姬又不見秦陵一掬淚馬嵬坡下念楊妃縱令妍姿豔質化為土此恨長在無銷期生亦惑死亦惑凡物惑人忘不得人非木石皆有情不如不遇傾城色古别離李端水國葉黄時洞庭霜落夜行舟聞商賈㝛在楓林下此地送君還茫茫似夢間後期知幾日前路轉多山巫峽通湘浦迢迢隔雲雨天晴見海檣月落聞津鼓人老自多愁水深難急流清宵歌一曲白首對汀洲古别離孟郊松山雲繚繞萍路水分離雲去有歸日水分無合時春芳役雙目春色柔四支楊栁織别愁千條萬條絲遊子吟孟益女羞夫壻薄客恥主人賤過逢同衆流低迴愧相見君非青銅鏡何事空照面莫以衣上塵不謂心如練人生當榮盛待士勿言倦君看白日馳不異弦上箭遊子吟孟郊慈母手中線遊子身上衣臨行宻宻縫意恐遲遲歸誰言寸草心報得三春暉苦熱行王轂祝融南來鞭火龍火旗焰焰燒天紅日輪當午凝不去萬國如在洪爐中五嶽翠乾雲彩滅陽侯海底愁波竭何當一夕金風發為我掃却天下熱苦寒行孟郊天色寒青蒼北風呌枯桑厚冰無裂文短日有冷光敲石不得火壯隂奪正陽苦調更何言久吟成此章八駿圖白居易穆王八駿天馬駒後人愛之冩為圗背如龍兮頸如象骨竦筋髙脂肉壯日行萬里疾如飛穆王獨乗何所之四荒八極蹋欲徧三十二蹄無歇時屬車軸折趂不及黄屋草生棄若遺瑶池西赴王母宴七廟經年不親薦璧臺南與盛姬遊明堂不復朝諸侯白雲黄竹歌聲動一人荒樂萬人愁周從后稷到文武積德累功世勤苦豈知纔及四代孫心輕王業如灰土由來尤物不在大能蕩君心即為害文帝却之不肯乗千里馬去漢道興穆王得之不為戒八駿駒來周室壞至今此物世稱珍不知房星之精下為怪八駿圗君莫愛天馬歌李白天馬來出月氐窟背為虎文龍翼骨嘶青雲振緑髮蘭筋權竒走滅没騰崑崙厯西極四足無一蹶雞鳴刷燕晡秣越神行電邁躡慌惚天馬呼飛龍趨目明長庚臆雙鳬尾如流星首渴烏口噴紅光汗溝珠曽陪時龍躍天衢羈金絡月照皇都逸氣稜稜凌九區白璧如山誰敢沽迴頭笑紫燕但覺爾輩愚天馬奔戀君軒駷躍驚矯浮雲飜萬里足躑躅遥瞻閶闔門不逢寒風子誰採逸景孫白雲在青天邱陵逺崔嵬鹽車上峻坂倒行逆施畏日晚伯樂翦拂中道遺少盡其力老棄之願逢田子方惻然為我悲雖有玉山禾不能療苦饑嚴霜五月凋桂枝伏櫪銜寃摧兩眉請君贖獻穆天子猶堪弄影舞瑶池紫騮馬紫騮行且嘶雙飜碧玉蹄臨流不肯渡似惜錦障泥白雪闗山逺黄雲海樹迷揮鞭萬里去安得念春閨騘馬行杜甫鄧公馬癖人共知初得花騘大宛種夙昔傳聞思一見牽來左右神皆竦雄姿逸態何崷崪顧影驕嘶自矜寵兩目清熒夾鏡懸肉騣碨礧連錢動朝來久試華軒下未覺千金滿髙價赤汗微生白雪毛銀鞍却覆香羅帕卿家舊賜公取之天廏真龍此其亞晝洗須騰涇渭深朝趨可刷幽并夜吾聞良驥老始成此馬數年人更驚豈有四蹄疾於鳥不與八駿俱先鳴時俗造次那得致雲霧晦冥方降精近聞下詔喧都邑肯使騏驎地上行猛虎行李白朝作猛虎行暮作猛虎吟膓斷非闗隴頭水淚下不為雍門琴旍旌繽紛兩河道戰鼔驚山欲傾倒秦人半作燕地囚胡馬翻㘅洛陽草一輸一失闗下兵朝降夕叛幽冀城巨鼇未斬海水動魚龍奔走安得寧頗似楚漢時翻覆無定止朝過愽浪沙暮入淮隂市張良未遇韓信貧劉項存亡在兩臣暫到下邳受兵略來投漂母作主人賢哲栖栖古如此今時亦棄青雲士有策不敢犯龍鱗竄身南國避胡塵寶書長劒挂髙閣金鞍駿馬散故人昨日方為宣城客掣鈴交通二千石有時六博快壯心遶牀三匝呼一擲楚人毎道張旭竒心藏風雲世莫知三吳邦伯皆顧盻四海雄俠兩追隨蕭曹曽作沛中吏攀龍附鳯當有時溧陽酒樓三月春楊花茫茫愁殺人胡雛緑眼吹玉笛吳歌白紵飛梁塵丈夫相見且為樂搥牛撾皷㑹衆賓我從此去釣東海得魚笑寄情相親猛虎行李賀長戈莫樁彊弩莫抨乳孫哺子教得生獰舉頭為城掉尾為旌東海黄公愁見夜行道逢騶虞牛哀不平何用尺刀壁上雷鳴泰山之下婦人哭聲官家有程吏不敢聽白虎行火烏日暗崩騰雲秦皇虎視蒼生羣燒書㓕國無暇日鑄劒佩玦唯將軍王壇設醮思沖天一世二世當萬年燒丹未得不死藥拏舟海上尋神仙鯨魚張鬛海波沸耕人半作征人鬼雄豪氣猛如燄煙無人為決天河水誰最苦兮誰最苦報人義士深相許漸離擊筑荆卿歌荆卿把酒燕丹語劒如霜兮膽如鐵出燕城兮望秦月天授秦風祚未終衮龍衣㸃荆卿血朱旗卓地白蛇死漢皇却是真天子烏棲曲李白姑蘇臺上烏棲時吳王宫裏醉西施呉歌楚舞歡未畢青山猶銜半邊日銀箭金壺漏水多起看秋月墜江波東方漸髙柰爾何烏夜啼黄雲城邊烏欲棲歸飛啞啞枝上啼機中織錦秦川女碧紗如煙隔窻語停梭悵然憶逺人獨㝛孤房淚如雨艾如張李賀錦襜褕繡襠襦彊彊啄食哺爾鶵壟東卧穟滿風雨莫逐良媒壟西去齊人織網如素空張在野田平碧中網絲漠漠無形影誤爾觸之傷首紅艾葉緑花誰翦刻中藏禍機不可識野田黄雀行李白遊莫逐炎洲翠棲莫近吳宫燕炎洲逐翠遭網羅吳宫火起焚爾窼蕭條兩翅蓬蒿下縱有鷹鸇柰爾何採蓮曲張籍秋江岸邊蓮子多採蓮女兒凭舩歌青房圎實齊戢戢爭前競折漾微波試索緑莖不尋藕斷處絲多刺傷手白練束腰袖半巻不揷玉釵糚梳淺舩中未滿渡前洲借問阿誰家住逺歸時共待暮潮上自弄芙蓉還蕩槳採蓮曲李白若耶溪傍採蓮女笑倚荷花共人語日照新糚水底明風飄香袖空中舉岸上誰家遊冶即三三五五映垂楊紫騮嘶入落花去見此踟蹰空斷膓石城鄭谷石城昔為莫愁郷莫愁魂散石城荒江人依舊棹舴艋江岸還飛雙鴛鴦㠶去㠶來風浩渺花開花謝春悲涼煙濃草逺望不盡千古漢陽閒夕陽沙路曲李賀栁隂半眠丞相樹珮馬玎玲蹋沙路斷燼遺香裊翠煙獨騎鳴蹄上天去帝家玉龍摐九闗帝前簪笏稱南山獨垂重印押千官金科篆字紅屈盤沙路歸來聞好語旱火不光天下雨沙隄行呈裴相公張籍長安大道沙為隄旱風無塵暖無泥宫中玉漏下三刻朱衣導騎丞相來路傍髙樓息歌吹千車不行行者避街官閭吏相傳呼宫前十里唯空衢白麻詔下移相印新隄未成舊隄盡洛陽陌李白白玉誰家郎迴車渡天津看花東陌上驚動洛陽人唐文粹巻十三欽定四庫全書唐文粹巻十四上宋姚鉉編
