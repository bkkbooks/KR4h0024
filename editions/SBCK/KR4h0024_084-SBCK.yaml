body:
  text: 吳興姚鉉纂書六㧾一十一首論文上與滑州盧大夫論文書栁冕與徐給事論文書荅荆州裴尚書論文書荅徐州張尚書論文武書與于襄陽書韓愈􅀉李翺書裴度敘詩􅀉樂天書元稹荅楊中丞論文書柳冕荅衢州鄭史君論文書荅莊充書杜牧與賈秀才書孫樵與滑州盧大夫論文書柳冕頓首别後九年年巳老大平生好文老亦興盡日爲外事所撓有筆語兩大卷或不得巳而爲之或有爲而爲之旣爲頗近敎化謹録呈上望覽訖一􅀏夫文生於情情生於哀樂哀樂生於治亂故君子感哀樂而爲文章以知治亂之本屈宋以降則感哀樂而亡雅正魏晉以還則感聲色而亡風敎宋齊以下則感物色而亡興致教化興亡則君子之風盡故􅁋麗形似之文皆亡國哀思之音也自夫子至梁陳三變以至衰弱嗟乎􅀜睢興而周道盛王澤竭而詩不作作則王道興矣天其或者肇往時之亂爲聖唐之治興三代之文者乎老夫雖知之不能文之縱文之不能至之况巳衰矣安能皷作者之氣盡先王之敎在吾子復而行者皷而生之冕頓首與徐給事論文書文章本於教化形於治亂繫於國風故在君子之心爲志形君子之言爲文論君子之道爲敎易云觀乎人文以化成天下此君子之文也自屈宋巳降爲文者本於哀􅃩務於恢誕亡於比興失古義矣雖楊馬形似曹劉骨氣潘陸藻麗文多用寡則是一技君子不爲也昔武帝好神仙而相如爲大人賦以諷帝覽之飄然有凌雲之氣故楊雄病之曰諷則諷矣吾恐不免於勸也蓋文有餘而質不足則流才有餘而雅不足則蕩流蕩不返使人有􅁋麗之心此文之病也雄雖知之不能行之行之者惟荀孟賈生董仲舒而巳㒒自下車爲外事所感感而應之爲文不覺成卷意雖復古而不建古則不足以議古人之文噫古人之文不可及之矣得見古人之心在於文乎茍無文又不得見古人之心故未能亡言亦志之所之也荅荆南裴尚書論文書猥辱來問曠然獨見以爲齒髪漸衰人情所惜也親愛逺道人情不忘也大哉君子之言有以見天地之心夫天生人人生情聖與賢在有情之内乆矣茍忘情於仁義是殆於學也忘情於骨􅁏是殆於恩也忘情於朋友是殆於義也此聖人盡知於斯立教於斯今之儒者茍持異論以爲聖人無情誤也故無情者聖人見天地之心知性命之本守窮達之分故得以忘情明仁義之道斯須忘之斯爲過戻骨􅁏之恩斯須忘之斯爲亂矣朋友之義斯須忘之斯爲薄矣此三者發於情而爲禮由於禮而爲教故夫禮者教人之情而巳丈人志於道故來書盡於道是合於情盡於禮至矣昔顔囬死夫子曰天喪予子路死夫子曰天䘮予是聖人不忘情也乆矣丈人豈不謂然乎如冕者雖不得與君子同道實與君子同心相顧老大重以離别況在萬里邈無前期斯得忘情乎古人云一日不見如三秋兮況十年乎前所􅀉拙文不爲文以言之蓋有謂而爲之昔堯舜殁雅頌作雅頌寝夫子作未有不因於教化爲文章以成國風是以君子之儒學而爲道言而爲經行而爲教聲而爲律和而爲音如日月麗乎天無不照也如草木麗乎地無不章也如聖人麗乎文無不明也故在心爲志發言爲詩謂之文兼三才而名之曰儒儒之用文之謂也言而不能文君子恥之及王澤竭而詩不作騷人起而􅁋麗興文與教分而爲二以楊馬之才則不知教化以荀陳之道則不知文章以孔門之教評之非君子之儒也夫君子之儒必有其道有其道必有其文道不及文則德勝文不知道則氣衰文多道寡斯爲藝矣語曰文質彬彬然後君子兼之者斯爲美矣昔游夏之文章與夫子之道通流列於四科之末此藝成而下也茍言無文斯不足徴小子志雖復古力不足也言雖近道辭則不文雖欲拯其將墜末由也巳丈人儒之君子曲垂見襃反以自愧冕再拜荅徐州張尚書論文武書辱前月十二日書問文章之道將帥之事朋友之義有君子之道三甚善甚善夫文章者本於教化發於情性本於教化堯舜之道也發於情性聖人之言也自成康殁頌聲寢騷人作􅁋麗興文與教分爲二不足者彊而爲文則不知君子之道知君子之道者則恥爲文文而知道二者兼難兼之者大君子之事上之堯舜周孔也次之游夏荀孟也下之賈生董仲舒也夫日月之麗仰之愈明金石之音聽之彌清故聖人感之而文章生焉教化成焉哀樂形焉逮德下衰文章敎化掃地盡矣噫聖人之道猶聖人之文也學其道不知其文君子恥之學其文不知其教君子亦恥之老夫從君子乆矣雖欲學之未能文之不足以當君子之襃然詠乎堯舜之道舞乎沂泗之風庶乎與同也將帥三軍之師萬人之命子實爲之矣今國家之患患在師老足下之患患在勢分且天下大勢也善爲將者乗天下之勢苟變化在人則用之如神彼勢合者驅而盟之使其擾從􅁊文是也勢分者力以傾之使其削弱申商是也則遇非常之時不可以尋常之事邀萬代之勲明矣今足下據億丈之城仗大順之衆有􅁊文之志茍不修其軍政合其大勢制其死命則不足以輟東顧之憂故老夫前書開陳古義以激壯心而猥辱逺示以爲聽道路之􅀃甚不然也傳曰諸侯有相滅亡者􅁊公不能救則桓公恥之今子爲大將實制東夏爲不義而彊力不能制者春秋亦恥之國不冨而昌兵不教而彊敵不謀而亡是管仲無功於齊商君無能於秦子房無謀於漢矣蓋求天下之智盡天下之才成天下之務此將帥之本也較短長定曲直乃匹夫之爲爾古者自天子至於庶人未有不須友以相成者㒒雖老矣辱君子之遊同君子之道見君子之榮三十年矣子之善猶㒒之善也得不相成乎且百年之壽人誰及之歲月有窮天地有終惟立德立言立功斯爲不杇彼聖賢救丗死而後巳氣有所感也故天下有樂賢人樂之天下有憂賢人憂之樂毅所以徇弱燕之急復彊齊之讎韓信所以感推食之恩申戰勝之感意氣所感天地相合況於人乎天方授子子實爲將得不憂之乎噫德與言㒒無望矣立功立事在吾子爲之璧可求也時不可再也是以古人惜時之過巳昔者仲尼以大聖之德不免爲旅人之身斯無時也賈生以希丗之才而無佐命之勲斯無位也今足下遇非常之主統􅁊文之師時與位泰矣苟功成於身則義動天下使天下之人受其賜不亦休哉旣書􅁣然心馳旗鼔之下某頓首上于襄陽書韓愈伏蒙示文武順聖樂詞天保樂詩讀蔡琰胡笳詩詞移族從并與京兆書自幕府至鄧之北境凡五百餘里自庚子至甲辰凡五日手披目視口詠其言心惟其義且恐且懼忽􅀂有亡不知鞍馬之勤道途之逺也夫澗谷之水深不過咫尺丘垤之山高不踰尋丈人狎而翫之及至臨泰山之懸崖窺巨海之驚瀾莫不戰悼憚慄眩惑而自失所觀變於前所守易於内亦其理冝也閣下􅀒超卓之竒材蓄雄剛之俊德渾然天成無有畔岸而又貴窮乎公相威動乎樞極天子之毗諸侯之師故其文章言語與事相侔煇赫􅀂雷霆浩汗􅀂河漢正聲諧韶頀勁氣沮金石豐而不餘一言約而不失一辭其事信其理切孔子之言曰有德者必有言信乎其有德且有言也楊子雲曰啇書灝灝爾周書噩噩爾信乎其能灝灝而且噩噩也昔者齊君行而失道管子請釋老馬隨之樊遟請學稼孔子使問之老農夫馬之智不賢於夷吾農之能不聖於尼父然則且云爾者聖賢之能多農馬之知專故也今愈雖愚且賤其從事於文實且乆則其賛王公之能而稱大君子之美不爲􅆫越也伏惟詳察愈恐懼再拜􅀉李翺書裴度前者唐生至自滑猥辱致書禮兼獲所貺新作十二篇度俗流也不盡窺見􅀂愍女碑烈婦傳可以激揚烈教義煥於史氏鍾銘謂以功伐名於器非爲銘與弟正辭書謂文非一藝斯皆可謂救文之失廣文之用也甚善甚善然㒒之知弟也未知其他直以弟敏於學而至於文就六經而正焉故毎遇名輩稱弟不容於口自謂彌乆益無愧詞􅀼料弟亦以直諒見待不以恱媚相容故不唯嗟悒亦欲商度其萬一耳􅀂弟擯落今古脫遺經籍斯則如獻白豕何足採取􅀂猶有祖述則願陳其梗槩以相叅㑹耳愚謂三五之代上垂拱而無爲下不知其帝力其漸被於天地萬物不可得而傳也夏殷之際聖賢相遇其文在於盛德大業又鮮可得而傳也厥後周公遭變仲尼不當世其文遺於冊府故可得而傳也是作周孔之文也荀孟之文左右周孔之文也理身理家理國理天下一日失之敗亂至矣騷人之文發憤之文也雅多自賢頗有狂態相如子雲之文譎諌之文也自爲一家不是正氣賈􅁩之文化成之文也鋪陳帝王之道昭昭在目司馬遷之文財成之文也馳騁數千載􅀂有餘力董仲舒劉向之文通儒之文也發明經術究極天人其餘擅美一時流譽千載者多矣不足爲弟道焉然皆不詭其詞而詞自麗不異其理而理自新􅀂夫典謨訓誥文言繫辭國風雅頌經聖人之筆削者則又至易也至直也雖大彌天地細入無間而竒言怪語未之或有意隨文而可見事隨意而可行此所謂文可文非常文也其可文而文之何常之有俾後之作者有所裁准而請問於弟謂之何哉謂之不可非㒒敢言謂之可也則太學之道在明明德在止至善矣能止乎􅀂遂過之猶不及也觀弟近日制作大旨常以時丗之文多偶對儷句屬綴風雲羈束聲韻爲文之病甚矣故以雄詞逺致一以矯之則是以文字爲意也且文者聖人假之以逹其心達則已理窮則已非故高之下之詳之略之也愚欲去彼取比則安歩而不可及平居而不可諭又何必逺􅀜經術然後騁材力昔人有見小人之違道者恥與之同形貌共衣服遂思倒置眉目反易冠帶以異也不知其倒之反之非也雖失於小亦異於君子矣故文之異在氣格之高下思致之深淺不在磔裂章句隳廢聲韻也人之異在風神之清濁心志之通塞不在於倒置眉目反易冠帶也庶幾高明少納庸妄若以爲未幸不以苦言見革其惑惟㒒心慮荒散百事罷息然意之所在敢隱於故人邪昌􅀺韓命㒒識之舊矣中心愛之不覺驚賞然其人信美材也近或聞諸儕􅀋云恃其絶足往往奔放不以文立制而以文爲戲可矣乎可矣乎今之不及之者當大爲防焉爾弟索居多年勞想深至窮隂凝沍動息何如入奉晨昏之歡出叅帷幄之畫固多適耳昨弟來欲度及時干進度昔歳取名不敢自高今􅀌煢􅀂此遊宦謂何是不復能從故人之所朂耳但寘力田園苟過朝夕而已然待春氣微和農事未動或筞蹇謁賢大夫兼與弟道舊未爾閒猶希尺牘珎重珎重力書無餘從表兄裴度奉簡敘詩􅀉樂天書元稹九歲學賦詩長者往往驚其可敎年十五六粗識聲病時貞元十年巳後德宗皇帝春秋高理務用人最不欲文法吏生天下罪過外門節將動十餘年不許朝覲死於其地不易者十八九而又將豪卒愎之處因喪負衆橫相賊殺告變駱驛使者迭窺旋以狀聞天子曰某色將某能遏亂亂衆寧附願爲其帥名爲衆情其實逼詐因而可之者又十八九前置介倅因縁交授者亦十四五由是諸侯敢自爲旨意有羅列兒孫以自固者有開導蠻夷以自重者省寺符􅂐固於几閣甚者擬旨詔視一境如一室刑殺其下不啻㒒畜厚加剥奪名爲進奉其實貢入之數百一焉京城之中亭第邸店以曲巷斷侯甸之内水陸􅃾沃以郷里計其餘奴婢資財生生之備稱是朝廷大臣以謹愼不言爲朴雅以時進見者不過一二親信直臣議士往往抑塞禁省之閒時或繕完隤墜豪家大帥乗聲相扇延及老佛土木妖熾習俗不怪上不欲令有司備宫闥中小碎須求往往持幣帛以易餅餌吏縁其端剽奪百貨勢不可禁㒒時孩騃不慣聞見獨於書傳中􅀄習理亂萌漸心體悸震􅀂不可活思欲發之乆矣適有人以陳子昻感遇詩相示吟翫激烈即日爲􅀉思玄子詩二十首故鄭京兆於㒒爲外諸翁深賜憐奬因以所賦呈獻京兆翁深相駭異祕書少監王表在座顧謂表曰使此兒五十不死其志義何如哉惜吾輩不見其成就因召諸子訓責泣下㒒亦􅀼不自得由是勇於爲文又乆之得杜甫詩數百首愛其浩蕩津涯處處皆到始病沈宋之不存􅀉興而訝子昻之未暇旁備矣不數年與詩人楊巨源友善日課爲詩性復僻嬾人事常有閑則有作識足下時有詩數百篇矣習慣性靈遂成病敝每公私感憤道義激揚朋友切磨古今成敗日月遷逝光景􅃤舒山川勝勢風雲氣色當花對酒樂罷哀餘通滯屈伸悲歡合散至於疾恙其身悼懷昔遊凡所對遇異於常者則欲賦詩又不幸年三十二時有罪譴棄今三十七矣五六年閒是丈夫心力壯時常在閑處無所役用性不近道未能淡然忘懷又復嬾於他欲全盛之氣注射語言雜糅精麤遂成多大然亦未甞繕寫適值河東李明府景儉在江陵時僻好㒒詩章謂爲能觧欲得盡取觀覽僕因撰成卷軸其中有旨意可觀而詞近往古者爲古諷意亦可觀而流在樂府者爲樂諷詞雖近古而止於吟寫性情者爲古詞體實樂流而止於摸象物色者爲新題樂府聲勢㳂順屬對穩切者爲律詩仍以七言五言爲兩體其中有稍存􅀉興與諷爲流者爲律諷不幸少有伉儷之悲撫存感往成數十詩取潘子悼亡爲題又有以干敎化者近昵婦人暈澹眉目綰約頭􅁂衣服廣脩之度及匹配色澤尤據怪􅃩因爲豔詩百餘首詞有今古又兩體自十六時至是元和七年矣有詩八百首色􅀋相從共成十體凡二十卷自􅀏冗亂亦不復置之於行李昨來京師偶在筐篋及通行盡置足下僅亦有􅀃㒒聞上士立德其次立事不遇立言凡人急位其次急利下急食㒒天與不厚旣乏全然之德命與不偶未遭可爲之事性與不惠復無垂範之言兀兀狂癡行近四十徼名取位不過於第八品而冒憲巳六七年授通之􅀄有習通之熟者曰通之地濕墊卑􅄶人事稀少近歲荒凶死亡過半邑無吏市無貨百姓草木刺史以下計粒而食大有虎豹蛇虺之患小有蟆蚋浮塵蛛踟蛒􅉕之􅀋皆能讃齧肌膚使人瘡痏夏多隂􅍂秋爲痢瘧地無醫巫藥石萬里病者百死一生之慮何㒒之命不厚也如此智不足也又如此其所詣之憂險也又如此則安能保持萬全與足下必復京輦以須他日立言立事之驗邪但恐一旦與急食者相扶而終使足下受天下友不如已之誚是用悉所爲文􅅏穢箱笥比夫格弈樗塞之戲猶曰愈於飽食㒒所爲不又愈於格弈樗塞之戲乎昨行巴南道中又有詩五十一首文書中得七年巳後所爲向二百篇繁亂冗雜不復置之執事前所爲􅀉思玄子者小歲云爲文不能自足其意貴其起予之始且志京兆翁見遇之由今亦寫爲古諷之一移諸左右㒒少時授吹嘘之術於鄭先生病嬾不就今在閑處思欲怡神保和以求其内異日亦不復費詞於無用之文矣省視之煩庶亦已於是乎荅楊中丞論文書柳冕來書論文盡養才之道増作者之氣推而行之可以復聖人之敎見天地之心甚善嗟乎天地養才而萬物生焉聖人養才而文章生焉風俗養才而志氣生焉故才多而養之可以皷天下之氣天下之氣生則君子之風盛古者陳詩以觀人風君子之風仁義是也小人之風邪佞是也風生於文文生於質天地之性也止於經聖人之道也惑於心哀樂之音也故觀乎志而知國風逮德下衰風雅不作形似􅃩麗之文興而雅頌比興之義廢􅃩麗而工君子恥之此文之病也嗟乎天下之才少乆矣文意之氣衰甚矣風俗之不養才病矣才少而氣衰使然也故當丗君子學其道習其弊不知其病也所以其才日盡其氣益衰其教不興故其人日野如病者之氣從壯得衰從衰得老從老得死沉綿而去終身不悟非良醫孰能知之夫君子學文所以行道足下兄弟今之才子官雖不薄道則未行亦有才者之病君子患不知之旣知之則病不能無病故無病則氣生氣生則才勇才勇則文壯文壯然後可以皷天下之動此養才之道也在足下他日行之如老夫之文不近於道老夫之氣巳至於衰老夫之心不復能勇三者無矣又安得見古人之文論君子之道近先王之教斯不能必矣冕白荅衢州鄭使君論文書專使至辱書并歸拙文如見君子所襃過當無德以當之幸甚門人云夫子之文章可得而聞也夫子之言性與天道不可得而聞也即聖人道可企而及之者文也不可企而及之者性也蓋言教化發乎性情繫乎國風者謂之道故君子之文必有其道道有深淺故文有崇替時有好尚故俗有雅鄭雅之與鄭出乎心而成風昔游夏之文日月之麗也然而列於四科之末藝成而下也苟文不足則人無取焉故言而不能文非君子之儒也文而不知道亦非君子之儒也逮德下衰其文漸替惜乎王公大人之言而溺於􅁋麗怪誕之􅀃非文之罪也爲文者之過也夫善爲文者發而爲聲皷而爲氣直則氣雄精則氣生使五彩並用而氣行於其中故虎豹之文蔚而騰光氣也日月之文麗而成章精也精與氣天地感而變化生焉聖人感而仁義行焉不善爲文者反此故變風變雅作矣六藝之不興教化之不明此文之弊也噫文之無窮而人之才有限茍力不足者彊而爲文則蹷彊而爲氣則竭彊而爲智則拙故言之彌多而去之彌逺逺之便已道則中廢又君子所恥也則不足見君子之道與君子之心心有所感文不可巳理有至精詞不可逮則不足當君子之襃敬叔頓首荅莊充書杜牧某白莊先輩足下凡爲文以意爲主以氣爲輔以辭彩章句爲之兵衛未有主彊盛而輔不飄逸者兵衛不華赫而莊整者四者高下圎折歩驟隨主所指如鳥隨鳯魚隨龍師衆隨湯武騰天潛泉撗裂天下無不如意茍意不先立止以文彩辭句繞前捧後是辭愈多而理愈亂如入闤闠紛紛然莫知其誰暮散而巳是以意全勝者辭愈朴而文愈髙意不勝者辭愈華而文愈鄙是意能遣辭辭不能成意大抵爲文之旨如此觀足下所爲文百餘篇實先意氣而後辭句慕古而尚仁義者茍爲文不已資以學問則古作者不爲難到今以某無可取欲命以爲序承當厚意惕息不安復觀自古序其文者皆後丗宗師其人而爲之詩書春秋左氏巳降百家之􅀃皆是也古者其身不遇於丗􅀉志於言求言遇於後丗也自兩漢巳來冨貴者千百自今觀之聲勢光明孰􅀂馬遷相如賈􅁩劉向楊雄之徒斯人也豈求知於當丗哉故親見楊子雲著書欲取覆醬瓿雄當其時亦未甞自有誇目況今與足下並生今丗欲序足下未已之文此固不可也茍有志古人不難到勉之而巳某再拜與賈秀才書孫樵主藪足下曩者樵耳足下聲憤足下售於時何晚及目足下五通五十篇則足下困于上亦冝矣物之精華天地所祕惜故蒙金以砂錮玉以璞􅃢瑚之䕺必茂重溟夜光之珍必頷驪龍扶而不知巳積而不知止不窮則禍天地讎也文章亦然所取者廉其得必多所取者深其身必窮六經作孔子削迹不粒矣孟子述子思坎軻齊魯矣馬遷以史記禍班固以西漢禍楊雄以法言太玄窮元結以浯谿碣窮陳拾遺以感遇詩窮王勃以宣尼廟碑窮玉川子以月蝕詩窮杜甫李白王江寧皆相望於窮者也天地其無意乎今足下立言必竒摭意必深抉精剔華期到聖人以此賈於時鈞榮邀冨猶欲疾其驅而方其輪􅀂曰爵禄不動於心窮達與時上下成一家書自期不杇則樵之所敢知也嗚呼􅀌進患心不苦及其苦知者何人古人抱玉而泣捧足下文能不濡睫懼足下自得也淺且疑其道不固因歸五通不得無言重校正唐文粹卷第八十四
