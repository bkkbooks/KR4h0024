body:
  text: 記丁書附揔一十七首堂樓亭閣虢州三堂記吕温廬山草堂記白居易尉遲長史草堂記李翰盧郎中齋居記李華廬陵所居竹室記房千里西軒記柳宗元書宣州叠嶂樓附孤霖獨李白酒樓記沈光新修滕王閣記韓愈蘭溪縣東峯新亭記馮宿燕喜亭記韓愈白蘋亭記李直方潁亭記陳寛二公亭記歐陽詹零陵萬石亭記柳宗元沔州秋興亭記賈至郢州孟亭記皮日休虢州三堂記吕温應龍乗風雲作雷雨退必蟠蟄以全其力君子役智能統機劇退必宴息以全其性力全則神化無窮性全則精用不竭深山大澤其所以蟠蟄乎髙齋清池其所以宴息乎虢州三堂者君子宴息之境也開元初天子思二南之風並選宗英共持理柄虢大而近匪親不居時惟五王出入相授承平易理逸政多暇考卜惟勝作為三堂三者明臣子在三之節堂者勵宗室克構之義豈徒造適亦實垂訓居徳樂善何其盛哉然當時漢同家人魯用王禮棟宇制度非諸侯居後刺史馬君錫因其頽陊始革基構豐而不侈約而不陋以琴樽詩書之幽素易綺紈鍾鼓之繁喧惟林池煙景不讓他日觀其廣踰百畆深入重扃迴塘屈盤沓島交映溟渤轉於環堵蓬臺起於中庭浩然天成孰曰智及春之日衆木花拆岸鋪島織沈浮照耀其水五色於是乎襲馨擷竒方舟逶迤樂魚時翻飄蘂雪飛泝㳂環迴隱映差池咫尺迷路不知所歸此則武陵仙源未足以極幽絶也夏之日石寒水清松宻竹深大桺起風甘棠垂隂於是濯纓漣漪解帯升堂畏景火雲隔林無光虗甍沈沈皓壁如霜羽扇不摇南軒清凉此則楚襄蘭臺未足以滌炎鬱也秋之日金飈掃林蓊鬱洞開太華爽氣出闗而來於是乎絃琴端居景物廓如月委皓素水涵空虗鳥驚寒沙露滴髙梧境隨夜深疑與世殊此則庾公西樓未足以澹神慮也冬之日同雲千里大雪盈尺四眺無路三堂虗白於是乎置酒褰帷凭軒倚楹瑶階如真玉樹羅生日暮天霽雲開月明氷泉潺潺終夜有聲此則子猷山隂未足以暢吟嘯也於戲不離軒冕而踐夷曠之域不出户庭而獲江海之心趣近懸解跡同大隱序閲四時之勝節宣六氣之和貴而居之可曰厚矣若知其身既安而思所以安人其性既適而思所以適物不以自樂而忽鰥寡之苦不以自逸而忘稼穡之勤能推是心以恵境内則良二千石也方今人亦勞止上思乂息州郡之選重如庭臣由是南陽張公輟揮翰之任受剖符之寄遊刃而理此焉坐嘯静政令若水木全户民如魚鳥馴致其道闇然日彰小子以通家之愛獲拜牀下且齒諸子侍坐於三堂見知惟文不敢無述捧筆避席請書堂隂俾後之人知此堂非止燕遊亦可以觀清浄為政之道廬山草堂記白居易匡廬竒秀甲天下山山北峯曰香爐峯北寺曰遺愛寺介峯寺間其境勝絶又甲廬山元和十一年秋太原人白樂天見而愛之若逺行客過故鄉戀戀不能去因面峯腋寺作為草堂明年春草堂成三間兩柱二室四牖廣袤豐殺一稱心力洞北户來隂風防徂暑也敞南甍納陽日虞祁寒也木斵而已不加丹牆圬而已不加白磩階用石羃牎用紙竹簾紵幃率稱是焉堂中設木榻四素屏二漆琴一張儒道佛書各兩三巻樂天既來為主仰觀山俯聼泉旁睨竹樹雲石自辰及酉應接不暇俄而物誘氣隨外適内和一宿體寧再宿心恬三宿後頽然嗒然不知其然而然自問其故答曰是居也前有平地輪廣十丈中有平臺半平地臺南有方池倍平臺環池多山竹野卉池中生白蓮白魚又南抵石澗夾澗有古松老杉大僅十人圍髙不知幾百尺修柯戞雲低枝拂潭如幢豎如葢張如龍蛇走松下多灌叢蘿蔦葉蔓駢織承翳日月光不到地盛夏風氣如八九月時下鋪白石為出入道堂北五歩據層崖積石嵌空垤塊雜木異草葢覆其上緑隂䝉䝉朱實離離不識其名四時一色又有飛泉植茗就以烹燀好事者見可以永日堂東有瀑布水懸三尺㵼階隅落石渠昏曉如練色夜中如環佩琴筑聲堂西倚北崖右趾以剖竹架空引崖上泉脉分綫懸自簷注砌纍纍如貫珠霏微如雨露滴瀝飄灑隨風逺去其四旁耳目杖履可及者春有錦繡谷花夏有石門澗雲秋有虎谿月冬有鑪峯雪隂晴顯晦昏旦吞吐千變萬狀不可殫紀覼縷而言故云甲廬山者噫凡人豐一屋華一簀而起居其間尚不免有驕矜之態今我為是物主物至致知各以類至又安得不外適内和體寧心恬哉昔永逺宗雷輩十八人同入此山老死不返去我千載我知其心以是哉矧余自思從幼迨老若白屋若朱門凡所止雖一日二日聊覆簣土為臺聚拳石為山環斗水為池其喜山水病癖如此一旦蹇剥來佐江郡郡守以優容撫我廬山以靈勝待我是天與我時地與我所卒獲所好又何求焉尚以冗員所羈餘累未盡或往或來未遑寧處待余異日弟妹婚嫁畢司馬嵗秩満出處行止得以自遂則必左手引妻子右手抱琴書終老於斯以成就我平生之志清泉白石實聞此言時三月二十七日始居新堂四月九日與河南元集虗范陽張允中南陽張深之東西二林長老湊朗滿晦堅等凡十有二人具齋施茶果以樂之因為草堂記尉遲長史草堂記李翰吾友晉陵郡丞河南尉遲緒節闊達志遐逺含和而不假修推誠而不詭行外若可渾其中甚清外如可離其中甚靜夫求賢達之趣當考其中若然夫子其達者歟而境或超詣心或獨得飄飄然不知冠冕之在已浩浩然不知天地之為大其冥機慎道迹繫心曠人或未睹吾能知之大厯四年夏乃以俸錢搆草堂於郡城之南求其志也材不斵全其樸牆不彫分其素然而規制宏敞清冷含風可以卻暑而生白矣後有小山曲池窈窕幽徑枕倚于髙墉前有芳樹珍卉嬋娟修竹隔閡于中屏由外而入宛若壺中由内而出始若人間其幽邃有如此者夫子又有䧺辭奥學潤色其事階上何有有羣書萬巻階下何有有空林一瓢非道統名儒不登此堂非素琴香茗不入兹室是知草堂之貴夫子之静天下茫茫人未易悉吾與夫子昔同賔賦三十四年于兹矣吾則棄於世矣歎夫子下位每求其故而有疑焉今觀夫子之志乃鄰於道寥寥草堂自致之資書於壁㣲吾非俟其嵗秋八月乙丑朔記盧郎中齋居記李華鴻鵠遡清風凌顥氣翺翔自得於冥冥之間故虞衡矰繳不能為患甘芻豐秣羈勢駿驥首冠􅦒錫身被瓔瓖力方盛也騁於康逵及其殆也困於鞭䇿由是智者髙鴻鵠而卑駿驥豈妄而論哉今凶渠假息五兵未偃廟堂有風力之臣征鎮皆方邵之老則仁人静士戢伏自持各其志也尚書左司郎中嗣漁陽公盧振字子厚奉世徳而聿修之味道風而游泳之處於九江南郭荒榛之下不貽害於身不假力於人夷堆墆實窪穽尋尺無遺材草木不移植書堂齋亭成於指顧髙松茂篠森於門巷晏然燕居勝自我得君子出則行其志也公以瑚璉之噐為郎官以干將之斷宰赤縣君子入則善其身也公就鴻鵠之冥冥捨騏驥之馳騁况大江在下名山當目嘉賔時來攜手長望可以頥神逺夀暢其天和浴乎沂風乎舞雩吾與㸃也尋陽僑舊推仁人焉廣徳二年四月五日趙郡李華云廬陵所居竹室記房千里凡天地之氣煦嫗乎春曦彤乎夏凄乎秋而洌乎冬楚之南當冬而且曦燕之北當夏而且洌是皆不得氣之中正人之百骸上陽而下隂陽戒於焮故膏肓欲寒隂戒於溺故腎脇欲燠人之外好欲軒冕文綵以為榮似若動且陽焉人之内好欲寡慮恬黙以為泰似若静且隂焉其外門欲肥馬大車以為熱者其内室欲虗堂廣厦以為清者果反是必為災且妖且病且亂且窮矣天地之氣當夏而洌當冬而曦其嵗時惡人之百骸上陽而不能寒下隂而不能煦其形神瘵外飾文綵不能動且榮而必慊其心躁内思恬黙不能静且泰而必汨其志外門淒淒而寒者内室彤彤而熱者其事窮予三年夏待罪於廬陵其環堵所棲者率用竹以結其四周植者為柱楣撑者為榱桷破者為霤削者為障臼者為樞篾者為纒絡而籠土者為級横而格音各空者為梁方大暑火烘爆霤拆欀若墜于鑪若燎于原舌呀而不能持支墮而不自運赫赫焰焰如列千萬炬于室内視其門即寂寥虗間若清秋之山焉若寒浦之波焉予乃知嚮所謂天地之氣人之百骸與其心形之内外居室之寒燠反是果為妖且災且病且亂且窮也今予方窮不能奮果窮也其處於是亦宜矣天地之氣不能易者也鄒子有吹律之變人之死生不可制者也俞扁有鍼砭之術是二者尤不可革且有道而革之今予室之曦予門之寒予亦姑思其治之之道將爇其廬而斬其工其能永永以爍予書其辭於壁西軒記柳宗元永貞中余名在黨人不容於尚書省為邵州道貶永州司馬至則無以為居寓龍興寺西序之下余知釋氏之道且久固所願也然余所庇之屋甚隱敞其户北向居昧昧也寺之居於是州為髙西序之西屬當大江之流江之外山谷林麓甚衆於是鑿西墉以為户户之外為軒以臨羣木之杪無所不矚焉不徙席不運几而得大觀夫室嚮者之室也席與几嚮者之處也嚮也昧而今也顯豈異物耶因悟夫佛之道可以轉惑見為真智即羣迷為正覺捨大闇為光明夫性豈異物耶孰能為余鑿大昏之墉闢靈照之户廣應物之軒者吾將與為徒遂書為二其一志諸户外其一以貽巽上人焉書宣州叠嶂樓獨孤霖郡地四出皆卑即阜以垣故於樓為易而賦名必著其當正據扉亦䧺昈競侈由是繚步逾千方目相瞪則壯邦麗廨之勲慊在第一繁絲機羅錯卉障錦春以融獨峯揉雲雙波屹風著以澄曉黛嚬入夕蟾娟來秋以揚雲并半空氷偏一岸冬以明此槩舉爾覼縷不盡也然而月話方狎燭醉始酣則防城健卒籌三而環警緒至越活筵走奏􅖩彚呼去族譟雖黄度展和不能不憮而斁嚮之歴舉四美悉估而倍之不足贖矣予春至逮秋偶步池北得小亭之直上居然最勝因命植棟鬬梁出城屋之脊周方數間小亭如初而中與諸樓相差者自為一地其上則朗出髙際平與空等嚮所謂越譟者不復遊慮則其四美不俟説而聞不假到而見非聞非見其然也始聞始見其嚮之未必然也且聞且見而今之所以然也嚮既舉槩今不可黙夫北望條風清暑之流皆偏擅攸戡莫全厥美或能伸左臂或睇右目或獨全正面揔而有諸則我無許斯又不聞不見而以其然為然矣郡以谿山著名而谿小負則叠嶂之命為宜至於欄干蹋道沙子門户等咸有曲㫖成於新致舉之則縷將煩於槩故抑之而中地亦晦而不彰咸通十二年十二月辛亥宣州刺史獨孤霖書李白酒樓記沈光有唐咸通辛巳嵗正月壬午吳興沈光過任城題李白酒樓夫觸强者靦緬而不發乗險者帖薾而不進潰毒者隱忍而不能就其鍼砭摶猛者持疑而不能盡其膽勇而復視其强者弱之險者夷之毒者甘之猛者柔之信乎酒之作於人也如是翰林李公太白聰明才韻至今為天下唱首業術正救天必賦之矣致其君如古帝王進其臣如古藥石揮直刃以血其邪者推義轂以輦其正者豈憑酒而作也憑酒而作者强非真勇太白既以峭訐矯時之狀不得大用流斥齊魯眼明耳聰恐貽顛踣故狎弄杯觴沈溺麴糵耳一滛雅目混黒白或酒醒神健視聼銳發振筆著紙乃以聰明移於月露風雲使之涓絜飛動移於草木禽魚使之妍茂鶱擲移於邉情閨思使之壯氣激人離情溢目移於幽巖邃谷使之遼歴物外爽人精魄移於車馬弓矢悲憤酣歌使之馳騁决發如睨幽并而失意放懐盡見窮通焉嗚虖太白觸文之强乗文之險潰文之毒搏文之猛而作狎弄杯觴沈溺麴糵是真築其聦翳其明醒則移於賦詠宜乎醉而生醉而死余徐思之使太白疏其聦决其明移於行事强犯時忌其不得醉而死生也當時骨鯁忠赤遞有其人收其逸才萃於太白至于齊魯結搆凌雲者有限獨斯樓也廣不逾數席瓦缺椽蠧雖樵兒牧豎過亦指之曰李白常醉於此矣新修滕王閣記韓愈愈少時則聞江南多登臨之美而滕王閣為第一有瑰偉絶特之稱及得三王所為序賦記等王勃作㳺閣序王緒作賦今中丞王公為從事日作修閣記並題在閣壯其文辭益欲往一觀而讀之以忘吾憂繫官於朝願莫之遂十四年以言事斥守揭陽便道取疾以至海上又不得過南昌而觀所謂滕王閣者其冬以天子進大號加恩區内移刺袁州袁於南昌為屬邑私喜幸自以為當得躬詣大府受約束於下執事及其無事且還儻得一至其處竊寄目償所願焉至州之七月詔以中書舎人太原王公為御史中丞觀察江南西道洪江饒處吉信撫袁悉屬治所八州之人前所不便及所願欲而不得者公至之日皆罷行之大者驛聞小者立變春施秋殺陽開隂閉令修於庭户數日之間而人自得於湖山千里之外吾雖欲出意見論利害聼命於幕下而吾州乃無一事可假而行者又安得捨已所事以勤館人則滕王閣又無因而至焉其嵗九月人吏浹和公與監軍使燕於此閣文武賔士皆與在席酒半合詞言曰此屋不修且壊前公為從事此邦適治新之公所為文實書在壁今三十年而公來為邦伯適及朞月公又來燕于此公胡得無情哉公應曰諾於是棟楹梁桷板檻之腐黒撓折者易新之葢瓦級甎之故缺者赤白之漫漶不鮮者治之則已無侈前人無廢後觀工既訖功公以衆飲而賞焉以書命愈曰子其為我記之愈既以未得造觀為歎竊喜載名其上辭列三王之次有榮耀焉乃不辭而成公命其江山之好登望之樂雖老矣如獲從公遊尚能為公賦之元和十五年十月某日袁州刺史韓愈記蘭谿縣靈隱寺東峯新亭記馮宿東陽實㑹稽西部之郡蘭谿實東陽西鄙之邑嵗在戊寅天官署洪君少卿以為之宰君之始至則用信待物用勤集事信故人阜勤故公濟未朞而其政成後三年夏六月余過其邑洪君導余以邑之勝賞於是乎有東峯亭之遊背城之闉半里而近初届佛刹刹之上方而亭在焉松門葢空石道如帶足倦累息然後造夫極焉向之池隍館宇之多旗亭闤闠之喧途道往來之衆簿書鞅掌之繁顧步之餘忽焉如失但山風飀飀嶺雲峩峩飛軒憑虗洞壑在下向背殊狀昏明易色指遥青而㸃黛者問之則曰某山某巖某林某墅指逺白而曵練者問之則曰某洲某渚某湫某塘髙深互呈心目相競飄若象外意其幻成余既諧其私爰究其本先是邑㣲登攀遊觀之所洪君曽是挈俸錢二萬經斯營斯因地於山因材於林因工於子來因時於農隙又何易也崇山濬谷佳境勝槩緜世伏匿一朝發朗又何能也君在建中興元之間為江南西道節度曹王所知時方興軍職壓寇境供億倉卒賦平人和王實賴之故御史大夫鄭滑節度盧公羣與君嘗同寮每號之曰精金百錬良驥千里誠矣然則是邑之理兹亭之勝於君之分不為難能夫播芳塵而鼓餘波者非文莫可遂攬筆為記刋于石而附諸地志焉燕喜亭記韓愈太原王𢎞中在連與學佛之人景常元慧者遊異日從二人者行於其居之後邱荒之間上髙而望得異處焉斬茅而嘉樹列發石而清泉激輦糞壤焚椔翳卻立而視之出者突然成邱陷者呀然成谷窪者為池而缺者為洞若有鬼神異物隂來相之自是𢎞中與二人者晨往而夕忘歸焉乃立屋以避風雨禦寒暑既成愈請名之其邱曰俟徳之邱蔽於古而顯於今有俟時之道也其石谷曰謙受之谷瀑曰振鷺之瀑谷言徳瀑言容也其土谷曰黄金之谷瀑曰秩秩之瀑谷言容瀑言徳也洞曰寒居之洞志其入時也池曰君子之池虗以鍾其美盈以出其惡也泉之源曰天澤之泉出髙而施下也合而名之以屋曰燕喜之亭取詩所謂魯侯燕喜者頌也於是州民之老聞而相與觀焉曰吾州之山水名於天下然而無與燕喜者比經營於其側者相接也而莫直其地凡天作而地藏之以遺其人乎𢎞中自吏部郎貶秩而來次其道途所經自藍田山入商洛涉淅湍臨漢水升峴首以望方城出荆門下岷江過洞庭上湘水行衡山之下繇郴踰嶺猨狖所家魚龍所宫極幽遐瓌詭之觀宜其於山水飫聞而厭見今其意乃若不足傳曰智者樂水仁者樂山𢎞中之徳與其所好可謂協矣智以謀之仁以居之吾知其去是而羽儀於天朝也不逺矣遂刻石以記白蘋亭記李直方新作白蘋亭書時且志政也梁太守栁惲賦詩於始因以名洲今邦伯李公成室於終兹用目亭度乎事則位均考乎地則境同合美配徳古今相望亭之時義至矣吳江之南震澤之隂曰湖州幅貟千里棊布九邑卞山屈盤而為之鎮五谿叢流以道其氣其土沃其水清其人夀其風信實公之始至也用恭寛明恕以懐之敬事眘罰以勸之賦令之先必度其物宜而咨于前訓故居者逸亡者旋或蹈境而留或聆聲而遷提封之内無榛灌繩墨之下無姦傲既而外邑多材郡不能渫公命懸諸善價俾代常傜於是乎幽巖之巨木斯出積嵗之逋租必入公家受其利山氓䝉其恵繇是白蘋之制經矣洲在郡城南東亂霅谿而即焉白沙如浮流波環之前有大野緜雲繚以萬峯顧有名都壓水駢以千室邑居可望而喧埃不及空水交映而雲天在下造物之工若有私於是焉茭菰叢生鳬鶴朋游嘉名雖曜清境或棄公於是相顯爽之宜立卑髙之程據洲之陽揆日之正揭大亭一焉修廊雙注北距於霅浮軒瞰流峩水亭二焉大可以施筵席小可以容宴豆凡棟宇之法輪奐之羙銛刮宻石用成翬飛施宏壯而有度備彤紫而不蹹内則庭除朗絜彌望鋪雪曲沼逶迤以中貫飛梁夭矯而對起紫桂翠篁辛荑木蘭碧枚丹實蛇走珠綴鮮飈暗起縈葉振蘂落英飄颻灑空浮水天目神池之上多不名之卉洞庭水府之下産怪狀之石嶙峋乎玉容葳蕤乎瑶芳衆榮偶植羅列布濩外則差初宜反以白蘋間之紅蕖川與天逺百里如組邦君之來肅肅斾旌綵舟徐移魚躍鳥鳴亭成之日三吳之賢大夫集焉公用鼓鍾羽籥以樂之然後使臣之臨重客之來獲游是者怳乎有遺區之歎則為邦之成績作亭之良規參合二美游揚四海坐馳而逝與廏置偕矧蘋之為用風有季女之奠騷有放臣之望夫以澗谿之賤㣲而可充王公之殷薦是故君子重之今扶賛勝賞也如彼哲賢詠歌也如此則是亭憑眺之外又有傳經之道焉若乃乗農隙之暇時購武夫之羨功㕓閭不煩財用不屈揚昔人之休烈垂不朽之遐觀咨其剏物之智有以加人不如是烏能及此己夘嵗冬十月予將浮淛河上㑹稽凌縉雲觀赤城道出公之仁宇目覧亭之崇構舉書其實合春秋傳信之經後之人無視十洲孟浪之說而沒其誼云潁亭記陳寛潁水濵有地可以覧山川之秀者九山祠在焉西北餘予升之見潁水直北劈地而來砉如隙光端如匣劍視若中面使人毛磔又見太室與大隗等列領羣峰而來崪屹不得進蹭蹬卻倚三十六嶠若立指焉而近北左手煙雲草樹濃淡覆露各盡其態平視之令人意逺超超然若萬里之鶴也予曰可樹亭哉遂召匠氏授以程度匠氏曰諾退而有言曰假吾令不徳主未聞恵人未䝉仁止其幾而遽以庥覧為懐乎予聞之甚羞而以為不聞也夫陽翟自潁陽達許昌皆漢郡潁川屬是乃吾土也予不肖假長於此雖獲戾於人而不避者吾將識其來乎及成㑹邑中彦髦以落之中宴客有舉爵而稱曰吾斯山河之秀可與峴首争請名之潁亭遂名之若使解攜手值良辰嘉賔二三聲酒緩進既揖既抗對之益酣因書石以介其壁俾覧者懲之當敏樹政無敏樹亭以鈞匠氏之意也唐大中庚午嵗三月九日丁亥攝陽翟縣令陳寛記泉州二公亭記歐陽詹勝屋曰亭優為之名也古者創棟宇纔禦風雨從時適體未盡其要則夏寢冬室春臺秋户寒暑酷受不能自減及中古乃有樓觀臺榭異於平居所以便春夏而陶堙鬱也樓則重構功用倍也觀亦再成勤勞厚也臺煩版築榭加欄檻暢耳目逹神氣就則就矣量其材力實猶有蠧近代襲古増妙者更作為亭亭也者籍之於人則與樓觀臺榭同制之於人則與樓觀臺榭殊無重構再成之糜費加版築欄檻之可處事約而用博賢人君子多建之皆選諸勝境今年暮春月邦牧安定席公别駕置同正員天水姜公念兹邦川逼溟渤山連蒼梧炎氛時迴濕雲多來又日臨胃次斗建辰位和氣將徂畏景方至月令云可以升山陵可以居髙明葢謂是月况地理畢埤而不擇爽塏以蕩夫汚廅乎因問風俗相原隰郭東里所共得竒阜髙不至崇卑不至夷形勢廣袤四隅若一含之以澄湖萬頃揖之以危峯千嶺㸃圓水之心當奔崖之前如鏡之紐狀鼇之首二公止旌輿以迴睇假漁舟而上陟幕煙茵草翫懌移日心謀意籌有建亭之算而未之言也二公既歸邑人踵公遊於斯者如市登中隆觀媚麗前來後至異口同辭昔漢帝不曰百姓安其田里而無愁怨之聲者其由良二千石乎是謂政平教成時和境清使俗泰而民以寧者也虞書不曰股肱良哉庻事康哉是謂翼帝藩皇調隂序陽使物阜而民以昌者也席公今日之化育吾徒是以寧姜公昔嵗之弼諧吾徒是以昌且以之寧又以之昌愷悌君子也詩云愷悌君子民之父母二公者真吾父母矣兹阜二公攸選尚而加愛務休訟簡必復斯至上露下蕪忍令父母憇之乎遂偕發言為公就亭之功如牆而前陳誠於縣尹縣尹允其請而為之辨方經蹠環當上頂誡奢訓簡以授子來於是家有餘力圃有餘木或掬一抔土焉或翦一枝材焉一心百身蜂還蟻徃榛莽可去以自薙瓦甓無脛而奔萃一之日斤斧之功畢二之日圬􅀈之庸息冄晨而成二公莫知層梁亘以中豁飛甍翼而四翥東西南北方不殊致糊白墳以呈素艧頳壤而垂繪通以虹橋綴以綺樹華而非侈儉而不陋烟水交浮巖巒叠迥精舎奉其旁逹都城企其遐際容影光彩漪入瀾澄指朱軒於潭底閱雲岑乎波裏熿熿油演如飛若動又釣人飄颻於左右游禽出沒乎前後一眄一睞千趣萬態税息之者若在蓬壺方丈之上二公重清曠於舊賞納衷懇乎羣庶尋幽探異常於斯勞賔祖客常於斯加以平疇間闢通途在下可以觀耕耨可以采謳謡作一亭而衆美具噫天美兹阜其固與人為亭歟不然何不逺郛郭而博敞詭秀之若此非常之地意待非常之人故越千萬祀而至二公方覿也邑人想之復言曰事無隱義物有正名地為二公而見亭從二公而建斯亭也可署曰二公亭雖芻蕘之云其實有謂二公不忽遂以為號小子藝忝于文曽觀光上國去之日歴越遊吳歸之晨踰荆泛漢㑹稽之蘭亭姑蘇之華亭襄陽峴首豫章湖中皆古今稱為佳境或棟宇猶在或基址未沒山川物象徧得而覧方之於此逺有慙徳懿哉二公智周徳厚卜地如此感民若彼且非飾說入吾邑者升吾亭者知之古之製器物造宫室咸有銘頌以昭其義斯亭也豈無斆古而為之章句者小子薄劣不敢議其事粗述其㫖始為之記兼借二公之名紀于左以為邦榮在位賔寮亦以序從公而列貞元九年三月二十五日記零陵萬石亭記柳宗元御史中丞清河男崔公來莅永州間日登城北墉臨于荒野叢翳之隙見怪石特出度其下必有殊勝步自西門以求其墟伐竹披奥欹側以入緜谷跨谿皆大石林立渙若奔雲錯若置碁怒者虎鬬企者鳥厲抉其穴則鼻口相呀搜其根則蹄股交跱環行􅌓目疑若摶噬於是刳闢朽壤翦焚榛穢决澮溝導伏流散為疎林洄為清池寥廓泓渟若造物者始判清濁效竒於兹地非人力也乃立游亭以宅厥中亭之西石若掖分可以眺望其下青壁斗絶沈於淵源莫究其極自下而望則合為攅巒與山無窮明日州邑耄老雜然而至曰吾儕生是州藝是野眉尨齒鯢未嘗知此豈天墜地出設兹神物以彰我公之徳歟既賀而請名公曰是石之數不可知也以其多而命之曰萬石亭耄老又言之曰懿夫公之名亭也豈専狀物而已哉公甞六為二千石既嬴其數然而有道之士咸恨公之嘉績未洽于人敢頌休聲祝公於明神漢之三公秩號萬石我公之徳宜受兹錫漢有純臣惟萬石君我公之化始于閨門道合千古祐之自天野夫獻辭公夀萬年宗元嘗以牋奏𨽻尚書敢専筆削以附零陵故事元和十年正月五日記沔州秋興亭記賈至在陽而舒在隂而惨性之常也履險而慄涉夷而泰情之變也觀揖讓而退覩交戰而競目之感也聞韶濩而和聆鄭衞而靡耳之動也夫其舒則洽惨則悴慄則止泰則通退則無咎競則有悔和則安樂靡則憂危性情耳目優劣若此故君子慎居處謹視聼焉沔州刺史賈載吾家之良也理沔州未朞月而政和於訟堂之西因髙搆宇不出庭户在雲霄矣卻負大别之固俯視滄海之浸閱吳蜀樓舩之殷覧荆衛藪澤之大亦有㫖哉性得情適耳虛目開且處動則倦理倦莫若静處静則明惟明以理動窮則變變則通通則久今沔州靈府恬而神用爽政是以和觀其前户後牖順開闔之義簡也上棟下宇無雕琢之飾儉也簡近於智儉近於仁仁智居之何陋之有况乎當發生之晨則攅秀木於髙砌見鶯其鳴矣處臺榭之月則納清風於洞户見暑之徂矣洎摇落之時則俯顥氣於軒檻見火之流矣值嚴凝之節則棲同雲於扃闥見雪之紛矣政成頌清體安心逸而詩人之興常在常時之興秋興最髙因以命亭焉予自巴邱徴赴宣室歇鞍棠樹之側解帯竹林之下嘉其俛仰美其動息乃命進牘抽毫志之郢州孟亭記皮日休明皇世章句之風大得建安體論者推李翰林杜工部為尤介其間能不愧者惟吾鄉之孟先生也先生之作遇景入詠不拘竒抉異令齷齪束人口者涵涵然有干霄之興若公輸氏當巧而不巧者也北齊美蕭慤芙蓉露下落楊柳月中疎先生則有微雲澹河漢疎雨滴梧桐樂府美王融日霽沙嶼明風動甘泉濁先生則有氣蒸雲夢澤波動岳陽城謝朓之詩句精者有露濕寒塘草月映清淮流先生則有荷風送香氣竹露滴清聲此與古人爭勝於毫釐也他稱是者衆不可悉類嗚呼先生之道復何言耶謂乎貧則天爵於身謂乎死則不朽於文為士之道亦以至矣先生襄陽人也日休襄陽人也既慕其名亦覩其貎葢仲尼思文王則嗜昌歜七十子思仲尼則師有若吾於先生見之矣説者曰王右丞筆先生于郢之亭亭在刺史治所毎有觀之志四年滎陽鄭公誠刺是州余將抵江南艤舟而詣之果以文見貴則先生之貎縱視矣先是亭之名取先生之諱舊名浩然亭公曰焉有賢者之名為趨厮走養朝夕言於刺史前邪命易之以先生姓今改為孟亭日休時在宴因曰春秋書紀季公子友仲孫湫字者貴之也故書名曰貶書字曰貴况以賢者名於署亭乎君子是以知公樂善之深也百祀之弊一朝而去百祀謂開元至今則民之弊也去之可知矣見善不書非聖人之志宴豆既撤立而為文咸通四年四月三日記唐文粹巻七十四欽定四庫全書唐文粹巻七十五宋姚鉉編記丁揔八首
