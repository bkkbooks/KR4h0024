body:
  text: 吳興姚鉉纂詩壬揔一百三十六首古調歌篇九感寓五十感寓詩三十八首陳子昻感寓七首張九齡感寓權德輿效陳拾遺感寓二首司空圖古意二首孫郃詠史二十一詠史十一李華詠史髙適詠史二首釋皎然詠史二首劉禹錫詠史四首盧照鄰讀李斯傳曹鄴慨嘆三十五出關作魏徴隴右途中遭非語貟半千書懷劉幽求自紀皇甫松贈友人吕温贈韓愈二首孟郊贈喬林劉眘虛寄唐生白居易華下司空圖傷時二首孟雲卿封丘作高適街西居三首姚合效陳拾遺子昂司空圖感時夜坐張說無可奈何歌白居易逢白公元稹感懷費冠卿贈崔純亮孟郊客喜賈㠀有所思宋之問秦人謡古之竒時興楊賁聞砧有感呂温野田行于鵠贈馮宿李觀偶然作二首呂温及第後荅潼關主人朝飢賈㠀九日酬顧少府髙適感物十六觀玊篇陳子昂素絲陸龜蒙李都尉古劒白居易廢琴廢瑟詞張籍說劒元稹春桂問荅二首王績養鷙詞劉禹錫對菊賈㠀直鉤吟盧仝競渡元稹見牧牛人擔靑草張說道州觀野火呂温諭寳二首元稹春感八送春曲三首劉禹錫衡州春早二首呂温㝷人偶題邵眞題花樹楊衡惜花陸龜蒙秋感六秋日耿緯秋夕懷逺孟郊蟠蟀詩羅隱秋思司空圖在郡秋懷二首張九齡感寓詩三十八首陳子昻微月生西海幽陽始化昇圓光正東滿隂魄巳朝凝太極生天地三元更廢興至精諒斯在三五誰能徵蘭若生春夏芊蔚何靑靑幽獨空林色朱蕤冒紫莖遲遟白日晚嫋嫋秋風生歲華盡揺落芳意竟何成蒼蒼丁零塞今古𬗟荒途亭堠何摧兀暴骨無全軀黃沙莫南起白日隠西隅漢甲三十萬曽以事匈奴但見沙場死誰憐塞上孤樂羊爲魏將食子殉軍功骨肉且相薄他人安得忠吾聞山中相乃屬放麑翁孤獸猶不忍况以奉君終市人矜巧智於道若童蒙傾奪相夸侈不知身所終曷見玄眞子觀世玉壷中杳然遺天地乗化入無窮吾觀龍變化乃知至陽精石林何冥密幽洞無留行古之得仙道信與元化并玄感非象識誰能測淪冥世人拘目見酣酒笑丹經崐崘有瑤樹安得采其英白日每不歸靑陽時暮矣茫茫吾何思林卧觀無始衆芳委時晦鶗鴂悲鳴耳鴻荒古巳頽誰識巢居子吾觀崐崘化日月淪洞冥精魄相交構天壤以羅生仲尼推太極老聃貴窈冥西方金仙子崇議乃無明空色皆寂滅業縁定何成名教信紛籍死生俱未停聖人祕元命懼世亂其眞如何嵩公輩詼譎誤時人先天誠爲美階亂禍誰因長城備胡㓂嬴禍發其親赤精旣迷漢子年何救秦云去桃李花多言死如麻深居觀元化悱然爭朶頥羣動相啖食利害紛㘈㘈便便夸毗子榮耀更相持務光讓天下商賈競刀錐巳矣行采芝萬世同一時吾愛鬼谷子靑谿無垢氛囊括經世道遺身在白雲七雄方龍鬪天下乆無君浮榮不足貴導養晦時文舒可彌宇宙卷之不盈分豈徒山木壽空與麋鹿群呦􅊯南山鹿離罟以媒和招揺靑桂樹幽蠧亦成科世情甘近習榮耀紛如何怨憎未相復親愛生禍羅瑤臺傾巧笑玉杯殞雙蛾誰見孤城樹靑靑成斧柯林居病時乆水木澹孤淸閑卧觀物化悠悠念無生靑春始萌逹朱火巳滿嬴殂落方自此感歎何時平臨歧泣世道天命良悠悠昔日殷王子玉馬遂朝周寶鼎淪伊穀瑶臺成故丘西山傷遺老東陵有故侯貴人難得意賞愛在須臾莫以心如玉採他明月珠昔稱夭桃子今爲舂市徒鴟鴞悲東國麋鹿泣姑蘇誰見鴟夷子扁舟去五湖聖人去巳乆公道𬗟良難蚩蚩夸毗子堯禹以爲謾驕榮貴工巧勢利遞相干燕王尊樂毅分國願同歡魯連讓齊爵遺組去邯鄲伊人信往矣感激爲誰歎幽居觀大運悠悠念羣生終古代興没豪聖莫能爭三季淪周赧七雄滅秦嬴復聞赤精子提劒入咸京炎光旣無象晉魯復縱橫堯禹道巳昧昬虐勢方行豈無當世雄天道與胡兵咄咄安可言時醉而未醒仲尼溺東夏伯陽遁西𬈑大運自古來旅人胡歎哉逶迤世巳乆骨鯁道斯窮豈無感激者時俗頽此風灌園何其鄙皎皎於陵子世道不相容嗟嗟張長公聖人不利巳憂濟在元元黃屋非堯意瑶臺安可論吾聞西方化淸淨道彌敦奈何窮金玉彫刻以爲尊雲構山林盡瑶圖珠翠煩鬼功尚未可人力安能存夸愚適増累矜智道逾昬玄天幽且黙羣議曷嗤嗤聖人教猶在世運乆陵遟一繩將何繫憂醉不能持去去行采芝勿爲塵所欺蜻蛉遊天下與世本無患飛飛未能止黃雀來相干穰侯富秦寵金石比交歡出入咸陽裏諸侯莫敢言寜知山東客激怒秦王肝布衣取丞相千載爲辛酸微霜知歲晏斧柯始靑靑況乃金天夕浩露霑羣英登山望宇宙白日巳西𬈑雲海方蕩潏孤鱗安得寧翡翠巢南海雄雌珠樹林何如美人意驕愛比黃金殺身炎洲裏委羽玉堂隂旖旎光首飾葳㽔爛錦衾豈不在遐逺虞羅忽見㝷多材信爲累歎息此珍禽挈瓶者誰子妖服當靑春三五明月滿盈盈不自珍高堂委金玉微縷懸千鈞如何負公鼎被奪笑時人玄蟬號白露兹歲巳蹉跎羣物從大化孤英將奈何瑤臺有靑鳥逺食玉山禾崐崘見玄鳳豈復虞雲羅荒哉穆天子好與白雲期宫女多怨曠層城閉蛾眉日耽瑤臺樂豈傷桃李時靑苔空萎絶白髪生羅帷朝發冝都渚浩然思故鄕故鄕不可見但見巫山陽巫山彩雲没高丘正微茫佇立望巳乆涕淚霑衣裳豈兹越鄕感憶昔楚襄王朝雲無處所荆國亦淪亡昔日章華宴荆王樂荒淫霓旌翠羽蓋射光雲夢林朅來高堂觀悵望陽雲岑雄圖今何在黃雀空哀吟丁亥歲云暮西山事甲兵羸糧市卭道荷㦸爭羌城嚴冬隂風勁窮岫油雲生昬黷無晝夜羽檄復相驚攀跼兢萬仞崩危逺九冥藉藉峯壑裏哀哀冰雪行聖人御宇宙聞道太階平肉食謀何失葵藿𬗟縱橫可惜瑤臺樹灼灼佳人姿碧華映朱實攀折靑春時豈不盛光寵榮君白玉墀但恨紅芳歇凋傷感所思朅來豪遊子勢利禍之門如何蘭膏歎感激自生怨衆趨明所避時棄道猶存雲泉旣巳失羅網與誰論箕山有髙節湘水有淸源唯應白鷗鳥可爲洗心言索居獨幾日炎夏忽然衰陽彩皆隂翳親友盡睽違登山望不見涕泣乆漣洏宿夢感顔色若與白雲期世中驕豪子驅逐正嗤嗤蜀山與楚水擕手在何時金鼎合神丹世人將見欺飛飛騎羊子胡乃在蛾眉變化固幽類芳菲能幾時疲痾苦淪世憂痗日侵淄眷然顧幽褐白雲空涕洟朔風吹海樹蕭條邊巳秋亭上誰家子哀哀明月樓自言隂燕客結髪事逺遊赤丸殺公吏白刃報私讎避仇至海上被役此邊州胡郷三千里遼水復悠悠毎憤胡兵入常爲中國差何知七十載白首未封侯本爲貴公子平生實愛才感時思報國拔劒起蒿萊西馳丁令塞北上單于臺登山見千里懷古心悠哉誰言未忘禍磨没成塵埃浩然坐何暮吾蜀有蛾眉念與楚狂子悠悠白雲期時哉悲不㑹涕泣乆漣洏夢登綏山穴南采巫江芝探元觀竒化遺世從雲螭婉孌將未矣感悟不見之朝入雲中郡北望單于臺胡秦何宻邇沙朔氣雄哉藉藉天驕子猖狂巳復來塞垣無名將亭堠空崔嵬咄嗟吾何歎邊人塗草萊仲尼探元化幽鴻順陽和大運自盈縮春秋遞來過盲飇忽號怒萬物相紛劘溟海皆震蕩孤鳳其如何感寓七首張九齡蘭葉春葳㽔桂華秋皎絜欣欣此生意自爾爲佳節誰知林棲者聞風坐相恱草木有本心何求美人折幽林歸獨卧滯慮洗孤淸持此謝高鳥因之傳逺情日夕懷空意人誰感至精飛沉理自隔何所慰吾誠魚遊樂深池鳥棲欲髙枝嗟爾蜉蝣羽薨薨亦何爲有生豈不化所感奚若斯神理日微滅吾心安得知浩歎楊朱子徒然泣路岐孤鴻海上來池潢不敢顧側見雙翠鳥巢在三珠樹矯矯珍木嶺得無金丸懼美服患人指髙眀逼神惡今我遊冥冥弋者何所慕呉越數千里夢寐今夕見形骸非我親衾枕即郷縣化蝶猶不識川魚安可羡海上有仙山歸期覽神變抱影吟中夜誰聞此歎息美人適異方庭樹銜幽色白雲愁不見滄海飛無翼鳳凰一朝來竹花此可食漢上有游女求思安可得袖中一書札欲寄雙飛翼冥冥獨不見耿耿徒緘憶紫蘭秀空蹊皓露奪幽色馨香歲欲晩感歎情何極白雲在南山日暮長太息感寓權德輿殘雨倦欹枕病中時序分秋蟲與秋葉一夜隔䆫聞虚室對摇落晤言無與羣冥心試觀化世故如絲棼但看鳶戾天豈見山出雲下俚徒擊節朱絃祕南薰椅梧秀朝陽上有威鳳文終待九成奏來儀瑞吾君效陳拾遺子昻感寓二首司空圖髙燕飛何捷啄害恣羣鶵人豈玩其暴華軒容爾居强欺自天稟剛吐信吾徒乃知不平者矯世道終孤陽和含煦潤卉木競紛華當爲衆所恱私已汝何誇北里祕穠豔東園鎻名花豪奪乃常理笑君徒咄嗟古意二首擬梓州陳拾遺孫郃屈子生楚國七雄知其材介絜世不容跡合藏蒿萊道廢固命也瓢飲亦賢哉何事葬江魚空使後人哀魏禮叚干木秦王乃止戈小國有其人大國奈之何賢哲信爲美兵甲豈云多君子戰必勝斯言聞孟軻詠史十一首李華日照崐崘上羽人披羽衣乗龍駕雲霧欲往心無違此山在西北乃是神仙國靈氣皆自然求之不可得何爲漢武帝精意徧羣山糜費巨萬計宫車終不還蒼蒼茂陵樹足以戒人間天生忠與義本以佐雍熈何意李司隷而當昬亂時古墳襄城野斜徑横秋陂况不禁樵採茅莎無孑遺髙摽尚可仰精爽今何之一忤中常侍銜冤誰見知常觀黨錮傳撫卷不勝悲文侯耽鄭衛一聽一忘飱白雪燕姬舞朱絃趙女彈淫聲流不返惂蕩日無端獻歲受朝時鳴鐘醼百官兩牀陳管磬九奏殊未䦨對此唯恐卧更能整衣冠漢皇脩雅樂乗輿臨太學三老與五更天王親割牲一人調風俗萬國和且平單于驟款塞武庫欲銷兵文物此朝盛君臣何穆清至今壝壇下如有簫韶聲蜀主相諸葛功髙名亦尊驅馳十萬衆怒目瞰中原曹伯任公孫國忘身不存社宫乆蕪没白鴈猶飛翻勿言君臣合可以濟黎元爲蜀諒不易如曹難復論秦滅漢帝興南山有遺老危冠揖萬乗幸得厭征討當君逐鹿時臣等巳枯槁寧知市朝變但覺泉石好高卧三十年相看成四皓帝言翁甚善見顧何不早咸稱太子仁重義亦尊道側聞驪姬事申生不自保蹔出商山雲朅來趨灑掃東宫成羽翼楚舞傷懷抱後代無其人戾園滿秋草六國韓最弱末年尤畏秦鄭生爲韓計且欲疲秦人利物可分社原情堪滅身咸陽古城下萬頃稻苗新昻藏獬豸獸出自太平年亂代乃濳伏縱人爲禍愆常聞斷馬劒毎壯朱雲賢身死名不滅塞風吹墓田精靈如有在幽憤滿松煙沂水春可渉泮宫映楊葉麗色異人間珊珊摇珮環展禽恒獨處深巷生禾黍城上飛海雲城中暗春雨適來鳴珮者復是誰家女泥沾珠綴履雨濕翠毛簪電影閉蓮臉雷聲飛蕙心自言沂水曲采蘋兼采菉歸逕雖可㝷天隂光景促憐君貞且獨願許君家宿徒勞惜衾枕子不顧雙蛾豔質誠可重淫風如禮何周王惑襃姒城闕成陂沲巢許在嵩潁陶唐不得臣九州上洗耳一命安能親緜邈數千祀丘中誰隱淪朝遊公卿府夕是山林人蒲帛楊仄陋薜蘿爲搢紳九重念入夢三事思降神且設庭中燎寧窺泉下鱗漢時征百越楊僕將樓舩幕府功未立江湖巳騷然島夷非敢亂政暴地仍偏得罪因懷璧防身輒控弦三軍求裂土萬里詎聞天魏闕心猶在旗門首巳懸如何得良吏一爲制方圓詠史一首髙適尚有綈袍贈應憐范叔寒不知天下士猶作布衣看詠史二首釋皎然田氏門下客馮公衆中賤一朝市義還百代名獨擅始知下客不可輕能使主人功業成借問髙車與珠履何如庇賤一書生獨負髙世姿冥冥寄浮俗下子去不歸何人識荆玉鬻舂意不淺汚跡身豈辱鸞鎩樂迍邅蚪蟠甘窘束五噫譎且正可以見心曲詠史二首劉禹錫驃騎非無勢少卿終不去世道劇頽波我心如砥柱賈生眀王道衛綰工車戲同遇漢文時何人居貴位詠史四首盧照鄰昔有平陵男姓朱名阿游直髪上衝冠壯氣橫三秋願得斬馬劒先斷佞臣頭天子玉檻折將軍丹血流捐生不肯拜視死其若休歸來敎郷里童蒙逺相求弟子數百人散在十二州三公不敢吏五鹿何能詶名與日月懸義與天壤儔何必疲執戟區區在封矦偉哉曠逹士知命固不憂季生昔未逹身辱功不成髠鉗爲臺隷灌園變姓名幸逢滕將軍兼遇曹丘生漢祖廣招納一朝拜公卿百金孰云重一諾良匪輕廷議斬樊噲羣公寂無聲處身孤且直遭時坦而平丈夫當如此唯唯何足榮大漢昔云季小人道遂振玉帛委閽尹斧鑕嬰搢紳邈哉郭先生卷舒得其眞雍容謝朝廷譚笑㢡人倫在晦不絶俗處亂不爲親諸矦不得友天子不得臣沖情甄負甑重價折角巾悠悠天下士相送洛橋津誰知仙舟上寂寂無四鄰公業負竒志交結盡才雄良田四百頃所食常不充一爲侍御史書懷劉幽求心爲眀時盡君門尚不容田園迷徑路歸去欲何從自紀皇甫松皇天后地力使我向此生貴賤不我均若爲天地情我家世道德旨意匡文眀家集四百卷獨立天地經寄言靑松姿豈羡朱槿榮昭昭大化光共此遺芳馨贈友人呂温南山雙喬松擢本皆千㝷夕流膏露津朝被靑雲隂負雪出深澗揺風倚髙岑明堂乆不構雲幹何森森匠意方雕巧時情正誇滛生材㑹有用天地豈無心贈韓愈二首孟郊何以定交契贈君髙山石何以保貞妍贈君青松色貧交過此外無可相彩飾更有其䑕詩吟之堪淚滴其䑕旣穿墉又齧機上絲穿墉有閑土齧機無餘絲朝吟枯桑柘暮泣空杼機豈是無巧妙絲斷將何施衆人尚肥華志士多飢羸願君保此節天意當察㣲前日逺別離今日生白髮欲知萬里情暁卧半牀月常恐百蟲秋使我芳草歇贈喬林劉眘虛去年上䇿不見收今年寄食仍淹留羡君有酒能便醉羡君無錢能不憂如今五侯不待客羡君不問五侯宅如今七貴方自尊羡君不過七貴門丈夫㑹應有知巳世上悠悠何足論寄唐生白居易賈誼哭時事阮籍哭路岐唐生今亦哭異代同其悲唐生者何人五十寒且飢不悲口無食不悲身無衣所悲忠與義悲甚則哭之太尉擊賊日叚太尉以笏擊朱此尚書叱盗時顔尚書叱李希烈大夫死兇㓂陸大夫爲亂兵所害諫議謫蠻夷楊諌議左遷道州每見如此事聲發涕輒隨往往聞其風俗士猶或非憐君頭半白其志竟不衰我亦君之徒鬱鬱何所爲不能發聲哭轉作樂府詩篇篇無空文句句必盡規切過虞人箴痛甚騷人詞非求宫律髙不務文字竒惟歌生民病願得天子知未得天子知甘受時人嗤藥良氣味苦瑟淡音聲希不懼權豪怒亦任親朋譏人竟無奈何呼作狂男兒毎逢羣動息或遇雲霧披但自髙聲歌庶幾天聽卑歌哭雖異名所感則同歸寄君三十章與君爲哭詞華下司空圖日炙旱雲裂迸爲千道血天地沸一鑊竟自烹妖孽堯湯遇災數災數還中輟何事奸與邪古來難撲滅傷時二首孟雲卿徘徊宋郊上不見平生親獨立正傷心悲風來孟津大方載群物生死有常倫虎豹不相食哀哉人食人豈知逢世運天道亮云云太虛流素月三五何皎眀光曜侵白日賢愚迷至精四時更變化天道有虧盈常恐今巳没須臾復更生封丘作髙適我本漁樵孟諸野一生自是悠悠者乍可狂歌草澤中寧堪作吏風塵下秖言小邑無所爲公門百事皆有期拜迎官長心欲碎鞭撻黎庶令人悲悲來向家問妻子本家盡道今如此生事應須南畝田世情付與東流水夢想舊山安在哉爲銜君命且遟廻乃知梅福徒爲爾郤憶陶濳歸去來街西居三首姚合受得山野性任成多事違靑山在宅南迴首東西睎淺淺一井泉數家共汲之獨我惡水濁鑿井庭之陲自鑿還自飲亦爲衆所非吁嗟世間事絜身誠難爲日出窮巷喜温然勝重衣重衣豈不暖暖氣人不齊兀兀復行行不離階與墀丈夫非馬蹄安得知路岐窮賤飱茹薄興與養性冝乃知長生術稁貴難得之效陳拾遺子昻司空圖醜婦競簪花花多映愈醜鄰女恃其姿掇之不盈手量巳苟自私招損乃誰咎寵禄旣非安於吾竟何有感時好鳥無惡聲仁獸肯狂噬寧教鸚鵡啞不遣麒麟細人人語與黙唯觀利與勢愛毀亦自遭掩謗終失計夜坐張說懷哉四璧時未有五都價百金誰見許斗酒難爲貰落花生芳春孤月皎淸夜復逢利交客題户遥相謝無可奈何歌白居易無可奈何兮白日走而朱顔頽少日往兮老日催生者不住兮死者不迴况乎寵辱豐顇之外物又何甞不一去而一來去不可挽兮來不可推無可奈何兮巳焉哉惟天長而地乆前無始兮後無終嗟吾生之幾何寄瞬息乎其中又如太倉之稊米委一粒於萬鍾何不與道逍遥委化從容縱心放志洩洩融融胡爲乎分愛惡於生死繫憂喜於窮通倔强其骨髓齟其心胷合冰炭以交戰秖自苦乎厥躬彼造物者于何不爲此與化者云何不隨或煦或吹或盛或衰雖千變與萬化委一順以貫之爲彼何非爲此何是誰冥此心夢蝶之子何禍非福何吉非凶誰達此觀喪馬之翁俾吾爲秋毫之杪吾亦自足不見其小俾吾爲泰山之阿吾亦無餘不見其多是以達人靜則脗然與隂合迹動則浩然與陽同波委順而巳孰知其他時耶命耶吾其無奈彼何委邪順邪彼亦無奈吾何夫兩無可奈何然後能冥至順而合大和故吾所以飲大和扣至順而爲無可奈何之歌逢白公元稹逺路事無限相逢唯一言月色照榮辱長安千萬門感懷費冠卿螢燭不爲苦求名始辛酸上國無交親請謁多少難九月風割面羞汗成冰片求名俟公道名與公道逺力盡得一名他喜我且輕家書十年絶歸去知誰榮馬嘶渭河柳特地起愁聲贈崔純亮孟郊食薺腸亦苦强歌聲無歡岀門即有礙誰謂天地寛有礙非遐方長安大道傍小人智慮險平地生太行鏡破不改光蘭死不改香始知君子交乆乆道益彰君心與我懷離别俱恛惶譬如浸蘖泉流苦日巳長忍泣目易衰忍憂形易傷項籍豈非壯賈生豈非良當其失意時涕泗各滿裳古人勸加食此食難自强一飯九祝噎一嗟十斷腸况非兒女冤冤氣凌彼蒼彼蒼若有知白日下淸霜今朝始驚呼碧落空茫茫客喜賈㠀客喜非實喜客悲非實悲百迴信到家未當身一歸未歸長愁嗟愁嗟塡中懷開口吐愁聲還郤入耳來甞恐滴淚多自損兩目輝鬢邊雖有絲不堪織寒衣有所思宋之問洛陽城東桃李花飛來飛去落誰家幽閨兒女惜顔色坐見落花長歎息今年花落顔色改明年花開復誰在已見松柏摧爲薪更聞桑田變成海古人無復洛城東今人還對落花風年年歲歲花相似歲歲年年人不同寄言全盛紅顔子須憐半死白頭翁此翁白頭眞可憐伊昔紅顔美少年公子王孫芳樹下淸歌妙舞落花前光禄池臺文錦繡將軍樓閣畫神仙一朝卧病無相識三春行樂在誰邊婉轉蛾眉能幾時須臾鶴髪亂如絲但看古來歌舞地唯有黃昬鳥雀飛秦人謡古之竒微生祖龍代郤思堯舜道何人仕帝庭抜殺指佞草姦臣弄民柄天子恣衷抱上下一相蒙馬鹿遂顚倒中國旣版蕩骨肉安可保人生貴年壽吾恨死不早時興楊賁貴人昔禾貴咸願顧寒微及自登樞要何曽問布衣平眀登紫閣日晏下彤闈擾擾路傍子無勞歌是非聞碪有感吕温千門儼雲端此地富羅紈秋月三五夜碪聲滿長安幽人感中懷靜聽淚汍瀾所恨搗衣者不知天下寒野田行于鵠日没出古城野田何茫茫寒狐上孤冡鬼火燒白楊昔人未爲泉下客若到此中還斷腸贈馮宿李觀寒晨上秦原遊子衣飄飄黑雲截萬里獵火從中燒隂空蒸長煙殺氣獨不銷冰交石可裂風疾山如揺時無靑松心顧我獨不凋偶然作二首吕温棲棲復汲汲忽覺年四十今朝滿衣淚不是傷春泣中夜兀然坐無言空涕洟丈夫志氣事兒女安得知及第後荅潼關主人本欲雲雨化却隨波浪翻一霑太常第十過潼關門志力且虚棄功名誰復論主人固相問慙笑不能言朝飢賈㠀市中有樵山此舎朝無煙井底有甘泉釜中乃空然我要見白日雪來塞靑天立聞西牀琴凍折兩三弦飢莫詣他門古人有拙言九日詶顧少府髙適簷前白日應可惜籬下黃花爲誰有客子迎霜未授衣主人得錢肯酤酒蘇秦憔悴時多厭蔡澤棲遟世看醜縱使登髙秖斷腸不如獨坐空搔首觀玉篇并序陳子昻丙戍歲余從左補闕喬公北征夏四月軍幕舎于張掖河河洲草木無他異者唯有仙人杖往往叢生幽朔地寒與中國頗異余家世好服食昔甞餌之及此役也而息意玆味戍人有薦嘉𬞞者此物存焉余倐爾而笑曰始者與此君別不圖至是而見之豈非神明嘉惠將欲扶吾壽也因爲喬公昌言其能時東萊王仲烈亦同旅舍聞而大喜甘心食之巳旬有五日矣適有行人自謂知藥者謂喬公曰此白棘也公何謬哉仲烈愕然而疑亦曰吾怪其味甜今果如此喬公信是言乃譏余作采玉篇謂宋人不識玉而寶珉石也余心知必是由以獨見之故被奪於衆人乃喟然而嘆曰嗟乎人之大眀者目也心之至信者口也夫目照五色口分五味玄黃甘苦亦可斷而不惑矣而路傍一議二子増疑况君臣之間朋友之際乎自是而觀之則萬物之情可見也感采玉詠而作觀玉篇以荅之并示仲烈譏其失眞鴟夷雙白玉此玉有緇磷懸之千金價舉世莫知眞丹靑非異色輕重有殊倫勿信玉工言徒悲荆國人素絲陸龜蒙園客麗獨繭詩人吟五緵如何墨子淚反以悲途窮我意豈於是願參天地功爲綫補君衮爲弦繋君桐左右修闕職宫商還古風端然㓗白心可與神眀通李都尉古劒白居易古劒寒黯黯鑄來幾千秋白光納日月紫氣排斗牛有客借一觀愛之不敢求湛然玉匣中秋水澄不流至寶有本性精剛無與儔可使寸寸折不能繞指柔願快直士心將斷佞臣頭不願報小怨夜半刺私讎勸君愼所用無作神兵羞廢琴絲桐合爲琴中有太古聲古聲淡無味不稱今人情玉徽光彩滅朱弦塵土生廢棄來巳乆遺音尚泠泠不辭爲君彈縱彈人不聽何物使之然羌笛與秦箏廢瑟詞張籍古瑟在匣誰復識玊柱顚倒朱絲黒千年曲譜不分明樂府無人傳正聲秋蟲暗穿塵作色腹中不辨工人名幾時天下復古樂此瑟還奏雲門曲說劒元稹吾友有寶劍密之如密友我寶膠􅃮交中堂共杯酒酒酣肝膽露恨不眼前剖髙唱荆卿歌亂擊相如缶更擊復更唱更酌亦更壽白虹座上飛靑蛇匣中吼我聞音響異疑是干將偶爲君再拜言神物可見不君言亦可見復言我自取迎匣巳焚香近鞘先澤手徐抽寸寸刃漸屈彎彎肘殺殺霜在鋒團團月臨鈕逡巡濳虯躍鬱律驚左右霆雷滿室光蛟龍繞身走我爲捧之泣此劒别來乆鑄時堇山破藏在松桂朽幽匣獄邊埋神人水心守本用稽泥淬果非雷煥有我欲評劒功願君良聽受劒可剸犀兕劒可切瓊玖劒決天外雲劒衝日中斗劒隳妖蛇腹劒拂佞臣首太古初斷鼇武王親擊紂燕丹卷地圖陳平綰花綬曽被桂樹枝寒光射林莽曽經鑄農器利用翦稂莠神物終變化復爲龍牝牝晉末武庫燒脫然排户牖爲欲掃羣胡散作彌天帚自兹失所往豪英共爲詬今復誰人鑄挺然千載後旣非古風胡無乃近鵶九自我與君遊平生益自負况擎寳劒出重以雄心扣此劒何太竒此心何太厚觀君愼所用所用無或茍濳將辟魑魅勿但防妾婦留斬泓下蛟莫試街中狗君今困泥滓我亦坌塵垢俗耳驚大言逢人少開口春桂問荅二首王績問春桂桃李正芬華年光隨處滿何事獨無花春桂荅春華詎能乆風霜揺落時獨秀君知不養鷙詞并序劉禹錫途逢少年志在逐絶句方呼鷹隼以襲飛走因縱觀之卒無所獲行人有甞從事於斯者曰夫鷙禽飢則爲用今哺之過篤故然也予感之作養鷙詞養鷙非玩形所資擊鮮力少年昧其理日日哺不息探鶵網黃口旦暮有餘食寧知下韝時翅重飛不得陪鰓止林表狡兔自南北飲啄旣巳盈安能勞羽翼對菊賈㠀九日不出門十日見黃菊灼灼尚繁英美人無消息直鈎吟盧仝𥘉歲學釣魚自謂魚易得三十持釣竿一魚釣不得人鈎曲我鈎直哀哉我釣又無食文王巳没不復生直鈎之道何時行競渡元稹吾觀競舟子因測大競源天地昔將競蓬㪍晝夜昬龍蛇相噴薄海岱俱崩奔群動皆攪撓化作流渾渾數極鬪心息大和承混元一氣忽爲二矗然畫乾坤日月復照曜春秋遞寒温八荒坦以曠萬物羅亦繁聖人中間立理世了煩延緜緜復幾歲逮及羲與軒炎皇熾如炭蚩尤扇其燔有熊競心起驅戰山林樊一戰波委焰再戰火燎原戰訖天下定號之爲軒轅自是豈無競瑣細不復言其次有龍競競渡龍之門龍門浚如瀉淙射不可援赤鱗化時至搪突鬐鬛掀乗風瞥然去萬里黃河翻接瞬電烻出㣲吟霹靂喧傍瞻曠宇宙俯瞰卑崐崘庶類咸在下九霄行易捫倐辭蛙黽穴遽排天帝􅕡迴悲暴鰓者未免鯨鯢吞帝命澤諸夏不棄蟲與昆隨時布膏露稱物施厚恩草木霑我潤豚魚望我蕃嚮來同競輩豈料由我存壯哉龍競渡一競身獨尊捨此皆蟻鬪競舟何足論冬日見牧牛人擔靑草歸張說塞上緜應折江南草可結欲持梅嶺花逺競榆關雪日月無他照山川何頓别茍齊兩地心問天將安設道州觀野火吕温南風吹烈火焰焰燒楚澤陽景當晝運隂天半夜赤過處若彗掃來時如電激豈復辨蕭蘭焉得分玉䂖蟲蛇盡爍爛虎兕亦奔迫積穢一蕩除和氣始融液堯時旣敬授禹稼斯肇迹遍生合穎禾大秀兩歧麥家有京坻詠人無溝壑慼若悟焚如功來歲終受益諭寶二首元稹沉玉在弱泥泥弱玉易沉扶桑寒日薄不照萬丈心安得濳淵虯抜壑超鄧林泥封泰山阯水散旱天霖洗此泥下玉照曜臺殿深刻爲傳國寶神器人不侵水置白玉壷始見淸皎絜珠穿殷紅縷始見明洞澈鏌鎁無人淬兩刃幽壤鐡春鏡無人拭一片埋霧月驥跼環堵中骨附筋入節虯蟠尺澤内魚貫蛙同穴艅艎無巨海浮桴矜瀎潏棟梁無廣厦顚倒卧霜雪大鵬無長空舉翮受覊紲豫章無厚地危柢眞危瓦危臬圭璧無卞和甘與頑石列舜禹無陶堯名隨腐草滅神功伏神物神物神乃别人神不世出所以神功絶神物豈徒然用之有施設禹功九州理舜德天下恱璧充傳國璽圭用祈泰折千㝷豫章榦九萬大鵬歇棟梁庇生民艅艎濟來哲虯騰旱天雨驥騁流電掣鏡懸姦膽露劒拂妖蛇裂珠生照乗光冰瑩環座熱此物比在泥斯言爲誰發凡今盡凡耳不爲君不說送春曲三首劉禹錫春向晚春晚思悠哉風雲日巳故花葉自相摧漠漠空中去何時天際來春巳暮苒苒如人老映葉見殘花連天是靑草可憐桃與李從此同桑棗春竟去此去何時迴遊人千萬恨落日上髙臺寂寞繁華盡流鸎歸不來衡州早春二首吕温碧水何逶迤東風吹沙草煙波千里曲不辨嵩陽道病肺不飲酒傷心不看花唯驚望郷處猶自隔長沙㝷人偶題邵眞日昃不復午落花難歸樹人生能幾何莫厭相逢遇題花樹楊衡都無看花意偶到樹邊來可憐枝上色一一爲愁開惜花陸龜蒙人壽期滿百花開唯一春其間風雨至旦夕旋爲塵若使花解愁愁於看花人秋日耿緯返照入閭巷憂來與誰語古道無人行秋風動禾黍秋夕懷逺孟郊卧冷無逺夢聽秋酸別情高枝低枝風千葉萬葉聲淺井不供飲瘦田長廢耕今交非古交貧語聞皆輕蟠蟀詩羅隱頑颸斃芳吹愁夕長屑戍有動歌離弔夢如訴如言緒引虛寛周隙伺榻繁咽夤縁范睡蟬老冠峨緌好不冠不緌爾奚以悲蚊蚋有毒食人肌肉蒼蠅多端黑白偷安爾也出處物兮莫累壞舎啼衰虚堂泣署勿徇諠譁鼠豈無牙勿學萋菲垣亦有耳危條槁飛抽恨咿咿別帳釭冷柔魂不定美人在何夜影流波與子佇立徘徊思多秋思司空圖身病時亦危逢秋多慟哭風波一摇蕩天地幾翻覆孤螢出荒池落葉穿破屋勢利長草草何人訪幽獨在郡秋懷二首張九齡秋風入前林蕭飋鳴寒枝寂寞遊子思寤歎何人知宦成名不立志在歲巳馳五十而無聞古人深所疵平生去外飾直道如不覉未得操割效忽復寒暑移物情有固然身退毀亦隨悠悠滄江渚望望白雲涯露下霜且降澤中草披離蘭艾若不分安用馨香爲庭蕪生白露歲候感遐心䇿蹇慙逺塗巢枝思故林小人恐致㓂終日如臨深魚鳥好自逸池籠安所欽挂冠東都門採蕨南山岑議道誠愧昔覽分還愜今憮然憂成老空爾白頭吟重校正唐文粹卷第十八
