body:
  text: 詩丙揔八十六首樂府辭上功成作樂一七德舞白居易古樂三湘絃怨孟郊箜篌引王昌齡箜篌謡李白感慨六放歌行王昌齡浩歌行白居易緩歌行李頎短歌行李白短歌行張籍善㦲行釋貫休興亡四祖龍行韋楚老鄴都引張說永嘉行張籍後魏行王轂幽怨十二湘妃怨陳羽銅雀臺歌劉長卿銅雀妓歐陽詹魏宫詞崔國輔王昭君歌劉長卿王昭君盧照鄰婕妤怨王維長信宫崔國輔怨詞苦樂相倚曲元􅐃妾薄命李白白頭吟張籍貞節六列女操孟郊節婦吟寄東平李司空張籍織女詞元稹靜女詞孟郊寄衣曲張籍白紵歌愁恨十征婦怨張籍春思李白春别曲張籍古樂府雜怨三首孟郊長干行李白古薄命妾孟郊母别子白居易夜夜曲釋貫休艱危十一蜀道難李白行路難張籍行路難三首李白變行路難王昌齡太行路白居易梁甫吟李白走馬引李賀孟門行崔顥沐浴子李白邊塞三十三將軍行劉希夷將軍行張籍霍將軍崔顥老將行王維鴈門太守行李賀從軍行六首劉長卿塞上曲戎昱塞下曲郎士元塞下曲王季友出塞曲劉灣燕歌行髙適燕支行王維隴頭吟隂山道白居易行行遊且獵篇李白飲馬長城窟釋子蘭闗山月張籍古長城吟王翰長城作鮑溶古築城曲五首元稹築城詞張籍築城詞二首陸龜蒙聽董大彈胡笳聲兼語弄寄房給事李頎七德舞白居易七德舞七德歌傳自武德至元和元和小臣白居易觀舞聽歌知樂意曲終稽首陳其事太宗十八舉義兵白旄黄鉞定兩京擒充戮竇四海清二十有四功業成二十有九即帝位三十有五致太平功成理定何神速速在推心致人腹亡卒遺骸散帛收貞觀初詔收天下陣亡者致祭而瘞之尋又散金帛而購埋之飢人賣子分金贖貞觀二年大饑人有賣男女者詔出内府金帛盡贖之以還其父母魏徴夢見天子泣魏徴疾亟太宗夢與徴别既寤流涕是夕徴卒故御製碑文云昔殷髙宗得良弼於夢中朕今失賢臣於覺後張謹哀聞辰曰哭張公謹卒太宗為之舉哀有司奏曰隂陽所忌辰日不哭太宗曰君臣義重猶父子也情發於衷安知辰日乃哭之怨女三千放出宫太宗嘗謂侍臣曰婦人幽閉深宫情實可愍今將出之任求伉儷於是令左丞戴胄給事中杜正倫於掖庭揀出數千人盡放歸也死囚四百來歸獄貞觀六年親録囚徒死罪者三百九十人放歸于家令明年秋來就刑及期而至遂詔悉原之翦鬚燒藥賜功臣李勣嗚咽思殺身李勣疾亟醫云得龍鬚灰方可療之太宗自翦鬚燒灰賜之服訖而愈勣叩頭泣涕而謝含血吮瘡撫戰士思摩奮呼乞効死李思摩嘗中弩太宗親為之吮血則知不獨善戰善乗時以心感人人心歸爾來一百九十載天下至今歌舞之歌七德舞七德聖人有作垂無極豈徒耀神武豈徒誇聖文太宗意在陳王業王業艱難示子孫湘絃怨孟郊昩者治春草蕭蘭同一鋤盲飈怨秋林曲直同一枯嘉禾忌深蠧直人悲巧誣靈均入迴流靳尚為良謨願我分衆泉清濁各有渠願我分衆巢梟鸞相逺居此志諒難保此意誠何如箜篌引王昌齡盧谿郡南夜泊舟夜聞南岸羌戎謳其時月黒猿啾啾微雨霑衣令人愁有一遷客登髙樓不言不寐彈箜篌彈作薊門桑葉秋風沙颯颯青塚頭將軍鐵􅍡汗血流深入匃奴戰未休黄旗一㸃兵馬收亂殺胡人積如邱瘡病驅來配邊州仍披漠北羊羔裘顔色飢枯掩面羞眼眶滴淚深兩眸還思本鄉食􅈊牛欲語不得指咽喉或有強壯能吚嚘意說被他邊將讎五世屬蕃漢主留碧毛氈帳河曲遊槖駞五萬部落稠勑賜飛鳯金兠鍪為君百戰如過籌静掃隂山無鳥投家藏鐵劵特承優黄金千斤不稱求九族分離作楚囚深溪寂寞絃苦幽草木悲感聲颼飀僕本山東為國憂明光殿前論九疇簏讀兵書盡冥搜為君掌上施權謀洞曉山川無與儔紫宸發詔逺懷柔摇筆飛霜如奪鉤鬼神不得知其由憐愛蒼生比蚍蜉縁河屯兵須漸抽盡遣降來拜御溝便令海内休戈矛何用班超定逺侯史臣書之得已不箜篌謡李白攀天莫登龍走山莫騎虎貴賤結交心不移唯有嚴陵與光武周公稱大聖管蔡寧相容漢謡一斗粟不與淮南春兄弟尚路人吾心安所從他人方寸間山海㡬千重輕言託朋友對面九疑峯多花必早落桃李不如松管鮑久已死何人繼其蹤放歌行王昌齡南渡洛陽津西望十二樓明堂坐天子月朔朝諸侯清樂動千門皇風披九州慶雲從東來泱􅐯抱日流昇平貴論道文墨將何求有詔徴草澤微誠獻謀猷冠冕如星羅拜揖曹與周望塵非君事入賦且遲留幸蒙國士識因脫負薪裘今者放歌行以慰梁甫愁但營數斗禄奉養每豐羞若得金膏遂飛雲亦可儔浩歌行白居易天長地久無終畢昨夜今朝又明日鬢髮蒼浪牙齒踈不覺身年四十七前去五十有㡬年把鏡照面心忙然既無長繩繫白日又無大藥駐朱顔朱顔日夜不如故青史功名在何處欲留年少待富貴富貴不來年少去去復去兮如長河東流赴海無迴波賢愚貴賤同歸盡北邙塚墓髙嵯峨古來如此非獨我未死有酒且高歌顔回短命伯夷餓我今所得亦己多功名富貴須待命命若不來知柰何緩歌行李頎小來託身攀貴遊傾財破産無所憂暮擬經過石渠署朝將出入銅龍樓結交杜陵輕薄子謂言可生復可死一沉一浮㑹有時棄我翻然如脱屣男兒立身須自强十年閉户頴水陽業就功成見明主擊鍾鼎食坐華堂二八蛾眉梳墮馬美酒清歌曲房下文昌宫中賜錦衣長安陌上退朝歸五陵賓從莫敢視三省官僚揖者稀早知今日讀書是悔作從來狂俠兒短歌行李白白日何短短百年苦易滿蒼穹浩茫茫萬劫太極長麻姑垂兩鬢一半己成霜天公見玉女大笑億千塲吾欲攬六龍迴車挂扶桑北斗酌美酒勸龍各一觴富貴非所願為人駐頽光短歌行張籍青天蕩蕩髙且虛上有白日無根株流光暫出還入地使我少年不須叟與君相逢勿寂寞衰老不復如今樂玉巵盛酒置君前再拜願君千萬年善㦲行釋貫休有美一人兮婉如清揚識曲别音兮令姿煌煌繡袂捧琴兮登君子堂如彼萱草兮使我憂忘欲贈之以紫玉尺白銀鐺久不見之兮湘水茫茫祖龍行韋楚老黒雲兵氣射天裂壯士朝昏夢寃結祖龍一夜死沙邱胡亥空隨鮑魚轍腐肉偷生二千里偽書先賜扶蘇死墓接驪山土未乾瑞光己向芒碭起陳勝城中鼓三下秦家天地如崩瓦龍虵撩亂入咸陽少帝空隨漢家馬鄴都引張説君不見魏武草創爭天禄羣雄睚眦相馳逐晝攜壯士破堅陣夜接詞人賦華屋都邑繚繞西山陽桑榆漫漫漳河曲城郭為墟人改代但見西園明月在鄴傍髙塚多貴臣蛾眉曼睩共灰塵試上銅臺歌舞處唯有秋風愁殺人永嘉行張籍黄頭鮮卑入洛陽胡兒持㦸昇明堂晉家天子作降虜公卿齊走如牛羊紫陌旌旛暗相觸家家雞犬驚上屋婦人出門隨亂兵夫死眼前不敢哭九州諸侯自顧土無人領兵來護主北人避胡多在南南人至今能晉語後魏行王轂力微皇帝謗天嗣太武凶殘人所畏一朝􅗑䍽飛上天子孫盡作河魚餌湘妃怨陳羽二妃愁處雲沉沉二妃怨處湘江深商人酒滴廟前草蕭颯風生斑竹林銅雀臺歌劉長卿嬌愛更何日髙臺空數層含啼映雙袖不忍看西陵漳河東流無復來百花輦路唯蒼苔青樓月夜長寂寞碧雲日暮空徘徊君不見鄴中萬事非昔時古人何在今人悲春風不逐君王去草色年年舊宫路宫中歌舞己浮雲空指行人徃來處銅雀妓歐陽詹蕭條登古臺迴首黄金屋落葉不歸林高陵永為谷粧容徒自麗舞態閱誰目惆悵繐帷前歌聲苦於哭魏宫詞崔國輔朝日㸃紅粧擬上銅雀臺畫眉猶未竟魏帝使人催王昭君歌劉長卿自矜妖艷色不顧丹青人那知粉繢能相負却使容華翻誤身上馬辭君嫁驕虜玉顔對人啼不語北風鴈急浮雲秋萬里獨見黄河流纎腰不復漢宫寵雙蛾長向胡天愁琵琶絃中苦調多蕭蕭羌笛聲相和誰憐一曲傳樂府能使千秋傷綺羅王昭君盧照鄰合殿恩中絶交河使漸稀肝腸辭玉輦形影向金徽漢宫草應緑胡庭沙正飛願逐三秋鴈年年一度歸婕妤怨王維宫殿生秋草君王恩幸疎那堪聞鳯吹門外度金輿長信宫崔國輔長信宫中草年年愁處生時侵珠履跡不使玉堦行怨詞妾有羅衣裳秦王在時作為舞春風多秋來不堪著苦樂相倚曲元稹古來苦樂之相倚近於掌上之十指君心半夜猜恨生荆棘滿懷天未明漢皇眼瞥飛燕時可憐班女恩己衰未有因由相決絶猶得半年佯暖熱轉將深意喻傍人緝綴疵瑕遣濳說一朝詔下辭金屋班姬自痛何倉卒呼天拊地將自明不悟尋時暗銷骨白首宫人前再拜願將日月相揮解苦樂相尋晝夜聞燈光那得天明在主今被奪心應苦妾奪深恩初為主欲知妾意恨主時主今為妾思量取班姬收淚抱妾身我曽排擯無限人妾薄命李白漢帝重阿嬌貯之黄金屋咳唾落九天隨風生珠玉寵極愛還歇妬深情却疎長門一歩地不肯暫迴車雨落不上天水覆難再收君情與妾意各自東西流昔日芙蓉花今成斷根草以色事他人能得㡬時好白頭吟張籍請君膝上琴彈我白頭吟憶昔君前嬌笑語兩情宛轉如縈素宫中為我起髙樓更開花池種芳樹春天百草秋始衰棄我不待白頭時羅襦玉珥色未暗今朝己道不相宜揚州青銅作明鏡時中持照不見影人心迴互自無窮眼前好惡那能定君恩已去若再返菖蒲花青月長滿列女操孟郊梧桐相待老鴛鴦㑹雙死貞女貴殉夫捨生亦如此波瀾誓不起妾心井中水節婦吟寄東平李司空張籍君知妾有夫贈妾雙明珠感君纒綿意繫在紅羅襦妾家髙樓連苑起良人執㦸明光裏知君用心如日月事夫誓擬同生死還君明珠雙淚垂何不相逢未嫁時織女詞元稹織婦何太忙蠶經三卧行欲老蠶神女聖早成絲今年絲稅抽徴早早徴非是官人惡去歲官家事戎索征人戰苦束刀瘡主將勲髙換羅幕繰絲織帛猶努力變䌰撩機苦難織東家頭白雙女兒為解挑紋嫁不得余掾荆時目擊貢綾户有終老不嫁之女簷前裊裊游絲上上有蜘蛛巧來徃羨他蟲豸解縁天能向虛空織羅網靜女詞孟郊豔女皆妬花靜女獨撿蹤任體恥任粧嫁德不嫁容君子未求娉小人難相從此志誰與說琴絃幽韻重寄衣曲張籍織素縫衣獨苦辛逺因迴使寄征人官家亦自寄衣去貴從妾手着君身高堂姑老無侍子不能自到邊城裏殷勤為看初著時征人身上宜不宜白紵歌張籍皎皎白紵白且鮮將作春衣稱少年裁縫長短不能定自持刀尺向姑前復恐蘭膏汚纎指常遣傍人收墮珥衣裳著時寒食下還把玉鞭鞭白馬征婦怨張籍九月匃奴殺邊將漢軍全殁遼水上萬里無人收白骨家家城下招魂葬婦人依倚子與夫同居貧賤心亦舒夫死戰塲子在腹妾身雖存如晝燭春思李白燕草如碧絲秦桑低緑枝當君懷歸日是妾斷腸時春風不相識何事入羅帷春别曲張籍長江春水緑堪染荷葉出水大如錢江頭橘樹君自種那不長繫木蘭舩古樂府雜怨三首孟郊夭桃花清晨遊女紅粉新夭桃花薄暮遊女紅粉故樹有百度花人無一定顔花送人老盡人悲花自閑貧女鏡不明寒日花少容暗蛩有虛織短線無長縫浪水不可照狂夫不可從浪水多散影狂夫多異蹤持此一生薄空成萬恨濃憶人莫至悲至悲空自衰寄人莫剪衣剪衣未必歸朝為雙蒂花暮為四散飛落花却遶樹遊子不顧期長干行李白妾髮初覆額折花門前劇郎騎竹馬來遶床弄青梅同居長干里兩小無嫌猜十四為君婦羞顔未嘗開低頭向暗壁千喚不一迴十五始展眉願同塵與灰常存抱柱信豈上望夫臺十六君逺行瞿塘灩澦堆五月不可觸猿鳴天上哀門前舊行跡一一生蒼苔苔深不可掃落葉秋風早八月胡蝶黄雙飛西園草感此傷妾心坐愁紅顔老早晚下三巴預將書報家相迎不道逺直至長風沙古薄命妾孟郊不惜十指絃為君千萬彈常恐新聲至坐使舊聲殘棄置今日悲即是昨日歡將新變故易持故為新難青山有蘼蕪淚葉長不乾空令後世人採掇幽思攅母别子白居易母别子子别母白日無光哭聲苦闗西驃騎大將軍去年破虜新策勲勅賜金錢二百萬洛陽迎得如花人新人迎來舊人棄掌上蓮花眼中刺迎新棄舊未足悲悲在君家有兩兒一始扶行一初坐坐啼行哭牽人衣以爾夫妻新嬿婉使我母子生别離不如林中烏與鵲母不失雛雄伴雌又似園中桃與李花落隨風子在枝新人新人聽我語洛陽無限紅樓女但願將軍重立勲更有新人勝於汝夜夜曲釋貫休蟪蛄切切風騷騷芙蓉噴香蟾蜍髙孤燈耿耿征婦勞更深撲落金錯刀蜀道難李白噫嘘􅐵危乎髙㦲蜀道之難難於上青天蠶叢及魚鳬開國何茫然爾來四萬八千歲不與秦塞通人煙西當太白有鳥道可以横絶峩眉巔地崩山摧壯士死然後天梯石棧相勾連上有横河斷海之浮雲下有衝波逆折之迴川黄鶴之飛尚不能過猿猱欲度愁攀縁青泥何盤盤百歩九折縈巖巒捫參厯井仰脅息以手拊膺坐長歎問君西遊何當還畏途巉嵒不可攀但見悲鳥號枯木雄飛雌呼遶林間又聞子規啼夜月愁空山蜀道之難難於上青天使人聽此凋朱顔連峰去天不盈尺枯松倒挂倚絶壁飛湍瀑流爭喧豗砯崖轉石萬壑雷其險也若此嗟爾逺道之人胡為乎來㦲劒閣崢嶸而崔嵬一夫當闗萬夫莫開所守或匪親化為狼與豺朝避猛虎夕避長蛇磨牙吮血殺人如麻錦城雖云樂不如早還家蜀道之難難於上青天側身西望長咨嗟行路難張籍湘東行人長歎息十年離家歸未得弊裘羸馬苦難行僮僕盡饑少筋力君不見床頭黄金盡壯士無顔色龍蟠泥中未有雲不能生彼昇天翼行路難三首李白金罇清酒斗十千玉盤珍羞直萬錢停盃投筯不能食拔劒四顧心茫然欲渡黄河氷塞川將登太行雪暗天閒來垂釣坐谿上忽復乗舟夢日邊行路難行路難多岐路今安在長風破浪㑹有時直挂雲帆濟滄海大道如青天我獨不得出羞逐長安社中兒赤雞白狗賭梨栗彈劒作歌奏苦聲曳裾王門不稱情淮隂市井笑韓信漢朝公卿忌賈生君不見昔時燕家重郭隗擁篲折節無嫌猜劇辛樂毅感恩分輸肝剖膽効英才昭王白骨縈蔓草誰人更掃黄金臺行路難歸去來有耳莫洗潁川水有口莫食首陽蕨含光混世貴無名何用孤髙比雲月吾觀自古賢達人功成不退皆隕身子胥既棄吳江上屈原終投湘水濱陸機雄才豈自保李斯稅駕苦不早華亭鶴唳誰可聞上蔡蒼鷹何足道君不見呉中張翰稱達生秋風忽憶江東行且樂生前一盃酒何須身後千載名變行路難王昌齡向晚横吹悲風動馬嘶合前驅引旌節千里陣雲匝單于下隂山砂礫空䬃䬃封侯取一戰豈復念閨閤太行路白居易太行之路能摧車若比君心是坦途巫峽之水能覆舟若比君心是安流君心好惡苦不常好生毛髮惡生瘡與君結髮未五載豈期牛女為參商古稱色衰相棄背當時美人猶怨悔何况如今鸞鏡中妾顔未改君心改為君薫衣裳君聞蘭麝不馨香為君盛容飾君看珠翠無顔色行路難難重陳人生莫作婦人身百年苦樂由他人行路難難於山險於水不獨人間夫與妻近代君臣亦如此君不見左納言右納史朝承恩暮賜死行路難行路難不在水不在山秖在人情反覆間梁甫吟李白長嘯梁甫吟何時見陽春君不見朝歌屠叟辭棘津八十西來釣渭濱寧羞白髮照清水逄時吐氣思經綸廣張三千六百鈞風雅暗與文王親大賢虎變愚不測當年頗似尋常人君不見髙陽酒徒起草中長揖山東隆準公一開遊說騁雄辯兩女輟洗來趨風東下齊城七十二指麾楚漢如旋蓬狂生落魄尚如此何况壯士當羣雄我欲攀龍見明主雷公砰訇震天皷帝傍投壺多玉女三時大笑開電光倐爍晦冥起風雨閶闔九門不可通以額叩闗閽者怒白日不照吾精誠杞國無事憂天傾䝟貐磨牙競人肉騶虞不折生草莖手接飛猱搏彫虎側足焦原未言苦智者可巻愚者豪世人見我輕鴻毛力排南山三壯士齊相殺之費二桃呉越無劇孟亞夫咍爾為徒勞梁甫吟聲正悲張公兩龍劒神物合有時風雲感㑹起屠釣大人􅒈屼當安之走馬引李賀我有辭鄉劒玉鋒堪截雲襄陽走馬使意氣自生春朝嫌劒花淨暮嫌劒光冷能持劒向人不解持照身孟門行崔顥黄雀銜黄花翩翩傍簷隙本擬報君恩如何反彈射金罍美酒滿座春平原愛財多衆賓滿堂盡是忠義士何意得有䜛諛人諛人翻覆那可道能令君心不自保北園新種桃李枝根株未固何轉移成隂結子君自取若問傍人那得知沐浴子李白沐芳莫彈冠浴蘭莫振衣處世忌太絜志人貴藏輝滄浪有釣叟吾與爾同歸將軍行劉希夷將軍闢轅門耿介當風立諸將欲言事逡巡不敢入劒氣射雲天鼓聲破原隰黄塵塞路起走馬追兵急彎弓從此去飛箭如雨集截圍一百里斬首五千級代馬流血死胡人抱鞍泣古來養甲兵有事常討襲乗我廟堂運坐使干戈戢獻凱歸帝京軍容何翕習將軍行張籍彈筝峽東有胡塵天子擇日拜將軍蓬萊殿前賜六纛還領禁兵為部曲當朝受詔不辭家夜向咸陽原主㝛戰車彭彭旌旗動三十六軍聲上隴隴頭戰勝夜亦行分兵處處收舊城胡兒殺盡隂磧暮擾擾唯有牛羊聲邊人親戚曽戰殁今逐官軍收舊骨磧西行見萬里空樂府獨奏將軍功霍將軍崔顥長安甲第髙入雲誰家居住霍將軍日晚朝迴擁賓從路旁揖拜何紛紛莫言炙手手可熱須􅁷火盡灰亦滅莫言貧賤即可欺人生富貴自有時一朝天子賜顔色世上悠悠應自知老將行王維少年十五二十時歩行奪取胡馬騎射殺中山白額虎肯數鄴下黄鬚兒一身轉戰三千里一劒曽當百萬師漢兵奮迅如霹􅋬虜騎崩騰畏蒺䔧衛青不敗由天幸李廣無功縁數竒自從棄置便衰朽世事蹉􅋸成白首昔時飛箭無全目今日垂揚生左肘路傍時賣故侯𤓰門前學種先生栁茫茫古木連窮巷寥落寒山對虛牖誓令踈勒出飛泉不似潁川空使酒賀蘭山下陣如雲羽檄交馳日夕聞節使三河募年少詔書五道出將軍試拂鐵衣如雪色聊持寶劒動星文願得燕弓射大將恥令越甲鳴吾君莫嫌舊日雲中守猶堪一戰取功勲鴈門太守行李賀黒雲􅎹城城欲摧甲光向日金鱗開角聲滿天秋色裏塞上燕支凝夜紫半巻紅旗臨易水霜重皷聲寒不起報君黄金臺上意提攜玉龍為君死從軍行六首劉長卿迴首虜騎合城下漢兵稀白刃兩相向黄雲愁不飛手中無尺鐵徒欲穿重圍落日更蕭條北風動枯草將軍追虜騎夜失隂山道戰敗仍樹勲韓彭但空老草枯秋塞上望見漁陽郭胡馬嘶一聲漢兵淚雙落誰為吮癕者此事今人薄目極鴈門道青青邊草青一身事征戰疋馬同辛勤末路成白首功歸天下人倚劒白日暮望鄉登戍樓北風吹羌笛此夜闗山愁迴首不無意滹河空自流黄沙一萬里白首無人憐報國劒己折歸鄉身幸全單于古臺下邊色寒蒼然塞上曲戎昱樓上畫角哀即知兵心苦試問左右人無言淚如雨何意休明時終年事􅎏鼓塞下曲郎士元寶刀塞下兒身經百戰曽百勝壯心竟未嫖姚知白草山頭日初沒黄沙城下歌聲發蕭條夜静邊風吹獨倚營門望秋月古塞曲王季友進軍飛狐北窮寇勢將變日落沙塵昏背河更一戰騂馬黄金勒雕弓白羽箭射殺左賢王歸奏未央殿欲言塞下事天子不召見東出咸陽門哀哀淚如霰出塞曲劉灣將軍在重圍音信絶不通羽檄如流星飛入甘泉宫倚是并州兒少年心膽雄一朝隨召募百戰爭王公去年桑乾北今年桑乾東死是征人死功是將軍功汗馬牧秋月疲卒卧霜風仍聞左賢王更欲圍雲中燕歌行并序高適開元十年客有從御史大夫張公出塞而還者作燕歌行以示適感征戍之事因而和焉漢家煙塵在東北漢將辭家破殘賊男兒本自重横行天子非常賜顔色摐金伐皷下榆闗旌旗逶迤碣石間校尉羽書飛瀚海單于獵火照狼山山川蕭條極邊土胡騎憑凌雜風雨戰士軍前半死生美人帳下猶歌舞大漠窮秋塞草衰孤城落日鬭兵稀身當恩遇恒輕敵力盡闗山未解圍鐵衣逺戍辛勤久玉筯應啼别離後少婦城南欲斷腸征人薊北空迴首邊風飄飄那可度絶域蒼茫何所有殺氣三時作陣雲寒聲一夜傳刁斗相看白刃血紛紛死節從來豈顧勲君不見沙塲征戰苦至今猶憶李將軍燕支行王維漢家天將才且雄來時謁帝明光宫萬乗親推雙闕下千官出餞五陵東誓辭甲第金門裏身作長城玉塞中衛霍纔堪一騎將朝廷莫數貳師功趙魏燕韓多勁卒闗西俠少何咆勃報讎只是聞嘗膽飲酒不曽妨刮骨畫㦸琱戈白日寒連旗大斾黄塵没疊鼓遥飜瀚海波鳴笳亂動天山月麒麟錦帶佩呉鉤颯沓青驪躍紫騮拔劒已斷天驕臂歸鞍共飲月支頭漢兵大呼一當百虜騎相看哭且愁教戰雖令赴湯火終知上將先伐謀隴頭吟長城少年遊俠客夜上戍樓看太白隴頭明月迥臨闗隴上行人夜吹笛闗西老將不勝愁駐馬聽之雙淚流身經大小百餘戰麾下偏裨萬户侯蘇武纔為典屬國節毛空盡海南頭隂山道白居易隂山道隂山道紇邏敦肥水泉好每至戎人送馬時道傍千里無纎草草盡泉枯馬病羸飛龍但印骨與皮五十疋縑易一疋縑去馬來無了日養無所用土非宜毎歲死傷十六七縑絲不足女工苦踈織短裁充疋數藕絲蛛網三丈餘迴鶻訴稱無用處咸安公主號可敦逺為可汗頻奏論元和二年下新勅内出金帛酬馬直仍詔江淮馬價縑從此不令踈短織合羅將軍呼萬歲捧授金銀與縑綵誰知􅃛虜啓貪心明年馬來多一倍縑漸好馬漸多隂山虜柰爾何行行遊且獵篇李白邊城兒生年不讀一字書但將遊獵誇輕趫胡馬秋肥宜白草騎來躡影何矜驕金鞭拂雪揮鳴鞘半酣呼鷹出逺郊弓彎滿月不虛發雙鶬迸落連飛髇海邊觀者皆辟易猛氣英風振沙磧儒生不及遊俠人白首下帷復何益飲馬長城窟釋子蘭游客長城下飲馬長城窟馬嘶聞水腥為浸征人骨豈不是流泉終不成潺湲洗盡骨上土不洗骨中寃骨若不流水四海有還魂空流嗚咽聲聲中疑是言闗山月張籍秋月明朗闗山上山中行人馬蹄響闗山秋來雨雪多行人見月唱邊歌海邊漠漠天氣白胡兒夜度黄龍磧軍中探騎暮出城伏兵暗處低旌㦸漢水連天霜草平野駝尋水磧中鳴隴頭風急鴈不下沙場苦戰多流星可憐髙國闗山道年年戰骨多秋草古長城吟王翰長安少年無逺圗一生唯羨執金吾騏驎前殿拜天子走馬為君西擊胡胡沙獵獵吹人面漢虜相逢不相見遥聞鍾鼔動地來傳道單于夜猶戰此時顧恩寧顧身為君一行摧萬人壯士揮戈迴白日單于濺血染朱輪迴來飲馬長城窟長城道傍多白骨問之耆老何代人云是秦王築城卒黄昏塞北無人煙鬼哭啾啾聲沸天無罪見誅功不賞孤魂流落此城邊當昔秦王按劒起諸侯膝行不敢視富國彊兵二十年築怨興徭九千里秦王築城何太愚天實亡秦非北胡一朝禍起蕭墻内渭水咸陽不復都長城作鮑溶䝉公虜生人北築秦氏寃禍興蕭墻内萬里防禍根城成六國亡宫闕啓千門生人半為土何用空中原柰何天下人骨肉尚酬恩投沙擁海水安得不久翻乗髙慘人魂寒日易黄昏枯骨貫折鐵沙中如有言萬古驪山葬誰知野火燔古築城曲五首元稹年年塞下丁長作出塞兵自從冒頓强官築遮虜城築城須努力城髙遮得賊但恐賊路多有城遮不得丁口傳父言莫問城堅否平城被虜圍漢斸城墻走因兹請休和虜徃騎來過半疑兼半信築城猶嵳峩築城安敢煩願聽丁一言請築鴻臚寺兼愁虜出闗築城詞張籍築城去千人萬人齊抱杵重重土堅試行錐軍吏執鞭催作遲來時一年深磧裏盡著短衣渴無水力盡不得抛杵聲杵聲未定人皆死家家養男當門户今日作君城下土築城詞二首陸龜蒙城上一焙土手中千萬杵築城畏不堅堅城在何處莫歎將軍逼將軍要却敵城髙功不髙爾命何勞惜聽董大彈胡笳聲兼語弄寄房給事李頎蔡女昔造胡笳聲一彈一十有八拍胡人落淚向邊草漢使斷膓對歸客古戍蒼蒼烽火寒大荒隂沉飛雪白先拂商絃後角羽四郊秋葉驚摵摵董夫子通神明深山竊聽來妖精言遲更速皆應手將徃復旋如有情空山百鳥散還合萬里浮雲隂且晴嘶酸鶵鷹失羣夜斷絶胡兒戀母聲川為靜其波鳥亦罷其鳴烏珠部落家鄉逺邏逤沙塵哀怨生出音變調忽飄灑長風吹林雨墮瓦迸泉颯颯飛木末野鹿呦呦走堂下長安城連東掖垣鳯凰池對青瑣門髙才脫畧名與利日夕望君抱琴至唐文粹巻十二欽定四庫全書唐文粹巻十三宋姚鉉編
