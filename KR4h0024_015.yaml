子昔忝省閣與岳州張使君潭州王都督同官聯事後承朝譴各自東西張公與王都督別詩二首情頗殷切予覽以歎因遥申和云韋嗣立茂先王佐才作牧楚江隈登樓正欲賦復遇仲宣來黃鵠飛將逺雕龍文爲開寧知昔聮事聽曲有餘哀昔時陪二賢纓冕㑹神仙一去馳江海相逢共播遷無因千里駕忽覩四愁篇覽諷歎何巳歎終徒愴然留別武陵袁丞王昌齡皇恩蹔遷謫待罪逢知巳從此武陵谿孤舟二十里桃花遺古岸金澗流春水誰識馬將軍忠貞抱生死舟行懷閻士和釋皎然二月湖南春草遍横山渡口花如霰相思一日在孤舟空見歸雲三兩片秋山寄陳讜言王昌齡巖閒寒事早衆山木巳黃北風何蕭蕭茲夕露爲霜感激不能寐中宵時慨慷黃蟲初悲鳴玄鳥去我梁獨卧時易晚離羣情更傷思君若不及鴻鴈今南翔海上寄蕭五獨孤及朔風翦塞草寒露日夜結行行届瀛壖歸思生暮節驛樓見萬里延首望遼碣逺海入大荒平蕪際窮髪舊國在夢想故人且胡越契闊阻風期荏苒成雨別海西望京口兩地各天末索居動經秋載笑知曷月日窮南望盡唯見飛鳥滅音塵未易得何以慰飢渴懷鄭洎孟遟風蘭舞幽香雨業墮寒滴美人來不來前山㸔向夕杼山禪居寄東谿吳處士釋皎然靑雲何潤澤下有賢人隱路入菱湖深跡與黃鶴近野風吹白芷山月揺淸軫詩祖吳叔庠到君才不盡身當靑山秀詩日家住靑山下靑山有吳均故宅後改爲吳均山文體多郢聲澄徹湘水碧泬寥楚天淸時人格不同至今罕知名昔賢敦師友此道獨君行旣得廬霍趣乃高雷逺情別時春風多掃盡雪山雪爲君中夜起孤坐石上月悠然遺塵想邈矣達性說故人不在茲幽桂惜未結宿吉祥寺寄廬山隱者楊衡風鳴雲外鐘鶴宿千年松相思杳不見月出山重重春夢岑叅洞房昨夜春風起遥憶美人湘江水枕上片時春夢中行盡江南數千里贈逺陸龜蒙茱茰匣中鏡欲照心還懶本是細腰人別來羅帶緩從君出門後不奏雲和管妾思冷如簧時時望君暖心期夢中見路未魂夢短怨坐泣西風秋䆫月華滿河梁別馬戴河梁送別者行哭半非親此地足征戰胡天多殺人金罍照離席寳瑟凝殘春有所思盧仝當時我醉美人家美人顔色嬌如花今日美人棄我去靑樓珠箔天之涯姢姢常娥月三五盈又缺翠眉蟬鬢生別離一望一見心斷絶心斷絶幾千里夢中醉卧巫山雲覺來淚滴湘江水湘江兩岸花木深美人不見愁人心含愁更奏緑綺琴調高弦絶無知音美人兮美人不知爲暮雨兮爲朝雲相思一夜梅花發忽到䆫前疑是君寄逺李白美人在時花滿堂美人去後空餘牀牀中繡被卷不寢至今三載聞餘香香亦竟不滅人亦竟不來相思黃葉落白露濕靑苔寄逺賈㠀別腸多鬱紆豈能肥肌膚始知相結密不及相結踈踈別恨應少宻離恨難袪門前南流水中有北飛魚魚飛向北海可以寄逺書不惜寄逺書故人今在無況此數尺身阻彼萬里途自非日月光難以知子軀怨情李白新人如花雖可寵故人似玉猶來重花性飄揚不自持玉心皎絜終不移故人昔新今尚故還見新人有故時請看陳后黃金屋寂寂珠簾生網絲生別離白居易食蘗不易食梅難蘗能苦兮梅能酸未如生別之爲難苦在心兮酸在肝晨雞載鳴殘月没征馬重嘶行人出迴看骨肉哭一聲梅酸蘗苦甘如蜜黃河水白黃雲秋行人河邊相對愁天寒野曠何處宿棠梨葉戰風颼颼生離別憂從中來無斷絶憂積心勞血氣衰未年三十生白髮別離陸龜蒙丈夫非無淚不灑離別閒杖劒對罇酒恥爲游子顔蝮蛇一螫手壯士疾解腕所思在功名離別何足歎雜怨張籍切切重切切秋風桂枝折人當少年嫁我當少年別念君非征行年年長逺途妾身甘獨殁高堂有舅姑山川豈遥逺行人自不返春愁韓琮金烏長飛玉兎走靑鬢長靑古無有秦娥十六語如弦未解貪花惜楊柳吳魚嶺鴈無消息水盻蘭情別來乆勸君年少莫遊春暖風遟日濃如酒和贈逺獨孤及憶得去年春風至中庭桃李暎璅牎美人挾瑟對芳樹玉顔亭亭與花雙今年新花如奮時去年美人不在茲借問離居恨深淺秪應獨有庭花知傷歌行張籍黃門詔下促收捕京兆尹繫御史府出門無復部曲隨親戚相逢不容語辭成謫尉南海州受命不得湏臾留身著靑衫騎惡馬東門之東無送者郵夫防吏急喧驅往往驚墮馬蹄下長安里中荒大宅東門巳除十二㦸高堂舞榭鏁管弦美人遥望西南天遷謫江表乆未歸竇叅一自經放逐徘徊無所從便爲岀山雲不隨飛去龍名豈不欲保歸豈不欲早苟無三月資難適千里道離心與羇思終日常草草人生年㡬齊憂苦則先老誰能假羽翼使我暢懷抱失志夜坐思歸楚江孟郊夜學暁未休苦吟神鬼愁如何不自閑心與身爲讎死辱片時痛生辱長年羞靑桂無直枝碧江思舊遊失意歸吳寄劉侍郞自念西上身忽隨東歸風長安日下影又落江湖中離婁豈不明子野豈不聦至寳非眼別至音非耳通因緘俗外辭逺寄高天鴻荅李昌期楊洵美三山載羣仙峩峩鹹浪中霞衣翦不得此路安可從我生亦何事出門如飛蓬白日又黃昏所悲瑤草空蟲聲故郷夢枕上禾黍風吾道如未喪天運何時通莫相疑行杜甫男兒生無所成頭皓白牙齒欲落眞可惜憶獻三賦蓬萊宫自怪一日聲烜赫集賢學士如堵墻觀我落筆中書堂往時文彩動人王今日飢寒趨路傍晚將末節契年少當靣論心背靣笑寄謝悠悠世上兒莫爭好惡莫相疑王夫子白居易王夫子送君爲一尉東南三千五百里道途雖逺位雖卑月俸猶堪活妻子男兒口讀古人書束帶歛手來從仕近將徇禄給一家逺則行道佐時理行道佐時須待命委身下位無爲恥命苟未來且求食官無高卑及逺邇男子上旣未能濟天下下又不至飢寒死吾觀九品至一品其閒氣味都相似紫綬朱衣靑布衫顔色不同而巳矣王夫子別有一事欲勸君遇酒逢花且歡喜孟先生詩韓愈孟生江海士古貌又古心甞讀古人書謂言古猶今作詩三百首窅黙咸池音騎驢到京國欲和薰風琴豈識天子居九重鬱沈沈一門百夫守無籍不可尋晶光蕩相射旗㦸翩以森遷延乍郤走驚怪靡自任舉頭看白日泣涕下沾襟朅求遊公卿莫肯低華簪諒非軒冕族應對多差參萍蓬風波急桑榆日月侵奈何從進士此路轉嶇嶔異質忌處羣孤芳難寄林誰憐松桂性競愛桃李隂朝悲辭樹葉夕感歸巢禽顧我多慷慨窮簷時見臨淸宵靜相對髪白恥苦吟採蘭赴幽念眇然望東南秦吳脩且阻兩地無數金我論徐方牧好古天下欽竹實鳯所食德馨神所歆求觀衆丘小必上㤗山岑求觀衆流細必泛滄溟深子其聽我言可以當所箴旣獲則思返無爲乆滯淫卞和試三獻期子在秋碪徐十八晦落第歐陽詹嘉穀不夏熟大器當晚成徐生異凡鳥安得非時鳴汲汲有攸爲驅驅無本情懿哉蒼梧鳯终見排雲征温泉莊卧病寄楊七烱宋之問多病卧兹嶺寥寥倦幽獨頼有嵩丘山高枕長在目玆山棲靈異朝夜翳雲族是日濛雨晴返景入巖谷羃羃縁澗草菁菁山下木此意方無窮環顧悵林麓伊洛何悠漫洲源信重複夏餘鳥獸蕃秋末禾黍熟秉願守樊圃歸閑欣藝牧惜無載酒人徒把涼泉掬夏中詶于逖畢燿問病見贈獨孤及救物智所昧學仙願未從行藏兩乖角蹭蹬風波中淪跡未攄念卧痾非養蒙閉關渉兩旬羇思浩無窮鸑鷟何處來雙舞下碧空離別隔雲雨惠然此相逢把手賀疾閒舉杯欣酒濃新詩見乆要淸論激深衷高舘舒夏簟開門延微風火雲赫嵳峩日暮千萬峯遥指故山笑相看撫號鐘聲和由心親事感知氣同出處未易料且歌緩愁容願君崇明德歲暮如靑松秋園卧疾呈暉上人陳子昻幽寂曠日遥林園轉淸密疲痾澹無豫獨坐泛瑤瑟懷挾萬古情憂虞百年疾緜緜多滯念忽忽毎如失𬗟想赤松遊高尋紫庭逸勞恡始都喪幽人遂貞吉圖書紛滿牀山水藹盈室宿昔心所尚平生自玆畢願言誰見知梵筵有同術八月高秋晚涼風正蕭瑟宋矦鳴皐夢趙六予未及報而陳子云亡今追爲此詩荅宋主簿兼貽平昔遊舊盧藏用暮川罕停波朝雲無留色故人琴與詩可存不可識識心尚可親琴詩非故人鳴皐初夢趙蜀國巳悲陳感化傷淪滅䰟交昔未申冥期失幽報兹理復今晨前嗟成後泣巳矣將何及舊感與新悲虚懷疇昔時趙矦鴻寳氣獨負靑雲姿羣有含妙識衆象懸淸機雄談盡物變精義解人頥在隂旣獨善幽躍自爲疑踠彼千里足傷哉一尉欺陳生富清理卓犖兼文史思縟巫山雲調逸岷江水鏗鏘哀忠義感激懷知巳負劒登薊門孤遊入燕市浩歌去京國歸守西山趾幽居探元化立言見千祀埋没經濟情良圖竟云巳坐憶平生遊十載懷嵩丘題書滿古壁採藥遍巖幽子微化金鼎僊笙不可求榮哉宋與陸名宦美中州存亡一睽阻歧路方悠悠自余事山海及兹人世改傳聞當世榮皆是古人名無復平原賦空餘隣笛聲泣對西州使悲訪北邙塋新墳蔓宿草舊闕毀殘銘爲君成此曲因言寄友生黙語無窮事凋傷共此情對酒憶賀監二首并序李白太子賔客賀監於長安一見呼予爲謫仙人因解金龜換酒爲樂没後對酒悵然有懷而作是詩四明有狂客風流賀季眞長安一相見呼我謫仙人昔好杯中物今爲松下塵金龜換酒處却憶淚沾巾狂客歸四明山隂道士迎勑賜鏡湖水爲君臺沼榮人亡餘故宅空有荷花生念此杳如夢悽然傷我情重憶一首欲向江東去定將誰舉杯稽山無賀老却悼酒舩迴哭玄英方干先生孫郃斗牛文星落知是先生死湖上聞哭聲門前見彈指官無一寸禄名傳千萬里死著𥿄衣裳生誰念朱紫我心痛其語淚落不能巳猶喜韋補闕揚名獻天子弔王將軍墓常建嫖姚北伐時深入强千里戰餘落日黃軍敗鼓聲死常聞漢飛將可奪單于壘今與山鬼隣殘兵哭遼水國殤孟郊徒言人最靈白刃亂縱横誰言當春死不及羣草生堯舜宰乾坤器農不器兵秦漢盗山岳鑄殺不鑄耕天地莫生金生金人起爭重校正唐文粹卷第十五之下嘉靖甲申嵗太學生姑蘇徐焴文眀刻于家塾
