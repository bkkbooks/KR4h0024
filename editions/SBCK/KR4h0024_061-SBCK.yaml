body:
  text: 吳興姚鉉纂碑十三揔五首釋議例銘附天台智者大師碑梁肅左谿大師碑李華天台法門議附梁肅止觀統例附心印銘附天台智者大師碑并序梁肅天台山西南隅一峯曰佛隴蓋智者大師得道之所前大佛教重光之地陳朝崇之置寺曰脩禪及隋創國淸廢脩禪號號爲道場自大師入滅一百八十餘載長老大比丘然公光昭大師之遺訓以啓後學門人安定梁肅聞上易名銘勒大師之遺烈以示後世云大師諱智顗字德安時號智者其先穎川陳氏世居荆州之華容感縁應迹載在别傳夫治世之經非仲尼則三王四代之制寢而不章出世之道非大師則三乗四教之㫖晦而不明昔如來乗一大事因縁菩薩以普門示現自華嚴肇開至􅀟林高㑹無小無大同歸佛界及大雄示滅學路派别世旣下衰教亦陵遟故龍樹大士病之乃用權略制諸外道乃詮智度發明宗極微言東流我惠文禪師得之由文字中入不二法門以授南嶽思大師當時教尚簡密不能廣􅀍而空有諸宗扇惑方夏及大師受之於是開止觀法門其教大略即身心而指定慧即言􅀃而詮解脫大中一實相之宗趣無證眞得之妙自發心至于成道行位昭明無相奪倫然後誕敷契經而㑹同之煥然冰釋示佛知見窺其教者脩焉息焉蓋無入而不自得焉大師之設教也如此􅀂夫弛張用捨開闔黙語高歩海内爲兩朝宗師大明在天光被四表大雲注􅀨旁施萬物繇是言佛法者以天台爲司南殊塗異論往往退息縁離化城示滅兹山是歲隋開皇十七年也夫名者實之賔教者道之門大師溷其賔闢其門自言地位示有證入故感而應之之事可得而知也􅀂安住法界現爲比丘等覺歟妙覺歟不可得而知也當是時也得大師之門者千數得深心者三十有二人纂其言行於後世者曰章安禪師灌頂頂傳縉雲威禪師威傳東陽東陽縉雲同號時謂小威威傳左谿朗禪師自縉雲至左谿以玄珠相付向晦宴息而巳左谿門人之上首今湛然禪師行高識逺超悟辯達凡祖師之教在章句者必引而伸之後來資之以崇德辨惑不可悉數蓋甞謂肅曰是山之佛隴亦鄒魯之洙泗妙法之耿光先師之遺塵爰集于兹自上元寶曆之世􅀖冦擾攘緇錫駭散可易名建寺脩持塔廟莊嚴佛土迴向之徒有所依歸繄衆人是頼汝吾徒也盍紀諸文言刻於金石俾千載之下知吾道之所以然小子稽首受命故大師之本迹教門之經明後裔之住持皆見乎辭其文曰諸佛出世惟一大事天台教源與佛同致赫赫大師開示奥祕載弘道要安住圓位白日麗天天下文明大師出現國土化成無生而生生化兩明薪盡火滅山空道行五世之後閒生上德微言在兹德音允塞明明我后易名淨域此山有壞此教不極故左谿大師碑銘并序李華百億三昧無非度門於􅁴照中而得自在過去大士時惟左谿左谿傅氏之子法號玄朗字惠明其先北地泥陽人漢魏大族隋􅀳南渡家於義烏今爲東陽義烏人也自江夏太守極梁居士翕賢達相承世謂居士爲諸佛化身杳不可測左谿則居士六代孫梵行之門冝生上德母葛氏夢天降靈瑞而娠左谿心靜體安迄于乳育生九年矣辭家入道兼綜羣言曰此法門之畎澮也如意年中剃度􅝗義烏淸泰寺㝷光州岸律師受具戒就㑹稽印宗禪師商律部重山深林怖畏之地獨處巖穴凡三十年宴居左谿因以爲號每言石泉可以洗昬蒙雲松可以遺身世吾以此始亦以此終于所居一方建立精舎約而不陋跪懴其間如來諸大弟子皆菩薩僧大迦葉之頭陀舎利弗之智惠羅睺羅之密行須菩提之解空此四者皆最上乗同趨異名分流合體舎利弗先佛滅度佛以法心付大迦葉此後相承凡二十九世至梁魏間有菩薩僧菩提達摩禪師傳楞伽法八世至東京聖善寺弘正禪師今北宗是也又達摩六世至大通禪師大通又授大智禪師大智禪師降及長安山北寺融禪師蓋北宗之一源也又達摩五代至璨禪師今南宗是也又達摩四代至信禪師信又授融禪師住牛頭山今徑山禪師承其後也至梁陳間有惠文禪師學龍樹法授惠思大師南岳祖師是也思傳智者大師天台法門是也智者傳灌頂大師灌頂傳縉雲威大師縉雲傳東陽大師左谿是也又弘景禪師得天台法居荆州當陽傳其禪師俗謂蘭􅀂和尚是也左谿所傳止觀爲本祇樹園内當聞此經燃燈佛前無有少法因字以詮義因義以明理因理以同如定慧􅀟脩空有皆捨此其略也菩薩或以性海度或以普門化香象至底彌樓最高其餘幽賛不知充滿法界夫知上法易行上法難脩上法易證上法難明謂左谿爲有則實無所行謂左谿爲無則妙有常住視聽之表巍巍左谿因恭禪師重研心法十八種物行頭陀教厥後奉東陽威大師得最上乗詮第一義現聲聞像弘大覺心不可名也偏袒跪膝奉觀音上聖願生兠率天親近彌勒殫罄衣鉢嚴具尊儀焚香稽首則舎利降靈光發寺非正陽屋宇凋落殿移則像毀財匱則力艱左谿杖錫指撝工人聽命如從舊舘儼􅀂天成心不離定中口不甞藥味耄期之歲同於壯齡告門人曰吾六印道圓萬行無得戒爲心本爾等師之天寳十三載九月十九日就滅春秋八十二夏六十四四輩號慟如慕如疑香木幢幡雷動山谷郷人或夢左谿居寶閣第四重者寤告其鄰與之夢恊兠率天者第四天也願力所届廣度人天旣茶毗巳門人分舎利建塔於左谿遵像法也城邑之人願􅀗親近分半舎利起塔於州某原申永慕也左谿僻在深山衣弊食絶布􅁓而綻掬泉而齋如繒纊之温均滑甘之飽誦經則翔禽下聽洗鉢則羣猿來捧宴生一室同法界之大蕭然一院等他方之遊或問曰萬行皆空云何苦行對曰本無苦樂妄習爲因衆生妄除我苦隨盡又問曰山水自利如聚落何對曰名香挺根於海岸如來成道於雪山未聞籠中比大寥廓至􅀂旱蛙躍流瞽犬能視雲雷興而獵者捨􅃓矢鱗介絶而漁者壊􅊻梁舉其倬然曷可殫載弟子衢州龍丘九巖寺道賔越州法華寺僧法源僧神邕本州靈隱寺僧玄淨栖巖寺僧法開蘇州報恩寺僧道遵皆菩薩僧開左谿之祕藏常州福業寺僧守眞杭州靈耀寺僧法澄靈隱寺僧法眞明州天寶寺僧道源淨安寺僧惠從本州開元寺僧淸辨純得醍醐飽左谿之道味入室弟子本州開元寺僧行宣常州妙樂寺僧湛然見如來性傳左谿之法門新羅僧法融理應英純理應歸國化行東表弘左谿之妙􅄨菩薩戒弟子傳禮王光福等菩提惠牙霑左谿之一雨清辯禪師等荷擔遺烈見請斯文銘曰磁石湊金澄流見月法與心起縁隨定設衆生未度我爲舟筏將如趙代豈望荆越趨道云何知之在行殈煩惱􅑹開寂滅城不住之住無生之生兠率天樂徘徊下迎潺湲左谿東入滄海靑松白日人亡地在四輩盡哀時乎不待頌德空領劫衣無改天台法門議梁肅論曰脩釋氏之訓者務之而巳曰戒定惠斯道也始於發心成于妙覺經緯於三乗導達於萬行而能事備矣昔法王出世由一道淸淨用一音演法機感不同所聞益異故五時五味半滿權實偏圓大小之義播於諸部粲然殊流要其所歸無越一實故經曰雖􅀃種種道其實爲佛乗又曰開方便門示眞實相喻之以衆流入海標之以不二法門自他兩得同詣祕宻此教之所由作也洎鶴林滅而法網散神足隱而宗途異各權所得互爲矛楯更作其中或三昧示生四依出現應機不等持論亦别故攝論地持成實惟識之􅀋分路並作非有非空之談莫能一貫旣而去聖滋逺其風東扇􅀃法者桎梏於文字莫知自解習禪者虚無其性相不可牽復是此者非彼未證者謂證惠解之道流以忘反身口之事蕩而無章於是法門之前統或幾乎息矣旣而教不終否至人利見惠聞惠思或羅相繼法雷之振未普故木鐸重授於天台大師大師像身子善現之超悟備帝堯后舜之休相賛龍樹之遺論從南岳之妙解然後用三種止觀成一事因縁括萬法於一心開十乗於八教戒定惠之􅀃空假中之觀坦然明白可舉而行是故教無遺法法無棄人人無廢心心無釋行行有所證證有其宗大師教門所以爲盛故其在世也光照天下爲帝王師範其去世也往來上界爲慈氏輔佐卷舒於普門示現降德爲如來所使階位境智蓋無得而稱焉於戲應跡雖徃正言不墜習之者猶足以抗折百家照示三藏又況聞而能思思而能脩脩而能信信而不巳者歟斯人也雖曰未證吾必謂之近矣今之人正信者鮮遊禪關者或以無佛無法何罪何善之化化中人巳下馳騁愛欲之徒出入衣冠之􅀋以爲斯言至矣且不逆耳故從其門者􅀂飛蛾之赴明燭破塊之落空谷殊不知坐致憔爛而莫能自出雖欲益之而實損之與夫衆魔外道爲害一揆由是觀之此宗之大訓此教之旁濟其於天下爲不侔矣自智者傳法五世至今天台湛然大師中興其道爲予言之如此故録之以繫于篇止觀統例夫止觀何爲也導萬法之理而復於實際者也實際者何也性之本也物之所以不能復者昬與動使之然也照昬者謂之明駐動者謂之靜明與靜止觀之體也在因謂之止觀在果謂之智定因謂之行果謂之成行者行此者也成者證此者也原夫聖人有以見惑足以喪志動足以失方於是乎止而觀之靜而明之使其動而能靜靜而能明因相待以成法即絶待以照本御大車以禦正乗大事而揔權消息乎不二之場鼓舞於說三之域至微以盡性至􅄨而體神語其近則一毫之善可通也語其逺則重玄之門可闚也用至圓以圓之物無偏也用至實以實之物無妄也聖人舉其言所以示也廣其用所以告也優而柔之使自求之擬而議之使自至之此止觀所由作也夫三諦者何也一之謂也空假中者何也一之目也空假者相對之義中道者得一之名此思議之說非至一之㫖也至一即三至三即一非相含而然也非相生而然也非數義也非强名也自然之理也言而傳之者迹也理謂之本迹謂之末本也者聖人所至之地也末也者聖人所示之教也由本以垂迹則爲小爲大爲通爲别爲頓爲漸爲顯爲祕爲權爲實爲定爲不定循迹以返本則爲一爲大爲圓爲實爲無住爲中爲妙爲第一義是三一之藴也所謂空也者通萬法而爲言者也假也者立萬法而爲言者也中也者妙萬法而爲言者也破一切惑莫盛乎空建一切法莫盛乎假究竟一切性莫大乎中舉中則無法非中自假則何法非假舉空則無法不空成之謂之三德脩之謂之三觀舉其要則聖人極深研機窮理盡性之􅀃乎昧者使明塞者使通通則悟悟則至至則常常則盡矣明則照照則化化則成成則一矣聖人有以彌綸萬法而不差旁薄萬劫而不遺燾載􅁪沙而不有復歸無物而不無寓名之曰佛經號之曰覺究其㫖其解脫自在莫大極妙之德乎夫三觀成功者如此所謂圓頓者非漸次非不定指論十章之義也十章者恢演始末通道之關也五略者舉其宏綱截流之津也十境者發動之機立觀之諦也十乗者妙用所脩發行之門也止於正觀而終於見境者義備故也闕其餘者非脩之要也乗者何也載物而運者也十者何也成載之事也知其境之妙不行而至者德之上也乗一而巳豈籍夫九哉九者非他相生之􅀃未至者之所踐也故發心者發其所發安心者安無所安徧破者徧無所破爰至餘乗皆不得巳而􅀃也至於别其義例判爲章目推而廣之不爲䌓統而簡之不爲少如連環不可解也如貫珠不可雜也如懸鏡不可弇也如通川不可遏也議家多門非諍論也按經正義非虚􅀃也辨四教淺深事有源也成一事因縁理無遺也噫止觀其救世明道之書乎非夫聖智超絶卓爾獨立其孰能爲乎非夫聦明深達得意忘象其孰能知乎今之人乃專用章句文字從而釋之又何踈漏邪或稱不思議境與不思議事皆極聖之域等覺至人由所未盡􅀂凡夫生滅心行三惑浩然於言􅀃之中推上妙之理是猶醯雞而􅀃大鵬夏虫之議增冰其不可見明矣今止觀之說文字萬數廣尋果地無益􅀄學豈如暗然自脩功至自至何必以早計爲事乎是大不然凡所爲上聖之域豈隔闊遼夐與凡境杳絶歟是唯一性而巳得之爲悟失之爲迷一理而巳迷而爲凡悟而爲聖迷者自隔理不隔也失者自失性不失也止觀之作所以離異同而究聖神使羣生正性而順理者也正性順理所以行覺路而至妙境也不知此教者則學何所入功何所施智何所發譬如無目昧于日月之光行於重險之處顚踣墮落可勝旣乎噫去聖乆逺賢人不出庸昬之徒含識而巳至使魔邪詭惑諸黨並熾空有云云爲坑爲穽有膠於文句不敢動者有流於漭浪不能住者有太逺而甘心不至者有太近而我身即是者有枯木而稱定者有竅號而稱惠者有奔走非道而言權者有假於􅀑而言通者有放心而言廣者有罕言而爲密者有齒舌濳傳爲口訣者凡此之􅀋自立爲祖繼祖爲家反經非聖昧者不覺仲尼有言道之不明也我知之矣由物累也悲夫隋開皇十八年智者去世至皇朝建中垂二百載以斯文相傳凡五家師其始曰灌頂其次曰縉雲威又其次曰東陽小威又其次曰左谿朗公其五曰荆谿然公頂於同門中惠解第一能奉師訓集成此書蓋不以文詞爲本故也或失則煩或得則野當二威之際緘受而巳其道不行天寳中左谿始弘解說而知者蓋寡荆谿廣以傳記數十萬言網羅遺法勤矣備矣荆谿滅後知其說者適三四人古人云生而知之者上學而知之者次困而學之又其次夫生而知之者蓋性德者也學而知之者天機深者也􅀂嗜慾深耳目塞雖學而不知斯爲下矣今夫學者内病於蔽外役於煩没世不能通其文數年不能得其益是則業文爲之屨校梏足也棼句爲之簸糠眯目也以不能之師教不領之弟子止觀所以未光大於時也予常慼慼於是整其宏綱撮其機要其理之所存教之所急或易置之或引伸之其義之迂其辭之鄙或䕌除之或潤色之大凡浮踈之患十愈其九廣略之冝三存其一於是祛鄙滯導䝉童貽諸他人則吾豈敢􅀂同見同行且不以止觀罪我亦無隱乎爾建中上元甲子首事筆削三歲在㭊木之津功畢云爾心印銘陳諌序安定梁肅字敬之學止觀法門於沙門元浩其未知也患不能知之旣知之患不能至之於是作心印銘蓋机杖盤盂座右之􅀋取其自省也其文自浩浩羣生至有無云云言未知也自本則不然至終篇言其旣知也以旣知之心印其未知號曰心印銘大抵與經論合而歸於無相庻乎哉諫􅀗與敬之游又甞聞浩公之言故序其所由然著于銘之首云浩浩羣生或動或靜或幽或明旁魄六合運用五行莫不因心而寓其形波流火馳出入如機如環無端莫知其歸或細不可視或大不可圍日月至明或以爲昬秋毫至微或以爲繁或囊包天地或渴飲四海舒卷變化惟心所在夭壽得喪惟心所宰心遷境遷心曠境曠物無定心心無定象明則有天人幽則有􅀑神苦樂相紛如絲之棼有無云云不可勝言抑末也巳本則不然惟本之爲體寂􅀆浩􅀆不可遺􅀆顯矣黙矣不可測矣統萬有於纎芥視億載於屈指外而不入内而不出不闔不闢不虚不實無感不應無應不神在天而天在人而人常存而未始或存常昬而未甞不昬豈惟我哉蓋無物不然豈惟我得蓋無物不得混而爲一莫覩其極故曰心生法生心滅法滅離一切相則名諸佛重校正唐文粹卷第六十一
