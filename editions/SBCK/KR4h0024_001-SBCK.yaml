  text: 重校正唐文粹卷第一
  hash: sha256:0135fd33e31ecc664a3f4dcccc502575c9ed4ffadf56622a21917b1138691393
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0024_SBCK_001-1a}
body:
  text: 吳興姚鉉纂古賦甲揔三首聖德二含元殿賦李華明堂賦李白失道一阿房宫賦杜牧含元殿賦并序李華宫殿之賦論者以靈光爲宗然諸侯之遺事蓋務恢張飛動而巳自兹巳降代有辭傑播於聲頌則無聞焉夫先王建都營室必相地形詢卜筮考農􅂩工以子來虞人獻山林之榦太史占日月之吉雖班張左思角立前代未能備也而曩之文士賦長笛洞簫懷握之細則廣言山川之阻採伐之勤至于都邑宫室宏模廓度則略而不云其體病矣至若隂陽慘舒之變冝於壯麗棟宇繩墨之間鄰於政敎豈前修不逮將俟聖德而啓臣心輒極思慮作含元殿賦陋百王之制度出羣子之胷臆非敢厚自夸耀以希名譽欲使後之觀者知聖代有頌德之臣焉其辭曰維皇高宗穆端命于玄穹萬有千歲鍾景祚于洪裔建北宫之尊嚴上取法於天帝乃圖正殿之逌居規崇山而定制信神明幽賛而人謀襲契不然何前王曠此之雄麗也先是大司空帥其屬執度而相之曰美哉川后騖乎其大坦坤靈􅀆配乾剛坤順乾而爲龍舒廣􅄛􅀆走羣山紛卻面而朝宗陵正陽之弈弈鬱佳氣之葱葱蓋昊天之作而黃祇授元聖獲以造新宫也乃審于􅀛筮􅀛筮協從太􅁲以告神人咸同皇曰欽哉是將而爲朕宫因以鴻稱含元建名易乾坤之說曰含弘光大又曰元亨利貞括萬象以爲尊特巍巍乎上京則命徴般碩之匠下荆楊之材操斧執斤者萬人渉磧礫而登崔嵬擇一榦於千木規大壯於喬枚聲坎坎於青雲若神踣而顚摧勢動連崖拉風捽雷倒勁梢於窮谷斬巨柢於昭回時也山祗效靈波神作氣爲桴爲筏羽疊鱗萃朝泛江海夕出河渭雲奔山橫交積于作宫之地於是農事旣收靈臺勿亟子來而就役者周􅀖畿而薄四海咸忘勞而獻力乃張爲廣庭考正極星􅀖伯是經國工研精剗盤岡以爲趾太階積而三重因博厚而順高明築凌天之四墉四墉旣列太階如截下上相嶺嶔􅔌以沈沈其始也星鎚電交於萬堵霜鋸冰解於千㝷擁棟爲山櫕杵如林乃􅁲日星之吉以成帝室虹梁勁於中極欀桶以礱密折姑繇以爲楹隳喬山以爲礩亂重簷以切霞烱素壁以留日神摽峻橘􅀑疊層楣高卑迭拒㝷尺相持木從繩而後正棟操宇而不危階瑩冰級瓦敷鱗差蕩晶景而升降歘􅠓眥以交輝聳大厦之竒傑勢將頓而復飛爰詔有司練日推時徴考室於周頌㑹公􅀸以發之丕赫哉如俯如􅉥若合若離踈森修遽以窅徼怳嶪騀而巖巍謂衝飇激海􅀆漩奫淪以無底奔雷觸山􅀆掉巘崿而傾㩻石鮫拕首於堂廡狀出雲而撑鬐崇高之制靈丘上盤鄰斗極之光輝邇天漢之波瀾察鑿枘之吞吐吸山叢而水攅建升龍之大旂邈不至於階端崢嶸孱顔下視南山照燭無間七耀㢠環㰹呼咸反㪉赫以突兀攇閎弘以蕭摋捧帝座於三辰銜天街之九達進而仰之騫龍首而張鳳翼退而瞻之岌樹巓而興雲末嶷􅀆峩峩巨鼇戴仙山而出滄波劐呼麥反􅀆煌煌燭龍坼穹穴而臨北方排層城而廓帝居豁閶闔而面蒼蒼左翔鸞而右栖鳳翹兩闕而爲翼環阿閣以周墀象龍行之曲直夾􅀟壷以澒洞啓重閨之呀赫趨堂塗之未半望宸居而累息惟上聖之欽明爰聽政而布德去雕璣與金玉絀漢京之文飾熾丹雘於􅲠􅡳抗重霄而競色若乃紫微晨彤墀夜明雲薄萬拱風交四榮冬止其陽則釋裘而燠夏休其隂則􅂢􅗽以清旂獵風而振響葉墜露而成聲懸櫨駢湊竦柱奔列􅃨檻罾綴高䆫景爇􅼀烏敢反日翳而罙連曤天開而中絶形持神而欲離足僂歩而將跌眝昭訓之崇崇暽光範之揭揭其南則丹鳳啓途遐矚荆吳十扇開閉隂陽睢盱容鼎七局方駕五車示王者之無外不樹屏於清都望仙闢於巽維建福敞於坤隅偃朱旗而櫜玄甲屯仡仡之驍夫其後則深闈祕殿曼宇踈楹瑞木交隂玄墀砥平鮮風歷廡淩霰飄英䕃藹武闉増華穆清玉燭内融則嘉盛豐備太陽臨照而天下文明古有六寢御兹一人今也三朝繇古是因布大命於宣政澹玄心於紫宸羲和弭節於通乾望舒停景於觀象密勿旒扆臣人是仰左黃閣而右紫微命伊臯以爲長其下則鶡冠魚服良家茂族厲禁非冝金吾領之其前則貫兩石以䘏刑張三侯以興武告善之旌登聞之鼔節晷漏於鍾律架危樓之筍簴以辨内外之差以正東西之序天光流於紫庭倒景入於朱戸騰祥雲之郁靄映旭日之葱蘢清渠導於元氣玉燭生於景風夷坦數里徘徊無窮羅千乗與萬􅀐曽不得半乎其中厥􅀄經營天下旣乂文物未周􅀌其壯麗盖重施於勞非不懷也乃眷睿孫睿孫開元萬㝢晏清而大和掩書契之所論旣克廣於崇構聲明備而益尊蓋聖皇之孝也揮綽變化􅀆動揺乾坤其東於是弘文敎而開舘對日華之清閾蓋左學之遺制協前王之講德其西於是延載筆之良史俯月華之峻扉集賢人於别殿朝命婦於中闈王風闡而成化隂敎備而不虧加以詠周詩而展親睦魯衛而敦叙因命族之來宴置更衣之豐宇至於殿内諸曹則左右有局通軒並廡物有􅁪司供無廢舉又有銀璫珥貂寺人大伯奉宣岀納之命更踐宫中之役熊羆之旅薫以龍武矛㦸森森材官羽林聲破丘山氣讋飛沈爪抉千鈞跟騰百㝷克壯皇威協比其心其外則校人掌馬天駟在閑以備順遊功敎其間望我鑾和陟彼高山猶慮憲章或遺國容未備乃立掌匭之司舒通事之史職在逹下情于上天儆王言于有位壖通太極澄指龍池重門内注􅃨道潛移幽峻肅以相屬光彤融以熺熺玄象著明帝座維三皇唐設位俯察仰參翼室正中游宫次南北起含光其容耽耽揔而言之如山之壽則曰蓬萊如日之昇則曰大明自兹而北燕遊所經逹于苑囿不可殫名周廬更呵帀以環衛南端百仞上極霄際却視㽎崟經途廣深繚以層城黕爲重隂至若時雨膏田九農􆈧暢雲歸山穴儵以昭曠白日麗於宫隅混晶光而益壯於是風師歛威纎壒不升頴絕揺芒葉無翻稜自中徂外鏡洗川澄弦直閭閻井畫溝塍靡迤秦山陂陁漢陵知稼穡之艱難見皇王之廢興及乎玄冥戒寒海神飛雪瑶域粉野琪樹森列玉宇琁階雲門露闕天華爽霽朗日朝徹赤旗絳庭朱柱􅃩月仰白帝而金精開據河宫而銀燭發其或蠻夷不至帝用興戎降元帥於天上發神謀於禁中皇靈震耀殱厥渠凶矯矯武臣此焉獻功效俘虜而陳噐械恢莫大之威容爾乃時殷仲冬日正南至上公奉斚羣后在位一人壽昌萬國承賜式燕以樂欣欣且醉乃撞宫懸砯碣天地及乎獻歲元辰東風發春懸法象魏與人惟新儼文物於王庭兼九伐而􅀫陳威儀之嚴山嶽振振若太一披絪緼而俯百神旣而咸造勿褻㑹朝清明璿柄指寅寢闈發扄皇帝御衮龍之法服佩蒼璧之純精執鎭圭導朱紘降輦登階微聞玉聲於是典禮之官賛王就位南靣穆然至若甸侯采衛要荒閩貊輸其方賮罔不來格統以千官六卿二伯司儀叙進象胥重譯肅肅委皮乾乾奠璧設以庭燎天烘地赫雷鼓殷殷朱干玉戚神簴如生熊羆愕眙危昻歇向歊爓歕射金根玉輅太常少伯火烈門旂霜交陛㦸乃進元元以觀禮珿初六反億兆之増金吾南首麾之以肱逓攀援而聳仰齊屨企而冠騰太史來告卿雲勃興灑豐澤於生人荅上玄之休徴申命司宼緩刑􅃁卿降德祑山川而問耆老周􅀨露而均􅀖國華戎竭歡喜氣闐塞揭金雞於太淸炫晨陽於正色慶抃之聲不踰辰而靁四域當斯時也驅周驟漢於廓煥爛王臨于朝天地貞觀靈宫巖巖上下交賛蓋所以法乾道而遵帝度豈唯安體而明威者哉夫瑶臺之靡不可以刑萬國土階之陋不可以儀天地奢不遜而儉固允執中于大位洪範曰皇建其有極富哉上聖之宏議也詩歌楚室頌美泮宫諸侯之事也雲多甘泉晏恢景福僻王之志也論諸侯曷若戴天子嘉僻王曷若尊聖人烈烈盛唐祖武宗文太古赧德六王慙勛而政本乎慈用過乎儉夫蒼生所奉者惟君所愛者惟親寧有君親宅體於卑室而赤子得安其身乎故有熊明庭帝姚緫期從人欲也天垂定星易有大壯君人者法焉聖朝猶斥其華而凭其質今是殿也者唯鐡石丹素無加飾焉身居玄眇心與萬姓同畎􅅿之勞以是臨衆何衆不賔以是享神何神不若其德歟雖欲宫崑崙而舘不周城八極而隍四海猶未足儲鴻醇而俯丕耀豈咸鎬一京之所在崇四續之前式勑懷鈆之小臣俾讎書於禁中正百代之遺文由是循環天造耳目惟新敢頌成功告于神宗無愧斯干之什式昭聖德之容頌曰帝作含元含元言言崒若日觀呀爲天門太階三層逹于崑崙鎭兹秦野揭以周原列文祖宗永錫孝孫孝孫有慶于以施令奄甸萬姓受天休命歌之頌之管磬冝之穆穆皇居壽考無期旣成斯文客有觀之上者對曰前王之尤祥絶瑞乃聖朝之細事今休徴以厭于聦明頌聲亦飫于天意和歌竊抃乃臣子之本志又焉足以薦聞哉客曰不然今至尊明發不寐有懷先皇周文之孝也允㳟克讓光溢海外堯舜之謙也自即位以來上下之休嘉神人之詠歌歌於睿躬則固辭頌於宗廟則無斁今吾子之文明昭乎累聖之耿光美于大君之孝德可進而退冝言而黙使雅頌之音卷而不舒猶坦蕩其胷臆無乃過歟爲人之下者有可逹於君親雖濵于死亦冒行之況宗廟啓其心哉臣華常聞遷善之規願附升歌之末明堂賦并序李白昔在天皇告成岱宗改元乾封經始明堂年紀緫章時締構之未輯痛威靈之遐邁天后繼作中宗成之因兆人之子來崇萬祀之丕業蓋天皇先天中宗奉天累聖纂就鴻勲克宣臣白美頌恭惟述焉其辭曰伊皇唐之革天創元也我高祖乃仗大順赫然電發以首之於是橫八荒漂九陽掃叛渙開混茫景星曜而太階平虹蜺滅而日月張欽若太宗繼明重光廓區宇以立極綴蒼昊之頽綱淳風沕穆鴻恩滂洋武義炟爀於有截仁聲馺沓乎無疆若乃高宗紹興拓統錫羡神休旁臻瑞物咸薦元符剖􅀆地珍見旣應天以順人遂登封而降禪將欲考有洛崇明堂惟厥功之未輯􅀆乗白雲於帝郷天后勤勞輔政􅀆中宗以欽明克昌遵先􅁤以繼作􅀆揚烈聖之耿光則使軒轅草圖羲和練日經之營之不彩不質因子來於四方豈殫稅於萬室乃準水臬攅雲梁磬玉石於隴坂空􅅛材於瀟湘巧奪神􅀑髙窮昊蒼聽天語之察察擬帝居之鏘鏘雖暫勞而永固兮貽聖謀於我皇觀夫明堂之宏壯也則突兀瞳朧乍明乍􅀩像太古元氣之結空巃嵸頽沓若嵬若嶪似天閫地門之開闔爾乃劃岝峉以嶽立郁穹崇而鴻紛冠百王而垂勲燭萬象而騰文窙愡恍以洞豁呼嵌嵓而旁分又比夫崐山之天柱矗九霄而垂雲於是乎結構乎黃道岧嶤乎紫微絡勾陳以繚垣闢閶闔而啓扉崢嶸嶒嶷粲宇宙之光輝崔嵬赫弈張天地之神威夫其背泓黃河垠漱清洛太行卻立通谷前廓逺則標熊耳以作揭豁龍門以開關􅀧翠彩於洪荒洞清隂乎羣山及乎煙雲卷舒忽出乍没岌嵩噴伊􅀝日薄月雷霆之所鼔蕩星斗之所伾扢挐金龍之蟠蜿挂天珠之硉矹勢抜五嶽形張四維軋地軸以盤根摩天倪而創規樓臺崛岉以奔赴城闕嶔崟而蔽虧珍樹翠草含華揚㽔目瑶井之熒熒拖玉繩之離離㨖華蓋以儻漭仰太微之參差擁以禁扃橫以武庫獻房心以開鑿瞻少陽而舉措採殷制酌夏歩雜以代室重屋之名括以辰次火木之數壯不及奢麗不及素曽檐屹其霞矯廣厦鬱其雲布掩日道遏風路陽烏轉景而飜飛大鵬橫霄以側度近則萬木森下千宫對岀熠乎碧光之堂炅乎瓊華之室錦爛霞駮星錯波泐颯蕭寥以颼飀窅隂鬱以緜密含佳氣之青葱吐祥煙之鬱律九室窈窕五闈聮緜飛楹磊砢走栱夤縁雲楣立岌以橫綺彩桷攅欒而仰天皓璧晝朗朱甍晴鮮頳欄各落偃蹇霄漢翠楹廻合蟬聮汗漫杳蒼穹之絶垠跨皇居之太半遠而望之赫煌煌以輝輝忽天旋而雲昬迫而察之粲炳煥以照爛倐山訛而晷換蔑蓬壷之海樓吞岱宗之日觀猛虎失道濳蚪蟠梯徑通天而直上俯長河而下低玉女攀星於網戸金娥納月於璇題藻井彩錯以舒蓮天䆫赩翼而􅔷霓扶標川而罔足擬跟挂而罷躋要離欻臛而外喪精視冰背而中迷亘以􅃨道通乎掖垣坌入西樓寔爲崑崙三事庶尹正儀躅以出入九夷五狄順方面而來奔其左右也則丹陛􅔌􅔌彤庭煌煌列寶鼎歊金光流辟雍之滔滔象環海之湯湯闢青陽而啓緫章廓明臺而布玄堂儼以太廟處乎中央發號施令探時順方其閫閩也三十六戸七十二牖度筵列位西八東九白虎列序而躨跪青龍承隅而蚴蟉其深沈奥密也則赤熛掌火招拒司金靈威制陽叶光權隂坤斗王土據乎其心若乃熠燿五色張皇萬殊人物禽獸竒形異模勢若飛動瞪眄睢盱明君暗主忠臣烈夫威政興滅表賢示愚於是天正孟月朝陽登曦天子乃拖蒼玉轡蒼螭臨乎青陽左个方御瑶瑟而彈鳴絲展乎國容輝乎皇儀傍瞻神臺順觀雲之􅁤俯對清廟崇配天之規欽若盻蠁維清緝熈崇牙樹羽熒煌威㽔納六服之貢受萬􅀖之藉張龍旗與虹旌攅金㦸與玉戚延五更進百辟奉珪瓉獻琛帛顒昻俯僂儼容疊跡乃絜爼醢修粢盛奠三犧薦五牲享于神靈太祝正辭庶官精誠鼓大武之隱轔張鈞天之鏗訇􅀌竹合奏空桑和鳴盡六變齊九成羣神來兮降明庭蓋聖主之所以孝治天下而享祀窅冥也然後臨辟雍宴羣后隂陽爲庖造化爲宰飱元氣酌太和千里鼓舞百寮賡歌于斯之時雲油􅀨霈恩鴻溶兮澤汪濊四海歸兮八荒㑹哤聒乎區㝢駢闐乎闕外羣臣醉德揖讓而退而聖主猶夕愓若厲懼人未安乃目極于天耳下于泉飛聦馳明無逺不察考􅀑神之奥推隂陽之荒下明詔班舊章振窮乏散敖倉毁玉沈珠卑宫頽牆使山澤無間往來相望帝躬乎天田后親於郊桑棄末􅀆反本人和兮時康建翠華兮萋萋鳴玉鑾之鉠鉠遊于昇平之圃憩乎穆清之堂天欣欣􅀆瑞穰穰巡陵於鶉首之野講武於驪山之傍封岱宗而祀后土兮掩栗陸而包陶唐遂邀崆峒之道禮汾水之陽渴飮沆瀣之元精黜滋味而貴理國其若夢遊華胥之故鄕於是元元澹然不知所在若羣雲從龍衆水奔海此眞所謂我大君登明堂之政化也豈比夫秦趙吳楚爭高競奢結阿房與叢臺建姑蘇及章華非享祀與嚴配徒掩月而凌霞由此觀之不足稱也況瑶臺之巨麗復安可以語哉敢揚國美遂作辭曰穹崇明堂􅀝天􅀜兮巃嵸鴻􅄥搆瓌材兮偃蹇坱漭邈崔嵬兮周流辟雍岌靈臺兮赫弈日星噴風雷宗祀盻蠁王化恢鎭八極兮通九垓四門啓兮萬國來考休徴兮進賢才儼皇居而作固窮千祀兮悠哉阿房宫賦杜牧六王畢四海一蜀山兀阿房出覆壓三百餘里隔離天日驪山北構而西折直走咸陽二川溶溶流入宫牆五歩一樓十歩一閣廊􅆎縵迴簷牙高啄各抱地勢鈎心􅃲角盤盤焉囷囷焉蜂房水渦矗不知乎幾千萬落長橋卧波未雩何龍􅃨道行空不霽何虹髙低冥迷不知東西歌臺暖響春光融融舞殿冷䄂風􅀨淒淒一日之内一宫之間而氣􅃸不齊妃嬪媵嬙王子皇孫辭樓下殿輦來于秦朝歌夜弦爲秦宫人明星熒熒開䊋鏡也緑雲擾擾梳曉鬟也渭流漲膩棄脂水也煙斜霧橫焚椒蘭也雷霆乍驚宫車過也轆轆逺聽杳不知其所之也一肌一容盡態極妍縵立逺視而望幸焉有不得見者三十六年燕趙之收藏韓魏之經營齊楚之精英幾丗幾年剽掠其人􅀝疊如山一旦有不能輸來其間鼎鐺玉石金瑰珠礫棄擲邐迆秦人視之亦不甚惜嗟乎一人之心千萬人之心也秦愛紛奢人亦念其家柰何取之盡錙銖用之如泥沙使􅀒棟之柱多於南􅅿之農夫架梁之椽多於機上之工女釘頭磷磷多於在􅁃之粟粒瓦縫參差多於周身之帛縷直欄橫檻多於九土之城郭管弦嘔啞多於市人之言語使天下之人不敢言而敢怒獨夫之心日益驕固戍卒呌函谷舉楚人一炬可憐焦土嗚呼滅六國者六國也非秦也族秦者秦也非天下也嗟乎使六國各愛其人則足以拒秦秦復愛六國之人則遞三世可至萬世而爲君誰得而族滅也秦人不暇自哀而後人哀之後人哀之而不鑑之亦使後人而復哀後人也重校正唐文粹卷第一
