  text: 重校正唐文粹卷第四十九
  hash: sha256:927f7b6f96ae9be50b6d23371214150b388d37bf6c22b80b7381d4171cf9d6c7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0024_SBCK_049-1a}
body:
  text: 吳興姚鉉纂古文辛揔一十七首毀譽五明分皇甫湜䜛國沈顔毀叚成式諷詐王藹内夷檄程晏時事四讀開元雜報孫樵書襃城驛鞭賈栁宗元荆巫羅隱變化八象化牛僧孺移􅀨神司空圖風􅀨對羅隱浪翁觀化元結時化丗化蠧化陸􅀛􅀩蟹志明分皇甫湜天下之是非繫於人不懸於迹一於分不定於所爲孰謂人君子小人是也孰謂分君子小人之别是也彼誠君子矣爲之無不是彼誠小人矣動而之非故君子􅃌人之過爲嫉惡譽人之善爲樂賢言巳之光美擬於堯禹參於天地爲昌言順則爲周公變則爲伊尹其心定矣其歸一矣雖萬殊百化一於君子而巳所謂左之右之君子冝之右之左之君子有之小人者不然其過人爲毀訾其譽人爲比周言巳之光美爲矜夸變則爲賊順則爲僞其心定矣其歸一矣雖萬殊百化一於小人而巳所謂天下之惡皆歸焉余故曰天下是非繫於人不懸於迹一於分不定於所爲橫天地絶古今人之所由者二而巳䜛國沈顔知佞之䜛䜛忠不知佞之䜛䜛國故人君弗爲意也且曰彼誠佞邪予不過寵一臣彼誠忠邪予不過黜一臣予授天命有天下豈少􅀂人乎奈何咈予心而不知寵一佞而百佞進黜一忠而百忠退矧忠者寡而佞者衆乎是以宰嚭䜛子胥而吳滅趙高䜛李斯而秦亡無極䜛伍奢而楚昭奔靳尚䜛屈原而楚懷囚愚故曰知佞之䜛䜛忠不知佞之䜛䜛國悲夫毀叚成式古之非人也張口沫舌􅃌數於衆人人得而防之今之非人也有張其所違嚬慼而憂之人不得而防也豈雕刻機杼有􅁋巧乎言非有乎諷詐王藹禮法不可斯須而去有以禮法而爲災忠信不可斯須而去有以忠信而爲禍禮法非災人之端忠信非禍人之本理或有害則禮法忠信爲禍人之萌狂瞽人之所惡也效之則恐不及其眞荒酗人之所恥也履之則恐不自其性狂瞽誠可惡也荒酗誠可恥也臨難而保全則狂瞽荒酗爲藏身之藪禮法忠信直也狂瞽荒酗詐也以之保全則直不如詐之功嗚呼三皇之前無所用五帝之後無所不用内夷檄程晏四夷之民長有重譯而至慕中華之仁義忠信雖身出異域能馳心於華吾不謂之夷矣中國之民長有倔強王化忘弃仁義忠信雖身出於華反竄心於夷吾不謂之華矣竄心於夷非國家之竄爾也自竄心于惡也豈止華其名謂之華夷其名謂之夷邪華其名有夷其心者夷其名有華其心者是知棄仁義忠信於中國者即爲中國之夷矣不待四夷之侵我也有悖命中國專倨不王棄彼仁義忠信則不可與人倫齒豈不爲中國之夷乎四夷内嚮樂我仁義忠信願爲人倫齒者豈不爲四夷之華乎記吾言者夷其名尚不爲夷矣華其名反不如夷其名者也讀開元雜報孫樵樵曩於襄漢閒得數十幅書繫日條事不立首末其略曰某日皇帝親耕籍田行九推禮某日百寮行大射禮於安福樓南某日安北諸蕃君長請扈從封禪某日皇帝自東封還賞賜有差某日宣政門宰相與百寮廷諍十刻罷如此凡數十百條樵當時未知何等書徒以爲朝廷近所行事有自長安來者出其書示之則曰吾居長安中新天子嗣國及窮虜自潰則見行南郊禮安有籍田事乎況九推非天子禮邪又甞入太學見叢甓􅀒工而起􅀂皇堂者就視得石刻乃射堂舊址則射禮廢巳乆矣國家安得行大射禮邪自􅀜巳東水不敗田則旱敗苗百姓入常賦不足至有賣子爲豪家役者吾甞背華走洛遇西戍還兵千人縣給一食力屈不支國家安能東封從官禁兵安所仰給邪北虜驚􅐅邊甿勢不可控宰相馳出責戰尚未報功況西􅀜復驚於西戎安有扈從事邪武皇帝時以御史竊議宰相事望嶺南走者四人至今卿士齚舌相戒況宰相陳奏於仗乎安有廷奏諍事邪語未及終有知書者自外來曰此皆開元政事蓋當時條布於外者樵後得開元録驗之條條可復云尚以爲前朝所行不當盡爲墜典及來長安日見條報朝廷事者徒曰今日除某官明日授某官今日幸于某明日畋于某誠不􅀋數十幅書樵恨生不爲太平男子及覩開元中事如奮臂出其間因取其書帛其縵志其未凡􅀘缺文者十三正詭文者十一是歲大中五年也書襃城驛孫樵襃城驛號天下第一及得寓目視其沼則淺混而茅視其舟則離敗而膠庭除甚蕪堂廡甚殘烏覩其所謂宏麗者訊於驛吏則曰忠穆公甞牧梁州以襃城控二節度治所龍節虎旗馳驛奔軺以去以來轂交蹄劘由是崇侈其驛以示雄大蓋當時視他驛爲壯且一歲賔至者不下數百輩苟夕得其庇饑得其飽皆暮至朝去者寧有顧惜心邪至如棹舟則必折篙破舷碎鷁而後止漁釣則必枯泉汨泥盡魚而後止至有飼馬於軒宿隼於堂凡所以汚敗室廬糜毀器用官小者其下雖氣猛可制官大者其下益暴橫難禁由是日益碎破不與曩􅀋某曹八九輩雖以供饋之􅂩一二力治之其能􅀘數十百人殘暴乎語未旣有老甿􅀏於傍且曰舉今州縣皆役也吾聞開元中天下富蕃號爲治平踵千里者不裹糧長子孫者不知兵今者天下無金革之聲而戸口日益破疆場無侵削之虞而墾田日益寡生民日益困財力日益竭其故何哉凡與天子共治天下者刺史縣令而巳以耳目接於民而政令速於行也今朝廷命官旣巳輕任刺史縣令而又促數於更易且刺史縣令逺者三歲再更故州縣之政苟有不利於民可以出意革去者其在刺史則曰我即去何用如此當愁醉醲當饑飽鮮囊帛匱金􅀏與秩終嗚呼州縣者眞驛邪矧更代之􅂩􅃛吏因縁恣爲奸欺以賣州縣者乎如此而欲望生民不困財力不竭戸口不破墾田不寡難哉予旣揖退老甿條其言書於襃城驛屋壁鞭賈栁宗元市之鬻鞭者人問之其賈直五十必曰五萬復之以五十則伏而􅀏之以五百則小怒五千則大怒必五萬而後可有富者子適市買鞭出五萬持以夸予予視其首則拳蹙而不遂視其握則蹇仄而不植其行水者一去一來而不相承其節朽黒而無文搯之滅爪而不得其所窮舉之翲然􅀂揮虚焉余曰子何取於是而不愛五萬曰吾愛其黃而澤且賈者云余乃召僮爚湯以濯之則遬然枯蒼然白則黃者梔也澤者蠟也富者不恱然猶持之三年後出東郊爭道長樂坂下馬相踶因大擊鞭折而爲五六馬踶不巳墜之地傷焉視其内則空空然其理􅀂糞壤無所賴者今之梔其貌蠟其言以求賈伎於朝者一誤而過其分則喜當其分則反怒曰余曷不至於公卿然而至焉者亦良多矣居無事雖過三年不害當其有事驅之於陳力之列以禦乎物以夫空空之内糞壤之理而以責其大擊之效惡有不折其用而獲墜傷之患者乎荆巫羅隱荆楚人􅁋祀者舊矣有巫頗聞於鄕閭其􅀄爲人祀也筵席尋常歌迎舞將祈疾者徤起祈歲者豐穰其後爲人祀也羊猪鮮肥清酤滿巵祈疾得死祈歲得饑里人忿焉而思之未得適有言者曰吾昔游其家也其家無甚累故爲人祀誠必罄乎中而福亦應乎外其胙必散之其後男女蕃息焉衣食廣大焉故爲人祀誠不得罄於中而神亦不歆乎外其胙且入其家是人非前聖而後愚蓋牽於心而不暇及人耳以一巫用心尚爾況異於是者乎象化牛僧孺象龍禱􅀨三月不應巫病民咨王甚愁儒有言曰王無愁也象之誤也夫龍善化􅀨而時在乎天天使􅀨龍得化不使􅀨龍不得化聖人象龍而救民是乃象其化者也龍之性善學者人之心故象性莫􅀂心而巳使性非心可象則鳴鳩之性均而木刻鳲鳩足以象均邪獬豸之性觸而瑰飾獬豸冠足以象觸邪龍以性善化而龍於化人者衣衮則其象不以土木亦明矣湯是以龍其聦而深無不聞也龍其明而高無不見也言􅀂出爲雲而物仰之有隂智􅀂躍乎淵而物觸之有􅃳天而不􅀨百姓視王爲雨也雖七歲炎炎不聞有咨者而況三月哉移􅀨神司空圖夏滿不􅀨民前後走神所刳羊豕而跪乞者凡三而後得請民大喜且將報祀愚獨以爲惑何者天以神乳育百苗榖必時旣豐然後民相率以勞神之勤於事而祀焉今始恡其施以愁疲民是神怠天之職也必希民之求而遂應是神玩天之權也旣應而俾民輸怨於天歸惠於已是神攘天之德也推怨何以爲義利腥膻之饋何以爲仁怠天下之事何以爲敬蔑是數者何以爲神假曰非吾所得顓然知民之情而不時請於上是亦徒偶於位此愚所以惑也噫天不可終謾民不可乆侮竊爲神危之奈何風􅀨對羅隱風􅀨雪霜天地之所權也山川藪澤􅀑神之所伏也故風􅀨不時則歲有饑饉雪霜不時則人有疾病然後禱山川藪澤以致之則風􅀨雪霜果爲􅀑神所有也明矣得非天之高不可以周理而􅀉之山川地之厚不可以自運而慿之􅀑神茍祭祀不時則饑饉作報應不至則疾病生是􅀑神用天地之權也而風􅀨雪霜爲牛羊之本矣復何歲時爲復何人民爲是以大道不旁出懼其弄也大政不問下懼其偷也夫欲何言浪翁觀化并序元結浪翁山野浪老也聞元子亦浪然在山谷病中能記水石草木蟲豸之化亦來􅀃常所化凡四􅀃有無相化浪翁曰隂陽之氣化爲四時四時形化爲萬物萬物形全是無化有萬物形盡是有化無此有無相化之􅀃有化無浪翁曰人或云我立於東西望萬里目極則無人我兩忘終丗相無此有無有無相化之􅀃無化有浪翁曰人或云我來於南北行萬里至無不有人我兩求終丗相有此無有無有相化之􅀃化相化浪翁曰吾觀化於無也何無不有吾觀化於有也何有不無有無更化日以相化化言何極化言何窮時化元子聞浪翁􅀃化化無窮極因論諭曰翁亦未知時之化也多於此乎曰時焉何化我未之記元子曰於戲時之化也道德爲嗜慾化爲險薄仁義爲貪暴化爲凶亂禮樂爲耽􅁋化爲侈靡政敎爲煩急化爲苛酷翁能記於此乎時之化也夫婦爲溺惑所化化爲犬豕父子爲惽慾所化化爲禽獸兄弟爲猜忌所化化爲讎敵宗戚爲財利所化化爲行路朋友爲丗利所化化爲市兒翁能記於此乎時之化也大臣爲威權所恣忠信化爲姦謀庻官爲禁忌所拘公正化爲邪佞公族爲猜忌所限賢哲化爲庸愚人民爲征賦所傷州里化爲禍邸姦凶爲恩幸所迫厮皁化爲將相翁能記於此乎時之化也山澤化爲井陌或曰盡於草木原野化爲狴犴或曰殫於鳥獸江湖化爲鼎鑊或曰暴於魚鼈祠廟化爲宫寢或曰數於祀禱翁能記於此乎時之化也情性爲風俗所化無不作徂狡詐誑之心聲呼爲風俗所化無不作諂媚僻􅁋之辭顔容爲風俗所化無不作姦邪慼促之色翁能記於此乎丗化浪翁聞元子􅀃時化歎曰吾昔聞丗化可􅀃又異於此昔世之化也天地化爲斧鑕日月化爲豺虎山澤化爲州里草木化爲宗族風􅀨化爲邸舎雪霜化爲衣裘呻吟化爲常聲糞汚化爲􅆝肉一息化爲于歲烏犬化爲君子元子惑之浪翁曰子不聞往昔丗之化也四海之内巷戰門􅃲斷骨腐肉萬里相藉天地非斧鑕也邪人民暗夜盜起求食晝遊則死傷相及日月非豺虎也邪人民相與􅀉身命於絶崖深谷之底始能聲呼動息山澤非州里也邪人民奔走非深林薈叢不能藏蔽草木非宗族也邪人民去鄕國入山海千里一息力盡暫休風雨非邸舎也邪人民相持於死傷之中祼露而行霜雪非衣裘也邪人民勞苦相􅁈瘡痍相痛老弱􅀌獨相苦死亡不相救呻吟非常聲也邪人民多饑餓溝瀆病傷道路糞汚非梁内也邪人民奔亡濳伏戈矛相拂前傷後死免而存者一息非千歲也邪僵王腐􅀸相枕路隅鳥獸讓其骨肉烏犬非君子也邪蠧化陸􅀛􅀩橘之蠧大如小􅃌首􅀒特角身蹙蹙然􅀋蝤蠐而青翳葉仰齧饑􅁞之速不相上下人或棖觸之輙奮角而怒氣色桀驁一旦視之儗然弗食弗動明日復往則蛻爲胡蝶矣力力拘拘其翎未舒䄡黒韝蒼分朱閒黃腹塡而橢堕緌纎且長乆醉方寤羸枝不揚又明日往則􅀝薄風露攀縁草樹聳空翅輕瞥然而去或隱蕙􅂩或留篁端翩旋軒虚颺曵紛拂甚可愛也須􅁷犯蝥網而膠之引絲環􅆞牢􅀂拲桔人雖甚憐不可解而縦矣噫秀其外􅀋有文也嘿其中􅀋有德也不朋而遊􅀋絜也無嗜而食􅀋廉也向使前不知爲橘之蠧後不見觸蝥之網人謂之鈞天帝居而來今復還矣天下大橘也名位大羽化也封略大蕙篁也苟滅德忘公崇浮飾傲榮其外而枯其内害其本而窒其源得不爲大蝥網而膠之乎觀吾之蠧化者可以惕惕蟹志蟹水族之微者其爲蟲也有籍見於禮經載於國語楊雄太玄辭晉春秋勸學等篇考於易象爲介􅀋與􅀛鼈剛其外者皆乾之屬也周公所謂旁行者歟叅於藥錄食䟽蔓延乎小􅀃其智則未聞也唯左氏紀其爲災子雲譏其躁以爲郭索後蚓而巳蟹始窟穴於沮洳中秋冬交必大出江東人云稻之登也率執一穗以朝其魁然後從其所之蚤夜觱沸􅃌江而奔漁者緯簫承其流而障之曰蟹斷鍜斷短其江之道焉爾然後奔紛越軼遯而去者十六七旣入于江則形質䆮大於舊自江復趨于海如江之狀漁者又斷而求之其越軼遯去者又加多焉旣入于海形質益大海人亦異其稱謂矣嗚呼穗而朝其魁不近於義邪捨沮洳之江海自微而務著不近於智邪今之學者始得百家小􅀃而不知孟軻荀揚之道或知之又不汲汲於聖人之言求大中之要何也百家小􅀃沮洳也孟軻荀揚聖人之瀆也六籍者聖人之海也茍不能捨沮洳而求瀆以至于海是人之智反出水蟲下能不悲夫吾是以志其蟹重校正唐文粹卷第四十九
