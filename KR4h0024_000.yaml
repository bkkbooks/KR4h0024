body:
  text: 吳興姚鉉述五代衰微之弊極於晉漢而漸革于周氏我宋勃興始以道德仁義根乎政次以詩書禮樂源乎化三聖繼作曄然文明霸一變至於王王一變至於帝風教逮下將五十年熙熙蒸黎久忘干戈戰伐之事侁侁儒雅盡識聲明文物之容堯典曰文思安安大雅云濟濟多士盛德大業英聲茂實并屆于一代得非崇文重學之明效歟况今歷代墳籍略無亡逸內則有龍圖閣中則有祕書監崇文院之列三館國子監之印羣書雖唐漢之盛無以加此故天下之人始知文有江而學有海識於人而際於天撰述纂録悉有依據由是大中祥符紀號之四祀皇帝祀汾隂后土之月吳興姚鉉集文粹成文粹謂何纂唐賢文章之英粹者也詩之作有雅頌之雍容焉書之興有典誥之憲度焉禮備樂舉則威儀之可觀鏗鏘之可聽也大易定天下之業而兆乎爻象春秋為一王之法而繫於褒貶若是者得非文之純粹而已乎是故志其學者必探其道探其道者必詣其極然後隱而晦之則金渾玉璞君子之道也發而明之則龍飛虎變大人之文也自微言絶響聖道委地屈平宋玉之辭不陷於怨懟則溺于讇惑漢興賈誼始以佐王之道經世之文而求用于文帝絳灌忌才卒罹讒謫其後公孫弘董仲舒朝錯咸以文進或用或升或黜或誅至若嚴助徐樂吾丘壽王司馬長卿輩皆才之雄者也終不得大用但侍從優遊而巳如劉向司馬遷楊子雲東京二班崔蔡之徒皆命世之才垂後代之法張大德業浩然無際至於魏晉文風下衰宋齊以降益以澆薄然其間鼓曹劉之氣焰聳潘陸之風格舒顔謝之淸麗藹何劉之婉雅雖風興或鈌而篇翰可觀至梁昭明太子統始自楚騷終于本朝盡索歷代才士之文築臺而選之得三十卷號曰文選亦一家之竒書也厥後徐庾之輩淫靡相繼下逮隋季咸無取焉有唐三百年用文治天下陳子昻起於庸蜀始振風雅繇是沈宋嗣興李杜傑出六義四始一變至道洎張燕公以輔相之才專撰述之任雄辭逸氣聳動羣聽蘇許公繼以宏麗丕變習俗而後蕭李以二雅之辭本述作常楊以三盤之體演絲綸郁郁之文於是乎在惟韓吏部超卓羣流獨高遂古以二帝三王為根本以六經四教為宗師憑陵轥轢首唱古文遏橫流於昏墊闢正道於夷坦於是柳子厚李元賔李翶皇甫湜又從而和之則我先聖孔子之道炳然懸諸日月故論者以退之之文可繼楊孟斯得之矣至於賈常侍至李補闕翰元容州結獨孤常州及吕衡州溫梁補闕肅權文公德輿劉賔客禹錫白尚書居易元江夏稹皆文之雄傑者歟世謂貞元元和之間辭人咳唾皆成珠玉豈誣也哉今世傳唐代之類集者詩則有唐詩類選英靈間氣極玄又玄等集賦則有甲賦賦選桂香等集率多聲律鮮及古道蓋資新進後生干名求試者之急用爾豈唐賢之文迹兩漢肩三代而反無類次以嗣于文選乎鉉不揆昧懵遍閲羣集耽玩研究掇菁擷華十年于兹始就厥志得古賦樂章歌詩贊頌碑銘文論針議表奏傳録書序凡為一百卷命之曰文粹以類相從各分首第門目止以古雅為命不以雕篆為工故侈言蔓辭率皆不取觀夫羣賢之作也氣包元化理貫六籍雖復造物者固亦不能測研幾而窺沈慮故英辭一發敻出千古琅琅之王聲粲粲之珠光不待泛天風徹海波而盡在耳目於戲李唐一代之文其至乎唐文粹序重校正唐文粹目録吳興姚鉉纂第一卷古賦甲揔三首宫殿聖德二含元殿賦并序李華明堂賦并序李白失道一阿房宫賦杜牧第二卷古賦乙揔二首京都西都賦并表李庾東都賦第三卷古賦丙表附揔三首郊廟進三大禮賦表杜甫朝獻太清宫賦朝享太廟賦有事于南郊賦第四卷古賦丁揔五首符寶一受命寶賦并序梁肅象緯一渾天賦并序楊炯閲武二大獵賦并序李白裴將軍舞劒賦并序喬潭誓師一濟河焚舟賦高邁第五卷古賦戊一首海海潮賦并序及進賦狀盧肇第六卷古賦巳揔一十首名山二華山賦楊敬之霍山賦皮日休華卉草木八牡丹賦舒元輿長樂華賦蘇頲桃華賦皮日休秋蓮賦宋之問荔支賦張九齡瑞橘賦李德𥙿伐櫻桃樹賦蕭頴士𣏌菊賦陸龜蒙第七卷古賦庚揔一十四首鳥獸昆蟲大鵬賦并序李白雕賦并表杜甫白鷴賦并序蕭頴士白鸚鵡賦王維感二鳥賦并序韓愈白羽扇賦并序張九齡玄猿賦并序道士吳筠麈尾賦并序陳子昻由鹿賦并序吕溫蠶賦并序陸龜蒙秋蟲賦并序羅隱蝨賦李商隱後蝨賦并序陸龜蒙蝎賦李商隱第八卷古賦辛揔七首古器三霜鍾賦并序喬潭欹器賦并序李德𥙿砥石賦并序劉禹錫物景二晚晴賦并序杜牧秋聲賦并序劉禹錫決疑二問大鈞賦并序劉禹錫何卜賦第九卷古賦壬揔十首修身一動靜交相養賦并序白居易哀樂愁思八懷忠賦并序歐陽詹泛渭賦并序白居易望賦劉禹錫惜餘春賦李白江上愁心賦張説別知賦韓愈愛而不見賦蕭頴士傷往賦并序劉禹錫夢一夢渴賦何諷第十卷詩甲琴操附揔一百四十六首古今樂章古樂章十九輔樂歌十篇元結輔九夏歌系文九篇皮日休今樂章一百二十六冬至𣏌旻天圎丘八首魏徴等開元十九首張説玄宗封泰山祀天十三首祈榖子南郊三首禇亮享上帝於明堂一首祀上帝于五郊二十首魏徴等祀朝日三首貞觀中作祀夕月三首貞觀中作睿宗登黃地祇於方丘十一首盧從願等玄宗禪社首山祭地祇八首賀知章登太社三首魏徴等享龍池十首姚崇等享太廟五首郭子儀等儀坤廟九首徐彥伯等琴操十首附韓愈第十一卷詩乙揔四十六首楚騷體十一九諷并系述皮日休反招魂辨序悼賈并序效古詩三十五江有楓一篇并序蕭頴士菊榮五章并序有竹一篇并序蟬鳴五章并序宋華涼兩一篇并序蕭頴士虞獲子鹿一篇并序韋應物上古之什輔亡訓傳十三章顧况倬彼我系一首王勃元和聖德詩一首并序韓愈鄆州溪堂詩一首并序漢隄詩一首并序盧肇有所恨二章并序歐陽詹水悠悠二章韓愈第十二卷詩丙揔八十六首功成作樂一七德舞白居易古樂三湘弦怨孟郊箜篌引王昌齡箜篌謡李白感慨六放歌行王昌齡浩歌行白居易緩歌行李頎短歌行李白短歌行張籍善哉行釋貫休興亡四祖龍行韋楚老鄴都引張説永嘉行張籍後魏行王轂幽怨十二湘妃怨陳羽銅雀臺歌劉長卿銅雀妓歐陽詹魏宫詞崔國輔王昭君歌劉長卿王昭君盧昭鄰婕妤怨王維長信宫崔國輔怨詞苦樂相倚曲元稹妾薄命李白白頭吟張籍貞節六列女操孟郊節婦吟張籍織女詞元稹靜女詞孟郊寄衣曲張籍白紵歌愁恨十征婦怨張籍春思李白春别曲張籍古樂府雜怨三首孟郊長干行李白古薄命妾孟郊母别子白居易夜夜曲釋貫休艱危十一蜀道難李白行路難張籍行路難三首李白變行路難王昌齡太行路白居易梁甫吟李白走馬引李賀孟門行崔皓沐浴子李白邊塞三十三將軍行劉希夷將軍行張籍霍將軍崔皓老將行王維鴈門太守行李賀從軍行六首劉長卿塞上曲戌昱塞下曲郎士元塞下曲王季友出塞曲劉灣燕歌行高適燕支行王維隴頭吟隂山道白居易胡無人李白飲馬長城窟釋子蘭關山月張籍古長城吟王翰長城作鮑溶古築城曲五首元稹築城詞張籍築城詞二首陸龜蒙聽董大彈胡笳聲兼語弄寄房給事李頎第十三卷詩丁揔六十六首樂府辭神仙十二步虛詞十首道士吳均步虛詞高駢夢上天元稹俠少十七俠客少年場盧照璘邯鄲少年行鄭錫邯鄲少年行高適少年子李白少年行二首王維少年詞李百藥少年行張籍少年行崔國輔俠客行元稹俠客行李白刺年少李賀古遊俠呈軍中諸將崔皓青樓曲王昌齡劒客賈島壯士吟孟遲結襪子李白行樂十三楚宫行張籍上之回李白陽春歌鼓吹入朝曲白紵詞三首冬白紵元稹相逢行李白古樂府權德輿朝來曲王昌齡將進酒李白將進酒李賀追悼一李夫人白居易愁苦六古别離李端古别離孟郊遊子吟李益遊子吟孟郊苦熱行王轂苦寒吟孟郊鳥獸花卉十三八駿圖白居易天馬歌李白紫騮馬驄馬行杜甫猛虎行李白猛虎行李賀白虎行烏栖曲李白烏夜啼艾如張李賀野田黃雀行李白採蓮曲張籍採蓮曲李白古城道路四石城鄭谷沙路曲李賀沙堤行張籍洛陽陌李白第十四卷之上詩戊揔六十四首古調歌篇一古風古風十一首李白古意三首王績覽古十四首道士吳筠古意二首賀蘭進明古意九首釋貫休詠古李涉感古三首盧同古意賈島效古釋皎然古興吕溫寓興歐陽詹不欺賈島辨士新昌里姚合口號賈島絶句悲歌三首顧況美人陸龜蒙客思楊敬之感事陸龜蒙寓言孟郊傷感九汾隂行李嶠八月五日歌顧況三鄉驛覩玄宗望女几山詩有感劉禹錫江南遇天寶樂叟白居易連昌宫詞元稹感興李涉玉華宫杜甫至壽春公故宅韋應物杜秋娘詩杜牧第十五卷之上詩庚揔五十九首古調歌篇三懷古十二四皓詩李白頴陽東溪懷古崔曙登郭隗臺皇甫松歸沛縣道中晚泊留侯城劉長卿鴻門宴王轂古泉驛張説嚴陵釣臺下作權德輿吳中懷古劉駕故絳行杜頠郢城懷古李百藥題西施浣沙石胡幽貞鄴城懷古孟雲卿懷賢十三君詠三首高適七愛詩六首皮日休陽城驛元稹集會七同徐侍郎重陽宴集獨孤及高軒過李賀郡中諸文士宴集韋應物淮南秋夜呈周侃李嶷夜飲東亭宋之問宴客辭張籍過賈六蘇晉餞送三十送渾將軍出塞高適送郭大夫再使吐蕃張説送張舍人之江東李白送梁輔闕賦得荻花朱長文送周願歸嶺南姚係送韓愈從軍孟郊送王昌齡赴江寧岑參送李十一赴尉臨溪常建送韋起居舅歸嵩陽權德輿送從叔簡孟郊感别從叔簡再東歸送弟郢東歸送姪稱歸山楊衡送李觀韓愈别孟郊送狄宗享王昌齡送孟浩然之廣陵李白送客陳子昻送唐次武元衡送皇甫湜赴舉馬異送張宗原姚合送綦母潛落第還鄉王維送暨道士還玉清李頎淇上别趙仙舟王維送沈秀才下第東歸賈島崔九第欲往南山王維同前裴迪贈别沈四逸人高適留别王維翟興宗送豆盧䇿歸别墅孟郊送栁淳入關第十五卷之下詩辛揔六十七首古調歌篇四行役二十岐路鮑溶秋入關賈馳晨裝行歐陽詹蜀道後期張説蜀中辭韋相公歐陽詹襄陽路逢寒食張説巡邊在河北作奉和左司貟外立春日贈諸公孫逖發太原途中寄所思歐陽詹西還至散關答喬輔闕陳子昻剡溪行朱倣發龍且舟中寄李司倉鄭司戶獨孤及曉發賀知章月夜江行權德輿江行四首江行栁中庸懷寄二十八别郭大元振盧崇道寄侍御從舅權德輿寄李益端公鮑落寄趙七侍御李華題浮雲寺樓寄張郎中杜牧魏州從事寄耿拾遺姚合洪州客舍寄栁博士芳薛業遙和張史君王都督别詩二首韋嗣立留别武陵袁丞王昌齡舟中懷閻士和釋皎然秋山寄陳讜言王昌齡海上寄蕭五獨孤及懷鄭洎孟遲杼山禪居寄吳處士釋皎然宿吉祥寄廬山隱者楊衡春夢岑參贈逺陸龜蒙河梁别馬戴有所思盧同寄逺李白傷悼七答宋主簿兼貽遊舊盧藏用對酒憶賀監三首李白哭玄英方干先生孫郃弔王將軍墓常建國殤孟郊第十六卷之上詩壬揔七十四首古調歌篇五知已九仰答韋司業垂訪五首蕭頴士鄭太守見訪立馬贈别李白攜新文詣張韓途中成賈島喜陳懿老至示豫新製朱畫延康吟賈島交友四審交孟郊答友問白居易北極贈李觀韓愈與馬異結交盧同規誨四示孟郊孟浩然自誡司空圖誡貪釋子蘭杏園即席上同年曹鄴紀贈五讀張曲江詩集釋皎然上河陽李大夫孟郊奉贈張荆州王昌齡詠德上韋撿察歐陽詹贈崔從事鄖孟郊散逸七漁父歌李頎紫溪翁歌陸龜蒙秋醉歌張為襄