  text: 重校正唐文粹卷第二十三
  hash: sha256:a369f7f41c510d09d5f17bfd0b17ff20dbee528c4e11684696802dd66d4b3759
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0024_SBCK_023-1a}
body:
  text: 吳興姚鉉纂贊甲揔六首帝王一唐武宗皇帝真容贊李德𥙿將相功臣四凌煙閣二十二勳臣贊呂溫三賢贊司空圖白題寫真贊裴度張荆州畫贊呂溫庶官一右丞徐公寫真贊獨孤及唐武宗皇帝真容贊并序李德𥙿仁聖文武至神大孝皇帝御極之五載氣應天和德感人心朝廷四方咸一於政風雨時若螽螟歲息銷蓬孛為休氣驅戎狄為懷人北荒堅昆重譯而至厥有窘代慿阻弄兵陸梁韋顧既伐夙沙自縛武功既成休德昭明前古未聞百王莫致之事皆葳㽔於圖諜矣皇上以為大禹敘九疇敬五事豈不曰貌恭則莊視明則正豫欲作繢傳照審其儀形且夫聖人濳心於天以通神明先定其神而萬物理矣昔之訪具茨期姑射在此而巳況乎廣成之戒抱一玄元之去多欲豫所貴道良為是矣豈眩夫係風之言竒彼淖冰之術從偓佺之所珍遺堯舜之令名哉於是圖經素寫良金擬鑑形於止水若凝視於清鏡五彩既彰穆穆煌煌居列仙之館近玄祖之光蓋以昭燕翼之謀顯丕承之德矣臣聞古之至聖必有竒相是黃熊之瑞應於龍體赤精之符協於圖表頎然而長文王所以王天下也體貌多竒漢髙所以威海內也然則繢事之微極於惟肖至於天光睟淸日華明潤非可圖也庶髣佛焉末臣奉詔敢揚言曰唐運中興天授大君軒耀其武堯煥其文北伐檢狁漠朔無氛西伏堅昆稽首稱臣䘲生壷關盜起河汾沈機先物雄斷解紛克定羣慝竟全大勳八表既寧萬機益勤爰命采繢載模天真昆閬仙岑峻極秋旻蓬瀛白日光照清晨涵育如天尊嚴若神輝赫絪緼為龍為雲聖作物覩禎祥以臻宣光乃孕虞熙載甄政建中和金聲玉振太階既平廟器乃陳化下以德持盈以仁四瀆宗海衆星拱辰億萬斯年藻朗日新凌煙閣勳臣贊二十二首并序吕溫我二后受成命撫興運軋坤軸撼乾樞鼓元氣而雷域中騰百川而雨天下雷收雨霽如再開闢蕩焉與太極同功貞觀十七年太宗以功成治定秉為而不有之道讓德于祖考推勞于羣臣念匡濟於艱難感風雲於疇昔思所以攄之無窮乃詔有司擬其形容圖畫於凌煙閣者二十有四人蓋象乎二十四氣之佐天昭勳德也昔者舜以五臣致理周以十亂反正高祖以三傑作漢光武以二十八將中興若夫錯綜勳賢牢籠今古雄四代而高視者其惟聖唐乎至若唐莒公劉渝公之倫探元符建帝圖首戴神堯舉晉陽而活天下此則大禹之拯溺也魏鄭公以致君為巳任諌若不及謇謇左右秉心宣猷此則咎繇之揚言也虞永興糾合羣儒旁求百代明備王禮克諧帝樂使我大國煥乎其有文章此則夷夔之制作也長孫趙公舉大義除二凶安宗廟定社稷以振我丕赫無疆之休此則周公之匡救也英衛受天勇智雄武佐聖鼓行海內麾定四方此則太公之膺揚也房杜玄機朗識並運帷幄神發響效謨成天功此則蕭何之指蹤也子房之決勝也尉遲秦程剛毅木訥氣鎮三軍力崩大敵匹馬孤劒為王前驅此則吳漢之朴忠賈復之雄勇也其餘皆榱棟殊材黼黻異制儔諸古烈罔有慙德皇王之際於斯為盛其始也文為經武為緯智斯作忠斯述其末也大不逼小不遏退者全來者逹控而縱之使自用之推而引之使自盡之不設籠檻以觀遼廓之致不頓韁鎖以極權竒之變執一德而衆力展懸大信而羣情竭高祖聚之以義太宗用之以道高宗終之以仁傳聖萬代享其功利此非盛歟昔陸機袁宏為晉人而歌功於漢魏作者猶或稱之況乎遊聖代觀國光目睨凌煙而頌聲不作某不揣賤劣有斐然之志輒盡所蓄各為讃一章上以見王業之艱難中以明聖賢之相須次以朗前哲之光韻末以聳後人之誠節侯君集張亮負勳跋扈自陷大逆敢沒其名用彰天刑使伐勞懷二者懼春秋之義異姓為後故以河間元王為贊首云河間元王孝恭太極構天本由一氣大人創業資我族類堂堂河間仁勇是經遹駿有聲為唐宗英暴隋天亡羣盜猖狂我伐用張時為哲王武有烈光為爪翼肺腸經綸八方自南徂東晏海澄江平蕭銑輔以祐使父兄帝天下化家為邦用竭爾力寵臻其極言不伐色不德以遜以默柔嘉惟則佐高祖建大績如周旦奭與太宗守大成如漢間平冝君冝王盤石無疆房梁公玄齡梁公先覺龍卧待君長彗流光掃天布新義師雷興公躍其鱗杖策千里來謁帝􅕡婉婉梁公實懿實聰實光實融羽義翼忠若鸞若鴻大風動地儒服從容靜運胸中弛張折衝左右太宗夷屯廓蒙定高祖功功告武成翊開太平我雖忘勞時靡有爭網羅遺賢推轂羣英玉不韜輝蘭無沈馨飛鴻出冥振鷺在庭濟濟多士太宗以寧公無事矣闕衮有輔惟仲山甫經營四方方叔邵虎大邦鈞軸至則委汝間居台輔撝默自處亦莫敢余侮高朗令終嗚呼梁公杜葉公如晦穆穆葉公竒姿粹靈藴元和氣為大國楨乘時恢能唐室大開故人相攜公與房梁公同有匡濟之志也直上太階更為隂陽迭作日月佐明四海贊育萬物王度是欽如玉如金德音愔愔萬有千古永稱房杜如周申甫魏鄭公徴堂堂魏公崇節大志喬幹直聳摩天自致遭風雲時得霸王器一言委質有死無二撫我則后各盡其志嘗事李密隱太子沈浮變通龍戰既息皇建其極俾補衮職其繩則直諤諤嶷嶷危言正色保太宗德弼違替否日月不蝕黜漢霸雜行周王道人或有言秉德不撓與封德彝庭諍禮興樂崇德合道豐保合大和昭明有融起四年中復三代風言出化成神哉厥功尹躬佐商有恥于湯公以其志匡飾聖唐為唐宗臣致唐無疆永式萬邦長孫趙公無忌趙國之先發祥朔土乃祖乃父受天之祜為天下母有子而賢為唐宣輔聖賢同氣千載一覩丕顯趙公允文允武克忠克仁實有大勳高祖受命太宗歸尊翼翼乾乾恪居于藩羣孽亂嗣爭窺神器鴻業將墜公揭大義一匡天地人到于今家受其賜帝將傳聖爰有顧命汝忠汝誠莫與汝京與我聖子守唐太平公相高宗有太宗遺風刑措財豐八荒來同和氣大融妖星襲月禍起中宫公將正之以王帝躬武氏謀位公以力爭力屈羣邪誠阻天聰黜非其尢令問無窮唐莒公儉歲寒隂凝冰雪皚皚有鳥擇木先陽春來誰歟莒公王佐之材間運未開登濳龍臺代萬姓請命與天為媒扶龍而興振起雲雷權輿帝圖經始唐基始覆一簣勃焉巍巍易失者時難知惟幾知幾其神莒公元勳劉渝公政會河出昆崘來潤中夏連山合沓橫擁其派巨靈勃然手擘太華決流東注功並造化粵我聖唐將舉晉陽帝命是將往拯溺干四方亦既載斾亦既秉鉞強凶當路王威高君雅拒不得發渝公慷慨感義激節用竒制變大事立決雷奮霆越天衢八達則莫我敢遏如巨靈破山河勢始豁赫矣渝公與神齊烈迹如仙掌炯炯不滅李衛公靖有隋之末羣盜熾爇帝怒震發五星從太白煥照參野將有聖人兵定天下金精下射猛毅感激李公矯矯從此奮迹躍于中原王者則獲壯士不死初公不利於我帝欲戮之壯其言而免壯士公自稱唐威載赫帝曰汝傑致天之罰手付金鉞俾往式遏不庭則殺如飇發發如火烈烈摧枯爍雪應鼓如截逺若荆巫險若江湖強若胸奴莫不率從莫不震恭車書混同氛䘲蕩空衛侯之功功則維何威明惠和䇿勇駕智長驅仁義仁義曠蕩帝王之將萬古曷瞻鐡山巉巉詔築墳闕象鐡山積石山李英公績橫流莫極大亂無象英公傑出應運為將與楚楚霸與漢漢王天時人事隨我所向長蛇縱蠚王充東據河洛婪婪封豕建德來濟同惡號吼連聲如雷妒霆萬里震驚時維英公諒我太宗斬豕以鉞取蛇于穴羣穢殄滅乃定九鼎乃開明堂奄有大邦金甲同光告成于王太宗獻捷于髙祖與績俱擐金甲為上下將皇業用昌帝命英公北伐獫狁雷鼓殷殷旄頭幾殞掃雲黑山布唐陽春五原草緑不見南牧島夷未庭天子親征其鋒維英莫拒莫抗是震是蕩破東海浪天下既和解鞍投戈衮服委他華髮皤皤終始三朝無玷可磨劉夔公弘基夔公崢嶸金虎之精應時而生與運俱行揔帝元戎震唐天聲瞋目張膽前無金城别建龍節中分虎旅啓行萬里乘氣一鼓劒揮雷霆斾卷風雨先馳咸陽鎮定天府天府既定唐集大命入揚王庭出權兵柄薄伐獫狁朔風不競徂征島夷東海如鏡義始忠卒元勳之盛長孫邳公順德泰山未明雷鬱幽崖日觀赫開舒為丹霞昔我太宗賢傑濳屯帝出于震爛其盈門邳公炳焉實耀其間功參造物謀協先天執殳前驅捧轂南轅以勞以舊佐命之元虞永興公世南英英永興華德素行以文富國以道佐命天下既定為唐儒宗東觀石渠始生古風乘精繹思假道書圃驅馳百代出入三古問羲黃心聽堯舜語歸來帝側獻可替否帝告永興與鴻碩之倫闡六籍三墳建樂章禮文先師是宗於廓辟雍辟雍沈沈天子所臨或弦或歌講古述今其從八千纓辨森森獩貃羌髳或詠德音羽林孤兒亦垂靑襟洋洋聲教無逺不洎日月所照皆成文字鬱開古始掃蕩澆季實我羣儒成太宗之志英英永興冝曰文懿尉遲鄂公敬德侁侁鄂公百鍊龍泉沈翳未宣氣衝斗間佩非其人初事宋金剛躍入大川神武獲焉提之上天天地之內指麾無前熊威虎力隱若敵國剛毅木訥安劉必勃武德之屯手拔禍根掃除氛昏捧出日月耀于天門功成名遂高謝戎事烈烈猛志化為和氣深地高堂頥性保命屑瓊飲露靜奏淸商商為臣勵事君鄂公之志之仁貞觀後公不交人事常鍊氣服食奏淸商樂以自奉蕭宋公瑀隋氏不君忠賢莫用桐生朝陽有集惟鳯捨彼頽厦鬱為新棟路車玄衮開國有宋武德之暮羣孽內蠧巍巍宋公聳節高步不吐不茹不來不去屹􆀠中立為天一柱從容而言社稷遂安持誠秉忠光輔二君激濁揚淸欲人如身道至廣莫我敢羣境至大不容纎塵雪山倚空冰壑照人耿介絶倫為唐貞臣張郯公公謹有倬郯公仡仡而貞侁侁而仁實太宗信臣有宗守藩內難未夷圖之則安捨之則危帝臨安危機以懼以疑以蓍為先知是筮是咨郯公嶷然排闥折蓍抗憤正詞用人事定天意身為元龜不知不識順義之則以定社稷郯公之力公之云亡帝念其勤若痛在身天懷發中哭不避辰君臣之間敻古未聞屈突蔣公通五運相推土火革期隋化為唐忠臣不知猶驅義徒奮拒王師指心誓天摩頸待時人歸有德四海皆叛春日滿川流冰未泮亡家徇國方寸不亂力屈勢窮排空落翰東南慟哭聲盡魂斷仗忠就擒萬國瞻漢帝曰爾通古之烈士孝于其親誰不欲子俾侯于蔣授以師紀感恩不死宣力如彼佐唐扶隋名教之美高申公士廉維嶽降神佐唐生申忠貞自天孝友如春德為邦基仁厚人倫肅肅雍雍真王者臣慶因歸妹光延天配文懿皇后公之同出也婚媾之中雲龍濳會建公南海廓我無外諒我撥亂弼文開泰逖彼庸蜀荐鍾澆季文翁之化若掃于地申公攸徂有教無類父子兄弟望風相愧勃興儒雅大復禮義西南頌聲到今不墜名登元勳理冠羣吏全材大器於鑠厥懿殷鄖公開山溫溫殷公初若懦夫銅印試吏褒衣為儒大風驅雲忽與之俱遭逢真宰參造化謨天地既闢厥功有赫從王龔行佐帝光宅逺展驥足高揮鳳翮以永終譽垂于竹帛秦胡公叔寶洛汭之役龍戰未決我師與王世充陳于九曲秦公應變臨陳電拔銑氣盡來我盈彼竭成敗反掌存亡奄忽虎來風壯鼇轉山沒遂作心膂爰從討伐崩圍陷陳火迸冰裂翕如鶚聲縱若鯨突功成國定萬古壯骨程盧公知節盧公倬然動軼幾先轉禍為福與秦胡公降于九曲攀龍上天繽翻鵬翼積風乃聳桓桓將軍大敵則勇雷崩山谷貔虎頓伏飇倒溟波鯨鯢蹉跎見危而進當死不讓干城三朝身老氣壯假褒公志玄褒公虎臣先運而臻謁帝太原許唐與身擁劒駕氣騰風躍雲積忠纍仁光有厥勳建旄北伐細柳宵屯風謐霜凝嚴扃達晨天子之使駐車軍門軍屯肅章乃外壁門以夜不納制使安衆秉威此真將軍侁侁桓桓克壯有聞許譙公紹羣動相食血流中原譙公夷陵豺虎為鄰列境連城火炎煙昏皎其一邦如玉不焚三光忽開萬象皆新誰有天下平生故人公與高祖有舊引忠歸誠豹變蠖伸金石之契移為君臣奕奕煌煌為龍為光元戎啓行大斾央央式遏大江奄征南方恩斯勤斯兩不可忘三賢贊并序司空圖隋大業間房公李公魏公同師文中子嘗謂其徒曰玄齡也志而密靖也惠而斷徴也直而遂俾其遭時致力必濟謨庸厥後果然冝有贊激云三賢志同夙尚儒風以植公忠出遇太宗諷議從容謀厥羣雄君勞臣惕荒夷阻闢百千年社稷自題寫真贊裴度爾才不長爾貌不揚胡為將胡為相一片靈臺丹靑莫狀張荆州畫贊并序吕溫中書令始興文獻公有唐綆亮之臣也開元二十二年玄宗春秋高矣謂太平自致頗易天下綜核稍怠推納寖廣若君子小人摩肩于朝直聲遂寢邪氣始勝中興之業衰焉公於是以生人為身社稷自任抗危言而無所避秉大節而不可奪小必諌大必諍攀帝檻曆天階犯雷霆之威不霽不止日月幾蝕郤為分明虎而冠之不敢猛視羣賢倚賴天下仰望凜凜乎千載之望矣不虞天將啓幽薊之禍俾姦臣乘舋以速致戎詐成讒勝聖不能保褫我公衮置于侯服身雖逺而諌愈切道既塞而誠彌堅憂而不怨終老南國於戲功業見乎變而其變有二在否則通在泰則窮開元初天子新出艱難久憤荒政樂與羣下勵精致理於是乎有否極之變姚宋坐而乘之舉為時要動中上急天光照身宇宙在手勢若舟楫相得當洪流而鼓迅風崇朝千里不足怪也開元末天子倦于勤而安其安高視穆淸霈然大滿於是乎有泰極之變荆州起而扶之舉為時害動咈上欲日與讒黨抗行于交戟之中勢若微陽戰隂衝密雲而吐丹氣欻耀而滅又何難乎所痛者逢一時事一聖踐其迹執其柄而有可有不可有成有不成況乎差池草茅沈落光耀者復何言哉復何言哉曹溪沙門靈徹雖脫離世務而猶好正直攜其圖像因以示余覩而感之仍作贊曰唐有棟臣往矣其邈世傳遺像以覺後學德容恢異天骨峻擢波澄東溟日照泰嶽具瞻崇崇起敬起忠貌與神會凜然生風氣藴逆鱗色形匪躬當時曲直如在胸中鯤鱗初脫激海以化羊角中頽摩天而下無喜無愠亦如斯畫嗚呼為臣警爾夙夜尚書左丞徐公寫真圖贊并序獨孤及侍御史韓公至淸以學藝書畫之美聞于天下辛丑歲三月以王事靡盬館于豫章與前尚書右丞徐公同舍於惠明寺之淨室嘗以暇日裂素灑翰畫徐公之貌陳於公之座隅而美目方口和氣秀骨毫釐無差若分形於鏡入自外者或欲擎跽揖讓俯僂拜謁不知其畫也衆君子嗟歎之不足則言以讃其美某亦繼唱于後哲匠運思天姿是具假之筆精實以神遇居然成象豁若披霧瞻仰神鋒如窺武庫婉婉高識昂昂獨步絶頂孤松空波白鷺不犯之色匪躬之故孰知其化亦在毫素重校正唐文粹卷第二十三
