front:
  text: 興利二
  hash: sha256:da7bf2034ed39aa27117e9375e73059860714693d353a152cd58def1377a602b
body:
  text: 宣州南陵縣大農陂記韋瓘鹽池記梁肅卜勝三東山記張説司徒岐國公杜城郊居記權徳輿君陽遯叟山居記陸希聲館舍一廬州同食館記陳鴻橋梁一汾河義橋記崔祐甫井一義井記邵真宣州南陵縣大農陂記韋瓘宣部支邑十城而南陵處劇葢由庶民囂豪物産多狀山川鬬錯風俗詭浮故理束則民潰政放則民怠俱不得其極自非肅㢘和敏措動守中則莫至良能况功利及物邪皇帝四年今地官侍郎盧公觀察宣部精心厚下重難邑長乃以寧國令順陽范君假南陵印為大夫於是肅以檢姦廉以約身和以納民敏以應物物不夭落民得休泰盧公嘗曰時或爽候雲龍遁逃膏澤翔枯物不遂液吾人其瘁乎下令邑中有能修復陂塘積水防患者終懋厥功先時縣有廢陂曰大震積嵗不理荒梗幽扈邱隰遁形空規殘狀非鄉黨之夀耋不可欵識輿人飛語他邑病能訾訾囂囂波翻風合范君獨判於心不畏騰口曰利於人也使吾獲戾而罹悔真吾心也且黔愚皆苦於始作而泰於成功况吾君侯明吾天子聖尚何懼哉乃召鄉老里正尹而計之具畚挶列綆鍤筥礫礱堅披材輦壤日必巡丈周察勢便仁以撫馴恱以附來法以督姦勤以勸勞於是雲動雷行斬莽闢蕪撥腐曝淤培髙徹卑不知形疲不憚苦骨不殘民力不費金刀潜軼化工事於農隙三旬而畢不戮一人其始也驅江波六十里活活下來闢荒梗數萬畆汪汪虗明疊石構嶺縱三百步龍蟠虎鬬横殺衝波泄流引洫臂發三港支分脉散澤入大田厥功既成乃風雨暴鬬洄復換晨虺虺沸㑹似聞搆作及乎雨斬雲除則沙洲突出力捍嶺下若自開闢之初信為神物所相雖使江河合災驚濤懐山大浸崩驅暴猛來敵亦不能軼峻防而侵厚趾斯乃天賛其功豈非仁深於物乎其或火雲爇天旱魃為虐歊蒸癉怒蛟龍逭誅而翠㶑摇岸澄瀾洗月溶溶浩浩獨落天光順勢導流猶潤百里則貫畦浮塍卒嵗之溉千頃豈為多哉其細也孕鱗甲之族育鳬雁之羣羅生菰蒲蔓合菱藻漁父舟人浩歌揚檝厚生之物永永不極斯功也可以灼當世而芳千古矣昔者西門豹治鄴召公治上蔡而史氏書美顯白良能以其因水茂功利澤及物者也則大農傑跡功符天作可以論古對能豈有愧乎范君尋遷御史後三年吏民益慕而願表尤功今連率范公以文行徳噐挺為時賢爰領宣部仁義明舉其下聳善常推至公邑人三請於公乃曰他人有善惟恐不聞况伯氏功利如是吾豈詭故哉乃從之邑長李君久以材能𢎞張其化吏民甚安之追論大農盛績因民之心以成其善志亦春秋之事也鄉將石定録事丁宗耆夀戴誠佐史章佾或叅其議或督其事洎百姓朱綸李縱田邱程𦙍等若干人咸請予為記云鹽池記梁肅黄河自崑崙山東㑹溟漲九折迴互鹽泉各一儒者書以為海目則郇瑕氏之地瀆流其長觀乎北浴陵阜南瀕山麓湛湛煙碧浩無春冬蒸騰雲霓出入日月亦云廣矣雖吞噏坰隧代増淳鹵而利倍農穡有殷家邦貿惟從山湧不加海交兩都之軌達延萬賈之資貨是人不厭也當武后聖政務述省方鳴鑾載臨流潦旋敗洎皇明道發澤漸殊垠天之既啓鹽乃旋復非夫蟠虯神應坤資靈孕亦曷能旌昏明籌負勝矣帝所宜念賁然來思分天牧以涖擇藩佐而貳賢能鮮墜于事則其𦙍字通閉閎扼拓磯之左隅鄰大邑之東部崇府庫嵗望乎儲蓄樞管鍵夕俟乎閉蔵兹乃慮終於始也邦貴康食戒之克勤人非忘勞道在恱使大命日下巡功嵗移廣岸砥平而可礪修畦綺分以如織是時也春光奪炎氣興洪溝浚白波騰或滀或汨以泙以漰狀雲洩而雨駭或花明而雪凝京坻藴崇豆區嘉量𨽻户徴算鹽人揭書民無不供先薄稅以從賦君孰與足逺黎庶而必分固非擅權利貴貨易土登陸而雷軿流日聚水而雲艫撃星律有變給用無絶傳曰山澤林鹽國之寶也兹其是焉若周物揆情易人推類施之求報大道之𤣥徳也明則啓祚聖人之知變也降人納汚明君之蔵垢也羮餗調膳賢人之入用也包四美而世濟資百工而國貞將以樹善永年非石無以紀垂裕裔胄非文無以揚則我晉寶達於萬方也東山記張説兵部尚書同中書門下三品修文館大學士韋公體含真静思叶幽曠雖翊亮廊廟而􅃡懐林藪東山之曲有别業焉嵐氣入野榛煙出谷石潭竹岸松齋藥畹虹泉電射雲木虚吟惚恍疑夢間關忘術兹所謂邱壑䕫龍衣冠巢許幸温泉之嵗也皇上聞而賞之迺命掌舎設帟金吾劃次太官載酒奉常抱樂停輿輦於青靄佇翬䄖於紫氛百神朝於谷口千官飲乎池上緹騎環山朱斾焰野縱觀空巷途歌傳壑是日即席拜公逍遥公名其居曰清虗原幽棲谷景移樂極天子賦詩王后帝女宫嬪邦媛歌焉和焉以寵徳也加以中宫敦序謂我諸兄引内子於重幄見兒童於行殿家人之禮優棠棣之詩作於是實其筐筥下以昭忠信之獻賁其束帛上以示慈恵之恩朝野歡并君臣義洽夫飛翠華歴茨嶺至道之主也紆紫綬期赤松素履之輔也千載一時難乎此遇故兩曜合舍衆星聚徳雅道光華髙風允塞寒谷煦景竅崖潤色猗歟盛事振古未有篆之𤣥石貽代厥後司徒岐國公杜城郊居記權徳輿司徒岐國公以盛徳相三朝以大中敷五教帝載叶龢太階齊平既致用於方内亦宅心於事外神京善地啓夏南出凡十有六里而仁智之居在焉縈迴巖巘左右勝勢徑術逶迤於木杪臺亭􅑬嵼於山腹下崇岡冐青蒼步履平夷以至于堂皇四敞賔榻中容宴豆孤齋閒館幽槩隨之乃開洞穴以導泉脉其流泠泠或决或渟激而抔行瀑為玉聲初䝉於山下終匯於池際白波淪漣繚以方塘輕艫緩棹㳂洄上下見煙霞澄霽之狀魚鳥飛沈之適濯于潺湲風于碧鮮紅葩火燃素英雪翻芊緜葱蒨杳窱迴合含虚籟以四達遡清輝而交映故其休沐燕息盍簪投轄則有鳴佩拖紳宗工雋人金閨玉堂之賔淑姿修態迴風遏雲之藝流光含睇中飲笑抃交歡擊節不知公相之貴適其適故也易坤之說曰君子以厚徳載物詩曰愷悌君子求福不回惟公以徳受福故光明昌大每温室宴見闕人尊禮而不名故其代天工㫁國論卓爾以冠羣后暨夫暇日之戾止於斯也則暢天理棲顥氣翛然以遺萬物其無方歟其不器歟昔子房赤松之遊且非代教安石東山之賞僻在下國豈若公宻賛化育内諧恬曠如春之仁如樂之和以君臣之交感兼動静之極摰從古已還無公比焉公之華宗自漢建平侯徙杜陵三守本封幾乎千祀故城南墟里多以杜為名逮今郊居不忘厥初又以見積厚流澤此焉回復且公之心無町畦夀若岡陵昭融烜赫未始有極徳輿謬陪衆君子升公之堂嘉招盛集靡間弦晦以衆美之不可以不紀也承命遽書刻於巖石云君陽遁叟山居記陸希聲遁叟以斯世方亂遺榮於朝築室陽羨之南而遁跡焉地當君山之陽東谿之上古謂之湖湫渚遁叟既以名自命又名其山曰頥山谿曰䝉谿將以頥養䝉昧也在易頥之象艮為山山下有震震為雷為龍頥山之下東走震澤震雷魚龍之所萃毓有頥象焉䝉之象亦艮為山山下有坎坎為水為險頥山之下泉流于險而逹于大谿有䝉象焉一旦遁叟觴谿山之神於庭酌而飲頥山曰吾之所以命夫山之為頥者朂子以養也子其養雲雨以潤物養霧露以生物養風霆以長物養雪霜以肅物養巨材以充棟宇養小材以為蒸薪養茅菅以為茨藉養竹箭以為噐用養百果以充口腹養百藥以蠲札瘥養昆蟲使咸樂其生養鳥獸使各遂其性噫無或養妖雲悖雨以傷良稼養苦霧淫露以澤惡植養疾風迅霆以摧槁朽養惨霜虐雪以殺根荄擁腫之朴不為榦材養鈎棘之蘖不中樵㸑養蔓延之藟以困條柯養蟠梗之根以固膏土養弗食之實以蕃庶生養雜毒之藥以中函氣養蟒虺蜂蜴以䕶巢窟養豺狼梟獍以害羣類維山有神子其飲之無虧爾名而窽爾實又酌而飲䝉谿曰吾所以命夫谿之為䝉者朂子以决也子其决於夷壤以發其源决於塞埴以通其流决於腴畆以施其潤决於涸澤以溥其恵决於廣陂使介鱗蕃育决於巨浸使虯龍變化噫無或决於險阻以資其悍激决於林藪以縱其墊溺决於舄鹵以嗇其施决於池籞以専其利决於甽竇使黽蟹為菑决於沮洳使鼃黽得志維谿有神子其飲之無喪爾名而浮爾實於是酌而自飲之吾之所以命是山也必將有所養也命是谿也亦將有所决也吾將養吾志於道而不希於世養吾行於徳而不眩於俗養吾浩然之氣以合自然之英養吾誠明之意以入清明之頥又將决吾心於仁義使不違决吾志於中正使不過决吾身於天命使不憂决吾跡於遁世使無悶如此而已遂與山谿揖讓竭吾歡而罷弁且歌曰山乎谿乎吾之心乎醒乎醉乎吾與汝叅乎廬州同食館記陳鴻合肥郡城南門東上曰同食館梁柱朽蠧軒户欹傾斷􅀈委階椽落棟折風雨雪霜賔不可宿太守陽平路君刺郡之明年冬十月嵗向熟民且閒陶瓦於原伐木于山磨舊礎築新墉迺豐賓堂迺峩前軒怒桷虯虯層櫨牙牙中回洞深髙簷騰掀階閒容揖讓闕閒容賔盤柱閒容樂工屛閒容將吏左右為寢室更衣之所朱户素壁潔而不華東西廂􅃨廊直澍又西開下閤作饔舎廐屋宏大中敞作南門容旌旗駟馬北上作丁字亭亭北列朱檻面城墉其下淤溝開導通水因古岸植竹樹為風月宴遊地東南自㑹稽朱方宣城揚州西達蔡汝陸行抵京師江淮牧守三臺郎吏出入多逰郡道是館成大賔小賔皆有次舎開元中江淮間人走崤函合肥夀春為中路大歴末蔡人為賊是道中廢元和中蔡州平二京路復出於廬西江自白沙𤓰步至於大梁斗門堰埭鹽鐵稅緡諸侯𣙜利駢指于河故衣冠商旅率皆直蔡㑹洛道路不茀賔至授館亦諸侯之事路君以家行文學知於朋友以端方沈黙官御史府以詳明典故為尚書郎以通知政術為合肥郡太守質平訛心風俗丕變民知敬道吏不敢欺先時郡米數萬石輸揚州軸轤相繼出巢湖入大江嵗為風波沈溺者半迺於湖東北岸橐臯里作廥廩三十九間州東二邑人米輸於此由申港出新婦江至白沙人不勞水無害復他邑館舍次于同食無私利人人皆樂成昔左邱明傳經因事書事鴻因蔡州道及諸侯之稅因同食館及路君之政亦春秋之㫖傳曰自廬已徃賑廩同食大和三年太嵗己酉正月壬午朔二十日辛丑記汾河義橋記崔祐甫絳人有成橋于稷山縣南汾河水上入境稱曰孝子詢之三十喪父母五十猶縗麻故其鄉黨捨氏不名貴之也初兹縣有具舟之役鄰邑有官修之梁自太原西河上黨平陽至於絳達於雍繇卒迫程賈人射利濟舟為㨗渡口如肆孝子川上喟然歎曰夫來者如斯其可勝記欲速不逹式在兹乎見義不為非勇也臨難不濟非義也迺願棄家乞諸他郡枯槁籃縷日恒嵗積自阿闗而東陶唐儉風食貨艱難閭里􅄶小率令逺驟馳邇饋飴耆耋喻美於編户丁男捨耒而攻木義聲感也汾流湯湯河滸牽射隤沙徙岸呀呷轉騰畚築於激射之旁根柱於沸渭之下是慮是圖功就其十八九矣其年秋七月天作淫雨湍悍襄陵噫大水不仁前功蕩矣邑老鄉人涕泗弔之曰力竭於子天不恤是而已矣顧而不應且有後圗徴詩人之嘉謀㕘作者之逺慮洩索辮蔑縶舟戾航白露下而謀始止於凌澌杜春氷解而興功止於水潦降一夫不可奪志三年其有成功廣可方軌平可轉轂去其飾成無丹艧取其固勢異虹蜺僉義于孝子之功也故曰義橋昔周王以懿戚封建吳札美盛徳遺人西臨孟津北對姑射山河風土其肯徒然所以義表顓門功烈鄰境難其一善矧乃兼之由是縣人志之于石義井記邵真義以發衷形外昭施物也井以下汲上導彰濟人也河間公鑿井於城垣之次陽門通莊之右偏署曰義正哉導之深源經之善利庇彼邃宇逹於交衢鐡其瓶以永不羸石其甃以給無泥飛輪周散泄竇前注泙而平之隨用不私主發生以流潤當赫曦以伏炎在摇落而激清抵凝沍而不閉環四序以其恵俾憧憧者知飲濯所向焉蔑燠暍之虞濟煩乏之艱昏懵者得以濤盪瘵痗者由之蠲愈滌汰氛坌沃洒蒸灼淡然下攻與地配久化囂闇為閒敞鄰梵宫之清净修廊對開連樓鬱峙嘯貞侣以宴息速嘉客以盥潄指心而授應日而就彼豐福吉禄繁祉崇慶欲不萃於河間之門得乎故北寺司刑上卿也西臺専席中丞也戎府佐政司馬也叅貳外閫顯榮當朝騫騫青冥前視萬里鑿井為濟川之漸斵輪為秉軸之兆可轉眄而待矣公才蔚量碩質貞氣淳名膺王府心拂塵累料物以經逺恤人以遂誠迴俸節財蕆事彰義將獻祉于大君貢休于元戎歸夀于髙堂三事體大公之𢎞誓乃戒司翰者書實刋記揭于井外大歴六年三月記唐文粹巻七十五欽定四庫全書唐文粹巻七十六宋姚鉉編
