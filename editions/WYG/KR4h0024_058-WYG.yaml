  text: 鉉編
  hash: sha256:7bbf6589c1370d76cda4d0216a0d947939e0da39d5486060d257d0515cbf99d7
body:
  text: 碑十總七首庶官四唐刑部尚書致仕白居易神道碑李商隠唐吏部侍郎奚陟神道碑劉禹錫唐左拾遺翰林學士李白新墓碑范傳正唐吏部郎中高都公楊仲宣碑席豫牧守三唐常州刺史獨孤及神道碑崔祐甫唐饒州刺史吴丹神道碑白居易唐和州刺史張擇神道碑唐刑部尚書致仕贈尚書右僕射太原白公墓碑銘并序李商隠公以致仕刑部尚書年七十五㑹昌六年八月薨東都贈右僕射十一月遂葬龍門子景受大中三年自潁陽尉典治集賢御書侍太夫人𢎞農郡君楊氏來京師胖胖兢兢奉公之遺畏不克既乃件右功世以命其客取文刻碑文曰公字樂天諱居易前進士避祖諱選書判㧞萃注秘省校書元年對憲宗詔䇿語切不得為諌官𥙷盭厔尉明年試進士取故蕭遂州澣為第一事畢怗集賢校理月中詔由右銀臺門入翰林院試文五篇明日以所試制加叚佑兵部尚書領涇州遂為學士右拾遺滿将擬官請椽京兆以助供養授户曹時上愛兵㐮陽荆州入䟽獻物在約束外公密詆二帥且曰非善良後雖與􅌠相不猒入聲祸其後禮官竟以多殺不辜謚于頔為厲李師古襲父事逆務作項領以謾儕曹上錢六百萬贖文貞故第以與魏氏公又言文貞第正堂用太宗殿材魏氏歲臘鋪席祭其先人今雖窮後當有賢即朝廷覆一瓦魏氏有分彼安肯入賊所贖第邪上由是賜錢直劵以居其孫在職三年每讌見多前笏留上輦是否意詔湔剔抉摩望及少年見天下無一事五年㑹憂掩坎廬墓七年以左賛善大夫箸吉武相遇盜殊絶賊棄刀天街日比午長安中盡知公以次紙為䟽言元衡死状不得報即貶江州移忠州刺史穆宗用為司門員外四月知制誥加秩主客真守中書舍人敘緋受㫖起田孝公代恒陽孝公行贈錢五百萬拒不内燕趙相殺不已公又上䟽列言河朔畔岸復不報又貶杭州既至築提扞江分殺水孔道用肥見田發故鄴侯泌五井渟儲甘清以變飲食循錢塘上下民迎禱祠神伴侶歌舞徙右庶子出蘓州授祕書監換服色遷刑部侍郎乞官分司得太子賔客除河南尹復為舊官進階開國九年除同州不上改太子少傅申百日假又二歲得所薨官白氏由楚入秦秦自不直杜郵事封子仲太原以有其後祖棊鞏縣令考季庚㐮州别駕贈太保一女妻譚氏始公生七月能展書指之無二字横縱不誤既長與弟行簡俱有名故李刑部建庾左丞敬休友最善居家以户小飲薄酒朔望晦輒不肉食携鄧同韋楚白服遊人間姓名過海流入雞林日南有文字國為中書舍人三日如建中詔書上鄭公覃目代後為相稱質直文宗時文貞公果有孫起使下數歲至諫議大夫賢可任為今上御史中丞他日景受甞跪曰大人居翰林六同列五且為相獨白氏亡有公笑曰汝少以待其曽祖弟今右㒒射平章事敏中果相天子復憲宗所欲得開七關句絶城守四州以集巨伐仲冬南至備宰相儀物擎跪齋栗給事寡嫂永寧里中有兄弟家指嚮徤慕以信公知人集七十五巻元相為序系曰公之世先用談説聞肅代代􅄖布蹤河南隂徳未校公有弟昆本跋不摇乃果敷舒匪骼匪臑噫殦介其醇腴千鄉洎邦取用不窮天子見之層陛玉堂徴徴其中上汰唐禹帝為輦留續緒襞縷歳終當遷户曹是取􅁮白其華㬭不㾗緇上聲用從棄遣至道天子疇誰與伍率中道上納筆懾麾綽三郡理既去刑部倐東其居大尹河南翦其暴逋君有三輔臣有田􅅕臣衰君强謝不堪守翊翊伸伸君子之文不􅆫不怒惟君子武君子既貞兩有其矩孰永厥家曽祖之弟坤柄巽繩以就大計匪哲則知亦有教詔益褒其收揠莠而導刻詩於碑以報百世公老於東遂葬其地傷子辭附𢎞農楊氏予有令子儉衣削食以紀先功志刋貞石彼蒼不遺俾善莫隆今予建立痛寃無窮唐尚書吏部侍郎贈司空奚公神道碑銘并序劉禹錫嗚呼有唐清臣尚書吏部侍郎奚公貞元十五年十月甲子薨于位詔贈禮部尚書太常考行諡曰某是歳臈月丁酉葬于萬安縣之某原後三十有四年子為諸侯為大夫門户有煒於是門下生琢石紀徳揭于新阡云公諱陟字殷衡其先在夏為車正以功封于薛下古以降為譙郡人或因仕適楚復之秦今為京兆人隋唐之際再世以明經為博士家有賜書曽祖簡亦以文學為太子司議郎大父乾繹仕至光州刺史烈考諱某有道而尚晦終徐州司功叅軍贈和州刺史由子貴也天以大運生萬物而以正氣鍾賢人至和來宅其徳乃具公實有焉㓜而擢陵苕之秀長而成清廟之器羣倫月旦咸以第一及從鄉賦洎昇名太常果居上第明年詔郡國徴賢良設四科以盡林公居文詞清䴡之目授𢎞文館校書郎時徳宗新即位聲烜虜庭西戎畏威㡳貢内附詔諫議大夫崔河圖持節即虜帳以報之使臣欲盛其賔寮以自大遂嘿表公為介授大理評事除書到門公方為人子不敢許以逺稱病弗果行歸寕夀春養志盡敬丞相楊炎勇于用才擢公為左拾遺奉安輿而西未幾再集荼蓼居從後䘮将闋是歲建中四年京師急變黄屋順動狩于巴梁公徒行間道以歸王所既中月而詔授起居郎充翰林學士創鉅愈遟病不拜職改太子司議郎從大駕迴入尚書為司金元士且㕘推筦之務有頃持愍冊宣恩于蘓門将行錫銀朱干青蒲上復命稱㫖轉吏部員外郎是曹在南官為眉目在選士為司命公執直筆閱簿書紛挐盤錯一瞬而剖時文曷缺左右丞都曹差重遂轉左司郎中尋遷中書舍人執事者繫公識精以斟酌大政非獨用文飾也㑹江淮間民被水禍上愍焉特命公宣撫之許以便宜及物赤車所至如東風變枯條其利疾復奏咸可轉刑部侍郎時主計臣延齡以險刻貴倖而與京兆尹相惡以危事中之坐譴已又逮繫其吏峻繩之事下司寇主奏議者欲文致而甘心焉公侃然持平挫彼嶽嶽君子聞之善其知道不􅀻刑曹既清以餘刄兼領選事居一年授權知吏部侍郎又一年即真是秩言能審官者本朝有裴馬盧李四君子物論以公嫓焉時得疾發癕有國醫方直禁中上促遣如第且飭之曰某賢臣也悉術以治之及有司以不起聞震悼加等娶瑯瑘王氏石泉公之曽孫友壻皆一時彦士長子某蚤不禄第二子敬則歴太僕少卿今為濮州刺史兼御史中丞賜金紫以連最就加貴秩俾視九卿第三子敬𤣥以詞藝似續登文科歴左𥙷闕今為尚書刑部郎中第四子炅舉進士最小子咸砥礪纂修宜為名公家子其邁徳垂裕之光乎公少以名器自任及顯逹急於推賢視其所舉則在西省薦􅁠丞相由右掖掌訓辭在中銓表楊僕射由地曹綜吏部二公後為天下偉人凡執文章􅁠衡以揣量多士一入中禁考䇿詞三在天官第章句披沙剖璞由我而顯者落落然居多推是風鑒移于大冶則鎔範之内無非祥金嗟乎天不遐其福而孤民望使由庚之什不作於貞元中惜也􅀄公既終詔贈大宗伯後以第三子在郎位被霈澤再追褒至司空故昔之葬儀用常伯而今之碑用三公云銘曰仁麟智龍為瑞一辰未若君子瑞于人倫惟唐徳宗道類漢宣督責繩下風稜言言公丁斯時籍在雋賢從難表節執羈而還帝曰汝器黄流瑟然可為大僚左右化源乃飾王度乃馳輶軒既幹册柄亦操吏權陽和熈熈貯在顔間守法持正嶷如秋山大不侵王倖臣畏仗鳳鳴祥烟梟噪低跧帝方倚用天不假年公寐無寤其名愈逺門人逹者赤舄𤣥衮公居甚卑其徳愈尊兩子朝服駢驅朱輪佳城何在胄貴之里螭首龜趺徳輝是紀嗚呼後人下拜干此唐左拾遺翰林學士李公新墓碑銘并序范傳正騏驥筋力成意在萬里外歴塊一蹶斃於空谷唯餘駿骨價重千金大鵬羽翼張勢欲摩穹昊天風不來海波不起塌翅别島空留大名人亦有之故左拾遺翰林學士李公之謂矣公名白字太白其先隴西成紀人絶嗣之家難求譜牒公之孫女搜於箱篋中得公之亡子伯禽手䟽十數行紙壊字缺不能詳備約而計之凉武昭王九代孫也隋末多難一房被竄于碎葉流離散落隠易姓名故自國朝已來編於屬籍神龍􅀄濳還廣漢因僑為郡人父客以逋其邑遂以客為名高卧雲林不求禄仕公之生也先府君指天枝以復姓先夫人夢長庚而告祥名之與字咸所取象受五行之剛氣叔夜心高挺三蜀之雄才相如文逸瓌竒宏廓抜俗無類少以俠自任而門多長者車常欲一鳴驚人一飛冲天彼漸陸遷喬皆不能也由是慷慨自負不拘常調器度𢎞大聲聞于天天寳􅀄召見於金鑾殿𤣥宗明皇帝降輦歩迎如見園綺論當世務草荅畨書辯如懸河筆不停綴𤣥宗嘉之以寳牀方丈賜食於前御手和羮徳音褒美􅄄衣恩遇前無比儔遂直翰林專掌密命将處司言之任多陪侍從之遊他日泛白蓮池公不在宴皇歡既洽召公作序時公已被酒於翰苑中仍命高将軍扶以登舟􅄖寵如是既而上䟽請還舊山𤣥宗甚愛其才或慮乗醉出入省中不能不言温室樹恐掇後患惜而遂之公以為千鈞之弩一發不中則當摧撞折牙而永息機用安能俲碌碌者蘓而復上哉脫屣軒冕釋羈韁鏁因肆情性大放宇宙間飲酒非嗜其酣樂取其昏以豪作詩非事於文律取其吟以適好神仙非慕其輕舉将不可求之事求之欲耗壮心遣餘年也在長安時秘書監賀知章號公為謫仙人吟公烏棲曲云此詩可以哭鬼神矣時人又以公及賀監汝陽王崔宗之裴周南等八人為酒中八仙朝列賦謫仙謌百餘首俄屬戎馬生郊逺身海上徃來於斗牛之分􅄖游没身偶乗扁舟一日千里或遇勝境終年不移時長江逺山一泉一石無往而不自得也晚歲渡牛渚磯至姑熟悦謝家青山有終焉之志盤桓利居竟卒於此其生也聖朝之高士其往也當塗之旅人代宗之􅀄搜羅俊逸拜公左拾遺制下於彤庭禮降於𤣥壤生不及禄殁而稱官嗚呼命歟傳正生唐代甲子相懸常於先大夫文字中見與公有潯陽夜宴詩則知與公有通家之舊早於人間得公遺篇逸句吟詠在口無何叨蒙恩奨廉問宣池按圖得公之墳墓在當塗邑因令禁樵採備􅎈掃訪公之子孫欲申慰薦凡三四年乃獲孫女二人一為陳雲之室一乃劉勸之妻皆編户甿也因召至郡庭相見與語衣服村落形容朴野而進退閒都應對詳諦且祖徳如在儒風宛然問其所以則曰父伯禽以貞元八年不禄而卒有兄一人出遊一十二年不知所在父存無官父殁為民有兄不相保為天下之窮人無桑以自蠶非不知機抒無田以自力非不知稼穡况婦人不任布裙糲食何所仰給􅓻于農夫救死而已乆不敢聞于縣官懼辱祖考鄉閭逼迫忍恥來告言訖涙下余亦對之泫然因云先祖志在青山遺言宅兆頃屬多故殯於龍山東麓地近而非本意墳高三尺日益摧圯力且不及知如之何聞之憫然将遂其請因當塗令諸葛縱㑹計在州得諭其事縱亦好事者學為歌詩樂聞其語便道還縣躬相地形卜新宅于青山之陽以元和十二年正月二十二日遷神于此遂公之志也西去舊墳六里南扺驛路三百歩北倚謝公山即青山也天寳十二載勑改名焉因告二女将改適於士族皆曰夫妻之道命也亦分也在孤窮既失身於下俚伏威力乃求援於他門生縱偷安死何面目見大父於地下欲敗其類所不忍聞余亦嘉之不奪其志復井稅免徭役而已今士大夫之葬必誌於墓有勲庸道徳之家兼樹碑于道余才術貧虛不能兩致令作新墓銘輒刋二石一寘于泉扄一表于通路亦峴首漢川之義也庶芳聲之不泯焉文集二十巻或得之於時之文士或得之於宗族編緝㫁簡以行于代銘曰嵩嶽降神是生輔臣蓬萊譴真斯為逸人晉有七賢唐稱八仙應彼星象唯公一焉晦以麴蘗暢於文篇萬象奔走乎筆端萬慮泯滅乎罇前卧必酒甕行惟酒舩吟風詠月席地幕天但貴乎適其所適不知夫所以然而然至今尚疑其醉在千日寜審乎夀終百年謝家山兮李公墓異代詩流同此路舊墳卑庳風雨侵新宅爽塏松栢林故鄉萬里且無嗣二女從民永於此猗歟琢石為二碑一藏幽隧一臨歧岸深谷高變化時一存一毁名不虧唐故朝請大夫吏部郎中上柱國高都公楊府君碑銘并序席豫夫靈鎮三峯倚京師而西峙滎河一曲抱華隂而東注故川嶽氣交雲雨時出感降才傑紛綸元勲冠世為强家宅兹沃土者其惟𢎞農楊氏焉曰我伯𦙍厥自唐叔關中相府乗朱輪者十人洛下儒門登衮職者四代慶靈不隕以生我高都公公諱仲宣字蔓後漢太尉震之二十代孫也自高祖至于大父並名播海内迹存朝端舊史前碑其詳之矣烈考皇孫刑部尚書魏國忠公元琰屬姦臣擅命明辟應期功濟中興安劉氏者周勃禮􅄖歸老論叔向者祁奚出處全身忠貞盡節公即尚書府君之第三子也粤在㓜齡夙有至性事魏公莒國夫人以孝聞宗族推稱州閭籍甚清真邁俗秀挺不羣氣和可親色厲難犯言必合禮動不違仁集七略之書名高漢閣作三都之賦價重洛城未弱冠以通經為修文生授右千牛光朝選也秩滿補太廟丞以親累出為􅀈州司户㕘軍屬先尚書辭滿告歸公罷官就養潁曲别業地連嵩高丘中有華孝子絜白之興川上有水漁父滄浪之歌温清獲申隠淪兼遂横為酷吏王朂所誣陷貶授嶲州臺登縣尉劔南節度使益府長史韋抗奏公為管記飛書之急倚馬立成尋有詔停官歸侍俄丁尚書府君憂鞠凶而降哀毁骨立殆不勝䘮取全於禮服闋從常調吏部侍郎魏奉古早以文伯期於王佐乃授河南府河陽縣尉尋應藻思清華舉今上親試對䇿甲科除蒲州司法叅軍丁莒國夫人憂杖而後起公居魏公之䘮也服闋不仕為叔父瑶所敦逼不獲已而應命其年糊名考判公居上等乃擢拜監察御史獬豸之角初見觸邪雞棲之車還聞􅀈惡坐剛直出為汾州孝義縣令前宰無良下氓失業稼穡之地半為荒疇桑榆之人多在逋藪公曉喻歸本流亡盡復既富而敎厥土有年故得雉馴郊田鸞降庭樹刺史蕭恕乃圖畫其像郵傳以聞天恩疇庸璽書褒美乃除華州下邽縣令辭疾罷職求歸養閒無何除河南鞏縣令所歴為政有逾於前尋遷禮部員外郎歴左司員外郎春官之屬以龢神人左轄之佐以正綱紀乃轉吏部員外郎九品之曹一臺之劇有簿書以旌淑慝擇刀筆以決否臧於是乎以公滅私秉心匪石剖疑析滯揮翰如流選部以清繄公是賴尋遷本司郎中乃統胥徒是稱小選峻以風檢請託不行絶其關梁僥倖自息若乃見理之速持事之堅雖有賁育之勇金張之勢曽無恐懼不可動摇不陟台階奄先泉壤悲夫以元和二十九年七月五日搆疾終于萬年永寕里之私第春秋四十有九以其年十月十七日歸葬于閿鄉牧馬原禮也惟公自家刑國曰仁與義厚利者常流之所重公以先人邑入盡分諸孤善交者衆人之所艱公以結下朋遊曽無凡客士有險詖比隣不通人或急艱傾家以濟素懐儉約雅好真如不服綺紈不食葷血雖粉闈有閌朱紱斯皇不易貴賤之心能全始終之節嗟乎譽高千載道屈一時漢之崔駰官終邑宰魏之管輅位止府丞天乎與才而人乎無命自古所歎豈獨高都而已府公所著文集十巻盛行於代嗣子輪行太常寺奉禮郎次子轅轍轔輯等永惟􅂈庭之訓式遵卜宅之禮靈轜戒道哀挽及關靈掌東拓地惟鄉縣拱樹西靡心存帝京銘曰河之靈華之精人之傑國之禎年不永位未亨閉泉路兮㝠寞空歲隂兮峥嶸唐故常州刺史獨孤公神道碑銘并序崔祐甫昔劉向稱賈誼言三代與秦亂之意其論甚矣逹於國體雖古之伊吕未能逺過又稱董仲舒有王佐之材雖伊吕亡以加管晏之屬殆不及也於戱二君以偉才當盛漢之崇而位止於下國二千石祐甫聞於先君僕射曰主恩非臣下之所圖天命豈生人之所制有唐碩量深識之士曰獨孤常州諱及字至之河南洛陽人皇朝左千牛元慶之曽孫蔡州長史思膝之孫殿中侍御史贈祕書監通理之第四子仕而遭時鵠立於朝建旟東夏三著嘉績嗚呼痛乎奄忽􅂢館其時也大厯十二年夏四月二十九日其地也常州之路寝其夀也五十三年中朝名公素見知者後進之士聞義嚮風者洎濠舒常三州之百姓莫不填膺流皆不宴不相浹辰彌月厚而惜之者往往失聲出涕沲若公有子朗郁等未齓厥兄檢校水部員外郎兼侍御史汜方佐淛河東帥聞䘮來奔半旬而至惋毒之甚如不欲生既受吏人賔客之弔乃忍死謀事以六月六日引使君之柩去常州歸洛陽其年歲次丁巳十月朔七日葬我使君于河南府夀安縣某原先祕監之塋以夫人博陵縣君崔氏祔焉禮也水部曰天之降災害于我家仲叔季盡矣吾将老矣吾弟常州之子未立今不刻石表墓則常州之令名何以傳於後乃託我故人叙而銘之常州稟元和以生㓜有成人之量秘監府君親授以孝經常州一覽成誦祕監問曰汝志於何句對曰立身行道揚名於後世是志也自是徧覽五經觀其大義不為章句學成童丁祕監憂勺飲不入口者累日先夫人同郡長孫氏諭以不可滅性之義由是㣲進饘粥杖而後起免䘮加於人一等鄉族稱其孝焉長孫夫人高行明識訓導甚至常州漸敎成器卓然有立著延陵論君子謂其評議之精在古人右天寳未以洞曉𤣥經對䇿上第超拜華隂縣尉著古函谷關仙掌二銘格高理精當代詞人無不畏服俄屬中原兵亂避地于越丁太夫人􅁨毁􅇤􅂈禮既外除江淮都統使户部尚書李峘奏為掌書記授左金吾衛兵曹㕘軍軍旅之事非其所好未幾返初服今上即位下詔收俊茂舉滯淹政之大者以公為左拾遺凡所諫諍直而不訐婉而不撓屬藁訓詞不傳于外遷太常博士時新平大長公主之子裴防尚永清公主初以太子少傳裴遵慶為婚主将行五禮公實相焉中使口宣詔㫖易之大長主後夫姜慶初常州曰婚姻之禮王化之階以異姓之人主之不可甚矣某不奉詔中書令汾陽王時為五禮使從焉又百官薨卒定諡之際綜覈名實皆居其當嚴河南郢詶荅吕荆州諲諡議博而正當時韙之遷尚書禮部員外郎受詔考第吏部選人詞翰旌别淑慝朝野稱正上方大䘏黎庶精選牧守以公為濠州刺史平其徭賦恤其寃弱課績聞上加朝㪚大夫遷舒州刺史舒境瀕江傍山羣盜所聚或蟠結林藪或赼趄城寺公惠以柔之武以讋之釋矛服表盡為良俗其他如在濠之政居一年璽書勞問就加尚書司封郎中錫以金章紫綬屬江南旱歉比境之人流庸甚衆公忠心以撫舒獨完安天子聞而休之擢拜常州刺史常州當全吳之中據名城沃土兵興之後中華翦覆吴中州府此焉稱大故朝之選牧恒屬意焉公宣中和平易之教務振人毓徳之體百姓蒙化遷善不知所以安而安吏不忍欺路不拾遺餘粮棲畝膏露降之公平生聞人之善必揄揚之氣盡與之不啻若身得之後進有才而業未就者敎誨誘掖之惟日不足公之文章大扺以立憲誡世褒賢遏惡為用故論議最長其或列于碣頌流于詠歌峻如嵩華盛如江河清如秋風過物邈不可逮公有集二十巻行於代若夫賛堯舜禹湯之命為誥為典為謨為訓人皆許之而不吾試論道之位冝而不陟前是公之仲兄季弟伯姊三年之間繼殁執天倫之䘮如荼如蓼竟以無禄天何不仁然則賈與董名位不盡其才吾先君之歎主恩天命斯見矣其銘曰常州之孝行為大蒸蒸翼翼以敬以愛友于兄弟如捧如戴常州之義篤于友用之有常行之可乆扶危拯溺爾身我手常州之才施于政撫柔三部以仁為柄龔遂國嶠千古迭映常州之文究其本質取其正豔從其損在星之緯在衣之衮常州之年止中身去昭昭之盛世與萬鬼而為鄰白馬江上青烏洛濱鶺鴒在原嗟爾元昆縗袵霑血長號訴寃纂述遺美謂余不諼我覯之子將二十年相投藥石胡疹不痊譬我於池子為之泉譬我於桐子為之弦榮不獨遂難不隻全如何淑明摧馥碎堅廞衣楚挽徘徊墓田望之不見赴之無縁狸首班如女手拳如天如天如泣涕漣如故饒州刺史吳府君神道碑銘并序白居易汨市朝溺妻子非達也囚山林擯血屬非達也若有人與羣動處一代閒彼為彼我為我不自潔不自汚不巢許不伊吕水其心雲其身浮沉消息無徃而不自得者其達人乎吾友吳君嘗從事於斯矣君諱丹字真存太子通事舍人覽之曾孫睦州司馬庶之孫太子宫門郎贈工部尚書詮之長子以進士第入官歴正字協律郎大理評事監察殿中侍御史太子舍人水部庫部員外郎都官駕部郎中諫議大夫大理少卿饒州刺史歴職義成軍節度判官浙西道節度判官潼闗防禦判官鎮州宣慰副使匭函使階至中大夫勲至上柱國賜紫金魚袋君讀書數千巻著文數萬言寳厯元年六月某日薨於饒州官次其年十一月某日葬於常州晉陵縣仁和鄉北原從志也君生四五嵗弄泥沙時所作戲輙象道家法事八九嵗弄筆硯時所出言輙類詩家篇章不自知其然蓋宿習儒𤣥之業明矣弱冠喜道書奉真籙每專氣入靖不粒食者累嵗顥氣充而丹田澤飄然有出世心既壯在家為長屬有三㓜弟八稚姪嗷嗷慄慄不忍見其飢寒慨然有干禄意乃曰肥遯不可以立訓吾將業儒以馳名名競不可以怡神吾將體𤣥以育徳凍餒不可以安道吾將强學以徇禄禄位不可以多取吾將知足而守中繇是去江湖來京師求名得名求禄得禄身榮家給之外無長物無越思素琴在右黄庭在左澹乎自處與天和終始履仕塗二十七年享壽命八十二嵗無室家累無子孫憂屈伸寵辱委順而己未嘗一日慼慼其心顔以至於歸全反真故予所謂達人之徒歟信矣仲弟湖州長史某以予辱與其兄游既為同門生又為同舍郎周知初終託為碑記噫先生之道吾能引古以明之銘曰漢中大夫東方曼蒨夏侯湛高之作廟貌贊唐中大夫真存先生白樂天知之作神道銘嗚呼二大夫異代而同塗其皆達者乎唐故通議大夫和州刺史吳郡張公神道碑銘并序張之為著姓尚矣自漢太傳良侍中肱晉司空華丞相嘉以降勲賢軒冕歴代不乏肱避地渡江始居於吳故其子孫稱吳郡人嘉以孝悌聞於郡故其所居號孝張里嘉之曾孫裕在宋為司徒即公五代祖也司徒之孫儔在隋為吳郡都督即公曾王父也台州臨海令諱鵾即公之大父也袁州司馬諱孝績即公皇考也或以人物著或以婚閥稱迄今為江南右族公諱擇字無擇未冠丁袁州府君憂廬於墓晝號而夜泣者三年有靈芝醴泉出焉既冠好學能屬文從鄉賦登明經第既第應制舉中精通經史科補𢎞文館校書郎調左金吾録事換杭州録事㕘軍在杭州前後詰偽制補吏者三十八人駮假年侍老者二十人舉而正之人伏其明㑹劉幽求來為刺史舉課上聞詔授絳州録事㕘軍絳之郡丞有主壻者怙寵侮法豪奪人利公數其罪露章奏之章下丞相姚元崇竒之致書褒美尋改太原府功曹㕘軍給事中張昶為江淮安撫使表公正直奏署部從事吏部尚書陸象先為河東按察使狀公清白奏授懐州獲嘉以不茹柔不吐剛得罪繇是左遷鄂州司馬移深州司馬轉虢州長史時上方思理詔求二千石之良者時宰以公塞詔擢拜和州刺史公之在郡奉詔條䘏人隱而已不知其他無何水潦害農公請蠲榖籍之損者什七八時李知柔為本道採訪使素不快公之剛直宻疏誣奏以附下為名遂貶蘇州别駕老㓜攀泣而遮道者數百人信宿方得去移曹州别駕嵗餘謝病歸老於家天寳十三年正月二十一日終於東都利仁里私第其年二月十二日葬於河南府伊闕縣中李原享年八十三噫公生天地間八十有三年可謂夀矣其間當明皇馭天下四十有五年可謂時矣有其才得其夀逢其時然職不過陪臣秩僅至郡守凡所貯畜鬱而不舒嗚呼其命也夫公之文學常為賀知章賈彦璿許之公之諒直常為李邕張庭珪稱之公之政事又為劉姚張陸推之夫以八君子之力援之而不足以一知柔之力排之而有餘阨窮不振以至沒齒嗚呼其命也夫古人云道不虚行又云其後必有達者故公之子大理評事諴以節行聞於時公之孫户部侍郎平叔以才藝光於國報施之道信昭昭矣不在其身則在子孫相去幾何哉長慶二年某月某日平叔奉祖徳揭而碑之居易據家狀序而銘之其詞云有木有木碩大而長破為桷杙不作棟梁有驥有驥規行矩歩辱在短轅不駕大輅嗚呼噫嘻公亦如之將時不我遇而我不遇時勿謂已矣天錫多祉既賢其子以濟其美又才其孫以大其門苟無先徳孰啟後昆唐文粹巻五十八欽定四庫全書唐文粹巻五十九宋姚鉉編
