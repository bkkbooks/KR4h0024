body:
  text: 太學張博士講禮記記歐陽詹穆氏四子講藝記崔祐甫呉郡詩石記白居易琴㑹記栁識伯樂川記孫逖讌犒二嶺南節度使饗軍堂記栁宗元邠寜節度饗軍記李觀書畫琴故物八畫記韓愈祖二疎圗記王藹蘇州畫龍記李紳錄桃源畫附元輿舒書屏記司空圖玉筋篆志附元輿舒斵琴志衛公故物記韋端符種殖二養竹記白居易􅜩竹記劉寛夫太學張博士講禮記記歐陽詹説釋典籍謂之講講之為言構也如農之耕田疇焉田疇將植而求實雖耕矣必耨分其畦壟嘉榖由是乎生典籍將肄以求明雖習矣必講窮其㫖趣儒術由是乎成我國家春享先師後更日命太學博士清河張公講禮記盛儒術也祖聖三刋經九公通其六籍于五而禮記在其中禮也者御人之大故首于羣籍而講之束脩既行筵肆乃設公就几北坐南面直講抗牘南坐北面大司成端委居于東小司成率屬列于西國子師長序公侯子孫自其館太學長序卿大夫子孫自其館四門師長序八方俊造自其館廣文師長序天下秀彦自其館其餘法家墨家書家筭家術業以明亦自其館没階雲来即席鱗差攅弁如星連襟成帷公先申有禮之本次陳有禮之要正三代損益得失定百家疏義長短鎔乎作者之意注乎學者之耳河傾于懸風落于天清冷灑蕩幽逺無泥所昧鏡徹於靈臺所凝冰釋於心泉後一日聞于朝百司達官造者半後一日聞于都九城知名造者半皆尋聲得器虚来實歸予職在下庠六掌有教道不足訓領徒從公惟始洎終覩公之美敬書盛事記諸屋壁并列當時執簡摳衣者于左偏貞元十四年五月二十七日記穆氏四子講藝記崔祐甫檢校秘書少監兼和州刺史侍御史河南穆寜字子寜以正直登朝以嚴明作牧斯歴陽之人弗惟奉丞相御史之符候持三尺律期於禁暴懲姦而已迺能廣吾君之徳清人於教化教化之興始於家庭延於邦國事之體大且非謏聞者之所及也請言其家之教化焉使君有四子曰贊曰質曰賡曰賞聳秀之姿若瑶林植庭雪羽馴廡克岐克嶷突而偕弁方欲以六經百氏播禮樂務忠孝正名器導人倫如蘭有芳心泉有清源兆徳之階於是乎始使君曰昔陳亢喜聞詩聞禮聞君子之逺其子於孔鯉今兹賛之儕也其年或成人或幾成人學詩學禮則亦既戒逺子之節吾事可不務哉於是考州之東四十里因僧居之外堦庭戸牖芳草拳石近而幽逺而曠澶漫平田觱沸温泉可以步而適可以濯而蠲謂爾羣子息焉遊焉賛質暨賡賞拜手稽首曰應惟惠施之車仲舒之帷蘇秦之錐三物畢具而郡廷温凊所在今也改晨昏為旬朔夫豈不懐家人有嚴君焉惟命之受曰俾爾斵俾爾茨俾爾負則使君之材使君之堂使君之薪成且美矣安在其習定省之近儀哉抑又嘗聞迺祖安陽府君傳洪範九疇究天人之際賛等祇荷嚴訓述修祖徳穆氏之門欲不大不可得也祐甫不腆幸與使君有郎省之舊考槃在阿歲聿云暮誰謂相逺駕言出遊既覿邦君又適諸子之館使君第三子字紹古於伯季之間肄文史考故實甚精而成因見謂曰丈人吾父之友也從事於㳺夏之門久矣盍以文見誨如賡也宜何文也祐甫應之曰僕朴人也徒有志於文知文之阡陌而不知其精粹請道其所見而紹古自執焉欲以文經邦者宜董賈欲以文動俗者宜揚馬言偃之文鬱而不見卜商有詩序其體近六經屈原宋玉怨刺比興之詞深而失中近於子夏所謂哀以思刻石銘座者取崔蔡論都及政者宗班張飛書走檄者徴陳琳曹劉之氣奮以舉潘陸之詞縟而麗過此已往未之或知宋齊已降年代未逺有文之士胄系皆存議其優劣其詞未易故闕焉紹古曰盍書之因命筆而記之大厯七年十一月十八日檢校尚書吏部郎中博陵崔祐甫之詞也呉郡詩石記白居易貞元初韋應物為蘇州牧房孺復為杭州牧皆豪人也韋嗜詩房嗜酒毎與賔友一醉一詠其風流雅韻多播於吴中或目韋房為詩酒仙時予始年十四五旅二郡以幼賤不得與遊晏尤覺其才調髙而郡守尊以當時心言異日蘇杭茍獲一郡足矣及今自中書舍人間領二州去年脱杭印今年佩蘇印既醉於彼又吟於此酣歌狂什亦往往在人口中則蘇杭之風景韋房之詩酒兼有之矣豈始望及此哉然二郡之物狀人情與曩時不異前後相去三十七年江山是而齒髪非又可嗟矣韋在此州歌詩甚多有郡宴詩云兵衛森畫㦸燕寢凝清香最為警策今刻此篇于石傳貽將来因以予旬晏一章亦附于後雖雅俗不類各詠一時之志偶書石背且償其初心焉寳歴元年七月二十日蘇州刺史白居易題琴㑹記栁識君子之座必左琴右書雅好閱古古亦置於舟車也大厯六年浙西觀察使蘇州刺史兼御史大夫賛皇公祇命朝于京闕春正月夕次朱方刺史樊公稱江月當軒願以巵酒侑勝居無何賛皇公弦琴樊公和之演操相應澄清撫綏遞為伯牙更為子期琴動人静琴酣酒醒清聲向月和氣在堂春風猶寒是夜覺暖罷宴之後賛皇顧潤州曰見明珠者方鄙魚目知雅樂者始賤鄭聲自樸散為器真意在琴與衆樂同出於虚獨能致静同韻五音獨能多感同名為樂獨偶聖賢是宜稱徳切近於道昔堯以美利利于天下曲名始暢自舜禹至於夫子不止且聲著哀思或當戚自陳其後居常翫之和理所措若然者寜襲陶公真意空拍而已豈襲胡笳巧麗異域悲聲我有山水桐音寳而持之古操則為其餘未暇是知賛皇所好無非貽訓似有道而猶重之若此況乃真有道之士乎輒記所論貽諸達者伯樂川記孫逖太原元帥黄門侍郎李公國之宗盟朝之峻徳以元凱之忠肅兼桓文之節制戊辰歲秋七月公以疆場之事㑹幽州長史李公于伯樂川王命也以駕四牡鏘八鸞斾旌悠悠車轞嘽嘽乙未出于北京戊戌次于横野已亥至于㑹封人戒備軍吏宿設立㑹表于髙阜闢轅門於大荒漁陽精鋭太原材力駟介八百徒兵三千戈如林羽而且少長有禮賔主不悖蚩尤衂其五兵若敖慙其六卒洸洸乎信可以慴穹廬而震髙闕也於是地主致餼以昭饗宴之禮君子有儀以訓上下之則歌蔓草之相遇笑投壺之失辭大庖既盈釃酒有藇胥樂周於卒乗屬厭及於輿臺慈惠之徳於是乎在夫幽州太原襟帶之地自河以北幽州制之自河以東太原制之在兩軍之交當二境之上厥有棄地皆為曠林守之則表裏之勢全捨之則候望之路隔公料以古今度其川原獻方略而入覲于王議工徒而東為此㑹爰究爰度匪逰匪追蓐食無再舍之勤扞諏為一夕之衛不愆于素返斾而旋君子謂此㑹也能用典矣初公之始至太原也酌於人賦於事以為節用者國之善政於是乎減戍卒以寛其征修備者武之善經於是乎置秋集以裒其旅足食者人之所庇於是乎賞屯兵以艾其力近利者姦之所生於是乎禁和糴以懲其弊然後序山澤之險廣亭燧之虞候騎出於長城爟火通於大漠書田庀賦講射訓騶蓄信義為國寳修徳刑為戰器行之一年軍乃有節邊鄙不聳龔黄之教也雖魏絳有和戎之利卻縠有敦詩之徳申伯之式是南邦韓侯之奄受北國曷云比議未足量力公之與幽州李公也義均伯仲芳若蕙蘭周諸侯以異姓為後晉大夫以同官為僚入亞六卿共行司馬之法出膺九命俱受元戎之律詩曰維其有之是以似之其二公之謂矣不書所㑹将何述焉揚厥美萬斯年俾夫来世知二公相見在此川也嶺南節度使饗軍堂記栁宗元唐制嶺南為五府府部州以十數其大小之戎號令之用則聽于節度使焉其外大海多蠻夷由流求訶陵西底大夏康居環水而國以百數則統于押蕃舶使焉内之幅貟萬里以執秩拱玉稽時聽教命外之羈屬數萬里以譯言摯寳歲帥貢職合外二使之重以治于廣州故賔軍之事宜無與校大且賔有牲牢饔餼嘉樂好禮以同逺合疏軍有犒饋宴饗勞旋勤歸以羣力一心於是治也閈閎階序不可與他邦類必厚棟大梁夷庭髙門然後可以上充於揖讓下周於步武今御史大夫扶風公亷廣州且專二使増徳以来逺人申威以修戎政大宴饗合樂從其豐盈先是為堂於治城西北陬其位公北向賔衆南向奏闕伎于其西視泉池于其東隅奥庳仄庭廡下陋日未及晡則炎赫當目汙眩更起而禮莫克終故凡大宴饗大軍旅則寓于外壘儀形不勝公於是始斥其制為堂南面横八楹縱十楹嚮之宴位化為東序西又如之其外更衣之次膳食之宇列觀以游目偶亭以展聲彌望極顧莫究其往泉池之舊増濬益植以暇以息如在林壑問工焉取則師輿是供問役焉取則蠻𨽻是徴問材焉取則隙宇是遷或益其闕伐山浮海農賈拱手張目示具乃十月甲子克成公命饗於新堂幢牙茸纛金節析羽斾旗旟旞咸飾于下鼔以鼖鼔金以鐸鐃公與監軍使肅上賔延羣寮将校士吏咸次于位卉裳􅄢衣胡夷蜑蠻睢盱就列者千人以上鉶鼎體節燔炰胾炙羽鱗貍牙之物沈泛醍盎之齊均飫于卒士興王之舞服夷之伎揳擊吹鼓之音飛騰幻怪之容寰觀于逺邇禮成樂徧以叙其賀且曰是邦臨䕶之大五人合之非是堂之制不可以備物非公之徳不可以容衆曠于往初肇自今兹大和有人以觀逺方古之戎政其曷用加此華元名大夫也殺羊而御者不及霍去病良将軍也餘肉而士有飢色猶克稱能以垂到今矧兹具美其道不廢願訪于金石以永示後祀遂相與来告且乞辭牢讓不獲乃刻于兹邠寜節度饗軍記李觀朗寜郡王張公擁七尺之節臨三州之師牧我邠荒藩我雍疆威厲乎廣漢聲凌乎四鄰戎無南侵國無西憂師嚴民整封守晏如聖上聞之何嘗不負扆而嗟之因乃寵以彤弓嘉以墨書乃慰乃止曷日而無哉於是仗鉞總戎之臣咸望公而歡懼能無稱於維朗寜之卒已仗誠而言曰獲拜賜之光聖上之寵崇朗寜足以厲不戮力之臣然斯事也君臣之殊尤敢不述之而已哉越三月河澌未流東風始湊優柔逶迤被公軍令公曩奉詔親帥師備胡乗虚君命未復不自議還雖閫外得顓亦大有所不顓也于是軍吏之職事者進伏於鉞下曰實以是月賞功息勤惠老及疾哀死及孤厥死無怨厥生而愉所以披軍實賚師徒實舊典也違之不孚公從之乃練令辰豁連城鼓於四門斾於四墉日既登塵不騰窮隂閉淑氣升軍聲歡康儲輿靁硠翕乎衆民輳乎氐羌空山之木春近塞之草芳朗寜乃鳩文武之吏列為行東西嚮闕而再拜如䝉上命命之然後申號而惠周升堂而澤溥賁育之倫列於軍之宇校師之士次于軍之堂進猶風趨坐如雲屯旌旗蔽日刃㦸交光公于是衆食而食衆安而安士盡感之優用醉飽而御酒餚是日朗寜軍中無淫聲無亂音右金鼓左羽旄所以奮武之觀壮軍之容其餘管磬之歡弦匏之繁罔不合簡節諧雅音俾三軍之夫毅其氣和其心羣羌之長釋我俘歸我侵少壮熏熏老疾嘔吟祲化為祥虜趨為擒洪矣偉矣朗寜之理明徳遐被者乎乃知乎致享者不止乎味張樂者不止乎聲仁可以顧其膚龢可以暢其情故朗寜之饗士兼以仁龢被之豈以羶以腥猗之哉武有七徳朗寜其由二三焉于時歲紀協洽國家郊祀之明年觀布衣来遊賔公之筵宗盟兄侍御史益有文行忠信而從朗寜之軍惡羣小之日取媚也故不自書命觀書之曰子之文直長於記事益知之乃題曰邠寜節度饗軍記畫記韓愈雜古今人物小畫共一巻騎而立者五人騎而被甲載兵立者十人一人騎執大旗前立騎而被甲載兵行且下牽者十人騎且負者二人騎執器者二人騎擁田犬者一人騎而牽者二人騎而驅者三人執羈靮立者二人騎而下倚馬臂隼而立者一人騎而驅涉者二人徒而羈牧者二人坐而指使者一人甲胄手弓矢鈇鉞植者七人甲胄執幟植者十人負者七人偃寝休者二人甲胄坐睡者一人涉者一人方涉坐而脱足者一人寒附火者一人雜執器物役者八人奉壺矢者一人舍而具食者十有一人挹且注者四人牛牽者二人驢驅者四人一人杖而負者婦人以孺子載而可見者六人載而上下者三人孺子戱者九人凡人之事三十有二為人大小百二十有三而莫有同者焉馬大者九匹於馬之中亦有上者下者行者奔者涉者陸者翹者顧者鳴者寝者訛者立者人立者齕者飲者溲者陟者降者癢磨樹者嘘者嗅者喜相戯者怒相踶囓者秣者騎者驟者走者載服物者載狐兔者凡馬之事二十有七為馬大小八十有三而莫有同者焉牛大小十一頭槖駞三頭驢如槖駞之數而加其一焉隼一犬羊狐兔麋鹿共三十旃車三兩雜兵器弓矢旌旗刀劍矛楯弓服矢房甲胄之屬瓶盂􅀢笠筐筥錡釡飲食服用之器投壺之矢博奕之具二百五十有一皆曲極其妙貞元甲戌年予在京師甚無事同居有獨孤生申叔者始得此畫而與予彈碁予幸勝而獲焉意甚惜之以為非一工人之所能運思蓋叢集衆工人之所長耳雖百金不願易也明年出京師至河陽與二三客論畫品格因出而觀之座有趙侍御者君子人也見之戚然若有感然少而進曰噫予之手模也亡之且二十年矣予少時常有志乎兹事得國本絶人事而模得之逰閩中而喪焉居閒處獨時往来予懐也以其始為之勞而夙好之篤也今雖遇之力不能為已且命工人存其大都焉予既甚愛之又感趙君之事因以贈之而記其人物之形状與數而時觀之以自釋焉祖二踈圗記王藹吴郡顧生能冩物筆下狀人風神情度甚得其態自江以東譽為神妙有好事者先賄以良金細帛必避而不顧設食精美亦不為之謝乃曰主人致殷勤豈無意邪何不醉我斗酒乗其酣逸當無愛惜乃張素座隅前即置酒一器初沈思想望摇首撼頤忽飲十餘杯斗無三揖主人曰酒興相激吾将勇於畫矣午未及夕而數幅之上有帳於京城之外帳中有筵筵中有犧罇二壺觥即觩而罍斝即倍犧壺之數而樂師差於前樂有竽琴瑟有笙鏞有缶有筑有鼔而㯥若鼓手以合奏也列坐皆冕帶盛服有持筭主事者有捧斚就飲者有憑軾徐来者有目於騎而迴者有仰吻而咍者有俛首而肅者有避席而遺簪屨者有促襟而将進者此漢公卿祖二踈也主人久視而問曰東嚮而坐即行客也去國離羣而容無慘恨何為妙曰二踈之去乃知足也非疾時也非時之不禮也非危於禍機也非避於䜛口也非失於權利也既辭勤於夙夜而果其優游故顔間無慘恨之色主人歎曰既不為利易已之能絜也嗜酒而混俗何其髙也圗二踈以遺於時俗勸也求其能状物之情者孰有勝乎蘇州畫龍記李紳自造父劉累殁豢氏不副龍不復擾隠去莫狎往往時見史必盡志代以自識者寡之故工得以詭亂形状神其變化彪炳五色逾逺真像蓋上飛于天晦隔層雲下歸于泉深入無底考之丹青難以徴驗好事者張其畫以示羣目觀者或駭疑得其状長洲令㕔北廡有畫蛟龍六焉𤣥素異鱗状殊質怪驤首拖尾似隨風雷乗櫨薄楣若軼雲雨燕雀懼栖其上螻蟻罔縁其側目視光射瑩無流塵伸盤逶迤如䕶榱棟毎飛雨度牖疎雲殷空鱗鮮耀隂顧壁疑㧞志其側曰僧繇弗興之舊度模之不知何人也二工圗龍天與幽思今是壁指逺異代繼之圗法無謝於二子而名漏不傳詢於耆人亦絶傳記茂宰博陵崔君據始命余述舉丹素實驗附邑書末簡庶乎後數百歲棟宇斯變龍忘其像而事刻編簡繇昭昭然時貞元癸未歲秋七月記錄桃源畫記舒元輿四明山道山葉沈囊出古畫畫有桃源圖圖上有谿谿名武陵之源按仙記分靈洞三十六之一支其水趣流勢與江河同有深而淥淺而白白者激石渌者落鏡溪南北有山山如屏形接連而去峯豎不險翠穠不浮其夾岸有樹木千萬本列立如揖丹色鮮如霞擢舉欲動燦若舒顔山鋪朱底草散茵毯有鸞青其衿有鶴丹其頂有雞玉其羽有狗金其色毛􅀈􅀈亭亭間而立者十有八九岸而北有曲深嵓門細露室宇霞檻繚轉雲磴五色雪氷肌顔服身衣裳皆負星月文章岸而南有五人服貌肖虹玉左右有書童玉女角髪而侍立者十二視其意況皆逍遥飛動若雲十許片油焉而生忽焉而往其坦處有壇層級沓玉氷壇面俄起燼竈竈口含火上有雲氣且備五色中有溪艇泛上一人雪華􅁂眉身著秦時衣服手鼓短枻意状深逺合而視之大略山勢髙水容深人貌魁竒鶴情閒暇煙嵐草木如帶香氣熟得詳翫自覺骨戞清玉如身入鏡中不似在人寰間眇然有髙謝之志從中坐来少選道士巻畫而藏之若身形郤落塵土中視嚮所張壁上又疑有頑石化出塞斷道路某見畫物不甚寡如此圗未嘗到眼是知工之精而有如是者邪葉君且自珍重無路得請遂染筆錄其名數将所以備異日冩畫之不謬也書屏記司空圗人之格状或峻其心必勁心之勁則視其筆跡亦足見其人矣歴代入書品者八十一人賢傑多在其間不可誣也國初歐虞之後繼有名公元和長慶間先大夫初以詩師友兵部盧公載從事於商於因題紀唱和乃以書受知於裴公休辟倅鍾陵及徴拜侍御史退居中條時李忻州戎亦以草􅈻著稱為計吏在蒲因輟所寳徐公浩真跡一屏以為貺凡四十二幅八體皆備所題多文選五言詩其朔風動秋草邊馬有歸心十數字或草或􅈻尤為精絶或綴小簡於其下記云怒猊抉石渴驥奔泉可以視碧落矣先公清旦披翫殆廢寝食常屬誡云正長詩英吏部筆力逸氣相資竒功無跡儒家之寳莫踰此屏也但二者皆美神物所窺必當奪璧於中流飛鋩於烈火也殆非子孫之所可存耳庚子歲遇亂自虞邑居負之置於王城别業丙辰春正月陜軍復入則前後所藏及佛道圗記共七千四百巻與是屏皆為灰燼痛哉今旅寓華下於進士姚顗所居獲覽書品及徐公評論因感憤追述貽信後學且冀精於賞覽者必将繼有詮次光化二年八月三日泗水司空圗銜涕撰錄謹記之玉筋篆志舒元輿秦丞相斯變蒼頡籀文為玉筋篆體尚太古謂古若無人當時議書者皆輸伏之故㧞乎能成一家法式歴兩漢三國至隋氏更八姓無有出者嗚呼天意謂篆之道不可以終絶故授之以趙郡李氏子陽冰陽冰生皇唐開元天子時不聞外奨躬入篆室獨能隔一千年而與秦斯相見可謂能不孤天意矣當時得議書者亦皆輸伏之且謂之其格峻其力猛其功備光大於秦斯有倍矣此直見上天以字寳瑞吾唐矣不然何綿更姓氏而寂寞無人某道不攻篆而識其㸃畫常有意求秦丞相真跡㑹秦丞相去久聞其有八字刻在荆玉有洪碑樹嶧山巔今荆璧為璽飛上天矣固不可得而見也洪碑留在人間往往有好事者躋巔得見某亦常問得去嶧山道路異日将裹足觀之未去間行長安㑹同里客有得陽冰真跡遺在六幅素上者遂請歸客堂張之見蟲蝕鳥步痕跡若屈鐵石陷入屋壁霜晝照著疑龍蛇駭解鱗甲活動皆欲飛去齊目眎之分明覩文字之根植吾堂中然後知向之議者謂冰愈於斯吾雖未登嶧山觀此可以信其為深於篆者之言也試以手拂拭其煙顔塵容侵暴日久攝芻坼裂玉筯欲折予以䙝慢讓其主主曰此易致耳豈當其如是愛邪予曰今世人所以重秦斯之跡非能盡辨别之以其秦古矣斯邈矣向使秦斯與予比肩子能貴之乎曩吾尚欲苦辛登嶧山之巔縮在予掌握中今且猶不為子貴子不過生於唐而得與冰同為唐人吾知冰殁二三十年其蹤跡流於人間固不甚少得為子目數見故易之若此使冰生於秦時予又安得使造次而見遺塵邪是子賤目也世人皆然嗟吁冰既即世是字寳入地矣後人思孜孜求之今且遭不知者忽易想生筆下日有新迹固為門户見覩之物矣冰雖欲求沽售不獨棄為糞土必遭其詬怒也主聞之其愧色見於顔眉間欲巻而退知其退也必因循而不信彊止留之引筆書其志行下以保明其為字寳也不謬詞曰斯去千年冰生唐時冰復去矣後来者誰後千年有人誰能待之後千年無人篆止於斯嗚呼主人為吾寳之斵琴志舒元輿寂寞間有至音注梧桐中越客沈虬子耳長木音常斧樹之良孫斵而琴之予客越見其方風釿取朴成輒叫索清濁應刃濁授授成輪圎濁沛雪落清聲酬答若寒玉透木噴出瓏􅌑及察投意之始放心虚無間猶掌握無毛倫也人見朴在刃下而沈氏成琴入眼中不知釿之數到邪琴之形化邪兩肩聳張若對古人雙池呀開若挹澄渟絶刃四顧得色上面旁眎或懵其所以為沈生乃弦素絲七條其上備指一弄五聲叢鳴鳴中有靈峯横空鳴泉出雲鳳龍騰凌鶴哀烏啼松吟風悲予聆之初聞聲入身覺毛骨聳擢中見境在眼覺精爽冲動終然睹化源寥寥貫到心靈則百骸七竅仙仙而忘覺神立寥廓上洞見天地初氣駕肩太古濶視區外乃知不知音聲者終身為朧朦嘻木纔滿數尺絲不盈十條古聖人欲其中含天音天之如此直乃叩之以觀化木且絲木俱無情物也因不能自鳴是使歴代知其必鳴之稀以至爨入鼎下枯折空山而不聞者非一也今人明明以聲耳耳且惑況槁木無朕而責其必無惑邪予於此見沈氏子之審音也之運釿也俱與神遇懼異日斯琴流于人間為他者亂類則沈氏之道為委土矣故志之衛公故物記韋端符三年冬端符於三原令座中揖其羣官有客曰某丞李謂端符曰是衛公之胄也其家傳賜書與他服器十餘物者訖讌端符即丞居為客謁丞延入就次端符因跪請曰藉君僕射公之嗣固願見僕射公之烈之多其事辭雖文記或闕略具天下耳舌矣聞君世傳文帝詔與公服物者願得以觀丞慘慘曰諾即其家傴僂躍步奉賜書一函他物一器出發視有玉帶一首末為玉十有三方者七挫兩隅者六每綴環焉為附而固者以金丞曰傳云環者列佩用也玉之粹者若含怡然澤者若渙釋然公擒蕭銑時髙祖所賜于闐獻三帶其一也素錦􅂁一其襟袂促小裁制絶巧密光爛爛如波旁出紫文綾襖一促製小袖如袍其為文林樹於上其下有馳馬射者又雜為狻㹸虎貙槖駞者靴袴一往来為鈎屬鎻劍文疑非華人所為也自始傳于今莫能名其物象笏一差狭不類今笏者佩筆一竒木為管韜刻飾以金别為金環以限難其間韜者火鏡二大觿一小觿一笇囊二椰盂一蓋常佩於玉帶環者十三物亡其五有存者八大帝為兒時與公子某年上下文帝命居宫中侍吾兒戱即賜以皇子服物黄綾袍皆為龍鸞文素錦襖綷五采為花若鳥者素錦半袖小笏皆緻巧功良今工之為不能也文帝賜書二十通多言征討事厚勞苦信必威賞而已其兵亊節度皆付公吾不從中理也暨公疾親詔者數四其一曰有晝夜視公病大老嫗令一人来吾欲熟知公起居狀丞曰權文公視此詔常泣曰君臣之際乃如是邪端符既畢觀中若有物擊惻其心者於玉帶見逺方致物而上不專有以賜有功也於文錦衆物見其時之工志功不志靡也於賜公子以皇子衣服見視臣如友而游闕也於詔征討見擇将材付將職也上嘗不曲制其事旁他可動哉於公間公疾見上荅憫公如家人之視子姓也公之勞烈如是其大固有以感之獨推期運吾不信也丞曰子觀吾故物異他人之觀一似動色隠心者於霜露變時每閲省是物人雅謂子工文辭幸為記吾得觀以慰吾慕思也故曰記衛公故物養竹記白居易竹似賢何哉竹本固固以樹徳君子見其本則思善建不拔者竹性直直以立身君子見其性則思中立不倚者竹心空空以體道君子見其心則思應用虚受者竹節貞貞以立志君子見其節則思砥礪名行夷險一致者夫如是故君子人多樹之為庭實焉貞元十九年春居易以拔萃選及第授校書郎始於長安求假居處得常樂里故闗相國私第之東亭而處之明日屨及于亭之東南隅見叢竹於斯枝葉殄瘁無聲無色詢乎闗氏之老則曰此相國之手植者自相國捐館他人假居繇是筐篚者斬焉篲帚者刈焉刑餘之材長無尋焉數無百焉又有凡草木雜生其中苯䔿薈蔚有無竹之心焉居易惜其嘗經長者之手而見賤俗人之目翦棄若是本性猶存乃芟翳薈除糞壤䟽其間封其下不終日而畢於是日出有清隂風来有清聲依依然欣欣然若有情於感遇也嗟乎竹植物也於人何有哉以其有似於賢而人猶愛惜之封植之况其真賢者乎然則竹之於草木猶賢之於衆庶嗚呼竹不能自異惟人異之賢不能自異惟用賢者異之故作養竹記書于亭之壁以貽其後之居斯者亦欲以聞於今之用賢者云􅜩竹記音果割也出玉篇劉寛夫左史院近宸居之正地直日華之東偏俗塵不飛人意自逺閟邃幽閴似非官曹有竹一叢翠接階所其虚中絜外之操䕃座袪煩之能紫㣲郎髙公嘗賦之固已備盡然而歲月滋久蔓衍浸淫大小相依髙下叢茂俾日光不透隂氣常凝暝色為之早来陽春為之減煦四序不正一庭常昏蚊䖟曹飛雀鷃自遂被圗散帙觀覽不快二年冬侍軒之暇載筆之餘偶步庭除病其蔽翳因命斤斧将治其蕪沈吟即時乃用申誡且謂其徒曰礪爾器用端爾瞻視謹爾操執慎爾區分其有質㣲而葉環苯䔿者去之從風而不能自正者去之大而倚者去之聚而曲者去之竅而不能備笙篁之用者去之挺而不能棲鸞鳳者去之其有羣居不亂獨立自持振風發屋不為之傾大旱乾物不為之瘁堅可以配松栢勁可以凌雪霜密可以泊晴煙踈可以漏宵月嬋娟可翫勁挺不囘者爾其保之既而芟翦畢功繁蕪立盡去者存者邪正乃分不浹旬扶踈一林歴歴可見有清風澡慮之效皦日明姦之機檀樂風生韻合宫徴君子是以知竹箭之美尚科别之功即其他不俟言而詳矣或以斯為小可以伸之因紀一時之妙筆而述之唐文粹巻七十七欽定四庫全書唐文粹巻七十八宋姚鉉編箴誡銘總四十一首箴二十五大寳箴張蘊古丹扆箴六首并序裕李徳瑞箴孫朴兵箴梁肅太倉箴李商隠獄箴張説縣令箴古之竒縣令箴元結五箴并序韓愈動靜二箴皮日休口箴姚元崇視聽箴沈顔自箴元結行已箴李翺暗室箴歐陽詹誡八二誡并序元栁宗冰壺誡姚元崇執秤誡執鏡誡守誡韓愈敵誡栁宗元銘八幾銘權徳輿門銘盧仝二銘并序羅衮櫛銘盧仝藏劍銘潘存實座右銘白居易猩猩銘裴炎大寳箴張蘊古今来古往俯察仰觀惟辟作福惟君實難主普天之下處王公之上任土貢其所求具寮陳其所倡是故恐懼之心日弛邪僻之情轉放豈知事起乎所忽禍生乎無妄固以聖人受命拯溺亨屯歸罪於已因心於民大明無私照至公無私親故以一人治天下不以天下奉一人禮以禁其奢樂以防其佚左言而右事出警而入蹕四時調其慘舒三光同其得失故身為之度而聲為之律勿謂無知居髙聽卑勿謂何害積小就大樂不可極樂極生哀欲不可縱縱欲成災壮九重於内所居不過容膝彼昏不知瑶其臺而瓊其室羅八珍於前所食不過適口唯狂罔念丘其糟而池其酒勿内荒於色勿外荒於禽勿貴難得貨勿聽亡國音内荒伐人性外荒蕩人心難得之貨侈亡國之音淫勿謂我尊而傲賢慢士勿謂
