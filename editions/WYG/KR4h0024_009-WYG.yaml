body:
  text: 古賦壬總十首修身一動静交相養賦白居易哀樂愁思八懐忠賦歐陽詹泛渭賦白居易望賦劉禹錫惜餘春賦李白江上愁心賦張説别知賦韓愈愛而不見賦蕭穎士傷往賦劉禹錫夢一夢渇賦何諷動静交相養賦并序白居易居易常見今之立身從事者有失於動有失於静斯由動静俱不得其時與理也因述其所以然用自儆導命曰動静交相養賦云天地有常道萬物有常性道不可以終静濟之以動性不可以終動濟之以静養之則兩全而交利不養之則兩傷而交病故聖人取諸震以發身受以復而知命所以莊生曰智養恬易曰䝉養正者也吾觀天文其中有程日明則月晦日晦則月明明晦交養晝夜乃成吾觀歲功其中有信陽進則隂退陽退則隂進進退交養寒暑乃順且躁者本於静也斯則躁為民静為君以民養君教化之根則動養静之道斯存且有者生於無也斯則無為母有為子以母養子生成之理則静養動之義明矣所以動之為用在氣為春在鳥為飛在舟為楫在弩為機不有動也静将疇依所以静之為用在蟲為蟄在水為止在門為楗在輪為柅不有静也動奚資始則知動兮静所伏静兮動所倚吾何以知交養之然哉以此有以見人之生於世出處相濟必有時而行非匏瓜不可以長繫人之善其身枉直相循必有時而屈故尺蠖不可以長伸嗟夫今之人知動之可以成功不知非其時動亦為凶知静之可以立徳不知非其理静亦為賊大矣哉動静之際聖人其難之先之則過時後之則不及時交養之間不容毫釐故老氏觀妙顔子知幾噫非二君子吾誰與歸懐忠賦并序歐陽詹丙寅嵗因受譴季冬之月次于殷墟歴闗龍逢墓焉昔聆其風未嘗不迴腸霣涕覩夫塋壟心又増傷遂寫憤于言為賦以弔先生以忠諫致命故以懐忠命篇云天生彼辛兮用殱覆于夏家欲悠悠而罔極毒浩浩而無涯無辜殞身肆市朝之若莽有道併命委炮烙以如麻伊先生之諤諤為酷烈之所加當披圖於往載每廢巻以興嗟蕭條舊邑莽蒼空陂陷陵成坎古木無枝或人曰此其墓也又一倍以増悲嗚呼麟非騰噬之儔詎虎狼之共穴鳳實仁靈之類豈鷹鸇之同列惟玉石之明分亦薰蕕之自别是以謇謇心競昂昂面折彼炎炎之原燎信撲撲而不滅寧歸死以申懐不貪生而結舌痛矣哉古人有言輔仁者天福善者神胡為是日功不如人使典章之不信俾忠義之空勤律中大呂日臨蒙谷風颼颼於衰草煙茫茫乎平陸思悽悽而填臆淚淫淫以盈目義則非其知友親故逺夫骨肉節臨危而不撓行於艱而彌篤惟其有之是以傷之而慟哭泛渭賦并序白居易右丞相髙公之掌貢舉也予以鄉貢進士舉及第左丞相鄭公之領選部也予以書判拔萃登科十九年天子並命二公對掌鈞軸朝野無事人物甚安明年春予為校書郎始徙家秦中卜居渭上上樂時和嵗稔萬物得其宜下樂名遂官閒一身得其所既美二公佐清静之理又荷二公垂特達之遇發于嗟嘆流于詠歌于時泛舟于渭因為泛渭賦以導其意辭曰亭亭華山下有人跂兮望兮愛彼三峯之白雲泛泛渭水上有舟沿兮泝兮愛此百里之清流以我為太平之人兮得於斯而優游又感陽春之氣熈熈兮樂天和而不憂曰予生之幸兮時哉時哉當皇唐受命之九葉兮夷與華而無氛埃及皇帝纉位之二紀兮命髙與鄭為鹽梅二賢兮爰立四門兮大開凡讀儒書與履儒行者率充賦而四來雖片藝而必收兮故不棄予之小才感再遇于知己心慙怍以徘徊登予名于太常署予職于蘭臺臺有蘭兮閣有芸芳菲菲兮可襲備一官而無事又不維而不縶家去省兮百里每三旬而一入川有渭兮山有華澹悠悠其可賞目白雲兮漱清流且或偃而或仰門去渭兮百步常一日而三徃夜分兮扣舷天無雲兮水無煙遲遲兮明月波淡灔兮棹寅縁日暮兮舟泊草萋萋兮沙漠漠習習兮春風岸栁動兮渚花落發浩歌以長引舉濁醪而緩酌春冉冉兮其将盡予何為乎不樂鳥樂兮雲際鳴嚶嚶兮飛裔裔魚樂兮泉底鬐撥撥兮尾潎潎我樂兮聖代心融融兮神泄泄伊萬物各得其樂者由聖賢之相契賢致聖于無為聖致時于既濟凝為和兮聚五福發為春兮銷六沴不我後兮不我先適當我兮生之世彼鱗蟲與羽族咸和樂而不知惠我為人兮最靈所以愧賢相而荷聖帝樂乎樂乎泛于渭兮詠而歸聊逍遥以卒嵗望賦劉禹錫邈不語兮臨風境自外兮感從中明晦轉續兮八極鴻蒙上下交氣兮羣生異容發孤照于寸眸騖遐情乎太空物乘化兮多象人遇時兮不同嗟乎有目者必騁望以盡意當望者必縁情而感時有待者瞿瞿忘懐者熈熈慮深者瞠然若喪樂極者沖然無違外徙倚其如一中糾紛兮若斯望如何其望最樂睎慶霄兮遡阿閣如雲兮天顔咫尺如草兮臣心踴躍扇交翟兮葳㽔旗升龍兮蠖略日轉黄道天開碧落凝瑞景于庭樹掬飛煙於殿幕望如何其望且懽登灞岸兮見長安紛擾擾兮紅塵合鬱葱葱兮佳氣盤池象漢兮昭囘城依斗兮䦨干避御史之騘馬逐倖臣之金丸望如何其望彼好宗萬靈兮越四隩漢帝仙臺兮秦皇海嶠霓衣踴乎河上馬跡窮乎越徼紫氣度闗而斐斖神光屬天而照耀睆眷眷以馳精聳専専而觀妙望如何其望有形視蠢蠢兮窮冥冥楚塞氛惡兮蕭闗燧明暈籠孤月角奮長庚沙多似雪磧有疑城煙雲非女子之氣草木盡王者之兵審曳柴之虛警破來騎之先聲信有得于風鳥示無言于斾旌望如何其望且慕恩意隔兮年光騖雕輦已辭兮金屋何處長信草生兮長門日暮傒翠華之儻來仰𤣥天以自訴況復湘水無還漳河空注淚染枝葉香餘紈素風蕭蕭兮北渚波煙漠漠兮西陵樹夫不歸兮江上石子可見兮秦原墓抬琴翻朔塞之音挾瑟指邯鄲之路望如何其望最傷佩環玦兮思帝郷龍門不見兮雲霧蒼蒼喬木何許兮山髙水長春之氣兮悦萬族獨含嚬兮千里目秋之景兮懸清光偏結憤兮九囘腸羨環拱于白榆惜馳暉于落棠諒衝斗兮誰見伊戴盆兮何望平聲豈止蘇武在胡管寧浮海送飛鴻之滅没附隂火之光彩鶴頸長引烏頭未改恨已極兮平原空起何時兮東山在永望如何傷懐孔多降将有依風之感宮人成憶月之歌歌曰張衡側身愁思乆王粲登樓日迴首不作渭濱垂釣臣羞為洛陽拜塵友惜餘春賦李白天之何為令北斗而知春兮迴指于東方水蕩漾兮碧色蘭葳㽔兮紅芳試登髙而望逺極雲海之微茫䰟一去兮欲㫁淚流頰兮成行吟青楓而詠滄浪懐洞庭兮悲瀟湘何餘心之縹緲兮與春風而飄揚飄揚兮無限念佳期兮莫展平原萋兮綺色愛芳草兮如翦惜餘春之将闌每為恨而不淺漢之曲兮江之潭把瑤草兮思何堪想遊女於峴北愁帝子于湘南恨無極兮心氲氲目眇眇兮憂紛紛披衛情于淇水結楚夢于陽雲春每歸兮花開花已䦨兮春改嘆長河之流春送馳波于東海春不留兮時已失老衰颯兮情逾疾恨不得挂長繩於青天繫西飛之白日若有人兮情相親去南國兮往西秦見遊絲之横路網春輝以留人沈吟兮哀歌躑躅兮傷别送行子之将逺㸔征鴻之稍滅醉愁心於垂楊隨柔條以糾結望夫君兮興咨嗟横涕淚兮怨春華遥寄影於明月送夫君於天涯江上愁心賦張説江上之峻山兮鬱崎嶬音儀而不極雲為峰兮煙為色歘變態兮心不識江上之深林兮杳冥蒙而不已鳥為花兮猿為子紛盪瀁兮言莫擬夏雲隂兮若山秋水平兮若天冬沙飛兮淅淅春草靡兮芊芊感四節之黙運知萬化之潜遷伴衆鳥兮寒渚望孤帆兮日邊雖欲貫愁腸於巧筆紡離夢于哀絃是心也非模放之所逮将有言兮是然将無言兮是然别知賦韓愈予取友於天下将嵗行之兩周下何深之不即上何髙之不求紛擾擾其既多或喜能而好修寧安顯而獨裕顧阨窮而共愁惟知心之難得斯百一而為收嵗癸未而遷逐侣蟲虵於海陬遇夫人之來使闢公館而羅羞索微言于亂志發孤笑於羣憂物何深而不考理何隠而不抽始參差以異序卒爛漫而同流何此懽之不可恃遂駕馬而迴輈山嗷嗷其相軋樹蓊蓊其相樛雨浪浪其不止雲浩浩其常浮知來者之不可以數哀去此而無由倚郭郛而掩涕空盡日以遲留愛而不見賦蕭頴士嗟乎或愛之而不見者有矣何必周秦異代夷夏殊軌阻嚴城之九重限方舟之一水苟時事之多怨故人遐而室邇闗山起於足下堂上逺乎千里聳専専之目成遽時逝而復止詩人所以思婉孌而搔首賦城隅之有俟吁不得其已也惟夙昔之良㑹夢佳期于北方欵渤海之三山吸流霞之景光含芳辭以貺予云惠好之不忘顧服義之永日陪遊嬉於帝鄉廣莫忽其飄怒鯨波洶而騰張俄驚魂以輟寐問窮髪之茫茫将揭厲以復從駃風濤之匪量思投軀以靡吝撫遺體以兢惶晨切切以悽愴夕屏營以彷徨追前懽之俯邇歎此恨之悠長於是收神返慮澄澹静黙冥然就寝兀若無識冀良宵之復遇希舊遊之可即徒有願兮且未克憂深沉兮萃胷臆風兮雨兮思君子兮何極傷往賦并序劉禹錫人之所以取貴於蜚走者情也而誕者以遣情為智豈至言耶予受室九年而鰥痛若人之夭閼弗遂也作賦以傷之冀夫覽者有以増伉儷之重云歎獨處之邑邑兮憤伊人之我遺情可殺而猶毒境當懽而復悲人或朝嘆而暮息夫何越月而逾時太極運乎三辰轉寒暑而下馳有歸于無兮盛復于衰猶昧爽之必暮又安得而怨咨我今怨夫若人兮曾旭旦而潜暉飄零日及之萼倐忽蜉蝣之衣川走下而不還露迎陽而易晞恩已甚矣難絶見無期兮永思我行其野農民桑者舉案來饁亦在林下我觀于途裨販之夫同荷均挈荆釵布襦羽毛之蕃鱗介之微和鳴灌叢雙泳漣漪薨薨者蟲蠢蠢伊豸遊空穴深兩兩相比何動類之萬殊必雄雌而與俱物莫失儷以孤處我方踽踽而焉如我復虛室目淒涼兮心伊鬱心伊鬱兮将語誰坐匡牀兮撫嬰兒何所丐沐兮何從仰飴襦袴在身兮昔圍差跌鞶囊附臂兮餘馥葳㽔誠天性之潜感顧童心兮如疑嘵然有難繼之慕漠然減好弄之姿指遺袿兮能認愬空帷兮欲歸我入寢宮痛人亡兮物改其容寶瑟僵兮絃柱絶瑤臺傾兮鏡奩空寒爐委灰虚幌多風隙駟晨轉牕蟾夜通步搖昏兮網粘翡翠芳褥掩兮塵化蛩蛩閱刀尺之餘澤見巾箱之故封翫服儼兮猶具繁華謝兮焉從想翩翻於是非求僁窣與冥蒙信竒術之可致嗟此生兮不逢徒注視以寂聽恍神疲而目窮還抱影以獨出紛百哀而攻中系曰龍門風霜苦别鶴哀鳴夜銜羽吳江波浪深雌劒一去無遺音悲之來兮憤予心洶如行波洊浸淫悵縁情而莫極思執禮以自箴已焉哉苒苒生死悠悠古今乘彼一氣兮聚散相尋或鼓而興或罷而沈以無涯之情愛悼不駐之光隂諒自迷其有分徒終怨于匪忱彼䝉荘兮何人予獨累嘆而長吟夢渴賦何諷不宿食以晨飲困鍾盂以沈寝永春晝而髙扃墮幅巾而横枕及乎酒適衷腸神遊異方煙生喉舌惝然如狂爰瞰甃以窺汲諒不任於呼吸俄據河而俯瀆乃器舟而杯斛倒魚鼈之窟宅見蛟龍之委伏猶胃腸之不浹資宴飲而未足由是奔九江走五湖手不暇於斡運心不息於躊躇見波漸竭而百川如綫岸益高而底淤將枯腹慊爾而未覺肺燥然而不濡尋至大溟茫然連清豈爾浩瀚而吾量不盈斟酌未幾倐見涯涘百靈稽首乞留濡溉吾腹未充豈汝為意俄傾竭於浩渺奄滴瀝而無漬瑤宮貝闕盡列平地三山赤城可以步至鯤鯨噞喁相喣以呬大鵬驚攫巨鼇愕眙四顧燥涸悒然興情此情何竒非吾所知恨滄海之可罄不足充吾之所思周遭有截瑰然墆㙞水府萬族咸呼帝闕帝且不聞吾欲未竭方将尋蟻垤期耿恭問姜母以何在訪舒姑而欲從辨􅆥父於渭上弔相如於臨卭萬計已盡六腑如燼窻日斜照飛蚊遶鬢既驚既覺可嘆可笑飲不盡器枯腸已療搘頥沈吟其意逾深以吾此日之一夢見自古不足者之心唐文粹巻九欽定四庫全書唐文粹巻十宋姚鉉編
