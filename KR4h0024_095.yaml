  text: 重校正唐文粹卷第九十五
  hash: sha256:b3163a2464ee25e8774296dbabab5210c20678e969cca423e68086afcdd71d73
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0024_SBCK_095-1a}
body:
  text: 吳興姚鉉序戊揔一十四首著撰十大統紀序陳鴻三傳指要序劉珂西漢文類序栁宗元樂府古題序元稹崇豐二陵集禮後序栁宗元元和辨謗略序唐次張隱居莊子指要序權德輿注孫子序杜牧般若心經贊序張説釋宗密禪源諸詮序裴休唱和聮題四荆潭唱和集序韓愈聮句詩序呂溫宿天長寺上方唱和詩序權德輿愚溪詩序栁宗元大統紀序陳鴻敘曰臣聞日月星辰紀乎天也山嶽江河紀乎地也曆數正朔紀乎帝也正氣為帝帝天號也統倫羣生冠耀元符牢籠乾坤之精彈壓山川之靈威武薄乎八紘文明光乎百代功格皇天名在祀典以揖讓而登皇極者乃可言矣開曆垂統自始皇焚書為煙燼史官廢紀失傳其本後代儒者鑿天地心胸造生人聞見故諸緯書及皇甫謐譙周之徒得肆言上古之事恃無可驗􅔡開異説臣少學乎史氏志在編年貞元丁酉歲登太常第始間居遂志乃修大紀三十卷正統年代隨甲子紀年書事條貫興廢舉王制之大綱天地變裂星辰錯行興帝之理亡后之亂畢書之通諷諭明勸戒也七年書始就故絶筆於元和六年辛卯自太易至太昊年代史傳無正説且書皇甫謐似是之言昔太吳氏迎日推䇿造甲子臣以為天地立於水城於氣氣萌萬物昌甲而生生主寅帝首太昊歲起攝提故書太昊首甲寅皇甫謐云太昊在位一百一十年又云子孫五十九姓傳丗五萬餘歲又有循飛等九紀亦無定年陶弘景云欲以數紀之生求知百代之上誠可笑矣臣非知古者亦不敢強為發正自太昊至炎帝丗曆無明文存首而巳舜行天子事八十年孔安國注云舜在位五十年三十而徴庸三十年在位歷試二年攝位二十八年服堯喪三年其一在三十之數為天子五十年凡一百一十二歲崩堯帝天下七十載得舜試舜三年一在徴庸正月上月受終于文祖二十八載帝乃殂落堯二十八年合入舜曆通計在位八十一載堯在位七十二載即舜元年丙子帝摰元年乙卯帝嚳元年乙已顓頊元年丁亥少昊元年癸亥黃帝元年癸未炎帝元年癸未以是推之伏子賤最可慿也諸家年代曆不分出益三年當禹薦益於天七年而崩益行天子事三載禹喪畢讓于啓啓賢諸侯歸之益避于箕山之陽禹之聖啓之賢益之讓豈可廢而不明今以大唐元和六年太歲辛卯上推至炎帝元年癸未凡三千六百九年自軒轅至夏殷約丗本以文宣王太史公堯典舜典商書夏書為實録周秦以降則按本朝國史春秋緯書云炎帝子孫帝臨至帝岡又有八代四百餘年據太史公黃帝與炎帝戰于阪泉之野易稱神農氏沒黃帝堯舜氏作今臣依周易史記以黃帝代炎帝緯命曆敘又稱少昊子孫相承十代四百餘年驗緯書起漢哀平間前代儒者好記異聞新進後學耳目固不可驗皇甫謐劉伯莊皆以舜為戊寅年即位在位二十年遂使神農巳來甲子相承錯謬按漢書舜生三十徴庸三十在位五十陟方乃死通服堯喪三年禹崩啓未立使三年何繫今出益三年成禹志且堯禪舜二十八年而崩益行天子事三年為益之事可也大道之行以天下為家何必私三年於啓或云有窮伊尹周公共和如何當夏后相不恢于夏家羿為相臣篡相自立后相奔死商丘浞又殺羿自立少康長乃復夏政自是之後備見於諸家年曆云三傳指要序劉軻先儒以春秋之有三傳若天之有三光然然則春秋蓋聖人之文乎聖人之文天也天其少變乎故詩有變風易有變體春秋有變例變之為義也非介然溫習之所至賾乎其粹者也軻常病先儒各固所習互相矛楯學者凖裁無所豈先聖後經以闢後生者邪抑守文持論敗潰失據者之過邪次又病今之學者涉流而迷源捨經以習傳托直言而不知其所以言此所謂去經緯而從組繢者矣既傳生于經亦所以緯于經也三家者蓋同門而異戶庸得不要其終以會其歸乎愚誠顓蒙敢會三家必當之言列于經下撰成十五卷目之曰三傳指要兾始涉者開卷有以見聖賢之心焉俾左氏冨而不誣公羊裁而不俗榖梁清而不短幸是非殆乎息矣庶儒道君子有以相期於孔氏之門西漢文類序栁宗元左右史混久矣言事駮亂尚書春秋之旨不立自左丘明傳孔氏太史公述曆古今史記迄于今交錯相糾莫能離其説獨左氏國語紀言不參於事戰國䇿春秋後語頗本古史尚書之制然無古聖人蔚然之道大抵促數耗矣而後之文者寵之文之近古而尤壯麗莫若漢之西京班固書傳之吾嘗病其畔散不屬無以考其變欲采比義會年長疾作駑墮日甚未能勝也幸吾弟宗直愛古書樂而成之搜討磔裂捃托融結離而同之與類推移不易時而咸得從其條貫森然炳然若開羣玉之府指揮聮纍圭璋琮璜之狀各有列位不失其序雖弟其價可也以文觀之則賦頌詩歌書奏詔䇿辨論之詞畢具以語觀之則右史記言尚書國語戰國䇿成敗興衰之説大備無不包也噫是可以為學者之端邪始吾少時有路子者自贊為是書吾嘉而序其意而其書終莫能具卒俟宗直也故刪取其序繫于左以為西漢文類首紀殷周之前其文簡而野魏晉已降則蕩而靡得其中者漢氏漢氏之東則既衰矣當文帝時始得賈生明儒術武帝尤好焉而公孫弘董仲舒司馬遷相如之徒作風雅益盛敷施天下自天子至公卿大夫士庶人咸通焉於是宣於詔䇿逹於奏議諷於辭賦傳於歌謡由高帝迄于哀平王莽之誅四方之文章蓋爛然矣史臣班孟堅修其書拔其尤者充于簡册則二百三十年間列辟之逹道名臣之大範賢能之志業黔黎之風美列焉若乃合其英精離其變通論次其序位必俟學古者興行之唐興用文理貞元間文章特盛本之三代浹于漢氏與之相準於是有能者取孟堅書類其文次其先後為四十卷樂府古題序元稹詩訖于周離騷訖于楚是後詩之流為二十四名賦頌銘贊文誄針詩行詠吟題怨歎章篇操引謡謳歌曲詞調皆詩人六義之餘而作者之旨由操而下八名皆起於郊祭軍賔吉凶苦樂之際在音聲以度詞審調以節唱句度短長之數聲韻平上之差莫不由之準度而又區别其在琴瑟者為操引採民氓者為謳謡備曲度者揔得謂之歌曲詞調斯皆由樂以定詞非選詞以配樂也由詩而下九名皆屬事而作雖題號不同而悉謂之為詩可也後之審樂者往往采取其詞度為歌曲蓋選詞以配樂非由樂以定詞也而纂撰者由詩而下十七名盡編為樂府等題除鐃吹橫吹郊祀清商等詞在樂志者其餘木簡仲卿四愁七哀之輩亦未必盡播於管弦明矣後之文人逹樂者少不復如是配别但遇興紀題往往兼以句讀短長為歌詩之異劉輔闕云樂府肇於漢魏按仲尼學文王操伯牙作水伶操齊牘沐作雉朝飛衛女作思歸引則不於漢魏而後始亦以明矣況自風雅至於樂流莫非諷興當時之事以貽後丗之人沿襲古題唱和重復於文或有短長於義咸為贅媵尚不如寓意古題刺美見事猶有詩人引古以諷之義焉曹劉沈鮑之徒時得如此亦復稀少近代惟詩人杜甫悲陳陶哀江頭兵車麗人等凡所歌行率皆即事名篇無有倚傍余少時與友人白樂天李公垂輩謂是為當遂不復擬賦古題昨南梁州見進士劉猛李餘各賦古樂府詩數十百中一二章咸有新意豫因選而和之其有雖用古題全無古義者若出門行不言離别將進酒特書列女之類是也其或頗同古義全創新詞者則因家止述軍輸捉捕請先螻蟻之類是也劉李二子方將極意於斯文因為粗明古今歌詩同異之旨焉崇豐二陵集禮後序栁宗元傳曰詩書執禮禮不執則不行自開元制禮大臣諱避去國恤章而山陵之禮遂無所執丗之不學者乃妄取預凶事之説而大典闕焉由是纍聖山陵皆托拾殘缺附比倫類巳乃斥去其後莫能徴永貞元和間天禍仍遘自崇陵至于豐陵不能周歲司空杜公由太常相天下連為禮儀使擇其僚以備損益於是河東裴瑾以太常丞隴西辛祕以博士用焉內之則攢塗祕器象物之冝外之則復土因山之制上則顧命典䇿與文物以授萬國下則制服節文頒憲以示四方由其肅恭無不備具包并總統千載之盈縮羅絡旁午百氏之異同搜揚翦截而畢得其中顧問關決而不悖於事議者以為司空得其人而邦典不墜裴氏乃悉取其所刋定及奏復于上辨列於下聮百執事之儀以為崇豐二陵集禮藏於太常書閣君子以為愛禮而近古焉昔韋孟以詩禮傳楚而郊廟之制卒正於玄成鄭玄以箋注師漢而禪代之儀卒集於小同賈誼以經術起而嘉最好學盧植以儒學用而諶為祭法舊史咸以為榮今裴氏太尉公以禮匡義嗣侍中公以禮儀封禪祠部公以禮成大事大理公以禮輔東官而瑾也以禮奉二陵又能成書以充其闕其為愛禮近古也源遠乎哉瑾字豐叔其伯仲咸以文學顯於丗大理之兄正平節公以儀範成家道以文雅經邦政今相國郇公其宗子也郇公以孝友勤勞揚于家邦遊其門若聞韶頀入其廟如至鄒魯恩溢乎九族禮儀於他門則豐叔之習禮也其出於孝悌歟由於家而逹於邦國其榮於史氏也果矣元和辨謗略序唐次唐聞乾坤定而上下分矣至於播四時之候遂萬物之冝在驗乎妖祥之二氣祥氣降則為豐為茂妖氣降則為沴為災君臣立而卑高隔矣至於處神明之奧詢獻納之辭在審乎邪正之二説正言勝則為忠為讜邪言勝則為讒為諛故詩云萋兮斐兮成是貝錦刺其組織之甚巧也語曰邪徑敗良田讒口亂善人惡其莠言之蠧政也蓋謂似信而詐似忠而非便便可以動心捷捷可以亂聽豈止鵜鴂雕卉薏苡惑珠者哉況立國立家自中徂外道偏則刑罰不中讒勝則忠孝靡彰逖覽前聞𬗟思近古招賢容鯁逺佞嫉邪慮之則深防之未至伏惟睿聖文武皇帝陛下垂衣御宇化洽文明謨猷博訪於搢紳旌賁屢臻於巖穴尚復廣四目周四聰制治皆在於未萌作範將垂於不朽乃詔掌文之臣令狐楚等上自周漢下洎隋朝求史籍之忠賢罹讒謗之事迹敘瑕舋之本末紀謡詠之淺深編次指明勒成十卷昔虞舜有堲讒之命我皇修辨謗之書千古一心同垂至理將俟法宫退日􅉴之政别殿備乙夜之觀則聖慮先辨謗何由興上天不言而人自信矣張隱居莊子指要序權德輿今之畸人有隱居張氏者治莊生內外雜篇以向郭舊注未盡采其旨乃為之訓釋猶懼學者之蕩於一端泥於一説又作三十三篇指要以明之蓋弘道以周物闡幽以致用內外相濟始終相發其文約其旨明纍如珠貫渙若氷釋既而以豫嘗所蘄嚮俾敘而辨之為道之用也經天地該萬物內化者可以澤四海外化者可以冥是非沂然順物內外偕化得其環中以應無窮古之善為道者如此洎乎性命耳目之相軋也不勝於物則相刃相劘徇乎無涯氣耗乎名聲之域心鬪於彼是之境螴蜳滑涽封執逆旅懼力不足而羣奔舛馳莊生哀其如是乃退廣柱下之説弛張變化未始離乎道用虛靜恬淡無為無本焉故其言后王撫丗也則曰靜而聖動而王無為也而尊其言君子行道也則曰時命大行乎則返一無迹大窮乎則深根寧極窒乎欲則曰休影息迹逹乎生則曰外形委蛻其放言大觀也則齊彭殤一堯桀等周公於猿狙比大舜於豕虱或至大適以為纍或至細乃牽乎用斯豈窮鄉一曲者所能通故有內外雜篇之異然則道之於物無不繇也行之者視其分隨其方而揭厲之則為家為邦為仁為智遊之泳之日漸漬之化與心成不知所自則昧者皎躁者靜循之而愈照冥之而愈妙䙬寧懸解豈遠人哉隱居之意明此而巳矣隱居名九垓别號渾淪子老於是學遍遊名山無常居不粒食與土木鳥獸同其外而中明也如是向使與漆園同代如丘明受經於仲尼矣其顔成子南榮趎之徒歟豫摳衣於君實所辱命粗舉莊生之略直書隱居之志以冠于篇注孫子序杜牧兵者刑也刑者政事也為夫子之徒實仲由冉有之事也今者據按聽訟械繫罪人笞死于市者吏之所為也驅兵數萬撅其城郭係纍其妻子斬其罪人亦吏之所為也木索兵刃無異意也笞之與斬無異刑也小而易制用力少者木索笞也大而難制用力多者兵刃斬也俱期於除去惡民安活善人為國家者使教化通流無敢輒有不由我而自恣者其取吏也無他術也無異道也俱止於仁義忠信智勇嚴明也茍得其道一二者可以使之為小吏盡得其道者可以使之為大吏故用力少者其吏易得也功易見也用力多者其吏難得也功難就也止此而巳無他術也無異道也自三代巳降皆由斯也子貢頌夫子之德曰文武之道未墜於地在人賢者識其大者遠者不賢者識其小者近者季孫問冉有曰子於戰學之乎性逹之也對曰學之李孫曰事孔子惡乎學冉有曰即學於孔子孔子者大聖兼該文武並用適聞其戰法猶未之詳也復不知自何代何人分為二道曰文曰武離而俱行因使搢紳之士不敢言兵或恥言之茍有言者丗以為粗暴異人人不比數嗚呼亡失根本斯最為甚周公相成王制禮作樂尊大儒術有淮夷叛則出征之夫子相魯公會于夾谷曰有文事者必有武備叱辱齊侯伏不敢動是二大聖人豈不知兵乎周有齊太公秦有王翦兩漢有韓信趙充國耿弇虞詡假潁魏有司馬懿吳有周瑜蜀有諸葛武侯晉有羊祜杜公元凱梁有韋睿元魏有崔浩周有韋孝寬隋有楊素國朝有李靖李績裴行儉郭元振如此人者當其一時其所出計畫皆考古校今竒祕長遠䇿先定於內功後成於外彼壯健輕死善擊刺者供其呼召指使耳豈可知其所由來哉牧幼讀禮至于四郊多壘卿大夫之辱也謂其書真不虛説年十六時見盜起圓二三千里係戮將相族誅刺史及其官屬尸塞城府山東崩壞殷殷焉聲振朝廷當其時使將兵行誅者則必壯健善擊刺者卿大夫行列進退一如常時笑歌嬉遊輒不為辱非當辱不辱以為山東亂事非我輩所宜當知牧自此謂幼所讀禮真妄人之言不足取信不足為教及年二十始讀尚書毛詩左傳國語十三代史書見其樹立其國滅亡其國未始不由兵也主兵者聖賢材能多聞博識之士則必樹立其國也壯健擊刺不學之徒則必敗亡其國也然後信知為國家者兵最為大非賢卿大夫不可堪任其事茍有敗滅真卿大夫之辱信不虛也因求自古以兵著書列於後丗可以教於後生者凡十數家且數萬言其孫武所著十三篇自武死後凡千歲將兵者有成者有敗者勘其事迹皆與武所著書一一相抵當猶印圈模刻一不差跌武之所論大約用仁義使機權也武所著書凡十數萬言曹魏武帝削其繁剩筆其精切凡十三篇成為一編曹自為序因注解之曰吾讀兵書戰䇿多矣孫武深矣然其所為注解十不釋一此者蓋非曹不能盡注解也豫尋魏志見曹自作兵書十餘萬言諸將征伐皆以新書從事從令者尅捷違教者負敗意曹自於新書中馳驟其説自成一家事業不欲隨孫武後盡解其書不然者曹豈不能邪今新書巳亡不可復知豫因取孫武書備其注曹之所注亦盡存之分為上中下三卷後之人有讀武書豫解者因而學之猶盤中走丸丸之走盤橫斜圎直計於臨時不可盡知其必可知者是知丸不能出於盤也議於廊廟之上兵形巳成然後付之於將漢祖言指蹤者人也獲兔者犬也此其是也彼為相者曰兵非吾事吾不當知君子曰叨居其位可也般若心經贊序張説萬行起心心人之主三乘歸一一法之宗知心無所得是真得見一無不通是玄通如來説五藴皆空人本空也如來説諸法空相法亦空也知法照空見空捨法二者知見復非空邪是故定與慧俱空中法入此門者為明門行此路者為超路非夫行深波若者其孰能證於此乎祕書少監駙馬都尉滎陽鄭萬鈞深藝之士也學有傳癖書成草聖乃揮灑手翰鐫刻心經樹聖善之寶坊啓未來之華業佛以無依相而説法本不生我以無得心而傳今則無滅道存文字意齊天壤國老張説聞而嘉焉讃揚佛事題之樂石釋宗密禪源諸詮序裴休禪師集禪源諸詮為禪藏而都敘之休曰未曾有也自如來現丗隨機立教菩薩間生據病指藥故一代時教開深淺之三門一真淨心演性相之别法馬龍二士皆弘調御之説而空性異宗能秀二師俱傳逹磨之心而頓漸殊稟天台專依三觀牛頭無有一法江西舉體全真荷澤直指知見其他空有相破真妄相攻反奪順取密指顯説故西域中夏其宗實繁良以病有干源藥生多品投機隨器不得一同雖俱為證悟之門盡是正真之道然諸宗門下通少局多故數十年來師法益壞以承稟為戶牖各自開張以經論為干戈互相攻擊情隨函矢而遷變法逐人我以高低是非紛拏莫能辨析則向者丗尊菩薩諸方教宗適足以起諍後人增煩惱病何利益之有哉圭峯大師久而歎曰吾丁此時不可以默矣於是以如來三種教義印禪宗三種法門融瓶盤叉釧為一金攪酥酪醍醐為一味振綱領而舉者皆順據會要而來者同趨尚恐學者之難明也又復直示宗源本末真妄之和合空性之隱顯法義之差殊頓漸之同異遮表之回互權實之深淺通局之是非莫不提耳而告之指掌而示之嚬伸以吼之柔和以誘之乳而藥之憂性命之夭傷也保而護之念水火之漂焚也挈而導之懼邪小之逆陷也揮而散之悲鬪靜之牢固也大明不能破長夜之昏慈父不能保身後之子若吾師者捧佛日而委曲回照疑曀盡除順佛心而橫亘大悲窮劫蒙益是則丗尊為闡教之主吾師為會教之人本末相符遠近相照可謂畢一代時教之能事矣或曰自如來滅後未嘗大都而通之今一旦違宗趣而不守廢關防而不據無乃乖祕藏密契之道乎答曰佛於法華經涅槃會中亦以融為一味但昧者不覺故涅槃經云迦葉菩薩曰諸佛有密語而無密藏丗尊讃之曰如來之言開發頭露清淨無翳愚人不解謂之祕藏智者了逹則不名藏此其證也故王道興則外戶不閉而守在戎夷佛道備則諸法揔持而防在外魔不當復執情攘臂於其間也嗚呼後學者當取信於佛無取信於人當取證於本法無取證於末習能如是則可以報圭峯大師劬勞之德矣荆潭唱和詩序韓愈從事有示愈以荆潭酬唱詩者愈既受以卒業因仰而言曰夫和乎之音淡薄而愁思之聲要妙歡愈之辭難工而窮苦之言易好也是故文章之作恆發於羇旅草野至若王公貴人氣得志滿非性能而好之則不暇以為今公開鎮蠻荆統郡惟九常侍楊公領湖之南攘地二千里德刑之政並勤爵祿之報兩崇乃能存志乎詩書寓辭乎詠歌往復循環有唱斯和搜竒抉怪雕鏤文字與韋布里閭憔悴專一之士較其毫釐分寸鏗鏘發金石幽眇感鬼神信所謂材全而能巨者也兩府之從事與部屬之吏屬而和之苟在編者咸可觀也宜乎施之樂章紀諸册書從事曰子之言是也告於公書以為荆潭唱和詩序聮句詩序吕溫河東柳茂直與余有藩楊之睦且道義相得也余兄弟志守拙默不交當丗晨昏之外靖專一室顧我者惟茂直而巳以為切磋蓋常事討論有宴息導志氣徒然起憤議時世豫欲無言其或晴天曠景浩蕩多思永夜高月耿耿不寐或風露初曉恍若有得或煙雨如晦𬗟懷所思不然何以節宣慘舒暢逹情性其有易於詩乎乃因翰墨之餘琴酒之暇屬物命篇聮珠唱玉審韻諧律同聲則應研情比象造境皆會亦猶衆壑合注􅐛為大川羣山出雲混成一氣朗宣五色微闡六義雖小道必有可觀其在兹矣茂直命余序述存以編簡俾後之觀者知吾黨所立之濫觴崔吏部衛兵部同南縣尉日宿天長寺上方唱和詩序權德輿易之同人曰文明以健中正而應故道同於內而氣相求情發於中而聲成文以觀以羣以比以興清河崔處仁河東衛從周於是有清秋仁祠往復十七韻之作初二賢皆以秀造分校祕府弘文之書貞元初同為渭南尉聮曹結綬相視莫逆處仁自府庭旋歸稅駕於斯國門勝槩康莊在下馳車徒而走聲利者此為咽喉外煩埃壒中孕間曠晝懸清光夕湛虛明上方之鐘磬深夜之月露眺聽寂寞情靈感發投者報者無非瓊瑶如金絲應和孔翠翔集盡在是矣厥後同為左右補闕從周以本官入為翰林學士處仁纍以尚書郎知制誥既而處仁西垣即真從周復以外郎掌誥洎處仁遷小宗伯而從周即真俄掌貢舉實為之代元和三年秋處仁為吏部侍郎從周為兵部侍郎重九休浣聮鑣道舊永懷曩篇二紀于兹慮屋壁之隙壞詩文之磨滅不若刻勒片石之為堅且久也惟二賢大雅閎逹人倫龜玉更為王楊迭為田蘇便蕃清近烜赫章大其於為霖為礪四方之屬耳目久矣然則志氣之所舒英華之所攄其濫觴於此乎德輿與二君子同為諌官同掌書命相繼典貢士分曹居中臺其間交代迭處不可具舉敢叨益者之數實恱同心之言追琢既具序夫本末亦二君子之志也愚溪詩序栁宗元灌水之陽有溪焉東流入於瀟水或曰冉氏常居也故姓是溪為冉溪或曰可以染也名之以其能故謂之染溪余以愚觸罪謫瀟水上愛是溪入二三里得其尤絶者家焉古有愚公谷今余家是溪而名莫能定土之居者猶斷斷然不可以不更也故更之為愚溪愚溪之上買小丘為愚丘自愚丘東北行六十步得泉焉又買居之為愚泉愚泉凡六穴皆出山下平地蓋上出也合流屈曲而南為愚溝遂負土纍石塞其隘為愚池愚池之東為愚堂其南為愚庭池之中為愚島嘉木異石錯置皆山水之竒者以余故咸以愚辱焉夫水智者樂也今是溪獨見辱於愚何哉蓋其流甚下不可以溉灌又峻急多坻石大舟不可入也幽邃淺狹蛟龍不屑不能興雲雨無以利丗而適類於余然則雖辱而愚之可也寧武子邦無道則愚智而為愚者也顔子終日不違如愚睿而為愚者也皆不得為真愚今余遭有道而違於理悖於事故凡為愚者莫我若也夫然則天下莫能爭是溪余得專而名焉溪雖莫利於丗而善鑒萬類清瑩秀徹鏘鳴金石能使愚者喜笑眷慕樂而不能去也余雖不合於俗亦頗以文墨自慰漱滌萬物牢籠百態而無所避之以愚詞歌愚溪則茫然而不違昏然而同歸超鴻蒙混希夷寂寥而莫我知也於是作八愚詩紀於溪石上重校正唐文粹卷第九十五嘉靖甲申歲太學生姑蘇徐焴文明刻于家孰
