body:
  text: 吳興姚鉉纂古賦戊一首海潮賦并序及進賦狀盧肇夫潮之生因乎日也其盈其虛繫乎月也古君子所未究之將為之辭猶憚夫有所未通者故先序以盡之肇始窺堯典見曆象日月以定四時乃知聖人之心蓋行乎渾天矣渾天之法著隂陽之運不差隂陽之運不差萬物之理皆得萬物之理皆得其海潮之出入欲不盡著將安適乎近代言潮者皆驗其及時而絶過朔乃興月弦乃小羸月望乃大至以為水為隂類牽於月而高下隨之也遂為濤志定其朝夕以為萬古之式莫之逾也殊不知月之與海同物也物之同能相激乎易曰天地睽而其事同也男女睽而其志通也夫物之形相睽而後震動焉生植焉譬猶烹飪置水盈鼎而不爨之欲望膳羞之熟成五味之美其可得乎潮亦然也天之行健晝夜復焉日傅于天天右旋入海而日隨之日之至也水其可以附之乎故因其灼激而退焉退於彼盈於此則潮之往來不足怪也其小大之期則制之於月大小不常必有遲有速故盈虧之勢與月同體何以然日月合朔之際則潮殆微絶以其至隂之物邇於至陽是以陽之威不得肆焉隂之輝不得明焉隂陽敵故無進無退無進無退乃適平焉是以月之與潮皆隱乎晦此潮生之實驗也其肭其朓則潮亦隨之乃知日激水而潮生月離日而潮大斯不刋之理也古之人或以日如平地執燭遠則不見何甚謬乎夫日之入海其必然之理乎且自朔之後月入不盡晝常見焉以至於望自望之後月出不盡晝常見焉以至於晦見於書者未嘗有光必待日入於海隔以映之受光多少隨日逺近近則光少逺則光多至近則甚虧至逺則大滿此理又足證夫日至于海水退于潮尤較然也肇適得其旨以潮之理未始著於經籍間以類言之猶乾坤立則易行乎其中易行乎其中則物有象焉物有象而後有辭此聖人之教也肇觀乎日月之運乃識海潮之道識海潮之道亦欲推潮之象得其象亦欲為之辭非敢衒於學者蓋欲請示千萬祀知聖代有苦心之士如肇者焉賦曰開圓靈於混沌包四極以永貞立天之道赩至陽之元精謂日也作寒暑與晦明截穹崇以高步涉浩漾而下征回龜鳥於兩至冬至日在南斗玄武之體故云龜夏至日在東井朱雀之體故云鳥也曽不愆乎度程其出也天光來而氣曙其入也海水退而潮生何古人之守惑謂滋濤之不測安有夫虞泉之鄉沃焦之域棲悲谷以成暝浴濛汜而改色巨鰌隱見以作規介人呼吸而為式陽侯玩威於鬼工伍胥泄怒乎忠力是以納人於聾昧遺羞乎後代曽未知海潮之生兮自日而太隂裁其小大也今將考之以不惑之理著之於不刋之辭陳其本則晝夜之運可見其影響言其徴則朔望之候不爽乎毫釐豈不謂乎有耳目之疾而霩將判乎神醫者也粵若太極分隂分陽陽為日故節之以分至啓閉隂為水故霏之以雨露雪霜雖至賾而可見雖至大而可量豈謂居其中而不察乎渺漠亡其外而不考其茫洋者哉故水者隂之母日者陽之祖陽不下而昏曉之望不得成隂不升而雲雨之施不得覩因上下之交泰識洪濤之所鼓胡為乎曆象取其枝葉而迷其本根也策其涓滴而喪其泉源也諸家不言海潮之由也於是欲抉其所迷而論之採其所長而存之光乎廓乎汨磅礴乎差瀴溟之無際曷鴻濛而可以盡度乎乃知夫言潮之𥘉心遊六虛索蜿蜒乎乾龍駕轇轕乎坤輿知六合之外洪波無所泄但隨二至升降而巳識四海之內至精有所儲元氣常運萬物自成不然何以使百川赴之而不溢萬古揆之而靡餘也是乃察乎濤之所由生也駭乎哉彼其為廣也視之而蕩蕩矣彼其為壯也欱乎其沆沆矣其增其羸其難為狀矣當夫巨浸所稽視無巔倪洶湧澒洞窮東極西浮厚地也體定謂地浮於水天在氷外也半圎天而勢齊謂隂陽上下各一半也謂無物可以激其至大故有識而皆迷及其碧落右轉陽精西入始作潮也抗雄威之獨燥卻衆柔之繁濕高浪瀑以旁飛駭水洶而外集霏細碎以霧散屹奔騰以山立巨泡丘浮而迭起飛沫電烻以驚急且其日之為體也若熾堅金圎徑千里周髀法日日徑千里周三千里土石去之稍邇而必焚魚龍就之雖逺而皆靡何海水之能逼而不澎濞沸渭以四起故其所以凌鑠其所以薄激者莫不魄落焯鑠如㸑巨鑊赩兮不可探乎巟巟之內呀焉若天地之有齦齶其始也漏光迸射虹截宇縣拂長庚而尚隱帶餘霞而未殄其漸沒豿虎菌反兮若后羿之時平林載馳驅貙虎與兕象懾千熊及萬羆呀偃蹇而矍鑠忽劃礫而齹此何反意宜反齒露不齊之貌其少進也若兆人􅌭紛填城溢郭蹄相蹂蹙轂相摩錯閧闉澶漫淩強侮弱倐皇輿之前蹕孰不奔走而揮霍及其勢之將極也涾兮若牧野之師昆陽之衆定足不得駭然來奔騰千壓萬蹴搏沸亂雄稜後閼懦勢前判懾仁兵而自僵倐谷呀而巘斷此者皆海濤遇日之形聞者可以識其畔岸也賦未畢有知玄先生諷之曰斯義也古人未言吾將耀乎文墨之場以貽永久為天下稱揚爰有博聞之士駭潮之義始盱衡而抵掌俄噤虛禁反齘虛介反而愕眙攬衣下席蹈足掀臂將欲致詰領畫天地久之而乃謂先生曰伊潮之源先賢未言枚乘循涯而止記其極木華指近而未考其垠焉有末學後塵遽荒唐而敢論先生矍然而疑乃因其後推車捧席執腒音渠乾雉也儀禮士相見春夏用腒秋冬用雉伺顔言之少間請見徴之所加客乃曰人所不知而不言不謂之訥人所未識而不道不謂之愚彼亦何敢擅談天之美斡究地之羭指溢漭之難悟欲蠱聽於羣儒今將盡索乎彼潮之至理何得與日月而相符且大章所步大章禹臣禹使步量地理者也東西有極容成叩玄隂陽巳測容成黃帝臣帝遣造曆日陽秀受乎江政玄冥佐乎水德莫不窮海運稽日域及周公之為政也則土圭致晷謂量日影千里而差一寸也周髀作則即勾股算法周人以髀為勾以股為周以算乃知日之逺近也禆竈窮情乎天象禆竈鄭大夫善知天文者子雲贊數於幽默楊雄作太玄經分八十一首七百二十九贊以定隂陽之數者也張衡考動以鑄儀謂地動儀淳風述時而建式謂作乙巳占以儀立式以定星辰也彼皆凝神於經緯之間極思乎圓方之壼胡不立一辭於滋潮以明乎繫日之根本也先生苟竒之胡不思之先生將寶之胡不考之自此巳下發十四問苟由日升當若凖若繩何春夏差小其一問而秋冬勃興其二問其逾朔也當少進何遽激而斗增其三問月二日潮便大也其過望也當少退何積日而慿凌其四問十八日潮勢何故更大也晝何常微其五問晝潮皆小也夜何常大其六問潮比晝勢校大海人知之何錢塘洶然以獨起殊百川之進退其七問何仲秋忽爾而自興異三時之滂霈其八問日之赫焉猶火之烈火至水中其威乃絶入洪溟以深漬何日光而不滅其九問潮之往來既云因日日唯一沈潮何再出其十問萬流之多匪江匪河發自畎澮往成天波終古不極盍沈四國何成彼潮而小大一式其十一問為潮之外水歸何域十二問又云水實浮地在海之心日潛其下而逢彼太隂且其土厚石重山峻川深投塊置水靡有不沈豈同其芥葉而泛以蹄涔繄坱北之至大何水力之能任十三問吾聞之天地噫音隘氣有吸有呼晝夜成候潮乃不踰其十四問豈由日月之所運作誇誕以相誣者哉先生閲賦之初深通厥旨及聞客論聽然啓齒於是謂客徐坐善聽厥辭蓋聞南越無頒冰之禮鄭人有市璞之嗤常桎梏於獨見終沈溺於羣疑既别白而不悟爰提耳而告之然事有至理無爭無勝猶權衡之在懸審錙銖而必應稽海潮之奧旨諒余心之足證當為子窮幽而洞冥豈止於揆物而稱哉答第一問夫日北而燠陽生於復震下坤上復將論日之升降隂陽之大體故假周易復姤二卦以明之也離南斗而景長冬至後日漸近比故晝漸長日進一度故也邇中都而夜促當是時也氣蒸川源潤歸草木既作雲而泄雨乃襄陵而溢谷魚龍發坼於胎卵鳥獸含滋於孕育且水生之數一而得土之數六不測者雖能作於溟渤苟窮之當無羡於升掬其散也為萬物之腴其聚也歸四海之腹歸則視之而有餘散則察之而不足春夏當氣散之時故潮差而小也答第二問及其日南而涼隂生於姤巽下乾上姤退東井而延夕夏至後日漸近南故夜長也逺神州而減晝當是時也草木辭榮風霜入候水泉閉而上涸滋液歸而下湊瘁萬物以如燖空大澤而若漏縮於此者盈於彼信吾理之非謬秋冬當氣聚之時故潮差而大也答第三問兩曜之形大小唯敵既當朔以制威陽雖盛而難迫其離若爭其合如擊始交綏而並鬪合朔之次非無物喻之故比乎交綏也終摩壘而先釋月行疾合朔乃過故比乎摩壘也日沮其雄水凝其液既冒威於一朝信畜怒乎再夕且潮之所恃者月趣隂類也所畏者日避陽威也月違日以漸遙水畏威而乃溢亦猶羣后納職來簉王門獲命以出望寧而奔引百寮而盡退何一迹之敢存此潮象之所以至二日而斗增也答第四問黃道所遵遐邇巳均肆極陽而不礙故積水而皆振自朔而退哉生魄之後左行漸逺於日也退為順式自望而進自望之後在日之右漸逼於日也進為干德稍稍近日若來干犯之也伊坎精之既全將就晦而見逼勢由望而積壯故信宿而乃極此潮之所以後望二日而方盛也答第五并第六問自曉至昏潮終復始陽光一潛水復迸起復來中州逾八萬里周天法一面出入八萬里其勢涵淡無物能弭周天法一面去日八萬一千一百九十九里有竒也分晝於戌作夜於子子前為早潮子後為晚潮一云戌前為早潮亥後為晚潮子之前日下而隂滋子之後日上而陽隨滋於隂者故鑠之於水而不能甚振隨於陽者故迫之為潮而莫肯少衰此潮所以夜大而晝稍微也答第七問嘗信彼東遊亦聞其揆賦之者究物理盡人謀水無逺而不識地無大而不搜觀古者立名而可驗何天之造物而難籌且浙者折也蓋取其潮出海屈折而倒流也夫其地形也則右蟠吳而大江覃其腹左挾越而巨澤灌其喉獨兹水也夾羣山而逺入射一帶而中投夫潮以平來百川皆就浙入既深激而為鬪此一覽而可知又何索於詳究答第八問羣隂既歸水與天違當宵分之際謂八月也避至烈之輝因圎光之既對引大海以羣飛太玄經云海中飛羣夫秋之中而隂盛亦猶春之半而陽肥事苟稽於巳著理必辨於猶微故濤生於八月之望者尤岌岌而巍巍也答第九問萬物之中分日之熱謂三才之中各有火也叩琢鑽研其火乃烈吹煙得焰傳薪就爇附於堅則難銷焚於稿則易絶所依無定遇水乃滅太陽之精火非其匹至威無焰至精有質入四海而水不敢濡照八紘而物莫能屈就之者咸得其光輝仰之者不知其何物其體若是豈比夫寒灰死炭遇濕而同漂汨哉答第十問方輿之下陽祖所回歷亥子而右盛逾丑寅而左來右激之逺兮逺為朝左激之逺兮逺為夕既因月而大小成亦隨時而前後隔此日之所以一沈而潮之所以兩析也答第十一問天地一氣也隂陽一致也其虛其盈隨日之經界寒暑之二道將無差於萬齡故小大可法而乾坤永寧也答第十二問若夫雲者雨者風者霧者為雪為霜者為雹為露者雷之所鼓者龍之所赴者羣生之所賦者萬物之所附者彼皆與日而推移所以就其衰而成其茂也然後九圍無餘而萬流為之長輔談未竟客又勦而言曰若乃寒暑定而風雨均也吾聞之洪範云豫常燠急常寒狂乃隂雨為沴僭則陽氣來于苟日月之躔一定又何逺於王政之大端彼有後問姑紓前言夫三才者其德之必同天以陽為主地以隂為宗參二儀之道在一人之躬一人行之三才皆協德順時則雨霽均行逾常則凶荒接僭慢所以犯陽德也故曝尫莫之哀狂急所以犯隂德也故離畢為之災此則為政之所致非可以常度而剸裁也客曰唯其餘如何復從而解之曰蒼第十三問惟坤與乾余常究焉清者浮於上濁者積於淵濁以載物為德清以不極為玄載物者以積鹵負其大鹵鹹水也所以能浮厚地也不極者以上規奠其圎北辰不動謂之上規也故知鹵不積則其地不能載玄不運則其氣無以宣夫如是山嶽雖大地載之而不知其重華夷雖廣鹵承之而不知其然也氣之輕者其升乃高故積雲如嶽不駐鴻毛輕而清也而物莫能勞及其于霄勢窮霏然下墜謂為雨者也隨坳壑而虛受任畎澮之疏潰著則重也故舟楫可以浮寄至夫離九天堙九地作重隂之膠固自堅冰以馴致固可以乘鴻溟以自安受萬有而不圯者也聽兹言較兹道定一陽之所宗何衆理之難考且合昏知暮而翰音司晨安有懷五常之美預率土之濵苟無諒乎此旨亦何足齒於吾人答第十四問子以天地之中元氣噫音億噦為夕為朝且登且沒泛辭波而甚雄處童蒙而未發孰觀地喙乎深泉之涯孰指天吭乎巨海之窟既無究於兹源寧有因其呼吸而騰勃者哉客謝曰辭既巳矣欲入壼奧願申一問先生幸以所聞教之嘗居海裔覿潮之勢或久往而方來或合沓而相際曷舛互之若斯今幸指乎所制先生撰屨旁眄亦窮其變吾因訊夫墨客當大索其所見彼亦告於余曰日往月來氣迥天轉其激也大則體盛而相踈其作也小則勢接而相踐惟體勢之可準故合杳而有羡其何怪焉客乃跽軀斂色交𬒮而辭彼圓玄方賾古惑今疑歎載籍之不具恨象數之尚遺方盡迷於閫域非先生親得於學者而孰肯論之於是乎若卵判雛生鼓擊聲隨雷電至而幽蟄起蛟龍升而雲雨滋形開夢去醒至酲離既手之舞之足之蹈之乃避席而稱詩為賀庶知玄先生之辭辭曰噫哉古人迷潮源兮刓編齾翰曾未言兮羅虛列怪無藩垣兮名儒幽討理可尊兮高駕日域窺天門兮濤疑一釋永立言兮若和與扁祛吾惛兮昔之論者何其繁兮意摩心揣秪為歡兮隂陽數定水長存兮進退與日遊混元兮一升一降兮寒暑成下凝濁兮上浮清隨盈任縮兮浮四𬈑釡鎘蒸爨兮擬厥形願揚此辭兮顯為經高誇百氏兮貽億齡先生曰彼能賦之子能演之非文鋒之破鏑何以解乎群疑客乃酣然自得油然而退也海潮賦後序夫以璿樞顯視周四七而成文王琯潛聆載十二而分統肇有慿翼生乎象先雖迷放屬之源終識踆躔之數是以迎推洞乎三合分至貞乎四禽既測洪荒暸分清濁於是九圍所沓必揆於靈臺萬古無差可徴於幽贊且彤車白馬先命羲和紫極黃龍次分甘石雖東流不溢天問猶疑而北戶承陽地維何隱稽夫儒氏之業也莫不咸思蟻轉盡愧雞如安可命曰三靈或迷其二大愚以始聞方數則揆玄黃亦嘗以大竇酬嘲敢云早惠既不用蛉膠習戲自鄙童心及竊譽思中拘塵長者執經堂奧避席嚴師自悟牖間愧非胡廣頻依廡下虛感伯通而日月居諸榆槐屢改管窺之心妄切瞽史之學難修而又爛額焦頭方思馬褐捉襟見肘久困牛衣颯垂領以若驚顧生髀而增歎信天人之際難可究思考經緯之文固有宗旨竊以海潮之事代或迷之今於賦中盡抉疑滯輒依洛下閎張平子何承天等以渾天為法水與地居其半日月繞乎其下以證夫激而成潮之理并納華夷郡國環以二十八宿黃道所交及立北極為上規南極為下規以正乎日月之所由升降其理昭然可辨謂之潮圖施諸粉繢庶將無闕𬗟螢囊之巳久撫魚網而多慙敢避識者之譏固受不知之罪云耳日至海成潮入圖法八月之望日在翼軫之間此時潮最大今立此望之夕日入初於時在戌見潮初生之候渾天載地及水法地浮於水天在水外天道右轉七政左旋日入則晚潮激於左日出則早潮激於右潮之小大則隨於月月近則小月遠則大右此賦中具論之矣新定海潮集解渾天古今正法圖自古説天有六一曰渾天張衡所述二曰蓋天周髀以為法三曰宣夜無師法四曰安天虞喜作五曰昕天姚信作六曰穹天虞聳作自蓋天巳下並好竒徇異之説非至説也先儒亦不重其術也右今撰賦及圖定取渾天為法其增立渾天之術自張平子始言天地狀如雞子天包於地周旋無端其形渾渾故曰渾天也渾天法晉葛洪謂天形如雞子地如雞子之黃周天三百六十五度四分度之一半覆地上半繞地下二十八宿半隱半見宋何承天云乃觀渾儀研求天意乃悟天形正圎水居其半中高外卑水周其下梁祖烜云渾天之形內圎如彈丸其半出地上半隱地下右今撰圖正用此法但諸家能言天形而未知日之激水而成潮也又按周易離為日坤為地日出地上於卦在晉日入地下卦為明夷乾為天坎為水天右旋入水為夕則天在水下於卦為需天左旋升出為朝於卦在訟又離為日坎為水日出水上卦為未濟濟之言涉也日東出而未西涉水此其象也日入水下卦為既濟言日右隨天入巳涉干海則周易之象其事較然右今撰潮圖探於周易合乎渾天推於爻象故賦指復姤二卦以定隂陽言不及渾天而乖誕者凡五家莊子逍遙篇玄中記王仲任論衡言日不入地山經釋氏言四天乙已占具解訖右並無證驗不可究尋王仲任徒肆談天失之極逺桓君山攻之巳破此不復云莊生則假物為喻以論真宗而學者多誤故列之為難信之首玄中山經一無可取釋氏俱舍乃自立心法非可以表測而度量也又按吳王蕃法云余因周禮鄭衆鄭玄之言用勾股之術以求天之里數夏至之日以八尺之表求晷於陽城表南得影一尺五寸南至日南下無影則日南去陽城一萬五千里立八十而旁十五則曰高八萬里日南邪去以勾股法得八萬一千三百九十四里有竒蓋天頂至地之數也倍之得十六萬二千七百八十八里有竒即天徑之數也以周徑之法乘得五十一萬三千六百八十七里有竒即周天之數也右肇始學渾天法於度支推官監察御史太原王軒軒以王蕃之術授焉自後因演而成圖既知夫天地之薄厚則日月之行寒暑之候皆由自得之遂用覃思臣溟稽萬流之升降果見潮生之候由是博考羣言以證遇晦而自得之旨無所疑焉渾儀之制渾儀法肇得自虞舜以旋璣玉衡以齊七政鄭康成云其轉運者為璣其止息者為衡皆玉為之七政者日月五星也則渾儀之本法晉侍中劉智云顓頊造渾儀黃帝為蓋天則此二器皆古聖王之制作也但學者失其用耳説者乃云始自張衡今考其事張乃巧述其法而揆之非始造者也虞喜又云洛下閎為漢武帝於地中轉渾天定時修太初曆又知此術在張平子前也後漢左中郎將賈逵以永元十五年造黃道渾儀張衡以延熹七年更造銅儀以四分為度於密室中以漏水轉之令伺者閉戶而唱以告司天者云琁璣所加某星巳中某星今沒皆如合符契其後吳王蕃修之如陸績及後魏太史令朝崇隋河間劉焯皆修渾儀之法李淳風因為遊儀蓋與靈憲同也右以物象天謂之渾儀則日月四海在渾儀之內日月盈縮之度可察而獨迷潮水生來之候豈古人未之思乎肇秪於此術究而得之不為怪誕無據之説猶恐時之學者尚有所疑故以著之進海潮賦狀朝散大夫持節歙州諸軍事守歙州刺史柱國賜紫金魚袋臣盧肇謹進上海潮賦一首右臣伏聞神農立極先定乾坤軒后統天始弘曆象蓋以大聖有作而大法乃明必自臣子之所為克成君父之至德只如陳韶奏夏允諧聖帝之音而伐鼓鏗鐘元在工人之手業雖成於微賤事乃奏於皇王臣今所陳竊用此道伏惟睿文明聖孝德皇帝陛下德邁伊媯道包覆載垂衣而九有無外執契而萬國來庭日月貞明天地交泰珍圖瑞物允膺得一之符伯益皋繇共佐千年之聖臣實陋賤亦忝方州而微臣始自知書志在稽古或觀天地之道得於經史之間既察置圭亦聞測管究黃鍾於玉律窺碧落於璿樞伏念司馬遷則書載天官張平子則儀鈞地動臣仰遵前哲輒揆圎虛偶識海潮深符易象理皆托實事盡揣摩既當鳳紀之朝願陳蟸測之見臣肇誠惶誠恐頓首頓首臣又聞天垂象而六合成道生一而三才具皆由日月運乎隂陽是謂神明分乎晝夜伏知此道盡在陛下􅐶鑒之中故不俟微臣因此别白然自古以來莫不以地厚難測日既入而人不見其行海大無涯潮潛生而人不知其候上古聖人則之於八卦學者演之成六家而有講論未明根本不啚天垂大法假乎微臣獲在聖朝彰此愚見臣門地衰薄生長江湖志在為儒弱不好弄研求近代寒苦莫甚於斯臣伏念為業之初家空四壁夜無脂燭則爇薪蘇曉恨頑冥亦嘗縣刺在名場則最為孤立於多士則時賢獨知纍竊皇恩遽變白屋臣於會昌三年應進士舉故山南節度使同中書門下平章事王起擢臣為進士狀頭筮仕之初故鄂嶽節度使盧商自中書出鎮辟臣為從事自後故江陵節度使贈太尉裴休故太原節度使贈左僕射盧簡求皆將相重臣知臣苦心謂臣有立全無親黨不自吹噓悉賞微才奏署門吏臣前年二月蒙恩自潼關防禦判官除祕書省著作郎其年八月又蒙恩除倉部貟外郎充集賢院直學士去年五月又蒙恩除歙州刺史臣謹行陛下法令常懼愆違理郡周星未有政績潛被百姓詣闕以臣粗能緝理求欲留臣奉七月二十二日勑又蒙聖恩賜臣金紫臣素無強近之援不異草澤之人忽荷寵光及此叨忝臣不以平生志業上奏於宸慈實懼犬馬之微忽先於溝壑則臣積年無所闡揚非唯自負片心實亦上辜聖代是敢竊以所撰前件潮賦并圖進上臣為此賦以二十餘年前後詳參實符象數願以潢汚之水輒赴溟渤之流而雕蟲所為刻鵠難肖塵冒天聽罪當鼎鑊今差軍事押衙盧師洎隨狀奉進上黷宸嚴敢期睿覽臣肇無任惶懼戰越屏營之至謹録奏以聞伏俟誅責勑盧肇文學優瞻時輩所推窮測海潮出於獨見徴引有據圖象甚明足成一家之言以祛千載之惑其賦冝宣付史館重校正唐文粹卷第五嘉靖甲申歲太學生姑蘇徐焴文明刻干家墩
