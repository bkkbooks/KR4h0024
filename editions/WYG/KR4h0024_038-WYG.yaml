body:
  text: 三不欺先後論吕温昔宓子賤為單父也人不忍欺之國僑為鄭也人不能欺之西門豹為鄴也人不敢欺之此皆為政不同同歸于理作幹事之稱首貽牧人之經範汪洋古今輝焯圖史窮理而語固有優劣擇善而行豈無先後請試論之子賤仕衰亂之魯而邑偪强齊仗義為城池倚仁為干櫓當鯨吞之大敵鳩狼顧之遺黎渙離刑撿妙用心術惠訓不倦乃無得而稱視民如傷而不有其愛感而動之隂陽運於無言誠而明之日月懸於方寸是則不求不欺於人而人不忍欺矣子産攝晉楚之間而靖恭爾位役智利物飭躬勵俗守之以信行之以禮告之以慈惠臨之以明察如鏡洞照如衡誠懸是則求人不欺而人亦不能欺矣西門豹當戰國之際而克修茂績身為紀律言有典章剛包其柔威克厥愛權之以法制董之以刑罰火烈人望霜清物心是則責人不欺而人固不敢欺矣夫不忍欺者至誠潛感是曰上徳堯舜之吏也不能欺者明智旁達是曰有政三王之吏也不敢欺者嚴威允濟是曰能刑五伯之吏也誠不足至於智智不足至於威大小之間朗然可見然而事在折衷理資漸致徳宜全舉道貴兼通必也修誠而棄智誠未至而政理或虧任智而廢威智未周而暴亂將起不若兼而行之迭收其效一之日二之日刑明威立使人畏而不敢欺三之日四之日智達政成使人敬而不能欺五之日六之日志孚誠格使人感而不忍欺以寛濟猛同二氣之和平自邇陟遐比三才之具美苟非全徳大器其孰能至於此乎若不暇㑹其源流統其宗極而姑定優劣直論先後則堯舜之吏與王霸不同年而語矣三名臣論李翰或問於翰曰昔諸葛亮擁膝南陽為梁甫吟自比管仲樂毅州平元直以為信然雖涯量罕窺而遺迹可見夫此三名臣者亦有優劣乎願聞其説翰辭不敢對至於再三固請不得已應之曰豈易言乎豈易言乎夫小者不足以論大近者不足以量逺奈何况議大賢然執律管者可以候四氣之微測日晷者可以知千里之度察微觀著由虚考實儻容寄言象於斯矣如僕所揣則管不迨樂孔明其伯仲之間耳曰何謂其然也昔管仲相桓公九合諸侯一匡天下興齊定霸尊周勤王功其懋哉仁亦至矣孔明收荊州散敗之餘建策通吳合従破魏奉先主西入劍門下車而三分天下翊翼後嗣續修舊勲刑政孚於偏方威徳振於中夏雖短祚中否而王業殆成樂生一為燕將纔勝齊師挫衂於二城之間狼狽於兩國之際軍不振旅身卒犇亡子獨推而崇之冠於二賢之首誠所未諭其有説耶翰應之曰子之所聞者末歟語功則信然語才則不爾夫才生於代功與運成固有才優而功微運合而才劣先當格以道徳覈于終始審其邪正觀其去就然後事可明也夷吾當既亂之時輔有過之主功濟諸夏澤被生人信為美矣然徼功事讐務入之情速矣肆奢越禮盈量之意見焉故仲尼雖稱其仁終小其器止於霸者之佐殆非王臣之良孔明従容三顧後起籌畫必當締構必成事屯而業亨主闇而國治兵弱而强鄰畏服功大而本朝不疑斯亦難矣然窺其軍令跡其用法必使中原可復然後厚賞寛刑𤣥徳常稱馬謖言過其實不可大用之卒致喪敗斯所謂濟於事而末全於道得諸已而未審於人樂一戰舉齊二城未下待之以徳收之以禮捨權變於攻取之際行王道於軍旅之間事雖不成業亦大矣向使昭王不死惠王不疑則其功未可量也夏侯太初論之詳矣及其逃燕之責亡而奔趙趙王問以圖燕之策樂生流涕而對曰臣昔日之事燕昭王猶今日之事大王也千秋萬嵗之後尚不敢侵其僕隸而况謀子孫乎因棄禄宵遁善夫長者之言可謂懷禄不屑其榮周身不違於道比諸二子不亦優哉主恩非臣下之所圖天命豈生人之所制安可以功業之成敗斷才能之短長耶且夫運有通塞命有脩短葢天意也豈人事乎昔韓信將伐魏問得不以周叔為將乎聞不用乃大喜向使魏人用之則漢師不敢濟河矣然則周叔之才亦韓信流亞也終湮滅而無聞焉古之大才而功不著者亦何可勝道哉翰長兄御史君體純至之徳負經逺之才常感憤於周韓之間嘯詠於管樂之際守之以忠信文之以禮樂藴弼諧之大略以康濟為己任進逢國難謀猷不行退有家艱哀毁過禮官纔元士命止中年位不登於廟堂名不書於史册斯才也斯運也誰見三分九合之優劣辭燕對趙之去就哉由此觀之斷可知矣問者歎息而退三賢論元魯山蕭頴士劉迅李華或曰吾讀古人之書而求古之人未獲嗟夫遐叔謂曰無世無賢人其或世敎不至淪於風波雖賢不能自辯况察者未之究乎鄭衞方奏正聲間發極和無味至文無彩聴者不達反以為怪譎之音太師樂工亦失容而止曼都之姿雜於憔悴被緼絮䝉蕭艾美醜夷倫自以為陋此二者既病不自明又求者亦昬將剖其善惡在遷政化端風俗則賢不肖異貫而後賢者目明而察者不惑也余兄事元魯山而犮劉蕭二功曹此三賢者可謂之達矣或曰願聞三子之略遐叔曰元之志行當以道紀天下劉之志行當以六經諧人心蕭之志行當以中古易今世元齊愚智劉慼一物不得其正蕭呼吸析節而獲重禄不易一刻之安元之道劉之深蕭之志及於夫子之門則達者其流也然各有病元病酒劉病賞物蕭病貶惡太亟奬善太重元奉親孝居喪哀撫孤仁徇朋友之急莅職明於賞罰終身貧而樂天知命焉以謂王者作樂崇徳殷薦上帝以配祖考天人之極致也而詞章不稱是無樂也於是作破陣樂詞協商周之頌推是而論則見元之道矣劉名儒史官之家兄弟以學著稱乃述詩書禮樂春秋為五説條貫源流備古今之變推是而論則見劉之深矣蕭以史書為繁尤罪子長不編年陳事而為列傳後代因之非典訓也將正其失自春秋三家之後非訓齊生人不録次序纉修以迄于今志未就而殁推是而論則見蕭之志矣元據師保之席贍其形容不俟其言而見其仁劉被卿佐之服居賔友之地言理亂根源人倫隠明參乎元精而後見其妙蕭若百鍊之鋼不可屈折當廢興去就之際一生一死之間而後見其大節視聴過速欲人人如我志與時多背恒見詬於人取其中節之舉是可以為人師矣學廣而不偏精其貫穿甚於精者又文方復雅商之至當以律度百代為任而古之能者往往不至焉超絶孤厲不可謂不知言也茂挺父為莒丞得罪清河張惟一時佐廉使按成之茂挺初登科自洛至莒道邀使車發詞哀乞惟一涕下即日捨之且曰蕭賛府生一賢方資天下風教吾由是得罪亦無憾夫如是得不謂之孝乎或曰三子者各有所與遊乎遐叔曰若太尉房公可謂名人矣每見魯山則終日歎息謂余曰見紫芝眉宇使人名利之心盡矣若司業蘇公可謂賢人矣每謂當時名士曰使僕不幸生於衰俗所不耻者識元紫芝廣平程休士美端重寡言河間邢宇紹宗深明持操宇弟寅次宗和而不流南陽張茂之季豐守道而㫁趙郡李崿伯髙含大雅之業崿族子丹叔南誠莊而文丹族子惟嶽謀道沈􅃉亷静梁國喬潭徳源昻昻有古風𢎞農楊拯士扶敏而安道清河房垂翼明志而好古河東柳識方明遐曠而才是皆慕於元者也劉在京下嘗寢疾房公時臨扶風聞之通夕不寐顧謂賓従曰挺卿若不起無復有神道尚書劉公每有勝理必詣與談終日忘返退而歎曰聞劉公清言見皇王之理矣殷直清有識尚恨言理少對未與劉面常想見其人河東裴騰士舉朗邁真直弟霸士㑹峻清不雜隴西李廣敬叔堅明而粹范陽盧虚舟㓜真質方而清頴川陳讜言士然淡而不厭吳興沈興宗季長専静不渝潁川陳兼不器行古人道渤海髙適達夫落落有竒節是皆重劉者也工部侍郎韋述修國史推蕭同事禮部侍郎陽浚掌貢舉問蕭求人海内以為徳選汝南邵軫緯卿詞學標幹天水趙驊雲卿才美行純陳郡殷寅直清達於名理河南源衍季融粹微而周㑹稽孔至惟微述而好古河南陸據徳隣恢恢善於事理柳芳仲敷該練故事長樂賈至㓜㡬名重當時京兆韋收仲成逺慮而深南陽張有略維之履道體仁有略族弟邈季遐温其如玉中山劉頴士端疏明簡暢潁川韓極佐元行備而文樂安孫益盈孺温良忠厚京兆韋建士經中明外純頴川陳晉正卿深於詩書天水尹徴之誠明貫百家之言是皆厚於蕭者也尚書顔公重名節敦故舊與茂挺少相知顔與陸據柳芳最善茂挺與趙驊邵軫洎華最善天下謂之顔蕭之交殷寅源衍睦於二交之間不幸元罷魯山終於陸渾劉避地逝於安康蕭歸葬先人殁于汝南今復求斯人有之無之是必有之而察之未克也三賢不登尊位不享下壽居易委順賢人之達也不䝉其教生人之病也余知三賢也深故言之不怍云漢斬丁公論皮日休忠之為稱也葢欲委身以事主不以猜悞貳其心不以辯説貳其心不以疑懼貳其心者也上有過諍於公不揚名於私豈猜悞之足入乎上有忌愈乎進不愈乎退豈辯説之足入乎上有間去懼乎心不懼乎事豈疑懼之足入乎夫苟禄恡生而仕者上有過言未息而懼乎誅諫末再而去乎位自以得古人三諫不従之義然幸其生貪其禄是猜悞而貳其心者也上有忌必姦于心機媚于聲氣不思已之不聰而謂上之受謗不思道有未可而謂辯之足従辯之足去是辯説而貳其心者也上有間去必佞彼愛取乎厚也必諂彼倖求其捨也有愛不可佞倖不可諂即苟而已矣是疑懼而貳其心者也嗚呼劉項之作也淮隂不以猜悞而去項乎曲逆不以辯説而去項乎淮南不以疑懼而去項乎去彼而就此果謂忠乎果謂不忠乎是利則存不利則亡者也則丁公臨敵捨敵無殺誠惻隠之者也豈有猜悞辯説疑懼者也有利則存不利則亡者邪與其不忠則彼三侯者謂淮隂侯淮南王曲逆侯是也未可免鼎鑊之誅刀鋸之刑也是髙祖斬之果不為當噫漢之初立未為無人丁公就刑未聞有一言而戾者將固之命也悲夫袁盎以周勃為功臣論李徳裕袁盎對文帝曰絳侯所謂功臣非社稷臣夫社稷臣主在與在主亡與亡盎見勃自徳其功有以激也非至理篤論此言足以惑文帝之聰明傷仁厚之政俾其君有薄宗臣之意竟使周勃大功皆棄非罪見疑可為長歎息也當吕氏之世惠帝已殂少帝非劉氏陳平用辟强之計權王産禄絳侯若不與之同心而制其兵柄必由此而階亂矣則劉氏安危未可知也然磨而不磷涅而不緇未嘗不心存社稷志在劉氏外雖遜順内守忠貞得不謂之社稷臣矣其後絳侯繫請室盎雖明其無罪所謂陷之死地而後生之徒有救焚之力且非曲突之義楊子稱盎忠不足而談有餘斯言當矣善哉賈生之説喻堂陛之峻髙者難攀卑者易凌文帝感悟養臣下有節有以見賢人用心致君精誠若袁公者難與並為仁矣盎惟有正慎夫人席塞梁王求嗣此二事守正不撓忠於所奉害錯之罪虐貫於神明安陵之禍知天道之不昩矣張辟疆論楊子美辟疆之覺陳平非也若以童子膚敏善揣吕氏之情竒之可也若以為反道合權以安社稷不其悖哉授兵産禄㡬危劉氏皆因辟疆啟之向使留侯尚在必執戈逐之將為戮矣觀髙祖遺言吕氏制其大事可謂謀無遺策矣以王陵有廷諍之節置以為相謂周勃堪寄託之任令本兵柄况外有齊楚淮南磐石之固内有朱虚東牟肺腑之親是時産禄皆匹夫耳吕后雖心不在哀將相何至危懼必當憂傷不食自促其壽豈能為將相之害哉漢髙曰非劉氏而王者天下共擊之此慮屬在吕宗矣何可背之厥後稱制八年産禄之封殖固矣若平勃二人溘先朝露則劉氏之業必歸吕宗及吕后之殁劫酈商以紿吕禄計亦窘矣周勃雖入北軍尚不敢公言誅吕豈不艱哉賴産禄皆徒隸之人非英傑之士儻才出於世豈受其紿說哉嗟乎與其圖之於難豈若制之於易由是而言平勃用辟疆之計斯為謬矣留侯破産以報韓結客以徂秦招四皓以安太子所為必仗義居正由此知不尚權譎明矣􅏯錯論李觀觀讀漢史見景帝殺御史大夫晁錯以姑息吳王濞痛其非罪也故直筆以議按錯潁川人起於諸生事文帝為太常掌故以英詞射策累擢為中大夫及景帝即位極言獻替未嘗不忠於心乃命副丞相錯所以推心不顧思永漢室而患諸侯侈大上書請削其土是用翦其翼而固其本也度錯之志豈有負漢哉原吳濞之反誠有由然間人骨肉而塞小忿自非上達能不生怨怨端既立臣節安附欲無為逆終不可得已葢以南方富殖而諸夏初又狂夫為計料勝一舉遂搖長舌交構七國借誅錯之名景帝無非常之見而聴亂臣一説乃斬錯不問兾在紓難而七國之兵曽不少減是以察其來不為錯明矣且袁盎與錯宿不相善况景帝豈不知二臣之不叶而聴偏議是為臣報隙也若宗社何及鄧公吳還乃歔欷長悲益為天子之羞爾始髙帝封濞於吳以誡東南之必亂于時豈有錯削地之議盖天之厯數有理亂也脱使無梁國以絶其道無條侯以耀其武則秦之鹿復駭盎之肉可食初錯介然孤立指畫髙議大臣疾小臣怖人人束約各欲倳刃其父知其必戮也而深病之錯曰所以尊君上安宗廟父曰劉氏安􅏯氏危矣吾不忍見禍及先禍死矣噫史臣責錯之父不逮趙括母何其鄙也夫趙括持必敗之勢而母言于趙王不可使將及括失律母以先見獲宥􅏯錯用至忠之略與必敗之勢異也其父雖懼禍至奈其子所籌國之大事也且使括母言之足稱明婦人也使錯父言之是沮其子為忠也孰可擬議或人有復言錯忠則有矣而智不足愚則不爾夫忠所以補君智所以濟身苟圖濟身則忠有不遂忠有不遂是臣不臣亦何生為賊由袁盎昩在景帝非智之短時不與也古云直木先伐愚智何道哉李陵論白居易論曰忠孝智勇四者為臣為子之大寶也故古之君子奉以周旋苟一失之是非人臣人子矣漢將李陵策名上將出討匈奴竊謂不死於王事非忠生降於戎虜非勇棄前功非智召後禍非孝四者無一可而遂亡其宗哀哉予覽史記漢書皆無明譏竊甚惑之司馬遷雖以陵獲罪而無譏可乎班孟堅亦従而無明譏又可乎按禮云謀人之軍師敗則死之故敗而死者是其所也春秋所以美狼瞫尺甚反深視貌者為能獲其死所而陵獲所不死得無譏焉觀其始以步卒深入虜廷而能以寡擊衆以勞破逸再接再捷功孰大焉及乎兵盡力殚摧鋒敗績不能死戰卒就生降噫墜君命挫國威不可以言忠屈身於夷狄束手為俘虜不可以言勇喪戰勲于前隤家聲于後不可以言智罪逭于躬禍移於母不可以言孝而引范蠡曹沫為比又何謬與且㑹稽之恥蠡非其罪魯國之羞沫必能報所以二子不死也而陵苟免微軀受制於强虜雖有區區之意亦奚為哉夫吳齊者越魯之敵國匈奴者漢之外臣俾大漢之將為單于之擒是長冦讐辱國家甚矣况二子雖不死無陵生降之名二子苟生降無陵及親之禍酌其本末事不相侔而陵竊慕之是大失臣子之義也觀陵答子卿之書意者但患漢之不知已而不自内省其始終焉何者與其欲刺心自明刎頸見志曷若效節致命以取信於君與其痛母悼妻尤君怨國曷若忘身守死而紓禍於親焉或曰武帝不能明察下聴流言遽加厚誅豈非負徳答曰設使陵不苟其生能繼以死則必賞延於世刑不加親戰功足以冠當時壯節足以垂後代忠孝智勇四者立而死且不朽矣何流言之能及哉嗚呼予聞之古人云人各有死死或重於泰山生或輕于鴻毛若死重於義則視之如泰山也若義重于死則視之如鴻毛也故非其義君子不輕其生得其所君子不愛其死惜哉陵之不死也失君子之道焉故隴西士大夫以李氏為愧不其然乎不其然乎張禹論李徳裕夫社稷之計安危之機人君不能獨斷者必咨於所敬之臣然臣有忠邪時有險易交有淺深義有厚薄范睢山東之匹夫也入虎狼之秦履不測之險可謂交疏義薄矣而能尊昭王去穰侯開秦霸業之基以安國復嗣可謂忠於王矣夫能獨斷者英主也古人言謀之欲多而斷之在獨葢為此矣天有震雷之怒龍有逆鱗之恨所以人君在於能㫁耳然親戚之際恩義之重不㫁之於已可也張敞所謂明詔以恩不聴羣臣以義固爭而後許而令明詔自親其文非策之得也漢文帝誅薄昭斷則明矣於義則未安也周宣餞申伯有孔碩之詩秦康送文公興如存之感况薄太后尚存唯一弟薄昭而斷之不疑非所以慰母氏之心也漢成帝車駕至張禹第辟左右親問禹以天變禹以年老子弱與曲陽有隙乃言新學小生亂道誤人宜無信用帝推信愛禹由此不疑王氏致漢室之亡成王莽之簒皆因禹而發可謂漢之賊也國之妖也雖蛇鬬於鄭鷁退於宋妖不甚於禹矣朱雲欲以尚方斬馬劍斷佞臣頭斯為當矣後代有類於此者其臣可以范雎為師表張禹為鑒戒唐文粹卷三十八欽定四庫全書唐文粹卷三十九宋姚鉉編議甲摠一十九首
