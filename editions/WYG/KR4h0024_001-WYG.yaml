  text: 鉉編
  hash: sha256:7bbf6589c1370d76cda4d0216a0d947939e0da39d5486060d257d0515cbf99d7
body:
  text: 古賦甲摠三首聖徳二含元殿賦李華明堂賦李白失道一阿房宫賦杜牧含元殿賦并序李華宫殿之賦論者以靈光為宗然諸侯之遺事盖務恢張飛動而已自兹已降代有辭傑播於聲頌則無聞焉夫先王建都營室必相地形詢卜筮考農隙工以子來虞人獻山林之幹太史占日月之吉雖班張左思角立前代未能備也而曩之文士賦長笛洞簫懐握之細則廣言山川之阻採伐之勤至于都邑宫室宏模廓度則畧而不云其體病矣至若隂陽慘舒之變宜於壮麗棟宇繩墨之間隣於政教豈前修不逮將俟聖徳而啟臣心輒極思慮作含元殿賦陋百王之制度出羣子之胸臆非敢厚自夸耀以希名譽欲使後之觀者知聖代有頌徳之臣焉其辭曰維皇髙宗穆端命於𤣥穹萬有千嵗鍾景祚于洪裔建北宫之尊嚴上取法於天帝乃圖正殿之逌居規崇山而定制信神明幽賛而人謀襲契不然何前王曠此之雄麗也先是大司空帥其屬執度而相之曰美哉川原騖乎其大哉亘坤靈兮配乾剛坤順乾而為龍舒廣衍兮走羣山紛郤面而朝宗陵正陽之奕奕鬱佳氣之葱葱盖昊天之作而皇祗授元聖獲以造新宫也乃審于龜筮龜筮協從太卜以告神人咸同皇曰欽哉是将宜於朕躬因以鴻稱含元建名易乾坤之説曰含𢎞光大又曰元亨利貞括萬象以為尊特巍巍乎上京則命徴般碩之匠下荆揚之材操斧執斤者萬人涉磧礫而登崔嵬擇一幹於千木規大壮於喬枚聲坎坎於青雲若神踣而顛摧勢動連崖拉風捽雷倒勁梢於窮谷斬巨柢於昭回時也山祗效靈波神作氣為桴為筏羽疊鱗萃朝泛江海夕出河渭雲奔山横交積于作宫之地於是農事既收靈臺勿亟子來而就役者周邦畿而薄四海咸忘勞而獻力乃張為廣庭考正極星邦伯是經國工研精剗盤岡以為趾太階積而三重因博厚而順髙明築凌天之四墉四墉既列太階如截下上相嶔愕視沈沈其始也星鎚電交於萬堵霜鋸氷解於千尋擁材為山攅杵如林乃卜日星之吉以成帝室虹梁勁於中極榱桷戢以礱密析姑繇以為楹隳喬山以為礩飛重簷以切霞烱素壁以留日神標峻樀鬼疊層楣髙卑迭作尋尺相持木從繩而後正棟操宇而不危陛瑩氷級瓦敷鱗差蕩晶景而升降歘睒䁑以交輝聳大厦之竒傑勢将頓而復飛爰詔有司練日推時徴考室於周頌㑹公卿以落之丕赫哉如俯如􅉥若合若離疎森修䆳以窅徼怳嶪騀而巖巍謂衝飈激海兮漩奫淪以無底奔雷觸山兮掉巘崿而傾㩻石鮫拖首於堂廡状出雲而撑鬐崇髙之制靈邱上盤隣斗極之光輝邇天漢之波瀾察鑿枘之吞吐吸山巖而水攅建升龍之大斾邈不至於階端峥嶸孱顔下視南山照燭無間七耀迴環㰹呼咸反欱赫以突兀攇閎𢎞以蕭摋捧帝座於三辰衝天街之九達進而仰之騫龍首而張鳳翼退而瞻之岌樹巔而崪雲末嶷兮峩峩巨鼇戴仙山而出滄波劃呼麥反兮煌煌燭龍拆穹穴而臨北方排層城而廓帝居豁閶闔而面蒼蒼左翔鸞而右栖鳯翹兩闕而為翼環阿閣以周墀象龍行之曲直夾雙壺以鴻洞啟重閨之呀赫趨堂塗之未半望宸居而累息惟上聖之欽眀爰聴政而布徳去雕璣與金玉絀漢京之文飾幟丹雘於􅲠􅡳抗雲霄而競色若乃紫微晨曀彤墀夜明雲薄萬栱風交四榮冬止其陽則釋裘而煖夏休其隂則捐絺以清旂獵風而振響葉墜露而成聲懸櫨駢凑竦柱奔列複檻曾綴髙忩景爇黭烏敢反日翳而罘連曤天開而中絶形持神而欲離足便步而将跌貯昭訓之崇崇瞵光範之掲掲其南則丹鳳啟途遐矚荆吴十扇開閉隂陽睢盱容鼎九扃方駕五車示王者之無外不樹屏於清都望仙闢於巽維建福敞於坤隅偃朱旗而櫜𤣥甲屯仡仡之驍夫其後則深闈祕殿曼宇疎楹瑞木交隂𤣥墀砥平鮮風厯廡凌霰飄英䕃藹武闈増華穆清玉燭内融則嘉盛豐備太陽臨照而天下文眀古有六寝御兹一人今也三朝繇古是因布大命於宣政澹𤣥心於紫宸羲和弭節於通乾望舒停景於觀象密勿旒扆臣人是仰左黄閣而右紫微命伊臯以為長其下則鶡冠魚服良家茂族厲禁非宜金吾領之其前則置兩石以䘏刑張三侯以興武告善之旌登聞之鼓節晷漏於鍾律架危樓之筍􅒶以辨内外之差以正東西之序天光流於紫庭倒景入於朱戸騰祥雲之郁靄映旭日之葱蘢清渠導於元氣玉樹生於景風夷坦數里徘徊無窮羅千乗與萬騎曽不得半乎其中厥初經營天下既乂文物未周孤其壮麗盖重施於勞非不懐也乃眷睿孫睿孫開元萬㝢晏清而大和奄書契之所論既克廣於崇構聲明備而益尊盖聖皇之孝也揮綽變化兮動摇乾坤其東於是𢎞文教而開館對日華之清閾蓋左學之遺制協前王之講徳其西於是延載筆之良史俯月華之峻扉集賢人於别殿朝命婦於中闈王風闡而成化隂教備而不虧加以詠周詩而展親睦魯衛而敦叙因命族之来宴置更衣之豐宇至於殿内諸曺則左右有局通軒並廡物有恒司供無廢舉又有銀璫珥貂寺人巷伯奉宣出納之命更踐宫中之役熊羆之旅董以龍武矛㦸森森材官羽林聲破邱山氣讋飛沈爪抉千鈞跟騰百尋克壮皇威協比其心其外則校人掌馬天駟在閑以備順遊放牧其間望我鸞和陟彼髙山猶慮憲章或遺國容未備乃立掌匭之司館通事之史職在達下情於上天儆王言于有位堧通太極隥指龍池重門内注複道潛移幽峻肅以相屬光彤融以熺熺𤣥象著明帝座維三皇居設位俯察仰參翼室正中游宫次南北起含光其容耽耽摠而言之如山之夀則曰蓬萊如日之昇則曰大明自兹而北燕遊所經達于苑囿不可殫名周廬更呵匝以環衛南端百仭上極霄際却視㽎崟經途廣深繚以層城黕為重隂至若時雨膏田九農恞暢雲歸山穴儵以昭曠白日麗於宫隅混晶光而益壮於是風師歛威纎􅝙不升頴絶摇芒葉無翻稜自中徂外鏡洗川澄弦直閭閻井畫溝塍靡迤秦山陂陁漢陵知稼穡之艱難見皇王之廢興及乎𤣥㝠戒寒海神飛雪瑶城粉野琪樹森列玉宇琁階雲門露闕天華􅐩霽朗日朝徹赤旗絳庭朱柱艶月仰白帝而金精開披河宫而銀燭發其或蠻夷不至帝用興戎降元帥於天上發神謀於禁中皇靈震耀殄厥渠凶矯矯武臣此焉獻功效俘虜而陳器械恢莫大之威容爾乃時殷仲冬日正南至上公奉斚羣后在位一人夀昌萬國承賜式燕以樂欣欣且醉乃撞宫懸砅碣天地及乎獻嵗元辰東風發春懸法象魏與人惟新儼文物於王庭兼九伐而宿陳威儀之嚴山嶽振振若太一披絪緼而俯百神既而咸造勿䙝㑹朝清明璿柄指寅寝闈發扃皇帝御衮龍之法服佩蒼璧之純精執鎮圭導朱紘降輦登階微聞玉聲於是典禮之官賛王就位南面穆然至若甸侯采衛要荒閩貊輸其方賮罔不来格統以千官六卿二伯司儀叙進象胥重譯肅肅委皮乾乾奠璧設以庭燎天烘地赫雷鼓殷殷朱干玉戚神􅒶如生熊羆愕敵危昻歇向歊爛歕射金根玉輅太常少伯火烈門旂霜交陛㦸乃進元元以觀禮珿初六反億兆之増金吾南首麾之以肱逓攀援而聳仰齊屨企而冠騰太史来告卿雲勃興灑豐澤於生人荅上𤣥之休徴申命司寇緩刑冡卿降徳秩山川而問耆老周雨露而均邦國華戎竭歡喜氣闐塞掲金雞於太清炫晨陽於正色慶抃之聲不踰辰而靁四域當斯時也驅周驟漢於廓煥爛王臨于朝天地貞觀靈宫岩岩上下交賛盖所以法乾道而遵帝度豈惟安體而明威者哉夫瑶臺之靡不可以刑萬國土階之陋不可以儀天下奢不遜而儉固允執中於大位洪範曰皇建其有極富哉上聖之宏議也詩歌楚室頌美泮宫諸侯之事也雲夢甘泉宴談景福僻王之志也論諸侯曷若戴天子嘉僻王曷若尊聖人烈烈盛唐祖武宗文五帝赧徳六王慙勛而政本乎慈用􅂈乎儉夫蒼生所奉者惟君所愛者惟親寧有君親宅體於卑室而臣子得安其身乎故有熊明庭帝姚總期從人欲也天垂定星易有大壮君人者法焉聖朝猶斥其華而凭其質今是殿也者惟鐡石丹素無加飾焉身居𤣥眇心與萬姓同畎畝之勞以是臨衆何衆不賓以是享神何神不若其徳歟雖欲宫崑崙而館不周城八極而隍四海猶未足儲鴻醇而俯丕耀豈咸鎬一京之所在崇四凟之前式勅懐鈆之小臣俾讐書於禁中正百代之遺文由是循環天造耳目惟新敢頌成功告于神宗無愧斯干之什式昭聖徳之容頌曰帝作含元含元言言崒若日觀呀為天門太階三層逺法崑崙鎮兹秦野掲以周原列文祖宗永錫孝孫孝孫有慶于以施令奄甸萬姓受天休命歌之頌之管磬宜之穆穆皇君夀考無期既成斯文客有勸之上者對曰前王之宏祥絶瑞乃聖朝之細事今休徴已厭于聰明頌聲亦飫于天意私歌竊抃乃臣子之本志又焉足以薦聞哉客曰不然今至尊明發不寐有懐先皇周文之孝也允恭克讓光溢海外堯舜之謙也以即位以来上下之休嘉神人之詠歌歌於睿躬則固辭頌於宗廟則無斁今吾子之文明昭乎累聖之耿光美于大君之孝徳可進而退宜言而黙使雅頌之音巻而不舒猶坦蕩其胸臆無乃過歟為人之下者有可逹於君親雖濱于死亦冒行之况宗廟啟其心哉臣華常聞遷善之規願附升歌之末明堂賦幷序李白昔在天皇告成岱宗改元乾封經始明堂年紀總章時締構之未輯痛威靈之遐邁天后繼作中宗成之因兆人之子来崇萬祀之丕業盖天皇先天中宗奉天累聖纂就鴻勲克宣臣白美頌恭惟述焉其辭曰伊皇唐之革天創元也我髙祖乃仗大順赫然電發以首之於是横八荒漂九陽掃叛渙開混茫景星曜而太階平虹蜺滅而日月張欽若太宗繼明重光廓區宇以立極綴蒼昊之頽綱淳風沕穆鴻恩滂洋武義烜爀於有截仁聲馺沓乎無疆若乃髙宗紹興祐統錫羡神休旁臻瑞物咸薦元符剖兮地珍見既應天以順人遂登封而降禪將欲考有洛崇明堂惟厥功之未輯兮乗白雲於帝鄉天后勤勞輔政兮中宗以欽明克昌遵先􅁤以繼作兮揚烈聖之耿光則使軒轅草圖羲和練日經之營之不彩不質因子来於四方豈殫税於髙室乃凖水臬攅雲梁磬玉石於隴坂空􅅛材於瀟湘巧奪神鬼髙窮昊蒼聴天語之察察擬帝居之鏘鏘雖暫勞而永固兮貽聖謀於我皇觀夫明堂之宏壯也則突兀曈曨乍明乍蒙像太古元氣之結空巃嵸頽沓若嵬若嶪似天閫地門之開闔爾乃劃岝峉以嶽立郁穹崇而鴻紛冠百王而垂勲燭萬象而騰文窙惚恍以洞豁呼嵌嵓而旁分又比夫崑山之天柱矗九霄而垂雲於是結構乎黄道岧嶤乎紫微絡勾陳以繚垣闢閶闔而啟扉峥嶸嶒嶷粲宇宙之光輝崔嵬赫奕張天地之神威夫其背泓黄河垠潄清洛太行郤立通谷前廓逺則標熊耳以作掲豁龍門以開㸃翠彩於洪荒洞清隂乎羣山及乎烟雲巻舒忽出乍沒岌嵩噴伊倚日薄月雷電之所鼓蕩星斗之所伾仡拏金龍之蟠蜿挂天珠之硉矹勢㧞五嶽形張四維軋地軸以盤根摩天倪而創規樓臺崛岉以奔赴城闕嶔崟而蔽虧珍樹翠草含華揚蕤目瑶井之熒熒拖玉繩之離離㨖華盖以儻漭仰太㣲之參差擁以禁扃横以武庫獻房心以開鑿瞻少陽而舉措採殷制酌夏步雜以代室重屋之名括以辰次火木之數壯不及奢麗不及素層簷屹其霞矯廣厦鬱其雲布掩日道遏風路陽烏轉景而翻飛大鵬横霄以側度近則萬木森下千宫對出熠乎碧光之堂炅乎瓊華之室錦爛霞駮星錯波沏颯蕭寥以颼飀窅隂鬱以櫛宻含佳氣之青蔥吐祥烟之鬰律九室窈窕五闈聮綿飛楹磊砢走栱夤縁雲楣立岌以横綺彩角攅欒而仰天皓璧晝朗朱甍晴鮮頳欄各落偃􅏝霄漢翠楹迴合蟬聮汗漫沓蒼穹之絶垠跨皇居之太半逺而望之赫煌煌以輝輝忽天旋而雲昏迫而察之粲炳煥以照爛倐山訛而晷換誇蓬壺之海樓吞岱宗之日觀猛虎失道􅅗蚪蟠梯徑通天而直上俯長河而復低玉女攀星於網戸金娥納月於璇題藻井彩錯以舒蓮天忩赩翼而銜霓扶標川而罔足擬跟絓而罷躋要離欻矐而外䘮精視氷背而中迷亘以複道通乎掖垣坌入西樓實為崑崙三事庶尹正儀躅以出入九夷五狄順方面而来奔其左右也則丹陛􅔌崿彤庭煌煌列寳鼎歊金光流辟雍之滔滔象環海之湯湯闢青陽而啟總章廓明臺而布𤣥堂儼以太廟處乎中央發號施令探時順方其閫閾也三十六戸七十二牖度筵立位西八東九白虎列序而躨跜青龍承隅而蚴蟉其深沈奥密也則赤熛掌火招拒司金靈威制陽叶光摧隂坤斗主土據乎其心若乃熠燿五色張皇萬殊人物禽獸竒形異模勢若飛動瞪眄睢盱明君暗主忠臣烈夫威政興滅表賢示愚於是王正孟月朝陽登曦天子乃拖蒼玉轡蒼螭臨乎青陽左个方御瑶瑟而彈鳴絲展乎國容輝乎皇儀傍瞻神臺順觀雲之軌俯對清廟崇配天之規欽若肸蠁維清緝熙崇牙樹羽熒煌威蕤納六服之貢受萬邦之籍張龍旗與虹旌攅金㦸與玉戚延五更進百辟舉珪瓉獻琛帛顒昻俯僂儼容疊跡乃絜菹醢修粢盛奠三犧薦五牲享于神靈太祝正辭庶官精誠鼓大武之隠轔張鈞天之鏗訇孤竹合奏空桑和鳴盡六變齊九成羣神来兮降明庭盖聖主之所以孝治天下而享祀窅𡨕也然後臨辟雍宴羣后隂陽為庖造化為宰飱元氣酌太和千里鼓舞百寮賡歌于斯之時雲油雨霈恩鴻溶兮澤汪濊四海歸兮八荒㑹哤聒乎區㝢駢闐乎闕外羣臣醉徳揖讓而退而聖主猶夕惕若厲懼人未安乃目極于天耳下于泉飛聰馳明無逺不察考鬼神之奥推隂陽之荒下明詔班舊章振窮乏散敖倉毁玉沈珠卑宫頽牆使山澤無間往来相望帝躬乎天田后親於郊桑棄末以反本人和兮時康建翠華以萋萋鳴玉鑾之鉠鉠遊于昇平之圃憇乎穆清之堂天欣欣兮瑞穰穰巡陵於鶉首之野講武於驪山之傍封岱宗而祀后土兮掩栗陸而包陶唐遨遊乎崆峒之上汾水之陽吸沆瀣之精英黜滋味之馨香貴理國其若夢㡬華胥之故鄉於是元元澹然不知所在若羣雲從龍衆水奔海此真所謂我大君登明堂之政化也豈比夫秦趙吴楚争髙競奢結阿房與叢臺建姑蘇及章華非享祀與嚴配徒掩月而凌霞由此觀之不足稱也况瑶臺之巨麗復安可以語哉敢揚國美遂作辭曰穹崇明堂倚天開兮巃嵸鴻濛搆瓌材兮􅅯蹇坱邈崔嵬兮周流辟雍岌靈臺兮赫日星噴風雷宗祀蠁王化𢎞恢鎮八極通九垓四門啟兮萬國来考休徴兮進賢才儼皇居而作固窮千祀兮悠哉阿房宫賦杜牧六王畢四海一蜀山兀阿房出覆壓三百餘里隔離天日驪山北搆而西折直走咸陽二川溶溶流入宫牆五步一樓十步一閣廓腰縵迴簷牙髙啄各抱地勢鈎心鬬角盤盤焉囷囷焉蜂房水渦矗不知乎㡬千萬落長橋卧波未雲何龍複道行空不霽何虹髙低㝠迷不知西東歌臺暖響春光融融舞殿冷袖風雨淒淒一日之内一宫之間而氣候不齊妃嬪媵嬙王子皇孫辭樓下殿輦来于秦朝歌夜弦為秦宫人明星熒熒開粧鏡也緑雲擾擾梳曉鬟也渭流漲膩棄脂水也烟斜霧横焚椒蘭也雷霆乍驚宫車過也轆轆逺聴杳不知其所之也一肌一容盡態極妍縵立逺視而望幸焉有不得見者三十六年燕趙之收藏韓魏之經營齊楚之精英㡬世㡬年剽掠其人倚疊如山一旦有不能輸来其間鼎鐺玉石金瑰珠礫棄擲邐迆秦人視之亦不甚惜嗟乎一人之心千萬人之心也秦愛紛奢人亦念其家奈何取之盡錙銖用之如泥沙使負棟之柱多於南畝之農夫架梁之椽多於機上之工女釘頭磷磷多於在庾之粟粒瓦縫參差多於周身之帛縷直欄横檻多於九土之城郭管絃嘔啞多於市人之言語使天下之人不敢言而敢怒獨夫之心日益驕固戍卒呌函谷舉楚人一炬可憐焦土嗚呼滅六國者六國也非秦也族秦者秦也非天下也嗟乎使六國各愛其人則足以拒秦使秦復愛六國之人則逓三世可至萬世而為君誰得而族滅也秦人不暇自哀而後人哀之後人哀之而不鑑之亦使後人而復哀後人也唐文粹巻一欽定四庫全書唐文粹巻二宋姚鉉編
