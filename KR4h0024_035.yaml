body:
  text: 吳興姚鉉纂論乙揔一十二首辨析省試顔子不二過論韓倉辨曽參不為孔門十哲論李觀孟子荀子言性論皇甫湜管仲論元結嬴秦論劉蛻蕭何求繼論程晏四維論柳宗元六逆論辨私論牛僧孺自明誠論歐陽詹論相杜牧卜論李華省試顔子不二過論韓愈論曰登孔氏之門者衆矣三千之徒四科之目孰非由聖人之道為君子之儒者乎其於過行過言亦云鮮矣而夫子舉不二過惟顔氏之子其何故哉請試論之夫聖人抱誠明之正性根中庸之正德苟發諸中形諸外者不由思慮莫匪規矩不善之心無自入焉可擇之行無自加焉故惟聖人無過所謂過者非謂發於行彰於言人皆謂之過而後為過也生于其心則為過矣故顔子之過此類也不二者蓋能止之于始萌絶之於未形不二之於言行也中庸曰自誠明謂之性自明誠謂之教自誠明者不勉而中不思而得從容中道聖人也無過者也自明誠者擇善而固執之者也不勉則不中不思則不得無二過者也故夫子之言曰回之為人擇乎中庸得一善則拳拳服膺而不失之矣又曰顔氏之子其殆庶幾乎言猶未至也而孟子亦云顔子具聖人之體而微者皆謂不能生于其心而亦不暴之於外考之於聖人之道差為過耳顔子自惟其若是也於是居陋巷以致其誠飲一瓢以求其志不以富貴妨其道不以隱約易其心確乎不拔浩然自守知髙堅之可尚忘鑽仰之為勞任重道逺竟莫之致是以夫子歎其不幸短命今也則亡謂其不能與巳並立於至聖之域觀教化之大行也不然夫行發於身加於人言發乎邇見乎逺苟不愼也敗辱隨之而後思欲不二過其於聖人之道不亦逺乎而夫子尚肯謂之其殆庶幾孟子尚復謂之具體而微者哉則顔子之不二過者盡在是矣辨曾參不為孔門十哲論李觀論曰客有言曰仲尼聖人也曾參孝子也十哲皆仲尼門人也察其能孝於家能忠於君能友於兄弟能信於友朋可以臨事可以成章故加其美目也而曽參雖不聞兼此數者乃其近者小者而仲尼區别四科前後十哲曽參不及者何也主人對之曰噫非仲尼於此異也四科十哲之名乃一時之言也非燕居之時門人盡在而言也于時仲尼圍於陳畏於匡曽參不在從行之中故仲尼言在左右者揚其德行言語政事文學皆可邀時之遇行巳之材不得者是以美而類之傷而歎之非曽參不當此數子也使曽子于時得與數子從行則仲尼之聖不遺參之孝不後冉伯牛仲弓之目也必矣客於是稱謝而退或者止之曰客之問知其一未知其二主人對得其細未得其大且仲尼抱至聖之德值多難之代周遊柄遲不遇天下仕魯不終聘過宋伐樹之衛不用適楚逢患而四科之徒未嘗離其起居闕其絃誦不以師道窮而日妨巳之進不以身之私而越去終日溫溫孜孜提攜負荷從其行止如手足羽翼時仲尼有仁思德慮未言者顔回輒發之故謂之德行矣仲尼言有所陳未達而端木賜輒達之故謂之言語矣子路勇毅果正之士也侍仲尼而不善之道不得入焉故謂之政事矣子遊子夏之文春秋之外得與仲尼論之故謂之文學矣故數子居則講仲尼之道行役則任仲尼之事而曽參安則在焉患難則未嘗有用焉且夫孝者人性常然也不至者非人也參苟至之乃得為人矣夫何異也且十哲之徒孰有非孝平而參獨以有孝之名加其數子之長故不得與之同目也何謂不在從行之中而遺之也夫孝者不止於家也事君愼其事忠其命乃孝也事師聘其道敬其事乃孝也不去危即安不冒利背誼乃孝也而參不敬其事矣不能冒義背利矣乃孝其孝也非孝也子從儒守學冝識所言何言之介也主人拊已而起曰爾之辨則辨矣如何斯可謂攻乎異端斯害也巳孟子荀子言性論皇甫湜論曰孟子曰人之性善荀卿曰其善者偽也是於聖人皆一偏之論也推而言之性之品有三下愚中人上智是也聖人言性之品亦有三可上可下不移是也黃帝生而神靈幼而徇齊文王在母不憂在師不煩后稷不析不堛克岐克嶷之謂上智矣齊桓公以管仲輔之則理以易牙輔之則亂子夏出見紛華而恱入聞仁義而樂之謂中人矣越椒之生熊虎之狀叔魚之生溪壑之心謂下愚矣是故有生而惡者得稱性善乎哉有生而善者得稱性惡乎哉故曰孟子荀卿之言其於聖人皆一偏之説也窮理盡性唯聖人能之冝乎微言絶而異端作大義乖而一偏之説行孟子大儒也荀卿亦大儒也是豈特開異門故持曲辨哉蓋思有所未至明有所不周耳即二子之説原其始而要其終其於輔教化尊仁義亦殊趨而一致異派而同源也何以明之孟子以為惻隱之心人皆有之是非之心人皆有之性之生善由水之趨下物誘於外情動於中然後惡之焉是勸人汰心源返天理者也荀卿曰人之生不知尊親長習於教然後知焉人之幼不知禮讓長習於教然後知焉是勸人黜嗜欲求善良也一則舉本以推末一則自葉而流根故曰二子之説殊趨而一致異派而同源也雖然孟子之心以人性皆如堯舜未至者斯勉矣荀卿之言以人之性皆如桀跖則不及者斯怠矣書曰唯人最靈記曰人生而靜感於物而動則軻之言合經為多益故為尤乎管仲論元結自兵興巳來今三十年論者多云得如管仲者一人以輔人主當見天下太平矣元子異之曰嗚呼何是言之誤耶彼管仲者人耳止可與議私家畜養之計止可以修鄉里畎澮之事如此仲可當焉至於相諸矦材量巳似不足致齊及霸材量極矣使仲見帝王之道識興國之禮則天子之國不衰諸矦之國不盛如曰不然請有所説仲之相齊及齊強富則合請其君恢復王室節正諸矦君若惑之則引禍福以喻之如約諸矦之説君既聽矣然後約諸矦曰今王室將卑諸矦更強文王風化殘削向盡武王疆域割奪無幾禮樂不知其由征伐何因而出我是故謹疆域勉日夜望振兵威可臨列國得與諸矦會盟一旦能新復天子之正朔更定天子之封畿上奉天子復先王之風化下令諸侯復先公之制度以為何如若皆不從我則以兵先臨於魯魯不敢不從魯從則與魯西臨宋鄭宋鄭從則與三國北臨燕衛燕衛從則與諸國西臨秦晉秦晉從則與七國以尺牘約吳楚吳楚從則天下無不從之國然後定約若有果不從者則約從者曰吾屬以禮義尊天子以法度正諸侯使小國不常患弱大國不敢怙強此誠長世之䇿若天子國亡則諸矦交爭兵戈相臨誰為強者則安得世世禮讓相服宗廟血食我是故力勸諸矦尊天子今某國猶豫冝往問之若不從約則與諸矦率兵伐之分其疆土遷其子孫留百里之地奉其宗社下為諸矦廣子孫之業上為天子除不順之臣何如如此則諸矦誰敢不從然後定天子封畿諸矦疆域輿服器玩禮樂法度征賦貢輪自齊魯節正節正即定乃共盟曰有二約者當請命天子廢其驕凶以立恭順廢其荒惑以立明哲敢不聽者伐而分之如𥘉約制定於是諸矦先各造邸於天子之都諸矦乃相率朝覲巳而從天子齊戒拜宗廟禮畢天子誓曰於戲王室之卑久矣豫不敢望皇天后土之所覆載將且暮皂隸於諸矦不可則願全肌骨下見先王今諸矦不忘先王之太德不忘先公之忠烈共力正王室俾豫主先王宗祀豫若昏荒淫虐不納諫諍失先王法度上不能奉宗祀下不能安人民爾諸矦當理爾軍卒修爾矛戟約爾列國罪豫凶惡嗣立明辟豫若能日勉孱弱力遵先王法度上奉宗祀下安人民爾諸矦當保爾疆域安爾人民修爾貢賦共豫郊祀豫有此誓豈云及豫將及來世豫敢以此誓誓於宗廟豫敢以此誓誓於天地諸矦間天子之誓相率盟曰天子有誓俾我諸矦世世得力扶王室使先王先公德業永長諸矦其各銘天子之誓傳之後嗣我諸矦重自約曰諸矦有昏當如前盟若天子昏惑不嗣虐亂天下諸矦當力共規諷諌諍如甚不可則我諸矦共率禮兵及王之畿復諌諍如𥘉又甚不可則進禮兵及王之郊終不可則進禮兵及王之宫兵及宫矣當以宗廟之憂咨之當以人民之怨咨之當以天子昔誓咨之當以諸矦昔盟咨之以不敢欺先王先公告之以不敢欺皇天后土告之然後如天子昔誓如諸矦昔盟使管仲能如此則周之天子未為奴矣諸矦之國未則亡矣秦於天下未至是矣如曰仲才及也君不從也仲知及也時不可也則仲曽是謀也乎君不從也歟仲曽是為也乎時之不可也歟况今日之兵不可以禮義節制不可以盟誓禁止如仲之輩欲何為乎嬴秦論劉蛻無有天下而不知秦之焚書也無世而不謂不用聖人之道所以亡也嗚呼秦亡自亡也安能焚書為秦亡耳天下不用秦如聖人之道故秦不得其道而用也當其時天下一家而尊已外無非心之人故深法禁人之惡也則不當去法以禁人之善是則果習天下之離心而背已也豈秦區區之心歟蓋天必以秦之強暴非大敗無以叛其四海之心故先絶其事君敬長之術而後從天下以亡其天下焉夫天與秦則書存不與秦則書焚而秦終無自焚之心也且聖人宫先自藏其書是秦未始有焚書之心聖人之家先有其心矣故曰秦亡其自亡矣且聖人之道與天地合其久與鬼神合其微則不得毀置之在秦也然矣陶唐氏之水前有聖人之化後有聖人之勤而後民知事君敬長之術自秦之火前聖巳逺後聖不作而其術不數世亦已成矣豈非天之欲有絶而先絶其術欲有立而先立歟今或怨秦之火不全其道也不知秦火息矣蕭何求繼論程晏讀漢史者多曰曹參守蕭何之規日醉以酒民歌之曰蕭何為法講若畫一曹參代之守而勿失載其淸淨民以寧一其為漢之二賢相也至矣哉論曰非也暑牛之渴也豎子飲之渟淖之汚牛渴已久得渟淖之汚寧固於清泠之水乎設使豎子牽之於淸泠之水則滌乎腸中之泥也牛然後知渟淖之汚不可終日而飲之百姓罹秦之渴已久矣蕭何曰吾所以為法律是權天下之草創也吾不止此將致君為成康之君使民為成康之民是牽民於淸泠水也曹參日荒於酒惠帝訊焉參誷於惠帝曰髙帝創之陛下承之蕭何造之臣參遵之陛下垂拱臣等守職惠帝以為是也民又歌之也嗚呼漢之民以漢之汚愈於秦之渴不知牽於淸泠之水滌乎腸中之泥也蕭何之傳曹參也若木工能構材而未果覆而終者必待善覆者成焉何既構矣謂參為覆者參守其構而不能覆徒欺君曰陛下不如髙帝臣參不如蕭何善守可也何廢作哉若不可以為廢作即文帝除肉刑不為漢主仁聖之最也參不能孜孜其君於成康之政不知已不能覆何之構而荒於酒幸不同羲和之誅貪位畏勝飾情妄言以惑君也孰名為賢相耶吾病漢史以蕭何為善求繼以曹參為堪其後故為論之四維論柳宗元管子以禮義廉恥為四維吾疑非管子之言也彼所謂廉者曰不蔽惡也世人之命廉者曰不茍得也彼所謂恥者曰不從枉也世人之命恥者曰羞為非也然則是二者果義歟吾見其有二維未見其所以四也夫不蔽惡者豈不以蔽惡為不義而去之乎夫不苟得者豈不以茍得為不義而不為乎雖不從枉與羞為非皆然然則廉與恥義之小節也不得與義抗而為維聖人之所以立天下曰仁曰義仁主恩義主斷恩者親之斷者冝之而理道畢矣蹈之斯為道得之斯為德履之斯為禮誠之斯為信皆由其所之而異名今管氏所以為維者殆非聖人之所立乎又曰一維絶則傾二維絶則危三維絶則教覆四維絶則滅若義之絶則廉且恥其果存乎廉與恥存則義果絶乎人既蔽惡矣苟得從枉矣為非而無羞矣則義果存乎使管子庸人則為此言管子而少知理道則四維者非管子之言也六逆論春秋左氏言衛州吁之事因載六逆之説曰賤妨貴少凌長逺間親新問舊小加大淫破義六者亂之本也余謂少夌長小加大淫破義是三者固誠為亂矣然其所謂賤妨貴逺間親新間舊者雖為理之本可也何必曰亂夫所謂賤妨貴者蓋斥言擇嗣之道子以母貴者也若貴而愚賤而聖且賢以是妨之其為理本大矣而可捨之以從斯言乎此其不可固也夫所謂逺間親新間舊者蓋言任用者之道也使親而舊者愚逺而新者聖且賢以是而間之其為理本亦大矣又可捨之以從斯言乎必從斯言而亂天下謂之師古訓可乎此又不可者也嗚呼是三者擇君置臣之道天下理亂之大本也為書者執斯言著一定之論以遺後代上智之人固不惑於是矣自中人以降守是以為大據而致敗亂者固不乏焉晉厲死而悼公入乃理宋襄嗣而子魚退乃亂貴不足尚也秦用張祿而黜穰侯乃安魏相成璜而踈吳起乃危親不足與也符氏進王猛而殺樊世乃興胡亥任趙髙而族李斯乃亡舊不足倚也顧所信何如耳然則斯言殆可以廢矣噫古之言理者罕能盡其説建一言立一辭則甈而不安謂之是可也謂之非亦可也混然而巳教於後世莫知其所以去就明者慨然將定其是非則拘儒瞽生相與羣而咻之以為狂為怪而欲世之多有知者可乎夫中人可以及化者天下為不少矣然而罕有知聖人之道則固為書者之罪也辨私論牛僧孺近古之人所謂私者謂苟萃於利苟處於逸茍潤其屋者也某以為斯皆小人之私非聖賢之私也夫聖賢無私而不自知其私也何者必公其身而私於人是不私一身而使天下私之也胡以言之夫嬰兒見保傅之母則吒然而識非有知而親之利其乳而私之也櫪馬見厮養之夫則奮然而嘶非有知而親之利其芻粟而私之也夫天下之人非復乳孩櫪馬之愚也苟有公其身而利之者孰不利而私之乎故賢君良臣必私天下而公其身故天下之人皆私而親之暗君愚臣必公天下而私其身故天下之人皆公而踈之人踈之者多天下欲其昌也難矣昔大禹之手足胼胝是公其身於治水也臯陶之謀明弼諧是公其身於規諌也傅説之對揚王庭是公其身於輔佐也周公之吐握勤拳是公其身於禮賢也宣父之作春秋刪詩書是公其身於垂教也故有夏之人思大禹之功有虞之人思臯陶之直有商之人思傳説之政有周之人思周公之勤有道之人思宣父之教或開國尊其嗣而私之或建祠飾其像而私之至於商辛之聚財鹿臺是天下之利私於已也故天下公而踈之秦皇之廢棄諸侯是天下之爵私於身也故天下亦公而踈之故武王公天下之財而散之而天下之兆庶皆私而親之髙皇帝公天下之爵而封之而天下之英雄亦皆私而親之是以自私者人公而亡也自公者人私而昌也夫聖賢非必公其身私在其中不得不公也天下非必私於一人公在其中不得不私也余謂亡國之君亡家之臣亡身之人俱不得其道也非聖賢之無私也自明誠論歐陽詹自性達物曰誠自學達誠曰明上聖述誠以啓明其次考明以得誠茍非將聖未有不由明而致誠者文王周孔自性而誠者也無其性不可而及矣顔子遊夏得誠自明者也有其明可得而至焉從古而還自明而誠者衆矣尹喜自明誠而長生公孫弘自明誠而為卿張子房自明誠而輔劉公孫鞅自明誠而佐嬴明之於誠猶玉之待琢器用於是乎成故曰玉不琢不成器人不學不知道器者隱於不琢而見於琢者也誠者隱於不明而見乎明者也無有琢玉而不成器無有用明而不至誠焉嗚呼既明且誠施之身可以正百行而通神明處之家可以事父母而親兄弟遊於鄉可以睦閭里而寧訟爭行於國可以輯羣臣而子黎氓立于朝可以上下序據於天下可以教化平明之於誠所恨不誠也苟誠也蹈水火而罔害彌天地而必答豈止君臣鄉黨之間乎父子兄弟之際乎大哉明誠也凡百君子有明也何不急夫誠先師有言曰生而知之者上也所謂自性而誠者也又云學而知之者次也所謂自明而誠者也且仁逺乎哉我欲仁斯仁至矣夫然則自明而誠可致也茍致之者與自性而誠異派而同流矣知之者知之委之者知之論相杜牧吕公善相人言女吕后當大貴冝以配季季後為天子吕后復稱制天下王吕氏子弟悉以大國隋文帝相工來和輩數人亦言當為帝者後篡竊果得之誠相法之不謬矣吕氏自稱制通為后凡二十餘年間隋氏自篡至滅凡三十六年間男女族屬殺滅大盡當秦末吕氏大族也周末楊氏為八柱國公矦相襲久矣且以一女子一男子偷竊位號不三二十年間壯老嬰兒皆不得其死不知一女子為吕氏之福耶為禍耶一男子為楊氏之禍耶為福耶得一時之貴滅百世之族彼知相法者當曰此必為吕氏楊氏之禍乃可為善相人矣今斷一指得四海凡人不欲為况以一女子一男子易一族哉余讀荀卿非相因感吕氏楊氏知卿為大儒矣卜論李華天地之大德曰生舜好生之德洽于人心五福首乎壽麟鳳龜龍謂之四靈龜不傷物呼吸元和於介蟲為長而壽古之聖者刳而朘之觀其裂畫以定吉凶殘其生勦其壽既勦殘之而求其靈夫何故愚未知夫天地之心聖達之謨靈之壽之而夭戮之脫其肉鑽其骸精氣復於無物而貞悔發乎焦朽不其反耶夫大人與天地合其德與日月合其明與四時合其序與鬼神合其吉凶不當妄也壽而夭之豈合其德乎因物求徴豈合其明乎毒靈介而徼其神豈合其序乎假枯殼而決狐疑豈合其吉凶乎洪範曰爾有大疑謀及卜筮聖人不當有疑於人以筮也夫祭有尸自虞夏商周不變戰國蕩古法祭無尸尸之重重於卜則明廢龜可也又聞夫鑄刀劒者不成則屠犬彘而祭之𬒳髮而哭之則成而利蓋不祥器也其神者躍為龍蛇穿木石入泉源以至發炯光聲音人不能自神因天地之氣化天地之物而為神固無悉然是亦為怪古者成宫室必落之鐘鼓器械必釁之豈神明貴殺亨羶腥歟今亡其禮未聞屋室不安身而器物不利用由是而言則卜筮隂陽之流皆妄作也夫潔壇墠而布精誠求福之來𬗟不可致耕夫𧖟婦神一草木禱一禽畜鼓而舞之謂妖祥如答實歟妄歟犧文之易更周孔之述以為至矣楊子雲為太玄設卦辨吉凶如易之告若使後代有如楊子雲又為一書可筮則象數之變其可既乎專任道德以貫之則天地之理盡矣又焉假夫蓍龜乎又焉徴夫鬼神乎子不語是存乎道義也重校正唐文粹卷第三十五嘉靖甲甲歲太學生姑蘇徐焴文明刻于家孰
