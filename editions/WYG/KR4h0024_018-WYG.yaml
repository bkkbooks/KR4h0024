body:
  text: 書懐劉幽求心為明時盡君門尚不容田園迷徑路歸去欲何從自紀皇甫松皇天后地力使我向此生貴賤不我均若為天地情我家世道徳㫖意匡文明家集四百巻獨立天地經寄言青松姿豈羡朱槿榮昭昭大化光共此遺芳馨贈友人吕温南山雙喬松擢本皆千尋夕流膏露津朝被青雲隂負雪出深澗摇風倚髙岑明堂乆不構雲榦何森森匠意方雕巧時情正誇滛生材㑹有用天地豈無心贈韓愈二首孟郊何以定交契贈君髙山石何以保貞妍贈君青松色貧交過此外無可相形飾更有其鼠詩吟之堪淚滴其鼠既穿墉又齧機上絲穿墉有閒土齧機無餘絲朝吟枯桑柘暮泣空杼機豈是無巧妙絲斷將何施衆人尚肥華志士多飢羸願君保此節天意當察微前日逺别離今日生白髪欲知萬里情曉卧半牀月常恐百蟲秋使我芳草歇贈喬林劉眘虛去年上䇿不見收今年寄食乃淹留羡君有酒能便醉羡君無錢能不憂如今五侯不待客羡君不問五侯宅如今七貴方自尊羡君不過七貴門丈夫㑹應有知巳世上悠悠何足論寄唐生白居易賈誼哭時事阮籍哭路岐唐生今亦哭異代同其悲唐生者何人五十寒且飢不悲口無食不悲身無衣所悲忠與義悲甚則哭之太尉擊賊日段太尉以笏擊朱泚尚書叱盜時顔尚書叱李希烈大夫死兇冦陸大夫為亂兵所害諫議謫蠻夷楊諫議左遷道州每見如此事聲發涕輒隨往往聞其風俗士猶或非憐君頭半白其志竟不衰我亦君之徒鬱鬱何所為不能發聲哭轉作樂府詩篇篇無空文句句必盡規切過虞人箴痛甚騷人詞非求宫律髙不務文字奇惟歌生民病願得天子知未得天子知甘受時人嗤藥良氣味苦瑟淡音聲希不懼權豪怒亦任親朋譏人竟無奈何呼作狂男兒每逢羣動息或遇雲霧披但自髙聲歌庶幾天聽卑歌哭雖異名所感則同歸寄君三十章與君為哭詞華下司空圖日炙寒雲裂迸為千道血天地沸一鑊竟自烹妖孽堯湯遇災數災數還中輟何事奸與邪古來難復滅傷時二首孟雲卿徘徊宋郊上不見平生親獨立正傷心悲風來孟津大方載羣物生死有常倫虎豹不相食哀哉人食人豈知逢世運天道亮云云太虛流素月三五何皎明光曜侵白日賢愚迷至精四時更變化天道有虧盈常恐今已没須臾復更生封丘作髙適我本漁樵孟諸野一生自是悠悠者乍可狂歌草澤中寧堪作吏風塵下秖言小邑無所為公門百事皆有期拜迎官長心欲碎鞭撻黎庶令人悲悲來向家問妻子舉家盡笑今如此生事應須南畝田世情付與東流水夢想舊山安在哉為銜君命且遟迥乃知梅福徒為爾郤憶陶濳歸去來街西居三首姚合受得山野性任成多事違青山在宅南迥首東西睎淺淺一井泉數家共汲之獨我惡水濁鑿井庭之陲自鑿還自飲亦為衆所非吁嗟世間事絜身誠難為日出窮巷喜温然勝重衣重衣豈不暖暖氣人不齊兀兀復行行不離階與墀丈夫非馬蹄安得知路岐窮賤飱茹薄興與養性宜乃知長生術豪貴難得之效陳拾遺子昻司空圖醜婦競簪花花多映愈醜鄰女恃其姿掇之不盈手量已苟自私招損乃誰咎寵禄既非安於吾竟何有感時好鳥無惡聲仁獸肯狂噬寧教鸚鵡啞不遣麒麟細人人語與黙唯觀利與勢愛毁亦自遭掩謗終失計夜坐張説懐哉四壁時未有五都價百金誰見許斗酒難為貰落花生芳春孤月皎清夜復逢利交客題户遥相謝無可奈何歌白居易無可奈何兮白日走而朱顔頽少日往兮老日催生者不住兮死者不迴况乎寵辱豐顇之外物又何嘗不一去而一來去不可挽兮來不可推無可奈何兮已焉哉惟天長而地乆前無始兮後無終嗟吾生之幾何寄瞬息乎其中又如太倉之稊米委一粒於萬鍾何不與道逍遥委此從容縱心放志洩洩融融胡為乎分愛惡於生死繫憂喜於窮通倔强其骨髓齟􅀈其心胷合冰炭以交戰秖自苦乎厥躬彼造物者于何不為此與化者云何不隨或煦或吹或盛或衰雖千變與萬化委一順以貫之為彼何非為此何是誰冥此心夢蝶之子何禍非福何吉非凶誰達此觀䘮馬之翁俾吾為秋毫之杪吾亦自足不見其小俾吾為泰山之阿吾亦無餘不見其多是以達人静則脗然與隂合迹動則浩然與陽同波委順而已孰知其他時耶命耶吾其無奈彼何委邪順邪彼亦無奈吾何夫兩無可奈何然後能冥至順而合大和故吾所以飲大和扣至順而為無可奈何之歌逢白公元稹逺路事無限相逢唯一言月色照榮辱長安千萬門感懐費冠卿螢燭不為苦求名始辛酸上國無交親請謁多少難九月風割面羞汗成冰片求名俟公道名與公道逺力盡得一名他喜我且輕家書十年絶歸去知誰榮馬嘶渭河栁特地起愁聲贈崔純良孟郊食薺腸亦苦强歌聲無歡出門即有礙誰謂天地寛有礙非遐方長安大道傍小人知慮險平地生太行鏡破不改光蘭死不改香始知君子交乆乆道益彰君心與我懐離别俱恛惶譬如浸蘖泉流苦日已長忍泣目已衰忍憂形易傷項籍豈非壯賈生豈非良當其失意時涕泗各滿裳古人勸加食此食難自强一飯九祝噎一嗟十斷腸况非兒女冤冤氣凌彼蒼彼蒼若有知白日下清霜今朝始驚呼碧落空茫茫客喜賈島客喜非實喜客悲非實悲百迴信到家未當身一歸未歸長愁嗟愁嗟填中懐問口吐愁聲還却入耳來嘗恐滴淚多自損兩目輝鬢邊雖有絲不堪織寒衣有所思宋之問洛陽城東桃李花飛來飛去落誰家幽閨兒女惜顔色坐見落花長歎息今年花落顔色改明年花開復誰在已見松柏摧為薪更聞桑田變成海古人無復洛城東今人還對落花風年年嵗嵗花相似嵗嵗年年人不同寄言全盛紅顔子須憐半死白頭翁此翁白頭真可憐伊昔紅顔美少年公子王孫芳樹下清歌妙舞落花前光禄池臺文錦繡將軍樓閣畫神仙一朝卧病無相識三春行樂在誰邊婉轉蛾眉能幾時須臾鶴髪亂如絲但看古來歌舞地唯有黄昬鳥雀飛秦人謡古之奇微生祖龍代郤思堯舜道何人仕帝庭拔殺指佞草姦臣弄民柄天子恣衷抱上下一相蒙馬鹿遂顛倒中國既版蕩骨肉安可保人生貴年夀吾恨死不早時興楊賁貴人昔未貴感願顧寒微及自登樞要何曽問布衣平明登紫閣日晏下彤闈擾擾路傍子無勞歌是非聞碪有感吕温千門儼雲端此地富羅紈秋月三五夜砧聲滿長安幽人感中懐静聽淚汍瀾所恨搗衣者不知天下寒野田行于鵠日没出古城野田何茫茫寒狐上孤冢鬼火燒白楊昔人未為泉下客若到此中還斷腸贈馮宿李觀寒晨上秦原遊子衣飄飄黑雲截萬里獵火從中燒隂空蒸長烟殺氣獨不銷氷交石可裂風疾山如摇時無青松心顧我獨不凋偶然作二首吕温棲棲復汲汲忽覺年四十今朝滿衣淚不是傷春泣中夜兀然坐無言空涕洟丈夫志氣事兒女安得知及第後答潼闗主人本欲雲雨化却隨波浪翻一霑太常地十過潼闗門志力且虛棄功名誰復論主人固相問慙笑不能言朝飢賈島市中有樵山此舍朝無烟井底有甘泉斧中乃空然我要見白日雪來塞青天立聞西牀琴凍折兩三弦飢莫詣他門古人有拙言九日詶顧少府髙適簷前白日應可惜籬下黄花為誰有客子迎霜未授衣主人得錢肯酤酒蘇秦憔悴時多厭蔡澤棲遟世看醜縱使登髙秖斷腸不如獨坐空搔首觀玉篇并序陳子昻丙戌嵗余從左補闕喬公北征夏四月軍幕舍于張液河河州草木無他異者唯有仙人杖往往叢生幽朔地寒與中國頗異余家世好服食昔嘗餌之及此役也而息意兹味戍人有薦嘉蔬者此物存焉余囅爾而笑曰始者與此君别不圖至是而見之豈非神明嘉惠將欲扶吾夀也因為喬公昌言其能時東萊王仲烈亦同旅舍聞而大喜甘心食之已旬有五日矣適有行人自謂知藥者謂喬公曰此白棘也公何謬哉仲烈愕然而疑亦曰吾怪其味甜今果如此喬公信是言乃譏余作采玉篇謂宋人不識玉而寶珉石也余心知必是猶以獨見之故被奪於衆人乃喟然而歎曰嗟乎人之大明者目也心之至信者口也夫目照五色口分五味𤣥黄甘苦亦可斷而不惑矣而路傍一議二子增疑况君臣之間朋友之際乎自是而觀之則萬物之情可見也感采王詠而作觀玉篇以答之并示仲烈譏其失真也䲭夷雙白玉此玉有緇磷懸之千金價舉世莫知真丹青非異色輕重有殊倫勿信玉工言徒悲荆國人素絲陸龜蒙園客麗獨繭詩人吟五緵如何墨子淚反以悲途窮我意豈於是願參天地功為綫補君衮為弦繫君桐左右修闕職宫啇還古風端然潔白心可與神明通李都尉古劒白居易古劒寒黯黯鑄來幾千秋白光納日月紫氣排斗牛有客借一觀愛之不敢求湛然玉匣中秋水澄不流至寶有本性精剛無與儔可使寸寸折不能繞指柔願快直士心將斷佞臣頭不願報小怨夜來刺私讎勸君慎所用無作神兵羞廢琴絲桐合為琴中有太古聲古聲淡無味不稱今人情玉徽光彩滅朱弦塵土生廢棄來已乆遺音尚泠泠不辭為君彈縱彈人不聽何物使之然羌笛與秦箏廢瑟詞張籍古瑟在匣誰復識玉柱顛倒朱絲黑千年曲譜不分明樂府無人傳正聲秋蟲暗穿塵作色腹中不辨工人名幾時天下復古樂此瑟還奏雲門曲説劒元稹吾友有寶劒宻之如宻友我寶膠漆交中堂共杯酒酒酣肝膽露恨不眼前剖髙唱荆卿歌亂擊相如缶更擊復更唱更酌亦更夀白虹坐上飛青蛇匣中吼我聞音響處疑是干將偶為君再拜言神物可見不君言亦可見復言我自取迎匣已焚香近鞘先澤手徐抽寸寸刃漸屈彎彎肘殺殺霜在鋒團團月臨鈕逡巡濳虯躍鬱律驚左右霆雷滿室光蛟龍繞身走我為捧之泣此劒别來乆鑄時堇山破藏在松桂朽幽匣獄邊埋神人水心守本用稽泥淬果非雷煥有我欲評劒功願君良聽受劒可剸犀兕劒可切瓊玖劒決天外雲劒衝日中斗劒隳妖蛇腹劒拂佞臣首太古初斷鼇武王親擊紂燕丹巻地圖陳平綰花綬曽被桂樹枝寒光射林莽曽經鑄農器利用翦稂莠神物終變化復為龍牝牡晉未武庫燒脱然排户牖為欲掃羣胡散作彌天帚自兹失所往豪英共為詬今復誰人鑄挺然千載後既非古風胡無乃近鵶九自我與君遊平生益自負况擎寶劒出重以雄心扣此劒何太奇此心何太厚勸君慎所用所用無或苟濳將避魑魅勿但防妾婦留斬泓下蛟莫試街中狗君今困泥滓我亦坌塵垢俗耳驚大言逢人少開口春桂問答二首王績問春桂桃李正芬華年光隨處滿何事獨無花春桂答春華詎能乆風霜摇落時獨秀君知不養鷙詞并序劉禹錫途逢少年志在逐絶句方呼鷹隼以襲飛走因縱觀之卒無所獲行人有嘗從事於斯者曰夫鷙禽飢則為用今哺之過篤故然也予感之作養鷙詞養鷙非玩形所資擊鮮力少年昧其理日日哺不息探鶵網黄口旦暮有餘食寧知下韝時翅重飛不得陪鰓止林表狡兎自南北飲啄既已盈安能勞羽翼對菊賈島九日不出門十日見黄菊灼灼尚繁英美人無消息直鈎吟盧仝初嵗學釣魚自謂魚易得三十持釣竿一魚釣不得人鈎曲我鈎直哀哉我鈎又無食文王已没不復生直鈎之道何時行競渡元稹吾觀競舟子因測大競源天地昔將競蓬勃晝夜昬龍蛇相噴薄海岱俱崩奔羣動皆攪撓化作流渾渾數極鬬心息太和蒸混元一氣忽為二矗然畫乾坤日月復照曜春秋遞寒温八荒坦以曠萬物羅亦繁聖人中間立理世了不煩延緜復幾嵗逮及羲與軒炎皇熾如炭蚩尤扇其燔有熊競心起驅獸出林樊一戰波委熖再戰火燎原戰訖天下定號之為軒轅自是豈無競𤨏細不復言其次有龍競競渡龍之門龍門浚如瀉淙射不可援赤鱗化時至唐突鬐鬛掀乘風瞥然去萬里黄河翻接瞬電烻出微吟霹靂喧傍瞻曠宇宙俯瞰卑崐崘庶類咸在下九霄行易捫倐辭蛙黽穴遽排天帝閽迥悲暴鰓者未免鯨鯢吞帝命澤諸夏不棄蟲與昆隨時布膏露稱物施厚恩草木霑我潤豚魚望我蕃嚮來同競輩豈料由我存壯哉龍競渡一競身獨尊捨此皆蟻鬬競舟何足論冬日見牧牛人擔青草歸張説塞上緜應折江南草可結欲持梅嶺花逺競榆闗雪日月無他照山川何頓别苟齊兩地心問天將安設道州觀野火吕温南風吹烈火熖熖燒楚澤陽景當晝連隂天半夜赤過處若彗掃來時如電激豈復辨蕭蘭焉得分玉石蟲蛇盡爍爛虎兕亦奔迫積穢一蕩除和氣始融液堯時既敬授禹稼斯肇迹遍生合頴禾大秀兩岐麥家有京坁詠人無溝壑慼若悟焚如功來嵗終受益諭寶二首元稹沉玉在弱泥泥弱玉易沉扶桑寒日薄不照萬丈心安得濳淵虯拔壑超鄧林泥封泰山阯水散旱天霖洗此泥下玉照曜臺殿深刻為傳國寶神器人不侵水置白玉壺始見清皎絜珠穿殷紅縷始見明洞徹鏌鎁無人淬兩刃幽壤鐵春鏡無人拭一片埋霧月驥跼環琽中骨附筋入節虯蟠尺澤内魚貫蛙同穴艅艎無巨海浮桴矜瀎潏棟梁無廣夏顛倒卧霜雪大鵬無長空舉翮受羈紲豫章無厚地危柢真􅘕􅙠圭璧無卞和甘與頑石列舜禹無陶堯名隨腐草滅神功伏神物神物神乃别人神不世出所以神功絶神物豈徒然用之有施設禹功九州理舜徳天下悦璧充傳國璽圭用祈泰折千尋豫章榦九萬大鵬歇棟梁庇生民艅艎濟來哲虯騰旱天雨驥騁流電掣鏡懸姦膽露劒拂妖蛇裂珠生照乘光冰瑩環座熱此物比在泥斯言為誰發於今盡凡耳不為君不説送春曲三首劉禹錫春向晚春晚思悠哉風雲日已過花葉自相摧漠漠空中去何時天際來春已暮苒苒如人老映葉見殘花連天是青草可憐桃與李從此同桑棗春竟去此去何時迥遊人千萬恨落日上髙臺寂寞繁華盡流鸎歸不來衡州早春二首吕温碧州何逶迤東風吹沙草烟波千里曲不辨嵩陽道病肺不飲酒傷心不看花唯驚望鄉處猶是隔長沙尋人偶題邵真日昃不復干花落難歸樹人生能幾何莫厭相逢遇題花樹楊衡都無看花意偶到樹邊來可憐枝上色一一為愁開惜花陸龜蒙人夀期滿百花開唯一春其間風雨至旦夕旋為塵若使花解愁愁於看花人秋日耿緯返照入閭巷憂來與誰語古道無人行秋風動禾黍秋夕懐逺孟郊卧冷無逺夢聽秋酸别情髙枝低枝風千葉萬葉聲淺井不供飲瘦田長廢耕今交非古交貧語聞皆輕蟋蟀詩羅隱頑颸斃芳吹愁夕長屑戍有動歌離弔夢如訢如言緒引虛寛周隙伺榻繁咽夤縁范睡蟬老冠峨緌好不冠不緌爾奚以悲蚊蚋有毒食人肌肉蒼蠅多端黑白偷安爾也出處物兮莫累壊舍啼衰虛堂泣曙勿狥諠譁鼠豈無牙勿學萋菲垣亦有耳危條槁飛抽恨咿咿别帳釭冷柔魂不定美人在何夜影流波與子佇立徘徊思多秋思司空圖身病時亦危逢秋多慟哭風波一摇蕩天地幾翻覆孤螢出荒池落葉穿破屋勢利長草草何人訪幽獨在郡秋懐二首張九齡秋風入前林蕭飋鳴寒枝寂寞遊子思寤歎何人知宦成名不立志在嵗已馳五十而無聞古人深所疵平生去外飾直道如不羇未得操割效忽復寒暑移物情有固然身退毁亦隨悠悠滄江渚望望白雲涯露下霜且降澤中草披離蘭艾若不分安用馨香為庭燕生白露嵗候感遐心䇿蹇慙逺塗巢枝思故林小人恐致冦終日如臨深魚鳥好自逸池籠安所欽挂冠東都門採蕨南山岑議道誠愧昔覽分還愜今憮然憂成老空爾白頭吟唐文粹巻十八欽定四庫全書唐文粹巻十九上宋姚鉉編
