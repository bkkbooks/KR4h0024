body:
  text: 吳興姚鉉纂書九揔六首自薦上張燕公書房琯上裴度相公書元稹上鄭相公書歐陽詹上宰相三書韓愈上張燕公書房琯竊惟當今主英臣誠海平天清干相國者更言朝廷之遺闕黔黎之艱阻妄矣琯直以有詞不自明徴積心無與消散此亦一夫不獲願就相門陳之或議相門重深賤士罕及進言不少非人則廢退而復念止于旬時若借人為容則恥殊特達欲持情徑往則懼致忽遺思所以自竒圖左右見異僭用舊禮獻此琬圭兾贄列得啓其書書窮思見其人矣至有輕好行怪易為犯德琯非敢如此也願左右明之琯嘗聞既往布衣之士亦賤者也而一人下之三公崇之將欲分其賢愚而係其理亂琯自料必不能有損益於盛朝徒亦形似英哲之蹤辱纍圭璋之德希左右以公選琯因以私進所私者則敢終而言之琯幼為先相國棄委翳於蓁蕪之下因物遂遷與農者莫辨不忍窘厄然後以災穫為懷將祗若遺謀乃發前言筐篋有相公述作焉有先君鑒誡焉約之立言依以扶信若赴古道則適若逢今人則乖或謂之非或謂之是求我哲匠繫此困蒙顧此身在下流無聞上士未足為先君之嗣不可見先君之友況有貴賤之異為之隔闊乎深惟達音者希恐不可再得忽不知相國之富貴如此琯之貧賤又如此期相國乃曰人以道義求我我不當以貴賤隔之借如宣父有相國之貴寧拒遊夏之徒歟夫其此心千載一用豈琯也當之又見禮經有難進易退者戒貪也起人來學者勸道也琯趣仁者而久未行何乎衣惟素褐乘非車馬閽人斥之馭者排之長衢高門驟拜左右則近於論訴豈聞道之士乎故獻王貢書以先其意或垂善誘使得登其門假以溫和之顔賜其清間之宴大觀宗廟旁見百官上咨為人之紀綱次及作文之利害然後陳百一之誠諷南山之詩醉德寫誠俯而告退琯之願也未敢忘也若其取於是日許時入奉一歲之內得再廁法曹舍人聞詩禮焉人子畢矣豈有恨哉至如笥有衣裳天有秩序聖君在上何人不欲如琯今日未敢生心儻見露之時為左右所器亦願起自燕國門下令衆人别意瞻矚也貪竭鄙志不覺多言妨塵宴私憂危失措儻左右垂無窮之惠降不測之禮錫數字之答加一介之使則相國保下士之譽小人獲見知之榮光照微軀價傳多士輒飾瑣貌以俟軒車上裴度相公書元稹通州司馬元稹謹再拜獻書相公閣下日者相公之掾洛也稹獲陪侍道途不以庸妄話及章啓則竊聞閣下以文皇勑起居郎書居安思危四字於笏為至戒今陛下當晉武平吳之後閣下即東征而還安孰甚焉思豈可廢況今四邸並開掃門之賔競至碣石餘沴束身之𣢾未堅則推食握髮之意可遽移於高枕擊鍾之逸矣且得人則理之談實老生之常語至於切近猶飢者欲食不可惡熟俗而不言也若稹之末學淺見又安敢引喻古昔於閣下獨憶得近日故裴兵部之納人也甄辨精淨號為名流及其為相也搆置羣材使梁棟榱桷咸適其用人頗隘之至於激濁揚清亦無所愛吝是以稟政不纍月閣下自外寮為起居郎韋相自巴州知制誥張河南自雍幕為御史李西川自饒州為雜端密勿津梁之地半得其人如故韋纁如稹等拔於疑礙置於朝行者又十數然後排異已之巨敵引腹心之至交當時一二年間幾至於姦無蹊隧而正有根本矣及山東沴作上以兵事咨之則對以禁暴息人之外不能有以佐震耀是以樽俎之謀不專於廓廟蓋廉善精微之士素熟於心胸而泛駕乘桴之材未嘗量校於左右也比於閣下今日之雄材大略為短矣然而即丗之後雖無李嚴廖立之思而十年之內備將相號名卿者多其引拔嗚呼子皮叔牙之功斯不細矣日者閣下方事淮蔡獨當爐鎚內藴深謀外排羣議始以追韓信拔吕蒙為急務固非叔孫通薦儒之日也今殊勳既建至化方行亦當念魏鄭公守成之難而三復文皇帝思危之詔乎以愚揆之欲人不怨莫若遷授之有常欲人之竭誠莫若救拯於焚溺何謂有常而不怨以省言之由後行為前行以臺言之自察院轉殿院茍不如是則怨矣茍能如是何怨哉何謂救拯而竭誠稹又不敢移之他人借如小生之庸且昧也固不及班行之中輩又敢自讓於郎吏之末者邪向使元和中一年為拾遺二年為補闕不三四年為貟外又三四年為正郎則宰物者雖朝許之以綸誥暮許之以專席厚則厚矣遽責有隳肝瀝膽同厮養之用力亦難哉及夫為計不良困於溝瀆者十年矣茍有舒其胼攣置之趨走者又不敢愛氣力吝心髓於和扁也是猶龜鼉之有水鳥獸之有林何嘗愧於水木苟或縶而籠之鎖而檻之其或放之投之者則必啁噍顧慕以報人報其免於難也今天下病溝瀆困籠檻思閣下藥之養之投之放之者豈特小生而巳哉且曩時之窒閣下及小生者豈不以閣下疏有居安思危之字為抵忌對上以河南掾尉非貶官為説乎向非裴兵部一二明之則稹終老於貧賤固其冝也儻閣下猶二三年遲回於外任則少陽邀望之際固未得奉惶惶之命以周知其巢穴當元濟討除之始又安能定巳成之册於上前排未亡之疑於衆口哉今天下能不有萬一於閣下之才略而由局足怗脅私自憐其有志力哉況當今陛下在宥四海與人更始特降含垢棄瑕之書且授隨材任能之柄於閣下閣下若不能蕩滌痕纍洞開嫌疑棄仇如振塵愛士如救餒使恃才薄行者自贖於煩辱以能見忌者騁力於通衢上以副聖君咸與惟新之德次以廣閣下常善救人之道使千百年外謂閣下與裴兵部為交相短長亦足為賢相矣未盡善也且夫當陛下肇臨宇宙之初與得天久照之後愈光明矣安有裴兵部拔羣材於前則盡行閣下拔羣材於後則盡廢以閣下沐浴恩波之始與徽猷克壯之秋愈汪洋矣又安有救裴寰之罪換禹錫之官則盡易振天下之窮滯行渙汗之條目則為難稹雖至愚未敢然也稹自十年遭罹多故每欲發書故舊尚不敢盡陳其情豈不知干宰相有不測之罪邪熟自忖之與其瘴死蠻夷自題不遇之榜比夫塵穢尊重伏俟危言之刑無異也聊因所善緘獻鄙誠翹企刑書不敢逃讓不宣稹頓首上鄭相公書歐陽詹將仕郎守國子監四門助教歐陽詹謹齊沐緘書再拜遣隸子弟獻於相公中衢之車下庶及乎閣下當今主上聖哲輔相賢明可行巳行可止巳止其或未行未止非不知也非不念也未可行而未可止也其愚蒙欲陳所知則在知之之後念之之內矣亦何敢言今斯有言自言而巳人有百行修萬事精內扣濳鳴外聽無聲非不願用而人不用非不願旌而人不旌雖和乎之代至老至死者相公以為有之乎某將十有十百有百千有千也何以苦知自壽百歲七十者稀某今四十有加矣更三十年於此是一生不覩高衢逺途矣況先三十年孰知存亡哉其或素蓄當在重泉之下矣忖已方人所以知百行修萬事精內叩濳鳴外聽無聲非不願用而人不用非不願旌而人不旌雖和平之代至老至死者十有十百有百千有千也嗚呼今之高懸爵祿廣設名位實大乎德行與乎能事也德行也者孝悌也忠信也不可於公堂斯須而得試也須漸乎父母昆弟之言沿乎州閭鄉曲之譽在三江之南孝悌之言無由漸朝廷之耳忠信之譽莫得通闕下之聞也能事也者秉持也應奉也不可虛處無任而得呈也須形乎政令裁制之庸著乎役藝使才之致某冗官也政令裁制一月兩衙之謂役藝使才二奠陪行而巳秉持之庸不可形考課之目應奉之致是絶著選能之見也縱有顔閔之德遊夏之學宰我之政夫子之文章其於是也但父母昆弟自相知州閭鄉曲自相許於海隅嶺徼其奈拳拳之身何夫大田斯穫而有遺秉則滯穗也萬秉稀一萬穗稀一某豈遂當其一乎且天地也命之翅必與之羽翮副其巨細使得飛也命之足必與之蹄跖稱其短長使得行也若命之翅而不與之羽翮與之而巨細不相副飛則墜若命之足而不與之蹄跖與之而短長不相稱行必顛命適遺之墜與適遺之顚則如無命無與也其庸愚不知造物之旨者示之則不之怪其明賢深探理源者其謂天地何且邦國也勸人以德行用錫之爵祿必契其分量使得行道也聳人以能事用錫之名位必權其輕重使得榮身也若勸以德行而不錫之爵祿錫之而分量不相契道則屈聳以能事而不錫之名位錫之而輕重不相權身則辱勸適遺之屈聳適遺之辱則如無勸無聳也其庸愚不知政化之旨者視之則不之怪明賢深探理體者其謂邦國何某代居閩至于吳則絶同鄉之人矣自吳至于楚則絶同方之人矣過宋由鄭踰周到秦朝無一命之親路無回眸之舊猶孤根寄不食之田也人人耘耨所不及家家溉灌所不霑其灌乃條枚成乃華實者上天至仁之膏澤厚地無私之陽春乎相公為上天之霖雨佐厚地之發生也何以處某焉夫舉善不遺於微陋用能必盡其材器真宰相之任也自唐及虞有其人自夏及商有其人自周及秦有其人自漢而降無代無之泊國朝歷歷可數也相公能以某為手下濫觴乎似善斯升真善以至似能斯拔真能以來古人行此天下歸仁也相公行之哉行之哉今則猶古算度途逺蒼黃造次某惶恐再拜上宰相三書韓愈正月二十七日前鄉貢進士韓愈謹伏光範門下再拜獻書相公閣下詩之序曰菁菁者莪樂育材也君子能長育人材則天下喜樂之矣其詩曰菁菁者莪在彼中阿既見君子樂且有儀説者曰菁菁者盛也莪微草也阿大陵也言君子之長育人才若大陵之長育微草能使之菁菁然盛也既見君子樂且有儀云者天下美之之辭也其三章曰既見君子錫我百朋説者曰多之之辭也言君子既長育人才又當爵命以賜之厚祿以寵貴之云爾其卒章曰泛泛揚舟載沈載浮既見君子我心則休説者曰載者載也沈浮者物也言君子之於人才無所不取若舟之於物浮沈皆載之云爾既見君子我心則休云者言若此則天下之心美之也君子之於人也既長育之又當爵命寵貴之而於其才無所遺焉孟子曰君子有三樂王天下不與存焉其一曰樂得天下之英才而教育之此皆聖人賢士之所極言至論古今之所冝法者也然則熟能教育天下之才將非吾君與吾相乎幸今天下無事小大之官各守其職錢榖甲兵之問不至於廟堂論道經邦之暇捨此宜無大者焉今有人生二十八年矣名不著於農工商賈之版其業則讀書著文歌頌堯舜之道雞鳴而起孜孜焉亦不為利其所讀皆聖人之書楊墨釋老之學無所入於其心其所著皆約六經之旨而成文抑邪與正辨時俗之所惑居窮約亦時有感激怨懟竒怪之辭以求知於天下亦不悖於教化妖淫諛佞譸張之説無所出於其中四舉於禮部乃一得三選於吏部卒無成九品之位其可望一畒之宅其可懷遑遑乎四海無所歸恤恤乎飢不得食寒不得衣濵於死而益固得其所者爭笑之忽將棄其舊而新是圖求老農老圃而為師悼本志之變化中夜涕泗交頤雖不足當詩人孟子之謂抑長育之使成才其亦可矣教育之使成才其亦可矣抑又聞古之君子相其君也一夫不獲其所若已推而內之溝中今有人生七年而學聖人之道以修其身積二十年不得巳一朝而毁之是亦不獲其所矣伏念今有仁人在上位若不往告之而遂行是果於自棄而不以古之君子之道待吾相也其可乎寧往告焉若不得志則命也其亦行矣鴻範曰凡厥蔗民有猷有為有守汝則念之弗協于極弗罹于咎皇則受之而康而色曰余攸好德汝則錫之福是皆與善之辭也抑又聞古之人有自進者而君子不逆之矣曰余攸好德汝則錫之福之謂也抑又聞上之設官制祿必求其人而授之者非苟慕其才而冨貴其身也蓋將用其能理不能用其明理不明者耳下之修已立誠必求其位而居之者非苟役於利而榮於名也蓋將推巳之所餘以濟其不足者耳然則上之於求人下之於求位交相求而一其致焉耳苟以是而為心則上之道不必難其下下之道不必難其上可舉而舉焉不必讓於其自舉也可進而進焉不必廉於其自進也抑又聞之上之化下得其道其勸賞不必遍加乎天下而天下從焉因人之所欲為而遂推之之謂矣今天下不由吏部而仕進者幾希矣主上感傷山林之士有遺逸者屢詔內外之臣旁求儒士于四海而其至者蓋闕焉豈其無人乎哉亦見國家之不以非常之道禮之而不來耳彼之處隱就間者亦人耳其耳目鼻口之所欲其心之所樂其體之所安豈有異於人乎哉今所以惡衣食窮體膚麋鹿之與處猿狖之與居固自以其身不能與時俗順俯仰故甘心自絶而不悔焉而方聞國家之仕進者必舉於州縣然後升於禮部吏部試之以繡繢雕琢之文考之以聲勢之逆順章句之長短中其程式者然後得從下士之列雖有化俗之方安邊之畫不繇是而稍進萬不有一得焉彼惟恐入山之不深入林之不密其影響昧昧唯恐聞於人也今若聞有以書進宰相而求仕者而宰相不辱焉而薦之於天子而爵命之而布其書於四方枯稿沈溺魁閎寬通之士必且洋洋焉動其心峩峩焉纓其冠于于焉而來矣此所謂勸賞不必遍加乎天下而天下從焉者也因人之所欲為而遂推之之謂者也伏惟覽詩書孟子之所指念育才錫福之所以考古之君子相其君之道而忘自進自舉之罪思設官制祿之故以誘致山林逸遺之士庶天下之行道知所歸焉小子不敢自揆其常所著文輒採其可者若干首録在異卷辱賜觀焉干黷尊嚴伏地待罪愈再拜後十九日復上書二月十六日前鄉貢進士韓愈謹再拜言相公閣下上書及所著文後待命凡十有九日不得命恐懼不敢遁逃不知所為乃復敢自納於不測之誅以求畢其説而請命於左右愈聞之蹈水火者之求免於人也不惟其父兄子弟之慈愛然後呼而望之也將有介於其側者雖其所憎惡茍不至乎欲其死者則將大其聲疾呼而望其仁人之救也彼介於其側者聞其聲而見其事不惟其父兄子弟之慈愛然後往而全之也雖有所憎惡茍不至乎欲其死者則將狂奔盡氣濡手足燋毛髮救之而不辭也若是者何哉其勢誠急而其情誠可悲也愈之強學力行有年矣其愚不惟道之險夷行且不息以蹈於窮餓之水火其既危且亟矣大其聲而疾呼矣閣下其亦聞而見之矣其將往而全之歟抑將安而不救之歟有來言於閣下者曰有觀溺於水而爇於火者有可救之道而終莫之救也閣下且以為仁人乎哉不然若愈者亦君子之所冝動心者也或謂愈曰子言則然矣宰相則知子矣如時不可何愈竊謂之不知言者誠其才能不足當吾相之舉耳若所謂時者固在上位者為之耳非天之所為也前五六年時宰相薦聞尚有自布衣蒙抽擢者與今豈異時哉且今節度觀察使及防禦營田諸小使等尚得自舉判官無間於巳仕未仕者況在宰相吾君所尊敬者而曰不可乎古之進人者或取於盜或舉於管庫今布衣雖賤猶足以方於此情隘辭蹙不知所裁亦惟少垂憐察焉愈再拜後二十九日復上書三月十六日前鄉貢進士韓愈謹再拜言相公閣下愈聞周公之為輔相其急於見賢也方一食三吐其哺方一沐三握其髮當是時天下之賢才皆巳舉用姦邪讒佞欺負之徒皆巳除去四海皆巳無虞九夷八蠻之在荒服之外者皆巳賔貢天災時變昆蟲草木之妖皆巳銷息天下之所謂禮樂刑政教化之具皆巳修理風俗皆巳敦厚動植之物風雨霜露之所霑被者皆巳得冝休徴嘉瑞麟鳯龜龍之屬皆巳備至而周公以聖人之才慿叔父之親其所輔理承化之功又盡章章如是其所求進見之士豈復有賢於周公者哉不惟不賢於周公而巳豈復有賢於時百執事者哉豈復有所計議能輔於周公之化者哉然而周公求之如此其急惟恐耳目有所不聞見思慮有所未及以負成王託周公之意以不得於天下之心如周公之心設使其時輔理承化之功未盡章章如是而非聖人之才而無叔父之親則將不暇食與沐矣豈特吐哺握髮為勤而止哉惟其如是故于今頌成王之德而稱周公之功不衰今閣下為輔相亦近耳天下之賢才豈盡舉用姦邪讒佞欺負之徒豈盡除去四海豈盡無虞九夷八蠻之在荒服之外者豈盡賔貢天災時變昆蟲草木之妖豈盡銷息天下之所謂禮樂刑政教化之具豈盡修理風俗豈盡敦厚動植之物風雨霜露之所霑𬒳者豈盡得冝休徴嘉瑞麟鳯龜龍之屬豈盡備至其所求進見之士雖不足以希望盛德至比於百執事豈盡出其下哉其所稱説豈盡無所輔哉今雖不能如周公吐哺握髮亦冝引而進之察其所以而去就之不冝默默而巳也愈之待命四十餘日矣書再上而志不得通足三及門而閽人辭焉惟其昏愚不知逃遁故復有周公之説焉閣下其亦察之古之士三月不仕則相弔故出疆必載質然所以重於自進者以其於周不可則去之於魯於魯不可則去之於齊於齊不可則去之宋之鄭之秦之楚也今天下一君四海一國捨乎此則夷狄矣去父母之邦矣故士之行道者不得於朝則山林而巳矣山林者士之所獨善自養而不憂天下者之所能安也如有憂天下之心則不能矣故愈每自進而不知愧焉書亟上足數及門而不知止焉寧獨如此而巳惴惴焉惟恐不得出大賢之門下是懼亦惟少垂察焉黷冒威尊惶恐無巳愈再拜重校正唐文粹卷第八十七
