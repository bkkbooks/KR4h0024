阮家子今朝共遊者得性閒未歸已到仙人家莫驚鷗鳥飛水深嚴公釣松挂巢父衣雲氣轉幽寂谿流無是非名理未足羡腥臊詎所稀自惟負貞意何嵗當食薇寒食陸渾别業宋之問洛陽城裏花如雪陸渾山中今始發旦别河橋楊栁風夕卧伊川桃李月伊川桃李正芳新寒食山中酒復春野老不知堯舜力酣歌一曲太平人題東谿公幽居李白杜陵賢人清且亷東谿卜築嵗將淹宅近青山同謝朓門垂碧栁似陶潛好鳥迎春歌後院飛花送酒舞前簷客到但知留一醉盤中秖有水精鹽宿裴有書齋李觀卧君山窻下山鳥與我言清風何颼飀松柏中夜繁乆遊失歸趣宿此似故園林烟横近郊谿月落古原稚子不待曉花間出柴門酬暉上人夏日林泉見贈陳子昻聞道白雲居窈窕青蓮宇巖泉萬丈流樹石千年古林卧對軒窻山隂滿庭户方釋塵勞事從君襲蘭杜贈宣州元處士杜牧陵陽北郭隱身世兩忘者蓬蒿三畝居寛於一天下鐏酒對不酌黙與𤣥相話人生自不足愛嘆遭逢寡東谿玩月王昌齡月從斷山口遥吐柴門端萬木紛空霽流隂中夜攅光連虛象白氣與風露寒谷静秋泉響巖深青靄殘澄清入幽夢影破抱空巒恍忽琴窻裏松谿曉思難太白東谿張老舍即事寄弟姪等岑參渭上秋雨過北風暮騷騷天晴諸山出太白峯最髙主人東谿老兩耳生長毫逺近知百嵗子孫皆二毛中庭井欄上一架獼猴桃石泉飯香秔酒瓮開新糟愛兹田中趣始悟世上勞我行有勝事書此寄爾曹長安秋夕戎昱八月更漏長愁人起常早閉門寂無事滿地生秋草昨霄西窻夢先入荆門道逺客歸去來在家貧亦好貽池陽谷口元賛善李端入谷逢君來秋泉已難涉林間人獨坐月下山相接重露濕蒼苔明燈照黄葉故交一不見素髪何稠疊宿裴氏山莊王昌齡蒼蒼竹林暮吾亦知所投静坐山齋月清谿聞逺流西峯下微雨向晚白雲收遂解塵中組終南春可遊山中作沈千運棲隱别無事所願早離塵不辭城邑遊禮樂拘束人邇來歸山林庶事皆吾身何者為形骸誰是智與仁寂寞了閒事然後知天真咳唾驚榮華迂俯相屈伸如何巢與由天子不得臣入山寄城中故人王維中嵗頗好道晚家南山垂興來每獨往勝事空自知行到水窮處坐看雲起時偶然值林叟談笑無迥期獨遊王昌齡林卧情自閒獨遊景常晏時從灞陵下隨釣往南澗手􅂝雙鯉魚目送干里鴈悟彼飛有適知此羅憂患放之清泠泉因得省踈慢永懐青岑客迥首白雲間超然物無違豈繫名與宦過張邯鄲莊姚合客行長似病煩熱攻四肢到君讀書堂忽若逢良醫堂前水交流堂下樹交枝雨門延風涼洗我昏濁肌與子還往熟行坐恣所宜時時相獻酬文字當酒巵野飯具藜霍永日亦不飢茍餐非其所鱠炙為蒺藜時清士人閒耕者唯文詞豈獨鄉里薦當取四海知宿王昌齡隱居常建青溪深不測隱處唯孤雲松際露微月清光猶為君茅亭宿花影藥院滋苔紋余亦謝時去西山鸞鶴羣訪陸羽處士釋皎然太湖東西路吳王古山前所思不可見歸鴈自翩翩何山賞春茗何處弄清泉莫是滄浪子悠悠一釣舩初春王績前旦出園遊林華都未有今朝下堂望池氷開已乆雪避南軒梅風催北庭栁遥呼竈前妾却報機中婦年光恰恰來滿甕營春酒南兖謝郡客遊禮州留贈宇文中丞暢當僕本濩落人辱當州郡使量力頗及早謝歸今即已蕭蕭若凌虛衿帶頓銷靡車服率然來涔陽作遊子鬱鬱寡開顔黙黙獨行李忽逢平生友一笑方在此秋情寜風日楚思浩雲水為語弋林者冥冥鴻逺矣村居沈亞之無樹巢宿鳥無酒共客醉月上蟬韻殘梧桐隂繞地獨出村舍門吟劇微風起蕭蕭蘆荻叢呌嘯如山鬼應縁我憔悴為我哭秋思贈劉藍田王維籬間犬迎吠出屋候荆扉嵗晏輸井税山村人夜歸晚田始家熟餘布成我衣詎肯無公事煩君問是非退居孟郊退身何食可敗力不得閒種稻耕白水負薪斫青山衆聽喜巴唱獨醒愁楚顔日暮静歸時幽幽叩松闗渭川田家王維斜光照墟落深巷牛羊歸野老念牧童倚杖候荆扉雉雊麥苖秀蠶眠桑葉稀田夫荷鋤至相見語依依羡此良閒逸悵然歌式微秦中吟十首并序白居易貞元元和之際予在長安聞見之間有足悲者因直歌其事命為秦中吟議婚天下無正聲悦耳即為娯人間無正色悦目即為姝聲色非相逺貧富則有殊貧為時所棄富為時所趨紅樓富家女金縷繡羅􅃭見人不斂手嬌癡二八初母兄未開口已嫁不須臾緑窻貧家女寂寞二十餘荆釵不直錢衣上無真珠幾回人欲聘臨日又踟蹰主人㑹良媒置酒滿玉壺四座且勿飲聽我歌兩途冨家女易嫁嫁早輕其夫貧家女難嫁嫁晚孝於姑聞君欲娶婦娶婦意何如重賦厚地植桑麻所要濟生民生民理布帛所求活一身身外充征賦上以奉君親國家定兩税本意在憂人厥初防其滛明勑内外臣税外加一物皆以枉法論奈何嵗月乆貪吏得因循浚我以求寵斂索無冬春織絹未成疋繰絲未盈斤里胥迫我納不許暫逡巡歲暮天地閉隂風生破村夜深烟火滅霰雪落紛紛㓜者形不蔽老者體無温悲喘與寒氣併入鼻頭辛昨日輸殘税因窺官庫門繒帛如山積絲絮似雲屯號為羡餘物隨日獻至尊奪我身上暖買爾眼前恩進入瓊林庫嵗乆化為塵傷宅誰家起甲第朱門大道邊豐屋中櫛比髙墉外迥環纍纍六七堂棟宇相勾連一堂費百萬鬱鬱起青烟洞房温且清寒暑不能干髙堂虛且逈坐卧見南山繞廊紫藤架夾砌紅藥欄攀枝摘櫻桃帶花移牡丹主人此中坐十載為大官厨有臭敗肉庫有朽貫錢誰能將我語問爾骨肉間豈無貧賤者忍不救饑寒如何奉一身直欲保千年不見馬家宅今作奉誠園傷友陋巷孤寒士出門苦恓恓雖云志氣在豈免顔色低平生同門友通籍在金閨曩昔膠漆契邇來雲雨暌正逢下朝歸軒騎五門西是時天乆隂三日雨淒淒蹇驢避路立肥馬當風嘶迥頭忘相識占道上沙堤昔年洛陽社貧賤相提􅂝今日長安道對面隔雲泥近日多如此非君獨慘悽死生不變者唯聞任與黎任公達黎逢不致仕七十而致仕禮法有明文何乃貪榮者斯言如不聞可憐八九十齒墮雙眸昏朝露貪名利夕陽憂子孫挂冠顧翠綏懸車惜朱輪金章腰不勝傴僂入公門誰不愛富貴誰不戀君恩年髙須告老名遂合退身少時共嗤誚晚嵗多因循賢者漢二疏彼獨是何人寂寞東門路無人繼去塵立碑勲徳既下衰文章亦陵夷但見山中石刻作路傍碑銘勲悉太公叙徳皆仲尼復以多為貴千言直萬貲為文彼何人想見下筆時但欲愚者悦不思賢者嗤豈獨賢者嗤仍傳後代疑古石蒼苔字安知是愧辭我聞望江縣麴令撫惸嫠麴令名信陵在官有仁政名不聞京師身殁欲歸𦵏百姓遮路岐攀轅不得去留𦵏此江湄至今道其名男女涕皆垂無人立碑碣唯有邑人知輕肥意氣驕滿路鞍馬光照塵借問何為者人稱是内臣朱紱皆大夫紫綬或將軍誇赴軍中晏走馬去如雲罇罍溢九醖水陸羅八珍果擘洞庭橘鱠切天池鱗食飽色自若酒酣氣益振是嵗江南旱衢州人食人五絃清歌且罷唱紅袂亦停舞趙叟抱五絃宛轉當胷撫大聲粗音麤若散颯颯風和雨小聲細欲絶切切鬼神語又如鶴報喜轉作啼猿苦十指無定音顛倒宫徴羽坐客聞此聲形神若無主行客聞此聲駐足不能舉嗟嗟俗人耳好今不好古所以北窻琴日日生塵上歌舞秦城嵗云暮大雪滿皇州雪中朝退者朱紫盡公矦貴有風雲興富無饑寒憂所營唯第宅所務在追遊朱輪車馬客紅燭歌舞樓懽酣促宻坐醉暖脱重裘秋官為主人廷尉居上頭日中一為樂夜半不能休豈知閿鄉獄中有凍死四買花帝城春欲暮諠諠車馬度共道牡丹時相隨買花去貴賤無常價酬直看花數灼灼十朶紅戔戔五束素上張幙屋庇旁織笆籬䕶水灑復泥封移來色如故家家習為俗人人迷不悟有一田舍翁偶來買花處低頭獨長嘆此嘆無人諭一叢深色花十户中人賦憫農二首李紳春種一粒粟秋收萬顆子四海無閒田農夫猶餓死鋤禾日當午汗滴禾下土誰知盤中飱粒粒皆辛苦石壕吏杜甫暮投石壕村有吏夜捉人老翁踰墻走老婦出門首吏呼一何怒婦啼一何苦聽婦前致詞三男鄴城戌一男附書至二男新戰死在者且偷生死者長已矣室中更無人所有乳下孫孫有母未去出入無完裙老嫗力雖衰請從吏夜歸急應河陽役猶得備晨炊夜乆語聲絶如聞泣幽咽天明登前途獨與老翁别辛苦吟于濆壠上扶犂兒手種腹長飢窻下擲梭女手織身無衣我願燕趙姝化為嫫母姿一笑不直錢自然家國肥田家詞元稹牛㕰㕰許角反田确确旱塊敲牛啼趵趵音剥種得官倉珠顆榖六十年來兵簇簇月月倉糧車轆轆一日官軍收海服驅牛駕車食牛肉歸來收得牛兩角重鑄鍬犂作斤斸姑舂婦擔輸促促輸官不足歸賣屋農死有兒牛有犢不遣官軍糧不足傷田家聶夷中二月賣新絲五月糶秋榖醫得眼前瘡剜却心頭肉我願君王心化作光明燭不照綺羅筵偏照逃亡屋采玉行韋應物官府徴白丁言采藍溪玉絶嶺夜無人深榛雨中宿獨婦餉糧還哀哀舍南哭茶山作袁髙禹貢道逺俗所圖在安人后王失其本職吏不敢承亦有姦佞者因兹欲求伸動生千金費日使萬姓貧我來顧渚源得與茶事親甿輟耕農米採採實苦辛一夫且當役盡室皆同臻捫葛上欹壁蓬頭入荒榛終朝不盈掬手足皆皴鱗悲嗟遍空山草木為不春隂嶺芽未吐使者牒已頻心爭造化力先走挺塵均選納無晝夜擣聲昏繼晨衆工何枯槁俯視彌傷神皇帝尚巡狩東郊路多堙周迥繞天涯所獻逾艱勤况減兵革困量兹固疲民未知供御餘誰合分此珍顧省忝邦守又慙復因循茫茫滄海間丹憤何由申野老歌張籍老翁家貧在山住耕種山田三四畝苖踈税多不得實輸入官倉化為土嵗暮鋤犁傍空室呼見登山收橡食西江賈客珠百斛舩中養犬長食肉野行姚合客行野田間比屋皆閉户借問屋中人盡去作商賈官家不税商税農服作苦居人競東西道路侵壠畝採玉上山巔探珠入水府邊兵索衣食此物同泥土古來一人耕三人食猶飢如今千萬家無一把鋤犁我倉常空虛我田生蒺䔧上天不雨粟何由活蒸黎唐文粹巻十六下欽定四庫全書唐文粹巻十七上宋姚鉉編詩十一總五十九首
