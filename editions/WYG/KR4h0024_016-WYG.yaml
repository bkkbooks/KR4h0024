body:
  text: 唐文粹巻十六上宋姚鉉編詩壬總七十四首古調歌篇五知已九仰答韋司業垂訪五首蕭頴士愽平鄭太守自廬山見訪郤之武陵立馬贈别李白􅂝新文詣張籍韓愈途中成賈島喜陳懿老自宛陵至示予新製三十餘篇朱晝延康吟賈島交友四審交孟郊答友問白居易北極贈李觀韓愈與馬異結交盧仝規誨四示孟郊孟浩然自誡司空圖誡貪釋子蘭杏園即席上同年曹鄴紀贈五讀張曲江詩集釋皎然上河陽李大夫孟郊奉贈張荆州王昌齡詠徳上韋獫察歐陽詹贈崔從事鄖孟郊散逸七漁父歌李頎紫谿翁歌陸龜蒙秋醉歌張為襄陽歌李白散人歌陸龜蒙貽張旭李頎春日醉起言志李白俠少二戱作花卿歌杜甫秦宫詩李賀登覽十五望廬山瀑布二首李白望山賈島登金陵鳯凰臺李白登黄鶴樓崔顥登嶺望許鼎過華隂王昌齡早霽南樓張説奉和早霽南樓趙冬犧奉陪登南樓尹􅐂春遊南亭韋應物廬山謡寄廬侍郎虛舟李白登南岳事畢謁司馬道士張九齡奉使登終南山王灣終南山望餘雪作祖詠勝槩二十八桃源行劉禹錫桃源行王維和登㑹稽山孫逖洪州祈雨是日輒應賦詩張九齡寄贈宋十一田遊巖敬答田徴君宋之問龍門八詠劉長卿宣城清溪二首李白入崖口五渡寄李適宋之問答宋十一見贈李適和崖口五渡徐彦伯初至崖口宋之問山中作顧况輞口遇雨憶終南山裴迪答裴迪王維出青門往南山下别業薛據夜歸鹿門歌孟浩然春泛若耶綦毋濳荆山獨往姚係歸四明胡幽貞尋西山隱者不遇丘為仰答韋司業垂訪五首蕭頴士呦呦食苹鹿常飲清泠川但悦豐草美寧知牢饌鮮主人有幽意將以充林泉興網幸免傷蒙君復羈牽髙堂列衆賔廣坐鳴清弦俯仰轉驚惕徘徊獨憂煎緬懐雲巗路欲往無由縁物各有所好違之傷自然神龜在南國緬邈湘川隂遊止蓮葉上嵗時嘉樹林毒蟲且不近斤斧何由尋錯落負奇文熒煌燿丹金江山萬里餘淮海阻且深獨保貞素質不為寒暑侵一逢盛明代應見通靈心晉代有儒臣當年富辭藻立言寄青史將以賛王道遼落緬嵗時辛勤歴江島且言風波倦探涉豈為寶不遇庾征西云誰展懐抱士貧乏知已安得成所好彭陽昔游説願謁南郢都王果尚未達况從夷節謨豈知晉叔向無罪嬰囚拘臨難俟解紛獨知祁大夫舉讎且不棄何必論親踈夫子覺者也其能遺我乎闗西一公子年貌獨青春被褐來上京翳然聲未振中郎何為者倒屣驚座賔詞賦豈不佳盛名亦相因為君奏此曲此曲多苦辛千載不可誣孰言今無人愽平鄭太守自廬山千里相尋入江夏北市門見訪郤之武陵立馬贈别李白大梁貴公子氣蓋蒼梧雲若無三千客誰道信陵君救趙復存魏英威天下聞邯鄲能屈節愽訪從毛薛夷門得隱淪而與矦生親仍要皷刀者乃是袖鎚人好士不盡心何能保其身多君重然諾意氣遥相託五馬入市門金鞍照城郭都望虎竹貴且與荷衣樂去去桃花源何時見歸軒相思無終極腸斷朗江猿􅂝新文詣張籍韓愈途中成賈島袖有新成詩欲見張韓老青竹未生翼一步萬里道仰望青冥天雲雪壓我腦失却終南山惆悵滿懐抱安得西北風身願變蓬草地祇聞此語突出驚我倒喜陳懿老自宛陵至示予新製三十餘篇朱晝一别一千日一日十二憶苦心無閒時今夕見玉色玉色復何異紅明含羣徳有文如星宿飛入我胷臆憂愁方破懐懽喜重補塞使我心皃全且非黄金力將攀下風手願假僊鸞翼予欲訪詩人孟郊故寄誠於章句延康吟賈島寄居延夀里為與延康隣不愛延康里愛此里中人人非十年故人非九族親人有不杇語得之烟山春審交孟郊種樹須擇地惡土變木根結交若失人中道生謗言君子芳桂性春濃寒更繁小人槿花心朝在夕不存莫躡冬氷堅中有濳浪翻唯當金石交可與賢達論答友問白居易大圭亷不割利劒用不缺當其斬馬時良玉不如鐵置鐵在洪鑪鐵銷易如雪良玉同其中三日燒不熱君疑才與徳詠此知優劣北極贈李觀韓愈北極有羇羽南溟有沉鱗川源浩浩隔影響兩無因風雲一朝㑹變化成一身誰言道里逺感激疾如神我年二十五求友昧其人哀歌西京市乃與夫子親所向苟同趣賢愚豈異倫方為金石姿萬世無緇磷無為兒女態憔悴悲賤貧與馬異結交盧仝天地日月如等閒盧仝四十無往還唯有一片心脾骨巉巖崒硉兀鬱律刀劒為鋒鍔平地放著髙如崑崙山天不容地不受日月不敢偷照耀伏羲畫八卦鑿破天心胷女媧伏羲妹恐天怒擣鍊五色石引日月之針五星之縷把天補補了三日不肯歸壻家走向日中放老鵶月裏我桂養蝦蟇天公發怒化龍蛇此龍此蛇得死病神農合藥救死命天怪神農黨龍蛇罰神農為牛頭令載元氣車不知藥中有毒藥藥殺元氣天不覺爾來天地不神聖日月之光無定正不知元氣元不死忽聞空中喚馬異馬異若不是祥瑞空中敢道不容易昨日仝不同異自異是謂大同而小異今日仝自同異不異是謂同不往兮異不至直當中兮動天地白玉璞裏斵出相思心黄金鑛裏鑄出相思淚忽聞空中崩崖倒谷聲絶勝明珠千萬斛買得西施南威一雙婢此婢嬌饒惱殺人凝脂為膚翡翠裙唯解畫眉朱㸃唇自從獲得君敲金㧿玉凌浮雲却返顧一雙婢子何足云平生結交苦少人憶君眼前如見君青雲欲開白日没天眼不見此奇骨縱横奇又奇千嵗萬嵗枯松枝半折半殘壓山谷盤根蹙節成蛟螭忽雷霹靂卒風暴雨撼不動欲動不動千變萬化揔是鱗皴皮此奇怪物不可欺盧仝見馬異文章酌得馬異心中事風姿骨木恰如此是不是寄一字示孟郊孟浩然蔓草蔽極野蘭枝結孤根衆音何其繁伯牙獨不喧當時髙深意舉世無能分鍾期一見知山水千秋聞爾其保静節薄俗徒云云自誡司空圖我祖銘座右嘉謀貽厥孫勤此茍不怠令名日可存媒衒士所恥慈儉道所尊松柏豈不茂桃李亦自繁衆人皆察察而我獨昏昏取訓於老氏大辯欲納言誡貪釋子蘭多求待心足未足旋傾覆明知貪者心求榮不求辱杏園即席上同年曹鄴岐路不在天十年行不至一旦公道開青雲在平地枕上數聲鼓衡門己如市白日探得珠不待驪龍睡忿忿出九衢僮僕顔色異故衣未及換尚有去年淚晴陽照花影落絮浮野翠對酒時忽驚猶疑夢中事自憐孤飛鳥得接鸞鳯翅永懐共濟心莫起胡越意讀張曲江詩集釋皎然相公乃天啓人文佐生成立程正頽靡繹思何縱横春杼弄緗綺陽林敷玉英飄然飛動姿邈矣髙簡情後輩驚失步前修敢爭衡始欣耳目逺再思幾慮清體正力己全理精識何妙昔年歌陽春徒推郢中調今朝聽鸞鳯豈獨蘇門嘯帝命鎮雄州詩流據上游才兼荆衡秀氣助瀟湘秋逸蕩子山匹經奇文暢儔沉吟未終巻變態紛難數耀耳代明璫襲衣比芳杜愔愔聞玉聲寤寐在靈府上河陽李大夫孟郊上將秉神略至兵無血威三軍向嚴冬一撫勝重衣寒劒奪衆景夜星失長暉蒼鷹獨立時惡鳥不敢飛武牢鏁天闗河橋紐地機大軍奚與安守此稱者稀貧士少顔色貴門多輕肥試登山嶽髙始見草木微山嶽恩既廣草木心皆歸奉贈張荆州王昌齡祝融之峯紫雲銜翠如何其雪嶄嵒邑西有路縁石壁我欲從之卧穹嵌魚有心兮脱網罟江無人兮鳴楓杉王君飛鳥仍未去蘇躭宅中意遥緘詠徳上韋撿察即韋相公之弟也歐陽詹少華類太華太室似少室亞相與丞相亦復無異質亭如月臨水肅若松照日輝影互光澄隂森兩葱鬱連枝鸞鳯下同氣龜龍出併力革夷心通籌整師律英豪願迥席蠻貊皆屈膝中外佇分途寰瀛待清謐贈崔從事鄖孟郊古人留清風千載遥贈君破松見貞心裂竹看直文殘月色不改髙賢徳常新家懐詩書富宅抱草木貧安排一蹄泉未化千尺鱗含意永不語釣璜幽水濵漁父歌李頎白頭何老人蓑笠蔽其身避世當不仕釣魚清江濱浦沙明濯足山月静垂綸寓宿湍與瀨行歌秋復春持竿湘岸竹􅅡火蘆洲薪緑水飯香稻青荷包紫鱗於中還自樂所欲全吾貞而笑獨醒者臨流多苦辛紫谿翁歌并序陸龜蒙紫谿翁過甫里先生舉酒相屬醉而歌曰一丘之木其栖深也屋吾容不辱一谿之石其居平也席吾勞以息一竇之泉其音清也絃吾方在懸得乎人得乎天吾不知所以然而然先生弁而賡之曰采江之魚兮朝船有鱸采江之蔬兮暮筐有蒲左圖且書右瑟與壺夀歟夭歟貴歟賤歟歌闋而去秋醉歌張為金風颯己起還是招漁翁􅂝酒天姥岑自彈嶧陽桐脱却登山屐赤脚翹青笻泉聲掃殘暑猿臂攀長松翠微泛樽緑苔蘚分烟紅造化處術内相對數壺空醉眠嶺上草不覺夜露濃一夢到天曉始覺一醉中皎然夢中路直到瀛洲東初平把我臂相與騎白龍三留對上帝玉樓十二重上帝賜我酒送我敲金鐘寶閣香斂苒琪樹寒玲瓏動葉如笙簧音律相怡融珍重此一醉百骸出天地長如此夢魂永謝名與利襄陽歌李白落日欲没峴山西倒著接䍦花下迷襄陽小兒齊拍手攔街争唱白銅鞮傍人借問笑何事笑殺山公醉似泥鸕鷀杓鸚鵡盃百年三萬六千日一日須傾三百杯遥看漢水鴨頭緑恰似蒲萄初醱醅此江若變作春酒壘麴便築糟丘臺金鞍駿馬換小妾笑坐金鞍歌落梅車傍側桂一壺酒鳯笙龍管行相催咸陽市上嘆黄犬何如月下傾金罍君不見晉朝羊公一片石龜龍剥落生莓苔淚亦不能為之墮心亦不能為之哀清風明月不用一錢買玉山自倒非人推舒州杓力士璫李白與爾同死生襄王雲雨今安在江水東流猿夜聲散人歌陸龜蒙江湖散人天骨奇短髪搔來蓬半垂手捉孤篁曵寒繭口誦太古滄浪詞詞云太古萬萬古民性甚埜無風期夜棲止與禽獸雜獨自構架縱横枝因而稱曰有巢氏民共敬貴如君師當時只效烏鵲輩豈是有意陳尊卑無端後聖穿鑿破一派前導千流隨多方惱亂元氣死日使父子生姦欺聖人事業轉消耗尚有漁者存熙熙風波不獨因一士凡百器用皆能施罛疏扈腐鱸鱖脱止失檢馭無䜛疵人間所謂好男子我見婦女留須眉奴顔婢膝真乞丐反以正直為狂癡所以頭欲散不散弁峩巍所以腰欲散不散佩陸離行散任之適坐散從傾欹語散空谷應笑散春容披衣散單􅃨便食散酸鹹宜書散混真草酒散甘醇醨屋散勢斜直樹散行參差客散忘簪屨禽散空籠池外物一以散中心散何疑不共諸侯分邑里不與天子專隍陴静則守桑柘亂則逃妻兒金鑣紳帶未嘗識白刃殺我窮生為或聞蕃將負恩澤號令鐵馬如風馳大君年小丞相少當軸自請都旌旗神鋒悉出羽林仗繪畫日月蟠龍螭太宗基業甚牢固小醜背叛當殱夷禁軍近自肅宗署抑遏輔國争雄雌必然大段翦兇逆須召勁勇扶軍麾四方賊壘猶占地死者暴骨生寒饑歸來輒擬荷鋤笠詬吏己責租錢遲興師十萬一日費不啻千金何以支秖今利口且箕斂何暇俛首哀惸􅊔均荒補敗豈無術布在方䇿撑頽隵氷霜􅃭袴易反掌白面諸郎殊不知江湖散人悲古道悠悠幸寄羲皇傲官家未議活蒼生拜賜江湖散人號貽張旭李頎張公性嗜酒豁達無所營皓首窮草𨽻時稱太湖精露頂據胡牀長呌三五聲興來洒素壁揮筆如流星下舍風蕭條寒草滿户庭問家何所有生事如浮萍左手持蟹螯右手執丹經瞪目視霄漢不知醉與醒諸賔且方坐旭日臨東城荷葉裹江魚白甌貯香粳微緑心不泄放神於八紘時人不識者即是安期生春日醉起言志李白處世若大夢胡為勞其生所以終日醉頽然卧前楹覺來盻庭前一鳥花間鳴借問此何時春風語流鸎感之欲嘆息對酒還自傾浩歌待明月曲盡已忘情戲作花卿歌杜甫成都猛將有花卿學語小兒知姓名用如快鶻風火生見賊唯多身始輕緜州副使著柘黄我卿掃除即日平子章髑髏血糢糊手提擲還崔大夫李矦重有此節度人道我卿絶世無既稱絶世無天子何不喚取守京都秦宫詩并序李賀秦宫漢將軍梁冀之嬖奴也秦宫得寵内舍故以驕名大譟於人予撫舊而作辭似與馮子都之事相為對望又欲二其昔有之詩越羅夾衫迎春風玉刻麒麟腰帶紅樓頭曲宴仙人語帳底吹笙烟霧濃人間酒暖春茫茫花枝入簾白日長飛窻􅃨道傳籌飲半夜朦朧膩燭黄秃襟小袖調鸚鵡紫繡麻遮踏虓虎斫桂燒金待曉筵白鹿清蘓夜來煮桐英永巷騎主馬内屋珍屏生色畫開門爛用水衡錢巻起黄河向身㵼皇天厄運猶曽裂秦宫一生花裏活鸞篦奪得不還人醉卧氍毹滿堂月望廬山瀑布泉二首李白西登香廬峰南見瀑布水挂流三百丈噴壑数千里歘如飛電來隐若白虹起初驚河漢落半灑雲天裏仰觀勢轉雄壮哉造化功海風吹不斷江月照還空空中亂澴射左右洗青壁飛珠散輕霞流沫沸穹石而我逰名山對之心益間且諧夙所好永願辭人間日照香鑪生紫烟遥看瀑布挂長川飛流直下三千尺疑是銀河落九天望山賈島南山三十里不見踰一旬冐雨時立望望之如朋親虬龍一掬波洗蕩一萬春日日雨不斷愁殺望山人天事不可長勁風來如奔隂滛一已掃浩翠寫國門長安百萬家家家張屏新誰家最好山我願為其隣登金陵鳯凰臺李白鳯凰臺上鳯凰遊鳯去臺空江自流吳宮花草埋幽徑晉國衣冠成古丘三山半落青天外二水中分白鷺洲總為浮雲能蔽日長安不見使人愁登黄鶴樓崔顥昔人己乘白雲去此地空餘黄鶴樓黄鶴一去不復返白雲千載空悠悠晴川歴歴漢陽樹春草青青鸚鵡洲日暮鄉闗何處是烟波江上使人愁登嶺望許鼎淼淼三江水悠悠五嶺闗鴈飛猶不度人去若為還過華隂王昌齡雲起太華山雲山五明滅東風始含景了了見松雪羇人感幽棲窅映轉奇絶欣然忘所疲永望吟不輟信宿百餘里出闗玩新月何意昨冥冥遇物遂遷别人生屢如此何以肆愉悦早霽南樓張説山水佳新霽南樓玩初旭夜來枝半紅雨後洲全緑四運相終始萬形紛代續適臨青草湖再變黄鸎曲地穴穿東武江流下西蜀歌聞枉渚邅舞見長沙促心逺居無陋神和生自足白髪悲上春知當謝先欲奉和早霽南樓趙冬曦閒曙躋南樓凭軒四遐矚物華蕩喧氣春景媚晴旭川霽湘山孤林芳楚郊縟列巖重疊翠逺岸逶迤緑風帆摩天垠漁艇散灣曲鴻歸鶴舞送猿呌鸎斷續羣動皆熙熙噫予獨羈束常欽才子義忌鵩傷踡跼雅尚騷人文懐沙何迫促未知二賢意去矣從所欲奉陪登南樓尹􅐂君子每垂眷江山共流眄水逺林外明巖近霧中見終日西北望何處是京縣屢登髙春臺徒思淚如􅀢春遊南亭韋應物川明氣己變巖寒雪尚擁南亭草心緑春塘泉脉動景煦聽禽響雨餘看栁重逍遥池館華益愧専城寵廬山謡寄盧侍御虛舟李白我本楚狂人鳯歌笑孔丘手持緑玉杖朝别黄鶴樓五岳尋仙不辭逺一生好入名山遊廬山秀出南斗傍屏風九疊雲錦張影落明湖青黛光金闕前開二峯長銀河倒㵼三石梁香爐瀑布遥相望迥崖沓嶂凌蒼蒼翠影紅霞映朝日鳥飛不到吳天長登髙壯觀天地間大江茫茫去不還黄雲萬里動春色白波九道流雪山好為廬山謡興因廬山發閒窺石鏡清我心謝公行處蒼苔没早服還舟無世情琴心三疊道初成遥見仙人採雲裏手把芙蓉朝玉京先期汗漫九垓上願接盧敖遊太清登南岳事畢謁司馬道士張九齡將命祈靈岳迥䇿詣真士絶跡尋一徑異香聞數里分庭八桂樹肅容兩童子入室希把䄂登牀願啟齒誘我棄智訣迨兹長生理吸精反自然鍊藥求不死斯言眇霄漢顧予嬰紛滓相去九牛毛慙嘆知何已奉使登終南山王灣常愛南山遊因而盡原隰數朝至林嶺百仞登嵬岌石壯馬徑窮苔色步縁入物奇春狀改氣逺天香集虛洞䇿杖鳴低雲拂衣濕倚巖見廬舍入户欣拜揖間性矜勤勞示心教澄習玉英時共飲芝草為余拾境絶人不行潭深鳥空立一乘從此受九轉兼是給辭處若輕飛憇來唯吐吸閒􅁭超己勝迥路倐而及烟色松上深水流山下急漸平逢車騎向晚睨城邑峯在野趣繁塵飄宦情緝辛苦乆為吏勞生何妄執日暮還此山悠然賦斯什終南山望餘雪作祖詠終南隂嶺秀積雪浮雲端林表明霽色城中增暮寒桃源行劉禹錫漁舟何招招浮在武陵水拖綸擲餌信流去誤入花源行數里清源尋盡花緜緜踏花覔徑至洞前洞門蒼暗烟霧生暗行數步逢虛明俗人毛骨驚仙子爭來致詞何至此須㬰皆破氷雪顔笑言委曲問世間因嗟隱身來種玉不知人世如風燭筵羞石髓勸客飱燈􅅡松脂留客宿雞聲犬聲遥相聞曉光葱龍開五雲漁人振衣起出户滿庭無路花紛紛翻然恐失鄉縣處一息不肯桃源住桃源滿溪水似鏡塵心如垢洗不去仙家一出尋無蹤至今流水山重重桃源行時年十九王維漁舟逐水愛山春兩岸桃花夾古津坐看紅樹不知逺行盡清溪忽值人山口潛行始隈隩山開曠望旋平陸遥看一處攅雲樹近入千家散花竹樵客初傳漢姓名居人未改秦衣服居人共住武陵源還從物外起田園月明松下房櫳静日出雲中雞犬喧驚聞俗客爭來集競引還家問都邑平明閭巷掃花開薄暮漁樵乘水入初因避地去人間及至成仙去不還峽裏誰知有人事世中遥望空雲山不疑雲境難聞見塵心未盡思鄉縣出洞無論隔山水辭家終擬長遊衍自謂經過舊不迷安知峯壑今來變當時只記入山林青溪幾度到雲林春來遍是桃花水不辨仙源何處尋和登㑹稽山孫逖稽山碧湖上勢入東溟盡烟景晝清明九峯爭隱嶙望中厭朱紱俗内採𤣥牝野老聽鳴騶山童擁行軫仙花寒未落古蔓柔堪引竹濶入霜多松崖向天近雲從海人去日就江村隕能賦丘嘗聞和歌參不敏宜搜信冲漠多士期標凖願奉濯纓心長謡反招隱