  - {type: variant, offset: 12852, length: 0, content: '', WYG: 下欽定四庫全書唐文粹巻十八宋姚鉉編詩十三總一百三十六首古調歌篇九感遇五十感遇詩三十八首陳子昻感遇七首張九齡感遇懽徳輿效陳拾遺感遇二首司空圖古意二首孫邰詠史二十一詠史十一首李華詠史髙適詠史二首釋皎然詠史二首劉禹錫詠史四首盧照鄰讀李斯傳曹鄴慨嘆三十五出闗作魏徴隴右途中遭非語員半千書懐劉幽求自紀皇甫松贈友人吕温贈韓愈二首孟郊贈喬林劉眘虛寄唐生白居易華下司空圖傷時二首孟雲卿封丘作髙適街西居三首姚合效陳拾遺子昻司空圖感時夜坐張説無可奈何歌白居易逢白公元稹感懐費冠卿贈崔純亮孟郊客喜賈島有所思宋}
