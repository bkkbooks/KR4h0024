  - {type: line-break, offset: 0, content: '', id: KR4h0024_SBCK_087-1a01}
  - {type: variant, offset: 0, length: 2270, content: 重校正唐文粹卷第八十七吳興姚鉉纂書九揔六首自薦上張燕公書房琯上裴度相公書元稹上鄭相公書歐陽詹上宰相三書韓愈上張燕公書房琯竊惟當今主英臣誠海平天清干相國者更言朝廷之遺闕黔黎之艱阻妄矣琯直以有詞不自明徴積心無與消散此亦一夫不獲願就相門陳之或議相門重深賤士罕及進言不少非人則廢退而復念止于旬時若借人爲容則恥殊特達欲持情徑往則懼致忽遺思所以自竒圖左右見異僭用舊禮獻此琬珪兾䞇列得啓其書書窮思見其人矣至有輕好行怪易爲犯德琯非敢如此也願左右明之琯甞聞旣往布衣之士亦賤者也而一人下之三公崇之將欲分其賢愚而係其理亂琯自料必不能有損益於盛朝徒亦形似英哲之蹤辱累珪璋之德希左右以公選琯因以私進所私者則敢終而言之琯㓜爲先相國棄委翳於蓁蕪之下因物遂遷與農者莫辨不忍窘厄然後以菑穫爲懷將祗若遺謀乃發前言筐篋有相公述作焉有先君鑒誡焉約之立言依以扶信若赴古道則適若逢今人則乖或謂之非或謂之是求我哲匠繫此困蒙顧此身在下流無聞上士未足爲先君之嗣不可見先君之友況有貴賤之異爲之隔闊乎深惟達音者希恐不可再得忽不知相國之富貴如此琯之貧賤又如此期相國乃曰人以道義求我我不當以貴賤隔之借如宣父有相國之貴寧拒游夏之徒歟夫其此心千載一用豈琯也當之又見禮經有難進易退者戒貪也起人來學者勸道也琯趣仁者而乆未行何乎衣惟素褐乗非車馬閽人斥之馭者排之長衢高門驟拜左右則近於論訴豈聞道之士乎故獻王貢書以先其意或垂善誘使得登其門假以温和之顔賜其清閑之宴大觀宗廟旁見百官上諮爲人之紀綱次及作文之利害然後陳百一之誠諷南山之詩醉德寫誠俯而告退琯之願也未敢忘也若其取於是日許時入奉一歲之内得再廁法曹舎人聞詩禮焉人子畢矣豈有恨哉至如笥有衣裳天有秩序聖君在上何人不欲如琯今日未敢生心儻見露之時爲左右所器亦願起自燕國門下令衆人别意瞻矚也貪竭鄙志不覺多言妨塵宴私憂危失措儻左右垂無窮之惠降不測之禮錫數字之荅加一介之使則相國保下士之譽小人獲見知之榮光照微軀價傳多士輒飾瑣貌以俟軒車上裴度相公書元稹通州司馬元稹謹再拜獻書相公閣下日者相公之掾洛也稹獲陪侍道途不以庸妄話及章啓則竊聞閣下以文皇勑起居郎書居安思危四字於笏爲至戒今陛下當晉武平吳之後閣下即東征而還安孰甚焉思豈可廢況今四邸並開掃門之賔競至碣石餘沴束身之𣢾未堅則推食握髪之意可遽移於高枕擊鍾之逸矣且得人則理之談實老生之常語至於切近猶飢者欲食不可惡熟俗而不言也若稹之末學淺見又安敢引喻古昔於閣下獨憶得近日故裴兵部之納人也甄辨精淨號爲名流及其爲相也搆置羣材使梁棟榱桷咸適其用人頗隘之至於激濁揚清亦無所愛恡是以稟政不累月閣下自外寮爲起居郎韋相自巴州知制誥張河南自邕幕爲御史李西川自饒州爲雜端密勿津梁之地半得其人如故韋纁如稹等拔於疑礙置於朝行者又十數然後排異已之巨敵引腹心之至交當時一二年閒幾至於奸無蹊隧而正有根本矣及山東沴作上以兵事諮之則對以禁暴息人之外不能有以佐震耀是以樽俎之謀不專於廓廟蓋廉善精微之士素熟於心胷而汎駕乗桴之材未甞量校於左右也比於閣下今日之雄材大略爲短矣然而即丗之後雖無李嚴廖立之思而十年之内備將相號名卿者多其引拔嗚呼子皮叔牙之功斯不細矣日者閣下方事淮蔡獨當鑪鎚内藴深謀外排羣議始以追韓信拔吕蒙爲急務固非叔孫通薦儒之日也今殊勲旣建至化方行亦當念魏鄭公守成之難而三復文皇帝思危之詔乎以愚揆之欲人不怨莫若遷授之有常欲人之竭誠莫若救拯於焚溺何謂有常而不怨以省言之由後行爲前行以臺言之自察院轉殿院茍不如是則怨矣茍能如是何怨哉何謂救拯而竭誠稹又不敢移之他人借如小生之庸且昧也固不及班行之中輩又敢自讓於郎吏之末者邪向使元和中一年爲拾遺二年爲補闕不三四年爲貟外又三四年爲正郎則宰物者雖朝許之以綸誥暮許之以專席厚則厚矣遽責有隳肝瀝膽同厮養之用力亦難哉及夫爲計不良困於溝瀆者十年矣茍有舒其胼攣置之趨走者又不敢愛氣力恡心髓於和扁也是猶龜鼉之有水鳥獸之有林何甞愧於水木苟或縶而籠之鎻而檻之其或放之投之者則必啁噍顧慕以報人報其免於難也今天下病溝瀆困籠檻思閣下藥之養之投之放之者豈特小生而巳哉且曩時之窒閣下及小生者豈不以閣下䟽有居安思危之字爲抵忌對上以河南掾尉非貶官爲說乎向非裴兵部一二明之則稹終老於貧賤固其冝也儻閣下猶二三年遟迴於外任則少陽邀望之際固未得奉惶惶之命以周知其巢穴當元濟討除之始又安能定巳成之冊於上前排未亡之疑於衆口哉今天下能不有萬一於閣下之才略而由跼足怗脅私自憐其有志力哉況當今陛下在宥四海與人更始特降含垢棄瑕之書且授隨材任能之柄於閣下閣下若不能蕩滌痕累洞開嫌疑棄仇如振塵愛士如救餒使恃才薄行者自贖於煩辱以能見忌者騁力於通衢上以副聖君咸與惟新之德次以廣閣下常善救人之道使千百年外謂閣下與裴兵部爲交相短長亦足爲賢相矣未盡善也且夫當陛下肇臨宇宙之初與得天乆照之後愈光明矣安有裴兵部拔羣材於前則盡行閣下拔羣材於後則盡廢以閣下沐浴恩波之始與徽猷克壯之秋愈汪洋矣又安有救裴寰之罪換禹錫之官則盡易振天下之窮滯行渙汗之條目則爲難稹雖至愚未敢然也稹自十年遭罹多故每欲發書故舊尚不敢盡陳其情豈不知干宰相有不測之罪邪熟自忖之與其瘴死蠻夷自題不遇之牓比夫塵穢尊重伏俟危言之刑無異也聊因所善緘獻鄙誠翹企刑書不敢逃讓不宣稹頓首上鄭相公書歐陽詹將仕郎守國子監四門助教歐陽詹謹齊沐緘書再拜遣隸子弟獻於相公中衢之車下庶及乎閣下當今主上聖哲輔相賢明可行巳行可止巳止其或未行未止非不知也非不念也未可行而未可止也其愚蒙欲陳所知則在知之之後念之之内矣亦何敢言今斯有言自言而巳人有百行脩萬事精内扣濳鳴外聽无聲非不願用而人不用非不願旌而人不旌雖和乎之代至老至死者相公以爲有之乎某將十有十百有百千有千也何以苦知自, WYG: ''}
