body:
  text: 吳興姚鉉纂古文巳揔二十六首說二十四訂一附天說栁宗元朝日說棤說師說韓愈儉不至說來鵠水樂說元結訂司樂氏附元結捕蛇說栁宗元貓虎說來鵠說鶻栁宗元說天雞羅隱田說羅衮竄利說李甘原晉亂說楊夔吳相客說袁皓雜說五首陸龜蒙雜說四首韓愈評二祀黃熊評程晏漢史賛桑弘羊評張彧天說栁宗元韓愈謂栁子曰若知天之說乎吾爲子言天之說今夫人有疾痛倦辱饑寒甚者因仰而呼天曰殘民者昌佑民者殃又仰而呼天曰何爲使至此極戾也若是者舉不能知天夫果蓏飮食旣壞蟲生之人之血氣散敗逆壅底爲癰瘍疣贅瘻痔亦蟲生之木朽而蝎中草腐而螢飛是豈不以壞而後出邪物壞蟲由之主元氣隂陽之壊人由之生蟲之生而物益壊食齧之攻穴之蟲之禍物也滋甚其有能去之者有功於物者也繁而息之者物之讎也人之壊元氣隂陽也亦滋甚墾原田伐山林鑿泉以井飮窽墓以送死而又穴爲偃溲築爲牆垣城郭臺榭觀游䟽爲川瀆溝洫陂池燧木以燔革金以鎔陶甄琢磨悴然使天地萬物不得其情倖倖衝衝攻殘敗撓而未甞息其爲禍元氣隂陽也不甚於蟲之所爲乎吾意有能殘斯人使日薄歲削禍元氣隂陽者滋少是則有功于天地者也繁而息之者天地之讎也今夫人之舉不能知天故爲是呼且怨也吾意天聞其呼且怨則有功者受賞必大矣其禍焉者受罰亦大矣子以吾言爲如何栁子曰子誠有激而爲是邪則信辯且美矣吾能終其說彼上而玄者丗謂之天下而黃者丗謂之地混然中處者丗謂之元氣寒而暑者丗謂之隂陽是雖大無異果蓏癰痔草木也假而有能去其攻穴者是物也其能有報乎繁而息之者其能有怒乎天地太果蓏也元氣大癰痔也隂陽大草木也其惡能賞功而罰禍乎功者自功禍者自禍欲望其賞罰者大謬矣呼而怨欲望其哀且仁者亦大謬矣子而信子之仁義以遊其内生而死爾烏置存亡得喪於果蓏癰痔草木邪朝日說栁子爲御史主祀事將朝日其寮問曰古之名曰朝日而巳今而曰祀朝日何也余曰古之說者則朝拜之云也今而加祀焉則朝旦之云也今之所云非也問者曰以夕而偶諸朝或者今之是乎余曰夕之名則朝拜之偶也古者旦見曰朝暮見曰夕故詩云邦君諸侯莫肯朝夕左傳曰百官承事朝而不夕禮記曰日入而夕又曰朝不廢朝暮不廢夕晉侯將殺豎襄叔向夕楚子之留乾溪右尹子革夕齊之亂子我夕趙文子礱其椽張老夕智襄子爲室美士茁夕皆暮見也漢儀夕則兩郎向瑣闈拜謂之夕郎亦出是名也故曰大采朝日少采夕月又曰春朝朝日秋夕夕月若是之類足矣又加祀焉蓋不學者爲之也寮曰欲子之書其說吾將施于丗可乎余從之䄍說栁子爲御史主祀事將䄍進有司以問䄍之說則曰合百神於南郊以爲歲報者也先有事則質干戸部戸部之辭曰旱于某水于某蟲蝗于某癘疫于某則黜其方守之神不及以祭余甞學禮蓋思而得之則曰順成之方其䄍乃通若是古矣繼而歎曰神之貌乎吾不可得而見也祭之饗乎吾不可得而知也是其誕漫惝怳冥冥焉不可執取者夫聖人之爲心必有道而巳矣非于神也蓋于人也以其誕漫惝怳冥冥焉不可執取而猶誅削若此況其貌言動作之塊然者乎是設乎彼而戒乎此者也其旨大矣或曰若子之言則旱乎水乎蟲蝗乎癘疫乎未有黜其吏者而神黜焉而曰蓋于人者何也余曰若子之云旱乎水乎蟲蝗乎癘疫乎豈人爲之邪故其黜在神暴乎眊乎沓貪乎罷弱乎非神爲之也故其罰在人今夫在人之道則吾不知也不明斯之道而存乎古之數其名則存而敎之實則隱以爲非聖人之意故歎而云也曰然則致雨反風蝗不爲災虎負子而趨是非人之爲則何以余曰子欲知其以乎所謂偶然者信矣必若人之爲則十年九潦八年七旱者獨何如人哉其黜之也茍明乎敎之道雖去古之數可矣反是則誕漫之說勝名實之事䘮亦足悲乎師說韓愈古之學者必有師師者所以傳道受業解惑也人非生而知之者孰能無惑惑而不從師其爲惑也終不解矣生乎吾前其聞道也固先乎吾吾從而師之生乎吾後其聞道也亦先乎吾吾從而師之吾師道也夫豈知其年之先後生於吾乎是故無貴無賤無長無少道之所存師之所存也嗟乎師道之不傳也乆矣欲人之無惑也難矣古之聖人其出人也逺矣猶且從師而問焉今之衆人其去聖人亦遠矣而恥學於師是故聖益聖愚益愚聖人之所以爲聖愚人之所以爲愚者其皆出於此乎愛其子擇師而敎之於其身也則恥師焉惑矣彼童子之師授之書而習其句讀者非吾所謂傳其道解其惑者也句讀之不知惑之不解或師焉或不焉小學而大遺吾未見其明也巫醫樂師百工之人不恥相師士大夫之族曰師曰弟子云者則群聚而笑之問之則曰彼與彼年相若也道相似也位卑則足羞官盛則近䛕嗚呼師道之不復可知矣巫醫樂師百工之人君子不齒今其知乃反不能及可怪也歟聖人無常師萇弘師襄老聃剡子之徒其賢不及孔子孔子曰三人行則必有我師是故弟子未必不知師師未必賢於弟子聞道有先後術業有專攻如是而巳李氏子蟠年十七好古文六藝經傳皆通習之不拘於時請學於予嘉其能行古道作師說以詒之儉不至說來鵠翦腐帛而火焚者人聞之必遞相驚曰家之何處燒衣邪委餘食而在地者人見之必遞相駭曰家之何處弃食邪燒衣易驚弃食易駭以其衣可貴而食可厚不忍焚之弃之也然而不知家有無用之人廏有無力之馬無用之人服其衣與其焚也何逺無力之馬食其粟與其弃也何異以是焚之以是弃之未甞少有驚駭者公孫弘爲漢相蓋布𬒳是驚家之焚衣也而不能驚漢武國恃奢服晏子爲齊相豚肩不掩豆是駭家之弃食也而不能駭景公之廏馬千駟水樂說元結元子於山中尤所耽愛者有水樂水樂是南磳之懸水淙淙然聞之多乆於耳尤便不至南磳即懸庭前之水取欹曲竇缺之石高下承之水聲少似聽之亦便訂司樂氏或有將元子水樂說於司樂氏樂官聞之謂元子曰能和分五音韻諧水聲可傳之來請觀學元子辭之使門人以南磳及庭前懸水指之樂氏醜惡慢罵曰韻聵多矣焉有聽而云樂乎此言聞元子元子謝曰次山病餘惽固自順於空山窮谷偶有懸水淙石泠然便耳醉甚或與酒徒戲言呼爲水樂不防君子過聞而來實汙辱君子之車僕樂官去李川問曰向兟謝樂官不亦過甚曰然吾爲汝訂之汝豈不知彼爲司樂之官老矣八音敎其心五聲傳其耳不得異聞則以爲錯亂紛惑甚不可聽況懸水淙石宫商不能合律吕不能主變之不可㑹之無由此全聲也司樂氏非全士安得不甚謝之嗟乎司樂氏欲以金石之順和絲竹之流妙宫商角羽豐然迭生以化全士之耳猶以懸水淙石激淺注深情瀛㴩溶不變司樂氏之心嗚呼天下誰爲全士能愛夫全聲也捕蛇說栁宗元永之野産異蛇黒質而白章觸草木盡死以齧人無禦之者然得而腊之以爲餌可以已大風攣踠瘻癘去死肌殺三蟲其始太毉以王命聚之歲賦其二募有能捕之者當其租入永之人爭犇走焉有蔣氏者專其利三丗矣問之曰吾祖死於是吾父死於是今吾嗣爲之十六年幾死者數矣言之貌若甚慼者余悲之且曰若毒之乎余將告于莅事者更若役復若賦則何如蔣氏大慼汪然出涕曰君將哀而生之乎則吾斯役之不幸未若復吾賦不幸之甚也嚮吾不爲斯役則乆巳病矣自吾之三丗居是鄕積于今六十歲矣而鄕鄰之生日蹙殫其地之出竭其廬之入號呼而轉徙饑渴而頓踣觸風雨犯寒暑呼嘘毒厲往往而死者相藉也曩與吾祖居者今其室十無一焉與吾父居者今其室十無二三焉與吾居十二年者今其室十無四五焉非死而徙爾而吾以捕蛇獨存悍吏之來吾鄕叫囂乎東西隳突乎南北譁然而駭者雖雞狗不得寧焉吾恂恂而起視其缶而吾蛇尚存則弛然而卧謹食之時而獻焉退而甘食其土之有以盡吾齒蓋一歲之犯死者二焉其餘則熈熈而樂豈若吾鄕鄰之旦旦有是哉今雖死乎此比吾郷鄰之死則巳後矣又安敢懼毒邪余聞而愈悲孔子曰苛政猛於虎吾常疑乎是今以蔣氏觀之猶信嗚呼孰知賦歛之毒有甚是蛇者乎故爲之說俟乎觀人風者得焉貓虎說來鵠農民將有事於原野其老曰遵故實以全其秋庶可望矣乃具所嗜爲獸之羞祝而迎曰䑕者吾其貓乎豕者吾其虎乎其幼慼曰迎貓可也迎虎可乎豕盜於田逐之而去虎來無豕餒將若何抑又聞虎者不可與之全物恐其決之之怒也不可與之生物恐其殺之之怒也如得其豕生而且全其怒滋甚射之擭胡化切之猶畏其來況迎之邪噫吾亡無日矣或有決於鄕先生先生听然而笑曰爲䑕迎貓爲豕迎虎皆爲害乎食也然而貪吏奪之又迎何物焉由是知其不免乃撤所嗜不復議貓虎說鶻栁宗元有􅋧曰鶻者巢于長安薦福浮圖有年矣浮圖之人室于其下者伺之甚熟爲余說之曰冬日之夕是鶻也必取鳥之盈握者完而致之以燠其爪掌左右易之旦則執而上浮圖之跋焉者縱之延其首以望極其所如往必背而去之焉茍東矣則是日也不東逐南北亦然嗚呼孰謂爪吻毛翮之物而不爲仁義器邪是故無號位爵禄之欲里閭親戚朋友之愛也出乎鷇夘而知㩴食決裂之事爾不爲其他凡食類之饑唯旦爲甚今忍而擇之以有報也是不亦卓絶有立者乎用其力而愛其死以忘其饑又逺而違之非仁義之道邪恒其道一其志不欺其心斯固丗之所難得也余又疾夫今之說曰以喣喣而黙徐徐而俯者善之徒以翹翹而厲炳炳而白者暴之徒今夫梟鵂晦於晝而神於夜䑕不穴寢廟循牆而走是不近於喣喣者邪今夫鶻其立趯然其動􅒂然其視的然其鳴革然是不近於翹翹者邪由是而觀其所爲則今之說爲未得也孰若鶻者吾願從之毛邪翮邪胡不我施寂寥太清樂以忘饑說天雞羅隱狙氏子不得父術而得雞之性焉其畜養者冠距不舉毛羽不彰兀然若無飮啄意洎見敵則他雞之雄也伺晨則他雞之先也故謂之天雞狙氏死傳其術於子焉且反先人之道非毛羽彩錯觜距銛利者不與其棲無復向時伺晨之儔見敵之勇峨冠高歩飮啄而巳吁道之壊矣有是夫田說羅衮一夫田甲氏乙氏判而農之乙氏糞其田田善收甲氏以爲不善守天地之和風雨之絜而不善收噫造化之功不如糞土乎竄利說李甘吾竄乎奚竄吾竄利也利所趨也所竄也吾將爲之所爲也吾豈爲人之所爲也哉今是頑人曽無不忍之心然常獨有忍心者繇害於利也且謂螻螾大於麋鹿則許之乎聲不許也然人顧而遭螻螾則迂足而活之過而傷螻螾則失聲而痛之顧而見麋鹿則援弓而逐之幸而中麋鹿則失聲而喜之忍於大者不忍於小者何歟麋鹿利於口腹也螻螾不利也故居於利則雖麋鹿忍也不居於利則螻螾不忍也然則羈於利而忍於麋鹿者獨小人邪長人有甚焉長人則果忍於人矣烏有是哉前有將官兵以誅恒蔡叛者不十餘戰而能殺萬人則師喜不能殺萬人則師恥豈翅忍乎從有侈冨而劫死者有怨曠而姦死者有饑寒而道路死者有加兵死之數今是長人固有不忍之心然獨時有忍心者亦繇害於利也是故利滋博者忍滋多也吾方與之角利將在所不忍乎故曰吾竄乎奚竄吾竄利也如此俛讀倚詠孳孳於䇿試者竄而非邪然吾之所竄竄乎心也不竄乎身昔者趙狐正晉先盟五合諸侯傳曰生不及利彼豈竄吾身哉原晉亂說楊䕫晉室南遷制度草剏承永嘉之後囂風未除廷臣中猶以謝鯤輕佻王澄曠誕競相祖習以爲高逹卞壼厲色於朝曰帝祚流移社稷傾蕩職兹浮僞致此隳敗猶欲崇慕虚誕汙蠧時風奏請鞫之以正頽俗王導庾亮抑之而止噫西晉之亂百代所悲移都江左是絜源端本之日也猶乃翼虚駕僞崇扇佻薄躡諸敗跡踵其覆轍以此剏立朝綱基搆王業何異登膠舩而汎巨浸操朽索以馭奔駟乎設或行卞壼之奏黜屏浮僞登進淳實左右大法維持紀綱則晉祚亦未可量也其後王敦作逆蘇峻繼亂余以爲晉之亂不自敦峻而稔於導亮吳相客說袁皓孫室季壊其相更相語曰不日不月吾其晉臣乎有客前而語曰相君不聞物之化者邪蛇化爲龍龍之孫見蛇而笑之謂吾祖之丗龍焉殊不知蟒之腥尚存乎大澤之畔家化爲國國之孫見家必笑之謂吾祖之丗國焉殊不知耕稼之具未朽於歷山之下蓋由知龍而不知蛇知國而不知家噫堯舜聖人也丹均而不能嗣而況吳以干戈而得邪相君諭而泣雜說五首陸龜蒙先儒曰瞽叟憎舜使塗廩浚井酖于觴酒欲從而殺之舜謀於二女二女敎以鳥工龍工藥浴注一云泟豕而後免矣夫勢之重壯夫不能不畏位之尊聖人不得不敬況舜壻于天子頑嚚嫚戾者獨不畏之又從而殺之且堯之妻二女帥九子觀舜之德舜乃受敎於女子其術怪且如是是不敎人以孝道敎人以術免也固堯使勗之非觀德也何足以天下付邰侯姜女之生子也始弃之命之曰弃宋芮司徒之生女也始弃之亦命之曰弃邰弃爲稷官蒸民賴之宋弃美而生佐幾移於宋國名之同也奚傷舜重瞳子項羽亦重瞳子形之類也奚病擇其道如何耳季札以樂卜趙孟以詩卜襄仲歸父以言卜子游子夏以威儀卜沈尹戌以政卜孔成子以禮卜其應也如響無他圖在精誠而巳不精誠者不能自卜況吉凶他人乎傳曰武王罷朝而襪系絶顧左右無可使結者衛禇師呼聲子結襪而登席漢廷尉爲王生結襪襪之有帶其來尚矣今獨亡之嗚呼古之制亡者十八九奚襪帶之足云栁下季之妻誄其夫門人不能竄一字吕不韋作春秋秦人不敢損一字德與刑如何哉雜說四首韓愈龍嘘氣成雲雲固弗靈於龍也然龍乗是氣茫洋窮乎無閒薄日月伏光景感震電神變化水下土汨陵谷雲亦靈怪矣哉雲龍之所能使爲靈也若龍之靈則非雲之所能使爲靈也然龍弗得雲無以神其靈矣失其所慿依不可與異哉其所慿依乃其所自爲也易曰雲從龍旣曰龍雲從之矣善醫人者不視人之肥瘠察其脉之病否而巳矣善計天下者不視天下之安危察其紀綱理亂而巳矣天下者人也安危者肥瘠也紀綱者脉也脉不病雖瘠不害脉病而肥者死矣通於此說者其知所以爲天下乎夏殷周之衰也諸侯作而戰伐日行矣傳數十王而天下不傾者紀綱存焉耳秦之王天下也無分勢於諸侯聚兵而焚之傳二帝而天下傾者紀綱亡焉耳是故四支雖無故不足恃也脉而巳矣四海雖無事不足矜也紀綱而巳矣憂其所可恃懼其所可矜善醫善計者謂之天扶與之易曰視履考祥善醫善計者爲之談生云崔山君傳稱鶴言者豈不怪哉然吾觀於人其能盡其性而不類於禽獸異物者希矣將憤丗嫉邪長往而不來者之所爲乎昔之聖者其首有若牛者其形有若蛇者其喙有若鳥者其貌有若蒙倛者彼皆貌似而心不同焉可謂之非人邪即有平脅曼膚顔如渥丹美而佷者貌則人矣其心則禽獸又惡可謂之人也然則觀貌之是非不若論其心與其行事之爲不失也怪神之事孔子之徒不言予將特取其憤丗嫉邪而作之故題之云爾丗有伯樂然後有千里馬千里馬常有而伯樂不常有故雖有名馬秖辱於奴隷人之手駢死於槽櫪之間不以千里稱也馬之千里者一食或盡粟一石食馬者不知其能千里而食也是馬雖有千里之能食不飽力不足材美不外見欲與常馬等不可得安求其能千里也䇿之不以其道食之不能盡其材鳴之而不能通其意執䇿而臨之曰天下無良馬嗚呼其真無馬邪其真不知馬也邪祀黃熊評程晏傳曰子産聘晉晉侯有疾夢熊以爲厲鬼子産曰鮌之神化爲黃熊鮌爲夏郊三代祀之晉爲盟主未之祀乎遂使祀之而杜預又注曰言周衰晉爲盟主得佐天子祀羣神也曰異乎吾之說也若鮌爲夏郊三代祀之即掌周禮者存焉晉爲主盟豈天子祀典冝諸侯而僭之邪是不可祀之者一也羽山又非晉望是不可祀之者二也鮌若爲天下厲即有天子太厲司其祀矣是不可祀之者三也若爲一國之厲即有侯東海者國厲司其祀矣是不可祀之者四也況祀爲夏后鮌有歸祀又不爲厲是不可祀者五也子産言祟厲之事有二吾取其一焉言實沈臺駘之祟吾取之矣黃熊之厲吾不敢聞晉侯方疾其或荒邪内作偶夢色象之一物謂之黃熊安可執加鮌厲而爲昬越之祀哉漢史賛桑弘羊評張彧班固稱弘羊擢於賈豎方以版築飯牛且謂漢之得人於兹爲盛又與仲舒石建汲黯日磾等二十餘人並論而談殆不然矣夫君人者務於得賢故不隔卑鄙將慮賢者之處賤不謂賤者之必賢古者乃欲以伊尹負鼎取類於庖人太公坐釣求備於漁叟不亦逺哉且上之所欲人必有成之者故曹伯好田則公孫彊出陳侯好色則儀行父至殷辛淫酗則惡來革進周厲貪虐則榮夷公起漢武殘剥四海則桑弘羊擢其所由來者乆矣書曰遜于汝志必求諸非道抑爲此也季孫用田賦孔子書而過之以其踰周公之制也而況攘臂抵掌力爲天下聚歛之人乎義也者君子所死生而小人之所不及利也者小人之所赴蹈而君子之所不忍爲漢武必欲行先王之道守高祖之法則焉用弘羊欲奪萬姓之利閉生人之資則天下市籍小人皆能之矣亦何獨弘羊乎善爲盜者藝愈精而罪愈重盜愈利而主愈害弘羊善心計斡鹽鐵㭊秋毫令吏坐販不顧王者之體府庫盈而王澤竭一身幸而四海窮於弘羊之計則得矣漢亦何負於弘羊哉卜式絜已自守不及時政知弘羊罪欲烹以致雨孟堅躬修國史垂法來代奈何以錐刀異類齒得人之論一言不智其若是乎重校正唐文粹卷第四十七
