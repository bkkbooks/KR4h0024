body:
  text: 吳興姚鉉纂詩丁揔六十六首樂府辭下神仙十二歩虛詞十首道士吳筠歩虛詞髙駢夢上天元稹俠少十七結客少年塲盧照隣邯鄲少年行鄭錫邯鄲少年行髙適少年子李白少年行二首王維少年詞李百藥少年行張籍少年行崔國輔俠客行元稹俠客行李白刺年少李賀古遊俠呈軍中諸將崔顥青樓曲王昌齡劒客賈島壯士吟孟遟結韈子李白行樂十三楚宫行張籍上之回李白陽春歌皷吹入朝曲白紵詞三首冬白紵元稹相逢行李白古樂府權德輿朝來曲王昌齡將進酒李白将進酒李賀追悼一李夫人白居易愁苦六古別離李端古別離孟郊遊子吟李益遊子吟孟郊苦熱行王轂苦寒吟孟郊鳥獸花卉十三八駿圖白居易天馬歌李白紫騮馬騘馬行杜甫猛虎行李白猛虎行李賀白虎行烏棲曲李白烏夜啼艾如張李賀野田黃雀行李白採蓮曲張籍採蓮曲李白古城道路四石城鄭谷沙路曲李賀沙堤行呈裴相公張籍洛陽陌李白歩虚詞十首道士吳筠衆仙仰靈範肅駕朝神宗金景相照曜逶迤昇太空七玄巳髙飛火鍊生珠宫餘慶逮天壤平和王道融八威清遊氣十絶舞祥風使我躋陽源其來自隂功逍遙太霞上真鑒靡不通逸轡登紫清元乗邁奔電閬風隔三天俯視猶可見玉闥摽敞朗瓊林鬱葱蒨自非挺金骨焉得諧夙願真朋何森森合景恣遊宴良㑹忘淹留千齡纔一眄三宫發明景朗照同鬱儀紛然馳飈欻上采空清蕤令我洞金色後天耀瓊姿心恊太虛靜寥寥竟何思玄中有至樂淡泊終無爲但與正真友飄颻散遨嬉稟化凝正氣錬形爲真仙忘心符元宗返本恊自然帝一集絳宮流光出丹玄元英與桃君朗詠長生篇六府煥明霞百關羅紫煙飇車渉寥廓靡靡乗景遷不覺雲路逺斯須遊萬天扶桑誕𥘉景羽蓋凌晨霞倐欻造西域嬉遊金母家碧津湛洪源灼爍敷荷花煌煌青琳宮璨璨列玉華真氣溢絳府自然思無邪俯矜區中士夭濁良可嗟瓊臺劫爲仞孤暎大羅表常有三素雲凝光自飛繞羽童泛明霞升降何縹緲鸞鳯吹雅音栖翔絳林摽玉虛無晝夜靈景何皎皎一覩太上京方知衆天小灼灼青華林靈風振瓊柯三光無冬春一氣清且和廻首邇結鄰傾眸親曜羅豁落制六天流鈴威百魔緜緜慶不極誰謂椿齡多髙情無侈靡遇物生華光至樂無簫歌金玉音琅琅或登眀眞臺宴此羽景堂杳靄結寳雲霏微散靈香天人誠遐曠歡㤗不可量爰從太微上肆覲虚皇尊騰我八景與威遟入天門旣登玉宸庭肅肅仰紫軒敢問龍漢末如何闢乾坤怡然輟雲璈告我希夷言幸聞至精理方見造化源二氣播萬有化機無停輪而我操其端乃能出陶鈞寥寥大漠上所遇皆清眞澄瑩含元和氣同自相親絳樹結丹實紫霞流碧津以兹保童嬰永用超形神歩虛詞高駢青溪道士人不識上天下天鶴一隻洞門深鎻碧牎寒滴露研朱點周易夢上天元稹夢上髙髙天髙髙蒼蒼髙不極下視五嶽塊纍纍仰天依舊蒼蒼色蹋雲聳身身更上攀天下天攀未得西瞻若木免輪仾東望蟠桃海波黑日月之光不到此非暗非明煙塞塞天悠地逺身跨風下無階梯上無力來時畏有他人上截斷龍胡斬鵬翼茫茫漫漫方自悲哭向青雲搯音叨素臆哭聲厭咽旁人惡喚起驚悲淚飄露千慚萬謝喚厭人向使無君終不寤結客少年塲盧照鄰長安重遊俠洛陽冨才雄玉劒浮雲騎金鞭眀月弓鬪雞通渭北走馬向關東孫賔遥見待郭解暗相通不受千金爵誰論萬里功將軍下天上虜騎入雲中𤇺火夜似月兵氣暁成虹横行徇知巳負羽逺征戎龍旌昬朔霧鳥陣卷寒風追奔瀚海咽戰罷隂山空歸來謝天子何如馬上翁邯鄲少年行鄭錫霞鞍金口騮豹䄂紫貂裘家住叢臺下門前漳水流喚人呈楚舞借客試吳鉤見說秦兵至甘心赴國讎邯鄲少年行高適邯鄲城西遊俠子自言生長邯鄲裏千場縱愽家仍冨數處報讎身不死宅中歌笑日紛紛門外車馬長如雲未知肝膽向誰是令人却憶平原君君不見今交態薄黃金用盡還踈索以兹感歎辭舊遊更於時事無所求且與少年飲美酒徃來射獵西山頭少年子李白青雲少年子挾彈章臺左鞍馬四邊開突如流星過金丸落飛鳥夜入瓊樓卧夷齊是何人獨守西山餓少年行二首王維新豐羙酒斗十千咸陽遊俠多少年相逢意氣爲君飲繫馬髙樓垂柳邊漢家君臣歡宴終髙議雲臺論戰功天子臨軒賜侯印將軍佩出明光宫少年詞李百藥始酌文君酒新吹弄玉簫少年不歡樂何以盡芳朝千金笑裏面一搦掌中腰掛冠豈憚宿迎拜不勝嬌寄語少年子無辭歸路遥少年行張籍少年從出獵長楊禁中新拜羽林郞獨到輦前射雙虎君王手賜黃金璫日日鬪雞都市裏贏得寳刀重刻字百里報讎夜出城平明還在倡樓醉遥聞虜到平陵下不待詔書行上馬斬得名王獻桂宫封侯起第一日中不爲六郡良家子百戰始取邉城功少年行崔國輔遺却珊瑚鞭白馬驕不行章臺折楊柳春草路傍情俠客行元稹俠客不怕死怕在事不成事成不肯藏姓名我非竊賊誰夜行白日堂堂殺袁盎九衢草草人面青此客此心歸海鯨海鯨露背横滄溟海波分作兩處生分海減力俠客有謀人莫測三尺鐡虵延二國俠客行李白趙家縵胡纓吳鉤霜雪明銀鞍照白馬颯沓如流星十歩殺一人千里不留行事了拂衣去深藏身與名閑過信陵飲脫劒膝上橫將炙啖朱亥持觴勸侯嬴三盃吐然諾五嶽倒爲輕眼花耳熱後意氣素蜺生救趙揮金鎚邯鄲先震驚千秋二壯士炟赫大梁城縱死俠骨香不慚世上英誰能書閣下白首太玄經刺年少李賀青騘馬肥金鞍光龍腦入縷羅衫香羙人狎坐飛瓊觴貧人喚云天上郞別起髙樓連碧篠絲曳紅鱗出深沼有時半醉百花前背把金丸落飛鳥自說生來未爲客一身羙妾過三百豈知斸地種田家官稅頻催没人識長金積玉誇豪毅毎揖閑人多意氣生來不讀半行書秪把黃金買身貴少年安得長少年海波尚變爲桑田枯榮逓傳急如箭天公不肯於君偏莫道韶華鎭長在白頭面皺專相待古遊俠呈軍中諸將崔顥少年負膽氣好勇復知幾杖劒出門去孤城逢合圍殺人遼水上走馬漁陽歸錯落金鎻甲蒙茸貂䑕衣還家且行獵弓矢速如飛地逈鷹犬疾草深孤兎肥腰間帶兩綬轉眄生光輝顧謂今日戰何如隨建威青樓曲王昌齡白馬金鞍從武皇旌旗十萬宿長楊樓頭小婦鳴箏坐遥見飛塵入建章馳道楊花滿御溝紅粧縵綰上青樓金章紫綬千餘騎夫壻朝廻𥘉拜侯劒客賈㠀十年磨一劒霜刃未曽試今日把似君誰有不平事壯士吟孟遟壯士何曾悲悲即無迴期如何易水上未歌先淚垂結襪子李白燕南壯士吳門豪筑中置鈆魚隱刀感君恩重許君命太山一擲輕鴻毛楚宫行張籍章華宫中九月時桂花半落紅橘垂江頭騎火照輦道君王夜從雲夢歸霓旌鳳蓋到雙闕臺上重重歌吹發千門萬户開相當燭籠左右列成行下輦更衣入洞房洞房侍女盡焚香玉階羅幕微有霜齊言此夕樂未央玉酒湛湛盈華觴絲竹次第鳴中堂巴姬起舞向君王迴身垂手結明璫願君千年萬年夀朝出射麋夜飲酒上之回李白三十六離宫樓臺與天通閣道歩行月美人愁煙空恩踈寵不及桃李傷春風淫樂意何極金輿向回中萬乗出黃道千旗揚彩虹前軍細柳北後涉甘泉東豈問渭川老寧邀襄野童秋暮瑶池宴歸來樂未窮陽春歌長安白日照春空緑楊結煙垂裊風披香殿前花始紅流芳發色繡戸中繡戸中相經過飛燕皇后輕身舞紫宫夫人絶世歌聖君三萬六千日歲歲年年柰樂何鼓吹入朝曲金陵控海浦渌水帶吳京鐃歌列騎吹颯沓列公卿搥鍾速嚴糚伐鼔啓重城天子憑玉案劒履若雲行日出照萬户簪裾爛明星朝罷沐浴閑遨遊閬風亭濟濟雙闕下歡娛樂恩榮白紵詞三首揚淸音發皓齒北方佳人東鄰子且吟白紵停渌水長袖拂面爲君起寒雲夜卷霜海空胡風吹天飄塞鴻玉顔滿堂樂未終館娃日落歌塵濛月寒江清夜沉沉羙人一笑千黃金垂羅舞縠揚哀音郢中白雪且莫吟子夜吳歌動君心動君心兾君賞願作天池雙鴛鴦一朝飛去緑雲上呉刀翦綵縫舞衣眀粧麗服奪春輝揚眉轉袖若雪飛傾城獨立世所稀激楚結風醉忘歸髙堂月落燭巳微玉釵挂纓君莫違冬白紵元稹呉宫夜長宮漏𣢾簾幕四垂燈熖暖西施自舞王自管雪紵翻翻鶴翎散上聲促節牽繁舞腰軟舞腰軟王罷飲蓋覆西施鳳花錦身作牀臂爲枕朝珮瑽瑽王晏寢醒來閤門報無事子胥死後言爲諱近王之臣諭王意共笑越王窮惴惴夜夜抱冰寒不睡相逢行李白朝騎五花馬謁帝出銀臺秀色誰家子雲車珠箔開夾轂相借問知從天上來邀入青綺門當歌共銜盃銜盃映歌扇似月雲中見相見不得親不如不相見相見情巳深未語可知心胡爲返空閨孤眠愁錦衾錦衾與羅帷纏綿㑹有時春風正澹蕩暮雨來何遟後因三春鳥更報長相思古樂府權德輿光風澹蕩百花吐樓上朝朝學歌舞身年二八壻侍中㓜妹承恩兄尚主緑䆫珠箔繡鴛鴦侍婢先焚百和香鸎啼日出不知曙寂寂羅幃春夢長朝來曲王昌齡月昃鳴珂動花連繡户春盤龍玉臺鏡唯待畫眉人將進酒李白君不見黃河之水天上來奔流到海不復㢠君不見髙堂眀鏡悲白髪朝如靑絲暮如雪人生得意須盡歡莫使金樽空對月天生我材必有用千金散盡還復來烹羊宰牛且爲樂㑹須一飲三百盃岑夫子丹丘生與君歌一曲請君爲我聽鍾鼎玉帛不足貴但願長醉不願醒古來賢逹皆寂寞惟有飮者留其名陳王昔時宴平樂斗酒十千恣歡謔主人何爲言少錢且須沽酒對君酌五花馬千金裘呼兒將出換羙酒與爾同銷萬古愁將進酒李賀瑠璃鍾琥珀濃小槽酒滴眞珠紅烹龍炮鳯玉脂泣羅幃翠幕圍春風吹龍笛擊鼉鼔皓齒歌細腰舞況是靑春日將暮桃花亂落如紅雨勸君終日酩酊歸酒不到劉伶墳上土李夫人白居易漢武帝𥘉䘮李夫人夫人病時不肯别死後留得生前恩君恩不盡念未巳甘泉殿裏令冩眞丹青畫出竟何益不言不笑愁殺人又令方士合靈藥玉釜煎煉金爐焚九華帳深夜悄悄反魂香降夫人䰟夫人之䰟在何許香煙引到焚香處旣來何苦不須臾縹緲悠揚還滅去去何速兮來何遟是耶非耶兩不知翠蛾髣髴平生貌不似昭陽寢疾時䰟之不來君心苦䰟之來兮君亦悲背燈隔帳不得語安用暫來還見違傷心不獨漢武帝自古及今皆若斯君不見穆王三日哭重璧臺前傷盛姬又不見秦陵一掬淚馬嵬坡下念楊妃縱令妍姿豔質化爲土此恨長在無銷期生亦惑死亦惑凡物惑人忘不得人非木石皆有情不如不遇傾城色古别離李端水國葉黄時洞庭霜落夜行舟聞商賈宿在楓林下此地送君還茫茫似夢間後期知幾日前路轉多山巫峽通湘浦迢迢隔雲雨天晴見海檣月落聞津鼓人老自多愁水深難急流清宵歌一曲白首對汀洲古別離孟郊松仙雲繚繞萍俗水分離雲去有歸日水分無合時春芳役雙目春色柔四支楊柳織别愁千條萬條絲遊子吟孟益女羞夫壻薄客耻主人賤過逢同衆流低迴愧相見君非青銅鏡何事空照面莫以衣上塵不謂心如練人生當榮盛待士勿言倦君㸔白日晩不異弦上箭遊子吟孟郊慈母手中線遊子身上衣臨行宻宻縫意恐遟遟歸誰言寸草心報得三春暉苦熱行王轂祝融南來鞭火龍火旗熖熖燒天紅日輪當午凝不去萬國如在洪爐中五嶽翠乾雲彩滅陽侯海底愁波竭何當一夕金風發爲我掃却天下熱苦寒吟孟郊天色寒青蒼北風呌枯桑厚冰無裂文短日有冷光𫾣石不得火壯隂奪正陽苦調更何言乆吟成此章八駿圖白居易穆王八駭天馬駒後人愛之冩爲圖背如龍兮頸如象骨竦筋髙脂肉壯日行萬里疾如飛穆王獨乗何所之四荒八極蹋欲徧三十二蹄無歇時屬車軸折趂不及黃屋草生棄若遺瑤池西赴王母宴七廟經年不親薦璧臺南與盛姬遊眀堂不復朝諸侯白雲黃竹歌聲動一人荒樂萬人愁周從后稷到文武積德累功世勤苦豈知纔及四代孫心輕王業如灰土由來尤物不在大能蕩君心即爲害文帝却之不肯乗千里馬去漢道興穆王得之不爲戒八駿駒來周室壞至今此物世稱珍不知房星之精下爲怪八駿圖君莫愛天馬歌李白天馬來出月氐窟背爲虎文龍翼骨嘶靑雲振緑髪蘭筋權竒走滅没騰崑崙歷西極四足無一蹶雞鳴刷燕晡秣越神行電邁躡慌惚天馬呼飛龍趨目眀長庚臆雙鳧尾如流星首渴烏口噴紅光汙溝珠曽陪時龍躍天衢羈金絡月照皇都逸氣稜稜凌九區白璧如山誰敢沽迴頭笑紫燕但覺爾輩愚天馬奔戀君軒駷躍驚矯浮雲飜萬里足躑躅遥瞻閶闔門不逢寒風子誰採逸景孫自雲在靑天丘陵逺崔嵬鹽車上峻坂倒行逆施畏日晩伯樂翦拂中道遺少盡其力老棄之願逢田子方惻然爲我悲雖有玉山禾不能療苦飢嚴霜五月凋桂枝伏瀝銜冤摧兩眉請君贖獻穆天子猶堪弄影舞瑶池紫騮馬紫騮行且嘶雙飜碧玉􅤔臨流不肯渡似惜錦障泥白雪關山逺黃雲海樹迷揮鞭萬里去安得念春閨騘馬行杜甫鄧公馬癖人共知𥘉得花騘大宛種夙昔傳聞思一見牽來左右神皆竦雄姿逸態何崷崪顧影驕嘶自矜寵兩目淸熒夾鏡懸肉騣凶鬯匕碨礧連錢動朝來乆試華軒下未覺千金滿髙價赤汗微生白雪毛銀鞍却覆香羅帕卿家舊賜公取之天廐眞龍此其亞晝洗須騰涇渭深夕趨可刷幽并夜吾聞良驥老始成此馬數年人更驚豈有四蹄疾於鳥不與八駿俱先鳴時俗造次那得致雲霧晦冥方降精近聞下詔喧都邑肯使騏鱗地上行猛虎行李白朝作猛虎行暮作猛虎吟膓斷非關隴頭水淚下不爲雍門琴旍旌􅌭紛兩河道戰鼓驚山欲傾倒秦人半作燕地囚胡馬翻㘅洛陽草一輸一失關下兵朝降夕叛幽薊城巨鼇未斬海水動魚龍奪走安得寧頗似楚漢時翻覆無定止朝過博浪沙暮入淮隂市張良未遇韓信貧劉項存亡在兩臣暫到下邳受兵略來投漂母作主人賢哲栖栖古如此今時亦棄青雲士有䇿不敢犯龍鱗竄身南國避胡塵寶書長劒挂高閣金鞍駿馬散故人昨日方爲宣城客掣鈴交通二千石有時六愽快壯心遶牀三帀呼一擲楚人毎道張旭竒心藏風雲世莫知三吳邦伯皆顧盻四海雄俠兩追隨蕭曹曽作沛中吏攀龍附鳳當有時溧陽酒樓三月春楊花茫茫愁殺人胡人緑眼吹玉笛吴歌白紵飛梁塵丈夫相見且爲樂搥牛撾皷㑹衆賔我從此去釣東海得魚笑寄情相親猛虎行李賀長戈莫春彊弩莫抨乳孫哺子教得生獰舉頭爲城掉尾爲旌東海黄公愁見夜行道逢騶虞牛哀不平何用尺刀壁上雷鳴泰山之下婦人哭聲官家有程吏不敢聽白虎行火烏日暗崩騰雲秦皇虎視蒼生羣燒書滅國無暇日鑄劒佩玦唯將軍玉壇設醮思沖天一世二世當萬年燒丹未得不死藥拏舟海上尋神仙鯨魚張鬛海波沸耕人半作征人鬼雄豪氣猛如𦦨煙無人爲決天河水誰最苦兮誰最苦報人義士深相許漸離擊筑荆卿歌荆卿把酒燕丹語劒如霜兮膽如鐡出燕城兮望秦月天授秦風祚未終衮龍衣點荆卿血朱旗卓地白蛇死漢皇却是眞天子烏棲曲李白姑蘇臺上烏棲時吳王宫裏醉西施吳歌楚舞歡未畢靑山猶銜半邉日銀箭金壼漏水多起㸔秋月墜江波東方漸高柰爾何烏夜啼黃雲城邊烏欲棲歸飛啞啞枝上啼機中織錦秦川女碧紗如煙隔窻語停梭悵然憶逺人獨宿孤房淚如雨艾如張李賀錦䄡䄖繡襠𥜗彊彊啄食哺爾鶵壟東卧穟滿風雨莫逐良媒壟西去齊人織網如素空張在野田平碧中網絲漠漠無形影誤爾觸之傷首紅艾葉緑花誰翦刻中藏禍機不可識野田黃雀行李白遊莫逐炎洲翠棲莫近吳宫燕炎洲逐翠遭網羅吳宮火起焚爾窠蕭條兩翅蓬蒿下縱有鷹鸇柰爾何採蓮曲張籍秋江岸邊蓮子多採蓮女兒凭舩歌青房圓實齊戢戢爭前競折漾㣲波試索綠莖不尋藕斷處絲多刺傷手白練束腰䄂半卷不挿玉釵䊋梳淺舩中未滿渡前洲借問阿誰家住逺歸時共待暮潮上自弄芙蓉還蕩槳採蓮曲李白若耶溪傍採蓮女笑隔荷花共人語日照新䊋水底明風飄香䄂空中舉岸上誰家遊冶郞三三五五映垂楊紫騮嘶入落花去見此踟蹰空斷膓石城鄭谷石城昔爲莫愁郷莫愁魂散石城荒江人依舊棹舴艋江岸還飛雙鴛鴦帆去㠶來風浩渺花開花謝春悲涼煙濃草逺望不盡千古漢陽閑夕陽沙路曲李賀柳隂半眠丞相樹珮馬玎玲蹋沙路斷燼遺香䙚翠煙獨騎鳴蹄上天去帝家玉龍摐九關帝前簪笏稱南山獨垂重印押千官金科篆字紅屈盤沙路歸來聞好語旱火不光天下雨沙隄行呈裴相公張籍長安大道沙爲隄旱風無塵暖無泥宫中玉漏下三刻朱衣導騎丞相來路傍高樓息歌吹千車不行行者避街官閭吏相傳呼宫前十里唯空衢白麻詔下移相印新隄未成舊隄盡洛陽陌李白白玉誰家郞迴車渡天津看花東陌上驚動洛陽人重校正唐文粹卷第十三
