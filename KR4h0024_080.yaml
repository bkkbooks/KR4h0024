body:
  text: 吳興姚鉉纂書啓二揔一十首論兵勸裴相不自出征書李翺上安邑李相公安邊書林藴上周相公書杜牧上司徒李相公論用兵書上宰相元衡弘靖書林藴上宰相安邊書李觀上澤潞劉司徒書杜牧上招討宋將軍書羅隱上韓舍人行軍書吳武陵上李太尉論北邊事啓杜牧勸裴相不自出征書李翶三兩日來皆傳閣下以淄靑未平又請東討雖非指的或慮未實萬一者有之只可先事而言豈得後而有悔郭汾陽二李太尉立大勳而不當國政閣下以舍人使魏博六州之地歸矣自秉大政兵誅蔡州久而不克奉命宣慰未經時而吳元濟生擒矣使一布衣持書涉河而王承宗恐懼委命割地以獻矣自武德已來宰相居廟堂而成就功業者未有其比是宜以功成身退養德善守為意奈何如始進之士汲汲於功名復欲出征以速平寇賊之為事邪自秦漢以來亦嘗有立大功而不知止能保其終者即韓侍中親率重兵以壓境矣田司空深入賊地以立功矣凡人之情亦各欲成功在已唯恐居下顧宰相銜命領三數書生指麾來臨坐而享其功名奪人之功不可一也功高不賞不可二也兵者危道萬一旬月不即如是坐棄前勞不可三也凡三事昭灼易見豈或事在於已而云未熟邪伏望試以狂言訪于所知之厚者意切辭盡不暇文飾伏惟少賜省察翺再拜上安邑李相公安邊書林藴愚嘗十分天下之事知其弊者太半二年冬輒獻書思相公正而行之嗟乎無位而言輕相公猶未為行其切者國家有西土猶右臂也臂之附體豈不固歟臂之不存體將安舒愚以此輒敢重陳利病思相公念而行之當昔漢室彼為內府囊賝走馬曽不虛日咫尺萬里煙塵不動是以司馬遷班固得弄刀筆夸大漢功德炳然與三代同風洎房杜佐太宗文皇帝剗革凶孽天下廓淸姚宋佐玄宗明皇帝聲明文物照耀殊俗後之輔弼不能嗣守故我疆我理腹於犬羊嗚呼今所殘者惟北抵豳郊西極汧隴不數百里則為外域可不痛哉可不惜哉且馭馬者必右執䇿左執綏恐其有非常之患也儻若臂不勝力體不安坐則踶齧立至豈惟泛駕乎此事雖小可以喻大相公得不念之乎愚嘗出國西抵于涇原歷鳳翔過邠寧此三鎮得不為右臂之大藩乎自畫藩維擁旄鉞者殆數十百人惟故李司空抱玉曽封章上聞請復河湟事亦旋寢功竟不立爾來因循誰復尸之故朝受命而夕寢行日貴富而月驕慢跨廣衢而羅甲第指長河而固胤嗣士卒窮年不離飢寒以月繫時力供主將死則已矣賞終不及如棄鳥獸附於藪壤故死者飲恨於地下生者吞聲於邊上五十餘年無收尺土之功者豈朝廷不以為慮乎命將不得其人乎愚以此竊知不惟土地未可復且慮犬戎馳突不一日二日則彼三鎮強者閉壘自守弱者棄壁而逸豈暇為國家以郤戎虜乎愚所謂臂之不存體將安舒今刁斗不聞煙塵不飛蓋宗社之靈也豈禦守者之有功乎且食租則可以備飢衣稅則可以禦寒衣食足然後可以教攻戰朝廷既切念邊軍不遑終夕飛芻挽粟常恐後期然而荷戈負戟者終歲而餓其來已久時莫能更雖度支有兼知之名節度有營田之目皆以貨利相誘彼貿公之賔僚悉皆和糴斗粟必欺於丈素一言可致其籝金如此則士卒不得不飢寒將帥不得不奢侈欲其攻戰其可得乎此所謂借寇兵而齎盜糧也其可謂之禦戎乎伏料相公亦已垂意矣愚竊謂弊既久矣可革而化之化之之術在相公暫回頃刻之慮思之思之得人則如班超之儔不難得也相公必命將取其封錫巳榮者則封錫巳榮矣彼復何求以此戰不尅攻不得何莫不由斯人之徒歟因此言之則又不唯安邊之未得人也相公必以為人不易知儻斷然有一介之士敢露胏肝相公復能特逹獎拔俾為千夫之長得以自置於秦隴之外接彼犬戎之域三歲考績能則優獎否則孥戮已乎此賈生終童感激於前迹其慷慨不為不至蓋時之不見信也不知相公以愚此言為率爾乎以其斷然一介之士亦能成功立事乎且天下巗居谷隱之人悉皆有心但用與不用也假如登奉常之第者未必盡能文章為牙門之將者未必盡能威敵况漢之為漢多有異材豈唐之為唐獨無竒士也伏惟啚之上周相公書杜牧某再拜伏以大儒在位而未有不知兵者未有不能制兵而能止暴亂者未有暴亂不止而能活生人定國家者自生人已來可以屈指而數也今兵之下者莫若刺伐之法詩大雅維淸奏象舞之篇曰維淸緝熙文王之典迄用有成維周之禎象者象武王伐紂刺伐之法此乃文王受命受殷王專彺之命也七年五伐留戰陳刺伐之法遺之武王武王用以伐紂而有天下致之淸平為周家之禎祥周公居攝祀文武於淸廟作此詩以歌舞文武之德其次兵之尤者莫若鈎援衝壁今之一卒之長不肯親自為之詩大雅周公皇矣美周之詩曰以爾鈎援以爾臨衝以伐崇墉臨衝間間崇墉言言此實文王伐崇墉傅于其城以臨車衝鈎援其城文王親自為之夫文王何人也周公詩之夫子刪而取之列于大雅以美武王之功德手弦而口歌之不知後代之人何如此三聖人安有謀人之國有暴亂橫起戎狄乘其邊坐於廟堂之上曰我儒者也不能知兵不知儒者竟不可知兵乎竟可知兵乎長慶兵起自始至終廟堂之上指蹤非其人不可一二悉數高宗朝薛仁貴攻吐蕃大敗於大非川仁貴曰今年歲在庚午不當有事于西方此乃鍾鄧伐蜀身誅不返昨者誅討黨羌徵關東兵用於西方是不知天道也邊地無積粟師無見糧不先屯田隨日隨餉是不知地利也兩漢伐虜騎兵取於山東所謂兾之北土馬之所生馬良而多人習騎戰非山東兵不能伐虜昨者以步騎百不當一是不知人事也天時地利人事此三者皆不先計量短長得失故困竭天下不能滅朴樕之虜此乃不學之過也不教人戰是謂棄之則謀人之國不能料敵不曰棄國可乎某所注孫武十三篇雖不能上窮天時下極人事然上至周秦下至長慶寶曆之兵形勢虛實隨句解析離為三編輒敢獻上以備閲覽少希鑑悉苦心即為至幸伏增惶惕之至某頓首再拜上司徒李相公論用兵書伏覩明詔誅山東不受命者廟堂之上事在相公雖樽俎之謀算畫已定而賤末之士芻蕘敢陳伏希捨其狂愚一賜聽覽某大和二年為校書郎曽詣淮西將軍董重質詰其以三州之衆四歲不破之由重質自誇勇敢多算之外復言其不破之由是徵兵太雜耳遍徵諸道兵士上不過五千人下不至千人既不能自成一軍事須帖附地主名為客軍每有戰陳客軍居前主人在後勢羸力弱心志不一既居前列多致敗亡如戰似勝則主人引救以為己功小不勝則主人先退至有殱焉初戰二年已來戰則必勝是多殺客軍及二年已後客軍殫少止與陳許河陽全軍相搏縱使唐州軍不能因雪取城蔡州事力亦不支矣其時朝廷若使鄂州壽州唐州秖令保境不用進戰但用陳許鄭滑兩道全軍帖以宣潤弩手令其守隘即不出一歲無蔡州矣今者上黨之叛復與淮西不同淮西為寇僅五十歲破汴州襄州襄城盡得其財貨輸之懸瓠復敗韓全義於溵上多殺官軍四萬餘人輸輦財榖數月不盡是以其人味為寇之腴見為寇之利風俗益固氣焰已成自以為天下之兵莫我與敵父子相勉僅於兩世根深源濶取之固難夫上黨則不然自安史南下不甚附隸建中之後每奮忠義是以郳公抱真能窘田恱走朱滔常以孤窮寒苦之軍橫折河朔強梁之衆貞元中節度使李長策卒中使提詔授與本軍大將但軍士附者即授之其時大將來希皓為衆所服中使將以手詔付之希皓言於衆曰此軍取人合是希皓但作節度使不得若朝廷以一束草來希皓亦必敬事中使言面奉進旨秖令此軍取大將授與節鉞朝廷不别除人希皓固辭押衙盧從史其位居下因濳與監軍相結超出伍曰若來大夫不肯受詔某請且勾當此軍監軍曰盧中丞若肯如此此亦固合聖旨中使因探懷取詔以授之從史捧詔再拜舞蹈希皓回揮同列便北靣稱賀軍士畢集更無一言從史邇後漸蓄姦謀養義兒三千人日夕喣沫及父虔死軍士留之表請起復亦秖義兒與之唱和其餘大將王翼元烏重胤第五釗等及長行兵士並不同心及至被擒烏重胤坐於軍門喻以禍福義兒三千一取約束及河陽取孟元陽為之統帥一軍無主僅一月日曽無犬吠況於他謀以此證驗人心忠赤習尚專一可以盡見及元和十五年授與劉悟時當幽鎮入覲天下無事柄廟算者議必銷兵雄健敢勇之士百戰千攻之勞坐食租賦其來已久一旦黜去使司編戶紛紛諸鎮停解至多是以天下兵士聞之無不忿恨至長慶元年七月幽鎮乘此首唱為亂中義一軍𥘉亦鬱咈及詔下誅叛使溫起居造宣慰澤潞便令發兵其時九月天氣已寒四方全師未頒中冬衣服聚之授詔或伍或離垂手強項往往誶語及溫起居立於重榻大布恩旨并疏昭義一軍自七十餘年忠義戰伐之功勞安史已還叛逆滅亡之明效辭語既畢無不歡呼人衣短褐爭出效命其時用兵處處敗北惟昭義一軍於臨城縣北同果堡下大戰殺賊五千餘人所殺皆樓下步射搏天飛者賊之精勇無不殱焉賊中大震更一月日田布不死賊亦自潰後一月其軍大亂殺大將礠州刺史張汶因劫監軍劉承階盡殺其下小使此實承階侮媟一軍侵取不已張汶隨王承元出於鎮州久與昭義相攻軍人惡之汶既因依承階謀欲殺悟自取軍人忌怒遂至大亂非悟獨能使其如此劉悟卒從諌求繼與扶同者秖鄆州隨來中軍二千耳其副倅賈直言入責從諫曰爾父提十二州地歸之朝廷其功非細秖以張汶之故自謂不潔淋頭竟至羞死爾一孺子安敢如此從諌恐悚不敢出言一軍聞之皆隂然直言之説值寶曆多故因以授之今才二十餘歲風俗未改故老尚存雖欲劫之必不用命伏以河陽西北去天井關強一百里關屬澤州關隘多山井泉可鑿雖有兵力必恐無功若以萬人為壘下窒其口高壁深塹勿與之戰忽有敗負勢驚洛師蓋河陽軍士素非精勇戰則不足守則有餘成德一軍自六十年來世與昭義為敵訪聞無事之日村落鄰里不相往來今王司徒代居反側思一自雪況聮姻戚願奮可知六十年相讎之兵仗朝廷委任之重必宜盡節以答殊私魏博承風亦當效順然亦止於圍一城攻一堡刋木堙井係纍稚老而已必不能背二十城長驅上山徑搗上黨其用武之地必取之䇿在於西面今者嚴紫塞之守備謹白馬之隄防秖以忠武武寧兩軍以靑州五千精甲三齊兵青州最徑宣潤二千弩手由絳州路直東徑入不過數月必覆其巢何者昭義軍糧盡在山東澤潞兩州全居山內土塉地狹積榖全無是以節度使多在邢州名為就糧山東糧榖既不可輸山西兵士亦必單鮮搗虛之地正在於此後周武帝大舉伐齊路由河陽吏部宇文弼曰夫河陽要衝精兵所聚盡力攻圍恐難得志如臣所見彼汾之曲戍小山平用武之地莫過於此武帝不納無功而還後復大舉竟用弼計遂以滅齊前秦符堅遣將王猛伐後燕慕容偉大破偉將慕容評於潞州因遂滅之路亦由此北齊高歡再攻後周路亦由此而後周名將韋孝寬齊王攸常鎮勳州王壁城今絳州稷山縣是也故東西相伐每由此路以古為證得之者多以某愚見不言劉稹終不能取貴欲速擒免生他患昨者北虜才畢復生上黨賴相公廟算深逺北虜即日敗亡儻使北虜至今尚存沿邊猶須轉戰回顧上黨豈能討除天下雖言無事若上黨久不能解别生患難此亦非細自古皆因攻伐未解旁有他變故孫子曰兵聞拙速未睹巧之久也伏聞聖主全以兵事付於相公某受恩最深竊敢干冒威嚴逺陳愚見無任戰汗某頓首再拜上宰相元衡弘靖書林藴陸賈有言天下有事屬在將天下無事屬在相伏惟相公兼將相之重任執殺生之大柄藴亦竊𬒳教化忝在陶鈞之內四海安平某則與歌虞贊魯之人為儔苟有妖孽某安敢不隳裂肝膽為相公之腹心乎愚者千慮或有一得伏願相公少賜採擇焉道路云云以為淮西凶黨侵犯疆鄙某伏料相公制置如在諸掌矣然則舜有天下闢四門明四目達四聰欲天下之誠畢見矣平津侯開東閣以延天下士欲天下之美惡畢知矣伏惟相公抱赫赫濟時之略佐明明聖上之朝某切願相公以平津之德致聖上廣帝舜之道使天下之事可重而實諸掌則淮西之寇不足以為患矣某幼讀書不求甚解但見古人之有建功立事者心則慕之以是十試藝於春闈竟不成名今為河朔一從事耳苟不自言其誰為言於相公乎且人生天地之間必合達天地之性苟違天地之性者是天地之棄物也今淮西凶黨是天地已棄之物相公誠順天而誅可不偉歟某竊聆議者謂淮西兵強不與恆鄆兩軍掎角相應此皆腐儒竪子之言不足與相公計大事何者自兵興已來僅六十年人皆尚武各思功業彼或有逆此則有順以順討逆往無不剋爰自國初垂二百年時有悖逆孰為存者今天下藩鎮六十甲士百萬雖有依違未盡化者不四三所耳議者若以為申説言淮蔡必強則陳許安得而弱乎況以人敵人彼亦人也以兵刃敵兵刃彼亦兵刃也或示其弱則過不在士卒伏計此事以經相公心矣某請徴四年冬出師討恆陽之事明之初王承宗阻兵盧從史濳應天兵欲進賊必知之況內丘與臨城秖二十里北為賊境南是天兵兩處傍山俱置死地堯山與髙邑共據一川若盧從史必議引兵直進則趙州高邑立可屠之此既不備彼又得計豈得賊勢疆而天兵弱邪德宗朝韓全義統師自取退恧蓋緣淄靑諸道悉會用兵所謂暗齎盜糧不得不敗且兵以售死為效國以厚錫為誠某竊知此者行營師徒苦役錫賚納於將帥飢寒加於士卒欲其破虜其可得乎又朝廷奬用多藉舊人蓋取官崇或言望重殊不料彼己崇重更復何求以此取人往往皆失某輒賀相公昨者制置已得其人則陳許李光顔安州李聽唐州田秀誠功忠的立某亦素諳伏願相公任之不疑各委兵柄但絶常鄆兩處莫許知聞其餘連城惟在感激人一其性豈不易圖如此則相公之功不後郭尚父李令公之功也豈佐商輔周之德獨專美於前歟議者若以為恆兾強梁相公則有魏博澤潞制之矣淄靑暴慢相公則有梁宋徐泗制之矣以天下無限之勇士破淮西有數之凶賊孰謂不可然則某又切願相公用其勇敢之士分巡諸道將帥有不用命者許以軍法按之士卒有𬒳飢寒者以其赤子保之如此則忠勇奮起姦謀自殄倒戈脫劔不日可期某久歷險難多見成敗比被劉闢欲殺無人薦論本使程僕射入朝之時再三邀請某以謂已出萬死固求一伸窮困蹉跎竟無知者程僕射禮惠逾厚某又愛彼功名至元和十六年方受奏請既奉恩詔兼授憲官心期佐戎必擬立事自到河北首末四年羣情所難某意獨易蓋以朝廷典法率而行之道路皆知無不驚駭況留家口並不將去今年八月內蒙程僕射薦歸闕庭幾欲半年未蒙公論伏以西南東北兩處從軍自執庸愚不失誠節今當相公舉直之日是某幸得盡言之秋仰望陶鈞置諸倫品柔逺之道此為事先不宣某再拜上宰相安邊書李觀維初乾之精坤之靈播五行為五常而人得之離四氣為四方而蠻夷胡貊得之五行合而成至和故宅中四氣偏而為匪人故在邊是亦太極造世之智玄黃冥成之心者乎聖人乘五行而允釐作九圍而外之五帝三皇禹湯巳來不聞深入之征不紀薄伐之師殆繇鴻厖之風未甚流沖漠之澤未甚醨周秦之間天下始勞前有涇陽之侵踵有長城之徭周人逐之而已不常為心秦人罔知天命連兵而謷謷至於逆三靈掊生人元元蜩蜋魁傑駿奔始圖備胡之術卒覆守邦之人秦之事萬祀鏡哉漢孝武承業之盛負才之雄隘函夏鮮黎蒸將郛窮荒而寓鄰揚威四臨霆發電流歷載五六功患相儔誓詘慮殫兵老舋仍于時乃交和親之問還奔命之勤然巳天下懸罄君臣與謀遂有鹽鐡車船攉酤六畜之租興危矣哉不居之地不牧之人何苦如是哉矧乃乘秋之虜常存托虜之賦不除漢之事亦萬祀鏡哉噫惟皇唐操琁璣馭民而統天將二百齡朝更九聖運開中興縱橫六合上下天淵蜚馳之倫莫不被仁獨犬戎跳梁滑我右陲儒之䇿曰和親武之議曰宿兵和親則易攜宿兵則厚亡九聖之君前後病之然屬三方乂安悉力一隅則右臂可斷六嬴可俘太宗玄宗之時也厥後內寇數動國家一罷虜滋新謀土失舊封伊頃迄今有加無瘳豈負鼎虧折衝之資推轂無封疆之忠志士仁人是以纍息而長歎且周曰獫狁秦曰胡漢曰胸奴然實非工蓋隨國而名之於今則曰吐蕃則正居庚方涉河而北履海而西宇宙絶徼羌戎全區亦不可得而制可斥而逺之觀今不能制也信矣斥之則何宜橫戎所向不廣千里扼盜之衝不越十處擇一虎臣練萬虎賁使制得自專權得自縱夫兵有專制則畢力將無分權則成功是則隂山可復泣虜陽關可復隔戎何邊之不安焉今聖人朝在明堂晚在諸宫左右進退焉得知安邊之要哉雍熙大臣苟以小者近者為懷不遑復思崇九廟之原哉且國家思復三方之民得以養之區區然如懼不周而忿生然寒卒飢徒終自有之愚竊恐戎無郤年矣邊無安期矣財有盡朝矣何者今國家一垂控戎纍所暴兵兵不問堪將不擇良當守者爭險易當攻者避後先寇之來則棄民而相保冦之去則冒賞而稱庸此所謂戎無郤年矣夫戰陳多將則勢離攻守多將則不支以其勝不得盡有敗不得獨受故也至今聞有築城於虜蹊遷民於虜濵城適罷而寇窬民未居而囚拘彎弓者郤行蒙甲者退趨此所謂邊無安期矣且虜不可以無兵而威兵不可以不戰而歸故明主得下征蒼蒼之産將軍得外娛悠悠之師此所謂財有盡朝矣然三患始萌一言尚平欲戎之可郤也不願多分節與人願擇一人敢以近言之則開元朝哥舒翰之將是也欲邊之可安也不願歲更四方之兵願因其兵敢以古言之則漢朝錯之䇿是也欲財之不盡也不願衣食供給山東願開邊田敢以古言之則趙充國之奏是也此則兵不得娛無功虜不得候相膠國不得殫下民胡不謂甲周漢之䇿範子孫之謀哉又竊覩與北狄和親帝女下嫁實國家思往來之績垂不臣之姻然聞蒸報且數貪婪無厭而人主必遣使使必備珍得無費乎得無勤乎不知將尋鄭人伐胡之義復採賈生五餌之言邪愚竊以為無知之俗不可以歲辱大命天子之使不可以日臨穹廬是手足倒懸夷夏相侔復何以南面而聽天下穆穆然而觀諸矦愚敢以棄同即異而言且定西之危有若前之説申北之恩有羈縻之文不願國家曠兵于兹汙命于兹斯者皆巗廊之亟扆旒之虞而屑屑狂夫亮違孔父不謀之經庶陪公車敢諌之儔㑭委輅輸求試屬國之官而後觀焉某再拜上澤潞劉司徒書杜牧今日輕重望于幾人相位將權長材厚德與輕則輕與重則重將軍豈能讓焉昔者齊盜坐父兄之舊將七十年來海北河南泰山課賦三千里料甲一百縣獨據一面橫挑天下利則伸鈍則滿鏃而不發約在子孫血絶而已此雖使鐵偶人為六軍取不孔易況席征蔡之弊天下銷耗燕蟠趙伏用齊卜我當此之時一年不能勝則百姓半流二年不能勝則關東之國孰知其變化也將軍一心仗忠半夜興義昧旦而齊族矣疆上籍口探出僭物重寶仰關輦上是以趙一搖燕一呼爭來汗走一日四海廓廓然無事矣伏惟將軍之功德今誰比哉是以初守滑臺為尚書守潞為僕射乃作司空乃作司徒爰開丞相府平章天下越録躐等驟得富貴古今之人亦以為將軍止此而已矣將軍德於國家甚信大國家復之於將軍雅亦無與為大矣今者上黨足馬足甲馬極良甲極精後負燕前觸魏側肘趙彼三虜屠囚天子耆老劫良民使叛銜尾交頸各蟠千里不貢不覲私贍妻子王者在上此輩何也今者上黨馳其精良不三四日與魏決於漳水西不五六日與趙合於泜水東縈太原排飛狐緩不二十日與燕遇於易水南此天下之郡國足以事區區於忠烈無如上黨者明智武健忠寬信義知機便多算畫攻必巧戰不負能使萬人樂死赴敵足以事區區於忠烈天下之人無如將軍者爵號祿位富貴休顯宜驅三族上校恩澤宜出萬死以副倚注天下之人亦無如將軍者是將軍負天下三無如之望也始者將軍賴齊然後得祿仕入卧內等子弟一身聮齊纍世之逆卒境上爭首其恩甚厚其勢甚不便將軍以為大仁可殺身大忠不顧細謹終探懷而取之今者將軍負三無如之望上戴天子四海之大以為緩急所宜日夜具申喧請今默而處者四五歲矣負天下之三無如者宜如是邪不宜如是邪是以天下之小人以為將軍始者亡齊見利而動今者安潞見義而止若是則天下利無窮義有限走無窮背有限則安可識之哉其有識者則曰不然夫桓文之霸也先修刑政然後事事近者山東士人來者咸道上黨之政軍士兵吏士詳男子畝婦人桑老者養孤者庇上下一切罔有紕事暨乎政庭則將軍不知尊布衣不知卑諸侯之驕久矣是以髙才之人不忍及門仁政不施久矣是以暴亂不止若此者將軍是行仁政來高才苟行仁政來高才若非止暴亂尊九廟峻中興復何汲汲如是邪在漢伯通在晉牢之二人功力不寡一旦誅死人豈冤之符秦相猛將終戒視後禍大唐太尉房公忍死表止伐遼此二賢當時德業不左諸人尚死而不已蓋以輔君活人為事非在矜伐邀引為心也伏惟將軍思伯通牢之所以不終仰相猛房公之所以垂休則天下之人口祝將軍之福夀目覩將軍盛德之形容手足必不敢加不肖於將軍之草木此乃上下萬丗烈丈夫口念心禱而求者今將軍能有之豈可容易而棄哉大唐二百年自外叛者三十餘種大者三得其二小者亦包裹千里燕趙魏潞齊蔡吳蜀同歡共悲手足相急陳刺死帳下死圍悉死伏劒死斬死絞死大者三歲小或一月巳至于盡死曰忠曰義則有父子同壇兄弟繼踵論罪則曰有某功論功則曰捨某罪伏惟十二聖之仁一何汪汪焉天之校惡滅逆復何一切焉此乃盡將軍所識復何云云小人無位而謀當死罪某恐懼再拜上招討宋將軍書羅隱朝廷以簡陵九年彭虺肆螫而東南一臂為之枯耗其後吳卒以狼山叛則東西浙之筋力殆矣自爾天子不重困百姓由是官未實爵諸葛爽祑安文祏皆自盜而升朝序也所以不幸者江南水鍾陵火沿淮飢汴滑以東螟故無賴輩一食之不飽一衣之不覆則磨寸鐡挺白棒以望朝廷姑息而王仙芝尚君長等凌突我廬壽燖剝我梁宋天子以蟣虱癢痛不足搔爬因處分十二州取將軍為節度非方鎮之無帥非朝廷之乏人蓋以將軍跳出隴右不二十餘年三擁節旄謂將軍必能知恩用命耳今聞羣盜已拔睢陽二城大梁亦板築自固彼之望將軍其猶沸之待沃壓之待起也而將軍朱輪大斾優遊東道抑不知朝廷八十三州奉將軍侍衛者乎復俾將軍誅翦草寇者乎昔韓之醫良而性嗇故為人治未嘗剔去根源所以延其疾而養其財也後有商於韓者以疽見醫醫且欲大其疽而沽直因以藥稔之而疽潰商斃商之家表於韓韓侯尸其族而藉其有無且二賊齧夀春啖潁上刷亳社掠合肥經營於梁宋其為老者殺而少者傷驅人之婦女輦人之財貨將軍固知之矣自將軍受命迄今三月關東之慘毒不解殺傷驅輦之不已乃將軍為之非君長仙芝所為也文皇帝時衛公靖太帝時鄭仁泰薛仁貴或戢斂不謹或伺候輜重當時憲司悉以法繩今將軍勳業不若衛公靖之多也出師非鄭薛之敵也而橫擁仕伍鞭撻餽運以愚度之將軍之行酷於君長仙芝之行也甚為將軍憂前者天子慮將軍以愛子之念復授禁秩俾在軍前則朝廷寵待將軍倚望將軍也俱不淺矣苟將軍勠力以除暴推誠以報國今其時也無使躡韓之醫上韓舍人行軍書吳武陵朝廷命將自數十百年未有此重然始命之重而終責之固重矣今丞相主也刑部以宣慰為名乘生殺之機制善敗之略獨在閣下閣下可使諸侯盡附餘寇必誅以快天子之心哉若曰吾獨主降者與其縣邑耳則是一王官之事又非相國與朝之大賢所宜降也若曰吾將以法令齊之則是韓弘之法令嚴肅已過不可加也若曰吾以闕庭之威劫之俾諸將懼而前鬪則在下數行之語決行之耳又不必躡踵而推捽項而驅也若曰吾親視其師有不用命者則奪其符而易置幕府則宜有素定不可臨事而待聞也若曰吾將將彼三將督進六萬以誅寇則其軍各從其帥帥之命也吾未嘗撫循其人又將何以結其心而求其死哉獨曰賊重吾德義必來降此蓋萬一也脫不如旨其將何圖嗚呼國之理亂在此行矣得其畫則兩河不足平河湟不足復失其䇿則天下之事自此繁矣豈不惜哉丞相尊重素狎武陵之言輕而不能盡行時益恐不盡願梗概其旨於閣下夫兵機若神應事立斷千里之外必待奏聞而后行事亦變矣誠願丞相宜密請勑旨事無巨細行而後聞又宜奏取中人嘗所不快者為監軍以一之即歸素所快者於內為吾地則用隂符五賊之術以傾諸侯即復出絹八九十萬以賞給士大夫誠然矣則孰不為丞相之人既獲腰領則以朝命命三將為三陳既定則明斥候擊牛高會濳授緣邊諸將以實期又公以三期紿賊令辨士持一函書賜元濟及其將士以全活彼必降矣適不如料則一日快進必次於城下此大略也夫臨機制變又何可數昔司馬宣王征孟達則八道急攻征公孫文懿則捨其鋭而趨其虛緩以撓各從其利也夫禽之制在氣顧吾之法令何如耳昔蕭王以千人劉牢之以八百人高隆以三千五百人謝玄以五千人劉𥙿以二千五百人是皆立鴻勳成大業矣夫就世務者在結人心結人心者在吾所以張其形勢也方聞紀綱之僕者三百人軍令苟行亦足以塞諸侯之望奪羣寇之心歸六萬人之志矣使賊不為則己為則必決死於一戰以延其命願閣下無事迫速愼出令拔竒士而已昔先主所以分蜀而帝者獨以長短之權傾曹公耳誠使諸侯以嚴暴吾以寬厚收之諸侯以殺戮吾以禮義懷之彼有所短吾見其長彼有所乏吾施其餘則事何不濟功何不成書不可盡尋當面策上李太尉論北邊事啓杜牧某啓伏以聖主垂衣太尉當軸威德上顯和澤下流諸侯無異心百姓無怨氣星辰順靜日月光明天業益昌聖統無極既功成而理定實道尊而名垂今則未聞縱東山之遊樂後園之醉惕惕若不足兢兢而如無豈不以邊障尚驚殊虜未殄防其入寇猶須徵兵伏以回鶻種落人素非多校於突厥絶為小弱今者國破衆叛逃來漢南為羈旅之魂食草萊之實白髮驪騂之騎凋耗已無湩酪皮毳之資飢寒皆盡寄命雜種藏迹隂山取之及時可以一戰今者度虜之不出者有二時去時來徊翔不決必有所在西戎巳得要約伺其氣勢同為侵擾此其一也心膽破壞馬畜殘少且於美水豐草暖日廣川牧馬養習以俟強大此其二也今者徵中國之兵與之首尾久戍則有師老費財之憂深入則有大寒瘃墮之苦示戎狄之弱生姦傑之心今者不取恐貽後患敢以管見上干尊重自兩漢伐虜皆是秋冬不過百日驅中國之人入苦寒之地此時胸奴徑弓折膠童馬免乳畜肥草壯力全氣盛與之相校勝少敗多故胸奴云漢實大國也但其人不能辛苦爾此所謂避虛而擊實逃短而攻長至於後魏崔浩因見其理蠕蠕強盛屢犯北邊浩請討之曰蠕蠕恃其地遠自寬已久故夏則散衆放畜秋乃背寒向暄南來寇抄今出其慮表掩其不備大兵卒至必驚駭星分向塵奔走牡馬護牧牝馬戀駒驅馳難制不得水草未過數日則聚而困斃可一舉而滅矣武帝從之及全軍入境蠕蠕先不設備民畜布野驚怖四奔莫相收攝於是分軍撲討東西五千里南北三千里凡所俘虜及獲畜産彌漫山澤高車因殺蠕蠕種類歸降者三十餘萬落虜遂散亂帝沿弱水西行至涿邪山諸大將慮深入恐有伏兵勸帝停止不追浩先勸窮追之不從後聞涼州賈胡言若更前行三日則盡滅之矣帝深恨之以某所見今若以幽并突陳之騎酒泉教射之兵整飭誡誓仲夏濳發計隂山與涿邪之逺近十不一二校蠕蠕回鶻之強弱猶如虎鼠五月節氣在中夏則熱到隂山尚寒中國之兵足以施展行軍於枕席之上玩寇於掌股之中軌轠懸瓶湯沃晛雪一舉無類必然之䇿今冰合防秋冰銷解戍行之巳久虜為長然出為意外實為上䇿議者或云北取黠戞令討回鶻伏以黠戞起於别種超為可汗必是英傑天時必助賢材必用法令必明滅回鶻之後便是勍敵況示之以弱必為所輕今者四海九州同風共貫諸侯用命年榖豐熟可以瘞玄玉於常山孑遺人於河壠顧兹疲虜豈遺子孫伏惟太尉相公文德素昭武功復著畫地而兵形盡見按瑣而邊事無遺唯一指蹤即可掃迹昔漢武帝求賢也有上書不足採者輒報罷去未嘗罪之故能羈越臣胡大興禮樂今太尉與仁聖天子同德有志之士無不願死伏惟特寬狂狷不賜誅責生死榮幸無任感恩重校正唐文粹卷第八十嘉靖甲申歲太學生姑蘇徐焴文明刻于家孰
