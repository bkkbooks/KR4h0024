  - {type: variant, offset: 430, length: 15386, content: 鉉氏唐之人以文名者不獨李杜韓栁騷雅侁侁墳籍彬彬凡有古調皆粹於是矣竊惟鉉也豈以皆金也而純為粹皆玉也而潤為粹唐諸賢金聲琅琅玉光粲粲亦文矣雖不敢儗諸聖門其亦一代之黄鍾拊石也歟是集古有刻夲近亦彫闕婁江國子徐生焴有慨扵是購淂古夲翻而鋟之􅎚􅎚成殊類古刻焴亦諸士子中之好古者重以御史中丞毛公之命是故述而序之嘉靖丁亥春二月二日天水胡纉宗世甫序重雕唐文粹序春秋記事也書之謨訓詩之風雅文也而事寓焉相爲經緯表裏者也後丗諸史固春秋之法若漢文選唐文粹諸集則詩書之流云耳豈徒以其文一代理亂之故民風國俗之殊禮樂度數文物之賾蓋有史所不能備者是烏可少哉宋姚寶臣所集文粹百卷實本文苑英華十􅎥其一當時服其精確惜其所去取猶不盡出於吾所云者亦唯其文而巳然李唐三四百載之文獻在是矣夫子曰夏禮吾能言之𣏌不足徴也殷禮吾能言之宋不足徵也文獻不足故也欲言唐禮者舎是其何以徵之舊時刻本傳流漸少其存者亦多訛缺讀者病之予得清谿倪公家藏本公記云脫落者四之一篁墩程編修爲予𥙷之蓋書于成化癸巳歲予復手自校讐差完善可讀毎自珎惜甲申仲冬以吏部侍郎致政歸過姑蘇太守胡侯世甫岀示新本冩善鏤精予驚喜得竒觀焉回視所藏燕石耳侯曰此太學生徐焴家刻也先生賜之一言引諸端茲集爲重徐生亦來謁且堅請予樂茲集之成也諾之徐生嗜古博藏其刻是集躬自監視一字一畫弗稱必更之同時又有刻文選者皆甫畢工吳下雅尚文事胡守循吏而能文章故人爭趨之舟過嚴陵瀬書此付徐生鑱諸木且以質諸胡侯嘉靖甲申冬十一月丙戌弋陽汪偉器之敘唐文粹序吳興姚鉉述五代衰微之弊極於晉漢而漸革于周氏我宋㪍興始以道德仁義根乎政次以詩書禮樂源乎化三聖繼作曄然文明覇一變至於王王一變至於帝風敎逮下將五十年熈熈蒸黎乆忘干戈戰伐之事侁侁儒雅盡識聲明文物之容堯典曰文思安安大雅云濟濟多士盛德大業英聲茂實并届于一代得非崇文重學之明效歟况今歷代墳籍略無亡逸内則有龍圖閣中則有秘書監崇文院之列三館國子監之印羣書雖唐漢之盛無以加此故天下之人始知文有江而學有海識於人而際於天譔述纂錄悉有依據由是大中祥符紀號之四禩皇帝祀汾隂后土之月吳興姚鉉集文粹成文粹謂何纂唐賢文章之英粹者也詩之作有雅頌之雍容焉書之興有典誥之憲度焉禮備樂舉則威儀之可觀鏗鏘之可聽也大易定天下之業而兆乎爻象春秋爲一王之法而繫於襃貶若是者得非文之純粹而已乎是故志其學者必探其道探其道者必詣其極然後隱而晦之則金渾玉璞君子之道也發而明之則龍飛虎變大人之文也自微言絶響聖道委地屈平宋玉之辭不䧟於怨懟則溺于讇惑漢興賈誼始以佐王之道經世之文而求用于文帝絳灌忌才卒罹讒謫其後公孫弘董仲舒晁錯咸以文進或用或升或黜或誅至若嚴助徐樂吾丘壽王司馬長卿輩皆才之雄者也終不得大用但侍從優游而巳如劉向司馬遷楊子雲東京二班崔蔡之徒皆命世之才垂後代之法張大德業浩然無際至於魏晉文風下衰宋齊以降益以澆薄然其間鼓曹劉之氣燄聳潘陸之風格舒顔謝之淸麗藹何劉之婉雅雖風興或鈌而篇翰可觀至梁昭明太子統始自楚騷終于本朝盡索歷代才士之文築臺而選之得三十卷號曰文選亦一家之竒書也厥後徐庾之輩淫靡相繼下逮隋季咸無取焉有唐三百年用文治天下陳子昻起於庸蜀始振風雅繇是沈宋嗣興李杜傑岀六義四始一變至道洎張燕公以輔相之才專譔述之任雄辭逸氣聳動羣聽蘇許公繼以宏麗丕變習俗而後蕭李以二雅之辭本述作常楊以三盤之體演絲綸郁郁之文於是乎在惟韓吏部超卓羣流獨高遂古以二帝三王爲根本以六經四敎爲宗師憑陵轥轢首唱古文遏橫流於昏墊闢正道於夷坦於是柳子厚李元賔李翶皇甫湜又從而和之則我先聖孔子之道炳然懸諸日月故論者以退之之文可繼楊孟斯得之矣至於賈常侍至李補闕翰元容州結獨孤常州及吕衡州温梁補闕肅權文公德輿劉賔客禹錫白尚書居易元江夏稹皆文之雄傑者歟世謂貞元元和之間辭人咳唾皆成珠玉豈誣也哉今世傳唐代之類集者詩則有唐詩類選英靈間氣極玄又玄等集賦則有甲賦賦選桂香等集率多聲律鮮及古道蓋資新進後生干名求試者之急用爾豈唐賢之文跡兩漢肩三代而反無類次以嗣于文選乎鉉不揆昧懵徧閱羣集耽玩研究掇菁擷華十年于兹始就厥志得古賦樂章歌詩賛頌碑銘文論箴議表奏傳錄書序凡爲一百卷命之曰文粹以類相從各分首第門目止以古雅爲命不以雕篆爲工故侈言蔓辭率皆不取觀夫羣賢之作也氣包元化理貫六籍雖復造物者固亦不能測研幾而窺沈慮故英辭一發夐出千古琅琅之王聲粲粲之珠光不待汎天風澈海波而盡在耳目於戲李唐一代之文其至乎唐文粹序重校正唐文粹目録吳興姚鉉纂第一卷古賦甲揔三首宫殿聖德二含元殿賦并序李華明堂賦并序李白失道一阿房宫賦杜牧第二卷古賦乙揔二首京都西都賦并表李庾東都賦第三卷古賦丙表附揔三首郊廟進三大禮賦表杜甫朝獻太清宫賦朝享太廟賦有事于南郊賦第四卷古賦丁揔五首符寶一受命寶賦并序梁肅象緯一渾天賦并序楊炯閱武二大獵賦并序李白裴將軍舞劒賦并序喬潭誓師一濟河焚舟賦高邁第五卷古賦戊一首海海潮賦并序及進賦狀盧肇第六