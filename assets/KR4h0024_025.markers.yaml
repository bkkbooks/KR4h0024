  - {type: variant, offset: 10773, length: 0, content: '', WYG: 此皆不欲煩也是以齊侯讀書輪扁竊笑漢皇慕古長孺陳詞此亦不欲勞也且多記則損心多言則損氣心氣内損形神外勞初雖不覺後必爲累湏為社稷自愛豈為性好自傷乎竊以今日升平皆陛下力行所至欲令長乆匪由辯慱但當忘彼愛憎愼兹取捨毎事敦朴無非至公若貞觀之初則可矣至如秦政强辯失人心於自矜魏文宏才虧衆望於虛說此才辯之累較然可知矣伏願略兹雄辯浩然飬氣簡彼緗圖淡焉怡目固萬夀於南嶽齊百姓於東户則皇恩斯畢天下幸甚答詔非慮無以臨下非言無以述慮比有談論遂致煩多輕物驕人恐由兹道形神心氣非此為勞今聞讜言虚懐以改論時政書桞澤頃者因韋氏險詖姦臣同惡賞罰紊㢮綱紀紛綸政以賄成官因寵進言正者獲戾行殊者見疑海内寒心實将莫救頼神祗祐徳宗廟降靈天討有罪人用不保陛下叡謀神聖勇智聰}
  - {type: page-break, offset: 10773, content: '', id: KR4h0024_WYG_026-3a, image: WYG1343/WYG1343-0366c.png}
  - {type: page-break, offset: 10773, content: '', id: KR4h0024_WYG_026-3b, image: WYG1343/WYG1343-0366d.png}
  - {type: variant, offset: 10774, length: 1, content: 刻, WYG: 安宗社於已危拯黎庶於将溺今龎眉鮐背歡忻踊躍望聖朝之撫輯聽聖朝之徳音今陛下蠲煩省傜法明徳舉萬邦愷樂家室胥慶臣又聞危者安其位者也亡者保其存者也亂者有其治者也伏惟陛下安不忘危存不忘亡治不忘亂則克享天心國家長保也詩曰靡不有初鮮克有終伏惟陛下慎厥終惟其初非禮勿視非禮勿聼非禮勿言非禮勿動書曰惟徳㒺小萬邦惟慶惟不徳㒺大墜厥宗甚可畏也甚可懼也伏惟陛下慎之哉夫驕奢起於親貴綱紀亂於寵倖願陛下禁之於親貴則天下風随矣制之於寵倖則天下法明矣詩曰刑于寡妻至于兄弟以御}
  - {type: page-break, offset: 10774, content: '', id: KR4h0024_WYG_026-4a, image: WYG1343/WYG1343-0367a.png}
  - {type: variant, offset: 10777, length: 1, content: 塾, WYG: 邦若親貴為之而不禁寵倖撓之而見從是政之不恒令之不一則姦詐斯起暴亂生焉雖嚴刑制戮而法不行矣縱陛下親之愛之莫若安之福之寵禄之過罪之漸也非安之也驕奢之滛危之本也非福之也前事不忘後之師也伏願陞下精求俊哲朝夕納誨縱有逆于耳謬于心者無速之以罰姑籌之以道省于厥躬雖木樸千忌諱願恕之以直用開諫諍之路也或有順于耳便于身者無急之以賞當求諸非道稽之典訓其不叶於徳必寘之以法用杜側媚之行也有羞滛巧於陛下者遽黜之則淫巧息矣有進忠讜於陛下者遽賞之則忠讜進矣臣又聞生於富者驕生於貴者傲石碏曰臣聞愛子敎之以義方不納於邪驕奢滛佚所自邪也書曰㒺滛於逸罔遊於樂穆王有命曰實頼前後左右有位之士繩愆糾謬格其非心今儲官肇建王府初啓至於寮友必惟妙擇今驕奢之後流遁未變慢逰之樂餘風或存夫小人弄臣易合於意竒伎滛巧多適於心狎於非徳兹為奢怠書曰愼簡乃僚無以巧言令色其惟吉士僕臣正厥后克正僕臣諛厥后自聖伏願采温良博聞之士恭儉忠鯁之人任以東宫及諸王府仍請東宫量署拾遺補闕之職令朝夕講論出入侍從授以訓誥交修不逮臣又聞馳騁畋獵令人發狂名教之中自有樂地承前貴戚鮮克由禮或打毬擊鼓比周伎術或飛鷹奔犬盤逰藪澤此甚為不道非進徳修業之本也書曰内作色荒外作禽荒又曰無若丹朱傲惟慢遊是好朋滛于家用殄厥世伏惟陛下誕降謨訓敦勸學業示之以好惡陳之以成敗以義制事以禮制心圖之於未萌慮之於未有則福禄長享與國並休矣臣又聞富不與驕期而驕自至驕不與罪期而罪自至罪不與死期而死自至信矣斯語明哉至誡頃者韋庶人安樂公主武延秀等可謂貴矣可謂寵矣權侔人主威震天下然怙侈滅徳神怒人棄豈不謂愛之太極富之太多不節之以禮不防之以法終轉吉為㐫變福為禍諺曰千人所指無病自死不其然歟書曰殷鑒不逺在彼夏王今陛下何勸豈非皇祖謀訓之則也今陛下何懲豈非中宗寵任之甚也禮曰愛而知其惡憎而知善可不慎哉夫寵愛之心人則不免去其太甚閑之禮節適則可矣今諸王公駙馬亦陛下之親愛也矯枉之道在於厥初鑒誡之義其則不逺使觀過務善居寵思危庶夙夜惟寅聿修厥徳經曰在上不驕髙而不危所以長守貴也制節謹度滿而不溢所以長守富也富貴不離其身然後能保其社稷書曰制官刑警于有位敢有恒舞于宫酣歌于室時謂巫風敢有狥于貨色恒于遊畋時謂滛風敢有侮聖言逆忠直逺耆徳比頑童時謂亂風惟兹三風十愆卿士有一于身家必䘮邦君有一于身國必亡甚可畏也甚可懼也伏惟陛下必察而明之必信而勸之有奢僭驕怠者削其禄封樸素修業者錫以車服以朂其心使奉其命無使乆而忽之無使逺而墜之臣聞知之非艱行之惟艱又曰常厥徳保厥位厥徳匪常九有以亡伏惟陛下慎之哉前車之覆實惟明證先王之誡可以終吉若陛下奉伊尹之訓崇傳説之命不作無益不啓私門刑不差賞不濫則惟徳是輔惟人之懐天禄永終景福是集儻陛下忽精一之徳開恩倖之門爵賞有差刑罰無當則忠臣正士亦當不復談矣諫太宗勤政改過書岑文本臣聞創撥亂之業其功既難守已成之位其道不易故居安思危所以定其業也有始有卒所以保其位也今雖億兆乂安方隅寜謐既承䘮亂之後又接凋弊之餘户口減損尚多田疇墾闢尚少覆燾之恩著矣而瘡痍未復徳敎之風被矣而資産屢空是以古人譬之種樹年祀綿逺則枝葉扶踈若種之日淺根本未固雖壅之以黒墳暖以以春日一人摇之必致枯槁今之百姓頗類於此常加含飬則日就滋息蹔有征役則随之凋耗凋耗既甚則人不聊生人不聊生則怨氣充塞怨氣充塞則離叛之心生矣故帝舜曰可愛非君可畏非民孔安國曰人以君為命故可愛君失道則人叛之故可畏仲尼曰君猶舟也人猶水也水所以載舟亦所以覆舟是以古之哲王雖休勿休日愼一日者良為此也伏惟陛下覽古今之事察安危之機上以社稷為重下以億兆在念明選舉慎賞罰進賢才退不肖聞過即改從諫如流為善在於不疑出令期於必信頥神飬性省畋逰之娯去奢從儉减工役之費務静方内而不求闢土載櫜弓矢而無忘武備凡此數者雖為國之恒道陛下之所常行臣之愚心惟願陛下思之而不倦行之而不怠則至道之美與三五比崇億載之祚随天地長乆雖使桑榖為妖龍蛇作孽雉雊於鼎耳石言於晉地猶當轉禍為福變咎為祥况水雨之患隂陽恒理豈可謂之天譴而繫聖心哉臣聞古人有言農夫勞而君子飬焉愚者言而智者擇焉輙陳狂瞽伏待斧鉞論敎本書元稹某年日月臣稹再拜獻書皇帝陛下臣伏見陛下降明詔脩廢學増胄子選司成大哉堯之為君伯夷典禮䕫教胄子之深㫖也然而事有萬萬於此者敢昧死而言之臣聞諸賈生曰三代之君仁且久者教之然也誠哉是言且夫周成王人之中也近管蔡則讒入親周召則義聞豈可謂夫明哉然而克終於道者得不謂教之然邪始其為太子也未生胎教既生保敎太公為之師周公為之傳召公為之保伯禽唐叔與之游禮樂詩書為之翫目不得閲滛艶妖誘之色耳不得聞優笑陵亂之聲口不得習操斷擊搏之書居不得近容隂順邪之黨游不得恣追禽戮獸之樂翫不得愛遐異僻絶之珍凡此數者非謂備之於前而不為也亦将不得見之矣及其長而為君也血氣既定游習既成雖有放心快己之事日陳於前固不得奪已成之習已定之心矣則彼忠直道徳之言固吾之所習聞也陳之者有以論焉回佞庸違之說固吾之所積懼也諂之者有以辯焉人情之莫不欲耀其所能而黨其所近苟将得志則必快其所藴矣物之性亦然是以魚得水而游馬逸駕而走鳥得風而翔火得薪而熾此皆物之快其所藴也今夫成王所藴道徳也所近聖賢也是以舉其近則周公左而召公右伯禽魯而太公齊快其藴則興禮樂而朝諸候措刑罰而美敎化之至也可不謂信然哉及夫秦則不然滅先王之學曰将以愚天下黜師保之位曰将以明君臣胡亥之生也詩書不得聞聖賢不得近彼趙髙者詐宦之戮人也而傅之以殘忍戕賊之術且曰恣睢天下以為貴莫見其面以為尊是以天下之人未盡愚而亥固已不能分獸畜矣趙高之威懾天下而胡亥固已自幽於深宫矣彼李斯者秦之寵丞相也困讒寃死無所自明而况於踈逺之臣庶乎若然則秦之亡有以致之也漢髙承之以兵革漢文守之以亷謹卒不能蘓復大訓是以景武昭宣天質甚羙纔可免禍亂哀平之間則不能虞篡弑矣然而惠帝廢易之際猶頼羽翼以勝其邪心是後有國之君議敎化者莫不以興㢘舉孝設學從儒為意曾不知敎化之不行自貴者始略其貴者敎其賤者無乃鄰于倒置乎洎我太宗文皇帝之在藩邸以至于為太子也選知道徳者十八人與之游習即位之後雖燕游飲食之間十八人者實在其中上失無不言下情無不逹不四三年而名髙盛古豈一日二日而致是乎游習之漸也貞觀已還師傅之官皆宰相兼領其餘官寮選亦甚重馬周以位髙恨不得為司議郎此其騐也文皇之後漸踈賤之至母后臨朝翦棄王族當中睿二聖勞勤之際雖有骨鯁敢言之士既不得在調䕶保安之職終不能措扶衞之一詞而令匠胡安金藏剖腹以明之豈不大哀哉兵興以來兹弊尤甚師資保傅之官非疾廢眊瞶不任事者為之即休戎罷帥不知書者䖏之至於友諭賛議之徒踈冗散賤之甚者搢紳恥之夫以匹士之愛其子者猶求明哲慈惠之師以敎之直諒多聞之友以輔之豈天下之元子而可以疾廢眊瞶不知書者為之師踈冗散賤不適用者為之友乎此何反上古之甚也近制官僚之外往往以沈滯僻老之儒充直講侍讀之選而又踈棄斥逺之越月踰時不得召見彼又安能傅成道徳而保飬其躬哉臣以為積此弊者豈不以皇天眷祐祚我唐徳以舜生舜以堯繼堯傳陛下十一聖矣莫不生而神明長而仁聖以是為屑屑習儀者故不之省耳臣獨以為於列聖之謀則可也計無窮之業傳後嗣則不可脱或萬代之後若有周成王之中才而又生深宫優笑之間無周召保助之敎将不能知喜怒哀樂之所自矣況稼穡之艱難乎今陛下以上聖之姿肇臨海内是天下人人傾耳注心之日也特願陛下思成王訓導之功念文皇㳺習之漸選重師保慎簡宫寮皆用博厚𢎞深之儒而又練逹機務者更進送見日就月将因令皇太子聚諸生定齒胄講業之儀行問道嚴師之禮至徳要道以成之撤膳記過以警之血氣未定則輟禽色之娛以就學聖質既備則資㳺習以𢎞徳此所謂一人元良萬方以貞之化也豈其修廢學選司成而足倫匹其盛哉而又俾則百王莫不㓜同師長同術識君道之素定知天倫之自然然後選用賢良樹為藩屏出則有晉鄭魯衞之盛人則有東牟朱虛之强蓋所謂宗子維城犬牙盤石之勢也又豈與夫魏晉已䧏因賤其兄弟而自翦其本枝者同年而語乎㣲臣竊思為陛下建永永無窮之長筭輙敢冐昧死誅而言之臣稹謹言請修太學書李觀草莾賤臣某再拜上言臣伏思太學之為道也厥惟大哉實所徳宇於國家敎源於萬方辨齊於人倫親親而尊尊誠宜嵗勅崇􅃊日致肅祗工度木不俟于榱桷崩朝命官取偁乎師氏當然後可以陳四代之禮禮興無窮之風開素王之堂削青衿之篇人􅅷㢘隅俗捐諍端天下之仁人相則焉是以徳由此澤敎由此流若水之潤下浲涌植物利不浩哉今覩斯壊甚不然乎在昔學有六舘居類其業生有三千盛侔於古近秊禍難寖用耗息陛下君臨宿弊尚在執事之臣顧為不急升當學之徒罔敢上逹積微成慝超稔歴紀賤臣極言誠合要道具六舘之目其曰國子太學四門書律筭等今存者三亡者三亡者職由厥司存者恐不逮修輿人有棄本之議羣生有将壓之虞至有愽士助敎鋤犂其中播五稼于}
