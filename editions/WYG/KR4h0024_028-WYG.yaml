body:
  text: 表奏書䟽戊揔十三首復位一請則天皇后復位於皇子䟽蘓安恒去濫賞六請减去濫食封邑䟽韋嗣立論職官多濫䟽請選舉擇賢才䟽薛登條奏貢舉䟽楊綰議楊綰條奏貢舉旈賈至諫髙祖不以伶人為近侍䟽李網去濫刑三諫除濫刑疏朱敬則論刑法多濫䟽韋嗣立請不改反逆縁坐名名䟽崔仁師彈奏二彈李義府䟽王義方彈義成軍師節度使李聼䟽周太𤣥誅戮一誅誅程元振䟽栁伉請則天皇后復位於皇太子䟽蘓安恒臣聞忠臣不順時而取寵烈士不惜死而偷生故君道不明者忠臣之過歟臣道不軌者烈士之過歟昔者先皇宴駕留其顧託将以萬務殷廣令陛下兼知政事雖唐堯虞舜居其位而共工伯鯀在其朝間陛下骨血之恩阻陛下母子之愛愚臣謂聖情以運祚将衰極斯大節天下之人謂陛下微弱李氏貪天之功何以年在耄倦而不能復子明辟使忠言莫進姦佞成朋夷狄紛擾屠害黎庶陛下雖納隍興念亦何能救此生靈臣聞天下者神堯文皇之天下也昔有隋失馭小人道長羣雄駭鹿四海瞻烏皇唐親事戎旃鳯翔參野削平㝢縣龍飛踐極歃血為盟指河為誓非李氏不王非功臣不封陛下雖居正統實因唐氏舊基故詩曰惟鵲有巢惟鳩居之此言雖小可以喻大陛下自坤生徳乘乾作主豈不以上符天意下順人心東宫昔在諒陰相王又非長子陛下恐宗祀中絶所以應其謳歌當今太子追迴年徳俱盛陛下貪其寳位而忘母子深恩臣聞京邑翼翼四方所視陛下蔽太子之元良枉太子之神器何以敎天下母慈子孝焉何能使天下移風易俗焉惟陛下思之将何聖顔以見唐家宗廟将何誥命以謁大帝墳陵陛下何故日夜積憂不知鐘鳴漏盡臣愚以為天意人事還歸李家陛下雖安天位殊不知物極則反器滿則傾故語曰當斷不斷反受其亂此之謂也陛下不如髙揖樞務自怡聖躬命史臣以書之令樂府以歌之斯亦太平之盛事也臣聞見過不諫非忠臣也畏死不言非勇士也臣何惜一朝之命而不安萬乗之國哉故曰苟利國家雖死可矣願陛下暫輟萬務詳臣愚見陛下若以臣為忠則從諫如流擇是而用若以臣為不忠則斬取臣頭以令天下請減去濫食封邑䟽韋嗣立臣聞國無九年之儲家無三年之蓄家非其家國非其國也故知立國立家皆資於儲蓄也夫水旱之災關之隂陽運數非人智力所能及也堯遭大水湯遭大旱則知仁聖之君亦所不免當此時百姓不至於困弊者有積也今陛下倉庫之内比稍空竭尋常用度不支一年儻有水旱人須賑給徵發時動兵要資裝則将何以備之其縁倉庫不實妨於政化者觸類而是臣竊見食封之家其數甚衆昨略問户部云用六十餘萬丁一丁兩匹即是一百二十萬已上匹臣頃在太府知每年庸調絹數多不過百萬少則七八十萬以來比諸封家所入全少儻有蟲霜旱潦曾不半在國家支供何以取給臣聞自封茅土裂山河皆須業著經綸功申草昧然後配宗廟之享承帶礪之恩皇運之初功臣共定天下當時食封纔只三二十家今以尋常特恩遂至百家已上國家租賦大半私門則資用有餘國家則支計不足有餘則或致奢僣不足則坐致憂危制國之方豈謂為得封户之物諸家自徵或是官典或是奴僕多挾勢逞威陵突州縣凡是封户不勝侵漁或輸物多索裹頭或相知要取中物百姓怨歎遠近共知復有因將貨易轉更生舉徴打紛紛曾不寧息貧乏百姓何以克堪若必限丁物送太府封家但於左藏請受不得輙自徴催則必免侵漁人兾蘇息論職官多濫䟽韋嗣立臣聞設官分職量才置吏此本於理人而務安之也故書曰在知人在安民知人則哲能官人安民則惠黎民懐之能哲而惠何憂乎驩兠何畏乎有苖者是也則明官得其人而天下自理矣古者取人必先採鄉曲之譽然後辟於州郡州郡有聲然後辟於五府才著五府然後升之天朝此則用一人所擇者甚悉擢一士所厯者甚深子産曰譬有美錦不使人學製之此明用人不可不審擇也用得其才則治非其才則亂治亂所繫焉可不深擇之哉今之取人有異此道多未甚試效即頓至遷擢夫競趨者人之常情僥倖者人之所趣而今務進不避僥倖者接踵比肩布於文武之列有文者用理内外則有回邪贓汚上下敗亂之憂有武者用將軍戎則有庸懦怯弱師旅喪亡之患補授無限貟闕不供遂至員外置官數倍正闕曹署典吏困於祗承府庫倉儲竭於資俸國家大事豈甚於此古者懸爵待士唯有才者得之若任以無才則有才之路塞賢人君子所以遁跡銷聲常懐歎恨者也且賢人君子守於正直之道遠於僥倖之門若僥倖開則賢者不可復出矣賢者遂退若欲求人安化洽復不可得也人若不安國將危矣陛下安可不深慮之請選舉擇賢才䟽薛登臣聞國以得賢為寳臣以舉士為忠是以子皮之讓國僑鮑叔之推管仲燕昭委兵於樂毅苻堅託政於王猛子産受國人之謗夷吾貪共賈之財昭王錫路馬以止䜛永固戮樊世以除譖處猜嫌而益信行間毁而無疑此由黙而識之委而察之深也至若宰我見愚於宣尼逢萌被知於文叔韓信無聞於項氏毛遂不齒於平原此失士之故也是以人主受不肖之士則政乖得賢良之佐則時㤗故堯資八元而庶績其理周任十亂而天下和平由是言之則知士不可不察而官不可妄授也何者比來舉薦多不以才假譽馳聲互相推奨希潤身之小計忘臣子之大猷非所以報國求賢副陛下翹翹之望者也臣竊窺古之取士實異於今先觀名行之源考其鄉邑之譽崇禮讓以勵已明節義以標信以敦朴為先最以雕蟲為後科故人崇勸讓之風士去輕浮之行希仕者必修貞確不㧞之操行難進易退之規衆議以定其高下郡將難誣於曲直故計貢之賢愚即州將之榮辱穢行之彰露亦鄉人之厚顔是以李陵降而隴西慙干木隱而西河美故名勝於利則小人之道消利勝於名則貪暴之風扇是知化俗之本須擯輕浮昔兾缺以禮讓升朝則晉人知禮文翁以儒林奨俗則蜀士多儒燕昭好馬則駿馬來庭葉公好龍則真龍入室由是言之未有上之所好而下不從其化者也自七國之季雖雜從横而漢代求才猶徴百行是以禮節之士敏德自修閭里推高然後為府寺所辟魏氏取人尤愛放逹晉宋之後秖重門資為奬人求官之風乖授職惟賢之義有梁薦士雅愛屬辭陳氏簡賢特珍賦詠故其俗以詩酒為重不以修身為務逮至隋室餘風尚存開皇中李諤論之於文帝曰魏之三祖更好文辭忽君人之大道好雕蟲之小藝連篇累牘不出月露之形積案盈箱唯是風雲之狀代俗以此相高朝廷以兹擢士故文筆日繁其政日亂帝納李諤之策由是下制禁斷文筆浮辭其年泗州刺史司馬㓜之以表不典實得罪於是風俗改勵政化大行煬帝嗣興又變前法置進士等科於是後主之徒復相放傚因陋就寡赴速邀時緝綴小文名之䇿學不以指實為本而以浮虛為貴有唐纂厯雖漸革於前非陛下君臨思察才於共理樹本崇化唯在旌賢今之舉人有乖茂實鄉議決小人之筆行修無長者之論䇿第喧競於州府祈恩不勝於拜伏或明制䜛出試遣搜􅆒驅馳府寺之門出入王公之第上啓陳詩唯希咳唾之澤摩頂至足兾荷提攜之恩故俗號舉人皆稱覔舉覔為自求之稱未是人知之辭察其行而度其材則人品於兹見矣徇已之心切則至公之理乖貪仕之性彰則亷潔之風薄是知府命雖高異叔度勤勤之讓黄門已貴無秦嘉耿耿之辭縱不能挹已推賢亦不肯待於三命豈與夫白駒皎皎不雜風塵束帛戔戔榮高物表校量其廣狹也是以耿介之士羞自㧞而致其辭循常之人舍其踈而取其附故選司補署諠然於禮闈州貢賔王紛諍於階闥謗議雜合浸以成風夫競榮者必有競利之心謙遜者亦無貪賄之累自非上智焉能不移在於中人理由習俗若重謹厚之士則懐禄者必崇德以潔已若開趨競之門則邀仕者皆戚施而附㑹附㑹則百姓罹其弊潔已則兆庶䝉其福故風化之漸靡不由兹今訪鄉閭之談唯秖歸於里正縱使名虧禮則罪挂刑章或冐籍以偷資或邀勲而竊級假其不義之賂則是無犯鄉閭豈得比郭有道之銓量茅容望重裴逸人之賞㧞夏統名高語其優劣也秖如才應經邦之流唯令試䇿武能制敵之例秖驗彎弧若其文擅清竒便充甲第藻思微減旋即告歸以此收人恐乖事實何者樂廣假筆於潘岳靈運辭高於穆之平津文劣於長卿子建筆麗於荀彧若以射䇿為最則潘謝曹馬必居孫樂之右若使恊贊機猷則安仁靈運亦無禆附之益由此言之不可一槩而取也至如武藝則趙雲雖勇資諸葛之指撝周勃雖雄乏陳平之計略使樊噲居蕭何之任必無指蹤之機使蕭何入戱下之軍亦無免主之效鬬將長於摧鋒謀將審於料事是以文淵聚米知隗囂之可圖陳湯屈指識烏孫之自解八難之謀設高祖追慙於酈生九拒之計窮公輸息心於伐宋謀將不長於弓馬良將寧資於射䇿豈與夫元長自表妄飾辭鋒曹植題章虛飛麗藻校量其可否也伏願陛下降明制頒峻科千里一賢尚不為少僥倖冐進須立隄防斷浮虛之飾辭收實用之良䇿不取無稽之說必求忠讜之言文則試以效官武則令其守禦始既察言觀行中亦循名責實自然僥倖濫吹之伍無所藏其妄庸故晏嬰云舉之以語考之以事寡其言而多其行拙於文而工於事此取人得賢之道也其有武藝超絶文鋒挺秀有效技之褊用無經國之大才為軍鋒之爪牙作辭賦之標凖自可試凌雲之䇿練穿札之工承上命而賦甘泉禀中軍而令赴敵既有隨才之任必無負乘之憂臣謹按呉起臨戰左右進劍呉子曰夫提鼔揮桴臨難決疑此將事也一劔之任非將事也謹按諸葛亮臨戎不親戎服頓蜀兵於渭南宣王持勁卒不敢當此豈弓矢之用也謹按楊德意誦長卿之文武帝曰恨不得與此人同時及相如至終於文園令不以公卿之位處之者蓋非其所任故也謹案漢法所舉之主終身保任揚雄之坐田議責其冐薦成子之居魏相酬於得賢賞罰之令行則請謁之心絶退讓之義著則貪競之路銷自然朝廷無爭禄之人選司有撝謙之士仍請寛立年限容其採訪簡汰堪用者令其試守以觀能否叅驗行事以别是非不實免王丹之官得人加翟璜之賞自然見賢不隱食禄不專則荀彧進鍾繇郭嘉劉陶薦李膺朱穆勢不云遠有稱職者受薦賢之賞濫舉者抵欺罔之罪自然舉得賢行則君子之道長矣條奏貢舉䟽楊綰國之選士必籍賢良蓋取孝友純備言行敦實居常育德動不違仁體忠信之資履謙恭之操藏器則未嘗自伐虛心而所應必誠夫如是故能率已從政化人鎮俗者也自叔世澆詐兹道􅐛微爭尚文辭互相矜衒馬卿浮薄竟不偶於任用趙壹虛誕終取擯於鄉閭自時厥後其道彌盛不思實行皆徇空名敗俗傷教備載前史古人比文章於鄭衛蓋有由也近煬帝始置進士之科當時猶試䇿而已至高祖朝劉思立為考功貟外郎又奏進士加雜文明經加帖經從此積弊􅐛而成俗㓜能就學皆誦當代之詩長而慱文不越諸家之集遞相黨與用致虛聲六經則未嘗開巻三史則皆同挂壁况復徴以孔門之道責其君子之儒者哉祖習既深奔競為務矜藝者曾無愧色勇進者但欲凌人以毁讟為常談以向背為己任投刺干謁驅馳於要津露才揚已喧騰於當代古之賢良方正豈有如此者乎朝之公卿以此待士家之長老以此埀訓欲其返淳朴懐禮讓守忠信識亷隅何可得也譬之於水其流已濁若不澄本何當復清方今聖德御天再寧寰宇四海之内顒顒向化皆延頸舉踵思聖朝之理也不以此事而理之則太平之政又乖矣凡國之大柄莫不先擇下臣古先哲后皆側席待賢今之取人令将牒自舉非經國之體也望請依古制縣令察孝亷審知在鄉閭有孝悌及信義亷恥之行加以經業才堪䇿試者以孝亷為名薦之於州刺史當以禮待之試其所通之學其通者送名於省自縣至省不得令舉人輙自陳牒比來有到狀保辨識牒等一切並停其所習經左傳公羊榖梁禮記周禮儀禮尚書毛詩周易任通一經務取深義奥㫖通諸家之義試日差諸司官有儒學者對問毎經問義十條問畢對䇿三道其䇿皆問古今理體及當時要務取堪行用者其經義并䇿全通為上第望付吏部便與官其經義通八䇿通二為中第與出身下第罷歸其明經比試帖經例非古義皆誦帖括兾圖僥倖并近有道舉亦非理國之體望請與明經進士並停其國子監舉人亦請准此如有行業不著所由妄相推薦請量加貶黜所兾數年之間人倫一變既歸實學當識大猷居家者自修德業從政者皆知亷恥浮競自止敦龎自勸教人之本實在兹焉事若施行即别立條例詔左右丞諸司侍郎御史大夫中丞給舍同議聞奏議楊綰條奏貢舉䟽賈至謹按夏之政尚忠殷之政尚敬周之政尚文然則文與忠敬皆統人之行也且夫述行美極人文人文興則忠敬存焉是故前代以文取士本文行也由辭以觀行則及辭也宣父稱顔子不遷怒不貳過謂之好學至乎修春秋則游夏之徒不能措一辭不亦明乎間者禮部取人有乖斯義易曰觀乎人文以化成天下關睢之義曰先王以是經夫婦成孝敬厚人道美教化移風俗蓋王政之所由廢興也故延陵聽樂知諸侯之存亡今試學者以帖字為精通而不窮旨義豈能知遷怒貳過之道乎考文者以聲病為是非而務澤浮豔豈能知移風易俗化天下之事乎是以上失其源而下襲其流乘流波蕩不知所止先王之道莫能行也夫先王之道消則小人之道長小人之道長則亂臣賊子由是生焉臣弑其君子弑其父非一朝一夕之故其所來者漸矣漸者何謂志信之陵頽恥尚之失所末學之馳騁儒道之不舉四者皆由取士之失也夫一國之事繫一人之本謂之風賛揚其風繫卿大夫也卿大夫何常不出於士乎今取士試之小道而不以逺者大者使干禄之徒趨馳末術是誘導之差也夫以蝸蚓之餌雜埀滄海而望呑舟之魚至不亦難乎所以食埀餌者皆小魚就科目者皆小藝四人之業士最關於風化近代趨仕靡然向風致使禄山一呼而四海震蕩思明再亂而十年不復向使禮讓之道𢎞仁義之風著則忠臣孝子比屋可封逆節不得而萌也人心不得而摇也且夏有天下四百載禹之道喪而殷始興焉殷有天下六百祀湯之法棄而周始興焉周有天下八百年文武之政廢而秦始并焉觀三代之選士任賢皆考實行故能風俗淳一運祚長逺秦坑儒士二代而亡漢興雜三代之政𢎞四科之舉西京始振經術之學東都終持名節之行至有近戚竊位强臣擅權弱主孤立母后專政而社稷不隕終彼四百豈非學行扇化於鄉里哉厥後文章道弊尚於浮侈取士術異苟濟一時自魏至隋僅四百載三光分景九州阻域竊號僣位德義不修是以子孫速顛享國咸促國家革魏晉梁隋之弊承夏殷周漢之業四隩既宅九州攸同覆燾亭育合德天地安有捨皇王舉士之道蹤亂代取人之術此公卿大夫之辱也楊綰所奏實為正論然自典午覆敗中原版蕩戎狄亂華衣冠遷徙南北分裂人多僑處聖朝一平區宇尚復因循版圖則張閭井未設士居鄉土百無一二因縁官族所在耕築地望繫之數百年之外而身皆東西南北之人焉今欲依古制鄉舉里選猶恐取士之未盡也請兼廣學校以𢎞訓誘今兩京有太學州縣有小學兵革一動生徒流離儒臣師氏禄廩無向貢士不稱行實胄子何嘗講習獨禮部每歳擢甲乙之第謂𢎞奨擢不甚謬哉秖足長浮薄之風啓僥倖之路矣其國子慱士等望加貟數厚其禄秩選通儒碩生閒居其職十道大郡量置太學館令慱士出外兼領郡官召置生徒依乎故事保桑梓者鄉里舉焉在流寓者庠序推焉朝而行之夕見其效如此則青青不復興刺擾擾由其歸本矣人倫之始王化之先不是過也諌高祖不以伶人為近侍䟽李綱臣按周禮均工樂官不得厠於仕伍雖復才如子野妙等師襄皆身終子繼不易其業故魏武使禰衡擊鼔衡先觧朝服露體而擊之云不敢以先王法服為伶人之衣惟齊高緯封曹妙逹為王授安馬駒為開府既招物議大斁彞倫有國有家者以為殷鑒方今新定天下開太平之業起義功臣行賞未徧高才碩學猶滯草萊而先令舞胡致位五品鳴玉曵組趨馳廊廡故非創業垂統貽則子孫之道也諌除濫刑䟽朱敬則臣聞李斯之相秦也行申商之法重刑名之家杜私門張公室棄無用之費損不急之官惜日愛功疾耕急戰人繁國富乃屠諸侯此救弊之術也故曰刻薄可施於進趨變詐可陳於攻戰兵猶火也不戢將自焚况鋒鏑已銷石城又毁諒可易之以寛泰潤之以淳和八風之樂以柔之三代之禮以導之秦既不然滛虐滋甚徃而不返卒至土崩此不知變之禍也陸賈叔孫通之事漢王也當滎陽成臯之間糧饋已窮智勇俱困不敢開一說效一竒惟進豪猾之才薦貪暴之客及區宇適平干戈向戢金鼔之聲未歇傷痍之痛尚聞二子顧盻綽有餘態及陳詩書說禮樂開王道謀帝圖高皇帝忿曰吾以馬上得之安事詩書乎對曰馬上得之可馬上理之乎高皇黙然於是陸賈著新語叔孫通定禮儀始知天子之尊此知變之善也向使高皇排二子而不教置詩書而不顧重攻戰之吏尊首級之材複道爭功張良已知其變拔劔擊柱吾屬不得無謀即晷漏難逾何二十帝乎亡秦是續何二百年乎故曰仁義者聖人之蘧廬禮經者先王之陳迹然則祝辭向畢芻狗須投淳精已流糟粕可棄仁義尚捨況輕此者乎自文明草昧天地屯蒙二叔流言四凶構難不設鉤距無以應天順人不切刑名不可摧姦息暴故置神器開吉端曲直之影必呈包藏之心盡露神道助直無罪不除人心保寧無妖不戮以兹妙筭窮造化之幽深用此神謀入天人之祕術故能計不下席聽不出闈蒼生晏然紫宸易主大哉偉哉無得而稱也豈比造攻鳴條大戰牧野血變草木頭折不周可同年而語乎然而急趨無善迹促柱少和聲拯溺不規行療飢非鼎食即向時之妙䇿乃當今之芻狗也伏願覽秦漢之得失考時事之合宜審糟粕之可遺覺蘧廬之須毁見機而作豈勞終日乎陛下必不可偃蹇太平徘徊中路伏願改法制立章程下恬愉之辭流曠蕩之澤斷萋菲之牙角頓姦險之鋒芒塞羅織之源掃朋黨之迹使天下蒼生坦然大恱豈不樂哉論刑法多濫䟽韋嗣立臣竊甞聞之在堯舜之日畫其衣冠當文景之時幾致刑措厯兹千載以為美談臣伏惟陛下睿哲欽明窮神知化自軒昊以降莫之與京獨有徃之論法或未盡善皆由主司姦兇惑亂視聽尋而陛下聖察具詳之矣然竟未能明其本源察其前事今天下萬姓識陛下本心尚使四海多銜寃之人九泉有抱痛之鬼臣誠愚暗不識大綱請為陛下始末而言其事楊豫之後刑獄漸興用法之伍務於窮竟連坐相牽數年不絶遂使巨姦大猾伺隙乗間内包犲狼之心外示鷹鸇之跡隂圖潛結共相影㑹構似是之言成不赦之罪皆深為巧誣恣行楚毒人不勝痛便乞自誣公卿士庶連頸受戮道路籍籍雖知非辜而鍜錬已成辯占皆合縱臯陶為理于公定刑則謂汚宫毁柩猶未塞責雖陛下仁慈哀念恤獄緩死及覽辭狀便已周密皆謂勘鞫得情是其實犯雖欲寛捨其如法何於是小乃身誅大則族滅相縁共坐者不可勝言此豈宿搆讎嫌將申報復皆圖苟成功效自求官賞當時稱傳謂為羅織其中䧟刑得罪者雖有敏識通才被告言者便遭枉抑心徒痛其怨酷口莫能以自明或受誅夷或遭殛竄並甘心引分赴之如歸故知弄法侮文傷人實甚賴陛下特迴聖察昭然詳䆒周興丘勣之類𢎞義俊臣之徒皆相次伏誅事暴遐邇而朝野慶泰若再覩陽和且如仁傑元忠俱罹枉䧟被勘鞫之際亦皆已自誣向非陛下至明垂以省察則葅醢之戮已及其身欲望輸忠聖代安可復得陛下擢而升之各為良輔國之棟榦稱此二人何乃前非而後是哉誠由枉䧟與甄明耳臣但恐徃之得罪者多並皆此流則向時之流其數甚衆昔殺一孝婦尚或降災而濫者蓋多寧無怨氣怨氣上逹則水旱所興欲望歳登不可得也陛下儻𢎞天地之大德施雷雨之深仁歸罪於削刻之徒降恩於枉濫之伍自垂拱已來大辟罪已下常赦所不原者罪無輕重一皆原洗被以昭蘇伏法之輩追還官爵緣累之徒普霑恩造如此則天下皆知比所䧟罪元非陛下之意咸是虐吏之辜幽明歡欣則感通和氣和氣下降則風雨以時風雨以時則五榖豐稔歳既稔矣人亦安矣太平之美亦何逺哉伏願陛下深察請不改反逆縁坐刑名䟽崔仁師自昔羲農以降爰及唐虞或設言而人不犯或畫像而下知禁三代之盛泣辜解網父子兄弟罪不相及咸臻至理俱為稱首及其叔代亂獄滋繁周之季年不勝其弊烈火原於子産峭澗起於安于韓季申商爭持急刻叅夷相坐始於此也秦用其法遂至土崩漢高之務寛大未為盡善文帝之存仁厚仍多涼徳遂使新垣族滅信越葅醢見嗤良史謂之過刑晉魏至隋雖有損益凝脂猶密秋荼尚煩皇上爰發至仁念兹刑憲酌前王之令典採徃哲之嘉猷革弊蠲苛可大可乆仍降綸綍頒之九區故得斷獄數簡手足有措刑清化治未有不安忽以暴秦酷法為隆周中典􅆾惻隱之情反惟行之令進退叅詳未見其可且父子天屬昆季同氣誅其父子足累其心此而不顧何愛兄弟既欲改法請更審量彈李義府䟽王義方義府擅殺寺丞陛下雖已釋放臣不應更有鞫劾然天子置三公九卿二十七大夫八十一元士本欲水火相濟鹽梅相成然後庶績咸熈風雨交泰則知人主不得獨謂皆由聖㫖昔唐堯至聖失之於四兇漢祖深仁失之於陳豨光武聦明寛恕失之於逢萌魏武勇略英雄失之於張邈此並英傑之主莫不失之於前得之於後陛下繼聖撫有萬邦蠻陬夷落猶懼刑網況輦轂咫尺姦臣肆虐殺一六品寺丞足使忠臣抗憤義士扼腕縱令正義自取絞縊此事彌不可容便是畏義府之權勢能殺身以滅口此則生殺之威上非主出賞罰之柄下移姦回臣聞履霜堅冰積小成大請乞重勘當畢正義致死之由雪寃氣於幽泉誅姦臣於白日對仗叱義府不退義方三叱上既無言義府趨出義方乃讀彈文曰義府善柔成性佞媚為心昔事馬周分桃見寵後交劉洎割䄂承恩生其羽翼長其光價因縁際㑹遂階通逹不能盡忠端節對敭王休䇿蹇勵駑祗奉皇眷而反慿附城社蔽虧日月請託公行交遊羣小貪冶容之好原有罪之淳于恐漏洩其謀殞無辜之正義雖挾山超海之力望此猶輕迴天轉日之威方斯更劣此如可恕孰不可容金風戒節玉露啓途霜簡與秋典共清忠臣將鷹鸇並擊請除君側少答鴻私碎首玉階庶明臣節伏請付法推斷以申典憲彈義成軍節度使李聽䟽周太𤣥臣聞賞罰不明無以示天下是非一貫無能建大中臣竊見義成軍節度使李聽位極寵榮心無報效朝廷資其承籍委以統戎俾代憲誠付之雄鎮揔三萬貔貅之衆兼兩藩節制之權兾其俯安危疑上副恩遇况陛下授以神筭假以天威入魏之期剋日先定而李聽擁旄觀望按甲遷延熒惑人事逗撓軍政遂使憲誠䧟於屠戮亂衆肆其姦兇由是六郡無依全師喪敗委貝州而不守燒劫無遺望棧口而疾馳狼狽就道自圖苟免不憚包羞蔑棄朝章有同兒戱魏州之亂職聽之由論其負恩萬死猶幸伏以封常清河南失律斬於關門高霞寓唐鄧破傷投諸遐裔渾鎬節制易定苦戰而兵力不支袁滋逗留西川欲進而兇渠尚在或親當矢石或躬履艱危勢屈賊鋒竟申朝典未甞貸法必振皇威今李聽罪惡流聞中外憤惋比之常清等軰萬萬過之若陛下猶視含𢎞不寘極法臣等恐憲章墜地天下寒心伏望付之法司以正刑典請誅程元振䟽柳伉臣出身事君忝備近密夙有志願銘之在心若遭艱危必死王事當今日之際是臣死之秋將死之言庶禆萬一特乞陛下少垂聽覽則甘就鼎鑊且天生四夷皆習戰鬬輕走易北獨有犬戎數萬之師犯關度隴歴秦渭牧邠涇曽不血刄直至城闕館穀尚有三載緜地數踰千里謀臣不為陛下陳一言武士不為陛下效一戰各攜卒伍剽劫閭閻汗辱宫闈燒焚陵寢者何故此將帥之心叛陛下也自朝義東滅迴紇北歸陛下以為智力所能神明所賛委權近貴失意元勲日引月長浸成大禍陛下侍臣載路多士盈庭竟無一人折檻牽裾犯顔迴慮至使北捐汾浦西失秦川者何故此公卿之心叛陛下也陛下出城之日鑾駕未動京師百姓劫奪府庫城外百姓更相殺戮者何故此三輔之心叛陛下也自九月二十八日聞有警急十月一日下詔徴兵至今凡四十日矣天下兵一人不至何故此四海之心叛陛下也近自京輔逺至海隅文武百寮志皆離叛雖有朝恩戮力陜郡堅城陛下獨能長守社稷乎今臣所言四者皆叛陛下以為虛耶實邪若以為實陛下以今日之事為安邪危邪若以為危陛下豈得高枕而卧不決大計臣聞良醫之療病也必審觀病源當病授藥若不當病療之無益陛下知今日之病何因至此臣實知之請言其故何者天下之心皆恨陛下不練士卒踈逺賢良委任宦官離間將相以至於此陛下必欲救今日之急存宗廟社稷即請斬元振之首懸示天下盡出内使配隸諸州以朝恩勲勞留在左右仍以神䇿兵馬廽付漢官使朝臣百寮每日坐議左右使令盡用文武然後大下明詔削去尊號引過歸已深自刻責誓與下寮将相率德勵行後宫嬪妃且移别院與宰相已下晝夜論政下詔云若天下勲臣知予自新許予改過即召募將士來赴朝廷若以為舊惡未悛修身有闕則帝王大器敢妨聖賢聽天下所徃也陛下若納臣此言行臣所請一月之内天下兵馬若不雲集闕下臣請闔門寸斬以謝陛下伏乞陛下讀臣此表一二十徧親與朝廷商量事若可行則自處置不用露臣此表臣今日上表即知萬死但願行之死無所恨陛下若違臣所請更無長䇿社稷重事伏惟陛下審圖之唐文粹巻二十八欽定四庫全書唐文粹卷二十九宋姚鉉編表奏書䟽已
