body:
  text: 吳興姚鉉纂銘丁誄表𫐠附緫一十二首庶官七唐吏部尚書諸道鹽鐡轉運使李公墓誌銘權德輿唐吏部侍郎贈禮部尙書昌黎韓先生墓誌銘皇甫湜唐工部貟外郎杜甫墓誌銘元稹唐監察御史周公墓碣銘柳宗元唐太學博士施先生墓誌銘韓愈唐著作郎贈秘書少監權君墓表附李華唐太子校書李元賔墓誌銘韓愈牧守四柳子厚墓誌銘韓愈吕衡州誄附柳宗元左黃州表附元結陸歙州述附李翺賢宰一元魯山墓碣銘李華唐故銀青光禄大夫守吏部尚書兼御史大夫充諸道鹽鐡轉運等使上柱國趙郡開國公贈尚書右僕射李公墓誌銘并序權德輿惟元和四年夏五月丁卯冡宰趙郡公巽寢疾薨于永崇里享年六十三天子憫然不視朝追命右僕射冬十月乙酉返葬于洛師緱氏縣芝田郷之大墓公字令叔趙郡賛皇人曽祖知讓皇河南府長水縣主簿祖承胤江州别駕贈太府少卿父嶷右武衛録事叅軍飾終四加至尚書右僕射世載德善至公昌大始以明經筮仕爲華州叅軍試言超絶補鄠縣尉登朝爲監察御史殿中侍御史由美原縣令課最爲刑部貟外郎由萬年縣今課最爲戸部左司二郎中由常州刺史理行第一徴爲給事中以御史中丞領潭州刺史湖南觀察使就加右散騎常侍以右散騎常侍領洪州刺史江西觀察使就加御史大夫由二府報政入爲兵部侍郎在途加度支鹽鐡副使至止踰月代今司徒爲使明年遷兵部尚書閒一歲轉吏部尚書揔八柄平九賦左右理道以紓元元天子方推心竦意倚以爲相奄然大病斯可痛也公温重方嚴愷悌忠清得洪範之正直稟大雅之明哲强志特立爲儒門吏師中臺草議左曹還詔法程之下無尤違分畫之下無差失其爲二方循班制建長利布以休龢樹之風聲大凡都府歲杪使刻深吏周行支郡鈎撫泉貨二千石不相聊生如梏拲然公至分命部從事覽觀禮俗問人疾苦廉吏善否而巳至有經用之羨使郡自爲理得以蠲乏用補庸亡府無私焉四履之内遇凶旱水溢損有餘以均不足農里無大乏官司無宿憂而邦郷碩生勸學講藝導彼輕僄率循教化皆聲詩揭于康莊其制國用也調盈虚御輕重阜齊人之業而地不加賦佐公家之急而利無所渫先是池澤之稅因緑爲奸牢盆以私幣貨寖濫公則去一朝之便質終歲之成變其苦窳以寛物力盈入之數不可勝條上嗣位之歲發武庫禁兵以誅劉闢三蜀之饋不乏於軍千金之費不征於人揚天聲於井絡斷戎首於齊斧是皆謀猷大績經理大本豈止於漢庭桑大夫耿中丞區區然商功利㭊秋毫而巳哉其爲天官巳嬰寢患猶與郎吏切劘奏書去繳繞之科禁絶私回於胥吏士之得調者多受賜焉内外掃除之際精爽不亂與上言軄業雖康寧宴間之不若君子以爲難自解巾褐至捐館舍凡歷官十六利刃觸虚大車以載文理聦明卓冠出倫規爲密靜矩度章灼大吏之所表的諸公之所嚴重其文采精實循道體要而不爲曼辭其術學博洽折中定疑而不理章句喜士尊賢開懷盍簪絲桐博弈談笑嗢噱毎有餘𥙿而無留事志在端正百度儀形四方以謨明弘濟爲巳任而績用未究斯吾君所以當宁流嘆而衆君子失聲怛化豈虚也哉凡三合姓初曰范陽盧夫人太子賔客㓜平之女次京兆韋氏二夫人穎州刺史勺洎膳部貟外郎襄之女以從祖妹而繼室焉皆以華腴淑哲不幸凋落長子紹左衛兵曹叅軍鳯翔節度巡官專謹有馴嗣子繼京兆府叅軍飾躬彊學㓜子紵編皆以門廕在仕紹繼等泣次先公官簿事業請書墓石且以理命見託故不得讓焉銘曰太行之東全趙古風鍾懿美兮左車武毅元禮文事叢慶祉兮天官冡卿莊重廉清大君子兮精金斷割良玉持達視所履兮表率二邦鰥孤惠康斯樂只兮均齊八政底愼徽令有經紀兮冝登上台以賦羣才命遄巳兮緱原厚地追琢款識神在此兮故吏部侍郎贈禮部尚書昌黎韓先生墓誌銘并序皇甫湜長慶四年八月昌黎韓先生旣以疾免吏部侍郎書諭湜曰死能令我躬所以不隨世磨滅者惟子以爲囑其年十二月丙子遂薨明年正月其孤昶使奉功緒之録繼計以至三月癸酉葬河南河陽乃哭而敘銘其墓其詳將揭之於神道碑云先生韓愈字退之後魏安桓王茂六代孫祖朝散大夫桂州長史諱叡素父秘書郎贈尚書左僕射諱仲卿先生七歲好學言出成文及冠恣爲書以傳聖人之道人始未信旣發不掩聲震業光衆方驚爆而萃排之乗危將顚不懈益張卒大信於天下先生之作無圎無方至是歸工抉經之心執聖之權尚友作者跋邪觝異以扶孔氏存皇之極知人罪非我計茹古涵今無有端涯渾渾灝灝不可窺校及其酣放豪曲快字凌𥿄怪發鯨鏗春麗驚耀天下然而栗密窈眇章妥句適精能之至入神出天嗚呼極矣後人無以加之矣姬氏巳來一人而巳矣始先生以進士三十有一仕歷官其爲御史尚書郎中書舍人前後三貶皆以䟽陳治事廷議不隨爲罪常惋佛老氏法潰聖人之隄乃唱而築之及爲刑部侍郎遂章言憲宗迎佛骨非是任爲身恥止怒天下先生處之安然就貶八千里海上嗚呼古所謂非苟知之亦允蹈之者邪吳元濟反吏兵乆遁無功固涸將疑衆懼恟恟先生以右庶子兼御史中丞行軍司馬宰相軍出潼關請先乗遽至汴感說都統師乗遂和卒擒元濟王庭湊反圍牛元翼於深救兵十萬望不敢前詔擇庭臣徃諭衆慄縮先生勇行元稹言於上曰韓愈可惜穆宗悔馳詔無徑入先生曰止君之仁死臣之義遂至賊營麾其衆責之賊恇汗伏地乃出元翼春秋美臧孫辰告糴于齊以爲急病校其難易敦爲冝襃嗚呼先生眞古所謂大臣者邪選拜京兆尹歛禁軍帖旱糴齾倖臣之鋩再爲吏部侍郎薨年五十七贈禮部尚書先生與人洞朗軒闢不施㦸級族姻友舊不自立者必待我然後衣食嫁娶喪葬平居雖寢食未甞去書怠以爲枕飡以飴口講評孜孜以磨諸生恐不貌美游以詼笑嘯歌使皆醉義忘歸嗚呼可謂樂易君子鉅人者矣夫人髙平郡君范陽盧氏孤前進士昶壻左拾遺李漢聓集賢校理樊宗懿次女許嫁陳氏三女未笄銘曰維天有道在我先生萬頸胥延坐廟以行令望絶邪痌此四方惟聖有文乖微歲千先生起之焯役于前彍義滂仁耿照充天有如先生而合亘年按我章書經紀大環唫不時施昌極後昆噫嘻永歸奈知之悲唐工部貟外郎杜甫墓誌銘并序元稹敘曰余讀詩至杜子美而知古人之才有所揔萃焉始堯舜之君臣以賡歌相和是後詩人繼作歷夏殷周千餘年仲尼緝拾選練取其干預教化之尤者三百篇其餘無聞焉騷人作而怨憤之態繁然猶去風雅日近尚相比擬秦漢巳還采詩之官旣廢天下俗謡民謳歌頌諷賦曲度嬉戲之詞亦隨時間作至漢武帝賦柏梁詩而七言之體具蘇子卿李少卿之徒尤工爲五言雖句讀文律各異雅鄭之音而詞意闊逺指事言情自非有爲而爲則文不妄作建安之後天下之士遭罹兵戰曹氏父子鞍馬閒爲文往往橫槊賦詩故其遒文壯節抑揚怨哀悲離之作尤極於古晉世風㮣稍存宋齊之閒教失根本士以簡慢矯飾相尚文章以風容色澤放曠精清爲高蓋吟寫性靈流連光景之文也意義格力無取焉陵遟至梁陳淫豔刻飾佻巧小碎之詞又宋齊之所不取唐興學官大振歷世之文能者互書而又沈宋之流研練情切穩順聲勢謂之爲律詩由是而后文變之體極焉而又好古者遺近務華者去實效齊梁則不逮於晉魏工樂府則力屈於五言律切則骨格不存閑暇則纎穠莫備至于子美所謂上薄風雅下該沈宋言奪蘇李氣吞曹劉掩顔謝之孤高雜徐庾之流麗盡得古今之體勢而兼昔人之所獨專矣如使仲尼考鍜其旨要尚不知貴其多乎哉茍以爲能所不能無可無不可則詩人巳來未有如子美者是時山東人李白亦以竒文取稱時人謂之李杜余觀其壯浪縱恣擺去拘束摸寫物象及樂府歌詩誠亦差肩於子美至若鋪陳終始排比聲韻大或千言次猶數百詞氣豪邁而風調清深屬對律切而脫棄凡近則李尚不能歷其藩翰況堂奥乎余甞欲條㭊其文體别相附與來者爲之凖病懶未就爾適子美之孫嗣業啓子美之柩襄祔事於偃師途次于荆楚雅知余愛言其大父之爲文祈余爲誌辭不可絶余因系其官閥而銘其卒葬云系曰晉當楊侯杜氏下十丗而生依藝今家於鞏依藝生審言審言善詩官至膳部貟外郎審言生閑閑生甫爲奉天令甫字子美天寶中獻三大禮賦明皇竒之命宰相試文文善授率府曹屬京師亂歩謁行在授左拾遺以直言失官出爲華州司功尋遷京兆功曹劒南節度使嚴武抜爲工部貟外叅謀軍事旋又棄其官扁舟下荆楚間竟以寓卒旅殯嶽陽享年若干夫人弘農楊氏女父曰司農少卿怡四十九年終嗣子曰宗武病不克葬没命其子嗣業以家貧無以給喪收拾乞丏燋勞晝夜去子美没後餘四十年然後卒先人之志亦足爲難矣銘曰惟元和之癸巳粤某月某日之佳辰合窆我杜子美於首陽之山前嗚呼千歲而下曰此文先生之古墳唐監察御史周公墓碣銘并序柳宗元有唐貞臣汝南周氏諱某字某以諌死葬于某貞元十二年柳宗元立碣于墓左在天寶年有以諂䛕至相位賢臣放退公爲御史抗言以白其事得死于墀下史臣書之公之死而佞者始畏公議於戲古之不得其死者衆矣若公之死志匡邦國氣震姦佞動獲其所蓋得其死者歟公之德之才洽於傳聞卒以不試而獨申其節猶能奮百代之上以爲丗範者也若令生於定哀之間則孔子不曰未見剛者出於秦楚之後則漢祖不曰安得猛士而存不及興王之用没不遭聖人之歎誠立志者之所悼也故爲之銘曰忠爲美道是履諌而死佞者止史之志石以紀爲臣軌兮唐太學愽士施先生墓誌銘韓愈貞元十八年十月十一日太學愽士施先生士丏卒其寮郭㐾買石誌其墓昌黎韓愈爲之詞曰先生明毛鄭詩通春秋左氏傳善講說朝之賢士大夫從而執經考疑者繼于門太學生習毛鄭詩春秋左氏傳者皆其弟子貴游之子弟時先生之說二經來太學怗怗坐諸生下恐不卒得聞先生死二經生喪其師仕於學者亡其用故自賢士大夫老師宿儒新進小生聞先生之死哭泣相弔歸衣服貨財先生年六十九在太學十九年由四門助教爲愽士由博士爲太學秩滿當去諸生輒拜䟽乞留或留或遷祖曰旭袁州冝春尉父曰婼濠州定逺丞妻曰太原王氏先先生卒子曰友直明州鄮縣主簿曰友諒太廟齋郎系曰先生之祖氏自施父其後施常事孔子以彰讎爲愽士延爲太尉太尉之孫始爲吳人曰然曰績亦載其跡先生之興公車是召纂序前聞于光有耀古聖人言其㫖密微箋注紛羅顚倒是非聞先生講論如客得歸卑讓盹盹出言孔揚今其死矣誰嗣爲宗縣曰萬年原曰神禾高四尺者先生墓邪著作郎贈秘書少監權君墓表李華君姓權氏諱臯字士繇天水人符秦尚書僕射翼之後丗爲著姓祖某咸有令德君旣冠進士及第試臨清尉持節兼本道使藉君表爲薊縣尉充判官無何主將以逆節露君乃詐死扶親渉江免禍累知幾其神先帝聞而歎之除評事御史方議大用屬太夫人病危君侍奉憂勞因中痼疾無何太夫人終君泣血三年厥疾用加服除遷起居舎人著作郎大曆元年四月某日不幸逝於丹徒因殯焉享齡四十嗚呼識者慟哭聞者痛心君有大節不可奪大名不可掩大才不可及大行不可名天與之仁不與之年哀哉自開元天寶巳來高名下位華方疾不能備舉然所憶者曰河南元君德秀元終十年而南陽張君有略張殁二年而君夭元之志如其道德張之行如其經術君之才如其聲望人倫其瘁素與昌黎韓㓜深京兆王鎭卿洎華友善韓評君曰可以爲宰輔王評君曰可以爲師保華評君曰分天下之善惡一人而巳矣夫人隴西李氏仁賢有一子某生七年哀禮過成人嗚呼有後哉朝廷贈君以祕書少監悼賢也華自疾病風曵杖而往哭之常聞師乙之言曰温良而能斷者宜歌齊權君可謂温良而能斷者也故爲齊風表君之墓云忠於而國孝於而家絜而不滓瑜而不瑕仁胡不壽爲善者何君不幸邪時不幸邪唐太子校書李元賔墓銘并序韓愈李觀元賔其先隴西人始來自江之東年二十四舉進士三年登上第又舉愽學宏詞得太子校書又一年年二十九客死於京師旣歛之三日其友人博陵崔弘禮葬之于國東門之外七里郷曰某郷原曰某原友人昌黎韓愈書石以誌之其辭曰巳乎元賔壽也者吾不知其所慕夭也者吾不知其所惡生而不淑孰爲其壽死而不朽孰爲其夭巳乎元賔文高乎當世行過乎古人竟何爲哉竟何爲哉唐柳州刺史柳子厚墓誌銘并序韓愈子厚諱宗元七丗祖慶爲拓跋魏侍中封濟隂公曽伯祖諱奭爲唐宰相與禇遂良韓瑗俱得罪武后死高宗時皇考諱鎭以事母棄太常博士求爲縣令江南其後以不能媚權貴失御史權貴人死乃復拜侍御史號爲剛直所游皆當丗名人子厚少精敏無不通達逮其父時雖少年巳自成人能取進士第嶄然見頭角衆謂柳氏有子矣其後以博學宏詞授集賢殿正字儁傑廉悍議論證據今古出入經旨百子踔厲風發率常屈其座人名聲大振一時皆慕與之交諸公要人爭欲令出我門下交口薦譽之貞元十九年拜監察御史王叔文韋執誼用事拜尚書禮部貟外郎且將大用遇叔文等敗例出爲刺史未至又例貶永州司馬居閑益自刻苦務記覽爲詞章汎濫渟蓄爲深博無涯涘而自肆於山水之間元和中甞例召至京師又偕出爲刺史而子厚得柳州旣至歎曰是豈不足爲政邪因其土俗爲設敎禁州人順賴其俗以男女質錢約不時贖子本相侔則没爲奴婢子厚與設方計悉令贖歸其尤貧力不能者令書其傭直相當則使歸其質觀察使下其法於他州比一歲免而歸者且千人衡湘以南爲進士者皆以子厚爲師其經承子厚口講指畫爲文詞者悉有法度可觀其召至京師而復爲刺史也中山劉夢得禹錫亦在譴中當詣播州子厚泣曰播州非人所居而夢得親在堂吾不忍夢得之窮無辭以白其大人且萬無母子俱往理請於朝將拜䟽願以柳易播雖重得罪死不恨遇有以夢得事白上者夢得於是改連州嗚呼士窮乃見節義今夫平居里巷相慕恱酒食游戲相追逐詡詡强笑語以相取下握手出肺肝相示指天日涕泣誓生死不相背負眞若可信一旦臨小利害僅如毛髪比反眼若不相識落陷穽不一引手救反擠之又下石焉者皆是也此宜禽獸夷狄所不忍爲而其人自視以爲得計聞子厚之風亦可少愧矣子厚前時少年勇於爲人不自貴重顧藉爲功業可立就故坐廢退旣退又無相知有氣力得位者故卒死於窮裔材不爲丗用道不行於時也使子厚在臺省時亦自持其身巳能如司馬刺史時亦自不斥斥時有人力解舉之且必復用不窮然子厚斥不乆窮不極雖有出於人其文學辭章必不能自以力傳於後如今無疑也雖使子厚得所願爲將相於一時以彼易此孰得孰失必有能辨之者子厚以元和十四年十月五日卒年四十七以十五年秋七月歸葬萬年先人墓側子厚有子男二人長曰周六始四歲季曰周七子厚卒乃生女子二人皆㓜其得歸葬也費皆出觀察使河東裴君行立行立有節槩重然諾與子厚結交子厚亦爲之盡竟賴其力葬子厚於萬年之墓者舅弟盧遵遵涿人性謹順學問不猒自子厚之斥遵從而家逮其死不去旣往葬子厚又將紀其家庶幾有終始者銘曰是惟子厚之室旣固旣安以利其嗣人吕衡州誄柳宗元維唐元和六年八月日衡州刺史東平吕君卒爰用十月二十四日藁葬于江陵之野嗚呼君有智勇孝仁惟其能可用康天下惟其志可用經百丗不克而死丗亦無由知焉君由道州以陟爲衡州君之卒二州之人哭者踰月湖南人重社飲酒是月上戊不飲酒去樂㑹哭于神所而歸余居永州在二州中聞其哀聲交于南北舟舩之上下必􅈱􅈱然蓋甞聞於古而覩於今也君之志與能不施于生人知之者又不過十人世徒讀君之文章歌君之理行不知二者之於君之末也嗚呼君之文章冝瑞於百丗今其存者非君之極言也獨其辭耳君之理行冝及於天下今其聞者非君之盡力也獨其迹耳萬不試而一出焉猶爲當世所重若使幸得出其十二三則巍然爲偉人與丗無窮其可涯也君所居官爲第三品冝得謚于太常余懼州吏之逸其辭也私爲之誄以志其行其辭曰麟死魯郊其靈不施濯濯夫子胡絜其儀冠仁服義干櫓書詩忠貞繼佩智勇承基跨騰商周堯舜是師道不勝禍天固余欺鬼神齊怒妖蠥咸疑何付之德而奪其時嗚呼哀哉命姓惟吕勤唐以力輔寧萬邦受胙爾國惟師元聖周以降德世征五侯伊祖之則嗣濟厥武前書是式至于化光爰耀其特春秋之元儒者咸惑君達其道卓然孔直聖人有心由我而得敷施變化動無不克推理唯公舒文以翼宣于事業與古同極道不茍用資仕乃揚進于禮司奮藻含章㳏科聮中休問用張署讎百氏錯綜逾光超都諌列屢皁其囊帝殊爾能人服其智戎悔厥禍款邊求侍咸選邦良難乎始使君登御史賛命承事風動海壖皇威以致來緫征賦甲兹郎吏制用經邦時推重器諸臣之復周官匪易漢課牋奏鮮云能備君自他曹載出於技筆削自任羣儒革議正郎司刑邦憲爲貳紏逖伊肅邪䛕具畏遷里道民民服休嘉恩踈若暱惕邇如遐實閉其閣而撫于家載其愉樂申以舞歌賦無吏迫威不刑加浩然順風從令無譁絲蠶外邑我繭盈車雜耕鄰邪我黍之華旣字其畜亦蓻其麻鼛鼔斯屏人喜則多始富中教興良廢邪考績旣成王用興嗟陟干嶽濵言進其律號呼南竭謳謡北溢欺吏悍民先聲如失逋租匿役歸誠自出兼并旣悉罷羸乃逸唯昔舉善盜奔于鄰今我興仁化爲齊人唯昔富人或賑之粟今我厚生不竭而足邦思其弼人戴唯父善胡召災仁胡罹咎俾民伊怙而君不壽矯矯貪陵乃康乃茂嗚呼哀哉廩不餘食藏無積帛内厚族姻外賙賔客恒是懸磬逮兹易簀僮無凶服葬非舊陌嗚呼哀哉君昔與余講德討儒時中之奥希聖爲徒志存致君笑詠唐虞揭兹日月以耀羣愚疑生所怪怒起特殊齒舌嗷嗷雷動風驅良辰不偶卒與禍俱直道莫試嘉言罔敷王佐之器窮以郡符䄮在三品冝謚王都諸生羣吏尚擁良圖故友咨懷累行陳謨是旌是告永永不渝嗚呼哀哉左黃州表元結乾元巳亥賛善大夫左振出爲黃州刺史下車黃人歌曰我欲逃郷里我欲去墳墓左公今旣來誰忍棄之去於戲天下兵興今七年矣淮河之北千里荒草自關巳東海濵之南屯兵百萬不勝征稅豈獨黃人能使其人忍不去者誰曰不可頌乎後一歲黃人又歌曰吾郷有鬼巫惑人人不知天子正尊信左公能殺之於戲近年巳來以隂陽變怪將鬼神之道罔上惑下得尊重於當時者日見斯人黃之巫女亦以妖妄得蒙恩澤朝廷不問州縣惟其意公忿而殺之則彼可誅戮豈獨巫女知左公者誰曰不可頌乎三拜遷侍御史判金州刺史將去黃人多去思故爲黃人作表如左氏世系左公歷官及黃之門生故吏與巫女事則南陽左公悉記之陸歙州述李翺吳郡陸叅字公佐生于世五十七年明于仁義之道可以化人厚風俗者餘三十年連事觀察使不能知退居于田者六七年由侍御史入爲祠部員外二年出刺歙州卒于道貞元十八年四月二十日也凡人之所不能窮者必推之干天天之注膏雨也人之心以爲生旱苗然也雨與苗運相違或雨于海或雨于山旱苗不得仰其澤惟人也亦然天之生俊賢也人之心以爲拯顦顇之人然也賢者與顦顇之人時不合或死于野或得其位而道不能行顦顇之人不得被其惠膏雨之降也適然唯賢者之生于時也亦然運相合旱苗仰其澤顦顇之人賴其力傅說甘盤尹吉甫管夷吾之類也時弗合膏雨降雖終日賢哲生雖比肩旱苗之不救百姓之弗賴顔子子思孟軻董仲舒之類也故賢哲之生自有時百姓之賴其力天下不賴其力亦天也嗚呼公佐之官雖列于朝雖刺于州其出入始二年道之不行與居于田時弗差也公佐之賢雖日聞其德行亦未必昭昭然聞于天子公佐是以不得其職出刺一州又短命道病而死天下之人未蒙其德固冝然也則天之生君也授之以救人之道不授之以救人之位如膏雨之或雨于海或降于山旱苗之不沐其澤者均也故君之不得其位以行其道者命也其亦不足于心者邪得是道者窮居于野非所屈冠冕而相天下非所伸其何有不足于心者邪元魯山墓碣銘并序李華維唐天寶十二載九月二十七日魯山今河南元公終于陸渾草堂春秋五十九服名節者無不痛心嗚呼堂内有篇簡巾褐枕履琴杖簞瓢而巳堂下有接賔之位孤甥受學之室過是而往無以送終名高之士陸渾尉梁園喬潭􅉠以清白之俸遂其喪葬以明月十二日窆于所居南岡禮也公諱德秀字紫芝延州使君之子後魏七葉易爲元公其裔也丗有明哲承而述之㓜挺全德長爲律度神體和氣貌融視色知敎不言而信大易之易簡黃老之清淨惟公備焉延州即丗之後昆弟凋落慈親羸老無小無大仰飴於公及應府貢如京師不忍離親躬負安輿往復千里以才行第一進士登科丁艱聲動於心既過苴枲刺血畵佛像寫經以不貲之身申罔極之報食無鹽酪居無爪翦者三年先人未祔于兆身迫當室緘未忘之哀叅調求仕銓試超等補南和尉黜陟使以至行上聞授左龍武軍録事因墜傷足樂正之憂愀然滿容以甥姪婚仕爲念受署魯山今以痼疾不能趨拜故後長吏僉以客禮待之常獲盜未刑屬濵山之郷稱猛獸爲害盜請於庭曰感明府慈仁願殺獸贖罪公哀而許焉僚佐堅請公無變慮乃從破械縱之盜果屍獸復命吏人老㓜咨嗟震動發於庭宇播於四鄰則政化之行可知也公自㓜居貧累服齊斬故不及親在而娶旣孤之後單獨終身人或以絶後諭焉對曰兄有息男不曠先人之祀矣歷官俸禄悉以經營葬祭衣食孤遺代下之日柴車而返南遊陸渾考一畒之宅發八笥之直唯匹帛焉居無扄鑰牆藩之禁達生齊物從其所好時屬歉歲渉旬無煙彈琴讀書不改其樂好事者攜酒食以饋之陶陶然脫遺身世涵泳道德拔清塵而棲顥氣中古以降公無比焉知我或希晦而不耀故也是冝爲國老更論道佐丗而羔鴈不至殁於空山可勝慟邪所著文章根玄極則道演寄情性則玄于思善人則禮水多能而深則廣吳公子觀樂曠達而妙則現題窮於性命則蹇士賦可謂與古同轍自爲名家者也又其惡萬金之藏鄙十卿之禄貴富之辯吾得其眞至哉元公越軼古今冲邃冥冥純朗朴渾範於生靈凡與門人吟慕遺風謚曰文行先生從古也夫誄德銘功厥義有三上以簡神明中以鋪光烈下以聳示後人斯文之作由北志也其銘曰天地元醇降爲仁人隱耀韜精凝和葆神道心玄微消息詘伸載襲先猷竭盡報親貞玉白華不緇不磷縱翰祥風蛻跡泥塵今則巳矣及吾無身仰德如在瞻賢蘼因懷哉永思泣涕銘云重校正唐文粹卷第六十九
