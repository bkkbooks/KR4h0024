body:
  text: 古賦丁摠五首符寶一受命寶賦梁肅象緯一渾天賦楊烱閱武二大獵賦李白裴將軍舞劒賦喬覃誓師一濟河焚舟賦髙邁受命寶賦并序梁肅受命寶在昔曰傳國璽自秦始皇有焉蓋取夫一世二世傳於無窮故有傳國之號歴兩漢至于陳隋隋煬帝之遇禍也宇文化及盜之而西竇建徳滅化及取焉易稱物不可以終否武徳中太宗一戎衣而天下大定是器也與璽同歸國家用之以受命所承更名大寶而多歴年所自前代觀之受天明命則不求而得僣賊劫遷則得之而失蓋神物之所在非徒然也抑义聞之鼎之輕重與璽之去留莫不視徳之上下位之安危若恃寶命在已而慆心堙耳漸至危殆以負扆之尊被竊鈇之言當此時也此片玉耳復何為哉竊讀史氏感興亡之器忿徼覬之類於是作受命寳賦若形制之小大厚薄則未始詳也故不備焉其辭曰物之貴兮惟玉之英翕二氣以成形涵百寶之純精卞氏得之三獻而後明當秦趙之抗衡挺髙價於連城伊玩好之所資微神器之鴻名及夫秦始稱皇削平六王為龍為光追琢成章其文曰受命于天既夀永昌其始也謂世有哲王傳國寶之無疆何逆天以暴物不及期以降殃惟隂騭之運行終有授而不常隨素車與白馬歸赤精於路傍逮夫漢業中微后族專命祿去公室世移威柄實沙麓之遺瘵成巨君之簒害雖擲地以慷慨終莫救夫顛沛俄漸臺之傾移歴更始與赤眉咸庸懦而不君卒亂長而禍滋洎四七之龍驤為火主以得之遂祀漢以配天延二百之炎輝苟非其人寶命不歸悼桓靈之不嗣置天下於阽危既而赤伏道喪黄星兆發雲雷遘迍朝社播越去乗輿而漂蕩入眢井以蕪沒披草萊以拯之實功存乎武烈何典午之傾潰劉石盜以自尊既江表之卜年遂歸明以去昏五世推移或亡或存失由道喪隋之并吞始負險以爭雄俄銜璧而來奔惟大業之離阻由君昏而黷武豺狼呀以當路郊廟毁而失主望夷之釁既發斯器淪於醜虜昊天有命眷我髙祖騫飛汾晉震疊闗輔雲行雨施雷動飈舉聖人既作萬物斯覩于時也充徳扇結東周卼臲帝謂文皇陳師往伐如火烈烈如風發發牛口先撥虎牢則達致四海於升平混車書以同轍惟神器之有在終告歸于魏闕考乎先王之統世也以文經天以武緯地觀象備物従宜制器播而用之為天下利故曰大徳曰生大寶曰位位之升降惟道所至先王審其所以故為大於細為難於易然後本不摇而末不墜安危之體鑒此而已若夫符命之所加厯數之所歸莫不天人合發區宇樂推休祥煥然靈命顯思是以有守有失動而恱隨苟貪叨而僣亂莫不速禍而召危此玉也公路執持衆叛而親離趙髙引佩殿壊而身靡惟前軌之昭昭孰可幸捷以取之荅曰吾皇有命如天有日傳寶在我昏庸自佚則陸渾無問鼎之事歴代無奉璽之術苟思慮於廢興胡不既得而患失於戲天發禍機聖人定之天生神物聖人用之唐哉皇哉大人造之子孫百代永言保之渾天賦并序楊烱顯慶五年烱時年十一待制𢎞文館上元三年始以應制舉補校書郎朝夕靈臺之下備見銅渾之象尋返初服臥病丘園二十年而一徙官斯亦拙之效也代之言天體者未知渾蓋孰是代之言天命者以為禍福由人故作渾天賦以辨之其辭曰客有為宣夜之學者喟然而言曰旁望萬里之横山而皆青翠俯察千仞之深谷而皆黟黑蒼蒼在上非其正色逺而望之無所至極日月載於元氣所以或中而或昃星辰浮於大空所以有行而有息故知天常安而不動地極深而不測可以為觀象之準繩可以作談天之楷式有稱周髀之術者囅然而笑曰陽動而隂静天迴而地游天如倚蓋地若浮舟出於夘入於酉而生晝夜交於奎合於角而有春秋天則西北既傾而三光北轉地則東南不足而萬穴通流比於圓首前臨胷者後不能覆背方於執炬南稱明者北可以言幽此天與而不取惡煌煌而更求太史公有晬其容乃盱衡而告曰楚既失之齊亦未為得也言宣夜者星辰不可以闊狹有常言蓋天者漏刻不可以春秋各半周三徑一逺近乖於辰極東井南箕曲直殊於河漢明入於地葛稚川所以有辭日應於天桓君山由其發難假蘇秦之不死既莫知其為說儻隷首之重生亦不能成其筭也二客嘗聞渾天之事歟請為左右揚㩁而陳之原夫杳杳冥冥天地之精混混沌沌隂陽之本何太虚之無礙偉造化之多端南溟玉室之宫爰皇是宅西極金臺之鎮上帝攸安地則方如棊局天則圓如彈丸天之運也一北而物生一南而物死地之平也影長而多暑影短而多寒太隂當日之衝也成其薄蝕衆星傅月之光也因其波瀾乾坤闔闢天地成矣動静有常隂陽行矣方以類聚物以羣分吉凶生矣在天成象在地成形變化見矣部之以三門張之以八紀其周天也三百六十五度其去地也九萬一千餘里日居而月諸天行而地止載之以氣乗之以水生之育之長之畜之亭之毒之蓋之覆之天聰明也聖人得之天垂象也聖人則之其道也不言而信其神也不怒而威驗之以衡軸考之以樞機三十五官有羣生之繫命一十二次當下土之封畿中衡外衡每不召而自至黄道赤道亦殊塗而同歸表裏見伏聖人於是乎發揮分至啟閉聖人於是乎範圍可以窮理而盡性可以極深而研幾天有北斗杓攜龍角魁枕㕘首天有北辰衆星環拱大帝威神尊之以耀魄配之以勾陳有四輔之上相有三公之近臣華蓋巖巖俯臨於帝座離宫弈弈旁絶於天津列長垣之百堵啟閶闔之重闉文昌拜於大將天理囚於貴人太階平而君臣穆招遥指而天下春東宫則析木之津夀星之野箕為傲客房為駟馬天王對於攝提皇極臨於宦者左角右角兩耀之所巡行隂間陽間五星之所次舍後宫掌於燕息太子承於冢社宗人宗正内外惇敘於邦家市樓市垣貨殖畢陳於天下北宫則靈龜潛匿螣蛇伏藏瓠𤓰宛然而獨處織女終朝而七襄登漸臺而顧步御輦道而倘佯聞雷霆之隠隠聽枹鼓之硠硠南斗主爵祿東璧主文章須女主布幣牽牛主闗梁羽林之軍所以除暴亂壘壁之陣所以備非常西宫則天潢咸池五車三柱奎為封豕㕘為白虎胃為天倉婁為衆聚旄頭之北宰制其戎虜天畢之隂蓄洩其雷雨大陵積尸之肅殺㕘旗九斿之部伍樵蘇之地出入於苑園萬億之資填積於倉庾南宫則黄龍賦象朱鳥成形五帝之座三光之庭傷成於鉞誅成於鑕福成於井徳成於衡執法者廷尉之列大臣之象少微者儲君之位處士之星天弧直而狼顧軍市曉而雞鳴三川之交鶉火通其耀七澤之國翼軫寓其精南河北河象闕於是乎増峻左轄右轄邉荒於是乎自寧乃有金之散氣水之精液法渭水之横橋像昆池之刻石嵗時占其水旱滄溟應其朝夕織女之室漢家之使可尋飲牛之津海上之人易覿日也者衆陽之長人君之尊天雞曉唱靈烏晝踆扶桑臨於大海若木照於崑崙太平太蒙所以司其出入南至北至所以節其寒温龍山銜燭不能議其光景夸父棄䇿無以方其駿奔月也者羣隂之紀上天之使異姓之王后妃之事方諸對而明水浹重暈匝而邉風駛纔盈蚌蛤則虜騎先侵􅃴鬬麒麟則暗虎潛值五星者木為重華火為熒惑鎮居戊巳斯為土徳太白主西辰星主北俯察人事仰觀天則比㕘右肩之黄如奎大星之黑五材所以致用七政於焉不忒同舍而有四方分天而利中國赤角犯我城黄角天之争五星同色天下偃兵趨前舍為盈退後舍為縮盈則侯王不寧縮則軍旅不復或向而或背或遲而或速金火犯之而甚憂嵗鎮居之而有福觀衆星之部署歴七耀而驅馳定天下之文所以通其變見天下之􅄨所以象其宜然後播之以風雨威之以霜霰或吐霧而蒸雲或擊雷而鞭電一旬而太平感膚寸而天下徧白日為之晝昏恒星為之不見爾乃重明合璧五緯連珠青氣夜朗黄雲旦扶握天鏡受河圖若曰賜之以福此明王聖帝之休符至如怪雲祅氛冬雷夏雪日暉長虹星流伏鼈隂有餘而地動陽不足而天裂若曰懼之以災此昏主亂君之妖蠥昔者顓頊之命重黎司天而司地陶唐之分仲叔宅西而宅東其後宋有子韋鄭有裨竈魏有石氏齊有甘公唐都之推星王朔之候氣周文之視日吳範之占風有以見天地之情狀識隂陽之變通詩云謂天蓋髙語云惟天為大至髙而無上至大而無外四時行焉萬物生焉羣臣莫尊於上帝法象莫大於皇天靈心不測神理難筌日何為兮右轉天何為兮左旋盤古何神兮立天地巨靈何聖􅀆造山川螟何細兮師曠清耳而不聞離朱拭目而無見鵬何壯兮搏扶摇而翔九萬運海水而擊三千龜與蛇兮異其短長之質椿與􅌲兮殊其大小之年鐘何鳴兮應霜氣劒何伏兮動星躔列子何方兮御風而有待師門何術兮驗火而登仙魯陽揮戈兮轉於西日陶侃折翼兮登乎上𤣥女何寃兮化精衛帝何恥兮為杜鵑爭疆理者有零陵之石聞弦歌者有蓋山之泉若怪神之不語夫何述於此篇以天乙之武也焦土而爛石以唐堯之徳也襄陵而懐山以顔回之賢也貧居於陋巻以孔丘之聖也情希乎執鞭馮唐入於郎署也兩君而未識揚雄在於天祿也三代而不遷桓譚思周於圖䜟也忽焉不樂張衡術窮於天地也退而歸田我無為而人自化吾不知其所以然大獵賦并序李白臣以為賦者古詩之流辭欲壯麗義歸博逺不然何以光讃盛美感天動神而相如子雲競誇辭賦歴代以為文雄莫敢詆訐臣謂語其大略竊或褊其用心子虚所言楚國不過千里夢澤居其太半而齊徒吞若八九三農及禽獸無息肩之地非諸侯禁淫述職之義也上林云左蒼梧右西極考其實地周袤纔經數百長楊夸胡設網為周阹放麋鹿其中以搏攫充樂羽獵於靈臺之囿圍經百里而開殿門當時以為窮壯極麗逮今觀之何齷齪之甚也但王者以四海為家萬姓為子則天下之山林禽獸豈與衆庶異之而臣以為不能以大道匡君示物周博平文論苑囿之小竊為微臣之不取也今聖朝園池遐荒殫窮六合以孟冬十月大獵於秦亦將耀威講武掃天蕩野豈淫荒侈靡非三驅之意邪臣白作頌折衷厥美其辭曰粤若皇唐之挈天地而襲氣母兮粲五葉之葳蕤惟開元廓海㝢而運斗極兮摠六聖之光熙誕金徳之淳精兮漱玉露之華滋文章森乎七曜兮制作㕘乎兩儀括衆妙而為師明無幽而不燭兮澤胡逺而不施慕往昔之三驅兮順生殺於四時若乃嚴冬慘切寒氣凜冽不周來風𤣥冥掌雪木脫葉草解節土囊煙隂火井氷閉是月也天子處乎𤣥堂之中飡八水兮休百工考王制兮遵國風樂農人之閒隙兮因校獵而講戎乃使神兵出於九闕天仗羅於四野徵水衡與林虞辨土物之衆寡千騎飈掃萬乗雷奔梢扶桑而拂火雲兮刮月窟而搜塞門赫壯觀於今古嶪摇蕩於乾坤此其大略也而内以中華為天心外以窮髪為海口豁咽喉以洞開吞荒裔以盡取大章按步以來往夸父振䇿而奔走足跡乎日月之所通囊括乎隂陽之所有君王於是撞鴻鐘發鑾音出鳯闕開宸襟駕玉輅之飛龍歴神州之層岑遊五柞兮瞰三危挾細栁兮過上林攅髙牙以總總兮駐華蓋之森森於是擢倚天之劒彎落月之弓崑崙叱兮可倒宇宙噫兮増雄河漢為之卻流川嶽為之生風羽旄揚兮九天絳獵火烻兮千山紅乃召蚩尤之徒叢長㦸羅廣澤呵雨師走風伯稜威耀乎雷霆烜爀振於蠻貊陋梁都之體制鄙靈囿之規格而南以衡霍作襟北以代恒作袪夾東海而為塹兮拖西溟而流渠麾九州之珍禽兮廻十羣以坌入聮八荒之竒獸兮屯萬族而來居雲羅高張天網密布置罘緜原峭格掩路蠛蠓過而猶礙蟭螟飛而不度彼層霄與翳榛罕翔鳥與伏兔促營合技彌巒被岡金戈森行洗晴野之寒霜虹旗電掣巻長空之飛雪吳􅆖走練宛馬蹀血縈衆山之聮緜隔逺水之明滅使五丁摧鋒一夫拔木下塹髙頽深平險谷擺椿栝開林叢喤喤呷呷盡奔突於場中而田疆古冶之儔烏獲中黄之黨越崢嶸獵莽蒼喑呼哮􅗏風旋電往脫文豹之皮抵𤣥熊之掌批狻手猱挾三挈兩既徒搏以角力又揮鋒而爭先行甝號以鶚睨兮氣赫火而歊烟拳封猯肘巨狿梟羊應叱以斃踣䝟貐亡精而墮巔或碎腦以析脊或歕髓而飛涎窮遐荒蕩淵藪扼土伯殪天狗脫角犀頂拔牙象口掃封狐於千里捩雄虺之九首咋騰蛇而仰吞拖奔兕而却走君王於是峩通天靡星旃奔雷車揮電鞭觀壯士之效獲顧三軍而欣然曰夫何神讋鬼慄之駭人也又命建夔鼓勵武卒雖躪轢之已多猶抝怒而未歇集赤羽兮照日張烏號兮滿月戎車轞轞以陸離彀騎煌煌而奮發鷹犬之所騰捷飛走之所蹉蹶攫麏麚之咆哮蹂豺貉以挂格膏鋒染鍔填巖掩窟觀殊材與逸羣尚揮霍以出沒則有白猸飛駮寄竒貙䝡牙若錯劒鬛如叢竿口吞殳鋋目極槍櫓碎琅弧彏玉弩射猛彘透奔虎金鏃一發旁疊四五雖鑿齒磨牙而致伉誰謂南山白額之足覩摠八校搜四隅馳專諸走都盧趫喬林撇絶壁抄獑猢攬貊􅀈囚鼯鼬於峻崖頓豰貜於穹石養由發箭竒肱飛車巧括更羸妙兼蒱且墜鸀鳿於青雲落鴻雁於紫虚捎鶬鴰漂鸕􅖥殫地廬空神居斬飛鵬於日域摧大鳯於天墟龍伯釣其靈鼇任公獲其巨魚窮造化之譎詭何神怪之有餘所以噴血流川飛毛灑雪乍若乎高天雨獸上墜於大荒又似乎積禽為山下崩於林穴陽烏沮色於旭日隂兔喪精於明月思騰裝上獵於太清所恨穹昊之路絶而忽也莫不海晏天空萬方來同雖秦皇與漢武兮復何足以爭雄俄而君王茫然改容愀若有失居安思危防險誡逸斯馳騁以狂發非至理之𢎞術且夫君以端拱為尊𤣥妙為寶暴殄天物是謂不道乃命去三面之網示六合之仁已殺者待其犯命未傷者全其天真雖翦毛而不獻豈割鮮以染輪解鳯皇與鸑鷟兮旋騶虞與麒麟獲天寶於陳倉載非熊於渭濱於是享獵徒封勞苦軒行庖騎酌酤韜兵戈火網罟然後登九霄之臺宴八紘之圃開日月之扃闢生靈之户聖人作而萬物覩覽蒐敖與狩岐何宣城之足數哂穆王之荒誕歌白雲於西母曷若飽人以淡泊之味醉時以淳和之觴鼓之以雷霆舞之以隂陽虞乎神明狃於道徳張無外以為置􅅣大朴以為杙頓天網以掩之獵賢俊以御極若此之狩罔有不克使天人宴安草木蕃殖六宮斥其珠玉百姓樂於耕織寢鄭衛之聲却靡曼之色天老掌圖風后侍側是三階砥平而皇猷允塞豈比夫子虚上林長楊羽獵計麋鹿之多少誇苑囿之大小者哉方將延榮光於後昆軼𤣥風於䆳古擁嘉瑞臻元符登封於泰山篆徳於社首豈不與乎七十二帝同條而共貫哉君王於是迴蜺旄返鑾輿訪廣成於至道問大隗之幽居使罔象掇𤣥珠於赤水天下不知其所如也裴將軍舞劒賦并序喬潭元和秋九月羽林裴公獻戎捷于京師上御花萼樓大置酒酒酣詔將軍舞劒為天下之壯觀遂賦之其辭曰將軍以幽燕勁卒耀武窮髪俘海夷虜山羯左執律右秉鉞振旅闐闐獻功于魏闕上享之則鐘以捍簴鼓以靈鼉千妓度舞萬人髙歌秦雲動色渭水耀波有肉如山有酒如河君臣樂飲而一醉夷夏薰薰而載和帝謂將軍拔劒起舞以張皇師旅以烜赫戎虜節八音而行八風奮兩階之干羽公於是乎貝胄朱綅而正色虎裘錦裼而攘臂抗稜威飄銳氣陸離子武備婆娑乎文事合桑林之容以盡其意照蓮花之彩以宣其利翕然鷹揚翼爾龍驤鋒隨指顧鍔應徊翔取諸身而聳擢上其手以激昻縱横耀穎左右交相觀乎此劒之躍也乍雄飛俄虎吼摇轆轤射牛斗空中悍慄不下將乆欻風落而雨來果愜心而應手爾其凌厲浮清絢練敻絶青天兮可倚白雲兮可決覩二龍之追飛見七星之明滅雜朱干之逸勢應金奏之繁節至乃天輪宛轉貫索迴環光沖融兮其外氣混合兮其間若涌雲濤如飛雪山萬夫為之雨汗八佾為之慙顔及乎度曲將終發機尤捷或連翩而七縱或瞬息而三接風生兮蒨斾襜襜電走兮彤庭􅁮􅁮隂冥變見靈怪離躐將鬼神之無所遁逃豈蠻夷之不足震懾嗟夫藺子之迭躍其人未雄仲由之自衛其舞未工曷若將軍為百夫之特寶劒有千金之飾奮紫髯游白刄發帝庭之光色所以象大君之功亦以宣忠臣之力或歌曰洸洸武臣耀雄劒兮清邉塵威逺夷兮率來賓焉用輕裙之妓女長袖之才人天子穆然詔伶官斥鄭衛選色者使覘乎軍容教舞者使觀乎兵勢變激楚之結風為發揚之蹈厲僉謂將軍之劒舞古未之至濟河焚舟賦髙邁昔孟明之載戰載北也空山肉填平地血流匹馬隻輪蕩然不收社稷包羞朝廷隠憂用兵至此不死何求誠以棄瑕之恩未報拜賜之言虚設砥名勵節易地改轍兾桑榆之未晚得雌雄之一決乃復摠元戎申薄伐四馬雲屯長劒電掣咆哮兮前貔後虎威稜兮左霜右雪火千旗而四面風動雷萬鼔而一道地裂小長平之瓦解凌不周之柱折朝出乎咸秦夕濟乎孟津其氣益振其屈欲伸於是指河中之舟示軍中之人曰吾與君子誓雪前恥負則入黄泉之下勝則入青雲之裏吹嘘而霜露變叱咤而風塵弭雖無此舟誰無此舟爾否則骸骨為異鄉之土䰟􅅎為鄰國之鬼雖有此舟誰有此舟矣乃命焚之夫其火與木相守水與火相煎烘大川焮長壖龍吼乎沸潭魚喁乎湯泉舳艫化而為炭檝棹颺而為烟水聲與軍聲合旁括于地火氣與兵氣鬬上衝于天是以天為我赫怒焉地為我震嶪焉林木為我枯死焉山陵為我崩騫焉千里而髙鳥不過四遐而猛獸莫前況於人乎況於國乎於是晉君臣聞之心攅百箭背負芒刺形神無主手足若墜曰秦師徳之修誠之至天將啟吾將避閉城郭而不出潛鋒鋩以自備以五廟苟存為幸以萬人苟免為智豈敢䕶其山河而虞其土地于時晉實之主反為客秦實之客反為主不戰而勝不攻而取掠地於大河之北封屍於崤陵之下既而鬼雪前恥人解厚顔四顧清野横行而旋譟聲破晉山喜氣塞秦闗曺沬復魯之勲自居其下范蠡平吳之力莫厠其間是役也見孟明之臨事暫否終泰圖之大也見子桑之舉人遺麤得精鑒之明也見秦伯之用賢責功捨過道之在也臣事君不必自致藉主司之公君使臣不必自得藉主司之忠由是觀秦伯之有子桑猶耳目之在躬以其視視一國之明以其聽聽一國之聰自可以翊天子還淳風名與三五比崇身與二八爭功成强秦霸西戎不亦宜乎明明我后渴賢固乆懸無私之鏡以照六合倚無私之衡以稱九有掇竒拾異葑菲盡取若有一人近忠貞􅊫文章悔已往之無成謀大來於此行出蜀郡題橋以見志入函闗棄繻以示誠寧作焚舟而死不為棄甲而生投君於子桑自比於孟明君謂如之何言之不可已頌之曰析薪如之何匪斧不克事君如之何匪媒不得是知焚舟之役非孟明之力乃子桑之力也唐文粹巻四欽定四庫全書唐文粹巻五宋姚鉉編
