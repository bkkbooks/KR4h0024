  - {type: variant, offset: 8430, length: 0, content: '', WYG: 欽定四庫全書唐文粹巻三十三上宋姚鉉編文丙總九首弔古三許由先生廟酹文桞識弔夷齊文書師曠廟文袁皓雷霆一上天鼓文程浩軍政一祭纛文獨孤及畏途一招北客文袪癘一送窮文段成式責檄二責龜文王岳靈檄曲江水伯文樊鑄許先生潁陽祠庭獻酹文栁識壬辰嵗夏四月客有自洛東遊至先生遺廟而潁水古風舊山巋然追懐古蹤慕美至道以時酒敬酹于靈既酌既拜獻乎言曰天清既能久地静不能朽先生清浄天地全性出於胚渾入於鴻䝉雲遊鳥還蓊鬱和風當時帝道已半滋章欲深大樸散於人未散於山林乃有巢父杳㝠同心堯齎公器退然見推遇聖相感不得不知耳雖濯於清流道終播於無為所謂春膏時蒸朽葉自滋先生含徳唐堯發之潁陽之仁徳日大天下之禄利日卑且聖王所重者名器至人所重者感通推以大名義同讓終亷能感俗道自為功任應㑹之偶然生垂後之清風人登雲嶺多憶箕潁猗歟先生山水齊名兹焉遺廟萬古芬馨弔夷齊文洪河之東兮首陽穹崇側聞孤竹二子昔也餒在其中偕隠胡為得仁而死青苔古木蒼雲秋水魂兮來何依兮去何止掇澗溪之毛薦精誠而已初先生鴻逸中州鸞伏西山顧薇蕨之離離歌唐虞之不還謂易暴兮文武謂墨縗兮胡顔一吒兮忘飢若有誚兮于巖之關豈不以冠弊在於上履新處於下且曰一人之正位孰知三聖之純嘏讓周之意不其然乎是以知先生所恤者偏矣當昔夷羊在牧殷綱解結乾道息坤維絶鯨吞噬兮鬼孽王奮厥武天意若曰覆昏暴資濬哲於是三老歸而八百㑹一戎衣而九有截况乎旗錫黄鳥珪命赤烏俾荷鉅橋之施俾申羑里之辜故能山立雨集電掃風驅及下車也五刃不礪於武庫九􅎸伏轅於文途雖二士不食而兆人其蘇既而溥天周土率土周人于嗟先生逃將奚臻萬姓歸仰兮獨鬱乎方寸六合蕩兮終跼乎一身雖忤時而過周終臣心而惻殷所以不食其食求仁得仁然非一端事各其志若旁通以阜厥躬應物以濟其利則焉有貞節之規各親之事靈乎靈乎雖非與道而保生乃勗為臣之不二書師曠廟文袁皓吟篁怨桐天其聲乎鏘石鏗金天其文乎擊革鳴絲天其暢乎匏土之韻天其和乎天有至音寄斯八物先生不生斯音鬱鬱先生既生斯音在律嗚呼先生之耳時可求也先生之心不可得也天全樂乎先生之無神乎愚固狂而不可攄先生之有神乎愚堅誠而乞其圖先生之耳有神乎化為天下之耳先生之心有神乎化為天下之心者可以舒於今然後家家知舜琴上天鼓文程浩雷車闐闐六合喧吼驟風雨於南極族星雲於北斗遑俄選蹙東海以波蕩擺太山而𤓰剖玉石至堅切如泥濘松栢至勁粉為枯朽鼉皮擊考而魑魅晱暘龍領觝觸而鯨鯢奔走陶鑄造化之鑪而鴻毛萬像幹運乾坤之柄而嬰孩羣有由是言則九鼎𤨏細三山培塿鼒鼐可以指揮蓬萊可以背負殊不測離蒼天之近逺當懼驚魂在𤣥雲之幾重徒勞矯首及夫白日雨歇長虹霽後列缺緩轡𤣥㝠假手蓄殘怒之未洩聞餘音之良久而小子之謬學敢獻疑於座右今若為善惡之宰主操賞罰之休咎胡不扶持顔閔之羶行夭閼跖蹻之首壽罪一亂臣懲天下之凶醜旌一孝行激天下之悌友法髙懸於堯典刑丕試於周后何必霹靂潛􅀢之龍養育吠堯之狗祭纛文獨孤及天地不仁神明無親惟正是與若響之荅敢有象恭滔天搆釁稱亂國有明罰神其捨諸賊臣劉展假寵多難敢包狼心竊發蠆毒將敷虐于我上下神祇使東溟揚波羣動昏墊皇帝震怒按劔授鉞命我上將底天之伐於是有虎牙鷹揚之臣蛇矛犀渠之羣横行而東我伐用張月羽雲旗以先啟行方將歴潯陽下南陵収京口掃建業斮梟獍以釁鼓封鯨鯢于京觀俾萬里浪破三象霧廓今以令月吉日整駕即路是用徼福于爾有神惟神降衷尚弼予志敢告無靡旗無絓驂無汰輈無僨車命五將䕶野萬靈並轂令天地氛祲望風掃除魑魅魍魎罔不率俾莫我敢遏為神祗羞尚饗招北客文蜀之先曰蠶叢兮縱其目以稱王當周室凌頺兮亂無紀綱洎乎杜宇從天而降鼈靈沂江而上相禪而帝據有南國之九世蜀本南夷人也皆左其袵而椎其髻及通乎秦也始於惠王之代五牛琢而秦女至一蛇死而力士斃二江雙注羣山四蔽其地卑溼其風脞脆蠻貊雜處滇僰為隣地偏而兩儀不正寒薄而四氣不均花葉冄榮秋冬如春暮夜多雨朝旦多雲陽景罕開隂氣恒昏以暑以溼為瘵為厲氣浥蟄以中人吾知重膇之疾兮將嬰爾身蜀之不可往北客歸去來兮其東則有大江澐澐下絶地垠百谷相吞出於荆門突怒吼劃附于太白渤潏硼砰㑹于滄溟跳噴浩淼上濺飛鳥蹙縮盤渦下旋黿鼉三峽兩壁亂峯如㦸􅀈岈屹崪澒洞劃坼髙于天霓雲外水積晝日無光其下黒窄瞿塘無底淺處萬尺啼猿哀哀膓斷過客復有千嵗老蛟能變其身好飲人血化為婦人衒服靚粧遊于水濱五月之間白帝之下洪濤塞峽不見灔澦翻天蹙地霆吼雷怒亦有行舟突然而去人未及顧棹未及舉瞥見陽臺不辨雲雨千里一歇日未移午須臾黑風暴起㧞樹震山石走砂飛波騰浪翻舟子失據摧檣折竿漩入九泉没而不還支體糜散蕩入石間水族呀呀拔刺爭餐蜀之東不可往北客歸去來兮其西則有髙山萬重峻極屬天西有崑崙其峯相連日月迴環閡于山顛巒崖盤嶔天壁夐絶陽和不入隂氣固閉千年増氷萬古積雪谿寒地坼谷凍石裂夏月草枯春天木折蒼烟凝兮黒霧結人墮指兮馬傷骨江水噴激迴盤紆縈棧壁縁雲鈎連相撑繩梁嶫虚傍沓杳冥下不見底空聞波聲過者矍然亡魂喪精復引一索其名為笮人懸半空度彼絶壑或如鳥兮或如玃倐往還來幸不落或有豪猪千羣努鬛射人寒熊孔碩登樹自擲見人則擘巨糜如牛脩角如劔餓虎爭肉吼怒闞闞復有髙崖墜石兮聲若雷之軿轟上敲下磕似火迸兮滿山流星磵溪忽兮倒流林岸為之頽傾碎騰狖與過鳥駭木魅兮山精飛石壓人兮不可行西有犬戎與此山通形貌類人言語不同氊廬隆穹毳裘䝉茸啜酪啖肉持槍挾弓依草及泉務戰與攻其聲如犬其聚如蜂中國之人兮或流落於其中豈只掘䑕茹雪以取活終當鈹其足而纍其胸泣漢月於西海思故鄉於北風蜀之西不可往北客歸去來兮其南則有卭笮之關天設險艱少有平地連延長山横亘廬江隔閡百蠻吁彼漢原上當漏天靡日不雨四時霶然其人如魚爰處其泉終年霖霪時復日出㹞㹞諸犬向天吠日人皆濕寢偏死腰疾復有陽山之路毒瘴下凝白日無光其氣瞢瞢暑雨下濕黄茅上蒸南方之人兮不敢過豈止走獸踣兮飛鳥隨吾不知造化兮何知此方些蜀之南不可以往北客歸去來兮其北則有劔山巉巉天鑿之門二壁谽谺髙岸嶙峋上柱南斗傍鎮于坤下有長道北達于秦秦地神州中有聖人左右伊臯能致我君雙闕峩峩上覆慶雲千官鏘鏘朝于紫宸玉樓鳳凰金殿麒麟布徳垂澤搜賢修文皇化欣欣煦然而春蜀之北不可以往北客歸去來兮送窮文叚成式予大中八年作留窮辭詞人謂予辭反之勝也至十三年客漢上復作送窮祝是年正之晦童稚戲為送窮舡判筒而槽比籜而閭細枲纒幅楮飾木偶家督被酒請禳窮將酹地歌舞窮予謂曰予送非嚵􅀈歴蹙循隂索隙膋葷餅直脰涎瀝者非寒哭蔟憐敗衣網身惡覻牆間冷嘯淒辛者非嚇覡嗾巫欺癡嬈衰燼數楮泉擾狎狐狸者噫有才歉升窄朘膓噦喀㡬童其筆燥心汗滳以是而殁者去些有開巻數幅空心妨目襲經攻史方寸日蹙以是而殁者去些有議古酌今左凌右浸麓垤酒涔短淺不禁以是而殁者去些責龜文王岳靈萬物之貴者人也人惟秀介蟲之智者龜也龜惟神隠括無形神之謂也窮通有極秀之謂也况天之與人其道甚逺不有以也將何逺焉則吉凶之祥假子以告變化之象因子以明欲爰謀稽疑必先蔽昆命冝蠲割誘慕展布心腹子無欺於人人有望於子成天下之亹亹豈不率道與何諸吕弄權昭大横於漢帝帝辛毒痛匪告繇於周武揆惡之輕重也吕之惡不浮于辛量徳之休明也昌之徳靡及於發子二其行誰不解體矣夫義禮之輿也信身之幹也何陳氏之母不疾而稱疾魯孫之臣卜僭而告義喪於禮失其徒實繁吾不殫悉考夫演卦繇者蓍也蓍之靈而不如子之長定妍媸者鏡也鏡之明不如子之知銘乎竹帛萬代不泯奚起矛楯俾吾反惑於古人孰謂子原天地之美達五行之理徒使疏瀹澡雪仰止䝉求曽莫之校何異乎曹丘生遇拒季布善盻已虞國僑哉必以剥桂刻漆非材木所願㧞鶡裂冠非禽鳥所欲當潛伏奫灣違禍罾罟九江錫命其可得乎豈不免氓之蚩蚩熒惑於耳目也檄曲江水伯文樊鑄主張於地之血脉者豈不曰水伯乎爾自獸為身靣為人控牽兩龍窟宅百谷億有祀矣故斁倫於元氣之液弄權於坤輿之竅所云老而不死是謂之賊伊我謂爾有是夫何者三載二月春服既成冠者五六人才子六七人皆簸揚文精開闔武庫游嬉春晝㳂洄江干興飛壯心舞曳齒曺皆貸白龜之徳不負赤鯉之本爾何為隂發暴殄潛生毒痛簣禍堦於沙岸垣死府於花島如數子者皆載垂堂之誡爾始若懸流三十仭跳沫四十里固應尊而不親亹豈相及爾岸不崪屼流不唐突設人所倚之福陷爾孔易之誘俾水衒貫堅之功舫聲之如蜩螗捫空呼天迄死不救倐恣化魚之惡誰下拜牛之惠溺我國寶豈明時弃珠之泉沈彼綵舩實去夜藏舟之壑與夫覩右山四耳之獸夢潁川一角之人置于大江未匹斯甚使揭竿求父之子投牋請弟之兄奏空篌傷妻之夫厲波濤徇壻之婦罹其凶害不忍荼毒並告無辜于上下神祗行哭失聲於爾安乎爾今肆行賊虐者豈不謂性與習成乎何哉曩者溺孫興公於後湖之中淪炎帝女於東海之上化鼈於黄氏之母為魚於歴陽之郡爾應恃以舊㨗蔓其後圖殊不知事不欲數數斯辱矣惡貫已滿天命誅之然今歴視爾自昔為過之所或天涯或地㞯起於侯甸之外且非輦轂之下豈比今日俯九門臨四達使哀聲悲響上及聰聽爾誰欺欺天乎然曲江者南峙仙閣北距靈宫足可效赤水産黄帝之珠胡為殱蒼生竊司命之契況之人也皆編中華俗游無何鄉所冀猛火烈山而莫焚大浸稽天而不溺既遇舍爾省括之中縱使飯術解漂之餌山經不沈之木豈可免爾之圖乎兹中江自首創至于今時數千里子更代易主㠀流波秏纔可接腋於井蛙詎持頥於海鼈爾之所處豈不狹隘乎人之所賞豈有舳艫乎逮天寶載我皇恢土徳以慱之竇澤流以濬之積閏下之波瀾用濟川之舟檝豈不為幸於爾也爾何滿以致益凶以自斃使彼都人士自此之後懼爾同失神之海惡爾甚探手之湯匪徒歇爾盛事過自掇也雖悔可追然靈莫尊於君人時莫美於陽春君固愛人種德乗春宥罪省囹圄去桎梏爾奚得恃宅無聞括守有曲襲不辜於止獄之候繫餘殃於積慶之家僕謂數子呌天曹訴地府黜爾主職在于斯須不然僕見欲上書於承明廬徴菑近速周處擊劔長逐擘波深搜爾居遁逃則焦僥東請長臂者灑漉之又於雄棠北使長股者慿踐之不然邀離朱以視之命宋定以縛之然後調馬梅扇獸炭是烹是醢以報東門爾儻若混空隠形和水匿象則使牛曳蛇尾絶其本根縱逢山見彘毛終難必復矣僕亦宜念五六日至于旬時恐爾有詞曰予不誡視成不令而行故矢在弦上垂而未發儻能易轍僕則既往不咎若為刻舟爾則何辭以對徐察爾變惟審圖之唐文粹巻三十三上欽定四庫全書唐文粹巻三十三下宋姚鉉編文丁總一十五首傷悼題哀辭後附弔古戰塲文李華弔國殤文張説弔九江驛碑材文歐陽詹悲剡溪古藤文舒元輿弔韓弇没胡中文李觀哀二良文白居易奠相國令狐公文李商隠祭韓侍郎文李翺祭獨孤常州文崔祐甫祀吕衡州化光文栁宗元為常州獨孤使君祭李員外文梁肅祭栁子厚文韓愈祭栁栁州文皇甫偍祭亡友故揚州功曹蕭公文李華歐陽生哀辭韓愈弔古戰塲文李華浩浩乎平沙無垠夐不見人河水縈帶羣山糾紛黯兮慘悴風悲日曛蓬斷草枯凛若霜晨鳥飛不下獸挺亡羣亭長告余曰此古戰塲也常覆三軍往往鬼哭天隂則聞傷心哉秦歟漢歟將近代歟吾聞夫齊魏徭戍荆韓召募萬里奔走連年暴露沙草晨牧河氷夜渡地闊天長不知歸路寄身鋒刃腷臆誰訴秦漢而還多事四夷中州耗斁無世無之古稱戎夏不抗王師文教失宣武臣用竒竒兵有異於仁義王道迂闊而莫為嗚呼噫嘻吾想夫北風振漠胡兵伺便主將驕敵期門受戰野豎旄旗川迴組練法重心駭威尊命賤利鏃穿骨驚沙入面主客相搏山川震眩聲拆江河勢崩雷電至若窮隂凝閉凛冽海隅積雪没脛堅氷在鬚鷙鳥休巢征馬踟蹰繒纊無温墮指裂膚當此苦寒天假强胡慿凌殺氣以相剪屠徑截輜重横攻士卒都尉新降將軍復没屍填巨港之岸血滿長城之窟無貴無賤同為枯骨可勝言哉鼓衰兮力盡矢竭兮弦絶白刃交兮寳刀折兩軍蹙兮生死决降矣哉終身夷狄戰矣哉暴骨沙礫鳥無聲兮山寂寂夜正長兮風淅淅魂魄結兮天沉沉鬼神聚兮雲羃羃日光寒兮草短月色苦兮霜白傷心慘目有如是耶吾聞之牧用趙卒大破林胡開地千里遁逃匈奴漢傾天下財殫力痛任人而已其在多乎周逐獫狁北至大原既城朔方全師而還飲至策勲和樂且閑穆穆棣棣君臣之間秦起長城竟海為關荼毒生人萬里朱殷漢繫匈奴雖得隂山枕骸徧野功不補患蒼蒼蒸民誰無父母提擕捧負畏其不夀誰無兄弟如足如手誰無夫婦如賔如友生也何恩殺之何咎其存其没家莫聞知人或有言將信將疑悁悁心目寢寐見之布奠傾觴哭望天涯天地為愁草木悽悲弔祭不至精魂無依必有凶年人其流離嗚呼噫嘻時耶命耶從古如斯為之奈何守在四夷弔國殤文張説北伐兮東胡邈遼陽兮孤竹偏師兮覆衆在崇山兮峽谷露芁芃兮蔓草風蓁蓁兮拱木見馬血兮夜燃聞殤魂兮雨哭君王按金鼓而氣憤撫珠鈴而淚滋横萬里兮抽恨弔羣山而寫悲懟凶將兮我辱悼勇夫之狄纍彼前鑒兮未逺何後來兮不追對死地兮出陣臨傷門兮用師軍奪帥兮虹食壘車脱腷兮火焚旗有欒黶兮愎矣無范宣兮愧之命窮迮兮短兵錯膚迎刃兮血染鍔旅殘潰兮棄組練山猶號兮谷餘戰殪原野兮奈何違君親兮不見於戲何天命之奄忽俾仁義之治兵為蠻夷之俘骨鬷六校之飛將鎮五營之勁卒吾見出兮不歸噫名存兮身没弔九江驛碑材文歐陽詹弔傷而有辭者也噫九江之驛碑其何興辭而弔歟斯碑之材昔大師魯國顔忠肅公所建祖亭之碑也公素負辭華代之銘誌多公之辭又好採異留名之致頃為湖州牧州産碑材石每使工琢之與辭兼行磨礱而成常心使用者不可勝數斯碑也終山之窮僻得之於自然趺本有龜䕶頂有螭雖不甚成而拏躩僨興如神如靈公神而珍之精選所處湖州無稱立罷守歸朝載而途卜出蘓臺入毗陵亦無稱立轉丹陽遊建業亦無稱立次江州州南有}
