body:
  text: 吳興姚鉉纂碑十四揔八首釋二上都大安國寺大達法師玄祕塔碑裴休大唐興善寺大廣智不空三藏碑嚴郢澧州藥山故惟儼大師碑唐伸衡州般若寺觀音大師碑張正甫越州開元寺故律和尚塔碑梁肅衡山大明寺律和尚塔碑栁宗元撫州景雲寺律和尚塔碑白居易廬山東林寺律大德熙怡大師碑許堯佐唐故左街僧録內供奉三教談論引駕大德安國寺上座賜紫大達法師玄祕塔碑銘并序裴休玄祕塔者大法師端甫靈骨之所歸也於戲為丈夫者在家則張仁義禮樂輔天子以扶世導俗出家則運慈悲定慧佐如來以闡教利生捨此無以為丈夫也背此無以為達道也和尚其出家之雄乎天水趙氏世為秦人初母張夫人夢梵僧謂曰當生貴子即出囊中舍利使吞之及誕所夢僧白晝入其室摩其頂曰必當大弘法教言訖而滅既成人高顙深目大頥方口長六尺五寸其音如鐘夫將欲荷如來之菩提鑿生靈之耳目固必有殊祥竒表歟始十歲依崇福寺道悟禪師為沙彌十七正度為比丘隸安國寺具威儀於西明寺照律師稟持犯於崇福寺升律師傳唯識大義於安國寺素法師通涅槃大旨於福林寺峑法師復夢梵僧以舍利滿琉璃器使吞之且曰三藏大教盡貯汝腹矣自是經律論無敵於天下囊括川注逢原委會滔滔然莫能濟其畔岸矣夫將欲伐株杌於情田雨甘露於法種者固必有勇智宏辨歟無何謁文殊於淸涼衆聖皆現演大經於太原傾都畢會德宗皇帝聞其名徴之一見大恱常出入禁中與儒道議論賜紫方袍歲時錫施異於他等復詔侍皇太子於東朝順宗皇帝深仰其風親之若昆弟相與卧起恩禮特隆憲宗皇帝數幸其寺待之若賔友常承顧問注納偏厚而和尚符彩超邁詞理響捷迎合上旨皆契真乘雖造次應對未嘗不以闡揚為務繇是天子益知佛為大聖人其教有大不思議事當是時朝廷方削平區夏縛吳斡蜀潴蔡蕩鄆而天子端拱無事詔和尚率緇屬迎真骨於靈山開法場於祕殿為人請福親奉香燈既而刑不殘兵不黷赤子無愁聲蒼海無驚浪蓋參用真宗以毗大政之明效也夫將欲顯大不思議之道輔大有為之君固必有冥符玄契歟掌內殿法儀録左街僧事以摽表淨衆者凡一十年講涅槃唯識經論位處當仁傳授宗主以開誘道俗者凡一百六十座運三密於瑜伽契無生於悉地日持諸部十餘萬遍指淨土為息肩之地嚴金經為報法之恩前後供施數十百萬悉以崇飾殿宇窮極雕繪而方丈匡牀靜慮自得貴臣盛族皆所依慕豪俠工賈莫不瞻嚮薦金寶以致誠仰端嚴而禮足日有千數不可殫書而和尚即衆生以觀佛離四相以修善心下如地坦無丘陵王公輿臺皆以誠接議者以為成就常不輕行者唯和尚而巳夫將欲駕橫海之大航拯迷途於彼岸者固必有竒功妙道歟以開成元年六月一日西向右脅而滅當暑而尊容若生竟夕而異香猶鬱其年七月六日遷於長樂之南原遺命荼毗得舍利三百餘粒方熾而神光月皎既燼而靈骨珠圎賜諡大達塔曰玄祕俗壽六十七僧臘四十八門弟子比丘比丘尼約千餘輩或講論玄言或紀綱大寺修禪秉律分作人師五十其徒皆為達者於戲和尚果出家之雄乎不然何至德殊祥如此其盛也承襲弟子義均自政正言等克荷先業虔守遺風大懼徽猷有時堙沒而今閣門使劉公法緣最深道契彌固亦以為請願播淸塵休嘗遊其藩備其事隨善讃歎蓋無愧辭銘曰賢劫千佛第四能仁哀我生靈出經破塵教網高張孰辨孰分有大法師如從親聞經律論藏戒定慧學深淺同源先後相覺異宗偏義孰正孰駮有大法師為作霜雹趣真則滯涉俗則流象狂猿輕鈎檻莫收柅制刀斷尚生瘡疣有大法師絶念而遊巨唐啓運大雄垂教千載冥符三乘迭耀寵重恩顧顯闡讃導有大法師逢時感召空門正闢法宇方開崢嶸棟梁一旦而摧水月鏡像無心去來徒令後學瞻仰徘徊大唐興善寺大廣智不空三藏碑銘并序嚴郢和尚諱不空西域人也氏族不聞於中夏故不書玄宗燭知至道特見高仰迄肅宗代宗三朝皆為灌頂國師以玄言德祥開右至尊代宗𥘉以特進大鴻臚褒表之及示疾不起又就卧內加開府儀同三司蕭國公皆牢讓不允特賜法號曰大廣智三藏大曆九年夏六月癸未滅度於京師大興善寺代宗為之廢朝三日贈司空追諡大辨正廣智三藏和尚茶毗之時詔遣中謁者齎祝文祖祭申如在之敬睿詞深切嘉薦令芳禮冠羣倫舉無與比明年九月詔以舍利起塔于舊居寺院和尚性聰朗博觀前佛法萬要指緇門獨立邈蕩蕩其無雙稽夫真言字義之憲度灌頂升壇之軌迹即時成佛之速應聲儲祉之妙天麗且彌地普而深固非末學所能詳也敢不槩見序其大歸昔金剛薩埵親於毗盧遮那佛前受瑜伽最上乘義後數百歲傳於龍猛菩薩龍猛又數百歲傳於龍智阿闍梨龍智傳金剛智阿闍梨金剛智東來傳於和尚和尚又西遊天竺師子等國詣龍智阿闍梨揚攉十八會法法化相承自毗盧遮那如來至於和尚凡六葉矣每齋戒留中導迎善氣登禮皆答福應較然溫樹不言莫可記巳西域隘巷狂象奔突以慈眼視之不旋踵而象伏不起南海半渡天吳鼓駭以定力對之未移晷而海靜無浪其生也母氏有毫光照燭之瑞其殁也精舍有池水竭涸之異凡僧夏五十享年七十自成童至于晚暮常飾供具坐道場浴蘭焚香入佛知見五十餘年晨夜寒暑未曽須臾有傾欹懈倦之色過人絶逺乃如是者後學升堂誦説有法者非一而沙門惠朗受次補之記得傳燈之旨繼明佛日紹六為七至矣哉於戲法子永懷梁木將絶本行託余勒崇昔承微言今見几杖光容眇漠壇宇淸愴纂書昭銘小子何讓銘曰嗚呼大士起我三宗道為帝師秩為儀同昔在廣成軒后順風歲逾三千復有蕭公瑜伽上乘真語密契六葉授受傳燈相繼述者牒之爛然有第陸伏狂象水息天吳慈心制暴慧力降愚寂然感通其可測乎兩楹夢奠雙樹變色司空寵終辨正旌德天使祖祭宸衷悽惻詔起寶塔舊庭之隅下藏舍利上飾浮屠迹殊生滅法離有無刋石為偈傳之大都澧州藥山故惟儼大師碑銘并序唐伸上嗣位明年澧陽郡藥山釋氏大師以十二月六日終於修心之所後八歲門人持先師之行西來京師告于崇敬寺大德求所以發揮先師之耿光垂於不朽崇敬寺大德於余為從母兄也嘗參徑山得其心要自興善寬敬示滅之後四方從道之人將質疑傳妙罔不詣崇敬者嘗謂伸曰吾道之明於藥山猶爾教之闡于洙泗智炬雖滅法雷猶響豈可使明德不照至行湮沒矣惟大師生南康信豐縣自為兒童時未嘗處羣子戲弄之中往往獨坐如思如念年十七即南度大庾抵潮之西山得惠照禪師乃落髮服緇執禮以事大曆八年受具於衡嶽希琛律師釋禮矩儀動如宿習一朝乃言曰大丈夫當離法自靜焉能屑屑事細行於衣巾邪是時南嶽有遷江西有寂中嶽有洪皆悟心契乃知大圭之質豈俟磨礱照乘之珍難晦符彩自是寂以大乘法聞四方學徒至於指心傳要衆所不能達者師必默識懸解不違如愚居寂之室垂二十年寂曰爾之所得可謂浹於心術布於四體欲益而無所益欲知而無所知渾然天和合於大無吾無有以教矣佛法以開示羣盲為大功度滅衆惡為大德爾當以功德普濟迷途冝作梯航無久滯此由是陟羅浮涉淸涼歷三峽遊九江貞元𥘉因憩藥山喟然歎曰吾生寄世若萍蓬耳又何效其飄轉邪既披榛結菴才庇跌座鄉人知者因賫擕飲饌奔走而往師曰吾無德於人吾何以勞人乎哉並謝而不受鄉人跪曰願聞日費之具曰米一升足矣自是常以山𬞞數本佐食一食訖就座轉法華華嚴涅槃經晝夜若一始終如是者殆三十年矣遊方求益之徒知教之在此後數歲而僧徒葺居禪室接棟鱗差其衆不可勝數至於沃煩正覆導源成流有以見寂公先知之明矣忽一旦謂其徒曰乘郵而行及暮而息未有久行而不息者吾至所詣矣吾將有以息矣靈源自淸混之者相能滅諸相是無二色窮本絶外爾其悉之語畢隱几而化春秋八十四僧臘六十夏後二十日入室弟子沖虛等遷座建塔于禪居之東遵本教也始師常以大練布為衣以竹器為蹻自剃其髮自具其食雖門人百數童侍甚廣未嘗易其力珍羞百品鮮果駢羅未嘗易其食冬裘重燠暑服輕踈未嘗易其衣華室淨深香榻嚴潔未嘗易其處麋鹿環繞猛獸伏前未嘗易其觀貴賤迭來頂謁牀下未嘗易其禮非夫聲萬有契真空離攀緣於病本性淸淨乎物表焉能遺形骸忘嗜欲久而如一者邪其他碩臣重官歸依修禮於師之道未有及其門閫者故不列之於篇銘曰一物在中觸境而搖我示其元不境不跳西方聖人實言道要道要既得何言惟妙我源自濟我真自靈大包萬有細出無形曹溪所傳徒藏於密身世俱空曽何有物自見曰明是為至精出沒在我誰曰死生刻之琬琰立此巖岫作碑者伸期於不朽衡州般若寺觀音大師碑銘并序張正甫天寶三載觀音大師終于衡嶽山春秋六十八僧臘四十八元和十八年故大弟子道一之門人曰惟寬懷暉感塵劫遽遷塔樹巳拱懼絶故老之口將貽後學之憂丕若貽謀思揚祖德乃列景行託於廢文強名無迹以慰乎罔極之恩曰自騰蘭之演教于中土也殆將千歲達磨傳心至六葉也分為二宗不階初入頓入佛惠曹溪教旨於是乎傳弘而信之觀音其人也大師諱懷讓京兆杜氏其先因家安康即為郡人髫年駿發聰悟絶衆羣言所涉一覽無遺居常而未或好弄在醜而不可褻近嘗默觀止水因而顧影形儀顒若宛在鏡中三反厥像如初沛焉而心乎獝得還步未輟聞於空中曰佛法津梁俟子而大既應付囑爾盍勉之乃深割愛緑亟從剃落以荆土律藏之微密也大士智京在焉攝衣從之既進而儀法峻整冠於等輩以嵩嶽龍之泉海也長安長老在焉稽首咨之既授記而身心自在超出塵垢厭離文字思會宗元周法界以冥搜指曹溪而遐舉能大師方弘法施學者如歸涉其藩閫者十一二焉躋其室堂者又十一焉師以後學弱齡分於末席虛中而若無所受善閉而惟恐有聞能公異焉置之座右會一音吹萬有衍方寸彌大千同焉而支暢異焉而合同授祕印目為宗師乃陟武當窮棲十霜朅來衡嶽終焉是託惟般若聖概有觀音道場宴居斯宇因以為號或微言析理辨士順風而杜其口或杖屨將撰山靈借留而現於夢逺自梁益近從荆吳雲趨景附風動川至靈山勝會今古一時至矣哉未始聞也一公見性同德弘教鐘陵鬱為名家再揚木鐸而施及寬暉繼傳心燈共鎮國土乃追琢琬琰揭于故山楊其耿光以示來劫其受法弟子亦序列于左式明我教之有開焉銘曰不疾而速平平南宗窮行其教嶽嶽讓公秀發之英激于童齒出塵之像光於止水乃趨律會儀範孔修乃探密藏先覺同求曹溪實歸般若觀妙體是宗極湛乎反照一從委順六紀於兹教迹未衰靈峯巋而一公丕承峻其廊廡寬暉繼起重規疊矩乃掃塵塔乃植豐碑率是教者兹焉有歸越州開元寺律和尚塔碑銘并序梁肅釋氏先律師諱曇一字曇㣧報年八十僧夏六十一以大曆六年十二月七日滅度于越州開元寺遷座起塔于秦望山之陽制縗會葬者以千百數大師本南陽張氏曽祖隋太常恆始家會稽之山隂大師誕鍾粹氣聰悟夙發幼學五經因探禹穴至雲門寺遂依沙門諒公出家景龍中制度尋受具戒天縱辨慧益之以軌儀翕然巳為人望矣開元初西遊長安觀音亮律師見而竒之授以毗尼之學又依崇聖寺檀子法師學俱舍唯識從即度沙門善無畏受菩薩戒探道覩奧出類拔萃期月之間名動京師大師崖岸峻峙機神坦邁體識詳雅應用虛明得三藏之隱賾究諸宗之源底加以素解玄儒旁揔曆緯長老聞風而恱服公卿下榻以賔禮由是與少保兖國陸公象先賀賔客知章李北海雍徐中書安貞禇諌議庭誨及涇縣令萬齊融為儒釋之遊莫逆之友其導世皆先之以文行弘之以戒定入蘭室而馨香自發臨水鏡而毫髮必鑒不知其所由然矣開元二十六年復歸會稽謂人曰三世佛法戒為根本本之不修道逺乎哉故設教以尸羅為主取鄴郡律疏合終南事鈔括其異同詳發正義學徒賴焉大凡北際河朔南越荆閩四分之宗自我而盛烈炬之破昏黑羣流之赴淵澤適來之時行化也如彼有為而生乘化而息草木濳潤慈雲無心適去之時處順也如此人世遷轉道存運在瞻望不見寂寥空山哀哉銘曰越水漫漫崇山回合大師化滅式建靈塔𬗟慕上士誕修淨法有威有儀不穿不雜德溥化洽雲從海納勒銘垂後千萬億劫衡山大明寺律和尚塔碑銘并序柳宗元儒以禮立仁義無之則壞佛以律持定惠去之則喪是以離禮於仁義者不可與言儒異律於定惠者不可與言佛達是道者唯大明師師姓歐陽氏號曰惠聞唐開元二十一年始生天寶十一載始為浮啚大曆十一年始登壇為大律師貞元十三年十一月十日卒元和九年正月其弟子懷信道嵩尼無染等命高道僧靈嶼為行狀列其行事願刋之兹碑宗元今掇其大者言曰師先因官世家潭州為大族有勳烈爵位今不言大浮啚也凡浮啚之道衰其徒必小律而去經大明恐焉於是從峻洎侃以究戒律而大法以立又從秀洎昱以通經教而奧義以修由是二道出入隱顯後學以不惑來求以有得廣德二年始立大明寺于衡山詔選居寺僧二十一人師為之首乾元三年又命衡山立毗尼藏詔選講律僧七人師應其數凡其衣服器用動有師法言語行止皆為物軌執巾􅓢奉杖屨為侍者數百翦毛髮被教戒為學者數萬得衆若獨居尊若卑晦而光介而大灝灝焉無以加也其塔在祝融峯西趾下碑在塔東詞曰儒以禮行覺以律興一歸真源無大小乘大明之律是定是惠丕窮經教為法出世化人無量垂𥙿無際詔尊碩德威儀有繼道遍大洲徽音勿替祝融西麓洞庭南裔金石刻辭彌億千歲唐撫州景雲寺故律大德上弘和尚石塔碑銘并序白居易元和十一年春廬山東林寺僧道深懷縱如建沖契宗一至柔辨諸智則智明雲臯太易等凡二十輩與白黑衆千餘人俱實持故景雲大德弘公行狀一通贄錢十萬來詣潯陽請司馬白居易作先師碑會有故不果十二年夏作石墳成復來請會有病不果十三年冬作石塔成又來請始從之既而僧反山衆反聚落錢反寺府翌日而文就明年而碑立其詞云我聞竺乾古先生出世法法要有三曰戒定惠戒生定定生惠惠生八萬四千法門是三者迭為用若次第言則定為惠因戒為定根根植則苗茂因樹則果滿無因求滿猶夢果也無根求茂猶揠苗也雖佛以一切種智攝三界必先用戒菩薩以六波羅蜜化四生不能捨律律之用可思量不可思量如來十弟子中稱優波離善持律波離滅有南山大師得之南山滅有景雲大師得之師諱上弘姓饒氏曾祖君雅祖公恱父知恭臨川南城人童而有知故生十五歲發出家心始從舅氏剃落壯而有立故生二十五歲立菩提願從南嶽大圎大師具戒樂其所由生故大曆中不去父母之邦請隸于夲州景雲寺修道德應無所住故貞元𥘉離我所徙居洪州龍興寺説法親近善知識故與匡山法真天台靈𥙿荆門法裔暨興果神湊建昌惠進等五長老交遊佛法屬王臣故與薑相國公輔顔太師真卿暨本道廉使楊君慿韋君丹四君子友善提振禁戒故講四分律而從善逺罪者無其數隨順化緣故坐甘露壇而誓衆主盟者二十年荷擔大事故前後登方等施尸羅者十有八會救拔羣生故娑婆男女由我得度者萬五千五百七十二人示生無常故元和十年十月巳亥遷化于東林精舍示滅有所故是月丙寅歸全于南岡石墳住世七十七歲安居六十五夏自生至滅隨迹示教行止語默無非佛事夫施於人也博則反諸已也厚故門人鄉人報如不及繇是藝松成林琢石為塔塔有碑碑有銘銘曰佛滅度後薝蔔香衰醍醐味醨誰反是香誰復是味景雲大師景雲之生一匡苾芻中興毗尼景雲之滅衆將安仰法將疇依昔景雲來行道者隨踐迹者歸今景雲去升堂者思入室者悲爐峯之西虎溪之南石塔巍巍有紀事者以真實詞書于塔碑廬山東林寺律大德熙怡大師碑銘并序許堯佐大師諱熙怡姓曹氏桂陽人也舊勳前烈垂休積慶史氏詳之矣夫真如不逺其要在乎無垢妙理不深其要在乎見性本於真實暢於虛空俾聆芳咀潤孜孜請益則大師之教也大師體識深靜風度端敏受具戒於南嶽修律儀於東林常跌坐一室而四方學者差肩繼踵發此柔軟納其歸依嘉言玉振微文冰釋故崇德雅美臨壇持法垂五十年嘗以至德𥘉隸東林寺居舍利塔院數逾二紀而信心長者懷甘奉贄紛然並進監厨守藏不遑祗受既而悉歸精舍頒於衆僧大師率門人布衣糲食而巳故推巳以見相因相而歸空搜閲精微鑽研旨要常苦背悶而針石不能及也故中夜纍歎有神人撫背殊形駭物斯須乃去自兹窮討經論切磋心要加以律儀端靜受持動至感通之應固難盡書至於山鹿歸仁林鳥效祉大師之室不足駭也大曆五年躋五老峯望彭蠡臨瀑布乃構凌雲精室為經行之地旁引泉竇以滌塵垢近躡松壑以求淸涼丹崖雲岫勢若屏牖然趨風望景攀危輦重翼如而至者難以數計積十餘年乃止大林精廬杖屨衣巾屏居一室行住生卧無非道場乃淬法刃燃惠炬俾夫恂恂圍繞者割其縳導其迷洗然而自得也貞元中歸東林戒壇院以為吾道已成吾教巳行十二年丙子歲秋七月二十七日召門弟子曰吾隨化還須臾寂滅僧臘五十報齡七十一州閭赴弔道路銜悲宗師既沒法教疇依蓮沼蕪涸禪林凋折以其年八月十四日遷座于香谷原從人欲也大師精貫六藝旁達百氏嘗與故太師魯國公顔真卿故丞相天水趙公憬故鄭滑節度兼御史大夫范陽盧公羣今吏部侍郎弘農楊公於陵為參禪之侣幽鍵洞發玄言兩得門人法粲道鏡道寧道深道琛道建利辨等並三明繼軌四禪紹迹緣起皆泯空有兩詮卜商傳闕里之教龍樹演迦維之法其旨一也咸以夙承甘露願勒貞珉銘曰演暢微妙經行道揚昭昭大師啓迪無方孰云虛空不可思量載滌緣念永淸水地異物幽贊靈烏效瑞景行如存追思不墜白月在水澄虛則明至人臨池無垢則淸信而不渝沖而不盈宛彼堂廡空留法象門人紹德禪燈繼相式播芳塵以慰瞻仰重校正唐文粹卷第六十二
