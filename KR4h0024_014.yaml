front:
  text: 重校正唐文粹卷第十四之上
  hash: sha256:e6c5ff5d54971757ac871fe32566bce913c47195b2bc2c407fd1b956a1fe4870
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0024_SBCK_014-1a}
body:
  text: 吳興姚鉉纂詩戊揔六十四首古調歌篇一古風古風十一首李白古意三首王績覽古十四首道士吴筠古意二首賀蘭進眀古意九首釋貫休詠古李涉感古三首盧仝古意賈㠀効古釋皎然古興呂温諷古二首劉禹錫續古詩十首白居易古意贈補闕孟郊古意二首祖詠古意陸龜蒙古意李白古興權德輿古風十一首李白大雅乆不作吾衰竟誰陳王風委蔓草戰國多荆榛龍虎相啖食兵戈逮狂秦正聲何微茫哀怨起騷人楊馬激頺波開流蕩無垠廢興雖萬變憲章亦巳淪自從建安來綺麗不足珍聖代復元古垂衣貴清眞羣才屬休明乗運共躍鱗文質相炳煥衆星羅秋旻我志在刪述垂輝映千春希聖如有立絶筆於獲麟咸陽二三月宫柳黃金枝緑幘誰家子賣珠輕薄兒日暮醉酒歸白馬驕且馳意氣人所仰冶遊方及時子雲不曉事晩獻長楊辭賦達身巳老草玄鬢若絲投閣良可歎但爲此輩嗤莊周夢胡蝶胡蝶爲莊周一體更變易萬事良悠悠乃知蓬萊水復作清淺流青門種瓜人舊日東陵侯冨貴故如此營營何所求齊有倜儻生魯連特高妙眀月出海底一夕開光耀却秦振英聲後世仰末照意輕千金贈顧向平原笑吾亦澹蕩人拂衣可同調黃河走東溟白日落西海逝川與流光飄忽不相待春容捨我去秋髪巳衰改人生非寒松年貌豈長在吾當乗雲螭吸景駐光彩胡關饒風沙蕭索竟終古木落秋草黃登髙望戎虜荒城空大漠邊邑無遺堵白骨橫千霜嵯峨蔽榛莽借問誰凌虐天驕毒威武赫怒我聖皇勞師事鼙鼓陽和變殺氣發卒騷中土三十六萬人哀哀淚如雨且悲就行役安得營農圃不見征戍兒豈知關山苦李牧今不存邊人飼犲虎燕昭延郭隗遂築黃金臺劇辛方趙至鄒衍復齊來奈何青雲士棄我如塵埃珠玉買歌笑糟糠養賢才方知黃鵠舉千里獨徘徊天津三月時千門桃與李朝爲斷腸花暮逐東流水前水復後水古今相續流新人非舊人年年橘上遊雞鳴海色動謁帝羅公侯月落西上陽餘輝半城樓衣冠照雲日朝下散皇州鞍馬如飛龍黄金絡馬頭行人皆辟易志氣横嵩丘入門上髙堂列鼎錯珍羞香風引趙舞清管隨齊謳七十紫鴛鴦雙雙戲庭幽行樂爭晝夜自言度千秋功成身不退自古多愆尤黃犬空歎息緑珠成釁讎何如鴟夷子散髪棹扁舟郢客吟白雪遺響飛靑天徒勞歌此曲舉世誰爲傳試爲巴人唱和者乃數千吞聲何足道歎息空悽然燕趙有秀色綺樓青雲端眉目豔皎月一笑傾城歡常恐碧草晩坐泣秋風寒纎手怨玉琴清晨起長歎焉得偶君子共成雙飛鸞羙人出南國灼灼芙蓉姿皓齒終不發芳心空自持猶來紫宫女共妬青蛾眉歸去瀟湘沚沉吟何足悲古意三首王績幽人在何所紫巖有仙躅月夜橫寶琴此外將安欲材抽嶧山榦徽點崑丘玉􅃮抱蛟龍脣絲纒鳳凰足前彈廣陵罷後以明光續百金買一聲千金傳一曲世無鍾子期誰知心所屬桂樹何蒼蒼秋來花更芳自言歲寒性不知露與霜幽人重其德徙植臨前堂連攀八九樹偃蹇二三行枝枝自相紏葉葉還相當去來雙鴻鵠栖息兩鴛鴦榮䕃誠不厚斤斧亦勿傷赤心許君時此意那可忘彩鳳欲將歸提羅岀郊訪羅張大澤巳鳳入重雲颺朝栖崑閬木夕飲蓬壷漲問鳳那逺飛賢君坐相望鳯言何深德微禽安足尚但使鶵卵全無令矰繳放皇臣力牧舉帝樂簫韶暢自有來巢時明年阿閣上覽古十四首道士呉筠聖人重周濟眀道欲救時孔席不暇暖墨突何甞緇興言振頺綱將以有所維君臣恣淫惑風俗日凋衰三代業遽隕七雄遂交馳庶物墜塗炭區中若棼絲秦皇燎儒術方冊靡孑遺大漢歷五葉斯文復崇推乃驗經籍道興世同屯夷㢮張固天意設教安能持興亡道之運否泰理所全奈何淳古風旣徃不復旋三皇巳散朴五帝𥘉尚賢王業與覇功浮僞日以宣忠誠及狙詐殽混安可甄餘智入九霄守愚淪重泉永懷巢居時感涕徒泫然棟宇代巢穴其來自三皇跡生固爲累經始増百王瑶臺旣滅夏瓊室復隕湯覆車世不悟秦氏興阿房繼踵迷反正漢家崇建章力役弊萬人瓌竒殫八方狥志仍未極促齡巳云亡侈靡竟何在荆榛生廟堂閑居覽前載惻彼商與秦所殘必忠良所寶皆兇嚚昵䛕方自聖不悟禍滅身箕子作周輔孫通爲漢臣洪範及禮儀後王用經綸吾觀采苓什復感青蠅詩䜛佞亂忠孝古今同所悲姦邪起譛猾骨肉相殘夷漢儲殞江充晉嗣滅驪姬天性猶可間君臣固其冝子胥烹吴鼎文種斷越鈹屈原沉湘流厥感戚自貽何不若范蠡扁舟無還期甞稽眞仙道清寂祛衆煩秦皇及漢武焉得遊其藩情擾萬機屑位驕四海尊旣欲先宇宙仍規後乹坤崇高與乆逺物莫龍兩存矧乃恣所慾荒淫伐靈根金膏特延期玉色復動䰟征戰窮外域殺傷被中原天鑒諒難誣神理不可諼安期返蓬萊王母還崑崙異術終莫告悲哉竟何言魯侯祈正術尼父從棄捐漢主思英才賈生被排遷始皇重韓子及覩乃不全武帝愛相如旣徵復忘賢貴逺世咸爾賤今理共然方知古來主難以効當年食其昔未偶落魄爲狂生一朝君臣契雄辯何縱橫運籌康漢業憑軾下齊城旣以智所達還爲智所烹豈若終殘貧酣歌本無營晁錯抱逺䇿爲君納良規削彼諸侯權永用得所冝姦臣負舊隙乗釁謀相危世主竟不辨身戮宗且夷漢景稱欽眀濫罰猶如斯比干與龍逢殘害何足悲絳侯成大績賞厚位仍尊一朝對獄吏榮辱安可論蘇生佩六印弈弈爲殃源主父食五鼎昭昭成禍根李斯佐二辟巨釁鍾其門霍孟翼三后伊戚及後昆天人忌盈滿兹理固永存方知得意者何必乗朱輪滅景栖逺壑弦歌對清罇二踈返濵海蔣詡歸林園蕭灑去物累此謀誠足敦至人順通塞委命固無疵吾觀太史公可謂識道規留滯焉足憤感懷殄生涯吾歎龔夫子秉義確不移晦跡一何晚天年天當時薰膏自銷鑠楚老空餘悲達者貴量力至人尚知幾京房洞幽賛神奥咸發揮如何嫉元惡不悟禍所歸謀物闇謀巳誰言爾精微玄元明知止大雅尚保躬茂先洽聞者幽賾咸該通弱年賦鷦鷯可謂達養蒙晚節希鸞鵠長飛戾曽穹知進不知退遂令其道窮伊昔辨福𥘉胡爲迷禍終方驗嘉遁客永貞天壤同聖人垂大訓奥義不苟設天道殃頑兇神明祐懿哲斯言猶影響安得復㢠穴鯀瞍誕英睿唐虞育昬孽盗跖何延期顔生乃短折魯隠全克讓禍機遂濳結楚穆肆巨逆福柄奚赫烈田常弑其主祚國乆罔缺管仲存霸功世祖成詭說漢氏方版蕩羣閹恣邪譎謇謇陳蕃徒孜孜抗忠節誓期區宇靜爰使兇醜絶謀恊事靡從俄而反誅滅古來若兹類紛擾難盡列道遐理微茫誰爲我昭晣吾將詢上帝寥廓詎躋徹巳矣勿用言忘懷庶自恱古意二首賀蘭進明秦庭𥘉指鹿羣盗滿山東忤意皆誅死所言誰肯忠武關猶未啓兵入望夷宫爲祟非涇水人君道自窮崇蘭生澗底香氣滿幽林采采欲爲贈何人是同心日暮徒盈把徘徊憂思深慨然紉雜佩重奏丘中琴古意九首釋貫休一雨火雲盡閉門心冥冥蘭花與芙蓉滿院同芳馨佳人天一涯好鳥鳴嚶嚶我有雙白璧不羡於虞卿我有徑寸珠別是天地精玩之室生白蕭灑身安輕只應天上人見我雙眼明陽烏爍萬物草木懷春恩茫茫塵土飛培擁名利根我本事簑笠㓜知天子尊學爲毛氏詩亦多直致言不慕需臑類附勢同崩奔唯尋桃李蹊去去長者門羙人如遊龍被服金鴛鴦手把古刀尺在彼白玉堂文章深掣曵珂珮鳴玎璫好風吹桃花片片落銀床何妨舉羽翰逺逐朱鳥翔乾坤有清氣散入詩人脾聖賢遺淸風不在惡木枝千人萬人中一人兩人知憶在東溪日花開葉落時幾擬以黃金鑄作鍾子期莫輕白雲白不與風雨㑹莫見守羊兒謂是𥘉平輩人生非日月光輝豈長在一榮與一辱今古常相對君不見于公門子孫好冠蓋古交如眞金百鍊色不回今交如暴流倐忽生塵埃我恐君子氣散爲靑松栽我恐荆棘花只爲小人開傷心復傷心吟上高高臺常思謝康樂文章有神力是何清風清凜然似相識一種爲頑嚚得作翻經石一種爲枯槁得作登山屐永嘉爲郡後山水添鮮碧何當舉羽翰一去觀遺迹常思李太白仙筆驅造化玄宗致之七寳牀虎殿龍樓無不可一朝力士脫靴後玉上青蠅生一箇紫皇案前五色麟忽然掣斷黃金鏁五湖大浪如銀山滿船載酒槌鼓過賀老成異物顚狂誰敢和寜知江邊墳不是猶醉卧檍在山中時丹桂花葳㽔紅泉浸瑶草日夕生華滋箬屋開地爐翠牆挂藤衣看經竹䆫邊白猿三四枝東峯有老人眼碧頭骨竒種薤煑白石旨趣如孾兒月上來打門月落方始歸授我微妙訣恬淡無所爲別來六七年只恐白日飛詠古李渉大智思濟物道行心始休垂綸自消息歲月任春秋紂虐武旣賢風雲固可求順天行殺機所向恊良謀況以丈人師將濟安川流何勞問枯骨再取隂陽籌霸國不務人兵戈恣相酬空令渭水跡千古獨悠悠感古三首盧仝天生聖明君必資忠賢臣舜禹竭股肱共佐堯爲君四載成地理七政齊天文階下蓂莢主琴上南風薰輪轉夏殷周時復猶一人秦漢事䜛巧魏晉忘機鈞猜忌相翦滅邇來迷恩親以愚保其身不覺身沉淪以智理其國遂爲國之賊苟圖容一身萬事良可惻可憐萬乗君聦明受沉惑忠良伏草莽無因施羽翼日月異又蝕天地晦如墨旣亢而後求異哉龍之德人生何所貴所貴有終始昨日盈尺璧今日盡瑕棄蒼蠅點垂棘巧舌成錦綺箕子爲之奴比干諌而死仲尼魯司㓂岀走爲群婢假如屈原醒其柰一國醉一國醉呶號一人行清髙便欲激頺波此事眞徒勞上山逢猛虎入海遭巨鼇王者苟不死腰下魚鱗刀東海波連天三度成桑田高岸髙於屋斯須變溪谷天地猶尚然人情難乆全夜半白刃讎旦來金石堅蕭綬旣解拆陳印亦棄捐竭節遇刀割輸忠遭禍纒不予衾之眠信予衾之穿明鏡不自照膏潤徒自煎抱劒長太息淚墮秋風前古人不患寡所患患不均單醪投長河三軍盡沉淪今人異古人結託唯親賔毀拆唯鵲巢不行鳲鳩仁鄙悋不識分有心占陽春鸞鶴日巳踈燕雀日巳親小物無大志安測栖松筠恩眷多棄故物情尚逐新瓦礫暫拂拭光掩連城珍脣吻恣談鑠黃金成灰塵蘇秦北遊趙張禄西入秦旣變嫂叔節仍擯華陽君萬世金石交一餉如浮雲骨肉且不顧何况長覉貧古意賈㠀碌碌復碌碌百年雙轉轂志士中夜心良馬白日足俱爲不等閑誰是知音目眼中兩行淚曽弔三獻玉効古天寳十四年釋皎然日出天地正煌煌闢晨曦六龍驅羣動古今無盡時夸父亦何愚競走先自疲飲乾咸池水折盡長桑枝渴死化爝火嗟嗟徒爾爲空留鄧林在摧折令人嗤古興吕温越歐百錬時楚卞三泣地二寳無人識千齡皆棄置空巖起白虹古獄生紫氣安得命世客直來開奥祕劒任刜鐘看玉從投火試必能絶疑惑然後論竒異諷古二首劉禹錫軒后𥘉冠冕前旒爲蔽明安知從椱道然後見人情簿領乃俗士淸談信古風吾觀蘇令綽朱墨一何工續古詩十首白居易戚戚復戚戚送君逺行役行役非中原海外黃沙磧伶俜獨居妾迢逓長征客君望功名歸妾憂生死隔誰家無夫婦何人不離拆所恨薄命身嫁遲别日迫妾身有存没妾心無改易生爲閨中婦死作山頭石掩涕別郷里飄颻將逺行茫茫緑野中春盡孤客情驅馬上丘壠髙低路不平風吹棠黎花啼鳥時一聲古墓何代人不知姓與名化作路傍土年年春草生感彼忽自悟今我何營營朝采山上薇暮采山上薇歲晏薇亦盡飢來何所爲坐飮白石水手把青松枝擊節獨長歌其聲清且悲櫪馬非不肥所苦長絜維豢豕非不飽所憂竟爲犧行行歌此曲以慰常苦飢雨露長纎草山苗髙入雲風雪折勁木澗松摧爲薪風摧此何意雨長彼何因百丈澗底死寸莖山上春可憐苦節士感此涕盈巾窈窕雙鬟女容德俱如玉晝居不踰閾夜行常秉燭氣如含露蘭心如貫霜竹冝當備嬪御胡爲守幽獨無媒不得選年忽過三六歲暮望漢宫誰在黃金屋邯鄲進倡女能唱黃花曲一曲稱君心恩榮連九族栖栖逺方士讀書三十年業成無知已徒歩來入關長安多王矦英俊競攀援幸隨衆賔末得厠門館間東閣有旨酒中堂有管絃何爲向隅客對此不開顔冨貴無是非主人終日歡貧賤多悔尤客子中夜歎歸去復歸去故郷貧亦安涼風飄嘉樹日夜減芳華下有感秋婦攀條苦悲嗟我本幽閑女結髪事豪家豪家多婢僕門内頗驕奢良人近封矦岀入鳴玉珂自從冨貴來恩薄纔言多冡婦獨守禮群妾互竒袤但信言有玷不察心無瑕容光未銷歇歡愛獨蹉跎何意掌上玉化爲眼中沙盈盈一尺水浩浩千丈河勿言小大異隨分有風波閨房復猶爾邦國當如何心亦無所逼身亦無所拘何爲膓中氣鬱鬱不得舒不舒良有以同心乆離居五年不見面三年不附書念此令人老抱膝坐長吁豈無盈罇酒非君誰與娱攬衣岀門行遊觀遶林渠澹澹春水暖東風生緑蒲上有和鳴鴈下有掉尾魚飛沉一何樂鱗羽各有徒而我方獨處不與之子俱顧彼自傷已禽魚之不如出遊欲遣憂孰知憂有餘春旦日𥘉出曈曈耀晨輝草木照未逺浮雲巳蔽之天地黯以晦當午如昏時雖有東南風力微不能吹中園何所有滿地靑靑葵陽光委雲上傾心欲何依古意贈補闕孟郊曲木忌日影䜛人畏賢明自然照燭間不受邪佞輕不有百錬火孰知寸金精金鉛正同爐願分麤與精古意二首祖詠楚王意何去獨自留巫山偏使世人見迢迢江水間駐舟春潭裏誓願拜靈顔夢寐覩神女金沙鳴珮環閑豔絶世姿令人氣力微含笑黙不語化作朝雲飛夫差日淫放舉國求妃嬪自謂得王寵代間無美人碧羅蒙天閣坐輦乗芳春宫女數千騎常遊江上濵年深王顔老時薄花䊋新拭淚下金殿嬌多不顧身生前妬歌舞死後同灰塵冡墓令人哀哀於銅雀臺古意陸龜蒙君心莫淡薄妾意正栖託願得雙車輪一夜生四角古意李白白酒𥘉熟山中歸黃雞啄黍秋正肥呼兒烹雞酌白酒男女歡笑牽人衣高歌取醉欲自慰起舞落日爭光輝遊說萬乗苦不早著鞭跨馬渉逺道㑹稽愚婦輕買臣余亦辭家方入秦仰天大笑出門去我輩豈是蓬蒿人古興權德輿月中有桂樹無翼難上天海底有驪珠下隔萬丈淵人生大限雖百歲就中三十稱一世晦眀烏兔相推遷雪霜漸到雙鬢邊紀憂重校正唐文粹卷第十四之下吳興姚鉉纂詩巳揔五十六首古調歌篇二雜興四十七雜興聶夷中雜言謝陶雜詩首權德􅺿雜詩六首李華雜詩二首張說雜詩二首儲光義雜感鮑防雜言司空圖雜詩獨孤及雜諷九首陸龜䝉感興崔膺遣興三首杜甫寓言二首賈至寓興賈㠀寓興歐陽唐不欺賈㠀辯士新昌里姚合口號賈㠀絶句悲歌三首顧況美人陸龜䝉客思楊敬之感事陸龜䝉寓言孟效傷感九汾隂行李嶠八月五日歌顧況三郷驛伏覩玄宗望女几山詩小臣斐然有感劉禹錫江南遇天寳樂叟白居易連昌宫詞元稹感興李涉玊華宫杜甫至開化里壽春公故宅韋應物杜秋娘詩杜牧雜興聶夷中兩葉能蔽目雙豆能塞聦理身不知道將爲天地聾擾擾造化內茫茫天地中苟或有所願毛髪亦不容雜言謝陶天不與人言禍福能自至水火雖活人暫不得即死蹈之焚斯須憑之溺容易水火與禍福豈有先言耳雜詩三首權德輿婉彼嬴氏女吹簫偶簫史彩鸞駕飛煙綽約兩仙子神期諒交感相顧乃如此豈比成都人琴心中夜起陽臺巫山上風雨忽淸曠朝雲與遊龍變化千萬狀魂交復目斷縹緲難比況蘭澤不可親凝情坐惆悵淇水春正禄上宫蘭葉齊光風兩揺蕩鳴佩出中閨一顧授横波千金呈瓠犀徒然路傍子怳怳復悽悽雜詩六首李華黃鐘叩元音律呂更循環邪氣悖正聲鄭衛生其間典樂忽㳙微波浪與天渾嘈嘈鴟梟動好鳥徒緜蠻王吉歸郷里甘心長閉關玄黃與丹青五氣之正色聖人端其源上下皆有則齊侯好紫衣魏帝婦人飾女奴厭金翠傾海未滿臆何忍嚴子陵羊裘死荊棘甘酸不私人元和運五行生人受其用味正心亦平爪牙相踐傷日與性命爭聖人不能絶鑚燧與炮烹嗜慾乗此熾百金資一傾正消神耗衰邪勝體充盈顔子有餘樂瓢中寒水清隂魄淪宇宙太陽假其明臣道不敢專由此見虧盈未聞東菑稼一氣嘉穀成上天降寒暑地利乃可生葛藟附柔木繁隂蔽曽原風霜摧枝條不復庇本根女蘿依松栢然後得長存孔光尊董賢胡廣慚李固儒風冠天下而乃敗王度絳矦與慱陸忠朴受遺顧求名不考實文弊反爲蠧結交得書生書生鈍且直爭權復爭利終不得其力我逢縱橫者是我牙與翼相旋如疾風並命趨紫極奔車得停軌風火何用逼仁義豈有常肝膽反爲賊勿嫌書生直鈍直深可憶雜詩二首張說抱薰心恒焦舉斾心恒揺天長地自乆歡樂能幾朝君看西陵樹歌舞爲誰矯問子青霞意何事留朱軒自言心逺俗未始迹辭喧過蒙良時幸側息吏途煩簪纓非宿好文史棄前言夕卧北䆫下夢歸南山園白雲慚幽谷清風媿泉源十年兹賞廢佳期今復存挂冠謝朝侣星駕別君門雜詩二首儲光羲秋風肅天地太行高崔嵬猿狖淸夜吟其聲一何哀寂寥掩圭蓽夢寐遊蓬萊琪樹逺亭亭玉堂雲中䦕洪崖吹簫管素女飄颻來雨師旣先後道路無纎埃鄙哉楚襄王獨好雲陽臺渾胚本無象末路多是非逹士志寥廓所在能忘機耕鑿時末至還山聊採薇虎豹對我蹲鸑鷟傍我飛仙人空中來謂我勿復歸格澤爲君駕雲䨘爲君衣西遊崑崙墟可與世人違雜感鮑防漢家海内承平乆萬國戎王皆稽首天馬常銜首蓿花胡人歲獻蒲萄酒五月荔枝𥘉破顔朝離象郡夕函關鴈飛不到桂陽嶺馬走皆從林邑山甘泉御果垂仙閣日暮無人香自落逺物皆重近皆輕雞雖有德不如鶴雜言司空圖烏飛飛兔蹶蹶朝來暮去驅時節女媧秪解𥙷靑天不解煎膠黏日月雜詩獨孤及百花結成子春物捨我去流年惜不得獨立空閨暮心自有所待甘爲物華悞未必千黄金買得人一顧雜諷九首陸龜蒙紅𧖟縁枯桑靑繭大如甕人爭捩其臂羿矢亦不中微㣲待賢禄一一希入夢縱操上古言口噤難即貢蛟龍在怒水拔取牙角弄丹穴如可游家家畜孤鳳凶門尚兒戯戰血波澒溶社鬼苟有靈誰能遏秋慟童麋來觸犀德力不相及伊無愜心事秪有碎首泣況將鵬蝨校數又百與十攻如餓鴟叫勢若脫兔急斯爲朽關鍵怒犖抉以入年來横干戈末見拔城邑得非佐饔者齒齒待啜汁羈維豪傑輩四駭方少縶此皆乗時利縱舎在呼吸吾欲斧其吭無雷動幽蟄歌鵝慘于冰陸立懷所適斯人道仍閟不得不嗚呃當時布衣士亦作天子客至今東方生滿口自誇白終爲萬乗交談笑無所隔致君非有書乃是堯舜畫秖令侯門峻日掃貧賤迹朝趨九韶音莫列五鼎食如聞恭儉語謇謇事夕惕可拍伊牧肩功名被金石赤石可燒城䜛邪易爲伍詩人疾之甚取俾投犲虎長風吹窽木始有音韻吐無木亦無風笙簧由喜怒女媧鍊五石天缺猶可補當其利口銜罅漏不復數元精遺萬類雙目如牖户非是旣相叅重瞳亦爲瞽東南有狂兕獵者西北矢利塵白冥冥獨此清夜止無人語其事偶坐窺天紀安得東壁明洪洪用墳史搜揚好古士一以罄雲水流堪灑菁英風足去稗秕如能岀竒計坐可平賊壘徐陳羲皇道髙駕太平軌攫䟽成特雄濯垢爲具美貢賢當上賞景福視所履永播南薰音垂之萬年耳有蘗何靑靑空城雪霜裏千林盡枯槁苦節獨不死他遭匠石顧揔入犧黃美遂得保天年私心未爲恥髙從宿梟怪下亦容螻蟻大厦若掄材亭亭託君子左右佩劒者彼此亦相笑趨時與閉門喧寂不同調潛機取聲利自許臻乎妙志士以神窺慚然眞可弔天之發遐籟大小隨萬竅魁其鑪冶姿形質惟所召鼗笙磬竽瑟是必登淸廟伊聖不可欺誰能守蓬藋横笛喝秋風淸商入䟽越君居不夜城肯怨孤戍月呉兵甚犀利太白光突兀日巳費千金瘽聞侵一撥豈無惡年少縱酒遊俠窟募爲敗死軍去以梟叛卒豈無中林士貫穿學間骨兵法五十家浩蕩如溟渤髙懸鹿皮睡淸澗時依樾分巳諾煙霞全遺事干謁旣非格猛獸未可輕華髪北面師其謀幾能止征伐何妨秦董勇又有曹劌說堯舜尚詢蒭公平聽無忽朝爲壯士歌暮爲壯士歌壯士心獨苦傍人謂之何古鐡乆不快倚天無處磨將來易水上猶足生寒波捷可博飛狖健能超橐駞群兒被堅利索手安憑河驚飇掃長林直木謝科嚴霜凍大澤僵龍不如蛇昔者天血碧吾徒安歎嗟感興崔􅈾冨貴難義合困窮易感恩古來忠烈士多出貧賤門世上樹桃李但結繁華子白屋拘關人青雲壯心死本以勢利交勢盡交情已如何失情後始歎門易䡄遣興三首杜甫蟄龍三冬卧老鶴萬里心昔時賢俊人未遇猶視今嵇康不得死孔明有知音又如壠底松用捨在所㝷大哉霜雪榦歲乆爲枯林在昔龐德公未曽入州府襄陽耆舊間處士節尤苦豈無濟時䇿終竟畏羅罟林茂鳥有歸水深魚知聚舉家隱鹿門劉表焉得取蓬生先無根漂蕩隨高風天寒落萬里不復歸本叢客子念故宅三年門巷空悵望但烽火戎車滿關東生涯能幾何常在覊旅中寓言二首賈至凛凛秋閨夕綺羅知早寒玉砧調鳴杵始搗機中紈憶昨别離日桐花覆井欄今來思君時白露盈堦塼聞有關河信欲寄雙玉盤玉以委貞心盤以薦嘉飱嗟君在萬里使妾衣帶寛春草紛碧色佳人曠無期悠哉千里心欲採商山芝歎惜良㑹晚如何桃李時懷君晴川上佇立夏雲滋寓興賈㠀莫居暗室中開目閉目同莫趨碧霄路容飛不容歩暗室未可居碧霄未可趨勸君跨仙竹日下雲爲衢寓興歐陽詹桃李有竒質樗櫟無妙姿皆承慶雲沃一種春風吹美惡苟同歸喧囂徒爾爲相將任玄造聊醉手中巵不欺賈島上不欺星辰下不欺鬼神知心兩如此然後何所陳食魚味在鮮食蓼味在辛掘井須到流結交須到頭此語誠不謬敵君三萬秋辯士辯士多毀訾不聞談已非猛虎恣殺暴未常齧妻兒此理天所惑所惑當問誰求食飼鶵禽吐出美言詞善哉君子人揚光掩瑕疵新昌里姚合舊客常樂坊井泉濁而鹹新居新昌里井泉淸而甘僮僕慣苦飲食美翻憎嫌朝朝忍飢行戚戚如難堪中下無正性所習便滛躭一染不可變甚於茜與藍近貧日益廉近富日益貪以此當自警愼勿信邪讒口號賈㠀中夜忽自起汲此百尺泉林木含白露星斗在靑天絶句海底有眀月圎於天上輪得之一寸光可買千里春悲歌三首并序顧況情思發動聖賢所不免也故師乙陳其宜延陵審其音理亂之所經王化之所興信無逃聲豈徒文彩之麗遂作歌以悲之邊城路今日犁田昔人墓岸上沙昔時江水今人家今人昔人共長歎四氣相催節迴換明月皎皎入華池白雲離離度靑漢我欲昇天天隔霄我欲渡水水無橋我欲上山山路險我欲汲井井泉遥越人翠被今何夕獨立沙邊江草碧紫燕西飛欲寄書白雲何處逢來客新繫靑絲百尺繩心在君家轆轤上我心皎㓗君不知轆轤一轉一惆悵何處春風吹曉幕江南渌水通朱閣美人二八顔如花泣向春風畏花落臨春風聽春鳥別時多見時少愁人一夜不得眠瑶井玉繩相對曉軒轅黃帝𥘉得仙鼎湖一去三千年周流三十六洞天洞中日月星辰聮騎龍駕景遊八極軒轅弓劒無人識東海靑童寄消息美人陸龜蒙美人抱瑶瑟哀怨彈別鶴雌雄南北飛一旦異栖託諒非金石性安得宛如昨生爲並蔕花亦有先後落秋林對斜日光景自相薄猶欲悟君心朝朝佩蘭若客思楊敬之禾黍正離離南國翦白芝細腰沉趙女髙髻唱蠻姬路愧前岡月梳慚一頷絲郷心不可語獨念畏人知感事陸龜蒙將軍𬒳鮫凾秪畏金矢鏃豈知䜛箭利一中成赤族古來信簧舌巧韻凄鏘曲君聞恱耳音盡日聽不足𥘉因起毫髮漸可離骨肉所以賢達心求人須任目寓言孟郊誰言碧山曲不廢靑松直誰言濁水泥不汚明月色我有靑松心俗騁風霜力貞明旣如此摧折安可得汾隂行李嶠君不見昔日西京全盛時汾隂后土親祭祠齋宫宿寢設厨供撞鍾鳴皷樹羽旗漢家四葉才且雄賔延萬靈服九戎栢梁賦詩髙宴罷詔書法駕幸河東河東太守親掃除奉迎至尊導鑾輿五營將校列容衛三河縱觀空里閭回旌駐蹕降靈場焚香奠醑邀百祥金鼎發食正焜煌靈祇煒燁攄景光埋玉陳牲禮神畢舉麾上馬乗輿岀彼汾之曲嘉可游木蘭爲檝桂爲舟擢歌微吟綵鷁浮簫鼓哀鳴白雲秋歡娱宴洽賜羣后家家復除户牛酒聲明動天樂無有千秋萬歲南山壽自從天子向秦關玉輦金車不復還珠簾羽帳長寂寞鼎湖龍髯安可攀千齡人事一朝空四海爲家此路窮雄豪意氣今何在壇塲宫舘盡蒿蓬路逢古老長歎息世事回環不可測昔時青樓對歌舞今日黃埃聚荆棘山川滿目淚沾衣冨貴榮華能幾時不見只今汾水上唯有年年秋鴈飛八月五日歌顧況四月八日明星出摩耶夫人降前佛八月五日佳氣新昭成太后生聖人開元九年燕公說奉詔聽置千秋節丹靑廟裏貯姚宋花蕚樓中宴岐薛清樂靈香幾處聞鸞歌鳳吹動祥雲巳於武庫見靈鳥仍向晉山逢老君率土溥天無不樂河淸海宴窮寥廓梨園弟子傳法曲張果先生進仙藥玉座凄涼遊帝京悲翁迴首感承明雲韶九奏杳然逺唯有五陵松栢聲三郷驛伏覩玄宗望女几山詩小臣斐然有感劉禹錫開元天子萬事足惟惜當時光景促三郷陌上望仙山歸作霓裳羽衣曲仙心從此在瑤池三清八景相追隨天上忽乗白雲去世間空有秋風辭江南遇天寳樂叟白居易白頭病叟泣且言禄山未亂入梨園能彈琵琶和法曲多在華淸隨至尊是時天下太平乆年年十月坐朝元千官起居環佩合萬國㑹同車馬奔金鈿照耀石甕寺蘭麝薰煑温湯源貴妃宛轉侍君側體弱不勝珠翠繁冬雪飄颻錦𫀆暖春風蕩漾䨘裳翻歡娱未足燕㓂至弓勁馬肥胡語喧豳土人遷避夷狄鼎湖龍去哭軒轅從此漂淪到南土萬人死盡一身存秋風江上浪無限暮雨舟中酒一樽涸魚乆失風波勢枯草曾霑雨露恩我自秦來君莫問驪山渭水如荒村新豐樹老籠眀月長生殿暗鎻黄昏紅葉紛紛蓋欹瓦緑苔重重封壞垣唯有中官作宮使毎年寒食一開門連昌宫辭元稹連昌宫中滿宫竹歲乆無人森似束又有牆頭千葉桃風動落花紅蔌蔌宫邊老人爲余泣小年選進因曽入上皇正在望仙樓太眞同憑欄干立樓上樓前盡珠翠炫轉熒煌照天地歸來如夢復如癡何暇備言宫裏事𥘉過寒食一百六店舎無煙宫樹緑夜半月髙弦索鳴賀老琵琶定場屋力士傳呼覔念奴念奴潛伴諸郞宿須臾覔得又連催特勑街中許燃燭春嬌滿眼睡紅綃掠削雲鬟旋䊋束飛上九天歌一聲二十五郎吹管逐逡巡大徧梁州徹色二龜兹轟録續李謩壓笛傍宫牆偷得新翻數般曲念奴天寳中名妓善歌樓下酺宴累日之後萬衆喧隘嚴安之辛黃裳輩闢易而不能禁衆樂爲之罷奏玄宗常遣髙力士大呼於樓上日飲遣念奴習歌邠王二十五郎吹小管逐㸔人能聽否末甞不悄然奉詔其爲當時所重也如此然而玄宗不欲奪俠逰之盛未甞置在宫禁或歳幸温湯時廵東洛有司潛遣從行而巳又玄宗幸上陽宫夜後新翻一曲屬明夕正月十五日潛遊燈下忽聞酒樓上有笛奏前夕新翻之曲者大駭之眀月宻捕笛者詰驗之自云某其夕竊於天津橋上翫月聞宫中奏曲愛其新聲遂於天津橋柱以爪畫譜記之間其誰氏奏云臣即長安少年李謩也玄宗異之賜物遣去平明大駕發行宫萬人鼓舞途路中百官隊仗避歧薛楊氏諸姨車鬪風明年十月東都破御路猶存禄山過驅令供頓不敢藏萬姓無聲淚潛墮兩京定後六七年却尋家舎行宫前莊園燒盡有枮井行宫門闥樹宛然爾後相傳六皇帝不到離宫門久閉往來年少說長安玄武樓成花蕚廢去年勑使因斫竹偶值門開暫相逐荆榛櫛比塞池塘狐兔驕癡縁樹木舞榭欹傾基尚存文牎窈窕紗猶緑塵埋粉壁舊花鈿烏啄風箏碎珠玉上皇偏愛臨砌花依然御榻臨堦斜蛇出燕巢盤鬪栱菌生香案正當衙寢殿相連端正樓太眞梳洗樓上頭晨光未岀簾影黑至今反掛珊瑚鈎指向傍人因慟哭却出宫門淚相續自從此後還閉門夜夜狐狸上門屋我聞此語心骨悲太平誰致亂者誰翁言野父何分别耳聞眼見爲君說姚崇宋璟作相公勸諌上皇言語切爕理隂陽禾黍豐調和中外無兵戎長官清平太守好㨂選皆言由相公開元欲末姚宋死朝廷漸漸由妃子禄山宫裏養作兒虢國門前閙如市弄權宰相不記名依俙憶得楊與李廟謀顛倒四海揺五十年來作瘡痏今皇神聖丞相明詔書纔下吴蜀平官軍又取淮西賊此賊亦除天下寧年年耕種宫前道今年不遣子孫耕老翁此意深望幸努力廟謀休用兵感興李渉隋氏造宫闕峨峨偣雲煙搜竒竭四海立制謀千年秦兵半夜來烈火焚髙臺萬人聚筋血一旦爲塵埃君看汴河路尚說隋家柳但問哭陵人秋草没來乆玉華宫杜甫谿迴松風長蒼䑕竄古瓦不知何王殿遺構絶壁下隂房鬼火靑壞道哀湍瀉萬籟眞笙竽秋色正蕭灑美人爲黄土况乃粉黛假當時侍金輿故物獨石馬憂來籍草坐浩歌淚盈把冉冉征途間誰是長年者至開化里壽春公故宅韋應物寧知府中吏故宅一徘徊歴階存往敬瞻位泣餘哀廢井没荒草隂牖生緑苔門前車馬散非復昔時來杜秋娘詩并序杜牧杜秋金陵女也年十五爲李錡妾後錡叛滅籍之入宫有寵於景陵穆宗即位命秋爲皇子傅姆皇子壯封漳王鄭注用事誣丞相欲去巳者指王爲根王被罪廢削秋因賜歸故郷予過金陵感其窮且老爲之賦詩京江水淸滑生女白如脂其間杜秋者不勞朱粉施老濞即山鑄後庭千蛾眉秋持玉斚飲與唱金縷衣勸君莫惜金縷衣勸君須惜少年時花開堪折直須折莫待無花空折枝李錡長唱此辭濞旣白首叛秋亦紅淚滋吴江落日渡灞岸緑楊垂聮裾見天子盼眄獨依依椒壁懸錦幕鏡奩蟠蛟螭低鬟認新寵窈窕復融怡月上白壁門桂影涼參差金階露新重閑捻紫簫吹晉書盗開涼州張駿冢得紫玉簫莓苔夾城路南苑鴈𥘉飛紅粉羽林仗獨賜辟邪旗歸來煑豹胎饜飫不能飴咸池昇日慶銅雀分香悲雷音後車逺事往落花時燕禖得皇子壯髮緑緌緌畫堂授傅姆天人親捧持虎睛珠絡褓金盤犀鎭帷長楊射熊羆武帳弄啞咿漸抛竹馬戲稍出舞雞竒嶄嶄整冠佩侍宴坐瑤池眉宇儼圖畫神秀射朝輝一尺桐偶人江充知自欺王幽茅土削秋放故郷歸觚稜拂斗極迴首尚遟遟四朝三十載似夢復疑非潼關識舊吏吏髪巳如絲却喚吴江渡舟人爭得知歸來四隣改茂苑草菲菲淸血灑不盡仰天知問誰寒衣一匹素夜惜鄰人機我昨金陵過聞之爲歔欷自古皆一貫變化安能推夏姬滅兩國逃作巫臣車西子下姑蘇一舸逐鴟夷織室魏豹俘作漢太平基誤置代籍中兩朝尊母儀光武紹髙祖本係生唐兒珊瑚破髙齊作婢舂黃糜蕭后去楊州突厥爲閼氏女子固不定士林亦難期射鈎後呼父釣翁王者師無國要孟子有人毀仲尼秦因逐客令柄歸丞相斯安知魏齊首見斷簀中屍給喪蹶張輩廊廟冠峨危珥貂七葉貴何妨戎虜支蘇武却生返鄧通終死飢主張旣難測翻覆亦其宜地盡有何物天髙復何之指何爲而捉足何爲而馳耳何爲而聽目何爲而窺巳身不自暁此外何思惟因傾一樽酒題作杜秋詩愁來獨長詠聊可以自貽重校正唐文粹卷第十四之下
