  text: 四十一
  hash: sha256:181626f3e3b4a870fcf03683f80290d5ace9fe7dd7541d627e1e3818a38c7038
body:
  text: 宋姚鉉編議丙摠十二首諡議十一唐丞相太保贈太師苖晉卿諡議獨孤及唐丞相諡文貞楊綰諡議梁肅唐丞相江陵尹御史大夫吕諲諡議獨孤及駮議吕諲嚴郢重議吕諲獨孤及唐丞相贈司空李揆諡議權徳輿唐隴右節度經略大使郭知運諡議獨孤及駮議郭知運崔厦重議郭知運獨孤及唐御史中丞盧奕諡議獨孤及唐常州刺史獨孤及諡議權徳輿古諸侯世子諡議一晉諡恭世子議白居易唐丞相故太保贈太師苖晉卿諡議獨孤及太師稟天純懿為唐股肱兩朝當國庶績惟允論道賦政送往事居叶恭秉彞動罔違徳恵和以懋其事明哲以保其身昔嘗懸衡九流剖竹四郡刀尺之下無滯用襦袴之内無貧人洛陽居守東夏輯睦天寶之季二京為戎皇輿西狩億兆左祍太師踐危機不易心處横潰不忘國奮身拔跡於豺狼之口道不汙而節不奪忠之大者至徳乾元中天下多敬皇綱未張肅宗修漢宣故事用刑名繩下而太師以曺㕘為師持清静守職勵翼王度將順事典人亦寧一厥猷茂焉能知人能官人慎選乃僚言刈其楚至有拔羣萃而取公器不五六年比肩衮職者光映冊府當代榮之漢史稱胡廣與故吏陳蕃並為三司太師有焉夫九徳咸事寛為之首百工惟時哲則能恵宜其享天眉夀為國元老古者生以行觀其志沒以諡易其名字之美惡視行之大小後代或三字以表徳貞恵文子是也或二字以彰善鄼文終侯留文成侯是也蓋其跡大名盛則禮優諡崇太師徳冠搢紳位侔周召將加誄諡之制宜以鄼留為凖謹按大戴禮體和居中曰懿文賢有成曰獻稽千載之令典合二名以配徳請諡曰懿獻謹議唐丞相諡文貞楊綰諡議代太常荅蘇端駮議梁肅議曰有國之典存以位敘其徳沒以諡易其名名之小大視徳之美惡蓋書其著而略其微要其終而明其義故曰諡以尊名節以一恵恥名之浮於行也楊文貞體淳素之質協時中之徳爰自下列至於宰司秉心不渝動必由道與夫立功立事開物濟衆不同日語矣而清儉厲俗明哲保身曰文曰貞在我惟允秉公議者其誰曰不然今奉符謂公與元載交游嘗為載薦引載之咎惡悉歸於公斯乃昧於觀行定諡之義且非君子成人之美也請區而評之昔荀爽為董卓所舉致位三公及卓斁亂漢政可謂甚矣而漢史曽不以卓之過累於慈明晏子陳氏俱事齊侯陳志邪而晏志正春秋亦不以陳之惡延於平仲是知道不必合事不必同則載之於公其事可見況當載秉鈞而公不㕘大政載以時望慕我我則静而守中因疎為簡適見清節又有發載之惡皆漏泄之辭患自掇也庸可救乎及夫載覆其餗公膺大任任職月淺屢以疾辭位且不安安可以寂寥啟悟而責之乎昔季文子相三君無食粟之馬衣帛之妾君子以為忠楊公以大名厚位出入三朝無宅一區無馬一駟志於清白交不諂瀆可不謂貞乎掌訓誥秉銓衡處成均貳宗伯潤色王度無替厥美加以敏而好學見善如不及可不謂文乎謹按諡法貞之例有三清白守節曰貞大憲克就曰貞憂國忘死曰貞文之義有六經緯天地曰文道徳博聞曰文愍人接禮曰文不恥下問曰文慈恵愛人曰文修徳來逺曰文名既不備事亦殊貫又安可以二王三恪私廟家祭之闕併責於一名哉若具美果在一名則士文伯孔文子且無經緯天地之文孟武伯寗武子又非克定禍亂之武若以廢禮不稱其名則臧孫辰縱逆祀不得諡文管夷吾臺門反坫不得諡敬是知議名之道取其所長則捨其所短志其大行則遺其小節使善惡決於一字褒貶垂於將來蓋先王制諡之方也若綜覈名實形於公論宜取坦然明白彰於遐邇者今或乗人之意肆誣謗之辭所謂抉瑕刺骨之說非正議也且聖無全能才不必備以鄭公徵立言正色恥君不如堯舜其節大矣而昧於知人許公瓌固執遺詔廷沮邪計其志明矣終不能守故春秋為賢者諱過傳稱不以一眚掩大徳語曰無求備於一人蓋二公所以為文貞也若曰百行所歸九徳咸事如周公之文宣武之徳然後擬議則千古莫嗣而諡典絶矣安在一二蘇魏足為定制乎謹上㕘典禮近考故事楊公之名請如前議云爾唐丞相故江陵尹御史大夫吕諲諡議獨孤及吕諲任職従政聰敏肅給能以才智潤飾吏道至徳中與三司同鞫大獄獨引律文附會經義而平反之當時卒用中典諲㕘其論在台司齪齪雖無匪躬之能然平章法度守而勿失其為荆州一年有成號令明具賦斂均一物有制而事有倫大抵以威信為主戮陳希昻按申太芝之奸而三楚之人恱服厥功茂焉自至徳以來荷推轂受賑之寄處方面者數十輩而將不驕卒不墮政修人和如諲者蓋鮮矣豈不以兵散久矣而兵未戢挹濁流者難俟清整棼絲者難為功諲當此時能以慈恵易其疾苦且訓其三軍如臂使指闔境無拔葵啗棗之盜而楚人到于今猶歌詠之其識略必有過人者雖勿褒之其可乎按諡法威徳克就曰肅禁暴威也愛人徳也考禮議名而擬諸其形容請諡曰肅謹議駮議吕諲嚴郢伏以故相國江陵尹兼御史大夫贈吏部尚書吕公諲昔事先朝累當大任至徳之初天步艱難公首披荆榛扈蹕靈武忘軀進忠一日三接先朝察匪躬之節納沃心之議爰立作相弼諧神人其嘉謀嘉猷獻可替否之跡入則造膝出則詭辭温樹不言難可得而知也至有爛焉明白欲蓋而彰者請區而載之乾元收復之際兩都衣冠多繫於三司詔獄御史中丞崔良器議事失入時宰苗太師崔趙公等雖廷諍之然未堅決公有犯無隠引經正辭上是其言刑為之省所全活者蓋數百人明主收雷電之威聖朝行寛大之典者繄公之力也古者進賢受上賞書不云乎咎繇曰都在知人公踐台衡専以推賢任人為務故相國房公琯故吏部侍郎韋公陟入登右職皆公之由今相國黄門侍郎杜公之蒞江陵也公薦在方面之任今相國中書侍郎元公之在度支也公咨以幕府之政曽未數嵗而二相接武於上台天地交泰聖賢相得庶績咸熙五典克従者兹公之舉善也則子皮之舉子産鮑叔之舉管仲蕭何之舉曺㕘武侯之舉蔣琬方之前人我有餘地其在荆南也戢兵和衆令行禁止理績為天下最雖古之羊杜無得而踰今太常議荆南之政詳矣而曰在台司齪齪無匪躬之能者乃抉瑕掩瑜之論非中適之言也國家故事宰臣之諡皆有二字以彰善旌徳焉夫以吕公文能無害武能禁暴貞則幹事忠則利人盛烈𢎞規不可備舉傳敘八元之徳曰忠肅恭懿若以美諡擬於形容請諡吕公曰忠肅謹議重議吕諲獨孤及博士獨孤及議曰吕諲任宰相日淺當時會肅宗躬親萬務庶政羣臣畏威奉職而已雖有謨謀於巖廊之上莫由有知之者其荆門之政為仁由巳略見於事其恩恵被於物風謡存乎人故人得而稱之議名之際敢不闕其所疑而錄其尤者著者有司之職也其閱實訟獄在未執政之前前議之詳矣敢辱再告至若推進名賢使登大任既同温室之樹且行狀所不載孔子曰君子於其所不知蓋闕如也故不書今奉符令必用二字且以忠配肅謹按舊儀凡殁者之故吏得以行狀請諡於尚書省而考行定諡則有司存廷辯可否宜在衆議今駮議撰諡異同之說並故吏專之伏恐亂庖人尸祝之分違公器不私之誡且非唐虞師錫僉曰之道昔周道衰孔子作春秋以繩當代而亂臣賊子懼諡法亦春秋之微㫖也在懲惡勸善不在哀榮在議美惡不在字多文王伐崇周公殺三監誅淮夷晉重耳一戰而霸諸侯武功盛矣而皆諡曰文以兾缺之恪徳臨事寗俞之忠於其國隨會之納諫不忘其師言身不失其友其文徳豈不優乎而並諡曰武固知書法者必稱其大而略其細故言文不言武言武不言文三代已下朴散禮壊乃有二字之諡二字諡非古也其源生於衰周施及戰國之君漢興蕭何張良霍去病霍光俱以文武大略佐漢時致太平其事業不一謂一名不足以紀其善於是乎有文終文成景桓宣成之諡雖瀆禮甚矣然猶褒不失人唐興㕘用周漢之制謂魏徵以王道佐時近文直言極諫愛君而忘身近貞二徳並優廢一莫可故曰文貞公謂蕭瑀端直鯁亮近貞性多猜貳近褊言褊則失其謇正稱貞則遺其吝狹非一言所能名故曰貞褊公其餘舉凡推類大抵准此皆有為之也若跡無殊途事歸一貫則直以一字目之故杜如晦諡成封徳彞諡明王珪諡懿陳叔達諡忠温彦博諡恭岑文本諡憲韋巨源諡昭唐休璟諡忠魏知古諡忠崔日用諡昭其流不可悉數此並當時赫赫以功名居宰相位者諡不過一字不聞其子孫佐吏有以字少稱屈者由此言之二字不必為褒一字不必為貶若褒貶果在字數則是堯舜禹湯文武成康不如周威烈王慎靚王也齊桓晉文不如趙武靈魏安釐秦莊襄楚考烈也杜如晦王珪已下或成或明或懿或憲不如蕭瑀之貞褊也歴考古訓及貞觀以來制度似皆不然今奉所議云國家故事宰相必以二字諡未知出何品式請具諲當以為按據若忠者臣事君之常道苟靖恭于位誰則非忠非有炳然之異則不以為諡如議獄緩死任賢舉善徳之美者然肅者威徳克就之名足以表之矣月令曰孟秋天氣始肅詩曰曷不肅雍又肅肅王命仲山甫將之肅嚴也敬也忠之屬也天地不肅則嵗不成宗廟不肅則禮不立軍旅不肅則人不服肅之時義大矣哉以諲之従政也威能閑邪徳可濟衆故以肅易名而忠在其中矣亦猶隨會寗俞之不稱文豈必因而重之然後為美魏晉以來以賈詡之籌筭賈逵之忠壯張既之政能程昱之智勇顧雍之密重王渾之器量劉惔之鑒裁庾翼之志略彼八君子者方之東平宜無慙徳死之日並諡曰肅當代不以為貶何嘗徵一字二字為之升降乎謹上稽前典下據甲令㕘之禮經而究其行事請依前諡曰肅謹議唐丞相贈司空李揆諡議權徳輿將仕郎守太常博士臣權徳輿議曰李揆端莊粹温潔廉淑慎用文章術學資適逢時奮其英華以取貴達如良庖投刃無復肯綮歴諫曺左史司王言貳春官以至于平章大政在帝左右必以文誼藩身奉法遵職官曺無粃政姻族無倖人束帶山立敷陳前志儼然而温有碩儒大臣之度或起或廢其道甚夷昔觀射父能作訓辭以行事於諸侯左史倚相能道訓典以敘百物揆實有之建中中西戎乞盟以舊齒宿望將命殊俗結華夷之信董衣裳之會已事迴車嵗當興元匪躬靡盬至河池而殁追錫司空恩禮有加按諡法曰率事以信曰恭不懈于位曰恭揆果行求已致位台司歴官陟降十有八次周旋敬慎以揚職業不曰率事以信乎及逾懸車之年奉絶域之使受詔即路視險若夷貞厲盡瘁復於左轂不曰不懈于位乎昔韋𤣥成翟方進以經明為漢相而皆諡曰恭述揆所履節以一恵勤官死事炳然昭明有司易名請以恭諡故左武衛大將軍持節隴右節度經略大使兼鴻臚卿御史中丞贈涼州都督太原郡開國公郭知運諡議獨孤及郭知運驍勇有謀善於用兵起行間為唐上將當時唐興百餘載矣天下充富太倉有二十年之蓄𤣥宗循漢武故事方銳意拓土知運適與時會遂扶乗天威奮其材力敢與虜确故能破黙啜可汗以靖北庭敗吐蕃誅康待賓隴底以西烽火為息慰薦麾下吏士任必以材往往超倫績用茂著王君􅎢以果勇代處分閫之寄牛仙客出將入相以清幹信謹稱斯义奨拔之明也當時議者謂知運與郭虔瓘王晙薛訥並為中興名將至今隴上將士思之或有起祠宇於故城遺壘尸而祝之者上元中肅宗加太公望以武成王之號知運列於配食之位則其勲伐事業宜有以美稱易其名者謹按諡法服叛懐逺曰威易曰厥孚威如繫辭曰弧矢之利以威天下虞書曰董之用威傳曰非威非懐何以示徳則威者聖人所以佐仁義以齊天下者也施於名號可以表將帥之徳請諡知運曰威謹議駮議郭知運崔厦左司員外郎崔厦議曰郭知運承恩詔葬向五十年今請易名竊恐非禮謹按禮記云禮時為大又曰過時不為禮也昔衛公叔文子卒將葬其子戍請諡於君曰日月有時將𦵏矣請易其名者蓋時不可踰也節度既名不浮行數紀之前門生故吏巳合謀諡今乃申請竊將有為而作節度嗣子英乂頃屬多故屢制方隅朝廷䇿勲位表端揆附従者竊不中之禮會無妄之求況節度當開元初賵贈特加碑誌逾等皆出恩命追悼之遇亦巳當矣今又鹵莽外於典章追送往之闕遺啟將來之冒昧況今裂土者接畛専征者百輩若率而行之誰曰無請不惟有司疲於簡牘抑恐名器等於草芥雖欲曲全竊將不可又禮經云已孤暴貴不為父作諡若節度合諡而不以其時則嗣子廢先君之徳若不合諡而苟遂其志則先君因嗣子而見尊以僕射而言恐貽越禮之議以國家而言又殊旌善之體請下太常重議謹議重議郭知運獨孤及博士獨孤及議曰禮時為大順次之將次葬易名時也有故闕禮追逺請諡順也假如諸侯五月而葬魯恵公之薨也有宋師至隠公元年十月而改葬不以踰時廢禮又公叔戍請諡適當葬前謹按禮經曽不言巳葬則不可追諡況帝王殊塗不相沿襲新禮則死必有諡不云日月有時今請易名者五家無非葬後苗太師一年矣吕諲四年矣盧奕五年矣顔杲卿八年矣並荷褒寵無異時之論獨知運以其子不幸遂以過時見抑苟必以己葬未葬為例則八年與五十年其緩一也而與奪殊制無乃不可乎議云巳孤暴貴不為父作諡此謂其父無位而子居大官不當以已之貴加榮於父也禮不云乎父為士子為大夫葬以士耳若知運者處方面之寄位列九卿茂勲崇名與衛霍侔飾終之禮宜加於他將一等豈待因依嗣子然後作諡今之專征者率多起屠販皂隷之中雖逢風雲化為侯王其祖父爵位與知運齒者鮮矣奈何懼名器等於草芥以是殺禮竊謂近誣乾元以來累有詔追贈百官祖父内外文武具僚之先悉䝉恩錫或音徽乆没或墓木己拱受大名貴位於九原者以萬數未嘗以殁代逺近為限夫贈諡一也贈者一時之寵諡者不刋之令今以嵗久而廢易名是王澤浹於天下而獨隔於一人也當開元二年吐蕃以舉國之師入五原塞擊柝之聲聞於秦雍知運典郭虔瓘討平之以張王室當時微知運則汧隴之西左袵是懼今朝廷方将命將帥以征不服討不庭宜褒之以勸握兵者安可以葬久而廢大典況夫諡法者蓋考其言行事業之邪正必以字褒貶之使生者聞美諡而慕覩惡諡而懼不待賞罰而賢不肖皆勸是一字之諡賢於三千之刑本非為殁者之子孫以為哀榮寵贈之具假令知運無子且未嘗立勲苟位至上將則諡不可廢豈以其子之存亡為請諡之可否竊稽載籍徵諸舊章易名之禮請如前議謹議唐故御史中丞盧奕諡議獨孤及盧奕剛毅而忠直方而清勵精吏事所居可紀天寶十四載洛陽覆沒于時東都人士狼狽鹿駭猛虎磨牙而爭其肉居位者皆欲保性命而完妻子或先策髙足争脱羿彀或不恥苟活甘飲盜泉奕獨正身守位蹈義不去以死全節誓不辱勢窘力屈以朝服就執猶慷慨數賊梟獍之罪觀者股慄奕不變其色西向而辭然後受害雖古烈士方之者鮮矣或曰洛陽之存亡操兵者實任其咎非執法吏所能抗師將奔去之可也委身寇讎以死誰懟某以為不然勇者禦而忠者守必社稷是衛則死生以之危而去之是智免也於忠何有蓋荀息殺身於晉不食其言也仲由結纓於衛不避其難也𤣥冥勤其官而水死守位而忘軀也伯姬待保姆而火死先禮而後身也彼四人者死之日皆於事無補夫豈愛死而賈禍也以為死輕於義故蹈義而捐生古人書之使事君者勸然則祿山之亂大於里丕孔悝廉察之任切於𤣥冥之官分命所繫不啻保姆逆黨兵威烈於水火于斯時也能與執干戈者同其勠力挽之不來推之不去豈不以師可虧義不可苟身可殺節不可奪故全其持操于白刃之下孰與懐安偷生者同其風哉謹按諡法圖國忘死曰貞秉徳遵業曰烈奕執憲戎馬之間志藩王室可謂圖國矣國危不能拯而繼之以死可謂忘死矣歴官十一任言必正事必果而清節不撓去之若始至可謂秉徳矣先黄門以直道佐時奕嗣之以忠純可謂遵業矣請諡曰貞烈謹議唐故常州刺史獨孤及諡議權徳輿將仕郎守太常博士權徳輿議曰獨孤及剛方直清根於性術其修身蒞官確乎處中立言遣辭有古風格辯論裁正昭徳塞違濬波瀾而去流蕩得菁華而無枝葉其摳衣入室之徒皆足以賞賛書而秉方冊則及之為文可徵矣其為博士時有上議景皇帝不宜為太祖者詔下庶官及舉夏殷周漢之故事尊祖配天之大㫖以為景皇帝始封於唐天所命也於是定議為一代典法新平長公主之子裴倣尚永清公主欲以他族主婚及相禮上陳不可竟得以裴僕射遵慶為主當時稱之定吕諲盧奕郭知運之諡用禮文憲度得褒貶之正凡所往復詞㫖堅明其理舒州屬嵗饑旱鄰郡庸亡什四己上而舒人生聚恱安不知凶年優詔褒異就賜金紫其初在濠其後在常皆因俗為理人用愛戴雖不得居公卿長帥之任然其奉常議論三郡績用亦足以列於文苑附於循吏按諡法曰博文多能曰憲獻可替否曰憲及酌三王四代之典訓作為文章以輔教化是為博聞位㕘中外必以稱職聞是為多能定宗廟之饗為獻可正婚姻之主為替否有司稽美行而易其名者請諡之曰憲謹議晉諡恭世子議白居易晉侯以驪姬之惑殺太子申生或謂申生得殺身成仁之道是以晉人諡為恭世子載在方冊古今以為然居易獨以為不然大凡恭之義有三以孝保身子之恭以正承命臣之恭以道守嗣君之恭若棄嗣於非禮不可謂道受命於非義不可謂正殺身以非罪不可謂孝三者率非恭也申生有焉而諡曰恭不知其可若垂之來代以為訓誡居易懼後之臣子有失大義守小節者將欲商確敢徵義類在昔虞舜父頑母嚚舜既克諧瞽亦允若申生父之昏姬之惡誠宜率子道以幾諫感君心以至誠雖申生之孝不侔於舜而獻公之頑亦不逮於瞽盍以烝烝之乂俾不格於姦乎故咎之始形則齋慓祇載而為虞舜可也若不能及禍之將兆則讓位去國為吳太伯可也若又不能及難之既作則全身逺害為公子重耳可也三失無一得於是乎致身於不義不祇陷父於不徳不慈負罪被名以至於死臣子之道不其惑歟夫以堯之聖書美曰允恭舜之孝書美曰温恭今以申生之失道亦謂曰恭庸可稱乎周之衰也楚子以霸王之器奄有荆蠻光啟土宇赫赫楚國由之而興諡之為恭猶曰薄徳今申生徇其死不顧其義輕其身不圖其君俾死之後弑三君奚齊卓子懐公殺十有五臣荀息里克丕鄭祁舉共華賈華叔堅騅歂纍虎持宫山祁慶鄭狐突瑕生郤芮實啟禍先大亂晉國則楚恭之得也如彼申生之失也如此異徳同諡無乃不可乎左氏修魯史受經於仲尼蓋仲尼之志丘明従而明之無善惡無小大莫不㣲婉而發揮焉至於申生之死也之諡也略而無譏何其謬哉何以覈諸且仲尼修春秋明則有凡例幽則有微㫖其有君不君臣不臣父不父子不子者率書名以貶之故書曰晉侯殺其太子申生不言晉人而書晉侯且名太子者蓋明晉侯不道且罪申生陷君父於不義也以微㫖考之則仲尼之明貶可知矣以凡例推之則左氏之闕文可知矣嗚呼先王之制諡豈容易哉蓋善惡始終必褒貶於一字所以彰明往者而勸沮來者故君子於其諡無所苟而己矣繇是而言則恭世子之諡不亦誣乎不亦誣乎唐文粹卷四十一欽定四庫全書唐文粹卷四十二宋姚鉉編議丁摠一十二首歴
