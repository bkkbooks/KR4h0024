body:
  text: 呉興姚鉉纂表奏書䟽庚檄露布附揔七首奏五兵機四論渾瑊李晟等諸軍兵馬不要指授方略狀收河中後請罷兵狀初收城後請不誅鳯翔軍將趙貴先狀論請不替鳯翔節度使李楚琳狀巳上並陸贄論功一論神兵軍大揔管狀張說檄一附爲徐敬業以武后臨朝移諸郡縣檄駱賔王露布一附破朱泚露布于公異論渾瑊李晟等諸軍兵馬不要指授方略狀陸贄右欽淑奉宣聖㫖省卿所奏蕃軍退歸及􅀜中體勢理皆切當甚慰朕懷然渾瑊李晟等諸軍須有商量規畫令其進取朕見欲遣使宣慰卿冝審細條流速奏來者臣聞將貴專謀兵以竒勝軍機遥制則失變戎帥稟命則不威是以古之賢君選將而任分之於閫誓莫干也授之以􅃏俾專斷也夫然故軍敗則死衆戰勝則䇿勲不用刑而師律貞不勞慮而武功立其於委任之體豈不愽大哉其於責成之利豈不精覈哉自昔帝王之所以夷大難成大業者由此道也其或疑於委任以制斷由巳爲大權昧於責成以指麾順㫖爲名將鋒鏑交於原野而決䇿於九重之中機㑹變於斯須而定計於千里之外違令則失順從令則失冝失順則挫君之嚴失冝則敗君之衆用捨相礙否臧皆凶上有掣肘之譏下無死綏之志其於分畫之道豈不兩傷哉其於經綸之術豈不都謬㦲自昔帝王之所以長亂繁刑喪師蹙國者由此過也兹道得失兵家大樞當今事宜所繫尤切蓋以㓂盜充斥乗輿播遷人心有觀變之摇王室無自固之重秦梁迴繚千里而遥臨之以威則力勢不制授之以䇿則阻逺不精頃者驟降詔書敎諭羣帥事無大小悉爲規裁及乎章表陳誠使臣復命進退遟速率乖聖謀豈皆樂於違忤哉亦由傳聞與指實不同懸筭與臨事有異故也設使其中或有肆情奸令者陛下能於此時戮其違詔之罪乎臣􅀼恐未能也陛下復能奪其兵而易置將帥乎臣亦恐未能也是則違命者旣不果行罰從命者又未必叶冝徒費空言秪勞睿慮匪惟無益其損實多何則時方艱屯下凌上替凡在執干戈而衛社稷者皆自謂勲業由巳義烈發心安於專行病於羈制陛下冝俯循斯意因而委之遂其所安護其所病敦以付授之義固以親信之恩假以便冝之權待以殊常之賞其餘細故悉勿􅀜言所賜詔書務從簡要愼其言以取重深其託以示誠言見重則君道尊託以誠則人心感尊則不嚴而衆服感則不令而事成其勢當令智者騁謀勇者奮力小大咸極其分賢愚各適其懷將自效忠兵自樂戰與夫迫於驅制不得巳而從之者志氣何啻百倍哉夫君上之權特異臣下惟不自用乃能用人其要在順於物情其契在通於時變今之要契頗具於兹儻蒙究思或有可取謹奏收河中後請罷兵狀昨日欽淑奉宣聖㫖示臣馬燧渾瑊等奏平懷光收河中事狀兼令臣商量須作何處置令欽淑奏來者兇梗殱盪􅀜畿廓淸實聖謀廣運之功亦宗社無疆之祚應須處置大略巳附欽淑口陳展轉傳言恐未盡意謹復薦其固陋願陛下少留察焉臣聞禍或生福福亦生禍喪有得之理得有喪之端故晉勝鄢陵范爕祈死呉剋勁越夫差啓殃是知禍福不可以屢空徼幸不可以常覬居福而慮禍則其福可保見得而亡喪則其喪必臻臣􅀼懼諂䛕希㫖之徒險躁生事之輩幸兇醜覆亡之㑹揣英主削平之心必將競效甘言誘開利欲謂王師所向莫敵謂餘孽指顧可平請迴蒲坂之戈復起淮沂之役斯議一啓必有亂階故微臣姑以生禍爲憂而未敢以獲福爲賀也何則建中之難其事可徴始以蓄憾而隘於含容或以亟勝而輕於戰伐故文喜之討涇上瘡痛未平崇義之征漢南芟夷繼起阻命之帥非不誅也伐叛之師非不克也介焉之斷非不堅也赫斯之怒非不逞也然以人不見恤惟戮是聞有辜無辜莫敢自保是以抱釁反側者懼鈇􅃏之次加畏禍危疑者慮猜􅉲之交及遂乃螽結以拒討狼顧以背恩彌兩河而亘淮夷盪三輔而盜京邑鑾輅爲之再駕行宫至於合圍于時海内大摇物情幾去天命莫保於寸晷王威不出於一城􅀖國之杌􅥳艱屯綿綿聮聮􅀂苞桑綴旒幸而不殊者屢矣勢之危窘實足寒心非有曩時熊羆翕習之師雷霆奮發之勢武庫劒㦸之利帑藏財賦之殷其所以施令率人取威定亂比於建中之始豈不至微哉然而陛下懷悔過之深誠降非常之大號知黷武窮兵之長亂知急征重歛之勦財知殘人肆欲之取危知違衆率心之稔慝知蒸庶困極之興怨知上下鬱堙之失情德音漁然與之更始所在宣􅆒之際聞者莫不涕流雖或兇獷匪人亦必爲之歔欷誠之動物乃至於斯懷裊鴟以好音消䘲沴爲和氣由是姦回易慮黎獻歸心假王叛換之夫削偽號以請罪觀釁首􅇡之將壹純誠以效勤流亡凍餒者希保於室家屯戍戰爭者兾全其性命德澤將竭而重霈君臣巳絶而更交天下之情翕然一變曩討之而愈叛今釋之而畢來曩以百萬之師而力殫今以咫尺之詔而化洽是則聖王之敷理道服􅁀人任德而不任兵明矣羣帥之悖臣禮拒天誅圖活而不圖王又明矣尚恐陛下以臣言之略而未喻也請復循其本而申備之往以河朔靑齊同惡相扇擁戎據土易化不庭陛下恥王化之未同忿姦慝之靡格於是發六軍神䇿河陽河東澤潞朔方之􅀐士以徂征于北命永平汴宋幽隴江淮閩嶺之將卒以奮伐干南罄國家廩帑以贍軍悉公私廏牧以張武筭歛周於萬􅀋徴徭被於八荒勞巳甚矣威亦盛矣旣而曠日綿歲老師費財兩河之㓂患有加無瘳而􅀖本已殆覆矣洎涇卒唱亂泚戎搆災豺狼整居於禁闈猰㺄擇肉於馳道河朔問罪之衆布路而歸宗郊伏順之師守壘不暇于斯之亂海内沸騰儻有問鼎之雄圖淊天之巨猾幸災乗閒何所不爲旣而恱納之儔咸自歛縮内無非望之議外無軼境之侵及聞天澤滌瑕制書復爵曽不􅎞芥望風􅅃降爭馳表章唯恐居後跡其素志於此可知是皆假兵救死之流戀土偷安之輩懷生畏死蠢動之大情慮危求安品物之􅁪性有天下而子百姓者以天下之欲爲欲以百姓之心爲心固當遂其所懷去其所畏給其所求使家家自寧人人自遂家苟寧矣國亦同焉人苟遂矣君亦泰焉是則好生以及物者乃自生之方施安以及物者乃自安之術濟彼於死地而求此之乆生也從古及今未之有焉措彼於危地而求此之乆安也從古及今亦未之有焉是以昔之聖王知生人之所樂而巳亦樂之故與人同其生則上下之樂兼得矣聖王知安者人之所利而巳亦利之故與人共其安則家國之利兩全矣其有反易常理昏迷不恭則當外察其崛强之由内省於撫馭之失脩近以來逺檢身而率人故書曰惟干戈省厥躬又曰舞干羽于兩階七旬有苗格孔子曰逺人不服則脩文德以來之旣來之則安之此其證也如或昧於懷柔務在攻取不徴敎化之未至不疵誠感之未孚惟峻威是臨惟忿心是肆視人如禽獸而曝之原野輕人如草芥而勦之銛鋒叛者不賔則命致討討者不克則將議刑是使􅀒釁者懼必死之誅奉辭者慮無功之責編甿以困於杼軸而思變士卒以憚於死喪而念歸萬情相攻亂豈有定一夫不率闔境罹殃一境不寧普天致擾兵挐禍結變起百端故孔子曰逺人不服而不能來也􅀖分崩離㭊而不能守也而謀動干戈於􅀖内吾恐季孫之憂不在顓􅁷而在蕭牆之内矣此蓋必然之常理至當之格言足以爲朗鑑元􅀛貫百王而不易者也事之至此得無懼乎夫理有必然則殊途歸於同轍言有至當則異代應如合符頃以東北孼徒職貢廢闕陛下忿其違命大舉甲兵至令逆泚誘姦乗釁而動所備之宼猶逺介於河山不虞之戎巳􅀼發於都輦蕭牆之戒不其信歟世典垂訓旣如彼近事明驗又如此所以德音叙哀痛之情悔征伐之事引衆慝以咎巳布明信以示人旣往之失畢懲莫大之辜咸宥約之以省賦誓之以息兵由是億兆汗人四三叛帥感陛下自新之㫖恱陛下盛德之言革靣易辭且脩臣禮其於深心密議固亦未盡坦然必當聚黨而謀傾耳而聽觀陛下所行之事考陛下所誓之言􅀂言與事符則遷善之心漸固儻事與言背則慮禍之態復興自京邑底寧乗輿旋返屬懷光繼亂天討又行息兵之言我則未復山東羣帥所以未敢生辭者蓋爲河中之地密近王城迫於朝夕之虞不得不翦除之爾今􅀂改轅移斾復指淮西則淮西元兇必將䛘脅其同惡之徒閒􅀃於新附之帥謂之曰奉天息兵之㫖乃因窘急而言朝廷稍安必復誅伐是以朱泚滅而懷光戮懷光戮而希烈征希烈儻平禍將次及則彼之蓄素疑而懷宿負者能不爲之動心故心旣動則盈其喪身覆族之憂憂旣盈則慮以脣亡齒寒之病夫病同者雖胡越而相慜憂同者不邀結而自親河朔靑齊固當響應建中之禍􅀔必重興以國家再造之􅀄當羣孼息肩之後迭來鳴吠或肆奔衝討之則我力未遑縱之乃宼患斯甚臣愚􅀼以爲禍非細未審陛下何方以待之􅀂有其方悔之可也如其未有願陛下勿輕易焉凡將圖終必在愼始禍機一發難可復追臣請粗陳當今維馭之所宜惟聖主省擇萬一夫君之大柄在惠與威二者兼行廢一不可惠而罔威則不畏威而罔惠則不懷苟知夫惠之可懷而廢其取威之具則所敷之惠適足以示弱也其何懷之有焉苟知夫威之可畏而遺其施惠之德則所作之威適足以召敵也其何畏之有焉故善爲國者宣惠以養威蓄威以尊惠威而能養則不挫惠而見尊則有恩是以惠與威交相畜也威與惠互相行也人主之欲柔逺人而服强暴不明斯術之要莫之得焉今皇運中興天禍將悔以逆泚之偷居上國以懷光之􅀼保中畿歲未再周相次梟殄實衆慝驚心之日羣生改觀之時威則巳行惠猶未洽誠冝上副天眷下收物情布恤人之惠以濟威乗滅賊之威以行惠宥河中染汙之黨悉無所問赦淮右􅆫逆之罪咸與惟新蠲貸疲甿休罷戰士符往歲息兵之令以彰信丕大君含垢之德以布仁俾萬姓皆曰大哉王言又曰一哉王心如是則威不用而畏如神明惠不費而懷如父母凡在危疑懷懼者必將曰淮右􅆫逆之罪且赦矣吾屬何患焉凡在脅從同惡者必將曰河中染汙之黨且宥矣吾屬何疚焉凡在倦苦思安者必將曰吾君有戰勝之師抑而不騁信乎其罷征矣凡在凋殘望理者必將曰吾君有載勝嫉亂之憤忍而不攄信乎其恤隱矣天下之心􅀂此而禍不息理道不行者無之臣所未敢保其必從唯希烈一人而巳揆其私心非不願從也想其濳慮非不追悔也但以猖狂失計巳􅀼大名雖荷陛下全宥之恩然不能不自􅌤於天地之間耳緃未順命斯爲獨夫内則無辭以起兵外則無􅀋以求助其計不過厚撫部曲偷容歳時雖欲陸梁勢必不致陛下但敕諸鎭各守封疆彼旣氣奪筭窮是乃狴牢之虜不有人禍則當􅀑誅朝廷務崇德以待之臣固知其必不逃於所揣矣古所謂不戰而屈人之兵者斯之謂歟今􅀂不顧機宜復興戎役瀆威而蔑惠捨易而即難是棄明信而務忿心假敵辭而資宼援窮者不暇恤勞者不得居國之安危或未可保此乃成敗理亂之所繫願陛下難之愼之區區上干憂惜在此儻蒙過納狂瞽不疑所行謹當草其招諭之辭詳陳備禦之畫伏俟宣許方敢以聞謹奏初收城後請不誅鳯翔軍將趙貴先狀右欽淑奉宣聖㫖前者共卿商量趙貴先欲恕其罪朕朝來更問諸將皆云貴先順從朱泚即是逆人合依常刑不可寛捨衆意如此應難釋放卿冝知悉者臣愚以爲貴先從逆之罪法當不容貴先陷身之由情則可恕陛下所議矜宥原其情也諸將所請誅戮據於法也據法而除君之惡者人臣之常志原情而安衆之危者人主之大權臣主之道旣殊通執之方亦異言皆有當體各有冝事或相駮而無傷此之謂也往以襄城告急詔令隴右發兵齊映率衆東行貴先即其部將于時軍至昭應適遇駕幸奉天齊映馳歸鳯翔貴先獨主營幕進無揔帥退閡亂兵遂爲賊泚所招紿以同迎鑾輅泚旣反狀未露貴先安得勿從巳受邀留遂遭刧制身縻僞職兵隸兇徒雖在賊中亦不見任首末事跡簡在天心臣並親承德音非獨聞於傳􅀃其於情狀頗足哀矜所丁受責之辜惟有不能守節而死爾貴先儻能死節即是忠烈之徒固獲襃旌豈資寛捨凡所議讞蓋縁獄疑罪疑惟輕實編令典脅從罔理亦載聖謩況復懷光未殱希烈猶熾遭罹誘陷其􅀋寔繁今京邑初平皇猷更始乃是汚俗觀化之日聖王布德之時所用刑章尤冝審愼一輕一重理亂攸生宥之以恩則自新者咸思歸命斷之以法則懷懼者姑務偷生衆心旣偷賊􅀔斯固不忍一朝之忿而貽累歲之憂苟徇匹夫之談免興億衆之役爲計􅀂此夫何利之有焉曩者羯胡亂華染汚士吏肅宗興復累降赦書罪止渠魁餘無所問河朔遺孼旣聞德澤之弘被且幸脅汚之見原人人皆自怨尤各悔歸國之晚及乎三司按罪繼用嚴科未降之流復喜得計慶緒將消而再結思明巳附而重􅂝浸長厲階至今爲梗豈不以任法吏而虧權道小不忍而亂大謀者乎昔漢高帝旣定四方見諸將往往竊語謀反及問張良曰爲之柰何良曰陛下最恨者爲誰帝曰雍齒與我有舊而數窘我良曰今急封雍齒則人人自堅矣帝用良計諸將果安皆云雍齒且侯吾屬何患蓋以圖霸王者不牽於常制安反仄者罔念於宿瑕今陛下有漢高之英貴先無雍齒之釁加戮不足威暴逆矜全可以定危疑明恕而行盛德斯在何所爲慮尚勞依違微臣區區上言蓋爲將來張本凡非首惡皆願從寛庻使負累之徒莫不聞風向化消姦兇誘惑之計開叛亂降附之門此其大機不可失也陛下前意固善矣伏惟不爲浮議所移謹奏論請不替鳯翔節度使李楚琳狀右欽淑奉宣聖㫖李楚琳不可乆在鳯翔終須别與移改有人陳奏請朕到鳯翔日簡擇一人替楚琳充節度使楚琳别與一官便隨朕歸京旣有迎駕諸軍威􅀔甚盛因此替換亦是權冝卿商量穩便否者臣聞王者有作先懷永圖謀必可傳事必可繼不因利以苟得不乗便而幸成故能上下相接而理可長乆也彼楚琳者固是亂人乗國難而肆逞其姦賊􅀖君而篡居其位投以典法是冝汚潴旣屬多虞不遑致討乃分之以旄鉞又繼之以寵榮逮至南巡頗全外順道途無壅亦有賴焉雖爵命累加蓋非􅀗巳然王言一出則不可渝縱闕君臣之恩猶須進退以禮今􅀂因行幸之威勢假迎扈之甲兵易置以歸是同虜執以言乎除亂則不武以言乎務理則不誠禍變繁興爲日巳乆負釁居位豈唯一人以此時巡後將焉入以此撫御其誰敢懷昔漢高僞遊韓信見獲功臣繼叛天下幾危征伐紛紜以至于没其徼倖之不可爲也如是陛下得不以爲至誡哉議者謂之權冝臣又未諭其理夫權冝之爲義取􅀋權衡衡者秤也權者錘也故權在於衡則物之多少可凖權施於事則義之輕重不差其趣理也必取重而捨輕其逺疑也則就輕而避重苟非聖哲難盡精㣲故聖人貴之乃曰可與適道未可與立可與立未可與權言知機之難也今者甫平大亂將復天衢輦輅所經首行脅奪易一帥而􅃜萬乗之義得一方而結四海之疑乃是重其所輕而輕其所重謂之權也不亦反乎以反道爲權以任數爲智君上行之必失衆臣下用之必陷身歷代所以多喪亂而長姦邪由此誤也夫以韓信才略當代莫儔且負嫌猜巳遭告訐縱之足以亂區㝢除之可以安國家幸而成擒猶謂失䇿當時救攻戰之害百代流詭詐之機況楚琳卒伍凡材厮養賤品因時擾攘得肆猖狂非有䧟堅殪敵之雄岀竒制勝之略頗同孤䑕乗夜睢盱晨光旣昇勢自跧縮今郊畿已乂武衛方嚴汧隴鎭壓於其西邠涇扼制於其北顧是歧下􅀂居掌中以楚琳􅃈劣之資䖏掌中控握之地縱令蹢躅何惡能爲願陛下姑務含弘普安反側促駕遄止録功犒勤敷肆眚之恩布惟新之令然後徴韋臯楚琳俾入分文武之職擇元勲宿望命岀揔歧隴之師則彼承詔欣榮奔走不暇安敢蠆芥復勞誅鋤措置得冝萬無一跌何遽過動不爲逺圖仰希睿聦試更詳慮謹奏論神兵軍大揔管功狀張說右被牒奉勑責通大揔管功狀者自契丹背恩營州失守前軍喪律榆􅀜不開幽平鳥捿於重壍戎羯虎食於四野燕南諸城十僅存一河朔之地人挾兩端由是豺狼入於牢穽蜂蠆出於懷袖王受服不宿􅀌劒先驅㓂讎日深甲兵未繼于時鳩合歩􅀐不滿三千彼衆我寡兵怯虜熾且保關守塞力猶不禦況土人弄兵轉相攻拔外召夷狄内據險隘兾州旣䧟勢將不巳當決水之衝承烈火之熖逆風撲燎摧岸塞河韓白見之知其難矣王權以料敵靜而鎭下宣國恩以撫寧曉愚俗以逆順督將吏以忠義示士伍以嚴肅深籌秘於六竒濳檄通於千里滄瀛具得響援増氣幽易􅁪定聲威有立而又分兵井陘杜其西望引軍河漕阻此上流張虚旗於趙城設竒兵於襄國亦猶吳人濳軍於巢縣而見舟豫章漢將捷逕於武關而聲岀崤澠蓋廣授以安衆多方以悞敵故能舉無遺䇿兵不踰時滌昴宿於妖氛拔兾方於塗炭俾皇靈溥暢黔首昭蘇朝廷釋東顧之憂漳􅇭息南侵之患然後歸剽掠返流亡業窮乏賑痍傷僵􅁀皆掩死喪復怨賞不失勞亦無濫受罰不漏罪亦無􅁈人則王有大勲於是役也而又誠以奉上義以利人至忠之狀有三爲善之跡有五所謂忠者一曰思致命也初戎宼方殷王乗馹赴救衆纔數􅀐捍敵羣醜山東父老如恃山河旣而王躬擐甲胄吐誠師旅誓在盡敵以報前讎故得感激來戰決命爭勝二曰能果斷也凶黨狂狡飛轉妖書吠堯謗舜閒誘愚惑事斯蔓結揺我人心王隂察州閭揜求魁蠧獲應賊書人耿羅漢等一十三人焚書伏罪衆而後定故得破謀殺諜悖計無施三曰誠感神也王地維近屬躬當大任所過山川􅀑神之地罔不精意懇禱以請云天子聖明皇天輔德實降靈􅂇以濟神兵幽感明祇多獲孚祐故得行師之處勝風送旗合戰之時興雲翊陣金鼔所向冰消草靡所謂善者一曰均下也飲食勞逸與將士必同二曰絜巳也徧賞有功王秋毫無受三曰詢善也國之彞典成誦在心閱實定名必諮羣議四曰嫉惡也每戮一人親數其罪必深加咎責使愧恥於地五曰不伐也賊平之日將吏賀功王稱美天威惟勞士衆兢兢然􅀂不已有也惟聖人神武制命預授兵符惟大揔管忠善襲行克成廟筭今者顯號年紀騰輝國籍方謂垂範雲臺勒休彞器而杕杜遣宴甫率於舊章茅土増封殊未於宗正此壯夫義士所以􅀼議而長歎者也雖樹下不言用歸功於明主然䇿勲有典何勸善於戎臣敢慿下問是用大陳其所正復州縣招撫歸降補署官僚存集流迸擒殺凶醜收獲軍實與吏士共功者具如别狀爲徐敬業以武后臨朝移諸郡縣檄駱賔王僞周武氏者性非和順地實寒微昔充太宗下陳曽以更衣入侍洎乎晚節穢亂春宫濳隱先帝之私隂圖後房之嬖入門見嫉蛾眉不肯讓人掩袖工䜛􅀌媚偏能惑主踐元后於翬翟䧟吾君於聚麀加以虺蜴爲心豺狼成性近狎邪僻殘害忠良殺姊屠兄弑君鴆母人神之所同嫉天地之所不容猶復苞藏禍心窺􅀼神器君之愛子幽之於别宫賊之宗盟委之以重任嗚呼霍子孟之不作朱虚侯之巳亡燕啄皇孫知漢祚之將盡龍漦帝后識夏庭之遽衰敬業皇唐舊臣公侯冡子奉先君之成業荷本朝之厚恩宋微子之興悲良有以也􅀽君山之流涕豈徒然哉是用氣憤風雲志安社稷因天下之失望順宇内之推心爰舉義旗以淸妖蠥南連百越北盡三河鐡􅀐成羣王軸相接海陵紅粟倉儲之積靡窮江浦黃旗匡復之功何逺班聲動而北風起劒氣衝而南斗平喑嗚則山岳崩頽叱咤則風雲變色以此制敵何敵不搉以此圖功何功不克公等或居漢地或叶周親或􅈾重􅀉於話言或受顧命於宣室言猶在耳忠豈忘心一坏之土未乾六尺之􅀌何託儻能轉禍爲福送往事居共立勤王之圖無廢大君之命凡諸爵賞同指山河􅀂其眷戀窮城徘徊歧路坐昧先幾之兆必貽後至之誅請看今日之域中竟是誰家之天下破朱泚露布于公異尚書兵部臣聞春司生榮秋主殺伐􅀂終始殺伐則不能成歲功仁則順成暴則滅絶􅀂一貫邪正則不能建大中是故春秋序行則通元和而充氣母德刑具舉則恊王道而經彞倫亂由是除兵不可去堯舜禹湯之德統元立極之君或制五兵或張九伐蓋欲攘削姦㓂保乂生靈補雍熙之未洽佐聲敎之不暨有以然者抑實爲何伏惟皇帝陛下溥博法於乾坤貞明侔於日月陶埏六籍表正萬􅀖揚高祖太宗之耿光奉肅宗代宗之丕烈自纂大前緒高居穆淸率土承有截之風懷生無不遂之物邊鄙或聳干戈爰設有征無戰許蔡侯首領之誅陸梁背誕涇原生肘腋之變逆賊朱泚所以委身凶德假翮姦徒熒惑我生人􅆫賊我神器聚爲起穢之物腥彼宫闈散作旬始之妖孛于􅄤次先皇懷柔河朔敷佑下人録其率化之績優以登賢之禮恩澤汪濊集凡庶之門名位薰灼加闒葺之質兾革桀驁將馴大和殊不知惡木生槎枿之英猰狗吠豢牢之主頃屬鑾輿順動郊圻駐蹕而泚乃嘯兇命醜阻兵安忍長戈指闕流矢射天穿高墉以䑕牙毒王師以蠆尾罪踰羿浞惡貫梟獍是以萬方憤怒九服囂騰思齒劒者投袂而興爭淬刃者不期而㑹賊伺閒舋隂貸兇謀旣緩雷霆之誅遂延晷刻之命臣是用祗承睿筭恭行天討攝衣登壇明君臣之大義禡牙饗社假神祇之幽賛以今月二十五日揔領師徒直趨都邑略灞滻以揚斾瞰􅁐囿而下營土垡雲舒木棚林植養威蓄銳直殄兇渠卧鼔偃旗猶輕小利賊初凌犯巳略芟夷謂其氣竭而來歸尙敢尸居而作固敵􅀂可縱帥多奚爲至二十七日㑹諸將於中權召勝風於大斾未鼔而人心粗厲先庚而軍令凝嚴各懷報國之心爭淬伏讎之刃臣知其可用遂此長驅五月二十八日寅時華州鎭國軍節度使駱元光商州節度使兼御史大夫尚可孤本軍副元帥都知兵馬使吳詵都虞􅃸兼御史大夫邢君牙京西行營都知兵馬使檢校刑部尚書孟渉右廂兵馬使郭審全權文成神䇿行營商州節度都虞􅃸彭光俊等承命於牙旗之下分麾於轅門之外將士等超乗賈勇免胄啓行夾川陸而左旋右抽抵丘陵而浸􅁋布濩聲塞宇宙氣雄鉦鼔陳兵於光泰門外盡銳於神䴥倉東繚垣摧以成塵滋水涸而爲地左廣未離於舊壘前偏巳交於賊鋒􅀂降於天如出於地賊將姚令言張雲等志懷僄狡言尚慿凌作忠盡謀力則不及怙亂賊義氣如有餘勢同飈馳衆􅀂螽集橫列堅陣旁連高岡猶張蹭磴之鱗更舉螳螂之臂衙前兵馬使兼御史大夫王佖知衙兼刀斧將兼御史中丞史萬頃等自相約誓乂合軍聲指麾而貙兕作威感激而風雲動色遂先登進擊深入合攻七擒連發而星馳兩翼旁張而雲合霜刃交先而霍燿鼉鼔騰聲而隱轔賊方土崩我乃霆擊乗其踣藉遂至於上蘭取彼鯨鯢直通於中禁叚成諌賊之心膂旣巳生擒沈厚運賊之羽毛終制死命故其係頸求活投戈乞降崩騰於莽蒼之間震懾於旌麾之下臣以其雖染汚俗昔實平人推赤心以如初敷王化而如一姚令言等力扞王師退而復合惡鳥將墜尚顧危巢妖狐就擒猶守舊穴自􅆗以及酉來拒而復攻讙譟之聲山傾而河泄鼓鼙之氣霆􅃲而雷馳屏翳發向敵之風回禄扇燎原之焰馬逸未止士怒未舒旣自北而徂南竟輿尸而折首又使決勝軍節度使工部尚書唐良臣右軍兵馬使御史大夫趙光詵義武軍兵馬使楊萬榮左歩軍使孟日華馬軍將田子竒霍去傲郝覲華州左廂兵馬使馬英右先鋒兵馬使董玼神䇿商州節度兵馬使賈愼金左都虞􅃸張望都等領馬歩爲副勢均破浪攻甚決河雖其恃武庫之五兵慿宫垣之萬雉及兹翦滅纔欲乗凌曽乏鑄刃之鋒巳失藩籬之固遂生擒僞署侍郎董奉中書侍郎平章事蔣鎭右僕射平章事張光兵馬使李希倩等逆賊朱泚與同惡姚令言張芝等輕􅀐走出臣巳遣兵馬使田子竒追躡計即誅夷臣􅀼以此賊包藏逆謀參㑹凶德祲氛其氣豺武其心背先皇亭育之恩傷陛下玄黙之化漢之莽卓未有如此之大者也或者上天之意申儆於巨唐中興之期光啓於陛下不然何王師奮發勢無駐於建瓴醜􅀋搶攘功有輕於折箠猶逃密網尚返􅃗輪誠當盡敵之時更發追亡之􅀐且稽分體未即燃臍快億兆之歡心蕩宗社之深恥即當梟戮用申刑典今巳肅淸宫禁修謁寢園鍾簴不移廟貌如故蓋宸極之所垂象列聖之所雄都神扶業業之傾天降穰穰之福不然豈免於毀圯之患崩剥之虞者哉此皆上天降鑒睿慮旁施制兵要於事先規雄圖於彀内再造可封之俗固櫜不戰之功左武右文銷鋒鑄鏑澹乎華胥之夢熈然葛天之風臣謬􅀉台司幸當統帥乏吉甫之文武缺郄􅜄之詩書此皆諸將叶心羣帥宣力非臣庸績敢自矜大不勝慶快之極謹差某官奉露布以聞重校正唐文粹卷第三十之上重校正唐文粹卷第三十之下吳興姚鉉纂制策一應賢良方正能直言極諌科䇿劉蕡朕聞古先哲王之理也玄黙無爲端拱司契陶甿心以居簡凝日用於不宰立本以厚下推誠而建中繇是天人通隂陽和俗躋仁壽物無疪癘噫盛德之所臻夐乎其莫可及也三代令王質文迭救百偽滋熾風流寖微自漢而降足徴蓋寡朕顧惟昧道祗荷丕搆奉􅀂謨訓不敢荒寧任賢惕勵宵衣旰食詎追三五之遐䡄庶紹祖宗之鴻緒而心有所未達行有所未孚由中及外闕政斯廣是以人不率化氣或堙厄災旱竟歳播殖愆時國廪罕蓄乏九年之儲吏道多端微三載之績京師爲諸夏之本也將以觀理而豪猾踰檢太學明敎化之源也期於變風而生徒惰業列郡在乎頒條而干禁或未絶百工在乎桉度而􅁋巧或未息俗墮風靡積訛成蠧其擇官濟理也聽人以言則枝葉難辨防下以禮則格恥不形其阜財發號也生之寡而食之衆煩於令而鮮於理思欲究此謬盭致之洽平兹心浩然􅀂渉淵水故前詔有司博延羣彦佇啓宿懵兾臻時雍子大夫皆識達古今㫖在康濟造庭待問副朕虚懷必當箴治之闕辨政之疪明綱條之致紊稽庶富之所急何術斯革乎前弊何澤斯惠乎下土何施而治古可近何道而和氣克充推之本源著於條對至􅀂夷吾輕重之權孰輔於理嚴尤底定之䇿孰叶於時元凱之考課何先叔子之克平何務推此􅀛鏡擇乎中庸期在洽聞朕將親覽對􅄄衣小生沐浴齋戒伏於彤庭之内謹頓首上言皇帝陛下臣誠不佞有匡國致君之術無位而不得行有犯顔敢諫之心無路而不得達但懷憤抑鬱思有一時之發耳常欲與庶人議於道商賈論於市得通上聽一悟主心雖被妖言之罪無所悔焉況逢陛下以至德嗣興以大明垂照詢求過闕咨訪謨猷制詔中外舉能直言極諌者臣旣辱斯舉專承大問敢不悉意以言至於上之所忌時之所禁權倖之所避諱有司之所與奪臣愚不識大體伏惟陛下少加優容不使聖朝有儻直而受戮者乃天下之幸也非臣之所望也謹昧死以對㐲以聖䇿有思古先之理念玄黙之化欲通天人以濟俗和隂陽以煦物見陛下慕道之深也臣以爲哲王之理其則不逺惟陛下致之之道何如耳伏以聖䇿有荷丕搆而不敢荒寧奉謨訓而罔有怠忽見陛下憂勞之至也􅀂夫任賢惕厲宵衣旰食冝黜左右之纎佞進股肱之大臣􅀂夫追蹤三五紹復祖宗冝鑒前古之興亡明當時之成敗心有所未達以下情蔽而不得上通行有所未孚以上澤壅而不得下浹欲人之化也在修巳以先之欲氣之和也在遂性以導之救災旱在致乎精誠廣播殖在視乎食力國廪罕蓄本乎冗食尚繁吏道多端本乎選用失當豪猾踰檢由中外之法殊生徒惰業由學校之官廢列郡干禁由授任非人百工滛巧由制度不立伏以聖䇿有澤官濟理之勤阜財發號之歎見陛下敎化之本也且進人以行即枝葉安有難辨乎防下以禮即格恥安有不形乎念生寡而食衆則可罷斥游墮念令煩而理鮮在乎觀察行否􅀶延羣彦願陛下必納其言造庭待問則小臣安敢愛死伏以聖䇿有求賢箴闕之言審政辨疵之令見陛下咨訪之心勤也遂小臣屏姦豪之志則弊革于前守陛下念康濟之方則惠孚于下邪正之道分而理古可近禮樂之方著而和氣克充至􅀂夷吾之法非皇王之權嚴尤所陳無最上之䇿元凱之所先不􅀂唐堯之考績叔子之所務不􅀂虞舜之舞干且俱非大德之中庸未可爲上聖之􅀛鏡又何足爲陛下道之哉或有以繫安危之機兆存亡之變者臣請披瀝肝膽爲陛下别白而重言之臣前所謂哲王之理其則不逺者在陛下愼思之力行之始終不懈而巳謹按春秋元者氣之始也春者歲之始也春秋以元加於歲以春加於王明王者當奉􅀂天道以謹其始也又舉時以終歲舉月以終時春秋雖無事必書首月以存時明王者當奉􅀂天道以謹其終也王者動作始終必法於天者以其運行不息也陛下旣能謹其始又能謹其終懋而修之勤而行之則可以執契而居簡無爲而不宰矣廣立本之大業崇建中之盛德豈可逺歟安有三代循環之弊百僞滋熾之漸乎臣故曰唯陛下致之之道何如耳臣前所謂􅀂夫任賢惕厲宵衣旰食冝黜左右之纎佞進股肱之大臣實以陛下憂勞之至也臣聞不冝憂而憂者國必衰冝憂而不憂者國必危今陛下不以國家存亡之計社稷安危之䇿而降於清問臣不知陛下以布衣之臣不足以定大計邪或萬機之勤而聖慮有所未至邪不然何冝憂而不憂者也臣以爲陛下之所憂者冝憂宫闈將變社稷將危天下將傾四海將亂此四者乃國家巳然之兆故臣謂聖慮冝先及之夫帝業旣艱難而成之固不可容易而守之太祖兆其基髙祖勤其績太宗定其業玄宗繼其明至于陛下二百餘載其間聖明相因擾亂繼作未有不委用賢士親近正人而能紹興其徽烈者矣或一日不念則顚覆大器宗廟之恥萬古爲恨臣謹桉春秋人君之道在體元以居正昔董仲舒爲漢武帝言之略矣其所未盡善者臣得爲陛下備而論之夫繼故不書即位所以正其始也終必書所以正其終也故爲君者所發必正言所履必正道所居必正位所近必正人又桉春秋閽寺殺呉子餘祭書其名春秋譏其踈逺賢士昵近刑人有不君之道矣伏惟陛下思祖宗開國之勤念春秋繼故之戒將明法度之端則發正言而履正道將杜篡弑之漸則居正位而近正人逺刀鋸之殘親骨鯁之直輔相得以專其任庶寮得以守其官奈何以䙝近五六人揔天下之大政外專陛下之命内竊陛下之權威懾朝廷勢傾海内羣臣莫敢指其狀天子不得制其心禍稔蕭牆姦生帷幄臣恐曹節侯景復生於今日矣此宫闈之所以將變臣謹桉春秋魯定公元年春王不言正月者春秋以爲先君不得正其終則後君不得正其始故曰定無正也今忠賢無腹心之􅀉閽寺專廢立之權陷先帝不得正其終致陛下不得正其始況皇儲未建郊祀未修將相之職不歸名分之冝不定此社稷所以危也臣謹桉春秋王札子殺召伯毛伯春秋之義兩下相殺不書而此書者重其專王命也夫天之所授者在命君之所存者在正操其命而失之者是不君也侵其命而專之者是不臣也君不君臣不臣此天下所以將傾也謹桉春秋晉趙鞅以晉陽之兵叛入于晉書其歸者以其能逐君側之惡人以安其君故春秋善之今威柄凌夷藩臣跋扈或有不達人臣之節首亂者以安君爲名不究春秋之微稱兵者以逐惡爲義則典刑不由乎天子征伐必自於諸侯此海内所以將亂故樊噲排闥而雪涕􅀽盎當車以抗詞京房發憤而殞身竇武不顧而畢命此皆陛下明知之耳臣謹桉春秋晉狐射姑殺陽處父書襄公殺之者以其君漏言襄公不能固隂重之機處父所以及戕賊之禍故春秋非之夫上漏其情則不莫敢盡意上􅂥其事則下莫敢盡言故傳有造􅂰詭詞之文易有失身害成之戒今公卿大臣非不欲爲陛下言之慮陛下忽而不用之陛下忽而不用必􅂥其言臣下旣言而不行必嬰其禍適足鉗直臣之口而重姦臣之威是以欲盡其言則有失身之懼欲盡其意則有害成之憂故低徊鬱塞以俟陛下感悟然後盡其啓沃耳陛下何不聽朝之餘時御便殿召當丗賢相與舊德老臣訪持變扶危之謀求定衰救亂之術塞隂邪之路屏䙝狎之臣制侵凌迫脅之心復門戸掃除之役戒其所冝戒憂其所冝憂旣不得理於前當理於後旣不得正其始當正其終則可以䖍奉典謨克承丕搆終任賢之效無旰食之憂臣前所謂􅀂夫追蹤三五紹復祖宗冝鑒前古之興亡明當時之成敗者臣聞堯舜之爲君也而天下大治以其能任五官四岳十二牧不失其舉不貳其業不侵其職居官惟其能左右惟其賢元凱在下雖微而必舉四凶在朝雖强而必誅考其安危明其取捨至秦二代漢之元成咸願措國如唐虞致身如堯舜而終敗亡者以其不見安危之機不知取捨之道不任大臣不辨姦人不親忠賢不逺䜛佞伏惟陛下察唐虞之所以興而景行於前鑒秦漢之所以亡而戒懼於後陛下無謂廟堂無賢相庶官無賢士今綱紀未絶典刑猶在人誰不欲致身爲王臣致時爲昇平陛下何忽而不用之耳又有居官非其能左右非其賢其惡如四凶其詐如趙高其姦如恭顯者陛下又何憚而不去之邪神器固有歸天命固有分祖廟固有靈忠臣固有心陛下其念之哉昔秦之亡也失於强􅁀漢之亡也失於微弱强􅁀則賊臣畏死而害上微弱則姦臣􅀼權而震主伏見敬宗皇帝不虞亡秦之禍不翦其萌伏惟陛下深軫亡漢之憂以杜其漸則祖宗之鴻緒可紹三五之遐䡄可追矣臣前所謂陛下心有所未達以下情塞而不能上通行有所未孚以上澤壅而不得下浹者且百姓有塗炭之苦陛下無由而知則陛下有子惠之心百姓無由而信臣謹按春秋書梁亡不書取者梁自亡也以其思慮昏而耳目塞上岀惡政人爲㓂盜皆不知其所以然以其自取滅亡也臣聞國君之所以尊者重其社稷也社稷之所以重者存其百姓也苟百娃之不存則雖社稷不得固其重苟社稷之不重則雖國君不得保其尊故治天下者不可不知百姓之情也百姓者陛下之赤子陛下宜命慈仁者親之育之如保􅀓焉如乳哺焉如師之敎導焉故人之於上也敬之如神明愛之如父母今或不然陛下親近貴倖分曹補署建除卒吏召致賔客因其貨財假其氣勢大者統藩方小者爲牧守居上無清惠之政而有饕餮之害居下無忠誠之節而有姦欺之罪故人之於上也畏之如豺狼惡之如仇讎今海内困窮處處流散飢者不得食寒者不得衣鰥寡􅀌獨者不得存老㓜疾病者不得養加以國權兵柄專在左右貪臣聚歛以固寵姦吏因縁而弄法􅁈痛之聲上達乎九天下入于九泉􅀑神爲之怨怒隂陽爲之􅄽錯君門九重而不得告訴士人無所歸化百姓無所歸命官亂人貧盜賊並起土崩之勢憂在朝夕即不幸因之以師旅繼之以凶荒臣恐陳勝吳廣不獨起於秦赤眉黃巾不獨生於漢故臣所以爲陛下發憤扼腕痛心泣血耳如此則百姓有塗炭之苦陛下何由而知之陛下有子惠之心百姓安得而信之致使陛下行有所未孚心有所未達固其然也臣聞昔漢元帝即位之初更制七十餘事其心甚誠其稱甚美然而綱紀日紊國祚日衰姦宄日强􅀺元日困者以其不能擇賢明而任之失其操柄也自陛下御㝢憂勤兆庶屢降德音四海之内莫不抗首而長息自喜復生於死亡之中伏惟陛下愼終如始以塞萬方之望誠冝揭國權以歸其相持兵柄以歸其將去貪臣聚歛之政除姦吏因縁之害唯忠賢是近唯正直是任内寵便辟無所聽焉選清愼之官擇仁惠之長敏之以利煦之以和教之以孝慈導之以德義去耳目之塞通天下之情俾萬國歡康兆民蘇息則心無所不達行無所不孚矣臣前所謂欲人之化也在修巳以先之者臣聞德以修巳教以導人脩巳也則人不勸而自至導人也則人敦行而率從是以君子欲政之必行也故以身先之欲人之從化也故以道御之今陛下先之以身而政未必行御之以道而人未從化豈不以立敎之旨未盡其方邪夫立教之方在乎君以明制之臣以忠行之君以知人爲明臣以匡時爲忠知人則任賢而去邪匡時則固本而守法賢不用則重賞不足以勸善邪不去則嚴刑不足以禁非本不固則民流法不守則政散而欲教之必至化之必行不可得也陛下能斥姦邪不私其左右舉賢正不遺其踈逺則化浹於朝廷矣勸人以敦本分職而奉法修其身以及其人始於中而成於外則化行於天下矣臣前所謂欲氣之和也在遂性以導之者當納人於仁壽也夫欲人之仁壽也在乎立制度修教化夫制度立則財用省財用省則賦歛輕賦歛輕則人富矣教化修則爭競息爭競息則刑罰清刑罰清則人安矣旣富矣則仁義興焉旣安矣則壽考生焉仁壽之心感於下和平之氣應於上故災害不作休祥荐臻四方底寧萬姓咸遂臣前所謂救災旱在致乎精誠者臣謹按春秋魯僖公一年之中三書不􅀨者以其人君有恤人之志也魯文公二年之中一書不􅀨者以其人君無憫人之心也故僖致精誠而旱不害物文無憫恤而變則成災陛下誠能有恤人之心則無成災之變矣臣前所謂廣播殖在視乎食力者臣謹按春秋君人者必時視人之所勤人勤於力則功築罕人勤於財則貢賦少人勤於食則百事廢今財食與人力皆勤矣願陛下廢百事之用以廣三時之務則播殖不愆矣臣前所謂國廩罕蓄本乎冗食尚繁者臣謹按春秋臧孫辰告糴于齊春秋譏其無九年之蓄一年不登而百姓饑臣願斥游墮之徒以篤其耕植省不急之費以贍其􅀺元則廪蓄不乏矣臣前所謂吏道多端本乎選用失當者由國家取人不盡其才用人不明其要故也今陛下之用人也求其聲而不求其實故人之趨進也務其末而不務其本臣願考課績之實定遷序之制則多端之吏道息矣臣前所謂豪猾踰檢由中外之法殊者以其官禁不一也臣謹桉春秋齊􅁊公盟諸侯不書日而葵丘之盟將以日者美其能宣明天子之禁率奉王官之法故春秋備而書之故夫官者五帝三皇之所建也法者高祖太宗之所制也法冝畫一官冝正名今又分外官中官之貟立南司北司之局或犯禁於南則亡命於北或正刑於内則破律於外法出多門人無所措實由兵農勢異中外法殊也臣聞古者因井田而制軍賦間農事以修武備提封約卒乗之數命將在公卿之列故兵農一致而文武同方可以保乂􅀖家式遏亂略洎太宗皇帝肇建􅀖典亦致府兵省臺軍衛文武叅掌居閑歲則櫜弓力牆將有事則釋耒荷戈所以修復古制不廢舊物今則不然夏官不知兵籍止於奉朝請大將不主兵事止於養勲封今軍容合中宫之政戎律附内臣之職首戴武弁嫉文吏如􅄷讎足􅌃軍門視農夫如草芥謀不足以翦除兇逆而詐足以抑揚威福勇不足以鎭衛社稷而暴足以侵軼里閭羈紲藩臣干凌宰輔隳裂王度汨亂朝經張武夫之威上以制君父假天子之命下以御英豪有藏姦觀舋之心無仗節死難之義豈先王經文緯武之旨邪臣願陛下貫文武之道均兵農之功正貴賤之名一中外之法還軍衛之職修省署之官近崇貞觀之規逺復成周之制自􅀖畿以刑于下國始天子而達于諸侯則可以制豪猾之强無踰檢之患矣臣前所謂生徒墮業由學校之官廢者蓋以國家貴其禄而賤其能先其事而後其行故庶官乏通經之學諸生無進業之心矣臣前所謂列郡干禁由授任非其人者臣以爲刺史之任理亂之根本繫焉朝廷之法制在焉權可以抑豪猾恩可以惠􅀌寡强可以禦姦㓂政可以移風俗其將校有曽經戰陣及功臣子弟各請隨冝酬賞無理人之術者不當授此官則絶干禁之患矣臣前所謂百工􅁋巧由制度不立者請以官位爵禄制其器用車服禁人金銀珠玉錦繡彫鏤不蓄於私家則無蕩心之巧矣臣前所謂辨枝葉者在考言而詢行也臣前所謂形恥格者在導德而齊禮也臣前所謂念生寡而食衆可罷斥惰游者已備於前矣臣前所謂令繁而理鮮要察其行否者臣聞號令理國之具也君審而出之臣奉而行之或虧益止留罪在不赦今陛下令繁而理鮮要得非持之者有所蔽欺乎前臣所謂博延羣彦願陛下必納其言造庭待問則小臣豈敢愛死者臣聞􅄯錯爲漢畫削諸侯之䇿非不知禍之將至矣忠臣之心壯夫之節苟利社稷死無悔焉臣今非不知言發而禍應計行而身戮蓋所以痛社稷之危哀生人之困豈忍姑息於時忌􅀼陛下一命之寵哉昔龍逢死而啓殷比干死而啓周韓非死而啓漢陳蕃死而啓魏今臣之來也有司或不敢薦臣之言陛下又無以察臣之心退必受戮於權臣之手臣幸得從四子遊於地下固臣之願也所不知殺臣者臣死之後將孰爲啓之哉至於人主之闕政教之疵前日之弊臣旣言之矣􅀂乃流下土之惠條近古之理致其和平者在陛下行之而巳然上之所陳者實以臣親承聖問敢不條對雖臣之愚以爲未極教化之大端皇王之要道伏惟陛下事天地以教人敬奉宗廟以敎人孝養高年以教人悌育百姓以教人慈調元氣以煦育扇大和於仁壽可以逍遥而無爲垂拱而成化至􅀂念陶鈞之道在擇宰相而任之使權造物之柄念保定之功在擇將帥而任之使修分閫之􅀉念百度之未貞在擇庶官而任之使專職業之守念百姓之愁痛在擇長吏而任之使明惠養之術自然言足爲天下教動足爲天下法仁足以勸善義足以禁非又何必宵衣旰食勞神惕慮然後致其理哉謹對重校正唐文粹卷第三十之下嘉靖甲申歳太學生姑蘇徐焴文明刻于家塾
