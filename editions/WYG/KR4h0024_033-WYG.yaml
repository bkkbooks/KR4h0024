front:
  text: 湖湖東有山蛟奔螭引直到湖心頓址之處則茂林峭石勢瓌氣勝非往時所睇而神祠曰祖將軍廟在焉公覿其詭秀與碑材叶即日以酒脯奠其祖神出錢五萬造亭曰祖亭南香爐峯北潯陽城九江為庭千艘歴階亭既就公製亭之文手勒斯碑而立之公文為天下最書為天下最斯亭之地亦天下最庶資三善加以斯碑之竒相持萬古而採異留名之致一得也後典州吏於州之九江驛有修坏之勞狀其末績乃取斯碑剗公之述寘已之述今為九江驛之碑焉予旅逰江州税于兹驛祠部員外郎鄭恕同之鄭與州將嚴士良共為予説而俱以相示嗚呼先賤後貴世之常也先貴後賤人之傷也以祖亭方九江驛則蘭室鮑肆矣以魯公之文方今之文則牢醴糟糠矣以魯公之札翰方今之札翰則錦綉枲麻矣以魯公之用方今之用則諸夏夷狄矣痛哉斯碑出祖亭入九江驛失魯公之文得人之文削魯公之札翰題人之札翰亡魯公之用就人之用是去蘭室而居鮑肆捨牢醴而食糟糠脱錦綉而服枲麻黜諸夏而即夷狄可悲之甚者况我質天成必將可名魯公所以卜擇敬慎如彼而常人無良黷辱如此與夫有道而黥無罪而刖投四裔禦魑魅何以别也石不能言豈其無寃故弔之情違乃傷理怫乃寃人實有之物亦應然嗚呼子碑寃可予知隂隲子材豈曰無意必有以殊方頒以異與顔表勝以殊則明從吏居卑以異奚旌子産既授子不終致悠悠彼蒼何嗟及矣美玉扺禽髙冠藉足有類子碑先榮後辱繼世生哲詎無賢兮將覿于斯將悼于斯庶滌所黷而復攸宜屹屹子碑如神如祗人得以專天造何為其不然矣其不然矣
