body:
  text: 吳興姚鉉纂記庚録志附揔一十七首讌會五太學張愽士講禮記記歐陽詹穆氏四子講藝記崔祐甫吳郡詩石記白居易琴㑹記柳識伯樂川記孫逖讌犒二嶺南節度使饗軍堂記柳宗元邠寕節度饗軍記李觀書畫琴故物八畫記韓愈祖二踈圖記王藹蘇州畫龍記李紳録桃源畫附舒元輿書屏記司空圖玉筋篆志附舒元輿斵琴志衛公故物記韋端符種殖二養竹記白居易􅜩竹記劉寛夫太學張愽士講禮記記歐陽詹說釋典籍謂之講講之爲言構也如農之耕田疇焉田疇將植而不實雖耕矣必耨分其畦壟嘉榖由是乎生典籍將肄以求明雖習矣必講窮其旨趣儒術由是乎成我國家春享先師後更日命太學博士淸河張公講禮記盛儒術祖聖三刋經九公通其六籍于五而禮記在其中禮也者御人之大故首于羣籍而講之束脩旣行筵肆乃設公就几北坐南面直講抗牘南坐北面大司成端委居于東小司成率屬列于西國子師長序公侯子孫自其館太學長序卿大夫子孫自其館四門師長序八方俊造自其館廣文師長序天下秀彦自其館其餘法家墨家書家筭家術業以明亦自其館没階雲來即席鱗差攅弁如星連襟成帷公先申有禮之本次陳有禮之要正三代損益得失定百家䟽義長短鎔乎作者之意注乎學者之耳河傾于懸風落于天淸泠灑蕩幽逺無泥所昧鏡徹於靈臺所凝冰釋於心泉後一日聞于朝百司達官造者半後一日聞于都九城知名造者半皆㝷聲得器虚來實歸予職在下庠六掌有教道不足訓領徒從公惟始洎終覩公之美敬書盛事記諸屋壁并列當時執簡摳衣者干左偏貞元十四年五月二十七日記穆氏四子講藝記崔祐甫檢校秘書少監兼和州刺史侍御史河南穆寧字子寧以正直登朝以嚴明作牧斯歷陽之人弗惟奉承相御史之符候持三尺律期於禁暴懲姦而已廼能廣吾君之德淸人於教化教化之興始於家庭延於邦國事之體大且非謏聞者之所及也請言其家之教化焉使君有四子曰賛曰質曰賡曰賞聳秀之姿若瑶林植庭雪羽馴廡克岐克嶷突而偕弁方欲以六經百氏播禮樂務忠孝正名器導人倫如蘭有芳心泉有淸源兆德之階於是乎始使君曰昔陳亢喜聞詩聞禮聞君子之逺其子於孔鯉今兹賛之儕也其年或成人或幾成人學詩學禮則亦旣戒逺子之節吾事可不務哉於是考州之東四十里因僧居之外堦庭戸牖芳草拳石近而幽逺而曠澶澷平田觱沸温泉可以歩而適可以濯而蠲謂爾羣子息焉遊焉賛質曁賡賞拜手稽首曰應惟惠施之車仲舒之帷蘇秦之錐三物畢具而郡廷温淸所在今也改晨昏爲旬朔夫豈不懷家人有嚴君焉惟命之受曰俾爾斵俾爾茨俾爾負則使君之材使君之堂使君之薪成且美矣安在其習定省之近儀哉抑又甞聞廼祖安陽府君傳洪範九疇究天人之際賛等祗荷嚴訓述修祖德穆氏之門欲不大不可得也祐甫不腆幸與使君有郎省之舊考槃在阿歲聿云暮誰謂相逺駕言出遊旣覿邦君又適諸子之館使君第三子字紹古於伯季之間肆文史考故實甚精而成因見謂曰丈人吾父之友也從事於㳺夏之門乆矣盍以文見誨如賡也冝何文也祐甫應之曰僕朴人也徒有志於文知文之阡陌而不知其精粹請道其所見而紹古自執焉欲以文經邦者冝董賈欲以文動俗者冝楊馬言偃之文鬱而不見卜商有詩序其體近六經屈原宋玉怨刺比興之詞深而失中近於子夏所謂哀以思刻石銘座者取崔蔡論都及政者宗班張飛書走檄者徵陳琳曹劉之氣奮以舉潘陸之詞縟而麗過此巳往未之或知宋齊巳降年代未逺有文之士胄系皆存議其優劣其詞未易故闕焉紹古曰盍書之因命筆而記之大曆七年十一月十八日檢校尚書吏部郎中慱陵崔祐甫之詞也吳郡詩石記白居易貞元初韋應物爲蘇州牧房孺復爲杭州牧皆豪人也韋嗜詩房嗜酒毎與賔友一醉一詠其風流雅韻多播於吳中或目韋房爲詩酒仙時予始年十四五旅二郡以㓜賤不得與遊宴尤覺其才調高而郡守尊以當時心言異日蘇杭苟獲一郡足矣及今自中書舎人間領二州去年脫杭印今年佩蘇印旣醉於彼又吟於此酣歌狂什亦往往在人口中則蘇杭之風景韋房之詩酒兼有之矣豈始望及此哉然二郡之物狀人情與曩時不異前後相去三十七年江山是而齒髪非又可嗟矣韋在此州歌詩甚多有郡宴詩云兵衛森畫㦸燕寢凝淸香最爲警䇿今刻此篇于石傳貽將來因以予旬宴一章亦附于後雖雅俗不類各詠一時之至偶書石背且償其初心焉寳曆元年七月二十日蘇州刺史白居易題琴㑹記柳識君子之座必左琴右書雅好閱古古亦置於舟車也大曆六年浙西觀察使蘇州刺史兼御史大夫賛皇公祇命朝于京闕春正月夕次朱方刺史樊公稱江月當軒願以巵酒侑勝居無何賛皇公弦琴樊公和之演操相應澄淸撫綏遞爲伯牙更爲子期琴動人靜琴酣酒醒淸聲向月和氣在堂春風猶寒是夜覺暖罷宴之後賛皇顧潤州曰見明珠者始賤魚目知雅樂者始賤鄭聲自樸散爲器眞意在琴與衆同出於虚獨能致靜同韻五音獨能多感同名爲樂獨偶聖賢是冝稱德切近於道昔堯以美利利于天下曲名始暢自舜禹至于夫子不止且聲著哀思或當戚自陳其後居常翫之和理所措若然者寧襲陶公眞意空拍而已豈襲胡笳巧麗異域悲聲我有山水桐音寶而持之古操則爲其餘未暇是知賛皇所好無非貽訓似有道而猶重之若此況乃眞有道之士乎輒記所論貽諸達者伯樂川記孫逖太原元帥黄門侍郎李公國之宗盟朝之畯德以元凱之忠肅兼桓文之節制戊辰歳秋七月公以疆場之事㑹幽州長史李公于伯樂川王命也以駕四牡鏘八鸞斾旌悠悠車轞嘽嘽乙未出于北京戊戌次于横野己亥至于會封人戒備軍吏宿設立㑹表于高阜闢轅門於大荒漁陽精銳太原材力駟介八百徒兵三千戈如林羽若月少長有禮賔主不悖蚩尤􅗮其五兵若敖慙其六卒洸洸乎信可以慴穹廬而震高闕也於是地主致餼以昭饗宴之禮君子有儀以訓上下之則歌蔓草之相遇笑投壷之失辭大庖旣盈釃酒有與咠樂周於卒乘屬厭及於輿臺慈惠之徳於是乎在夫幽州太原襟帶之地自河以北幽州制之自河以東太原制之在兩軍之交當二境之上厥有棄地皆爲曠林守之則表裏之勢全捨之則俟望之路隔公料以古今度其川原獻方略而入覲于王議工徒而東爲此會爰究爰度匪遊匪追蓐食無再舎之勤扞諏爲一夕之衛不忘于素返斾而旋君子謂此會也能用典矣𥘉公之始至太原也酌於人賦於事以爲節用者國之善政於是乎減戍卒以寛其征修備者武之善經於是乎置秋集以裒其旅足食者人之所庇於是乎賞屯兵以艾其力近利者姦之所生於是乎禁和糴以懲其弊然後序山澤之險廣亭燧之虞候騎出於長城爟火通於大漠書田庀賦講射訓騶蓄信義爲國寶修徳刑爲戰器行之一年軍乃有節邊鄙不聳龔黃之教也雖魏絳有和戎之利郄縠有敦詩之徳申伯之式是南邦韓侯之奄受北國曷云比議未足量力公之與幽州李公也義均伯仲芳若蕙蘭周諸侯以異姓爲後晉大夫以同官爲僚入亞六卿共行司馬之法岀膺九命俱受元戎之律詩曰維其有之是以似之其二公之謂矣不書所㑹將何述焉揚厥美萬斯年俾夫來世知二公相見在此川也嶺南節度使饗軍堂記柳宗元唐制嶺南爲五府府部州以十數其大小之戎號令之用則聽于節度使焉其外大海多蠻夷由流求訶陵西底大夏康居環水而國以百數則統于押蕃舶使焉内之幅貟萬里以就秩拱玉稽時聽教命外之羇屬數萬里以譯言摯寶歲帥貢職合外二使之重以治于廣州故賔軍之事冝無與校大且賔有牲牢饔餼嘉樂好禮以同逺合䟽軍有犒饋宴饗勞旋勤歸以羣力一心於是治也閈閎階序不可與他邦類必厚棟大梁夷庭高門然後可以上充於揖讓下周於歩武今御史大夫扶風公廉廣州且專二使増德以來逺人申威以修戎政大宴饗合樂從其豐盈先是爲堂於治城西北陬其位公北向賔衆南向奏部伎于其西視泉池于其東隅奥庳庂庭廡下陋音未及角則炎赫當目汙眩更起而禮莫克終故凡大宴饗大軍旅則寓于外壘儀形不勝公於是始斥其制爲堂南面横八楹縱十楹嚮之宴位化爲東序西又如之其外更衣之次膳食之宇列觀以游目偶亭以展聲彌望極顧莫䆒其往泉池之舊增濬益植以暇以息如在林壑問工焉取則師輿是供問役焉取則蠻隷是徵問材焉取則隙宇是遷或益其闕伐山浮海農賈拱手張目示具乃十月甲子克成公命饗于新堂幢牙茸纛金節析羽斾旗旟旞咸飾于下鼓以鼖鼓金以鐸鐃公與監軍使肅上賔廷羣寮將校士吏咸次于位卉裳罽衣胡夷蜑蠻睢盱就列者千人以上鉶鼎體節燔炰胾炙羽鱗貍牙之物沈泛醍盎之齊均飫于卒士興王之舞服夷之伎揳擊吹鼓之音飛騰幻怪之容寰觀于逺邇禮成樂徧以叙其賀且曰是邦臨護之大五人合之非是堂之制不可以備物非公之德不可以容衆曠于往𥘉肇自今兹大和有人以觀逺方古之戎政其曷用加此華元名大夫也殺羊而御者不及霍去病良將軍也餘肉而士有飢色猶克稱能以垂到今矧兹具美其道不廢願訪于金石以永示後祀遂相與來告且乞辭牢讓不獲乃刻于兹邠寧節度饗軍記李觀朗寧郡王張公擁七尺之節臨三州之師牧我邠荒藩我雍疆威厲乎廣漢聲凌乎四鄰戎無南侵國無西憂師嚴民整封守晏如聖上聞之何甞不負扆而嗟之因乃寵以彤弓嘉以墨書乃慰乃止曷日而無哉於是仗鉞揔戎之臣咸望公而歡懼能無稱於維朗寧之卒巳仗誠而言曰獲拜賜之光聖上之寵崇朗寧足以厲不戮力之臣然斯事也君臣之殊尤敢不述之而已哉越三月河澌未流東風始湊優柔逶迤𬒳公軍令公曩奉詔親帥師備胡乗虚君命未復不自議還雖閫外得顓亦大有所不顓也于是軍吏之職事者進伏於鉞下曰實以是月賞功息勤惠老及疾哀死及孤厥死無怨厥生而愉所以披軍實賚師徒實舊典也違之不孚公從之乃練令辰豁連城鼓於四門斾於四墉日旣登塵不騰窮隂閉淑氣升軍聲歡康儲輿靁硠翕乎衆民輳乎氐羌空山之木春近塞之草芳朗寧乃鳩文武之吏列而爲行東西嚮闕而再拜如蒙上命命之然後申號而惠周升堂而澤溥賁育之倫列於軍之宇校師之士次于軍之堂進猶風趨坐如雲屯旌旗蔽日刄㦸交光公于是衆食而食衆安而安士盡感之優用醉飽而御酒餚是日朗寧軍中無淫聲無亂音右金鼔左羽旄所以奮武之觀壯軍之容其餘管磬之歡弦匏之繁罔不合簡節諧雅音俾三軍之夫毅其氣和其心羣羌之長釋我俘歸我侵少壯熏熏老疾謳吟祲化爲祥虜趨爲擒洪矣偉矣朗寧之理明德遐𬒳者乎乃知乎致享者不止乎味張樂者不止乎聲仁可以碩其膚龢可以暢其情故朗寧之饗士兼以仁龢被之豈以羶以腥猗之哉武有七德朗寧其由二三焉于時歲紀恊洽國家郊祀之明年觀布衣來遊賔公之筵宗盟兄侍御史益有文行忠信而從朗寧之軍惡羣小之日取媚也故不自書命觀書之曰子之文直長於記事益知之乃題曰邠寧節度饗軍記畫記韓愈雜古今人物小畫共一卷騎而立者五人騎而𬒳甲載兵立者十人一人騎執大旗前立騎而被甲載兵行且下牽者十人騎且負者二人騎執器者二人騎擁田犬者一人騎而牽者二人騎而驅者三人執羈靮立者二人騎而下倚馬臂隼而立者一人騎而驅渉者二人徒而羈牧者二人坐而指使者一人甲胄手弓矢鈇鉞植者七人甲胄執幟植者十人負者七人偃寢休者二人甲胄坐睡者一人渉者一人方渉坐而脫足者一人寒附火者一人雜執器物役者八人奉壷矢者一人舎而具食者十有一人挹且法者四人牛牽者二人驢驅者四人一人杖而負者婦人以孺子載而可見者六人載而上下者三人孺子戲者九人凡人之事三十有二爲人大小百二十有三而莫有同者焉馬大者九匹於馬之中亦有馬之下者焉行者奔者渉者陸者翹者顧者鳴者寢者訛者立者人立者齕者飲者溲者陟者降者癢磨樹者嘘者嗅者喜相戲者怒相踶囓者秣者騎者驟者走者載服物者載狐兔者凡馬之事二十有七爲馬大小八十有三而莫有同者焉牛大小十一頭槖駞三頭驢如槖駞之數而加其一焉隼一犬羊狐兔麋鹿共三十旃車三兩雜兵器弓矢旌旗刀劔矛楯弓服矢房甲胄之屬瓶盂簦笠筐筥錡釜飲食服用之器投壷之矢博奕之具二百五十有一皆曲極其妙貞元甲戌年予在京師甚無事同居有獨孤生申叔者始得此畫而與予彈碁予幸勝而獲焉意甚惜之以爲非一工人之所能運思蓋叢集衆工人之所長耳雖百金不願易也明年岀京師至河陽與二三客論畫品格因出而觀之座有趙侍御者君子人也見之戚然若有感然少而進曰噫予之手摸也亡之且二十年矣予少時常有志乎兹事得國本絶人事而摸得之遊閩中而喪焉居閑處獨時往來予懷也以其始爲之勞而夙好之篤也今雖遇之力不能爲己且命工人存其大都焉予旣甚愛之又感趙君之事因以贈之而記其人物之形狀與數而時觀之以自釋焉祖二踈圖記王藹吳郡顧生能冩物筆下狀人風神情度甚得其態自江以東譽爲神妙有好事者先賄以良金細帛必避而不顧設食精美亦不爲之謝乃曰主人致殷勤豈無意邪何不醉我斗酒乗其酣逸當無愛惜乃張素座隅前即置酒一器𥘉沈思想望揺首撼頥忽飲十餘杯斗無三揖主人曰酒興相激吾將勇於畫矣午未及夕而數幅之上有帳於京城之外帳中有筵筵中有犧罇二壷觥即觩而罍斝即倍犧壷之數而樂師差於前樂有竽琴瑟有笙鏞有缶有筑有鼓而㯥若鼓手以合奏也列坐皆冕帶盛服有持筭主事者有捧斚就飲者有慿軾徐來者有目於騎而迴者有仰吻而咍者有俛首而肅者有避席而遺簪屨者有促襟而將進者此漢公卿祖二踈也主人乆視而問曰東嚮而坐即行客也去國離羣而容無慘恨何爲妙曰二踈之去乃知足也非疾時也非時之不禮也非危於禍機也非避於讒口也非失於權利也旣辭勤於夙夜而果其優游故顔間無慘恨之色主人歎曰旣不爲利易巳之能絜也嗜酒而混俗何其高也圖二踈以遺於時俗勸也求其能狀物之情者孰有勝乎蘇州畫龍記李紳自造父劉累殁豢氏不副龍不復擾隱去莫狎往往時見史必書志代以自識者寡之故工得以詭亂形狀神其變化彪炳五色逾逺眞像蓋上飛于天晦隔層雲下歸于泉深入無底考之丹靑難以徵驗好事者張其畫以示羣目觀者或駭疑得其狀長洲令㕔北廡有畫蛟龍六焉玄素異鱗狀殊質怪驤首拖尾似隨風雷乗櫨薄楣若䡍雲雨燕雀懼栖其上螻蟻罔縁其側目視光射瑩無流塵伸盤逶迤如護榱棟毎飛雨度牖踈雲殷空鱗鮮耀隂顧壁疑拔志其側曰僧繇弗興之舊度摸之不知何人也二工圖龍天與幽思今是壁指逺異代繼之圖法無謝於二子而名漏不傳詢于耆人亦絶傳記茂宰博陵崔君據始命余述舉丹素實驗附邑書末簡庶乎後數百歳棟宇斯變龍忘其像而事刻編簡繇昭昭然時貞元癸未歲秋七月記録桃源畫記舒元輿四明山道士葉沈囊出古畫畫有桃源圖圖上有谿谿名武陵之源按仙記分靈洞三十六之一支其水趣流勢與江河同有深而渌淺而白白者激石渌者落鏡溪南北有山山如屏形接連而去峯竪不險翠穠不浮其夾岸有樹木千萬本列立如揖丹色鮮如霞擢舉欲動燦若舒顔山鋪朱底草散茵毯有鸞靑其衿有鶴丹其頂有雞玉其羽有狗金其色毛亭亭間而立者十有八九岸而北有曲深嵓門細露室宇霞檻繚轉雲磴五色雪冰肌顔服身衣裳皆負星月文章岸而南有五人服貌肖虹玉左右有書童玉女角髪而侍立者十二視其意況皆逍遥飛動若雲十許片油焉而生忽焉而往其坦處有壇層級沓玉冰壇面俄起燼竈竈口含火上有雲氣且備五色中有溪艇泛上一人雪華鬢眉身著奏時衣服手鼓短枻意狀深逺合而視之大略山勢高水容深人貌魁竒鶴情閑暇煙嵐草木如帶香氣熟得詳翫自覺骨戞淸玉如身入鏡中不似在人寰間眇然有高謝之志從中坐來少選道士卷畫而藏之若身形郤落塵土中視嚮所張壁上又疑有頑石化出塞斷道路某見畫物不甚寡如此圖未甞到眼是知工之精而有如是者邪葉君且自珍重無路得請遂染筆録其名數將所以備異日冩畫之不謬也書屏記司空圖人之格狀或峻其心必勁心之勁則視其筆跡亦足見其人矣歷代入書品者八十一人賢傑多在其間不可誣也國𥘉歐虞之後繼有名公元和長慶間先大夫𥘉以詩師友兵部盧公載從事於商於因題紀唱和乃以書受知於裴公休辟倅鍾陵及徵拜侍御史退居中條時李忻州戎亦以草隷著稱爲計吏在蒲因輟所寶徐公浩眞跡一屏以爲貺凡四十二幅八體皆備所題多文選五言詩其朔風動秋草邊馬有歸心十數字或草或隷尤爲精絶或綴小簡於其下記云怒猊抉石渴驥奔泉可以視碧落矣先公淸旦披翫殆廢寢食常屬誡云正長詩英吏部筆力逸氣相資竒功無跡儒家之寶莫踰此屏也但二者皆美神物所窺必當奪璧於中流飛鋩於烈火也殆非子孫之所可存耳庚子歲遇亂自虞邑居負之置於王城别業丙辰春正月陜軍復入則前後所藏及佛道圖記共七千四百卷與是屏皆爲灰燼痛哉今旅寓華下於進士姚顗所居獲覽書品及徐公評論因感憤追述貽信後學且兾精於賞覽者必將繼有詮次光化二年八月三日泗水司空圖銜涕撰録謹記之王筯篆志舒元輿秦丞相斯變蒼頡籀文爲玉筯篆體尚太古謂古若無人當時議書者皆輸伏之故拔乎能成一家法式歷兩漢三國至隋氏更八姓無有出者嗚呼天意謂篆之道不可以終絶故授之以趙郡李氏子陽冰陽冰生皇唐開元天子時不聞外奬躬入篆室獨能隔一千年而與秦斯相見可謂能不孤天意矣當時得議書者亦皆輸伏之且謂之其格峻其力猛其功備光大於秦斯有倍矣此直見上天以字寶瑞吾唐矣不然何綿更姓氏而寂寞無人某道不攻篆而識其點畫常有意求秦丞相眞跡會秦丞相去乆聞其有八字刻在荆玉有洪碑樹嶧山巓今荆璧爲璽飛上天矣固不可得而見也洪碑留在人間往往有好事者躋巓得見某亦常問得去嶧山道路異日將裹足觀之未去間行長安㑹同里客有得陽冰眞跡遺在六幅素上者遂請歸客堂張之見蟲蝕鳥歩㾗跡若屈鐡石陷入屋壁霜晝照著疑龍蛇駭解鱗甲活動皆欲飛去齊目眎之分明覩文字之根植吾堂中然後知向之議者謂冰愈於斯吾雖未登嶧山觀此可以信其爲深於篆者之言也試以手拂拭其煙顔塵容侵暴日乆攝芻坼裂玉筯欲折予以褻慢讓其主主曰此易致耳豈當其如是愛邪予曰今世人所以重秦斯之跡非能盡辨别之以其秦古矣斯邈矣向使秦斯與子比肩子能貴之乎曩吾尚欲苦辛登嶧山之巓縮在予掌握中今且猶不爲子貴子不過生於唐而得與冰同爲唐人吾知冰殁二三十年其蹤跡流於人間固不甚少得爲子目數見故易之若此使冰生於秦時予又安得使造次而見遺塵邪是子賤目也世人皆然嗟吁冰旣即世是字寶入地矣後人思孜孜求之今且遭不知者忽易想生筆下日有新迹固爲門戸見覩之物矣冰雖欲求沽售不獨棄爲糞土必遭其詬怒也主聞之其愧色見於顔眉間欲卷而退知其退也必因循而不信彊止留之引筆書其志行下以保明其爲字寶也不謬詞曰斯去千年冰生唐時冰復去矣後來者誰後千年有人誰能待之後千年無人篆止於斯嗚呼主人爲吾寶之斵琴志舒元輿寂寞間有至音注梧桐中越客沈虬子耳長木音常斧樹之良孫斵而琴之予客越見其方風釿取朴成輒叫索淸濁應刄濁授授成輪圓濁沛雪落淸聲酬荅若寒玉透木噴出瓏􅌑及察投意之始放心虚無間猶掌握無毛倫他人見朴在刄下而沈氏成琴入眼中不知釿之數到邪琴之形化邪兩肩聳張若對古人雙池呀開若挹澄渟絶刄四顧得色上面旁眎或懵其所以爲沈生乃弦素絲七條其上備指一弄五聲叢鳴鳴中有靈峯橫空鳴泉出雲鳳龍騰凌鶴哀烏啼松吟風悲予聆之𥘉聞聲入身覺毛骨聳擢中見境在眼覺精爽沖動終然睹化源寥寥貫到心靈則百骸七竅仙仙而忘覺神立寥廓上洞見天地初氣駕肩太古闊視區外乃知不知音聲者終身爲朧朦嘻木纔滿數尺絲不盈十條古聖人欲其中含天音天之如此直乃叩之以觀化本且絲本俱無情物也固不能自鳴是使歷代知其必鳴之稀以至爨入鼎下枯折空山而不聞者非一也今人明明以聲耳耳且惑況槁木無朕而責其必無惑邪予於此見沈氏子之審音也之運釿也俱與神遇懼異日斯琴流于人間爲他者亂類則沈氏之道爲委土矣故志之衛公故物記韋端符三年冬端符於三原令座中揖其羣官有客曰某丞李謂端符曰是衛公之胄也其家傳賜書與他服器十餘物者訖讌端符即丞居爲客謁丞延入就次端符因跪請曰籍君僕射公之嗣固願見僕射公之烈之多其事辭雖文記或闕略具天下耳舌矣聞君世傳文帝詔與公服物者願得以觀丞慘慘曰諾即其家偃僂躍歩奉賜書一函他物一器出發視有玉帶一首末爲玉十有三方者七挫兩隅者六毎綴環焉爲附而固者以金丞曰傳云環者列佩用也玉之粹者若含怡然澤者若渙釋然公擒蕭銑時高祖所賜于闐獻三帶其一也素錦袍一其襟衭促小裁制絶巧密光爛爛如波旁岀紫文綾襖一促製小袖如袍其爲文林樹於上其下有馳馬射者又雜爲狻猊虎貙槖駞者靴袴一往來爲鈎屬鎻劒文疑非華人所爲也自始傳于今莫能名其物象笏一差狹不類今笏者佩筆一竒木爲管韜刻飾以金别爲金環以限難其間韜者火鏡二大觽一小觽一笇囊二椰孟一蓋常佩於玉帶環者十三物亡其五有存者八大帝爲兒時與公子某年上下文帝命居宫中侍吾兒戲即賜以皇子服物黃綾袍皆爲龍鸞文素錦襖綷五采爲花若鳥者素錦半袖小笏皆緻巧功良今工之爲不能也文帝賜書二十通多言征討事厚勞苦信必威賞而已其兵事節度皆付公吾不從中理也曁公疾親詔者數四其一曰有晝夜視公病大老嫗令一人來吾欲熟知公起居狀丞曰權文公視此詔常泣曰君臣之際乃如是邪端符旣畢觀中若有物擊惻其心者於玉帶見逺方致物而上不專有以賜有功也於文錦衆物見其時之工志功不志靡也於賜公子以皇子衣服見視臣如友而游兒也於詔征討見擇將材付將職也上甞不曲制其事旁他可動哉於公問公疾見上荅憫公如家人之視子姓也公之勞烈如是其大固有以感之獨推期運吾不信也丞曰子觀吾故物異他人之觀一似動色隱心者於霜露變時毎閱省是物人雅謂子工文辭幸爲記吾得觀以慰吾慕思也故曰記衛公故物養竹記白居易竹似賢何哉竹本固固以樹德君子見其本則思善建不拔者竹牲直直以立身君子見其性則思中立不倚者竹心空空以體道君子見其心則思應用虚受者竹節貞貞以立志君子見其節則思砥礪名行夷險一致者夫如是故君子人多樹之爲庭實焉貞元十九年春居易以拔萃選及第授校書郎始於長安求假居處得常樂里故關相國私第之東亭而處之明日屨及于亭之東南隅見叢竹於斯枝葉殄瘁無聲無色詢乎關氏之老則曰此相國之手植者自相國捐舘他人假居繇是筐篚者斬焉篲帚者刈焉刑餘之材長無尋焉數無百焉又有凡草木雜生其中苯䔿薈蔚有無竹之心焉居易惜其甞經長者之手而見賤俗人之目翦棄若是本性猶存乃芟翳薈除糞壤䟽其間封其下不終日而畢於是日出有淸隂風來有淸聲依依然欣欣然若有情於感遇也嗟乎竹植物也於人何有哉以其有似於賢而人猶愛惜之封植之況其眞賢者乎然則竹之於草木猶賢之於衆庶嗚呼竹不能自異惟人異之賢不能自異惟用賢者異之故作養竹記書于亭之壁以貽其後之居斯者亦欲以聞於今之用賢者云􅜩竹記音果割也岀玉篇劉寛夫左史院近宸居之正地直日華之東偏俗塵不飛人意自逺閟䆳幽閴似非官曹有竹一叢翠接階所其虚中絜外之操䕃座袪煩之能紫微郎高公甞賦之固以備盡然而歲月滋乆蔓衍浸淫大小相依高下叢茂俾日光不透隂氣常凝瞑色爲之早來陽春爲之減煦四序不正一庭常昏蚊䖟曹飛雀鷃自遂披圖散帙觀覽不快二年冬侍軒之暇載筆之餘偶歩庭除病其蔽翳因命斤斧將治其蕪沈吟即時乃用申誡且謂其徒曰礪爾器用端爾操執愼爾區分其有質微而葉環苯䔿者去之從風而不能自正者去之大而倚者去之聚而曲者去之竅而不能備笙篁之用者去之挺而不能棲鸞鳳者去之其有羣居不亂獨立自持振風發屋不爲之傾大旱乾物不爲之瘁堅可以配松栢勁可以凌雪霜密可以泊晴煙踈可以漏宵月嬋姢可翫勁挺不回者爾其保之旣而芟翦畢功繁蕪立盡去者存者邪正乃分不浹旬扶踈一林歷歷可見有淸風澡慮之效皦日明姦之機檀欒風生韻合宫徵君子是以知竹箭之美尙科别之功即其他不俟言而詳矣或以斯爲小可以伸之因紀一時之妙筆而𫐠之重校正唐文粹卷第七十七
