  text: 重校正唐文粹卷第十一
  hash: sha256:eb26578576b84991a5f7af38516721c21537eca93f0047e7422cb6b0a4165732
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0024_SBCK_011-1a}
body:
  text: 吳興姚鉉纂古調乙揔四十六首楚騷體十一九諷并系述皮日休反招魂并序悼賈并序效古詩三十五江有楓一篇蕭頴士菊榮五章有竹一篇蟬鳴五章宋華涼雨一篇蕭頴士虞獲子鹿一篇韋應物上古之什輔亡訓傳十三章顧況倬彼我系一首王勃元和聖德詩一首鄆州溪堂詩一首漢隄詩一首盧肇有所恨二章歐陽詹河之水二章韓愈九諷系述并序皮日休昔在屈平既放作離騷經正詭俗而為九歌辨窮愁而為九章是後詞人托而為之皆所以嗜其麗詞撢其逸藻者也至若宋玉之九辨王褒之九懷劉向之九歎王逸之九思其為淸怨素豔幽快古秀皆得芝蘭之芬芳鸞鳯之毛羽也然自原已降繼而作者皆相去數百祀足知其文難述其辭罕繼者矣大凡有文人不擇難易皆出於毫端者乃大作者也楊雄之文丘軻乎而有廣騷也梁竦之辭班馬乎而有悼騷也又不知王逸奚罪其文不以二家之述為離騷之兩派也昔者聖賢不偶命必著書以見志況斯文之怨抑歟噫吾之道不為不明吾之命未為不偶而見志斯文者吾懼來世任臣之君因謗而去賢持祿之士以猜而逺德故復嗣數賢之作以九為數命之為九諷焉嗚呼百世之下復有修離騷章句者乎則吾之文未過不為乎廣騷悼騷也粵勾亶之薄俗兮其風狡而且苦吾欲以直道揠其邪心兮皆騁容而莫顧前誨行兮後止高諭仰兮下俯咸為吾之儇為愚兮並以吾之霾為傴羌靈修之乃吾知兮先職我而為輔奈其臣之狺狺兮及不知吾之所撫吾欲以明哲之性辨君臣之分兮定文物之數吾欲以正訐之道兮進忠賢而退姦豎吾欲以醇醲之化兮反當今而為往古吾欲以忖度之志兮定觚圎而反規矩念儓核之在位兮若梟羊之當路內灼怛以如倳兮復何知其所訴乃指天而鬱悠兮將天奪乎國祜永惄惄以何言兮將求知其吾祖正俗有肪兮點而謂之不潔有泉兮壅而謂之不決有茞兮轥而謂之不芳有軸兮而謂之不轍聲咺許逺切唏以無音兮氣鬱悒而空咽既惄惄以增懼兮又謾謾漫而不訣誣彭祖以為孺兮譎殤子以為耊夥衆人之難信兮撏夸者之不恱佞為痝兮何去姦為疣兮莫劀音刮讟為轡兮莫御謗為玉兮何切彘既䑋而必烹兮木方㚇子公切兮必折心而似車兮思綿綿而如瓞手欲動兮似拳足將行兮如絏既不辨其顔跖兮遂一貫於堯桀吾哀生之不遲兮奚至死而惙惙念帝座之不爣他朗切兮故交光於卷舌既何路以自辨兮遂沒齒而癆刺遇謗靳尚之言兮美如嬴子蘭之氣兮醲於酲既怒􅗻音綿以相向兮遂裹足而南征靣㥾㥾以美色心以何情耳方聰兮忽睽目正視兮忽盲日當午兮便昃天方晝兮不明欲泣兮有血將啼兮失聲望靈修兮似失出國門兮若驚軔識怨兮亦緩駟知愁兮復鳴既徜徉兮夏水復眷戀兮南荆嗟余夙秉於大訓兮涵淸骨之忠貞既貿貿者之莫豫容兮向重蒼而自盟既婪路南切仁以憑義兮遂鈲信而摫規誠將真宰之不仁兮胡為役余以此生彼鷽斯之有賊兮固不能容乎鶬鶊彼茨菉之叢穢兮固不能讓乎杜蘅巳矣乎國無人兮莫我留將訴帝干玉京見逐荷為裯丁牛切兮芰為襬碑荃為䘿居勿切兮薛為禕弭吾棹兮灃之浦駐吾楫兮湘之湄悲莫悲兮新去國怨莫怨兮新相思幽篁蕭兮靜晚淸漪淡兮去遲湘君欲出兮風水急帝子不來兮煙雨微芷既老兮白藥於角切日將暮兮紅萎朝浮乎鶻蹄啼夕叫乎羈雌攭禮漾漾兮不止㶇黃悠悠兮何之日出沒兮北渚雲依俙兮九疑既無人以辨余兮又何心而怨咨退不解其㤞􅭛上音鐸下音悸兮進不知其忸怩寒蜩怨而無聲兮古木悽其寡枝嗟吾魄之不反兮千秋萬歲湘中馳悲遊慨天道之不明兮何獨生此大佞若猰烏八切貐之能冠兮當一國而持柄見舌臣之反詐兮信其主以不競轍巳覆而又遵兮仡五迄切將翻而不整不思心張之疾兮又玩膏盲之病竟客死於咸陽兮終不作毒王之幸既養菟火胡切以為患兮遂倒釬音仠以授柄將諛臣以肆禍兮豈上天之付命粵吾大以為不可兮彼以災而為慶儻靈均之魄有知兮刷吾恥於下瞑憫邪有美一人兮端憂千喑蔭萬惄兮曽不得以少休腸結多以莫回兮淚啼極而不流王孫何處兮碧草極目公子不來兮淸湘滿樓汀邊月色兮曉將曉浦上蘆花兮秋復秋天泬寥以似淬兮峯巉崒以如抽篔簹颯兮雨岸杜若死兮霜洲遺余程兮灃之側整余陌兮湘之幽望女嬃兮秭歸夢懷宋玉兮荆門愁欲向天以號咷兮寸晷不可以少留又不如吾魄所處兮永寞寞以悠悠端憂山之巔兮水之涘桂為祠兮蘭為祀執玉桴兮扣雷鼓奠金􅡸兮滴浮蟻薦瓊芳兮望暮雲獻椒醑兮拜寒水祝肹蠁以怪談兮巫妖冶而魅醉波閃倐兮湘君竹蕭踈兮帝子日將暮兮河伯秋正深兮山鬼神之化兮何方人之艱兮至此胡不化其邪而為正兮胡不反其戾而為義胡不轉其亡而為興兮胡不易其亂而為治但血食於下國兮罪不少裨於有位吾將乘靑螭而駕白蚪兮謁帝而訴神之纍請天弧發鏃兮天掊行箠神速悔尤兮俾吾靈修而易志紀祀粵吾秉志兮潔於瑾瑜芬其德而芳其道兮榮於蘼蕪將興國以見罪兮擬佐王而蒙辜彼羣小之茸茸兮如慕臭之鱉蜉以大鵬為爵兮以康瓠為㼶以衮衣為褋兮以黎丘為墟以鄭姬為醜兮以子産為愚以鮑焦為貪兮以孔聖為巫吾將奮鱗於大空兮奚獨慕此江湖吾將發榮於蟠桃兮奚獨守此蒿蔞吾將蕩其魄兮驂風軔與軋車謁帝於冥冥之天兮秉其生殺之樞將飄飄以為逝兮亦何必懷此佞邪之故都捨慕堯死兮舜滅禹殄兮湯絶似玉兮將沈如金兮永沒行以仁兮止以義生以貞兮死以潔念余曽不足以蹈聖閫兮亦慕兹而自恱湘浦兮煙深沅江兮風切顧影兮自憐撫躬兮永訣鬼慘兮神悲雨泣兮泉咽竟汨沒以奫淪兮永幽憂而怫鬱湘之山兮未盡湘之流兮不竭千秋兮愁雲萬古兮明月靈均之寃兮孰能銷其氣靈均之愁兮孰能釋其結來者之自鑒兮無致位於牙孽潔死反招魂并序屈原作大招魂或日景差作疑不能明宋玉作招魂皮子以為忠放不如守介而死奚招魂為故作反招魂一篇以辨之辭曰承溟涬之命兮付余才而輔君君既不得乎志兮余飄飄而播遷余蕩大空而就滅兮君又招余俾復身余詣帝以請訣兮帝俾巫陽以筮云巫陽語余以不可歸兮故作詞以招君乃下招曰余君兮歸來故都愼不可留些其君雄虺兮其民封狐些食民之肝鬲以為其肉兮摘民之髮膚以為其衣些朝刀鋸而暮鼎鑊兮上曖昧而下墨眉杘癡些君兮歸來故都愼不可留些余昔為比干之魄兮干僇而余去些未聞干貪生以自招兮余竟終其所處些君兮歸來故都愼不可留些余昔為伍胥之魄兮胥僇而余逝些末聞胥貪位以惜生兮執屬鏤而不滯些君兮歸來故都愼不可留些余昔為弘演之魂兮演自殘而余行些余未聞演惜余以不死兮俾其義而益明些君兮歸來故都愼不可留些帝命余以輔君兮亦以君之忠介些今以忠而見聞兮尚盤桓而有待些將自冨貴而入羈旅兮其志乃悔些將戀骨肉而惜家族兮何不自裁些梟食母而獍食父兮見禽獸之為生些苟􅓇殘者眉壽兮實梟獍而同名些君乎愼勿懷故都之戀歸來乎余為君存千古忠烈之榮枯些悼賈并序余嘗讀賈誼新書見其經濟之道真命世王佐之才也自漢氏革嬴高祖得於矢石不暇延儒人及為天子制缺度弛處華而夷是時獨有叔孫生能定朝儀其制未悉唯生草其書欲以制屈諸矦推定正朔調黃輿服通流貨幣天不祐漢絳灌興謗竟枉其道出傅湘沅生自以不得志哀屈平之放逐及渡湘沈文以弔之故其辭曰瞝摛九州而相君兮何必懷此故都噫余釋生之意矣當戰國時屈平不用於荆則有齊趙秦魏矣何不捨荆而相他國乎余謂平雖遭靳尚子蘭之讒不忍捨同姓之邦為他國之相冝矣然則生之見棄又甚於平當漢時捨文帝則諸矦矣如適諸矦則新書之文抑諸矦而尊天子也捨諸矦則胡越矣則新書之文滅胡越而崇中夏也是以其心切其憤深其詞隱而麗其藻傷而雅余悲生哀平之見棄又生不能自明其道鳴呼聖賢之文與道也求知與用苟不在於一時而在於百世之後者乎其生之哀平歟余之悲生歟吾之道也廢與用幸未可知但不知百世之後得其文而存之者復何人也咸通癸未中南浮至沅湘復沈文以悼之其辭曰粵炎緒之嫣綿兮其國度之未彰天錫生以命理兮兾其道之益鵂鶹以動愁嗚呼哀哉世既不平頷吾道以為非兮吾復何依蘋蘭憔悴兮稂莠繁滋麟鳯匿迹兮梟獍騰威憒匠罷斧兮拙者構之離婁閉目兮瞽者揚眉子都蒙𬒮兮敦洽聘姿嗚呼哀哉亦先生之尤也胎丑吏其世之不可兮何不解而去位又垂萬世之名取捨在此奚自謗於童羖兮乃憪然而為纍蓋伊尹三就五就之心兮兾其民之可治奈惛惛以不悟兮又𬒳之以非議幸一人之再覺兮答受釐之奧義既孱王以墮駕兮乃寃慟而巳矣訊曰君不明兮莫我知幽都寂兮和涕歸文懸日月兮俟後聖用之大故忽兮其何足悲江有楓一篇十章并序蕭穎士江有楓思陸鄭二友吳會舊遊且疾讒也君宦干尹府以直方不偶見逼讒佞惟古之賢者有避色避言之義矯然去之二室之間有槭樹焉與江南楓形胥類憩於其下而作是詩以貽夫二三子焉江有楓其葉蒙蒙我友自東于以遊從山有槭其葉漠漠我友徂北于以休息想彼槭矣亦類其楓矧伊懷人而忘于東東可遊矣會之丘矣于山于水于廟于寺于亭于里君子遊焉于以宴喜其樂亹亹粵東可居彼吳之墟有田有庭有朋有書有蓴有魚君子居焉惟以宴醑其樂徐徐我朋在矣彼陸之子彼陸之子淹也如松如𣏌淑問不已我友于征彼鄭之子彼鄭之子愕也如琇如英德音孔明我思震澤菱芡幕幕寤寐如覿我思剡溪杉篠萋萋寤寐無迷有鳥有鳥粵鷗與鷺浮湍戲渚皓然潔素忘其猜妬彼何人斯曾足傷懼此懼維何懼置于羅彼驕者子讒言孔多我聞先師體命委和公伯之訴則如豫何悵然山河惟以嘯歌其憂也哉菊榮一篇五章并序菊榮酬贈離且申志也久寓大邑賢宰宋矦惠而好豫賦鳴蟬以貺別有懷相規備厥卒章于以報焉采采者菊芬其榮斯紫英黃萼照灼丹墀愷悌君子佩服攸冝王國是維大君是毗宋即太尉文貞公之子也貽爾子孫百祿萃之采采者菊于邑之城舊根新莖布葉垂英彼美淑人應家之禎有弦既鳴我政則平冝爾棟崇必復其慶采采者菊于邦之府隂槐翳柳邇楹近宇彼勞者子喧卑是處慨其莫知藴結誰語企彼高人色斯遐舉采采者菊于賔之館既低其枝又弱其幹有匪君子是焉披玩良辰旨酒宴飲無算愴其仳別終然永歎歲方宴矣霜露殘促誰其榮斯有英者菊豈微春華懿此貞色人之侮我混干薪棘詩人有言好是正直有竹一篇七章并序有竹懿李新後閣而宴親友也有竹斯竿于閣之前君子秉心惟其貞堅兮有竿斯竹于閣之側君子秉操惟其正直兮彼蔚者竹蕭其森矣有開者閣宛其深矣迥簷幽砌如翼如齒冬之宵霰雪斯瀌我有金爐熺其以歊夏之日炎景斯鬱我有珍簟淒其以栗彼紛者務休其豫矣有旨者酒歡其且矣友僚萃止跗蕚載韡彼美公之姓兮那歟應積慶兮期子惟去之柄兮蟬鳴一篇五章并序宋華蟬鳴感秋興送將歸也僻守外邑而蘭陵子相過詰朝言歸賦詩見志以申贈焉蟬其鳴矣于彼踈桐庇影容迹何往不容嘒嘒其長永託于風未見君子我心忡忡既見君子樂且有融彼蟬鳴矣于林之表含風飲露以樂吾道有懷載遷伊誰云保未見君子我心悄悄既見君子披豁豫抱蟬鳴蟬鳴幽暢乎而肅肅爾庭遠近涼颸言赴高柳叢篁間之思而不見如渴如飢亦既覯止我心則夷蟬鳴伊何時運未與匪歎秋徂怨斯路阻願言莫從鬱悒誰語君子至止慰我延佇何斯違斯倐邇遐舉歲之秋深蟬其夕吟披衣軒除蕭蕭風林我友來斯言告離襟何以敘懷臨水鳴琴何以贈言委順浮沈涼雨一章并序蕭穎士涼雨志楊矦樂賔僚也習習涼雨泠泠浮飇君子樂胥于其賔僚有女斯夭式歌且謡歡言終宵惟以招邀于胥樂兮虞獲子鹿一篇并序韋應物虞獲子鹿憫園鹿也遭虞之機張見畜於人不得遂其天性焉虞獲子鹿畜之城陬園有美草池有淸流但見蹶蹶亦聞􅊯􅊯誰知其思巖谷之遊上古之什補亡訓傳十三章顧況上古慜農也遐哉上古生棄與柱勾龍氏主乃有甫田惟彼甫田有萬斯年開利之源無乃塞源一㕓亦官百㕓亦官嗇夫孔艱浸兮暵兮申有螽兮惟馨祀是患豈止餧與寒嗇夫咨咨䅎盛苗衰耕之耰之襏襫鋤犁手胼足胝水之蛭蚓吮喋我肌我姑自思胡不奮飛東人利百西人利百有匪我心胡為不易河水活活萬人逐末俾爾之愈恱兮上古一章左車憑險也震為雷兄長之左東方之師也憑險不巳君子憂心而作是詩左車有慶萬人猶病曷何去之于黨孔盛敏爾之生胡為波迸左車有赫萬人毒螫曷可去之于黨孔碩敏爾之生胡為草戚左車二章築城刺臨戎也寺人臨戎以墓磚為城壁築城登登于以作固咨爾寺兮發郊外冡墓死而無知猶或不可若其有知惟上帝是訴築城奕奕于以固敵咨爾寺兮發郊外冡甓死而無知猶或不可若其有知惟上帝是謫築城二章持斧啓戎士也戎士伐松柏為蒸薪孝子徘徊而作是詩持斧持斧無翦我松柏兮持斧一章十月之郊造公室也君子居公室當思布德行化焉十月之郊羣木肇生陽潛地中舒達勾萌曀其蔚兮不可以遊息乃熂蒺藜乃夷荆棘乃繇彼曲直匠氏度思登斧以時澤梁蓁蓁無或夭枝有巨根蒂生混茫際呼吸羣籟萬人揮斤坎坎有厲陸遷水濟百力殫弊審方靣勢姑博其製作為公室公室既成禦燥濕風日棟之斯厚榱之斯密如翼于飛如鱗櫛比繚以周墉墄以崇階俯而望之矗與雲齊䃤砆碔砆藻井旋題丹素之燝兮椒桂之馥兮高閣高閣珠綴結絡金鋪爛若不集于鳥雀繪事告畢賔筵祑祑乃命旨酒琴瑟琴瑟在堂莫不靜謐周環掩闢仰不漏日冬日嚴凝言納其陽和風載升夏日鬱蒸言用于隂涼風颯興有匪君子自賢不巳乃夢乘舟乃夢乘車夢人占之更爽其居炎炎則移皎皎則虧木實之繁兮明年息枝爰處若思胡寧不爾思十月之郊一章燕于巢審日辰也燕不以甲乙銜泥燕燕于巢綴葺維戊甲兮乙兮不冝有謬飛龍在天雲掩于斗曷日于雨乃曰庚午彼日之差亦孔斯醜昔在羲和湎淫不修我筮我龜莫我告繇胤乃征之彛倫九疇君子授律是禡是禷三五不備罔克攸遂惠此蒸人母廢爾事爾莫我從維來者是兾燕于巢一章蘇方諷商胡舶舟運蘇方歲發扶南林邑至齊國立盡蘇方之赤在胡之舶其利乃博我土曠兮我居􅞔兮我衣不白兮朱紫爛兮傳瑞曄兮相唐虞之維百兮蘇方一章陵霜之華傷不實也陵霜之華我心憂嗟隂之勝矣而陽不加坱軋陶鈞乃帝乃神乃舒乃屯烈烈嚴秋熙熙陽春職生有倫今華發非其辰辰屬東方之仁遐想三五黃帝登雲堯年百餘二儀分位六氣不渝二景如璧五星如珠陵霜之華兮何不妄敷陵霜之華一章囝哀閩也囝音蹇閩俗呼子為囝父為郎罷囝生閩方閩吏得之乃絶其陽為臧為獲致金滿屋為髠為鉗如視草木天道無知我罹其毒神道無知彼受其福郎罷別囝吾悔生汝及汝既生人勸不舉不從人言果獲是苦囝別郎罷心摧血下隔地絶天及至黃泉不得在郎罷前囝一章我行自東不遑居也我行自東山海其空旅棘有叢我行自西壘與雲齊雨雪淒淒我行自南烈火滿林日中無禽霧雨淫淫我行自北燭龍寡色何枉不直我憂京京何道不行兮我行自東一章採蠟怨奢也荒巖之間有以纊蒙其身腰藤造險及有羣蜂肆毒哀呼不應則上捨藤而下沈壑採採者蠟于泉谷兮煌煌中堂烈華燭兮新歌善舞弦柱促兮荒巖之人自取其毒兮採蠟一章倬彼我系一首王勃兄勵序倬彼我系舍弟號州參軍勃所作也傷迫乎家貧道未成而受祿不得如古之君子四十強而仕也故本其情性源其事業西陳先人之迹以議出處致天爵之艱難也倬彼我系出自有周分疆錫社派別枝流居衛仕宋匡嬴相劉乃武乃文或公或矦晉曆崩坼衣冠擾弊粵自太原播徂江澨禮喪賢隱時屯道閉王室如燬生人多殪伊我有器思逢其主自東旋西擇木開宇田彼河曲家乎汾浦天未厭亂吾將誰輔伊我祖德思濟九埏不常厥所于兹五遷欲及時也天豈願焉其位雖屈其言則傳爰述帝制大搜王道曰天曰人是祖是考禮樂咸若詩書具草貽厥孫謀永為家寶伊余小子信慙明哲彼網有條彼車有轍思屏人事克終前烈于嗟代網卒余來絏來絏伊何謂余白仕我瞻先達三十方起夫豈不懷高山仰止願言育德啜菽飲水有鳥反哺其聲嗷嗷言念舊德憂心忉忉今我不養歲月其滔僶俯從役豈敢告勞從役伊何薄求卑位告勞伊何來參卿事名存實爽負信愆義靜言遐思中心是愧元和聖德詩一首并序韓愈臣愈頓首再拜言曰臣伏見皇帝陛下即位以來誅流姦臣朝廷淸明無有欺蔽外斬楊惠琳劉闢以收夏蜀東定靑徐積年之叛海內怖駭不敢違越郊天告廟神靈歡喜風雨明晦無不從順太平之期適當今日臣蒙被恩澤日與羣臣序立紫宸殿下親望穆穆之光而其職業又在以經籍教導國子誠冝率先作歌詩以稱道盛德不可以詞語淺薄不足以自效為懈輒依古作四言元和聖德詩一篇凡千有二十四字指事實録具載明天子文武神聖以驚動百姓耳目傳示無極其詩曰皇帝即祚物無違拒曰暘而暘曰雨而雨維是元年有盜在夏欲覆其州以踵近武皇帝曰嘻豈不在我負鄙為艱縱則不可出師征之其衆十旅軍其城下告以福禍腹敗枝披不敢保聚擲首陴外降幡夜豎疆外之險莫過蜀土韋皋去鎮劉闢守後血人于牙不肯吐口開庫啖士曰隨所取汝張汝弓汝伐汝鼓汝為表書求我帥汝事始上聞在列咸怒皇帝曰然嗟逺士女苟附而安則且付與讀命于庭出節少府朝發京師夕至其部闢喜謂黨汝振而伍蜀可全有此不當受萬牛臠肉萬甕行酒以錦纏股以紅帊首有恇其凶有餌其誘其出穰穰隊以萬數遂劫東川遂據城阻皇帝曰嗟其又可許爰命崇文分卒禁禦有安其驅無暴我野日行三十徐壁其右闢黨聚謀鹿頭是守崇文奉詔進退規矩戰不貪殺擒不濫數四方節度整兵頓馬上章乞討俟命起坐皇帝曰嘻無汝煩苦荆并洎梁在國門戶出師三千各選爾醜四軍齊作殷其如阜或披其角或脫其距長驅洋洋無有齟齬八月壬午闢棄城走載妻與妾包裹稚乳是日崇文入處其宇分散逐捕搜原剔藪闢窮見窘無地自處俯視大江不見洲渚遂自顚倒若杵投臼取之江中枷脰械手婦女纍纍啼哭拜叩來獻闕下以告廟社周示城市咸使觀覩解脫攣索夾以砧斧婉婉弱子赤立傴僂牽頭曵足先斷腰膂次及其徒體骸撑拄末乃取闢駭汗如寫揮刀紛紜爭刌膾脯優賞將吏析圭綴組帛堆其家粟塞其庾哀憐陳殁廩給孤寡贈官封墓周匝宏溥經戰伐地寬免租簿施令酬功急疾如火天地中間莫不順序幽恆靑魏東盡海浦南至徐蔡區外雜虜怛威赧德踧踖蹈舞掉棄兵革私習簋簠來請來覲十百其耦皇帝曰吁伯父叔舅各安爾位訓厥氓畝正月元日𥘉見宗祖躬執百禮登降拜俯薦于新宫視瞻梁梠戚見容色淚落入俎侍祠之臣助我惻楚乃以上辛於郊用牡除于國南鱗筍毛簴廬幕周施開揭磊砢獸盾騰拿圎壇帖妥天兵四羅旗常婀娜駕龍十二魚魚雅雅霄升于丘奠璧獻斝衆樂驚作轟豗融冶紫焰噓呵高靈下墮羣星從坐錯落侈哆日君月妃煥赫婐姽瀆鬼濛鴻嶽祗嶪峩飫沃羶薌産祥降嘏鳯皇應奏舒翼自拊赤鱗黃龍逶陀結糾卿士庶人黃童白叟踊躍歡呀失喜噎􅛷乾淸坤夷境落褰舉帝車回來日正當午幸丹鳯門大赦天下滌濯剗磢磨滅瑕垢續功臣嗣拔賢任耇孩飬無告仁滂施厚皇帝神聖通達今古聽聰視明一似堯禹生知法式動得理所天錫皇帝為天下主并包畜養無異細巨億載萬年敢有違者皇帝勤儉盥濯陶瓦斥遣浮華好此綈紵勑戒四方侈則有咎天錫皇帝多麥與黍無召水旱耗于雀鼠億載萬年有冨無窶皇帝正直別白善否擅命而狂既翦既去盡逐羣姦靡有遺侶天錫皇帝厖臣碩輔博問遐觀以置左右億載萬年無敢豫侮皇帝大孝慈祥悌友怡怡愈愈奉太皇后浹于族親濡及九有天錫皇帝與天齊壽登兹太平無怠永久億載萬年為父為母博士臣愈職是訓詁作為歌詩以配吉甫鄆州溪堂詩一章并序韓愈憲宗之十四年始定東平三分其地以華州刺史禮部尚書兼御史大夫扶風馬公為鄆曹濮節度觀察等使鎮其地既一年褒其軍號曰天平軍上即位之二年召公入且將用之以彼之人安於公也復歸之鎮上之三年公為政於鄆曹濮也適四年矣治成制定衆志大固惡絶於心仁形於色竭心力以供國家之職于時沂密始分而殘其帥其後幽鎮魏不恱于政相扇繼變復歸於舊徐亦乘勢逐帥自署同於三方惟鄆也截然中居四鄰望之若防之制水恃以無恐然而皆曰鄆為虜巢且六十年將強卒武曹濮於鄆州大而近軍所根柢皆驕以易怨而公承死亡之後掇拾之餘剝虜椎髓公私掃地赤立新舊不相保持萬目睽睽公於此時能安以治之其功為大若幽鎮魏徐之亂不扇而變此功反小何也公之始至衆未熟化以武則忿而憾以恩則橫而肆一以為赤子一以為龍蛇憊心罷精磨以歲月然後致之難也及教之行衆皆戴公為親父母夫叛父母從仇讎非人之情故曰易於是天子以為尚書右僕射扶風郡開國伯以褒嘉之公亦樂衆之和知人之恱而侈上之賜也於是為堂於其居之西北隅號曰溪堂以饗士大夫通上下之志既饗其從事陳曾謂其衆言公之畜此邦其勤不亦至乎此邦之人纍公之化惟所令之不亦順乎上勤下順遂濟登兹不亦休乎昔者人謂斯何今者人謂斯何雖然斯堂之作意其有謂而喑無詩歌是不考引公德而接邦人於道也乃使來請其詩曰帝奠九壥有葉有年有荒有條河岱之間及我憲考一牧正之視邦選侯以公來尸公來尸之人始未信公不飲食以訓以徇孰飢無食孰呻孰歎孰冤不問不得分願孰為邦蟊節拫之螟羊很狼貪以口覆城吹之喣之摩手拊之針之石之膊而磔之凡公四封既富以強謂公吾父孰違公令可以師征不寧守邦公作溪堂播播流水淺有蒲蓮深有蒹葦公以賔燕其鼓駭駭公燕溪堂賔校醉飽流有跳魚岸有集鳥既歌以舞其鼓考考公在溪堂公御琴瑟公暨賔贊稽經諏律施用不差人用不屈溪有薲苽有龜有魚公在中流右詩左書無我斁遺此邦是庥漢隄詩一首并序盧肇上元年秋漢水大溢齧襄隄以入既沈漢郛遂滅峴趾棟榱且流壓溺無算襄之城僅以門免三日水去陷為大塗餘民棲于楚山號不敢下餒躓相挽其能全者什六七上大憂曰襄惟東南實脰荆海苦氣不息吾躬曷瘳今天下降下之下災于有漢庭垣盡潴胔骼在淖有嬰墜井母實號之今襄臣盡墜吾號尚及哉咨乃卿士疇能振之以易吾亂咸以地官范陽公舊理南粵島夷率化甘子民心俾踐于襄必克底乂上俞以往公既至省漢之溺由舊防之不固幾五十載又詢之漢水之不犯襄郛惟是甚災既魚士庶災或能嗣孰以遏之慕民新漢之隄食敵其功資三其食因故隄之址廣倍之高再倍之距襄之郊繚半百里明年春隄成公具以疏上大歡復襄之疲民一祀賑榖十萬斛民既保寧謳歌怡愈既而舒蘇不知曩之災也昔狄敗衛侯于熒澤齊桓公帥諸矦城緣陵以居之而衛國忘亡君子是以稱桓公之德今公之為是隄也襄有衛人之思焉而況宣天子之慈以生厥民曷齊桓之尚哉噫五材之生沴也必極干物物之既極天必資明哲以蘇之理之常也古之人有力保一邑勇禦一寇謂之有功尚以金石載之況捍大災救大患其美若是豈得無稱焉是宜以聲詩播之登于樂府惟漢亦有瓠子之歌是可類之謹按正考甫作商詩公子奚斯命太史克請于周作魯詩皆其國之公族也肇於公為族孫幸力於文所不冝默惟峴之碑曰羊公惟隄之詩曰盧公是古今之相光昭也其誰曰不然詩曰隂沴好陽來暴于襄洎入大郛波端若鋩觸厚摧高不知其防駭潰顚委萬室皆毁竈登蛟鼉堂集鱣鮪惟恩若讎母不能子洪潰既涸閈閎其虛巳隳我堵以剝我廬酸傷顧望若踐丘墟帝曰念嗟朕曰南顧流災降慝天曷台怒滔滔襄郊捽我嬰孺於惟餘毗飢傷喘呼火故斯為淫痍孰往膏傅惟汝元寮僉舉明哲我公用諧苴茅杖節來視襄人燠許六切烋許又切提挈不日不月咍乎抃恱乃詠故隄陷于沙泥缺落拗圯由東訖西公曰嗚呼漢之有隄實命性命之命襄人不力乃力則及乃身具鍤與畚漢隄其新帝廩有粟帝府有緡爾成爾隄必錫爾勤襄人怡怡聽命襄滸背囊肩杵奔走蹈舞分之卒伍令以麾鼓尋尺既度日月可數登登嶪嶪周旋上下披峴斫楚楚峴二山在襄南飛石挽土舉築殷雷駭汗霏雨疲癃鰥獨奮有筋膂呀吁來助提筐負筥不勞其勞雜沓笑語咸曰盧公來賜我生斯隄既成蜿蜿而平確爾山固屹如雲橫漢流雖彺堅不可蝕代千年億與天無極惟公之隄昔在人心既築既成橫之于南萌渚不峻此門不深今復在兹于漢之隂斯隄巳崇兹民獲祐齯童相慶室以完富貽于襄人願保厥壽繄公之功赫焉如晝捍此巨災崒若京阜天子錫之百姓載之族孫作詩昭示厥後有所恨二章并序歐陽詹有所恨由故人馬紳死而興也豫待試京師六年與馬生相知者四秋性與情相合也衣與食相同也豫及第歸覲故園自別來無憶不至於襟懷無想不至於姿容願一促膝惄如也昨既至止馬生且疾巫者忌以見人曰不見即愈見即害遂忍即見庶以求見忍者五日馬生云亡噫故人也昔越萬里猶求見焉惑乎一言蔽乎一垣而死生以之死生之道千秋之離也五日之靣半旬之歡也尚可半旬之歡不就而卒甘千秋之離一恨也又與生別撡執都門生脫紫羅半臂曰即日相去秦吳聊以為憶豫貧也素乏衣服不暇藏篋笥聮綿在身二年間同弊帛以棄所以新而輕著故而不留者豫實未衰馬其方少爾斯日日相與也所留何止在兹乎今人既往所贈又造次而亡之二恨也申二恨為有所恨二章云我思君子吁嗟萬里亦既至止曷不覯止本不信巫而巫言是履在門五日如待之死有所恨兮我思遺衣為憶以貽亦既受持曷不保持本不欺友而友情是違隔生之贈造次亡之有所恨兮河之水二章寄姪老成韓愈河之水去悠悠我不如水東流我有孤姪在海陬三年不見兮使我生憂日復日夜復夜三年不見汝使我鬢髮未老而先化河之水悠悠去我不如水東注我有孤姪在海浦三年不見兮使我心苦采蕨于山緡魚于泉我徂京師不其還重校正唐文粹卷第十一
