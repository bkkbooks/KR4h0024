body:
  text: 吳興姚鉉纂古調一揔一百四十五首古今樂章一百三十五首琴操一十首古樂章􅀘樂歌十篇元結􅀘九夏歌系文九篇皮日休今樂章冬至日祀旻天圓丘樂章八首魏徴等作開元樂章十九首張說玄宗開元十三年封㤗山祀天樂章十二首正月上辛祈􅂖於南郊樂章三首禇亮季秋享上帝於明堂樂章一首祀五方上帝于五郊樂章二十首魏徴等作祀朝日樂章三首貞觀中祀夕月樂章三首貞觀中睿宗太極元年登黄地祗於方丘樂章十一首盧從愿等作玄宗開元十三年禪社首山􅀕地祇樂章八首賀知章登太社樂章三首魏徴等作享龍池樂章十首姚崇等作享太廟樂章五首郭子儀等作儀坤廟樂章九首徐彦伯等作琴操十首韓愈􅀘樂歌十篇并序元結自伏羲氏至於殷室凡十代樂歌有其名亡其辭考之傳記其義或存焉嗚呼樂聲自太古始百世之後盡亡古音嗚呼樂歌自太古始百世之後遂亡古辭今國家追復純古列祀徃帝歳時薦享則必作樂而無雲門咸池韶夏之聲故探其名義以􅀘之誠不足全化金石反正宫羽而或存之猶乙乙􅁳􅁳有純古之聲豈幾乎司樂君子導和焉爾凡十篇二十章各引其義以序之命曰􅀘樂歌網􅅈伏羲氏之樂歌也其義蓋稱伏羲能易人取禽獸之勞吾人苦􅀆水深深網􅅈設􅀆水不深吾人苦􅀆山幽幽網􅅈設􅀆山不幽右網􅅈二章章四句豐年神農之樂歌也其義蓋稱神農教人種植之功􅀝太帝􅀆其智如神分草實􅀆濟我生人猗太帝􅀆其功如天均四時􅀆成我豐年右豐年二章章四句雲門軒轅氏之樂歌也其義蓋言雲之岀􅃳益萬物如帝之德無所不施玄雲溶溶􅀆􅂷雨濛濛􅀋我聖澤􅀆涵濡不窮黃雲漠漠􅀆含暎逾光邈我聖德􅀆溥被無方右雲門二章章四句九淵少昊氏之樂歌也其義蓋稱少昊之德淵然深逺聖德至深􅀆奫奫如淵生􅀋娭娭􅀆孰知其然娭許其反右九淵一章章四句五莖顓頊氏之樂歌也其義蓋稱顓頊得五德之根莖植植萬物􅀆脩脩根莖五德涵柔􅀆渢渢房戎反而生其如何􅀆秞秞似周反天下皆自我君􅀆化成右五莖一章章七句六英髙辛氏之樂歌也其義蓋稱帝嚳能揔六合之英華我有金石􅀆擊拊淙淙與汝歌舞􅀆上帝之風由六合􅀆英華渢渢我有絲竹􅀆韻和泠泠與汝歌舞􅀆上帝之聲由六合􅀆根柢嬴嬴右六英二章章六句咸池陶唐氏之樂歌也其義蓋稱堯德至大無不備全元化油油􅀆孰知其然至德汨汨姑没反􅀆順之以先元化浘浘音尾􅀆孰知其然至道泱泱􅀆由之以全右咸池二章章四句大韶有虞氏之樂歌也其義蓋稱帝舜能紹先聖之德森森羣象􅀆日見生成欲聞朕􅀄􅀆玄封􅁳􅁳洋洋至化􅀆日見深柔欲聞涵濩􅀆大淵油油右大韶二章章四句大夏有夏氏之樂歌也其義蓋稱禹治水其功能大中國茫茫下土􅀆乃生九州山有長岑􅀆川有深流茫茫下土􅀆乃均四方國有民人􅀆野有封疆茫茫下土􅀆乃歌萬年上有茂功􅀆下戴仁天右大夏三章章四句大護有殷氏之樂歌也其議蓋稱湯救天下護然得所萬姓苦􅀆怨且哭不有聖人􅀆誰護育聖人生􅀆天下和萬物熈熈􅀆舞且歌右大護二章章四句􅀘九夏歌系文九篇并序皮日休周禮鍾師掌金奏九樂事以鍾鼓奏九夏按鄭康成注云夏者大也樂之大者歌有九也九夏者皆詩篇銘頌之􅀋也此歌之大者載在乎樂章樂崩亦從而亡是以頌不能具也嗚呼吾觀之魯頌其古也亦以乆矣九夏亡者吾能頌乎夫大樂旣去至音不嗣頌於古不足以􅀘亡頌於今不足以入用庸何頌乎頌之亡者俾千古之下鄭衞之内窈窈􅁳􅁳不獨有大卷音拳黄帝樂名之音者乎王夏之歌者王出入之所奏也爣爣皎日欻麗于天厥明御舒如王出焉爣爣皎日欻入于地厥晦厥貞如王入焉出有龍旂入有珩珮勿駈勿馳惟愼惟戒出有嘉謀入有内則繄彼臣庶欽王之式王夏四章章四句肆夏之歌者尸出入之所奏也愔愔清廟儀儀衮服我尸出矣迎神之榖杳杳隂竹坎坎路鼓我尸入矣得神之祜夏肆二章章四句昭夏之歌者牲出入之所奏也有鬱其鬯有儼其彝九變未作全乗來之旣醑旣酢爰􅉧音胤小鼓爰舞象物旣降全乗之去昭夏二章章四句納夏之歌者四方賔客來之所奏也麟之儀儀不縶不維樂德而至如賔之娯鳯之愉愉不篝不笯樂德而至如賔之娱自筐及筥我有牢醑自筐及篚我有貨幣我牢不愆我貨不匱碩碩其才有樂而止納夏四章章四句章夏之歌者臣有功之所奏也王有虎臣錫之鈇􅃏征彼不憓一撲而滅王有虎臣錫之圭瓉征彼不享一烘而泮王有掌封遉音偵爾疆理王有掌客饋爾饔餼何以樂之金石九奏何以賜之龍旂九旒去聲章夏四章章四句齊夏之歌者夫人祭之所奏也􅌑􅌑衡笄翬翬䄖翟自内而祭爲君之則齊夏一章章四句族夏之歌者族人酌之所奏也洪源誰孕䟽爲江河大塊孰埏播爲山阿厥流浩􅃞厥􅀔嵯峨今君之酌慰我實多族夏二章章四句祴夏之歌者賔出之所奏也禮酒旣酌嘉賔旣厚牘爲之奏禮酒旣竭嘉賔旣恱應爲之節禮酒旣罄嘉賔旣酲雅爲之行牘應雅三樂器也賔醉而出奏祴夏以此三器築地爲之行事也祴夏三章章三句驁夏之歌者公出入所奏也􅁊􅁊其珪衮衮其衣出作二伯天子是毗􅁊􅁊其珪衮衮其服入作三􅀌國人是福鷔夏二章章四句冬至日祀旻天圓丘樂章八首魏徴禇亮虞世南等作降神用豫和上靈睠命膺㑹昌盛德殷薦叶辰良景福降􅀆聖德遠玄化穆􅀆天歷長皇帝行用太和穆穆我后道應千齡登三處大得一居貞禮惟崇德樂以和聲百神仰止天下文明登歌奠玉帛用肅和闓陽播氣甄曜垂明有赫圎宰深仁曲成日麗蒼璧煙開紫營聿遵䖍享式降鴻禎迎俎用雍和欽惟大帝載仰皇穹始命田燭爰啓郊宫雲門駭聽雷鼓鳴空神其介祀景祚斯融酌獻飲福用壽和八音斯奏三獻畢陳寳祚惟永光輝日新送文舞出迎武舞入用舒和疊璧凝影皇壇路編珠流彩帝郊前已奏皇鍾歌大吕還符寶曆祚昌年武舞作用凱安昔在炎運終中華亂無象鄷郊赤烏見邙山黒雲上大賚下周車禁􅁀開殷網幽明同叶賛鼎祚齊天壤送神用豫和歌奏畢􅀆禮獻終六龍馭􅀆神將昇明徳感􅀆非􅁰稷降福簡􅀆祚休徴開元樂章十九首張說迎神永和之樂三章肅九室諧八音歌皇慕動神心禮􅀫設樂妙㝷聲明格祼奠臨律迓氣音入玄依玉几御黼筵聆愾息優周旋九韶遍百福傳信工祝永頌聲來祖考聽和平相百辟貢九瀛神休委帝孝成皇帝行太和之樂一章時文聖后清廟肅雍致誠勤孝在貌思恭玉節四夏金鏘五鍾繩繩雲步穆穆天容酌瓉登歌肅和之樂一章天子孝享工歌溥將躬祼鬰鬯乃爇膋薌􅆨以達隂聲以求陽奉時蒸甞永代不忘迎俎雍和之樂二章在滌嘉豢麗碑敬牲角握之牡色純之騂火傳陽燧水漑隂精太公胖俎傅說和羮齋戒豐潔俎豆有馨亦有和羮旣戒旣平鼓鍾管磬肅唱和鳴皇皇后祖來我思成酌獻用文舞一章聖謨九德真言五千慶集昌胄符開帝先髙文仗􅃏克配彼天三宗握鏡六合煥然帝其承祀率禮罔愆圖書霧出日月清懸舞形德􅀋詠諗功傳黃龍蜿蜒綵雲蹁蹮五行氣順八佾風宣介此百福於皇萬年宣皇帝室光犬之舞一章肅肅藝祖滔滔濬源有雄玉劒作鎮金門文王餘緒后稷謀孫肈禋九廟四海來尊光皇帝室長發之舞一章具禮崇德備樂承風魏推憧主周贈司空不行而至無成有終神與王業天歸帝功景皇帝室大政之舞一章於赫元命權輿帝文天齊八柱地半三分宗廟觀德笙鏞樂勲封唐之兆成天下君元皇帝室大成之舞一章帝舞季歷襲聖生昌后歌有媧􅇇炎孕皇天地合德日月齊光肅雍孝享祚我萬方髙祖神堯皇帝室大明之舞一章赤精亂德四海困窮黃旗舉義三靈㑹同旱望春􅀨雲披大風溥天來􅀕髙祖之功太宗文武聖皇帝室崇德之舞一章皇合一德廟宗百神削平天下大拯生民上帝配食單于入臣戎歌陣舞曄曄蒸蒸髙宗天皇大帝室鈞天之舞一章髙皇邁道端拱無爲化懷獯鬻兵戢句驪禮尊封禪樂盛來儀合位媧后同稱伏羲中宗孝和皇帝室文和之舞一章退居江水鬱起丹陵禮物還舊朝典中興龍圖反及駿命恭膺鳴球香瓉大禧是承睿宗大聖真皇帝室景雲之舞一章景雲霏爛告我帝符噫帝沖德與天爲徒笙鏞遥遠俎豆虛無春秋孝獻因復此都皇帝受福酒胙福和之樂一章備禮用樂崇親致尊誠通􅄌降敬徹愛存獻懷稱壽啐感承恩皇帝孝德子孫千億大包天域長亘不極送文舞迎武舞一章六鍾翕恊六變成八佾倘佯八風生樂九韶􅀆人神感美七德􅀆天地清亞終獻武舞凱安之樂四章毖彼瑶爵亞維上公室如屏氣門不容躬禮殷其本樂執其中聖皇所慕天地幽通禮帀三獻樂變九成降循軒陛仰欷皇情福與仁合德因孝明百年神畏四海風行緫緫干戚塡塡鼓鍾奮揚増氣坐作爲容離若􅋧鳥合如戰龍萬方觀德肅肅雍雍烈祖順三靈文宗威四海黃􅃏誅羣盗朱旗掃多罪戢兵天下安約法人心改大哉干羽意長見風雲在撤豆登歌一章止笙磬撤豆籩廓無響窅又玄主在室神在天情餘慕禮罔愆嘉􅁰稷屢豐年送神一章眇嘉樂援靈爽感若来思如往休氣息迴風上返寂寞還愡恍懷虛駕結空想玄宗開元十三年封㤗山祀天樂章一十二首降神用豫和六變夾鍾宫之一欵㤗壇柴㤗清受天命報天成竦皇心薦樂聲志上達歆下迎夾鍾宫之二億上帝臨下庭􅀐日月陪列星嘉視信大禧馨澹神心醉皇靈夾鍾宫之三相百辟貢八荒九歌叙萬舞翔肅振振鏘皇皇帝欣欣福穰穰黃鍾宫之四髙在上道光明物資始德難名承眷命牧蒼生寰宇謐大階平太簇徴之五天道無親至誠與鄰山川遍禮宫徴惟新玉帛非盛聦明㑹眞正斯一德通乎百神姑洗羽之六饗帝饗親維孝維聖緝熈懿德敷揚成命華夷志同笙鏞禮盛明靈降止感此誠敬迎送皇帝用太和孝敬中發和容外彰騰華照㝢如昇太陽眞璧就奠玄靈垂光禮樂具舉濟濟洋洋登歌奠玉帛用肅和羽調奠祖配天承天享帝百靈咸秩四海來祭植我蒼璧布我玄製華日徘徊神煙容􅒨迎爼入用雍和爼豆有馝絜粢豐盛亦有和􅅅旣戒旣平鼓鍾管磬肅唱和明皇皇后祖來我思成酌獻用夀和蒸蒸我后享獻惟寅躬酌鬱鬯跪奠羽神孝莫孝乎配上帝於親敬莫敬乎敎天下爲臣皇帝飲福酒用夀和皇祖嚴配享皇天皇降嘏天子萬年送文舞出迎武舞入用舒和商調六鍾翕恊六變成八佾倘佯八風生樂九韶􅀆人神感美七德􅀆天地清送神用豫和夾鍾宫調禮樂終禋燎上懷靈惠結皇想歸風莊迴天爽百福來衆神往正月上辛祈榖於南郊樂章三首禇亮登歌奠玉帛用肅和履艮斯繩居中體正龍運垂祉昭符啓聖式事巖禋聿懷嘉慶惟帝永錫時皇休命迎俎用雍和殷薦乗春太壇臨曙八簋盈和六瑚登御嘉稷匪歆德聲斯飫祝嘏無易靈心有豫送文舞出迎武舞入用舒和玉帛犧牲申敬享金絲戚羽盛音容庶俾億齡提景福長欣萬㝢洽時邕季秋享上帝於明堂樂章一首送文舞出迎武舞入用舒和御扆合宫承寳歷席圓重館奉明靈偃武修文九圍㤗沈烽靜柝八荒寧祀五方上帝于五郊樂章二十首魏徴禇亮虞世南等作祀皇帝降神宫音黃中正位含章居員旣長六律兼和五聲畢陳萬舞乃薦斯牲神其下降永祥休平登歌奠玉帛用肅和眇眇方輿蒼蒼圎蓋至哉樞紐宅中圖大氣調四序風和萬􅄜祚我明德時雍道㤗迎俎用雍和金縣夕肆玉俎朝陳饗薦黃道芬流紫辰迺誠迺敬載享載禋崇祀斯在惟皇是賔送文舞出迎武舞入用舒和御徴乗宫出郊甸安歌率舞遞將迎自有雲門符帝賞猶持雷鼓荅天成祀青帝降神用角音鶴雲旦起鳥星昏集􅀱啓新風陽開􅀄蟄至德可饗行潦斯挹錫以無疆蒸人乃粒登歌奠玉帛用肅和玄鳥司春蒼龍登歳節物變柳光風轉蕙瑶席降神朱絃享帝誠備祝嘏禮殫珪幣迎爼用雍和大樂希音至誠簡禮文物斯建聲名濟濟六變有成三登無體迺眷豐絜恩覃愷悌送文舞出迎武舞入用舒和笙歌籥舞屬年韶鷺鼓鳧鍾展時豫調露􅀄迎綺春節丞雲遽踐蒼霄馭祀赤帝降用徴音青陽告謝朱明戒序咸長是祈敬陳椒醑博碩斯薦笙鏞備舉庶盡肅恭非馨稷􅁰登歌奠玉帛用肅和離位克明火中宵見峯雲暮起景風晨扇木槿初榮含桃可薦芬馥百品鏘洋三變迎俎用雍和昭昭丹陸弈弈炎方禮陳牲幣樂備箎簧瓊羞溢俎王齊浮觴恭惟正直歆此馨香送文舞出迎武舞入用舒和千里温風飄絳羽十枚炎景勝朱干陳觴薦爼歌三獻拊石摐金㑹七盤祝白帝降神用商音白藏應節天髙氣清歲功旣阜庶􅀋􅀵成萬方靜謐九土和平馨香是薦受胙聦明登歌奠玉帛用肅和金行在節素靈居正氣肅霜嚴林凋草勁豺􅀕隼擊潦收川鏡九榖巳登千箱流詠迎俎用雍和律應西成氣􅄤南吕珪幣咸列笙竽備舉苾苾蘭羞芬芬桂醑式資宴貺用調霜序送文舞出迎武舞入用舒和璿儀氣爽驚緹籥玉吕􅁅飛含素商鳴鞞奏管芳羞薦會舞安歌葆眊揚祝黒帝降神用羽音嚴冬季月星迴風厲享祀報功方祈來歲登歌奠玉帛用舒和律周玉琯星回金度次極陽烏紀窮隂兎火林霰雪湯泉凝沍八蜡巳登三農息務迎俎用雍和陽月斯紀應鍾在􅀱載潔牲牷爰登爼豆旣髙旣遠無聲無􅆨靜言格思惟神保祐登歌奠玉帛用舒和測妙爲神通微曰聖坎祀貽則郊禋展敬璧薦登光金歌動映以載嘉德以流曽慶迎爼用雍和朏晨爭舉天宗禮闢夜典涼秋隂明湛夕有齊斯㫖有牲斯碩穆穆其暉穰穰是積送文舞出迎武舞入用豫和合吹八風金奏動分容萬舞玉鞘驚辭昭茂典光前烈夕曜成功表舊明睿宗太極元年登黃地祇於方丘樂章十一首林鍾商太樂和暢殷薦明神一降通感八變必臻有求斯應無德不親降靈醉止休徴萬人太蔟角盧從愿坤元載物陽樂發生播殖資始品彚咸亨別爼棊布方壇砥平神歆禋祝后德惟明姑洗徴劉冕大君出震有事郊禋齋戒旣肅馨香畢陳樂和禮備候暖風春恭惟降福實頼明神南吕羽韓休於穆濬哲維清緝熈肅事昭配永言孝思滌濯靜嘉馨香在兹神之聽之用受福􅁵皇帝行用太和黄鍾宫王皎於穆聖皇六葉重光太原刻頌后土䟽􅂣寳鼎呈符􅃻雲孕祥禮樂備矣降福穰穰登歌奠玉帛用肅和蕤賔均之夾鍾羽崔玄同聿脩嚴配展事禋宗祥符寶鼎禮備黃琮祝辭以信明德惟聦介兹景福永永無窮登爼用雍和黃鍾均之南宫羽賈曽蠲我漸糦潔我膋薌有豆孔碩爲羞旣臧至誠無昧精意惟芳神其醉止欣欣樂康酌獻飲福用壽和禮物斯具樂章乃陳誰其作主皇考聖真對越在天聖明佐神窅然汾汾厚澤如春送文舞出迎武舞入用舒和太蔟宫何鸞樂奏云闋禮章載䖍禋宗于地昭嘏于天惟馨薦矣旣醉歆焉神之降福永永萬年武舞用凱安黃鍾均之林鍾徴蔣挺維歲之吉維辰之良聖君紱冕肅事壇􅂣大禮巳備大樂斯張神其醉止降福無疆送神用順和源光􅁉方丘旣膳嘉饗載謐齋敬畢誠陶匏貴質秀簠豐薦芳爼盈實永永福流其昇如日玄宗開元十三年禪社首山祭地秖樂章八首賀知章迎神用順和至哉合柔德萬物資以生􅁪順稱厚載流謙通變盈聖心事能察増廣陳厥誠黃祇僾如在㤗折俟咸亨皇帝行用太和肅我成命於昭黃祇裘冕而祀陟降在斯五音克備八變聿施緝熈肆靖厥心匪離登歌奠玉帛用肅和黃祗是祗我其夙夜寅畏誠潔匪遑寧舎禮以琮玉薦厥茅藉念兹降康胡寜克睱迎爼用雍和夙夜宥密不敢寧宴五齊旣陳八音在縣粢盛以絜房爼斯薦明德惟馨尚兹克徧皇帝􅀄獻用壽和惟以明發有懷載殷樂盈而返禮順其禋立清以獻薦欲是親於穆不巳裒對斯臻皇帝飲福用福和穆穆天子告成岱宗大裘如濡執珽有顒樂以平志禮以和容上帝臨我云胡肅邕皇帝還宫用太和昭昭有唐天卑萬國列祖應命四宗順則申錫無疆宗我同德曽孫繼緒享神配極送神用靈具醉代順和源乾曜靈具醉杳熈熈靈將往眇禗禗顧明德吐正辭爛遺光流禎祺登太社樂章三首魏徴禇亮虞世南等作登歌奠玉帛用肅和后土凝德神功叶契九域底平兩儀交際戊期應序隂墉展幣靈車少留俯歆樽桂迎爼用雍和美報崇本嚴恭展事受露流壇承風啓地絜粢登爼醇犧入饋介福逺流羣生畢遂送文舞岀迎武舞入用舒和神道發生敷九稼隂陽乗仁暢八埏緯武經文陶景化登祥薦祉啓豐年享龍池樂章十首姚崇第一章恭聞帝里生靈祉應報明君鼎業新旣叶翠泉光寶命還符白水岀眞人當時舜海潛龍躍此日堯河帶馬巡獨有前河一小鴈叨承舊惠入天津第二章帝宅王家大道邊神馬潛龍涌聖泉昔日昔時經此地㸔來㸔去漸成川歌臺舞榭冝正月柳岸梅洲勝往年莫疑波上春雲少祇爲龍飛直上天第三章沈佺期龍池躍龍龍巳飛龍德光天天不違池開天漢分皇道龍向天門入紫微邸第樓臺多氣色君王鳬鴈有光輝爲報寰中百川水來朝上地莫東歸第四章代邸東南龍或躍泉淸碧浪逺浮天樓臺影就波中出日月光疑鏡裏懸鴈沼迴流成舜海􅀛書薦祉應堯年大川旣濟慙爲楫報德空思奉細㳙第五章姜皎龍池初此岀龍山常經此地謁龍顔日日芙蓉生夏水年年楊柳變春灣堯壇寶匣餘煙霧舜海漁舟尚往還願以飄颻五色影從來從去九天閒第六章龍興白水漢興符聖主時乗運斗樞岸上䒠茸五花樹波中的皪千金珠慘環昔聞迎夏啓發匣先來瑞有虞風色雲光隨隱見赤雲神化象江湖第七章蘇頲西京鳯邸躍龍泉佳氣休光鍾在天軒后霧圎今巳得秦王水劒昔當傳恩魚不似昆明釣瑞鶴長如太液仙願侍廵遊同舊里更聞蕭鼓濟樓舩第八章李乂星分邑里四人居水洊源流萬頃餘魏國君王秤象處晉家蕃邸化龍初靑蒲似騁遊梁馬緑藻疑游宴鎬魚自有神靈滋液地年年雲物史官書第九章姜晞靈沼縈迴邸第前浴日涵春寫曙天始見龍臺昇鳯闕應如霄漢起神泉石匱渚傍還啓聖桃李􅀄生更有仙欲化帝圖從此受正同河變一千年第十章訖坤啓聖吐龍泉泉水年年勝一年始㸔魚躍方成海即覩龍飛利在天洲渚遥將銀漢接樓臺直與紫微連休氣榮光􅁪不散懸知此地是神仙享太廟樂章五首玄宗至道大聖大明孝皇帝室奠獻用廣運之舞一章郭子儀於赫皇祖昭明有融惟文之德惟武之功河海靜謐車書混同䖍恭孝饗穆穆玄風肅宗文明武德大聖大宣孝皇帝室奠獻用惟新之舞一章劉晏漢運惟永神功中興風駈氛祲天覆􅀺蒸三光再朗庶績其凝重熈累葉景命是膺代宗睿文孝武皇帝室奠獻用保大之舞一章郭子儀於穆文考聖神昭彰蕭勺羣慝含光逺方萬物茂遂九夷賔王愔愔雲韶德音不忘德宗神武孝文皇帝室奠獻用文明之舞一章鄭絪於穆時文受天明命允恭玄黙化成理定出震嗣德應乾傳聖猗歟緝熈千億流慶憲宗聖神章武孝皇帝室奠獻用象之舞一章叚文昌肅肅淸廟登顯至德澤周八荒兵定四極生物咸遂羣盗滅息明聖繼承子孫千億儀坤廟樂章九首迎神用永和林鍾宫徐彦伯猗若淸廟肅肅熒熒國薦嚴祀坤興淑靈有几在室有樂在庭臨兹孝享百禄惟寜皇帝行用太和黃鍾宫丘恱孝哉我后沖乎迺聖道映重華德輝文命慕深視篋情殷撫鏡萬國移風兆人承慶酌獻登歌用肅和中吕均之太蔟張齊賢褾圭旣濯鬱鬯旣陳畫􅇈雲舉黃流土醇儀充獻酌禮盛衆禋地察惟孝愉焉饗親迎俎用雍和林鍾宫薛稷陽靈配德隂魄昭升堯壇鳯下漢室龍興俔天作對前旒是凝化行南國道盛西陵造舟集灌無德而稱我粢旣㓗我醴旣澄隂陽靈廟光靈若憑德馨惟饗孝思蒸蒸昭成皇后室酌用坤貞乾道旣亨坤元以貞肅雍攸在輔佐斯成外睦九族内光一庭克生睿哲祈我休明欽若徽範悠哉淑靈建兹淸宫于彼上京縮茅以獻㓗秬惟馨實受其福期乎億齡飲福酒用壽和黃鍾宫徐堅於穆清廟肅雍嚴祀合福受􅁵介以繁祉送文舞出迎武舞入用舒和胡雄送文迎武遞參差一始一終光聖儀四海生人歌有慶千齡孝享肅無虧撤俎用雍和㽔賔均之夾鍾貟半千孝享云畢維撤有章雲感玄羽風悽素商瞻望神座祇戀匪遑禮終樂闋肅雍鏘鏘送神林鍾商祝欽明閟宫實實淸廟微微降格無象馨香有依式昭纂慶方融嗣徽明禋是享神保聿歸琴操十首韓愈將歸操秋之水􅀆其色幽幽我將濟􅀆不得其由渉其淺􅀆石齧我足乗其深􅀆龍入我舟我濟而悔􅀆將安歸尤歸乎歸乎無與石􅃲􅀆無應龍求猗蘭操蘭之猗猗揚揚其香不採而佩於蘭何傷今天之旋其曷爲然我行四方以日以年雪霜貿貿薺麥之茂子如不傷我不爾覯薺麥之茂薺麥之有君子之傷君子之守􅀛山操􅀛之氣􅀆不能爲􅀨􅀛之枿􅀆不中梁柱􅀛之大􅀆秖以奄魯知將隳􅀆哀莫予伍周公有􅀑􅀆嗟予歸輔越裳操雨之施物以孳我何意於彼爲自周之先其艱其勤以有疆宇􅀻我後人我祖在上四方在下厥臨孔威敢戲以侮孰荒于門孰治于田四海旣均越裳是臣拘幽操目窈窈􅀆其凝其盲耳肅肅􅀆聽不聞聲朝不日出􅀆夜不見月與星有知無知􅀆爲死爲生嗚呼臣罪當誅􅀆天王聖明岐山操我家于􅃎自我先公伊我承序敢有不同今狄之人將土我疆民爲我戰誰使死傷彼􅄮有岨我往獨處爾莫余追無思我悲履霜操父􅀆兒寒母􅀆兒飢兒罪當笞逐兒何爲兒在中野以宿以處四無人聲誰與兒語兒寒何衣兒飢何食兒行于野履霜以足母生衆兒有母憐之獨無母憐兒寧不悲雉朝飛操雉之飛于朝日羣雌􅀌雄意氣橫岀當東而西當啄而飛隨飛隨啄羣雌粥粥嗟我雖人曽不如彼雉雞生身七十年無一妾與妃別鵠操雄鵠銜枝來雌鵠啄泥歸巢成不生子大義當乖離江漢水之大鵠身鳥之微更無相逢日且可繞樹相隨飛殘形操有獸維貍􅀆我夢得之其身孔明􅀆而頭不知吉㐫何爲􅀆覺坐而思巫咸上天􅀆識者其誰重校正唐文粹卷第十嘉靖甲申歲太學生姑蘇徐焴文明刻于家塾
