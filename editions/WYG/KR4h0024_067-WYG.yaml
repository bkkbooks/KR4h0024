body:
  text: 銘乙碣頌附揔一十五首髙道二昭夷子趙氏碣頌陳子昻東眀張先生銘栁宗元忠孝二文貞公笏銘孫樵孝門銘栁宗元暴虐二佷石銘皇甫湜秦坑銘司空圗浮圗四洪州大雲寺鐘銘獨狐及鹿泉本願寺鐘銘化成寺大鐘銘李白温州仙巖寺銘司空圗橋梁二石橋銘張嘉貞石橋銘張彧宅一丹崖翁宅銘元結井一井銘柳宗元冢一文冢銘劉蛻昭夷子趙氏碣頌并序陳子昻昭夷子諱元亮字貞固汲人也本居河間為大儒至祖掞尤博雅耽道隋徵八學士與同郡劉焯俱至京師補黎陽郡長始居汲焉有二子禮輿禮轅輿官至臨頴縣丞轅為校書郎並著名當代昭夷即禮輿之季子也元精沖懿有英雄之姿學不常師志在遐逺年二十七褐衣遊洛陽天下名流翕然宗仰羣䝉以初筮求我昭夷以𤣥轂發機故蓬居窮巷軒冕結轍時世議迫阨不容其髙乃屈身泥蟠求禄下位為幽州冝禄縣尉到職逾嵗黙然無言唯採藥彈琴詠堯舜而已州将郡守穆然承風君之道標浩如也因巡田入隴山見烏支丹穴密有潛遁之意蒼龍丙申嵗在大梁遭命不造發痟疾而卒年三十九嗚呼哀哉天下士友聞之知與不知莫不為之垂涕蓋傷其有濟世之量而無長世之年夫上徳道全器無不順中庸以降才則好偏有張也之荘無展也之道好由也之勇緬回也之仁侈宰予之言遺澹臺之行務端木之智忘寗武之愚或正而不竒或達而過雜君獨五味足六氣和通衆賢之不兼暢羣才之大適雖不至於道其殆庶㡬乎故時無閒言物飽其義吾常論人事有十君得其九一不至者命矣夫於戲名聞天下而不達於堂上智周萬物而不適乎一人其時歟其事歟君故人雲居沙門釋法成嵩山道士河内司馬子㣲終南山人范陽盧蔵用御史中丞鉅鹿魏元忠監察御史吳郡陸餘慶秦州長史平昌孟詵雍州司功太原王適洛州㕘軍西河宋之問安定主簿博陵崔璩咸痛君中天鼎餁不實百代祀徳故老或云以為名者徳之表諡者行之迹君囊括世道位屯時艱困乎臲卼光景不曜乃共稽陟舊行考諡定名問于元蓍象曰昭夷遂諡曰昭夷子皆歎曰才位不兼大運有數嘗哀時命而作頌云諸公以予從君之遊最乆故秉翰叅議其頌曰天道宏運兮物各有時匪時不生匪運不生昔者元精汨潏陽九滔災大人感生堯禹恢能陰陽既和𤣥帝傳家五百數終桀鷔暴邪子乙提運水火革眀匪賢不昌尹乃阿衡六百運徂受始淫狂西伯考元厯在聖昌匪雄不决匪謀不臧姜牙皓眉實逢其良投劒指揮奄有八荒周有天下七百餘年太公之後不聞大賢豈無仲尼負道周旋無勢一挈無土一㕓然則大運之所來時㢤時哉隘業隘運巨功巨徳茍非其時草木為伍昭夷作頌闕云又嘗著汲人嚜記言變化之事且曰請爾靈龜永宴息乎浩初東眀張先生銘并序栁宗元東眀先生張氏曰因嘗有以文薦於天子天子筞試甚髙以為長安尉一年投去印綬願為黄老術詔許之居東眀觀三十餘年受畢法道行峻異得衆真祕書訣籙聚經籍圗史侔於麟閣以弟回降秩封州先生曰吾老矣支體不可觧也遂從以去眀年回之子襲死哭之慟遂病既亟以命回曰吾生天寳訖貞元己酉嵗十月今死於汝之手盈吾志矣京師吾生也畢原先人之歸也必以返葬乃自為誌而卒眀年正月某日𦵏如其言子某等為碑以志于墓辭曰匪禄而康匪爵而榮漠焉以虚充焉以盈言而不為華光而不為榮名介絜而周流道包涵而清寜幽觀其形與化相冥寂寞以成其道是以勿嬰世皆狂狂奔利死名我獨浩浩端一以生或曰先生友悌以遁慈㓜以死若不能忘情者何也吾曰道去友邪去慈邪從容以求其得之邪盪莾狠倖道之非邪且夫虧恩壞禮枯槁顦顇隳聖圗夀離中就異欻然與神鬼為偶頑然以木石為類空侗而不實窮老而無死先生之道固知異夫此也乃書于石以紀文貞公笏銘并序孫樵大中六年詔出文貞公笏歸其孫丞相謩孫樵請銘其笏曰靈豸薦角比干獻骨合以憤烈在公為笏怒虎可唾笏不可挫太華可裂笏不可折柱天不仄指日不蝕標儀條臆起梗開直噫諫舌切切上磨帝缺不逆不怫笏則公笏𦂳拱折裂諍舌不發膠榮領餗下偷上愎非公之節孰為公笏夀州安豐縣孝門銘并夀州刺史表栁宗元懿厥孝思兹惟淑靈禀承粹和篤守天經泣侍羸疾黙禱隠冥引刃自嚮殘肌敗形羞膳奉進憂勞孝誠惟時高高曽不是聴創鉅痛仍號于穹旻捧土濡涕頓首成墳陷膺腐眦寒暑在廬草木悴死鳥獸踟蹰殊類異俗亦相其哀肇有二位孝道爰興克修厥猷載籍是登在帝有虞以孝蒸蒸仲尼述經以教于曽惟昔魯侯見命夷宫亦有考叔悟荘稱純顯顯李氏實與之倫哀嗟道路涕慕里隣邦伯章奏稽首慇懃上動帝心旁達眀神神錫祕祉三秀靈泉帝命薦嘉亦表其門統合上下交賛天人建此碑號億齡揚芬夀州刺史臣承思言九月丁亥安豐縣令臣某上所部編户甿李興父被惡疾嵗月就亟興自刃股肉假托饋獻其父老病已不能啖啜經宿而死興號呼撫臆口鼻垂血捧土就墳霑漬涕洟遂於墳左作小廬䝉以苫茨伏匿其中扶服頓踊晝夜哭訴孝誠幽逹神為見異廬上産紫芝白芝二本各長一寸廬中醴泉涌出竒形瑞状應騐圖記此皆陛下孝理神化陰中其心而克致斯事謹按興匹庶賤陋循習淺下性非文字所導生與耒耨為業而能鍾彼醇孝超出古烈天意神道猶錫瑞物以表殊異伏惟陛下有唐堯如天如神之徳冝加旌褒合于上下請表其里閭刻石眀白宣延風美觀示後祀永永無極臣昧死上請很石銘皇甫湜很石蒼蒼驪山之傍鑱朴礲瘢嶷然四方昔秦皇帝謀之不臧七十萬人兹焉惶惶發石此山言礎於墳若有憑依屹住中逵淫刑蹙迫人力無施故老相傳以很名之自昔太古不封不樹有葛於溝有薪於野後聖有作縁情不忍為之棺槨其在唐虞則維􅑆木噫嘻暴秦虐用其人墳而象山下錮三泉窮珍摠竒力瘁財殫驅逐而前如刈草菅天毒其哀神憤其凶讁戍一呼九州風從白挺荆棘指麾崤潼險阻不闔干戈倒鋒屍露于刼燧燔于童逢顆無依不十年中禹𦵏㑹稽不改其行聖徳洋洋厥響久長至于漢劉釋之而言中如可欲猶隙南山矧私其身以盡其人刻詞很石炯戒千春秦坑銘司空圗秦術戾儒厥民斯酷秦儒既坑厥祀隨覆天復儒讎儒祀而家秦坑儒耶儒坑秦耶洪州大雲寺鍾銘獨孤及泰變化孕律吕和神人莫疾於聲故天地以雷震萬物聖人以樂節八風佛土以鍾警六時天造聖作同符異貫自真乘開設其輪三轉像教不墜而法皷之制存彤彤蓮宫于江之濵萬井在其前善惡興乎人将欲誕敷我法音啓迪我善根我是以作萬鈞之鍾大其器所以昭其度也侯誰尸之長者杜海洎此方上士精法觀釋法鸞與比丘衆百三十有五人實果其願将辦所作于時火官金工循厥戒令範陰陽九六之數以合造化均薄厚侈弇之齊以諧清濁聚精㑹神鳩工于其間宏誓既逺昏疑皆破故衆心如城施者成市大悲之感與萬靈接祝融回禄髣髴交應越五月辛丑新鍾成於是此邦民大和㑹膜拜縱觀川塞衢隘億兆諦聽鯨魚乃發訇然如扶摇號而萬竅怒霹靂作而崇山破在坑滿坑在谷滿谷金界岌峇若震若盪既而抝怒散渙與迴飈俱激度越大千周流六虚經于嚴城入于梵宫徘徊乎霜天凌厲乎清夜千門徹萬戸警魚龍皆奮蟲豸不蟄於是聆其音者貪騃遷善聾盲知方識浪安流地獄清涼吒王觧形刀輪摧藏嚴乎心者聞聲以知受觀受以悟法若露清耳根鏡照身業彼金皷聲氣木鐸徇路整衆孚號方斯陋矣蓋聖人宏道以觀善因善以建法作法器以為天下利利者教之果法者教之因善者教之宗我鍾乃懸是訓是崇世界有極大音無窮鹿泉本願寺銅鍾銘八音之列數者金為長金聲之動物者鍾為大相彼創制本乎無心隨輕重之所考遇洪纎而必應其體妙乎其㡬神乎故帝庭用之以和樂梵宇作之而助道其有㫖㢤伊本願道場昔鬼士所卜即輪王建塔之地有隋氏因而緝焉皇唐統天増壮厥構雖臺殿有赫而鍾􅒶未雄曰都維那某等顯允令徳鬱為紀綱洞三學之奥府張二嚴之巨翼以為是聲聞則有以敷衆美不則無以遍十方乃同寅叶恭倡議改作我心匪石彼應如雲緇流輔仁而􅂉勤或懋清信委施而為岡為陵於是乎逺貿金精博召良冶鳬氏宰陶人翼鎔範修林樸植火正叱咤以啓號風師䦧怒而陳力巨扇咆哮洪鑪赫曦焮奪清夜光連紫㣲旁通竇以决注下潛成於數闕夫陰未凝陽為烈爙爆泉沸氣憤雲洩既旬而後實既堅而後發轉於隧漸於堂混乎其輪圎洞然而博暢仙獸勒於下驪龍踏於上蓄精誠含寥亮乃神工之既濟而寳器之大壮也且夫作有度而體有經侈奄均厚薄中則不播不石不鬱不祚雖鴻音未揚識者已知其妙矣故緇衆咸躍善願克充而縣之衣冠里之髦彦聚捨珍翫翕營層臺峻嶒百常沆瀣一色然後挿雲柱倚天梯駢轆轤綰修索攢㔣力以下拔軋豐容而上昇雄以筍鱗顛以交扛猛以簴權作以離立大器斯屬洪椎乃鏗威音潼溶而一吼虓響岌嶪乎三界上極有項下彌空輪飛行天仙海陸神識莫不警革塵滯褰開冥䝉滌曠刧之瑕滅長夜之苦使浩福潛潤冥機坐融其諸佛神通之用乎不然者千鈞之聲一杵之播則曷以臻於是矣允釐僧務本三勢而克終式遏劒輪後四爰而長擊故初起細而促漸登鍠以舒既銳而入㣲又増而復壮於是壮也乃而畢為若是者何皆皇覺啓導抑揚之深思也實欲普其念周乎仁張皇慈音引曵悲韻使萬物咸若六時登聞不惕不惶以安以樂或謂霆鬬雷裂山傾河洩靈祗殱走猛毅僵蹷皆恐怖殺傷之事我大雄氏慈制又悲乎然㢤若乃顆顆聖賢翼翼龍象以之懴薩以之引宣㣲妙其心精進厥徳有秩有序不差不忒住持我像教洋溢我𤣥風洞達我幽眀清寜我邦國神之不可以已其在兹乎皇唐十有八年春仲月八日是鍾也既成即其秋孟月上弦兹臺也復構他方聖衆咸飛來而讚揚地中菩薩咸踊出而瞻仰於是陳巨㑹以落之張梵樂以考之煌煌乎休㢤越寳庭之能事畢矣而宏範莫紀又八稔於斯河南史凜然文林之秀也尉于右邑攝兹銅章恵化一清於灌壇希聲重美於洪器命我昭述式副羣心之望焉而主簿𢎞農楊量新尉楊光朝等並髙幹才敏力懋於道勉奉天秩允恭仁祠輔營樂石賛就厥美雖黙者果得不言乎銘曰靈鍾上空儀法天體道内虚含至圎雄威蓄毓時乃宣震擊鏗鍠流大千十萬調御及聖賢應我真聲開梵筵一切苦輪悲熾然開我真聲咸息肩虚空有盡福無邉神用廣大莫與先化成寺大鍾銘并序李白噫天以震雷皷羣動佛以鴻鍾警大夢而能發揮沉潛開􅁴茫蠢則鍾之取象其義博哉夫揚音大千所以清真心警俗慮協響廣樂所以達元氣彰天聲銘勲皇宫所以旌豐功昭茂徳莫不配美金鼎増輝寳坊仍事作制豈徒然也粤有唐宣城郡當塗縣化成寺大鍾者量函千鈞聲盈萬壑蓋邑宰李公之所剏也公名有則系𤣥元之英蕤茂列聖之天枝生于公族貴而秀出少藴才略壮而有成而西逾流沙立功絶域帝疇乎厥庸始學古從政厯宰潔白聲聞于天天書褒之榮輝簡牘稽首三復子孫其天寳之初鳴琴此邦不言而理日計之無近功嵗計之有大利物不知化潛臻小康神眀其道越不可尚方入于禪闗覩天宫崢嶸聞鍾聲𤨏屑乃謂諸龍象曰曷不建大法皷樹之層臺使羣聾六時有所歸仰不亦美乎於是發一言以先覺舉百里而咸應秋毫不挫於人多子來銅崇朝而山積工不日而雲㑹乃採鳬氏撰鴻鍾火天地之爐扇陰陽之炭回禄奮怒蜚㢘震驚金精轉涾以融熠銅液星熒而㸌􅜱光噴日道氣蔽天維紅雲㸃於太清紫烟矗於遥海烜爀宇宙功侔鬼神瑩而察之吁可駭也爾其龍質炳發虎形躨跜縻金索以上絙懸寳樓而迭擊傍振萬壑髙聞九天聲動山以隠隠響奔電而闐闐赦湯鑊於幽途息劒輪於苦海景福肹蠁被于人天非李公好謀而成宏濟羣物又孰能興於此乎丞尉等並衣冠之龜龍人物之標凖大雅君子同僚盡心聞善賈勇賛成厥美寺主昇朝閒心古容英骨秀氣洒落毫素謙柔笑言海受水而皆納鏡無形而不燭直道妙用乃如是言然常虗懐忘情潔己利物是人行空寂不動見如來有若上座靈隠都維那則舒名僧曰暉藴虚常因調䕶賢哉六開士普聞八萬法深入禪惠精修律儀将博我以文章求我以述作功徳大海酌而難名遂與六曹豪吏姑熟賢老乃緇乃黄鳬趨梵庭請揚宰君之鴻美白昔忝侍從備于詞臣恭承徳音敢闕清風之誦其詞曰雄雄鴻鍾砰隠天雷皷霆擊警大千含號烜爀聲無邉魑魅招靈仙旁極六道下九泉劒輪輟苦期息肩湯鑊猛火停熾然愷悌賢宰人父母興工利物信可久傳芳金鐘永不朽温州仙巖寺銘司空圗巖之巔森㦸鑱天中宅靈僊瀑之作風幹洞壑地洶山鑿越之裔甌之隅人逸而腴某其師某其牧寺圯而復石橋銘并序張嘉貞趙郡洨河石橋隋匠李春之跡也製造竒特人不知其所以為試觀乎用石之妙楞平碪鬬方版促郁縬穹隆崇豁然無楹吁可怪也又詳乎义挿駢坒磨礱緻宻甃百象一仍餬灰􅪤腰纎鐵蹙兩涯嵌四穴蓋以殺怒水之蕩突雖懷山而固䕶焉非大深智逺慮莫能剏是其欄檻華柱鎚斵龍獸之狀蟠繞拏踞眭盱翕欻若飛若動又足畏乎夫通濟利涉三才一致故辰象昭回天江臨乎析木鬼神幽助海石到乎扶桑亦有停杯渡河羽毛填塞引弓擊水鱗甲攢㑹者徒聞于耳不覯于目目所覯者工所難者比於是者莫之與京勑河北道推勾租庸兼復囚使判官衞州司功㕘軍河東柳渙繼為銘曰於繹工妙冲訊靈若架海維河浮黿役鵲伊制或㣲並模蓋略析堅合異超涯截壑支堂勿動觀龍是躍信梁而竒在啟為博北走燕蒯南馳温洛騑騑壮轅殷殷雷薄携斧拖繡騫􅍡視鶴藝入侔天財豐頌閣斵輪見嗟錯石惟作並固良球人斯瞿䁨石橋銘并序張彧閹茂嵗我御史大夫李公晟奉詔摠禁戎三萬北定河朔冬十月師次趙郡郡南石橋者天下之雄勝乃揆厥跡度厥功皆合于自然包我造化僕散客也状而銘曰洨水伊何諸州互湊秋霖夏潦奔突延袤杼材蕆制樸斵紛糅斡地泉開盤根玉甃虹舒電拖虎步雲構截險横包乘流迴透坱軋匠造琳琅蔟簉敞作洞門呀為石竇賖莫筭盈一紀方就力将崩争勢與空鬬呑齊跨趙儆夜防晝月挂虚蟾星羅伏獸謂之銓鍵撮我宇宙謂之闗梁扼我戎㓂郡國襟帶河山領袖經途者安逸軌者覆東南一尉西北一候萬里書傳三邉檄奏郵亭控引事物殷富夕發蒯壖朝趨禁霤質含氷碧文耀藻繡花影全芳苔㾗半舊天啓大壮神功罕究勒銘巨橋敢告豪右丹崖翁宅銘并序元結零陵瀧下三十里得丹崖翁宅丹崖俗曰赤石國有唐節者曽為瀧水令去官家于􅚋下自稱丹崖翁丹崖湘中水石之異者翁湘中得道之逸者愛其水石為之作銘銘曰瀧水未盡瀧水猶峻忽見淵洄丹崖千仞磳磳丹崖其下誰家門前斷舩籬上釣車不知㡬峰為其四墉竹幽石磴飛泉戸中怪石臨淵䂩䂩綺競石巔何得石巔翁獨醉眠吾欲與翁東西茅宇飲啄終老翁亦恱許世俗常事阻人心情徘徊巖下遂刻此銘井銘并序柳宗元始州之人各以甖甈負江水莫克井飲崖岸峻厚旱則水益逺人陟降大艱雨多則塗滑而巔恒惟咨嗟怨惑訛言終不能就元和十一年三月朔命為井城北隍上未晦果寒食冽而多泉邑人以灌其土堅垍其利悠久其相者浮圗談康諸軍事牙将米景鑿者蒋晏凡用罰布六千三百役傭三千六大甎千七百其深八尋有二尺銘曰盈以其神其來不窮惠我後之人噫疇肯似于政其來日新梓州兠率寺文冢銘并序劉蛻文塚者長沙劉蛻復愚為文不忍棄其草聚而封之也蛻愚而不銳於用百工之技天不工蛻也而獨文蛻焉故飲食不忘於文晦冥不忘於文悲戚怨憤疾病嬉游羣居行役未嘗不以文為懷也適當無事而天下将以文為號文眀代生殖眀晦皆效文用故日月星辰文乎旂常昆蟲鳥獸文乎彞器徐方之土文於侯社夏翟之羽文於旌旄登龍於章升玊於藻百工婦人彫礱涂涷以供宗廟祭祀之文豈獨蛻也生知效用不及時文㢤然而意常獲助於天而不獲助於人故其雖窮無憾也當勤意之時不敢啑不敢咳不敢唾不敢跂倚耆欲躁競忘之於心其祗祗畏畏如臨上帝故有粲如星光如貝氣如蛟宫之水又有黯如屯雲如久陰如枯腐熬燥之色則有如春陽如華川逶逶迤迤則有如海運如震怒動蕩怪異夫十為文不滿不如意少如意則豈非天助乎常欲使天下聞之而必行觀之而必蹈散之茫洋以為道演之浸淫以及物然後為農文之使風雨以時兵文之使戎虜以順文於野文於市使其所隠之士以出口者使之言材者使之用然而自振者無力終知者甚稀豈非不獲人助乎嗚呼十五年矣實得二千一百八十紙有塗者乙者有注揩者有覆背者有朱墨圍者於是以周易筮之遇復震下坤上之同人離下乾上筮者曰鳴于地中殷殷隆隆七日而復復來而天下昭融乎他日更召龜而合将聴襲吉卜於火如秦兆惟曰不吉卜於水不成乎河洛兆則亦惟曰不吉卜於木而悶悶土協吉纍纍為冡則汲之兆乎峭峭為壁則魯之兆乎且其占曰土之文為山河為華英将不崩不竭為滋味而傳乎結為丘陵為其設險乎融為川瀆率其朝宗乎華為百榖以絜祭祀之粢盛乎不然使其速腐為墟壤生蒭藁以食牛羊乎化塗泥為陶甄以作器乎将塊為五色而茅社分封乎流於樂為土皷為由桴以洩其和聲乎夷為都邑以興宫廟乎坎為洿池以澤生殖乎祀為壇竈乎窽為井墓乎吾皆不得而知也當既不為吾用唯速化為百工之用慎無朽為芝􅌲以怪人自媚慎無堅為金鐵以作貨起爭慎無潏為醴泉以味乎諂口慎無禱為城社以狐䑕憑妖慎無聳為良材以雕斵傷性慎無萌為蘭􅉅以佩服見藝嗚呼介而為石使之能言舒而為螾使之飲泉既而他年遊魂之未返者亦命巫師而弔三招之號曰在几閣而來歸兮掩為塵垢在耳目而來歸兮奄視汝醜在口吻而來歸兮譽不汝久噫筆絶之年而麟見祟文其無祟乎唅非珠玉歛無裙襦後世詰禮之儒無驚吾之幽墟其冡也在莽蒼之野大塊之丘時有唐大中丁卯而戊辰之季秋銘曰文乎文乎有鬼神乎風水惟貞将利其子孫乎唐文粹巻六十七欽定四庫全書唐文粹巻六十八宋姚鉉編
