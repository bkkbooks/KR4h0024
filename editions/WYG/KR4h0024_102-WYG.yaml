body:
  text: 傳録紀事摠一十二首録二孫氏西齋録孫樵燕将録杜牧紀事五書田将軍邊事孫樵段太尉逸事狀栁宗元拾甲子年事羅隠書何易于孫樵説石烈士羅隠五紀五象江太守李商隠華山尉齊魯二生宜都内人孫氏西齋録孫樵孫樵謂陸長源唐春秋乃編年雜録因掇其絜切峭獨可以示懲勸者擲其叢冗秃屑不足以警訓者自為十八通書號孫氏西齋録起髙祖之初武皇之終首廟號以表元首日月以表事尚功力正刑名登崇善良蕩戮兇囘有所鯁避則㣲文示譏無所顧慄則直書志慝所謂髙祖殺太子建成者何黜功狥愛譏失教也太宗有大功宜嗣有天下髙祖不當立建成為太子至有六月二十四日事故書曰髙祖殺太子建成李勣立皇后武氏者何忘諫贊慝懲廢命也李勣為顧命大臣儻堅諫不奪髙宗不敢立武氏為后故書曰李勣立皇后武氏起王氏已廢之䰟上配天皇者何登嫌黜冢不可謂順予懼後世疑於禘祼也髙宗廢王立武武乃貞觀侍女何以昭穆故特以王后配髙宗示天后有嫌於禘祼條髙后擅政之年下繫中宗者何紫色閏位不可謂正予懼後世牽以稱臨也天后改元即真今悉以天后年號及行事繫於中宗示女子不得改元有政也崔察賊殺中書令裴名犯武宗廟諱者何詭諛梯亂肇殺機也裴為顧命大臣屢白天后歸政御史崔察廷詰曰裴若不有異謀何故使太后歸政天后遂怒斬裴於都寧驛故書曰崔察賊殺中書令裴也張守珪以安禄山叛者何貸刑咈教稔禍階也禄山乃張守珪步将嘗犯令張曲江令守珪斬之守珪不從致亂天下故書曰張守珪以安禄山叛者他皆放此稱天下殺者何罪暴天下示衆與殺也稱天子殺者何死非其罪示衆不與殺也臣或不書卒者何不以直終去卒以示貶也君或不書葬者何不以正終去葬以示譏也懼怠去瑞示戒志濔尚德必書賤尸位則黜貴皆所以毆邪合正俾滙大義則前所謂起王后配天皇條天后年號行事繫于中宗之類操實寘例以示懲勸則前所謂李勣立皇后武氏張守珪以安禄山叛之類嗚呼宰相昇沈人於十數年間史官出没人於千百嵗後是史官與宰相分挈死生權也為史官者不能抃忠骨於枯墳臠諂䰟於下泉磨毫黷札叢閣飽帙豈國家任史官意耶樵既序其略授其友髙錫望傳云燕將録杜牧譚忠者絳人也祖瑶天寶末令内黄死燕寇忠豪健喜兵始去燕燕牧劉濟與二千人障白狼口山名契丹洛後将漁陽軍留范陽元和五年中黄門出禁兵伐趙魏牧田季安令其徒曰師不跨河二十五年矣今一旦越魏伐趙趙成虜魏亦虜矣計為之何其徒有超佐伍而言曰願借騎五千以除君憂季安大呼曰壯哉兵决出或格沮者斬忠其時為燕使魏知其謀乃入謂季安曰某之謀是引天下之兵也何者往年王師取蜀取吳筭不失一是相臣之謀今越魏伐趙不使耆臣宿将而専付中臣不輸天下之甲而多出秦甲君知誰為之謀此乃天子自為之謀欲将夸服於臣下也今若師未叩趙而先碎於魏是上之謀反不如下能不恥於天下乎既恥且怒於是任智畫策仗猛将練精兵畢力再舉涉河鑑前之敗必不越魏而伐趙校罪輕重必不先趙而後魏是上不上下不下當魏而來也季安曰然則若之何忠曰王師入魏君厚犒之於是悉甲壓境號曰伐趙則可隂遺趙人書曰魏若伐趙則河北義士謂魏賣友魏若與趙則河南忠臣謂魏反君賣友反君之名魏不忍受執事若能隂解陴障遺魏一城魏得持之奏㨗天子以為符信此乃使魏北得以奉趙西得以為臣於趙有角尖之耗於魏獲不世之利執事豈能無意於趙乎趙人脫不拒君是魏霸基安矣季安曰善先生之來是天眷魏也遂用忠之謀與趙隂計得其堂陽縣名屬冀州忠歸燕謀欲激燕伐趙㑹劉濟合諸将曰天子知我怨趙今命我伐之趙亦必大備我伐與不伐孰利忠疾對曰天子終不使我伐趙趙亦不備燕劉濟怒曰爾何不直言濟以趙叛命繫忠獄因使人視趙果不備燕後一日詔果來曰燕南有趙北有胡胡猛趙孱不可捨胡而事趙也燕其為予謹䕶北疆勿使予復有挂胡憂而得専心於趙此亦燕之功也劉濟乃解獄召忠曰信如子斷矣何以知之忠曰潞牧盧從史外親燕内實忌之外絶趙内實與之此為趙畫曰燕以趙為障雖怨趙必不殘趙不必為備一且視趙不敢抗燕二且使燕獲疑天子趙人既不備燕潞人則走告於天子曰燕厚怨趙今趙見伐而不備燕是燕反與趙也此所以知天子終不使君伐趙趙亦必不備燕劉濟曰今則奈何忠曰燕孕怨天下無不知今天子伐趙君坐全燕之甲一人未濟易水此正使潞人将燕賣恩於趙敗忠於上兩皆售也是燕貯忠義之心卒染私趙之口不見德於趙人惡聲徒嘈嘈於天下耳惟君熟思之劉濟曰吾知之矣乃下令軍中曰五日畢出後者醢以殉濟乃自将士萬人南伐趙屠饒陽束鹿二縣屬深州殺萬人暴卒於師濟子總襲職忠復用事元和十四年春趙人獻城十二德州管平原安陵長和棣州管厭次河陽信蓨平昌将陵蒲臺渤海冬誅齊三分其地忠因説總曰凡天地數窮合必離離必合河北與天下相離六十年矣此亦數之窮也必與天下復合且建中時朱泚搏天子狩畿甸李希烈僭於梁王武俊稱趙朱滔稱冀田悦稱魏李納稱齊郡國往往弄兵者低目而視當此之時可為危矣然天下卒於無事自元和以來劉闢守蜀棧道劍閣自以為子孫世世之地然軍卒三萬數月見羈李錡横大江撫石頭全吳之兵不得一戰反束縛帳下田季安守魏盧從史守潞皆天下之精甲駕趙為騎鼎立相視可為彊矣然從史繞壍五十里萬㦸自䕶身如大醉忽在轞車季安死墳杵未收家為逐客蔡人被重葉之甲圓三石之弦持九尺之刃突前跳後卒子忽反如摶鶚一可枝百累數萬人四嵗不北二三可為堅矣然夜半大雪忽失其城齊人經地數千里倚㴾海牆泰山壍大河精甲數億鈐劎其阨可為安矣然兵折於潭趙地名鄆西六十里首竿於都市此皆君之自見亦非人力所能及盖上帝神兵下來誅之耳今天子巨謀纎計必平章於大臣鋪樂張獵未甞戴星徘徊顐玩之臣顔澀不展縮衣節口以賞戰士此志豈須臾忘於天下哉今國兵駸駸北來趙人已獻城十二助魏破齊惟燕未得一日之勞為子孫夀後世豈能帖帖無事乎吾深為君憂之總泣且拜曰自數月來未聞先生之言今也幸枉大教吾心定矣明年春劉總出燕卒於趙忠䕶總䘮來數日亦卒年六十四官至御史大夫忠弟憲前范陽安次令持兄䘮歸葬於絳常往來長安間元年孟春某遇於馮翊屬縣北徴中因吐其兄之狀某因直書其事至於褒貶之間俟學春秋者焉書田将軍邊事孫樵背臨卭南馳越二百里得嚴道郡實與沉黎越巂俱為邊城迫於羣蠻田在賓将軍刺嚴道三年能條悉南蠻事謂樵言曰巴蜀西迫於戎南偪於蠻宜其有以制之者當廣德建中之間西戎兩飲馬於岷江其衆如蟻前鋒魁健皆擐五屬之甲持倍尋之㦸徐呼接步且戰且進蜀兵遇鬬如值横堵羅戈如林發矢如蝱皆折刃吞鏃不能斃一戎而況陷其陣乎然其戎兵踐吾地日深而疫死者日衆即自度不能留亦輒引去故蜀人為之語曰西戎尚可南蠻殘我自南康公鑿青谿道以和羣蠻俾由蜀而貢又擇羣蠻子弟聚於錦城使習書筭業就輒去復以他繼如此垂五十年不絶其來則其學於蜀者不啻千百故其國人皆能習知巴蜀士風山川要害文皇帝三年南蠻果大入成都門四日而旋其所剽掠自成都以南越巂以北八百里之間民畜為空加以敗卒貧民持兵羣聚因縁劫殺官不能禁由是西蜀十六州至今為病自是以來羣蠻甞有屠蜀之心居則息畜聚粟動則練兵講戰而又俾其習於蜀者伺連帥之間隙察兵賦之虛實或聞蜀之細民苦於重征且将啟之以幸非常李丞相固言鎮西蜀時其有編民李權者遣書通蠻言蜀無備可取狀邊城獲之按閲得實遂棄市至今或有踵其所為者吾不知羣蠻此舉大劍以南為國家所有乎且毎嵗發卒以戌南者皆成都頑民飽稻飫豕十九如瓠雖知征鼓之數不習山川之險吾常伺其來朔風正嚴緩步坦途日次一舍固以呵然汗矣而況厯重阻即嚴程束甲而趨扶㦸而鬬耶加以為将者刻薄以自入餽運者縱吏以䑕竊縣官當給帛則以踈而易良當賑粟則以沙而叅粒毎嵗當給帛主将輒先市輕帛以易重帛然後散諸邊卒當給糧下吏必先盗其米然後以沙補足數以給邊卒常以為怨如此則邊卒将怨望之不暇又惡能殊死而力戰乎此巴蜀所以為憂樵曰誠如将軍言苟為國家計者孰若詔嚴道沉黎越巂三城太守俾度其要害按其壁壘得自募卒以守之且兵籍於郡則易為役卒出於邊則習其險而又各於其部善相美地分卒為屯春夏則耕蠶以資其衣食秋冬則嚴壁以俟其寇虜連帥即能督之歲遣亷白吏視其卒之有無効其守之不法者以聞如此則縣官無餽運之費奸吏無因縁之盗兵足食給卒無胥怨於将軍何如田將軍曰如此何患言卒遂書段太尉逸事狀栁宗元太尉始為涇州刺史時汾陽王以副元帥居蒲王子晞為尚書領行營節度使寓軍邠州縱士卒無賴邠人偷嗜暴惡者率以貨竄名軍伍中則肆志吏不得問日羣行丐取於市不嗛輒奮擊折人手足椎釡鬲甕盎盈道上把臂徐去至有撞殺孕婦人邠寧節度使白孝德以王故戚不敢言太尉自州以狀白府願計事至則曰天子以生人付公理公見人被暴害因恬然且大亂若何孝德曰願奉教太尉曰某為涇州甚適少事今不忍人無寇暴死以亂天子邊事公誠以都虞候命某者能為公已亂使公之人不得害孝德曰幸甚如太尉請既署一月晞軍士十七人入市取酒又以刀刺酒翁壞釀器酒流溝中太尉列卒取十七人皆斷頭拄槊上植市門外晞一營大譟盡甲孝德震恐召太尉曰将奈之何太尉曰無傷也請辭於軍孝德使數十人從太尉太尉盡辭去解佩刀選老躄者一人持馬至晞門下甲者出太尉笑且入曰殺一老卒何甲也吾戴吾頭來矣甲者愕因論曰尚書固負若屬耶副元帥固負若屬耶奈何欲以亂敗郭氏為白尚書出聽我言晞出見太尉太尉曰副元帥勲塞天地當務始終今尚書恣卒為暴暴且亂亂天子邊欲誰歸罪罪且及副元帥今邠人惡子弟以貨竄名軍籍中害殺人如是不止幾日必大亂亂由尚書出人皆曰尚書倚副元帥不戢士然則郭氏功名其與存者幾何言未畢晞再拜曰公幸教晞以道恩甚大願奉軍以從顧叱左右皆解甲散還火伍中敢譁者死太尉曰吾未晡食請假設草具既食曰吾疾作願留宿門下命持馬者去且曰明旦來遂卧軍中晞不解衣戒候卒擊柝衞太尉旦俱至孝德所謝不能請改過邠州由是無禍先是太尉在涇州為營田官涇大将焦令諶取人田自占數十頃給與農曰且熟歸我半是嵗大旱野無草農以告諶曰我知入數而已不知旱也督責益急農且飢死無以償即告太尉太尉判状辭甚巽使人求諭諶諶盛怒召農者曰我畏段某耶何敢言我取判鋪背上以大杖擊二十垂死輿來廷中太尉大泣曰乃我困汝即自取水洗去血裂裳衣瘡手注善藥旦夕自哺農者然後食取騎馬賣市穀代償使勿知淮西寓軍帥尹少榮剛直士也入見諶大罵曰汝誠人耶涇州之野如頳人且飢死而必得穀又用大杖擊無罪者段公仁信大人也而汝不知敬今段公惟一馬賤賣市穀入汝汝又取之不恥凡為人傲天災犯大人擊無罪者又取仁者穀使主人出無馬汝将何以視天地尚不愧奴𨽻耶諶雖暴抗然聞其言則大愧流汗不能食曰吾終不可以見段公一夕自恨死及太尉自涇州以司農徴戒其族過岐朱泚必致貨幣慎勿收及過泚致大綾三百兩太尉壻韋晤堅拒不得命至都太尉怒曰果不用吾言晤謝曰處賤無以拒也太尉曰然終不以在吾第以綾如司農治事堂棲之梁木上泚反太尉終吏以告泚泚取視其故封識具存太尉逸事如右元和九年月日永州司馬員外置同正員栁宗元謹上史館今之稱太尉大節者以為武人一時奮不慮死以取名天下不知太尉之所立如是宗元甞出入岐周邠斄間過真定北上馬嶺厯亭鄣戎堡竊好問老校退卒能言其事太尉為人煦煦常低首拱手促步言氣卑弱未甞以色待物人視之儒者也遇不可必達其志決非偶然者㑹州刺史崔公來言信行直備得太尉遺事覆校無疑或恐尚逸墜未集太史氏敢以狀私於執事謹狀拾甲子年事羅隠太和中張谷納邯鄲人李嚴女備歌舞具及長大妍麗豐足殆不似下賤物又能傳故都聲以牽課人摧沮有時涼曉哀轉厯厯見趙家之遺臺老樹雖驚離弔往之懐似不能多也雅為谷所愛因目曰新聲及劉從諫得父封谷以窮遊佐其事新聲亦從去然性本便惠雖谷之起居謀慮皆預有承迎故頗聞中外消息時從諫得志後勾聚亡命以窺脅朝廷大為四方人怪訝有實其事於谷者谷不以介意新聲曰妾於公直巾屨間狎玩者耳除歌酒外不當以應顧命然食人之食憂人之憂理常也況妾乎前日天子授從諫節度使時非從諫有戰野之功拔城之績盖以其先父挈齊還我去就間未能奪其嗣耳而公不幸為其屬則牽制之道在此不在彼也自劉氏奄有全趙更改嵗時未甞聞以一縷一蹄為天子夀而指使輩率無賴人且章武朝數鎮顛覆皆以雄才傑器尚不能固天子恩況從諫擢自兒女子手中一旦襲如何家業茍不以法而得亦宜以不法而終此倚伏之常數也而又卒伍佻險言語不祥是不為齊鬼所酬而死於帳下者幸矣孰謂公從其事反不知其事者哉姑不能早折其肘臂以作天子計則宜脱族西去大丈夫勿顧一飯恩以骨肉腥健兒衣食言訖悲涕流落谷不決者三月新聲後進以其業不用也縊殺之㑹昌中從諫死以其子露父意族之谷竟從逆嗚呼謀及婦人者必亡而新聲之言惜其不用余前過太行時有傳吏能道當時事因拾於編簡書何易于孫樵何易于甞為益昌令縣距刺史治所四十里城嘉陵江南刺史崔朴甞乗春自上游多從賓客歌酒泛舟東下直出益昌旁至則索民挽舟易于即自腰笏引舟上下刺史驚叫問狀易于曰方春百姓不耕即蠶隙不可奪易于為屬令當其無事可以充役刺史與賓客跳出舟偕騎還去益昌民多即山樹茶利私自入㑹鹽鐵奏重㩁筦詔下所在不得為百姓匿易于視詔曰益昌不征茶百姓尚不可活矧厚其賦以毒民乎命吏剗去吏爭曰天子詔所在不得為百姓匿今剗去罪愈重吏止死明府公寧免竄海裔耶易于曰吾寧愛一身以毒一邑民乎亦不使罪蔓爾曹即自縱火焚之觀風使聞其狀以易于挺身為民卒不加劾邑民死䘮子弱業破不能具葬者易于輒出俸錢使吏為辦百姓入常賦有垂白僂杖者易于必召坐與食問政得失庭有競民易于輒親自與語為指白枉直罪小者勸大者杖悉立遣之不以付吏治益昌三年獄無繫民民不知役改綿州羅江令其治視益昌是時相國裴公出鎮綿州獨能嘉易于治甞從觀其政導從不過三人其全易于亷約如此㑹昌五年樵道出益昌民有能言何易于治狀者且曰天子設上下考以勉吏而易于考止中上何哉樵曰易于督賦何如曰上請貸期不欲𦂳絶百姓使賤出粟帛督役何如曰度支費不足遂出俸錢冀優貧民饋給往來權勢何如曰傳符外一無所與擒盗何如曰無盗樵曰余居長安中十年嵗聞給事中考校則曰某人為某縣得上下考某人由上下考得某官問其政則曰某人能督賦先期而畢某人能督役省度支費某人當道能得往來達官為好言某人能擒若干盗縣令得上下考者如此邑民不對笑去説石烈士羅隠石孝忠者生長韓魏間其為人猛悍多力少年時偷雞殺狗殆不可勝計州里甚苦之後折節事李愬為愬前驅其信任與愬家人伍元和中蔡人不歸天子用裴丞相訃以丞相征蔡若愬者光顔者重𦙍者皆受丞相指揮明年蔡平天子快之詔刑部韓侍郎撰平蔡碑将所以大丞相功業於蔡州孝忠一旦熟視其文大恚怒因作力推去其碑僅傾陊者再三吏不能止乃執詣節度使悉以聞時章武皇帝方以東北事倚諸将聞是卒也甚訝之命具獄将斃於碑下孝忠度必死也茍虚死則無以明愬功乃偽低畏若不勝按騐吏罔之未知其為人也孝忠伺吏隙用枷尾柆一吏殺之天子聞之怒且使送闕下及至也亦未異其人因召見曰汝推吾碑殺吾吏為何孝忠頓首曰臣一死未足以塞責但得面天顔則赤族無恨矣臣事李愬嵗乆以賤故給事無不聞見平蔡之日臣從在軍前且吳秀琳蔡之姦賊也而愬降之李祐蔡之驍将也而愬擒之蔡之爪牙脱落於是矣及元濟縛雖丞相與二三軰不能先知也蔡平之後刻石記功盡歸乎丞相而愬第其名與光顔重𦙍齒愬固無所言矣設不幸更有一淮西其将略如愬者復肯為陛下用乎賞不當功罰不當罪非陛下所以勸人也臣所以推去碑者不惟明愬之績亦将為陛下正賞罰之源臣不推碑無以為吏擒臣不殺吏無以見陛下臣死不容時矣請就刑憲宗既得淮西本末且多其義遂赦之因命曰烈士復召翰林段學士撰淮西碑一如孝忠語後孝忠隸江陵軍驅使大中末白丞相鎮江陵余求謁丞相府有從事為余道孝忠事遂次焉将所以教人為下象江太守李商隠滎陽鄭璠自象江得怪石六其三聳而銳上又一如世間道士存思圖畫人肺胃肝腎次第懸絡者又一空中而隠外若癃癭殃疝病不作物者又一色紺冰去聲而理平漫彈之好聲璠為象江三年不病瘴平安寢食及還長安無家居婦兒寄止人舍下計輦六石道費俸六十萬璠嗜好有意極類前輩人華山尉陶生有恒人善養又善與人遊又善為官㑹昌初生病骨熱且死是年長安中進士為陶生誄者數十人生在時吾已得之矣及既死吾又得之齊魯二生程驤右一人字蟠之其父少良本鄆盗人也晩更與其徒畜牝馬草一羸私作弓矢刀杖學發塚抄道常就迥逺坑谷無廬徼處依大林木蚤夜偵候作姦李師古貪諸土貨下令䘏商鄆與淮海近出入天下珍寶日日不絶少良致貲以萬數每旬時歸妻子輒置食飲勞其黨後少良老前所置食有大臠連骨以牙齒稍脫落不能食其妻輒起請黨中少年曰公子與此老父椎埋剽奪十數年意不計天下有活人今其尚不能食況能在公子叔行胡浪反耶公子此去必殺之草間無為鐵門外捕盗所徂快少良黙憚之出百餘萬謝其黨曰老嫗真解事敢以此為諸君别衆許之與盟曰事後敗出約不相引少良由是以其貲發舉􅐙轉與隣伍重信義䘏死䘮斷魚肉蔥薤禮拜畫佛讀佛書不復出里閈意若大君子能悔咎前惡者十五年死子驤率不知後一日有過其母罵之曰此種不良庸有好事耶驤泣問其語母盡以少良時事告之驤號哭數日不食乃悉散其財踰年驤甚苦貧就里中舉負給薪水灑掃之事讀書日數千言里先生賢之時與饘糗布帛使供養其母後漸通五經厯代史諸子雜家往往同學人去其師從驤講授又其為人寛厚滋茂動靜有繩墨人不敢犯烏重𦙍為鄆帥喜聞驤與之錢數十萬令市書籍驤復以其餘賚諸生其里閭故德少良者亦常來與驤孳息其貨數年復致萬金驤固不以為已有繩契管楗雜付比近用度費耗了不勘詰道益髙開成初相國彭城公遣其客張谷聘之驤不起劉义右一人字义不知其所來在魏與焦濛閭冰田滂善任氣重義大軀有聲力甞出入市井殺牛擊犬豕羅網鳥雀亦或時因酒殺人變姓名遁去㑹赦得出後流入齊魯始讀書能為歌詩然恃其故時所為輒不能俛仰貴人穿屐破衣從尋常人乞丐酒食為活聞韓愈善接天下士步行歸之既至賦冰柱雪車二詩一旦居盧仝孟郊之上樊宗師以文自任見义拜之後以爭語不能下諸公因持愈金數斤去曰此諛墓中人所得耳不若與劉君為夀愈不能止復歸齊魯义之行固不在中庸聖賢之列然其能面道人短長不畏卒禍及得其服義則又彌縫勸諫有若骨肉此其過人無限宜都内人武后簒既乆頗放縱耽内習不敬宗廟四方日有叛逆防豫不暇時宜都内人以唾壺進思有以諫者后坐帷下倚檀机與語問四方事宜都内人曰大家知古女卑於男耶后曰知内人曰古有女媧亦不正是天子佐伏羲理九州耳後世孃姥有越出房閣斷天下事者皆不得其正多是輔昏主不然抱小兒獨大家革天姓改去釵釧襲服冠冕符瑞日至大臣不敢動真天子也然今内之弄臣狎人朝夕進御者乆未屏去妾疑此未當天意后曰何内人曰女隂也男陽也陽尊而隂卑雖大家以隂事主天然宜體取剛亢明烈以消羣陽陽消然後隂得志也今狎弄日至處大家夫宫尊位其勢隂求陽也陽勝而隂亦㣲不可乆也大家始今日能屏去男妾獨立天下則陽之亢剛明烈可有矣如是過萬萬世男子益削女子益専妾之願在此后雖不能盡用然即日下令誅作明堂者唐文粹巻一百
