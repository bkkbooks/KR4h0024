  - {type: variant, offset: 125, length: 4195, content: 懷劉幽求自紀皇甫松贈友人吕温贈韓愈二首孟郊贈喬林劉眘虛寄唐生白居易華下司空圖傷時二首孟雲卿封丘作高適街西居三首姚合效陳拾遺子昂司空圖感時夜坐張說無可奈何歌白居易逢白公元稹感懷費冠卿贈崔純亮孟郊客喜賈㠀有所思宋之問秦人謡古之竒時興楊賁聞砧有感呂温野田行于鵠贈馮宿李觀偶然作二首呂温及第後荅潼關主人朝飢賈㠀九日酬顧少府髙適感物十六觀玊篇陳子昂素絲陸龜蒙李都尉古劒白居易廢琴廢瑟詞張籍說劒元稹春桂問荅二首王績養鷙詞劉禹錫對菊賈㠀直鉤吟盧仝競渡元稹見牧牛人擔靑草張說道州觀野火呂温諭寳二首元稹春感八送春曲三首劉禹錫衡州春早二首呂温㝷人偶題邵眞題花樹楊衡惜花陸龜蒙秋感六秋日耿緯秋夕懷逺孟郊蟠蟀詩羅隱秋思司空圖在郡秋懷二首張九齡感寓詩三十八首陳子昻微月生西海幽陽始化昇圓光正東滿隂魄巳朝凝太極生天地三元更廢興至精諒斯在三五誰能徵蘭若生春夏芊蔚何靑靑幽獨空林色朱蕤冒紫莖遲遟白日晚嫋嫋秋風生歲華盡揺落芳意竟何成蒼蒼丁零塞今古𬗟荒途亭堠何摧兀暴骨無全軀黃沙莫南起白日隠西隅漢甲三十萬曽以事匈奴但見沙場死誰憐塞上孤樂羊爲魏將食子殉軍功骨肉且相薄他人安得忠吾聞山中相乃屬放麑翁孤獸猶不忍况以奉君終市人矜巧智於道若童蒙傾奪相夸侈不知身所終曷見玄眞子觀世玉壷中杳然遺天地乗化入無窮吾觀龍變化乃知至陽精石林何冥密幽洞無留行古之得仙道信與元化并玄感非象識誰能測淪冥世人拘目見酣酒笑丹經崐崘有瑤樹安得采其英白日每不歸靑陽時暮矣茫茫吾何思林卧觀無始衆芳委時晦鶗鴂悲鳴耳鴻荒古巳頽誰識巢居子吾觀崐崘化日月淪洞冥精魄相交構天壤以羅生仲尼推太極老聃貴窈冥西方金仙子崇議乃無明空色皆寂滅業縁定何成名教信紛籍死生俱未停聖人祕元命懼世亂其眞如何嵩公輩詼譎誤時人先天誠爲美階亂禍誰因長城備胡㓂嬴禍發其親赤精旣迷漢子年何救秦云去桃李花多言死如麻深居觀元化悱然爭朶頥羣動相啖食利害紛㘈㘈便便夸毗子榮耀更相持務光讓天下商賈競刀錐巳矣行采芝萬世同一時吾愛鬼谷子靑谿無垢氛囊括經世道遺身在白雲七雄方龍鬪天下乆無君浮榮不足貴導養晦時文舒可彌宇宙卷之不盈分豈徒山木壽空與麋鹿群呦􅊯南山鹿離罟以媒和招揺靑桂樹幽蠧亦成科世情甘近習榮耀紛如何怨憎未相復親愛生禍羅瑤臺傾巧笑玉杯殞雙蛾誰見孤城樹靑靑成斧柯林居病時乆水木澹孤淸閑卧觀物化悠悠念無生靑春始萌逹朱火巳滿嬴殂落方自此感歎何時平臨歧泣世道天命良悠悠昔日殷王子玉馬遂朝周寶鼎淪伊穀瑶臺成故丘西山傷遺老東陵有故侯貴人難得意賞愛在須臾莫以心如玉採他明月珠昔稱夭桃子今爲舂市徒鴟鴞悲東國麋鹿泣姑蘇誰見鴟夷子扁舟去五湖聖人去巳乆公道𬗟良難蚩蚩夸毗子堯禹以爲謾驕榮貴工巧勢利遞相干燕王尊樂毅分國願同歡魯連讓齊爵遺組去邯鄲伊人信往矣感激爲誰歎幽居觀大運悠悠念羣生終古代興没豪聖莫能爭三季淪周赧七雄滅秦嬴復聞赤精子提劒入咸京炎光旣無象晉魯復縱橫堯禹道巳昧昬虐勢方行豈無當世雄天道與胡兵咄咄安可言時醉而未醒仲尼溺東夏伯陽遁西𬈑大運自古來旅人胡歎哉逶迤世巳乆骨鯁道斯窮豈無感激者時俗頽此風灌園何其鄙皎皎於陵子世道不相容嗟嗟張長公聖人不利巳憂濟在元元黃屋非堯意瑶臺安可論吾聞西方化淸淨道彌敦奈何窮金玉彫刻以爲尊雲構山林盡瑶圖珠翠煩鬼功尚未可人力安能存夸愚適増累矜智道逾昬玄天幽且黙羣議曷嗤嗤聖人教猶在世運乆陵遟一繩將何繫憂醉不能持去去行采芝勿爲塵所欺蜻蛉遊天下與世本無患飛飛未能止黃雀來相干穰侯富秦寵金石比交歡出入咸陽裏諸侯莫敢言寜知山東客激怒秦王肝布衣取丞相千載爲辛酸微霜知歲晏斧柯始靑靑況乃金天夕浩露霑羣英登山望宇宙白日巳西𬈑雲海方蕩潏孤鱗安得寧翡翠巢南海雄雌珠樹林何如美人意驕愛比黃金殺身炎洲裏委羽玉堂隂旖旎光首飾葳㽔爛錦衾豈不在遐逺虞羅忽見㝷多材信爲累歎息此珍禽挈瓶者誰子妖服當靑春三五明月滿盈盈不自珍高堂委金玉微縷懸千鈞如何負公鼎被奪笑時人玄蟬號白露兹歲巳蹉跎羣物從大化孤英將奈何瑤臺有靑鳥逺食玉山禾崐崘見玄鳳豈復虞雲羅荒哉穆天子好與白雲期宫女多怨曠層城閉蛾眉日耽瑤臺樂豈傷桃李時靑苔空萎絶白髪生羅帷朝發冝都渚浩然思故鄕故鄕不可見但見巫山陽巫山彩雲没高丘正微茫佇立望巳乆涕淚霑衣裳豈兹越鄕感憶昔楚襄王朝雲無處所荆國亦淪亡昔日章華宴荆王樂荒淫霓旌翠羽蓋射光雲夢林朅來高堂觀悵望陽雲岑雄圖今何在黃雀空哀吟丁亥歲云暮西山事甲兵羸糧市卭道荷㦸爭羌城嚴冬隂風勁窮岫油雲生昬黷無晝夜羽檄復相驚攀跼兢萬仞崩危逺九冥藉藉峯壑裏哀哀冰雪行聖人御宇宙聞道太階平肉食謀何失葵藿𬗟縱橫可惜瑤臺樹灼灼佳人姿碧華映朱實攀折靑春時豈不盛光寵榮君白玉墀但恨紅芳歇凋傷感所思朅來豪遊子勢利禍之門如何蘭膏歎感激自生怨衆趨明所避時棄道猶存雲泉旣巳失羅網與誰論箕山有髙節湘水有淸源唯應白鷗鳥可爲洗心言索居獨幾日炎夏忽然衰陽彩皆隂翳親友盡睽違登山望不見涕泣乆漣洏宿夢感顔色若與白雲期世中驕豪子驅逐正嗤嗤蜀山與楚水擕手在何時金鼎合神丹世人將見欺飛飛騎羊子胡乃在蛾眉變化固幽類芳菲能幾時疲痾苦淪世憂痗日侵淄眷然顧幽褐白雲空涕洟朔風吹海樹蕭條邊巳秋亭上誰家子哀哀明月樓自言隂燕客結髪事逺遊赤丸殺公吏白刃報私讎避仇至海上被役此邊州胡郷三千里遼水復悠悠毎憤胡兵入常爲中國差何知七十載白首未封侯本爲貴公子平生實愛才感時思報國拔劒起蒿萊西馳丁令塞北上單于臺登山見千里懷古心悠哉誰言未忘禍磨没成塵埃浩然坐何暮吾蜀有蛾眉念與楚狂子悠悠白雲期時哉悲不㑹涕泣乆漣洏夢登綏山穴南采巫江芝探元觀竒化遺世從雲螭婉孌將未矣感悟不見之朝入雲中郡北望單于臺胡秦何宻邇沙朔氣雄哉藉藉天驕子猖狂巳復來塞垣無名將亭堠空崔嵬咄嗟吾何歎邊人塗草萊仲尼探元化幽鴻順陽和大運自盈縮春秋遞來過盲飇忽號怒萬物相紛劘溟海皆震蕩孤鳳其如何感寓七首張九齡蘭葉春葳㽔桂華秋皎絜欣欣此生意自爾爲佳節誰知林棲者聞風坐相恱草木有本心何求美人折幽林歸獨卧滯慮洗孤淸持此謝高鳥因之傳逺情日夕懷空意人誰感至精飛沉理自隔何所慰吾誠魚遊樂深池鳥棲欲髙枝嗟爾蜉蝣羽薨薨亦何爲有生豈不化所感奚若斯神理日微滅吾心安得知浩歎楊朱子徒然泣路岐孤鴻海上來池潢不敢顧側見雙翠鳥巢在三珠樹矯矯珍木嶺得無金丸懼美服患人指髙眀逼神惡今我遊冥冥弋者何所慕呉越數千里夢寐今夕見形骸非我親衾枕即郷縣化蝶猶不識川魚安可羡海上有仙山歸期覽神變抱影吟中夜誰聞此歎息美人適異方庭樹銜幽色白雲愁不見滄海飛無翼鳳凰一朝來竹花此可食漢上有游女求思安可得袖中一書札欲寄雙飛翼冥冥獨不見耿耿徒緘憶紫蘭秀空蹊皓露奪幽色馨香歲欲晩感歎情何極白雲在南山日暮長太息感寓權德輿殘雨倦欹枕病中時序分秋蟲與秋葉一夜隔䆫聞虚室對摇落晤言無與羣冥心試觀化世故如絲棼但看鳶戾天豈見山出雲下俚徒擊節朱絃祕南薰椅梧秀朝陽上有威鳳文終待九成奏來儀瑞吾君效陳拾遺子昻感寓二首司空圖髙燕飛何捷啄害恣羣鶵人豈玩其暴華軒容爾居强欺自天稟剛吐信吾徒乃知不平者矯世道終孤陽和含煦潤卉木競紛華當爲衆所恱私已汝何誇北里祕穠豔東園鎻名花豪奪乃常理笑君徒咄嗟古意二首擬梓州陳拾遺孫郃屈子生楚國七雄知其材介絜世不容跡合藏蒿萊道廢固命也瓢飲亦賢哉何事葬江魚空使後人哀魏禮叚干木秦王乃止戈小國有其人大國奈之何賢哲信爲美兵甲豈云多君子戰必勝斯言聞孟軻詠史十一首李華日照崐崘上羽人披羽衣乗龍駕雲霧欲往心無違此山在西北乃是神仙國靈氣皆自然求之不可得何爲漢武帝精意徧羣山糜費巨萬計宫車終不還蒼蒼茂陵樹足以戒人間天生忠與義本以佐雍熈何意李司隷而當昬亂時古墳襄城野斜徑横秋陂况不禁樵採茅莎無孑遺髙摽尚可仰精爽今何之一忤中常侍銜冤誰見知常觀黨錮傳撫卷不勝悲文侯耽鄭衛一聽一忘飱白雪燕姬舞朱絃趙女彈淫聲流不返惂蕩日無端獻歲受朝時鳴鐘醼百官兩牀陳管磬九奏殊未䦨對此唯恐卧更能整衣冠漢皇脩雅樂乗輿臨太學三老與五更天王親割牲一人調風俗萬國和且平單于驟款塞武庫欲銷兵文物此朝盛君臣何穆清至今壝壇下如有簫韶聲蜀主相諸葛功髙名亦尊驅馳十萬衆怒目瞰中原曹伯任公孫國忘身不存社宫乆蕪没白鴈猶飛翻勿言君臣合可以濟黎元爲蜀諒不易如曹難復論秦滅漢帝興南山有遺老危冠揖萬乗幸得厭征討當君逐鹿時臣等巳枯槁寧知市朝變但覺泉石好高卧三十年相看成四皓帝言翁甚善見顧何不早咸稱太子仁重義亦尊道側聞驪姬事申生不自保蹔出商山雲朅來趨灑掃東宫成羽翼楚舞傷懷抱後代無其人戾園滿秋草六國韓最弱末年尤畏秦鄭生爲韓計且欲疲秦人利物可分社原情堪滅身咸陽古城下萬頃稻苗新昻藏獬豸獸出自太平年亂代乃濳伏縱人爲禍愆常聞斷馬劒毎壯朱雲賢身死名不滅塞風吹墓田精靈如有在幽憤滿松煙沂水春可渉泮宫映楊葉麗色異人間珊珊摇珮環展禽恒獨處深巷生禾黍城上飛海雲城中暗春雨適來鳴珮者復是誰家女泥沾珠綴履雨濕翠毛簪電影閉蓮臉雷聲飛蕙心自言沂水曲采蘋兼采菉歸逕雖可㝷天隂光景促憐君貞且獨願許君家宿徒勞惜衾枕子不顧雙蛾豔質誠可重淫風如禮何周王惑襃姒城闕成陂沲巢許在嵩潁陶唐不得臣九州上洗耳一命安能親緜邈數千祀丘中誰隱淪朝遊公卿府夕是山林人蒲帛楊仄陋薜蘿爲搢紳九重念入夢三事思降神且設庭中燎寧窺泉下鱗漢時征百越楊僕將樓舩幕府功未立江湖巳騷然島夷非敢亂政暴地仍偏得罪因懷璧防身輒控弦三軍求裂土萬里詎聞天魏闕心猶在旗門首巳懸如何得良吏一爲制方圓詠史一首髙適尚有綈袍贈應憐范叔寒不知天下士猶作布衣看詠史二首釋皎然田氏門下客馮公衆中賤一朝市義還百代名獨擅始知下客不可輕能使主人功業成借問髙車與珠履何如庇賤一書生獨負髙世姿冥冥寄浮俗下子去不歸何人識荆玉鬻舂意不淺汚跡身豈辱鸞鎩樂迍邅蚪蟠甘窘束五噫譎且正可以見心曲詠史二首劉禹錫驃騎非無勢少卿終不去世道劇頽波我心如砥柱賈生眀王道衛綰工車戲同遇漢文時何人居貴位詠史四首盧照鄰昔有平陵男姓朱名阿游直髪上衝冠壯氣橫三秋願得斬馬劒先斷佞臣頭天子玉檻折將軍丹血流捐生不肯拜視死其若休歸來敎郷里童蒙逺相求弟子數百人散在十二州三公不敢吏五鹿何能詶名與日月懸義與天壤儔何必疲執戟區區在封矦偉哉曠逹士知命固不憂季生昔未逹身辱功不成髠鉗爲臺隷灌園變姓名幸逢滕將軍兼遇曹丘生漢祖廣招納一朝拜公卿百金孰云重一諾良匪輕廷議斬樊噲羣公寂無聲處身孤且直遭時坦而平丈夫當如此唯唯何足榮大漢昔云季小人道遂振玉帛委閽尹斧鑕嬰搢紳邈哉郭先生卷舒得其眞雍容謝朝廷譚笑㢡人倫在晦不絶俗處亂不爲親諸矦不得友天子不得臣沖情甄負甑重價折角巾悠悠天下士相送洛橋津誰知仙舟上寂寂無四鄰公業負竒志交結盡才雄良田四百頃所食常不充一爲侍御史書懷, WYG: 懐}
