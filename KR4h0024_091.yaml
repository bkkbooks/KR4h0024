  text: 重校正唐文粹卷第九十一
  hash: sha256:785cd222daa399eebac56aae930b4e1cbb2e28bcf8b170cfdab91b97d90e622d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0024_SBCK_091-1a}
body:
  text: 吳興姚鉉纂序甲揔九首集序唐丞相禮部尚書許國公蘇頲文集序韓休唐丞相鄴侯李泌文集序梁肅唐丞相太傅文貞公崔祐甫文集序權德輿唐丞相兵部尚書宣公陸贄翰苑集序唐丞相禮部尚書文公權德輿文集序楊嗣復唐丞相中書侍郎韋處厚文集序劉禹錫唐丞相太尉衛國公李德𥙿會昌一品制集序鄭亞唐徐州節度使贈司徒張建封文集序權德輿唐昭容上官氏文集序張説唐金紫光祿大夫禮部尚書上柱國贈尚書右丞相許國文憲公蘇頲文集序韓休易有四象有天文焉有人文焉所以察時變而觀化成也詩有六義有小雅焉有大雅焉所以陳國風而美王政也文之時用其肇於兹自長發禘殷正考述其典在坰頌魯史克明其訓由是比興繼作風流彌繁黃竹白雲垂芳於帝籍楚蘭班素作麗於辭人莫不究情性之微含風騷之旨吟詠先王之澤光昭正始之宗故情發於中而申之以歌詠文生於情而飾之以辭彩所以立言會友感物造端藻暢襟靈導揚隱伏潤彼金石流于管弦以告其成功而懿我文德者也嗚呼斯文未喪命丗聿興發揮造化之微鼓動江山之氣轥轢前古昭彰後葉疇克有之則尚書許公應運而挺生矣公四代相門十卿崇構海域挹其軒冕搢紳推其䡄儀夫其導源錫胤之慶克家屏宗之美論道布政之典推誠立節之效並以勒於豐碑紀在良史此則略而不言焉公神秀頴發自然生知五歲便措意於文每坐卧吟諷未常暫輟至于八九歲則有若大成焉一覽誦千言有若素習十七遊太學對䇿甲科振鱗溟渚濯羽弱泉海內重林宗之名朝廷籍賈生之譽矣時吏部侍郎馬載名知人見公歎曰蘇生一日千里王佐才也後因選集時屬糊名考判公與宋璟俱入殊等由是天下益稱焉公任御史時兩臺有送别四韻詩四十餘首試令公誦之一遍倒覆之遂不錯一字其敏晤也如此公任起居郎屬考功貟外郎闕時中書令李嶠執筆曰考功郎非蘇君莫可遂拜考功貟外郎遷給事中特制授修文館學士遷中書舍人專知制誥僉議允歸制命勑書皆出自公手筆不停綴思無所讓及是見君深所歎伏焉今上嘗謂公曰朕每見卿文章與諸人尤異當令後代作法豈惟獨稱朕心及東封詔公撰朝覲壇頌加金紫光祿大夫與一子官賞能也公性與道合神無滯用惟深也總衆妙之門惟才也體生人之秀若乃學以聚之問以辨之括囊道藝之場探賾幽微之數至若㧦戈考篆魯鼎看銘書有亡篋文稱墜簡疑絳老之年走朝有問卜晉侯之疾訪史莫知莫不取揆宏襟詢謀逹識公辨無不釋言必造微掩雲夢以吞之湛陽秋以照之如太嶽之覽羣山若蒼溟之朝百谷者矣至乃緒發而宫商應言形而雅頌興爽律與雲天並高繁章與霞月俱亮故能虛明獨照壯思雄飛自我心極為之宰匠嘗亦紀秦望銘華山勒函谷之關刋燕然之石繁弦間發縟彩相輝歌奏而白雪遂孤賦成而黃金有貴豈惟排終拉賈為王超陳而已若乃天言煥發王命急宣則翰動若飛思如泉涌典謨作制於邦國書奏便蕃於禁省敏以應用婉而有章則近代以來未之前聞也豈學而得之歟抑亦天縱之歟何其殊尤而懿鑠也惜乎循途未極閲川行謝雖洞簫為賦方傳漢帝之宫而禪草遺忠空留茂陵之下思盛烈其如在覽餘文而增歎曲池無處舊館寂寥感知巳以悼恩懷舊德而何極豈峴山之上長留墮淚之詞延閣之中不紀藏書之録謹撰緝文誥成一家之言凡四十卷列之如左請藏於祕府以示來裔唐丞相鄴侯李泌文集序梁肅唐興元丗天子以人文化成天下王澤洽頌聲作洋洋焉與三代同風其相之臣曰鄴侯李泌字長源用比興之文行易簡之道贊事盛聖辨章品物疏通以盡理閎麗而合雅舒卷之道必形於辭其偉矣夫子嘗論古者聰明睿聖之君忠肅恭懿之臣敘六府三事同八風七律莫不言之成文歌之成聲然後浹於人心人心安以樂播為風俗風俗厚以順其有不由此者為理則粗在音則煩粗之弊也朴煩之甚也亂用其道行其位者歷選百千不得十數嘻才難不其然乎開元中公七歲見丞相始興張公九齡張駭其聰異授以屬辭之要洎始興沒不六十載公果至宰相封侯有文集二十卷其美嘉遁則有滄浪紫府之詩在王廷則有君臣賡載之歌或依隱以玩世主文以譎諫步驟六義發揚時風觀其辭者有以見上之任人始興之知人者巳初太上當陽公以處士延登內殿實敷黃老之訓至德初宣皇以元良受禪公則獻太階頌昭纂堯之道睿文以廣平伐罪公則握中權之柄參復夏之功大德不官既追五嶽之隱大用不器終踐代天之職方將熙庶工以成邦教載直筆以修唐書命之不融凡百興歎既薨之來載皇上負扆之暇思索時文徴公遺編藏諸御府於是公立言垂丗之譽獨善兼濟之略藏在册牘載於碑表惟斯文之可傳於後嘗謂肅曰吾子辭直盍存乎篇序既詠歎之不足因著其所以然貽諸好事者凡詩三百表志碑頌讃序議述又百有二十其五十篇缺獨著其目云唐銀青光祿大夫守中書侍郎同中書門下平章事贈太傅常山文貞公崔祐甫文集序權德輿昔舜禹之代股肱昌言以祗承于帝修六府敘九功曰都曰俞殷周之際有伊訓説命太保太師旅獒金縢之書以戴翼其代皆有大烈格于皇天自三代巳還君臣感會何嘗不經緯斯文裁成百度太傅文貞公寅亮德宗致建中之理左輔右弼緝熙光明居中一歲以至大病愍䇿尊名為唐宗臣公薨二十九歲天子命公嗣子植為右拾遺植乃捧公遺文三十編見咨論敘德輿以為君子消長之道值乎其時而文亦隨之得其時則章明事業以宣利澤不得其時則放言寄意以攄志氣公自門閥秀士𬒳服薦紳至於登朝宰政四十年間作為文章以修人紀以逹王事懼喜怒之不中節故有作威誡懲苟得之害正故有重請鍾銘恐匪人之干紀故有與永王璘箋書誚時宰之不能上廣聰明故有台封説悼谷風之詩廢故有僚友針慮法吏邊吏之失其官守故有貓鼠議是惟無作作則有輔於時以至於修事功斷國論導志通理昭明易直施於名命為雅誥刻於金石無愧辭康莊逸軌卓犖濬發九流六藝鼓舞奔走陳思王所謂儼乎若崇山勃乎若蒸雲惟公信然公姓崔氏諱祐甫字貽孫博陵安平人先孝公之清德與公始中終之盛烈勒於帝籍藏在惇史升公堂奧之君子多為之撰録大較以同人之中正大有之剛健中庸之明誠洪範之攸好德艱貞踐履出入光大皆充其義如其文嘗試言之天下公器也匪皇極不乂操柄者務廣通則其弊以流縱私回則其弊以沒以是至於紀綱淆亂官職耗廢敗壞陵夷而不可為務守者弊以隘則窘若梏拲於是才滯而不發事壅而不宣其於病王猷盩大倫圯也及公平衡宰物為之折衷使文皇明皇之風粲然復興崇起教化萬方同軌道協氣宣臻至理而無癘疵為仁由已善善若不及泝其心源存乎斯文君子曰觀文貞之文而知其道知其道然後知其理古之易易也昔公能修先孝公之志類其文章趙郡李公遐叔實為之序今植亦能修公之志而德輿無似懼辱命焉凡九百二十篇為一家之言云爾唐贈兵部尚書宣公陸贄翰苑集序嘗讀賈誼書觀其經制人文鋪陳帝業術亦至矣待之宣室恨得後時遇亦深矣然竟不能逹四聰而盡其善排羣議而試厥謀道之難行亦巳久矣東陽絳灌何代無之嘻一薰一蕕善齊去聲不能同其器方鑿圎枘良工無以措巧心所以治丗少而亂日多大雅衰而正聲寢漢道未融既失之於賈傳吾唐不幸復擯棄於陸公公諱贄字敬輿吳郡蘇人漂陽令侃之子年十八登進士第應博學宏辭科授鄭縣尉非其好也省母歸壽春刺史張鎰有名於時一獲晤言大加賞識暨别鎰以泉貨數萬為賮曰願以此奉太夫人一日之膳公悉辭之領新􅟒一串而巳是歲以書判拔萃調渭南主簿御史府以監察換之德宗皇帝春宫時知名召對翰林即日為學士由祠部貟外轉考功郎中朱泚之亂從幸奉天時車駕播遷詔書旁午公灑翰即成不復起草初若不經思慮及成而奏無不曲盡事情中於機會蒼卒填委同職者無不拱手歎伏不能復有所助嘗從容奏曰此時詔書陛下冝痛自引過以感人心昔禹湯以罪已勃興楚昭以善言復國陛下誠能不吝改過以言謝天下俾臣草辭無諱庶幾羣盜革心上從之故行在詔書始下雖武人悍卒無不揮涕激發議者以德宗克平寇亂不惟神武之功爪牙宣力蓋亦資文德腹心之助焉及還京師李抱真來朝奏曰陛下在山南時山東士卒聞書詔之辭無不感泣思奮臣節時臣知賊不足平也公自行在帶本職拜諌議大夫中書舍人精敏小心未嘗有過艱難扈從行在輒隨啓沃謨猷特所親信有時宴語不以公卿指名但呼陸九而已初幸梁洋棧道危狹從官前後相失上夜次山館召公不至泫然號於禁旅曰得陸贄者賞千金頃之公至太子親王皆賀初公既職內署母韋氏尚在吳中上遣中使迎致京師道路置驛文士榮之丁韋夫人憂去職持喪於洛遣人護漂陽之柩附於河南上遣中使監護其事四方賻遺數百萬公一無所取素與蜀帥韋南康布衣友善韋令每月置遺公奏而受之服闋復內職權知兵部侍郎覲見之日天子為之興改容敘弔優禮如此內外屬望旦夕俟其輔政為竇參忌嫉故緩之真拜兵部侍郎知貢舉得人之盛公議稱之貞元八年拜中書侍郎平章事公以少年入侍內殿特蒙知遇不可與衆浮沈苟且自愛事有不可必諍之上察物太精躬臨庶政失其大體動與公違姦諛從而間之屢至不恱親友或規之公曰吾上不負天子下不負吾所學不恤其他公精於吏事斟酌剖決不爽錙銖其經綸制度具在德宗實録及竇參納劉士寧之賂為李巽所發得罪左遷橫議者以公與參素不協歸罷相之議於公戶部侍郎判度支裴延齡以姦回得幸害時蠹政物議莫敢指言公獨以身當之屢言不可翰林學士吳通玄忌公先逹每切中傷隂結延齡互言公短宰相趙憬公之引拔升為同列以公排邪守正心復異之羣邪沮謀直道不勝十年退公為賔客罷政事明年夏旱芻糧不給軍校訴於上延齡奏曰此皆陸贄輩怨望鼓扇軍人也貶公忠州别駕上怒不可測賴陽誠張萬福救之獲免蜀帥韋令抗表請以贄代巳歲賂資糧公在南賔閉門卻掃郡人稀識其面復避謗不著書唯考校醫方撰集驗方五十卷行於丗江峽十稔永貞𥘉與鄭餘慶陽城同徴還公巳薨殁時年五十二公之秉筆內署也攉古揚今雄文藻思敷之為文誥伸之為典謨俾􅘀狡向風懦夫增氣則有制詰集一十卷覽公之作則知公之為文也潤色之餘論思獻納軍國利害巨細必陳則有奏草七卷覽公之奏則知公之為臣也其在相位也推賢與能舉直錯枉將斡璿衡而揭日月清氛沴而平泰階敷其道也與伊説爭衡考其文也與典謨接軫則有中書奏議七卷覽公之奏議則知公之事君也古人以士之遇也其要有四焉才位時命也仲尼有才而無位其道不行賈生有時而無命終於一慟唯公才不謂不長位不謂不逹逢時而不盡其道非命歟裴氏之子焉能使公不遇哉説者又以房魏姚宋逢時遇主克致清平陸君亦獲幸時君而不能與房魏爭列蓋道未至也應之曰道雖自我弘之在人蜚蝗竟天農稷不能善稼奔車覆轍丘軻亦廢規行若使四君與公易時而相則一否一臧未可知也而致君不及貞觀開元者蓋時不幸也豈公不幸哉以為其道未至不亦誣乎公之文集有詩文賦集表狀為别集十五卷其關於時政昭昭然與金石不朽者惟制誥奏議乎雖巳流行多謬編次今以類相從冠于編首兼略書其官氏景行以為序引俾後之君子覽公制作效之為文為臣事君之道不其偉歟唐丞相禮部尚書文公權德輿文集序楊嗣復唐有天下二百二十載用文章顯於時代有其人然而自成童就傳以及考終命解巾筮仕以及鈞衡師保造次必於文視聽必於文采章皆正色而無駮雜調韻皆正聲而無竒邪滔滔如河東注不知其極而又處命書綸綍之任專考核品藻之柄參化成輔翊之勳初中終全而有之得之於相國文公矣公諱德輿字載之天水人也族望祖宗之遠當官行巳之道語在國史銘於壙而碑於途此不敢詳今所載者因緑文業而巳早歲為淮南江西從事據管記室之任屬辭詣理奏入報可移文走檄疆事迎解登朝為起居舍人改駕部貟外郎換司勳郎中遷中書舍人凡四任九年專掌詔詰大則發德音修典册灑朝廷之利澤增盛德之形容小則褒才能敘官業分别流品申明誡勸無誕辭無巧語誠直溫潤真王者之言公昔自纂録為制集五十卷託於友人湖南觀察使楊公慿為之序故今不在編次內其他千名萬狀隨意所屬牢籠今古窮極微細周流於親愛情理之間磅礴於勳賢久大之業不為利疚不以菲廢本乎道以行乎文故能獨步當時人人心服非以德爵齒俠而致之貞元中奉詔考定賢良卓澤之士升名士十七人及為禮部侍郎棹進士第者七十有二鸞凰𣏌梓舉集其門登輔相之位者前後十人其他征鎮嶽牧文昌掖垣之選不可悉數繼居其任者今猶森然非精識洞鑒其辭而知其人何以臻此邪憲宗皇帝紹開中興始以英明申威提法武功既俞文教是圖元和五年冬執政暴疾既瘖且痺未旬日而公作相憲章儒術潤色王度使和聲順氣發自廊廟而鬯浹於幽遐我之所長時以推戴玉立氷潔無緇磷遷染之譏以文德自終豈徒然哉嗣復不佞發迹門館儀曹台席皆忝前躅公之元子中書舍人璩不幸短命其嗣子憲泣奉文集求鄙辭以冠篇首雖觀於巨海難挹波濤而藉用白茅所資誠敬其五十卷次第具在集目謹序唐中書侍郎平章事韋處厚文集序劉禹錫漢庭以賢良文學徴有道公孫弘條對第一席其勢鼓行人間取丞相且侯使漢有得人之聲伊弘發也皇唐文物與漢同風故天后朝燕國公説以辭標文苑徴玄宗朝曲江公九齡以道侔伊吕徴德宗朝天水薑公公輔杜陵韋公執誼河東裴公洎以賢良方正徴憲宗朝河南元公稹京兆韋公惇以才識兼茂徴隴西牛公僧孺李公宗閔以能直言極諌徴咸用對䇿甲於天下繼為有聲宰相古今相望落落然如騎星辰與夫起版築飯牛者異矣公本名惇舉進士登賢良既仕方更名處厚字德載漢丞相扶陽侯之裔孫後周逍遙公敻之八代孫右僕射某之元子生而聰明絶人在提孩發言成詩未幾能賦受經於先君僕射學文於伯舅許公孟容及壯通六經旁貫百氏咨天人之際遂探曆數明天官窮性命之源以至佛書尤所通逹初為集賢殿校書郎宰相李趙公監修國史引公直東觀就改咸陽尉遷右拾遺轉左輔闕丗稱有史才而能諌諍入尚書為郎歷禮部考功皆人望所在上方用威武以讋不庭宿兵寖久韋丞相貫之酌人情上言不合意册免因歷詆所善公在伍中出為開州刺史居二年執友崔敦詩為相徴拜戶部郎中至闕下旬歲間以本官知制誥穆宗新即位注意近臣召入翰林充侍講學士初授諌議大夫續換中書舍人侍遊蓬萊池延問大義退而進六經法言二十編優詔答之賜以金紫尋遷權知兵部侍郎知制誥翰林侍講史館修撰長慶四年春敬宗踐祚以公用經術左右先帝五稔聞其德尤所欽倚內署故事與外庭不同凡言翰林學士必草詔書有侍講者專備顧問雖官為中書舍人或他官知制誥第用其班次耳不竄言於訓辭至是上器公且有以寵之乃使內謁者申命去侍講之稱慮未論于百執事居數日降命書重舉舊官以明新意尋真拜夏官二卿由是內庭辭臣無出其右者凡密旨必承乎權輿故號承旨學士上富有春秋未親庶政或有疑滯視公如蓍龜寶曆季年宫壼間一夕生變人情大駭雖鼎臣無所關決惟內署得預參畫羣議悶然俟公一言而定戡難纘服再維乾綱今上繼統䇿勳第一棹拜中書侍郎同中書門下平章事以高才遇英主功顯人伏言無不從筆端膚寸澤及天下盡罷冗食請歸才人事先有司物止常貢城社無犯巗廊益尊感恩盡瘁不嗇神用太和二年十二月上前言事未及畢辭疾暴作以朝服委地同列白奏搢笏扶持之不能起上命中貴左右翼輔歸于中書如大醉狀上震驚咨嗟徴醫賜藥旁午疊委會暮肩輿至第識旦以疾不起聞贈禭加常禮後十年嗣子蕃以太子舍人直弘文館編次遺文七十通銜哀貢誠乞辭以冠其首公未為近臣巳前所著讃論記述銘志皆文士之辭也以才麗為主自入為學士至宰相以往所執筆皆經綸制置財成潤色之辭也以識度為宗觀其發德音福生人霈然如時雨褒元老諭功臣穆然如景風命相之册和而莊命將之誥昭而毅薦賢能其氣似孔文舉論經學其博似劉子駿發十難以摧言利者其辨似管夷吾噫逢時得君奮智謀以取高位而令名隨之豈不偉哉初蕃既纂修父書咨于先執李習之請文為領袖許而未就一旦習之悄然謂蕃曰翺昔與韓吏部退之文章盟主同時惟栁儀曹宗元劉賔客夢得耳韓栁之逝久矣今翺又𬒳病慮不能自述有孤前言齎恨無巳將子薦誠于劉君乎無何習之夢奠于襄州蕃具道其語余感相國之平昔且憐蕃之虔敬庶幾能丗其家固不讓唐丞相太尉衛國公李德𥙿會昌一品制集序鄭亞綸紼之興載籍之始先王發號施令明罰勑法蓋本於此也唐虞之盛二典存焉夏殷之隆厥有訓誥自胤征甘誓乃有誓命之書皆三代之文一王之法也虞夏之際代祀綿逺其代工掌制之名氏莫得而知至于成湯太甲則有仲虺伊尹為之訓誥高宗得傳説則有説命之篇周公邵公相成王則有洛誥酒誥周官顧命秦始皇帝并一區宇丞相李斯實掌其言漢興當秦焚書之後侍從之臣皆不習文史蕭曹之輩又乏儒墨之用每封功臣建子弟其辭多天子為之縱委於執翰者亦非彰灼知名之士武帝使司馬相如視草率皆文章之流以相如非將相器也厥後寖微寖長下于魏晉亦代有其人我高祖革隋文物大備在貞觀中則顔公師古岑公文本興焉在天后時則李公嶠崔公融出焉燕許角立於玄宗之朝常楊繼美於代宗之丗洎憲宗皇帝英武啓運雄圖赫張中興之業高映前古其時則先太師忠公翺翔內署有密勿贊佐之績平吳定蜀實惟其功及登樞衡作霖雨尊王室卑諸侯圖蔡料齊外定內理顯王言於典誥彰帝範於圖籍紀在徽册播於無窮特進太子少保分司東都衛公長慶中事惠皇為翰林學士訓誥之業彰於傳聞昭肅皇帝統握乾符寤寐良弼詔自淮海復升台庭盡付玄機允厭神度每彤墀奏罷别承天眷帝亦講伊訓説命之旨定元首股肱之契以太平之制度上古之文教咸屬於公焉會先太后懿號未立帝明發有永懷之痛公述沙麓神井之瑞贊繞樞懷日之慶懋遵聖緒光慰孝思於是承命有宣懿祔廟之制及武宗郊昊天拜清廟文物胥備朝廷有禮華夷述職河朔修貢乃顯神休薦徽號奉揚一德以示萬方於是撰仁聖文武至神大孝之册封域無虞天子翛然有求玄之思乃範貞金模聖表隆凖日角燭于宫庭中外臣寮咸欲以頌山河而褒日月也公於是有聖容之讃天街之北獯鬻攸居因飢慿凌怙衆強禦嚴之以刁斗而勃爾無懼申之以文告又腆然不率天子震怒旋命征之公獨運沈機上資宸斷萬里勝負決於帷中雷霆既振犬羊遂潰疣贅披抉腥膻解離遁其名王復我貴主公於是有討北狄之詔天寶末薊門為首亂之地瘡痏榛棘襲丗未平至是漁陽帥仲武掃除妖孽臧獲仇讎奉揚滅神乃底康靖仍願勒石於盧龍之塞以敘聖功飛章上聞帝用允若公祗應明命舒展格言呼嘯神祗吐納嵩華當晝而文星現不寐而白鳳來成諸侯不朽之勳尊元后無私之化公於是有幽州紀聖功之碑潞帥劉從諌死其子因關河之險恃甲兵之衆請爵爭地屢聞王庭中外疑迷互撓天聽帝將耀神武公纍獻忠謀且言曰重耳在喪不聞利父雄渠受戮秖以拒君況明皇舊宫天井內地跨連河北脅倚山東豈可行有匪人坐為汙俗若是可忍孰不可容沃心無疑躡足乃定又曰上黨居天下之脊當河朔之喉今漳水雄兵常山徑卒是為脣齒實懼因依不若乘於未萌制其將動帝俞其奏乃妙選使臣以勞諭之嚴立刑賞以勸戒之魏侯鎮侯勠力從命絶壺關之右臂收沍水之上遊獲兹渠魁在此成算又轅門叛將橫水餘凶竊上相之旌旗盜晉陽之管鑰帝怒斯赫人心愈疑咸以師老于郊梟巢尚固議罷兵者蚊聚請宥過者雷同公又揚笏而言曰彼地則義師師介宗室是玄祖勤商之邑后稷造周之邦瓜瓞具存堂構斯在茍虧䇿畫不襲仇讎則是將彌牟逐主之風長冒頓射親之俗詩稱築室于道書謂疑謀勿成由是洞啓宸衷大破羣議運籌制勝舉無遺䇿防微慮逺必契神機授鉞之臣服膺承命謝安之圍棊尚拗曹參之飲酒方酣果有軍書繼聞戎捷砥磨周鉞兵淬鄭刃萬里來袁紹之頭顱二冡葬蚩尤之肩髀歡聲雖震於朝市喜氣不見於形容何其纂立功勳鎮定風俗若是之重公於是有伐上黨之制平晉陽之勑宗英可汗獻琛輸賮越自絶域通于本朝文畢伯士之胤呼韓鹿蟸之師或執玉而朝靈囿或解辮而拜甘泉並垂於册書光彼明命公於是有諭回鶻之命五慰豎昆之書四文章等於訓傳機事出於神明固將偃仰邳石之符傲睨鬼嵌之録聞之者可以祛聾聵得之者可以弼邦國每牙管既拔芝泥將熟嘗於前席親授筆札公亦分隂可就落簡如飛時有急宣關於密畫內庭外制皆不與聞或勢切疾雷機難終日宣室未召武帳莫開公則疏于封章逹於旒衮當乙夜觀書之際未嘗不稱美再三此又豈可與傳洞簫而諷於後庭聞子虛而嗟不同丗者論功較德邪歲在乙丑羣公常伯以天子之道貫於神祇一年而風雨攸序災沴不作二年殱醜虜興北伐之詩四年誅狡童詠東征之歌而又伐摩尼之風壞浮圖之俗偃兵返朴四海胥定思欲增鴻名光下武公乃觀東序之圖按西崑之諜鋪舒名實藻縟文采類于上帝為唐神宗公於是纂章天成功神德明道之册文號位既畢華夷會同方將命禮官召儒者訪匡衡后土之儀採公王明堂之圖考肆覲之禮於梁生取封禪之書於犬子盡皇王之盛事極臣子之殊功而軒鼎將成禹書就掩然猶進先嘗之藥獻高手之醫藏周旦請代之書追漢宣易名之美作于大誥祈于昊天始終一朝紹續九德其攻伐也既如彼其制作也又如此故合武宗一朝册命典誥奏議碑贊軍機羽檄凡兩帙二十卷輒署曰會昌一品制集紀年追聖德也書位旌官業也歲丁卯亞自左掖出為桂林九月公書至自洛以典誥制命示于幽鄙且使為序以集成書尋玄珠不究於倪域聽希聲莫窮於高下承命震惴幾移朝夕援筆而復止者三四伏念江陸修蕩辭讓不及因齋潔以敘焉夫全功難持大名難兼日赫於晝而乏清媚月皎於夜而無溫煦冬之為候也則雪霜飄暴凍入肌髮夏之為用也則金流石鑠火走膚脈如陽春高秋者稀焉南則瘴風毒虺之為厲也北則獯戎黠虜之為患也如雒邑咸秦者幾焉雕鷲不傅之以馳騁驊驑不授之以騫翥如應龍者鮮焉仲尼聖賢之宗也位止於司寇師𥅆道德之祖也官不過柱史如姬旦者幾焉是以保衡傅説佐佑殷宗召公畢公寅亮周室咸著大訓克為元龜書契以來未之多有李斯以刻石紀號之文勝而不在休明之運又何足數哉周勃霍光雖有勳伐而不知儒術枚臯嚴忌善為文筆而不至巗廟自是已降其類實繁惟君藴開物致君之才居元弼上公之位建靖難平戎之業垂經天緯地之文粹于厥躬慶是全德蓋四序之陽春九州之咸雒品彚之應龍人倫之姬旦後之學者其景之唐徐泗濠節度使觀察處置等使通議大夫檢校尚書左僕射贈司徒張建封文集序權德輿昔有虞以濬哲文明理天下故有諧八音陳九德賡載康哉之臣周宣王循文武之業以開中興故有歌蒸人賦韓奕清風大雅之什春秋之際諸侯列大夫感物造端能賦可以圖事稱詩可以諭志然則元侯宗工作為文章本於王化繫於風俗亦其志氣之所發也司徒諱建封南陽人簡廉疏逹信厚誠直秉心可大以禮義為干櫓非道不處視圭組猶稊稗以褐衣寬博遊于京師當時賢公名卿盛服先生之倫皆迎門締交就義若渴贊師律於盟津大鹵二府由察視主柱下方書朝廷以州部要害選難符守歷巴陵陟壽春婪婪反虜壤地相接衆寡懸絶物情不交斬其使者以殉傳首於行在所屏翰準海我為金湯選耎觀望者皆革心服義而東夏安矣加地進律察廉三都授鉞貞師涖于徐方就加六職端右之任追命三公論道之秩其始終艱貞光大也如是昔左丘明載單襄公之言曰忠文之實也智文之輿也仁文之愛也義文之制也則司徒嚮時之大忠明智戴仁抱義皆推本乎斯文然後足言足志踐履章灼故其辨古人心源定是非於羣疑之下則韓君别録痛詆時病以發舒憤悶則投元杜諸宰相書其餘贊勳伐表丘隴銘器敘事放言詣理皆與作者方駕而歌詩特優有仲尼之氣質越石之清拔如雲濤溟漲浩漾無際而天琛夜光往往在焉其入覲也獻朝天行一篇因喜氣以攄肝膈覽其辭者見公之心焉其還鎮也德宗皇帝紆天文以送别湛恩異倫耀動中朝至於內廷錫宴君唱臣和皆酌六義之英而為一時之盛夫文之病也或牽拘而不能騁或奔放而不自還公則財成切近揮斥細故英華感槩卓爾其閎大析理研幾泊然其精微全才逸氣與勳力相宣盡在是矣公之理也徐人宜之故尚書克家纂業用嗣厥服猶鮑氏之居司隸鄭人之賦緇衣大君推恩善善春秋之義也永懷先志乃集遺文以德輿嘗承司徒之歡表列編次凡二百三十篇承詔作序是用拜君命之辱而不敢讓云唐昭容上官氏文集序張説臣聞七聲無主律吕綜其和五綵無章黼黻交其麗是知氣有一鬱非巧辭莫之通形有萬變非工文莫之寫先王以是經天地究人神聞寂寞鑑幽昧文之辭義大矣哉上官昭容者故中書侍郎儀之孫也明淑挺生才華絶代敏識聰聽探微鏡理開卷海納宛若前聞搖筆雲飛咸同宿搆初沛國夫人之方㜊也夢巨人俾之大稱曰以是稱量天下及昭容既生彌月夫人弄之曰稱量天下豈在子乎孩遂啞啞應之曰是生而能言蓋為靈也越在襁褓入於掖庭天實啓之故毀家而資國運將興也故成德而受任自則天久視之後中宗景龍之際十數年間六合清謐內峻圖書之府外闢修文之館搜英獵俊野無遺才右職以精學為先大臣以無文為恥每豫遊宫觀行幸河山白雲起而帝歌翠華飛而臣賦雅頌之盛與三代同風豈惟聖后之好文亦云奧主之協讃者也古者有女史記功書過復有女尚書決事宮閣昭容兩朝專美一日萬機顧問不遺應接如響雖漢稱班媛晉譽左嬪文章之道不殊輔佐之功則異迹祕九天之上身沒重泉之下嘉猷令範代罕得聞庶姬後學嗚呼何仰然則大君據四海之圖懸百靈之命喜則九園挾纊怒則千里流血靜則黔黎乂安動則蒼氓罷弊入耳之語諒其難乎貴而勢大者疑賤而禮絶者隔近而言輕者忽遠而意忠者忤惟窈窕柔曼誘掖善心忘味九德之衢傾情六藝之圃故登崑巡海之意寢翦胡刈越之威息璿臺珍服之熊消從禽嗜樂之端廢獨使溫柔之教漸於生人風雅之聲流於來葉非夫玄黃育粹貞明助思衆妙扶識羣靈挾志誕異人之寶授興王之瑞其孰能臻斯懿乎鎮國太平公主道高帝妹才重天人昔嘗共遊東辟同宴北渚倐來忽往物在人亡憫雕琯之殘言悲素扇之空曲上聞天子求椒掖之故事有命史臣敘蘭臺之新集凡若干卷列之如左重校正唐文粹卷第九十一
