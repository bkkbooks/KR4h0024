body:
  text: 小洞庭五太守讌籍蘇源明秋夜小洞庭離讌序刻蘇公太守二文記令狐楚瑯瑘溪述序獨孤及泛郎官湖詩序李白裴胄先宅讌集賦詩序獨孤及冬夜讌蕭十文詩序息夫牧遊大林寺序白居易石鼎聮句詩序韓愈翫月詩序歐陽詹送陸歙州序韓愈送劉太真詩序蕭穎士送李愿歸盤谷序韓愈送疏言禪師太原取經詩序李節送小雞山樵人序陸龜䝉雲母泉詩序李華贈嵩山焦鍊師詩序李白小洞庭五太守讌籍蘇源明天寳十二載七月辛丑東平太守扶風蘇源明觴濮陽太守清河崔公季重魯郡太守隴西李公蘭濟南太守太原田公琦濟陽太守隴西李公陵于回源亭既尊封壤乃宻惠好前此濟陽以河堤之虞夫役之弊請南畧我宿及魯之中都宿人訟其不便源明請廢濟陽以平隂長清屬濟南盧東阿歸我陽榖𨽻濮陽役均三邦利倍二邑不可則分我夀西入濮陽東入濟陽魯之中都北入于我書貢閶闔㫖下陳留陳留太守王公盛徳帝俞美才人與自總連率實惟澄清命屬官湖城主簿王子説㑹五太守于東平議縣乃不割郡亦仍舊已事修讌姑以為别若夫階抱孤嶠軒飛庱潭阻殘暑於重林速髙秋於絶壑其盤何有臑鹿䐿羊其爼何有燔兔膾魴李下彫籠氷之以寒水瓜剖銛刃巾之以疎紘禮交乎上當世髙賢之相充樂動乎下前古中和之合作抑抑焉堂堂焉奚一人之富有而羣后之緝熙也司士庀舟以待司功祋設以告徹饌更服陳羞絜罇自回源起廣泊左拂蠶尾右遺吾山倒􅀈岫於波際指梁岑於林缺移摇敝豁瞑眇虚曠太皡苗裔可寄任宿伯禹山川空流濟汶所遇多感祗牢為歡婥態目成以留客嫮容色授以勸酒繁絲疎管紛爾自㑹雅舞清唱倐然同引既醉源明以手版扣舷而歌曰小洞庭兮牢方舟風嫋嫋兮離平流牢方舟兮小洞庭雲㣲㣲兮連絶􅠌仍瀾壮兮緬以沒重巖轉兮超以忽馮夷舞兮䕶輕橈蛟龍伃兮落増湖泊中湖兮澹而閑並曲溆兮悵而還適予手兮非予期将解袂兮藂予思尚君子兮夀厥身承明主兮憂斯人歌闋鳥獸聞之低昂而相鳴魚鼈聞之㳂洄而或躍兹官吏安次而不易彼人庶樂業而不遷喜之哉樂之哉字渦泊曰小洞庭盛集五太守髙讌云爾秋夜小洞庭離讌序源明從東平太守徵國子司業須昌外尉袁廣載酒于回源亭明日遂行及夜留讌㑹荘子若訥過歸莒相里子同褘過如魏陽穀管城青陽權衡二主簿在坐皆古人也徹饌新罇移方舟中有宿鼓有汶簧濟上嫣然能歌者五六人共載止回源東栁門入小洞庭遲夷傍徨眇緬曠漾流商雜徵與長言者啾焉合引潜魚驚或躍宿鳥飛復下真嬉逰之擇耳源明歌曰浮漲湖兮莽條遥川后禮兮扈予橈横増沃兮蓬仙延川后福兮易予舷月澄凝兮明空波星磊落兮耿秋河夜既良兮酒且多樂方作兮奈别何曲闋袁子曰君公行當揮翰右垣豈止典胄米廩邪廣不敢受賜獨不念四三賢源明醉曰所不與吾子及四三賢同恐懼安樂有如秋水晨前而歸及醒或説嚮之陳事源明局局然笑曰狂夫之言不足罪也乃志為序刻蘇公太守二文記令狐楚太和五年春三月兖海節度副使李員外虞致本府書幣修好于我卒事返命且以故太守蘇源明集中小洞庭讌籍及序二首見寄請予立一貞石識其故處云余為之考尋圖牒詢訪耉老自五六日至於旬時茫然曽不得回源亭渦泊依稀髣髴者從天寳十二載而下及兹八十年源明有盛名於朝遺愛在鄆嘗與五太守㑹集讌逰之所形於文字冏若金玉若良二千石好事君子接武而來總不能恢張増飾之必當思人愛樹存為此州故事悲夫恩澤之外四紀有餘自蕩平而還三政相繼不銛鋒摩刃以戰鬬為務則長臂利爪而攫拾是謀視嘉山水好風月如越人之髢瞽者之鑑非惟無用又從而仇之余以為不可使中行子之文無傳于此地乃於溪亭作金石刻引而記之亦李志也秋七月二十七日天平軍節度等使檢校尚書右僕射鄆州刺史兼御史大夫彭陽縣公令狐楚詞瑯琊溪述序獨孤及隴西李幼卿字長夫以右庶子領滁州而滁人之飢者粒流者召乃至無訟以聴故居多暇日常寄傲此山之下因鑿石引泉釃其流以為溪溪左右建上下坊作禪堂琴臺以環之探異好古故也按圖經晉元帝之居瑯琊邸而為鎮東也嘗逰息是山厥跡猶存故長夫名溪曰瑯琊他日賦八題於岸石及亦状而述之是嵗大厯六年嵗次辛亥春三月丙午日述曰自有此山便有此泉不濬不刋幾萬斯年造物遺功若俟後賢天鍾靈奇公潤色之疏為迴溪削成崇臺山不過十仞意擬衡霍溪不袤數文趣侔江海知足造適境不在大怪石皚皚涌湍潺潺洞壑無底雲興其間仲春氣至萬木華發亘陵被坂吐火噴雲公登山樂樂者畢同無小無大乗興從公公之舉觴酒酣氣振溪水為主而身為賔捨瑟詠歌同風舞雩時時醉歸與夕鳥俱明月滿山朱轓徐驅石門松風聲類笙竽於戲人實𢎞道物不自美向㣲羊公逰漢之涘峴山寂寞千祀誰紀彼美新溪維公嗣之念兹疲人繄公其肥後之聆清風而嘆息者挹我於泉乎而已泛沔州城南郎官湖詩序詩附李白乾元嵗秋八月白遷於夜郎遇故人尚書郎張謂出使夏口沔州牧杜公漢陽宰王公觴於江城之南湖樂天下之再平也方夜水月如練清光可掇張公以殊有勝槩四望超然乃顧白曰此湖古來賢豪逰者非一而枉踐佳境寂寥無聞夫子可為我標之嘉名以傳不朽白因舉酒酹水號之曰郎官湖亦由鄭圃之有僕射陂也席上文士輔翼岑靜以為知言乃命賦詩紀事刻石湖側将與大别山共相磨滅焉張公多逸興共泛沔城隅當時明月好不減武昌都四座醉清光為歡古來無郎官愛此水因號郎官湖風流若未減名共此山俱仲春裴胄先宅讌集賦詩序詩附獨孤及先是先清明一日右金吾倉曹薛華陳嘉殽釃清酤㑹河東裴兾滎陽鄭裒河東獨孤及于署之公堂引滿舉白者自午及子促席于花隂賦詩于月下樂極不醉夜艾而罷後清明三日二三子春服既成思欲修好尋盟選勝卜晝裴侯是以再有投轄之㑹是㑹也鄭不至吾兄惠然而來堂有琴庭有篠芳草數步落花滿席中和子冠烏紗㡌相與箕踞嗢噱傲睨相視稱觴乎其間趣在酒中判為酩酊之客家本秦也能無烏烏之聲其詩曰上天垂光兮熙予以青春今日何日兮共此良辰與君觵濁醪而藉落英兮不知年華之相親蹇淹留以醉止孰云含意而未申歌數闋裴側弁慢罵曰百年歡㑹鮮於離别知開口大笑幾日及此日新無已今又成昔不紀而賦之如春風何其演為連珠以志此㑹冬夜宴蕭十丈因餞殷郭二子西上詩序息夫牧志有之事三如一者惟君父師乎所以生之教之禄之生而不教不可立也教而不成不可禄也故師勉乎教而學者勵乎己已立學成而㑹友以講之是以伯魚趨庭曽參避席卜商投杖厥義於是乎在冬十有二月家君宰邑許下夫子問津潁上二賢将馳㑹府皆適兹土夜處狹室列坐有位尊卑儼如或捧觴上夀或摳衣請益始敦師以閲禮終講信而修睦然後文飽於徳義潤其身頃夫子升堂之後若盧賈劉尹之徒半紀間接武鳴躍實夫子訓之導之斯至也今殷郭二子天資才幹而加之鏃羽觀光王庭俯拾地芥其誰曰不然飛霜靄林寒氣總至月落西户夜将向晨座隅謙謙畢醉温克則知孔門宴餞異於他日二三子終身識之夫子以家君政事百里無事命門弟子賦鳴琴亦以釋仳離之怨焉小子不敏忝居門人之末敢不敬書其事有琴斯鳴于宰之庭君子莅止其心孔平政既告成徳以永貞鳴琴有術于潁之畔彼之才髦其年未冠聞詩聞禮斐兮璨璨鳴琴其怡于潁之湄二子翰飛言戾京師有鬱者桂載攀其枝琴既鳴矣宵既清矣烘煁有煒酒醴惟㫖喟我寤歎吁其别矣遊大林寺序白居易余與河南元集虚范陽張允中南陽張深之廣平宋郁安定梁必復范陽張時東林寺沙門法演智滿中堅利辯道深道建神照雲臯息慈寂然凡十有七人自遺愛草堂歴東西二林抵化城憩峯頂登香爐峯宿大林寺大林窮逺人跡罕到環寺多清流蒼石短松瘦竹寺中惟板屋木器其僧皆海東人山髙地深時節絶晩于時孟夏如正二月天梨桃始華澗草猶短人物風候與平地聚落不同初到怳然若别造一世界者因成口號絶句云人間四月芳菲盡山寺桃花始盛開長恨春歸無􅟪處不知轉入此中來既而周覽屋壁見蕭郎中存魏郎中𢎞簡李補闕渤三人名姓文句因與集虚輩歎且曰此地實匡廬間第一境由驛路至山門曽無半日程自蕭魏李逰迨今垂二十年寂無繼來者嗟乎名利之誘人也如此時元和十二年四月九日白樂天序石鼎聮句詩序詩附韓愈元和十二年十二月四日衡山道士軒轅彌明自衡山來舊與劉師服進士衡湘中相識将過太白知師服在京夜抵其居宿有校書郎侯喜新有能詩聲夜與劉説詩彌明在其側貌極醜白鬚黒面長頸而髙結喉中又作楚語喜視之若無人彌明忽軒衣張眉指爐中石鼎謂喜曰子之能詩與我賦此乎劉往見衡湘間人説云年九十餘矣解捕逐鬼物拘囚蛟螭虎豹然不知其實能否也見其老頗貌敬之不知其有文也聞此説大喜即援筆而題其首兩句次傳於喜喜踴躍即綴其云云道士啞然笑曰子詩如是而已乎即袖手竦肩倚北牆坐謂劉曰吾不解世俗書弟子為我書吾句因髙吟曰龍頭縮菌蠢豕腹脹膨脝初不似經意詩㫖有似譏喜二子相顧慙駭欲以多窮之即又為而傳喜喜思益苦務欲壓道士每營度欲出口吻聲鳴益悲操筆欲書将下復止竟亦不能奇也畢即傳道士道士即髙踞大唱曰劉把筆吾詩云云其不用意益奇出不可附説語皆侵劉侯喜益忌之劉與侯皆已賦十餘韻彌明應之如響皆穎脱含譏諷夜盡三更二子思竭不能續因起謝曰尊師非世人也某伏矣願為弟子不敢更論詩道士奮髯曰不然章不可以不成也又謂劉曰把筆來即又唱出四十字為八句書既止即讀讀畢謂二子曰章不已就乎二子齊應曰就矣道士曰此皆不足與語此寧為文耶吾就子所能而作耳非吾之所學於師而能者也吾所能者子皆不足以聞也獨文乎哉吾語亦不當聞矣吾閉口矣二子大懼皆起立牀下拜曰不敢他有問也願聞一言而已先生稱吾不解人間書解何書請聞此而已道士寂然若無聞也累問不應二子不自得即退就座道士倚牆睡鼻息如雷鳴二子怛然失色不敢喘斯須曙鼓鼕鼕二子亦困睡及覺日已上顧􅟪道士不見即問其童奴奴曰天且明道士起出門若将便旋然奴怪乆不返即出到門􅟪無有也二子驚惋自責若有失者間遂詣余言不能識其何道士也嘗聞有隠君子彌明豈其人耶韓愈序巧匠斵山骨刳中事煎烹師服直柄未當權塞口且吞聲喜龍頭縮菌蠢豕腹脹膨脝彌明外包乾蘚文中有暗浪驚師服在冷足自安遭焚意彌貞喜謬當鼎鼎間妄使水火爭彌明大似烈士膽圓如戰馬纓師服上比香爐尖下與鏡面平喜秋瓜未落蔕凍芋强抽萌彌明一塊元氣閉細泉幽竇傾師服不值輸寫處焉知懷抱清喜方當紅罏燃益見小器盈彌明睨睨無刃跡團團類天成師服遥疑龜負圖出曝曉正晴喜旁有雙耳穿上為孤髻撑彌明或訝短尾銚又似無足鐺師服可惜寒食毬擲此傍路坑喜何當出灰灺無計離瓶甖彌明陋質荷斟酌狹中愧提擎師服豈能煮仙藥但未汚羊羮喜形模婦女笑量度兒童輕彌明徒爾堅重性不過升合盛師服仍似廢轂仰側見折軸横喜時於蚯蚓竅㣲作蒼蠅鳴彌明以兹飜溢愆實負任使誠師服常居顧眄地敢有漏泄情喜寧依暖熱弊不與寒凉并彌明區區徒自效瑣瑣不足呈師服迴旋但兀兀開合唯鏗鏗喜全勝瑚璉貴空有口傳名豈比爼豆古不為手所撜磨礲去圭角浸潤著光明願君莫嘲誚此物方施行四韻並彌明所作翫月詩序詩附歐陽詹月可翫翫月古也謝賦鮑詩眺之庭前亮之樓中皆翫也貞元十二年甌閩君子陳可封逰在秦寓於永崇里華陽觀予與鄉人安陽邵楚萇濟南林藴潁川陳詡亦旅長安秋八月十五日夜詣陳之居修厥翫事月之為翫冬則繁霜太寒夏則蒸雲太熱雲蔽月霜侵人蔽與侵俱害乎翫秋之於時後夏先冬八月於秋季始孟終十五於夜又月之中稽於天道則寒暑均取於月數則蟾兔圓況埃􅝙不流大空悠悠嬋娟徘徊桂華上浮昇東林入西樓肌骨與之疎涼神器與之清泠四君子悦而相謂曰斯古人所以為翫也既得古人所翫之意宜襲古人所翫之作翫月詩云八月三五夕舊嘉蟾兔光斯從古人好共下今宵堂素魄皎孤凝芳輝分四揚徘徊林上頭泛灧天中央皓露助流華輕颷佐浮涼清冷到肌骨潔白盈衣裳惜此苦宜翫攬之非可将含情顧廣庭願勿況西方送陸歙州詩序詩附韓愈貞元十八年二月十八日祠部員外郎陸君出刺歙州朝廷夙夜之賢都邑逰居之良齎浴涕洟咸以為不當去歙大州也刺史尊官也由郎官而徃者前後相望也當今賦出於天下江南居十九宣使之所察歙為富州宰臣之所薦聞天子之所選用其不輕而重也較然矣如是而齎咨涕洟以為不當去者何也盖陸君之道行乎朝廷則天下望其賜刺一州則專而不能咸謂先一州而後天下豈吾君與吾相之心哉於是昌黎韓愈道願留者之心而泄其思作詩曰我衣之華兮我佩之光兮陸君之去兮誰與翺翔兮斂此大惠施于一州今其去矣胡不為留我作此詩歌于逵道無疾其驅天子有詔送劉太真詩序詩附蕭頴士記有之尊道成徳嚴師其難哉故在三之禮極乎君親而師也參焉無犯與隠義斯貫矣孔聖稱顔子有視余猶父歎其至歟今吾於太真也然乎爾且後進而余師者自賈邕盧兾之後比嵗舉進士登科名與實皆相望騰遷凡十數子其佗自京畿太學踰于淮泗行束脩已上而未及門者亦云倍之余弗敏曷云當乎而莫之讓盖有來學㣲徃教䝉匪余求若之何其拒哉猗爾之所以求我之所以誨學乎文乎學也者非云徵辯説摭文字以扇夫談端輮厥詞意其於識也必鄙而近矣所務乎憲章典法膏腴徳義而已文也者非云尚形似牽比類以局夫儷偶旅於奇靡其於言也必淺而乖矣所務乎激揚雅訓彰宣事實而已衆之言文學者或不然於戲彼以我為僻爾以我為正同聲相求爾後我先安得而不問哉問而教教而從從而達欲辭師也得乎孔門四科吾是以竊其一矣然夫徳行政事非學不言言而無文行之不逺豈相異哉四者一夫正而已矣故曰詩三百一言以蔽之曰思無邪不正之謂也吾嘗謂門弟子有尹徵之學劉太真之文首其選焉今兹春連茹甲乙淑問休闡為時之冠浹旬有詔俾徵典校秘書且馳傳壠首領元戎書記之事四牡騑騑薄言旋歸聲動日下浹於寰外而太真元昆前已甲科太真兄太冲以去嵗登科未始間嵗翩其連舉謂予不信豈其然乎夏五月回棹京洛告歸江表岵兮屺兮歡既萃矣兄矣弟矣榮斯繼矣搢紳之徒習禮聞詩者僉曰劉氏二子可謂立乎身光乎親蹈極致於人倫者矣上京餞别庭闈望歸從古以來未之聞也予羇宦此都色斯云舉彼吳之丘曽是昔逰心乎往矣有懷伊阻行矣風帆載飛載揚爾思不及黯然以泣先師孝悌謹信泛愛親仁餘力學文之訓爾其志之南條北固朱方舊里昔與太真初㑹於兹余之門人有栁并者前是一嵗亦嘗覯兹地其請業也必始乎此焉并也有尹之敏劉之工其少且疾故莫之逮太真亦嘗曰何敢望并并與真難乎其相奪矣緬彼江隂京阜是臨言念二子從予於此爾云過之其可忘諸同是餞者賦江有歸舟以寵夫嘉慶焉爾詩曰江有歸舟亦亂其流之子言旋嘉名孔修揚于王庭允焯其休舟既歸止人亦榮止兄矣弟矣孝斯踐矣稱觴宴喜于岵于屺彼逝惟帆匪風不揚有彬伊文匪學不彰予其懷而勉爾無忘送李愿歸盤谷序韓愈太行之陽有盤谷盤谷之間泉甘而土肥草木叢茂居民鮮少或曰謂其環兩山之間故曰盤或曰是谷也宅幽而勢阻隠者之所盤旋友人李愿居之愿之言曰人之稱大丈夫者我知之矣利澤施於人名聲昭於時坐於廟堂進退百官而佐天子出令其在外則樹旗旄羅弓矢武夫前呵從者塞塗供給之人各執其物夾道而疾馳喜有賞怒有刑才俊滿前道古今而譽盛徳入耳而不煩曲眉豐頰清聲而便體秀外而惠中飄輕裾翳長袖粉白黛緑者列屋而閒居妬寵而負恃爭妍而取憐大丈夫之遇知於主上用力於當世者之所為也吾非惡此而逃之是有命焉不可幸而致也窮居而野處升髙而望逺坐茂樹以終日濯清泉而自絜采於山美可茹釣於水鮮可食起居無時惟適所安與其譽於前孰若無毁於其後與其樂於身孰若無憂於其心車服不維刀鋸不加理亂不知黜陟不聞大丈夫不遇於時者之所為也我則行之伺候於公卿之門奔走於形勢之塗足将進而趦趄口将言而囁嚅處汚穢而不羞觸刑辟而誅戮僥倖於萬一老死而後止者其於為人賢不肖何如也昌黎韓愈聞其言而壮之與之酒而為之歌曰盤之中維子之宫盤之土維子之稼盤之泉可濯可湘盤之阻誰爭子所窈而深廓其有容繚而曲如往而復嗟盤之樂兮樂且無央虎豹逺跡矣蛟龍遁藏鬼神守䕶兮呵禁不祥飲則食兮夀而康無不足矣奚所望膏吾車兮秣吾馬從子於盤兮終吾生以倘佯送潭州道林疏言禪師太原取經詩序李節業儒之人喜排釋氏其論必曰禹湯文武周公孔子之代皆無有釋釋氏之典衰亂之所奉也宜一掃絶剗革之使不得滋釋氏源於漢流於晉瀰漫於宋魏齊梁陳隋唐孝和聖真之間論者之言粗矣抑能知其然未知其所以然者也吾請言之昔有一夫膚腯而色凝氣烈而神清未嘗謁醫未嘗禱鬼恬然保順罔有札瘥之患故善也即一夫不幸而有寒暑風濕之痾背癃而足躄耳瞶而目瞑於是攻熨之術用焉禳禬之事紛焉是二夫豈特相反耶盖病與不病異勢也嗟乎三代之前世康矣三代之季世病矣三代之前禹湯文武徳義藩之周公孔子典教持之道風雖衰漸漬猶存詐不勝信惡知避善於是有擊壤之歌由庚之詩人人而樂也三代之季道風大衰力詐以覆信扇澆而散朴善以柔退惡以强用廢井田則豪窶相承矣貪封畧則攻戰乗用矣務實帑則聚斂之臣昇矣務勝下則掊剋之吏貴矣上所以御其下者欺之下所以奉其上者苟之上下相仇激為怨俗於是有汨羅之客有負石之夫人人愁怨也夫釋氏之教以清淨恬虚為禪定以柔謙退讓為忍辱故怨爭可得而息也以菲薄勤苦為修行以窮達夀夭為因果故賤陋可得而安也故其喻云必煩惱乃見佛性則其本衰代之風激之也夫衰代之風舉無可樂者也不有釋氏以救之尚安所寄心乎論者不責衰代之俗而尤釋氏之盛則是抱疾之夫而責其醫禱攻療者也徒知釋因衰代而生不知衰代須釋氏之救也何以言之耶夫俗既病矣人既愁矣不由釋氏使安其分勇者将奮而思鬬智者将靜而思謀則阡陌之人将紛紛而羣起矣今釋氏一歸之分而不責於人故賢智儁朗之士皆息心焉其不能達此者愚人也惟上所役焉故離衰亂之俗可得而安頼此也若之何而翦去之哉論者不思釋氏扶世助化之大益而疾其雕鎪綵繪之小費吾故曰能知其然不知其所以然者也㑹昌季年武宗大翦釋氏巾其徒且數萬之民􅈻具其居容貌於土木者沉諸水言詞於紙素者烈諸火分命御史乗驛走天下察敢隠匿者罪之由是天下名祠珍宇毁撤如掃天子建號之初雪釋氏之不可廢也詔徐復之而自湖己南逺人畏法不能酌朝廷之體前時焚撤書像殆無遺者故雖明命復許制立莫能得其書道林寺湘川之勝逰也有釋疏言警辯有謀獨曰太原府國家舊都多釋祠我聞其帥司空范陽公天下仁人我第往求購釋氏遺文以惠湘川之人宜其聴我而助成之矣即杖而北逰既上謁軍門范陽公果諾之因四求散逸不成藴帙者至釋祠不見焚而副剰者又命講丐以補繕闕漏者月未幾凡得釋經五千四十八巻以大中九年秋八月輦自河東而歸於湘焉噫釋氏之助世既言之矣向非我君洞鑒理源其何能復立之耶既立之且亡其書非有疏言識逺而誠堅孰克𢎞之耶吾喜疏言奉君之令演釋之宗不憚寒暑之勤徳及逺人為叙其事且贈以詩詩曰湘川狺狺兮俗獷且狠利殺業偷兮吏莫之馴繄釋氏兮易暴使仁釋何在兮釋在斯文湘水滔滔兮四望何已猿狖騰拏兮雲樹靡靡月沈浦兮煙瞑山檣席卷兮櫓牀閑偃仰兮嘯詠鼓長波兮何時還湘川超忽兮落日􅔉􅔉松覆秋亭兮蘭披春畹上人去兮幾千里何日同逰兮湘川水送小雞山樵人序陸龜䝉小雞山在震澤西出吳胥門背朝日行四十里得野步市曰光福光福西五里得土山山土多石寡無大林木率生小櫟樸􅈪皆薪材直吳之爨此為助焉連延廣袤不一其主為書畫疆互以相授自家至麓凡二百弓東北倍髙而加半焉余所置多少如此余家大小之口二十月費米十斛飯成理魚䔩輩十斛薪然後四時賔祭沐浴澣濯疾病湯藥糜粥在外歳入五千束足矣其掌而供事者顧及小雞之樵甿也乾符六年春弗雨夏支流将絶八月暴雨而巨艑可實而行之矣九月朔方置薪二百五十於門召而責之曰吾一夏來撤敗屋㧞庭草以炊雨之明日望爾來矣何數亷而至晩得非赭吾山而為汝之利耶老而欺如名惡何及笑曰吾年餘八十矣元和中嘗從吏部逰京師人言國家用兵帑金窖粟不足用當時江南之賦已重矣殆今盈六十年賦數倍於前不足之聲聞於天下得非專地者之欺甚乎吾有丈夫子五人諸孫亦有丁壮者自盜興已來百役皆在亡無所容又嵗旱更害吾稼未即死不忍見兒孫寒餒之色雖盡售雞山之木不足以濡吾家矧一二買名為偷乎今子一煬竈不給而責吾之深吾将欲移其責于天下之守則吾死不恨矣余嘆之曰汝之言信也然不當發於予汝姑歸與之酒繼之以歌云長其舩兮利其斧輸其薪兮勿予侮田予登兮穀予庾突晨煙兮蓬縷縷窻有明兮編有古飽而安兮惟編是伍時不用兮吾無撫汝雲母泉詩序詩附李華洞庭湖西𤣥石山俗謂之墨山山南有佛寺寺倚松嶺松嶺下有雲母泉泉出石引流分渠周遍庭宇發源如乳湩末派如淳漿烹茶析蒸灌園潄齒皆用之大浸不盈大旱不耗自墨山西北至石門東南至東陵廣輪二十里盡生雲母牆階道路烱烱如列星井泉溪澗色皆純白鄉人多夀考無癖痼疥搔之疾華深樂之潁川陳公天寳中與華同為諫官公性與道合忽於權利方掛冠投簮顧華以名山之契乾元初公貶清江丞移武陵丞華貶杭州司功恩復左補闕上元中俱奉詔徵公自清江至武陵道路多虞制書不至華泝江而西次於岳陽江山延望日夕相顧屬思與髙賢共飲雲母之泉躬耕墨山之下敢違朝命以狥私欲秋風露寒洞庭㣲波一聞猿聲不覺涕下況支離多病年齒始衰願餌藥扶夀以究無生之學事乖志負火爇予心寄懷此篇亦以書公之志也晨登𤣥石嶺嶺上寒松聲朗日風雨霽髙秋天地清山門開古寺石竇含純精洞澈淨金界夤縁流玉英澤藥滋畦茂氣染茶甌馨飲液盡眉夀飡和皆體平瓊漿駐容髪甘露瑩心靈岱谷謝巧妙匡山徒有名願言構蓬蓽荷鍾引泠泠訪道出人世招賢依福庭此心不能已寤寐見吾兄曽結潁陽契窮年無所成東西同放逐虵豕尚縱横江漢阻携手天涯萬里情恩光起憔悴西上謁承明秋色變江樹相思紛以盈猿啼巴丘戍月上武陵城共恨川路永無由㑹友生雲泉不可忘何日遂躬耕贈嵩山焦鍊師詩序詩附李白嵩丘有神人焦鍊師者不知何許婦人也又云生於齊梁時其年貌可稱五六十常胎息絶榖居無室廬逰行若飛倐忽萬里世或傳其入東海登蓬萊竟亦不能測其往也余訪道少室盡登三十六峯聞風有寄灑翰遥贈云二室倚碧天三花明緑煙中有蓬來客宛疑麻姑仙道在諠莫染跡髙想已遷時飡金娥蘂屢讀青苔篇八極恣逰憩九垓長周旋下瓢酌潁水舞鶴來伊川遂歸空山上獨拂秋霞眠蘿月掛朝鏡松風鳴夜絃潜光隠嵩丘鍊魄棲霞幄霓裳何葳蕤羽駕轉綿邈願同西王母下顧東方朔紫書儻可傳銘骨誓相學唐文粹卷九十六欽定四庫全書唐文粹卷九十七宋姚鉉編序庚總十十八首
