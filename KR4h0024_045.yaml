body:
  text: 吳興姚鉉纂古文丁揔二十一首言語對荅十六拜禹言李翺拜嶽言陳黯冶家子言陸龜蒙齊處士言袁皓英雄之言羅隱言毉李華齊誅阿大夫語牛僧孺設毛延壽自解語程晏對禹問韓愈濟爲瀆問李甘寒泉子對秦惠王陸龜蒙齊司冠對程晏真龍對盛均愚溪對栁宗元紀梁公對楊夔荅問諌者陳黯經㫖五文道元龜尚衡禹誥陳黯𥙷逸書白居易疑經司空圖正尸祭皮日休拜禹言李翶貞元十五年六月二十九日隴西李翶敬再拜禹之堂下自賔階升北面立弗敢歎弗敢祈退降復敬再拜哭而歸且歌曰惟天地之無窮哀人生之長勤往者予弗及來者吾弗聞巳而巳而拜嶽言陳黯黯自關東隨計來闕下經華嶽祠有巫導以祈謁廼徹蓋整衣馨爐瀝觴頫拜而前緘黙而退巫曰客是行也務名邪官邪胡爲乎有祈禮而無祈詞神之盻響而荅盍舒乃誠曰余其來拜句以嶽長羣山猶人之有聖賢草木之有松蘭百川之有河海鱗羽之有虬鸞屹屹崇崇干霄柱空載國祀典冝人攸宗拜之思盡乎余之敬詞之黯懼乎神之聦具神視果高而聽果深必福其善而禍其滛余行合乎神也必照而臨如欺乎神也祈之乎何心巫兮余言無妄兮爲妄言者之箴冶家子言陸龜蒙武王旣伐殷懸紂首有泣於白旗之下者有司責之其人曰吾冶家孫也數十年間載易其鎔範矣今又將易之不知其所業故泣吾祖始鑄田器歲東作必大售殷賦重秉耒耜者一墢不敢起吾父易之爲工器屬宫室臺榭侈其售倍民凋力窮土木中輟吾易之以爲兵器㑹諸侯伐殷師旅戰陣其售又倍前也今周用鉞斬獨夫四海將奉文理吾之業必壞吾亡無日矣武王聞之懼於是苞干戈親農事冶家子復祖之舊齊處士言袁皓齊祖受宋禪大宴卿士顧謂丞相曰予不肖幸有天下非百執事羽翼小子共拯宋人之溺也然予不敢易時而侮器使不十逾載致黃金與土同價朝臣稱賀内外諠懽快喜相聲日走天下齊封父聞而慶曰宋人生矣而告鄕處士處士聞而泣曰捨虎逢狼改時而亡吾爲宋人幸未死果塗炭於齊矣新主之言豈成聖人之道邪君王知黃金貴於土不知百姓視土貴於黃金吾聞古者土地之封在於民皃而國殷土有林木民時而取土有醎滷民時而煑土有禾黍民時盈庾金玉在山桑麻在原聖人不禁無私無官死者有土生者有田聖人樂而百姓同百姓憂而聖人然句絶秦傳亂國之疾百姓之苦莫痊漢壤旣廣百姓饒矣土地之利百姓莫時而窺之金玉在山醎滷在田取塊土者犯禁而死生無土而可以田殁無土而及乎泉生則稅蠧而郡𧖟邑剋而吏齧吾視宋人之萍乆矣未見宋人有寸土者君王苟欲致民於生地不若薄民之賦貽民之利知百姓貴土於黃金則其民受福於齊矣封父敬而謝曰吾將聞執政可乎處士曰否是欲急挈吾於禍矣惟父勿施吾將狂英雄之言羅隠物之所以有韜晦者防乎盜也故人亦然夫盜亦人也冠屨焉衣服焉其所以異者退讓之心貞廉之節不恒其性耳視玉帛而取者則曰牽於寒餓視家國而取者則曰救彼塗炭牽於寒餓者無得而言矣救彼塗炭者則冝以百姓心爲心而西劉則曰居冝如是楚籍則曰可取而代噫彼必無退讓之心貞廉之節蓋以視其靡曼驕崇然後生其謀耳爲英雄者猶若是況常人乎是以峻宇逸游不爲人之所窺者鮮矣言毉李華晉侯方圖秦旣而有疾秦伯使毉和視之將行戒之曰鄰國相病大夫何以爲行對曰臣不發藥石請以詞痊晉侯而國無害秦伯恱以卿禮遣之和至于晉晉君幄銅鞮之宮慿豐肥倚柔容更衣𬒳珠玉者百許人膳夫列鼎於庭而後延客客辭曰始受命於寡君以除君疾爲役今大國反以色與食病臣非臣所及也中軍師對曰此寡君待先生之禮也不意爲過敬惟所擇客曰臣轡而馳千里形甚勞而氣不足所欲者酒一盛果一器腒鱐佐飯而巳其餘不敢煩大國再拜受賜而診之曰君聲流而陽氣濁而浮色寒而容壯與楚王相若亦可爲也亦不可爲也晉侯曰楚子何如而方寡人客曰臣甞聘楚楚境大而冨山川林藪之盛踰淮而竟南海晉與齊秦不敵也晉侯曰寡人未甞渉楚且置楚王願聞其國之說客曰君不念臣亦未究楚封疆之事直以所見言之楚也近郊去郢尚三百里引車登岡乎視諸宫丹素燭天仰不見空如水漂浮半在其中滄波動揺低昻隨風藹藹南極山松不盡乍伏乍起參差高卑流雲重輕或滅或明道路緜緜縈山繞川車蓋如軒稍覺登原赤霄冐頂舉手靡天向之高者乃在車下隂谿冥冥投石無聲狀其乳苑之内則連山黯以當戸容杳杳而嶪嶪若堅刃與慢塗呀將拆而復合露封隙之嵌空聲小往而大荅聳崖峴以日爌呼朗反穿偃仆而雲罯烏合反濵江臯衍百里芳草往往白沙日炙皛溔俞皎反緑野芊緜走舉蒼連箘簵楩梓橘柚之林密孕元氣寒暑若一翳不流風幽不漏日猨狙飛走經息百態啾啾互號終昕竟晦墜英紛目如雪蔽路四望無人移足没屨黃鳥時鳴白鷴飛度臨險瞰江江隗爲潭庱庱刃凌反不動常有神怪龜魚涵泳露鱗岀介纎草以䬙風颭職琰反波起崩濤迸沬勢不得止精怖䰟怕毛骨洗初凌反然攀木瞑眸猶懼踣泉頺麓䟽冗繁源鼻歕支流瀯瀯耕反合注湯湯晝夜有聲當暑清涼透崖撲湍躍而後逝𥘉疑可及忽似無際旋去眩廻榾胡骨反鋪明反泊鋪郭反兊宕輥妬本反石敵磨火發川上纔夷又亞傾沙委浪白煙微蒼通波滿望澹澹灎灎乆而生垠淅淅飛雨冥冥起雲沅湘春生蒼梧日晩聲與聽盡色隨望逺蘋荇荷華組繡一川愕羽族之多名紛合散於水間泛隨流而將下時逆浪而復還喧呼雷駭沈起雲翻兩不相傷貌豫體閑縁涯疊觀照江成霞碧水漣漪淺深見沙旁經闈闥溢浸欄檻上有嬪嬙緜音入雲侵杳眇而將絶隨隤風而復聞齊宋鄭衛之樂張於宫中撞金擊石草木競發堅城雉坼崇山峯墜鳥獸狂悸淮湖皆沸首飾戴千金一膳傾千家恥不相及者以粒計倉祿之衆半於平人秣馬之費倍於租入其餘竒麗之富奉養之侈率與是侔楚王甚泰而楚人甚病申叔請老而不與政言未畢晉侯舒氣而伸幹曰向先生言亦可爲也何哉客曰此未足累楚故曰可爲也若張而無厭則不可爲也晉侯色生力起斥御者撤膳羞而請曰先生終說寡人病幸間矣客乗時而動之曰楚使令尹司馬理兵于北疆以臨弊邑弊邑大夫少者則請開關以戰老者則曰君務息人楚恃其冨強因侈生欲未足畏也寡君乃發府將賙而四境寡小君以四時之用爲請寡君曰是出於人而歸於人無人則無是夫何愛焉申命上大夫布幣於人而謝之曰孤不德使爾父兄子弟不自保於楚師故罄以相勞秦人感君皆泣婦人處子亦請執報楚楚朝聞而夕卷師君臣震伏而受職於秦此先生不戰之術也晉侯洸然以楚事而照於晉遂輟謀秦由是大國修好小國來朝戎狄皆附客果以詞痊晉故曰言毉齊誅阿大夫語牛僧孺齊威王謂阿大夫曰汝孰愿吾左右哉曰近吾君者也王曰吾以阿民寄汝是則割吾憂於心者而謂給吾使於宫者爲近邪夫宫中之近不過爲吾折支矣吾體有所貴是亦有所賤豈以反貴於心乎故入宫之職非近也入心之職爲近也順顧走指出入無方者藝之至也授印于外不必在宫者信之至也汝在吾所以信而比吾所以藝不愧冕衣裳哉今則戮汝使卿大夫識逺近之正於是群臣快賀而國大治君子曰正室之明莫盛乎午者左右隂不至也如齊威安有不明乎設毛延壽自解語程晏帝見王嬙美召壽責之曰君欺我之甚也延壽曰臣以爲宫中美者可以亂人之國臣欲宫中之美者遷於胡庭是臣使亂國之物不逞於漢而移於胡也昔閎夭獻美女於紂而免西伯齊遺女樂於魯而孔子行秦遺女樂於戎而閒由余是豈曰選其惡者遺之美者留之邪陛下以爲美者是能亂陛下之德也臣欲去之將靜我而亂彼陛下不以爲美者是不能亂我之德安能亂彼謀哉臣聞太上無亂其次去亂其次遷亂今國家不能無亂陛下不能去亂臣爲陛下遷亂耳惡可以爲美爲彼得乎帝不能省君子曰良畫工也孰誣其貨哉對禹問韓愈或問曰堯舜傳諸賢禹傳諸子信乎曰然然則禹之賢不及於堯與舜也歟曰不然堯舜之傳賢也欲天下之得其所也禹之傳子也憂後丗爭之之亂也堯舜之利民也大禹之慮民也深曰然則堯舜何以不憂後世曰舜如堯堯傳之禹如舜舜傳之得其人而傳之堯舜也無其人而不傳慮其患而不傳者禹也舜不能以傳禹堯爲不知人禹不能以傳子舜爲不知人堯以傳舜爲憂後世禹以傳子爲慮後世曰禹之慮民也則深矣傳之子而當不淑則柰何曰時益以難理傳之人則爭未前定也傳之子則不爭前定也前定雖不當賢猶可以守法不前定而不遇賢則爭且亂也天之生大聖也不數其生大惡也亦不數傳諸人得大聖然後人莫敢爭傳諸子得大惡然後人授其亂禹之後四百年然後得桀桀亦四百年然後得湯與伊尹湯與伊尹不得而傳也與其傳不得聖人而爭且亂孰若傳之子雖不得賢猶可守法曰孟子之所謂天與賢則與賢天與子則與子者何也曰孟子之心以爲聖人不苟私於其子以害天下求其說不得從而爲之辭濟爲瀆問李甘北諸侯來朝過温温令送于温指問水名令曰濟也侯曰豈濟瀆邪令復曰然侯曰河吾望也其橫千里渾猛如漲無風或毀舩殺人得清淇洹漳之水不加深别爲九河不加狹彼所以爲瀆也今盡濟水之力載數石之舟廣不能横深不能浮而曰與河同靈等秩吾不識先王班祀之意也令曰濟南去數十里過河矣寡介如此馳狂濁中未甞波渝氣奪别河而濳積沙連塊千里不壓不翳益壯其流帥汶而東終能發山輸海此其所以爲瀆也今河負其強大自積石不捷趨海往來戎狄閒脅涇渭灃漆汾洛伊沁之水以滋其暴決愁民生中土患勢逆曲多窮始歸海此皆濟水所羞也執事豈以大爲賢乎侯黙然寒泉子對秦惠王陸龜蒙寒泉子泰之處士見秦惠王曰客有自趙來以約從連横事說大王者爲誰惠王曰東周人蘇秦也寒泉子曰書十上王弗聽有之乎曰然其道如何王邪霸邪曰黜其霸以隮王乎曰然則何上書之煩而用之踈乎惠王曰䤈雞不能混雷霆嬰兒不能抗烏獲者響與力懸絶故也蘇子誠辯矣安能以三寸舌謀山東諸侯使西面朝秦者乎寡人非不知不破一領甲不折一隻矢之爲利也顧其猶捕風耳諸侯不可一非一朝也齊桓晉文之伯也始若膠附終若冰拆豈連雞不能俱上於棲而已哉寡人塞耳義弗聞寒泉子曰不然夫齊荆三晉之人病於兵乆矣方城之金十九爲兵一爲鎛銚董澤之蒲十九爲幹一爲箕捲父子兄弟之血前後濺野草齊䰟爲燕氛趙骨化魏土悽痛之聲入金石出弦匏聞之者悄慼酸屑泣不自禁一旦有人謂曰朝與秦連衡暮得怗怗安卧秦亦厭戰雖鼔牙頰耒能吞諸侯秦休而強吾亦勇而奮矣設有辯口安能反覆乎大王不用秦詔一武士斷其頸無令車輪輾關下土使東諸侯聞其言從散衡敗東向以背秦王岀則奪氣入則包羞及其殆也披土地以奉讎國獨不念秦仲之業艱難乎春秋祀事何面目見宗廟惠王卒弗用寒泉子耕於鄙趙即封蘇季子爲武安君六國果奉教秦閉關十五年齊司冦對程晏齊境多冦司冦不理景公召司冦讓之反諍公曰請理君朝廷之冦也公曰君廢其職反責我欲亂其責也曰不然君不聞鼷䑕之牙乎食人與百類雖囓盡而不痛俗謂之甘口䑕也魯國之牛聞食其角矣請以是諷焉牛之寢齕有蚊蚋撓其膚毛必知鼔耳摇尾以揮之及鼷䑕食之即不知痛也䑕之一牙豈不甚於蚊蚋于噆乎以其口甘雖貫心徹骨而不知也況其角乎公誠職臣以司冦請司朝廷之冦然後司封疆之冦也朝廷之冦其鼷䑕乎食君之角矣又將貫骨與心也是患大而君不知也封疆之冦蚊蚋乎但撓君之膚毛耳君将鼔耳揺尾以揮之是患小而不知大也臣所以急其大而不知慢其小而得知也景公不喻竟坐司冦以不事晏子曰司冦死田氏爲鼷䑕於齊矣眞龍對盛均客有抽時賢待已之禮舉葉君愛龍意於座曰葉公好假而憚其眞誠然乎均曰即飛岀丹青者殊未眞翔來庭宇者愈假矣何則夫靈濟於物無求於物無求於人實龍徒也今聞葉公鱗畫其象則摹形趨之是欲滋乎豢育宛蛇魚類耳眞烏在哉曰然則擾于夏鬪于鄭者非邪曰妖而怪所以幽王眚身子産不禮焉率假物矣彼其眞龍者道能神化其流多派或蟠于天或巢于田或翼于人或爲馬或爲劒有侔於此靡徒不居其在天也樞紐隂陽不蹉厥常其在田也贍腴疆土庶彚蕃廡其在人也珠媚心瀾呀成智門其爲馬也帀體柔油徧崇九州其爲劒也鬼淚滛淫秋江萬尋至如挾雲則十雨時濡銜照則三光遞舒是羣龍也緜古今而不僵渥生人以無倦聖賢在上將利益於物天下無道必亢悔於時蚩獨矯矯欄端露威於葉公而誇爪喙哉是謂妖怪假物也客皴眉而俯不復抽言愚谿對栁宗元栁子名愚谿而居五日谿之神夜見夢曰子何辱予使予爲愚邪有其實者名固從之今予固若是邪予聞閩有水生毒霧厲氣中之者温屯嘔泄藏石走瀬連艫糜解有魚焉劒牙鋒尾而獸蹄是食人必斷而躍之乃仰噬焉故其名曰惡谿西海有水散渙而無力不能負芥投之則委靡墊没及底而後止其名曰弱水秦有水掎汨泥淖撓混沙礫視之分寸眙若睌壁淺深險易昧昧不覿乃合清渭以自彰穢跡故其名曰濁涇雍之西有水幽險若漆不知所岀故其名曰黒水夫惡弱六極也濁黒賤名也彼得之而不辭窮萬世而不變者有實也今予甚清與美爲子所喜而又功可以及圃畦力可以載方舟朝夕者濟焉子幸擇而居予而辱以無實之名以爲愚卒不見德而肆其誣豈終不可革邪栁子對曰汝誠無其實然以吾之愚獨好汝汝惡得避是名邪且汝不見貪泉乎有飲而南者見交趾寶貨之多光溢於目思以兩手左右攫而懷之豈泉之實耶過而往貪之猶以爲名今汝獨招愚居焉乆留而不去雖欲革其名不可得矣夫明王之時智者用愚者伏用者冝近伏者冝逺今汝之託也逺王都三千餘里仄僻廻隱蒸鬱之與曹螺蜯之與居惟觸罪擯辱愚陋黜伏者日駸駸以遊汝闖闖以守汝汝欲爲智乎胡不呼今之聦明皎厲握天子有司之柄以生育天下者使一經於汝而惟我獨處汝旣不能得彼而見獲於我是則汝之實也當汝爲愚而猶以爲誣寜有說邪曰是則然矣敢問子之愚何如而可以及我栁子曰汝欲窮我之愚說邪雖極汝之所往不足以申吾喙涸汝之流不足以濡吾翰姑示子其略吾茫洋乎無知冰雪之交衆裘我絺溽暑之爍衆從之風而我從之火吾盪而趨不知太行之異乎九衢以敗吾車放而游不知吕梁之異乎安流以没吾舟吾足蹈坎井頭抵木石衝行榛棘僵卧虺蜴而不知怵惕何䘮何得進不爲盈退不爲抑荒涼昏黙卒不知克此其大凢者也願以是汗汝可乎於是谿神深思而歎曰嘻有餘矣其及我也因俯而羞仰而吁涕泣交流舉手而辭一晦一明覺而莫知所之遂書其對紀梁公對楊䕫天后幽中宗之後有不下閫闈移六合之志故徐敬業唐之竒等於楊州起兵以興復唐室然皆不旋踵而敗遂引用酷吏開羅織之門以懾伏内外一日狄梁公獨對天后曰吾自用俊臣思止來朝臣知所懼否梁公曰朝廷小人不達天命或有異議然陛下以术有一實之蠧將翦樹而弃之乎錦有一點之汙將全匹而燔之乎養隼者誠欲其鷙於烏鳶乎鷙於鸞皇乎鷙而無别不如不􅋧矣天后黙然荅問諌者陳黯或問古之士能真諌不君之君者其誰爲最曰有諌者齊人茅焦曰夏無龍逢邪殷無比干邪曰不以之無而功德相遼耳夫諌者不獨以言之忠而欲其氣雄不獨以名之彰而欲其事立四者克備是爲難矣昔嬴政吞噬羣雄以取天下豪暴奢侈古𥘉無先故非必爲而諌必拒當遷太后於雍有及泉之誓凢諌者二十七人矣天下忠赤之士莫不囚氣鎻詞是時焦能獨奮勇果不顧其威肉視虎狼冰顧鼎鑊諤諤造廷折其四失俾暴主悔非遷善而從其言由是骨肉之恩斷而再續君臣之義捨而再交諌諍之路塞而再啓皆由焦之功也噫忘軀徇忠亦諌者之職然死於二十七人之後不難乎其心哉進諫於二十七人之後不難乎其詞哉斯可謂言忠氣雄名彰事立備矣豈若龍逢諌桀比干諌紂徒自柔聲婉詞而又身不免事不立其足爲茅先生之徒歟問者喜而退矣文道元龜并序尚衡天寶𥘉適于平陽平陽太守稷山公則衡之從考舅雅好古道門尚詞客當今文人相與多矣甞歎曰取士之道才其難乎或精文而薄於行或敦行而淺於文斯乃有失其道一至於此顧衡曰吾甞語爾知言爾其言之衡私門以文塲而進五世鄙雖不嗣沗藉餘休敢著元龜以敘其事元龜曰文道之興也其當中古乎其無所始乎且天道五行以别緯地道五色以别方人道五常以别德易曰觀乎天文以察時變觀乎人文以化成天下非五緯孰可以知天非五方孰可以辨地非五常孰可以化人文之爲道斯亦逺矣天人之際其可得於是乎夫卦始乎三畫文章之閫大抵不出乎三等斯乃從人而有焉工與不工各區分而有之君子之文爲上等其德全志士之文爲中等其義全詞士之文爲下等其思全思也可以紀物義也可以動衆德也可以經化化人之作其惟君子之作先乎行行爲之質後乎言言爲之文行不出乎言言不出乎行質文相半斯乃化成之道焉志士之作介然以立誠憤然有所述言必有所諷志必有所之詞寡而意懇氣高而調苦斯乃感激之道焉詞士之作學古以杼情屬詞以及物及物勝則詞麗杼情逸則氣高高者求清麗者求婉恥乎質貴乎清而忘其志斯乃頽靡之道焉古人之貴有文者將以飾行表德見情署事杼軸乎天人之際道達乎性命之元正復乎君臣之位昭感乎鬼神之奥苟失其道無所措矣君子也文成而業著志士也文成而德䘮然今之代其多詞士乎代由尚乎文者以斯文而欲軌物範衆安邦敘政其難致乎化成悲夫敢著元龜庶觀文章之道得䘮之際悔吝之所由焉禹誥陳黯禹賢益以天下授益采其謳謡之所歸卒讓于啓故啓不由父授而書無典訓黯追其旨作禹誥嗚呼惟位於君惟父於民禪授無䟽親親惟其人德之肖仇敵可道之違昵愛不可苟昔堯舜傳人今吾傳家孰不知其私耶所以然者天人之意然也汝其念之陶者土之器也持之得其人則完不則毀位者國之器也持之得其人則治不則亂吾得之惟艱汝繼之無忘其難苟汝後之不克肖冝復于尭舜之道歸于有德勿以吾傳之爲世有之嗚呼不賢而毀其器俾後源私而罪吾也汝其念之𥙷逸書白居易湯征諸侯葛伯不祀湯始征之作湯征葛伯荒怠敗禮廢祀湯專征諸侯肇徂征之湯若曰格爾三事之人逮于有衆啓乃心正乃容明聽予言咨爾先格王有彜訓曰禄無常荷荷于仁福無常享享于敬惠乃道保厥邦覆乃德殄厥世惟葛伯反易天道怠弃邦本虐于民慢于神惟社稷宗廟罔克尊奉暨山川鬼神亦靡禋祀告曰罔犧牲以供爼羞予卑厥牛羊乃旣于盜食曰罔黍稷以奉粢盛予佑厥稼穡乃困于仇餉今爾衆曰葛罪其如予聞曰爲邦者祇奉明神撫綏蒸民二者克備尚克保厥家邦吁廢于祀神震怒肆于虐民離心頃繩契以降曁于百代神怒民叛而不顛擠者匪我攸聞小子履以涼德欽奉天威肇征有葛咨爾有衆克濟厥功其有儆師徒戒車乗敬吾事者有明賞其有罔率職罔戮力不龔命者有常刑明賞不僭常刑無赦嗚呼朕告汝衆君子監于兹欽哉懋哉罰及乃躬不可悔疑經司空圖經曰天王使來求金又曰求車豈天王之使私有求於魯邪不然傳聞之誤耳若諸侯之使來求金則謂求可矣若致天子之命徴於諸侯其可謂之求耶且率土之人與其貨殖皆一人之所有父之財守於其子則用不莫不㳟命其可謂之求乎春秋之旨尊君卑臣豈聖人爲魯不爲周邪書云天王狩于河陽尚爲晉侯諱召天子豈可不爲周諱其過哉縱天王制用失節多取於諸侯而欲垂誡即書於周史可矣若書於諸侯之史是悔恪其貨而侮王命也王祭亦不供矣必非聖人之文也必若王人責其稽命曷不書曰天王使某貴貢金儻以取金爲不文曷不曰天王使某來徴貢金亦譏在其中矣以是愚疑仲尼書天王使來句絶求金是使乎私自求而懲之也不然求與責文或相近傳冩之誤焉不爾何子夏之徒不能措一言哉捨此而譏訶皆小小者耳正尸祭皮日休聖人知生不足事事之死死不足其思制之生生象其死窮其思也尸象其生極其教也夫禮也者以守闕不以廢廢則亂故祀享立尸于廟王則迎有拜有醑尸有禱所以立象生之教也今視唐禮皇帝神降而拜象乎妥尸受福于神象乎酢尸嗚呼唐有天下化乎三百年其禮典赫然可以蠛漢蠓魏豈不能守周孔禮制哉故曰不以加加則弊禮無􅓢盥之文漢魏以來加之是也以加不以闕者周官射人祭祀則賛射牲王親射也自漢魏已來惟以毛血爲薦是也足以闕不以廢古者屈到耆艾屈建薦之謂乎非禮梁氏祀以𬞞食是也嗚呼讀漢魏及梁書代無其人忍使其禮蔽怠廢闕相接至此邪豈天然之使俟吾唐之人𥙷其逸典哉是宗
