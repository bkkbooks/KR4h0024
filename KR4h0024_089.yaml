body:
  text: 吳興姚鉉纂書十一揔一十三首激發八上崔相公書吳武陵再答張僕射書柳冕上韋右丞書劉軻與田將軍書獨孤郁移陸司勳沔書􅛷陽秬與李渤拾遺書盧坦移成均博士書皮日休與孺顔上人書沈亞之哀鳴三列國附上李門下書柳宗元上吏部裴侍郎書駱賔王代荀卿與楚相春申君書附劉軻忿恚二與吏部孫貟外書陳章甫上安州裴長史書李白上崔相公書吳武陵月日謹白書相公閣下昔者獲侍坐於東掖竊聞餘論吾之行巳略無遺事獨未能舉賢士大夫於朝為恨耳武陵誠愚不覺竊抃以為明哲之達必將與人同然猶恨爾時相公未得行其志今者鎔鑄生人鼓簧羣物九牧之士傾耳而聽拭目而視以為舉善黜惡大堯之功相公亦塞其望乎昔者管夷吾致隰朋寧戚東郭牙賔胥無王子成於桓公分職其務且曰欲理國者則五子存焉如將霸王則夷吾在焉蓋不欲專其能也先相國居位旬朔而所舉者亦數十百人今不知相公所舉阿誰所黜阿誰自秋徂春非特旬朔豈天地無其人邪將相公有所待邪或則曰明主春秋鼎盛方有所好升平之畫未可為也此又常人之論無足徴者夫人君病無所好茍有所好何為不可假若主好畋獵則正人其無畋獵者乎主好宴遊正人其無蹙踘拔河者乎因好而致事將濳化或以歌謡進或以烹飪來相公詎謂不然乎今兩河餘寇條貫未得北虜踞慢西戎猖蹶三關可收五城可理河壖可田運漕可罷相公豈獨遺此而優遊廊廟更以歲月取賢相之位然後旄鉞而出鎮乎生人可憐勳業可惜伏惟相公越羣士之胸臆姑為躊躇天下幸甚始從北來得邊隅之事謹條别狀輕瀆嚴重武陵再拜再答張僕射書柳冕辱還答知朝廷之事事無小大難易一切言之言之輒從從乃中變故吾子言有進退之心誤矣夫言之不入諌而怒之國之患也言之輒從從而中變是可諌也又何患乎故下之説上患其志不固不患無時謀合於天即天為之時謀合於人即人為之時天且不違况於人乎伊尹負鼎俎五干湯其道乃行天為之時也商鞅以疆國三説孝公其功乃立人為之時也譬如為山纍土過於九仞然後功就茍待天時功不成矣愚公者志欲移山必能移山故天地之心與人不遠人能感天在於心耳昔犬戎滅周申甫復之無知亂齊管仲霸之晉室中絶王導興之太平干紀姚宋挫之彼謀之如神即用之如神故賢人君子匡救時運有其才必有其志有其言必有其事事至而退君子不為今一言未行其志乃衰是無志也故君子白刃可蹈也鼎鑊可赴也其志不可奪也今有其位有其時一不動再言之再不動三四言之即天地可動況於人乎天地氣合即君臣氣合又何患乎冕白上韋右丞書劉軻右丞閣下某切伏下風有年矣布衣儒冠讀書耕田焦勞形神求古人道不為不多其閲今之事極耳目之聞見亦以半古之道參乎其心者也行之於古既如彼踵之於今又如此固不必揲平蓍灼乎龜而卜筮行乎其中矣小生敢欲首天下之忠激敢言之士輒試貢心中事以當閣下閣下知一士之進退關天下之去就今天下白屋之士有角立秀出者或能以黃老言或能以儒術言或能以刑法言思願吐一竒設一䇿使司化源者開目而見四方之事閣下知天下亦有人乎有是人無其時與無是人同有其言而不行其所以言與無言同此所以理代寡而升乎之運不可得而至也古之大臣不惟諌君人亦諌君亦諌故曰惟尹躬暨湯咸有一德此所以開聖聽而達天視也昔貞觀𥘉天下注心於房魏而太宗果為堯舜開元中天下注心於姚宋玄宗幾如太宗今閣下之車轍馬迹相去俯無尺寸天下之注心於閣下聚手而指以為提持大柄在閣下掌握中耳閣下知人意參於天意邪先天而天弗違則其古之相天下者其道不同及其成功一也昔漢孝惠時有若曹丞相以黃老施化而天下清淨孝武時有若公孫弘以儒術御丗而天下亦治孝宣時有若魏邴者以刑法撿下實號中興閣下必欲為黃老而館舍下有膠西蓋公邪必欲為儒術而門下有平津之客邪必欲為刑法而與言者有溫舒于公邪此三者在閣下所嗜而行之耳夫撗一木而棟明堂者其力固多然其下有柱柱下有石石下有土積三物而棟力成焉故太玄曰崔嵬不崩羣土疆此明上下節級有扶持之道也今人之望閣下挺一身而棟天下必矣抑不知棟下之柱者誰乎柱下之石土者誰乎此小生汲汲於私心誠在此也某每病此來之欲為丞相者馴致其道積人之望使必曰某公必為宰相白麻未及下而門巳扄鐍其此豈謂導萬物之情狀達一人之聰明邪且一人之耳待宰相而聰之一人之目待宰相而明之宰相之耳目亦資天下之士且曰是何賢於我其言亦何輔焉此榖梁子所謂上暗下聾也某嘗試論之天下之形聲雖離婁師曠故不能周視遍聽矧閉目掩耳而欲逹天下之視聽不亦難哉故曰耳目在天下聰明在宰相故堯所以寄耳目於舜禹時謂聰明文思之后焉脫不以天下為聰明某不知其然此亦閣下之所醜聞也故某所徴前事而言之意者實欲閣下踐其地使今之談者曰房魏道在吾君必為太宗矣區區下情輒以此貢心焉伏惟宥其愚而捨其所持意恩幸某恐懼再拜與田將軍書獨孤郁天子賞將軍之勳自禆校領十萬軍率給麾幢節符佩黃金印者數四廟祖于京開東第駟門號公侯家子弟姻族以將軍故皆為好官將軍之勳名可謂盛矣美矣然某聞古人曰成功不久難處且物禁太盛昔者周公以至聖之德致太平之功以成王幼少不忍而去召公有不恱色何者勢逼不能無嫌故也夫以聖處猶難況非聖哉故范蠡留侯知其然去之而遠害昔者李斯為秦破山東從擒諸侯尊秦為天子秦皇以為丞相任事秦廷之貴惟斯耳斯知盛滿不行卒為秦擒韓信為漢誅趙魏破齊楚尊漢為天子漢裂土封王于荆漢將之貴惟信耳信不知降挹一旦蜚言被疑卒受吕氏之誅彼二子可謂巧於為人拙於為身故二子始有周吕勳卒受參夷誅何則由務進而不知退故今上封足下為公為王為十萬戶侯傳子襲孫居為夔為龍出為桓為文且令召公無不恱色足下豈不賢於周公哉夫今之遊宦者辛勤數千萬言得一官俸不過三二萬數從僕不過一二人滿當罷戀戀不欲去豈非顧其利邪況夫遭時變即據千里土權殺生柄不覺炎燠更變歌重侍兒俳優不離前為樂萬方以娛情惟恐其不歡無纎憂能鑽其胸豈不願留之邪顧其勢不可是以去故堯讓天下而長有天下孫叔敖不悔去者三願將軍無受吳張玄之説納馬援鄒陽之䇿思留侯陶朱之舉悟韓信李斯之惑立竇融河西之績覽郭馬李高數賢之事稽叔敖三去之美昔蔡澤之説范睢也引鞅起踵以繫奪其位睢受説而歸相讓澤非不知澤情而受市也蓋審理必然今某來非縱橫時豈澤之徒歟既非奪位而來又豈欲騁口衒丗直以惜賢人之業耳惟將軍無猜焉移陸司勳沔書歐陽秬月日歐陽秬移書郎中閣下夫百女蕩一女貞蕩者紛然為貞者笑脫使貞者始貞而後蕩奈百人之笑一人邪嗚呼一之笑百百者有此恥於人而已百之笑一一者舉目無比其如恥何伏惟閣下少垂聽覽秬在閩中時聞閣下之名十年矣及來京師又逾一紀嘗期閣下不出則若南陽劉子驥會稽謝慶緒出則如蜀孔明殷傳説不然亦如賈誼朱雲之徒庶幾於直道也今皇帝起閣下為郎閣下俁俁而來秬謂斯來也享數年有見必言有聞必論日復一日僅三百日矣豈九牧之民皆治矣無有術邪四夷之患皆平矣無有䇿邪天下之無賢者不可舉邪天下之無幸者不可黜邪天下之無贓者不可劾邪天下之無冤者不可雪邪天下之無屈者不可伸邪天下之無驕者不可誡邪既無所聞又無所見則樂堯舜之道讀周孔之書劉驎之謝敷斯人也閣下亦斯人也豈徒鼓動以朝廊餐而退是何前踞而後恭若彼始貞而後蕩如此且一之笑百雖有比也正今百人之反笑矣閣下欲何比焉夫名利之心不可卷正直之心亦不可轉秬謂閣下今之為不及昔時不為明矣且逢萌不挂冠孰有萌邪孫楚不漱石孰有楚邪閣下始心為直茍在為郎國家有明經進士史傳諸科孰不郎也後達者雖在閣下之左先達者果在閣下之右秬所謂為郎不若不為蓋悲閣下身未死而名巳滅雖然尚有可復之計何者閣下有所見勿惜其位而言有所聞勿顧其身而論論或不行言或不用則乞骸歸去斯謂可復之計也巳矣吳越暖景山川如繡鱸鱠蓴羹放歌長嘯夫如是永為陸司勳庶幾乎不朽伏惟念之秬再拜與李渤拾遺書廬坦八月三日坦頓首奉書拾遺公足下包濟丗之資抗出塵之迹德全道備雲卧谷飲遺名而聲飛晦耀而光發天子所聞風下詔命作諌臣朝野聳瞻煙蘿動色足下懷寶樂山竟未為蒼生起實一代之孤風千年之曠躅不可得而纍也坦器凡材薄猥踐班榮鎮守宣池路出瀍洛眺嵩峯之峻極仰景行之彌高吟想徽猷寤寐飢渴幸甚幸甚坦雖未獲拜面而舍弟嘗師習於左右矣鮑聞足下之高義竊承足下詠堯舜之言志周孔之道以致君惠人為意非特熊經鳥伸長往而不返者也甚善甚善然則孔氏之道不隘小官不榮大位於是宰中都而魯國化作相而天下服丗衰運微其道中阻猶且歷國應聘窮塞而後止今天下歡康異衰周之代也萬方一統非列國之時也而足下猶獨超然高舉不答天子之命豈孔氏之徒歟愚竊惑焉大凡今之人奔分寸之祿走絲毫之利如羣蟻之附腥膻聚蛾之投爝火取不為醜貪不避死得以為榮失以為辱不由道以進退不量能以授受如此者多有識知病足下豈不欲矯棄流俗獨為君子哉誠志士之端操賢人之大業也敢不愛慕之乎或聞足下又以蒲輪玄纁郡府之禮不到遂徘徊山門未果輕去難進之道三揖為冝在足下俟駕而行斯可矣餘復何可道哉少許茶果謹具别紙公程迫速不獲拜詣馳誠而巳不具盧坦白移成均博士書皮日休夫居位而愧道者上則荒其業下則偷其言業而可荒文弊也言而可偷訓薄也故聖人懼是寖移其化上自天子下至子男必立庠以化之設序以教之猶歉然不足士有業高訓深必詘禮以延之越爵以貴之俾庠聲序音玲瓏於珩珮鏘訇於金石此聖人之至治也今國家立成均之業其禮盛於周其品廣於漢其詘禮越爵又甚於丗而未免乎愧道者何哉夫聖人之為文也為經約乎史贊易近乎象詩書止乎刪禮樂止乎定春秋止乎修然六籍儀形乎千萬丗百玉更命迭號莫不由是大也其幽幽於鬼神其妙妙於玄造後之人茍不得行胡郎反決句釋者猶萬物但被玄造之化者邪故萬物但化而巳不知玄造之源也夫六藝之於人又何異於是故詩得毛公書得伏生易得楊何禮得二戴周官得鄭康成摫其微言鈲其大義幽者明於日月奧者廓於天地然則今之講習之功與決釋之功不啻半矣其文得不弊乎其訓得不薄乎嗚呼西域氏之教其徒日以講習決釋其法為事吾之視太學又足為西域氏之羞矣足下出文閫生學丗業精前古言高當今洸洸乎洋洋乎為諸生之蓍龜作後來之綿蕝得不思居其位者不愧其道處於職者不墮其業乎否則市大易負乘之譏招詩人伐檀之刺矣奚不日誡其屬月勵其徒年持六籍日決百氏俾諸生於聖典也洞知大曉猶駕車者必知康莊操舟者必知河海既若是矣執其業者精者進而墮者退公者得而私者失非惟大發於儒風抑亦不苟於祿位足下之道被於太學也其利可知矣果行是説則太華之石峨峨於成均之門者吾不頌於他人矣足下聽之無忽日體再拜與孺顔上人書沈亞之上人足下辱書指問將望於僕人謂有解達可以為梯進之級必慮過意幸聽畢説昔之有善煆者火五金而别器一日化百狀而智用不極然常薄産自窘弟子相率而笑之曰夫子之於業工矣然而市售之冨不能當陶之饒何也對曰夫陶者淺勞而薄利與俗相用彼朝市而夕壞壞失其用復從而市之無虛日故能饒且吾之業搜矩而軸模及其成功與丗終始彼匹居之人又安能罄其室而市吾之工哉故當飢亞之誤學為黃金煆且巳困矣上人無乃襲飢於此哉非敢自重誠以陷其所從耳幸熟慮焉亞之頓首上李門下書柳宗元某聞人有行三途之艱墜千仞之下者仰望於道號以求出過之者日千百人皆去而不顧能哀而顧之者不過攀木俯首深矉太息良久而去耳卒無可奈何然其人猶望而未止也俄而有若烏獲者持長綆千尋徐而過焉其力足為也其器足施也號而不顧顧而曰不能則其人知必死於大壑矣何也是時不可遇而幸遇焉而又不逮乎巳然後知命之窮勢之極其卒呼憤自斃不復望於上矣某曩者以齒少心鋭徑行高步不知道塗之艱以陷大厄窮躓殞墜廢為孤囚日號而望者三四年矣其不顧而深矉太息者俱不足望焉然仰首伸吭張目而視日庶幾乎其有異俗之心非常之力當路而垂仁者邪今乃閣下仁義正直入居相位某實切撫心自度以為獲其所望故敢致其辭以聲其哀若又捨而不顧則知埋沉踣斃無復振矣伏惟閣下動心焉某自得罪之由致謗之自以閣下之明其知之矣繁言蔓辭秖益為瀆伏惟閣下念墜者之至窮錫烏獲之餘力舒千尋之綆拯千仞之艱致其不可遇之遇以卒成其幸庶號而望者得其誠無使呼憤自斃殁有餘恨則士之死於門下者冝無先焉生死通塞在此一舉無任戰汗隕越之至上吏部裴侍郎書駱賔王四月一日武功縣主簿駱賔王謹再拜奉書吏部侍郎裴公執事易曰書不盡言言不盡意然則義在乎象非書無以達其微辭隱乎情非言無以筌其旨僕誠鄙人也頗覽前事每讀書見高堂九仞曽輿有北向之悲積粟萬鍾季路有南遊之歎未嘗不廢書輟卷流涕沾衣何者情蓄自衷事符則感形濳於內迹應斯通是用布腹心瀝肝膽庶大雅含弘之量矜小人悃𣢾之誠惟君侯察焉賔王一藝罕稱十年不調進寡金張之援退無毛薛之遊亦何嘗獻䇿干時高談王霸衒才揚已歷詆公卿不汲汲於䇿名不戚戚於卑位蓋養親之故也豈謀身之道哉不圖君侯忽垂過聽禮以弓招之恩任以書記之事擬人即多慙阮瑀入幕則高謝郗超夫聶政荆卿刺客之流也田光豫讓烈士之分也咸以丗利相傾意氣相許尚且捐軀燕趙甘死齊韓今君侯無求於下官見接以國士當陪麾後殿奉節前驅賈餘勇以求榮效輕生而報施所以逡巡於成命躊躇於從事者徒以夙遭不造幼丁閔凶老母在堂常嬰羸恙藜糗無甘旨之膳松檟闕遷厝之資撫躬存亡何心天地故寢食夢想噬指之戀徒深歲時蒸嘗崩心之痛罔極若僕者固名教中一罪人耳何面目以奉三軍之事乎況屬天倫之喪奄踰七月違膝下之養忽至三年而凶服之制將終哀痛之情未泄興言永慕舉目增傷夫怨於衷者哀聲可以應木石感於情者至性可以通神明故徐元直指心以求辭李令伯陳情以窮訴上以棄興王之佐命下以全奉親之篤誠而蜀主不以為非晉君待之逾厚此二人者豈貪貧賤惡榮華厭萬乘之交甘匹夫之辱也蓋有不得巳之者哉儻有乾沒為心脂韋成性捨慈親之色養許明公以驅馳內忘顧復之私外存傳會之眷薄骨肉厚榮寵茍背恩以自效則君侯何以處之且義士期乎貞夫忠臣出乎孝子既不能推心以奉母亦焉能死節以事人假物議之無嫌實吾斯之未信也流沙一去絶塞千里子愴入塞之魂母切倚廬之望就令歡以卒歲仰南薰之不資而更憂能傷人迫西山而何幾君侯情深錫道類切天經明恕待人慈心應物儻矝犬馬之微願憫烏鳥之私情寬其負恩遂其終養則窮魂有望老母知歸賔王死罪再拜代荀卿與楚相春申君書劉軻前蘭陵令臣況謹奉書於相國春申君足下前者不識事機冠宋章襲儒衣以廉軸駕羸駑應聘於諸侯始入秦見秦應侯會侯方以六國啖其君且曰吾方角虎以鬪又何儒為故去秦之趙會孝成王喜兵法方築壇拜孫臏欲磨牙而西臣以湯武之兵鉗其口於前趙王亦不少孫臏而多臣臣以是去趙之齊會宣玉方沽賢市名達諸侯間人聚稷下若鄒子田軿淳于髠皆號客卿故臣得翺翔於諸子間自威王至襄王三為祭酒號為老師然憫諸生少年皆不登闕里不浴沂水各掉寸舌得紆朱垂組自以為高潔莫我若也臣以乳兒輩畜之何虞其蝎蠆之為毒也由是讒言塞路臣之肉幾為齊人所食伏念相君與平原孟嘗信陵齊名故遊談者謂從成則楚王衡成則秦帝以相君之相楚故也不然楚何以得是名以是去齊歸相君相君果不以臣孱固俾臣為蘭陵令臣始下車方弦琴調軫欲蘭陵之人心和且富既富且教必使三年有成然後報政於相君此臣效相君者希以是不意稷下之謗又起於左右俾臣之醜聲直聞於執事執事果亦疑棄臣如脫故屣臣之去蘭陵豈不知相君之棄臣邪臣尚念古者交絶不出惡聲臣慰楚而怨相君也哉頃相君徒欲人之賢已曽不如楚國前事臣不遠引三代洎春秋今雖戰國亦不敢以他事白直道今楚國盛衰之尤者兾相君擇焉自重黎為火正光融天下鬻熊有歸德教西伯弟子洎汾冒熊澤蓽路藍縷以啓荆蠻歷武文成始臣妾江漢至莊王始與中國爭伯此數君皆郢之祖宗而代亦稱臣之術五尺童子羞稱五伯臣又何必獨為相君道哉然楚君但成莊而巳矣自莊而下楚亟不競平王嗣位耳目倒置伍奢以諌死費無極以讒用亡太子走昭王汚楚宫鞭郢墓豈不以一讒而至乎爾下及懷王知左徒屈原忠賢始能付以楚政當諸侯盛以遊説交鬪猶以楚為有人無何為上官靳尚所短王怒踈屈平平既踈秦果為張儀計陷楚之商於地儀計行秦果欺楚是以有藍田之役丹徒之敗懷王囚不出咸陽亡不越魏境客死而尸歸至今為楚痛豈不曰踈屈平親靳尚而至于爾人亦謂令尹子蘭不得皭然無非已不能疾讒又從而借之俾屈生溺離騷為之作襄王以前事歷目切骨雖有宋玉唐勒景差輩子弟賦風吊屈而巳又何能免王於矢石哉今相君自左徒為令尹封以號春申君楚於相君設不能引伍奢屈平以輔政復不能拒無極靳尚之口弭臣見泗上諸侯不北轅不來矣夫如是漢水雖深不為楚塹方城雖高不為楚險相君雖賢欲捨楚而安之也今有李園者世以諛媚荐寵喜以隂計中上根結枝布寖為難拔相君若不以此時去之則王之左右前後不靳尚則無極詎獨臣之不再用也前月相君聘至跪書受命且曰若惡若仇若善若師真宰相之心脫李園何至費靳方試何害臣之不再罷蘭陵也哉敢輒盡布諸執事而無遂子蘭之非況之望也楚子之幸也與吏部孫貟外書陳章甫某叩頭伏地上書吏部貟外孫公階戺伏惟拔英苗而佐明主奉盛德而居要路亦光天忂樹桃李之秋也僕非敢隱籍名實昨聞戶部撿報似有參差嗚呼雖有周孔之才無所施也矧兹虛陋能勿非乎但僕一卧嵩丘二十餘載既不能學許由巢父務光伯成終至青雲高謝堯禹而乃棄藜杖脫草衣薦頌雲壇陪科嶽牧此巳孤負芝桂損辱高風矣若緣籍有誤蒙袂而歸亦何面目垂見巢由舊丘光成隱路耳公言泉百氏腹笥九經前古取人應所多見至如傅説無姓殷后致鹽梅之地屠羊隱名楚玉延三旌之位未聞徴籍也范睢折脅於魏改名為張祿先生秦用之為相張良報讎變名姓而亡漢祖因之實取天下何必考名也是知善牧賢者不以小瑕棄大美今若以籍名有誤便廢其人僕恐蔽賢之議在有司矣夫籍者所以編戶口計租稅耳本防羣小不約賢路若人有大才不可以籍棄茍亡其德雖籍何為謹案周禮卿大夫職曰國中自七十以及六十皆征之其捨者為賢也貴也服公事也注捨謂若今復除其計耳所以優賢能也三歲則考其德行道藝羣吏獻賢能之書于王王再拜而受之登于天府鄭司農云若舉孝廉茂才由此觀之乃舉賢之餘事爾比來天下此道都喪無論賢貴冝被籍書所以風俗不淳賢能不勸由此故也公為官擇才務協於治典進賢輔政何拘於版圖且古之招賢降蒲輪束帛卑辭厚禮猶恐不來今乃坐徴籍書務在駮放此所謂嫉賢也若將古不足法謂時無賢才經邦致治非籍勿用於是㒒也鞭骨自悔裏足而亡雖分國如錙銖終不敢望於臣仕也上安州裴長史書李白白言天不言而四時行地不言而百物生白人焉非天地安得不言而知乎敢剖心析肝論舉身之事便當談笑以明其心而粗陳其萬一悒怏憤悶惟君侯察焉白家本金陵丗為右姓遭沮渠蒙遜之難奔流咸秦因官寓家少長江漢五歲誦六甲十歲觀百家軒轅以來頗得聞矣常橫經籍詩書制作不倦迄干今三十春矣以為士生則桑弧蓬矢射于四方故知大丈夫必有四方之志乃仗劒去國辭親遠遊南窮蒼梧東涉溟海見鄉人相如大誇雲夢之事云楚有七澤遂來觀焉而許相公家見招妻以孫女便憩迹于此至移三霜焉曩昔東遊維陽不逾一年散金三十餘萬有落魄公子悉皆濟之此則是白之輕財好施也又昔與蜀中友人吳指南同遊於楚指南死於洞庭之上白禫服動哭若喪天倫炎月伏尸泣盡而繼之以血行路聞者悉皆傷心猛虎前臨堅守不動遂權殯於湖側便之金陵數年來觀筋肉尚在白雪泣持刃躬申洗削裹骨徒步負之而趨寢興攜持無輟身手遂丐貸營葬於鄂城之東故鄉路遠魂魄無主禮以遷窆式昭朋情此則是白存交重義也又昔與逸人東巗子隱於岷山之陽白巢居數年不迹城市養竒禽千計呼皆就掌取食了無驚猜廣漢太守聞而異之詣廬親覩因舉二人以有道並不起此則白養高忘機不屈之迹也又前禮部尚書蘇公出為益州長史白於路中投刺待以布衣之禮因謂郡寮曰此子天才英麗下筆不休雖風力未成且見專車之骨若廣之以學可以相如比肩也四海明識具知此談前此郡督馬公朝野豪彥一見盡禮許為竒才因謂長史李京之曰諸人之文猶山無煙霞眷無草樹李白之文清雄奔放名章俊語駱驛間起光明洞徹何以盡陳儻其賢賢也白有可尚夫唐虞之際於斯為盛有婦人焉九人而巳是知才難不可多得白野人也頗工於文惟君侯顧之無按劒也伏惟君侯貴而且賢鷹揚虎視齒若編貝膚如凝脂昭昭乎若玉山之行朗然映人而高義重諾名飛天京四方諸侯聞風暗許倚劒慷慨氣干虹霓月費千金日宴羣客出躍駿馬入羅紅顔所在之處賔客成市故時人歌曰賔客何喧喧日夜裴公門願得裴公之一言不須驅馬埒華軒白不知君侯何以得此聲於天壤之間豈不由重諾好賢謙以下士得也而晚節改操棲情翰林天才超然度越作者屈佐鄖國時惟清哉稜威雄雄下懾羣物白竊慕高義巳經十年雲山間之造謁無路今也運會得趨末塵承顔接辭八九度矣常欲一雪心迹﨑嶇未便何圖謗言忽生衆口攢毀將恐投杼下客震於嚴威然自明無辜何憂悔吝孔子曰畏天命畏大人畏聖人之言過此三者鬼神不害若使事得其實罪當其身則將浴蘭沭芳自屏於烹鮮之地惟君侯死生不然投山竄海轉死溝壑豈能明目張膽託書自陳邪昔王東海問犯夜者曰何所從來答曰從師受學不覺日晚王曰吾豈可鞭撻寧越以立威名想君侯通人必不爾也願君侯惠以大愚洞開心顔終乎前恩再辱英眄白必能使精誠動天長虹貫日直度易水不以為寒若赫然振威加以大怒不許門下逐之長途白即膝行於前再拜而去西入秦海一觀國風永辭君侯黃鶴舉矣何王公大人之門不可以彈長劒乎重校正唐文粹卷第八十九
