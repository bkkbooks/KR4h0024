body:
  text: 呉興姚鉉纂頌戊揔五首祠祀三旌儒廟頌并序賈至陜州鐡牛頌少華山佑順矦碑頌房鄴監牧二大唐開元十三年隴右監牧碑頌張􅀃岐邠涇寜四州八馬坊碑頌郤昻旌儒廟頌賈至觀象考曆本乎元辨方正位稽乎極體元御極莫先乎敎敎之大莫大於儒旌儒有祠我新典也昔秦滅羲軒之制廢唐虞之則大搜學徒竭索儒黨懷書捧檄者鱗集麏至然後罪九流之異論尤百氏之殊術無辜殺身有道併命􅁈骸積於坑谷流血染於泉壤􅌃仁義而死者不可勝紀開元末天子在驪山之宫登集靈之臺考圖驗記周覽原隰見鄕名坑儒頽壍猶在􅁣然感亡秦之敗德哀先儒之道喪强死千載遊魂無依乃詔有司是作新廟牲幣有數以時饗祀因祀命郷號曰旌儒人神和恱怨氣銷散於戲秦皇帝以神武邁古并吞六合掃天下以一篲芟羣雄如衆草建官罷侯大權在巳自軒轅以降平一宇宙未有􅀂斯之盛也夫戡亂以武守武以文文以正崇武以權勝秦皇知權之可以取不知正之可以守嚮使天下旣定守正崇儒導六經之謨訓用三代之文質則唐軒盛美湯武弘業不􅀂也觀夫坑儒焚書之意乃欲蓋先王之能事􅀼作者之鴻名黈衆耳以前聞逞私欲於當代此儒之所忌也秦之所志悲夫儒以恭儉爲宗秦則疲弊生人極力宮室儒以道德柔逺秦則竭耗中國勞師四夷儒以宥過議賢秦則刻法峭刑賊虐諌輔儒以述先好古秦則師心徇智播棄典墳夫如是則秦不得不滅儒不得不坑事使然也今天子矯覆車之前軌崇明祀於後葉秦之所廢我之所興斯區夏無疆之休子孫萬代之福也昔武王封比干之墓則招諌之道勸矣晉文表緜上之田則志過之名立矣漢高護信陵之􅃁則尊義之風著矣未􅀂激揚大敎廟食衆賢上以興天地之經次以存顚覆之鑒下以絶厲災之眚建一祀而三德具焉鯫臣不敏敢獻頌曰於維先王設敎崇儒作訓六經爲代典謨降及夫子三千其徒載揚淸風文在兹乎天䘮斯文道有通塞寔生暴秦反道背德竊善攘譽師心徇惑焚書坑儒萬古悽惻牢落千祀微茫九原驪山之北坎窞猶存草樹無顔秋雲晝昬時聞夜哭知有􅁈魂帝在華淸登高訪古愍黙頽壍悲涼榛莽上感亡秦覆車遺武下哀羣哲饗祀無主爰降嘉詔聿脩清祠饋之牲牢奠酹以時幽幽廟門肅肅靈儀􅁳寞求食長無餧而粤自漢􅀄迄于隋閏亦有令主尊儒尚訓闕典罔崇斯文莫振昭昭神理長懷幽憤我后濬哲聦明文思敷弘大敎咸秩神祇􅀑無妖災人不癘疵俾爾蒼生富壽無期小臣作頌敢繼刪詩陜州鐡牛頌并序乾象元地勢坤稽謀惟觀察孰見元善利物純隂騭而不仁坤順爲牛或剛克以殊用彼見於陜郛者其隂騭歟其剛克歟寓精堅强壯趾愼固内習坎窞外形端倪居于道周敦􅀆􅀂樸謂爲首匪如山之狀謂用角匪如栗之象曾覽古史罔徴其由深不可識孰知其故吾將本自然歸神功豈謀人力役􅀑傭哉東臨周畿西盡虢略載厚地而莫聳拒長河而不崩向使非神或微憑子之力則城復隍矣人其魚乎乃詢耆耋聽輿誦僉曰此之鎭其日固乆人由是怙恃物由是生資甞欲掘地及源以觀其徼庀徒執用大臻干兹橫縻林綆四進雲􅓩尋下體之極達純隂之精其於退諸泉而入于穴俾圍木靡拉懸絙絶縋旣致乃穽其見如􅀄五丁力拔而不及方舟鎻曵而奚可虎無所措其爪猛焉能噬兵無所容其刃投豈皆虚鑣鑣行人無住莅下當函關之路望􅀂隨仙俯桃林之墟時得歸獸􅀂以匹敵必於其倫則長蛇遶閬風而周巨鼇􅀒蓬萊而抃可明徴矣且察内以外觀逺以近在端鋩而末固未可量也亦何知不磅礴數州之閒日用有迷其力矣夫能利於物帝之念擇善而爲臣之忠是以我國家咸秩無文發天使以祀我明牧謀始有作招墨客以頌頌者誦也容也誦令德昭厥容兾穆如淸風敢刋之貞石頌曰杳􅁳精􅀆混茫氣凝爲伏牛載厚地巨靈西掌屹贔眉長河東流泙沸渭堅立不動神之至層城固護人大庇德合無疆其可旣昔人無述今之是志少華山佑順侯碑頌并序房鄴上嗣位九年以宗室弄兵皇居失守大駕東狩至于華嶽明年同華連帥大傅許公罷藩邸兵復諸子位正皇儲立母后朝廷乂安中外咸􅀂又明年宫闕復就乗輿反正封少華佑順侯崇祀也始者内兵橫起右輔搔然警蹕難追宗社不復扶持􅀜輔徒爲扃鐍抗表奉迎莫迴天睠公即馳單􅀐詣行在所肉袒徒跣雪泣上言曰廟主不行陵寢不告蒼黃順動莫知攸往況西無正名之伐東異省方之行南征無復國之期北濟乏召君之慮華當關右不逺王畿未虧巡狩之名免負出君之恥可以爲百辟㑹朝之地諸矦輸貢之府地雖不廣足以助供億兵則非衆足以備扞禦時也讜論確然宸心不返宣問往復至于再三嘉謨不聽忠言不納大事將去羣心恟然關内諸矦惟公獨任非神啓聖不能釋明主之疑非神祐忠不能壯純臣之節旣而上察公之志不可奪也諒公之言必可復也由是天迴日轉龍起雲從乃睠是􅀖因駐淸蹕上復交泰之道下無疑閒之憂内難旣夷外兵以息皇嗣之不正者濱于五紀今則因公以正之坤儀之不定者殆乎百稔今則因公以定之君臣以協父子以親夫婦以倫有國之大本也公一舉而得之豈筆舌所能論哉咸以公仗順討逆神實佑之佑順之封非神莫尸璽書爰來牲幣以告是命下客書石誌之鄴耳目竒功縑緗具美授簡執筆略無愧辭姑録許公貞順之誠少華保佑之實以明報神以勸事君至於極天鎭地之崇固國經􅀖之力降神生賢之運僊峯靈掌之竒嶽有舊封國有常祀今兹紀述故不復云頌曰惟華之始因山以紀蓮峯東秀終南西峙少華居中不封不紀歲在景辰􅁀兵中起天子震驚蒙塵旅次豈無近藩諸矦莫至惟我許公聞風奮臂一􅀐迎鑾六龍迴轡行朝有亭行廟有位宗戚以歸兵戎以弭爰立母后始正皇嗣乃君乃臣乃父乃子家國大倫禮無違事祉旣啓侯封亦明祀金天之毗佑順之美乃刻貞珉永證惇史大唐開元十三年隴右監牧頌德之碑并序張􅀃周禮校人掌王馬之政天子十二閑馬六種閑爲一廏馬二百一十六應乾之策也六廏成校五良一駑是之謂小備校有左右閑成十二合月之道也駑馬三良馬之數凡三千四百五十六是之謂大備秦并一海内六萬􅀐之國馬盡歸之帝家則周制陋矣漢孝武富文景儉􅈰之積雄衛霍張皇之勢勒兵塞上廏馬有四十萬匹及東漢魏晉國馬陵夷不可復逮武帝時矣後魏胡馬入洛蹴蹋千里軍陣之容雖壯和鑾之儀亦闕大唐接周隋亂離之後承天下征戰之弊鳩括殘燼僅得牝牡三千從赤岸澤徙之隴右始命太僕張萬歲葺其政焉而弈世載德纂修其緒肇自貞觀成于麟德四十年閒馬至七十萬匹置八使以董之設四十八監以掌之跨隴西金城平涼天水四郡之地幅貟千里猶爲隘狹更扸八監布於河曲豐曠之野乃能容之于斯之時天下以一縑易一馬秦漢之盛未始聞也張氏中廢馬官亂職或戎狄外攻或師圉内㓂垂拱之後二十餘年濳耗太半所存蓋寡開元神武皇帝登大寶受靈符水瑞感而河龍出星精應而天駟下二年春帝乃簡心腑善畜之將􅁲福佑冝生之長俾領内外閑廏使焉即開府霍國公其人也公名毛仲姓王氏開元佐命之元勲東國亡王之後裔四伯輔禹與治水之謨四七興漢在經星之列淸明虚受察含冰鑑籌謀先覺慮出蓍􅀛竭無私之忠而善歸天造輸不懈之力而玄同日用故得騰躍風雲攀附日月䇿功第一承恩莫二庭羅魏絳之鐘鼓第賞京邑之山林文馬蕃錫於晉侯御衣亟分於韓信庶姜如玉則降榮彤管衆子垂髫則抱拜朱第聖人之見也必猶爾爲之四顧而滿志聖人之不見也乃恤然􅀂無與樂其天下仲尼所謂是必才全而德不形者也夫處其身則立無跂正也視而還端也聽無聳誠也言無逺愼也國有憂未曽不慼國有慶未甞不怡其御下則明利害之郷阜財求之務使之趨善而避害懷德而畏威身不離於闕庭令逺行於坰牧亦有不學而暗合於古未更而懸辨其事然其從政必問於遺訓而資於故實者也􅀂夫春祭馬祖夏祭先牧秋祭馬社冬祭馬歩敬其本也日中而出日中而入焚原燎牧除辱舋廏時其事也絜泉美薦疨涼棧濕翹足而陸交頸相靡宣其性也攻駒敎駣講馭臧僕刻之剔之羈之䇿之就其才也不反其性故親人樂藝節樂如舞之心自生不窮其才故闉扼鷙曼􅀼轡詭銜之態不作爾乃舉其神異則望騊駼騕褭乗黃兹白來儀外廏至伎内櫪朝刷閬風夕洗天泉聖皇一馭長壽萬年别其種􅀋則有妍蹄繁鬛小領逺志曰龍曰騋曰戎曰􅂹差其毛物則有蒼白驪黃騂紫驈皇騅駓驆駱駰騢駠雒駮驓駩騧騏騽騝豪骭馵足狼尾魚目宗廟齊豪戎事齊力田獵齊足罔不畢有元年牧馬二十四萬匹十三年乃四十三萬匹􅀄有牛三萬五千頭是年亦五萬頭初有羊一十一萬二千口是年乃亦二十八萬六千口皇帝東巡狩封岱嶽輦輅旣陳羽衛咸備大駕百里煙塵一色其外又有閑人萬夫散馬千隊骨必殊貌毛不雜羣行如動地止􅀂屯雲百蠻震聳四方抃躍威懷紛紜壯觀揮霍迴衡飲至朝廷宴樂上顧謂太僕少卿兼秦州都督監牧都副使張景順曰吾馬幾何其蕃育卿之力也對曰帝之福也仲之令也臣何力之有因具上其狀帝用嘉焉霍公口無伐辭貌無得色朝髦庠齒歆以多之於是明威將軍行右衛郎將南使梁守忠忠武將軍行左羽林中郎將西使馮嘉秦右千牛長史北使張知古左驍衛中郎將兼鹽州刺史鹽州監牧使張景遵隴州别駕循武縣男東宫監牧韋衡都使判官果毅齊琛揔監韋績及五使長戸三萬一千人僉曰自開府庇我十三年矣畜有娩息人無乏匱克猒帝心莫匪嘉績且如停西南兩使六頓人夫藁穀計八十萬工圍石以息人約費其政一也納長戸隱田稅二萬五千石以儉私肥公其政二也減太僕長支乳酪馬錢九千三百貫以窒􅂩止散其政三也供軍筋膠十萬七千斤以收絹繕工其政四也蒔茼麥苜蓿一千九百頃以茭蓄禦冬其政五也使監官料舊給庫物新奏置本收分其利不喪正錢二萬五千貫以實府冝官其政六也賈死畜貯絹八萬往嚴道市􅈎僮千口以出滯足人其政七也五侯長戸數盈三萬墾田給食糧不外資以勤農卻輓其政八也敢問羣牧之事孰能加於此乎然則稱伐計功前典所貴上以美聖主擇才之得人下以賛忠臣受任之盡節未以道官屬承風之成事竟以示後代昭前之令聞是四烈者不可廢也旣而大君有命舊史書功吟詠瓌竒􅂐刻金石秦汧眇􅆌尚想非子之風魯野區區猶傳史克之頌試從此而觀彼夫何足以言哉頌曰皇天考牧􅀆聖之君四十三萬􅀆馬爲羣壍汧渭􅀆垣隴阪飛黃皁􅀆昆蹄􅁐山崆峒􅀆水嗚咽泉噴玉􅀆草汗血聚如花􅀆散如雪性旣馴􅀆才亦絶維國家之大事駕時龍􅀆祭天地和鑾發􅀆文物備維皇帝之七德揔戎馬􅀆威萬國彩髦翻􅀆金介冑有霍公之掌政擇張氏之舊令天王駕􅀆仗黃麾太僕驂􅀆展輅儀舞月駟􅀆蹀重螭神倜儻􅀆態權竒騏􅂹溢野􅀆牛羊日多子孫榮位􅀆恩寵如何頌皇靈􅀆􅂐石鼔萬斯年􅀆羣玉府􅄮邠涇寧四州八馬坊碑頌并序郤昻垂象者玄上昭乎天廏天駟體玄者聖下列乎廋人校人􅂹稱其德亦巳逺矣願言馬之志曽有意乎粤􅀂乾道爲良坤元利牝駒從渥水駿發中廬屈産貴其能鳴鴈門多其美脊豈止宗生兾北族施汧西而巳哉自相土運其天機孫陽明其骨性秦賛涖其前後許衛詳其色毛悲伐在其股膺寒管議其脣齒麻朝訾其頰胲女厲辨其目眸昔軒轅得之過寒門穆滿得之遊崑崙周王得之平東鄰漢帝得之定西秦我高祖得之四􅊂至我開元得之五輅備敢問毛蟲三百六十其誰力多於是乎夏殷以還經傳莫紀周制廏馬始頒厥官凡十二閑馬三千四百五十六始皇吞并㝢内六萬􅀐之國馬盡歸秦漢武大脩佳兵崇飾戰馬至四十萬匹是多乎哉自魏及隋天下騷動勞疲死轉數不足徴我有唐之新造國也於赤岸澤僅得牝牡三千匹命太僕張萬歲傍隴右馴字之四十年閒孳娩成七十萬六千匹屬張氏替職圉師敗官馬之敎駣日失其序逮開元初唯得二十四萬匹至十九年復成四十四萬匹今之盈縮亦不甚過上耕籍之明年命我邠公典斯馬政公齊其飲食視其良駑廥芻疨涼綱惡去害天子以公有伯翳冝生始終惟一支命朝散大夫都􅁐揔監韋績揔以統之韋公敢行利物克壯逺猷悉心效官盡瘁事國口占諸吏躬親百爲攻特執駒禁􅤊驅䗽撫龢趣馬慰薦扈人陳損益以示其方明賞罰以防其慢立封準以程其課均衆寡以節其冝告之以畏威申之以誘掖曰善而筐􅜹而瓔纕除而兹翦而蓋偕當循爾職制無使我馬玄黃抱公絶私匪怒伊敎君子曰韋公之􅋏下如此欲辭福禄得乎人從話言馬賴調豢將蕃其􅀋必謹其初故春祭房星尊祖也夏祭先牧尚養也秋祭馬社敬乗也冬祭馬歩存神也然後時其出入偵其肥羸一其種性殊其皁􅇫旌别淑慝無相奪倫試言夫名且曰獻狀其名則汗血山子桃驂緑耳金喙騰黃騶吾吉光蒲梢啓服野糜娥鹿白蟻雞斯蜚鴻母兒遺風騕褭兹白鐡離項王之騅符主之騧􅁊氏之騘晉侯之駮魏公絶影唐國驌驦劉之的顱呂之赤兔其狀則八尺之戎七尺之騋六尺之驕三尺之果下文臂花肩隂脣白顚掘腕作足昆蹄素懸縞形如練紫目如電有駹有騱有􅨎有驠騭騇異羣驪騵亦分散如摛錦聚􅀂屯雲􅀂迺審其容貌觀其尾鬛司其正骨鑑其回毛膺爲冝桀肘爲咸陽幹爲茀方背爲闋光水火又明城郭又張逸躍翹陸䟃􅑗跼顧陞甗齕草降阿飲沱騤而翔馺而走如龍如􅀑或寢或吪驫至特立仰鳴俯噴威儀變態不可談詳田事孔昭軍容大備有馬如此何憂乎戎由是判官長上果毅都尉成公雅貞尹承順兼諸寮吏及四郡齊人八坊長戸因雜然相與謀曰自天子亭育我邠公覆露我李公司牧我韋公懊休我君臣同德其利愽哉􅀂不毛舉數事指敕大較雖隸圉之後將不食吾餘且保樂者隋石門馬坊也其舊制褊狹多歷年所棟折榱摧隤牆塡壍甘露先置在九成􅁐外土良􅏪美不迨􅁐中今兹數公得請于帝有詔令新保樂徙甘露所云刱葺許用正錢今則量抽掌閑供飼國馬數内商㩁納其資課迴給工人計一歲省庫錢七百貫有竒以約財埤國其利一也甲令曰諸坊馬毎年四月十一日停料野放今則以三月中􅃸陽崖墳盈春草先長便停槀榖俾逐川原計一歲減菽粟四千石萁秆三萬圍徯來年之用以隨時預蓄其利二也八坊管田一千二百三十餘頃析置十屯密邇農家恱來租墾王在京邑則稅其生芻天旋洛師乃藏厥嘉實歲中收貯二萬五千石薪蒸倍之以妥甿盡地其利三也又縁馬所須羈絆翦刷鬴鑊畚帚油藥灌劀之物又疀滌除之器比年皆旁勞州縣長度公錢誅求無時不給其用寖以承弊人多懼憂今則權差夫丁率自采造成二萬六千五百三十石升枚具歲中省百姓供費三千貫以柅煩激惰其利四也内廏馬毎年有􅇤者病者老者疲者擇其不任者以頒諸坊則必餧之艾之行之節之俟其跳梁俟其充腯而後入之以内癯起廢其利五也是五者有仁人焉有王政焉何獨師古始爲成憲則知從邠公之敎可以阜從李公之法可以經從三判官之幹蠱可以事事無留從韋公之訓䛐可以孜孜不怠古者有勞於國則紀之有功於人亦紀之里克賦在坰之頌燕公􅂐鹽牧之作吾從二史臣之後安敢墜於斯文其詞曰天王乗玉􅀆德至山陵澤馬于峊􅀆屢惟休徴君命臣力􅀆庶績其凝八坊載就􅀆畢來斯昇岐山之下􅀆田疇好涇水之將􅀆多媺草繚垣墉􅀆積芻槀天馬來􅀆從東道羣紫燕􅀆駢緑蛇骨象竒􅀆歸帝家毛御風􅀆蹄踐雪舉籋雲􅀆低噴沙旣伯旣禱􅀆無烖害有駜有容􅀆眞沛艾縞身朱鬛􅀆又白顚睨影長鳴􅀆聲造天今安匹􅀆龍爲戎吾君馭􅀆壽千年重校正唐文粹卷第二十二
