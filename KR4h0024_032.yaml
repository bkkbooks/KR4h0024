  text: 重校正唐文粹卷第三十二
  hash: sha256:8c6e94bc119c8a5f33f68c13af6f806307304bed1fece763e0158f55eaa1bcd7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0024_SBCK_032-1a}
body:
  text: 吳興姚鉉纂文乙揔一十三首帝王八諡册二唐中宗孝和皇帝諡册文蘇頲唐德宗神武皇帝諡册文權德輿哀册六唐高祖神堯皇帝哀册文虞世南唐太宗文武皇帝哀册文禇遂良唐中宗孝和皇帝哀册文徐彥伯唐睿宗玄真皇帝哀册文蘇頲唐玄宗明皇帝哀册文王縉唐憲宗章武皇帝哀册文令狐楚后妃五諡册二唐順宗莊憲皇后諡册文權德輿唐懿宗元昭皇太后諡册文夏侯孜哀册三唐太宗文德皇后哀册文虞丗南唐高宗則天皇后哀册文崔融唐代宗貞懿皇后哀册文常衮唐中宗孝和皇帝諡册文蘇頲維景雲元年歲次庚戍十月戊寅朔十三日庚寅攝太尉銀青光祿大夫守戶部尚書上柱國宣城郡開國公臣姚珽等上議曰臣聞聖人極天下之賾以象其物冝成天下之文以察其時變加於百姓之謂德刑於四方之謂風德也者動於神明風也者由於教化原始見則名合道先知終存義迹因行表其來尚矣伏惟大行應天神龍皇帝纘武之命允文之基肇承於宥密以至乎緝熙若乃含青雲之符耀赤光之瑞履順而一夷險安貞而再濳躍由是恭于三朝服兹四罪傒豫之始祀夏而無改舊物若帝之初遷周而有膺新命虔匹夫蒸蒸之思愛於文母豫太帝庾庾之占友於王季既而三年諒暗九族敦敘免喪問道穆乎天子之容退朝藏密怡若家人之禮功收其成不以微刑濟其寬不以大讜詞所不忤讒説所不入約躬而厚物盡下以推人翺翔乎儒雅之林經啓於文章之囿不傷麛卵不夭卉木體仁也行於蠻貊暨於陪臺施惠也酌中衢之樽不竭也陳太廟之器不盈也故能百寶用四靈臻嘉禾神芝日獻于府柔逺格懷荒至名駒巨象歲填于牧方採厚陵之露華感而通夢遂揚昊壇之煙燎嚴以配尊然後心遊絶冥神寄愷樂在雲臺之上希夷於真諦之門追汾水之陽縹眇乎列仙之館豈圖變生氛沴凶遘霄極欻慿玉以大漸顧遺弓而上仙所以函夏攀援人神哀戚龍攢既啓鳥耘逾慕禮撤三獻北有因山之名法崇二言南有至郊之議謹案諡法慈惠愛親博施備物皆曰孝安人緝衆推賢讓能皆曰和夫孝以安親和以安人是則憲先生之典謨垂後裔之光烈者蓋天之所稱矣請上尊諡曰孝和皇帝廟曰中宗謹上唐德宗神武皇帝諡册文權德輿維永貞元年歲次乙酉月朔日孝孫嗣皇帝臣某伏惟大行皇帝德合天地作人父母纂承光明建用皇極昔在寶應制天下賦輿戚藩以大自魯疏雍師律既貞會陜收洛克燀威命廓開王塗是登上嗣乃宅丕后服藝祖神宗之大烈有乾乾翼翼之至敬敷佑迪哲尊嚴懿恭燭明四極發育萬類濯沐乎仁澤澄清乎理本巍巍乎建中風聲與貞觀同符洎時有祲沴變生京轂省方展義弘隂騭之功整旅致誅申震耀之令氛祲滅息侯王䡄道丕冒持載鏡清砥平然後明禋毖祀萬靈以接翕受敷施九德咸事含弘亭毒以致其和博采虛受以通其志政刑有針宸扆有銘煥乎文明之化成也因時創節象卦設樂薰然中和之被物也納嘉言於近侍輟巳行之詔疾讒口於宵人宥過失之罪去徽號而約已正廟祧以尊祖九譯通道萬方來庭賨旅焯乎勳籍夷歌陳於樂府霜露所墜車書大同順氣旁達天休滋至慶霄輪囷德水清徹三辰秉陽以宣耀百嘉麗地而交感飛走呈祥肖翹遂性在宥天下二十有七年夫文思光被陶唐之盛也􅉃怛忠利虞帝之教也亹亹穆穆周文之業也聰明神武漢祖之烈也窮古先之大律極帝者之上儀方將扈升崇丘侍撿玉牒奄遺天命永棄萬方億兆嗷嗷哀號靡訴顧惟沖昧懼忝孫謀君父有命付兹神器虔恭貽訓感慕滋深今因山既建同䡄畢至一二元老宗工碩生考稱天之禮稽節惠之法式遵古義敢薦大名謹遣太尉某謹奉册上尊諡曰神武孝文皇帝廟曰德宗伏帷聖靈昭格膺是典禮幽贊丕祉流於無窮嗚呼哀哉唐高祖神堯皇帝哀册文虞丗南維貞觀五年太歲云云即以明年某月日遷座于獻陵禮也玄覽載籍逖聽皇王立德可久應運斯昌天基崇峻帝系悠長虹暉降祉真氣呈祥總衡朱黻熊軾龍常契叶禎符誕生睿聖􅊮雲晝聚黃星夕映舒卷濳躍幾深道性地載天臨日暉川鏡歷試藩嶽風移俗正火德云謝羣龍戰野蚩尤曜旗王良䇿馬拔山曀日滔天泯夏蕩拒黎元阽危宗社提劒創業仗鉞專征風驅雲動海運天行伐謀上略制勝神兵尊王踐土復帝夷庚職惟上相任隆羣辟六階巳平四門咸闢殊物顯命彞章典册錫重介圭禮優乘石煙霞改色鏞管變音觀國受命負扆君臨仁霑動植化感飛沈殷輅周冕禹迹堯心削觚反朴抵璧藏金商俗未改遺氛阻亂沙塞虔劉伊瀍叛換應變雷動乘機電斷十角雲消三川冰泮漸以文教致諸王道制禮和樂尊儒養老翠鳯棲梧丹魚在藻水浮玄貝階榮朱草威加海外澤被區中要荒合䡄鞮羯遐通沒羽沈浪飛輪駕風眷言釋負有懷高謝翛爾櫟陽杳同姑射趨詩禮以承天稟義方以成化聿膺景福方期永年玉几奄及金縢遂愆絶五日之晨省遽千齡而上仙攀帷扆以孺慕抱劒舄以纒綿嗚呼哀哉虔奉顧託式遵遺志指珠玉而不藏即陶甄以成器貽儉德以為譽垂風聲於後嗣嗚呼哀哉永去天邑言遵地肺背沃野之神臯越通川之清渭懷𡵨下之前迹眷新豐之舊里笳哀噎以留思旐翩翻而顧指悲風急而拱木吟平野晦而寒煙起嗚呼哀哉惟綴衣之如昨忽馳光之莫駐亟時逝而節改俄涉新而履故野蒼蒼以日衰歲凛凜而行暮感物悲於氣序銜哀踐於霜露泣川水之逝波動商山之風樹蹐厚地而無感仰高天而何訴嗚呼哀哉曰聖與人誰前誰後炎昊無金石之固勛華異松喬之壽孰歷丗而長存唯令名之不朽矧玄功與至德冠列辟而為首俾軼五而登三與天長而地久嗚呼哀哉唐太宗文武皇帝哀册文禇遂良維貞觀二十三年歲次巳酉五月甲辰朔二十六日已巳大行皇帝崩于翠微官之含風殿旋殯于太極殿之西階粵八月庚寅將遷座于昭陵禮也鳯管凝和龍帷將曙溢化同軫綿區縞素哀子嗣皇帝某覽風樹而增感攀銅池而拊膺迫宗祧之是寄傷往駕之無慿奠樽盈而悲緒促靈景翳而愁雲興去劒滋逺清徽方閟爰詔司存傳芳瓊字其辭曰三微固祉五曜垂文光昭司牧對越唐勛族著玄牝家傳縉雲高配于天一人有慶大行神武惟幾作聖良書自得高文成性夙表餘雄先懷反正蒼兕爰發朱旗首令寰瀛昏墊關洛荒蕪妖傾地軸盜弄乾樞戎衣光啓霸政宏謨天兵電掃月陳風驅蚩尤遞翦揳窳咸誅閏位不虔餘分興戾先收秦組次焚商袂轉圜上略容光下濟從邑垂仁賔門灑惠修風順䡄凝圖奉睿青戾同規玄珠協契發輝三五聲明遐裔泛野休兵靈臺􅢰革升巖藏銑遵河奉璧學肆徐輪丘園散帛就日攸冝如天在斯刑哀動植化美塤箎樂華曽舉禮葉旁垂沙場罄翦斗極咸羇狼山入囿潮渚歸池東旌若木西斾條支龍鄉委責鳥服來儀大矣乘時悠哉利見文龜浮沼應龍在淀潏露飛甘卿雲呈絢松荑望幸瑤華方薦仙舟劒術星飛告變凝沴氣於升年掩璿暉於離殿嗚呼哀哉商管初秋飛弦罷佾驚川悠𬗟宫車晏出大墜弗營元龜獻吉展軨效駕端圭司日迫靈心於將餞痛皇情其如失凝秋林於廣路遡悲風於長術經柏梁而徐轉邁蘭池而從蹕聳輕斾之逶迤動邊笳之蕭瑟嗚呼哀哉周營甫竁漢啓泉闈榖林搖落喬巖變衰平原淒兮白日逺深渚淡兮秋雲飛覽銅雀而興慕傷鼎湖之不歸嗚呼哀哉崤陵玄壤嵎山窮路虛衛翻英輕馳委素堯門閉而日慘羲庭易而雲呀嗟厚德之長違仰高天而攀慕嗚呼哀哉崇基永煥置業方昭遺風餘烈天長地遙想神襟而騰茂縱史筆而揚翹籠嘉聲於日月終有𥙿於唐堯嗚呼哀哉唐中宗孝和皇帝哀册文徐彥伯維景龍四年歲次庚戍六月辛巳朔二日壬午大行應天神龍皇帝崩于神龍殿旋殯于太極殿之西階粵景雲元年十一月二日乙酉將遷座干定陵禮也畫攢毁帟雕輼肅軔縞紼霜回丹斾雪引御窆臺之眇默背天閣之崇峻皇帝瞻在原之墜響感聮蕚之凋隂禮奠收兮泣遺迹同氣訣兮悲聖心爰命下臣式揚鴻懿咨睿烈於金牒刻明猷於玉字其詞曰少典之子重華之孫珠聮寶系海浸昌源鳯鳥鳴國龍蛟守門於鑠皇朕赫應成命青靄南浮彤雲北映掃刷中宇光亨纍聖欽若應天纘成前慶身佩星斗掌提曦鏡克明克類允武允文就之如日望之如雲聲中律吕辭合典墳道懋登庸榮膺繼體位擁青陸業移朱邸春誦夏弦冬詩秋禮復子明辟固天攸啓鵬舉提象鸞飛鑿乾蘿圖巳御芝璽仍傳拱默當寧賡歌撫弦堯親更睦媯德通羶萬寶阜成四門光闢宵衣若厲道風猶厄野接翹車殿橫儒席留連縞宴婉孌詞客潤洽泉魚恩周卉毳鞮譯騖輪要荒走幣削觚反朴寬刑薄稅俗冨京坻人忘疵癘帝圖廣運天意難誣旖旎祥籙張皇瑞符仙芝抱砌神萐搖厨龜負綈檢鱗銜斗樞孝思罔極宗庸克賽親幸國陽式陳昭配翠輦容與霓幬暗曖蒼璧森羅明祇肅對玄精備典洪範盈疇將竦華蓋遙封岱丘猒紫寅之厄僻追白雲之豫遊時若慕於喪妣道空在於委裘嗚呼哀哉惟幾在辰枚卜違吉仍几虛座綴衣空室景沴攝提悲纏昱日羣臣奉於末命天下悲乎晏出嗚呼哀哉宗伯􅊩典同軌赴辰龜謀人兆犀鞟移輴喝苦挽於香掖咽酸笳於曙旻彤階皛皛兮露驚月王座微微兮花掩塵嗚呼哀哉列綺城之哀仗引滋橋之度幰朔飈急兮御道寒愁日晦兮雲郊晚駐石馬之新塗下金天之舊坂見踈杏之原長覺深松之路逺嗚呼哀哉伊昔睿哲先謀壽宫猗那我后復幸方中委冠劒於泉穸保明靈於昊穹山有移兮海有變道無缺兮聲無窮嗚呼哀哉唐睿宗玄真皇帝哀册文蘇頲維開元四年歲次景辰六月乙巳朔二十日甲子大行睿宗大聖玄真皇帝崩於百福殿徙殯于太極殿之西階粵十月朔某日將遷座于橋陵禮也素帟褰周青壼警節儼無聲以虛衛陳有象而成列哀子開元神武皇帝某追攀引索眇劈司常悽庶物其涕迸感衆靈而影彰眷兹鴻業欽若要道爰制近臣敢揚大寶其詞曰高祖興唐垂其耿光睿宗誕慶紹我明命明命伊何重熙纍盛耿光伊何翊善傳聖在昔分瑞爰初剖符宅殷令典居相宏圖宣哲觀藝祗庸服儒踐其成式納以嘉謨否歷終泰傾維更紐豫從代王子事周母退象藏密沖襟釋負不為震驚自得謙受權乃復亨塞而自開固推皇弟仍陟元台鳴牝搆孽紛虹肆災飈馳神武電掃姦回三讓天下載登宸極順夫氓心忘我帝力鞮譯修貢親賢任職樂英巳敷禮緯重繹宗廟率祀郊丘肇禋養而迎夏芟以祈春靜默沿道和平返淳智周翔泳功濟陶鈞知子惟明從吾所尚陋伊祈之莫緒追齧缺而將喪帝允執乎厥中皇遂崇於太上始授圖而觀察終脫屣以清曠齋必間館朝而别宫問安順色資孝弘風理極兼受言承至公豈綴衣而慿几忽成鼎而號弓嗚呼哀哉夢年罕驗顧是付囑屬神器其得所委靈心其何欲增摧絶以孺慕竟厭時以去俗萬邦赴而同軌六遂陳而帥屬外羣悲於縞素中不瘞於珠玉蜃輅迎轉龍㡆戒徂寒生紫殿曉發清都笳挽遲遲而徙靡斾旌戀戀以威紆除櫟陽之御路指橋嶽之幽途禮既獻而三撤神方寧而九虞逺遊通冠近嚴歸蹕因高而渭川盡見馮下而秦京稍出積耘草以橫霜攢悲松以翳日嗚呼哀哉粵羲軒之建子姒兮令問傳其不巳猗簡册之尊聖真兮鴻名冠而方始然後景雲藹華露滋揚至德殷永思此天子之孝也臣何足以知之嗚呼哀哉唐玄宗明皇帝哀册文王縉維寶應元年歲次壬寅建巳月五日玄宗至道大聖大明孝皇帝崩干神龍殿旋殯于太極殿之西階粵以寶應二年三月甲辰朔十一日將遷座于泰陵禮也象物巳設仙馭將飛空聞脫屣無復求衣孝孫皇帝親臨遣奠意延晷刻向池綍而涕流想山園而心惻九天兮無所一往兮何極感貽美於孫謀俾述事於祖德其詞曰天厭隋亂中原無主人歸唐德上帝是輔以聖易暴興文繼武義冠殷湯威包漢祖仰膺曆數光宅區宇惟皇得一承乾嗣五赫哉厥初萬物斯覩景龍之際乾儀反坤不利王室將開禍門吕危劉氏趙啄皇孫我獨仗劒神期武賁上排閶闔俯掃軒轅不驚宗廟大造黎元為而不有禮備尊尊乃奉睿宗爰受寶命問安侍膳純孝至敬維城之年佐潞之政一蓍獻兆百靈翼聖躍馬截流水不敢競濳龍變海池亦呈慶有開必先興王之盛誥曰皇帝余倦于勤往纘丕業以順兆人辭之不可其命惟新體乾之大法土之均臨之以日生之以春寒暑彰信動植知仁九族既睦四門既賔天通之聖電斷之神求賢巽簴就列搢紳讜言是聽庶政必親刑措兵戢威加德馴戎狄讋竄塞不驚塵琛賮爭入來自無垠駕鼓斥駿焚裘棄珍風雨時若京坻相因師於上古思與還淳然後制禮節焉北祠后土南郊上玄齋祭陵廟位號山川教戰講武祈農籍田冕旒問俗旌旗幸邊文物蔽地英聲動天鳯巢麟擾甘露醴泉九尾三春朱草非煙繽紛效祉每歲且千道德洋溢乾坤交泰成功如可登封于岱太平如何是時無外才藝餘美帝王之最學究天人乙夜慙對文齊日月秋風靡逮推曆正元調律平害札動雲落弦開葉碎揮琴陋虞教歌輕沛良辰可賞聽政方退鐘鼓屢陳君臣高會巍巍蕩蕩四十餘載巡省順動西南奧區命子出震繼明握圖長驅猛士纍翦封狐不失舊物言旋上都離宫就養壽酒多娛習道久矣神仙逺乎嗚呼哀哉湖上鑄鼎海中祈藥忽乘紫氣長遊碧落千門萬戶若無天兮寥廓八達九衢雖有人兮寂寞淚為雨於宸極哭成雷於郊郭遺轍迹而徒攀葬衣冠而可託同軌畢至𥘉陵巳開震鳯輦於仙仗降龍輴於帝臺擬將行兮肅穆似有覩兮徘徊遇春城兮如送望暮山兮謂來嗚呼哀哉壽原肇吉先天不違接橋山之大隧營金阜之玄扉擁馳道兮皆往獨宫車兮不歸厚夜兮藏晝終天兮戢輝文始逺極武餘英威立德不朽至道惟微雖隂陽之與變化侔聖德兮安可希超前古以作則遺後代以垂衣嗚呼哀哉唐憲宗章武皇帝哀册文令狐楚維元和十五年歲次庚子正月甲戍朔二十七日庚子移殯於太內太極殿之西階粵五月十五日庚申遷座于景陵禮也玉衡南指金波西落皓雪集其麻衣素雲褰其綃幕柳宫龍動竹池魚躍兆庶雨泣於浩穰萬靈風號於寥廓哀子嗣皇帝仰攀雕輦殷奠瓊筵哀無容以觸地痛不返而終天仙仗徐進宸儀永隔降睿旨於鸞臺揚聖功於鳯册其詞曰配天惟唐伊祁同光應道為帝玄元之系聖人有作孝子善繼顯赫十朝總齊四裔執其大象司彼左契武烈誕敷文明下濟出濳離隱或躍未融親則盤石封殊翦桐承祧黃屋主鬯青宫禮樂盡在謳歌荐至軒皇倦勤傳付神器太母侍飬親臨寶位怡聲下色先意承志家令敢言天子屏貴明明出震業業承乾其仁如山其智如泉理析堅白學探幽玄揮毫霧動掞藻霞鮮所持者儉所寶者賢刑靡不省賞無不延冕旒迎日圭璧祈年涕謁宗廟臣朝昊天天縱神聖日躋孝敬鴻名再加寶曆一定窮人屢賑名士交聘獸愛觸邪草憐指佞梯航修貢鱗羽遂性河色呈符山聲告慶編書辨謗創殿思政甘節必稱苦言終聽稜威之逺德政之盛霜雪憲章雷風號令夏臺齒劒上黨納穽趙際宅心鄴中聽命誰能去兵王者有征王壘霧廓金陵鏡清狐鳴上蔡蟻聚東平伏鑕就戮回戈受烹始以上殺歸於好生恢恢不失蕩蕩難名信及隱微道存溥博走馬斯卻昆蟲咸若調其玉燭徇以木鐸混同車書逺頒正朔範金合土大興太學清蹕鳴鑾將登高嶽四維既張五刃巳藏蠻夷戎羌敢不來王天下清淨朝廷樂康會冠劒以高晏戲魚龍於廣場有嚴有翼無怠無荒俗皆臻於壽域人自為於犧皇日出入兮安窮極雲飛揚兮無處所瑞方瞻乎鳯來災忽聞於鸛語謂百年之可十嗟九齡之不與當凝旒而下臨奄脫屣以輕舉萬姓哀其考喪千宫懷其后撫封人猶祝於南山帝子巳號於北渚嗚呼哀哉披靈衣兮如在委仙佩兮若休建環海以靜寐謝鼎湖而逺遊桂華朗兮高殿寂梧葉暗兮深宫愁驚同䡄之遽至咽長川而不流嗚呼哀哉威儀肅設文物前列酌玉斚以宵奠駕金根而曉發出朱雀之正門背青鸞之逈闕逶迤原野蒼茫日月去復去兮降堯階悲莫悲兮臨禹穴嗚呼哀哉地開蒼谷天作豐山江海自流於泉下城郭取象於人間高封馬鬛永祕龍顔鱗有逆兮曽觸髯欲升兮尚攀朝百靈以肅肅遺八駿以間間陵植柏兮未拱閣生苔兮巳班嚴日宫而深閉藹雲幄以空還與衆感於萬井結宸悲於九關嗚呼哀哉神行無方乾健不息物皆𬒳於聖澤人自迷於帝力巍平高代之行至矣動天之德後玄壤以長存冠蒼穹而罔極嗚呼哀哉唐順宗莊憲皇后諡册文權德輿維元和十一年歲次景申某月朔日哀子嗣皇帝臣某伏惟大行皇太后柔明承天廣大法地齊二儀以發育含萬物而化光靜專宅心謙儉約巳塗山積厚淮水秉靈四德交修六宫承式於德宗有逮事之孝敬於先皇有輔佐之憂勤啓迪風徽儀形天下伏以永貞誥命脫曬寰區乃居太上之尊乃正中宫之位顧兹沖眇上荷劬勞自幼逮長稟邑薑之教朂繼體纂圖申長信之供養率用慈訓施于理道母儀所𬒳子惠所覃一紀于兹萬方蒙福以載物之量包逮下之仁嗣任姒之徽音慕黃老之清淨冝錫丕祉壽如岡陵昊蒼不愸艱棘俄及追惟顧復創巨感深銜恤茹荼叩心罔極今祔隅先逺龜筮告吉順厚夷體幽嚴就路宰政卿尹與典禮之官詢考古式詳稽諡法以周道章明未之或改敬形擬議敢易大名謹遣攝太尉中書侍郎平章事臣裴度奉册上尊諡曰莊憲皇后伏惟皇靈降格淑聖幽贊昭配清廟對越鴻休與太隂方祇永永無極嗚呼哀哉唐懿宗元昭皇太后諡册文夏侯孜維大中十三年歲次巳卯九月癸丑朔二十七日巳卯嗣皇帝臣伏帷先太后體貞明以合天本懿粹而象地發秀于外含章在中由穎川以表祥配沙麓而比德塗山佐夏莘野興商濳耀空藴於方祇祕景莫觀於圎魄卓爾潔操穆然凝輝欲報之德昊天罔極臣猥以沖昧獲奉宗祧怵惕哀焭慮墜大寶而天意允若人心克諧惟懷永圖懼乖末命退省蒙固上感劬勞繫鏡無塵賜衣有篋宸儀雖閟慈旨長存莫追蘭殿之晨昏空感椒塗之霜露言成隂教行著國章逮事靡及於循陔終吉徒哀於陟屺敢舉追崇之典寧申顧復之思伏惟舉位以定名考諡以尊德所以揚茂烈傳休聲率由舊章竊擬素範今禮官詳議庶僚稱贊備陳徽數克播令猷正位號於瑤齋森禮容於金戺母儀無斁廟貌有嚴將享鴻休實慿玄祐謹遣攝太尉門下侍郎兼兵部尚書平章事蕭鄴奉册上尊諡曰元昭皇太后伏惟明靈昭格俯鑒精誠時巳逝而敬在六衣夜不陽而禮存三獻惟是薦享與唐無疆嗚呼哀哉謹言唐太宗文德皇后哀册文虞世南維貞觀十年歲次甲申六月巳未朔二十一日巳卯大行皇后崩於立政殿粵九月十日丁酉將遷座于昭陵禮也殯宫夕啓靈轜曉前儼帷帟於空殿肅陛衛於靈筵皇帝親臨宵載義深追逺瞻青蒲而永絶悼玉階之莫返蜃輅將引犧樽巳撤爰詔記言式揚徽烈其詞曰二儀合德兩躍齊光列聖觀象邦家克昌猗歟華族英靈降祉比齊越薑匹宋踰子育德高門騰芬素里體仁將聖披圖閲史造舟為梁嗣徽前德履和思順自家形國淑問不巳柔風允塞紃組報勤璁珩垂則時逢昌聖運屬休徴代邸膺曆唐侯嗣興紫宫並曜黃道偕升化宣風始業贊丕承比德無競凝神不測應物通理撫機先識體備賢能暉無眺側績包九亂恩加八極性道希夷言容莊敬戒奢處約懷沖履正景曖風暄霜嚴冰淨領略三古針規六行源濬流逺時昌祚延國貞誕睿皇友挺賢談高辨日學冠通玄慈訓所及懿德光前五福云備千齡方永地紀絶維月輪韜景辰興不豫德音彌整馬鬛無對鶴珠斯屏嗚呼哀哉異人神於倐忽變容服於平生改清蹕以哀挽易朱旗以素旌昔照朝景響環佩於曽城今冥永夜吟松柏於山楹嗚呼哀哉氣變灰飛暑退寒襲煙觸樹而凝慘露分枝而垂泣聞哀鴈之夕飛聽悲風之曉急仰雲霄而永慕慟陵寢其何及嗚呼哀哉背玄武而北轅絶牽牛而橫度途去去而逾逺馬駸駸而不駐想渭水之貫都歎黃山之隱霧嗚呼哀哉嗟人生之浮促若飄風之過牖牖何風而暫停人何生而能久唯承天與載物邈慈深而德厚邁任姒之高蹤播英聲而無朽嗚呼哀哉唐高宗則天皇后哀册文崔融維神龍元年歲次乙已十一月朔二日云云大行則天大聖皇后崩于洛陽宫之仙居殿旋殯于乾陵禮也祖庭火燼攢宫月曉雲帶黼翣風牽絳旐儼天衛之蒼蒼邈神儀之窅窅哀子嗣皇帝慕切充窮誠殷遣奠瞻象服其如在攀龍車而不見閟慈範於長陵戢神輝於前殿示人䡄訓先王典則爰命史臣揚言聖德其詞曰天生后稷飛鳥覆翼天護武王躍魚隕航施于成康武子有光豐沛之疆河汾之陽異氣發祥聖母其昌穆穆皇皇作令于唐至哉坤德沉濳剛克竒相月偃惠心泉塞蘋藻惟勤紘綖是則訓自閨閫風行邦國七廟肅祗六宫允釐中外和睦遐邇清夷家道以正王化之基皇曰納輔后其謀咨謀咨攸侯皇用嘉止亦既顧命聿懷代已聖后謙沖辭不獲已從宜稱制於斯為美仗義當責亡軀濟厄神器權臨大運匪革宗祧永固寰宇奄宅負扆肅清垂旒光赫洗洗我君四海無氛英才逺略鴻業大勳雷霆其武日月其文灑以甘露覆之慶雲制禮作樂還淳返朴宗祀明堂崇儒太學四夷慕化九戎稟朔沈璧大河泥金中嶽巍乎成功翕然嚮風乃復明辟深惟至公歸間於大庭之館受養於長樂之宫品彚胥恱謳歌載隆鼎祚既穆珽樞巳肅庶保大和長介景福如何靡怙而降斯酷后弄孫其未掩人喪妣其焉速嗣皇劈踊列辟扶服九親號咷萬姓荼毒嗚呼哀哉積憂勞而不豫兮搆氛沴而成災逢冰霜之慘烈兮見草木之凋摧感大漸之將至兮遺惠言而不回付聖子其得兮顧黎元曰念哉頒寵錫以留訣兮節禮數而送哀邈終天而一去兮復何時而下來嗚呼哀哉光隂荏苒兮氣緒回互泣盡冬霜兮悲生春露攢塗云啓兮同軌畢赴湘川不從兮洪塋蓋祔古則祀闕今也儀具嗚呼哀哉夜漏盡兮晨挽發轉相風兮搖畫月厭河洛兮不臨去嵩邙兮飄忽指咸陽之園寢歷長安之宫闕旋六馬兮頃期考三龜兮中歇嗚呼哀哉出國門兮夷由覽舊物兮親憂備物森兮如在艮時闋兮莫留當赫曦之盛夏宛蕭瑟之窮秋山隱隱兮崩裂水洄洄兮逆流嗚呼哀哉挂旌旐於松煙即宫闈於夜泉下幽翳兮無日上穹隆兮蓋天隧路嚴兮百靈拱殿園虛兮萬國旋如有望而不至怨西陵之茫然嗚呼哀哉攝帝皇之高風欽文母之餘懿時來存兮立極數往歸兮配地何通變之有恆兮而始終之無愧惟聖慈之可法播徽音於後嗣嗚呼哀哉唐代宗貞懿皇后哀册文常衮維大曆十年歲在辛卯十月辛酉朔六日景寅貴妃獨孤氏薨粵明日追諡曰貞懿皇后殯于殿之西階十三年十月癸酉乃命門下侍郎同平章事常衮持節册命其月二十五日丁酉遷座于莊陵禮也素紗列位黼帟周庭輅升王綴軒缺珠櫺皇帝悼鸞掖以追懷感麟趾而增慟備百禮以殷遣命六宫而哀送宗祝薦告司儀降收爰詔侍臣紀垂鴻休其詞曰祚祉悠久寵靈誕受元魏戚藩周隋帝后五侯迭興七貴居右肇啓皇運光膺文母纘女是因以綱大倫生知隂教育我蒸人瑞雲呈彩瑶星降神聰明睿智婉麗貞仁惟昔天鑒搜求才淑龍德在田葛覃于谷周薑胥宇漢后推轂王業惟艱嬪風巳穆繼文傳聖嗣徽克令不曜其光乃終有慶祗奉園寢肅恭靈命越在哀焭聿追孝敬文織絲組朱祿玄黃上供祭服以祀明堂法度有節不待珩璜篇訓之制自盈縑緗敘我邦族風于天下始於憂勤叶成王化慈厚諸女寵臨下嫁登進賢才勞謙日夜服繒示儉脫簪申誡訪問後言宴遊夙退內和羣娣動有矜誨外睦諸親泣辭封拜闕翟有日親𧖟俟時忽歸清漢言復方祇萬乘悼懷羣臣慕思玉衣追慶金鈿同儀嗚呼哀哉去昭陽兮窅然乘雲駕兮何在人代宛兮如舊炎涼倐兮巳改翠葆森以成列素旗儼而相待言從玉兆之貞永閟瑶華之彩别長秋之西苑過望春兮南登招帝子于北渚從母后於東陵下上清兮動金翠外無像兮中有慿合簫挽以攢咽結雲雨之凄凝吾君感於幽期俯曽亭而望思慘殯媛以延佇極容衛以盡時搖巾袂兮逺訣隔軒檻兮羣悲不復見兮回御輦傷如何兮軫睿慈下蘭臯兮背芷陽旌悠悠兮野蒼蒼帶白花兮掩淚衣玄扮兮斷腸當盛明兮共樂匆幽處兮獨傷去故庭兮日逺即新宫兮夜長禭無文繡之飾器無珠貝之藏蓋自我之立制刑有國之大方嗚呼哀哉見送往之空歸歎終焉之如此方士神兮是與非甘泉畫兮疑復似遺音在於玉瑱陳迹留於金戺獻萬壽兮無期存二南之餘美重校正唐文粹卷第三十二
