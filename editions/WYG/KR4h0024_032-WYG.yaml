body:
  text: 謚册二唐中宗孝和皇帝謚册文蘇頲唐徳宗神武皇帝謚册文權徳輿哀册六唐髙祖神堯皇帝哀册文虞世南唐太宗文武皇帝哀册文褚遂良唐中宗孝和皇帝哀册文徐彦伯唐睿宗𤣥真皇帝哀册文蘇頲唐𤣥宗明皇帝哀册文王縉唐憲宗章武皇帝哀册文令狐楚后妃五謚册二唐順宗莊憲皇后謚册文權徳輿唐懿宗元昭皇太后謚册文夏侯孜哀册三唐太宗文徳皇后哀册文虞世南唐髙宗則天皇后哀册文崔融唐代宗貞懿皇后哀册文常衮唐中宗孝和皇帝謚册文蘇頲維景雲元年嵗次庚戌十月戊寅朔十三日庚寅攝太尉銀青光禄大夫守户部尚書上柱國宣城郡開國公臣姚珽等上議曰臣聞聖人極天下之頥以象其物宜成天下之文以察其時變加於百姓之謂徳刑於四方之謂風徳也者動於神明風也者由於教化原始見則名合道先知終存義迹因形表其來尚矣伏惟大行應天神龍皇帝纘武之命允文之基肇承於宥宻以至乎緝熈若乃含青雲之符燿赤光之瑞履順而一夷險安貞而再潛躍由是恭于三朝服兹四罪傒予之始祀夏而無改舊物若帝之初遷周而有膺新命䖍匹夫蒸蒸之思愛於文母豫太帝庚庚之占友於王季既而三年諒闇九族敦叙免喪問道穆乎天子之容退朝藏宻怡若家人之禮功收其成不以微刑濟其寛不以大讜詞所不忤讒説所不入約躬而厚物盡下以推人翺翔乎儒雅之林經啟於文章之囿不傷麛卵不天卉木體仁也行於蠻貊暨於陪臺施惠也酌中衢之樽不竭也陳太廟之器不盈也故能百寶用四靈臻嘉禾神芝日獻于府柔逺格懷荒至名駒巨象嵗填于牧方採厚陵之露華感而通夢遂揚昊壇之烟燎嚴以配尊然後心遊絶冥神寄愷樂在雲臺之上希夷於真諦之門追汾水之陽縹緲乎列仙之館豈圖變生氛沴凶遘霄極欻憑玉以大漸顧遺弓而上仙所以函夏攀援人神哀戚龍攢既啟鳥耘逾慕禮撤三獻北有因山之名法崇二言南有至郊之議謹案謚法慈惠愛親博施備物皆曰孝安人緝衆推賢讓能皆曰和夫孝以安親和以安人是則憲先生之典謨垂後裔之光烈者蓋天之所稱矣請上尊謚曰孝和皇帝廟曰中宗謹上唐徳宗神武皇帝謚册文權徳輿維永貞元年嵗次乙酉月朔日孝孫嗣皇帝臣某伏惟大行皇帝徳合天地作人父母纂承光明建用皇極昔在寶應制天下賦輿戚藩以大自魯疏雍師律既貞㑹陜收洛克燀威命廓開王塗是登上嗣乃宅丕后服藝祖神宗之大烈有乾乾翼翼之至敬敷佑迪哲尊嚴懿恭燭明四極發育萬類濯沐乎仁澤澄清乎理本巍巍乎建中風聲與貞觀同符洎時有祲沴變生京轂省方展義𢎞隂隲之功整旅致誅申震燿之令氛祲滅息侯王䡄道丕冐持載鏡清砥平然後明禋毖祀萬靈以接翕受敷施九徳咸事含𢎞亭毒以致其和博採虚受以通其志政刑有箴宸扆有銘煥乎文明之化成也因時創節象卦設樂薰然中和之被物也納嘉言於近侍輟已行之詔疾讒口於宵人宥過失之罪去徽號而約已正廟祧以尊祖九譯通道萬方來庭寶旅焯乎勲籍夷歌陳於樂府霜露所墜車書大同順氣旁達天休滋至慶霄輪囷徳水清澈三辰秉陽以宣耀百嘉麗地而文感飛走呈祥肖翹遂性在峟天下二十有七年夫文思光被陶唐之盛也憯怛忠利虞帝之教也亹亹穆穆周文之業也聰明神武漢祖之烈也窮古先之大律極帝者之上儀方將扈升崇丘侍檢玉牒奄遺天命永棄萬方億兆嗷嗷哀號靡訴顧惟沖昧懼忝孫謀君父有命付兹神器䖍恭貽訓感慕滋深今因山既建同軌畢至一二元老宗工碩生考稱天之禮稽節惠之法式遵古義敢薦大名謹遣太尉某謹奉册上尊謚曰神武孝文皇帝廟曰徳宗伏惟聖靈昭格膺是典禮幽贊丕祉流於無窮嗚呼哀哉唐髙祖神堯皇帝哀册文虞世南維貞觀五年太嵗云云即以明年某月日遷座于獻陵禮也𤣥覽載籍逖聴皇王立徳可久應運斯昌天基崇峻帝系悠長虹暉降祉真氣呈祥䓤衡朱黻熊軾龍常契叶禎符誕生睿聖彤雲晝聚黄星夕映舒巻潛躍㡬深道性地載天臨日暉川鏡厯試藩岳風移俗正火徳云謝羣龍戰野蚩尤曜旗王良策馬拔山曀日滔天泯夏蕩拒黎元阽危宗社提劒創業仗鉞専征風驅雲動海運天行伐謀上畧制勝神兵尊王踐土復帝夷庚職惟上相任隆羣辟六階已平四門咸闢殊物顯命彞章典册錫重介珪禮優乗石烟霞改色鏞管變音觀國受命負扆君臨仁霑動植化感飛沈殷輅周冕禹迹堯心削觚反樸抵璧藏金商俗未改遺氛阻亂沙塞䖍劉伊瀍叛渙應變雷動乗機電斷十角雲消三川氷泮漸以文教致諸王道制禮和樂尊儒養老翠鳳棲梧丹魚在藻水浮𤣥貝階榮朱草威加海外澤被區中要荒合軌鞮羯遐通没羽沈浪飛輪駕風眷言䆁負有懷髙謝翛爾櫟陽杳同姑射趨詩禮以承天禀義方以成化聿膺景福方期永年玉几奄及金縢遂愆絶五日之晨省遽千齡而上仙攀帷扆以孺慕抱劒舄以纒綿嗚呼哀哉䖍奉顧託式遵遺志指珠玉而不藏即陶甄以成器貽儉徳以為譽垂風聲於後嗣嗚呼哀哉永去天邑言遵地肺背沃野之神臯越通川之清渭懷岐下之前迹眷新豐之舊里笳哀噎以留思旐翩翩而顧指悲風急而拱木吟平野晦而寒烟起嗚呼哀哉惟綴衣之如昨忽馳光之莫駐亟時逝而節改俄涉新而履故野蒼蒼以日衰嵗凛凛而行暮感物悲於氣序銜哀踐於霜露泣川水之逝波動商山之風樹蹐厚地而無感仰髙天而何訴嗚呼哀哉曰聖與人誰前誰後炎昊無金石之固勛華異松喬之夀孰厯世而長存唯令名之不朽矧𤣥功與至徳冠列辟而為首俾軼五而登三與天長而地久嗚呼哀哉唐太宗文武皇帝哀册文褚遂良維貞觀二十三年嵗次己酉五月甲辰朔二十六日己巳大行皇帝崩于翠微宫之含風殿旋殯于太極殿之西階粤八月庚寅將遷座于昭陵禮也鳳管凝和龍帷將曙溢化同軫綿區縞素哀子嗣皇帝某覽風樹而増感攀銅池而拊膺迫宗祧之是寄傷往駕之無憑奠樽盈而悲緒促靈景翳而愁雲興去劒滋逺清徽方閟爰詔司存傳芳瓊字其辭曰三微固祉五曜垂文光昭司牧對越唐勛族著𤣥牝家傳縉雲髙配于天一人有慶大行神武惟㡬作聖良書自得髙文成性夙表餘雄先懐反正蒼兕爰發朱旗首令寰瀛昬墊闗洛荒蕪妖傾地軸盜弄乾樞戎衣光啟霸政宏謨天兵電掃月陣風驅蚩尤遞翦猰窳咸誅閏位不䖍餘分興戾先收秦組次焚商袂轉圜上畧容光下濟從邑垂仁賓門灑惠修風順軌凝圖奉睿青戾同規𤣥珠協契發輝三五聲明遐裔泛野休兵靈臺偃革升巖藏銑遵河奉璧學肆徐輪丘園散帛就日攸宜如天在斯刑哀動植化美塤箎樂華曽舉禮葉旁垂沙塲罄翦斗極咸羇狼山入囿潮渚歸池東旌若木西斾條支龍鄉委質鳥服來儀大矣乗時悠哉利見文龜浮沼應龍在淀潏露飛甘卿雲呈絢松荑望辛瑤華方薦仙丹劒術星飛告變凝沴氣於升年掩璿暉於離殿嗚呼哀哉商管初秋飛弦罷佾驚川悠緬宫車晏出大隧弗營元龜獻吉展軨效駕端圭司日迫靈心於將餞痛皇情其如失凝秋林於廣路遡悲風於長術經柏梁而徐轉邁蘭池而從蹕聳輕斾之逶迤動邊笳之蕭瑟嗚呼哀哉周營甫竁漢啟泉闈榖林搖落喬巖變衰平原淒兮白日逺深渚澹兮秋雲飛覧銅雀而興慕傷鼎湖之不歸嗚呼哀哉崤陵𤣥壤嵎山窮路虚衞翻英輕馳委素堯門閉而日慘羲庭易而雲呀嗟厚徳之長違仰髙天而攀慕嗚呼哀哉崇基永煥置業方昭遺風餘烈天長地遙想神襟而騰茂縱史筆而揚翹籠嘉聲於日月終有裕於唐堯嗚呼哀哉唐中宗孝和皇帝哀册文徐彦伯維景龍四年嵗次庚戌六月辛巳朔二日壬午大行應天神龍皇帝崩于神龍殿旋殯于太極殿之西階粤景雲元年十一月二日乙酉將遷座于定陵禮也畫攢毁帟雕輼肅軔縞紼霜迴丹斾雪引御窆臺之眇黙背天閣之崇峻皇帝瞻在原之墜響感聮蕚之凋隂禮奠收兮泣遺跡同氣訣兮悲聖心爰命下臣式揚鴻懿咨睿烈於金牒刻明猷於玉字其詞曰少典之子重華之孫珠聮寶系海浸昌源鳳鳥鳴國龍蛟守門於鑠皇朕赫應成命青靄南浮彤雲北映掃刷中㝢光亨累聖欽若應天纘成前慶身佩星斗掌提曦鏡克明克類允武允文就之如日望之如雲聲中律吕辭合典墳道懋登庸榮膺繼體位擁青陸業移朱邸春誦夏絃冬詩秋禮復子明辟固天攸啟鵬舉提象鸞飛鑿乾蘿圖已御芝璽仍傳拱黙當宁賡歌撫弦堯親更睦媯徳逾羶萬寶阜成四門光闢宵衣若厲道風猶戹野接翹車殿横儒席留連縞讌婉孌詞客潤洽泉魚恩周卉毳鞮譯騖輪要荒走幣削觚反樸寛刑薄税俗富京坻人忘疵癘帝圖廣運天意難誣旖旎祥籙張皇瑞符仙芝抱砌神萐搖厨龜負綈檢鱗銜斗樞孝思罔極宗庸克賽親幸國陽式陳昭配翠輦容與蜺幬晻曖蒼璧森羅明祗肅對𤣥精備典洪範盈疇將竦華篕遙封岱丘厭紫宙之阨僻追白雲之豫遊時若慕於喪妣道空在於委裘嗚呼哀哉惟㡬在辰枚卜違吉仍几虚座綴衣空室景沴攝提悲纒昱日羣臣奉於末命天下悲乎晏出嗚呼哀哉宗伯􅊩典同軌赴辰龜謀入兆犀鞟移輴唱苦挽於香掖咽酸笳於􅍼旻彤階皛皛兮露驚月玉座微微兮花掩塵嗚呼哀哉列綺城之哀仗引滋橋之度􅎻朔飈急兮御道寒愁日晦兮雲郊晚駐石馬之新塗下金天之舊坂見疎杏之原長覺深松之路逺嗚呼哀哉伊昔睿喆先謀壽宫猗那我后復幸方中委冠劒於泉穸保明靈於昊穹山有移兮海有變道無缺兮聲無窮嗚呼哀哉唐睿宗𤣥真皇帝哀册文蘇頲維開元四年嵗次丙辰六月乙巳朔二十日甲子大行睿宗大聖𤣥真皇帝崩於百福殿徙殯于太極殿之西階粤十月朔某日將遷座于橋陵禮也素帟褰周青壼警節儼無聲以虚衛陳有象而成列哀子開元神武皇帝某追攀引䌇𦕈擗司常悽庶物其涕迸感衆靈而影彰睠兹鴻業欽若要道爰制近臣敢揚大寶其詞曰髙祖興唐垂其耿光睿宗誕慶紹我明命明命伊何重熈累盛耿光伊何翊善傳聖在昔分瑞爰初剖符宅殷令典居相宏圖宣哲觀藝祗庸服儒踐其成式納以嘉謨否厯終泰傾維更紐予從代王子事周母退象藏宻沖襟釋負不為震驚自得謙受權乃復亨塞而自開固推皇弟仍陟元台鳴牝搆孽紛虹肆災飈馳神武電掃姦回三讓天下載登宸極順夫甿心忘我帝力鞮譯修貢親賢任職樂英已敷禮緯重繹宗廟率祀郊丘肇禋養而迎夏芟以祈春靜黙㳂道和平返淳知周翔泳功濟陶鈞知子惟明從吾所尚陋伊祈之莫緒追齧缺而將喪帝允執乎厥中皇遂崇於太上始授圖而觀察終脱屣以清曠齋必閒館朝而别宫問安順色資孝𢎞風理極兼受言承至公豈綴衣而憑几忽成鼎而號弓嗚呼哀哉夢年罕驗顧是付囑屬神器其得所委靈心其何欲増摧絶以孺慕竟厭時以去俗萬邦赴而同軌六遂陳而帥屬外羣悲於縞素中不瘞於珠玉蜃輅迎轉龍㡛戒徂寒生紫殿曉發清都笳挽遟遟而徙靡斾旌戀戀以威紆除櫟陽之御路指橋嶽之幽途禮既獻而三撤神方寧而九虞逺遊通冠近嚴歸蹕因髙而渭川盡見馮下而秦京稍出積耘草以横霜攢悲松以翳日嗚呼哀哉粤羲軒之建子姒兮令問傳其不已猗簡册之尊聖真兮鴻名冠而方始然後景雲藹華露滋揚至徳殷永思此天子之孝也臣何足以知之嗚呼哀哉唐𤣥宗明皇帝哀册文王縉維寶應元年嵗次壬寅建巳月五日𤣥宗至道大聖大明孝皇帝崩于神龍殿旋殯于太極殿之西階粤以寶應二年三月甲辰朔十一日將遷座于泰陵禮也象物已設仙馭將飛空聞脱屣無復求衣孝孫皇帝親臨遣奠意延晷刻向池綍而涕流想山園而心惻九天兮無所一往兮何極感貽美於孫謀俾述事於祖徳其詞曰天厭隋亂中原無主人歸唐徳上帝是輔以聖易暴興文繼武義冠殷湯威包漢祖仰膺厯數光宅區宇惟皇得一承乾嗣五赫哉厥初萬物斯覩景龍之際乾儀反坤不利王室將開禍門吕危劉氏趙啄皇孫我獨仗劒神期武賁上排閶闔俯掃軒轅不驚宗廟大造黎元為而不有禮備尊尊乃奉睿宗爰受寶命問安侍膳純孝至敬維城之年佐潞之政一蓍獻兆百靈翼聖躍馬截流水不敢競潛龍變海池亦呈慶有開必先興王之盛誥曰皇帝余倦于勤往纘丕業以順兆人辭之不可其命惟新體乾之大法土之均臨之以日生之以春寒暑彰信動植知仁九族既睦四門既賓天通之聖電斷之神求賢簨簴就列搢紳讜言是聼庶政必親刑措兵戢威加徳馴戎狄讋竄塞不驚塵琛賮爭入來自無垠駕鼓斥駿焚裘棄珍風雨時若京坻相因師於上古思與還淳然後制禮節焉作樂和焉北祠后土南郊上𤣥齋祭陵廟位號山川教戰講武祈農籍田冕旒問俗旌旗幸邊文物蔽地英聲動天鳳巢麟擾甘露醴泉九尾三脊朱草霏烟繽紛効祉每嵗且千道徳洋溢乾珅交泰成功如何登封于岱太平如何是時無外才藝餘美帝王之最學究天人乙夜慙對文齊日月秋風靡逮推厯正元調律平害札動雲落弦開葉碎揮琴陋虞教謌輕沛良辰可賞聴政方退鐘皷屢陳君臣髙㑹巍巍蕩蕩四十餘載巡省順動西南奥區命子出震繼明握圖長驅猛士累翦封狐不失舊物言旋上都離宫就養壽酒多娛習道久矣神仙逺乎嗚呼哀哉湖上鑄鼎海中祈藥忽乗紫氣長遊碧落千門萬户若無天兮寥廓八達九衢雖有人兮寂寞淚為雨於宸極哭成雷於郊郭遺轍跡而徒攀葬衣冠而可託同軌畢至初陵已開震鳳輦於仙仗降龍輴於帝臺儗將行兮肅穆似有覩兮徘徊遇春城兮如送望暮山兮謂來嗚呼哀哉壽原肇吉先天不違接橋山之大隧營金阜之𤣥扉擁馳道兮皆往獨宫車兮不歸厚夜兮藏晝終天兮戢輝文始逺極武餘英威立徳不朽至道惟微雖隂陽之與變化侔聖徳兮安可希超前古以作則遺後代以垂衣嗚呼哀哉唐憲宗章武皇帝哀册文令狐楚維元和十五年嵗次庚子正月甲戌朔二十七日庚子移殯於大内太極殿之西階粤五月十五日庚申遷座于景陵禮也玉衡南指金波西落皓雪集其麻衣素雲褰其綃幕栁宫龍動竹池魚躍兆庶雨泣於浩穰萬靈風號於寥廓哀子嗣皇帝仰攀雕輦殷奠瓊筵哀無容以觸地痛不返而終天仙仗徐進宸儀永隔降睿㫖於鸞臺揚聖功於鳳册其詞曰配天惟唐伊祁同光應道為帝𤣥元之系聖人有作孝子善繼顯赫十朝緫齊四裔執其大象司彼左契武烈誕敷文明下濟出潛離隠或躍未融親則盤石封殊翦桐承祧黄屋主鬯青宫禮樂盡在謳謌荐至軒皇倦勤傳付神器太母侍養親臨寶位怡聲下色先意承志家令敢言天子屏貴明明出震業業承乾其仁如山其智如泉理析堅白學探幽𤣥揮毫霧動掞藻霞鮮所持者儉所寶者賢刑靡不省賞無不延冕旒迎日珪璧祈年涕謁宗廟臣朝昊天天縱神聖日躋孝敬鴻名再加寶厯一定窮人屢賑名士交聘獸愛觸邪草憐指佞梯航修貢鱗羽遂性河色呈符山聲告慶編書辨謗創殿思政甘節必稱苦言終聴稜威之逺徳政之盛霜雪憲章雷風號令夏臺齒劒上黨納穽趙際宅心鄴中聴命誰能去兵王者有征玉壘霧廓金陵鏡清狐鳴上蔡蟻聚東平伏鑕就戮迴戈受烹始以上殺歸於好生恢恢不失蕩蕩難名信及隠微道存溥愽走馬斯郤昆蟲咸若調其玉燭徇以木鐸混同車書逺頒正朔範金合土大興太學清蹕鳴鑾將登髙嶽四維既張五刃已藏蠻夷戎羌敢不來王天下清淨朝廷樂康㑹冠劒以髙晏戲魚龍於廣場有嚴有翼無怠無荒俗皆臻於壽域人自為於犧皇日出入兮安窮極雲飛揚兮無處所瑞方瞻乎鳳來災忽聞於鸛語謂百年之可卜嗟九齡之不與當凝旒而下臨奄脱屣以輕舉萬姓哀其考喪千官懷其后撫封人猶祝於南山帝子巳號於北渚嗚呼哀哉披靈衣兮如在委仙珮兮若休建環海以靜寐謝鼎湖而逺遊桂華朗兮髙殿寂梧葉暗兮深宫愁驚同䡄之遽至咽長川而不流嗚呼哀哉威儀肅設文物前列酌玉斚以宵奠駕金根而曉發出朱雀之正門背青鸞之逈闕逶迤原野蒼茫日月去復去兮降堯階悲莫悲兮臨禹穴嗚呼哀哉地開蒼谷天作豐山江海自流於泉下城郭取象於人間髙封馬鬛永秘龍顔鱗有逆兮曽觸髯欲升兮尚攀朝百靈以肅肅遺八駿以閑閑陵植柏兮未拱閣生苔兮已班嚴日宫而深閉藹雲幄以空還與衆感於萬井結宸悲於九闗嗚呼哀哉神行無方乾徤不息物皆被於聖澤人自迷於帝力巍乎髙代之行至矣動天之徳後𤣥壤以長存冠蒼穹而罔極嗚呼哀哉唐順宗莊憲皇后謚册文權徳輿維元和十一年嵗次甲申某月朔日哀子嗣皇帝臣某伏惟大行皇太后柔明承天廣大法地齊二儀以發育含萬物而化光靜専宅心謙儉約已塗山積厚淮水秉靈四徳交修六宫承式於徳宗有逮事之孝敬於先皇有輔佐之憂勤啟迪風徽儀形天下伏以永貞誥命脱躧寰區乃居太上之尊乃正中宫之位顧兹沖𦕈上荷劬勞自幼逮長禀邑姜之教勗繼體纂圖申長信之供養率用慈訓施于理道母儀所被子惠所覃一紀于兹萬方䝉福以載物之量包逮下之仁嗣任姒之徽音慕黄老之清淨宜錫丕祉壽如岡陵昊蒼不愸艱棘俄及追惟顧復創鉅感深銜恤茹荼叩心罔極今祔隅先逺龜筮告吉順厚夷體幽嚴就路宰政卿尹與典禮之官詢考古式詳稽謚法以周道章明未之或改敬形擬議敢易大名謹遣攝大尉中書侍郎平章事臣裴度奉册上尊謚曰莊憲皇后伏惟皇靈降格淑聖幽贊昭配清廟對越鴻休與大隂方祗永永無極嗚呼哀哉唐懿宗元昭皇太后謚册文夏侯孜維大中十三年嵗次己卯九月癸丑朔二十七日己卯嗣皇帝臣伏惟先太后體貞明以合天本懿粹而象地發秀于外含章在中由潁川以表祥配沙麓而比徳塗山佐夏莘野興商潛耀空藴於方祗秘景莫觀於圓魄卓爾絜操穆然凝輝欲報之徳昊天罔極臣猥以沖昧獲奉宗祧怵惕哀焭慮墜大寶而天意允若人心克諧惟懷永圖懼乖末命退省䝉固上感劬勞繫鏡無塵賜衣有篋宸儀雖閟慈㫖長存莫追蘭殿之晨昏空感椒塗之霜露言成隂教行著國章逮事靡及於循陔終吉徒哀於陟屺敢舉追崇之典寧申顧復之思伏惟舉位以定名考謚以尊徳所以揚茂烈傳休聲率由舊章竊擬素範今禮官詳議庶僚稱贊備陳徽數克播令猷正位號於瑤齋森禮容於金戺母儀無斁廟貌有嚴將享鴻休實憑𤣥祐謹遣攝太尉門下侍郎兼兵部尚書平章事蕭鄴奉册上尊謚曰元昭皇太后伏惟明靈昭格俯鑒精誠時已逝而敬在六衣夜不陽而禮存三獻惟是薦享與唐無疆嗚呼哀哉謹言唐太宗文徳皇后哀册文虞世南維貞觀十年嵗次甲申六月己未朔二十一日己卯大行皇后崩於立政殿粤九月十日丁酉將遷座于昭陵禮也殯宫夕啟靈轜曉前儼帷帟於空殿肅陛衞於靈筵皇帝親臨宵載義深追逺曕青蒲而永絶悼玉階之莫返蜃輅將引犧樽已撤爰詔記言式揚徽烈其詞曰二儀合徳兩躍齊光列聖觀象邦家克昌猗歟華族英靈降祉比齊越姜匹宋踰子育徳髙門騰芬素里體仁將聖披圖閲史造舟為梁嗣徽前徳履和思順自家形國淑問不已柔風允塞紃組報勤璁珩垂則時逢昌聖運屬休徴代邸膺厯唐侯嗣興紫宫並曜黄道階升化宣風始業贊丕承比徳無競凝神不測應物通理撫機先識體備賢能暉無眺側績包九亂恩加八極性道希夷言容莊敬戒奢處約懷沖履正景曖風暄霜嚴氷淨領畧三古箴規六行源濬流逺時昌祚延國貞誕㪫皇支挺賢談髙辯日學冠通𤣥慈訓所及懿徳光前五福云備千齡方永地紀絶維月輪韜景辰興不豫徳音彌整馬鬛無封鶴珠斯屏嗚呼哀哉異人神於倐忽變容服於平生改清蹕以哀挽易朱旗以素旌昔照朝景響環佩於曽城今㝠永夜吟松栢於山楹嗚呼哀哉氣變灰飛暑退寒襲烟觸樹而凝慘露分枝而垂泣聞哀鴈之夕飛聴悲風之曉急仰雲霄而永慕慟陵寢其何及嗚呼哀哉背𤣥武而北轅絶牽牛而横度途去去而逾逺馬駸駸而不駐想渭水之貫都歎黄山之隠霧嗚呼哀哉嗟人生之浮促若飄風之過牖牖何風而蹔停人何生而能久唯承天與載物邈慈深而徳厚邁任姒之髙蹤播英聲而無朽嗚呼哀哉唐髙宗則天皇后哀册文崔融維神龍元年嵗次乙巳十一月朔二日云云大行則天大聖皇后崩于洛陽宫之仙居殿旋殯于乾陵禮也祖庭火燼攢宫月曉雲帶黼翣風牽絳旐儼天衞之蒼蒼邈神儀之窅窅哀子嗣皇帝慕切充窮誠殷遣奠瞻象服其如在攀龍車而不見閟慈範於長陵戢神輝於前殿示人䡄訓先王典則爰命史臣颺言聖徳其詞曰天生后稷飛鳥覆翼天䕶武王躍魚隕航施于成康武子有光豐沛之疆河汾之陽異氣發祥聖母其昌穆穆皇皇作令于唐至哉坤徳沈潛剛克竒相月偃惠心泉塞蘋藻惟勤紘綖是則訓自閨閫風行邦國七廟肅祗六宫允釐中外和睦遐邇清夷家道以正王化之基皇曰納輔后其謀咨謀咨攸俟皇用嘉止亦既顧命聿懷代已聖后謙沖辭不獲已從宜稱制於斯為美仗義當責亡軀濟厄神器權臨大運匪革宗祧永固寰宇奄宅負衣肅清垂旒光赫洗洗我君四海無氛英才逺畧鴻業大勲雷霆其武日月其文灑以甘露覆之慶雲制禮作樂還淳返樸宗祀明堂崇儒太學四夷慕化九戎禀朔沈璧大河泥金中嶽巍乎成功翕然嚮夙乃復明辟深惟至公歸閑於大庭之節受養於長樂之宫品彚胥悦謳謌載隆鼎祚既穆珽樞已肅庶保太和長介景福如何靡怙而降斯酷后弄孫其未掩人喪妣其馬速嗣皇擗踊列辟扶服九親號咷萬姓荼毒嗚呼哀哉積憂勞而不豫兮搆氛沴而成災逢氷霜之慘烈兮見草木之凋摧感大漸之將至兮遺惠言而不回付聖子其得兮顧黎元曰念哉頒寵錫以留訣兮節禮數而送哀邈終天而一去兮復何時而下來嗚呼哀哉光隂荏苒兮氣緒回互泣盡冬霜兮悲生春露攢塗云啟兮同軌畢赴湘川不從兮洪塋蓋祔古則祀闕今也儀具嗚呼哀哉夜漏盡兮晨輓發轉相風兮搖畫月厭河洛兮不臨去嵩邙兮飄忽指咸陽之園寢厯長安之宫闕旋六馬兮須期考三龜兮中歇嗚呼哀哉出國門兮夷由覽舊物兮親憂備物森兮如在艮時闋兮莫留當赫曦之盛夏宛蕭瑟之窮秋山隠隠兮崩裂水洄洄兮逆流嗚呼哀哉挂旌旐於松烟即宫闈於夜泉下幽翳兮無日上穹隆兮蓋天隧路嚴兮百靈拱殿園虚兮萬國旋如有望而不至怨西陵之茫然嗚呼哀哉攝帝皇之髙風欽文母之餘懿時來存兮立極數往歸兮配地何通變之有恒兮而始終之無愧惟聖慈之可法播徽音於後嗣嗚呼哀哉唐代宗貞懿皇后哀册文常衮維大厯十年嵗在辛卯十月辛酉朔六日丙寅貴妃獨孤氏薨粤明日追謚曰貞懿皇后殯于殿之西階十三年十月癸酉乃命門下侍郎同平章事常衮持節册命其月二十五日丁酉遷座于莊陵禮也素紗列位黼帟周庭輅升玉綴軒􅆙珠欞皇帝悼鸞掖以追懷感麟趾而増慟備百物以殷遣命六宫而哀送宗祝薦告司儀降收爰詔侍臣紀垂鴻休其詞曰祚祉條久寵靈誕受元魏戚藩周隋帝后五侯迭興七貴居右肇啟皇運光膺文母績女是因以綱大倫生知隂教育我蒸人瑞雲呈彩瑤星降神聰明睿智婉麗貞仁惟昔天鑒搜求才淑龍徳在田葛覃于谷周姜胥宇漢后推轂王業惟艱嬪風已穆繼文傳聖嗣徽克令不曜其光乃終有慶祗奉園寢肅恭靈命越在哀焭聿追孝敬文織絲組朱緑𤣥黄上供祭服以祀明堂法度有節不待珩璜篇訓之制自盈縑緗叙我邦族風于天下始於憂勤叶成王化慈厚諸女寵臨下嫁登賢進才勞謙日夜服繒示儉脱簪申誡訪問後言讌遊夙退内和羣娣動有矜誨外睦諸親泣辭封拜闕翟有日親蠶俟時忽歸清漢言復方祗萬乗悼懷羣臣慕思玉衣追慶金鈿同儀嗚呼哀哉去昭陽兮窅然乗雲駕兮何在人代宛兮如舊炎涼倐兮已改翠葆森以成列素旗儼而相待言從玉兆之貞永閟瑤華之彩别長秋之西苑過望春兮南登招帝子于北渚從母后於東陵下上清兮動金翠外無像兮中有憑合簫挽以攢咽結雲雨之淒凝吾君感於幽期俯曽亭而望思慘殯媛以延佇極容衞以盡時搖巾袂兮逺訣隔軒檻兮羣悲不復見兮迴御輦傷如何兮軫睿慈下蘭臯兮背芷陽旌悠悠兮野蒼蒼帶白花兮掩淚衣𤣥㤋兮斷膓當盛明兮共樂忽幽處以獨傷去故庭兮日逺即新宫矣夜長襚無文繡之飾器無珠貝之藏蓋自我之立制刑有國之大方嗚呼哀哉見送往之空歸歎終焉之如此方士神兮是與非甘泉畫兮疑復似遺音在於玉瑱陳迹留於金所獻萬壽兮無期存二南之餘美唐文粹巻三十二欽定四庫全書唐文粹巻三十三上宋姚鉉編文丙總九首弔古三許由先生廟酹文桞識弔夷齊文書師曠廟文袁皓雷霆一上天鼓文程浩軍政一祭纛文獨孤及畏途一招北客文袪癘一送窮文段成式責檄二責龜文王岳靈檄曲江水伯文樊鑄許先生潁陽祠庭獻酹文栁識壬辰嵗夏四月客有自洛東遊至先生遺廟而潁水古風舊山巋然追懐古蹤慕美至道以時酒敬酹于靈既酌既拜獻乎言曰天清既能久地静不能朽先生清浄天地全性出於胚渾入於鴻䝉雲遊鳥還蓊鬱和風當時帝道已半滋章欲深大樸散於人未散於山林乃有巢父杳㝠同心堯齎公器退然見推遇聖相感不得不知耳雖濯於清流道終播於無為所謂春膏時蒸朽葉自滋先生含徳唐堯發之潁陽之仁徳日大天下之禄利日卑且聖王所重者名器至人所重者感通推以大名義同讓終亷能感俗道自為功任應㑹之偶然生垂後之清風人登雲嶺多憶箕潁猗歟先生山水齊名兹焉遺廟萬古芬馨弔夷齊文洪河之東兮首陽穹崇側聞孤竹二子昔也餒在其中偕隠胡為得仁而死青苔古木蒼雲秋水魂兮來何依兮去何止掇澗溪之毛薦精誠而已初先生鴻逸中州鸞伏西山顧薇蕨之離離歌唐虞之不還謂易暴兮文武謂墨縗兮胡顔一吒兮忘飢若有誚兮于巖之關豈不以冠弊在於上履新處於下且曰一人之正位孰知三聖之純嘏讓周之意不其然乎是以知先生所恤者偏矣當昔夷羊在牧殷綱解結乾道息坤維絶鯨吞噬兮鬼孽王奮厥武天意若曰覆昏暴資濬哲於是三老歸而八百㑹一戎衣而九有截况乎旗錫黄鳥珪命赤烏俾荷鉅橋之施俾申羑里之辜故能山立雨集電掃風驅及下車也五刃不礪於武庫九􅎸伏轅於文途雖二士不食而兆人其蘇既而溥天周土率土周人于嗟先生逃將奚臻萬姓歸仰兮獨鬱乎方寸六合蕩兮終跼乎一身雖忤時而過周終臣心而惻殷所以不食其食求仁得仁然非一端事各其志若旁通以阜厥躬應物以濟其利則焉有貞節之規各親之事靈乎靈乎雖非與道而保生乃勗為臣之不二書師曠廟文袁皓吟篁怨桐天其聲乎鏘石鏗金天其文乎擊革鳴絲天其暢乎匏土之韻天其和乎天有至音寄斯八物先生不生斯音鬱鬱先生既生斯音在律嗚呼先生之耳時可求也先生之心不可得也天全樂乎先生之無神乎愚固狂而不可攄先生之有神乎愚堅誠而乞其圖先生之耳有神乎化為天下之耳先生之心有神乎化為天下之心者可以舒於今然後家家知舜琴上天鼓文程浩雷車闐闐六合喧吼驟風雨於南極族星雲於北斗遑俄選蹙東海以波蕩擺太山而𤓰剖玉石至堅切如泥濘松栢至勁粉為枯朽鼉皮擊考而魑魅晱暘龍領觝觸而鯨鯢奔走陶鑄造化之鑪而鴻毛萬像幹運乾坤之柄而嬰孩羣有由是言則九鼎𤨏細三山培塿鼒鼐可以指揮蓬萊可以背負殊不測離蒼天之近逺當懼驚魂在𤣥雲之幾重徒勞矯首及夫白日雨歇長虹霽後列缺緩轡𤣥㝠假手蓄殘怒之未洩聞餘音之良久而小子之謬學敢獻疑於座右今若為善惡之宰主操賞罰之休咎胡不扶持顔閔之羶行夭閼跖蹻之首壽罪一亂臣懲天下之凶醜旌一孝行激天下之悌友法髙懸於堯典刑丕試於周后何必霹靂潛􅀢之龍養育吠堯之狗祭纛文獨孤及天地不仁神明無親惟正是與若響之荅敢有象恭滔天搆釁稱亂國有明罰神其捨諸賊臣劉展假寵多難敢包狼心竊發蠆毒將敷虐于我上下神祇使東溟揚波羣動昏墊皇帝震怒按劔授鉞命我上將底天之伐於是有虎牙鷹揚之臣蛇矛犀渠之羣横行而東我伐用張月羽雲旗以先啟行方將歴潯陽下南陵収京口掃建業斮梟獍以釁鼓封鯨鯢于京觀俾萬里浪破三象霧廓今以令月吉日整駕即路是用徼福于爾有神惟神降衷尚弼予志敢告無靡旗無絓驂無汰輈無僨車命五將䕶野萬靈並轂令天地氛祲望風掃除魑魅魍魎罔不率俾莫我敢遏為神祗羞尚饗招北客文蜀之先曰蠶叢兮縱其目以稱王當周室凌頺兮亂無紀綱洎乎杜宇從天而降鼈靈沂江而上相禪而帝據有南國之九世蜀本南夷人也皆左其袵而椎其髻及通乎秦也始於惠王之代五牛琢而秦女至一蛇死而力士斃二江雙注羣山四蔽其地卑溼其風脞脆蠻貊雜處滇僰為隣地偏而兩儀不正寒薄而四氣不均花葉冄榮秋冬如春暮夜多雨朝旦多雲陽景罕開隂氣恒昏以暑以溼為瘵為厲氣浥蟄以中人吾知重膇之疾兮將嬰爾身蜀之不可往北客歸去來兮其東則有大江澐澐下絶地垠百谷相吞出於荆門突怒吼劃附于太白渤潏硼砰㑹于滄溟跳噴浩淼上濺飛鳥蹙縮盤渦下旋黿鼉三峽兩壁亂峯如㦸􅀈岈屹崪澒洞劃坼髙于天霓雲外水積晝日無光其下黒窄瞿塘無底淺處萬尺啼猿哀哀膓斷過客復有千嵗老蛟能變其身好飲人血化為婦人衒服靚粧遊于水濱五月之間白帝之下洪濤塞峽不見灔澦翻天蹙地霆吼雷怒亦有行舟突然而去人未及顧棹未及舉瞥見陽臺不辨雲雨千里一歇日未移午須臾黑風暴起㧞樹震山石走砂飛波騰浪翻舟子失據摧檣折竿漩入九泉没而不還支體糜散蕩入石間水族呀呀拔刺爭餐蜀之東不可往北客歸去來兮其西則有髙山萬重峻極屬天西有崑崙其峯相連日月迴環閡于山顛巒崖盤嶔天壁夐絶陽和不入隂氣固閉千年増氷萬古積雪谿寒地坼谷凍石裂夏月草枯春天木折蒼烟凝兮黒霧結人墮指兮馬傷骨江水噴激迴盤紆縈棧壁縁雲鈎連相撑繩梁嶫虚傍沓杳冥下不見底空聞波聲過者矍然亡魂喪精復引一索其名為笮人懸半空度彼絶壑或如鳥兮或如玃倐往還來幸不落或有豪猪千羣努鬛射人寒熊孔碩登樹自擲見人則擘巨糜如牛脩角如劔餓虎爭肉吼怒闞闞復有髙崖墜石兮聲若雷之軿轟上敲下磕似火迸兮滿山流星磵溪忽兮倒流林岸為之頽傾碎騰狖與過鳥駭木魅兮山精飛石壓人兮不可行西有犬戎與此山通形貌類人言語不同氊廬隆穹毳裘䝉茸啜酪啖肉持槍挾弓依草及泉務戰與攻其聲如犬其聚如蜂中國之人兮或流落於其中豈只掘䑕茹雪以取活終當鈹其足而纍其胸泣漢月於西海思故鄉於北風蜀之西不可往北客歸去來兮其南則有卭笮之關天設險艱少有平地連延長山横亘廬江隔閡百蠻吁彼漢原上當漏天靡日不雨四時霶然其人如魚爰處其泉終年霖霪時復日出㹞㹞諸犬向天吠日人皆濕寢偏死腰疾復有陽山之路毒瘴下凝白日無光其氣瞢瞢暑雨下濕黄茅上蒸南方之人兮不敢過豈止走獸踣兮飛鳥隨吾不知造化兮何知此方些蜀之南不可以往北客歸去來兮其北則有劔山巉巉天鑿之門二壁谽谺髙岸嶙峋上柱南斗傍鎮于坤下有長道北達于秦秦地神州中有聖人左右伊臯能致我君雙闕峩峩上覆慶雲千官鏘鏘朝于紫宸玉樓鳳凰金殿麒麟布徳垂澤搜賢修文皇化欣欣煦然而春蜀之北不可以往北客歸去來兮送窮文叚成式予大中八年作留窮辭詞人謂予辭反之勝也至十三年客漢上復作送窮祝是年正之晦童稚戲為送窮舡判筒而槽比籜而閭細枲纒幅楮飾木偶家督被酒請禳窮將酹地歌舞窮予謂曰予送非嚵􅀈歴蹙循隂索隙膋葷餅直脰涎瀝者非寒哭蔟憐敗衣網身惡覻牆間冷嘯淒辛者非嚇覡嗾巫欺癡嬈衰燼數楮泉擾狎狐狸者噫有才歉升窄朘膓噦喀㡬童其筆燥心汗滳以是而殁者去些有開巻數幅空心妨目襲經攻史方寸日蹙以是而殁者去些有議古酌今左凌右浸麓垤酒涔短淺不禁以是而殁者去些責龜文王岳靈萬物之貴者人也人惟秀介蟲之智者龜也龜惟神隠括無形神之謂也窮通有極秀之謂也况天之與人其道甚逺不有以也將何逺焉則吉凶之祥假子以告變化之象因子以明欲爰謀稽疑必先蔽昆命冝蠲割誘慕展布心腹子無欺於人人有望於子成天下之亹亹豈不率道與何諸吕弄權昭大横於漢帝帝辛毒痛匪告繇於周武揆惡之輕重也吕之惡不浮于辛量徳之休明也昌之徳靡及於發子二其行誰不解體矣夫義禮之輿也信身之幹也何陳氏之母不疾而稱疾魯孫之臣卜僭而告義喪於禮失其徒實繁吾不殫悉考夫演卦繇者蓍也蓍之靈而不如子之長定妍媸者鏡也鏡之明不如子之知銘乎竹帛萬代不泯奚起矛楯俾吾反惑於古人孰謂子原天地之美達五行之理徒使疏瀹澡雪仰止䝉求曽莫之校何異乎曹丘生遇拒季布善盻已虞國僑哉必以剥桂刻漆非材木所願㧞鶡裂冠非禽鳥所欲當潛伏奫灣違禍罾罟九江錫命其可得乎豈不免氓之蚩蚩熒惑於耳目也檄曲江水伯文樊鑄主張於地之血脉者豈不曰水伯乎爾自獸為身靣為人控牽兩龍窟宅百谷億有祀矣故斁倫於元氣之液弄權於坤輿之竅所云老而不死是謂之賊伊我謂爾有是夫何者三載二月春服既成冠者五六人才子六七人皆簸揚文精開闔武庫游嬉春晝㳂洄江干興飛壯心舞曳齒曺皆貸白龜之徳不負赤鯉之本爾何為隂發暴殄潛生毒痛簣禍堦於沙岸垣死府於花島如數子者皆載垂堂之誡爾始若懸流三十仭跳沫四十里固應尊而不親亹豈相及爾岸不崪屼流不唐突設人所倚之福陷爾孔易之誘俾水衒貫堅之功舫聲之如蜩螗捫空呼天迄死不救倐恣化魚之惡誰下拜牛之惠溺我國寶豈明時弃珠之泉沈彼綵舩實去夜藏舟之壑與夫覩右山四耳之獸夢潁川一角之人置于大江未匹斯甚使揭竿求父之子投牋請弟之兄奏空篌傷妻之夫厲波濤徇壻之婦罹其凶害不忍荼毒並告無辜于上下神祗行哭失聲於爾安乎爾今肆行賊虐者豈不謂性與習成乎何哉曩者溺孫興公於後湖之中淪炎帝女於東海之上化鼈於黄氏之母為魚於歴陽之郡爾應恃以舊㨗蔓其後圖殊不知事不欲數數斯辱矣惡貫已滿天命誅之然今歴視爾自昔為過之所或天涯或地㞯起於侯甸之外且非輦轂之下豈比今日俯九門臨四達使哀聲悲響上及聰聽爾誰欺欺天乎然曲江者南峙仙閣北距靈宫足可效赤水産黄帝之珠胡為殱蒼生竊司命之契況之人也皆編中華俗游無何鄉所冀猛火烈山而莫焚大浸稽天而不溺既遇舍爾省括之中縱使飯術解漂之餌山經不沈之木豈可免爾之圖乎兹中江自首創至于今時數千里子更代易主㠀流波秏纔可接腋於井蛙詎持頥於海鼈爾之所處豈不狹隘乎人之所賞豈有舳艫乎逮天寶載我皇恢土徳以慱之竇澤流以濬之積閏下之波瀾用濟川之舟檝豈不為幸於爾也爾何滿以致益凶以自斃使彼都人士自此之後懼爾同失神之海惡爾甚探手之湯匪徒歇爾盛事過自掇也雖悔可追然靈莫尊於君人時莫美於陽春君固愛人種德乗春宥罪省囹圄去桎梏爾奚得恃宅無聞括守有曲襲不辜於止獄之候繫餘殃於積慶之家僕謂數子呌天曹訴地府黜爾主職在于斯須不然僕見欲上書於承明廬徴菑近速周處擊劔長逐擘波深搜爾居遁逃則焦僥東請長臂者灑漉之又於雄棠北使長股者慿踐之不然邀離朱以視之命宋定以縛之然後調馬梅扇獸炭是烹是醢以報東門爾儻若混空隠形和水匿象則使牛曳蛇尾絶其本根縱逢山見彘毛終難必復矣僕亦宜念五六日至于旬時恐爾有詞曰予不誡視成不令而行故矢在弦上垂而未發儻能易轍僕則既往不咎若為刻舟爾則何辭以對徐察爾變惟審圖之唐文粹巻三十三上欽定四庫全書唐文粹巻三十三下宋姚鉉編文丁總一十五首傷悼題哀辭後附弔古戰塲文李華弔國殤文張説弔九江驛碑材文歐陽詹悲剡溪古藤文舒元輿弔韓弇没胡中文李觀哀二良文白居易奠相國令狐公文李商隠祭韓侍郎文李翺祭獨孤常州文崔祐甫祀吕衡州化光文栁宗元為常州獨孤使君祭李員外文梁肅祭栁子厚文韓愈祭栁栁州文皇甫偍祭亡友故揚州功曹蕭公文李華歐陽生哀辭韓愈弔古戰塲文李華浩浩乎平沙無垠夐不見人河水縈帶羣山糾紛黯兮慘悴風悲日曛蓬斷草枯凛若霜晨鳥飛不下獸挺亡羣亭長告余曰此古戰塲也常覆三軍往往鬼哭天隂則聞傷心哉秦歟漢歟將近代歟吾聞夫齊魏徭戍荆韓召募萬里奔走連年暴露沙草晨牧河氷夜渡地闊天長不知歸路寄身鋒刃腷臆誰訴秦漢而還多事四夷中州耗斁無世無之古稱戎夏不抗王師文教失宣武臣用竒竒兵有異於仁義王道迂闊而莫為嗚呼噫嘻吾想夫北風振漠胡兵伺便主將驕敵期門受戰野豎旄旗川迴組練法重心駭威尊命賤利鏃穿骨驚沙入面主客相搏山川震眩聲拆江河勢崩雷電至若窮隂凝閉凛冽海隅積雪没脛堅氷在鬚鷙鳥休巢征馬踟蹰繒纊無温墮指裂膚當此苦寒天假强胡慿凌殺氣以相剪屠徑截輜重横攻士卒都尉新降將軍復没屍填巨港之岸血滿長城之窟無貴無賤同為枯骨可勝言哉鼓衰兮力盡矢竭兮弦絶白刃交兮寳刀折兩軍蹙兮生死决降矣哉終身夷狄戰矣哉暴骨沙礫鳥無聲兮山寂寂夜正長兮風淅淅魂魄結兮天沉沉鬼神聚兮雲羃羃日光寒兮草短月色苦兮霜白傷心慘目有如是耶吾聞之牧用趙卒大破林胡開地千里遁逃匈奴漢傾天下財殫力痛任人而已其在多乎周逐獫狁北至大原既城朔方全師而還飲至策勲和樂且閑穆穆棣棣君臣之間秦起長城竟海為關荼毒生人萬里朱殷漢繫匈奴雖得隂山枕骸徧野功不補患蒼蒼蒸民誰無父母提擕捧負畏其不夀誰無兄弟如足如手誰無夫婦如賔如友生也何恩殺之何咎其存其没家莫聞知人或有言將信將疑悁悁心目寢寐見之布奠傾觴哭望天涯天地為愁草木悽悲弔祭不至精魂無依必有凶年人其流離嗚呼噫嘻時耶命耶從古如斯為之奈何守在四夷弔國殤文張説北伐兮東胡邈遼陽兮孤竹偏師兮覆衆在崇山兮峽谷露芁芃兮蔓草風蓁蓁兮拱木見馬血兮夜燃聞殤魂兮雨哭君王按金鼓而氣憤撫珠鈴而淚滋横萬里兮抽恨弔羣山而寫悲懟凶將兮我辱悼勇夫之狄纍彼前鑒兮未逺何後來兮不追對死地兮出陣臨傷門兮用師軍奪帥兮虹食壘車脱腷兮火焚旗有欒黶兮愎矣無范宣兮愧之命窮迮兮短兵錯膚迎刃兮血染鍔旅殘潰兮棄組練山猶號兮谷餘戰殪原野兮奈何違君親兮不見於戲何天命之奄忽俾仁義之治兵為蠻夷之俘骨鬷六校之飛將鎮五營之勁卒吾見出兮不歸噫名存兮身没弔九江驛碑材文歐陽詹弔傷而有辭者也噫九江之驛碑其何興辭而弔歟斯碑之材昔大師魯國顔忠肅公所建祖亭之碑也公素負辭華代之銘誌多公之辭又好採異留名之致頃為湖州牧州産碑材石每使工琢之與辭兼行磨礱而成常心使用者不可勝數斯碑也終山之窮僻得之於自然趺本有龜䕶頂有螭雖不甚成而拏躩僨興如神如靈公神而珍之精選所處湖州無稱立罷守歸朝載而途卜出蘓臺入毗陵亦無稱立轉丹陽遊建業亦無稱立次江州州南有
