front:
  text: 鉉編
  hash: sha256:7bbf6589c1370d76cda4d0216a0d947939e0da39d5486060d257d0515cbf99d7
body:
  text: 銘丁誄表述附總一十二首庶官七唐吏部尚書諸道鹽鐡轉運使李公墓誌銘權徳輿唐吏部侍郎贈禮部尚書昌黎韓先生墓誌銘皇甫湜唐工部貟外郎杜甫墓誌銘元稹唐監察御史周公墓碣銘栁宗元唐太學博士施先生墓誌銘韓愈唐著作郎贈秘書少監權君墓表附華李唐太子校書李元賓墓誌銘韓愈牧守四栁子厚墓誌銘韓愈吕衡州誄附宗元栁左黄州表附結元陸歙州述附翺李賢宰一元魯山墓碣銘李華唐故銀青光禄大夫守吏部尚書兼御史大夫充諸道鹽鐡轉運等使上柱國趙郡開國公贈尚書右僕射李公墓誌銘并序權德輿惟元和四年夏五月丁夘冡宰趙郡公巽寢疾薨于永崇里享年六十三天子憫然不視朝追命右僕射冬十月乙酉返𦵏于洛師緱氏縣芝田鄉之大墓公字令叔趙郡贊皇人曽祖知讓皇河南府長水縣主簿祖承𦙍江州别駕贈太府少卿父嶷右武衛録事參軍飾終四加至尚書右僕射世載德善至公昌大始以明經筮仕爲華州參軍試言超絶補鄠縣尉登朝爲監察御史殿中侍御史由美原縣令課最爲刑部貟外郎由萬年縣令課最爲户部闕司二郎中由常州刺史理行第一徴爲給事中以御史中丞領潭州刺史湖南觀察使就加右散騎常侍以右散騎常侍領洪州刺史江西觀察使就加御史大夫由二府報政入爲兵部侍郎在途加度支鹽鐡副使至止踰月代今司徒爲使明年遷兵部尚書閒一歲轉吏部尚書揔八柄平九賦左右理道以紓元元天子方推心竦意倚以爲相奄然大病斯可痛也公温重方嚴愷悌忠清得洪範之正直稟大雅之明哲强志特立爲儒門吏師中臺草議左曹還詔法程之下無尤違分畫之下無差失其爲二方循班制建長利布以休龢樹之風聲大凡都府歲杪使刻深吏周行支郡鈎撫泉貨二千石不相聊生如梏拲然公至分命部從事覽觀禮俗問人疾苦亷吏善否而已至有經用之羨使郡自爲理得以蠲乏用補庸亡府無私焉四履之内遇凶旱水溢損有餘以均不足農里無大乏官司無宿憂而邦鄉碩生勸學講藝導彼輕僄率循教化皆聲詩揭于康莊其制國用也調盈虛御輕重阜齊人之業而地不加賦佐公家之急而利無所渫先是池澤之稅因縁爲奸牢盆以私幣貨寖濫公則去一朝之便質終歲之成變其苦窳以寛物力盈入之數不可勝條上嗣位之歲發武庫禁兵以誅劉闢三蜀之饋不乏於軍千金之費不征於人揚天聲於井絡斷戎首於齊斧是皆謀猷大績經理大本豈止於漢庭桑大夫耿中丞區區然商功利析秋毫而已哉其爲天官已嬰寢患猶與郎吏切劘奏書去繳繞之科禁絶私回於胥吏士之得調者多受賜焉内外掃除之際精爽不亂與上言職業雖康寧宴閒之不若君子以爲難自解巾褐至捐館舍凡厯官十六利刃觸虛大車以載文理聰明卓冠出倫規爲密靜矩度章灼大吏之所表的諸公之所嚴重其文采精實循道體要而不爲曼辭其術學博洽折中定疑而不理章句喜士尊賢開懷盍簪絲桐博奕談笑嗢􅛐每有餘裕而無留事志在端正百度儀形四方以謨明𢎞濟爲己任而績用未究斯吾君所以當宁流嘆而衆君子失聲怛㤞豈虛也哉凡三合姓初曰范陽盧夫人太子賓客㓜平之女次京兆韋氏二夫人潁州刺史勺洎膳部貟外郎襄之女以從祖妹而繼室焉皆以華腴淑哲不幸凋落長子紹左衛兵曹參軍鳯翔節度巡官専謹有馴嗣子繼京兆府參軍飾躬彊學㓜子紵編皆以門廕在仕紹繼等泣次先公官簿事業請書墓石且以理命見託故不得讓焉銘曰太行之東全趙古風鍾懿美兮左車武毅元禮文事叢慶祉兮天官冡卿莊重亷清大君子兮精金斷割良玉特達視所履兮表率二邦鰥孤恵康斯樂只兮均齊八政底慎徽令有經紀兮宜登上台以賦羣才命遄已兮緱原厚地追琢款識神在此兮故吏部侍郎贈禮部尚書昌黎韓先生墓誌銘并序皇甫湜長慶四年八月昌黎韓先生既以疾免吏部侍郎書諭湜曰死能令我躬所以不隨世磨滅者惟子以爲囑其年十二月丙子遂薨明年正月其孤昶使奉功緒之録繼訃以至三月癸酉𦵏河南河陽乃哭而叙銘其墓其詳將揭之於神道碑云先生韓愈字退之後魏安桓王茂六代孫祖朝散大夫桂州長史諱叡素父秘書郎贈尚書左僕射諱仲卿先生七歲好學言出成文及冠恣爲書以傳聖人之道人始未信既發不掩聲震業光衆方驚爆而萃排之乘危將顛不懈益張卒大信於天下先生之作無圓無方至是歸工抉經之心執聖之權尚友作者跋邪觝異以扶孔氏存皇之極知人罪非我計茹古涵今無有端涯渾渾灝灝不可窺校及其酣放豪曲快字凌紙怪發鯨鏗春麗驚耀天下然而栗密窈眇章妥句適精能之至入神出天嗚呼極矣後人無以加之矣姬氏已來一人而已矣始先生以進士三十有一仕歴官其爲御史尚書郎中書舍人前後三貶皆以䟽陳治事廷議不隨爲罪常惋佛老氏法潰聖人之隄乃唱而築之及為刑部侍郎遂章言憲宗迎佛骨非是任為身恥上怒天子先生處之安然就貶八千里海上嗚呼古所謂非茍知之亦允蹈之者邪吳元濟反吏兵久遁無功固闕將闕懼恟恟先生以右庶子兼御史中丞行軍司馬宰相軍出潼闗請先乘遽至汴感說都統師乘遂和卒擒元濟王庭凑反圍牛元翼於深救兵十萬望不敢前詔擇庭臣往諭衆慄縮先生勇行元稹言於上曰韓愈可惜穆宗悔馳詔無徑入先生曰止君之仁死臣之義遂至賊營麾其衆責之賊恇汗伏地乃出元翼春秋美臧孫辰告糴于齊以為急病校其難易孰為冝襃嗚呼先生真古所謂大臣者邪選拜京兆尹歛禁軍帖旱糴齾倖臣之鋩再為吏部侍郎薨年五十七贈禮部尚書先生與人洞朗軒闢不施㦸級族姻友舊不自立者必待我然後衣食嫁娶喪𦵏平居雖寢食未嘗去書怠以為枕飡以飴口講評孜孜以磨諸生恐不貎美游以詼笑嘯歌使皆醉義忘歸嗚呼可謂樂易君子鉅人者矣夫人髙平郡君范陽盧氏孤前進士昶壻左拾遺李漢鞏集賢校理樊宗懿次女許嫁陳氏三女未笄銘曰維天有道在我先生萬頸胥延坐廟以行令望絶邪痌此四方惟聖有文乖微歲千先生起之焯役于前彍義滂仁耿照充天有如先生而合亘年按我章書經紀大環唫不時施昌極後昆噫嘻永歸奈知之悲唐工部員外郎杜甫墓誌銘并序元稹叙曰余讀詩至杜子美而知古人之才有所揔萃焉始堯舜之君臣以賡歌相和是後詩人繼作厯夏殷周千餘年仲尼緝拾選練取其干預教化之尤者三百篇其餘無聞焉騷人作而怨憤之態繁然猶去風雅日近尚相比擬秦漢已還采詩之官既廢天下俗謡民謳歌頌諷賦曲度嬉戱之詞亦隨時間作至漢武帝賦栢梁詩而七言之體具蘇子卿李少卿之徒尤工為五言雖句讀文律各異雅鄭之音而詞意闊逺指事言情自非有為而為則文不妄作建安之後天下之士遭罹兵戰曹氏父子鞍馬間為文往往横槊賦詩故其遒文壯節抑揚怨哀悲離之作尤極於古晉世風槩稍存宋齊之間教失根本士以簡慢矯飾相尚文章以風容色澤放曠精清為高盖吟寫性靈流連光景之文也意義格力無取焉陵遲至梁陳滛豔刻飾佻巧小碎之詞又宋齊之所不取唐興學官大振厯世之文能者互書而又沈宋之流研練情切穏順聲勢謂之為律詩由是而后文變之體極焉而又好古者遺近務華者去實效齊梁則不逮於晉魏工樂府則力屈於五言律切則骨格不存閒暇則纎穠莫備至于子美所謂上薄風雅下該沈宋言奪蘇李氣吞曹劉掩顔謝之孤髙雜徐庾之流麗盡得古今之體勢而兼昔人之所獨専矣如使仲尼考鍛其㫖要尚不知貴其多乎哉茍以為能所不能無可無不可則詩人已來未有如子美者是時山東人李白亦以竒文取稱時人謂之李杜余觀其壯浪縱恣擺去拘束摸寫物象及樂府歌詩誠亦差肩於子美至若鋪陳終始排比聲韻大或千言次猶數百詞氣豪邁而風調清深屬對律切而脫棄凡近則李尚不能厯其藩翰况堂奥乎余嘗欲條㭊其文體别相附與來者為之凖病懶未就爾適子美之孫嗣業啟子美之柩襄祔事於偃師途次于荆楚雅知余愛言其大父之為文祈余為誌辭不可絶余因系其官閥而銘其卒𦵏云系曰晉當楊侯杜氏下十世而生依藝今家於鞏依藝生審言審言善詩官至膳部貟外郎審言生閑閑生甫為奉天令甫字子美天寳中獻三大禮賦明皇竒之命宰相試文文善授率府曹屬京師亂步謁行在授左拾遺以直言失官出為華州司功尋遷京兆功曹劒南節度使嚴武㧞為工部貟外參謀軍事旋又棄其官扁舟下荆楚間竟以寓卒旅殯嶽陽享年若干夫人𢎞農楊氏女父曰司農少卿怡四十九年終嗣子曰宗武病不克𦵏没命其子嗣業以家貧無以給喪收拾乞丏燋勞晝夜去子美没後餘四十年然後卒先人之志亦足為難矣銘曰惟元和之癸巳粤某月某日之佳辰合窆我杜子美於首陽之山前嗚呼千嵗而下曰此文先生之古墳唐監察御史周公墓碣銘并序栁宗元有唐貞臣汝南周氏諱某字某以諫死𦵏于某貞元十二年栁宗元立碣于墓左在天寳年有以諂諛至相位賢臣放退公為御史抗言以白其事得死于墀下史臣書之公之死而佞者始畏公議於戲古之不得其死者衆矣若公之死志匡邦國氣震姦佞動獲其所盖得其死者歟公之徳之才洽於傳聞卒以不試而獨申其節猶能奮百代之上以為世範者也若令生於定哀之間則孔子不曰未見剛者出於秦楚之後則漢祖不曰安得猛士而存不及興王之用没不遭聖人之歎誠立志者之所悼也故為之銘曰忠為美道是履諫而死佞者止史之志石以紀為臣軌兮唐太學博士施先生墓誌銘韓愈貞元十八年十月十一日太學博士施先生士丏卒其寮郭伉買石誌其墓昌黎韓愈為之詞曰先生明毛鄭詩通春秋左氏傳善講說朝之賢士大夫從而執經考疑者繼于門太學生習毛鄭詩春秋左氏傳者皆其弟子貴游之子弟侍先生之說二經來太學帖帖坐諸生下恐不卒得聞先生死二經生喪其師仕於學者亡其朋故自賢士大夫老師宿儒新進小生聞先生之死哭泣相弔歸衣服貨財先生年六十九由四門助教為博士由博士為太學秩滿當去諸生輒拜䟽乞留或留或遷凡十九年不離太學祖曰旭袁州宜春尉父曰婼濠州定逺丞妻曰太原王氏先先生卒子曰友直明州鄮縣主簿曰友諒太廟齋郎系曰先生之祖氏自施父其後施常事孔子以彰讎為博士延為太尉太尉之孫始為呉人曰然曰績亦載其跡先生之興公車是召纂序前聞于光有耀古聖人言其㫖密微箋注紛羅顛倒是非聞先生講論如客得歸卑讓肫肫出言孔揚今其死矣誰嗣為宗縣曰萬年原曰神禾髙四尺者先生墓邪著作郎贈秘書少監權君墓表李華君姓權氏諱臯字士繇天水人苻秦尚書僕射翼之後世為著姓祖某咸有令德君既冠進士及第試臨清尉持節兼本道使藉君表為薊縣尉充判官無何主將以逆節露君乃詐死扶親涉江免禍累知㡬其神先帝聞而歎之除評事御史方議大用屬太夫人病危君侍奉憂勞因中痼疾無何太夫人終君泣血三年厥疾用加服除遷起居舍人著作郎大厯元年四月某日不幸逝於丹徒因殯焉享齡四十嗚呼識者慟哭聞者痛心君有大節不可奪大名不可掩大才不可及大行不可名天與之仁不與之年哀哉自開元天寳已來髙名下位華方疾不能備舉然所憶者曰河南元君德秀元終十年而南陽張君有畧張殁二年而君夭元之志如其道德張之行如其經術君之才如其聲望人倫其瘁乎素與昌黎韓幼深京兆王鎮卿洎華友善韓評君曰可以為宰輔王評君曰可以為師保華評君曰分天下之善惡一人而已矣夫人隴西李氏仁賢有一子某生七年哀禮過成人嗚呼有後哉朝廷贈君以祕書少監悼賢也華自疾病風曳杖而往哭之常聞師乙之言曰温良而能㫁者宜歌齊權君可謂温良而能㫁者也故為齊風表君之墓云忠於而國孝於而家絜而不滓瑜而不瑕仁胡不夀為善者何君不幸邪時不幸邪唐太子校書李元賓墓銘并序韓愈李觀元賓其先隴西人始來自江之東年二十四舉進士三年登上第又舉博學宏詞得太子校書又一年年二十九客死於京師既歛之三日其友人博陵崔𢎞禮𦵏之于國東門之外七里鄉曰慶義原曰嵩原友人昌黎韓愈書石以誌之其辭曰已乎元賓夀也者吾不知其所慕天也者吾不知其所惡生而不淑孰謂其夀死而不朽孰謂其夭已乎元賓文髙乎當世行出乎古人竟何為哉竟何為哉唐栁州刺史栁子厚墓誌銘并序韓愈子厚諱宗元七世祖慶為拓跋魏侍中封濟隂公曽伯祖諱奭為唐宰相與褚遂良韓瑗俱得罪武后死髙宗時皇考諱鎮以事母棄太常博士求為縣令江南其後以不能媚權貴失御史權貴人死乃復拜侍御史號為剛直所游皆當世名人子厚少精敏無不通達逮其父時雖少年已自成人能取進士第嶄然見頭角衆謂栁氏有子矣其後以博學宏詞授集賢殿正字儁傑亷悍議論證據今古出入經史百子踔厲風發率常屈其座人名聲大振一時皆慕與之交諸公要人爭欲令出我門下交口薦譽之貞元十九年拜監察御史王叔文韋執誼用事拜尚書禮部員外郎且將大用遇叔文等敗例出為刺史未至又例貶永州司馬居閒盖自刻苦務記覽為詞章汎濫渟蓄為深博無涯涘而自肆於山水之間元和中嘗例召至京師又偕出為刺史而子厚得栁州既至歎曰是豈不足為政邪因其土俗為設教禁州人順頼其俗以男女質錢約不時贖子本相侔則没為奴婢子厚與設方計悉令贖歸其尤貧力不能者令書其傭直相當則使歸其質觀察使下其法於他州比一歲免而歸者且千人衡湘以南為進士者皆以子厚為師其經承子厚口講指畫為文詞者悉有法度可觀其召至京師而復為刺史也中山劉夢得禹鍚亦在譴中當詣播州子厚泣曰播州非人所居而夢得親在堂吾不忍夢得之窮無辭以白其大人且萬無母子俱往理請於朝將拜䟽願以栁易播雖重得罪死不恨遇有以夢得事白上者夢得於是改刺連州嗚呼士窮乃見節義今夫平居里巷相慕恱酒食游戲相徴逐詡詡强笑語以相取下握手出肺肝相示指天日涕泣誓生死不相背負真若可信一旦臨小利害僅如毛髮比反眼若不相識落陷穽不一引手救反擠之又下石焉者皆是也此宜禽獸夷狄所不忍為而其人自視以為得計聞子厚之風亦可少愧矣子厚前時少年勇於為人不自貴重顧藉謂功業可立就故坐廢退既退又無相知有氣力得位者推挽故卒死於窮裔材不為世用道不行於時也使子厚在臺省時亦自持其身已能如司馬刺史時亦自不斥斥時有人力解舉之且必復用不窮然子厚斥不乆窮不極雖有出於人其文學辭章必不能自力以致必傳於後如今無疑也雖使子厚得所願為將相於一時以彼易此孰得孰失必有能辨之者子厚以元和十四年十月五日卒年四十七以十五年秋七月歸𦵏萬年先人墓側子厚有子男二人長曰周六始四歲季曰周七子厚卒乃生女子二人皆幼其得歸𦵏也費皆出觀察使河東裴君行立行立有節槩重然諾與子厚結交子厚亦為之盡竟頼其力𦵏子厚於萬年之墓者舅弟盧遵遵涿人性謹順學問不厭自子厚之斥遵從而家逮其死不去既往𦵏子厚人將經紀其家庶㡬有終始者銘曰是惟子厚之室既固既安以利其嗣人吕衡州誄栁宗元維唐元和六年八月日衡州刺史東平吕君卒爰用十月二十四日藁𦵏于江陵之野嗚呼君有智勇孝仁惟其能可用康天下惟其志可用經百世不克而死世亦無由知焉君由道州以陟為衡州君之卒二州之人哭者踰月湖南人重社飲酒是月上戊不飲酒去樂㑹哭于神所而歸余居永州在二州中聞其哀聲交于南北舟舩之上下必呱呱然盖嘗聞於古而覩於今也君之志與能不施千生人知之者又不過十人世徒讀君之文章歌君之理行不知二者之於君之未也嗚呼君之文章宜端於百世今其存者非君之極言也獨其辭耳君之理行宜及於天下今其聞者非君之盡力也獨其迹耳萬不試而一出焉猶為當世所重若使幸得出其十二三則巍然為偉人與世無窮其可涯也君所居官為第三品宜得謚于太常余懼州吏之逸其辭也私為之誄以志其行其辭曰麟死魯郊其靈不施濯濯夫子胡絜其儀冠仁服義干櫓書詩忠貞繼佩智勇承基跨騰商周堯舜是師道不勝禍天固余欺鬼神齊怒妖蠥咸疑何付之德而奪其時嗚呼哀哉命姓惟吕勤唐以力輔寧萬邦受胙爾國惟師元聖周以降德世征五侯伊祖之則嗣濟厥武前書是式至于化光爰耀其特春秋之元儒者咸惑君達其道卓然孔直聖人有心由我而得敷施變化動無不克推理唯公舒文以翼宣于事業與古同極道不茍用資仕乃揚進於禮司奮藻含章决科聨中休問用張署讎百氏錯綜逾光超都諫列屢皁其囊帝殊爾能人服其智戎悔厥禍欵邉求侍咸選邦良難乎始使君登御史贊命承事風動海壖皇威以致來總征賦甲兹郎吏制用經邦時推重器諸臣之復周官匪易漢課牋奏鮮云能備君自他曹載出於技筆削自任羣儒軰議正郎司刑邦憲為貳糾逖伊肅邪諛具畏遷里道民民服休嘉恩踈若暱惕邇如遐實閉其閣而撫于家載其愉樂申以舞歌賦無吏迫威不刑加浩然順風從令無譁絲蠶外邑我繭盈車雜耕鄰邦我黍之華既字其畜亦蓺其麻鼛鼓斯屏人喜則多始富中教興良廢邪考績既成王用興嗟陟于嶽濱言進其律號呼南竭謳謡北溢欺吏悍民先聲如失逋租匿役歸誠自出兼并既悉罷羸乃逸唯昔舉善盗奔于鄰今我興仁化為齊人唯昔富人或賑之粟今我厚生不竭而足邦思其弼人戴唯父善胡召災仁胡罹咎俾民伊怙而君不夀矯矯貪陵乃康乃茂嗚呼哀哉廩不餘食藏無積帛内厚族姻外賙賓客恒是懸磬逮兹易簀僮無凶服𦵏非舊陌嗚呼哀哉君昔與余講德討儒時中之奥希聖為徒志存致君笑詠唐虞揭兹日月以耀羣愚疑生所怪怒起特殊齒舌嗷嗷雷動風驅良辰不偶卒與禍俱直道莫試嘉言罔敷王佐之器窮以郡符秩在三品宜謚王都諸生羣吏尚擁良圖故友咨懐累行陳謨是旌是告永永不渝嗚呼哀哉左黄州表元結乾元已亥贊善大夫左振出為黄州刺史下車黄人歌曰我欲逃鄉里我欲去墳墓左公今既来誰忍棄之去於戲天下兵興今七年矣淮河之北千里荒草自闗已東海濵之南屯兵百萬不勝征税豈獨黄人能使其人忍不去者誰曰不可頌乎後一嵗黄人又歌曰吾鄉有鬼巫惑人人不知天子正尊信左公能殺之於戲近年已来以隂陽變怪將鬼神之道罔上惑下得尊重於當時者日見斯人黄之巫女亦以妖妄得䝉恩澤朝廷不問州縣惟其意公忿而殺之則彼可誅戮豈獨巫女知左公者誰曰不可訟乎三拜遷侍御史判金州刺史將去黄人多去思故為黄人作表如左氏世系左公厯官及黄之門生故吏與巫女事則南陽左公悉記之陸歙州述李翺吴郡陸㕘字公佐生于世五十七年明于仁義之道可以化人厚風俗者餘三十年連事觀察使不能知退居于田者六七年由侍御史入為祠部員外二年出刺歙州卒于道貞元十八年四月二十日也凡人之所不能窮者必推之于天天之注膏雨也人之心以為生旱苖然也雨與苗運相違或雨于海或雨于山旱苗不得仰其澤惟人也亦然天之生俊賢也人之心以為拯顦顇之人然也賢者與顦顇之人時不合或死于野或得其位而道不能行顦顇之人不得被其恵膏雨之降也適然唯賢者之生于時也亦然運相合旱苗仰其澤顦顇之人賴其力傅說甘盤尹吉甫管夷吾之類也時弗合膏雨降雖終日賢哲生雖比肩旱苗之不救百姓之弗賴顔子子思孟軻董仲舒之類也故賢哲之生自有時百姓之賴其力天下不賴其力亦天也嗚呼公佐之官雖列于朝雖刺于州其出入始二年道之不行與居于田時弗差也公佐之賢雖日聞其德行亦未必昭昭然聞于天子公佐是以不得其職出刺一州又短命道病而死天下之人未䝉其德固宜然也則天之生君也授之以救人之道不授之以救人之位如膏雨之或雨于海或降于山旱苗之不沐其澤者均也故君之不得其位以行其道者命也其亦不足于心者邪得是道者窮居于野非所屈冠冕而相天下非所伸其何有不足于心者邪元魯山墓碣銘并序李華維唐天寳十二載九月二十七日魯山令河南元公終于陸渾草堂春秋五十九服名節者無不痛心嗚呼堂内有篇簡巾褐枕履琴杖簞瓢而已堂下有接賓之位孤甥受學之室過是而往無以送終名髙之士陸渾尉梁園喬潭賻以清白之俸遂其喪𦵏以明月十二日窆于所居南岡禮也公諱德秀字紫芝延州使君之子後魏七葉易為元公其裔也世有明哲承而述之幼挺全徳長為律度神體和氣貎融視色知教不言而信大易之易簡黄老之清淨惟公備焉延州即世之後昆弟凋落慈親羸老無小無大仰飴於公及應府貢如京師不忍離親躬負安輿往復千里以才行第一進士登科丁艱聲動於心既過苴枲刺血畵佛像寫經以不貲之身申罔極之報食無鹽酪居無爪翦者三年先人未祔于兆身迫當室緘未忘之哀參調求仕銓試超等補南和尉黜陟使以至行上聞授左龍武軍録事因墜傷足樂正之憂愀然滿容以甥姪婚仕為念受署魯山令以痼疾不能趨拜故後長吏僉以容禮待之常獲盗未刑屬濱山之鄉稱猛獸為害盜請於庭曰感明府慈仁願殺獸贖罪公哀而許焉僚佐堅請公無變慮乃從破械縱之盜果屍獸復命吏人老幼咨嗟震動發於庭宇播於四鄰則政化之行可知也公自幼居貧累服齊斬故不及親在而娶既孤之後單獨終身人或以絶後諭焉對曰兄有息男不曠先人之祀矣厯官俸禄悉以經營𦵏祭衣食孤遺代下之日柴車而返南遊陸渾考一畆之宅發入笥之直唯匹帛焉居無扃鑰牆藩之禁達生齊物從其所好時屬歉歲涉旬無煙彈琴讀書不改其樂好事者攜酒食以饋之陶陶然脫遺身世涵泳道德㧞清塵而棲顥氣中古以降公無比焉知我或希晦而不耀故也是宜為國老更論道佐世而羔鴈不至殁於空山可勝慟邪所著文章根𤣥極則道演寄情性則𤣥于思善人則禮咏多能而深則廣呉公子觀樂曠達而妙則現題窮於性命則蹇士賦可謂與古同轍自為名家者也又其惡萬金之藏鄙十卿之禄貴富之辯吾得其真至哉元公越軼古今冲邃冥冥純朗朴渾範於生靈凡與門人吟慕遺風謚曰文行先生從古也夫誄德銘功厥義有三上以簡神明中以鋪光烈下以聳示後人斯文之作由此志也其銘曰天地元醇降為仁人隠耀韜精凝和葆神道心𤣥微消息詘伸載襲先猷竭盡報親貞玉白華不緇不磷縱翰祥風蛻跡泥塵今則已矣及吾無身仰德如在瞻賢靡因懷哉永思泣涕銘云唐文粹巻六十九欽定四庫全書唐文粹巻七十宋姚鉉編
