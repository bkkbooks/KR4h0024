front:
  text: 論曰君子疾沒世而名不稱恥當年而節莫覩故發義以立志從道以成功激淸一時流譽千古然立志者必義也成功者必道也資於義而志可明徴於道而功可見志以立節功以成名名之成昭其道也節之立昭其義也能潔其身後代有凖非夷齊歟能利其國當時繄賴非四皓歟揆而度之優而柔之循其事而理於是乎在考其功而論於是乎著蓋周德既廣則夷齊讓國而歸焉漢業既興則四皓受命而出焉天之棄商矣諫武王正臣禮也人之戴漢矣護太子忠主道也忠之所存者大則正之所行者髙髙而能行者節所謂立也大而能行者名所謂成也若夫志士仁人將合而巳進足以成退足以立用足以兼濟否足以獨善不辱其身則安食其粟不降其志則言采其薇墨台氏之子不屈也嬴之德衰則巗穴全生劉之德盛則衣冠就列夏黃公之徒知時也舉其成事各同乎其成矣究其立事各異乎其立矣深惟終始敢無優劣統而論之其美也一别而敘之其迹也二棄身以遂志夷齊之烈矣愛國以屈身商皓之行矣曰若稽古以質乎今四皓見賢於子房夷齊稱仁於宣父與其稱仁於宣父不猶愈於見賢於子房哉
