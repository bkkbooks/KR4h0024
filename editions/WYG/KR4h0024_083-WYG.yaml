seq: 83
front:
  text: 語親倖曰叩頭者之言安足信哉漢文帝亦謂張釋之曰卑之無甚髙論令可行也今人平居無事友朋骨肉切磋規誨之間尚宜旁引曲釋亹亹繹繹使其樂去其不善而樂行其善況於君臣尊卑之間欲因激切之言而望道行事治者乎故禮稱五諌而直諌為下前數月見報上披閣下諌䟽錫以幣帛僻左且逺莫知其故近於遊客處一睹閣下諌草明白辯婉出入有據吾君聖明宜為動心數日在手味之不足且抃且喜且慰三者交并不能自止吾君聞諌既且行之仍復寵錫誘能諌者斯乃堯舜禹湯文武之心也聞於逺地宜為吾君抃也閣下以忠孝文章立於朝廷勇於諌而且深於其道果能輔吾君而光世徳某承閣下之厚愛冀於異時資閣下之知以進尺寸能不為閣下之喜復自喜也吾君今日披一䟽而行之明日聞一言而用之賢才忠良之士森列朝廷是以奮起志慮各盡所懐則文祖武宗之業窮天盡地日出月入皆可掃洒以復厥初某縱不得效用但於一官一局筐篋簿書之閒活妻子而老身命焉作為歌詩稱道仁聖天子之所為治則為有餘能不自慰故獲閣下之一䟽抃喜慰三者交并真不虚也宜如此也無因面讃其事書紙言誠不覺繁多某再拜
  hash: sha256:e866ecd37f79d3e9661f01c6f2181417261fb91fd3f0f1c88012921798c26303
