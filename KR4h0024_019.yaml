body:
  text: 吳興姚鉉篡頌甲揔六首盛德大業無疆頌李華起義堂頌僧一行又云張說開元正曆握乾符頌張說上黨舊宫述聖頌龍池聖德頌張九齡靈武受命宫頌楊炎無疆頌并序李華臣華言伏以漢眀帝時徼外蠻夷槃木白狼獻詩歌德屬事史官况臣自曽祖至臣備國家職貟臣又逮事玄宗肅宗今以餘年獲事陛下官歷御史𥙷闕尚書郎命薄多病不獲奔赴闕庭恐先朝露同於泥塵若無歌詩頌德曽蠻夷不若也敢述列聖爲無疆頌式昭皇家大慶無窮謹昧死稽首以聞髙祖元頌昊昊旻天監於下興有德維隋之杪時黷隂凝陽濳未登人思照矣雷行龍興盪濯雰慝文眀乎萬國垂仁蒸人載親天監保我子孫巍巍皇皇後之皇丕承之太宗烈頌髙祖受天命誕興太宗成天之命帝煬昏逾黎人毒痡甚爇于爐甚溺于塗以號以呼呼天無辜髙祖謂太宗爾必有天下爾其訐謨太宗稽首恭受天命臣請滌除張我師撫征四國翦薙羣慝鼓一方三方震驚黙昭其靈隨顧而平我負我乳我安我成以奉君父以臨天下任忠孝文武建禮章樂舞我雖明德諫則納汝時惟帝降佑之自古明后莫如我德我勛唐無疆天子之無疆本太宗休命髙宗康頌肇爲址爲堂實勒實勛付俾厥裔丕承后帝思不忘神棐靜康不耀而光不求而昌自中方外達夷羌瞻我大邦助祭在于廟執貢朝于王油油時雲雨厥百穀漻漻景風扇彼嘉穀飴口飽腹以厭以足㑭壽而福都阜成天人中宗興頌屏蠆之毒舋而爲蝮謀虐天之族天祐聖祚八柱將覆帝告五臣保翼朕躬赫赫彤彤日升雲中百臣受命鉞爾頑兇故曰再造我天下生人鼓舞旣成矣又奉父母􅐶宗德頌后戚之禍再興有危兢兢廟祧震怒隂命聖子翼登聖父奮其神旅宵杖金斧殄殱逆亂大聖照臨元元宅心歸祚于有功有德於戲盛德玄宗文頌丕鑠玄宗之眀克孝克仁允武允文宣祖宗之光垂于子孫盛禮畢舉大樂畢陳百蠻來賔元元阜殷戎或不賔遣師徂征罔不頓顙踣于雷霆存漢方昌用刑慘酷中都繫考六萬餘人使者案録誅千萬人其後賢王光武赫赫誅沛賔客以千以百孝眀稱賢楚獄連年坐死逮捕以萬以千猶曰漢祚冝長越我祖宗不忍用刑至于玄宗哀彼鈇鑕降爲鞭抶誕告郡國大爲屋室醫彼百疾追懷登遐止害禽畜旁爲陂池養鱗介族旣濡旣渥昆蟲草木享國五十年㝢縣晏然逆臣犯天天念蒸人若曰寧我負恥不忍人戰死乃告元子理兵朔鄙西幸蜀都命元子受圖天下旣定父堯子舜歸于國都無不欣愉無不涕濡傳聖自頥升靈太微嗚呼上聖之道之純不可度思肅宗孝頌穆穆孝慈有如肅宗之誠達于神祇爰訓六師震登北陲陵陵雷馳西戎南蠻北狄東夷咸舉其旂佐皇之威帝心如天無噬無慾㽬然丘岳破裂崖谷逆隸傾覆朝社大復届于海之外服以盥以濯以舞以躍帝在東宫孝如文王蒸蒸其心天地知其孝旣收鎬洛祀于陵廟奉迎上聖天日並照有兇有孽將噬將齧我旂方設則巳顛蹶如燂於雪尊嚴而仁仁覆而嚴大臣小臣莫不㓗廉躬勤百度百度如其素今上照頌大邦之興維天相之曷興曷相有德繼王昔殷王盤庚武丁紹登殷明矧我帝君丕承天命疊引其慶生我皇聖㓜冲聖敬寔左右肅宗開國御戎羣師稟教舉則成功自西自東如霆如風蕩滌元兇罔不率從旣登大位於變時雍人咸曰上如太宗延億兆斯年地博天崇罔不爾容玄宗元孫爲玄宗烈文肅宗元子承肅宗孝理起義堂頌并序僧一行又云張說堯以天下禪舜舜以天下禪禹禹將宅百揆揔萬國一讓于稷卨再讓于臯繇稷卨先舉彼商與周以之更盛臯繇後天我國家於兹受命非舜以考天而疇咨審靈命之隂騭非禹以享天而德讓知歷數之有歸及乎玄元間出光大前慶垂道德而統運依淸虛而立法天祚我李厥惟舊哉并州起義堂者皇天造帝之𥘉髙祖誓衆之地也隋氏失御國亂無家小道自賢大才胥忌惟宫室陂池之好惟沈湎暴慢是保上帝不歆黎人咸戚六軍踰海而東敗萬乗過江而南覆犲狼入邑猰㺄爭人黔首囂然方將無訴我髙祖感之乃龍躍晉水鳳翔太原百神前驅萬姓來奔開咸陽入天門用湯武之兵靜新室之亂遵唐虞之典承太王之基率百官受終于文祖輯五玉班瑞于諸矦類圎禋方之禮備封功爵德之議允約法惟簡代虐以寛子惠困窮懷柔蠻貊金石一變日月重華近古以來未有革命易姓若此之盛者也非天私我有唐惟天祐干積德非唐求于人庶惟人懷于累仁當此之時太宗内啓聖謀外行專斷躬擐甲胄跋履山川駕英雄而爲奥主一區域而定大業周詩曰昊天有成命二后受之信今之謂也若夫脩德以降命奉命以造邦源濬者流長根深者葉茂天人報應豈相逺哉觀周之興始於后稷公劉承以大王王季皆勤儉忠厚克廣前烈至于文王成之武王啓之康王安之故卜世三十卜年八百天所命也我唐之興也始於臯繇玄元承以景皇元帝皆立言邁德垂𥙿後昆至於髙祖受之太宗有之髙宗守之中宗復舊業睿宗新景命比之周室我何謝焉且如陳德明刑庶其躬稼之績玄宗道要小其避狄之仁化流率土狹其江漢之域義寧大朝羞其牧野之戰故武德中太行出大聲曰唐興理萬年蓋天之所命年代未可涯也仲尼曰惟天爲大惟堯則之又曰韶盡美矣又盡善也非至德其孰能如此其大者乎於戲先后捨元子而立予主鬯煩大位而付予天下自髙祖創業百有六戰欽承丕緒十有四載東西南北無思不服山川鬼神亦莫不寧實惟藝祖儲福之所致豈予㓜孫菲德之能及方將運心干玄妙之境勵志干造化之爐發今爲祥符施惠爲霖雨任賢爲兩曜仗能爲四時俾溥天之下有形者遂全懷生者自足樹鋪野繭田種嘉穀斵雕爲樸捐珠棄玉追大庭而齊風夢華胥而同俗非曰能爾願慿宗祐而效焉癸亥之歲獻春正月濟河橫汾省方展義存問黎老𬗟慕本邦城郭巋然桑梓如舊覽風物之憂思㝷王業之艱難惟髙祖若天地之開闢化成萬類惟太宗若日月之照臨光于四表舉晉陽之甲除君側之盗由唐侯之封升天子之號肇基發迹實在於茲仙駕無所或顧懷于舊土靈魄無方儻來歸于北堂郡縣之所冝嚴奉前人有言曰禮不忘本樂保其德如姬詠周原而劉歌沛邑思我烈祖如聞歎息之音嗟爾後人無忘成功之頌頌曰皇矣上帝臨下有赫降監四海求人之瘼吁彼隋煬其政不獲眷我髙祖此惟其宅天輔臯繇眀刑弼教道尊老氏同玄體妙仁表四乳明融獨照隨父託心史良辨貌髙祖誕靈神光夜耀天妹作合日兄夢紹祚生文帝􅈾運㑹昌首唱髙祖騫飛晉陽萬夫一心元戎啓行火旗炎炎雲鳥洋洋五星迓帝萬國謳唐天網恢踈王師節制威惟連戮老生摧斃山祇引軍河龍渡帝渭倉散積離宫弛閉關輔來蘇逺方咸惠長安宮室上法太微隋遷寳鼎唐在璿璣仗入雙闕詔出九圍三靈恊載百禄同歸帝謂太宗表正封略濤蕩颷掃霆馳電爍劒不摧鋒弩無再彍西平汧隴東取河洛杲密德充頭懸靣縳北走獯鬻南達蠻荆遼碣作乂梁𡵨底平風動神行海隅蒼生莫不來庭於昭義堂誓衆資始天命所起于胥頌美維予小子夙夜敬止於戲皇王緒思不忘開元正曆握乾符頌并序張說客有嘲臣曰聖主正新曆握乾符百僚賡歌以美時六合鼓舞以頌德先生獨宴黙書閤含翰詞林奚其爲儓儗也臣應之曰斗木不能評巨壑之量隙光未足議大明之體何者見𥚹而守隘也握乾符者不謂執天命歟執天命者非夫廣德休曆交相表裏況命者夫子之所罕言也焉可偏賛而揔握符之盛哉如作者略大本舉小節不亦仲尼之門所聽瑩也是以涸思乾慮乆難其述客無異焉客曰請終餘論粤若我大唐慶始白雲道昇紫氣屬漢東失馭淮南不返髙祖舉晉陽之甲戡定關西太宗因徯后之師削平天下髙宗收圖海外撿玉封中九域黎人重代飲澤雖鳴鸑改號神龍中興周鼎歸唐玄圭祀夏中宗違代嬖孽窺國於是乎聖上起藩邸入鈎陳一麾水心羣兇泥首崇復大聖越踐少陽受禪當宁而光大前烈垂統拜璧而愼寧後嗣四海有覆盂之安百代無委裘之隙是之謂聖人握符之大寳也四星入輔五將出禦倚禮樂爲國計仗仁義爲軍勢英賢集殿而文教成千戚舞階而武功振敬讓光于九族孝慈行於萬宇磧嶂西南渤瀚東北熾皮火毳暍炎山汚熱海向風來王黑貂駮駿浮天𬈑絶冰漠連歲獻𣢾鳥獸無猜人之意草木無不達之氣升中于天比天同貴是之謂聖人握符之大政也歷試上黨黃龍飛天入淸中禁白虹指日瘞汾睢寶鼎見柴岱宗卿雲蔚非應事而呈瑞者雖多狎而不紀矣是之謂聖人握符之大祥也以數推氣以氣定朔以星殷時以閠成歲考星間而革踈度置歲差而辨誤日立大衍之紀參大渾之晷合鍾律之聲極鬼神之情是之謂聖人握符之大曆也若夫仁聖根於内菁華發於外祥兆秘於前謡識灼於後自然之理也彼洛下閎者漢太𥘉時一巧曆耳其云後八百歲當差一日有聖人正之斯人也抑將露才揚術預證來聖有耆舊之傳記無史䇿之明文然至隋之開皇及麟德聖歷三家創法一引爲徵約之年代則隣近稽之圖籙則曖昧未有如新曆之昭昭者矣昔在唐虞之際以斗精受命者七神得四均間氣而生者又二十八人所謂三十五際者也禹以金德王故夏后之有天下也生數四百年契以水德王故殷人之有天下也成數六百年稷以木德王故周人之有天下也成數八百年伯益之命中天而堯族以火德乗之故漢室之有天下也生數再及二百年其間距王而興不能復大禹九州之跡及勝殘百年之命者皆五神之餘氣也皐繇降德皇唐復興土精應王厚德載物生數五百成數千年命曆有歸此其大較修德増祚與天無窮轉筭之徒莫能究也緯以入元三百四歲爲德運七百六十歲爲代軌千五百二十歲爲天地出符四千五百六十歲爲七精返𥘉天人相應合若符節自堯典命羲和修重黎之舊理顓頊之曆上元甲子千五百餘歲得孔聖而春秋之曆序暨開元十二年甲子凡三千四十歲遇聖上而大衍之曆興是時也土德入生數之元天命當岀符之㑹信矣伏惟聖上聦明文思道德之具也豁達大度皇帝之體也藝揔六經漢光之學也文通三變魏祖之才也縁情定制五禮之本也洞音度曲六樂之宗也神於弧矢黃軒之威也聖於翰墨蒼頡之妙也兄弟善友王季之心也子孫衆多周文之福也大寳以定天位大政以布廣德大祥以合靈符大曆以啓成命德位兼才臨照如此符命介福粲彰如彼所謂廣德休曆交相表裏之效也善曆者必推來運以自神興王者不俟徃言以表聖設徴夫洛下閎之語也其不有容成之事乎且如恃有命比於日孰是夏王之福也頼卜年衰其德豈謂周公之訓也故曰王者執天命在於俟天符致天符在於順天德布天德在於保天位四者備矣然後陳其盛德告於神明捨此道也胡可語正天曆握乾符哉謏臣懵學謝生玄造樂虞典之歌舜羡周詩之美文敢不敷信辭薦淸樂獻上客之課託衆篇之後云爾維皇六葉於赫啓聖歩玉斗握金鏡地維續天柱正山川授方雷雨施令淸廟九祐堯門百慶郊稷尊祖擇昌定命德自我流藝從我修龜易八卦龍書九疇文含玉律字吐銀鈎鳴絲鶴舞調箭猨愁集賢牓殿花蕚名樓神用外表事行先兆萬目朝徹千心暗曉卿雲爛熳黃龍窈窕遊姑射神人窅登太山天下小飛祥定瑞均靈踳類鞮譯窮天琛維盡地爍此金㦸鑄爲農器匪直也然探玄索秘軸止輪運辰居星轉得一神凝吹萬情辨發歛濳合晦明幽闡階蓂朝開宫槐夜卷正我長曆同符大衍天地淸焉日月貞焉四時行焉萬物生焉窮神知化美功成焉金版玉牒逺頌聲焉上黨舊宫述聖頌并序維開元十有一祀正月皇帝展義于河東挾右太行留宴上黨整兵耀武入干太原設都建頌以崇王業南轅汾睢祈穀后土天淸日朗神歆如荅三月庚午飲至長安六軍解嚴四方和㑹邇觀法象遐詠德澤大虞巡之典修美漢祠之禮舉人心翕而一變神物效而無方於是邠王臣守禮寧王臣憲申王臣撝𡵨王臣範薛王臣業獻書於内開府儀同三司臣璟尚書臣晙臣象先臣頲御史大夫臣漼抗䟽於外僉曰陛下受天曆數稽聖典謨道貫三靈仁育萬類掃隂沴而覩日開闢之功也尊文考而御天帝王之孝也天以陛下爲子人奉陛下爲君萬殊之福斯應畢臻三代之風頌聲咸作今潞人懷代邸詠泗亭採聖崖延立石將表濳龍之館勒啓聖之圖勤亦至矣陛下推而不報其何以下塞衆望上對神休哉臣聞天之所啓人之忻戴必憑睿聖玄懿之德元命眞符之紀功業見乎變德施加乎時德厚者施溥功玄者應速或階晦以彰或由難而昌蓋生其德之謂天授其時之謂命天有成命其可没乎陛下昔居是州也紫雲在天神光照室白鹿來擾黃龍上昇隴出仙洞而神魚躍山開禪穴而靈鍾韻謡言合䜟巨迹引途嘉李傍連祥蓍自起當此時也金石預變獄訟先歸政殷六府人重五敎陶無窳器漁有讓泉神而化之人不知力昔龍負圖而大舜登狼銜鈎而后殷昌玄珪錫於夏禹赤伏歸於漢光應運恊符希代稱寶未有窮祥極瑞俶儻瓌異如今之至者矣若玄貺集而不彰則神心不恱鴻業成而不賛則祝告無聞是掩天休而蓋聖德也臣子之罪將何解焉願聽潞人以揚丕烈帝曰往者中宗違代國歩微艱天祚我唐大命集于睿宗大聖眞皇帝朕畏天將命不敢怠遑其乾符坤珍皆先聖之蝕福朕何力之有焉然重違昆弟公卿之請抑以敬從無爲虛美重朕不德也羣臣遊聖蕩莫能名約乎舊史敢頌成績辭曰帝德廣運乃聖乃神天祚聖兮唐惟舊邦其命惟新再受命兮帝理其績則洛爲之出書自玆巳降蓋三千歲矣其閒木火更王雲物告符有若狼銜鈎魚躍舟素靈出黃星見豈不以湯德有慙武善未盡漢道旣雜魏方亦偏唯以一至之應且爲興王之兆則未有天錫眞符聖受休命遠與大禹相續超與上皇比崇如我國家之盛者焉惟龍池蓋天之所以祚聖即今上卜居之舊里京師爽塏之地傍無寳澤中忽濫泉非常而靈液涓流無幾而神化寖廣榮光休氣若烟若雲所未曾有則此之出雖淸可以鑑而深不見底鱗介瑰詭充滿其中時莫知其所然日徒見其有異中宗採識者之議壓王氣而來遊聖上處或躍之時岀飛龍而合應臨淄始封也邸第在焉上黨歷試也靈符紹至天其以是永命我唐國家丁寧有所底止其若兹也夫數有時而否至理也無代而亡固存乎大聖之生也乗運而作鼓天下之動安天下之危故㢡順成功自古之啓佑之也如彼克定多難自天之叶賛之也如此𥘉中宗違代后黨日窺隙大道狃於得志羣慝起而擅朝若綴旌旒然當此時也天與若不取鬼謀若不恊則我祖宗之業無乃將墜而億兆之命亦猶倒懸聖上感之提劒而起雷霆一奮妖沴以淸内難旣衰外虞有謐推戴太上照臨萬邦實天之爲與人更始系皇統維乾綱決綻𥙷壞蕩瑕滌穢而乃闕典咸備舊章悉舉處窮盡逹在困必通品物資以再生寰區爲之一變然後反華僞於朴還澆醨於醇以大道爲源以至仁爲根動推是心以御於事人見德而興行神享誠而介福故不任於刑罰亦不在於禱請大造化成玄猷充塞有如陽春播澤觸類皆滋泰山起雲無逺不徧雖昆蟲草木與蠻貊要荒樂其所生安其所習在牛羊而勿踐有干戈而載戢又況於衣冠華夏禮樂邦家而不形於斯須不彰於漸漬者也夫然何敎非德何化非經何能事之不舉何醇精之未極周溥洋溢成乎緝熈至於太和莫不允若體包天地之大事岀皇王之表豈擎跽曲拳盡禮極力將用彦聖不啻其口所能稱誦於吾君所可殆庶於至德且往者之有開也天感精以降聖聖敬命以奉天此誠有元則欽眀文思及玆報本必嚴祗齋栗靈慶以屬之神化以荅之與𥘉相明其微乃著紛綸先兆非篤信歟由是言之統天者人合符者聖而美德序命殊尤卓絕豈多乎哉至于古之興王必有所感五帝更尚五運傍通土者黃中之精於金爲母水者善利之物於土爲妃苟應期而有來必合德而爲表是則然矣天其或者亦阜育羣化發揮蕃祉始告以聖有明徵終成乎帝之神冊因其立象之本㑹以相乗之數則載祀六百歷紀千年變而通之胡可量也宗子宗正卿襃信郡王璨若干人伯父伯兄仲叔季弟聚族相與詣闕上言天意昭著固巳乆矣人事符合亦云至矣而一德是建太階旣平靈臺靈沼赫赫明明天之爲大雖莫能名王之在鎬豈無頌聲上𥘉克讓抑而未許至於累請乃曰俞哉史臣不敏敢獻頌曰茫茫元昊載凝載薄在帝庖羲繼天而作浩浩洪水包山襄陵舜亦命禹夏氏以興龍圖龜書二主是􅈾湯武巳下夫何足徵右元命於爍巨唐乗運而起纉禹之統系堯之紀五聖在天丕命曾孫高視河洛同符混元亦有黄龍岀於靈沼眀眀穆穆天子之表右聖德倬彼東井昭章于天沈精降液下爲靈泉泉靈有泚有深無底泌之洋洋其甘如醴清德之鑑柔道之體洪源濬規實天所啓右龍泉濯濯靈泉洞冥皇祇滋液流行化爲神池曰止曰行惟聖之作匪鱣匪鮪惟龍之躍植物斯生動物斯樂天根有見曾是不涸右神池靈有休氣紛紛郁郁如山之苞如雲之族潛龍在下瞻烏在屋兆云其吉周爰咨詢旣契我龜又叶我人鎬雖舊京其命惟新右休氣蜿蜿黃龍神池自出靈化惚恍噴雲沃日告帝之符其儀孔佶或潛于泉或見在田與時順動亦應于天克酬我皇無得稱焉靈武受命宫頌并序楊炎臣聞享天降命惟德也戡難奉時惟聖也必有非常之運是興撥亂之功君以蒼生爲憂不以濡足爲患以寧濟爲業不以修身爲道此陶唐所以捨而不畏舜禹所以受而不疑靈武宫皇帝躍龍之所日者奸臣竊命四海蕩波我聖皇天帝探命曆之數啓龍圖作受命之書付于我皇帝皇帝方遊崆峒以求至道於是羣公卿士負玉旒金璽望氣芒碭之野三進於閶闔之中曰臣聞在昔蚩尤連禍大盜中國神農氏兵莫能勝天降玄女勑軒轅氏大定其災厥後堯有九州之害而命禹禹以四海之功而受舜陛下主鬯大位十有九年精爽者皆美德馨乾坤也必聞幽􅐌玄德上逹景福有歸六聖覩命曆之期兆人有臨難之請陛下畏災運而不處棄黎元而不顧以至仁爲薄以大寳爲輕臣等若不克所請與億兆之衆將𬒳髪拊膺號於天而訴於帝矣皇帝唯然改容曰豈人心歟丁卯廣平王俶太尉光弼司徒子儀尚書左僕射冕兵部尚書輔國與北軍將士西土耆老萬五千人排闥以訴帝曰今豺狼穴居宫闕陛下兆庶爲餌宗廟爲墟若臣等誠懇未通是高祖不歆於太廟且陛下涉渭則洪流涸廻鑾則慶雲見布澤而川池廣勤道而嘉禾生靈祗髣髴玄貺幽感臣聞符命待聖而作天運否終而㑹葳㽔盻蠁㑹也睿武英明聖也臣等敢昧死上聞帝乃灑齋宫啓金匱嗚咽拜受詔有司大赦天下改元曰至德元年尊聖父爲文武太皇帝是日烟雲變作士庶踴躍黃龍見於東郊紫氣滿於天門翌日也數百里衣裳㑹兼旬也數千里朝貢㑹踰月也天下兵車㑹浹時也四方戎狄㑹以一旅成百萬之師率胡夷平社稷之難禮郊祀戴聖皇與人合誠心以氣消天癘動罔不吉歆無不報是以白鹿擾於王庭靈芝産於延英化動而功成淵黙而頌聲言禪代者陋蒼梧易姓之名語嗣守者羞唐堯積善之辱述戡定者歎四紀而復夏美中興者蚩三六而滅新於戲神祗之所歸往品物之所法象鼓飛龍於尺水仗大義而東向矢謨發号實在玆都願篆石宫庭以垂萬古㑭過山澤知風雨之奥窮造化識天地之鑪臣炎稽首敢獻頌曰赫赫河圖啓天之祜雲從億萬皇在九五惟昔陶唐克傳舜禹濩也武也夫何足數彼妖者勃惟暴惟貪天實即命人將不堪皇曰内禪于再于三盡武之善去湯之慙兵車百萬洶洶雷震橫㑹九州爲行爲陣恃力者踣從命者順孝以奉天神而撫運至德唐堯崇功大禹皤皤北叟垂白而覩沛邑空歌周原巳古徘徊頌聲永介玆土重校正唐文粹卷第十九之上重校正唐文粹卷第十九之下吳興姚鉉纂頌乙揔三首封禪紀泰山銘附玄宗御製大唐封禪頌張說大唐封東嶽朝覲壇頌蘇頲紀泰山銘附玄宗御製朕宅帝位十有四載顧惟不德懵於至道任夫難任安夫難安兹朕未知獲戾於上下心之浩蕩若涉於大川賴上帝垂休先后儲慶宰衡庶尹交修皇極四海會同五典敷暢歲云再熟人用大和百辟僉謀唱予封禪謂孝莫大於嚴父謂禮莫尊於告天天符旣至人望其積固請不巳固辭不獲予與夫二三臣稽虞典繹漢制張皇六師震疊九㝢旌旅有列士馬無譁肅肅邕邕翼翼溶溶以至于岱宗頂也爾雅云泰山爲東岳周官曰兖州之鎭山實惟天帝之孫羣靈之府其方處萬物之始故稱岱焉其位居五岳之伯故稱宗焉曰昔者受命易姓於是乎啓天地薦成功序圖録紀氏號朕承先王兹率厥典實欲報玄天之眷命爲蒼生之祈福豈敢高視萬古自比九皇哉故設壇場於山下受羣方之助祭躬封燎於山上兾一獻之通神斯亦因高崇天就廣增地之義也乃仲冬庚寅有事東岳類于昊天上帝配我高祖在天之神罔不畢降粤翌日禪於社首侑我聖考祀於皇祗在地之神罔不咸舉曁壬辰覲羣后上公進曰天子膺天符納介福羣臣拜手稽首稱千萬歲慶荅歡同陳誡以德大渾叶度彛倫攸叙三事百揆時乃之功萬物由庚兆人允植列牧衆宰時乃之功一二兄弟篤以孝友錫類萬國時惟休哉我儒制禮我史作樂天地擾順時惟休哉蠻夷戎狄重譯來貢累聖之化朕何慕焉五靈百寳日來月集㑹昌之運朕何感焉凡今而後儆乃在位一王度齊衆法攉舊章𥙷缺政存簡易去煩苛思立人極乃見天則於戯天生蒸人惟后時乂能以美利利天下事天明矣坤厚載物惟后時相能以厚生生萬人事地察矣天地明察鬼神著矣惟我藝祖文考精爽在天其曰懿予㓜孫克享上帝時若馨香其丕乃曰會我之文武曾孫其誕錫新命纉我舊業永保天禄子孫其承之予小子敢對揚上帝之休命則亦與百執事尚綏兆人將多于前功而毖彼後患一夫不獲萬方其罪予一心有終上天其知我朕惟寶行三德曰慈儉謙慈者覆無彊之言儉者崇將來之訓自滿者人損自謙者天益苟如是則䡄迹易循基構易守磨石壁刻金記後之人聽詞而見心觀末而知本銘曰惟天生人立君以理惟君受命奉爲天子代去不留人來無巳德涼者滅道高斯起赫赫高祖眀明太宗爰革隋政奄有萬邦罄天張宇盡地開封武稱有截文表時邕高宗稽古德施周溥茫茫九夷削平一鼓禮備封禪功齊舜禹巖巖岱宗衍我玄神中宗紹運舊邦惟新睿宗繼明天下歸仁恭巳南面絪緼化醇告成之禮留諸後人𬗟予小子重基五聖匪功伐高匪德矜盛欽若祀典丕承永命至誠動天福我萬姓古封㤗山七十二君或禪社首或禪云云其迹不見其名可聞祗遹文祖光照舊勲方士虚誕儒書齷齪佚后求仙誣神檢玉秦災風雨漢汙編録德未合天或承之辱道在觀政名非從欲銘心絶巖播告羣岳大唐封禪頌張說皇唐六葉開元神武皇帝再受命致太平乃封岱宗禪社首鑿石紀號天文煥發儒臣志美立碣祠壇曰厥𥘉生人俶有君臣其道茫昧其風朴略因時而欻起與運而紛落泯泯没没無聞焉爾後代聖人取法象立名位衣裳以等之甲兵以怛之於是禮樂出而書記存矣反其源致敬乎天地報其本致美乎鬼神則封禪者帝王受天命告成功之爲也閱曩聖之奥訓考列辟之通術疇若天而不成曷背道而靡失由此推之封禪之義有三帝王之略有七七者何傳不云道德仁義禮智信乎順之稱聖哲逆之号狂悖三者一位當五行圖籙之序二時㑹四海昇平之運三德具欽明文思之美是謂與天合符名不死矣有一不足而云封禪人且未許其如天何言舊史者君莫道於陶唐虞舜臣莫德於臯陶稷卨三臣降德皆有天下仲尼叙帝王之書繫周秦之誓明魯祀周公用王禮秦承伯益接周統孔聖微㫖不其效歟然秦定天下之功高享天禄之日淺天而未忘庭堅之德也故大命復集干皇家天之賛唐不惟奮矣其興之也玄靈啓迪黃祇顧懷應歸運以義舉撫來蘇以利見護也無放夏之慙武也無伐殷之戰高祖創業四宗重光德有格天漏泉蒸雲濡露菌蠢滋育氤氲涵煦若天地之覆載日月之照臨溥有形而歸景罄無外而宅心百有八年于玆矣皇帝攘内難而啓新命戴睿宗而纉舊服宇宙更闢朝庭始位蓋羲軒氏之造皇圖也九族敦序百姓昭眀萬邦咸和黎人於變立土圭以歩曆革銅渾以正天蓋唐虞氏之張帝道也天地四時六官著禮井田三壤五圻成賦廣九廟以尊祖定六律以和神盖三代之設王制也武緯之文經之聖謩之神化之然猶戰戰兢兢日愼一日納規誨以進德遂忠良以代工講習乎無爲之書討論乎集賢之殿寵勇爵貴經明翼乎鵷鸞之列在庭毅乎貔豹之師居鄙人和旁感神寶沓至乾符坤珍千品萬類超圖溢牒未始聞記我后以人瑞爲心不以物瑞爲意王公卿士儼然進曰休哉陛下孝至于天政合乎道前年祈后土人獲大穰間歲祀圓丘日不奄朔感祥以祈聖因事以觀天天文交合其則不逺意者喬丘埽路望翠華之來上帝儲恩俟蒼壁之禮乆矣焉可專譲而廢舊勛羣臣固言勤帝知罪至于再至于三帝乃挹之曰欽崇天道俯率嘉話恐德不類敢憚于勤其撰廵狩之儀求封禪之故旣而禮官不戒而備軍政不謀而輯大姥練日雨師灑道六甲按隊八陣警蹕孟冬仲旬乗輿乃出千旗雲引萬㦸林行霍濩燐爛飛熖揚精原野爲之震動草木爲之風生歷郡縣省謡俗問百年舉百祀興墜典葺闕政攸徂之人室家相慶萬方縱觀千里如堵城邑連歡丘陵聚舞其中垂白之老樂過以泣不啚蒿里之魂復見乾封之事堯雲往舜日還神華靈鬱爛熳乎穹壤之閒是月來至于岱祗祓齋宫滌濯靜室凝神玄覽將款太一議夫泰山者聖帝受天官之宫天孫揔人靈之府自昔立國莫知萬數克升中而建號惟七十而有五我高宗六之而今七矣非夫尊位盛時眀德曠代遼闊難并之甚哉先時將臻夫大封也累封疆於高岡築泰壇於陽趾夫其天壇三襲辰陛十二咸秩衆靈列坐有次崇牙樹羽管磬鏞鼔宫懸於重㙺之内干戚釵殳鈎㦸戣戵周位於四門之外伐國重器傳代絶瑞旅之於中庭玉輦金轂翠冒黄屋夾之於端路庻官百辟羗夷蠻貊襃成之後讓王之客序立於禮神之場髦頭弩牙鐡馬金鏃介胄如雪旗幟如火遠帀於清禁之野於是乎以天正上元法駕徐進屯千乗於平路留羣臣於谷口皇帝御六龍陟萬仞獨與一二元老執事之人岀天門臨日觀次沆瀣宿巉巗赤霄可接白雲在下庚寅𣏌高祖於上封以配上帝命衆官於下位以享衆神皇帝冕裘登壇奠獻俯僂叶金奏佾羽舞撞黃鐘歌大吕𨳩閶闔與天語清將信公奉斗布度懋建皇極勤恤蒼生昭嘏乎未兆禳災乎未萌上下傳節而禮成樂遍福壽同歸而帝賜神䇿乃檢玉牒於中頂揚柴燎於高天庶忠誠之上達若慿熖而駕煙日轡方旋神心餘眷五色雲起拂馬以隨人萬歲山呼從天而至地越翌日尊睿宗侑地祗而禮社首遂張大樂覲東后國風惟舊無黜幽削爵之誅王澤惟新有眚災大賚之慶不浹日至化洽於人心不崇朝景福遍於天下然後藏金匱於祏室廻玉鸞於上都煌煌乎眞聖朝之能事而髙代之盛節者也于斯之時華戎殊俗異音同歎曰兵合多雨山峻多雲豈有大舉百萬之師剋期千里之外及行事之日則天無點翳地無纎塵嚴冬變爲韶景寒風鬱爲和氣非至德其孰能動天如此其順者乎昔人云自西自東自南自北無思不服今信知聖人作而萬物覩其心服之之謂矣或曰祭泰析主先后非禮歟曰是禮也非冝也王者父事天母事地侑神崇孝無嫌可也且夫柴瘞外事帝王主之蒸嘗内事后妃助之是開元正人倫革弊禮起百王之法也故令千載睋末光聆絶韻咀甘實漱芳潤爍玄妙之至精流不巳之淑聲臣說作頌告于神明四皇墳而六帝典雖吉甫亦莫能名徒採彼輿人之詩曰大矣哉維天爲大惟皇則之率我萬國受天之祺子孫百代人神共保綏之云爾而巳矣大唐封東嶽朝覲頌并序蘇頲封祀之山五在中國㤗嶽首之昊穹之命再集巨唐皇帝受之臨位十四年考虞氏歲巡之義諷周王時邁之什十月辛酉歩自有洛十一月景戍帳殿齋於岳趾淵黙以淸繹思而照將紀功布度順斗承天精享也巳丑宏觀軼區宇盛儀振開闢高臨建鳳萬隊張皇以燭山上御飛龍百神翕習以扶道國台二藩后四髦士密侍信臣髙位扈封臺列升陛不下五十以聖言沖邈瑶牒寳書誓之㫖曰朕獲守丕業恐不克駿命惟上帝儲休錫蒼生無疆之慶朕之慶也古則秘之何哉屬寒馳迅飈露淸終夕若掃若鋤晏然而巳庚寅天官次籙王制恊時嚴高祖以配之嗣髙宗以陟之冕裘立珪璧序㓗罍爼調鍾吕倨勾於簨簴戞擊乎柷敔寶駢瑞兮物焜煌空薄霄兮音客與則纎塵不動和氣充塞日在於觀天爲之門楊日大光謂小天下昭以抱戴見之卿靄郁郁紛紛喜氣烟煴當芝檢引紫熏太紫洞而三辰接鬱蒼揺而萬歲聞自下達上徯吾君君之來兮望如雲端兮睟聖之門至尊辛卯有事于社首以泰折如泰壇於穆我䜭宗侑而作主奠獻嗚咽天子之孝也僉以金匱歸勛於祖禰石䃭藏美於乾坤戒咸祑則司存癸巳載大旂合大樂三陔崛以惟抗四亞鏘而輅止朝羣牧揆千官底邦賦數庭實華蟲辨等車馬來覲周人隨人二王之賔戎狄蠻貊萬里重譯必拱于著執贄奉璋顒顒昂昻靡敢怠遑乃建雞竿伐鼉鼓帝命出皇恩溥揚巽風作解雨施舎之蕩滌之宥法罪除頗纇澒湧洋溢周流黮䨴不崇朝而遍者與此山俱疇翳而不拔胡㣲而不鋪也亦旣稱壽申命宗伯咨爾頌焉效古之刻石臣頲稽首再拜而言曰臣聞昔在帝堯臣惟咎繇聦明之謂聖邁種之謂德天若曰依于巨唐易姓者李王於中華崇功者唐聖之澤德之浸也我唐祚之興昌符誕膺兩儀動六葉承皇帝宣高祖四宗之景烈肇開元神武之明號廣矣大矣莫有不寧罔有不俾咸一德之輔不二心之臣羣后抗詞曰臣聞先王因天事天因地事地因名山升中于天陛下得天之經得地之義得人之行行也者孝莫大焉兼三才以爲政政也者仁其大焉含萬物以爲性今三才貞萬物亨六典平九功成官不滔獄不放至于刑淸良有以也因斯而談淸明在躬志氣如神之睿者君也四國干藩四方干宣之美者臣也有物有則我君臣保乂之原所由於前設其教於後爾往歲邦危中否天討内難陛下提三尺之劒羾閶闔絶勾陳趨北軍正北辰然後翼翼乾乾尊尊親親立我蒸人聖考所以付天下之公器蹈汾陽之淸塵唐雖舊邦其命惟新古者振兵釋旅祠土祈穀先事也我是以幸太原祭汾睢耀金甲肅邊鄙虜馬讋而不敢南向解嚴京師獲寶鼎獻宗廟戍人歸而盡務東作報福京坻於是乎爰佐五畤郊天以奉時爰崇九室祫祖而敬思昭格遟遟神人允釐無何籍三脊盛六穗不召斯至擁休之類如山則委曷月而秘豈非享物降嘉司火也立渾同度在璿也陛下姑謂之薄臣所未諭且管氏詫齊帝王凡八十九湮淪鬱没孰若致美我高宗勒岱甲子正六十盻蠁葳㽔故能應期我神武惟繼代奉業增髙保鴻缺乎中何也即先后以權蹔阻千運二宗紹復未遑厥功神闇之契不在諸子而當聖躬固不可辭者審矣帝曰俞畏德之不稱而左輔右弼雜搢紳鴻碩之倫抱蕝懷書蒸雲吐霧方集賢内殿講議前席以論之傳不云乎君子勤禮敬之至也易不云乎先王作樂豫以動也愼矣哉禮樂之爲用故執禮者具刪弊則質冝之自我變樂者理去啇何害謙以爲臣二者洽而三讓之制曰可始嚴鹵簿騰七萃啓禁關迴九重以聽乎鸞聲之雍雍匪疾匪徐物有其容動植讃華夷觀駢闐緫撙羡漫半散出成臯踰滎波馮滑臺眺洪河遂並昆吾之墟倘佯乎大舜之澤瀕四瀆二濟入于兖徑九一三齊喬於岱推二旬有六而頓行在莫不皤皤華皓如藿傾陽或牽以餼或捧之觴傴僂乎康莊一以伸神武之今日一以感乾封之舊章廼餼歸之觴舉之慈且惠而與之驩沸渭頡頑矧國鄒魯家洙泗乗汶野而圖記可知指泮林而頌聲不墜以周公之故將孔子之後翹然希王者之屬車聖人之淸蹕則乆及信宿之應巖巖所瞻宗神曰天齊王加一等於三事户二十供王祀環十里禁人樵報也大禋旅之數重襃成之禄撫遺甿賜之復帝曰吁夫艱難繫王業休咎牽人事況天監之殊祥也殊典也不自滿而䖍鞏于位朕寶臣曰乾曜洎說有𥘉有終時乃風欽哉汝作朕左右丞相繄汝忠益以嘉猷補衮之闕罔或怠遂弘天封煥天章篆介丘而旋德陽大饗乎羣方程後代美其律聲其實墳作四而籍言七也臣頲不敏繼伯夷之直淸㣲太史之留滯聆金奏同百獸之舞振木鐸採萬人之詩敢陳詩以頌曰天子聖兮天孫崇登以封兮報以功受命再惟皇代天之賚人所載士馬山嶫戈矛山沓禎符山雜靈響山荅天與人合我鋪衍兮長粹清太元冊兮太一精休光光我之慶成舜四朝而禹萬國莫之我京重校正唐文粹卷第十九之下
