  text: 九十八
  hash: sha256:c4a61c09e618a25a295b3b11cfe8e2c506143c43a73f9c24bf88d786d86ae69f
body:
  text: 宋姚鉉編序辛總二十五首餞别餞張尚書赴朔方序賈曽送桂州邢中丞序蕭昕送裴中丞赴黔中序權德輿餞副大使移軍廣陵序李白送建安郡守之任序盛均送陳郎将歸衡嶽序李白送幽州李端公序韓愈送崔羣序栁宗元送權十一序李白送區冊序韓愈送張承祖之東都序李白送王塤秀才序韓愈送王棨序陳黯送符載歸蜀省覲序崔羣送族叔楊行元下第歸廣陵序歐陽詹送族弟旭下第東歸序蕭頴士送從姪耑遊廬山序李白送薛處士序杜牧别中嶽二三真人序陳子昂餞十七翁二十四翁尋桃源序李白送靈徹上人歸沃州序權德輿送林公歸衡嶽序李白送浮屠文暢師序韓愈送簡師序皇甫湜送𤣥上人歸天竺寺序權德輿餞張尚書赴朔方序賈曾王者大司馬制軍詰禁封國正朔惠綏蠻貊刑齊猾夏其儀尚矣天子道穆三象功清六合截海來威窮荒揆教将以靜流服度藩畿削惲凌暴昭蘇寡弱乃命元宰兵部尚書燕公専節朔方授律羣帥涉河之外距闗之西公皆統之重分閫也公智以開物精以造微文為一變之英武有萬人之敵歴登庶尹王猷載寧三宅台衡帝采惟亮雖坐堂足以制勝而勤國忘其定居閹茂次年仲夏貞閏拜手東洛馳軺北闕備官而行成旅以從是日也景風司至星火殷宵伯趙鳴而戒隂爽鳩習而揚武賦可以昇髙逺望詩可以出宿餞行有詔具寮爰開祖宴且申後命寵以蕃錫天章賦别御札題牋副衣勉挾纊之誠兼閫喻投醪之㫖筐篚以将其貺筆硯以表其文前載未書今冊斯覩侍中安陽公以仁體國中書令河東公以德熙朝爕贊功成訏謀景服慕采薇之興悵伐木之朋詢彼之師卜兹郊候鼎門右轉岐路旁分當闕塞之斷山接華林之髙樹幕人宿設重帟雲平太官饔舉百羞霞錯四夏六𦙍之變朱干玉羽之容雷殷川原電烻林薄朝傾多士巷無居人接盖隂衢揚袂風野羽觴逓進列座酣而不譁清鐃間發将士激而愈厲視日知其吉氣吹律騐其商聲則已景列穹都風騰沙漠西域輕郅支之使東胡息冒頓之虞顧夫南仲于征吉甫薄伐不其逺也若木還照前茅起行聽闐闐之去鼓目悠悠之轉斾歌事者每懷靡及念離者跂予望之成志在心發言同唱自天子有式叙清風請編出車之什以繼蒸人之雅夏日送桂州刺史邢中丞赴任序蕭昕桂林巨鎮臨川荒服居五嶺之表控兩越之郊俗比華風化同内地然而洞居砦止人好阻兵有殊貨重裝吏無亷政選其任者實難其才故郡乆曠官朝思稱職以腹心之寄輟爪牙之雄俾其澄清行獨坐之事俾其式遏摠防禦之權惟帝知人佇報尤政五月維夏畏途萬里溽暑方起火雲始生履蒼梧瘴癘之郊涉沅湘風濤之壯衆悦是舉而傷此行公陳力滅私飲氷徇節以忠則九折之塗可叱以信則三江之水可航聚糧戒徒肅装候傳無酒酤我緩仳離之憂徴文寵别慰行邁之思僕以渭陽之故而首序云奉送裴二十一兄閣老中丞赴黔中序權德輿裴兄居諫大夫五年休聞籍甚其於匪躬據古切劘獻替掖垣衆君子徒見其拜章伏閣而莫知其所言者然則發舒純誠𢎞大聦明以貢於穆清者可勝道哉每漢庭大僚與六官貳職之缺羣情屬目俟其授受乆矣壬子詔書有黔巫長帥之拜秩於清憲褒以命服周行諸公以為一方之幸且惜其去而未喻也及夫别殿前席沃心交感重藩符之所付慮安集之不稱凡所以輟近臣惠逺人之㫖纎悉備厚上許周月之代兄求三嵗之理又以見首公急病而忘其僻逺淹䘏然後諸公知惜别為細而感恩為大在此行矣自牂牁通夜郎置吏以示綏懷以安剽輕失其理則蕭然愁擾得其和則驩然感悦方略招徠繫於官師以兄之慈惠直信粹清廉白為仁由己不改其度使大化淳流在明誠洞開推人情以賦政便習俗而不擾彼四封之内如熱待濯如水走下史臣操簡以傳循吏使者急宣以將徴命雖欲復三嵗之言其可得乎未間則褰赤帷飲醇酒晏晏言笑中無町畦雖鬱蒸霧雨之候無自而入矣大丈夫被薦紳彯華纓𢎞宣職業無有逺邇則嚮之玉堂清禁論思侍從與今之龍節前導金龜映組皆所以事君也豈有中外之異耶祖軷霑醉宣言相勉在加飡寓書而已至若山川風物與離騷瞻望之嘆皆備於詩人所賦故兹不書餞副大使李藏用移軍廣陵序李白夫功未足以盖世威不可以震主必挾此者持之安歸所以彭越醢於前韓信誅於後況權位不及於此者虚生危疑而潜包禍心小拒王命是以謀臣将啖以節鉞誘而烹之亦由借鴻濤於奔鯨膾生人於哮虎呼吸江海横流百川左縈右拂十有餘郡國計未及誰當其鋒我副使李公勇冠三軍衆無一旅横倚天之劍揮駐日之戈吟嘯四顧熊羆兩集䝉輪扛鼎之士杖干將而星羅上可以決天雲下可以絶地維翕振虎旅赫張王師退如山立進若電逝轉戰百勝僵屍盈川水膏於蒼溟陸血於原野一掃瓦解洗清全吳可謂萬里長城横斷楚塞不絶五嶺之北盡餌於倄虵勢盤地蹙不可圖也而功大用小天髙路逺社稷雖定於劉章封侯未施於李廣使慷慨之士長吁青雲且移軍廣陵恭揖後命組練照雪樓舩乗風簫鼓沸而三山動旌旗揚而九天轉良牧出祖列將登筵歌酣易水之風氣振武安之瓦海日夜色雲㠶中流席闌賦詩以壯三軍之事白也筆已老矣序何能為送建安郡守之任序盛均大禹分九州之産生物各有其處獨人之善惡無區别之地是聖人知民心牽於所化也夫理有風而化有本國者風帝王之理邦者本牧守之化二漢以還風化相蕩貪波㪍漲人不棲身故有得一郡若豪虎之暴豚羊焉猛既有餘化宜不善也有唐洗叔世之弊惟牧守不新其規實乃知風化之本未可移去然則禄食者佐國不務其理為邦不敞其化愚不知夫禄食之道也惟閩嶠拔一臂西指則建安在焉其郡襟山而束水其人猱黠而易隨等閩之支屬特稀聞善化者得非地深法蠧㑹斂無時猾吏坐姿姦欺黎庶日為葷蠆哉皇帝逺懷疲俗樂有嘉政使君前刺三郡雅稱善化今兹東授必能伸病俗以抒重寄矣将期後賀特以序行春於南浦與諸公送陳郎将歸衡嶽序李白仲尼旅人文王明夷苟非其時賢聖低眉況僕之不肖者而遷逐枯槁固其宜邪朝心不開暮髮盡白登髙送逺使人增愁陳郎將義風凛然英思逸發來下専城之榻去邀才子之詩動清興於中流汎素波而徑去諸公仰望不及連章祖之序慚起予輙冠名賢之首作者嗤我乃為撫掌之資乎送幽州李端公序韓愈元年今相國李公為吏部員外郎愈嘗與偕朝道語幽州司徒公之賢曰某前年被詔告禮幽州入其地迓勞之使累至每進益恭及郊司徒公紅袜首鞾袴握刀左右雜佩弓韔服矢揷房俯立迎道左某禮辭曰公天子之宰禮不可如是及府又以其服即事某又曰公三公不可以將服承命卒不得辭上堂即客階即坐必東嚮愈曰國家失太平於今六十年夫十日十二子相配數窮六十其将復平乎必自幽州始亂之所出也今天子之大聖司徒公勤於禮庶幾帥先河南北之将來覲奉職如開元時乎李公曰然今李公既朝夕左右必數數為上言元年之言殆合矣端公嵗時來夀其親東都東都之士大夫莫不拜於門其為人佐甚忠意欲司徒公功名流千萬嵗請以愈言為使歸之獻送崔羣序栁宗元貞松産於巖嶺髙直聳秀條暢碩茂粹然立於千仞之表和氣之發也禀和氣之至者必合以正性於是有貞心勁質用固其本禦攘氷霜以貫嵗寒故君子儀之清河崔敦詩有柔儒温文之道以和其氣近仁復禮物議歸厚其有稟者歟有雅厚質方之誠以正其性慤論忠告交道甚直其有合者歟是故日章之聲振於京師常與隴西李杓直南陽韓安平洎余為交杓直敦柔深明沖曠坦夷慕崔君之和安平厲莊端毅髙朗振邁悦崔君之正余以剛柔不常造次爽宜求正於韓襲和於李就崔君而考其中焉忘言相親黙與道合今將寧覲東周振䇿于邁且餞於野或命為之序余於崔君有通家之舊外黨之親然吾不以是合之崔君以文學登於儀曹揚于王庭甲俊造之選首讐校之任然吾不以是視之於其序也故載之其末云金陵與諸賢送權十一序李白斯髙柄秦嬴世不二三傑伏草與漢並出莽夷朱揮耿鄧乃起自古英逹未必盡用於當年去就之理在大運爾我君六葉繼聖熙于𤣥風垂拱穆然紫極天人其一哉所以青雲豪士散在商鈞四座明哲皆清朝旅人吾希風廣成蕩瀁浮世素受寶訣為三十六帝之外臣即四明逸老賀知章呼余為謫仙人盖實録耳而嘗採姹女於江華收河車於清溪與天水權昭夷服勤爐火之業久矣之子也沖恬淵静才翰駿發白每一篇一札皆昭夷之所操吁捨我而南若折羽翼時嵗律寒色天風枯聲雲帆涉漢冏若絶雷舉目四顧霜天崢嶸銜盃敘離而羣子賦詩以出餞酒仙翁李白辭送區冊序韓愈陽山天下之窮處也陸有丘陵之險虎豹之虞江流悍急横波之石亷利侔劒㦸舟舩上下失勢破碎淪溺者往往有之縣郭無居民官無丞尉夾江荒茅篁竹之間小吏十餘家皆鳥言夷面始至言説不相通畫地為字然後可以告以出租賦奉期約是以賓客遊從之士無所為而至愈待罪於斯且半嵗有區生者誓言相好自南海挐舟而來升自賓階儀觀甚偉坐與之語文義卓然莊周云逃空虚者聞人足音跫然而喜矣況如斯人者豈易得哉入吾室聞詩書仁義之説欣然喜若有志於其間也與之翳嘉林坐石磯投竿而漁陶然以樂若能遺外聲利而不厭貧賤也嵗之初告歸拜其親酒壺既傾序以識别暮春於江夏送張承祖之東都序李白吁咄哉僕書室坐愁亦已乆矣每思欲遐登蓬萊極目四海手弄白日頂摩青穹揮斥幽憤不可得也而金骨未變玉顔以緇何嘗不捫松傷心撫鶴歎息誤學書劍薄遊人間紫禁九重碧山萬里有才無命甘於後時劉表不用於禰衡暫來江夏賀循喜逢於張翰且樂舩中遇達人張侯大雅君子統泛舟之役在清川之湄談𤣥賦詩連興數月醉盡花栁賞窮江山王命有程告以于邁煙景之色惨為愁容繫飛㠶於半天汎渌水於遥海欲去不去更開芳樽樂雖寰中趣逸天外平生酣暢未若此時至於清談浩歌雄筆麗藻笑飲醁酒醉揮素琴余實不愧於古人也揚袂逺别何時歸來想洛陽之秋風鱠伊魚以相待詩可贈逺無乃闕乎送王塤秀才序韓愈吾甞以為孔子之道大而能博門弟子不能徧觀而盡識也故學焉而皆得其性之所近其後離散分處諸侯之國又各以其所能授弟子源逺而末益分盖子夏之學其後有田子方子方之後流而為荘周故周之書喜稱子方之為人荀卿之書語聖人必曰孔子子弓子弓之事業不傳惟太史公書弟子傳有姓名字曰馯臂子弓子弓受易於商瞿孟軻師子思子思之學盖出曽子自孔子殁羣弟子莫不有書獨孟軻氏之傳得其宗故吾少而樂觀焉太原王塤示予所為文好舉孟子之所道者與之言信説孟子而屢贊其文辭夫㳂河而下苟不止雖有疾遲必至於海如不得其道也雖疾不止終莫幸而至焉故學者必慎其所道道於楊墨老荘佛之學而欲之聖人之道者猶航斷港絶潢以望至於海也故求觀聖人之道者必自孟子始今塤之所由既幾於知道如又得其舩與楫知㳂而不止嗚呼其可量也哉送王棨序陳黯黯去嵗自襃中還輦下輔文出新試相示其間有江南春賦篇末云今日併為天下春無江南兮江北某即賀其登選於時矣何者以輔文家於江南其詞意有是句非前朕耶今春果擢上第夏六月告歸省於閩命序送行某辭以未第言不為時重輔文曰吾所知者惟道與義豈以已第未第為重輕哉愚繇是不得讓鱗羣之衆也必聖其龍羽族之多也必瑞其鳳鳳非四翼龍非二首所以異於鱗羽者惟其稀出耳嚮使日百時千盈川溢陸則虵虺鳩雀無非龍鳳矣其誰曰聖且瑞哉進士科由漢迄唐為擢賢之首也寰瀛之大億兆之衆嵗貢其籍者數纔于千有司升其名者復止于三十其不為貴而且稀乎輔文早嵗業儒而深於詞賦其體物諷調與相如揚雄之流異代而同工也故角於文陣而聲光振起今之中選是榮其歸想寧慶之晨為鄉里改觀孰不謂人之龍鳳乎懿哉輔文是行也足以自重送廬嶽處士符載歸蜀覲省序崔羣旄頭光明垂三十載不習爼豆化為侯王者十有八九焉由是隠逸憔悴羔雁不行蒼山沈沈側陋不顯建中初有峨嵋客符君發六籍棹三湘深入匡廬絶迹半紀學窺顔子之門閾文紹陳君之骨鯁逸慕嚴光之垂釣志效管寧之不欺結廬熙熙人不知其然也頃予奉命江西三年往復彭蠡未甞不詠湖月潄天倪造符君雲扃宿五老峰下動更晦朔不理還櫂偶丹霄至人白鶴羽客搴靈芝跪天壇相顧永息乎蓬瀛豈復又縈於塵網覩君超澹愴興舊遊雖笑語飲食如常終忽忽若居大夢君家在岷蜀展愛髙堂将聖賢典籍充人子幣帛斯所以激衰俗扇清風方伯地君不以厚禮遲吾子予未之信秋九月楚人歌採蘭以送之送族叔楊行元下第歸廣陵序歐陽詹族叔行元既射策與主司不合春二月將歸淮南所寓羣公設祖方獻未酬族叔悄然有不暢之色羣公亦愕爾而阻懽小子侍觴奉而前曰歸好事春美時酒樂物叔於三者加同人将之而有未悦豈禮闈失意之為乎昆吾産金荆山産玉自民役巧鎔琢盖多惟干将和璞有大聞非百鍊則其良可用歟非三獻而其寶可真歟苟良苟真不即成不即售適以精其研稔其實如叔也亦何稽於一邂逅哉若昔之人作必行動必中則是蘓秦無履穿之嘆寗戚無石爛之歌孫𢎞無十上之勤商鞅無再干之勞也知泰而不知否知易而不知難是夫人也非所以待乎叔也叔如之何叔欣然見卞氏又來之路平歸心納春景安酒意四座以協千鍾以娛既醉昇車秋為到期送族弟旭帖經下第東歸序蕭頴士吾族旭也洵美有聲夫蒸蒸者行之能翼翼者體之敬工文足以標絶唱深識足以剖羣疑兼而備焉實為難者意其倍積風之力駭絶電之姿從東道以載馳去南溟而一息此其分也翳明代擇人宜乎盡能使輪轅當曲直之適鑿枘靡圓方之嘆則宏綱舉而浮議息矣以吾弟不羈之才逢聖君如渇之日而徴求章句見遺甲乙是猶籠鸑鷟絆騰黄望遼廓權竒其可得也吾聞諸君子非無位之患惟立身實難今爾有是才居是屈能卷舒其道喜愠不形又其冲融坦蕩莫可得而窺也不然書未十獻嵗未二毛道非擺闔交無薦寵而雄雖先進歎甚後時何哉論者以為人之望也仲春二月東京千里之子往矣薄言旋歸賦詩而寵别皆上國之選莫不銜憤屑涕抗詞悲歌吾乃知道術親而然諾重也況乎西遷而五陵是宅南渡而二曹其昌居宋有摯疇之姻在周為魯衞之國曽是共祖不待馮商之言已為路人未處陶生之嘆今也于邁如何勿思詩不云乎凡今之人莫如兄弟不廢急難之謂也秋於敬亭送從姪耑遊廬山序李白余小時大人令誦子虛賦私心慕之及長南遊雲夢覽七澤之壯觀酒隐安陸蹉􅋸十年初嘉興季父謫長安西還時余拜見預飲林下耑乃稚子嬉遊在傍今來有成鬱負秀氣吾衰乆矣見爾慰心申悲道舊破啼為笑方告我逺涉西登香爐長山横蹙九江却轉瀑布天落半與銀河爭流騰虹奔電潨射萬壑此宇宙之竒詭也其上有方湖石井不可得而窺焉羨君此行撫鶴長嘯恨丹液未就白龍來遲使秦人著鞭先往桃花之水孤負夙願慙未歸於名山終期後來攜手五嶽情以送逺詩寧闕乎送薛處士序杜牧處士之名何哉潛山隠市皆處士也在山也且非頑如木石也在市也亦非愚如市人也盖有大智不得大用故羞恥不出寧肯與市人木石為伍也國有大智之人不能大用是國病也故處士之名自負也謗國也非大君子其孰能當之薛君之處士盖自負也果能窺測堯舜孔子之道使指制有方弛張不窮則上之命一日來子之廬子之身一日立上之朝使我輩居則來問學仕則來問政千辯萬索滔滔而得若如此則善苟未至是而遽名曰處士雖吾子自負其不為矯歟某敢用此贈行别中嶽二三真人序陳子昂夫愛名山歌長往世有之矣若夫放身霄嶺宴景雲林卑俗不可得而聞時士不可得而見則吾欲髙視終古一笑昔人嵩山有二仙自浮丘公王子晉上朝玉帝遺跡金壇鳳笙悠悠千載無響吾每以是臨霞永慨撫膺増歎常謂烟駕不逢羽人長往去囂世走青雲登玉女之峰窺石人之廟見司馬子㣲馮太和霓裳眇然㝠壑獨立真朋羽㑹金漿玉液則有楊仙公𤣥黙洞天賈上士幽棲牝谷玉笙吹鳳瑶裝駐鶴方且迷軒轅之駕期漫汗之遊吾亦何人躬接兹賞實欲執青節從白蜺陪飲崑崙之庭觀化𤣥元之府宿心遂矣𡨕骨甘矣豈知瓊都命淺金籙道㣲攀倒景而迷途顧中峰而失路塵縈俗累復汨吾和仙人真侣永幽靈契翳青芝而延佇遥㑹何期折丹桂而徘徊逺心空絶紫烟去黄庭極仰寥廓而無光視寰區而寡色悠悠何往白頭名利之交咄咄誰嗟𤣥運盛衰之感則如楊朱岐路墨子素絲尚平辭家而不歸鮑焦抱木而枮死可以慟可以悲古人之心吾今得之矣奉餞十七翁二十四翁尋桃源序李白昔祖龍滅古道嚴威刑煎熬生人若墜大火三墳五典散為寒灰築長城起阿房并諸侯殺豪俊自為功髙羲皇國可萬世思欲凌雲氣求仙人登封泰山風雨暴作雖五松受職草木有知而萬象乖度禮刑將弛則綺皓不得不遁於南山魯連不得不蹈於東海桃源之避世者可謂超升先覺夫指鹿之儔連頸而同死非吾黨之謂乎二翁耽老氏之言繼少卿之作文以述大雅道以通至精巻舒天地之心脱落神仙之境武陵遺跡可得而窺焉問津利往水引漁者花藏仙谿春風不知從來落英何許流出石洞來入晨光盡開有良田名池竹果森列三十六洞别為一天邪今扁舟而行笑謝人世阡陌未改古人依然白雲何時而來歸青山一去而誰往諸公賦桃源以美之送靈澈上人廬山迴歸沃洲序權德輿昔廬山逺公鍾山約公皆以文章廣心地用贊後學俾學者乗理以詣因言而悟得非𤣥津之一𣲖乎吳興長老晝公掇六義之清英首冠方外入其空者有沃洲澈上人上人心冥空無而跡寄文字故語甚夷易如不出常境而諸生思慮終不可至其變也如風松迭韻氷玉相扣層峰千仞下有金碧􅌶鄙夫目目初不敢眎三復則淡然天和晦於其中故覩其容覽其詞知其心不待境靜而靜況㑹稽山水自古勝絶東晉逸民多遁世於此夏五月上人自罏峰言旋復於是邦予知夫拂方袍坐輕舟泝㳂鏡中靜得佳句然後罙入空寂萬慮洗然則嚮之境物又其稊稗也鄙人方景行企尚之不暇惡敢以離羣為歎哉江夏送林公遊衡嶽序李白江南之仙山黄鶴之爽氣偶得英粹後生俊人林公世為豪家此土之秀落髪歸道専精律儀白月在天朗然獨出既灑落於彩翰亦諷誦於金口閒雲無心與化偕往欲将振五樓之金䇿浮三湘之碧波乗杯泝流考室名嶽瞰憇𡨕壑凌臨諸天登祝融之峯巒望長沙之烟火遥謝舊國誓遺歸蹤百千開士稀有此者余所以嘆其峻節揚其清波龍象先輦迴眸拭視比夫汨泥沙者相去九牛之一毛昔智者安禪於台山逺公託志於廬嶽髙標勝槩斯亦嚮慕哉紫霞摇心青楓夾岸目斷川上送君此行羣公臨流賦詩以贈送浮屠文暢師序韓愈人固有儒名而墨行者問其名則是校其行則非可以與之游乎如有墨名而儒行者問其名則非校其行則是可以與之游乎揚子雲稱在門牆則揮之在夷狄則進之吾取以為法焉浮屠師文暢喜文章其周遊天下凡有行必請於搢紳先生以求詠歌其所志貞元十九年春将行東南栁君宗元為之請解其装得所送叙詩累百餘篇非至篤好其何能致多如是耶惜其無以聖人之道告者而徒舉浮屠之説贈焉夫文暢浮屠也如欲聞浮屠之説當自就其師而問之何故謁吾徒而來請也彼見吾君臣父子之懿文物事為之盛其心有慕焉拘其法而未能入故樂聞其説而請之如吾徒者宜當告之以二帝三王之道日月星辰之行天地之所以著鬼神之所以幽人物之所以蕃江河之所以流而語之不當又為浮屠之説而瀆告之也民之初生固若禽獸夷狄然聖人者立然後知宫居而粒食親親而尊尊生者養而死者藏是故道莫大乎仁義教莫大乎禮樂刑政施之於天下萬物得其宜措之於其躬體安而氣平堯以是傳之舜舜以是傳之禹禹以是傳之湯湯以是傳之文武文武以是傳之周公孔子書之於冊中國之人世守之今浮屠者孰為而孰傳之耶夫鳥俛而啄仰而四顧夫獸深居而簡出懼物之為已害也猶且不脫焉弱之肉强之食今吾與文暢安居而暇食優㳺以生死與禽獸異者寧可不知其所自耶夫不知者非其人之罪也知而不為者惑也悦乎故不能即乎新者弱也知而不以告者不仁也告而不以實者不信也余既重栁請又嘉浮屠能喜文詞於是乎言送簡師序皇甫湜鳳羽而麟毛鳥與獸也經傳以比聖人豈非以其心不以其形者耶師雖佛名而儒其行雖夷狄其衣服而仁義其心雖未齒於士與麟鳳類矣不猶愈於冠朝冠服朝服或溺於淫怪之説以斁彛倫者耶嗚呼師吾獨賢也刑部侍郎昌黎韓愈既貶於潮浮屠之徒懽快以抃師獨憤起訪予求叙以行資適潮不顧虵山鰐水萬里之險毒若将朝得進拜而夕死可者嗚呼悲吾絆不得侣師以馳送𤣥上人歸天竺寺序權德輿度門之教根於空寂因修以取證階有以及無不踐精深之習而悟虛無之理者未之有也未得為得則其病歟僕乆味斯法思與言者既而得𤣥禪師師早誦大乗經各數萬言晩得觀門之學今則色空如一哀樂不入矣桑門之患為外見所雜既得之患為内見所縛今𤣥公翛然於二見之間不内不外𡨕夫至妙身戒心惠合於無倪且以勾吳有山水之絶境天竺又經行之淨界振錫而往其心浩然盖隨縁生興觸物成化而不為外塵所引也幅巾男子權德輿稽首唐文粹巻九十八欽定四庫全書唐文粹巻九十九宋姚鉉編傳録記事總一十五首
