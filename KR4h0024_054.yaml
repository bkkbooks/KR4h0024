body:
  text: 呉興姚鉉纂碑五表附揔六首古跡三禹穴碑鄭魴麟臺碑韋表微圯橋石表附梁肅土風一長沙土風碑張謂遺愛二唐淮南節度使崔公頌德碑李華唐杜歧公遺愛碑權德輿禹穴碑銘并序鄭魴惟帝聖世時必有符命在昔黃帝始受河圖而定王籙宓羲得神蓍而垂皇䇿堯配琁璣玉衡以齊七政舜繼成六德文王獲赤雀丹書而演道定謨予亦以謂禹探其穴得開世之符而成乎水功夫神人合謀而行變化天地定位隂陽濳交五行迭王斗建司節岳尊山而瀆長川乃至日星雷風禎祥秘奥三綱五紀萬樂百禮人人物物各由身生無非玄功冥持至數㳷合以及之者王者奉天而行故聖神焉帝皇焉彼聖如仲尼有德而無應故位止於旅人福弗及生靈乃歎曰鳯鳥不至河不出圖吾巳矣夫然後知元命者軒后命者羲受命者曰唐與虞成命者禹備命者文仲尼不受命乃假人事而言故有宗予之說後代無作焉立言者一仁義以束世教瞽瞶蚩蚩使絶其非望使業之外存而不論予讀夏書無是說司馬子長自敘始云登㑹稽探禹穴不然萬禩何傳焉惑矣蒼山之潴呀如淵如陵徙谷遷此中不騫雨洗煙空㰹然莫窮噫實禹迹之所始終唐興二百八祀寶曆景午秋九月予從事于是邦感上聖遺軌而學者無述作禹穴碑廉察使舊相河南公見而銘之曰禹穴冝載夏與秦胡爲而不載禹貢無悅秦始皇游㑹稽李斯刻石亦不言古而不載遷與鄭胡爲而載始司馬遷自叙探禹穴而后千百年無說至鄭乃製斯碑予以謂天德統萬止言其蓋言其盖萬物以生非談天氏所謂蓋天者也地德統萬止言其載言其載萬物以生也堯德統萬止言其大傳云堯能則天之大千川萬山皆禹之㑹讀為㑹稽之㑹一符一穴禹穴藏五符統而言之故曰一不足爲最故夏與秦俱不之載而人以之昧雖山之堅雖洞之濊有時而堙有時而兌歳其萬千風雨濤汰亡其嵌呀叢是蘙薈鄭與遷斯碑斯載斯時之頼麟臺碑銘并序韋表微夫聖人作然後王道明王道明然後瑞應至靈貺感通理合㝠數昔殷道剥喪民罔攸歸於是文王以有位之聖嗣成湯之德神人咸乂故鳯鳴于岐洎周德淩遟道靡所屬由是仲尼以無位之聖述文武之法憲章聿修故麟見於魯于時王室無主禮法盡去天子之尊存乎位號魯周公之所封用四代之禮樂遺風故典鬰而未發仲尼以天縱之德生乎其中居周公之邦志文武之道觀廢興之運知作者在已位不得以庇生民權不得以司刑賞是天将喪斯民也而未喪斯文也乃綴絕緒申舊章變其禮文配爲典憲擥五常之龜鏡正三綱之䡄轍帝王之道幽而復明盛德大業於是乎在天錫嘉瑞光昭厥功故周敬魯哀不得而有也由此觀之蓋春秋爲王法之器魯國爲王法所寄在其所寄以舉其器鼓仁義爲舟航權襃貶爲篙檝乗橫流之波濟天下之溺上無列國之輔下無陪臣之助故道不信於天下而信於智者法不著於當時而著於後代向使仲尼有滕薛之土得三家之衆興我王澤霈及蒸民則麟出其郊得其所矣豈復厄於虞人哉故麟不見則孔聖之道不彰麟不死則周室之亂不極嗚呼聖人之生也得其時則化行乎江漢不得其時則道屈於季孟靈瑞之出也於其時則名薦於郊廟不得其時則身罹於殘夭是聖人能順時以濟人不能反時以自聖靈瑞能因時以應感不能反時以自靈被厄於陳蔡獲麟於大野影響之應其符著矣春秋傳曰有以告者曰有麏而一角者何孔子曰孰爲來哉孰爲來哉夫豈不知乎蓋殺之而不敢有故示人以疑之故也元和五年冬十一月表微以滑之從事使乎鄆停驂訪古經獲麟之舊壤且曰後之人築臺於此以旌厥路感先聖之不遇俾麟岀而非時徘徊道周乃作銘曰二儀旣闢三象乃乖聖道堙􅓹人心不開上無文武下有定哀吁嗟麟兮孰爲來哉周雖不網孔實嗣聖詩書載刪禮樂大定懲惡勸善歸邪反正吁嗟麟兮克昭符命聖與時合化行位尊苟或乖戾身窮道存於昭豐邑栖遑孔門吁嗟麟兮孰知其昏運極數没德至時否楚國􅐛廣秦封益侈牆仞迫阨﨑嶇闕里吁嗟麟兮靡有攸止世治則麟世亂則麏出非其時麋鹿同羣孔不自聖麟不自神吁嗟麟兮夫復何云圯橋石表銘并序梁肅臨淮之下邳有古圯橋蓋漢少傳留文成侯張良受神人黃石公兵書之地初留侯醜秦高帝在豐龍虎不起風雲未㑹黃石公知天衢欲平否極必傾秦之亡而漢之昌故先以興亡之符而授留侯且曰孺子可敎後得濟北黃石其我也故以號云夫受命之君與佐命之臣将欲敘天道定人倫則必幽賛明神恊成大勲在皇帝氏方平蚩尤時乃玄女啓符風后行誅然後迎日推筴天下大治在帝堯方憂水害時乃洛岀九疇禹成九功然後萬國底寧黎民時雍在漢祖方征秦項時乃黄石授兵留侯演成然後紲嬰軹道斬羽垓下自昔玄圖元命著在篆籕皆片言隱辭無益帝載惟此三后感及神書文章昭明大業用興易稱人謀鬼謀百姓與能又曰神道設敎而天下服蓋謂是矣凡志不定則事不成謀不從則業不廣留侯不遭黃石無以定其志高祖不獲留侯無以廣其業人神參并漢道乃行不然何通降聖賢君臣遇合上得天統中爲帝師如此其盛也大曆七年予旅游次墮履之地於是鑚石勒銘揚于邳圻庶恃力違天徼功妄作之輩于以儆戒之爾銘曰隂陽之精不測曰神厥有黄石假形爲人告謨留侯夷項滅秦跡寄榖城精還氤氲惟帝軒后肇興兵謀玄女降符實平蚩尤爰洎陶唐洪水橫流天乃錫禹洪範九疇亂秦紛如帝在草茅赫矣黃石亦命留侯丕顯有唐紹漢絶風革暴承天與軒比崇亦有反常貪亂國功人神莫從動罔弗凶有開必先惟德乃同冝究兹道順于家邦作爲紀銘永鑒無窮長沙土風碑銘并序張謂天文長沙一星在軫四星之側上爲辰象下爲郡縣遁甲所謂沙土之地雲陽之墟可以長往可以隱居者焉其山麓山其水湘水其畜冝鳥獸其榖冝秔稻厥草惟繇蕑杜若荃蘅留荑䔾車岀焉厥木惟喬椅桐桂檉貞松文梓生焉篠簜嬋姢於原野碔砆照耀於崖谷昔熊繹始在此地番君因之而後定王國至漢道凌遟董卓狼顧文臺以三湘之衆績著勤王梁朝覆没侯景虎視僧辯以一州之人勲成定國桓文之舉亦何加焉至於致禮舊居請屍歸葬桓氏之子可謂忠也殞身强冦有死無辱尹氏之女可謂貞也軾鄧粲之宅足以厚儒風表古初之墳足以敦素行齊魯之俗其何逺哉巨唐八葉元聖六載正言待理湘東郡臨江湖大抵卑濕脩短疵癘未違天常而云家有重膇之人郷無斑白之老談者之過也地邊嶺瘴大抵炎熱寒暑晦明未愆時序而云秋有爀曦之日冬無凛列之氣傳者之差也巴蛇食象空見於圖書鵩鳥似鴞但聞於詞賦則知前古之善惡凡今之毁譽焉可爲信哉因徴故者之言用紀他山之石辭曰舜去黃屋於焉巡遊禹逢玄夷於焉滯留五嶺南指三湘北流隣聮滄浪邊遥峋嶁湘山之下青青衆草有蕙有蘭在江之㠀煙雨冥冥波瀾浩浩不采不擷棄捐逺道湘山之上青青衆木有栝有松在巖之麓風霜淒淒柯葉沃沃不榱不棟老朽空谷陸有玉璞水有珠胎隋侯云亡卞氏不來湘雲莽蒼湘月徘徊貞石紀事層城之隈淮南節度使尚書左僕射崔公頌德碑銘并序李華昔在召公相武王除害去虐敷命帝廷周公佐成王卜洛定宅登頌清廟奉康王㑹朝豐宫克致太平惟崔公相玄宗保寧聖德鎭安天下輔肅宗掃除凶穢紹享天命今上振宣明威撫綏淮海惟申伯翊宣王登南邦興周室小白率諸侯征楚翟奉王職與崔公叶德同勲皆姜姓也夫議盛德論大功賛大賢舉其殊倫卓然昭明不巳書其細申大體也故詩陳方叔之烈曰方叔元老克壮其猷又美韓侯之封曰有倬其道韓侯受命今述崔公亦不名不備官古之制也後魏尚書亮八代至公海内首族人倫德範公少負文學重名且兼宏略揚于王庭甲科入仕歷京兆倉曹叅軍再遷司勲貟外丁太夫人憂以毁聞終喪拜刑部貟外兼侍御史知劔南節度留後使逆臣起幽陵陷潼關至尊哀兆人思古公避狄之義於是帝車西南依我心膂拜中書侍郎平章事劒南節度採訪使玄宗克讓聖子家爲唐虞公岀納王命至于朔方弼諧二聖孝慈光明自西自東殄殱元惡天討之師岌如山行冠若霜藁鼓燎無存帝曰爾圖實叶朕志官中書令封趙國公公拜稽首臣敢上冒以負天明帝遂其高俾作少師師訓東宫兼長邦憲居守洛京乃傅濟王又典汾州王德日宣汾州阜安乃統江淮主三軍省萬人加工部尚書時征鎮之司恃勲奸令公獨露奏慝用輟興轉吏部淮南旣淸軍有餘逸夷難江南萬里康哉六歲在鎭心馳王幄戀慕之極至于流涕獻章請朝帝恩降允公不俟駕建斾将馳耆耋泣訴吏人遮道即日詣闕乞留者三百餘人公申諭而行至于京師天子大恱曰趙國先帝元臣甞爲朕師自我不見于今六年有司如朕意待之加尚書左僕射遂淮南之請所部八州人舞手蹈足秘書少監兼廬州刺史長樂賈深有文武才略忠于王室推心馭下嘉績昇聞戴公仁明思揚盛德合肥令彭城劉商先后之族臨人惠和一州之老㓜咸曰我州我邑敷王德澤崔公封内我是以安其仁不銘其德不可謂華甞忝公游咨以爲頌夫五岳視三公四瀆視諸侯公入掌三公之政出踐諸侯之長昔鄭武公爲卿士詩人賦緇衣魯僖公爲周賢侯史克頌䮐野敢附前烈以書公不朽故襃大臣則王室尊崇美政則王命行不惟頌公尊天王也今載公朝覲之禮以弘大之其文曰思崔公出鎭之崇克孝克忠宣帝之武恢帝之功自蜀自朔至于秦宫出納大命決事于衷思崔公烈烈郁郁以邕以肅乃統淮服洎江之隩闐闐長轂霞斾霜鏃蠢爾兇毒罔不顚覆思崔公三世元臣德綏生人乃朝于王王顧殊倫且曰東南飲化如春爲朕腹心寧其咏吟思崔公入覲于王鸞聲央央佩玉以鎗秉珪奉璋公復于揚四牡其􅋮公慕彤庭涕濡于裳思崔公廬江州邑孰不垂泣我公之還陽和起蟄乃求樂石樂石爰立刋之頌之介福攸集介福攸集州人斯及𡵨公淮南遺愛碑銘并序權德輿通天下之志者在大君元臣之感㑹而巳成天下之務者在知人安人之敎化而已孝文御㝢貞元十九祀統燭羣生德侔往初建用皇極澤流萬國淮南節度觀察使左僕射相國杜公政成入覲迺三月壬子朔登拜司空秉鈞居中間一歲上皇承末命越八月皇帝受神器弼亮三聖謨明九功當冡宰揔巳之任護崇陵因山之制盡董經費以頒地貢乃作司徒式和人則進封𡵨土命賜備厚均齊天下之政茂遂萬物之冝遵道弘化匪躬宣力中外之重必歸於公初公之入輔也制詔副節度使兵部尚書王公爲左僕射代居師帥州壤鄕部鰥孤㓜艾䝉公之化也乆感公之惠也深鬰陶詠歎願刻金石王公累章上請公輙牢譲中止至是復以邦人不可奪之誠達于聦明且用季孫行父請史克故事故德輿得類其話言而鋪其馨香云公字君卿京兆杜陵人不書名尊大臣也清明廉直温毅弘重易簡之道本於徤順忠智之謀發爲事業慮善以動得時大行其初筮仕州府交辟韋尚書元甫實爲已知始自椽吏累爲命介盈庭闢辯積歲疑留者片言以聽斷含冤自誣具獄論殺者覆視而全活江介吏師以爲神明由殿中侍御史轉主客貟外郎工部郎中再爲撫州刺史以御史中丞領容州刺史經略使入爲金部度支二郎中復兼中丞超拜戸部侍郎岀爲蘇州刺史屬受代者以憂闋換饒州刺史明年以御史大夫領廣州刺史嶺南節度觀察使徵爲尚書左丞復以御史大夫領陜府長史陜虢都防禦觀察使歲在庚午以禮部尚書至于是邦禹貢淮海之域職方東南之奥産金三品射利萬室控荆衡以㳂泛通夷越之貨賄四㑹五達此爲咽頤初公之至也歲丁驕陽人有菜色於是息浮費以恱之蠲雜征以利之夫家之稅有冒没者免其罪以購之廢居之豪有委積者盈其直以岀之瀕海棄地茭芻塡游一夫之勤百畒可穫終古遺利沛然嘉生成於指顧得以蕃殖先是營部未葺囷倉未完介夫半寓於仁祠公聚或委於支郡公乃慮材用量事期輯中權規大壯百堵皆作三軍寧宇轅門言言夏屋耽耽可以張射侯可以容宴豆爰居爰處而武備修矣巨廪崇構翬飛雲矗縮以板幹積如京坻得蓋藏之冝恊岀入之制多黍多稌而禮節行矣連營三十二積穀五十萬工以恱使人以樂成又潴雷陂以漑穡地釃引新渠匯于河流皆省功費而弘利澤俄授左揆竟參大政加徐泗豪等州節度使先皇帝在宥天下推恩彭城顧懷舊勞復命其嗣使得以州師建節而公以二郡進律惟公鎭定一方心平德和言仁必及人言智必及事生聚教訓勤身急病視闔境如棖闑之内撫編人有父母之愛因其習俗而均安之識其慘舒而導利之仕六朝而時推元老踰二紀而再掌邦賦揚美化於方志流淑聲於命書其牧臨川也地叅閩蜑人本輕惰化彼游手敏於農功堅舊防而時其蓄泄當大旱而我有雲雨毎歲徴令歸諸有司克變輸将之勤不虧公上之入因獲贏利悉賙困窮其揔司計也權重輕以平物力受比要以均財征厚生而不匱量入而有節當一人注意之重盡三接沃心之言宰司沮傷不得乆處其鎭南海也服嶺阻深族類猜害塗巷狹陋熛埃接連忿捷相因鬰攸斯作公乃脩伍列闢康荘禮俗以阜火災自息南金象齒航海貿遷悍将反覆逺夷愁擾吏困沓貪商乆阻絶公乃以先大夫代德丕烈之若是公能聿脩而弘大之慿厚貽慶爲不誣矣居鎭十三年願脩覲謁拜章十上西嚮涕洟上難其繼慰勉而巳公以述軄在於庇人納忠在於薦賢密䟽請以王公爲代詔爲之貳曁公之至也由大司寇爲大司馬以副車戎裝伏謁和門禮容渥命寵耀藩服介圭得請丹轂載馳勲籍裨校乞留遮道初諭以温顔終肅以軍法旣告令尹之政卒獲子牟之心詩曰布政優優百禄是遒又曰神之聽之式穀以汝則𡵨公永享鮐耋如岡如陵不待瞽史而前知矣惟王公師長論道如公之位阜俗撫封如公之心且以斯人嚮慕三歲愈甚大懼公之功德寢而不章初撫人廣人皆鏤堅石以攄盛烈及兹而追琢者三矣古所謂立信讓以涖百姓則人之報禮重其在是乎銘曰惟天惠人惟辟奉天利建元侯于藩于宣文武杜公端誠絜矩化洽陜服聿來兹土闢我舄鹵長我禾黍乃建營部乃新廩庾成師足食比屋安堵里閭熈熈衍沃膴膴十有三年慰安斯人雪泣抗章血誠上陳結戀明庭不私其身樹善交代如公之仁考祥視履冝錫蕃祉寅亮三朝是毗是倚密勿中樞矢其謀謨乃升司空亦作司徒九賦旣平五敎式敷中外之重惟公是圖彼都人士飲公之德彼土樂康繄公之力永言介福祀我𡵨國稽合聲詩于胥篆刻彼泉斯實彼石斯泐公之德煇永永無極重校正唐文粹卷第五十四
