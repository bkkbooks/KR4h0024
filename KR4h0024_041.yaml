body:
  text: 吳興姚鉉纂議丙揔十二首謚議十一唐丞相太保贈太師苗晉卿謚議獨孤及唐丞相謚文貞楊綰謚議梁肅唐丞相江陵尹御史大夫吕諲謚議獨孤及駮議吕諲嚴郢重議吕諲獨孤及唐丞相贈司空李揆謚議權德輿唐隴右節度經略大使郭知運謚議獨孤及駮議郭知運崔厦重議郭知運獨孤及唐御史中丞盧弈謚議唐常州刺史獨孤及謚議權德輿古諸矦世子謚議一晉謚恭世子議白居易唐丞相故太保贈太師苗晉卿謚議獨孤及太師稟天純懿爲唐股肱兩朝當國庶績惟允論道賦政送往事居叶㳟秉彞動罔違德惠和以懋其事明哲以保其身昔甞懸衡九流剖竹四郡刀尺之下無滯用𥜗袴之内無貧人洛陽居守東夏輯睦天寶之年二京爲戎皇輿西狩億兆左袵太師踐危機不易心處橫潰不忘國奮身拔跡於犲狼之口道不汗而節不奪忠之大者至德乾元中天下多故皇綱未張肅宗脩漢宣故事用刑名繩下而太師以曹叅爲師持淸靜守職勵翼王度將順事典人亦寧一厥猷茂焉能知人能官人愼選乃僚言刈其楚至有拔羣萃而取公器不五六年比肩衮職者光映冊府當代榮之漢史稱胡廣與故吏陳蕃並爲三司太師有焉夫九德咸事寛爲之首百工惟時哲則能惠冝其享天眉壽爲國元老古者生以行觀其志没以謚易其名字之美惡視行之大小後代或三字以表德貞惠文子是也或二字以彰善鄼文終侯留文成侯是也蓋其跡大名盛則禮優謚崇太師德冠搢紳位侔周召將加誄謚之制冝以鄼留爲准謹按大戴禮體和居中曰懿文賢有成曰獻稽千載之令典合二名以配德請謚曰懿獻謹議唐丞相謚文貞楊綰謚議代太常荅蘇端駮議梁肅議曰有國之典存以位叙其德没以謚易其名名之小大視德之美惡蓋書其著而略其微要其終而明其義故曰謚以尊名節以一惠恥名之浮於行也楊文貞體淳素之質恊時中之德爰自下列至于宰司秉心不渝動必由道與夫立功立事開物濟衆不同日語矣而淸儉厲俗明哲保身曰文與貞在我惟允秉公議者其誰曰不然今奉符謂公與元載交游甞爲載薦引載之咎惡悉歸於公斯乃昧於觀行定謚之義且非君子成人之美也請區而評之昔荀爽爲董卓所舉致位三公及卓斁亂漢政可謂甚矣而漢史曾不以卓之過累於慈明晏子陳氏俱事齊侯陳志邪而晏志正春秋亦不以陳之惡延於平仲是知道不必合事不必同則載之於公其事可見況當載秉鈞而公不叅大政載以時望慕我我則靜而守中因踈爲簡適見淸節文有發載之惡皆漏泄致辭患自掇也庸可救乎及夫載覆其餗公膺大任任職月淺屢以疾辭位且不安安可以啓悟而責之乎昔季文子三尹無食粟之馬衣帛之妾君子以爲忠楊公以大名厚位岀入三朝無宅一區無馬一駟志於清白交不諂瀆可不謂貞乎掌訓誥秉銓衡處成均貳宗伯潤色王度無替厥美加以敏而好學見善如不及可不謂文乎謹按謚法貞之例有三清白守節曰貞大憲克就曰貞憂國忘死曰貞文之義有六經緯天地曰文道德慱聞曰文愍人接禮曰文不恥下問曰文慈惠愛人曰文修德來逺曰文名旣不備事亦殊貫又安可以二王三恪私廟家祭之闕併貴於一名哉若具美果在一名則士文伯孔文子且無經緯天地之文孟武伯寗武子又非克定禍亂之武若以廢禮不稱其名臧孫辰縱逆祀不得謚文管夷吾臺門反坫不得謚敬是知議名之道取其所長則捨其所短志大行則遺其小節使善惡決於一字襃貶垂於將來蓋先王制謚之方也若綜覈名實形於公論冝也取坦然明白彰於遐邇者今或乗人之意肆誣謗之辭所謂抉瑕刺骨之說非正議也且聖人無全能才不必備以鄭公徴立言正色恥君不如堯舜其節大矣而昧於知人許公瓌固執條詔廷沮邪計其志明矣終不能守故春秋爲賢者諱過傳稱不以一眚掩大德語曰無求備於一人蓋二公所以爲文貞也若曰百行所歸九德咸事如周公之文宣然後擬議則千古莫嗣而謚典絶矣安在一二蘇魏足爲定制乎謹上叅典禮近考故事楊公之名請如前議云爾唐丞相故江陵尹御史大夫吕諲謚議獨孤及吕諲任職從政聦敏肅給能以才智潤飾吏道至德中與三司同鞫大獄獨引律文附㑹經義而平反之當時卒用中典諲叅其論在台司齪齪雖無匪躬之能然平章法度守而勿失其爲荆州一年有成號令明具賦歛均一物有制而事有倫大抵以威信爲主戮陳希昻按申太芝之奸而三楚之人恱服厥功茂焉自至德巳來荷推轂受賑之寄處方面者數十輩而將不驕卒不墮政脩人和如諲者蓋鮮矣豈不以人散乆矣而兵未戢挹濁流者難俟淸整棼絲者難爲工諲當此時能以慈惠易其疾苦且訓其三軍如臂使指闔境無拔葵啗棗之盗而楚人到于今猶歌詠之其識略必有過人者雖勿襃之其可乎按謚法威德克就曰肅禁暴威也愛人德也考禮議名而擬諸其形容請謚曰肅謹議駮議吕諲嚴郢伏以故相國江陵尹兼御史大夫贈吏部尚書吕公諲昔事先朝累當大任至德之𥘉天歩艱難公首披荆榛扈蹕靈武忘軀進忠一日三接先朝察匪躬之節納沃心之議爰立作相弼諧神人其嘉謀嘉猷獻可替否之跡入則造膝岀則詭辭温樹不言難可得而知也至有爛焉明白欲蓋而彰者請區而載之乾元收復之際兩都衣冠多繫於三司詔獄御史中丞崔良器議事失入時宰苗太師崔趙公等雖廷諍之然未堅決公有犯無隱引經正辭上是其言刑爲之省所全活者蓋數百人明主收霜電之威聖朝行寛大之典者繄公之力也古者進賢受上賞書不云乎咎繇曰都在知人公踐台衡專以推賢任人爲務故相國房公琯故吏部侍郎韋公陟入登右職皆公之由今相國黃門侍郎杜公之蒞江陵也公薦在方靣之任今相國中書侍郎元公之在度支也公咨以幕府之政曽未數歲而二相接武於上台天地交泰聖賢相得庶績咸熈五典克從者資公之舉善也則子皮之舉子産鮑叔之舉管仲蕭何之舉曹叅武侯之舉蔣琬方之前人我有餘地其在荆南也戢兵和衆令行禁止理績爲天下最雖古之羊杜無得而踰今太常議荆南之政詳矣而曰在台司齪齪無匪躬之能者乃抉瑕掩瑜之論非中適之言也國家故事宰臣之謚皆有二字以彰善旌德焉夫以呂公文能無害武能禁暴貞則幹事忠則利人盛烈弘規不可備舉傳叙八元之德曰忠肅㳟懿若以美謚擬於形容請謚吕公曰忠肅謹議重議呂諲獨孤及愽士獨孤及議曰吕諲任宰相日淺當時㑹肅宗躬親萬務庶政羣臣畏威奉職而巳雖有謨謀於巖廊之上莫由有知之者其荆門之政爲仁由巳略見於事其恩惠被於物風謡存乎人故人得而稱之議名之際敢不闕其所疑而録其尤者著者有司之職也其閱實訟獄在未執政之前前議之詳矣敢辱再告至若推進名賢使登大任旣同温室之樹且行狀所不載孔子曰君子於其所不知蓋闕如也故不書今奉符令必用二字且以忠配肅謹按舊儀凡殁者之故吏得以行狀請謚於尚書省而考行定謚則有司存廷辯可否冝在衆議今駮議撰謚異同之說並故吏專之伏恐亂庖人尸祝之分違公器不私之誡且非唐虞師錫僉曰之道昔周道衰孔子作春秋以繩當代而亂臣賊子懼謚法亦春秋之微㫖也在懲惡勸善不在哀榮在議美惡不在字多文王伐崇周公殺三監誅淮夷晉重耳一戰而霸諸矦武功盛矣而皆謚曰文以兾缺之恪德臨事寗俞之忠於其國隨㑹之納諌不忘其師言身不夫其友其文德豈不優乎而並謚曰武固知書法者必稱其大而略其細故言文不言武言武不言文三代巳下朴散禮壞乃有二字之謚二字謚非古也其源生於衰周施及戰國之君漢興蕭何張良霍去病霍光俱以文武大略佐漢時致太平其事業不一謂一名不足以紀其善於是乎有文終文成景桓宣成之謚雖瀆禮甚矣然猶襃不失人唐興叅用周漢之制謂魏徴以王道佐時近文直言極諫愛君而忘身近貞二德並優廢一莫可故曰文貞公謂蕭瑀端直鯁亮近貞性多猜貳近𥚹言𥚹則失其謇正稱貞則遺其吝狹非一言所能名故曰貞褊公其餘舉凢推類大抵准此皆有爲之也若跡無殊途事歸一貫則直以一字目之故杜如晦謚成封德彝謚明王珪謚懿陳叔逹謚忠温彦慱謚恭岑文本謚憲韋巨源謚昭唐休璟謚忠魏知古謚忠崔日用謚昭其流不可悉數此並當時赫赫以功名居宰相位者謚不過一字不聞其子孫佐吏有以字少稱屈者由此言之二字不必爲襃一字不必爲貶若襃貶果在字數則是堯舜禹湯文武成康不如周威烈王靜愼王也齊桓晉文不如趙武靈魏安釐秦莊襄楚考烈也杜如晦王珪巳下或成或明或懿或憲不如蕭瑀之貞褊也歷考古訓及貞觀以來制度似皆不然今奉所議云國家故事宰相必以二字謚未知所出何品式請具諲當以爲按據若忠者臣事君之常道苟靖恭于位誰則非忠非有炳然之異則不以爲謚如議獄緩死任賢舉善德之美者然肅者威德克就之名足以表之矣月令曰孟秋天地始肅詩曰曷不肅雍又肅肅王命仲山甫將之肅嚴也敬也忠之屬也天地不肅則歲不成宗廟不肅則禮不立軍族不肅則人不服肅之時義大矣哉以諲之從政也威能閑邪德可濟衆故以肅易名而忠在其中矣亦猶隨㑹寗俞之不稱文豈必因而重之然後爲美魏晉巳來以賈詡之籌筭賈逵之忠壯張旣之政能程昱之智勇顧雍之密重王渾之器量劉惔之鑒裁庾翼之志略彼八君子者方之東平冝無慙德死之日並謚曰肅當代不以爲貶何甞徴一字二字爲之升降乎謹上稽前典下據甲令叅之禮經而究其行事請依前謚曰肅謹議唐丞相贈司空李揆謚議權德輿將仕郎守太常博士臣權德輿議曰李揆端莊粹温潔廉淑愼用文章術學資適逢時奮其英華以取貴達如良庖投刃無復肯綮歷諌曹左史司王言貳春官以至于平章大政在帝左右必以文誼藩身奉法遵職官曹無粃政姻族無倖人束帯山立敷陳前志檢然而温有碩儒大臣之度或起或廢其道甚夷昔觀射父能作訓辭以行事於諸侯左史倚相能道訓典以叙百物揆實有之建中中西戎乞盟以舊齒宿望將命殊俗結華夷之信董衣裳之㑹巳事迴車歲當興元匪躬靡盬至河池而殁追錫司空恩禮有加按謚法曰率事以信曰恭不懈于位曰恭揆果行求已致位台司歷官陟降十有八次周旋敬愼以揚職業不曰率事以信乎及逾懸車之年奉絶域之使受詔即路視險若夷貞厲盡瘁復於左轂不曰不懈于位乎昔韋玄成翟方進以經明爲漢相而皆謚曰㳟述揆所履節以一惠勤官死事炳然昭明有司易名請以恭謚故左武衛大將軍持節隴右節度經略大使兼鴻臚卿御史中丞贈涼州都督太原郡開國公郭知運謚議獨孤及郭知運驍勇有謀善於用兵起行間爲唐上將當時唐興百餘載矣天下充富太倉有二十年之蓄玄宗循漢武故事方鋭意拓土知運適與時㑹遂扶乗天威奮其材力敢與虜确故能破黙啜可汗以靖北庭敗吐蕃誅康待賔隴底以西烽火爲息慰薦麾下吏士任必以材往往超倫績用茂著王君奐以果勇代處分閫之寄牛仙客出將入相以清幹信謹稱斯又奬抜之明也當時議者謂知運與郭䖍瓘王晙薛訥並爲中興名將至今隴上將士思之或有起祠宇於故城遺壘尸而祝之者上元中肅宗加太公望以武成王之號知運列於配食之位則其勲伐事業冝有以羙稱易其名者謹按謚法服叛懷逺曰威易曰厥孚威如繫辭曰弧矢之利以威天下虞書曰董之用威傳曰非威非懷何以示德則威者聖人所以佐仁義以齊天下者也施於名號可以表將帥之德請謚知運曰威謹議駮議郭知運崔厦左司貟外郎崔厦議曰郭知運承恩詔葬向五十年今請易名竊恐非禮謹按禮記云禮時爲大又曰過時不爲禮也昔衛公叔文子卒將葬其子或請謚於君曰日月有時將葬矣請易其名者蓋時不可踰也節度旣名不浮行數紀之前門生故吏巳合謀謚今乃申請竊將有爲而作節度嗣子英又頃屬多故屢制方隅朝廷立勲位表端揆附從者竊不中禮㑹無妄之求況節度當開元𥘉賵贈特加碑誌逾等皆出恩命追悼之過亦巳當矣今又鹵莽外於典章追送徃之闕遺啓將來之冒昧況今裂土者接畛專征者百輩若率而行之誰曰無請不惟有司疲於簡牘抑恐名器等於草芥雖曰曲全竊將不可又禮經云巳孤暴貴不爲父作謚若節度合謚而不以其時則嗣子廢先君之德若不合謚而苟遂其志則先君因嗣子而見尊以僕射而言恐貽越禮之讓以國家而言又殊旌善之體請下太常重議重議郭知運獨孤及博士獨孤及議曰禮時爲大順次之將次葬易名時也古有闕禮追逺請謚順也假如諸矦五月而葬魯惠公之薨也有宋師至隱公元年十月巳改葬不以踰時廢禮又公叔戍請謚適當葬前謹按禮經曾不言巳葬則不可追謚況帝王殊塗不相㳂襲新禮則死必有謚不云日月有時今請易名者五家無非葬後苗太師一年矣吕諲四年矣盧奕五年矣顔杲卿八年矣並荷襃寵無異同之論獨知運以其子不幸遂以過時見抑苟必以巳葬未葬爲節則八年與五十年其緩一也而與奪殊制無乃不可乎議云巳孤暴貴不爲父作謚此謂其父無位而子居大官不當以已之貴加榮於父也禮不云乎父爲士子爲大夫葬以士耳若知運者處方面之寄位列九卿茂勲崇名與衛霍侔飾終之禮冝加於他將一等豈待因依嗣子然後作謚今之專征者雖逢風雲化爲侯王其祖父爵位與知運齒者鮮矣奈何懼名器等於草芥以是殺禮竊謂近誣乾元以來累有詔追贈百官祖父内外文武具僚之先悉蒙恩錫或音徽乆沐或墓木巳拱受大名貴位於九原者以萬數未甞以殁代逺近爲限夫贈謚一也贈者一時之寵謚者不刋之令今以歲乆而廢易名是王澤浹於天下而獨隔於一人也當開元二年吐蕃以舉國之師入五原塞擊柝之聲聞於秦雍知運與郭䖍瓘討平之以張王室當時微知運則汧隴之西左袵是懼今朝廷方將命將帥以征不服討不庭冝襃之以勸握兵者安可以葬乆而廢大典況夫謚法者蓋考其言行事業之邪正必以字襃貶之使生者聞羙謚而慕覩惡謚而懼不待賞罰而賢不肖皆勸是一字之謚賢於三千之刑本非爲殁者之子孫以爲哀榮寵贈之具假令知運無子且未甞立勲苟位至上將則謚不可廢豈以其子之存亡爲請謚之可否竊稽載籍徴諸舊章易名之禮請如前謹議唐故御史中丞盧奕謚議獨孤及盧奕剛毅而忠直方而淸勵精吏事所居可紀天寶十四載洛陽覆没于時東都人士狼狽鹿駭猛虎磨牙而爭其肉居位者皆欲保性命而完妻子或先䇿高足爭脫羿彀或不恥苟活甘飲盜泉奕獨正身守位義不去以死全節誓不辱勢窘力屈以朝服就執西向而辭然後受害雖古烈士方之者鮮矣或曰洛陽之存亡操兵者實任其咎非執法吏所能抗師將奔去之可也委身冦讎以死誰懟某以爲不然勇者禦而忠者守必社稷是衛則死生以之危而去之是智免也於忠何有蓋荀息殺身於晉不食其言也仲由結纓於衛不避其難也石丐勤其官而水死守位而忘軀也伯姬待保姆而火死先禮而後身也彼四人者死之日皆於事無𥙷夫豈愛死而賈禍也以爲死輕於義故蹈義而捐生古人書之使事君者勸然則禄山之亂大於里丕孔悝廉察之任切於玄冥之官分命所繫不啻保姆逆黨兵威烈於水火于斯時也能與執干戈者同其勠力挽之不來推之不去豈不以師可虧義不可苟身可殺節不可奪故全其特操于白刃之下孰與懷安偷生者同其風哉謹按謚法圖國忘死曰貞秉德遵業曰烈奕執憲戎馬之間志藩王室可謂圖國矣國危不能拯而繼之以死可謂忘死矣歷官十一任言必正事必果而淸節不撓去之若始至可謂秉德矣先黃門以直道佐時奕嗣之以忠純可謂遵業矣請謚曰貞烈謹議唐故常州刺史獨孤及謚議權德輿將仕郎守太常博士權德輿議曰獨孤及剛方直淸根於性術其修身蒞官確乎處中立言遣辭有古風格辯論裁正昭德塞違濬波瀾而去流蕩得菁華而無枝葉其摳衣入室之徒皆足以掌賛書而秉方冊則及之爲文可徴矣其爲博士時有上議景皇帝不冝爲太祖者詔下庶官及舉夏殷周漢之故事尊祖配天之大㫖以爲景皇帝始封於唐天所命也於是定議爲一代典法新平長公主之子裴敖尚永淸公主欲以他宗主婚及相禮上陳不可竟得以裴僕射遵慶爲主當時稱之定吕諲盧奕郭知運之謚用禮文憲度得襃貶之正凢所往復詞㫖堅明其理舒州屬歲飢旱鄰郡庸亡什四巳上而舒人生聚恱安不知凶年優詔襃異就賜金紫其初在濠其後在常皆因俗爲理人用愛戴雖不得居公卿長帥之任然其奉常議論三郡績用亦足以列於文苑附於循吏按謚法曰博文多能曰憲薦可替否曰憲及酌三王四代之典訓作爲文章以輔教化是爲博聞位叅中外必以稱職聞是爲多能定宗廟之饗爲薦可正婚姻之至爲替否有司稽美行而易其名者請謚及曰憲謹謚晉謚恭世子議白居易晉侯以驪姬之惑殺太子申生或謂申生得殺身成仁之道是以晉人謚爲恭世子載在方冊古今以爲然居易獨以爲不然大凢恭之義有三以孝保身子之恭以正承命臣之恭以道守嗣君之恭若棄嗣於非禮不可謂道受命於非義不可謂正殺身以非罪不可謂孝三者率非恭也申生有焉而謚曰恭不知其可若垂之來代以爲訓戒居易懼後之臣子有失大義守小節者將奔走之將欲商攉敢徴義類在昔虞舜父頑母嚚舜旣克諧瞽亦允若申生父之昏姬之惡誠冝率子道以幾諫感君心至誠雖申生之孝不侔於舜而獻公之頑亦不逮於瞽盍以烝烝之乂俾不格於姦乎故咎之始形則齋慄祗戴而爲虞舜可也若不能及禍之將兆則讓位去國爲吳太伯可也若又不能及難之旣作則全身逺害爲公子重耳可也三失無一得於是乎致身於不義不祗䧟父於不德不慈負罪被名以至於死臣子之道不其惑歟夫以堯之聖書美曰允恭舜之孝書美曰温恭今以申生之失道亦謂曰恭庸可稱乎周之衰也楚子以霸王之器奄有荆蠻光啓土宇赫赫楚國由之而興謚之爲㳟猶曰薄德今申生徇其死不顧其義輕其身不啚其君俾死之後弑三君奚齊卓子懷公殺十有五臣荀息里克丕鄭祁舉共華賈華叔堅騅顓纍虎持宫山祁慶鄭狐突瑕生郄芮實啓禍先大亂晉國則楚恭之得也如彼申生之失也如此異德同謚無乃不可乎左氏修魯史受經於仲尼蓋仲尼之志丘明從而明之無善惡無小大莫不㣲婉而發揮焉至於申生之死也之謚也略而無譏何其謬哉何以覈諸且仲尼脩春秋明則有凢例幽則有㣲㫖其有君不君臣不臣父不父子不子者率書名以貶之故書曰晉侯殺其太子申生不言晉人而書晉侯且名太子者蓋明晉侯不道且罪申生䧟君父於不義也以㣲㫖考之則仲尼之明貶可知矣以凢例推之則左氏之闕文可知矣嗚呼先王之制謚豈容易哉蓋善惡始終必襃貶於一字所以彰明往者而勸沮來者故君子於其謚無所苟而巳矣繇是而言則恭世子之謚不亦誣乎不亦誣乎重校正唐文粹卷第四十一
