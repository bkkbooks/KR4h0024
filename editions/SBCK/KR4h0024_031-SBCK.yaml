body:
  text: 吳興姚鉉纂文甲揔一十三首帝王踐祚四唐髙宗神堯皇帝受禪告南郊文唐玄宗明皇帝受禪告南郊文唐􅁽玄宗明皇帝文賈曽唐􅁽肅宗宣皇帝文賈至封禪二唐高宗天皇大帝封禪文唐玄宗明皇帝封禪文祝壽一唐德宗神武皇帝降誕日獻祝壽文並侯喜告謝一唐德宗神武皇帝平朱泚後告謝昊天上帝文陸贄徽號二唐武宗昭肅皇帝㑹昌二年上尊號玉􅁽文李德􅁉唐武宗昭肅皇帝㑹昌五年上尊號玉􅁽文肆赦一唐德宗神武皇帝奉天改年大赦文陸贄戒勵一唐穆宗文惠皇帝戒勵風俗德音文元稹恕死一唐德宗神武皇帝賜李納田恱王武俊鐡劵文陸贄唐高祖神堯皇帝受禪告南郊文維有隋義寧二年五月乙巳朔二十日甲子皇帝臣某敢昭告于昊天上帝伏以生人以來樹之司牧眷命所矚謂之大寳曆數弗在罔或偷安故舜禹至公揖讓而興虞夏湯武兼濟干戈以定殷周事乃殊途功成一致後之創業咸取則焉臣恭承家慶丗禄降及曰祖曰考累功累德賜履參墟建侯唐社地居戚里門號公宫丕緒隆基足爲榮矣但有隋爽德屬饜大業饑饉師旅民胥怨咨謫見咎徵昭干玄鑒備聞卑聽所不忍言臣恭守􅀳陽馳心魏闕被首濡足拯溺救焚大舉義兵式寧區宇徵要荒之辮髪輯兆庶之離心誓以􅂢軀救兹人命指陳喪亂期之乂安有功繼丗無希九五惟身與子竭誠盡力率先鋒鏑誓以無貳載蒙弘誘克濟艱難電掃風驅廓清天邑傳檄而定岷峨拱手而平􅀜隴西戎即敘東夷底定非啓非賛孰能兹速尊位丗嫡翊奉宗隋勠力輔政無虧臣節值鼎祚云革天禄告移謳謌獄訟聿來唐邸人符神瑞輻湊微躬逺近宅心華夷請命少帝知期運巳去大命有適遜位而禪􅀂隋之初讓德不嗣羣臣逼請今六宗乏祀七政未齊罪有所歸恐當天譴請因吉日設壇告􅀋祗畏上帝惠兹下民翼子謀孫罔敢愆德則小則大無惑無違對越鴻休伏深慙懼謹遣太尉某用薦告之禮瑞􅁽蒼璧香萁明粢嘉􅂼禋祀干皇皇后帝明靈降享仍改義寧二年爲武德元年大赦天下唐玄宗明皇帝受禪告南郊文皇帝臣某敢以玄牡昭告干皇皇上帝上皇厭理萬機凝情太古釋兹重負與道優游宇宙不可以無君宗社不可以無主恭惟曆數猥當虚薄懼忝帝位固辭不免遂膺大禮以馭下人敬擇元日告􅀋上帝惟神敷祐四海永綏天極唐􅁽玄宗明皇帝文賈曽朕以寡昧䖍奉鴻休本殊王季之賢早達延州之節昔者聖曆巳讓皇嗣之尊曁至神龍終辭大弟之授豈惟衣冠所覩抑以兆庶咸知頃屬國歩禾夷時艱主㓜大業有綴旒之懼寶位深墜地之憂議迫公卿遂司契象日愼一日以至于今一紀之勞勤亦至矣萬􅀖之俗化漸行矣將成夙願脫屣寰區昔堯之禪舜惟能是與舜以命禹匪私其親神器之重允歸公授皇太子某有大功於天地定阽危於社禝温文旣習聖敬日躋委之監撫巳移年歲時政益明庶工惟序朕之知子庶不負時曆數在躬冝陟元后可令即皇帝位有司擇日授􅁽朕方比跡洪古希風太皇神與化遊思與道合無爲無事豈不美歟王公百寮冝識朕意唐􅁽肅宗宣皇帝文賈至維天寶十五載歲次丙申月戊子朔二十一日戊申太上皇􅀂曰咨爾元子某惟天爲大惟人君則之順乃德故舜禹揖讓而履皇桎咈乃道故丹朱商均不能保鴻業是以啓有惠迪而夏嗣焉隋有亂紀而唐受焉五聖之御㝢皆以勤儉兢業日愼一日故能享祚長乆垂慶無窮洎于六葉恭位四海厭于勤倦􅃡募汾陽將保静頤神思我烈祖玄元之道是用命爾元子當位嗣統於戲爾有忠孝之誠極于君父爾有友愛之義信于兄弟爾有仁恕之行通于神明爾有戡難之才彰于兆庶予懋乃懿德嘉乃神武天之曆數在爾躬汝惟推誠禍亂將兾爾永清汝惟從諌宗社將兾爾復寧佞言惟疵直言惟師任賢勿貳去邪勿疑民非后孰治后非賢罔與守􅀖欽哉愼乃有位無忝我祖宗之丕烈矣唐高宗天皇大帝封禪文嗣天子臣某敢昭告于昊天上帝有隋運屬顚危數窮否塞生靈塗炭鼎祚淪亡高祖仗黃􅃏而救􅀺元錫玄圭而拯沈溺太宗功宏鍊石定區宇於再麾業壯斷鼈飲滄海而一息臣忝奉餘緒恭承積慶遂得崐山寢燎炎海澄波雖乃業茂宗祧斯實降靈穹昊今謹告成東嶽歸功上玄大寶克隆鴻基永固凝薰萬姓陶化八紘唐玄宗明皇帝封太山王牒文有唐嗣天子臣某敢昭告于昊天上帝天啓李氏運興土德高祖太宗受命立極高宗升中六合殷盛中宗紹復繼體不定上帝眷祐錫臣忠武底綏内難推戴聖父恭承大寶十有三年欽􅀂天意四海晏然封祀岱嶽謝成于天子孫百禄蒼生受福唐德宗神武皇帝降誕節獻壽文侯喜維孟夏十四日天降皇帝之辰羣臣感覆燾之恩朝明庭而獻萬壽者外盡四海罔有不至時臣亦幸在京師無因縁以陪進􅀼自思念其感恩受賜與羣臣無異徒以其身之卑賤至願莫伸如瘖者欲言躄者欲趨乃作降誕日獻壽文一篇恭置于康莊之衢其辭曰未有人云則有彼天千變萬化􅀆道無常全高明運轉􅀆與人下焉聖人法象􅀆則相永年自我自度􅀆祗畏乾乾天受降福􅀆與人下焉臣今敢獻壽如天博厚配天􅀆其誰則地含容光大􅀆無與二山澤藏寶􅀆富有無旣聖人體順􅀆不愛其利自我自誠􅀆其他至地至地不測􅀆生物咸遂臣今敢獻冨如地日岀輝輝􅀆風來薰薰甘露霡霂􅀆卿雲氛氲民曰五星􅀆生乎今辰愛我則君何以慶􅀆無稱其恩榮華富貴􅀆子子孫孫臣敢獻福􅀆如所聞唐德宗神武皇帝平朱泚後告謝昊天上帝祝􅁽文陸䞇維貞元元年云云嗣天子臣敢昭告于昊天上帝顧惟寡昧不克明道丕膺眷命俾作神主常恐􅀗戾上帝橫災下民兢兢業業夙夜祗畏居位五祀德馨蔑聞皇靈不歆是用大儆殷憂播蕩踰歷三時誠懼烈祖之耿光墜而不耀側身思咎庶補將來上帝顧懷誘衷悔禍勦兇慝之凌􅁀雪神人之憤恥舊物不改臣心載新兹乃九廟遺休兆人介福以臣之責其何解焉間屬㓂虞乆稽告謝今近郊甫定長至在辰謹以玉帛犠牲粢盛庶品兾慿禋燎式薦至誠太祖景皇帝配神作主尚饗唐武宗昭肅皇帝㑹昌二年上尊號玉􅁽文李德􅁉維㑹昌二年歲次壬戌四月乙丑朔十四日戊寅攝太尉光禄大夫守司空兼門下侍郎同中書門下平章事臣德裕銀青光禄大夫守尚書左僕射兼中書侍郎同中書門下平章事臣珙銀青光禄大夫守中書侍郎同中書門下平章事臣李紳及文武百官金紫光禄大夫檢校司徒兼太子太保臣僧孺等六千五百七十四人言臣聞羲皇首太古之號成湯顯神武之稱我高祖皇王是憲尊名􅀂古貽厥丕訓爲孝孫之法豈不善始善述哉矧乃巨唐受命繼體承業理運將至大君以興昊穹所以開至聖也曩者明兩未定帝華不協捨胤傳聖深惟至公先后所以昭天命也亦猶堯發於唐侯文興於代邸神明之祚不其難哉伏惟皇帝陛下清明傳鬯光耿四海玄德眞隣天休大賚日角見表氣志如神爰初定命正心理物如辰居其極而天下無邪矣由是昭德塞違尊賢逺佞禹不自滿成不自康罔盤于田不邇于色自閨壼以施王教由家道而刑國風去比周覈名實擥權綱擇聖德修舊典恊誠質扢嘉壇款太一進正臣以端治表禮故老以求讜言逺無蔽獄近無留命祈玄祖而膏􅀨降祀靈岳而嘉穀登省刑罰而蓬㪍消發倉廪而螽螟息去歲龍旂承祀大輅親郊捧玉瓉而一獻光靈來格振金石而六變魄寶昭臨然猶古訓是學緝熈于道天文炳煥雲漢其章温恭敬遜承太任之教和樂愷悌洽戚藩之心德風偃于羣􅀺威霆動乎絶域又以敬飡不逮於長樂昭配未升於禰宫每懷嗣徽蒸蒸而慕所以奉若慈訓對越兩儀因心立制永錫其教寛底劉之罪興惻隱之仁迴霜收電爲之反禾及單于慕義景附朔邊耀德戢兵謙臨是受至於備文物展國容莫不先甲而布甘澤丁辰而廓隂翳和景晏温卿靄絪緼斯所謂神祇之心應矣天人之際交矣於是服冕之士戴鶡之倫曁藩衛􅀖伯黃髪鮐背不謀而進曰陛下玄黙天睟輝光日新大矣孝熙四極爰臻誠冝玉版温潤鏤鴻明之德神寶焜燿薦萬斯之年丕惟大典不可辭也陛下猶謙退固拒至于三四羣臣不巳乃曰俞哉夫徧覆包含之謂仁極深研幾之謂聖憲度著明之謂文蠻夷震懾之謂武感而遂通之謂神無思不服之謂孝臣等不勝大願謹奉玉寶上尊號曰仁聖文武至神大孝皇帝㐲惟陛下乾徤不息謙尊而光樂戒其耽禽戒其荒壽乃侔於殷宗俗乃厚於成康貽燕後昆受福無疆臣德裕等誠􅂬誠躍頓首謹言唐武宗昭肅皇帝㑹昌五年上尊號玉􅁽文李德裕維㑹昌五年歲次乙丑正月己酉朔一日己酉光禄大夫守太尉兼門下侍郎同中書門下平章事臣德裕光禄大夫守尚書左僕射兼門下侍郎同中書門下平章事臣悰朝議大夫檢校尚書右僕射兼中書門下平章事臣李讓夷朝議大夫守中書侍郎兼戸部尚書同中書門下平章事臣崔鉉及文武百官太中大夫太常卿臣孫簡等六千二百二人言臣聞在昔周宣獫狁内侵四牡薄伐以定王國則詩人大其功曁于漢宣北夷乖亂呼韓慕義郅支逺遁則簡策著其美惟此二代稱爲中興間者開成之末星孛如雲螟飛蔽天先帝感之􅀺人懼焉乃受至聖遺大投艱迄兹成功厥有􅁳數伏惟仁聖文武至神大孝皇帝表應龍翼粹含乾剛神全而正氣凝宇定而天光發智燭千里動必察微心鏡萬機物來斯應於是五材用四維張建中和之極綴前聖之綱重樞機修法制刑御家之理無出壼之言銷䜛邪逺巧佞斥背公之黨退好經之人内嚴體貌増堂陛之峻外絶締交去輔車之勢古所謂受命於天惟舜獨也巳又曰一心定而萬物服唯陛下得之曩者北狄矜功耗蠧中國種􅀋磐牙根柢封殖異術胏附縞衣如荼挾邪作蠱浸􅁋守内倒懸不解百有餘年旣而龍祠堙滅􅂝國款塞質帝女戚海疆有狼顧平城之心鯨吞咸洛之志爰命梟􅀅搴旗刈旃兵鏖穹廬火烈荆榛颺􅄢幙碎轒䡝六羸遯逃貴女生還剗滅妖迹剿除醜􅀋故名王結髣冠帶入臣堅昆稽首鞮譯來獻而又姦臣放命二紀陸梁據太山之固下窺洛邑通故􅄡之道旁睨近􅀜樹其遺孽以􅀼兵柄議者僉曰精甲十萬積榖十年泉魚不察湯網冝懸陛下雄㫁霆聲羣疑冰釋揚清風而掃雲鼔迅雷以破山任馮異則抜天井而震上黨仗呉漢則發突􅀐而傾邯鄲壺關失險山東奪魄屬有戍邊叛將􅀼發參墟人心摇蕩異議放肆陛下臨朝而言曰二㓂獲罪于天予所不捨未三旬而定晉陽纔朞年而滅潞子不以金購狶將多降不勞師克粤首馳報非至德感物孰能臻於此乎由是台宰百辟藩屏將帥上言曰成伐東夷而肅愼來賀景翦七國而王室乃安莫不始於武功終致刑措將以禋上帝薦祖宗冝受鴻名以荅玄貺陛下猶謙遜而五譲之勤請罔巳乃屈巳以俞之雲漢爲章所以昭法度也神明其德所以成敎化也巍巍乎有功帝堯之則也勤于大道玄祖之訓也臣等不勝大願謹奉玉􅁽玉寶上尊號曰仁聖文武章天成功神德明道大孝皇帝伏惟陛下不有其名以保其成不德其功以戒其盈享殷宗之福致周道之平熙我王度永振金聲臣德􅁉等誠歡誠躍頓首頓首謹言唐徳宗神武皇帝奉天改年大赦陸䞇門下致理興化必在推誠忘巳濟人不恡改過朕嗣服丕搆居臨萬􅀖失守宗祧越在草莽不念率德誠莫追於旣往永言思咎期有復於將來明徵厥初以示天下惟我烈祖邁德庇人致俗化於和平拯生靈於塗炭重熙積慶垂二百年伊爾卿尹庶官洎億兆之衆代受亭育以迄于今功存于人澤及於後肆予小子獲纉鴻業懼德不嗣罔敢怠荒然以長於深宫之中暗於經國之務積習易溺居安忘危不知稼穡之艱難不察征伐之勞苦澤靡下究情不上通事旣擁隔人情疑阻猶昧省已遂使興戈徴師四方轉運千里賦車籍馬逺近搔然行齎居送衆庶勞止或一日屢交鋒刃或連年不解甲胄祝奠乏主室家靡依死生流離怨氣凝結力役不息田菜多荒􅁀命峻於誅求疲甿空於杼軸轉至溝壑離去郷閭邑里丘墟人煙斷絶天譴於上而朕不寤人愁於下而朕不知馴致亂階變興都邑賊臣乗舋肆逆滔天曽莫愧畏敢行凌逼萬品失序九廟震驚上辱於祖宗下負於􅀺庶痛心􅌤皃罪實在余永言愧悼􅀂墜淵谷賴夫天地降祐人神叶謀將相竭誠􅀲牙宣力屏除大盜載張皇維將弘永圖必希新命朕晨興夕惕唯念前非乃者公卿百寮累抗章䟽擬以徽號加于朕躬固辭不獲俯遂輿論昨因偱省良用矍然體隂陽不測之謂神與天地合德之謂聖顧惟淺昧非所冝當文者所以化成武者所以定亂今化之不被亂是用興豈可更徇羣情苟應虚美重予不德祗益懷慙自今巳後中外所上書奏不得更稱聖神文武之號夫人情不常繫於時化大道旣隱亂獄滋豐朕旣不能弘德導人又不能一法齊衆苟設密網以罪非辜爲之父母實増愧悼今上元統曆獻歳發生冝革紀年之號式敷在宥之澤與人更始用荅天休可大赦天下改建中五年爲興元元年自正月一日昩爽巳前大辟罪巳下罪無輕重咸赦除之李希烈田恱王武俊李納等有以忠勞任膺將相有以勲舊繼守藩維朕撫馭乖方信誠靡著致令疑懼不自保安兵興累年海内搔擾皆由上失其道下罹其災朕實不君人則何罪屈已弘物予何愛焉庶懷引慝之誠以洽好生之德其李希烈田恱王武俊李納及所管將士官吏等一切並與洗滌各復爵位待之如初仍即遣使分道宣諭朱滔雖與賊泚連坐路逺未必同謀朕方推至誠務欲弘貸如能效順亦與惟新其河南河北諸軍兵馬並冝各於本道自固封疆勿相侵軼朱泚大爲不道棄義蔑恩反易天常盜􅀼名器􅁀犯陵寢所不忍言獲罪祖宗朕不敢赦其應被朱泚脅從將士官吏百娃及諸色人等有遭其扇誘有迫以兇威苟能自新理可矜宥但官軍未到京城巳前能去逆效順及散歸本道者並從赦例原免一切不問天下左降官即與量移近處巳量移者更與量移流人配隸及罰鎭效力幷縁罪犯與諸使驅使兼别敕於諸州縣安置及得罪人家口未許歸者一切放還應先有痕累禁錮反逆縁坐承前恩赦所不說者並冝洗雪亡官失爵放歸勿齒者量加􅀵敘人之行義或未必兼搆大厦者方集於羣材建竒功者不限於常撿苟在適用則無棄人況黜免之徒沈鬱頗乆朝過夕用勿拘常例諸軍諸道赴奉天及進收京城將士等或百戰摧敵或萬里勤王扞固金城驅除大憝赴危難者其節著復社稷者其業崇我圖爾功特加彞典錫名疇賦永永無窮冝並賜名奉天定難功臣身有過犯遞減罪三等子孫有過遞減罪二等當戸應有差科使役一切蠲免其功臣巳後雖衰老疾患不任軍旅當分糧賜並冝全給身死之後十年仍迴給家口其有食實封者子孫相繼代代無絶其餘敘録及功賞條件待􅀵京日並准去年十月七日十一月十四日敕處分諸道諸軍將士等乆勤扞禦累著功勲方鎭克寧惟爾之力其應在行營者並超三資與官仍賜勲五轉不離鎭者依資與官賜勲三轉其累加勲許迴授周親内外文武官三品已上賜爵一級四品已下各加一階仍並賜勲兩轉見危致命先哲攸貴掩骼埋胔禮經所先雖效用而或殊在惻隱而何閒諸道兵士有死王事者各委所在州縣急遞送歸本管官爲葬祭其有因戰陣殺戮及擒獲伏􅇳曝骨郷原者並委所在逐近便􅀵葬應縁流貶及犯罪未葬者並許其家各據本官品以禮收葬自頃軍旅所給賦役繁興吏因爲姦人不堪命咨嗟怨苦道路無聊汔可小康與之休息其墊陌及稅閒架竹木茶􅃮攉鐡等諸色名目悉宜停罷京畿之内屬此㓂戎攻劫焚燒靡有寧室王師仰給人以重勞特冝減放今年夏稅之半朕以兇醜犯闕遽用干征爰度近郊息駕兹邑供儲克辦師旅攸寧式當襃旌以志吾過其奉天冝昇爲赤縣百姓並給復五年尚德者教化之所先求賢者􅀖家之大本永言兹道夢想増懷而澆薄之風趨競不息幽棲之士寂寞無聞蓋誠所木孚故求之不至天下有隱居行義才德高逺晦蹤丘園不求聞達者委所在長吏具名聞奏當備禮邀致諸色人中有賢良方正直言極諌及􅀶通墳典達於敎化并識洞韜略堪任將帥者委常叅官及所在長吏聞薦天下􅀌老鰥寡惸獨不能自活者並委州縣長吏量事優䘏其有年九十已上者刺史縣令就門存問義夫節婦孝子順孫旌表門閭終身勿事大兵之後内外耗竭貶食省用冝自朕躬朕當節乗輿之服御絶宫室之華飾率巳師儉爲天下先諸貢獻自非供宗廟軍國之用一切並停應内外官有冗貟及百司不急之資委中書門下即商議條件停減奏聞布澤行賞抑惟舊章今以餘孽未平帑藏空竭有乖慶賜深愧于懷赦書有所未該者所司􅀋例條件聞奏唐穆宗文惠皇帝戒勵風俗德音文元稹敕朕聞昔者卿大夫相與譲於朝士庶人相與譲於齒周成王刑措不用漢文帝恥言人過眞理古也朕甚慕焉中代以還爭端斯起掩抑其言則專蔽誘掖其􅀃則欺誣自非責實循名不能彰善癉惡故孝宣必有敢告乃下光武不以詭辭遽行語稱訕上之非律有匿名之禁皆所以防三至之毁重兩造之明是以爵人於朝則皆勸刑人於市則皆懼罪有歸而賞有事也末俗偷巧内荏外剛卿大夫無進思盡忠之誠多退有後言之謗士庶人無切磋􅅣磨之益多銷鑠浸潤之䜛進則䛕言謟􅀏以相求退則羣居狎處以相識留中不出之請益發其隂私公論不容之詞實生於朋黨擢一官則曰恩皆自我黜一職則曰事岀他門比周之跡已彰尚矜介特由徑之蹤盡露自謂貞方居省寺者不能以勤恪莅官而曰務求簡易提紀綱者不能以凖䋲撿下而曰密奏風聞獻章䟽者更相是非備顧問者互有憎愛苟非秦鏡照膽堯羊觸邪時君聽之安可不惑叅斷一謬俗化益訛禍發齒牙言生枝葉率是道也朕甚憫焉我國家貞觀開元同符三代風俗歸厚禮譲並行兵興已來人散乆矣姑欲導之以德不欲驅之以刑然而信或未孚理有未至曽無恥格益用彫刓小則綜覈之權見侵於下輩大則機密之重旁撓於薄徒尚念因而化之亦旣去其尤者而宰臣等懼其寖染未克澄清備引祖宗之書願垂戒勵之詔遂申教告頗用殷勤各當自省厥躬與我同底于道凡百多士冝體朕懷唐德宗神武皇帝賜李納田恱王武俊鐡劵文陸䞇維興元元年歲次甲子正月癸酉朔二日甲戌皇帝咨爾具官某嗚呼君者所以撫人失於所撫則叛下者所以奉上乖於所奉則刑各當其理德用不擾各違其分亂於是生朕德薄化淺昧於君道罔知省已姑務眚人是以徴師徂征連歲靡息惟爾以誠志之不達反仄于厥衷阻衆興戎結舋拒守豈非上失其所撫而下失於所奉歟書曰萬方有罪罪在朕躬我實不德兆民非咎俾廢其生業離其室家陷於困窮死於戰陣老病失養孤惸靡依怨結蒼旻感傷和氣朕爲人父母得不愧於心哉晨興以思夕惕以悼粤自嗣位迄今六年天將悔禍朕方覺悟爾亦知之衆心厭亂思以保安叶於朕懷􅀂膺符契非天地合德人神合謀將茂育羣生則何以臻此朕是用上順天意俯從人心滌爾疵瑕復爾爵位坦然靡阻君臣如初功載鼎彞名藏王府子孫代代爲國勲臣河山帶礪傳祚無絶朕方布大信承天子人􅀂食其言何以享國於戲其祗􅀂明命用保無疆之休重校正唐文粹卷第三十一
