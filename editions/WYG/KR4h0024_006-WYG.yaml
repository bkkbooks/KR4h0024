front:
  text: 鉉編
  hash: sha256:7bbf6589c1370d76cda4d0216a0d947939e0da39d5486060d257d0515cbf99d7
body:
  text: 古賦已總一十首名山二華山賦楊敬之霍山賦皮日休華卉草木八牡丹賦舒元輿長樂花賦蘇頲桃花賦皮日休秋蓮賦宋之問荔枝賦張九齡瑞橘賦李德裕伐櫻桃樹賦蕭穎士杞菊賦陸龜蒙華山賦楊敬之嶽之初成二儀氣凝其間小積焉為邱大積焉為山山之大者為嶽其數五余尸其一焉嶽之尊燭日月居乾坤諸山並馳附麗其根渾渾河流從南而來自北而奔姑射九嵕荆巫梁岷道之云逺兮徒遥而賔嶽之形物類無儀其上無齊其傍無依舉之千仭不為崇抑之千仭不為卑天雨初霽三峰相差虹蜺出其中來飲河湄特立無朋似乎賢人守位北面似乎為臣望之如雲就之如天仰不見其巔肅阿芉芉蟠五百里當諸侯田嶽之作鬼神反覆蛟龍不敢伏若歲大旱鞭之朴之走之馳之甘雨瀾漫百川東逝千里而散噫氣蹶然怒乎巖幽漸于人間其聲瀏瀏嶽之殊巧既不可窮見乎中天挲挲而掌峨峨而蓮起者似人伏者似獸物者似池洼者似臼欹者似弁呀者似口突者似距翼者似抱文乎文質乎質動乎動息乎息鳴乎鳴黙乎黙上上下下千品萬類似是而非似非而是其乃繕人事余安得畢議今作帝耳目相其聦明下曯九州在宥羣生初太易時其人俞俞其主人者始乎容成卒乎神農中間數十君姓氏可稱其徒以飲食為事未有仁義時哉時哉义曷足莅是後敬乎天成乎人者必闢其心假其神與之齡降其仁故軒轅有盛德蚩尤為賊生物不遂軒轅用力大事不可獨治降以后牧三人有心烈火就撲其子之子其孫之孫咸明且仁雖德之衰物亦處宜繇夏以降湯發仁以王癸受暴以亡甲戊誦釗不敢有加惟道其常享國遂長天事著矣莫見乎髙而謂其茫茫余受帝命億有萬歲而不敢怠遑臣賛之曰若此古矣祖矣大矣廣矣富矣庶矣駭矣怖矣上古之事粗知之矣而神之言又聞之矣然神起居於上宫室於上如此之久矣其所見何如也曰見若咫尺田千畆矣見若環堵城千雉矣見若杯水池百里矣見若蟻垤臺九層矣醯雞往來周東西矣蠛蠓紛紛秦速亡矣蜂窠聯聯起阿房矣俄而復然立建章矣小星奕奕焚咸陽矣纍纍繭栗祖龍藏矣其下千載改更興壞悲愁辛苦循其上矣臣又問曰古有封禪今讀書者云得其傳云失其傳言語紛綸於神何如也曰若知之乎聞聖人撫天下哀天下既信於天下則因山嶽而質於天不敢多物若秦政漢武則率海内以奉祭祀圖福其已則廟祀相望壇墠迆邐盛氣臭夸金玉聚薪以燔積灰以封天下怠矣然猶歉歉不足秦由是薙漢由是弱明天子得賢者在位能者在職廟堂之上垂衣裳而已其於封禪存可也亡可也霍山賦并序皮日休臣日休以文為命士所至州縣山川未嘗不求其風謡以頌其丈幸上發輶軒使得採以聞六年至夀之駢邑曰霍山山故嶽也邑贅于阯至之二日離邑一舍望乎嶽將頌之文也及見之則目乎戇手乎嚲心乎竦神乎瞀始欲狂其文寫其狀如丹青之不差也頌其風文其謡如金石之永播也既而其精怯然搏敵躁然械囚紛然棼絲怳然墮空浩然涉溟幽然乆􅐄則知才智之劣如耄而加疾将杖而奔者於戲霍山之靈哉霍山之靈哉将閼於神而愚之邪抑有所達而託之邪其辰既浹其精忽渝怯然而勝躁然而敵紛然而靜怳然而安浩然而濟幽然而愈如壯而能決将陣而能敵者於是狂其文寫其狀辭曰太始之氣有清有濁結濁為山峻清為嶽其山厥臣其嶽惟君惟南之鎮曰霍為尊嶽之大與地角壯與天勍勢荆豫華嵩青沂兖岱如垤而秀如塊而鋭嵩之高千仞萬仞蒼蒼茫茫日月相避其光望之數百里外為天棟梁嶽之尊端然御極竦然正位靜然而聽凝然而視其體當中如君之毅其屬者如駢其拇如枝其指如卑其儀若肅其位嶽之氣其秀為春其清若秋其翠如雲雲不能麗其色如煙煙不能鮮若雨收氣爽丹青滿天嶽之靈其神不眹其報如響若雨用淫嶽能廓之若歲用旱嶽能澤之嶽之德生之育之煦之和之開蘤音蒍染卉淒淒迷迷藻繢數百里嶽之形有雲騖騖其勃如怒有泉烈烈其來如決叱豐隆奔列缺轟然霹靂天地俱裂嶽之異狀其勢如危或不可支若不可維或仰而呀有如吮空或俯而拔有如攫地其曉而東有如貫日其暮而西有如孕月有水而脈有石而骨有洞而腹有崿而節或鋭而勵或斷而截或迴而馳或低而折其經之怪之祥之詭之千種萬類繄不可得而詳記因神狂不能自主殆而寐夢一人絳衣朱冕怪貌魁形曰余祝融之相也夫霍山君之故治也爾賦之誠形矣勝矣怪矣典矣然義有不備帝俾余莅夫古有五嶽霍居其一所以五嶽相邇者唐虞之帝五載一巡狩一載而徧上以覲侯下以存民侯有治者陟不治者黜民有寃者平窮者濟洎唐虞已降皆燔柴于霍我帝用饗其禮至周旦冊而命我與諸嶽星列中國自漢之後乃易我號而歸于衡故祝融遷都命余守霍今聖天子越唐邁虞而廢巡罷狩余之封内有可陟可黜可平可濟者是聖天子無由知之爾能以文請執事之達者易衡之號以歸於我請天子復唐虞黜陟之義故爾之将賦余閉遏爾懷而不爾文帝曰有衡既逺有狩必勞惟霍之邇斯號可復賦者有能言胡不俾帝命余錫爾文爾無忘也臣曰請惟神命既覺而書嗚呼異哉牡丹賦并序舒元與古人言花者牡丹未嘗與焉蓋遁乎深山自幽而芳以為貴重所知花則何遇焉天后之鄉西河也精舍下有牡丹其花特異天后歎上苑之有闕因命移植焉由此京國牡丹日月寖盛今則自禁闥洎官署外延士庶之家瀰漫如四瀆之流不知其止息之地每暮春之月遨遊之士如狂焉亦上國繁華之一事也近代文士為歌詩以詠其形容未有能賦之者余獨賦之以極其美或曰子常以丈夫功業自許今則肆情於一花無乃猶有兒女之心乎余應之曰吾子獨不見張荆州之為人乎斯人信丈夫也然吾觀其文集之首有荔枝賦焉荔枝信美矣然亦不出一果爾與牡丹何異哉但問其所賦之㫖何如吾賦牡丹何傷焉或者不能對余遂賦以示之圓𤣥瑞精有星而景有雲而卿其光下垂遇物流形草木得之發為紅英英之甚紅鍾乎牡丹拔類邁倫國香欺蘭我研物情次第而觀暮春氣極緑苞如珠清露宵偃韶光曉驅動蕩支節如解凝結百脈融暢氣不可遏兀然盛怒如将憤洩淑色披開照曜酷烈美膚膩體萬状皆絶赤者如日白者如月淡者如赫殷者如血向者如迎背者如訣坼者如語含者如咽俯者如愁仰者如悦褭者如舞側者如跌亞者如醉曲者如折密者如織疎者如缺鮮者如濯慘者如别初朧朧而下上次鱗鱗而重疊錦衾相覆繡帳連接晴籠晝薰宿露宵裛或灼灼騰秀或亭亭露竒或颭然如招或儼然如思或帶風如吟或泫露如悲或重然如縋或爛然如披或迎日擁砌或照影臨池或山雞已馴或威鳳将飛其態萬萬胡可立辨不窺天府孰得而見乍疑孫武來此敎戰其戰謂何摇摇纖柯玉欄風滿流霞成波歴階重臺萬朶千窠西子南威洛神湘娥或倚或扶朱顔色􅋳各衒紅釭争顰翠娥灼灼夭夭逶逶迤迤漢宫三千豔列星河我見其少孰云其多弄彩呈妍壓景駢肩席奪銀燭爐昇絳煙洞府真人㑹于羣仙晶熒往來金釭列錢凝睇相看曽不晤言未及行雨先驚旱蓮公室侯家列之如麻咳唾萬金買此繁華遑恤終日一言相誇列幄庭中步障開霞曲廡重梁松篁交加如貯深閨似隔牎紗髣髴息嬀依稀館娃我來觀之如乗仙槎脈脈不語遲遲日斜九衢遊入駿馬香車有酒如澠萬坐笙歌一醉是競孰知其他我案花品此華第一脱落羣類獨占春日其大盈尺其香滿室葉如翠羽擁抱櫛比蘂如金屑䊋飾淑質玫瑰羞死芍藥自失夭桃斂跡穠李慙出躑躅宵潰木蘭潛逸朱槿灰心紫薇屈膝皆讓其先敢懷憤嫉煥乎美乎后土之産物也使其華之如此而偉乎何前代寂寞而不聞今則昌然而大來曷草木之命亦有時而塞亦有時而開吾欲問汝曷為而生哉汝且不言徒留翫以徘徊長樂花賦并序蘇頲蜀太守庭際有紫華草秋中始繁英露洗冬早尚直本霜封蕪雜大同於衆卉盛衰小異於羣物余訝而未識吏或告余曰此長虞所賦蜀長樂花也故心暗賞焉因口授書吏遂墨而成作恨不見古人所為得髣髴其㫖爾夫長者以短長之形度其長則至美夫樂者以哀樂之類同其樂則至喜長也樂也吾安得而間之嘉纎植之並用偉令名兮在兹徒見其豐族苯䔿髙標璀璨莖丹外而縞中葉縹分以紅貫綴緑穎之重疊索紫蕤之爛漫迫而象之君子其常或微或章聳危冠兮䙬若綬黙退静其何望逺以意之佳人欲翔炫炫煌煌重羅綺兮撲瑶翠蹇來思而未嘗匪以幽兮自直匪以直兮自藏匪以晚兮自耀匪以耀兮自强文濁露之均灑庇清舒之泛光本無嫌於散地甘有寓於殊方然則太液初滿上林新霽䒠茸灼爍萬品千計摇瑞色而涵芝雜竒葩而轉􅈍孰與夫玉堂金閤之徧賞白日青春之特麗歲不與兮時向闌風蕭蕭兮夜漫漫賔逺鴻於沙塞叫離鶴於江干君曽不見三月華矣盡林間之槁木千霜殞矣亦庭下之枯蘭懿此常度凌於早寒假春期而不彩雖秋令而不殘衝雨霰之飛薄任雲山之險難芳弗珍於靃靡節恒慕於檀欒吾則知樹背之奚託傾心之可安如後凋之是貴罔獨立其誰觀文學掾起而為亂曰白露瀼瀼何草不黃紫華灼灼生君之堂彼不伐兮秋自翳時或珍兮君是惠彤庭赫兮朱草駢交屈軼兮友賔連伊榛莽而荒此君曷為而賦旃桃花賦皮日休余常慕宋廣平之為相貞姿勁質剛態毅狀疑其鐵腸與石心不解吐婉媚辭然覩其文而有梅花賦清便富豔得南朝徐庾體殊不類其為人也後蘇相公味道得而稱之廣平之名遂振嗚呼夫廣平文才未為是賦則蘇公果暇知其人哉将廣平困於窮阨於躓然後强為是文邪日休於文尚矣狀花卉體風物非有所諷輒抑而不發因感廣平之所作復為桃花賦其辭曰伊祈氏之作春也有豔外之豔華中之華衆木不得融為桃花厥花伊何其美實多臺隸衆芳縁飾陽和開破嫩蕚壓低柔柯其色則不淡不深若素練輕茜玉顔半􅋳若夫美景妍時春含曉滋密如不幹繁若無枝妦妦婉婉夭夭怡怡或俛者若想或閑者如癡或向者若步或倚者如疲或溫黁而可薰或婑媠而莫持或幽柔而旁午或撦冶而倒披或翹矣如望或凝然若思或弈偞音葉以作態或窈窕而騁姿日將明兮似喜天將慘兮若悲近榆錢兮䊋翠靨映楊柳兮顰愁眉輕紅拖裳動則褭香宛若鄭袖初見吳王夜景皎絜閧胡弄切然秀發又若常娥欲奔明月蝶散蜂寂當閨脈脈又若妲己未聞裂帛或開故楚豔豔春曙又若息媯含情不語或臨金塘或交綺井又若西子浣紗見影玉露厭浥妖紅墜濕又若驪姬将譖而泣或在水濵或臨江浦又若神女見鄭交甫或臨廣筵或當髙㑹又若韓娥将歌斂態微動輕風婆娑暖紅又若飛燕舞于掌中半霑斜吹或動或止又若文姬将賦而思丰茸旖旎互交逓倚又若麗華侍宴初醉狂風猛雨一陣紅去又若襃姒初隨戎虜滿地春色堦前砌側又若戚姬死於鞠域花品之中此花最異以衆為繁以多見鄙自是物情非闗春意若氏族之斥素流品秩之卑寒士他目則目他耳則耳或以昵而稱珍或以疎而見貴或有實而花乖或有花而實悴其花可以暢君之心目其實可以充君之口腹匪乎兹花他則碌碌我欲修花品以此花為第一懼俗情之横議我曰不然為之則已我目吾目我耳吾耳妍蚩決於心取捨斷於志豈於草木之品獨然信為國兮如此秋蓮賦宋之問天授元年勅學士楊炯與之問分直於洛城西入閣每雞鳴後至羽林仗閽人奏名請龜契佇命拱立于御橋之西玉池清泠紅蕖菡萏謬履扃闥自春徂秋見其生視其長覩其盛惜其衰得終天年而無夭折者良以隔礙仙禁人莫由窺向若生於瀟湘洞庭溱洧淇澳即有吳姬越客鄭女衛童芳心未成採擷都盡今委以白露順以涼風榮落有期私分畢矣斐然願歌其事久之乃述秋蓮賦焉若夫西城秘掖北禁仙流見白露之先降悲紅蕖之已秋昔之菡萏齊秀芳敷競發君門閟兮九重兵衛儼兮千列緑蔕青枝縁溝覆池映連旗以摇豔揮長劒兮陸離疏瀍兮裂縠交流兮湘沃四繞兮丹禁三帀兮承明曉而望之若霓裳宛轉朝玉京夕而察之若霞標灼爍散赤城既如秦女豔日兮鳳鳴又似洛妃拾翠兮鴻驚足使瑶草罷色芳樹無情複道兮詰曲離宫兮相屬飛閣兮周廬金鋪兮壁除君之駕兮旖旎蓮之葉兮扶疎萬乗顧兮駐綵騎六宫喜兮停羅裾仰仙遊而德澤縱𤣥覽而神虚豈與夫溪澗兮沼沚自生兮自死海沂兮江沲萬萬兮煙波泛漢女遊湘娥佩嗚玉戲清波中流欲渡兮木蘭楫幽泉一曲兮採蓮歌江南兮峴北汀洲兮不極既有芳兮蓑城長無依兮水國豈知移植天泉香飄列仙嬌紫臺之月露含玉宇之風煙雜葩兮照燭衆彩兮相宣鳥翡翠兮丹青翰樹珊瑚兮林碧鮮夫其生也春風盡蕩爍日相煎夭桃盡兮穠李滅出大堤兮豔欲燃夫其謝也秋灰度管金氣騰天宫槐疎兮井桐變摇寒波兮風颯然歸根息豔兮八九月乗化無窮兮千萬年越人望兮已長久鄭女採兮無由縁何深蔕之能固何穠香之獨全别有待制揚雄悲秋宋玉夏之來兮翫早紅秋之暮兮悲餘緑禮盛燕臺人非楚材雲霧圖兮蘭為閤金銀酒兮蓮作杯落英兮徘徊風轉兮衰衰入黄扉兮灑錦石縈白蘋兮覆緑苔寒暑茫茫兮代謝故葉新花兮往來何秋日之可哀託芙蓉以為媒荔枝賦并序張九齡南海郡出荔枝焉每至季夏其實乃熟狀甚瓌詭味特甘滋百果之中無一可比余往在西掖嘗盛稱之諸公莫之知固未之信唯舍人彭城劉侯弱年累遷經于南海一聞斯談倍復嘉歎以為甘美之極也又謂龍眼凡果而與荔枝齊名魏文帝方引蒲桃及龍眼相比是時二方不通傳聞之大謬也每相顧閒議欲為賦述世務卒卒此志莫就及理郡暇日追敘往心夫物以不知而輕味以無比而疑逺不可驗終然永屈况士有未效之用而身在無譽之間苟無深知與彼亦何以異也因導揚其實遂作此賦云果之美者厥有荔枝雖受氣於震方實稟精於火離乃作酸於此裔爰負陽以從宜蒙休和之所播涉寒暑而匪虧下合圍以擢本傍䕃畆而抱規紫文紺理黛葉緗枝蓊茸霮䨴環合棼纚如蓋之張如帷之垂雲煙沃若孔翠于斯虛根所盤不高不卑陋下澤之沮洳惡層崖之險巇彼前志之或妄何側生之見疵爾其勾芒在辰凱風入律肇氣含滋芬敷謐溢緑穗靡靡青英苾苾不豐其花但甘其實如有意乎敦本故微文而妙質蔕葯房而攅萃皮龍鱗以駢比膚玉英而含津色江萍以吐日朱苞剖明璫出冏然數寸猶不可匹未至齒而殆銷雖瓊漿而可軼彼衆味之有五此甘滋之不一伊醇淑之無筭非精言之能悉聞者歡而竦企見者訝而驚佚心恚可以蠲忿口爽可以忘疾且欲神於醴露何比數於甘橘援蒲桃而見擬亦古人之深失若乃華軒洞開嘉賔四㑹時當燠煜客或煩憒而斯果在焉莫不心侈而體泰信琱盤之仙液實玳筵之綺繢有終食於累百愈益氣而理内故無厭於所甘雖不貪而必愛沈美李而莫取浮甘𤓰而自退豈一座之所榮冠四時而為最夫其貴可以薦宗廟珍可以羞王公亭十里而莫致門九重兮曷通山五嶠兮白雲江千里兮青楓何斯美之獨逺嗟爾命之不逢每被銷於凡口罕獲知於貴躬柿何稱乎梁侯棃何幸乎張公亦因地之所遇孰能辨乎其中哉瑞橘賦并序李德裕清霜始降聖上命中使賜宰臣等朱橘各三枚蓋靈囿之所植也臣伏以渡淮為枳由地氣而不遷吹谷生黍信陽和之有感昔漢武致石榴於異國靈根遐布此西域柔服之應也魏武植朱橘於雀園華實不就乃吳人未格之兆也考於前史昭晰可知豈非天地同和羣物效祉去蠻夷之陋獲近太陽感王化之威更承膏露草木尚爾况乎人心漢宣帝宫館山澤意有所感必使近臣賦之臣幼學無文忝列樞近敢稽首而獻賦曰美南州之嘉樹受烈氣於炎德固一志於殊方遂不遷於上國貞枝凝碧蔚湘岸之夕陰華實變黄動江潭之秋色雜丹楓於溪畔映緑篠於巖側翡翠以之列巢鵷鶵於焉棲息雖同霑於雨露竊自得於雕飾終獲譽於皇明豈因人之羽翼感大鈞之獨運輸造化之𤣥力思六合以同風採孤根而移植播元氣以茂育諒英靈之不測逮乎霜飛天囿風落秦川金莖炫熀於朝日玉樹青葱於霽天峩方壺之翠島列靈沼之清漣上蔚檉松下秀蓀荃赩朱草與屈軼華紫芝與賔連靈卉必植而嘉橘在焉碧葉獨潤金衣更鮮天漢之華星焜燿閬風之珠樹粲然香若團於野露色疑炫於江煙既而大官獻新竒果列筵非厥包之自逺何菲陋之莫傳樹隱方塘比丹萍之初實盤映皎月與赤瑛而共妍東鄙孤臣謬陳三事既乏和羮之用猶霑可口之味并食不割竊愧晏嬰之知捧之以拜重感桓榮之賜庶不朽於雪霜永酬恩於天地伐櫻桃樹賦并序蕭穎士天寶八載予以前校理罷免降資參廣陵太府軍事任在限外無官舍是處寓居于紫極宫之道學館因領其教職焉廟庭之右有大櫻桃樹髙累數尋條暢薈蔚攅柯比葉擁蔽風景腹背微禽是焉栖託頡頏上下喧呼甚適登其喬枝則俯逼軒屏中外斯隔予實惡之懼盜窺踰因是為資遂命伐焉聊託興兹賦儆夫在位者爾古人有言芳蘭在門不得不鋤眷兹櫻之攸止亦在物之宜除觀其體異脩直材非棟榦外森沈以茂密中紛錯以交亂先羣卉以效諂望嚴霜以凋換綴繁英兮霰集駢朱實以星粲故當小鳥之所啄食妖姬之所攀翫赫赫閟宇𤣥之又𤣥長廊霞截髙殿雲褰實吾君聿修祖德論道設教之筵宜乎蒔以芬馥樹以貞堅匪夫松篠桂檜茝若蘭荃猗具美其在兹爾何德而居焉擢無庸之瑣質蒙本枝而自庇汨羣林而非據專廟庭之右地雖先寝之或薦豈和羮之正味每俯臨乎蕭牆姦回得而窺伺諒何惡之能為終物情之所畏於是命尋斧伐盤根密葉剥攅柯焚朝光無隂夕鳥不喧肅肅明明曠蕩乎堦軒嗟乎草無滋蔓瓶不假器苟恃勢而将逼雖見親而益忌譬諸人事也則晉吞并於僭沃魯出逐於強季綝峻擅而吳削倫冏專而晉墜其大者虎遷趙嗣鸞竊齊位由履霜而莫戒聿堅氷而荐至嗚呼乃終古覆車之軌轍豈尋常散木之足議杞菊賦并序陸龜蒙天隨生宅荒少墻屋多隙地著圗書所前後皆樹以杞菊春苗恣肥得以採擷供左右杯案及夏五月枝葉老硬氣味苦澁旦暮猶責兒童輩掇拾不已人或嘆曰千乗之邑非無好事之家日欲擊鮮為具以飽君者多矣君獨閉關不出率空腸貯古聖賢道德言語何自苦如此生笑曰我幾年來忍饑誦經豈不知屠沽兒有酒食邪退而作杞菊賦以自廣云惟杞惟菊偕寒互緑或穎或苕煙披雨沐我衣敗綈我飯脱粟羞慚齒牙苟且梁肉蔓延駢羅其生實多爾杞未棘爾菊未莎其如予何其如予何唐文粹巻六欽定四庫全書唐文粹巻七宋姚
