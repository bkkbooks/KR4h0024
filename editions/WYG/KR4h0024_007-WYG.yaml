  text: 鉉編
  hash: sha256:7bbf6589c1370d76cda4d0216a0d947939e0da39d5486060d257d0515cbf99d7
body:
  text: 古賦庚總一十四首鳥獸昆虫大鵬賦李白鵰賦杜甫白鷼賦蕭穎士白鸚鵡賦王維感二鳥賦韓愈白羽扇賦張九齡𤣥猿賦吳筠麈尾賦陳子昻由鹿賦吕温蠶賦陸龜蒙秋蟲賦羅隱蝨賦李商隠後蝨賦陸龜䝉蝎賦李商隠大鵬賦并序李白余昔於江陵口見天台司馬子微謂余有仙風道骨可與神遊八極之表因著大鵬遇希有鳥賦以自廣此賦已傳于世往往人間見之悔其少作未窮宏達之旨中年棄之及讀晉書覩阮宣子大鵬讚鄙心陋之遂更記憶多将舊本不同今復存于集豈敢傳諸作者庶可示之子弟而已其辭曰南華老仙發天機于漆園吐崢嶸之髙論開浩蕩之竒言徵至怪于齊諧談北溟之巨魚吾不知幾千里其名曰鯤化成大鵬質凝胚渾脱脩鬛于海島張廣翅于天門刷渤澥之春流晞扶桑之朝暾赫弈乎宇宙憑凌乎崑崙一鼓一舞煙曚沙昏五嶽為之震蕩百川為之崩奔爾乃蹶厚地摩太清亘層霄突重溟激三千以崛起搏九萬而迅征背嶪太山之崔巍翼舉垂雲之縱横左迴右旋倐陰忽明歴汗漫以夭矯排閶闔之崢嶸簸鴻濛扇雷霆斗轉而天動山摇而海傾怒無所搏雄無所爭固可想象其勢仿彿其形若乃足縈虹蜺目耀日月連軒沓拖揮霍翕忽噴氣則六合生雲灑毛則千里飛雪邈彼北荒将窮南隅運逸翰以傍擊鼔奔颷而長驅燭龍銜光以照影列缺施鞭而啓塗塊視三山杯觀五湖其動也神應其行也道俱任公見之而罷釣有窮不敢以彎弧莫不投竿失鏃仰之長吁爾其雄姿壮觀映背河漢上摩蒼蒼下覆漫漫盤古開天而直視羲和倚日以傍歎繽紛乎八荒之間隠映乎四海之半横大明而掩晝若混茫之未判忽騰覆以迴旋則霞廓而霧散然後六月一息至于海湄欻翳景以横榰逆髙天而下垂憩乎泱漭之野入乎汪湟之池猛勢所射餘風所吹溟漲沸渭巖嶽紛披天吳為之㤕慄海若為之躨跜巨鼇冠山而却走長鯨騰海而下馳縮殻挫鬛莫之敢窺吾亦不測其神怪而若此蓋乃造化之所為豈比夫蓬萊之黄鵠誇金衣與菊裳恥蒼梧之𤣥鳯耀綵質與錦章既服御于靈仙亦馴擾于池隍精衛殷勤于銜木鶢鶋悲愁乎薦觴天雞警曙于蟠桃踆烏炳耀于太陽不曠蕩而縱適何拘攣而守常未若兹鵬之逍遥無厥類而比方不矜大而暴猛每順時而行藏叅𤣥根以比壽飲元氣以為漿戲晹谷而徘徊憑炎洲而抑揚俄而希有鳥見而謂之曰偉哉􅉇乎若此之樂也吾左翼掩乎東極右翼蔽乎西荒跨躡地絡周旋天綱以恍惚為巢以虛無為場我呼爾遊爾呼我翔於是大鵬許之欣然相隨此二禽已登于寥廓而尺鷃之輩空見笑于藩籬鵰賦并進表杜甫臣甫言臣之近代陵夷公侯之貴磨滅鼎銘之勲不復照曜於明時自先君恕預以降奉儒守官未墜素業矣亡祖故尚書膳部員外郎先臣某脩文於中宗之朝髙視於藏書之府故天下學士到于今而師之臣幸賴先臣緒業自七歲所綴詩筆向四十載矣約有千餘篇今賈馬之徒得排金門上玉堂者甚衆矣唯臣衣不蓋體常寄食於人奔走不暇祇恐轉死溝壑安敢望仕進乎伏惟明主哀憐之儻使執先祖之故事拔泥塗之久辱則臣之述作雖不足以鼓吹六經先鳴數子至於沈鬱頓挫隨時敏捷而揚雄枚臯之流庶可跂及也有臣如此陛下其舍諸伏惟明主哀憐之無令役役便至於衰老也臣甫誠惶誠恐頓首頓首死罪死罪以為鵰者鷙鳥之殊特搏擊而不可當豈但壮觀於旌門發狂於原隰引以為類是大臣正色立朝之義臣竊重其有英雄之姿故作此賦實望以此達於聖聰耳不揆蕪淺謹投延恩匭進表獻上以聞謹言賦當九秋之清凄見一鶚之直上以雄材為己任横殺氣而獨往捎捎勁翮肅肅遺響杳不可追俊無留賞彼何鄉之性命碎今日之指掌伊鷙鳥之累百敢同年而爭長此雕之大略也若乃虞人之所得也必以氣稟𤣥冥陰乗甲子河海蕩潏風雲亂起雪沍山陰冰纒樹死迷向背於八極絶飛走於萬里朝無所充腸夕違其所止頗愁呼而蹭蹬信求食而依倚用此時而椓杙待弋者而綱紀表狎羽而潛窺順雄姿之所擬歘捷來於森木固先繫於利觜解騰攫而竦神開網羅而有喜獻禽之課數備而已及乎閩􅈻受之也則擇其清質列在周垣揮拘攣之掣曳挫豪梗之飛翻識畋遊之所使登馬上而孤騫然後綴以珠飾呈於至尊搏風槍櫐用壮旌門乗輿或幸别館獵平原寒蕪空闊霜仗喧繁觀其夾翠華而上下巻毛血之崩奔隨意氣而電落引塵沙而晝昏豁堵墻之榮觀棄功効而不論斯亦足重也至如千年狐三窟狡兎恃古塜之荆棘飽荒城之霜露回惑我往來趑趄我場圃雖青骹戴角白鼻如瓠蹙奔蹄而俯臨飛迅翼以遐寓而料全於果見迫寧遽屢攬之而穎脱便有若於神助是以嘵哮其音颯爽其慮續下韝而繚繞尚投跡而容與奮威逐北施巧無據方蹉􅋸而就擒亦造次而難去一竒卒獲百勝昭著風宿多端蕭條何處斯又足稱也爾其鶬鴰鳱鶂之倫莫益於物空生此身聨拳拾穗長大如人肉多奚有味乃不珍輕鷹隼而自若託鴻鵠而為鄰彼壮夫之慷慨假强敵而逡巡拉先鳴之異者及将起而遄臻忽翮天路終辭水濱寧掩羣而盡取且決意而驚新此又一時之俊也天其降精於金立骨如䥫目通於腦筋入於節架軒楹之上純漆光芒掣梁棟之間寒風凛冽雖趾矯千變林嶺萬穴繫叢薄之不開突杈枒而皆折又有觸邪之義也久而服勤是可吁畏必使烏攫之黨罷鈔盜而潛飛梟怪之羣想英靈而遽墜豈比乎虚陳其力叨竊其位等摩天而自安與槍榆而無事者矣故不見其用也則晨飛絶壑暮起長汀來雖自負去若無形置巢嶻􅑖養子青冥倐爾年歲茫然闕廷莫試鉤爪空迴斗星衆鶵儻割鮮於金殿此鳥已将老於巖扃白鷴賦并序蕭穎士白鷴羽族之幽竒也素質黑章爪觜純丹體備冠距頗類夫雞翟神貌清閑不雜於衆禽栖止遐深與人境罕接固莫得而馴狎也上聞而徵焉處以雕籠致以馹騎将集長楊游太液行有日矣天寶辛卯歲予旅泊江㑹流宕逾時秋八月自山陰前次東陽方議夫南登西泛極聞見之義諒褊懷所素蓄而未之從也㑹有命自天召赴京闕適與兹鳥偕至于㑹稽之傳舍觀其宛頸旁睨徊徨掩抑往往孤鳴音韻凄凉如慕侣而不獲因感而賦之曰鳥之生矣于彼江山彩之𤣥素文不綺斑備文武之玉飾微妖姬之殊顔情莽眇以耿絜貌軒昂以安閑無馴擾之近性故不愜於人寰遊必海裔栖必雲間兾養拙以自保袪未萌之憂患不然豈陋彼都邑之佳麗顧投身乎阻艱以其標自然之靜故名之曰白鷴者歟何天聴之緬邈辱微禽之瑣細偶一日之見羇委微軀以受制望層城以斂翼懷衆侣而孤唳從廏置之駿奔仰君門以遐逝君門兮九重洞呌窱兮穹崇池太液兮島方壺萬族翔泳乎其中晝聒未央之繁絃夕警長樂之靈鍾顧疎野之賤迹豈敢求一枝而見容越水清兮鏡色吳山遠兮天逼窺淺深以颺影逗杳冥兮一息謂杉松可得永日而噪聚蓴荇足以窮年而啄食一與心賞兮睽違念歸飛兮何極鸚能言而入座鶴善舞而登軒殊二者之俗態諒慚惶於主恩是以雖信美而非其志獨屏營而兢魂者焉白鸚鵡賦王維若夫名依西域族本南海同朱喙之清音變緑衣於素彩惟兹鳥之可貴諒其美之斯在爾其入翫於人見珍竒質狎蘭房之妓女去桂林之雲日易喬枝以羅袖代危巢以瓊室慕侣方遠依人永畢託言語而雖通顧形影之非匹經過珠網出入金鋪單鳴無應隻影長孤偶白鷴於池側對皓鶴於庭隅愁混色而難辨願知名而自呼明心有識懷恩何極芳樹絶想雕梁撫翼時銜花而不言每投人以方息慧性孤稟雅容非飾含火德之明輝被金方之正色至如海鷰呈瑞有玉篋之可依山雞學舞向寶鏡而知歸皆羽毛之偉麗奉日月之光輝豈憐兹鳥地遠形微色凌紈質彩奪繒衣深籠久閉喬木長違儻見借其羽翼與遷鸎而共飛感二鳥賦并序韓愈貞元十一年五月戊辰愈東歸癸酉自潼關出息于河之陰時始去京師有不遇時之歎見行有籠白烏白鸜鵒而西者號於道曰某土之守某官使使者進於天子東西行者皆避路莫敢正目焉因竊自悲幸生天下無事時承先人之遺業不識干戈攻守耕穫之勤讀書著文自七歲至今凡二十二年其行已不敢有愧於古人之道其閒居思念前古當今之故亦僅志其一二大者焉選舉於有司與百十人偕退曽不得薦書齒下士于朝以仰望天子之光明今是鳥也惟以羽毛之異非有道德智謀承顧問贊教化者乃反得䝉採擢薦進光輝如此故為賦以自悼且明夫遭時者雖小善必達不遭時者累善無所容焉其辭曰吾何歸乎吾将既行而後累思誠不足以自存苟有食其從之出國門而東鶩觸白日之隆景時返顧以流涕念西路之差永過潼關而坐息窺黄流之奔猛感二鳥之無知方䝉恩而入幸惟進退之殊異增予懷之耿耿彼中心之何喜徒外飾焉是逞予生命之湮阨曽二鳥之不如汨東西與南北恒十年以不居辱飽食其有數況策名於薦書時所好之為賢庸有謂余之非愚昔殷之髙宗得良弼於宵寐孰左右者為之先容信天同而神比及時運之未來或兩求而莫致雖家到而户説秖招尤而速累蓋上天之生余亦有期於下地盍永配於古人獨怊悵於無位雖得之而不能乃鬼神之所戲幸年歲之未暮庶無羨於斯類白羽扇賦并序張九齡開元二十四年夏盛暑奉敕遣大将軍高力士賜宰臣白羽扇九齡與焉竊有所感立進賦曰當時而用任物所長彼鴻鵠之弱羽出江湖之下方安知煩暑可致清涼豈無䊵素彩畫文章復有脩竹剖㭊毫芒提攜密邇摇動馨香惟衆珍之在御何短翮之敢當與竊恩於聖后且見持於未央伊昔臯澤之時亦有雲霄之志苟効用之得所雖殺身而何忌肅肅鳥羽穆如微風縱秋氣之移奪終感恩於篋中𤣥猿賦并序道士吳筠前志稱周穆王南征君子變為猿鶴小人變為蟲沙夫神用無方未必不爾筠自入廬嶽則覩斯𤣥猿嘉夫雨昏則無聲景霽則長嘯不踐土石超遥於萬木之間春咀其英秋食其實不犯稼穡深棲遠處猶有君子之性異乎狙猱之倫且多難已來庶品凋販麋鹿殫於網罟遺氓困於誅求此獨蕭然物莫能患豈不以託跡冥絶不才遠禍昔夫子歎山梁雌雉曰時哉時哉予因感之聊以作賦伊𤣥猿之所育于南國之曽岑動不踐地居常在林雖泛泛而無據亦熙熙而有心雰嵐昏而共黙風雨霽而爭吟使幽人之思清暢羇客之涕霑襟何必聆嶰谷之管對雍門之琴哉歴千尋之喬木俯萬仭之危嶠弄遊雲之亂飛嬉落日之横照連肱澗飲命侣煙嘯或聚而閑棲或分而迥趠壽同靈鶴性本君子阻重巖之險非虎豹所履蔭交柯之密豈鵰鶚能視故逢蒙操弓憚髙深而止鄧公折箭含惻隱而已何患累之罕臻不干物以利已詎若狒狒凌人以就戮猩猩甘酒而遄死夫時珍貂裘世寶狐白徒能工於隠伏終見陷於機辟麝懷香以賈害狙伐巧而招射小則翡翠殞於毛羽大則犀象殘於齒革孰能去有用之損取無用之益固棄置於常情永逍遥以自適無威刑以相臨有族類而相親食資諸物衣取諸身不賦不役靡勞靡勤如政教之未施保巢居之淳淳匪虞氏之所及何徂公之能馴吾固知人為物之貴又焉測元化之所謂大鈞乎麈尾賦并序陳子昂甲子歲天子在洛陽時余始解褐與秘書省正字太子司直宗秦客置酒於金谷亭大集賓客酒酣共賦座上食物命余為麈尾賦焉天之浩浩兮物亦云云性命變化兮如絲之棼或以神好正直天蓋黙黙或以道惡强梁天亦茫茫此仙都之靈獸因何負而罹殃始居幽山之藪食乎豐草之鄉不害物以利己每營道而同方何忘情以委代而任性之不忘卒罘網以見逼受庖割而罹傷豈不以斯尾之有用而殺身於此堂為君彫俎之羞厠君金盤之實承主人之嘉慶對象筵與寶瑟雖信美於兹辰詎同歡於疇日客有感之而歎曰命不可思神亦難測吉凶悔吝未始有極假如天道之用莫神於龍受戮為醢不知其凶王者之瑞莫聖於麟遇害於野不知其仁神既不能自智聖亦不能自知況林棲而谷走及山鹿與野麋古人有言天地之心其間無巧冥之則順動之則夭諒物情之不異我心又何兢於猜矯故曰天之神明與物推移不為事先動而輙隨是以至人無已聖人不知子欲全身而遠害曾是浩然而順斯由鹿賦并序吕温貞元丁卯歲予南出穰樊之間遇野人縶鹿而至者問之荅曰此為由鹿由此鹿以誘致羣鹿也備言其状且曰此鹿每有所致輙鳴嘷不飲食者累日余喟然歎曰虞之即鹿也必以其類致之人之即人也亦必以其友致之實繁有徒古之然矣嗟乎鹿無情而猶知痛傷人之與謀寔安殘酷者彼何人斯彼何人斯物微感深遂作賦曰鹿之生兮亦稟亭毒備齒角以無競循性情而自牧姑有昧於行止尚焉知乎倚伏捨爾崇林輕遊近麓偶巧網之生致蒙主人之全育飲以渫井飼于芳庭寝臥荃柔騰倚蘭馨露往霜來日安月寧雖矯性之非樂終感恩而不驚曽不知養非玩物用有深意命之曰由俾陷其類涼秋八月爽景清氣羇致山阿縻于蹊隧設伏以待翳叢而伺同氣相求誘之孔易将必慕侣豈云貪餌呦呦和鳴麌麌狎至彼泯慮於猜信此無情於誠偽孰是倉卒禍生所忽毒鏑欻以星貫潛機劃其電發或洞胷而達腋或折足而碎骨望林巒兮非遠顧町疃兮未滅風嘷澤而北至日掩山而西没走駭侣於巖煙叫飢麛於澗月苟行路之聞者孰不心摧而思絶想爾由矣野心而仁望純束而驚顧隨獲車兮逡巡視鼎中之銷爛觀机上之剖分忽哀鳴以感類若沈痛之在身雖復處之密邇享以豐珍比檻猿之駭躍同海鳥之愁辛敢擇蔭而後止思走險以何因痛無知以相陷含怨毒而莫伸客有感而言曰物誠有諸人亦宜乎摭事或比原心則殊借如淮陰搆禍寃在伸理通説且拒狶謀寧起堂堂蕭公實曰知己紿致鍾室胡寧忍此吕禄之難誰非漢臣交則不義賣亦不仁彼美酈生既為交親誘襲軍印豈無他人於戲微獸傷類如不自容忍人賣友而享其功滅交道分墜義風曽麋鹿之不若何仁信之可宗已焉哉諒此世之茫茫吾未見其始終蠶賦并序陸龜䝉荀卿子有蠶賦楊泉亦為之皆言蠶有功於世不斥其禍於民也余激而賦之極言其不可能無意乎詩人碩鼠之刺於是乎在古民之衣或羽或皮無得無喪其游熙熙藝麻緝纑官初喜窺十奪四五民心乃離逮蠶之生繭厚絲美機杼經緯龍鸞葩卉官涎益嚵盡取後已嗚呼既豢而烹蠶實病此伐桑滅蠶民不凍死秋蟲賦并序羅隱秋蟲蜘蛛也致身網羅間實腹亦網羅間愚感其理有得喪因以言賦之物之小兮迎網而斃物之大兮兼網而迹網也者繩其小而不繩其大吾不知爾身之危兮腹之餧兮吁蝨賦李商隱亦氣而孕亦卵而成晨鷖露鶴不如其生汝職唯齧而不善齧回臭而多跖香而絶後蝨賦幷序陸龜䝉余讀玉谿生蝨賦有就顔避跖之嘆似未知蝨作後蝨賦以矯之衣緇守白髮華守黑不為物遷是有恒德小人趨時必變顔色棄瘠涵腴乃蝨之賊蝎賦李商隠夜風索索縁隙憑壁弗聲弗鳴潛此毒螫厥虎不翅厥牛不齒爾兮何功既角而尾唐文粹巻七欽定四庫全書唐文粹巻八宋姚鉉編
