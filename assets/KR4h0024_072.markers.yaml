  - {type: variant, offset: 0, length: 2787, content: 重校正唐文粹卷第七十二吳興姚鉉纂記乙揔一十一首府署中書政事堂記李華御史臺新造中書院記舒元輿御史大夫壁記李華御史中丞壁記東都留臺石柱記趙曄吏部貟外郎南曹㕔壁記權徳輿監祭使壁記栁宗元祕書郎壁記權德輿四門助敎壁記栁宗元國學新修五經壁記劉禹錫問國庠記舒元輿中書政事堂記李華政事堂者自武德巳來常於門下省議事謂之政事堂故長孫无忌起復授司空房玄齡授左僕射魏徴授太子太保皆知門下省事至高宗光宅元年裴炎自侍中除中書令執宰相筆乃移政事堂於中書省記曰政事堂者君不可以枉道於天反道於地覆道於社稷無道於黎元此堂得以議之臣不可悖道於君逆道於人黷道於貨亂道於刑尅一方之命變王者之制此堂得以移之兵不可以擅誅權不可以擅施貨不可以擅蓄王澤不可以擅奪君恩不可以擅間私讎不可以擅報公爵不可以擅私此堂得以誅之事不可以輕入重罪不可以生入死法不可以剥害於人財不可以擅加於賦情不可以委之於倖亂不可以啓之於萌伐紊不賞削紊不封聞荒不救見饉不驚逆諌自賢違道傷古此堂得以殺之故曰廟堂之上鐏爼之前有兵有刑有挺有刃有斧鉞有鴆毒有夷族有破家登此堂者得以行之故伊尹放太甲之不嗣周公逐管蔡之不義霍光廢昌邑之亂狄公正廬陵之位自君弱臣強之後宰相主生殺之柄天子掩九重之耳爕理化爲權衡論思變成機務道變傾身禍敗不可勝數列國有傳青史有名可以爲終身之誡無罪記云御史臺新造中書院記舒元輿王者執生殺之柄造天下使百度順而巳矣其或不順與順而不得其度者皆屬於御史府府之動靜爲朝廷紀綱之職與百司絶類蓋百司坐其署但專局而巳矣入於朝與啓事於丞相府亦不出乎其位是以朝罷而各復其司以無事於朝堂與中書也若御史臺每朝㑹其長揔領屬官謁於天子道路誰何之聲逹于禁扉至含元殿西廡使朱衣從官傳呼促百官就班遲曉文武臣僚列於兩觀之下使監察御史二人立於東西朝堂甎道以監之雞人報點監者押百官由通乾觀象入宣政門及班于殿庭則左右廵使二人分押於鍾鼔樓下若兩班就食於廊下則又分殿中侍御史一人爲之使以莅之内謁者承旨喚仗入東西閣門峨冠曵組者皆趨而進分監察御史二人立於紫宸屏下以監其出入爐煙起天子負斧扆聽政自螭首龍池南屬於文武班則侍御史一人盡得專彈舉不如法者由是吾府之屬入殿内其職益繁其風益峻故大臣由公相巳下皆屏氣竊息注萬目於吾曹吾曹坐南臺則綜覈天下之法立内朝則約繩千官之失百司有滯疑之事皆就我而質故乗輿所在下馬成府釐朝庭之綱目與坐臺之判决者相半是以御史府故事於中書之南常有理所先時惟中丞得專寓於尚舎一院若雜事與左右廵使則寓於西省小胥之廡下遇大朝㑹時吾屬皆來則忿憩於雜事廵使之地旣寓於小胥則我實客也每亡事而去則主人必坌而入諠譁狼藉其態萬變向之霜稜盡爲涕涶矣豈吾君以天下綱紀屬之於我之意邪上元二年侍御史劉孺之作直㕔記𥘉拜儀云謝宰相訖向南直省院候端長又入中書儀云到直省院入門揖端公訖各就房嗚呼以御史之重以前時作者之記恬然以直省院爲記君子未甞有非之者有羊之神何其翳而不光邪聖唐大和三年己酉歲天子擢尚書吏部郎中河南宇文公爲御史中丞詔下之日不仁者相弔御史府新例知雜事一人中丞得以選於廷臣河南公旣拜之日上言請尚書司勲郎中瑯瑘王君以自輔識者曰河南琅瑘同心異質之人也心茍同雖堅金可斷於御史乎何有他日雜事果以寓直省院爲歎廼議於中丞深樂之昻持啓於中丞曰此前日之闕也中丞能爲之豈直栢署之光乎實羽儀吾府之多也皆佐其意事得聞於上上曰良有是乎俞其請如響即詔度文出錢百萬以資焉乃於政事堂直阡之南選地以作之中書之南實天下㑹計之地不容咫尺之隙非雄重清切之司於此豈容足乎我是以得制焉舊中丞院在西與西院相絶遂以其地易大京兆院合爲三院東西四十六歩南北四十歩由東爲首其一爲中丞其二爲雜事其三爲左右廵使若中丞升爲大夫改官不改院若三院必朝集臺院附於雜事殿察附於廵使其名揔號爲御史臺中書南院院門北闢以取其嚮朝廷也其制自中書南廊加南北爲軒入院門分東西廂爲拜揖折旋之地内外皆有廡蟠廻詰曲矚之盈盈然梁棟甚宏柱石甚偉掾欒楶梲麗而不華門牎戸牖華而不侈名木修篁竒葩秀實若升綠雲若編青簫以至于几桉筆硯簾幌茵榻果籩茗器皆新作也從官胥士役夫走馬勾稽桉牘飲食休息之地皆得其所若百官之請事羣吏之叅謁入吾門將抵伺於屏者見吾軒堂堦闥之嚴固不俟戒而自肅爲此者何尊天子也吾府爲天子耳目宸居堂陛未有耳目聦明堂陛峻正而天子不尊也天子尊未有姦臣賊子而不滅也姦臣賊子盡滅矣可以自朝廷至于海隅蕩蕩然何所不理哉吾之作豈是志小者近者之心邪謹桉高宗天皇大帝作大明宫將二百年矣當時有司經度曽不是思將以待我而作我之所以作蓋前𥙷二百年之遺事後貽千萬年之不朽搢紳觀者命爲御史北臺聞者謂之知言君子曰移中丞雜事今之心於大柄天下豈有遺事哉某備于寮屬得聞君子之論且承公命其記於是乎書乃題中丞雜事洎三院主主簿官封名氏於其後以爲一時之盛事大和四年歲次庚戌八月十六日丁巳記御史大夫壁記李華君以文明照臨百官官紏其邪職在邦憲由京師而端下國王化所繫不惟威行御史大夫其任也用捨決於天心得失震於人聽舉直措枉果而不撓則公卿屏氣道路生風率其屬以正于朝瞻我衣冠不仁者逺茍異於是爲君子羞政之雄雌與德輕重故名公在位天下仰頼焉秦官有御史大夫在漢爲三公職副丞相丞相闕則大夫遷或名司空或名舊號史足徴也議大政必下丞相御史其廷署古曰府近曰臺其衣冠章綬品秩所視載於甲令聖朝臣唐虞高尚之賢内周漢不賔之俗登人於五福薦樂於九歌帝德廣運而瑞草生天威震動而神羊至故柱石骨鯁之老更拜焉距義寧至先天登宰相者十二人以本官叅政事者十三人故相任者四人藉威聲以稜徼外桉戎律者八人官或改稱大司憲臺或分爲左右肅政罷置不恒從其宜也開元天寶中刑措不用元元休息由是務簡益重地清彌尊任難其人多舉勲德至宰輔者四人宰輔兼者一人故相任者一人兼節度者九人異姓封王者二人尊號加孝德之明年樂成公自尚書左丞兼文部遷崇德也昭融禮經嗣續文雅張仲孝友山甫將明風度可以師長人倫動靜可以訓齊天下喬岳鎭定嘉量平均心爲百行之宗體備四時之氣雅有之曰文武吉甫萬邦爲憲樂成有焉至若敎行於無訟之前慮辨於未萌之始未萌而慮則求煩不獲無訟而敎則何用不臧寛細瑕爲大體復故事爲新政小人畏法君子夷心無隱情於國家無愧辭於神道堂堂乎大雅之素也𥘉㕔壁列先政之名記而不敘公以爲艱難之選將俟後人謂華甞備屬僚或知故實授簡之恩至屬辭之藝寡無以允副非常之待所報者直質而少文天寶十四載六月十五日記御史中丞壁記皇帝授天明命垂五十年大道成俗黎民於變百官設而無事三辟存而不論振古未然也猶以爲成歲資于降霜律人本於持憲憲司之拜尤覈名實王猷其逺乎夫察風俗平冤滯踣邪佞延俊賢云誰司之職惟御史御史亞長曰中丞貳大夫以領其屬士丏爲伯游之佐司馬乃令尹之偏古之制也漢儀大夫副丞相以備其闕叅維國綱鮮臨府事故中丞專焉意者殄凶人之豪挾君子之道各行其志無所牽束行止與大臣絶位指顧則周行振聳政體宜之晉宋元魏以還無御史大夫由是中丞威望愈尊禮有加等如火烈烈如霜肅殺不可犯也屬時清無獄朝尚寛政行葦忠厚王化根源周室仁及草木而愷悌流乎頌聲漢文好黃老而公卿恥言人過舉盛德則儀形著矣焉用察察缺缺以恟生人哉欲, WYG: ''}
