  text: 重校正唐文粹卷第二十一
  hash: sha256:791aa2d66f2d08443ca46086cded08e28b45cb9096eeb90a79937e040d57bbb8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0024_SBCK_021-1a}
body:
  text: 呉興姚鉉纂頌丁政德揔一十首古賢宰一虙子賤碑頌賈至良牧三廣州都督嶺南按察五府經略使宋公遺愛碑頌張􅀃京兆尹張公德政碑頌王維唐衛尉卿洪州都督張公遺愛碑頌崔祐甫興利三復練塘碑頌李華高陵令劉公遺愛碑頌劉禹錫蘇州嘉興屯田紀績碑頌李翰靈跡一唐天台山新桐柏觀碑頌崔尚高道一唐中嶽體玄先生潘尊師碑頌陳子昻宗理一長明燈頌高邁虙子賤碑頌賈至淸靜致理中庸之徳至高明柔克簡易之體大繹微㫖而徴遺論何先生道蔚其葳㽔者也先生宣慈在躬精義入神德順乎天性根於仁殷其如雷曖然如春始受業於仲尼終委質於魯君爾乃周道凌遟王風哀思夷狄竊於位號干戈亂於原野則我魯國無齊晉之强定哀非桓文之主三卿有􅆫虐之政先生處此亂􅀖從容理邑平心氣而全耳目晏然躋富壽之域焉自非知微知彰變化無窮孰能臻此觀夫爲政之大體元之要恤􅀌哀喪舉事問弔訓之以悌加之以孝借五更而悟君賢三老而稟敎然後燕居以佚其體張樂以和其人夜漁不戒而信欺吏不威而息是以宣尼惜君之理小子期問君之政睱何其逺哉向使移於有國之君則陶唐之理也施於有政之臣則二南之化也昔舜左禹而右臯陶不下席而天下理周公殽膳在御不解懸而四夷伏小大則異其揆則同天寶初至始以校書郎尉千單父想先生行事徴其頌聲而古碑殘缺苔􅂐磨滅使立志之士何以揖其遺風焉嗚呼其道存而其事往其人亡而其政息哀哉遂作頌曰鳴琴湯湯虙子之堂淸靜無爲邑人以康澆風化淳霸俗致王誰謂陽鱎革而爲魴皤皤黃髪或師或友芃芃麥苗不稂不莠齊師巳郤魯俗斯阜諌或剖心伊人引肘穆穆伊人希聖之才堯舜旣往孰爲來哉從時卷舒與道徘徊游泳孔門取容定哀泱泱千古顯顯令德聲隨悠牧惠與順息人亡政弊道播神黙寂寥夜川惆悵舊國荒祠尚掃苔􅂐將磷尋風聆韻想見其人年代邈殊精誠闇親再表貞石頌聲惟新廣州都督嶺南按察五府經略使宋公遺愛碑頌張􅀃維唐御天下九十有八載蒼生賁乎海隅玄澤漫乎荒外天子念窮郷之僻陋徼道之脩阻吏或不率不馴人或不康不􅀂乃命舊相廣平公宋璟鎭兹􅒨壤式是南州篤五管之政敎揔三軍之旗鼔幅貟萬里馴致九譯詔書下日靡然順風曷由臻斯威名之先路也公曩時執白簡登􅃈闥推誠謇諤不私形骸忤英主之龍鱗蹹奸臣之虎尾挫二張之銳則聲怛寰域折三思之角則氣蓋風雲由是極有四星維帝之輔地有五獄維天之柱其入宰也君之股肱其岀守也人之父毋至於此􅀖之長人也飲食有節衣服有常清心而庶務簡正色而羣下一瑟􅀆僴􅀆赫􅀆咺􅀆固以不怒而威不言而信雖有文身鑿齒被髪儋耳衣卉麫木巢山館水種落異俗而化齊言語不通而心喻矣其率人版築敎人陶瓦室皆斁㘸晝遊則華風可觀家撤茅茨夜作而災火不發棟宇之利也自今始祖國之舶車海琛雲萃物無二價路有遺金殊裔胥易其迴途逺人咸内我邊郡交易之坦也有如此故能言之士舉爲美談蓋微子去殷以後王者襄公伐楚將得諸矦尚書東漢之雅望黃門北齊之令德宋氏世名公其濟美詩所謂無念爾祖聿脩厥德廣平有焉􅀂夫往者屈也來者伸也往來相召而哀樂繼之鴻飛遵渚於汝信處龍章衮衣以我公歸鬱陶乎人思嗟歎之不足廣府司馬譚􅅛番禺耆老某乙等相與刻石傳徽斯文予春秋之徒也豈將苟其辭哉雅敬宋公王臣之重次嘉譚子賛德之義遥感耆舊去思之勤越裳變風知周公之才之美吉甫作頌見申伯于藩于宣觀政將來惡可廢也頌曰降王宰􅀆逺國靈歌北戸􅀆舞南溟酌七德􅀆考六經政畫一􅀆言不再草木育􅀆魚鼈寧變蓬屋􅀆改籬牆魚鱗瓦􅀆鳥翼堂洞日華􅀆皎夜光火莫炖􅀆風莫颺事有近􅀆惠無疆崐崘寶􅀆西海財幾萬里􅀆歲一來舟如㠀􅀆貨爲臺市無欺􅀆路無盗旅忘家􅀆扃夜開越井崗􅀆石門道金鼓愁􅀆旌斾好來何暮􅀆去何早犦牛牲􅀆􅌲雞􅁲神降福􅀆公壽考京兆尹張公德政碑頌并序王維雲從龍風從虎氣應也聖人作賢人輔德同也君臣同德天地通氣以康九有以遂萬類惟皇御極二十載光格四表至于海隅日出越小大􅀖蠻貊師長罔不欽于成憲以承天休然天子猶日省三接列辟日聽萬方輿頌懼人有未化賢有未登故敭庂陋兼乎十等選宗室及乎九族任事以觀材積時以觀行乃得我賢京兆焉夫京兆號爲難理清淨病於不給刀筆拘於守文或以輭弱廢或以賊殺劾把宿􅀒淺爲丈夫用鈎距蓋非長者我則異於是大道難名大理無法閉關於任數巧筭不能知堅壁於畫一善政不能下摧宿豪如薙草無愠色視大權如歷塊無慠容百司之吏揔一德以咸服五方之人雜異敎而同理受命之始先聲已振􅃛吏惡少聞風族行及乎鳴騶詣府登堂坐定縣尹􅁺史以次上謁守正之人其氣高含章之人其詞大見容色而聞號令小人感而君子泰日者櫟陽男子閭里爲豪借客報􅄷聚人爲盜或白日手刃或黃塵袖鎚政寛則以身先諸偷操急則以事中長吏貳過不巳萬計自脫公命吏縳之立死鈴下於是人入闇室􅀂遇大賔焉前年不登人顇太甚野無遺糠路有委骨天子不忍征於不粒賦於無衣六軍從衛以臨東諸矦息關中也帝曰咨天其降威人罔畏罪台恐㓂盗乃邑矧曰蕩析離居惟爾􅂶濟撫兹西土公拜稽首思塞休命布慈惠之政不以利􅁋震雷霆之威其或宥過饔人減􅀟雞之膳圉人省五馬之秣淘不獻服圬不塓館自身已往振廩同食雖人煙不動道饉相望不思濫以苟生咸守敎以就死是不可能也先是王公或專南山之利司農涸昆明之池收赤岸澤將爲田以便官至是悉奏罷之舟漁衡麓之守廢蒲荷薪蒸之産入自郊徂邑室有魚飱斬隂伐陽市多山木人得以贍惟涇有防比歲多決近縣疲於力役他山遺於度材公命刮朽壞塡巨石辮大木去編菅其始告勞乃終有慶匠石日減功萬藏史日省錢億農始學耒女始安織於是鮐背黃髪之耆曰我有田疇鍾秉其畒我有子弟顔閔其行鄕黨以睦惸失其獨道路有禮汰無與爭酒先養老賄不問吏旣無吠狗亦無奸人臨年餘資􅀼蒙惠化其曷以臻兹君子曰此天子至公内舉不避親錫汝明尹張公之力也夫公於國爲外戚於帝爲外弟重組累印珥香貂者七葉奉車駙馬乗朱輪者十人勝衣則綺襦紈袴通籍則玉墀靑瑣動則兩驂如舞坐則五鼎成列文軒楚製素女趙舞而公儼􅀆其􅀂容淡􅀆其無味心在四敎語稱七德目視六籍口誦九歌懷君子令德之忠保詩人錫􅀋之孝悌有過於共􅀍慈有踰於含食惡衣以居公服不敢降也屈體下士王綱不敢替也恊二姓之好以正人倫傍無嬖御分一人之憂以審官政下多英傑􅀂夫皇帝敬問之詔御札自書天王命賜之衣上宫所製勞勤則中使接武計議則走馬來朝豈惟衆臣重其經術爲吏雜以儒雅而巳且公之德升聞于天非一朝一夕之漸也亦以稱職於累官著聲於所在其丞祕書也闕文遺簡多在大家深爲子孫之藏密有緘縢之固公不憚權貴或抵或誘盡歸天閣官書備焉其牧郢人也人有不􅀂德戮之不爲暴人有不保居撫之不爲諂存者考其事壯其食以畜之行者緝其宫藝其樹以待之此􅀖之人旣優他􅀖之人又至焉未盈一歲遂増萬戸其守汾也仍歲大旱郡祠介推雖屢舞僊僊而靈應未􅀂公命束藴取火伐樹寘薪釃酒而祝曰有功於人祀爲明神無德而禄禍亦覆餗自絳已來人實祀子純犧大璧不敢愛必以薦也童兒季女不敢黷必以敬也神旣靡荅人將安仰􅀂亭午而雨則樹其鷺羽執此騂毛不然者火燎將至焮天鑠地靈衣且爲煨燼豐屋將爲茂草爾其圖之言未畢而雲興拜未起而雨降周於闔境不入他郡雖封疆咫尺而彼竭我盈嘻􅀂記能事載盛德渭川之竹不足簡終南之木不足軸夫訓人至於禮義曰德安人免於阽危曰功德者上賞於上下頌於下長老孜孜願刋于石以予學於舊史來即我謀且維與人編戸與人爲伍與人出入與人言語知風俗之淳弊識政化之原本屬詞媿文書事蓋實詞曰五代相韓七葉侍漢及我聖朝亦生􅀖翰大道無形貞蠱以幹含章不耀在割能斷情僞萬端吾道一貫帝選賢尹無以易張金印紫綬京兆之章佩我鳴玉冠我兩梁天子休命拜首以將寛而愛人立滅暴强明明天子哀此南畒將息西入遂覲東后我敎我訓我鎭我守茫茫三秦則罔餬口守死以義徇生不苟王曰外弟視人不佻何以寵之手書以詔何以問之賜衣而朝俾人華胥致君帝堯刻石作頌永世彌昭唐衛尉卿洪州都督張公遺愛碑頌并序崔祐甫今天子終諒闇易月之期不言旣言之日詢于師保輔弼之臣曰將以國之明燭震下土俾兆人康乂有道哉四臣曰莫如擇賢而司牧之雖欲不理不可得也上曰用賢何先四臣曰莫先於幽逺蠻貊之􅀖爲急也即日命王人遽以制書就拜衛尉卿兼洪州都督張公爲御史中丞廣州刺史嶺南節度經略觀察等使旣踰月而遽届于洪洪之􅂄老􅄔惸商販漁釣百􅀋千品周聲奪魄于野千廛咸曰寧取我裳而裂之寧取我廪而焚之父也天只胡爲奪我之君中丞受命而南舟不及汎馬不及秣國人懷慕之罔極曰淸塵逺矣君不顧矣鬱陶之思何用哉盍用於揚名頌德乎故吏兵曹叅軍張擢法曹叅軍豫章縣令鄭鋒建昌縣令盧惟瑾新呉縣令鄔賁州人東冶府果毅劉容耆壽喻乾相等討論之衆僉曰允於心曰自昔爲政者知淸之可以長人也而淸者稀豈不欲淸欲牽之也欲之所行不廉不儉爲之舟輿也淸之不立肆奢崇貨爲之鑚鑿也於是撤其帷帳薦蓐之具便於身恱於目者二百餘物歸之有司減其俸錢稍食月㡬十萬實於軍府此皆前政之所督觀而封已者我則推而逺之於是公儀之義申平仲之規見矣二之日謀於衆曰昔曹叅去齊以獄市爲􅀉以爲擾於獄者輕重人之命煩於市者耗殬人之生苟鞭笞桁揚之無度侵牟肆奪之不改是國家以章綬印璽毒蒼生也豈致理哉於是平百貨之貴賤議刑罰之等衰使其貪不下殘忿不私逞韓子求環而不可使人􅃝背而無傷夫然筮嗑之象成行葦之恩溥矣三之日謀於野曰不稼不穡民天安仰載馳載驅王命所急吾觀是􅀖農野未闢傳置未修豈不以使役無期供億失序儻野有餓殍賔不如歸亦諸矦之恥也於是減承城更卒幾三千歸之隴畒而擊柝之守無闕焉賦豪墆財數百萬賙于館餼而含糗之徒不知也其卒也不公之吏留以爲厮其財也不法之臣受以潤屋我皆用之於愛人活國也於是阜藩之望崇多大之儀備矣從政三日州人愛之如父母承之如松柏夫婦耕織之暇無他懼惟懼公速遷其餘煦嫗孕育發於中而形於言損其身而益於物可以激穨俗慰窮甿者豈勝道哉祐甫山東鄙人不好妄飾凡所聞見務存實録故採拾而書之公名休字祥幽州范陽縣人有晉司空茂先之逺裔也曾祖汲易州長史祖選幽州固安縣丞考價贈齊州司馬公起家石亭别將自是爲縣令軍司馬州長史各一入爲天子友儲君臣雖假以寵名而跡實戎索受命爲范陽節度安禄山判官禄山以大權大寵外示忠而内謀逆太上皇推赤心而勿疑敢有間之者死􅌃虎尾犯龍鱗公密言其戎狄犲狼不可厭也當是時也視鼎鑊如歸焉神之聽之是與正直周旋鋒鐍之下出入㓂讎之間而能終保元吉漸于貴仕進退存亡而不失其正其惟張公乎又牧豪舒潤三州而及此昔張黃門庭珪牧此州甚得人譽張丞相九齡次之逮府君又有􅁉焉故􅀖人有三張之目頌者美盛德之形容非魯僖公仲山甫不之獲今兹頌曰昔爲豫章故有循良黃門之善于今不忘爰及丞相亦有烈光我君戾止是爲三張立廉寶儉無怨無傷郵亭之下賔旅其康四封之内望歲千箱自春徂夏􅀆人相慶慶未畢􅀆聞後命朱轓玉節􅀆向蕃禺彼願適􅀆我望􅀌君乎君乎􅀂歲大旱其誰見濡潤州丹陽縣復練塘頌并序李華大蜡之祭辭曰土反其宅水歸其壑先王因流下而導之故曰九川滌源因迤匯而瀦之故曰九澤旣陂以䟽天地之氣以利元元之用崇伯汨五行而殛羽山臺駘章大澤而封汾川洪範首之春秋載之地有廣狹事無今古大江具區惟潤州其藪曰練湖幅貟四十里菰蒲菱芡之多􅀛魚鼈蜃之生厭飫江淮膏潤數州其傍大族强家泄流爲田專利上􅃾畒收倍鍾富劇􅁋行自丹陽延陵金壇環地三百里數合五萬室旱則懸耜水則具舟人罹其害九十餘祀凡經上司紛紜與奪八十一斷嗚呼曲能掩直强者以得之老㓜怨痛沈聲無告永泰元年王師大翦西戎西戎旣駾矣生人舒息詔公卿選賢良先除二千石以江南經用所資首任能者是歲十一月二十三日拜前常州刺史京兆韋公損爲潤州聲如飈馳先詔而至吏人畏伏男女相賀即日上無貪刻下無􅁈憤公素知截湖閏壤災甚螟蝥臨事風生指期以復羣謗雷動山鎭恬然中明獨裁文之以禮乃白本道觀察使兼御史中丞韋公元浦中丞撫掌愜心如公之謀且曰興利除害得其人而後行非常之政敢歸叔父公乃申戒縣吏卒徒闢之人不俟召呼抃從役畚􅓩蓋野俊皐成蹊増理故塘繚而合之廣湖爲八十里像月之規儔金之固水復其所如鯨噀射洶洶隱地雷聞泉中先程三日􅀂海之彌望灝灝如吞吐日月沈沈如韞蓄風雨所潤者逺原隰皆春耕者飽憂者泰於是䟽爲斗門旣殺其溢又支其澤沃塉均品河渠通流啇恱奠價人勇輸賦遐邇受利豈惟此州毎歲萌隂乗陽二氣相薄大雨時行羣潦奔流水勢所入盈而無傷龍見方雩稼蒙其渥時前相國彭城公劉尚書晏統東方諸矦平其貢稅聞而恱之白三事以聞詔書襃異焉彭城公宣命至江南捧詔授公公率元僚􅁺史令丞巳下至于耆艾西向拜手忻戴皇明人心上感天降嘉澤如有神祗昭協厥至公正直而和專靜而斷嫉惡宥過惠人察奸純鈞精堅百鍊不耗伐冰之貴降從士禮詩云靖恭爾位好是正直冝其享福也吏人入賀公拱而謝之曰尙書劉公觀察韋公奉行王澤也鄙何力之有焉丹陽令杜孟寅秉公之淸白延陵令李令從如公之愛人金壇令胡玘稟公之成規及丹陽耆壽周孝瓌百姓湯源等拜首而請曰兊爲澤兊恱也水歸於澤而澤恱於人百年浸塞而公啓之臣哉鄰哉克諧帝休永代是式三縣無災􅀂不碣而刻之則王命不揚於厥後後之人無以􅀝􅀒也華甞學古見訪爲頌曰望沄沄􅀆視􅁳􅁳鳥閑魚樂葭菼生膏腴利倍起訟爭斯人怨抑痛無聲韋公正直動神靈百年游淀爲漻淸飢者飫􅀆病者寧詔書光寵恩霈榮劃然眊矒復皎明追􅅣刻頌揚棻馨高陵令劉君遺愛碑頌并序劉禹錫縣内之大夫鮮有遺愛在其去者蓋邑居多豪政出權道非有卓然異績結于人心浹于骨髓安能乆而愈思大和四年高陵人李仕淸等六十三人具前令劉君之德詣縣請以金石刻縣令以狀申于府府以狀考于明法吏吏上言謹按寳應詔書凡以政績將立碑者具所紀之文上尙書考功有司考其詞冝有紀者乃奏明年八月庚午詔曰可令書其章明有以結人心者􅀭揭于道周云涇水東行注渠釃而爲三以沃關中故秦人常得善歲按水部式決􅂥有時畎澮有度居上游者不得擁泉而顓其􅃾毎歲少尹一人行視之以誅不式兵興已還寖失根本涇陽人果擁而顓之公取金流浸原爲畦私開四竇澤不及下涇田獨肥他邑爲枯地力旣移地征如初人或赴訴泣迎尹馬而占涇之􅃾皆權倖家勢足以破理訴者覆得罪繇是咋舌不敢言吞􅁈銜忍家視孫子長慶三年高陵令劉君勵精吏治視人之瘼如熛疽在身不忘决去乃循故事考式文曁前後詔條又以新意請更水道入于我里請杜私竇使無棄流請遵田令使無越制別白纎悉列上便冝􅁺吏依違不决居二歲距寶曆元年端士鄭覃爲京兆秋九月始具以聞事下丞相御史御史屬元谷實司察視持詔書詣渠上書得利病還奏青規中上以谷奉使有狀乃俾太常撰曰京兆下其符縣主簿談孺直實董之冬十月百衆雲奔憤與喜并口謡手運不屑鼛皮揆功什七八而涇陽人以竒計賂術士上言白渠下高祖故墅在焉子孫當㳟敬不冝以畚􅓩近阡陌上聞命京兆立止絶君馳詣府控告具發其以賂致前事又謁丞相請以顙血汚車􅌲丞相彭原公斂容謝曰明府眞愛人陛下視元元無所悋弟未周知情僞耳即入言上前翌日果有詔許訖役仲冬新渠成渉季冬二日新堰成駃流渾渾如脉宣氣蒿荒漚冒迎耜釋怨開塞分寸皆如詔條有秋之期投􅓩前定孺直告巳事君率其寮躬勞倈之烝徒讙呼奪襏而舞咸曰吞恨六十年明府雪之擿奸犯豪卒孰施爲嗚呼成功之難也如是請名渠曰劉公堰曰彭城按股引而東千七百歩其廣四尋而深半之兩涯夾植􅂎柳萬本下垂根以作固上生材以備用仍歲旱沴而渠下田獨有秋渠成之明年涇陽三原二邑中又擁其衝爲七堰以析水􅀔使下流不厚君詣京兆索言之府命從事蘇持至水濵盡撤不當擁者繇是邑人享其長利生子以劉名之君諱仁師字某彭城人武德名臣刑部尚書德威之五代孫大曆中詩人商之猶子少好文學亦以籌畫干東諸矦遂叅幕府歷尹劇縣皆以能事見陟率不時而遷旣有績于高陵轉昭應令俄兼檢校水曹外郎充渠堰副使錫朱衣銀章計相愛其能表爲檢校屯田郎中兼侍御史斡池鹽于蒲錫紫衣金章歲餘以課就加中執法理人爲循吏理財爲能臣一出于淸白故也先是高陵蒙被惠風而惜其捨去發于􅅐懷播爲聲詩今采其㫖而變其詞志于石文曰噫涇水之逶迤漑我公􅀆及我私水無心􅀆人多僻錮上游􅀆乾我澤時逢理􅀆官得材墨綬移􅀆劉君來能愛人􅀆恤其隱心旣公􅀆言旣盡縣申府􅀆府聞天積憤刷􅀆沈痾痊劃新渠􅀆百畎流行龍蛇􅀆止膏油遵水式􅀆復田制無荒區􅀆有良歲嗟劉君􅀆去翶翔遺我福􅀆牽我腸紀成功􅀆鐫美石永信詞􅀆昭懿績蘇州嘉興屯田紀績頌并序李翰禹平九土溝洫之功大棄粒蒸人稼穡之務重自古有國家未甞不率由斯道底愼其業故登平足以厚生殖禍難足以定凶災未有易此而能理者自羯戎亂常天歩多艱兵連不解十有四年因之以飢饉重之天札死者曝露亡者惰遊編版之戸三耗其二歸耕之人百無其一將多於官吏卒衆於農人古者八家爲鄰一家從軍七家從之猶曰興師十萬内外騷動不得操農桑者七十萬家今乃以一夫家食一伍一餘子衣一卒師將不立人將不堪此聖上所以旰食宵興求古今令典可以濟斯難者莫出乎屯田廣德初乃命相國元公昌其謨分命諸道節度觀察都團練使統其事擇封内閑田荒壤人所不耕者爲其屯求天下良才善政以食爲首者掌其務屯有都知羣士爲之都知有治即邑爲之官府官府旣建史胥備設田有官官有徒野有夫夫有任上下相維如郡縣吉凶相恤如郷黨有誅賞之政馭其衆有敎令之法頒于時此其所以爲屯也雖天子命之股肱賛之至於宣上命齊下力經地域制地事辨土冝均土法簡穡器修稼政陳三壤之種而敬其始考九農之要而成其終則都知之職專達其事焉詎可以非其人哉浙西觀察都團練使御史中丞兼呉郡守賛皇公王國大賢憂公如家愼擇厥官以對明命浙西有三屯嘉禾爲之大乃以大理評事朱自勉主之且楊州在九州之地最廣全呉在楊州之域最大嘉禾在全呉之壤最􅃾故嘉禾一穰江淮爲之康嘉禾一歉江淮爲之儉公首選於衆獨當其任有寛簡惠和之德知艱難勤儉之事政達乎本智通乎時仁愛足以結下機權足以成務嘉禾大田二十七屯廣輪曲折千有餘里公畫爲封疆屬於海濬其畎澮達于川求遂氏治野之法修稻人稼澤之政芟以殄草剔以除木風以布種土以附根頒其法也冬耕春種夏耘秋穫朝巡夕課日考旬㑹趨其時也勤者勞之惰者勗之合耦助之移田救之宣其力也下稽功事達之于上上制禄食復之于下叙其勞也至􅀂義感於内誠動於中徇國忘家恤人猶巳野次露宿簞食瓢漿盡四體之勤趨一時之役大寒栗烈而猶執鼖鼓盛暑赫曦而不傳車蓋如登高去梯與之死生投醪均味忘其飢渴然後知仁義之政必見於耕穫井田之法可施於甲兵夫如是人將竭其力地將盡其利天將與其時自賛皇爲郡無凶年自朱公爲屯無下歲元年冬收入􅀂干斛數與浙西六州租稅埒朝嘉厥庸授廷尉評公又稽氣授時如前代法有白雀集于高豐屯廩蓋大穰之徴也屯官某乙等聚而稱曰􅀄公爲屯人有二懼焉邑人懼其􅁀屯人懼其擾今溝封犬牙而不相侵疆場日履而人不知方舟而上以饋師旅此功及於國也登量而入以寛征稅此德加於人也古者智效一官政修一郷猶歌之詠之手之足之況朱公之績如此其大者乎遂相與斵琬琰表阡陌南陽太守豈專刻石之功桐鄕嗇夫終踐大農之位其辭曰茫茫九區陽九􅄤災丘荒札瘥田卒汚萊天歩未移連師滿野不耕不穫仰食干下嗷嗷遺人餬口饋軍帝曰予憂爰立其屯且戰且耕古之善經辟師肅祇王命是聽嘉禾之田際海茫茫取彼榛荒畫爲封疆朱公莅之展器授方田事旣飭黎人則康我屯之稼如雲漠漠夫位棊布溝封綺錯朱公履之勸耨趨穫稂莠不生螟蝥不作歲登億計征寛稅薄息我蒸人遂其耕鑿我屯之􅁃如京如坻嘉量是登方舟是維賛皇獻之達于京師飽我六軍肅將天威畎距于溝溝達于川故道旣堙變將爲田朱公濬之執用以先浩浩其流乃與湖連上則有塗中亦有舩旱則漑之水則泄焉曰􅀨曰霽以溝爲天俾我公私永無飢年公田翼翼私田薿薿不侵其畔不犯其穡我倉旣盈爾廪維億屯人熈熈邑人怡怡不擾其務不干其時我無爾暴爾無我欺我有官屬朱公訓之我有徒位朱公恤之我有衆役朱公卒之我有徴功朱公序之起於田中印綬纍纍何以況之福禄如茨何以乆之刻􅂐于碑唐天台山新桐柏觀之頌并序崔尚天台也桐柏也代謂之天台眞謂之桐柏此兩者同體而異名同契乎玄道無不在夫如是亦奚必是桐柏邪非桐柏邪因斯而談則無是是無非非矣而稽古者言之桐柏山高萬八千丈周旋八百里其山八重四靣如一中有洞天號金庭宫即中右弼王子晉之所處也是之謂不死之福鄉養眞之靈境故立觀有􅀄强名桐柏焉耳古觀荒廢則巳乆矣故老相傳云昔葛遷公始居此地而後有道之士往往因之壇址五六厥迹猶在洎乎我唐有司馬練師居焉景雲中天子布命于下新作桐柏觀蓋以光昭我玄元之丕烈保綏我國家之永祉者也夫其高居八重之一俯臨千仞之餘背隂嚮陽審曲靣勢東西數百歩南北亦如之連山峩峩四野皆碧茂樹鬱鬱四時􅁪靑大巖之前横嶺之上􅀟峯如闕中天豁開長澗南瀉諸泉合漱一道瀑布百丈懸流望之雪飛聽之風起石梁翠屏可􅀝也琪樹珠條可攀也僊花靈草春秋互發幽鳥淸猨晨暮合響信足賞也始豐南走雲嶂閒起剡川北通煙岑相接東則亞入滄海不逺蓬萊西則浩然長山無復人境揔括奥祕鬱爲秀絶包元氣以混成鎭厚地而安靜非夫神與僊宅僊得神營其孰能致斯哉故初構天尊之堂晝日有雲五色浮靄其上三井投龍之所時有異雲氣入堂復出者三書之者記祥也然后爲虚室以鑿戸起層臺而壘土經之殖殖成之翼翼綴日月以爲光籠雲霞以爲色花散金地香通玄極眞侣好道是遊斯息微我練師孰能興之練師名承禎一名子微號曰天台白雲河内温人晉宣帝弟太常馗之後祖晟仕隋爲親侍大都督父仁最唐興爲朝散大夫襄州長史名賢之家奕代清德慶靈之地生此仙才以爲服冕乗軒者寵患吾身也擊鐘陳鼎者味爽人口也遂乃􅂢公侯之業學神僊之事科籙敎戒博綜無所遺窈冥夷希微妙詎可識無思無爲不飲不食仰之彌峻巍乎其􅀂山挹之彌深湛乎其􅀂海夫其通才練識贍學多聞翰墨之工文章之美皆忘其所能也練師藴廣成之德睿宗繼黃軒之明齋心虛求將􅀝國政侃侃然不可得而動也我皇孝思維則以道理國恊帝堯之用心寵許由之高志故得放曠而處逍遥而遊聞練師之名者足以激厲風俗睹練師之容者足以脫落氛埃以慈爲寶以善救物神以知來智以藏往允所謂名登仙格迹在人寰奥不可測已夫道生乎無名行乎有情分而作三才播而作萬物故爲天下母脩之者昌背之者亡故爲天下貴況絶學無憂長生乆視也哉道之行也必有階也行道之階非山莫可故有爲焉有象焉瞻於斯仰於斯􅀂舎是居敎將奚依損之又損之以至於無爲玄門旣崇不名厥功朝請大夫使持節台州諸軍事守台州刺史上柱國賈公名長源有道化人有德養物甞謂別駕蔡欽宗等曰且道以含德德以致美美而不頌後代何觀乃相與立石紀頌以奮至道之光其辭曰邈彼天台嵯峨崔嵬下臨滄海遥望蓬萊漫􅀂天合呀如地開煙雲路通眞仙時來顧我練師于彼瓊臺練師練師道入玄微噏日安坐凌霄欲飛興廢靈觀練師攸賛道無不爲美哉輪奐窈窈茫茫通天降祥保我皇唐如山是常唐故中嶽體玄先生潘尊師碑頌并序陳子昻尊師業尚冲密勤毖幽深理心事天所保唯嗇絶聖棄智不耀其光故眞感􅁳期珍圖祕學性與天道不可得而聞也􅀂乃崇標曠迹遐情逺意志摩靑雲蓬視紫闥高宗毎降鑾輦親詣精廬尊師身不下堂接手而巳每歎曰大丈夫業於道不能投身霄嶺滅景雲林而疲痾此山以煩世主吾之過乎遂欲東求蓬萊􅀌舟入海屬天皇敦篤斯道祈􅅃逾深躇躊山隅絶策未往旣而金革有命鑣轡遺區於戲昔姑射有神人堯輕天下崆峒有至道軒屈順風玄眞高蹤萬古同德何其盛哉尊師有弟子十人並仙階之秀然鸞姿凰骨眇愛雲松者唯潁川韓法昭河内司馬子微皆禀訓瑶庭密受瓊室專太淸之業遺下仙之儔谷汲芝耕服勤於我蓋歷歲紀也始尊師受籙於茅山昇玄王君王君受道於華陽隱居陶公陶公至子微二百歲矣而玄標仙骨雅似華陽夫偕眞􅌃􅁳鍊景遊化者其心必有􅀋乎昭等永惟尊師靈迹洞業高深邁古而棄世往矣其􅀂之何乃斵石幽山勤頌玄德其辭曰觀元化􅀆求古之列仙得瑶圖與金鼎信元符之自然神與道而惟一天與人􅀆相連苟精守以專密必駕景而凌煙丹丘不死􅀆羡門子黃宫度世􅀆吾體玄體玄之至德􅀆洵淑美沖心養和寶元始初學茅山濟江水乃入華陽洞天裏道逢眞人􅀆昇玄子授以寶書靑台㫖令守崧山玉女峯雲棲窮林今五紀聖人以萬機爲貴而我以天下爲累聖人以大寶爲尊而我以天下爲煩是以􅁳居於㟪􅤅􅀉遺迹於軒轅有唐高宗􅀆天子之光好道樂仙􅀆思彼雲郷千旌萬􅀐􅀆翠鳯凰遨遊汝海􅀆箕山陽朝拜白茅夕紫房齋心絜意􅃡相望祈問玉眞及玉皇何以得之受天昌黃庭中人在子身窈窈􅁳􅁳精甚眞去汝驕氣與􅁋神勤能思之道相親遂解形而遺世乗白雲而上賔弟子不知其所往乃刻石以思眞長明燈頌并序高邁离婁之目處闇室或不能覩燈處之皎如也澄公之掌在玄夜或不能照燈在之了如也故大雄氏以方便力救黒暗界藉其光誘其人佛所以有然燈名法所以有傳燈義大抵長明燈是其藴乎夫日主晝太陽之精中則昃昃則没我長明燈不没月主夜太隂之精滿則虧虧則盡我長明燈不盡日月尚爾況小光小明哉要自積苦爲海舉足見溺積邪爲山舉手見礙竟不髣髴之或髣髴之不克成就之言之可爲長歎我邑中有俊傑主此然燈精進成就於寶融寺經藏院且夫蘭炷􅋹火吾見其盛未見其微也鐡盆盛膏吾見其増未見其減也一籠而四時長花滿室而終歲不夜人見之者一作禮眼蒙利再作禮心蒙爽心眼自相照了内外由是洞徹然則終日見燈未甞見燈終日不見燈未甞不見燈夫達觀者乃如是也意者不獨於此直上照一天二天乃至三十三天無門不闢􅁪沙善人由兹而入直下照一地二地乃至一十八地有獄皆開多刼罪人由兹而出􅀂然者四維上下虚空可思量不不可思量邪我長明燈實相功德亦復如是邁三數年内願銘頌之閒迫賤事未構斯文一朝染目疾朦朧而不自審從何得也遂夢神人語邁曰子於長明燈其有􅀒乎邁應聲而寤寤而起起而作頌明日目愈頌曰見外燈長明見内燈長明萬惡自光中滅萬善自光中生不見一燈百千萬億燈乃至於無窮不見一人百千萬億人歸之於大同空則是色色即是空弟子作頌允執厥中重校正唐文粹卷第二十一
