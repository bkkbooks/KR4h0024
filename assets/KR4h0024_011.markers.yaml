  - {type: variant, offset: 8662, length: 360, content: 有所恨二章并序歐陽詹有所恨由故人馬紳死而興也予待試京師六年與馬生相知者四秋性與情相合也衣與食相同也予及第歸覲故園自別來無憶不至於襟懷無想不至於姿容願一促膝惄如也昨旣至止馬生且疾巫者忌以見人曰不見即愈見即害遂忍即見庶以求見忍者五日馬生云亡噫故人也昔越萬里猶求見焉惑乎一言蔽乎一垣而死生以之死生之道千秋之離也五日之靣半旬之歡也尚可半旬之歡不就而卒甘千秋之離一恨也又與生別撡執都門生脫紫羅半臂曰即日相去秦呉聊以爲憶予貧也素乏衣服不暇藏篋笥聮緜在身二年閒同弊帛以棄所以新而輕著故而不留者予實未衰馬其方少爾斯日日相與也所留何止在兹乎今人旣徃所贈又造次而亡之二恨也申二恨爲有所恨二章云我思君子吁嗟萬里亦旣至止曷不覯止本不信巫而巫言是履在門五日如待之死有所恨兮我思遺衣爲憶以貽亦旣受持曷不保持本不欺友而友情是違隔生之贈造次亡之有所恨兮, WYG: ''}
