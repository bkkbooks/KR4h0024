body:
  text: 碑十二揔八首家廟唐西川節度副大使中書令南康郡王韋公先廟碑權徳輿唐丞相司空燕國公先廟碑唐丞相贈太子太師崔公廟碑韓雲卿唐淮南節度使李公先廟碑白居易唐宣武軍節度副大使令狐公先廟碑劉禹錫唐興元節度使王公先廟碑唐魏博節度使沂國公田公先廟碑韓愈唐河陽軍節度使烏公先廟碑唐故光禄大夫檢校太尉兼中書令成都尹劒南西川節度副度使知節度事兼管内支度營田觀察處置統押近界諸蠻夷西山八國雲南安撫等使上柱國南康郡王贈太師章公先廟碑銘并序權徳輿萬物本乎天人本乎祖乃立宗廟以安神明徳厚流光追養繼孝順而下之曰義等而上之曰仁國家稽合禮文損益前載崇功貴仕得祠四室於王制酌諸侯二昭二穆之義於祭統見君子盡志盡物之誠惟太尉中書令南康郡王懿文經武保合昌運左右徳宗格于皇天始恢隴坻之旅終化岷峨之俗貴為上公位極元台克肆忠力乃圖孝享作新廟于京師大安里古者揚其功烈銘于祭器近古以魯鍾衛鼎追琢先徳不若鏤文字於䴡牲之碑之為詳也乃謹而書之云公姓韋氏京兆杜陵人自扶陽重侯用經明至宰相後裔蕃昌徳與位偕積十六葉至六代祖範字元禮以字行於代仕周為車騎大将軍入隋為汴州刺史啓土郿城易名曰荘實生孝恪雅有文憲武徳初由侍御史為洛州别駕生司農府君諱機為第一室端誠正志休有厥聲專對出疆艱貞復命著西征記以獻太宗嘉之剖符澶州修起儒術三典卿曹陟降屯夷操持貴倖不避彊禦繕理宫室得其時制史氏書之為唐名臣以夫人隴西郡君辛氏配司農生坊州府君諱餘慶為第二室清和修潔履道不回歴右驍衛兵曹㕘軍以至二千石以夫人武功蘓氏配坊州生贈太子少保府君諱嶽為第三室方嚴貞幹政事修明在武后時以直忤㫖由太原令移佐睢陽出入四紀績宣中外歴殿中監剖符八州盧海潮虢眉徐衛陜所至之邦有威有懐凢再追命以夫人扶風郡夫人竇氏配少保生贈太子太師府君諱賁為第四室盛徳循行含章自牧歴藍田尉淑聲流聞上纂崇厚下貽風訓凡三追命以夫人涼國太夫人段氏配噫嘻自扶陽至郿城積丕烈於前史自考廟至顯考廟流熾昌於後葉列於禘嘗儲厥義方故南康郡王苞五常貞四教秉靈傑出含道中立初誓偏師建竒功扞大患立大節以儒衣法冠授律鑿門佩亞相之印綬修元侯之節制就加宗工入掌金吾撫征全蜀命賜備厚由地官轉天官㕘緫端右平章宰政進中書令加司徒太尉鏚鉞秬鬯旗鑾琱戈有嚴有翼乃蔚乃赫忠厚博大以阜俗信亷仁勇以成師南蠻納邸西羌解辮象胥譯戎㨗樂府陳夷歌守正持重推誠畢力開地通道者九千餘里生聚教訓者二十一年天文紀功刻在金石暨徳宗棄天下太上居諒闇危言急病體國忘身毅然君子之道卓爾大臣之節永貞元年秋七月考終命于理所䇿贈太師有司奏諡曰忠武公自廟成距今凡八年矣以公天子守臣安危注意不得視滌濯承吉蠲而元兄國子司業聿實奉朝請薦其常事孝友而才稱於士林初公之仲兄曰暈屯田員外郎贈鄧州刺史叔氏曰肇太子左庶子兼御史大夫贈左散騎常侍咸以器望而延褒錫公之夫人贈魏國夫人張氏其祖禰與外王父皆秉國鈞為天下華腴嗣子工部員外郎行立銜恤無怙齊䘮中禮大凡四廟之支旁尊羣從烜爀昭融不可勝書至若質明光近沐浴盛服虛中以理嘉薦匪解而無違心太糦沈齊馨香條鬯既思其志意若聞乎容聲洞洞乎屬屬乎有以見舉十倫而備百順昔素王之以戰則克以祭則受福其斯之謂乎司業悼手足之凋落感春秋以悽愴永懐明發俾篆斯文銘曰新廟有侐静深奕奕孝孫匪懈𤣥衮赤舄洪閥章章乃侯乃王漢稱扶陽唐有南康二十三葉沛然蕃昌四室崇崇斯焉享甞烈烈南康温良能斷謀猷樽爼文武楨榦汧岐之西祲沴銷散井絡之下天文昭煥撫封全歸冥寞徳輝聿修孝享家法無違以昭以穆以嗣以續和氣婉容苾芬烹熟子孫小大罔不祗肅神之聼之報以介福唐金紫光禄大夫守司空同中書門下平章事充太㣲宫使上柱國燕國公于公先廟碑銘并序權徳輿國朝之制二品已上祠四廟三公品第一雖有始封亦不敢逾焉元和五年相國司空燕國公立新廟於京師蘭陵里司空公以文武偉才肆勤納忠外貞師律入作公相以平乎水土以調乎隂陽闕惟祖禰尊尊之義昭穆親親之道乃圖廟食以永代徳公姓于氏河南人七代祖謹後魏柱國大将軍周太傅三老燕國文公六代祖寔周文左輔隋贈司空燕國安公五代祖象賢驃騎大将軍㑹昌定公惟三葉有大勲力于北朝乞言而為惇史體國以全至公四代祖益州郫縣令諱徳威夫人京兆韋氏曽祖緜州顯武縣令諱𤣥範夫人北海唐氏王父贈刑部尚書諱汪夫人北海王氏烈考贈司空諱夐夫人邠國太夫人京兆韋氏凡宗廟之數郫縣為初室顯武為二室尚書為三室司空為親室其配各以夫人氏交神明之道也惟郫縣顯武遵道服儒亷退潔修且曰邴曼容陳仲弓吾之師也故仕不過六百石而以理效聞尚書沈冥善閉含道特立以處士燕居至于没身凡三追命至大司冦先司空廣大而静黙恭儉而好禮合二雅循四教推明理古之學貶絶非聖之書恬智交養龜頥不惑起家益州東陽主簿四徙官至寕州真寕縣令又再轉至泗州司馬禄至卑而仁及物道未泰而志不懾公卿大夫之間尊有道而踈利權天寳未宰執擅朝惡其剛介不附已故官止郡佐而慶延身後朝典加恩亦三追命曰密州刺史吏部尚書以至于論道焉長子頗專良有士行終洋州司户㕘軍家子䪹貞幹强敏程功賦職歴户部侍郎以公事貶泉州司户贈楚州刺史㓜子頃吏理清明仕至長安縣尉司空公即第三子也英郎閎逹剛方博厚才可以扞大患學可以析羣疑彌綸中朝則尚書郎京邑廷尉皆有懿績惠綏外服則湖蘓虢陜二千石察亷克宣功化繇山南東道節度使平章事入覲居中䇿拜顯尊紹文公安公之爵地展盡志盡物之誠敬悽愴怵惕精明吉蠲詩云春秋匪懈享祀不忒司空當之矣又曰以妥以侑以介景福先公冝之矣又狀先公之行其大略曰孔宣父應聘歴國因而老于洙泗我先君宦學於天寳之年而操之者甫忠謂林甫國忠先君於無窮乎又曰小子不敏不通先君之大道不識先君之大行不肖之罪也類是者千餘言其太史公自序之風可以論譔酌之祭器徳輿外王母公之從母也故其門中風訓獲周知之忝備重任在公下列公以廟銘見授頓伏上聞尊嚴咫尺實奉面命其傳信不敢曼辭銘曰燕文三老弼魏佐周安公定公亦播厥猷郫縣顯武一同丕矩尚書司空三命追崇義訓忠敎公台焜燿乃封故地乃建新廟新廟是冝羶薌告祠齊明盛服乃順乃時卑静以正如親聼命求福不囘孝孫之慶刻銘斯碑以代承夷唐丞相贈太子太師崔公廟碑銘并序韓雲卿戊申歲六月尚書左僕射趙國公圓薨天子罷朝三日䘮禮贈賻加異常數詔贈太子太師謚曰昭襄嗣子褒遵荷先訓敦率舊禮五月而葬二十五月而祥始立廟洛邑曰考廟王考廟皆二丈有七從四尋衡八尋二户立楹外垂四阿圬塓彩繪施以丹艧齋室爨室庭垣稱之連族氏勲躅清顯銘其徳太師崔氏河東武城人也係于齊著于漢荷先少師之純孝温重禀受元和緯文經武為國梁柱賊臣禄山慿犯河華𤣥宗順動南逰蜀漢公為居守有扶掖再造之勲函洛阻絶人惟蠆毒肅宗振旅朔陲殱静禍亂公為宰衡有翊賛戡復之謀山越之難淮泗之疑茂勲盛業疇為公比禮曰以勞定國則祀之能禦大災則祀之能捍大患則祀之是冝廟食以銘于鼎以某月之某日寝廟既成庭除既平備器潔服儉而中禮先饗七日致齋具物水草陸産醴酪牲牷之備外盡物也色温行宛身屈意愉懼不及内盡志也禮卒奠撤齋荘之色如存焉歎息之音如聞焉君子曰吾觀崔氏之享有以知禘甞之義焉古者諸侯立五廟有鼎與樂有國之制侯伯有爵而無土廟有鼎祭樂不克立五廟而立三廟不銘于鼎而銘于碑其銘曰顯顯太師天孕鴻才恢張碩勲輝輝衡台惟昔姦兇飫恩犯順當時無虞區宇駭震𤣥宗南巡功著巴岷肅宗戡復勲楊策牘銷殄氛祲宣明日月於惟太師誰將比烈爰自鼎司出鎮淮夷外有亂虜内有疑師欽和畏威逺邇來思於惟太師為國藩維功以殱災勞以定國詳考祀典禮存廟食爰立寢廟不忘儉易翼翼孝子愉愉其志齋莊慤誠庶物臻偹爼豆斯設神將來既嵗時迭移霜露薦至德流慶延昌庇後嗣唐淮南節度使檢校尚書右僕射趙郡李公家廟碑銘并序白居易王建侯侯建廟廟有器器有銘所以論譔先德明著後代或書于鼎或文子碑古今之通制也維開成某年某月某日宣武軍節度使檢校尚書右僕射汴州刺史上柱國賜紫金魚袋趙郡李公齋沭祗慓拜章上言請立先廟以奉常祀於是得請于天子承式于有司是嵗某月某日經始于東都明年某月某日有事于新廟外盡其物内盡其志三獻百順神格禮成其友居易以李氏宗祖世家名爵與僕射志行官業書于麗牲之碑謹按家畧九代祖善權後魏譙郡守八代祖延觀徐梁二州刺史七代祖續某郡大守六代祖顯達隋頴州刺史五代祖遷皇朝冝榖二州别駕贈德州刺史高祖孝卿右散騎常侍贈鄧州刺史曽祖府君諱敬𤣥總章儀鳯間歴吏部侍郎同中書門下三品中書令𢎞文館大學士監修國史封趙國公諡曰文憲才智職業載在國史今祭于第一室以妣薊國夫人范陽盧氏配焉王父府君諱守一屬世難家政不求聞達避榮樂道與時浮沉終成都府郫縣令祭于第二室以妣榮陽夫人鄭氏配焉先考府君諱晤歴金壇烏程晉陵三縣令府君為人篤於家行飾以吏事動有常度居無惰容所蒞之邑有善政辭滿之日多遺愛不登貴位其命矣夫今祭于第三室以先妣上谷夫人范陽盧氏配焉府君累贈至尚書右僕射夫人累贈至上谷郡太夫人前後凡三追命六告第渥澤疊洽自葉流根從子貴也郫縣臮晉陵府君咸善積于躬道屈於位儲祉流慶而僕射生焉僕射名紳字公垂六歲丁晉陵府君憂孺暮號踊如成人禮九歲終制孝養上谷太夫人年雖㓜承順無違家雖貧甘㫖無闕侍親之疾冠帶不解者三載餘可知也執親之喪水漿不入口者五日餘可知也先是祖妣考妣晉陵府君前娶夫人斐氏無子早喪洎叔父兄妹之殯咸未歸祔各處一方公在斬縗中親䕶九喪匍匐萬里及期喪事禮無闕違至誠感神有靈烏瑞芝之應事動鄉里名聞公卿言孝友者以為表率憲宗嗣統三年李錡盜據京口公寓居無錫㑹擢第東歸錡聞公名署職引用初詢以謀畫結舌不對次强以章檄絶筆不書誘之以厚利不從迫之以淫刑不動將僇辱者數四就幽囚者七旬誠貫神明有死無二言名節者以為準程朝廷嘉之拜右拾遺歲餘穆宗知公忠孝文行召入翰林特授司封員外郎知制誥遷中書舍人承顔造膝知無不言獻替啟沃如石投水俄拜御史中丞户部侍郎既而望屬台衡朝當晏駕時移世變遂出􅁺高要佐潯陽旋為滁夀二州刺史大凡公之為政也應用無方所居必化卧理二郡以去害為先故有盜奔獸伏之感廉察浙右以分憂為切故有䘏鄰活殍之惠尹正河洛以革弊為急故有摘姦抉蠧之威文宗知公全才以汴難理乃授鈇鉞俾鎮綏之初宣武師人驕强恨悍狃亂徼利積習生常公既下車盡知情偽刑賞信惠合以為用一年而下懲勸二年而下畏服三年而下恥格肅然丕變薰然大和撫之五年人俗歸厚至於捍大患禦大災郤飛蝗遏暴水致歲於豐稔免人於墊溺噫微公之力汴之民其為殣乎其為魚乎殊績尤課不可具舉天下征鎮淮海為大非公作帥不足以長東諸侯制加銀青光禄大夫楊州長史淮南諸道節度觀察等使餘如故詔下之日出次于外軍門不擊析里巷無吠犬從容五日按節而東百姓三軍挈壺漿捧簟醪遮道攀餞者動以萬輩皆鳴咽流涕如嬰兒之别慈母焉噫若非袴􅃭之惠及其㓜稚雞豚之養及其老艾推赤心置人腹中者則安能化暴戾之俗一至於此乎西人泣送東人歌迎梁楚千里風交化移膏雨景星所至蒙福于時開成㑹昌之際上方致理公未登庸顒顒蒼生環望而已盛矣哉大丈夫生於世也以忠貞奉乎君以義利惠乎人以黻冕貴乎身以宗廟顯乎親以孝敬交乎神冝其荷百禄輔一徳為有唐之宗臣者歟君子謂李氏之廟也休哉公之祭也順哉然曰有孫如此有子如此可謂孝也故其碑銘云祭祀從貴爵土有秩諸侯之廟一宫三室皇皇西室皇祖中書孝孫追逺昭穆有初顯顯中室王父郫令順孫祗享盡孝盡敬肅肅東室先考晉陵嗣子奉薦孝思蒸蒸嗣子其誰僕射公垂公垂翼翼齋嚴諒直為子為臣有典有則載􅈾休命載踐右職以孝肥家以忠肥國乃授侯伯纛鉞旗㦸乃饗祖襧牲牢黍稷家聲振耀國典褒飾六命徽章三世血食光大遺訓顯揚先德子孫承之垂裕無極唐宣武軍節度副大使檢校禮部尚書令狐公先廟碑銘并序劉禹錫今上元年七月十三日汴州刺史宣武軍節度副大使知節度事汴宋亳等州觀察處置使銀青光禄大夫檢校禮部尚書兼御史大夫上柱國彭陽縣開國伯令狐公西嚮拜章上言守臣楚蒙被恩澤列為元侯得立家廟以奉常祀制書下其奏于有司於是善相考祥得地于京師通濟里居無何新廟成公以守藩故申命季弟監察御史定卜牲練日越八月丁亥祔饗三室塪墉以尚幽設幄以迎精禮無尤違神用寧謐第二室泰州上邽縣尉諱濬以闕太原王氏配第二室緜州昌化縣令贈吏部尚書諱崇亮以贈太原郡夫人河東柳氏配第三室太原府功曹叅軍贈司空諱承簡以妣贈魏國太夫人富春孫氏配明年十月公由浚郊以介圭入覲真拜户部尚書進爵為魯侯既辭戎旃得以列侯謁三廟是歲南至上不視朝又得以時展祭先期致齋栗然以敬既齋盡志歆然永思奉其百順陳以具物始躋而䖍恭終獻而汍瀾既卒事顧麗牲之石宜有刋紀乃俾家老授其諜于所知云令狐晉邑也晉大夫魏顆以輔氏之功始封焉其易名文國語所謂令狐文子是也其先周文王之昭畢公高之裔畢萬為晉鄉始封于魏自萬至顆盖四世其後三十七世藍田侯虯仕拓魏為燉煌郡太守子孫因家遂占數為郡人藍田之孫熈在隋為納言惟上邽府君納言之𤣥孫道克肖而位不至惟尚書府君西州之右族光未耀而德已基惟司空府君志為君子儒以經學居上第調補安陽縣主簿歴平正縣尉汾州司法叅軍陜州大都督兵曹終于太原府首掾始以顓經進既仕旁通百家愛穀梁子清而婉左丘明國語辯而工司馬遷史記文而不華咸手筆朱墨究其微㫖愷悌以肥家信誼以急人德充齒耋獨享天爵故休祐集于身後徽章流乎佳城凡以子貴承澤降命書告第者始贈尚書祠部郎中再贈禮部尚書三加右僕射四進太保五為上公先太夫人亦四從封蜜印纍纍邦族聳慕生三子皆才彭陽為嗣次子從端實肅給令為檢校膳部郎中叅河東軍事季子前所謂為監察御史今主柱下方書温敏而有文綽綽然真令兄弟惟彭陽公以辭筆取科名翰飛叅侍從由博士主尚書牋奏典内外書命遂登樞衡言文章者以為冠擁節總戎率身和衆留惠于盟津變風于浚都言方畧者以為能夫浚師嚄唶難治乗釁竊發寖成習俗莅止五載飲和革心車馬來朝人皆隕涕問公還期觴必祝之留為常伯旋命居守汴人聞公之東近而逾懷翹翹瞿瞿咸西其首言遺愛者可紀焉貴而率禮老而能慕怵惕乎霜露齊莊乎廟祧睦其季仲施及鄉黨闕孝弟者歸厚焉勒銘于碑以代彛鼎文曰已孤之孝莫如備物顯顯新廟四阿三室時惟仲月卜用柔日醆醴苾芬牲牷肥腯籩甒在堂蕭膋在庭孝孫蒸蒸恭若奉盈低簪委紳薦爼登鉶肹蠁交感流涕縁纓禮以備儀誠以致美祖考來格錫之休祉工祝告訖退循軒戺乃授風人作詩以紀猗歟彭陽之寵光佐憲皇西省東臺迭為侍郎國之大柄咨爾平章敬宗凝旒俾鎮雍丘入為地官今守東周彭陽之忠厚冝介福以夀東郊既釐可復朝右緜緜其胄系于周舊由我顯起必昌其後大和紀元作廟之首刻碑廟門龍集己酉唐興元節度使王公先廟碑銘并序唐制五等有爵服而無山川登于三軍得立四廟備物崇祀以交神明敬先報本以輔孝治有國之令典也惟長慶三年前相國王公始卜廟于西京崇業里公時鎮劔南東川上章曰臣涯官秩印綬品俱第三請如式以奉宗廟制可是歲仲冬申命長男孟堅祔其主于三室明年公入為御史大夫復以十一月躬行烝祭間歲公出梁州就拜司空禮崇異數廟加祀室大和二年増新室既成祔顯考尊位告饗由禮觀之者以為世程第一室上儀同幽州别駕府君諱元政以妣博陵崔氏配第二室湖州安吉縣令贈尚書刑部員外郎府君諱實以妣贈扶風縣太君馬氏配第三室朝散大夫青州司馬贈户部侍郎府君諱祚以妣贈武威郡太夫人賈氏配第四室曰温州刺史贈太尉府君諱冕以妣贈魯國太夫人博陵崔氏配初周王太子晉遇浮丘化為神仙時人號曰王家其後遂以命氏顯于秦者曰翦三世将秦師子孫分居晉代間東漢有徴君霸霸孫甲亦號徴君徙居祁縣為著姓故至于今為太原人自漢渉魏益以熾昌凡十葉至後魏度支尚書廣陽侯冏廣陽有二子神念神感神念南奔梁神感北仕齊惟儀同府君廣陽侯五代孫也唐興于太原實從義旗佐成王業故有開府儀同之寵惟刑部府君以功臣子理二邑不躋貴仕故有錫羨後大之祥惟户部府君㓜孤以孝聞于鄉曲未冠以文售于有司由前進士補延州臨安縣主簿㑹詔徴賢良䇿在甲科授瀛州饒陽尉歲滿遷渭南天后在神都而東畿差重遂由渭南轉河陽適建萬象神宮甸内吏分董其役因上書切諫繇是名益聞開元初以大理司直馳駋車聫讞太獄閩禺朔漠至止决平早以欒棘傷生晚成劇恙樂就夷曠故不至大官惟太尉府君生于治平時以文學自奮年十有五賁然從秋賦明年春昇名于司徒又一年𤣥宗御層樓發徳音懸文辭政術科以置旄士府君䇿最高授太常寺太祝未幾復以能通道徳南華冲虛三真經進盭厔尉天寳中歴右拾遺左補闕禮部司馬二員外郎屬幽陵亂華遣兵南服因佐閩粤改檢校比部郎中行軍司馬時中原甫寕江南為吉地二千石多用名徳乃以府君牧温州朝廷虛公卿以侯高第及聞永嘉人輟春罷社薦紳閒以丕淑相弔焉雖位負于道而邁徳垂矩後之人得以纉承丕揚之其儲休啟祐有自云爾生三子皆聰明絶人長曰沼以神童仕至檢校禮部郎中次曰㓗以竒文仕至國子司業今代郡公實季子也早在文仕射䇿連中咸出其家貞元中徳宗聞其名自藍田縣召入禁中視草厥後三典書命再叅内庭憲宗器之付以國柄翊賛有道雖䇿免常居大寮今年自梁州請覲上思用舊臣為羽儀遂領太常其公府如故以一心事六君顯官重務靡不揚歴且夫起諸生至三公而心愈卑道益廣出授黄鉞以臨諸侯入服華章以謁家廟追崇極大位血食備多室享全榮而奉昭薦嗚呼公侯之孝歟冝書廟器以視喬公之三鼎其辭曰閟宇神庭邃清而嚴上公之儀四室眈眈犧以潔牲粢以大糦交神尚敬合魂尚氣子姪宗工駿奔奉事副笄侈袂儼恪居次孝孫兢兢執爵而升以祼以濯以伏以興水陸具來羶薌畢登列于圜方其氣増増乃礿乃甞敬而追逺二昭二穆孝以尊本瞻瞻几幄蹜蹜堂閫禮成起慕涕落𤣥衮濡露踐霜誰無永懐不如逹者哀與榮偕逢時奮庸誰不得位不如仁人以道為貴惟公之達兮名以顯親惟公之仁兮徳以澡身六朝之清臣一代之全人宜其闕家翼翼振振罔不肅祗于廟門魏博節度觀察使沂國公田公先廟碑銘并序韓愈元和八年十一月壬子上命丞相元衡丞相吉甫丞相絳召太史尚書比部郎中韓愈至政事堂傳詔曰田𢎞正始有廟京師朕惟𢎞正先祖父厥心靡不嚮帝室訖不得施乃以敎付厥子維𢎞正銜訓嗣事朝夕不怠以能迎天之休顯有丕功維父子繼忠孝予維寵嘉之是以命汝愈銘欽哉惟時臣愈承命悸恐明日詣東上閤門拜䟽辭謝不報退伏念昔者魯僖公能遵其祖伯禽之烈周天子實命其史臣克作為駉駜泮閟之詩使聲于其廟以假魯靈今天子嘉田侯服父訓不違用康静我國家蓋寵銘之所以休寕田氏之祖考而臣適執筆隸太史奉明命其可以辭謹按魏博節度使銀青光禄大夫檢校工部尚書魏州大都督府長史御史大夫沂國公田𢎞正北平盧龍人故為魏博諸将忠孝畏慎田季安卒其子㓜弱用故事代父人吏不附迎𢎞正於其家使領軍事𢎞正籍其軍之衆與六州之人還之朝廷悉除河北故事比諸州故得用為帥已而復贈其父故滄州刺史兵部尚書母夫人鄭氏梁國太夫人得立廟祭三代曽祖都水使者府君祭初室祖安東司馬贈㐮州刺史府君祭二室兵部府君祭東室其銘曰唐繼古帝海外受制狎于太寕燕盜以驚羣黨相維河北失平號登元和大聖載營風揮日舒咸順指令嶪嶪魏土嬰兒戯兵吏我愁毒莫保腰頸人曰田侯其徳可倚叫譟奔趨乗門請起田侯攝事奉我天明束縛弓戈考校度程堤疆籍户來復邦經帝欽良臣曰維錫予嗟我六州始復故初告慶于宗以降命書旌節有韜豹尾神旗橐兠㦸纛以長魏師田侯稽首臣愚不肖逮兹有成祖考之教帝曰俞㦲維汝忠孝予思乃父追秩夏卿嫓徳娠賢梁國是榮田侯作廟相方視阯見于蓍龜祖考咸喜暨暨田侯兩有文武訖其外庸可作承輔咨汝田侯勿亟勿遟覲嚮式時祖考之思唐河陽軍節度使烏公先廟碑銘并序元和五年天子以盧從史始立議用師于恒乃隂與寇連夸謾兇驕出不遜言其執已來其四月中貴人承璀即誘而縛之其下皆甲以出操兵趨譁牙門都将烏公重𦙍當軍門叱曰天子有命從有賞敢違者斬於是士皆歛兵還營卒致從史京師壬辰詔用烏公為銀青光禄大夫河陽軍節度使兼御史大夫封張掖郡開國公居三年河陽稱治詔贈其父工部尚書且曰其以廟享即以其年營廟于京師崇化里軍佐竊議曰先公既位常伯而先夫人無加命號名差卑於配不宜語聞詔贈先夫人劉氏沛國太夫人八年八月廟成三室同宇祀自左領軍衛而下作主于第乙巳升于廟烏氏著於春秋譜于世本列於姓苑在莒者存在齊有餘枝鳴皆為大夫秦有獲為大官其後世之江南者家鄱陽處北者家張掖或入夷狄為君長唐初察為左武衛大将軍實張掖人其子曰令望為左領軍衛大将軍孫曰蒙為中郎将是生贈尚書諱承洽字某烏氏自莒齊秦大夫以來皆以才力顯及武徳已來始以武功為名将家開元中尚書管平盧先鋒軍屬破奚契丹從戰捺禄走可突于渤海上至馬都山吏民逃徙失業尚書領所部兵塞其道壍原累石緜四百里深高皆三丈冦不得進民還其居歲罷運錢三千萬餘黒水室韋以騎五千來屬麾下邊威益張其後與耿仁智謀説史思明降思明復叛尚書與兄承恩謀殺之事發族夷尚書獨走免李光弼以聞詔拜冠軍将軍守右威衛将軍檢校殿中監封昌化郡三石嶺軍使積粟勵兵出入耕戰以疾去職貞元十一年二月丁巳薨于華隂告平里年若干即𦵏於其地二子大夫為長季曰重元為某官銘曰烏氏在唐有家於初左武左領二祖紹居中郎少畢屬于尚書不償其勞乃相大夫授我戎節制有疆墟備禮登壇以有宗廟作廟大都以致其孝右祖左孫爰饗其報云誰無子其有無孫光對無羞乃惟有人昔命平盧為艱為瘁大夫承之危不棄義四方其平士有迨息來覲來齋以饋黍稷唐文粹巻六十欽定四庫全書唐文粹巻
