  text: 六十六
  hash: sha256:5ee868bf57269387373c46595c9940f29d79aa4d10ec0bdd7e1a3d35e650e32b
body:
  text: 宋姚鉉編銘甲揔一十首名跡塗山銘柳宗元仙掌銘獨孤及古函谷闗銘虎牢闗銘賈至棧道銘歐陽詹仙都山銘張鷺磻谿銘梁肅胥山銘盧元輔天門山銘李白湞陽東嶺洞谷銘元傑塗山銘并序栁宗元維夏后氏建大功定大位立大政勤勞萬邦和寜四極威懷九有儀刑後王當乎洪流方割災被下土自壺口而導百川大功建焉虞帝髦期順承天厯自南河而受四海大位定焉萬國既同宣省風教自塗山而㑹諸侯大政立焉功莫崇乎禦大災乃錫𤣥圭以承帝命位莫崇乎執大象乃輯五瑞以建皇極政莫先乎齊大紀乃朝玊帛以混經制是所以承唐虞之後垂子孫之丕業立商周之前樹帝王之洪範者也嗚呼天地之道尚徳而右功帝王之政崇徳而賞功故堯舜至徳而位不及嗣湯武大功而祚延于世有夏徳配於二聖而唐虞讓功焉功冠於三代而商周讓徳焉冝乎立極垂統貽于後裔當位作聖著為世凖則塗山者功之所由定徳之所由濟政之所由立有天下者冝取於此追惟大號既發華蓋既狩方岳列位奔走來同山川守臣莫敢遑寜羽旄四合衣裳咸㑹䖍恭就列俯僂聽命然後示之以禮樂和氣周洽申之以徳刑天威振耀制立謨訓冝在長久厥後啓征有扈而夏徳始衰羿距太康而帝業不守皇祖之訓不由也人亡政墜卒就陵替向使繼代守文之君又能紹其功徳修其政統卑宫室惡衣服拜昌言平均賦入制定朝㑹則諸侯常至而天命不去矣兹山之㑹安得獨光於後歟是以周穆遐追遺法復㑹於是山聲垂天下亦紹前軌用此道也故余為之銘庶後代朝諸侯制天下者仰則於此其辭曰惟禹體道功厚徳茂㑹朝侯衛統一憲度省方宣教化制殊類咸㑹壇位承奉儀短禮具樂備徳容既孚乃舉眀刑以弼聖謨則戮防風遺骨専車克威克眀疇敢以渝宣昭黎獻底定寰區傳祚後𦙍丕承帝圗塗山巖巖界彼東國惟禹之徳配天無極即山刋碑貽後作則仙掌銘并序獨孤及陰陽開闔元氣變化泄為百川凝為崇山山川之作與天地並疑有真宰而未知尸其功者有若巨靈贔屓攘臂其間左排首陽右拓太華絶地軸使中裂拆山脊為兩道然後導河而東俾無有害留此巨跡于峯之巔後代掲厲於𤣥蹤者聆其風而駭之或謂談詭不經存而不議及以為學者􅀈其一域則惑於餘方曽不知創宇宙作萬象月而日之星而辰之使輪轉環遶箭馳風疾可駭於俗有甚於此者徒觀其陰隲無朕未嘗駭焉而巨靈持以有跡駭世世果惑矣天地有官陰陽有藏鍛鍊六氣作為萬形形有不遂其性氣有不達於物則造物者取元精之和合而散之財而成之如埏埴鑪錘之為瓶為缶為鈎為棘規者矩者大者細者然則黄河華嶽之在六合猶陶冶之有瓶缶鈎棘也巨靈之作於自然蓋萬化之一工也天機冥動而聖功啓元精密感而外物應故有無跡之跡介于石焉可以見神行無方妙用不測彼管窺者方循跡而求之揣其所至於巨細之境則道斯逺矣夫以手執大象力持化權指撝太極蹴蹋顥氣立于無間行乎無窮則據長河如措抔擘太華若破塊不足駭也世人方以禹鑿龍門而導西河為神祇可不謂大哀乎峩峩靈掌纎指如畫隠轔磅礴上揮太清逺而視之如欲捫青天而掬皓露攀扶桑而捧白曰不去不來若飛若動非至神曷以生此唐興百三十有八載余尉于華陰華人以為紀􅙜嵫勒之罘頌嶧山銘燕然舊典也𤣥聖巨跡豈帝者巡省伐國之不若歟其古之闕文以俟知言歟仰之嘆之斐然珠石為志其詞曰天作髙山設險西方至精未分川壅而傷帝命巨靈經啟地脉乃眷斯顧髙掌逺跖砉如剖竹騞若裂帛川開山破天動地坼黄河太華自此而闢神返虚極跡掛石璧跡豈我名神非我靈變化翕忽希夷杳冥道本不生化亦無形天何言㢤山川以寜斷鼇補天世未覩焉夸娥愚公莫知其蹤屹彼靈掌懸諸巃嵸介二大都亭亭髙聳霞赩煙噴雲抱花捧百神依憑萬峯朝拱長於上古以閱羣動下視衆山蜉蝣蠛蠓彼邦人士永揖遺烈瞻之在前如掲日月三川有竭此掌不滅古函谷闗銘并序王者建邦經野觀象立極於是有重門擊柝以待暴客故封略土宇守在闗塞山川丘陵為之城池天作崤函俾屏京室崇山迴合連岡叢倚長河屈盤萬里來束崖奔嶺蹙谷抱谿鬬崫起重險為秦東門截函夏於閫閾鏁天府於戸牖外阨八州之咽喉故百二形焉内擁六合之粤區故霸王出焉當其中原鹿駭戰國蝟起嬴氏建瓴山東擇肉宇内持㦸百萬連衡此闗是時也開門九國師遁振策而二周鼎入奄有大寳遂吞中區洎江返秦璧天祐漢祚高皇帝提劒而起以遏亂畧斬白帝紲降王舉漢中平咸陽廓金城以建都活萬姓以三章取威定功此焉是保粤若詢事國牒聆風仙籙則真氣靈蹤起乎其中柱史一去流沙萬里留玊函於舊宅傳寳圗於本枝豈上帝乃眷興王是感不然何錫羡開國如此其大嵗在大火余適下陽停驂塞門憑覽舊國襟帶如故世道不留秦餘空山漢遺茂草恐復舟失於壑岸化為谷萬載之後昧者不知乃刻頌此石以示來裔其辭曰天地雷雨英雄交爭設險守國作藩于京姓易時移山空塞平千秋陵谷想見精靈仙駕長往雄圗杳冥于以志之勒銘巖扄虎牢闗銘并序賈至天地定位山川據其極王侯設險虎牢擁其要振之以五岳維嵩崒焉迫之以四瀆洪河突焉冝其咽喉九州閫域中夏賛經綸之攻拒却欃槍之凌暴若乃金火代變山河分裂脇從力爭義散約觧時漢祖守之以臨山東坐清三齊疆椘躑躅而不進隋氏失馭中原版蕩封豕薦食龍戰𤣥黄時則太宗據之以拒河朔克擒醜夏偽鄭袒縳而請命於戲自周室㣲弱虎狼并吞盛衰千祀正閠更王而政和民安一統長久漢氏昭於前載我唐光於兹日其創業之王勘定功業咸在斯地意者天開險固為霸王之器乎聖作功業知窅㝠之意乎不然何𤣥期時事影響之若此也又聞諸鄭志曰制巖邑也虢叔死焉而唐漢紹興得非山靈河神正直是輔乃知不獨恃險而顛沛者在於涼徳歟天寳七載至自宋都西經洛陽歇鞍登兹懷古欽望鑒山河之壮麗想威靈而咫尺慨然有懷敢獻頌曰邈矣維嵩峻極于天磅礴崔嵬北臨洪川嶽瀆㑹險蹙坼封泉實開虎牢作固伊瀍維兹虎牢天設巨防攻在坤下拒在离旁昏恃以滅聖憑而王崢嶸豁呀孟門相向伊昔漢祖戡秦統周勍敵相及此焉淹留終夷海春遂復洪溝乘釁而東奄有九州隋氏敗績黎人艱阻帝命太宗陳師鞠旅鐡騎僔僔雲旗容與擒夏克鄭在此一舉日月永清昆蟲得所嵗在戊子西經登兹祇聖肅然憫亡悽其虢叔返道復隍慴師項氏烹苛莫能守之險易同途成敗異時徳不在鼎王孫布詞三苖不循魏武忸怩逆失順獲古今同期申鑒勒銘庶警将來棧道銘并序歐陽詹秦之坤蜀之艮連髙夾深九州之險也陰谿窮谷萬仞直下奔崖峭壁千里無土亘隔呀絶巉巉冥冥麋鹿無谿猿猱相望三代而徃蹄足莫之能越秦雖有心蜀雖有情五萬年間夐不相接且秦之與蜀也人一其性物同所冝嗜欲無餘門教化無餘源可貿遷可親眤擘坼地脉暌離物理豈造化之意乎天實凝清而成地實凝濁而形當其凝也如鎔金下鑄騰雲上浮空隙有所不開迴闕有所不合澄結既定竅缺生乎其中西南有漏天天之竅缺也于斯有兹地地之竅缺也天地也者将以上覆下燾含蓄萬靈可通而必使通者也茍有可通而未通則賢代其上而通之故有為舟以濟川為梯以踰山惟兹地有川不可以舟涉有山不可以梯及粤有智慮以全𤣥造立巨衡而舉追氏縋懸纑以下梓人猿垂絶冥鳥傍危岑鑿積石以全力梁半空於未用斜根玉壘旁綴青泥截斷岸以虹矯繞翠屏而龍踠堅勁膠固雲横砥平揔庸蜀之通途統岐雍之康荘都邑之能步山川之無脛若水决防如鴻嚮陽南之北之踵武湯湯躋峩峩以自若臨蒼蒼而不懼繇是贄幣以遥達人神以㑹同稽禮樂之短長量威力之汙隆可王者王可公者公而相吹以風或曰受琢之石長存可構之材無窮易刓代蠧斯道也未始有終嗚呼為上懷來在乎徳為下昭徳在乎義徳義之如今日則或人之言有孚其反之則石雖存恐不為琢材雖多恐不為構想夫徃昔有時而有有時而無是用惕惕天下蚩蚩知聖賢創物之意之人寡眀徳義固物之道之人稀敢陳兩端之要銘諸斯道之左庶主徳義者存今日之所履踵武湯湯者荷古人之攸作銘曰天覆地燾本亦同設大象難全或漏或缺損多益寡聖賢代工彼雖有缺與無缺同惟北曰秦維南則蜀地缺其間坤維不續斗起斷岸屹為兩區秦人路絶蜀火煙孤天實不通賢斯有造鑚堅剡勁無蹊以道若川匪舟若陸非車縁危轉虚步驟交如構雖在功存亦由徳項怫劉怒旋見以踣隋落我營自顛而植地非革勢材不易林踣植之致恵怨之心勿謂斯道不恒勿謂斯道可久禮不以禮可有而無恭不以恭可無而有創之之意如彼固之之理若兹彼知不易兹而易知勒銘道左其同我思仙都山銘張鷺仙都有山山出萬山直上千尋入煙霞深圎如笋抽髙突雲陰摽表下國權輿象帝日歟月歟萬有千嵗東西大鎮川澤四衛造化無言莫知徃制晴嵐依依宿霧洞開髣髴有象神仙下來顥氣氤氲靈鳥環迴永殊塵雜不皷纎埃絶頂霄崿澄湖在上人罕戾止孰闚其状日燭雲披風飄液飛如雨雨空㣲灑霑衣谷來松音潭影曙暉徃徃鶴唳不知所歸唐垂百年𤣥宗體元響應萬嵗聲聞上天帝祚眀徳祠堂在焉永懷軒后功成此地丹竈猶存龍昇萬里事列方誌道髙青史無復仙容空流谿水百越之内此山為大恍若壺中疑生象外直而不倚髙而不殆古徃今來獨立滄海磻溪銘并序陰陽和而萬物生聖賢合而天下平和者時也合者運也在昔堯舜合禹抑洪水而天下平者四百年湯合伊尹革桀驁而天下平者六百年文武合太公一戎衣而天下平者八百年與夫風雨寒暑五行四時佐天生物一也天之數不可以不變時則有懷山襄陵浩浩滔天之災君之運不可以不極時則有作威殺戮毒痡四海之變變則通時則有四載之庸極則反時則有放伐之功於戲惟尚父鍾其運而遇其主躡其機而作其合者歟于後伯陽不顯仲尼旅人其不合者歟故曰君子得其時則大行不得其時則龍蟠也嘉尚父之動静不失其時作磻谿銘曰至人無心與道出處處則土木出則雷雨惟殷道絶粤有尚父爰宅于幽盤桓草莽天地闔闢陰陽運行眀極而昏昏極而眀遇主水濵謨泰八紘收野桓桓一麾而平惟彼日月得天而光惟彼聖賢得時而彰獨夫昏迷我乃豹蔵文武作周我乃鷹揚故曰大道無體大人無方運用變通至虚而常作銘磻溪今古茫茫胥山銘并序盧元輔元和十年冬十月朝散大夫使持節杭州諸軍事杭州刺史上柱􅀦盧元輔視事三嵗塵天子書上畏羣靈下慙蒸人乃啟忠祠銘而序曰維唐敷祀典于天下廢淫置眀資父事君罔有不舉寢廟既設我命厥新有周行人伍公字子胥陪吳之職得死直言國人求忠者之屍禱水星之舍將瞰鴟革遂臨浙江千五百年廟貌不改漢史遷曰哥山今云青山者繆也吁善父為孝記曰父讎不與共戴天諫君為忠經曰諸侯有諍臣不失國當枕于宋鄭絶楚出疆在平為未宦臣在奢為既壮子坎􅇄伏節乞師於吳軍鼔丁寜五戰至郢先喆王建邦啓土著以話言戴后惟人人虐惟后成湯用為大義孔子立為大經子胥修為大仇騷人賦為大怨咸令在上􅗦惡不生則前戈鞭墓非倒行也後戈走昭非逆施也夫差既王宰嚭受賂二十年内越祀又顛太伯廟血将乾闔閭劒光且失公朝則宴焉入則諫焉孰謂矢毒孰謂刀寒雖言屢出口而車甲巳困於齊矣蟹稻已奪於嵗矣屬鏤之賜竟及其身鴟夷盛屍投于水濵憤悱皷怒配濤作神其神迄今一日再至來也海鴟羣飛陽侯夾從聲逺而近聲近而逺奮于吳怫于越夕于椘乃退於是仲秋闕望杭人以旗皷迓之笳簫和之百城聚覩大耀威靈巻沙墨裂地灰截若岸坼成坑迎潮氏格之如吕梁丈人為靈戈威矛㶑浪百重渚塞不先跳檣掲舷再飯之間絶其音聲蕩莽千里洪波砥平有滑有腯有鹹有腥遥實乎下庭山海梯航鷄林扶桑交臂于卯階金狄在戸雷皷在堂魏罇漢豆六代笙簧可謂奉天爵之馨香獲人神之盛禮佐皇震怒驅叱大邪萬里永清人觀斗氣銘曰武王鉞紂子胥鞭平為人為父十死一生矯矯伍貟執弓挾矢杖其寳劒以謁吳子稽首椘罪皆中紂理蒸報子妻殱鉏直士赫赫王閭實聴竒謨錫之金皷以號以誅黄旗大舉右廣皆朱戮墓非赭瞻昭乃烏後王嗣立執書不泣顛越言潤宰嚭讒輯步光欲飛姑蘇待執吾則切諫抉眼不入投于河上自統波濤晝夜兩至懷沙類騷洗滌南北簸蕩東西夷蠻卉服罔敢不來雖非命祀不讓瀆齊帝帝王王代代眀眀表我忠哉天門山銘李白梁山博望闗扄椘濵夾據洪流實為吳津兩坐錯落如鯨張鱗惟海有若惟川有神牛渚怪物且圍車輪光射島嶼氣凌星辰巻沙揚濤溺馬殺人國泰呈瑞時訛返珍開則九江納錫閉則五岳飛塵天險之地無徳匪親湞陽果業寺開東嶺洞谷銘并序元傑陰陽精氣結為山嶽者則為勝為異為奥為閟故萬嶺交峙而嵩華辨其方羣岳斆靈而瀛壺拔其類是知仙居靈宅其必有黨乎鳴弦之北趾果業之東阜高不百仞廣纔千畆層巖石室幽谷靈洞殊境異觀秀絶竒偉雖瀑流之下鑪峯懸磴之躋丹嶠路逺莫覿余不知其倫擬焉按寺記云昔有方士于是山鍊金變形羽服登仙故石座丹竈至今存焉觀其東嶺削成石瑩如玉岡巒峭竦巖壁重複捫藟而昇如造雲根縹𦕈嬋娟似霞衣可攀真氣勝而塵累捐五蓋破而清機閑蕩然放懷如羽翼之已生赤城之可接噫境變志遷若符契之協從也下臨長川澄波吐瀾煙霞夕收飛鳥不喧杳渺逶迤流注無間西直巨壑連嶂如屏林靄朝翠巖光晝清篠簜藏輝杉松下冥虚廓寂寥涵風有聲縁嶺未絶劃開洞門黛容崢嶸詭状輪囷疑伏龍怪鎮含煙雲又有古木倒傍絶壁盤根網結掛絡空碧崩崖傍傾猨逕下仄羽人幽㑹此焉瑶席摶翠壁而直上軋﨑嶇於紫氛䨇巖屹以中斷奔屏蹙而成室涵孕精爽澄凝氣源信列仙之攸居豈塵俗之所止㢤嗚呼鶴駕一去鳳簫響絶荆榛蔽路危磴敗滅跡留人境而舉世莫知地聨精刹而羣遊莫至吁可怪乎其晦藏也元和丙申嵗秋八月余以膠鬲之困寓居精舍再從兄昭肅時假兹邑政便於人務簡多暇與當寺僧知捷日探道源捷亦好古饕竒之士也因語故實緬思羽客之𤣥風以為靈跡神蹤精誠必復乃操刃持畚履險通幽梯絶棧而歴巉巖排䝉籠而登杳靄時更不稔而神居秘躅粲然皆睹嗟乎芝田𤣥圃豈逺乎㢤天之與人氣通則合客有顧咨而諗予者或應之曰天之運否泰相濟故善利稱徳有下民昏墊人之道行藏有數故棘津蓬累時惟鷹揚靈物必通道在斯著不然何荒阻千祀㪍焉而興歟乃為銘曰鑿石通道兮援木枝仰攀洞口兮踐欹危奔龍伏虎兮勢状竒林攅峯倚兮蟠雲螭下臨陰谷兮神以慄欺巖巖兮洞無極老松簫瑟兮生逺風興雲霈霈兮煙霧黒懸巖排空兮色噴黛堅根網絡兮層霄外披霓觧帶兮羽翼生下眺遥江兮入青靄世道紛綸兮何足謂朝為榮華兮夕顦顇不如幽谷兮閱仙經異接浮丘兮整煙轡我窺舟竈兮坐山腹衆峯參差兮隠雲族鑿仙嶺兮望瑶臺朝霞照海兮錦綺開信赤松之所昇降王喬之所徃來道或用晦兮靈物斯潛殷道未昌兮說築傅巖紛予感此兮勒銘雲根山既不朽兮與名長存唐文粹巻六十六欽定四庫全書唐文粹巻六十七宋姚鉉編
