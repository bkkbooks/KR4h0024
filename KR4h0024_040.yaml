front:
  text: 重校正唐文粹卷第四十
  hash: sha256:de30b89ff19f044f8f6992c5ee198d71ae03d496850253b8d45285c915747226
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0024_SBCK_040-1a}
body:
  text: 吳興姚鉉纂議乙揔一十三首明堂五明堂議孔穎達同前議魏徴同前議顔師古大享議馮宗明堂告朔議王方慶雅樂三三朝行禮樂制議杜佑三朝上夀有樂議徹食冝有樂議車服二朝服乗車議劉子玄公卿巳下冕服議楊烱刑辟三請禁私鑄錢議劉秩復讎議韓愈駮復讎議柳宗元明堂議孔穎達臣伏尋前勑依禮部尚書劉伯莊等議以爲從崐崘道上層祭天又尋後勑云爲左右閣道登樓設祭臣檢六藝羣書百家諸史皆未聞臺觀重樓之上而有堂名孝經云宗祀文王於明堂不云明樓明觀其冝一也又明堂法天聖王示儉或有翦蒿爲柱葺茅作蓋雖復古今興制不可恒然猶依大典徴於朴素是以席惟藁秸器上陶匏用絸栗以貴誠服大裘以訓儉今若飛樓架逈綺閣凌雲考古之文實堪疑慮按郊祀志漢武明堂之制四面無壁上覆以茅祀五帝於上座祀后土於下防臣以上座正謂臺上下防惟是臺下即云無四壁未審伯莊如何上層祭神下有五室且漢武所爲多用方士之說違經背正不可師祖又盧寛等議云上層祭天下堂布政欲使人神位别事不相干臣以古者敬重大事與接神相似以朝覲祭祀皆在廟堂豈有樓上祭祖樓下視朝閣道昇樓路便窄隘乗輦相儀接神不敬歩往則勞曵聖躬侍衛在傍百司供奉求之典誥全無此理臣非敢固執愚見以求已長伏以國之大典不可不愼乞以臣言下羣臣詳議同前議魏徴稽諸詁訓叅以舊圖其上圎下方複廟重屋百慮一致異軫同歸洎當塗膺籙未遑斯禮典午聿興無所取則裴頠以諸儒持論異端螽起是非舛互靡所適從遂乃以人廢言止爲一殿宋齊即仍其舊梁陳遵而不改雖嚴配有所祭享不匱求之典則道實未弘夫孝因心生禮縁情立心不可極故備物以表其誠情無以盡故飾宮以廣其敬宣尼美意其在兹乎臣等親奉德音令叅大議思竭塵露微増山海凡聖人有作義重隨時萬物斯覩事資通變若據蔡邕之說則至理失於文繁若依裴頠所爲則又傷於質略求之情理未允厥中今之所議非無用捨請爲五室重屋上圓下方旣體有則象又事多故實下室備布政之居上堂爲祭天之所人神不雜禮亦冝之其高下廣袤之規几筵尺丈之制則並隨時立法因事制冝自我而作何必師古廓千載之疑議爲百王之懿範不使泰山之下惟聞黃帝之法汶水之上獨稱漢武之圖則通乎神明庶幾可俟子來經始成之不日同前議顔師古明堂之制爰自古昔求之簡牘全文莫覩肇起黃帝降及有虞彌歷夏殷迄于周代各立名號别創規摹衆說舛駮互執所見巨儒碩學莫有詳通斐然成章不知裁斷究其指要實布政之宫也徒以戰國縱衡典籍廢棄暴秦酷烈經禮湮亡今之所存傳記雜說用爲凖的實亦蕪昧然周書之叙明堂紀其四面則有應門雉門據此一塗固是王者之常居耳其靑陽緫章玄堂太廟及左个右个與四時之次相用則路寢之義足爲明證文王居明堂篇帶以弓韣禮干高禖九門磔攘以禦疾疫置梁隂道以利農夫令國有酒以合三族凡一事等皆合月令之文觀其所爲皆在路寢者也戴禮昔周公朝諸侯于明堂之位天子負斧扆南嚮而立明堂者明諸矦之尊也周官又云周人明堂度九尺之筵東西九筵堂一筵據其制度即大寢也亦曰黃帝曰合宮有虞氏曰緫章殷曰陽舘周曰明堂斯皆路寢之徴知非别處大戴所說𥘉有近郊之言復稱文王之廟進退無據自爲矛盾原夫負扆受朝常居岀入旣在臯庫之内亦何云於郊野哉孝經傳云在國之陽又無里數漢武有懷創造詢於搢紳言論紛然終無定據乃立於汶水之上而宗祀焉明其不拘逺近亦無方面孝成之代表行城南雖有其文厥功靡立平帝元始四年大議營創孔牢等乃以爲明堂辟雍太學其實一也而有三名金裒等又稱經傳無文不能分别同異中興之後蔡邕作論復云明堂太廟一物二名鄭玄則在國之陽三里之外七里之内景巳之地穎客釋例亦云明堂太廟凡有八名其體一也苟立同異竟爲巧說並出自胷懷曽無師祖審夫功成作樂治定制禮草創從冝質文遞變旌旗冠冕今古不同律度權衡前後不一隨時之義斷可知矣假如周公舊章猶當擇其可否宣尼彞則尙或補漏況鄭氏噫說淳于謏聞匪異守株何殊膠柱愚謂不岀墉雉邇接宫闥實允事宜諒無所惑但當上遵天㫖祗奉德音作皇代之明堂永貽範於來葉區區碎議皆略而不論大享議馮宗臣等竊聞明堂之建其所從來逺矣天垂象聖人則之蒿柱茅檐之規上圓下方之制考之大數不踰三七之間定之方中必居景巳之地者豈非得房心布政之所當太微上帝之宫乎故仰恊俯從正名定位人神不雜各司其序則嘉應響至保合大和焉漢氏承秦經籍道息旁求堙墜詳據難明孝武𥘉議立明堂於長安城南遭竇太后不好儒術事乃中廢孝成之代又欲立於城南議其制度莫之能决至孝平元始四年始創造於南郊以申嚴配光武中興元年立於國城之南自魏晉迄於梁朝雖規制或殊而所居之地恒取景巳者斯蓋百王不易之道也高祖天皇大帝纂承平之運崇朴素之風四夷來賔九有咸乂永徽三年詔禮官學士議明堂制度羣儒紛競各執異端乆之不决因而遂止何也非謂財不足力不堪也將以周孔旣遥禮經且紊事不師古或爽天心難用作程神不孚祐者也則天太后揔禁闈之政籍軒臺之威屬皇室中圯之期躡和熹從權之制以爲乾元大殿承慶小寢當正陽亭午之地實先聖聽斷之宫表順端闈儲精營室爰從朝饗未始臨御乃起工徒挽令摧覆旣毀之後雷聲隱然衆庶聞之或以爲神靈感動之象也於是増土木之麗因府庫之饒南街北闕建天樞大儀之制乾元遺趾興重閣層樓之業煙熖蔽日梁柱排雲人斯告勞天實貽誡煨燼甫邇遽加修復況乎地殊景巳未荅靈心跡匪膺期乃申嚴配事昧彞典神不昭格此其不可者一也又明堂之制木不鏤土不文今體式乖冝違經紊禮雕鐫所及窮侈極麗此其不可者二也高明爽塏事資䖍敬密邇宮掖何以祈天人神雜擾不可放物此其不可者三也況兩京上都萬方取則而天子闕當陽之位聽政居便殿之中職司其憂豈容沈黙當須審巧曆之計擇繁省之冝不便者量事改修可因者隨宜適用削彼明堂之號克復乾元之名則當宁無偏人識其舊矣明堂告朔議王方慶明堂天子布政之宫也謹按榖梁傳云閏者附月之餘日天子不以告朔非禮也閠以正時時以作事事以厚生生人之道於是乎在矣不告閏朔棄時政也臣據此文則天子閏月亦吿朔矣以此寧有他月而廢其禮乎先儒舊說天子行事一年十八度入明堂矣大享不問卜一入也毎月告朔十二入也四時迎氣四入也廵狩之年一入也今禮官議惟歲首一入耳與先儒旣異在宫臣不敢同宋朝何承天纂集其文以爲禮論雖加編次事則闕如梁代崔靈恩撰三禮義宗但捃摭前儒因循故事而巳隋煬帝命學士撰江都集禮秖抄撮舊禮更無異文貞觀顯慶禮及祠令不言告朔者蓋爲歷代不傳所次其文乃闕各有縁由不足依據今禮官引爲明證在臣誠實有疑三朝行禮樂制議杜佑晉司律中郎將陳頎云昔杜夔傳舊雅樂四曲一曰鹿鳴二曰騶虞三曰伐檀四曰文王皆古聲辭太和中左延年改夔騶虞伐檀文王三曲更作聲節其名雖存而聲實異惟夔鹿鳴今不改易也魏代正朝大㑹太尉奉羣后行禮東廂雅常作者也後有三篇第一曰於赫篇詠武帝聲律與古鹿鳴同第二曰巍巍篇詠文帝用左延年所改騶虞聲第三曰洋洋篇詠明帝亦用左延年所改文王聲第四復用鹿鳴之聲重用而除古伐檀及晉𥘉食舉亦用鹿鳴按左傳穆叔如晉晉侯享之工歌鹿鳴之二三拜鹿鳴所以嘉寡君也敢不拜嘉毛詩云鹿鳴燕群臣嘉賔也旣飲食之又實其幣帛筐篚以將其厚意然後忠臣嘉賔得盡其心也詩傳並無行禮及叔孫通所制漢儀復無别行禮事荀氏云魏氏行禮食舉再取周詩鹿鳴又以㝠嘉賔無取於朝考之舊聞未知所應荀朂乃除鹿鳴舊歌更作行禮詩四篇先陳三朝朝祭之義食舉歌詩十二篇元肇群后奉璧趨歩拜起莫非行禮豈容别設一樂謂之行禮邪荀譏鹿鳴之失似悞昔謬還制四篇復襲前執三朝上夀有樂議禮記但有獻酬無上壽文惟詩雅云再拜稽首天子萬夀豳風云爲此春酒以介眉壽雖非灼然明文要是髣髴其古者詩工皆歌之故可得而言也漢興叔孫通定禮儀七年長樂宫成諸侯朝禮畢復置酒侍坐殿上皆伏尊以卑次起上壽漢故事上夀四㑹曲注言但有鍾鼓無有歌詩魏𥘉作四㑹有琴筑但無詩雅樂郭瓊云明帝靑龍二年以長笛食舉第十二古置酒曲代四㑹又易古詩名曰羽觴行用爲上壽曲施用最在前鹿鳴巳下十二曲名食舉樂而四㑹之曲遂廢漢故事鄧吳及瓊等食舉之曲舉時増損張華上雅樂詩表云魏上夀食舉時及漢代所施用其文句長短不齊皆未合於古雅漢故事則云上壽四曲華亦言有歌辭㑹其注當是闕文晉代歌詩傳玄述具存徹食冝有樂議周官云王大食三宥皆合鍾鼓漢蔡邕云王者食舉以樂今但有食舉樂食畢則無樂按膳夫職以樂侑食禮記云客出以雍徹以振羽論語云三家者以雍徹子曰相維辟公天子穆穆奚取於三家之堂如此徹食應有樂不容同用食舉也朝服乗車議劉子玄伏以古者爰自大夫巳下皆乗車而以馬爲騑服魏巳降迄乎隋代朝士又駕牛車歷代經史具有其事不可一二而言也至如李廣北征解鞍憩息馬援南伐據鞍顧盻斯則鞍馬之設行於軍旅戎服所乗貴於便習者也按江左官至尚書郎而輒輕乗馬則爲御史所彈又顔延之罷官後好騎馬出入閭里當代稱其放誕此則專車慿軾可服朝衣單馬御鞍冝從䙝服求之近古灼然之明驗也自皇家撫運㳂革隨時至如陵廟巡謁王公冊命則盛服冠履乗彼輅車其士庶有衣冠親迎者亦時以服箱充馭在於他事無復乗車貴賤所行通用鞍馬而巳臣伏見比者鑾輿出幸法駕首途左右侍臣皆以朝服乗馬夫冠履而岀只可配車而行今乗車旣停而冠履不易可謂惟知其一而未知其二也何者襃衣愽帶革履高冠本非馬上所施自是車中之服必也韈而昇鐙跣以乗鞍非唯不師古道亦自取驚今俗求諸折中進退無凖且長裾廣䄂襜如翼如鳴珮紆組鏘鏘奕奕馳驟於風塵之内出入於旌􅙶之間儻馬有驚逸人從顚墜遂使屬車之右遺履不收淸道之傍絓驂相續固以受嗤行路有損威儀今議者皆以秘閣有梁武帝南郊圖多有衣冠乗馬者此則近代故事不得謂無其文臣案此圖是後人所爲非當時所撰且觀代間有古今圖畫者多矣如張僧繇畫羣公祖二踈而兵士有著芒屫者閻立本畫昭君入匈奴而婦人有著帷帽者夫芒屫岀於水郷非京華所有帷帽創於隋代非漢宫所作議者豈可徴此二畫以爲故實者乎由斯而言則梁氏南郊之圖義同於此又傳稱義惟因俗禮貴縁情殷輅周冕規模不一秦冠漢佩用捨無恒況我國家道軼百王功高萬古事有不便理資變通其乗馬衣冠竊謂冝從有廢臣懷此異議其來自乆日不暇給未及㩁揚今屬殿下親從齒胄將臨國學凡有衣冠乗馬皆憚此行所以輒進狂言用申鄙見公卿巳下冕服議楊烱古者太昊庖犧氏仰以觀象俯以察法造書契而文籍生次有黃帝軒轅氏長而敦敏成而聦明垂衣裳而天下理其後數遷五德君非一姓體國經野建邦設都文質所以再而復正朔所以三而改夫改正朔者謂夏后氏建寅殷人建丑周人建子至於以日繫月以月繫時以時繫年此則三王相襲之道也夫易服色者謂夏后氏尙黒殷人尚白周人尙赤至於山龍華蟲宗彞藻火粉米黼黻此又百代可知之道謹按虞書曰予欲觀古人之象日月星辰山龍華蟲作繪宗彞藻火粉米黼黻絺繡由此言之則其所從來者尚矣夫日月星辰光明照下土也山者布散雲物象聖王澤霑下人也龍者變化無方象聖王應時而教也華蟲者雉也雉身被五彩象聖王體兼文明也宗彞者虎也雖以剛猛制物象聖王神武定亂也藻者逐水上下象聖王隨代而應也火者陶冶烹餁象聖王至德日新也粉米者人恃以生象聖王爲物之頼也黼能斷割象聖王臨事能决也黻者兩凡相背象君臣可否相濟也逮周氏乃以日月星辰爲旌旗之飾又登龍於山登火於宗彞於是乎制衮冕以祀先王九章者法陽數也以龍爲首章衮者卷也龍德神異應變濳見表聖王深識逺知卷舒神化也又制鷩冕以祭先公也鷩者雉也有耿介之志表公賢才能守耿介之節也又制毳冕以祭四望也四望者岳瀆之神也虎雖山林所生明其象也制絺冕以祭社稷之神也粉米由之成象其功也又制玄冕以祭羣小祀也百神異形難可遍擬但取黻之相背異名也夫以周公之多才也故治定制禮功成作樂夫以孔宣之將聖也故行夏之時服周之冕先王之法服乃自此之出矣天下之服能事又於是乎異矣表狀請制大明冕十二章乗輿服之者謹按日月星辰者巳施於旌旗矣龍山火米者又不踰於古矣而云麟鳳有四靈之玄龜有負圖之應雲有紀官之號水有盛德之祥此蓋别表休徵終是無踰比象然則皇王受命天地興符仰觀則璧合珠連俯察則銀黃玉紫盡南宫之粉壁不足冩其形狀罄東觀之鈆黃無以紀其名實固不可畢陳於法服也雲者從龍之氣也茄者藻之自生也又不假别爲章目此盡不經之甚也又鸞冕八章三公服之者也鸞者太平之瑞也非三公之德也鷹鸇者鷙鳥也適可以辨刑曹之職也熊羆者猛獸也適可以旌武臣之力也又稱藻爲水草而無法象引張衡賦云帶倒茄於藻井披紅葩之狎獵謂爲蓮華取其文彩者夫茄者蓮也若以蓮代藻變古從今旣不知草木之名亦未達文章之意此又不經之甚也又毳冕六章三品服之者按此王者祀四望服之名也今三品乃得同王之毳冕而三公不得同王之衮名豈惟顚倒衣裳抑亦自相矛楯此又不經之甚也又黼冕四章五品服之者考之於古則無其名驗之於今則非章首此又不經之甚也若夫禮惟從俗則命爲制令爲詔乃秦皇之故事猶可以適於今矣若夫義取隨時則出稱警入稱蹕乃漢國之舊儀猶可以行於代矣亦何取於變周公之軌物改宣尼之法度者或由是請禁私鑄錢議劉秩臣伏奉今月二十一日勑欲不禁鑄錢更令百寮詳議可否者夫錢之興有來尚矣將以平輕重而權本末齊桓得其術而國以覇周景失其道而人用弊考諸載籍國之興衰實繫於是陛下思變古以濟今欲反經以合道而不改作詢之芻蕘臣雖惷愚敢不薦其聞見古者以珠玉爲上幣黄金爲中幣錢刀爲下幣夫三幣握之非有𥙷於煖也捨之則非有損於飽也先王以守財物以御人事而平天下也是以命之曰衡衡者使物一高一下不得有常故與之在君奪之在君貧之在君冨之在君是以人戴君如日月親君如父母用此術也是謂人主之權今之錢即古之下幣也陛下若捨之任人則上無以御下下無以事上其不可一也夫物賤則傷農錢輕則傷賈故善爲國者觀物之貴賤錢之輕重夫物重則錢輕錢輕由乎物多多則作法收之使少少則重重則作法布之使輕輕重之本必由乎是奈何而假於人其不可二也夫鑄錢不雜以鈆鐵則無利雜以鈆鐵則惡惡則不重禁不足以懲重且方今塞其私鑄之路人猶冒死以犯之况啓其源而欲之從令乎是設䧟穽而誘之入其不可三也夫許人鑄錢無利則人不鑄有利則人去南畝者衆去南畝者衆則草不墾草不墾又隣於寒餒其不可四也夫人冨溢則不可以賞勸貧餒則不可以威禁故法令不可行之不理皆由貧冨之不齊也若許其鑄錢則貧者必不能爲臣恐貧者彌貧而服役於冨室冨室乗之而益恣昔漢文之時吳濞諸侯也冨埓天子鄧通大夫也財侔王者此皆鑄錢之所致也必欲許其私鑄是與人利權而捨其柄其不可五也陛下必以錢重而傷本工費而利寡則臣願言其失以效愚計夫錢重者猶人日滋於前而爐不加於舊又公錢重與之銅價頗等故盗鑄者破重錢以爲輕錢錢輕禁寛則禁嚴則止止則棄矣此錢之所以少也夫鑄錢用不贍者在乎銅貴銅貴在於采用者衆夫銅之以爲兵則不如鐡以爲器則不如􅃮禁之無害陛下何不禁於人則銅無所用銅無所用則益賤賤則錢之用給矣夫銅不布下則益鑄者無因而鑄無因鑄則公錢不破人不犯死刑錢又日増末復利矣是一舉而四美兼也惟陛下熟察之復讎議韓愈右伏奉今月五日勑復讎據禮經則義不同天徴法令則殺人者死禮法二事皆王教之端有此異同必資論辨冝令都省集議聞奏者朝議郎行尚書職方貟外郎上騎都尉韓愈議曰子復讎見於春秋見於禮記又見於周官又見諸信史不可勝數未有非而罪之者也最冝詳於律而律無其條非闕文也蓋以爲不許復讎則傷孝子之心而乖先王之訓許復讎則人將倚法專殺無以禁止其端矣夫律雖本於聖人然執而行之者有司也經之所明者制有司者也丁寧其義於經而深没其文於律者其意特使法吏一斷於法而經術之士得引經而議也周官曰凡殺人而義者令勿讎讎之則死義宜也明殺人而不得其宜者子不得復讎也此百姓之相讎者也公羊傳曰父不受誅子復讎可也不受誅者罪不當誅者上施於下之辭非百姓之相殺也又周官曰凡報仇讎者書於士殺之無罰言將復讎必先言於官則無罪也今陛下垂意思立定制惜有司之守憐孝子之心亦不自專訪議羣下臣愚以爲復讎之名雖同而其事各異或百姓相讎如周官所稱可議於今者或爲官吏所誅如公羊所稱不可議於今者又周官所稱將復讎先告於士則無罪者若孤稚羸弱抱微志而伺敵人之便恐不能自言於官未可以爲斷於今也然則殺之與赦不可一例冝定其制曰凡復父讎者事發具其事申尚書省尙書省集議奏聞酌其宜而處之則經無失其㫖矣謹議駮復讎議柳宗元臣伏見天后時有同州下邽人徐君先者父爲縣吏趙師韞所殺卒能手刃父讎束身歸罪當時諫臣陳子昻建議誅之而旌其閭且請編之於令永爲國典臣竊獨過之臣聞禮之大本蓋以防亂若曰無爲賊虐凡爲子者殺無赦刑之大本亦防亂也若曰無爲賊虐凡爲理者殺無赦其本則合其用則異旌與誅莫得而並焉誅其可旌兹謂濫黷刑甚矣旌其可誅兹謂僭壞禮甚矣果以是示于天下傳于後代趨義者不知所以嚮違害者不知所以立以是爲典可乎蓋聖人之制窮理以定賞罰本情以正襃貶統於一而巳矣嚮使刺讞其誠僞考正其曲直原始而求其端則刑禮之用判然離矣何者若君先之父不陷於公罪師韞之誅獨以其私怨奮其吏氣虐于非辜州牧不知罪刑官不知問上下蒙冒籲號不聞而能以戴天爲太恥枕戈爲得禮處心積慮以衝讎人之胷介然自克死而無憾是守禮而行義也執事者冝有慙色將謝之不暇而又何誅焉其或君先之父不免於罪師韞之誅不愆於法是非死於吏也是死於法其可讎乎讎天子之法而戕奉法之吏是悖鷔凌上也執而誅之所以正邦典而又何旌焉且其議曰人必有子子必有親親親相讎其亂誰救是惑於禮也甚矣禮之所謂讎者蓋以冤抑沈痛而號無告也非謂觸法陷于大戮而曰彼殺之我乃殺之不議曲直暴寡脅弱而巳其非經背聖不亦甚哉周禮調人掌司萬人之讎反殺人而義者令勿讎讎之則死有反救者邦國交讎之又安得親親相讎也春秋公羊傳曰父不受誅子復讎可也父受誅子復讎此推刃之道復讎不除害若取此以斷兩下相殺則合於禮矣且夫不忘讎孝也不愛死義也君先能不越於禮服孝死義也是必達禮而聞道者也夫達禮聞道之人豈其以王法敵讎者哉而議者反以爲戮黷刑壞禮其不可爲典明矣請下臣議附于法令如有斷斯獄者不冝以前議從事謹獻重校正唐文粹卷第四十嘉靖甲申歲太學生姑蘇徐焴文明刻于家塾
