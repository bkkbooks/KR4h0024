body:
  text: 郊廟陵寢請以正冬至日祀圓丘議唐紹唐景皇帝配昊天上帝議獨孤及唐太宗皇帝配天議長孫無忌禘祫議韓愈遷廟議權德輿立廟議朱子奢宗廟籩豆議崔沔同前議韋述張均同議同前議楊仲昌昭陵議權德輿省試學生代齋郎議韓愈請以正冬至日祀圓丘議唐紹臣聞禮以冬至祀圓丘於南郊夏至祭方澤於北郊者以其日行􅄤次極於南北之際也日北極當晷度循半日南極當晷度環周是日一陽爻生為天地交際之始故易曰復其見天地之心乎即冬至卦象也一歲之内吉莫大焉甲子但為六旬之首一年之内隔月常遇既非大㑹晷運未周惟摠六甲之辰助四時而成歲今欲避環周以取甲子是背大吉而就小吉也太史令傅孝忠進奏曰准漏經南陸北陸並日校一分若用十二日甲子即分一分未南極即不得為至唐景皇帝配昊天上帝議獨孤及謹按禮經王者禘其祖之所自出以其祖配之凡受命始封之君皆為太祖繼太祖以下六廟則以親盡迭毁而太祖之廟雖百世不遷此五帝三王所以尊祖敬宗也故受命于神宗禹也而夏后氏祖顓頊而郊鯀纉禹黜夏湯也而殷人郊冥而祖契革命作周武王也而周人郊稷而祖文王則明自古必以首封之君配昊天上帝惟漢崛起豐沛豐公太公皆無位無功徳不可以為祖宗故漢以髙皇帝為太祖其先細微故也非足為後代法伏惟太祖景皇帝以柱國之任翼周弼魏肇成王業建封于唐髙祖因之遂以為有天下之號天所命也亦由契之封商后稷之封邰禘郊祖宗之位宜在百代不遷之典郊祀太祖宗祀髙祖猶周之祖文王而宗武王也今若以髙祖創業當躋其祀是棄三代之令典遵漢代之末制黜景皇帝之大業同於豐公太公之不祀返古違道失孰甚焉夫追尊景皇帝廟號太祖髙祖太宗所以崇尊之禮也若配天之位既易則太祖之號宜廢祀之不修廟亦當毁尊祖報夲之遒其墜於地乎漢制擅議宗廟以大不敬論今武德貞觀之憲章未改國家方將敬祀事以和神人禘郊之間恐非所宜言謹稽禮文叅諸夏殷周漢故事配食天帝之制請仍舊典謹議唐太宗皇帝配天議長孫無忌臣謹尋方冊歴考前規宗祀明堂必配天帝而伏羲五代本配五郊預入明堂自縁從祀今以太宗作配理有未安伏見永徽二年七月詔建明堂伏惟陛下天縱孝徳追奉太宗已遵嚴配當時髙祖先在明堂禮司致惑竟未遷祀率意定儀遂便著令乃以太宗文皇帝降配五帝雖復亦在明堂不得對越天帝深乖明詔之意又與先典不同謹按孝經云孝莫大於嚴父嚴父莫大於配天昔者周公宗祀文王於明堂以配上帝伏尋詔意義在於斯今所司行令殊為失㫖又尋漢魏晉宋歴代禮儀並無父子同配明堂之義唯祭法云周人禘嚳而郊稷祖文王而宗武王鄭𤣥注曰禘郊祖宗謂祭祀以配食也禘謂祭昊天於圓丘郊謂祭上帝於南郊祖宗謂祭五帝五神於明堂也尋鄭𤣥注乃以祖宗合為一祭又以文武共在明堂連袵配祀良為謬矣故王肅駮曰古者祖有功而宗有徳祖宗自是不毁之名非謂配食於明堂者也審如鄭義則孝經當言祖祀文王於明堂不得言宗祀也凡宗者尊也周人既祖其廟又尊其祀孰謂祖於明堂者乎鄭引孝經以解祭法而不曉周公本意殊非仲尼之義㫖也又解宗祀武王云配勾芒之類是謂五神位在堂下武王降位失君叙矣又按六韜曰武王伐紂雪深大餘有五車二馬行無轍迹詣營求謁武王怪而問焉太公對曰此必五方之神來受事耳遂以其名召入各以其職令焉既而克殷風調雨順豈有生來受職殁則配之降尊敵卑理不然矣故春秋外傳曰禘郊祖宗報五者國之典祀也傳言五者故知各是一事非謂祖宗合祀於明堂也臣謹上考殷周下洎貞觀並無一代兩帝同配於明堂惟南齊蕭氏以武明昆季並於明堂配食事乃不經未足援據又撿武徳時令以元皇帝配於明堂兼配感帝至貞觀初縁情革禮奉祀髙祖配於明堂奉遷代祖專配感帝此即聖朝故事已有遞遷之典取法宗廟古之制焉伏惟太祖景皇帝締搆有周建絶代之丕業啓祚汾晉創歴聖之洪緒徳邁發生道符立極又代祖元皇帝濳鱗韞慶屈道事周導濬發之靈源肇光宅之垂裕稱祖清廟萬代不遷請停配祀以符古義伏惟髙祖太武皇帝躬受天命奄有神州創改舊物體元居正為國始祖抑有舊章昔有炎漢髙帝當塗太祖皆以受命例並配天請遵故實奉祀髙祖於圓丘以配昊天上帝伏惟太宗文皇帝道格上𤣥功清下瀆拯率土之塗炭布大造於生靈請准詔書宗祀於明堂以配上帝又請依武德故事兼配感帝作主斯乃二祖徳業永不遷廟兩聖功大各得配天逺恊孝經近申詔意禘祫議韓愈右今月十六日勑㫖宜令百僚議限五日内聞奏者將仕郎守國子監四門愽士臣韓愈謹獻議曰伏以陛下追孝祖宗肅敬祀事凡在擬議不敢自專聿求厥中延訪羣下然而禮文繁漫所執各殊自建中之初迄至今嵗屢經禘祫未合適從臣生遭聖明涵泳恩澤雖賤不及議而志在効忠今輒先舉衆議之非然後申明其説一曰獻懿廟主宜永藏之夾室臣以為不可夫祫者合也毁廟之主皆當合食於太祖獻懿二祖即毁廟主也今雖藏於夾室至禘祫之時豈得不食於太廟乎名曰合祭而二祖不得祭焉不可謂之合矣二曰獻懿廟主宜毁瘞之臣又以為不可謹按禮記天子立七廟一壇一墠其毁廟之主皆藏於祧廟雖百代不毁祫則陳於太廟而饗焉自魏晉已降始有毁瘞之議事非經據竟不可施行今國家徳厚流光創立九廟以周制推之獻懿二祖猶在壇墠之位况於毁瘞而不禘祫乎三曰獻懿廟主宜各遷於其陵所臣又以為不可二祖之祭於京師列於太廟也二百年今一朝遷之豈惟使人聽疑惑抑恐二祖之靈眷顧依遲不即饗於下國也四曰獻懿廟主宜附於興聖廟而不禘祫臣又以為不可傳曰祭如在景皇帝雖為太祖於其屬乃獻懿之子孫也今欲正其子東饗之位廢其父之大祭固不可為典矣五曰獻懿二祖宜别立廟於京師臣又以為不可夫禮有所降情有所殺是故去廟為祧去祧為壇去壇為鬼漸而之逺其祭益稀昔者魯立煬宫春秋非之以為不當取已毁之廟既藏之主而復築宫以祭今之所議與此正同又雖違禮立廟至於禘祫也合食則禘無其所廢祭則於禮不通此五説者皆所不可故臣慱采前聞求其折中以為殷祖𤣥王周祖后稷太祖之上皆自為帝又其代數已逺不復祭之故太祖得正東嚮之位子孫從昭穆之列禮所稱者蓋自紀一時之宜非傳於後代之法也傳曰子雖齊聖不先父食蓋言子為父屈也景皇帝雖太祖也其於獻懿則子孫也當禘祫之時獻祖宜居東嚮之位景皇帝宜從昭穆之列祖以孫尊孫以祖屈求之神道豈逺人情又常祭甚頻合祭甚募則是太祖所屈之祭至少所伸之祭至多比於伸孫之尊廢祖之祭不亦順乎事異殷周禮從而變非所失禮也臣伏以制禮作樂者天子之職也陛下以臣議為有可采粗合天心斷而行之是則為禮如以為猶或可疑臣乞召對面陳得失庶有明發謹議遷廟議權德輿今年夏四月禘饗于太廟太祖景皇帝東嚮之位并遷廟之位右伏准今月十六日勑禘祫之祭禮之大者先有衆議猶未精詳宜更令百僚議限至二十六日内聞奏者臣聞禮有五經莫重於祭祭稱百順實受其福故曰萬物本乎天人本乎祖以太祖始卦之復當殷祭東嚮之尊百代不遷下統昭穆此孝饗嚴禋之極制也周自后稷十六代至武王毁廟遷主皆太祖之後故序列昭穆合食無嫌漢之太上皇主瘞于園寢尋置别廟是為屬尊故周漢皆太祖之位正自魏至惰則虚其位魏明帝初以太皇别廟未成故權設對祫後有司定七廟之制太祖已下為昭穆二祧旋至三少帝運移於晉不以兄弟為代數故元帝上繼武帝簡文上繼元帝至安帝時然後征西至京兆四府君遷盡未及殷祭運移于宋初永和中疑四府君主所藏之禮詔公卿慱議范宣請特築一室韋泓請室朽乃止蔡謨亦請改築别室若未展者當入就太廟以征西府君東向議竟不行宋齊梁陳北齊周隋悉虚其位以待太祖皆以短祚其禮不申則自魏以降太祖列昭穆之位非通例也武徳中立親廟四自宣簡公而下貞觀中立七廟六室自𢎞農府君而下開元中始制九廟追尊獻祖懿祖故自武德至于開元太祖在四廟七廟九廟之數則東向之虚又非例也廣徳二年將及殷祭有司以二祖親盡當遷太祖九室既備其年冬祫於是正太祖於東向藏二主於夾室凡十八年矣建中二年冬祫有司誤引蔡謨征西之議以獻祖居東向懿祖為昭太祖為穆此誠乖疑倒置之大者也議者或引春秋禹不先鯀湯不先契文武不先不窋以為證且湯與文武皆太祖之後理無所疑至於禹不先鯀安知説者非啓與太康之代而左丘明因而記之邪向者有司以二主藏夾室非宜則可闕殷祭非敬則可處東向之位則不可是以貞元七年冬太常上奏請下百僚僉議詔可其奏八年春有于頎等一十六狀至十一年又詔尚書省集議有陸淳宇文炫二狀前後異同有七家之説至於藏夾室虚東向逺遷園寢分饗禘祫加幣玉虞主而枚卜瘞埋膚引滋多皆失禮意臣等審細討論惟置别廟及祔于徳明興聖二説最為可據德明興聖之廟猶别廟也等於剏立此又易行伏以德明皇帝於舜禹之際與稷契同功契後為殷向五百年稷後為周逾八百年德明流光無窮啓皇運於後景福靈長與天地凖又獻懿二祖於興聖皇帝為曽為𤣥猶周人祔于先公之祧也此亦亡於禮者也明尊祖之道正大祭之義禮文祀典莫重於是凡議同者七狀百有餘人其中名儒禮官講貫詳熟臣於貞觀八年蒙聖恩以慱士徴至京師屬當㑹議時與崔儆劉執同狀十一年臣官備近侍不議禁中乃今累叨睿奬獲貳宗伯職業所守典禮是司研考古今罄竭愚管豈敢以疑文虚説黷陛下嚴敬重難之心其夾室等五家不安之説謹具條上伏惟聖慮裁擇藏夾室右太祖已下毁廟主之所藏也今若以二祖之主同在夾室當禘祫之際代祖元皇帝以遷主合食而二主留在夾室神靈何所依邪或主有禱則祭無禱則止如殷祭何如或云每禘祫時就饗於夾室如合食何此其不可也虚東向右自魏晉方有太祖已上府君以備親廟自太祖已下昭穆既列太祖之上親盡皆遷然後正東向之位明不遷之重自魏至隋皆以短歴或遭離多故其禮未行故虚東向自武徳後貞觀開元加廟數太祖尊位厭而未申故虚東向今九廟已備代祖已遷而議虚東向則無其例此其不可也園寢右漢魏太上皇遷主居園寢之制近在京師故於遷主無有異議今二祖園寢皆在趙州法駕撰儀經途遐逺此其不可也分饗右尊祖敬宗至當無二審禘合饗王者所先議者請當以獻祖受祫太祖受禘五年之間迭居東向就如其説則當祫之時太祖固序昭穆矣當禘之禮獻祖何所依也從古已來無此義例此其不可埋瘞右議者引古者貴祖命歛幣玉藏諸兩階之間又埋虞主於廟門外之道左以為比類彼主命幣玉者既反告則無所用矣彼虞主用桑者既練祭則無所用矣不忍䙝瀆故歛而藏之徹而埋之豈如栗主依神雖廟毁而常存之制哉此其不可也况兩階之間與門外道左皆祖廟也今則下瘞於子孫之廟於理安乎此其又不可也以前謹具周漢太祖居東向魏晉已下虚東向并貞元八年十一月兩度㑹議一十八狀内夾室等五家不安之説如前謹録奏聞謹奏立廟議朱子奢臣謹按漢丞相韋𤣥成奏立五廟諸侯同五劉子駿議開七祖邦君降二鄭司農踵𤣥成之轍王子雍揚國師之波分塗並驅各相師祖咸翫其所習好同惡異遂令歴代祧祀多少參差優劣去取曽無畫一傳稱名位不同禮亦異數易云卑髙以陳貴賤位矣豈非别嫌疑愼微逺防陵僭尊君卑佐升降無舛所貴禮者義在兹乎若使天子諸侯俱立五廟便是賤可以同貴臣可以濫主名器無凖冠履同歸禮亦異數義將安設戴記又稱禮有以多為貴者天子七廟諸侯五廟纔與子男相呼以多為貴何所表乎愚以為諸侯立髙祖以下并太祖五廟一國之貴也天子立髙祖以上并太祖七廟四海之尊也降殺以兩禮之正焉前史所謂德厚者流光徳薄者流卑此其義也伏惟聖祖在天山陵有日祔祖嚴配大事在斯宜依七廟用崇大禮若親盡之外有王業者如殷之𤣥王周之后稷尊為始祖儻無其例請三昭三穆各置神主太祖一室考而虚位將待七年之祚遽遷方處庶上依晉宋傍惬人情於是入座奏曰臣聞揖讓受終之后革命創制之君何嘗不崇親親之義篤尊尊之道䖍奉祖宗致敬郊廟自義乖闕里學滅秦庭儒雅既喪經籍堙殄雖兩漢纂修絶業魏晉敦尚斯文而宗廟制度典章散逸習所傳而競偏説是所見而起異端自昔迄兹多歴年代語其大略兩家而已祖鄭𤣥者則陳四廟之制述王肅者則引七廟之文貴賤混而莫辨是非紛而不定陛下至徳自然孝思罔極孺慕踰匹夫之志制作窮聖人之道誠宜定一代之宏規為萬世之彛則臣等奉述叡㫖討論往載紀七廟者實多稱四祖者蓋寡校其得失昭然可見春秋榖梁傳及禮記王制祭法禮器孔子家語並云天子七廟諸侯五廟大夫三廟士二廟尚書曰七世之廟可以觀德至於孫卿孔安國劉歆班彪父子孔晁虞喜于寶之徒或學推碩儒或才稱愽物商較今古咸以為故其文曰天子三昭三穆與太祖之廟而七晉宋齊梁皆依斯義立親廟六豈非國之茂典不刋之休烈乎若使違羣經之明文從累代之疑議背子雍之篤論尊康成之舊學則天子之禮下偪於人臣諸侯之制上僣於王者非所謂尊卑有序名位不同者焉况復禮由人情自非天墜大孝莫重於尊親厚本莫先於嚴配數盡四廟非貴多之道祀及七代得加崇之心是知徳厚者流光乃可乆之髙義德薄者流卑實不易之令範臣等㕘議請依晉宋故事立親廟六其祖宗之制式遵舊典庻承宗之道興於理定之辰尊祖之義成於孝治之日宗廟加籩豆議崔沔臣竊聞識禮樂之情者能作知禮樂之文者能述述作之義聖賢所重禮樂之制古今所崇變而通之所以乆也所謂變者變其文也所謂通者通其情也祭祀之興肇於太古人所飲食必先嚴獻未有火化茹毛飲血則有毛血之薦未有麴糵汙樽坏飲則有𤣥酒之奠施及後王禮物漸備作為酒醴伏其犧牲以致馨香以極豐潔故有三牲八簋之盛五齊九獻之殷然以神道至𤣥可存而不能測也祭禮至敬可備而不敢廢也是以血腥爓熟𤣥樽犧象靡不畢登於明薦矣然而薦貴於新味不尚䙝雖則備物猶存節制故禮云天之所生地之所長苟可薦者莫不咸在備物之情也又曰三牲之爼八簋之實美物備矣昆蟲之異草木之實隂陽之物備矣此節制之文也鉶爼籩豆簠簋樽罍之實皆周人之時饌也其用通於燕饗賔客而周公制禮咸異與毛血𤣥酒同薦於先晉中郎盧諶近古之知禮者也著家祭禮觀其所薦皆晉時常食不復盡用禮之舊文然則當時飲食不可闕於祠祭明矣是變禮文而通其情也我國家由禮立訓因時制範考圖史於前典稽周漢之舊儀清廟時享禮饌畢陳用周制也而古式存焉園寢上食時膳具設遵漢法也而珍味極焉職貢來祭致逺物也有新必薦順時令也苑囿之内躬稼所収蒐狩之時親發所中莫不剖鮮擇美薦而後食盡誠敬也若此至矣復何加焉但當申勑有司祭如神在無或簡怠朂増䖍誠其進貢珍羞或時物鮮美考諸祠典有所漏略皆詳名目編諸甲令因宜而薦以類相從則新鮮肥濃盡在是矣不必加於籩豆之數也至於祭器隨物所宜故大羮古食也盛於登登古器也和羮時饌也盛於鉶鉶時器也亦有古饌而盛於時器故毛血盛於盤𤣥酒盛於樽未有薦時饌而追用古器者由古質而今文便於事也雖加籩豆十二未足以盡天下美物而措諸清廟有兼倍之名近於侈矣魯人丹桓宫之楹又刻其桷春秋書以非禮禦孫諌曰儉徳之恭也侈惡之大也先君有恭徳而君納諸惡無乃不可乎是不以越禮而崇侈於宗廟也又據漢書藝文志墨家之流出於清廟是以貴儉由此觀之清廟之不尚於奢舊矣太常所請恐未可行又按太常奏狀今酌獻酒爵制度全小僅未一合執持甚難不可全依古制猶望稍須廣大者竊據禮文有以小為貴者獻以爵貴其小也不可反制敬而非禮是有司之失其傳也固可隨失釐正無待議而後革然禮失於敬猶奢而寧儉非大過也未知今制何所依凖請兼詳令式據文而行同前議韋述張均同議謹按祭統曰凡天之所生地之所長苟可薦者莫不咸在水草陸海三牲八簋昆蟲之異草木之實隂陽之物皆備薦矣聖人知孝子之情深而物類之無限故為之節制使祭有常禮物有其品器有其數上自天子下至公卿貴賤差降無相踰越百代常行無易之道也又按周禮膳夫掌王之食飲膳羞食用六榖膳用六牲飲用六清羞用百有二十品珍用八物醬用百有二十甕則與祭祀之物豐省本殊左傳曰饗以訓恭儉宴以示慈惠恭儉以行禮慈惠以布政又曰饗有體薦宴有折爼杜元凱曰饗有體薦爵盈而不飲肴乾而不食宴則相與食之饗與宴猶且異文祭奠所陳固不同矣又按周禮籩豆人各掌四籩四豆之實共供祭祀與賔客所用各殊據此數文祭奠不同常時其來乆矣且人之嗜好本無憑准宴私之饌與時遷移故聖人一切同歸於古雖平生所嗜非禮亦不薦也平生所惡是禮則不去也楚語曰屈到嗜芰有疾召宗老而屬曰祭必以芰及祥宗老將薦芰屈建命去之曰祭典有之國君有牛享大夫有羊饋士有豚犬之奠庶人有魚炙之薦籩豆脯醢則上下安之不羞珍異不陳庻侈不以私欲干國之典遂不用此則禮外之食前賢不敢薦也今欲取甘㫖之物肥濃之味隨所有者皆充祭用苟踰舊制其何限焉雖籩豆有加豈能備也傳曰太羮不致粢食不鑿昭其儉也書曰黍稷非馨明徳惟馨夫事神在於䖍誠不求厭飫三年而禘不欲黷也三獻而終禮有成也風有采蘋采蘩雅有行葦泂酌守以忠信神其捨諸若以今之珍饌平生所習求神無方何必師古簠簋可去而盤盂杯案當在御矣韶頀可息而箜篌笙笛當在奏矣凡斯之流皆非正物或興於近代或出於蕃夷入耳之娱本無則象用之宗廟後嗣何觀欲為永式恐未可也且自漢已降諸陵皆有寢宫歲時朔望薦以常饌此既常行亦足盡至孝之情矣宗廟正禮宜依典故率情變革人情所難又按舊制一升曰爵五升為散禮器稱宗廟之祭貴者獻以爵此明貴小賤大示之節儉又按國語觀射父曰郊禘不過繭栗蒸嘗不過把握夫神以精明臨人者也求備於物不求豐大苟失於禮雖多何為豈可捨先王之遺法徇一時之所尚廢棄禮經以從流俗裂冠毁冕將安用之且君子愛人以禮不求苟合况在宗廟敢忘舊制同前議楊仲昌臣按禮經祭法曰夫祭不欲煩煩則黷祭亦不欲簡簡則怠又鄭𤣥云人生尚䙝食鬼神則不然神農時雖有黍稷猶未有酒醴及後聖作為醴酪猶存𤣥酒示不忘古春秋曰蘋蘩蕰藻之菜潢汙行潦之水可羞於王公可薦於鬼神又曰大羮不致粢食不鑿此明君人者有國奉先敬神嚴享豈肥濃以為上將儉約以表誠則陸海之物鮮肥之類既乖禮文之情而變作者之法皆充祭用非所詳也易曰樽酒簋貳納約自牖此明祭存簡易不在繁奢所以一樽之酒貳簋之奠為明祀也抑又聞之夫義以出禮禮以體政違則有紊是稱不經薦肥濃則䙝味有登加籩爵則事非師古與其别行新制寧如謹守舊章昭陵議權徳輿右奉進止寢宫在山上置來多年曽經野火燒爇摧毁略盡其宫尋移在瑶臺寺左側今屬通年欲議修置縁舊宫本在山上元無井泉每縁供水稍逺百姓非常勞弊今欲於見住行宫處修造所冀乆逺便人又為改移舊制恐所見未周宜令中書門下及百僚同商量可否聞奏朝議郎守尚書司勲郎中知制誥雲騎尉賜緋魚袋臣權徳輿議曰臣聞古宗廟之制前有廟廟列昭穆後有寢寢陳衣冠自秦漢已來始因陵立廟有寢宫便殿雖廟居陵傍而無必在山上不在山下之定制且禮文所貴宜也稱也祀事所資敬也潔也伏以昭陵因山太宗所建宫在山上以便當時自野火延燒行宫山下亦已乆矣今若伐木縮板程功就險神道貴静或非所宜則與置陵之初事體為異况舊制既毁新宫是修考於便地可以經乆所謂宜且稱也又井泉在下汲引為易饗獻之禮是資嚴恭本於明徳惟馨亦在吉蠲為饎故禮之言祭也水曰清滌言其潔清滌濯也又曰不敢用常䙝味所以交於神明也因兹洌井以備薦羞所謂潔而敬也凡舉事必以制度當否為大而以人力勞逸為細若於事為當又無所勞不亦順昭陵愛人之心乎不亦叶陛下從宜之禮乎今列聖寢宫有在山下者矣然則致敬來格之義豈以山上山下而為逺近邪臣愚以為但在栢城之内則不示逺陛下精誠愼重詢及庶僚徒獻所聞伏増戰越謹議省試學生代齋郎議韓愈齋郎職奉宗廟社稷之小事蓋士之賤者也執豆籩駿奔走以役于其官之長不以徳進不以言揚蓋取其人力以備其事而已矣奉宗廟社稷之小事執豆籩駿奔走亦不可以不敬也於是選大夫之子弟未爵命者以塞貟塡闕而教之行事其勤雖小其使之不可以不報也必書其歲歲既乆矣於是乎命之以官而授之以事其亦微矣哉學生或以通經舉或以能文稱其微者至於習法律知字書皆有以賛於教化可以使令於上者也自非天姿茂異曠日經乆以道以業發聞於鄉閭稱道于朋友薦於州府而升之司業則不可得而齒乎國學矣則奉宗廟社稷之小事任力小者也賛於教化可以使令於上者徳藝之大者也其亦不可移易明矣今議者謂學生之無所事謂齋郎之幸而進不本其意因謂可以代任其事而罷之蓋亦不得其理矣今夫齋郎之所事者力也學生之所事者徳與藝也以徳藝舉之而以力役之是使君子而服小人之事非國家崇儒勸學誘人為善之道也此一説不可者也抑又有大不可者焉宗廟社稷之事雖小不可以不專敬之至也古之道也今若以學生兼其事及其歲時日月然後授其宗彛罍洗其周旋必不合度其進退必不得宜其思慮必不固其容貌必不莊此其無他其事不習而其志不專故也非近於不敬者歟又有大不可者其是之謂歟若知此不可將令學生恒掌其事而隳壊其本業則是學生之教加少學生之道益貶而齋郎之實猶在齋郎之名苟無也大凡制度之改政令之變利於其舊不然則不可為已又况不如其舊哉考之於古則非訓稽之於今則非利尋其名而求其實則去其宜故曰議罷齋郎而以學生薦享亦不得其理矣唐文粹巻三十九欽定四庫全書唐文粹巻四十宋姚鉉編議乙摠一十三首明堂五明堂議孔穎逹同前議魏徵同前議顔師古大享議馮宗明堂告朔議王慶雅樂三三朝行禮樂制議杜佑三朝上夀有樂議徹食宜有樂議車服二朝服乘車議劉子𤣥公卿已下冕服議楊炯刑辟三請禁私鑄錢議劉秩復讐議韓愈駮復讐議柳宗元明堂議孔穎達臣伏尋前勑依禮部尚書劉伯莊等議以為從崐崘道上層祭天又尋後勑云為左右閣道登樓設祭臣檢六藝羣書百家諸史皆未聞臺觀重樓之上而有堂名孝經云宗祀文王於明堂不云明樓明觀其宜一也又明堂法天聖王示儉或有翦蒿為柱葺茅作蓋雖復古今興制不可恒然猶依大典徴於朴素是以席惟稾鞂器上陶匏用絸栗以貴誠服大裘以訓儉今若飛樓架逈綺閣凌雲考古之文實堪疑慮按郊祀志漢武明堂之制四面無壁上覆以茅祀五帝於上座祀后土於下防臣以上座正謂臺上下防惟是臺下即云無四壁未審伯莊如何上層祭神下有五室且漢武所為多用方士之説違經背正不可師祖又盧寛等議云上層祭天下堂布政欲使人神位别事不相干臣以古者敬重大事與接神相似以朝覲祭祀皆在廟堂豈有樓上祭祖樓下視朝閣道昇樓路便窄隘乗輦相儀接神不敬歩往則勞曵聖躬侍衛在傍百司供奉求之典誥全無此理臣非敢固執愚見以求巳長伏以國之大典不可不慎乞以臣言下羣臣詳議同前議魏徴明堂之作其所由來逺矣爰自軒唐逮乎秦漢有損有益或異或同記述參差莫能詳究今稽諸詁訓㕘以舊圖其上圓下方複廟重屋百慮一致異軫同歸洎當塗膺籙未遑斯禮典午聿興無所取則裴頠以諸儒持論異端螽起是非舛互靡所適從遂乃以人廢言止為一殿宋齊即仍其舊梁陳遵而不改雖嚴配有所祭享不匱求之典則道實未𢎞何者夏禹哲王致美於祭服周公大孝備物於宗祀聖人之教夫豈徒哉然則身處卑宫神居重屋斯豈苟求壮麗崇餙華侈固亦致之尊親之道因髙事大之義求其逺趣非無深㫖盖以神本虚𤣥無聲無臭視之不見聽之不聞既杳冥而莫測故廣袤之度罔知夫孝因心生禮縁情立心不可極故備物以表其誠情無以盡故餙宫以致其敬宣尼美意其在兹乎自五帝迄今代有損益宫室制度每越舊章重屋規模獨虧前典文祖過土階之險世室踰卑宫之陋配天致極理必未安伏惟陛下以上聖之英靈承皇天之眷命一六合而光宅得萬國之懽心九譯之貢既陳明堂之位仍闕永言殷薦誠感自中臣等親奉徳音令㕘大議思竭塵露微增山海凡聖人有作義重隨時萬物斯覩事資通變若據葵邕之説則至理失於文繁若依裴頠所為則大體又傷於質略求之情理未允厥中今之所議非無用捨請為五室重屋上圓下方既體有則象又事多故實下室備布政之居上堂為祭天之所人神不雜禮亦宜之其髙下廣袤之規几筵尺丈之制則並隨時立法因事制宜自我而作何必師古廓千載之疑議為百王之懿範不使㤗山之下惟聞黄帝之法汶水之上獨稱漢武之圖則通乎神明庶幾可俟子來經始成之不日謹議同前議顔師古明堂之制爰自古昔求之簡牘全文莫覩肇起黄帝降及有虞彌歴夏殷迄于周代各立名號别創規摹衆説舛駮互執所見巨儒碩學莫有詳通斐然成章不知裁斷究其指要實布政之宫也徒以戰國縱衡典籍廢棄暴秦酷烈經禮湮亡今之所存傳記雜説用為凖的實亦蕪昧然周書之叙明堂紀其四面則有應門雉門據此一塗固是王者之常居耳其青陽總章𤣥堂太廟及左个右个與四時之次相同則路寢之義足為明證又文王居明堂篇載帶以弓韣禮于髙禖九門磔攘以禦疾疫置梁除道以利農夫令國為猶以合三族凡此等事皆合月令之文觀其所為皆在路寢者也戴禮云昔周公朝諸侯於明堂之位天子負斧扆南嚮而立明堂者明諸侯之尊卑也周官又云周人明堂度九尺之筵東西九筵堂一筵據其制度即大寢也尸子亦曰黄帝曰合宫有虞氏曰總章殷曰陽館周曰明堂斯皆路寢之徴知非别處大戴所説初有近郊之言復稱文王之廟進退無據自為矛盾原夫負扆受朝常居出令既在臯庫之内亦何云於郊野哉孝經傳云在國之陽又無里數漢武有懐創造詢於搢紳言論紛然終無定據乃立於汶水之上而宗祀焉明其不拘逺近亦無方面孝成之代表行城南雖有其文厥功靡立平帝元始四年大議營創孔牢等乃以為明堂辟雍太學其實一也而有三名金裒等又稱經傳無文不能分别同異中興之後蔡邕作論復云明堂太廟一物二名鄭𤣥則云在國之陽三里之外淳于澄又云三里之外七里之内丙巳之地穎容釋例亦云明堂太廟凡有八名其體一也苟立同異竟為巧説並出自胷懐曽無師祖審夫功成作樂治定制禮草創從宜質文遞變旌旗冠冕今古不同律度權衡前後不一隨時之義斷可知矣聖上大啓崇基光膺寳運功髙開闢之後徳邁䆳古之初鳳紀龍官譬畎澮於溟渤隨山練石慙培塿於方壺大樂與天地同和豈奏曩時之韶夏大禮與天地同節寧踵前代之膠庠天縱多能睿哲𤣥覽總五行之秀氣抱六藝之菁華秩宗茂典皆取必於宸極共工妙術咸禀訓於深衷隠顯無遺洪纎必應百神受職萬物斯覩將建明堂爰降絲綸規矩之度乆巳蓄於聖懐逺近之宜實不惑於僉議假使
