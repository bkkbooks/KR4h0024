body:
  text: 呉興姚鉉纂序庚揔一十八首錫宴三丞相少傅拜職天子作三傑之詩以命宴序蘇晉季春下旬詔宴薛王山池序張􅀃集賢殿書院奉勑送學士張􅀃上賜宴序張九齡讌集十五泉州席史君讌秀才於東湖亭序歐陽詹暮春太師左右丞相諸公於韋公逍遥谷讌集序王維蕭尚書拜命路尚書就林亭讌集序潘炎讌集韋庶子宅序顧況蓬池禊飲序蕭頴士兩省遺􅀘讌韋司戸南亭序王維江陵陸侍御宅讌集觀張員外􅀞松石序符載魯山令李胄讌寮吏序歐陽詹始得西山讌遊序柳宗元清明日南皮泛舟序蕭穎士夏日諸從弟登汝州龍興閣序李白春日讌諸從弟桃花園序遊雲門序梁肅序飲柳宗元序白舒元與丞相少傅拜職天子作三傑之詩以命宴序蘇晉惟聖寶賢以齊皇極有若左丞相燕國公右丞相廣平公太子少傅安陽侯皆生人碩徳皇國元老道著廊廟績宣華戎由是懋其成功錫以元吉咨日于朔擇時于秋俾對命玉庭受職公府見羣屬揖庶寮禮官辨章掌舎陳次工備佾饔獻蒸六卿拜下以成儀三事自天而來賀秩秩賔序暉暉旅疇玉緯垂文南風和雅頌之變金漿降醴雲天光飫酌之宜宰德貴和盡莊敬具瞻之範羣情尚洽預周旋宴語之懽方將一心天工勠力帝載􅃦黒山之柝苞青海之戈雲雨賢才水火菽粟日詠魚藻􅀊陳由庚頥殷趙之年留魯陽之景爰命在宴乃􅆳載歌季春下旬詔宴薛王山池序張􅀃有生之性萬殊無方之盛一節陽和而動植暢春滿而臯壤恱后皇所以發時令布新慶二南邁周召之風百辟形金石之詠者也碧流日暖南山雪殘首獻之浹辰暮春之提日帝京形勝借上林而入遊戚里池臺就脩竹而開宴泉賙御府味給天厨仙倡宥樂中貴督酒太平佳事前史未書大矣哉一德日新九功惟叙運璿樞而均四氣握金鏡而靜萬方堯舜湯文不違顔於咫尺夔龍伊吕共接手於朝廷不可見而見焉不可聞而聞焉豈深思勝殘去殺累百年之至仁推曆桉圖啓千齡之昌運河清難得人代幾何擊壤之懽良有以也此則青門上路朱邸平臺城煙屢起而泊山野風時來而過水春將悵別愛落花之灑途夏如欣㑹玩峯雲之映沼爾其列筵授几分曹設幕艇送江鳬舩迎海鶴魚龍九劒曼延揮霍鸞鳯鳴簫鼔作申錫開於百甕慈心岀於三爵炮炙熏林塘醪醴猒丘壑抃急管於無筭醉湛恩以取樂羣公賦詩俾僕題序長卿痟渇􅁴含毫之轉遲子雲壯夫見雕蟲之都廢敢憚鄙詞之訥澁恐貽盛集之蕪􅁾云爾集賢殿書院奉勑送學士張􅀃上賜讌序張九齡集賢殿者本集仙殿也上惟睿作聖而猶垂意好學用相必本於經術圖王亦始於師臣及乎鴻生碩儒愽聞多識之士自開元肇建以迄于今大用徵集煥乎廣内而聽政餘睱式讌在兹忠臣嘉賔得盡心之所聦明文思有光􅀍之德故下以道親上亦懽甚即於御座爰發德音以爲􅀱彼神人事雖千載傳於方士言固不經遂改爲集賢去華務實且有後命増其學秩是以集賢之庭更爲論思之室矣中書令燕國公外弼庶績以奉沃心之謀内講六經以成潤色之業故得出入華殿師長翰林惟帝用臧固天所頼拜命之日荷寵有加降聖酒之罍頒御􅌮之膳食以樂侑人思徳飽時則有侍中安陽公等承恩預焉學士右散􅀐常侍東海公等攝職在焉或稷卨大賢淵雲諸彦文王多士周室以寜武帝得人漢家爲盛而髙視前古獨不在於今乎咸可賦詩以光鴻烈泉州席史君宴邑中赴舉秀才於東湖亭序歐陽詹貢士有宴我牧席公新禮也貞元癸酉歳邑有秀士八人公將薦之于闕下古者相覿相祖有享有宴享以昭恭儉宴以示慈惠二典爲用鮮或克兼諸侯升俊造於天子遣之日惟行郷飲酒之禮則享禮也胾肉玄酒莫飲莫食公念肉不使食則仁不下浹酒不使飲則懽不上交方欲激􅀖俗於流醨致王人于徳行而賢者仁未伊浹才者懽未我交其􅀂􅃖􅃖何秋七月與八人者鄕飲之禮旣修乃加之以宴餚移巳膳醴岀家醖求絲桐匏竹以將之選華軒勝景以光之後一日遂有東湖亭之㑹公削桑梓之禮執賔主之儀揖讓升堂雍容就筵樂遍作而情性不流爵無筭而儀形有肅鏘鏘焉濟濟焉於是老㓜來窺盡室盈岐非其親懿則其閭里皆内訟而選善焉於戲行其教不必耳提而口授移其風不必門扇而戸吹公斯宴則風移敎行其間矣真盡心竭誠奉主化民之宰也煙景未暮酒徳俱飽有逡巡避位而言曰夫詩者有以美盛德之形容君侯因片善附小能廻一邑之心成一邑之行昭吾人恭儉於嘉享示吾人慈惠於清宴廻人心成人行周孔之才也昭恭儉示慈惠管晏之賢也不有歌詠其如六義何是日人有甘棠頖宫之什客有天水姜閱河東裴叅和頴川陳詡邑人濟陽蔡沼佐賛盛事亦獻雅章小子公之甿幸鼔微聲先八人者鳴捧豆伺徹時在公之側覩衆君子之作遂作􅁲商之後書其旨暮春太師左右丞相諸公於韋公逍遥谷讌集序王維山有姑射人蓋方外海有蓬瀛地非宇下逍遥谷天都近者王官有之不廢大倫存乎小隱跡崆峒而身拖朱紱朝承明而暮􅀫青靄故可尚也先天之君俾人在宥懽心格于上帝喜氣降爲陽春時則有􅀂太子太師徐國公左丞相始興公少師冝陽公少保崔公特進鄧公吏部尚書武都公禮部尚書杜公賔客王公黼衣方領垂璫珥筆詔有不名命無下拜熙天工者坐而論道掌􅀖典者官司其方相與察天地之和人神之㤗聽於朝則雅頌矣問於野則賡歌矣乃曰猗哉至理之代也吾徒可以酒合讌樂考擊鍾鼓退於􅊮庭撰辰擇地右班劒驂六騶􅀞輪載轂羽幢先路以詣夫逍遥谷焉神皐藉其緑草驪山啓於朱戸渭之美竹魯之嘉樹雲出於棟水環其室㶚陵下連乎菜地新豐半入於家林館層巔檻側逕師古節儉惟新丹堊巖谷先曙羲和不能信其時芳卉後春句芒不能一其令桃逕窈窕蘅皐超忽驂御延佇於叢薄珮玉昇降於蒼翠於是外僕告次獸人獻鮮罇以大罍烹用五鼎木器擁腫即天姿以爲飾沼毛蘋蘩在山羞而可薦伶人在位曼姬始縠齊瑟慷􅁣於座右趙舞徘徊於白雲衮旒松風珠翠煙露日在蒙汜羣山夕嵐猶且濯纓清歌據梧髙詠與松喬爲伍是羲皇上人且三代之後而其君帝舜九服之内而其俗華胥上客則冠冕巢由主人則兄弟元凱合是四美同乎一時廢而不書罪在司禮竊思楚傅常詣茅堂之居仰謝右軍忽序蘭亭之事盖不獲命豈曰能賢蕭尚書拜命路尚書就秫亭宴集序潘炎文昌貴臣新受厥服再拜稽首對揚休命逶迤而退則展慶賀之禮下舎之閑則懷宴語之好所以昵僚友宣寵光敵者易親懽焉而至是以蕭公膺納言之職路公徵賀遷之㑹洎冡宰司㓂作者三人國老如塤箎之和陽春属星烏之序欣榮相合辰當美景形制所選地從主人窮土木之幽荒㝷柏亭之竒構賔主有禮旨酒以柔之清言以發之庖盈而不侈筵肆而不雜狎而不黷酣而不流有太平君子之光見可久賢人之德風調日暖煙靄無隂松茂草滋泉石通氣鶯出幽而初囀花含愁而將歸外物獻美中懷有融髙興格于丹霄餘思垂乎清晝四座相顧請予所尊恱題賦詩無忘盛集集韋庶子宅序顧况昔雒下鄴中蘭亭峴首文雅之盛風流之事盖一方耳今席有芳樽庭有嘉木飲酒賦詩皆大國聖朝羣龍振鷺握蘭佩玉者也在古其有陋乎在今其有榮乎終讌一夕􅀉懷千載是時也暮春駘蕩孟夏恢台之交耳蓬池褉飲序蕭頴士禊逸禮也鄭風有之盖取諸勾萌發達陽景敷煦握芳蘭臨清川乗和蠲絜用激介祉厥義存矣晉氏中朝始叅燕咠之樂江右宋齊又間以文詠風流遂逺鬱爲盛集焉􅀂夫華林曲水萬乗之降也蘭亭激湍專城之踐也而方伯之懽未始前聞以俟乎今辰粤天寶乙未暮春三月河南連帥領陳留守李公以政成務簡方國多睱率府郡佐吏二三賔客悵飲於蓬池備祓除之禮也梁有蓬池上矣前迄溵頴右匯郛邑􅄅瀰淪漣盪日澄天舟楫是臨泛波景從其左則遥原縈屬崇岡傑竦嘉卉異芳雜樹連青即爲臺亭登眺斯在爾乃郡曹頒鏹以給費縣吏領徒而脩頓先夕以定議詰朝而集事是日方牧乃擁車徒曵旌旃夘出乎北牖辰濟乎南川匪疾匪閑翼翼闐闐以稅駕于東焉然後降春流颺綵舟羽觴芳羞緩舞清謳援青蘋駭紫鱗廻環中汀􅃡望南津飫于巳酣于未歌樂只賦旣醉坐䦨而靡怠日入而未闋陶陶乎有以表勝境佳辰之具美名公好事之厚意下客不敏聞於前載曰夫德洽禮成則詠歌繫之梁故魏也請皆賦詩志焉洛陽鄭少府與兩省遺􅀘讌韋司戶南亭序王維惟帝克辟惟股肱克左右庶績允􅁵有司多睱舉無違德孰獻其可雖列侍丹陛而罕伏青蒲攄懷致館㶚陵南望曲江左轉登一級而鄠杜如近盡三休而天地始大凝氣向晦蒼蒼寒木式與汝歌多酌我酒墨客旣序親當獸炭膳夫交馳屢奏鮮食夫含徳之厚與時偕化拂衣而故則野人於小隱之中束帶而朝則君子於大夫之後何􅁤轍一境是非外物哉且􅀐有羈勒徒有次舍可以永曰可以繼夜客非詩人之徒歟奚其嘿矣江陵陸侍御宅讌集觀張員外􅀞松石序符載六虚有精純美粹之氣其注人也爲太和爲聦明爲英才爲絶藝自肇有生人至于吾儕不得則已得之必騰凌夐絶獨立今古用雖小大其神一貫尚書祠部郞張藻字文通丹青之下抱不世絶儔之妙則天地之秀鍾聚于張之一端者耶􅀄公盛名赫然居長安中好事者卿相大臣旣迫精誠乃持權衡尺度之跡輸在貴室他人不得誣妄而覩者也居無何謪官爲武陵郡司馬官閑無事從容大府士君子由是徃徃獲其寶焉荆州從事監察御史陸澧字深源洎令弟曰㶚曰潤曰淮皆以文行穎耀當世故含藻藴竒之士多遊其門焉秋七月深源陳讌宇下華軒沉沉樽俎靜嘉庭篁霽景踈爽可愛公天縱之思歘有所詣􅁀請霜素願撝竒蹤主人奮􅅂嗚呼相和是時座客聲聞士凡二十四人在其左右皆岑立注視而觀之員外居中箕坐鼓氣神機始發其駭人也􅀂流電激空驚飈戾天摧挫斡掣撝霍瞥列毫飛黒噴捽掌如裂離合惝恍忽生怪狀及其終也則松鱗皴石巉巖水湛湛雲窈􅆌投筆而起爲之四顧􅀂雷雨之澄霽見萬物之情性觀夫張公之㙯非􅀞也眞道也當其有事已知夫遺去機巧意􅁳玄化而物在靈府不在耳目故得於心􅀿於手􅀌姿絶狀觸毫而出氣交沖漠與神爲徒􅀂忖短長於隘度筭妍蚩於陋目凝觚䑛墨依違良乆乃繪物之贅疣也寜置于齒牙間哉於戲由基之弧矢造父之車馬内史之筆札員外之松石使其術可授雖執鞭之賤吾亦師之如不可求從吾所學則知夫道精藝極當得之於玄悟不得之於糟粕衆君子以爲是事也是㑹也雖蘭亭金谷不能尚此或闕歌頌取羞前人命鄙夫首叙諸公得揮其宏思耳魯山令李胄三月三日宴僚吏序歐陽詹三月三日有酒食出于野曰褉飲古俗也有唐今上御宇之九年年定三節一以二月一日曰中和取九月九日曰重陽次取此日之褉飲賜羣臣大宴登髙臨川與時所宜洎四方有土之君亦得自宴其僚屬貞元十二年季春月旣魄一日則其日也臨汝魯山令趙郡李胄恭國令宴于縣南滍濵先宴曰夫宴者古所以示慈惠而期合懽者也國家錫以斯宴者情亦古情焉況食在充膓不在充目酒在成禮不在溺神歌發其所自和舞發其所自樂窮八珍竭千鍾彊發􅀭課􅁝竹則有勞有逸豈合懽之意歟於是首設一席肉一肩酒一壷命自天子命爲佐者次一席酒肉亦如之命自巳命以爲吏者次一席酒肉亦如之命鄉閭許以􅂄年有德者肉旣飽酒旣酣因化育之宿洽有歌謡者進有蹈舞者作皆誠激乎中章乎形容婆娑慷􅁣與習而爲者不􅀋然後漁者請以其舟農者請以其器圃者請以其畜弋者請以其鮮啐濁甞漉浮泛漪瀾風恬日和川睛野媚以熙以怡萬心一之至義之門大順之家父兄子弟一族一堂之中不能過也非仁徳淳化其孰能至於是耶旅遊之子實窺盛事兹宴也雖溥於天下百里不同風雨恐他邑之景物此辰不得似公之邑也一方不同教化恐他邑之懽樂此辰不得似公之邑也故叙之始得西山讌遊序柳宗元自余爲僇人居是州􅁪惴慄其隙也則施施而行漫漫而遊日與其徒上髙山入深林窮迴溪幽泉怪石無處不到到則披草而坐傾壷而醉醉則更相枕以卧意有所極夢亦同趣􅁴而起起而歸以爲凡是州之山有異態者皆我有也而未始知西山之怪特今年九月二十八日因坐法華西亭望西山始指異之遂命僕人過湘江縁舟溪斫榛莽焚茅茨窮山之髙而止攀援而登箕踞而遨則凡數州之土壤皆在袵席之下其髙下之勢㞹然窪然􅀂垤􅀂穴尺寸千里攅蹙累積莫得遯隱縈青繚白外與天際四望如一然後知是山之特出不與培塿爲􅀋悠悠乎將灝氣以俱而莫得其涯洋洋乎與造物者遊而不知其所窮引觴滿酌頽然就醉不知日之入蒼然暮色自逺而至至無所見而猶不欲歸心凝神釋與萬化􅁳合然後知吾嚮之未始遊遊於是乎始故爲之序以志是歳元和四年也清明日南皮泛舟序蕭頴士昔建安中魏文爲王太子與朋友諸彦有南皮之避颺鳴葭浮甘􅀲清泉奫淪千古一色此城隅託勝之舊也由小而方大則貴賤之懽可齊以今而喻古則風流之事不易矧乃日清明時升平甿庶阜海濵之利謳吟動齊右之曲亦明代一方之樂也邑宰東海徐君洎英僚二三皆人傑秀出吏能髙視郊驛繼當時之懽豪梁重莊叟之興相與矯翠帟騰清波紅粧屢舞緑醑徐進管􅁝迎風以響亮士女環岸而攅雜可以娯聖澤表人和也層城景移碧潭隂起蕩暄妍之氣色縱魚鳥之游泳其思夫闕塞崇崒昆池清泠關河千里帝京不見斯興情之極致也爰命墨客紀他鄕之勝事云爾夏日諸從弟登汝州龍興閣序李白夫槿榮芳園蟬嘯珍木盖紀乎南火之月也可以處臺榭居髙明吾之友于順此意也遂􅁲精勝得乎龍興留寶馬於門外歩金梯於閣上漸出軒戸遐瞻雲天晴山翠逺而四合暮江碧流而一色屈指鄕路還疑夢中開襟危欄宛􅀂空外嗚呼屈宋長逝無堪與言起予者誰得我二季當揮爾鳯藻搜乎需觴與白雲老兄俱莫􅀒古人也春夜宴諸從弟桃園序夫天地者萬物之逆旅光隂者百代之過客而浮生􅀂夢爲懽幾何古人秉燭夜遊良有以也况陽春召我以煙景大塊假我以文章㑹桃花之芳園序天倫之樂事羣季俊秀皆爲惠連吾人詠歌獨慙康樂幽賞未巳髙談轉清開瓊筵以坐花飛羽觴而醉月不有佳作何伸雅懷如詩不成罰依金谷酒數遊雲門序梁肅上徳以汗漫爲友無江海之閑其次則仁智相從山水爲樂故同志同方賢者有柴桑之隱遊道遊趣吾徒有雲門之㑹其造適一也先㑹一日沙門釋去諠命我友相與探玉笥上㑹稽然後泝􅀂耶過鳯林而南意欲脫人世之羇鞅窮林泉之遐奥於是捨舟清瀾反筞閑原逓杳靄而歷嶇入深翠以泛廻環遂至雲門觀其羣山疊翠秦望拔起五峯巉巉列壑沈沈上摩碧落旁湧金界其下則百泉㑹流蓄爲澄潭涵虚鏡徹鳴瀬玉漱泠泠之聲與地􅄜唱和不待笙磬而五音迭作眺聽不足則凝思宴息怳然疑諸天樓觀列在咫歩庭衢之中別有日月旣而動歩真鏡靜聆法音合􅃮園一指之諭詣淨名無住之本萬里如洗百骸坐空視松喬爲弱喪輕世界於􅀥葉盖道由境深理自外奬故也昔之逺公紀廬山謝客題石門道流勝賞今古一貫曷可不賦貽雲山羞乃各爲詩以誌斯㑹同乎道者有隴西李公受髙陽齊霞舉約㑹未至亦請同賦此篇用廣夫游衍之致云序飲柳宗元今年子月月望長安重雪終日玉花攪空舞下散地予與友生喜之因自所居南行百許歩登崇岡上青龍寺門門髙出絶寰埃冝寫目放抱今之日盡得雪境惟長安多髙我不與並日旣夕爲寺僧道深所留遂引入堂中􅀄夜有皓影入室室中人咸謂雪光射來復開門偶立見冱雲駮盡太虚眞氣如帳碧玉有月一輪其大如盤色如銀凝照東方輾碧玉上征不見轍迹至乙夜帖懸天心予喜方雪而望舒復至乃與友生出大門恣視直前終南開千疊屏風張其一方東原接去與藍巖驪巒羣瓊含光北朝天宫宫中有崇闕洪觀如甃珪疊璐出空横虚此時定身周目謂六合八極作我虚室峩峩帝城白玉之京􅁴我五藏出濯清光中俗埃落地塗然寒膠瑩然鮮著徹入骨肉衆骸擢舉􅀂生羽翎與神仙人遊雲天汗漫之上沖然而不知其足由蹋寺地身由求世名二三子相視亦不知嚮之從何而來今之從何而遁不諱言不譆聲復根還始認得眞性非天借靜象安能輔吾浩然之氣􅀂是耶且冬之時凝冱有之矣若求其上月下雪中零清霜如今夕或寡某以其寡不易㑹而三者俱白故序之耳重校正唐文粹卷第九十七
