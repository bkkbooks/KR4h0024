front:
  text: 重校正唐文粹卷第二十六之上
  hash: sha256:772bf5ca7abd719957d47348e01c5e43cf2358cdae52bd271347e3f951a30b2f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0024_SBCK_026-1a}
body:
  text: 呉興姚鉉纂表奏書䟽乙揔九首政事三諌太宗不詰難臣寮上言書并荅詔劉洎論時政書柳澤諌太宗勤政改過書岑文本傳導一敎本書元稹崇儒五請修太學書李觀請置詩學愽士書李行脩請孟子爲學科書皮日休請韓文公配饗書論貢士書舒元輿請太宗不詰難臣寮上言書并荅詔劉洎臣聞帝主之與凡庶聖哲之與賢愚上下相懸擬倫斯絶􅀂乃以至愚而對至聖以極卑而對極尊徒思自强不可得也陛下降恩㫖假慈顔凝旒以聽其言虚襟以納其􅀃猶恐羣下未敢對揚況動神聦縱天辯飾辭以扸其理援古以排其議欲令凡庶何階應荅臣聞皇天以無言爲貴聖人以不言爲徳老君稱大辯􅀂訥莊生稱至道無文此皆不欲煩也是以齊矦讀書輪扁竊􅀏漢皇慕古長孺陳詞此亦不欲勞也且多記則損心多言則損氣心氣内損形神外勞􅀄雖不覺後必爲累須爲社稷自愛豈爲性好自傷乎􅀼以今日升平皆陛下力行所至欲令長乆匪由辯愽但當忘彼愛憎愼兹取捨毎事敦朴無非至公􅀂貞觀之􅀄則可矣至如秦政强辯失人心於自矜魏文宏才虧衆望於虛􅀃此才辯之累較然可知矣伏願略兹雄辯浩然養氣簡彼緗圖淡焉怡目固萬壽於南嶽齊百姓於東戸則皇恩斯畢天下幸甚荅詔非慮無以臨下非言無以述慮比有談論遂致煩多輕物驕人恐由兹道形神心氣非此爲勞今聞讜言虚懷以改論時政書柳澤頃者因韋氏險詖姦臣同惡賞罰紊㢮綱紀紛綸政以賄成宫因寵進言正者獲戾行殊者見疑海内寒心實將莫救賴神祇祐德宗廟降靈天討有罪人用不保陛下叡謀神聖勇智聦明安宗社於巳危拯􅀺庶於將溺今尨眉鮐背歡忻踊躍望聖朝之撫輯聽聖朝之德音今陛下蠲煩省傜法明德舉萬􅀖愷樂室家胥慶臣又聞危者安其位者也亡者保其存者也亂者有其理者也伏惟陛下安不忘危存不忘亡理不忘亂則克享天心國家長保也詩曰靡不有􅀄鮮克有終伏惟陛下愼厥終惟其􅀄非禮勿視非禮勿聽非禮勿言非禮勿動書曰惟德罔小萬􅀖惟慶惟不德罔大墜厥宗甚可畏也甚可懼也伏惟陛下愼之哉夫驕奢起於親貴綱紀亂於寵倖願陛下禁之於親貴則天下風隨矣制之於寵倖則天下法明矣詩曰刑于寡妻至于兄弟以御于家􅀖􅀂親貴爲之而不禁寵倖橈之而見從是政之不􅁪令之不一則姦詐斯起暴亂生焉雖嚴刑制戮而法不行矣縱陛下親之愛之莫􅀂安之福之寵禄之過罪之漸也非安之也驕奢之􅁋危之本也非福之也前事不忘後之師也伏願陛下精求俊哲朝夕納誨縱有逆于耳謬于心者無速之以罰姑籌之以道省于厥躬雖木樸忌諱恕之以直用開諌諍之路也或有順於耳便於身者無急之以賞當求諸非道稽之典訓其不叶於德必寘之以法用杜側媚之行也有羞􅁋巧於陛下者遽黜之則􅁋巧息矣有進忠讜於陛下者遽賞之則忠讜進矣臣又聞生於富者驕生於貴者慠石碏曰臣聞愛子敎之以義方不納於邪驕奢􅁋佚所自邪也書曰罔滛於逸罔遊於樂穆王有命曰實賴前後左右有位之士繩愆糺謬格其非心今儲宫肇建王府初啓至於寮友必惟妙擇今驕奢之後流遁未變慢遊之樂餘風或存夫小人弄臣易合於意竒伎􅁋巧多適於心狎於非德兹爲奢怠書曰愼簡乃僚無以巧言令色其惟吉士僕臣正厥后克正僕臣䛕厥后自聖伏願采温良愽聞之士恭儉忠鯁之人任以東宫及諸王府仍請東宫量署拾遺􅀘闕之職令朝夕講論出入侍從授以訓誥交修不逮臣又聞馳騁畋獵令人發狂名敎之中自有樂地承前貴戚鮮克由禮或打毬擊鼓比周伎術或飛鷹奔犬盤遊藪澤此甚爲不道非進德修業之本也書曰内作色荒外作禽荒又曰無􅀂丹朱傲慢遊是好朋􅁋于家用殄厥代伏惟陛下誕降謨訓敦勸學業示之以好惡陳之以成敗以義制事以禮制心圖之於未萌慮之於未有則福禄長享與國並休矣臣又聞富不與驕期而驕自至驕不與罪期而罪自至罪不與死期而死自至信矣斯語明哉至誡頃者韋庶人樂安公主武延秀等可謂貴矣可謂寵矣權侔人主威震天下然怙侈滅德神怒人棄豈不謂愛之太極富之太多不節之以禮不防之以法終轉吉爲凶變福爲禍千人所指無病自死不其然歟書曰殷鑒不逺在彼夏王今陛下何勸豈非皇祖謀訓之則也今陛下何懲豈非孝和寵任之甚也禮曰愛而知其惡憎而知其善可不愼哉夫寵愛之心則不能免去其太甚閑之禮節適則可矣今諸王公主駙馬亦陛下之親愛也驕狂之道在於厥初鑒誡之義其則不逺使觀過務善居寵思危庶夙夜惟寅聿修厥德經曰在上不驕高而不危所以長守貴也制節謹度滿而不溢所以長守富也富貴不離其身然後能保其社稷書曰制官刑警于有位敢有􅁪舞于宫酣歌于室時謂巫風敢有徇于貨色􅁊于遊畋時謂滛風敢有侮聖言逆忠直逺耆德比頑童時謂亂風惟兹三風十愆卿士有一于身家必喪􅀖君有一于身國必亡甚可畏也甚可懼也伏惟陛下必察而明之必信而勸之有奢􅆫驕怠者削其禄封樸素脩業者錫以車服以朂其心使奉其命無使乆而忽之無使逺而墜之臣聞知之非艱行之惟艱又曰常厥德保厥位厥德匪常九有以亡㐲惟陛下愼之哉前車之覆實惟明證先王之誡可以終吉􅀂陛下奉伊尹之訓崇傅􅀃之命不作無益不啓私門刑不差賞不濫則惟德是輔惟人之懷天禄永終景福是集儻陛下忽精一之德開恩倖之門爵賞有差刑罰無當則忠臣正士亦當復談矣諌太宗勤政改過書岑文本臣聞創撥亂之業其功旣難守巳成之位其道不易故居安思危所以定其業也有始有卒所以保其位也今雖億兆乂安方隅寧謐旣承喪亂之後又接凋弊之餘戸口減損尚多田疇墾闢尚少覆燾之恩著矣而瘡痍未復德敎之風被矣而資産屢空是以古人譬之種樹年祀綿逺則枝葉扶踈􅀂種之日淺根本未固雖壅之以黒墳䁔之以春日一人揺之必致枯槁今之百姓頗􅀋於此常加含養則日就滋息蹔有征役則隨之凋耗凋耗旣甚則人不聊生人不聊生則怨氣充塞怨氣充塞則離叛之心生矣故帝舜曰可愛非君可畏非民孔安國曰人以君爲命故可愛君失道則人叛之故可畏仲尼曰君猶舟也人猶水也水所以載舟亦所以覆舟是以古之哲王雖休勿休日愼一日者良爲此也伏惟陛下覽古今之事察安危之機上以社稷爲重下以億兆在念明選舉愼賞罰進賢才退不肖聞過旣改從諌如流爲善在於不疑出令期於必信頥神養性省畋遊之娯去奢從儉減工役之費務靜方内而不求闢土載櫜弓矢而無忘武備凡此數者雖爲國之􅁪道陛下之所常行臣之愚心惟願陛下思之而不倦行之而不怠則至道之美與三五比崇億載之祚隨天地長乆雖使桑榖爲妖龍蛇作孽雉雊於鼎耳石言於晉地猶當轉禍爲福變咎爲祥況水雨之患隂陽􅁪理豈可謂之天譴而繫聖心哉臣聞古人有言農夫勞而君子養焉愚者言而智者擇焉輒陳狂瞽伏待斧􅃏論敎本書元稹某年日月臣稹再拜獻書皇帝陛下臣伏見陛下降明詔脩廢學増冑子選司成大哉堯之爲君伯夷典禮夔敎胄子之深㫖也然而事有萬萬於此者臣敢昧死而言之臣聞諸賈生曰三代之君仁且乆者敎之然也誠哉是言且夫周成王人之中也近管蔡則䜛入親周召則義聞豈可謂夫明哉然而克終於道者得不謂教之然邪始其爲太子也未生胎敎旣生保敎太公爲之師周公爲之􅀓召公爲之保伯禽唐叔與之游禮樂詩書爲之翫目不得閱􅁋艶妖誘之色耳不得聞優􅀏陵亂之聲口不得習操斷擊搏之書居不得近容隂順邪之黨游不得恣追禽戮獸之樂翫不得愛遐異僻絶之珍凡此數者非謂備之於前而不爲也亦將不得見之矣及其長而爲君也血氣旣定游習旣成雖有放心快巳之事日陳於前固不能奪巳成之習巳定之心矣則彼忠直道徳之言固吾之所習聞也陳之者有以論焉回佞庸違之􅀃固吾之所積懼也諂之者有以辯也人情之莫不欲耀其所能而黨其所近苟將得志則必快其所藴矣物之性亦然是以魚得水而游馬逸駕而走鳥得風而翔火得薪而熾此皆物之快其所藴也今夫成王所藴道德也所近聖賢也是以舉其近則周公左而召公右伯禽魯而太公齊快其藴則興禮樂而朝諸侯措刑罰而美敎化之至也可不謂信然哉及夫秦則不然滅先王之學曰將以愚天下黜師保之位曰將以明君臣胡亥之生也詩書不得聞聖賢不得近彼趙高者詐宦之戮人也而傳之以殘忍戕賊之術且曰恣睢天下以爲貴莫見其靣以爲尊是以天下之人未盡愚而胡亥固巳不能分獸畜矣趙高之威懾天下而胡亥固巳自幽於深宫矣彼李斯者秦之寵丞相也困讒􅁈死無所自明而況於踈逺之臣庶乎􅀂然則秦之亡有以致之也漢高承之以兵革漢文守之以廉謹卒不能蘇復大訓是以景武昭宣天質甚美纔可免禍亂哀平之閒則不能虞篡弑矣然而惠帝廢易之際猶賴羽翼以勝其邪心是後有國之君議敎化者莫不以興廉舉孝設學崇儒爲意曽不知敎化之不行自貴者始略其貴者敎其賤者無乃鄰於倒置乎洎我太宗文皇帝之在藩邸以至於爲太子也選知道德者十八人與之游習即位之後雖宴遊飲食之間十八人者實在其中上失無不言下情無不達不四三年而名高盛古豈一日二日而致是乎游習之漸也貞觀已還師傳之官皆宰相兼領其餘官寮選亦甚重馬周以位高恨不得爲司議郎此其驗也文皇之後漸踈賤之至母后臨朝翦棄王族當中睿二聖勞勤之際雖有骨鯁敢言之士旣不得在調護保安之職終不能措扶衛之一詞而令匠胡安金藏剖腹以明之豈不大哀哉兵興巳來兹弊尤甚師資保傅之官非疾廢眊聵不任事者爲之即休戎罷帥不知書者處之至於友諭賛議之徒踈冗散賤之甚者搢紳恥之夫以匹士之愛其子者猶求明哲慈惠之師以敎之直諒多聞之友以輔之豈天下之元子而可以疾廢眊瞶不知書者爲之師踈冗散賤不適用者爲之友乎此何反上古之甚也近制宫寮之外往往以沈滯僻老之儒充直講侍讀之選而又踈棄斥逺之越月踰時不得召見彼又安能􅀓成道德而保養其躬哉臣以爲積此弊者豈不以皇天眷祐祚我唐德以舜生舜以堯繼堯傳陛下十一聖矣莫不生而神明長而仁聖以是爲屑屑習儀者故不之省耳臣獨以爲於列聖之謀則可也計無窮之業傳後嗣則不可脫或萬代之後􅀂有周成王之中才而又生深宫優􅀏之閒無周召保助之敎將不能知喜怒哀樂之所自矣況稼穡之艱難乎今陛下以上聖之姿肇臨海内是天下人人傾耳注心之日也特願陛下思成王訓導之功念文皇游習之漸選重師保愼簡宫寮皆用􅀶厚弘深之儒而又練達機務者更進迭見日就月將因令皇太子聚諸生定齒胄講業之儀行問道嚴師之禮至德要道以成之撤膳記過以警之血氣未定則輟禽邑之娛以就學聖質旣備則資游習以弘德此所謂一人元良萬方以貞之化也豈其修廢學選司成而足倫匹其盛哉而又俾則百王莫不㓜同師長同術識君道之素定知天倫之自然然後選用賢良樹爲藩屏出則有晉鄭魯衛之盛入則有東牟朱虚之强蓋所謂宗子維城犬牙盤石之勢也又豈與夫魏晉巳降因賤其兄弟而自翦其本枝者同年而語乎微三時視辟雍於農郊堂室岋嶫磊砢屬聮終朝之雨流潦行渟旣夕之天列宿上羅羣生寂寥攸處貿遷而陛下不以問學官不以聞執政之臣不以思所謂德宇將摧敎源將乾先聖之道將不堪猶火之炎上􅆋􅆋至焚其爲不利也豈不畏哉日者聖朝以武夷時屯有風牧建帝庸今者聖朝以文象天經有臯衡宣皇猷實曰四三六五之君子閒無足以聞之然事不爲加理人不爲加安歲貢之夫不能應請問晏罷之瘽勤同無以悟玄機天下有倒懸之悲諸侯有安忍之懷執柄之臣深惟無從但勞心於無庸全身於因循是了不知長國之術在乎養士養士之方在乎隆學學廢則士亡士亡則國虚國虚則下危下危則禮義銷禮義銷則狂可姦聖賊可凌德逶迤不知其終今觀執事之臣之心必以修太學爲害時而他害者千之養士者爲費財而他費者萬之殊不知此費無費而他費爲費也此害無害而他害爲害也諺所謂溜之細穿石鯁之細斷􅆬斯言損益有漸非聦喆靡察也今乃不明徴於儒書欽􅀂於權輿繼統於易俗恢業於絶風而望海内俊傑靡然踵武於雲龍之庭不知其可也禮稱虞夏殷周天下之盛王以其有庇民之原祚國之仁且太學之興本於有虞達於三王踰至於漢魏以降特盛於我太宗文皇帝重聖遵之無以増洊發於先皇而及於聖朝此乃古帝王慜醇醨亂萌故用教於人百代奉之以弘長國家廣之以存濟元元陛下不宜忽之而巳今四君德以相高八聖幽而不炤風聲隨而凋落焉夫四君之民古猶易制陛下之民猾且難矣易制之民古猶或建之難制之民得不重愼乎昔春秋書太室壞傳曰書不恭也臣今懼聖朝之史書太學廢使萬代之詞無法矣今聖朝聚國中之兵守塞下之壘殫織婦之機悉農夫之儲豈期惡民而賤物誠社稷之謀也假一旦農夫死織婦病兵壘充郊粟帛不輸陛下此時其睱念學乎則禮義之心不素蓄於人亦難以復天下之龢矣且四方之學是太學之枝葉天子之敎是諸侯之本未有本之顚也而枝葉之存天子之亡而諸侯之興夫爲國者亦猶治一身京師人之心四方人之體諸侯體之四支心平則體之患易除體平則四支之患不除可無今不嗇神於心體而竭訾於四支時變於外氣虚於中則爲不起之人矣伏惟陛下察施張之㑹觀損益之圖減無用之府崇有􅁉之原廢闕脩而百度明庠序昌而百行榮經􅀖於悠乆熈載於登閎顧夫周營靈臺魯修泮宮於陛下萬分之一焉伏惟遽令職司不至於不可持天下幸甚請置詩學愽士書李行脩元和三年六月一日郷貢進士臣李行脩謹昧死惶恐再拜獻書闕下臣覆視漢初經籍起口傳壁匿煥然明備其所由者脩廢宮立太學朝夕講貫以究聖意歲時程課以嚴師道使之然也迨乎􅁊靈之世遂使扶持元極匡飭頺俗傳委裘以終大運其儒術巳試之明效歟近學無專門經無師授以音定字以䟽釋經是能使生徒由之中才不能使天下由之致理明矣大率五經皆然臣獨以詩學上聞趨所急也伏惟陛下赦其愚瞽垂恩聽察夫詩者發人之藴政謂之風手舞足􅌃之音作用之光祖宗垂風聲勞歌怨誹之音作用之察吏理審敎化是以四海雖大羣生雖廣猶民人之和氣息乎踵達乎顱流乎手足猶草木之豐澤漸乎根窮乎杪被乎枝葉上下無滯氣内外無遁情如此則詩得其任風得其性也昔殷周相承俱有聖治道洽于下下無怏心王化盛告成功於神明德澤衰反變化於禮素其辭主文譎諫而不訐其敎温柔敦厚而不愚仲尼接于其時謂王者宜以陶冶風俗臣下宜以洗濯疑謬道濟于下吾􅀂之何乃採其詩合三百五篇善者全而用不善者全而去非如春秋諸經或革或因相錯而成也其􅀂禮樂征伐天地隂陽有度假於辭可見喜怒哀樂譏刺諷諭無方非其志莫傳志士躬當治亂之時氣有慘舒之變臻於極而後動積於中而後形故言之成文歌之成聲有一不至則非全矣是以聖人以全動物物莫能固未施敬於人而人敬未施哀於人而人哀頑者以之開明躁者以之舒靜道源於是絶而莫嗣獨有楚屈原頗得詩人之風介於子蘭靳尚之閒終以放死故其道不竟洎秦姍􅀏三代燔燒經籍世儒坑死於是後學軋于相語喑呃相授以及漢興雜全經者七十年師口􅀃者四三輩漢武篤好經術立於學官雖章句大脩而比興未喻時楊雄司馬相如由是選䎡觀望將迎忌諱勸百諷一推波􅂇瀾文雖有餘不足稱也然以本學寖盛時因災異屢啓直聲初或不究終得其助故自殷巳降有天下者莫長焉厥後君臣道薄詩道陵夷藴義感槩之士至曰吾何從乎上之追屈原不足以全性命下之跡相如不足以匡過失故居常則鬱快其􅅐襟嚄唶其齒牙代莫通其源臣伏思之以爲詩敎未隆於時風雅未洽於下敎未隆則士不勸風未洽則言多缺故聞者卒愕而愠者多暗投而卻也自十聖紹業盈二百載經術益試周旋百度吏事反爲縁飾霸道无所舛駮及陛下又登禮巖穴發揚庂伏宸心讜議猶天地相宣儒風昌言與日月橫騖以詞讓次征伐而不暴以誠明推敎化而不浮如此則詩學何爲鬱然積於空虚不用之地乎書殘於古今論失於齊魯漢有毛萇鄭康成師道可觀逮聖朝劉迅者􅀃詩三千言近代言詩者尚之伏惟陛下詔公卿諸儒講其異同綜其指要列四始之元本窮六藝之粹精不使講以多物而無譁蔽之一言而得其言極者爲師法傳經而行其毛鄭不安者亦隨而刋正選立愽士弟子貟如漢朝故事然後命瞽史納于聦明命司成敎之世子是謂端本由朝庭被于民里由京師施之逺方是謂垂化復采詩之官以察風俗是謂兼聽優登才之選以勵生徒是謂興古四者旣備大化自流則動天地感􅀑神德豚魚甘堇荼來異俗懷􅀑方皆在一致推而廣之神而化之無難矣微臣不知時變溺於師言謹詣光順門昧死以聞伏待刑辟請孟子爲學科書皮日休聖人之道不過乎經經之降者不過乎史史之降者不過乎子子不異乎道者孟子也捨是子者必戾乎經史又率于子者則聖人之盜也夫孟子之文粲􅀂經傳天惜其道不燼於秦自漢氏得之常置􅀶士以專其學故其文繼乎六藝光乎百氏眞聖人之微㫖也􅀂然者何其道曄曄於前其書汲汲於後得非道拘乎正文極乎奥有好邪者憚正而不舉嗜淺者鄙奥而無稱邪蓋仲尼愛文王嗜昌歜以取味後之人將愛仲尼者其嗜在乎孟子矣嗚呼古之士以湯武爲逆取者其不讀孟子乎以楊墨爲達智者其不讀孟子乎由是觀之孟子功利於人亦不輕矣今有司除茂才明經外其次有熟莊周列子書者亦登于科其誘善也雖深而懸科也未正夫莊列之文荒唐之文也讀之可以爲方外之士習之可以爲鴻荒之民有能汲汲以救時補敎爲志哉伏請命有司去莊列之書以孟子爲主有能精通其義者其科選視明經苟􅀂是也不謝漢之博士矣旣遂之如儒道不可聖化無補則可刑於言者請韓文公配饗書於戲聖人之道不過乎求用用於生前則一時可知也用於死後則百世可知也故孔子之封賞自漢至隋其爵不過乎公侯至于吾唐乃䇿王號七十子之爵命自漢至隋或卿大夫至于吾唐乃封公侯曽參之孝道動天地感􅀑神自漢至隋不過乎諸子至于吾唐乃旌入十哲噫天地乆否忽泰則平日月乆昏忽開則明雷霆乆息忽震則驚雲霧乆鬱忽廓則淸仲尼之道否於周秦而昏於漢魏息於晉宋而鬱於陳隋遇于吾唐萬世之憤一朝而釋儻死者可作其志可知也今有人身行聖人道口吐聖人言行如顔閔文􅀂游夏死不得配食於夫子之側愚又不知尊先聖之道也夫孟子荀卿翼傳孔道以至于文中子文中子之末降及貞觀開元其傳者醨其繼者淺或引刑名以爲文或援從橫以爲理或作詞賦以爲雅文中之道曠百祀而得室授者唯昌黎文公之文蹴楊墨於不毛之地蹂釋老於無人之境故得孔道巍然而自正夫今之文人千百士之作釋其卷觀其詞無不俾造化補時政繄公之力也公之文曰僕自度􅀂世無孔子僕不當在弟子之列設使公生孔子之世公未必不在四科焉國家以二十賢者􅀂左丘明􅁲子夏公羊高榖梁赤伏勝高生戴勝毛公孔安國劉向范􅇞杜子春馬融盧植鄭康成服子愼何休王肅王輔嗣杜元凱代用其書垂于國胄並配饗於孔聖廟堂者其爲典禮也大矣美矣苟以代用其書不能以釋聖人之辭箋聖人之義哉況有身行其道口傳其文吾唐巳來一人而巳不得在二十一賢之列則未聞乎興禮爲備伏請命有司定其配饗之位則自兹巳後天下以文化未必不由夫是也上論貢士書舒元輿草茅臣某昧死奏書皇帝陛下聖德修三代之敎盡善矣唯貢士一門闕然不修臣􅀼以爲有司過矣臣爲童子時學讀書見禮經有郷舉里選必得其人而貢於上上然後以弓旌束帛招之臣年十五旣通經無何心中有文竅䦕則又學之徧觀羣籍見古人有片善可稱必聞於天子有司天子有司亦修禮待之不苟臣旣學文於古聖人言皆信之謂肖質待問上國必見上國禮無幾前年臣年二十三學文成立爲州縣察臣臣得備下土貢士之數到闕下月餘待命有司始見貢院懸版様立束縛檢約之目勘磨狀書劇責與吏胥等倫臣幸狀書備不被駮放得引到尚書試試之日見八百人盡手􅂝脂燭水炭洎朝晡餐器或荷於肩或提於席爲吏胥縱慢聲大呼其名氏試者突入􅁄圍重重乃分坐廡下寒餘雪飛單席在地嗚呼唐虞闢門三代貢士未有此慢易者也臣見今之天下貢士旣如此有司待之又如此乃益大不信古聖人言及覩今之甲賦律詩皆是偷拆經誥侮聖人之言者乃知非聖人之徒也臣伏見國朝開進士一門苟有登升者皆資之爲宰相公侯卿大夫則此門固不輕矣凡將爲公侯卿相者非賢人君子不可有司坐舉子於寒廡冷地是比僕隸巳下非所以見徴賢之意也施􅁄圍以截遮是疑之賊姦徒黨非所以示忠直之節也試甲賦律詩是待之以雕蟲微藝非所以觀人文化成之道也有司之不知其爲􅁦􅀂此臣恐賢人君子逺去不肖汚辱爲陛下用且指近陳之今四方貢珠玉金銀有司則以篋篚皮幣承之貢賢才俊乂有司以單席冷地承之是彰陛下輕賢才而重金玉也賢才恥之臣亦恥之臣又見毎歲禮部格下天下未有不言察訪行實無頗邪然後上貢荷不如格抵罪舉主臣􅀄見之竊獨心賀謂三代之風必作於今日矣及格旣下而法不下是以歲有無藝朋黨譁然扇突不可絶此又惡用格爲徒亂人耳又於格中程之人數每歲多者固不出三十少或不滿二十此又非天子納士之心也何以言之今日月出没皆爲陛下内地自漸海流沙朔南周環綿億萬千里其間異氣所鍾生英豪俊彦固不少矣􅀂陛下明詔必以禮舉之忽一歲之内有百數元凱楊馬之才德者來之則有司必曰吾格取二十而黜八十是爲求賢邪遺賢邪􅀂有司以僕隸待之怱一歲之内􅀒才德來者無十數輩則有司必曰吾拔二十是繆收其半徒足滿人數是爲取才邪取合格邪其不可先定人數亦昭昭矣向之數事臣乆爲陛下疾有司不供職使聖朝取士首科委就地矣臣寒微􅀂此出言不足以定貢士之得失然百慮之中或幾一得之臣􅀼欲陛下詔有司按三代故事明修格文使天下入貢者皆茂行實不拘人數其不茂行實法與之隨此爲澄源源旣澄則來者皆向方矣俾有司加嚴禮待之舉六義試之試之時免自擔荷廊廡之下特設茵榻陳爐火脂燭設朝晡飯饌則前日之病庶幾其有瘳矣人人知天子重賢􅅄士之道勝氣漫如此士之立身無不由正以成之者爲士身正公卿正公卿正未有天下不治者天下治而陛下求不垂拱以高揖羲軒不可得也苟不如此則士之求名無不由邪以成者爲士名邪未有公卿不邪者公卿邪未有天下而治者天下不治而陛下欲不役聖慮而憂黔首不可得也臣雖至愚以此觀之知貢士之道所繫尤重是以願輸寫血誠以正此門陛下無以臣迹在貢士中疑臣自謂臣雖不敏竊窺太常一第不爲難得何以明之􅀂使臣爲今日貢士之體事便僻巧佞馳騖關鍵固臣之力所不能也恥不爲也故互以頑才于有司得之固無忝不得則納履而去蹤跡巢由以樂陛下熈熈之化何往而無泉石之快哉伏惟陛下留神獨聽天下之幸也於臣何幸死罪死罪重校正唐文粹卷第二十六之上重校正唐文粹卷第二十六之下呉興姚鉉纂表奏書䟽丙揔八首書奏大葬二諌山陵厚葬書虞世南諌靈駕入京書陳子昻廟號一駮義宗廟號書韋湊進貢一論進奉書皇甫湜佛寺三諌造章敬寺書高郢再上諌書復佛寺奏孫樵邊事一請罷兵戍姚州書張柬之諫山陵厚葬書虞世南臣聞古之聖帝明王所以薄葬者非不欲崇高光飾珍寶具物以厚其親然審而言之高墳厚隴珍物畢備此適所以爲親之累非曰孝也是以深思逺慮安於菲薄以爲長乆萬代之計割其常情以定之耳昔漢成帝造延昌二陵制度甚厚功費甚多諌大夫劉向上書其言深切皆合事理其略曰孝文居灞陵悽愴悲懷顧謂羣臣曰嗟乎以北山石爲椁用紵絮斮陳􅃮其間豈可動哉張釋之進曰使其中有可欲雖固南山猶有隙使其中無可欲雖無石椁又何慼焉夫死者無終極而國家有廢興釋之所言無窮計也孝文寤焉遂以薄葬又漢氏之法人君在位三分天下貢賦以一分入山陵武帝歷年長乆比葬陵中不復容物霍光暗於大體奢侈過度其後至更始之敗赤眉賊入長安破茂陵取物猶不能盡無故聚斂百姓爲盗之用甚無謂也魏文帝於首陽東爲壽陵作終制其略曰昔堯葬夀陵因山爲體無封無樹無立寝殿園邑爲棺椁足以藏骨爲衣衾足以朽肉吾營此不食之地欲使易代之後不知其處無藏金銀銅鐡一以瓦器自古及今未有不亡之國無不掘之墓喪亂以來漢氏諸陵無不發掘至及燒取玉㭱金縷骸骨并盡乃不重痛哉􅀂違詔妄有變改吾爲戮屍於地下死而重死不忠不孝使魂而有知將不福汝以爲永制藏之宗廟魏文此制可謂達於事矣向使陛下德止如秦漢之君臣則緘口而巳不敢有言伏見聖德高逺堯舜猶所不逮而俯與秦漢之君同爲奢泰捨堯舜殷周之節儉此臣所以尤慼慼也今爲丘隴如此其内雖不藏珍寶亦無益也萬代之後但見高墳大墓豈謂無金玉也臣之愚計以爲漢文㶚陵旣因山􅀔雖不起墳自然高廣今之所􅁲地勢即平不可不起冝依白武通所陳周制爲三仞之墳其方中制度事事減少事畢之日刻石於陵側明丘封大小高下之式􅉀器所須皆以瓦木合於禮文一不得用金銀銅鐡使萬代子孫並皆遵奉一通藏之宗廟豈不美乎且臣不除服用三十六日已依灞陵今爲隴又以長陵爲法非所冝也伏願陛下深覽古今爲長乆之慮臣之赤心唯願萬歲之後神道常安陛下孝名揚於無窮耳書奏不報世南又上䟽曰漢家即位之初便營陵墓近者十餘歲逺者五十年方始成就今以數月之間而造數十年之事其於人力亦以勞矣又漢家大郡都五十萬户即日人衆未及往時而工役與之一等此臣所以致疑也諌靈駕入京書陳子昻梓州射洪縣草莽愚臣子昂謹頓首冐死獻書闕下臣聞明王不惡切直之言以納忠烈士不憚死亡之誅以極諌故有非常之䇿者必待非常之時得非常之時者必待非常之主然後危言正色抗議直辭赴湯鑊而不迴至誅夷而舞悔豈徒欲詭世誇俗厭生樂死者哉實以爲殺身之害小存國之利大故審計定議而甘心焉況乎得非常之時遇非常之主言必􅀗用死亦何驚千載之跡將不朽於今日矣伏惟大行皇帝遺天下棄羣臣萬國震驚百娃屠裂陛下以徇齊之聖承宗廟之重天下之望喁喁如也莫不兾蒙聖化以保餘年太平之主將復在於兹日矣況皇太后又以文母之賢恊軒宫之耀軍國大事遺詔決之唐虞之際於斯盛矣臣伏見詔書梓宮將遷西京鑾輿亦欲陪幸計非上䇿智者失圖廟堂未聞有骨鯁之謨朝廷多見有順從之議愚臣􅀼惑以爲過矣伏自思之生靈日沐皇風磨頂至踵莫非亭育不能歷丹鳯抵濯龍北面玉階東望金屋抗音而正諌者聖王之罪人也所以不顧萬死乞見一言願蒙聽覽甘就鼎鑊伏惟陛下察之臣聞秦據咸陽之時漢都長安之日山河爲固天下服矣然猶北假胡宛之利南資巴蜀之饒自渭入河轉􅀜東之粟踰沙絶漠致山西之寶然後能削平天下憚壓諸侯長轡利䇿横制宇宙今則不然燕代迫匈奴之侵巴隴嬰吐蕃之患西蜀疲老千里贏粮北園丁男十五乗塞歳月奔命其弊不堪秦之首尾今爲闕矣即所餘者獨三輔之閒耳頃遭荒饉人􅀍荐飢自河巳西莫非赤地循隴以北罕逢靑草莫不父兄轉徒妻子流離委家喪業膏原潤莽此朝廷之所備知也賴以宗廟神靈皇天悔禍去歳薄稔前秋稍登使羸餓之餘得保性命天子幸甚可謂厚矣然則流人未返田野尚蕪白骨縱橫阡陌無主至於蓄積猶可哀傷陛下不料其難貴從先意遂欲長驅大駕按節秦京千乗萬􅀐何方取給況山陵初制穿復未央土木工匠必資徒役今欲率疲􅁦之衆興數萬之軍徴發近畿鞭撲羸老鑿山採石驅以就功春作無時秋成絶望凋瘵遺噍再罹艱苦儻不堪􅁦必有逋逃子來之頌將何以述之此亦宗廟之大機不可不審圖也況國無兼歲之儲家鮮帀時之蓄一旬不􅀨猶可深􅁨忽加水旱人何以濟陛下不深察始終獨違羣議臣恐三輔之􅁦不止如前日矣且天子以四海爲家聖人包六合爲宇歷觀逺古以至于今何甞不以三王爲仁五帝爲聖故雖周公制作夫子著明莫不祖述堯舜憲章文武爲百王之鴻烈作千載之真規然而舜死陟方葬蒼梧而不返禹㑹羣后没稽山而永終豈其愛蠻夷之郷而鄙中國哉實將欲示聖人無外也故能使墳籍以爲美談帝王以爲懿範況我巍巍大聖轢帝登皇日月所臨莫不率俾何獨秦豐之地可置山陵河洛之都不堪園寢陛下豈可不察之愚臣􅀼爲陛下惜也且景山崇麗秀冠羣岑南對嵩邙西望汝海居祝融之故地連太昊之遺墟帝王圖迹縱橫左右園林之美復何加焉陛下曽未察之謂其不可愚臣鄙見良足尚矣況􅈆澗之中天地交㑹北有太行之險南有宛葉之饒東壓江淮食湖海之利西馳崤澠據關河之寶以聖明之主養純粹之人天下和平恭巳正南面而巳陛下不思􅈆洛之壯觀􅀜隴之荒蕪遂欲棄太山之安履焦原之險忘神器之大寶徇曽閔之小節愚臣闇昧以爲甚也陛下何不覽諍臣之䇿採行路之謡諮謨太后平章宰輔恊蒼生之望知有所安天下豈不幸甚昔者平王遷周光武都洛山陵寢廟不在東京宗社墳塋並居西土然而春秋美爲始王漢書載爲代祖豈其不願孝哉何聖賢襃貶於斯濫矣實以時有不可事有必然蓋欲遺小存大去禍存福聖人所以爲貴也夫小不忍則亂大謀仲尼之至誠伏惟陛下察之􅀂以臣愚不用朝議遂行臣恐􅀜隴之憂未時休息臣又聞太原蓄巨萬之倉洛口積天下之粟國家之寶斯爲大矣今欲捨而不顧背以長驅使有識震驚天下失望儻䑕竊狗盜萬一不圖西入陜州之郊東犯武牢之鎭盜敖倉一抔之粟陛下何不預遏之此天下之至機不可不深懼也雖則盜未旋踵誅刑以及滅其九族焚其妻子泣辜雖恨將何及焉故曰先謀後事者逸先事後謀者失國之利器不可以示人斯言不徒云也固願陛下念之駮義宗廟號書韋湊臣聞王者制禮是曰規模規模之興寔資師古之道必也正名惟名與實故當相副其在宗廟禮之大者豈可失哉禮祖有功而宗有德祖宗之廟百代不毀故殷太甲爲太宗太戊曰中宗武丁曰高宗周則文王爲太宗武王爲中宗漢則文帝爲太宗武帝爲代宗其後代有稱宗者以方制海内德澤可宗列於昭穆期於不毀稱宗之義不亦大乎伏惟孝敬皇帝位止東宫未甞南面聖道誠冠於儲副德敎不􅀍於寰瀛立廟稱宗恐非合禮況别起祀典何義稱宗而廟號義宗稱之萬代以臣庸識􅀼謂不可陛下率循典禮以闡大猷儻致此失或虧盡善豈不惜哉望更詳議務合於禮經論進奉書皇甫湜臣聞一人莫非王臣尺土莫非王有山川林藪之所産殖雨露春秋之所成就莫非王財誠冝推至公示無外今國家旣有公府又爲私藏使州郡貢賦之外進奉相及恐非以天下爲家示天下無私之道也且任土之貢生産有常履畒之收等籍旣定人識所岀吏難爲奸進奉旣無度程莫知紀極恣橫徴發因縁贓私驅陛下赤子措之不存之地侈君之嗜慾惑君之聦明實大奸之門大罪之竇也臣雖熟知陛下上聖之姿深仁之理凡内藏之實以充讌賜非務積藏如四逺未知何如百姓受􅁦何如後嗣平中之主由此而傷儉德萌侈心何雖漢有少府水衡筦搉山澤之利終不􅀂領之大農也且地之財無盡玉之用不㑹何必固之内府以開濫􅀜邪伏望陛下罷内府歸之公藏約别進合之古制徵歛有常財用無虧絶奸之根源除政之粃蠹全大體興大和天下大幸伏見正月十一日赦書陛下深念疲民懇責貪吏徃之隨使貢來一皆罷之此實白日之明曽雲之澤也凡諸州府必有羡餘不歸之王廷必没于私室伏請每使當罷必上其數而謹其收水旱之不虞疾疫之不期以振罷羸以代蠲免軍旅之事工役之用以給其費以供其須居常之歳閉藏送待無敢散􅂥而干刑司如是則大賴於人大伸於用矣諌造章敬寺書高郢八月二十五日草莽臣前郷貢進士高郢昧死再拜稽首獻書闕下從諌如流者君之明也有犯無隱者臣之忠也君明臣忠國之利也當陛下至明之化納諫之日臣敢愛其死以隱其忠乎臣伏見奉爲先太后造章敬寺陛下大孝因心與天罔極蒸蒸之思惟舜其難至德要道無以加也然臣伏見以畢力追孝誠有所益妨時勦人亦有所損先太后聖德不必以一寺増輝國家永圖無寧以百姓爲本捨人就寺何福之爲以臣愚蒙不知其所昔魯莊公丹􅁊公廟楹而刻其桷可謂孝乎然而春秋書之爲非禮漢惠帝及孝景孝宣令郡國諸矦立高祖及太宗高宗代宗之廟當時創制不據禮經至元帝時與愽士議郎斟酌古禮一朝而罷之豈元帝不敬宗廟乃王者示人以軌物也夫廊廟者宗社之所在神靈之所慿猶不可無故而飾之越禮而立之況此寺非宗社所安神靈所宅而殫萬人之力以邀二梵之報其不可以明矣閒者昆吾孔熾荐食生人今猶不悛偷居宇下百姓凜凜無日不惕遺將攘郤無尺寸之功隴外壤地委之犲狼太宗文武皇帝封殖萬有􅀓之陛下一夫不獲尺土見侵告成之時猶恐有闕況甚於一夫尺土者乎用武巳來十三年矣傷者不救死者不收繕乗􅀘卒至今未巳夫興師十萬日費千金則十有三年百萬之衆資粮扉履取足於人人之困竭胡可勝紀勞疲宛轉十不存二父子兄弟相視無聊延頸嗷嗷以俟王命此皆陛下冝伸勤恤之恩降痛哀之詔縱未暇分散榖帛以贍鰥寡猶當務省侈費以懊休之奈何戎虜未平侵地未復金革未戢疲人未撫太倉無終歲之儲大農有㩁酟之􅁦陛下忍以此時興力哉自八月以來時雨􅄽􅃸禾稼少損菽麥失時黔首狼顧憂在艱食歲􅀂不給將何以救無寺猶可無人其可乎臣􅀼料此寺數年方成士木之勞工用之費不虚府庫將焉取給府庫旣竭則又誅求儻窮匱不堪䑕􅀼之盜起戎狄乘閒狗吠之驚急得不爲陛下深憂乎臣聞聖人受命於天以人爲主苟功濟于天天人同和其功大矣自然上則宗廟受其福下則子孫賴其慶故孝經云德敎加於百娃刑于四海蓋天子之孝也又云明王事父孝故事天明事母孝故事地察又云周公郊祀后稷以配天宗祀文王於明堂以配上帝是以四海之内各以其職來祭詩曰無念爾祖聿脩厥德又曰旣受帝祉施于孫子是知王者之孝在於承順天地嚴配宗考敬愼德敎以臨兆人俾四海諸矦歡心助祭延福流祚永永無窮耳未聞崇建梵宫彫􅅣金玉之爲孝乎且佛本無相不可以有相求道本無爲不可以有爲得陛下豈馳心於有爲之境而邀福於有相之功哉臣竊爲陛下之不取也臣聞夏禹卑宫室而盡力乎溝洫人到于今稱之梁武窮土木而致飾乎寺宇人無德而稱焉陛下􅀂節用愛人當與夏后齊駕何必勞人動衆而踵梁武之遺風乎制造初興役費尚淺人貴量力不貴必成事貴相時不貴必遂陛下􅀂􅂞一人之慮從萬姓之心必是陛下聖德孝思格于天地湛恩霈澤濟乎生靈生靈效誠天地幽賛千福萬禄先后受之豈與一寺較其功德乎陛下以臣言諌於䛘妄伏請令公卿列士庭議可否得其中則天下幸甚臣郢不勝愚忠懇直之至謹投招諌匭以聞再上諌書高郢九月十二日草莽臣前郷貢進士高郢昧死再拜稽首獻書闕下臣聞聖主聞直言之道者豈好其犯顔忤㫖乎誠欲因天下之心以慮則無不得因天下之目以視則無不見也忠臣不避誹謗之誅者豈貪其死諌之名乎誠以君所行有否焉不隱忍偷生以􅀒於時也臣伏見奉爲先太后造章敬寺陛下奉先思孝興福除禍而群黎百娃不知聖情議者皆以爲蕃戎未殄兵革􅁀露國用不贍元元匱竭曽未小康又興此寺雖睿思罔極而人力有限也臣聞衆心成城衆口鑠金則輿人之誦不可輕也故書曰罔咈百姓以從巳之欲易曰聖人感人心而天下和平詩曰愷悌君子神所勞矣此言王者將有爲也將有行也必稽于衆而順于人則自然之福不求而自至未然之禍不除而自絶矣臣愚考之於古則詩書與易如此聽之於今則百娃之議如彼拳拳之極不敢不言昨八月二十五日奏書闕下事寢無報不知天門􅀷逺愚不得上達歟聖意所斷臣言不足聽受歟伏躬待罪旬八日矣臣聞神人無功聖人無名神人無功者不爲有功之功聖人無名者不爲可名之名也不爲有爲之功故功莫大焉不爲可名之名故名莫厚焉臣又聞古之明王積善以致福不費財以求福修德以消禍不勞人以禳禍陛下之作此寺也臣􅀼惑之􅀂以爲功乎則天覆地載隂施陽化未曽有爲也􅀂以爲名乎則正德要道以順天下未曽有待也􅀂以致福乎則通于神明光于四海不在於費財也􅀂以禳禍乎則方務厥德罔有天災不在於勞人也今興造急促人徒竭作土木並起日計萬工畫不遑食夜不遑息力不逮者隨以杖笞愁痛之聲盈於道路以此望福臣恐不然陛下戡定多難以安宗社勵精思理日􅉴不暇内不邇聲色外不樂遊畋務行寛仁以幸天下聖人之德廣大悉被太平之風將可見矣而興動此役固違羣情迴正道於内心求微助於外物㣘左右之過計傷皇王之大猷臣竊爲陛下惜之臣是以敢昧死至于再諌伏惟陛下留神省察臣不勝愚懇切直之至復佛寺奏孫樵賤臣樵上言臣以爲殘蠧於民者羣髠最大且十口之家謂中戸也男力而耕女力而織雖乘樂歳其衣食僅自給也楝宇僅自完也􅀂羣髠者所飽必稻梁所衣必緜􅜄居則邃宇出則肥馬是則中戸不十不足以活一髠武皇帝元年籍天下羣髠凡十七萬夫以十家給一髠是編戸一百七十萬困於羣髠矣武皇帝一旦髪天下羣髠悉歸平民是時一百七十萬家之心咸知生地陛下自即位巳來詔營廢寺以復羣髠自元年正月洎今年五月斤斧之聲不絶天下而工未以訖聞陛下即復之不休臣恐數年之閒天下十七萬髠如故矣臣以爲武皇帝即不能除羣髠陛下尚宜勉思而去之以蘇疲甿況將興於巳廢乎請以􅄏元之事明之開元之閒大駕還自東封從以千官之衆六軍之事三日留於陳留民猶有餘力今陛下即能東封道次給一食則民力殫矣何開元之民力有餘而陛下之民力不足邪開元之閒率戸出兵率􅀂干戸其出􅀂千兵籍而爲伍春夏縱之家以力耕稼秋冬叢之將以戒武事如此則兵未始廢於農農未甞奪於兵故開元之民力有餘也今天下常兵不下百萬皆衣食於平民歲度其費率中戸五僅能活一兵如此則編戸不五百萬不足以給之故陛下之民力不足也今陛下以力不足之民而欲重困於羣髠將何以踵開元太平事邪貞觀巳還開元戸口最爲殷繁不能逾九百萬即今有問於戸部其能如開元乎借如陛下以五百萬給天下之兵今又欲以百七十萬給於羣髠是七百萬無羡賦矣即今戸口不下於開元其餘止二百萬而國家萬故畢出其閒陛下孰與其足也即其鹽鐡不可除而搉筦加筭矣天下之民得不重困乎日者陛下甞欲營國東門諌大夫諍於前言未及終陛下非徒輟其工而又賜帛以優之今所復寺宇豈特國門之急乎聚徒嘯工豈特國門之役乎寧諌大夫不以言而陛下不以聽乎陛下則不能復廢之臣願陛下巳復之髠止而勿復加巳營之寺止而勿復修庶㡬天下之民尙可活也今天下最不可去者兵也臣尚爲陛下日夜思去兵之術究開元太平之事兾異日爲陛下言之況去無用之髠也臣樵昧死以言請罷兵戍姚州書陳東之姚州古者哀牢之舊國絶域荒外山高水深自生人以來洎於後代不與中國交通前漢唐蒙開夜郎滇笮而哀牢不附至光武季年始請内屬漢置永昌郡以統理之乃收其鹽布氊罽之稅以利中土其國西通大秦南通交阯竒珍異寶進貢歲時不闕劉備據有巴蜀常以甲兵不充及備死諸葛亮五月渡瀘收其金銀鹽布以益軍儲使張伯歧選其勁卒勇兵以増武備故蜀志稱自亮南征而國以富饒甲兵充足由此言之則前代置郡其利頗深金銀鹽布之稅不供珍竒之貢不入戈㦸之用不實於戎行寶貨之資不輸於大國而空竭府庫驅率平人受役蠻夷肝腦塗地臣􅀼爲國家惜之漢以得利旣多歷􅀶南山渉蘭倉水更置􅀶南哀牢二縣蜀人愁怨行者作歌曰歷愽南越蘭津渡蘭倉爲他人蓋譏漢貪珍竒鹽布之利而使蠻夷之所馳役也漢獲其利人且怨歌今減耗國儲費用日廣而使陛下之赤子身膏野草骸骨不歸老母㓜子哀號望祭於千里之外於國家無絲髪之利在百姓受終身之酷臣窮爲國家痛之往者諸葛亮破南中使其渠率自相統領不置漢官亦不留兵鎭守人問其故亮言置官留兵有三不易大意以置宮夷漢雜居猜嫌必起留兵運粮爲患更重忽􅀂反叛勞費更多粗設綱紀息然乆定臣窮以亮之此䇿妙得羈縻蠻夷之術今姚府所置之官旣無安邊靜宼之心又無葛亮且縱且擒之技唯知詭謀狡筭恣情割剥貪饕刧略積以爲常扇動酋渠遺成朋黨折支謟􅀏取媚蠻夷拜跪趨伏無復慙恥提挈子弟嘯引兇愚聚㑹蒲􅀶一擲累萬劒南逋逃中原亡命有二千餘戸見散在彼州專以掠奪爲業姚州本龍朔中武陵縣主簿石子仁奏置之後長史李孝讓辛文恊並爲羣蠻所殺前朝遣郎將趙武貴討擊貴及蜀兵應時破敗噍􅀋無遺又使將軍李義揔等往征郎將劉惠基在陣戰死其州遂廢臣竊以諸葛亮稱置官留兵有三不易言其乃驗至垂拱四年蠻郎將王善寶昆州刺史爨乾福又請置州奏言所有課稅自出姚府管内更不勞擾蜀中及置州後録事叅軍李陵爲蠻所殺延載中司馬成琛奏請於瀘南置鎭七所遣蜀兵防守自此蜀中搔擾于今不息且姚府揔管五十七州巨猾遊客不可勝數國家設官分職以化俗防姦無恥無厭狼籍至此今不問夷夏􅀒罪並深見道路刧殺不能禁止臣恐一朝驚擾爲禍轉大伏乞省罷姚州使隸嶲府歲時朝覲同之蕃國瀘南諸鎭亦皆廢於瀘北置關百姓自非奉使入蕃不許交通來往増嶲府兵選擇清良宰牧以統理之臣愚將爲穩便重校正唐文粹卷第二十六之下
