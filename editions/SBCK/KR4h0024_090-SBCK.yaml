body:
  text: 吳興姚鉉纂書十二命附緫九首切磋五别令狐拾遺書李商隱荅崔立之書韓愈重與陸賔虞書劉軻與陶進士書李商隱荅侯高第二書李翺規誨三􅀉從弟正辭書李翺與外孫崔氏二孩書李華􅀉諸弟砥石命附舒元輿諭一諭江陵耆老書劉蛻别令狐綯捨遺書李商隱子直足下行日巳定昨幸得少展寫足下去後憮然不怡今早垂致葛衣書辭委曲惻惻無巳自昔非有故舊援拔卒然於稠人中相望見其表得所以􅀋君子者一日相從百年見肺肝爾來足下仕益達僕困不動固不能有常合而有常離足下觀人與物共此天地耳錯行雜居蟄蟄哉不幸天能恣物之生而不能與物􅁣然量其欲牙齒者恨不得翅羽角者又恨不得牙齒此意人與物略同耳有所趨故不能無爭有所爭故不能不於同中而有各異耳足下觀此丗其同異如何哉兒冠出門父翁不知其枉正女笄上車夫人不保其貞汚此於親親不能無異勢也親者尚爾則不親者惡望其無􅂩哉故近丗交道幾喪欲盡足下與僕於天獨何稟當此丗生而不同此丗毎一㑹面一分散至於􅁣然相執手嚬然相慼決然相泣者豈於此丗有他事哉惜此丗之人率不能如吾之所樂而又甚懼吾之徒孑立寡處而與此丗者蹄尾紛然蛆吾之白擯置譏誹襲岀不意使後日有希吾者且懲吾困而不能堅其守乃捨吾而之他耳足下知與此丗者居常紿於其黨何語哉必曰吾惡市道嗚呼此輩眞手搔鼻皻而喉噦人之灼痕爲􅋪者市道何肯如此輩邪今一大賈坐墆貨中人人往須之甲得􅀂干曰其贏􅀂干丙曰吾索之乙得􅀂干曰其贏􅀂干戊曰吾索之旣與之則欲其蕃不願其亡失口舌拜父母出妻子伏臘相見有贄男女嫁娶有問不幸喪死有致饋葬有臨送弔是何長者大人哉他日甲乙俱入之不欺則又愈得其所欲矣回環出入如此是終身欲其蕃不願其亡失口舌拜父母益嚴岀妻子益敬伏臘相見贄益厚男女嫁娶問益豐不幸喪死饋贈臨送弔哭情益悲是又何長者大人哉唯是於信誓有大欺漫然後罵而絶之擊而逐之訖身而勿與通也故一市人率少於大賈而不信者此豈可與此丗交者等邪今日赤肝腦相憐明日衆相唾辱皆自其時之與勢耳時之不在􅀔之移去雖百仁義我百忠信我我尚不顧矣豈不顧巳而又唾之足下果爲市道何如哉今人娶婦入門母姑必祝之曰善相冝則祝曰蕃息後曰生女子貯之幽房密寢四鄰不得識兄弟以時見欲其好不顧性命即一日可嫁去是冝擇何如男子屬之邪今山東大姓家非能違摘天性而不如此至其羔䳱在門有不問賢不肖健病而但論財貨恣求取爲事當其爲女子時誰不恨及爲母婦則亦然彼父子男女天性豈有大於此者邪今尚如此況他舎外人燕生越養而相望相救抵死不相販賣哉細而繹之眞令人不愛此丗而欲狂走遠颺耳果不知足下與僕之守是邪非邪首陽之二百豈蘄盟津之八百吾又何悔焉千百年下生人之權不在冨貴而在直筆者得有此人足下與僕當有所用意其他復何云云但當誓不羞市道而又不爲忘其素恨之母婦耳商隱再拜荅崔立之書韓愈斯立足下僕見險不能止動不得時顚頓狼狽失其所操持困不知變以至辱於再三君子小人之所憫􅀏天下之所背而馳者也足下猶復以爲可教貶損道德乃至手筆以問之扳援古昔辭義髙遠且觀足下之於故舊之道得矣雖僕亦固望於吾子不敢望於他人者耳然尚有似不相曉者非故欲發余乎不然何子不以丈夫期我也故不能黙黙輒復自明僕始年十六七時未知人事讀聖人之書以爲人之仕者皆爲人耳非有利乎已也及年二十時苦家貧衣食不足謀於所親然後知仕之不惟爲人耳及來京師見有舉進士者人多貴之僕誠樂之就求其術或出禮部所試詩賦䇿等以相示僕以爲可無學而能因詣州縣求舉有司好惡岀於其心四舉而後有成亦未即得仕聞吏部有以􅀶學宏辭選者人尤謂之才且得美仕就求其術或岀所試文章亦禮部之􅀋私怪其故猶樂其名因又詣州府求舉凡二試於吏部一旣得之而又黜於中書雖不得仕人或謂之能焉退自取所試讀之迺􅀋於俳優者之辭顔忸怩而心不寧者數月旣巳爲之則欲有成書所謂恥過作非者也因復求舉亦無幸焉乃復自疑以爲所試與得之者不同其程度及得觀之余亦無甚愧焉夫所謂愽學者豈今之所謂者乎夫所謂宏辭者豈今之所謂者乎設使古之豪傑之士􅀂屈原孟軻司馬遷相如楊雄之徒進於是選必知其懷慙乃不自進而巳耳設使與夫今之善進者競於蒙昧之中僕固知其辱焉然彼五子者且使生於今之丗其道雖不顯於天下其自􅀒如何哉肯與夫斗筲者決得失於一夫之目而爲之憂樂哉故凡僕之汲汲於進者其小得蓋欲以具裘葛養窮孤其大得蓋欲以同吾之所樂於人耳其他可否自計巳熟誠不待人而後知今足下乃復比之獻玉者以爲必俟工人之剖然后知於天下雖兩刖足不以爲疾且無使勍者再尅誠足下相勉之意厚也然仕進者豈舎此而無門哉足下謂我必待是而後進者非尤相悉之辭也僕之玉固未甞獻而足固未甞刖足下無爲我戚戚也方今天下風俗尚有未及於古者􅁁境尚有被甲執兵者主上不得怡而宰相以爲憂僕雖不賢亦且濳究其得失致之乎吾相薦之乎吾君上希卿大夫之位下猶取一障而乗之􅀂都不可得猶將耕於寛閑之野釣於寂寞之濵求國家之遺事考賢人哲士之終始作唐之一經垂之於無窮誅姦䛕於旣死發潛德之幽光二者將必有一可足下以爲僕之玉凡幾獻而足凡幾刖也又所謂勍者果誰哉再剋之刑信如何也士固信於知巳微足下無以發吾之狂言愈再拜重與陸賔虞書劉軻别韶卿巳逾時雖遊處讌賞不接然予心未甞一日去韶卿也且京洛相去八百里足以絶韶卿車轍馬跡矧又自洛南而東渉淮浮江㳂洄數千里安得不悒悒西望邪比予在輦下五六年始不知韶卿及知韶卿兩心始親而形骸巳相遠茍未能忘情忍不酸鼻出涕爲吾友之思邪前陸􅁺來得韶卿書知韶卿欲屈道以從人求京兆解送知韶卿道在與否固不在首解於京兆也愚甞謂與遊者道韶卿膚未雞髪未鶴然其心甚老脫一旦脅肩低眉與諸子爭甲乙於縣官豈愚所謂甚老者邪韶卿曾不是思也愚所謂首岀者謂四科首顔閔三十丗家首太伯七十列傳首伯夷其爲首岀豈不多邪韶卿不首於是而欲首於何哉僕又聞京兆等試試官知與否脫有知韶卿人聞烏有不心躬嘿禮靈冠統以待之邪夫然亦何害小伸於知巳耳不然則東國絀臣西山餓夫微仲尼何傷爲展季伯夷矣韶卿獨不見旣得者邪豈盡爲顔子太伯伯夷然幸韶卿熟思之無以予不食太牢爲不知味者也前月中兩􅀉狀計必有一達者過重陽當決䇿東去計韶卿無以予身遠而不予思也勉矣自愛䇿名春官後當㑹我於眞山與陶進士書李商隱去一月多故不常在故屢辱吾子之至皆不覩昨又垂示東岡記等數篇不惟其辭彩奥大不冝爲冗慢無􅀔者所窺見且又厚􅁓謹字如貢大諸侯卿士及前達有文章積學者何其禮甚厚而所與之甚下邪始僕小時得劉氏六說讀之常得其語曰是非繫於襃貶不繫於賞罰禮樂繫於有道不繫於有司密記之蓋甞於春秋法度聖人綱紀乆羡懷藏不敢薄賤聮綴比次手書口詠非惟求以爲已而巳亦祈以爲後來隨行者之所師稟巳而被鄕曲所薦入來京師又亦思前輩逹者固巳有是人矣有則吾將依之繫鞵出門寂寞往返其間數年卒無所得私怪之而比有相親者曰子之書冝貢于某氏某氏可以爲子之依歸矣即走往貢之出其書乃復有置之而不暇讀者又有黙而視之不暇朗讀者又有始朗讀而中有失字壞句不見本義者進不敢問退不能解黙黙巳巳不復咨歎故自大和七年後雖尚應舉除吉㐫書及人慿倩作牋啓銘表之外不復作文文尚不復作況復能學人行卷邪時獨令狐􅀘闕最相厚歲歲爲寫出舊文納貢院旣得引試㑹故人夏口主舉人時素重令狐賢明一日見之于朝揖曰八郎之友誰最善綯直進曰李商隱者三道而退亦不爲薦託之辭故夏口與及第然此時實於文章懈退不復細意經營述作乃命合爲夏口門人之一數耳爾後兩應科目者又以應舉時與一裴生者善復與其挽拽不得巳而入耳前年乃爲吏部上之中書歸自驚􅀏又復懊恨周李二學士以大法加我夫所謂愽學宏辭者豈容易哉天地之災變盡解矣人事之興廢盡究矣皇王之道盡識矣聖賢之文盡知矣而又下及蟲豸草木􅀑神精魅一物巳上莫不開㑹此其可以當愽學宏辭者邪恐猶未也設他日或朝廷或持權衡大臣宰相問一事詰一物小􅀂毛甲而時脫有盡不能知者則號愽學宏辭者當其罪矣私自恐懼憂􅀂囚械後幸有中書長者曰此人不堪抹去之乃大快樂曰此後不能知東西左右亦不畏矣去年入南塲作判比於江淮選人正得不憂長名放耳尋復啓與曹主求尉于虢實以太夫人年高樂近地有山水者而又其家窮弟妹細累喜得賤薪菜處相養活耳始至官以活獄不合人意輒退去將遂脫衣置笏永夷農牧㑹今太守憐之催去復任逕使不爲升斗汲汲疲瘁低儽耳然至於文字章句愈怗息不敢驚張常自呪願得時人曰此物不識字此物不知書是我生獲忠肅之謚也而吾子反殷勤如此者豈不知邪豈有意邪不知則可有意則巳虚矣然所以拳拳而不能忘者正以往年愛華山之爲山而有三得始其卑者朝高者復得其揭然無附著而又得其近而能遠思欲窮捜極討灑豁襟抱始以往來畨畨不遂其願閒者得李生於華郵爲我指引巗谷列視生植僅得其半又得謝生於雲臺觀暮留止宿旦相與去愈復記熟後又得吾子于邑中至其所不至者於華之山無恨矣三人力邪今李生巳得第而又爲老貴人從事雲臺生亦顯然有聞於諸公閒吾子之文粲然成就如是我不􅀒華之山而華之山亦將不􅀒吾子之三人矣以是思得聚㑹話旣往探歷之勝至於切磋善惡分擘進趨僕此丗固不待學奴婢下人指誓神佛而後巳耳吾子何所用意邪明日東去旣不得面寓書惘惘九月三日弘農尉李某頓首荅侯高第二書李翺足下復書來㑹與一二友生飲酒甚樂故不果以時報三讀足下書感歎不能休非足下之愛我甚且欲吾身在而吾道光明也則何能開難岀之辭如此之無憂乎前書所以不受足下之說而復闢之者將以明吾道也吾之道非一家之道是古聖人所由之道者也吾之道塞則君子之道消矣吾之道明則堯舜禹湯文王孔子之道未絶於地矣前書􅀂與足下混然同辭是宫商之一其聲音也道何由而明哉吾故拒足下之辭知足下必將憤予而復其辭也足下再三教我適時以行道所謂時也者乃仁義之時乎將沈浮之時乎苟仁且義則吾之道何所屈焉爾如順沈浮之時則是乗流望風而高下焉茍如此雖足下之見我且不識矣況天下乎不修吾道而取容焉其志亦不遐矣故君子非仁與義則無所爲也如有一朝之患古君子則不患也吾之道學孔子者也蓋孔子畏于匡圍于蒲伐樹於􅁊魋逐於魯絶糧于陳蔡之師夫孔子豈不知屈伸之道邪賢不肖在我者也貴與冨貧與賤道之行否則有命焉君子正已而須之爾雖人不能取其容焉故孔子謂子路子貢曰詩云匪兕匪虎率彼曠野吾道非邪吾何爲于此子路對曰意者吾未仁且智也而人之不信也與子曰有是乎使仁者而必信安有伯夷叔齊使智者必行安有王子比干子貢對曰夫子之道至大故天下莫能容盍少眨夫子之道子曰良農能稼而不能爲穡良工能巧而不能爲順君子能修其道綱而紀之統而理之而不能爲容爾不修爾道而求爲容賜而志不遠矣謂顔回如謂由也賜也顔淵對曰夫子之道至大故天下莫能容雖然夫子推而行之不容何病不容然後見君子夫道之不修也是吾醜也道旣巳大修而不用是有國者之醜也不容何病不容然後見君子孔子蓋歎之也以孔子其門人三千其聖德如彼之至也而知孔子者獨顔回爾其他皆學焉而不能到也然則僕之道天下人安能信而行邪足下之言曰西伯孔子何等人也皆以柔氣汙辭同用明夷也以避禍患斯人豈浮丗邪人乎夫西伯聖人也姜里之拘僅不免焉孔子聖人之大者也其屈厄如前所陳惡在其能取容於丗乎故曰危行言遜所以遠害也其道則爾其能遠之與否而必容焉則吾不敢知也非吾獨爾孔子亦不知也僕之道窮則仁義而安之者也如用焉則推而傳之于天下者也何獨天下哉將後丗之人大有得於吾之功者爾天之生我也亦必有意矣將欲愚生民之視聽乎則吾將病而死尚何能伸其道也如欲生民有所聞乎則吾何敢辭也然則吾道之行與否皆運也吾不能自知也天下人安能害於我哉足下又曰吾子夷齊之道也如僕向者所陳亦足以免矣故不復有所說若韓孟與吾子之於我親故知我者也茍異口同辭皆如足下所說是僕於天下衆多之人而未有一知巳也安能合於吾心乎吾非不信子云云者也信子則於吾道不光矣欲黙黙則道無所傳云爾子之道子冝自行之者也勿以誨我􅀉從弟正辭書李翺知汝京兆府取解不得如其所懷念勿在意凡人之窮達所遇亦各有時爾何獨至于賢丈夫而反無時哉此非吾徒之所憂也其所憂者何畏吾之道未能到于古之人爾其心旣自以爲到且無謬則吾何往而不得所樂何必與夫時俗之人同得失憂喜而動於心乎借如用汝之所知分爲十焉用其學聖人之道而和其心使餘者以與時世進退於俯仰如可求也則不啻富且貴矣如非吾力也雖盡用其十秖益勞其心爾安能有所得乎汝勿信人號文章爲一藝夫所謂一藝者乃時丗所好之文或有盛名於近代者是也其能到古人者則仁義之辭也惡得以一藝而名之哉仲尼孟軻殁千餘年矣吾不及見其人吾能知其聖且賢者以吾讀其辭而得之者也後來者不可期安知其讀吾辭也而不知吾心之所存乎亦未可誣也夫性於仁義者未見其無文也有文而能到者吾未見其不力于仁義也由仁義而後文者性也由文而後仁義者習也由誠明之必相依爾貴與冨在外者也吾不能知其有無也非吾求而能至者也吾何愛而屑屑於其間哉仁義與文章生乎内者也吾知其有也而能求而充之者也何懼而不爲哉汝雖性過於人然而未能浩浩於心吾故書其所懷以張汝且以樂言吾道之云爾與外孫崔氏二孩書李華八月十五日翁告崔氏之子兩孩省吾出身入仕行四十年晩有汝母巳養汝二人矣吾逮事裴氏鄭氏崔氏諸姑于氏堂姑皆賢明淑哲爲内外師範意欲與汝言之裴氏始恩慈見吾一善未甞不流涕祝吾成立見吾伯仲書題誨責踈略話及舊事云無此例吾伯仲書題比今日中外書題其閒踈密不啻百十也吾小時猶省長㓜毎日兩時櫛􅏕起居尊行三時侍食飲食訖然後敢食猶責不如禮今者諸子日出高眠爭覽盤器何曾有此儀可爲歎息丗教如此何得不亂婦人亦要讀書解文字知今古情狀事父母舅姑然可無咎詩序云哀窈窕思賢才而無傷善之心焉是關睢之義也易曰主中饋無攸遂婦人但當主酒食待賔客而巳其餘無自專之禮詩云將翺將翔佩玉瓊琚此奉舅姑助祭祀之儀也又曰將翺將翔弋鳧與鴈此主酒食待賔客之儀也禮經所載汝其記之又婦人將嫁三月教於公宫祖廟旣毀教於宗室嫁則廟見不見廟者不得爲婦今此禮凌夷人從茍且婦人尊於丈夫羣隂制於太陽丗教淪替一至于此可爲墮涙汝等當學讀詩禮論語孝經此最爲要也吾小時南市㡌行見貂㡌多帷帽少當時舊人巳歎風俗中年至西京市帽行乃無帷帽貂帽亦無男子衫袖蒙鼻婦人領巾覆頭向有帷㡌􅇈離必爲瓦石所及此乃婦人爲丈夫之象丈夫爲婦人之飾顚之倒之莫甚于此觸􅀋而長不可勝言舉其一端告及汝耳勿謂㓜小不遵訓誡所見所聞頽風敗俗故申明舊事不能一一也阿馬來說汝誦得數十篇詩賦麗麗巳能承順十五姉顔色十七伯極鍾念吾旅病乍聞甚慰意凡人不患尊行不慈訓患身不能承順耳汝承十五姉仁慈十七伯訓誘又質性柔順當不扶自直吾所告者括羽汝耳不次翁告崔氏二子省貽諸弟砥石命舒元輿昔歲吾行吳江上得亭長所貽劒心知其不莽鹵匣藏愛重未曽褻視今年秋在秦無何發開見慘翳積蝕僅成死鐡意慙身將利器而使其不光明之􅀂此常緘求淬磨之心於􅇩中數月後因過歧山下得片石如渌水色長不滿尺闊厚半之試以手磨理甚膩文甚密吾意其異石遂􅂝入城問於切磋工工以爲可爲砥吾遂取劒發之初數日浮埃薄落未見快意意工者相紿復就問之工曰此石至細故不能速利堅鐡但積漸發之未一月當見眞貌歸如其言果覩變化蒼慘剥落􅀂青蛇退鱗光勁一水泳􅆂星斗持之切金錢三十枚皆無聲而斷愈始得之利數十百倍吾因歎以爲金剛首五材及爲工人鑄爲器復得首出利物以剛質鋩利茍蹔不砥礪尚與鐡無以異況質柔鋩鈍而又不能砥礪當化爲糞土耳又安得與死鐡倫齒邪以此益知人之生於代茍不病盲聾音啞則五常之性全性全則豺狼燕雀亦云異矣而或公然忘棄礪名砥行之道反用狂言放情爲事蒙􅂪外埃積成垢惡日不覺寤以至於戕正性賊天理生前爲造化剰物殁復與灰土俱委此豈不爲辜􅀒日月之光景邪吾常覩汝輩趣嚮爾誠全得天性者況夙能承順嚴訓皆解甘心服食古聖人道知其必非彫􅆙道義自埋於偷薄之倫者然吾自干名在京城兎魄巳十九晦矣知爾輩懼􅈲甘不繼困於薪粟日丐於他人之門吾聞此益悲此身使爾輩承順供養至此亦益憂爾輩爲窮寠而斯須忘其節爲茍得眩惑而容易徇於人爲投刺牽役而造次惰其業日夜憶念心力全耗且欲書此爲戒又慮爾輩年未甚長成不深諭解今㑹鄂􅀐歸去遂寘石於書函中乃筆用砥之功以寓往意欲爾輩定持剛質晝夜淬礪使塵埃不得閒髪而入爲吾守固窮之節愼臨財之茍積習􅀠之業上不貽庭闈憂次不貽手足病下不貽心意媿欲三者不貽秖在爾砥之而巳不關他人􅀂砥之否也則嚮之所謂切金涵星之用又甚􅃈屑安足以諭之然吾固欲爾輩常置砥於左右造次顚沛必於是思之亦古人韋弦銘座之義也因書爲砥石命以欲爾輩兼刻辭於其側曰劒之鍔砥之而光人之名砥之而􅀭砥乎砥乎爲吾之師乎仲􅀆季􅀆無墜吾命乎諭江陵耆老書劉蛻太原王生甞移耆老書以江陵故楚也子胥親逐其君臣夷其墳墓且楚人之所冝怨也而江陵反爲之廟丗饗其讎謂耆老而忘其君父也吾以爲不然楚人之性僄悍大能復其仇讎其後自懷王入武􅀜楚人怨秦不忘干戈況其人之性能忘胥之能破其國家而事之乎且令江陵之人牽牛羊而祀其廟者將祈年榖而獲凶荒禱疾病而得死亡者乎如厚其餼而虐其報則江陵知胥之不可祠而不祠矣􅀂果祈年榖而得豐穰禱疾病而獲康疆有餼而尋其報則破人之國而居其土辱人之君而受其饗遇一食而自忘楚人之殺父兄則胥自爲無勇也何獨江陵之人而忘習讎乎吾以爲其廟申包胥之廟也包胥有復楚之功年代􅐛逺楚人以子胥甞封諸申故不謂包胥耳不然則子胥何爲饗人之食而江陵何爲事讎人之神乎耆老得書速易其版曰申胥之廟無使人神皆愧耳重校唐文粹卷第九十嘉靖甲申歲太學生姑蘇徐焴文明刻于家塾
