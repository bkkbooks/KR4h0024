body:
  text: 唐文粹後序故姚右史纂唐賢之文百卷用意精博丗尤重之然卷帙繁浩人欲傳録未易為力臨安進士孟琪代襲儒素家富文央爰事摹印以廣流布觀其校之是寫之工鏤之善勤亦至矣噫古之藏書者必芟竹鏟木殫絙竭毫盛其藴宏其載乃能有之今是書也積之不盈几祕之不滿笥無煩簡札而坐獲至寶士君子有志于學其將捨諸若夫述作之旨悉於前序此不復云寶元二年嘉平月殿中侍御史吳興施昌言敘
