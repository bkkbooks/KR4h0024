body:
  text: 吳興姚鉉纂銘甲揔一十首名跡十塗山銘柳宗元仙掌銘獨􅀌及古函谷􅀜銘虎牢􅀜銘賈至棧道銘歐陽詹仙都山銘張鷺磻谿銘梁肅胥山銘盧元輔天門山銘李白湞陽東嶺洞谷銘元傑塗山銘并序柳宗元維夏后氏建大功定大位立大政勤勞萬􅀖和寧四極威懷九有儀刑後王當乎洪流方割災􅀍下土自壷口而導百川大功建焉虞帝耄期順承天曆自南河而受四海大位定焉萬國旣同宣省風敎自塗山而㑹諸侯大政立焉功莫崇乎禦大災乃錫玄圭以承帝命位莫崇乎執大象乃輯五瑞以建皇極政莫先乎齊大統乃朝玉帛以混經制是所以承唐虞之後垂子孫之丕業立商周之前􅀣帝王之洪範者也嗚呼天地之道尚德而右功帝王之政崇德而賞功故堯舜至德而位不及嗣湯武大功而祚延于世有夏德配於二聖而唐虞讓功焉功冠於三代而商周讓德焉冝乎立極垂統貽于後裔當位作聖著爲世準則塗山者功之所由定德之所由濟政之所由立有天下者冝取於此追惟大號旣發華蓋旣狩方岳列位奔走來同山川守臣莫敢遑寧羽旄四合衣裳咸㑹䖍恭就列俯僂聽命然後示之以禮樂和氣周洽申之以德刑天威振耀制立謨訓冝在長乆厥後啓征有扈而夏德始衰羿距太康而帝業不守皇祖之訓不由也人亡政墜卒就陵替向使繼代守文之君又能紹其功德脩其政統卑官室惡衣服拜昌言平均賦入制定朝㑹則諸侯常至而天命不去矣兹山之㑹安得獨光於後歟是以周穆遐追遺法復㑹於是山聲垂天下亦紹前􅁤用此道也故余爲之銘庶後代朝諸侯制天下者仰則於此其辭曰惟禹體道功厚德茂㑹朝侯衛統一憲度省方宣敎化制殊􅀋咸㑹壇位承奉儀矩禮具樂備德容旣孚乃舉明刑以弼聖謨則戮防風遺骨專車克威克明疇敢以渝宣昭􅀺獻底定寰區傳祚後胤丕承帝圖塗山巖巖界彼東國惟禹之德配天無極即山刋碑貽後作則仙掌銘并序獨􅀌及隂陽開闔元氣變化泄爲百川凝爲崇山山川之作與天地並疑有眞宰而未知尸其功者有􅀂巨靈贔屓攘臂其閒左排首陽右拓太華絶地軸使中裂拆山脊爲兩道然後導河而東俾無有害留此巨跡于峯之巓後代揭厲於玄蹤者聆其風而駭之或謂詼詭不經存而不議及以爲學者揔其一域則惑於餘方曽不知創宇宙作萬象月而日之星而辰之使輪轉環遶箭馳風疾可駭於俗有甚於此者徒觀其隂騭無眹未甞駭焉而巨靈特以有跡駭世世果惑矣天地有官隂陽有藏鍜錬六氣作爲萬形形有不遂其性氣有不達於物則造物者取元精之和合而散之財而成之如埏埴鑪鍾之爲瓶爲缶爲鈎爲􅁄規者矩者大者細者然則黄河華嶽之在六合猶陶冶之有瓶􅇲鈎􅁄也於其自然蓋萬化之一工也天機􅁳動而聖功啓元精密感而外物應故有無跡之跡介于石焉可以見神行無方妙用不測彼管窺者方循跡而求之揣其所至於巨細之境則道斯逺矣夫以手執大象力持化權指撝太極蹴蹋顥氣立于無閒行乎無窮則據長河如措杯擘太華若破塊不足駭也世人方以禹鑿龍門而導西河爲神祇可不謂大哀乎峩峩靈掌纎指如畫隱轔磅礴上揮太淸逺而視之如欲捫靑天而掬皓露攀扶桑而捧白日不去不來􅀂飛􅀂動非至神曷以生此唐興百三十有八載余尉于華隂華人以爲紀􅙜嵫勒之罘頌嶧山銘燕然舊典也玄聖巨跡豈帝者巡省伐國之不􅀂歟其古之闕文以俟知言歟仰之嘆之斐然琢石爲志其詞曰天作高山設險西方至精未分川壅而傷帝命巨靈經啓地脉乃眷斯顧高掌逺跖砉如剖竹騞􅀂裂帛川開山破天動地坼黄河太華自此而闢神返虚極跡掛石壁跡豈我名神非我靈變化翕忽希夷杳􅁳道本不生化亦無形天何言哉山川以寧斷鼇補天世未覩焉夸娥愚公莫知其蹤屹彼靈掌懸諸巃嵸介二大都亭亭高聳霞赩煙噴雲抱花捧百神依慿萬峯朝拱長於上古以閱羣動下視衆山蜉蝣䘊蠓彼􅀖人士永揖遺烈瞻之在前如掲日月三川有竭此掌不滅古函谷􅀜銘并序王者建􅀖經野觀象立極於是有重門擊柝以待暴客故封略土宇守在關塞山川丘陵爲之城池天作崤函俾屏京室崇山迴合連岡叢􅀝長河屈盤萬里來束崖奔嶺蹙谷抱谿􅃲崫起重險爲秦東門截函夏於閫閾鏁天府於戸牖外阨八州之咽喉故百二形焉内權六合之奥區故霸王出焉當其中原鹿駭戰國蝟起嬴氏建瓴山東擇肉宇内持㦸百萬連衡此􅀜是時也開門而九國師遁振䇿而二周鼎入奄有大寶遂吞中區洎江返秦璧天祐漢祚高皇帝提劒而起以遏亂略斬白帝紲降王舉漢中平咸陽廓金城以建都活萬姓以三章取威定功此焉是保粤􅀂詢事國牒聆風仙籙則真氣靈蹤起乎其中柱史一去流沙萬里􅅏玉函於舊宅傳寳圖於本枝豈上帝乃􅆃興王是感不然何錫羡開國如此其大歳在大火余適下陽停驂塞門慿覽舊國􅁭帶如故世道不􅅏秦餘空山漢遺茂草恐復舟失於壑岸化爲谷萬載之後昧者不知乃刻頌此石以示來裔其辭曰天地雷雨英雄交爭設險守國作藩于京姓易時移山空塞平千秋陵谷想見精靈仙駕長往雄圖杳􅁳于以志之勒銘巖扄虎牢開銘并序賈至天地定位山川據其極王侯設險虎牢擁其要振之以五岳維嵩崒焉迫之以四瀆洪河突焉冝其咽喉九州閫域中夏賛經綸之攻拒郤攙搶之凌暴􅀂乃金火代變山河分裂脇從力爭義散約解時漢祖守之以臨山東坐清三齊彊楚躑躅而不進隋氏失馭中原版蕩封豕荐食龍戰玄黄時則太宗據之以拒河朔克擒醜夏僞鄭袒縳而請命於戲自周室微弱虎狼并吞盛衰千祀正閠更王而政和民安一統長乆漢氏昭於前載我唐光於兹日其創業之王戡定功業咸在斯地意者天開險固爲霸王之器乎聖作功業知窅􅄀之意乎不然何玄期時事影響之􅀂此也又聞諸鄭志曰制巖邑也􅉑叔死焉而唐漢紹興得非山靈河神正直是輔乃知不獨恃險而顚沛者在於涼德歟天寶七載至自宋都西經洛陽歇鞍登兹懷古欽望鑒山河之壯麗想威靈而咫尺􅁣然有懷敢獻頌曰邈矣維嵩峻極于天磅礴崔嵬北臨洪川嶽瀆㑹險蹙坼封泉寔開虎牢作固伊􅈆維兹虎牢天設巨防攻在坤下拒在离旁昏恃以滅聖慿而王崢嶸豁呀孟門相向伊昔漢祖戡秦統周勍敵相及此焉淹􅅏終夷海春遂復洪溝乗舋而東奄有九州隋氏敗績􅀺人艱阻帝命太宗陳師鞠旅鐡􅀐僔僔雲旗容與擒夏克鄭在此一舉日月永清昆蟲得所歲在戊子西經登兹祇聖肅然憫亡悽其虢叔返道復隍慴師項氏烹苛莫能守之險易同途成敗異時德不在鼎王孫布詞三苗不循魏武忸怩逆失順獲古今同期申鑒勒銘庶警將來棧道銘并序歐陽詹秦之坤蜀之艮連高夾深九州之險也隂谿窮谷萬仞直下奔崖峭壁千里無土亘隔呀絶巉巉􅁳􅁳麋鹿無谿猿猱相望三代而往蹄足莫之能越秦雖有心蜀雖有情五萬年閒夐不相接且秦之與蜀也人一其性物同所宜嗜欲無餘門敎化無餘源可􅐙遷可親昵擘坼地脉睽離物理豈造化之意乎天實凝淸而成地實凝濁而形當其凝也如鎔金下鑄騰雲上浮空􅂩有所不開迴翔有所不合澄結旣定竅缺生乎其中西南有漏天天之竅缺也于斯有兹地地之竅缺也天地也者將以上覆下燾含蓄萬靈可通必使而通者也茍有可通而未通則賢代其工而通之故有爲舟以濟川爲梯以踰山惟兹地有川不可以舟涉有山不可以梯及粤有智慮以全玄造立巨衡而舉追氏縋懸纑以下梓人猿垂絶􅄀鳥傍危岑鑿積石以全力梁半空於未用斜根玉壘旁綴靑泥截斷岸以虹矯繞翠屏而龍踠堅勁膠固雲横砥平揔庸蜀之通途統􅄮雍之康莊都邑之能歩山川之無脛􅀂水決防如鴻嚮陽南之北之踵武湯湯躋峩峩以自􅀂臨蒼蒼而不懼繇是贄幣以遥達人神以㑹同稽禮樂之短長量威力之汙隆可王者王可公者公而相吹以風或曰受􅅣之石長存可構之材無窮易刓代蠧斯道也未始有終嗚呼爲上懷來在乎德爲下昭德在乎義德義之如今日則或人之言有孚其反之則石雖存恐不爲􅅣材雖多恐不爲構想夫往昔有時而有有時而無是用惕惕天下􅃖􅃖知聖賢創物之意之人寡明德義固物之道之人稀敢陳兩端之要銘諸斯道之左庶主德義者存今日之所履踵武湯湯者荷古人之攸作銘曰天覆地燾本亦同設大象難全或漏或缺損多益寡聖賢代工彼雖有缺與無缺同惟北曰秦維南則蜀地缺其閒坤維不續斗起斷岸屹爲兩區秦人路絶蜀火煙􅀌天實不通賢斯有造鑚堅剡勁無蹊以道􅀂川匪舟􅀂陸非車縁危轉虚歩驟交如構雖在功存亦由德項怫劉怒旋見以踣隋落我營自顚而植地非革勢材不易林踣植之致惠怨之心勿謂斯道不􅁪勿謂斯道可乆禮不以禮可有而無㳟不以恭可無而有創之之意如彼固之之理􅀂兹彼知不易兹而易知勒銘道左其同我思仙都山銘張鷺仙都有山山出萬山直上千尋入煙霞深圎如笋抽髙突雲隂摽表下國權輿象帝日歟月歟萬有千歲東西大鎭川澤四衛造化無言莫知往制晴嵐依依宿霧洞開髣髴有像神仙下來顥氣氤氲靈鳥環迴永殊塵雜不鼔纎埃絶頂霄􅔌澄湖在上人罕戾止孰闚其狀日燭雲披風飄液飛如􅀨􅀨空微灑霑衣谷來松音潭影曙暉往往鶴唳不知所歸唐垂百年玄宗體元響應萬歳聲聞上天帝祚明德祠堂在焉永懷軒后功成此地丹竈猶存龍昇萬里事列方誌道高靑史無復仙容空流谿水百越之内此山爲大恍􅀂壷中疑生象外直而不􅀝高而不殆古往今來獨立滄海磻溪銘并序梁肅隂陽和而萬物生聖賢合而天下平和者時也合者運也在昔堯舜合禹仰洪水而天下平者四百年湯合伊尹革桀驁而天下平者六百年文武合太公一戎衣而天下平者八百年與夫風􅀨寒暑五行四時佐天生物一也天之數不可以不變時則有懷山襄陵浩浩滔天之災君之運不可以不極時則有作威殺戮毒痛四海之變變則通時則有四載之庸極則反時則有放伐之功於戲惟尚父鍾其運而遇其主躡其機而作其合者歟于後伯陽不顯仲尼旅人其不合者歟故曰君子得其時則大行不得其時則龍蟠也嘉尚父之動靜不失其時作磻溪銘曰至人無心與道出處處則土木出則雷􅀨惟殷道絶粤有尚父爰宅于幽盤􅁊草莽天地闔闢隂陽運行明極而昏昏極而明遇主水濵謨泰八紘牧野􅁊􅁊一麾而平惟彼日月得天而光惟彼聖賢得時而彰獨夫昏迷我乃豹藏文武作周我乃鷹揚故曰大道無體大人無方運用變通至虚而常作銘磻溪今古芒茫胥山銘并序盧元輔元和十年冬十月朝散大夫使持節杭州諸軍事杭州刺史上柱國盧元輔視事三歳塵天子書上畏羣靈下慙蒸人乃啓忠祠銘而序曰維唐敷祀典于天下廢􅁋置明資父事君罔有不舉寢廟旣設我命厥新有周行人伍公字子胥陪吳之職得死直言國人求忠者之屍禱水星之舎將瞰鴟革遂臨浙江千五百年廟貌不改漢史遷曰胥山今云靑山者繆也吁善父爲孝記曰父讎不與共戴天諌君爲忠經曰諸侯有諍臣不失國當枕于宋鄭絶楚出疆在平爲未宦臣在奢爲旣壯子坎􅇄伏節乞師於吳軍鼔丁寧五戰至郢先喆王建􅀖啓土著以話言戴后惟人人虐惟后成湯用爲大義孔子立爲大經子胥修爲大仇騷人賦爲大怨咸令在上慢惡不生則前戈鞭墓非倒行也後戈走昭非逆施也夫差旣王宰嚭受賂二十年内越恁又顚太伯廟血將乾闔閭劒光且失公朝焉宴焉入則諌焉孰謂矢毒孰謂刀寒雖言屢出口而車甲巳困於齊矣蟹稻已奪於歲矣屬鏤之賜竟及其身䲭夷盛屍投于水濵憤悱鼔怒配濤作神其神迄今一日再至來也海鴟羣飛陽侯夾從聲逺而近聲近而逺奮于吳怫于越夕于楚乃退於是仲秋闕望杭人以旗鼔迓之笳簫和之百城聚覩大耀威靈卷沙墨裂地􅁅截􅀂岸坼成坑迎潮氏格之如吕梁丈人爲靈戈威矛㶑浪百重渚塞不先跳檣揭舷再飯之間絶其音聲蕩漭千里洪波砥平有滑有腯有鹹有腥遥實乎下庭山海梯航鷄林扶桑交臂于夘階金狄在戸雷鼓在堂魏罇漢豆六代笙簧可謂奉天爵之馨香􅀗人神之盛禮佐皇震怒驅叱大邪萬里永清人觀斗氣銘曰武王鉞紂子胥鞭平爲人爲父十死一生矯矯伍貟執弓挾矢杖其寶劒以謁呉子稽首楚罪皆中紂理蒸報子妻殱鉏直士赫赫王閭實聽竒謨錫之金鼔以號以誅黄旗大舉右廣皆朱戮墓非赭瞻昭乃烏後王嗣立執書不泣顚越言潤宰嚭䜛輯歩光欲飛姑蘇待執吾則切諌抉眼不入投于河上自統波濤晝夜兩至懷沙􅀋騷洗滌南北簸蕩東西夷蠻卉服罔敢不來雖非命祀不讓瀆齊帝帝王王代代明明表我忠哉天門山銘李白梁山博望關扄楚濵夾據洪流寔爲呉津兩坐錯落如鯨張鱗惟海有􅀂惟川有神牛渚怪物目圍車輪光射島嶼氣凌星辰卷沙揚濤溺馬殺人國泰呈瑞時訛返珍開則九江納錫閉則五岳飛塵天隂之地無德匪親湞陽果業寺開東嶺洞谷銘并序元傑隂陽精氣結爲山嶽者則爲勝爲異爲奥爲閟故萬嶺交峙而嵩華辨其方羣岳斆靈而瀛壷㧞其􅀋是知仙居靈宅其必有黨乎鳴絃之北趾果業之東阜高不百仞廣纔千􅅿層巖石室幽谷靈洞殊境異觀秀絶竒偉雖瀑流之下鑪峯懸磴之躋丹嶠路逺莫覿余不知其倫擬焉按寺記云昔有方士于是山鋉金變形羽服登仙故石座丹竈至今存焉觀其東嶺削成石􅉷如玉岡巒峭竦巖壁重複捫藟而昇如造雲根縹眇嬋姢似霞衣可攀眞氣勝而塵累􅂢五蓋破而淸機閑蕩然放懷如羽翼之巳生赤城之可接噫境變志遷􅀂符契之恊從也下臨長川澄波吐瀾煙霞夕收飛鳥不喧杳渺逶迤流注無閒西直巨壑連嶂如屏林靄朝翠巖光晝淸篠簜藏輝杉松下􅁳虚廓寂寥涵風有聲縁嶺未極劃開洞門黛容崢嶸詭狀輪囷疑伏龍怪鎭含煙雲又有古木倒傍絶壁盤根網結掛絡空碧崩崖傍傾猨逕下庂羽人幽㑹此焉瑶席搏翠壁而直上軋﨑嶇於紫氛􅀟巖屹以中斷奔屏蹙而成室涵孕精爽澄凝氣源信列仙之攸居豈塵俗之所止哉嗚呼鶴駕一去鳯簫響絶荆榛蔽路危磴敗滅跡􅅏人境而舉世莫知地聮精刹而羣遊莫至吁可怪乎其晦藏也元和丙申歳秋八月余以膠鬲之困寓居精舎再從兄昭肅時假兹邑政便於人務簡多睱與當寺僧知捷日探道源捷亦好古饕竒之士也因語故實􅃡思羽客之玄風以爲靈跡神蹤精誠必復乃操刃持畚履險通幽梯絶棧而歷巉巖排蒙籠而登杳藹時更不稔而神居秘躅粲然皆睹嗟乎芝田玄圃豈逺乎哉天之與人氣通則合客有顧咨而諗予者或應之曰天之運否泰相濟故善利稱德有下民昏墊人之道行藏有數故􅁄津蓬累時惟鷹揚靈物必通道在斯著不然何荒阻千祀㪍焉而興歟乃爲銘曰鑿石通道􅀆援木枝仰攀洞口􅀆踐欹危奔龍伏虎􅀆勢狀竒林攅峯􅀝􅀆蟠雲螭下臨隂谷􅀆神以慄嵌巖巖􅀆洞無極老松蕭瑟􅀆生逺風興雲霈霈􅀆煙霧黒懸巖排空􅀆色噴黛堅根網絡􅀆層霄外披霓解帶􅀆羽翼生下眺遥江􅀆入靑靄世道紛綸􅀆何足謂朝爲榮華􅀆夕顦顇不如幽谷􅀆閲仙經兾接浮丘􅀆整煙轡我窺丹竈􅀆坐山腹衆峯參差􅀆隱雲族鑿仙嶺􅀆望瑤臺朝霞照海􅀆銱綺開信赤松之所昇降王喬之所往來道或用晦􅀆靈物斯濳殷道未昌􅀆說築傅巖紛予感此􅀆勒銘雲根山旣不杇􅀆與名長存重校正唐文粹卷第六十六
