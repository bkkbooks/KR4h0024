body:
  text: 唐御史大夫李栖筠文集序權德輿唐刑部尚書致仕白居易文集序元稹唐贈禮部尚書孝公崔沔文集序李華唐吏部侍郎昌黎先生韓愈文集序李漢唐尚書刑部侍郎文公孫逖文集序顔真卿唐比部郎中崔元翰文集序權德輿唐左補闕皇甫冉詩集序獨孤及唐左補闕李翰前集序梁肅唐左補闕梁肅文集序崔㳟唐司封員外郎李華中集序獨孤及唐禮部員外郎柳宗元文集序劉禹錫唐右拾遺陳子昂文集序盧藏用唐衡州刺史吕温文集序劉禹錫唐御史大夫贈司徒賛皇文獻公李栖筠文集序權德輿辰象文於天山川文於地肖形最靈經緯教化鼓天下之動通萬物之宜而人文作焉三才備焉命代大君子所以序九功正五事精義入神英華發外著之話言施之憲章文明之盛與天地準賛皇文獻公以文行正直祗事代宗中行山立乃恊於初未弱冠隱於汲郡共城山下營道抗志不苟合於時族子華名知於人嘗謂公曰叔父上鄰伊周旁合管樂聲動律外氣横人間感激西上舉秀才第一陟降中外間闗代故宣力匪躬勤於王家出涖方國入居清近由給事黄門官小司空剖符毗陵陟明於呉㢘問風行四方表率拜御史大夫不仁者逺武皇炳然審天工之可付公亦曉然知理道之可必一德交感推心合符執熱以待濯臨摯而不淑豈斯人未得䝉公之功化邪何造物者之戾也始與計偕投小宗伯書至内外掃除之際自為墓誌其間嚮三十年周旋官業斯文相為用大凡出於詩之無邪易之貞厲春秋之襃貶且以閎奓鉅衍為曼辭麗句可喜非法故言公之文簡實而粹精朗拔而章明書誌二篇感槩自敘英華特逹君子之道有初有終至若嘉園綺弛張出處於秦漢之間著四先生碑美蕭文終邴承相之倫或退或讓作五君詠病有司詩賦取士非化成之道著貢舉議其他下屬城教條則辭語温潤言公事上奏則切劘端正觸類而長皆文約旨明昭昭然足以激衰薄而申矩度如崑丘𤣥圃積玉相照景山鄧林凡木不植覽公遺編者髣髴風采知公之道焉烏虖以韓安國之忠厚多大略漢武以為國器壺遂深中篤行將亦倚以為相董仲舒言天人之際有王佐之才而皆不至彼當時齷齪備位者相廷無虚日又况竒衺忮害崇黨蔽善公於斯時道未大光然其謨猷獻替過於當國流風遺書暴於天下神之聽之景福於趙公纂承門訓𢎞大名器三命樞機為唐䕫龍君子然後謂流澤貽慶之言也信德輿先公與公天寶中修詞射䇿為同門生並時筮仕於魏具之地聲猷志氣相視莫逆伏思羈屑展敬無容偎以踈愚承趙公至恵沗聲舉之舊無忘代親翊唐虞之朝嘗陪宰政捧門中集録屑涕見授辭不獲命謹直書以冠於篇白氏長慶集序元稹白氏長慶集者太原人白居易之所作居易字樂天始言試指之無二字能不誤具樂天與予書始旣言讀書勤敏與他兒異五六嵗識聲韻十五志詩賦二十七舉進士貞元末進士尚馳競不尚文就中六籍尤擯落禮部侍郎髙郢始用經藝為進退樂天一舉擢上第明年拔萃甲科由是性習相近逺求𤣥珠斬白蛇劒等賦及百道判新進士競相傳於京師矣㑹憲宗皇帝冊召天下士樂天對詔稱旨又登甲科未幾入翰林掌制誥比比上書言得失因為賀雨詩秦中吟等數十章指言天下事時人比之風騷焉予始與樂天同校袐書前後多以詩章相贈答㑹予譴掾江陵樂天猶在翰林寄予百韻律詩及雜體前後數十首是後各佐江通復相酬寄巴蜀江楚間洎長安中少年遞相倣效競作新詞自謂為元和詩而樂天秦中吟賀雨諷諭閑適等篇時人罕能知者然而二十年間禁省觀寺郵候牆壁之上無不書王公妾婦牛童馬走之口無不道至於繕寫模勒􅃷賣於市井或持之以交酒茗者處處皆是揚越間多作書模勒樂天及予雜詩賣於市肆也其甚者有至於盗竊名姓苟求自售雜亂間厠無可奈何予嘗於平水市中鏡湖傍草市名見村校諸童競習歌詩召而問之皆對曰先生教我樂天㣲之詩固亦不知予之為㣲之也又雞林賈人求市頗切自云本國宰相每以百金換一篇其甚偽者宰相輙能辨别之自篇章以來未有流傳如是之廣者長慶四年樂天自杭州刺史以右庶子詔還予時刺部㑹稽因得盡徵其文手自排纉成五十巻凡二千一百九十一首前輩多以前集中集為名予以為國家改元長慶於是因號曰白氏長慶集大凡人之文各有所長樂天之長可以為多矣夫以諷諭之詩長於激閒適之詩長於遣感傷之詩長於切五字律詩百言而上長於贍五字七字百言而下長於情賦贊箴戒之類長於當碑記敘事制詔長於實啟奏表狀長於直書檄詞䇿剖判長於盡總而言之不亦多乎哉至於樂天之官秩景行與予之交分淺深非敘文之要也故不書長慶四年冬十二月十日微之序尚書崔孝公文集序李華文章本乎作者而哀樂繫乎時本乎作者六經之志也繫乎時者樂文武而哀幽厲也立身揚名有國有家化人成俗安危存亡於是乎觀之宣於志者曰言飾而成之曰文有德之文信無德之文詐臯陶之歌史克之頌信也子朝之告宰嚭之詞詐也而士君子恥之夫子之文章偃商傳焉偃商殁而孔伋孟軻作盖六經之遺也屈平宋玉哀而傷靡而不逺六經之道遯矣論及後世力足者不能知之知之者力或不足則文義寖以微矣文顧行行顧文此其與於古歟帝唐文行臣太子賔客贈禮部尚書博陵孝公崔氏諱沔字若沖安平公愷之少子也世為德表門為上族振發純英滋漸名訓大包淑和髙厲遐清行先乎孝藝裕乎文資孝可以股肱王室揆文可以弼成邦敎進士登第舉賢良方正對䇿第一召見拜校書郎厯陸渾主簿朝廷以公直躬正詞擢左補闕以公嫉邪忿佞除殿中侍御史文端武淑遷起居舍人學該典禮拜尚書祠部員外郎議事惟允遷給事中立言成訓改中書舍人辭乞就養授虞部郎中節髙天下升御史中丞剛亦不吐降著作郎道冠儒林遷祕書少監動為人範除左庶子冝均大政拜中書侍郎望尊地逼出為魏州刺史人惟求舊入為左散騎常侍貳東宫居守集賢院學士祕書監太子賔客兼懷州刺史罷州復職副守薨於位時開元二十四年冬仲月旬有七日春秋六十七贈禮部尚書海内冠帶涕哀宗師公為御史糾輸誠之罔持國屬之罪為給事中拒貴倖怙恩之詔削大臣忤旨之刑為中丞數發太倉減上林禽鳥之給以賑艱食陜東之人仆而復起宦官犯法執以按劾權寵屏息朝章大行權貢舉時得陸尚書景融李楊州瑱宋上黨遥宋兵部鼎等僉為國器在中書詔命之出上考天時下從人心異於斯者必替其否在魏州屬雨水敗稼乃弛禁便人先行後聞活者萬計公自為常侍賔客恒任介正德播天下而不容於朝置之散地竟孤其道時乎初公與元兄御史渾齊名弱冠遊京師搢紳儒學之士皆曰崔氏伯仲必至台司旣而御史君夭殁公終於副守則向之所屬適為人慟哉公之侍疾也孝達於神祗居憂也哀貫乎天地䘮期有數而茹毒終身慈不貸姦貞不肆直道勝而齊物德全而及人博厚崇髙篤實有耀儔於古烈盖魯衞之君子歟在魏州車駕東廵闗外諸侯公為上第由是分掌選署仕進之族知勸焉親交鄰里飢者待公而炊寒者待公而裘蒸嘗之奠待公而後具故祿廩深厚家未嘗足開元中天下富穰車服過制公菲飲食卑宫室濯衣澣冠俾人瞻我而化其不化者亦慙乎心矣見天下之善如不及從而佐之見天下之不善如探湯從而誨之則卒蹈於中庸翻然於不迪已過半矣中朝議政或疑羣謀未允公援六經伸百氏覆於時事事舉其中天下莫不諷誦焉文集經亂離多散逸今其存者二十九巻長子成甫進士擢第校書郎陜縣尉知名當時不幸早世嗣子祐甫論譔先志一巻為第三十傳祖禰之美合於禮經見公文章知公行事則人倫之敘治亂之源備矣豈惟比物諧聲為文章而已乎奉詔脩道德經䟽藏於三閣行乎天下反魏晉之浮誕合𤣥言於世敎其於道也至乎哉祐甫純孝而文直清而和希公門者謂公存焉明發不寐泣次遺文以華北州鄰壤婚姻之舊嘗趨公門備閲家編祐甫代華為校書郎華以是味公之道也熟詞則不敏有古之直焉唐吏部侍郎昌黎先生韓愈文集序李漢文者貫道之器也不深於斯道有至焉者不也易繇爻象春秋書事詩詠歌書禮剔其偽皆深矣乎秦漢已前其氣渾然迨乎司馬遷相如董生揚雄劉向之徒尤所謂傑然者也至後漢曹魏氣象萎薾司馬氏已來規範蕩悉謂易已下為古文剽掠僭竊為工耳文與道蓁塞固然莫知也先生生於大厯戊申㓜孤隨兄播遷韶嶺兄卒鞠於嫂氏辛勤來歸自知讀書為文日記數千百言比壯經書通念曉析酷排釋氏諸史百子皆搜抉無隱汗瀾卓踔奫泫澄深詭然而蛟龍翔蔚然而虎鳳躍鏘然而韶鈞鳴日光玉絜周情孔思千態萬貎卒澤於道德仁義炳如也洞視萬古愍惻當世遂大拯頽風敎人自為時人始而驚中而笑且排先生志益堅其終人亦翕然而隨以定嗚呼先生於文摧䧟廓清之功比於武事可謂雄偉不常者矣長慶四年冬先生殁門人隴西李漢辱知最厚且親遂收拾遺文無所失墜得賦四古詩二百五聮句十律詩一百七十三雜著六十四書啓序八十六哀辭祭文三十八碑誌七十六筆硯鱷魚文三表狀四十七總七百并目録合為四十一巻目為昌黎先生集傳於代又有注論語十巻傳學者順宗實録五巻列於史書不在集中先生諱愈字退之官至吏部侍郎餘在國史本傳唐尚書刑部侍郎贈尚書右僕射孫逖文公集序顔真卿古之為文者所以導逹心志發揮性靈本乎詠歌終乎雅頌帝容作而君臣動色王澤竭而風化不行政之興衰實繫於此然而文勝質則繡其鞶帨而血流漂杵質勝文則野於禮樂而木訥不華厯代相因莫能適中故詩人之賦麗以則詞人之賦麗以滛此其效也漢魏已還雅道微缺梁陳斯降宫體聿興旣馳騁於末流遂受嗤於後學是以沈隱侯之論謝康樂也乃云靈均已來此未及覩盧黄門之序陳拾遺也而云道䘮五百嵗而得陳君若激昻頽波雖無害於過正㩁其中論不亦傷於厚誣何則雅鄭在人理亂由俗桑間濮上胡為乎綿古之時正始皇風奚獨乎凡今之代盖不然矣其或斌斌彪炳郁郁相宣膺期運以挺生奄寰瀛而首出者其惟僕射孫公乎公諱逖河南鞏人其先自樂安武水寓於涉而從焉父嘉之以詞學登科官至宋州司馬公風裁徵明天才傑出學窮百氏不好非聖之書文統三變特深稽古之道故逸氣上濟而髙情四逹羗索隱乎渾元之始表獨立於常均之外不其盛歟年數嵗即好屬文十五時相國齊公崔日用試土火鑪賦公雅思遒麗援翰立成齊公駭之約以忘年之契邇後遂有大名故其試言也年未弱冠而三擅甲科吏部侍郎王丘試竹簾賦降階約拜以殊禮待之相國燕公張說覽其䇿而心醉其序事也則伯樂川記及諸碑誌皆卓立千古傳於域中其為詩也必有逸韻佳對冠絶當時布在人口其詞言也則宰相張九齡欲掎摭疵瑕沈吟久之不能易一字公之除庶子也苑咸草詔曰西掖掌綸朝推無對議者以為知言凡斯夥多庸可悉數故燕國深賞公才俾與張九齡許景先韋述同遊門庭命子均垍施伯仲之禮江夏李邕自陳州入計繕寫某集賫以詣公託知已之分其為先逹所重也如此公又雅有清鑒典考功時精覈進士雖權要不能逼所奬擢者二十七人數年間宏詞判等入甲者一十六人授校書者九人其餘咸著名當世已而多至顯官明年典舉亦如之故言第者必稱孫公而已夫然信可謂人文之宗師國風之哲匠者矣公凡所著詩歌賦序䇿問賛碑志表䟽制誥不可勝紀遭二朝之亂多有散落子宿絳成等夙奉過庭之訓咸以文章知名同時臺省乃編次公文集為二十巻列之於左庶乎好事者傳寫諷誦以垂乎無窮亦何必藏名山而納石室也金紫光祿大夫檢校刑部尚書上柱國魯郡開國公顔眞卿昔觀光乎天府實荷公之奬擢見命為序豈究端倪時則永泰元年仲秋之月至若世系閥閱盖存諸别傳此不復云唐尚書比部郎中博陵崔元翰文集序權德輿易賁之彖曰觀乎人文以化成天下故闕里之四教門人之四科未有遺文者荀況孟軻修道著書本於仁義經術之枝𣲖也迨夫騷人怨思之作游士從横之論刺譏捭闔文憲陵夷至漢廷賈誼劉向班固揚雄司馬遷相如之倫鬱然復興有古風烈然則文之用也横三才之中經紀事物章明統類不可已也殷之説命周之命君陳君牙楚射父之訓辭鄭東里之潤色天子諸侯名命之文也張老之輪奐史克之駉駜吉甫之清風伯喈之無愧賢士大夫頌述之文也至若夫子紀延陵墓叔向寓子産書董仲舒射䇿言天人相與之際阮元瑜書記翩翩之任觸類滋多非文不彰後之人力不足者詞或侈靡理或底伏文之難能也如是博陵崔君元翰東漢濟北相長岑之後也曽祖某濟州刺史祖某鳳閣舍人考某以經明厯衛州汲縣尉虢州湖城縣主簿親没遂不復仕探古先微言著尚書洪範周易忘象及三國春秋幽觀之書門人諸儒易其名曰貞文孝父君紹文宗雕龍之慶究貞文法義之學潔㢘清方敦直莊明博見强志不取合於俗黙而好深湛之思舒而為彬蔚之文師遵六籍磅礴二漢不為物選不為波流初間闗隱約於河朔之間年殆知天命甫與計偕至京師洎博學宏詞直言極諌凡三登甲科名動天下初自典校袐書連辟汧公北平王司徒府管奏記之職歴太常寺恊律郎大理評事錫以命服登朝為太常博士禮部員外郎貞元七年春轉職方員外郎知制誥八年冬罷為比部郎中十一年夏寢疾不起其壽四百甲子其文若千篇閎茂博厚菁華縝密足以希前古而聳後學紀循吏而述政事則房栢鄉碣孫信州頌敘守臣勲烈則黎陽城碑劉幽州神道碑表宗工賢人兆域則李太師梁郎中誌文撰門中德善則貞文孝父誌碣二銘攄志氣以申感慨則與李都統及二從事書詮桑門心法則大覺禪師碑推人情以陳聖德則請復尊號表陳理道則有制䇿藻潤王度則有詔誥嚮所敘詩書説命駉頌而下君皆索其粹精故能度越倫類有盛名於代其他詩賦賛論銘誄序記等合為三十巻如黄鐘玉磬琮璧琬琰奏於懸間列在西序其章章者雖漢廷諸公不能加也無溢言曼辭以為夸大無讇笑柔色以資孟晉勁直而不能屈已清剛而不能容物介特寡徒晩逹中廢斯亦命之所賦也德輿昔嵗獲與君遊於江湖間又接武侍從登文石之陛常所論著備探簡編君之孤某旣除䘮泣捧遺文見咨序引故如其篇第直書以冠之云唐左補闕安定皇甫冉文集序獨孤及五言詩之源生於國風廣於離騷著於李蘇盛於曹劉其所自逺矣當漢魏間雖已朴散為器作者猶質有餘而文不足以今揆昔則有朱弦踈越大羮遺味之歎歴千餘年至沈詹事宋員外始財成六吕彰施五色使言之而中倫歌之而成聲縁情綺靡之功至是乃備雖去雅寖逺其麗有過於古者亦猶路鼗出於土鼔篆籕生於鳥跡也沈宋旣没而崔司勲顥王右丞維復崛起於開元天寶之間得其門而入者當代不過數人補闕其人也補闕諱冉字茂政𤣥晏先生之後樂平縣令价之孫潭州長史顗之子十嵗能文十五而老成右丞相曲江張公深所歎異伯父袐書少監彬尤器之自是令問休暢舉進士第一歴無錫尉左金吾兵曹今相國太原公之推載河南也辟為書記大厯二載遷左拾遺轉左補闕奉使江表因省家至丹陽朝廷三署郎位以待君之復不幸短命年方五十四而殁嗚呼惜哉君忠恕㢘恪居官可紀孝友㳟讓自内形外言必依仁交不苟合得䘮喜愠罕見於容故覩君述作知君所尚以景命不永斯文未臻其極也盖存於遺札者凡三百有五十篇其詩大略以古之比興就今之聲律涵詠風騷憲章顔謝至若麗曲感動逸思奔發則天機獨得非師資所奬每舞雩詠歸或金谷文㑹曲水修禊南浦愴别新聲秀句輒加於常時一等才鍾於情故也君母弟曽字孝常與君同禀學詩之訓君有誨誘之助焉旣而麗藻競爽盛名相亞同乎聲者方之景陽孟陽孝常旣除䘮懼遺製之墜於地也以某與茂政前後為諌官故銜痛編集以論譔見託遂著其始終以冠於篇唐左補闕李翰前集序梁肅文之作上所以發揚道德正性命之紀次所以裁成典禮厚人倫之義又所以昭顯義類立天下之中三代之後其流派别炎漢制度以覇王道雜之故其文亦二賈生馬遷劉向班固其文博厚出於王風者也枚叔相如揚雄張衡其文雄富出於霸塗者也其後作者理勝則文薄文勝則理消理消則言愈繁斯亂矣文薄則意愈巧斯弱矣故文本於道失道則博之以氣氣不足則飾之以辭盖道能兼氣氣能兼辭辭不當則文斯敗矣唐有天下幾二百載而文章三變初則廣漢陳子昂以風雅革浮侈次則燕國張公説以宏茂廣波瀾天寶以還則李員外蕭功曹賈常侍獨孤常州比肩而作故其道益熾若乃辭源辯博馳騖古今之際髙步天地之間則有左補闕李君君名翰趙郡賛皇人也天姿朗秀率性聰逹博涉經籍其文尤工故其作敘治亂則明白坦蕩衍餘條暢端如貫珠之可觀也陳道義則游泳性情探微豁冥渙乎春冰之將泮也廣勸戒則得失相維吉凶相追焯乎元龜之在前也頌功美則温直顯融協於大中穆如清風之中人也議者又謂君之才若崇山出雲神禹導河觸石而彌六合隨山而注巨壑盖無物足以道其氣而閱其行者也世所謂文章之雄捨君其誰歟弱冠進士登科解褐衛縣尉其後以書記再參淮南節度軍謀累遷大理司直天子聞其才召拜左補闕俄加翰林學士君之處世用拾闗乎才進退牽乎時始居筮仕值蔽善者當路故屈於下位天寶末房公琯韋少師陟薦公充史官諫司之任當國者不聽乃已中嵗多難時方用武故委於外藩及夫入宣室而揮宸翰也方用人文以飾王度則因疾罷免嘻昔君子賢人運與事并得信其志者寡矣其餘屬雅道䘮缺黄鐘毁棄若孟子轗軻士安多病亦何可勝論惟斯文足以振當世餘烈足以遺後嗣此之謂不朽君旣退歸居於河南之陽翟家愈貧而禄不及志愈邁而文益壯暇日以嘗所述作三十巻目為前集命予序之君與予實有伯喈仲宣之義故書於篇唐右補闕梁肅文集序崔㳟敘曰皇甫士安志好閒散不榮軒冕導情適志作髙士傳賛記遺韻風猷尚在而公早從釋氏義理生知結意為文志在於此言談語笑常所切􅀈心在一乗故叙釋氏最為精博與皇甫士安之所素尚亦相放焉則今天台大師元浩之門弟子也摳衣捧席與余同焉故能知其景行收其製作編成二十軸以為儒林之綱紀云若夫明是非探得失乃作西伯稱王議宗道德美功成作磻溪銘四皓賛釣臺碑圯橋碑絜當世激清風作先賢賛獨孤常州集序觀講論語序美藝文善章句作李補闕集序隱士李君遺文序備教化彰諷詠作中書侍郎贈太子太傅李公集序開國公包君集序總名實樹遺風作常州獨孤公遺愛額太常卿常山郡開國公崔公神道碑惡戎醜思康濟作兵箴敘宗系思祖德作述初賦病流濫悦故居作過舊園賦明大道宗有德作受命寶賦其餘言志導情記㑹敘别總存諸集録歸根復命一以貫之作心應銘住一乗明法體作三如來畫賛知法要識權實作天台山禪林寺碑逹教源周境智作荆溪大師碑大教之所由佛闕之闕葢盡於此矣若以神道設教化源旁濟作泗州開元寺僧伽和尚塔銘言僧事齊律儀作過海和尚碑銘幽公碑銘釋氏制作無以抗敵大法將滅人鮮知之唱和之者􅂉寡矣故公之文章粹美深逺無人能到此事可以俟於知音不可與薄俗者同世而論也余之仰止未盡其善葢釋氏之鼓吹歟諸佛之影響歟余所不者道其窮歟常懐不言之歎杳㝠之恨爾後之人識達希夷意通響象知我之言之不怍耳若以叙人倫正褒貶則人皆知之非獨情至而稱其製作也大約公之習尚敦古風閱傳記硜硜然以此導引於人以為其常米鹽細碎未嘗挂口故鮮通人事亦賢者之一病也夫子所謂君子多乎哉不多也故無適時之用任使之勤余故以皇甫士安比之若管夷吾諸葛亮留心濟世自謂棟梁則非公之所尚也所謂善古而不善今知賢而不知俗故論賛碑頌能言賢者之事不能言小人之稱享年若干以某年月日終于長安某里朝廷尚徳故以公為太子侍讀國尚實録故以公為史館修撰發誥令敷王猷故以公為翰林學士闕齊署則公之處朝廷不為不達矣年過四十士林歸崇比夫顔闕黄叔度不為不夀矣其碌碌者老於郎署白首人世又何補哉於達者不可以夭夀之歎而病於促數焉公遺孤殁後而生今已成立則友朋之知臧孫之後存於此也唐司封員外郎李華中集序獨孤及志非言不形言非文不彰是三者相為用亦猶涉川者假舟檝而後濟自典謨缺雅頌寝王道陵夷文教下哀故作者往往先文字後比興其風流蕩而不返乃至有飾其詞而遺其意者則潤色愈工其實愈䘮及其大壊也儷偶章句使枝對葉比以八病四聲為梏拳拳守之如奉法令聞臯陶史克之作則呷然笑之天下雷同風馳雲趨文不足言言不足志亦猶木蘭為舟翠羽為檝翫之于陸而無渉川之用痛乎流俗之惑人也久矣帝唐以文徳敷乂于下民被王風俗稍丕變至天后時陳子昂以雅易鄭學者􅐛而嚮方天寶中公與蘭陵蕭茂挺長樂賈幼幾勃焉復起用三代文章律度當世公之作本乎王道大抵以五經為泉源抒情性以託諷然後有歌詠美教化獻箴諫然後有賦頌懸權衡以辯天下公是非然後有論議至若記叙編録銘鼎刻石之作必採其行事以正褒貶非夫子之旨不書故風雅之指歸刑政之根本忠孝之大倫皆見於詞然後中古之風復形於今于時文士馳騖飈扇波委二十年間學者稍厭抑揚黄華而窺咸韶之音者什五六識者謂之文章中興公實啟之公名華字遐叔趙郡人安邑令府君第三子質直而和純固而明曠逺而有節中行而能斷孝敬忠亷根於天機執親之䘮哀逹神明其任職釐務外若坦蕩而内持正性謙而不犯見義乃勇舉善惟懼不及務去惡如復讎與朋友交然諾著於天下其偉詞麗藻則和氣之餘也學博而識有餘才多而體愈迅每述作則筆端風生聼者耳駭開元二十三年舉進士天寶二年舉博學宏詞皆為科首由南和尉擢秘書省校書郎八年厯伊闕尉當斯時唐興百三十餘年天下一家朝廷尚文夫羿工乎中微拙於使人無已譽公才與時弁故不近名而名彰時輩歸望如鱗羽之於虬鸞也十一年拜監察御史㑹權臣竊政柄貪猾當路公入司方書出按二千石持斧所嚮列郡為肅為姦黨所嫉不容於御史府除右補闕禄山之難方命圯族者蔽天聰明勇者不得奮明者不得謀公危行正詞獻納以誠累陳誅兇渠完封疆之策閽犬迎吠故書留不下時繼太夫人在鄴初潼關敗書聞或勸公走蜀詣行在所公曰奈方寸何間行問安否然後輦毋安輿而逃謀未果為盜所獲二京既復坐謫杭州司功太夫人棄敬養公自傷悼以事君故踐危亂而不能安親既受汙非其疾而貽親之憂及随牒願終養而遭天不弔由是銜㒺極之痛者三故雖除䘮抱終身之戚焉謂志已厭息陳力之願焉因屏居江淮間省躬遺名誓心自絶無何詔授左補闕又加尚書司封員外郎璽書連徵公卿已下傾首延佇至止之日將以司言處公公曰焉有􅈥節辱志者可以荷君之寵乎遂移疾請告故相國梁公峴之領選江南也表為從事加檢校吏部郎明年遇風痺徙家于山陽疾痼貧甚課子弟力農圃贍衣服雅好修無生法以冥寂思慮視爵禄形骸與遺土同惟吳楚之士君子譔家傳修墓版及郡邑頌賢守宰功德者靡不齎貨幣越江湖求文於公得請者以為子孫榮公遇勝日時復綴録以應其求過是而往不復著書素所著者多散落人間自志學至校書郎以前八卷并舜山公主誌文竇將軍神道碑崔河南生祠碑禮部李侍郎碑安定三孝論哀舊遊詩韓㓜深避亂詩序祭王端員外沈起居興宗裴員外騰文别元亘詩并楊騎曹集序王常山碑並因亂失之名存而篇亡自監察御史以後迄至于今所著述者公長男羔字宗叙編而集之斷自監察御史已前十巻號為前集其後二十卷頌賦詩歌碑表序論誌記賛祭文且一百四十四篇為中集其中陳王業則無疆頌議世道則原卜論質文論主文而譎諫則言毉含元殿賦敦禮教則哀節婦賦二孝讃與外孫女二孩書表賢逹盛德則元魯山碣房太尉德銘崔賓客集序德先生誄權著作墓表李夫人傳靈夫人頌一生死之間抒其交情則祭蕭功曹劉評事張博士文吟詠情性達於事變則詠古詩辨卿大夫族姓則盧監神道碑思舊則三賢論自叙則别相里造范倫序詮佛教心要而㑹其異同則南泉真禪師左溪朗禪師碑其餘雖比興萬變而未始不根於道德故覽公之文知公之質不俟覿容貌聼詞氣而後覩其行若使束帶立於史臣之位且備獻替足以潤色王度正一代之訓典天而病之國不幸也然遐叔身甚病而心甚壯文益贍而才不竭則前路逸氣詎可度矣他日繼於此而作者當為後集及常遊公之藩也久故録其述作之所以然著于篇唐尚書禮部員外郎栁宗元文集序劉禹錫八音與政通而文章與時髙下三代之文至戰國而病涉秦漢復起漢之文至列國而病唐興復起夫政厖而土裂三光五岳之氣分扶問切大音不完故必混一而後大振初貞元中上方嚮文章昭回之光下飾萬物天下文士爭執所長與時而奮粲焉如繁星麗天而芒寒色正人望而敬者五行而已河東栁子厚斯人望而敬者歟子厚始以童子有奇名於貞元初至九年為名進士十有九年為材御史二十有一年以文章稱首入尚書為禮部員外郎是嵗以疎雋少檢獲訕出牧邵州又謫佐永州居十年詔書徴不用遂為栁州刺史五嵗不得召病且革留書抵其友中山劉禹錫曰我不幸卒以謫死以遺草累故人禹錫執書以泣因編次為四十五通行於世子厚之䘮昌黎韓退之誌其墓且以書來弔曰哀哉若人之不淑吾常評其文雄深雅健似司馬子長崔蔡不足多也安定皇甫湜於文章少所推讓亦以退之言為然凡子厚名氏與仕與年暨行已之大方有退之之誌若祭文在今附于第一通之末云唐右拾遺陳子昂文集序廬藏用昔孔宣父以天縱之才自衛返魯乃刪詩定禮述易道而修春秋數千百年文章桀然可觀也孔子殁二百嵗而騷人作於是婉麗浮侈之法行焉漢興二百年賈誼馬遷為之傑憲章禮樂有老成之風長卿子雲之儔瑰詭萬變亦奇特之士也惜其王公大人之言溺於流雜而不顯其後班張崔蔡曹劉潘陸随波而作雖大雅不足其遺風餘烈尚有典刑宋齊之末蓋顦顇矣逶迤陵頽流靡忘返至于徐庾天之將䘮斯文也後進之士若上官儀者繼踵而生於是風雅之道掃地盡矣易曰物不可以終否故受之以泰道䘮五百嵗而得陳君君諱子昂字伯玉蜀人也崛起江漢虎視函夏卓立千古横制頽波天下翕然質文一變非夫岷峨之精巫廬之靈則何以生此故其諫諍之辭則為政之先也昭夷之碣則議論之當也國殤之文則大雅之怨也徐君之議則刑禮之中也至於感激頓挫微顯闡幽庻幾見變化之狀以接乎天人之際者則感遇之篇存焉觀其逸足駸駸方將摶扶摇而凌太清獵遺風而薄嵩岱吾見其進未見其止惜乎湮厄當世道不遇時委骨巴山年志俱夭故其文未極也嗚呼聰明精粹而淪剥貪叨桀驁以顯榮天乎天乎吾始未知天焉昔嘗與余有忘形之契四海之内一人而已良友殁矣天其䘮余今採其遺文可存者編而次之凢十巻恨不逢作者不得列於詩人之什悲夫故粗論文變而為之序至於王霸之才卓犖之行則存之别傳以繼於終篇云唐衡州刺史吕溫文集序劉禹錫五行秀氣得之居多者為雋人其色㶑灩於顔間其聲發而為文章天之所與有物來相彼由學而致者如工人染夏以視羽畎有生死之殊矣初貞元中天子之文章煥乎垂光慶霄在上萬物五色天下人文為氣所召其生乃蕃靈芝萐莆與百果齊折然煌煌翹翹出乎其類終為偉人者幾希矣東平吕和叔實生是時而絶人甚逺始以文學振三川三川守以為貢士之冠名聲四馳速如羽翼長安中諸生咸避其鋒兩科連中鋩刃愈出德宗聞其名自集賢殿校書郎擢為左拾遺明年犬戎請和上問能使絶域者君以奇表有專對材膺選轉殿内史錫之銀章還拜尚書户部員外郎轉司封遷刑部郎中兼侍御史副治書之職㑹中執法左遷縁坐道州刺史以善政聞改衡州年四十而沒後十年其子安衡泣奉遺草來謁咨予叙之成一家言凡二百篇和叔名温别字化光祖考皆以文學至大官蚤聞詩禮於先侍郎又師吳郡李質通春秋從安定梁肅學文章勇於藝能咸有所祖年益壯志益大遂撥去文字與雋賢交重氣槩覈名實歆然以致君及物為大欲每與其徒講疑考要皇王富強之際臣子忠孝之道出入上下百千年間詆訶角逐疊發連中得一善輒盱衡擊節揚袂頓足信容得色舞于眉端以為案是言循是理合乎心而氣將之昭然若掲日月而行孰能閼其勢而爭天光者乎嗚呼言可信而時異道甚長而命窄精氣為物其有所歸乎古之為書者先立言而後體物賈生之書首過秦而荀卿亦後其賦和叔年少遇君而卒以謫似賈生能明王道似荀卿故予先後視二書斷自人文化成論至諸葛武侯廟記為上篇他咸有為而為之始學左氏書故其文微為富豔夫羿之關弓惟巴蛇九日乃能盡其彀而廻注鷃爵亦要中於尋常之間非羿之手弓有能有不能所遇然而然也後之達解者推而廣之知予之素交不相索於文字之内而已唐文粹巻九十二欽定四庫全書唐文粹卷九十三宋姚鉉編序丙總一十七首集序
