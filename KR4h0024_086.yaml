body:
  text: 吳興姚鉉纂書八㧾一十一首薦賢四上宰相薦皇甫湜書韋處厚薦所知於徐州張僕射書李翶薦齊孝若書令狐楚薦樊衡書崔顥師資七與李㪍書田弘正與叚校理書劉巖夫荅人求文章柳宗元上韓吏部書林簡言與常州獨孤使君書崔元翰荅韋中立書柳宗元復杜温夫書上宰相薦皇甫湜書韋處厚相公閣下伏以燕國張公說登翊聖明底寧泰階推心旁求虚已下納房太尉由布衣振起於門下張曲江自蓬戸發揮於嶺底而繼播休名襲佩相印克懋勲德不忝揄揚後之朝望因以興勸不多二公而推燕國者以雜居羣倫齊齒下輩崇搆棟榦則杪忽方輕琢飾珪璋則蒙昧未耀器用旣光持之於耳目之前垂後而无配名節兼大用之於身丗之後希古而絶倫夫豈推䇿考歩之爲乎藏往知來之兆乎蓋合以尺牘片言申以考跡定貌靈異五行之鍾粹也文章心靈之造形也著誠居業本隱以之顯觀心擇術自麤以之微以是而求則坐決萬方之内立斷百代之下其術旣定其道甚明竊見前進士皇甫湜年三十二學窮古訓詞秀人文脫落章句簡斥枝葉游百氏而旁覽折之以歸正囊六義以疾馳諷之以合雅茍堅其持操不恐於囂囂之訕脩其踐立不誘於藉藉之譽孟軻黜楊墨之心楊雄尊孔顔之志形乎旣立果於將然至於用心合論操毫注簡排百氏之雜說判九流之紛蕩摘其舛駮趨于夷途徴㑹理軸遣訓詞波無不蹈正超常曲暢精旨置之石渠必有劉向之刋正羣言列之東觀必有孟堅之勒成漢史施之奏議必有賈誼之兼對諸生天旣委明干斯人苟回險其道未得按輪而驅則必混翼于天池飱精於沆瀣秉矰繳者從而道之固无及矣儻得遊門下信其才能相公得狥公之名有摭竒之實後進幸甚舎人驂御賤役也猶能達掃門之事禰衡雕蟲薄技也猶能遇非常之薦今某辱奉恩顧實百於舎人之儔皇甫湜藴積才志固百於正平之量處厚百舎人之勢不能達百正平之心方切恃私於門舘明者觀之其恥非一也懼愚瞽不盡謹繕其書論賦合八首用卜可否輕瀆嚴威下情不任戰懼之至薦所知於徐州張僕射書李翺翶再拜齊桓公不疑於其臣管夷吾信而霸天下攘戎翟匡周室亡國存荆楚服諸侯莫不至焉豎刁易牙信而齊國亂身死不葬五公子爭立兄弟相及者數丗桓公之信於其臣一道也所信者賢則格于天地功及後丗不得其人則不得其死其知人不易也豈惟霸者爲然雖聖人亦不能免焉帝堯之時賢不肖人皆立于朝堯能知舜於是乎驩兠放共工流殛鮌竄三苗舉禹稷臯陶二十有二人加諸上位故堯崩三載四海遏密八音後丗之人皆謂之帝堯焉向使堯不能知舜而遂尊驩兠共工之黨於朝禹稷臯陶之下二十有二人不能用則堯將不得爲齊桓公爾豈復得曰大哉堯之爲君乎惟天爲大惟堯則之蕩蕩乎民無能名焉者哉春秋曰夏滅項蓋齊滅之曷不言齊滅之爲桓諱也春秋爲賢者諱此滅人之國何賢爾君子之惡惡也嫉始善善也樂終桓公甞有繼絶存亡之功故君子爲之諱繼絶存亡賢者之事也管夷吾用所以能繼絶丗存亡國焉耳豎刁易牙用則不能也向使桓公始不用管夷吾末有豎刁易牙爭㩲不葬而亂齊國則幽厲之諸侯也始用賢而終身諱其惡君子樂用賢也如此始不用賢以及其終而幸後丗之掩其過也則微矣然則居上位流德澤於百姓者何所勞乎勞於擇賢得其人加諸上使天下皆化之焉而已矣今天子之大臣有土地千里孰有如執事好賢不倦者乎蓋得其人人亦多矣其所可求而不可取者則有人焉隴西李觀竒士也伏聞執事知其賢將用之未及而觀病死昌黎韓愈得古文之遺風明理亂根本之所由伏聞執事又知其賢將用之未及而愈爲宣武軍節度使之所留觀愈皆豪傑之士也如此人不時出觀自古天下亦有數百年無如其人者焉執事皆得而知之皆不得而用之翶實爲執事惜焉豈唯翺一人而巳後之讀前載者亦必多爲執事惜之矣兹有平昌孟郊貞士也伏聞執事舊知之郊爲五言詩自前漢李都尉蘇屬國及建安諸子南朝二謝郊能兼其體而有之李觀薦郊於梁肅𥙷闕書曰郊之五言詩其有高處在古無上其有平處下顧兩謝韓愈送郊詩曰作詩三百首杳黙咸池音彼二子皆知言者也豈欺天下之人哉郊窮餓不得安養其親周天下無所遇作詩曰食薺膓亦苦强歌聲無歡出門即有礙誰謂天地寛其窮也甚矣凡賢人竒士自以所負不苟合于世是以雖見之難得而知也見而不能知其賢如勿見而巳矣知其賢而不能用如勿知其賢而巳矣用而不能盡其才如勿用而巳矣盡其才而容讒人之所閒者如勿盡其才而已矣故見賢而能知知而能用用而能盡其才而不容讒人之所閒者天下一人而巳矣兹有二人焉偕來其一人賢士也其一人常常人也待之禮貌不加崇焉則賢者行而常常之人日來矣況其待常常之人禮貌加厚則善人何求而來哉孔子曰吾未見好德如好色者聖人不好色而好德者也雖好色而不如好德者次也德與色均好之又其次也雖好德而不如好色者下也最甚不好德而好色者窮矣有人告曰某所有女國色也天下之人必將極其力而求之無所愛矣有人告曰某所有人國士也天下之人則不能一往而先焉是豈非不好德而好色者乎賢者則冝有以别於天下之人矣孔子述易定禮樂刪詩敘書作春秋聖人也奮乎百丗之上其所化之者非其道則夷狄人也而孔子之廟存焉雖賢者亦不能日往拜之以其待於人寡矣故無益於人雖孔子之廟尚不能朝夕而事焉況天下之人乎有待於人而不能禮善人良士則不如無待也嗚呼人之降年不可與期郊將爲他人之所得而大有立功於丗與其短命而死皆不可知也二者卒有一於郊之身他日爲執事惜之不可旣矣執事終不得而用之矣雖恨之亦無奈何矣翺窮賤人也直辭無讓非所冝至于此者也爲道之存焉耳不直則不足以伸道也非好多言者也翺再拜薦齊孝若書今狐楚某官至辱垂下問令公舉一人可管記之任者愚以爲軍中之書記節度之喉舌指事立言而上達思中天心發號出令以下行期恱人意諒非容易而可專據竊見前進士高陽齊孝若字考叔年二十四學必專授文皆雅正詞賦甚精章表殊徤踈眉目美風姿外若坦蕩中甚畏愼執事儻引在幕下列於賔佐使其馳一檄飛一書必能應馬上之急求言腹中之所欲夫掇芳刈楚不棄幽逺況孝若相門子弟射䇿甲科家居君侯之化下且數年矣不勞重幣而獲至寶甚善甚善雄都大府多士如林最所知者實斯人也請爲閣下記其若此惟用與捨高明裁之薦樊衡書崔顥夫相州者先王之舊都西山雄崇足是秀異竊見縣人樊衡年三十神爽清晤才能絶倫雖白面書生有雄膽大略深識可以軌時俗長䇿可以安塞裔藏用守道實有歲年今國家封山勒崇希代罕遇含育之類莫不踊躍況詔徴隱逸州貢茂異衡之際㑹千載一時君侯復躬自執玉陪鑾日觀此州名藩必有所舉當是舉者非衡而誰伏願不棄賢才賜以甄獎得奔大禮升聞天朝衡因此時䇿名樹績報國榮家令當代之士知出君侯之門矣顥不勝區區敢聞左右俯伏階墀用増戰汗與李㪍書田弘正弘正珍重執事之心積二十餘年竟不獲自道於執事者徒懇懇終日常恐空老而無所師誠固内自不安矣自前年朝謁得展拜執事於道路之間時苦牽事復略不得伸前時所畜之意彌有不足於心矣執事以古今仁義發爲懲惡勸善之心豈惟當丗士君子所賴抑亦姬公孔子之心待執事而明白之矣毎覽前後史䇿紀其所爲古之賢者有出無愧矣弘正近奉制書去魏就鎭自念寵榮巳極能無憂惕之甚哉且自二寇亂常巳來六十餘載矣河北之地敎化之所不行兾趙魏常山又河北之尤者日月積習遂爲匪人誠可悲矣寢食常念之以爲負經濟不覉之才者執事可以將朝廷之化移獷俗之心矣弘正庸虚輒不自意思君子降重爲邑人啓茅塞之心仰執事坐師氏之筵使鄙夫修擁篲之禮則向之羞姑可掩矣不審執事當俯而就之乎復恥而不就乎今輒虚上倅之位俟君子光臨古人有功成不居退得所詣者鄙人咏之乆矣儻終不拒至誠之情幸甚與叚校理書劉巖夫人藏其心不可測度也揺舌於口誰不言仁誼哉清濁相渾眞僞難辨今雖有提其肺腸以呈衆某必笑而不諒此亦不足怪也蓋僞者繫而眞者寡況慿區區文字而能取信於人邪所以某藴蓄斯乆不敢輕奮抑爲此也今幸因執事稍垂盼睞以不倫衆輩故得肆陳其愚惟賜詳之某七歲受敎誨始學箕裘迄今十六不見成熟性本慵惰强之惟艱不能勠力盡瘁服勤先聖然常謂男子生而懸弧示有事於四方固不得與兒女曹並列依違以没丗毎欲奮廓埃壒破開濤浪聳翼雲漢垂名竹帛謂舒腕可取耳殊不知丗道隘局九重阻深不可也又欲藏器弛用洗滌他腸昧旦調旨甘入夜吟編簡索聖賢意探情性源白雲霏空虚舟汎波塵機不張語黙自任湜湜然得全其愚爲唐一閑人而家丗清風祗承嚴訓不可也又欲掉長舌於公卿閒蘧蒢戚施以媚於人拱立下流阿旨從衆善者曰善不善者亦曰善巧言如流俾躬處休而愚僻巳慣矯之惟病不可也三者之惑心不可屈志不可諧歧路難期歲月易老踐履之道倀然自迷執事濯纓清流敏古多識試與指其要路將鞭蹇以趨之某再拜荅人求文章書柳宗元古今號文章爲難足下知其所以難乎非謂比興之不足恢拓之不逺鑚礪之不工頗纇之不除也得之爲難知之愈難爾儻或得其高朗探其深賾雖有蕪累則爲日月之蝕也大珪之瑕也曷足傷其明黜其寶哉且自孔子巳來兹道大闢家修人勵刓精竭慮者幾千年矣其間耗費簡札役用心神者其可數乎登文章之籙波及後代越不過數十人耳其餘誰不欲爭裂綺繡互攀日月高居於萬物之中雄視於百代之下率皆縱誔而不克躑躅而不進力蹙勢窮吞志而没故曰得之爲難嗟乎道之顯晦幸不幸繫焉談之辯訥升降繫焉鑒之頗平好惡繫焉交之廣狹屈伸繫焉則彼卓然自得以奮其閒者合乎否乎是未可知也而又榮古陋今者比肩疊迹大抵生而不遇死則垂聲者衆焉楊雄没而法言大興馬遷生而史記未振彼之二子且猶若是況乎未甚聞著者哉有文不傳於後祀聲遂絶於天下者矣故曰知之愈難而爲文之士亦多漁獵前作戕賊文史抉其意抽其華置齒牙閒遇事􅑣起金聲玉耀誑聾瞽之人徼一時之聲雖終淪棄其奪朱亂雅爲害巳甚是其所以難也閒聞足下欲觀僕文章退發囊笥編其蕪穢心悸氣動交於胷中未知孰勝故乆滯而不往也今往僕所著賦頌碑碣文記議論書序之文凡四十八首合爲一通想令治書蒼頭吟諷之也擊轅拊缶必有所擇顧鑒視何如耳還以一字示襃貶焉上韓吏部書林簡言人有儒其業與孟軻同代而生不遂師於軻不得聞乎道閣下豈不謂之惜乎又有與楊雄同代而生不遂師於雄不得聞乎道閣下豈不謂之惜哉有習於琴者問其所習必曰吾師於某某所傳師曠之道也習於弧者問其所習必曰吾師於某某所傳濯孺子之道也脫二人未至於古然亦無敢是非者以所習有據故也儻曰吾自能非授受於人也必知其音俚音也其能庸能也嗚呼聖人之道與琴弧之道相逺矣而琴弧尚能自習之如此況聖人之道乎去夫子千有餘載孟軻楊雄死今得聖人之旨能傳說聖人之道閣下耳今人睎閣下之門孟軻楊雄之門也小子幸儒其業與閣下同代而生閣下無限其門俾小子不得聞其道爲異代惜焉與常州獨孤使君書崔元翰日月崔元翰再拜上書郎中使君閣下天之文以日月星辰地之文以百榖草木生於天地而肖天地聖賢又得其靈和粹美故皆含章垂文用能裁成庶物化成天下而治平之主必以文德致時雍其承輔之臣亦以文事助王政而唐堯虞舜禹湯文武之代則憲章法度禮樂存焉臯陶伯益伊傳周召之倫則誥命謨訓歌頌傳焉其後衛武召穆吉甫仍叙咸作之詩並列于雅孔聖無大位由修春秋述詩易反諸正而寄之治而素臣丘明游夏之徒又述而賛之推是而言爲天子大臣明王道斷國論不通乎文學者則陋矣士君子立於丗升於朝而不繇乎文行者則僻矣然患後丗之文放蕩於浮虚舛馳於怪迂其道遂隱謂冝得明哲之師長表正其根源然後敎化淳矣閣下紹三代之文章播六學之典訓微言高論正詞雅旨温純深潤溥博弘麗道德仁義粲然昭昭可得而本學者風馳雲委日就月將庶幾於正若元翰者徒以先人之緒業不敢有二事不遷於他物而其顓蒙樸騃難以爲工抗精勞力未有可採獨喜閣下雖處貴位而有仲尼誨人不倦之美亦欲以素所論撰貢之閣下然而未有暇也不意流於明友露其嗤鄙而乃盛見稱歎俯加招納顧淮狂簡何以克堪今謹别貢五篇庶垂觀察儻復襃其一字有踰拱璧之利假以一言若垂華衮之榮不宣元翰載拜荅韋中立書柳宗元宗元白辱書云欲相師僕道不篤業甚淺近環顧其中未見可師者雖甞好言論爲文章甚不自是也不意吾子自京都來蠻夷閒乃幸見取僕自卜固無取假令有取亦不敢爲人師爲衆人師尚不敢況敢爲吾子師乎孟子稱人之患在好爲人師由魏晉巳下人益不事師今之丗不聞有師輒譁笑之以爲狂人獨韓愈奮不顧流俗犯笑侮收召後學作師說因抗顔而爲師丗果羣怪聚罵指目牽引而增爲言詞愈以是得狂名居長安炊不暇熟又挈挈而東西如是數矣屈子賦曰邑犬羣吠吠所怪也僕往聞庸蜀之南恒雨少日日出則犬吠予以爲過言前六七年僕來南二年冬幸大雪踰嶺被南越中數州之犬皆蒼黃吠噬狂走者累日至無雪乃巳然後始信前所聞者今韓愈旣自以爲蜀之日吾子又欲使吾爲越之雪不亦病乎非獨見病亦以病吾子然雪與日豈有過哉顧吠者犬耳度今天下不吠者幾人而誰敢衒怪於羣目以召閙取怒乎僕自謫過以來益少志慮居南中九年増脚氣病漸不喜閙豈可使呶呶者早夜沸吾耳搔吾心則固僵仆煩憒愈不可過矣平居望外遭齒舌不少不獨欠爲人之師耳抑又聞之古者重冠禮將以貴成人之道是聖人所尤用心者也數百年來人不復行近有孫昌胤者獨發憤行之旣成禮明日造朝到外廷薦笏言於卿士某子冠畢應之者咸憮然京兆尹鄭叔則怫然曵笏卻立曰何預我邪廷中皆大笑天下不以非鄭尹而快孫子何哉獨爲所不爲也今之命師者大類此吾子行厚而辭深凡所作皆恢恢然有古人形貌雖僕敢爲師亦何所增加也假以㒒年先吾子聞道著書之日不後誠欲往來言所聞則僕固願悉陳中所得者吾子苟自擇之取某事去某事則可矣若定是非以敎吾子僕材不足而又畏前所陳者其爲不敢也決矣吾子前所欲見吾文悉以陳之非以耀明於子聊欲觀子氣色誠好惡如何也今書來言者皆太過吾子誠非佞譽誣䛕之徒直見愛甚故然耳始吾㓜且少爲文章以辭爲工及長乃知文者以明道是固不爲炳炳琅琅務采色衒聲音而爲能也凡吾所陳皆自謂近道而不知道之果近乎逺乎吾子好道而可吾文或者其於道不逺矣故吾毎爲文章未甞敢以輕心掉之懼其剽而不留也未甞敢以怠心易之懼其弛而不嚴也未甞敢以昬氣出之懼其昧没而雜也未甞敢以矜氣作之懼其偃蹇而驕也抑之欲其奥揚之欲其明䟽之欲其通廉之欲其節激而發之欲其清固而存之欲其重此吾所以羽翼夫道也本之書以求其質本之詩以求其恒本之禮以求其冝本之春秋以求其斷本之易以求其動此吾所以取道之原也叅之榖梁氏以厲其氣叅之荀孟以暢其支叅之莊老以肆其端叅之國語以博其趣參之離騷以致其幽叅之太史以著其絜此吾所以旁推交通而以爲之文也凡若此者果是邪果非邪有取乎抑無取乎吾子幸觀焉擇焉有餘以告焉苟亟來以廣是道子不有得焉則我得矣又何以師云爾哉取其實而去其名無招越蜀吠怪而爲外廷所笑則幸矣復杜温夫書柳宗元宗元自兩月來三辱生書書皆逾千言意若相望以不對荅引譽者然僕誠過矣而生與吾文又十卷噫亦多矣文多而書頻吾不對荅引譽冝可自反而來徴不肯相見亟拜亟問其得終無辭乎凡生十卷之文吾巳略觀之矣吾性騃滯多所未甚諭安敢懸斷是且非邪書􅔰吾必曰周孔周孔安可當也儗人必於其倫生以直躬見􅔰冝無所䛕今道而不幸乃曰周孔吾豈得無駭怪且疑生悖亂浮誕無所取幅尺以故愈不對荅來柳州見一刺史即周孔之今而去我道連而謁於潮之二邦又得二周孔去之京師京師顯人爲文辭立聲名以干數又冝得周孔千百何吾生胷中擾擾焉多周孔哉吾雖少爲文不能自彫斵引筆行墨快意纍纍意盡便止亦何所師法立言狀物未甞求過人亦不能明辨生之才致但見生用助字不當律令惟以此奉荅所謂乎歟邪哉夫者疑辭也矣爾焉也者決辭也今生則一之宜考前聞人所使用與吾言類且異愼思之則一益也庚桑子言藿蠋鵠卵者吾取焉道連而謁於潮其卒可化乎然丗之求知音者一遇其人或爲十數文即務往京師急日月犯風雨走謁門戸以兾茍得今生年非甚少而自荆來柳自柳將道連而謁於潮途逺而深矣則其志杲有異乎又狀貌嶷然類丈夫視端形直心無岐徑其質氣誠可也獨要謹充之爾謹充之則非吾獨能生冝勿怨亟之二邦以取法時思吾言非固拒生者孟子曰余不屑其敎誨也者是亦教誨之而巳矣某白重校正唐文粹卷第八十六
