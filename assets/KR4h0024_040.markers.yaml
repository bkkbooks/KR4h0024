  - {type: line-break, offset: 0, content: '', id: KR4h0024_SBCK_040-1a01}
  - {type: variant, offset: 0, length: 1435, content: 重校正唐文粹卷第四十吳興姚鉉纂議乙揔一十三首明堂五明堂議孔穎達同前議魏徴同前議顔師古大享議馮宗明堂告朔議王方慶雅樂三三朝行禮樂制議杜佑三朝上夀有樂議徹食冝有樂議車服二朝服乗車議劉子玄公卿巳下冕服議楊烱刑辟三請禁私鑄錢議劉秩復讎議韓愈駮復讎議柳宗元明堂議孔穎達臣伏尋前勑依禮部尚書劉伯莊等議以爲從崐崘道上層祭天又尋後勑云爲左右閣道登樓設祭臣檢六藝羣書百家諸史皆未聞臺觀重樓之上而有堂名孝經云宗祀文王於明堂不云明樓明觀其冝一也又明堂法天聖王示儉或有翦蒿爲柱葺茅作蓋雖復古今興制不可恒然猶依大典徴於朴素是以席惟藁秸器上陶匏用絸栗以貴誠服大裘以訓儉今若飛樓架逈綺閣凌雲考古之文實堪疑慮按郊祀志漢武明堂之制四面無壁上覆以茅祀五帝於上座祀后土於下防臣以上座正謂臺上下防惟是臺下即云無四壁未審伯莊如何上層祭神下有五室且漢武所爲多用方士之說違經背正不可師祖又盧寛等議云上層祭天下堂布政欲使人神位别事不相干臣以古者敬重大事與接神相似以朝覲祭祀皆在廟堂豈有樓上祭祖樓下視朝閣道昇樓路便窄隘乗輦相儀接神不敬歩往則勞曵聖躬侍衛在傍百司供奉求之典誥全無此理臣非敢固執愚見以求已長伏以國之大典不可不愼乞以臣言下羣臣詳議同前議魏徴稽諸詁訓叅以舊圖其上圎下方複廟重屋百慮一致異軫同歸洎當塗膺籙未遑斯禮典午聿興無所取則裴頠以諸儒持論異端螽起是非舛互靡所適從遂乃以人廢言止爲一殿宋齊即仍其舊梁陳遵而不改雖嚴配有所祭享不匱求之典則道實未弘夫孝因心生禮縁情立心不可極故備物以表其誠情無以盡故飾宮以廣其敬宣尼美意其在兹乎臣等親奉德音令叅大議思竭塵露微増山海凡聖人有作義重隨時萬物斯覩事資通變若據蔡邕之說則至理失於文繁若依裴頠所爲則又傷於質略求之情理未允厥中今之所議非無用捨請爲五室重屋上圓下方旣體有則象又事多故實下室備布政之居上堂爲祭天之所人神不雜禮亦冝之其高下廣袤之規几筵尺丈之制則並隨時立法因事制冝自我而作何必師古廓千載之疑議爲百王之懿範不使泰山之下惟聞黃帝之法汶水之上獨稱漢武之圖則通乎神明庶幾可俟子來經始成之不日同前議顔師古明堂之制爰自古昔求之簡牘全文莫覩肇起黃帝降及有虞彌歷夏殷迄于周代各立名號别創規摹衆說舛駮互執所見巨儒碩學莫有詳通斐然成章不知裁斷究其指要實布政之宫也徒以戰國縱衡典籍廢棄暴秦酷烈經禮湮亡今之所存傳記雜說用爲凖的實亦蕪昧然周書之叙明堂紀其四面則有應門雉門據此一塗固是王者之常居耳其靑陽緫章玄堂太廟及左个右个與四時之次相用則路寢之義足爲明證文王居明堂篇帶以弓韣禮干高禖九門磔攘以禦疾疫置梁隂道以利農夫令國有酒以合三族凡一事等皆合月令之文觀其所爲皆在路寢者也戴禮昔周公朝諸侯于明堂之位天子負斧扆南嚮而立明堂者明諸矦之尊也周官又云周人明堂度九尺之筵東西九筵堂一筵據其制度即大寢也亦曰黃帝曰合宮有虞氏曰緫章殷曰陽舘周曰明堂斯皆路寢之徴知非别處大戴所說𥘉有近郊之言復稱文王之廟進退無據自爲矛盾原夫負扆受朝常居岀入旣在臯庫之内亦何云於郊野哉孝經傳云在國之陽又無里數漢武有懷創造詢於搢紳言論紛然終無定據乃立於汶水之上而宗祀焉明其不拘逺近亦無方面孝成之代表行城南雖有其文厥功靡立平帝元始四年大議營創孔牢等乃以爲明堂辟雍太學其實一也而有三名金裒等又稱經傳無文不能分别同異中興之後蔡邕作論復云明堂太廟一物二名鄭玄則在國之陽三里之外七里之内景巳之地穎客釋例亦云明堂太廟凡有八名其體一也苟立同異竟爲巧說並出自胷懷曽無師祖審夫功成作樂治定制禮草創從冝質文遞變旌旗冠冕今古不同律度權衡前後不一隨時之義斷可知矣假如, WYG: ''}
