body:
  text: 吳興姚鉉纂記丁書附揔一十七首堂樓亭閣虢州三堂記吕溫廬山草堂記白居易尉遲長史草堂記李翰盧郎中齊居記李華廬陵所居竹室記房千里西軒記柳宗元書宣州疊嶂樓附獨孤霖李白酒樓記沈光新修滕王閣記韓愈蘭溪縣東峯新亭記馮宿宴喜亭記韓愈白蘋亭記李直方穎亭記陳寬二公亭記歐陽詹零陵萬石亭記柳宗元沔州秋興亭記賈至郢州孟亭記皮日休虢州三堂記吕溫應龍乘風雲作雷雨退必蟠蟄以全其力君子役智能統機劇退必宴息以全其性力全則神化無窮性全則精用不竭深山大澤其所以蟠蟄乎高齋清池其所以晏息乎虢州三堂者君子宴息之境也開元初天子思二南之風並選宗英共持理柄虢大而近匪親不居時惟五王出入相授承平易理逸政多暇考卜惟勝作為三堂三者明臣子在三之節堂者勵宗室克構之義豈徒造適亦實垂謹居德樂善何其盛哉然當時漢同家人魯用王禮棟宇制度非諸侯居後刺史馬君錫因其頽陊始革基構豐而不侈約而不陋以琴樽詩書之幽素易綺紈鍾鼓之繁喧惟林池煙景不讓他日觀其廣踰百畒深入重扃回塘屈盤沓島交映溟渤轉於環堵蓬臺起於中庭浩然天成孰曰智及春之日衆木花坼岸鋪島識沈浮照耀其水五色於是乎襲馨擷竒方舟逶迤樂魚時翻飄蘂雪飛泝沿環回隱映差池咫尺迷路不知所歸此則武陵仙源未足以極幽絶也夏之日石寒水清松密竹深大栁起風甘棠垂隂於是濯纓漣漪解帶升堂畏景火雲隔林無光虛甍沈沈皓壁如霜弱扇不搖南軒清涼此則楚襄蘭臺未足以滌炎鬱也秋之日金飈掃林蓊鬱洞開太華爽氣出關而來於是乎弦琴端居景物廓如月委皓素水涵空虛鳥驚寒沙露滴高梧境隨夜深疑與世殊此則庾公西樓未足以淡神慮也冬之日同雲千里大雪盈尺四眺無路三堂虛白於是乎置酒褰帷憑軒倚楹瑶階如真玉樹羅生日暮天霽雲開月明氷泉潺潺終夜有聲此則子猷山隂未足以暢吟嘯也於戲不離軒冕而踐夷曠之域不出戶庭而獲江海之心趣近懸解迹同大隱序閲四時之勝節宣六氣之和貴而居之可曰厚矣若知其身既安而思所以安人其性既適而思所以適物不以自樂而忽鰥寡之苦不以自逸而忘稼穡之勤能推是心以惠境內則良二千石也方今人亦勞止上思乂息州鄀之選重如庭臣由是南陽張公輟揮翰之任受剖符之寄遊刃而理此焉坐嘯靜政令若水木全戶民如魚鳥馴致其道暗然日彰小子以通家之愛獲拜牀下且齒諸子侍坐于三堂見知惟人不敢無述捧筆避席請書堂隂俾後之人知此堂非止燕遊亦可以觀清淨為政之道廬山草堂記白居易匡廬竒秀甲天下山山北峯曰香爐峯北寺曰遺愛寺介峯寺間其境勝絶又甲廬山元和十一年秋太原人白樂天見而愛之若逺行客過故鄉戀戀不能去因面峯腋寺作為草堂明年春草堂成三間兩柱二室四牖廣袤豐殺一稱心力洞北戶來隂風防徂暑也敞南薨納陽日虞祁寒也木斫而巳不加丹墻圬而巳不加白磩階用石羃窗用𥿄竹䈴紵幃率稱是焉堂中設木榻四素屏二漆琴一張儒道佛書各兩三卷樂天既來為主仰觀出俯聽泉旁睨竹樹雲石自辰及酉應接不暇俄而物誘氣隨外適內和一宿體寧再宿心恬三宿後頽然嗒然不知其然而然自問其故答曰是居也前有平地輪廣十丈中有平臺半平地臺南有方池倍平臺環池多山竹野卉池中生白蓮白魚又南抵石澗夾澗有古松老杉大僅十人圍高不知幾百尺修柯戞雲低枝拂潭如幢豎如蓋張如龍蛇走松下多灌叢蘿蔦葉蔓駢織承翳日月光不到地盛夏風氣如八九月時下鋪白石為出入道堂北五步據層崖積石嵌空垤塊雜木異草蓋覆其上緣隂蒙蒙朱實離離不識其名四時一色又有飛泉植茗就以烹燀好事者見可永日堂東有瀑布水懸三尺㵼階隅落石渠昏曉如練色夜中如環佩琴築聲堂西倚北崖右趾以剖竹架空引崖上泉脈分線懸自簷注砌纍纍如貫珠霏微如雨露滴瀝飄灑隨風逺去其四旁耳目杖屢可及者春有錦繡谷花夏有石門澗雲秋有虎溪月冬有爐峯雪隂晴顯晦昏旦含吐千變萬狀不可殫紀覼縷而言故云甲廬山者噫凡人豐一屋華一簀而起居其間尚不免有驕穩之態今我為是物主物至致知各以類至又安得不外適內和體寧心恬哉昔永逺宗雷輩十八人同入此山老死不返去我千載我知其心以是哉矧余自思從幼逮老若白屋若朱門凡所止雖一日二日聊覆簣土為臺聚拳石為山環斗水為池其喜山水病僻如此一旦蹇剝來佐江郡郡守以優容撫我廬山以靈勝待我是天與我時地與我所卒獲所好又何求焉尚以冗貟所羈餘纍未盡或往或來未遑寧處待余異日弟妹婚嫁畢司馬歲秩滿出處行止得以自遂則必左手引妻子右手抱琴書終老於斯以成就我平生之志清泉白石實聞此言時三月二十七日始居新堂四月九日與河南元集虛范陽張允中南陽張深之東西二林長老湊朗滿晦堅等凡十有二人具齋施茶果以樂之因為草堂記尉遲長史草堂記李翰吾友晉陵郡丞河南尉遲緒節闊逹志遐逺含和而不假修推誠而不詭行外若可渾其中甚清外如可離其中甚靜夫求賢逹之趣當考其中若然夫子其達者歟而境或超詣心或獨得飄飄然不知冠冕之在已浩浩然不知天地之為大其冥機愼道迹繫心曠人或未覩吾能知之大曆四年夏乃以俸錢搆草堂于郡城之南求其志也材不斫全其朴牆不雕分其素然而規制宏敞清冷含風可以卻暑而生白矣後有小山曲池窈窕幽徑枕倚于高墉前有芳樹珍卉嬋姢修竹隔閡于中屏由外而入宛若壺中由內而出始若人間其幽邃有如此者夫子又有雄辭奧學潤色其事階上何有有羣書萬卷階下何有有空林一瓢非道統名儒不登此堂非素琴香茗不入兹室是知草堂之貴夫子之靜天下茫茫人未易悉吾與夫子昔同賔賦三十四年于兹矣吾則棄於世矣歎夫子下位每求其故而有疑焉今觀夫子之志乃鄰於道寥寥草堂自致之資書於壁微吾非俟其歲秋八月乙丑朔記盧郎中齋居記李華鴻鵠遡清風凌皓氣翺翔自得於冥冥之間故虞衡矰繳不能為患甘芻豐秣羈縶駿驥首冠鈠錫身被瓔瓖力方盛也騁於康逵及其殆也困於鞭䇿由是智者高鴻鵠而卑駿驥豈妄而論哉今凶渠假息五兵未偃廟堂有風力之臣征鎮皆方邵之老則仁人靜士戢伏自持各其志也尚書左司郎中嗣漁陽公盧振字子厚奉世德而聿修之味道風而遊泳之處于九江南郭荒榛之下不貽害於身不假力於人夷堆墆實窪穽尋尺無遺材草木不移植書堂齋亭成於指顧高松茂篠森於門巷晏然燕居勝自我得君子出則行其志也公以瑚璉之器為郎官以干將之斷宰赤縣君子入則善其身也公就鴻鵠之冥冥捨騏驥之馳騁況大江在下名山當日嘉賔時來攜手長望可以頤神逺壽暢其天和浴乎沂風乎舞雩吾與點也尋陽僑舊推仁人焉廣德二年四月五日趙郡李華云廬陵所居竹室記房千里凡天地之氣煦嫗乎春曦彤乎夏淒乎秋而洌乎冬楚之南當冬而且曦燕之北當夏而且洌是皆不得氣之中正人之百骸上陽而下隂陽戒於焮故膏肓欲寒隂戒於溺故腎脅欲燠人之外好欲軒冕文綵以為榮似若動且陽焉人之內好欲寡慮恬默以為泰似若靜且隂焉其外門欲肥馬大車以為熱者其內室欲虛堂廣厦以為淸者果反是必為災且妖且病且亂且窮矣天地之氣當夏而洌當冬而曦其歲時惡人之百骸上陽而不能寒下隂而不能煦其形神瘵外飾文綵不能動且陽而必慊其心內思恬默不能靜且泰而必汨其志外門淒淒而寒者內室彤彤而熱者其事窮豫三年夏待罪于廬陵其環堵所棲者率用竹以結其四周植者為柱楣撑者為榱桷破者為霤削者為障舊者為樞篾者為纒絡而籠土者為級橫而格音各空者為梁方大暑火烘爆霤坼攘若墜于爐若燎于原舌呀而不能持支墮而不自運赫赫熖熖如列千萬炬于室內視其門即寂寥虛間若清秋之山焉若寒浦之波焉豫乃知嚮所謂天地之氣人之百骸與其心形之內外居室之寒燠反是果為妖且災且病且亂且窮也今豫方窮不能奮果窮也其處于是亦冝矣天地之氣不能易者也鄒子有吹律之變人之死生不可制者也俞扁有針砭之術是二者尤不可革且有道而革之今豫室之曦豫門之寒豫亦姑思其治之之道將爇其廬而斬其工其能永永以爍豫書其辭于壁西軒記栁宗元永貞中余名在黨人不容於尚書省為邵州道貶未州司馬至則無以為居寓龍興寺西序之下余知釋氏之道且久固所願也然余所庇之屋甚隱蔽其戶北向居昧昧也寺之居於是州為高西序之西屬當大江之流江之外山谷林麓甚衆於是鑿西墉以為戶戶之外為軒以臨羣木之杪無所不矚焉不徒席不運几而得大觀夫室嚮者之室也席與凡嚮者之處也嚮也昧而今也顯豈異物邪因悟夫佛之道可以轉惑見為真智即羣迷為正覺捨大暗為光明夫性豈異物邪孰能為余鑿大昏之墉闢靈照之戶廣應物之軒者吾將與為徒遂書為二其一志諸戶外其一以貽巽上人焉書宣州疊嶂樓獨孤霖郡地四出皆卑即阜以垣故於樓為易而賦名必著其當正據扉亦雄昈競侈由是繚步逾千方目相瞪則壯邦麗廨之勳慊在第一繁絲機羅錯卉障錦春以融獨峯揉雲雙波屹風暑以澄曉黛嚬入夕蟾姢來秋以揚雲併半空冰偏一岸冬以明此概舉爾覼縷不盡也然而月話方狎燭醉始酣則防城健卒籌三而環警緒強者􅌤𬗟而不發乘險者帖薾而不進潰毒者隱忍而不能就其針砭搏猛者持疑而不能盡其膽勇而復視其強者弱之險者夷之毒者甘之猛者柔之信乎酒之作於人也如是翰林李公太白聰明才韻至今為天下唱首業術正救天必賦之矣致其君如古帝王進其臣如古藥石揮直刃以血其邪者推羲轂以輦其正者豈慿酒而作也慿酒而作者強非真勇太白既以峭訐矯時之狀不得大用流斥齊魯眼明耳聰恐貽顚踣故狎弄杯觴沈溺麴糵耳一淫雅目混黑白或酒醒神健視聽鋭發振筆著𥿄乃以聰明移於月露風雲使之涓潔飛動移於草木禽魚使之妍茂騫擲移於邊情閨思使之壯氣激人離情溢目移於幽巖邃谷使之遼歷物外爽人精魄移於車馬弓矢悲憤酣歌使之馳騁決發如睨幽并而失意放懷盡見窮通焉嗚呼太白觸文之強乘文之險潰文之毒搏文之猛而作狎弄杯觴沈溺麴蘖是真築其聰翳其明醒則移於賦詠冝乎醉而生醉而死余徐思之使太白疏其聰決其明移於行事強犯時忌其不得醉而死生也當時骨鯁忠赤遞有其人收其逸才萃於太白至千齊魯結搆凌雲者有限獨斯樓也廣不逾數席瓦缺掾蠧雖樵兒牧豎過亦指之曰李白常醉于此矣新修滕王閣記韓愈愈少時則聞江南多登臨之美而滕王閣為第一有瑰偉絶特之稱及得三王所為序賦記等王勃作遊閣序王緒作賦今中丞王公為從事日作修閣記並題在閣壯其文辭益欲往一觀而讀之以忘吾憂繫官于朝願莫之遂十四年以言斥守揭陽便道取疾以至海上又不得過南昌而觀所謂滕王閣者其冬以天子進大號加恩區內移刺袁州於南昌為屬邑私喜幸自以為當得躬詣太府受約束於下執事及其無事且還儻得一至其處竊寄目償所願焉至州之七月詔以中書舍人太原王公為御史中丞觀察江南西道洪江饒虔吉信撫袁悉屬治所八州之人前所不便及所願欲而不得者公至之日皆罷行之大者驛聞小者立變春施秋殺陽開隂閉令修於庭戶數日之間而人自得於湖山千里之外吾雖欲出意見論利害聽命於幕下而吾州乃無一事可假而行者又安得捨巳所事以勤館人則滕王閣又無因而至焉其歲九月人吏浹和公與監軍使燕于此閣文武賔士皆與在席酒半合詞言曰此屋不修且壞前公為從事此邦適治新之公所為文實書在壁今三十年而公來為邦伯適及期月公又來燕于此公乎得無情哉公應曰諾於是棟楹梁桷板檻之腐黑撓折者易新之蓋瓦級甎之故鉂者赤白之漫漶不鮮者治之則巳無侈前人無廢後觀工既訖功公以衆飲而賞焉以書命愈曰子其為我記之愈既以未得造觀為歎竊喜載名其上辭列三王之次有榮耀焉乃不辭而成公命其江山之好登望之樂雖老矣如獲從公遊尚能為公賦之元和十五年十月某日袁州刺史韓愈記蘭溪縣靈隱寺東峯新亭記馮宿東陽實會稽西部之郡蘭溪實東陽西鄙之邑歲在戊寅天官署洪君少卿以為之宰君之始至則用信待物用勤集事信故人阜勤故公濟未期而其政成後三年夏六月余過其邑洪君導余以邑之勝賞於是乎有東峯亭之遊背城之闉半里而近初屆佛剎剎之上方而亭在焉松門蓋空石道如帶足倦纍息然後造夫極焉向之池隍館宇之多旗亭闤闠之喧途道往來之衆簿書鞅掌之繁顧步之餘忽焉如失但山風飀飀嶺雲峩峩飛軒慿虛洞壑在下向背殊狀昏明易色指遙青而點黛者問之則曰某山某巖某林某墅指逺白而曳練者問之則曰某洲某渚某湫某塘高深互呈心目相競飄若象外意某幻成余既諧其私爰究其本先是邑微登攀遊觀之所洪君曽是挈俸錢二萬經斯營斯因地於山因材於林因工於子來因時於農隙又何易也崇山濬谷佳境勝槩綿世伏匿一朝發朗又何能也君在建中興元之間為江南西道節度曹王所知時方興軍職壓寇境供億倉卒賦平人和王實賴之故御史大夫鄭滑節度盧公羣與君嘗同寮每號之曰精金百鍊良驥千里誠矣然則是邑之理兹亭之勝於君之分不為難能夫播芳塵而鼓餘波者非文莫可遂攬筆為記刋于石而附諸地志焉宴喜亭記韓愈太原王弘中在連與學佛之人景常元慧者遊異日從二人者行於其居之後丘荒之間上高而望得異處焉斬茅而嘉樹列發石而清泉激輦糞壤焚榴翳卻立而視之出者突然成丘陷者呀然成谷窪者為池而缺者為洞若有鬼神異物隂來相之自是弘中與二人者晨往而夕忘歸焉乃立屋以遊風雨既除寒暑既成愈請名之其丘曰俟德之丘蔽於古而顯於今有俟之道也其石谷曰謙受之谷瀑曰振鷺之瀑谷言德瀑言容也其土谷曰黃金之谷瀑曰秩秩之瀑谷言容瀑言德也洞曰寒居之洞志其入時也池曰君子之池虛以鍾其美盈以出其惡也泉之源曰天澤之泉出高而施下也合而言之以屋曰燕喜之亭取詩所謂魯侯燕喜者頌也於是州民之老聞而相與觀焉曰吾州之山水名於天下然而無與燕喜者比經營於其側者相接也而莫宜其地凡天作而藏之以遺其人乎弘中自吏部郎貶秩而來次其道途所經自藍田山入商洛涉浙湍臨漢水升峴首以望方城出荆門下岷江過洞庭上湘水行衡山之下繇郴踰嶺猿狖所家魚龍所宫極幽遐瓌詭之觀冝其於山水飫聞而厭見今其意乃若不足傳曰智者樂水仁者樂山弘中之德與其所好可謂協矣智以謀之仁以居之吾知其去是而羽儀於天朝也不逺矣遂刻石以記白蘋亭記李直方新作白蘋亭書時且志政也梁太守栁惲賦詩於始因以名洲今邦伯李公成室於終兹用目亭度乎事則位均考乎地則境同合美配德古今相望亭之時義至矣吳江之南震澤之隂曰湖州幅貟千里棊布九邑卞山屈盤而為之鎮五溪叢流以道其氣其土沃其候清其人壽其風信實公之始至也用恭寬明恕以懷之敬事眘罰以勸之賦令之先必度其物冝而咨于前訓故居者逸亡者旋或蹈境而留或聆聲而遷提封之內無榛灌繩墨之下無姦傲既而外邑多材郡不能泄公命懸諸善價俾代常徭於是乎幽巖之巨木斯出積歲之逋租必入公家受其利山氓蒙其惠繇是白蘋之制經矣洲在郡城南東亂霅溪而即焉白沙如浮流波環之前有大野綿雲繚以萬峯顧有名都壓水駢以千室邑居可望而喧埃不及空水交映而雲天在下造物之工若有私於是焉茭菰叢生鳧鶴朋遊嘉名雖曜清境或棄公於是相顯爽之冝立卑高之程據洲之陽揆日之正揭大亭一焉修廊雙注北距于霅浮軒瞰流峩水亭二焉大可以施筵席小可以容宴豆凡棟宇之法輪奐之美銛刮密石用成翬飛施宏壯而有度備彤紫而不踏內則庭除朗潔彌望鋪雪曲沼逶迤以中貫飛梁天矯而對起紫桂翠篁辛荑木蘭碧抆丹實蛇走珠綴鮮飈暗起縈葉振蘂落英飄颻灑空浮水天目神池之上多不名之卉洞庭水府之下産怪狀之石嶙峋乎玉容葳㽔乎瑶芳衆榮偶植羅列布濩外則差初冝反以白蘋間之紅蕖川與天遠百里如組邦君之來肅肅斾旌綵舟徐移魚躍鳥鳴亭成之日三吳之賢大夫集焉公用鼓鍾羽籥以樂之然后使臣之臨重客之來獲遊是者恍乎有遺區之歎則為邦之成績作亭之良規參合二美遊揚四海坐馳而逝與廏置偕矧蘋之為用風有季女之奠騷有放臣之望夫以澗溪之賤微而可充王公之殷薦是故君子重之今扶贊勝賞也如彼哲賢咏歌也如此則是亭慿眺之外又有傳經之道焉若乃乘農隙之暇時購武夫之羡功廛閭不煩財用不屈揚昔人之休烈垂不朽之遐觀咨其創物之智有以加人不如是烏能及此已卯歲冬十月豫將浮浙河上會稽凌縉雲觀赤城道出公之仁宇目覽亭之崇構舉書其實合春秋傳信之經後之人無視十洲孟浪之説而沒其誼云潁亭記陳寬潁水濵有地可以覽山川之秀者九山祠在焉西北餘豫升之見潁水直北劈地而來如隙光端如匣劒視若中面使人毛磔又見太室與大隗等列領羣峯而來崒屹不得進蹭蹬卻倚三十六嶠若立指焉而近北左手煙雲草樹濃淡覆露各盡其態平視之令人意逺超超然若萬里之鶴也豫曰可樹亭哉遂召匠氏授以程度匠氏曰諾退而有言曰假吾令不德主未聞惠人未蒙仁止其幾而遽以庥覽為懷乎豫聞之甚羞而以為不聞也夫陽翟自潁陽逹許昌皆漢郡頴川屬是乃吾土也豫不肖假長于此雖獲戻于人而不避者吾將識其來乎及成會邑中彥髦以落之中宴客有舉爵而稱曰吾斯山河之秀可與峴首爭請名之潁亭遂名之若使解攜手值良辰嘉賔二三聲酒緩進既揖既抗對之益酣因書石以介其壁俾覽者懲之當敏樹政無敏樹亭以鈞匠氏之意也唐大中庚午歲三月九日丁亥攝陽翟縣令陳寬記紐狀鼇之首二公止旌輿以回睇假漁舟而上陟幕煙茵草玩懌移日心謀意籌有建亭之算而未之言也二公既歸邑人踵公遊於斯者如市登中隆觀媚麗前來後至異口同辭昔漢帝不曰百姓安其田里而無愁怨之聲者其由良二千石乎是謂政平教成使俗泰而民以寧者也虞書不曰股肱良哉庶事康哉是謂翼帝藩皇調隂序陽使物阜而民以昌者也席公今日之化育吾徒是以寧薑公昔歲之弼諧吾徒是以昌且以之寧又以之昌愷悌君子也詩云愷悌君子民之父母二公者真吾父母矣兹阜二公攸選尚而加愛務休訟簡必復斯至上露下蕪忍令父母憩之乎遂偕發言為公就亭之功如牆而前陳誠于縣尹縣尹允其請而為之辨方經跖環當上頂誡奢訓簡以授子來於是家有餘力圃有餘木或掬一抷土焉或翦一枝材焉一心百身蜂還蟻往榛莽可去以自剃瓦甓無脛而奔萃一之日斤斧之功畢二之日圬之傭息再晨而成二公莫知層梁亘以中豁飛甍翼而四翥東西南北方不殊致糊白墳以呈素臒頳壤而垂繪通以虹橋綴以綺樹華而非侈儉而不陋煙水交浮巖巒疊逈精舍奉其旁逹都城企其遐際容影光彩漪入瀾澄指朱軒於潭底閲雲岑乎波裏熿熿油演如飛若動又釣人飄颻於左右遊禽出沒乎前後一眄一睞千趣萬態稅息之者若在蓬壺方丈之上二公重清曠於舊賞納衷懇乎羣庶尋幽探異常於斯勞賔祖客常於斯加以平疇間闢通途在下可以觀耕耨可以采謳謡作一亭而衆美具噫天造兹阜其固與人為亭歟不然何不逺郛郭而博敞詭秀之若此非常之地意待非常之人故越千萬祀而至二公方覿也邑人想之復言曰事無隱義物有正名地為二公而見亭從二公而建斯亭也可署曰二公亭雖芻蕘之云其實有謂二公不忽遂以為號小子藝忝干文曽觀光上國去之日歷越遊吳歸之晨踰荆泛漢會稽之蘭亭姑蘇之華亭襄陽峴首豫章湖中皆古今稱為佳境或棟宇猶在或基址未沒山川物象遍得而覽方之於此逺有慙德懿哉二公智周德厚卜地如此感民若彼且非飾説入吾邑者升吾亭者知之古之製器物造宫室咸有銘頌以昭其義斯亭也豈無斆古而為之章句者小子薄劣不敢議其事粗述其旨始為之記兼借二公之名紀于左以為邦榮在位賔寮亦以序從公而列貞元九年三月二十五日記零陵萬石亭記栁宗元御史中丞清河男崔公來蒞永州間日登城北墉臨于荒野叢翳之隙見怪石持出度其下必有殊勝步自西門以求其墟伐竹披奧欹側以入縣谷跨溪皆大石林立渙若奔雲錯若置碁怒者虎鬪企者鳥厲抉其穴則鼻口相呀搜其根則蹄股交跱環行􅌓目疑若搏噬於是刳闢朽壤翦焚榛穢決澮溝導伏流散為踈林洄為清池寥廓泓渟若造物者始判清濁效竒於兹地非人力也乃立遊亭以宅厥中亭之西石若掖分可以眺望其下青壁斗絶沈于淵源莫究其極自下而望則合為攢巒與山無窮明日州邑耄老雜然而至曰吾儕生是州藝是野眉尨齒鯢未嘗知此豈天墜地出設兹神物以彰我公之德歟既賀而請名公曰是石之數不可知也以其多而命之曰萬石亭耄老又言之曰懿夫公之名亭也豈專狀物而巳哉公嘗六為二千石既嬴其數然而有道之士咸恨公之嘉績未洽于人敢頌休聲祝公于明神漢之三公秩號萬石我公之德冝受兹錫漢有純臣惟萬石君我公之化始于閨門道合千古祐之自天野夫獻辭公壽萬年宗元嘗以箋奏隸尚書敢專筆削以附零陵故事元和十年正月五日記沔州秋興亭記賈至在陽而舒在隂而慘性之常也履險而栗涉夷而泰情之變也觀揖讓而退覩交戰而競目之感也聞韶頀而和聆鄭衛而靡耳之動也夫其舒則洽慘則悴栗則止泰則通退則無咎競則有悔和則安樂靡則憂危性情耳目優劣若此故君子愼居處謹視聽焉沔州刺史賈載吾家之良也理沔州未期月而政和於訟堂之西因高搆宇不出庭戶在雲霄矣卻負大别之固俯視滄海之浸閲吳蜀樓船之殷鑒荆衛藪澤之大亦有旨哉性得情適耳虛目開且處動則倦理倦莫若靜處靜則明惟明以理動窮則變變則通通則久今沔州靈府恬而神用爽政是以和觀其前戶後牖順開闔之義簡也上棟下宇無雕琢之飾儉也簡近於智儉近于仁仁智居之何陋之有況乎當發生之晨則攢秀木於高砌見鶯其鳴矣處臺榭之月則納清風於洞戶見暑之徂矣在搖落之時則俯皓氣於軒檻見火之流矣值嚴疑之節則棲同雲於扃闥見雪之紛矣政成頌清體安心逸而詩人之興常在常時之興秋興最高因以命亭焉豫自巴丘徴赴宣室歇鞍棠樹之側解帶竹林之下嘉其俯仰美其動息乃命進牘抽毫志之郢州孟亭記皮日休明皇世章句之風大得建安體論者推李翰林杜工部為尤介其間能不愧者惟吾鄉之孟先生也先生之作遇景入詠不拘竒抉異令齷齪束人口者涵涵然有干霄之興若公輸氏當巧而不巧者也北齊美蕭慤芙蓉露下落楊栁月中踈先生則有微雲淡河漢踈雨滴梧桐樂府美玉融殘日霽沙嶼清風動高泉先生則有氣蒸雲夢澤波動嶽陽城謝眺之詩句精者有露隰寒塘草月映清淮流先生則有荷風送香氣竹露滴清聲此與古人爭勝於毫釐也他稱是者衆不可悉類嗚呼先生之道復何言邪謂乎貧則天爵于身謂乎死則不朽於文為士之道亦以至矣先生襄陽人也日休襄陽人也既慕其名亦覩其貌蓋仲尼思文王則嗜昌歜七十子思仲尼則師有若吾於先生見之矣説者曰王右丞筆先生于郢之亭亭在刺史治所四年滎陽鄭公誠刺是州余將抵江南艤舟而詣之果以文見貴則先生之貌縱視矣先是亭之名取先生之諱舊名浩然亭公曰焉有賢者之名為趨厮走養朝夕言於刺史前邪命易之以先生姓今改為孟亭日休時在宴因曰春秋書紀季公子友仲孫湫字者貴之也故書名曰貶書字曰貴況以賢者名于署亭乎君子是以知公樂善之深也百祀之弊一朝而去百祀謂開元至今則民之弊也去之可知矣見善不書非聖人之志宴豆既撤立而為文咸通四年四月三日記重校正唐文粹卷第七十四
