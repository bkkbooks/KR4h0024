  - {type: variant, offset: 5384, length: 365, content: 皇上宅位六祀七政貞眀於上七敎敷聞於下其有不迪不吉不庭不若之徒皆薰然而和晻然而化春三月司天氏奏歲星居心宿五度其色黃眀潤大光澤帝位積五十餘日詔下有司頒示中外故臣得而言之以形歌頌謹案歲星五帝爲蒼五行爲木五常爲仁五事爲貌天意若曰時以至仁爲理覆露万民洽浹生類恊夫五行五事之用則發於星緯形於禎應隂騭大化昭報成功玄符幽賛其昭昭如是禮運之論聖人以日星爲紀四時爲柄洪範之叙皇極曰歛時五福用敷錫厥庶人發於人格於天天人交感合若符節其年秋平河中之㓂葬其遺骸復其世祀班淮右之師用弘文告用去武備此二帝三代所以恢令召也於是一統類以昭德明法制以塞違薦禮百神賔懷獷俗嘉瑞美祥紛委狎至置之而不有哲人端士連茹播職求之如巳失然後端拱於穆淸怡神於靖冥驅一代爲純誠接萬靈於眀庭斯又登邁遂古光昭聞見巍乎紹天統物之盛者也微臣瑣賤沭浴仁聖敢獻歲星居心頌一章以備周詩由庚由儀之闕頌曰, WYG: ''}
