front:
  text: 奏表書䟽下㧾一十三首
  hash: sha256:49e2cda4020e6600f4e54fd5502da1e9ad57ad0d12be382015f765c01af0e9fa
body:
  text: 䟽政事二請崇節儉及制諸王䟽馬周請勤政崇儉約䟽張庭珪學校二請從學校䟽韋嗣立請從國學䟽李絳廵案一請每十州分置御史廵案䟽李嬌罷兵四請太宗息兵罷役䟽徐賢妃諫孟春講武䟽王方慶請罷百姓西征䟽勒等四鎮䟽狄仁桀請𤣥宗不令突厥入仗馳射䟽呂向寺觀二諫造大像䟽狄仁傑諫造金仙玉真二觀像卒替否關市一諫税闗市䟽崔融亢旱一請追癸巳日詔䟽羅隐請崇節儉及制諸王䟽馬周臣歴觀前代自夏殷及漢氏之有天下傳祚相繼多者八百餘年少者猶四五百年皆為積德累業恩結於人心豈無僻王賴前哲以免自魏晉以還降及周隋多者不過五六十年少者纔二三十年而亡良由創業之君不務廣恩化當時僅能自守後無遺德可思故傳嗣之主政教少衰一夫大呼而天下土崩矣今陛下雖以大功定天下而積德日淺固當崇禹湯文武之道廣施德化使恩有餘地為子孫立萬代之基豈欲但令政教無失以持當年而已且自古明王聖主雖因人設教寛猛隨時而大要惟以節儉於身恩加於人二者為務故其下愛之如父母仰之如日月敬之如神明畏之如雷霆此其所以卜祚遐長而禍亂不作也今百姓承喪亂之後比於隋時纔十分之一而供官徭役道路相繼兄去弟還首尾不絶遠者徃來五六千里春秋冬夏畧無休時陛下雖每有恩詔令其減省而有司作既不廢自然須人徒行文書役之如故臣每訪問四五年來百姓頗有嗟怨之言以為陛下不存養之昔唐堯茅茨土階夏禹惡衣菲食如此之事臣知不可復行於今漢文帝惜百金之費輟露臺之役集上書囊以為殿帷所幸慎夫人衣不曳地至景帝以錦繡纂組妨害女工特詔除之所以百姓乂安後至孝武帝窮奢極侈而承文景遺德故人心不動向使高祖之後即有武帝天下必不能全此於時代差近事迹可見今京師及益州諸處營造器物幷諸王妃公主服飾議者皆不以為儉臣聞昧旦丕顯後世猶怠作法於治其弊猶亂陛下少處人間知百姓辛苦前代成敗目所親見尚猶若此而況皇太子生長深宮不歴外事即萬嵗之後固聖慮所當憂也臣竊尋徃代以來成敗之事但有黎庶怨叛聚為盜賊其國無不滅亡人主雖欲改悔未有重能安全者凡脩政教當脩之於可脩之時若事變一起而後悔之則無益也故人主每見前代之亡則知其政教之所由喪而皆不知其身之失是以殷紂笑夏桀之亡幽厲亦笑殷紂之滅隋煬帝大業之初又笑齊魏之失國然今之視煬帝亦猶煬帝之視齊魏也故京房謂漢元帝云臣恐後之視今亦猶今之視昔此言不可不誡徃者貞觀之初率土饑儉一匹絹纔得一斗米而天下怡然百姓知陛下甚愛憐之故人曽無謗讟自五六年來頻嵗豐稔一匹絹得粟十餘石而百姓皆以陛下不憂憐之咸有怨言又今所營為者頗多不急之務故也自古以來國之興亡不由蓄積多少惟在百姓苦樂且以近事驗之隋家貯洛口倉而李密因之東都積布帛而王充據之西京府庫亦為國家之用至今未盡向使洛口東都無粟帛則王充李密未必能聚大衆但貯積者固是國之常事也要當人有餘力而後收之若人勞而強斂之更以資寇積之無益也然儉以息人貞觀之初陛下已躬為之故今行之不難也為之一日則天下知之式歌且舞矣若人既勞矣而用之不息儻中國被水旱之災邉方有風塵之警狂狡因之以竊發則有不可測之事非徒聖躬旰食晏寢而已古詩云動人以行不以言應天以實不以文以陛下之明誠欲勵精為政不煩遠求上古之術但及貞觀之初則天下幸甚昔賈誼謂漢文帝云可慟哭及長歎息者言當韓信王楚彭越王梁之時使文帝即天子位必不能安又言賴諸王年少傅相制之長大之後必生禍亂歴代以來皆以誼言為是臣竊觀諸將功臣陛下所與定天下者皆仰稟成規備鷹犬之用無威畧振主如韓彭之徒難駕御者而諸王年並幼少縱其長大當陛下之日必無他心然則萬代之後不可不慮自漢晉已來亂天下者何嘗不是諸王皆為樹置失宜不先為節制以至滅亡人主熟知其然但溺於私愛故使前車既覆而後車不改轍也今天下百姓極少諸王甚多寵遇之恩有過厚者臣之愚見恐其恃恩驕矜也昔魏武帝寵樹陳思王及文帝即位防守禁閉有同獄囚以先帝加恩太多故嗣主疑而畏之也此則武帝之寵陳思適苦之也且帝子何患不富貴身食大國封户不少好衣美食衣食之外更何所須而每年别加優賜曽無紀極里語曰貧不學儉富不學奢言自然也今陛下以大聖創業豈惟處置見在子弟而已當立長久之法使萬代遵行之請勤政崇儉約疏張庭珪臣聞古有多難興王殷憂啟聖者皆以事危則志遠情迫則思深故能自下登高轉禍為福者也伏見景龍之末中宗遇禍先天之際兇黨搆謀社稷有危於懸旒國朝殆均於絶綖陛下神武超代精誠動天再掃氛沴六合清朗而後上順皇㫖俯念黔黎髙運璿衡光膺寶籙以日月所燭之地書軌未通之鄉無不霑濡渥恩被服元化十堯九舜未足稱也明明上帝照臨下土宜錫介祉以荅鴻休然頃嵗以來陰陽愆候九穀失稔萬姓阻飢闗輔之間更為尤劇至有樵蘇莫爨糠籺靡資不暇聊生方憂轉死偶㑹昌運遘兹艱險臣竊思之皇天之意將恐陛下春秋鼎盛神聖在躬不崇朝而建大功自藩邸而陟元后或簡下濟之道獨滿雄圖之志輕虞舜而不法思漢武以自高是故昭見咎徵載加誘奬欲大君日慎一日雖休勿休永保天和以固邦本也斯則皇天之於陛下睠顧深矣陛下焉可不奉若休㫖而寅畏哉臣愚誠願陛下約心削志澄思勵精考羲農之書敦朴素之道登庸端士放黜佞人屛退後宮減撤外廏場無蹴踘之翫野絶從禽之賞休石田之遠境罷金甲之懸軍惠恤惸嫠蠲薄徭賦去奇技滛巧損和璧隨珠不見可欲使心不亂自然波清四海塵消九域農夫樂其業餘糧栖於畝則和氣上通於天雖五星連珠兩曜合璧未足多也珍祥下降於地雖鳳凰巢閣麒麟在郊未足奇也或謂天之炯戒不足畏者則將上帝憑怒風雨迷錯荒饉日甚無以濟下矣或謂人之窮乏不足恤者則將齊甿沮志億兆攜離愁苦勢極無以奉上矣斯盖安危所繫禍福之源奈何朝廷曽不是察况今陛下受命伊始敷政惟新卿士百寮華夷萬族莫不清耳以聽刮目以視延頸企踵冀有所聞顒顒如也何可怠棄典則坐孤其望哉請崇學校疏韋嗣立臣伏聞古先哲王立學官所以掌教國子以六德六行六藝三教備而人道畢矣禮記曰化民成俗必由學乎學之於人其用盖博故立太學以教於國設小學以化於邑王之諸子卿大夫士之子及國之俊選皆造焉八嵗入小學十五入太學春秋教以禮樂冬夏教以詩書是以教洽而化流行成而不悖故自天子至於庶人未有不須學而成者也國家自永淳以來二十載餘國學廢散胄子衰缺時輕儒學之官莫存章句之選貴門後進競以僥倖昇班寒族常流復因陵替弛業考試之際秀茂罕登驅之臨人何以從政又垂拱之後文明在辰盛典鴻休日書月至因籍際㑹入仕尤多加以䜛邪兇黨來俊臣之屬妄執威權恣行枉酷陷正直之伍死亡為憂道路以目人無固志罕有執不撓之懷徇至公之節偷安苟免聊以卒嵗遂使綱領不振請託公行選舉之曹彌長踰濫隨班少經術之士攝職多庸𤨏之才徒以猛暴相誇罕能清惠自勗使海内黔首騷然不安賴陛下憂勞頻有處分然革弊斯近此風尚餘州縣官寮貪鄙未息而望事必循理俗致康寧求之於今不可得也陛下誠能下明制發德音廣開庠序大敦學校三館生徒即令追集王公已下子弟不容别求仕進皆入國學服膺訓典崇飾館廟尊尚儒師盛陳奠菜之儀宏敷講説之㑹使士庶觀聽有所發揚𢎞奬道德於是乎在則四海之内靡然向風延頸舉足咸知所向然後審持衡鏡妙擇良能以之臨人寄之調俗則官無侵暴之政人有安樂之心居人則相與樂業百姓則皆戀桑梓豈復憂其逃散而貧窶哉今天下户口亡逃過半租調減耗國用不足治人之急尤切於兹故知務學之源豈惟潤身進德而已將以安人利國安可不務之哉請崇國學疏李絳自三代哲王已降奄有天下者未嘗不崇建太學尊重名儒習干戚羽籥之容盛樽爼揖讓之禮以興教化以致太平天子親舉皇太子行齒胄之禮斯所以化成天下也故記曰如欲化民成俗必由學乎當征討之急則先武士丁治平之運則尚文德二柄相須百王不易故漢光武於兵革之中投戈講藝魏太祖於擾攘之際崇立學校歴代之於儒道如此急也後漢儒學之盛太學至有三萬人諷先聖之言酌當代之務鴻名碩德匡國濟時未有不遊於太學以躋於顯位者也國家自高祖初立闗中便修太學幷為功臣宗室子弟别立小學建黌舍大加儒訓増置生徒各立愽贍鴻儒碩學盛於朝列質疑應問酌古辨今咸徵經據並傳師法故朝廷無不根之論蕃夷有慕義之名風教大成禮樂咸備貞觀之理謂之太平至于開元中亦𢎞國學之制後覩儒道之盛故太學興廢從古及今皆興於理化之時廢於衰亂之代所以俾風俗趨末而背本好虛而忘實盖由國學廢講論之禮儒者靡師資之訓自是以降不本經義不識君臣父子之道不知禮樂制度之方和氣不流悖亂遂作其師氏之廢如是之害也今天下遭逢聖明蕩除瑕穢前代所不能舉百王所不能行而陛下行之萬方傾耳兆人企踵思望聖化希承德風而德盛道光闕弦歌之雅詠政流化洽鮮儒學之高風頃自羯胡亂華乘輿避狄中夏凋耗生人流離儒碩解散國學毁廢生徒無鼓篋之志愽士有倚席之譏馬廏園蔬殆恐及此伏惟陛下挺超代之姿發振俗之令復崇太學重延碩儒精選生徒奬寵愽士備徵天下名德專門之士増飾學中屋室廚饌之制殿最講習之優劣彰明義訓之得失明立科品使有懲勸拔萃出羣者縻之以祿廢業怠教者寘之以刑自然儒雅日興典墳日重先王之道日盛大學之訓日崇陛下垂拱明庭受釐清禁使師氏教德不獨美於周時橋門觀禮豈復謝於漢日伏希天造特鑒愚言起兹廢墜𢎞於教化冀禆聖教以助皇風請每十州分置御史巡案疏李嶠陛下創置右臺分巡天下察吏人善惡觀風俗得失斯政途之綱紀禮法之準繩無以加也然猶有未折衷者臣請試論之夫禁網尚疎法令宜簡簡則法易行而不煩雜疎則所羅廣而無苛碎竊見垂拱二年諸道巡察使所奏科目凡有四十四􅟢至於别准格敕令察訪者又有三十餘條而巡察使率是三月已後出都十一月終奏事時限迫促簿書填委晝夜奔逐以赴限期而每道所察文武官多至二千餘人少者一千已下皆須品量才行褒貶得失欲令曲盡行能則皆不暇此非敢墮職而慢於官也實才有限而力不及耳臣望量其功程與其節制使器周於用力濟於時然後進退可以責成得失可以精覈矣又曰今之所察但准漢之六條推而廣之則無不包矣無為多張科目空費簿書且朝廷萬機非無事也幾事之動恒在四方是故冠盖相望郵驛繼踵今巡使既出其外一州之事悉當委之則傳驛大減矣然則御史之職故不可得閒自非分州統理無由濟其繁務請大小相兼率州置御史一人以周年為限使其親至屬縣或入閭里督察姦訛觀採風俗然後可以求其實效課其成功若此法果行必大禆政化且御史出持霜簡入奏天闕其於勵已自修奉職存憲比於他吏可相百也若其案劾姦邪糾擿欺隱比於他吏可相十也陛下試用臣言妙擇賢能委之心膂假溫言以制之陳賞罰以勸之則莫不盡力而効死矣何政事之不理何禁令之不行何妖孽之敢興哉諫太宗息兵罷役疏徐賢妃自貞觀以來二十有二載風雨調順年登嵗稔人無水旱之弊國無飢饉之災昔漢武守文之常主猶登刻玉之符齊桓小國之庸君尚圖泥金之望陛下推功損已讓德不居億兆傾心猶闕告成之禮云亭佇謁未展升中之儀此之功德足以咀嚼百王網羅千代者矣然古人有言雖休勿休良有以也守初保末聖哲罕兼是知大業者易驕願陛下難之善始者難終願陛下易之竊見頃年以來力役兼揔東有遼海之軍西有崐丘之役士馬疲於甲胄舟車倦於轉輸且召募投戎去留懷死生之痛因風阻浪往來有漂溺之危一夫力耕卒無數十之獲一船致損則傾數百之糧是猶運有盡之農工填無窮之巨浪圖未獲之他衆喪已成之我軍雖除兇伐暴有國常規然黷武翫兵先􅈒所戒昔秦皇幷吞六國返速危亡之兆晉武奄有三方翻成覆敗之業豈非矜功恃大棄德而輕邦圖利忘害肆情而縱欲遂使悠悠六合雖廣不救其亡嗷嗷黎庶因弊以成其禍是知地廣非常安之術人勞乃易亂之源願陛下布澤流仁矜弊恤乏減行役之煩増湛露之惠妾又聞為政之本貴在無為竊見土木之功不可兼遂北闕初建南營翠㣲曽未逾時玉華創制雖復因山藉水非無架築之勞損之又損頗有工力之賞終以茅茨示約猶興木石之疲假使和雇取人不無煩擾之弊是以卑宮菲食聖王之所安金屋瑶臺驕主之為麗故有道之君以逸逸人無道之君以樂樂身願陛下使之以時則力無竭矣用而息之則人斯悦矣夫珍翫伎巧乃喪國之斧斤珠玉錦繡實迷心之酖毒竊見服翫纎靡如變化於自然職貢珍奇若神仙之所製雖馳華於季俗實敗素於淳風是知漆器非延叛之方桀造之而人叛玉杯豈招亡之術紂用之而國亡方驗侈麗之源不可不遏作法於儉猶恐其奢作法於奢何以制後伏惟陛下明鑒未形智周無際窮奥祕於麟閣盡探賾於儒林千王治亂之蹤百代安危之跡興衰禍福之數得失成敗之機故亦苞吞心府之中循環目圍之内乃宸衷之久察無假一二言焉唯恐知之非難行之不易志驕於業㤗體逸於時安伏惟抑志裁心慎終如始削輕過以滋重德擇後是以替前非則鴻名與日月無窮盛業與乾坤永泰矣諫孟春講武疏王方慶謹按禮記月令孟冬之月天子命將帥講武習射御角力此乃三時務農一時講武以習射御角校材力盖王者常事安不忘危之道也孟春之月不可講兵兵者甲胄干戈之揔名兵金性刻木春盛德在木而舉金以害盛德逆生氣孟春行冬令則水潦為敗雪霜大摯首種不入蔡邕月令章句云太陰新休少陽尚㣲而行冬令以遵水氣故水潦至而敗生物也雪霜大摯析陽者也太陰干時雨雪而霜故大傷首種首種謂宿麥以秋種故謂之首種入收也春為沍寒所傷故至夏麥不成長也今孟春講武是行冬令以陰政犯陽氣害發生之德臣恐水潦敗物霜雪損稼夏麥不登無所收入也伏望天恩不違時令至冬教習以順天道請罷百姓西戍疎勒等四鎮疏狄仁傑臣聞天生四夷皆在先王封域之外故東距滄海西隔流沙北横大漠南阻五嶺此天所以限夷狄而隔中外也自典籍所紀聲教所及三代不能至者國家盡兼之矣此則今日之四境已逾於夏殷者也詩人矜薄伐於太原美化行於江漢是則前代之遠裔而國家之域中至前漢時匈奴無嵗不犯邉殺畧吏人後漢則西羌侵軼漢中東寇三輔入河東上黨幾至洛陽由此言之則陛下今日之土宇過於漢朝遠矣若其用武荒外邀功絶域竭府庫之實以爭磽确不毛之地得其人不足以増賦獲其土不可以耕織苟求冠帶遠夷之稱不務固本安人之術此秦皇漢武之所行非五帝三皇之事業也若使越荒外以為限竭資財以騁欲非但不愛人力亦所以失天心也昔始皇窮兵極武以求廣地男子不得耕於野女子不得蠶於室長城之下死者如亂麻於是天下潰叛漢武追高文之宿憤籍四帝之儲實於是定朝鮮討西域平南越擊匈奴府庫空虛盜賊蜂起百姓嫁妻賣子流離於道路者萬計末年覺悟息兵罷役封丞相為富民侯故能為天所佑也昔人有言曰與覆車同軌者未嘗安此言雖小可以喻大近者國家頻嵗出師所費滋廣西戍西鎮東戍安東調發日加百姓虛弊開手西域事等石田費用不支有損無益轉輸靡絶杼軸殆空越磧踰海分兵防守行役既久怨曠亦多昔詩人云王事靡盬不能藝稷黍豈不懷歸畏此罪罟念彼征人涕零如雨此則前代怨思之辭也上不是恤則政不行而邪氣作邪氣作則蟲螟生而水旱起若此雖禱祀百神不能調陰陽矣方今闗東饑饉蜀漢逃亡江淮已南徵求不息人不復業則相率為盜本根一摇憂患不淺其所以然者皆為遠戍方外以竭中國爭蠻貊不毛之地乖子育蒼生之道也昔漢元納賈捐之之謀而罷朱崖郡宣帝用魏相之䇿而棄車師之田豈不欲慕尚虛名盖憚勞人力也近貞觀年中尅平九姓􅁽李思摩為可汗使統諸部者盖以夷狄叛則伐之降則撫之得推亡固存之義無遠戍勞人之役此則近日之令典綏邉之故事竊見阿史那斛瑟羅陰山貴種代雄沙漠若委之四鎮使統諸蕃封為可汗遣禦冦患則國家有繼絶之美荒外無轉輸之役如臣所見請捐四鎮以肥中國罷安東以實遼西省軍費於遠方幷甲兵於塞上則恒代之鎮重而邉州之備實矣况綏撫夷狄盖防其越逸苟無侵侮之患則可矣何必窮其窟穴與螻蟻計校長短哉且王者外寧必有内憂盖為不勤修政故也伏惟陛下棄之度外無以絶域未平為念但當勑邉兵謹守備蓄鋭以待敵待其自致然後擊之此李牧所以制匈奴也當今所要者莫若令邉城警守備遠斥候聚軍實蓄威武以逸待勞則戰士力倍以主禦客則我得其便堅壁清野則寇無所得自然賊深入必有顛躓之慮淺入必無獲虜之益如此數年可使二虜不擊而服矣諫𤣥宗不令突厥入仗馳射疏呂向臣聞鴟梟不鳴未為瑞鳥猛虎雖伏豈齊仁獸是由醜性毒行久務常積故也今夫突厥者正與此類安忍殘賊莫顧君親陛下持武義臨之脩文德來之既慴威靈又沐聲教以力以勢不得不庭故稽顙稱臣奔命遣使陛下乃能収其傾效雜以從官赴封禪之禮㕘玉帛之㑹此德業自盛固不可名焉因復詔許侍遊召入禁仗仰英姿之四照送神藝之百發恩意俱極誠無得喻焉乃更賜以馳逐使操弓矢競飛鏃於前同獲獸之樂是屑畧大過未敢取也雖聖胷豁達與物無猜而愚臣徘徊與時加慄儻此等各懷犬吠交肆盜憎荆卿詭動何羅竊至蹔逼嚴蹕稍冐清塵悔將何及諫造大像疏狄仁傑臣聞為政之本必先人事陛下矜羣生迷謬溺喪無歸欲令像教兼行覩相生善非為塔廟必欲崇奢豈令僧尼皆須檀施得栰尚捨而况其餘今之伽藍制過宮闕窮奢極壯畫繢盡工寶珠殫於綴飾瓌材竭於輪奐功不使鬼必在役人物不天來終須地出不損百姓將何以求生之有時用之無度編户所奉恒苦不充痛切肌膚不辭箠楚遊僧一説矯陳禍福翦髪解衣仍慙其少亦有離間骨肉事均路人身自納妻謂無彼我背託佛法詿誤生人里陌動有經坊闤闠亦立精舍化誘倍急切於官徵法事所須嚴於制敕膏腴美業倍取其多水碾莊園數亦非少逃丁避罪倂集法門無名之僧凡有幾萬都下撿括已得數千且一夫不耕猶受其弊浮食者衆又劫人財臣每思惟實所悲痛徃在江表像法盛興梁武簡文捨施無限及其三淮沸浪五嶺騰煙列刹盈衢無救危亡之禍緇黄蔽路豈有勤王之師比年已來風塵屢擾水旱不節征役稍繁家業先空瘡痍未復時興工役力所未堪伏惟聖朝功德無量何必要營大像而以勞費為名雖歛僧錢百未支一尊容既廣不可露居覆以百層尚憂未徧自餘廊廡不得全無又云不損國財不傷百姓以此事主何謂盡忠臣今思惟兼採衆議咸以為如來設教以慈悲為主下濟羣品應是本心豈欲勞人以存虛飾當今有事邉境未寧宜寛征鎮之徭省不急之費設令雇作皆以利趨既失田時自然棄本今不樹稼來嵗必飢役在其中難以取給況無官助義無得成若費官財又盡人力一隅有難將何救之諫造金仙玉真二觀疏辛替否臣嘗以為古之用度不時爵賞不當破家亡國者口説不如身逢耳聞不如眼見臣請以有唐以來理國之得失陛下之所眼見者以言之惟陛下審之聽之擇善而從之則萬嵗之業自可致矣何憂乎黎庶之不康福祚之不永伏以太宗文武聖皇帝陛下之祖撥亂反正開階立極得至理之體設簡要之方省其官清其吏舉天下職司無一虛授用天下財帛無一枉費賞必俟功官必得雋所為無不成所征無不尅不多造寺觀而福德自至不多度僧尼而殃咎自滅道含乎天地德通乎神明故天地憐之神明祐之陰陽不􅄽風雨合度四人樂其業五穀遂其成腐粟爛帛填街委巷千里萬里貢賦于郊九夷百蠻歸欵于闕自古有帝皇已來未有若斯之神聖者也故得享國久長多歴年祀陛下何不取而則之中宗孝和皇帝陛下之兄居先人之業忽先人之化不取賢良之言徒恣子女之意官爵非擇虛食祿者數千人封建無功妄食土者百餘户造寺不止枉費財者數百億度人不休免租庸者數十萬是使國家所出加數倍所入減數倍倉不停本嵗之儲庫不貯一時之帛所惡者逐逐多忠良所愛者賞賞多䜛慝朋佞喋喋交相傾動容身不為於朝廷保位皆由於黨附奪百姓之食以養殘兇剥萬人之衣以塗土木於是人怨神怒衆叛親離水旱不調疾疫屢起遠近殊論公私罄然五六年閒至于禍變享國不永受終于兇婦人寺舍不能保其身僧尼不能護妻子取譏萬代見笑四夷此陛下之所眼見也何不除而改之依太宗之理國則百官以理百姓無憂故太山之安立可致矣依中宗之理國則萬人以怨百事不寧故累卵之危立可待矣頃自夏以來霪雨不解穀荒于壟麥爛于場入秋已來亢旱成災苗而不實霜損蟲暴草菜枯黄下人咨嗟未知賙賑而營寺造觀日繼于時檢校試官充臺溢署伏惟陛下愛兩女為造兩觀燒瓦運木載土填坑道路流言皆云計用錢百餘萬貫惟陛下聖人也無所不知陛下明君也無所不見既知且見知倉有幾年之儲庫有幾年之帛知百姓之間可存活乎三邉之士可轉輸乎當今發一卒以禦邉陲追一兵以衛社稷多無衣食皆帶飢寒賞賜之間逈無所出軍旅驟敗莫不由斯而乃以百萬貫錢造無用之觀以賈六合之怨乎以違萬人之心乎伏惟陛下族阿韋之家而不改阿韋之亂政忍棄太宗之理本不忍棄中宗之亂階忍棄太宗久長之謀不忍棄中宗短促之計陛下又何以繼祖宗親萬國昔陛下與皇太子在阿韋之時見亡是懼常切齒於羣兇今貴為天子富有海内而不改排羣兇之事臣恐復有切齒於陛下者也陛下又何以羣兇而誅之臣徃見明勑自今已後一依貞觀故事且貞觀之時豈有今日之造寺營觀加僧尼道士益無用之官行不急之務而亂政者也臣以為棄其言而不行其信慕其善而不遷其惡陛下又何以刑於四海徃者和帝之憐悖逆也為姦人之所誤宗晉卿勸為第宅趙履溫勸為園亭損數百家之居侵數百家之地工徒斲而未息義兵紛以交馳卒使亭不得遊宅不得坐信邪佞之説成骨肉之刑此陛下之所眼見也今兹造觀臣必知非陛下公主之本意得無有趙履溫之徒將勸為之冀誤其骨肉不可不明察也臣聞出家修道者不干預於人事專清其身心以虛泊為髙以無為為妙依兩巻老子視一軀天尊無欲無營不損不害何必璇臺玉樹寶像珍龕使人困窮然後為道哉且舊觀足可歸依無造無營以取窮竭若此行之三年國不富人不安朝廷不清陛下不樂則臣請殺身於朝以令天下言事者伏惟陛下行非常之惠權停兩觀以俟豐年以兩觀之財為公主施貧窮填府庫則公主之福德無窮矣不然臣恐下人怨望不減於前朝矣前朝之時賢愚知其必敗人雖有口而不敢言言未發聲禍將及矣韋月將受誅於丹徼燕欽融見殺於紫庭此人皆不惜其身而納忠於主身既死矣主亦危矣故先朝誅之陛下賞之是陛下知直言之士有裨於國臣今直言亦先朝直言之人也惟陛下察之諫税闗市疏崔融伏見有司請税闗市事條不限工商但是行人盡税者臣謹按周禮九賦其七曰闗市之賦竊惟市縱繁巧闗通末遊欲令此徒止抑所以咸増賦税臣謹商度今古料量家國竊將為不可税謹條事跡如左伏惟聖㫖擇焉徃古之時醇樸未散公田籍而不税闗防譏而不征中代已來澆風驟進桑麻疲弊稼穡辛勤於是各徇通財爭趨作巧求徑捷之速忘嵗計之餘遂使田業日荒倉廩不積蠶織休廢弊溫闕如飢寒猥臻亂離斯瘼先王懲其若此所以變古隨時依本者恒科占末者増税夫闗市之税者謂市及國門闗門者也惟歛出入之商賈不税來徃之行人今若不論商人通取諸色事不師古法乃任情悠悠末代於何瞻仰濟濟聖朝自取嗤笑雖欲憲章姬典乃是違背周官臣知其不可者一也臣謹按易繫稱庖羲氏没神農氏作日中為市致天下之人聚天下之貨交易而退各得其所班志亦云財者帝王聚人守位養成羣生奉順天德治國安人之本也士農工商四人有業學以居位曰士闢土殖穀曰農作巧成器曰工通財鬻貨曰商聖王量能授事四人陳力受職然則四人各業久矣今復安得動而摇之蕭何又云人情一定不可復動班固又云曹參相齊齊國安集大稱賢相參去屬其後相曰以齊獄市為寄慎勿擾也後相曰理無大於此者乎參曰不然夫獄市者所以幷容也今若擾之姦人安所容乎吾是以先之夫獄市兼受善惡若窮極姦人無所容竄久且為亂秦人極刑而天下叛孝武峻法而刑獄繁此其效也老子曰我無為而人自化我好靜而人自正參欲以道化其本不欲擾其末臣知其不可者二也四海之廣九州之雜闗必據險路市必憑要津若乃富商大賈豪宗惡少輕死重義結黨連羣喑嗚則彎弓睚眦則挺劍小有失意且猶如此一朝變法定是相驚乘兹困窮或致搔動便恐南走越北走胡非唯流逬齊人亦自攪亂殊俗又如邉徼之地寇賊為鄰興胡之旅嵗月相繼儻因科賦致有猜疑一從散亡何以制禁求利雖切為害方深而有司上言不識大體徒欲益帑蔵助軍國殊不知軍國益擾帑蔵愈空臣知其不可者三也孟軻又云古之為闗也將以禦暴今之為闗也將以為暴今行者皆税本末同流且如天下諸津舟航所聚旁通巴漢前指閩越七澤十藪三江五湖控引河洛兼包淮海𢎞舸巨艦千軸萬艘交貿徃還憧憧永日今若江津河口置鋪納税則檢覆檢覆則遲留此津纔過彼鋪復止非唯國家税錢更遭主司僦賂船有大小載有多少量物而税觸途淹久統論一日之中未過十分之一因此擁滯必致吁嗟一朝失利則萬商廢業萬商廢業則人不聊生其間或有輕訬任俠之徒斬龍刺蛟之黨鄱陽暴虐之客富平悍壯之夫居則蔵鏹出便竦劍加之以重税因之以威脅一旦獸窮則摶鳥窮則攫執事者復何以安之哉臣知其不可者四也五帝之初不可詳已三王之後厥有著云秦漢相承典章大備至如闗市之税史籍有文秦政以雄圖武力捨之而不用也漢武以霸畧英姿棄之而勿取也何則闗為禦暴之所市為聚人之地税市則人散税闗則暴興暴興則起異圖人散則懷不軌夫人心莫不背善而樂禍易動而難安一市不安則天下之市心摇矣一闗不安則天下之闗心動矣況澆風久扇變法為難徒欲禁末遊規小利豈知失𤣥黙亂大倫魏晉眇小齊隋齷齪亦所謂不行斯道者也臣知其不可者五也今之所以税闗市者何也豈不以國用不足邉寇為虞一行斯術冀有殷贍然也㣲臣敢借前箸以籌之伏惟陛下當聖期御𤣥籙沉璧于洛刻石于嵩鑄寶鼎以窮姦坐明堂而布政神化廣洽至德潜通東夷蹔驚應時平殄南蠻纔動計日歸降西域五十餘國廣輪一萬餘里城堡清夷亭候靜謐比為患者惟苦二蕃今吐蕃請命邉事不起即目雖尚屯兵久後終成弛柝獨有黙啜假息孤恩惡貫禍盈覆亡不暇征役日已省矣繁費日已稀矣然猶下明制遵大樸愛人力惜人財王侯舊封妃主新禮所有支料咸令削減此陛下以躬率先堯舜之用心也且闗中河北水旱數年諸處逃亡今始安輯儻加重税或慮相驚況承平嵗積薄賦日久俗荷深恩人知自樂卒有變法必多生怨生怨則驚擾驚擾則不安中既不安外何能禦文王曰帝王富其人霸主富其地理國若不足亂國若有餘古人有言帝王蔵於天下諸侯蔵於百姓農夫蔵於庾商賈蔵於篋惟陛下詳之必若師興有費國儲多窘即請倍筭商客加斂平人如此則國保富強人免憂懼天下幸甚臣知其不可者六也陛下留神繫表屬想政源冒兹炎熾早朝晏坐一日二日機務不遺先天後天靈心密應時政得失小子何知卒陳瞽辭伏紙惶懾請追癸巳日詔疏羅隠嵗貢賤臣隠既以文不得意且抱犬馬之疾於長安夏五月京畿旱癸巳日聞詔大京兆用器水鑪香蒲蕭絳幡輩致於坊市門將所以用舊法而召雨也臣踴起病榻間以為明天子憂人雖舜禹不如是之勤幸甚幸甚臣又聞水旱與天地同出苟時或然不可以倉卒除去今秦地旱已逾月矣而陛下禱祠亦以頻矣天之髙地之厚五嶽之緜亘四瀆之宏遠陛下命百執事啓祈外何嘗不以心祝之雖莖槁苗乾而百姓不怨嗟者其感陛下之誠深也今以蒲蕭輩為請者豈陛下為其靈於嶽瀆者乎夫嶽瀆視陛下之公輔裂陛下之土田苟陛下憂則嶽瀆亦宜憂矣受祭據封者尚未能為陛下出力彼蒲蕭輩復何足以動天臣為陛下不取也臣又聞天之有雨澤猶陛下有渥恩雨澤可以委曲干之則陛下渥恩亦可以委曲干之矣臣聞天子有左右史將所以記事記言然後付太史氏臣必恐其得以容易編牘今冒死請追癸巳日詔苟若陛下落十六聖之教訓雖五種栖野而百姓不暇掇豈蒲蕭輩之所及乎昔殷湯之代臣不以旱為災仁聖之君在上也今旱未及殷代而陛下憂已過矣臣請因旱以賀萬姓俾其知陛下心唐文粹巻二十七欽定四庫全書唐文粹巻二十八宋姚鉉編
