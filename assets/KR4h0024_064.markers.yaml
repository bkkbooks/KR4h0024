  - {type: variant, offset: 7619, length: 0, content: '', WYG: 遺言是究是勤惟動惟黙逝如浮雲交久益微世罕究陳爰有大智出其真門師以顯示俾民惟新情動生變物由堙淪爰授樂國參于化源師以誘導俾民不昏道用不作神行無迹晦明俱如生死偕寂法付後學施之無斁𦵏従我師無忘真宅薦是昭銘刻兹𤣥石碑隂記無姓和尚既居是山曰凡吾之求非在外也吾不動矣𢎞農楊公炎自道州以宰相徵過焉以為宜居京師强以行不可將以聞曰願間嵗乃往明年楊去相位竄謫南海上終如其志趙郡李萼辨博人也為岳州盛氣欲屈其道聞一言服為弟子河東裴藏之舉族受教京兆尹𢎞農楊公以其隠地為道塲和州刺史張惟儉買西峯廣其居凡以貨利委堂下者不可選紀受之亦無言將終命其大弟子懐逺授以道妙終不告其姓或曰周人也信州刺史李某為之傳長沙謝楚為行狀博陵崔行儉為性守一篇凡以文辭}
