front:
  text: 唐文粹校勘記序一葉前一行唐文粹無唐三葉前字七行然焉後六行之文無文九字行箴議
  hash: sha256:9cbf65cf3a0d641ae1c784351bf3bf193a66fe013d187a982f73733d670ee832
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0024_SBCK_102-1a}
body:
  text: 表奏無議奏四葉前二字八行唐文粹序無此四字目錄一葉前一行重校正唐文粹目錄文粹目二錄卷上行吳興姚鉉纂無此六五字行幷序無此二字以下各題凡幷序幷表十一表附竝系述等都爲宋本所無行東都賦下有李十三庚二字行郊廟無此後八二字行潭單十二行海無此二葉後字十行何卜賦下有劉禹錫三字三葉前七行詩甲琴操附古調八一行古今樂章無此十二四字行圓丘下有樂章二字十三以下各題均同行玄宗下有開元十三年五字十三首三作二下有張說二字祈穀上有正月十四上辛四字行享上帝上有季秋二字首下有褚亮二字祀祀五後二方行睿宗下有太極三元年四字行玄宗下有開元十七三年五字行詩乙古調九二行皮日休此三字在下行悼賈十二後行蕭穎士此三字在下行四葉前有竹一篇後二行韓愈此二字在下行鄆州溪堂詩後五行詩丙古調三樂後九府辭上行怨詞下有崔國十二輔三字行列烈節婦吟下有寄東平李十四司空六字行白紵歌下有張五葉後籍二字五行隴頭吟下有王十一維二字行詩丁古調四下行樂府六葉前辭三字與此連接三行俠客結八客行軍中無此九二字行劍客下有二十三首兩字行陽春歌下有李白二後十字下二題同二行紫騮馬下有李十四白二字行白虎行下有李七葉前賀二字一行烏夜啼下有李六白二字行沙堤行下有呈裴七相公四字行詩戊古調五無下行九歌篇一三字行古風無此後四二字行古興古五意行詩己古調六無下行歌篇八葉前二三字二行辯士下有賈三島二字行絕句下有賈九島二字行覩伏覩有感上有小臣十二婓然四字行至壽春至下有開十三化里三字行詩庚古調七無下行後七歌篇三三字行浣沙浣十二紗行同徐侍郞重陽宴集同徐侍郎五雲谿十三新亭重陽宴集作行郡中下有九葉前與字三行送郭大夫無郭四字行送梁補闕吳興送梁五補闕歸朝行送周愿下有判六官二字行赴尉無赴七字行送韋起居舅歸蒿陽奉送韋起居老舅百日假八滿歸嵩陽舊居行東歸下有孟郊二九字下題同行送姪上有盧十五竹亭五字別下有兼獻張徐後三州五字行入關下有孟四郊二字行詩辛古調八無下行九歌篇四三字行蜀中下有將歸十留三字行在河北作下有張十一説二字行立春日贈諸公先赴長安逢立春日贈韋十二侍郎行發太原途中寄所思初發太原至途十三中寄太原所知行剡溪行下有却寄新十四別者五字行發龍且無此十葉前三字二行江行此題前有汴舟阻風闕孟雲卿八字四首下有權德四輿三字行別郭大上有新都五南亭四字行寄李益上有秋暮山中四字侍御下有因叙疇年之六棄寄懷於篇十字行題浮雲寺樓寄偶題安州浮雲八寺樓寄湖州行遙和張史君岳州張史君與二首下有因遙九申和四字行舟中無此十一二字行杼山禪居寄無杼山禪居四字十二寄下有贈字行吉祥下有後三寺字行春怨春七愁行失意歸吳寄劉侍郞題下有孟郊二字下行八莫相疑行在此篇前行答李昌期徐十八晦題在此篇後十二行烱無此十三字行夏中無此十一葉二字前二行貽遊舊贈平昔五遊舊行詩壬古調九無下行八歌篇五三字行鄭太守見訪博平鄭太守九却之武陵行張韓途中成張籍韓愈至示予新製示新製三十餘篇晝書後四行集無此六字行鄖無此字十二葉前四行奉和無奉六字行廬山謠下有寄盧侍御四字南岳事畢無事畢二字七行作詩十行西山祈雨輒應祈雨是日十一輒應賦詩行贈答寄贈敬答無敬字十三行入崖口五渡無入五後二渡三字行岀靑門無此六三字行詩癸古調十無下行歌篇九六三字行百丈谿下有新理十一茅茨四字行林泉無此十三二字行太白東谿張老舍無此七字等無此十三葉字前六行南兗謝郡客無此後一五字行詩古調無下行四歌篇七三字行除始七除行太大禪堂道觀石門墨山二山相連有禪堂道觀天下絕境十四葉前十四行和奉和雅琴下有因書後五事三字行脩竹篇上有與東方六左史五字行鞭杖十行禽鳥昆蟲十無昆蟲十二十三字行百舌吟下有劉禹十五葉錫三字前四行詩古調無下行六歌篇八三字行月明河四無明河十一四三字行詠露下有李正後三封三字行引泉詩下有陸龜蒙三字闌蘭十二行韋鍊師上有少室山三字梁鍊師上有青牛谷三字十六葉前二行詩古調無下行五歌篇五三字行感寓詩無詩六字行陳子昂上有拾遺二字十七葉前二行廢琴下有白居後二易三字行頌甲另行上四空二字行一小注又云一云五行述聖頌下有張十四說二字行平胡頌下有揚十八葉炎二字前二行聖時聖九政行頌丁下有政徳二十四字無下一行行廣州都督下有嶺南按察五府經略使九字以下各題宋本官銜全錄均省後十行高適髙十三邁行賈至上有並字在十九葉鐵牛頌後前二行開元大唐開元十三年四州岐邠涇後一寧四州行四皓上有南四山二字行王侍郞上有鳯七閣二字行法池寺上有藍十田二字行大通上有唐字鶴林上有十四唐字行貘屏贊下有白居易三字下題同二十葉前一行薛少府上有金五鄉二字行裴裴十一昊行表無此十三字行賀册尊號表下有轉後一愈二字行王珙上有桂六州二字行薛太守上有東七平二字行張仁亶上有并州十二長史四字行請削爵無請字抑損無損二十一葉字前二行書奏無此五二字行論太宗論作十諫行配饗書下有皮日十三休三字行書奏無此二字後二行駮廟號無駮七字行高郢此二字在再十二上諫書後行疏無此二十二字葉前七行四鎭上有疎勤後二等三字行疏無此四字行則天下有皇后二字皇子皇太子六行論職官多濫疏下有韋嗣二十三葉立三字前四行奏無此五字行尊號一無此三字以下赦宥舉官府庫前六内人無濫賞均無行陸贄無此二字十四下四篇同行内人下有後二等字行陸贄上有巳上四並三字行奏五無此六二字行渾瑊下有李晟二字陸贄無此九二字行李楚琳狀下有巳上並二十四葉陸贄五字前六行帝王無此後五二字行玉册文下有李德裕三二十五葉字前一行中宗唐中宗孝和皇帝以下各題均二有唐字宋本廟號全錄均省行哀册上有帝王二字十行哀册上有后後一妃二字行弔夷齊文下有柳八識二字行獨孤及無此十三字二行王岳靈樊鑄樊鑄王岳十四靈行題哀辭後附無此二十六葉五字前五行祀祝六行爲下有常八州二字行祭楊州祭下有亡友放三字哀辭下有十一附字行劉禹錫此三字在十四下行題後行李德裕此三字在後後十一行題後三行十哲上有孔二門二字十七葉前一行稅蛻二行六逆論下有柳宗十一元三字行無賢臣論下有孫郃二字謬繆十二行太甲論題上有放君二十四字側行頂格行扎札後四行戰論下有杜六牧二字行機上權下無此七四字行英傑論下有李德十裕三字行嬖惑二無此二十三字八葉前十行郊寢無此二字下行題十一前有郊廟陵寢行昊昊後九天行杜佑上有並字在二下行題後十九葉前二行第四十一卷前有文粹目錄卷上一前八行文粹目錄卷下一行行重議郭知運獨孤及無此八字盧弈謚議下有獨孤後二及三字行不義侯議下有權德五輿三字行魏徵令狐徳棻下有同十議二字行原性性十一原行原毀毀十二原行原仁顧校作十四原人行皮日休此三字在三十葉原親下前九行李翺此二字在三下行題後十一葉前二行讀墨子下有韓後五愈二字行朝日說下有柳宗六元三字行䄍說下有柳宗元三八字行訂司樂氏下有元十一結二字行原晉亂說無說三十二葉字前一行中史五行論兵二無此六三字行原十六衞下有杜九牧二字行子高之讓下有羅隱二十二字下題同行禹書下下有劉十三蛻二字行讓非賢人事下有李商隱三字後六行書襃城驛下有孫十樵二字行時化下有元結二十二字下題同行蟹志下有陸龜十三蒙三字行碑甲無甲士十四字行碑無此三十三葉字前一行祠廟下有四上字行黃陵廟碑下有韓愈二字齊濟五行碑乙乙作二碑陰下有文字六行碑無此七字行聖帝一無此九三字行先聖六無此十一三字行曲阜上有兗州二後二字行碑丙丙作三文附無此三二字行碑無此七字行文顧校八作碑行碑丁丁作九四行碑無此十一字行嚴君上有漢高十二士三字行許由下有先生二字十三行徐徵君上有後三十四葉漢二字前三行少太十行翰翺十一行碑戊戊作五表附上有十二石字行碑無此後六字行碑已己作七六行碑無此九字行漂溧三十五葉前一行碑庚庚作二七行碑無此四字行長公主神道碑下有張說二字五行歧岐六行碑辛辛作七八行碑無此十字行齊成公齊十一抗行碑壬壬作十二九行碑無此後一字行韓諱韓愈無此三二字行李楷下有洛字五行碑癸癸作六十行碑無此十二字行張擇神道碑下有白居十四易三字行碑無此三十六葉字前二行城碑下有五銘字行碑無此八字行先廟碑下有權德輿三字十一行王公先廟碑下有劉禹十三錫三字行節度使無使字烏公先廟碑下有韓十四愈二字行議例銘附無此後一四字行碑無此三字行天台山無山字題前有議四例銘附四字行梁肅上有並字在七下行題後行碑無此八字行釋二無此九二字行大達法師上有上都大安國寺六字以十一下各題寺名宋本全錄均省行塔碑無塔十三字行記銘銘十四記行碑無此三十七葉字前二行碑陰上有大三師二字行大鑒上有曹溪第六祖五字四行佛衣銘下有劉禹七錫三字行碑無此八字行釋四無此九二字行大師下有十一碑字行大法師無法後一字行碑無此三字行重巖寺碑上有唐鄂州永興縣六七字行茅山上有十三唐字行函谷關銘下有獨孤三十八葉及三字前五行招昭十一行銅鍾銘下有獨孤十三及三字行橋梁無梁後十字一行賈公墓誌銘下有權德輿三三十九葉字前一行銘記七行使史後九行東武武東陳公墓誌銘下有附陳子四十葉昂四字前二行來萊六行乳穴記下有柳宗十三元三字行御史中丞壁記下有李後二華二字行祭察十三行盧陵盧作廬上有十四吉州二字行韓城上有同州二四十一葉字前三行山州四行廬盧五行所新七行東峯上有蘭谿八縣三字行李直方無方十四字行瓘臯後二行歧公歧國十二公行撫州下有寳應寺三字孤山下有永十四福二字行㡧幀四十二葉前五行大水起上有泗州二字十二顧校起作記行饗軍下有後一堂字行附記三行附無此字有舒後四元輿三字行殖植八行房扆十行古之奇顧校作十二李商隱行動箴動靜十行二箴三靜箴無此四十三葉二字前七行門銘此題下有二銘并序四十一字下行羅袞二字在此行甲一後一行權德輿顧校作二失名行國公三行相國書國作公下有四劉軻二字行書乙書啓六二行裴相公無公字十行行軍書顧校下有吳武陵三字李翺杜十一牧行丙三四十四葉前三行呂道州下有温論非國語五字非國語書下有柳宗八元三字行丁四後二行戊五四十五葉前三行已六四行論文論文五上行論文書下有柳冕二六字下二題同行南州九行論文書下有柳十一冕二字行庚七十二行論文論文後一下行論詩論諦評詩書下有司空四圖三字行辛八十行求文章書無書十二字行杜溫夫書下有柳宗十三元三字行壬九四十六葉前三行癸十五六十一行上崔華州書書作四十七葉牋前一行䂓知四行諭一無此九二字行翰苑集序下有權德十一輿三字行李德裕文